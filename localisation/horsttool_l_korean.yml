 horsthelp.2.t:0 "호르스트 도구 도움말"
 horsthelp.2.d:0 "호르스트 도구 시스템은 호스트가 게임을 더 쉽게 진행하고, 핫조인으로 시간을 낭비하지 않으며, 독일이 보너스로 연구를 잘못하여 게임이 끝나버리는 등의 상황을 방지하기 위해 만들어졌습니다. 호르스트 도구는 몇 가지 기능을 가지고 있습니다: \n\n 1. 국경 변경 \n호르스트 도구는 국가를 합병하고, 주를 이전하며, 핵심 주를 추가할 수 있습니다. 국가를 합병하려면, 해당 국가의 주 하나를 표시한 다음, 합병할 대상 국가를 클릭하고 합병 버튼을 누르십시오. 주를 이전하거나 핵심 주를 추가하려면, 주를 표시한 다음, 받을 국가를 클릭하고 주 이전/핵심 주 추가 버튼을 누르십시오. \n\n2. 기술 보너스 추가.\n 이를 위해서는, 대상 국가를 클릭하고, 추가하려는 보너스를 클릭한 다음, 연구 아이콘이 있는 '치트' 버튼을 누르십시오.\n\n3. 플레이어를 관전자로 보내기. \n이를 위해서는, 플레이어가 플레이 중인 국가를 클릭하고 관전 버튼을 누르십시오. \n\n4. 국가들과 백색 평화 맺기. \n국가와 백색 평화를 맺으려면, 대상 국가를 클릭하고 백색 평화 버튼을 누르십시오."
 horsthelp.2.a:0 "고마워요 호르스트, 정말 멋져요!"
 
