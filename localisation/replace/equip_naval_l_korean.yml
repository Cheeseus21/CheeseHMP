 ship_armor_heavycruiser_1_desc:0 "구식 및 경량 순양함급과 교전 시 순양함에게 약간의 우위를 제공하기 위한 장갑 설계입니다."
 ship_armor_heavycruiser_2_desc:0 "순양함이 다른 순양함과 교전할 때 상당한 방호력을 제공하기 위한 더 두꺼운 장갑대입니다."
 ship_armor_heavycruiser_3_desc:0 "전함 장갑에 사용된 방식을 모방한 이 장갑 설계는 전 세계의 군비 발전에 발맞추도록 고안되었습니다."
 ship_armor_heavycruiser_4_desc:0 "이 장갑 설계는 다른 모든 구역을 희생하여 함선이 전투를 지속하는 데 필수적인 구역의 방호력을 극대화합니다."