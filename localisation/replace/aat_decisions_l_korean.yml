 FIN_surrender_to_the_soviet_union: "[SOV.GetNameDef]에 항복"
 FIN_surrender_to_the_soviet_union_desc: "우리 병사들의 용맹한 노력에도 불구하고, [SOV.GetAdjective]을(를) 영원히 막을 수는 없다는 것이 명백합니다. 이제 적들과 제한적인 평화를 요청해야 할 때입니다."
 FIN_reached_out_to_soviets_to_surrender_flag: "이미 [SOV.GetNameDef]와(과) 평화 협상을 시작하려 시도함"
 FIN_demand_peace_negotiations: "[SOV.GetName]에 평화 협상 요구"
 FIN_demand_peace_negotiations_desc: "이제 마침내 [SOV.GetAdjective]에 대한 우위를 되찾았으므로, 평화를 강제할 수 있습니다."
 FIN_can_demand_territory_if_occupying_tt: "\n\n§Y[213.GetName]§!, §Y[215.GetName]§! 또는 §Y[216.GetName]§! 주를 통제하고 있다면 [SOV.GetNameDef](으)로부터 영토 할양을 요구할 수 있습니다."
 FIN_can_demand_peace_negotiations_flag: "임무 §Y$FIN_hold_leningrad_mission$§! 완료(§Y[195.GetName]§!을(를) 최소 §Y30일§!간 통제) 및 현재 §Y[195.GetName]§! 통제 중"
 FIN_winter_war_ongoing_flag: "[ROOT.GetFlag]§Y[ROOT.GetNameDef]§!은(는) 방어자로서 §Y[SOV.GetNameDef]§!에 맞서 겨울 전쟁을 치르고 있습니다."

 FIN_hold_leningrad_mission: "[195.GetName] 사수"
 FIN_hold_leningrad_mission_desc: "[195.GetName]이(가) 아군에 의해 점령되었을 수 있으나, 우리의 요구를 관철시키기 위해서는 [SOV.GetAdjective] 군의 사기가 완전히 꺾일 때까지 해당 지역을 사수해야 합니다."
 FIN_retake_leningrad_mission: "[195.GetName] 탈환"
 FIN_retake_leningrad_mission_desc: "[FIN.GetAdjective] 군이 우리에게서 [195.GetName]을(를) 점령했으며, 조속히 탈환하지 못하면 그들은 어떠한 요구든 관철시킬 수 있을 것입니다."
 FIN_finland_can_send_peace_demands_tt: "[FIN.GetFlag]§Y[FIN.GetNameDefCap]§!은(는) §Y[213.GetName]§!, §Y[215.GetName]§! 또는 §Y[216.GetName]§!을(를) 통제하고 있다면 [ROOT.GetAdjective] 영토 할양을 포함한 평화 협상을 요구할 수 있습니다."


 FIN_finnish_resistance_category: "[FIN.GetAdjective] 저항군"
 FIN_finnish_resistance_category_desc: "비밀 군사 작전의 일환으로, [ROOT.GetAdjective] 저항군 세력이 우리 군에 맞서 계속 싸울 수 있도록 돕기 위해 대량의 [ROOT.GetAdjective] 육군 무기와 장비가 핀란드 전역에 흩어진 은닉처에 보관되었습니다."
 FIN_search_for_weapon_caches_in_state: "[FROM.GetName]에서 무기 은닉처 수색"
 FIN_search_for_weapon_caches_in_state_desc: "우리 군은 해당 주의 모든 무기 은닉처를 찾아내고 압수하기 위해 [FROM.GetName]의 핀란드 무기 은닉 사건에 대한 철저한 조사를 실시할 것입니다."
 FIN_search_for_weapon_caches_decision_cost_cp: "£command_power  §Y[?FIN.FIN_search_for_weapon_caches_decision_cost]§!"
 FIN_search_for_weapon_caches_decision_cost_cp_blocked: "£command_power  §R[?FIN.FIN_search_for_weapon_caches_decision_cost]§!"
 FIN_search_for_weapon_caches_decision_cost_cp_tooltip: "결정을 내리려면 £command_power §Y[?FIN.FIN_search_for_weapon_caches_decision_cost]§! 만큼의 비용이 듭니다"
 FIN_motion_of_no_confidence_against_leader: "[ROOT.GetLeader]에 대한 불신임 결의안"
 FIN_motion_of_no_confidence_against_leader_desc: "[ROOT.GetLeader]는 우리나라가 직면한 문제들을 해결하기 위해 충분한 노력을 하지 않았으며, 이 사실이 변하지 않을 것이라는 점은 명백합니다. 이제 이 무능한 지도자를 축출하기 위해 불신임 투표를 할 때입니다."
 FIN_resignation_of_kallio: "$FIN_kyosti_kallio$의 사임"
 FIN_resignation_of_kallio_desc: "$FIN_kyosti_kallio$는 위대한 정치가는 아니었으며, 최근의 실패들은 그가 국가를 올바른 방향으로 이끌 수 없다는 것을 명백히 보여주었습니다. 이제 세계의 긴장이 고조되고 그의 건강이 계속해서 터져 나오는 심각한 문제들을 처리하는 것을 허락하지 않으므로, 그가 사임하는 것이 최선입니다."
 FIN_form_a_military_government: "군사 정부 수립"
 FIN_form_a_military_government_desc: "현 민간 정부는 적대와 역경 앞에서 약점을 보였습니다. $FIN_carl_mannerheim$는 이전에 우리나라를 위해 훌륭히 복무했으며, 분명히 다시 그렇게 할 것입니다. 그는 우리의 모든 적을 막아내기 위해 군사 정부를 수립해야 합니다."
 FIN_resignation_of_mannerheim: "$FIN_carl_mannerheim$의 사임"
 FIN_resignation_of_mannerheim_desc: "$FIN_carl_mannerheim$는 국가를 무기한으로 통치할 필요나 의지가 없으므로, 취임 시 약속했던 임무를 완수했기에 더 이상 자신이 필요하지 않다고 밝히며 대통령직 사임을 발표하고자 합니다."
 FIN_organize_the_opposition: "반대파 조직"
 FIN_organize_the_opposition_desc: "정부는 약속을 이행하는 데 성공하지 못했으므로 그에 따라 처리되어야 합니다. 이제 반대파를 통합하고 행사를 조직하여 지지를 모으고 [ROOT.GetLeader]의 신용을 떨어뜨릴 때입니다."
 FIN_appeal_to_the_finnish_spirit: "핀란드 정신에 호소"
 FIN_appeal_to_the_finnish_spirit_desc: "우리는 역경에 맞서는 핀란드인의 비범한 결단력, 회복력, 강인함에 호소해야 합니다. 핀란드 국민은 모든 역경을 이겨내기 위해 함께 노력해야 합니다. 우리의 시수가 우리를 강하게 만듭니다!"
 FIN_entice_the_masses: "대중 유혹"
 FIN_entice_the_masses_desc: "대중은 쉽게 흔들립니다. 더 작고 마음에 와닿는 질문과 문제들을 해결하겠다는 약속을 함으로써, 우리 정부는 평범한 핀란드인에게 쉽게 더 매력적이고 호감을 얻을 수 있습니다."
 FIN_organize_the_opposition_cost_increase_tt: "\n§Y$FIN_organize_the_opposition$§! 결정의 비용이 §Y[?FIN_bop_decision_cost_multiplier]§!만큼 §R곱해집니다§!.\n"
 FIN_appeal_to_the_finnish_spirit_cost_increase_tt: "\n§Y$FIN_appeal_to_the_finnish_spirit$§! 결정의 비용이 §Y[?FIN_bop_decision_cost_multiplier]§!만큼 §R곱해집니다§!.\n"
 FIN_entice_the_masses_cost_increase_tt: "\n§Y$FIN_entice_the_masses$§! 결정의 비용이 §Y[?FIN_bop_decision_cost_multiplier]§!만큼 §R곱해집니다§!.\n"
 FIN_the_path_to_socialism: "사회주의로 가는 길"
 FIN_the_path_to_socialism_desc: "몇 년 안에, 국민의 공동 노력을 통해 우리는 진정한 사회주의에 도달할 것입니다. 비록 그곳으로 가는 길이 가시밭길이고 어려울지라도, 우리는 어떤 대가를 치르더라도 그 길을 계속 걸어가야 합니다."
 FIN_gather_popular_support: "대중적 지지 확보"
 FIN_gather_popular_support_desc: "국민은 모든 혁명이나 정부에 필수적이며, 우리는 그들로부터 얻을 수 있는 모든 지지를 모으기 위해 최선을 다해야 합니다."
 FIN_gather_popular_support_dec_tt: "우리 측은 전체 영토와 군사 부대의 §G+10%§!를 얻게 됩니다. \n추가적인 공산주의 §Y민병대§! 사단이 생성됩니다."
 when_civil_war_starts_tt: "§Y내전이 시작될 때:§!"
 when_civil_war_starts_tt: 
 FIN_crack_down_on_fascists: "파시스트 탄압"
 FIN_crack_down_on_fascists_desc: "[FIN.GetAdjective] 인민의 진정한 적은 파시스트이며, 가능한 한 빨리 처리해야 합니다."
 FIN_crack_down_on_fascists_character_tt: "파시스트 정치인들이 투옥되어 내전 시 적측에서 사용할 수 없게 됩니다:"
 FIN_crack_down_on_fascists_militias_tt: "적은 더 적은 수의 파시스트 §Y민병대§! 사단을 보유하게 됩니다."
 FIN_crack_down_on_the_military: "군부 탄압"
 FIN_crack_down_on_the_military_desc: "최근 군부가 수상한 움직임을 보이고 있으며, 문제가 되기 전에 처리해야 합니다."
 FIN_crack_down_on_the_military_character_tt: "특정 장군 및 군사 고문들이 투옥되어 내전 시 적측에서 사용할 수 없게 됩니다:"
 FIN_crack_down_on_the_military_divs_tt: "소수의 파시스트 §Y보병§! 사단이 해체됩니다."
 effects_applied_to_the_enemy_side_in_cw_tt: "§Y내전 시 적측에 적용되는 효과:§!"
 FIN_prepare_construction_workers_actions: "건설 노동자 행동 준비"
 FIN_prepare_construction_workers_actions_desc: "건설 노동자들은 하루 만에 조직적인 행동으로 경제를 마비시킬 수 있습니다. 이제 이들의 잠재력을 최대한 활용할 때입니다."
 FIN_prepare_construction_workers_actions_dec_tt: "아군은 전체 영토와 군사 부대의 §G+5%§!를 획득합니다. \n추가 공산주의 §Y민병대§! 사단이 생성됩니다."
 FIN_prepare_construction_workers_actions_enemy_side_dec_tt: "다수의 민간 공장과 기반시설이 파괴 공작으로 손상됩니다."
 FIN_align_the_trade_unions: "노동조합 규합"
 FIN_align_the_trade_unions_desc: "노동조합의 지지는 우리 정부에 매우 필요할 수 있습니다. 그들이 우리 편에 서도록 양보해야 합니다."
 FIN_align_the_trade_unions_enemy_side_dec_tt: "다수의 군수 공장과 조선소가 파괴 공작으로 손상됩니다."
 FIN_purchase_soviet_equipment: "소련 장비 구매"
 FIN_purchase_soviet_equipment_desc: "소련에는 우리가 더 중요하고 나은 일에 사용할 수 있는 장비가 많이 있습니다."
 FIN_infiltrate_soviet_commandos: "핀란드에 소련 특공대 침투"
 FIN_infiltrate_soviet_commandos_desc: "소련 특공대는 최고의 병사들 중 하나이며, 우리 혁명에 유용할 수 있습니다."
 FIN_infiltrate_soviet_commandos_dec_tt: "§Y보병§! 6개 대대, §Y포병 여단§! 2개, §Y지원 대대§! 4개로 구성된 §G3개 사단§!이 수도에 생성됩니다."
 FIN_call_to_union_activism: "노조 행동주의 촉구"
 FIN_call_to_union_activism_desc: "노동조합은 정부가 노동자 계급에 더 이로운 정책을 채택하도록 압박할 힘이 있습니다. 이제 그들을 행동에 나서게 해야 합니다."
 FIN_push_for_cabinet_participation: "내각 참여 추진"
 FIN_push_for_cabinet_participation_desc: "사회주의자들은 1929년부터 내각에서 배제되었습니다. 이제 [ROOT.GetLeader]에게 의회주의 원칙을 존중하도록 압력을 가할 때입니다."
 FIN_gather_funds_for_womens_shelters: "여성 보호소 기금 모금"
 FIN_gather_funds_for_womens_shelters_desc: "$FIN_miina_sillanpaa$는 지난 10년간 노동 여성과 독신 여성의 권리를 위한 운동을 벌이고 여성 보호소를 설립하는 등 열심히 활동해 왔습니다. 정부가 그녀의 활동을 지원한다면 훨씬 더 좋은 결과를 얻을 수 있을 것입니다."
 FIN_appoint_yrjo_leino_as_president: "위리외 레이노를 대통령으로 임명"
 FIN_appoint_yrjo_leino_as_president_desc: "위리외 레이노는 우리 인민을 진정으로 번영으로 이끌 수 있는 인물이며, 가능한 한 빨리 그를 대통령으로 임명하는 것을 고려해야 합니다."
 FIN_appoint_yrjo_leino_as_president_desc: 
 FIN_request_extradition_of_kullervo_manner: "쿨레르보 만네르 송환 요청"
 FIN_request_extradition_of_kullervo_manner_desc: "쿨레르보 만네르의 상태는 날이 갈수록 악화되고 있으며, 그가 수용소에서 결핵으로 죽기 전에 [FIN.GetNameDef](으)로 데려와야 합니다."
 FIN_prioritize_light_industry: "경공업 우선"
 FIN_prioritize_light_industry_desc: "우리의 산업 중점은 완전히 잘못되었으므로, 즉시 재고해야 합니다."
 FIN_prioritize_heavy_industry: "중공업 우선"
 FIN_prioritize_heavy_industry_desc: "우리의 산업 중점은 완전히 잘못되었으므로, 즉시 재고해야 합니다."
 FIN_rebalance_industrial_focus: "산업 중점 재조정"
 FIN_rebalance_industrial_focus_desc: "우리의 산업 중점은 완전히 잘못되었으므로, 즉시 재고해야 합니다."
 FIN_prioritize_light_industry_dec_cost_tt: "경공업을 우선하는 동안 §Y$FIN_prioritize_heavy_industry$§! 결정의 비용이 §R두 배§!가 됩니다.\n"
 FIN_prioritize_heavy_industry_dec_cost_tt: "중공업을 우선하는 동안 §Y$FIN_prioritize_light_industry$§! 결정의 비용이 §R두 배§!가 됩니다.\n"
 FIN_rebalance_industrial_focus_dec_cost_tt: "§Y$FIN_prioritize_light_industry$§! 및 §Y$FIN_prioritize_heavy_industry$§! 결정의 비용이 원래 값으로 초기화됩니다.\n"

 FIN_kullervo_manner_extradited_flag: "§Y1939년 1월 31일§!에 사망하기 전, §Y$FIN_kullervo_manner$§!이(가) [SOV.GetName]에서 송환되었습니다 (중점 §Y$FIN_approach_the_soviets$§! 및 결정 §Y$FIN_request_extradition_of_kullervo_manner$§! 완료)."

 FIN_coastal_garrisons: "해안 수비대"
 FIN_coastal_garrisons_desc: "모든 상륙 침공으로부터 방어하기 위해 해안 수비대를 창설해야 합니다."
