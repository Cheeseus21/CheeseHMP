 #OVERLORD DECISIONS
 DEN_overlord_category: "덴마크 보호령"
 DEN_overlord_category_desc: "우리는 덴마크가 특별 보호령으로서 어느 정도의 독립을 유지하도록 허용했습니다. 하지만 우리의 보호에는 특정한 의무가 따르므로, 그들을 예의주시해야 합니다."
 DEN_annex_denmark: "[DEN.GetNameDef] 합병"
