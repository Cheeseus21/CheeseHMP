 SWE_train_the_sheltered_short_desc: "현재 경찰 병력으로 위장한 북유럽 병사들을 훈련시키고 있습니다. 전쟁 발발 시 이들은 군에 징집되어 예비대에 인력을 추가할 것입니다.\n필요하다면 시설을 확장하여 더 많은 병력을 훈련시킬 수 있습니다."
