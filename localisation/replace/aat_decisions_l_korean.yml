 DEN_bop_motion_of_no_confidence_desc: "현 정부는 [DEN.GetNameDef]와 국민을 구원할 그 어떤 합리적인 조치도 취할 능력이 없는 것으로 보입니다. 새로운 결단력 있는 지도력이 필요합니다! 덴마크 의회는 [DEN.GetLeader]의 지도력에 대한 "불신임 결의안"을 발의해야 합니다."
 DEN_bop_criticize_the_country_leader: "[DEN.GetLeader] 비판"
 DEN_bop_criticize_the_country_leader_desc: "덴마크 의회 의원들은 비공개적으로 [ROOT.GetLeader]의 지도력에 의문을 제기하고 있지만, 누구도 공개적으로 나서려 하지 않습니다. 누군가는 그를 공개적으로 비판하고 의회 과반수를 규합하여 불신임 결의안의 길을 닦아야 합니다!"
 DEN_has_criticized_country_leader_flag: "[DEN.GetLeader]를 비판함"
 DEN_bop_defend_our_chosen_path_neutrality: "£BoP_left_texticon 선택한 길 수호"
 DEN_bop_defend_our_chosen_path_neutrality_desc: "좋든 싫든, 우리는 이제 와서 벗어나는 것이 매우 현명하지 못한 길을 걷기 시작했습니다. 우리를 여기까지 이끈 결정에 대한 믿음을 가져야 하며, 이 선택한 길이 올바른 길이기를 바라야 합니다."
 DEN_bop_ban_all_political_uniforms: "£BoP_left_texticon 모든 정치적 제복 금지"
 DEN_bop_ban_all_political_uniforms_desc: "유럽 전역에서 마치 군사 퍼레이드처럼 정치적 제복을 입은 이들이 대열을 맞춰 행진하고 있습니다. 그리고 유럽 전역에서 정치적 불안과 불안정이 대륙을 혼란으로 몰아넣으며 전진하고 있습니다. 너무 늦기 전에 이러한 상황이 [ROOT.GetNameDef]에 도달하는 것을 막아야 합니다."
 DEN_bop_unban_oppositions_uniforms: "£BoP_left_texticon 야당의 정치적 제복 허용"
 DEN_bop_unban_oppositions_uniforms_desc: "우리의 지지자들이 군사 퍼레이드 참가자처럼 거리를 행진하는 동안 다른 정당의 정치적 제복 사용을 금지할 수는 없습니다. 우리는 이 검열을 해제해야 합니다."
 DEN_bop_defend_the_policy_of_neutrality: "£BoP_left_texticon 중립 정책 수호"
 DEN_bop_defend_the_policy_of_neutrality_desc: "중립은 우리에게 큰 도움이 되었습니다. 특히 유럽 전역에서 전투가 격렬했던 대전쟁 기간 동안 더욱 그러했습니다. 하지만 이곳, 덴마크에서는 아니었습니다. 우리는 구원받았고, 화를 면했습니다. 중립은 실로 우리에게 큰 도움이 되었습니다."
 DEN_bop_speak_out_in_favor_of_disarmament: "£BoP_left_texticon 군축 지지 발언"
 DEN_bop_speak_out_in_favor_of_disarmament_desc: "강대국에 둘러싸인 소국으로서, 우리는 침략군을 막아낼 희망이 없습니다. 그런데 왜 우리에게 전혀 도움이 되지 않으면서, 잠재적으로 훨씬 더 큰 이웃 국가들을 화나게 할 수 있는 국방에 돈을 써야 합니까?"
 DEN_bop_speak_out_against_warfare: "£BoP_left_texticon 군비 재증강 반대 발언"
 DEN_bop_speak_out_against_warfare_desc: "지금 재무장하는 것은 인근 강대국들에게 적대적인 행동으로 쉽게 비칠 수 있으므로 우리나라에 심각한 위험을 초래할 것입니다. 훨씬 강력한 군대에 맞서 스스로를 방어할 방법이 없으므로 지금 더 큰 이웃 국가를 화나게 하는 위험을 감수할 수 없습니다."
 DEN_bop_expand_the_welfare: "£BoP_left_texticon 복지 제도 확대"
 DEN_bop_expand_the_welfare_desc: "전쟁을 부추기고 우리 주변의 강대국 중 어느 한 곳의 맹공격도 견뎌낼 수 없는 국방에 돈을 낭비하는 대신, 우리는 급성장하는 복지 제도에 대한 지출을 늘려야 합니다!"
 DEN_bop_unban_all_political_uniforms: "£BoP_right_texticon 모든 정치적 제복 허용"
 DEN_bop_unban_all_political_uniforms_desc: "정치적 제복 금지는 국민의 권리를 축소시키므로 이를 유지할 수 없습니다!"
 DEN_bop_ban_oppositions_uniforms: "£BoP_right_texticon 야당의 정치적 제복 금지"
 DEN_bop_ban_oppositions_uniforms_desc: "우리는 정적들이 제복을 입고 과시하며 돌아다니는 것을 허용할 수 없습니다. 이는 불만과 불화를 퍼뜨릴 뿐입니다. 우리는 모든 정치적 제복을 금지해야 합니다. 물론 권력자들은 제외하고 말입니다."
 DEN_bop_defend_our_chosen_path_rearmament: "£BoP_right_texticon 우리가 선택한 길을 수호하라"
 DEN_bop_defend_our_chosen_path_rearmament_desc: "$DEN_bop_defend_our_chosen_path_neutrality_desc$"
 DEN_bop_criticize_our_preparedness: "£BoP_right_texticon 우리의 준비 태세 비판"
 DEN_bop_criticize_our_preparedness_desc: "유럽에 다시 한번 먹구름이 몰려오고 있으며, 우리는 다가오는 폭풍에 전혀 대비되어 있지 않습니다! 이 폭풍을 이겨내려면 가능한 한 빨리 준비를 시작해야 합니다."
 DEN_bop_question_our_defenses: "£BoP_right_texticon 우리의 국방력에 의문 제기"
 DEN_bop_question_our_defenses_desc: "오랫동안 유지해 온 중립 정책은 덴마크의 모든 방어 수단을 박탈했습니다! 만약 우리가 외세의 공격을 받는다면, 지금 당장 그들이 København으로 곧장 진군하는 것을 막을 수 있는 것은 아무것도 없을 것입니다. 우리가 국가로서 살아남으려면 국방을 돌봐야 합니다!"
 DEN_bop_speak_out_against_welfare: "£BoP_right_texticon 복지 제도 반대 발언"
 DEN_bop_speak_out_against_welfare_desc: "다른 어떤 것에 돈을 쓰기 전에, 우리는 먼저 독립을 확보하기 위해 국방을 돌봐야 합니다. 덴마크라는 국가가 없다면 그 돈을 쓸 덴마크인도 없다는 것은 당연한 이치입니다."
 DEN_bop_speak_out_in_favor_of_rearmament: "£BoP_right_texticon 재무장 지지 발언"
 DEN_bop_speak_out_in_favor_of_rearmament_desc: "유럽의 나머지 국가들이 군비 경쟁을 벌이고 불확실한 시대가 눈앞에 놓여 있을 때, 우리는 가만히 앉아 있을 수만은 없습니다. 우리는 국방을 준비하고 가능한 한 빨리, 가급적이면 어제라도 재무장을 시작해야 합니다!"
 DEN_bop_landstorm: "£BoP_right_texticon 란트슈투름 재창설"
 DEN_bop_landstorm_desc: "우리 주변에서 소란이 일어나고 있는 지금이야말로 우리 영토를 방어하기 위해 란트슈투름을 복원할 때입니다. 비록 최상의 질은 아니지만, 이 부대들은 최후의 방어선이 될 수 있습니다."
 DEN_bop_hold_a_military_parade: "£BoP_right_texticon 군사 퍼레이드 개최"
 DEN_bop_hold_a_military_parade_desc: "열병식을 개최하여 [ROOT.GetNameDef] 방어 능력에 대한 국민의 신념을 고취할 것입니다. 우리 군의 동기를 목도하는 것은 분명 국민의 사기와 결의를 강화할 것입니다."
 #OCCUPATION BOP
 DEN_bop_occupation_criticize_collaboration: "£BoP_right_texticon 협력 정책 비판"
 DEN_bop_occupation_criticize_collaboration_desc: "[ROOT.GetNameDef]와(과) [?DEN.DEN_overlord_nation.GetNameDef] 사이의 이 불명예스러운 항복과 불경한 협력은 종잇조각만도 못합니다!"
 DEN_bop_occupation_strikes: "£BoP_right_texticon 비밀리에 파업 조직"
 DEN_bop_occupation_strikes_decs: "지금 우리가 할 수 있는 최선은 전국적인 파업을 조직하여 [?DEN.DEN_overlord_nation.GetAdjective] 점령에 소극적으로 저항하는 것입니다."
 DEN_bop_occupation_resistance_coordination: "£BoP_right_texticon 저항 운동 조직"
 DEN_bop_occupation_resistance_coordination_desc: "자유를 되찾고 싶다면, 우리는 공동의 저항 운동으로 모여 같은 목표, 즉 [ROOT.GetNameDef]의 해방을 위해 싸워야 합니다."
 DEN_bop_occupation_underground_factories: "£BoP_right_texticon 지하 무기 공장"
 DEN_bop_occupation_underground_factories_desc: "주권을 되찾을 가능성을 높이려면, 적절한 무기 비축이 필요합니다. 자유를 위해 싸워야 할 날이 올 때 국민을 무장시킬 수 있도록 비밀 무기 공장을 건설해야 합니다."
 DEN_bop_occupation_raid_depots: "£BoP_right_texticon 무기 저장소 습격"
 DEN_bop_occupation_raid_depots_desc: "우리 국내 무기 공장은 [?DEN.DEN_overlord_nation.GetNameDef]의 전쟁에 사용될 무기를 생산하여 지원하고 있습니다. 무기 저장소를 습격하면 무기 공급을 감소시키는 동시에 우리 저항 운동을 강화할 것입니다."
 DEN_bop_occupation_sabotage_civ_industry: "£BoP_right_texticon 민간 산업 시설 파괴"
 DEN_bop_occupation_sabotage_civ_industry_desc: "우리 국내 공장과 산업 시설은 [?DEN.DEN_overlord_nation.GetNameDef]의 전쟁에 사용될 다양한 물자를 생산하여 지원하도록 강요받고 있습니다. 이 공장들을 파괴하면 물자 공급이 감소하여 독일의 전쟁 수행에 해를 끼칠 것입니다."
 DEN_bop_occupation_sabotage_mil_industry: "£BoP_right_texticon 군수 산업 시설 파괴"
 DEN_bop_occupation_sabotage_mil_industry_desc: "우리 국내 무기 공장은 [?DEN.DEN_overlord_nation.GetNameDef]의 전쟁에 사용될 무기를 생산하여 지원하고 있습니다. 이 공장들을 파괴하면 무기 공급이 감소하여 독일의 전쟁 수행에 해를 끼치는 동시에 잠재적 동맹국들을 도울 것입니다."
 DEN_bop_occupation_funnel_resources_danish_brigade: "£BoP_right_texticon 덴마크 여단에 자원 집중"
 DEN_bop_occupation_funnel_resources_danish_brigade_desc: "[?DEN.hosts_danish_brigades.GetNameDefCap]은(는) 때가 되면 [ROOT.GetNameDef]의 해방을 도울 덴마크 병력을 받아 훈련시키는 것을 흔쾌히 수락했습니다. 하지만 이 병력들이 우리 조국을 해방시키는 임무에서 성공할 최상의 기회를 보장하기 위해, 우리는 자금과 물자로 지원해야 합니다."
 DEN_bop_occupation_switch_ideology: "[?DEN.DEN_overlord_nation.GetRulingIdeologyNoun] 채택"
 DEN_bop_occupation_switch_ideology_desc: "진정으로 [?DEN.DEN_overlord_nation.GetNameDef]와(과) 협력하고 그들의 지지를 얻고 싶다면, 우리는 그들의 이념과 신념을 채택해야 합니다."
 DEN_bop_occupation_ban_elections: "£BoP_left_texticon 선거 금지"
 DEN_bop_occupation_ban_elections_desc: "자유 선거를 금지하여 [?DEN.DEN_overlord_nation.GetAdjective] 종주국을 달래야 합니다."
 DEN_bop_occupation_defend_collaboration: "£BoP_left_texticon 협력 정책 옹호"
 DEN_bop_occupation_defend_collaboration_desc: "[?DEN.DEN_overlord_nation.GetNameDef]에 항복하고 협력하는 것이 유일하게 올바른 선택이었습니다! 그 덕분에 우리는 상상할 수 없는 공포와 파괴를 면했습니다."
 DEN_bop_occupation_censor_the_media: "£BoP_left_texticon 언론 검열"
 DEN_bop_occupation_censor_the_media_desc: "이 위태로운 상황에서 언론이 [?DEN.DEN_overlord_nation.GetAdjective] 점령군을 공개적으로 비판하도록 내버려 둘 수 없습니다. 우리가 아직 가진 얼마 안 되는 자유마저 위태롭게 하지 않도록 그들이 출판할 수 있는 것을 제한해야 합니다."
 DEN_bop_occupation_remove_political_agitator: "£BoP_left_texticon 정치 선동가 제거"
 DEN_bop_occupation_remove_political_agitator_desc: "일부 저명한 정치인들은 우리 [?DEN.DEN_overlord_nation.GetAdjective] 종주국을 비판하는 것을 서슴지 않으며, 이는 양국 간의 긴장을 고조시킵니다. [?DEN.DEN_overlord_nation.GetNameDef]이(가) 강요하기 전에 이 문제아들을 정치적 직위에서 제거해야 합니다."
 DEN_bop_occupation_ban_communism: "£BoP_left_texticon 공산주의 금지"
 DEN_bop_occupation_ban_communism_desc: "우리 [?DEN.DEN_overlord_nation.GetAdjective] 종주국은 스스로를 공산주의 이념 자체와 전쟁 중이라고 여기며, 만약 우리가 국내의 모든 공산주의 조직을 금지한다면 우리의 지속적인 협력을 더욱 가치 있게 여길 것입니다."
 DEN_bop_occupation_allow_communism: "£BoP_left_texticon 공산주의 허용"
 DEN_bop_occupation_allow_communism_desc: "우리의 공산주의 종주국은 우리가 [ROOT.GetNameDef]에서 그들의 이념을 금지했다는 사실을 좋게 보지 않습니다. 공산주의를 다시 허용하는 것이 우리에게 최선일 것입니다."
 DEN_bop_occupation_ban_fascism: "£BoP_left_texticon 파시즘 금지"
 DEN_bop_occupation_ban_fascism_desc: "우리의 [?DEN.DEN_overlord_nation.GetAdjective] 종주국은 자신들이 파시스트 이념 자체와 전쟁 중이라고 여기며, 우리가 국내의 모든 파시스트 조직을 금지한다면 우리의 지속적인 협력을 더욱 높이 평가할 것입니다."
 DEN_bop_occupation_allow_fascism: "£BoP_left_texticon 파시즘 허용"
 DEN_bop_occupation_allow_fascism_desc: "우리의 파시스트 종주국은 우리가 [ROOT.GetNameDef]에서 그들의 이념을 금지했다는 사실을 좋게 보지 않습니다. 파시즘을 다시 허용하는 것이 우리에게 최선일 것입니다."
 DEN_bop_occupation_allow_democratism: "£BoP_left_texticon 민주 정당 허용"
 DEN_bop_occupation_allow_democratism_desc: "주기적인 선거를 치르는 것은 시민과 국가 간의 신뢰의 표시이자 국력의 상징입니다. 민주적인 선거를 허용하지 않는 것은 국가의 수치입니다."
 #RESISTANCE
 DEN_resistance_category: "덴마크 저항 운동"
 DEN_resistance_category_desc: "우리는 점령군에 저항하여 자유를 되찾아야 합니다! 이는 공동의 노력과 해방된 [ROOT.GetNameDef]라는 공동의 목표를 향해 꾸준히 나아갈 때만 달성할 수 있습니다."
