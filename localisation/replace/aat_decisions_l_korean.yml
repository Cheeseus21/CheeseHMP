 FIN_balance_of_power_category: "$FIN_power_balance$"
 FIN_motti_tactics_category: "모티 전술"
 FIN_motti_tactics_category_desc: "모티 전략은 적 부대를 포위하고 고립시켜 병참 및 통신선을 무력화하는 것입니다. \n이 접근법을 실행하려면 전장에서의 효과를 보장하기 위해 방위군의 신중한 계획과 훈련이 필요하며, 이를 통해 적의 허를 찌르고 예상치 못한 곳을 타격할 수 있을 것입니다."
