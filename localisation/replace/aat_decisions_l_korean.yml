 FIN_national_defense_category: "국가 방위"
 FIN_national_defense_category_desc: "[ROOT.GetAdjective] 영토와 독립의 수호는 최우선 과제입니다. 우리는 어떠한 외부 위협으로부터도 우리 국민을 방어하기 위해 모든 조치를 취할 준비가 되어 있어야 합니다."
 FIN_set_up_weapon_caches_in_state: "[FROM.GetName]에 무기 은닉처 설치"
 FIN_set_up_weapon_caches_in_state_desc: "비밀 군사 작전의 일환으로, 대량의 [ROOT.GetAdjective] 육군 무기와 장비가 [FROM.GetName] 곳곳의 은닉처에 숨겨질 것입니다. 이를 통해 [ROOT.GetAdjective] 저항군 세력이 침략자에 맞서 계속 싸울 수 있게 될 것입니다."
