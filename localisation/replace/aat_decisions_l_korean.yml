l_korean:

  #### ICELAND ####
  ICE_drilling_for_oil_off_shore: "해상 석유 및 가스 시추"
  ICE_drilling_for_oil_off_shore_repeat_tt: "이 결정은 §Y180§!일 후에 다시 내릴 수 있습니다"
  no_more_oil_tt: "§R더 이상 석유를 찾을 수 없습니다§!"
  no_more_oil_flag: "유전이 고갈되었습니다"

  ICE_improve_the_viking_spirit: "선조 숭배"
  ICE_already_improving_the_viking_spirit_flag: "이미 바이킹 정신을 고양하고 있습니다"

  ICE_a_new_yggdrasill: "현대의 위그드라실"
  ICE_a_new_yggdrasill_desc: "이제 국민들이 위대한 선조에 대해 알게 되었으니, 우리는 위대한 사업을 건설하고 아이슬란드 섬을 개선하여 전설 속 미드가르드와 위그드라실에 버금가도록 노력해야 합니다!"
  ICE_has_best_spirit_idea: "우리는 선조를 완전히 숭배했습니다"

  ICE_the_wisdom_of_odin: "오딘의 지혜"
  ICE_the_wisdom_of_odin_desc: "오딘은 지혜, 치유, 죽음, 왕권, 교수대, 지식, 전쟁, 전투, 승리, 마법, 시, 광기에서 룬 문자에 이르기까지 모든 것과 관련된 신입니다. 그는 미미스브룬느의 물을 마시기 위해 자신의 눈을 바쳤을 때 엄청난 지혜를 얻었고, 그로 인해 현재, 미래, 과거에 대한 무한한 지식을 얻을 수 있었습니다. 우리는 그의 정신을 구현하고 그의 유산을 미래로 이어가도록 노력해야 합니다!"

  ICE_the_might_of_thor: "토르의 힘"
  ICE_the_might_of_thor_desc: "토르는 천둥, 힘, 인류 보호의 신입니다. 그는 망치 묠니르를 휘둘러 구름을 쳐서 폭풍을 일으켰으며, 우리 군대도 적들에게 그와 같은 천둥과 공포를 안겨줄 것입니다!"

  ICE_the_guidance_of_aegir_and_ran: "에게르와 란의 인도"
  ICE_the_guidance_of_aegir_and_ran_desc: "바다의 의인화인 란과 그녀의 거인 남편 에게르의 인도 아래, 우리 함선은 북해의 패권을 장악할 것입니다."

  ICE_the_ferocity_of_the_fenrir: "펜리르술프의 흉포함"
  ICE_the_ferocity_of_the_fenrir_desc: "펜리르술프는 헬, 세계 뱀과 함께 로키와 거인 앙그르보다의 자식입니다. 라그나로크 동안 오딘을 죽이기로 되어 있었지만, 그 엄청난 힘과 흉포함에도 불구하고 실패했습니다. 우리 병사들은 전장에서 적의 육체와 정신을 모두 무찌르기 위해 그 정수를 구현해야 합니다."

  ICE_the_fertility_of_freya: "프레이야의 풍요"
  ICE_the_fertility_of_freya_desc: "프레이야는 사랑, 아름다움, 풍요의 여신입니다. 우리는 그녀의 이름을 불러 우리 국민이 언젠가 위대한 전사로 성장할 아이들을 낳도록 해야 합니다."

  ICE_a_monument_to_leif: "레이퓌르 에이릭손 기념비 건립"
  ICE_a_monument_to_leif_desc: "크리스토퍼 콜럼버스가 아메리카를 발견한 최초의 유럽인이라는 남부인들의 흔한 미신과는 달리, 우리의 위대한 선조 레이퓌르 에이릭손이야말로 의심할 여지 없이 실질적인 최초의 발견자입니다. 그의 기억을 기리고 우리가 그 땅을 정복함에 따라, 빈란드에 그를 위한 기념비를 세워야 합니다."

 ICE_infiltrate_the_british_isles_category: "브리튼 제도 침투"
 ICE_infiltrate_the_british_isles_category_desc: "노동자 혁명은 확산되어야 합니다. 브리튼 제도의 억압받는 노동자들이 완벽한 시작점입니다. 반제국주의와 반자본주의 정서를 최대한 활용할 수 있으며, 또 그래야만 합니다."

 ICE_incite_communist_uprising_scotland: "스코틀랜드에서 봉기 선동"
 ICE_incite_communist_uprising_scotland_desc: "약간의 압력을 가하면, 스코틀랜드 노동자들이 [121.GetCapitalVictoryPointName]에서 봉기하여 [121.owner.capital.GetCapitalVictoryPointName]의 정부로부터 독립을 선언하도록 만들 수 있을 것입니다."
 ICE_uprising_scotland_tt: "§Y[121.owner.GetName]§!: [121.owner.GetCommunistParty] 지지율 [?ICE.communism_support_needed|%Y0] 초과"
 ICE_incite_communist_uprising_scotland_tt: "§Y[SCO.GetName]§!이(가) [121.GetName]에서 §Y[121.owner.GetName]§!에 맞서 독립 전쟁을 시작합니다"

 ICE_incite_communist_uprising_wales: "웨일스에서 봉기 선동"
 ICE_incite_communist_uprising_wales_desc: "약간의 압력을 가하면, 웨일스 노동자들이 [122.GetCapitalVictoryPointName]에서 봉기하여 [122.owner.capital.GetCapitalVictoryPointName]의 정부로부터 독립을 선언하도록 만들 수 있을 것입니다."
 ICE_uprising_wales_tt: "§Y[122.owner.GetName]§!: [122.owner.GetCommunistParty] 지지율 [?ICE.communism_support_needed|%Y0] 초과"
 ICE_incite_communist_uprising_wales_tt: "§Y[WLS.GetName]§!이(가) [122.GetName]에서 §Y[122.owner.GetName]§!에 맞서 독립 전쟁을 시작합니다"

 ICE_incite_communist_uprising_ni: "북아일랜드에서 봉기 선동"
 ICE_incite_communist_uprising_ni_desc: "약간의 압력을 가하면, 북아일랜드 노동자들이 [119.GetCapitalVictoryPointName]에서 봉기하여 [119.owner.capital.GetCapitalVictoryPointName]의 정부로부터 독립을 선언하도록 만들 수 있을 것입니다."
 ICE_uprising_ni_tt: "§Y[119.owner.GetName]§!: [119.owner.GetCommunistParty] 지지율 [?ICE.communism_support_needed|%Y0] 초과"
 ICE_incite_communist_uprising_ni_tt: "§Y[WLS.GetName]§!이(가) [119.GetName]에서 §Y[119.owner.GetName]§!에 맞서 독립 전쟁을 시작합니다"
   
  # NORWAY
  NOR_democratic_preparation_decisions_category: "국가 건설"
  NOR_democratic_preparation_decisions_category_desc: "우리의 신생 국가는 세계와 경쟁하고자 한다면 따라잡아야 할 것이 많습니다. 수십 년간의 방치와 대공황의 여파로 우리 산업은 비참한 상태에 놓여 있으며, 이를 바로잡기 위해서는 공동의 노력이 필요합니다.\n\n불행히도 이는 군사적 준비 태세와 방위 능력을 희생시키는 대가를 치를 것이지만, 우리는 완전하고 비무장적인 중립 정책이 우리의 선의를 보여주고 어떤 적이라도 우리 영토를 안전하게 간과하도록 만들 것이라 믿습니다. \n\n\n[NOR.GetName]의 총 개발도: [?NOR.NOR_country_preparedness]/30"
  NOR_historical_deploy_prep_decisions_category: "폭풍에 대비하라"
  NOR_historical_deploy_prep_decisions_category_desc: "최선의 노력에도 불구하고, 전쟁이 우리 해안에 도달했습니다. 지금까지 우리는 국토의 산업, 경제, 기반 시설을 개발하는 데 에너지를 집중해 왔지만, 이제는 이를 [NOR.GetNameDef]의 방어를 위해 활용할 방법을 찾는 것이 시급합니다.\n\n\n[NOR.GetName]의 잠재적 준비도: [?NOR.NOR_country_preparedness]/30"
  NOR_allied_democratic_preparation_decisions_category: "노르웨이의 전쟁 준비"
  NOR_allied_democratic_preparation_decisions_category_desc: "우리 정부는 적들이 언제라도 공격해 올 것이라 확신합니다. 우리는 침공을 막기 위해 [NOR.GetName] 국민을 무장시키려는 열의에 단호해야 합니다. 설령 그것이 선제공격을 의미하더라도 말입니다. 그러니 국가를 결집하여, 적에 대한 결정적인 승리를 위해 필요한 힘을 얻읍시다.\n\n국가 준비도: [?NOR.NOR_country_preparedness]/30"
  NOR_allied_democratic_deploy_prep_decisions_category: "전쟁 준비 태세 전개"
  NOR_allied_democratic_deploy_prep_decisions_category_desc: "예상대로 마침내 전쟁이 닥쳤지만, 두려워할 것은 없습니다. 지난 몇 년간 우리는 적들이 어떤 공격을 가하든 [ROOT.GetName]이(가) 대비할 수 있도록 모든 노력을 기울여 왔습니다. 우리의 본때를 보여줍시다.\n\n국가 준비도: [?NOR.NOR_country_preparedness]/30"
  NOR_prepare_state_alt_dem: "[FROM.GetName] 전쟁 준비"
  NOR_prepare_state_alt_dem_desc: "다가올 일에 대해 우리는 비참할 정도로 준비가 되어있지 않습니다. 전쟁이 발발하면 [FROM.GetName]이(가) 전쟁에 기여할 수 있도록 적절한 조치를 취해야 합니다. 일부는 이해하지 못하겠지만, 우리는 선택을 내렸습니다. 되돌릴 수는 없습니다."
  NOR_alt_dem_naval_expansion: "해군 확장"
  NOR_alt_dem_naval_expansion_desc: "해군 발전은 필수적입니다. 이는 침략자로부터 우리의 거대한 해안선을 방어하는 것을 의미할 뿐만 아니라, 적의 본토로 전선을 옮기는 발판으로 사용될 수 있기 때문입니다."
  NOR_alt_dem_military_industry_expansion: "군수 산업 확장"
  NOR_alt_dem_military_industry_expansion_desc: "다른 국가의 장비 제공에 의존할 수는 없습니다. 결국 오늘의 전쟁 상인은 내일의 전쟁 적이 될 수 있습니다. 우리는 전투에 필요한 군수물자를 생산하기 위해 산업 생산력을 확장해야 합니다."
  NOR_alt_dem_economic_relief_measures: "경제 구호 조치"
  NOR_alt_dem_economic_relief_measures_desc: "국민들이 우리의 군비 증강에 지쳐가고 있습니다. 그들은 우리가 보는 것을 보지 못할 수도 있고, 승리를 확보하기 위해 전쟁 기계가 묵묵히 나아가야 하므로 그들의 희생이 필요하다는 것을 모를 수도 있습니다. 상관없습니다. 지금은 그들의 요구를 달래줄 것입니다."
  NOR_alt_dem_expedite_training: "훈련 가속화"
  NOR_alt_dem_expedite_training_desc: "우리는 끔찍한 상황에 처해 있습니다. 곧바로 신병을 훈련하지 않으면 우리 모두 파멸할지도 모릅니다."
  NOR_alt_dem_prioritize_production: "생산 우선"
  NOR_alt_dem_prioritize_production_desc: "우리의 전쟁 기계는 장비가 필요하며, 지금 당장 필요합니다! 어떤 대가를 치르더라도 우리의 용감한 병사들이 적을 물리칠 수단을 갖도록, 공장들이 쉴 새 없이 돌아가게 하십시오."
  NOR_alt_dem_offensive_push: "공세 추진"
  NOR_alt_dem_offensive_push_desc: "다른 모든 것은 제쳐두고, 공격할 때입니다. 전진하여 적들이 무엇에 당했는지 알기 전에 분쇄합시다."
  NOR_alt_dem_focus_on_defense: "방어 집중"
  NOR_alt_dem_focus_on_defense_desc: "아주 최근까지 [NOR.GetName]은(는) 평화로운 비무장 국가였기에, 우리는 전력을 너무 넓게 분산시켰습니다. 당분간은 우리가 가진 것을 방어하는 데 집중해야 합니다."
  NOR_alt_dem_modernize_armed_forces_decision: "$NOR_modernize_armed_forces_decision$"
  NOR_alt_dem_modernize_armed_forces_decision_desc: "$NOR_modernize_armed_forces_decision_desc$"
  NOR_fascist_preparation_decisions_category: "그림자 속에 숨어"
  NOR_fascist_preparation_decisions_category_desc: "국민 협동당은 역사적으로 [NOR.GetAdjective] 사회에서 매우 제한적인 지지를 받았습니다. 그렇기에 전국을 돌며 전도하고 지지 기반을 구축하는 것이 중요합니다.\n\n파시즘의 씨앗을 심음으로써, 적절한 기회가 왔을 때 우리는 계획의 결실을 거두고 [ROOT.GetName]을(를) 장악할 수 있을 것입니다.\n\n\n[NOR.GetName]의 국민 협동당 총 지지: [?NOR.NOR_country_preparedness]/30"
  NOR_fascist_deploy_prep_decisions_category: "그림자 속에서 일어나"
  NOR_fascist_deploy_prep_decisions_category_desc: "숨을 시간은 끝났습니다. 우리는 [NOR.GetName]을(를) 장악하기에 충분한 지지를 모았습니다. 이제 우리는 조국의 각 영토에 준비 태세를 배치해야 합니다.\n\n우리는 밑바닥부터 지지를 구축했으며, 우리의 위대한 총통의 명령에 따라 각 영토를 장악하고 비겁한 민주주의 세력에 맞설 준비가 된 세포조직을 심었습니다."
  NOR_communist_preparation_decisions_category: "프롤레타리아를 각성시켜라"
  NOR_communist_preparation_decisions_category_desc: "[GetRousingProletariatDesc]"
  NOR_communist_preparation_decisions_category_desc_stalinist: "[ROOT.GetName]의 인민들은 너무 오랫동안 눈을 감고 있었습니다. 이제 마침내 [SOU.GetNameDef]에 있는 우리 형제자매들의 부름에 귀를 기울일 때입니다.\n\n그들을 본보기로 삼아, [ROOT.GetName]이(가) 생산 수단을 장악하고 하나의 깃발과 지도자 아래 단결하면 무엇을 이룰 수 있는지 보여주고, 그들을 이끌어 오슬로의 폭정에 맞서 싸우게 할 것입니다.$NOR_revolution_support_counter$"
  NOR_communist_preparation_decisions_category_desc_trostkyist: "이제 [NOR.GetName]의 인민들이 마르크스와 트로츠키의 가르침에 귀를 기울이고, 우리나라를 스칸디나비아 공산주의의 선봉으로 만들 피할 수 없는 충돌에 대비할 때입니다.\n\n영구혁명의 불과 유황을 받아들이고, 오슬로에 자리 잡은 자본주의 세력에 맞서 국가를 단결시킵시다.$NOR_revolution_support_counter$"
  NOR_communist_preparation_decisions_category_desc_other: "혁명은 지주나 산업가를 위해 평생을 힘들게 일하는 대중, 즉 아래로부터 시작되어야 합니다.\n\n우리의 많은 프롤레타리아 형제자매들은 자신들이 가진 힘을 알지 못하므로, 우리는 나아가 프롤레타리아를 각성시켜 그들이 오슬로에 맞서 단결하여 한 번에 한 주씩 자본주의의 족쇄를 무너뜨릴 수 있도록 해야 합니다.$NOR_revolution_support_counter$"
  NOR_revolution_support_counter: "\n\n\n우리 혁명에 대한 총 지지:  [?NOR.NOR_country_preparedness]/[?NOR.NOR_comm_prep_max_preparedness]"
  NOR_monarchist_preparation_decisions_category: "호콘 국왕의 통치에 대한 우리의 지지를 보여주자"
  NOR_monarchist_preparation_decisions_category_desc: "왕위에 오르기 전부터, 우리의 겸손한 호콘 7세 국왕께서는 자신의 권한을 의회(스토르팅)와 그 구성원들에게 위임해 오셨습니다. 당시에는 그것이 좋았지만, 통제할 것이 아무것도 남지 않기 전에 우리는 그분께서 [ROOT.GetName]을(를) 직접 통제하는 것을 지지한다는 것을 보여드려야 합니다.\n\n\n군주정에 대한 총 지지:  [?NOR.NOR_country_preparedness]/30"
  NOR_prepare_state_historical: "[?FROM.GetName] 개발"
  NOR_prepare_state_historical_desc: "우리의 산업 기반은 폐허가 되었지만, [ROOT.GetName] 국민들의 상황을 개선하고 최악의 상황이 닥쳤을 때 생존 가능성을 높이기 위해 필요한 노력을 기꺼이 투입할 것입니다."
  NOR_prepare_historical_unlock_TT: "§Y주 개발§! 디시전을 잠금 해제합니다. 이 디시전은 §G민간 건설§! 속도를 높이지만 §R군사 건설 및 방어§!에 불이익을 줍니다."
  NOR_prepare_fascist_unlock_TT: "§Y주에서 지지 기반 구축§! 디시전을 잠금 해제합니다. 이 디시전은 §G파시즘 지지도를 증가시키고§! 내전이 시작될 때 §G영토와 이점§!을 제공하지만, §R민간 산업§!에 불이익을 줍니다."
  NOR_prepare_communist_unlock_TT: "§Y주에서 프롤레타리아 선동§!을 잠금 해제합니다. 이는 공산주의 혁명이 시작될 때 §G영토와 병력§!을 제공하지만, 해당 주의 §R건물을 손상§!시킵니다."
  NOR_deploy_state_preparation_historical: "[get_deploy_prep_decision_name]"
  NOR_decision_defend_state_title: "[FROM.GetName] 방어"
  NOR_decision_emergency_production_title: "[FROM.GetName] 비상 생산"
  NOR_decision_deploy_emergency_militias_title: "[FROM.GetName]에 민병대 배치"
  NOR_dem_his_integrate_militias: "민병대 통합"
  NOR_dem_his_integrate_militias_desc: "민병대를 구성한 이들이 자신들의 기개를 증명했으니, 이제 이들을 정규 대대 및 사단으로 편성하여 군에 더 효과적으로 통합할 수 있습니다."
  NOR_alt_dem_integrate_militias: "$NOR_dem_his_integrate_militias$"
  NOR_alt_dem_integrate_militias_desc: "$NOR_dem_his_integrate_militias_desc$"
  NOR_prepare_exile: "망명 준비"
  NOR_prepare_exile_desc: "현실은 부정할 수 없습니다. 우리나라는 영원히 적을 막아낼 수 없지만, 훗날을 도모하기 위해 최대한 많은 것을 국외로 빼낼 수 있을 만큼은 충분히 오래 방어할 수 있습니다."
  NOR_focus_on_training: "훈련 집중"
  NOR_focus_on_training_desc: "예비군과 신병을 병사로 양성하여 최대한 빨리 전선에 투입하는 데 모든 노력을 쏟아야 합니다. 전선이 더 이상 오래 버티지 못할 수도 있기 때문입니다."
  NOR_modernize_armed_forces_decision: "군 현대화"
  NOR_modernize_armed_forces_decision_desc: "[ROOT.GetAdjective] 군은 오랫동안 방치되어 왔습니다. 우리 군은 전장보다는 박물관에 더 어울릴 지경입니다."
  NOR_move_government_headquarters_decision: "정부를 [FROM.GetName](으)로 이전"
  NOR_move_government_headquarters_decision_desc: "만약 우리 정부가 적의 손에 넘어간다면, 이는 우리와 국왕, 그리고 왕자의 종말을 확정짓는 일이 될 것입니다. 유일한 선택지는 계속 이동하며 피할 수 없는 운명을 최대한 늦추는 것뿐입니다."
  NOR_expedite_training: "신속 훈련"
  NOR_expedite_training_desc: "병력을 최선을 다해 훈련시키는 것은 우리의 생존에 필수적이지만, 훈련을 마쳤을 때 지켜야 할 [NOR.GetName]이 남아있지 않다면 모든 것이 수포로 돌아갈 것입니다. 우리는 국토에서 밀려나기 전에 최대한 빨리 밀어붙여야 합니다."
  NOR_public_investment_drive: "공공 투자 유치"
  NOR_public_investment_drive_desc: "[ROOT.GetName]에는 해야 할 일이 많으며, 공공 부문의 직접적인 투자 없이는 이뤄지지 않을 것으로 보입니다. 전국에 기반 시설 및 건설 프로젝트를 쏟아부읍시다."
  NOR_naval_expanion: "해군 확장"
  NOR_naval_expanion_desc: "생존하려면 해안선을 방어해야 하며, 이를 위해서는 함선이 필요합니다. 모든 피오르를 조선소로 만들어야 합니다."
  NOR_prepare_state_fascist: "[FROM.GetName]에서 지지 기반 구축"
  NOR_deploy_state_preparation_fascist: "[get_deploy_prep_decision_name_fascist]"
  NOR_invite_fascist_to_invade: "[GER.GetNameDef]에게 [NOR.GetNonIdeologyName] 침공 요청"
  NOR_decision_take_over_state_title: "[FROM.GetName] 장악"
  NOR_decision_industrial_takeover_title: "[FROM.GetName] 산업 장악"
  NOR_decision_military_takeover_title: "[FROM.GetName] 군사 장악"
  NOR_prepare_state_communist: "[FROM.GetName]의 프롤레타리아를 규합하라"
  NOR_prepare_state_communist_desc: "[FROM.GetName]의 인민은 너무 오랫동안 잠든 채 착취당해 왔습니다. 우리 혁명의 씨앗을 심어 그들을 일깨웁시다."
  NOR_communist_propaganda_campaign: "공산주의 선전 활동"
  NOR_prepare_state_monarchist: "[FROM.GetName]에서 왕당파 시위"
  NOR_prepare_state_monarchist_desc: "[FROM.GetName]의 인민에게 1905년 선거와 왜 압도적으로 국왕을 선출했는지 상기시켜야 합니다. 머지않아 그들은 국왕의 직접적인 개입을 요구하게 될 것입니다."
  NOR_prop_up_the_economy: "경제 부양"
  NOR_prop_up_the_economy_desc: "인민이 굶주린다면 우리의 정치적 목표를 달성할 수 없습니다. 왕정복고 운동을 잠시 멈추고 신민과 그들의 필요를 돌봐야 합니다."
  NOR_make_assurances_to_the_people: "[NOR.GetNonIdeologyName] 인민 안심시키기"
  NOR_make_assurances_to_the_people_desc: "[NOR.GetName]에 분명 두려운 시기가 닥쳤으니, 언론을 통해 우리가 이겨낼 것이라고 안심시켜야 합니다. 그리고 이 위기를 넘어서면, 자비로우신 국왕께서 우리의 생존을 위한 싸움을 이끄실 것입니다."
  NOR_promote_the_armed_defense_of_the_country: "[NOR.GetName]의 무장 방어 촉진"
  NOR_promote_the_armed_defense_of_the_country_desc: "[NOR.GetName]의 인민에게 조국을 지키지 않으면 어떤 일이 벌어질지 상기시켜야 합니다. 다가오는 분쟁에서 모두가 각자의 역할을 다해야 합니다."
  NOR_exile_decisions_category: "[ROOT.GetName] 정부의 망명"
  NOR_exile_decisions_category_desc: "우리는 가장 끔찍한 상황에 처해 있습니다. 적에게 국토를 빼앗긴 후, 망명 생활을 할 수밖에 없었습니다. 적어도 우리를 친절히 맞아준 주최국에 감사할 수 있으며, 언젠가 그들의 도움으로 사랑하는 [NOR.GetNonIdeologyName]에 다시 돌아갈 수 있기를 바랍니다."
  NOR_request_reinstatement: "[FROM.GetNameDef]에 복위 요청"
  NOR_request_reinstatement_desc: "적이 [NOR.GetName]에서 세력을 잃고 있으니, 이제 우리 정부가 다시 정당한 자리를 되찾을 때가 되었다고 생각합니다."
  NOR_lobby_for_parliamentary_support: "[FROM.GetAdjective] 정부의 지지를 얻기 위한 로비"
  NOR_lobby_for_parliamentary_support_desc: "주최국은 지금까지 매우 관대했지만, 우리 인민이 겪고 있는 일을 상기시켜 우리에게 무엇이 걸려 있는지 잊지 않도록 해야 할 것입니다."
  NOR_bring_soldiers_from_norway: "[NOR.GetNonIdeologyName]에서 병력 소집"
  NOR_bring_soldiers_from_norway_desc: "조국을 지키기 위해 싸웠던 많은 이들이 여전히 고국에 갇혀 있습니다. 우리는 그들 중 일부와, 아직 싸우지는 않았지만 이곳에서 조국을 되찾고 싶어 하는 다른 이들을 데려오기 위해 노력할 수 있습니다."
  NOR_weapons_for_the_resistance: "무기 조달 및 분배"
  NOR_weapons_for_the_resistance_desc: "우리의 방대한 상선을 활용하여 이곳에서의 활동과 고국의 저항군을 위한 무기를 조달할 수 있습니다. 고국의 무기는 [NOR.GetNonIdeologyName]에 대한 적의 장악력을 약화시킬 것이고, 이곳의 무기는 그들의 폭정에 최후의 일격을 가할 것입니다."
  NOR_unity_parade: "[FROM.Capital.GetCapitalVictoryPointName]에서 단결의 행진"
  NOR_unity_parade_desc: "[FROM.Capital.GetCapitalVictoryPointName]의 거리를 우리의 목소리로 가득 채워, 우리의 투쟁과 그들의 투쟁이 하나임을 저 위대한 도시의 사람들에게 상기시킵시다."
  NOR_joint_training_exercise: "[FROM.GetNameDef]와 합동 훈련"
  NOR_joint_training_exercise_desc: "승리를 거두려면 우리 군은 [FROM.GetNameDef]의 군대와 하나가 되어야 합니다. 이는 동맹국과의 훈련과 긴밀한 협력을 통해서만 가능합니다."
  NOR_expand_industrial_capacity: "산업 역량에 투자"
  NOR_expand_industrial_capacity_desc: "우리는 망명 중일지 모르지만 무력하다는 의미는 아닙니다. 우리는 세계에서 가장 큰 상선단 중 하나를 마음대로 사용할 수 있으며, 이를 이용해 고국을 되찾기 위한 노력에 필요한 산업 역량을 조달할 수 있습니다."
  NOR_foment_resistance_in_state: "[FROM.GetName]에서 저항 조장"
  NOR_foment_resistance_in_state_desc: "[FROM.GetName]의 주민들은 내면에 저항 정신을 품고 있으며, 우리의 적에게 맞서 싸우고 있습니다! 결정적인 결과를 내려면 추가적인 자극이 필요할 뿐입니다."
  NOR_support_rebellion: "[FROM.GetName]에서 반란 지원"
  NOR_support_rebellion_desc: "[FROM.GetName]에서의 저항 활동이 결실을 맺었습니다. 그곳의 주민들은 압제자들에 맞서 행동할 준비가 되었습니다. 그들이 싸움을 시작하게 하고, 그들이 행동에 나서자마자 우리는 고향으로 돌아가 싸울 준비를 마칠 것입니다."


