 FIN_pressure_government_cd_tt:0 "\n국가 정부 압박은 §Y[?FIN_pressure_government_cd]§!일마다 한 번만 가능합니다."
 FIN_coup_preparations: "쿠데타 준비"
 FIN_coup_preparations_desc: "쿠데타가 성공하도록 보장하기 위해 우리가 할 수 있는 모든 것을 먼저 하지 않는다면 쿠데타는 성공할 수 없습니다. 준비는 성공에 필수적인 요소입니다."
 FIN_appeal_to_the_middle_class: "중산층에 호소"
 FIN_appeal_to_the_middle_class_desc: "핀란드 우익 단체에 대한 주요 지지는 중산층으로부터 나옵니다. 우리는 부유한 농부, 교육받은 부르주아, 공무원, 성직자, 대학생들에게 우리 운동에 동참하고 인구 사이에 우리의 원칙과 이념을 전파하도록 호소해야 합니다."
 FIN_appeal_to_the_middle_class_dec_tt: "우리 측이 전체 영토와 군사 부대의 §G+10%§!를 획득합니다."
 FIN_secure_the_military: "군부 확보"
 FIN_secure_the_military_desc: "역사가 증명했듯이, 군은 언제나 신생 쿠데타 주도자에게 유용한 동맹입니다. 따라서 쿠데타를 시도하기 전에 그들의 지지를 확보하는 것이 중요합니다."
 FIN_secure_the_military_dec_tt: "우리 측이 전체 영토와 군사 부대의 §G+10%§!를 획득하고 모든 군 지휘관을 유지합니다."
 FIN_purchase_german_equipment: "독일 장비 구매"
 FIN_purchase_german_equipment_desc: "독일은 창고에서 썩고 있는 대량의 장비를 보유하고 있습니다. 우리가 그들의 유용한 친구가 될 수 있으므로, 그 일부를 달라고 요청해야 합니다."
 FIN_the_last_kinship_war: "마지막 동족 전쟁"
 FIN_the_last_kinship_war_desc: "동족 전쟁(Heimosodat)의 정신을 되살렸으니, 이제 외세의 압제에서 우리 동족을 해방시키기 위한 준비를 시작할 수 있습니다."
 FIN_stir_anti_soviet_sentiment_in_karelia: "카렐리야에서 반소 감정 선동"
 FIN_stir_anti_soviet_sentiment_in_karelia_desc: "카렐리야에는 소비에트 정부의 정책에 동의하지 않는 사람들이 많으며, 이를 이용해 이 지역에서 분란을 일으킬 수 있습니다."
 FIN_instigate_a_new_karelian_uprising: "새로운 카렐리야 봉기 선동"
 FIN_instigate_a_new_karelian_uprising_desc: "동족 전쟁(Heimosodat)의 정신을 되살려, 새로운 카렐리야 봉기를 일으키고 카렐리야인들이 원하는 독립을 추구하도록 노력해야 합니다."
 FIN_finno_soviet_kinship_war: "핀란드-[ROOT.GetAdjective] 동족 전쟁"
 FIN_finno_soviet_kinship_war_desc: "러시아 내전 동안 핀란드인들은 동족 전쟁에 참여하여 우리 영토를 침범하고 땅을 빼앗아 갔으며, 이제 다시 똑같은 짓을 시작했습니다."
 FIN_crush_the_karelian_insurrection: "카렐리야 반란 진압"
 FIN_crush_the_karelian_insurrection_desc: "이제 지역주의자 카렐리야 반란을 진압하기에 충분한 무기와 병력을 모았습니다. 작전을 개시하십시오!"
 FIN_crush_the_karelian_insurrection_decision_cost_ie_cp_pp: "£infantry_equipment_text_icon  §Y1500§! £command_power  §Y30§! £pol_power  §Y70§!"
 FIN_crush_the_karelian_insurrection_decision_cost_ie_cp_pp_blocked: "£infantry_equipment_text_icon  §R1500§! £command_power  §R30§! £pol_power  §R70§!"
 FIN_crush_the_karelian_insurrection_decision_cost_ie_cp_pp_tooltip: "결정을 채택하는 데 £infantry_equipment_text_icon §Y1500§!, £command_power §Y30§!, £pol_power §Y70§!가 필요합니다"
 FIN_crush_the_karelian_insurrection_tt: "\n[FIN.GetFlag]§Y[FIN.GetNameDefCap]§!은(는) 더 이상 §G카렐리야 봉기를 일으킬 수 없게 됩니다§!.\n"

 FIN_confederated_finno_russian_republics_category: "핀-러시아 공화국 연방"
 FIN_confederated_finno_russian_republics_category_desc: "현재 또는 과거 러시아 공화국 및 영토였던 지역에는 핀인, 에스토니아인, 카렐리야인, 벱스인, 이조리아인, 보트인, 세토인, 버러인, 잉그리아인 등 수많은 핀족 계통 민족이 살고 있습니다. 우리는 이들 모두와 그 이상의 민족에게 호소할 수 있는 국가 연방을 수립해야 합니다."
 FIN_integrate_karelia_puppet: "[FROM.GetName]을(를) 공화국으로 통합"
 FIN_integrate_karelia_puppet_desc: "이제 카렐리야를 우리의 보호 아래 둘 새로운 공화국으로 수립할 때입니다."
 FIN_integrate_karelia_states: "[FROM.GetName]을(를) 카렐리야 공화국의 일부로 통합"
 FIN_integrate_karelia_states_desc: "카렐리야 공화국은 아직 카렐리야인이 거주하는 모든 땅을 아우르지 못하고 있습니다. [FROM.GetName]을(를) 통합함으로써 이 상황을 해결할 수 있을 것입니다."
 FIN_integrate_karelia_additional_states: "[FROM.GetName]을(를) 카렐리야 공화국에 추가"
 FIN_integrate_karelia_additional_states_desc: "카렐리야 공화국은 아직 카렐리야인이 거주하는 모든 땅을 아우르지 못하고 있습니다. [FROM.GetName]을(를) 통합함으로써 이 상황을 해결할 수 있을 것입니다."
 FIN_integrate_veps_states: "[FROM.GetName]을(를) 공화국으로 통합"
 FIN_integrate_veps_states_desc: "벱스 민족은 자신들만의 국가를 가져본 적이 없지만, 이제 우리가 그들에게 국가를 만들어 줄 때입니다."
 FIN_integrate_veps_additional_states: "[FROM.GetName]을(를) 공화국으로 통합"
 FIN_integrate_veps_additional_states_desc: "새로 수립된 벱스 공화국에 통합할 수 있는 지역이 더 있으며, [FROM.GetName]도 그중 하나입니다."
 FIN_integrate_ingria_states: "[FROM.GetName]을(를) 잉그리아 공화국으로 통합"
 FIN_integrate_ingria_states_desc: "새로 수립된 잉그리아 공화국에 통합할 수 있는 지역이 더 있으며, [FROM.GetName]도 그중 하나입니다."
 FIN_integrate_ingria_additional_states: "[FROM.GetName]을(를) 잉그리아 공화국에 추가"
 FIN_integrate_ingria_additional_states_desc: "새로 수립된 잉그리아 공화국에 통합할 수 있는 지역이 더 있으며, [FROM.GetName]도 그중 하나입니다."
 FIN_integrate_leningrad: "[FROM.GetName]을(를) 잉그리아 공화국의 수도로 지정"
 FIN_integrate_leningrad_desc: "[195.GetName]은(는) 러시아인이 다수일 수 있지만, 새로운 잉그리아 공화국을 위한 우리의 계획에 따르면 이는 별로 중요하지 않습니다."

 FIN_request_an_armistice_with_moscow: "모스크바에 휴전 요청"

 FIN_request_to_switch_sides_in_the_war: "평화를 대가로 진영 전환 제안"

