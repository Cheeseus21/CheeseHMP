ENG_explode_the_swedish_iron_ore_mine: "R 4 계획"
ENG_explode_the_swedish_iron_ore_mine_tt: "국내외의 분노가 들끓기 전에 철광산을 파괴 공작할 시간은 제한적입니다. 이를 성공시키지 못한다면 굴욕적인 군사적 패배를 의미할 것입니다."

 #NORTH SEA EMPIRE
 form_north_sea_category: "북해 제국 복원"
