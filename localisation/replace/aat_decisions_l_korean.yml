 #DECISIONS
 DEN_trade_deal_category: "덴마크 무역 협정"
 DEN_increase_trade_with_denmark: "[DEN.GetName]와(과)의 교역 증대"
 DEN_increase_trade_with_denmark_desc: "[DEN.GetName]와(과)의 기존 무역 협정을 확대할 경우, 막대한 이익을 얻을 수 있을 것으로 예상됩니다."
 DEN_cancel_trade_with_denmark: "[DEN.GetName]와(과)의 무역 협정 취소"
 DEN_cancel_trade_with_denmark_desc: "덴마크와의 무역 협정은 그 효용을 다했으며, 더는 유용하지 않습니다."
 DEN_cancel_trade_with_country: "무역 협정 취소"
 DEN_cancel_trade_with_country_desc: "본 무역 협정은 더 이상 유용하지 않다고 판단됩니다."
 DEN_military_category: "군사 행동"
 DEN_deploy_the_home_guard: "[FROM.GetName]에 향토 방위대 배치"
 DEN_remove_the_home_guard: "[FROM.GetName]의 향토 방위대 소환"
 DEN_deploy_landstormen: "[FROM.GetName]에 란트슈토르멘 배치"
 DEN_recall_landstormen: "모든 란트슈토르멘 민병대 소환"
 DEN_army_drills: "육군 훈련"
 DEN_navy_drills: "해군 훈련"
 DEN_air_drills: "공군 훈련"
 DEN_fortification_category: "요새화 작업"
 DEN_fortification_category_desc: "[ROOT.GetNameDef]의 미래를 보장하려면 최악의 사태에 대비하여 방비를 강화해야만 합니다. 오직 견고하고 난공불락의 요새선만이 우리를 지켜줄 것입니다."
 DEN_forts_in_sjaelland: "$STATE_37$에 요새 건설"
 DEN_forts_in_fyn: "$STATE_911$에 요새 건설"
