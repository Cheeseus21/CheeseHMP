 ship_armor_heavycruiser_1_desc: "Схема бронирования, призванная дать крейсеру небольшое преимущество в бою против устаревших и более легких классов крейсеров."
 ship_armor_heavycruiser_2_desc: "Утолщенный пояс, позволяющий крейсеру вести бой с другими крейсерами с хорошей степенью защиты."
 ship_armor_heavycruiser_3_desc: "Эта схема бронирования использует принципы, используемые в линкорах, и разработана в ответ на относительное увеличение мощности корабельных орудий."
 ship_armor_heavycruiser_4_desc: "В этой схеме бронирования элементы, которые критически важны для функционирования корабля, получили более серьезную защиту за счет всех остальных частей."
