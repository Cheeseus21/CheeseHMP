l_korean:

 SMB_army_default: "국군 무장"
 SMB_army_default_desc: "우리 군대가 무시할 수준은 아니지만, 여전히 바라는 바에 비하면 훨씬 약합니다. 병사들에게 더욱 현대적인 무기를 보급하고 언제든 전투에 임할 수 있도록 훈련하는 것이 필수적입니다."
 SMB_military_facilities_default: "군사 시설 확장"
 SMB_military_facilities_default_desc: "군대를 제대로 무장시키려면 군수 산업을 확대해야 합니다. 따라서 군용 장비 생산에 특화된 새로운 산업 시설을 건설하는 것이 필수적입니다."
 SMB_department_of_propaganda_default: "선전부"
 SMB_department_of_propaganda_default_desc: "세계가 전화에 휩싸인 지금, 우리의 지대한 노력에도 불구하고 모든 민간인이 전쟁을 지지하지는 않습니다. 따라서 국민에게 무장 국제 투쟁의 이점을 설득하는 데 전념할 부서를 창설해야 합니다."
 SMB_logistics_department_default: "군수부 창설"
 SMB_logistics_department_default_desc: "남아메리카는 우리의 터전이지만, 정규군이 싸우기에는 가혹한 대륙입니다. 이 문제를 완화하기 위해, 군수품의 적절한 관리 및 분배에만 전념하는 군 분과를 창설하는 것이 유익할 것입니다."
 SMB_support_company_default: "지원 중대의 중요성"
 SMB_support_company_bra: "정글 개척병 훈련"
 SMB_jungle_pioneers: "$SMB_support_company_bra$"
 SMB_jungle_pioneers_desc: "$SMB_support_company_default_desc$"
 SMB_jungle_pioneers_tt: "지원 대대 §Y정글 개척병:§! 해제\n §Y정글§!:\n  이동 §G+40%§!, \n  공격 §G+5%§!, \n  방어 §G+5%§!"
 SMB_support_company_default_desc: "최근 군수부를 창설하며 몇 가지 사실을 알게 되었습니다. 우선 보급 흐름을 유지하려면 적절한 장비와 보급품이 충분히 생산되어야 하지만, 현재 보유한 물자로는 역부족입니다. 경쟁국에 뒤처지지 않으려면 지원 장비를 현대화해야 합니다."
 SMB_department_of_military_intelligence_default: "군사 정보부"
 SMB_department_of_military_intelligence_default_desc: "두 단어의 의미가 서로 상반될 수는 있겠으나, 적의 위치와 동기에 대한 정확한 정보 없이는 정면 대결에서 적을 격파하기 어렵다는 것을 이해하는 것이 중요합니다. 따라서 육군을 위한 군사 정보부 창설은 필수적입니다."
 SMB_motorized_default: "자동차 산업에 투자"
 SMB_motorized_default_desc: "미래전은 적에게 반응할 틈도 주지 않고 신속한 차량으로 이동해 적을 포위 섬멸하는 것입니다. 16세기나 17세기의 보병 전열처럼 별 효과 없이 시간과 인력만 낭비하는 전략이 아닙니다."
 SMB_tank_warfare_default_CHL: "파타고니아에서의 전쟁"
 SMB_tank_warfare_default: "전차전"
 SMB_tank_warfare_default_desc: "기동군을 가장 잘 보완하는 것은 마주치는 거의 모든 적을 압도할 화력을 지닌 강력한 강철 거수 부대입니다. 문제는 우리 전차 생산이 독일식 전격전 전략에 집중해야 하는지, 아니면 보병 지원용으로 운용되어야 하는지입니다."
 SMB_tank_warfare_tt: "국가 기갑 프로그램을 §Y전문화§!하는 디시전 해제"
 SMB_domestic_production_default: "국내 생산에 집중"
 SMB_domestic_production_default_desc: "의심할 여지 없이 더 어렵고 시간이 많이 걸리지만, 자국에서 전차를 개발하고 생산하는 것이 훨씬 더 유익합니다. 이는 제품의 품질을 보장하고, 무기 수송품이 도착하기 전에 도난당할 위험을 없애기 위함입니다."
 SMB_mechanized_troops_default: "부대 기계화"
 SMB_mechanized_troops_default_desc: "우리 군대를 발전시키고 미래전을 제대로 받아들이기 위해, 정규 부대를 기계화하는 데 광범위한 노력을 기울일 것입니다. 그리하여 그들이 전차 연대와 함께 안전한 장갑 뒤에서 전장을 휩쓸 수 있도록 할 것입니다."
 SMB_army_academy_default: "육군사관학교 확장"
 SMB_army_academy_default_desc: "효과적인 무기만이 전투의 결과를 결정하는 유일한 요소는 아닙니다. 개별 병사뿐만 아니라 부대를 지휘하는 장군의 기량 또한 매우 큰 요인입니다. 이 목표를 달성하기 위해, 우리는 사관학교의 육군 부서 운영을 확장하는 데 투자해야 합니다."
 SMB_regular_infantry_default: "일반 병사의 힘"
 SMB_regular_infantry_default_desc: "장비도 무엇보다 중요하지만, 조국을 수호하고, 핵심 가치를 지키며, 사랑하는 이들을 위해 싸우는 개개인의 병사야말로 모든 군대의 진정한 힘입니다. 그렇기에 우리는 평범한 병사의 사기를 최대한 끌어올리고, 가장 힘든 전투에서 승리할 수 있는 최상의 기회를 제공해야 합니다."
 SMB_artillery_CHL: "질산염 생산 활용"
 SMB_artillery_default: "중포 산업 전문화"
 SMB_artillery_default_desc: "우리 경제는 영국, 프랑스, 이탈리아와 같은 강대국만큼 강력하지 않습니다. 따라서 더 강력하고 우수한 장비를 원한다면 중포 생산을 전문화해야 합니다. 비록 우리가 원하는 모든 장비를 구매할 자금이 있었으면 좋겠지만 말입니다."
 SMB_foreign_designs_default: "해외 설계 획득"
 SMB_foreign_designs_default_desc: "비록 우리만의 기갑 장비를 만들 과학자와 기술자가 있었으면 좋겠지만, 대신 우리가 가진 인맥을 활용하여 국제 시장에서 좋은 거래를 성사시키는 것이 최선입니다. 현재로서는 전문 장비를 획득할 수 있는 유일하고 현실적인 선택지이기 때문입니다."
 SMB_foreign_advisors_default: "해외 고문단"
 SMB_foreign_advisors_default_desc: "[ROOT.GetAdj] 군사 교관들도 훌륭하지만, 여러 분쟁에서 싸우고 다른 나라의 최고 명문 사관학교에서 훈련받은 이들만큼 뛰어나지는 않습니다. 그러므로 우리 군을 더욱 강화하기 위해, 해외 군사 고문단을 유치하여 그들 국가의 전문 분야로 우리 군을 훈련시키는 데 노력을 기울여야 합니다."
 SMB_army_professionalism_CHL: "육군의 프로이센화"
 SMB_army_professionalism_default: "육군 전문성 추가 강화"
 SMB_army_professionalism_default_desc: "가능한 한 많은 병사들이 입대를 기다리며 대기하는 것이 좋은 관행일 수도 있지만, 해외 군사 고문단에 따르면, 어느 순간이든 군이 실제로 최상의 상태에서 임무를 수행하도록 보장하는 것이 훨씬 더 중요합니다."
 SMB_conscription_default: "징병 확대"
 SMB_conscription_default_desc: "우리 병사들의 전문성에 의문이 제기될 수도 있지만, 현재 우리 군에 절실히 필요한 것은 병력을 채울 더 많은 병사라는 점은 의심의 여지가 없습니다. 우리 군에 자원입대하려는 인원이 부족하기 때문입니다."
 SMB_conscription_CHL: "대전쟁의 교훈"
 SMB_experimental_weapons_department_default: "실험 무기 부서"
 SMB_experimental_weapons_department_default_desc: "기술 부문에서 경쟁국에 뒤처지지 않으려면, 이른바 경이로운 무기에 대한 이론을 정립하고 개발을 시도하기 시작하는 것이 최선일 것입니다. 그래야 전장에서 압도당하지 않을 것입니다."
 SMB_nuclear_program_default: "자국 핵 프로그램"
 SMB_nuclear_program_default_desc: "미국과 독일은 원자의 비밀을 밝히기 위해 열심히 노력하고 있으며, 우리는 그들에게 뒤처질 수 없습니다. 그들은 전쟁을 염두에 두고 있지만, 우리 과학자들은 원자 분열을 민간 생활 개선에 활용할 방법에 대해서도 이야기하고 있습니다."
 SMB_nuclear_program_key_BRA: "Programa Paralelo"
 SMB_special_forces_default: "특수부대 프로그램"
 SMB_special_forces_default_desc: "우리 군은 비록 규모는 작지만, 특정 상황과 전투 유형에 뛰어난 특수 훈련을 받은 병사들을 활용하여 대규모로 강화될 수 있습니다. 따라서, 이러한 병사들을 훈련하고 양성하는 프로그램을 수립하는 것이 우리의 최우선 과제가 되어야 합니다."
 SMB_special_forces_option_1_default: "산악 연대 강화"
 SMB_special_forces_option_1_default_desc: "육군의 산악병들은 상급 지휘부의 특별한 관심을 받아야 합니다. 그들은 정규군이 꿈도 꾸지 못할 위업을 달성하기 때문입니다. 그들은 험준한 안데스 산맥에서 전투를 수행할 수 있게 하며, 정규군이 전진할 때 지원할 수 있습니다."
 SMB_special_forces_option_2_default: "강력한 해병대"
 SMB_special_forces_option_2_default_desc: "해군이 현재 우리의 강점 중 하나이므로, 이 사실을 활용하여 혹독하게 훈련받고 극도로 효과적인 해병대로 구성된 그들만의 군 분과를 갖도록 허용하는 것은 매우 유익할 것입니다."
 SMB_special_forces_option_2_CHL_desc: "[ROOT.GetNameDefCap]은 해군 보병의 오랜 전통을 가지고 있지만, 태평양 전쟁이 끝난 이후 해안 포병 부대로 축소되었습니다. 이들을 원정전을 위한 장비를 갖춘 해병대로 전환함으로써, [ROOT.GetNameDef]은 19세기에 성공적으로 그랬던 것처럼 다시 한번 해외에 힘을 투사할 수 있게 될 것입니다."
 SMB_special_forces_option_3_default: "공군 육군 분과 확장"
 SMB_special_forces_option_3_default_desc: "공군이 현재 우리의 강점 중 하나이므로, 이 사실을 활용하여 특수 훈련을 받고 극도로 효과적인 공수부대원으로 구성된 그들만의 군 분과를 갖도록 허용하는 것은 매우 유익할 것입니다."
 SMB_special_forces_option_1_continuation_default: "레인저 훈련 프로그램"
 SMB_special_forces_option_1_continuation_default_desc: "산악병들을 지원하기 위해 우리는 레인저를 운용해야 합니다. 이들은 산악 지대뿐만 아니라 남아메리카의 숲과 정글에서도 공격과 정찰에 특화된 훈련을 받은 병사들입니다."
 SMB_special_forces_option_2_continuation_default: "해병대 지원"
 SMB_special_forces_option_2_continuation_default_desc: "해병대가 최대의 역량과 효율성으로 작전할 수 있도록, 상륙정 및 해안 상륙 시 보급 분배 기술 개선 등 이들을 지원하는 기술 개발을 고려해야 합니다."
 SMB_special_forces_option_3_continuation_default: "공중 강습 지원"
 SMB_special_forces_option_3_continuation_default_desc: "공수부대원이 강하 작전 수행 시 성공 가능성을 최대한 높이려면, 투하형 장갑이나 위장 보급 상자와 같이 생존성을 높이는 데 도움이 되는 기술 개발을 고려해야 합니다."
 SMB_air_defense_default: "방공"
 SMB_air_defense_default_desc: "경쟁국들이 본색을 드러내고 자체 공중 무기를 개발하기 시작했으니, 우리도 대응을 준비해야 합니다. 따라서 대공포 진지와 포의 신속한 건설 및 배치를 명령하는 것부터 시작해야 합니다."
 SMB_air_force_default: "푸에르사스 아에레아스 무장"
 SMB_air_force_default_desc: "많은 이론가들은 우리가 현재 가장 뒤처진 분야가 현대 공군의 발전이라고 주장합니다. 따라서 새로운 격납고와 시설을 건설하고 추가 조종사를 훈련하여 이를 바로잡기 위해 노력해야 합니다."
 SMB_air_academy_default: "정규 공군 사관학교 설립"
 SMB_air_academy_default_desc: "적절한 교육이 필요한 것은 지상군 병사들만이 아닙니다. 우리 조종사들은 열정적이지만 공중전에서 탁월한 성과를 내기 위해 필요한 전문 훈련이 부족합니다. 이 문제를 해결하려면 사관학교를 확장하여 공군에 특화된 과정을 더 많이 포함해야 합니다."
 SMB_construct_air_bases_default: "신규 공군 기지 건설"
 SMB_construct_air_bases_default_desc: "전문적이고 잘 교육받았으며 의욕적인 조종사가 필요한 것 외에도, 우리에게는 대규모 공군에 필요한 또 다른 핵심 요소인 비행장이 부족합니다. 몇몇 기지가 있기는 하지만, 공군을 경쟁력 있는 수준으로 확장하려면 턱없이 부족합니다."
 SMB_domestic_designs_default: "국내 설계"
 SMB_domestic_designs_default_desc: "다른 국가들은 우리 조종사에게 적합한 항공기를 설계하거나 생산하는 데 신뢰할 수 없으므로, 우리 고유의 모델과 항공기 설계를 개발하고 생산하는 것이 최선일 것입니다."
 SMB_license_designs_default: "해외 설계 면허 생산"
 SMB_license_designs_default_desc: "우리 고유의 항공기 설계를 연구하고 개발하는 데는 너무 많은 시간과 노력이 듭니다. 따라서 해외 장비 면허를 취득하고, 이곳 [ROOT.GetNameDef]에서 생산하는 데 집중해야 합니다."
 SMB_purchase_aircraft_default: "해외 항공기 구매"
 SMB_purchase_aircraft_default_desc: "우리 공군은 자체적으로 항공기를 개발하고 생산하는 것이 너무 비용과 시간이 많이 든다고 판단했습니다. 대신 해외 장비를 구매할 것을 주장하고 있으며, 우리도 그 입장을 따라야 합니다."
 SMB_establish_aircraft_industry_default: "국내 항공기 산업"
 SMB_establish_aircraft_industry_BRA: "엠프레사 브라질레이라 지 아에로나우치카"
 SMB_establish_aircraft_industry_default_desc: "생산 효율을 최대한 높게 유지하려면 우리 국경 내에 대규모 항공기 산업을 구축해야 함이 분명합니다."
 SMB_flying_fortress_default: "하늘의 요새"
 SMB_flying_fortress_default_desc: "공군을 제대로 활용하는 유일한 방법은 지평선 앞에 아무것도 남지 않을 때까지 적을 폭격하여 굴복시키는 것입니다. 따라서 우리는 필요한 만큼의 폭발물을 최대한 탑재할 수 있는 대형 항공기를 제작해야 합니다."
 SMB_tactical_air_force_default: "전술 공군"
 SMB_tactical_air_force_default_desc: "공군은 지상군을 지원할 뿐만 아니라, 지상군만으로는 수행할 수 없는 다양하고 복잡한 임무를 수행하는 데 사용되어야 합니다. 이것이 바로 위대한 공군을 만드는 진정한 본질입니다."
 SMB_nimble_air_force_default: "기민한 공군"
 SMB_nimble_air_force_default_desc: "항공기는 적 항공기뿐만 아니라 적의 대공포와 해군 함정의 감시를 따돌릴 수 있어야 합니다. 공군은 공중전과 타격 임무를 효율적으로 수행할 수 있는 소형 항공기로 구성되어야 하며, 신속하고 결정적인 기동이 불가능할 정도로 무거워져서는 안 됩니다."
 SMB_strategic_bombing_default: "전략 폭격 집중"
 SMB_strategic_bombing_default_desc: "전쟁에서 승리하려면 전투에서 적을 물리칠 뿐만 아니라, 적의 경제와 산업 역량을 마비시켜야 합니다. 따라서 전쟁 중 전략 폭격은 우리의 최우선 목표로 간주되어야 합니다."
 SMB_army_support_default: "육군 지원"
 SMB_army_support_default_desc: "공중에서 적극적으로 공격받는다면 육군은 승리할 수 없습니다. 따라서 우리 공군을 이용해 그러한 공격으로부터 육군을 방어할 뿐만 아니라, 항공기들이 적에게도 동일한 공격을 가하도록 중무장해야 합니다."
 SMB_winning_the_air_war_default: "공중전 승리"
 SMB_winning_the_air_war_default_desc: "지상 지원과 해상 폭격 모두 중요하다고 할 수 있지만, 제공권 없이는 이러한 모든 행동이 무가치하다는 것을 깨달아야 합니다. 따라서 우리 공군은 가능한 한 제공권을 장악하는 데 중점을 두어야 합니다."
 SMB_naval_support_default: "해상 지원 집중"
 SMB_naval_support_default_desc: "우리 항공기의 최우선 목표는 해군과 민간 수송선단의 항로를 확보하고 보호하는 것입니다. 따라서 해상 지원 및 초계 임무를 염두에 두고 항공기를 설계하고, 함재 대공포에 격추되지 않도록 하는 것이 중요합니다."
 SMB_air_modifier_boost_1_default: "지상 지원 전문화"
 SMB_air_modifier_boost_1_default_desc: "보병이 항상 목표 지점까지 도달할 수 있도록 보장하는 것은 매우 중요합니다. 따라서 공군은 직접적인 공중 지원이나 적 후방 폭격을 통해 보병을 돕는 데 집중해야 합니다."
 SMB_air_modifier_boost_2_default: "고급 기체 개발"
 SMB_air_modifier_boost_2_default_desc: "우리 항공기가 적과의 교전에서 생존하기를 원한다면, 가능한 한 많은 피격을 피할 수 있을 뿐만 아니라 한두 발의 피격에도 견디고 수리를 위해 복귀할 수 있을 만큼 멀리 비행할 수 있어야 합니다. 이것이 바로 조종사들이 어떤 상황에서도 안전할 수 있도록 더 나은 기체와 엔진을 개발해야 하는 이유입니다."
 SMB_air_doctrine_default: "교리 발전"
 SMB_air_doctrine_default_desc: "적절한 전략 없이는 아무리 뛰어난 조종사와 항공기라도 전투에서 성공할 수 없다는 점을 명심해야 합니다. 전쟁은 계획, 전략, 그리고 국가의 개별적인 강점을 최대한 활용하는 것입니다. 따라서 우리는 공군이 따를 새로운 교리를 개발하는 데 큰 노력을 기울여야 합니다."
 SMB_aircraft_carriers_default: "항공모함"
 SMB_joint_operative_command_default: "합동 작전 사령부"
 SMB_joint_operative_command_default_desc: "이제 우리 육군을 발전시켰을 뿐만 아니라 공군을 위한 좋은 기반을 마련했으므로, 이제는 이 서로 다른 각 군 간의 조율과 협력을 구축할 때입니다. 따라서 우리는 양쪽 분야에서 선발된 지휘관들로 구성된 합동 작전 사령부를 창설할 것입니다."
 SMB_war_planning_office_default: "전쟁 계획실"
 SMB_war_planning_office_default_desc: "또한 이제 우리 육군이 정보전에서 뒤처지지 않고, 매복과 파괴로 이어지는 구식 정보를 받는 일이 없도록 적절하고 잘 짜인 계획과 명령을 받을 수 있도록 보장해야 합니다. 따라서 이러한 노력을 더 잘 조율하기 위해 전쟁 계획실을 창설해야 합니다."
 SMB_women_in_aviation_default: "항공계의 여성들"
 SMB_women_in_aviation_default_desc: "항상 그런 대우를 받지는 못했지만, 여성은 사회에서 항상 중요한 역할을 해왔으며, 이제는 우리나라 항공기의 생산과 조종과 같이 이전에는 남성만의 임무로 여겨졌던 일들을 수행하기 위해 나설 때입니다."
 SMB_navy_default: "해군"
 SMB_naval_academy_default: "해군사관학교 강화"
 SMB_construct_naval_bases_default: "신규 해군 기지 건설"
 SMB_naval_foreign_advisors_default: "해군 고문 초빙"
 SMB_purchase_destroyers_and_subs_default: "구축함 및 잠수함 구매"
 SMB_reescalate_the_naval_arms_race_default: "해군 군비 경쟁 재점화"
 SMB_blue_water_fleet_default: "대양 함대"
 SMB_coastal_fleet_default: "연안 함대"
 SMB_purchase_cruisers_and_dreadnoughts_default: "순양함 및 드레드노트함 구매"
 SMB_minelaying_default: "기뢰 부설 개선"
 SMB_escort_fleet_default: "호위 함대"
 SMB_raiding_fleet_default: "습격 함대"
 SMB_degaussing_default: "자기 소거"
 SMB_naval_invasion_default: "상륙 침공"
 SMB_cruiser_subs_default: "순양 잠수함"
 SMB_midget_subs_default: "특수 잠항정"
 SMB_expand_repair_yards_default: "수리창 확장"
 SMB_enlarge_naval_facilities_default: "해군 시설 확대"
 SMB_merchant_marine_default: "강력한 상선단"
 SMB_fortification_effort_default: "요새화 노력"
 SMB_navy_BRA: "Marinha do Brasil"
 SMB_navy_ARG: "Armada de Argentina"
 SMB_navy_CHL: "Armada de Chile"
 SMB_army_BRA: "Exército Brasileiro"
 SMB_army_ARG: "Ejército Argentino"
 SMB_army_CHL: "Ejército de Chile"
 SMB_air_force_ARG: "Fuerza Aérea Argentina"
 SMB_air_force_BRA: "Força Aérea Brasileira"
 SMB_air_force_CHL: "Fuerza Aérea de Chile"

 SMB_mountain_guns: "산악포에 투자"
 SMB_mountain_guns_desc: "우리 군은 매우 강력하지만, 현재 보유한 포병은 칠레의 산악 지형에서 거의 사용할 수 없다는 점에 주목했습니다. 따라서, 이 치명적인 무기를 계속 활용할 수 있도록 산악 지형에서 더 쉽게 운용할 수 있게 제작된 산악포를 주문했습니다."

 SMB_tierra_del_fuego_training: "티에라델푸에고 훈련"
 SMB_tierra_del_fuego_training_desc: "병사들이 추운 남부와 산악 지대에서 효과적으로 싸우려면 제대로 된 훈련을 받아야 합니다. 따라서, 병사들이 추위에 더 잘 적응할 수 있도록 티에라델푸에고에 훈련소를 반드시 설치해야 합니다."

 SMB_atacama_training: "아타카마 사막 훈련"
 SMB_atacama_training_desc: "병사들이 열대와 사막의 더위 속에서 효과적으로 싸우려면 제대로 된 훈련을 받아야 합니다. 이 문제를 해결하는 가장 좋은 방법은 아타카마 사막에 훈련소를 설치하여 병사들이 더위에 더 잘 적응하도록 하는 것입니다."

 SMB_a_land_of_mountains: "산악의 땅"
 SMB_a_land_of_mountains_desc: "[ROOT.GetName]은(는) 오래전부터 전투 시 산악 지형을 유리하게 활용하는 강력한 전통을 가지고 있으며, 미래에도 이는 변치 않을 것입니다. 우리는 산에서 사는 데 익숙한 민족이며, 우리의 전문성을 활용하여 마주치는 어떠한 강적이라도 물리칠 것입니다."

 SMB_navy_desc: "[SMB_navy_desc_key]"
 SMB_navy_desc_default: "대전쟁 이래로 우리 해군은 침체되었으며, 그 결과 다수의 함선이 더는 임무에 적합하지 않은 지경에 이르렀습니다. 이제 함대에 투자하여 대대적인 현대화 계획을 시작할 때입니다."
 SMB_CHL_navy_desc: "우리 함대는 길고 자랑스러운 전통을 가지고 있지만, 1931년 해군 반란으로 해군의 위신이 크게 실추되었습니다. 칠레 함대에 투자함으로써 우리 해군에 대한 대중의 신뢰를 회복할 수 있을 것입니다."
 SMB_naval_academy_desc: "[SMB_naval_academy_desc_key]" 
 SMB_naval_academy_default_desc: "단순히 함선을 생산하고 유지하는 것만으로는 해군을 구성하기에 충분하지 않습니다. 전투에서 해군 자산을 활용하는 방법에 대해 고도로 훈련된 장교와 전문가가 필요합니다. 따라서, 차세대 해군 장교를 양성하기 위해 [ROOT.GetAdjective] 해군사관학교를 설립해야 합니다."
 SMB_naval_academy_CHL_desc: "우리 해군사관학교는 숙련된 해군 장교를 양성해 온 오랜 역사를 가지고 있지만, 제독과 함장들이 현대 해전에 대비할 수 있도록 지속적인 투자가 필수적입니다."
 SMB_construct_naval_bases_desc: "우리 해군 시설은 구식이며 현대화가 절실히 필요합니다. 이러한 시설에 투자함으로써 훨씬 더 유능한 해군 자산을 건조하고 지원할 수 있게 될 것입니다."
 SMB_naval_foreign_advisors_desc: "우리 해군 장교들은 최근 전투에서 자신의 능력을 시험할 기회가 거의 없었습니다. 따라서 외국 해군 장교를 초빙하여 우리 장교들에게 현대 해군 전술을 훈련시키는 것이 도움이 될 것입니다."
 SMB_reescalate_the_naval_arms_race_desc: "우리 해군 규모에 대해 이웃 국가들과 공식적인 합의는 없지만, 대전쟁 이후 과도한 확장을 자제해 왔습니다. 하지만 전쟁이 다시 임박했으므로, 이웃 국가들보다 재무장에서 앞서 나가는 것이 더 나을 것입니다. "
 SMB_blue_water_fleet_desc: "해군력 투사는 강대국 반열에 오르거나 잠재적인 적에 대한 강력한 억지력을 유지하려는 모든 국가에 매우 중요합니다. 따라서 우리 해군이 모항에서 멀리 떨어져 있을 때도 효과적으로 작전할 수 있도록 적절한 장비와 훈련을 갖추도록 해야 합니다."
 SMB_coastal_fleet_desc: "우리는 전 세계에서 전투를 벌일 의향이 거의 없습니다. 따라서 우리 함대의 주된 목표는 해안선을 보호하고 적군이 우리 해안에 상륙하는 것을 막는 것이어야 합니다."
 SMB_purchase_cruisers_and_dreadnoughts_desc: "우리의 산업 역량은 계속 성장하고 있지만, 시간은 우리 편이 아닙니다. 해군을 적절히 강화하기 위해서는 가능한 한 빨리 더 많은 주력함이 필요합니다. 따라서, 강대국들에게 접촉하여 그들이 보관 중인 드레드노트와 순양함을 판매할 의향이 있는지 알아볼 것입니다."
 SMB_minelaying_desc: "광대한 해안선을 항상 방어할 만큼 충분한 함선을 유지하는 것은 엄청난 비용이 들 수 있습니다. 기뢰는 함대가 도착할 때까지 적군을 저지하거나 지연시키는 데 도움이 되는 더 저렴한 해결책을 제공합니다."
 SMB_escort_fleet_desc: "거대 전투 함대의 시대는 끝났으며, 현대 해전은 제한된 수의 주력함과 함께 호위 편대를 이루는 소형 함선 함대를 요구합니다. 따라서 해군은 이러한 전술을 수용하기 위해 계획을 재정비해야 합니다. "
 SMB_raiding_fleet_desc: "해상 보급로는 대부분 경제의 기능에 매우 중요합니다. 우리 해군 자산을 사용하여 이러한 보급로를 교란하는 것은 가장 강력한 국가조차도 굴복시킬 수 있는 방법이 될 수 있습니다."
 SMB_degaussing_desc: "선체 소자 작업을 시작하여 자기 신호를 줄일 것입니다. 이는 자기 기뢰로부터 함선을 보호하고 함선의 전자 프로필을 감소시킵니다."
 SMB_naval_invasion_desc: "적국을 상대하려면 종종 그들의 해안에 병력을 상륙시켜야 합니다. 이러한 작전을 수행할 능력을 극대화하기 위해, 육군과 해군의 합동 훈련을 시작할 것입니다. "
 SMB_cruiser_subs_desc: "대서양과 태평양은 광대하며, 장기간 독립적으로 효율적으로 작전할 수 있는 잠수함이 필요합니다. 따라서 우리는 자체 순양 잠수함을 개발하는 데 투자해야 합니다."
 SMB_midget_subs_desc: "광대한 대양에서 자립형 잠수함을 운용하는 것은 무익한 노력이 될 것입니다. 우리 해안선의 얕은 해역에서 작전하는 더 작은 함정을 건조함으로써 자원을 더 잘 활용할 수 있습니다."
 SMB_expand_repair_yards_desc: "가장 견고한 함선과 가장 효율적인 승무원이라도 결국 현역으로 복귀하기 전에 수리가 필요합니다. 수리 과정이 가능한 한 신속하게 이루어지도록 해군 수리 조선소에 투자해야 합니다. "
 SMB_enlarge_naval_facilities_desc: "전 세계의 최근 동향은 우리가 적절한 함대를 유지하려면 해군을 확장해야 한다는 것을 명확히 보여줍니다. 이를 위한 첫 번째 단계는 기존 해군 시설을 확장하는 것입니다."
 SMB_merchant_marine_desc: "해상을 통한 자원 수송은 많은 국가의 안보에 필수적이며, 우리도 예외는 아닙니다. 따라서, 위기 시에 우리 군을 지원할 수 있는 전문 상선단을 창설해야 합니다."
 SMB_aircraft_carriers_desc: "적에게 뒤처지지 않으려면 해군에 항공기를 통합해야 합니다. 이를 위해, 우리는 자체 항공모함을 생산해야 합니다. 우리의 더 크고 구식인 함선들의 선체를 활용하는 것이 생산을 가속화하는 방법이 될 수 있습니다."
 SMB_fortification_effort_desc: "해군과 공군이 적군이 우리 해안에 도달하는 것을 막는 주요 수단이지만, 우리는 잠재적인 침략자에 대한 최종 방어선으로서 견고한 해안 요새 체계를 유지해야 합니다."

