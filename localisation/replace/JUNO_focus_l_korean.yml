 #### Chile #####
 
 CHL_expand_mining_prospection_tt: "해당 광물 자원 중 하나를 이미 제공하고 있는 모든 핵심 주에 §Y4£resources_strip|5 §Y$state_resource_steel$§!, £resources_strip|6 §Y$state_resource_chromium$§!, £resources_strip|4 §Y$state_resource_tungsten$§! 또는 £resources_strip|2 §Y$state_resource_aluminium$§! §!의 생산량을 추가합니다. \n현재 효과:"
 CHL_skip_one_line_tt: " \n"
 chilean_trade_deals_opinion_modifier: "유리한 무역 협정"

 CHL_high_quality_nitrate: "고품질 질산염"
 CHL_high_quality_nitrate_desc: "우리 산업이 현재 최강은 아닐지라도, 우리를 다른 국가와 차별화하는 것이 있습니다. 바로 풍부한 질산염이며, 세계 생산량의 상당 부분이 우리 국경 내에 있습니다. 따라서 우리는 덜 정제된 질산염을 판매하는 동안, 우리만이 최고 품질의 원료를 확보할 수 있도록 보장할 수 있습니다."

 CHL_contract_efe: "EFE와 계약"
 CHL_contract_efe_desc: "국영 철도 회사(Empresa de los Ferrocarriles del Estado)가 현재 우리 철도 시스템을 운영하고 있으며, 우리가 그들을 더 직접적으로 통제하고 관리함으로써, 그들의 자원과 우선순위가 우리가 원하는 곳에 배치되도록 보장할 수 있습니다."

 CHL_public_works: "공공 사업 프로젝트"
 CHL_public_works_desc: "미국이 국경을 폐쇄하고 수출을 중단하면서 대공황이 닥친 이래로, 우리 경제는 파탄 나고 국민은 뿔뿔이 흩어졌습니다. 이 재앙에서 최대한 효율적으로 회복하기 위해, 우리는 미국 뉴딜 정책과 유사한 대규모 공공 사업 프로그램을 장려하여 국민이 다시 일자리를 찾고 경제를 다시 활성화해야 합니다."

 CHL_dissolve_covensa: "COVENSA 해체"
 CHL_dissolve_covensa_desc: "내부 자원 분배 회사인 COVENSA의 설립은 실수였으며, 우리 모두가 이를 알고 있습니다. 우리 경제 문제를 해결할 유일한 진정한 방법은 대규모 수출을 재개하는 것이며, 이를 위해 우리는 해당 조직을 청산하고 이전 조직인 COSACH와 더 유사하게 개혁해야 합니다."

 CHL_issue_bonds: "채권 구매 장려"
 CHL_issue_bonds_desc: "최근 경제 붕괴의 기억은 우리 국민이 돈을 투자하는 것을 매우 두려워하게 만들어 경제 성장을 저해하고 있습니다. 국민에게 정부 발행 채권을 구매하도록 장려하고 그 돈을 국가에 재투자하겠다고 약속함으로써, 우리는 더 강한 [CHL.GetName]을(를) 더 빨리 건설할 수 있습니다."

 CHL_expand_the_forestry: "임업 확장"
 CHL_expand_the_forestry_desc: "우리나라의 중부 지역, 특히 아라우카니아는 목재가 풍부합니다. 해당 지역의 산업 확장에 반대하는 사람들이 있지만, 우리나라가 경제적 안정을 경험하기를 원한다면 이는 필수적이며, 목재를 얻고 토지를 개간하는 것이 가장 빠른 방법입니다."
 CHL_expand_the_forestry_decision_tt: "§Y[950.GetName]§! 및 §Y[279.GetName]§!에서 §Y임업 확장§! 디시전을 잠금 해제합니다. \n" 

 CHL_government_mandated_contracts: "정부 보조금 계약"
 CHL_government_mandated_contracts_desc: "더 많은 사람이 일하고 제 몫을 다하게 하려면, 산업 계약에 보조금을 지급하고 급여의 일부를 우리가 직접 지불하는 것을 고려해야 합니다. 이렇게 하면 더 많은 회사가 안심하고 더 많은 인력을 고용할 수 있으며, 더 많은 사람이 돈을 벌어 경제에 다시 쓸 수 있게 됩니다."

 CHL_we_must_dig_deeper: "더 깊이 파야 한다"
 CHL_we_must_dig_deeper_desc: "너무 깊이 파는 것이란 없습니다. 비록 우리 도시 아래로 터널을 뚫어 기반을 약간 손상시키더라도 말입니다. 수출을 이용해 경제를 회복하려면, 우리는 위험을 감수하고 신속하게 행동하여 광산에서 최대한 많은 것을 얻어내야 합니다."

 CHL_establish_trade_relationships: "유리한 무역 관계 수립"
 CHL_establish_trade_relationships_desc: "무역이 성공하기 위해서는 여러 요건이 필요하며, 수요가 있는 자원을 보유하는 것만이 유일한 요건은 아닙니다. 또한 신뢰할 수 있는 무역 상대국과, 우리의 노동력과 천연자원을 너무 헐값에 팔아넘기지 않는 계약이 필요합니다. 따라서 우리는 아메리카 대륙의 형제자매들에게 접근하여, 우리가 거래하는 상대가 누구인지 확실히 해야 합니다."

 CHL_international_loans: "국제 차관"
 CHL_international_loans_desc: "우리의 전임 대통령 카를로스 이바녜스 델 캄포는 외세로부터 차관을 들여와 국가에 투자함으로써 경제 위기를 해결하려 시도했습니다. 그는 이를 통해 나중에 갚을 수 있을 만큼 충분한 가치를 창출하기를 바랐으며, 이 전략은 여러 면에서 성공적이었습니다. 우리는 그의 발자취를 따라, 다시 한번 같은 시도를 해야 합니다."
 CHL_CHL_international_loans_tt: "경제 개선을 위해 외세로부터 §Y차관 도입§! 결정을 잠금 해제합니다"

 CHL_connect_the_northern_railways: "북부 철도 연결"
 CHL_connect_the_northern_railways_desc: "북부, 특히 아리카 지역의 철도와 도로는 나머지 기반 시설 체계와 제대로 연결되어 있지 않습니다. 따라서 최북단 지역의 전반적인 기반 시설 개선에 노력을 기울여야 합니다."

 CHL_expand_southern_infrastructure: "남부 기반 시설 확장"
 CHL_expand_southern_infrastructure_desc: "현재 칠레 최남단 지역에는 실질적인 기반 시설이 거의 또는 전혀 없으며, 철도 노선도 전무합니다. 따라서 우리는 남부의 항구 도시인 푼타아레나스와 푼타델가다를 우리의 철도 노선과 연결하기 위해 막대한 노력을 기울여야 합니다."

 CHL_devalue_the_peso: "[CHL_devalue_the_peso_key]"
 CHL_devalue_the_peso_desc: "[CHL_devalue_the_peso_key_desc_key]"

 CHL_devalue_the_peso_peso: "페소 평가절하"
 CHL_devalue_the_peso_peso_desc: "다른 국가들은 경제를 돕기 위해 자국 통화의 가치를 떨어뜨렸지만, 우리는 아직 그렇게 하지 않았습니다. 그 결과, 우리는 훨씬 뒤처져 있습니다. 따라잡고 싶다면, 비록 인기 없는 조치가 될지라도 통화 평가절하를 미루어서는 안 됩니다."

 CHL_devalue_the_peso_franc: "프랑 평가절하"
 CHL_devalue_the_peso_franc_desc: "다른 국가들은 경제를 돕기 위해 자국 통화의 가치를 떨어뜨렸지만, 우리는 아직 그렇게 하지 않았습니다. 그 결과, 우리는 훨씬 뒤처져 있습니다. 따라잡고 싶다면, 비록 인기 없는 조치가 될지라도 통화 평가절하를 미루어서는 안 됩니다."

 CHL_utlilize_famae: "FAMAE 활용"
 CHL_utlilize_famae_desc: "우리의 군수 산업은 현재 국제 구매와 간간이 현지에서 제조되는 소총에 의존하고 있습니다. 군사 생산량을 늘리려면, 수 세기 역사의 파브리카스 이 마에스트란사스 델 에헤르시토(Fábricas y Maestranzas del Ejército)와 같이 국가가 통제하는 군수 제조업체를 확보하고, 이를 신속하게 현대화해야 합니다."

 CHL_they_shall_not_pass: "놈들은 지나갈 수 없다"
 CHL_they_shall_not_pass_desc: "우리나라는 태평양 전쟁의 오랜 적들뿐만 아니라, 거대한 국경을 공유하는 이웃 아르헨티나로부터도 위협받고 있습니다. 그들에 맞서 방어할 일말의 가능성이라도 잡으려면, 우리는 산맥에서 그들을 저지해야 합니다. 놈들은 지나갈 수 없으며, 우리는 결코 항복하지 않을 것입니다!"

 CHL_domestic_production_of_the_willys_mb: "윌리스 MB 국내 생산"
 CHL_domestic_production_of_the_willys_mb_desc: "우리는 자국 내에서 충분한 소화기와 탄약을 생산할 수 있지만, 제대로 된 동력 차량과 장갑 차량을 생산할 전문 기술이 부족합니다. 이 문제를 완화하기 위해, 우리는 기꺼이 판매하려는 누구에게서든 차량을 구매하고 그 설계를 복제해야 합니다."

 CHL_strengthen_the_central_bank: "중앙은행 강화"
 CHL_strengthen_the_central_bank_desc: "우리 경제가 단순한 개선이라는 꼬리표를 넘어 더욱 발전하려면, 아르투로 알레산드리 대통령이 설립한 칠레 중앙은행(Banco Central de Chile)을 강화하기 위해 노력해야 합니다. 우리는 장기적으로 우리에게 도움이 되리라는 기대 하에, 그들이 적합하다고 판단하는 모든 일을 할 수 있도록 더 많은 자유를 부여할 것입니다."

 CHL_expand_the_naval_arsenal: "해군 조병창 확장"
 CHL_expand_the_naval_arsenal_desc: "아르세날레스 데 마리나(Arsenales de Marina)는 우리의 신뢰할 수 있는 선박 제조업체이며, 최근 몇 년간 우리가 유지해 온 것처럼 함대를 최상의 상태로 유지하는 데 도움을 줍니다. 이는 다른 어떤 남미 국가가 해낸 유지 보수 수준을 훨씬 뛰어넘는 것입니다. 이제 우리는 전쟁에 대비하기 위해 그들의 자금을 증액해야 합니다."

 CHL_fortify_the_coastlines: "해안선 요새화"
 CHL_fortify_the_coastlines_desc: "우리의 해안선은 길며, 국토 면적에 비례해서는 아마 세계에서 가장 길 것입니다. 따라서, 만약 우리가 어떻게든 해전에서 패배한다면, 우리 국토 전체가 노출되어 바다로부터의 공격에 취약해질 것입니다. 그러므로, 우리는 어떠한 상륙 작전이라도 격퇴할 수 있는 대규모 복합 시설을 건설해야 합니다!"

 CHL_invest_in_shipping: "해운업 투자"
 CHL_invest_in_shipping_desc: "바다는 군사적 용도로만 유용한 것이 아닙니다. 우리는 무역에 크게 의존하는 국가이자, 라파누이와 같은 해외 영토를 보유한 국가이므로 상선을 확장하고 해운 산업 확장에 자금을 투자해야 합니다."

 CHL_advancements_in_telecommunications: "통신 기술의 발전"
 CHL_advancements_in_telecommunications_desc: "우리의 연구개발 과학자들은 라디오뿐만 아니라 텔레비전의 활용 사례를 발전시키는 더 나은 기술을 개발하기 시작했습니다. 이를 통해 우리는 대중에게 일반 지식을 더 쉽게 전파할 수 있으며, 국가 과학 연구소의 멀리 떨어진 부서 간에 연구 결과를 더 잘 전달할 수 있습니다."

 CHL_protect_the_easter_island_tt: "§Y[JAP.GetName]§!, §Y[NZL.GetName]§! 또는 §Y[AST.GetName]§!이(가) §Y파시스트§! 또는 §Y비동맹§!일 경우, 이들을 상대로 §Y괴뢰국화 전쟁 목표§!를 획득합니다."

 CHL_upgrade_central_bank_tt: "§Y칠레 중앙은행§!을 다음과 같이 강화합니다: \n $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-10%§!"
 right_wing_tt: "§Y우익§! 대통령이 집권합니다"
 left_wing_tt: "§Y좌익§! 대통령이 집권합니다"
 propping_up_gustavo_ross_tt: "§Y구스타보 로스§!가 칠레의 대통령이 되면 정치력 §G+75§!, 안정도 §G+5%§!를 획득하고 그에게 §Y국민적 인기§! 특성을 부여합니다. 해당 특성은 순응도 증가 속도 계수 §G+2%§!, 이념 동요 방어 §G+25%§!, 안정도 §G+10%§!를 부여합니다."
 CHL_has_idea_near_anarchy: "아직 §Y$idea_CHL_near_anarchic_society$§! 국민정신을 완전히 제거하지 않았습니다"
 CHL_not_has_idea_near_anarchy: "§Y$idea_CHL_near_anarchic_society$§! 국민정신을 완전히 제거했습니다"
 CHL_found_national_steelworks_tt: "§Y$CHL_expand_araucanian_steelworks_decision$§! 디시전을 잠금 해제하여 §Y[950.GetName]§!에서 더 많은 §Y강철§!을 얻을 수 있습니다!"
 denounced_catholicism: "가톨릭교 비난"
 embraced_catholicism: "가톨릭교 수용"
 CHL_dispute_over_tierra_del_fuego_tt: "이는 티에라델푸에고의 소유주와 §R전쟁§!으로 이어질 수 있습니다"
 CHL_reapproach_america_tt: "§Y미합중국§!으로부터 §Y무기 구매§! 디시전을 잠금 해제합니다!"
 CHL_mapuche_reconcilliation_campaigns_tt: "§Y마푸체 분쟁§!을 §G완화§!하고 §G해결§!하는 디시전을 잠금 해제합니다!"
 CHL_use_the_fascist_movement_tt: "나시스타 반란은 소규모 §R내전§!으로 이어질 것입니다!"
 CHL_suppress_the_nacistas_tt: "나시스타 반란이 §G약화§!될 것입니다!"

 CHL_endorse_the_constitution: "1925년 헌법 지지"
 CHL_endorse_the_constitution_desc: "1920년대에 우리는 심각한 사회 경제적 위기를 겪었고, 이로 인해 구 지배계급의 위신이 실추되었으며 아르투로 알레산드리가 이끄는 정부가 부상했습니다. 1924년에 그는 쿠데타로 축출되었으나 1925년에 다시 복귀했고, 이후 대통령직을 이용해 1833년 헌법을 대체할 새로운 헌법 초안을 작성했습니다. 우리는 새로운 칠레의 건국의 아버지인 그의 지침을 따르기 위해 노력해야 합니다."

 CHL_cooperation_with_the_falange: "국민 팔랑헤와의 협력"
 CHL_cooperation_with_the_falange_desc: "국민 팔랑헤는 1935년에 창당된 기독교 민주당으로, 주로 진보적이고 개혁적인 가톨릭 신자들로 구성되어 있습니다. 그들의 정책 중 상당수가 우리와 매우 유사하므로, 그들을 우리 정부에 참여시키는 것은 어렵지 않을 것입니다."

 CHL_denounce_the_anarchy: "준 무정부 상태 규탄"
 CHL_denounce_the_anarchy_desc: "월스트리트 붕괴 이후 시작된 무정부 상태가 아직 해결되지 않았다는 사실은 현 정부와 그 수동적인 자유주의 이념에 내재된 큰 약점을 보여주는 중요한 지표입니다. 우리는 공개적으로 그들을 비판하고, 국민이 우리 뒤에 결집한다면 미래는 그들의 것이 될 것임을 확신시켜야 합니다."

 CHL_look_to_tradition: "전통으로의 회귀"
 CHL_look_to_tradition_desc: "아르투로 알레산드리는 주목받을 만큼 받았지만, 여전히 국가에 산적한 명백한 문제들을 해결하지 못했습니다. 따라서 우리는 자유주의에서 한 걸음 물러나, 우리가 의지했던 그 좋았던 옛 전통적 가치로 돌아가야 합니다."

 CHL_impose_new_taxes: "새로운 세금 부과"
 CHL_impose_new_taxes_desc: "국가를 이전 상태로 복구하려는 많은 노력 끝에 국고가 바닥났으므로, 이를 완화하기 위해 국민에게 새로운 소득세를 부과하는 것이 좋은 계획일 것입니다. 처음에는 국민이 좋아하지 않을 수도 있지만, 시간이 지나면 잠잠해질 것이고, 우리는 더 많은 돈을 쓸 수 있게 될 것입니다."

 CHL_1938_chilean_presidential_election: "Elección Presidencial de Chile de 1938"
 CHL_1938_chilean_presidential_election_desc: "1938년 대통령 선거가 다가왔고, 국가는 네 명의 주요 후보 중에서 지도자를 선택해야 합니다. 좌파에는 페드로 아기레 세르다와 인민전선이, 우파에는 카를로스 이바녜스 델 캄포와 인민자유동맹이, 중도에는 구스타보 로스와 자유당이, 그리고 더 극좌에는 엘리아스 라페르테 가비뇨와 공산당이 있습니다. 누가 승리할까요?"
 CHL_1938_chilean_presidential_election_tt: "§Y1938년 10월§! 말에 §Y대통령 선거§!가 실시되면, 이 중점은 자동으로 완료될 것입니다"

 CHL_construct_new_hydroelectric_stations: "신규 수력 발전소 건설"
 CHL_construct_new_hydroelectric_stations_desc: "원주민 마푸체족에게는 인기 없는 조치일 수 있지만, 아라우카니아 지역은 호수와 폭포를 비롯한 온갖 종류의 천연자원이 풍부합니다. 이를 활용하여 수력 발전소를 건설할 수 있지만, 이는 지역 주민들의 반발을 살 수도 있습니다."

 CHL_policies_of_arturo_alessandri: "아르투로 알레산드리의 정책"
 CHL_policies_of_arturo_alessandri_desc: "알레산드리의 정책은 많으며, 그의 마지막 임기는 아직 끝나지도 않았습니다. 그는 국가에 막대한 도움을 주었고, 앞으로도 더 많은 도움을 줄 힘이 있습니다. 그는 진정으로 현대 칠레의 아버지입니다."

 CHL_suppress_the_nacistas: "나시스타 진압"
 CHL_suppress_the_nacistas_desc: "칠레 국가사회주의 운동이 최근 활발히 움직이고 있으며, 가까운 미래에 무언가를 시도할 것이 분명합니다. 우리는 경계를 늦추지 말고, 어디서든 반체제 활동이 나타나면 강력히 단속해야 합니다."

 CHL_use_the_fascist_movement: "파시스트 운동 이용"
 CHL_use_the_fascist_movement_desc: "파시스트들이 무언가 음모를 꾸미고 있다는 것은 명백하지만, 그들 중에는 우리 정부에 유용할 수 있는 저명한 인사들이 많다는 점을 고려해야 합니다. 따라서 우리는 그들 중 일부에게 비밀리에 접근하여, 그들이 무언가를 시도하기 전까지는 그들의 강점을 활용해야 합니다."

 CHL_reestablish_the_republican_guard: "공화국 수비대 재창설"
 CHL_reestablish_the_republican_guard_desc: "다시금 공격을 받고 있는 지금, 우리를 노리는 고위협 위협에 맞서 싸우기 위해 공화국 수비대를 재소집해야 합니다. 모두 무기를 들어라, 공화국을 위해 싸워라!"

 CHL_volunteers_to_the_republicans: "공화파에 의용군 파견"
 CHL_volunteers_to_the_republicans_desc: "스페인의 우리 형제들은 현재 민주 정권을 전복시키려는 군부에 맞서 투쟁하고 있습니다. 칠레 내에서 개입하자는 생각이 반드시 대중적인 것은 아닐지라도, 이는 우리의 힘과 민주주의를 수호할 준비가 되어 있음을 보여줄 수 있습니다."
 CHL_volunteers_to_the_republicans_tt: "@SPR 공화파 스페인 존재"
 CHL_volunteers_to_the_republicans_tt_2: "@SPR 공화파 스페인이 §Y$SPR_regional_defense_council_of_aragon$§!을(를) 완료하지 않음"

 CHL_prop_up_gustavo_ross: "구스타보 로스 지원"
 CHL_prop_up_gustavo_ross_desc: "구스타보 로스는 아르투로 알레산드리의 수제자이며, 다가오는 대통령 선거에서 그가 가장 유력하게 여기는 후보입니다. 따라서 알레산드리는 이 사실을 대중에게 알리고, 대대적인 선전을 통해 로스를 자신의 정신적 후계자로 내세워야 합니다."

 CHL_inflation_control_by_the_central_bank: "칠레 중앙은행의 인플레이션 통제"
 #CHL_inflation_control_by_the_central_bank_desc: "The Banco Central de Chile was founded by president Arturo Alessandri in 1925. We should task them with making sure that inflation stays on a level that is currently desired, so that the budget can be distributed as desired, and the populace be kept as happy as possible."
 CHL_inflation_control_by_the_central_bank_desc: "칠레 중앙은행은 1925년 아르투로 알레산드리 대통령에 의해 설립되었습니다. 우리는 칠레의 장기적인 경제 발전을 지원하고 급등하는 물가가 경제적, 정치적 피해를 야기하는 것을 막기 위해 인플레이션을 통제하는 임무를 그들에게 맡겨야 합니다."

 CHL_construct_the_estadio_nacional: "에스타디오 나시오날 건설"
 CHL_construct_the_estadio_nacional_desc: "경제를 회복하고 국민의 신뢰를 되찾기 위한 알레산드리의 가장 큰 노력은 공공 사업을 통해서였습니다. 그리고 그의 대표작은 스포츠 경기를 위한 웅장한 국립 경기장인 에스타디오 나시오날이며, 이는 국가를 이끄는 그의 능력을 잘 보여주는 사례입니다."

 CHL_establish_corfo: "CORFO 설립"
 CHL_establish_corfo_desc: "우리는 산업 개발, 자원 분배 및 재건 노력을 책임질 수 있는 조직을 설립해야 합니다. 이 조직의 이름은 칠레 생산진흥공사(Corporación de Fomento de la Producción de Chile)로 할 수 있습니다."

 CHL_work_towards_laissex_faire: "자유방임주의 지향"
 CHL_work_towards_laissex_faire_desc: "자유주의 정부의 궁극적인 목표는 자유방임주의 경제를 달성하는 것이며, 따라서 이를 달성하기 위해 우리가 할 수 있는 모든 것을 해야 합니다."

 CHL_align_the_marxists: "마르크스주의자 포섭"
 CHL_align_the_marxists_desc: "우리나라에는 현 정부 구조를 취약하다고 보는 사람들이 많지만, 좌파 성향의 대통령이 그들에게 손을 내민다면 그들 중 다수는 정부를 지지하도록 쉽게 설득될 수 있습니다."

 CHL_low_cost_housing: "저비용 주택"
 CHL_low_cost_housing_desc: "우리나라에는 실향민이나 빈민이 많습니다. 우리는 이 불행한 영혼들을 지원하기 위해 최선을 다해야 합니다. 그들 역시 우리 국민입니다. 따라서 우리는 국가 주택 기관을 설립하고, 불행하게 추락하는 이들을 구제할 수 있는 사회 안전망을 구축하는 것을 정부 정책으로 삼아야 합니다."

 CHL_align_the_police: "수사 경찰 재편"
 CHL_align_the_police_desc: "$CHL_expand_the_investigations_police_desc$"

 CHL_privatize_national_industries: "국영 산업 민영화"
 CHL_privatize_national_industries_desc: "현재 국영 산업은 취약하고 비효율적입니다. 우리는 모든 지역 산업 단지를 더 잘 관리할 수 있는 민간 단체의 손에 넘기기 위해 노력해야 합니다."

 CHL_strengthen_instituto_nacional: "인스티투토 나시오날 강화"
 CHL_strengthen_instituto_nacional_desc: "파트리아 비에하 시대 초기에 설립되었지만, 인스티투토 나시오날은 우리 국민이 필요한 것을 읽을 수 있도록 보장하고, 우리에게 유익한 속도로 발전할 수 있도록 확장하고 강화해야 합니다."

 CHL_enact_universal_suffrage: "보통 선거권 제정"
 CHL_enact_universal_suffrage_desc: "투표권은 모든 민주 사회의 기초이며, 우리나라의 모든 사람이 다른 사람과 동등한 권리로 투표할 수 없다는 것은 매우 부끄러운 일입니다. 우리는 평등을 위해 노력하고, 칠레 여성들에게 가능한 한 빨리 투표할 기회를 부여해야 합니다."

 CHL_host_spanish_refugees: "스페인 난민 수용"
 CHL_host_spanish_refugees_desc: "스페인의 우리 형제들은 친구, 가족과 싸워 정신적으로 피폐해졌습니다. 이제 내전이 끝났으므로, 많은 이들이 현 정권을 피해 망명하려 합니다. 스페인의 형제로서 우리는 난민을 수용할 주요 후보국입니다."

 CHL_expand_the_investigations_police: "칠레 수사 경찰"
 CHL_expand_the_investigations_police_desc: "칠레 수사 경찰은 1933년에 창설되었으며, 법 집행 경찰인 카라비네로스 데 칠레와 함께 칠레의 두 경찰 기관 중 하나입니다. 수사 경찰은 수사 대상 범죄에 따라 수사 영역을 나누며, 전문 형사를 보유한 여러 전문 경찰 수사 부서를 갖추고 있습니다."

 CHL_increase_presidential_powers: "대통령 권한 강화"
 CHL_increase_presidential_powers_desc: "강력한 지도자가 분열되고 취약한 의회보다 낫기 때문에, 대통령은 국가를 이끄는 데 필요한 유일한 존재입니다. 대통령이 곧 의회이며, 그들의 정치적 참여는 필요 없습니다."

 CHL_reapproach_america: "미국에 재접근"
 CHL_reapproach_america_desc: "대공황이 시작되었을 때 미국은 우리와의 많은 관계를 단절했으며, 우리의 관계는 아직 완전히 해결되지 않았습니다. 따라서 대통령과 의회는 신속하게 관계를 회복하기 위해 공동의 노력을 기울여야 합니다."

 CHL_return_to_the_parliamentary_era: "의회 시대로의 회귀"
 CHL_return_to_the_parliamentary_era_desc: "보편적인 진리는 단 하나, 권력은 부패하고 절대 권력은 절대로 부패한다는 것입니다. 따라서 우리는 정신 나간 대통령이 우리 국가의 미래 전체를 좌지우지할 수 없도록, 의회가 가능한 한 큰 발언권을 갖도록 해야 합니다."

 CHL_development_inwards: "내향적 개발"
 CHL_development_inwards_desc: "세계 정세에 개입하지 않고 다시금 수출에 과도하게 의존하지 않으면서, 국가를 내부적으로 발전시키는 것이 우리의 정책이 되어야 합니다."

 CHL_kickstart_the_arsenal_of_democracy: "민주주의의 병기창 가동"
 CHL_kickstart_the_arsenal_of_democracy_desc: "가까운 미래에 거대한 분쟁에 휘말릴 가능성이 높아 보입니다. 그러한 상황에서 우리가 전멸하지 않도록 하기 위해, 군수 산업 조직을 신속히 확장해야 합니다."

 CHL_chilean_anti_communist_action: "Acción Chilena Anticomunista"
 CHL_chilean_anti_communist_action_desc: "공산주의자들은 다른 어떤 위협과 마찬가지로 우리 국가에 큰 위협이며, 그들이 그토록 원하는 혁명을 일으킬 기회를 결코 얻지 못하도록 모든 힘을 다해야 합니다."

 CHL_chilean_anti_communist_action_dem_version: "칠레 반공 행동"
 CHL_chilean_anti_communist_action_dem_version_desc: "$CHL_chilean_anti_communist_action_desc$"

 CHL_organize_patriotic_leagues: "애국 동맹 조직"
 CHL_organize_patriotic_leagues_desc: "애국 동맹은 한때 산티아고와 부에노스아이레스의 거리를 활보했던 파시스트 마피아 조직이었으며, 우리는 그들을 재건하기 위해 노력하는 한편, 과거처럼 독립적으로 활동하는 대신 우리 정부에 충성을 다하도록 만들어야 합니다."

 CHL_preemtively_strike_foreign_revolutionaries: "외국 혁명가 선제 타격"
 CHL_preemtively_strike_foreign_revolutionaries_desc: "우리는 내부의 공산주의 위협으로부터 국가를 지켜냈을지 모르지만, 여전히 외부의 위협이 존재합니다. 그들이 우리에게 혁명을 가져오기 전에 선제적으로 타격해야 합니다."
 CHL_preemtively_strike_foreign_revolutionaries_tt: "남아메리카의 모든 §Y공산주의§! 국가에 대한 괴뢰국화 §Y전쟁 목표§! 획득"

 CHL_law_of_permanent_defense_of_democracy: "민주주의 항구적 수호법"
 CHL_law_of_permanent_defense_of_democracy_desc: "공산주의의 위협은 우리뿐만 아니라 전 세계에 드리워져 있습니다. 뒤따를 것이 확실한 냉전에서 살아남으려면, 공산주의자들이 우리 정권을 전복하고 국민을 위협할 수 없도록 확실히 해야 합니다."

 CHL_law_of_permanent_defense: "항구적 수호"
 CHL_law_of_permanent_defense_desc: "$CHL_law_of_permanent_defense_of_democracy_desc$"

 CHL_promote_immigration_to_chile: "$BRA_promote_immigration_to_brazil$"
 CHL_promote_immigration_to_chile_desc: "[CHL.GetName]은(는) 전 세계에 걸쳐 조상을 둔 사람들로 이루어진 다양한 국가입니다. 경제가 다시 성장하고 개발을 기다리는 풍부한 자원이 있는 지금, 더 많은 사람이 이곳으로 이주하여 스스로를 [CHL.GetAdjective]인이라고 부르도록 장려해야 할 때입니다."

 CHL_socialist_youth: "사회주의 청년단"
 CHL_socialist_youth_desc: "청년층 중에는 좌익과 우익으로 급진화된 이들이 많습니다. 특히 사회주의자들은 자신들의 가치를 지키는 데 매우 목소리가 높고 열정적이어서, 우리의 위대한 국가를 위협하는 모든 세력에 맞서 기꺼이 싸울 것입니다."

 CHL_counter_operation_bolivar: "볼리바르 작전 대응 공작"
 CHL_counter_operation_bolivar_desc: "독일이 사악한 볼리바르 작전을 통해 첩보 및 파괴 공작으로 남미 국가들에 영향력을 행사하려 하고 있습니다. 우리는 모든 수단을 동원하여 그들의 공작에 대응해야 합니다."

 CHL_strike_down_south_american_fascism: "남미 파시즘 타도"
 CHL_strike_down_south_american_fascism_desc: "남미에는 파시즘에 매료된 자들이 많습니다. 우리 지역의 안보를 위협하는 자들과 공존하기는 어려우므로, 그들이 해를 끼칠 생각조차 하기 전에 타도해야 합니다."

 CHL_land_reforms: "토지 개혁"
 CHL_land_reforms_desc: "아시엔다-인킬리나헤 제도는 심각하게 시대에 뒤떨어져 있으며, 우리 사회 계급 간의 극심한 분열을 야기하고 있습니다. 우리는 아센다도들의 토지를 재분배하고, 이 야만적인 농노 제도를 영원히 종식시키기 위해 노력해야 합니다!"

 CHL_support_the_democracies: "민주주의 국가 지원"
 CHL_support_the_democracies_desc: "유럽과 아메리카의 민주주의 국가들이 곤경에 처해 있으며, 같은 민주주의 국가로서 가능한 모든 수단을 동원해 그들을 돕는 것이 우리의 의무입니다. 따라서 우리는 동료 민주주의 국가들의 이익을 확보하기 위해 칠레인들을 파견해야 합니다."

 CHL_mapuche_reconcilliation_campaigns: "마푸체 화해 운동"
 CHL_mapuche_reconcilliation_campaigns_desc: "마푸체족은 19세기 아라우카니아 정복 이래로 우리 정부로부터 심한 학대를 받아왔습니다. 우리는 그들의 상황을 개선하고, 동료 칠레 시민들과 함께 평화롭게 살 수 있도록 보장하기 위해 큰 진전을 이루어야 합니다."

 CHL_an_attempt_to_maintain_our_neutrality: "중립 유지 시도"
 CHL_an_attempt_to_maintain_our_neutrality_desc: "세계 분쟁에 휘말린 수많은 국가들이 자신들의 무의미한 다툼으로 만들어진 전쟁에 우리를 끌어들이려 하고 있습니다. 우리는 모든 힘을 다해 그들의 분쟁에 휘말리지 않도록 해야 하며, 우리가 관여해서는 안 될 분쟁에 끼어들지 말아야 합니다."

 CHL_embargo_strategies: "금수 조치 전략"
 CHL_embargo_strategies_desc: "동료 민주주의 국가들을 지원하는 방법에는 단순히 군인을 보내 싸우게 하는 것 이상의 방법이 있으며, 경제적 조치가 그만큼 강력할 수 있다는 것이 시간이 지나며 증명되었습니다. 따라서 우리는 우방의 적들에게 금수 조치를 취하여, 그들이 전쟁을 수행하는 데 필요한 구리와 질산염을 고갈시켜야 합니다."
 CHL_embargo_strategies_tt: "세계의 주요 §Y민주주의§! 국가와 전쟁 중인 모든 국가에 §Y금수 조치§!를 내릴 것입니다."

 CHL_enact_stricter_labor_laws: "더 엄격한 노동법 제정"
 CHL_enact_stricter_labor_laws_desc: "현행 노동법은 제대로 된 민주 사회에 비해 너무 느슨하며, 기업과 자본가들이 칠레의 가난한 노동 계급을 착취할 수 없도록 해야 합니다. 더 평등한 미래를 위하여!"

 CHL_found_national_steelworks: "국립 제철소 설립"
 CHL_found_national_steelworks_desc: "국가는 철강이 절실히 필요하며, 우리 측량사들은 비옥한 아라우카니아 지역에 바로 그것이 있음을 발견했습니다. 따라서 우리는 가용 국가 자원을 활용할 수 있도록 새로운 제철소를 설립하기 위해 노력해야 합니다."

 CHL_found_the_contraloria_general_de_la_republica: "공화국 감사원 설립"
 CHL_found_the_contraloria_general_de_la_republica_desc: "칠레 공화국 감사원은 칠레 정부의 헌법상 자치 기구가 될 것입니다. 감사원은 조직 형태와 관계없이 중앙 집권 및 지방 분권 공무의 모든 활동에 대한 법적 측면, 관리, 사전 감사 및 사후 감사 기능을 통제하며, 법에 의해 부여된 기타 권한도 담당하게 됩니다."

 CHL_establish_the_ministry_of_mining: "광업부 설립"
 CHL_establish_the_ministry_of_mining_desc: "우리나라의 광업 운영을 책임질 국가 부처를 설립하여, 광산의 위치와 운영 방식을 중앙에서 통제해야 합니다."

 CHL_the_nationalization_of_copper: "구리 국유화"
 CHL_the_nationalization_of_copper_desc: "우리나라의 막대한 구리 매장지는 현재 민간 광업 기업이 통제하고 있습니다. 우리는 이 매장지가 우리 정부와 광업부라는 더 합리적인 손에 들어가도록 조치해야 합니다."

 CHL_enforce_stricter_secularism: "더 엄격한 세속주의 시행"
 CHL_enforce_stricter_secularism_desc: "우리는 이미 자유주의 헌법에 세속주의를 확립했지만, 교회는 여전히 국민과 일부 정치인 모두에게 막강한 권력을 행사하고 있습니다. 따라서 우리는 정치에 참여하고자 하는 모든 이에게 정치 활동 시 종교와 거리를 둘 것을 요구해야 합니다."

 CHL_repeal_the_separation_of_church_an_state: "정교분리 폐지"
 CHL_repeal_the_separation_of_church_an_state_desc: "교회와 국가의 분리는 중대한 실수였으며, 가능한 한 빨리 되돌려야 합니다. 우리 모두가 잘 알다시피, 교회는 우리의 동맹입니다."

 CHL_a_joint_application_to_the_allies: "연합국에 공동 가입 신청"
 CHL_a_joint_application_to_the_allies_desc: "우리와 아르헨티나는 옛 연합국과 항상 좋은 관계를 유지해왔으며, 이제는 그들과 합류하여 더 밝은 미래를 위해 협력할 때입니다."

 CHL_dispute_over_tierra_del_fuego: "티에라델푸에고 분쟁"
 CHL_dispute_over_tierra_del_fuego_desc: "아르헨티나 정부는 육로로 연결되어 있지 않음에도 불구하고 티에라델푸에고 동부를 자국 영토라고 계속 주장하고 있습니다. 우리가 해당 영토에 대해 더 오래되고 정당한 영유권을 가지고 있음이 명백합니다. 우리는 즉시 그곳을 확보하기 위해 움직여야 합니다."

 CHL_protect_the_easter_island: "이스터섬 보호"
 CHL_protect_the_easter_island_desc: "현지인들에게 라파누이로도 알려진 이스터섬은 서쪽의 파시스트들에게 끊임없이 위협받고 있습니다. 우리는 섬을 요새화하고 항구를 건설할 뿐만 아니라, 태평양에 대한 영유권을 주장하는 자들을 선제 타격하기 위해 움직여야 합니다."

 form_country_south_america_required_states_tt: "§Y[ROOT.GetName]§!이(가) §Y남아메리카§!의 모든 §Y본토 주§!를 통제합니다!"
 CHL_joint_research_initiatives_tt: "§Y칠레§!와 우리 세력에 속한 모든 국가는 §Y기술 공유 그룹§!에 가입할 것입니다!"

 CHL_the_future_of_Chile: "[CHL.GetName]의 미래"
 CHL_the_future_of_Chile_desc: "현재의 빅 텐트 연합이 모든 사안에 완전히 동의할 수 없는 상황이므로, 공산당은 향후 나아갈 길을 결정하기 위해 회의를 소집해야 합니다. 현재 마르크스주의자 엘리아스 라페르테 가비노, 사회주의자 마르마두케 그로베 바예호, 스탈린주의자 카를로스 콘트레라스 라바르카, 트로츠키주의자 마누엘 이달고 플라사 사이에서 노선이 갈리고 있습니다."

 CHL_support_for_the_international_revolution: "국제 혁명 지원"
 CHL_support_for_the_international_revolution_desc: "자국을 침략하는 외세뿐만 아니라, 부패한 정부와 산업계에 맞서 생계를 위해 싸워야 하는 이들이 많습니다. 우리는 전 세계 인민이 악으로부터 안전하고 보호받는다고 느낄 수 있도록 최선을 다해야 합니다."

 CHL_sponsor_american_revolutions: "아메리카 혁명가 후원"
 CHL_sponsor_american_revolutions_desc: "시도만 한다면 혁명에 성공할 잠재력이 있지만, 목적을 달성할 자금이나 무기가 없는 사람들이 많습니다. 따라서 우리는 그러한 혁명가들을 후원하여 남아메리카에서 자본주의를 몰아내야 합니다."
 CHL_sponsor_american_revolutions_tt: "다른 §Y남아메리카 및 북아메리카§! 국가에서 §Y이념 집회 후원§! 결정을 잠금 해제합니다"

 CHL_union_of_hispanic_republics: "히스패닉 공화국 연합"
 CHL_union_of_hispanic_republics_desc: "이제 모든 히스패닉 인민이 하나의 깃발 아래 단결했으니, 우리의 역량을 세계에 보여주고 외세 제국주의 통치하에 남겨진 우리 동포들을 해방시킬 의도가 있음을 보여줄 때입니다."

 CHL_propose_closer_cooperation: "긴밀한 협력 제안"
 CHL_propose_closer_cooperation_desc: "우리 주변의 공산주의 국가들은 우리와 이념을 공유할지 모르나, 전략적으로 흩어져 있고 협력 체계가 없습니다. 우리는 그들을 우리 영향권 아래로 끌어들여 더 나은 길로 인도해야 합니다."

 CHL_nationalize_foreign_industries: "외국 산업 국유화"
 CHL_nationalize_foreign_industries_desc: "우리나라에 아직 남아있는 자본가들은 우리의 다음 행보를 깨닫고 식은땀을 흘리고 있을 것입니다. 우리는 그들이 소유한 모든 재산을 몰수하여 인민에게 재분배해야 합니다."

 CHL_align_with_the_russian_soviet: "[SOU.GetNameDef](와)과 제휴"
 CHL_align_with_the_russian_soviet_desc: "[SOU.GetNameDefCap]은(는) 가까운 이념적 동지입니다. 우리는 [SOU.GetFactionName]에 가입하는 대가로 상호 지원을 제안하며 그들에게 접근해야 합니다."

 CHL_hub_of_the_world_revolution: "세계 혁명의 중심지"
 CHL_hub_of_the_world_revolution_desc: "세상의 현 상태에 만족하지 못하고, 더 중요하게는 소비에트 연방의 상태에 환멸을 느낀 혁명가들이 많이 있습니다. 우리는 함께 더 위대한 세상을 위해 분투해야 합니다!"
 CHL_hub_of_the_world_revolution_tt: "다른 국가의 공산주의 고문들이 모국의 정치 상황에 따라 [CHL.GetName](으)로 이전해 올 것입니다. 현재 다음 고문들이 [CHL.GetName](으)로 이전해 올 것입니다:"

 CHL_joint_development_programs: "공동 개발 계획"
 CHL_joint_development_programs_desc: "이제 우리는 동맹이 되었으니, 각국의 발전을 위해 상호 협력하여 새로운 공장을 건설하도록 노력해야 합니다."

 CHL_joint_research_initiatives: "공동 연구 계획"
 CHL_joint_research_initiatives_desc: "이제 우리는 동맹이 되었으니, 세계의 자본가와 제국주의자들이 할 수 있는 수준을 뛰어넘는 무기 개발을 촉진하기 위해 상호 협력하여 연구소와 연구 협력 프로그램을 설립하도록 노력해야 합니다."

 CHL_one_more_fascist_focus_done_tt: "쿠데타로 인한 부정적 효과 §G감소§!:\n 전쟁 지지도: §G+5%§!\n 안정도: §G+5%§!"
 CHL_commence_the_counter_revolution_negative_tt: "이전에 선택한 §Y준비 중점§!의 수에 따라 전쟁 지지도와 안정도 감소"
 CHL_propose_closer_cooperation_tt: "§Y남아메리카 및 중앙아메리카§!의 모든 §Y공산주의 국가§!에 우리에게 복종할 것을 요구하는 이벤트를 보냅니다"
 CHL_sway_ariosto_hererra_tt: "§Y아리오스토 에레라§!와 그의 부하들이 우리의 쿠데타에 합류할 것입니다"
 CHL_proliferate_national_populism_tt: "§Y반혁명 개시§! 중점 완료 시:\n정치력 §G+75§!."
 CHL_more_funds_or_the_propaganda_department_tt: "§Y반혁명 개시§! 중점 완료 시:\n인력 §G+5000§!."
 CHL_recruit_young_officers_tt: "특정 청년 장교들이 §Y장군§!으로 진급할 것입니다"
 CHL_enforce_the_chilean_identity_tt: "국민정신 §Y$CHL_ancestral_mapuche_resistance$§!가 제거되면, [950.GetName]의 핵심 주를 되찾습니다."
 CHL_expand_the_department_of_provinces_change_tt: "이전에 획득한 §Y국민정신§!을 수정하며, 이전에 어떤 §Y부서§!가 강화되었는지에 따라 효과가 약간 달라집니다."
 CHL_expand_the_department_of_provinces_coring_tt: "칠레 실지회복주의자들이 영유권을 주장하는 §Y주 통합§! 디시전을 잠금 해제합니다"
 CHL_abide_by_the_francoist_model_tt: "우리는 §R더 이상 세력에 가입할 수 없게 됩니다§!"
 CHL_hipanic_alliance_faction: "히스패닉 동맹"
 CHL_undo_colonialist_occupations_tt: "§Y벨리즈와 파나마 운하 점령§! 디시전을 잠금 해제합니다"
 CHL_press_our_demands_tt: "기아나의 불법 점령자들에게 해당 주에 대한 §Y우리의 소유권 강제§! 요구를 보냅니다"
 CHL_the_latin_american_alliance_tt: "§Y비히스패닉 라틴 아메리카§! 국가들을 우리 세력으로 초대합니다"
 CHL_sponsor_anti_colonialist_rebellions_tt: "§Y남아메리카 및 중앙아메리카§!의 식민지 주에서 저항 세력을 증강시키는 디시전을 잠금 해제합니다"

 CHL_empower_the_preparation_department: "준비부 강화"
 CHL_empower_the_preparation_department_desc: "쿠데타를 최대한 순조롭게 진행하려면, 일반 대중의 지지를 확보하는 것뿐만 아니라, 결국 다가올 그날을 위해 인력, 계획, 병참을 준비해야 합니다."

 CHL_sway_ariosto_hererra: "아리오스토 에레라 포섭"
 CHL_sway_ariosto_hererra_desc: "아리오스토 에레라 장군은 강력한 반사회주의적 성향을 보였지만, 반드시 우리에게 충성하는 것은 아닙니다. 그와 그의 가장 충성스러운 부하들의 지지를 확보하는 것이 현명할 것입니다. 우리 대열에 그와 같은 인물은 분명히 유용할 것이기 때문입니다."

 CHL_inflitrate_the_carabinieros: "카라비네로스 침투"
 CHL_inflitrate_the_carabinieros_desc: "칠레 카라비네로스는 우리를 포함한 모든 반란 세력으로부터 국가를 보호하는 임무를 맡고 있습니다. 만약 그들에게 맞선다면, 분명 피바다가 될 것이지만, 그들의 충성을 얻는다면, 그들은 분명 가장 유용한 말이 될 것입니다."

 CHL_unify_the_fascist_movements: "파시스트 운동 통합"
 CHL_unify_the_fascist_movements_desc: "호르헤 곤살레스 폰 마레스가 칠레 국가사회주의 운동을 확고히 장악하고 있지만, 그를 따르지 않는 비슷한 사상을 가진 다른 집단들이 여전히 존재합니다. 쿠데타가 성공할 수 있도록, 그가 칠레 파시스트들을 위한 전위적인 통합 운동을 이끌도록 촉구해야 합니다."

 CHL_proliferate_national_populism: "민족대중주의 확산"
 CHL_proliferate_national_populism_desc: "민간인들은 다른 무엇보다 중요하며, 특히 쿠데타가 일어난 후 국가를 안정시키려면 더욱 그렇습니다. 필요하다면 비열한 수단을 통해서라도 그들의 지지를 얻어야 합니다!"

 CHL_more_funds_or_the_propaganda_department: "선전부에 추가 자금 지원"
 CHL_more_funds_or_the_propaganda_department_desc: "우리 선전부는 국민들에게 우리가 구원자임을 납득시키기 위해 초과 근무를 하고 있지만, 자금을 지원하지 않으면 효율성을 유지할 수 없습니다. 우리는 쿠데타를 준비하기 위해 부패한 정치인들을 통해 자금을 세탁해야 합니다."

 CHL_request_foreign_support: "해외 지원 요청"
 CHL_request_foreign_support_desc: "우리와 비슷한 이념적 성향을 가진 사람들이 이미 통제하고 있는 국가가 많으며, 그들과 좋은 관계를 유지하는 것이 현명할 것입니다. 이를 통해 우리는 쿠데타를 수행하는 데 도움이 될 무기와 병력을 요청할 수 있습니다."

 CHL_the_popular_freedom_alliance: "인민 자유 동맹"
 CHL_the_popular_freedom_alliance_desc: "국내에는 우리의 이상을 공유하지만 감히 공개적으로 나서서 말하지 못하는 사람들이 있습니다. 따라서 우리는 카를로스 이바녜스 델 캄포 장군을 설득하여 보수적 가치에 호소하면서도 비밀리에 우리를 지지하는 새로운 연합, 인민 자유 동맹(Alianza Popular Libertadora)을 이끌도록 해야 합니다."

 CHL_rally_the_people: "국민 규합"
 CHL_rally_the_people_desc: "쿠데타는 준비가 완료되었습니다. 이제 남은 것은 국민들을 선동하고, 자유주의 정부에게 그들의 시대가 끝나가고 있음을 알리는 것입니다. 이 비참한 국가를 끝장낼 때가 왔습니다!"

 CHL_commence_the_counter_revolution: "반혁명 개시"
 CHL_commence_the_counter_revolution_desc: "우리 군대는 준비를 마치고 간절히 명령을 기다리고 있으며, 산티아고의 모든 주요 거점과 여러 다른 도시의 시청을 점령할 준비가 되어 있습니다. 이제 남은 것은 계획을 실행하고, 이 모든 것이 끝났을 때 우리가 실제로 국민들로부터 얼마나 많은 지지를 받는지 기다려 보는 것입니다."

 CHL_promote_broad_anti_americansim: "광범위한 반미주의 조장"
 CHL_promote_broad_anti_americansim_desc: "미국놈들은 전부 개자식들이야, 그놈들은 우리 피를 하얗게 될 때까지 빨아먹었고, 우리가 가진 모든 것을 당연한 권리인 양 빼앗아갔지, 그렇게 생색을 내면서도 돌려준 건 아무것도 없어, 미국놈들이 우리한테 해준 게 대체 뭐가 있나? 다시 묻겠다, 미국놈들이 우리한테 해준 게 대체 뭐가 있냐고!?"

 CHL_ban_liberalism: "자유주의 금지"
 CHL_ban_liberalism_desc: "우리가 정부에서 자유주의자들을 몰아냈음에도 불구하고, 그들은 무한한 모래알처럼 계속해서 나타납니다. 우리는 그들의 단체를 짓밟고, 다시는 우리의 통치를 위협할 만큼 강력해지지 못하도록 해야 합니다."

 CHL_recruit_young_officers: "청년 장교 모집"
 CHL_recruit_young_officers_desc: "우리나라의 고위직 장성 다수는 좌파 성향을 가졌으며, 우리가 정권을 장악하자 일부를 제외하고 모두 사임했습니다. 우리는 애국적이고 광신적인 청년 장교들을 계급에서 발탁하여, 그들의 늙고 퇴폐적인 상관들을 대체해야 합니다."

 CHL_enforce_the_chilean_identity: "새로운 칠레 정체성 구축"
 CHL_enforce_the_chilean_identity_desc: "현재 칠레 국민은 분열되어 있으며, 우리의 기치 아래 그들을 통합하기 위해 무언가를 해야 합니다. 스페인인, 마푸체인, 칠레인, 그들은 다르지 않습니다. 그들은 모두 우리의 시민이며, 똑같기 때문입니다. 일부는 우리의 메시지를 거부할 수도 있지만, 전반적으로 새로운 칠레 정체성은 대부분을 만족시킬 것입니다."

 CHL_cooperate_with_operation_bolivar: "볼리바르 작전 협력"
 CHL_cooperate_with_operation_bolivar_desc: "하지만 독일인들은 우리를 위해 많은 것을 해주었습니다. 우리가 가장 필요로 할 때, 독일 정착민들이 아라우카니아를 식민화하기 위해 이주해 왔고, 이제 그들은 미국인들을 상대하는 데 도움이 필요합니다. 이를 돕고 우리가 빚진 것을 갚는 것이 우리의 의무입니다."

 CHL_abide_by_the_francoist_model: "프랑코주의 모델 준수"
 CHL_abide_by_the_francoist_model_desc: "독일이 큰 영향을 미칠 수는 있겠으나, 우리 운동이 진정으로 주목해야 할 것은 무솔리니와 프랑코 같은 지중해 사상가들의 이념입니다. 우리가 따라야 할 것은 바로 그들의 모델이며, 그들의 이상을 우리 것으로 만들어야 합니다."

 CHL_host_german_intelligence: "독일 정보부 유치"
 CHL_host_german_intelligence_desc: "볼리바르 작전에서 독일은 남쪽으로부터 미국을 염탐하려 하고 있습니다. 만약 독일이 첩보원을 주둔시키고 압베어가 우리 정부와 더 긴밀히 협력하도록 한다면, 우리는 그들에게 매우 흥미로운 정보를 다량 제공할 수 있을 것입니다."

 CHL_militarize_the_state: "국가 군사화"
 CHL_militarize_the_state_desc: "이전에 큰 전쟁에서 승리한 경험이 있지만, 우리나라는 현재 또 다른 대규모 분쟁에 대비되어 있지 않습니다. 우리 군이 다시 한번 전투 준비 태세를 갖추기를 원한다면, 먼저 국가를 군사화해야 합니다."

 CHL_the_spirit_of_the_war_of_the_pacific: "태평양 전쟁의 정신"
 CHL_the_spirit_of_the_war_of_the_pacific_desc: "우리 군대의 사기를 진작시키려면, 페루와 볼리비아를 상대로 싸웠던 태평양 전쟁 당시의 위대한 업적을 상기시켜야 합니다. 또한 이 기회를 빌어 우리의 독일 동맹이 기꺼이 양도할 수도 있는 특정 지역에 대한 영유권을 재주장할 수 있습니다."

 CHL_syndicalize_the_production_sector: "생산 부문 신디케이트화"
 CHL_syndicalize_the_production_sector_desc: "생산 부문은 현재 비효율성과 자신의 이익만을 생각하는 잔인한 아시엔다 소유주들로 인해 고통받고 있습니다. 우리는 산업을 신디케이트화하여 진정한 팔랑헤주의적 조합주의 산업 모델을 도입해야 합니다."

 CHL_expand_the_mountain_regiments: "산악 연대 증강"
 CHL_expand_the_mountain_regiments_desc: "우리가 보유한 가장 정예인 부대는 전문 산악 연대로, 전국 어디에서든 혹독한 전투에 적합합니다. 우리는 장군들이 이 부대와 함께 순환 근무하며 훈련하는 것을 의무화하고, 그들이 필요로 할 수 있는 모든 전문 장비를 제공해야 합니다."

 CHL_departemento_de_las_tropas_nacistas_de_asalto: "돌격대부"
 CHL_departemento_de_las_tropas_nacistas_de_asalto_desc: "우리의 나시스타 돌격대부는 더욱 대담해지고 강화되어야 합니다. 우리는 그들이 대전쟁 당시 충격군의 정신에 부응하도록 보장하고, 그에 걸맞게 장비를 갖춰주어야 합니다."

 CHL_departamento_de_la_juventad_nacista: "나시스타 청년부"
 CHL_departamento_de_la_juventad_nacista_desc: "독일과 같은 다른 국가들은 청년들을 군사화하는 데 성공했으며, 우리도 마찬가지로 해야 합니다. 현장에 더 많은 인원이 필요하며, 그것도 지금 당장 필요하기 때문입니다."

 CHL_expand_the_department_of_provinces: "지방부 확대"
 CHL_expand_the_department_of_provinces_desc: "지방부는 칠레의 모든 지역을 통제하기 위해 초과 근무를 하고 있습니다. 하지만 우리가 이들을 전폭적으로 지원하고 확장한다면, 해외 영토까지도 더 효과적으로 관리하는 데 활용할 수 있을 것입니다."

 CHL_revoke_the_treaty_of_lima: "리마 조약 폐기"
 CHL_revoke_the_treaty_of_lima_desc: "타크나 지역을 페루에 반환한 1929년 리마 조약에는 정당성이 없었으며, 이 문제에 대해 우리가 강요를 받았다는 것 외에는 다른 설명이 있을 수 없습니다. 이제 모든 것을 바로잡고 해당 영토의 반환을 요구할 때입니다."

 CHL_demand_the_fireland: "불의 땅 요구"
 CHL_demand_the_fireland_desc: "티에라델푸에고는 마땅히 우리의 영토이며, 심지어 연결되어 있지도 않은 아르헨티나는 소유권에 대한 어떠한 정당성도 주장할 수 없습니다. 우리는 주민들에게 해를 끼칠 의도가 없음을 분명히 하고, 아르헨티나의 손아귀에서 이 지역을 되찾아야 합니다."

 CHL_escalate_the_laguna_del_desierto_issue: "라구나 델 데시에르토 문제 격화"
 CHL_escalate_the_laguna_del_desierto_issue_desc: "라구나 델 데시에르토 주변의 경계선은 매우 불분명하며 아르헨티나에 편향되어 있습니다. 우리는 마땅히 우리 것인 지역의 일부를 점령하기 위해 움직여야 하며, 어쩌면 조금 더 나아갈 수도 있을 것입니다."

 CHL_demand_demilitarization_of_patagonia: "파타고니아 비무장화 요구"
 CHL_demand_demilitarization_of_patagonia_desc: "아르헨티나는 파타고니아에 지속적으로 군대를 주둔시켜 우리 국민을 위협하고 있습니다. 이제 그들에게 우리를 내버려 두고 이 지역에서 병력을 철수하도록 요구해야 할 때입니다."

 CHL_enter_patagonia: "파타고니아 진입"
 CHL_enter_patagonia_desc: "만약 아르헨티나인들이 우리를 단 한 순간이라도 믿는다면, 이는 우리가 그들을 속이고 겁주는 데 성공했다는 증거입니다. 이제 우리 군이 파타고니아로 진입하여, 그들이 무엇에 당했는지도 알기 전에 맹렬히 타격해야 할 때입니다."

 CHL_controlled_education: "엄격히 통제된 교육"
 CHL_controlled_education_desc: "아이들이 올바르게 성장하고 우리가 원하는 방식으로 생각하게 하려면, 그들을 모범 시민으로 만들기 위해 우리가 마련한 기준과 규정을 교육이 따르도록 보장해야 합니다."

 CHL_promote_pan_hispanic_rhetoric: "범히스패닉 수사법 장려"
 CHL_promote_pan_hispanic_rhetoric_desc: "우리는 모두 개인이지만, 히스패닉 민족으로서 정신과 혈통으로 단결되어 있습니다. 이제 우리의 타고난 권리를 주장하고 우리 민족을 분열시키려는 제국주의자들을 타도해야 할 때입니다."

 CHL_military_excercises: "군사 훈련"
 CHL_military_excercises_desc: "군은 아직 전투 준비가 완전히 되지 않았으므로, 히스패닉 통일의 날이 왔을 때 쓸모가 있으려면 광범위한 훈련을 받아야 합니다."

 CHL_cultivate_fanaticism: "광신주의 배양"
 CHL_cultivate_fanaticism_desc: "통일이 없다면 남미와 중미 사람들에게 미래는 없으며, 이는 모두에게 알려져야 합니다. 지금 미국인들에게 맞서지 않는다면, 우리는 분명 그들의 교활하고 제국주의적인 손아귀에 떨어질 것입니다. 명예는 히스패닉을 만들고, 우리에게 반대하는 자는 우리의 흉포함을 경험하게 될 것입니다."

 CHL_the_path_to_conquest: "정복을 통한 통일"
 CHL_the_path_to_conquest_desc: "옛 정복자들처럼 영광스러운 정복 행위가 우리 민족을 하나로 모을 것입니다. 그들은 자신이 속한 더 큰 그림을 보지 못하는 이기적이고 좀스러운 민족주의 정부의 통제하에 있기 때문입니다. 우리는 무력으로 히스패닉 민족을 해방해야 합니다!"
 CHL_hispanic_supremacy_pact_faction: "히스패닉 패권 연맹"

 CHL_the_hispanic_alliance: "히스패닉 동맹"
 CHL_the_hispanic_alliance_desc: "우리 민족은 국가가 아닌 우정과 협력으로 단결해야 하며, 오직 동맹을 통해서만 범히스패닉 연합이 존재할 수 있습니다. 우리는 우리의 이상을 공유하는 모든 이에게 손을 내밀어 대의에 대한 그들의 충성을 확보해야 합니다."

 CHL_the_latin_american_alliance: "라틴 아메리카 동맹"
 CHL_the_latin_american_alliance_desc: "범히스패닉주의가 우리가 추구하는 바일지라도, 우리 대륙에는 제국주의의 압제에 맞서 싸우기 위해 우리에게 합류하길 원하는 라틴계 민족이 여전히 존재합니다. 라틴 민족이 단결하면 강하니, 그들을 초대해야 합니다."

 CHL_sponsor_anti_colonialist_rebellions: "반식민주의 반란 후원"
 CHL_sponsor_anti_colonialist_rebellions_desc: "우리와 같은 생각을 하지만, 자신의 미래를 통제하고 이끌어갈 자결권이 없는 이들이 있습니다. 우리는 식민주의 열강의 손아귀에서 그들을 해방시켜야 합니다."

 CHL_joint_development_and_research: "공동 개발 및 연구"
 CHL_joint_development_and_research_desc: "이제 우리가 더 긴밀하게 협력하게 되었으니, 서로에게 투자하고 모든 회원국 출신 연구원들을 받아들여 더 효율적으로 협력할 연구소를 유치할 수 있습니다."

 CHL_push_past_the_darien_gap: "다리엔 갭 너머로"
 CHL_push_past_the_darien_gap_desc: "콜롬비아와 파나마 사이의 다리엔 갭은 건너기 어려울 수 있으나, 미국의 국경에 도달하고 궁극적으로 그곳의 우리 형제들을 해방시키려면 반드시 넘어야 합니다."

 CHL_the_might_to_defend_our_homes: "우리의 조국을 지킬 힘"
 CHL_the_might_to_defend_our_homes_desc: "우리의 삶은 세계 열강에 의해 끊임없이 위협받고 있으며, 국민이 정부로부터 보호받고 있다고 느끼는 것의 중요성은 아무리 강조해도 지나치지 않습니다. 우리는 군사력을 강화하여 전쟁이 결코 우리 문턱까지 닿지 못하도록 해야 합니다."

 CHL_undo_colonialist_occupations: "식민주의자들의 점령 종식"
 CHL_undo_colonialist_occupations_desc: "식민 열강은 너무나 오랫동안 히스패닉 아메리카의 일부를 점령해 왔습니다. 이제 우리가 만만한 상대가 아니라는 것을 보여줄 때입니다. 군대를 투입하십시오!"

 CHL_unite_hispanic_america: "히스패닉 아메리카 통일"
 CHL_unite_hispanic_america_desc: "마침내 때가 왔습니다! 오늘 우리는 히스패닉 아메리카의 대부분이 스페인 제국이 아닌 우리 정부 아래에서 다시 한번 통일되는 역사를 목격하고 있습니다. 기뻐하십시오, 이는 대륙에 새로운 시대가 도래했음을 의미합니다!"

 CHL_the_true_enemy: "진정한 적"
 CHL_the_true_enemy_desc: "미국은 우리 민족의 유일한 진정한 적이며, 너무나 오랫동안 자국 남부의 히스패닉들을 억압해 왔습니다. 이제 마지막 공세를 펼칠 준비가 되었으니, 남은 것은 마지막 한 걸음을 내딛는 것뿐입니다."

 CHL_demand_the_guayanas: "기아나 요구"
 CHL_demand_the_guayanas_desc: "기아나는 너무나 오랫동안 다른 세력에 의해 점령당해 왔습니다. 한때 엘도라도가 있다고 알려졌던 이 지역에 실제로는 없을지 모르나, 우리가 간절히 원하는 다른 많은 부를 간직하고 있습니다."

 CHL_liberate_the_caribbean: "카리브해 해방"
 CHL_liberate_the_caribbean_desc: "카리브해의 모든 지역이 히스패닉이나 라틴 아메리카계는 아닐 수 있으나, 그럼에도 불구하고 우리의 영향권 아래에 두어야 합니다. 우리는 이 섬들을 우리 것으로 확보하기 위해 모든 조치를 취해야 합니다."

 CHL_press_our_demands: "우리의 요구 관철"
 CHL_press_our_demands_desc: "모든 기아나를 장악한 지금, 우리의 요구를 관철하여 제국주의자들의 손아귀에서 이들을 해방시키고, 해당 지역의 이전 점령자들과 평화를 모색할 것입니다."

 CHL_defense_of_the_hemisphere: "반구 방어"
 CHL_defense_of_the_hemisphere_desc: "우리 반구에는 미국으로부터의 보호를 통해 큰 이익을 얻을 국가가 많으며, 이는 우리와 독일이 제공할 수 있는 것입니다."

 CHL_support_the_colonial_plan: "식민 계획 지원"
 CHL_support_the_colonial_plan_desc: "독일 식민청은 과거 우루과이의 국가 기구를 신속하게 장악하고 식민 괴뢰 정부를 세우는 계획을 수립했습니다. 이제 우리는 이 계획을 현실로 만들 힘이 있으며, 우루과이가 우리 동맹에 굴복하고 역사에서 올바른 편을 선택하도록 요구해야 합니다."

 CHL_unite_with_our_brothers_in_hispania: "히스파니아의 형제들과 재통합"
 CHL_unite_with_our_brothers_in_hispania_desc: "옛 히스파니아에 있는 우리의 잃어버린 형제들은 이념적으로 우리와 일치하지만, 어떠한 전쟁에서도 독일 편에 서는 것을 주저하고 있습니다. 우리가 그들이 마침내 독일 세력의 일원이 되도록 등을 떠밀어 줄 수 있습니다."

 CHL_restore_the_old_kingdom: "옛 왕국 복원"
 CHL_restore_the_old_kingdom_desc: "과거 페루 부왕령의 일부였던 칠레 왕국이 영유권을 주장하는 미수복 지역의 모든 영토를 장악한 지금, 우리는 이 영토들을 우리에게 통합하려는 노력을 할 수 있으며, 어쩌면 역사적으로 주장된 국경보다 조금 더 나아갈 수도 있을 것입니다."

 CHL_an_empire_on_the_pacific: "태평양의 제국"
 CHL_an_empire_on_the_pacific_desc: "이제 우리의 황금기가 진정으로 시작되었으니, 시야를 넓혀 서쪽을 바라볼 때입니다. 우리는 태평양 전체에 걸쳐 뻗어나가는 위대한 제국을 건설할 것입니다!"

 CHL_modern_conquistadors: "페드로 데 발디비아의 정복자들"
 CHL_modern_conquistadors_desc: "이제 옛 칠레 왕국이 마침내 복원되었으니, 우리의 혈통을 진정으로 기리고 우리의 첫 총독이자 정복자인 페드로 데 발디비아의 유지를 이어받을 때입니다. 전진하라, 미지의 세계로!"

 CHL_no_more_advisors_tt: "현재 이용 가능한 §Y고문§! 대다수가 §R이용 불가§! 상태가 됩니다."
 CHL_indigenous_union: "아메리카 원주민 연합"
 CHL_carabineros_secured_by_opposition: "카라비네로스가 반대파에게 확보되었습니다."
 CHL_annex_and_core_all_american_subjects: "모든 §Y아메리카 원주민 및 폴리네시아인 종속국§!을 §Y합병§!하고 해당 국가들에 §Y핵심 주§!를 획득합니다."
 CHL_unified_in_spirit_tt: "모든 §Y아메리카 원주민 및 폴리네시아인 종속국§! 또한 이 국민정신을 획득합니다."
 CHL_avenge_the_pacification_tt: "국내의 여러 반-마푸체 세력들이 §Y카를로스 이바녜스 델 캄포§!를 따라 우리를 상대로 §R내전§!을 일으킬 것입니다!"
 CHL_undermine_the_carabineros_de_chile_tt: "§Y내전§!이 시작될 때 이바녜스 측이 추가적인 §Y칠레 카라비네로스§! 사단을 획득하는 것을 막습니다."
 CHL_crusade_against_imperialism_tt: "제국주의의 압제로부터 §Y아메리카 원주민§! 및 §Y폴리네시아인 국가§!를 §Y해방§!시키는 디시전을 잠금 해제합니다."
 CHL_undermine_the_carabineros_de_chile_bonuses_tt: "§Y마푸체 독립 전쟁§!이 시작될 때:\n육군 경험치: §G+25§!.\n기본 전쟁 지지도 획득: §G+5.00%§!."

 CHL_ibanezs_coup: "이바녜스의 쿠데타"
 CHL_ibanezs_coup_desc: "전 대통령이자 장군인 카를로스 이바녜스 델 캄포는 잃어버린 대통령직을 되찾기를 갈망해 왔으며, 이를 확보하기 위해서라면 수상한 거래도 마다하지 않을 것입니다. 따라서 그는 보수파와 파시스트의 연합 쿠데타를 기꺼이 지원할 것입니다, 그들이 국가의 지도자 자리를 약속하는 한 말입니다."

 CHL_address_the_mapuche_conflict: "마푸체 분쟁 해결"
 CHL_address_the_mapuche_conflict_desc: "국가가 불안정하지만, 이바녜스 치하에서 마푸체인들의 상황은 나아지지 않을 것이므로 신속하게 행동해야 합니다. 원주민 운동가이자 정치가인 마누엘 만킬레프는 분열된 여러 마푸체 조직을 모아 통합하기 시작했으며, 칠레 국가를 완전히 전복시키려 하고 있습니다."

 CHL_undermine_the_carabineros_de_chile: "카라비네로스 데 칠레 약화"
 CHL_undermine_the_carabineros_de_chile_desc: "카라비네로스 데 칠레는 한때 카를로스 이바녜스 델 캄포 대통령이 창설했으며, 여전히 그에게 매우 충성스럽습니다. 만약 우리가 주도하는 국가를 세우려 한다면, 그들은 분명히 그의 편에 서서 우리의 길을 가로막을 것입니다. 따라서 우리는 그들이 앞으로 가능한 한 적은 권력을 갖도록 모든 힘을 다해야 합니다."

 CHL_la_corporacion_araucania: "라 코르포라시온 아라우카나"
 CHL_la_corporacion_araucania_desc: "보수주의자이자 조합주의자인 베난시오 코뉴에판 우엔추알이 이끄는 아라우카니아인 조합은, 유명한 아바히노 전쟁 족장의 손자로서, 칠레 국가에 대항하는 데 유용한 동맹이 될 수 있습니다."

 CHL_la_federacion_araucania: "라 페데라시온 아라우카나"
 CHL_la_federacion_araucania_desc: "마푸체 전통주의자 마누엘 아부르토 판길레프가 이끄는 아라우카니아인 연맹은 현대 칠레 사회와 협력하는 것에 매우 반대하며, 우리의 독립 운동에 쉽게 편입시킬 수 있을 것입니다."

 CHL_sociedad_caupolican_defensora_de_la_araucania: "소시에다드 카우폴리칸 데 라 아라우카니아"
 CHL_sociedad_caupolican_defensora_de_la_araucania_desc: "마누엘 만킬레프가 이끄는 아라우카니아의 카우폴리칸 수호회는 현재 가장 큰 마푸체 조직 중 하나이며, 성공적인 혁명의 기반입니다. 이 단체 구성원들의 지지를 얻는 것을 최우선 과제로 삼아야 합니다."

 CHL_union_araucana: "우니온 아라우카나"
 CHL_union_araucana_desc: "우니온 아라우카나는 칠레에서 가장 오래된 마푸체 조직 중 하나입니다. 그들은 아라우카니아에 있는 카푸친회 신부들과의 긴밀한 관계를 통해, 가톨릭 복음화와 칠레 사회로의 통합 의제를 추진해 왔지만, 적절히 설득한다면 우리의 방식을 지지할 것입니다."

 CHL_la_moderna_araucania: "라 모데르나 아라우카니아"
 CHL_la_moderna_araucania_desc: "라 모데르나 아라우카니아는 칠레에서 설립된 최초의 마푸체 조직 중 하나로, 교육과 진보를 강조했습니다. 우리는 그들을 우리 운동에 통합시키기 위해 노력해야 하며, 그들의 전문성을 최대한 활용해야 합니다."

 CHL_electing_a_toqui: "토키 선출"
 CHL_electing_a_toqui_desc: "마푸체 전통에 따라, 토키는 전시 지도자로서 다양한 레우에와 아이야레우에를 이끄는 롱코들의 회의에서 선출됩니다. 이 토키들은 마푸체 사회에서 가장 높은 역할을 맡았으며 전시에는 전사와 롱코들을 이끌었습니다. 이제 우리의 반제국주의 성전을 이끌 새로운 토키를 선출할 때입니다!"
 CHL_electing_a_toqui_tt: "고유한 특성을 가진 지도자를 선출할 수 있게 됩니다 "

 CHL_convene_the_araucanian_congress: "아라우칸 의회 소집"
 CHL_convene_the_araucanian_congress_desc: "독립 전쟁을 시작할 때가 가까워졌으나, 우리 조직 내부에 분열이 있습니다. 어떤 이들은 공산주의자들이 우리와 비슷한 목표를 공유하므로 유용한 동맹이 될 것이라 주장하는 반면, 다른 이들은 그들이 분파주의를 야기하고 결정적인 순간에 우리를 배신할 뿐이라고 주장합니다. 누구를 신뢰해야 할까요?"

 CHL_avenge_the_pacification_of_araucania: "아라우카니아 평정에 대한 복수"
 CHL_avenge_the_pacification_of_araucania_desc: "1861년부터 1883년까지 이어진 칠레의 아라우카니아 점령은 마푸체 역사의 암흑기였으며, 이제 칠레인들이 우리에게 가져온 불의와 전쟁에 대한 복수를 할 때입니다. 무기를 들어라, 용감한 전사들이여! 한때 당신들의 것이었고, 다시 한번 당신들의 것이 될 땅을 되찾으십시오! 킬라판과 카우폴리칸의 유산을 기리십시오!"

 CHL_revise_the_social_classes: "사회 계급 개정"
 CHL_revise_the_social_classes_desc: "이제 우리만의 사회를 다시 갖게 되었으니, 우리의 관점과 이상에 더 잘 맞도록 사회 계급을 재구성할 때입니다. 유럽인들의 시대는 곧 끝날 것입니다!"

 CHL_adopt_mapundungun: "마푸둥군어 채택"
 CHL_adopt_mapundungun_desc: "진정한 마푸체 국가를 재건하는 큰 걸음은 마푸둥군어를 공식 언어로 채택하는 것입니다. 최소한 법정에서라도 사용되어야 합니다. 또한 우리 국민이 우리 언어를 배울 수 있도록 교육을 시작해야 합니다."

 CHL_embrace_indigenous_corporatism: "토착 조합주의 수용"
 CHL_embrace_indigenous_corporatism_desc: "베난시오 코뉴에판 우엔추알의 칠레 토착 수공예 및 건설의 옛 방식에 기반한 조합주의 사상을 수용하여 우리나라 산업의 공식적인 국가 정책으로 삼아야 합니다. "

 CHL_expand_the_agricultural_field: "농업 분야 확장"
 CHL_expand_the_agricultural_field_desc: "베난시오 코뉴에판 우엔추알의 현대적인 사상에도 불구하고, 많은 이들이 농업 기반 사회의 옛 방식으로 돌아가기를 원합니다. 다만 이번에는 개인적으로 자립할 수 없는 이들을 위해 국가의 개입이 더 많은 사회를 원합니다. 우리는 국가 안정을 향상시키기 위해 국민이 원하는 바를 따라야 합니다."

 CHL_focus_on_cattle_and_wool: "소와 양모에 집중"
 CHL_focus_on_cattle_and_wool_desc: "오늘날 우리나라에서 가장 광범위한 축산 분야는 소와 양이며, 이를 바꾸려는 시도는 현명하지 못할 것입니다. 대신 우리는 전국의 농부들이 이러한 동물을 구매하도록 장려해야 합니다."

 CHL_enlarge_the_textile_industries: "섬유 산업 확대"
 CHL_enlarge_the_textile_industries_desc: "섬유는 항상 전국적으로 대량 생산되어 왔으며, 오늘날에도 다르지 않아야 합니다. 국가는 새로운 섬유 산업의 개설에 보조금을 지급하고, 같은 생각을 가진 국가들과 무역로를 구축하려고 노력해야 합니다."

 CHL_silverworking: "은세공"
 CHL_silverworking_desc: "은세공은 항상 마푸체족의 특별한 전통 수공예 중 하나였으며, 고급스럽고 값비싼 은 장신구를 수출하기 쉬울 것입니다. 특히 아르헨티나인들로부터 푸엘마푸를 되찾으면 우리는 풍부한 천연 은 매장량을 보유하게 될 것입니다."

 CHL_incorporate_machi_into_the_army: "군대에 마치 편입"
 CHL_incorporate_machi_into_the_army_desc: "마치는 우리 종교 내의 전통적인 치료사이자 종교 지도자이며, 전통 약초 기술로 알려져 있습니다. 전투에서 우리 군대의 건강을 보장하기 위해 모든 사단에 최소 한 명씩 배치해야 합니다."

 CHL_the_patagonian_giants: "파타고니아의 거인들"
 CHL_the_patagonian_giants_desc: "파타고네스, 또는 파타고니아의 거인들은 파타고니아에 살았다고 전해지는 거인족으로, 초기 유럽인들의 기록에 묘사되었습니다. 이들의 신장은 일반인의 두 배를 족히 넘었다고 합니다. 이러한 소문이 사실이 아닐지라도, 우리 군은 이 거인들의 이미지에 걸맞게 행동하여 적들의 눈에 공포를 심어주어야 합니다."

 CHL_taking_back_patagonia: "[CHL_taking_back_patagonia_key]"
 CHL_taking_back_patagonia_desc: "[CHL_taking_back_patagonia_desc_key]"

 CHL_honor_the_legacy_of_caupolican: "카우폴리칸의 유산을 기리며"
 CHL_honor_the_legacy_of_caupolican_desc: "카우폴리칸은 16세기 마푸체 영토를 침략한 스페인 정복자들에 맞서 민족의 저항을 이끈 토키였습니다. 우리 대륙에서 유럽 제국주의자들을 몰아내고자 한다면, 카우폴리칸과 라우타로와 같은 위인들의 이름에 부끄럽지 않도록 노력해야 합니다."

 CHL_union_of_american_indigenous_peoples: "아메리카 원주민 연합"
 CHL_union_of_american_indigenous_peoples_desc: "전 세계에는 유럽 제국주의에 의해 강제로 복종당하고 고통받은 민족들이 많습니다. 이제 우리가 아메리카 원주민, 이누이트, 폴리네시아인들을 하나의 깃발 아래 통합하여 이 부도덕한 침략자들을 물리치기 위해 노력할 때입니다!"
 CHL_union_of_american_indigenous_peoples_tt: "§Y퀸틴 라메§!를 §Y장군§!으로 잠금 해제합니다."

 CHL_crusade_against_imperialism: "반제국주의 성전"
 CHL_crusade_against_imperialism_desc: "정의의 이름으로 더 넓은 세상과 맞설 준비가 된 때가 마침내 왔습니다! 이제 저 타락한 유럽인들에게 우리가 더는 굴복하지 않을 것임을 보여줄 때입니다. 모두 무기를 들어라, 이번에는 우리가 그들에게 싸움을 걸 것이다!"

 CHL_unified_by_will: "의지로 이룬 통합"
 CHL_unified_by_will_desc: "아메리카 원주민과 폴리네시아인들은 우리의 반제국주의 노력으로 단결했지만, 이것만으로는 부족합니다. 앞으로 수 세기 동안 유럽의 침략을 막으려면, 우리는 유럽인에게 지배받지 않는 국가를 만들겠다는 의지 아래 하나로 뭉쳐 모든 민족을 위한 단일 국가를 형성해야 합니다."

 CHL_unified_in_spirit: "정신으로 이룬 통합"
 CHL_unified_in_spirit_desc: "우리 모두가 공동의 목표를 공유하므로, 잘 닦인 톱니바퀴처럼 원활하게 협력할 수 있습니다. 따라서 국가를 하나로 합치지는 않더라도, 연합군 창설과 더 긴밀한 협력을 위해 계속 노력해야 합니다. 아메리카와 태평양의 민족들은 정신으로 통합되었으며, 언제나 함께할 것입니다!"

 CHL_taking_back_patagonia_kingdom: "왕국 재통일"
 CHL_taking_back_patagonia_kingdom_desc: "우리가 스스로를 새로운 아라우카니아 파타고니아 왕국으로 선포했음에도 불구하고, 사실 왕국의 상당 부분인 파타고니아를 아직 차지하지 못했습니다. 우리가 가진 얼마 안 되는 정통성마저 잃지 않으려면, 가능한 한 빨리 왕국을 재통일하기 위해 노력해야 합니다."

 CHL_taking_back_patagonia_mapuche: "푸엘마푸 수복"
 CHL_taking_back_patagonia_mapuche_desc: "옛 마푸체 지역인 푸엘마푸, 즉 오늘날 아르헨티나 파타고니아의 상당 부분이 여전히 외세의 압제하에 있습니다. 우리 민족을 먼저 성공적으로 해방시키기 전까지는 다른 아메리카 원주민들을 해방시킬 수 없습니다. 따라서 다른 방법이 없으니, 우리는 전쟁을 벌여야만 합니다...."

 CHL_ibanez_as_prime_minister_tt: "§Y카를로스 이바녜스 델 캄포§!를 고문으로 고용합니다"
 CHL_return_to_the_parliamentary_era_tt: "§Y미겔 크루차가 토코르날§!을 고문으로 고용합니다"
 CHL_je_suis_le_deluge_tt: "§Y앙투안 3세§!가 §Y프랑스와 아메리카의 진정한 황제§! 특성을 획득합니다!"
 CHL_the_straight_line_tt: "리네아 렉타가 §Y앙투안 3세§!에 대한 쿠데타를 일으키고 왕국을 §Y카를로스 이바녜스 델 캄포§!에게 넘길 것입니다!"
 CHL_satellite_kingdoms_tt: "§Y위성 왕국 수립§! 관련 디시전을 잠금 해제합니다. 해당 국가들의 역사적 영토를 통제하고 있다면 §Y[INC.GetNameDef]§!, §Y[SUR.GetName]§! 또는 §Y[HAI.GetName]§!을(를) 괴뢰국으로 수립할 수 있는 선택지가 생깁니다."

 CHL_rule_by_decree: "포고령 통치"
 CHL_rule_by_decree_desc: "1927년부터 1931년까지의 첫 번째 임기 동안, 이바녜스는 포고령으로 통치하며 독재 권력을 행사했습니다. 이제 국가를 올바른 방향으로 이끌기 위해 다시 한번 그렇게 해야 합니다."

 CHL_strengthen_the_carabinieros: "카라비네로스 데 칠레 강화"
 CHL_strengthen_the_carabinieros_desc: "카라비네로스 데 칠레는 1927년 바로 이바녜스 자신이 처음 설립했으며, 조직의 상당 부분이 여전히 그에게 매우 충성스럽습니다. 따라서 충성스러운 자들이 조직 내에서 권력을 갖도록 하는 것이 가치가 있을 것입니다."

 CHL_seek_foreign_investments: "해외 투자 유치"
 CHL_seek_foreign_investments_desc: "해외 세력으로부터 차입한 자금을 사용하여 국가 산업을 돕고 재건하는 것은 이바녜스에게 있어 검증된 방법이며, 이번에도 다르지 않습니다."

 CHL_increase_spending_on_public_works: "공공 사업 지출 증대"
 CHL_increase_spending_on_public_works_desc: "알레산드리가 그의 임기 동안 증명한 것이 있다면, 그것은 바로 공공 사업이 경제를 활성화하는 훌륭한 방법이라는 것입니다."

 CHL_alianza_popular_libertadora_as_a_vanguard: "알리안사 포풀라르 리베르타도라"
 CHL_alianza_popular_libertadora_as_a_vanguard_desc: "순전히 독자적으로 통치하기는 어렵기 때문에, 다양한 우익 정당의 고문들과 함께 연립 정부를 구성하여 그들의 의견을 논의의 장으로 가져오는 것이 현명할 것입니다."

 CHL_utilize_national_populism: "국가대중주의 활용"
 CHL_utilize_national_populism_desc: "민중은 잘 속아 넘어가며, 아무리 공허하더라도 그들에게 땅, 부, 또는 영광을 약속하는 것이라면 무엇이든 그들을 당신의 편으로 만들 것입니다. 비록 그들의 지지가 변덕스러울지라도 말입니다."

 CHL_outlaw_socialism: "사회주의 불법화"
 CHL_outlaw_socialism_desc: "이바녜스의 독재에 반대하는 많은 이들이 있지만, 사회주의자들만큼 완강한 자들은 없습니다. 따라서 우리는 가급적 빨리 국가에서 그들을 제거해야 합니다."

 CHL_sell_arica_to_peru: "페루에 아리카 매각"
 CHL_sell_arica_to_peru_desc: "경제 문제를 해결하는 데 도움이 될 막대한 자금을 얻는 한 가지 좋은 방법은 태평양 전쟁 동안 페루인과 볼리비아인으로부터 빼앗은 땅의 일부를 그들에게 다시 팔아넘기는 것입니다."
 CHL_sell_arica_to_peru_civil_war_tt: "§R이 중점을 완료하고 $CHL_outlaw_socialism$ 또는 $CHL_utilize_national_populism$ 중 하나를 완료하면 내전으로 이어질 것입니다.§!"
 CHL_sell_arica_to_peru_civil_war_tt_2: "§R이 중점과 $CHL_sell_arica_to_peru$를 완료하면 내전으로 이어질 것입니다§!"

 
 CHL_crown_antoine_as_sovereign_king: "앙투안을 주권왕으로 옹립"
 CHL_crown_antoine_as_sovereign_king_desc: "자크 앙투안 베르나르가 내전 중인 우리 정부를 돕기 위한 원조와 함께 프랑스에서 돌아왔습니다. 그 대가로 우리는 그에게 권력을 넘겨주고 아라우카니아와 파타고니아의 주권왕 칭호를 부여해야 합니다. 도대체 무슨 문제가 생길 수 있겠습니까?"

 CHL_strike_a_deal_with_the_mapuche: "마푸체족과 협상"
 CHL_strike_a_deal_with_the_mapuche_desc: "오렐리앙투안 1세가 아라우카니아와 파타고니아의 초대 국왕이 될 수 있도록 허락한 것은 바로 마푸체족이었습니다. 그리고 그들과의 유대를 통해 우리는 새로운 마푸체 조직들을 우리 편으로 끌어들일 수 있습니다."

 CHL_request_assistance_in_the_war: "전쟁 지원 요청"
 CHL_request_assistance_in_the_war_desc: "세계에는 또 다른 유럽 친화적인 정부로부터 이익을 얻을 수 있는 여러 국가가 있습니다. 우리 정부의 적을 물리치기 위해 그들의 지원을 구해야 합니다."
 CHL_request_assistance_in_the_war_tt: "수락될 경우 해당 국가는 내전 중에 우리에게 의용군을 보낼 수 있게 되며, 그렇게 할 가능성이 더 높아집니다. "

 CHL_mobilize_the_veteran_legionaries: "숙련된 군단병 동원"
 CHL_mobilize_the_veteran_legionaries_desc: "앙투안 3세 국왕이 신병을 훈련하고 동원하는 것을 돕기 위해 데려온 프랑스 외인부대원들이 이제 전선에서 절실히 필요하며, 그들을 정규군으로 편입하는 것을 신중히 고려해야 합니다."

 CHL_establish_a_royal_guard: "왕실 근위대 창설"
 CHL_establish_a_royal_guard_desc: "어떤 왕도 곁에 수많은 하인과 경호원이 없이는 완전하지 않습니다. 그리고 안타깝게도 앙투안 3세에게는 바로 그것이 부족합니다. 따라서 가능한 한 빨리 왕실 근위대를 창설하는 것을 최우선 과제로 삼아야 합니다."

 CHL_attract_additional_french_investments: "추가 프랑스 투자 유치"
 CHL_attract_additional_french_investments_desc: "원래 앙투안의 칠레 원정에서 큰 기회를 엿보았던 프랑스 사업가와 산업가들은 이제 그의 위대한 업적에 감명받았으며, 미래에 토지를 약속받고 더 많은 지원을 제공하도록 쉽게 설득될 수 있습니다."

 CHL_invite_french_aristocracy: "프랑스 귀족 초청"
 CHL_invite_french_aristocracy_desc: "아시엔다와 인킬리나헤 제도에 관한 국내 문제를 해결하기 위해, 우리는 새로운 프랑스 귀족을 데려와 국가의 귀족 제도가 운영되는 방식을 재구성해야 합니다."

 CHL_ibanez_as_prime_minister: "이바녜스를 총리로"
 CHL_ibanez_as_prime_minister_desc: "앙투안 3세는 이바녜스가 가진 정치적 수완과 지식이 부족하기에 완전히 혼자서 통치할 수 없다는 것은 의심의 여지가 없습니다. 따라서, 군주제는 입헌 군주제여야 합니다."
 CHL_no_deluges_tt: "이것은 나중에 중점 트리에서 §Y나는 홍수다§! 중점을 찍을 수 없도록 §R차단§!합니다"

 CHL_an_absolute_monarchy: "절대 군주제"
 CHL_an_absolute_monarchy_desc: "해야 할 일이 많으며, 통제권을 잡고 국가를 이끌 수 있는 유일한 사람은 국왕입니다. 그렇기 때문에 내각에 더 이상 필요 없으니 모두 집으로 돌아가도 좋다고 알리는 것이 가장 중요합니다."
 CHL_an_absolute_monarchy_tt: "이것은 나중에 중점 트리에서 §Y정도를 걷다§! 중점을 찍을 수 없도록 §R차단§!합니다"

 CHL_approach_the_moderates: "온건파에 접근"
 CHL_approach_the_moderates_desc: "비록 군주제에 반감을 품고 있으나, 이바녜스가 명령한다면 최소한 그를 따를 이들이 국내에 다수 존재하며, 이는 그가 반드시 해야 할 일입니다."

 CHL_introduce_the_franc: "프랑화 도입"
 CHL_introduce_the_franc_desc: "칠레 페소는 약세이며 가치가 하락하고 있을 뿐만 아니라, 구 칠레 체제와도 연관되어 있습니다. 국가의 더 나은 미래를 위해, 이 통화를 대체할 프랑화를 도입해야 합니다."

 CHL_strengthen_control: "통제력 강화"
 CHL_strengthen_control_desc: "현실을 직시하지 못한 채 앙투안의 위대한 체제에 저항하는 나약한 반란군들로부터 각 주의 통제권을 되찾아야 합니다."

 CHL_invite_carlist_refugees: "카를로스파 난민 초청"
 CHL_invite_carlist_refugees_desc: "스페인의 카를로스파는 우리처럼 군주제를 지지하므로 우리와 가깝습니다. 그들이 고향에서 쫓겨난 상황이니, 이곳에 피난처를 제공하여 그들의 호의를 얻을 수 있을 것입니다."

 CHL_expand_the_officer_corps: "장교단 확대"
 CHL_expand_the_officer_corps_desc: "파시스트나 사회주의 이념에 충성하던 많은 장교들이 군을 떠났습니다. 이러한 새로운 인력 부족에 대처하기 위해, 장교단을 확대하고 젊은 장교들을 양성해야 합니다."

 CHL_the_scouts_monarchist_youth_organization: "왕립 스카우트"
 CHL_the_scouts_monarchist_youth_organization_desc: "필요시 젊은이들에게 전시 임무 수행법을 가르치고, 국민에게 생존술과 전투 기술을 교육할 수 있는 준군사조직을 창설해야 합니다."

 CHL_state_catholicism: "국가 가톨릭교"
 CHL_state_catholicism_desc: "구 자유주의 정부는 가톨릭 교회를 국가로부터 분리했는데, 이는 우리가 지금 중대한 죄악으로 여기는 것입니다. 이 엄청난 실수를 즉시 바로잡아야 합니다!"

 CHL_invite_french_academia: "프랑스 학계 초빙"
 CHL_invite_french_academia_desc: "우리 국민이 배우고 위대한 업적을 이루며, 국가가 세계 무대에서 경쟁하는 데 필요한 획기적인 발전을 이루기 위해서는, 본토에서 프랑스 학계를 초빙하여 교육과 조직화를 도와야 합니다."

 CHL_a_new_araucanian_noble_class: "새로운 아라우칸 귀족 계급"
 CHL_a_new_araucanian_noble_class_desc: "현재 상당수의 귀족이 존재하지만, 국가에 대한 투자나 국왕을 위한 봉사에 대한 대가로 국민이 귀족이 될 수 있는 제도를 마련해야 합니다."

 CHL_establish_the_royal_mountaineers: "왕립 산악부대 창설"
 CHL_establish_the_royal_mountaineers_desc: "남부 안데스 산맥은 우리나라의 상징적인 지형이며, 우리 산악부대는 국가의 기반을 이루는 정예 병력입니다. 이 부대를 확장하고, 필요한 모든 장비를 확실히 보급해야 합니다."

 CHL_an_imperial_capital: "제국의 수도"
 CHL_an_imperial_capital_desc: "현재 우리의 수도는 산티아고로, 구 칠레국의 수도와 같은 도시입니다. 수도를 다른 곳으로 이전하는 것이 최선일지 최소한 고려해봐야 합니다."
 CHL_an_imperial_capital_tt: "수도를 §Y산티아고§!로 유지하고 건설 슬롯 §G2§!개를 추가하거나, 수도를 §Y테무코§!로 이전하고 건설 슬롯 §G4§!개를 추가하는 선택지가 주어집니다."

 CHL_satellite_kingdoms: "위성 왕국"
 CHL_satellite_kingdoms_desc: "위대한 나폴레옹은 앙투안에게 큰 영감을 주었으며, 그의 교리는 전 세계 모든 정치가에게도 마찬가지였습니다. 우리는 그가 했던 것처럼, 현지 주민들이 새로운 지배자에 대해 너무 심각하게 생각하지 않도록 더 작은 완충국들을 만들어야 합니다."

 CHL_secure_the_brazilian_border: "브라질 국경 확보"
 CHL_secure_the_brazilian_border_desc: "브라질은 이 대륙에서 우리와 경쟁할 수 있는 몇 안 되는 국가 중 하나입니다. 우리는 그들과의 국경을 확보하여, 때가 되었을 때 가능한 한 쉽게 침공할 수 있도록 해야 합니다."

 CHL_a_new_empire_of_brazil: "새로운 브라질 제국"
 CHL_a_new_empire_of_brazil_desc: "우리는 브라질을 우리 발아래에 두고, 포르투갈 혈통이 아닌 새로운 왕이 통치하는 새로운 브라질 제국을 건설할 것입니다!"

 CHL_ruler_of_the_inca: "잉카의 지배자"
 CHL_ruler_of_the_inca_desc: "옛 잉카 제국은 위대했으며 안데스 산맥의 넓은 지역에 걸쳐 있었습니다. 우리는 이 국가를 재건해야 하지만, 새로운 관리 체제, 즉 우리의 관리 체제 하에서 재건해야 합니다."

 CHL_a_french_alliance: "프랑스어권 통합"
 CHL_a_french_alliance_desc: "프랑스의 우리 왕정주의자 친구들이 정권을 장악했으니, 그들과 동맹을 맺는 것이 현명할 것입니다. 그들은 우리와 같은 의도와 목표, 그리고 같은 유산과 언어를 공유하기 때문입니다. 함께라면, 우리는 무적입니다."

 CHL_return_to_the_continent: "대륙으로의 귀환"
 CHL_return_to_the_continent_desc: "현재 프랑스 체제에는 내재된 약점이 있으며, 우리는 이를 이용하기 위해 여기에 있습니다. 다시 한번 대륙으로 돌아가, 우리의 타고난 권리를 되찾을 때입니다!"

 CHL_joint_invasion_of_mexico: "멕시코 공동 침공"
 CHL_joint_invasion_of_mexico_desc: "이제 새로운 프랑스 제국과 동맹을 확보했으니, 한때 실패했던 일을 다시 실행할 때입니다. 멕시코 제국은 다시 일어서야 합니다. 그렇지 않으면 우리 모두 미국의 힘 앞에 쓰러질 것입니다!"

 CHL_claim_the_mexican_throne: "멕시코 왕위 요구"
 CHL_claim_the_mexican_throne_desc: "멕시코의 왕위는 비록 짧은 기간이었지만 한때 프랑스 황제의 것이었습니다. 우리는 이 사실을 이용하여 우리가 그들의 후손이며, 언제라도 나라를 되찾을 준비가 되어 있다고 주장해야 합니다."

 CHL_the_straight_line: "직선 행보"
 CHL_the_straight_line_desc: "광인 앙투안 3세가 주목받던 시절은 끝났습니다. 이제 직선이 조국에 질서를 재건하고, 이바녜스를 위대한 칠레국의 새로운 왕으로 추대할 때입니다."

 CHL_je_suis_le_deluge: "내가 곧 홍수다"
 CHL_je_suis_le_deluge_desc: "옛날 옛적, 언젠가 대홍수가 올 것이라 했고, 바로 오늘이 그날입니다. 우리가 바로 그 홍수이며, 퇴폐적인 세계 질서를 파괴하고 새로운 시대를 열 자들입니다!"

 CHL_offer_to_protect_pitcairn: "핏케언 제도 보호 제안"
 CHL_offer_to_protect_pitcairn_desc: "현재 [270.GetName]의 방비는 저희가 바라던 것보다 취약하며, 적들이 이곳을 점령하여 이스터 섬, 궁극적으로는 우리 본토까지 침공할 발판으로 삼을 기회를 열어주고 있습니다. 우리 자신의 안전을 위해, 섬의 보호를 제안해야 합니다."

 CHL_a_grand_armada: "대함대"
 CHL_a_grand_armada_desc: "우리를 탄생시킨 옛 위대한 스페인 제국처럼, 카를로스 이바녜스 델 캄포는 영국 왕립 해군, 미 해군, 독일 대양함대에 동시에 맞설 수 있을 만큼 강력한 대함대를 원하며, 그렇게 될 것입니다!"

 CHL_reclaiming_quebec: "퀘벡 수복"
 CHL_reclaiming_quebec_desc: "퀘벡에 있는 우리의 프랑스어권 형제들은 외세의 압제와 점령의 손아귀에서 해방되어야 하며, 세계의 영어권 헤게모니에 맞서는 우리의 전우로서 소중히 여겨져야 합니다. 지금 당장 그들을 해방해야 합니다!"
 CHL_reclaiming_quebec_tt: "결정 잠금 해제: §Y퀘벡 통합§!"

 CHL_work_on_the_pan_american_highway: "범아메리카 고속도로 공사"
 CHL_work_on_the_pan_american_highway_desc: "최근 몇 년간 열린 여러 범아메리카 회의에서, 우리는 남북 아메리카의 형제들과 협력하여 두 아메리카 대륙을 연결하고 이 범아메리카 고속도로 프로젝트를 완수하는 데 돕기로 합의했습니다."
 working_on_the_pan_american_highway: "범아메리카 고속도로 공사 진행"


 #### Brazil ####

 BRA_defense_spending: "국방 예산 증액"
 BRA_defense_spending_desc: "세계는 불길에 휩싸였고, 더는 어떤 나라도 스스로를 안전하다고 여길 수 없습니다. 따라서, 우리는 국가 방위에 대한 지출을 늘려야 합니다. 무기를 생산하는 공장이든, 새로운 요새 건설이든, 그것이 우리가 할 마지막 일이 되더라도 브라질의 주권을 확보할 것입니다!"
 BRA_natal_naval_base: "파르나미링 공항 건설"
 BRA_natal_naval_base_desc: "미국과의 새로운 협력 덕분에, 그들은 주로 자국 자금을 사용하여 우리나라에 공군 기지를 건설하겠다고 제안했습니다. 그 대가로 우리는 미 해군, 미 육군, 영국 공군이 남아메리카와 서아프리카 사이를 비행하는 데 공항을 사용하도록 허가할 것입니다."
 natal_airbase_modifier: "파르나미링 공항 사용 허가"
 BRA_no_fascism_in_south_america: "남아메리카에 파시즘은 없다"
 BRA_no_fascism_in_south_america_desc: "우리가 파시즘에 대해 공공연히 반대하는 입장을 취했으므로, 이제 현재의 위험에 대처하고 사악한 이념으로부터 우리 대륙을 지켜야 할 때입니다. 아니, [BRA.GetNameDef](은)는 당신들의 식민지가 아닙니다!"
 BRA_no_fascism_in_south_america_tt: "§Y남아메리카§!에 있는 모든 §Y파시스트§! 국가에 대한 §Y$puppet_wargoal_focus$§! 전쟁 목표 획득!"
 BRA_no_communism_in_south_america_tt: "§Y남아메리카§!의 모든 §Y공산주의§! 국가에 대한 §Y$puppet_wargoal_focus$§! 전쟁 목표 획득"
 BRA_anti_democracy_in_south_america_tt: "§Y남아메리카§!의 모든 §Y민주주의 및 비동맹§! 국가에 대한 §Y$puppet_wargoal_focus$§! 전쟁 목표 획득"
 BRA_tribunal_de_seguranca_nacional: "국가안보재판소"
 BRA_tribunal_de_seguranca_nacional_desc: "민족해방동맹이 정부 전복에 실패했지만, 그 구성원들은 여전히 거리를 활보하며 국가를 약화시킬 또 다른 기회를 위해 음모를 꾸미고 있습니다. 이러한 범죄자들은 국가 비상사태 기간 동안 군사 법원을 설립하여 더욱 효율적으로 재판하고 선고할 것입니다."
 BRA_ensure_continued_military_support: "군부의 지지 확보"
 BRA_ensure_continued_military_support_desc: "군부의 지지를 유지하는 것은 우리 정권의 장수를 위해 필수적입니다. 국가와 지도급 장교들 사이의 몇 가지 약속으로, 분명 그들을 우리 대의로 끌어들일 수 있을 것입니다."
 BRA_work_with_the_integralists: "통합주의자와 협력"
 BRA_work_with_the_integralists_desc: "통합주의 운동의 목표는 대체로 우리의 목표와 일치하므로, 향후 공산주의자들의 반란에 대비하여 우리 정권을 강화하기 위해 그들의 지지를 얻는 것이 현명할 수 있습니다. 그들의 준군사조직과 뿌리 깊은 민족주의를 바탕으로, 그들은 반혁명의 선봉이 될 것입니다."
 BRA_estado_moderno: "현대 국가"
 BRA_estado_novo_desc: "수년간 내전 직전의 상황에 놓여 있다가, 우리는 마침내 수년간의 정치적 교착 상태를 타개하고 평화, 정의, 노동에 기반한 새로운 국가를 건설할 수 있습니다. 그동안, 우리는 새로운 체제에 반대하는 자들이 더 많은 불화를 퍼뜨리기 전에 그들을 뿌리 뽑을 것입니다."
 BRA_estado_moderno_tt: "§Y$BRA_getulio_vargas$§!이(가) §Y$BRA_fascism_party_long$§!의 지도자가 됩니다."
 BRA_estado_moderno_tt_desc: ""
 BRA_estado_novo: "에스타두 노부"
 BRA_estado_moderno_desc: "국내의 적들이 흩어지고 패배했으므로, 오래된 정치 체제를 쓸어버리고 [BRA.GetName] 국민을 위해 장기적인 평화와 안정을 보장할 수 있는 현대 국가를 선포할 때가 왔습니다."
 BRA_cohen_plan: "코엔 계획"
 BRA_cohen_plan_desc: "선거가 임박하고 유권자들 사이에서 우리의 지지율이 약화됨에 따라, 우리는 다른 수단을 통해 정권의 지속을 보장해야 합니다. 또 다른 공산주의 쿠데타 계획을 조작함으로써, 우리는 국가 안보를 위해 선거를 중단하는 동시에 우리 자신에 대한 지지를 다시 활성화할 수 있습니다."
 BRA_cohen_plan_tt: "§Y$BRA_execute_the_cohen_plan$§! 임무를 잠금 해제하며, 이 중점을 완료한 후 100일 이내에 완료해야 합니다. 임무를 완료하려면 §Y$BRA_estado_novo$§! 또는 §Y$BRA_estado_moderno$§! 중점을 완료해야 합니다. §R임무 완수에 실패하면 쿠데타가 발생합니다!§!"
 BRA_the_polaca: "폴라카"
 BRA_the_polaca_desc: "우리 정권에 심각한 위협을 가할 능력이 있는 자는 거의 남아있지 않지만, 대통령의 권한을 명시하는 새로운 헌법을 제정한다면 우리의 정당성이 높아질 것입니다. 아마도 최근에 제정된 폴란드 헌법에서 영감을 얻을 수 있을 것입니다."
 BRA_anaue: "아나우에!"
 BRA_anaue_desc: "우리 운동은 투피족의 구호인 '아나우에'를 전투 함성으로 채택했습니다. 이 구호는 구성원들의 형제애와 조국 수호에 대한 굳건한 충성심을 함축하게 되었습니다. 아나우에!"
 BRA_anaue_tt: "주에서 집회를 완료한 후 통합주의자 민병대 사단을 모집하는 결정 잠금 해제. \n§Y$militias_officer$§! 특성을 가진 새로운 장군 모집: \n 민병대 방어 §G+5%§! \n 민병대 속도 §G+5%§! \n 민병대 조직력 §G+5%§!"
 BRA_autarky: "브라질의 자급자족"
 BRA_autarky_desc: "월스트리트 붕괴 이후의 경제적 혼란은 전 세계로 퍼져나가 우리 경제를 파괴했습니다. 커피 소비에서 철강 생산에 이르기까지, 우리는 모든 면에서 자급자족해야 하며, 미래의 어떠한 외국의 위기로부터도 우리 자신을 보호해야 합니다."
 BRA_corporatism: "조합주의 수용"
 BRA_corporatism_desc: "노동자와 자본가 사이의 분쟁은 너무 오랫동안 [BRA.GetAdjective] 경제를 약화시켜 왔습니다. 이에 맞서기 위해, 우리는 최근 몇 년간 더 성공적인 많은 유럽 국가에서 볼 수 있었던 조합주의 정책에 기반한 새로운 경제 모델을 도입할 것입니다."
 BRA_departamendo_de_propaganda: "선전부"
 BRA_departamendo_de_propaganda_desc: "최근 10년간의 정치적 혼란은 정부와 국민의 견해가 일치하지 않을 때 어떤 일이 일어날 수 있는지를 너무나 잘 보여줍니다. 더 이상의 혼란을 막기 위해, 우리는 국민들이 우리의 정책에 동조하도록 유도하는 선전부를 설립할 것입니다."
 BRA_departamento_de_ordem_politica_e_social: "정치사회질서부"
 BRA_departamento_de_ordem_politica_e_social_desc: "선전과 강압만으로는 가장 헌신적인 급진주의자나 외국 요원들이 국가에 해로운 활동을 수행하는 것을 막기에 불충분합니다. 따라서 우리는 이러한 위협을 조사할 새로운 비밀경찰 조직이 필요합니다."
 BRA_collective_bargaining: "단체 교섭"
 BRA_collective_bargaining_desc: ""
 BRA_cooperation_in_the_americas: "선린 정책"
 BRA_cooperation_in_the_americas_desc: "프랭클린 루스벨트의 '선린 정책'은 서반구에서 여전히 영향력이 큽니다. 우리는 이 정책을 수용하고 서로의 문제에 간섭하기보다는 미주 국가들과 협력하기 위해 노력해야 합니다."
 BRA_tech_slot_1: "상파울루 대학교"
 BRA_tech_slot_1_desc: "상파울루 대학교는 최근에 설립되었지만, 그 혜택은 이미 [BRA.GetAdjective] 경제 전반에 걸쳐 나타나고 있습니다. 우리는 이 급성장하는 기관에 더 많이 투자하여 이를 활용해야 합니다."
 BRA_reject_cosmopolitanism: "세계주의 거부"
 BRA_reject_cosmopolitanism_desc: "최근의 세계주의 경향은 우리 위대한 국가에 대한 공산주의 간섭을 위한 트로이 목마에 불과합니다. 우리는 [BRA.GetAdjective]이며, 우리의 문화와 이상이 파괴되기 전에 이를 수호해야 합니다."
 BRA_ban_political_parties: "정당 활동 금지"
 BRA_ban_political_parties_desc: "정당은 분열과 혼란을 위한 도구에 불과하다는 것이 증명되었습니다. 정당을 금지하고 제거함으로써, 우리는 급진주의자들이 우리에게 대항하여 조직하는 능력을 억제할 수 있습니다."
 BRA_decree_no_37: "법령 제37호"
 BRA_decree_no_37_desc: "이전 정권은 일부 주가 국가 정치에 과도한 영향력을 행사하여 부패와 국내 분쟁으로 가득했습니다. 따라서 우리는 지역주의의 모든 표현을 단속하고 국가 정부에 권력을 집중시켜야 합니다."
 BRA_establish_psad: "DASP 설립"
 BRA_establish_psad_desc: "우리 정부의 정책을 실행할 수 있게 하는 국가 기구는 낡고 진부해졌습니다. 우리는 국가를 더 효과적으로 통치하고 경제적 효율성을 유지하기 위해 공공 서비스 행정부(DASP)를 설립할 것입니다."
 BRA_federal_employment_plan: "연방 고용 계획"
 BRA_federal_employment_plan_desc: "대량 실업은 지속적인 급진주의와 폭력으로 이어질 것입니다. 이를 막기 위해, 우리는 국영 산업과 새로운 기반 시설 프로젝트를 창출하여 고용 기회를 확대할 것입니다."
 BRA_secure_our_borders: "국경 확보"
 BRA_secure_our_borders_desc: "우리는 국경 너머에 우리 위대한 국가를 고립시키고 파괴하려는 적들에게 둘러싸여 있습니다. 국내 상황이 통제되고 있으니, 이제 외교 문제에 주의를 기울이고 국가 안보를 보장하기 위한 책략을 시작할 때입니다."
 BRA_ethical_internationalism: "윤리적 국제주의"
 BRA_ethical_internationalism_desc: "가장 위대한 국가조차도 국민에게 모든 것을 창조하고 공급할 수는 없습니다. 우리 국민의 평화와 번영을 확보하기 위해, 우리는 같은 생각을 가진 국가들과 상호 이익이 되는 경제적 파트너십을 바탕으로 외교 정책을 구축해야 합니다."
 BRA_brazil_integral: "통합 브라질"
 BRA_brazil_integral_desc: "이 순간에 도달하기까지 수년이 걸렸지만, 우리는 마침내 국가에 대한 지배력을 공고히 하고 낡고 쇠퇴한 공화주의 방식의 마지막 흔적을 제거했습니다."
 BRA_in_vargas_we_trust: "우리는 바르가스를 믿는다"
 BRA_in_vargas_we_trust_desc: "$BRA_getulio_vargas$는 지도력의 폭풍을 헤쳐나갈 수 있는 유능한 정치인임을 증명했습니다. 더욱이, 그는 우리 당의 정책을 채택함으로써 현명한 지도자임을 증명했습니다. 당내 많은 이들은 이제 그가 국가를 더욱 위대한 경지로 끌어올릴 운명이라고 믿습니다."
 BRA_departamento_feminino: "여성부"
 BRA_departamento_feminino_desc: "남편과 아버지들만큼 애국적이고 충실한 여성들이 무수히 많습니다. 우리는 그들에게 우리 운동에 참여하고 [BRA.GetAdjective]의 위대함을 회복하기 위해 함께 일할 기회를 주어야 합니다."
 BRA_integrity_of_the_fatherland: "조국을 위하여"
 BRA_integrity_of_the_fatherland_desc: "$BRA_getulio_vargas$는 유용한 정치적 동맹이었지만, 그는 권력에만 관심이 있고 진정한 통합주의자가 아닙니다. 전국에 걸친 우리의 폭넓은 지지를 바탕으로, 우리는 대통령을 축출하고 $BRA_plinio_salgado$와 같은 진정한 신봉자를 그 자리에 앉히기 위한 조치를 취해야 합니다."
 BRA_no_communism_in_south_america: "남아메리카에 공산주의는 없다"
 BRA_no_communism_in_south_america_desc: "1935년 혁명 시도에서 우리가 목격했듯이, 공산주의자들은 신뢰할 수 없으며, 우리는 이를 정당하게 진압했습니다. 우리 국가의 미래를 보장하기 위해, 우리는 가까운 외국의 전복 세력들을 조만간 처리해야 합니다!"
 BRA_defense_of_the_fatherland: "조국 방어"
 BRA_defense_of_the_fatherland_desc: "우리의 야망은 현재 국경을 훨씬 뛰어넘지만, 그럼에도 불구하고 그 누구도 우리의 본토를 위협할 수 없도록 만전을 기해야 합니다. 브라질 만세!"
 BRA_german_subs: "독일 잠수함 개발 계획"
 BRA_german_subs_desc: "독일과 협력함으로써, 이전까지 현대화에 어려움을 겪었던 부문에서 그들의 기술을 활용할 수 있게 되었습니다. 그중 하나가 바로 잠수함전 분야입니다. 우리는 새로 얻은 동맹을 활용하여, 카보베르데 평원을 장악할 것입니다! "
 BRA_german_sub_initiative: "독일 잠수함 정보 교환"
 BRA_german_tanks: "독일 전차 획득"
 BRA_german_tanks_desc: "독일의 편에 선 덕분에, 이제 우리는 독일의 판처와 유사한 전차의 연구 및 생산에 필요한 설계도와 세부 정보를 더 쉽게 획득할 수 있을 뿐만 아니라, 그들로부터 해당 차량을 쉽게 구매할 수도 있습니다. 연기나는 코브라 부대는 적들의 심장에 공포를 심어줄 것입니다!"
 BRA_german_tanks_tt: "[GER.GetAdjective] §Y4호 전차 A형 - 중형전차§! §Y200대§! 획득"
 BRA_German_tank_exchange: "독일 전차 정보 교환"
 BRA_italian_trucks: "이탈리아와의 공동 차량 개발"
 BRA_italian_trucks_desc: "우리는 최신 자동차의 개발 및 생산에 관한 이탈리아의 전문 지식을 습득하려 노력해야 할 뿐만 아니라, 이탈리아제 트럭을 주문하고 즉시 선적을 요청해야 합니다."
 BRA_italian_trucks_mio_tt: "§Y$ITA_fiat_organization$§! 군수산업체 잠금 해제."
 BRA_italian_air_mio_tt: "§Y$ITA_fiat_aviazione_organization$§! 군수산업체 잠금 해제."
 BRA_ford_mio_tt: "§Y$USA_ford_motor_company_organization$§! 군수산업체 잠금 해제."
 BRA_italian_truck_exchange: "이탈리아 차량화 정보 교환"
 BRA_italian_aircraft: "이탈리아 항공기 개발 계획"
 BRA_italian_aircraft_desc: "이탈리아와 협력함으로써, 이전까지 현대화에 어려움을 겪었던 부문에서 그들의 기술을 활용할 수 있게 되었습니다. 그중 하나가 바로 항공기 분야입니다. 이탈리아의 기술을 이용하여, 우리는 남아메리카의 하늘을 지배할 것입니다!"
 BRA_Italian_plane_exchange: "이탈리아 항공기 정보 교환"
 BRA_support_rural_folk: "빈자의 아버지" 
 BRA_support_rural_folk_desc: "국가 농촌 지역에 거주하는 [BRA.GetAdjective]인들은 수십 년간 정치인들에게 잊혀 왔습니다. 이러한 지역에 투자함으로써, 우리는 고용과 기반 시설을 늘리는 동시에 이 거대한 인구 집단의 지지를 얻을 수 있습니다."
 BRA_support_the_landowners: "설탕 남작 지원"
 BRA_support_the_landowners_desc: "설탕에 대한 세계적인 수요는 수십 년간 계속해서 확대되어 왔으며, 그 결과 [ROOT.GetNonIdeologyName]에서 해당 작물을 재배하는 부유한 지주 계급이 '설탕 남작'으로 알려지게 되었습니다. 우리는 소작농들 사이에서 일어나는 토지 개혁 요구를 묵살하여 그들의 환심을 사야 합니다."
 BRA_washington_accords: "[USA.Capital.GetCapitalVictoryPointName] 협정"
 BRA_washington_accords_desc: "미국의 군사적 보장을 대가로, 우리는 공동의 가치를 수호하는 그들을 지원하기 위해 전쟁 물자 생산에 경제력을 집중할 것입니다."
 BRA_washington_accords_tt: "[USA.GetNameDef]이(가) 협정에 동의할 경우:"
 BRA_disrupt_operation_bolivar: "볼리바르 작전 방해"
 BRA_disrupt_operation_bolivar_desc: "구세계의 국가들은 오랫동안 남아메리카의 문제에 간섭해 왔습니다. 과거에는 군인과 포함을 보냈지만, 이제는 정보 요원을 보냅니다. 우리는 더 이상 이러한 활동을 못 본 체할 수 없으며, 국경 내의 모든 정보 요원을 소탕해야 합니다."
 BRA_potenji_river_conference: "포텐지강 회담"
 BRA_potenji_river_conference_desc: "전쟁을 위해 경제를 준비하는 데 많은 노력이 들었지만, 이제는 우리의 [USA.GetAdjective] 동맹에 합류하여 서반구 방어에 전념할 때가 왔습니다. 비록 전 세계의 위협에 대처해야 할지라도 말입니다."
 BRA_potenji_river_conference_tt: "§Y[ROOT.GetFlag][ROOT.GetNameDefCap]이(가) [USA.GetFlag][USA.GetNameDef]와(과) 같은 세력에 가입합니다§! §R\n또한 현재 [USA.Getflag][USA.GetAdjective]의 모든 적에게 전쟁을 선포하게 됩니다!§!"
 BRA_smoking_cobras: "코브라스 푸만치스"
 BRA_smoking_cobras_desc: "많은 이들이 우리 군이 실제로 전선에 도달하는 것보다 뱀이 파이프 담배를 피우는 것이 더 가능성 있다고 말했습니다. 이제 우리의 적들은 그 칭호를 명예의 훈장으로 채택한 병사들의 끈기와 전문성을 두려워합니다. "
 BRA_senta_a_pua: "센타 아 푸아!"
 BRA_senta_a_pua_desc: "최근 우리 조종사들은 함성을 개발한 것 같습니다. 이를 통해 그들의 비할 데 없는 흉포함과 승리에 대한 헌신을 한 구절에 담을 수 있게 되었습니다. 센타 아 푸아!"
 BRA_reach_out_to_our_neighbors: "이웃 국가와의 교류"
 BRA_org_american_states_faction: "미주 기구"
 BRA_reach_out_to_our_neighbors_desc: "우리는 대륙에서 유일하게 포르투갈어를 사용하는 국가라는 이유로 오랫동안 이웃 국가들과 고립되어 왔습니다. 이제는 그들을 의심의 눈초리로 대하기보다는, 손을 내밀어 더 나은 관계를 구축하려 시도할 때일지도 모릅니다."
 BRA_rio_conference: "리우 의정서"
 BRA_rio_conference_desc: "최근의 분쟁으로 우리 지역의 오랜 국경 분쟁이 악화되었습니다. 이 분쟁이 더 격화되기 전에, 남미 국가들은 함께 모여 외교적으로 해결해야 합니다. "
 BRA_organization_of_american_unity: "미주 기구"
 BRA_organization_of_american_unity_desc: "최근 몇 년간 우리의 국내 정책은 성공적이었습니다. 이제는 외교 문제로 눈을 돌려 미주 단결 기구를 통해 반구 전역의 협력을 증진할 때입니다."
 BRA_organization_of_american_unity_tt: "초국가적 조직인 §Y미주 기구§!에 다른 국가를 초대하는 결정을 잠금 해제합니다."
 BRA_org_american_unity_warning_tt: "§R기구의 회원국은 공격받는 다른 회원국을 방어하도록 소집될 것입니다. 도움이 필요한 회원국을 방어하지 못하거나 동료 회원국에 전쟁을 선포할 경우, 기구에서 추방될 것입니다!§!"
 BRA_financial_stimulation_tt: "결정을 통해 농촌 주의 §Y지역 건설 속도§!, §Y최대 공장 수§! 및 §Y지역 가용 자원§!을 §G20%§!만큼 증가시킬 수 있습니다."
 BRA_coffee_crisis_aftermath: "커피 위기의 여파"
 BRA_coffee_crisis_aftermath_desc: "대공황은 주로 커피 수출에 대한 과도한 의존으로 인해 브라질 경제를 파탄 냈습니다. 경제를 회복하기 위한 노력이 있었지만, 그 일을 마무리하는 것은 우리의 몫입니다. 우리는 산업을 재활성화하고 대륙의 경제 강국이 될 것입니다."
 BRA_radio_nacional: "라지우 나시오나우"
 BRA_radio_nacional_desc: "많은 국가들이 전파를 통해 대중에게 사실적인 콘텐츠와 오락을 제공하기 위해 국영 방송 기관을 설립하기 시작했습니다. 우리는 우리 자신의 라지우 나시오나우를 설립하여 그러한 노력에서 뒤처지는 것을 피할 것입니다. "
 BRA_desenvolvimentismo: "데젠보우비멘투"
 BRA_desenvolvimentismo_desc: "사람들을 다시 일터로 돌려보내고 수출이 다시 활성화되기를 원한다면, 경제 성장에 시동을 걸어야 합니다. 우리는 새로운 산업을 창출하고 사람들이 금융 서비스에 더 쉽게 접근할 수 있도록 함으로써 이를 달성할 것입니다."
 BRA_promote_resource_extraction: "자원 추출 장려"
 BRA_promote_resource_extraction_desc: "우리나라는 풍부한 천연자원을 축복받았습니다. 더 큰 경제 성장과 독립을 촉진하기 위해, 우리는 산업을 위한 현대적인 추출 장비에 투자할 것입니다. "
 BRA_companhia_siderurgica_nacional: "컴파니아 시데루르지카 나시오나우"
 BRA_companhia_siderurgica_nacional_desc: "철강은 수많은 산업에서 중요한 자원이 되었지만, 국내 생산량은 수요를 충족시키기에 불충분합니다. 따라서 우리는 해외에서 수입하는 대신, 최첨단 기계를 갖춘 국영 제철 회사를 설립할 것입니다."
 BRA_stimulate_the_civilian_economy: "경제 활성화"
 BRA_stimulate_the_civilian_economy_desc: "국내 상품 생산이 여전히 불충분하여 수입품 구매를 위해 국가의 자금이 유출되고 있습니다. 우리는 우리 자신의 산업을 확장하여 이를 억제해야 합니다."
 BRA_domestic_arms_industry: "국내 군수 산업"
 BRA_domestic_arms_industry_desc: "국제 정세가 점점 더 긴박해지고 있으며, 이로 인해 세계의 주요 무기 생산국들이 장비 수출을 제한하고 있습니다. 군사력을 최고 수준으로 유지하려면 우리 자신의 군수 산업을 신속하게 발전시켜야 합니다."
 BRA_war_production: "전시 생산"
 BRA_war_production_desc: "전쟁의 불길이 전 세계로 빠르게 번지고 있습니다. 만약 그 불길이 우리 땅에 닿는다면, 우리는 산업을 자동차와 토스터 생산에서 전차와 폭탄 생산으로 신속하게 전환할 수 있어야 합니다."
 BRA_deal_with_the_cangaceiro: "캉가수 처리"
 BRA_establish_trade_relationships: "$CHL_establish_trade_relationships$"
 BRA_establish_trade_relationships_desc: "$CHL_establish_trade_relationships_desc$"
 BRA_reach_out_to_the_great_powers: "$ARG_reach_out_to_the_great_powers$"
 BRA_reach_out_to_the_great_powers_desc: "$ARG_reach_out_to_the_great_powers_desc$"
 BRA_deal_with_the_cangaceiro_desc: "캉가수는 오랫동안 우리를 괴롭혀 온 눈엣가시에 지나지 않는 산적입니다. 이제 북부에서 이 눈엣가시를 영원히 뿌리 뽑을 때입니다."
 BRA_deal_with_the_cangaceiro_tt: "§Y$BRA_deal_with_the_cangaceiro$§! 디시전을 잠금 해제하여 해당 주에서 캉가수를 제거합니다."
 BRA_consolidation_of_labor_laws: "노동법 통합"
 BRA_consolidation_of_labor_laws_desc: "현행 노동법은 노동자를 거의 보호하지 못하며, 이는 필연적으로 사업주와의 불화와 파업으로 이어집니다. 이처럼 위태로운 시기에, 우리는 이러한 파업이나 볼셰비키 침투의 위험을 감당할 수 없습니다. 따라서 우리는 법을 통합하여 노동자와 자본가 사이의 균형을 찾을 것입니다."
 BRA_consolidation_of_labor_laws_fallback_tt: "이전 중점 선택에 따라, §Y$BRA_estado_novo_modifier$§! 또는 §Y$BRA_estado_moderno_modifier$§! 국가 정신을 다음과 같이 변경합니다:"
 BRA_promote_immigration_to_brazil: "이민 장려"
 BRA_promote_immigration_to_brazil_desc: "[BRA.GetName]은(는) 전 세계에 조상을 둔 사람들로 이루어진 다양한 국가입니다. 경제가 다시 성장하고 개발을 기다리는 풍부한 자원이 있는 지금, 더 많은 사람이 이곳으로 이주하여 스스로를 [BRA.GetAdjective]인이라 부르도록 장려할 때입니다."
 BRA_promote_immigration_to_brazil_tt: "§Y$JUNO_promote_immigration_cat$§! 디시전을 잠금 해제하여 주를 개선합니다."
 BRA_pact_of_silence: "침묵의 협정"
 BRA_pact_of_silence_desc: "국가는 흥하고 망합니다. 최근 많은 국가가 몰락하면서, 고향이라 부를 더 안전한 해안을 찾는 모든 분야의 전문가가 넘쳐나고 있습니다. 그들의 전문 지식으로 이익을 얻을 수만 있다면, 그들의 출신을 눈감아 줄 수도 있을 것입니다. "
 BRA_national_petroleum_council: "국영 석유 위원회"
 BRA_national_petroleum_council_desc: "들판의 트랙터부터 해안을 지키는 전함에 이르기까지, 석유는 현대 기계의 생명선이 되었습니다. 이처럼 중요한 자원에 의존하는 것은 국가 안보에 위협이 됩니다. 이 위험을 완화하기 위해, 우리는 국내 석유의 발견과 추출을 감독할 국영 석유 위원회를 설립할 것입니다."
 BRA_batalha_do_borracha: "Batalha da Borracha"
 BRA_batalha_do_borracha_desc: "[BRA.GetNameDefCap]은(는) 한때 세계 고무 공급을 지배했으나, [ENG.GetAdjective]이(가) 제국 전역에 자신들만의 광대한 플랜테이션을 조성하면서 상황이 바뀌었습니다. 그들의 보급선이 위협받는 지금, 세계는 다시 한번 이 귀중한 자원을 공급해 줄 우리를 주목하고 있습니다. "
 BRA_invest_in_road_infrastructure: "도로 기반 시설에 투자"
 BRA_invest_in_road_infrastructure_desc: "자동차와 트럭은 경제 발전에 점점 더 중요해지고 있습니다. 하지만, 우리의 도로망은 국가적 규모의 차량 대량 보급을 지원할 만큼 충분히 발달하지 않았습니다. 따라서 우리는 경제가 정체되기 전에 대규모 고속도로 건설 프로그램에 투자해야 합니다."
 BRA_invest_in_railways: "철도에 투자"
 BRA_invest_in_railways_desc: "기차는 여전히 장거리에 걸쳐 사람과 물자를 대량으로 수송하는 가장 경제적인 방법입니다. 따라서 우리는 철도망을 확장하고 현대화하는 동시에, 우리만의 기차를 개발하는 데 투자해야 합니다. "
 BRA_invest_in_ports: "항구에 투자"
 BRA_invest_in_ports_desc: "우리는 국내에서 경제적 필요를 충족시키는 데 큰 진전을 이루었으며, 이제 경제 성장을 촉진하기 위한 수단으로 다시 한번 수출에 눈을 돌릴 수 있을 정도입니다. 이를 위해, 우리는 국가의 주요 항구에 투자해야 합니다."
 BRA_fabrica_nacional_de_motores: "Fábrica Nacional de Motores"
 BRA_fabrica_nacional_de_motores_desc: "자동차는 복잡한 기계이므로 수입하는 데 많은 비용이 듭니다. 이는 장기적으로 우리 경제 성장의 발목을 잡을 가능성이 있습니다. 이를 방지하는 가장 좋은 방법은 우리만의 국산 차량을 개발하는 것입니다."
 BRA_expand_fordlandia: "포드랜디아 확장"
 BRA_expand_fordlandia_desc: "포드 자동차 회사는 고무 생산을 위한 산업 기지 역할을 할 수 있는 정착지를 아마존에 설립하는 데 투자했습니다. 이 프로젝트는 최근 몇 년간 경제적 혼란으로 인해 주춤했지만, 어쩌면 지금이 프로젝트를 다시 시작할 때일지도 모릅니다."
 BRA_fordlandia_name: "포드랜디아"
 BRA_banco_do_brasil: "브라질 은행"
 BRA_banco_do_brasil_desc: "대공황 이래로 중앙은행이 경제에 통화를 발행하고 공급을 통제하는 것의 이점은 명백해졌습니다. 브라질 은행은 오랫동안 그러한 역할을 수행해 왔지만, 이제는 그 협정을 공식화할 때입니다."
 BRA_federal_development: "[BRA_federal_development_key]"
 BRA_imperial_development_key: "제국 개발"
 BRA_wealth_redistribution_key: "부의 재분배"
 BRA_land_reform_key: "토지 개혁"
 BRA_federal_development_key: "연방 개발"
 BRA_federal_development_desc: "모두가 노력의 결실을 거둘 수 있도록 경제 개발은 전국에 걸쳐 이루어져야 합니다. 따라서 우리는 산업 생산품뿐만 아니라 산업 시설의 위치도 다각화해야 합니다."
 BRA_centralize_development: "새 수도 건설"
 BRA_centralize_development_desc: "현재 수도는 국가의 외딴 지역과 너무 멀리 떨어져 있어 분노와 분리주의를 야기합니다. 양쪽 모두의 장점을 취하기 위해, 우리는 국가의 심장부에 모두가 더 쉽게 접근할 수 있는 새로운 수도를 건설할 것입니다. "
 BRA_new_capital: "브라질리아"
 BRA_centralize_development_tt: "새 수도의 이름은 §Y'$BRA_new_capital$'§!입니다!"
 BRA_financial_stimulation: "금융 부양책"
 BRA_financial_stimulation_desc: "우리는 최근 몇 년간 새로운 산업과 기반 시설 프로젝트를 설립하여 강력한 경제의 기틀을 마련했습니다. 성장을 유지하기 위해, 우리는 중앙은행과 국영 산업의 지렛대를 당기기만 하면 됩니다. "
 BRA_resource_extraction_bonus: "자원 추출 보너스"
 BRA_oil_industry_bonus: "석유 산업 보너스"
 BRA_industry_bonus: "경제 부양 보너스"
 BRA_electronics_bonus: "전자공학 보너스"
 BRA_invest_in_railways_bonus: "철도 보너스"
 BRA_nacional_de_motores_bonus: "나시오나우 지 모토리스 보너스"
 BRA_boost_integralist_support_tt: "국가의 주요 도시에서 파시스트 지지도를 높이는 §Y통합주의자 집회§! 디시전을 잠금 해제합니다."
 BRA_domination_of_the_americas: "아메리카의 지배"
 BRA_domination_of_the_americas_desc: "문 앞에 수많은 적들이 있는 한 우리는 결코 완전히 안전할 수 없습니다. [BRA.GetAdjective] 구원의 유일한 길은 우리가 이 지역의 확실한 강대국이 되는 것입니다."
 BRA_berlin_accords: "베를린 협정 체결"
 BRA_berlin_accords_desc: "[USA.GetNameDefCap]은 오랫동안 아메리카 다른 국가들의 문제에 간섭해 왔습니다. [GER.GetNameDef]과 동맹을 맺음으로써, 우리는 미래에 있을 [USA.GetAdjective]의 내정 간섭에 대한 전략적 억지력을 얻을 수 있습니다."
 BRA_accords_tt: "그들이 협력에 동의할 경우:"
 faction_name_bra_ger: "베를린-리우 조약"
 faction_name_bra_ita: "로마-리우 조약"
 BRA_expand_operation_bolivar: "볼리바르 작전 확장"
 BRA_expand_operation_bolivar_desc: "[GER.GetAdjective]은 남아메리카에서 경제 및 정치 활동을 감시하는 대규모 첩보 작전을 수행해 왔습니다. 우리는 정보 협력 강화를 대가로 작전 확장을 도와달라는 요청을 받았습니다."
 BRA_guyana_crisis: "가이아나 위기"
 BRA_guyana_crisis_desc: "유럽 열강의 시선이 세계 다른 곳으로 향한 틈을 타, 기아나에 위치한 영토를 우리에게 양도하도록 강요하거나, 전쟁에서 또 다른 전선을 감수하게 만들 기회가 찾아왔습니다."
 BRA_provoke_argentina: "아르헨티나 도발"
 BRA_provoke_argentina_desc: "분명 [ARG.GetName]은(는) 우리를 고립시키고 파괴하려 하지만, 이를 막기 위해 너무 성급하게 행동하면 [USA.GetName]의 분노를 살 수 있습니다. 대신 [ARG.GetAdjective] 측이 먼저 공격하도록 도발하여, 마침내 시스플라티나 전쟁의 복수를 이룰 것입니다!"
 BRA_form_mercosul: "메르코수르 결성"
 BRA_faction_mercosul_name: "메르코수르"
 BRA_form_mercosul_desc: "남아메리카는 오랫동안 [USA.GetName]이나 유럽 제국과 같은 외부 세력의 영향력 아래에 있었습니다. 하지만 대륙의 국가들이 단일 경제 및 정치 블록으로 뭉친다면, 누구도 감히 우리 대륙에 다시는 간섭하지 못할 것입니다."
 BRA_form_mercosul_focus_tt: "다른 남아메리카 국가들을 메르코수르에 초대하는 디시전 잠금 해제"
 BRA_uruguay_ultimatum: "우루과이 최후통첩"
 BRA_uruguay_ultimatum_desc: "[URG.GetNameDefCap]은(는) 오래전에 [BRA.GetName]에 통합되었어야 했지만, 우리 조상들은 그렇게 하지 못했습니다. 이제 이 역사적 실수를 바로잡고 공동의 대의 아래 우리 국민을 단결시킬 때입니다."
 BRA_paraguay_intervention: "파라과이 개입"
 BRA_paraguay_intervention_desc: "[PAR.GetNameDefCap]은(는) 너무 불안정하고 예측 불가능해졌습니다. 우리 자신의 국가 안보를 위해, 우리는 그들의 국정에 개입하여 정부를 안정시켜야 합니다."
 BRA_rome_accords: "로마 협정 체결"
 BRA_rome_accords_desc: "우리는 역사적으로 [ITA.GetName]에서 [BRA.GetName](으)로 이주해 온 사람들 덕분에 오랫동안 강한 유대 관계를 맺어왔습니다. 세계가 변화하기 시작하고 우리 정부들의 입장이 더욱 비슷해짐에 따라, 양국 간의 파트너십을 공식화하는 것이 타당합니다."
 BRA_italian_car_industry: "이탈리아 자동차 산업과 협력"
 BRA_italian_car_industry_desc: "우리의 자동차 산업은 아직 초기 단계에 있지만, [ITA.GetName]의 친구들은 크고 성공적인 자동차 산업을 보유하고 있습니다. 이제 막 시작한 우리 회사들을 개선하기 위해 그들에게 조언을 구할 때인 것 같습니다."
 BRA_penal_battalions: "형벌 대대"
 BRA_penal_battalions_desc: "군대의 많은 이들이 수십 년간 망명 생활을 한 군주제를 위해 싸우는 것에 열의를 보이지 않습니다. 그러나 국가보안법을 활용한 이래로, 우리는 사기가 저하된 정규군을 보강하기 위해 형벌 대대에 투입할 수 있는 수많은 수감자를 확보했습니다."
 BRA_penal_battalions_tt: "형벌 대대를 활용하는 §YBatalhões de Presos§!(으)로 알려진 사단 편제를 생성합니다. 또한 §Y[ROOT.Capital.GetCapitalVictoryPointName]§!에 §Y6개 부대§!를 징집합니다."
 BRA_end_the_state_of_emergency: "비상사태 종식"
 BRA_end_the_state_of_emergency_desc: "한때 영웅이었던 [BRA.GetLeader]은(는) 이제 [BRA.GetAdjective] 민주주의에 가장 큰 위협이 되고 있습니다. 그의 권력욕과 기회주의적 성향으로 인해 우리가 싸워서 확보한 권리가 거의 정지될 지경에 이르렀습니다. 자유를 소중히 여기는 모든 사람은 이 위험한 비상사태에 반대해야 합니다."
 BRA_repeal_the_national_security_law: "국가보안법 폐지"
 BRA_repeal_the_national_security_law_desc: "$BRA_getulio_vargas$가 비상사태 동안 사용했던 국가보안법을 폐지하지 않는 한, 또 다른 기회주의적인 대통령이 우리의 민주주의를 훼손할 위협은 계속 존재할 것입니다."
 BRA_greater_federalism: "연방주의 강화"
 BRA_greater_federalism_desc: "정치 권력의 중앙 집중화는 우리의 민주적 가치와 양립할 수 없습니다. 우리는 [ROOT.Capital.GetCapitalVictoryPointName]에 있는 정치 엘리트의 장악을 깨고 공화국의 각 주로 권력을 되돌려주어야 합니다."
 BRA_democratic_socialism: "민주사회주의"
 BRA_democratic_socialism_desc: "1935년의 실패한 코무니스타 봉기와 그에 따른 비상사태로 인해 많은 좌익 정치인과 활동가들이 폭력 혁명 지지 여부와 상관없이 국외로 도피하거나 지하로 숨어들어야 했습니다. 민주주의가 확고히 자리 잡으면서, 민주사회주의자들은 마침내 고국으로 돌아올 기회를 얻었습니다."
 BRA_continue_centralization: "중앙집권화 촉진"
 BRA_continue_centralization_desc: "[ROOT.GetNameDefCap]은(는) 광대한 영토에 걸쳐 많은 문화가 퍼져 있는 국가입니다. 만약 우리가 국가의 다양한 주들을 통합하기 위해 더 노력하지 않는다면, 분열되거나 이웃 국가로부터 군사적 침공을 받을 위험이 있습니다. 강력한 중앙 정부를 통해서만 우리 국민과 민주주의를 보호할 수 있습니다."
 BRA_court_the_military: "군부 포섭"
 BRA_court_the_military_desc: "군부를 불쾌하게 만들거나 약화시키는 정책을 추구하는 것은 너무 이상주의적입니다. 우리의 유일한 희망은 공통점을 찾고 국가의 더 큰 이익을 위해 그들과 협력하는 것입니다. 만약 실패한다면, 우리가 가진 권리는 다시 한번 소멸될 것입니다."
 BRA_implement_a_national_guard: "국가 방위대 창설"
 BRA_implement_a_national_guard_tt: "§YGuarda Nacional§! 사단 편제를 생성하고 §Y[ROOT.Capital.GetCapitalVictoryPointName]§!에 §Y6개 부대§!를 징집합니다."
 BRA_implement_a_national_guard_desc: "군부는 마음에 들지 않으면 언제든 민주주의를 종식시키겠다고 위협하며 국가 정치에 계속해서 그림자를 드리우고 있습니다. 그들의 영향력에 맞서기 위해, 우리는 국회에 충성하는 새로운 국가 방위대를 도입할 것입니다."
 BRA_nationalize_the_banks: "은행 국유화"
 BRA_nationalize_the_banks_desc: "우리 경제는 아직 대공황에서 회복하지 못했고, 많은 국민이 빈곤에 시달리고 있습니다. 이제 대공황의 피해자들에게서 경제 회복의 부담을 덜어, 은행을 운영하는 가해자들에게 그 부담을 지울 때입니다."
 BRA_establish_the_brazilian_investment_bank: "친기업적 조세 정책"
 BRA_establish_the_brazilian_investment_bank_desc: "현재보다 적은 세금을 내면 이익을 볼 다국적 기업은 얼마든지 있습니다. 이러한 기업에 유리한 조세 정책을 설정함으로써, 우리는 그들을 [ROOT.GetNameDef](으)로 유인하여 우리 경제에 이익이 되게 할 수 있습니다."
 BRA_church: "교회와 협력"
 BRA_church_desc: "가톨릭 교회는 정교 분리가 수십 년 전에 확립되었음에도 불구하고 우리 정치에 막대한 영향력을 유지하고 있습니다. 이는 유권자의 대다수를 차지하는 독실한 가톨릭 신자의 엄청난 수에서 비롯됩니다. 만약 우리가 교회의 환심을 살 수 있다면, 우리 정책에 대한 대중의 지지를 얻을 수 있을 것입니다."
 BRA_implement_article_138: "제138조 시행"
 BRA_implement_article_138_desc: "1934년 헌법 제138조는 정부가 자녀가 많은 가정을 지원해야 한다고 명시했습니다. 이 모호한 조항은 대부분의 가정에 적용될 것이므로, 어떠한 지원이든 상당한 비용이 발생할 것입니다. 그러나 이러한 가정을 위한 기본적인 복지 제도를 시행함으로써, 우리는 한 세대 안에 수백만 명을 빈곤에서 구제할 수 있습니다."
 BRA_tech_slot_2: "[ROOT.Capital.GetCapitalVictoryPointName] 연방 대학교"
 BRA_tech_slot_2_desc: "기술은 우리가 일하는 방식에서부터 전쟁 수행 방식에 이르기까지 우리 삶의 방식을 급격하게 변화시키고 있습니다. 우리 국가의 지속적인 번영과 안보를 위해 신기술 연구 개발에 투자하는 것은 가장 중요합니다."
 BRA_ban_the_communist_party: "공산당 활동 금지"
 BRA_ban_the_communist_party_desc: "공산주의 운동은 1935년 봉기 시도가 실패했음에도 불구하고, 계속해서 국가의 군부와 기업가들을 불안하게 만들고 있습니다. 아마도 이 운동을 단속함으로써, 우리는 우리 정책에 대한 군부의 더 큰 지지를 얻을 수 있을 것입니다."
 BRA_ban_the_communist_party_dynamic_tt: "§R안정도 감소는 공산당의 인기도에 비례합니다!§!"
 BRA_posts_for_generals: "장군에게 장관직 제안"
 BRA_posts_for_generals_desc: "영향력 있는 장교들에게 각료회의 직책을 제안함으로써, 그들이 정부 결정에 참여하게 하여 정부 결정에 대한 그들의 불안감을 줄일 수 있습니다. 이는 우리의 동기에 대한 그들의 의심을 줄이고 더 이상의 유혈 사태를 막을 것입니다."
 BRA_posts_for_generals_tt: "정치 고문으로 §Y$BRA_eurico_gaspar_dutra$§! 해금: \n 모병 가능 인구: §Y2%§! \n 전쟁 지지도: §G+10%§! \n 핵심 영토 사단 방어: §G+5%§! \n 민주주의 외교 수락: §R-25§!"
 BRA_end_military_interference: "군부 개입 종식"
 BRA_end_military_interference_tt: "비동맹주의 지지도 변화: §G-§![?.Root.party_popularity@neutrality|%0G].\n"
 BRA_end_military_interference_desc: "국가 방위대 창설로, 우리는 마침내 군부의 영향력을 억제할 능력을 갖추게 되었으며, 마침내 우리 군을 문민 정부의 감독하에 두게 됩니다."
 BRA_free_speech: "정치 담론 개방"
 BRA_free_speech_desc: "국회에 대한 군부의 영향력이 축소되면서, 또 다른 독재의 가능성이 줄어들었습니다. 이제 우리는 표현의 자유에 대한 더 나은 보호를 보장하고, 국민의 더 큰 정치 참여를 장려해야 할 때입니다."
 BRA_free_speech_tt: "다음 인물들이 정치 고문으로 이용 가능해집니다: \n"
 BRA_the_international_crisis: "국제적 위기"
 BRA_the_international_crisis_desc: "강대국 간의 긴장이 고조되고 오래된 국경 분쟁이 다시 외교의 전면에 부상하면서, 세계는 점점 더 불안정해지고 있습니다. 우리는 신중하게 행동해야 하지만, 상호 안보를 위해 이 지역의 다른 민주주의 국가들과도 협력해야 합니다."
 BRA_third_republic: "질서와 진보"
 BRA_third_republic_desc: "국가에 마침내 안정이 회복되고 군사 쿠데타의 위협이 줄어들면서, 우리는 더 강력한 헌법을 제정할 기회를 갖게 되었습니다. 이 헌법은 강력한 견제와 균형을 가능하게 하면서도, 필요시 각료회의가 단호하게 행동할 수 있도록 합니다."
 BRA_united_states_of_brazil: "브라질 합중국"
 BRA_united_states_of_brazil_desc: "1934년 헌법 하에서 정치적, 경제적 평등을 증진하기 위해 많은 노력을 기울였으나, 여전히 여러 조항에 의해 제약을 받고 있습니다. 이제 국가의 이익을 위해 이 미흡한 헌법을 폐기하고, 우리의 우방인 아메리카 합중국과 유사한 헌법을 채택해야 합니다."
 BRA_united_states_of_south_america: "남아메리카 합중국"
 BRA_united_states_of_south_america_desc: "우리나라는 자유의 등불이 되어 우리의 가치를 공유하는 모든 이들이 새로운 시작을 희망하며 이곳으로 오도록 이끌고 있습니다. 우리는 이러한 다양성을 포용하고, 우리 스스로를 남아메리카 합중국으로 선포함으로써 미래에 대한 포부를 명확히 해야 합니다."
 BRA_united_states_of_south_america_tt: "§Y$BRA_us_of_south_america_cat$§! 디시전을 잠금 해제하여 남아메리카의 §Y민주주의§! 또는 §Y비동맹§! 세력 구성원을 [ROOT.GetNameDef](와)과 §Y합병§!하도록 초대할 수 있습니다."
 BRA_bonus_tech_slot: "국가 기술 기금"
 BRA_bonus_tech_slot_desc: "최근 몇 년간 우리의 산업과 군사력이 크게 확장되었음에도, 외국의 적들과 기술적 동등성을 유지하기가 점점 더 어려워지고 있습니다. 이에 대응하기 위해 신흥 기술에 투자할 국가 기금을 설립할 것입니다."
 BRA_address_labor_disputes: "노동 분쟁 해결"
 BRA_address_labor_disputes_desc: "이전 정부는 공산주의의 위협을 정당하게 우려했지만, 사람들이 급진주의로 돌아서게 만든 근본적인 문제를 해결하는 데는 거의 아무것도 하지 않았습니다. 우리는 같은 실수를 반복하지 않고 노동 분쟁 해결에 더 적극적인 역할을 수행할 것입니다."
 BRA_address_labor_disputes_tt_1: "§Y이벤트에서 다음 중 하나를 선택할 수 있습니다: §!"
 BRA_address_labor_disputes_tt_2: "§Y또는:§!"
 BRA_combat_separatism: "분리주의 척결"
 BRA_combat_separatism_desc: "국가가 정치적 혼란에 직면할 때마다 수도 밖의 불만을 품은 사람들이 [ROOT.GetNonIdeologyName]을 분열시킬 위협이 되는 분리주의 의제를 추구하기 시작합니다. 우리는 국가 전역에 걸쳐 공유된 [ROOT.GetAdjective] 정체성을 증진하기 위해 더 많은 노력을 기울여야 합니다."
 BRA_war_bonds: "전쟁 채권"
 BRA_war_bonds_desc: "군사적으로 분쟁에 휘말리거나 다른 국가를 경제적으로 지원하게 될 가능성을 배제할 수 없으므로, 재무장을 위한 자금을 조달하기 위해 전쟁 채권 판매 프로그램을 시작해야 합니다."
 BRA_invite_foreign_companies: "외국 기업 유치"
 BRA_invite_foreign_companies_desc: "이제 외국 자본에 문을 열 때가 왔습니다. 우리는 외국 기업들이 [BRA.GetNonIdeologyName]에 사업장을 설립하도록 인센티브를 제공하여 이를 실현할 것이며, 이는 결과적으로 실업률을 낮추고 세수를 늘릴 것입니다."
 BRA_invite_foreign_companies_tt: "§Y[ENG.GetFlag][ENG.GetName]§!, §Y[USA.GetFlag][USA.GetName]§!, §Y[FRA.GetFlag][FRA.GetName]§! 또는 §Y[SWE.GetFlag][SWE.GetName]§!에서 §Y군수 산업체§!를 [BRA.GetNonIdeologyName](으)로 초대할 수 있는 §Y$BRA_invite_foreign_companies_cat$§! 디시전이 잠금 해제됩니다. \n§G[BRA.GetNonIdeologyName](으)로 초대한 군수 산업체당 군수 공장 또는 조선소 1개를 얻습니다.§! \n§R각 국가에서 군수 산업체를 1개만 초대할 수 있습니다!§! \n\n§G다음 중 4개를 선택합니다:§!"
 BRA_pro_labor_agreement: "친노동 정책"

 BRA_romanticize_the_old_empire: "제국 역사 낭만화"
 BRA_romanticize_the_old_empire_desc: "이런저런 이유로 이 실패한 공화국의 종말을 바라는 불만 가득한 정치인, 재계 지도자, 시민들이 적지 않습니다. 우리의 제국 역사와 과거의 영광을 중심으로 단결함으로써, 그들 모두를 하나의 응집력 있는 운동으로 통합할 수 있을 것입니다."
 BRA_vassouras_line: "페드루 엔히크의 주장 지지"
 BRA_vassouras_line_desc: "정치적 현상 유지를 뒤흔들려는 우리의 운동 창설 시도는 제국 왕가의 귀환을 통해 제국 역사를 부활시키자는 요구로 이어졌습니다. 많은 이들이 이제 망명한 브라질 제국의 수장인 페드루 엔히크를 국가의 정당한 통치자로 여기며 그를 중심으로 결집하고 있습니다."
 BRA_petropolis_line: "페드루 지 알칸타라의 주장 지지"
 BRA_petropolis_line_desc: "페드루 지 알칸타라는 엘리자베트 도브르젠스크 백작부인과 결혼하기 위해 왕위에 대한 모든 권리를 포기하기 전까지 망명한 브라질 제국의 수장이었습니다. 왕정 복고 운동이 힘을 얻자, 그는 이제 자신의 권리 포기가 불법이었으며 자신이 왕위의 정당한 계승자라고 주장합니다."
 BRA_monarch_choice_1_tt: "§Y페드루 지 알칸타라§!가 제국의 수장이 됩니다. \n§R[ROOT.GetNonIdeologyName]이(가) $BRA_constitutional_monarchy$ 중점을 완료하면, 다음 국가 정신이 추가됩니다§!:"
 BRA_monarch_choice_2_tt: "§Y페드루 엔히크§!가 제국의 수장이 됩니다. \n§R[ROOT.GetNonIdeologyName]이(가) $BRA_constitutional_monarchy$ 중점을 완료하면, 다음 국가 정신이 추가됩니다§!:"
 BRA_restore_the_coffee_barons: "카페 콩 레이치 정치"
 BRA_restore_the_coffee_barons_desc: "수십 년간 [ROOT.GetAdjective] 정치를 지배했던 한때 강력했던 커피 남작들은 1930년 혁명으로 권력에서 밀려났습니다. 많은 이들이 여전히 상당한 경제적 영향력을 유지하고 있으며, 정치적 양보를 대가로 우리의 제국 복고 운동을 지지하도록 설득할 수 있습니다."
 BRA_constitutional_monarchy: "입헌군주제 타협안"
 BRA_constitutional_monarchy_desc: "제정 복고 운동이 탄력을 받고 현 정권에 대한 지지가 약해지면서, 국가를 안정시키기 위한 타협안을 요구하는 목소리가 커지고 있습니다. 가장 유력한 제안은 명목상의 입헌군주제를 수립하면서, 국민회의가 정치 권력을 유지하는 것입니다."
 BRA_constitutional_monarchy_tt: "§Y$BRA_petropolis_line$§!와 §Y$BRA_vassouras_line$§! 사이의 이전 선택에 따라, 다음 국민정신 중 하나가 활성화됩니다:"
 BRA_constitutional_monarchy_tt_2: "§Y또는§!"
 BRA_united_kingdom_of_brazil_and_portugal: "브라질-포르투갈 연합 왕국"
 BRA_united_kingdom_of_brazil_and_portugal_desc: "브라질 황실의 복원은 포르투갈의 군주주의 정서에도 다시 불을 지폈습니다. 우리는 이를 기회로 삼아 다시 한번 단일 군주 아래 양국을 통일해야 할 것입니다. 결국, 양국은 서로의 자원과 전문 지식으로부터 이익을 얻을 수 있습니다."
 BRA_united_kingdom_of_brazil_and_portugal_tt: "§Y[POR.GetFlag][POR.GetNonIdeologyName]§!와 §Y[BRA.GetFlag][BRA.GetNonIdeologyName]§!의 통일을 요청합니다. §Y[POR.GetFlag][POR.GetNonIdeologyName]§!가 수락하면 브라질의 속국이 될 것입니다. 그러나 대안을 제시하거나 제안을 거부할 수도 있습니다."
 BRA_undermine_democracy: "국민회의 약화"
 BRA_undermine_democracy_desc: "우리의 가장 영향력 있는 지지자들은 이 입헌군주제 타협안에 만족하지 않습니다. 그들은 점점 조급해하며 군주가 새로 얻은 영향력을 사용하여 새로운 각료회의를 임명함으로써 국민회의를 무력화시키기를 원합니다."
 BRA_use_the_national_security_law: "국가보안법 활용"
 BRA_use_the_national_security_law_desc: "국민회의 의원들의 미약한 저항에도 불구하고, 우리의 새로운 각료회의는 성공적으로 국가의 합법적인 정부로 자리매김했습니다. 이제 그들은 $BRA_getulio_vargas$ 정권이 제정한 국가보안법을 사용하여 정치 문제에 대한 절대적인 권위를 주장할 것입니다."
 BRA_amazonian_settlement: "아마존 식민화 재개"
 BRA_amazonian_settlement_desc: "아마존은 자원과 토지가 풍부하여 개발하기에 안성맞춤입니다. 경제를 활성화하고 우리 군인들이 싸울 동기를 부여하기 위해, 우리는 군에 입대하는 이들에게 적절한 복무 기간 후에 그러한 땅을 획득할 기회를 제공해야 합니다."
 BRA_amazonian_settlement_tt: "아마존 주를 개발하기 위한 §Y아마존의 군사 정착지§! 디시전을 잠금 해제합니다."
 BRA_empire_of_brazil: "브라질 제국 재건"
 BRA_empire_of_brazil_desc: "권력이 군주와 그가 임명한 각료들의 손에 확실히 들어왔으니, 이제 국가를 이전의 영광으로 되돌릴 때입니다. 이를 위한 첫 번째 단계는 브라질 제국을 복원하고 제국이 세워졌던 전통적인 가치로 회귀하는 것입니다."
 BRA_reclaim_territory_in_south_america: "시스플라티나 보복주의"
 BRA_reclaim_territory_in_south_america_desc: "시스플라티나 전쟁의 치욕은 막대한 비용을 치른 전쟁이 끝난 지 한 세기가 지난 지금도 황실을 짓누르고 있습니다. 우루과이 땅에 대한 우리의 주권을 다시 주장하는 것은 우리 신민들 사이의 자부심을 다시 불러일으키고, 우리가 과거의 쇠락한 국가가 아님을 세계에 상기시키는 데 큰 도움이 될 것입니다."
 BRA_demand_portugese_territory: "포르투갈 식민지 요구"
 BRA_demand_portugese_territory_desc: "현대의 [POR.GetNonIdeologyName]은 한때 위대했던 제국의 껍데기에 불과합니다. 세계가 다른 곳의 혼란에 휩싸여 있는 동안, 우리는 포함 외교를 통해 [POR.GetAdjective] 정부가 해외 영토를 우리에게 넘겨주도록 설득해야 합니다."
 BRA_demand_portugese_submission: "포르투갈의 완전한 복종 요구"
 BRA_demand_portugese_submission_desc: "[POR.GetNonIdeologyName]의 땅은 불법적인 세력에 의해 통치되고 있습니다. 오직 우리 황제만이 그들을 다스릴 신성한 권리를 가지고 있기 때문입니다. 우리는 그들의 모든 영토를 우리에게 넘길 것을 요구할 것이며, 필요하다면 무력으로 빼앗을 것입니다."
 BRA_restoration_of_honor: "브라질의 명예 회복"
 BRA_restoration_of_honor_desc: "많은 신민들이 군주제의 복귀에 회의적이었지만, 이제 대다수는 그 결과에 만족하고 있습니다. 국경이 확장되고, 경제가 회복되었으며, 사회의 자연스러운 위계질서가 강화되었으므로, 마침내 [ROOT.GetAdjective]의 명예가 회복되었다고 말할 수 있습니다."
 BRA_spirit_of_acre_war: "아크레 전쟁 재점화"
 BRA_spirit_of_acre_war_desc: "비록 아크레 지역이 현재 우리의 통제 하에 있지만, 우리는 그곳의 역사적인 국경 분쟁을 빌미로 볼리비아를 더 분할할 수 있습니다. 이를 통해 우리는 막대한 양의 미개발 천연자원에 접근할 수 있게 될 것이며, 이는 앞으로 수십 년 동안 우리 산업에 공급될 것입니다."
 BRA_expand_colonial_empire: "식민 제국 확장"
 BRA_expand_colonial_empire_desc: "최근의 해외 확장을 통해, 이제 우리는 아프리카로 지배권을 확장할 수 있는 발판을 마련했습니다. 대륙의 대부분이 유럽 열강의 지배하에 남아 있지만, 차지할 수 있는 자원이 풍부한 지역이 많이 있습니다."
 BRA_invest_in_the_armed_forces: "군부 매수"
 BRA_invest_in_the_armed_forces_desc: "군부 엘리트들은 충성심이 변덕스럽고 국내외 공산주의의 위협에 대해 편집증적입니다. 우리는 군사 예산을 증액하여 우리의 통치를 지지하는 대가로 그들을 매수함으로써 이를 우리에게 유리하게 이용할 것입니다. "
 BRA_royal_colleges: "[ROOT.Capital.GetCapitalVictoryPointName] 왕립 대학 설립"
 BRA_royal_colleges_desc: "황제께서는 최근 우리나라의 학문적 위상에 깊은 관심을 보이셨으며, 이에 따라 국내 기술 혁신을 더욱 촉진하기 위해 수도에 새로운 왕립 대학을 설립하라는 칙령을 내리셨습니다."
 BRA_issue_lordships: "왕실 작위 수여"
 BRA_issue_lordships_desc: "우리가 정당한 영토의 통제권을 되찾기 시작하면서, 다양한 지역을 통치하는 부담이 존경하는 군주께 짐이 되고 있습니다. 따라서 군주께서는 왕국 통치에 도움을 주기 위해, 신뢰할 수 있다고 판단되는 이들에게 새로운 토지를 수반한 왕실 작위를 수여할 것을 선포하셨습니다."
 BRA_promote_agriculture: "커피 남작 복권"
 BRA_promote_agriculture_desc: "소위 '커피 남작'들은 우리가 군주제를 복원하기에 충분한 지지를 얻는 데 중요한 역할을 했습니다. 이제 우리는 그들을 정부에 참여시켜 경제 재건을 감독하게 함으로써 보상할 것입니다."
 BRA_promote_agriculture_tt: "§Y고문 잠금 해제:§!"
 BRA_acceptance_tt: "수락할 경우: \n"

 BRA_prepare_for_second_intentona: "제2차 공산주의자 봉기"
 BRA_prepare_for_second_intentona_desc: "$BRA_getulio_vargas$의 부르주아 국가를 전복시키려던 우리의 첫 시도는 실패했습니다. 신속하게 재기하지 못한다면, 그가 통과시키고 있는 새로운 반좌파 법안의 물결 속에서 두 번째 혁명 시도의 기회는 사라질 것입니다. 그렇게 되기 전에, 우리는 혁명의 불씨를 다시 지펴야 합니다."
 BRA_seek_soviet_support: "[SOV.GetAdjective]의 지원 모색"
 BRA_seek_soviet_support_desc: "우리가 성공하여 우리나라를 인민이 마땅히 누려야 할 공산주의 사회로 만들기 위해서는 외부의 지원이 필요할 것입니다. [SOV.GetNameDefCap]은 이전에도 우리를 도왔으니, 우리의 성공을 보장하기 위해 다시 한번 그들의 지원을 요청하는 것이 마땅해 보입니다."
 BRA_radicalize_the_proletariat: "프롤레타리아 급진화"
 BRA_radicalize_the_proletariat_desc: "권력을 장악하려던 지난 시도는 노동자들로부터 충분히 조직적인 지원을 받지 못했기 때문에 실패했습니다. 우리는 그들에게 우리의 메시지를 전파하고 우리에게 절대적인 충성을 바치도록 해야 합니다."
 BRA_launch_the_revolution: "혁명 개시"
 BRA_launch_the_revolution_desc: "때가 왔습니다. 우리는 1935년 공산주의자 봉기 때 실패했던 것을 바로잡을 것입니다. 우리는 [BRA.GetLeader]와 그의 억압적인 정부에 맞서 봉기해야 합니다."
 BRA_launch_the_revolution_tt: "[BRA.GetNameDef]에서 §Y공산주의 혁명§!을 시작합니다. 얻게 될 사단 수는 §Y[BRA.GetCommunistParty]§!에 대한 지지도가 얼마나 높은지에 따라 달라집니다.\n§R이는 민주당에 대항하는 공산주의 내전으로 이어질 것입니다!§!"
 BRA_tech_slot_3: "[BRA.GetNonIdeologyName] 인민 대학"
 BRA_tech_slot_3_desc: "강력한 국가를 건설하기 위해서는 [BRA.GetName]의 가장 위대하고 뛰어난 인재들에게 쉽게 접근할 수 있는 선진 교육 시스템이 필요합니다. 조기에 개입하면 해당 기관의 연구 분야를 통제할 수 있는 영향력을 확보할 수 있습니다. 대학을 인민에게 헌정하는 것은 앞으로 이 지식인들이 기꺼이 머물며 우리의 대의를 돕도록 하는 한 가지 방법일 뿐입니다."
 BRA_international_brigades: "국제 여단"
 BRA_international_brigades_desc: "우리 주변 세계에서는 전쟁이 격화되고 있으며, 비록 우리가 적극적인 역할을 하지는 않지만, 좋은 동지로서 우리의 힘이 닿는 한 도움이 필요한 이들에게 도움을 보내는 것이 우리의 의무입니다. 무모하게 전쟁에 참여하는 것은 우리에게 아무런 이득이 되지 않으므로, 지금은 의용군을 파견하는 것을 목표로 해야 합니다."
 BRA_soviet_economic_aid: "소련의 경제 원조"
 BRA_soviet_economic_aid_desc: "우리와 다른 사상을 가진 지도자들의 관리 아래 수년을 보낸 후, 우리 경제는 우리가 바라는 수준에 미치지 못하고 있습니다. 바람직한 상태로 회복하는 과정을 가속화하기 위해, 우리는 우리와 비슷한 사고방식을 가진 다른 국가들의 원조를 구하는 것을 고려해야 합니다."
 BRA_license_soviet_designs: "[SOV.GetNameDef](와)과의 생산 허가 협정"
 BRA_license_soviet_designs_desc: "우리의 연구는 주요 강대국에 뒤처져 있습니다. 따라잡을 역량을 구축하는 데는 오랜 시간이 걸리겠지만, 그때까지는 [BRA.GetNameDef]에서 [SOV.GetNameDef]의 장비를 생산할 허가를 얻기 위해 노력할 수 있습니다. 그러한 거래의 비용을 고려하여 약간의 할인을 협상해야 합니다."
 BRA_license_soviet_designs_tt: "([SOV.GetFlag]§Y[SOV.GetName]§!)에서 '§Y[BRA.GetNameDefCap]이(가) 생산 허가 거래를 모색합니다§!' 이벤트 발생 \n \n 우리에 대한 §Y우호도§!가 높을수록 수락할 가능성이 커집니다!"
 BRA_purchase_soviet_equipment: "소련 장비 구매"
 BRA_purchase_soviet_equipment_desc: "우리 군은 현재 장비가 절실히 필요합니다. 군대를 더욱 성장시키기 위해, 신뢰할 수 있는 동맹국으로부터 유리한 가격에 장비를 구매할 수 있기를 바랍니다. 약간의 협상을 통해 [SOV.GetNameDef](와)과 거래를 성사시킬 수 있을 것입니다."
 BRA_infilitrate_the_military: "군부 침투"
 BRA_infilitrate_the_military_desc: "군 고위 장성들은 여전히 우리 이념에 반감을 품고 있지만, 수많은 하급 장교들은 상관을 몰아낼 기회를 노리고 있습니다. 이들 대열에 침투한다면 우리 대의로 끌어들일 수 있을 것입니다."
 BRA_infilitrate_the_military_tt: "이 중점을 채택하면 다가오는 §R내전§!에서 더 높은 비율의 §Y군부§!가 공산주의자들에게 합류할 것입니다."
 BRA_seek_international_support: "국제적 지원 모색"
 BRA_seek_international_support_desc: "공산주의 운동을 복원하기 위해 많은 노력을 기울였지만, 우리가 극복해야 할 세력에 비하면 여전히 약합니다. 그러므로 우리는 전 세계의 뜻을 같이하는 개인 및 정부들의 지지를 얻어야 합니다."
 BRA_join_the_comintern: "코민테른 가입"
 BRA_join_the_comintern_desc: "너무나 오랫동안 [BRA.GetNameDef]은(는) 코민테른의 지원에 의존하면서도 그 바깥에 서 있었습니다. 이제는 정식으로 가입을 추진해야 할 때입니다!"
 BRA_create_faction: "라틴 아메리카 사회주의 협력체"
 BRA_create_faction_desc: "공산주의 사회가 어떠해야 하는지에 대한 우리의 생각을 공유하는 이들이 많이 있습니다. 이제 이 국가들과 협력의 문을 열어, 우리가 함께 우리 대의를 위해 일어설 수 있도록 해야 할 때입니다!"

 BRA_free_prestes: "프레스치스를 감옥에서 석방"
 BRA_free_prestes_desc: "$BRA_luis_carlos_prestes$은(는) 수년간 급진적인 [ROOT.GetAdjective] 정치의 선봉에 서 왔습니다. 하지만 첫 번째 공산주의 봉기가 실패하면서 그는 운동 지도부와 함께 체포되었습니다. 승리의 희망을 가지려면, 우리는 $BRA_getulio_vargas$의 손아귀에서 우리 지도자들을 해방시켜야 합니다."
 BRA_free_prestes_tt: "현 정부를 성공적으로 전복하면, 친[SOU.GetAdjective] 성향의 §Y공산당§! 조언가들을 이용할 수 있게 됩니다."
 BRA_revive_the_anl: "민족해방동맹 부활"
 BRA_revive_the_anl_desc: "민족해방동맹이 $BRA_getulio_vargas$의 권위주의 정권을 전복하는 데 실패했지만, 진정한 변화를 바라는 수백만의 [BRA.GetAdjective]인들에게 여전히 영향력을 행사하고 있습니다. 그 희망이 완전히 꺼지기 전에 이 운동에 다시 활력을 불어넣어야 합니다."
 BRA_revive_the_anl_tt: "다가오는 공산주의 혁명 동안 §Y공산주의 민병대§! §G2§!개 사단을 추가로 받습니다."
 BRA_revive_the_anl_tt_2: "현 정부를 성공적으로 전복하면, §Y민족해방동맹§! 성향의 조언가들을 이용할 수 있게 됩니다."
 BRA_align_with_moscow: "[SOU.Capital.GetCapitalVictoryPointName]와 제휴"
 BRA_align_with_moscow_desc: "우리 당원 중 몇몇이 [SOU.Capital.GetCapitalVictoryPointName]를 방문하는 특권을 누렸습니다. 그들은 돌아와서 [SOU.GetAdjective]식 국가 운영 방식에 대해 높이 평가했습니다. 우리는 [SOU.GetNameDef]과(와) 더 긴밀하게 제휴하는 것을 고려해야 합니다."
 BRA_oust_prestes: "개인 숭배 방지"
 BRA_oust_prestes_desc: "공산주의 사회는 소수의 개인에 의해 운영되어서는 안 됩니다. 물론 이를 해내는 국가들도 있지만, 우리는 그 국가들이 개인 숭배에 지나지 않게 되는 것은 시간문제일 뿐이라고 우려합니다. 우리에게 이런 운명이 닥치는 것을 막기 위해, 우리는 민족해방동맹 평의회가 국가의 정치적 사안을 통제하도록 해야 합니다."
 BRA_soviet_arms_industry: "소비에트 군수 산업 초청"
 BRA_soviet_arms_industry_desc: "[BRA.GetNameDef]은(는) 강력한 군수 산업을 보유하고 있지만, 최근 그 힘을 더욱 강화할 방법을 모색하고 있습니다. 일부 [SOV.GetAdjective] 군산복합체에서 [BRA.GetNameDef]에 사업장을 설립하는 데 관심을 표명했으니, 우리는 그들을 초청하는 것을 고려해야 합니다."
 BRA_spread_the_revolution: "혁명 확대"
 BRA_spread_the_revolution_desc: "우리가 [BRA.GetNameDef]에 가져온 혁명은 우리 인민에게 큰 환영을 받았습니다. 이제 내부 사정을 안정시켰으니, 더 크게 생각하고 국경 너머를 바라볼 때입니다."
 BRA_smash_fascism: "남아메리카 파시즘 분쇄"
 BRA_smash_fascism_desc: "남아메리카 대륙에는 아직 혁명이 도달하지 못한 국가들이 있습니다. 이들 국가의 일부 프롤레타리아는 여전히 파시스트 통치자들 아래에서 큰 억압을 받고 있습니다. 이대로 둘 수는 없습니다. 우리는 동료 노동자들을 해방시켜야 합니다!"
 BRA_anti_imperialism: "제국 축출"
 BRA_anti_imperialism_desc: "우리 주변의 일부 국가들은 아직 정당한 독립을 얻지 못했습니다. 여전히 이 영토에 대한 통제권을 주장하는 제국들이 있습니다. 식민주의와 제국주의는 과거의 유물이며, 그 제국들에게 이 점을 매우 분명히 해야 할 때가 한참 지났습니다."
 BRA_anti_imperialism_tt: "남아메리카의 식민지를 해방하기 위한 §Y남아메리카 반식민주의§! 디시전을 잠금 해제합니다."
 BRA_jaguar_diplomacy: "재규어 외교"
 BRA_jaguar_diplomacy_desc: "[CHI.GetName]가 최근 자국의 토종 동물을 외교 선물로 사용했습니다. 이념적 차이에도 불구하고, 이는 외국 정부와의 긴장 관계를 완화하는 성공적인 방법인 것 같습니다. 우리도 같은 방식을 사용하여 강대국들이 우리 내정에 간섭하는 것을 단념시킬 수 있을 것입니다."
 BRA_jaguar_diplomacy_tt: "그들과 불가침 조약을 체결하여 남아메리카의 공산주의에 반대하는 강대국들을 회유하기 위한 §Y$BRA_jaguar_diplomacy_cat$§! 디시전을 잠금 해제합니다."
 BRA_sway_the_neighbors: "주변국 포섭"
 BRA_sway_the_neighbors_desc: "우리는 필요한 모든 수단을 사용하여 이웃 국가들 사이에서 계급 의식을 고취하고, 그들이 부르주아 억압의 족쇄를 벗어던지도록 지원해야 합니다."
 BRA_sway_the_neighbors_tt: "남아메리카 국가들에서 공산주의를 조장하기 위한 §Y$BRA_sway_the_neighbors_cat$§! 디시전을 잠금 해제합니다."
 BRA_julieta_soria: "훌리에타 소리아"
 BRA_union_of_latin_american_socialist_republics: "ULASR 설립"
 BRA_union_of_latin_american_socialist_republics_desc: "우리의 혁명 운동은 대륙 전역의 부르주아 사회 구조를 계속해서 잠식하고 있습니다. 우리는 더 이상 [ROOT.GetAdjective]의 운동이 아니라, 남아메리카인의 운동이라는 것이 분명하며, 이제 우리의 정치 구조가 그 변화를 더 잘 대변해야 할 때입니다."
 BRA_smash_democracy: "남아메리카 자본주의 종식"
 BRA_smash_democracy_desc: "부르주아 민주주의와 자본주의는 많은 남아메리카인들의 권리와 생활 환경을 계속해서 침해하고 있습니다. 우리는 대륙 전역의 동지들을 억압자들로부터 해방시키기 위해 할 수 있는 모든 것을 해야 합니다."
 BRA_kgbrazil: "[BRA_kgbrazil_key]"
 BRA_create_kgbrazil_with_agents: "EICI 창설"
 BRA_kgbrazil_just_add_operatives: "[SOU.GetAdjective] 정보 협력"
 BRA_kgbrazil_no_lar: "정보 전선 강화"
 BRA_kgbrazil_cangaco: "헤지 코이테이루스"
 BRA_kgbrazil_desc: "[BRA_kgbrazil_desc_key]"
 BRA_create_kgbrazil_with_agents_desc: "적에 대한 첩보와 정보는 필요할 때 우리 국가와 이익을 방어하는 능력의 핵심 요소입니다. 강력한 기관을 설립하는 데는 시간이 걸릴 수 있지만, 우리는 이념적으로 일치하는 외국의 기관들로부터 이 노력을 위한 지원을 받고 있습니다."
 BRA_kgbrazil_just_add_operatives_desc: "적에 대한 첩보와 정보는 필요할 때 우리 국가와 이익을 방어하는 능력의 핵심 요소입니다. 우리 기관은 최근 많은 노력을 기울여 왔지만, 경험 많은 소비에트 요원들을 우리 대의에 영입한다면 더욱 발전할 수 있을 것입니다."
 BRA_kgbrazil_no_lar_desc: "적에 대한 첩보와 정보는 필요할 때 우리 국가와 이익을 방어하는 능력의 핵심 요소입니다. 우리는 적에 대한 정보를 수집하고 민감한 정보로부터 적을 차단하기 위해 기술적 필요를 최우선으로 충족시켜야 합니다."
 BRA_robert_ivanov: "로베르트 이바노프"
 BRA_nadiya_morozova: "나디야 모로조바"
 BRA_collectivization_of_transport: "운송수단 집산화"
 BRA_collectivization_of_transport_desc: "우리의 운송 체계는 예전 같지 않으며, 우리의 필요에 따라 더 효율적으로 활용할 수 있도록 재조직이 시급합니다. 운송 체계를 집산화하면 노동자들이 가장 적합하다고 생각하는 방식으로 절실히 필요한 개혁을 도입할 힘을 갖게 될 것입니다."
 BRA_nationalization_of_industry: "산업 국유화"
 BRA_nationalization_of_industry_desc: "우리의 민간 산업은 아직 국유화되지 않았습니다. 국민과 국가의 필요를 충족시키는 것보다 이윤을 추구하는 사유주들의 손에 있어 효율성이 크게 저하되고 있습니다. [BRA.GetNameDef]의 모든 국민을 위해 우리는 산업을 국유화하고 확장해야 합니다."
 BRA_rapid_industrialization: "급속한 산업화"
 BRA_rapid_industrialization_desc: "우리가 민간 산업에 한 투자는 노동자와 국가 모두에게 매우 보람 있는 일이었던 것 같습니다. 아마도 우리는 국내 군수 산업에도 비슷한 투자를 고려해야 할 것입니다."
 BRA_collectivization_of_agriculture: "농업 집산화"
 BRA_collectivization_of_agriculture_desc: "우리의 농업은 다소 파편화되어 있어 잠재력만큼 효율적으로 작동하지 않습니다. 산업을 집산화하고 노동자들 자신에게 집단으로서 필요한 개혁을 처리하도록 맡김으로써, 우리는 이 문제와 더 많은 문제를 해결할 수 있을 것입니다."
 BRA_collectivization_of_agriculture_desc: 
 BRA_allow_the_church_to_operate: "사회주의 성향 신학자 포용"
 BRA_allow_the_church_to_operate_desc: "성직자들 사이에서 새로운 운동이 남아메리카에 뿌리내리기 시작했습니다. 성직자들은 가장 궁핍한 우리 국민을 빈곤에서 완전히 구제할 사회주의 성향 정책을 옹호하고 있습니다. 그들을 지지하는 충실한 프롤레타리아를 분노하게 하기보다는 이 급진적인 신학자들을 포용해야 할 것입니다."
 BRA_state_atheism: "무신론 국가"
 BRA_state_atheism_desc: "우리 국민의 정신이 바람직하지 않은 사상으로 채워지지 않도록, 그러한 선전이 어디에도 퍼지지 않도록 보장해야 합니다. [BRA.GetAdjective] 신학자들의 구식 방식과 그들이 설교하는 내용은 우리가 국민에게 바라는 것과 극명한 대조를 이룹니다. 우리는 더 이상 이를 용납해서는 안 됩니다!"
 BRA_support_industrialists: "산업가 지원"
 BRA_support_industrialists_desc: "우리 인구 중에는 자본가보다 노동자가 더 많지만, 부와 자원의 상당 부분은 자본가들이 통제하고 있습니다. 우리는 노동자의 권리를 축소하고 산업가들이 경제 전반의 발전을 위해 더 효율적으로 운영할 수 있도록 하는 정책을 제정해야 합니다."
 BRA_reward_army_loyalty: "육군 충성심 보상"
 BRA_reward_army_loyalty_desc: "육군은 우리가 권력을 잡는 과정뿐만 아니라, 권력을 유지하는 데에도 필수적이었습니다. 이제 육군 기반 시설 사업에 더 많은 자원을 할당하여 그 충성심에 대해 동맹에게 보상할 때입니다."
 BRA_reinvigorate_the_navy: "해군 재활성화"
 BRA_reinvigorate_the_navy_desc: "해군 장교들은 대중에게 인기가 없었을 때조차 오랫동안 통합주의 운동을 지지해 왔습니다. 그들의 오랜 지원에 보답하기 위해, 우리는 노후화된 함대를 재활성화하는 과정을 시작할 수 있도록 자금 지원을 늘릴 것입니다."
 BRA_establish_caloi: "칼로이 공장 설립"
 BRA_establish_caloi_desc: "전 세계적으로 고조되는 긴장으로 인해 유럽과 북미에서 자전거와 부품을 수입하기가 어려워졌습니다. 고무와 강철을 풍부하게 확보할 수 있으니, 우리만의 자전거 공장을 설립하고 군용으로 활용하는 방안을 고려해야 할 것입니다."
 BRA_us_brazil_technology_exchange: "[USA.GetAdjective]-[ROOT.GetAdjective] 기술 교류"
 BRA_us_brazil_technology_exchange_desc: "최근 몇 년간 우리나라는 기술 전문성을 크게 향상시켰지만, [USA.GetNameDef]의 친구들에게서 배울 점이 아직 많습니다. 우리의 지식을 공유하는 대가로 그들의 지식을 공유하도록 독려할 수 있을 것입니다."
 BRA_us_brazil_technology_exchange_tt: "[USA.GetFlag]§Y[USA.GetNameDef]§!이(가) 제안에 동의할 경우:"
 BRA_depose_vargas: "[ROOT.GetLeader] 축출"
 BRA_depose_vargas_desc: "[ROOT.GetLeader]은(는) 골칫거리가 되었습니다. 그는 능숙한 정치인이지만, 국민이 한 사람에게서 참을 수 있는 데에는 한계가 있습니다. 다시 궁핍에 빠지지 않으려면, 그를 축출하고 군부에서 더 마음에 드는 지도자로 교체해야 합니다."
 BRA_equality_for_women: "프롤레타리아 평등"
 BRA_equality_for_women_desc: "모든 형태의 낡은 부르주아 질서는 무너져야 합니다. 이를 위해, 브라질의 여성과 소수자들은 오랫동안 국가로부터 외면받아 왔으며 이제 우리가 그들의 역사적 고충을 해결할 때입니다. 또한 우리는 그들이 프롤레타리아 공화국의 발전을 위해 자신의 능력을 활용하도록 장려해야 합니다."
 BRA_equality_for_women_tt: "부대 지휘관으로 §Y$BRA_olga_benario_prestes$§! 잠금 해제"
 BRA_italian_cooperation: "[ITA.GetAdjective]-[ROOT.GetAdjective]의 아프리카 분할"
 BRA_italian_cooperation_desc: "낡은 제국들이 무너지면서, 새로운 아프리카 쟁탈전이 벌어지고 있습니다. [ITA.GetNameDef]와의 특별한 관계를 통해, 우리는 대륙의 일부를 우리 것으로 만들 기회를 얻었습니다."
 BRA_german_cooperation: "남대서양 지배"
 BRA_german_cooperation_desc: "너무 오랫동안 대서양은 미국과 영국 해군에 의해 지배되어 왔습니다. [GER.GetNameDef]와의 협력을 통해, 우리는 그들을 몰아내고 대서양을 우리 것으로 장악할 준비가 되었습니다."
 BRA_german_cooperation_tt: "[ROOT.GetNonIdeologyName] 또는 [GER.GetNonIdeologyName]이(가) 소유하지 않은 §Y남대서양§!의 섬에 대한 §Y영유권§! 획득"
 BRA_german_cooperation_tt_2: "[GER.GetAdjective] §YIIA형 초기형 잠수함§! §Y10척§! 획득"
 BRA_attack_bolivia: "아마존 확보"
 BRA_attack_bolivia_desc: "아마존 열대우림은 본질적으로 [BRA.GetAdjective]의 것입니다. [BOL.GetNameDef]이(가) 그 일부를 계속 점유하고 있다는 사실은 더 이상 용납할 수 없습니다."
 BRA_attack_chile: "선제 타격"
 BRA_attack_chile: 
 BRA_attack_chile_desc: "[CHL.GetAdjective]이 산맥 뒤에 버티고 있는 한, 우리의 서부 측면은 결코 완전히 안전할 수 없습니다. 따라서, 우리는 [CHL.GetAdjective] 국가를 청산하고 그 영토를 우리 영토로 통합해야 합니다."
 BRA_panama_push: "파나마 공세"
 BRA_panama_push_desc: "우리가 대륙을 확보하려면, 신속하게 행동하여 적이 대응하기 전에 압도해야 합니다."
 BRA_unify_south_america: "América do Sul"
 BRA_unify_south_america_desc: "남아메리카는 우리 국민의 힘과 용기로 우리의 지배하에 들어왔습니다. 이제 우리는 우리의 통치와 문화 아래 대륙을 통일하는 어려운 과업을 시작해야 합니다."
 BRA_unify_south_america_tt: "§YSouth America§! 내 보유 영토에 §Y핵심주§!를 획득하는 디시전을 잠금 해제합니다!"
 BRA_sway_the_cangaco: "칸가수, 우리 대의로 포섭"
 BRA_sway_the_cangaco_desc: "칸가수는 수년간 국가를 지배해 온 여러 정권에 맞서 싸워왔습니다. 이들은 마르크스주의자와는 거리가 멀지만, 지역의 부를 재분배하는 것에 대해 농촌 소작농들로부터 강력한 지지를 받고 있습니다. 아마도 우리는 그들과 그들의 경험을 우리의 혁명 운동으로 끌어들일 수 있을 것입니다."
 BRA_sway_the_cangaco_tt: "§Y$BRA_cangaceiro_decision_cat$§! §R디시전을 제거하여,§! §R영향을 받는 주에서 칸가수를 단속하지 못하게 합니다!§! \n\n내전이 발발하거나 정부가 §Y공산주의§!가 되면 칸가수 민병대 §G3§!개 부대를 획득합니다!"
 BRA_cangaco_coup: "칸가수 쿠데타"
 BRA_cangaco_coup_desc: "혁명의 약속에도 불구하고, 운동 지도부는 우유부단하며 어떤 교리를 따라야 할지에 대한 교조적인 논쟁에 휘말려 있습니다. 국민들 사이에서 그 어느 때보다 큰 지지를 받는 지금이야말로, 칸가수가 국가의 지휘권을 장악하고 부패의 핵심을 단번에 척결할 때입니다. "
 BRA_south_american_defense_cooperation: "남아메리카 연합 군사 훈련"
 BRA_south_american_defense_cooperation_desc: "우리 대륙은 인종과 지리 모두 다양합니다. 이웃 국가들과 연합 군사 훈련을 수행함으로써, 우리 국민은 서로가 어떻게 싸우는지뿐만 아니라 어떻게 살아가는지에 대한 통찰력을 얻을 수 있습니다."
 BRA_south_american_defense_cooperation_tt: "모든 §Y세력 구성원§!의 모든 §Y장군§!이 무작위 §Y지형 특성§!을 획득할 §G50%§!의 확률을 가집니다."
 BRA_foreign_legion: "Legião Estrangeira"
 BRA_foreign_legion_desc: "[ROOT.GetName]은(는) 이 혼란한 시기에 외국인들의 피난처가 되었습니다. 그들 중에는 우리가 공유하는 가치를 지키기 위해 기꺼이 목숨을 바칠 사람들이 많습니다. 우리는 그들을 외인부대에 모집하여 그렇게 할 기회를 주어야 합니다."
 BRA_foreign_legion_tt: "§YLegião Estrangeira§! 편제를 생성하고 [ROOT.Capital.GetCapitalVictoryPointName]에 해당 부대 §G3§!개를 배치합니다. \n\n더 많은 §YLegião Estrangeira§! 사단을 모집하기 위한 §Y$BRA_foreign_legion_cat$§! 디시전을 잠금 해제합니다."
 BRA_legion_name: "Legião Estrangeira"
 BRA_south_american_research_cooperation: "라틴 아메리카 연구 위원회"
 BRA_south_american_research_cooperation_desc: "라틴 아메리카 전역의 우리 산업과 대학이 많은 경쟁국과 동일한 수준의 자금 지원을 받지 못한다는 것은 공공연한 비밀입니다. 하지만 공동 연구소를 통해 협력함으로써, 우리는 노력의 중복을 피하고 우리 지역 전반의 혁신 속도를 향상시킬 수 있습니다."
 BRA_south_american_tech_sharing_group_tt: "남아메리카의 세력 구성원이 가입에 동의할 경우:"

### ARGENTINA ###
ARG_preparation_for_the_elections: "선거 준비"
ARG_preparation_for_the_elections_desc: "아구스틴 페드로 후스토의 임기가 끝나가고 있으며, [ARG.GetName]은(는) 새로운 대통령을 맞이할 준비가 되었습니다. 정부 공식 후보는 로베르토 마리아 오르티스이지만, 마르셀로 T. 데 알베아르가 이끄는 야당은 여전히 더 민주적인 [ARG.GetName]을 위해 싸울 기회가 있습니다. 선거의 전례는 마련되었고, 이제 남은 것은 어떻게 전개될지 지켜보는 것뿐입니다."
ARG_roberto_maria_ortiz: "로베르토 마리아 오르티스"
ARG_roberto_maria_ortiz_desc: "로베르토 마리아 오르티스가 압도적인 표차로 선거에서 승리했으며, 이는 콘코르단시아 연합이 [ARG.GetName]의 통치를 계속한다는 것을 의미합니다. 그는 수락 연설에서 민주주의에 대한 자신의 신념을 재확인하는 것을 강조하며, 자유에 대한 존중과 헌법이 [ARG.GetAdjective] 국민을 위해 제정한 보장을 약속했습니다."
ARG_roberto_maria_ortiz_tt: "§Y$ARG_roberto_maria_ortiz$§!이(가) §Y$ARG_neutrality_party_long$§!의 지도자가 됩니다."
ARG_coup_imminent_tt: "§R이 중점을 선택하면 군부 반발 시간제 임무가 시작됩니다.§!"
ARG_defense_and_democracy: "El Manifiesto Concordancia"
ARG_defense_and_democracy_desc: "국방과 민주주의는 오르티스 정부의 주된 목표이며, 대통령은 콩코르단시아의 통치 아래 더욱 민주적인 [ARG.GetName]을 재건하고자 합니다. 이는 또한 군비 증강을 의미하며, [ARG.GetName]이 스스로를 제대로 방어할 수 있도록 보장할 것입니다."
ARG_crack_down_on_corruption: "부패 단속"
ARG_crack_down_on_corruption_desc: "[ARG.GetAdjective] 역사상 가장 부정적인 선거 중 하나로 당선되었음에도 불구하고, 오르티스는 정부 내 부패 수준을 완전히 단속하고자 합니다. 아이러니는 제쳐두고, 이는 [ARG.GetName]을 더 강하게 만드는 데 도움이 될 뿐입니다."
ARG_british_cooperation: "영국의 경제"
ARG_british_cooperation_desc: "[ENG.GetName]과의 긴밀한 협력은 우리 경제를 활성화하는 데 도움이 될 것이며, 특히 지난 선거에서 그들이 행사한 막대한 영향력을 고려하면 더욱 그렇습니다. [ENG.GetAdjective]와의 관계 개선은 미래에 더 나은 무역 거래를 의미할 것입니다."
ARG_the_castillo_cabinet: "카스티요 내각"
ARG_the_castillo_cabinet_desc: "안타깝게도 건강 악화로 인해 오르티스 대통령이 사임을 준비했습니다. 그의 자리를 전 부통령인 라몬 카스티요가 대신합니다. 군부 내 파벌 간의 긴장이 고조됨에 따라, 카스티요는 자신의 대통령직을 보장하기 위해 신중하게 처신해야 할 것입니다."
ARG_the_castillo_cabinet_tt: "§Y$ARG_ramon_castillo$§! 님이 §Y$ARG_neutrality_party_long$§!의 지도자가 됩니다."
ARG_import_substitution: "수입 대체"
ARG_import_substitution_desc: "전 세계적으로 긴장이 고조됨에 따라 유럽으로부터의 수입이 크게 감소했습니다. 비록 우리가 [ENG.GetAdjective]와 긴밀한 무역 관계를 맺고 있지만, [ARG.GetAdjective] 경제는 산업화를 통해 수입품을 대체하기 시작해야 할 것입니다."
ARG_emphasis_on_public_works: "공공 사업 강조"
ARG_emphasis_on_public_works_desc: "대공황의 폐허에서 우리나라를 재건하기 위해, 우리는 공공 사업 프로젝트에 더 많은 시간을 투자해야 합니다. 지역 기반 시설에 더 많은 자금을 투입한다면, 이는 우리 경제에 도움이 될 뿐만 아니라 [ARG.GetAdjective] 시민들의 삶을 개선할 것입니다."
ARG_towards_a_greater_argentina: "더 위대한 [ARG.GetName]을 향하여"
ARG_towards_a_greater_argentina_desc: "산업 역량을 늘리고 공공 사업 및 기반 시설에 대한 자금 지원을 강조하는 우리의 공동 노력을 통해, 우리는 [ARG.GetName]이 대공황의 잿더미에서 남아메리카 대륙의 신흥 강국으로 진정으로 일어설 기반을 마련했습니다!"
ARG_universidad_de_buenos_aires: "부에노스아이레스 대학교"
ARG_universidad_de_buenos_aires_desc: "1918년 대학 개혁 이래로, 부에노스아이레스 대학교는 공동으로 관리되고 민주적으로 선출된 기관과 권위를 유지해 왔습니다. [ARG.GetName]에서 가장 큰 대학으로서, 그 발전에 투자하는 것은 미래에 국가를 이끌기에 적합한 고학력 인재를 계속해서 배출할 것입니다."
ARG_consolidating_power: "권력 공고화"
ARG_consolidating_power_desc: "라몬 카스티요는 이전 대통령들보다 더 권위주의적인 정책으로 자신의 대통령직을 주장합니다. 그의 목표는 국민민주당을 통해 자신의 권력을 공고히 하고 콩코르дан시아를 서서히 해체하는 것입니다. 이는 정치적, 군사적 경쟁자들의 눈을 피하지 못했습니다."
ARG_maintain_the_status_quo: "현상 유지"
ARG_maintain_the_status_quo_desc: "순조롭게 갑시다. 이제 막 권력을 잡았으니 굳이 풍파를 일으킬 필요는 없습니다. 만약 카스티요가 정부에 남고 싶다면, 경쟁 파벌에서 커져가는 불만을 관리하는 데 더 신중해야 할 것입니다."
ARG_march_to_la_casa_rosada: "카사 로사다로의 행진"
ARG_march_to_la_casa_rosada_desc: "카스티요 정부는 마침내 선을 넘었습니다. 군부 내 불만은 대통령이 전쟁부 장관 페드로 파블로 라미레스에게 반대파인 UCR당과 회담했다는 이유로 사임을 명령했을 때 극에 달했습니다. 군 지도부는 충성파를 규합하여 카사 로사다로 행진할 준비를 합니다. "
ARG_march_to_la_casa_rosada_tt: "§Y$ARG_pedro_pablo_ramirez$§! 님이 §Y$ARG_militarist_party_long$§!의 지도자가 됩니다."
ARG_military_coup_happens_tt: "군부가 정권을 장악하도록 허용하여 '임박한 군사 쿠데타 임무'를 종료합니다."
ARG_intervenciones_federales: "연방 개입"
ARG_intervenciones_federales_desc: "우리 정부에 대한 군사 쿠데타의 위협이 커짐에 따라, 우리는 연방 개입을 제정하기로 결정해야 합니다. 각 주에서 이 법안을 통과시키는 데 시간을 들임으로써, [ARG.GetName]은 반란에 대비하여 더 잘 준비할 수 있습니다."
ARG_balancing_act: "줄타기"
ARG_balancing_act_desc: "이제 군부가 정부를 장악했으므로, 우리는 유럽에 모여드는 폭풍에 눈을 돌릴 수 있습니다. 연합국과 추축국 모두 [ARG.GetName]과 관계를 맺고 있으므로, 우리는 어느 쪽도 소외시키지 않도록 조심해야 합니다."
ARG_subdue_dissension: "불만 진압"
ARG_subdue_dissension_desc: "이제 충분합니다. 군부 반란군이 통제 불능 상태가 되었으며, 우리는 이 쿠데타가 일어나기 전에 단호하게 진압해야 합니다. 이는 단기적으로 우리 군의 성장에 타격을 줄 수 있지만, 우리 편에 충성스러운 군대를 두는 것은 그만한 가치가 있을 것입니다."
ARG_subdue_dissension_tt: "이 중점을 잠금 해제하려면 Intervenciones Federales를 최소 3회 제정했어야 합니다!"
ARG_the_american_push: "미국의 압박"
ARG_the_american_push_desc: "연합국과 추축국 사이의 관계 균형을 맞추려는 우리의 헌신은 [USA.GetName]의 눈을 피하지 못했습니다. 그들은 우리의 온건한 견해에 불만을 품고 있음을 분명히 밝혔으며, 추축국과의 관계를 완전히 단절하라고 요구할 수도 있습니다."
ARG_juan_peron_elected: "후안 페론"
ARG_juan_peron_elected_desc: "정치적 격변의 시기가 지난 후, [ARG.GetNameDef]에 인기 있고 호감 가는 지도자가 등장할 때가 되었습니다. 아르헨티나 국민에게 자부심과 안정감을 불러일으키는 약속으로, 후안 페론은 위대한 조국의 새 대통령으로 확실한 선택이 되었습니다. 그의 사랑하는 아내 에바와 함께, 마침내 폭풍에 맞서 [ARG.GetNameDef]를 강화할 때입니다."
ARG_peronism: "페론주의"
ARG_peronism_desc: "페론이 집권하면서, 대통령 자신의 사상과 영향력에 기반한 새로운 정치 운동을 확립하려는 움직임이 있었습니다. 정의주의라고도 알려진 페론주의는 페론의 반대파들 사이에서 논쟁거리가 되었으며, 일부는 이를 파시즘에 비유하는 반면 다른 이들은 민족주의, 노동주의, 대중주의가 모호하게 혼합된 것이라고 묘사합니다."
ARG_help_the_allies: "연합국 지원"
ARG_help_the_allies_desc: "전쟁이 더욱 격화됨에 따라, 중립을 포기하고 공식적으로 연합국에 가담하라는 [USA.GetName]의 압박이 커지고 있습니다. 만약 우리가 그렇게 하기로 선택한다면, 우리는 이 세계적인 분쟁의 공식적인 참여자가 될 것입니다."
ARG_maintain_neutrality: "연합국 거부"
ARG_maintain_neutrality_desc: "연합국의 압박에도 불구하고, 그들의 전쟁에 휘말리는 것은 우리의 이익에 부합하지 않습니다. 유럽에서의 분쟁을 걱정할 필요 없이 우리 대륙에 집중할 일도 충분합니다. 이로 인해 [USA.GetName]의 금수 조치를 감수해야 한다면, 그리할 것입니다."
ARG_accept_german_advisors: "독일 고문단 수용"
ARG_accept_german_advisors_desc: "우리는 항상 [GER.GetName]과 긴밀한 관계를 유지해 왔으며, 그들의 수많은 인재들을 [ARG.GetName](으)로 초청하여 우리의 목표를 더욱 발전시키는 데 도움을 받는다면 분명 이익이 될 것입니다."
ARG_our_own_path: "우리만의 길"
ARG_our_own_path_desc: "지난 몇 년간 우리는 우리 자신에게 집중하며, 다른 나라들을 황폐화시키는 더 큰 세계적 분쟁에서 벗어나 있었습니다. [ARG.GetName]은 자립했으며, 우리의 길이 어디로 향할지는 우리 스스로 결정할 것입니다. 경제적으로 계속 번영하고 성장할 것인지, 아니면 우리만의 팽창 목표를 세울 것인지는 두고 볼 일입니다."
ARG_change_of_course: "노선 변경"
ARG_align_with_the_monroe_doctrine: "먼로 독트린에 동조"
ARG_align_with_the_monroe_doctrine_desc: "수년 동안 먼로 독트린은 서반구에 대한 유럽의 간섭을 막는 정책으로 자리 잡아 왔습니다. 비록 지금은 유럽 열강과 동맹을 맺고 있지만, 우리는 이 독트린에 완전히 동조하여 아메리카 대륙으로의 침략을 막아야 합니다."
ARG_envoy_to_london: "런던 특사"
ARG_envoy_to_london_desc: "[ENG.GetName]은 수년 동안 우리의 가장 가까운 동맹국 중 하나였으며, 이제 그들의 적에 맞서 함께 싸우는 만큼, [ENG.GetAdjective] 정부와 더 긴밀한 관계를 맺기 위해 [ARG.GetAdjective] 특사를 런던에 보내는 것이 현명할 것입니다."
ARG_study_the_battle_of_the_river_plate: "라플라타 강 해전 연구"
ARG_study_the_battle_of_the_river_plate_desc: "라플라타 강 해전은 이번 전쟁의 첫 해전이었으며, 남미 영해에서 벌어졌습니다. 우리는 이 전투를 최선을 다해 연구하고 이를 통해 우리 해군 역량을 발전시키는 법을 배워야 합니다."
ARG_islas_del_atlantico_sur: "Islas del Atlántico Sur"
ARG_islas_del_atlantico_sur_desc: "포클랜드 제도와 사우스조지아 제도는 수년 동안 [ENG.GetName]의 주권 영토였습니다. [ARG.GetName]과 매우 가까운 이 섬들에 대한 우리의 영유권 주장에도 불구하고, 섬들은 [ENG.GetAdjective]의 통치하에 남아 있습니다. [ENG.GetName]과의 새로운 동맹을 통해, 어쩌면 섬들의 통제권을 우리에게 이양하도록 협상할 수 있을지도 모릅니다. 결국, 이번 전쟁에서 우리가 섬들을 더 잘 보호할 수 있을 테니까요."
ARG_improving_the_islands: "제도 개선"
ARG_improving_the_islands_desc: "이제 포클랜드 제도와 사우스조지아 제도의 소유권을 확보했으니, 우리는 군사 기반 시설을 개선하는 데 집중하여 섬들이 계속 우리의 통제하에 있도록 보장해야 합니다."
ARG_firmes_volamos: "Firmes Volamos"
ARG_firmes_volamos_desc: "[ARG.GetName]에 거주하는 [ENG.GetAdjective] 공동체는 영국 왕립 공군에 기부할 비행대대 비용을 지불하겠다고 제안했습니다. 이 비행대대를 [ENG.GetName](으)로 보냄으로써 우리는 RAF와 더 긴밀히 협력하고 우리 공군 역량을 발전시킬 수 있을 것입니다."
ARG_extinguish_south_american_fascism: "남아메리카 파시즘 소탕"
ARG_extinguish_south_american_fascism_desc: "파시즘이 세계에 남긴 오점이 남아메리카까지 번졌습니다. 우리는 이를 방관하며 진행되도록 내버려 둘 수 없습니다. 우리는 일어나서, 그것이 대륙 전체로 퍼지기 전에 권위주의적 독재를 위해 민주주의를 포기한 국가들을 처리해야 합니다."
ARG_no_fascism_in_south_america_tt: "§Y남아메리카§!의 모든 §Y파시스트§! 국가에 대한 §Y$puppet_wargoal_focus$§! 전쟁 목표 획득"
ARG_american_allyship: "미국과의 동맹"
ARG_american_allyship_desc: "우리의 가장 강력한 동맹국 중 하나는 이제 막 깨어난 북쪽의 거인입니다. 범아메리카 통합 정신에 입각하여 [USA.GetAdjective] 정부와 더 긴밀한 관계를 발전시키기 위해 [ARG.GetAdjective] 특사를 워싱턴 D.C.로 보내야 합니다."
ARG_us_marine_program: "미 해병대 훈련 프로그램"
ARG_us_marine_program_desc: "미 해병대는 정예 부대이자 [USA.GetAdjective] 군사력의 상징입니다. 우리는 그들에게서 많은 것을 배울 수 있으며, 이제 [USA.GetName]과 더 긴밀하게 협력하게 되었으므로 그럴 기회가 생겼습니다."
ARG_us_marine_program_doctrine: "미 해병대 훈련"
ARG_encourage_the_red_scare: "적색 공포"
ARG_encourage_the_red_scare_desc: "우리가 걱정해야 할 것은 파시즘만이 아닌 것 같습니다. [SOV.GetName]의 커져가는 힘도 마찬가지로 시급한 문제입니다. 공산주의는 민주주의에 대한 또 다른 안티테제이며, 우리는 그 확산을 경계해야 합니다."
ARG_counter_intelligence_program: "방첩 프로그램"
ARG_counter_intelligence_program_desc: "이 전쟁에서 첩보 활동이 중요한 역할을 하는 것 같지만, 우리 자체 정보 프로그램은 심각하게 뒤처져 있습니다. [ARG.GetName]과 다른 남아메리카 국가들에서 [GER.GetAdjective] 작전이 벌어지고 있다는 소문이 있으므로, 가능한 한 빨리 이에 대응할 준비를 해야 합니다."
ARG_end_operation_bolivar: "볼리바르 작전 종결"
ARG_end_operation_bolivar_desc: "우리는 [GER.GetName]으로부터 국내로 유입되는 지속적인 첩보 임무 흐름을 발견했습니다. 그들은 우습게도 이것을 '볼리바르 작전'이라고 명명했습니다. 이는 용납할 수 없으며, 우리는 [ARG.GetName] 내에서의 모든 [GER.GetAdjectives] 작전을 즉시 중단시켜야 합니다."
ARG_extinguish_south_american_communism: "남아메리카 공산주의 소탕"
ARG_extinguish_south_american_communism_desc: "'적색 위협'은 단순히 아이들을 겁주기 위해 만들어낸 허구가 아닙니다. 공산주의는 남아메리카로 퍼져나갔고, 매우 빠른 속도로 [ARG.GetName]을 잠식하고 있습니다. 민주주의와 자유를 위해, 우리는 이 붉은 부활이 대륙 전체로 퍼지기 전에 진압하기 위해 동원해야 합니다."
ARG_no_communism_in_south_america_tt: "§Y남아메리카§!의 모든 §Y공산주의§! 국가에 대한 §Y$puppet_wargoal_focus$§! 전쟁 목표 획득"
ARG_banco_central_de_la_republica_argentina: "아르헨티나 공화국 중앙은행"
ARG_banco_central_de_la_republica_argentina_desc: "1935년 6개의 의회법에 의해 설립된 아르헨티나 공화국 중앙은행은 [ARG.GetName]의 통화 위원회를 대체했습니다. 은행 총재인 에르네스토 보쉬는 은행을 발전시키고 경제를 활성화하여 마침내 대공황으로부터 재정적으로 회복하는 데 도움을 주는 것을 목표로 합니다."
ARG_reach_out_to_the_great_powers: "열강에 접촉"
ARG_reach_out_to_the_great_powers_desc: "우리의 경제 상황을 성장시키는 데 도움이 될 수 있는 선택지 중 하나는 세계 열강에 접촉하여 차관을 받아 회복 속도를 높이는 것입니다. 하지만 처음보다 더 많은 빚을 지고 싶지는 않으므로 신중해야 합니다."
ARG_industrial_expansion: "산업 확장"
ARG_industrial_expansion_desc: "강력한 산업은 모든 경제의 근간입니다. 우리는 산업 확장을 위한 더 많은 선택지를 개발하는 연구에 집중해야 합니다."
ARG_industrial_expansion_bonus: "산업 기술 부스트"
ARG_production_initiative: "생산 계획"
ARG_production_initiative_desc: "우리의 생산 도구는 구식이며 개량이 필요합니다. 군에 필요한 부품 생산 속도를 높이기 위해 생산 기술 개발에 자금을 투입해야 합니다."
ARG_tech_initiative_bonus: "기술 계획"
ARG_economic_tax_reforms: "경제 조세 개혁"
ARG_economic_tax_reforms_desc: "우리의 농촌 기반 시설은 심각하게 미개발 상태입니다. 현행 조세 정책에 대한 일부 개혁을 통과시킨다면, 미개발된 농지를 건설하는 데 더 중점을 둘 수 있을 것입니다."
ARG_economic_reactivation_act: "경제 재활성화법"
ARG_economic_reactivation_act_desc: "경제 재활성화법은 민간 기반 시설 개발을 우선시하여 도시에 새로운 공장을 건설하는 속도를 높이는 역할을 할 것입니다."
ARG_immigration_wave: "이민의 물결"
ARG_immigration_wave_desc: "[ARG.GetName]은(는) 이민으로 세워진 국가입니다. 인구 대다수가 스페인에 기원을 두고 있지만, 국경 내에는 상당한 규모의 독일인과 심지어 웨일스인 인구도 있습니다. 이들 국가로부터 [ARG.GetName](으)로의 이주를 장려하여 경제를 활성화할 수 있습니다."
ARG_develop_civilian_economy: "민간 경제 개발"
ARG_develop_civilian_economy_desc: "도시에 더 많은 중점을 두면서, [ARG.GetName] 국민에게 필요한 편의 시설을 제공하는 것이 중요합니다. 국민을 행복하게 유지할 수 있다면, 이는 우리를 더욱 강하게 만들 것입니다. 더 많은 공장을 즉시 개발하는 데 투자하는 것이 앞으로 나아갈 길입니다."
ARG_the_argentinian_metropole: "아르헨티나의 대도시"
ARG_the_argentinian_metropole_desc: "부에노스아이레스는 [ARG.GetName]의 진정한 대도시 생활의 상징으로 자리 잡을 것입니다. 도시 개발은 국민이 행복하고 생산적인 삶을 살도록 장려하는 데 도움이 되었습니다. 그 결과, 이제 우리는 인구 급증과 전국적으로 더 높은 교육 수준을 갖게 되었습니다."
ARG_invest_in_the_roads: "도로에 투자"
ARG_invest_in_the_roads_desc: "[ARG.GetName]의 기반 시설은 재정비가 절실히 필요합니다. 도로 자금 조달에 노력을 기울인다면, 각 주의 지역적 상호 연결성에 도움이 될 것입니다."
ARG_invest_in_the_railways: "철도에 투자"
ARG_invest_in_the_railways_desc: "[ENG.GetName]으로부터 철도 개발의 역사를 가지고 있으므로, 철도를 현대화하는 과정을 계속하는 것이 타당합니다. 이는 단일 네트워크를 통해 전국을 연결하고, [ARG.GetName]을(를) 더욱 통합된 국가로 만드는 데 도움이 될 것입니다."
ARG_expand_steel_extraction: "철강 채굴 확장"
ARG_expand_steel_extraction_desc: "광업은 [ARG.GetName]이 은의 땅으로 인식된 이래로 주요 산업이었습니다. 하지만, 우리의 관심은 산악 지대 내에서 철강 채굴을 확장하는 데 더 집중되어 있습니다."
ARG_expand_aluminum_extraction: "알루미늄 채굴 확장"
ARG_expand_aluminum_extraction_desc: "알루미늄은 우리 차량 부대 개발에 중요한 자원입니다. 우리는 광업을 개발하고 이 유용한 금속의 채굴률을 높여야 합니다."
ARG_yacimientos_petroliferos_fiscales: "Yacimientos Petrolíferos Fiscales"
ARG_yacimientos_petroliferos_fiscales_desc: "Yacimientos Petrolíferos Fiscales는 석유 탐사, 생산, 정제 및 상업화에 종사하는 국영 [ARG.GetAdjective] 에너지 회사입니다. 석유 생산에 대한 통제력을 강화하기 위해 이 회사에 더 많은 자금을 투자해야 합니다."
ARG_yacimientos_petroliferos_fiscales_tt: "결정 잠금 해제: §Y바카 무에르타 개발§!"
ARG_rapid_urbanization: "급속한 도시화"
ARG_rapid_urbanization_desc: "[ARG.GetName]의 많은 지역이 농촌으로 남아 있지만, 20세기에 나아갈 길은 도시화입니다. 도시를 개발함으로써 더 많은 사람들을 그곳으로 이주하도록 설득할 수 있으며, 이는 고도로 산업화된 중심지의 노동력을 크게 증가시킬 것임을 의미합니다."
ARG_agricultural_improvements: "농업 개선"
ARG_agricultural_improvements_desc: "농업은 수년 동안 [ARG.GetName] 발전에 필수적이었으며, 많은 사람들이 이 생활 방식으로 생계를 유지하고 있습니다. 이는 우리 농촌 지역 사회의 농업 기반 시설 일부를 개선할 수 있는 좋은 기회입니다."
ARG.military_production_lines: "군수 생산 라인"
ARG_military_production_lines_desc: "전 세계적으로 위기가 고조됨에 따라, 우리 군수 생산의 미래에 투자하는 것이 현명한 생각일 것입니다. 군용 장비 전용 공장 단지를 더 많이 건설한다면, 다가올 폭풍에 대비하여 최선의 방법으로 준비하게 될 것입니다."
ARG_capitalize_the_beef_industry: "소고기 산업 적극 활용"
ARG_capitalize_the_beef_industry_desc: "[ARG.GetAdjective] 소고기는 우리의 주요 수출품 중 하나이며, 특히 [ENG.GetNameDef](으)로 많이 수출됩니다. 우리는 이를 활용하여 목축 능력을 확장하고, 우리의 맛있는 고기가 전 세계적으로 알려지도록 해야 합니다!"
ARG_revisit_the_roca_runciman_treaty: "로카-런시먼 조약 재검토"
ARG_revisit_the_roca_runciman_treaty_desc: "로카-런시먼 조약은 1933년부터 시행되어 [ENG.GetName]과의 소고기 수출을 보장해 왔습니다. 하지만, 최근 우리 경제의 발전에 따라 [ENG.GetAdjective]과 새로운 조약을 협상하여 더 나은 무역 거래를 성사시킬 때가 되었을지도 모릅니다."
ARG_a_new_trading_partner: "로카-런시먼 조약 개정"
ARG_a_new_trading_partner_desc: "로카-런시먼 조약은 1933년부터 시행되어 [ENG.GetName]과의 소고기 수출을 보장해 왔습니다. 하지만, 최근 전 세계의 발전에 따라 이 조약을 파기하고 새로 찾은 동맹국과 더 유익한 조약을 체결하는 것이 현명할 것입니다."
ARG_develop_the_electricity_sector: "전력 부문 개발"
ARG_develop_the_electricity_sector_desc: "우리 전력 부문은 개선이 필요하므로, 전기 발전에 도움이 될 추가 기술 연구에 자원을 집중하는 것이 현명할 것입니다."
ARG_invest_in_construction_guilds: "건설 길드 투자"
ARG_invest_in_construction_guilds_desc: "건설 길드는 도시 개발의 중추입니다. 우리의 다음 과업은 [ARG.GetName]의 길드에 자금을 투입하여 우리의 건설 기술이 세계의 다른 국가들에 뒤처지지 않도록 보장하는 것입니다."
ARG_technical_schools: "기술 학교"
ARG_technical_schools_desc: "기술 학교를 발전시킴으로써, 우리는 정부 전반에 걸쳐 고용할 수 있는 기술 고문의 수를 적극적으로 늘릴 수 있습니다. 이러한 유형의 교육을 발전시키는 것은 우리의 경제력을 증진시키는 데 도움이 될 것입니다."
ARG_work_with_the_nationalists: "민족주의자들과 협력"
ARG_work_with_the_nationalists_desc: "이제는 통치에 다른 접근법을 취해야 할 때일지도 모릅니다. 결국, 수년간 선거를 병들게 해 온 만연한 부패는 둔화될 기미를 보이지 않습니다. 만약 우리가 국내의 민족주의 단체들과 협력한다면, [ARG.GetNameDef]의 질서를 회복할 더 나은 기회를 얻을 수 있을 것입니다."
ARG_end_the_coup_tt: "§G이 중점을 선택하면 군사 쿠데타 임무가 종료됩니다.§!"
ARG_cut_ties_with_britain: "영국과의 관계 단절"
ARG_cut_ties_with_britain_desc: "섬나라인 [ENG.GetNameDef]이 우리의 가장 가까운 무역 상대국이었던 것은 사실이지만, 우리의 소고기에 대한 그들의 조약은 우리 국민이 자국을 부양할 능력을 저해할 뿐입니다. 우리는 대중 전체에 반 영국 감정을 부추기고 유럽의 식민 열강 없이도 자립할 수 있음을 세계에 증명해야 합니다."
ARG_support_radical_nationalism: "급진적 민족주의 지원"
ARG_support_radical_nationalism_desc: "스페인 제국의 족쇄를 벗어던진 이래로, 우리는 [ARG.GetAdjective]의 정체성을 정의하기 위해 노력해 왔습니다. 우리는 이곳에서 번성하고 살아남았으며, 이 땅이 우리의 것임을 명백히 증명했습니다. [ARG.GetAdjective]의 정체성을 강화하고, 남아메리카의 진정한 강자가 누구인지 모두에게 상기시킵시다."
ARG_corporatism: "협동조합주의"
ARG_corporatism_desc: "협동조합주의는 파시즘의 근본적인 사상이며, 가능한 한 빨리 시행해야 하는 것입니다. 그러나 이를 위해서는 지역 엘리트와 인재에 의존하고, [ARG.GetNameDef]의 새로운 파시스트 계층 내에서 승진할 수 있는 문을 열어야 합니다. 이것이 우리가 충성과 효율성으로 가득 찬 미래로 국가를 이끌 방법입니다."
ARG_reestablish_ligas_patrioticas: "애국 동맹 재건"
ARG_reestablish_ligas_patrioticas_desc: "애국 동맹은 1920년대에 [ARG.GetNameDef]에서 활동했던 극우 준경찰 민간 조직이었습니다. 그 이후로, 그들은 모두 흩어졌습니다. 아마도 이 운동을 재활성화하여 우리나라의 만연한 부패 속에서 질서를 확립하는 데 도움을 받아야 할 때일 것입니다."
ARG_fascist_researchers: "파시스트 연구원"
ARG_fascist_researchers_desc: "우리나라가 서서히 파시즘의 길로 나아감에 따라, 국가 연구 확장에 투자하는 것이 현명할 것입니다. 결국, [ARG.GetNameDef]에 질서와 충성을 확립하는 것은 시작에 불과합니다. 모든 것이 계획대로 진행된다면, 우리는 현재 보유하고 있는 것보다 훨씬 더 강력한 군사 기술이 필요할 수 있습니다."
ARG_support_the_spanish_coup: "스페인 쿠데타 지원"
ARG_support_the_spanish_coup_desc: "스페인에 있는 우리 형제들은 현재 자국의 미래를 위해 피비린내 나는 내전에 휘말려 있습니다. 군사 통제 정부에 대한 프랑코의 생각은 우리의 생각과 크게 일치합니다. 우리는 즉시 원조를 보내고, 민주주의의 오류를 세계에 보여주어야 합니다."
ARG_demand_spanish_compensation: "스페인에 보상 요구"
ARG_demand_spanish_compensation_desc: "우리의 스페인 형제들은 마땅히 그들의 것이었던 권력을 성공적으로 되찾았습니다. 이제, 우리는 그들의 성공에 우리가 한몫했다는 것과, 이제 대가를 치를 시간이라는 것을 상기시켜야 할 것입니다!"
ARG_demand_spanish_compensation_tt: "§Y[SPA.GetNameDef]§!에 §Y적도 기니§!를 우리에게 넘겨줄 것을 요구하는 이벤트를 보냅니다. 그들이 우리에 대해 §G높은§! 의견을 가지고 있다면 수락할 가능성이 더 높습니다!"
ARG_argentinian_volunteers_in_spain_flag: "§Y[ARG.GetName]§!이(가) §Y[SPA.GetName]§!에 의용군을 파견했습니다!"
ARG_invite_spanish_nationalists: "스페인 민족주의자 초청"
ARG_invite_spanish_nationalists_desc: "불행히도, 프랑코의 쿠데타는 격퇴되었고 내전은 공식적으로 끝났습니다. 수천 명의 스페인 민족주의자들이 이제 자신들의 이념에 더 적합한 고향을 찾아 이베리아 반도를 떠나려 하고 있습니다. 두 나라 사이의 역사적 관계를 고려할 때, 우리는 그들이 [ARG.GetNameDef]의 성장하는 민족주의 운동을 돕도록 문을 열어주어야 합니다."
ARG_encourage_german_investments: "독일 투자 장려"
ARG_encourage_german_investments_desc: "많은 이들에게 유럽의 왕따로 여겨짐에도 불구하고, [GER.GetNameDef]은(는) 산업 및 군사 강국이 되었습니다. 우리는 [ARG.GetNameDef]에 상당수의 [GER.GetAdjective]인들이 살고 있기 때문에 항상 [GER.GetAdjective]인들과 비교적 우호적이었습니다. 우리는 그들에게 연락하여 우리의 성장하는 민족주의 운동에 기꺼이 투자할 의향이 있는지 확인해야 합니다."
ARG_german_investments_bonus: "독일 투자"
ARG_encourage_italian_argentine_diplomacy: "이탈리아-아르헨티나 외교"
ARG_encourage_italian_argentine_diplomacy_desc: "[ITA.GetAdjective] 파시즘은 [ARG.GetNameDef]의 주요 민족주의 정당이 정책의 모델로 삼아온 표준 모델이었습니다. 우리는 [ITA.capital.GetCapitalVictoryPointName](으)로 특사를 보내 양국 간의 새로운 외교 채널을 열어야 합니다. 이는 양국 모두 급속한 기술 발전을 통해 이익을 얻을 수 있도록 연구 협정을 맺을 수 있는 좋은 기회가 될 것입니다."
ARG_guardia_nacional: "국가 방위대"
ARG_guardia_nacional_desc: "이제 콘코르단시아를 무너뜨리고 [ARG.GetNameDef]을(를) 군사 정부의 보호 아래 둘 때가 왔습니다. 국가 방위대는 아르헨티나 독립 전쟁 당시 우리의 주권을 위해 싸웠으며, 이제 페드로 파블로 라미레스의 지도 아래 [ARG.GetNameDef]을(를) 새로운 번영의 시대로 이끌 것입니다."
ARG_union_nacional_fascista: "파시스트 민족 연합"
ARG_union_nacional_fascista_desc: "끝없는 부패와 내분을 통해 콘코르단시아 지도부는 무능하다는 것이 명백해졌습니다. [ARG.GetAdjective] 정치에 중대한 변화가 필요한 때입니다. 니미오 데 안킨은 파시스트 민족 연합의 지도자로서 충분한 인기를 얻었으며, 국가를 이끌고 [ARG.GetNameDef]에 민족주의적 자부심을 되찾아줄 준비가 되어 있습니다."
ARG_rapid_militirization: "신속한 군사화"
ARG_rapid_militirization_desc: "이제 확고한 군사 정부가 집권했으니, 우리의 팽창 목표를 향해 나아갈 수 있습니다. 군산 복합체 모델을 확장하고 무기와 병력 생산을 늘릴 때입니다. 세계는 [ARG.GetNameDef]의 힘에 맞설 준비를 해야 합니다."
ARG_argentine_nationalism: "아르헨티나 민족주의"
ARG_argentine_nationalism_desc: "콘키스타도르의 정신이 우리 핏줄에 흐르고 있으며, 아메리카를 정복한 그들의 명성을 지키는 것이 현명할 것입니다. 조국을 위해 싸우고 죽으려는 이들을 결집하고, 무기와 기계의 대량 생산을 위해 산업을 준비합시다. [ARG.GetNameDefCap]이(가) 전쟁을 준비합니다!"
ARG_war_division: "전쟁부"
ARG_war_division_desc: "모든 전쟁은 철저한 준비 위에 세워집니다. 내각을 구성하고 전쟁 기계를 제조하면서, 우리는 매일 팽창주의 목표에 점점 더 가까워지고 있습니다."
ARG_argentina_first: "아르헨티나 우선주의"
ARG_argentina_first_desc: "신중한 고려 끝에, [ARG.GetNameDef]의 미래를 위한 최선의 행동 방침은 유럽에서 커져가는 분쟁에 개입하지 않고, 대신 [ARG.GetNameDef]의 성장과 안정의 필요성에 집중하는 것이라고 결정했습니다. 우리만의 세력을 형성하고 세계에 맞서 홀로 섭시다."
ARG_join_the_axis: "추축국 가입"
ARG_join_the_axis_desc: "우리가 [ARG.GetNameDef]을(를) 강력하고 안정적인 지도력 아래 둘 수 있었던 것은 추축국 덕분입니다. 따라서 그들에게 연락하여 전쟁에 참여할 것을 요청하고, 전 세계에 파시즘을 퍼뜨리는 데 도움을 주어야 합니다!"
ARG_dominate_the_south: "남부 지배"
ARG_dominate_the_south_desc: "대륙에 수많은 적들이 우리를 둘러싸고 있는 상황에서, 철권으로 잠재적인 위협이 발생하기 전에 파괴하는 것이 중요합니다. 남아메리카에서 가장 지배적인 세력이 누구인지 보여줍시다."
ARG_preparations_for_war: "전쟁 준비"
ARG_preparations_for_war_desc: "우리가 당장이라도 전쟁에 나설 준비가 되어 있을지 모르지만, 국경의 보급 상황은 다른 이야기를 들려줍니다. 보급선을 개선함으로써, 우리는 적들의 신속한 패배를 보장할 수 있습니다."
ARG_conquer_paraguay: "[PAR.GetNameDefCap] 정복"
ARG_conquer_paraguay_desc: "협상의 여지는 없습니다. [PAR.GetNameDef] 국가는 우리의 남아메리카 지배에 방해가 됩니다. 최후통첩을 보내기보다는, 정면으로 부딪혀 이웃 국가에 전쟁을 선포하는 것이 최선입니다."
ARG_paraguayan_ultimatum: "[PAR.GetAdjective] 최후통첩"
ARG_paraguayan_ultimatum_desc: "[PAR.GetNameDefCap]은(는) 대륙의 나머지 국가들에 대한 우리의 전쟁 목표에 매우 중요한 전략적 영토입니다. 그들은 우리 밑에서 일하는 데 동의하거나, 군사적으로 강제되어 우리 깃발 아래로 들어올 수 있습니다. 선택은 그들의 몫입니다. 최후통첩을 보내십시오."
ARG_uraguayan_ultimatum.tt: "([URG.GetFlag]§Y[URG.GetNameDefCap]§!)이(가) '§Y$ARG_political_events.19.t$§!' 이벤트를 받으며, 해당 이벤트는 우리에게 §Y괴뢰국§!이 될 것을 요구합니다. 우리에 대한 §Y우호도§!가 높으면 수락할 가능성이 더 높습니다!"
ARG_paraguayan_ultimatum.tt: "([PAR.GetFlag]§Y[PAR.GetNameDefCap]§!)이(가) '§Y$ARG_political_events.19.t$§!' 이벤트를 받으며, 해당 이벤트는 우리에게 §Y괴뢰국§!이 될 것을 요구합니다. 우리에 대한 §Y우호도§!가 높으면 수락할 가능성이 더 높습니다!"
ARG_chilean_ultimatum.tt: "([CHL.GetFlag]§Y[CHL.GetNameDefCap]§!)이(가) '§Y$ARG_political_events.19.t$§!' 이벤트를 받으며, 해당 이벤트는 우리에게 §Y괴뢰국§!이 될 것을 요구합니다. 우리에 대한 §Y우호도§!가 높으면 수락할 가능성이 더 높습니다!"
ARG_revive_the_colonial_plan: "식민 계획 부활"
ARG_revive_the_colonial_plan_desc: "남아메리카에 발판을 마련하기 위해, [GER.GetNameDef]은(는) [URG.GetNameDef]에 식민지를 건설하려는 계획을 실행에 옮겼습니다. 하지만 그 계획은 결실을 보지 못했습니다. 우리는 이 계획을 부활시켜, 우리의 파시스트 동지들을 대신해 [URG.GetNameDef]을(를) 괴뢰화해야 합니다."
ARG_conquer_uruguay: "발판 마련"
ARG_conquer_uruguay_desc: "우리의 새로운 정권이 자리를 잡는 동안, 우리는 작은 이웃 국가들에 대해 어떻게 나아갈지 결정해야 합니다. [URG.GetNameDefCap]은(는) 항상 분쟁 지역이었으며, 무력으로 점령하는 것은 우리가 얕볼 상대가 아님을 전 세계에 보여주는 계기가 될 것입니다."
ARG_reach_out_to_chile: "[CHL.GetNameDefCap]에 접촉"
ARG_reach_out_to_chile_desc: "[CHL.GetNameDefCap]은 우리의 다른 인접국과 비교했을 때 훨씬 크고 강력합니다. 그들에게 접근하여 우리와 동맹을 맺을 기회를 제공하는 것이 현명할 것입니다. 어쩌면 그들이 탐내던 영토를 돌려준다면, 그들이 더 쉽게 받아들일지도 모릅니다."
ARG_reach_out_to_chile_tt: "그들이 우리에 대해 §Y높은 우호도§!를 가지고 있거나, §Y파시스트§! 또는 §Y비동맹§! 이념일 경우 수락할 가능성이 더 높습니다."
ARG_reach_out_to_chile_2_tt: "만약 그들이 §Y수락§!한다면, 우리는 §Y[954.GetName]§!과 §Y[953.GetName]§!을 그들에게 양도할 것입니다."
ARG_chilean_ultimatum: "[CHL.GetAdjective] 최후통첩"
ARG_chilean_ultimatum_desc: "우리는 너무 오랫동안 [CHL.GetNameDef]과 국경 긴장을 겪어왔습니다. 우리가 진정으로 남아메리카의 지배적인 세력으로 자리매김하고 싶다면, 가능한 한 빨리 그들을 무력화해야 합니다. 그들은 평화롭게 우리에게 합류하거나, 아니면 우리가 그들의 영토로 진군하여 우리의 것을 되찾을 것입니다."
ARG_the_old_enemy: "오랜 숙적"
ARG_the_old_enemy_desc: "마침내 우리의 가장 오랜 경쟁자의 그림자가 드리운 북쪽으로 눈을 돌릴 때가 왔습니다. [BRA.GetNameDefCap]은 항상 이 대륙에서 우리의 가장 큰 적이었습니다. 이제 시스플라티나 전쟁의 정신을 다시 불태워 [BRA.capital.GetCapitalVictoryPointName]을 향한 정복의 길을 닦을 때입니다."
ARG_south_american_unity: "남아메리카의 통합"
ARG_south_american_unity_desc: "이제 대륙 전역에 영토를 확보했으니, 우리가 단지 [ARG.GetNameDef]이 아니라 남아메리카 전체라는 사실을 상징하는 새로운 이름을 가질 때가 왔습니다. 우리는 마침내 이 분쟁이 잦은 국가들을 하나의 강력한 깃발 아래 통합하는 데 성공했습니다."
ARG_integrate_operation_bolivar: "볼리바르 작전 통합"
ARG_integrate_operation_bolivar_desc: "한동안 [GER.GetNameDef]은 남아메리카 전역에서 여러 첩보 임무를 수행해 왔습니다. 애칭으로 '볼리바르 작전'이라 불리는 이 지침은 [ARG.GetNameDef]에서 진행되어 왔습니다. 이제 [GER.GetAdjective]과 좋은 관계를 맺었으니, 이 프로그램을 통합하고 대륙 전역으로 확산시키도록 노력할 수 있습니다."
ARG_release_hellmuth: "헬무트 석방"
ARG_release_hellmuth_desc: "오스마르 헬무트는 [GER.GetAdjective]계 [ARG.GetAdjective]인으로, 이전 정부에서 [GER.GetNameDef]의 파시스트 정부 협력자로 발각되어 체포되었습니다. 우리는 그를 즉시 석방하고, 대신 우리 정보기관에 고용해야 합니다."
ARG_anti_american_propaganda: "반미 선전"
ARG_anti_american_propaganda_desc: "[USA.GetNameDefCap]은 아메리카 대륙의 민주주의 보루이며, 당연히 우리가 노력해 온 모든 것에 반대합니다. 만약 우리가 그들을 상대하길 바란다면, 우리 국민을 대의 뒤에 결집시켜야 합니다. 이를 위해, 우리는 전국에 반미 감정을 부추길 수 있습니다. 그러한 투지를 바탕으로, 우리는 북쪽의 거인에 대한 공격을 정당화할 수 있을 것입니다."
ARG_the_war_machine: "전쟁 기계"
ARG_the_war_machine_desc: "우리의 새로운 정권이 힘을 키워감에 따라, 그에 걸맞은 군대가 필요합니다. [ARG.capital.GetCapitalVictoryPointName]뿐만 아니라 전국에 더 많은 군수 산업 단지를 건설하는 데 투자하는 것이 중요합니다. [ARG.GetAdjective]의 전쟁 기계가 일어나게 하라!"
ARG_secure_the_borders: "국경 확보"
ARG_secure_the_borders_desc: "가장 위험한 경쟁자들로부터 현재 국경을 안전하게 지키는 것이 현명할 것입니다. 우리는 [CHL.GetNameDef] 및 [BRA.GetNameDef]과 공유하는 국경을 따라 방어선을 구축하고, 북부를 뒤덮은 수많은 숲에서 싸우도록 군 지도자들을 훈련시켜야 합니다. 방어는 무엇보다 중요합니다!"
ARG_argentine_island_sovereignty: "아르헨티나의 섬 주권"
ARG_argentine_island_sovereignty_desc: "남대서양 제도는 명백히 [ARG.GetNameDef]의 영향권 내에 있음에도 불구하고 너무 오랫동안 영국에 의해 점령되어 왔습니다. 우리는 [ENG.GetNameDef]에 전쟁을 선포하는 한이 있더라도 일어나 우리의 정당한 권리를 주장해야 합니다. 이 섬들은 어떤 수단을 써서라도 [ARG.GetAdjective]의 것이 될 것입니다!"
ARG_argentine_island_sovereignty.tt: "현재 ([ENG.GetFlag]§Y[ENG.GetNameDefCap]§!)과 전쟁 중이 아니라면, 그들을 상대로 §Y정복§! 전쟁 목표를 얻게 됩니다."
ARG_a_call_to_reform: "개혁의 요구"
ARG_a_call_to_reform_desc: "지난 10년 동안 [ARG.GetNameDef]의 정치는 엉망이었습니다. 완전한 민주주의는 이폴리토 이리고옌과 함께 사라졌고, [ARG.GetAdjective] 정부 내에 혼란과 부패만을 야기했습니다. 이제 우리나라를 올바른 길로 되돌리기 위해 신속하고 필요한 개혁을 모색해야 할 때입니다."
ARG_invite_ghioldi_back_to_argentina: "기올디를 아르헨티나로 초청"
ARG_invite_ghioldi_back_to_argentina_desc: "로돌포 기올디는 [ARG.GetNameDef]의 저명한 공산주의자였으나, 불행히도 우리 정부의 박해로 인해 국외로 도피해야 했습니다. [ARG.GetNameDef]에서 좌파에 대한 태도가 바뀌기 시작했으니, 이제 기올디를 사면하고 그의 조국으로 다시 초청할 때가 된 것 같습니다."
ARG_invite_ghioldi_back_tt: "§Y로돌포 기올디§!가 [ARG.GetFlag]§Y[ARG.GetNameDef]§!으로 돌아와 §Y조언가§!로 임명할 수 있게 됩니다. 아르헨티나 공산주의의 주요 인물로서, 그는 미래의 모든 §Y혁명§!을 이끌 수 있을 것입니다."
ARG_ghioldi_returns: "로돌포 기올디가 [ARG.GetNameDef]으로 돌아왔습니다"
ARG_support_the_spanish_republicans: "스페인 공화파 지원"
ARG_support_the_spanish_republicans_desc: "스페인의 우리 형제들은 파시스트 정권이 그들의 땅을 장악하는 것을 막기 위해 동포들과 싸우는 피비린내 나는 분쟁에 휘말려 있습니다. 스페인이 파시즘에 무너지는 것은 우리의 이익에 부합하지 않으며, 유럽에서 문화적으로 가장 가까운 그들에게 지원을 아끼지 말아야 합니다."
ARG_legitimize_the_PCA: "PCA 합법화"
ARG_legitimize_the_PCA_desc: "아르헨티나 공산당은 [ARG.GetNameDef]의 주요 공산주의 정당입니다. 창당 이래로, 이 정당은 소비에트 연방 공산당과 노선을 같이하며 종종 [ARG.GetNameDef]의 여타 좌익 세력과 마찰을 빚었습니다. 그러나 '암흑의 10년'을 끝내기 위해 급진적인 변화가 필요한 지금, [ARG.GetAdjective] 정부에서 이 정당을 합법화할 때가 된 것 같습니다."
ARG_reach_out_to_the_soviet_union: "[SOV.GetNameDef]에 접촉"
ARG_reach_out_to_the_soviet_union_desc: "우리가 낡은 정부 형태에서 벗어나 [ARG.GetNameDef]의 미래를 만들어갈 신속한 변화를 도입해야 한다는 것은 공공연한 사실입니다. 이 과정이 유혈 혁명으로 이어질 수 있으므로, 이전에 이러한 경험을 한 국가에 접촉해야 합니다. [SOV.GetNameDef]와 연결하면, 우리의 집권 과정에 불행하지만 필요한 폭력이 수반될 경우 지원을 보장받을 수 있을 것입니다."
ARG_reach_out_to_the_soviet_union_tt: "이 중점을 선택하면 §Y내전§! 발발 시 §YVanguardia Socialista§! 사단 편제를 해금하고 §Y[955.GetName]§!에 §Y5개§!의 Vanguardia Socialista 부대를 징집합니다."
ARG_unite_the_workers_of_argentina: "아르헨티나 노동자들의 단결"
ARG_unite_the_workers_of_argentina_desc: "[ARG.GetNameDef]를 더 나은 곳으로 바꾸려면, 우리나라의 프롤레타리아에게 그들의 고통을 끝내기 위해 급진적인 개선이 필요하다는 것을 설득해야 합니다. 모든 직업의 노동자들을 단결시켜 현상 유지가 끝나야 한다는 것을 정부에 보여줍시다!"
ARG_viva_la_revolucion: "혁명 만세"
ARG_viva_la_revolucion_desc: "[ARG.GetNameDef] 정부에 최후통첩을 보내고, 우리나라를 진정한 사회주의 국가로 변모시키는 데 필요한 변화의 바람을 불러일으킬 때가 왔습니다. 일이 잘 풀린다면, 이 과정은 평화롭게 끝나고 정부는 쉽게 교체될 것입니다. 하지만, 그들이 순순히 물러나지 않고 싸울 가능성도 항상 존재합니다."
ARG_communist_civil_war_tt: "§Y[ROOT.GetFlag][ROOT.GetName]§!에서 §R공산주의자들과 현 정부 간의 내전이 발발합니다!§!"
ARG_forge_our_own_future: "우리만의 미래를 개척하라"
ARG_forge_our_own_future_desc: "혁명이 대성공을 거둔 지금, [ARG.GetNameDef]의 미래를 어떻게 만들어 나갈지 결정할 때입니다. 파니 에델만 동지는 수년간 PCA의 확고한 지지자였으며, [ARG.GetNameDef]에서 여성의 권리를 위해 싸우는 데 큰 진전을 이루었습니다. 많은 이들이 그녀가 지금부터 우리나라를 이끌고 [ARG.GetNameDef]를 새로운 번영의 시대로 이끌 적임자라고 생각합니다."
ARG_women_in_industry: "산업계의 여성"
ARG_women_in_industry_desc: "너무나 오랫동안 여성들은 집에 머물며 가족을 돌봐야 한다는 기대를 받아왔습니다. 한 여성이 우리나라의 지도자가 될 수 있다면, 다른 산업 분야에서도 일할 수 있도록 허용하는 것이 마땅합니다. 이는 우리의 노동력을 크게 확장시켜 [ARG.GetNameDef]의 경제적 미래에 도움이 될 것입니다."
ARG_support_the_farmers: "농민 지원"
ARG_support_the_farmers_desc: "[ARG.GetNameDefCap]은 항상 강력한 농업 부문을 보유해 왔으며, 특히 우리의 소고기는 전 세계적으로 인기가 많습니다. 이전 정부의 억압 아래, 이들 농업 공동체 중 다수는 거의 지원을 받지 못했습니다. 이제 변화를 제정하고 농업 자금을 개선하며, [ARG.GetNameDef] 시골 지역의 프롤레타리아 노동자들을 지원할 때입니다."
ARG_socialist_volunteers: "사회주의 의용군"
ARG_socialist_volunteers_desc: "전 세계에는 자신들만의 혁명이라는 꿈을 위해 투쟁하는 다른 많은 사회주의 운동이 있습니다. 필요하다면, 우리와 비슷한 붉은 길을 따르려는 국가들을 돕기 위해 우리의 힘을 제공해야 합니다. 고립주의를 택한다고 해서 국제 동지들의 곤경을 무시해서는 안 됩니다."
ARG_the_buenos_aires_conference: "부에노스아이레스 회의"
ARG_the_buenos_aires_conference_desc: "이제 국가를 안정시키기 시작했으니, 우리의 지도부가 이전 정부가 빠졌던 것과 같은 준독재의 함정에 빠지지 않도록 조심해야 합니다. 따라서 [ARG.GetNameDef]의 차기 지도자를 논의하고 선출하기 위해 부에노스아이레스에서 사회주의 회의가 소집되었습니다."
ARG_the_buenos_aires_conference_1_tt: "'§Y부에노스아이레스 회의 시작§!' 이벤트를 받습니다. 이 이벤트는 §Y파니 에델만§!을 권좌에 유지하거나 §Y안토니오 소토§!로 교체할 것을 묻습니다."
ARG_the_buenos_aires_conference_2_tt: "§Y파니 에델만§!을 유지하면 §Y대륙 통일§! 및 §Y대륙 해방§! 중점 계통이 해금됩니다. §Y안토니오 소토§!를 선택하면 §Y파타고니아 개선§! 중점 계통이 해금됩니다."
ARG_align_with_the_soviets: "소비에트와 연대"
ARG_align_with_the_soviets_desc: "혁명이 대성공을 거둔 지금, [ARG.GetNameDef]의 미래를 어떻게 만들어 나갈지 결정할 때입니다. 로돌포 기올디 동지는 귀국 후 혁명을 주도한 인물이며, 따라서 [ARG.GetNameDef]를 이끌 훌륭한 후보입니다. 기올디는 [SOU.GetNameDef]와 더 긴밀한 관계를 맺으려 하며, 그들을 모방함으로써 우리의 새로운 사회주의 국가가 강대국으로 성장할 것이라고 믿습니다."
ARG_soviet_industrial_model: "소비에트 산업 모델"
ARG_soviet_industrial_model_desc: "러시아 혁명 이후, [SOU.GetNameDef]는 군산 복합체를 현대화하는 데 큰 진전을 이루었습니다. 우리는 이로부터 영감을 얻어 그들의 발자취를 따라야 하며, 국내의 군수 공장 수를 늘려야 합니다."
ARG_committee_of_state_security: "국가보안위원회"
ARG_committee_of_state_security_desc: "세계적인 긴장이 고조됨에 따라, 우리 이념의 적들이 점점 더 모습을 드러내고 있습니다. 권력을 유지하기 위해서는, [ARG.GetNameDef] 국내와 국제적으로 우리의 가치를 강제할 정보 기관을 창설하는 데 집중해야 합니다."
ARG_russian_manufacturers: "[SOU.GetAdjective] 제조업체"
ARG_russian_manufacturers_desc: "우리의 산업 역량을 강화하고 대륙의 다른 국가들 사이에서 두각을 나타내기 위해, [SOU.GetNameDef]에 접촉하여 그들의 제조업체 다수를 [ARG.GetNameDef]로 초청해야 합니다. 결국 우리는 이념을 공유하고 있으니, 군사 기술도 공유하는 것이 당연합니다."
ARG_centralize_power: "권력 중앙집권화"
ARG_centralize_power_desc: "로돌포 기올디는 혁명 이후 지금까지 우리를 잘 이끌어왔습니다. 그의 정부 내 많은 이들은 권력을 서기장에게만 집중시키는 것이 새로이 부상하는 우리 소비에트 국가를 내외부의 위협으로부터 안전하게 지키는 데 도움이 될 것이라 믿습니다. 결국, 이는 [ARG.GetNameDef]의 안전과 안보를 위한 것입니다."
ARG_workers_rights: "노동자 권리"
ARG_workers_rights_desc: "우리 사회주의 혁명의 핵심 교리 중 하나는 [ARG.GetNameDef]의 프롤레타리아 노동자들의 삶의 질을 향상시키는 것이었습니다. 이제 우리가 생산 수단을 장악했으니, 열악한 노동 환경이 더는 우리의 들판과 공장을 괴롭히지 않도록 보장해야 합니다."
ARG_reform_our_industry: "산업 개혁"
ARG_reform_our_industry_desc: "너무나 오랫동안 우리의 산업 혁신은 세계의 다른 국가들에 뒤처져 있었습니다. [ARG.GetNameDef]의 산업을 확장하고 더 현대적인 수준으로 끌어올릴 때가 왔습니다. 새로운 공장을 건설하고 즉시 가동시키는 것부터 시작할 수 있습니다."
ARG_empower_the_fjc: "FJC 권한 강화"
ARG_empower_the_fjc_desc: "공산주의 청년 연맹(Federación Juvenil Comunista)은 [ARG.GetAdjective] 청년들 사이에서 PCA의 정책을 홍보하기 위해 설립된 청년 혁명 정치 조직입니다. 전국에 우리의 사회주의 이념을 확고히 하기 위해서는, 가능한 한 빨리 우리나라의 아이들을 참여시키는 것이 현명할 것입니다."
ARG_state_atheism: "국가 무신론"
ARG_state_atheism_desc: "[ARG.GetNameDefCap]은 오랫동안 가톨릭 국가였으며, 종교는 많은 국민의 일상생활에서 중요한 역할을 해왔습니다. 하지만, 종교는 사회주의 혁명에서 큰 자리를 차지하지 않는 경향이 있으므로, 우리는 국가 무신론을 제정할 선택권이 있습니다. 그러나, 오랫동안 종교를 삶의 일부로 살아온 대중들 사이에서 불만을 야기할 수 있다는 점을 명심해야 합니다."
ARG_liberation_theology: "해방 신학"
ARG_liberation_theology_desc: "[ARG.GetNameDef]의 오랜 가톨릭 역사와 시민들의 삶에서 그 중요성을 고려할 때, 많은 사제들이 [ARG.GetNameDef] 내의 이념적 변화에 대한 반응으로 해방 신학으로 알려진 새로운 형태의 기독교를 채택하기 시작했습니다. 해방 신학의 사상이 우리의 혁명 운동과 일치한다는 점을 감안할 때, 이 교파를 국교로 채택하는 것이 현명할 것입니다."
ARG_socialist_researchers: "사회주의 연구원"
ARG_socialist_researchers_desc: "우리나라가 사회주의 국가로 성장함에 따라, 국가 연구 확장에 투자하는 것이 현명할 것입니다. 결국, 기술을 혁신하고 현대화하는 것은 국가 성장에 중요합니다."
ARG_a_red_south_america: "오카소 에스칼라타"
ARG_a_red_south_america_desc: "마침내, 우리는 남아메리카를 동일한 공산주의 깃발 아래에 두는 데 성공했습니다. 붉은 물결이 대륙을 휩쓸면서, 억압받던 노동 계급은 마침내 우리의 지도 아래 더 자립적인 삶을 자유롭게 살 수 있게 되었습니다. 하지만, 왜 여기서 멈춰야 합니까? 이제 오카소 에스칼라타 작전을 실행하여 세계 혁명에 반대하는 모든 이들에게 최후의 진홍빛 석양을 선사할 때입니다."
ARG_conquer_south_america: "대륙 해방"
ARG_conquer_south_america_desc: "남아메리카 대륙에 다른 세계 이념이 설 자리는 없습니다. 그것들은 우리 사회주의 국가에 위협이 되기 때문입니다. 그들이 우리에게 합류하지 않는다면, 우리는 최대한 빨리 그들의 인민을 해방하고 [ARG.GetNameDef]의 보호 깃발 아래로 데려와야 합니다."
ARG_more_communism_in_south_america_tt: "§Y남아메리카§!의 모든 §Y비공산주의§! 국가에 대한 §Y$annex_everything$§! 전쟁 목표 획득"
ARG_unify_south_america: "대륙 통일"
ARG_unify_south_america_desc: "남아메리카 대륙에는 자체적인 혁명 운동을 수행하고 공산주의 정부를 확보한 여러 국가가 있습니다. 우리가 강하게 남으려면, 단결해야 합니다. 이제 이 국가들에게 손을 내밀어 우리의 인터내셔널에 가입하도록 요청할 때입니다."
ARG_unify_the_continent_tt: "이 중점을 선택하면 §Y남아메리카§!의 모든 §Y공산주의§! 국가에 우리 §Y세력§! 가입 제안을 보냅니다."
ARG_integrate_the_motherland: "아메리카 통합"
ARG_integrate_the_motherland_desc: "우리가 자본주의와 파시스트의 부패로부터 해방시킨 영토의 지배 계급은, 우리가 그들을 성장하는 연합에 통합하기 위한 조치를 취하지 않는다면 계속해서 우리에게 반란을 일으킬 수 있습니다."
ARG_eliminate_american_imperialism: "미제국주의 타도"
ARG_eliminate_american_imperialism_desc: "북쪽의 거인은 오랫동안 기업의 탐욕과 부패의 보루로 서 있었습니다. 이제 우리 스스로가 초강대국으로 성장했으니, 워싱턴의 자본주의 개들이 우리를 제거해야 할 위협으로 결정하는 것은 시간문제일 뿐입니다. 우리는 이런 일이 일어나도록 내버려 둘 수 없습니다. 이제 오카소 에스칼라타 작전을 실행하여 [USA.GetNameDef]에 최후의 진홍빛 석양을 선사할 때입니다."
ARG_improve_patagonia: "파타고니아 개선"
ARG_improve_patagonia_desc: "안토니오 소토 휘하의 아나코-생디칼리스트들이 [ARG.GetNameDef]의 운명을 장악하면서, 그들은 자신들의 고향 지역인 파타고니아가 수십 년 동안 절실히 필요했던 관심을 마침내 받아야 한다고 결정했습니다."
ARG_establish_the_free_association: "자유 연합 설립"
ARG_establish_the_free_association_desc: "자유 연합은 국가, 사회 계급, 계층 또는 생산 수단의 사적 소유가 없는 개인 간의 관계입니다. 이는 아나코-생디칼리스트들의 장기적인 목표이며, 이제 우리가 이 경계를 허물고 모든 사람이 자신의 개인적인 필요를 자유롭게 충족할 수 있는 사회를 만들어야 할 때입니다."
ARG_no_gods_no_masters: "신도 주인도 없다"
ARG_no_gods_no_masters_desc: "어느 누구도 자신을 해하려는 자들에게 통제받아서는 안 됩니다. 이웃 국가들이 우리의 이념을 이해하지 못할지라도, 우리는 탐욕스럽게 영향권을 확장하려는 호전적인 국가들로부터 그들을 해방시키는 임무를 스스로 맡을 수 있습니다."
ARG_in_memory_of_yrigoyen: "이리고옌을 기리며"
ARG_in_memory_of_yrigoyen_desc: "[ARG.GetNameDefCap]은 이전에도 이와 같은 상황을 겪은 적이 있습니다. 그의 통치에 결점이 없었던 것은 아니지만, 이폴리토 이리고옌은 오늘날까지도 우리나라에 이익이 되는 필요한 개혁을 단행했습니다. 우리는 그 유지를 이어받아 다시 한번 민주주의의 정해진 길로 우리를 이끌 누군가가 필요합니다."
ARG_in_memory_of_yrigoyen_tt: "§Y마르셀로 T. 데 알베아르§!가 §Y$ARG_democratic_party_long$§!의 지도자가 되며, 집권당은 §Y민주주의§!로 전환됩니다!"
ARG_promote_urbanization: "도시화 촉진"
ARG_promote_urbanization_desc: "주변 세계가 산업화와 도시화를 겪는 동안 [ARG.GetNameDef]은 거의 그대로였습니다. 이로 인해 우리는 경제를 유지하기 위해 다른 국가에 의존하게 되었습니다. 이를 인정하고 도시화를 추진하면 이러한 의존성을 신속하게 끝낼 수 있을 것입니다."
ARG_secure_the_opposition: "반대파 규제"
ARG_secure_the_opposition_desc: "어느 정도의 반대는 우리의 민주적 가치에 매우 중요합니다. 우리가 직면한 현재의 반대파는 상당히 강력하지만, 주된 문제는 그들이 공정하게 행동하지 않는다는 것입니다. 우리는 그들이 이런 위험한 선례를 남기도록 내버려 둘 수 없으며, 모두의 안전을 위해 정치적 반대파는 규제되어야 합니다."
ARG_the_clean_election: "깨끗한 선거"
ARG_the_clean_election_desc: "[ARG.GetNameDef] 정치계에 수십 년간 만연했던 부패와 사기 끝에, 급진시민연합은 콩코르단시아에 횡행하던 부정 투표함 채우기를 폭로하는 데 초점을 맞춘 강력한 선거 운동 끝에 승리를 거머쥐었습니다. 이제 앞으로 누가 당을 이끌 것인지에 대한 논의가 진행 중입니다."
ARG_anti_corruption_policies: "반부패 정책"
ARG_anti_corruption_policies_desc: "지난 10년간 우리나라를 더럽혔던 정치 부패가 다시는 정부 선거에 돌아오지 않도록 해야 합니다. 우리나라 정부 내의 뇌물, 횡령, 정실주의 문화를 근절하는 데 초점을 맞춘 새로운 정책을 시행함으로써 말입니다."
ARG_a_true_democracy: "진정한 민주주의"
ARG_a_true_democracy_desc: "[ARG.GetNameDefCap]은 1861년부터 민주주의 국가로 여겨져 왔지만, 최근 우리 정치 체제의 상태는 자유 민주 공화국이라는 개념에 수치를 안겨주었습니다. 이제 우리는 마침내 진정한 민주주의 국가로 나아갈 수 있습니다. 안정과 [ARG.GetAdjective] 경제의 발전을 중시하는 국가 말입니다."
ARG_argentina_for_all: "모두를 위한 아르헨티나"
ARG_argentina_for_all_desc: "과거 식민지였던 [ARG.GetNameDef]은 전 세계에서 온 다양한 사람들의 고향입니다. 우리 국가의 미래 비전에서, 우리는 국경 안에 사는 모든 사람이 스스로를 [ARG.GetAdjective]인이라 칭하고 이 나라를 자신의 고향이라 부르는 것을 자랑스러워하기를 바랍니다. 우리는 [ARG.GetNameDef]이 이곳에 살기로 결정한 모든 사람을 위한 곳이 되도록 노력해야 합니다."
ARG_reinforce_the_education_system: "교육 시스템 강화"
ARG_reinforce_the_education_system_desc: "교육은 민주 국가의 기초입니다. [ARG.GetNameDef]에 사는 모든 사람은 자유롭게 학교에 다니며 정직하고 근면한 시민으로 성장하고 발전해야 합니다. 우리는 이 기회를 빌어 특정 직업에 자금을 집중하여, 우리만의 기술적, 경제적 발전을 이룰 수 있기를 희망해야 합니다."
ARG_education_electronics_bonus: "전자공학 교육 중점"
ARG_education_industrial_bonus: "산업 교육 중점"
ARG_education_synthetics_bonus: "합성물질 교육 중점"
ARG_university_reforms: "대학 개혁"
ARG_university_reforms_desc: "우리의 교육 시스템이 강화됨에 따라, 대학을 개혁할 좋은 기회가 될 것입니다. 고등 교육을 발전시키면 대학의 연구 부서를 더 잘 활용할 수 있게 될 것입니다."
ARG_seek_american_support: "미국의 지원 모색"
ARG_seek_american_support_desc: "전 세계에 전쟁의 그림자가 드리우는 가운데, 우리는 국경을 위협하는 어떠한 분쟁에도 맞설 준비를 해야 합니다. [USA.GetNameDefCap]은 북쪽의 잠자는 거인일지 모르지만, 같은 민주 국가로서 그들의 외교 정책과 민방위 프로그램에서 배울 점이 많습니다. 우리는 그들에게 손을 내밀어 북미 이웃 국가와 관계를 맺기 시작해야 합니다."
ARG_us_army_training: "미 육군 훈련"
ARG_us_army_training_desc: "[USA.GetNameDefCap]은 우리가 전쟁 가능성에 대비하여 자체 병력을 준비할 수 있도록 친절하게도 군사 훈련 체제를 보내주겠다고 제안했습니다. 이는 더 경험 많고 단련된 군대를 만들 뿐만 아니라, 우리가 배운 것을 활용하여 특수 부대 프로그램도 강화할 수 있을 것입니다."
ARG_us_army_training_bonus: "$ARG_us_army_training$"
ARG_american_defense_investments: "미국의 국방 투자"
ARG_american_defense_investments_desc: "잘 훈련된 병사들로 강력한 군대를 갖추는 것도 좋지만, 견고한 방어는 강력한 공격만큼이나 훌륭하다고들 합니다. [USA.GetNameDef]와의 연락을 통해 가장 취약한 지역의 방어 능력을 개선했으며, 특히 공중 공격에 대한 저항력을 높였습니다. 지상에서는 정글과 산맥이 우리를 보호하고, 이 포탑들은 우리의 하늘을 지킬 것입니다."
ARG_joint_military_exercises: "합동 군사 훈련"
ARG_joint_military_exercises_desc: "[USA.GetAdjective]에 대한 우호의 표시로, [ARG.GetNameDef] 내에서 개최되는 합동 군사 훈련을 제안해야 합니다. 함께 협력함으로써 우리 해군과 공군의 훈련 및 기술 수준을 향상시킬 수 있습니다."
ARG_join_the_allies: "연합국 가입"
ARG_join_the_allies_desc: "이 분쟁에서 우리가 편을 정할 때가 왔습니다. 민주주의의 신성함을 지키기 위해 노력하는 국가로서, 연합국에 손을 내밀어 세력 내에서 우리의 자리를 확보하는 것이 필수적입니다. 우리는 세계를 정복하려는 자들로부터 세계를 보호하는 데 힘을 보태야 합니다."
ARG_bastion_of_democracy: "평화의 보루"
ARG_bastion_of_democracy_desc: "우리는 민주 국가의 이념을 지키는 데 큰 진전을 이루었고, 위험할 정도로 부패했던 선거 이후 많은 발전을 이뤘습니다. 전 세계에 전쟁의 기운이 감도는 가운데, 우리는 평화의 보루로서 입장을 분명히 하고, 이 대륙의 작은 국가들을 보호하겠다고 맹세해야 합니다."
ARG_regulated_national_salaries: "국가 임금 규제"
ARG_regulated_national_salaries_desc: "국내 기업들이 직원들에게 저임금을 지급하는 우려스러운 경향을 목격했습니다. 우리는 그들의 예산을 통제하는 데에는 관심이 없지만, 모든 국민이 공정한 임금을 받도록 하는 데에는 관심이 있습니다. 최저 임금을 설정하는 것은 이 상황에 있는 모든 사람에게 분명히 도움이 될 것입니다."
ARG_social_welfare_fund: "사회 복지 기금"
ARG_social_welfare_fund_desc: "전통적으로 사회 복지 지출 예산은 매우 낮았습니다. 하지만 사회 복지 예산 증액에 따른 잠재적 이익을 고려해 볼 때, 이제는 그래서는 안 된다고 생각하기 시작했습니다. 사회 복지 지출을 위한 기금을 설립하는 것은 가치 있는 시도가 될 수 있습니다."
ARG_british_gaurantee: "영국과의 관계 강화"
ARG_british_gaurantee_desc: "역사적으로 우리는 영국과 긴밀한 관계를 맺어왔으며, 영국은 우리 나라에 막대한 투자를 해왔습니다. 이러한 관계를 다시 활성화하고 유대를 강화하는 방안을 모색해야 합니다. 이는 우리에게 매우 유익할 수 있습니다!"
ARG_royal_airforce_influence: "영국 왕립 공군의 영향"
ARG_royal_airforce_influence_desc: "영국과의 관계가 더욱 긴밀해진 지금, 그들의 군사적 노력에서도 배울 점이 있는지 살펴봐야 합니다. 왕립 공군은 널리 인정받고 있으며, 그들의 작전을 연구하는 것은 유익할 것입니다. 이와 더불어, 비슷한 기종의 항공기를 획득하는 것도 고려해야 합니다. "
ARG_royal_airforce_influence_bonus: "$ARG_royal_airforce_influence$"
ARG_royal_navy_influence: "영국 왕립 해군의 영향"
ARG_royal_navy_influence_desc: "영국과의 관계가 더욱 긴밀해진 지금, 그들의 군사적 노력에서도 배울 점이 있는지 살펴봐야 합니다. 왕립 해군은 널리 인정받고 있으며, 그들의 작전을 연구하는 것은 유익할 것입니다. 이와 더불어, 그들과 유사한 함선을 연구하는 것도 고려해야 합니다."
ARG_royal_navy_influence_bonus: "$ARG_royal_navy_influence$"
ARG_reinforced_alliance: "협력 강화"
ARG_reinforced_alliance_desc: "영국과의 긴밀한 관계는 매우 유용하지만, 그들의 군대를 연구할수록 우리가 장차 있을 분쟁에 대해 충분히 대비하지 못했다는 사실이 뼈아프게 드러납니다. 우리는 독립 보장과 불가침 조약의 형태로 그들의 보다 명시적인 지원을 요청하는 것을 고려해야 합니다."
ARG_reinforced_alliance.tt: "([ENG.GetFlag]§Y[ENG.GetNameDefCap]§!)에서 '§Y$ARG_political_events.73.t$§!' 이벤트가 발생하여 양국 간의 §Y불가침 조약§!과 §Y독립 보장§!을 제안할 것입니다. 그들이 우리에 대해 §Y높은 우호도§!를 가지고 있다면 수락할 가능성이 더 높습니다!"
ARG_internal_focus: "내부 집중"
ARG_internal_focus_desc: "주요 민주주의 강대국에 손을 내밀 선택지가 있지만, 정부 내 다수는 자원을 다른 곳으로 확장하기보다는 [ARG.GetNameDef] 내부에 집중하는 것이 현명하다고 생각합니다. 당분간은 [ARG.GetNameDef]가 전쟁의 맹공을 견뎌내는 데 필요한 것을 확보할 수 있도록 세계와의 무역을 제한해야 합니다."
ARG_alvears_democracy: "알베아르의 민주주의"
ARG_alvears_democracy_desc: "많은 사람들이 [ARG.GetLeader]를 엄격한 정책을 가진 가혹한 인물로 여기지만, 시간이 흐르면서 그가 진정으로 [ARG.GetNameDef]의 최선의 이익을 염두에 두고 있었다는 것이 명백해졌습니다. 그는 진정으로 이폴리토 이리고옌의 유산을 이어받았으며, 아르헨티나 민주주의의 아버지로 여겨져야 합니다."
ARG_south_american_alliance: "범미주 협력"
ARG_south_american_alliance_desc: "남아메리카 대륙의 평화를 유지하기 위해 새로운 세력을 결성했으니, 주변의 다른 민주 국가들에게 손을 내밀어 평화와 자유를 향한 우리의 맹세에 동참해달라고 요청해야 합니다. 함께하면 더 강해지고, 무너질 가능성은 줄어들 것입니다."
ARG_bolstering_the_army: "모병 운동"
ARG_bolstering_the_army_desc: "전쟁이 계속 격화되고 있으며, 우리는 그 부름에 응답할 준비가 되어 있어야 합니다. [ARG.GetNameDef] 전역에서 남녀노소 모두가 자유를 빼앗으려는 자들로부터 자신들의 권리를 지키기 위해 목숨을 걸고 싸울 의지가 있습니다. 우리는 모병 운동을 시작하여 위대한 우리 국민이 무기를 들고 고향을 위해 싸울 준비를 하도록 독려해야 합니다."
ARG_the_second_argentine_republic: "제2 아르헨티나 공화국"
ARG_the_second_argentine_republic_desc: "수년간의 부패와 사기 끝에, 우리는 마침내 낡은 국가의 잿더미에서 벗어나 서반구 민주주의의 새로운 보루로 일어섰습니다. 오늘부터 과거의 실수와 단절하기 위해, 우리는 제2 아르헨티나 공화국으로 알려질 것입니다. 연합과 자유 속에서!"
ARG_the_second_argentine_republic_tt: "([ARG.GetFlag]§Y[ARG.GetNameDefCap]§!)이(가) §Y남아메리카§!의 모든 민주주의 국가에 §Y독립을 보장§!합니다!"
ARG_hitler_1: "네 번째 행운"
ARG_hitler_1_desc: "새로운 대통령이 취임하면서, 과거 [GER.GetNameDef]이(가) 지녔던 힘을 모방하기 위해 [ARG.GetNameDef]을(를) 급진적으로 바꾸려는 움직임이 즉각 일어났습니다. 힐테르 경은 남아메리카에 제4제국을 건설하는 데 단호한 것 같습니다. 이번에는 또 무엇이 잘못될 수 있을까요?"
ARG_hitler_2: "게라 렐람파고"
ARG_hitler_2_desc: "'전격전'으로도 알려진 게라 렐람파고는 압도적인 기계화 화력을 사용하여 적을 제압하는 방식입니다. 우리 대통령은 '잃어버린 시간을 만회한다'고 주장하며 신속한 확장을 원하고 있습니다. 어째서인지 이 계획은 [GER.GetNameDef]의 옛 영토까지 포함하고 있습니다."
ARG_hitler_2_tt: "§Y남아메리카§!의 모든 §Y비파시스트§! 국가에 대한 §Y$annex_everything$§! 전쟁 목표 획득!"
ARG_hitler_2_core_tt: "모든 구 §Y독일§! 영토에 대한 §Y핵심주§! 획득."
ARG_hitler_3: "아르마 마라비요사"
ARG_hitler_3_desc: "'경이로운 무기'로도 알려진 아르마 마라비요사는 전쟁의 흐름을 바꿀 수 있는 더 강력한 로켓과 무기를 개발하려는 계획입니다. 우리 대통령은 즉시 실행에 옮길 수 있는 놀라운 아이디어가 담긴 물에 손상된 문서들을 가지고 우리에게 접근했습니다."
ARG_arma_maravillosa_bonus: "아르마 마라비요사"
ARG_worst_timeline_flag: "§Y힐테르 경§!이(가) §Y[ARG.GetNameDef]§!의 지도자입니다!"
ARG_hitler_4: "함선 인양"
ARG_hitler_4_desc: "힐테르 경에 따르면, 전쟁 중 침몰한 최초의 [GER.GetAdjective] 전함인 그라프 슈페 호의 잔해를 인양하는 것이 가장 중요하다고 합니다. 이에 대해 질문하자 그는 어설픈 스페인어로 '위엄'과 '내게 묻지 마라'고 중얼거렸습니다. 어쨌든, 그라프 슈페 호를 인양합시다!"

ARG_ligas_patrioticas_tt: "애국 동맹 사단 편제를 잠금 해제하고 §Y[ROOT.capital.GetCapitalVictoryPointName]§!에 §Y5개§! 부대를 모집합니다!"
ARG_guardia_nacional_tt: "§Y$ARG_pedro_pablo_ramirez$§!이(가) §Y$ARG_gen_nazism_party_long$§!의 지도자가 되고 집권당이 §Y파시즘§!으로 변경됩니다!"
ARG_union_nacional_fascista_tt: "§Y니미오 데 안킨§!이(가) §Y$ARG_fascism_party_long$§!의 지도자가 되고 집권당이 §Y파시즘§!으로 변경됩니다!"
ARG_nationalist_faction: "파시스트 연합"
ARG_communist_faction: "남아메리카 인터내셔널"
ARG_democratic_faction: "먼로 동맹"

#GUAY#
GUAY_disperse_military_power: "군사력 분산"
GUAY_disperse_military_power_desc: "우리 내각의 미래를 보장하기 위해, 군부가 스스로 권력을 장악할 수 없도록 해야 합니다."

GUAY_nationalize_foreign_owned_companies: "외국 소유 기업 국유화"
GUAY_nationalize_foreign_owned_companies_desc: "너무 오랫동안 외국 기업들이 자신들의 이익을 위해 우리의 자원을 착취해 왔습니다. 이제는 끝입니다."

GUAY_urbanization: "도시화"
GUAY_urbanization_desc: "국민들을 빈곤에서 벗어나게 하기 위해, 우리는 그들을 더 큰 부와 교육에 접근할 수 있는 대도시로 이주시켜야 합니다."

GUAY_abolish_low_level_income_tax: "저소득층 소득세 폐지"
GUAY_abolish_low_level_income_tax_desc: "우리 사회의 최빈곤층에게 세금을 부과하는 것은 타당하지 않으므로, 이는 폐지되어야 합니다."

GUAY_free_seconday_schools: "중등 교육 무상화"
GUAY_free_seconday_schools_desc: "교육은 잘 작동하는 경제의 초석입니다. 우리는 미래 세대를 위해 이에 투자해야 합니다."

GUAY_the_stuff_of_legends: "전설적인 위업"
GUAY_the_stuff_of_legends_cores_tt_arg: "모든 초기 §Y아르헨티나§! 핵심주를 통제"
GUAY_the_stuff_of_legends_cores_tt_bra: "모든 초기 §Y브라질§! 핵심주를 통제"
GUAY_the_stuff_of_legends_cores_tt_bol: "모든 초기 §Y볼리비아§! 핵심주를 통제"
GUAY_the_stuff_of_legends_cores_tt_urg: "모든 초기 §Y우루과이§! 핵심주를 통제"
GUAY_the_stuff_of_legends_cores_tt_par: "모든 초기 §Y파라과이§! 핵심주를 통제"
GUAY_the_stuff_of_legends_desc: "꿈으로 시작했던 것이 현실이 되었습니다. 우리의 지도 아래, 우리는 대륙에 대한 강력한 지배력을 확보하고 고유한 정체성을 구축했습니다. 이는 역사책에 기록될 것이며 전설적인 위업이 될 것입니다."

GUAY_meet_with_the_old_powers: "구 열강과의 회담"
GUAY_meet_with_the_old_powers_tt: "하나의 주요 구세계 열강과 동맹을 맺는 디시전을 잠금 해제하며, 동맹을 맺은 열강에 따라 보너스 하나를 선택할 수 있게 됩니다."
GUAY_meet_with_the_old_powers_desc: "우리나라는 작지만 큰 야망을 품고 있습니다. 따라서 이웃 국가에 대해 우위를 점하는 방법에 대한 주요 열강의 노하우가 필요합니다."

GUAY_dam_construction: "댐 건설"
GUAY_dam_construction_desc: "우리나라는 수력 발전 댐을 건설할 기회는 많지만, 이처럼 값비싼 사업을 수행할 만한 비축량이 충분하지 않습니다. 아마도 파트너가 우리에게 차관을 빌려줄 의향이 있을지도 모릅니다."
GUAY_dam_construction_desc_tt: "§Y720일§! 후에 투자를 상환해야 합니다. 상환 기일 전에 해당 국가와 전쟁을 시작하면 상환 의무는 무효가 됩니다."

GUAY_not_at_war_with_old_power: "선택한 동맹 구 열강과 전쟁 중이 아님"
GUAY_has_picked_old_power: "동맹을 맺을 구 열강을 선택함"
GUAY_old_world_power_faction: "구세계 열강이 세력에 속해 있거나 세력의 지도자임"
GUAY_old_world_power_scope: "§Y구세계 열강 파트너§!:"

GUAY_tag_the_economic_miracle: "남미의 경제 기적"
GUAY_beef_and_hide_industry: "소고기 및 가죽 산업"
GUAY_beef_and_hide_industry_desc: "우리나라의 핵심 경제는 소고기와 가죽을 중심으로 돌아가므로, 이를 확장하는 것이 타당합니다."
GUAY_protect_domestic_industries_beef: "$GUAY_beef_and_hide_industry$ 완료 시\n추가: §G1§! §Y민간 공장§!\n추가: §G1§! 건설 슬롯"
GUAY_protect_domestic_industries_agricultural: "$GUAY_agricultural_colonization$ 완료 시\n추가: §G1§! §Y민간 공장§!\n추가: §G1§! 건설 슬롯"
GUAY_protect_domestic_industries_cash_crop: "$GUAY_cash_crop_exports$ 완료 시\n추가: §G1§! §Y민간 공장§!\n추가: §G1§! 건설 슬롯"
GUAY_protect_domestic_industries_wool_makers: "$GUAY_wool_makers$ 완료 시\n추가: §G1§! §Y민간 공장§!\n추가: §G1§! 건설 슬롯"

GUAY_cash_crop_exports: "환금 작물 수출"
GUAY_cash_crop_exports_desc: "우리나라는 다른 나라에 대량의 환금 작물을 판매할 수 있는 완벽한 전제 조건을 갖추고 있습니다. 이 귀중한 상품의 수출은 우리에게 더 큰 번영을 가져다줄 것입니다."

GUAY_export_focus: "수출 중점"
GUAY_export_focus_desc: "전 세계 모든 이들이 우리나라에 대해 알도록 하여, 관광부터 소고기 수출에 이르기까지 모든 것에 대한 수요를 증진시켜야 합니다. [FROM.GetNameDefCap]에 대해 알리십시오!"

GUAY_agricultural_colonization: "농업 개척"
GUAY_agricultural_colonization_desc: "농업은 언제나 우리 경제의 큰 부분을 차지해 왔습니다. 토지 개간을 통해 이를 확장하면 더 많은 이익을 창출할 것입니다."

GUAY_wool_makers: "양모 생산"
GUAY_wool_makers_desc: "양모는 모두에게 중요한 상품이며, 우리는 이를 공급할 준비가 되어 있습니다. 결국 겨울에는 모두가 따뜻하게 지내야 하기 때문입니다."

GUAY_form_ties_with_the_military: "군부와의 유대 강화"
GUAY_form_ties_with_the_military_desc: "현 정부는 국가에 필요한 안정을 제공하는 데 실패했습니다. 우리는 군을 동원하여 결단력 있는 조치를 취하고 이 실패한 정권을 축출할 것입니다."

GUAY_place_opposition_leaders_in_house_arrest: "반대파 지도자 가택 연금"
GUAY_place_opposition_leaders_in_house_arrest_desc: "국가에 대한 통제권을 공고히 하기 위해 신속하게 움직여야 합니다. 우리는 쿠데타가 마무리될 때까지 반대파를 가택 연금에 처할 것입니다."

GUAY_enact_martial_law: "계엄령 선포"
GUAY_enact_martial_law_desc: "불안이 고조되고 있습니다. 상황을 악화시킬 수 있는 불필요한 유혈 사태를 피하기 위해, 우리는 여론을 통제하고 국민을 억제해야 합니다."

GUAY_coup_detat: "쿠데타의 여파"
GUAY_coup_detat_desc: "구 정부가 무너졌습니다! 정부군과의 짧은 대치에도 불구하고 모든 기관을 장악했습니다. 사상자 없이 무장 해제시켰으며, 이들의 무기는 우리 비축물자에 추가되었습니다."

GUAY_cult_of_personality: "개인 숭배"
GUAY_cult_of_personality_desc: "국가를 강화하기 위해, 우리는 친애하는 지도자를 내세워 개인 숭배를 형성할 것입니다. 평범한 이들이 집결하고 목숨을 바칠 수 있는 상징적인 인물 말입니다."

GUAY_appease_the_generals: "장군 회유"
GUAY_appease_the_generals_tt: "장군들이 추가 능력치를 얻고 무작위 특성 하나를 획득합니다."
GUAY_appease_the_generals_desc: "우리의 국가 장악을 도운 장군들은 그에 상응하는 보답을 기대하고 있습니다. 너무 오래 지체하면 우리에게 등을 돌릴 수 있으니 서두르는 것이 좋습니다."
GUAY_appease_the_generals_eq_trigger_tt: "군대에 보병 장비 §Y2500§!개 이상 보유"


GUAY_a_domestic_arms_factory: "국내 무기 공장"
GUAY_a_domestic_arms_factory_desc: "우리 경제가 유럽의 구 열강들과 경쟁할 수는 없지만, 전적으로 해외 무기 거래에만 의존할 수도 없습니다. 만약 고립될 경우를 대비해 국내 무기 생산 절차를 시작하겠습니다."

GUAY_penal_battalions: "형벌 부대"
GUAY_penal_battalions_tt: "최대 인원의 §Y형벌 부대 6개§!를 추가합니다. §Y형벌 부대§!를 해제합니다."
GUAY_penal_battalions_desc: "우리 군은 지원자가 거의 없어 심각한 상태에 처해 있습니다. 교도소에서 징집을 허용하는 것이 바로 그 해결책이 될 수 있습니다."

GUAY_rekindle_old_gripes: "[GUAY_rekindle_old_gripes]"
GUAY_rekindle_old_gripes_desc: "[GUAY_rekindle_old_gripes_desc]"


GUAY_rekindle_old_gripes_URG: "오랜 불만 되살리기"
GUAY_rekindle_old_gripes_URG_desc: "[ARG.GetName]와 [BRA.GetName] 모두 역사적으로 자신들의 목적을 위해 우리를 이용했으며, 이는 우리 국민에게 재앙적인 결과를 초래했습니다. 적대 세력이 다시는 몬테비데오에 접근하지 못하도록 밖으로 팽창해야 합니다."

GUAY_rekindle_old_gripes_PAR: "삼국 동맹의 그림자 아래에서"
GUAY_rekindle_old_gripes_PAR_desc: "삼국 동맹 전쟁 중 인구의 60%가 사망했고 우리나라는 결코 회복하지 못했습니다. 오직 팽창만이 우리 국민에게 안정과 번영을 가져다줄 수 있습니다. 더는 저주받은 동맹의 그림자 아래에서 살지 않을 것입니다."
GUAY_rekindle_old_gripes_ARG_PAR_tt: "전쟁 발발 후 §Y365일§! 내에 §Y[957.GetName]§!을(를) 점령하면, [ARG.GetName]은(는) 백색 평화에 동의하거나 파국적인 사기 저하에 직면해야 합니다."
GUAY_rekindle_old_gripes_BRA_PAR_tt: "전쟁 발발 후 §Y365일§! 내에 §Y[504.GetName]§!을(를) 점령하면, [BRA.GetNameDef]은(는) 백색 평화에 동의하거나 파국적인 사기 저하에 직면해야 합니다."

GUAY_rekindle_old_gripes_ARG_URG_tt: "전쟁 발발 후 §Y365일§! 내에 §Y[510.GetName]§!을(를) 점령할 경우, [ARG.GetName]은(는) 백색 평화에 동의하거나 파국적인 사기 저하에 직면할 것입니다."
GUAY_rekindle_old_gripes_BRA_URG_tt: "전쟁 발발 후 §Y365일§! 내에 §Y[502.GetName]§!을(를) 점령할 경우, [BRA.GetNameDef]은(는) 백색 평화에 동의하거나 파국적인 사기 저하에 직면할 것입니다."

GUAY_mobalize_the_economy: "경제 동원"
GUAY_mobalize_the_economy_desc: "어떠한 만일의 사태에 대비하기 위해 경제 동원을 시작해야 합니다. 국민이 불평할 수도 있지만, 그들은 더 높은 목표를 위해 봉사하고 있음을 알아야 합니다."

GUAY_adopt_minority_languages: "소수 언어 채택"
GUAY_adopt_minority_languages_desc: "사기를 진작하고 군사 정보 실책의 위험을 줄이기 위해 군 전반에 걸쳐 우리 고유의 언어를 채택할 것입니다."

GUAY_mythologize_the_father_of_the_nation: "국부 신격화"
GUAY_mythologize_the_father_of_the_nation_desc: "[GUAY_mythologize_the_father_of_the_nation_desc]"

GUAY_mythologize_the_father_of_the_nation_urg: "호세 아르티가스는 적대적인 이웃 국가와 유럽 열강에 맞서 조국의 독립을 위해 싸운 국부로 여겨집니다. 그의 유산과 이상은 제도화되어 우루과이인이라는 정체성의 일부가 될 것입니다."
GUAY_mythologize_the_father_of_the_nation_par: "프란시스코 로페스는 삼국 동맹에 맞서 국가를 이끌었으며, 세 나라의 맹공에 직면했음에도 굴복을 거부했습니다. 그러한 결단력과 의지는 모든 병사에게 깊이 새겨질 것입니다."

GUAY_the_permanent_leader: "영구 지도자"
GUAY_the_permanent_leader_desc: "[ROOT.GetLeader]은(는) 국가의 상징적인 인물이며, 따라서 우리는 그를 숭배의 대상으로 삼아 일반 병사들이 단결할 구심점으로 만들 것입니다. 그는 우리나라의 영구 지도자가 될 것입니다."

GUAY_long_term_contracts: "장기 무기 계약"
GUAY_long_term_contracts_desc: "무기 제조의 최전선에 서는 면에서 이웃 국가들과 경쟁할 수는 없습니다. 하지만 주요 강대국과 장기 생산 허가 계약을 체결하면 이 품목들을 할인된 가격으로 생산할 수 있을 것입니다."

GUAY_clamp_down_on_new_territories: "신규 영토 단속"
GUAY_clamp_down_on_new_territories_desc: "우리의 신규 영토에 무정부 상태가 있어서는 안 됩니다. 저항을 진압하고 국가의 적을 처벌해야 합니다."

GUAY_develop_new_territories: "신규 영토 개발"
GUAY_develop_new_territories_desc: "영토 교환을 원만하게 처리하는 가장 좋은 방법은 사람들에게 이전보다 더 높은 삶의 질을 제공하는 것입니다. 이것이 우리의 정책이 될 것입니다."

GUAY_a_deal_with_devil: "악마와의 거래"
GUAY_a_deal_with_devil_desc: "불확실한 세계에서 동맹 없이는 살아남을 수 없음이 분명합니다. 우리는 선임 파트너와 합류하여 더욱 긴밀한 유대를 형성하고자 합니다. 부디 그들이 우리를 파멸로 이끌지 않기를 바랍니다."

GUAY_no_second_american_colonization: "제2의 미국 식민지화 거부"
GUAY_no_second_american_colonization_desc: "우리 대륙은 추축국과 연합국 사이에서 흔들리고 있으며, 이웃 국가들은 스스로를 타국의 멍에 아래에 있다고만 여깁니다. 남아메리카는 구 열강에 얽매이지 않는 더 나은 운명을 맞이할 자격이 있습니다. 식민지화의 유산에서 벗어나 우리 자신의 운명을 개척하기 위해, 만약 그곳에 도달하고자 더 낮은 비전을 가진 자들을 짓밟아야 한다면, 그리할 것입니다."

GUAY_demand_a_seat_at_the_high_table: "상석 요구"
GUAY_demand_a_seat_at_the_high_table_desc: "우리의 기여에도 불구하고, 열강들은 여전히 우리를 이류 동맹국 이상으로 보지 않습니다. 우리는 다른 국가들과 같은 테이블에 앉을 것을 요구하며, 이 새로운 세계 질서에서 남쪽의 관리자가 될 것입니다."

GUAY_laissez_faire: "자유방임주의"
GUAY_laissez_faire_desc: "정부는 예외적인 상황을 제외하고는 경제에 개입할 이유가 없습니다. 자유 시장이 승리할 것입니다!"
GUAY_laissez_faire_tt: "지주들이 우리나라에 건물을 건설하기 시작할 것입니다."

GUAY_land_reforms: "토지 개량"
GUAY_land_reforms_desc: "우리나라의 기반 시설을 개선해야 합니다. 이는 모든 현대 사회의 첫걸음이기 때문입니다."

GUAY_empower_the_land_owners: "지주 권력 강화"
GUAY_empower_the_land_owners_desc: "지주들은 이 나라에서 가장 강력한 파벌입니다. 우리는 그들에게 더 많은 토지를 주어 그들의 권력을 강화하고, 그 대가로 그들의 지지를 얻을 것입니다."
GUAY_empower_the_land_owners_desc_tt: "지주들이 §Y민간 공장§!, §Y군수 공장§!, §Y조선소§!, §Y추가 건설 슬롯§!과 같은 고가치 건물을 건설할 가능성이 더 높아집니다!"

GUAY_river_trade: "하천 무역"
GUAY_river_trade_desc: "우리나라는 강이 많은 나라입니다. 이 강들을 따라 연락선을 운행하는 것은 국가가 존재한 이래로 주요 산업이었습니다. 이웃 국가들이 기꺼이 참여한다면, 이러한 유형의 무역을 확장하는 것이 타당합니다."
GUAY_river_trade_tt: "추가: [THIS.GetNameDef]의 우호도가 §Y49§! 이상일 경우 §Y민간 공장§! §G+1§!"

GUAY_the_tag_economic_miracle: "[THIS.GetAdjective]의 경제 기적"
GUAY_the_tag_economic_miracle_desc: "우리나라는 일부 분석가들이 경제 기적이라고 부르는 현상을 경험하고 있습니다. 지난 몇 년간 급속한 성장을 경험하여 신속하게 산업화할 수 있었으며, 전 세계의 투자자들이 경제에 투자하기 위해 몰려들어 이 성장을 더욱 가속화하고 있습니다."

GUAY_heavy_industry: "중공업"
GUAY_heavy_industry_desc: "우리 경제가 주로 기초 상품에 의존하고 있지만, 중공업을 소홀히 할 수는 없습니다. 외국산 제품에 과도하게 의존하게 되면 무역에 차질이 생길 경우 취약한 위치에 놓이게 됩니다."

GUAY_exploit_mineral_wealth: "광물 자원 개발"
GUAY_exploit_mineral_wealth_desc: "우리는 광물 자원이 풍부하지는 않지만, 가진 적은 양이라도 최대한 활용할 것입니다."

GUAY_protect_domestic_industries: "국내 산업 보호"
GUAY_protect_domestic_industries_desc: "해외 무역에 참여하는 동안, 값싼 해외 상품으로 국내 산업이 경쟁에서 밀려나지 않도록 각별한 주의를 기울여야 합니다. 우선 국내 경제를 보호하기 위해 일련의 수입세를 도입해야 합니다."

GUAY_national_academy_of_sciences: "국립 과학원"
GUAY_national_academy_of_sciences_desc: "연구에 대한 추가 투자는 더 빠른 신규 전쟁 무기 개발을 가능하게 하고, 열강을 따라잡을 수 있게 할 것입니다."

GUAY_national_academy_of_sciences_2: "[THIS.GetAdjective] 기계 공학 대학교"
GUAY_national_academy_of_sciences_2_desc: "미래전의 향방은 첨단 기술전에 달려있습니다. 농장에서 인력을 빼내 군사 공학 분야로 투입해야 합니다."

GUAY_national_academy_of_sciences_3: "남아메리카 고등 대학교"
GUAY_national_academy_of_sciences_3_desc: "모든 남아메리카인은 고등 교육을 받을 자격이 있습니다. 대륙을 장악하면 모든 남녀에게 이를 제공할 충분한 자원을 얻게 될 것입니다."

GUAY_cooperation_in_the_americas: "$BRA_cooperation_in_the_americas$"
GUAY_cooperation_in_the_americas_desc: "$BRA_cooperation_in_the_americas_desc$"

GUAY_defense_force: "[THIS.GetAdjective] 방위군"
GUAY_defense_force_desc: "우리 시민을 보호하기 위해, 이웃 국가의 잠재적인 침략을 막을 방위군을 창설해야 합니다."

GUAY_specialized_terrain_training: "특수 지형 훈련"
GUAY_specialized_terrain_training_desc: "우리 군은 규모가 작지만, 부족한 인력과 장비는 질로써 보충할 수 있습니다. 특화된 사단은 제 역량 이상의 힘을 발휘하여 억제력으로 작용할 수 있습니다."

GUAY_volunteers: "[THIS.GetAdjective] 의용군"
GUAY_volunteers_desc: "외교 문제에 직접 개입하는 대신 의용군을 파견하여 직접적인 충돌과 잠재적인 전멸을 피할 수 있습니다. 어쩌면 이것이 판세를 뒤집을 수도 있지 않을까요?"

GUAY_mass_drafts: "대규모 징병"
GUAY_mass_drafts_desc: "국경 경비를 더는 소규모 병력에 맡길 수 없음이 분명해졌습니다. 세계가 점점 더 불확실해짐에 따라, 우리는 신이 주신 국경을 주장할 준비를 해야 합니다."

PAR_mass_drafts: "$GUAY_mass_drafts$"
PAR_mass_drafts_desc: "$GUAY_mass_drafts_desc$"

GUAY_workers_rights: "노동권"
GUAY_workers_rights_desc: "더 오래 살고 더 행복한 노동자는 더 열심히 일합니다. 노동권을 도입하는 것은 국가의 건전성과 경제 모두에 이득이 되는 일입니다."

GUAY_military_licenses: "군사 장비 생산 면허"
GUAY_military_licenses_desc: "우리는 군사 선진국과 관계를 맺고 그들의 전쟁 무기 생산을 허가받아야 합니다. 국내 생산에만 의존할 수는 없습니다."

one_of_the_options_tt: "이벤트 선택지 중 하나에서 다음 효과가 발생합니다: "

PAR_reach_out_to_european_contacts: "[USA.GetAdjective] 연락책에 지원 요청"
PAR_reach_out_to_european_contacts_desc: "적군은 급조된 우리 병력에 비해 너무나도 강력합니다. 자존심을 버리고 [USA.GetName]에 지원을 요청하여, 그들의 앞마당에 공산주의 국가가 들어서는 것이 바람직하지 않다는 점을 설득해야 합니다."

PAR_ban_vouchers: "상품권 지불 금지"
PAR_ban_vouchers_desc: "우리는 고용주가 소위 \"백색 화폐\"로 노동자에게 임금을 지불하는 것을 중단시켜야 합니다. 고용주가 화폐 대용으로 직원에게 지급하는 상품권은 불평등을 영속시키고 직원의 의존성을 키웁니다. 이는 중단되어야 합니다."


PAR_allow_unions_to_strike: "노동조합 파업 허용"
PAR_allow_unions_to_strike_desc: "노동자를 보호하기 위해서는 강력한 노동조합이 필요합니다. 이전 정부는 노동조합의 힘을 무력화시켰지만, 더는 그럴 수 없습니다."

PAR_allow_women_workers: "여성 노동자 허용"
PAR_allow_women_workers_desc: "참혹했던 삼국 동맹 전쟁과 이어진 차코 전쟁 이후, 노동 가능 연령의 남성 부족으로 인해 우리는 유능한 노동력이 심각하게 부족한 상황입니다. "

PAR_order_italian_planes: "[ITA.GetAdjective] 항공기 주문"
PAR_order_italian_planes_desc: "우리는 군대를 현대화해야 합니다. 우리의 공군이 주변국의 위협을 막아낼 만한 수준에 도달하도록 [ITA.GetName]에 접촉할 것입니다."

PAR_a_call_out_for_aid: "지원 요청"
PAR_a_call_out_for_aid_desc: "대통령의 [FRA.GetAdjective] 아내를 통해 [FRA.GetAdjective] 정부에 로비하여, 의용군이 우리의 싸움을 돕도록 허가받을 것입니다."

PAR_request_weapons: "[USA.GetName]에 무기 요청"
PAR_request_weapons_desc: "지금 우리가 가진 보잘것없는 소화기 비축량으로는 이 싸움에서 이길 수 없습니다. 우리는 [USA.GetName]에 접촉하여, 그들의 영향권 한가운데에 공산주의 정부가 들어서는 것은 그들이 바라지 않는 일이라는 점을 설득해야 합니다."

PAR_to_cross_a_river: "강을 건너다"
PAR_to_cross_a_river_desc: "파라과이강은 우리에게 큰 장애물이며 자연적으로 대부분의 도하를 막고 있습니다. 우리는 이 노력을 돕기 위해 강력한 해병대를 보유한 군사적으로 경험이 풍부한 강대국에 접근해야 합니다."

PAR_ask_for_bankroll: "자금 지원 요청"
PAR_ask_for_bankroll_desc: "경제가 파탄난 상태에서 이 전쟁을 감당할 수 없습니다. 나라 전체가 무정부 상태에 빠지지 않으려면 외세의 자금 지원이 필요하다는 것은 명백합니다."

PAR_assasinate_rafael_franco: "라파엘 프랑코 암살"
PAR_assasinate_rafael_franco_desc: "뱀의 머리를 자를 수 있다면 적의 사기를 크게 떨어뜨릴 수 있을 것입니다. 우리는 차코 내의 지역 반체제 인사들과 접촉하여 그들이 임무를 완수할 수 있도록 도구를 제공할 것입니다."

PAR_goad_bolivia: "볼리비아 도발"
PAR_goad_bolivia_desc: "볼리비아를 분쟁에 끌어들일 수 있다면 반란군을 훨씬 약화시킬 수 있을 것입니다. 위험하지만, 우리는 내전이 끝난 후 프랑코가 볼리비아로 정복을 확장하려는 욕망을 암시하는 가짜 전보를 내보내, [BOL.GetAdjective] 정부가 개입하도록 유도할 것입니다."

PAR_revenge_for_the_chaco_war: "차코 전쟁의 복수"
PAR_revenge_for_the_chaco_war_desc: "[BOL.GetName]은(는) 여전히 차코 지역을 노리고 있으며, 그들이 다시 영유권을 주장하려는 것은 시간 문제일 뿐입니다. 우리는 선제적으로 행동하여 먼저 공격해야 합니다."

PAR_access_the_sea: "바다로의 진출"
PAR_access_the_sea_desc: "우리나라는 해수 항구를 가져본 적이 없지만, 강대국이라면 국가 안보를 위해 하나가 필요하다는 것은 분명합니다. 우리는 어떤 대가를 치르더라도 하나를 획득해야 합니다."

PAR_by_all_means_which_to_win: "승리를 위한 모든 수단"
PAR_by_all_means_which_to_win_desc: "전쟁이 끝날 때까지 우리는 경제 전체를 현재의 분쟁에 집중시켜야 합니다. 그 결과 국민은 고통받겠지만, 만약 전쟁에서 패배한다면 공산주의자들의 멍에 아래에서 더 비참해질 것입니다..."


PAR_military_pensions: "군인 연금"
PAR_military_pensions_desc: "구 정부는 차코 전쟁 참전용사들에게 군인 연금을 지급하기를 거부했습니다. 우리는 같은 실수를 반복하지 않을 것입니다."

PAR_rebuild_humaita: "우마이타 재건"
PAR_rebuild_humaita_desc: "우마이타 요새는 파라과이 전쟁 중에 파괴되었지만, 남쪽의 모든 공격에 대한 방벽 역할을 했습니다. 우리는 인내의 상징이자 적의 얼굴에 침을 뱉는 의미로 이 강력한 요새를 다시 재건할 것입니다."

PAR_a_great_charter: "위대한 헌장"
PAR_a_great_charter_desc: "우리의 헌법은 폐지되어야 하며 새로운 위대한 헌장이 작성되어야 합니다. 나라의 새로운 미래를 위해!"

PAR_pull_back_troops_from_the_chaco: "차코에서 병력 철수"
PAR_pull_back_troops_from_the_chaco_desc: "군의 반대에도 불구하고, [BOL.GetName]과의 긴장 고조를 피하기 위해 차코에 주둔한 병력을 철수시켜야 합니다."

PAR_central_bank_of_paraguay: "파라과이 공화국 중앙은행"
PAR_central_bank_of_paraguay_desc: "대외 무역의 유일한 창구가 될 중앙은행을 설립합니다."

PAR_emergency_powers: "비상 대권"
PAR_emergency_powers_desc: "국내외적으로 불안정한 국가 상황은 우리를 하나로 묶을 강력한 지도자를 필요로 합니다. 이는 지도자에게 신속하고 단호하게 행동할 권한이 주어져야만 가능합니다. "

PAR_chaco_war_decoration: "차코 전쟁 서훈"
PAR_chaco_war_decoration_desc: "차코 전쟁의 참전용사들은 이전 정부로부터 받지 못했던 전쟁 훈장을 받을 자격이 있습니다. 이는 군부를 달래기 위한 작은 대가입니다."

PAR_invite_japanese_settlers: "일본인 정착민 유치"
PAR_invite_japanese_settlers_desc: "[BRA.GetName]이 일본인 이민을 중단함에 따라, 대신 그들을 이곳으로 유치할 충분한 기회가 생겼습니다. 정착민들은 농업과 전반적인 경제에 활력을 불어넣을 것입니다."

PAR_suspend_elections: "선거 중단"
PAR_suspend_elections_desc: "현 시국에서는 선거를 연기해야 합니다. 정부 내 자유주의 성향 장관들의 사임으로 우리에게 반대할 사람이 거의 남지 않았습니다."

PAR_discipline_hierarchy_and_order: "규율, 위계, 질서"
PAR_discipline_hierarchy_and_order_desc: "선거가 폐지됨에 따라, 우리는 "규율, 위계, 질서"라는 새로운 정책을 발표할 것입니다. 이는 국가 통치의 기본 원칙이 될 것이며, 체제 전복 사상을 퍼뜨리는 자는 감금에 처해질 것입니다"

PAR_get_rid_of_colonel_peredes: "파레데스 대령 제거"
PAR_get_rid_of_colonel_peredes_desc: "내무부 장관 파레데스는 그의 영향력 때문에 잠재적인 경쟁자입니다. 우리의 권위를 강화하기 위해 그를 제거해야 합니다"

PAR_ban_the_liberal_party: "자유당 활동 금지"
PAR_ban_the_liberal_party_desc: "자유당은 볼리비아인들과 공모하고 있습니다. 지도자들을 추방하는 것만이 유일하게 합당한 처벌입니다. 우리는 콜로라도당으로부터 힘을 결집할 것입니다"

PAR_ensure_army_loyalty: "육군 충성 확보"
PAR_ensure_army_loyalty_desc: "반대 의견이 커지고 있으며, 국민들은 광범위한 저항과 총파업을 벌이고 있습니다. 전임자와 같은 쿠데타를 피하기 위해, 군에 우리나라 GDP의 상당 부분을 할당해야 합니다"

PAR_fedrerista_land_reforms: "페브레리스타 토지 개혁"
PAR_fedrerista_land_reforms_desc: "농민에게 권한을 부여하고 강력한 지주들로부터 토지를 재분배하기 위해 중대한 토지 개혁을 단행해야 합니다."

PAR_align_with_the_guion_rojo: "기온 로호와 제휴"
PAR_align_with_the_guion_rojo_desc: "콜로라도당의 준군사조직과 그 지도자인 후안 나탈리시오 곤살레스를 우리 휘하에 두어야 합니다. 이들을 이용해 정적들을 위협하고 괴롭힐 것입니다."

PAR_nazify_the_army: "군의 나치화"
PAR_nazify_the_army_desc: "나치 상징주의가 이미 군 전체에 들불처럼 번지고 있습니다. 이를 받아들이고 심지어 장려하는 것 외에 다른 행동을 한다면 군의 분노를 살 것입니다. 이를 이용해 [GER.GetName]에 더 가까워지는 동시에 더 강력한 군사적 정체성을 키울 수 있습니다."

PAR_radicalize_the_police: "경찰의 급진화"
PAR_radicalize_the_police_desc: "군은 외부 위협에 집중하는 동안 경찰은 내부 평화를 유지하는 데 필수적이지만, 국가를 지탱하는 더 큰 도구가 될 수 있습니다. 이들에게 더 많은 자원을 제공하고 그 대가로 정부의 품으로 끌어들일 것이며, 군이나 경찰 중 어느 한쪽이 너무 강력해지면 언제든 서로 싸우게 할 수 있습니다."

PAR_neuter_the_guion_rojo: "기온 로호 무력화"
PAR_neuter_the_guion_rojo_desc: "콜로라도당의 급진 준군사조직인 기온 로호는 정부에 대한 안보 위협이자 우리 옆구리의 가시 같은 존재입니다. 이들이 전면적인 충돌을 일으키기 전에 이 집단을 무력화하고 무장 해제해야 합니다."

PAR_get_rid_of_obsolete_guns: "구식 총기 폐기"
PAR_get_rid_of_obsolete_guns_desc: "우리 군의 군비는 구식 총기로 구성되어 있습니다. 우리를 방해하는 고철 덩어리들을 제거하고 보관 시설을 현대화하여 현대화를 이룩해야 합니다."

PAR_liga_nacional_independiente: "독립 국민 연맹"
PAR_liga_nacional_independiente_desc: "지도자의 의제를 더욱 진전시키기 위해, 우리는 진보 단체 LNI를 강화하여 정부의 정통성을 강화하고 반대 의견을 잠재울 것입니다."

PAR_union_nacional_revolucionaria: "페브레리스타 혁명당"
PAR_union_nacional_revolucionaria_desc: "우리의 신당은 국내 유일의 합법 정당이 될 것입니다. 국가의 권력과 제도가 당 지도부에서 비롯되는 혁명 국민 연합의 새로운 시작입니다."

PAR_accept_american_loans: "미국 차관 수용"
PAR_accept_american_loans_desc: "미국은 우리가 추축국에 가담하지 않도록 압력을 가하고 있으며, 우리가 그들의 적국과 가까워지는 것을 막기 위해 우리나라에 막대한 투자를 할 의향이 있습니다."

PAR_agricultural_technical_assistence: "농업 및 의료 기술 지원"
PAR_agricultural_technical_assistence_desc: "우리가 미국의 이익을 위협하는 모든 계획을 연기한다면, 미국은 우리에게 농업 및 의료 기술 현대화를 제공할 의향이 있습니다."

PAR_put_estigarribia_on_a_pedestal: "에스티가리비아를 영웅으로 추대"
PAR_put_estigarribia_on_a_pedestal_desc: "호세 펠릭스 에스티가리비아는 차코 전쟁의 영웅이자 내전 승리의 핵심 인물로 널리 알려져 있습니다. 우리는 그를 선전 목적으로 활용하여 내전의 혼란을 잠재우고 국가를 통합하며, 그의 공로에 보답할 것입니다."

PAR_purge_the_military_of_dissent: "군부 내 불순분자 숙청"
PAR_purge_the_military_of_dissent_desc: "에스티가리비아는 군 내에 잔존하는 모든 불순 세력을 뿌리 뽑고 프랑코 혁명과의 연관성을 숙청하는 데 동의했습니다."

PAR_aftermath_of_the_coup: "내전의 여파"
PAR_aftermath_of_the_coup_desc: "연이은 치명타를 견뎌낸 우리나라는 황폐해졌습니다. 삼국 동맹 전쟁, 차코 분쟁, 그리고 이제 두 번째 내전까지 겪으며 우리 땅은 폐허가 되었지만, 인내하는 것 외에 무엇을 할 수 있겠습니까? 오늘 위대한 재건이 시작됩니다. 평화와 정의를! 파라과이를 위하여!"

PAR_soliders_for_prisoners: "죄수를 병사로"
PAR_soliders_for_prisoners_desc: "내전으로 인해 우리 군은 병력이 부족하여 국가가 취약해졌습니다. [BOL.GetName]이(가) 차코를 되찾을 기회를 엿보고 있는 상황에서, 우리는 방어 수단으로서 대규모 병력 유입이 필요합니다. 우리는 군 입대에 동의하는 죄수들을 사면하여 정규군이 양성될 때까지 병력을 증강할 것입니다."

PAR_brazilian_road_finance: "[BRA.GetAdjective]의 도로 자금 지원"
PAR_brazilian_road_finance_desc: "[USA.GetName]이(가) [BRA.GetAdjective] 정부를 설득하여 우리 도로 기반시설 확충에 투자하게 했습니다."

par_has_accepted_american_funds: " @USA 미국의 자금을 수락했습니다"
par_has_accepted_american_funds_tt: "@USA§Y[USA.GetAdjective]§!의 자금을 수락하여, §Y210일§! 동안 다른 세력에 가입할 수 없게 됩니다!"

PAR_join_the_allies: "연합국 가입"
PAR_join_the_allies_desc: "[USA.GetName]은(는) 우리에게 연합국에 가입하라고 압박해 왔으며, 심각한 금수 조치로 이어지지 않을 다른 대안은 보이지 않습니다."

PAR_join_the_axis: "추축국 가입"
PAR_join_the_axis_desc: "우리의 이념적 동맹은 [GER.GetAdjective]과 그 동맹국임이 분명합니다. 우리는 추축국에 가입하여 이 새로운 세계 질서를 만끽할 것입니다."

PAR_join_the_cominterm: "코민테른 가입"
PAR_join_the_cominterm_desc: "추축국도 연합국도 우리의 이념과 일치하는 대안이 되지 못하지만, [SOV.GetName]은(는) 다른 두 악의 세력에 대한 명백한 대안입니다."

PAR_mythologize_the_father_of_the_nation: "$GUAY_mythologize_the_father_of_the_nation$"
PAR_mythologize_the_father_of_the_nation_desc: "$GUAY_mythologize_the_father_of_the_nation_desc$"

PAR_cult_of_personality: "$GUAY_cult_of_personality$"
PAR_cult_of_personality_desc: "$GUAY_cult_of_personality_desc$"

PAR_nationalize_foreign_owned_companies: "$GUAY_nationalize_foreign_owned_companies$"
PAR_nationalize_foreign_owned_companies_desc: "$GUAY_nationalize_foreign_owned_companies_desc$"

PAR_adopt_minority_languages: "$GUAY_adopt_minority_languages$"
PAR_adopt_minority_languages_desc: "$GUAY_adopt_minority_languages_desc$"

PAR_free_seconday_schools: "$GUAY_free_seconday_schools$"
PAR_free_seconday_schools_desc: "$GUAY_free_seconday_schools_desc$"

PAR_the_permanent_leader: "$GUAY_the_permanent_leader$"
PAR_the_permanent_leader_desc: "$GUAY_the_permanent_leader_desc$"

PAR_specialized_terrain_training: "$GUAY_specialized_terrain_training$"
PAR_specialized_terrain_training_desc: "$GUAY_specialized_terrain_training_desc$"

PAR_urbanization: "$GUAY_urbanization$"
PAR_urbanization_desc: "$GUAY_urbanization_desc$"

idea_PAR_emergency_powers: "비상 권한 하의 국가"
idea_PAR_emergency_powers_desc: "국가는 비상사태법 하에 있으며, 정부는 반체제 인사를 탄압하고 더 강력한 대외 정치력을 행사할 수 있습니다."

URG_terras_dictatorship: "테라의 독재"
URG_terras_dictatorship_desc: "가브리엘 테라는 2년 전 친위 쿠데타로 국가 대부분을 장악했지만, 국가 기관에 대한 통제를 더욱 공고히 하기 위해서는 아직 할 일이 남아있습니다."

URG_prohibition_of_usury: "고리대금업 금지"
URG_prohibition_of_usury_desc: "대금업자에게 불균형적인 이익을 주는 대출은 더 이상 허용할 수 없습니다. 이를 방지하기 위해 고리대금업 금지법을 제정해야 합니다."
URG_womens_vote: "여성 투표권"
URG_womens_vote_desc: "새로운 세기로 나아가고자 하는 국가는 여성의 권리와 남녀평등권을 인정해야 합니다."
URG_womens_vote_desc: 
URG_break_relations_with_the_ussr: "[SOV.GetName]와의 관계 단절"
URG_break_relations_with_the_ussr_desc: "[SOV.GetName]은 부자연스러운 구조물입니다. 미래 세계 질서가 있다면 그것은 중앙유럽과 [USA.GetName]에 달려 있음이 분명하지만, 우리는 이 천민 국가와 관계를 유지할 이유가 없습니다."
URG_break_relations_with_the_ussr_desc: 
URG_pay_of_all_external_debts: "모든 대외 부채 상환"
URG_pay_of_all_external_debts_desc: "우리는 여전히 여러 국가에 대외 부채를 지고 있으며, 현재 상황에서 국가가 미지급금을 보유하는 것은 적절하지 않습니다."
URG_pay_of_all_external_debts_desc: 
URG_import_substitution: "수입 대체"
URG_import_substitution_desc: "현대적인 경제를 만들기 위해 벨기에의 수입 대체 모델을 우리 경제의 기반으로 삼을 것입니다."
URG_import_substitution_desc: 
URG_la_teja_refinery: "라 테하 정유소"
URG_la_teja_refinery_desc: "현대적인 정유소를 설립하면 세계 무대에서 경쟁력을 갖추고 경제를 다각화할 수 있을 것입니다."
URG_la_teja_refinery_desc: 
URG_revaluation_law: "재평가법"
URG_revaluation_law_desc: "1935년 재평가법은 발행국이 모든 은행 활동을 독점하는 방향으로 더욱 확대되어야 합니다."
URG_revaluation_law_desc: 
URG_brou: "BROU"
URG_brou_desc: "우루과이 동방 공화국 은행은 추가적인 책임을 맡고 외채를 청산하기 위한 통화 기금을 설립해야 합니다."
URG_brou_desc: 
URG_right_to_food_housing_and_health: "식량, 주거 및 보건에 대한 권리"
URG_right_to_food_housing_and_health_desc: "우리는 식량, 주거, 보건에 대한 권리를 헌법의 핵심 초석으로 명시하고, 가장 빈곤한 시민들을 위해 지원금을 지급할 것입니다."
URG_right_to_food_housing_and_health_desc: 
URG_conaprole: "코나프롤레"
URG_conaprole_desc: "우유는 영양이 풍부하고 쉽게 구할 수 있으며, 우리나라는 이를 활용하기에 최적의 국가입니다. 전국 우유 생산자 협동조합은 유제품 및 관련 기반 시설에 대한 독점권을 갖고 국가 성장을 촉진할 것입니다."
URG_conaprole_desc: 
URG_ministry_of_public_works: "공공사업부 지원"
URG_ministry_of_public_works_desc: "국가의 산업화 노력을 촉진하기 위해 공공사업부를 통해 대규모 도로 및 노동자 주택 프로그램을 만들 것입니다."
URG_ministry_of_public_works_desc: 

URG_rapid_industrialization: "급속한 산업화"
URG_rapid_industrialization_desc: "우리나라를 새로운 시대로 이끌 모든 준비가 끝났습니다. 우리는 급속한 산업화의 여정을 시작하여 우리나라를 진정한 20세기로 이끌 것입니다."

URG_pluna: "플루나"
URG_pluna_desc: "플루나는 화물 및 전세 서비스를 모두 제공하는 유망한 국영 항공사입니다. 여기에 투자하면 우리나라 항공 산업을 현대 시대로 이끌 수 있습니다."

URG_mercado_modelo: "메르카도 모델로"
URG_mercado_modelo_desc: "이제 낡은 농산물 시장을 뒤로하고, 우리나라 최대의 농산물 시장인 메르카도 모델로를 개장할 때입니다."

URG_tour_to_italy: "[ITA.GetName] 순방"
URG_tour_to_italy_desc: "우리 지도자는 양국 간의 경제적 유대를 강화하기 위해 [ITA.GetName](으)로 순방을 떠날 것입니다."
URG_recognize_francoist_spain: "프랑코 정권 스페인 승인"
URG_recognize_francoist_spain_desc: "프랑코 정권 스페인이 합법적인 스페인 국가임은 명백합니다. 우리는 즉시 그들을 진정한 스페인으로 승인할 것입니다."

URG_rincon_del_bonete_hydroelectric_power_station: "링콘 델 보네테 발전소"
URG_rincon_del_bonete_hydroelectric_power_station_desc: "우리나라의 전화(電化)는 현대화의 핵심입니다. [GER.GetAdjective] 국가는 이러한 사업의 건설 자금을 지원하여 우리의 유대를 강화할 의향이 있습니다."

URG_allow_nazi_movements_among_german_uruguayan: "[GER.GetAdjective]-[URG.GetAdjective] 나치 운동"
URG_allow_nazi_movements_among_german_uruguayan_desc: "우리나라의 [GER.GetAdjective]-[URG.GetAdjective] 소수 민족 사이에는 의심할 여지 없이 그들 조국의 외교 정책에 영향을 받은 소규모 나치 운동이 존재합니다. 일각에서는 이러한 수사를 중단시켜야 한다고 주장하지만, 이는 우리의 의제를 더욱 확산시키는 데 사용될 수 있습니다."

URG_merge_falangist_movements: "팔랑헤 운동 통합"
URG_merge_falangist_movements_desc: "아돌포 아고리오가 주도하는 우루과이 수정주의를 제외하면, 팔랑헤주의는 우리나라에서 가장 인기 있는 권위주의 운동이지만, 여러 그룹으로 나뉘어 있습니다. 우리는 그들을 하나로 모아 개별적으로 존재할 때보다 더 큰 운동으로 만들 것입니다."

 URG_accion_revisionista_del_uruguay: "악시온 레비시오니스타 델 우루과이"
 URG_accion_revisionista_del_uruguay_desc: "아돌포 아고리오는 우루과이 파시즘의 주요 인물 중 한 명입니다. 그와 그의 동료들의 영향력은 [URG.GetName] 전역을 휩쓸 더 큰 운동의 발판이 될 수 있습니다. 우리는 그들을 정부에 초빙하여 정당성을 부여할 것입니다."

 URG_force_through_corporatism: "조합주의 강행"
 URG_force_through_corporatism_desc: "정부는 이미 한 차례 조합주의를 강행하려 했지만, 당시 정치인들의 완강한 반대에 부딪혀 무산되었습니다. 오늘 타협은 없을 것입니다. 우리는 무슨 수를 써서라도 이 법안을 통과시킬 것입니다."

 URG_establish_the_german_uruguayan_cultural_center: "푸어만 문화 센터 강화"
 URG_establish_the_german_uruguayan_cultural_center_desc: "[GER.GetAdjective]-[URG.GetAdjective] 문화 센터는 아르눌프 푸어만이 국내에 친나치 선전물을 퍼뜨리기 위해 설립했으며, 추축국의 성장 이래로 그 규모가 커지기만 했습니다. 정부가 이를 단속하려 하지만, 우리는 이 사업에 자금을 지원하고 적절한 인물들에게 뇌물을 주어 온전하게 유지할 것입니다."

 URG_the_fuhrmann_plan: "푸어만 계획"
 URG_the_fuhrmann_plan_desc: "아르눌프 푸어만은 [URG.GetName]이(가) [GER.GetName]의 식민지가 되어 남아메리카에 추축국 전선을 위한 발판 역할을 해야 한다고 제안했습니다. 식민지까지는 아니더라도, 추축국 남아메리카의 관리자로서 말입니다."

 URG_the_american_springboard: "미국의 발판"
 URG_the_american_springboard_desc: "권력을 확보하고 강력한 후원자를 등에 업었으니, 이제 이웃 국가들을 정복할 준비가 되었습니다."

 URG_food_for_the_warmachine: "전쟁 기계를 위한 식량"
 URG_food_for_the_warmachine_desc: "대부분의 농지를 우리 통제하에 두었으므로, 동맹국에 식량을 수송하기 시작하여 우리의 힘을 더욱 키울 수 있습니다."

 URG_colorado_victory: "콜로라도당 선거 승리"
 URG_colorado_victory_desc: "콜로라도당이 [URG.GetName]을(를) 계속 통치하리라는 것은 의심의 여지가 없었습니다."

 URG_terra_election: "1938년 선거가 실시되었습니다"
 
 URG_blanco_victory: "블랑코당 선거 승리"
 URG_blanco_victory_desc: "가브리엘 테라의 독재로 인해 발생한 것으로 보이는 소요가 유권자들을 콜로라도당으로부터 멀어지게 하여, 블랑코당이 집권하게 만들었습니다."

URG_declare_neutrality: "중립 선언"
URG_declare_neutrality_desc: "우리는 유럽 문제에 관여할 이유가 없습니다."

URG_legalize_the_pool: "풀(Pool) 합법화"
URG_legalize_the_pool_desc: "풀(Pool)을 합법화하면 국가 수입이 증대될 것이며, 대중에게도 매우 인기가 있을 것입니다."

URG_break_diplomatic_relations_with_the_axis: "추축국과의 외교 관계 단절"
URG_break_diplomatic_relations_with_the_axis_desc: "중립을 선언했음에도 불구하고, 악의 축은 더 이상 용납할 수 없다는 것이 명백해졌습니다. 전쟁의 바람은 명백히 연합국에 유리하게 불고 있으며, 패배하는 편에 서는 것은 우리에게 이롭지 않습니다."

URG_join_the_allies: "연합국 가입"
URG_join_the_allies_desc: "[USA.GetName]의 압박 이후, 우리가 더는 전쟁에서 벗어나 있을 수 없음이 명백해졌습니다. 우리가 할 수 있는 미약한 힘이나마 이제 전투에 투입될 것입니다."

URG_a_new_constitution: "새로운 헌법"
URG_a_new_constitution_desc: "현행 헌법은 실효성이 없습니다. 국가를 새로운 시대로 이끌기 위해서는 새로운 헌법이 필요합니다."

URG_the_good_coup: "\"선한\" 쿠데타"
URG_the_good_coup_desc: "헌법은 격렬한 저항에 부딪혔습니다. 우루과이를 미래로 이끌려면 무의미한 정치에 시간을 낭비할 수 없습니다. 과거 테라가 그랬던 것처럼, 우리는 친위 쿠데타를 일으킬 것입니다. 하지만 대규모 체포와 폭력 대신, 유혈 사태와 박해 없이 이를 실행할 것입니다."



URG_law_no_9914: "법률 제9914호"
URG_law_no_9914_desc: "[FIN.GetName]이 [SOV.GetNameDef]의 공격을 받음에 따라, 정부는 핀란드인을 돕기 위해 페소를 비축할 수 있도록 하는 법률 제9914호를 승인했습니다. 우리는 양모와 10,600,000그램의 소고기 통조림을 모았으며, 각 통조림에는 \"우루과이 국민이 영웅적인 핀란드군에게\"라는 문구가 적혀 있습니다."


URG_investigate_german_and_italian_cultural_organization: "독일 및 이탈리아 조직 조사"
URG_investigate_german_and_italian_cultural_organization_desc: "이탈리아 및 독일과 관련된 문화 및 스포츠 조직이 파시스트 동조자들을 숨겨주고 있다는 혐의를 받고 있습니다. 우리는 이들을 주시하며 모든 종류의 위법 행위에 대해 조사해야 합니다."

URG_american_air_bases: "미국 공군 기지"
URG_american_air_bases_desc: "미국은 우리 영토 내에 공군 기지를 설립하도록 허가하라고 압박하고 있습니다. 이는 우리가 추축국의 위협으로부터 스스로를 보호하는 데 분명히 도움이 될 것입니다."

URG_law_no_9943: "법률 제9943호"
URG_law_no_9943_desc: "우리가 중립을 지키고 있음에도 불구하고, 세계가 급속도로 불확실성 속으로 빠져들고 있다는 것은 명백합니다. 우리는 군대를 준비하고 국경을 방어하기 위해 전국적인 징병제를 시행해야 합니다."

URG_herrerismo: "에레리스모"
URG_herrerismo_desc: "우리의 지도자는 민족주의, 보수주의, 포퓰리즘이 혼합된 에레리스모라는 용어를 만들었습니다. 이를 통해 그는 강력한 정치적 기반을 구축하고자 합니다."

URG_traditionalism: "전통주의"
URG_traditionalism_desc: "전통으로의 회귀가 미래로 나아가는 길입니다. 과거에 효과가 있었던 것은 지금도 효과가 있을 것입니다."

URG_ruralism: "농본주의"
URG_ruralism_desc: "우리의 유권자 기반은 국가의 농촌 지역에 있으며, 해당 지역에 막대한 투자를 하는 것이 시급합니다."

URG_americanism: "아메리카주의"
URG_americanism_desc: "국가로서 남아메리카의 가치에 초점을 맞추고, 외교적으로 이를 수호해야 합니다."

URG_anti_imperialism: "반제국주의"
URG_anti_imperialism_desc: "제국주의와 남아메리카에 대한 외세의 침탈에 맞서 명확한 입장을 견지해야 합니다."

URG_anticentralism: "반중앙집권주의"
URG_anticentralism_desc: "몬테비데오를 중심으로 국가를 중앙집권화하려는 시도는 실현 불가능함이 명백합니다. 농촌 계급은 농촌에서, 도시 인구는 도시에서 각자의 가치를 수호하게 하여 모두가 함께 번영하도록 하는 것이 바람직합니다."

URG_legacy_of_batlle: "바트예의 유산"
URG_legacy_of_batlle_desc: "미래가 어떻게 펼쳐지든, 콜로라도당이 호세 바트예 이 오르도녜스의 유산과 영원히 결부되어 있다는 점은 명확합니다. 우리는 그의 보편적 사회 정의 이념을 항상 수용할 것입니다"

URG_statism: "국가주의"
URG_statism_desc: "사회 및 경제 문제에 대한 중앙집권적 통제력을 갖춘 명확하고 강력한 국가는 현시국에 필수적입니다."