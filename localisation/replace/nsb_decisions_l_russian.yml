 SOV_propaganda_builders_of_communism_effect_tt: "£research_speed_texticon £drift_defence_texticon  Каждому государству-марионетке Советов дается «§Y$SOV_young_builders_of_communism$§!», они получают: (темпы исследований: §G+1,00%§!, смена идеологии метрополии: §G+0,25§!) на §Y[?SOV_default_propaganda_campaign_duration]§! д."
 SOV_propaganda_anti_fascism_tt: "£attack_texticon £defence_texticon  Дается §Y$SOV_anti_fascist_campaign_generic$§! против §Yфашистского государства с самым высоким показателем индустриализации в мире§!, что обеспечивает (бонус к атаке против государства: §G+10,0%§!, бонус к защите против государства: §G+10,0%§!) на §Y[?SOV_default_propaganda_campaign_duration]§! д."
 SOV_propaganda_anti_capitalism_tt: "£attack_texticon £defence_texticon  Дается §Y$SOV_anti_capitalist_campaign_generic$§! против §Yдемократического государства с самым высоким показателем индустриализации в мире§!, что обеспечивает (бонус к атаке против государства: §G+10,0%§!, бонус к защите против государства: §G+10,0%§!) на §Y[?SOV_default_propaganda_campaign_duration]§! д."
