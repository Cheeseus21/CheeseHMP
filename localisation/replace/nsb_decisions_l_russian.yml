 SOV_comecon_industrialization_program_modifier_tt: "£consumer_goods_texticon £consumer_goods_texticon £construction_speed_texticon  §Y$SOV_comecon_sov_default$§! — изменить на \n Фабрики, производящие товары народного потребления: §Y+8,0%§!\n§YВыбранная страна§!: \n§Y$SOV_comecon_sov_default$§! — изменить на \n Фабрики, производящие товары народного потребления: §Y-5,0%§!\n Скорость строительства: §G+20,00%§!"
 SOV_comecon_joint_military_program_modifier_tt: "£consumer_goods_texticon £command_power_texticon £army_experience £navy_experience £air_experience £training_texticon £command_power_texticon  §Y$SOV_comecon_sov_default$§! — изменить на \n Фабрики, производящие товары народного потребления: §Y+3,0%§! \n Коэффициент прироста командного ресурса в день: §R-15%§!\n§YВсе государства-марионетки§!: \n§Y$SOV_comecon_sov_default$§! — изменить на \n Опыт армии: §G0,50§! ежедневно \n Опыт флота: §G0,50§! ежедневно \n Опыт авиации: §G0,50§! ежедневно \n Время на обучение: §R+10,00%§! \n Коэффициент прироста командного ресурса в день: §G0,10§!"
 SOV_operation_iskra_tt: "£attack_texticon £breakthrough_texticon  §Y[195.GetName]§!, §Y[208.GetName]§! и §Y[244.GetName]§!:\nДобавить модификатор: §Y$SOV_soviet_military_offensive$§! (атака дивизии: §G+10,0%§!, прорыв: §G+10,00%§! за то, что [ROOT.GetFlag]§Y[ROOT.GetNameDef]§! в регионе)."
