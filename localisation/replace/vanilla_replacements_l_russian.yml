 SPA_facilitate_pyrenees_freight_transports_tt: "Добавить максимальную §YИнфраструктуру§! в §YМадриде§!, §YАрагоне§!, §YКаталонии§! и §YБургосе§!."
 FRA_intervention_in_north_africa: "Габонская кампания — Экваториальная Африка"
 FRA_intervention_in_north_africa_desc: "Переход Экваториальной Африки на нашу сторону имеет решающее значение для нашей освободительной кампании."
 FRA_intervention_in_west_africa: "Операция «Менас»"
 FRA_intervention_in_west_africa_desc: "Де Голль считает, что мы сможем убедить французские силы в Дакаре присоединиться к делу Союзников. Это дало бы многое. Ещё одна колония Виши, перешедшая на нашу сторону, имела бы большой политический резонанс. Кроме того, в Дакаре хранятся золотые запасы Банка Франции и польского правительства в изгнании; а порт Дакара намного превосходит как военно-морская база Фритаун в Сьерра-Леоне — единственный порт Союзников в этом районе. Нам следует отправить оперативную группу для переговоров о мирной оккупации и, в случае неудачи, взять город силой."
 FRA_intervention_in_syria: "Операция «Экспортер»"
 FRA_intervention_in_syria_desc: "Французские войска Виши имеют сильную оборону в Сирии, но внезапный удар может застать защитников врасплох."
 FRA_intervention_in_madagascar: "Операция «Айронклэд»"
 FRA_intervention_in_madagascar_desc: "Мадагаскар представляет угрозу для нашего судоходства, если он попадёт в руки японцев. Захватив остров, мы сможем обезопасить торговые маршруты в Южной Атлантике и южной части Тихого океана."
 FRA_intervention_in_north_africa: "Габонская кампания — Экваториальная Африка"
 FRA_intervention_in_central_africa: "Габонская кампания — Среднее Конго"
 lar_spain.53.t: "Испанский золотой запас"
 lar_spain.53.desc: "Прошло уже некоторое время с тех пор, как испанские золотые запасы прибыли в нашу страну, и мы отправили щедрую помощь Испании без оплаты. Члены правительства начинают комментировать нелепость этой ситуации, особенно после победы националистов над республиканцами."
 lar_spain.53.a: "Мы конфискуем их золотой запас в качестве «платы» за нашу помощь."
 joint_training_exercise: "Совместные британо-французские учебные манёвры"
 joint_training_exercise_desc: "На суше, на море и в воздухе наши объединённые силы сокрушат тиранических агрессоров, которые изгнали наших французских союзников из их домов и угрожали будущему мировой цивилизации! Мы проведём учебные манёвры, чтобы освоить лучшие методы ведения войны против общих противников."
