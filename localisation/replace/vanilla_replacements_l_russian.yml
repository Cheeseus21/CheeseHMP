 FRA_colonial_recruitment: "Тур Феликса Эбуэ"
 FRA_colonial_recruitment_desc: "Один из наших колониальных администраторов, Феликс Эбуэ, играет ключевую роль в укреплении нашего имиджа и поддержки среди африканцев в колониях. Это необходимо, так как мы должны обратиться к колониям за помощью и завербовать подданных, чтобы они взялись за оружие, иначе нас оттеснят на задворки истории."
