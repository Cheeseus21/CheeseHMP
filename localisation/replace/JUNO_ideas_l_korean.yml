 ToA_aid_against_communists_desc: "미국 정부는 잘 무장하고, 장비가 좋으며, 훈련이 잘 된 의용군이 공산주의에 맞서는 세계적인 투쟁을 돕기 위해 해외로 향하는 것을 못 본 척하고 있습니다."

