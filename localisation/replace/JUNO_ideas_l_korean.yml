 BRA_radio_nacional_idea: "라지우 나시오나우"
 BRA_radio_nacional_idea_desc: "국영 라디오 방송국 설립으로, 정부는 이제 대중과 직접 소통할 수단을 갖게 되었습니다. 이를 통해 가장 객관적이고 최신 정보를 제공하거나, 아니면 우리가 알리고 싶은 정보만 전달할 수 있습니다."
 BRA_anaue_idea: "아나우에"
 BRA_anaue_idea_desc: "원주민의 인사말인 아나우에는 통합주의 운동의 구호로 새로운 생명을 얻었습니다. 녹색 제복을 입은 당원들이 거리에서 외치는 이 구호는 민족주의 성향을 가진 이들에게는 자부심을, 반대파에게는 불안감을 심어줍니다."
 BRA_ethical_internationalism_idea: "윤리적 국제주의"
