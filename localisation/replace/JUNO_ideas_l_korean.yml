 ARG_argentina_for_all_idea: "모두를 위한 아르헨티나"
 ARG_argentina_for_all_idea_desc: "우리의 위대한 국가는 국경 안에 매우 다양한 사람들이 살고 있으며, 오랫동안 단일 깃발 아래 국민을 통합하는 것은 거의 불가능했습니다. 이제 우리가 접근 방식을 바꿔야 할 때입니다. [ARG.GetNameDef]은(는) 이곳을 고향이라 부르는 모든 이에게 열려 있고 그들을 수용하는 국가가 되어야 합니다."
 ARG_us_army_training_idea: "$ARG_us_army_training$"
 ARG_us_army_training_idea_desc: "[USA.GetNameDef](와)과 더 긴밀한 관계를 맺음으로써, 우리는 그들의 훈련 체계를 우리 군에 도입할 수 있었습니다. [USA.GetNameDef]처럼 우리 군을 훈련시킨다면, 우리는 더 강력하고 회복력 있는 군대를 갖게 될 것입니다."
 ARG_monroe_doctrine_idea: "먼로 독트린에 동조"
 ARG_monroe_doctrine_idea_desc: "먼로 독트린은 오랫동안 서반구에 대한 유럽의 간섭을 막는 방법으로 자리 잡아 왔습니다. 전쟁의 맹공격에서 살아남으려면 이를 지키는 것이 매우 중요합니다."
 ARG_argentina_first_idea: "$ARG_argentina_first$"
 ARG_argentina_first_idea_desc: "특히 남아메리카 대륙 정복이라는 원대한 목표를 가지고 있을 때, 독자적으로 행동하는 것은 결코 쉽지 않습니다. 하지만 유럽의 파시스트 운동에 얽매이게 된다면, 우리는 통일된 남아메리카라는 진정한 목표를 잃어버릴 수도 있습니다."
 ARG_united_workers_idea: "단결한 노동자"
 ARG_united_workers_idea_desc: "노동자는 사회주의 혁명의 중추입니다. 프롤레타리아는 자본주의가 [ARG.GetNameDef] 전역에 퍼뜨린 부패와 사기에 맞서 단결합니다."
 ARG_agrarian_reforms_idea: "농업 개혁"
 ARG_agrarian_reforms_idea_desc: "$ARG_support_the_farmers_decisions_desc$"

