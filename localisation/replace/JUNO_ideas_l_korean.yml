 CHL_chilean_economy_dynamic_modifier: "칠레 경제"
 CHL_chilean_economy_dynamic_modifier_desc: "구리, 초석 등의 수출에 대한 과도한 의존으로 인해 칠레 경제는 대공황 이후 큰 타격을 입었습니다. 최대 교역 상대국인 미국이 칠레로부터의 수입을 중단하자, 국가는 경제가 완전히 붕괴하는 것을 막기 위해 영토 일부를 매각해야만 했습니다. 상황을 해결하기 위한 노력이 있었지만, 아직 더 많은 조치가 필요합니다. 칠레 경제는 언젠가 다시 위대해질 것입니다!"
