 BRA_secure_our_borders_idea_desc: "$BRA_secure_our_borders$"
 BRA_army_reward: "육군 충성심 보상"
 BRA_navy_reward: "해군 충성심 보상"
 BRA_psad_idea: "Departamento Administrativo do Serviço Público"
 BRA_psad_idea_desc: "DASP는 여러 전신 부서들을 하나의 통합적이고 현대적인 부서로 통합 및 재조직하여, 정부가 제대로 기능하는 체제와 경제를 유지하도록 돕기 위해 설립되었습니다."
 BRA_commonwealth_idea: "루소폰 연방 회원국"
 BRA_commonwealth_idea_desc: "이 국가는 루소폰 연방의 회원국입니다. 루소폰 연방은 포르투갈어가 가장 많이 사용되는 강력한 역사적 유대감을 지닌 공동체입니다. 회원국들은 기술 및 외교 정책과 같은 상호 관심사에 대해 서로 협력하기로 합의했습니다."
 BRA_proletarian_equality: "프롤레타리아 평등"
 BRA_proletarian_equality_desc: "$BRA_equality_for_women_desc$"
 BRA_promoting_communism: "공산주의의 부상"
 BRA_promoting_communism_desc: "브라질이 다양한 공산주의 계열 단체를 지원하여 우리의 정치에 영향을 미치려 시도하고 있습니다."
