l_korean:
 URG_terra_dictatorship: "테라 독재정권"
 URG_terra_dictatorship_desc: "1933년 3월 31일 혁명 이래로, 가브리엘 테라와 바트주의를 따르는 이들을 포함한 그의 지지자들, 그리고 백당과 그 지도자 루이스 알베르토 데 에레라가 권력을 장악했으며, 그의 결정에 이의를 제기할 어떠한 권위도 남지 않았습니다. 우루과이에게 이는 엄격한 중립을 의미하는데, 이는 테라가 내부 개발과 남아메리카 및 대서양 건너편에서 발생할 수 있는 예측 불가능한 전쟁에서 편을 선택하는 것에 대한 통제권을 원하기 때문입니다."

 BOL_toll_of_the_chaco_war: "차코 전쟁의 대가"
 BOL_toll_of_the_chaco_war_desc: "1932년부터 1935년까지 이어진 차코 전쟁이 막 끝났습니다. 볼리비아와 파라과이 양국의 가장 열렬한 팽창주의 지지자들조차 싸울 의지가 완전히 고갈되었으며, 여전히 분쟁 지역인 차코 보레알에는 많은 이들이 죽어 쓰러져 있습니다."

 BOL_toll_of_the_chaco_war_2: "차코 전쟁의 대가"
 BOL_toll_of_the_chaco_war_2_desc: "1932년부터 1935년까지 이어진 차코 전쟁이 막 끝났습니다. 볼리비아와 파라과이 양국의 가장 열렬한 팽창주의 지지자들조차 싸울 의지가 완전히 고갈되었으며, 여전히 분쟁 지역인 차코 보레알에는 많은 이들이 죽어 쓰러져 있습니다."

 PRU_amazonian_war: "아마존 전쟁"
 PRU_no_factions_tt: "세력 가입 가능: §R불가능§!"

 CHL_the_mapuche_conflict: "마푸체 분쟁"
 CHL_the_mapuche_conflict_desc: "아라우카니아 평정과 그 땅 및 주민들이 칠레 국가에 강제로 통합된 이래로, 원주민 마푸체족은 삶의 터전을 잃고 냉대받으며 불만을 품게 되었습니다. 그들 중에는 협력과 통합을 위해 노력하는 집단도 있지만, 가능한 모든 방법으로 국가를 전복시키려 투쟁하는 이들도 있습니다."
 CHL_mapuche_conflict_up_tt: "마푸체 분쟁을 §R악화§!시킵니다.\n"
 CHL_mapuche_conflict_down_tt: "마푸체 분쟁을 §G완화§!시킵니다.\n"

 idea_CHL_the_Hacienda_inquilinaje_system: "아시엔다 - 인킬리나헤 제도"
 idea_CHL_the_Hacienda_inquilinaje_system_desc: "지주와 소작농으로 이루어진 아시엔다 - 인킬리나헤 제도는 고대 로마와 스페인 제국의 국가 운영 방식에서 유래했으며, 예상대로 매우 구식이고 억압적입니다. 현재 칠레의 아시엔다는 사실상 오늘날까지 농노제를 활용하고 있기 때문에 노동자들의 열악한 환경과 경제의 낙후된 부분으로 두드러집니다. 이 문제를 제대로 해결할 수 있는 유일한 방법은 §Y토지 개혁§!이며, 경제를 회복하고자 한다면 이것이 최우선 과제가 되어야 합니다."
 
 idea_CHL_near_anarchic_society: "준 무정부 사회"
 idea_CHL_near_anarchic_society_desc: "우리나라는 현재 빈번한 쿠데타 시도와 폭동, 그리고 일상적인 시위로 고통받고 있습니다. 또한 정치인, 군부, 정부 기관 사이의 극심한 적대감으로 인해 어떤 것도 충분히 효과적으로 기능하지 못합니다. 국가를 완전히 안정시키려면 이러한 문제들을 해결해야 합니다."
 CHL_anarchic_society_level_down_tt: "$idea_CHL_near_anarchic_society$의 효과를 §G감소§!시킵니다"
 CHL_anarchic_society_up_tt: "$idea_CHL_near_anarchic_society$의 효과를 §R악화§!시킵니다"
 CHL_can_not_have_anarchy_tt: "$idea_CHL_near_anarchic_society$를 가지고 있지 않습니다"

 idea_CHL_repubican_guard: "공화국 수비대"
 idea_CHL_repubican_guard_desc: "현재 공화국은 큰 위험에 처해 있으며 붕괴 직전입니다. 하지만 1925년 이래로 아르투로 알레산드리 대통령이 상황을 많이 안정시켰으며, 이제 이 비밀 민병대에 대한 의존은 군대로 가야 할 자금을 전용하게 만들어 정규군의 확장을 막고 있습니다."

 CHL_german_compensation_idea: "독일의 보상"

 CHL_spirit_of_the_conquistadors: "정복자의 정신"
 CHL_spirit_of_the_conquistadors_desc: "남대서양의 위대한 왕국으로 우리 민족을 이끈 것은 바로 정복자들의 영광 덕분입니다. 그들은 우리 역사의 중요한 부분을 차지하며, 이제 우리 국민에게 영감을 주고 그들의 의지가 우리를 미래로 이끌 것입니다. [CHL.GetNameDefCap]은(는) 약소 이웃 국가들을 정복하고 남아메리카의 패권국이 되면서 더욱 성장할 것입니다."

 CHL_relief_efforts_idea: "구호 활동"
 CHL_relief_efforts_idea_desc: "정부는 1939년 치얀 지진 이후의 구호 및 재건 활동을 더 효율적으로 조직하고 지원하기 위해 재건 및 구호 공사를 설립했습니다."

 CHL_spanish_refugees: "스페인 지식인 난민"

 CHL_has_left_wing_government: "좌익 정부"
 CHL_has_right_wing_government: "우익 정부"

 CHL_public_works_modifier: "공공 사업"

 CHL_deeper_mines_modifier: "광범위한 광산망"

 CHL_devalue_the_peso_idea: "페소화 평가 절하"
 CHL_devalue_the_peso_idea_desc: "우리 경제가 더 크게 성장하는 데 필요한 힘을 얻기 위해, 인기 없는 조치임에도 불구하고 페소화 평가 절하가 진행 중입니다."
 CHL_devalue_the_franc_idea: "프랑화 평가 절하"
 CHL_devalue_the_franc_idea_desc: "우리 경제가 더 크게 성장하는 데 필요한 힘을 얻기 위해, 인기 없는 조치임에도 불구하고 프랑화 평가 절하가 진행 중입니다."

 CHL_introduced_the_franc_idea: "프랑화 도입"
 CHL_introduced_the_franc_idea_desc: "국가가 상처를 회복하고 세계 무대에서 제자리를 찾기 위해서는 더 큰 프랑코포니의 일원이 되어야 합니다. 이를 향한 큰 발걸음은 기존 페소화를 아라우카니아 프랑화로 대체함으로써 내디뎌졌습니다."

 CHL_hydroelectric_power: "수력 발전"
 CHL_hydroelectric_power_desc: "아라우카니아 지역에 이루어진 투자 덕분에, 마침내 전기를 생산하고 강물의 흐름을 조절하는 댐망을 건설했습니다."

 CHL_siphoning_funds: "자금 유용"
 CHL_siphoning_funds_desc: "나시스타당의 선전부는 [CHL.GetAdjective] 국민에 대한 장악력을 높이기 위해 공공 부문에서 자금을 유용하고 있습니다."

 CHL_the_kings_scouts: "국왕의 척후대"
 CHL_the_kings_scouts_desc: "우리 국왕께서는 어릴 적부터 프랑스 스카우트 운동의 준군사적 활동에 참여하는 것을 즐기셨습니다. 이제, 그는 이와 같은 즐거움과 열정을 [CHL.GetAdjective] 젊은이들에게 전파할 것입니다."

 CHL_national_falange: "국민 팔랑헤"
 CHL_national_falange_desc: "기독교 정당인 국민 팔랑헤는 1935년에 보수당에서 분리된 진보적이고 개혁적인 정당이며, 현재 우리의 정치 연합을 기꺼이 지지할 것입니다."

 CHL_popular_front_in_power: "인민 전선"

 CHL_liberal_party_in_power: "자유당"

 CHL_communist_party_in_power: "공산당"

 CHL_democratic_alliance_in_power: "민주 동맹"

 CHL_conservative_party_in_power: "보수당"

 CHL_radical_party_in_power: "급진당"

 CHL_popular_freedom_alliance_in_power: "인민 해방 동맹"

 CHL_from_support_chile_static_modifier: "아라우카니아 파타고니아 왕국 지원"

 CHL_non_lar_encryption: "암호화 보너스"
 CHL_lar_encryption: "암호화 보너스"

 CHL_imposed_new_taxes: "신규 조세 부과"
 CHL_impose_new_taxes_tt: "국민정신 §Y$CHL_imposed_new_taxes$§!이(가) 제거되면, §Y$CHL_chilean_economy_dynamic_modifier$§!이(가) 다음과 같이 변경됩니다:\n $MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§! \n $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-10%§!"

 CHL_relief_efforts_idea_tt: "국민정신 §Y$CHL_relief_efforts_idea$§!이(가) 제거되면:"

 CHL_aid_SPR: "스페인 공화국 지원"
 CHL_aid_araucania: "아라우카니아 파타고니아 왕국 지원"

 CHL_aiding_CHL_payment: "아라우카니아 파타고니아 왕국 지원에 대한 대가"
 CHL_payment_for_aid: "해외 원조에 대한 대가"

 CHL_anti_americanism: "반미주의"

 CHL_empowered_preparations_department: "강화된 준비부"
 CHL_empowered_preparations_department_desc: "나시스타 준비부는 현재 당에서 우선시되고 있으며, 해당 단체는 자유주의 정부에 대한 쿠데타를 준비하고 있습니다."

 CHL_lack_of_funds: "자금 부족"
 CHL_lack_of_funds_desc: "자유주의 정부가 국내에 있던 막대한 양의 자금을 훔쳐 해외로 달아났습니다. 이 경제적 손실에서 회복하려면 오랜 시간이 걸릴 것입니다."

 CHL_republican_guards_in_exile: "[CHL.GetAdjective] 망명 공화국 수비대"
 CHL_republican_guards_in_exile_desc: "[CHL.GetAdjective] 자유주의 정부는 만약 우리가 그들과 전쟁을 벌일 경우, 그들이 자국의 파시스트 위협에 대처하는 데 도움을 줄 무장 준군사조직을 우리나라에 창설했습니다."

 CHL_naval_mutiny: "해군 반란"
 CHL_naval_mutiny_desc: "우리 운동의 집권에 항의하는 또 다른 해군 반란이 현재 진행 중이며, 이는 국가를 심각하게 마비시키고 있습니다."

 CHL_the_international_revolution: "국제 혁명"
 CHL_the_international_revolution_desc: "해외에서 한번 시작된 혁명의 불꽃이 꺼지지 않도록 확실히 해야 합니다."

 CHL_laissez_faire: "자유방임주의"
 CHL_laissez_faire_desc: "시장은 자유롭게 흘러가야 하며, 산업 문제에 대한 정부의 영향력을 피해야만 우리 경제가 회복될 수 있습니다."

 CHL_strict_secularism: "엄격한 세속주의"
 CHL_strict_secularism_desc: "교회는 정치에 발언권이 없으며, 정치와는 완전히 분리된 것으로 간주되어야 합니다. 우리는 정치인들에게 자신의 종교를 의회로 가져오지 않겠다는 서약을 하도록 요구해야 합니다."

 CHL_catholic_church_holding_political_power: "정치 권력을 쥔 가톨릭 교회"
 CHL_catholic_church_holding_political_power_desc: "가톨릭 교회가 현재 공식적인 정부 정책에 발언권을 행사하도록 허용되어, 좌익이 우리에 대항하는 강력한 연합을 제대로 형성하는 것을 제한하고 있습니다."

 CHL_development_inwards_idea: "내향적 발전"
 CHL_development_inwards_idea_desc: "내향적 발전이라고 불리는 새로운 경제 독트린은 오랜 고통과 무활동의 세월 끝에 우리의 재건을 도울 것입니다."

 CHL_socialist_land_reform: "사회주의 토지 개혁"
 CHL_socialist_land_reform_desc: "아센다도의 시대는 끝났으며, 우리 농민들은 더 이상 농노로 살지 않아도 될 것입니다. [CHL.GetNameDef]에 진정한 새 시대가 도래했습니다!"

 CHL_abolished_serfdom: "농노제 폐지"
 CHL_abolished_serfdom_desc: "아센다도의 시대는 끝났으며, 우리 농민들은 더 이상 농노로 살지 않아도 될 것입니다!"

 CHL_comptroller_general_of_chile: "Contraloría General de la República"
 CHL_comptroller_general_of_chile_desc: "공화국 감사원은 칠레의 상급 감사 기관으로, 자치적 성격과 헌법적 지위를 가지며, 공공 행정 행위의 합법성을 통제하고, 재정, 지방 자치 단체 및 법률로 정해진 기타 조직과 서비스의 수입과 투자를 감독하고, 재정 및 지방 자산을 책임지는 사람들의 회계를 검사 및 판단하며, 국가의 일반 회계를 유지하고 법률이 위임한 기타 기능을 수행합니다."

 CHL_oppressed_working_class: "억압받는 노동 계급"
 CHL_oppressed_working_class_desc: "공산주의와 관련된 모든 것을 잔혹하게 탄압함에 따라, 노조는 더 이상 국내에서 활동할 수 없으며, 노동 계급은 영구 국방법 위반을 감수하지 않고서는 제대로 항의할 수 없이 우리의 명령을 따르도록 지시받습니다."

 CHL_socialist_youth_idea: "사회주의 청년단"
 CHL_socialist_youth_idea_desc: "사회주의 청년 조직은 전투에서 우리 병사들을 도울 수 있는 준군사 조직을 구성하는 데 도움이 될 것입니다."

 CHL_anti_communist_action: "Acción Chilena Anticomunista"
 CHL_anti_communist_action_desc: "국내 공산주의 위협에 제대로 맞서기 위해, 우리는 모든 좌익 운동을 진압할 준비가 된 애국 단체를 조직해야 합니다."

 CHL_ligas_patrioticas: "Ligas Patrióticas"
 CHL_ligas_patrioticas_desc: "리가스 파트리오티카스는 [CHL.GetNameDef]에서 활동하는 극우 준경찰 민간 조직으로, 모든 반대 의견을 진압하고 누구든 징병을 회피하지 못하도록 막는 데 우리를 돕습니다."

 CHL_hosting_german_intel_lar: "독일 정보부 및 요원 주둔"
 CHL_hosting_german_intel_lar_desc: "우리는 우리 반구의 다른 국가들을 염탐하는 독일의 작전을 적극적으로 돕고 있습니다."
 CHL_hosting_german_intel_non_lar: "독일 정보부 및 요원 주둔"
 CHL_hosting_german_intel_non_lar_desc: "우리는 우리 반구의 다른 국가들을 염탐하는 독일의 작전을 적극적으로 돕고 있습니다."
 CHL_fascist_assault_department: "나치주의 돌격대부"
 CHL_fascist_assault_and_provinces_department: "나치주의 돌격대부"
 CHL_fascist_assault_and_provinces_department: 
 CHL_fascist_youth_department: "나치주의 청년부"
 CHL_fascist_youth_and_provinces_department: "나치주의 청년부"
 CHL_fascist_youth_and_provinces_department: 
 CHL_pan_hispanic_rhetoric: "범히스패닉 수사"
 CHL_pan_hispanic_rhetoric_desc: "곧 히스패닉 민족의 시대가 도래할 것이며, 우리는 대륙을 지배할 것입니다. 앵글로의 패권을 깨부수고 히스패닉 민족을 단결시킬 때입니다!"
 CHL_pan_hispanic_rhetoric_2: "범히스패닉 수사"
 CHL_pan_hispanic_rhetoric_2_desc: "곧 히스패닉 민족의 시대가 도래할 것이며, 우리는 대륙을 지배할 것입니다. 앵글로의 패권을 깨부수고 히스패닉 민족을 단결시킬 때입니다!"
 CHL_pan_hispanic_rhetoric_3: "범히스패닉 수사"
 CHL_pan_hispanic_rhetoric_3_desc: "곧 히스패닉 민족의 시대가 도래할 것이며, 우리는 대륙을 지배할 것입니다. 앵글로의 패권을 깨부수고 히스패닉 민족을 단결시킬 때입니다!"
