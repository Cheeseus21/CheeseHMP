 BRA_undiversified_economy_modifier: "다각화되지 않은 경제"
 BRA_undiversified_economy_modifier_desc: "대공황이 닥치고 세계 각국이 중독성 있는 이 기호품의 구매를 중단하자, 커피 수출에 대한 과도한 의존은 브라질 경제를 마비시켰습니다. 국가가 번영하려면 어떤 정부든 경제를 새로운 분야로 다각화해야 할 것입니다."
 BRA_weak_government: "취약한 정부"
 BRA_weak_government_desc: "수년간 이어진 혁명과 쿠데타 시도로 브라질 정부의 권위가 약화되었습니다. 상황은 타협으로 만들어져 지지자가 거의 없는 1934년 헌법으로 인해 더욱 악화되었습니다. 브라질의 미래가 어찌 되든, 현재의 정치 체제가 유지될 수 없음은 확실합니다. "
 BRA_aftermath_of_the_coup: "비상사태"
 BRA_aftermath_of_the_coup_desc: "1935년 11월, 공산주의자들이 전면적인 내전으로 번질 위협이 있는 쿠데타를 일으키자 비상사태가 선포되었습니다. 쿠데타는 저지되었지만, 대통령은 아직 비상사태를 해제하지 않았습니다. 이제 정치권 전반의 많은 이들은 정권이 비상대권을 계속 사용하여 추가적인 반대 의견을 진압할 것을 우려하고 있습니다. "

