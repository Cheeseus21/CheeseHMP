 CHL_democratic_volunteer_corps: "국제 민주주의 수호단"
 CHL_democratic_volunteer_corps_desc: "권위주의가 어디에서 감히 그 추악한 고개를 쳐들더라도, 우리 병사들은 즉시 그것을 근절할 준비를 갖추고 자랑스럽게 맞설 것입니다."
