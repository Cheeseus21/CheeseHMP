 BRA_rail_investment: "철도 투자"
 BRA_rail_investment_desc: "$BRA_invest_in_railways_desc$"
 BRA_road_investment: "도로 투자"
 BRA_road_investment_desc: "$BRA_invest_in_road_infrastructure_desc$"
 BRA_port_investment: "항만 투자"
 BRA_port_investment_desc: "$BRA_invest_in_ports_desc$"
 BRA_new_capital_modifier: "신수도 건설"
 BRA_new_capital_modifier_desc: "지방 주들의 고립감을 줄이기 위해 국가의 심장부에 새로운 수도를 건설하는 과정에 있습니다."
 BRA_separatism_idea: "분리주의 정서"
 BRA_separatism_idea_desc: "브라질 중앙 정부에 불만을 품거나, 국가의 덜 부유한 주들을 지원해야 하는 것에 분개하는 사람들이 전국에 많이 있습니다. 과거에 이러한 정서는 단명한 분리주의 운동으로 이어져 주들이 국가에서 이탈하는 결과를 낳았습니다. 만약 우리가 곧 정치 상황을 안정시키지 못한다면, 이러한 움직임은 브라질의 분열을 초래할 수 있습니다."
 BRA_propaganda_idea: "선전부"
 BRA_propaganda_idea_desc: "이처럼 위태로운 시기에는, 대중이 업무를 계속하고 정부를 지지하는 데 필요한 정보만 받도록 보장해야 합니다."
 BRA_cangaceiro_state: "주에서 캉가수 활동 중"
 BRA_cangaceiro_state_desc: "브라질 북동부에는 한때 권력 공백이 존재했으며, 이로 인해 캉가수로 알려진 도적들이 발흥했습니다. 이 도적들은 수십 년 동안 이 지역을 괴롭혀 왔으며, 종종 동정적인 현지인들의 도움을 받습니다. 이 지역에 대한 통제권을 완전히 잃기 전에 이들의 계속되는 약탈과 살인에 대해 조치를 취해야 합니다."
 BRA_disrupt_bolivar_LaR: "방첩 자금 지원"
 BRA_disrupt_bolivar_LaR_desc: "외국 정보 기관이 이곳에서 너무 오랫동안 제멋대로 활동해 왔습니다. 새로운 자금 지원을 통해, 우리의 사전 인지 없이는 어떠한 일도 일어나지 않도록 보장할 것입니다."
