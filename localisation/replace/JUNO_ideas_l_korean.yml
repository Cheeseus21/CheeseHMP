 #Legacy Content
 USA_monroe_doctrine_idea: "먼로 독트린"
 USA_monroe_doctrine_idea_desc: "미국은 오랫동안 서반구를 식민 열강의 외부 간섭으로부터 보호하겠다고 약속해왔습니다. 이는 우리 영토에 대한 어떠한 침공이든 미국이 우리를 도우러 올 가능성이 높다는 것을 의미합니다. 하지만, 우리의 정치가 더 이상 미국과 일치하지 않는다면, 우리는 보호받지 못하게 될 수도 있습니다."
 USA_monroe_doctrine_enforcer: "먼로 독트린 집행자"
 USA_monroe_doctrine_enforcer_desc: "19세기 중반부터, 우리는 서반구를 식민 열강의 외부 간섭으로부터 보호하기 위해 노력해왔습니다. 이 독트린의 범위는 시간이 지남에 따라 발전해왔지만, 그 핵심은 북아메리카와 남아메리카의 이웃 국가들이 분쟁 시에 우리가 그들을 돕기를 기대할 것이라는 점입니다. 물론 언제, 어떻게 독트린을 집행할지는 우리 정부에 달려 있습니다."

