 SMB_MTG_naval_arms_race_legacy: "해군 군비 경쟁의 유산"
 SMB_MTG_naval_arms_race_legacy_desc: "[BRA.GetAdjective], [CHL.GetAdjective] 또는 [ARG.GetAdjective] 해군의 확장을 막는 공식적인 조약은 없지만, 대전쟁 이후 이를 막아온 비공식적인 협정이 있었습니다. 이 지역의 국가 중 하나라도 함대를 신규 주력함으로 무장하기 시작한다면, 새로운 군비 경쟁은 불가피할 것입니다. "
