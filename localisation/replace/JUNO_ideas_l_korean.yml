 CHL_stricter_labor_laws: 
 CHL_enact_stricter_labor_laws_tt: "국가 정신 §Y$CHL_stricter_labor_laws$§!이(가) 제거되면, §Y$CHL_chilean_economy_dynamic_modifier$§!이(가) 다음과 같이 변경됩니다:\n $MODIFIER_STABILITY_FACTOR$: §G+10%§! \n $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-25%§!"

 CHL_carabineros_de_chile_fascist: "카라비네로스 데 칠레"
 CHL_carabineros_de_chile_fascist_desc: "카라비네로스 데 칠레는 국가 전체에 사법권을 가진 국가 헌병 경찰입니다. 1927년 전 대통령 카를로스 이바녜스 델 캄포가 창설했으며, 이들의 임무는 질서를 유지하고 칠레의 법을 집행하는 것입니다."
 CHL_carabineros_de_chile_neutrality: "카라비네로스 데 칠레"
 CHL_carabineros_de_chile_neutrality_desc: "카라비네로스 데 칠레는 국가 전체에 사법권을 가진 국가 헌병 경찰입니다. 1927년 위대한 대통령 카를로스 이바녜스 델 캄포가 창설했으며, 이들의 임무는 질서를 유지하고 칠레의 법을 집행하는 것입니다."

 CHL_the_francoist_model: "프랑코주의 모델"
 CHL_the_francoist_model_desc: "스페인의 장군 프란시스코 프랑코가 약속했던 것과 같은 중립 독재자들의 교리를 따름으로써, 우리는 세계적인 분쟁에서 벗어나 우리 자신의 영향권에 집중할 수 있습니다."
 CHL_the_francoist_model_conquest: "프랑코주의 모델"
 CHL_the_francoist_model_conquest_desc: "스페인의 장군 프란시스코 프랑코가 약속했던 것과 같은 중립 독재자들의 교리를 따름으로써, 우리는 세계적인 분쟁에서 벗어나 우리 자신의 영향권에 집중할 수 있습니다."

 CHL_state_supporting_resistance_modifier: "칠레가 지원하는 저항군"
 CHL_state_supporting_resistance_modifier_desc: "칠레는 현지 저항군과 게릴라 단체에 무기와 장비를 비밀리에 공급하고 군사 훈련을 제공하고 있습니다."

 CHL_mapuche_nationalism_dynamic_modifier: "마푸체 민족주의"
 CHL_mapuche_nationalism_dynamic_modifier_desc: "마푸체 민족주의는 우리나라에 존재해왔지만 그리 오랫동안 널리 퍼지지는 않았습니다. 따라서 우리는 우리가 가장 바라는 형태로 만들어지도록 직접 빚어야 합니다."

 CHL_an_empire_in_the_pacific_idea: "태평양의 제국"
 CHL_an_empire_in_the_pacific_idea_desc: "[CHL.GetNameDef]이(가) 마침내 운명을 개척하고 태평양에 강력한 제국을 건설할 때가 왔습니다."

 CHL_mapuche_social_classes: "마푸체 사회 계급과 공동 성별 정체성"
 CHL_mapuche_social_classes_desc: "옛 사회의 사회 계급과 규범을 새로운 사회에 도입함으로써, 우리는 다시 한번 번영을 이룰 수 있습니다."

 CHL_cattle_and_wool: "마푸체 소와 양모"
 CHL_cattle_and_wool_desc: "마푸체 민족의 뛰어난 목축 및 축산 기술 덕분에, 국가는 가진 것이 적더라도 최대한 활용할 수 있습니다."

 CHL_machi_in_the_army: "육군 마치 조직"
 CHL_machi_in_the_army_desc: "우리의 마치 주술사들이 부대와 함께 행군하게 함으로써, 우리는 병사들이 항상 활력과 의욕을 유지하도록 보장할 수 있습니다."

 CHL_legacy_of_caupolican: "카우폴리칸의 유산"
 CHL_legacy_of_caupolican_desc: "카우폴리칸의 유산은 현시점까지도 우리에게 영향을 미치고 있으며, 그의 정신과 의지는 우리 군 장병들의 정신과 행동 속에 계승될 것입니다."

 CHL_unified_in_spirit_idea: "정신으로 단결"
 CHL_unified_in_spirit_idea_desc: "아메리카 원주민과 폴리네시아인들이 군사 조직 및 훈련에 협력함에 따라, 군의 효율성이 대폭 증대되었습니다."

 CHL_patagonian_giants: "파타고니아의 거인"
 CHL_patagonian_giants_desc: "과거 파타고네스 족은 가장 용맹한 유럽 탐험가들의 심장에 공포를 불어넣었습니다. 우리 군은 이 가상의 민족 정신을 체화하여, 주변 모든 이들의 경의를 얻어야 할 것입니다."

 CHL_crusade_against_imperialism_idea: "반제국주의 대성전"
 CHL_crusade_against_imperialism_idea_desc: "마침내 우리 대륙에서 제국주의와 식민주의 세력을 축출하고, 아메리카 원주민과 폴리네시아 민족을 외세의 압제로부터 해방시킬 때가 도래했습니다!"

 CHL_local_mapuche_defense_groups: "지역 마푸체 방위대"

 CHL_ibanez_foriegn_support: "해외 경제 투자"
 CHL_ibanez_foriegn_support_desc: "막대한 규모의 신규 차관 덕분에 국가 경제가 다시 활력을 되찾기 시작했으며, 새로운 자금이 우리 산업계로 유입되고 있습니다."

 CHL_state_catholicism_idea: "국가 가톨릭교"
 CHL_state_catholicism_idea_desc: "프랑스어권으로 나아가는 또 다른 단계로서, [CHL.GetNameDef]은(는) 가톨릭교를 새로운 국교로 채택했습니다."

 CHL_french_investments: "프랑스 투자"
 CHL_french_investments_desc: "현재 공화국 체제에 불만을 품은 프랑스 귀족들의 재정적 지원을 등에 업은 자크 앙투안 베르나르가 [CHL.GetNameDef]에서 더 나은 미래를 꿈꾸며 이 나라에 도착했습니다."

 CHL_veteran_legionaries: "노련한 군단병"
 CHL_veteran_legionaries_desc: "프랑스 외인부대의 많은 대원들이 앙투안 베르나르를 따라 우리나라로 왔으며, 그의 영광스러운 정복을 도울 것입니다."
 CHL_popular_resistance: "민중 저항"
 CHL_popular_resistance_desc: "국내에는 여전히 앙투안 베르나르 국왕의 비범한 힘을 믿지 않는 자들이 많습니다. 이들은 즉시 처리해야 합니다!"

 CHL_french_aristocracy: "프랑스 귀족"
 CHL_araucanian_aristocracy: "새로운 아라우카니아 귀족"
 araucanian_capital_perquenco: "페르켄코"

 CHL_invited_french_academia: "프랑스 학계"
 CHL_invited_french_academia_desc: "프랑스어권의 일원이 된다는 것은 사고방식을 같이 한다는 중요한 의미를 가집니다. 이를 위해, 우리는 프랑스 학계가 [CHL.GetNameDef](으)로 이전하도록 장려할 것입니다."

 CHL_royal_mountaineers: "왕립 산악병"
 CHL_royal_mountaineers_desc: "파타고니아는 아닐지 몰라도, 아라우카니아는 분명 산과 정글의 땅입니다. 따라서 국왕은 이 험난한 지형에서의 전투에 특화된 왕립 산악병 부대의 창설을 요구했습니다."

 CHL_peru_payments_to_chile: "칠레에 대한 지불금"
 CHL_peru_payments_to_chile_desc: "현재, 우리는 [951.GetName]을(를) 구매했기 때문에 매달 [CHL.GetNameDef]에 거액의 돈을 지불해야 합니다."
 CHL_chile_payments_from_peru: "페루로부터의 지불금"
 CHL_chile_payments_from_peru_desc: "[951.GetName]의 최근 구매로 인해, [PRU.GetNameDef]은(는) 매달 우리에게 거액의 돈을 지불하여 우리 경제에 활력을 불어넣고 있습니다."

 CHL_puppeteering_idea: "그림자 속의 통치"
 CHL_puppeteering_idea_desc: "단순히 모든 것을 정복하고 스스로 왕위에 오르려 해서는 통치할 수 없습니다. 위대한 나폴레옹 보나파르트가 그랬던 것처럼, 충성스러운 신하를 찾아 정복한 적들의 왕좌에 앉혀야 합니다!"

 BOL_plurinational_democracy: "민주적 다국민주의"
 BOL_plurinational_democracy_desc: "우리 국가는 하나의 정치체 내에 다수의 봉인되거나 보존된 민족 집단이 공존하는 것으로 정의됩니다. [BOL.GetNameDef]에서 국적의 개념은 복수이며, 이는 조직된 공동체나 민족 집단 내에 많은 국민이 존재함을 의미합니다."

 BOL_empresa_nacional_ferrocarriles_del_estado: "엠프레사 나시오날 페로카릴레스 델 에스타도"
 PAR_president_carlos_antonio_lopez_railways: "카를로스 안토니오 로페스 대통령 철도"
 URG_administracion_de_ferrocarriles_del_estado: "아드미니스트라시온 데 페로카릴레스 델 에스타도"

