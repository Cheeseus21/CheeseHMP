 BRA_neglected_state_dynamic_modifier: "방치된 주"
 BRA_neglected_state_dynamic_modifier_desc: "이 주는 역대 정부로부터 만성적인 투자 부족에 시달려 사회 기반 시설 부족, 실업, 중앙 정부에 대한 분노를 야기했습니다. "
 BRA_growing_state_dynamic_modifier: "성장하는 주"
 BRA_growing_state_dynamic_modifier_desc: "중앙 정부의 막대한 투자와 개발을 통해, 이 주는 이제 성장하는 경제를 갖추었으며 앞으로 몇 년 안에 완전한 산업화를 이룰 궤도에 올랐습니다."
