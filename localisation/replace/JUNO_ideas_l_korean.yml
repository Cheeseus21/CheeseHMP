 PAR_guarani_in_the_army: "군대의 과라니어"
 PAR_guarani_in_the_army_desc: "차코 전쟁 중, 파라과이군은 볼리비아 적군이 쉽게 해독하지 못하도록 병사와 최고 사령부 간에 사용하는 언어로 스페인어 대신 과라니어를 채택했으며, 이는 매우 효과적인 것으로 입증되었습니다."

 BOL_era_of_national_regression: "국가적 퇴보의 시대"
 BOL_era_of_national_regression_desc: "최근 수십 년은 볼리비아에게 힘든 시기였습니다. 먼저 1879년부터 1883년까지의 태평양 전쟁, 그 다음 1899년부터 1903년까지의 아크레 전쟁, 그리고 마지막으로 1932년부터 1935년까지 국가의 가장 최근 패배인 차코 전쟁이 있었습니다."
 BOL_era_of_national_regression_tt: "대볼리비아가 복원되면 제거됩니다:\n§Y아크레§!, §Y안토파가스타§!, §Y차코 보레알§!을 완전히 통제합니다."

