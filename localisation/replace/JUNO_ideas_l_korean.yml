 BRA_international_crisis_desc: "$BRA_the_international_crisis_desc$"
 BRA_unwilling_subjects: "마지못한 신민"
 BRA_unwilling_subjects_desc: "군주제가 다시금 국가의 정치 체제를 장악함에 따라, 국민들은 다시 한번 독재자의 신민이 되는 것에 불편함과 좌절감을 느끼게 되었습니다."
 BRA_federal_republic: "연방주의 수용"
 BRA_federal_republic_desc: "$BRA_greater_federalism_desc$ "
 BRA_presidential_republic: "대통령 공화국"
 BRA_presidential_republic_desc: "국가에는 국민을 통합하고 국경을 방어할 수 있는 강력하고 결단력 있는 지도력이 필요합니다. 이를 위해 우리는 공화국 대통령에게 정치적 권한을 집중시키고 있지만, 제2의 바르가스가 권력을 장악하려는 시도를 막기 위해 강력한 견제와 균형 장치를 마련해야 합니다."
 BRA_tax_haven: "급성장하는 조세 피난처"
 BRA_tax_haven_desc: "기업에 대한 낮은 세율과 수많은 법적 허점으로 인해 브라질로 이전하는 다국적 기업의 수가 증가했습니다. 결국 그들에게서 세수를 전혀 얻지 못하는 것보다는 일부라도 얻는 것이 낫습니다."
 BRA_nationalized_banks: "국유화된 은행"
 BRA_nationalized_banks_desc: "은행을 국유화함으로써 우리는 경제 내 통화 공급에 대한 통제력을 높이고, 이를 주주들의 주머니에서 노동자들의 손으로 돌릴 수 있습니다."
 #BRA_court_the_military_ideaa: "Courting the Military"
 #BRA_court_the_military_ideaa_desc: "We can not maintain our grip on power without the established influence and resources of the military. At least for the time being, we must try to keep them on our side."
 BRA_collaboration_with_the_church: "교회와의 협력"
 BRA_collaboration_with_the_church_desc: "교회는 수많은 브라질 국민에게 매우 중요합니다. 정책에 관해 교회와 협의함으로써, 우리는 행정부에 대한 대중의 지지를 얻을 수 있습니다."
 BRA_atheist_state: "무신론 국가"
 BRA_atheist_state_desc: "과학적 진보에 중점을 둔 국가로서 우리는 성직자들의 비위를 맞추는 데 시간을 낭비할 수 없습니다. 국가의 행정과 국민의 종교는 섞여서는 안 되며, 우리는 이를 유지하고자 합니다."
 BRA_collectivized_agriculture: "농업 집산화"
 BRA_collectivized_agriculture_desc: "농업을 집산화함으로써 효율성을 높이고 국민들 사이에 공산주의 이념을 강화했습니다."
 BRA_article_138: "제138조"
 BRA_article_138_desc: "$BRA_implement_article_138_desc$"
 BRA_court_the_military_idea: "군부의 환심 사기"
 BRA_court_the_military_idea_desc: "우리는 군부가 가진 기존의 영향력과 자원 없이는 권력을 유지할 수 없습니다. 적어도 당분간은, 군부를 우리 편으로 끌어들여야 합니다."
 BRA_king_vassouras: "돔 페드루 엔히크"
 BRA_king_vassouras_desc: ""
 BRA_king_petropolis: "돔 페드루 드 알칸타라"
 BRA_king_petropolis_desc: ""
 BRA_us_of_brazil: "자유의 수호"
 BRA_us_of_brazil_desc: "자유와 민주주의의 이상은 우리 공화국이 세워진 기반입니다. 우리는 필요하다면 국내외에서 그 가치를 수호하기 위해 무엇이든 할 것입니다."
 BRA_radicalized_proletariat: "급진화된 프롤레타리아"
 BRA_radicalized_proletariat_desc: "공산주의 사상이 [BRA.GetNameDef]의 노동자 계급 내에 뿌리내렸습니다. 우리는 그들을 만족시키는 것과 군부의 심기를 거스르지 않는 것 사이에서 아슬아슬한 줄타기를 하고 있습니다."
 BRA_aid_brazilian_communists: "브라질 공산주의자 지원"
 BRA_us_of_south_america: "남미의 수호자"
 BRA_us_of_south_america_desc: "우리의 국경은 팽창하여 대륙 대부분을 아우르게 되었습니다. 따라서 우리는 남아메리카를 고향이라 부르는 모든 이들의 권리를 수호하는 것을 신성한 의무로 삼을 것입니다."
 BRA_stability_and_unity: "질서와 진보"
 BRA_stability_and_unity_desc: "신중한 정치적 책략을 통해, 우리는 더욱 강력하고 통합된 공화국을 이룩했습니다. 이 기반 위에서 우리는 위대한 조국의 시민들을 계속해서 보호할 것입니다."
 BRA_romanticize_the_old_empire_idea: "제국에 대한 향수"
 BRA_romanticize_the_old_empire_idea_desc: "브라질 정부에 불만을 품은 사람들은 적지 않습니다. 제국에 대한 정서와 향수를 다시 불러일으켜, 우리는 이 분열된 파벌들을 하나의 결집된 세력으로 통합할 것입니다."
 BRA_undermine_democracy_idea: "민주주의 약화"
 BRA_undermine_democracy_idea_desc: "$BRA_undermine_democracy_desc$"
 BRA_modify_neglected_state: "§Y$BRA_neglected_state_dynamic_modifier$§!/§Y$BRA_growing_state_dynamic_modifier$§! 변경:"
 BRA_liberated_by_communist_brazil: "[BRA.GetNameDefCap]에 의해 해방됨"
 BRA_liberated_by_communist_brazil_desc: "우리나라는 마침내 식민주의자들로부터 정당한 독립을 쟁취했습니다. [BRA.GetNameDef]의 도움으로 우리는 다시 한번 자유로운 국가가 되었습니다. 그들의 행동이 우리를 명백히 돕고 있기에, 그들이 설파하는 공산주의 사상이 우리 국민들 사이에 뿌리내리기 시작했습니다."
 BRA_expanding_the_revolution: "혁명의 확장"
 BRA_expanding_the_revolution_desc: "혁명이 [BRA.GetNameDef]에 도래했으며, 이제 우리는 국경 너머를 바라봐야 합니다. [BRA.GetNameDef] 외부의 동지들을 위해 혁명을 전파할 때가 왔습니다."
 BRA_banco_do_brasil_idea: "브라질 은행"
 BRA_banco_do_brasil_idea_desc: "$BRA_banco_do_brasil_desc$"
 BRA_cprm_idea: "마르코니 라디오"
 BRA_ef_central_do_brasil_idea: "브라질 중앙 철도"
 BRA_lloyd_brasileiro_idea: "로이드 브라질레이루"
 BRA_departamento_nacional_do_cafe_idea: "국립 커피국"
 BRA_brown_water_navy_idea: "확장된 하천 해군"
 BRA_brown_water_navy_idea_desc: "$SMB_brown_water_navy_desc$"
 BRA_brown_water_navy_idea_bonus_tt: "모든 보병:\n §Y-강:§!\n 이동: §G+10%§!\n 공격: §G+10%§!\n 방어: §G+5%§!"

 ARG_political_corruption_modifier: "정치 부패"
 ARG_political_corruption_modifier_desc: "수년 동안, [ARG.GetNameDef]은 정부 내 만연한 부패로 골머리를 앓아왔습니다. 콩코르단시아의 결성을 허용함으로써 이것이 완화될 것이라 생각했지만, 부정 투표와 유권자 협박은 계속해서 존재해 왔습니다."
 ARG_modify_corruption_ns_intro: "§Y$ARG_political_corruption_modifier$§! 수정:"
 ARG_international_loan_modifier: "국제 차관"
 ARG_international_loan_modifier_desc: "국가들이 위기 시에 재정 지원을 위해 세계 다른 나라에 손을 내미는 것은 드문 일이 아닙니다. [ROOT.GetNameDef]의 현재 경제 상황을 고려할 때, 이 분쟁에서 활동하는 주요 강대국들의 원조를 받아들이는 것은 지극히 합리적입니다."
 ARG_modify_international_loan_intro: "§Y$ARG_international_loan_modifier$§! 수정:"
 ARG_corruption_crackdown_modifier: "$ARG_crack_down_on_corruption$"
 ARG_corruption_crackdown_modifier_desc: "우리나라 정부를 괴롭혔던 부패는 결코 용납할 수 없는 것이었습니다. 로베르토 마리아 오르티스의 정책 덕분에, 우리는 마침내 우리 정치인들이 참여하고 있던 노골적인 부정 행위를 종식시키기 시작할 수 있었습니다."
 ARG_anti_corruption_modifier: "반부패 정책"
 ARG_anti_corruption_modifier_desc: "우리나라 정부를 괴롭혔던 부패는 결코 용납할 수 없는 것이었습니다. 마르셀로 T. 데 알베아르의 정책 덕분에, 우리는 마침내 우리 정치인들이 참여하고 있던 노골적인 부정 행위를 종식시키기 시작할 수 있었습니다."
 ARG_infamous_decade_idea: "악명 높은 10년"
 ARG_infamous_decade_idea_desc: "'악명 높은 10년'은 이폴리토 이리고옌 대통령에 대한 1930년 쿠데타로 시작된 아르헨티나 역사의 한 시기였습니다. 이 시기는 두 가지로 특징지어집니다. 한편으로는 대공황에 따른 심각한 농촌 인구 유출이 있었고, 다른 한편으로는 보수 정부의 권력을 영속시키기 위한 노골적인 선거 부정이 있었습니다."
 ARG_infamous_decade_2_idea: "$ARG_infamous_decade_idea$"
 ARG_infamous_decade_2_idea_desc: "$ARG_infamous_decade_idea_desc$"
 ARG_infamous_decade_3_idea: "$ARG_infamous_decade_idea$"
 ARG_infamous_decade_3_idea_desc: "$ARG_infamous_decade_idea_desc$"
 ARG_infamous_decade_4_idea: "$ARG_infamous_decade_idea$"
 ARG_infamous_decade_4_idea_desc: "$ARG_infamous_decade_idea_desc$"
 ARG_public_works_investment_idea: "공공 사업 투자"
 ARG_public_works_investment_idea_desc: "[ARG.GetAdjective] 정부가 여가, 고용, 보건 및 안전을 위한 공공 사업 프로젝트에 자금을 지원하고 조달하는 것은 중요합니다. 이는 더 넓은 [ARG.GetAdjective] 공동체의 삶의 질을 향상시키는 데 기여할 것입니다."
 ARG_towards_a_greater_argentina_idea: "$ARG_towards_a_greater_argentina$"
 ARG_towards_a_greater_argentina_idea_desc: "[ARG.GetNameDefCap]은(는) 20세기 초 대공황의 맹공과 그에 이은 불명예스러운 10년의 시작으로 큰 고통을 겪었습니다. 끊임없는 부정 선거, 쿠데타 시도, 부패한 정부 관리들에도 불구하고, 우리는 안정적이고 효율적인 국가로 우뚝 설 수 있었습니다."
 ARG_economic_reactivation_idea: "경제 재활성화"
 ARG_economic_reactivation_idea_desc: "경제 재활성화 법안은 더 많은 정부 자금이 경제 및 산업 부문 개발 자금으로 투입되도록 하기 위해 제정된 법률입니다."
 ARG_civilian_economy_boost_idea: "발달된 민간 경제"
 ARG_civilian_economy_boost_idea_desc: "신중한 계획과 적절한 기부를 통해, 우리는 민간 경제를 완전히 발전시킬 수 있었습니다. 국민이 이용할 수 있는 편의 시설이 증가함에 따라 국가 행복 지수는 시간이 지남에 따라 서서히 증가할 것입니다."
 ARG_invest_in_roads_idea: "도로에 투자"
 ARG_invest_in_roads_idea_desc: "국가의 고속도로는 [ARG.GetNameDef]의 경제, 산업 및 군사 능력에 매우 중요합니다. 건설 및 유지보수에 대한 우리의 투자는 앞으로 몇 년 동안 우리에게 큰 도움이 될 것입니다."
 ARG_invest_in_railways_idea: "철도에 투자"
 ARG_invest_in_railways_idea_desc: "현대 시대에 모든 산업은 국가 철도 서비스라는 든든한 기반에 의존합니다. 전국적으로 철도 노선을 확장하면서, 우리는 농촌 지역 사회에서 도시로 상품을 원활하게 운송할 수 있는 기반을 마련했습니다."
 ARG_roca_runciman_treaty_idea: "로카-런시먼 조약"
 ARG_roca_runciman_treaty_idea_desc: "로카-런시먼 협정은 1933년 5월에 [ARG.GetNameDef]과(와) [ENG.GetNameDef] 사이에 체결된 중요한 무역 협정으로, [ARG.GetNameDef]에 [ENG.GetAdjective] 육류 시장의 고정된 점유율을 보장했습니다. 그 대가로 [ARG.GetNameDef]은(는) 무역 및 통화 교환에 관한 제한에 동의하여, 국가 내에서 [ENG.GetNameDef]의 상업적 이익을 보존했습니다."
 ARG_eden_malbran_treaty_idea: "이든-말브란 조약"
 ARG_eden_malbran_treaty_idea_desc: "로카-런시먼 협정에서 부과된 가혹한 제한에 대한 대응으로, 이든-말브란 조약이라는 이름으로 새로운 협상이 이루어졌습니다. 이를 통해 [ENG.GetNameDef]은(는) 밀에 대한 운임 비용을 줄이면서 추가적인 양보를 얻을 수 있었습니다."
 ARG_raf_cooperation_idea: "영국 왕립 공군과의 협력"
 ARG_raf_cooperation_idea_desc: "전 세계에서 분쟁이 계속 격화됨에 따라, 우리는 동원할 수 있는 모든 것을 동원하여 동맹국을 지원하는 데 최선을 다해야 합니다. [ENG.GetNameDef]의 왕립 공군과의 긴밀한 협력은 분명 우리 조종사들을 더 현대적인 수준으로 끌어올릴 것입니다."
 ARG_argentine_beef_idea: "아르헨티나 소고기"
 ARG_argentine_beef_idea_desc: "1536년 스페인 정복자들에 의해 소가 처음 [ARG.GetNameDef]에 들어온 이래, 소고기는 전통적인 아르헨티나 요리의 주식으로 자리 잡았습니다. 이 때문에 우리 소고기는 전 세계적으로 알려지게 되었으며, 그에 따라 수출 수요가 많습니다."
 ARG_argentine_metropole_idea: "아르헨티나 메트로폴리스"
 ARG_argentine_metropole_idea_desc: "최근까지 우리나라는 농촌의 농업 및 광업 공동체를 기반으로 번성해 왔습니다. 하지만 20세기를 거치며 계속 발전함에 따라 시대가 변했고, 이상적인 [ARG.GetAdjective]의 삶이 무엇인지에 대한 생각도 진화했습니다. 많은 이들이 뿌리를 내리고 대도시 생활 방식에 적응하려는 희망을 품고 이제 확장되고 번성하는 우리 도시로 모여들고 있습니다."
 ARG_our_own_path_idea: "$ARG_our_own_path$"
 ARG_our_own_path_idea_desc: "여기까지 오기 위해 겪은 모든 고난에도 불구하고, [ARG.GetNameDef]은(는) 다른 국가, 파벌, 대기업에 무릎 꿇지 않고 스스로 설 수 있습니다. 우리는 이 격동의 시기에 우리만의 길을 선택합니다."
 ARG_british_cooperation_idea: "$ARG_british_cooperation$"
 ARG_british_cooperation_idea_desc: "[ENG.GetNameDefCap]은(는) 우리의 가장 오래된 무역 상대국 중 하나였습니다. 우리가 많은 조약과 협정을 계속 지켜나가면서, 우리의 이념이 그들의 이념과 일치하도록 변해가는 것을 발견할 수도 있습니다."
 ARG_subdue_dissension_idea: "진압된 불화"
 ARG_subdue_dissension_idea_desc: "계속되던 군부 내의 불화가 마침내 진압되었습니다. 이는 앞으로 우리 정부의 여러 부서 내에서 추가적인 불안을 경계해야 한다는 교훈이 되어야 합니다."
 ARG_improved_cooperation_idea: "협력 강화"
 ARG_improved_cooperation_idea_desc: "[ARG.GetNameDefCap]와(과) [ENG.GetNameDef]의 이해관계가 일치하고 있습니다."
 ARG_refused_embargo_idea: "금수 조치 요청 거부"
 ARG_refused_embargo_idea_desc: "[ARG.GetNameDefCap]이(가) 추축국에 대한 금수 조치 요청을 거부했습니다."
 ARG_maintain_neutrality_idea: "자국에 헌신"
 ARG_maintain_neutrality_idea_desc: "우리는 전 세계에서 벌어지는 거대한 분쟁에 관심이 없음을 보여주었습니다. 우리는 무엇보다도 우리 자신을 먼저 걱정해야 합니다. 이는 [ARG.GetNameDef]이(가) 자국의 목표에 집중할 것이라는 선언이 될 것입니다."
 ARG_american_allyship_idea: "워싱턴과의 긴밀한 관계"
 ARG_american_allyship_idea_desc: "미주 협력 정신에 따라, 우리는 [USA.GetNameDef]와(과) 더욱 긴밀한 정치적 관계를 맺었습니다. 우리가 먼로 독트린의 의미 있는 선언 아래 함께 서 있는 한, 유럽 열강의 그 어떤 것도 우리의 연합 전선을 갈라놓을 수 없습니다."
 ARG_envoy_to_london_idea: "런던과의 긴밀한 관계"
 ARG_envoy_to_london_idea_desc: "우리가 서로를 계속 지지하는 한, [ENG.GetNameDev]에게 [ARG.GetNameDef]은(는) 친구로 남을 것입니다. 양국이 정치적으로 연결되어 목표를 계속 일치시키는 것이 중요합니다."
 ARG_counter_interlligence_program_idea: "아르헨티나 방첩 프로그램"
 ARG_counter_interlligence_program_idea_desc: "첩보 활동은 이 세계적인 분쟁에서 우리가 직면해야 할 수많은 전선 중 하나이며, 따라서 우리 자신의 방첩 프로그램을 효율적으로 운영할 수 있는 것은 이 전쟁에서 살아남는 데 매우 중요합니다. 우리는 공격적인 책략보다는 방어적인 정책에 집중하는 입장을 취했습니다."
 ARG_disrupt_bolivar_lar: "볼리바르 작전 방해"
 ARG_disrupt_bolivar_lar_desc: "볼리바르 작전은 수년 동안 우리에게 눈엣가시였으며, 이 흉악한 적대적 첩보 행위에 맞서는 것은 우리에게 달려 있습니다."
 ARG_cut_ties_with_britain_idea: "영국과의 관계 단절"
 ARG_cut_ties_with_britain_idea_desc: "[ARG.GetNameDefCap]이(가) 우리와의 관계를 단절했습니다."
 ARG_disrupt_bolivar_no_lar: "볼리바르 작전 와해"
 ARG_disrupt_bolivar_no_lar_desc: "$ARG_disrupt_bolivar_lar_desc$"
 ARG_red_scare_idea: "적색 공포의 영향"
 ARG_red_scare_idea_desc: "이념에 관한 긴장이 양국 사이에서 고조되었습니다."
 ARG_anti_soviet_idea: "반소 감정"
 ARG_anti_soviet_idea_desc: "공산주의의 위협과 그것이 우리 국가에 가하는 위험은 무시하기에는 너무나도 중요합니다. [SOV.GetNameDefCap]은(는) 우리가 아는 우리의 삶의 방식을 파괴할 수 있는 세력임을 계속해서 증명하고 있습니다. 사람들은 붉은 위협을 두려워하며, 마땅히 그래야 합니다!"
 ARG_buying_the_islands_idea: "남대서양 제도 매입"
 ARG_buying_the_islands_idea_desc: "알고 보니, 섬 두 개를 통째로 사는 것은 꽤 비쌌습니다. 우리는 한동안 이 빚을 갚아나가야 할 것입니다."
 ARG_siam_di_tella: "시암 디 텔라"
 ARG_chade_cade: "차데-카데"
 ARG_anti_british_sentiment_idea: "반영 감정"
 ARG_anti_british_sentiment_idea_desc: "[ENG.GetNameDef]와(과) 관계를 단절한 이후로 반영 감정의 물결이 우리 정부에 스며들었습니다. 우리는 더 이상 그들의 조약과 무역 협정에 얽매이지 않습니다! 이제 우리는 더 중요한 것, 즉 전쟁에 집중할 수 있습니다."
 ARG_growing_nationalism_modifier: "성장하는 민족주의 운동"
 ARG_growing_nationalism_modifier_desc: "아르헨티나 민족주의 정당은 전국적으로 파장을 일으켰으며, 그에 따라 점점 더 많은 사람들이 그들의 성장하는 이념을 지지하기 위해 대열에 합류하고 있습니다. 아르헨티나 민족주의는 [ARG.GetAdjective] 정체성을 회복하고 우리 자신을 남아메리카의 지배적인 세력으로 확고히 하려는 사상을 따릅니다."
 ARG_modify_growing_nationalism_ns_intro: "§Y$ARG_growing_nationalism_modifier$§!을(를) 다음 값만큼 수정:"
 ARG_military_government_idea: "군사 정부"
 ARG_military_government_idea_desc: "페드로 파블로 라미레스가 정부를 장악하고 그 자리에 군사 국가를 수립했습니다. 이러한 정권 교체는 이전에 부패하고 사기성이 짙었던 콩코르단시아로부터의 변화를 요구하는 많은 목소리에서 촉발되었습니다. [ARG.GeAdjective] 팽창주의에 초점을 맞춘 선언문을 통해, 우리나라는 앞으로 많은 분쟁에 직면하게 될 것입니다."
 ARG_spirit_of_the_conquistadors_idea: "콘키스타도르의 정신"
 ARG_spirit_of_the_conquistadors_idea_desc: "우리 민족을 이 아름다운 은의 땅으로 이끈 것은 바로 콘키스타도르의 영광 덕분입니다. 그들은 우리 역사에서 중요한 역할을 했으며, 이제 니미오 데 안킨의 새로운 민족주의 정부에 영감을 주고 있습니다. [ARG.GetNameDefCap]은(는) 약소 이웃 국가들을 정복하고 남아메리카의 지배적인 강대국이 되면서 더욱 커질 것입니다."
 ARG_rapid_militarization_idea: "급속한 군사화"
 ARG_rapid_militarization_idea_desc: "급속한 군사화는 사회가 군사적 충돌과 폭력에 대비하여 스스로를 조직하는 과정입니다. 우리는 군산 복합체를 완전히 발전시키고 다가올 전투에 대비하는 임무를 맡았습니다."
 ARG_argentine_nationalism_idea: "아르헨티나 민족주의"
 ARG_argentine_nationalism_idea_desc: "우리는 [ARG.GetAdjective]으로서 자랑스러워할 것이 많으며, 따라서 국경 내의 사람들이 국가의 이익을 인지하고 지지하도록 계속 장려하고 있습니다. 우리는 가혹한 규제를 가하거나 전쟁으로 위협하려는 자들의 도움이 필요하지 않습니다. [ARG.GetNameDefCap]은(는) 스스로의 힘으로 서는 주권 국가입니다."
 ARG_war_division_idea: "전쟁 노선"
 ARG_war_division_idea_desc: "이제 우리나라는 정부를 공고히 하고 강력한 경제를 구축했으며, 마침내 팽창주의 목표를 수행하기 위한 국민들의 충분한 지지를 얻었습니다."
 ARG_preparing_for_war_idea: "전쟁 준비"
 ARG_preparing_for_war_idea_desc: "남아메리카 대륙이 우리 위에 도사리고 있으며, 점령할 준비가 되어 있습니다. 우리 군대가 전쟁을 준비하는 동안, 정치인과 외교관들은 우리의 정복을 준비하며 열정적으로 문서와 최후통첩을 작성하고 있습니다. 살무사가 공격할 태세를 갖추고 있습니다."
 ARG_spirit_of_the_cisplatine_war_idea: "시스플라티나 전쟁의 정신"
 ARG_spirit_of_the_cisplatine_war_idea_desc: "시스플라티나 전쟁은 아르헨티나-브라질 전쟁으로도 널리 알려져 있습니다. 이는 1820년대에 일어난 무력 충돌이었으며, 그 이후로 양국 사이에는 긴장되고 불안한 평화가 형성되었습니다. 더 이상은 그렇지 않습니다. [BRA.GetNameDefCap]은(는) 처리해야 할 위협입니다. 우리 군대는 과거의 정신을 등에 업고 행진합니다."
 ARG_integrate_operation_bolivar_idea_lar: "볼리바르 작전 통합"
 ARG_integrate_operation_bolivar_idea_lar_desc: "추축국과의 긴밀한 관계 덕분에, 우리는 성공적으로 볼리바르 작전을 통합하고 우리만의 첩보 프로그램으로 남아메리카 전역을 지원하기 시작했습니다."
 ARG_integrate_operation_bolivar_idea_no_lar: "볼리바르 작전 통합"
 ARG_integrate_operation_bolivar_idea_no_lar_desc: "$ARG_integrate_operation_bolivar_idea_lar_desc$"
 ARG_anti_american_idea: "반미 감정"
 ARG_anti_american_idea_desc: "$ARG_red_scare_idea_desc$"
 ARG_anti_american_propaganda_idea: "반미 선전"
 ARG_anti_american_propaganda_idea_desc: "[USA.GetNameDefCap]은(는) 우리 정권에 상당한 위협입니다. 그들이 잠자는 거인으로 알려져 있지만, 언제 깨어나 우리에게 관심을 돌릴지 알 수 없습니다. 우리 선전부 덕분에, 우리 군대는 북쪽의 [USA.GetAdjective] 위협에 맞설 준비가 되어 있습니다."
 ARG_state_unions_idea: "국영 노동조합"
 ARG_state_unions_idea_desc: "노동조합은 고용 조건을 유지하고 개선하려는 노동자들의 조직입니다. 이러한 조건에는 더 나은 임금과 복리후생, 개선된 안전 및 근무 환경, 그리고 일반 노동자가 경영진에게 부당하게 대우받지 않도록 보장하는 것이 포함됩니다."
 ARG_FJC_empowered_idea: "FJC 권한 강화"
 ARG_FJC_empowered_idea_desc: "아르헨티나 공산주의 청년 연맹(Federación Juvenil Comunista de la Argentina)은 아르헨티나 역사상 가장 영향력 있는 청년 정치 조직 중 하나입니다. 이 조직은 PCA(아르헨티나 공산당)와 노선을 같이하는 청년 조직이며, 1921년 아르헨티나 청년들 사이에서 당의 정책을 홍보하기 위해 설립되었습니다. 이제 PCA가 정부를 완전히 장악했으므로, FJC는 계속해서 성장하며 아르헨티나의 젊은이들을 완전한 혁명가로 발전시킬 수 있습니다!"
 ARG_state_atheism_idea: "국가 무신론"
 ARG_state_atheism_idea_desc: "국가 무신론은 강경한 무신론을 정치 체제에 통합하는 것입니다. 많은 사람들에게 신학의 정반대로 여겨지는 이것은, 소련이 처음 집권했을 때의 전철을 밟아 공산주의 국가들이 채택하는 일반적인 정책입니다."
 ARG_liberation_theology_idea: "해방 신학"
 ARG_liberation_theology_idea_desc: "해방 신학은 억압받는 자들의 해방을 강조하는 기독교의 한 분파입니다. 하나의 종교로서, 해방 신학은 사회-경제적 분석에 참여하며, 가난한 이들에 대한 사회적 관심과 억압받는 민족의 정치적 해방을 추구합니다. 해방 신학은 우리 인민의 종교적 자유에 대한 열망과 우리의 혁명적 목표에 대한 지지를 통해 형성되었습니다."
 ARG_committee_of_state_security_idea_lar: "국가보안위원회"
 ARG_committee_of_state_security_idea_lar_desc: "러시아 정보 기관을 모델로 한 아르헨티나 국가보안위원회는 해외 정보, 방첩 및 비밀경찰 기능을 수행하기 위해 설립되었습니다."
 ARG_committee_of_state_security_idea_no_lar: "$ARG_committee_of_state_security_idea_lar$"
 ARG_committee_of_state_security_idea_no_lar_desc: "$ARG_committee_of_state_security_idea_lar_desc$"
 ARG_socialist_unification_idea: "사회주의 통일"
 ARG_socialist_unification_idea_desc: "우리의 영광스러운 혁명의 힘을 통해, 우리는 마침내 남아메리카 대륙에서 지배적인 이념으로 자리 잡을 수 있었습니다. 피와 용맹으로 승리한 이 전쟁은 우리 인민을 남아메리카 사회주의 공화국들을 위한 더 위대한 조국에 대한 열망으로 가득 채웠습니다."
 ARG_eliminate_american_imperialism_idea: "Operación Ocaso Escarlata"
 ARG_eliminate_american_imperialism_idea_desc: "북쪽의 거인은 오랫동안 자본주의의 보루로 군림해 왔습니다. 이제 미제국주의를 끝장내고 붉은 노을을 불러올 때입니다."
 ARG_women_in_industry_idea: "$ARG_women_in_industry$"
 ARG_women_in_industry_idea_desc: "[ARG.GetNameDef]의 현 지도자가 여성이기 때문에, 여성 또한 다른 산업에서 일할 권리가 있다는 선례를 남겼습니다. 노동력이 대규모로 추가됨에 따라, 우리나라의 위대한 경제 발전을 기대할 수 있습니다."
 ARG_socialist_volunteers_idea: "$ARG_socialist_volunteers$"
 ARG_socialist_volunteers_idea_desc: "국제 혁명을 보장하기 위해, 우리는 필요할 때마다 동지 사회주의 국가들에게 원조를 제공해야 합니다. 인력을 할애할 여유가 있다면, 전 세계의 부르주아와 싸울 의용군을 보내야 합니다!"
 ARG_free_association_idea: "생산자 자유 연합"
 ARG_free_association_idea_desc: "자유 연합은 국가, 사회 계급, 위계, 또는 생산 수단의 사적 소유가 존재하지 않는 개인들 간의 관계입니다. 권력을 잡은 아나코-생디칼리스트에 따르면, 이를 통해 개인들은 사회적 제약 없이 자유롭게 연합하여 자신들의 존재 조건을 생산하고 재생산할 수 있게 될 것입니다."
 ARG_no_gods_no_masters_idea: "¡Liberación!"
 ARG_no_gods_no_masters_idea_desc: "대륙의 다른 국가들이 우리 정부와 뜻을 같이하지 않을 수도 있지만, 그들이 분노하고 호전적인 침략자들에게 정복당하는 것을 좌시하는 것은 우리의 이념에 반하는 일입니다. 이웃 국가 중 하나라도 침략자에게 함락된다면, 우리는 그들을 해방시키기 위해 무기를 들어야 합니다."
 ARG_regulated_salaries: "규제된 임금"
 ARG_regulated_salaries_desc: "우리는 고용된 시민들이 국내 산업계로부터 저임금을 받는 것을 막기 위한 조치를 취했습니다. 산업계와 노동자 양측과 맺은 협상은 국가로서 우리에게 가장 유익한 것으로 증명되었습니다."
 ARG_social_welfare_fund_ns: "[ARG.GetAdjective] 사회 복지 기금"
 ARG_social_welfare_fund_ns_desc: "[ARG.GetNameDef]에서 사회 복지 조치에 대한 지출을 늘리는 법안이 제정되었습니다. 예산 증액으로 인해 국민의 만족도가 높아지고 정부에 대한 태도도 점점 긍정적으로 변하는 등 긍정적인 효과가 나타나고 있습니다."
 ARG_british_argentine_agreement: "[ENG.GetAdjective]-[ARG.GetAdjective] 협정"
 ARG_british_argentine_agreement_desc: "우리와 [ENG.GetAdjective] 간의 더 나은 무역 조건을 위한 협정이 체결되었습니다. 이제부터 우리는 [ENG.GetAdjective]와의 무역에서 약간의 할인을 받게 됩니다."

 ARG_fabricaciones_militares_epartamento_de_tanques_del_ejercito_manufacturer: "$ARG_fabricaciones_militares_epartamento_de_tanques_del_ejercito_organization$"
 ARG_arsenales_de_marina_manufacturer: "$ARG_arsenales_de_marina_organization$"
 ARG_astarsa_manufacturer: "$ARG_astarsa_organization$"
 ARG_fma_manufacturer: "$ARG_fma_organization$"
 ARG_fabricaciones_militares: "$ARG_fabricaciones_militares_organization$"
 ARG_fabricaciones_militares_art_manufacturer: "$ARG_fabricaciones_militares_art_organization$"
 ARG_hispano_argentina_manufacturer: "$ARG_hispano_argentina_organization$"
 
