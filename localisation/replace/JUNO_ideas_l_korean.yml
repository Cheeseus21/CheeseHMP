 CHL_compania_general_electricidad: "Compañia General de Electricidad"
 CHL_compania_general_electricidad_desc: "CGE는 1905년 2월 21일, 기술자 프란시스코 우네우스 가나와 라울 클라로 솔라가 이끄는 전문가 집단에 의해 설립되었습니다. [ROOT.GetName]에서 가장 큰 전자제품 개발업체입니다."
 CHL_compania_sudamerica_vapores: "Compañía Sudamericana de Vapores"
 CHL_compania_sudamerica_vapores_desc: "CSAV는 현재 라틴 아메리카에서 가장 큰 [CHL.GetAdjective] 해운 회사이며, 1872년에 설립된 가장 오래된 회사 중 하나이기도 합니다. 민간 선박 생산을 늘리는 데 활용될 수 있습니다."
 CHL_via_trans_radio: "Vía Trans Radio Chilena Compañía de Radiotelegrafía"
 CHL_via_trans_radio_desc: "VTR은 1928년 9월 26일, 라디오 코퍼레이션 오브 아메리카, 마르코니 무선 전신 회사, 콩파니 제네랄 드 텔레그라피 상 필, 텔레풍켄 게젤샤프트의 공동 투자로 설립되었습니다. 이 회사는 국내외에 무선 전신 서비스를 제공하며, [ROOT.GetName] 최초의 민간 통신 회사 중 하나입니다."
 CHL_banco_central_de_chile: "칠레 중앙은행"
 CHL_banco_central_de_chile_desc: "칠레 중앙은행은 1925년 8월 법령 486호에 따라 설립되었으며, 이 법령은 금본위제 하에서 은행권을 발행할 수 있는 독점권을 은행에 부여했습니다. 아르투로 알레산드리 대통령의 첫 임기 중에 설립되었습니다."
 CHL_compania_electro_industrial_valdivia: "Compañía Electro-Siderúrgica e Industrial de Valdivia"
 CHL_compania_electro_industrial_valdivia_desc: "ESVAL은 칠레 발디비아에 위치한 철강 산업체입니다. 이 기업은 1926년 발디비아의 기업가들이 설립할 때 기반 시설을 매입한 알토스 오르노스 이 아세리아스 데 코랄의 후계자로 여겨집니다."
 CHL_empresa_ferrocarries_del_estado: "Empresa de los Ferrocarriles del Estado"
 CHL_empresa_ferrocarries_del_estado_desc: "EFE는 칠레의 국영 철도이자 가장 오래된 국영 기업입니다. 칠레의 기반 시설과 철도 운영 서비스를 관리합니다."
 CHL_compania_manufacura_cartones: "Compañía Manufacturera de Papeles y Cartones"
 CHL_compania_manufacura_cartones_desc: "CMPC는 산티아고에 본사를 둔 [CHL.GetAdjective]의 펄프 및 제지 회사입니다. 칠레 최대의 제지 제조업체이며, 이 회사는 1920년 카르톤 델 마이포와 에스페란사 공장 간의 합병과 사업가 루이스 마테 라라인과 독일인 기술자 게르만 에빙하우스의 합병으로 설립되었습니다."
 CHL_corporacion_fomento_production: "Corporación de Fomento de la Producción de Chile"
 CHL_corporacion_fomento_production_desc: "치얀 지진 이후, CORFO는 피해자들에게 물자를 분배하고 [ROOT.GetAdjective] 내 물자의 통제, 분배, 이동을 돕기 위해 설립되었습니다."
 
