 FRA_colonial_recruitment_desc:0 "식민 행정관 중 한 명인 펠릭스 에부에는 식민지 내 아프리카인들 사이에서 우리의 위상을 높이고 지지를 확보하는 데 핵심적인 인물입니다. 우리가 유명무실해지지 않으려면 식민지에 원조를 요청하고 그곳의 신민들을 징집하여 무장시켜야 하므로, 이는 매우 중대한 사안입니다."
