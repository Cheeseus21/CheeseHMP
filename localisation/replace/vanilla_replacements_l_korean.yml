 FRA_intervention_in_north_africa:0 "적도 아프리카 개입"
 FRA_intervention_in_north_africa_desc:0 "적도 아프리카를 아군으로 확보하는 것은 우리의 해방 전역에 필수적입니다."
 FRA_intervention_in_west_africa:0 "메나스 작전"
 FRA_intervention_in_west_africa_desc:0 "드골은 다카르의 프랑스군을 설득하여 연합국에 합류시킬 수 있다고 믿습니다. 이를 통해 많은 것을 얻을 수 있을 것입니다. 또 다른 비시 프랑스 식민지가 편을 바꾸면 정치적으로 큰 영향을 미칠 것입니다. 또한 프랑스 은행과 폴란드 망명 정부의 금괴가 다카르에 보관되어 있으며, 다카르 항구는 이 지역 유일의 연합국 항구인 시에라리온의 프리타운보다 해군 기지로서 훨씬 우수합니다. 우리는 평화적 점령을 협상하기 위해 기동부대를 파견해야 하며, 실패할 경우 무력으로 도시를 점령해야 합니다."
 FRA_intervention_in_syria:0 "수출업자 작전"
 FRA_intervention_in_syria_desc:0 "비시 프랑스는 시리아에서 강력한 방어 태세를 갖추고 있지만, 갑작스러운 기습 공격으로 방어군이 반응하기 전에 격파할 수 있습니다."
 FRA_intervention_in_madagascar:0 "철갑 작전"
 FRA_intervention_in_madagascar_desc:0 "마다가스카르가 일본의 손에 넘어가면 우리 해운에 안보 위협이 됩니다. 섬을 점령함으로써 남대서양과 남태평양 무역로를 확보할 수 있습니다."
 FRA_intervention_in_north_africa:0 "가봉 전역 - 적도 아프리카"
 FRA_intervention_in_central_africa:0 "가봉 전역 - 중앙 콩고"
 lar_spain.53.t:0 "스페인 금괴"
 lar_spain.53.desc:0 "스페인 금괴가 우리나라에 도착한 지 상당한 시간이 흘렀고, 우리는 대가 없이 스페인에 충분한 지원을 보냈습니다. 정부 구성원들은 특히 공화파에 대한 국민파의 승리를 고려할 때 이 문제의 우스꽝스러운 상태에 대해 언급하기 시작했습니다."
 lar_spain.53.a:0 "금괴를 '대가'로 압류할 것입니다."
 joint_training_exercise:0 "영국-프랑스 연합 훈련"
 joint_training_exercise_desc:0 "육해공에서 우리 연합군은 프랑스 동맹을 고향에서 쫓아내고 세계 문명의 미래를 위협한 폭압적인 침략자들을 분쇄할 것입니다! 우리는 공동의 교전 상대에 맞서 전쟁을 수행하는 더 나은 방법을 배우기 위해 훈련을 실시할 것입니다."
