 PRODUCTION_CONSUMER_GOODS_DESC:1 "현재 경제법에 따라, 국민들은 민간 및 군수 공장 수의 $PERCENTAGE|H1%$만큼 소비재를 생산하기를 기대합니다. 이 수요는 민간 공장으로만 충족되며, 우리에게는 $OPERATIONAL|H$개의 공장이 남게 되고 그중 $TRADE_USABLE|H$개를 무역에 사용할 수 있습니다."
