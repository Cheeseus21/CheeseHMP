 SWE_folkhemmet_pdx_tooltip: "매년 우리는 [SWE.GetnameDef]의 재무장 또는 군축 정책을 설정할 수 있습니다. 사회를 재무장으로 밀어붙일수록 §Y전쟁 지지도§!, §Y군수 공장§! 및 §Y조선소§! 건설 속도 보너스는 강해지는 반면, §Y안정도§!와 §Y민간 공장§! 건설 속도는 약화될 것입니다.\n§Y온전성§!이 0인 §Y국민의 집§!은 그 자체가 반전되어, 민간 보너스는 §R음수§!가 되고 군사 보너스는 §G양수§!가 됩니다. \n\n재무장 위원회가 소집되면 일정 기간 동안 자유롭게 정책을 변경할 수 있지만, 위원회가 끝나면 그 선택은 다음 해까지 고정됩니다."
 #SWE_folkhemmet_intactness_abolished: "§RAbolished§!"


 SWE_hungershield: "훙에르셸드"
 SWE_hungershield_instant_desc: "안정도가 §Y68%§! 미만이면 스웨덴은 파업이나 폭동의 위험에 처합니다. §Y다음 중 하나라도 해당되면 제거됩니다:§!\n교역 포함 민간 공장이 §Y45§!개 초과 \n교역 제외 민간 공장을 §Y14§!개 초과 건설\n제거 시 §Y정치력§! §G120§! 획득"
 SWE_severe_lack_of_ammunition: "심각한 탄약 부족"
 SWE_severe_lack_of_ammunition_desc: "우리 군은 무기 탄약이 심각하게 부족할 뿐만 아니라, 여러 외국에서 제조 및 구매한 각기 다른 소화기들이 뒤섞여 있는 문제로 고통받고 있습니다. 이 문제들을 가능한 한 빨리 해결해야 합니다."
 SWE_folkhemmet: "국민의 집"
 SWE_folkhemmet_desc: "$SWE_per_albin_hansson$와 사회민주당은 수년에 걸쳐 '국민의 집'으로 알려지게 된 일련의 개혁을 도입했습니다. 이 개혁은 군사 예산을 희생하여 사회 안전망, 더 나은 주택, 대중을 위한 교육 기회 확대를 창출했습니다. 많은 이들이 이 개혁을 소중히 여기지만, 더 부유하거나 군국주의적인 입장에 있는 사람들은 이를 경멸의 눈으로 바라봅니다."
 SWE_folkhemmet_communism: "국민의 집"
 SWE_folkhemmet_communism_desc: "사회민주당은 수년에 걸쳐 '국민의 집'으로 알려지게 된 일련의 개혁을 도입했습니다. 이 개혁은 군사 예산을 희생하여 사회 안전망, 더 나은 주택, 대중을 위한 교육 기회 확대를 창출했습니다. 노동자 독재가 수립되었으니, 우리는 이 정책을 확장할 기회를 갖게 되었습니다."
