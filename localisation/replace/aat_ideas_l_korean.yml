 FIN_repurposed_small_industries: "용도 변경된 소규모 산업"
 FIN_repurposed_small_industries_desc: "소규모 산업을 장악하고 전쟁 수행에 필요한 수요를 충족시키기 위해 용도를 변경함으로써, 핀란드 정부는 이제 자원을 결집하고 민간 및 군사적 필요 모두를 위해 경제를 완전히 동원할 수 있습니다."
 FIN_lotta_svard: "로타 스베르드"
 FIN_lotta_svard_desc: "로타 스베르드는 수년 동안 보조 역량으로 우리 군을 지원해 왔습니다. 국가가 이제 이토록 끔찍한 상황에 직면함에 따라, 우리는 그들을 무장시키고 구성원들이 국가 방어를 지원하는 데 더 최전선 역할을 맡도록 허용하여 그들의 역할을 확대했습니다."
 FIN_lotta_svard_support_battalions_bonus_tt: "§Y$category_support_battalions$:§! 조직력: §G+10§!, 내구도: §G+5§!"
 FIN_international_volunteers: "국제 의용군"
 FIN_international_volunteers_desc: "전 세계의 의용군들이 우리 군에 합류하기 위해 핀란드로 오고 있습니다. 핀란드인은 이 전쟁에서 홀로 싸우지 않을 것입니다!"

 FIN_militarized_society_requirement_tt: "§Y$all_adults_serve$§! 또는 §Y$scraping_the_barrel$§! 징병법이 아닐 경우 §R일시적으로 제거됩니다§!"
 FIN_the_lone_wolf_tt: "§R세력을 생성하거나 가입할 수 없습니다§!"

 FIN_popular_support_for_the_revolution: "혁명에 대한 대중의 지지"
 FIN_popular_support_for_the_revolution_desc: "[FIN.GetAdjective] 프롤레타리아가 마침내 봉기하여 부르주아 압제의 족쇄를 벗어던졌습니다. 우리의 운동은 함께 [FIN.GetNonIdeologyName]뿐만 아니라 전 세계 제국주의의 기반을 흔들 것입니다!"
 FIN_imprisoned_right_wing_leaders: "수감된 우익 지도자"
 FIN_imprisoned_right_wing_leaders_desc: "정치인 및 재계 거물과 같은 다양한 우익 파벌의 지도자들이 반혁명 활동을 수행하는 것을 막기 위해 선제적으로 수감되었습니다."
 FIN_low_army_morale: "낮은 군 사기"
 FIN_low_army_morale_desc: "우리 군은 지난 내전이 끝난 지 얼마 되지 않아 또 다른 내전을 치를 가능성에 대해 그다지 열광적이지 않습니다. 특히 적대 행위가 발발한 이후 우리 군의 사기는 큰 타격을 입었습니다."
 FIN_commitment_from_construction_workers: "건설 노동자들의 헌신"
 FIN_commitment_from_construction_workers_desc: "건설 노동자들은 자본주의적 착취의 잔인함에 익숙합니다. 따라서 많은 이들이 우리 혁명 운동의 열렬한 지지자가 되었습니다. 일부는 군에 입대했지만, 많은 이들은 국가가 전쟁을 수행하는 데 필요할 수 있는 모든 건설 작업에 자신의 전문 지식을 사용하기로 약속하고 있습니다."
 FIN_commitment_from_the_trade_unions: "노동조합의 헌신"
 FIN_commitment_from_the_trade_unions_desc: "노동조합은 수십 년 동안 직장에서의 자본주의적 억압의 부당함에 맞서 격렬하게 싸워왔으며, 사람들 사이에서 계급 의식을 고양하는 데 결정적인 역할을 했습니다. 이제 그들은 자본주의를 완전히 끝내기 위한 우리의 혁명 운동에 진심으로 동참하고 있습니다."
 FIN_infiltrated_assets: "침투 자산"
 FIN_infiltrated_assets_desc: "다른 국가들과 새로 체결한 무역 협정으로, 우리는 파트너에게 침투할 기회도 얻었습니다. 이는 그들의 동기와 목표를 더 잘 이해하게 해줄 것이며, 결과적으로 우리 자신을 더 잘 보호할 수 있게 해줄 것입니다."
 FIN_baltic_sea_focus: "발트해 중점"
 FIN_baltic_sea_focus_desc: "발트해는 국가 방위에 있어 주요 관심사입니다. 해군이 해당 지역에서 목표를 최대한 효과적으로 수행할 수 있도록 필요한 훈련과 자원을 제공해야 합니다."
 FIN_finnish_goods: "핀란드 상품"
 FIN_finnish_goods_desc: "기민한 책략으로, 우리는 쿠시넨의 [FIN.GetName]과 견고한 무역 협정을 체결하여 그들의 귀중한 상품에 대한 특권적 접근을 보장하고 조달에 매우 유리한 조건을 확보했습니다."
 FIN_fascist_regime: "파시스트 정권"
 FIN_fascist_regime_desc: "$FIN_a_fascist_regime$"
 FIN_patriotic_peoples_movement_ns_1: "$FIN_patriotic_peoples_movement$"
 FIN_academic_karelian_society_ns_1: "$FIN_academic_karelian_society$"
 FIN_suojeluskunta_ns_1: "수오옐루스쿤타"
 FIN_anti_soviet_sentiment: "반소 감정"
 FIN_anti_soviet_sentiment_desc: "이 주의 인민들은 [SOU.GetNameDef]에 깊은 적개심을 품고 있으며, 이를 개명한 러시아 제국에 불과하거나 자신들의 전통적 가치에 대한 위협으로 간주합니다."
 FIN_confederation_of_finno_russian_republics_dm: "핀-러시아 공화국 연방"
 FIN_confederation_of_finno_russian_republics_dm_desc: "$FIN_confederated_finno_russian_republics$"


#NORWAY - National Spirits 
# Ideas 
 NOR_complacent_cabinet_ns: "안주하는 내각"
 NOR_complacent_cabinet_ns_desc: "요한 뉘고르스볼이 안정적인 정부를 구성한 것은 결코 작은 업적이 아니지만, 그와 그의 내각은 그것이 마지막 장애물이었다고 생각하는 듯합니다. 하지만 그들이 아직 모르는 것은, 그것이 수많은 장애물 중 첫 번째에 불과하다는 사실입니다."
 NOR_obsolete_armed_forces_ns_1: "구식 군대"
 NOR_obsolete_armed_forces_ns_1_desc: "노르웨이는 오랫동안 군대를 관리하지 않았으며, 이제 군대는 전장보다 박물관에 더 어울릴 지경입니다."
 NOR_the_hard_thirties_ns: "힘겨운 30년대"
 NOR_the_hard_thirties_ns_desc: "1929년의 대공황은 노르웨이 전역의 모든 가정과 기업에서 여전히 체감되고 있습니다. 이 10년대를 넘기려면 기적이 필요할지도 모릅니다."
 NOR_anti_communist_sentiment_ns: "반공 감정"
 NOR_anti_communist_sentiment_ns_desc: "[SOU.GetNameDefCap]과 해외의 공산주의자들은 많은 [NOR.GetAdjective]인들에게 공포를 심어주었으며, 그 결과 붉은 위협에 대처하는 한 파시즘은 비교적 실질적인 위협으로 여겨지지 않을 정도입니다."
 NOR_disjointed_cabinet_conscription_law_TT: "§R징병법을 강화할 수 없습니다§!"
 NOR_broken_gun_ns: "부러진 총"
 NOR_broken_gun_ns_desc: "우리의 부러진 총 정책은 [NOR.GetName]과 그 너머에 평화와 번영을 보장할 것입니다. 우리는 그 돈을 시민들의 삶을 개선하는 데 사용할 수 있으며, 이웃 국가들에게 우리가 해를 끼칠 의도가 없음을 보여줄 수 있습니다."
 NOR_printing_money_ns: "화폐 발행"
 NOR_printing_money_ns_desc: "이 10년이 실제로 끝나기 전에 힘겨운 30년대에서 벗어나고 싶다면, 돈이, 그것도 아주 많이 필요할 것입니다!"
 NOR_defensive_rearmament_ns: "방어적 재무장"
 NOR_defensive_rearmament_ns_desc: "전 세계가 우리를 전쟁광으로 여기고 선제공격하게 놔둘 수는 없습니다. 모든 재무장 노력은 명확한 방어적 목적을 가져야 합니다."
 NOR_coordinating_committee: "조정 위원회"
 NOR_coordinating_committee_desc: "민간 저항 운동의 중심에는 코오르디나슌스코미테엔이 있으며, 이들은 망명 정부와 [NOR.GetName] 내 여러 민간 저항 세력을 연결하는 임무를 맡고 있습니다."
 NOR_kretsen_ns: "크레첸"
 NOR_kretsen_ns_desc: "침략자들의 심장부 깊숙이 자리 잡고 그리메룬 농장에서 비밀 회합을 여는 이 단체는, 파시스트 점령지 내외에서 가능한 모든 방법으로 민간 저항을 이끄는 임무를 맡고 있습니다."
 NOR_sivorg_ns: "시보르그"
 NOR_sivorg_ns_desc: "조정 위원회와 크레첸을 포함한 민간 저항 단체의 총칭입니다. 이들은 우리가 파시즘을 물리치고 [NOR.GetName]에 자유를 되찾아올 것이라는 희망을 붙들어야 하는 후방 전선의 남녀들입니다."
 NOR_ketsen_plus_KK_fake_ns: "$NOR_kretsen_ns$ §W와§! $NOR_coordinating_committee$"
 NOR_efficient_production_ns: "효율적인 생산"
 NOR_efficient_production_ns_desc: "효율성 증대를 위한 어떤 개선도 무시할 수 없습니다. 우리가 가진 것을 최대한 활용하여 생산량에서 뒤처지는 위험을 막아야 합니다."
 NOR_new_haeren_ns_1: "새로운 헤렌"
 NOR_new_haeren_ns_1_desc: "과거의 [NOR.GetAdjective] 육군은 이 위험한 시기에 충분하지 않았습니다. 이것은 현대전을 위한 현대적인 군대입니다."
 NOR_new_haeren_ns_2_desc: "$NOR_new_haeren_ns_1_desc$"
 NOR_kungens_garde_ns: "한스 마예스테트 콩엔스 가르데"
 NOR_kungens_garde_ns_desc: "국왕 폐하께 3백만 명의 경호원이 있을지 모르나, 오직 [NOR.GetAdjective] 육군의 정예 부대만이 적들과 정면으로 맞설 수 있습니다."
 NOR_expanded_conscription_ns: "징병 확대"
 NOR_expanded_conscription_ns_desc: "인구가 희박한 국가로서 이 위급한 시기에, 어떤 [NOR.GetAdjective] 국민도 가만히 앉아 있을 여유가 없습니다. 우리의 목표를 달성하려면 최소 요건을 충족하는 모든 이가 입대해야 합니다."
 NOR_XU_ns: "XU"
 NOR_XU_ns_desc: "파시스트 점령에 저항하는 많은 노르웨이인들은 압제자들을 방해하기 위해 각자의 역할을 다하고 싶어 합니다. XU는 이 모든 세력을 산하에 조직하고, 이들의 첩보 활동, 방해 공작, 그리고 궁극적으로는 이 침입자들을 몰아내려는 노력을 지원할 수 있습니다."
 NOR_communist_education_centers_ns_1: "공산주의 교육 센터"
 NOR_communist_education_centers_ns_1_desc: "이 센터들은 해외 동지들이 설립했으며, 다가올 새로운 [NOR.GetNonIdeologyName]을 위해 [NOR.GetAdjective] 국민을 준비시키는 우리 노력의 최전선에 있습니다."
 NOR_crumbling_fortifications_ns: "허물어지는 요새"
 NOR_crumbling_fortifications_ns_desc: "어떤 경우에는 요새라고 부르기도 민망할 정도입니다. 이들은 단지 보존 처리된 것이 아니라, 현대전에 전혀 대비되어 있지 않습니다."
# Allied Democratic
 NOR_reduced_workers_rights_ns: "노동자 권리 축소"
 NOR_reduced_workers_rights_ns_desc: "임박한 전쟁과 파멸을 명분으로, 우리는 당분간 노동자의 권리를 제한하는 희생을 감수했습니다. 전쟁이 끝나면 그들도 이해해 주기를 바랍니다."
 NOR_investing_in_norway_ns: "노르웨이에 투자"
 NOR_investing_in_norway_ns_desc: "우리 자본의 일부를 [NOR.GetName]에 투자하는 것은 양국을 더 가깝게 만들 뿐만 아니라, 미래에 도움이 필요할 경우를 대비해 동맹을 강화할 것입니다."
 NOR_improved_training_ns: "훈련 개선"
 NOR_improved_training_ns_desc: "새로운 훈련 프로그램을 통해 병사들에게 생존 및 적 섬멸에 필요한 모든 지식과 그 이상을 가르치면서도, 이들을 더욱 신속하게 전장으로 투입할 수 있습니다."
 NOR_flexible_officers_academy_spirit: "유연한 장교단"
 NOR_flexible_officers_academy_spirit_desc: "이 새로운 세대의 장교들은 낡은 책과 고루한 평시 교수들 이상의 것에서 배울 수 있기에, [NOR.GetAdjective] 군대를 승리로 이끌 것입니다."
    # Fascist Path 
 NOR_contested_leadership_ns: "지도부 경쟁"
 NOR_contested_leadership_ns_desc: "[get_NOR_contested_leadership_ns_desc]"
 NOR_contested_leadership_ns_desc_ger: "퀴슬링이 쿠데타로 무엇을 이루려 했든 간에, [GER.GetNameDef]는 [NOR.GetNonIdeologyName]이(가) 정복되었을 때 수립될 정부에 대한 자신들만의 계획을 가지고 있었습니다. 사실, 히틀러 본인을 제외하고 제국 내에서 퀴슬링이 그 직책에 적합하다고 생각하는 사람은 거의 없습니다. 히틀러는 이상하게도 이 [NOR.GetAdjective] 소인배 폭군을 좋아하는 것 같습니다."
 NOR_contested_leadership_ns_desc_generic: "퀴슬링이 쿠데타를 성공시켰음에도 불구하고, 군 내부나 심지어 그의 행정부 내에서조차 모든 이가 그의 정권 장악을 승인하는 것은 아니므로 권력 계층이 매우 혼란스러운 것이 사실입니다."
 NOR_abandoning_nynorsk_ns: "$NOR_abandoning_nynorsk$"
 NOR_abandoning_nynorsk_ns_desc: "국민연합의 지도자들은 뉘노르스크를 용납하지 않으며, 모든 시민은 노르웨이어의 보크몰 버전을 사용해야 한다고 포고했습니다."
 NOR_oppressed_civilians_dmod: "억압받는 민간인"
 NOR_oppressed_civilians_dmod_desc: "노르웨이 시민들은 외국 폭군들을 대신하여 국민연합이 강요한 파시스트 정권에 대한 모든 반대 의견을 억압하기 위한 광범위한 조치를 겪고 있습니다."
 NOR_ulfhedhnar_ns: "$NOR_ulfhedhnar_wolf_coats$"
 NOR_ulfhedhnar_ns_desc: "우리는 전통적인 바이킹 광전사인 울프코트를 부활시켰습니다. 이들은 전투를 갈망하며 전 세계에 걸친 우리의 정복 활동의 선봉에 설 준비가 되어 있습니다."
 NOR_permanent_revolution_ns: "영구혁명"
 NOR_permanent_revolution_ns_desc: "레프 트로츠키가 우리에게 가르쳤듯이, 전 세계의 모든 노동자가 해방되어 노동의 결실과 재결합할 때까지 혁명은 끝나지 않을 것입니다. 국경은 노동 계급에게 무의미합니다."
 NOR_attack_sweden_ns: "스웨덴 공격"
 NOR_attack_sweden_ns_desc: "[SWE.GetNonIdeologyName]은(는) 점령하지 않고 내버려두기에는 너무나 중요한 목표입니다. 우리가 먼저 그들의 자원을 장악하지 않으면, 그 자원들은 적의 손에 넘어가거나, 더 나쁘게는 [SWE.GetAdjective] 전쟁 특수 상인들의 손에 들어갈 수 있습니다."
 NOR_attack_denmark_ns: "덴마크 공격"
 NOR_attack_denmark_ns_desc: "[DEN.GetNonIdeologyName]은(는) 유럽의 나머지 지역으로 향하는 우리의 다리입니다. 불행히도 이는 적이 스칸디나비아로 진출하는 발판이 될 수도 있다는 것을 의미합니다. 우리는 그곳을 무방비 상태로 둘 수 없습니다."
 NOR_crush_stalin_ns: "스탈린 분쇄"
 NOR_crush_stalin_ns_desc: "스탈린과 그의 소위 [SOU.GetName]은(는) 공산주의가 무엇을 의미하는지에 대한 척도로 사용됩니다. 이 폭력배의 정권은 낡은 러시아 제국에 붉은 페인트를 칠한 것에 불과하므로, 우리는 이를 계속 내버려둘 수 없습니다."
 NOR_crush_hitler_ns: "히틀러 분쇄"
 NOR_crush_hitler_ns_desc: "히틀러의 정권만큼 잔인하고 비인간적인 정권은 거의 없습니다. 우리가 지켜보는 동안 이 미치광이가 날뛰게 둘 수는 없습니다. 그와 그의 나치 [GER.GetNonIdeologyName]을(를) 신속하고 결정적으로 처리합시다."
 NOR_liberate_finland_ns: "핀란드 해방"
 NOR_liberate_finland_ns_desc: "[FIN.GetName]의 노동자들은 명백히 해방될 필요가 있습니다. 그들은 자신이나 동료 핀란드인들을 위해서가 아니라, 지주와 산업가들을 위해 고되게 일하고 있습니다. 우리의 동지들이 이 땅을 해방시켜 혁명을 위해 일할 수 있도록 돕읍시다."
 
 # Monarchist Path 
 NOR_king_haakon_vii_ns: "호콘 7세 국왕"
 NOR_king_haakon_vii_ns_desc: "13세기 이래 최초의 [NOR.GetAdjective] 군주로서, 호콘 7세 국왕은 민주주의의 귀감입니다. 그는 국민투표를 거친 후에야 왕위를 수락했으며, [NOR.GetName]의 통치를 그의 고문들과 다른 고위 귀족들에게 맡겼습니다."

 NOR_new_high_king: "새로운 상왕"
 NOR_new_high_king_desc: "섭정 페데르 앙케르 베델-얄스베르그가 자신을 노르웨이의 새로운 상왕으로 선포하고, 호콘 국왕의 칭호를 직접 차지하지는 않은 채 통치자로 자리매김했습니다. 그러나 이 조치는 주변 이웃 국가들 사이에서 매우 인기가 없습니다."

 NOR_norwegian_regency: "노르웨이 섭정"
 NOR_norwegian_regency_desc: "섭정 페데르 앙케르 베델-얄스베르그는 오직 자신의 국왕인 호콘 7세의 뜻과 명령을 수행할 뿐이라고 선언했습니다. 이와 같이 그는 이웃 스칸디나비아 군주국들과의 관계 개선을 모색하고 있습니다."

 NOR_second_north_sea_empire: "제2차 북해 제국"
 NOR_second_north_sea_empire_desc: "섭정 페데르 앙케르 베델-얄스베르그는 노르웨이를 과거의 영광으로 되돌릴 것이며, 새로운 노르웨이 제국이 부상하는 것은 시간 문제일 뿐이라고 선언했습니다."

 #Dynamic Modifiers 
 NOR_independent_norway_dmod: "독립 노르웨이"
 NOR_independent_norway_dmod_desc: "우리는 1905년부터 스웨덴으로부터 독립했으며, 그 이후로 많은 발전을 이루었습니다. 이제 우리 선조들이 꿈꾸던 [NOR.GetNonIdeologyName]을(를) 만드는 것은 우리에게 달려 있습니다."
 NOR_army_air_force_dmod: "Hærens Flyvevaaben"
 NOR_army_air_force_dmod_desc: "현재로서는, 우리 초기 공군의 임무는 지상군이 어디로 가든 지원하는 것이므로, 당분간은 별도의 지휘 체계가 필요하지 않습니다."
 NOR_royal_air_force_dmod: "Luftforsvaret"
 NOR_royal_air_force_dmod_desc: "우리 공군은 [NOR.GetAdjective]의 하늘뿐만 아니라, 자신들의 운명까지도 지배할 수 있다고 여겨질 정도로 발전했습니다."
 NOR_royal_navy_dmod: "Sjøforsvaret"
 NOR_royal_navy_dmod_desc: "우리의 자랑스러운 해군은 [NOR.GetName] 주변과 그 너머의 바다를 항해할 것입니다. 결국, 우리나라로 들어오는 가장 넓은 고속도로는 바로 북해 그 자체입니다."
 NOR_administrative_council_dmod: "행정 위원회"
 NOR_administrative_council_dmod_desc: "우리나라가 점령당한 동안, 이 남녀들은 파시스트 지배자들이 멀리서 중요한 결정을 내리는 동안 사소한 문제들을 처리하는 임무를 맡은 집단이 될 것입니다."
 NOR_kingdom_of_norway_dmod: "$NOR_the_kingdom_of_norway$"
 NOR_kingdom_of_norway_dmod_desc: "민주주의라는 허울이 무슨 소용입니까? 이제 의회가 마침내 해산되었으니, 우리 왕국은 국왕의 자비로운 손길과 섭정 페데르 앙케르 베델-얄스베르그 경의 정의로운 주먹 아래에서 번영할 수 있습니다."
 # State Modifiers 

 NOR_prep_his_dmod_1: "개발 중"
 NOR_prep_his_dmod_1_desc: "우리는 이 주를 낙후된 지역에서 소규모 민간 산업을 갖춘 곳으로 개발하는 작업을 진행하고 있습니다."
 NOR_prep_his_dmod_2: "개발됨"
 NOR_prep_his_dmod_2_desc: "#이 주는 상당히 개발되었지만, 산업 강국으로 여겨지기까지는 아직 갈 길이 멉니다."
 NOR_prep_his_dmod_3: "고도로 개발됨"
 NOR_prep_his_dmod_3_desc: "이 지역은 노르웨이 민간 산업 발전에 전념하고 있습니다."
 NOR_prep_resistance_dmod: "심어둔 저항 세력"
 NOR_prep_resistance_dmod_desc: "침략자들이 우리를 어떻게 생각하든, [NOR.GetNonIdeologyName]의 인민들은 그리 쉽게 항복하지 않을 것입니다. 우리는 인력을 심어두고, 도구를 은닉했으며, 이 끔찍한 침략자들에게 더 효과적으로 저항하는 데 사용할 수 있는 자원을 곳곳에 분산시켰습니다."
 NOR_defend_state_dmod: "지역 방어"
 NOR_defend_state_dmod_desc: "우리는 모든 것을 바쳐 정당한 우리 영토를 지킬 것입니다. 침략자들은 죽어야만 합니다."
 NOR_prep_fasc_dmod_1: "파시스트 지지자"
 NOR_prep_fasc_dmod_2: "$NOR_prep_fasc_dmod_1$"
 NOR_prep_fasc_dmod_3: "$NOR_prep_fasc_dmod_1$"
 NOR_royal_defenses: "왕실 방어"
 NOR_royal_defenses_desc: "왕궁의 명령에 따라, 이 지역은 왕국을 보호하는 데 필요한 방어 시설을 건설하는 데 집중해야 합니다."
 # Concerns 
 NOR_aat_norsk_hydro: "$NOR_norsk_hydro$"
 NOR_folks_hydro: "국민 수력"

