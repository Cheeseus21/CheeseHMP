 SWE_full_capacity_furnaces_desc: "적국에 대한 금수 조치 이후, 이제 원자재가 넘쳐납니다. 이전에는 자원 할당량으로 제한되었던 중공업이 이제 밤낮으로 가동하는 데 필요한 모든 것을 갖추게 되었습니다. 그럼에도 불구하고 비축량이 빠르게 채워지고 있으므로, 우리는 더 나은 싸움을 위해 필요한 자원을 제공할 의사가 있음을 세계 시장에 알려야 합니다."
