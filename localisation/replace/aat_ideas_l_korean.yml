 #National Spirits
 FIN_finnish_army: "핀란드 육군"
 FIN_finnish_army_desc: "자랑스럽고 독립적인 유산의 산물인 핀란드 육군은 수년간의 외세 침략에 맞선 투쟁으로 단련된 강력한 군대입니다. 조국을 수호하겠다는 굳은 결의를 품은 핀란드 병사들은 숙련된 명사수이자 강인한 전사로서, 가장 위협적인 적에게도 맞설 준비가 되어 있습니다. 제한된 자원에도 불구하고, 핀란드 육군은 쉽게 꺾이지 않는 끈질기고 불굴의 정신을 상징합니다."
 FIN_finnish_navy: "핀란드 해군"
 FIN_finnish_navy_desc: "핀란드 해군은 작지만 자랑스러운 군대로, 모든 위협으로부터 조국을 방어할 준비가 되어 있습니다. 해안 방어와 해로 보호에 중점을 둔 핀란드 해군은 핀란드 독립의 강력한 상징이자 국가 전체 방어 전략의 핵심 요소입니다. 압도적인 역경에 직면할지라도, 핀란드 해군 수병들은 지상군에 못지않은 용기와 끈기로 싸울 것을 결의합니다."
 FIN_finnish_airforce: "핀란드 공군"
 FIN_finnish_airforce_desc: "작은 규모와 제한된 자원에도 불구하고, 핀란드 공군은 수년간의 실험과 임기응변을 통해 기술을 연마한 숙련된 조종사와 혁신적인 설계자들을 자랑합니다. 순전한 결의와 변화하는 상황에 기꺼이 적응하려는 의지를 통해, 핀란드 공군은 무시할 수 없는 군대로서의 명성을 쌓았으며, 지상군에 못지않은 용기와 끈기로 조국을 방어할 것입니다."
 FIN_national_industry_expand: "$BUL_national_industry_01$"
 FIN_national_industry_expand_desc: "$SWI_expand_arms_industry_desc$"
 FIN_sami_pathfinders: "사미족 척후병"
 FIN_sami_pathfinders_desc: "전문 추적가이자 야생의 길잡이인 사미족은 핀란드 북부의 험준한 지형을 쉽게 탐색하고 핀란드군에 중요한 정보를 제공할 수 있습니다. \n치열한 전투 속에서든 고요한 숲 깊은 곳에서든, 사미족 척후병은 이제 핀란드 육군의 핵심 자산이자 국가의 자랑스러운 유산을 상징하는 영원한 존재입니다."
 FIN_fortification_effort: "요새화 노력"
 FIN_fortification_effort_desc: "$FIN_defense_in_depth_desc$"
 FIN_coastal_batteries_effort: "해안포대 건설 노력"
 FIN_coastal_batteries_effort_desc: "$FIN_coastal_defense_desc$"
 FIN_mannerheim_line_expansion_modifier: "만네르헤임선 확장"
 FIN_mannerheim_line_expansion_modifier_desc: "만네르헤임선을 강화하고 확장함으로써, 우리는 핀란드를 가볍게 여길 수 없다는 분명한 메시지를 보내고, 핀란드인들이 가용할 수 있는 모든 수단을 동원해 독립을 수호할 준비가 되어 있음을 보여줄 것입니다."
 FIN_bank_of_aland_ns: "$FIN_bank_of_aland$"
 FIN_bank_of_aland_ns_desc: "$FIN_bank_of_aland_desc$"
 FIN_infrastructure_effort: "기반시설 확충"
 FIN_infrastructure_effort_desc: "$FIN_industrial_development_desc$"
 FIN_hydro_electric_expansion: "수력 발전 확장"
 FIN_hydro_electric_expansion_desc: "[ROOT.GetName]의 풍부한 강이라는 천연자원을 활용하여, 수력 발전 기반시설의 의미 있는 확장이 진행 중입니다. 새로운 수력 발전소 건설에 투자하면 산업 역량을 대폭 확장하고 국가 성장을 이끌 수단을 확보하게 될 것입니다."
 FIN_motti_tactics_modifier: "모티 전술"
 FIN_motti_tactics_modifier_desc: "핀란드군은 해당 주에서 모티 전술을 사용하고 있으며, 적 부대의 군수 및 통신선을 마비시킬 목적으로 이들을 포위하고 고립시키고 있습니다."
 FIN_weapon_caches_modifier: "무기 은닉처"
 FIN_weapon_caches_modifier_desc: "비밀 군사 작전에 따라, 대량의 핀란드 육군 무기와 장비가 주 전역에 흩어진 은닉처에 숨겨졌습니다. 이는 핀란드 저항군이 침략자에 맞서 계속 싸울 수 있도록 하기 위함입니다."
 FIN_public_opposition_to_the_winter_war: "겨울 전쟁에 대한 대중의 반대"
 FIN_public_opposition_to_the_winter_war_desc: "국민들은 [FIN.GetNonIdeologyName](을)를 상대로 한 전쟁의 필요성에 회의적이 되었습니다. 한때는 우리 보안 기관에 의해 억제되던 소수 의견이, 이제는 우리가 통제할 수 없는 주류 정서로 확산되었습니다."
 FIN_we_are_the_white_death_idea: "우리는 하얀 사신이다"
 FIN_we_are_the_white_death_idea_desc: "우리의 유명한 저격수, 시모 해위해는 전장에서의 용맹한 활약으로 우리 군의 사기를 드높였습니다. 이제 병사들은 '하얀 사신'이라는 집단적인 이름 아래 단결합니다. 이는 우리 조국을 침략하려는 어리석은 모든 적을 파괴하겠다는 그들의 불굴의 의지를 담은 오싹한 이름입니다."
 FIN_embraced_by_the_white_death: "하얀 사신의 품에 안겨"
 FIN_embraced_by_the_white_death_desc: "시모 해위해는 자신도 여러 번 죽을 고비를 넘겼음에도 불구하고, 계속해서 적들에게 죽음과 공포의 차가운 포옹을 안겨주고 있습니다."

 FIN_the_lapland_war: "라플란드 전쟁 참전 중"
 FIN_compensation_for_side_switch_good: "핀란드로부터의 보상"
 FIN_compensation_for_side_switch_bad: "전쟁 배상금"

