 SWE_fascist_counter_revolution_0_desc: "우리가 마침내 권력을 잡았지만, 우익 전체주의자들로부터 불만의 속삭임이 여전히 들려옵니다. 이것이 메아리처럼 사라질 단순한 불만의 속삭임일까요, 아니면 눈사태를 일으킬 포효로 커질까요?"
