 ICE_eimskip: "에임스킵"
 ICE_vifilfell: "비필펠"
 ICE_siemens: "지멘스 아이슬란드"
 ICE_transformation_of_nature_state_modifier: "효율적인 에너지 생산"
 ICE_landsvirkjun: "란즈비르크윤"

 ICE_greyshirts: "회색셔츠단"
 ICE_greyshirts_desc: "어릴 때부터 훈련받은 잘 무장된 민병대는 젊은이들을 육성하고 우리의 새로운 세계에 맞게 빚어내는 데 유용한 도구가 될 수 있습니다. 또한, 준군사 훈련은 군대의 역량을 강화하는 것을 의미하며, 이는 마땅히 우리 것인 영토를 되찾을 때 유용할 수 있습니다."
 ICE_viking_spirit: "아사트루"
 ICE_viking_spirit_desc: "두려움 없고 치명적이라는 말은 옛 바이킹과 연관된 단어였습니다. 그들은 저 너머에 무엇이 있는지 모른 채 대양을 건넜고, 오직 강한 자만이 성공했습니다. 오늘날 아이슬란드인들은 두려움 없고 대담해야 합니다. 오직 과감함과 용맹을 통해서만, 이 나라는 과거의 영광을 되찾고 다시 한번 북해를 지배할 수 있을 것입니다."
 ICE_fascist_tech_sharing_group_name: "아이슬란드 연구 기구"
 ICE_fascist_tech_sharing_group_desc: "아이슬란드 정부는 기술 발전을 촉진하기 위해, 이념적으로 뜻을 같이하는 국가들과 연구 협력 프로그램을 조직했습니다."
 ICE_hosting_american_soldiers: "미군 주둔"
 ICE_hosting_american_soldiers_desc: "우리 섬에 미군을 주둔시키면 그들을 우리 국가에 합류하도록 유인할 수 있으며, 이를 통해 우리의 공동 대의를 위해 기꺼이 싸울 유능한 인재들을 얻을 수 있습니다."
 ICE_conscription_idea: "Herþjónustu"
 ICE_conscription_idea_desc: "아이슬란드의 모든 청년은 국가 주권을 수호하기 위해 18세에서 22세 사이에 4년간의 병역 의무를 수행해야 합니다."
 ICE_professional_army_idea: "Víkingasveitin"
 ICE_professional_army_idea_desc: "아이슬란드군은 가장 용감하고 굳건한 장병들로 구성되어 있으며, 어떤 대가를 치르더라도 아이슬란드 국가를 방어할 준비가 되어 있습니다."
 ICE_civil_defence_organization: "민방위 기구"
 ICE_civil_defence_organization_desc: "모든 아이슬란드 시민은 조국을 보호하고, 국민을 지원하며, 기반 시설을 지키기 위해 언제든지 필요한 모든 조치를 취할 준비가 되어 있습니다."

