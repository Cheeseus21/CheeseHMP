 SWE_navy_rearnament_value: "해군 재무장: [SWE_rearmament_status_text_navy] [?SWE.folkhemmet_navy_part]/[?SWE.folkhemmet_max_constituent_parts]"
 SWE_air_rearnament_value: "공군 재무장: [SWE_rearmament_status_text_air] [?SWE.folkhemmet_air_part]/[?SWE.folkhemmet_max_constituent_parts]"
 SWE_folkhemmet_intactness_value: "§Y폴크스헴메트 상태:§! [SWE_folkhemmet_status_text] ([?SWE.folkhemmet_intactness]/[?SWE.folkhemmet_max_intactness])"
 SWE_folkhemmet_system_desc: "세계가 전 지구적 분쟁으로 치닫는 가운데, 스웨덴은 복지 체계를 희생하고 재무장할 것인지, 아니면 복지 체계를 유지하며 미래의 분쟁에 무방비로 노출될 위험을 감수할 것인지 기로에 섰습니다."
