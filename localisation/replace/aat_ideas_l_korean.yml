###### NORDIC SHARED IDEAS ######

NORDIC_to_arms_against_tyranny_ns: "폭정에 맞서 무기를"
NORDIC_to_arms_against_tyranny_ns_desc: "폭정의 발톱이 우리 북유럽 이웃 국가들의 독립을 위협하고 있으니, 우리가 폭군의 다음 먹잇감이 되지 않으려면 그들을 방어할 준비를 해야 합니다."
NORDIC_the_nordic_march_ns: "북유럽의 진군"
NORDIC_the_nordic_march_ns_desc: "주변 국가들은 아직 깨닫지 못했지만, 그들이 폭정이라 부르는 것은 변화의 바람에 지나지 않습니다. 그 바람이 경로의 모든 것을 파괴하고 나면, 잿더미 속에서 새로운 북유럽 질서가 일어설 것이며, 우리는 그 힘을 장악할 위치에 서게 될 것입니다."

