 DEN_aalborg_portland: "올보르 포틀랜드"
 DEN_danske_stalvalsevaerket_ns: "Det Danske Stålvalseværket"
 DEN_designer_can_be_improved_tt: "이 설계사는 §Y$DEN_aalborg_portland_cement_plant$§! 중점을 완료하여 개선할 수 있습니다."
 DEN_improved_designer_tt: "이 설계사는 개선되었습니다"
#NATIONAL SPIRITS
 DEN_industrial_capability_dynamic_modifier: "덴마크 산업 역량"
 DEN_light_market_regulation_research_bonus: "$DEN_industrial_capability_dynamic_modifier$"
 DEN_industrial_capability_dynamic_modifier_light_regulation: "$DEN_industrial_capability_dynamic_modifier$"
 DEN_industrial_capability_dynamic_modifier_desc: "덴마크는 전통적으로 농업 사회이자 생산국이었지만, 산업의 중요성과 경제적 의의가 점차 커지고 있습니다. 현대 시대의 급속한 발전에 발맞추기 위해 산업화와 현대화를 이루어야 합니다."
 DEN_industrial_capability_dynamic_modifier_light_regulation_desc: "$DEN_industrial_capability_dynamic_modifier_desc$"
 DEN_industrial_capability_dynamic_modifier_improved: "$DEN_industrial_capability_dynamic_modifier$"
 DEN_industrial_capability_dynamic_modifier_light_regulation_improved: "$DEN_industrial_capability_dynamic_modifier$"
 DEN_industrial_capability_dynamic_modifier_improved_desc: "덴마크는 전통적으로 농업 사회이자 생산국이었지만, 산업의 중요성과 경제적 의의가 점차 커지고 있습니다. 우리는 산업을 현대화하고 발전시키기 위한 첫걸음을 내디뎠으며, 이로써 경쟁력과 생산성을 더욱 높였습니다."
 DEN_industrial_capability_dynamic_modifier_light_regulation_improved_desc: "$DEN_industrial_capability_dynamic_modifier_improved_desc$"
 DEN_industrial_capability_dynamic_modifier_max_improved: "$DEN_industrial_capability_dynamic_modifier$"
 DEN_industrial_capability_dynamic_modifier_light_regulation_max_improved: "$DEN_industrial_capability_dynamic_modifier$"
 DEN_industrial_capability_dynamic_modifier_max_improved_desc: "덴마크는 전통적으로 농업 사회이자 생산국이었지만, 산업의 중요성과 경제적 의의가 점차 커지고 있습니다. 우리 산업은 완전히 현대화되고 발전했으며, 밤낮으로 최대 가동률로 운영되고 있습니다."
 DEN_industrial_capability_dynamic_modifier_light_regulation_max_improved_desc: "$DEN_industrial_capability_dynamic_modifier_max_improved_desc$"
 DEN_economic_crisis_dynamic_modifier: "경제 위기"
 DEN_economic_crisis_dynamic_modifier_desc: "대공황이 우리를 강타했습니다. 그 결과, 농산물 수요 감소는 수많은 농부들에게 빚과 압류를 안겨주었고, 치솟는 실업률은 정치 변방의 극단주의 운동이 자라나는 온상이 되었습니다. "
 DEN_neglected_military_dynamic_modifier: "방치된 군대"
 DEN_neglected_military_dynamic_modifier_desc: "우리는 독일을 자극하지 않기 위해 수년간 비무장 중립 정책을 추구해 왔습니다. 군대는 상징적으로 주권을 수호하는 명목상의 병력에 불과합니다. 국군은 수년에 걸쳐 지속적인 예산 삭감을 겪어왔으며, 그 결과 어떠한 잠재적 분쟁에도 전혀 대비하지 못하고 있습니다."
 DEN_danish_produce: "덴마크 농산물"
 DEN_danish_produce_desc: "베이컨과 유제품은 덴마크 수출의 주력 상품이었으며, 제1차 세계 대전 중에는 영국 및 독일과의 교역으로 이익을 본 이들을 지칭하는 '굴라시 남작'이라는 용어가 만들어지기도 했습니다."
 DEN_sahnefront: "버터 전선"
 DEN_sahnefront_desc: "덴마크는 풍요로운 농업 전통을 지닌 풍요로운 국가이며, 우리의 속국으로서 우리는 그 혜택을 거둘 수 있습니다. 덴마크를 점유하면 우리의 군사력과 역량이 강화될 것입니다."
 DEN_improved_logistics: "개선된 병참"
 DEN_improved_logistics_desc: "덴마크는 풍요롭고 풍부한 국가이며, 이러한 자원을 활용하여 우리 군대의 식량을 확보하고 군사 역량을 강화할 것입니다."
 DEN_danish_licensing_ns: "무역 협정"
 DEN_danish_licensing_ns_desc: "국가 간의 거래와 상업이 필수적인 세상에서, 긴밀한 무역 파트너를 두는 것은 좋은 일입니다. 이 협정은 양국 모두에게 이익이 되고 우리 사이의 유대를 강화할 것입니다."
 DEN_danish_licensing_ns_no_DOD_desc: "$DEN_danish_licensing_ns_desc$" 
 DEN_overlord_licensing_ns_desc: "$DEN_danish_licensing_ns_desc$" #TODO_DANNE; Refine if there is time
 DEN_overlord_licensing_ns_no_DOD_desc: "$DEN_danish_licensing_ns_desc$" #TODO_DANNE; Refine if there is time
 DEN_war_preparations_dynamic_modifier: "전쟁 준비"
 DEN_war_preparations_dynamic_modifier_desc: "준비만이 폭풍을 이겨낼 유일한 길입니다. 필요할 때를 대비하여 원자재와 기타 보급품 비축량을 늘려야 하며, 전쟁 수행을 지원하도록 산업을 준비시켜야 합니다."
 DEN_rule_the_north_sea: "북해를 지배하라"
 DEN_rule_the_north_sea_desc: "북해에 대한 야망을 실현하기 위해, 우리는 막강한 화력을 갖춘 대함대를 창설하여 우리의 영토를 확보하고 다른 국가들이 이를 넘보지 못하도록 억제해야 합니다."
 DEN_fromandskorpset_ns: "$DEN_fromandskorpset$"
 DEN_fromandskorpset_ns_desc: "특수 상륙 부대가 창설됨에 따라, 우리는 바다를 건너 외국의 해안까지 군사력을 널리 투사할 준비가 되었습니다."
 DEN_declaration_of_neutrality: "중립 선언"
 DEN_declaration_of_neutrality_desc: "덴마크는 수십 년간 전쟁을 피할 수 있었으며, 이는 오직 우리의 중립 정책 덕분이었습니다. 이 정책은 우리에게 큰 도움이 되었고 앞으로도 그럴 것입니다."
 DEN_denmark_becomes_a_puppet_tt: "[DEN.GetFlag]§Y[DEN.GetNameDefCap]§!은(는) 더 강력한 인접 국가가 침공할 경우, 현재 정부 형태를 유지한 채로 괴뢰국이 되려는 선택지를 얻게 됩니다\n\n"
 DEN_neutrality_flag: "[DEN.GetFlag]§Y[DEN.GetNameDefCap]§!은(는) 독립 상태이며 전쟁 중이 아님"
 DEN_political_edicts_dynamic_modifier: "정치 포고령"
 DEN_political_edicts_dynamic_modifier_desc: "모든 덴마크 국민은 이 어려운 시기에 자신에게 무엇이 기대되고 요구되는지 알아야 합니다. 우리는 국가에 대한 적대 행위를 경계하고 공동의 목표를 향해 함께 나아가야 합니다."
 DEN_resistance_dynamic_modifier: "저항 운동"
 DEN_resistance_dynamic_modifier_desc: "[?DEN.DEN_overlord_nation.GetAdjective] 점령군에 단결하여 저항해야만 자유로운 [DEN.GetNameDef]을(를) 다시 볼 수 있을 것입니다. 저항 운동이 이 중심에 있으며 언젠가 우리의 자유를 되찾는 데 결정적인 역할을 할 것입니다."
 DEN_resistance_dynamic_modifier_improved: "$DEN_resistance_dynamic_modifier$"
 DEN_resistance_dynamic_modifier_improved_desc: "$DEN_resistance_dynamic_modifier_desc$"
 DEN_occupation_laws_dynamic_modifier: "점령법"
 DEN_occupation_laws_dynamic_modifier_desc: "우리의 [?DEN.DEN_overlord_nation.GetAdjective] 상전은 우리가 그들의 전쟁을 돕도록 임무를 부과했으며, 우리가 따르도록 보장하기 위해 여러 법률을 강요했습니다."
 DEN_securing_sweden_ns: "[SWE.GetNameDef] 확보"
 DEN_securing_sweden_ns_desc: "스웨덴인들은 한때 칼마르 동맹의 일원으로서 덴마크의 지배를 받았습니다. 이제 스웨덴을 우리 왕국에 다시 통합할 때가 왔습니다. 우리 군은 이날을 위해 준비하고 적대적인 스웨덴 군대와 싸워 파괴하기 위해 부지런히 훈련했습니다."
 DEN_securing_norway_ns: "[NOR.GetNameDef] 확보"
 DEN_securing_norway_ns_desc: "노르웨이인들은 수백 년 동안 우리 왕국의 일부였습니다. 이제 노르웨이를 다시 한번 [DEN.GetNameDefCap]에 통합할 때가 왔습니다. 우리 군은 이날을 위해 준비하고 적대적인 노르웨이 군대와 싸워 파괴하기 위해 부지런히 훈련했습니다."
 DEN_securing_finland_ns: "[FIN.GetNameDef] 확보"
 DEN_securing_finland_ns_desc: "우리가 그들에 대해 직접적인 권력을 행사한 적은 없지만, 핀란드인들은 칼마르 동맹 하에서 우리에게 복종했습니다. 이제 핀란드를 덴마크의 직접적인 통치하에 둘 때입니다. 우리 군은 이날을 위해 준비하고 적대적인 핀란드 군대와 싸워 파괴하기 위해 부지런히 훈련했습니다."
 DEN_foreign_influence_ns: "외국 여론 개입"
 DEN_fascist_propaganda_ns: "파시스트 선전"
 DEN_fascist_propaganda_ns_desc: "기만적이고 부정직한 파시스트들이 우리 정부에 대한 악의적인 소문을 퍼뜨려 우리의 통치를 약화시키려 하고 있습니다."
 DEN_communist_propaganda_ns: "공산주의자 선전"
 DEN_communist_propaganda_ns_desc: "기만적이고 부정직한 공산주의자들이 우리 정부에 대한 악의적인 소문을 퍼뜨려 우리의 통치를 약화시키려 하고 있습니다."
 DEN_monarchist_discontent_ns: "왕정주의자 불만"
 DEN_monarchist_discontent_ns_desc: "왕이라는 낡은 상징 뒤에 집결하는 애국 운동이 시작되었습니다. 그들은 국민의, 국민에 의한, 국민을 위한 우리 정부에 불만을 품고 있으며, 왕이 직접 권력을 잡는 것을 차라리 보고 싶어 합니다."
 DEN_haeren_dynamic_modifier: "헤렌"
 DEN_haeren_dynamic_modifier_desc: "덴마크는 과거 스칸디나비아를 지배했으며 이 지역의 패권국이었습니다. 우리 군대는 발트해 지역을 거침없이 행군했습니다. 현재 육군은 과거의 그림자에 불과하지만, 다시 한번 국경과 국민을 보호하기 위해 힘과 군사력을 키울 수 있습니다."
 DEN_haeren_dynamic_modifier_improved: "$DEN_haeren_dynamic_modifier$"
 DEN_haeren_dynamic_modifier_improved_desc: "덴마크는 과거 스칸디나비아를 지배했으며 이 지역의 패권국이었습니다. 우리 군대는 발트해 지역을 거침없이 행군했습니다. 육군은 과거의 힘을 일부 되찾았으며, 옛 영광을 되찾기 위한 첫걸음을 내디뎠습니다."
 DEN_haeren_dynamic_modifier_max_improved: "$DEN_haeren_dynamic_modifier$"
 DEN_haeren_dynamic_modifier_max_improved_desc: "덴마크는 과거 스칸디나비아를 지배했으며 이 지역의 패권국이었습니다. 우리 군대는 발트해 지역을 거침없이 행군했습니다. 우리 군대는 다시 한번 경외와 두려움의 대상이 되었습니다! 우리는 군의 힘을 재건했으며, 어떤 위협에도 맞설 준비가 되었습니다."
 DEN_sovaernet_dynamic_modifier: "쇠베르네트"
 DEN_sovaernet_dynamic_modifier_desc: "덴마크는 한때 발트해의 강대국으로서 막강한 함대로 바다를 지배했으며, 그 이전부터 오랜 항해의 역사를 가지고 있었습니다. 바이킹은 공포를 퍼뜨리고 땅을 정복하기 위해 멀리까지 항해했습니다. 투지와 결단력으로 해군을 재건하여 다시 한번 바다를 지배할 수 있습니다."
 DEN_sovaernet_dynamic_modifier_improved: "$DEN_sovaernet_dynamic_modifier$"
 DEN_sovaernet_dynamic_modifier_improved_desc: "덴마크는 한때 발트해의 강대국으로서 막강한 함대로 바다를 지배했으며, 그 이전부터 오랜 항해의 역사를 가지고 있었습니다. 바이킹은 공포를 퍼뜨리고 땅을 정복하기 위해 멀리까지 항해했습니다. 아직 많은 과제가 남아있지만, 해군은 과거의 영광과 힘을 상당 부분 회복했습니다."
 DEN_sovaernet_dynamic_modifier_max_improved: "$DEN_sovaernet_dynamic_modifier$"
 DEN_sovaernet_dynamic_modifier_max_improved_desc: "덴마크는 한때 발트해의 강대국으로서 막강한 함대로 바다를 지배했으며, 그 이전부터 오랜 항해의 역사를 가지고 있었습니다. 바이킹은 공포를 퍼뜨리고 땅을 정복하기 위해 멀리까지 항해했습니다. 우리는 해군을 증강했으며, 다시 한번 출항하여 바다를 지배할 태세를 갖추었습니다."
 DEN_flyvevabnet_dynamic_modifier: "플뤼베보브네트"
 DEN_flyvevabnet_dynamic_modifier_desc: "공중전은 가장 새로운 전쟁 방식이며 현대 군대의 기준입니다. 덴마크군의 최신 군종인 플뤼베보브네트의 창설로, 우리는 이제 무시할 수 없는 현대적인 군사력으로 거듭났습니다."
