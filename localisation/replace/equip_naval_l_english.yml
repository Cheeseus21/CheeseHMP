 ship_armor_heavycruiser_1_desc:0 "An armor scheme intended to give a cruiser a slight edge when fighting against outdated and lighter cruiser classes."
 ship_armor_heavycruiser_2_desc:0 "A heavier belt intended to allow a cruiser to engage other cruisers with a good deal of protection."
 ship_armor_heavycruiser_3_desc:0 "Copying methods used for armoring battleships, this armor scheme is designed to keep pace with developments in armaments around the world."
 ship_armor_heavycruiser_4_desc:0 "This armor scheme attempts to maximize protection over the areas absolutely needed to keep a ship afloat and in the fight, at the cost of all other areas."