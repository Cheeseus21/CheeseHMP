 ICE_expand_the_fishing_industry: "어업 확장"
 ICE_expand_the_fishing_industry_desc: "어업은 언제나 아이슬란드인의 삶에서 핵심적인 부분이었습니다. 어업은 우리가 가진 주요 천연자원이며, 그 양 또한 풍부합니다. 따라서 우리는 여기에 노력을 집중해야 합니다. 진정한 잠재력이 있는 분야에서 더욱 강해져야 합니다."
 ICE_mineral_prospecting: "광물 탐사"
 ICE_mineral_prospecting_desc: "이론상, 산속에는 천연자원이 숨겨져 있을 수 있습니다. 이를 발굴함으로써, 우리는 아이슬란드의 주요 산업인 어업과 농업에 대한 대안을 제공할 수 있습니다."
 ICE_international_trade: "국제 무역"
 ICE_international_trade_desc: "아이슬란드는 세계 금융 무대에서 더욱 적극적으로 활동해야 합니다. 자유 무역을 수용하고 외국인 투자에 문호를 개방함으로써 더 많은 무역 기회를 창출하고 경제를 더욱 활성화할 수 있습니다."
 ICE_hydroelectric_power: "수력 발전"
 ICE_hydroelectric_power_desc: "이 나라에 또 다른 자원이 있다면, 그것은 바로 물, 즉 강과 온천입니다. 이러한 자원의 활용을 확대하면 국가의 산업 발전에 동력을 공급할 수 있습니다."
 ICE_banking_on_the_future: "미래를 위한 금융업"
 ICE_banking_on_the_future_desc: "금융 부문은 막대한 자원을 필요로 하지 않는 분야 중 하나입니다. 우리가 해야 할 일은 외국 자본을 유치하는 것뿐입니다. 우리 금융 부문에 보조금을 지급하고, 아이슬란드 은행을 투자자들에게 매력적으로 만들기 위해 모든 노력을 기울임으로써, 이 섬을 금융 허브로 만들 수 있으며, 이는 앞으로 몇 년 동안 이익을 가져다줄 것입니다."
 ICE_infiltration: "침투"
 ICE_infiltration_desc: "우리의 망을 넓히고 다른 국가들과 경제를 더욱 통합하는 것은 다른 기회 또한 제공합니다. 전 세계의 주요 인물 및 기업과 접촉을 구축함으로써, 아이슬란드는 모든 종류의 정보를 추출할 수 있는 유리한 위치를 차지하게 될 것입니다."
 ICE_develop_icelandic_shipping: "아이슬란드 해운업 개발"
 ICE_develop_icelandic_shipping_desc: "우리는 대양 한가운데에 위치한 섬나라입니다. 선박 건조에 집중하는 것은 지극히 당연한 선택입니다."
 ICE_heavy_industry: "중공업"
 ICE_heavy_industry_desc: "농업, 어업, 해운업은 과거의 유산입니다. 국가를 미래로 이끌기 위해서는 중공업에 집중해야 합니다. 산업 확장을 통해 아이슬란드는 스모그가 낄지언정 밝은 미래를 맞이할 것입니다."
 ICE_advanced_technology: "첨단 기술"
 ICE_advanced_technology_desc: "이 섬은 작습니다. 거대한 공업 국가들과 동등한 입장에서 경쟁하는 것은 불가능합니다. 우리는 우리만의 틈새시장을 찾아 그곳에서 번영해야 합니다. 경쟁에서 뒤처지지 않고 시작할 수 있는 비교적 새로운 분야, 즉 첨단 기술과 전자공학이야말로 우리가 번영하고 성공할 수 있는 길입니다."
 ICE_reykjavik_dockyards: "레이캬비크 조선소"
 ICE_reykjavik_dockyards_desc: "함대 건설의 첫걸음은 더 현대적이고 수많은 부두를 확보하는 것입니다. 다른 무엇보다도 먼저 국가 자금을 조선 능력 확충에 투입해야 합니다."
 ICE_expand_the_harbour: "항만 확장"
 ICE_expand_the_harbour_desc: "더 많고 더 큰 선박이 섬을 오가기 위해서는 더 큰 항구가 필요합니다. 국가는 경제를 지속적으로 확장하기 위해 레이캬비크 항구 확장에 자금을 지원해야 합니다."
 ICE_local_arms_industry: "자국 군수 산업"
 ICE_local_arms_industry_desc: "자국 내에서 군수품을 생산하면 아군에 보급할 수 있을 뿐만 아니라 국제 시장에 판매할 수도 있습니다. 이는 국방력과 경제력을 동시에 강화하는 것을 의미합니다. 따라서 아이슬란드 군수 산업은 우리 투자의 핵심 중점이 되어야 합니다."
 ICE_infrastructure_development: "사회 기반 시설 개발"
 ICE_infrastructure_development_desc: "사회 기반 시설을 현대화하고 훌륭한 교통 체계를 구축하는 것은 국가 번영의 초석이 될 것입니다."
 ICE_iceland_air: "아이슬란드 항공"
 ICE_iceland_air_desc: "오늘날 섬이라는 것이 세상과 단절됨을 의미하지는 않습니다. 현대적인 항공기를 통해 우리는 유럽 대륙과 아메리카 대륙 모두에 더 가까워질 수 있습니다. 하늘은 내일의 항로입니다."
 ICE_allied_weapons_seller_trigger: "§Y연합국§! 또는 §Y중립국§! 국가"
 ICE_expand_the_civilian_fleet: "민간 함대 확장"
 ICE_expand_the_civilian_fleet_desc: "강력한 민간 함대는 해군 전통을 계승하고 경제에 활력을 불어넣는 이중의 이점을 가집니다. 상선단은 평시에는 경제를 이끌고, 전시에는 해군에 필요한 숙련된 선원을 배출할 것입니다."
 ICE_industrial_research_school: "산업 연구 학교"
 ICE_industrial_research_school_desc: "대학은 큰 성공을 거두었습니다. 국가는 이 성공을 발판 삼아 산업 발전에 중점을 둔 고등 교육 기관을 설립해야 합니다. 이를 통해 우리에게 필요한 기술 인력을 확보할 수 있을 것입니다."
 ICE_hrafninn_flygur: "흐라프닌 플뤼귀르"
 ICE_hrafninn_flygur_desc: "까마귀처럼, 우리는 하늘을 지배할 것입니다. 아이슬란드는 전 세계적으로 항공기 산업과 선도적인 항공 기술의 대명사가 될 것입니다."
 ICE_agricultural_expansion: "농업 확장"
 ICE_agricultural_expansion_desc: "아이슬란드 농업을 현대화하기 위해 많은 개선이 이루어질 수 있습니다. 현대 기술과 천연 온천을 통한 손쉬운 난방을 활용하면 농업 생산량을 증대시킬 수 있으며, 확보된 토지와 노동력은 다른 용도로 전환할 수 있습니다."
 ICE_off_shore_oil_drilling: "해상 석유 시추"
 ICE_off_shore_oil_drilling_desc: "석유는 점차 핵심 자원으로 부상하고 있습니다. 현대 해군은 막대한 양의 석유를 소비합니다. 섬 주변 해저에 석유가 매장되어 있을 가능성이 있습니다. 이는 고위험 고수익의 선택지이지만, 석유의 존재 여부와 채굴 가능성을 조사해 볼 가치는 충분합니다."
 off_shore_drilling_tt: "§Y아이슬란드§! 주변에서 §Y석유를 시추§!하는 결정을 잠금 해제합니다."




 ICE_the_kingdom_of_iceland: "아이슬란드 왕국"
 ICE_the_kingdom_of_iceland_desc: "이 나라는 독립을 향해 먼 길을 걸어왔습니다. 왕국을 세우는 것은 자유를 향한 마지막 단계로 여겨져야 합니다. 이제 우리는 덴마크와 국왕과 외교 정책만을 공유하고 있습니다. 점차 이 유대감은 약화되어 형식적인 것이 될 수 있습니다."
 ICE_united_we_stand: "단결하여 맞서리라"
 ICE_united_we_stand_desc: "대전쟁 동안 우리는 고립되었습니다. 덴마크는 중립이었고, 아이슬란드는 모든 시장에 대한 접근성을 잃어 고통받았습니다. 덴마크는 재무장하고 있으며, 필요하다면 그들을 도울 준비를 해야 합니다. 이번에 아이슬란드는 세계에 족적을 남길 것입니다."
 ICE_declare_absolute_neutrality: "절대 중립 선포"
 ICE_declare_absolute_neutrality_desc: "덴마크에 무슨 일이 일어나든, 아이슬란드는 유럽 전쟁에 휘말리지 않기 위해 모든 힘을 다해야 합니다. 절대 중립을 선포함으로써, 우리는 우리의 섬이 어떤 일에도 끌려 들어가지 않을 것임을 모두에게 분명히 합니다."
 ICE_declare_absolute_neutrality_tt: "§Y[ROOT.OVERLORD.GetNameDef]§!이(가) 선전포고를 당하면 §Y[ROOT.GetNameDef]§!은(는) 독립합니다"
 ICE_joint_shipbuilding_programme: "합동 조선 계획"
 ICE_joint_shipbuilding_programme_desc: "덴마크를 돕는 최선의 방법은 해상에서입니다. 우리는 함께 북해를 보호할 수 있습니다. 그러기 위해서는 함선이 필요하므로, 함대를 창설하기 위한 공동의 노력은 우리의 군사 협력 전략을 구축하는 데 있어 자연스러운 단계입니다. "
 ICE_research_cooperation_tt: "공동 연구 계획"
 ICE_overlord_research_cooperation_tt: "아이슬란드 공동 연구 계획"
 ICE_royal_marines: "왕립 해병대"
 ICE_royal_marines_desc: "아이슬란드의 군대는 결코 크지 않을 것입니다. 하지만 우리는 전문화할 수 있으며, 해병대는 섬나라에게 명백한 선택지입니다. 해병대를 창설하고 훈련함으로써, 우리는 필요할 때마다 배치할 수 있는 유연한 병력을 얻게 됩니다."
 ICE_the_icelandic_police_force: "아이슬란드 경찰"
 ICE_the_icelandic_police_force_desc: "아이슬란드의 군대는 결코 매우 크지 않을 것입니다. 하지만 대안으로, 국가 경찰의 임무를 확장하여 침공 방어도 포함시킬 수 있습니다. 그렇게 하면 우리가 가진 제한된 인력을 더 효율적으로 사용하고, 섬의 방어를 더 잘 준비할 수 있습니다"
 ICE_infrastructure_projects: "기반시설 사업"
 ICE_infrastructure_projects_desc: "이 나라가 강해지려면, 가장 먼저 해야 할 일은 기반시설을 건설하는 것입니다. 좋은 기반시설은 모든 종류의 산업 확장의 기초입니다."
 ICE_engineering_projects: "공학 사업"
 ICE_engineering_projects_desc: "섬이 강해지려면 개발이 필요합니다. 대규모 공학 사업은 일자리를 창출하고, 아이슬란드 산업 성장의 기반을 마련할 것입니다."
 ICE_patrolling_the_atlantic: "대서양 순찰"
 ICE_patrolling_the_atlantic_desc: "우리 상선을 보호하려면, 원양 호위함이 필요합니다. 우리는 덴마크와 협력하여 새로운 모델을 설계해야 합니다."
 ICE_joint_military_training: "합동 군사 훈련"
 ICE_joint_military_training_desc: "우리 섬에는 현대전에서 군대를 제대로 훈련시킬 경험이 충분하지 않습니다. 따라서, 덴마크와 협력하는 것이 우리와 같은 작은 섬에게는 최선의 접근 방식입니다."
 ICE_industrial_cooperation: "산업 협력"
 ICE_industrial_cooperation_desc: "덴마크 산업가들을 아이슬란드에 자회사를 설립하도록 초대하고, 그 대가로 세금 면제 등을 제공하면 이곳에 일자리를 창출할 수 있습니다. 이는 또한 이 섬의 산업화에 절실히 필요한 활력을 불어넣을 것입니다. 덴마크의 도움으로 우리는 이 나라를 발전시킬 수 있습니다."
 ICE_gardhur_airfield: "가르뒤르 비행장"
 ICE_gardhur_airfield_desc: "항공기는 현대 기반시설의 실질적인 일부가 되고 있습니다. 아이슬란드는 뒤처져서는 안 됩니다. 수도 근처의 비행장은 아이슬란드를 미래로 도약시키는 열쇠가 될 것입니다."
 ICE_the_merchant_fleet: "상선단"
 ICE_the_merchant_fleet: 
 ICE_the_merchant_fleet_desc: "한때 선박은 이 나라를 세우는 데 핵심적인 부분이었습니다. 미래에도 선박은 중요한 역할을 할 것입니다. 강력한 상선단은 미래 아이슬란드 경제의 핵심이 될 것입니다."
 ICE_not_standing_idly_by: "수수방관하지 않으리"
 ICE_not_standing_idly_by_desc: "우리가 원하든 원치 않든 전쟁이 다가오고 있습니다. 섬을 지킬 기회를 얻으려면 국가를 무장시켜야 합니다. 죽느냐 사느냐의 문제이며, 이는 확실합니다."
 ICE_expand_industrial_complexes: "산업 단지 확장"
 ICE_expand_industrial_complexes_desc: "우리의 군수 산업은 저개발되고 제대로 활용되지 못하고 있어 유럽의 다른 강대국들에 비해 크게 뒤처져 있습니다. 만약 군수 산업 조직을 확장하고 보조금을 지급하는 데 막대한 투자를 하지 않는다면, 우리 산업은 결코 따라잡지 못할 수도 있습니다."
 ICE_political_unity: "정치적 통합"
 ICE_political_unity_desc: "위험한 시기에는 국가가 하나로 뭉치는 것이 특히 중요합니다. 우리는 정치적 차이를 제쳐두고 [ROOT.GetName]이(가) 전쟁에 휘말리지 않도록 모든 조치를 취해야 합니다."
 ICE_anglo_icelandic_relations: "영국-아이슬란드 관계"
 ICE_anglo_icelandic_relations_desc: "[ENG.GetNameDefCap]은(는) 미래의 무역 파트너로서 최선의 선택일 가능성이 높습니다. 어떤 경우든 [ENG.GetAdjective]을(를) 적대하는 것은 우리나라에 심각한 해를 끼치고, 심지어는 위험할 수도 있습니다. 따라서 우리는 바다 건너 이웃과 좋은 관계를 유지하기 위해 최선을 다해야 합니다."
 ICE_anglo_icelandic_relations_tt: "중점 §Y어업 확장§! 완료 시:"
 ICE_american_protection: "미국의 보호"
 ICE_american_protection_desc: "[GetAmericanProtectionText]"
 ICE_american_protection_desc_standard: "전운이 감돌고 있으며, 우리는 홀로 서기에는 너무 작습니다. [USA.GetNameDefCap]이(가) 우리를 보호할 수 있습니다. 우리는 [USA.GetAdjective] 정부에 연락하여 아이슬란드 보호를 위해 이곳에 군대를 주둔시킬 것을 제안해야 합니다. 이는 독립으로 가는 길에서 한 걸음 물러서는 것이지만, 일시적인 후퇴일 뿐입니다. 침략당하는 것은 더 끔찍할 것입니다."
 ICE_american_protection_desc_british_subject: "[ENG.GetNameDefCap]은(는) 이 전쟁으로 인해 큰 압박을 받고 있습니다. 만약 적대 세력이 침공하기로 결정한다면, 그들은 우리를 보호하지 못할 수도 있습니다. 우리는 [USA.GetAdjective] 정부에 접근하여 아이슬란드 보호 임무를 인계받을 것을 제안해야 합니다."
 ICE_american_protection_tt: "§Y[ROOT.GetName]§!이(가) §Y[USA.GetNameDef]§!의 괴뢰국이 됩니다."
 ICE_fighting_as_equals: "대등한 전투"
 ICE_fighting_as_equals_desc: "우리는 함께 전쟁을 치르고 있습니다. 아이슬란드는 제 몫 이상을 해내고 있습니다. 이제 덴마크는 아이슬란드가 더 이상 종속국이 아니라 이 동맹의 동등한 파트너임을 받아들여야 할 때입니다. 아이슬란드를 독립 국가로 공식 선포할 때입니다."
 ICE_fighting_as_equals_tt: "§Y[ROOT.getName]§!이(가) 독립을 선언합니다"
 ICE_expanding_the_university_of_reykjavik: "레이캬비크 대학 확장"
 ICE_expanding_the_university_of_reykjavik_desc: "지식은 핵심입니다. 국가가 세계를 앞서 나가려면, 우리의 노력을 집중해야 합니다. 레이캬비크 대학의 자금 지원을 늘림으로써 우리는 미래 성장을 위한 발판을 마련합니다."
 ICE_trade_relations: "무역 관계"
 ICE_trade_relations_desc: "작은 국가는 필요한 모든 것을 생산할 수 없습니다. 하지만 전 세계 국가들과 좋은 관계를 유지하고, 유럽과 북미 사이의 전략적 위치를 활용함으로써, 아이슬란드는 금융 및 무역의 중심지가 되기에 완벽한 위치에 있습니다. 이러한 연결망을 최대한 활용하면 국가가 절실히 필요로 하는 장비를 더 쉽게 조달할 수 있을 것입니다."
 ICE_keflavik_airbase: "케플라비크 공군기지"
 ICE_keflavik_airbase_desc: "미국인들은 대서양을 더 잘 순찰하기 위해 더 큰 공군기지를 건설하기를 원합니다. 이는 우리나라를 더 강하게 만들 것이므로 승인해야 합니다."
 ICE_modernizing_the_island: "섬의 현대화"
 ICE_modernizing_the_island_desc: "새로운 이론들을 실행에 옮겨야 합니다. 경제는 개혁이 필요합니다. 지금이 바로 이러한 변화를 추진할 때입니다."
 ICE_compensation: "보상"
 ICE_compensation_desc: "우리는 덴마크와 전 세계에 우리가 무시할 수 없는 국가임을 증명했습니다. 우리는 최근과 수 세기에 걸쳐 희생을 치렀습니다. 대서양에 위치한 아이슬란드는 덴마크 왕령의 섬들을 보호하기에 좋은 위치에 있습니다. 이들의 보호를 우리에게 넘김으로써, 덴마크는 더 강력한 파트너를 얻고 핵심 영토 보호에 더 집중할 수 있을 것입니다."
 ICE_republicanism: "공화주의"
 ICE_republicanism_desc: "아이슬란드에는 왕이 필요 없습니다. 섭정 체제는 왕 없이도 우리가 잘 해낼 수 있음을 보여주었습니다. 이제 이 중세 시대의 제도를 없애고 공화국을 준비할 때입니다."
 ICE_american_investments: "미국의 투자"
 ICE_american_investments_desc: "수천 명의 미군이 섬에 주둔하는 것 자체만으로도 경제에 이롭습니다. 하지만 이는 또한 미국 기업들이 자회사를 설립하고 아이슬란드 기업에 투자하는 데 더 많은 관심을 갖게 된다는 것을 의미합니다. 결론적으로, 우리가 상황을 잘 이용한다면 이 상황은 우리에게 매우 유익할 수 있습니다."
 ICE_american_soldiers: "미군 주둔 허용"
 ICE_american_soldiers_desc: "미국은 자신들이 가장 소중히 여기는 가치를 보호하기 위해 영향력을 널리 확장하고자 합니다. 우리는 미군이 우리 영토에 자유롭게 주둔하는 것을 허용할 수 있으며, 그들 중 일부는 이곳에 남아 우리 군대를 강화할 수 있습니다."
 ICE_iceland_defense_force: "아이슬란드 국방군"
 ICE_iceland_defense_force_desc: "미국의 도움으로 아이슬란드는 현대적인 군대를 창설할 수 있습니다. 그들은 우리 병력을 훈련시킬 지식, 경험, 인력을 갖추고 있습니다. 그들과 함께 군대를 창설하면 우리 부대를 진정한 정예 부대로 만들 잠재력이 있습니다."
 ICE_state_owned_enterprises: "국영 기업"
 ICE_state_owned_enterprises_desc: "이제 우리 섬이 스스로를 제대로 부양할 수 있게 되었으니, 노동자를 유치하고 경제를 개선하며 국가 기구의 효율성을 높일 수 있는 산업을 설립하는 것에 대해 생각할 때입니다."
 
 ICE_not_our_king: "우리의 왕이 아니다"
 ICE_not_our_king_desc: "아이슬란드 왕국이라니, 말도 안 되는 소리입니다. 아이슬란드에는 왕이 필요 없으며, 특히 덴마크 왕은 더욱 그렇습니다. 미래를 향해 나아가는 지금, 과거와의 완전한 단절을 위해 아이슬란드인들 사이에서 지지를 구축하기 시작할 때입니다."
 ICE_expand_the_industrial_base: "산업 기반 확장"
 ICE_expand_the_industrial_base_desc: "종주국의 공산품에 대한 의존을 없앰으로써, 우리는 더 강력한 산업과 더불어 더 강력한 노동 계급을 얻게 됩니다. 혁명은 올바른 도구 없이는 일어날 수 없으며, 종주국에 대한 의존을 없앰으로써 이 나라는 혁명을 이끌 국내 생산 무기와 새로운 인재를 포함하여 필요한 것을 얻을 수 있습니다."
 ICE_anti_capitalist_propaganda: "반자본주의 선전"
 ICE_anti_capitalist_propaganda_desc: "자본주의가 우리를 위해 해준 것이 무엇입니까? 물론, 국가에 약간의 번영을 가져다주었을지는 모르지만, 이 나라가 현재 처한 위기로 우리를 이끌기도 했습니다. 자유 민주주의에 대한 과도한 의존과 우리에게 부스러기만 주려는 종주국의 태도를 볼 때, 미래는 다른 곳에 있어야 한다는 것이 분명합니다."
 ICE_international_relations: "국제 관계"
 ICE_international_relations_desc: "우리가 나아갈 길은 어려울 것이며, 이는 확실합니다. 만약 우리가 그 길을 혼자 걷는다면, 더욱 그러할 것입니다. 따라서, 우리는 새로운 동맹을 찾아야 합니다. 공산주의 인터내셔널은 우리가 새로운 동맹을 모색할 수 있는 곳 중 하나이지만, 다른 선택지도 있습니다. 중요한 것은 적극적으로 새로운 길을 개척하는 것이며, 우리는 이를 즉시 시작해야 합니다."
 ICE_rally_the_workers_of_reykjavik: "레이캬비크 노동자 집결"
 ICE_rally_the_workers_of_reykjavik_desc: "아이슬란드에는 이렇다 할 군대가 없지만, 수도의 노동자들은 분명 무시할 수 없는 세력이 될 수 있습니다. 만약 노동자들이 체제에 맞서 봉기한다면, 그들을 막을 수 있는 것은 거의 없을 것이므로, 그들을 대의에 동참시키는 것은 무엇보다 중요합니다."
 ICE_completion_break_with_the_crown_tt: "§Y$ICE_break_with_the_crown$§! 중점 완료 시:"
 ICE_prepare_for_the_revolution: "혁명 준비"
 ICE_prepare_for_the_revolution_desc: "성공적인 혁명은 저절로 일어나지 않습니다. 꼼꼼하게 준비해야 합니다. 씨앗을 심고 물을 주어야 합니다. 인민은 언제 봉기해야 하는지 알아야 하며, 혁명가들은 그들이 봉기할 때 그들을 이끌어야 합니다. 포스터를 인쇄하고, 전문 혁명가들을 모집하고 훈련시키며, 무기를 적절히 숨기고, 지도자들은 통제권을 장악할 준비가 되어 있어야 합니다."
 ICE_state_visits: "국빈 방문"
 ICE_state_visits_desc: "파시스트가 이끄는 국가들이 현재 세계의 변화를 주도하고 있다는 점은 부인할 수 없습니다. 아이슬란드가 변화하려면, 아마도 그들에게서 배울 점이 있을 것입니다. 가능한 한 빨리 공식 관계를 수립해야 하며, 모든 협력 기회를 즉시 모색해야 합니다."
 ICE_general_strike: "총파업"
 ICE_general_strike_desc: "전 세계, 특히 사악한 덴마크 왕에게 아이슬란드 노동자들이 굳건하고 단결되어 있음을 보여줍시다. 모든 산업 활동과 섬을 오가는 모든 해운을 중단시키는 대규모 파업은 괴뢰 정부에 큰 타격을 주고, 진정한 힘이 어디에 있는지 사람들에게 보여줄 것입니다."
 ICE_general_strike_tt: "\n§Y총파업§!이 끝나면:"
 ICE_organize_a_march: "행진 조직"
 ICE_organize_a_march_desc: "너무 오랫동안 인민은 외국의 종주국에 의해 노예가 되어 왔습니다. 로마 진군과 같은 수도를 향한 민족주의적 행진은 우리의 강인한 바이킹 과거를 상기시키는 역할을 할 것입니다. 자유를 사랑하는 모든 아이슬란드인이 참여하게 할 수 있다면, 우리는 정부에 아이슬란드 인민이 강하고, 수가 많으며, 단결되어 있음을 보여줄 수 있습니다! 함께, 우리는 더 위대한 미래를 만들 수 있습니다!"
 ICE_break_with_the_crown: "왕실과의 단절"
 ICE_break_with_the_crown_desc: "덴마크 왕실과 공식적으로 결별할 때가 왔습니다. 우리는 덴마크의 국왕과 그의 퇴폐적인 내각을 규탄하고, 아이슬란드가 다시 한번 독립 국가임을 선언하여, 꿈과 염원을 향한 독자적인 길을 걸을 수 있도록 해야 합니다."
 ICE_break_with_the_crown_tt: "[ROOT.GetNameDefCap]이(가) 독립합니다."
 ICE_break_with_the_crown_workers_tt: "중점 §Y$ICE_rally_the_workers_of_reykjavik$§! 완료 시:"
 ICE_break_with_the_crown_revolution_tt: "중점 §Y$ICE_prepare_for_the_revolution$§! 완료 시:"
 ICE_embrace_the_workers_revolution: "노동자 혁명 수용"
 ICE_embrace_the_workers_revolution_desc: "노동자들의 지지가 이 변화를 가능하게 했습니다. 따라서 신디케이트, 노동자, 조합이 새로운 국가에서 주도적인 위치를 차지하는 것은 당연한 일입니다. 노동자 혁명의 지도자들은 국가를 새로운 고지로 이끌고, 그 어떤 군주도 이룰 수 없었던 위대한 진보를 가져올 수 있습니다."
 ICE_remove_dissent_in_the_working_class_tt: "§Y$ICE_dissent_in_the_working_class$§! 제거 "
 ICE_state_corporatism: "국가 조합주의"
 ICE_state_corporatism_desc: "이제 나약한 덴마크의 멍에의 마지막 잔재를 벗어던지고 새로운 국가를 건설할 때입니다. 우리 국가의 안전을 보장하는 최선의 방법은 강력한 지도자를 중심으로 단결하여, 노조 지도자, 산업 거물, 당이 모든 아이슬란드인의 공동선을 위해 협력하는 것입니다. 국가는 산업가들을 지원하고, 그들은 그 대가로 국가를 지원할 것입니다."
 ICE_international_brigades: "국제 여단"
 ICE_international_brigades_desc: "이곳에서 승리했다고 해서 억압에 대한 투쟁이 끝나서는 안 됩니다. 그렇지 않으면 우리의 승리는 일시적인 것에 그칠 위험이 있습니다. [ROOT.GetName]의 아들딸들은 필요한 곳이라면 어디든 도울 준비가 되어 있어야 하며, 국가는 필요한 새 법안을 시행하고 필요한 무기와 장비를 공급함으로써 이를 최대한 지원해야 합니다."
 ICE_state_owned_industry: "국영 산업"
 ICE_state_owned_industry_desc: "[ROOT.GetNameDef]와(과) 같은 작은 국가는 필요한 물품을 생산하기 위해 자본가에게 의존할 수 없습니다. 효율성을 극대화하고 가장 필요한 물품이 생산되도록 보장하기 위해, 국가는 산업에 개입하여 통제권을 장악해야 합니다. 더 이상 국가가 생존을 위해 외국인 투자에 의존해서는 안 됩니다. 아이슬란드 국가는 자국민과 군대를 보살필 것입니다."
 ICE_organize_the_greyshirts: "회색셔츠단 조직"
 ICE_organize_the_greyshirts_desc: "어릴 때부터 훈련된 잘 무장된 민병대는 젊은이들을 양성하고 우리의 새로운 세계에 맞게 그들을 빚어내는 유용한 도구가 될 수 있습니다. 또한, 준군사 훈련은 군대의 역량을 강화하는 것을 의미하며, 이는 정당한 우리의 것을 되찾을 때 유용할 수 있습니다."
 ICE_research_cooperation: "연구 협력"
 ICE_research_cooperation_desc: "우리와 동맹을 맺은 강대국들과의 협력을 통해 미래에 무기 측면에서 우리에게 이점을 가져다줄 기술을 더 잘 개발할 수 있습니다. 우리는 소중한 파트너들로부터 배우는 동시에, 남의 눈을 피해 멀리 떨어진 좋고 외딴 시험장을 제공할 수 있습니다."
 ICE_infiltrating_the_british_isles: "브리튼 제도 침투"
 ICE_infiltrating_the_british_isles_desc: "혁명의 불꽃이 질식하여 꺼지지 않으려면 반드시 퍼져나가야 합니다. 해방의 명백한 목표는 브리튼 제도의 억압받는 노동자들입니다.[ROOT.GetNameDefCap]은(는) 억압받는 지역의 노동자들이 제국주의 및 자본주의 지배자들에 맞서 봉기하도록 지원할 것입니다. 함께, 우리는 혁명적 이상을 평범한 노동자의 현실로 만들 수 있습니다."
 ICE_infiltrating_the_british_isles_tt: "웨일스, 스코틀랜드, 북아일랜드에서 공산주의 봉기를 시작하는 §Y디시전§! 잠금 해제."
 ICE_transformation_of_nature: "자연의 변혁"
 ICE_transformation_of_nature_desc: "전기는 산업화의 핵심입니다. 아이슬란드의 자연은 시민들과 마찬가지로 국가에 봉사해야 합니다. 강과 폭포는 댐으로, 돌은 채석장으로, 온천은 난방에 사용될 수 있습니다. 진보를 향한 우리의 행진을 그 무엇도 막을 수 없습니다."
 ICE_the_viking_spirit: "바이킹 정신"
 ICE_the_viking_spirit_desc: "두려움 없고 치명적인 것이 옛 바이킹과 관련된 단어들이었습니다. 그들은 저 너머에 무엇이 있는지 모른 채 대양을 건넜고, 강한 자만이 성공했습니다. 오늘날 아이슬란드인들은 두려움 없고 대담해야 합니다. 오직 대담함과 용기를 통해서만 국가가 과거의 영광을 되찾고 다시 한번 북해를 지배할 수 있을 것이기 때문입니다."
 ICE_viking_spirit_tt: "§Y바이킹 정신 개선§! 디시전 잠금 해제"
 ICE_recruiting_international_workers: "국제 노동자 모집"
 ICE_recruiting_international_workers_desc: "우리나라를 공산주의자와 사회주의자 모두에게 모범적인 사회로 만들고, 혁명의 불꽃을 어느 때보다 밝게 타오르게 함으로써, 우리는 소비에트 국가 초창기처럼 국제적인 혁명가들을 끌어들일 수 있습니다. 우리는 출신지에 상관없이 노동자들과 혁명 전사들에게 [ROOT.GetName]이(가) 횃불을 들고 있으며, 그들이 속한 곳이 바로 여기라는 것을 보여주어야 합니다."
 ICE_international_research_community: "국제 연구 공동체"
 ICE_international_research_community_desc: "코민테른을 통해서든, 전 세계 국가들과의 다른 협력 프로젝트를 통해서든, 다른 이들로부터 배울 것이 많습니다. 국제 사회와 교류함으로써 [ROOT.GetName]은(는) 새로운 수준의 위대함에 도달할 것입니다. 집단주의야말로 진보로 가는 유일하고 진정한 길입니다!"
 ICE_international_research_community_tt: "세력에 속하지 않았거나 [ROOT.GetName]와(과) 같은 세력에 속한 모든 공산주의 국가:"
 ICE_reclaiming_the_empire: "제국 수복"
 ICE_reclaiming_the_empire_desc: "그린란드는 한때 아이슬란드에서 온 바이킹들이 정착했던 곳입니다. 이후 노르웨이와 덴마크는 섬에 대한 진정한 권리가 없음에도 불구하고 이를 두고 다투어 왔습니다. 이제 그린란드를 정당한 소유주에게 반환할 것을 요구해야 할 때입니다. 그들이 자신들의 유산과 역사를 조금이라도 소중히 여긴다면, 우리에게 무조건적으로 양도할 것입니다. 영광을 향한 우리의 길을 계속 나아갑시다!"
 ICE_securing_the_north_sea_passage: "북해 항로 확보"
 ICE_securing_the_north_sea_passage_desc: "아이슬란드의 소유여야 할 것을 되찾을 때가 왔습니다. 북해의 셰틀랜드 제도와 페로 제도는 [ROOT.GetNameDef](으)로 드나드는 항로를 통제하는 데 필수적인 열쇠입니다."
 ICE_vinland: "빈란드"
 ICE_vinland_desc: "북대서양 제국이라는 구상은 다름 아닌 아이슬란드 혈통인 레이퓌르 에이릭손이 아메리카를 발견하면서 탄생했습니다. 안타깝게도 바이킹 식민지 빈란드는 사라졌지만, 이제 우리의 오래된 꿈을 현실로 만들 때입니다. 오딘을 위하여!"

 ICE_the_armed_forces_of_iceland: "아이슬란드 국군"
 ICE_the_armed_forces_of_iceland_desc: "전쟁이 아이슬란드에 닥친다면, 아이슬란드는 스스로를 방어할 수 있어야 합니다. 우리는 잠재적인 침략자들을 격퇴할 수 있는 군대를 창설해야 합니다. 작은 섬에 인구도 적지만, 그 위치와 크기 자체가 강점이 될 수 있습니다. 어떤 적도 이곳을 점령하기 위해 대규모 병력을 투입할 수 없을 것이기 때문입니다."
 ICE_an_airbase_in_the_sea: "바다의 공군 기지"
 ICE_an_airbase_in_the_sea_desc: "섬 상공과 주변 해역의 제공권을 장악함으로써, 어떤 적도 대규모 병력으로 이곳에 상륙할 수 없도록 보장할 수 있습니다. 설령 상륙하더라도, 공군이 적의 보급을 항상 차단할 수 있습니다. 따라서 아이슬란드 국군을 건설하는 가장 자연스러운 방법은 현대적인 공군을 창설하는 것입니다."
 ICE_a_naval_hub_in_the_atlantic: "대서양의 해군 거점"
 ICE_a_naval_hub_in_the_atlantic_desc: "아이슬란드는 섬입니다. 함대를 국군의 주력으로 삼는 것은 지극히 합리적입니다. 함대는 적이 우리 해안에 도달하는 것을 막고, 동맹국이 제해권을 장악하는 것을 지원하며, 원정군을 필요한 곳 어디든 수송할 수 있습니다. 강력한 해군을 건설하는 것이 아이슬란드에게는 명백한 선택입니다."
 ICE_mine_iceland: "아이슬란드 기뢰 부설"
 ICE_mine_iceland_desc: "해상 항로 측면에서, 아이슬란드는 북쪽을 제외한 모든 방향에서 치명적으로 노출되어 있습니다. 우리 섬 주민들의 안전을 제대로 보장하기 위해, 우리는 전면전 발생 시 아이슬란드 해역에 광범위하게 기뢰를 부설할 준비를 해야 합니다."
 ICE_flying_boats: "비행정"
 ICE_flying_boats_desc: "해상에서 적과 경쟁할 수 없다면, 우리는 차선책인 하늘에 의지할 것입니다. 우리가 제공권을 장악한다면, 적의 함선은 즉시 격침될 것이므로 쓸모가 없어질 것이기 때문입니다."
 ICE_modernizing_the_coast_guard: "해안 경비대 현대화"
 ICE_modernizing_the_coast_guard_desc: "아이슬란드 해안 경비대는 오랫동안 우리의 대내외 안보를 담당하는 주력 부대였습니다. 따라서 우리는 그들이 급속한 현대화와 기술 발전에 뒤처지지 않도록 해야 합니다."
 ICE_low_cost_aircrafts: "저비용 항공기"
 ICE_low_cost_aircrafts_desc: "우리에게는 대규모 산업이 없지만, 항공기 생산을 최적화하는 방법을 아는 소수의 인재들이 있습니다. 우리는 그들의 재능을 활용하여, 명백히 취약한 경제 상황 속에서도 공중 군비 경쟁에서 뒤처지지 않도록 해야 합니다."
 ICE_support_equipment: "지원 장비"
 ICE_support_equipment_desc: "육군의 모든 부대와 진압 경찰은 더 강력한 화기, 제대로 된 구급상자, 제압용 무기가 필요합니다. 따라서 우리는 가능한 한 빨리 이에 투자해야 합니다."
 ICE_emergency_conversions: "비상 개조"
 ICE_emergency_conversions_desc: "우리나라는 대형 함선을 건조할 능력은 없지만, 대형 어선, 무역선, 민간 기업 선박은 많이 보유하고 있습니다. 비상시에는 이들 선박에 기관총이나 경포를 장착하여, 대부분의 경쟁 상대와 겨룰 수 있을 만큼 충분히 큰 해군력을 신속하고 효율적으로 창설할 수 있습니다."
 ICE_emergency_conversions_tt: "§Y수송선§!을 §Y구축함§! 또는 §Y순양함§!으로 전환하는 §Y결정§!을 잠금 해제합니다!"
 ICE_enact_conscription: "징병제 실시"
 ICE_enact_conscription_desc: "우리나라의 미래가 점점 더 불투명해짐에 따라, 국방이 최우선 과제가 되었습니다. 사실상 존재하지 않는 우리 국군 문제를 해결하기 위해, 모든 청년을 대상으로 의무 징병제를 시행해야 합니다."
 ICE_a_profesional_army: "육군 전문화"
 ICE_a_profesional_army_desc: "현재 육군은 우리 섬을 제대로 방어하기에는 너무 취약합니다. 이 문제를 해결할 유일한 방법은 우리 육군을 최후의 순간까지 싸울 최고의 정예병으로만 구성하는 것입니다."
 ICE_thungur_hnifur: "Þungur Hnífur"
 ICE_thungur_hnifur_desc: "아이슬란드군은 결코 대규모가 될 수 없습니다. 이를 보완하기 위해, 우리 병력에게 최상의 훈련을 제공하고 강점에 집중하여, 공격 시 강력한 일격을 가할 수 있도록 보장해야 합니다."
 ICE_thungur_hnifur_idea: "정예 부대"
 ICE_civilian_war_duty: "민방위"
 ICE_civilian_war_duty_desc: "전쟁이나 위기가 우리 고향에 닥쳤을 때 시민들이 어떻게 행동해야 하는지 정확히 아는 것이 중요하며, 모든 민간인이 때가 되면 군수, 소방, 배급 지원과 같은 의무를 다할 준비가 되어 있어야 합니다."
 ICE_doctrinal_studies: "교리 연구"
 ICE_doctrinal_studies_desc: "전쟁의 기술은 쉬운 것이 아니며, 모든 국가가 통달할 수 있는 것은 더더욱 아닙니다. 우리는 세계 강대국들을 연구하고, 그들이 어떻게 전쟁을 수행하는지 배워야 합니다."
 ICE_death_from_above: "상공의 죽음"
 ICE_death_from_above_desc: "공중전에서 승리하면, 전쟁에서 승리하며, 빠르게 승리할 것입니다. 공군과 육군 간의 협력을 강화하고, 가능한 모든 곳에서 적 보급선을 차단할 준비가 된 특수 낙하산 연대를 훈련시킨다면 더욱 빠를 것입니다."
 ICE_we_shall_defend_our_island: "우리의 섬을 지키리라"
 ICE_we_shall_defend_our_island_desc: "우리 섬은 우리의 고향이며, 우리만큼 이 섬을 잘 아는 사람은 없습니다. 우리 군대를 산악 전투에 특화시킴으로써, 해안에서 철수하고 적들이 상륙하여 자신감과 안일함에 빠지는 즉시 격멸할 수 있습니다."
 ICE_taking_the_fight_to_our_enemies: "적진으로의 공세"
 ICE_taking_the_fight_to_our_enemies_desc: "바다가 우리를 둘러싸고 있으며, 수 세기 동안 거대한 바다는 우리 민족과 우리의 정체성을 형성해 왔습니다. 이로부터 얻은 지식을 활용하여, 우리는 적들이 가장 예상치 못한 장소에서 적들에게 싸움을 걸 수 있습니다."


#### DENMARK ####
#Economical/Industrial Branch
 DEN_kanslergadeforliget: "칸슬레르가데포를리 지속"
 DEN_kanslergadeforliget_desc: "[ROOT.GetName]에서는 치솟는 실업률과 붕괴하는 농업 부문으로 인해 대공황의 여파가 여전히 느껴지고 있습니다. 우리는 당파를 초월하여 우리가 처한 위기를 해결할 방법에 대한 합의에 도달해야 합니다."
 DEN_devalue_the_krone: "크로네 평가 절하"
 DEN_devalue_the_krone_desc: "크로네를 평가 절하함으로써, 우리 농산물은 국제 시장에서 더 경쟁력을 갖게 될 것이며 수출 기회를 개선하여, 이는 결국 어려움을 겪는 농부들의 부담을 덜어줄 것입니다."
 DEN_remove_economic_crisis_in_730_days_tt: "§Y$DEN_economic_crisis_dynamic_modifier$§! 효과가 730일 후에 제거됩니다"
 war_will_cancel_deal_tt: "§Y양국 간의 전쟁은 이 협정을 파기할 것입니다§!"
 DEN_effects_after_fortify_our_borders_tt: "§Y$DEN_fortify_our_borders$§! 중점 완료:"
 DEN_trade_with_britain: "영국과의 무역"
 DEN_trade_with_britain_desc: "[ENG.GetNameDefCap]은(는) 역사적으로 우리 농산물의 가장 큰 수출 시장이었지만, 대공황 이후 이 무역은 거의 중단되었습니다. 크로네 평가 절하와 함께, 이제 영국에 손을 내밀어 이전의 무역 관계를 재정립할 때입니다."
 DEN_trade_with_germany: "독일과의 무역"
 DEN_trade_with_germany_desc: "[GER.GetNameDefCap]은(는) 역사적으로 우리 농산물을 대량으로 수입했으며, 제1차 세계 대전조차 이를 막지 못했습니다. 그러나 지난 몇 년간 양국 간의 무역은 감소했습니다. 어쩌면 지금이 이 추세를 되돌릴 때일지도 모릅니다!"
 DEN_agricultural_subsidies: "농업 보조금"
 DEN_agricultural_subsidies_desc: "우리 농부들은 부채 위기와 압류로 어려움을 겪고 있습니다. 무력감과 분노가 한동안 그들 사이에서 들끓고 있으며, 방치할 경우 더 위험한 것으로 번질 위험이 있습니다. 우리는 이 상황을 해결하고 농업 부문을 최선을 다해 도와야 합니다."
 DEN_industrial_investments: "산업 투자"
 DEN_industrial_investments_desc: "도시 중심부도 지난 몇 년간의 격변을 피하지 못했습니다. 실업률이 급증하여 기업들이 파산 직전에 놓이거나 완전히 도산하고 있습니다. 산업 부문에 목표가 명확한 지원책을 제공하여 상황을 안정시킬 수 있을 것입니다."
 DEN_support_schleswigian_farmers: "슐레스비 농민 지원"
 DEN_support_schleswigian_farmers_desc: "남부 유틀란트에서 비주류 운동이 성장하고 있으며, 이는 궁극적으로 긴장된 경제 상황과 그들의 집단적 정체성, 즉 독일인인가 덴마크인인가에 대한 마찰로 촉발되었습니다. 이 지역의 경제 부양책을 늘려 이러한 반감을 일부 완화할 수 있을 것입니다."
 DEN_public_works: "공공 사업"
 DEN_public_works_desc: "공공 사업 프로그램을 시행함으로써, 섬들을 연결하는 다리를 건설하여 국가 기반시설을 개선할 수 있을 뿐만 아니라, 새로운 주택 건설 사업을 시작하고 여전히 높은 실업률을 낮출 수 있습니다."
 DEN_fortify_our_borders: "국경 요새화"
 DEN_fortify_our_borders_desc: "유럽 전역에 다시 긴장이 고조되고 있습니다. 대전쟁을 무사히 넘겼지만, 다시 그런 일이 일어나리라는 보장은 없습니다. 최선을 바라면서도 최악의 상황에 대비해야 합니다. 국경과 독립을 수호하는 것이 우리의 최우선 과제입니다!"
 DEN_build_a_modern_dannevirke: "현대적 다네비르케 건설"
 DEN_build_a_modern_dannevirke_desc: "덴마크인들은 수 세기 동안 유럽 본토를 향해 강력한 요새를 건설해왔으며, 그중 가장 유명한 것이 다네비르케입니다. [GER.GetNameDef]이(가) 다시 재무장하며 주변 강대국들을 자극하고 있으므로, 우리는 국경을 보호하기 위해 현대적인 다네비르케를 건설해야 합니다."
 DEN_unlocks_fortification_efforts: "결정 잠금 해제: §Y요새화 작업§!\n\n"
 DEN_refortify_tunestillingen: "투네스틸링겐 재요새화"
 DEN_refortify_tunestillingen_desc: "지난번 유럽이 전쟁에 휩싸였을 때, 우리는 쾨벤하운을 보호하기 위해 일련의 요새인 투네스틸링겐을 건설하여 방어를 준비했습니다. 이 요새들은 그 이후로 황폐해졌지만, 재건하고 현대화함으로써 수도의 안전을 확보할 수 있을 것입니다."
 DEN_secure_our_supply_lines: "보급선 확보"
 DEN_secure_our_supply_lines_desc: "군은 배가 불러야 행군할 수 있다는 말은 수천 년 전과 마찬가지로 오늘날에도 유효합니다. 다행히도 우리는 주요 식량 생산국이며, 군수 체계를 약간 개선하면 부대에 안정적인 보급을 확보할 수 있습니다."
 DEN_fortify_the_islands: "도서 요새화"
 DEN_fortify_the_islands_desc: "덴마크 동부 전역은 수백 개의 섬으로 이루어져 있으며, 우리 해군은 이웃 국가의 훨씬 더 큰 함대로부터 이 모든 섬을 보호하기에는 턱없이 부족합니다. 주요 위치에 해안 요새를 건설함으로써 잠재적인 침략자들을 격퇴할 수 있을 것입니다."
 DEN_unlocks_coastal_fortification_efforts: "결정 잠금 해제: §Y해안 요새화 작업§!\n\n"
 DEN_connect_the_islands: "도서 연결"
 DEN_connect_the_islands_desc: "[ROOT.GetNameDefCap]은(는) 수많은 섬으로 이루어져 있으며, 본토와 연결되는 유일한 지점은 남부 유틀란트에 있습니다. 전국, 특히 섬들 간의 이동을 용이하게 하려면, 우리를 더 가깝게 묶어줄 다리를 건설해야 합니다."
 DEN_expand_institut_for_teoretisk_fysik: "이론물리학 연구소 확장"
 DEN_expand_institut_for_teoretisk_fysik_desc: "이론물리학 연구소는 물리학 분야에서 세계를 선도하는 권위 있는 기관으로, 이론물리학자 닐스 보어가 설립했습니다. 이 기관에 자금을 지원하고 시설을 확장함으로써 우리는 그 결실을 거둘 수 있으며, 잠재적으로 닐스 보어 자신을 우리 대의에 영입할 수도 있을 것입니다..."
 DEN_aalborg_portland_cement_plant: "올보르 포틀랜드 시멘트 공장"
 DEN_aalborg_portland_cement_plant_desc: "덴마크 본토는 천연자원이 부족하지만, 시멘트 생산은 우리가 가진 자산 중 하나입니다. 올보르 포틀랜드 시멘트 공장을 확장함으로써 국내 건설 역량을 확보할 수 있을 것입니다."
 DEN_improve_aalborg_portland_tt: "산업체 §Y$DEN_aalborg_portland$§!이(가) 다음과 같이 개선됩니다.\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10.00%§!\n\n"
 DEN_expand_the_industries: "산업 확장"
 DEN_expand_the_industries_desc: "덴마크는 전통적으로 농업에 의존해 왔으며, 이는 여전히 우리의 가장 큰 수출 품목입니다. 다른 산업을 다각화하고 확장한다면 경제 전반을 강화하고 덴마크 사회가 급격한 변화에 더 잘 견딜 수 있도록 만들 수 있을 것입니다."
 DEN_develop_remote_islands: "결정 잠금 해제: §Y도서 개발§!\n\n"
 DEN_support_the_faroes_industries: "페로 제도 산업 지원"
 DEN_support_the_faroes_industries_desc: "우리가 처한 불확실한 시기에는 페로 제도에 존재하는 소수의 산업을 지원하는 것이 현명한 선택일 수 있습니다. 이를 통해 전략적으로 위치한 이 군도에 대한 우리의 영유권을 부인할 수 없게 만들 것입니다."
 DEN_support_bornholms_industries: "보른홀름 산업 지원"
 DEN_support_bornholms_industries_desc: "보른홀름에는 이렇다 할 천연자원이 부족하지만, 섬의 소규모 산업에 투자하여 모든 이웃 국가에 이 섬의 소유권을 상기시키는 것은 여전히 좋은 방안이 될 수 있습니다."
 DEN_develop_greenland: "그린란드 개발"
 DEN_develop_greenland_desc: "덴마크 본토는 국내 생산에 활용할 만한 천연자원이 부족합니다. 반면, 우리가 영유 중인 그린란드는 자원이 훨씬 풍부하므로, 그린란드에 투자하여 개발한다면 막대한 이익을 얻을 수 있을 것입니다."
 DEN_expand_the_ivittuut_mine: "이비투트 광산 확장"
 DEN_expand_the_ivittuut_mine_desc: "이비투트 광산은 현대 항공기 생산의 핵심 요소인 알루미늄의 유일한 공급원입니다. 이 광산을 확장하면 국내 항공기 생산을 증대하거나 다른 국가로 알루미늄을 수출할 수 있을 것입니다."
 DEN_prospecting_new_sites: "신규 부지 탐사"
 DEN_prospecting_new_sites_desc: "카르수아르숙의 오래된 광산은 고갈되었지만, 쿨리사트 지역에는 다른 광맥이 있습니다. 이곳에 새로운 광산을 열면 그린란드의 산업뿐만 아니라 본국의 수요를 충족하는 데에도 매우 유익할 것입니다."
 DEN_protect_greenland: "그린란드 보호"
 DEN_protect_greenland_desc: "그린란드는 오랫동안 우리 왕국의 일부였으며, 섬에 대한 영유권 주장은 바이킹 시대까지 거슬러 올라갑니다. 이 섬을 잃는 것은 국가적 재앙이자 위신에 큰 손실이 될 것입니다. 섬에 대한 잠재적인 공격을 억제하기 위해 우리는 방어 태세를 강화해야 합니다."
 DEN_danske_stalvalsevaerket: "단스케 스톨발세베르케트"
 DEN_danske_stalvalsevaerket_desc: "산업 부문의 여러 대표자들이 철강 생산량 증대를 위한 운동을 벌여왔습니다. 새로운 공장을 설립한다면 경제에 활력을 불어넣고 철강 생산 자급률을 높일 수 있을 것입니다."
 DEN_reorient_production_lines: "생산 라인 전환"
 DEN_reorient_production_lines_desc: "우리는 곧 더 많은 군사 장비가 필요해질 수 있는 위태로운 상황에 처해 있습니다. 증가하는 군수품 수요에 부응하기 위해, 민간 공장을 군수품 생산으로 전환해야 합니다."
 DEN_strengthen_military_industries: "군수 산업 강화"
 DEN_strengthen_military_industries_desc: "견고한 군수 산업에 투자하는 것은 앞으로 닥쳐올 시대에 매우 중요할 수 있습니다. 국민을 보호하기 위해 무기를 들어야 할 상황에 대비하여 만반의 준비를 갖추어야 합니다."
 DEN_protect_the_faroe_islands: "페로 제도 보호"
 DEN_protect_the_faroe_islands_desc: "세계적 긴장이 고조됨에 따라, 북해는 곧 격렬한 분쟁의 무대가 될 수 있습니다. 페로 제도는 그린란드와 그곳의 수많은 자원에 대한 통제권을 행사하는 데 있어 중요한 연결고리입니다. 이 군도를 잃는 것은 우리에게 치명적일 수 있으므로, 방어 태세를 확보하는 것이 가장 중요합니다."
 DEN_protect_bornholm: "보른홀름 보호"
 DEN_protect_bornholm_desc: "보른홀름은 [SWE.GetNameDef]의 남쪽, [GER.GetNameDef]의 북쪽에 위태롭게 자리 잡고 있으며, 덴마크 본토보다 두 나라에 더 가깝습니다. 우리는 발트해에 전략적으로 위치한 이 섬을 강화하고 지배권을 확보해야 합니다."
#Historical Branch
 DEN_declare_neutrality: "중립 재확인"
 DEN_declare_neutrality_desc: "지난 전쟁 동안의 불개입 정책은 우리에게 큰 이익이 되었고 전쟁의 참상에서 벗어나게 해주었습니다. 중립을 선언하는 것이 우리를 다시 한번 구할 수 있을지도 모릅니다."
 DEN_political_unity: "정치적 통합"
 DEN_political_unity_desc: "초당적으로 협력하고 노력해야만 국가를 안전하게 지킬 수 있습니다. 정치적 차이를 제쳐두는 것이 그 어느 때보다 중요하며, 실용적인 자세를 취해야만 덴마크를 보호할 수 있습니다."
 DEN_policy_of_disarmament: "군축 정책"
 DEN_policy_of_disarmament_desc: "우리는 수십 년 동안 군축 정책을 추구해 왔으며, 이는 우리가 대전쟁의 참상을 피할 수 있었던 이유 중 하나입니다. 어떤 이웃 국가에도 위협적이지 않은 모습을 보임으로써 이번에도 화를 면할 수 있을 것입니다."
 DEN_import_machinery_and_material: "기계 및 자재 수입"
 DEN_import_machinery_and_material_desc: "이웃 국가들의 산업력과 경쟁하려면 현명하게 대처해야 합니다. 더 산업화된 국가로부터 현대적인 도구와 자재를 수입하면 우리 자신의 역량을 강화하고 더욱 발전시킬 수 있을 것입니다."
 DEN_modernize_agricultural_machinery: "농업 기계 현대화"
 DEN_modernize_agricultural_machinery_desc: "농업 기계와 기술을 현대화하면 더 높은 효율성으로 풍부한 수확을 거둘 수 있으며, 이를 통해 생산량을 늘릴 수 있습니다."
 DEN_develop_jutland_states_tt: "결정 잠금 해제: §Y윌란 지역 개발§!\n\n"
 DEN_agricultural_reinvestments: "농업 재투자"
 DEN_agricultural_reinvestments_desc: "우리가 수입하여 사용한 새로운 기계의 도입과 기계화를 통해 농업은 더욱 효율적으로 변했습니다. 이 부문에서 증가한 세수를 재투자하면 효율성을 더욱 향상시킬 수 있습니다."
 DEN_industrial_reinvestments: "산업 재투자"
 DEN_industrial_reinvestments_desc: "농업 현대화로 인해 사람들이 농지에서의 노동에서 해방되었습니다. 산업화된 도심에 재투자하면 이들이 채울 수 있는 새로운 일자리가 창출될 것이며, 이를 통해 우리의 산업 생산량을 늘릴 수 있습니다."
 DEN_increase_produce_production: "식량 생산 증대"
 DEN_increase_produce_production_desc: "우리의 재투자는 성과를 거두었으며, 소규모 농가부터 대규모 협동조합에 이르기까지 모두가 번영하고 있습니다. 이제 우리는 식량 생산을 더욱 늘리기에 적합한 상태입니다."
 DEN_modernize_industrial_machinery: "산업 기계 현대화"
 DEN_modernize_industrial_machinery_desc: "덴마크는 전통적으로 식량 수출에 의존하는 농업 경제 국가였지만, 수십 년에 걸쳐 도시 산업의 중요성이 커졌습니다. 현대적인 기계에 투자함으로써 산업은 더욱 성장할 수 있습니다."
 DEN_develop_island_states_tt: "결정 잠금 해제: §Y대벨트 해협 지역 개발§!\n\n"
 DEN_increase_industrial_production: "산업 생산 증대"
 DEN_increase_industrial_production_desc: "도시 산업은 고용과 경제 생산량을 모두 증가시키면서 최근 그 중요성이 커졌습니다. 우리 산업의 역량이 증가했지만, 더욱 효율적으로 발전할 여지가 있습니다."
 DEN_research_and_development: "연구 개발 투자"
 DEN_research_and_development_desc: "석유와 기계는 현대 사회를 움직이는 원동력이지만, 우리는 이 거의 모든 분야에서 뒤처져 있습니다. 더 이상 뒤처지지 않도록 해야 합니다."
 DEN_north_sea_oil_drilling: "북해 유전 시추"
 DEN_north_sea_oil_drilling_desc: "탐사자들이 뇌레윌란 해안 외곽에서 유전을 발견했습니다. 이 매장량을 채굴할 수 있다면, 우리는 변덕스러운 무역 시장에 대한 의존도를 줄이고 자급자족할 수 있게 될 것입니다."
 DEN_potential_refinery_tt: "§Y$synth_oil_experiments$§! 연구 완료 시, §G1§!개의 건설 슬롯과 §Y$STATE_99$§!에 §G1§!개의 §Y$synthetic_refinery$§!를 추가합니다."
 DEN_increase_maritime_trade: "해상 무역 증대"
 DEN_increase_maritime_trade_desc: "미래는 넓은 바다와 우리의 상품을 멀리 수출할 상선단에 달려 있습니다. 우리나라는 인구와 정치적 영향력 면에서 작은 국가일지 모르지만, 위대한 무역 강국이 될 수 있습니다."
 DEN_full_employment: "완전 고용"
 DEN_full_employment_desc: "산업과 농업에 아낌없이 투자한 덕에 이제 그 결실을 거둘 때가 왔습니다. 우리는 경제 위기와 높은 실업률의 시대를 뒤로했습니다. 국가는 최대 가동률로 운영되고 있으며, 고용할 인력마저 부족해지고 있습니다. 번영이 우리 앞에 놓여 있습니다."
#Shared Political Branch
 DEN_social_stability: "사회 안정"
 DEN_social_stability_desc: "다른 국가들을 뒤흔든 사회적 불안을 피하기 위해, 우리는 선제적인 조치를 취해야 합니다! 산업과 경제 전반에 걸친 대대적인 개혁을 단행하기 전에, 우리는 확고하고 안정적인 기반을 다져야 합니다."
 DEN_welcome_foreign_scientists: "외국 과학자 환영"
 DEN_welcome_foreign_scientists_desc: "유럽에 다시 한번 분쟁의 조짐이 보이고, 사람들은 억압적인 정권을 피해 도망치고 있습니다. 이들 중 일부를 두 팔 벌려 환영함으로써 우리는 많은 지식과 역량을 얻을 수 있습니다."
 DEN_build_motorveje: "국가 고속도로 건설"
 DEN_build_motorveje_desc: "최근 국영 고속도로에 대한 많은 논의와 일부 계획이 있었습니다. 고속도로망을 건설하면 전국을 더 빠르게 이동할 수 있게 되고, 국가를 더욱 긴밀하게 연결할 것입니다."
 DEN_heavy_market_regulations: "중공업 규제"
 DEN_heavy_market_regulations_desc: "산업체들은 수년간 거대하고 부유하게 성장했습니다. 경제에 대한 그들의 장악력은 많은 사람들에게 우려를 낳고 있습니다. 우리는 그들이 국가의 필요보다 회사의 필요를 우선시하지 않도록 그들을 제지하고 엄격한 감독하에 두어야 합니다."
 DEN_limited_market_regulations: "제한적 산업 규제"
 DEN_limited_market_regulations_desc: "산업 부문은 수년간 국가 경제에서 중요성을 얻었으며, 심지어 번창하고 있습니다. 우리는 그들의 성장을 해치지 않으면서도 국가에 안보 위협이 되지 않을 만큼 충분히 그들을 조절하고 통제해야 합니다."
 DEN_no_market_regulations: "모든 산업 규제 철폐"
 DEN_no_market_regulations_desc: "산업은 시장에 대한 우리의 규제 때문이 아니라, 규제에도 불구하고 성장하고 번영했습니다. 만약 우리가 진정으로 우리 산업으로 세계와 경쟁하고 싶다면, 그들에 대한 모든 규제를 철폐해야 합니다."
 DEN_industrial_research_bonus_tt: "산업 연구 보너스: §G+5.00%§!"
 DEN_side_with_unions: "노동조합 편에 서기"
 DEN_side_with_unions_desc: "[Den.GetNameDef]의 모든 국민의 생활 환경을 개선해야만 노동 시장을 괴롭히는 문제들을 해결할 수 있으며, 노동조합을 강화해야만 그것을 달성할 수 있습니다."
 DEN_side_with_industry: "산업계 편에 서기"
 DEN_side_with_industry_desc: "기업 활동이 직면한 문제들을 해결하기 위해, 우리는 임금을 낮추고 수입품에 더 높은 관세를 부과해야 합니다. 그렇지 않으면 고용주들이 번창하기 어려울 것입니다."
 DEN_five_year_plan: "5개년 계획 도입"
 DEN_five_year_plan_desc: "[DEN.GetNameDef]를 위한 대담하고 새로운 경제 모델을 만들고 실행할 수 있는 위원회를 설립하여 우리 국민의 미래를 보장해야 합니다. 이 새로운 5개년 계획은 우리가 진정으로 꽃피우고 번영하게 할 것입니다!"
 DEN_limited_social_mobilization: "제한적 사회 동원"
 DEN_limited_social_mobilization_desc: "유럽에 전쟁의 그림자가 드리우고 있습니다. 하지만 우리는 다시 허를 찔려서는 안 됩니다! 주권을 지키기 위해, 비록 힘들지라도 필요한 준비를 수행해야 합니다."
 #Rearmament Branch
 DEN_start_the_rearmament: "재무장 시작"
 DEN_start_the_rearmament_desc: "[DEN.GetNameDef]는 너무나 오랫동안 군대를 등한시하고 우리의 주권을 이웃의 손에 맡겨왔습니다. 유럽을 휩쓰는 혼란 속에서, 이는 더 이상 용납될 수 없습니다! 우리는 다시 한번 군사력을 증강하고 우리의 운명이 우리 손에 달려있도록 해야 합니다."
 DEN_national_unity: "국민 단결"
 DEN_national_unity_desc: "이렇게 갑작스럽게 재무장하고 군대를 증강하려면 덴마크 국민 전체의 지지가 필요합니다. 우리는 국민을 통합하고 하나 되어 단호하게 나아가야 합니다."
 DEN_industrial_preparations: "산업 준비"
 DEN_industrial_preparations_desc: "우리는 사회의 모든 측면을 전쟁에 대비해야 합니다. 어떠한 기습에도 허를 찔릴 위험을 감수할 수 없습니다. 산업을 먼저 준비하여 자급자족 능력을 높여야 하며, 이는 결국 지원군이 도착할 때까지 침략자를 막아낼 우리의 능력을 강화할 것입니다."
 DEN_military_preparations: "군사 준비"
 DEN_military_preparations_desc: "우리 군이 적을 격퇴할 수 없다면, 공격에 대비해 산업을 준비하는 것은 무용지물이 될 것입니다. 우리는 방어를 강화하고 우리 군대가 전선을 유지하는 데 필요한 규율과 담력을 갖추도록 해야 합니다."
 DEN_civilian_preparations: "민간 준비"
 DEN_civilian_preparations_desc: "군대와 산업 부문이 아무리 잘 준비되어 있더라도, 민간의 결의가 무너지고 국민이 방어선에서 쉽게 흔들리며 평화를 추구한다면 모든 것이 수포로 돌아갈 것입니다. 우리는 모든 덴마크인의 마음에 결의를 다지고 자신에 대한 믿음을 강화해야 합니다."
 DEN_full_social_mobilization: "총 사회 동원"
 DEN_full_social_mobilization_desc: "전쟁이 코앞에 닥쳤으며, 우리의 자유를 지키기 위해 사회의 모든 측면을 동원해야 합니다. 모든 남성, 여성, 어린이가 자신의 의무와 책임을 알아야 합니다. 대가가 따르겠지만, 우리의 모든 산업 역량은 재무장과 덴마크 국민의 안보를 지원하는 데 집중되어야 합니다."
 DEN_seek_protection: "보호 요청"
 DEN_seek_protection_desc: "우리가 원하는 만큼 준비할 수는 있지만, 우리는 더 크고 강한 이웃들에게 둘러싸여 있으며 그들의 의도를 진정으로 확신할 수 없습니다. 따라서 우리의 독립을 보장하기 위해 다른 곳에서 보호를 모색하는 것이 현명한 생각입니다."
 DEN_sign_non_aggression_deal: "불가침 조약 체결"
 DEN_sign_non_aggression_deal_desc: "강대국과 우호 관계를 맺고 불가침 조약을 체결한다면 큰 이득을 얻을 수 있습니다. 가까운 미래에 우리의 위태로운 상황이 바뀌지는 않겠지만, 장기적으로는 더욱 긴밀해진 관계를 통해 다양한 무역 협정을 체결하고 협력을 증진하여 우리에게 이익이 될 수 있습니다."
 DEN_sign_a_trade_deal: "무역 협정 협상"
 DEN_sign_a_trade_deal_desc: "우리는 군대를 재무장하기로 굳게 결심했지만, 이에는 시간이 걸립니다. 우리에게는 없을지도 모르는 시간 말입니다. 더 많은 장비를 더 빨리 획득해야 합니다. 자체 생산 능력이 제한적이므로, 우호적인 국가에 의지하여 필요한 물자를 조달해야 합니다."
 DEN_science_pact: "연구 및 동반자 관계 프로그램 참여"
 DEN_science_pact_desc: "우리나라가 산업에 더 큰 중점을 두면서 과학 기술 발전에 큰 진전을 이루었지만, 여전히 일부 국가에는 뒤처져 있습니다. 우호적인 국가와 협력하여 상호 이익이 되는 연구 및 동반자 관계 프로그램에 참여한다면, 우리의 발전을 더욱 가속화할 수 있을 것입니다."
 DEN_territory_for_protection: "보호를 위한 영토 할양"
 DEN_territory_for_protection_desc: "재무장 계획은 계획대로 진행되고 있지만, 군 내부에서는 이것만으로 충분할지에 대한 의구심이 여전합니다. 단순히 불가침 조약을 맺는 것보다, 일부 영토를 매각하여 더 확실한 보호를 보장받을 수 있습니다. 이러한 거래는 우리 경제에도 이익이 될 수 있습니다."
 DEN_strength_in_numbers: "단결의 힘"
 DEN_strength_in_numbers_desc: "훨씬 더 강한 적에게 맞서 싸울 기회를 얻으려면 동맹을 찾아야 합니다. 중립 따위는 집어치우십시오! 이제 이런 순진한 생각은 버리고 세계의 현실에 적응할 때입니다."
 DEN_military_cooperation_program: "군사 협력 프로그램"
 DEN_military_cooperation_program_desc: "동맹을 확보했으므로, 양국은 공동 군사 협력 프로그램을 통해 서로에게서 배울 수 있을 것입니다. 또한 거래를 더욱 유리하게 만들기 위해, 새로운 동맹국으로부터 구매하는 군사 장비에 보조금을 지급하여 우리의 재무장 노력을 강화하기로 합의했습니다."
 DEN_joint_military_drills: "합동 군사 훈련"
 DEN_joint_military_drills_desc: "1864년부터 중립을 지켜온 덴마크군은 오랫동안 실전을 경험하지 못했습니다. 새로운 동맹국에 접근한다면 그들로부터 많은 것을 배울 수 있을 것이며, 합동 군사 훈련을 통해 양국은 서로에게서 경험을 얻을 수 있을 것입니다."
 DEN_nordic_security: "북유럽 안보"
 DEN_nordic_security_desc: "새로운 동맹으로 우리 자신의 독립을 확보했으니, 이제 마침내 나머지 북유럽 국가들로 관심을 돌릴 수 있습니다. 그들이 우리 세력에 합류하여 우리 모두가 서로를 보호할 수 있도록 설득해야 하며, 만약 그들이 이성을 따르지 않는다면 그들 자신으로부터 그들을 보호할 의무가 있습니다."
#Monarchist Branch
 DEN_unify_the_right: "우익 통합"
 DEN_unify_the_right_desc: "[DEN.GetNameDefCap]은 너무 오랫동안 무책임하게 운영되었습니다! 우리가 여전히 국가로서 기능할 수 있는 것은 오로지 덴마크 국민의 순전한 투지와 인내 덕분입니다. 이제 우익 정당들이 마침내 단결하여 좌익의 위협에 맞서 공동의 대의를 위해 싸울 때입니다!"
 DEN_conservatives_support: "보수파의 지지 확보"
 DEN_conservatives_support_desc: "보수당의 상당수는 농민당이나 덴마크 국가사회주의 노동자당 같은 세력과 협력하는 것을 꿈도 꾸지 않겠지만, 다가오는 폭풍에 [DEN.GetNameDef]이 얼마나 무방비하고 준비가 되어 있지 않은지를 꿰뚫어 보는 사람들도 여전히 있습니다. 우리는 그들이 우리의 대의에 동참하도록 설득해야 합니다!"
 DEN_conspire_with_the_officer_corps: "장교단과 공모"
 DEN_conspire_with_the_officer_corps_desc: "훨씬 더 큰 정치적 권한과 더 일관된 의제를 가진 통합 우익 연합을 통해, 이제 우리는 장교단에 접근하여 그들 중 적어도 일부가 우리를 지지하도록 설득할 수 있습니다."
 DEN_encourage_paramilitary: "준군사조직 장려"
 DEN_encourage_paramilitary_desc: "지역 기반의 준군사조직을 장려하는 것은 전쟁 시 국가 안보를 강화할 뿐만 아니라, 시민들 사이의 공동체 의식과 단결심을 고취할 것입니다."
 DEN_overthrow_the_government: "정부 전복"
 DEN_overthrow_the_government_desc: "우리나라는 너무 오랫동안 자신들의 이익만을 챙기는 탐욕스러운 자들에 의해 운영되어 왔으며, 그들은 덴마크 국민에게 닥친 모든 위협을 무시했습니다. 이제 새로운 질서를 확립하여 [DEN.GetNameDef]의 새로운 시대를 열 때입니다!"
 DEN_strengthen_the_officer_corp: "장교단 강화"
 DEN_strengthen_the_officer_corp_desc: "장교는 군사 작전의 성공에 중추적인 역할을 합니다. 우리 군의 효율성을 보장하기 위해, 우리는 장교단 강화에 다시금 중점을 두어야 합니다. 숙련되고 헌신적인 지도자들의 새로운 세대를 양성해야 합니다."
 DEN_king_assumes_power: "국왕, 권력을 장악하다"
 DEN_king_assumes_power_desc: "이 불확실한 시기에 우리를 앞으로 이끌 안정적인 손길이 필요합니다. 우리에게는 안정과 전통이 필요합니다. 이 어려운 시기에 국왕께서 정부에 대한 전권을 장악하시도록 설득할 수 있을 것입니다."
DEN_konge_og_faedreland: "왕과 조국을 위하여"
DEN_konge_og_faedreland_desc: "크리스티안 10세 국왕의 확고한 헌신과 명예가 이 시련의 시기에 대중에게 희망의 등불이 되게 하십시오. 우리는 한 민족으로서 단결하여 우리의 조국을 지켜야 합니다!"
DEN_align_industries: "국가 이익에 맞춰 산업 조정"
DEN_align_industries_desc: "효율적인 자원 배분과 집중된 산업 생산량의 필요성이 가장 중요해졌습니다. 우리의 노력을 조율하고 생산을 합리화함으로써, 우리는 모든 공장, 모든 노동자, 모든 자원이 [DEN.GetNameDef]에 봉사하기 위해 잠재력을 최대한 발휘하도록 보장할 것입니다."
DEN_the_royal_guard: "왕립 근위대 확장"
DEN_the_royal_guard_desc: "왕립 근위대는 거의 300년 동안 국왕과 왕가의 안전을 보호하는 임무를 맡아왔으며, 임무에 헌신적이고 확고하다는 것을 거듭 증명해왔습니다. 그들의 수와 규율을 확장함으로써 우리는 군대를 더욱 강화할 수 있습니다."
DEN_economic_mobilization_strategy: "경제 동원 전략"
DEN_economic_mobilization_strategy_desc: "우리는 다가오는 전쟁에 대비하여 경제와 대중을 준비시켜야 합니다. 산업이 가능한 한 효율적으로 운영되도록 보장하는 동시에, 덴마크 국민이 왕과 국가를 위해 의무를 다하도록 설득하기 위한 새로운 경제 전략을 시행해야 합니다."
DEN_expand_kobenhavns_university: "코펜하겐 대학교 확장"
DEN_expand_kobenhavns_university_desc: "우리는 [DEN.GetNameDef]이(가) 기술 후진국이 되는 위험을 감수할 수 없습니다. 코펜하겐 대학교의 과학적 진보와 기술 발전에 투자하여 어떤 분야에서도 경쟁자들에게 뒤처지지 않도록 보장할 것입니다."
DEN_scandinavian_security: "스칸디나비아 안보"
DEN_scandinavian_security_desc: "스칸디나비아와 발트해는 지난 수 세기 동안 [DEN.GetNameDef]의 주요 지정학적 초점이었습니다. 대륙의 주요 유럽 강대국으로 초점을 돌리기 전에, 우리는 먼저 북쪽 측면을 제압하고 평정해야 합니다."
DEN_reintegrate_iceland: "아이슬란드 재통합"
DEN_reintegrate_iceland_desc: "얼마 전까지만 해도 [ICE.GetNameDef]은(는) 우리 국가의 일부였으며, 수 세기 동안 그래왔습니다. 이제 [ICE.GetAdjective] 국민이 우리 왕국에 합류하여 다시 한번 통일된 국가가 되도록 설득할 때입니다."
DEN_develop_iceland: "아이슬란드 개발"
DEN_develop_iceland_desc: "북대서양에서 아이슬란드의 위치는 공해를 통제하기 위한 해군 원정을 시작하기에 최적의 후보지입니다. 이 지역에 자원과 자금을 투입함으로써, 우리는 이 지역을 더 넓은 왕국에 더 긴밀하게 통합하고 그 전략적 위치를 더 잘 활용할 수 있습니다"
DEN_sway_the_nordics: "북유럽 국가 설득"
DEN_sway_the_nordics_desc: "'펜은 칼보다 강하다'는 옛말에 일리가 있습니다. 무력을 사용하는 대신 외교적 수단으로 다른 국가들을 우리 편으로 끌어들이려고 노력하는 것이 현명할 수 있습니다."
DEN_offer_protection: "보호 제공"
DEN_offer_protection_desc: "북유럽 지역과 발트해 주변에서 우리의 영향력과 힘을 더욱 증대시키기 위해, 우리는 도움이 필요한 이들에게 적절한 보호를 제공함으로써 덴마크의 패권을 확립해야 합니다. 우리의 동포인 북유럽 및 발트해 형제들을 방어하는 것은 전체 지역의 안보를 강화하고 우리 모두에게 이익이 될 것입니다."
DEN_secure_swedish_steel: "스웨덴 강철 확보"
DEN_secure_swedish_steel_desc: "[DEN.GetNameDefCap]은(는) 자원이 부족한 국가로, 현대 군대를 운영하는 데 필요한 대부분의 물자가 부족합니다. 반면에 스웨덴은 풍부한 천연 자원을 가지고 있으며 과거에는 덴마크의 지배하에 있었습니다. 이제 다시 [SWE.GetNameDef]을(를) 우리의 지배하에 둘 때가 왔습니다."
DEN_swedish_steel_production: "스웨덴 강철 생산"
DEN_swedish_steel_production_desc: "북부 [SWE.GetNameDef]의 광물 자원을 우리 지배하에 확보했으므로, 우리는 모든 광산을 활용하여 우리 자신의 채굴 능력을 증대시키는 한편, 안전 보장을 대가로 일부 부를 해외로 수출할 수 있는 훌륭한 위치에 있습니다."
DEN_finish_off_finland: "동부 전선 확보"
DEN_finish_off_finland_desc: "동부 측면을 확보하지 않는 한, 북부 스칸디나비아에서의 우리의 이익은 항상 위협받을 것입니다. 우리는 핀란드 영토를 보호하기 위해 선제 조치를 취해야 합니다!"
DEN_reclaim_norway: "노르웨이 수복"
DEN_reclaim_norway_desc: "덴마크 왕실은 1814년 스웨덴이 우리에게서 빼앗기 전까지 수백 년 동안 [NOR.GetNameDef]을(를) 통치했습니다. 국왕의 형제인 [NOR.GetNameDef]의 호콘 국왕은 직접 통제권을 잡고 국민을 보호하기 위한 필요한 선택을 하기를 꺼리는 모습을 보였습니다. 이제 다시 한번 두 나라를 덴마크의 통치 아래 통일할 때입니다."
DEN_train_mountain_infantry: "산악 훈련"
DEN_train_mountain_infantry_desc: "스칸디나비아의 서부와 북부 지역은 덴마크 본토에는 없는 산악 지형입니다. 우리 왕국을 더 잘 보호하기 위해 전투 능력을 증강하려면 이 산들에서 군사 훈련을 실시해야 합니다."
DEN_pan_scandinavianism: "범스칸디나비아주의"
DEN_pan_scandinavianism_desc: "스칸디나비아, 그리고 더 나아가 노르딕 지역 전체는 수천 년 동안 길고 공유된 역사를 통해 긴밀하게 얽혀왔습니다. 우리 민족들 사이의 이미 긴밀한 유대를 활용하여 통일을 향한 조치를 취할 수 있습니다."
#Fascist Branch
DEN_march_on_the_capital: "수도 진군"
DEN_march_on_the_capital_desc: "마침내 우리 당이 일어나 [DEN.GetNameDef]의 미래를 장악할 때가 왔습니다. 우리는 [ROOT.capital.GetCapitalVictoryPointName](으)로 진군하여 우리의 목소리를 내야 합니다! 이것은 [DEN.GetAdjective] 역사에서 강력하고 안전한 시대의 시작이 될 것입니다!"
DEN_seize_power: "권력 장악"
DEN_seize_power_desc: "[DEN.GetNameDefCap]은(는) 마침내 새로운 파시스트 정부를 받아들일 준비가 되었습니다. 우리는 의회를 폐지하고 대신 위대한 조국의 미래를 $DEN_cay_lembcke$의 손에 맡길 것입니다. 그러나 아주 작은 저항이라도 있다면, 우리는 그것을 완전히 뿌리 뽑을 준비를 해야 합니다."
DEN_ask_for_support: "지원 요청"
DEN_ask_for_support_desc: "[GER.GetAdjective]은(는) 우리가 건설하고자 하는 국가의 대표적인 예입니다. 따라서 이 혼란스러운 시기에 정부에 손을 내밀어 지원을 요청할 더 좋은 사람들은 생각할 수 없습니다. 우리는 가능한 한 빨리 [GER.capital.GetCapitalVictoryPointName](으)로 대표단을 보내야 합니다!"
DEN_denmark_first: "덴마크 우선"
DEN_denmark_first_desc: "우리는 우리 자신의 힘으로 여기까지 왔는데, 왜 강대국들에게 지원을 요청해야 합니까? 대신, [DEN.GetNameDef]은(는) 자력으로 일어서서 세계의 다른 주요 세력들만큼 중요한 존재로 성장할 것입니다. 덴마크 만세!"
DEN_rally_the_nation: "국민 결집"
DEN_rally_the_nation_desc: "이제 우리가 국가를 장악했으니, 국민의 지지를 얻는 것이 가장 중요합니다. 그들이 우리에게 크게 반대할 수는 없겠지만, 등 뒤에 칼을 든 민중보다는 곁에서 조국을 위해 싸울 준비가 된 민중을 두는 것이 훨씬 낫습니다. [DEN.GetAdjective]의 자부심을 되찾고 국민을 결집하여 조국을 위해 싸우게 합시다!"
DEN_dano_german_military_cooperation: "덴마크-독일 군사 협력"
DEN_dano_german_military_cooperation_desc: "우리의 군사력을 목표 달성이 가능한 수준까지 발전시키기 위해, [GER.GetNameDef]의 동료 정부에 접근하여 군사 및 기술 협력을 요청하는 것이 중요할 수 있습니다. 이 제안을 통해 우리가 [DEN.GetNameDef]을(를) 위해 그리는 미래가 현실에 더 가까워질 것입니다."
DEN_institute_corporatism: "협동조합주의 도입"
DEN_institute_corporatism_desc: "이탈리아 모델에서 영감을 받아, 다양한 경제 부문의 노동자와 자본가들이 국가 정책 결정에 참여해야 합니다. 이를 통해 우리는 이들 집단 사이를 중재하고 국가 경제에 가장 유익한 개혁을 수행할 수 있습니다. 이는 우리가 [DEN.GetNameDef]의 확고한 정치적 미래를 확보하는 데 도움이 될 것입니다."
DEN_experimental_technology: "실험 기술"
DEN_experimental_technology_desc: "전쟁 기계를 개발하면서, 우리의 연구 개발 부문이 실험을 계속 발전시키도록 보장해야 합니다. 대학과 연구소에 우리의 발전을 더욱 촉진하는 데 필요한 자금을 공급하는 것이 필수적입니다."
DEN_assault_troops: "돌격부대"
DEN_assault_troops_desc: "육군이 전선을 유지하고 적을 조금씩 밀어낼 수는 있지만, 우리가 직면한 어떤 위협이든 파괴하는 데 필요한 힘은 정예 부대의 힘을 통해서만 찾을 수 있습니다. 우리는 그들의 훈련을 우선시하고, 복종적이고 규율 잡힌 특수 부대가 예비로 대기하도록 보장해야 합니다."
DEN_prioritize_navy: "해군 우선"
DEN_prioritize_navy_desc: "본토는 작은 반도에 불과하므로, 대기 중인 함대의 발전을 우선시하는 것이 매우 중요합니다. [DEN.GetAdjective] 해군은 언젠가 [ENG.GetAdjective]이나 [JAP.GetAdjective]의 해군과 필적할 수 있겠지만, 오직 우리가 시간과 돈을 투자하여 개선할 때만 가능합니다."
DEN_prioritize_army: "육군 우선"
DEN_prioritize_army_desc: "모든 군대의 중추는 육군입니다. 우리가 자원을 병사 훈련과 전쟁 기계 및 장비 생산에 쏟아붓는다면, 감히 [DEN.GetNameDef]을(를) 위협하는 누구에게든 맞설 준비가 그 이상으로 되어 있을 것입니다."
DEN_total_war: "총력전"
DEN_total_war_desc: "이 전쟁에서 현재 우리의 손실은 용납할 수 없습니다. 하지만, 이것이 끝은 아닙니다. 우리는 병력을 결집하고 총력전을 준비해야 합니다. 적을 밀어내고 우리가 가진 모든 것을 쏟아부을 수 있다면, 이 폭풍을 이겨낼 기회가 있을 것입니다. 국민을 결집하고, 마지막 남은 산업을 동원하여, 우리는 우리의 자리를 지켜야 합니다!"
DEN_military_might: "부활하는 군사력"
DEN_military_might_desc: "[DEN.GetNameDef]의 군사력은 날로 강해지고 있지만, 항상 개선의 여지는 있습니다. 육군과 공군의 훈련과 현장에서의 효율성을 향상시키기 위해 자금을 집중합시다."
#End Focuses
DEN_avenging_1864: "1864년의 복수"
DEN_avenging_1864_desc: "1864년의 굴욕적인 패배는 반세기가 넘도록 우리나라에 상처를 남겼습니다. 이제는 남쪽 국경을 완전히 확보하고, 다시는 어떤 적도 우리에게 복종해야 할 조건을 강요할 수 없도록 해야 할 때입니다."
DEN_dominium_maris_baltici: "발트해의 패권"
DEN_dominium_maris_baltici_desc: "[ROOT.GetNameDefCap]은(는) 한때 발트해 주변에서 가장 강력한 국가였습니다. 우리는 발트족, 폴란드인, 러시아인, 그리고 무엇보다도 스웨덴인과 바다의 지배권을 놓고 싸워왔습니다. 이제 우리는 이 지역 전체를 완전히 우리의 통제하에 둘 준비가 되었습니다."
DEN_establish_the_danelaw: "Danelagen"
DEN_establish_the_danelaw_desc: "한때 우리의 지배권이 북해를 가로질러 뻗어 있었고 잉글랜드인들이 우리의 법을 따르던 시절이 있었습니다. 이제 다시 일어나 파도를 장악하여 우리 민족의 미래를 확보해야 할 때가 왔습니다. 우리는 데인법을 다시 도입하고 다른 모든 국가가 우리에게 복종하도록 강요할 것입니다!"
#Occupation Branch
 DEN_collaboration_government: "Samarbejdsregering"
 DEN_collaboration_government_desc: "[?DEN.DEN_overlord_nation.GetNameDef](와)과 평화 조약을 체결하고 협력하는 것이 우리 국민을 파괴와 파멸로부터 구할 유일한 길이었습니다. [?DEN.DEN_overlord_nation.GetAdjective] 점령군과 긴밀히 협력하는 협력 정부를 수립함으로써, 우리는 비슷한 상황에 처한 다른 대부분의 국가보다 훨씬 더 많은 독립과 주권을 부여받게 될 것입니다."
 DEN_seek_independence: "독립 추구"
 DEN_seek_independence_desc: "[?DEN.DEN_overlord_nation.GetNameDef](와)과 협력하고 있음에도 불구하고 덴마크의 독립은 더 이상 보장되지 않습니다. 우리는 점령군에 저항하여 자유를 확보하고 적절한 시기에 공격해야 합니다."
 DEN_sanction_sabotages: "사보타주 승인"
 DEN_sanction_sabotages_desc: "[?DEN.DEN_overlord_nation.GetNameDef](와)과 협력하고 있지만, 그렇다고 해서 우리가 평화적인 방식으로 점령에 저항할 수 없다는 의미는 아닙니다. 국민을 위험에 빠뜨리지 않고 저항하는 것이 사실상 우리의 의무라고 주장할 수도 있습니다."
 DEN_form_the_danish_freedom_council: "Danmarks Frihedsråd"
 DEN_form_the_danish_freedom_council_desc: "우리는 [?DEN.DEN_overlord_nation.GetNameDef]의 점령에 반대하는 모든 정당으로부터 폭넓은 지지를 모아 평의회를 구성해야 합니다. 이 자유 평의회는 침공 이후 일어난 다양한 저항 운동을 더 효과적으로 조율하고, 잠재적인 독립 전쟁도 조율할 수 있을 것입니다."
 DEN_arm_the_resistance: "저항군 무장"
 DEN_arm_the_resistance_desc: "점령이 시작된 이래로 수많은 저항 운동이 나타났습니다. 만약 우리가 [?DEN.DEN_overlord_nation.GetAdjective]의 억압이라는 멍에를 벗어던지기를 바란다면, 이 단체들을 무장시키고 우리가 다시 독립을 선언하는 날을 위해 준비시켜야 합니다."
 DEN_escalate_the_sabotages: "사보타주 확대"
 DEN_escalate_the_sabotages_desc: "우리가 자유를 되찾기 위해 다시 싸워야 한다는 것이 점점 더 명확해지고 있습니다. 우리는 [?DEN.DEN_overlord_nation.GetAdjective] 점령에 대한 사보타주 활동을 강화해야 합니다."
 DEN_expand_the_resistance: "저항군 확대"
 DEN_expand_the_resistance_desc: "점령이 시작된 이래로 각계각층에서 다양한 저항 단체들이 생겨났지만, 우리 땅에서 [?DEN.DEN_overlord_nation.GetAdjective] 군대를 격퇴하기를 바란다면 이 단체들에 더 많은 사람들을 규합해야 합니다."
 DEN_declare_independence: "덴마크 독립 선언"
 DEN_declare_independence_desc: "다시 한번 우리의 독립을 선언하고, 필요하다면 그것을 위해 싸울 때가 왔습니다!"
 DEN_secure_danish_freedom: "덴마크의 자유 확보"
 DEN_secure_danish_freedom_desc: "우리 땅에서 [?DEN.DEN_overlord_nation.GetAdjective] 군대를 격퇴하는 것만으로는 덴마크의 자유를 진정으로 확보하기에 충분하지 않습니다. 우리는 [?DEN.DEN_overlord_nation.GetNameDef]이(가) 다시는 위협이 되지 않도록 해야 합니다."
 DEN_create_danforce: "댄포스 창설"
 DEN_create_danforce_desc: "[?DEN.DEN_overlord_nation.GetNameDefCap]은(는) 우리가 그들의 패권에 실질적으로 위협이 될 만큼 큰 군대를 보유하는 것을 금지했습니다. 대신 우리는 [DEN.GetNameDef]을(를) 억압에서 해방시키는 데 참여할 수 있는 군대를 훈련하고 보급해 줄 자유롭고 우호적인 국가를 다른 곳에서 찾아야 합니다."
 DEN_buy_foreign_aircraft: "해외 항공기 획득"
 DEN_buy_foreign_aircraft_desc: "우리는 [DEN.GetNameDef] 상공의 제공권을 놓고 [?DEN.DEN_overlord_nation.GetNameDef](와)과 경쟁하기 위해 항공기를 획득하여 덴마크 여단을 강화해야 합니다."
 DEN_rigid_training: "혹독한 훈련"
 DEN_rigid_training_desc: "숫자만으로는 제공권을 장악할 수 없습니다. 조종사들에게 혹독한 훈련을 시켜 [?DEN.DEN_overlord_nation.GetAdjective] 항공기로부터 하늘을 지켜내야 합니다."
 DEN_strengthen_the_danish_brigades: "덴마크 여단 강화"
 DEN_strengthen_the_danish_brigades_desc: "[?DEN.DEN_overlord_nation.GetNameDef]와 같은 화력을 모을 수는 없으므로, 대신 영리하게 싸워 그들을 압도해야 합니다. 적을 연구하고 약점을 찾아내 전장에서 이를 이용해야 합니다."
 DEN_support_battalions: "지원 대대"
 DEN_support_battalions_desc: "덴마크 여단이 제대로 된 부대로서 [ROOT.GetNameDef]을(를) 해방할 기회를 얻으려면, 충분한 물자를 갖춰야 합니다. 소총과 기관총도 매우 좋지만, 오늘날에는 포병과 대공 지원이 필수적입니다."
 DEN_expand_the_brigades: "여단 확장"
 DEN_expand_the_brigades_desc: "[ROOT.GetNameDef]을(를) 해방할 덴마크 여단의 가능성을 확보하기 위해, 사단에 더 많은 인력을 추가해야 합니다."
 DEN_establish_danske_flotille: "덴 단스케 플로틸레 창설"
 DEN_establish_danske_flotille_desc: "망명 소함대를 창설하여 병력을 훈련하고 해상 훈련을 실시함으로써, 우리 영토 해방에 도움이 될 기술을 연마할 수 있습니다. 우리 함대는 [?DEN.DEN_overlord_nation.GetAdjective] 해군과 심각한 대립에 직면할 것이므로, 어떤 방법으로든 우위를 점해야 합니다."
 DEN_buy_foreign_ships: "구축함 조달"
 DEN_buy_foreign_ships_desc: "[DEN.GetNameDef]의 해안선과 수많은 섬을 지키려면, 먼저 우리 해로를 보호할 수 있는 유능한 함대를 확보해야 합니다. 우리의 곤경에 동정적일 수 있는 국가들에 조용히 접근하여, 그들로부터 낡은 구축함을 조달해 우리 해군을 강화할 수 있을 것입니다."
 DEN_align_with_foreign_powers: "외세와 제휴"
 DEN_align_with_foreign_powers_desc: "[?DEN.DEN_overlord_nation.GetNameDefCap]은(는) 싸우지 않고는 정복한 땅을 한 뼘도 내주지 않을 것이며, 우리 혼자서는 그들의 군사력에 맞설 수 없습니다. 종속의 족쇄를 벗어던지고 자유를 되찾으려면, 우리의 곤경을 도와줄 잠재적 동맹국을 찾아야 합니다."
 DEN_seek_foreign_support_tt: "결정 잠금 해제: §Y외세의 지원 모색§!"
 DEN_intel_sharing: "정보 공유"
 DEN_intel_sharing_desc: "[?DEN.DEN_overlord_nation.GetNameDef]에 맞서는 동맹국들과의 협력을 심화하고 국가 간 정보를 공유하면, 우리의 유대와 궁극적으로 [?DEN.DEN_overlord_nation.GetAdjective]의 압제를 전복할 능력이 강화될 것입니다."
 DEN_ask_for_weapons: "무기 인도 요청"
 DEN_ask_for_weapons_desc: "우리의 [?DEN.DEN_overlord_nation.GetAdjective] 종주국은 계속해서 우리의 무기와 군수품 비축량을 고갈시켜, 다시 한번 독립을 선언할 날이 왔을 때 반격할 능력을 마비시키고 있습니다. 동맹국들에게 텅 빈 재고를 보충하는 데 필요한 보급품을 공수해달라고 요청할 수 있습니다."
 DEN_buy_allied_weapons: "연합군 무기 조달"
 DEN_buy_allied_weapons_desc: "소국으로서 우리의 군비 생산 능력은 제한적이며, 독립을 확보하기 위해서는 현존하는 최고의 장비를 획득해야 합니다. 아마도 동맹국들을 설득하여 보조금을 받는 거래로 필요한 무기를 공급받을 수 있을 것입니다."
 DEN_align_with_overlord: "[?DEN.DEN_overlord_nation.GetNameDef]와(과) 제휴"
 DEN_align_with_overlord_desc: "[?DEN.DEN_overlord_nation.GetNameDef]와의 평화 협정에서 높은 수준의 독립성을 유지했지만, 우리는 여전히 괴뢰국에 불과합니다. 하지만 이는 흥미로운 기회를 열어주기도 합니다. 아마도 [?DEN.DEN_overlord_nation.GetNameDef]와(과) 제휴한다면, 더 강한 종주국을 이용해 이 패배를 승리로 바꿀 수 있을 것입니다..."
 DEN_seek_industrial_investments: "산업 투자 모색"
 DEN_seek_industrial_investments_desc: "[?DEN.DEN_overlord_nation.GetNameDef]와(과) 제휴하여 그들의 신뢰와 호의를 얻은 지금, 우리는 종주국에게 우리 산업에 투자하고 생산 능력을 강화해달라고 요청할 수 있는 좋은 기회를 맞았습니다."
 DEN_pledge_allegiance: "충성 맹세"
 DEN_pledge_allegiance_desc: "[?DEN.DEN_overlord_nation.GetNameDef]와의 관계를 완전히 이용하려면 그들에게 충성을 맹세해야 합니다. 이는 양국이 함께 성장하고 이익을 얻을 수 있는 공생 관계를 만들려는 우리의 야망에 대한 진정성을 의심할 여지 없이 보여줄 것입니다."
 DEN_seek_military_investments: "군사 투자 모색"
 DEN_seek_military_investments_desc: "충성을 맹세하고 [?DEN.DEN_overlord_nation.GetNameDef]와의 관계를 강화한 지금, 우리는 [?DEN.DEN_overlord_nation.GetLeader]의 호의를 얻었습니다. 이를 통해 우리는 그에게 직접 우리 군수 생산에 대한 [?DEN.DEN_overlord_nation.GetAdjective]의 투자를 요청할 수 있습니다."
 DEN_petition_for_independence: "독립 청원"
 DEN_petition_for_independence_desc: "우리는 우리의 역할을 다했으며, 모든 노력에서 [?DEN.DEN_overlord_nation.GetAdjective] 주인들을 도왔습니다. 우리는 신뢰할 수 있고 의지할 수 있음을 보여주었으므로, 이제 [?DEN.DEN_overlord_nation.GetNameDef]에 충실한 동맹으로 남으면서 독립을 청원할 때가 왔습니다."
 DEN_seize_the_production: "생산 수단 장악"
 DEN_seize_the_production_desc: "비상시에는 비상 대책이 필요합니다. 우리의 모든 산업 잠재력을 발휘하려면 생산 수단을 장악해야 합니다. 이를 통해 산업이 국가의 필요에 부응하고 최대한 효율적으로 운영되도록 보장할 것입니다."
 DEN_adjust_industrial_prioritize: "산업 우선순위 조정"
 DEN_adjust_industrial_prioritize_desc: "전쟁이 임박했으니, 전쟁 수행에 생산하고 기여하도록 산업을 조정하여 그에 맞게 행동해야 합니다. 모든 남녀는 국가의 필요에 부응하기 위해 불평 없이 자신의 의무를 이해하고 수행해야 합니다."
 DEN_increase_cooperation: "협력 강화"
 DEN_increase_cooperation_desc: "인정하고 싶지 않겠지만, 우리는 [?DEN.DEN_overlord_nation.GetAdjective]의 침공을 결코 막을 수 없었을 것입니다. 그리고 항복함으로써 우리는 [?DEN.DEN_overlord_nation.GetAdjective] 치하의 다른 어떤 국가도 누리지 못하는 일정 수준의 자치권을 확보했습니다. 따라서 우리는 이 독립을 확보하고 이 관계의 이점을 얻기 위해 우리 종주국과 더 긴밀히 협력하도록 노력해야 합니다."
 DEN_acquire_military_equipment: "군사 장비 획득"
 DEN_acquire_military_equipment_desc: "소국으로서 우리의 군비 생산 능력은 제한적이지만, [?DEN.DEN_overlord_nation.GetFactionName]의 전쟁 수행에 진정으로 기여하기 위해서는 가능한 최고의 장비를 획득해야 합니다. 아마도 우리 동맹국들을 설득하여 보조금 거래로 필요한 무기를 공급받을 수 있을 것입니다."
 DEN_contribute_to_the_war: "전쟁 수행에 기여"
 DEN_contribute_to_the_war_desc: "우리가 [?DEN.DEN_overlord_nation.GetAdjective] 종주국에 대한 우리의 입장과 의도를 분명히 밝혔음에도 불구하고, 그들은 우리가 군대를 더 발전시키는 것을 허용하지 않을 것입니다. 오직 [?DEN.DEN_overlord_nation.GetFactionName]에 가입하고 전쟁 수행에 기여할 것을 서약해야만 육군, 해군, 공군을 개선할 수 있을 것입니다. 그리고 [?DEN.DEN_overlord_nation.GetNameDef]의 지원을 받아 우리는 나머지 북유럽 국가들로 눈을 돌릴 수 있을 것입니다..."
 DEN_secure_the_norwegian_coast: "노르웨이 해안 확보"
 DEN_secure_the_norwegian_coast_desc: "덴마크와 노르웨이는 수세기 동안 통일되어 있었으며, 우리가 북해를 지배하거나 그 너머로 확장하려면 다시 한번 양국을 통일해야 합니다. 노르웨이 해안은 우리가 대서양을 지배하고자 한다면 필수적인 발판입니다."
 DEN_reclaim_atlantic_islands: "대서양 영유지 수복"
 DEN_reclaim_atlantic_islands_desc: "페로 제도와 아이슬란드는 이렇다 할 천연자원은 없지만, 그럼에도 불구하고 우리 영토의 일부이며 북대서양 지배의 발판 역할을 하므로 전략적으로 매우 중요합니다.\n\n그린란드는 현대적이고 효과적인 군대를 운영하는 데 필요한 모든 종류의 천연자원을 실제로 보유한 유일한 지역이므로, 우리의 최우선 과제입니다."
 DEN_claim_sweden: "스웨덴 영유권 주장"
 DEN_claim_sweden_desc: "스웨덴인들은 한때 우리의 가장 치열한 경쟁자였으며 수세기 동안 간헐적으로 우리의 지배하에 있었습니다. 그리고 덴마크와는 반대로, 스웨덴은 현대 군대를 운영하는 데 필요한 풍부한 천연자원을 보유하고 있습니다. 아마도 스웨덴을 다시 한번 우리 세력권에 편입시켜 모든 자원을 우리에게 개방할 때가 온 것 같습니다..."
 DEN_safeguard_the_eastern_front: "동부 전선 수호"
 DEN_safeguard_the_eastern_front_desc: "역사적으로 핀란드는 항상 우리의 손이 닿지 않는 곳에 있었지만, 부활한 우리의 힘으로 핀란드를 우리 패권 아래 둘 수 있는 충분한 능력이 있습니다. 핀란드를 확보하는 것은 동부 전선을 확보하고 발트해에 대한 우리의 통제력을 강화하는 것을 의미합니다."
#Military Branch
 DEN_sign_forsvarsforliget: "국방 협정 체결"
 DEN_sign_forsvarsforliget_desc: "유럽에 다시 긴장이 고조됨에 따라, 우리의 현재 국방 능력이 심각하게 부족하다는 것을 인정해야 합니다. 육군, 해군, 공군에 대한 자금을 늘리기 위한 새로운 국방 협정을 체결하면 우리의 군사 능력을 강화하고 국가의 통합성을 확보할 수 있을 것입니다."
 DEN_stockpile_oil: "석유 비축"
 DEN_stockpile_oil_desc: "최악의 상황에 대비하고 전쟁 준비를 시작해야 합니다. 우리가 전투를 겪지 않더라도, 우리 주변에서 발생하는 주요 분쟁은 우리에게 영향을 미칠 것입니다. 이 영향을 최소화하기 위해 우리는 대규모의 전략 자원을 비축해야 합니다."
 DEN_potential_fuel_silos_tt: "§Y연료 저장고§! 연구 완료 시, §Y2§!개 주에 건설 슬롯 §G1§!개 및 §Y연료 저장고§! §G1§!개 추가."
 DEN_sikkerhedspolitiet: "보안 경찰대"
 DEN_sikkerhedspolitiet_desc: "첩보 기관을 설립하면 유럽의 긴장이 고조되고 분쟁이 우리의 주권을 잠식할 위협이 되는 동안 경계 태세를 강화하는 데 도움이 될 것입니다."
 DEN_expand_vaernepligten: "징병제 확대"
 DEN_expand_vaernepligten_desc: "군은 명목상에 불과한 전력으로, 잠재적인 침략자를 억제할 능력이 전혀 없습니다. 군이 실질적인 국가 방어를 수행하려면, 신속하게 징병제를 확대해야 합니다."
 DEN_haeren_reorganization: "육군 재편성"
 DEN_haeren_reorganization_desc: "덴마크 육군은 규모가 작고 국경을 방어할 준비가 전혀 되어 있지 않습니다. 독립을 유지하고 잠재적인 적을 억제하기 위해 효율적인 중앙 지휘부를 갖춘 효과적인 전투 부대로 재편성해야 합니다."
 DEN_expand_haerens_tekniske_korps: "육군 기술단 확장"
 DEN_expand_haerens_tekniske_korps_desc: "육군 기술단은 무기 공창과 육군 소총 공장을 운영하며, 무기와 탄약을 모두 생산합니다. 이 시설들을 확장하면 소총과 포의 생산량이 증가할 것이며, 이는 당연히 우리의 군사적 역량을 강화할 것입니다."
 DEN_hjemmevaernet: "향토 방위군"
 DEN_hjemmevaernet_desc: "어떠한 침략자로부터든 덴마크를 지키기 위해 일어설 준비가 된 사람들이 많이 있습니다. 우리는 이들의 투지를 활용하여 향토 방위군을 창설해야 합니다. 누군가 어리석게도 우리를 침공할 경우를 대비해서 말입니다."
 DEN_expand_dansk_industri_syndikat: "덴마크 산업 신디케이트 확장"
 DEN_expand_dansk_industri_syndikat_desc: "덴마크 산업 신디케이트, 또는 흔히 알려진 소총 신디케이트는 우리나라 최대의 무기 제조업체이며 우리 군의 마드센 소총을 생산합니다. 이들의 공장에 투자하고 확장하는 것은 국가 안보에 있어 가장 중요한 사안입니다."
 DEN_new_artillery_tactics: "새로운 포병 전술"
 DEN_new_artillery_tactics_desc: "오늘날 육군 기술단은 총기, 포, 탄약을 생산하고 있습니다. 하지만 육군 기술단 내에 실험 부서를 설립하면 우리만의 포를 설계하고 생산할 수 있을 것이며, 이는 군에 큰 이익이 될 것입니다."
 DEN_convert_automobile_production: "자동차 생산 전환"
 DEN_convert_automobile_production_desc: "덴마크 자동차 제조업체에 민간 생산 라인을 전환하여 전쟁에 기여하고 우리의 국방 역량을 지원하도록 명령할 때가 왔습니다. 우리 자체의 트럭 생산을 확보하고 군의 기계화 수준을 높이면 군을 더욱 민첩하고 유연하게 만들 것입니다."
 DEN_slaedepatruljen_sirius: "시리우스 썰매 순찰대"
 DEN_slaedepatruljen_sirius_desc: "덴마크 본토는 겨울에 눈이 거의 오지 않으며, 오더라도 오래 쌓여있지 않습니다. 하지만 우리에게는 일 년 내내 수 킬로미터 두께의 눈이 쌓여 있는 그린란드가 있습니다. 우리는 이를 활용하여 그곳에서 병력을 훈련시켜 추위에 적응하게 할 수 있습니다."
 DEN_generalkommandoen: "총사령부 "
 DEN_generalkommandoen_desc: "잘 훈련되고, 군기가 잡혀 있으며, 제 기능을 다하는 장교들은 성공적인 군대의 근간입니다. 우리는 세계에서 가장 효율적이고 유능한 장교를 양성하는 것을 목표로 삼아야 하며, 이들로 우리의 총참모부를 채워야 합니다."
 DEN_establish_domestic_tank_manufacturing: "국내 전차 생산 기반 구축"
 DEN_establish_domestic_tank_manufacturing_desc: "20세기에 들어 전쟁의 양상은 크게 변했으며, 우리도 그에 맞춰 변해야 합니다. 빠르게 움직이고 강력한 타격을 가하는 군대가 오늘날 전투에서 승리하는 열쇠입니다. 우리 자체의 전차 공급을 확보하는 것은 현대 전장에서의 성공을 보장할 것입니다."
 DEN_expand_ubadsvabnet: "잠수함 부대 확장"
 DEN_expand_ubadsvabnet_desc: "우리의 해안선과 수많은 섬들을 가장 잘 보호하는 방법은 적이 볼 수 없는 것입니다. 대규모 잠수함 함대를 보유하면 발각되지 않고 타격할 수 있으며, 손실 없이 병력을 철수시킬 수 있습니다."
 DEN_add_basic_submarine_tech_tt: "기술 추가: §Y하브만덴급§!"
 DEN_refit_civilian_ships: "구식 함선 개장"
 DEN_refit_civilian_ships_desc: "우리는 우리보다 훨씬 더 큰 해군을 가진 국가들에 둘러싸여 있습니다. 그들의 역량을 따라잡으려면 함선 수를 늘려야 합니다. 충분한 함선이 있다면, 대부분의 해군을 저지할 수 있을 것입니다."
 DEN_refit_civilian_ships_decision_tt: "수송선을 군사 목적으로 개장하는 결단을 잠금 해제합니다."
 DEN_modernize_the_navy: "해군 현대화"
 DEN_modernize_the_navy_desc: "오늘날 최고의 해군들과 대등하게 맞서려면 우리는 양보다 질을 추구해야 합니다. 더 현대적인 함선에 의해 화력과 기동력에서 압도당한다면, 숫자는 우리에게 도움이 되지 않을 것입니다."
 DEN_sovaernets_operative_kommando: "해군 작전 사령부"
 DEN_sovaernets_operative_kommando_desc: "우리 해군을 효율적으로 지휘할 수 있는 유능한 중앙 지휘 체계가 필요합니다. 가장 뛰어나고 총명한 장교들에게만 이 임무를 맡겨야 합니다."
 DEN_appropriate_odense_staalskibsvaerft: "오덴세 철강 조선소 징발"
 DEN_appropriate_odense_staalskibsvaerft_desc: "우리 해군의 규모를 진정으로 확장하려면, 추가적인 생산 능력이 필요합니다. 오덴세에 있는 A.P. 묄러-머스크의 조선소를 장악하면 우리의 생산 수단을 크게 가속할 것입니다."
 DEN_restructuring_sovaernet: "해군 구조조정"
 DEN_restructuring_sovaernet_desc: "수십 년간 평화를 누려온 탓에, 우리 해군 지휘 체계의 여러 결함이 눈에 띄지 않았습니다. 이제 이를 해결할 유일한 방법은 해군을 전면적으로 재편성하는 것입니다."
 DEN_baltic_sea_domination: "발트해 지배"
 DEN_baltic_sea_domination_desc: "러시아 제국이 부상하기 전, 그리고 단명했던 스웨덴 제국 이전부터 덴마크는 발트해 지배를 노렸습니다. 진정으로 독립을 보장하고 국토를 수호하기 위해, 우리는 다시 한번 해상 우위를 통해 발트해 전역을 통제하는 것을 목표로 삼아야 합니다."
 DEN_north_sea_ambitions: "북해의 야망"
 DEN_north_sea_ambitions_desc: "우리나라는 유럽 해안에서 북대서양의 바다에 이르는 광활한 국가입니다. 이 거대한 영역을 보호하고 해외 영토를 확보하기 위해, 우리는 대담하고 야심 찬 계획에 착수해야 합니다. 우리에게 반대하는 어떤 세력과도 이 해역에서 경쟁할 수 있는 북해 함대를 건설하는 것이 우리의 유일한 목적이 되어야 합니다."
 DEN_with_refit_old_ships_completed_tt: "§Y$DEN_refit_civilian_ships$§! 완료 시:"
 DEN_with_modernize_the_navy_completed_tt: "\n§Y$DEN_modernize_the_navy$§! 완료 시:"
 DEN_naval_power_projection: "해군력 투사"
 DEN_naval_power_projection_desc: "크고 강력한 해군을 보유하더라도 우리 영역의 구석구석까지 우리의 의지를 투사할 수 없다면 아무 소용이 없을 것입니다. 해군 기지망으로 우리 영토를 연결하면 해상 지배력을 공고히 할 수 있을 것입니다."
 DEN_baltic_sea_domination_completed_tt: "중점 §Y$DEN_baltic_sea_domination$§! 완료 및 [DEN.GetNameDef](이)가 소유"
 DEN_north_sea_ambitions_completed_tt: "중점 §Y$DEN_north_sea_ambitions$§! 완료 및 [DEN.GetNameDefCap](이)가 소유"
 DEN_fromandskorpset: "Frømandskorpset"
 DEN_fromandskorpset_desc: "최근 육군과 해군의 개선으로 우리 군은 상당히 강화되었습니다. 우리는 이제 바다를 건너 외국의 해안까지, 원한다면 우리의 힘을 널리 투사할 수 있는 충분한 능력을 갖추게 되었습니다."
 DEN_domestic_designs: "국내 설계"
 DEN_domestic_designs_desc: "우리 공군은 역량이 심각하게 부족합니다. 이는 주로 우리가 자체적으로 항공기를 생산하지 않아, 최악의 경우에 맞서 싸울 수량이 부족하기 때문입니다. 우리는 우리만의 항공기를 위한 국내 생산 라인을 구축해야 합니다."
 DEN_foreign_designs: "해외 설계"
 DEN_foreign_designs_desc: "우리의 두 공군 모두 제대로 된 전투기나 폭격기를 설계하고 제작할 능력이 없습니다. 항공기 구매를 위해 다른 곳을 알아봐야 합니다. 설계가 만족스러우면 생산 면허 획득을 검토할 수 있습니다. "
 DEN_unify_flyvevabnet: "Flyvevåbnet 통합"
 DEN_unify_flyvevabnet_desc: "현재 우리에게는 육군의 Hærens Flyvertropper와 해군의 Marinens Flyvevæsen이라는 두 개의 완전히 분리된 공군이 있습니다. 두 부대는 종종 서로 대립합니다. 이들을 하나의 단일 공군 부대로 통합하면 일관된 전략을 수립하고 군의 새로운 병과를 창설할 수 있을 것입니다."
 DEN_flyvertaktisk_kommando: "Flyvertaktisk Kommando"
 DEN_flyvertaktisk_kommando_desc: "두 개의 다른 공군 부대를 하나의 부대로 통합한 것만으로는 충분하지 않습니다. 이 새로운 군 병과가 최대한 효율적이고 응집력 있게 운영되려면, 공군을 적절히 지휘할 수 있는 중앙 지휘 체계를 만들어야 합니다."
 DEN_air_force_power_projection: "공군력 투사"
 DEN_air_force_power_projection_desc: "이제 Flyvevåbnet을 우리 군의 세 번째 주요 병과로 통합했으니, 광활한 우리 영토의 하늘을 확보하는 데 집중할 수 있습니다. 크고 성공적인 공군은 여전히 착륙하고 이륙할 수 있는 공군 기지에 의존합니다."
 DEN_flyveskolen: "Flyveskolen"
 DEN_flyveskolen_desc: "우리의 모든 공군 기술과 지식을 Flyvevåbnet에 집결시켰으니, 이제 합동 훈련 학교를 설립하여 그 전문성을 장교 후보생들에게 전수해야 합니다."
 DEN_torpedofly: "Torpedofly"
 DEN_torpedofly_desc: "우리가 해외 영토를 유지할 수 있는 유일한 방법은 바다를 건너 우리의 힘과 의지를 투사하는 능력입니다. 이를 위해서는 대규모의 해군 및 공군 협력과 전략이 필요할 것입니다."
 DEN_jagerfly: "Jagerfly"
 DEN_jagerfly_desc: "하늘로부터의 파괴적인 폭격에서 도시를 보호하기 위해, 우리는 항공 자원을 집중하여 가능한 최고의 전투기를 만들어야 합니다."
 DEN_luftstotte: "Luftstøtte"
 DEN_luftstotte_desc: "우리 공군의 가장 좋은 활용법은 지상군을 최대한 지원하는 것입니다. 오늘날의 전쟁에서 항공력은 매우 중요해졌지만, 전쟁의 승패는 여전히 지상에서 결정됩니다."
 DEN_bombefly: "폭격기"
 DEN_bombefly_desc: "[DEN.GetNameDef]를 완전히 안전하게 지킬 유일한 방법은 적의 산업 역량을 폭격하고 파괴하는 능력입니다."
 DEN_advanced_flight: "고급 비행술"
 DEN_advanced_flight_desc: "항공 기술은 지난 몇 년간 급속한 발전을 이루었지만, 아직 더 많은 혁신과 개선이 우리를 기다리고 있습니다. 하늘을 진정으로 지배하려면, 기술 발전의 선봉에 서야 합니다!"

