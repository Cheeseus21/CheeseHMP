 FIN_foreign_aircraft_equipment_and_subsidies_tt: "\n§Y우리에게 장비를 판매하려는 국가§!로부터 항공기 장비를 구매합니다. \n§Y우리에게 장비를 판매하려는 국가§!를 대상으로, §Y$small_plane_airframe$§!에 대해 [?ROOT.FIN_basic_subsidies_value|Y2] £GFX_civ_factory_output 만큼의 장비 보조금을 §Y[ROOT.GetName]§!에 추가합니다.\n판매 국가:\n"
 FIN_foreign_armor_equipment_and_subsidies_tt: "\n§Y우리에게 장비를 판매하려는 국가§!로부터 기갑 장비를 구매합니다. \n§Y우리에게 장비를 판매하려는 국가§!를 대상으로, §Y$light_tank_chassis$§!에 대해 [?ROOT.FIN_basic_subsidies_value|Y2] £GFX_civ_factory_output 만큼의 장비 보조금을 §Y[ROOT.GetName]§!에 추가합니다.\n판매 국가:\n"
 FIN_foreign_armor_equipment_only_tt: "\n§Y우리에게 장비를 판매하려는 국가§!로부터 기갑 장비를 구매합니다. \n판매 국가:\n"
 FIN_foreign_aircraft_equipment_only_tt: "\n§Y우리에게 장비를 판매하려는 국가§!로부터 항공기 장비를 구매합니다. \n판매 국가:\n"
 
 SWE_loyalty_laws: "충성법"
 SWE_loyalty_laws_desc: ""
 SWE_organize_a_putsch: "쿠데타 조직"
 SWE_organize_a_putsch_desc: "마침내 [SWE.GetAdjective] 국민들 사이에서 국회(Riksdag)를 장악할 만큼 충분한 지지를 모았습니다. [SWE.GetAdjective]인이라는 것이 무엇을 의미하는지 잊어버린, 그릇된 길을 걷는 민주주의자들과 사회주의자들의 저항이 분명히 있을 것이나, 우리에게는 그들을 간단히 쓸어버릴 힘이 있습니다."
 SWE_delegation_to_berlin: "베를린 파견단"
 SWE_delegation_to_berlin_desc: "우리의 대의를 위해 대중을 규합하는 데 큰 진전을 이루었지만, 아직 국가를 장악할 만큼의 지지는 얻지 못했습니다. 하지만 [GER.GetLeader]이(가) 대가를 받고 우리의 투쟁을 돕기 위해 [GER.GetAdjective] 군대를 파견하는 것에 긍정적일 수 있다는 소문이 있습니다."
 SWE_civil_war_tt: "§R§Y[ROOT.GetFlag][ROOT.GetName]§!에서 국가사회주의자들과 현 정부 사이에 내전이 발발합니다!§!"
 SWE_delegation_to_berlin_tt: "만약 §Y[GER.GetFlag][GER.GetNameDef]§!이(가) 요청을 수락하면, 그들은 내전에서 §Y[ROOT.GetFlag][ROOT.GetAdjective]§! 국가사회주의자들 편에 가담할 것이며 §R[ROOT.GetFlag][SWE.GetNameDefCap]은(는) [GER.GetNameDef]의 괴뢰국이 될 것입니다!§!"
 SWE_king_in_council: "국왕 어전회의"
 SWE_king_in_council_desc: "구스타프 국왕이 왕위에 올랐을 때, 그는 [SWE.GetAdjective] 정치에 막대한 권력을 행사했습니다. 그의 통치 기간 동안, 민주주의에 대한 유토피아적 비전을 가진 이상주의 정치인들에 의해 그의 권위는 조금씩 깎여나갔습니다. 이 부자연스러운 사태는 국왕의 고대 권력을 복원함으로써 되돌려져야 합니다."
 SWE_king_in_council_tt: "§Y왕당파§!가 집권당이 됩니다."
 SWE_restoring_order: "질서 회복"
 SWE_restoring_order_desc: "우리가 영웅적으로 권력을 장악한 이후 대중 사이의 질서가 무너졌습니다. 인구를 우리의 대의로 끌어들이기 위해, 우리는 국가를 다시 위대하게 만들 수 있다는 것을 보여주어야 합니다. 그리고 여전히 우리에게 반대하는 자들은 뿌리 뽑아 제거할 것입니다."
 SWE_the_new_order: "신질서"
 SWE_the_new_order_desc: "적자생존은 우리 신념의 핵심입니다. 따라서, 약해진 [GER.GetName]을(를) 파괴하고 독립적인 강대국으로서 다시 한번 우리 자신을 주장할 때입니다."
 SWE_the_new_order_tt: "$SWE_the_new_order$을(를) 완료하면 우리는 [GER.GetNameDef]의 모든 적과 백색 평화 조약을 맺을 것입니다."
 SWE_the_new_order_tt_2: "§Y[SWE.GetName]§!은(는) §Y$SWE_the_new_order$§!(으)로 알려질 것입니다!"
 SWE_the_new_order_peace_message: "스웨덴이 독일에 반란을 일으켰습니다"
 SWE_mythologize_swedish_history: "반혁명"
 SWE_mythologize_swedish_history_desc: "우리는 국가 기구를 장악했지만, 권력 장악을 공고히 하기 위해 아직 할 일이 많이 남아있습니다. 따라서 우리는 정치적 후원자들을 만족시키는 동시에 우리의 권위에 저항하는 모든 잔존 세력을 뿌리 뽑기 위해 일련의 개혁을 시행할 것입니다."
 SWE_mythologize_swedish_history_tt: "국가주의자들이 권력을 잡는 동안 그들을 지지했던 세력에 대한 이전의 의무를 이행하기 위해 디시전을 해금하고 임무를 활성화합니다. §R의무를 이행하지 않으면 안정도가 급격하게 영향을 받을 것입니다!§!"
 SWE_crisis_affecting_variables: "다음 조건에서 수락할 가능성이 높아집니다:\n -우리에 대한 §Y우호도§!가 높음\n -우리의 §Y군대§!가 더 강력함\n -전쟁 지지도가 §Y40%§! 미만\n -세력에 가입하지 않음"
 SWE_narvik_crisis: "나르비크 위기"
 SWE_narvik_crisis_desc: "나르비크는 동절기 철광석의 주요 수출 경로로서 전략적으로 중요합니다. 이 혼란스러운 시기에 국가 안보를 보장하기 위해, 해당 지역은 우리의 관할권 아래에 두어야 합니다. 그리고 그 과정에서 [NOR.GetName]이(가) 약화된다면 더할 나위 없이 좋을 것입니다."
 SWE_bornholm_crisis: "보른홀름 위기"
 SWE_bornholm_crisis_desc: "보른홀름 제도는 수 세기 전 반란으로 잃었지만, 법적으로 [Den.GetName]에 할양된 적은 없습니다. 발트해 남부를 통제하는 전략적 요충지이지만, [Den.GetName]이(가) 방어할 수 없음은 명백합니다. 우리의 안전을 위해 우리는 그곳의 통제권을 되찾을 수 있으며, 또 그래야만 합니다."
 SWE_the_aland_issue: "올란드 문제"
 SWE_the_aland_issue_desc: "올란드인은 스웨덴어를 사용하고, 스스로를 스웨덴인으로 여기며, 국제 연맹의 간섭만 아니었다면 스웨덴인이었을 것입니다. 그런데 어찌 그들이 스웨덴인이 아니라는 결론에 이를 수 있겠습니까? 이 역사적 불의를 바로잡을 때가 왔습니다."
 SWE_join_the_anti_soviet_pact: "반소련 협정 가입"
 SWE_join_the_anti_soviet_pact_desc: "대부분의 국가는 [SOV.GetNameDef]의 부상을 두려워하지만, 방공 협정의 서명국을 제외하고는 그 영향력 확산을 막기 위해 아무것도 할 의사가 거의 없습니다. 우리 또한 협정에 가입하여 우리의 의도를 명확히 해야 합니다."
 SWE_join_the_anti_soviet_pact_tt: "[GER.GetName]과(와) 세력권을 구축하여, 그들이 §Y2년§! 동안 §Y[DEN.GetName]§!과(와) §Y[NOR.GetName]§!을(를) 공격할 가능성을 매우 낮출 것입니다!"
 SWE_demand_atlantic_resource_rights: "대서양 자원 권리 요구"
 SWE_demand_atlantic_resource_rights_desc: "우리는 성공적으로 [DEN.GetAdjective]의 주권을 잠식해 왔습니다. 이제 다음 단계로, 지역의 잠재적 침략자로부터 보호한다는 명분 아래 대서양에 있는 그들의 영토를 빼앗아야 합니다."
 SWE_demand_demilitarization_of_finnish_border: "핀란드 비무장화"
 SWE_demand_demilitarization_of_finnish_border_desc: "[FIN.GetName] 재통합 계획의 일환으로, 우리는 그들이 동쪽의 [SOV.GetAdjective]에 대항하여 신뢰할 수 있는 방어력을 유지하도록 허용하면서도 그들의 주권을 계속 잠식해야 합니다. 따라서 우리는 우리와의 국경을 비무장화하도록 압박하여, 우리가 그들의 내정에 무력으로 개입해야 할 경우 방어를 어렵게 만들어야 합니다."
 SWE_united_kingdoms_of_sweden_and_norway: "스웨덴-노르웨이 연합왕국"
 SWE_united_kingdoms_of_sweden_and_norway_desc: "나르비크 위기와 그에 따른 우리의 이득 이후, [NOR.GetName]은(는) 약화되고 낙담한 상태입니다. 이제 우리는 [NOR.GetAdjective]의 독립에 최후의 일격을 가하고, 한 명의 통치자 아래 우리 국가들의 재통일을 강제해야 합니다."
 SWE_swedish_finnish_defense_agreement: "스웨덴-핀란드 방위 협정"
 SWE_swedish_finnish_defense_agreement_desc: "[SOV.GetNameDef]의 위협이 해결될 때까지, [FIN.GetAdjective]과(와) 군사적으로 협력하는 것이 우리의 이익에 부합합니다. 언젠가는 그들을 다시 우리 통치하에 두겠지만, 지금은 더 큰 문제에 대처해야 합니다."
 SWE_danish_alignment: "덴마크 동맹"
 SWE_danish_alignment_desc: "[DEN.GetName]은(는) 전략적 요충지에 위치해 있고 이웃 국가들보다 상당히 약하기 때문에, 그들 중 하나가 [DEN.GetAdjective]의 독립을 빼앗으려 시도하는 것은 거의 불가피합니다. 따라서, 우리는 기회를 잃기 전에 먼저 공격해야 합니다."
 SWE_finnish_integration: "동부 왕국령"
 SWE_finnish_integration_desc: "[FIN.GetAdjective]의 주권은 최근 몇 년간 우리에 의해 성공적으로 잠식되었습니다. 이제 우리는 최후의 압박을 가하여 그들이 다시 한번 우리의 정당한 신하로서 제자리를 찾도록 요구해야 합니다. 만약 그들이 기꺼이 그리하지 않는다면, 우리는 그들이 정신을 차리도록 강제할 것입니다."
 SWE_crusade_against_bolshevism: "[AAT_crusade_against_sov]"
 SWE_crusade_against_bol: "볼셰비즘에 맞선 십자군"
 SWE_crusade_against_rus: "러시아 제국주의에 맞선 십자군"
 SWE_crusade_against_bolshevism_desc: "[SOV.GetNameDefCap]은(는) 우리가 수 세기 동안 보아온 전통적인 유럽 가치에 대한 단일 최대 위협입니다. 단순히 봉쇄하는 것만으로는 더 이상 충분하지 않으며, 우리는 볼셰비즘에 맞선 새로운 십자군에 참여하여 그것을 파괴해야 합니다."
 SWE_crusade_against_bolshevism_tt: "\n§Y$SWE_crusade_against_the_eastern_threat$§!이(가) 활성화된 동안 §Y[SWE.GetName]§! 또는 세력 구성원이 다음 주 중 하나를 점령하면:\n§Y[195.GetName]§!,§Y[206.GetName]§!,§Y[202.GetName]§!,§Y[242.GetName]§!,§Y[219.GetName]§!,§Y[137.GetName]§!,§Y[218.GetName]§!,§Y[217.GetName]§!,§Y[252.GetName]§!,§Y[249.GetName]§!,§Y[229.GetName]§!,§Y[247.GetName]§!,§Y[408.GetName]§!,§Y[214.GetName]§! 기간이 365일로 초기화됩니다."
 SWE_reclaiming_the_rus: "루스 수복"
 SWE_reclaiming_the_rus_desc: "우리 조상들은 한때 서부 러시아와 우크라이나의 강을 자주 오가며 강둑을 따라 정착했습니다. 이제 이 지역들을 우리 영토로 통합하고, 식민화를 통해 그들이 시작한 일을 완수할 때입니다."
 SWE_greater_nordic_reich: "대북방 제국"
 SWE_greater_nordic_reich_desc: "오직 힘만으로, 우리는 우리가 스칸디나비아의 명실상부한 주인임을 증명했습니다. 하지만 이것은 우리 민족에게 있어 시작에 불과합니다. 우리가 하나의 리케로 단결함에 따라, 세계는 앞으로 닥쳐올 일에 대비해야 할 것입니다."
 SWE_greater_nordic_reich_tt: "§Y북유럽§! 속국의 핵심주 편입 및 합병을 허용합니다"
 SWE_the_cross_we_bear: "우리가 짊어진 십자가"
 SWE_the_cross_we_bear_desc: "우리는 모두 북유럽의 형제자매입니다. 우리의 북유럽 동포들이 점령하에서 고통받는 동안 [SWE.GetAdjective] 국가는 양심상 좌시할 수 없습니다. 우리 모두가 전쟁과 폭정에서 벗어나 북방에서 살고 죽을 수 있도록, 그들을 족쇄에서 해방시키는 것이 우리의 책무입니다."
 SWE_the_cross_we_bear_tt_1: "점령된 모든 §Y북유럽§! 국가당:"
 SWE_the_cross_we_bear_tt_2: "해방된 모든 §Y북유럽§! 국가당: "
 SWE_the_cross_we_bear_tt_3: "§Y$SWE_the_cross_we_bear$§!의 힘을 다음만큼 증가시킵니다:"
 SWE_scandinavian_defense_union: "스칸디나비아 방위 연합"
 SWE_scandinavian_defense_union_desc: "최근의 분쟁들은 고립된 중립을 고집하는 것이 극도로 위험하다는 것을 보여주었습니다. 미래에 적에게 포위당하는 것을 피하려면, 우리 중 누구라도 공격받을 경우 서로를 방어하기 위해 북유럽 이웃 국가들과 협정을 맺어야 합니다."
 SWE_the_threat_of_the_iron_curtain: "철의 장막의 위협"
 SWE_the_threat_of_the_iron_curtain_desc: "전 세계 대부분을 휩쓴 최근의 분쟁에도 불구하고 승전국들 사이에 긴장이 고조되고 있습니다. 발트해의 통제권을 놓고 다투는 적들에게 각개격파당하는 것을 피하려면, 우리는 같은 생각을 가진 국가들의 동맹에 가입하여 그들을 억제해야 합니다."
 SWE_special_forces: "특수부대 투자"
 SWE_special_forces_desc: "현대전은 험준한 지형에서 임무를 수행하거나 증원 없이 적진 후방에서 활동할 수 있는 소규모 특수 부대를 필요로 할 때가 있습니다. 따라서 우리는 필요시 [SWE.GetAdjective] 군의 선봉대 역할을 할 수 있는 특수부대 분과를 창설해야 합니다."
 SWE_acquire_ww2_tanks_and_wrecks: "전장 전차 잔해 획득"
 SWE_acquire_ww2_tanks_and_wrecks_desc: "유럽 전역의 먼지가 가라앉으면서, 전장에는 수많은 버려진 전차들이 널려 있습니다. 이는 우리 자체 설계를 개선하기 위한 연구 및 개발에 사용할 수 있습니다. 다른 이들이 이 전리품들을 차지하기 전에, 우리가 이 상황을 이용할 때가 된 것 같습니다."
 SWE_extend_the_time_of_preparedness: "준비 태세 기간 연장"
 SWE_extend_the_time_of_preparedness_desc: "일부는 [ROOT.GetName]의 상황이 즉시 정상으로 돌아가기를 바라지만, 지평선 너머에는 더 많은 위협이 도사리고 있습니다. 국가 방어 능력을 유지하기 위해, 우리는 현재의 준비 태세와 총력 방위에 대한 헌신을 계속해야 합니다."
 SWE_increase_intelligence_funding: "첩보 자금 증액"
 SWE_increase_intelligence_funding_desc: "최근 몇 년간 [SWE.capital.GetCapitalVictoryPointName]은 첩보 활동의 중심지가 되었습니다. 우리의 이익이 위협받기 전에 첩보 기관이 신기술을 개발하고 그러한 활동을 감시하는 데 더 적극적인 역할을 할 수 있도록, 자금 지원을 늘려야 합니다."
 SWE_karnvapenprogram: "Kärnvapenprogram"
 SWE_karnvapenprogram_bonus: "Kärnvapenprogram 보너스"
 SWE_karnvapenprogram_nuclear_bonus: "Kärnvapenprogram 핵 보너스"
 SWE_karnvapenprogram_air_bonus: "Kärnvapenprogram 공군 보너스"
 SWE_ger_swe_nuclear_bonus: "독일-스웨덴 우란프로옉트 보너스"
 SWE_karnvapenprogram_desc: "원자 무기의 개발로, 우리의 국가 안보를 진정으로 보장할 유일한 방법은 우리 자신의 무기와 적절한 투발 체계를 개발하는 것입니다. 원자력 에너지와 재래식 무기 개발을 위장하여, 우리는 강대국들을 자극하지 않고 이를 수행할 수 있습니다."
 SWE_specialized_equipment: "특수 군사 장비"
 SWE_specialized_equipment_desc: "신규 특수부대의 훈련은 순조롭게 진행되고 있습니다. 하지만, 임무를 위한 특수 장비와 차량이 있다면 부대가 더 효과적일 수 있다는 점이 명백해지고 있습니다."
 SWE_specialized_equipment_tt: "이전에 선택한 특수부대(레인저, 공수부대 또는 해병대)에 따라 특수 장비를 잠금 해제합니다."
 SWE_something_something_neutrality_butt_really: "어쩌고 저쩌고 중립 근데 진짜"
 SWE_something_something_neutrality_butt_really_desc: "추가 예정"
 SWE_the_lion_of_the_north_rises: "북방의 사자가 일어나다"
 SWE_the_lion_of_the_north_rises_desc: "너무나도 오랫동안 스웨덴은 세계 열강의 투쟁에서 방관자로 남아있었습니다. 그 때문에 우리는 강대국들의 터무니없는 요구와 봉쇄에 시달려야 했습니다. 그런 시대는 끝났습니다. 북방의 사자가 다시 한번 일어나 이 지역의 지도자로서 제자리를 찾을 것입니다."
 SWE_preemptive_strike: "선제 타격"
 SWE_preemptive_strike_desc: "많은 이들이 분쟁을 뒤로하고 싶어 하지만, 우리는 같은 실수를 반복할 여유가 없습니다. 우리는 적들이 너무 강력해지거나, 더 나아가 자체적으로 원자 무기를 개발하기 전에 그들을 타격해야 합니다. 신속하고 강력하게 공격한다면, 적의 허를 찌를 수 있을 것입니다."
 SWE_war_games: "전쟁 모의 훈련"
 SWE_war_games_desc: "우리의 지정학적 입장에 관해 우리와 적들 사이에 더는 가식이 존재하지 않습니다. 따라서, 군대를 동원해 그 적들과의 분쟁을 예상하는 전쟁 모의 훈련을 실시해도 잃을 것이 없습니다."
 SWE_scramble_for_the_baltic: "발트해 쟁탈전"
 SWE_scramble_for_the_baltic_desc: "현재 발트 국가들이 차지한 영토는 수 세기 전 스웨덴 제국의 영토였습니다. 광활한 발트해에 대한 우리의 패권을 다시 주장하려면, [GER.GetAdjective]이나 [SOV.GetAdjective]이 우리를 앞지르기 전에 신속하게 행동하여 이 영토들을 되찾아야 합니다."
 SWE_economic_integration: "[GER.GetNameDef]와(과) 경제 통합"
 SWE_economic_integration_desc: "피비린내 나는 권력 장악 이후, 국가는 폐허가 되었고 재건이 절실한 상황입니다. 산업이 만신창이가 된 지금, 우리는 [GER.GetAdjective]의 경제적 힘을 활용하기 위해 우리 산업을 더 넓은 [GER.GetAdjective] 경제와 통합하려 노력해야 합니다."
 SWE_economic_independence: "경제적 독립 유지"
 SWE_economic_independence_desc: "우리의 영광스러운 혁명에 대한 [GER.GetAdjective]의 지원에 감사하지만, 그들의 또 다른 속주가 될 생각은 없습니다. 경제를 재건하기 위해, 우리는 무엇보다도 경제적 독립을 촉진하는 방식으로 경제 구조를 짜야 합니다."
 SWE_military_integration: "[GER.GetNameDef]와(과) 군사 통합"
 SWE_military_integration_desc: "스웨덴인들은 전쟁 수행 방법을 잊었지만, [GER.GetNameDef]와의 유대를 바탕으로 그 지식을 복원할 기회가 있습니다. 우리 군을 그들의 군과 통합함으로써, 우리는 볼셰비즘으로부터 유럽을 해방하는 데 기여하고 그 과정에서 [SWE.GetAdjective] 국민을 강인하게 만들 수 있습니다."
 SWE_military_independence: "독립적인 군대 유지"
 SWE_military_independence_desc: "집 가까이에 더 시급한 문제들이 있는데, 어째서 [SWE.GetAdjective] 병사들이 알프스나 북아프리카에서 [GER.GetNameDef]를 위해 죽어야 합니까? 우리는 군사적 독립을 유지하고 국경의 위협에 대비하여 힘을 길러야 합니다."
 SWE_germanify_sweden: "게르만 문화 수용"
 SWE_germanify_sweden_desc: "많은 이들이 우리가 별개의 민족이라고 주장하지만, 최근의 경험은 스웨덴이 피로 맺어진 게르만 형제단의 일원임을 보여주었습니다. 이제 우리는 외세의 영향력이라는 잔재를 모두 떨쳐내고 다시 한번 우리의 게르만 뿌리를 받아들여야 할 때입니다. "
 SWE_promote_nordic_identity: "북유럽 정체성 증진"
 SWE_promote_nordic_identity_desc: "북유럽과 [GER.GetAdjective] 문화 사이에 유사점이 있을 수 있지만, 우리는 [GER.GetAdjective]이 아닙니다. 스칸디나비아와 핀란드 국민은 영겁의 세월에 걸친 고유의 문화와 전통을 가지고 있으며, 이는 다른 모든 것으로부터 신성시되고 수호되어야 합니다."
 SWE_finland_claims: "우리의 핀란드 영유권 주장 인정"
 SWE_finland_claims_desc: "[FIN.GetNameDef]의 영토는 마땅히 우리의 지배권 하에 있으며, 새로 얻은 힘으로 우리는 그곳에 대한 통제권을 다시 주장할 수 있습니다. 그러나 이 지역의 최근 분쟁으로 지정학적 상황이 복잡해졌습니다. 따라서, 우리의 주장에 힘을 싣기 위해서는 [GER.GetNameDef]의 지원이 필요합니다."
 SWE_establish_nordland: "노르트란트 국가보호령"
 SWE_establish_nordland_desc: "우리는 [GER.GetNameDef]의 지도 아래 잿더미에서 일어나, 이전보다 더욱 강해졌습니다. 이제, 대의에 대한 충성의 대가로 동쪽 깊숙이 우리의 지배권을 확장하는 보상을 받게 될 것입니다."
 SWE_establish_nordland_tt: "§Y[SWE.GetNameDef]§!은(는) 이제 §Y$SWE_establish_nordland$§!(으)로 알려질 것입니다!"
 SWE_uranium_project: "[GER.GetAdjective]-[SWE.GetAdjective] 우란프로옉트 "
 SWE_uranium_project_desc: "[GER.GetAdjective] 과학자들은 수년간 핵 연구에 종사해 왔습니다.그들은 원자의 에너지가 단 한 번의 거대한 폭발로 방출될 수 있다고 주장합니다. 실험용 중수를 확보하고 우리의 과학적 전문 지식을 결합한다면, 우리는 그들이 그런 경이로운 무기를 만드는 것을 도울 수 있을지도 모릅니다."
 SWE_betray_germany_plan: "스웨덴 제국을 향하여"
 SWE_betray_germany_plan_desc: "[GER.GetNameDefCap]은(는) 전선을 너무 넓혔기에 붕괴할 운명입니다. 따라서 우리는 그들의 종말을 가속화하여 우리 자신의 미래를 확보할 계획을 세워야 합니다. 하지만 이는 [GER.GetNameDef]의 적들이 우리와 단독으로 평화 조약을 맺을 의향이 있을 때만 가능할 것입니다…"
 SWE_undermine_the_fascists: "파시스트 약화"
 SWE_undermine_the_fascists_desc: "권력을 노리는 파시스트들은 분노한 오합지졸에 불과하며, 기회가 주어진다면 국가를 파멸로 이끌 것입니다. 우리는 그들에 대한 지지를 약화시키고 모든 진정한 애국자들이 국왕에게 충성을 다하도록 해야 합니다."
 SWE_revoke_anti_militia_laws: "반민병대법 폐지"
 SWE_revoke_anti_militia_laws_desc: "의회의 근시안적인 정치인들은 뭉크스카 코렌의 실체가 드러난 이후 1934년에 준군사조직의 창설을 금지했습니다. 우리 가운데 수많은 사회주의자와 다른 반역자들이 있는 상황에서, 우리는 금지령을 뒤집고 국가를 안전하게 지키기 위해 새로운 돌격대 병력을 창설해야 합니다."
 SWE_revoke_anti_militia_laws_tt: "새로운 §Y돌격대§! 민병 사단 편제를 생성하고, [SWE.GetFascistParty]이(가) 집권한 후 §Y돌격대 민병대 모집§!을(를) 잠금 해제합니다."
 SWE_unify_the_national_socialist_movement: "국가사회주의 운동 통합"
 SWE_unify_the_national_socialist_movement_desc: "국가사회주의 운동은 무수히 많은 파벌로 나뉘어 서로를 비난하는 사소한 사설을 쓰거나 거리에서 난투를 벌이고 있습니다. 정부를 구성할 기회를 얻으려면 단일 지도자와 그의 메시지를 중심으로 단결해야 합니다."
 SWE_unify_the_national_socialist_movement_tt_1: "이벤트에서 다음 중 하나를 선택할 수 있습니다:"
 SWE_unify_the_national_socialist_movement_tt_2: "또는:"
 SWE_unify_the_national_socialist_movement_tt_3: "돌격대가 모집된 주에서 행진을 통해 파시스트 지지도를 높이는 디시전을 잠금 해제합니다."
 SWE_meet_with_the_king: "국왕 알현"
 SWE_meet_with_the_king_desc: "[SWE.GetName]에서 고조되는 민족주의가 국왕의 주목을 끌었습니다. 국왕은 이 지지를 결집한 주요 인물들에게 왕궁에서 만나 그들의 의도를 논의할 것을 요청했습니다."
 SWE_meet_with_the_king_tt: "[SWE.GetName]의 왕실 순방을 통해 왕당파 운동에 대한 지지를 높이는 디시전을 잠금 해제합니다."
 SWE_attack_Landsorganisationen: "스웨덴 노동조합 총연맹 공격"
 SWE_attack_Landsorganisationen_desc: "사회민주당은 우리가 국가를 볼셰비즘으로부터 구하기 위해 극복해야 할 주요 장애물입니다. 사소한 선거에서 직접 싸우기보다는, 우리의 자원을 사용하여 당에 자금을 대는 노동조합에 대중이 등을 돌리게 할 것입니다."
 SWE_appeal_for_support: "지지 호소"
 SWE_appeal_for_support_desc: "[SWE.GetName]의 귀족 기득권층은 수십 년에 걸쳐 그들의 권력과 영향력이 약화되는 것을 보았지만, 아직 완전히 사라지지는 않았습니다. 그들의 지지와 자원을 결집함으로써, 우리는 국가를 더 자연스러운 형태의 정부로 되돌릴 수 있습니다."
 SWE_appeal_for_support_tt: "민족주의 운동에 대한 정치적 지지를 얻기 위한 §Y'지지 호소' 디시전§!을(를) 잠금 해제합니다."

 SWE_align_more_closely_with_the_landsorganisationen: "스웨덴 노동조합 총연맹과 긴밀히 협력"
 SWE_align_more_closely_with_the_landsorganisationen_desc: "강력한 노동조합과 노동자 보호는 현대 노동력에 필수적입니다. 우리는 모든 노동자의 발전을 위해 이들 노조와 강력한 유대를 형성할 것입니다."
 SWE_align_more_closely_with_the_landsorganisationen_tt: "고문 잠금 해제:\n"
 SWE_socialist_reforms: "사회주의 개혁"
 SWE_socialist_reforms_desc: "이제 의회에서 충분한 권력을 얻었으므로, 진정한 사회주의 공화국을 위한 기반을 닦기 시작할 수 있습니다. 우리의 입지를 확보하기 위해, 우리는 부르주아지의 영향력을 축소하고 프롤레타리아의 지지를 얻기 위한 개혁을 신속하게 도입해야 합니다."
 SWE_socialist_reforms_tt: "이제 §Y국민의 집§!이(가) §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§!의 25%에 해당하는 §Y연구§! 보너스를 제공합니다.\n이제 §Y국민의 집§!이(가) §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§!의 50%에 해당하는 §Y$BONUS_PRODUCTION_EFFICIENCY_CAP_FACTOR$§! 보너스를 제공합니다."
 SWE_ture_nerman_tt: "$SWE_ture_nerman$"
 SWE_fredrik_strom_tt: "$SWE_fredrik_strom$"
 SWE_zeth_hoglund_tt: "$SWE_zeth_hoglund$"
 SWE_police_reforms: "반혁명 방지"
 SWE_police_reforms_desc: "우리의 정책은 당연하게도 부르주아지와 귀족층 사이에 매우 강력한 적들을 만들고 있습니다. 그들이 반혁명을 일으키는 것을 막으려면, 우리는 신속하게 행동하여 그들을 뿌리 뽑고, 프롤레타리아 내의 모든 잠재적 계급 배반자들도 함께 제거해야 합니다."
 SWE_refuge_from_war: "전쟁으로부터의 피난처"
 SWE_refuge_from_war_desc: "전쟁은 필연적으로 새로운 체제 하에서 목숨을 위협받는 이들의 대탈출로 이어집니다. 도망치는 이들 중 다수는 우리에게 이익이 될 기술을 가지고 있습니다. 따라서, 우리는 분명 상호 이익이 되는 협정을 찾을 수 있을 것입니다."
 SWE_refuge_from_war_tt: "현재 공산주의가 아닌 모든 국가로부터 해당 국가의 공산주의 지지율에 비례하여 인력을 획득합니다. §Y북유럽 국가§!와 §Y열강§!은 더 많은 인력 지분을 제공하며, §Y약소국§!은 더 적은 인력 지분을 제공하여, 총 획득 가능한 인력은 §G+80000§!입니다.\n현재 세계 정세에 기반한 총 획득 인력: §G+[?SWE_refugee_from_war_total_manpower_gained]§!\n가장 적은 인력을 제공하는 국가: §Y[?SWE_refugee_min_manpower_country.GetName]§!: §G+[?SWE_refugee_min_manpower_gained]§!\n가장 많은 인력을 제공하는 국가: §Y[?SWE_refugee_max_manpower_country.GetName]§!: §G+[?SWE_refugee_max_manpower_gained]§!\n국가당 평균 획득 인력: §G+[?SWE_refugee_from_war_average_manpower_per_country]§!"
 SWE_refuge_for_revolutionaries: "혁명가들의 피난처"
 SWE_refuge_for_revolutionaries_desc: "사회주의는 필연적이지만, 여전히 분쟁에서 패배하거나 프롤레타리아를 배신한 국가에 갇힌 혁명가들이 있습니다. 우리는 그러한 모든 혁명가들이 [SWE.GetName]에서 목적과 안전을 찾을 수 있음을 분명히 할 것입니다."
 SWE_refuge_for_revolutionaries_tt: "다른 국가의 공산주의 고문들이 모국의 정치 상황에 따라 [SWE.GetName](으)로 이전할 것입니다. 현재 다음 고문들이 [SWE.GetName](으)로 이전할 것입니다:"
 SWE_liquidate_the_monarchy: "군주제 청산"
 SWE_liquidate_the_monarchy_desc: "[SWE.GetName]의 기생적인 군주제 제도를 영원히 해체할 때가 왔습니다. 왕가와 더 넓은 귀족층은 작위를 박탈당하고 그들의 부는 인민에게 재분배될 것입니다. "
 SWE_establish_politburo: "정치국 수립"
 SWE_establish_politburo_desc: "권력을 박탈당한 부르주아지와 귀족은 더 이상 존재하지 않습니다. 따라서, 우리는 그들의 영향력의 마지막 흔적인 국회를 해산할 것입니다. 그 자리에, 우리는 새로운 노동자 정부를 수립할 것입니다. "
 SWE_five_year_plan: "국가 계획 위원회"
 SWE_five_year_plan_desc: "정치국 수립과 모든 산업의 국유화에 따라, 이제 우리는 경제 문제를 감시하고 정치국 중앙위원회에 정책 결정을 권고할 기관이 필요합니다. "
 SWE_peoples_commissar_for_defense: "국방인민위원"
 SWE_peoples_commissar_for_defense_desc: "언젠가, 세계의 노동자들이 단결하면 모든 국경은 사라질 것입니다. 그날까지, 우리는 경계를 늦추지 않고 우리 영토에 대한 어떠한 침입에도 대비해야 합니다. 우리의 국방을 감독하기 위해, 우리는 구 귀족의 영향력에서 벗어난 새로운 국방부를 설립해야 합니다."
 SWE_starve_the_fascists_of_iron: "적들의 철을 고갈시켜라"
 SWE_starve_the_fascists_of_iron_desc: "우리는 미래의 적들을 달래다가 그들이 우리의 자원을 사용하여 우리에게 전쟁을 거는 것과 같은 실수를 반복하지 않을 것입니다. 오늘부터, 우리는 탐나는 철광석을 포함한 모든 자원의 수출을 금지할 것입니다."
 SWE_finnish_buffer_state: "핀란드 완충국"
 SWE_finnish_buffer_state_desc: "[SOV.GetNameDef]이(가) [SWE.GetAdjective] 문제에 있어 자신들의 이익에 더 부합하는 누군가가 통제하기를 선호할 것이라는 점에는 의심의 여지가 거의 없습니다. 우리 사이에 분쟁이 발생하는 것을 막기 위해, [FIN.GetName]이(가) 우리의 이익에 부합하는 완충국이 되는 것이 중요합니다."
 SWE_support_norwegian_communists: "노르웨이 공산주의자 지원"
 SWE_support_norwegian_communists_desc: "[NOR.GetName]이(가) 부르주아 통치에서 해방될 때까지 우리는 결코 완전히 안전할 수 없습니다. 그러나, 그들은 우리가 강요하는 사회주의 정부를 결코 받아들이지 않을 것입니다. 따라서, 우리는 기존 질서를 전복하려는 [NOR.GetAdjective] 공산주의자들의 투쟁을 지원해야 합니다."
 SWE_support_danish_communists: "덴마크 공산주의자 지원"
 SWE_support_danish_communists_desc: "발트해와 북해 사이의 [DEN.GetName]의 전략적 위치는 우리 국가 안보에 대해 용납할 수 없는 수준의 통제력을 부여합니다. 그들이 우리를 배신하지 않도록 보장하는 유일한 방법은 [DEN.GetAdjective] 공산주의 운동을 지원하고 그곳에 우호적인 정권을 수립하는 것입니다."
 SWE_sami_reconcilliation: "사미족과의 화해"
 SWE_sami_reconcilliation_desc: "사미족은 수세기 동안 국가들이 그들의 역사적인 땅을 빼앗고 권리를 축소하면서 고통받아 왔습니다. 우리는 보상을 하고 사미족과의 화해 과정을 시작하기 위해 우리가 할 수 있는 모든 것을 할 것입니다."
 SWE_deep_mining_complexes: "심층 채광 단지"
 SWE_deep_mining_complexes_desc: "[SWE.GetName]은(는) 지하에 갇힌 풍부한 천연자원을 보유하고 있습니다. 우리는 그 자원을 더 잘 활용하기 위해 광업 부문에 대한 투자를 늘려야 합니다. 추가로, 광산을 파괴하여 적들이 원했을 바로 그것에 대한 접근을 차단함으로써 우리에 대한 공격을 억제할 수 있습니다."
 SWE_affordable_housing: "저렴한 주택 공급"
 SWE_affordable_housing_desc: "도시의 주거 수준이 개선되기 시작했지만, 너무 많은 사람들이 여전히 감당할 수 없는 임대료 때문에 빈곤에 갇혀 있습니다. 우리는 상황을 개선하기 위해 모든 사람이 저렴한 주택을 이용할 수 있도록 보장해야 합니다."
 SWE_continue_the_second_industrial_revolution: "제2차 산업 혁명 지속"
 SWE_continue_the_second_industrial_revolution_desc: "지속적인 산업화는 우리 인민의 번영과 안전 증진의 핵심입니다. 따라서, 우리는 신기술의 힘을 활용하고 [SWE.GetName] 전역에서 더욱 빠른 속도의 산업화를 추구해야 합니다."
 SWE_paid_holidays: "국가 유급 휴가"
 SWE_paid_holidays_desc: "노동자와 기업 간의 큰 긴장 원인은 휴가 문제였습니다. 민간 부문은 법을 어기지 않는 선에서 노동자를 지원하는 최소한의 조치만 취하면서 이익을 극대화할 뿐입니다. 이제는 국가가 개입하여 변화를 위해 노동자에게 이익이 되도록 휴일을 규제할 때입니다."
 SWE_paid_holidays_policy_tt: "연중 대부분의 기간 동안 §G+3%§! §Y안정도§! 및 §G+5%§! §Y건설 속도§!.\n연중 30일 동안 §Y+20% 민간 소비재§!"
 SWE_privately_managed_holidays: "민간 관리 휴가"
 SWE_privately_managed_holidays_desc: "국가는 기업의 운영 방식에 간섭할 여지가 없습니다. 따라서, 우리는 민간 부문이 자체적인 휴가 정책을 통제하도록 허용할 것입니다. 노동자들이 이를 마음에 들어 하지 않는다면, 다른 일자리를 찾으면 됩니다."
 SWE_kockums: "코쿰스"
 SWE_kockums_desc: "코쿰스는 해군을 위한 함선과 잠수함을 생산할 능력이 있음을 입증했습니다. 우리는 이들의 운영을 확장하고 생산 가능한 함선의 생산량을 늘려야 합니다. "
 SWE_gotaverken: "예타베르켄"
 SWE_gotaverken_desc: "해군을 현대화하기 위해, 우리는 예타베르켄의 조선소를 확장하고 군함 건조를 위한 새로운 제조 기술에 투자해야 합니다."
 SWE_refit_gotaverken_for_rapid_repairs: "신속 수리를 위한 예타베르켄 개장"
 SWE_refit_gotaverken_for_rapid_repairs_desc: "조선소를 수리에 전념시키는 것은 함선 건조 속도를 감소시킬 수 있지만, 함대를 전투 가능한 상태로 유지하는 우리의 능력은 상당히 향상될 것입니다."
 SWE_retool_dockyards: "조선소 설비 교체"
 SWE_retool_dockyards_desc: "강대국과 경쟁하려 하기보다는 소형 함선과 잠수함에 노력을 집중하는 것이 우리의 강점을 활용하는 길이 될 것입니다. "
 SWE_archapeligo_harrasment: "군도 교란 작전"
 SWE_archapeligo_harrasment_desc: "우리의 해안은 잠재적인 침략자에게 장애물입니다. 하지만 해군에 필요한 자원을 제공한다면, 군도에 대한 우리의 지리적 이점을 더 활용하여 해당 지역의 적함을 더 효과적으로 교란할 수 있을 것입니다."
 SWE_unrestricted_submarine_warfare: "무제한 잠수함 작전"
 SWE_unrestricted_submarine_warfare_desc: "잠수함은 교체 비용이 훨씬 더 비싼 수송선과 적 군함을 교란할 수 있는 능력을 제공합니다. 우리는 잠수함을 활용하여 우리 해군과 적대국 해군 사이의 군비 격차를 줄여야 합니다. "
 SWE_lindholmens_varv: "린드홀멘스 바르브"
 SWE_lindholmens_varv_desc: "린드홀멘스 바르브는 최근 몇 년간 민간 선박 건조에 집중해 왔습니다. 약간의 개조를 통해, 이들의 조선소를 해군의 확장과 현대화를 지원하도록 전환할 수 있습니다. "
 SWE_italian_destroyers: "이탈리아 구축함 구매"
 SWE_italian_destroyers_desc: "함선을 처음부터 건조하는 것은 비용이 많이 듭니다. 하지만, 많은 국가들이 자국의 구형 함선 일부를 판매할 의향이 있을 수 있습니다. 예를 들어, [ITA.GetNameDefCap]은(는) 이미 매우 합리적인 가격으로 우리에게 다수의 구축함을 판매하는 데 관심을 보였습니다."
 SWE_italian_ships_tt: "[ROOT.GetFlag][ROOT.GetName]에 다음 효과 발생: \n "
 SWE_italian_ships_tt_2: "\n§R[ENG.GetNameDefCap]이(가) 함선 인도를 가로채려 시도할 수 있습니다!§!"
 SWE_rule_the_baltic: "발트해의 지배자"
 SWE_rule_the_baltic_desc: "발트해가 우리의 확고한 통제하에 들어오기 전까지 [SWE.GetName]은(는) 안전하지 않을 것입니다. 이를 위해, 우리는 이웃 국가들의 최고 설계 함선과 맞설 수 있는 대형 함선 건조 전문 지식을 습득해야 합니다."
 SWE_defense_act: "국방법"
 SWE_defense_act_tt: "§Y다가오는 선거에서 정치 지도자들을 개편할 수 있게 될 것입니다§!"
 SWE_defense_act_desc: "유럽에 다시 전쟁의 그림자가 드리우고 있으며 릭스다그에서는 어려운 선택을 내려야 합니다. 국방법의 통과와 그로 인해 연립 정부가 분열될 가능성보다 더 시급한 문제는 없습니다. "
 SWE_strike_the_capitalist_beast_down: "자본주의라는 괴물을 타도하라"
 SWE_strike_the_capitalist_beast_down_desc: "스웨덴의 노동 계급은 너무나 오랫동안 부르주아의 억압 아래 고통받아 왔습니다. 사회민주당은 자본주의의 가혹함을 완화할 수 있다고 믿지만, 오직 사회주의자들만이 유권자에게 진실을 말합니다. 자본주의는 고쳐질 수 없으며, 폐지되어야만 합니다."
 SWE_social_democracy: "사회 민주주의"
 SWE_social_democracy_desc: "사회민주당은 공포나 분노가 아닌 희망에 기반한 스웨덴의 비전을 가지고 있습니다. 사회에서 가장 도움이 필요한 이들을 지원함으로써 모두를 위한 안정과 행복을 이룰 수 있다는 희망입니다. 우리의 협력과 친절을 통해, 마침내 인민의 집을 건설할 것입니다."
 SWE_as_the_barometer_falls: "기압계가 떨어지면서"
 SWE_as_the_barometer_falls_desc: "원인이 무엇이든 간에, 우리 영토에 대한 침공에 방심할 여유가 없습니다. 따라서, 우리는 군대가 그러한 모든 시나리오에 대처할 수 있는 비상 계획과 적절한 훈련을 갖추도록 보장해야 합니다. "
 SWE_the_old_enemy_stirs: "오랜 숙적이 깨어난다"
 SWE_the_old_enemy_stirs_desc: "피비린내 나는 내전과 10년간의 대규모 산업화 이후, [SOV.GetNameDef](은)는 구 러시아 제국의 영토와 그 너머에 대한 통제권을 다시 주장하려 하고 있습니다. 만약 우리가 [SOV.GetName]의 영향권에 갇히는 것을 피하고 싶다면, 신속하게 행동하고 전쟁을 준비해야 합니다."
 SWE_license_skf_ball_bearings: "SKF 볼베어링"
 SWE_license_skf_ball_bearings_desc: "SKF는 볼베어링 생산에서 세계적인 선두 주자가 되었으며, 이는 많은 현대 군용 차량 생산에 매우 중요합니다. 우리는 교전국과의 무역 협상에서 이를 유리하게 활용해야 합니다."
 SWE_en_svensk_tiger: "스웨덴 호랑이"
 SWE_en_svensk_tiger_desc: "적들이 우리에 대해 수집할 수 있는 모든 정보는 우리의 국가 안보를 저해하는 데 사용될 수 있습니다. 이를 방지하기 위해, 강력한 호랑이처럼 강하고 침묵하는 것이 [SWE.GetAdjective] 국민성의 일부가 되어야 합니다."
 SWE_swedes_not_sweden_to_finlands_aid_post_fin_war: "스웨덴이 아닌 스웨덴인이 핀란드를 돕는다"
 SWE_swedes_not_sweden_to_finlands_aid_pre_fin_war: "스웨덴 의용군단"
 SWE_swedes_not_sweden_to_finlands_aid: "[SWE_FinnishVolunteerFocusLoc]"
 SWE_swedes_not_sweden_to_finlands_aid_desc: "정부는 국가의 중립을 깨지 않고서는 [FIN.GetName]을(를) 군사적으로 적극 지원할 수 없지만, 우리의 북유럽 이웃을 방어하기 위해 의용군으로서 목숨을 바칠 준비가 된 수천 명의 [SWE.GetAdjective] 시민들이 있습니다."
 SWE_swedes_not_sweden_to_finlands_aid_tt: "\n다음으로 자동 업그레이드됩니다: "
 SWE_swedes_not_sweden_to_finlands_aid_tt_2: "[FIN.GetName]이(가) 열강과 전쟁 중일 때"
 SWE_finlands_cause_is_ours: "핀란드의 대의는 우리의 대의"
 SWE_finlands_cause_is_ours_desc: "[FIN.GetName]을(를) 향한 [SOV.GetAdjective]의 침략은 언젠가 불가피하게 우리를 겨냥하게 될 것입니다. 현재의 분쟁에 무관심하게 남아있기보다는, 오래된 위협을 물리치는 데 있어 [FIN.GetAdjective]과(와) 함께해야 합니다. "
 SWE_coalition_war_cabinet: "민주 전시 내각"
 SWE_coalition_war_cabinet_desc: "최근 전 세계에서 일어난 사건들은 국가를 뒤흔들었고 분쟁이 [SWE.GetName]으로 확산될 것이라는 두려움을 불러일으켰습니다. 이 어려운 시기에 통합감을 증진하기 위해, 우리는 국회의 주요 정당들의 주요 인사들로 구성된 연립 전시 내각을 구성할 것입니다."
 SWE_coalition_war_cabinet_tt: "§Y현재 지도자에게 특성을 추가하는 디시전 잠금 해제§!"
 SWE_the_aland_question: "[145.GetName] 문제"
 SWE_the_aland_question_desc: "[SOV.GetNameDef]이(가) [FIN.GetName]에 대한 통제권을 다시 주장하려 함에 따라, 우리는 그들이 [145.GetName]의 전략적 영토에 대한 통제권을 얻도록 허용할 수 없습니다. 우리 해안 바로 옆에 위치한 이 섬들은 [SOV.GetAdjective]의 공군력과 해군력을 [SWE.GetAdjective] 영토 깊숙이 투사하는 데 사용될 수 있습니다."
 SWE_the_aland_question_tt: "§Y[SWE.GetName]§!이(가) §Y[FIN.GetName]§!보다 훨씬 큰 군대를 보유하고 있지 않는 한, §Y[FIN.GetName]§!은(는) §Y§Y$SWE_the_aland_issue$§!§!에서보다 이 시나리오에서 §Y올란드§!의 통제권을 넘겨주는 것을 수락할 가능성이 더 높습니다!"
 SWE_the_nordic_defense_council: "북유럽 방위 위원회"
 SWE_the_nordic_defense_council_desc: "우리 혼자서는, 각각의 북유럽 국가들은 팽창주의적인 이웃들의 손쉬운 먹잇감입니다. 하지만 함께 모여 공동 방위의 부담을 나눔으로써, 우리는 미래의 모든 침략자에 대한 진정한 억제력을 만들 수 있습니다. 먼저, 우리는 그러한 조직의 잠재적 회원국들 사이에서 방위 조약을 비준해야 합니다."
 SWE_nordic_defense_fleet: "북유럽 방위 함대"
 SWE_nordic_defense_fleet_desc: "북유럽 방위 조약의 비준으로, 우리는 우리의 해군 자산을 통합 지휘 체계 아래로 통합하는 과정을 시작할 수 있습니다. "
 SWE_nordic_defense_fleet_tt: "모든 §Y북유럽 방위 위원회 회원국§! 종속국 유형:\n함대를 §Y[SWE.GetName]§!(으)로 이전합니다!"
 SWE_nordljus: "노르드류스 건조"
 SWE_nordljus_desc: "우리 해군은 발트해의 다른 강대국들과 경쟁할 수 없으며, 가장 강력한 적수에게 대항할 새로운 기함이 필요합니다. 이러한 대규모 프로젝트는 북유럽 경제에 부정적인 영향을 미칠 것이지만, 때로는 이렇게 간단한 문제이기도 합니다:\n\n힘에는 힘으로 맞서야 합니다"
 SWE_nordljus_tt: "모든 §Y북유럽 방위 평의회 회원국§!이 다음을 획득합니다:"
 SWE_nordljus_tt_2: "생산 라인이 §Y60%§!의 완성도로 시작됩니다"
 SWE_centralized_military_aid: "중앙집권화된 군수 산업"
 SWE_centralized_military_aid_desc: "우리와 회원국의 군사적 역량을 개선해야 합니다. 무기 생산에 투자하면 우리 군대가 국경을 방어할 수단을 갖추게 될 것입니다."
 SWE_centralized_military_aid_tt: "모든 §Y북유럽 방위 평의회 회원국§!이 다음을 획득합니다:\n   건설 슬롯 §G1§!개 추가\n   §Y군수 공장§! §G1§!개 추가"
 SWE_merge_army_complexes: "군사 복합체 통합"
 SWE_merge_army_complexes_desc: "군사 복합체를 중앙집권화하는 것이 더 효율적일 것입니다. 회원국에 남겨두면 침공 시 잃을 위험이 있습니다."
 SWE_merge_army_complexes_tt: "모든 §Y북유럽 방위 평의회 회원국§!: §Y군수 공장§! §R-1§!개\n(§Y[SWE.GetName]§!) 모든 §Y북유럽 방위 평의회 회원국§!마다 §Y군수 공장§! §G+1§!개"
 SWE_nordic_centralized_air_command: "북유럽 중앙 공군 사령부"
 SWE_nordic_research_exchange: "북유럽 연구 교류"
 SWE_nordic_research_exchange_desc: "북유럽 국가들은 모두 기술적으로 발전했으며, 서로의 발전을 공유하지 않는 것은 안타까운 일일 것입니다."
 SWE_nordic_protection_complex: "북유럽 방위 복합체"
 SWE_nordic_protection_complex_desc: "우리 북유럽 국가들은 모두 평화를 원합니다. 우리가 진정으로 바라는 것은 북쪽에서 살고, 북쪽에서 늙고, 북쪽에 묻힐 기본적인 권리뿐입니다. 만약 누군가 우리에게서 그것을 빼앗으려 한다면, 그들 또한 이곳에 묻히게 될 것입니다."
 SWE_nordic_protection_complex_tt: "모든 §Y북유럽 방위 평의회 회원국§!이 다음을 획득합니다:\n   건설 슬롯 §G1§!개 추가\n   §Y민간 공장§! §G1§!개 추가"
 SWE_decentralized_nordic_volunteer_group: "북유럽 의용군"
 SWE_decentralized_nordic_volunteer_group_tt: "모든 §Y북유럽 방위 평의회 회원국§!마다 인력 §G+5000§! 획득\n모든 §Y북유럽 방위 평의회 회원국§!: 모든 §Y북유럽 방위 평의회 회원국§!마다 인력 §G+5000§!"
 SWE_decentralized_nordic_volunteer_group_desc: "모든 북유럽 국가에는 사냥꾼, 명사수 등 군 복무가 가능한 유능한 인재들이 많습니다. 우리는 그들을 찾아내 징집해야 합니다."
 SWE_nordic_centralized_air_command_desc: "방공은 현대전에서 중요한 전선이 되었지만, 기술 발전을 따라잡는 데는 비용이 많이 듭니다. 강력한 방어력을 유지하면서 비용을 절감하기 위해, 우리는 연합 북유럽 공군 사령부를 창설해야 합니다."
 SWE_nordic_centralized_air_command_tt: "모든 §Y북유럽 방위 평의회 회원국§! 속국 유형:\n공군을 §Y[SWE.GetName]§!에게 이전합니다!"
 SWE_train_the_sheltered: "피난민 훈련"
 SWE_train_the_sheltered_desc: "우리 지역의 분쟁으로 인해 많은 북유럽 이웃 국가 주민들이 이곳 [SWE.GetName]으로 피난을 왔습니다. 그들 중 다수는 전투 가능 연령이며, 국가 방위를 돕기 위해 소집될 수 있습니다."
 SWE_the_narvik_solution: "나르비크 해결책"
 SWE_the_narvik_solution_desc: "나르비크는 우리 철광석 수송에 매우 중요하기에, 수송을 확보하거나 방해하려는 교전국들의 표적이 되었습니다. 중립과 수출을 유지하기 위해, 우리는 [NOR.GetName]을 대신하여 나르비크를 통제함으로써 이 지역의 긴장을 완화해야 합니다."
 SWE_icelandic_independence: "아이슬란드 독립"
 SWE_icelandic_independence_desc: "TODO"
 SWE_cement_control_of_the_baltic: "발트해 지배권 공고화"
 SWE_cement_control_of_the_baltic_desc: "발트해 전역에 우리 해군력을 증강하고 투사한다면, 어떤 북유럽 국가의 해안에도 전쟁이 닿지 않도록 보장할 수 있습니다."
 SWE_seek_foreign_guarantees: "외국의 보장 모색"
 SWE_seek_foreign_guarantees_desc: "TODO"
 SWE_ga_pa_tactics: "고포 충격 전술"
 SWE_ga_pa_tactics_desc: "[SWE.GetName]은(는) 전차가 등장하기 훨씬 전부터 전장에서 고기동성 부대를 운용하는 데 선구자였습니다. 이제 그 혁신적인 정신을 되살려 우리만의 전격전을 개발할 때입니다."
 SWE_winter_drill: "동계 훈련"
 SWE_winter_drill_tt: "§Y최후 저항§! 비용 §G-25%§!\n"
 SWE_winter_drill_desc: "우리 군대가 [SWE.GetAdjective] 지형을 이해하고 기상을 활용하는 방법을 철저히 훈련시킨다면, 자신들보다 훨씬 큰 규모의 적군을 상대로 우위를 점할 수 있을 것입니다. "
 SWE_research_slot_1: "[AAT_Sweden_royal_institute_name]"
 SWE_research_slot_1_desc: "국가의 과학 및 공학 전문성을 확장하는 것은 현대적이고 유능한 군대를 유지하는 데 매우 중요할 것입니다. 이를 위해, 우리는 [AAT_Sweden_royal_institute_name]의 확장에 투자할 것입니다. "
 SWE_RIT_communist: "기술 연구소"
 SWE_RIT_historical: "왕립 기술 연구소"
 SWE_infrastructure: "사회 기반 시설 투자"
 SWE_infrastructure_desc: "[SWE.GetName]의 많은 지역은 여전히 시골이며 한심할 정도로 저개발 상태입니다. 우리의 천연자원을 더 잘 활용하기 위해 이를 개선해야 합니다."
 SWE_varnplikt: "Värnplikt"
 SWE_varnplikt_desc: "소규모 직업 군대에 의존하는 것만으로는 더 공격적인 이웃 국가들로부터 우리의 주권을 지키기에 충분하지 않을 것입니다. 따라서 우리는 모든 전투 가능 연령의 남성이 최소한의 군사 훈련을 받도록 보장하는 병역 제도를 시행할 것입니다."
 SWE_per_albin_bus: "[SWE.GetLeader] 버스"
 SWE_per_albin_bus_desc: "적들이 막강한 화력을 보유하고 있으므로, 공습이나 침공으로 정부가 참수될 가능성이 있습니다. 이러한 시나리오를 방지하기 위해, 우리는 위기 상황 동안 군대 및 대중과 연락을 유지할 수 있는 이동식 정부 본부가 필요합니다."
 SWE_per_albin_bus_tt: "지도자가 대피할 수 있는 이동 본부 유닛을 생성합니다. 그러나 버스가 파괴될 경우, 총리의 신변에 좋지 않은 영향을 미칠 것입니다."
 SWE_land_air_warfare: "지공전"
 SWE_land_air_warfare_desc: "각 군은 자체적인 전문 훈련과 장비가 필요하지만, 지상과 공중에서 동시에 협력하여 적을 제압할 때 전장에서 가장 효과적입니다."
 SWE_totalforsvar: "Totalförsvar"
 SWE_totalforsvar_desc: "우리가 예상했듯이, 최근의 분쟁들은 필연적으로 총력전으로 치닫고 있습니다. 따라서, 우리는 국가를 방어하는 데 필요한 장비를 군대에 공급하기 위해 경제를 전쟁 생산 체제로 전환해야 합니다."
 SWE_totalforsvar_tt: "경제 동원 해제 임무를 비활성화합니다"
 SWE_jagartrupper: "Jägartrupper"
 SWE_jagartrupper_tt: "§Y인력§!을(를) 소모하여 정예 레인저를 인접한 통제 주에 보내 적의 항구와 보급 중심지를 파괴할 수 있게 됩니다.\n기존 지형 특성이 없는 육군 지휘관은 §Y레인저§! 특성을 획득합니다"
 SWE_jagartrupper_desc: "수적으로 우세한 적과 마주했을 때, 적의 이동이나 보급 접근을 제한하여 전장의 균형을 맞출 필요가 있습니다. 소규모 특공대를 사용하여 적진에 침투하고 주요 위치의 기반 시설을 파괴할 수 있습니다."
 SWE_hedgehog_defense: "고슴도치 방어"
 SWE_hedgehog_defense_desc: "우리는 '고슴도치' 전술을 활용하여 종심 방어 작전의 효율성을 높일 수 있습니다. 이 전술은 적이 우회할 수 있는 방어 가능한 위치에 소규모 병력 거점을 두는 것으로 구성됩니다. 그러나 이 거점들을 억제하는 과정에서 적의 기세가 꺾이고 반격에 취약해질 것입니다."
 SWE_a_plea_of_desperation: "절박한 호소"
 SWE_a_plea_of_desperation_desc: "우리의 주권이 소멸되기를 바라는 적들에게 여러 면에서 포위된 상황에서, 다가오는 맹공에서 살아남으려면 잠재적인 동맹국에게 손을 내미는 것 외에는 선택의 여지가 거의 없습니다."
 SWE_rapid_response_force: "신속 대응군"
 SWE_rapid_response_force_desc: "필요에 따라 전선 전역에 신속하게 재배치할 수 있는 기갑 차량으로 구성된 신속 대응군을 유지함으로써, 우리는 막대한 수의 전차를 지원할 필요 없이 전차의 이점을 누릴 수 있습니다."
 SWE_hemvarnet: "Hemvärnet"
 SWE_hemvarnet_tt: "전쟁 시 비상 부대로 활성화할 수 있는 향토 방위대 조직을 창설할 수 있습니다"
 SWE_hemvarnet_desc: "구식 군사 장비로 무장하여 각 지역의 전략적 요충지를 방어할 수 있는 수천 명의 자원병이 있습니다. 이는 국가 전체를 한 번에 방어하려는 군의 전선 과확대를 방지하는 데 큰 도움이 될 것입니다. "
 SWE_lottakaren: "로타코렌"
 SWE_lottakaren_desc: "[SWE.GetName]의 여성들은 남성들만큼이나 국가를 방어하려는 의지가 강합니다. 비전투 임무를 위해 여성을 징집하고 훈련하는 조직에 자금을 지원함으로써, 군을 보충하고 방어 능력을 증강할 수 있습니다."
 SWE_rapid_mobilization: "신속 동원"
 SWE_rapid_mobilization_desc: "전 국민이 침공의 공포로 숨을 죽이고 있습니다. 최근 해외에서의 활동으로 인해 더 이상 주저할 수 없으며, 주권을 수호하기 위해 군을 완전히 동원해야 합니다."
 SWE_rapid_mobilization_tt: "민주주의 국가임에도 불구하고 징병법을 §Y필요에 의한 복무§!까지 상향 조정할 수 있습니다"
 SWE_secret_mobilization: "비밀 동원"
 SWE_secret_mobilization_desc: "너무 성급하게 군을 동원하면 적에게 경고를 주어 우리가 방어하려는 바로 그 침공을 촉발할 수 있습니다. 따라서 의심을 사지 않도록 신중하게 행동해야 합니다."
 SWE_tank_development: "전차 개발"
 SWE_tank_development_desc: "다른 국가들처럼 대량의 기갑 차량을 배치할 수는 없지만, 설계와 생산을 더 효율적으로 할 수 있습니다."
 SWE_per_albin_line: "[SWE.GetLeader] 방어선"
 SWE_per_albin_line_tt: "말뫼와 그 해협 주변, 내륙의 베네른 호수와 베테른 호수 주변 요충지, 그리고 고틀란드와 스톡홀름의 주요 방어 지역에 요새를 추가합니다"
 SWE_per_albin_line_desc: "[SWE.GetName]의 해안선은 광대하고 대부분이 무방비 상태입니다. 적 침공군이 해안에 상륙하는 것을 막기 위해, 그들을 발트해로 격퇴할 수 있는 요새화된 진지선을 해안을 따라 구축해야 합니다."
 SWE_swedish_shooting_movement: "스웨덴 사격 운동"
 SWE_swedish_shooting_movement_desc: "거의 한 세기 동안, [SWE.GetAdjective] 사격 운동은 사격장과 대회를 조직하여 민간인 인구의 사격 숙련도와 필요 시 싸우려는 의지를 고취시켜 왔습니다. 오늘날 우리가 처한 격동의 상황을 고려할 때, 이 조직에 투자해야 할 것입니다."
 SWE_swedish_shooting_movement_tt: "인력: 향토 방위대 레벨당 §G+400§!\n향토 방위대 레벨당 국가 비축량에 $SWE_infantry_equipment_0$ §Y+100§!개 추가\n배치된 향토 방위대 사단의 시작 경험치 §Y10%§!에서 §Y30%§!로 증가\n배치된 향토 방위대 사단의 시작 장비율 §Y60%§!에서 §Y90%§!로 증가\n배치된 향토 방위대 사단의 시작 인력율 §Y70%§!에서 §Y90%§!로 증가"
 SWE_mobilization_of_society: "사회 총동원"
 SWE_mobilization_of_society_desc: "공장 노동자부터 내각 장관에 이르기까지 모든 사람이 국가 방위를 위해 희생할 각오가 되어 있어야 합니다. 자원을 전쟁 생산에 우선 배정하거나 무기를 드는 것을 의미하든, [SWE.GetName]의 생존을 위해 무엇이든 할 것입니다."
 SWE_end_the_fubkrieg: "현대 전술, 현대전"
 SWE_end_the_fubkrieg_desc: "최근 몇 년간 전쟁은 급격하게 변했으며, 군이 과거의 분쟁에 대비하고 있었기 때문에 우리의 모든 노력이 헛되이 되는 것을 감수할 수 없습니다. 군이 가장 최신 전술을 활용하도록 보장하는 것이 국가 방어에 결정적일 것입니다."
 SWE_let_fly_all_guns: "모든 포문 개방"
 SWE_let_fly_all_guns_desc: "다른 국가들처럼 거대한 산업 기반을 갖추고 있지는 않지만, 가장 숙련된 무기 제조업체 중 일부를 보유하고 있습니다. 추가적인 투자를 통해 그들의 재능을 완전히 활용하여 전장에서 우리 군에게 기술적 우위를 제공할 수 있습니다."
 SWE_operation_save_denmark: "작전: 덴마크 구출"
 SWE_operation_save_denmark_desc: "수 세기 동안 [DEN.GetName]과 이견이 있었을지 모르지만, 오늘 우리는 그들의 국민과 단결하여 폭정으로부터 해방시킬 준비가 되어 있습니다."
 SWE_operation_save_norway: "작전: 노르웨이 구출"
 SWE_operation_save_norway_desc: "[NOR.GetName]과 [SWE.GetName]은 수 세기에 걸쳐 얽힌 역사를 가지고 있습니다. 그들의 국민이 외세의 압제 아래 갇혀 있는 것을 보는 것은 용납할 수 없으며, 기회가 나타나면 그들을 해방시킬 계획을 세워야 합니다. "
 SWE_nordic_liberation_movement: "북유럽 해방 운동"
 SWE_nordic_liberation_movement_desc: "TODO"
 SWE_central_nordic_army_command: "북유럽 통합 육군 사령부"
 SWE_central_nordic_army_command_desc: "북유럽 방위 평의회 회원국들의 군대를 중앙집권화하여, 우리의 군대를 하나의 통합된 부대로서 더욱 효율적으로 운용할 수 있습니다."
 SWE_central_nordic_army_command_tt: "\n모든 §Y북유럽 방위 평의회 회원국§!의 군대와 장군을 [SWE.GetName](으)로 이전합니다.\n§Y[SWE.GetName]§!을(를) 제외한 모든 §Y북유럽 방위 평의회 회원국§!이 다음을 획득합니다:"
 SWE_central_nordic_army_command_tt_2: "다음 조건에서 수락할 확률이 높아집니다:\n -우리에 대한 §Y높은 관계도§!를 가짐\n -우리가 그들보다 더 강력한 §Y육군§!을 보유함\n -우리가 그들과 동일한 §Y정부 형태§!를 가짐\n -우리가 그들을 §Y독립 보장§!함"
 SWE_decentralized_nordic_army_command: "분권화된 북유럽군 사령부"
 SWE_decentralized_nordic_army_command_desc: "북유럽 방위 평의회의 군 사령부를 중앙집권화하면 지휘관들 사이에 너무 많은 이해 충돌이 발생할 것입니다. 각 회원국의 국가 안보를 위한 유일한 보장은 자국 군대에 대한 통제권을 유지하는 것입니다."
 SWE_decentralized_nordic_army_command_tt: "\n모든 §Y북유럽 방위 평의회 회원국§!이 §Y광범위한 징병§!을(를) 획득합니다.\n모든 §Y북유럽 방위 평의회 회원국§!이 다음을 획득합니다:"
 SWE_decentralized_nordic_army_command_tt_2: "모든 §Y북유럽 방위 평의회 회원국§!:"
 SWE_neither_death_nor_dishonor: "죽음도 불명예도 없다"
 SWE_neither_death_nor_dishonor_tt: "$MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$: §G+4%§! \n$MODIFIERS_ARMY_CORE_ATTACK_FACTOR$: §G+4%§! \n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+4%§!\n$MODIFIER_INDUSTRIAL_CAPACITY_DOCKYARD_FACTOR$: §G+4%§!, §Y[SWE.GetName]§!와(과) 같은 세력에 속한 모든 북유럽 국가 또는 모든 §Y$autonomy_aat_defense_council_member$§!마다"
 SWE_neither_death_nor_dishonor_desc: "북유럽은 벼랑 끝에 서 있습니다. 서쪽에서는 독일의 늑대들이 울부짖고 있습니다. 동쪽에서는 볼셰비키들이 때를 기다리며 우리의 심장부에 붉은 단검을 깊숙이 꽂을 준비를 하고 있습니다. 우리의 펜은 검이 되어야 하고, 우리의 교활함은 갑옷이 되어야 합니다. \n우리는 두 악 중 하나를 선택하지 않을 것이며, 죽음도 불명예도 없을 것입니다."
 SWE_prevent_a_red_dictatorship: "적색 독재 방지"
 SWE_prevent_a_red_dictatorship_desc: "사회민주당은 공산주의자들을 위한 트로이 목마에 불과합니다. 스웨덴이 소련의 영향권에 들어가는 것을 막으려면, 유권자들이 국회에서 민족주의 정당을 집권시키도록 해야 합니다. 필요한 모든 수단을 동원해서 말입니다. "
 SWE_defense_in_depth: "종심 방어"
 SWE_defense_in_depth_desc: "어떤 적군도 무한한 기세를 가질 수 없는데, 이는 주로 보급선의 제약과 병사들의 신체적, 정신적 한계 때문입니다. 따라서 더 견고한 형태의 방어는 뚫리면 붕괴하는 경직된 전선에 기반하는 것이 아니라, 점진적으로 적의 기세를 빼앗는 여러 겹의 방어선에 기반합니다."
 SWE_beneath_sticks_and_stones: "돌과 나무 아래"
 SWE_beneath_sticks_and_stones_desc: "적 항공기는 전장에서 목표물을 볼 수 없다면 효율성이 크게 떨어집니다. 우리 군대에 위장 기술 사용법을 훈련시킴으로써, 우리는 적의 이 결정적인 이점을 박탈할 수 있습니다."
 SWE_norma_projektilfabrik: "노르마 프로옉틸파브리크"
 SWE_norma_projektilfabrik_desc: "노르마 프로옉틸파브리크는 지난 세기부터 [SWE.GetName]과(와) [NOR.GetName]에서 탄약을 제조해 왔습니다. 이들의 제조 능력을 확장하는 것은 우리 군대에 안정적인 탄약 공급을 유지하는 데 큰 도움이 될 것입니다. "
 SWE_norma_projektilfabrik_tt: "§Y[NOR.GetNameDef]§!이(가) 다음 조건을 만족할 때 완료 시 추가 §Y군수 공장§! §G1§!개 획득:\n주요국과 전쟁 중\n항복 진행도가 0% 이상\n§Y[SWE.GetNameDef]§!: §Y노르웨이§!와(과) 전쟁 중이 아님"
 SWE_government_weapons_contract: "정부 무기 계약"
 SWE_allow_landsverk_to_operate: "란츠베르크의 독립적 운영 허가"
 SWE_allow_landsverk_to_operate_tt: "§R[GER.GetNameDef]와(과) 전쟁을 시작하면 란츠베르크에 있는 [GER.GetAdjective] 노동자들이 스웨덴의 란츠베르크 공장 2곳을 일시적으로 손상시킬 수 있게 됩니다§!"
 SWE_government_weapons_contract_desc: "[SWE.GetName] 전역에는 무기 제작에 전문성을 가진 회사가 많이 있습니다. 총력전에 대비하려면, 군사 장비 계약을 통해 이들 회사의 확장을 촉진해야 합니다."
 SWE_bofors_fly_swatter: "보포스 파리채"
 SWE_bofors_fly_swatter_desc: "보포스는 대공 기술의 새로운 기준을 세울 잠재력을 가지고 있습니다. 우리는 그들에게 자원을 제공하여 이를 실현하게 하고, 스웨덴의 하늘에 적 항공기가 없도록 보장해야 합니다."
 SWE_husqvarna_vapenfabrik: "후스크바르나 무기 공장"
 SWE_husqvarna_vapenfabrik_desc: "후스크바르나는 [SWE.GetAdjective] 군대를 위해 소화기 장비를 제조해 온 오랜 역사를 가지고 있습니다. 이제 그들의 산업 기반을 확장하고 전문 지식을 활용하여 군대를 현대화할 때입니다."
 SWE_work_projects_for_the_unemployed: "실업자를 위한 노동 사업"
 SWE_work_projects_for_the_unemployed_desc: "일할 능력은 있지만 일자리를 찾지 못하는 사람들은 급진주의의 원동력이 됩니다. 사람들이 정부에 등을 돌리는 것을 피하려면, 실업자를 위한 노동 사업을 만들어야 합니다. "
 SWE_bofors_anti_tank_gun: "보포스 대전차포"
 SWE_bofors_anti_tank_gun_tt: "§H보포스 대전차포§! 잠금 해제\n지원 대전차 대장갑 공격력: §G+10%§!\n지원 대전차 관통력: §G+10%§!\n대전차 대장갑 공격력: §G+10%§!\n대전차 관통력: §G+10%§!\n차량화 대전차 대장갑 공격력: §G+10%§!\n차량화 대전차 관통력: §G+10%§!\n경구축전차 대장갑 공격력: §G+10%§!\n경구축전차 관통력: §G+10%§!\n중형 구축전차 대장갑 공격력: §G+10%§!\n중형 구축전차 관통력: §G+10%§!\n중구축전차 대장갑 공격력: §G+10%§!\n중구축전차 관통력: §G+10%§!\n초중구축전차 대장갑 공격력: §G+10%§!\n초중구축전차 관통력: §G+10%§!\n현대형 구축전차 대장갑 공격력: §G+10%§!\n현대형 구축전차 관통력: §G+10%§!"
 SWE_bofors_anti_tank_gun_desc: "보포스의 무기 제작 전문성은 필수불가결한 것으로 입증되었습니다. 약간의 투자를 통해, 적들이 우리에게 투입할 수 있는 가장 중무장한 차량에 맞설 수 있는 차세대 대전차포를 개발할 수 있을 것입니다."
 SWE_landverk_l_62: "란츠베르크 L-62"
 SWE_landverk_l_62_desc: "란츠베르크 전차 설계와 보포스 대공포의 성공을 바탕으로, 가장 빠른 기동에도 발맞출 수 있는 세계적인 수준의 기동 대공 플랫폼을 만들 수 있습니다."
 SWE_form_saab: "SAAB 설립"
 SWE_form_saab_desc: "[SWE.GetName]에는 수익성 높은 정부 계약을 두고 경쟁하는 수많은 항공기 제조업체가 있습니다. 이들을 합병함으로써, 비용 효율적인 방식으로 모든 업체의 집단적 전문성을 활용할 수 있습니다."
 SWE_domestic_designs: "국산 항공기 설계"
 SWE_domestic_designs_desc: "SAAB 설립이 완료되었으므로, [SWE.GetAdjective] 공군의 특정 요구 사항을 충족하는 항공기를 만들기 위해 그들의 설계 및 공학 전문성을 활용해야 합니다."
 SWE_foreign_designs: "외국 항공기 설계 연구"
 SWE_foreign_designs_desc: "다른 국가들이 이미 보유한 것을 재발명하며 시간을 낭비해서는 안 됩니다. SAAB의 전문성은 해외에서 면허를 받은 설계를 개량하고 생산하는 데 더 잘 활용될 수 있습니다."
 SWE_foreign_designs_tt: "우리와 전쟁 중이 아니며 이념이 일치하는 각 주요국마다 §Y항공기§!에 대한 §G35%§! 연구 보너스 §Y1§!개 획득"
 SWE_formation_flying: "편대 비행"
 SWE_formation_flying_desc: "견고한 방공망을 유지하려면 잠재적인 위협에 신속하게 대응할 수 있는 잘 조직된 전투기 편대가 필요합니다."
 SWE_marauder_bombers: "머로더 폭격기"
 SWE_marauder_bombers_desc: "최근의 경험에 따르면 공중에서 지상 목표물을 파괴하는 능력은 종종 전투의 결정적인 요인이 될 수 있습니다. 이는 심지어 전쟁을 완전히 종식시키는 수단이 될 수도 있습니다."
 SWE_airforce_modernization: "공군 현대화"
 SWE_airforce_modernization_desc: "공군이 최신 장비를 보유하더라도 이를 완전히 활용할 수 없다면 무의미합니다. 조종사들의 최근 경험이 우리 공군 교리에 통합되도록 해야 합니다."
 SWE_the_barrel: "배럴"
 SWE_the_barrel_desc: "최근 분쟁으로 항공 분야의 기술 발전이 가속화되었습니다. 따라서 우리는 잠재적인 적들과 보조를 맞추고 우리 영공을 보호하기 위해 자체 제트 기반 항공기를 개발해야 합니다."
 SWE_rockets: "로켓 추진"
 SWE_rockets_desc: "제트 추진 항공기도 인상적이지만, 로켓 기술은 조종사 훈련에 드는 막대한 비용 없이 훨씬 더 빠른 속도와 사거리를 가진 일회용 무기를 만들 수 있는 능력을 제공합니다."
 SWE_radiojanst: "라디오톈스트"
 SWE_radiojanst_desc: "라디오톈스트는 매일 문화 행사와 뉴스를 방송하며 대중에게 인기가 있음을 입증했습니다. 방송사를 확장함으로써, 정보에 밝은 대중을 유지하면서 제작하는 프로그램의 종류를 늘릴 수 있습니다."
 SWE_urbanization: "도시화"
 SWE_urbanization_tt: "§Y정치력§!을 소모하여 §Y민간 공장§! 및 §Y해군 조선소§!를 획득하는 결정 잠금 해제"
 SWE_urbanization_desc: "산업화와 도시화는 밀접한 관련이 있습니다. 도시에서 더 많은 일자리를 찾을 수 있게 되면서, 시골에서 더 많은 사람들이 도시로 이주합니다. 도시가 과밀한 빈민가가 되는 것을 피하려면, 기반 시설에 투자하고 다가올 인구 증가에 대비해야 합니다."
 SWE_hygenic_housing: "위생 주택"
 SWE_hygenic_housing_tt: "§Y위생 주택 정책은 쇠데르만란드에서부터 외부로 퍼져나가기 시작하며 시간이 지남에 따라 두 달마다 새로운 핵심 주 하나가 해당 수정치를 획득합니다§!"
 SWE_hygenic_housing_desc: "너무 많은 사람들이 여전히 인간이 거주하기에 부적합한 과밀 빈민가에 살고 있습니다. 우리는 과거를 청산하고 모든 사람이 위생적이고 기능적인 주택을 이용할 수 있도록 보장해야 합니다."
 SWE_vasa_ii: "[SWE_vasa_ii_loc]"
 SWE_vasa_ii_desc: "전설적인 바사호의 후계함을 건조할 때가 왔습니다. 이번에는 전투에서 그 가치를 증명할 기회가 있기를 바랍니다."
 SWE_vasa_ii_communist: "Röd Orkan"
 SWE_vasa_ii_default: "바사 II"
 SWE_coastal_support: "해안 지원"
 SWE_coastal_support_desc: "우리 해군은 적국 해안에서의 상륙 공격을 지원하기 위해 함포 사용법을 철저히 훈련받아야 합니다."
 SWE_all_cards_on_deck: "총력전"
 SWE_all_cards_on_deck_desc: "해상에서 벌어지는 소모적인 교전은 전황을 바꾸는 데 거의 도움이 되지 않습니다. 우리 해군이 출항할 때는 단 한 번의 결정적인 타격으로 적을 분쇄하는 것을 목표로 해야 합니다."
 SWE_decisive_battle_tactics: "결전 전술"
 SWE_seize_landsverk: "란츠베르크 압류"
 SWE_kp_bill: "기계화 KP 빌"
 SWE_kp_bill_desc: "최근 전장에서의 발전은 필요한 곳에 병력을 신속하게 재배치할 수 있는 능력의 필요성을 보여주었습니다. 지금까지 우리는 그 임무를 수행하기 위해 민간용으로 개조된 트럭을 활용해 왔지만, 특수 제작된 장갑 수송 차량이 전투에서 훨씬 더 효과적일 것입니다."
 SWE_lynx_winter_armored_cars: "링스 장갑차"
 SWE_lynx_winter_armored_cars_desc: "[SWE.GetName]에 전쟁이 닥친다면, 기동성은 우리 국방에 필수적일 것입니다. 현대적인 특수 목적 장갑차를 개발하는 것은 우리 군에게 전장에서 연성 목표물을 정찰하고 공격하는 데 필수적인 도구를 제공할 것입니다."
 SWE_lynx_armored_car_tt: "§Y링스 장갑차§! 활성화, 다음을 제공합니다: \n§Y장갑차§! 및 §Y$armored_car_recon$§!:\n 대갑 공격력: §G+10%§!\n 관통: §G+10%§! \n 조직력: §G+5§!\n\n§Y장갑차§!:\n§Y숲:§!\n 이동 효율 변화: §G+15%§!\n 공격 효율 변화: §G+20%§! \n§Y사막:§!\n  이동 효율 변화: §R-40%§!\n  공격 효율 변화: §R-20%§!\n§Y설원:§!\n 이동 효율 변화: §G+35%§!\n 공격 효율 변화: §G+20%§!"
 SWE_lynx_armored_car_recon_company_tt: "\n§Y$armored_car_recon$§!:\n§Y숲:§!\n 이동 효율 변화: §G+5%§!\n 공격 효율 변화: §G+5%§! \n§Y사막:§!\n  이동 효율 변화: §R-15%§!\n  공격 효율 변화: §R-15%§!\n§Y설원:§!\n 이동 효율 변화: §G+8%§!\n 공격 효율 변화: §G+5%§!\n\n"
 SWE_standardize_equipment: "장비 표준화"
 SWE_standardize_equipment_desc: "너무 오랫동안 우리 군은 수많은 종류의 소화기를 운용해 왔으며, 일부는 지난 세기까지 거슬러 올라갑니다. 이로 인해 부대에 탄약을 보급하는 것이 극도로 어려워지고 차질이 생기기 쉽습니다. 우리는 무기와 탄약을 표준화하여 이 문제를 해결해야 합니다."
 SWE_standardize_equipment_trigger_tt: "군대에 보병 장비 §Y13000§!개 초과 보유"
 SWE_individual_liberty_and_prosperity_for_all: "빈곤 감소"
 SWE_individual_liberty_and_prosperity_for_all_desc: "국민들을 빈곤에서 벗어나게 하기 위해 더 많은 노력이 필요하다는 것은 분명합니다. 하지만, 우리는 지원과 실행 가능한 국방력을 유지해야 할 필요성 사이에서 신중하게 균형을 맞춰야 합니다."
 SWE_defense_above_all: "국방 우선"
 SWE_defense_above_all_desc: "우리는 세계가 우리와 다른 시간표에 따라 움직이고 있다는 사실을 직시해야 합니다. 그리고 더 이상 어떠한 형태의 방어 능력도 없이 국가의 미래를 도박에 걸 수 없습니다."
 SWE_volvo: "볼보"
 SWE_volvo_desc: "볼보는 튼튼하고 신뢰할 수 있는 부품과 차량을 만드는 것으로 명성을 쌓아왔습니다. 우리는 그들의 트럭과 엔진에 대한 민간 설계를 군용으로 개조하여 그들의 성공을 기반으로 나아가야 합니다."
 SWE_allow_landsverk_to_operate_desc: "란츠베르크는 오랫동안 [GER.GetAdjective] 군이 베르사유 조약의 장갑 차량 개발 제한을 우회하기 위한 허점으로 운영되어 왔습니다. 우리는 [GER.GetName]과 긴밀한 관계를 유지하고 그들의 기술 발전을 활용할 수 있도록 그들이 계속 운영되도록 허용해야 합니다."
 SWE_sieze_landsverk: "란츠베르크 압류"
 SWE_sieze_landsverk_desc: "란츠베르크는 오랫동안 [GER.GetAdjective] 군이 베르사유 조약의 장갑 차량 개발 제한을 우회하기 위한 허점으로 운영되어 왔습니다. 정부 내 일부에서는 [GER.GetAdjective] 전쟁 기계로부터 거리를 두기 위해 회사를 압류해야 한다고 주장하고 있습니다."
 SWE_saltsjobaden_agreement: "살트셰바덴 협약 수락"
 SWE_saltsjobaden_agreement_desc: "노동자와 고용주 간의 불화가 걷잡을 수 없이 커지고 있으며 국가를 굴복시킬 위험이 있습니다. 국경의 위협을 극복하려면 단결해야 합니다. 따라서, 우리는 노동 분쟁으로 인한 혼란을 최소화하기 위한 협약을 마련해야 합니다."
 SWE_reject_saltsjobaden: "살트셰바덴 협약 거부"
 SWE_reject_saltsjobaden_desc: "이 협정은 거부되어야 합니다. 이는 고용주가 자신의 사업을 재량껏 운영할 권리를 박탈하고, 노동자가 부당함을 느낄 때 노동 제공을 거부할 권리를 제한할 것입니다. 이 협정으로 이득을 볼 사람은 아무도 없습니다."
 SWE_ring_a_ding_ding: "Militärcykel"
 SWE_ring_a_ding_ding_desc: "자전거는 장갑차나 전차만큼 위압적이지는 않지만, 훨씬 저렴한 비용으로 향상된 기동성을 제공합니다."
 SWE_aquire_modern_panzers: "현대 기갑차량 획득"
 SWE_aquire_modern_panzers_desc: "기술 정체는 전쟁 시기에 가장 강력해 보이는 국가마저도 무너지게 만드는 원인임이 증명되었습니다. 우리 스스로가 그러한 운명을 피하고자 한다면, 군을 위한 현대 기갑차량을 획득하는 것이 우선 과제입니다."
 SWE_military_academy: "사관학교"
 SWE_military_academy_desc: "최근 몇 년간 군의 각 분과는 상당한 경험을 축적했습니다. 사관학교 체계를 설립함으로써, 우리는 그들의 지식이 세대를 거쳐 전수되도록 보장할 수 있습니다."
 SWE_surface_raiders: "수상 통상파괴함"
 SWE_surface_raiders_desc: "신속하게 건조된 다수의 소형 함선으로, 우리는 적의 해상 수송과 병력 이동을 방해하여 전쟁 수행 노력에 심각한 피해를 줄 수 있습니다."
 SWE_rationing: "배급제"
 SWE_rationing_desc: "우리는 대전쟁이 [SWE.GetName]의 무고한 국민들에게 안겨준 경제적 고난을 너무나도 잘 기억하고 있습니다. 식량, 연료 및 기타 필수품에 대한 배급제를 도입하여 다시 한번 그런 재앙을 피해야 합니다."
 SWE_rationing_tt: "소량의 §Y전쟁 지지도§!, §Y안정도§! 또는 §Y소비재§!를 비용으로 배급 정책을 제정하는 디시전을 잠금 해제합니다. 제정 가능한 정책은 다음과 같습니다:\n"
 SWE_folkhemmet_modification_tt: "§Y국민의 집§!을 다음과 같이 수정합니다:"
 SWE_education_reform: "Stadsbarn"
 SWE_research_slot_2: "웁살라 대학 확장"
 SWE_research_slot_2_desc: "웁살라 대학은 북유럽 지역에서 가장 오래된 대학으로, 안데르스 셀시우스, 칼 폰 린네, 야코브 베르셀리우스와 같은 저명인사들을 배출했습니다. 세계가 격동하는 가운데, 과학이 불확실한 세상에서 가장 위대한 무기임은 분명하며, 이처럼 명망 높은 대학에 투자하는 것은 확실한 성공을 보장할 것입니다."
 SWE_education_reform_desc: "알바 뮈르달의 저서 'Stadsbarn'은 아동 발달에 있어 국가의 역할에 관해 교육자들 사이에서 파문을 일으키고 있습니다. 알바와 그녀의 남편 군나르는 최근 저서 '인구 위기'에서 사회 정책에 관한 논쟁을 불러일으키기도 했습니다. 아마도 우리는 이 다작 부부를 내각으로 들여 이론을 실천으로 옮기게 해야 할 것입니다."
 SWE_economic_deregulation: "경제 규제 완화"
 SWE_economic_deregulation_desc: "국가가 존립의 위협에 직면했을 때, 우리는 이 경솔한 복지 지출을 감당할 여력이 없습니다. 따라서 민간 부문이 국가가 남긴 공백을 메울 수 있도록, 우리는 가혹한 예산 결정을 내리고 부담스러운 규제를 철폐해야 합니다."
 SWE_economic_deregulation_tt: "§Y국민의 집§!을 제거합니다."
 SWE_approach_the_allies: "연합국에 접근"
 SWE_approach_the_allies_desc: "[ENG.GetNameDefCap]와 그 동맹국들은 유럽의 어떠한 분쟁에서도 궁극적인 승자가 될 것입니다. 따라서 우리가 그들의 적이 될 의사가 없음을 분명히 하는 것이 현명할 것입니다."
 SWE_join_allies_for_colonies: "영유지 교환"
 SWE_join_allies_for_colonies_desc: "우리와 연합국 간의 관계가 강화됨에 따라, 우리는 그들의 군사 연합에 가입하는 대가로 전 세계에 흩어져 있는 과거 식민지를 되찾을 기회를 얻었습니다."
 SWE_universal_basic_income: "보편적 기본소득"
 SWE_universal_basic_income_desc: "모든 남성과 여성은 최소한의 생존을 유지할 수 있도록 보장받아야 하며, 국가는 자국민을 돌볼 의무가 있습니다. 보편적 기본소득은 이 두 가지를 모두 해결합니다."
 SWE_universal_basic_income_tt: "새로 정복한 주가 §G+25%§! 협력도 및 §Y0%§! 저항도를 가지고 시작합니다."

