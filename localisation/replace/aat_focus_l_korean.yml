 NORDIC_expert_naval_mechanics_desc: "TODO_NORDIC"

 NORDIC_air_production: "항공기 생산"
 NORDIC_air_production_desc: "북반구와 그 너머에 패권을 확립하고자 한다면, 우리는 강대국들이 수년간 비축해 온 물자를 따라잡아야 합니다. 다행히도, 우리는 적보다 더 많이 생산하고 그 격차를 줄이는 데 사용할 수 있는 관행, 지식, 장비를 공유할 수 있습니다."
 NORDIC_naval_aircraft: "해군 항공기"
 NORDIC_naval_aircraft_desc: "해전의 미래는 하늘에 있습니다. 우리의 해군 폭격기는 적의 함선을 바다 밑으로 보낼 것이며, 우리 항공모함에서 출격한 전투기 떼는 적 항공기의 연기로 하늘을 뒤덮을 것입니다."
 NORDIC_air_exercises: "공중 훈련"
 NORDIC_air_exercises_desc: "공중전이 새로운 전쟁의 시대를 열었듯이, 우리 국가들 간의 새로운 협력의 시대는 긴밀하게 실행되는 합동 공중 작전과 함께해야 합니다. 이를 위해, 우리 군은 하나가 되어 비행할 때까지 함께 훈련해야 합니다."
 NORDIC_bomber_command: "폭격기 사령부"
 NORDIC_bomber_command_desc: "합동 폭격기 사령부를 창설하면 전장에서의 지상 지원과 적진 후방으로의 폭격기 침투를 더 잘 조율할 수 있을 것입니다. 이것이 우리 북방 국가들이 적에 맞서 공동의 노력을 기울일 수 있는 유일한 방법입니다."
 NORDIC_fighter_command: "전투기 사령부"
 NORDIC_fighter_command_desc: "우리가 이상과 중대한 임무를 공유하는 것처럼, 우리 위의 하늘도 공유합니다. 우리는 서로의 영공을 보호하기 위해 함께 비행해야 하며, 적의 지상 지원에 의해 우리의 유대가 끊어지지 않도록 전장에서 제공권을 장악해야 합니다."
 NORDIC_carrier_effort: "항공모함 전력"
 NORDIC_carrier_effort_desc: "해전의 새로운 개척지는 그 위의 하늘입니다. 우리는 최고의 항공모함과 최고의 함재기를 만들기 위해 자원을 모아야 합니다. 그렇게 함으로써 우리는 바다를 지배할 수 있고, 이를 통해 우리 국가들이 필요로 하는 안보를 창출할 수 있습니다."
 NORDIC_ground_operations: "지상 작전"
 NORDIC_ground_operations_desc: "더 많은 기지를 건설하면 합동 공중 작전에서 더 큰 유연성을 확보할 수 있으며, 더 많은 대공포대를 건설하면 우리 영토를 방어하고 조종사들의 부담을 덜어줄 수 있습니다. 이것이 바로 우리가 공중 작전의 효율성을 극대화하기 위해 상호 연결된 지상 지원 체계를 구축하는 방법입니다."
 
 NORDIC_naval_exercises: "해상 훈련"
 NORDIC_naval_exercises_desc: "우리 모든 국가는 수세기에 걸친 해군 유산을 가지고 있으며, 발트해와 북대서양은 우리의 문화와 생활 방식을 형성해 왔습니다. 하지만 모든 해양 국가가 알다시피, 바다는 해자인 동시에 고속도로가 될 수 있습니다. 바다에서 방어하고 공격하는 법을 배웁시다."
 NORDIC_defend_the_danish_belt: "덴마크 해협 방어"
 NORDIC_defend_the_danish_belt_desc: "덴마크 해협은 발트해로 향하는 관문입니다. 만약 적이 북대서양에서 발트해로 진입할 수 없다면, 우리 국가들은 해상 침공으로부터 훨씬 더 안전해질 것입니다. 그러니 이곳을 철벽으로 만드는 데 노력을 집중하여, 우리가 발트해를 제약 없이 누빌 수 있도록 합시다."
 NORDIC_control_the_northern_sea: "북해 장악"
 NORDIC_control_the_northern_sea_desc: "노르웨이해와 북해는 대서양으로 향하는 관문입니다. 이곳에 노력을 집중하면 유럽 북부 해안의 국가들을 상대할 수 있을 것이며, 원한다면 북아메리카까지도 도달할 수 있을 것입니다."
 NORDIC_baltic_sea_dominance: "발트해 패권"
 NORDIC_baltic_sea_dominance_desc: "발트해는 오랫동안 우리의 앞마당이었습니다. 다른 국가들이 발트해의 파도를 마음대로 누비게 둔다면 우리에게 승산은 없습니다. 해안을 요새화하여 이 차갑고 외딴 넓은 바다를 지배합시다."
 NORDIC_naval_research_institute: "해군 연구소"
 NORDIC_naval_research_institute_desc: "적을 따라잡는 것만으로는 충분하지 않습니다. 우리는 과거에 그랬던 것처럼 해군 기술의 선두에 서야 합니다. 우리 지역의 탐험과 해상 지배의 유산을 받아들입시다."
 NORDIC_submarine_cooperation: "잠수함 협력"
 NORDIC_submarine_cooperation_desc: "적의 해상 병력 및 보급 수송 능력을 차단함으로써, 우리는 이미 전쟁에서 절반은 승리한 것이나 다름없습니다. 이를 보장하는 최선의 방법은 최첨단 잠수함을 공동으로 생산하는 것입니다."
 NORDIC_naval_officer_academy: "해군사관학교"
 NORDIC_naval_officer_academy_desc: "해전에서는 다른 어떤 형태의 전투보다도 유능한 장교가 중요합니다. 우리 해군의 함선과 기동부대를 지휘하는 장교단의 통제 없이는 일개 수병이 할 수 있는 일은 많지 않습니다. 이들이 어려운 결정을 내리고 함께 협력하도록 훈련시키는 데 투자하는 것이 가장 중요합니다."
 NORDIC_amphibious_forces: "상륙 부대"
 NORDIC_amphibious_forces_desc: "언제 어디서든 적을 타격할 수 있도록 보장함으로써, 우리는 적의 공격 능력을 감소시킬 수 있습니다. 만약 적이 해안선 어디에서든 상륙을 두려워해야 한다면, 그들은 전선에 많은 부대를 배치할 수 없을 것입니다. 따라서 우리는 상륙 작전과 해병대에 집중해야 합니다."
 
 NORDIC_joint_military_exercises: "합동 군사 훈련"
 NORDIC_joint_military_exercises_desc: "우리 병사와 장교들은 지금 우리가 속한 것과 같은 동맹을 겪어본 적이 없으므로, 협력이 제2의 천성이 될 때까지 하나처럼 훈련받아야 합니다. 이것이 이루어지면, [NORDIC_get_alliance_name]군은 막을 수 없을 것입니다."
 NORDIC_unified_recruitment: "통합 징병"
 NORDIC_unified_recruitment_desc: "우리는 징병 노력을 표준화하고 절차를 간소화할 방법을 찾아야 합니다. 그렇게 함으로써 더 많은 병력이 징병소에서 전선으로 최대한 신속하게 투입될 수 있을 것입니다."
 NORDIC_mechanized_army: "기계화군"
 NORDIC_mechanized_army_desc: "강철과 대포로 무장한 거대한 차량 내부와 그 주변에서 싸우도록 병력을 훈련시키는 데 노력을 집중한다면, 더 적은 병력으로 더 큰 타격을 줄 수 있습니다. 물론, 그 거대한 물건들을 충분히 생산할 수만 있다면 말입니다."
 NORDIC_infantry_first: "보병 우선"
 NORDIC_infantry_first_desc: "수 세대 동안 우리 병사들은 단지 무기와 몸에 걸친 옷만으로 전장에 나가, 눈앞의 또 다른 불쌍한 영혼을 상대로 한 뼘의 땅을 위해 필사적으로 싸웠습니다. 우리 군대가 눈앞에서 적의 눈을 볼 수 있다면, 그들이 제기하는 위협을 직시하고 조국을 위해 죽을 때까지 싸울 것입니다."
 NORDIC_expedited_training: "신속 훈련"
 NORDIC_mountaineers: "산악 전문가"
 NORDIC_mountaineers_desc: "북유럽 지역은 산악병을 훈련하고 운용하기에 이상적입니다. 강력한 산악 전문가 간부단을 통해, 우리는 이 지역을 훨씬 더 쉽게 방어할 수 있을 것이며, 기회가 있을 때마다 반격할 수 있게 될 것입니다. 우리 영토의 일부가 적의 손에 넘어가더라도, 우리는 결코 항복하지 않을 것입니다."

 NORDIC_nordic_construction_developments: "북유럽 건설 개발"
 NORDIC_nordic_construction_developments_desc: "[NORDIC_get_alliance_name]에는 해야 할 일이 많지만, 파멸의 시간이 오기까지는 시간이 거의 없습니다. 우리는 국가 발전에 속도를 내기 위해 필요한 개선점을 찾기 위해 협력해야 할 것입니다."
 NORDIC_materiel_design: "군수품 설계"
 NORDIC_materiel_design_desc: "전쟁은 여러 세대에 걸쳐 많은 방식으로 변해왔지만, 수 세기 동안 종종 한 명의 병사와 그의 소총으로 귀결되었습니다. 이 새로운 전쟁의 시대에 우리는 [NORDIC_get_alliance_name] 병사들의 무기를 소홀히 할 수 없으며, 더 나은 무기를 설계함으로써 더 나은 병사를 양성할 것입니다."
 NORDIC_nordic_electronics: "북유럽 전자공학"
 NORDIC_nordic_electronics_desc: "전자공학의 시대가 도래했으며, 이는 미래 전쟁의 결정적 요인이 될 수 있습니다. 우리는 전자공학 군비 경쟁에서 적에게 선수를 빼앗겨서는 안 됩니다. 이 새로운 힘이 우리 편에 서도록 함께 전자공학을 발전시켜야 합니다."
 NORDIC_research_investments: "공동 연구 투자"
 NORDIC_research_investments_desc: "우리의 새로운 동맹은 그 어떤 동맹보다도 긴밀하므로, 기술 발전을 우리만 독점할 이유가 없습니다. 우리의 전쟁 도구가 적을 쓰러뜨리는 데 필요한 우위를 점할 수 있도록 연구를 공유해야 합니다."
 NORDIC_civilian_contributions: "민간 기여"
 NORDIC_civilian_contributions_desc: "이제 일반 대중이 우리 동맹의 다른 구성원들과 새로운 공유 정체성을 갖게 되었으므로, 우리는 그들이 [NORDIC_get_alliance_name]에 안전과 영광을 가져다줄 전쟁 기계에 연료를 공급하는 데 필요한 기여와 희생을 기꺼이 할 것임을 압니다."
 NORDIC_nuclear_research: "핵 연구"
 NORDIC_nuclear_research_desc: "과학자들은 원자 분열이 마침내 무기화될 때 우리에게 닥칠 새로운 세계에 대해 입을 다물지 못하고 있습니다. 단번에 전쟁을 끝낼 수 있는 이 기술적 기적에서 우리가 소외되어야 할 이유가 없습니다."
 NORDIC_nordic_rocketry: "북유럽 로켓 공학"
 NORDIC_nordic_rocketry_desc: "만약 우리의 폭탄이 항공기의 개입 없이 전달될 수 있다면 어떨까요? 자체 추진 무기는 미래이며, 원한다면 [NORDIC_get_alliance_name]의 안락한 곳에서 적을 섬멸할 수 있을 것입니다."
 NORDIC_standarized_parts: "표준화 부품"
 NORDIC_standarized_parts_desc: "이제 우리가 하나로 섰으니, 서로 표준을 공유하여 공장이 최대한 빨리 가동 속도를 높일 수 있도록 하는 이점을 누릴 수 있습니다. 장비와 부품이 상호 교환 가능해져 생산을 상당히 간소화할 수 있을 것입니다."
 NORDIC_fill_the_infrastructure_gaps: "기반시설 격차 해소"
 NORDIC_fill_the_infrastructure_gaps_desc: "통합 이전에 우리 국가들은 서로 다른 발전 수준에 있었습니다. [NORDIC_get_alliance_name]에서 가장 발전된 국가들의 일부 지역조차도 더 나은 기반시설이 필요합니다. 우리는 모두의 수준을 끌어올리기 위해 힘을 합쳐야 합니다."
 NORDIC_develop_resources: "자원 개발"
 NORDIC_develop_resources_desc: "충분히 열심히 찾는다면 무엇을 발견할지 아무도 모릅니다. 노력을 집중한다면 전쟁 수행에 필수적인 미발견 자원 매장지를 발굴하고, 심지어 이미 보유한 자원에서 더 많은 것을 추출하는 새로운 방법을 개발할 수도 있습니다."
 NORDIC_military_industry_hub: "군수 산업 중심지"
 NORDIC_military_industry_hub_desc: "군수 산업을 효율적으로 집중시킴으로써, 이러한 근접성과 전문화를 활용하여 우리 전쟁 기계의 새로운 경지에 도달할 수 있습니다. 공장을 제자리에 유지하는 한, 우리는 적보다 더 많이 생산할 것입니다."
 NORDIC_ad_hoc_military_industry: "임시 군수 산업"
 NORDIC_ad_hoc_military_industry_desc: "거대한 공장 단지나 콘크리트와 연기로 뒤덮인 광활한 지역을 계획하고 건설할 시간이 없습니다. 우리는 한 번의 전투로 모든 것을 잃을 위험을 피하기 위해, 가능한 한 빨리, 가능한 모든 곳에, [NORDIC_get_alliance_name] 전역에 작은 공장들을 점점이 배치하여 산업을 건설해야 합니다."
 NORDIC_railway_expansion: "철도 확장"
 NORDIC_railway_expansion_desc: "철도는 우리 국가의 동맥이며, 지금 그 어느 때보다 이 수송로를 최대한 널리 퍼뜨려야 합니다. 이제 목표 아래 하나가 되었으니, 기관차의 강철과 속도를 통해 물리적으로도 통합되어야 합니다."
 NORDIC_naval_construction: "해군 함선 건조"
 NORDIC_naval_construction_desc: "오랜 항해 전통과 세계적 수준의 선원들을 보유하는 것은 모두 좋지만, 적에 맞서 그들을 활용할 함선이 없다면 아무 의미가 없습니다. 함께 대함대를 건설하여 우리를 위협하는 어떤 국가든 분쇄해야 합니다."
 NORDIC_nuclear_production: "핵 생산"
 NORDIC_nuclear_production_desc: "이제 원자를 분열시킬 지식을 갖추었으니, 이를 활용하는 것이 마땅합니다. 하지만 먼저, 전세를 우리에게 유리하게 바꿀 만큼 충분히 생산하는 데 필요한 자재와 기반시설을 구축해야 합니다."
 NORDIC_jet_engines: "제트 시대로"
 NORDIC_jet_engines_desc: "제트 엔진의 새로운 발전은 최고 수준의 프로펠러 항공기를 목적 없이 떠다니는 종이 연처럼 보이게 만듭니다. 새로운 공중전의 시대가 도래했으며 제트 엔진이 지배할 것입니다. 이 분야에 함께 투자를 모은다면, 우리는 적을 뛰어넘어 항공기 먹이사슬의 최상위 포식자를 생산할 수 있습니다."
 NORDIC_machine_tools_research: "공작 기계 연구"
 NORDIC_machine_tools_research_desc: "인력은 전체 국력의 일부에 불과합니다. 우리는 적들이 대체할 수 없는 손실을 메울 수 있도록 적보다 더 많이 생산해야 합니다. 이것이 우리가 새로운 전쟁 기계를 개발하는 데에만 국한되지 않고, 그것들을 생산하는 기계에 주의를 집중해야 하는 이유입니다."
 NORDIC_equipment_conversion_focus: "장비 개조 중점"
 NORDIC_equipment_conversion_focus_desc: "우리에겐 치장되거나 쓰러진 적에게서 노획한 구식 무기와 차량으로 가득 찬 거대한 창고가 있습니다. 이 구식 장비들은 우리 군수 체계가 제공하는 가장 최신형의 치명적인 장비로 개조될 수 있습니다."
 
