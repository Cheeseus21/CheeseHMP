#Communist Path
 NOR_a_resurgent_labor_movement: "부활하는 노동 운동"
 NOR_a_resurgent_labor_movement_desc: "[NOR.GetName] 인민은 더 이상 자본주의의 눈가리개를 받아들이지 않습니다. 그들은 지배자들이 만든 빈곤 속에서 서서히 익사하고 있었다는 진실을 마침내 깨닫고 있습니다. 이제 그들은 물 위로 고개를 들고 지평선 너머의 혁명을 목도하고 있습니다!"
 NOR_compromise_with_the_nkp: "NKP와의 타협"
 NOR_compromise_with_the_nkp_desc: "국가의 안위가 벼랑 끝에 선 지금, 노르웨이 공산당 및 그들의 뿌리 깊은 스탈린주의와의 유대를 통해 타협한다면 [SOU.GetNameDef]의 도움을 확보할 수 있을 것입니다. 이는 파시스트나 자본가에게 종속되는 미래보다 확실히 더 나은 선택입니다."
 NOR_prosecute_the_nkp: "NKP 기소"
 NOR_prosecute_the_nkp_desc: "노동당은 NKP가 [NOR.GetName]의 노동자가 아닌 스탈린에게 충성한다는 사실이 명백해졌을 때 그들과 결별했습니다. 우리는 그 썩은 시체가 너무 오랫동안 곪도록 방치했습니다. 그들이 우리를 [SOU.GetName]에 팔아넘기기 전에 이 배신자들을 전력을 다해 분쇄해야만 합니다."
 NOR_the_seeds_of_the_revolution: "혁명의 씨앗"
 NOR_the_seeds_of_the_revolution_desc: "자본주의는 스스로 파멸할 수단을 만들어냈고, 바로 그 지점에서 우리가 나설 차례입니다. 이제 [NOR.GetName] 인민에게 더 밝은 미래의 씨앗을 뿌리는 것이 우리의 임무입니다. 우리는 우리 노동의 결실을 거둘 수 있을 때까지 때를 기다릴 것입니다."
 NOR_the_voice_of_the_people: "인민의 목소리"
 NOR_the_voice_of_the_people_desc: "우리는 인민의 목소리에 귀를 기울이고, 그 목소리를 증폭시키며 마르크스의 진리를 전파할 도구를 마련해야 합니다. 그래야만 우리의 혁명이 아래로부터 성취될 것입니다. 인민이 자본의 억압으로부터의 자유를 향한 요구를 외치게 하십시오."
 NOR_organize_partisan_militias: "파르티잔 민병대 조직"
 NOR_organize_partisan_militias_desc: "자본주의가 투쟁 없이 [NOR.GetName]의 노동자에 대한 지배력을 완화하지 않을 것은 자명합니다. 의지가 있는 자들을 무장시키고 훈련시켜, 때가 되면 그들이 봉기하여 자본의 사슬을 끊는 혁명의 길을 열게 합시다."
 NOR_consolidate_power: "권력 공고화"
 NOR_consolidate_power_desc: "우리가 추구하는 미래를 확보할 힘을 가졌으니, 이제 그 힘을 유지할 수 있도록 해야 할 때입니다. 숙청과 새로운 임명을 통해, 우리는 이 국가를 성공과 번영을 가능하게 할 형태로 다듬어 나갈 것입니다."
 NOR_demand_nationalizations: "국유화 요구"
 NOR_demand_nationalizations_desc: "이 부르주아 정부는 아직 생산 수단의 공동 소유가 지닌 힘을 모릅니다. 혁명이 시작되기도 전에 혁명을 진행시키기 위해, 우리는 전국 주요 공장들의 국유화를 요구해야 합니다. 더 중요한 것은, 공장이 많을수록 우리 대의의 노동자와 동맹도 많아진다는 것입니다."
 NOR_squash_dissent: "반대 세력 진압"
 NOR_squash_dissent_desc: "우리의 노력으로 일군 결실을 해충에게 빼앗길 수는 없습니다. 반대 세력을 찾아내 완전히 뿌리 뽑는 것이 무엇보다 중요합니다. 결국, 우리 정부를 의심하는 자는 모두 우리의 적입니다."
 NOR_denounce_the_german_reich: "[GetNorwegianThreateningFascist] 규탄"
 NOR_denounce_the_german_reich_desc: "[GetNorwegianThreateningFascist]이(가) 전 세계 인민을 짓밟도록 내버려 둘 수 없습니다. 우리가 무엇을 위해 싸우는지 전 세계에 알려, 그들이 파시즘에 맞서는 우리 편에 서도록 해야 합니다."
 NOR_moscows_education_centers: "공산주의 교육 센터"
 NOR_moscows_education_centers_desc: "수년간 코민테른은 스칸디나비아 전역의 동지들에게 지하에서 혁명을 이끌어 나가는 데 필요한 기술을 가르쳤습니다. 이제 우리는 그들을 양지로 이끌어내, 혁명을 영구히 이어나가는 법을 가르칠 수 있게 되었습니다."
 NOR_workers_and_farmers_rise: "노동자와 농민의 봉기"
 NOR_workers_and_farmers_rise_desc: "기반은 닦였고, 씨앗은 심어졌으며, 혁명의 불꽃이 타오르려 합니다. [NOR.GetNonIdeologyName]의 노동자와 농민들이여, 봉기하여 자본가와 지주들의 피 묻은 손에서 생산 수단을 되찾읍시다."
 NOR_war_in_finland: "핀란드 전쟁"
 NOR_war_in_finland_desc: "핀란드 인민은 충분히 고통받았습니다. 우리는 [SOU.GetName]과(와) 힘을 합쳐 그들을 자본주의로부터 해방시켜야 합니다. 이는 모든 북유럽 인민을 해방시키기 위한 첫걸음이 될 것입니다."
 NOR_defend_finland: "핀란드 방어"
 NOR_defend_finland_desc: "비열한 [SOU.GetName]이(가) 자랑스러운 국가 [FIN.GetName]을(를) 이용하도록 내버려 둘 수 없습니다. 우리는 인민을 위한 척하면서 그들을 짓밟기만 하는 정권의 폭정에 맞서 무기를 들어야 합니다. 핀란드는 독립을 유지해야 합니다."
 NOR_send_the_king_back_to_denmark: "국왕을 덴마크로 돌려보내라"
 NOR_send_the_king_back_to_denmark_desc: "왕가를 그대로 둔다면 우리는 스스로를 공산주의자라 부를 수 없습니다. 권력의 지렛대와 생산 수단을 장악한 상황에서, 군주제는 반혁명과 반대 세력의 구심점이 될 것입니다. 우리는 왕가를 신속히 처리해야 합니다."
 NOR_worker_armies: "노동자 군대"
 NOR_worker_armies_desc: "해야 할 일은 많지만, 이 모든 것을 한 번에 처리할 인구는 부족합니다. 노동자들을 마치 군대의 중대와 사단처럼 계층 구조로 조직함으로써, 우리는 한 번에 하나씩 프로젝트를 진행하며 다시 일어설 수 있습니다. "
 NOR_nationalize_the_hydro_plants: "수력 발전소 국유화"
 NOR_nationalize_the_hydro_plants_desc: "수력 발전은 [ROOT.GetAdjective] 산업의 주요 요소 중 하나이지만, 현재는 잘못된 손, 즉 자본가의 손에 있습니다! 혁명의 다음 단계를 위한 동력을 생산하는 수단을 장악합시다."
 NOR_expand_military_industry: "군수 산업 확장"
 NOR_expand_military_industry_desc: "우리의 초기 군수 산업만으로는 세계 자본주의를 무너뜨리기에 충분하지 않습니다. 계속해서 확장되는 우리 군대의 수요를 충족시키기 위해 산업을 확장해야 합니다."
 NOR_a_new_norway: "새로운 노르웨이"
 NOR_a_new_norway_desc: "노르웨이 인민은 마침내 자본의 멍에에서 벗어났으며, 이 사실은 우리의 새로운 국가가 형태를 갖추어감에 따라 나타나야 합니다. 더 이상 과두정치 세력과 거물들이 국가의 방향을 좌지우지하지 않을 것이며, 이제부터 노르웨이 인민이 자신의 미래를 책임질 것입니다. 새로운 노르웨이와 그 너머를 위하여!"
 NOR_norwegian_engineering: "노르웨이 공학 기술"
 NOR_norwegian_engineering_desc: "진정한 영구 혁명을 이루고자 한다면, 착취당한 형제자매들의 손으로 만들어진 전쟁 도구에서 벗어나야 합니다. 이 혁명을 진정으로 우리의 것이라 부르려면, 우리만의 설계를 개발하고 우리만의 장비를 만들어야 합니다."
 NOR_reawaken_the_permanent_revolution: "영구 혁명을 다시 일깨워라"
 NOR_reawaken_the_permanent_revolution_desc: "트로츠키는 프롤레타리아가 역사의 주도권을 잡을 때까지 혁명은 멈추지 않을 것이며, 실제로 멈출 수 없다고 가르쳤습니다. 스칸디나비아와 그 너머의 프롤레타리아를 일으켜 세웁시다!"
 NOR_crush_stalin: "[GetCrushStalinName]"
 NOR_crush_stalin_desc: "수년간 이오시프 스탈린은 자신의 이익을 위해 마르크스와 레닌의 말을 왜곡하고, 인민재판에서 적들에게 거짓으로 유죄를 선고했으며, 자신의 자아를 추구하며 수많은 생명을 희생시켰습니다. 그가 프롤레타리아의 미래를 파괴하기 전에 막아야 합니다."
 NOR_crush_stalin_canonical: "스탈린 타도"
 NOR_crush_stalin_generic: "붉은 곰 타도"
 NOR_crush_big_communist: "[?GLOBAL.platonic_big_communist.GetNameDef] 타도"
 


 NOR_crush_hitler: "히틀러 타도"
 NOR_crush_hitler_desc: "아돌프 히틀러만큼 인류에 대한 범죄를 많이 저지른 자는 드뭅니다. 그는 셀 수 없이 많은 생명을 파괴했으며, 그의 악행은 끝이 없는 듯합니다. 그의 최종 목표는 우리가 소중히 여기는 모든 것을 파괴하는 것입니다. 따라서 그가 우리를 끝장내기 전에 그의 계획을 저지해야 합니다."
 NOR_prepare_for_war: "전쟁 준비"
 NOR_prepare_for_war_desc: "이제 전쟁은 불가피해 보입니다. 평화가 영원할 것이라는 착각은 버려야 합니다. 전쟁은 우리와 같은 국가에 불시에 닥쳐올 수 있으므로, 만반의 태세를 갖추어야 합니다."
 NOR_join_the_allies: "연합국 가입"
 NOR_join_the_allies_desc: "최악의 상황이 닥쳤을 때, 강력하고 신뢰할 수 있는 동맹의 존재는 예속과 자유를 가르는 분수령이 될 것입니다. [FRA.GetName]과 [ENG.GetName]은 독일을 상대로 대전쟁에서 승리했으며, 우리는 그들이 다시 한번 해낼 수 있다고 믿습니다."
 NOR_proactive_defense: "선제적 방어"
 NOR_proactive_defense_desc: "우리가 먼저 적을 섬멸한다면 적은 우리를 공격할 수 없습니다. 전쟁이 우리 영토에 닿기 전에 적의 땅으로 전화를 끌고 갑시다. 위협받았을 때 [NOR.GetName]의 국민이 무엇을 할 수 있는지 똑똑히 보여주어야 합니다."
 NOR_secure_the_swedish_iron_ore: "스웨덴 철광석 확보"
 NOR_secure_the_swedish_iron_ore_desc: "[SWE.GetName]은 자국 영토 지하에 막대한 양의 고품질 철광석을 보유하고 있으며, 이는 겨울철 북부 항구가 얼어붙을 때 나르비크를 통해 유통되었습니다. 이 철광석 공급원을 외국의 폭군에게 무방비로 노출시켜 손쉽게 넘겨주는 것은 용납할 수 없습니다. 적이 같은 생각을 하기 전에 우리가 먼저 장악해야 합니다."
 NOR_secure_denmark: "덴마크 확보"
 NOR_secure_denmark_desc: "[NOR.GetName] 남쪽에 위치한 강대국들은 오랫동안 우리의 옛 지배자였던 [DEN.GetName]에 의해 저지되어 왔습니다. 만약 그들의 취약한 군대가 항복한다면, [NOR.GetName]으로 향하는 관문이 활짝 열리게 될 것입니다. 우리가 직접 이 관문을 지켜 이를 막아야 합니다."
 NOR_invite_secret_army: "비밀 군대 포섭"
 NOR_invite_secret_army_desc: "과거 [NOR.GetNonIdeologyName]의 지도자들은 공산주의 혁명에 대비해 국가를 방어할 비밀 군대를 창설했습니다. 하지만 이제 그 목적이 무의미해졌으므로 그들을 기소할 필요는 없습니다. 타협을 통해 우리에게 맞서는 대신, 우리와 함께 조국을 지키고자 하는 이들을 포섭할 수 있습니다."
 NOR_revive_pomor_trade: "포모르 무역 부활"
 NOR_revive_pomor_trade_desc: "수 세기 동안 북부의 우리 민족은 백해의 포모르 지역과 교역해왔습니다. 이는 양측 모두의 번영을 가져왔지만, 제국주의 열강과 자본주의가 이를 중단시켰습니다. 우리의 오랜 형제들과의 무역을 다시 부활시킵시다."
 NOR_join_the_comintern: "코민테른 가입"
 NOR_join_the_comintern_desc: "공산주의 인터내셔널은 전 세계 프롤레타리아 혁명을 위해 투쟁하는 진정한 비호 세력입니다. 자본주의와 파시즘을 타도하고자 한다면, 이것이 최선이자 유일한 길입니다."
 NOR_soviet_industrial_cooperation: "소비에트 산업 협력"
 NOR_soviet_industrial_cooperation_desc: "더 크고 발전된 국가에 도움을 구하는 것은 부끄러운 일이 아닙니다. 혁명을 수호하기 위한 전쟁에서 모든 노동자, 농민, 기술자는 우리의 동지입니다. 입장이 바뀌었더라도 우리 역시 똑같이 했을 것처럼, 우리 산업을 발전시키기 위한 그들의 도움을 환영할 것입니다."
 NOR_field_hospitals: "야전 병원"
 NOR_field_hospitals_desc: "[NOR.GetName]의 인구는 다른 국가들처럼 무한하지 않습니다. 군수물자는 대체할 수 있지만, 동지를 잃는 것은 자본주의에 맞선 국제적 투쟁의 전력이 하나 줄어드는 것을 의미합니다. 병력과 영토를 모두 잃을 위험을 감수하지 않으려면, 부상당한 모든 병사를 구하여 최대한 빨리 전선으로 복귀시키는 데 총력을 기울여야 합니다."
 NOR_expanded_conscription_drive: "징병 확대 운동"
 NOR_expanded_conscription_drive_desc: "투쟁이 끝날 때까지, 우리의 이상에 따라 역사를 만들어나갈 전장에 투입할 신병이 계속해서 필요할 것입니다. 조국이 유린당하지 않으려면, 싸울 수 있는 모든 남녀가 우리 대열에 합류해야만 합니다."
 NOR_invite_soviet_designers: "소련 설계자 초빙"
 NOR_invite_soviet_designers_desc: "우리의 공산주의 동맹이 보유한 기술적 노하우는 우리보다 수십 년은 앞서 있습니다. 그들이 전문 지식을 빌려준다면, 우리는 우월한 무기와 차량으로 적들을 뛰어넘고 불필요한 유혈 사태를 피할 수 있을 것입니다."

#Allied
 NOR_vote_of_no_confidence: "불신임 투표"
 NOR_vote_of_no_confidence_desc: "뉘고르스볼과 그의 노동당이 볼셰비키와 나치를 저지할 것이라고 믿을 수 있겠습니까? 그의 해임은 공산주의로부터 조국을 지킬 준비가 된 총리라기보다는, 트로이의 문을 여는 그리스인처럼 느껴집니다. 그들이 우리의 신생 국가를 [SOU.GetNameDef]에 넘겨주도록 내버려 둘 수 없습니다."
 NOR_liberal_conservative_alliance: "자유보수연합"
 NOR_liberal_conservative_alliance_desc: "회이레(Høyre)와 벤스터(Venstre)가 각각 우파와 좌파를 의미함에도 불구하고, 우리 두 정당은 연립 정부를 구성하고 저 소란스러운 노동당의 모든 공격을 막아낼 만큼 충분한 공통의 이해관계를 가지고 있습니다. 우리는 함께 [ROOT.GetName]을(를) 자본에 우호적이고 국내외 전쟁을 치를 준비가 된 국가로 만들어 나갈 것입니다."
 NOR_sabotage_unions: "노동조합 방해 공작"
 NOR_sabotage_unions_desc: "노동자들이 인권이라 부르는 것은 우리에게는 산업 성장의 장애물일 뿐입니다. 우리는 내외부에서 생디칼리슴 운동을 억누를 수 있으며, 이를 통해 군사 대비 태세에 대한 어떠한 장애물도 쉽게 제거할 수 있습니다."
 NOR_invite_foreign_investment: "외국인 투자 유치"
 NOR_invite_foreign_investment_desc: "우리 산업은 수십 년간 방치되어 유럽의 다른 국가들 수준으로 산업화하는 데 필요한 자본이 부족합니다. 다행히도 해외에는 대가를 받고 우리의 미래에 기꺼이 투자하려는 탐욕스러운 투자자들이 많이 있습니다. "
 NOR_invite_transnational_manufacturers: "다국적 제조업체 유치"
 NOR_invite_transnational_manufacturers_desc: "우리는 무역에 너무 집중한 나머지 국내 생산의 모든 가능성을 활용하지 못했습니다. 이제 노동조합 문제를 처리했으니, 외국 기업들은 방해받지 않는 노동 시장 접근성을 찾아 우리나라로 몰려들 것입니다."
 NOR_contain_the_labor_movement: "노동 운동 억제"
 NOR_contain_the_labor_movement_desc: "노동자 계급의 이익을 위한 운동이 존재하는 한, 우리는 [NOR.GetName]으로 유입되는 자본과 그 흐름을 영속시키는 수단을 완전히 통제할 수 없을 것입니다."
 NOR_uproot_secret_army: "비밀 군대 소탕"
 NOR_uproot_secret_army_desc: "1918년 이전 정부에 의해 창설된 비밀 군대는 결코 일어나지 않은 공산주의 쿠데타를 기다리며 그림자 속에 숨어 있었습니다. 그동안 많은 이들이 급진화되어 확고한 파시스트가 되었습니다. 이들은 언제든 우리 눈앞에서 터질 수 있는 시한폭탄과 같으므로, 반드시 처리해야 합니다."
 NOR_support_finland_in_winter_war: "겨울전쟁에서 핀란드 지원"
 NOR_support_finland_in_winter_war_desc: "볼셰비키가 핀란드를 향해 오고 있으며, 그들이 거기서 멈출 것이라고 믿을 이유가 없습니다. 우리 모두를 삼키기 전에 동쪽의 붉은 곰에 맞서 핀란드 형제들을 지원해야 합니다."
 NOR_arrest_quisling: "크비슬링 체포"
 NOR_arrest_quisling_desc: "[NOR.GetName]의 위험인물 명단이 작성될 때마다 전 국방장관 비드쿤 크비슬링은 거의 등장하지 않습니다. 그의 정당은 쇠퇴하고 친구도 거의 없으며, 무엇보다도 아돌프 히틀러에 대한 맹목적인 숭배는—다른 사람이었다면 어느 나라에서든 위험인물이 되었을 사실인데도—그를 더욱 한심하게 보이게 만듭니다. 하지만 그의 미미한 존재감과 상관없이, 유비무환이 더 낫습니다."
 NOR_protect_finnmark_from_the_bolsheviks: "볼셰비키로부터 핀마르크 보호"
 NOR_protect_finnmark_from_the_bolsheviks_desc: "우리의 최북단이자 최동단 지역인 핀마르크는, 만약 [SOV.GetNameDef]이(가) [FIN.GetNonIdeologyName]을(를) 괴롭히는 것만으로는 충분하지 않다고 결정한다면 명백한 진입 지점이 될 것입니다."
 NOR_replace_laake: "라케 교체"
 NOR_replace_laake_desc: "크리스티안 라케는 임명된 이래로 자유당의 도구였습니다. 그는 육군 역량에 대한 수많은 감축을 강행했으며, 노르웨이를 승리로 이끌 기술이나 의지가 없어 보입니다. 우리는 군대를 [NOR.GetName] 생활의 최전선에 둘 준비가 된 사람이 필요합니다."
 NOR_fde_intelligence_agency: "국방정보국"
 NOR_fde_intelligence_agency_desc: "우리 장병들은 맹목적으로 전선에 나설 수 없습니다. 그들은 무엇을 마주하게 될지 알아야 하며, 작전에서 기만술을 사용할 수 있어야 합니다. 이것이 바로 우리가 육군의 정보 부서를 설립하여, 우리 병사들 대신 그들이 손을 더럽힐 수 있도록 하려는 이유입니다."
 NOR_reform_the_army: "육군 개혁"
 NOR_reform_the_army_desc: "크리스티안 라케와 자유당의 손에 수년간 방치된 결과, 육군은 그야말로 난장판이 되었습니다. 우리는 군 지휘 체계, 군수, 전략 및 규약을 재건하여 우리가 마주할 가능성이 높은 현대 군대와 동등한 수준으로 만들어야 합니다."
 NOR_improved_training: "훈련 개선"
 NOR_improved_training_desc: "병사들을 제대로 된 훈련 없이 전선으로 보낸다면, 동원령을 내리는 대신 사망 증명서를 발급하는 편이 나을 것입니다.\n삐걱거리는 신병 훈련 프로그램을 전면 개편하여 더 나은 전투력을 갖추고, 최대한 신속하게 병력을 배치할 수 있도록 해야 합니다."
 NOR_officers_academy: "사관학교"
 NOR_officers_academy_desc: "훌륭한 장교는 우리 전투 부대의 효율성을 배가시키며, 인구가 적은 우리에게 이는 외세의 맹공에서 살아남으려면 필수적일 것입니다."
 NOR_offensive_doctrines: "공세 교리"
 NOR_offensive_doctrines_desc: "우리의 낡은 교리는 적이 지칠 때까지 방어만 한다는 가정 하에 설계되었습니다. 이는 우리 선조들과 미래의 적들이 한 예상이었으며, 그렇기에 우리는 처음부터 공세로 나서야만 합니다."

#Historical 
 NOR_continue_nygaardsvold_government: "뉘고르스볼 정부 유지"
 NOR_continue_nygaardsvold_government_desc: "요한 뉘고르스볼이 이끄는 노동당 정부는 지금까지 우리를 잘 이끌어 왔습니다. 따라서 남쪽 이웃 국가들의 정치적 긴장과 관계없이, 우리는 노르웨이 경제를 현재 겪고 있는 경제 위기에서 벗어나게 하는 데 계속해서 노력을 집중해야 합니다."
 NOR_weathering_the_storm_to_come: "다가올 폭풍을 견뎌내기"
 NOR_weathering_the_storm_to_come_desc: "국민의 복지를 향상시키려는 이전의 노력에도 불구하고, 우리는 이제 사방에서 고조되는 위협의 현실에 직면해야 합니다. 유럽 전역에서 일고 있는 폭풍에 대비하기 시작해야 합니다. 우리가 쌓아 올린 모든 것은, 지켜내지 못한다면 물거품이 될 것입니다."
 NOR_broken_gun_policies: "부러진 총 정책"
 NOR_broken_gun_policies_desc: "미래의 분쟁을 피하기 위해, 우리는 오직 중립을 추구하며 타국을 침공할 준비를 하고 있지 않다는 것을 증명해야 합니다. 그래야만 강대국들이 우리를 위협으로 보지 않고 내버려 둘 것입니다. 우리는 이것이 오직 광범위한 비무장화를 통해서만 달성될 수 있다고 믿습니다. [SWI.GetAdjective]인들과 그들의 어리석은 무장 중립 교리가 어떻게 생각하든 말입니다."
 NOR_leaving_the_hard_thirties_behind: "힘겨웠던 30년대는 뒤로하고"
 NOR_leaving_the_hard_thirties_behind_desc: "수년간 우리는 대공황의 여파를 견뎌왔으며, 필요한 도구와 산업 기반 없이는 우리 젊은 국가를 안정된 기반 위에 올려놓을 가능성이 거의 없습니다. 이제 [ROOT.GetName]이 성장하고 번영할 수 있는 기반을 구축하기 시작할 때입니다."
 NOR_cut_military_budget: "군사 예산 삭감"
 NOR_cut_military_budget_desc: "세계가 불길에 휩싸이는 것처럼 보일지라도, 그것이 우리에게 군대가 필요하다는 의미는 아닙니다. 우리는 명확한 중립 정책을 가지고 있으므로, 이전에 군비와 방어에 묶여 있던 자원을 절약하여 더 공평하고 번영하는 [ROOT.GetName]을 건설하는 데 전환할 수 있습니다."
 NOR_bail_out_towns: "도시 구제"
 NOR_bail_out_towns_desc: "[ROOT.GetName] 전역의 많은 소도시들이 경제 위기로 타격을 입었습니다. 이들은 스스로는 결코 극복할 수 없는 막대한 부채 부담으로 고통받고 있습니다. 우리에게는 이 공동체들을 구하고 번영의 길로 이끌 수단과 의지가 있으니, 이를 사용합시다."
 NOR_restore_public_trust_in_the_storting: "스토르팅에 대한 대중의 신뢰 회복"
 NOR_restore_public_trust_in_the_storting_desc: "수십 년간의 불안정과 무대책 이후, 일반 대중이 우리 의회인 스토르팅을 신뢰하지 않는 것은 당연합니다. 대중의 신뢰 없이는, 우리나라를 안정으로 이끌기 위해 필요한 조치들을 추진할 수 없을 것입니다."
 NOR_the_neutrality_guard: "중립 수비대"
 NOR_the_neutrality_guard_desc: "타국이 우리의 중립적 위치를 악용하여 적에 대한 이점을 얻고, 우리가 국경을 방어하지 못할 때 우리를 전쟁으로 끌어들일 수 있습니다. 전담 중립 수비대는 어떠한 외국의 교전국도 우리의 신뢰를 깨뜨리지 못하도록 보장할 수 있습니다."
 NOR_rearm_for_defense: "방어를 위한 재무장"
 NOR_rearm_for_defense_desc: "우리는 앞으로 닥칠 위험을 잘못 판단했을 수 있습니다. 우리 해안은 단호한 적에 대한 보호를 제공하지 못할 것이며, 북유럽 이웃 국가들이 영원히 완충지가 되어줄 것이라고 맹목적으로 의존할 수는 없습니다. 이제 잃어버린 시간을 만회하고 [NOR.GetName]이 스스로를 방어할 준비를 갖추도록 재무장해야 합니다. "
 NOR_patrol_our_coast: "해안 순찰"
 NOR_patrol_our_coast_desc: "우리 해안 앞에는 광활한 바다가 펼쳐져 있으며, 이 모든 곳이 [NOR.GetAdjective] 영토로 침입할 수 있는 경로가 될 수 있습니다. 현재 우리 함대는 이 해역에 얇게 분산되어 있습니다. 이 거대한 지역을 성공적으로 방어할 수 있도록 해군을 확장해야 합니다."
 NOR_social_incrementalism: "사회적 점진주의"
 NOR_social_incrementalism_desc: "힘겨웠던 30년대가 [NOR.GetAdjective] 국민들의 마음속에 그저 기억으로 남게 되면서, 우리는 보수주의라는 말벌집을 건드리지 않도록 천천히 접근해야 할지라도 사회적 진보를 추구해야 합니다."
 NOR_print_more_money: "화폐 추가 발행"
 NOR_print_more_money_desc: "우리의 초기 금융 체계는 아직 '힘든 30년대'의 긴축 정책에서 완전히 회복되지 않았습니다. 상황 악화를 막기 위해 가용할 수 있는 모든 수단을 동원해야 하며, 여기에는 국내에 유통될 현금을 추가로 발행하는 것도 포함됩니다."
 NOR_restart_public_investment: "공공 투자 재개"
 NOR_restart_public_investment_desc: "방치로 인해 우리의 기반 시설과 경제가 침체되도록 내버려 둘 때가 아닙니다. 노동당 정부는 민간 생산이든, 예상보다 빨리 다가올지 모르는 전쟁 준비든, 다시 한번 국가의 미래에 투자해야 합니다."
 NOR_coastal_defense: "해안 방어"
 NOR_coastal_defense_desc: "[NOR.GetName]은(는) 세계에서 가장 긴 해안선 중 하나를 보유하고 있으므로, 이를 요새화하는 것은 벅찬 과제가 될 것입니다. 하지만 최근에 되찾은 독립을 유지하려면 반드시 이루어져야 합니다."
 NOR_fortify_norway: "노르웨이 요새화"
 NOR_fortify_norway_desc: "우리의 요새들은 너무 오랫동안 방치되었습니다. 건설 인력을 동원하여 기존 요새들을 신속하게 현대화하고 재건하며, 필요한 곳에는 새로운 요새를 건설해야 합니다."
 NOR_prepare_a_mobile_government: "이동 정부 준비"
 NOR_prepare_a_mobile_government_desc: "전쟁이 시작된 지금, 우리 정부는 적의 표적이 되었습니다. 적은 수단과 방법을 가리지 않고 우리 지도자들을 제거하고 [NOR.GetName] 국민을 예속시키려 할 것입니다. 정부의 가장 중요한 기능들을 위험 지역 밖으로 이동시킬 준비를 갖추는 것이 중요합니다."
 NOR_the_kings_no: "국왕의 거부"
 NOR_the_kings_no_desc: "우리 국왕, 호콘 7세는 적의 예속 요구를 거부했습니다. [NOR.GetName]은(는) 땅이 아니라 국민이며, [NOR.GetAdjective] 국민은 모든 영토를 빼앗기더라도 계속해서 싸울 것입니다."
 NOR_prince_olavs_inspiration: "올라프 왕세자의 격려"
 NOR_prince_olavs_inspiration_desc: "현재 상황에도 불구하고, [NOR.GetAdjective] 국민은 여전히 왕세자를 신뢰하고 있습니다. 비록 전투에 직접 참여하지는 않지만, 망명지에서 보내는 그의 지지는 우리 정부의 정통성에 매우 귀중합니다."
 NOR_establish_milorg: "밀로르그 창설"
 NOR_establish_milorg_desc: "[NOR.GetName]에서의 점령에 대한 저항은 여전히 격렬하지만, 조직력과 규율이 부족합니다. 망명지에서 관리하는 잘 조직된 군사 저항 조직은 우리 정부가 [NOR.GetAdjective] 영토로 귀환할 기반을 마련할 수 있을 것입니다."
 NOR_approach_the_coordinating_committee: "조정 위원회에 접근"
 NOR_approach_the_coordinating_committee_desc: "우리 영토가 적의 수중에 있는 한, 암암리에 활동하며 소규모 민간 단체들을 조직하여 은밀하게 점령에 저항할 조직이 필요합니다. 우리는 다양한 전문가로 구성된 조정 위원회(Koordinasjonskomiteen)가 이 임무를 완수할 것이라 믿습니다."
 NOR_approach_kretsen: "크레첸에 접근"
 NOR_approach_kretsen_desc: "우리 점령지에 거주하는 저명한 [NOR.GetAdjective]인들 중에는 전쟁 전에는 뉘고르스볼 정부에 반대했지만 지금은 우리와 공동의 적을 공유하는 이들이 있습니다. 그리멜룬 농장에서 비밀리에 회합하는 이 판사, 행정가, 관리자, 사업가들이 우리에게 영향력을 빌려준다면 우리의 저항 활동에 매우 중요해질 수 있습니다. "
 NOR_use_xu: "XU 활용"
 NOR_use_xu_desc: "점령된 [NOR.GetName]에는 귀중한 정보가 있습니다. 우리는 저항군, 동맹국, 그리고 망명 중인 우리 자신의 전쟁 수행을 위해 첩보를 제공할 수 있는 조직이 필요합니다."
 NOR_recruit_norwegian_refugees: "노르웨이 피난민 모집"
 NOR_recruit_norwegian_refugees_desc: "수백, 어쩌면 수천 명의 [NOR.GetAdjective]인들이 적의 압제를 피해 점령지를 떠나고 있습니다. 그들 중 다수는 조국을 지키기 위해 싸우던 병력이었으나 탈출하지 못했습니다. 다른 이들은 저항군과 함께 싸우는 법을 배웠고, 일부는 싸워본 적이 없지만 훈련시킬 수 있습니다. 이 전쟁에서 살아남기 위해 우리는 모든 인력을 활용해야 합니다."
 NOR_empower_sivorg: "시보르그 강화"
 NOR_empower_sivorg_desc: "이제 크레첸과 조정 위원회가 우리 활동에 합류했으므로, 이들을 하나의 산하 조직으로 통합하여 협력하게 할 때입니다. 시보르그는 [NOR.GetName]에서의 민간 저항을 조직하기 위해 모든 종류의 민간인을 아우르는 조직이 될 것입니다."
 NOR_preparing_the_return_to_norway: "노르웨이 귀환 준비"
 NOR_preparing_the_return_to_norway_desc: "무대는 마련되었습니다. 우리에게는 적 후방을 교란하는 저항군, 주요 점령지 행정가들의 협력, 망명지에서 잘 훈련된 부대, 그리고 동맹국의 군사 지원이 있습니다. 이제 적에게 반격을 가하여 [NOR.GetNonIdeologyName]을(를) 되찾을 때입니다!"
 NOR_quislings_coup_happened: "크비슬링이 이미 쿠데타를 시작했습니다"

#Fascist 
 NOR_the_stumbling_storting: "휘청거리는 스토르팅"
 NOR_the_stumbling_storting_desc: "정치적 불안정이라는 터널의 끝에서 한 줄기 빛을 보았지만, 이제 그 빛은 더 큰 혼란을 향해 깜빡이고 있습니다. 요한 뉘고르스볼의 최선의 노력에도 불구하고, 스토르팅의 내분은 의회를 혼란으로 더욱 가까이 몰아가고 있습니다."
 NOR_lurk_in_the_shadows: "어둠 속에 잠복하라"
 NOR_lurk_in_the_shadows_desc: "스토르팅이 자멸하는 동안, 우리는 이를 우리에게 유리하게 이용할 것입니다. 의회의 계속되는 실패는 [NOR.GetAdjective] 국민을 국민연합으로, 그리고 파시즘의 손아귀로 끌어들이기 위해 우리가 필요로 하는 구심점입니다."
 NOR_fascist_invasion_of_norway: "노르웨이에 대한 파시스트 침공"
 NOR_fascist_invasion_of_norway_desc: "상상도 못 한 일이 일어났습니다. 우리에게서 멀리 떨어져 있다고 생각했던 파시스트의 위협이 문 앞에 나타나 문을 부수고 들어왔습니다. 우리는 지원이 도착할 때까지 충분히 오래 버티기를 바랄 수밖에 없습니다."
 NOR_ask_for_foreign_support: "외국에 지원 요청"
 NOR_ask_for_foreign_support_desc: "우리 왕국은 파시스트 지지 기반이 넓었던 적이 없었기에, 해외에 있는 파시스트 동지들의 지원이 필요합니다. 그들의 도움으로 우리는 [NOR.GetName]에 범게르만 파시스트 제국으로 가는 길을 보여줄 수 있습니다."
 NOR_approach_the_fatherland_league: "조국 연맹에 접근"
 NOR_approach_the_fatherland_league_desc: "수년 동안 조국 연맹은 노르웨이에서 보수적인 의제를 추진해왔지만, 그들에게는 우리의 추진력과 결의가 부족합니다. 우리는 그들에게 우리가 얼마나 같은 방향을 보고 있는지, 그리고 공산주의에 맞서는 공동의 목표를 달성하기 위해 어떻게 힘을 합칠 수 있는지를 보여줄 수 있습니다."
 NOR_cultivate_the_conservative_parties: "보수 정당 육성"
 NOR_cultivate_the_conservative_parties_desc: "[NOR.GetName]에서 파시즘에 대한 지지율은 낮지만, 스토르팅 주변에는 수많은 보수 단체들이 맴돌고 있습니다. 우리는 그들을 육성하여 파시즘의 씨앗을 심고, 그들을 우리에게로 이끌어 [NOR.GetAdjective] 정치에서 우리의 권력을 공고히 할 수 있습니다."
 NOR_get_industrialist_support: "산업가 지원 확보"
 NOR_get_industrialist_support_desc: "우리의 산업화 수준은 낮지만, 대기업들은 권력의 지렛대에 막대한 영향력을 행사하고 있습니다. 그리고 우리의 도움으로, 그들이 우리를 지지하는 한, 더 큰 영향력을 얻을 수 있습니다.\n\n결국, 자본의 유일한 이념은 자본의 확장이므로, 우리가 그 도구를 제공할 수 있는 한, 그들은 우리 편이 될 것입니다."
 NOR_nasjonal_samling: "국민연합"
 NOR_nasjonal_samling_desc: "수년 동안 [NOR.GetName]의 주도적인 파시스트 정당은 주류 중도 및 좌파 정당에 의해 소외되어 왔습니다. 이제 그것도 끝입니다. 우리는 유능하고 카리스마 있는 지도자, 비드쿤 크비슬링을 중심으로 단결하여 진정한 [NOR.GetAdjective] 파시스트 정권을 수립해야 합니다."
 NOR_the_secret_army: "비밀 군대"
 NOR_the_secret_army_desc: "1918년부터 헤멜리게 헤렌이라 불리는 자치군이 공산주의자들이 정권을 장악할 위험이 있을 경우 즉시 행동에 나서기 위해 [NOR.GetName] 전역에 잠복해 있었습니다. 공산주의에 대한 그들의 맹세는 파시즘에 대한 지지로, 더 중요하게는 우리 자신의 정권 장악에 대한 지지로 전복될 수 있습니다."
 NOR_empower_hirden: "히르덴 강화"
 NOR_empower_hirden_desc: "우리의 준군사조직인 히르덴은 [NOR.GetName]의 미래를 위한 국민연합 계획의 중추였습니다. 히르덴에 집중하는 것은 정부를 장악하고 필요하다면 싸우는 데 필수적일 것입니다."
 NOR_quislings_coup: "크비슬링의 쿠데타"
 NOR_quislings_coup_desc: "국민연합이 권력을 장악할 수밖에 없는 조건이 무르익었습니다. 지도자 비드쿤 크비슬링의 적절한 지도 아래, 이것은 [NOR.GetAdjective] 영토의 완전한 통제와 궁극적으로 스칸디나비아 전역으로의 팽창을 향한 첫걸음입니다."
 NOR_required_prep_fascist_TT: "§Y파시스트 쿠데타에 대한 총 지지§!가 $RIGHT|0Y$보다 높음 (현재 지지: $LEFT|0Y$)"
 NOR_quislings_regime: "크비슬링 정권"
 NOR_quislings_regime_desc: "국민연합 지도자의 확고한 친화력은 분명합니다. 그리고 비록 많은 이들이 정치적으로나 개인적으로, 심지어 그의 내각에서조차 그를 거부하지만, 그의 완고함과 자신감이 결과를 낳았다는 사실은 부인할 수 없습니다. 그는 분명히 제대로 기능하는 정권을 유지할 능력이 있습니다. 얼마나 오래갈지는 두고 봐야 할 일입니다."
 NOR_get_rid_of_quisling: "크비슬링 제거"
 NOR_get_rid_of_quisling_desc: "크비슬링의 쿠데타는 결코 오래 지속될 운명이 아니었습니다. 그것은 우리의 파시스트 동맹국들이 침공에 정당성을 부여할 누군가가 필요할 경우를 대비한 임시방편이었습니다. 이제 이 자신감 과잉인 얼간이가 더는 필요 없다는 것이 분명해졌으니, 우리는 가능한 한 빨리 그를 버려야 합니다."
 NOR_elevate_hirden: "히르덴의 지위 격상"
 NOR_elevate_hirden_desc: "히르덴은 국민연합의 준군사조직으로서 우리에게 훌륭히 봉사해왔지만, 급성장하는 파시스트 정권이 들어선 지금, 우리는 [NOR.GetAdjective] 정부의 권력 구조 내에서 그들의 위치를 공고히 하는 것을 고려해야 합니다."
 NOR_military_police: "헌병"
 NOR_military_police_desc: "우리 정권에 대한 저항이 커짐에 따라, 문제가 곪기 전에 싹을 자를 도구를 확보해야 합니다. 더 발전된 헌병대는 [NOR.GetName]의 인민들이 새로운 질서를 받아들이는 법을 배울 때까지 우리의 권력을 보호할 유일한 방법일지도 모릅니다."
 NOR_extensive_recruitment: "대규모 징병"
 NOR_extensive_recruitment_desc: "제국을 확장하고자 한다면, 노르드 선조의 정신을 가진 병사들을 찾아 [NOR.GetAdjective] 땅을 샅샅이 뒤져야 합니다. 어업과 농업은 제국 확장에 비해 부차적인 문제이므로, 모든 유능한 남성은 적에 맞서 무기를 들 준비가 되어 있어야 합니다."
 NOR_the_weapons_of_conquest: "정복의 무기"
 NOR_the_weapons_of_conquest_desc: "적을 정복하려면 병력과 싸우려는 의지 이상의 것이 필요합니다. 많은 이들이 죽겠지만, 그들의 생존 가능성을 높일 도구를 만드는 것은 국경을 더욱 확장할 수 있음을 의미합니다."
 NOR_lynrytter: "륀뤼테르"
 NOR_lynrytter_desc: "전격전이 우월한 전략임이 증명되었으니, 우리는 이를 받아들이고 전차를 몰아 적의 전선을 돌파해야 합니다. 우리의 기갑이 [NOR.GetNameDef]에 신속한 승리를 가져다줄 때, 오딘께서 직접 우리 편에 서실 것입니다."
 NOR_ulfhedhnar_wolf_coats: "울프헤드나르"
 NOR_ulfhedhnar_wolf_coats_desc: "하랄 1세 국왕을 보호했던 광전사 부대인 옛 늑대 전사들처럼, 이 새로운 울프헤드나르는 우리 영토를 방어하고 확장하기 위해 군의 선봉에 설 정예 전사 계급이 될 것입니다."
 NOR_crackdown_on_civilian_life: "민간 생활 단속"
 NOR_crackdown_on_civilian_life_desc: "여가를 즐길 시간은 없습니다. 전쟁이 닥쳤고, 이 새로운 시대에 전쟁은 총력전이 될 수밖에 없으며, 그렇지 않으면 우리 정권에 죽음과 불명예로 끝날 것입니다. 조국에 대한 봉사를 위해 민간 생활은 축소되어야 합니다."
 NOR_the_administrative_council: "행정 위원회"
 NOR_the_administrative_council_desc: "솔직히 말해, [NOR.GetAdjective] 점령은 더 잘 진행될 수 있었습니다. 아마도 접근 방식을 바꾸는 것이 도움이 될 것이므로, 직접 통치하는 대신 현지 협력자들로 구성된 위원회를 임명하여 주민들에게 자치권을 가진 것처럼 보이게 할 수 있습니다. "
 NOR_abandoning_nynorsk: "뉘노르스크 포기"
 NOR_abandoning_nynorsk_desc: "겉보기에는 민족주의적인 목적에도 불구하고, 뉘노르스크는 시골 외지와 도시 방언의 여러 잔재로 구성된 혼합 언어에 불과합니다. 대부분의 [NOR.GetAdjective]인들이 이미 쓰고 읽는 언어에 집중하는 것이 더 나을 것입니다. 소수 언어 사용자들은 우리의 질서에 적응해야만 할 것입니다."
 NOR_pan_germanic_cooperation: "범게르만 협력"
 NOR_pan_germanic_cooperation_desc: "문화적으로, [NOR.GetNonIdeologyName]은 더 넓은 게르만 세계에 속하므로 그들과 더 긴밀한 협력을 추구하는 것이 타당합니다. 손을 내밀어 함께 제국을 건설합시다."
 NOR_secret_police: "비밀경찰"
 NOR_secret_police_desc: "[NOR.GetAdjective] 주민에 대한 통제를 강화할 때입니다. 우리는 일부 선동의 조짐을 감지했습니다. 사소해 보일지 모르지만, 우리가 그들을 저지할 전술을 개발하기 전에 통일된 전선이 될 수 있습니다. 결국, 칼날의 날카로움을 유지하는 가장 좋은 방법은 자주 사용하는 것입니다."
 NOR_fascist_military_collaboration: "파시스트 군사 협력"
 NOR_fascist_military_collaboration_desc: "해외의 파시스트들이 현재의 정권을 수립하는 데 도움을 주었고, 다행히도 우리는 이제 거의 대등한 입장에서 더 긴밀한 군사 협력을 형성할 수 있는 위치에 있습니다."
 NOR_frontkjempere: "프론트켐페레"
 NOR_frontkjempere_desc: "많은 [NOR.GetAdjective]인들이 우리의 해방자들이 해외를 정복하는 것을 돕기 위해 전선을 갈망합니다. 많은 이들이 죽겠지만, 그것은 세계적인 민족주의 운동의 일원이 되기 위해 치르는 대가일 뿐입니다. 어쩌면 [NOR.GetName]이 자신들의 점령지를 관리할 만큼 신뢰를 얻을 수 있을지도 모릅니다."
 NOR_fascist_industrial_investments: "파시스트 산업 투자"
 NOR_fascist_industrial_investments_desc: "우리의 파시스트 친구들은 현대 국가가 경쟁하기 위해 필요한 첨단 산업에 대한 수완과 자본을 가지고 있습니다. 우리는 이를 더욱 유용한 동맹이 되는 방법으로 활용할 수 있습니다."
 NOR_norwegian_reichsprotectorate: "노르웨이 국가보호령"
 NOR_norwegian_reichsprotectorate_desc: "우리의 많은 성공 덕분에, [GetNorwegianFascistOverlord]는 [NOR.GetName]이 그들의 제국에 완전히 합류할 준비가 되었다고 결정했습니다. 이는 그들의 힘과 그에 대한 우리의 경의를 반영하는 것입니다. 우리는 권력과 영토에 대한 그들의 끊임없이 확장되는 갈증을 만족시키기 위해 무엇이든 할 것입니다."
 NOR_jonas_lie_coup: "요나스 리 쿠데타"
 NOR_jonas_lie_coup_desc: "크비슬링의 무능함은 끝이 없는 것 같습니다. 그는 정권이 시작되기도 전부터 해가 되었으며, 우리 지휘 체계의 약한 고리입니다. 반면에 요나스 리는 처음부터 [GetNorwegianFascistOverlord]의 [ROOT.GetName] 점령을 강력히 지지했으며, 필요할 때는 가차 없는 질서의 대리인이었습니다. 그가 우리 동맹의 목표를 추구하며 자기 민족을 이끌어야 합니다."
 NOR_bring_back_quisling: "크비슬링의 복귀"
 NOR_bring_back_quisling_desc: "많은 이들이 그를 얼빠진 광대 취급하지만, 크비슬링의 권력 장악은 그의 실패 뒤에 숨겨진 교활한 계획을 암시합니다. 이런 인물이야말로 지휘를 맡아, 옛 바이킹처럼 [NOR.GetName]을 새롭고 풍요로운 땅으로 이끌어야 합니다."
 NOR_a_valuable_partner_to_germany: "[GetNorwegianFascistOverlord]의 귀중한 파트너"
 NOR_a_valuable_partner_to_germany_desc: "이 나라의 성공은 본질적으로 [GetNorwegianFascistOverlord]의 성공과 연결되어 있습니다. 우리가 그들을 더 많이 도울수록, 그들은 더 많은 전리품으로 우리에게 보상할 것입니다. 우리는 [NOR.GetNAme]을 필수불가결한 파트너로 만들 수 있는 길로 나아가야 합니다."
 NOR_invite_german_engineers: "파시스트 기술자 초빙"
 NOR_invite_german_engineers_desc: "[NOR.GetName]은 산업 강국이었던 적이 없으며, 우리의 선조들은 자체 생산보다 무역에 더 집중했습니다. 그렇기에 우리는 동맹국, 그리고 더 중요하게는 적국을 따라잡는 데 필요한 지식을 확보하기 위해 [GetNorwegianFascistOverlord]의 도움이 필요합니다."
 NOR_the_kings_abdication: "국왕의 퇴위"
 NOR_the_kings_abdication_desc: "국왕과 그의 시종장은 침략자들의 가공할 힘을 깨닫고, 백성에게 줄 것도, 빼앗을 것도 남지 않았습니다. 호콘 7세 국왕은 드물게 대중 앞에 모습을 드러내, 모든 [NOR.GetAdjective] 국민은 우리 땅에 들끓는 파시스트에게 굴복해야 한다고 발표했습니다."
 NOR_reviving_the_norgesveldet: "노르게스벨데트의 부활"
 NOR_reviving_the_norgesveldet_desc: "우리의 조상들은 눈에 보이고 항해할 수 있는 모든 곳을 약탈하고 정복하며 모두의 두려움을 샀습니다. 우리는 과거를 돌아보고 그 정신을 되살려야 합니다. 우리는 아이들을 밤새 잠 못 이루게 하는 새로운 바이킹의 위협이 될 수 있습니다."
 NOR_old_vinland: "옛 빈란드"
 NOR_old_vinland_desc: "옛 노르드 탐험가들은 다른 누구보다 더 서쪽으로 나아가, 마침내 풍요로운 땅 빈란드, 즉 오늘날의 뉴펀들랜드 래브라도에 도달했습니다. 다시 한번 서쪽으로 원정하여, 원래 우리 것이었어야 할 땅을 정복합시다."
 NOR_claims_on_scotland: "스코틀랜드 영유권 주장"
 NOR_claims_on_scotland_desc: "스코틀랜드는 영국에 속하기 전, 그저 우리 조상들의 뒷마당에 불과했습니다. 바이킹의 뿌리를 거의 감당하지 못하는 그 연약한 손아귀에서 되찾아와, 다시 한번 북부 브리튼의 해안과 산맥을 누빕시다."
 NOR_claims_on_ireland: "아일랜드 영유권 주장"
 NOR_claims_on_ireland_desc: "한때 우리 노르드 조상들이 정착하여 두이블린이라 불렀던 검은 석호에 불과했던 곳. 이 보잘것없어 보이는 곳에서 많은 바이킹이 번성하고, 약탈하며, 게일 부족과 어울렸습니다. 우리가 말로든, 힘으로든 그곳을 되찾아도 그들은 분명 개의치 않을 것입니다."
 
## Monarchist Path
 NOR_the_chamberlains_overture: "왕실 시종장의 서곡"
 NOR_the_chamberlains_overture_desc: "스토르팅(의회)이 무의미해져 가는 가운데, 귀족 가치의 귀감이자, 야를스베르그 봉건 백국의 2순위 계승자이며, 우리의 겸손한 호콘 7세 국왕의 궁내부 장관인 페데르 앙케르 베델-야를스베르그 남작은 미래의 해법을 과거에서 찾아야 한다고 주장합니다. 즉, 왕실 기구가 정부 전체를 장악할 수 있다는 것입니다."
 NOR_send_the_storting_home: "스토르팅 해산"
 NOR_send_the_storting_home_desc: "우리 국회는 오래전에 마지막 숨을 거두었습니다. 이를 살려두는 것은 그 고통을, 솔직히 말해 우리 모두의 고통을 연장할 뿐입니다. 정치인들은 집으로 돌아가 가족과 시간을 보내게 하고, 국왕의 사람들이 이 문제를 맡을 것입니다."
 NOR_assure_the_population: "국민 안심시키기"
 NOR_assure_the_population_desc: "[ROOT.GetName]이 파멸을 향해 치닫는 것처럼 보일 수 있지만, 궁내부 장관은 호콘 7세 국왕을 대신하여, 군주정이 이 땅에 안정을 되찾기 위해 굳건히 버틸 것임을 국민에게 알리고자 합니다."
 NOR_demand_king_haakons_rise_to_power: "호콘 국왕의 권력 장악 요구"
 NOR_demand_king_haakons_rise_to_power_desc: "베델-야를스베르그 남작의 열정적인 연설 덕분에, [NOR.GetName]의 국민들은 강력한 의지를 가진 군주정이 정부의 고삐를 쥘 것을 아우성치고 있습니다. 유일한 문제는 호콘 7세 국왕 본인이 국가가 국민의 대표에 의해 통치되어야 한다고 계속 강조하고 있다는 점입니다. 국왕을 설득할 필요가 있어 보입니다."
 NOR_the_crowns_executive_powers: "왕실의 행정권"
 NOR_the_crowns_executive_powers_desc: "국왕이 절대 권력을 휘두르라는 모든 요구를 계속 거부함에 따라, 우리는 그에게 행정권을 부여할 수밖에 없습니다. 그가 정치적 잠에서 깨어났을 때, [ROOT.GetNonIdeologyName]을 영광으로 이끌 도구를 갖게 될 것입니다!"
 NOR_a_warden_king: "수호자 국왕"
 NOR_a_warden_king_desc: "위에 계신 권능이 부여한 땅을 지키는 것은 국왕의 의무이자, 아니, 특권입니다. 군대를 절대 왕권의 검으로 삼아, 국왕이 일어나 그 검을 휘두르기로 선택할 때까지 잠재워 둡시다."
 NOR_the_kingdom_of_norway: "노르웨이 왕국"
 NOR_the_kingdom_of_norway_desc: "호콘 국왕께서 아시든 모르시든, 때가 왔습니다. 민주주의와 인민 통치라는 허울을 벗어던지고, 군주제의 철권으로 적들을 산산조각 냅시다. 국왕께서는 자신의 재대관식에 참석하는 것 외에는 선택지가 없을 것입니다."
 NOR_appoint_prince_olav_to_army_staff: "올라프 왕세자를 육군 참모로 임명"
 NOR_appoint_prince_olav_to_army_staff_desc: "이제 왕가가 우리의 계획에 동참했으니, 그들의 능력을 활용하여 왕국을 수호하는 임무에 모두 투입해야 합니다. 올라프 왕세자를 육군 지휘부로 임명하면, 그가 받은 모든 훈련과 경험을 발휘하여 지상의 적들을 처리할 수 있을 것입니다."
 NOR_prince_olav_to_navy_staff: "올라프 왕세자를 해군 참모로"
 NOR_prince_olav_to_navy_staff_desc: "우리의 계획에 대한 지속적인 저항에도 불구하고, 올라프 왕세자는 우리 왕국의 해군을 지휘하는 것에 긍정적입니다. 결국 그는 1928년 올림픽에서 요트 금메달을 땄으니, 파도와 한 몸이라는 것을 알고 있습니다. 그가 우리 해군을 이끄는 데 집중한다면, 적들은 우리 백성이 낚는 연어의 먹이가 될 것입니다."
 NOR_promote_civilian_donations: "민간 기부 장려"
 NOR_promote_civilian_donations_desc: "옛 봉건 영지처럼, 모든 봉신은 주군에게 의무를 다해야 합니다. 물론 그 야만적인 시대는 지났고, 우리의 겸손한 군주제는 그보다 더 계몽되었으므로, 이 공물은 대체로 자발적입니다."
 NOR_research_funding: "연구 자금 지원"
 NOR_research_funding_desc: "우리의 고귀한 [ROOT.GetAdjective] 통치자들은 계몽에 헌신하고 있으며, 따라서 우리의 지배력이 처음에는 폭력을 통해, 그리고 결국에는 자비만으로 확장되는 데 필요한 과학적 발전을 위한 후원자가 되는 것을 기쁘게 생각합니다."
 NOR_invite_cadillac_to_norway: "노르웨이에 캐딜락 초청"
 NOR_invite_cadillac_to_norway_desc: "오래 전 우리의 사랑하는 올라프 왕세자께서는, 그 당시에는 즐거운 유아였는데, 소형 캐딜락을 선물 받으셨습니다. 우리가 [NOR.GetNameDef](으)로 캐딜락을 초청하여 적의 시체 위로 우리의 깃발을 실어 나를 차량을 개발하고 생산하는 데 도움을 준다면, 그는 분명히 고마워할 것입니다. 이것이 왕세자에게 어린 시절의 즐거운 추억을 가져다주기를 바랍니다."
 NOR_enhance_coastal_defense: "해안 방어 강화"
 NOR_enhance_coastal_defense_desc: "우리 해안 영토의 광활함은 양날의 검입니다. 한편으로는 우리 병사들이 바다에서 번성할 수 있게 하지만, 다른 한편으로는 적에게 해상 침공을 위한 넓은 진입로를 제공한다는 것을 의미합니다."
 NOR_rule_the_northern_sea: "북해를 지배하라"
 NOR_rule_the_northern_sea_desc: "우리 왕국을 북해로 확장합시다! 우리의 함선은 우리 왕국을 수평선 너머로 뻗어나가게 할 팔이 될 것입니다. 이를 위해서는 그러한 지배력을 유지하는 데 필요한 해군 기지와, 우리가 더 멀리 나아갈 수 있게 해 줄 관행과 기술이 필요합니다."
 NOR_ramp_up_naval_production: "해군 생산 증강"
 NOR_ramp_up_naval_production_desc: "우리의 유서 깊은 해양 전통에도 불구하고, 현재 우리의 해군력은 우리의 야망에 미치지 못합니다. 우리는 첫 단계로서, 우리의 왕세자이자 미래의 왕인 올라프의 해군에 연료를 공급할 조선소를 건설하는 데 모든 노력을 기울여야 합니다."
 NOR_power_to_the_royal_guard: "왕실 근위대에 힘을"
 NOR_power_to_the_royal_guard_desc: "한스 마예스테트 콩엔스 가르데, 즉 우리의 사랑하는 국왕 폐하의 왕실 근위대는 왕국에서 가장 잘 훈련되고 가장 단호한 전투 부대였습니다. 그들이 우리 국왕과 그의 섭정으로부터 받는 영감은 명백하므로, 그들이 우리 군의 돌격을 이끌어야 하며, 적을 분쇄할 창의 끝이 될 것입니다."
 NOR_encourage_recruitment: "모병 장려"
 NOR_encourage_recruitment_desc: "우리의 사랑하는 시종장이 말하듯이, 호콘 국왕은 우리 마음속에 살아계시니, 누구나 그를 위해 싸우고 죽을 수 있습니다! 그의 정신이 [ROOT.GetNameDef]의 모든 백성을 고양시켜 주군을 위해 싸우도록 징집하게 합시다."
 NOR_for_the_king_and_prince: "국왕과 왕세자를 위하여"
 NOR_for_the_king_and_prince_desc: "우리 호콘 국왕과 그의 아들 올라프 왕세자는 모든 [NOR.GetAdjective]인에게 영감을 줍니다. 우리는 병사들에게 한 걸음 한 걸음 전진하고, 적 하나하나를 죽이고, 피 한 방울 한 방울을 흘리는 것이 헛되지 않다는 것을 상기시켜야 합니다. 이 모든 것은 우리 왕가, [NOR.GetName]의 귀족들, 그리고 그들이 대표하는 모든 것을 위한 것입니다."
 NOR_the_kings_line: "국왕의 방어선"
 NOR_the_kings_line_desc: "우리 왕국의 국경을 따라 이어진 벙커와 토치카는 국왕의 회복력과 의지의 물리적 현현입니다. 우리 병사들이 피를 흘려 국왕의 방어선을 지키고 그의 왕국이 온전하게 유지되도록 합시다."
 NOR_the_glucksburg_sea_wall: "글뤽스부르크 방조제"
 NOR_the_glucksburg_sea_wall_desc: "야를스베르그 백작이 우리의 영광스러운 호콘 7세 국왕께서 속한 가문인 글뤽스부르크 가문의 이름으로 방조제 건설을 시작했습니다. 이것은 왕가의 힘을 대리하여 적을 막고 우리의 피오르와 산을 위험으로부터 보호할 것입니다."
 NOR_shield_of_the_north: "북방의 방패"
 NOR_shield_of_the_north_desc: "휘두르지 않는 검이 무슨 소용이며, 그 아래 백성을 보호하지 못하는 방패가 무슨 소용이겠습니까? 우리 왕가는 [NOR.GetNameDef]뿐만 아니라 의무적으로 그들의 것인 왕국과 땅도 보호해야 합니다. 법적으로는 반드시 그렇지 않더라도 말입니다."
 NOR_our_royal_claims: "우리의 왕실 영유권"
 NOR_our_royal_claims_desc: "[NOR_GetOurRoyalClaimsDesc]"
 NOR_our_royal_claims_desc_king: "우리는 현재 관할권 밖의 영토에 대한 어떠한 영유권도 부인하는 겸손한 국왕을 모시는 행운을 누리고 있습니다. 더욱 다행인 것은, 우리의 소중한 페데르 앙케르 베델-얄스베르그 백작이 이러한 영유권을 주장하고 우리 왕국으로 편입시키기 위해 필요한 모든 일을 기꺼이 하려 한다는 점입니다. 우리 국왕의 땅을 위해 싸웁시다!"
 NOR_our_royal_claims_desc_queen: "호콘 7세 국왕께서 더 이상 우리와 함께하지 않는 것은 안타까운 일이지만, 우리는 그가 남긴 유산, 즉 유럽 전역에 걸친 수많은 영유권을 기억해야 합니다. 더욱 다행인 것은, 우리의 소중한 마틸데 1세 여왕께서 자신만의 영유권을 가지고 있을 뿐만 아니라, 이를 주장하고 우리 왕국으로 편입시키기 위해 필요한 모든 일을 기꺼이 하려 한다는 점입니다. 우리 왕실의 땅을 위해 싸웁시다!"

 NOR_swedish_claims: "스웨덴 영유권 주장"
 NOR_swedish_claims_desc: "[NOR_GetSwedishClaimsDesc]"
 NOR_swedish_claims_desc_mon: "본의 아니게, 우리의 역사와 왕가는 [SWE.GetNonIdeologyName]과 얽혀왔습니다. 수 세기 동안 계속된 엎치락뒤치락 속에서, [SWE.GetAdjective]은 옌틀란드, 헤리에달렌, 보후슬렌 등 광대한 영토를 훔쳐갔습니다. 베르나도테 가문, 바사 가문, 올덴부르크 가문, 혹은 그 외 누구의 책임인지는 중요하지 않습니다. 우리는 복수하고 우리의 땅을 되찾을 것입니다."
 NOR_swedish_claims_desc_fas: "스칸디나비아 군주국의 역사는 길고 복잡하게 얽혀 있지만, 우리는 이를 우리에게 유리하게 이용할 수 있습니다. 스웨덴은 한때 우리 국가에 속했던 지역 전체를 훔쳐갔습니다. 우리는 복수를 명분으로 [SWE.GetAdjective]을 침공하고, 우리 제국을 역사적인 [NOR.GetAdjective] 영토의 통합체로 성장시킬 수 있습니다."
 NOR_claims_on_faroe_islands: "페로 제도 영유권 주장"
 NOR_claims_on_faroe_islands_desc: "[NOR_GetFaroeClaimsDesc]"
 NOR_claims_on_faroe_islands_desc_PAWJ: "[DEN.GetNonIdeologyName]과 [SWE.GetNonIdeologyName] 군주국의 과거 범법 행위로 인해 우리는 페로 제도를 빼앗겼습니다. 이제 그것도 끝입니다. 우리의 고귀한 시종장께서 피의 대가를 치러서라도 반드시 되찾아올 것입니다."
 NOR_claims_on_faroe_islands_desc_ALT: "[DEN.GetNonIdeologyName]과 [SWE.GetNonIdeologyName] 군주국의 과거 범법 행위로 인해 우리는 페로 제도를 빼앗겼습니다. 이제 그것도 끝입니다. 우리의 현명하신 마틸데 1세 여왕께서 피의 대가를 치러서라도 반드시 되찾아올 것입니다."
 NOR_eirik_raudes_land: "에이리크 라우데스 란드"
 NOR_eirik_raudes_land_desc: "1933년 헤이그의 터무니없는 결정은 반드시 뒤집혀야 합니다. 감히 노르웨이인인 붉은 에리크가 천 년 전에 발견한 땅을 [DEN.GetName]에게 넘겨주다니요. 불과 몇 년 전만 해도 우리는 그린란드 동부 해안의 일부를 소유했지만, 곧 그곳과 그 이상을 차지할 것입니다. 우리의 것을 되찾을 때 붉은 에리크의 유산은 계속될 것입니다."
 NOR_iceland: "아이슬란드"
 NOR_iceland_desc: "[NOR_GetIcelandClaimDesc]"
 NOR_iceland_desc_PAWJ: "칼마르 동맹 해체 이후 아이슬란드는 부당하게 우리에게서 빼앗겼습니다. 수 세기 전의 일임에도 불구하고, 우리는 잊지 않았습니다. 우리의 시종장, 국왕, 그리고 왕자께서는 이 문제가 바로잡혀 아이슬란드가 다시 노르웨이 왕국의 일부가 될 때까지 잠들지 않을 것입니다."
 NOR_iceland_desc_ALT: "칼마르 동맹 해체 이후 아이슬란드는 부당하게 우리에게서 빼앗겼습니다. 수 세기 전의 일임에도 불구하고, 우리는 잊지 않았습니다. 우리의 여왕, 왕자, 그리고 그들이 다스리는 백성들은 이 문제가 바로잡혀 아이슬란드가 다시 노르웨이 왕국의 일부가 될 때까지 잠들지 않을 것입니다."
 NOR_bjarmeland: "비아르말란드"
 NOR_bjarmeland_desc: "[ROOT.GetAdjective] 탐험가들은 수 세기 동안 가능성과 도달 가능한 것의 경계를 넓혀왔습니다. 그중 하나가 바로 비아르말란드로, [NOR.GetAdjective]인들이 처음 탐험했지만 지금은 우리 손을 벗어났습니다. 우리는 다시 한번 손을 뻗어 이 땅을 우리 것으로 만들어야 합니다."
 NOR_claims_on_denmark: "덴마크 영유권 주장"
 NOR_claims_on_denmark_desc: "[NOR_GetDanishClaimsDesc]"
 NOR_claims_on_denmark_desc_mon: "덴마크는 우리가 사랑하는 국왕께서 고향이라 부르던 땅이었을지 모르지만, 우리는 그가 왕으로 선출되기 전부터 그의 진정한 고향은 항상 [NOR.GetNonIdeologyName]이었음을 알고 있습니다. 그럼에도 불구하고, 우리는 그의 옛 나라를 그의 왕국으로 편입시켜야 합니다. 어쩌면 그것이 그가 우리 군주국 정부에서 더 적극적인 역할을 하도록 동기를 부여할지도 모릅니다."
 NOR_claims_on_denmark_desc_fasc: "[DEN.GetNonIdeologyName]의 군주들은 한때 우리의 주인이었지만, 다시는 그런 일이 없을 것입니다. 그들은 이제 약하고 보잘것없으니, 그 땅은 우리가 차지할 것입니다. 우리의 새로운 힘 앞에서 그들의 군대는 어린아이 손에 든 버터 쇼트브레드처럼 부서질 것입니다!"
 NOR_consolidate_kingdom: "왕국 통합"
 NOR_consolidate_kingdom_desc: "[GetConsolidateKingdomDesc]"
 NOR_consolidate_kingdom_desc_PAWJ: "이제 우리의 자비로우신 페데르 앙케르 베델-얄스베르그 후작, 시종장이자 우리가 사랑하는 호콘 7세의 오른팔께서 우리 왕실의 영토를 확장하셨으니, 우리는 내부를 돌아보며 우리의 성과를 공고히 하고, 다소 엄격하더라도 금박을 입힌 꾸준한 손길로 신민들을 다스려야 합니다."
 NOR_consolidate_kingdom_desc_alt: "이제 우리의 정당한 여왕이신 마틸데 1세께서 우리 왕실의 광대한 영토를 충실히 감독하고 계시니, 우리는 내부를 돌아보며 우리의 성과를 공고히 하고, 벨벳 장갑과 꾸준한 손길로 신민들을 다스려야 합니다."
 
## The Rest 
 NOR_start_rearmament: "재군비 시작"
 NOR_start_rearmament_desc: "아마도 완전한 군축은 우리가 바라던 전쟁을 피할 확실한 방법이 아닌 것 같습니다. 우리 영토에 대한 잠재적인 공격에 대비한 준비를 시작해야 합니다."
 NOR_kickstart_military_industry: "군수 산업 활성화"
 NOR_kickstart_military_industry_desc: "[ROOT.GetName]은(는) 오랫동안 다른 국가의 지배를 받아왔기에, 자체적인 군수 산업을 발전시키지 못했습니다. 우리의 자유를 지키기 위해, 우리는 더 이상 방위 생산을 다른 국가에 의존하지 말고 우리만의 전쟁 기계를 구축하기 시작해야 합니다."
 NOR_build_supplies_network: "보급망 건설"
 NOR_build_supplies_network_desc: "우리의 숨 막히는 산, 호수, 피오르는 세계의 부러움을 사지만, 보급품 이동을 어렵게 만들기도 합니다. 우리는 보급품이 전선에 더 빨리 도달하도록 의식적인 노력을 기울여야 합니다."
 NOR_drobak_coastal_fort: "드뢰바크 해안 요새"
 NOR_drobak_coastal_fort_desc: "드뢰바크, 더 구체적으로는 드뢰바크 해협이 우리 수도를 방어하는 열쇠가 될 수 있습니다. 적절한 위치에 발사된 어뢰 한 발이 대응에 필요한 준비를 할 수 있을 만큼 침공을 지연시킬 수 있을지는 아무도 모릅니다."
 NOR_modernize_fortifications: "요새 현대화"
 NOR_modernize_fortifications_desc: "어떤 이들은 우리의 요새를 '나폴레옹 시대의 것'이라고 부르는데, 이 맥락에서는 결코 칭찬이 아닙니다. 우리의 벙커는 오래되었을지 몰라도 적의 무기는 그렇지 않습니다. 우리의 요새를 기준에 맞게 끌어올리기 위한 노력과 자원은 미래에 분명 보답할 것입니다." 
 NOR_artillery_development: "포병 개발"
 NOR_artillery_development_desc: "대전쟁은 포병의 중요성을 증명했습니다. 우리는 이미 뒤처진 상태에서 더 이상 뒤처질 수 없으며, 그렇지 않으면 적의 포탄에 무력해질 위험이 있습니다."
 NOR_anti_air_support: "대공 지원"
 NOR_anti_air_support_desc: "침략자가 어디에서 오든 한 가지는 확실합니다. 그들은 항공기를 이용해 제공권을 장악하고 우리의 도시와 군대를 폭격하려 할 것입니다. 물론 우리가 공중에서의 모든 시도를 무력화하기 위해 대공 방어 체계를 구축하지 않는 한 말입니다."
 NOR_rikstanken: "릭스탕켄"
 NOR_rikstanken_desc: "슬픈 진실이지만, [ROOT.GetName]은(는) 이전에 전차를 소유한 적이 없습니다. 승리의 기회를 잡으려면 기갑은 필수입니다. 문제는 우리의 접근 방식이 어떠해야 하는가입니다. 우리와 같은 상황의 국가에게 다수의 전차는 비용이 많이 드는 제안일 수 있습니다. 아마도 단 한 대의 전차로 시험해 볼 수 있을까요? 아니면, 국가의 전차를 위해 돈 이외의 다른 것을 희생할 수도 있을 것입니다."
 NOR_tank_procurement: "전차 조달"
 NOR_tank_procurement_desc: "우리의 자체 전차 프로그램은 20세기의 기갑전에 명백히 불충분합니다. 긍정적인 점은 필요한 전문 지식과 생산량을 갖춘 많은 국가들이 기갑 차량을 판매할 수 있다는 것입니다. 이는 [ROOT.GetAdjective] 육군을 현세기로 이끌어줄 훌륭한 지름길이 될 것입니다."
 NOR_norges_rikstanksfabrikk: "노르웨이 국립 전차 공장"
 NOR_norges_rikstanksfabrikk_desc: "이제 기갑전의 기초를 배웠으니, 우리는 우리만의 국립 전차 제조 프로그램, 즉 릭스탕크스파브리크를 개발할 준비가 되었습니다. 이것이 우리가 기갑 차량의 중단 없는 공급을 보장할 수 있는 유일한 방법입니다."
 NOR_improve_production_lines: "생산 라인 개선"
 NOR_improve_production_lines_desc: "계속 싸울 무기와 장비를 제공할 수 없다면, 조국을 지키는 용기는 아무 소용이 없습니다. 현대전은 반격할 총알을 갖추는 것이 전부입니다. 우리가 발사하는 속도만큼 빠르게 총알을 생산할 수 있도록 합시다."
 NOR_the_royal_guards_battalion: "왕실 근위대대"
 NOR_the_royal_guards_battalion_desc: "한동안 왕실 근위대는 우리의 가장 정예 전투 부대였습니다. 우리는 이 프로그램을 확장하고 훈련을 개선하여 그들이 우리 군의 선봉이 되게 할 수 있습니다."
 NOR_expand_Haeren: "육군 확장"
 NOR_expand_Haeren_desc: "우리의 현재 지상군은 대륙의 다른 군대와 비교할 때 초라하며, [ROOT.GetName]은(는) 결코 군국주의적인 국가가 아니었습니다. 세계 대전의 위협이 커짐에 따라, 우리는 국민이 우리의 젊은 국가를 방어할 준비가 되어 있는지 확인해야 합니다."
 NOR_improved_weapons: "개량된 무기"
 NOR_improved_weapons_desc: "우리 지상군이 사용하는 장비는 한심한 상태에 있습니다. 이는 우리의 독립을 앗아갈 수 있는 용납할 수 없는 태만입니다. 우리는 할 수 있을 때 이 추세를 되돌리기 위해 서둘러야 합니다."
 NOR_building_an_independent_norway: "독립 노르웨이 건설"
 NOR_building_an_independent_norway_desc: "[ROOT.GetAdjective] 국가는 현재의 독립된 형태로 1905년부터 존재했을 뿐이므로, 국가 건설을 위해 해야 할 일이 많습니다. 특히 우리나라의 독립에 필수적인 산업 분야에서는 더욱 그렇습니다."
 NOR_independent_norway_removal_tt: "§Y$NOR_independent_norway_dmod$§! §R[ROOT.GetNonIdeologyName]이(가) 다른 국가의 종속국이 되면 제거됩니다!§!"
 NOR_norwegian_school_of_economics: "노르웨이 경제 학교 "
 NOR_norwegian_school_of_economics_desc: "세계 경제에서 자립하려면 전문 지식이 필요하며, 이를 구축하는 데는 시간이 걸립니다. 국립 경제 학교로서 노르웨이 경영대학(Norges Handelshøyskole)을 설립하는 것은 민간, 그리고 나아가 군수 산업이 번창하기 위한 첫걸음입니다."
 NOR_hurtigruten: "후르티그루텐"
 NOR_hurtigruten_desc: "[ROOT.GetNonIdeologyName]은(는) 유난히 긴 나라일 뿐만 아니라 사방이 험준한 지형이라는 점은 부인할 수 없습니다. 이는 분명 우리의 국가 정체성을 형성했지만, 제대로 된 기반 시설과 철도를 건설하는 것을 불가능하게 만듭니다. 우리는 해결책으로 후르티그루텐을 설립해야 합니다. 이는 [ROOT.GetAdjective] 해안선을 따라 사람과 물자를 운송하는 일련의 여객선입니다."
 NOR_norges_tekniske_hogskole: "Norges Tekniske Høgskole"
 NOR_norges_tekniske_hogskole_desc: "20년 이상 트론헤임의 노르웨이 공과대학은 국내 공학 기술의 선두에 있었습니다. 하지만 이웃, 그리고 잠재적인 적들과 경쟁하려면 기술 교육에 더 많은 자금을 지원해야 합니다. 우리 산업에 필요한 전문 지식이 부족하게 둘 수는 없습니다."
 NOR_empower_large_industrial_groups: "대규모 산업 그룹 강화 "
 NOR_empower_large_industrial_groups_desc: "대규모 산업 기업들은 공장을 건설하고 유지하며, 평범한 [ROOT.GetAdjective] 시민의 일상 필수품을 생산해 온 검증된 실적을 가지고 있습니다. 그들을 신뢰하는 것이야말로 [ROOT.GetNonIdeologyName]이(가) 산업적 독립을 향해 나아갈 올바른 길일 것입니다."
 NOR_fund_local_construction: "지역 건설 자금 지원"
 NOR_fund_local_construction_desc: "우리의 산업화가 수도와 몇몇 주요 도시에만 집중되게 할 수는 없습니다. 발전은 가능한 한 [ROOT.GetName] 전역에 고르게 이루어져야 합니다. 그러니 더 다양한 산업 기반과 더 견고한 경제를 위해, 지역 건설을 촉진하도록 소도시와 읍내에 투자합시다."
 NOR_aluminum_production: "알루미늄 생산"
 NOR_aluminum_production_desc: "알루미늄 생산은 극도로 전력 집약적인 공정입니다. 보크사이트 매장량은 부족하지만, [ROOT.GetAdjective] 지형은 수력 발전에 이상적이므로, 보크사이트를 쉽게 수입하여 신생 군수 산업을 위한 귀중한 자원으로 전환할 수 있습니다."
 NOR_build_the_northern_rail: "북부 철도 건설"
 NOR_build_the_northern_rail_desc: "너무 오랫동안 우리나라의 북부 지역은 방치되어 왔습니다. 지형 때문에 기반 시설 건설이 복잡한 사업이 되지만, 이는 미래에 분명히 이익을 가져다줄 노력입니다."
 NOR_complete_the_sourthern_railway_network: "남부 철도망 완공"
 NOR_complete_the_sourthern_railway_network_desc: "[ROOT.GetNonIdeologyName]의 남부 지역이 북부 지역보다 월등히 발전했다 하더라도, 그 기반 시설을 다른 나라, 심지어 이웃 나라의 것과 비교하기 시작하면 아직 해야 할 일이 많다는 것이 분명합니다."
 NOR_increase_research_funding: "연구 자금 증액"
 NOR_increase_research_funding_desc: "[ROOT.GetName]은(는) 아직 기술 강국이었던 적이 없습니다. 미래의 적에게 종속될 위험을 피하려면, 나머지 유럽을 따라잡기 위해 새로운 연구에 투자해야 합니다."
 NOR_expand_norges_tekniske_hogskole: "Norges Tekniske Høgskole 확장"
 NOR_expand_norges_tekniske_hogskole_desc: "지평선 너머로 다가오는 듯한 대규모 분쟁을 고려할 때, 우리는 점점 더 복잡해지는 전쟁의 요구에 부응하기 위해 공과대학의 규모를 늘릴 필요가 있을 것입니다."
 NOR_revamp_hydroelectric_capacity: "수력 발전 능력 개선"
 NOR_revamp_hydroelectric_capacity_desc: "알루미늄은 항공기와 기타 전쟁 도구 제작에 필수적이지만, 보크사이트를 알루미늄으로 가공하는 데 필요한 에너지양 때문에 비용이 많이 드는 공정입니다. 다행히도 [NOR.GetName]은(는) 수많은 호수와 강을 수력 발전 댐으로 바꾸기에 완벽한 지형을 갖추고 있습니다. 따라서 대규모 보크사이트 매장지가 없음에도 불구하고 필요한 알루미늄을 생산할 수 있습니다."
 NOR_haerens_flyvevaaben: "Hærens Flyvevaaben"
 NOR_haerens_flyvevaaben_desc: "전쟁의 새로운 영역은 하늘에 있습니다. 적이 우리 영공을 완전히 장악하게 둔다면, 우리 지상군은 효과적으로 행동할 수 없을 것입니다. 우리는 지상군에 유리하게 행동할 수 있는 공군을 개발해야 합니다."
 NOR_norwegian_planes: "노르웨이 항공기 "
 NOR_norwegian_planes_desc: "우리는 오늘의 동맹이 내일의 침략자가 될 수 있다는 것을 목격했습니다. 이런 이유로 우리는 항공기를 외국에 의존할 수 없습니다. 현대 전장에서 항공기의 중요성은 너무나도 큽니다."
 NOR_foreign_plane_designs: "외국 항공기 설계"
 NOR_foreign_plane_designs_desc: "신생 국가이자 오랫동안 방치된 국가로서, [ROOT.GetName]은(는) 현대 전투에 필요한 공군력을 설계하고 제조할 기반 시설, 노하우 또는 도구를 갖추고 있지 않습니다. 우리는 [NOR.GetName]의 공군에 보급하기 위해 국제 무기 시장에 의존해야 합니다."
 NOR_anti_air_artillery_research: "대공포 연구"
 NOR_anti_air_artillery_research_desc: "상공에 새로운 기술이 배치됨에 따라, 지상에서 영공을 방어하는 무기 또한 그에 맞춰 발전해야 합니다. 그래야 적의 제공권에 굴복하지 않을 수 있습니다."
 NOR_anti_air_construction: "대공포 건설"
 NOR_anti_air_construction_desc: "험준한 지형 덕분에 [NOR.GetName]은(는) 적의 침공에 어려운 목표물이지만, 우리의 하늘은 적 항공기에 노출되어 있어 잠재적인 외세의 침공에 이점이 될 수 있습니다. 이를 막기 위해 필요한 대공포대를 건설해야 합니다."
 NOR_invest_in_airfields: "비행장 투자 "
 NOR_invest_in_airfields_desc: "항공기를 이륙시킬 기반 시설이 없다면 항공기를 보유하는 의미가 없습니다. 우리는 확장되는 공군의 요구를 충족시키는 데 필요한 기반 시설이 턱없이 부족합니다."
 NOR_stavanger_airfield: "스타방에르 비행장"
 NOR_stavanger_airfield_desc: "스타방에르 공항이 곧 완공될 예정이며, 그 위치는 군 비행장으로 완벽합니다. 이 민간 공항을 군용 공군 기지로 사용하기 위해 필요한 조정을 할 수 있습니다."
 NOR_increase_air_production: "항공기 생산 증대 "
 NOR_increase_air_production_desc: "[NOR.GetName]은(는) 항공기가 필요하며, 지금 당장 필요합니다! 항공기 생산에 노력을 쏟는다면, 스스로를 방어하고 적의 방어선을 돌파할 수 있을 것입니다."
 NOR_buy_aa_from_sweden: "스웨덴에서 대공포 구매 "
 NOR_buy_aa_from_sweden_desc: "동쪽의 이웃 국가인 [SWE.GetName]은(는) 우리가 만들 수 있는 수준을 훨씬 뛰어넘는 대공포를 오랫동안 탁월하게 제조해 왔습니다. 임박한 침공에 대비하여 영공을 방어하기 위해 이 보포스 포를 구매하겠다는 요청으로 그들에게 접근할 수 있습니다."
 NOR_luftforsvaret: "$NOR_royal_air_force_dmod$"
 NOR_luftforsvaret_desc: "이제 우리 공군이 단순히 육군의 지원 부대에 머무르는 것을 그만두고, 독자적인 군종으로 발전해야 할 때입니다. 현대전에서 요구되는 모든 작전을 효과적으로 수행하는 데 필요한 자원을 갖춘 군종 말입니다."
 NOR_radar_research: "레이더 연구"
 NOR_radar_research_desc: "광활한 해안선을 가진 국가로서 이를 효과적으로 감시하는 것은 매우 중요합니다. 레이더라는 기술적 기적 덕분에, 우리는 더 먼 거리에서 접근하는 함선과 항공기를 인지할 수 있습니다."
 NOR_repurpose_lighthouses: "등대 용도 변경"
 NOR_repurpose_lighthouses_desc: "날씨와 지형으로 인해 [ROOT.GetAdjective] 해안 전역의 등대는 필수적인 요소이자 국가의 상징이 되었습니다. 우리는 등대를 레이더 장비를 지원하고 침략자를 막아내는 데 사용하여 희망의 횃불로 바꿀 수 있습니다."
 NOR_pilot_training: "조종사 훈련 "
 NOR_pilot_training_desc: "우리의 초기 공군이 작고 미개발 상태일지라도, 우리는 비행가와 탐험가의 전통을 바탕으로 새로운 세대의 [NOR.GetAdjective] 조종사들에게 영감을 줄 수 있습니다. 그들이 우리에게 지속적인 독립을 가져다줄 것입니다."
 NOR_the_royal_norwegian_navy: "$NOR_royal_navy_dmod$"
 NOR_the_royal_norwegian_navy_desc: "세계에서 가장 긴 해안선 중 하나를 보유한 것은 장점이 있지만, 이를 방어하는 데 추가적인 노력이 필요하다는 의미이기도 합니다. 우리 해군은 국가 방어의 최전선이 될 것입니다. "
 NOR_expand_the_dockyards: "조선소 확장"
 NOR_expand_the_dockyards_desc: "세계 최대 규모의 상선단을 보유하고 있음에도 불구하고, 우리의 조선소 수용 능력은 확실히 확장될 수 있으며, 단순히 화물선과 유조선을 생산하는 대신 군함의 생산량을 늘리도록 최적화될 수 있습니다."
 NOR_battleship_focus: "전함 집중 "
 NOR_battleship_focus_desc: "거대하고 장갑을 두른 선체만이 우리가 진정으로 바다를 지배한다는 것을 보장할 수 있습니다. 적의 해안에서 우리 전함 중 한 척을 보게 될 것이라는 위협은 잠재적인 침략자를 저지할 것입니다."
 NOR_kystvakten: "퀴스트바크텐"
 NOR_kystvakten_desc: "광대한 해안을 보호하기 위해서는 수평선의 모든 곳을 감시할 수 있도록 숫자가 필요합니다. 적대적인 함선으로부터 우리 영토를 지킬 함선망을 구축합시다."
 NOR_convert_merchant_ships: "상선 개조"
 NOR_convert_merchant_ships_desc: "우리 상선단은 우리 경제의 자랑이지만, 침략자들이 우리 땅을 파괴한다면 아무 소용이 없을 것입니다. 우리의 해운업계 거물들은 [ROOT.GetName]을(를) 위해 희생하고 이 선박들을 전투에 적합하게 만들도록 해야 합니다."
 NOR_expand_merchant_marine: "상선단 확장"
 NOR_expand_merchant_marine_desc: "현대전은 자원과 장비를 필요로 합니다. 이 두 가지는 [ROOT.GetName]에 절실히 부족합니다. 전쟁이 다가옴에 따라, 생존에 필요한 모든 것을 운송할 충분한 선박을 확보해야 합니다. 비록 대부분의 국가보다 많은 민간 선박을 보유하고 있지만, 그 과정에서 많은 손실이 예상되므로, 부족 사태를 감당할 수는 없습니다."
 NOR_expand_naval_academy: "해군사관학교 확장"
 NOR_expand_naval_academy_desc: "함선이 늘어난다는 것은 전투에서 함선을 이끌 더 많은 장교가 필요하다는 의미입니다. 우리 해군사관학교는 수년간 충분한 인력을 양성해왔지만, 해군이 확장됨에 따라 장교와 수병의 공급도 반드시 늘어나야 합니다."
 NOR_norwegian_carriers: "노르웨이 항공모함"
 NOR_norwegian_carriers_desc: "미래전이 해상에서조차 제공권 장악에 크게 좌우된다는 것을 거듭 확인했습니다. 항공모함은 적 함선 상공을 지배하고 신속하게 격파하는 데 도움이 될 것입니다."
 NOR_mine_laying_effort: "기뢰 부설 작전"
 NOR_mine_laying_effort_desc: "우리 함선이 모든 곳에 동시에 있을 수는 없지만, 기뢰는 더 넓은 해역을 방어하고 적 함장의 안전을 위협할 수 있습니다. 최신 기뢰 회피 및 무력화 기술을 극복하려면 더 성능 좋은 기뢰가 필요합니다."
 NOR_submarine_fleet: "잠수함 함대"
 NOR_submarine_fleet_desc: "잠수함은 특유의 효율성과 은밀함으로 어뢰 한 발 한 발을 통해 해전의 흐름을 바꿀 수 있습니다. 승리의 가능성을 극대화하려면 더 많고 더 우수한 잠수함을 건조해야 합니다."
 NOR_naval_air_force: "해군 항공대"
 NOR_naval_air_force_desc: "우리 항공기는 [ROOT.GetName] 침공을 지원하는 함대와 우리 해안의 평온한 바다를 가르는 결정적인 차이를 만들 수 있습니다. 해상 제공권을 장악한다면, 다시 한번 파도를 지배할 수 있을 것입니다."
 NOR_convoy_defense: "수송선단 방어"
 NOR_convoy_defense_desc: "우리나라의 보물은 거대한 상선단입니다. 이를 헛되이 잃을 수는 없습니다. 수송선단을 방어하기 위한 노력을 강화하여 전쟁에서 더 오래 지속되고 더 큰 영향력을 발휘하도록 해야 합니다."
 NOR_nortraship: "노르트라십"
 NOR_nortraship_desc: "전쟁으로 조국에서 망명하게 된 지금, 우리의 해운 역량을 하나의 깃발 아래 통합해야 합니다. 노르트라십을 통해 멀리서 전쟁 노력을 지원하고, 동맹국이 우리가 [ROOT.GetName](으)로 돌아가는 것을 도울 때까지 버틸 수 있도록 할 것입니다."
 NOR_convoy_bombing: "수송선단 폭격"
 NOR_convoy_bombing_desc: "적의 상선단 규모가 작을수록 우리의 거대한 함대는 더 큰 영향력을 발휘할 수 있습니다. 적의 해운을 약화시킨다면 전쟁의 흐름을 바꿀 수 있습니다."
 NOR_rebuild_the_royal_navy: "왕립 해군 재건"
 NOR_rebuild_the_royal_navy_desc: "우리는 조국에서 멀리 떨어져 있으므로, 다시 돌아가려면 바닷길을 이용해야 할 것입니다. 왕립 해군을 재건하는 것은 곧 조국을 재건하는 것과 같습니다."

 NOR_pan_germanic_entent: "범게르만 협상"

 NOR_emergency_conversions: "상선 개조"
 NOR_emergency_conversions_desc: "우리는 거대한 상선단을 보유하고 있지만, 이들은 위험한 바다를 항해하며 큰 위험을 감수하고 있습니다. 이들 소형 선박 중 일부를 개조하여 가볍게 무장시키고, 취약한 우리 수송선을 보호하도록 해야 합니다. 필요하다면 나중에 언제든지 더 전문적인 임무를 위해 재개조할 수 있습니다."
 NOR_emergency_conversions_tt: "§Y수송선§!을 §Y구축함§!으로 전환하는 §Y결정§!을 잠금 해제합니다."

