 NORDIC_reaching_out_to_our_neighbors: "이웃 국가에 손 내밀기"
 NORDIC_reaching_out_to_our_neighbors_desc: "TODO_NORDIC"
 NORDIC_to_arms_against_tyranny: "폭정에 맞서 무장하라"
 NORDIC_to_arms_against_tyranny_desc: "TODO_NORDIC"
 NORDIC_against_tyranny_TT: "§Y북유럽에 무기 지원§!, §Y북유럽에 의용군 파견§!, §Y북유럽 국가 방어§! 결정을 잠금 해제하여 외부 세력의 침공에 맞서는 동료 북유럽 국가들을 지원할 수 있습니다."
 NORDIC_leverage_nordic_investments: "북유럽 투자 활용"
 NORDIC_leverage_nordic_investments_desc: "TODO_NORDIC"
 NORDIC_industrial_cooperation: "산업 협력"
 NORDIC_industrial_cooperation_desc: "TODO_NORDIC"
 NORDIC_the_nordic_march: "북유럽의 행진"
 NORDIC_the_nordic_march_desc: "TODO_NORDIC"
 NORDIC_court_foreign_power_TT: "공산주의 또는 파시스트 주요국 세력에 가입할 수 있는 §Y외세에 접근§! 결정을 잠금 해제합니다."
 NORDIC_mutual_guarantees: "상호 보장"
 NORDIC_mutual_guarantees_desc: "TODO_NORDIC"
 NORDIC_strengthen_ties: "관계 강화"
 NORDIC_strengthen_ties_desc: "TODO_NORDIC"

### JOINT FOCUS TREE ### 

 NORDIC_form_joint_alliance: "[NORDIC_get_alliance_name] 결성"
 NORDIC_form_joint_alliance_desc: "범스칸디나비아주의의 꿈은 1864년에 단결하지 못하면서 심각한 좌절을 겪었습니다. [NORDIC_GetFormAllianceSecondParagraph]"
 NORDIC_form_joint_alliance_desc_dem: "하지만 우리가 공유하는 민주적 가치에 기반한 새로운 동맹을 결성하는 것은 모든 민주주의 국가의 등불이 될 수 있으며, 동시에 우리 자신을 방어하고 자유의 적들에게 신속한 승리를 가져다줄 것입니다."
 NORDIC_form_joint_alliance_desc_com: "하지만 프롤레타리아 혁명의 원동력을 통해 우리는 인민을 단결시키고 자본주의에 맞선 투쟁에 집중하게 할 수 있습니다. 우리 국가들을 북부 인민 동맹으로 결합함으로써 말입니다."
 NORDIC_form_joint_alliance_desc_mon: "하지만 우리가 공유하는 오랜 전통에 뿌리내린 왕실 유산은 우리가 더 큰 그림을 보고 하나로 협력할 수 있게 해줍니다. 우리가 사랑하는 왕과 여왕들을 보존하기 위해서 말입니다."
 NORDIC_political_cooperation: "정치적 협력"
 NORDIC_political_cooperation_desc: "말로만 하는 협력으로는 진정으로 함께 일할 수 없습니다. 우리가 정말 무시할 수 없는 세력이 되고자 한다면, 우리의 모든 체계가 더 크고 잘 기름칠된 기계의 톱니바퀴가 되어야 합니다."
 NORDIC_consolidating_institutions: "기관 통합"
 NORDIC_consolidating_institutions_desc: "TODO_NORDIC"
 NORDIC_economic_union: "경제 연합"
 NORDIC_economic_union_desc: "우리는 자원을 함께 모아야 합니다. 우리 모두는 이웃이 필요로 하는 것을 가지고 있습니다. 오랫동안 우리 경제를 분리해 온 장벽을 허물면 더 높은 수준의 효율성을 달성할 것입니다. 자원이 우리 사이를 흘러야 서로를 더 잘 도울 수 있습니다."
 NORDIC_procurement_fund: "조달 기금"
 NORDIC_procurement_fund_desc: "주요 경제 및 군사 강대국들은 방어와 정복 수단을 생산할 능력이 있으며, 우리에게 자국 군수 산업이 있기는 하지만, 그에 비하면 미미합니다. 우리는 아직 이러한 산업력에 필적할 수 없을지도 모릅니다. 하지만 자금을 모아 우리 방어에 필수적인 대량의 무기와 차량을 조달할 수는 있습니다."
 NORDIC_shared_intelligence: "정보 공유"
 NORDIC_shared_intelligence_desc: "[NORDIC_get_alliance_name]의 전체 프로젝트는 우리의 힘을 공유하는 것을 중심으로 합니다. 그리고 지식이 진정으로 힘과 동일하다면, 우리가 적에 대해 아는 것과, 적이 우리에 대해 안다고 우리가 아는 것, 그리고 심지어 그들이 우리에 대해 안다고 생각하는 것까지 공유합시다."
 NORDIC_northern_command: "북부 사령부"
 NORDIC_northern_command_desc: "우리의 행동을 더 잘 조율하기 위해서는 합동 군사 사령부가 필수적입니다. 군대는 원활하게 함께 작전해야 하며, 결정은 모든 당사자의 이익을 염두에 두고 신속하게 내려져야 합니다. 우리는 합동군에 대한 추가 계획을 수립할 수 있도록 그러한 사령부를 설치해야 합니다."

 NORDIC_democratic_institution_1: "북유럽 각료 위원회"
 NORDIC_communist_institution_1: "북부 연방"
 NORDIC_monarchist_institution_1: "북유럽 귀족단"
 NORDIC_first_joint_institution: "[NORDIC_get_institution_1_name]"
 NORDIC_first_joint_institution_desc: "진정한 통합과 협력을 향한 첫걸음을 내딛는 지금, [NORDIC_get_alliance_name]는 새로운 기관이 필요합니다. [NORDIC_get_institution_1_desc]"
 NORDIC_first_joint_institution_desc_dem: "우리 초국가적 조직 내 여러 국가의 각료들이 우리의 노력을 더 잘 결합할 방법을 논의하고 유럽에서 고조되는 긴장 속에서 우리 국민을 이끌 수 있는 기관입니다."
 NORDIC_first_joint_institution_desc_com: "우리 인민을 단결시키고 생산 수단에 대한 소유권을 보장하며 동시에 자결권을 제공할 수 있는 기관입니다."
 NORDIC_first_joint_institution_desc_mon: "우리의 복잡한 귀족 관계망을 풀고 그들을 고귀한 동료들의 통합된 집합체로 만들며, 각자가 권력 구조 내에서 수행할 역할을 부여하는 기관입니다."
 
 NORDIC_democratic_institution_2: "북유럽 최고 의회"
 NORDIC_communist_institution_2: "북방 정치국"
 NORDIC_monarchist_institution_2: "북방 사자회"

 NORDIC_second_institution: "[NORDIC_get_institution_2_name]"
 NORDIC_second_institution_desc: "우리의 동맹은 그 어느 때보다 긴밀하고 복잡하게 얽혀 있지만, 이는 하나의 단위로서 거대하고 느리다는 것을 의미하기도 합니다. [NORDIC_get_institution_2_name]을(를) 설립함으로써 [NORDIC_get_institution_2_desc] "
 NORDIC_second_institution_desc_dem: "우리는 각국의 유권자를 대표하고 전쟁에 직면했을 때 신속하게 행동할 수 있는 행정권을 가진 입법 기관을 가질 수 있습니다."
 NORDIC_second_institution_desc_com: "우리는 노동자들의 의지가 대변될 것이라 확신할 수 있으며, 다수를 대표하는 소수는 분명 프롤레타리아의 최선의 이익을 위해 행동할 것입니다."
 NORDIC_second_institution_desc_mon: "우리는 연합 왕국의 가장 강력한 귀족들을 모아, 그들이 귀족의 짐인 어려운 타협을 용감하고 단호하게 받아들이도록 할 수 있습니다."

 NORDIC_nordic_army_democratic: "지상 작전부"
 NORDIC_nordic_army_communist: "북방 인민군"
 NORDIC_nordic_army_monarchist: "진군하는 사자들"

 NORDIC_nordic_army: "[NORDIC_get_nordic_army_name]"
 NORDIC_nordic_army_desc: "[NORDIC_get_nordic_army_desc]"
 NORDIC_nordic_army_desc_dem: "[NORDIC_get_nordic_army_name]의 역할은 우리 민주주의 국가들의 여러 지상군이 상호 보완적으로 작전할 수 있도록 기준을 수립하는 것입니다. 이를 통해 한쪽의 강점이 다른 쪽의 약점을 상쇄하고, 대륙 전역의 억압을 한 번에 한 주씩 제거하는 것을 목표로 합니다. "
 NORDIC_nordic_army_desc_com: "출신 국가에 관계없이, [NORDIC_get_nordic_army_name]의 모든 병사는 [NORDIC_get_alliance_name]의 일원이며, 우리의 결합된 힘과 불굴의 의지로 자본주의가 근절될 때까지 진군할 것입니다. "
 NORDIC_nordic_army_desc_mon: "[NORDIC_get_alliance_name]의 군대는 단순한 군대가 아니며, 그 이상입니다. [NORDIC_get_nordic_army_name]은(는) 군주와 그들이 대표하는 땅을 위해 단일 깃발 아래 용감하게 싸울 것입니다."

 NORDIC_nordic_navy_democratic: "해군 협조 사령부"
 NORDIC_nordic_navy_communist: "북방 해군 인민위원부"
 NORDIC_nordic_navy_monarchist: "왕립 함대"
 
 NORDIC_nordic_navy: "[NORDIC_get_nordic_navy_name]"
 NORDIC_nordic_navy_desc: "[NORDIC_get_nordic_navy_desc]"
 NORDIC_nordic_navy_desc_dem: "광활한 바다는 개별 국가를 왜소하게 만들지만, 힘을 합치면 작전을 조율하고 한정된 자원을 보다 효율적으로 사용하여 우리 체급 이상의 힘을 발휘할 수 있습니다. 이것이 [NORDIC_get_nordic_navy_name] 대표들의 임무가 될 것이며, 분명 힘든 일이지만 그들 뒤에는 [NORDIC_get_alliance_name]의 모든 자원과 지원이 있을 것입니다."
 NORDIC_nordic_navy_desc_com: "파도는 인민의 것이며, [NORDIC_get_alliance_name]은(는) 북방 인민을 위해 이를 해방하고 되찾기로 결심했습니다. [NORDIC_get_nordic_navy_name]은(는) 적들이 마지막으로 보게 될 것이 붉은 지평선 위로 떠오르는 우리 함선이 되도록 할 것입니다."
 NORDIC_nordic_navy_desc_mon: "[NORDIC_get_alliance_name]의 연합 해군은 우리 모든 영토의 바다를 지배할 것입니다. [NORDIC_get_nordic_navy_name]은(는) 적들의 난파선만 남을 때까지 그들을 강타할 파도가 될 것입니다."
 
 NORDIC_nordic_airforce_democratic: "북유럽 방공 프로그램"
 NORDIC_nordic_airforce_communist: "북부 인민 공군 인민위원부"
 NORDIC_nordic_airforce_monarchist: "연합 왕립 공군"

 NORDIC_nordic_airforce: "[NORDIC_get_nordic_airforce_name]"
 NORDIC_nordic_airforce_desc: "하늘은 우리 동맹의 새로운 개척지입니다. [NORDIC_get_nordic_airforce_desc]"
 NORDIC_nordic_airforce_desc_dem: "그렇기에 [NORDIC_get_nordic_airforce_name]은(는) [NORDIC_get_alliance_name] 내 각국의 시민을 보호하는 데 필요한 자원을 관리할 것입니다. 또한 우리 공군이 서로 협력하고 원활하게 협동하도록 보장할 것입니다."
 NORDIC_nordic_airforce_desc_com: "우리 모두가 동등하게 공유해야 할 자유의 모범을 자본주의 세력이 장악하게 둘 수는 없습니다. 우리 공군은 적의 하늘을 뒤덮고 그들 위에 지옥불의 비를 쏟아부을 것입니다."
 NORDIC_nordic_airforce_desc_mon: "공중 능력을 개발한다면, 우리의 힘을 더 잘 지휘할 수 있을 것입니다. 우리는 연합 공군의 위력 앞에 적들이 무릎 꿇게 만들 것입니다."

 NORDIC_nordic_research_democratic: "북유럽 연구 위원회"
 NORDIC_nordic_research_communist: "북부 인민 대학"
 NORDIC_nordic_research_monarchist: "연합 왕립 학술원"

 NORDIC_nordic_research: "[NORDIC_get_nordic_research_name]"
 NORDIC_nordic_research_desc: "힘만으로는 전쟁에서 이길 수 없습니다. 기술 발전이야말로 20세기 국가들이 현대전에서 우위를 점하게 하는 요소입니다. [NORDIC_get_nordic_research_desc]"
 NORDIC_nordic_research_desc_dem: "[NORDIC_get_nordic_industry_name]은(는) 자본과 자원을 적재적소에 투입하여 우리 병사들과 장군들이 전쟁의 난관에 대처할 수 있는 최고의 도구를 갖추도록 할 것입니다. 첨단 기술은 우리 시민들의 피를 헛되이 흘리는 것을 막아줄 것입니다."
 NORDIC_nordic_research_desc_com: "[NORDIC_get_nordic_industry_name]은(는) 최신 파괴 수단을 개발하고, 우리가 만들 수 있는 최고의 도구를 대량 생산하여 인민의 손에 쥐여주어 파시즘과 자본주의의 머리 위에 씌울 단두대가 되게 할 기관이 될 것입니다."
 NORDIC_nordic_research_desc_mon: "북부의 왕국들은 항상 과학이 발전할 공간을 제공해 왔으며, [NORDIC_get_nordic_industry_name]은(는) 이 전통을 이어받아 우리 왕국들의 모든 최고 지성들을 한 건물에 모아 서로 도우며 모든 군주를 섬기게 할 것입니다."

 NORDIC_nordic_military_industry_democratic: "북유럽 군수품 조달"
 NORDIC_nordic_military_industry_communist: "북부 인민 무기 생산"
 NORDIC_nordic_military_industry_monarchist: "왕립 무기 공장"
 
 NORDIC_nordic_military_industry: "[NORDIC_get_nordic_military_industry_name]"
 NORDIC_nordic_military_industry_desc: "[NORDIC_get_nordic_military_industry_desc]. 최후의 1인까지 싸운다면, 그 병사들은 올바른 도구로 더 강력한 일격을 날릴 것입니다."
 NORDIC_nordic_military_industry_desc_dem: "[NORDIC_get_nordic_industry_name] 프로그램은 우리의 전쟁 기계가 작동하는 데 필요한 톱니바퀴를 항상 공급받고, 공포와 폭정으로부터 우리 국가들을 방어하기 위해 설립될 것입니다."
 NORDIC_nordic_military_industry_desc_com: "혁명은 스스로를 방어하지 않으며, 마찬가지로 우리 [NORDIC_get_alliance_name]의 이미 해방된 노동자들의 강력한 추진 없이는 확산되지 않을 것입니다."
 NORDIC_nordic_military_industry_desc_mon: "현대에 들어 왕국들이 좌우로 무너지고 있으며, 왕가의 정신만으로는 망각으로부터 왕국을 구할 수 없습니다. 우리는 왕국이 멸망에 맞서 싸우는 데 필요한 무기를 갖추도록 보장해야 합니다."

 NORDIC_nordic_industry_democratic: "북유럽 산업 개발 기금"
 NORDIC_nordic_industry_communist: "일사불란한 노동자들"
 NORDIC_nordic_industry_monarchist: "왕립 개발원"

 NORDIC_nordic_industry: "[NORDIC_get_nordic_industry_name]"
 NORDIC_nordic_industry_desc: "[NORDIC_get_nordic_industry_desc]"
 NORDIC_nordic_industry_desc_dem: "전쟁의 유무와 상관없이, 우리 국가들은 민간인을 부양하고 삶의 질을 개선하는 데 필요한 기반 시설과 자본을 구축해야 합니다. 물론, 전시 체제에 돌입하면 이는 우리 전쟁 경제의 중요한 초석이 될 것입니다."
 NORDIC_nordic_industry_desc_com: "노동자는 [NORDIC_get_alliance_name]의 생명선이자 존재 이유입니다. [NORDIC_get_nordic_industry_name]을 통해 우리는 일상 생활에 필요한 물자를 생산하는 수단에 대한 참여를 보장하고, 전시에는 우리의 전쟁 기계를 지원할 수 있습니다."
 NORDIC_nordic_industry_desc_mon: "노블레스 오블리주 개념에 따라 우리는 신민들을 부양하고, 그들의 환심을 살 뿐만 아니라 전시에는 전쟁 경제의 기반이 될 기반 시설을 구축해야 합니다. [NORDIC_get_nordic_industry_name]은 더 이상 필요하지 않을 때까지 이 역할을 수행할 것입니다."

