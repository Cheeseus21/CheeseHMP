l_korean:
 #Opinion modifiers


 #FINLAND
 FIN_suomalainen_sosialismi: "수오말라이넨 소시알리스미"
 FIN_suomalainen_sosialismi_desc: "만네르헤임과 그 동맹들이 내전 중 일으킨 반혁명적 파괴로 인해, 자본주의의 비참함이 우리 사회에 만연해 있습니다. 이를 좌시할 수 없으며, 노동 계급을 해방할 방도를 찾아야 합니다."
 FIN_towards_a_red_government: "적색 정부를 향하여"
 FIN_towards_a_red_government_desc: "1918년, 노동자 혁명의 물결이 전국을 휩쓸었으나, 프롤레타리아는 만네르헤임과 그 독일 동맹의 반동 세력에게 배신당했습니다. 이제 쓰러진 동지들의 원수를 갚고, 우리가 본디 세웠어야 할 노동자 공화국을 건설할 때가 왔습니다."
 FIN_the_second_finnish_civil_war: "제2차 핀란드 내전"
 FIN_the_second_finnish_civil_war_desc: "성장하는 프롤레타리아의 계급 의식 함양과 지도부의 조직력을 통해, 마침내 우리는 부르주아 지배자들을 완전히 타도할 자원을 축적했습니다."
 FIN_the_peoples_democratic_league: "인민민주동맹"
 FIN_the_peoples_democratic_league_desc: "인민민주동맹은 [FIN.GetNameDef] 내 다양한 좌익 분파들을 조정하는 데 앞장서 왔습니다. 그들은 프롤레타리아의 의지가 실현되도록 보장할 수 있는 진정한 노동자 동맹의 기틀을 마련했습니다. "
 FIN_cooperate_with_social_democrats: "사회민주주의자들과의 협력"
 FIN_cooperate_with_social_democrats_desc: "자본가와 타협하려는 의지는 명백히 잘못되었으나, 사회민주주의자들이 프롤레타리아의 막대한 지지를 받고 있으며 그 지도자 다수가 각 분야의 전문가임은 부정할 수 없습니다. 노동자 공화국 건설을 위해 그들과 더욱 협력해야 합니다."
 FIN_the_workers_state: "노동자 국가"
 FIN_the_workers_state_desc: "프롤레타리아 독재가 굳건히 확립되었으므로, 이제 프롤레타리아의 이익을 정치의 최우선으로 두는 방향으로 국가를 재창조할 수 있습니다. 자녀 교육 방식에서부터 공장 조직 방식에 이르기까지 모든 것을 전면 개혁할 것입니다."
 FIN_the_red_watch: "적색 감시단"
 FIN_the_red_watch_desc: "자본주의 폭정을 부활시키려 내전 이후 우리가 이룩한 모든 것을 훼손하려는 자들이 있습니다. 적위대를 창설하여, 그러한 반역 행위가 우리 공화국에 퍼지기 전에 근절할 수 있습니다."
 FIN_approach_the_soviets: "소비에트와의 접근"
 FIN_approach_the_soviets_desc: "[SOU.GetNameDef]의 우리 동지들은 부르주아 제국주의에 맞선 프롤레타리아 투쟁의 최전선에 있습니다. 우리는 그들의 지도부에 접촉하여 [FIN.GetNameDef] 내 부르주아에 맞선 우리의 투쟁에 대한 지지를 얻어내야 합니다."
 FIN_antagonize_the_soviets: "소비에트 적대"
 FIN_antagonize_the_soviets_desc: "[SOU.GetNameDefCap]은 사회주의라는 미사여구로 스스로를 포장할지 모르지만, 그곳은 노동자의 낙원이 아닙니다. 우리는 노동 계급의 삶을 개선하기 위한 우리만의 길을 찾을 것이며, [SOV.GetAdjective]의 위협과 협력하지 않을 것입니다."
 FIN_finno_soviet_pact: "핀란드-소비에트 조약"
 FIN_finno_soviet_pact_desc: "역사적 원한은 접어두고, [SOU.GetAdjective] 인민은 사회주의를 위한 투쟁에서 가치 있는 동맹임이 증명되었습니다. 이제 우리 정부 간의 협정을 공식화하여 반동적인 유럽의 피할 수 없는 맹공에 대비할 때입니다."
 FIN_subsidized_national_industrialization: "국가 산업화 보조"
 FIN_subsidized_national_industrialization_desc: "[SOU.GetNameDef]은 산업화를 통해 국가 생산력을 대규모로 동원하는 데 큰 진전을 이루었습니다. 핀란드에서 유사한 프로그램을 시행하기 위해 그들의 전문가에게 지원을 요청해야 할지도 모릅니다."
 FIN_finnish_learned_societies: "핀란드 학회"
 FIN_finnish_learned_societies_desc: "국가의 많은 지식인이 해외로 망명했지만, 사회주의 사상을 받아들일 만큼 현명한 이들이 상당수 남아 있습니다. 그들의 연구에 투자하여 이 지식인들의 지위를 높여야 합니다."
 FIN_finnish_federation_of_trade_unions: "핀란드 노동조합 연맹"
 FIN_finnish_federation_of_trade_unions_desc: "노동조합은 산업의 진정한 주인인 노동자를 대표합니다. 노동조합 연맹과 협력함으로써, 우리는 노동 계급의 발전을 위해 전체 경제를 재편성할 수 있습니다."
 FIN_defensive_preparations: "방어 준비"
 FIN_defensive_preparations_desc: "이념과 관계없이, 우리는 동쪽의 이웃과 충돌할 운명인 것 같습니다. 피할 수 없는 사태에 대비하고 방어 태세를 신속히 확장해야 합니다. 만약 실패한다면, 우리나라는 다시 한번 적에게 흡수될지도 모릅니다."
 FIN_trade_agreements: "무역 협정"
 FIN_trade_agreements_desc: "우리의 국내 정책 결정을 항상 지지하지는 않지만, 군 현대화를 지원하기 위해 기꺼이 무역 협정을 체결하려는 국가가 많습니다. 주로 덜 우호적인 이웃 국가들의 안보를 약화시키기 위함입니다."
 FIN_finno_estonian_union: "핀-에스토니아 연합"
 FIN_finno_estonian_union_desc: "우리는 에스토니아 국민과 오랜 역사를 공유하고 있기에, 그들이 강대국들 사이에 갇혀 자신들의 고향이 또 다른 국제 분쟁의 전쟁터가 되기를 기다리는 것을 보는 것은 고통스럽습니다. 아마도 연합을 통해, 우리는 그들을 그런 운명에서 구할 수 있을 것입니다. "
 FIN_social_democracy: "사회민주주의"
 FIN_social_democracy_desc: "우리는 볼셰비키식 혁명이 한 국가에 일어났을 때 펼쳐지는 실패와 공포를 목격했습니다. 만약 우리가 노동 계급에게 이익이 되는 지속적인 사회를 만들고자 한다면, 가능한 한 민주적이고 평화적인 수단을 통해야만 합니다."
 FIN_pragmatic_socialism: "실용적 사회주의"
 FIN_pragmatic_socialism_desc: "우리는 볼셰비키와 그 동류들의 방식을 혐오하지만, 현대 자본주의의 공포로부터 노동 계급을 해방하기 위해 더 많은 조치가 이루어져야 한다는 점에는 이의가 없습니다. 민주적이고 실용적인 사회주의를 신중하게 적용함으로써, 우리는 그것을 달성할 것입니다."
 FIN_sosialistinen_eduskuntaryhma: "Sosialistinen Eduskuntaryhmä"
 FIN_sosialistinen_eduskuntaryhma_desc: "사회주의 의회 그룹은 [SOU.GetNameDef](와)의 적대보다는 화해를 주장하고 있습니다. 그들의 제안은 [SOU.GetAdjective]의 간섭 없이 우리 고유의 사회주의 형태를 유지할 수 있는 최선의 희망을 제공할지도 모릅니다."
 FIN_social_democratic_womens_union: "사회민주여성연합"
 FIN_social_democratic_womens_union_desc: "사회에서 여성의 곤경은 아주 오랜 시간 동안 무시되어 왔습니다. 사회민주여성연합을 정부의 핵심부로 더 깊이 끌어들임으로써, 우리는 마침내 그들의 우려를 해결하고 모두를 위한 더 공평한 사회를 만들 수 있습니다."
 FIN_mineral_wealth: "광물 자원"
 FIN_mineral_wealth_desc: "[ROOT.GetNameDefCap]에는 아직 개발되지 않은 풍부한 천연자원이 있습니다. 우리가 신뢰할 만한 군사력을 유지하려면, 이러한 자원을 활용하고 경제적 자급자족 능력을 향상시켜야 합니다."
 FIN_funds_from_kalevala_koru_oy: "칼레발라 코루 Oy의 자금"
 FIN_funds_from_kalevala_koru_oy_desc: "사회민주여성연합 회원들이 설립한 고급 보석 제조업체인 칼레발라 코루 Oy는 큰 성공을 거두었습니다. 그들의 전문 지식을 활용하여 경제를 활성화하고, 그 부를 다른 계획에 자금을 대는 데 사용할 수 있습니다."
 FIN_join_the_comintern: "[GetSovietFactionForFinland] 가입"
 FIN_join_the_comintern_desc: "우리는 낡은 민족주의 개념과 그에 따른 불만을 거부하고 [SOU.GetNameDef](와)과 협력해야 합니다. 함께라면 유럽의 반동 세력에 맞서 흐름을 바꾸는 데 도움을 줄 수 있으며, 동시에 우리 자신의 미래도 확보할 수 있습니다."
 FIN_finnish_influence_in_the_baltic: "발트해에서의 핀란드 영향력"
 FIN_finnish_influence_in_the_baltic_desc: "발트 지역의 집단 안보는 우리와 같은 생각을 가진 이들이 서로 협력하고 모두가 침략 세력에 대한 신뢰할 만한 방어 태세를 유지하는 데 달려 있습니다. 따라서, 우리는 모든 이웃이 같은 방향으로 나아가도록 보장해야 합니다."
 FIN_approach_major_democracies: "주요 민주주의 국가에 접근"
 FIN_approach_major_democracies_desc: "우리는 지정학에서 더 공격적인 행위자들의 확장되는 영향력을 억제하고자 하는 세계의 자유 민주주의 국가들과 공동의 이해관계를 가지고 있습니다. 아마도 우리는 이 공동의 목표를 향해 함께 노력할 수 있을 것입니다."
 FIN_finnish_autonomy: "핀란드의 자치"
 FIN_finnish_autonomy_desc: "우리 중 가장 헌신적인 공산주의자들조차 [SOU.GetNameDef](와)과의 협력이 사실상 우리 정치에 대한 러시아의 지배로 이어질 것이라는 불안감을 품고 있었습니다. 그러나 신중한 외교를 통해 우리는 동맹국들과 우리의 자치를 보장하는 수준의 이해에 도달했습니다. "
 FIN_integrate_kola_and_karelia: "콜라와 카렐리야 통합"
 FIN_integrate_kola_and_karelia_desc: "우리는 [SOU.GetAdjective] 동지들과 강력한 협력 관계를 구축했지만, 국경 분쟁은 금방이라도 터질 듯한 먹구름처럼 드리워져 있습니다. 아마도 우리는 분위기를 쇄신하고 마침내 이 문제들을 적이 아닌 동맹으로서 해결해야 할 것입니다."
 FIN_keepers_of_the_baltic_countries: "발트 국가들의 수호자"
 FIN_keepers_of_the_baltic_countries_desc: "발트 국민들은 [GER.GetNameDef]이나 [SOU.GetNameDef]에 흡수되는 데 거의 관심이 없습니다. 공유된 역사와 전망을 가진 우리만이 이 국가들을 파괴하지 않는 방식으로 평화롭게 이끌 수 있습니다."
 FIN_british_threat: "영국의 위협"
 FIN_british_threat_desc: "[ENG.GetNameDefCap]는 세계 부르주아 경제의 심장이자 제국주의의 촉수입니다. 우리는 그 심장에 단검을 힘껏 꽂아 넣어, 마침내 세계가 그 억압에서 해방될 수 있도록 해야 합니다."
 FIN_red_finland: "붉은 핀란드"
 FIN_red_finland_desc: "우리는 진정한 노동자 공화국을 창건하여 백색 테러에 스러져간 동지들의 원수를 갚았습니다. 이제 남은 것은 국경 너머에서 우리가 이룩한 것을 파괴하려는 자들로부터 이를 지켜내는 것뿐입니다."
 FIN_united_under_the_north_star: "북극성 아래 연합"
 FIN_united_under_the_north_star_desc: "우리의 북유럽 친구들과 동지들은 우리 지역의 이익에 관심 없는 제국주의 열강의 손에 놀아나고 있습니다. 하지만 우리가 함께라면, 가장 강력한 제국조차 단념시킬 동맹을 창설하여 우리 인민의 평화를 확보할 수 있습니다."
 FIN_preserve_sapmi: "사프미 보존"
 FIN_preserve_sapmi_desc: "사미족은 국경 안팎에서 오랫동안 제국주의의 억압에 시달려 왔습니다. 우리는 이들과 화해하고, 이웃 국가들의 손에 계속되는 고통에서 그들을 해방시켜야 합니다. "
 #FIN_confederated_finno_russian_republics: "Confederated Finno-Russian Republics"
 FIN_confederated_finno_russian_republics_desc: "이제 수많은 다양한 민족이 우리의 통치하에 놓였습니다. 우리 국가 내에서 민족 간의 위계가 발생하는 것을 막기 위해, 우리는 정부를 공화국 연방으로 재편할 것입니다. 이를 통해 모든 인민이 자신들의 통치에 공정한 발언권을 가질 수 있을 것입니다. "
 FIN_secure_the_baltic_sea: "발트해 확보"
 FIN_secure_the_baltic_sea_desc: "우리는 종종 육상 국경과 그 방어 방법에 집중하지만, 해안선의 취약성을 방치하여 우리의 노력을 헛되이 해서는 안 됩니다. 따라서 우리는 이 측면을 확보하기 위해 대규모 해안 방어 계획에 투자해야 합니다."
 FIN_german_threat: "독일의 위협"
 FIN_german_threat_desc: "프로이센 군국주의가 [GER.Capital.GetCapitalVictoryPointName]에서 다시금 그 추악한 머리를 쳐들었습니다. 다른 이들은 유럽의 수도들이 [GER.GetLeader]의 군홧발 아래 짓밟히는 것을 만족스럽게 지켜보지만, 우리는 아닙니다. 이제 이 평화의 위협을 단번에 처리할 때입니다."
 FIN_socialist_welfare: "사회주의 복지"
 FIN_socialist_welfare_desc: "경제의 신중한 관리와 국가 방어를 통해, 이제 우리는 진정한 복지 국가를 건설하여 노동 인민에게 보상할 자원을 갖추게 되었습니다. 우리는 우리 인민이 길고 행복한 삶을 살도록 보장할 것입니다."
 FIN_aid_for_entrepreneurs: "기업가 지원"
 FIN_aid_for_entrepreneurs_desc: "자본주의의 최악의 요소들을 억제해야 하지만, 우리 경제는 기업가 활동의 증가로 큰 이익을 얻을 수 있습니다. 중요 산업에 대한 투자 보조금과 대출을 마련함으로써, 우리는 그러한 활동을 촉진할 수 있습니다."
 FIN_soviet_threat: "소련의 위협"
 FIN_soviet_threat_desc: "[SOU.GetNameDefCap]는 전 세계 노동 계급의 삶에 대한 위협입니다. 그들은 노동 계급을 정복 전쟁으로 몰아넣는 데 아무런 거리낌이 없을 것이기 때문입니다. 그들이 너무 강해지기 전에, 우리는 지금 당장 이 위협을 끝내야 합니다."
 FIN_proclaim_greater_finland: "대핀란드 연방 선포"
 FIN_proclaim_greater_finland_desc: "우리의 국경은 불과 몇 년 전만 해도 상상할 수 없었던 수준으로 확장되었습니다. 이렇게 많은 새로운 영토를 얻게 됨에 따라, 정부가 통치하는 다양한 지역을 더 잘 반영하도록 정부를 재편할 필요가 생겼습니다. "
 FIN_control_the_flux_of_iron_ore: "철광석 흐름 통제"
 FIN_control_the_flux_of_iron_ore_desc: "스웨덴의 철광석과 노르웨이의 유통은 대륙 전역과 그 너머에서 전쟁이 벌어지는 수단으로 계속 작용하고 있습니다. 우리는 이 중요한 자원의 흐름이 적의 손에 넘어가기 전에 그 소유권을 장악해야 합니다."

 FIN_finnish_neutrality: "핀란드의 중립"
 FIN_finnish_neutrality_desc: "자유를 위해 싸우려는 우리 인민의 힘과 결의는 지워질 수 없습니다. 하지만, 우리는 이웃 국가들이 힘들게 얻은 우리의 독립을 짓밟을 명분을 주지 않도록 중립 정책을 추구해야 합니다."
 FIN_the_finnish_swedish_peoples_party: "핀란드 스웨덴 인민당"
 FIN_the_finnish_swedish_peoples_party_desc: "스웨덴 혈통의 사람들은 핀란드에서 상당한 소수 민족을 구성하고 있으며, 그들의 이익을 가장 열렬히 대변하는 정당과 협력하면 우리 정책에 대한 상당한 지지를 얻고 스웨덴 자체의 호의를 얻을 수 있을 것입니다."
 FIN_align_the_agrarian_league: "농업 동맹과 제휴"
 FIN_align_the_agrarian_league_desc: "[ROOT.GetNameDefCap]는 지난 세기 동안 놀라운 산업화를 겪었지만, 농업 노동으로 국가를 먹여 살리는 수백만 명의 곤경을 무시할 수는 없습니다. 농민 연맹과 협력함으로써, 우리는 도시의 동료들만큼이나 그들의 우려가 잘 해결되도록 보장할 수 있습니다."
 FIN_political_unity: "정치적 통합"
 FIN_political_unity_desc: "정치 이념과 관계없이, 우리 모두는 우리 국민을 위해 최선을 다하기를 원합니다. 이 위기의 시기에, 우리는 사소한 정치적 다툼은 제쳐두고 함께 협력해야 합니다."
 FIN_collaboration_with_the_left: "좌파와의 협력"
 FIN_collaboration_with_the_left_desc: "좌파 정당들을 소외시키는 것은 우리 정부를 강화하는 데 거의 도움이 되지 않습니다. 하지만 그들과 협력할 방법을 찾는다면, 더 많은 국민을 우리 대의에 결집시킬 수 있을 것입니다."
 FIN_railways_and_infrastructure: "철도와 기반 시설"
 FIN_railways_and_infrastructure_desc: "대전쟁은 산업과 군대가 자원이나 인력을 필요한 곳으로 이동시키는 것을 지원하는 견고한 철도 및 도로망의 필요성을 입증했습니다. 수십 년간의 점령과 유혈 사태 이후, 우리의 병참망은 절실히 투자가 필요합니다."
 FIN_repurpose_small_industries: "소규모 산업 용도 변경"
 FIN_repurpose_small_industries_desc: "우리에게는 강대국들의 거대한 산업은 없지만, 수많은 소규모 공장들이 가동 중입니다. 처음부터 시작하는 대신, 우리는 이 소규모 시설들을 전쟁 생산용으로 용도를 변경해야 합니다."
 FIN_expand_state_military_factories: "국영 군수 공장 확장"
 FIN_expand_state_military_factories_desc: "우리의 국영 공장들은 이 위기의 시기에 군이 부과하는 수요를 따라잡기 위해 고군분투하고 있습니다. 보급선을 유지하려면 생산 시설을 확장해야 합니다."
 FIN_a_new_course_for_kokoomus: "코코무스의 새로운 노선"
 FIN_a_new_course_for_kokoomus_desc: "최근의 사건들로 인해 사람들이 강력하고 분별 있는 지도력과 전통적 가치로의 회귀를 추구하면서 코코무스당에 대한 지지가 급증했습니다. 우리는 당의 보수적 의제를 추진함으로써 이를 활용해야 합니다."
 FIN_the_finnish_throne: "핀란드 왕위"
 FIN_the_finnish_throne_desc: "코코무스는 오랫동안 핀란드 군주제를 옹호해 왔습니다. 최근 지지율이 급증하고 권력의 고삐를 바짝 죈 지금, 그들은 현 체제를 해체하고 그 자리에 왕국을 세울 수단을 갖게 되었습니다."
 FIN_strengthen_military_administration: "군정 강화"
 FIN_strengthen_military_administration_desc: "만네르헤임은 이 격동의 시기에 우리 나라를 영웅적으로 이끌었고, 군사적 정밀함으로 정치적 독단을 타파했습니다. 국가의 지속적인 생존을 위해, 우리는 그와 군대에 필요하다고 판단되는 대로 통치할 권한을 부여해야 합니다."
 FIN_dreams_of_expansionism: "팽창주의의 꿈"
 FIN_dreams_of_expansionism_desc: "리스토 뤼티는 우리가 동쪽의 카렐리야 땅을 장악하기 전까지는 결코 지속적인 평화를 얻을 수 없다고 올바르게 인식하고 있습니다. 그곳을 확보하면, 우리는 이웃 국가들과 훨씬 더 방어하기 쉬운 국경을 만들게 될 것입니다."
 FIN_reach_out_to_scandinavia: "스칸디나비아에 손을 내밀다"
 FIN_reach_out_to_scandinavia_desc: "대부분의 스칸디나비아 이웃 국가들은 우리의 정서에 공감하며 강대국 분쟁에 휘말리는 데 거의 관심이 없습니다. 그들과 강력한 관계를 유지함으로써, 우리는 집단 방위의 토대를 구축할 수 있을 것입니다."
 FIN_moderate_politics: "온건 정치"
 FIN_moderate_politics_desc: "강대국들 사이에 긴장이 고조됨에 따라, 우리 정부가 어떤 파벌의 이념에 대해서도 너무 관대하게 보이지 않도록 해야 합니다. 따라서 우리는 국내 온건 정책을 추구해야 합니다."
 FIN_join_the_allies: "[GetAlliesFactionForFinland] 가입"
 FIN_join_the_allies_desc: "중립은 강대국들의 손에 종속되는 것으로 이어질 뿐인, 빠르게 구식이 되어가는 정책이 되고 있습니다. 우리의 지정학적 위치를 고려할 때 위험이 따르지만, 연합국에 가입하면 장기적으로 주권을 유지할 수 있을 것입니다."
 FIN_northern_defense_front: "북부 방어 전선"
 FIN_northern_defense_front_desc: "스칸디나비아와 발트해 건너편의 우리 이웃 국가들은 강대국들에게 쉬운 먹잇감입니다. 하지만, 우리가 자원을 모으고 군사적으로 협력한다면, 가장 강대한 적들조차 우리를 공격하는 것을 저지할 수 있을 것입니다."
 FIN_the_lone_wolf: "고독한 늑대"
 FIN_the_lone_wolf_desc: "[ROOT.GetAdjective] 국민 자신보다 [ROOT.GetAdjective] 국민의 이익을 진심으로 생각하는 사람은 아무도 없습니다. 역사는 우리가 다른 사람들이 도와주러 오기를 기대하기보다는 우리 자신에게 의존해야 한다는 것을 보여주었습니다. "
 FIN_military_aid: "군사 원조"
 FIN_military_aid_desc: "연합군은 방대한 무기 제조업체를 보유하고 있으니, 이를 활용하여 우리 군을 신속히 현대화해야 합니다."
 FIN_mineral_wealth_development: "광물 자원 개발"
 FIN_mineral_wealth_development_desc: "우리의 지리적 위치와 이웃 국가들을 고려할 때, 잠재적인 동맹국이나 경제 파트너로부터 고립될 가능성이 있습니다. 따라서 우리는 국가의 미개발 자원을 활용하여 고립된 상황에서도 전투를 계속할 수 있도록 보장해야 합니다."
 FIN_industrialize_the_region: "지역 산업화"
 FIN_industrialize_the_region_desc: "북방 방위 전선의 통합된 군사력은 상당하지만, 장기전에서 우리 경제가 이를 뒷받침할 수 있도록 더 많은 노력을 기울여야 합니다. 그러기 위해서는 우리 산업을 활성화하는 데 투자해야 합니다."
 FIN_increase_military_investment: "군사 투자 증대"
 FIN_increase_military_investment_desc: "분쟁의 경제적, 병참적 요소는 최전선의 전투만큼이나 우리의 생존에 필수적입니다. 따라서 우리는 군수 산업에 투자하여 우리 군에 필요한 모든 장비를 지속적으로 공급할 수 있도록 보장해야 합니다."
 FIN_cooperation_with_germany: "독일과의 협력"
 FIN_cooperation_with_germany_desc: "[GER.GetNameDef] 및 [SOU.GetNameDef]이(가) 결국 서로 충돌하게 될 것이라는 지정학적 현실을 이용할 수 있습니다. 만약 우리가 [GER.GetAdjective] 측과 협력한다면, [SOU.GetAdjective] 측과의 이전 전쟁에서 입은 손실을 복수하고 우리 자신을 위한 새로운 기회를 열 수 있을 것입니다."
 FIN_wartsila_engine_production: "바르질라 엔진 생산"
 FIN_wartsila_engine_production_desc: "군용 엔진을 자체적으로 생산할 수 있는 기술과 역량을 갖추는 것은 우리의 국가 안보를 향상시킬 것입니다. 동맹국 및 바르질라와 같은 국내 기업과 협력함으로써, 우리는 그 수준의 안보를 달성할 수 있습니다."
 FIN_german_military_advisors: "독일 군사 고문단"
 FIN_german_military_advisors_desc: "기동 장비와 항공기의 사용으로 인해 전쟁의 양상이 급격히 변화하고 있습니다. 아마도 우리의 [GER.GetAdjective] 전우들로부터 이 새로운 자원들을 우리에게 유리하게 활용하는 최선의 방법을 배울 때가 된 것 같습니다."
 FIN_finnish_march_of_conquest: "핀란드의 정복 행진"
 FIN_finnish_march_of_conquest_desc: "너무나 오랫동안 우리는 [SOU.GetNameDef] 및 그 전신에 맞서 수세에 몰려 있었습니다. 이제는 전세를 뒤엎고 국경을 밀어붙여, 필요한 모든 수단을 동원해 카렐리야 인민을 [SOU.GetAdjective]의 압제로부터 해방시킬 때입니다."
 FIN_joint_scientific_program: "공동 과학 프로그램"
 FIN_joint_scientific_program_desc: "적에 대한 기술적 우위를 확보하는 것은 국가가 분쟁에서 승리하는 데 결정적인 요인이 될 수 있습니다. 동맹국과 과학 지식을 공유함으로써, 우리는 기술적 우위가 우리에게 있음을 보장할 수 있습니다."
 FIN_modernize_the_industry: "산업 현대화"
 FIN_modernize_the_industry_desc: "우리의 기술적 노력의 결실은 전장에서의 적용을 넘어선 용도를 가지고 있습니다. 그 중 다수는 우리 산업을 더 효율적으로 만드는 데 사용될 수 있습니다. 약간의 투자를 통해, 우리는 새로 얻은 지식으로 대규모 산업 현대화 프로그램을 시작할 수 있습니다."
 FIN_modernize_the_army: "육군 현대화"
 FIN_modernize_the_army_desc: "모든 정부의 최우선 과제는 국민의 국방과 안전입니다. 우리 군의 역량이 부족함이 증명될 때, 우리는 군이 다시 한번 그 주된 임무를 수행할 수 있을 정도로 현대화하고 개선하는 데 투자할 의무가 있습니다."
 FIN_weapon_caches: "무기 은닉처"
 FIN_weapon_caches_desc: "우리 군이 제압당하고 정부가 붕괴할 경우, 국가를 탈환할 수 있도록 비상 계획을 마련해야 합니다. 이를 위한 한 가지 제안은 미래의 저항군이 활용할 수 있도록 무기 은닉처를 비밀리에 설치하는 것입니다."
 FIN_national_unity: "국민 통합"
 FIN_national_unity_desc: "전쟁이 점점 더 가까워짐에 따라, 우리는 위대한 조국의 국민을 결집하여 핀란드인이라는 것이 무엇을 의미하는지 다시 한번 세계에 보여줄 것입니다."
 FIN_viron_kansa: "에스토니아 인민"
 FIN_viron_kansa_desc: "발트해로 나뉘어 있지만, [ROOT.GetName]과 [EST.GetName]의 국민은 오랜 역사를 공유하고 있습니다. 또한, 우리는 독립을 유지하기 위해 분투하며 거의 같은 도전에 직면해 있습니다. 아마도 평화적인 통일을 통해 우리 국민을 전쟁으로부터 구할 수 있을 것입니다."
 FIN_ambitions_in_the_south: "남방의 야망"
 FIN_ambitions_in_the_south_desc: "발트해의 소국들은 이웃 국가들의 시기 어린 시선을 받고 있습니다. 만약 그들이 정복당해야 한다면, 잠재적인 적보다는 우리에게 이익이 되는 편이 낫습니다."
 FIN_union_of_finnish_brothers_in_arms: "핀란드 전우 연합"
 FIN_union_of_finnish_brothers_in_arms_desc: "핀란드 전우 연합은 국가사회주의 운동의 선봉에 서 있으며, 국가가 해외로부터 위협을 받음에 따라 점차 지지를 얻고 있습니다. 이들과 협력한다면, 국가 방위를 위한 막대한 지지를 얻을 수 있을 것입니다."
 FIN_arm_the_lotta_svard: "로타 스베르드 무장"
 FIN_arm_the_lotta_svard_desc: "로타 스베르드는 보조 부대로서의 역할에서 훌륭한 자산임을 증명했습니다. 그들의 숙련도와 우리의 끔찍한 상황을 고려할 때, 이제 이 조직을 더 잘 무장시키고 군대에 더 효과적으로 통합해야 할 때일지도 모릅니다."
 FIN_parmis_devils: "패르미의 악마들"
 FIN_parmis_devils_desc: "니케 패르미의 징벌 대대는 감옥에서 썩고 있었을 인력을 효과적으로 활용하는 방법임을 증명했습니다. 조국을 위해 기꺼이 싸울 죄수들로 사단을 창설하여 그의 업적을 확장해야 합니다."
 FIN_militarized_society: "군사화된 사회"
 FIN_militarized_society_desc: "우리 국가가 직면한 맹공에서 살아남으려면, 정치라는 허울을 버리고 사회의 완전한 군사화를 받아들여야 합니다. 오직 그러한 극단적인 조치를 통해서만 우리는 적을 무찌를 수 있을 것입니다."
 FIN_a_cry_for_help: "도움을 향한 절규"
 FIN_a_cry_for_help_desc: "국제 연맹은 분쟁으로부터 회원국을 보호해야 할 의무를 다하지 못했습니다. 하지만 해외에는 아직 우리의 도움을 향한 절규를 듣고 우리를 도우러 올 이들이 있을지도 모릅니다. 그렇게 되기를 바랄 뿐입니다."
 FIN_greater_finland: "대핀란드"
 FIN_greater_finland_desc: "더 이상 우리 땅을 탐내는 무자비한 이웃들의 먹잇감이 되지 않을 것입니다. 대신, 우리가 포식자가 되어 국경을 카렐리야 땅 너머의 자연 경계까지 확장할 것입니다."

 FIN_right_wing_policies: "우익 정책"
 FIN_right_wing_policies_desc: "좌파는 외세의 앞잡이에 불과합니다. [SOU.Capital.GetCapitalVictoryPointName]의 환심을 살 수만 있다면 눈 깜짝할 사이에 조국을 팔아넘길 것입니다. 우리 국가가 번영하고 생존하려면, 우익 정당과 조직에 의지해야 합니다."
 FIN_discredit_the_democratic_system: "민주주의 체제의 신용을 떨어뜨려라"
 FIN_discredit_the_democratic_system_desc: "우리의 민주주의 체제는 결단력 있고 의미 있는 조치 없이 위기에서 위기로 비틀거릴 뿐입니다. 우리가 처한 이 위험한 상황에서, 우리는 더 이상 그러한 나약함을 용납할 수 없으며 대중에게 이 정치 체제의 실패를 교육해야 합니다."
 FIN_prepare_a_military_coup: "군사 쿠데타 준비"
 FIN_prepare_a_military_coup_desc: "[FIN.GetNameDef](은)는 위기 상황에서 어려운 결정을 내릴 수 있는 강력하고 결단력 있는 지도력이 필요합니다. 현재 그것이 가능한 유일한 집단은 군부입니다. 민주주의자들과 사회주의자들 아래에서 국가가 무너지기를 기다리기보다는, 군사 쿠데타의 기반을 마련할 것입니다."
 FIN_a_fascist_regime: "파시스트 정권"
 FIN_a_fascist_regime_desc: "국회가 군부의 영향력 아래에 있으므로, 이제 우리는 힘, 명예, 그리고 [FIN.GetName]에 대한 충성을 기반으로 한 정권을 수립할 수 있습니다."
 FIN_seek_german_protection: "독일의 보호 요청"
 FIN_seek_german_protection_desc: "국제 연맹은 국제법을 수호하는 데 완전히 실패했습니다. 우리는 군사력이 국제 관계에서 유일한 결정 요인임을 받아들여야 합니다. 따라서 우리 국가가 생존하기 위해서는 [GER.GetNameDef]와 같은 더 강력한 이웃에게 원조를 구해야 합니다."
 FIN_join_axis: "[GetFascistFactionForFinland] 가입"
 FIN_join_axis_desc: "추축국의 힘에 맞설 수 있는 자는 거의 없습니다. 방관자로 남기보다는, 그들의 동맹에 가입하여 우리 자신의 외교 정책 목표를 추구하는 데 이용해야 합니다."
 FIN_finnish_supremacy_in_the_north: "북방의 핀란드 패권"
 FIN_finnish_supremacy_in_the_north_desc: "우리 지역의 다른 국가들이 강대국의 손에 종속되는 것을 두고 다투고 협상하는 동안, 우리만이 대안을 제시할 수 있습니다. 우리의 지도 아래, 우리를 위협할 수 있는 어떤 적에 대해서도 우리 민족들을 승리로 이끌 수 있습니다."
 FIN_finnish_legion_of_honor: "핀란드 명예 군단"
 FIN_finnish_legion_of_honor_desc: "우리 군대는 국경에서 공산주의 무리를 막아내는 방패입니다. 우리는 그들 중 가장 용감한 자들이 합류하기를 열망할 정예 명예 군단을 창설하여 그들의 용맹을 기려야 합니다."
 FIN_tactical_wargaming_department: "전술 워게임 부서"
 FIN_tactical_wargaming_department_desc: "현대전의 요구 사항은 날로 커지고 있습니다. 우리 최고 사령부가 뒤처지지 않으려면, 전술 워게임을 통해 새로운 방법을 실험할 수 있는 새로운 부서를 신설하여 사령부를 확장해야 합니다."
 FIN_advanced_jaeger_training_program: "상급 예거 훈련 프로그램"
 FIN_advanced_jaeger_training_program_desc: "우리 예거 부대는 오랫동안 군의 정예로 여겨져 왔으며, 그 기원은 대전쟁 당시 독일에서 최초로 훈련을 받은 때로 거슬러 올라갑니다. 이제 부대를 현대화하여 활력을 불어넣고, 나아가 전군의 사기를 진작시킬 때입니다."
 FIN_industrial_cooperation: "산업 협력"
 FIN_industrial_cooperation_desc: "추축국 회원국들은 풍부한 지식과 자원을 마음대로 사용할 수 있습니다. 이제 우리는 산업적으로 협력하여 이 미개발 자산을 더 잘 활용하고, 각국의 발전을 도모해야 할 때입니다."
 FIN_bring_foreign_armor_experts: "해외 기갑 전문가 초빙"
 FIN_bring_foreign_armor_experts_desc: "전차는 모든 현대 군대의 핵심 요소이지만, 우리의 경험은 제한적입니다. 이 분야의 해외 전문가를 초빙하여 도움을 받는다면 우리의 역량을 확장할 수 있을 것입니다."
 FIN_military_research: "군사 연구"
 FIN_military_research_desc: "전쟁은 새로운 기술과 이를 활용하는 전술의 등장으로 끊임없이 재창조되고 있습니다. 우리 군의 지속적인 힘과 준비 태세를 보장하기 위해, 우리 동맹 회원국들은 지식과 기술을 한데 모아야 합니다."
 FIN_patriotic_peoples_movement: "애국 인민 운동"
 FIN_patriotic_peoples_movement_desc: "애국 인민 운동은 이전 정권의 반발에도 불구하고, 민족적 자긍심의 필요성과 공산주의에 맞선 국가 방위에 대해 대중을 교육하는 데 큰 공을 세웠습니다. 만약 그들을 우리 편으로 끌어들인다면, 우리 정권은 훨씬 더 큰 지지 기반을 얻게 될 것입니다. "
 FIN_academic_karelian_society: "학술적 카렐리야 학회"
 FIN_academic_karelian_society_desc: "10년 넘게 헬싱키 대학의 지식인과 학생들로 구성된 한 단체가 점점 더 영향력을 키워왔습니다. 그들의 핵심 목표는 우리의 역사에 맞춰 핀란드를 발전시키는 것으로, 우리의 목표와 잘 부합합니다. 아마도 우리는 함께 협력할 방법을 찾을 수 있을 것입니다."
 FIN_mustapaidat: "무스타파이다트"
 FIN_mustapaidat_desc: "사회의 지속적인 군사화는 우리 국민을 가능한 한 가장 강하게 만들 것입니다. 준군사조직을 통합함으로써, 우리는 아직 군에 입대하기에는 너무 어린 사람들부터 너무 나이가 많은 사람들까지 사회 모든 계층에 군사적 가치를 장려할 수 있습니다."
 FIN_take_over_the_suojeluskunta: "수오옐루스쿤타 장악"
 FIN_take_over_the_suojeluskunta_desc: "수오옐루스쿤타는 위기 시에 국가 방어를 돕기 위해 소집될 수 있는 예비군 보조 부대 역할을 해왔습니다. 만약 이 조직을 우리 통제하에 둔다면, 수천 명을 우리 대의에 교화시키는 데 활용할 수 있을 것입니다. "
 FIN_maan_turva: "만 투르바"
 FIN_maan_turva_desc: "인구를 신중하게 감시해야만 어떠한 배신이나 전복 행위도 일어나지 않도록 보장할 수 있습니다. 이를 통해 우리는 정권을 보호하고 국가가 내부에서부터 파괴되지 않도록 할 수 있습니다."
 FIN_finnish_irredentism: "핀란드 실지회복주의"
 FIN_finnish_irredentism_desc: "구 러시아 제국으로부터 독립했지만, 여전히 우리에게 정당한 통치권이 있는 땅과 사람들이 적의 압제라는 멍에 아래 갇혀 있습니다. 우리는 이 땅을 해방시키기 위해 국민들을 분기시켜야 합니다."
 FIN_keepers_of_the_north: "북방의 수호자"
 FIN_keepers_of_the_north_desc: "우리는 북방에서 외부의 적으로부터 이 지역을 통치하고 방어할 의지를 가진 유일한 정권입니다. 이 지역의 모든 민족이 우리 통치 아래 통일될 때까지, 우리는 결코 영원한 평화를 누릴 수 없습니다."
 FIN_sotilaalliset_kappalaiset: "소틸랄리세트 카팔라이세트"
 FIN_sotilaalliset_kappalaiset_desc: "군목과의 접촉은 우리 병사들이 의지하는 중요한 복지입니다. 이 군목들 중 다수는 우리 국가의 미래에 대해서도 정당하게 우려하고 있습니다. 만약 우리가 그들과 협력한다면, 최전선에서 눈과 귀를 얻을 수 있을 뿐만 아니라, 올바른 메시지가 부대에 전달되도록 보장할 수도 있습니다."
 FIN_national_fanatism: "국가적 광신"
 FIN_national_fanatism_desc: "사회는 [FIN.GetAdjective]의 우월성이라는 대의에 대한 광신과 헌신으로 완전히 물들어야 합니다. 우리는 아무도 우리를 막을 수 없으며, 우리가 함께 일할 때 우리 국가가 위대함으로 나아가는 것을 막을 수 있는 것은 아무것도 없다는 것을 거듭 증명했습니다."
 FIN_military_promotions: "군 진급"
 FIN_military_promotions_desc: "우리 장교들은 큰 명예와 헌신으로 국가에 봉사했습니다. 이제 역사적인 적들의 손아귀에서 우리를 구하는 데 기여한 최고의 인재들에게 보상할 때입니다."
 FIN_indoctrinate_the_workers: "노동자 교화"
 FIN_indoctrinate_the_workers_desc: "인구에 대한 감시를 강화함에 따라, 우리는 효과적인 선전 방법에 대한 더 깊은 통찰력을 갖게 되었습니다. 우리는 이 지식을 활용하여 인구를 교화하고, 정부와 [FIN.GetNameDef]에 대한 절대적인 충성을 보장해야 합니다."
 FIN_intellectual_elite: "지식인 엘리트"
 FIN_intellectual_elite_desc: "군부와 지식인 계층의 계몽된 구성원 간의 신중한 협력을 통해, 우리는 사회주의와 타락의 손아귀에서 국가를 구해냈습니다. 이제 그들의 학문적 활동에 투자하여 우리를 지지한 이들에게 보답할 때입니다. "


 FIN_enhance_southern_infrastructure: "남부 기반시설 강화"
 FIN_enhance_southern_infrastructure_desc: "[ROOT.GetAdjective] 국가가 세계에서 입지를 확보하고자 함에 따라, 산업 역량을 구축하고 개선하는 데 집중해야 합니다. 이 목표를 달성하기 위한 첫 번째 단계는 남부 지역의 기반시설을 개선하여 단기적으로 경공업과 중공업의 수요에 더 잘 대비할 수 있도록 보장하는 것입니다."
 FIN_industrial_development: "산업 개발"
 FIN_industrial_development_desc: "세계가 점차 산업화됨에 따라, [ROOT.GetName]이(가) 세계 무대의 주요 행위자가 되려면 보조를 맞춰야 합니다. 우리의 중공업 투자는 일자리를 창출하고 경제를 활성화할 뿐만 아니라, 미래의 도전에 대처하는 데 필요한 자원을 제공할 것입니다."
 FIN_bank_of_aland: "Åland 은행"
 FIN_bank_of_aland_desc: "Åland 은행은 [ROOT.GetName] 경제의 초석으로, 성장과 번영을 이끄는 데 필요한 안정성과 지원을 제공합니다. \nÅland 은행에 투자함으로써, [ROOT.GetName]은(는) 미래에 투자하는 것이며, 더 강력하고 번영하는 국가를 위한 기반을 마련하는 것입니다."
 FIN_suomen_akatemia: "Suomen Akatemia"
 FIN_suomen_akatemia_desc: "저명한 수학자 레오 사리오가 이끄는 몇몇 [ROOT.GetAdjective] 지식인들이 Suomen Akatemia의 설립을 추진하고 있습니다. 이 기관은 국가 최고의 학술 기관이 되어, 과학 혁신을 주도하고 [ROOT.GetName]이(가) 기술 발전의 선두에 서도록 도울 것입니다."
 FIN_janiskoski_power_plant: "Jäniskoski 발전소"
 FIN_janiskoski_power_plant_desc: "우리는 Jäniskoski에 발전소를 건설하여 Kolosjoki 니켈 광산의 전기 제련소에 안정적인 에너지를 공급하고 [722.GetName] 지역의 성장을 촉진할 것입니다. 이는 결과적으로 북부 [ROOT.GetName]의 경제 발전을 촉진할 것입니다."
 FIN_found_pohjolan_voima: "Pohjolan Voima 설립"
 FIN_found_pohjolan_voima_desc: "최근 임업과 중공업의 확장으로 더 많은 전력이 필요해졌습니다. 우리는 에너지 생산을 중앙 집중화하고 수력 발전의 무한한 잠재력을 활용하여 [ROOT.GetName]의 산업 성장을 촉진할 것입니다."
 FIN_expand_imatra_hydropower_plant: "Imatra 수력 발전소 확장"
 FIN_expand_imatra_hydropower_plant_desc: "1922년에 설립된 Imatra 수력 발전소는 [ROOT.GetName]의 성장하는 산업에 신뢰할 수 있는 에너지원임이 입증되었습니다. 5호기와 6호기 증설로 발전소의 용량은 더욱 증가할 것이며, [928.GetName] 지역의 추가적인 산업 성장을 가능하게 할 것입니다."
 FIN_makola_mine: "Makola 광산"
 FIN_makola_mine_desc: "Makola와 Hitura에서 풍부한 니켈과 구리 매장지가 발견되었습니다. 우리 전문가들은 이 매장지가 국가의 경제 성장과 급속히 팽창하는 군수 산업에 큰 잠재력을 가지고 있다고 생각하며, 가능한 한 빨리 귀중한 광물의 안정적인 공급원을 확보하기 위해 Makola 광산 건설 작업을 시작하라고 조언합니다."
 FIN_power_from_the_dams: "댐 전력"
 FIN_power_from_the_dams_desc: "[ROOT.GetName]의 풍부한 강이라는 천연자원을 활용하여, 수력 발전 기반시설의 의미 있는 확장이 제안되었습니다. 전문가들에 따르면, 새로운 수력 발전소 건설에 투자하는 것은 우리의 산업 역량을 대폭 확장하고 국가 성장을 이끌 수단을 제공할 것입니다."
 FIN_tire_factory_at_nokia: "노키아 타이어 공장"
 FIN_tire_factory_at_nokia_desc: "분쟁 시기에 [ROOT.GetName]은(는) 군용 타이어 공급원이 필요하므로, 우리 군의 기동성과 준비태세를 보장하기 위해 신뢰할 수 있는 공급을 확보하는 것이 우선순위가 되어야 합니다. \n우리는 노키아에 있는 Suomen Gummitehdas의 타이어 공장을 확장하고 잠재적인 부족 사태를 극복하기 위해 합성 고무와 재활용 재료를 사용하도록 생산 라인을 개선할 계획입니다."
 FIN_vaisala_radiosonde_tests: "Väisälä의 라디오존데 시험"
 FIN_vaisala_radiosonde_tests_desc: "빌호 바이살라 교수의 지도 아래, 라디오존데 기술의 선구적인 노력은 성공적인 상업 생산의 길을 열었습니다. 1931년 최초의 핀란드 라디오존데 발사의 성공을 바탕으로, 지속적인 연구 개발은 상당한 기술적 발전을 이끌었습니다."
 FIN_oy_alkoholiliike: "Oy Alkoholiliike"
 FIN_oy_alkoholiliike_desc: "절박한 시기에는 절박한 조치가 필요하며, 이제는 주류 회사인 Oy Alkoholiliike가 핀란드군에 무기의 필수 부품을 제공하여 지원할 때입니다. \n신중한 생산과 정제를 통해, 그들은 매우 효과적인 화염병 칵테일 제작을 전문으로 하여, 보병이 적의 경장갑을 무력화하는 데 필요한 우위를 제공할 것입니다."
 FIN_integrate_oy_tikkakoski: "Oy Tikkakoski 통합"
 FIN_integrate_oy_tikkakoski_desc: "[ROOT.GetAdjective] 군수 산업을 강화하기 위해, Oy Tikkakoski는 국영 군용 무기 공장에 통합될 것입니다. 이 조치는 총기 생산을 늘리고 [ROOT.GetAdjective] 군을 위한 새로운 화기 개발을 향상시킬 것입니다."
 FIN_national_firepower: "국가 화력"
 FIN_national_firepower_desc: "우리나라가 직면한 긴급한 외부 위협을 고려할 때, 우리는 새로운 군수 공장에 대규모 투자를 단행해야 합니다. 이 시설들은 우리 지상군과 해안포대를 위한 최신 야포를 생산하는 데 전념할 것이며, [ROOT.GetNameDef]이(가) 국경을 방어하는 데 필요한 화력을 갖추도록 보장할 것입니다."
 FIN_contract_with_yhteissisu: "위흐테이시수와의 계약"
 FIN_contract_with_yhteissisu_desc: "우리는 [ROOT.GetAdjective] 국방군에 안정적이고 효율적인 수송 수단을 제공하는 것을 목표로, [ROOT.GetAdjective]의 주요 기업들과 협력하여 위흐테이시수 Oy 회사를 설립할 것입니다. \n시수 S-21 트럭 생산을 위흐테이시수로 이전하면 군용 트럭 및 버스 생산이 강화되어, 우리 군이 어떤 상황에서도 필요한 자원을 갖추도록 보장할 것입니다."
 FIN_outokumpu_for_defence_industry: "방위 산업을 위한 오우토쿰푸"
 FIN_outokumpu_for_defence_industry_desc: "국영 금속 산업 회사인 오우토쿰푸 Oy에 투자하면 [ROOT.GetName]의 국방 준비 태세를 강화하는 데 도움이 될 것입니다. \n포리에 국내 금속 공장을 설립하고 원동을 정제하기 위한 구리 전해 공장을 세우면 [ROOT.GetName]의 구리 및 황동 생산 자급자족을 이룰 수 있을 것입니다."
 FIN_industrial_upgrade_in_harjavalta: "하르야발타 산업 현대화"
 FIN_industrial_upgrade_in_harjavalta_desc: "하르야발타에서는 니켈 및 구리 산업을 현대화하고 간소화하려는 노력이 진행 중입니다. 최첨단 기술과 개선된 생산 방법을 통해 생산량을 극대화하고, 이 필수 광물의 선도적인 생산국으로서 [ROOT.GetName]의 입지를 강화하는 것을 목표로 합니다."
 FIN_expand_mining_prospection: "광산 탐사 확대"
 FIN_expand_mining_prospection_desc: "현대적인 채광 도구에 대한 투자와 광산 기반 시설 확장은 견고한 광물 추출 산업의 기반을 마련합니다. 생산량 증가는 국방 수요를 충족시키고 분쟁에 대한 국가의 준비 태세를 강화할 것입니다."
 FIN_elijarvi_mine: "엘리얘르비 광산"
 FIN_elijarvi_mine_desc: "엘리얘르비 인근 발굴 작업과 관련하여 발견된 표본을 받았는데, 이는 크롬이 매우 풍부할 수 있는 크롬 광석의 존재를 나타냅니다. 우리는 이 지역에서 새로운 채광 작업을 시작하고 군수 산업을 위한 안정적인 크롬 공급원을 확보해야 합니다."
 FIN_tornio_steel_factory: "토르니오 제철소"
 FIN_tornio_steel_factory_desc: "케미 광산 근처 토르니오에 제철소를 설립하는 것은 핀란드 금속 산업에 혁명을 가져올 것입니다. 오우토쿰푸의 풍부해진 크롬과 니켈 공급에 접근할 수 있게 된 이 새로운 공장은 최고 품질의 강철을 생산하여 핀란드의 산업 능력 격차를 해소할 것입니다."
 FIN_increase_military_budget: "국방 예산 증액"
 FIN_increase_military_budget_desc: "국가 안보는 가장 중요합니다. 국방 예산을 증액함으로써 국방군은 모든 잠재적 위협에 잘 대처할 수 있도록 장비를 갖추고 더 잘 준비될 것입니다."
 FIN_suomen_maavoimat: "수오멘 마보이마트"
 FIN_suomen_maavoimat_desc: "우리는 새로운 군사 장비 연구에 투자하고 훈련 시설을 현대화하여 핀란드 국방군의 역량을 강화하고, 모든 잠재적 위협에 대비한 준비 태세를 보장해야 합니다."
 FIN_operation_kilpapurjehdus: "킬파푸르예흐두스 작전"
 FIN_operation_kilpapurjehdus_desc: "국제 연맹의 결정에 따라 올란드 제도는 1921년부터 비무장화되었으며, 이는 해당 지역에 군대나 군수품이 주둔하지 않음을 의미합니다. 그러나 유럽의 긴장이 고조되고 있으며, 적이 섬에 상륙할 심각한 위협에 직면하여 우리 최고 사령부는 올란드를 무장하고 요새화할 계획을 고안했습니다. \n준비는 완료되었고 우리 군대는 행동할 준비가 되었습니다!"
 FIN_extra_refresher_exercises: "추가 재교육 훈련"
 FIN_extra_refresher_exercises_desc: "유럽의 긴장은 계속 고조되고 있으며, [ROOT.GetAdjective]의 독립을 보존하려면 집중적인 훈련을 통해 핀란드의 국방을 강화하고, 잠재적인 분쟁 발발에 대비하며, 필요하다면 국가 주권을 수호하려는 핀란드인의 결의와 준비 태세를 보여주어야 합니다."
 FIN_the_cold_front: "한랭 전선"
 FIN_the_cold_front_desc: "핀란드 전선의 혹독한 겨울 조건은 철저한 준비를 요구합니다. 겨울의 도전에 맞서 국방군의 회복력을 보장하기 위해 보급로를 확보하고 위장 전술을 개선해야 합니다."
 FIN_jaeger_movement: "예거 운동"
 FIN_jaeger_movement_desc: "[ROOT.GetAdjective] 최고 사령부는 이전에 예거 훈련을 받은 장교들을 진급시켜 국방군에 새로운 활력을 불어넣자는 제안을 내놓았습니다. 이 장교들은 적진 후방에서의 게릴라전과 파괴 공작 전문가들이므로, 새로운 부대의 비정규전 전술 기술을 연마하고 전투를 이끌기에 완벽한 후보자들입니다."
 FIN_salvaged_and_retooled: "회수 및 개조"
 FIN_salvaged_and_retooled_desc: "우리 군이 전쟁에서 승리하려면 전시 자원을 극대화하는 데 집중해야 합니다. 노획한 적 장비를 활용하고, 손상된 물자를 회수하며, 필요할 때 핀란드 전술 교리에 맞춰 용도를 변경하면 우리 군의 보급 수요를 충족하고 군사 역량을 크게 강화할 수 있을 것입니다."
 FIN_winter_warfare: "동계전"
 FIN_winter_warfare_desc: "최악을 대비하고, 최고처럼 싸워라. 우리는 혹독한 겨울 조건에 대비하여 보급로를 강화하고, 우리 군이 추위를 견디고 최전선에서 계속 싸울 수 있도록 훈련해야 합니다."
 FIN_motti_tactics: "모티 전술"
 FIN_motti_tactics_desc: "모티 전략은 적 부대를 포위 및 고립시켜 군수 및 통신선을 마비시키는 것을 목표로 합니다. 이 접근법을 실행하려면 전장에서의 효율성을 보장하기 위해 방위군의 신중한 계획과 훈련이 필요합니다. 모티 전술을 활용하고 완성함으로써, 우리는 적의 허를 찌르고 예상치 못한 곳을 타격할 수 있을 것입니다."
 FIN_foreign_armor: "외국제 기갑"
 FIN_foreign_armor_desc: "전쟁 중 [ROOT.GetAdjective] 육군이 기갑 능력을 강화하고자 함에 따라, 우리는 해결책을 찾기 위해 국경 너머를 바라봐야 합니다. 스웨덴의 란츠베르크 L-62 II와 같은 외국제 기갑 장비를 획득하면 [ROOT.GetAdjective] 군수품에 반가운 추가 전력이 될 것이며, 역경에 맞서는 국가의 지략과 적응력을 보여줄 것입니다."
 FIN_utilize_the_sami: "사미인 활용"
 FIN_utilize_the_sami_desc: "우리는 혹독한 북극 지형의 전문 항해사인 사미인의 고유한 기술을 인정해야 합니다. 그들의 지리에 대한 지식을 활용하여 정찰 능력을 향상시키고, 순록 목동으로 고용하여 외딴 지역의 보급선을 개선할 수 있습니다. 사미인은 우리 방어 전략에서 중요한 역할을 할 수 있으며, 우리는 그들의 전문성이 완전히 활용되도록 보장해야 합니다."
 FIN_long_range_patrols: "장거리 정찰대"
 FIN_long_range_patrols_desc: "장거리 정찰대는 현대전의 도전에 직면한 [ROOT.GetAdjective] 육군의 정찰 및 파괴 공작 활동에서 필수적인 요소가 될 것입니다. 고도로 훈련된 이 부대들은 적진 침투, 정보 수집, 파괴적인 기습 공격을 전문으로 하며, 전쟁 수행에 있어 중요한 자산이 됩니다."
 FIN_finnish_radio_intelligence: "핀란드 무선 정보"
 FIN_finnish_radio_intelligence_desc: "전쟁이 격화됨에 따라, 핀란드군은 신뢰할 수 있는 정보를 수집하는 것의 중요성을 인식했습니다. 레이노 할라마의 지휘 아래, 재능 있는 무선 통신병 그룹이 적의 통신을 감청하고 해독하기 위해 소집되었습니다. 이 통신병들은 자신들의 기술과 지식으로 핀란드군에 귀중한 정보를 제공하여 전세를 역전시키는 데 도움을 줄 것입니다."
 FIN_sissi: "시시"
 FIN_sissi_desc: "분쟁이 계속됨에 따라, 우리의 경보병 시시 부대는 장거리 정찰과 매복에 대한 전문성을 이용해 적 목표물을 타격하며 핀란드 육군의 귀중한 자산이 됩니다. 지형에 대한 뛰어난 지식과 신속하고 조용히 움직일 수 있는 능력을 갖춘 그들은 적에게 눈엣가시 같은 존재이자 핀란드 국민의 자부심이 됩니다."
 FIN_national_armor_focus: "국가 기갑 중점"
 FIN_national_armor_focus_desc: "전쟁 노력이 강화됨에 따라, [ROOT.GetName]은(는) 자국의 군수 산업에 관심을 돌려야 합니다. 국내 전차 생산 능력 개발에 중점을 두어, 우리는 기갑 부대를 강화하고 전장에서의 고유한 요구에 맞는 차량을 만드는 것을 목표로 합니다."
 FIN_underground_resistance_cells: "지하 저항 조직"
 FIN_underground_resistance_cells_desc: "적이 진격함에 따라, 일부 핀란드인들은 굴복을 거부합니다. 작고 민첩한 저항 조직들이 무기를 들고 매복, 습격, 파괴 공작을 수행합니다. 지형에 대한 지식과 대의에 대한 헌신은 그들을 아무리 강력한 침략자에게라도 무시무시한 위협으로 만듭니다."
 FIN_mannerheim_line: "만네르헤임선"
 FIN_mannerheim_line_desc: "방어를 강화하기 위한 노력의 일환으로, 우리는 만네르헤임선에 주목해야 합니다. 복잡한 방어 요새망인 이 방어선은 국가의 동쪽 국경을 가로질러 뻗어 있으며, 적의 침공으로부터 반드시 확보되어야 합니다. 이를 위해, 육군은 요새 자체와 요새에 물자를 공급하고 운영을 유지하는 보급선을 모두 개선하기 위해 노력하고 있습니다."
 FIN_defense_in_depth: "종심 방어"
 FIN_defense_in_depth_desc: "적이 더욱 강해지고 단호해짐에 따라, 단일 고정 전선만으로는 그들을 막기에 충분하지 않다는 것이 명백해집니다. 우리는 주 전선 뒤에 새로운 요새와 더 작은 방어선을 구축하여 다층적인 보호를 제공하고, 필요에 따라 우리 군이 반격할 수 있는 유연성을 부여해야 합니다. 우리는 적이 빼앗으려는 [ROOT.GetAdjective] 영토 단 한 뼘이라도 피의 대가를 치르게 할 것입니다."
 FIN_helsinki_air_defense: "헬싱키 방공"
 FIN_helsinki_air_defense_desc: "[ROOT.GetName]에 전쟁의 그림자가 드리우면서, 헬싱키는 요새화되어야 합니다. 도시와 그 해안선은 공격에 취약하며, 이를 보호하는 것은 [ROOT.GetAdjective] 군의 몫입니다. 개선된 방공 및 해안 요새는 도시를 보호할 뿐만 아니라, 어떠한 공격에도 맞서려는 국가의 결의를 강화할 것입니다."
 FIN_suomen_ilmavoimat: "수오멘 일마보이마트"
 FIN_suomen_ilmavoimat_desc: "우리는 연구와 훈련에 대한 투자를 통해 [ROOT.GetAdjective] 공군의 효율성을 향상시키는 데 집중해야 합니다. \n목표는 현대전의 도전에 대처할 수 있는 현대적이고 유연한 공군을 창설하고, 전투 작전 중 지상군에 중요한 지원을 제공하는 것입니다."
 FIN_expand_air_bases: "공군 기지 확장"
 FIN_expand_air_bases_desc: "[ROOT.GetName] 주변의 긴장이 고조됨에 따라, 우리는 국방군이 적절하게 작전할 수단을 갖추도록 보장해야 합니다. \n우리는 공군이 분쟁 시 조종사들을 신속하게 배치할 수 있도록 전국에 공군 기지 수를 확장하려는 노력을 지원할 것입니다."
 FIN_pilot_training: "조종사 훈련"
 FIN_pilot_training_desc: "현대전에서 공군력에 대한 수요가 증가함에 따라, 우리 조종사들에게는 더 발전되고 전문화된 훈련이 필요합니다. 새로운 훈련 방법과 장비에 대한 투자를 통해, [ROOT.GetAdjective] 공군은 조종사들이 세계 최고 수준이 되도록 보장할 수 있습니다."
 FIN_naval_airforce: "해군 항공대"
 FIN_naval_airforce_desc: "[ROOT.GetName]의 해군력이 성장함에 따라, 항공 능력도 함께 성장해야 합니다. 전담 해군 항공대를 창설하면 핀란드 해군이 발트해를 지배하는 데 필요한 지원을 확보하고, 공군력과 수상 함대를 조율하여 모든 위협을 격퇴할 수 있을 것입니다."
 FIN_national_aircraft_production: "국가 항공기 생산"
 FIN_national_aircraft_production_desc: "[ROOT.GetName]이(가) 전쟁의 위협에 직면함에 따라 현대적인 공군이 국가 방위에 필수적이라는 사실이 더욱 명확해졌습니다. 이를 위해 [ROOT.GetAdjective] 항공기 설계자와 제조업체에 필요한 자원과 지원을 제공하여 [ROOT.GetName]이(가) 유럽의 강대국들과 경쟁할 수 있도록 보장하는 것을 목표로 국가 항공기 생산 프로그램을 시작했습니다."
 FIN_expand_air_force_academy: "공군사관학교 확장"
 FIN_expand_air_force_academy_desc: "공군력 증강을 위한 국가적 노력의 일환으로, 공군사관학교의 대대적인 확장에 착수할 것입니다. 이번 확장은 새로운 시설을 포함할 뿐만 아니라, 카우하바와 티카코스키에 새로운 비행장을 건설하여 조종사 훈련을 개선할 것입니다."
 FIN_foreign_aircraft: "외국 항공기"
 FIN_foreign_aircraft_desc: "[ROOT.GetAdjective] 공군은 국가 주권을 수호하고 조국의 안전을 보장하기 위해 역량을 확장해야 합니다. 우리의 역량을 개선하고 자체 항공기 개발을 위해 외국 항공기 설계와 전문 지식을 모색할 것입니다."
 FIN_support_for_ground_forces: "지상군 지원"
 FIN_support_for_ground_forces_desc: "전쟁이 격화됨에 따라 지상군에 더 많은 공중 지원이 필요하다는 것이 명백해졌습니다. 이를 위해 지상 병력에게 필수적인 공중 엄호를 제공하고자 근접항공지원기 개발 및 생산에 투자할 것입니다. 이는 아군이 진지를 사수하고 적을 격퇴하는 데 필요한 지원을 제공할 것입니다."
 FIN_dominate_the_skies: "제공권 장악"
 FIN_dominate_the_skies_desc: "[ROOT.GetAdjective]의 하늘은 우리의 것이 될 것입니다! 신형 전투기 생산과 현대 공중전 기술 연구개발에 대한 투자는 우리가 제공권을 확보하고 조국을 수호할 수 있게 해줄 것입니다. 우리의 숙련된 조종사들은 하늘을 지배하며 적을 압도할 것입니다."
 FIN_expand_production_lines: "생산 라인 확장"
 FIN_expand_production_lines_desc: "[ROOT.GetAdjective] 공군은 전쟁 수행에 필요한 증대되는 수요를 충족시키기 위해 생산 능력을 확장해야 합니다. 새로운 생산 라인을 건설함으로써 신형 항공기 생산량을 늘리고, 우리 공군이 적과의 싸움에서 강력한 자산으로 남을 수 있도록 보장할 것입니다."
 FIN_modernize_production_lines: "생산 라인 현대화"
 FIN_modernize_production_lines_desc: "최첨단 군용기를 생산할 수 있는 세계적 수준의 항공 산업을 창출하기 위해, [ROOT.GetAdjective] 정부는 항공 장비 제조를 담당하는 국영 공장을 개선하는 데 투자하여 [ROOT.GetName]의 공군이 가장 최신의 신뢰할 수 있는 항공기 기술을 이용할 수 있도록 보장할 것입니다."
 FIN_suomen_merivoimat: "수오멘 메리보이마트"
 FIN_suomen_merivoimat_desc: "[ROOT.GetName]의 해군은 잠재적인 위협으로부터 조국을 방어할 준비가 되어 있어야 합니다. 현대 해군 장비를 연구하고 개선된 훈련 프로그램을 개발하는 데 중점을 둠으로써, [ROOT.GetAdjective] 해군은 해상에서 우리의 이익을 보호할 수 있는 강력한 군대가 될 것입니다."
 FIN_the_merchant_fleet: "상선단"
 FIN_the_merchant_fleet_desc: "전쟁 수행의 일환으로, [ROOT.GetName]의 상선단은 필요한 곳에 중요 물자를 수송할 수 있도록 보조를 맞춰야 합니다. 새로운 선박 생산에 투자함으로써 우리는 자급자족 능력을 강화하고 모든 분쟁에서 우리의 입지를 확보할 수 있습니다."
 FIN_conversion_of_civilian_vessels: "민간 선박 개조"
 FIN_conversion_of_civilian_vessels_desc: "전쟁이 격화됨에 따라, 우리는 가용할 수 있는 모든 자원을 활용해야 합니다. 민간 선박 개조를 통해, [ROOT.GetName]은(는) 신속하게 해군 역량을 강화하고 적의 위협으로부터 해안을 보호할 수 있습니다. 대형 쇄빙선은 해안 방어함으로 용도를 변경할 수 있으며, 소형 선박은 구축함이나 경비정 역할을 하여 [ROOT.GetAdjective] 해안을 따라 강력한 방어망을 구축할 수 있습니다."
 FIN_coastal_defense: "해안 방어"
 FIN_coastal_defense_desc: "외국의 침략에 직면하여, 핀란드 해안선이 잘 보호되도록 하는 것이 가장 중요합니다. 해안 방어 기반 시설을 개선함으로써, 우리는 바다로부터의 잠재적인 위협에 더 잘 대비할 수 있습니다."
 FIN_marine_jaeger_divisions: "해병 엽병 사단"
 FIN_marine_jaeger_divisions_desc: "1934년 말에 창설된 핀란드 해병 엽병, 즉 란니코얘캐리트(Rannikkojääkärit)는 핀란드 해군의 정예 해병 보병 부대로 편성되었습니다. 고도로 훈련되고 적응력이 뛰어난 이 병사들은 해안 방어에서 상륙 돌격에 이르기까지 다양한 임무를 수행할 수 있도록 무장하고 있으며, 발트해 연안에서 발생할 수 있는 모든 교전에서 핵심 자산이 될 것입니다."
 FIN_rapid_raiders: "신속 습격대"
 FIN_rapid_raiders_desc: "세계가 발전함에 따라, 우리 해군도 발전해야 합니다. 최신 어뢰 기술로 무장한 현대 구축함의 연구 및 생산에 투자함으로써, 우리는 신속하고 치명적인 힘으로 적을 타격할 수 있을 것입니다."
 FIN_deep_sea_raiders: "심해 습격대"
 FIN_deep_sea_raiders_desc: "전쟁의 성패가 달린 상황에서, [ROOT.GetAdjective] 해군은 적의 보급선을 방해하고 우리 교역로를 보호하기 위해 현대 잠수함 생산을 늘려야 합니다. 이 날렵하고 치명적인 함선들은 적 선원들의 마음에 공포를 심어주고, [ROOT.GetName]이(가) 해양 강국으로서의 입지를 확보하는 데 도움을 줄 것입니다."
 FIN_sea_mines_strategy: "기뢰 전략"
 FIN_sea_mines_strategy_desc: "전략적 위치에 기뢰를 부설함으로써, [ROOT.GetAdjective] 해군은 자국 해안 주변 해역을 적 함대에게 위험하게 만들어 적이 [ROOT.GetAdjective] 해안에 접근하기 어렵게 하고, 우리 해상 무역의 안전을 보장하는 것을 목표로 합니다."
 FIN_expansion_towards_the_atlantic: "대서양으로의 확장"
 FIN_expansion_towards_the_atlantic_desc: "[ROOT.GetAdjective] 조선업은 대서양으로 닻을 올리고, 해군 역량을 확장하며 대양 너머로 군사력을 투사하기 위해 더 큰 함선을 건조할 것입니다. 전함과 항공모함이 추가되면, [ROOT.GetName]의 해군은 세계 무대에서 무시할 수 없는 세력이 될 것입니다."
 FIN_strengthen_the_naval_bases: "해군 기지 강화"
 FIN_strengthen_the_naval_bases_desc: "[ROOT.GetName]이(가) 전쟁을 준비함에 따라, 해군 기지가 잘 갖춰지고 잘 보호되는 것이 중요합니다. 해군 기지의 기반 시설과 방어 체계를 개선함으로써, 우리 함대가 안전을 유지하고 적과 교전할 준비를 갖추도록 보장할 수 있습니다."
 FIN_expand_ship_building_industry: "조선 산업 확장"
 FIN_expand_ship_building_industry_desc: "군함의 필요성이 증가함에 따라, 군함을 생산할 수 있는 조선소의 필요성도 커집니다. 확장된 조선 산업을 통해, [ROOT.GetName]은(는) 군사력을 투사하고 해안을 보호하는 데 필요한 함선을 군에 더 잘 제공할 수 있게 될 것입니다."
 FIN_acquire_andros_dockyards: "안드로스 조선소 획득"
 FIN_acquire_andros_dockyards_desc: "투르쿠에 있는 안드로스 조선소를 인수하면 우리의 선도적인 함선 설계사인 $FIN_crichton_vulcan_organization$의 생산 능력이 크게 향상될 것입니다. 이 새로운 시설이 추가되면, [ROOT.GetAdjective] 해군은 더 많고 더 좋은 함선을 생산할 수 있게 되어, 이 지역에서 그들의 힘과 영향력을 증대시킬 것입니다."
 FIN_innovative_designs: "혁신적인 설계"
 FIN_innovative_designs_desc: "대담한 혁신의 도약으로, 우리 기술자들은 야심 찬 \"Hyökkäysvaunu\" 프로젝트를 공개합니다. 이는 기갑전의 한계에 도전하는 초중전차 제안입니다. 비록 비전통적으로 보일 수 있지만, 이 대담한 시도는 획기적인 설계를 탐구하고 전장에서 가능한 것의 한계를 뛰어넘으려는 [ROOT.GetNameDef]의 결의를 반영합니다."

