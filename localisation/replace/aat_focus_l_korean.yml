 FIN_increase_military_investment_building_tt: "[ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§! 및 모든 §Y북유럽 동맹국§!:\n완전히 통제하는 핵심 주에 건설 슬롯 §G2§!개와 §Y군수 공장§! §G2§!개를 추가합니다.\n\n현재 효과:"
