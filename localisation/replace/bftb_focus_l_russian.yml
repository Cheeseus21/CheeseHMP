 BUL_attract_foreign_capitals_dynamic_modifier_tt: "£political_power_texticon £construction_speed_texticon £civ_factory_output £prod_eff_cap £efficiency_growth_texticon  Будет получен национальный дух §YЗарубежная промышленность§!, что даст (прирост политической власти: §G+5%§!, скорость строительства: §R-10%§!, производительность фабрики: §R-2%§!,  макс. эффективность производства: §R-5%§!,  рост эффективности производства: §R-5%§!)"
 BUL_utmost_optimization_dynamic_modifier_tt: "£construction_speed_texticon £prod_eff_cap £efficiency_growth_texticon  Изменить дух §YЗарубежная промышленность§!:\nСкорость строительства: §G+5%§!\n Макс. эффективность производства: §G+3%§!\n Рост эффективности производства: §G+3%§!"
 BUL_united_we_shall_prevail_tt: "£organization_texticon £attack_texticon £defence_texticon  [BUL.GetFlag][BUL.GetNameDefCap] и все союзники-коммунисты на Балканах получат национальный дух §YОбъединённые Балканы§!, что даст (организация дивизии: §G+10%§!, атака дивизии на национальной территории: §G+15%§!, защита дивизии на национальной территории: §G+15%§!)."
 BUL_balkan_trade_union_secretariat_tt: "£consumer_goods_texticon £political_power_texticon £political_power_texticon  Все балканские страны, союзные Болгарии, получают национальный дух §YБалканский профсоюзный секретариат§!, что даст (фабрики, производящие товары народного потребления: §Y-5%§!, затраты на законы об экономике: §G-35%§!, затраты на законы, регулирующие торговлю: §G-35%§!)."
 BUL_appeal_to_european_capitalists_cg_tt: "£consumer_goods_texticon  Меняет национальный дух §YЗарубежная промышленность§! на \nПотребительские товары: §Y-5%§!"
 BUL_free_balkan_states_ns_tt: "£consumer_goods_texticon £stability_texticon £manpower_texticon  \nПолучает национальный дух §YНаш долг на Балканах§!, дающий (фабрики, производящие товары народного потребления: §Y-1%§! за каждую гарантируемую страну, стабильность: §G+5%§! за каждую гарантируемую страну, еженедельный прирост людских ресурсов: §G+1000§! вне зависимости от количества гарантируемых стран)."
