 ### AMERICA EVENTS ###
 ######################

 AAT_USA_events.01.t: "[USA.GetNameDefCap], 그린란드를 점령하다"
 AAT_USA_events.01.desc: "[USA.GetLeader]이(가) 이끄는 [USA.GetAdjective] 정부는 아바나 회의에서 결정된 바에 따라 북미를 외국의 위협과 영향력으로부터 보호하기 위한 작전인 새로운 그린란드 순찰대의 일환으로 그린란드를 점령한다고 발표했습니다. 그들은 현재 세계 정세가 진정되면 우리에게 그린란드를 반환하겠다고 약속했습니다."
 AAT_USA_events.01.a: "적어도 나중에 돌려주기는 하겠지..."

 AAT_USA_events.02.t: "[FROM.GetNameDefCap], 페로 제도를 점령하다"
 AAT_USA_events.02.desc: "[FROM.GetAdjective]은(는) 현재 덴마크령이자 전략적 요충지인 페로 제도를 점령 중이라고 밝혔습니다. 그들은 [?DEN.DEN_overlord_nation.GetAdjective]의 침략으로 인해 페로 제도가 빠졌던 사악한 속박에서 해방되어 우리에게 반환될 때까지, 전쟁의 모든 참상으로부터 섬들을 보호하고 해상과 공중을 통해 편리하게 주둔할 것이라고 주장합니다."
 AAT_USA_events.02.a: "적어도 우리 국민은 안전하겠군..."

 AAT_USA_events.03.t: "[FROM.GetName], 페로 제도 반환을 요구하다"
 AAT_USA_events.03.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 이제 억압에서 다시 해방되었으니, 우리에게 약속을 지켜 합의한 대로 페로 제도를 반환하라고 촉구합니다."
 AAT_USA_events.03.a: "우리는 약속했다"
 AAT_USA_events.03.b: "사실, 저희는 마음을 바꿨습니다"
 AAT_USA_events.04.t: "[FROM.GetName]이(가) 우리의 요구를 거부함"
 AAT_USA_events.04.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) 국민투표 결과, 페로 제도 주민들이 [FROM.getAdjective]의 통치 외에는 그 어떤 통치도 원하지 않는다는 것이 명백해졌다고 주장하며 우리의 요구를 거부했습니다."
 AAT_USA_events.04.a: "어차피 그들에게 대항할 수도 없는 노릇입니다"
 AAT_USA_events.04.b: "그들은 대가를 치르게 될 것입니다"
 AAT_USA_events.05.t: "[FROM.GetName]이(가) 그린란드 반환을 요구함"
 AAT_USA_events.05.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) 이제 그들이 다시 억압에서 해방되었으니, 우리에게 약속을 지켜 합의한 대로 그린란드를 반환할 것을 요구했습니다."
 AAT_USA_events.06.t: "[FROM.GetName]이(가) 우리의 요구를 거부함"
 AAT_USA_events.06.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) 국민투표 결과, 그린란드 주민들이 [FROM.getAdjective]의 통치 외에는 그 어떤 통치도 원하지 않는다는 것이 명백해졌다고 주장하며 우리의 요구를 거부했습니다."

 AAT_USA_events.07.t: "[FROM.GetName]이(가) 영토를 반환함"
 AAT_USA_events.07.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) 이제 우리가 다시 억압에서 해방되었으므로, 약속을 지켜 안전을 위해 점유하고 있던 영토를 반환하는 데 동의했습니다."
 AAT_USA_events.07.a: "그린란드가 반환되었습니다!"
 AAT_USA_events.07.b: "페로 제도가 반환되었습니다!"

 AAT_USA_events.08.t: "[FROM.GetNameDefCap]이(가) 덴마크 영토를 요구함"
 AAT_USA_events.08.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 불법적으로 점유된 덴마크 영토를 정당한 소유주에게 반환하라는 요청을 보내왔습니다."
 AAT_USA_events.08.a: "영토를 반환한다"
 AAT_USA_events.08.b: "압제자에게 굴복하지 않겠다!"
 AAT_USA_events.09.t: "[FROM.GetNameDefCap]이(가) 덴마크 영토를 반환함"
 AAT_USA_events.09.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 불법적으로 점유된 덴마크 영토를 정당한 소유주에게 반환하는 데 동의했습니다."
 AAT_USA_events.09.a: "참으로 사려 깊군."







