 denmark_expansion_event.230.t: "[FROM.GetNameDefCap], 우리의 [NOR.GetAdjective] 영유지를 요구"
 denmark_expansion_event.230.desc: "[DEN.GetNameDefCap] 측은 우리의 [NOR.GetAdjective] 영토에 대한 역사적 영유권을 주장하는 듯합니다. 이 요구를 들어준다면, [DEN.GetAdjective]의 팽창주의에 우리 영토를 잃을 위험을 감수해야 합니다. 거부한다면, 전면전이 벌어질 것입니다."
 denmark_expansion_event.230.a: "그들의 요구에 굴복해야 합니다..."
 denmark_expansion_event.230.b: "[ROOT.GetNameDefCap]은(는) 덴마크인들에게 결코 굴복하지 않을 것입니다!"
 denmark_expansion_event.231.t: "[FROM.GetNameDefCap], 우리의 [NOR.GetAdjective] 영유권 주장을 수용"
 denmark_expansion_event.231.desc: "[FROM.GetNameDefCap] 측은 자국 영토에 대한 우리의 정당한 영유권 주장을 수용하는 현명한 결정을 내렸습니다. 분명 그들 정부의 영리한 조치입니다."
 denmark_expansion_event.231.a: "협상은 짧았습니다."
 denmark_expansion_event.232.t: "[FROM.GetNameDefCap], 우리의 [NOR.GetAdjective] 영유권 주장을 거부"
 denmark_expansion_event.232.desc: "불행하게도, [FROM.GetAdjective] 정부는 우리의 주장을 반박했습니다. 정당한 [DEN.GetAdjective]의 것을 확보하기 위해 그들의 문턱까지 전쟁을 끌고 가는 것 외에는 선택의 여지가 없는 것 같습니다."
 denmark_expansion_event.232.a: "아마 공격적인 태도를 보이면 더 순순히 응할 것입니다."
 denmark_expansion_event.300.t: "[FROM.GetNameDefCap], 자원 권리 제안"
 denmark_expansion_event.300.desc: "오늘 [DEN.GetAdjective] 정부가 새로 정복한 $STATE_666$ 영토의 자원 권리를 제안하며 우리에게 접근해 왔습니다. 해당 지역은 광물 자원이 풍부합니다. 고려해 볼 만한 제안일지도 모릅니다."
 denmark_expansion_event.300.a: "이 관대한 제안을 수락합니다!"
 denmark_expansion_event.300.b: "우리에게는 필요 없습니다."
 denmark_expansion_event.301.t: "[FROM.GetNameDefCap], 우리의 자원 권리 제안을 수락"
 denmark_expansion_event.301.desc: "[FROM.GetNameDefCap] 측이 새로 획득한 [SWE.GetAdjective] 자원에 대한 우리의 제안을 흔쾌히 수락했습니다. 이는 앞으로 우리 두 나라가 긍정적인 관계를 맺을 수 있음을 의미할지도 모릅니다."
 denmark_expansion_event.301.a: "훌륭합니다!"
 denmark_expansion_event.302.t: "[FROM.GetNameDefCap], 우리의 자원 권리 제안을 거부"
 denmark_expansion_event.302.desc: "유감스럽게도, [FROM.GetNameDef] 측이 우리의 관대한 [SWE.GetAdjective] 자원 제안을 거절했습니다. 다른 곳으로 협상 상대를 옮기는 것이 더 나을지도 모르겠습니다."
 denmark_expansion_event.302.a: "정말 무례하군."
 denmark_expansion_event.400.t: "중립의 문제"
 denmark_expansion_event.400.desc: "수년 동안, [ROOT.GetNameDef]은(는) 전 세계를 휩쓴 수많은 분쟁 속에서 전반적으로 중립을 지켜왔습니다. 하지만 유럽의 긴장이 다시 고조됨에 따라, 우리는 마침내 중립을 지킨다는 것이 무엇을 의미하는지 자문해야 합니다. 대스칸디나비아와 발트해는 지난 수 세기 동안 우리나라의 중심축이었으며, 앞으로 이들과의 관계를 어떻게 진행할지 결정하는 것이 중요합니다."
 denmark_expansion_event.400.a: "이제 그들이 더는 파시스트가 아니니, [GER.GetNameDef]의 편에 설 수 있습니다."
 denmark_expansion_event.400.b: "우리만의 세력을 형성하고 다른 국가들을 초대합시다."
 denmark_expansion_event.400.c: "지금은 이 문제에서 벗어나 있는 것이 최선일지도 모릅니다..."
 denmark_expansion_event.401.t: "[FROM.GetNameDefCap], 동맹을 모색"
 denmark_expansion_event.401.desc: "[FROM.GetNameDefCap]은(는) 대전쟁 동안 중립을 지켰고 그 이후 몇 년 동안도 그 태도를 유지해 왔지만, 오늘 아침 우리는 그들이 이 입장을 포기하는 것을 고려하고 있음을 강력히 시사하는 [FROM.GetAdjective] 대표단을 맞이했습니다. 지금이 그들을 우리 편으로 끌어들일 좋은 기회일 수 있습니다."
 denmark_expansion_event.500.t: "동맹 제안"
 denmark_expansion_event.500.desc: "유럽의 소국들에게 안보를 제공하고 연대하기 위한 노력의 일환으로, [FROM.GetNameDef]이(가) 우리에게 동맹을 제안하며 접근해 왔습니다. 우리의 [FROM.GetAdjective] 친구들과 함께해야 할까요? 아니면 우리 스스로의 힘으로 서는 것이 최선일까요?"
 denmark_expansion_event.500.a: "우리는 [FROM.GetNameDef]에 합류할 것입니다!"
 denmark_expansion_event.500.b: "금일 동맹은 필요 없습니다."
 denmark_expansion_event.501.t: "[DEN.GetNameDefCap], 동맹 획득"
 denmark_expansion_event.501.desc: "[FROM.GetNameDefCap]이(가) 우리의 동맹 제안을 수락하고 공식적으로 선언문에 서명했습니다. 폭풍에 맞서 함께 일어서고, 앞으로 수년간 서로의 안보를 보장합시다."
 denmark_expansion_event.501.a: "훌륭하다!"
 denmark_expansion_event.502.t: "[FROM.GetNameDefCap], 동맹 거부"
 denmark_expansion_event.502.desc: "유감스럽게도, [FROM.GetNameDef]이(가) 우리의 동맹 제안을 거부했습니다. 결국 공동 안보 보장은 그들의 최선의 이익에 부합하지 않았던 것 같습니다."
 denmark_expansion_event.502.a: "매우 유감스럽군."
 denmark_expansion_event.600.t: "[FROM.GetNameDefCap], 연구 협정 요청"
 denmark_expansion_event.600.desc: "양국 간의 협력 정신을 고취하기 위해, [FROM.GetAdjective] 정부는 우리가 서로의 기술력을 공유할 수 있도록 연구 협정을 체결할 것을 요청했습니다."
 denmark_expansion_event.600.a: "수락한다. 이는 우리 모두가 더 강해지는 데 도움이 될 것이다."
 denmark_expansion_event.600.b: "이럴 시간 없다."
 denmark_expansion_event.601.t: "[FROM.GetNameDefCap], 우리 연구 협정에 참여"
 denmark_expansion_event.601.desc: "좋은 소식입니다! [FROM.GetNameDefCap]이(가) 우리와의 협력 기술 공유 프로그램에 참여하기로 합의했습니다. 이는 우리가 그들의 기술 발전에 접근할 수 있게 됨을 의미하며, 이 나라의 미래를 위한 계획을 세우는 데 분명 도움이 될 것입니다."
 denmark_expansion_event.601.a: "함께하면 더 강해진다!"
 denmark_expansion_event.602.t: "[FROM.GetNameDefCap], 우리의 제안을 거절"
 denmark_expansion_event.602.desc: "우리의 최선의 노력에도 불구하고, [FROM.GetAdjective] 정부는 그들의 기술을 독점하기로 결정했습니다. 이는 안타까운 일입니다. 함께였다면 현재 우리가 할 수 있는 것보다 훨씬 더 기술적 역량을 발전시킬 수 있었을 것입니다."
 denmark_expansion_event.602.a: "안타까운 일이군..."
 denmark_expansion_event.700.t: "[FROM.GetAdjective]의 간섭"
 denmark_expansion_event.700.desc: "우리는 [ROOT.GetNameDef]에서 여론에 영향을 미치려는 [FROM.GetAdjective]의 계략에 대한 증거를 발견했습니다. 덴마크인들이 이 활동을 계속하도록 놔두면 우리에게 심각한 결과가 초래될 것입니다."
 denmark_expansion_event.701.t: "[FROM.GetNameDefCap], 우리의 계획을 좌절시키다"
 denmark_expansion_event.701.desc: "[FROM.GetAdjective]이(가) 우리의 대의에 더 우호적인 여론을 형성하려던 계획을 좌절시켰습니다."
 denmark_expansion_event.800.t: "[FROM.GetNameDefCap], 보호 제안"
 denmark_expansion_event.800.desc: "[FROM.GetAdjective] 대표단이 우리에게 접근하여, 그들의 모든 군사력을 동원해 우리를 보호하겠다고 제안했습니다. 그들이 대가로 요구하는 것은 우리가 무릎을 꿇는 것뿐입니다..."
 denmark_expansion_event.801.t: "[FROM.GetNameDefCap], 우리의 보호를 수락"
 denmark_expansion_event.801.desc: "우리가 그들을 제대로 보호하겠다는 제안에 대해 [FROM.GetAdjective] 정부로부터 답변을 받았습니다. 그들은 기꺼이 우리의 완전한 보호를 받아들였습니다!"
 denmark_expansion_event.802.t: "[FROM.GetNameDefCap], 우리의 보호를 거부"
 denmark_expansion_event.802.desc: "우리가 그들을 제대로 보호하겠다는 제안에 대해 [FROM.GetAdjective] 정부로부터 답변을 받았습니다만, 안타깝게도 그들은 무릎 꿇기를 거부했습니다. 시간이 지나면 이것이 얼마나 어리석은 실수였는지 깨닫게 될 것입니다."
 #Fascist Events
 denmark_fascist_event.1.t: "[FROM.GetNameDefCap], 우리의 지원을 요청"
 denmark_fascist_event.1.desc: "오늘 아침, 우리는 자국에서 권력을 장악하려는 시도에 대한 지원을 요청하는 [FROM.GetAdjective] 파시스트당 대표단을 맞이했습니다. 만약 우리가 그들을 돕는다면, 이는 우리의 대의에 가치 있는 동맹이 될 수 있는 또 다른 국가가 생기는 것을 의미할 것입니다."
 denmark_fascist_event.1.a: "그들의 집권을 지지하겠다!"
 denmark_fascist_event.1.b: "지금 당장은 더 큰 우려 사항이 있다."
 denmark_fascist_event.2.t: "[FROM.GetNameDefCap]에서 지지를 보내옴"
 denmark_fascist_event.2.desc: "외부 지원을 향한 우리의 간청이 응답을 받은 것 같습니다. [FROM.GetNameDef]에서 정부 권력 장악 시도를 돕기로 동의했습니다. 이는 우리 정치 운동이 올바른 방향으로 나아가는 한 걸음입니다."
 denmark_fascist_event.2.a: "훌륭하군!"
 denmark_fascist_event.3.t: "[FROM.GetNameDefCap]에서 우리의 요청을 거부함"
 denmark_fascist_event.3.desc: "불행히도, [FROM.GetAdjective] 정부는 릭스다겐 전복 시도에 대한 지원을 거부했습니다. 현 상황에서 우리는 쿠데타에 대한 무장 저항에 직면할 가능성이 있으며, 이는 우리의 집권을 더욱 어렵게 만들 것입니다. 참으로 실망스럽습니다."
 denmark_fascist_event.3.a: "젠장!"
 denmark_fascist_event.20.t: "[FROM.GetNameDefCap], 연구 협정 요청"
 denmark_fascist_event.20.desc: "양국 간의 협력 정신을 증진하기 위해 [FROM.GetAdjective] 정부에서 서로의 기술력을 공유할 수 있도록 연구 협정 체결을 요청했습니다."
 denmark_fascist_event.20.a: "수락한다. 이는 양측 모두가 더 강해지는 데 도움이 될 뿐이다."
 denmark_fascist_event.20.b: "이런 데에 낭비할 시간은 없다."
 denmark_fascist_event.21.t: "[FROM.GetNameDefCap], 우리의 제안을 수락하다"
 denmark_fascist_event.21.desc: "좋은 소식입니다! [FROM.GetNameDefCap]에서 우리와 협력 기술 공유 프로그램에 참여하기로 동의했습니다. 이는 우리가 그들의 기술 발전에 접근할 수 있게 됨을 의미하며, 이 나라의 미래를 위한 계획을 세우는 데 분명 도움이 될 것입니다."
 denmark_fascist_event.21.a: "우리 군은 북유럽 국가들의 부러움을 한 몸에 받을 것이다!"
 denmark_fascist_event.22.t: "[FROM.GetNameDefCap], 우리의 제안을 거부하다"
 denmark_fascist_event.22.desc: "정중하게 대하려는 최선의 노력에도 불구하고, [FROM.GetAdjective] 정부는 기술을 독점하기로 결정했습니다. 함께했다면 현재보다 훨씬 더 기술 역량을 발전시킬 수 있었을 것이기에 안타까운 일입니다."
 denmark_fascist_event.22.a: "알겠다, 비밀은 잘 간직하시지."
#Trade Events
 denmark_trade_deal.1.t: "[FROM.GetNameDefCap], 무역 협정을 제안하다"
 denmark_trade_deal.1.desc: "덴마크 대표단이 무역 제안을 가지고 접근해왔습니다. 덴마크는 대량의 식료품을 생산하며, 역사적으로 우리가 상당량을 수입해온 국가입니다. 최근 그들은 자국 통화인 크로네를 평가절하하여 농산물의 경쟁력을 크게 높였습니다. 이 무역 협정은 우리 국민의 식량을 확보하고 보급선을 강화해 줄 것이므로 상당한 이익이 될 것입니다."
 denmark_trade_deal.1.a: "유리한 제안일 수 있겠군."
 denmark_trade_deal.1.b: "덴마크 제품은 필요 없다."
 denmark_trade_deal.2.t: "[FROM.GetNameDefCap], 우리의 무역 제안을 수락하다"
 denmark_trade_deal.2.desc: "우리 무역 대표단이 [FROM.GetName]에서 긍정적인 결과를 안고 돌아왔습니다! [FROM.GetAdjective] 측이 제안된 무역 협정에 서명하여, 우리 농업 부문을 강화하고 새로운 일자리와 기회를 창출하게 될 것입니다."
 denmark_trade_deal.2.a: "양측 모두에게 훌륭한 결정이군!"
 denmark_trade_deal.3.t: "[FROM.GetNameDefCap], 우리의 무역 제안을 거부하다"
 denmark_trade_deal.3.desc: "우리 무역 대표단이 [FROM.GetName]에서 실망한 채로 돌아왔습니다. [FROM.GetAdjective] 측은 수많은 이점에도 불구하고 우리 무역 제안의 혜택을 알아보지 못한 것 같습니다. 이는 농업 부문에 차질을 주겠지만, 우리가 감당하지 못할 정도는 아닙니다."
 denmark_trade_deal.3.a: "그렇다면 굶주리게 내버려 둬라!"
 denmark_trade_deal.4.t: "무역 협정 확대에 대한 문의"
 denmark_trade_deal.4.desc: "[FROM.GetLeader](이)가 농산물에 대한 기존 무역 협정 확대를 요청하는 무역 대표단을 파견했습니다. 그들은 우리 농산물에 매우 만족하는 것으로 보입니다. 이 협정을 확대하면 더 많은 일자리가 창출되고 우리 농부들의 입지가 더욱 강화될 것입니다."
 denmark_trade_deal.4.a: "훌륭한 제안이군!"
 denmark_trade_deal.4.b: "우리는 이미 필요한 것을 다 갖추고 있다."
 denmark_trade_deal.5.desc: "우리 무역 대표단이 [FROM.DetName]에서 아주 훌륭한 소식을 가지고 돌아왔습니다! 대표단장은 [FROM.GetLeader](이)가 협정 확대를 위한 우리의 무역 제안에 서명하기를 매우 열망했다고 전했습니다."
 denmark_trade_deal.6.desc: "우리 무역 대표단이 [FROM.DetName]에서 골치 아픈 소식을 가지고 돌아왔습니다. 대표단장은 [FROM.GetLeader](이)가 기존 무역 협정 확대에 대해 상당히 회의적이었으며, 양국 간의 유대를 강화하는 이점을 납득시키지 못했다고 전했습니다."
 denmark_trade_deal.6.a: "기회를 날려버렸군!"
 denmark_trade_deal.7.t: "[FROM.GetNameDefCap], 무역 협정 취소"
 denmark_trade_deal.7.desc: "[ROOT.GetLeader](은)는 [FROM.GetLeader](으)로부터 양국 간의 농산물 무역 협정이 중단될 것이라는 내용의 개인 전보를 받았습니다. 아무런 설명도 제공되지 않아 모두가 이 갑작스러운 결정의 의미를 추측하고 있습니다."
 denmark_trade_deal.7.a: "그럼 우리 몫이 더 늘겠군!"
 denmark_trade_deal.7.b: "그들의 생산품 없이도 잘 해낼 수 있을 것이다."
 denmark_trade_deal.8.t: "[GetCanceledTradeTitle]"
 denmark_trade_deal.8.t_subjugation_cancelation: "점령으로 덴마크 무역 중단"
 denmark_trade_deal.8.t_war_cancelation_partner: "전쟁으로 덴마크 무역 중단"
 denmark_trade_deal.8.t_war_cancelation_denmark: "전쟁으로 [FROM.GetAdjective] 무역 중단"
 denmark_trade_deal.8.desc: "[GetCanceledTradeDesc]"
 denmark_trade_deal.8.desc_subjugation_cancelation: "[?DEN.DEN_overlord_nation.GetAdjective]의 [DEN.GetNameDef] 침공 및 정복으로 인해 덴마크 농산물과의 모든 무역이 중단되었습니다."
 denmark_trade_deal.8.desc_war_cancelation_partner: "양국 간의 최근 적대 행위로 인해 [DEN.GetNameDef]와의 무역 협정이 중단되었습니다."
 denmark_trade_deal.8.desc_war_cancelation_denmark: "양국 간의 최근 적대 행위로 인해 [FROM.GetNameDef]와의 무역 협정이 중단되었습니다."
 denmark_trade_deal.8.a: "유감스러운 사건이군."
 denmark_trade_deal.8.b: "어차피 협정은 끝날 때가 되었다."
 denmark_trade_deal.8.c: "그들은 우리 농산물을 받을 자격이 없다!"

 denmark_events.1.t: "위기의 시대 종식"
 denmark_events.1.desc: "수년간의 경제적 어려움 끝에, 마침내 대공황이 가져온 고통에서 벗어났습니다. 위기의 시기 동안, 우리는 [DEN.GetAdjective] 경제를 안정시키고 경제 붕괴가 우리나라에 끼친 피해를 상쇄하기 위해 열심히 노력했습니다."
 denmark_events.1.a: "우리는 올바른 방향으로 나아가고 있다."
 DEN_end_of_crisis_consumer_goods_modifier_tt: "$DEN_modify_industrial_capability_dynamic_modifier$ \n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-10.0%§!\n\n"
 denmark_events.2.t: "안전함을 느끼는 국민"
 denmark_events.2.desc: "국경 요새화에 자금을 투입하는 노력을 기울인 이래로, 국민들이 특히 유럽에서 고조되는 폭풍에 대해 더 안전하다고 느끼기 시작했다는 보고를 받고 있습니다. 이 방어 시설이 미래에 [DEN.GetNameDef]를 점령하려는 계획을 가진 자들을 막아낼 수 있기를 바랍니다."
 denmark_events.2.a: "안전이 최우선이다."
 denmark_events.100.t: "덴마크 국왕, 피난처를 찾다!"
 denmark_events.100.desc: "[DEN.GetNameDef] 전역을 휩쓴 총체적 혁명 이후, 덴마크 국왕과 그의 가족이 우리나라로 망명을 요청했다는 소식을 접했습니다. 망명한 군주를 받아들이는 것은 쉬운 결정이 아니므로, 이처럼 중대한 결정을 내리기 전에 선택지를 신중히 고려해야 합니다. 덴마크 국왕을 도울 것입니까? 아니면 다른 곳으로 보낼 것입니까?"
 denmark_events.100.a: "그를 받아들여, 왕국 복원을 위해 협력할 수 있습니다."
 denmark_events.100.b: "이곳에서는 국왕을 환영하지 않습니다."
 denmark_events.200.t: "토르발 스타우닝 사망"
 denmark_events.200.desc: "저명한 정치인 토르발 스타우닝이 사망했습니다. 그는 덴마크 총리로 여러 차례 재임했으며 많은 이들의 존경을 받았습니다. 생의 말년에 그는 유럽 사회 민주주의의 미래에 대한 우려가 커졌습니다."
 denmark_events.200.a: "고인의 명복을 빕니다"
 denmark_events.201.t: "크리스티안 10세 서거"
 denmark_events.201.desc: "35년간 덴마크 국민을 통치하고 유럽의 가장 격동적인 시기 일부를 헤쳐나가도록 국가를 이끌었던 크리스티안 10세 국왕이 어젯밤 조용히 서거했습니다. 그의 아들 프레데리크 9세가 왕위를 계승합니다."
 denmark_events.201.a: "국왕 폐하 만세"
 denmark_events.300.t: "새로운 기업 설립"
 denmark_events.300.desc: "차근차근 경제를 재건하는 데 성공했으며, 거의 매일 새로운 기업이 설립되어 국가가 번영하고 있습니다. 일부 기업이 플라스틱으로 무엇을 할 수 있는지 실험하기 시작하면서 기술적 전환 또한 일어나고 있습니다."
 denmark_events.300.a: "레그 고트"
 denmark_events.666.t: "대덴마크의 부상"
 denmark_events.666.desc: "우리는 오랫동안 우리의 전성기가 지났다고 믿으며 쇠락하는 존재로 살아왔습니다. 우리는 위대함에 대한 어떤 꿈도 두 번 생각하지 않고 묵살해왔습니다. 하지만 더는 아닙니다. 우리 앞에는 새로운 황금기가 펼쳐져 있습니다! 우리의 힘과 영향력은 나날이 커지고 있으며, 대덴마크를 선포할 때가 왔습니다."
 denmark_events.666.a: "세상이여, 우리의 영광을 누려라!"
 denmark_events.666.b: "그건 좀 과한 것 같은데..."

  # Iceland
 iceland_events.1.t: "덴마크, 공격받다"
 iceland_events.1.desc: "[?ICE.overlord_attacker.GetAdjective]군이 덴마크를 공격했습니다. [ROOT.getName]은(는) 모든 당사자가 존중해주기를 바라며 중립 성명을 발표했습니다.\n국왕 부재 시 $ICE_sveinn_bjornsson$이(가) 섭정으로 선포되었으며, 사실상 [ROOT.GetName]의 외교 정치를 장악했습니다. 물론 이는 상황이 안정되고 세계가 더 평화로운 곳이 될 때까지의 임시 조치로 간주되지만, 현재로서는 [ROOT.GetName]이(가) 모든 면에서 주권 국가로 행동합니다."
 iceland_events.1.a: "임시 조치일지는 두고 봐야 할 것입니다."

  # News Events
 aat_news.1.t: "아이슬란드, 중립 선언"
 aat_news.1.desc: "아이슬란드 의회는 성명을 발표하여 덴마크와 [?ICE.overlord_attacker.GetName] 간의 분쟁에서 아이슬란드의 중립을 선언했습니다. \n의회는 또한 국왕 부재 시 $ICE_sveinn_bjornsson$을(를) 섭정으로 선포했으며, $ICE_sveinn_bjornsson$이(가) 아이슬란드의 외교 정책을 관리할 것입니다. 성명은 이것이 임시 조치이며, 분쟁이 끝나면 덴마크와의 전전 관계가 다시 복원될 것임을 시사합니다. 그러나 그날이 올 때까지 아이슬란드는 사실상 독립 상태입니다."
 aat_news.1.a: "중립이 덴마크를 구하지는 못했다."

 aat_news.2.t: "[ICE.GetAdjective]-[USA.GetAdjective] 협력"
 aat_news.2.desc: "다소 놀라운 움직임으로, [USA.GetAdjective] 정부는 [ICE.GetName]이(가) 자국의 이권 범위 내에 있다고 선언했으며, [ICE.GetAdjective] 정부의 요청에 따라 [ICE.GetName] 보호를 위한 병력 파견에 동의했습니다. 이 시점부터 모든 아이슬란드 외교 정치는 [USA.GetAdjective] 정부가 관리하게 되어, [ICE.GetName]은(는) 사실상 [USA.GetAdjective]의 괴뢰국이 됩니다."
 aat_news.2.a: "흥미로운 움직임이군."


 iceland_events.2.t: "[FROM.GetName], [ROOT.GetAdjective] 보호를 요청하다"
 iceland_events.2.desc: "[ROOT.Capital.GetCapitalVictoryPointName] 주재 아이슬란드 대사가 [FROM.GetName]으로의 파병을 요청했습니다. 사실상, 그들은 발생 가능한 침공에 대비하여 [ROOT.GetAdjective]의 보호를 요청하는 것입니다. 이 보호에 대한 대가로 자국의 외교 정책 관리권을 우리에게 넘기겠다고 제안했습니다."
 iceland_events.2.a: "절호의 기회입니다."
 iceland_events.2.b: "아니오, 그들 스스로 문제를 해결해야 합니다."
 iceland_events.2.c: "[ROOT.GetAdjective]-[FROM.OVERLORD.GetAdjective] 관계를 해치지 맙시다."

 iceland_events.3.t: "[FROM.GetNameDefCap]에서 수락하다"
 iceland_events.3.desc: "[FROM.GetAdjective] 정부가 [ROOT.GetName]의 방위를 인계해달라는 우리의 요청을 수락했습니다. 침공의 위협을 막는 것뿐만 아니라, [FROM.GetAdjective]의 주둔이 섬에 미칠 재정적 효과로도 우리나라가 이득을 보기를 바랍니다."
 iceland_events.3.a: "당분간은 안전할 것 같군."

 iceland_events.4.t: "[FROM.GetNameDefCap]에서 거절하다"
 iceland_events.4.desc: "불행하게도, [FROM.GetLeader]는 [ROOT.GetName]을 옹호하려 하지 않았습니다. [FROM.GetNameDef]에 이미 해결해야 할 문제가 산적해 있다는 것을 주된 이유로 들며, [FROM.GetLeader]는 감히 [FROM.GetNameDef]을(를) [ROOT.GetNameDef]의 보호자로 선언하지 못했습니다."
 iceland_events.4.a: "그렇다면 다른 해결책을 찾아야겠군."
 iceland_events.5.t: "스페인 전쟁"
 iceland_events.5.desc: "스페인에서 적대 행위가 발발하면서 해당 지역으로의 아이슬란드 수출이 급격히 감소했습니다. 스페인은 아이슬란드 건어물의 주요 수입국이었습니다. 전쟁과 대공황 이후 회복되기 시작한 몇 안 되는 부문 중 하나였기에, 이는 어업뿐만 아니라 아이슬란드 전체에 불행한 일입니다."
 iceland_events.5.a: "불길한 징조로군."
 iceland_events.5.b: "종말이 머지않았다!"
 iceland_events.5.c: "문제는 경제다, 이 바보들아!"
 iceland_events.5.d: "더 계몽된 시대에 살았더라면 좋았을 텐데."
 iceland_events.6.t: "동등한 동반자"
 iceland_events.6.desc: "[FROM.GetLeader]는 [FROM.GetName]이 덴마크와 함께 전쟁을 치르며 제 몫을 다하고 있으므로, 외교 정책이나 [FROM.GetAdjective] 정치에 관한 다른 어떤 문제에 대해서도 더 이상 덴마크의 지도가 필요하지 않다는 공식 선언을 했습니다. 이것은 모든 면에서 사실상의 독립 선언입니다."
 iceland_events.6.a: "솔직히, 우리가 할 수 있는 일은 별로 없습니다."
 iceland_events.6.b: "건방진 놈들, 이 전쟁이 끝나면 처리해주겠다."
 iceland_events.7.t: "[FROM.GetName]에서 우리의 독립을 승인하다"
 iceland_events.7.desc: "덴마크 의회에서 약간의 불평이 나온 것을 제외하면, 덴마크와 동등한 지위를 선언한 우리의 선언은 실질적인 반대에 부딪히지 않았습니다. 덴마크인들은 우리의 입장을 이해하며, 우리가 함께 전쟁을 치르고 있다는 사실을 고려하여 낡은 봉건 제도나 민족주의적 자존심보다 미래의 협력이 더 중요하다고 생각합니다. 우리가 요청한 대로 크리스티안 국왕이 아이슬란드 국왕의 자리에서 퇴위했습니다. 우리는 이제 완전한 주권 국가입니다. 하지만, 우리는 군주제 문제를 어떻게 처리할지 결정해야 합니다. 우리는 현재 왕이 없는 군주국입니다..."
 iceland_events.7.a: "우리에겐 왕이 필요 없습니다."
 iceland_events.7.b: "덴마크에는 다른 왕족도 있지..."
 iceland_events.8.t: "아이슬란드의 요청"
 iceland_events.8.desc: "바다 건너 우리의 작은 동생이 왕 없는 군주국은 기묘한 존재임을 깨달은 모양입니다. 그들은 덴마크 왕자 중 한 명을 아이슬란드의 왕으로 즉위시켜 달라는 요청을 가지고 우리에게 돌아왔습니다. 미래 우정의 증표라고 말하는군요."
 iceland_events.8.a: "한 번 더 - 크누드 왕자를 위해"
 iceland_events.8.b: "좋은 생각 같지 않습니다."
 iceland_events.9.t: "다시 한번 덴마크의 왕을"
 iceland_events.9.desc: "[FROM.GetAdjective] 궁정과의 협상이 결실을 맺었습니다. 크누드 왕자가 아이슬란드의 왕위를 제안받고 수락했습니다."
 iceland_events.9.a: "[ROOT.GetName]의 통치자, 크누드 왕 만세!"
 iceland_events.9.b: "좋습니다, 그의 권한이 제한되도록 보장해야 합니다."
 iceland_events.10.t: "협상 결렬"
 iceland_events.10.desc: "덴마크 궁정과의 논의는 수포로 돌아갔습니다. 그들은 [ROOT.GetName]이 더 이상 [DEN.GetName]의 속국이 되기를 원치 않는다는 사실에 여전히 상처받아 있습니다. 이제 다음 단계로 나아갈 때일지도 모릅니다."
 iceland_events.10.a: "그렇다면 공화국이 되겠군요."
 iceland_events.11.t: "[FROM.GetName]의 분노"
 iceland_events.11.desc: "우리의 최선의 노력에도 불구하고, [FROM.GetName]은 [ROOT.GetName]이 더 이상 [FROM.Capital.GetCapitalVictoryPointName]의 통치를 받기를 원치 않는다는 사실을 받아들이기를 거부합니다. 그들은 심지어 무력 사용으로 우리를 위협하기까지 했습니다. 하지만 [ROOT.GetName]이 방어군을 구축하기 시작한 지금, 그들이 성공할 가능성은 낮습니다. "
 iceland_events.11.a: "우리의 길은 변함없습니다."
 iceland_events.12.t: "[FROM.GetLeader]이(가) 보상을 요구합니다"
 iceland_events.12.desc: "[FROM.GetLeader]은(는) 수년간, 특히 최근의 어려운 시기에 [ROOT.GetName]을 도운 [FROM.GetAdjective]의 노력에 대한 보상을 요청했습니다. [FROM.GetLeader]에 따르면, 이는 [FROM.GetNameDef]이(가) 성장하고 미래에 [ROOT.GetName]을 지원할 능력을 유지하는 데 도움이 될 것이며, [FROM.GetName]이 이 섬들을 방어하는 데 더 나은 위치를 차지하게 할 것이라고 합니다."
 iceland_events.12.a: "[101.GetName]과 [337.GetName] 모두 주겠습니다."
 iceland_events.12.b: "아니오, 그들은 이것을 받을 만큼 충분히 기여하지 않았습니다."
 iceland_events.12.c: "섬 하나를 주는 것은 아마 해가 되지 않을 겁니다."
 iceland_events.13.t: "[101.GetName]과 [337.GetName]이 [ROOT.GetAdjective]령으로"
 iceland_events.13.desc: "[FROM.GetLeader]은(는) 우리의 정당한 보상 요구를 완전히 이해하고 지지했습니다. [FROM.GetName]은(는) [101.GetName]과 [337.GetName] 모두를 [ROOT.GetName]에 양도하기로 결정했습니다. 그들은 우리가 섬들을 방어하기에 더 나은 위치에 있으며, 더 강력한 [ROOT.GetName]을 만드는 것이 모두의 최선의 이익에 부합한다는 데 동의했습니다."
 iceland_events.13.a: "우리의 제국이 성장합니다."
 iceland_events.14.t: "[FROM.GetLeader]이(가) 거부합니다"
 iceland_events.14.desc: "불행히도 우리가 수년간 [FROM.GetName]에 제공한 모든 도움에 대한 정당하고 겸손한 보상 요구는 묵살되었습니다. [FROM.GetLeader]은(는) 그렇게 하는 것이 [FROM.GetName]의 최선의 이익에 부합함에도 불구하고 우리에게 아무것도 주기를 거부합니다."
 iceland_events.14.a: "우리의 것을 무력으로 되찾아야 할 것입니다."
 iceland_events.15.t: "[FROM.GetName]으로부터의 보상"
 iceland_events.15.desc: "다행히 [FROM.GetAdjective] 정부는 우리의 필요를 이해하고 영토 보상 요구를 승인했습니다. 물론 [ROOT.GetName]은(는) [FROM.GetName]에 보상하기 위해 소액의 돈을 지불해야 하지만, 현시점에서 이는 사소한 문제입니다."
 iceland_events.15.a: "오늘은 [ROOT.GetName]에 자랑스러운 날입니다."
 iceland_events.17.t: "[FROM.GetNameDefCap]이(가) 독립을 선언합니다"
 iceland_events.17.desc_kingdom: "[FROM.getAdjective] 의회는 크리스티안 10세와의 관계가 무효임을 선언했습니다. 그들은 더 이상 덴마크의 왕을 아이슬란드의 왕으로 간주하지 않습니다. 결과적으로 그들은 덴마크가 내정이든 외교든 [FROM.getName]의 정치에 더 이상 어떠한 영향력도 행사하지 못한다고 밝혔습니다."
 iceland_events.17.desc_generic: "[FROM.getAdjective] 의회는 [FROM.GetNameDef]이(가) 다른 어떤 국가와도 관계가 없는 완전한 독립 주권 국가임을 선언했습니다. 이는 그들이 공식적으로 우리와의 관계를 단절하고 일방적으로 독립을 선언했음을 의미합니다."
 iceland_events.17.a: "더 시급한 문제가 있습니다"
 iceland_events.17.b: "때가 되면 이 문제를 처리할 것입니다"
 iceland_events.18.t: "[FROM.GetNameDefCap], [ROOT.GetAdjective] 독립 승인"
 iceland_events.18.desc: "[FROM.GetNameDefCap]은(는) 가벼운 항의만 제기했습니다. 그들은 감히 [ROOT.GetAdjective] 국민을 더 자극하지 못했습니다. [ROOT.GetNameDefCap]은(는) 이제 [FROM.GetName]과의 관계보다 더 시급한 문제에 집중할 수 있습니다."
 iceland_events.18.a: "좋소"
 iceland_events.19.t: "[FROM.GetNameDefCap], [ROOT.GetAdjective] 독립 승인 거부""
 iceland_events.19.desc: "[FROM.GetNameDefCap]의 전쟁광들은 자신들에게 제시된 우리의 독립 조약을 비준하지 않기로 결정했습니다. 대신 그들은 [ROOT.GetName]이(가) [FROM.GetName]의 일부라고 주장하며, 무력을 사용하여 충성을 재확립하겠다고 위협하고 있습니다. 우리는 이제 다가올 폭풍에 대비해야 합니다."
 iceland_events.19.a: "해볼 테면 해보라지"

 iceland_events.20.t: "[ICE.GetName], 그린란드 반환 요구"
 iceland_events.20.desc: "[ICE.GetNameDef]의 [ICE.GetLeader]은(는) 옛 바이킹의 국경을 기반으로 한 새로운 북해 제국의 창설을 발표했습니다. 그린란드가 이 영토의 일부였기 때문에, 우리는 이제 그 섬을 그들에게 넘겨달라는 정중한 요청을 받고 있습니다."
 iceland_events.20.a: "싸울 가치도 없는 일이다..."
 iceland_events.20.b: "그들에게는 그것을 요구할 정당한 근거가 없다!"

 iceland_events.21.t: "그린란드가 돌아왔다!"
 iceland_events.21.desc: "[FROM.GetNameDef]의 나약한 지도자들은 우리와의 충돌을 원치 않는 듯, 그린란드의 통제권을 우리에게 넘겨주기로 결정했습니다. 이는 우리의 영광의 시대가 다시 한번 도래했음을 증명합니다!"
 iceland_events.21.a: "정말 좋은 소식이군"

 iceland_events.22.t: "[FROM.GetName], 저항을 굽히지 않다"
 iceland_events.22.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) 그린란드 문제에 대해 저항적인 태도를 고수하고 있습니다. 그들이 우리 칼날에 의한 파멸을 원하는 것 같으니, 원하는 대로 해주어야 할 것입니다."
 iceland_events.22.a: "놈들은 멸망할 것이다!"

 iceland_events.23.t: "[ICE.GetName], 스스로를 "북해 항로의 수호자"로 선포"
 iceland_events.23.desc: "[ICE.GetLeader]은(는) [ICE.GetNameDef]이(가) 북해의 수호자임을 공개적으로 선언했습니다. [ICE.GetNameDefCap]은(는) 이에 따라 북해 제도 주민들의 안전 보증인 역할을 수행할 것입니다.\n따라서 [ICE.GetLeader]에 따르면, [ROOT.GetNameDef]은(는) 우리의 북해 영유지에 대한 통제권을 [ICE.GetName]에 이양해야 합니다."
 iceland_events.23.a: "몇몇 불모의 섬 때문에 싸울 가치는 없다"
 iceland_events.23.b: "그런 일은 없을 것이다"

 iceland_events.24.t: "[FROM.GetNameDefCap], 우리의 요구에 굴복하다"
 iceland_events.24.desc: "[FROM.GetNameDef]의 나약한 지도자들은 우리와의 충돌을 원치 않는 듯, 그들의 북해 영유지에 대한 통제권을 우리에게 넘겨주기로 결정했습니다."
 iceland_events.24.a: "우리의 제국이 성장한다"

 iceland_events.25.t: "[FROM.GetName]의 저항"
 iceland_events.25.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) 우리에게 북해 영유권 인도를 거부했습니다. 그들은 우리의 요구를 조롱하며, 섬을 원한다면 무력으로 빼앗아야 할 것이라고 말했습니다."
 iceland_events.25.a: "그렇다면 무력으로 해결할 수밖에"

 iceland_events.45.t: "대통령 선거"
 iceland_events.45.desc: "[ROOT.GetName]이 군주제의 족쇄를 벗어던질 때가 왔습니다. 앞으로 나아갈 길은 국민에게 있으며, 국민이 선출한 대통령에게 있습니다."
 iceland_events.45.a: "$ICE_sveinn_bjornsson$은(는) 완벽한 지도자입니다"
 iceland_events.45.b: "$ICE_hermann_jonasson$은(는) 과거에 국가에 큰 공을 세웠습니다"
 iceland_events.45.c: "$ICE_olafur_thors$은(는) 우리를 미래로 이끌 수 있습니다"
 iceland_events.45.d: "$ICE_brynjolfur_bjarnason$이야말로 국민을 단결시킬 수 있는 인물입니다"
 iceland_events.45.e: "$ICE_gisli_sigurbjornsson$은(는) [ROOT.GetName]에 영광을 가져다줄 것입니다"

 iceland_events.26.t: "석유가 고갈되었습니다!"
 iceland_events.26.desc: "해상 정제소에서 [ICE.GetName] 주변에서 더 이상 석유를 찾을 수 없다고 보고했습니다. 유전이 고갈되었으며, 앞으로도 석유나 가스 매장지가 더 이상 발견되지 않을 것으로 예상되며, 계속 작업을 진행하는 것은 자원 낭비일 뿐입니다."
 iceland_events.26.a: "뭐, 어쩔 수 없는 일이지..."




 ###############
 ### FINLAND ###
 ###############

 AAT_finland_motti.01.t: "[FROM.GetAdjective]의 모티 전술"
 AAT_finland_motti.01.desc: "[FROM.GetAdjective]군이 [FROM.FROM.GetName] 지역에서 모티 전술을 시행하기 시작했습니다. 모티 전술은 [FROM.GetAdjective]군이 적군을 포위하고 보급선을 차단하여 공격에 취약하게 만드는 파괴적인 기술입니다. 이로 인해 침공군은 [FROM.GetAdjective]의 공세에 매우 취약해지므로, 핀란드로 진격하려면 그들이 우위를 점하지 못하도록 신속한 조치를 취해야 합니다."
 AAT_finland_motti.01.a: "경계를 늦추지 말고 전투를 준비하라!"
 AAT_finland_motti_tt: "\n§R이제부터 [FROM.GetNameDefCap]은(는) 다른 핵심 주에서 모티 전술을 준비할 수 있게 됩니다.§!"

 AAT_finland_national_defense.01.t: "[?FIN_state_with_weapon_caches.GetName]의 [FROM.FROM.GetAdjective] 무기 은닉처"
 AAT_finland_national_defense.01.desc: "첩보 기관의 보고에 따르면 [?FIN_state_with_weapon_caches.GetName]에 핀란드 무기 은닉처가 숨겨져 있다고 합니다. 해당 지역에서의 군사 작전이 상당한 방해를 받을 것으로 예상되며, 현지 저항군의 더욱 공격적인 전술을 경계해야 합니다. 이 작전의 성공 여부에 따라 다른 핀란드 주에서도 비슷한 상황이 발생할 수 있습니다."
 AAT_finland_national_defense.01.a: "헛된 조치로군."
 AAT_finland_national_defense.02.t: "[FROM.FROM.GetName]에서 [FIN.GetAdjective] 무기 은닉처 압수"
 AAT_finland_national_defense.02.desc: "[FROM.FROM.GetName]에 핀란드 무기 은닉처가 숨겨져 있다는 보고에 따라 우리 군이 해당 지역을 수색해왔습니다. 보고에 따르면 건물 아래, 쓰러진 나무 속, 기름칠한 자루에 싸여 호수에 가라앉은 은닉처들을 발견했다고 합니다. 발견한 것들은 모두 압수했으며, 더 이상은 없는 것으로 보입니다. 적어도 우리가 신경 쓸 만한 수량은 아닙니다."
 AAT_finland_national_defense.02.a: "훌륭한 소식이군."
 AAT_finland_national_defense.02.b: "좋다, 하지만 더 이상 은닉처 보고로 나를 귀찮게 하지 마라."
 AAT_finland_national_defense.03.t: "[FROM.GetName]이(가) [FROM.FROM.FROM.GetName]에서 우리 무기 은닉처를 압수"
 AAT_finland_national_defense.03.desc: "[FROM.FROM.GetName]의 적들로부터 무기 은닉처를 숨기려는 최선의 노력에도 불구하고, 적 요원들이 은닉처를 찾아내 압수했습니다. 아직 일부가 남아있을 수 있지만, 이 지역에서 의미 있는 차이를 만들어낼 만큼 많은 양은 아닙니다."
 AAT_finland_national_defense.03.a: "끔찍한 소식이군!"
 AAT_finland_national_defense.03.b: "우리에겐 더 중요한 일이 있다."
 FIN_weapon_caches_in_state_tt: "\n무기 은닉처는 생성 후 §Y4년§!이 지나면 제거됩니다. \n§Y$FIN_finnish_resistance_category$§! 결정 범주를 잠금 해제하여, 우리가 적극적으로 무기 은닉처를 수색하고 압수할 수 있게 합니다."
 FIN_weapon_caches_seized_event_spam_tt: "\n다른 핀란드 주에서 무기 은닉처를 압수하는 것에 대한 이벤트를 계속 받게 됩니다."
 FIN_weapon_caches_seized_event_no_spam_tt: "\n다른 핀란드 주에서 무기 은닉처를 압수하는 것에 대한 이벤트를 더 이상 받지 않습니다."
 FIN_weapon_caches_seized_by_enemy_event_spam_tt: "\n다른 주에서 적이 우리의 무기 은닉처를 압수하는 것에 대한 이벤트를 계속 받게 됩니다."
 FIN_weapon_caches_seized_by_enemy_event_no_spam_tt: "\n다른 주에서 적이 우리의 무기 은닉처를 압수하는 것에 대한 이벤트를 더 이상 받지 않습니다."

 AAT_finland_misc_events.01.t: "어린이 대피"
 AAT_finland_misc_events.01.desc: "[GetFinnishWinterWarOrNot]이(가) 계속됨에 따라, [ROOT.GetAdjective] 정부는 국가의 어린이들을 안전을 위해 [GetFinnishChildrenDestination](으)로 대피시키는 어려운 결정을 내렸습니다. 이 가슴 아픈 결정은 분쟁 중 민간인이 직면한 끊임없는 위험을 고려하여 내려졌습니다.\n\n대피 작전은 수많은 가족이 흩어지고 아이들이 집을 떠나야 하는 거대한 일이었습니다. 하지만 우리는 아이들의 안전이 가장 중요하며, 위험으로부터 아이들을 보호하기 위해 모든 힘을 다해야 한다는 것을 기억해야 합니다.\n\n[ROOT.GetAdjective] 국민이 전쟁의 혹독한 현실을 견디는 동안, 우리는 이 어려운 시기에 우리 아이들이 안전하게 보살핌을 받을 것이라는 희망과 믿음을 가져야 합니다. 앞으로의 길은 길고 험난할 수 있지만, 우리는 인내하고 역경에 맞서 굳건히 서야 합니다."
 FIN_winter_war_name: "[SOV.GetNameDef]과의 겨울 전쟁"
 FIN_normal_war: "전쟁"
 FIN_children_destination_sweden: "[SWE.GetNameDef]"
 FIN_children_destination_norway: "[NOR.GetNameDef]"
 FIN_children_destination_denmark: "[DEN.GetNameDef]"
 FIN_children_destination_iceland: "[ICE.GetNameDef]"
 FIN_children_destination_other: "군사 분쟁에 관여하지 않은 중립국"
 AAT_finland_misc_events.01.a: "우리 아이들을 구해야 한다!"

 AAT_finland_misc_events.02.t: "춤 금지령"
 AAT_finland_misc_events.02.desc: "전쟁이 계속되면서, 점점 더 많은 정치인과 지도자들이 최전선에서 싸우는 우리 병사들에게 존경과 연대를 표하기 위해 공개적인 춤을 금지해야 한다고 주장하고 있습니다.\n\n이들은 이 위기의 시기에 춤을 추는 것이 부적절하다고 생각합니다. 그들은 그러한 활동을 자제함으로써 우리 군을 지원하고 전쟁에 대한 우리의 헌신을 보여주는 것이 우리의 의무라고 말하며, 이를 어길 시 벌금이나 심지어 징역형에 처해야 한다고 주장합니다.\n\n하지만, 다른 많은 사람들은 이러한 제안에 혐오감을 표하며, 다른 나라에서는 사람들이 전쟁의 혹독한 상황을 견디는 데 도움이 되도록 춤을 장려하기까지 한다고 주장합니다."
 AAT_finland_misc_events.02.a: "이 어려운 시기에는 우리 모두 희생해야 합니다, 그것이 아무리 어리석어 보일지라도 말입니다."
 AAT_finland_misc_events.02.b: "이건 명백히 어리석은 짓입니다."

 AAT_finland_misc_events.03.t: "[?FIN_faction_leader_recieving_resource_rights.GetAdjective]의 개발 계획 지원"
 AAT_finland_misc_events.03.desc: "광물 채굴 기반 시설에 대한 지속적인 투자가 계속해서 산출량을 늘려주고 있지만, 강대국의 자원과 전문 지식을 동원한다면 더 많은 것을 얻을 수 있을 것이라는 생각이 듭니다. \n\n[?FIN_faction_leader_recieving_resource_rights.GetNameDef]에 연락하여, 우리의 채광 작업을 한 단계 더 발전시키기 위해 투자와 전문가를 지원해 준다면 획득한 자원의 일부를 제공하겠다고 제안해야 합니다. 이를 통해 우리 모두 이익을 얻을 수 있습니다."

 AAT_finland_misc_events.03.a: "예, 더 많은 투자를 위해 [?FIN_faction_leader_recieving_resource_rights.GetNameDef]에 연락해야 합니다."
 AAT_finland_misc_events.03.b: "아니오, 다른 국가에 얽매이고 싶지 않습니다."
 AAT_finland_misc_events.03_tt: "+1 추가"
 AAT_finland_misc_events.04.t: "지원에 대한 보답"
 AAT_finland_misc_events.04.desc: "[?FIN_faction_leader_recieving_resource_rights.GetNameDef]와의 지속적인 협상이 초반에는 순조롭게 진행되었으나, 이제 주요 쟁점, 즉 그들이 대가로 무엇을 얻을 것인가에 대해 교착 상태에 빠졌습니다. [?FIN_faction_leader_recieving_resource_rights.GetNameDef]는 우리나라 전역의 여러 기업에 눈독을 들이고 있으며, 우리는 그들에게 어떤 것을 줄지 제안하기만 하면 됩니다.\n\n오울루의 마콜라 광산 생산량 일부를 제공하거나, 페차모 광산의 니켈을 제공하거나, 투르쿠 조선소로 가는 원자재 일부를 돌리거나, 라피의 탐사권을 줄 수 있습니다."
 AAT_finland_misc_events.04.a: "[929.GetName]의 광산 채굴권을 할당합니다."
 AAT_finland_misc_events.04.b: "[722.GetName]의 니켈 채굴권을 제공합니다."
 AAT_finland_misc_events.04.c: "[926.GetName]의 원자재 권리를 이전합니다."
 AAT_finland_misc_events.04.d: "[148.GetName]의 탐사권을 부여합니다."
 AAT_finland_misc_events.05.t: "[FROM.GetName]이(가) 우리에게 자원 권리를 부여합니다"
 AAT_finland_misc_events.05.desc: "좋은 소식입니다! 여러 산업 기업이 공동으로 [FROM.GetAdjective] 채광 부문에 자금, 장비, 전문가를 투자했으며, 이 투자가 채굴권이라는 배당금으로 돌아오기 시작했습니다. 우리는 [?FROM.FIN_state_given_for_resource_rights.GetName]에서 발견된 생산량의 일부를 받게 되었습니다. \n\n이 새로운 자원을 최대한 빨리 유용하게 사용해야 합니다!"
 AAT_finland_misc_events.05.a: "좋습니다"
 AAT_finland_misc_events.06.t: "[ROOT.GetName]에 대한 [FROM.GetAdjective]의 군사 투자"
 AAT_finland_misc_events.06.desc: "[FROM.GetName]은(는) 북유럽 지역이 발전할수록 우리 국민이 더 번영하고, 공동 방위와 무역을 통해 우리 모두가 더 많은 혜택을 받는다는 것을 인지했습니다. 이 꿈을 이루기 위한 첫걸음은 외부 위협을 막기 위해 우리의 집단 방위 능력을 증강하는 것입니다. \n\n그 결과, [FROM.GetName]은(는) 우리의 군수품 생산을 증진시키기 위해 산업 장비와 전문가를 아낌없이 제공했습니다."
 AAT_finland_misc_events.06.a: "유용하게 사용하겠습니다!"
 AAT_finland_misc_events.07.t: "[FROM.GetAdjective]의 연구 개발 프로그램"
 AAT_finland_misc_events.07.desc: "어둠과 불확실성의 수렁에 점점 더 빠져드는 세상에서, [FROM.GetName]은(는) 그 대신 과학과 기술이라는 등대에 의지하여 길을 밝히려 합니다. 이 작은 국가는 최근 몇 년간 비약적인 발전을 이루었으며, 우리 또한 마찬가지입니다. 그들은 우리 모두의 발전을 위해 과학계를 통합하고 우리가 아는 것을 공유하자고 제안했습니다. 어둠을 헤쳐 나가는 다른 이들이 따를 운명의 빛으로서 우리가 빛나도록 합시다."
 AAT_finland_misc_events.07.a: "훌륭한 계획입니다!"

 AAT_finland_diplomacy.01.t: "[FROM.GetAdjective]의 통일 제안"
 AAT_finland_diplomacy.01.desc: "[FROM.GetNameDef]의 외교관들이 상호 보호와 번영을 목적으로 국가 통일이라는 아이디어를 제기하며 우리에게 접근해 왔습니다. 이는 우리의 정부, 군대, 산업을 하나로 통합하여 우리의 안보를 위협할 수 있는 세력에 맞서 더 강력하고 단합된 전선을 구축하는 것을 의미합니다. \n\n국제 정세가 불안정한 이 시기에 힘을 합치는 것에는 분명 장점이 있을 수 있지만, 선택은 궁극적으로 우리의 몫입니다."
 AAT_finland_diplomacy.01.a: "좋은 생각인 것 같습니다!"
 AAT_finland_diplomacy.01.b: "우리의 자치권을 유지하면서 협력할 수 있습니다."
 #I couldn't get option b to appear in testing
 AAT_finland_diplomacy.01.c: "관심 없습니다."
 AAT_finland_diplomacy.02.t: "[FROM.GetAdjective]-[ROOT.GetAdjective] 연합"
  AAT_finland_diplomacy.02.desc: "우리 외교관들이 [FROM.capital.GetCapitalVictoryPointName]에서의 임무를 성공적으로 마치고 귀환했습니다. [FROM.GetName] 측은 공동의 적에 맞서기 위해 더욱 단결된 전선을 구축할 필요성을 인정했으며, 이에 따라 우리의 연합 제안을 수락했다는 소식입니다. \n\n정부 관리들은 이미 이 새로운 영토의 원활한 통합을 준비하기 위해 우리 수도로 향하고 있습니다."
 AAT_finland_diplomacy.02.a: "함께라면 더 강합니다!"
 AAT_finland_diplomacy.03.t: "[FROM.GetName], [ROOT.GetFactionName]에 가입"
 AAT_finland_diplomacy.03.desc: "우리 외교관들이 [FROM.GetName]에서의 임무를 마치고 귀환했습니다. 더욱 단결된 전선을 구축할 필요성은 인정되었으나, 그들은 이를 위해 모든 주권을 포기할 의사는 없었습니다. 처음에는 논의가 순조로웠지만, [FROM.GetName]의 역사적인 독립 투쟁을 고려하면, [GetDiplomacyDescriptionNiceNotNice] \n\n연합 대신, 그들은 독립 국가로서 우리 세력에 가입하기로 결정했습니다. "

  FIN_not_nice_desc: "그들이 자신들의 실수로부터 교훈을 얻지 못했다는 것이 분명합니다."
  FIN_nice_desc: "그들의 주저함은 이해할 만합니다."

 AAT_finland_diplomacy.03.a: "이만하면 충분합니다..."
 AAT_finland_diplomacy.04.t: "[FROM.GetName], 우리 제안을 거부하다"
 AAT_finland_diplomacy.04.desc: "우리 외교관들이 [FROM.GetName]에서 임무를 마치고 귀환했으나, [FROM.GetAdjective] 정부가 단결의 당위성을 이해하도록 설득하는 데 실패한 것 같습니다. 그들은 결정에 대한 별다른 이유를 제시하지 않았으며, 우리 관리들은 이것이 어떤 파장을 불러일으킬지 고심하고 있습니다. \n\n만약 그들의 의도가 사악해진다면 우리 자신의 방어 태세를 갖추기 시작해야 할지도 모릅니다. 혹은 그들의... 협력을 확보하기 위한 다른 수단을 찾아야 할 수도 있습니다."
 AAT_finland_diplomacy.04.a: "그들의 결정을 존중할 것입니다."
 AAT_finland_diplomacy.04.b: "그들은 자신들의 운명을 선택했습니다."

 AAT_finland_diplomacy.05.t: "[FROM.GetAdjective]의 사프미 보존 청원"
 AAT_finland_diplomacy.05.desc: "[FROM.GetName]이(가) 북유럽의 토착 공동체인 사미인의 자유와 문화를 보존하는 임무를 자처한 것 같습니다. \n\n[FROM.GetNameDefCap]은(는) 사미인이 전통적으로 차지해온 영토를 자신들에게 양도하여, 이들을 단일 민족으로서 더 잘 보호할 수 있도록 해달라고 우리에게 청원하고 있습니다."
 AAT_finland_diplomacy.05.a: "숭고한 대의를 위한 희생입니다!"
 AAT_finland_diplomacy.05.b: "[FROM.GetAdjective] 지도부가 제정신이 아니군."
 AAT_finland_diplomacy.06.t: "[FROM.GetAdjective]의 사미 영토 할양"
 AAT_finland_diplomacy.06.desc: "훌륭한 소식입니다! [FROM.GetNameDefCap]이(가) 사미인의 역사적인 고향을 우리에게 맡기기로 동의했습니다. 이제 이 땅의 사람들을 보호하고 양육하는 것은 우리의 책임이 될 것입니다. 우리는 이미 사미인 지도자들로부터 축하 서신을 받았으며, 그들은 우리가 그들의 문화와 관습을 계속 존중해주기를 바란다는 희망을 재차 강조했습니다."
 AAT_finland_diplomacy.06.a: "국민들이 [FROM.GetLeader]의 결정을 칭송합니다"

 AAT_finland_diplomacy.07.t: "[FROM.GetName], 우리의 청원을 거부하다"
 AAT_finland_diplomacy.07.desc: "[From.GetNameDef]의 제국주의자들이 사미인의 땅을 통일하려는 우리의 계몽적인 청원을 거부했습니다. 그들의 공식적인 답변에서 현지 인구의 문화와 존엄성을 지키려는 우리의 의도에 대한 우려를 언급했지만, 우리는 이 거절의 진정한 동기가 지도상에서 자국을 더 크게 보이게 하려는 것임을 알고 있습니다."
 AAT_finland_diplomacy.07.a: "우리가 할 수 있는 일은 아무것도 없습니다."
 AAT_finland_diplomacy.07.b: "우리는 사미인들을 돌봐야 합니다!"
 
 AAT_finland_diplomacy.08.t: "[FROM.GetAdjective]의 철광석 유통 통제 압력"
 AAT_finland_diplomacy.08.desc: "[FROM.GetNameDefCap]이(가) 우리의 철광석 생산에 관해 우리를 압박하고 있습니다. 그들은 고조되는 세계적 긴장을 우려하고 있으며, 스스로를 북유럽에서 가장 유능한 군사 국가로 여기고 있습니다. 따라서 그들은 자원이 풍부한 북부 주들을 보호하고, 그곳의 자원을 전쟁 노력에 가장 잘 활용할 수 있도록 해당 지역의 통제권을 요청했습니다."
 AAT_finland_diplomacy.08.a: "저들의 요구에 저항할 수단이 없습니다."
 AAT_finland_diplomacy.08.b: "해당 영토에 대한 [ROOT.GetAdjective] 주권을 수호할 것입니다."
 
 AAT_finland_diplomacy.09.t: "[FROM.GetName]이(가) 요구 영토를 할양하다"
 AAT_finland_diplomacy.09.desc: "[From.GetName]이(가) 현명하게도 자원이 풍부한 주에 대한 직접 통제권을 우리에게 부여하기로 결정했다는 반가운 소식입니다. 우리 군은 해당 지역에 주둔하기 위해 개입할 준비를 하고 있으며, 산업 지도자들은 해당 지역에서 공급되는 원자재를 우리 생산 체계에 가장 잘 통합할 방법에 대한 계획 초안을 작성하기 시작했습니다."
 AAT_finland_diplomacy.09.a: "[FROM.GetAdjective] 지도부는 자국민을 위해 최선의 선택을 했습니다."
 
 AAT_finland_diplomacy.10.t: "[FROM.GetName]이(가) 우리의 요구를 거부하다"
 AAT_finland_diplomacy.10.desc: "안타깝게도, [FROM.GetAdjective] 지도자 [FROM.GetLeader]은(는) 너무 근시안적이어서, 스칸디나비아의 부를 차지하려는 주변의 위협에 무관심한 것 같습니다. 우리는 [FROM.GetLeader.GetHerHis] 정부로부터 우리 군대가 국경을 넘지 말아야 하며, 이 문제에 대한 지속적인 압박을 경고한다는 명백한 회신을 받았습니다. \n\n물론 우리의 목표는 변함이 없으며, 그들이 무엇을 주장하든, 우리는 우리 자신과 이 지역 모두의 안보를 보장하기 위해 현지의 원자재가 여전히 필요합니다."
 AAT_finland_diplomacy.10.a: "그들은 너무 편협해서 자신들의 중대한 실수를 보지 못하고 있습니다."
 AAT_finland_diplomacy.10.b: "강제로 통제권을 장악해야 할 것입니다. 병력을 동원하십시오!"
 
 AAT_finland_diplomacy.11.t: "콜라 및 카렐리야 통합에 대한 [FROM.GetAdjective]의 제안"
 AAT_finland_diplomacy.11.desc: "[FIN.GetAdjective] 국가는 신생국이며, 그 국민은 흩어져 여러 다른 국가의 국경 내에 살고 있습니다. 더 많은 핀족을 통합하기 위한 노력의 일환으로, 그들은 이제 동카렐리야와 콜라 반도를 [FIN.GetAdjective] 국가에 통합해 달라는 요청으로 우리에게 접근해 왔습니다."
 AAT_finland_diplomacy.11.a: "이 숭고한 대의를 위해 [ROOT.GetAdjective] 영토를 할양하겠습니다."
 AAT_finland_diplomacy.11.b: "[ROOT.GetAdjective] 영토는 [ROOT.GetAdjective]의 것으로 남을 것입니다!"
 AAT_finland_diplomacy.12.t: "[FROM.GetName]이(가) 우리의 영토 요구를 수락하다"
 AAT_finland_diplomacy.12.desc: "위대한 [FROM.GetLeader]이(가) 동카렐리야인과의 통일 제안에 동의하여, 해당 지역의 영토를 우리에게 넘겨주었습니다. 위대한 [FROM.GetAdjective] 국민은 핀족의 좋은 친구입니다!"
 AAT_finland_diplomacy.12.a: "[FROM.GetLeader]은(는) 콜라와 카렐리야 주민들을 위해 최선의 선택을 했습니다."
 AAT_finland_diplomacy.13.t: "[FROM.GetLeader]이(가) 우리의 요구를 거부하다"
 AAT_finland_diplomacy.13.desc: "[FROM.GetLeader]은(는) 동카렐리야 영토를 우리에게 넘겨주지 않을 것이라고 발표했으며, 영토 요구는 그들에게 아무런 대가도 주지 않고 해당 지역에 사는 [FROM.GetAdjective] 국민에게 파괴만을 가져올 것이라고 주장합니다."
 AAT_finland_diplomacy.13.a: "지금 이 순간에 [FROM.GetLeader]을(를) 적대할 수는 없습니다..."
 AAT_finland_diplomacy.13.b: "이 어릿광대는 대가를 치르게 될 것입니다!"
 AAT_finland_diplomacy.14.t: "[ROOT.GetName] 통합에 대한 [FROM.GetAdjective]의 요구"
 AAT_finland_diplomacy.14.desc: "우리의 종주국 [FIN.GetNameDef]이(가) 자국에 완전히 통합될 것을 요구했습니다. 그들은 발트 영토를 자신들의 영토라고 주장하며, 우리의 지역주의가 궁극적으로 그들 영역의 불안정화를 초래할 것이라고 주장합니다."
 AAT_finland_diplomacy.14.a: "그들이 그렇게 말한다면..."
 AAT_finland_diplomacy.14.b: "대체 자신들을 뭐라고 생각하는 겁니까?"
 AAT_finland_diplomacy.15.t: "[FROM.GetName]이(가) [ROOT.GetNameDef]의 일부가 되다"
 AAT_finland_diplomacy.15.desc: "[FROM.GetAdjective] 정부는 우리 국가로 통합하자는 제안에 동의했으며, 독립 국가가 아닌 자치 지역으로 기능하도록 법률을 개정하기 시작했습니다."
 AAT_finland_diplomacy.15.a: "현명한 선택"
 AAT_finland_diplomacy.16.t: "[FROM.GetAdjective] 지도부가 우리의 요구를 거부했습니다"
 AAT_finland_diplomacy.16.desc: "[FROM.GetAdjective] 정부는 우리의 새로운 제안이 양국 간에 이전에 체결된 협정을 침해하며, 우리의 새로운 통일 구상이 불법적이고 부당하다고 주장하며 국제법을 언급했습니다."
 AAT_finland_diplomacy.16.a: "그들의 결정을 존중할 것입니다"
 AAT_finland_diplomacy.16.b: "그들은 스스로 명예를 더럽혔습니다!"
 AAT_finland_diplomacy_nordic: "북유럽"
 AAT_finland_diplomacy_baltic: "발트"
 AAT_finland_diplomacy.17.t: "[FROM.GetAdjective]의 [GetBalticOrNordic] 영토 요구"
 AAT_finland_diplomacy.17.desc: "[FIN.GetNameDefCap]는 대 [FIN.GetAdjective] 인민 연방의 일원으로서 [GetBalticOrNordic] 지역을 점유하고 보호하려는 새로운 의제의 일환으로, 우리가 전통적인 [GetBalticOrNordic] 국가 내에 보유한 모든 영토를 자신들에게 넘길 것을 요구했습니다."
 AAT_finland_diplomacy.17.a: "기꺼이 응하겠습니다"
 AAT_finland_diplomacy.17.b: "저들은 너무 오만해졌습니다"
 AAT_finland_diplomacy.18.t: "[FROM.GetName]이(가) [GetBalticOrNordic] 영토를 이양했습니다"
 AAT_finland_diplomacy.18.desc: "[FROM.GetLeader]은(는) 우리의 주장에 이의를 제기하는 수고가 시간 낭비라고 판단하여, 현명하게도 그들의 [GetBalticOrNordic] 영토를 우리에게 넘겨주기로 합의했습니다."
 AAT_finland_diplomacy.18.a: "그들은 올바른 선택을 했습니다"
 AAT_finland_diplomacy.19.t: "[FROM.GetAdjective] 정부가 우리의 요구를 거부했습니다"
 AAT_finland_diplomacy.19.desc: "[FROM.GetLeader]은(는) 우리가 다른 누구보다 그 지역에 대한 더 강력한 권리를 갖고 있지 않다는 것이 명백하다고 말하며, 그들의 [GetBalticOrNordic] 영토를 우리에게 이양하기를 거부했습니다. 이 불명예스러운 결정에 어떻게 대응해야 하겠습니까."
 AAT_finland_diplomacy.19.a: "어쩔 수 없는 일입니다"
 AAT_finland_diplomacy.19.b: "우리가 간다는 것을 저들에게 똑똑히 알려주십시오"
 AAT_finland_diplomacy.20.t: "[FROM.GetAdjective]의 핀란드-[ROOT.GetAdjective] 협정 제안"
 AAT_finland_diplomacy.20.desc: "[FIN.GetLeader]은(는) 우리에게 양국 간의 불가침 및 영구 평화 협정을 체결할 것을 요청했습니다. 이 제안은 이웃 국가와 화해하고 우리 국가에 다시 접근하려는 [FIN.GetAdjective] 정부의 새로운 방향의 일환으로 제시되었습니다."
 AAT_finland_diplomacy.20.a: "이로 인해 해가 될 것은 없습니다"
 AAT_finland_diplomacy.20.b: "저들은 우리가 그들을 위해 무엇을 계획했는지 모릅니다"
 AAT_finland_diplomacy.21.t: "[FROM.GetName]이(가) 핀란드-[FROM.GetAdjective] 협정 체결에 동의했습니다"
 AAT_finland_diplomacy.21.desc: "[FROM.GetNameDef]의 위대한 [FROM.GetLeader]은(는) 앞으로 다가올 세월 동안 양국 간의 영구적이고 오랜 평화를 위해 노력할 것을 맹세했습니다. 그들은 진정으로 [FIN.GetAdjective] 국민의 위대한 친구입니다."
 AAT_finland_diplomacy.21.a: "더 밝은 미래가 우리를 기다립니다"
 AAT_finland_diplomacy.22.t: "[FROM.GetLeader]이(가) 핀란드-[FROM.GetAdjective] 협정 제안을 거부했습니다"
 AAT_finland_diplomacy.22.desc: "신뢰할 수 없는 [FROM.GetLeader]은(는) 양국 간의 평화를 보장할 수 없다고 밝혔습니다. 이는 분명히 우리 국가에 대한 어떤 종류의 공격을 계획하고 있다는 뜻이니, 우리는 가능한 한 철저히 대비해야 합니다."
 AAT_finland_diplomacy.22.a: "감히 그럴 수가!"
 AAT_finland_diplomacy.23.t: "[FROM.GetNameDefCap]이(가) [SOV.GetNameDef]에 대한 보호를 요청했습니다"
 AAT_finland_diplomacy.23.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]은(는) [SOV.GetNameDef]의 모든 가능한 침략에 대한 방어에 도움을 줄 것을 우리에게 요청했습니다. 그들은 곧 공격받을 수 있다는 것을 알고 있으며, 만약 그런 날이 온다면 우리가 그들의 유일한 생존 희망이라고 말합니다."
 AAT_finland_diplomacy.23.a: "우리의 비호 아래 둘 것입니다"
 AAT_finland_diplomacy.23.b: "우리가 왜 그래야 하지?"
 AAT_finland_diplomacy.24.t: "[FROM.GetAdjective] 정부, [ROOT.GetNameDef] 보호를 맹세하다"
 AAT_finland_diplomacy.24.desc: "[FROM.GetAdjective] 정부가 우리의 요청에 동의했으며, [SOV.GetAdjective] 측의 어떠한 침략 행위에도 우리를 보호하겠다고 맹세했습니다. 마침내 안도의 한숨을 내쉴 수 있게 되었습니다."
 AAT_finland_diplomacy.24.a: "우리의 구원자들"
 AAT_finland_diplomacy.25.t: "[FROM.GetNameDef], 우리의 보호 요청을 거부하다"
 AAT_finland_diplomacy.25.desc: "[FROM.GetAdjective] 정부가 [SOV.GetAdjective]로부터의 보호 요청을 거부했습니다. 우리가 두려워하던 시나리오가 현실이 되었으니, 최대한 용감하게 방어할 수 있도록 방비를 갖춰야 합니다."
 AAT_finland_diplomacy.25.a: "우리는 운명에게 버림받았다!"
 AAT_finland_diplomacy.26.t: "[FROM.GetName], [ROOT.GetAdjective]의 보호를 구하다"
 AAT_finland_diplomacy.26.desc: "[FIN.GetNameDef]의 [FIN.GetLeader]가 [SOV.GetNameDef]로부터의 보호를 요청하고 있습니다. 러시아 내전 이후 처음으로, [SOV.GetNameDef]가 다시 한번 이웃 국가들을 노리기 시작했습니다. 이 위협으로부터 보호받는 대가로, 그들은 다양한 [FIN.GetAdjective] 천연자원에 대한 권리를 우리에게 제공하겠다고 제안합니다."
 AAT_finland_diplomacy.26.a: "그들을 도울 것이다!"
 AAT_finland_diplomacy.26.b: "우리 문제가 아니다."
 AAT_finland_diplomacy.27.t: "[FROM.GetNameDefCap]이 우리를 보호할 것이다"
 AAT_finland_diplomacy.27.desc: "[GER.GetNameDefCap]이 자원을 보호와 교환하자는 우리의 제안을 수락했으며, 전쟁이 우리를 덮칠 경우 돕겠다고 약속했습니다. 이제 우리 국민의 미래는 훨씬 더 안전해졌으므로, 마침내 안도의 한숨을 내쉴 수 있게 되었습니다."
 AAT_finland_diplomacy.27.a: "우리는 함께 맞설 것이다!"
 AAT_finland_diplomacy.28.t: "[ROOT.GetName], [FROM.GetAdjective]의 보호에 기댈 수 없다"
 AAT_finland_diplomacy.28.desc: "[GER.GetNameDef]의 배신자 [GER.GetLeader]가 자원을 보호와 교환하자는 우리의 제안을 거부했고, 변덕으로 우리의 미래를 파멸시켰습니다. 그들의 이기적이고 독선적인 본성이 미래에 어떤 결과를 가져올지 지켜볼 것입니다."
 AAT_finland_diplomacy.28.a: "그렇다면, 이제 우리뿐이다!"

 AAT_finland_winter_war.02.t: "[ROOT.GetAdjective]의 평화 요구"
 AAT_finland_winter_war.02.desc: "전선에서 기쁜 소식을 전합니다! 우리 군이 최근 [195.GetName] 공성전에서 승리하여 도시를 확보했습니다. [SOV.GetNameDef]에 결정적인 타격을 입힘으로써, 우리는 평화 협상을 시작하기에 유리한 위치에 서게 되었습니다. \n\n[SOV.GetAdjective] 침공의 명시된 목표 중 하나는 [195.GetName] 주변의 완충 지대를 늘리는 것이었지만, 이제 그들은 이 목표에 실패했을 뿐만 아니라 도시 자체를 잃었습니다. 따라서 그들이 이 분쟁에서 벗어나고 싶어 할 것이라고 생각합니다. \n\n이제 언제 협상을 시작할지는 우리의 결정에 달려 있습니다. 전투를 계속하여 더 많은 것을 얻을 수도 있고, 가능한 한 빨리 백지 평화를 목표로 할 수도 있습니다."
 AAT_finland_winter_war.02.a: "평화를 논할 때가 된 것 같군..."

 AAT_finland_winter_war.03.t: "[FROM.GetAdjective]의 평화 요구"
 AAT_finland_winter_war.03.desc: "[FROM.GetNameDef]의 적들로부터 소식을 받았습니다. 그들은 백지 평화 조건을 제안했습니다. 이에 따라 우리 군은 즉시 모든 공세적 조치를 중단하고 국경 너머로 철수해야 합니다. 영토 문제에 관해서는, [FROM.GetNameDef]는 양측 모두 아무런 이득 없이 국경을 전쟁 이전 상태로 되돌리는 것에 만족하는 것 같습니다. \n\n최근의 손실을 고려할 때, 우리 국민이 전투를 계속하는 것을 얼마나 지지할지 확신할 수 없습니다. 단기적으로는 다가올 승리를 납득시킬 수 있겠지만, 상황이 계속 악화된다면 우리 통치에 대한 불만이 커질 수 있습니다."
 AAT_finland_winter_war.03.a: "패배를 인정하는 것 외에는 다른 선택지가 없다..."
 AAT_finland_winter_war.03.b: "전세를 뒤집을 것이다!"

 AAT_finland_winter_war.04.t: "[FROM.GetNameDefCap], 우리의 평화 요구를 수락하다"
 AAT_finland_winter_war.04.desc: "그들이 평화 협정을 수락했습니다! 우리의 승리 소식이 퍼지자 거리에서는 자발적인 축하 행사가 벌어졌습니다. [FROM.GetAdjective] 군대는 이미 우리 영토에서 철수하기 시작했으며, 비참하게 고향으로 돌아가고 있습니다. \n\n오늘은 분명 우리 국가의 자랑스러운 날로 기록될 것이지만, 아직 풀숲에는 많은 뱀들이 있으니 안주해서는 안 됩니다."
 AAT_finland_winter_war.04.a: "다시는 우리를 시험하지 않는 게 좋을 것이다."

 AAT_finland_winter_war.05.t: "[FROM.GetNameDefCap], 우리의 평화 요구를 거부하다"
 AAT_finland_winter_war.05.desc: "[FROM.GetNameDef]의 어리석은 자들이 우리의 관대한 평화 제안을 거부했습니다. 그들의 망상적인 주장에 따르면, 최근 자국군이 입은 손실은 곧 극복할 수 있는 단기적인 불운에 불과하다고 합니다. 우리는 이것이 국민의 분노로부터 정부를 보호하기 위한 완전한 날조임을 알고 있지만, 곧 진실이 밝혀질 것입니다.  \n\n우리 병사들은 여전히 전장에 남아 있으며, 정의로운 투쟁을 계속하고 있다는 확신 속에서 높은 사기를 유지한 채 다가올 전투에 대비하고 있습니다."
 AAT_finland_winter_war.05.a: "어리석은 자들은 대가를 치르게 될 것이다!"

 AAT_finland_winter_war.06.t: "[FROM.GetAdjective]의 평화를 위한 영토 요구"
 AAT_finland_winter_war.06.desc: "방금 [FROM.GetAdjective] 경쟁국으로부터 항복 요구를 받았습니다. 평화 조약의 일부로, 그들은 카렐리야-콜라 지역의 여러 영토를 우리에게 넘겨줄 것을 요구하며, 가능한 한 빨리 이 땅에서 철수하라고 주장하고 있습니다."
 AAT_finland_winter_war.06.a: "패배를 인정하는 것 외에는 다른 선택지가 없습니다..."
 AAT_finland_winter_war.06.b: "감히 어떻게 이럴 수가!?"

 AAT_finland_winter_war.07.desc: "그들이 평화 협정을 수락했습니다! 우리의 승리 소식이 퍼지면서 거리에서는 자발적인 축하 행사가 벌어지고 있습니다. [FROM.GetAdjective] 군대는 이미 우리 영토에서 철수하기 시작했으며, 비참하게 고향으로 돌아가고 있습니다. \n\n오늘은 분명 우리 국가의 자랑스러운 날로 기록될 것입니다. 우리는 침략자들을 물리쳤을 뿐만 아니라, 그들을 철저히 격파하여 그들의 희생으로 우리 영토를 확장할 수 있었기 때문입니다!"
 AAT_finland_winter_war.07.a: "마침내 그들이 교훈을 얻었기를 바랍니다."

 AAT_finland_winter_war.08.desc: "[FROM.GetNameDef]의 어리석은 자들이 우리의 관대한 평화 제안을 거부했습니다. 점점 더 절박해지는 그들의 정부는 여전히 이길 수 있다는 망상에 사로잡혀 있습니다. 만약 전쟁의 실상이 알려지면 대규모 봉기와 심지어 국내 혁명에 직면해야 한다는 것을 알기 때문입니다. \n\n우리 병사들은 여전히 전장에 남아 있으며, 정의로운 투쟁을 계속하고 있다는 확신 속에서 높은 사기를 유지한 채 승리가 가까웠다고 믿으며 다가올 전투에 대비하고 있습니다."
 AAT_finland_winter_war.08.a: "어리석은 자들은 대가를 치르게 될 것이다!"

 FIN_winter_war_push_back_tt: "\n[SOV.GetAdjective]군을 밀어내고 §Y[195.GetName]§!을(를) 점령하면 평화 협상을 요구할 수 있습니다. \n또한 §Y[213.GetName]§!, §Y[215.GetName]§! 또는 §Y[216.GetName]§!을(를) 통제하면 [SOV.GetNameDef](으)로부터 해당 주를 영토 할양으로 요구할 수 있습니다."

 AAT_finland_continuation_war.01.t: "[FROM.GetAdjective]의 계속전쟁 제안"
 AAT_finland_continuation_war.01.desc: "[FROM.GetName]의 지배층이 동쪽의 [SOV.GetAdjective] 위협에 맞선 군사 협력 가능성에 대해 우리에게 접촉해 왔습니다. 그들의 제안은 우리가 서로의 국경을 보호하고 [SOV.GetAdjective] 영토에 대한 모든 공격적 침공에 협력하는 조건으로 [FROM.GetName] 내에 군사 자산을 주둔시키는 것을 허용할 것입니다."
 AAT_finland_continuation_war.01.a: "물론입니다, 이 협정에 대한 기록이 남지 않도록만 하십시오!"
 AAT_finland_continuation_war.01.b: "[FROM.GetAdjective]의 사소한 일은 우리 관심사가 아닙니다."
 AAT_finland_continuation_war.02.t: "핀란드-[FROM.GetAdjective] 계속전쟁 협정"
 AAT_finland_continuation_war.02.desc: "[FROM.GetLeader]이(가) [SOV.GetNameDef]에 대항하는 우리의 군사 협력 제안을 승인했습니다. 우리 군 장교들은 이제 연합군 조정을 시작하기 위해 [FROM.Capital.GetCapitalVictoryPointName](으)로 초청받고 있습니다."
 AAT_finland_continuation_war.02.a: "이 협정에 대한 기록이 남지 않도록 하십시오!"
 AAT_finland_continuation_war.03.t: "[FROM.GetName], 우리의 제안을 거부하다"
 AAT_finland_continuation_war.03.desc: "[FROM.GetLeader]이(가) 어리석게도 우리의 군사 협력 제안을 거부했습니다. 아마도 [FROM.GetAdjective]은(는) 현재 [SOV.GetAdjective]과(와) 맺고 있는 취약한 협정을 위태롭게 하고 싶지 않거나, 우리에 대한 다른 계획이 있음을 시사하는 것일 수도 있습니다. 어느 쪽이든, 우리는 신중하게 행동하고 다른 곳에서 잠재적 지원을 찾아야 합니다."
 AAT_finland_continuation_war.03.a: "참으로 아까운 기회입니다..."
 AAT_finland_continuation_war.04.t: "계속전쟁 협정 파기"
 AAT_finland_continuation_war.04.desc: "최근 지정학적 변화로 인해 [SOV.GetNameDef]에 대항하여 [FROM.GetNameDef]과(와) 협력하려던 우리의 계획은 산산조각이 났습니다. 우리는 합동 작전 계획을 수립하는 데 많은 노력을 기울였지만, 이제 군사적으로나 외교 정책적으로나 원점에서 다시 시작해야 합니다."
 AAT_finland_continuation_war.04.a: "우리는 이겨낼 것입니다."
 AAT_finland_continuation_war.05.t: "[FROM.GetAdjective] 계속 전쟁"
 AAT_finland_continuation_war.05.desc: "[FROM.GetNameDef]이(가) 마침내 [SOV.GetNameDef] 침공 작전인 바르바로사 작전을 개시함에 따라, 우리의 신중한 외교적 책략과 군사 계획의 결실이 눈앞에 다가왔습니다. 이제 우리는 약속을 이행하고 우리에게 할당된 계획을 실행해야 합니다."
 AAT_finland_continuation_war.05.a: "우리의 전우들과 함께하자!"
 AAT_finland_continuation_war.06.desc: "[FROM.GetAdjective] 군은 우리의 협력 협정에 따라 [SOV.GetAdjective] 진지를 향한 계획된 공격을 개시했습니다. 우리의 [FROM.GetAdjective] 전우들의 도움으로, 우리는 소련 전선을 더욱 길게 늘려 그들을 붕괴 직전까지 몰아붙이는 데 성공했습니다."
 AAT_finland_continuation_war.06.a: "승리가 눈앞에 있다!"
 AAT_finland_continuation_war.07.desc: "[GER.GetNameDef]과(와) [FIN.GetNameDef]이(가) 서로 협력하지 못하도록 최선을 다해 외교적으로 설득하려 했지만, 우리의 노력은 수포로 돌아간 것 같습니다. [FIN.GetAdjective] 군은 [GER.GetAdjective] 측과 함께 우리를 공격해왔는데, 그 정밀함으로 보아 상당한 기간 동안 이 작전을 조율해 온 것이 틀림없습니다."
 AAT_finland_continuation_war.07.a: "우리가 두려워했던 대로군..."
 FIN_pact_for_continuation_war_ger_tt: "[ROOT.GetFlag]§Y[ROOT.GetNameDef]§!이(가) [SOV.GetFlag]§Y[SOV.GetNameDef]§!에 전쟁을 선포할 경우의 효과:\n[FROM.GetFlag]§Y[FROM.GetNameDefCap]§!이(가) [SOV.GetFlag]§Y[SOV.GetNameDef]§!에 대한 전쟁에 참전할 것입니다."
 FIN_pact_for_continuation_war_fin_tt: "[FROM.GetFlag]§Y[FROM.GetNameDef]§!이(가) [SOV.GetFlag]§Y[SOV.GetNameDef]§!에 전쟁을 선포할 경우의 효과:\n[ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!이(가) [SOV.GetFlag]§Y[SOV.GetNameDef]§!에 대한 전쟁에 참전할 것입니다."
 FIN_pact_for_continuation_war_broken_tt: "조약이 파기되어, 양국은 더 이상 [SOV.GetFlag]§Y[SOV.GetNameDef]§!에 대한 전쟁 발생 시 서로를 도울 의무가 없습니다."
 FIN_the_lone_wolf_no_faction_tt: "[FIN.GetFlag]§Y[FIN.GetNameDefCap]§!은(는) 국민 정신 '§Y$FIN_the_lone_wolf$§!'을(를) 보유하고 있는 동안 어떠한 세력에도 가입할 수 §R없습니다§!."

 AAT_finland_continuation_war.08.t: "[FROM.GetName], 휴전을 제의하다"
 AAT_finland_continuation_war.08.desc: "[FROM.GetNameDef] 정부가 우리에게 접근하여 휴전 협정 체결을 요청했으며, 추가적인 영토 할양과 [GER.GetNameDef]과의 모든 관계 단절을 약속했습니다. 이를 수락하면, 우리는 [GER.GetAdjective] 측에 온전히 집중하여 그들을 원래 왔던 곳으로 밀어낼 수 있을 것입니다."
 AAT_finland_continuation_war.08.a: "모스크바 휴전 협정에 서명하자"
 AAT_finland_continuation_war.08.b: "이번에는 놈들을 쉽게 보내주지 않겠다!"

 AAT_finland_continuation_war.09.t: "[FROM.GetNameDef], 우리의 평화 제안을 거부하다"
 AAT_finland_continuation_war.09.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 우리의 요청을 거부했으며, [FROM.GetAdjective] 군이 이번에는 우리를 쉽게 보내주지 않을 것이므로 파멸을 각오해야 한다고 말했습니다. 이것은 최악의 시나리오입니다!"
 AAT_finland_continuation_war.09.a: "운명이 우리를 버렸구나!"

 aat_news.120.t: "모스크바 휴전 협정 체결"
 aat_news.120.desc: "오랜 협상 끝에, [FIN.GetLeader]과(와) [SOV.GetLeader]을(를) 대표하는 장교들과 관리들이 즉시 발효되는 휴전 협정에 서명하기로 합의했습니다. 하지만 이 휴전 협정은 [FIN.GetNameDef]에게 큰 대가를 치르게 했으며, [FIN.GetName]의 동맹국들은 분명 배신감 외에는 아무것도 느끼지 못할 것입니다."
 aat_news.120.a: "어쩔 수 없는 일이었다..."
 aat_news.120.b: "전우애를 보여주지 않아 고맙군!"
 aat_news.120.c: "우리는 전진한다!"
 aat_news.120.d: "확실히 흥미로운 전개로군..."

 AAT_finland_continuation_war.10.t: "소련, 우리에게 [GER.GetAdjective] 군대 축출을 강요하다"
 AAT_finland_continuation_war.10.desc: "소련 대표단이 우리가 휴전 협정을 준수하지 않고 있음을 포착했습니다. 협정에는 모든 적군을 축출해야 한다고 명시되어 있으나, [GER.GetAdjective]은 우리가 연방에 넘겨야 할 무기와 자원을 빼돌리고 있습니다. 우리 군이 [GER.GetAdjective] 병사들의 무장 해제를 시도하자 교전이 시작되었고, [GER.GetAdjective]은 우리 국토를 초토화하고 수역에 기뢰를 부설하고 있습니다."
 AAT_finland_continuation_war.10.a: "또 다른 전쟁을 치를 수는 없으니, 반드시 준수해야 합니다."

 AAT_finland_continuation_war.11.t: "[FIN.GetNameDef]에서 우리 장교들의 철수 개시"
 AAT_finland_continuation_war.11.desc: "처음에는 주저했지만, [FIN.GetAdjective] 정부는 이제 소련의 압박을 받아 그곳에 주둔한 우리 병사들을 축출하고 무장 해제하기 시작했습니다. 이에 우리 장교들은 바로 이런 시나리오를 위해 수립된 계획을 실행하기 시작했지만, 어떤 버전을 실행할지 망설이고 있습니다. 무엇이 더 중요합니까?"
 AAT_finland_continuation_war.11.a: "비르케 작전을 개시하라."
 AAT_finland_continuation_war.11.b: "노르트리히트 작전을 개시하라."

 aat_news.121.t: "라플란드 전쟁"
 aat_news.121.desc: "[FIN.GetAdjective]군이 모스크바 휴전 협정 당시 [SOV.GetNameDef]와 체결한 조약을 준수하기 위해 자국에서 [GER.GetAdjective] 병사들을 무장 해제하고 축출하려 하면서 [FIN.GetNameDef]와 [GER.GetNameDef] 사이에 전투가 발발했습니다. 머지않아 [GER.GetAdjective]이 [FIN.GetName]에서 쫓겨날 것은 의심의 여지가 없지만, 그 대가가 얼마일지가 문제입니다."
 aat_news.121.a: "우리가 그들을 몰아낼 것이다!"
 aat_news.121.b: "그들이 본색을 드러냈군..."
 aat_news.121.c: "우리의 또 다른 승리다."
 aat_news.121.d: "전세가 역전되었다."

 AAT_finland_continuation_war.12.t: "[FIN.GetName]의 진영 변경 희망"
 AAT_finland_continuation_war.12.desc: "오늘 [FIN.GetNameDef]의 [FIN.GetLeader]이 매우 흥미로운 제안으로 우리에게 접근했습니다. 그는 전세가 점점 불리해짐에 따라 [FIN.GetName]이 [SOV.GetNameDef]와의 전쟁을 끝낼 준비가 되었다고 주장하며, 우리가 페차모에 상륙하도록 허락하고 우리 진영에 합류하여 스칸디나비아에서 [GER.GetAdjective]을 공동으로 몰아내 [GER.GetNameDef]를 완전히 끝장내자고 제안했습니다. 어떻게 하시겠습니까?"
 AAT_finland_continuation_war.12.a: "아주 좋소. [SOV.GetLeader]도 괜찮다고 하길 바랄 뿐..."
 AAT_finland_continuation_war.12.b: "소련을 자극할 위험을 감수할 순 없다!"

 AAT_finland_continuation_war.13.t: "[FIN.GetName], 연합국 합류 모색"
 AAT_finland_continuation_war.13.desc: "[FIN.GetNameDef] 대표단이 주요 민주주의 국가들에 접근한 것으로 보입니다. 그들은 [GER.GetAdjective]에 맞선 전쟁에 합류하겠다고 제안하며 우리와의 전쟁에서 빠져나가려 하고 있으며, 이는 본질적으로 진영을 바꾸는 것입니다. 만약 연합국이 이에 동의한다면 우리가 할 수 있는 일은 불평하고 보상을 요구하는 것 외에는 많지 않겠지만, 적어도 파시즘에 맞선 우리의 투쟁에 새로운 파트너가 생긴다는 의미일 것입니다."
 AAT_finland_continuation_war.13.a: "아주 좋소. 단, 보상을 받는다는 조건 하에."

 AAT_finland_political.01.t: "[ROOT.GetLeader]에 대한 불신임 결의안"
 AAT_finland_political.01.desc: "오늘 [Root.GetLeader]은 [ROOT.GetAdjective] 의회인 에두스쿤타에서 발의된 불신임 투표에서 살아남는 데 필요한 표를 확보하지 못했습니다.\n\n1931년부터 대통령으로 재임하며 폭넓은 대중적 지지를 누렸음에도 불구하고, 사회민주당의 입각을 거부하며 약속을 어긴 탓에 [ROOT.GetLeader]의 입지는 크게 약화되었습니다. 이 정치적 실수는 정치적 위기로 번졌고, 이제 [ROOT.GetLeader]은 그 희생양이 되었습니다."
 AAT_finland_political.01.a: "칼리오가 할 일이 많겠군!"

 AAT_finland_political.02.t: "대통령 임기 만료"
 AAT_finland_political.02.desc: "오늘은 궁지에 몰린 [ROOT.GetLeader]이 다시 한번 대통령 자리를 확보해야 하는 날입니다.\n\n1931년부터 대통령으로 재임하며 폭넓은 대중적 지지를 누렸음에도 불구하고, 사회민주당의 입각을 거부하며 약속을 어긴 탓에 [ROOT.GetLeader]의 입지는 크게 약화되었습니다. 이 정치적 실수는 [ROOT.GetLeader]의 재선 가능성을 심각하게 해쳤으며, 오늘 그것이 [GetPoliticsDescriptionOldManPete]를 실각시키기에 충분한지 알게 될 것입니다."
  FIN_reelection_old_man_pete: "페테 노인."
  FIN_reelection_other_leader: "[ROOT.GetLeader]."
 AAT_finland_political.02.a: "스빈후부드는 대중의 신뢰를 얻어야 합니다."
 AAT_finland_political.02.b: "퀴외스티 칼리오를 임명하십시오, 그는 중도파와 민주주의자들의 지지를 받고 있습니다!"

 AAT_finland_political.03.desc: "불행히도, 우리는 [ROOT.GetLeader]의 건강이 전혀 좋지 않다는 현실을 직시해야 합니다. [ROOT.GetLeader]는 이미 뇌졸중으로 오른쪽 팔이 마비되었으며, 의사들은 그가 즉시 직위에서 물러나지 않으면 건강이 급격히 악화될 것을 우려하고 있습니다. \n\n따라서 핀란드 의회인 에두스쿤타는 대통령의 건강을 위해 불신임 결의안을 상정할 긴급 회의를 소집했습니다. 리스토 뤼티 총리는 이미 대통령의 여러 직무를 인계받았으며, 대통령직을 승계할 준비를 하고 있습니다."
 AAT_finland_political.03.a: "리스토 뤼티를 임명하십시오, 그는 이미 칼리오의 직무를 대행하고 있습니다!"

 AAT_finland_political.04.t: "[ROOT.GetLeader]의 서거"
 AAT_finland_political.04.desc: "비극적인 소식입니다. 많은 사랑을 받던 [ROOT.GetName]의 대통령 [ROOT.GetLeader]께서 서거하셨습니다. 그분은 한동안 건강이 좋지 않았으며, 이미 뇌졸중으로 오른쪽 팔이 마비된 상태였습니다. \n\n그분은 건강상의 이유로 사직서를 제출하고 집으로 돌아가던 중 헬싱키 중앙역에서 치명적인 심장마비로 쓰러져 그 자리에서 서거하셨습니다. 의장대는 그분이 서거하실 당시, 그의 퇴임을 기리며 핀란드의 애국 행진곡인 포릴라이스텐 마르시를 연주하고 있었습니다."
 AAT_finland_political.04.a: "편히 잠드소서!"

 AAT_finland_political.05.t: "[ROOT.GetLeader]의 사임"
 AAT_finland_political.05.desc: "오늘 우리는 [ROOT.GetLeader]의 사직서를 받았습니다. 사직서에서 그는 자신의 건강에 대한 지속적인 우려가 있으며, 이에 신중한 결정을 내려 사임 의사를 밝혔습니다. \n\n[GetPoliticsDescriptionKallioWinterWar]"
  FIN_politics_kallio_winter_war: "[ROOT.GetLeader]는 전쟁에도 익숙한 인물이며, 고조되는 세계적 긴장에 대해 우려를 표했습니다. 그가 겨울 전쟁의 가장 암울한 시기에 우리나라를 이끈 책임자였기 때문에, 대중은 그의 경고를 심각하게 받아들였습니다."
  FIN_politics_no_kallio_winter_war: "그는 또한 전 세계적으로 고조되는 긴장을 우려하며, 이 어려운 시기에 [ROOT.GetAdjective] 국민의 안전을 위한 깊고 진심 어린 소망을 나타냈습니다."
 AAT_finland_political.05.a: "$FIN_risto_ryti$이(가) 다음 차례입니다!"

 AAT_finland_political.06.desc: "정부는 다소 놀랍게도 [ROOT.GetLeader]로부터 건강상의 이유를 든 사직서를 받았습니다. 하지만 그는 건강의 상징과도 같았기에, 다른 동기가 있을 것이라 의심하는 이들도 있습니다. \n\n대통령은 최근 정치적 스캔들에 휘말렸는데, 그가 [GER.GetLeader]에게 개인적인 서한을 보내 실재하거나 가상적인 적에 맞서 군사적 지원을 간청한 사실이 발각되었습니다. \n\n당연하게도, 내각의 일부 민족주의 성향 인사들은 이것이 우리 주권에 대한 명백한 공격이라고 비난했으며, 그들이 그에게 사임을 압박했을 수도 있습니다."
 AAT_finland_political.06.a: "이 나라에 더는 뤼티 같은 사람은 필요 없습니다."

 AAT_finland_political.07.t: "$FIN_carl_mannerheim$ 대통령 임명"
 AAT_finland_political.07.desc: "이 전쟁으로 [ROOT.GetName]의 존립 자체가 위협받는 상황에서, 우리는 [ROOT.GetLeader]를 [ROOT.GetAdjective] 독립 전쟁의 영웅인 칼 G. 만네르헤임 원수가 이끄는 군사 정부로 교체하는 어려운 결정을 내려야 합니다. 침략자의 멍에를 벗어던지고 조국을 구하려면 그의 군사적 경험이 필요합니다. \n\n만네르헤임은 새로운 책무를 열정적으로 받아들이며, '이 전쟁은 우리 독립 전쟁의 연장선이자 마지막 장에 불과하다. 우리는 우리의 가정과 신념, 그리고 조국을 위해 싸운다.'라고 선언했습니다."
 AAT_finland_political.07.a: "만네르헤임이 상황을 처리할 것입니다."

 AAT_finland_political.08.t: "만네르헤임의 임무 완수"
 AAT_finland_political.08.desc: "그의 지도력이 없었다면 우리는 폭풍우를 헤쳐나가지 못했을 것이고 우리나라는 지금쯤 사라졌을 것이 확실하기에, 우리는 [ROOT.GetLeader]의 공적을 감사히 여깁니다. \n\n하지만 우리는 어려운 결정을 내려야 합니다. 원수에게 직위를 계속 유지하도록 요청해야 할까요, 아니면 직위를 포기하고 국민의 뜻에 따라 민간 정부를 다시 도입해야 할까요?"
 AAT_finland_political.08.a: "[ROOT.GetAdjective] 국민은 당신의 헌신에 감사드립니다, 만네르헤임 남작 원수님!"
 AAT_finland_political.08.b: "만네르헤임은 여전히 자신의 직책에 필요합니다!"

 AAT_finland_political.09.desc: "[ROOT.GetLeader]의 공적에 감사를 표합니다. [ROOT.GetLeader.GetHerHis]의 지도력이 없었다면, 우리는 폭풍을 이겨내지 못하고 조국을 잃었을 것이 분명하기 때문입니다. \n\n그러나 이제 우리는 전쟁 너머, 뒤따를 평화와 재건을 바라보아야 할 때입니다. 상처를 제대로 치유하고 미래를 마주하기 위해, 우리는 문민 정부를 복원해야 합니다."
 AAT_finland_political.09.a: "[ROOT.GetAdjective] 국민들은 당신의 헌신에 감사드립니다, 만네르헤임 남작 원수님!"

 AAT_finland_kinship_war.01.t: "동카렐리야의 [FROM.GetAdjective] 선동가들"
 AAT_finland_kinship_war.01.desc: "카렐리야에서 반소련 감정이 고조되는 가운데, 그곳의 충성스러운 시민들은 우리가 헤이모소다트와 동카렐리야 봉기의 재현으로 향하고 있을지 모른다는 우려를 표명했습니다. 그 목표가 독립 카렐리야든, 통일된 핀족이든, 단순한 부족주의든, 심지어 핀란드의 제국주의적 야망이든, 핀란드의 선동이 원인임은 분명합니다."
 AAT_finland_kinship_war.01.a: "모든 반란분자는 처리될 것입니다!"
 AAT_finland_kinship_war.02.t: "동카렐리야 봉기!"
 AAT_finland_kinship_war.02.desc: "[SOU.GetName]에 대한 불만을 조장하려는 우리의 노력은 큰 성공을 거두었습니다. 동카렐리야 봉기 당시 20,000명의 동카렐리야인이 핀란드로 피신했으며, 이들은 학술 카렐리야 협회 내에서 자신들이 잃어버린 것에 대한 기억을 유지하기 위해 부지런히 활동해 왔습니다. 헤이모소다트는 잊히지 않았으며, 소련 당국의 손에 의한 카렐리야인에 대한 처우도 마찬가지였습니다. \n\n그 결과, 동카렐리야 사람들은 억압자들에 맞서 봉기하는 것에 대해 공개적으로 이야기하기 시작했습니다. 무기와 보급품이 한동안 이 지역으로 유입되었지만, 이제 그들은 실향민들에게 돌아와 무기를 들 것을 요구하고 있습니다. \n\n이제 문제는, [ROOT.GetName]이 다시 한번 그들의 투쟁에 동참할 것인가 하는 점입니다."
 AAT_finland_kinship_war.02.a: "우리는 카렐리야 형제들을 전적으로 지원한다!"
 AAT_finland_kinship_war.02.b: "핀란드 선동가들이 국경을 넘도록 허용할 것이다."
 AAT_finland_kinship_war.03.desc: "오늘 아침 [FIN.GetAdjective] 세력의 꼬드김에 넘어가 과감한 행동에 나선 동카렐리야의 반군들이 정부 진지를 공격하면서 첫 총성이 울렸습니다. 이곳에 주둔한 반란 분파를 지원하기 위해 성가신 이웃으로부터 무기가 밀반입되면서, 이 지역에서는 한동안 문제가 곪아왔습니다. [FIN.GetName]은 1920년에 체결된 타르투 조약에 결코 만족하지 않았으며, 그 이후로 동카렐리야의 반란 분파를 지원해 왔습니다. \n\n지금까지는 이것이 그들의 개입 한계였지만, 이제 [FIN.GetName]이 마침내 더 직접적으로 개입하는 것으로 보입니다. [FIN.GetAdjective] 군대가 국경을 넘어 분쟁을 확대하고, 우리 두 나라를 전쟁 상태로 몰아넣으면서 상황은 더욱 악화되었습니다."
 AAT_finland_kinship_war.03.a: "그들은 우리 군대에 상대가 되지 않는다!"
 AAT_finland_kinship_war.04.t: "동카렐리야 반란 진압!"
 AAT_finland_kinship_war.04.desc: "지난 몇 달 동안, [FROM.GetAdjective] 군대는 동카렐리야의 도시들을 정찰하며 지역을 불안정하게 만들고 현지 주둔군을 혼란에 빠뜨릴 방법을 찾으려 했지만, 방어하는 [SOV.GetAdjective] 군대의 저항이 너무 강했습니다. \n\n실제 봉기가 계획되기도 전에 많은 핀란드 선동가와 동카렐리야 반군이 체포, 추방되거나 핀란드로 다시 도망쳐야 했습니다. 사람들은 두려워하고 있으며, 이제 이것은 더 이상 가능성이 없습니다."
 AAT_finland_kinship_war.04.a: "우리는 다른 방법으로 동카렐리야를 해방해야 할 것이다."
 AAT_finland_kinship_war.05.desc: "지난 몇 달 동안, [FIN.GetAdjective] 군대는 동카렐리야의 도시들을 정찰하며 지역을 불안정하게 만들고 우리 현지 주둔군을 혼란에 빠뜨릴 방법을 찾으려 했지만, 물론 방어하는 [SOV.Adjective] 군대의 용감한 저항이 너무 강했습니다. \n\n실제 봉기가 유발되기도 전에 많은 핀란드 선동가와 동카렐리야 반군이 체포, 추방되거나 핀란드로 다시 도망쳐야 했습니다. 사람들은 마침내 이 지역에 평화가 회복된 것을 기뻐합니다!"
 AAT_finland_kinship_war.05.a: "이번에는 정말로, 마지막 동족 전쟁이기를..."
 AAT_finland_kinship_war_dynamic_modifier_tt: "§Y[215.GetName]§!, §Y[216.GetName]§!, §Y[146.GetName]§! 또는 §Y[147.GetName]§!에 주 수정치 §Y$FIN_anti_soviet_sentiment$§!가 존재하는 동안, [FROM.GetNameDef]은(는) 카렐리야 봉기를 선동할 수 있습니다."
 AAT_finland_kinship_war_rebellion_crushed_fin_tt: "§R카렐리야 반란군이 봉기를 조직하기 전에 진압되었습니다§!."
 AAT_finland_kinship_war_rebellion_crushed_sov_tt: "§G카렐리야 반란군이 봉기를 조직하기 전에 진압되었습니다§!."

 AAT_finland_kinship_war.06.t: "제2차 헤이모소다트"
 AAT_finland_kinship_war.06.desc: "소련의 민간 기관들이 붕괴함에 따라, 많은 지역 민족주의 정부들이 독립을 선언하고 있으며, [KAR.GetNameDef]도 그중 하나입니다. 카렐리야의 실지회복주의자들과 군국주의자들은 우리가 제2차 동족 전쟁에 직면했다고 선언한 반면, 온건파와 사회주의자들은 우리가 소련의 문제에 개입해서는 안 된다고 주장합니다."
 AAT_finland_kinship_war.06.a: "그들에게 병력과 물자를 보내야 한다"
 AAT_finland_kinship_war.06.b: "잠자는 곰을 깨워서는 안 된다..."

 AAT_finland_the_white_death.1.t: "아군 저격수들의 높은 효율성 입증"
 AAT_finland_the_white_death.1.desc: "아군 저격수들이 우리 숲으로 침입하는 적군과의 전투에서 매우 효율적이라는 보고가 들어왔습니다. 이는 전쟁 선전을 위한 좋은 기회입니다. '하얀 사신'이라는 용어가 적군 병사들 사이에서 떠오르고 있는데, 이는 핀란드의 자연과 국민이 제기하는 위험을 의미하며, 만약 적절한 인물이 나타난다면 이 별명을 특정 인물에게 붙여 국민을 결집시킬 수 있을 것입니다."
 AAT_finland_the_white_death.1.a: "에리노마이스타!"
 AAT_finland_the_white_death.1.b: "사냥꾼들에게 더 많은 무기를 지급해야 한다"
 FIN_our_snipers_will_be_more_deadly_tt: "우리의 §Y저격수§!가 더욱 치명적이게 될 것입니다"

 aat_news.105.t: "하얀 사신"
 aat_news.105.desc: "[FIN.GetNameDef]에 전쟁이 닥치자, 수많은 사냥꾼, 수오옐루스쿤타 민병대원, 사격 클럽 명사수들이 압제자에 맞서 싸우기 위해 무기를 들었습니다. 그들은 [FIN.GetAdjective]의 시수 정신으로 충만하여, [FIN.GetAdjective]의 자연을 이점으로 활용해 적의 공격을 막아냈습니다. 이는 적군 병사들 사이에서 하얀 사신으로 알려지게 되었습니다."
 aat_news.105.a: "선전 활동을 위한 좋은 기회입니다!"
 aat_news.105.b: "죽음이 우리 병사들을 데려가려 하지만, 우리는 싸우지 않고는 포기하지 않을 것입니다!"
 aat_news.105.c: "그들은 싸울 줄 아는군요"

 AAT_finland_the_white_death.2.t: "[FIN.GetAdjective] 저격수들이 우리 병사들의 심장에 공포를 심고 있습니다"
 AAT_finland_the_white_death.2.desc: "우리 병사들의 보고에 따르면, [FIN.GetNameDef]의 숲에서 병력 전체가 기습을 받아 산산조각이 났다고 합니다. 그들은 [FIN.GetNameDef]의 혹한과 [FIN.GetAdjective] 군대의 치명적인 명사수들을 구현한 존재인 하얀 사신에 대해 이야기하기 시작했습니다. 원한다면, 이들이 더 큰 피해를 입히기 전에 이 장애물들을 제거하기 위해 막대한 노력을 기울일 수 있습니다."
 AAT_finland_the_white_death.2.a: "그들에 대해 걱정할 필요는 없습니다"
 AAT_finland_the_white_death.2.b: "그들을 사냥하십시오!"
 FIN_we_will_be_more_likely_to_put_down_the_finnish_snipers_tt: "§Y핀란드 저격수§!를 사냥하는 데 성공할 확률이 높아질 것입니다!"

 AAT_finland_the_white_death.4.t: "시모 해위해, 하얀 사신으로 인정받다"
 AAT_finland_the_white_death.4.desc: "비푸리 저격수 시모 해위해는 인상적인 사격술 덕분에 우리 병사들 사이에서 종종 타이카-암푸야, 즉 마법의 사수라고 불렸습니다. 이제 그는 하얀 사신으로도 인정받고 있습니다. 지금까지 하얀 사신은 적들이 핀란드의 혹독한 자연과 국민을 지칭하는 말이었으나, 언론이 이 새로운 이야기를 강력하게 밀어붙이고 있습니다. 우리의 공식 입장은 어떠해야 합니까?"
 AAT_finland_the_white_death.4.a: "이 현대 핀란드 영웅의 이야기를 널리 알려야 합니다"
 AAT_finland_the_white_death.4.b: "하얀 사신은 핀란드의 화신이지, 특정 인물이 아닙니다!"
 AAT_finland_the_white_death.5.t: "시모 해위해, 하얀 사신으로 인정받다"
 AAT_finland_the_white_death.6.t: "시모 해위해, 하얀 사신으로 인정받다"

 AAT_finland_the_white_death.7.t: "하얀 사신이 우리를 덮칩니다!"
 AAT_finland_the_white_death.7.desc: "우리 병사들의 최선의 노력에도 불구하고, 하얀 사신은 포획되지 않았으며 몇 주 동안 우리 병사들을 공포에 떨게 했습니다. 우리 장교들은 아무런 성과도 내지 못했습니다. 이 상황이 계속되자 우리 병사들은 동요하고 사기는 바닥으로 떨어졌습니다..."
 AAT_finland_the_white_death.7.a: "이건 좋지 않습니다..."

 AAT_finland_the_white_death.8.t: "막대한 손실에도 불구하고, 우리 군이 하얀 사신에게 부상을 입히는 데 성공했습니다"
 AAT_finland_the_white_death.8.desc: "[FIN.GetNameDef]에 있는 우리 장교들로부터 하얀 사신에게 성공적으로 부상을 입혔다는 보고가 들어왔습니다. 하지만 이 과정에서 많은 병사가 전사하고 더 많은 병사가 부상당하는 등 큰 대가를 치렀습니다. 그럼에도 불구하고, 우리는 다시는 전장에서 그를 마주칠 필요가 없을 것입니다."
 AAT_finland_the_white_death.8.a: "성가신 파리 한 마리를 제거했습니다!"

 AAT_finland_the_white_death.9.t: "막대한 손실에도 불구하고, 우리 군이 하얀 사신을 사살하는 데 성공했습니다!"
 AAT_finland_the_white_death.9.desc: "[FIN.GetNameDef] 주둔 장교들로부터 '하얀 사신'으로 알려진 [FIN.GetAdjective] 저격수를 성공적으로 제거했다는 보고가 들어왔습니다. 막대한 사상자가 발생했지만, [ROOT.GetNameDef]의 강적이 제거되었으며 이제 우리 병사들은 안심할 수 있습니다."
 AAT_finland_the_white_death.9.a: "사실, 그는 우리에게 상대가 되지 못했습니다"

 AAT_finland_the_white_death.10.t: "하얀 사신이 계속해서 먹잇감을 추적합니다"
 AAT_finland_the_white_death.10.desc: "수많은 위기와 거짓 주장에도 불구하고 시모 해위해는 상처 하나 없이 건재하며, 필요한 만큼 계속해서 싸울 것입니다. 하얀 사신이 우리 적들을 맞이할 것입니다!"
 AAT_finland_the_white_death.10.a: "그들은 진정한 공포를 알게 될 것입니다"

 AAT_finland_the_white_death.11.t: "시모 해위해가 부상당하여 전장에서 후송되었습니다"
 AAT_finland_the_white_death.11.desc: "해위해가 적병이 쏜 폭발탄에 왼쪽 아래턱을 맞아 중상을 입었다는 보고가 들어왔습니다. 사망한 것으로 생각되었으나, 인근 기지로 복귀하여 무사함을 알렸습니다. 하지만 그는 더 이상 전투를 계속할 수 없지만, [FIN.GetAdjective] 국민이 영원히 감사할 만큼 충분한 공을 세웠습니다."
 AAT_finland_the_white_death.11.a: "그럼에도 불구하고, 그는 진정한 핀란드의 영웅입니다!"

 AAT_finland_the_white_death.12.t: "시모 해위해가 전사했습니다!"
 AAT_finland_the_white_death.12.desc: "해위해가 교전 중 적병이 쏜 폭발탄에 맞아 전사했다는 보고가 들어왔습니다. 그의 시신은 우리 예거 부대가 성공적으로 수습했으며, 수도로 이송되었습니다. [FIN.GetNameDef]의 영원히 감사하는 국민들에게 그는 영원히 기억될 것입니다."
 AAT_finland_the_white_death.12.a: "그의 영혼이 옛 영웅들 곁에서 편히 잠들기를"

 generic_could_lead_to_tt: "다음으로 이어질 수 있음:"

 ###################
 ### NEWS EVENTS ###
 ###################
 aat_news.100.t: "[FIN.GetAdjective] 계속 전쟁"
 aat_news.100.desc: "이전 [SOV.GetAdjective] 정부와의 전쟁에서 패배한 이후, [FIN.GetAdjective] 국민은 이제 동원되어 잃어버린 영토를 되찾고 외세의 억압으로부터 [FIN.GetAdjective]과 [KAR.GetAdjective] 국민을 해방할 준비를 마쳤습니다. 이는 [FIN.GetAdjective] 독립 전쟁과 헤이모소다트의 정신적 계승입니다."
 aat_news.100.a: "궁극적인 승리를 향해 전진!"
 aat_news.100.b: "그리고 그들은 혼자 싸우지 않을 것입니다!"
 aat_news.100.c: "핀란드인들은 이 대가를 치를 것입니다!"
 aat_news.100.d: "[GER.GetLeader]의 또 다른 꼭두각시가 전쟁에 참여하는군..."

 aat_news.101.t: "올란드 제도의 재무장"
 aat_news.101.desc: "크림 전쟁에서 러시아가 패배한 이후, 올란드 제도는 비무장화되었고 주민들은 모든 형태의 징병에서 면제되었습니다. 이 지위는 여러 차례 논란이 있었지만 여전히 세계의 많은 강대국에 의해 유지되고 있습니다. 하지만 이제, [FIN.GetAdjective]의 킬파푸르예흐두스 작전에 따라 제도는 다시 재무장되었습니다."
 aat_news.101.a: "이것은 필요한 조치입니다."
 aat_news.101.b: "그것이 우리를 막지는 못할 것이다."
 aat_news.101.c: "평화는 지속될 수 없다..."

 aat_news.666.t: "북해 제국의 복원"
 aat_news.666.desc: "크누트 대왕이 한때 통치했던 모든 영토를 되찾은 [From.GetOldAdjective] 정부는 이제 새로 정복한 영토의 통합을 위한 움직임을 강화하기 시작했습니다. 그 결과, 국민을 국가 뒤에 결집시키려는 시도로, 정부의 명확한 지원을 받는 범국가주의 선전이 증가했습니다.\n\n[FROM.GetOldAdjective] 지도자 [FROM.GetLeader]는 [DEN.GetOldNameDef], [NOR.GetOldNameDef], 잉글랜드의 연합 왕국이 이제부터 '[From.GetNameDef]'(으)로 알려질 것이라고 선언했습니다."
 aat_news.666.a: "바이킹이 돌아온 것 같습니다"

 aat_news.777.t: "발트해 제국의 형성"
 aat_news.777.desc: "발트해 지역 대부분을 정복하는 데 성공한 [From.GetOldAdjective] 정부는 이제 새로 정복한 영토의 통합을 위한 움직임을 강화하기 시작했습니다. 그 결과, 국민을 국가 뒤에 결집시키려는 시도로, 정부의 명확한 지원을 받는 범국가주의 선전이 증가했습니다.\n\n[FROM.GetOldAdjective] 지도자 [FROM.GetLeader]는 [FROM.GetOldNameDef]이(가) 다른 어떤 나라도 해내지 못한 일을 어떻게 해냈는지, 그리고 발트해를 그 지배하에 두었는지에 대해 연설했습니다. [FROM.GetSheHeCap]는 '[From.GetNameDef]'의 형성을 선포하며 연설을 마쳤습니다."
 aat_news.777.a: "Dominium maris baltici"


#######################
###  NARVIK EVENTS  ###
#######################

AAT_britain_narvik.1.t: "[SWE.GetAdjective] 광산이 폭파되었습니다"
AAT_britain_narvik.1.desc: "우리는 성공적으로 [SWE.GetAdjective] 광산을 폭파했으며, [GER.GetNameDef]의 가장 중요한 수입 자원 중 하나를 빼앗았습니다. 이 작전의 주된 동기가 [FIN.GetName]에 대한 지원 약속이었음에도 불구하고, [SOV.GetNameDef]와 직접적인 충돌에 휘말리는 것은 현실적으로 불가능했으며, 우리는 주적에게 큰 타격을 입혔습니다. 우리에게 [SWE.GetNameDefCap]은 실질적인 적이 아니므로, 이제 다음에 무엇을 할지 결정해야 합니다."
AAT_britain_narvik.1.a: "철수"
AAT_britain_narvik.1.b: "작전 계속"
AAT_britain_narvik.2.t: "[ENG.GetName]이(가) [SWE.GetName]을(를) 침공"
AAT_britain_narvik.2.desc: "[ENG.GetAdjective] 군대가 [SWE.GetName]으로 국경을 넘었습니다. 선전포고도 없이 [ENG.GetAdjective] 정부가 침묵하는 가운데, [SWE.GetAdjective] 당국은 [SWE.GetAdjective] 주권에 대한 존중 결여에 격분하고 있습니다. 가장 유력한 설명은 [ENG.GetAdjective] 군대가 옐리바레와 키루나의 광산에 도달하여, 고급 광석이 [GER.GeName]에 도달하는 것을 막기 위해 사보타주를 시도하고 있다는 것입니다. 이는 [GER.GetAdjective]와 [SWE.GetAdjective] 양국 경제에 막대한 타격이 될 것이며, [SWE.GetAdjective] 중립에 대한 중대한 위반이 될 것입니다."
AAT_britain_narvik.2.a: "감히 이럴 수가?!"
AAT_britain_narvik.2.b: "그들을 막아야 한다!"

AAT_britain_narvik.3.t: "[ENG.GetName]이(가) [SWE.GetAdjective] 광산을 파괴 공작"
AAT_britain_narvik.3.desc: "[ENG.GetNameDefCap]은(는) 정식 선전포고 없이 [SWE.GetName]을(를) 불법적으로 침공하여 광산을 파괴했습니다. [SWE.GetAdjective] 경제의 핵심 동력이 이제는 폐허가 된 채석장에 불과합니다. [ENG.GetAdjective] 정부는 [GER.GetNameDefCap]과(와) 거래하는 것이 그들 편에 서는 것만큼 나쁜 일이며, 이번 행동은 정당하다고 주장하며 자신들의 행동을 변호했지만, 자국민조차 정부의 설명에 불편함을 느끼는 것 같습니다."
AAT_britain_narvik.3.a: "이것은 폭거다"

AAT_britain_narvik.4.t: "[ENG.GetName]이(가) [SWE.GetName]에서 철수"
AAT_britain_narvik.4.desc: "[ENG.GetName]이(가) [SWE.GetName]에서의 전략적 목표가 달성되어 병력을 철수한다고 발표했습니다. [ENG.GetName] 정부는 또한 [SWE.GetAdjective] 국가에 대해 실질적인 적의가 없으며, [SWE.GetName]에서의 행동은 순전히 민주주의 수호를 위한 것이라고 재차 강조했습니다. [GER.GetAdjective] 및 [SWE.GetAdjective] 대사관 양측은 항의 서한을 전달했습니다. [GER.GetAdjective] 측은 [ENG.GetName]이(가) 중립을 위반하고 교전 지역의 외국을 침공했다고 주장했으며, [SWE.GetAdjective] 측은 [ENG.GetAdjective] 정부가 [FIN.GetName]을 돕는다는 숭고한 목표에도 불구하고, 이제는 [SWE.GetAdjective] 국민의 목숨을 대가로 자신들의 목적을 달성하기 위한 허술한 계략이었음이 명백해졌다고 맹비난했습니다."
AAT_britain_narvik.4.a: "이것은 여전히 터무니없는 일입니다"
