 denmark_expansion_event.212.t: "[FROM.GetNameDefCap], 우리의 [SWE.GetAdjective] 영유권 주장을 거부"
 denmark_expansion_event.212.desc: "유감스럽게도, [FROM.GetAdjective] 정부는 우리의 주장을 거부했습니다. 정당한 [DEN.GetAdjective]의 것을 확보하기 위해, 우리는 그들의 문턱까지 전쟁을 끌고 가는 것 외에는 선택지가 없는 것 같습니다."
 denmark_expansion_event.212.a: "아마 공격적인 태도를 보이면 더 순순해질 것입니다.E"
