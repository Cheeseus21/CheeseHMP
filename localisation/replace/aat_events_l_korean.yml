 ### MIO EVENTS ###

 AAT_MIO_events.2.t: "$CZE_skoda_works$ 투자"
 AAT_MIO_events.2.desc: "$CZE_skoda_works$의 경영진은 투자를 갈망하고 있지만, 우리는 회사 내 세 부서 중 한 곳에만 자금을 투입할 여력이 있습니다. 이를 통해 함선, 전차 또는 포 장비 중 하나의 개발을 우선시할 수 있게 될 것입니다."
 AAT_MIO_events.2.a: "$CZE_skoda_shipyards$에 투자한다"
 AAT_MIO_events.2.b: "$CZE_skoda_armor$에 투자한다"
 AAT_MIO_events.2.c: "$CZE_skoda_artillery$에 투자한다"


