l_korean:

#########
        # NORDIC SHARED #
########
  AAT_nordic_shared.1.t: "[FROM.GetName]이(가) [NORDIC_get_alliance_name]에 가입할 것을 제안합니다"
  AAT_nordic_shared.1.desc_faction_member: "[FROM.GetNameDefCap]은(는) 우리의 동맹을 한 단계 더 발전시키고 여러 수준에서 협력을 심화시키고자 합니다. 그들은 군사 동맹을 더 강력하고 통일된 북유럽 지역을 향한 첫걸음으로 보고 있습니다."
  AAT_nordic_shared.1.desc_non_faction_member: "[FROM.GetNameDefCap]은(는) 모든 북유럽 국가 간의 깊은 협력을 구축하기 위해 노력하고 있습니다. 그들은 [NORDIC_get_alliance_name]을 창설하고 우리에게 이에 동참할 것을 제안합니다."
  AAT_nordic_shared.1.a: "긴밀한 협력만이 생존의 길입니다"
  AAT_nordic_shared.1.b: "너무 위험한 제안이니, 우리는 빠지는 편이 낫겠습니다"
  AAT_nordic_shared.2.t: "[FROM.GetName]이(가) 상호 보장을 제안합니다"
  AAT_nordic_shared.2.desc: "전 세계적으로 긴장이 고조됨에 따라 신뢰할 수 있는 동맹을 찾기가 점점 더 어려워지고 있습니다. [FROM.GetAdjective] 정부는 같은 북유럽 국가로서, 외국의 침략이 있을 경우 [ROOT.GetName]과 [FROM.GetName]이 서로를 위해 맞설 것이라고 세계에 선포할 것을 제안합니다. 우리가 이를 약속해도 괜찮겠습니까?"
  AAT_nordic_shared.2.a: "이것이 유일한 생존 방법일지도 모릅니다"
  AAT_nordic_shared.2.b: "그들이 우리를 끌어들이도록 놔둘 수 없습니다"
  AAT_nordic_shared.3.t: "[FROM.GetName]이(가) 우리와 함께할 것입니다!"
  AAT_nordic_shared.3.desc: "우리는 [FROM.GetAdjective] 국민이 [ROOT.GetName]의 독립을 수호할 것이며, 우리 또한 그들의 독립을 수호할 것이라는 소식을 받았습니다. 북유럽 국가들은 분열된 소국이 아닌, 통합된 군세로서 어떠한 침략이라도 격퇴할 준비가 되어 있어야 합니다."
  AAT_nordic_shared.3.a: "훌륭한 소식입니다!"
  AAT_nordic_shared.4.t: "[FROM.GetName]이(가) 우리의 제안을 거부했습니다"
  AAT_nordic_shared.4.desc: "수 세기 동안 함께한 역사가 우리 국민이 외국의 폭군에 맞서 함께 싸워야 한다는 점을 [FROM.GetAdjective] 정부에 설득하는 데는 별다른 영향력이 없는 것 같습니다. 너무 늦기 전에 그들이 마음을 바꾸길 바랄 뿐입니다."
  AAT_nordic_shared.4.a: "슬픈 소식입니다"
  
  AAT_nordic_cooperation.1.t: "[FROM.GetNameDef]이(가) 선을 넘었습니다!"
  AAT_nordic_cooperation.1.desc: "우리는 [?GLOBAL.NORDIC_country_to_defend.GetName]에 대한 우리의 전쟁 노력이 [FROM.GetName]의 은밀한 지원으로 몇 번이고 방해받았다는 증거를 발견했습니다. \n\n아마도 그들에게 진정한 전쟁이 무엇인지 교훈을 가르쳐 줄 때가 된 것 같습니다."
  AAT_nordic_cooperation.1.a: "이 분쟁을 더 확대할 여유가 없습니다"
  AAT_nordic_cooperation.1.b: "그들은 이미 죽은 목숨이지만, 아직 그것을 모를 뿐입니다"
  AAT_nordic_cooperation.2.t: "[FROM.GetName]이(가) 우리의 전쟁 노력에 도움을 제안합니다"
  AAT_nordic_cooperation.2.desc: "이 험난한 시기에 [FROM.GetNonIdeologyName]와(과) 우리를 묶는 유대는 매우 소중했습니다. 그들은 [?NORDIC_attacker.GetName]에 맞선 우리의 전쟁을 지원해 주었으며, 이제 한 걸음 더 나아가 우리나라의 방어에 동참하겠다고 제안했습니다. 결국, 우리 중 하나에 대한 공격은 모든 북유럽 국가에 대한 공격이기 때문입니다."
  AAT_nordic_cooperation.2.a: "그들의 도움을 환영합니다"
  AAT_nordic_cooperation.2.b: "그들 없이도 이 문제를 해결할 수 있습니다"
  AAT_nordic_cooperation.3.t: "[FROM.GetName]이(가) 우리의 도움 제안을 거절했습니다"
  AAT_nordic_cooperation.3.desc: "우리의 좋은 의도에도 불구하고 [FROM.GetNameDef]은(는) 우리의 도움이 필요 없거나 원하지 않는 것 같습니다. 이 당혹스러운 결정 뒤에 있는 이유는 그들만이 알 것입니다.\n\n이것이 우리가 다른 방식으로 그들을 지원하는 것을 멈춰야 한다는 의미는 아니며, [?FROM.NORDIC_attacker.GetName]이(가) 우리를 교전국으로 간주할 수 있다는 의미도 아닙니다."
  AAT_nordic_cooperation.3.a: "어쩔 수 없군..."
  AAT_nordic_cooperation.4.t: "[FROM.GetName], 투자 모색"
  AAT_nordic_cooperation.4.desc: "북유럽 이웃 국가가 자국 경제의 추가 발전을 위한 투자를 모색하고자 대표단을 파견했습니다. 이는 분명 우리 산업 부문에도 이익이 되겠지만, 잠재적인 적이 아닌 우호적인 이웃을 지원하는 것인지 확실히 해야 합니다. "
  AAT_nordic_cooperation.4.a: "양측 모두에게 이익이 될 것이다"
  AAT_nordic_cooperation.4.b: "위험을 감수할 가치가 없다"
  AAT_nordic_cooperation.5.t: "[FROM.GetName]의 투자 유입 시작"
  AAT_nordic_cooperation.5.desc: "북유럽 이웃 국가가 우리 경제에 투자해 달라는 초청을 기꺼이 수락했습니다. 물론 그들의 신뢰에 대한 보상이 있을 것이며, 더 중요하게는 우리 경제가 더 빠른 속도로 성장할 수 있게 될 것입니다."
  AAT_nordic_cooperation.5.a: "좋은 소식이군!"
  AAT_nordic_cooperation.6.t: "[FROM.GetName], 우리 경제 투자 거절"
  AAT_nordic_cooperation.6.desc: "최선의 노력에도 불구하고, 북유럽 이웃 국가가 우리 경제의 추가 발전을 돕도록 설득하지 못했습니다. 물론, 언제든 다른 국가와 다시 시도할 수 있습니다."
  AAT_nordic_cooperation.6.a: "유감스럽군"
  AAT_nordic_cooperation.7.t: "[FROM.GetName], 경제 협력 모색"
  AAT_nordic_cooperation.7.desc: "북유럽 이웃 국가가 경제 및 산업 협력을 위한 상호 이익 조약을 체결하기 위해 공통점을 찾고자 합니다. 우리가 바라는 대로 제대로 이루어진다면, 우리가 동등한 입장으로 참여하게 되므로 양국 경제를 동등하게 활성화할 것입니다.\n\n우리 지역의 역사적인 적대 관계의 흥망을 고려할 때, 그들이 우리에게 등을 돌릴 경우 미래의 경쟁자에게 이익을 주는 것을 경계해야 합니다."
  AAT_nordic_cooperation.7.a: "공정한 거래다"
  AAT_nordic_cooperation.7.b: "의심스럽군"
  AAT_nordic_cooperation.8.t: "[FROM.GetName], 우리의 제안 수락"
  AAT_nordic_cooperation.8.desc: "[FROM.GetAdjective] 지도자들이 우리의 상호 이익적인 거래에 동의했다는 정보를 방금 받았습니다. 이는 양국 경제와 북유럽 지역 전체에 큰 도움이 될 것입니다."
  AAT_nordic_cooperation.8.a: "좋은 소식이군!"
  AAT_nordic_cooperation.9.t: "[FROM.GetName] 지도부, 우리 제안 거절!"
  AAT_nordic_cooperation.9.desc: "[FROM.GetName]과 동등한 입장에서 거래하려는 우리의 목표에도 불구하고, 그들은 그러한 협정에 관심이 없다고 통보해 왔습니다.\n\n언제든 다시 시도하거나, 다른 북유럽 동료와 시도할 수 있습니다."
  AAT_nordic_cooperation.9.a: "당혹스럽군"
  NORDIC_escalation_hostility_reason: "방어 중인 북유럽 국가를 지원함"

#########
        # NORWAY #
########
  AAT_norway.1.t: "파시스트들, [NOR_lev_trotsky.GetName]을(를) 괴롭히다"
  AAT_norway.1.desc: "논쟁적인 혁명가가 그의 후원자와 낚시 여행을 떠난 사이, 나쇼날 삼링당과 연계된 파시스트들이 트로츠키가 머물고 있던 콘라드 크누센의 집에 침입했습니다.\n\n강도들은 망명한 공산주의자를 제거하는 것을 정당화할 유죄 증거를 찾고 있었지만, 다행히도 중요한 것을 챙기기 전에 크누센의 딸 요르디스에 의해 집에서 쫓겨났습니다."
  AAT_norway.1.a: "그를 소란에서 멀리 떨어뜨려야 한다"
  AAT_norway.1.b: "일석이조의 기회로 삼을 수 있다"
  AAT_norway.1.c: "이 자에게 직책을 주어라!"
  AAT_norway.1.d: "그의 과거가 우리가 필요한 모든 증거다, 그를 투옥하라!"
  
  AAT_norway.2.t: "농장에 가택 연금된 트로츠키"
  AAT_norway.2.desc: "망명 중 정치 활동을 피하겠다는 합의 위반과 파시스트 강도들이 훔쳐간 빈약한 증거를 근거로, 우리는 [NOR_lev_trotsky.GetName]을 후룸의 한 농장으로 보냈습니다. 그곳에서 그는 경찰의 감시를 받으며 외부 세계와 격리될 것입니다.\n\n가혹한 처벌이지만, [SOU.GetNameDef]와 지역 파시스트들의 압력으로 인해 그는 위험한 구심점이 되고 있습니다."
  AAT_norway.2.a: "지금으로서는 최선입니다"
  
  AAT_norway.3.t: "[ROOT.GetLeader.GetName]의 반체제 인사 전반에 대한 탄압"
  AAT_norway.3.desc: "크누센의 별장에서 벌어진 언쟁 이후, 공산주의자들과 파시스트들이 서로 으르렁거리는 탓에 정치 상황이 위험으로 가득하다는 것이 명백해졌습니다.\n\n이 말다툼과 정치적 혼란은 처리되어야 합니다. 트로츠키의 존재는 우리에게 [SOU.GetNameDef]의 분노를 불러일으킬 위험이 있으며, 동시에 국민연합은 기회가 닿는 대로 [FGR.GetLeader]에게 나라를 넘겨줄 것이 분명하므로, 그들의 영향력은 어떤 대가를 치르더라도 억제되어야 합니다.\n\n가장 좋은 행동 방침은 그를 멕시코로 보내는 것입니다. 그곳에서는 [MEX.GetLeader]가 그의 입국을 허가하기로 동의했습니다."
  AAT_norway.3.a: "이는 노르웨이의 생존을 위한 것입니다"
  
  AAT_norway.4.t: "트로츠키가 우리 정부에 합류하다!"
  AAT_norway.4.desc: "[NOR.GetAdjective] 인민의 고통에 대한 해결책은 바로 우리 코앞에 있었습니다. [NOR_lev_trotsky.GetName]은 우리 시대의 가장 위대한 마르크스주의 작가 중 한 명일 뿐만 아니라, 카리스마 넘치는 혁명가이자 뛰어난 장군입니다.\n\n이는 분명 [SOV.GetNameDef]와의 긴장을 유발하겠지만, 그만한 가치가 있을 것입니다. 결국, 그의 경험은 우리의 젊은 국가와 스칸디나비아의 노동자들을 위대함으로 이끌 수 있습니다."
  AAT_norway.4.a: "한 국가의 망명객이 다른 국가의 구원자다!"
  
  AAT_norway.5.t: "[NOR_lev_trotsky.GetName] 투옥되다!"
  AAT_norway.5.desc: "다른 사람들은 크누센의 집에서 발견된 증거가 빈약하거나, 하찮거나, 심지어 조작되었다고 말할 수도 있고, 그들이 옳을 수도 있습니다. 하지만 아마도 어느 시점, 특정 상황에서는 판사가 그 유효성을 인정할 것입니다. 게다가, 현시점에서 국민연합을 소외시킬 위험을 감수할 수 없다는 사실은 변함이 없습니다. 이것이 [NOR_lev_trotsky.GetName]이 즉시 구금된 이유입니다.\n\n그가 언제, 또는 어떻게 다시 햇빛을 보게 될지는 지금으로서는 별로 중요하지 않은 문제지만, 우리는 그가 적어도 시베리아에서보다 더 나은 숙소를 갖도록 보장할 것입니다."
  AAT_norway.5.a: "그는 저지되어야만 했습니다"
  
  AAT_norway.6.t: "트로츠키의 운명"
  AAT_norway.6.desc: "우리가 [NOR_lev_trotsky.GetName]을 후룸의 한 농장에 가택 연금한 지 얼마간의 시간이 흘렀고, 이는 관련된 어느 쪽에게도 좋은 조치로 보이지 않습니다. [SOV.GetNameDefCap]은 범죄인 인도를 원하고, 국민연합은 그의 교수형을 원하며, 열렬한 트로츠키주의자가 아닌 다른 모든 사람들은 그가 떠나기를 원합니다. 우리는 이 골칫거리 망명객을 어떻게 처리할지 결정해야 합니다.\n\n멕시코 대통령 [MEX.GetLeader]은 우리가 그의 망명을 계속하도록 선택한다면 그를 받아들이겠다고 제안했지만, 우리는 우정의 표시로 그를 [SOV.GetLeader]에게 보낼 수도 있습니다."
  AAT_norway.6.a: "그는 멕시코의 햇살을 즐기게 될 겁니다"
  AAT_norway.6.b: "스탈린이 이 일로 우리를 아주 좋아할 겁니다!"
  
  AAT_norway.7.t: "[get_trotsky_lastname] 멕시코에 도착하다"
  AAT_norway.7.desc: "우리나라에서 수년간의 어색한 망명 생활 끝에, 골칫거리 망명객 [NOR_lev_trotsky]이 멕시코에 도착했습니다. 그곳에서 그는 화가 프리다 칼로와 디에고 리베라의 환대를 받을 것이며, 그들은 분명 그와 그의 아내와 아주 잘 지낼 것입니다.\n\n그는 아마 [SOV.GetNameDef]로부터 안전하겠지만, 가장 중요한 것은 더 이상 우리의 문제가 아니라는 점입니다."
  AAT_norway.7.a: "마침내 평화가 찾아왔군"
  
  AAT_norway.8.t: "[get_trotsky_lastname] 모스크바에 도착하다"
  AAT_norway.8.desc_SOV: "우리는 수년간 이 순간을 꿈꿔왔다. 배신자 뱀 같은 [SOV_lev_trotsky.GetName]이 우리 손에 들어왔다. 그는 혁명에 반하는, 그리고 가장 중요하게는 스탈린 동지에 반하는 죄값을 치를 것이다. 프롤레타리아의 눈에는 그 둘 사이에 아무런 차이도 없지만 말이다."
  AAT_norway.8.desc_NOR: "골칫거리였던 전직 혁명가 [NOR_lev_trotsky.GetName]이(가) 모스크바로 이송되었으며, 그곳에서 [SOU.GetLeader]의 변덕에 따라 억류되거나 처형될 것입니다.\n\n그의 운명과 상관없이, 우리는 마침내 이 길고 긴 사건에서 손을 뗄 수 있게 되었으며, [SOU.GetNameDef]와(과) 더욱 가까워지는 부가적인 이득도 얻었습니다."
  AAT_norway.8.a: "마침내!"
  AAT_norway.8.b: "속이 다 시원하군!"
  
  AAT_norway.9.t: "뉘고르스볼 내각"
  AAT_norway.9.desc: "[NOR_johan_nygaardsvold.GetName]이(가) 이끄는 노동당 정부는 우리 젊은 국가가 처음으로 갖게 된 명확한 과반수를 확보한 안정적인 정부입니다. 내각은 지난 1년간 국가가 현재 처한 심각한 경제 위기에서 [NOR.GetName]이(가) 벗어날 수 있도록, 비록 느리지만, 여러 조치를 추진하며 국민의 복지를 보장하기 위해 열심히 일해왔습니다.\n\n물론, 이러한 조치들은 우리가 전쟁에 휩싸일 경우 필요할지도 모를 군사적 준비를 희생한 대가입니다. 이러한 준비가 필요하지 않기를 바랄 뿐입니다."
  AAT_norway.9.a: "앞으로는 평화와 안정뿐!"
  
  AAT_norway.10.t: "휘청이는 스토르팅"
  AAT_norway.10.desc: "유럽에서의 전쟁이 점점 더 불가피해짐에 따라, [NOR.GetAdjective] 의회, 즉 스토르팅은 혼돈과 불화의 물결에 휩싸였습니다. 뉘고르스볼 내각이 안정의 시대를 열 것이라는 조짐은 오래전에 잊혔으며, 의원들은 다가오는 폭풍 속에서 [NOR.GetName]을(를) 안전하게 이끌 일관된 조치에 대해 합의하지 못하는 것 같습니다.\n\n한편, 인민의 적들은 분쟁을 틈타 칼을 갈고 있으며, [NOR.GetName]이(가) 전쟁의 불길에 휩싸일 때까지 세력을 키우고 있습니다."
  AAT_norway.10.a: "우리의 몰락은 얼마나 빠를 것인가?"
  
  AAT_norway.11.t: "[ROOT.GetName]의 인민이 깨어나고 있다!"
  AAT_norway.11.desc: "다른 스칸디나비아 강대국들에게 수 세기 동안 종속된 후 자본주의 산업가들의 손에 맡겨졌던 [ROOT.GetNonIdeologyName]의 인민들은 억압자에 맞서 단결하고 그들의 패권을 거부하는 법을 배우고 있습니다.\n\n이제 [ROOT.GetAdjective]인들은 혁명을 위한 영감을 찾고 있습니다!"
  AAT_norway.11.a: "이 고대 땅의 인민은 더 이상 잠들어 있지 않다!"
  
  AAT_norway.12.t: "요한 뉘고르스볼 불신임 투표"
  AAT_norway.12.desc: "초기의 기대에도 불구하고, 작년에 요한 뉘고르스볼이 구성한 정부는 약속을 이행하지 못했을 뿐만 아니라 군축에 혈안이 된 것처럼 보였습니다. 많은 의원들은 [ROOT.GetName]이(가) 외세의 침략을 억제할 목적으로 신생 [NOR.GetAdjective] 군에 투자할 수 있는 방식으로 산업을 발전시켜야 한다고 믿었습니다.\n\n그리하여 보수당, 즉 우파당(Høyre) 의원들에 의해 불신임 투표가 발의되었습니다. 당의 의장인 산업가 요한 H. 안드레센은 이미 은퇴를 생각하고 있었지만, 그는 노르웨이를 새로운 방향으로 이끌 기회를 잡고 뉘고르스볼의 사회 진보의 꿈에 대한 실용적이고 효율적인 대안으로 자신을 내세웠습니다."
  AAT_norway.12.a: "뉘고르스볼은 물러나고, 안드레센이 들어선다"
  
  AAT_norway.13.t: "크비슬링의 쿠데타"
  AAT_norway.13.desc: "우리가 경제를 발전시키고 해외의 파시스트들을 주시하는 데 바쁜 동안, 우리는 바로 코앞에서 국내 파시즘이 곪아 터지도록 내버려 두었습니다. 그의 지지 기반이 줄어들고 그의 정당인 국민연합(Nasjonal Samling)이 스토르팅에서 단 한 석도 얻지 못했음에도 불구하고, 비드쿤 크비슬링은 [?NOR.NOR_cw_fascist_attacker.GetAdjective]의 지원을 받는 정부를 구성하고 [ROOT.GetNonIdeologyName]의 권력을 장악했다고 주장합니다."
  AAT_norway.13.a: "크비슬링의 시대가 마침내 도래했다!"
  AAT_norway.13.b: "[ROOT.GetNonIdeologyName]의 인민은 결코 너를 용서하지 않을 것이다, 이 반역자야."
  AAT_norway.13.c: "우리는 그들을 지연시키기 위해 할 수 있는 모든 것을 해야 한다!"
  
  AAT_norway.14.t: "유용한 협력자"
  AAT_norway.14.desc: "수년간 [NOR.GetNonIdeologyName]에서 파시즘의 가장 큰 지지자였던 비드쿤 크비슬링이 그의 조국 침공에 도움을 주겠다고 제안했습니다.\n\n그는 우리의 지원을 받아 오슬로에서 쿠데타를 일으켜 [ROOT.GetNameDef]에 우호적인 정권을 수립하기를 원합니다. 일단 자리를 잡으면, 그는 우리 침공의 길을 닦고 [NOR.GetName]에 대한 [ROOT.GetAdjective]의 점령을 정당화할 것입니다."
  AAT_norway.14.a: "그는 쓸모가 있을 것이다"
  AAT_norway.14.b: "이 광대라고? [NOR.GetNonIdeologyName]은(는) 우리가 직접 처리하겠다."
  
  AAT_norway.15.t: "이제 크비슬링의 쿠데타는 불가피합니다!"
  AAT_norway.15.desc: "우리의 최선의 노력에도 불구하고, 비드쿤 크비슬링이 오슬로에서 권력을 장악하려는 시도를 시작했습니다. 침략하는 파시스트들의 지원을 받아, 그는 우리의 적과 협력하는 새 정부의 수립을 선포하고 있습니다.\n\n이것을 좋게 포장할 방법은 없습니다. 우리는 이전부터 지고 있었고, 이 쿠데타는 우리의 전쟁 노력을 더욱 악화시킬 뿐입니다."
  AAT_norway.15.a: "[NOR.GetName]의 미래는 안타깝게도 크비슬링의 것이 될지도 모릅니다"
  AAT_norway.15.b: "계속 항전하겠습니다!"
  
  AAT_norway.16.t: "우리는 망명했지만, 빈손은 아닙니다"
  AAT_norway.16.desc: "[NOR.GetName]에서 비극적으로 후퇴했지만, 지도부가 최악의 상황에 대비해 [NOR.GetAdjective] 영토 탈환에 쓰일 자원을 미리 빼돌린 덕에 최소한의 위안을 얻을 수 있습니다.\n\n이 자원들은 우리의 옛 해안으로 돌아가는 대장정을 시작하는 데 도움이 될 것입니다."
  AAT_norway.16.a: "반드시 돌아가겠습니다!"

  AAT_norway.17.t: "[NOR.GetAdjective]의 영유권 주장"
  AAT_norway.17.desc_monarchist: "[FROM.GetAdjective] 왕실은 수백 년 된 문서를 인용하며, 우리가 통제하는 영토가 법적으로 노르웨이의 호콘 7세 국왕이 계승한 왕위의 일부라고 주장하고 있습니다.\n\n더 구체적으로, 그들은 [GetNorwegianClaims]을 언급하고 있습니다."
  AAT_norway.17.desc_fascist: "[NOR.GetNameDef]의 지도자가 우리 영토 일부의 할양을 요구하고 있습니다. 이는 자신들 민족의 고토를 수복하는 문제라 칭하며, 예상대로 거부할 시 전쟁도 불사하겠다고 위협합니다.\n\n문제의 영토는 [GetNorwegianClaims]입니다."
  AAT_norway.17.desc_denmark: "노르웨이의 호콘 7세 국왕, 즉 우리가 한때 덴마크의 칼 왕자로 알던 인물의 궁정 신하가 우리에게 접근하여 중대한 요구를 해왔습니다. 그들의 주장에 따르면, 출처가 의심스러운 오래된 문서 모음집이 덴마크가 덴마크의 것이 아니라 마땅히 노르웨이 왕국의 일부임을 증명한다고 합니다.\n\n또한 우리가 거부할 경우, 우리의 안전을 위해서라는 명목으로 무력으로 빼앗을 것임을 암시했습니다."
  AAT_norway.17.a: "우리에게 선택의 여지가 없습니다"
  AAT_norway.17.b: "가당치도 않은 소리!"

  GetNorwegianClaims_iceland: "아이슬란드. 현재 노르웨이 왕가가 형성될 때 덴마크 왕실에 부당하게 귀속되었다고 주장합니다."
  GetNorwegianClaims_greenland: "그린란드, 또는 그들이 부르는 에이리크 라우데스 란드. 호콘이 노르웨이의 국왕이 되었을 때 노르웨이에 양도되었어야 했다고 주장합니다."
  GetNorwegianClaims_faroes: "페로 제도. 그들은 이 제도를 자신들 왕위의 일부로 간주합니다."
  GetNorwegianClaims_sweden: "보후슬렌, 달라르나, 옘틀란드 주. 그들의 주장에 따르면 스웨덴 왕실이 훔쳐갔다고 합니다."
  GetNorwegianClaims_bjarmeland: "백해 주변 영토. 그들은 자신들의 바이킹 조상들이 처음 점령했으며, 그곳을 비아르메란드라고 부른다고 주장합니다."
  GetNorwegianClaims_ireland: "렌스터 주. 그들의 주장에 따르면, 자신들의 바이킹 조상들이 처음 식민화했다고 합니다."
  GetNorwegianClaims_scotland: "셰틀랜드 제도와 스코틀랜드 고원지대. 그들은 바이킹 조상들의 정복을 근거로 자신들의 소유라고 주장합니다."
  GetNorwegianClaims_vinland: "빈란드, 우리에게는 뉴펀들랜드 래브라도로 알려진 곳. 자신들의 바이킹 조상들이 처음 발견했다는 사실이 소유권의 근거가 된다고 주장합니다."
  GetNorwegianClaims_denmark: "사실상 덴마크 전체. 실로 대담한 주장입니다."
  AAT_norway.18.t: "[FROM.GetName]이(가) 우리의 요구를 수락했습니다"
  AAT_norway.18.desc_monarchist: "우리는 [FROM.GetAdjective]에 우리의 주장이 정당함을 보이는 데 성공했고, 그 결과 그들은 우리가 주장한 영토를 우리 왕실에 할양하는 데 동의했습니다."
  AAT_norway.18.desc_fascist: "나약한 [FROM.GetAdjective] 정부가 움츠러들었고, 그에 따라 무력으로든 권리로서든 우리에게 속한 영토를 우리가 차지하도록 허락할 것입니다."
  AAT_norway.18.a: "우리 진영에 온 것을 환영한다."
  AAT_norway.19.t: "[FROM.GetName] 우리의 요구를 거부했습니다!"
  AAT_norway.19.desc_monarchist: "[FROM.GetName]이(가) 우리의 정당한 영유권 주장을 거부하여 왕실의 위신이 큰 타격을 입었습니다. 이는 [ROOT.GetAdjective] 왕실에 대한 모욕과 다름없으며 결코 용납할 수 없습니다."
  AAT_norway.19.desc_fascist: "분명히, [FROM.GetAdjective] 국가는 자신들이 누구를 거부하는지 모르는 것 같습니다. 우리의 정당한 영토가 그들에게 점령당하는 것을 좌시하지 않을 것입니다. 이제 남은 선택은 무력으로 되찾는 것뿐입니다."
  AAT_norway.19.a: "그 오만함의 대가를 치르게 될 것입니다"
  
  AAT_norway.20.t: "왕비께서 서거하셨습니다!"
  AAT_norway.20.desc: "잉글랜드에 있는 가족을 방문하던 중, 비극적이게도 수면 중 심부전으로 서거하셨습니다.\n\n원래 웨일스의 모드 공주였던 노르웨이의 왕비께서는, 이미 잉글랜드로 향하고 있는 호콘 국왕과 올라프 왕자뿐만 아니라, 왕국 전역에서 사랑받았기에 모든 노르웨이인들의 슬픔 속에 남게 되었습니다."

  AAT_norway_news.1.desc: "수년간의 힘겨운 망명 생활 끝에, 저명한 혁명가 레프 트로츠키가 [NOR.GetNonIdeologyName]에서 [MEX.GetNonIdeologyName](으)로 도착했습니다. 그는 유명 화가 프리다 칼로와 그녀의 남편 디에고 리베라의 환영을 받았으며, 멕시코시티에 있는 그들의 집에서 머물게 될 것입니다. 이는 트로츠키와 그의 아내에게 아주 좋은 안식처가 될 것입니다.\n\n더 주목할 점은, 그가 [SOV.GetNameDef]에 있는 적들이 제기하는 어떤 위험으로부터도 멀리 떨어져, 아마도 이 라틴 아메리카 국가에서 조용한 망명 생활을 즐길 수 있다는 것입니다."
  AAT_norway_news.1.a: "흥미롭군..."
  AAT_norway_news.1.sov: "그를 처리해야 한다!"

  AAT_norway_news.2.t: "노르웨이의 모드 왕비 서거"
  AAT_norway_news.2.desc: "가족과 오빠인 영국의 조지 5세 국왕을 만나기 위해 잉글랜드를 방문 중이던 노르웨이의 왕비이자 전 웨일스 공주였던 모드 왕비가 수면 중 심부전으로 서거했습니다. 이번 주 초에 받은 복부 수술 후 합병증이 원인으로 추정됩니다.\n\n그녀는 노르웨이에서 사랑받는 인물이었으며, 아들인 올라프 왕자와 남편인 노르웨이 국왕 호콘 7세는 그녀를 깊이 그리워할 것입니다."
  AAT_norway_news.2.a: "우리 모두의 손실입니다"
  AAT_norway_news.2.b: "상대해야 할 왕족이 하나 줄었군!"

  AAT_norway_news.3.t: "노르웨이의 호콘 7세 국왕 서거"
  AAT_norway_news.3.desc: "스키 사고 후 성공적으로 보였던 수술을 마친 뒤, 많은 사랑을 받던 노르웨이의 호콘 7세 국왕께서 의료 합병증으로 서거하셨습니다.\n\n노르웨이는 지금 역사상 가장 어두운 시기 중 하나를 겪고 있으며, 올라프 왕자가 가능한 한 빨리 왕위에 올라 국가를 안전한 항구로 이끌어 주기를 바랍니다."


AAT_norway_news.99.t: "보이테크 국왕, 얀마옌을 자신의 품으로"
AAT_norway_news.99.desc: "세계 대부분에게 간과되었음에도 불구하고, 포병과 왕좌의 운반자인 보이테크 국왕은 이 북극 섬의 잠재력을 보았습니다. \n\n현지 및 새로 온 북극곰들의 도움으로, 얀마옌은 인구가 다시 채워지고 어떤 도전에도 맞설 수 있는 제대로 된 국가로 변모하고 있습니다. 진정 빅토리아 시대 이래로 볼 수 없었던 광경입니다.\n\n시민들 사이에서 한 논쟁적인 인물이 두각을 나타내는데, 그의 옛 이름은 중요하지 않으며, 이제부터는 요한 마옌 대제독으로 알려질 것입니다."
AAT_norway_news.99.a: "이건 감당이 안 되는군!"

  AAT_norway_rikstanken.1.t: "[ROOT.GetAdjective] 전차 계획"
  AAT_norway_rikstanken.1.desc: "전차는 [ROOT.GetAdjective] 군의 무기고에 포함된 적이 없었으며, 우리 스스로 따라잡기에는 너무 늦었을지 모르지만, 그렇다고 해서 완전히 포기해야 한다는 의미는 아닙니다.\n\n첫 단계는 우리의 기갑 부대를 개발하기 위해 획득하거나 협력할 적절한 파트너를 찾는 것입니다. 당연한 답은 유럽의 위대한 군사 강국 중 하나겠지만, 어쩌면 더 가까운 곳에서 공급자를 찾는 것이 장기적인 이점을 가질 수도 있습니다."
  AAT_norway_rikstanken.1.a: "우리의 이웃 [?NOR_nordic_tank_seller.GetName]"
  AAT_norway_rikstanken.1.b: "[?NOR_communist_tank_seller.GetName]은(는) 확실히 수단이 있습니다"
  AAT_norway_rikstanken.1.c: "[?NOR_fascist_tank_seller.GetAdjective] 전차는 유망합니다"

  AAT_norway_rikstanken.2.t: "[NOR.GetAdjective] 기갑 계획에 대한 우리의 접근 방식"
  AAT_norway_rikstanken.2.desc_NORDIC: "우리의 이웃이자 동료 북유럽 국가인 [?NOR_nordic_tank_seller.GetName]은(는) 우리의 기갑 부대에 보급하는 데 사용할 수 있는 발전된 군수 산업을 보유하고 있지만, 우리 같은 작은 나라에는 매우 큰 비용이 들 것입니다.\n\n또한 전차 한 대를 구매하여 이를 바탕으로 어떻게 나아갈지 지켜보는 선택지도 있습니다."
  AAT_norway_rikstanken.2.desc_SOV: "[?NOR_communist_tank_seller.GetName]은(는) 생산 수단을 장악했으며, 이는 대량의 전차를 생산할 능력이 있다는 것을 의미하며, 이를 통해 우리는 적들을 따라잡을 수 있을 것입니다.\n\n또한 이 기회를 이용하여 우리나라의 노동자들에게 공산주의 국가가 무엇을 할 수 있는지 보여주고, [ROOT.GetName] 내에서 공산주의에 대한 지지를 높일 수 있습니다."
  AAT_norway_rikstanken.2.desc_GER: "[?NOR_fascist_tank_seller.GetAdjective] 판처의 위력은 부인할 수 없으며, 그들의 산업력은 우리의 전차 부대를 어떤 목표와도 맞설 수 있도록 구축하게 해줄 것입니다. 또한 그들과 협력하여 우리만의 전차를 개발하고 우리가 할 수 있는 모든 방법으로 그들의 기술자들을 도울 수도 있습니다.\n\n물론, 우리가 이 문제에 어떻게 접근하든 상관없이 그들은 우리가 이념적으로 그들과 함께하기를 기대할 것입니다."
  AAT_norway_rikstanken.2.a: "전차 한 대로 조심스럽게 시작해 보겠습니다"
  AAT_norway_rikstanken.2.b: "경쟁하기 위해서는 물량이 필요합니다"
  AAT_norway_rikstanken.2.c: "무역 협정으로 양국의 이념적 유대를 강화할 수 있습니다"
  AAT_norway_rikstanken.2.d: "우리만의 전차를 개발하는 데 도움을 요청합시다"

  AAT_norway_rikstanken.3.t: "[FROM.GetName]이(가) [ROOT.GetAdjective] 전차 구매를 원합니다"
  AAT_norway_rikstanken.3.desc: "[FROM.GetName] 정부가 전차 구매 허가를 요청하며 우리에게 접근했습니다. 단, 예산상의 이유로 포탑을 제외한 경전차 한 대만 구매할 여력이 있다는 조건입니다.\n\n확실히 의심스러울 만큼 이례적인 요청이지만, 그들은 기갑 부대를 어떻게 구축할지 결정하기 전에 시험해 보고 싶다고 주장합니다."
  AAT_norway_rikstanken.3.a: "전차 한 대쯤은 문제없을 겁니다"
  AAT_norway_rikstanken.3.b: "우리 시간을 낭비할 가치가 없습니다"

  AAT_norway_rikstanken.4.t: "[FROM.GetName]이(가) 우리 전차 구매를 원합니다"
  AAT_norway_rikstanken.4.desc: "[FROM.GetAdjective] 정부는 기갑전에 처음으로 뛰어들기 위해 우리 전차를 구매하길 원합니다.\n\n이는 우리 경제와 군수 산업에 이득이 될 것이지만, 먼저 우리 자신의 전차 비축량과 그들에게 기갑 부대를 맡겨도 될지 신뢰할 수 있는지를 고려해야 합니다."
  AAT_norway_rikstanken.4.a: "무역 협정을 체결합시다"
  AAT_norway_rikstanken.4.b: "우리에겐 이 전차들이 필요합니다"

  AAT_norway_rikstanken.5.t: "[FROM.GetName]이(가) 관계 강화와 전차를 원합니다"
  AAT_norway_rikstanken.5.desc_SOV: "[FROM.GetAdjective] 정부가 우리에게 접근하여 대량의 경전차 구매를 요청했으며, 그들은 무역 협정뿐만 아니라 양국 국민 간의 긴밀한 관계 또한 원하고 있습니다.\n\n이는 [FROM.GetName]의 인민에게 생산 수단을 장악했을 때 무엇을 이룰 수 있는지 보여줄 기회이며, 미래에 더 긴밀한 협력으로 이어질 것입니다."
  AAT_norway_rikstanken.5.desc_GER: "[FROM.GetAdjective] 행정부의 대표단이 우리의 우수한 경전차를 대량으로 구매하길 원합니다.\n\n그뿐만 아니라, 그들은 우리 이념의 원칙에 관심을 보였으며, 자국에 그것을 전파하기 위해 자국민에게 최고의 [ROOT.GetRulingIdeologyNoun]이(가) 어떤 모습인지 보여주길 원합니다."
  AAT_norway_rikstanken.5.a: "그들의 관심을 환영합니다"
  AAT_norway_rikstanken.5.b: "우리 시간을 낭비할 가치가 없습니다"

  AAT_norway_rikstanken.6.t: "[FROM.GetName]이(가) 전차 연구 협력을 원합니다"
  AAT_norway_rikstanken.6.desc: "[FROM.GetAdjective] 정부는 자체 전차 프로그램을 개발하려 하고 있으며, 우리의 도움을 바라고 있습니다. 그들은 이를 통해 기술적, 이념적 노하우를 얻을 수 있을 뿐만 아니라, 우리의 전차 프로그램 또한 이 협정으로 이익을 얻을 것이라고 주장합니다. "
  AAT_norway_rikstanken.6.a: "그들의 전차는 막을 수 없을 것입니다"
  AAT_norway_rikstanken.6.b: "우리에겐 필요 없습니다"

  AAT_norway_rikstanken.7.t: "새로운 국산 전차를 환영합니다"
  AAT_norway_rikstanken.7.desc: "이웃 국가인 [FROM.GetName]이(가) [ROOT.GetName] 최초의 전차 판매를 수락했습니다. 장갑이 두껍지도 않고 포탑조차 없지만, 약간의 노력을 더하면 [ROOT.GetAdjective] 기갑 부대의 시작이 될 수 있을 것입니다."
  AAT_norway_rikstanken.7.a: "왕국 최고의 발상입니다!"

  AAT_norway_rikstanken.8.t: "[FROM.GetNameDefCap]이(가) 전차를 제공할 것입니다"
  AAT_norway_rikstanken.8.desc: "[FROM.GetAdjective] 정부는 우리나라에 대량의 전차를 판매하는 협정을 수락했습니다. 이를 통해 우리 군은 강대국들과 진정으로 경쟁할 수 있게 될 것입니다."
  AAT_norway_rikstanken.8.a: "마침내!"

  AAT_norway_rikstanken.9.t: "[ROOT.GetAdjective]와 [FROM.GetAdjective] 국가, 전차로 더욱 가까워지다"
  AAT_norway_rikstanken.9.desc: "[FROM.GetAdjective] 지도자들은 우리에게 전차를 판매하기로 합의했으며, 이와 함께 [ROOT.GetName]이(가) [FROM.GetAdjective]의 [FROM.GetRulingIdeologyNoun]에 더 동조하여 양국 관계를 더욱 긴밀하게 만드는 공식 조약도 체결될 것입니다."
  AAT_norway_rikstanken.9.a: "이제 [FROM.GetRulingIdeologyNoun]이(가) 승리할 것입니다"

  AAT_norway_rikstanken.10.t: "[FROM.GetNameDefCap], 연구 협정 수락"
  AAT_norway_rikstanken.10.desc: "[FROM.GetAdjective] 사절단은 양국이 이념적으로 계속 협력하는 한, 우리 고유의 전차 개발을 도울 의향이 있음을 확인했습니다. 우리의 협력이 가져올 새로운 전차 개발 접근법은 그들에게도 이익이 될 것이라 확신합니다."
  AAT_norway_rikstanken.10.a: "마침내, 노르웨이 전차다!"

  AAT_norway_rikstanken.11.t: "릭스탕켄에서 배울 수 있는 것"
  AAT_norway_rikstanken.11.desc: "우리 왕국은 한동안 전차 한 대를 보유하고 있었으며, 이 전차는 애정을 담아 릭스탕켄, 즉 '국가의 전차'라는 별명으로 불렸습니다. 우리는 이 전차가 어떻게 작동하고 무엇을 할 수 있는지 보았으니, 이제 한 걸음 더 나아가 전차를 분해하여 궁극적으로 우리만의 전차를 설계하고 제조해 볼 수 있을 것입니다. 결국, 전차 한 대만으로는 전투에서 큰 이점을 얻을 수 없습니다."
  AAT_norway_rikstanken.11.a: "더 많은 전차를!"
  AAT_norway_rikstanken.11.b: "우리는 전차가 필요 없습니다"

  AAT_norway_rikstanken.12.t: "[FROM.GetName], 우리의 제안 거부"
  AAT_norway_rikstanken.12.desc: "[FROM.GetNonIdeologyName]의 도움을 받아 [ROOT.GetAdjective] 전차 프로그램을 시작하려는 우리의 열망에도 불구하고, 그들은 우리의 요청을 거부했습니다. 이는 우리 군을 현대화하려는 희망에 큰 타격이 될 것입니다."
  AAT_norway_rikstanken.12.a: "다른 방법을 찾을 것입니다"

  AAT_rikstanken_program_tech_bonus: "노르웨이 전차 프로그램"


  AAT_norway_allied.1.t: "[FROM.GetName], 투자 모색 중"
  AAT_norway_allied.1.desc: "현재 [NOR.GetAdjective] 정부는 아국의 지원을 받아 자국 산업 발전을 모색하고 있습니다. 이는 수익 창출의 절호의 기회이며, 향후 전쟁 발발 시 잠재적 동맹국으로 육성할 기회이기도 합니다."
  AAT_norway_allied.1.a: "미래의 동맹국을 지원하는 것은 해가 될 것이 없습니다."
  AAT_norway_allied.1.b: "위험 부담이 따를 수 있습니다."

  AAT_norway_allied.2.t: "[FROM.GetNameDefCap]이(가) 아국 발전에 투자할 것입니다"
  AAT_norway_allied.2.desc: "[FROM.GetAdjective] 정부를 향한 아국의 제안이 성공하여, 그들이 아국 경제에 투자하기로 합의했습니다. 이는 양국 관계가 더욱 긴밀해지고, 향후에는 동맹국으로 간주할 수 있음을 의미합니다."
  AAT_norway_allied.2.a: "진전이군요."

  AAT_norway_allied.3.t: "[FROM.GetName]이(가) 아국 경제에 투자하지 않을 것입니다"
  AAT_norway_allied.3.desc: "아국의 노력에도 불구하고, [FROM.GetAdjective] 행정부는 전쟁 발발 시 국가 방위에 필요한 산업 역량 개발을 지원하지 않을 것입니다.\n\n이 사실을 명심해야 합니다."
  AAT_norway_allied.3.a: "다른 방도를 찾아야 할 것입니다."
  
  AAT_norway_allied.4.t: "라케의 후임"
  AAT_norway_allied.4.desc: "크리스티안 라케는 [NOR.GetAdjective] 육군에서 오랫동안 복무했으며, 국가에 대한 위협이 명백해지기 수년 전인 평화 시기, 거의 10년 전에 총사령관으로 임명되었습니다.\n\n전시 작전을 지휘해야 할 경우 그의 능력에 대한 신뢰를 완전히 상실했으므로, 그를 교체해야 합니다. 문제는 누가 [NOR.GetName]군을 승리로 이끌 것인가입니다."
  AAT_norway_allied.4.a: "[NOR.NOR_carl_gustav_fleischer.GetName]은(는) 과감한 선택이 될 것입니다"
  AAT_norway_allied.4.b: "[NOR.NOR_wilhelm_von_tangen_hansteen.GetName]은(는) 잠재력이 있습니다"
  AAT_norway_allied.4.c: "[NOR.NOR_otto_ruge.GetName]이(가) 안전한 선택지입니다"


  AAT_norway_fascist.1.t: "[FROM.GetName]의 나쇼날 삼링이 자국 침공을 요청해왔습니다!"
  AAT_norway_fascist.1.desc: "아국의 대의에 동조하는 [FROM.GetAdjective] 민족주의자 및 파시스트 연합이 [NOR.GetName] 정복에 협력하겠다고 제안해왔습니다. 그들은 정부를 장악하고 아국을 대신하여 [FROM.GetAdjective] 영토를 통치할 기반을 마련했다고 합니다.\n\n이것이 사실이라면 놓치기 아까운 기회일 수 있으나, 공격 준비 태세를 확실히 해야 할 것입니다."
  AAT_norway_fascist.1.a: "[FROM.GetName]이(가) 우리와 함께할 것입니다!"
  AAT_norway_fascist.1.b: "현지인들과 권력을 공유하지 않을 것입니다."
  
  AAT_norway_fascist.2.t: "[FROM.GetNameDefCap]이(가) 아국을 거부했습니다!"
  AAT_norway_fascist.2.desc: "아국의 관대한 제안에도 불구하고, [FROM.GetAdjective] 측은 [ROOT.GetName]을 침공할 경우 아국의 지원이 필요하지도, 원하지도 않는다고 통보해왔습니다. 따라서 [ROOT.GetNameDef] 정부 장악 임무는 독자적으로 수행해야 할 것으로 보입니다."
  AAT_norway_fascist.2.a: "그들은 후회하게 될 것입니다!"

  AAT_norway_fascist.3.t: "[FROM.GetNameDefCap]이(가) 아국을 지원할 것입니다!"
  AAT_norway_fascist.3.desc: "[FROM.GetAdjective] 파시스트 정당 대표들이 아국에 접촉하여, [FROM.GetNameDef]이(가) 정부 장악에 필요한 지원을 제공할 것이라고 확약했습니다.\n\n이를 통해 아국은 암약에서 벗어나 [ROOT.GetName]의 권력을 장악할 수 있을 것입니다."
  AAT_norway_fascist.3.a: "때가 됐습니다!"
  AAT_norway_fascist.5.a: "$AAT_norway_fascist.3.a$"


  AAT_norway_fascist.4.t: "우리의 [NOR.GetAdjective] 동지들이 지원을 요청합니다"
  AAT_norway_fascist.4.desc: "[NOR.GetName]의 파시즘 대표단은 정부가 얼마나 약하고 무능한지에도 불구하고, 지지 기반을 구축하고 [NOR.GetAdjective] 국가의 통제권을 장악하기 위해 고군분투하고 있다고 전해왔습니다.\n\n미래에 유용한 동맹이 될 수 있는 국가의 권력을 장악하도록 우리가 도와야 함이 분명합니다."
  AAT_norway_fascist.4.a: "우리의 파시스트 동지들을 돕겠습니다"
  AAT_norway_fascist.4.b: "이 일로 얻는 이득은 없습니다"
  
  AAT_norway_fascist.6.t: "[FROM.GetNameDefCap]이 거부했습니다!"
  AAT_norway_fascist.6.desc: "[FROM.GetAdjective] 파시스트당 대표단이 끔찍한 소식을 가져왔습니다. [FROM.GetNameDefCap]이 우리의 도움 요청을 거절했습니다.\n\n이는 [ROOT.GetNonIdeologyName]에서 우리가 통제하는 파시스트 정권을 세우려는 노력에 우리 홀로 남겨졌음을 의미합니다."
  AAT_norway_fascist.6.a: "반드시 방법을 찾을 것입니다!"

  AAT_norway_communist.1.t: "[FROM.GetName]이 포모르 무역의 부활을 원합니다!"
  AAT_norway_communist.1.desc: "우리가 혁명을 이루기 수 세기 전부터, 북부 러시아의 포모르인들은 바렌츠해를 건너 그들 국가 북부의 [NOR.GetAdjective] 동지들과 중요한 무역을 해왔습니다.\n이제 그들은 이 오랜 전통을 부활시키자고 제안하고 있습니다. 이는 분명 상호 이익이 될 것이며, 우리 공산주의 국가들을 더욱 가깝게 만들 것입니다."
  AAT_norway_communist.1.a: "바렌츠해가 선박들로 북적일 것입니다!"
  AAT_norway_communist.1.b: "무역은 부르주아적 개념입니다!"  
  
  AAT_norway_communist.2.t: "새로운 포모르 무역"
  AAT_norway_communist.2.desc: "조상들처럼, [FROM.GetNameDef]의 우리 동지들은 최북단 해안을 통해 우리와 무역하기를 열망하고 있습니다. 이는 양국 노동자들에게 우리 공산주의 동지애의 이점을 보여줄 상호 이익이 되는 협정이 될 것입니다."
  AAT_norway_communist.2.a: "전진!"

  AAT_norway_communist.3.t: "[FROM.GetName]이 우리의 무역 제안을 거절했습니다"
  AAT_norway_communist.3.desc: "바렌츠해를 가로지르는 무역의 역사를 공유함에도 불구하고, [FROM.GetNameDef]은 그것을 부활시킬 가치가 없다고 생각합니다. 우리는 최북단 해안을 개발하기 위한 다른 길을 찾아야 합니다."
  AAT_norway_communist.3.a: "어쩔 수 없군요..."

  AAT_norway_communist.4.t: "[FROM.GetName]이 군수 산업 개발 지원을 요청합니다"
  AAT_norway_communist.4.desc: "[FROM.GetName]의 동지들이 우리의 도움을 필요로 합니다. 그들의 혁명으로 우리와 가까워졌으니, 그들의 군 현대화 노력을 지원하는 것이 타당합니다.\n\n동료 공산주의 국가를 지원하는 모습을 보이는 것은 우리에게 정치적 승리가 될 것이며, 그들의 노동자들에게 [ROOT.GetNameDef]이 어떻게 하는지 보여줄 것입니다. "
  AAT_norway_communist.4.a: "그들의 무기는 우리의 적과 싸울 것입니다!"
  AAT_norway_communist.4.b: "그들이 우리에게 무기를 사용할 위험을 감수할 수는 없습니다"

  AAT_norway_communist.5.t: "[FROM.GetNameDefCap]이(가) 수락했습니다!"
  AAT_norway_communist.5.desc: "동지들이 우리의 미약한 지원 요청을 수락했으며, 이제 그들은 우리 혁명 수호에 필요한 군수 산업을 확장할 수 있도록 도울 것입니다."
  AAT_norway_communist.5.a: "이 무기들을 사용해 공동의 적과 싸울 것입니다!"

  AAT_norway_communist.6.t: "[FROM.GetNameDefCap]이(가) 우리의 지원 요청을 거부했습니다!"
  AAT_norway_communist.6.desc: "우리에 대한 그들의 신뢰를 너무 과대평가했던 것 같습니다. [FROM.GetName]은(는) 우리의 군수 생산 증강을 돕고 싶어 하지 않는 듯합니다."
  AAT_norway_communist.6.a: "겁쟁이들!"

  AAT_norway_communist.7.t: "노르웨이 왕가의 몰락"
  AAT_norway_communist.7.desc: "[NOR.GetAdjective] 군주정이 대륙에서 가장 사랑받는 왕가 중 하나였던 시절은 오래전에 지나갔습니다. 국민투표 후에야 왕위에 오르겠다는 호콘 국왕의 고집과 선의의 방임에 대한 그의 헌신은 고귀한 추구였으나, 군주정은 군주정일 뿐이며, 우리가 [ROOT.GetNonIdeologyName]에 건설하고자 하는 평등한 사회에는 설 자리가 없습니다. \n\n호콘 7세 국왕과 올라프 왕세자를 비롯한 나머지 왕족들은 체포되어 평화롭게 추방되었으며, 압류된 자산은 우리의 공산주의 프로젝트 건설에 사용될 것입니다.\n\n[NOR_GetExiledMonarchyLastParagraph]"
  NOR_exiled_monarchy_to_desc_DEN: "덴마크식 이름인 칼 왕자로 돌아간 그는 [DEN.GetName]에서 그의 형제인 프레데리크 국왕에게 영접받을 것이며, 그곳에서 덴마크 사회에서 왕족이 맡는 역할을 수행할 것입니다."
  NOR_exiled_monarchy_to_desc_ENG: "고국인 [DEN.GetName](으)로 돌아가는 것이 선택지가 아니었기에, 전 국왕 호콘과 그의 가족은 이제 [ENG.GetName]에서의 망명을 받아들일 수밖에 없게 되었습니다. 그곳은 한때 덴마크의 칼 왕자와 웨일스의 모드, 즉 전 국왕 부부의 옛 모습이었던 두 사람의 결혼식이 열렸던 땅입니다."
  NOR_exiled_monarchy_to_desc_SWE: "호콘 국왕이나 모드 왕비의 고국으로 돌아갈 수 없게 된 전 왕가는 동정적인 이웃 군주국에서 망명처를 찾아야만 했습니다. 독립한 지 얼마 되지 않아 노르웨이 왕실이 스웨덴 왕실에 의존하게 된 아이러니는 전 세계에 널리 알려져 있습니다."
  NOR_exiled_monarchy_to_desc_NONE: "세상은 1905년과는 매우 다른 곳이 되었습니다. 신생 노르웨이 군주정은 통치할 나라도, 망명 생활을 보낼 뚜렷한 목적지도 없는 처지가 되었습니다. 세계의 군주주의는 곧 종말을 맞이할 것입니다."
  AAT_norway_communist.7.a: "속 시원하군!"
  
  AAT_norway_communist.8.t: "노르웨이 왕가 도착"
  AAT_norway_communist.8.desc_DEN: "노르웨이에서 자신만의 왕가를 이루기 위해 떠났던 우리의 칼 왕자, 또는 수년간 불렸던 이름인 호콘 7세가 [ROOT.GetName](으)로 돌아왔습니다.\n\n그는 끔찍한 공산주의 혁명 이후 갑작스럽게 폐위되고 추방되었으며, 이제 그의 가족과 함께 우리나라에서 망명 생활을 받아들여야 합니다."
  AAT_norway_communist.8.desc_ENG: "노르웨이 왕가는 빅토리아 여왕이 그녀의 손녀 모드와 미래의 호콘 7세 국왕, 당시 덴마크의 칼 왕자의 결혼을 주관하는 등 수년간 우리 왕가와 인연을 맺어왔습니다.\n\n불행히도 혁명으로 인해 그들은 폐위되었고, 덴마크가 더는 선택지가 아니므로 이곳 [ROOT.GetName]에서 망명을 요청할 수밖에 없게 되었습니다."
  AAT_norway_communist.8.desc_SWE: "노르웨이 왕가가 망명길에 올랐으며, 현재로서는 덴마크와 영국에 있는 친척들에게 망명하는 것이 불가능하므로, 그들은 자존심을 버리고 우리에게 거처를 구하기로 했습니다.\n\n가족적인 유대감은 없지만, 동료 스칸디나비아 군주국이 소멸하는 것을 막는 것은 우리의 의무입니다."
  AAT_norway_communist.8.a: "이곳에서 환영받을 것입니다!"
  AAT_norway_communist.8.b: "머물 수는 있지만, 환영받지는 못할 것입니다."

  AAT_norway_monarchist.1.t: "왕실 시종장의 서곡"
  AAT_norway_monarchist.1.desc: "스토르팅의 독립성을 옹호하고 내부적으로 문제를 해결하도록 내버려 두겠다는 호콘 국왕의 고집에도 불구하고, 그의 시종장인 페데르 앙케르 베델-야를스베르그는 위험하게 불안정한 상황에 노르웨이 왕실이 개입할 것을 제안하고 있습니다.\n\n막연한 외세 침략의 위협을 언급하며, 그는 [ROOT.GetName] 국민들이 전국적으로 국왕에 대한 신뢰를 보여주고, 그들이 충성을 맹세한 군주에게 행동을 요구할 것을 촉구합니다.\n\n그는 국왕의 가장 가까운 측근이며, [NOR.GetName]에서 가장 강력한 귀족 가문의 인맥이 넓은 일원이므로, 이러한 전개는 경계를 요합니다."
  AAT_norway_monarchist.1.a: "그의 의도는 무엇일까?"

  AAT_norway_monarchist.2.t: "국왕 폐하 붕어! "
  AAT_norway_monarchist.2.desc: "상상할 수 없는 일이 일어났습니다. 스키 사고 후 성공적인 수술로 보였던 것과 달리, 우리의 경애하는 호콘 7세 국왕 폐하께서 의료 합병증으로 붕어하셨습니다.\n\n우리나라는 지금 역사상 가장 어두운 시기 중 하나를 겪고 있습니다. 올라프 왕세자가 가능한 한 빨리 왕위에 올라 우리나라를 안전한 항구로 이끌어 주기를 바랍니다."
  AAT_norway_monarchist.2.a: "미래에 또 어떤 비극이 닥칠 수 있겠습니까?"
  
  AAT_norway_monarchist.3.t: "우리나라의 왕위 계승"
  AAT_norway_monarchist.3.desc: "온 나라가 사랑하는 국왕 호콘 7세의 서거를 애도하는 가운데, 올라프 왕세자는 전장에만 집중하고 있음이 명백해졌습니다. 설령 그렇지 않더라도, 그는 우리 병사들을 승리로 이끄는 것 외에는 다른 어떤 것도 할 수 없을 만큼 비통에 잠겨 있다고 전해집니다. 이 격동의 시기에 누가 [NOR.GetNameDef]을(를) 이끌어 나갈지 의문이 남습니다. 적어도 마르키스 야를스베르그의 흔들림 없는 지도력에 감사할 따름입니다."
  AAT_norway_monarchist.3.a: "절박한 시기에는 비상한 조치가 필요합니다"
  AAT_norway_monarchist.3.b: "안정을 해칠 수는 없습니다"

  AAT_norway_monarchist.4.t: "노르웨이의 마틸데 1세 여왕"
  AAT_norway_monarchist.4.desc: "왕궁의 밀실에서 무슨 일이 있었는지는 영원히 알 수 없겠지만, 노르웨이 왕국 정부는 故 호콘 국왕의 왕비였던 모드 왕비가 지금부터 마틸데 1세라는 이름으로 왕국을 통치할 것이라고 발표했습니다. 왕위 계승 서열 1위가 올라프 왕세자였기에 이는 특히 이례적인 일이지만, 그는 전쟁에 계속 집중할 수 있도록 이러한 조치를 선호하는 것으로 보입니다. 게다가 그녀는 결국 빅토리아 여왕의 손녀이므로, 그저 여왕의 발자취와 고국의 계승법을 따르는 것일 뿐입니다.\n\n주목할 점은, 마르키스 베델-야를스베르그의 이름이 어떠한 공식 발표에서도 언급되지 않았다는 것입니다. 새로운 정권에서 그의 역할은 물론 행방도 묘연합니다."
  AAT_norway_monarchist.4.a: "마틸데 여왕 폐하 만세!"

  AAT_norway_monarchist.5.t: "섭정의 의도"
  AAT_norway_monarchist.5.desc: "새로운 섭정이 국왕을 대신하여 권력을 잡으면서, 국가에 대한 그의 진정한 의도가 무엇인지 의문이 제기되었습니다. 그는 장기적으로 호콘 국왕을 대체하고자 하는 것일까요, 아니면 단순히 그의 통치를 돕는 데 만족하는 것일까요? 그의 진정한 야망이 무엇인지는 시간이 지나야만 알 수 있을 것입니다."
  AAT_norway_monarchist.5.a: "야를스베르그가 진정한 국왕으로서 국가를 이끌 것입니다"
  AAT_norway_monarchist.5.b: "이웃 국가들과 좋은 관계를 유지하는 것이 최선일 것입니다"
  AAT_norway_monarchist.5.c: "궁극적인 목표는 노르웨이의 옛 영광을 되찾는 것입니다!"
  illegitimate_norwegian_monarchy: "왕위에 오른 불법적인 노르웨이 군주"
  friendly_norwegian_monarchy: "우리의 북유럽 형제들"
  norwegian_imperial_ambitions: "노르웨이의 제국주의적 야망"

  Sweden_rearnament.1.t: "육군 예산"
  Sweden_rearnament.1.desc: "우리 지상군은 군대의 주력으로서 해안, 도시, 국경을 방어하는 임무를 맡고 있습니다.\n하지만 이들은 또한 일반 대중이 받아들이기 어려울 수 있는 막대한 사회적, 금전적 비용을 발생시킵니다"
  Sweden_rearnament.1.a: "군비 축소"
  Sweden_rearnament.1.b: "저예산"
  Sweden_rearnament.1.c: "중간 예산"
  Sweden_rearnament.1.d: "고예산"
  Sweden_rearnament.2.t: "공군 예산"
  Sweden_rearnament.2.desc: "전문가와 권위자들은 미래 전쟁이 육지와 바다뿐만 아니라 하늘에서도 벌어질 것이라고 말합니다. 이 새로운 유형의 전쟁은 강대국들의 주목을 받고 있으며, 미래의 모든 국방에서 결정적인 역할을 할 것이 확실합니다.\n비록 이러한 전쟁 방식이 미래의 대세가 될 것이 분명하지만, 식량이 부족해질 때 평범한 공장 노동자들이 이를 이해할 수 있을까요?"
  Sweden_rearnament.3.t: "해군 예산"
  Sweden_rearnament.3.desc: "수 세기 동안 발트해 주변 국가들은 해협의 통제권을 추구해 왔으며, 스웨덴도 예외는 아닙니다. 최북단에서 북대서양을 마주한 서해안까지 길게 이어진 해안선을 가지고 있습니다.\n우리는 레닌그라드의 붉은 함대와 남쪽의 크릭스마리네로부터 위협을 받고 있습니다.\n강력한 해군이 국방에 필수적이지만, 필요한 거대한 강철 선체는 저렴하지 않습니다. 따라서 신중하게 고려된 예산이 중요합니다."
  Sweden_rearnament.4.t: "재무장 위원회 소집"
  Sweden_rearnament.4.desc: "요청에 따라, 다음 재무장 위원회 소집 시기를 알려달라고 하셨습니다. 바로 지금이 그때이며, 내년 군비 정책을 수립할 기회입니다.\n세계가 전환점을 향해 나아가는 지금, 이 결정은 예측 가능한 미래까지 우리를 구속할 계획이므로 신중함과 명확한 사고가 요구됩니다."
  Sweden_rearnament.4.desc.a: "물론, 명확하게."
  Sweden_rearnament_delta_low: "유효 변경 사항: [?folkhemmet_air_part_delta_low_tooltip]"
  Sweden_rearnament_delta_medium: "유효 변경 사항: [?folkhemmet_air_part_delta_medium_tooltip]"
  army_budget_event_active: "육군 예산 위원회가 활동 중입니다"
  air_budget_event_active: "공군 예산 위원회가 활동 중입니다"
  navy_budget_event_active: "해군 예산 위원회가 활동 중입니다"

  AAT_Sweden.1.t: "정부 위원회, 재무장 권고"
  AAT_Sweden.1.desc: "1930년, 정부는 스웨덴의 미래 국방비 지출에 대한 지침을 제공하기 위해 의회 조사를 임명했습니다. 농민당은 온건파와 함께 지출 증액을 추진하고 있지만, 사회민주당의 페르 알빈 한손 총리는 이러한 움직임이 자신의 사회 개혁 비전을 망가뜨릴 것이라며 강력히 반대하고 있습니다.\n이웃 국가들의 위협적인 수사가 증가하는 가운데, 조사위원회는 이제 확고하게 우파 정당의 편에 섰습니다. 그들은 \"국방을 소홀히 하는 것은 국가와 국민의 이익에 반하는 것\"이라고 밝혔습니다.\n\n이로 인해 페르 알빈 한손이 다가오는 1936년 선거에서 자신의 기반을 다질 때까지 사임하겠다고 위협하면서 정부 위기가 발생했습니다.\n그동안 우리는 다가오는 선거까지 국가를 이끌 누군가를 임명해야 합니다."
  AAT_Sweden.1.a: "농민당이 최선의 선택지입니다"
  AAT_Sweden.1.c: "명백히 우파 야당입니다"
  AAT_Sweden.1.b: "페르 알빈이 사임할 이유는 없습니다"
  AAT_Sweden.1.b_tt: "§R이는 부정적인 정치적 파장을 불러올 것입니다§!"

  AAT_Sweden.2.t: "불신임 투표"
  AAT_Sweden.2.desc: "페르 알빈이 예산 문제에 대해 물러서지 않고 다른 후보를 위해 사임하는 것도 거부하는 가운데, 농민당과 온건파 연합이 총리에 대한 불신임 투표를 제출하기로 결정했습니다.\n\n두 정당이 연합함에 따라 페르 알빈은 사임 외에 다른 선택지가 없었고, 총리직은 공석이 되었습니다. 이로 인해 어느 정당도 권력을 잡을 정치적 영향력이 없는 정부 위기가 발생했습니다.\n\n공식적인 정치 권력이 없는 군주로서는 이례적으로, 국왕이 직접 나서서 이 혼란에 대해 목소리를 냈습니다."
  AAT_Sweden.2.a: "이 사태는 어떻게 끝날 것인가?"

  AAT_Sweden.3.a: "페르 알빈 한손은 국민의 위임을 받았습니다."
  
  AAT_Sweden.3.b: "[AAT_Sweden_3_b_loc]"
  AAT_Sweden.3.axel_is_leader: "악셀은 지금까지 잘 해왔으니, 계속하게 합시다."
  AAT_Sweden.3.axel_is_not_leader: "농민당에게도 기회를 줘야 합니다."
  
  AAT_Sweden.3.c: "[AAT_Sweden_3_c_loc]"
  AAT_Sweden.3.bagge_is_leader: "분명 바게가 우리를 미래로 이끌 것입니다."
  AAT_Sweden.3.bagge_is_not_leader: "온건파, 이 어려운 시기에는 새로운 지도력이 필요합니다"
  
  AAT_Sweden.3.d: "페르 알빈(P-A)이 이 혼란을 야기했으니, 비그포르스가 대신 사회민주당을 이끌어야 합니다"
  AAT_Sweden.3.t: "1936년 스웨덴 총선"
  AAT_Sweden.3.desc: "오늘, [ROOT.GetNameDef] 전역의 국민이 총선에서 투표하기 위해 모이고 있습니다. 예측에 따르면 사회민주당이 릭스다그에서 여러 의석을 얻을 것으로 예상되어 재기가 기대됩니다.\n하지만 농민연합과 우파당 모두 예상치 못한 표심의 변화로 둘 중 하나가 집권하기를 바라고 있습니다. 그러나 불안한 세계 정세 속에서 더 많은 군소 정당이 약간의 지지를 얻을 것으로 예상되므로, 어떤 일이든 일어날 수 있습니다."

  AAT_Sweden.4.t: "한 정치인, 상대방을 \"창피할 정도로 무능하다\"고 비난"
  AAT_Sweden.4.desc: "오늘 릭스다그에서 누가 총리직을 맡아야 하는지에 대한 논쟁이 인신공격으로 번지면서 토론이 과열되었습니다. 칼 셰블롬은 토론 중 글렌 베르너에게 \"당신이 잘하는 건 개 산책시키는 것뿐\"이라고 말하며 그를 비난했습니다.\n\n글렌의 대변인은 그가 개를 키운 적이 없다고 해명했습니다."
  AAT_Sweden.4.a: "어서 총리를 선출해야 할 텐데요"

  AAT_Sweden.5.t: "덤불 속에 숨어있던 정치인 발견"
  AAT_Sweden.5.desc: "오늘 릭스다그 근처 덤불에 숨어 있던 레나르트 얀손이 발견되었습니다. 발각되자 그는 덤불에 숨어 있던 것이 아니라, 유난히 예쁜 무당벌레를 감상하고 있었다고 주장했습니다. 그 후 그는 서둘러 릭스다그 안으로 들어갔습니다.\n그가 덤불에 숨은 것은, 몇 초 전에 들어가는 것이 목격된 정적을 피해 추가적인 총리 심의를 피하려 했던 것으로 추측됩니다."
  AAT_Sweden.5.a: "참 어리석은 짓이군요"

  AAT_Sweden.6.t: "후루룩 소리 논란"
  AAT_Sweden.6.desc: "아그다 쇠를프가 다른 정치인이 새 총리 선출을 위해 연설하는 동안 수프를 \"매우 시끄럽게\" 후루룩 마신 후, 의장은 릭스다그 내 음식물에 관한 새로운 규정을 요구했습니다. 의장은 이를 \"의도적인 방해 행위\"라고 불렀지만, 쇠를프 부인은 최근 심의가 길어져 정상적인 시간에 점심을 먹을 시간이 충분하지 않다고 말했습니다."
  AAT_Sweden.6.a: "더는 후루룩거리지 마시오!"

  AAT_Sweden.7.t: "릭스다그 밖에서 12명 체포"
  AAT_Sweden.7.desc: "오늘 릭스다그 밖에서 12명이 체포되었는데, 이들은 안으로 강제 진입을 시도한 것으로 보입니다. 경찰에 체포되었을 때, 이들은 정치적 혼란 속에서 자신들이 의존하는 사회 복지 서비스가 사라졌다며, 결의안이 더 빨리 통과되도록 압박하고 싶었을 뿐이라고 진술했습니다.\n이들은 로비에서 제지당했는데, 12명 중 한 명인 리카르드 페르손이 불법 담배 밀수 혐의로 경찰에 수배 중이었기 때문입니다. 페르손은 공중화장실을 이용해야 했고, 화장실에 있던 경찰관에게 신원이 발각되어 체포되었습니다.\n페르손은 징역 2년을, 나머지 11명은 최대 6개월의 징역과 경범죄 벌금형을 받을 것으로 예상됩니다."
  AAT_Sweden.7.a: "이런, 맙소사"

  AAT_Sweden.8.t: "릭스다그에서 체포된 11명 석방"
  AAT_Sweden.8.desc: "오늘 릭스다그에 난입하려다 체포된 11명이 보호관찰로 석방되었으며, 1명은 밀수 혐의로 여전히 수감 중입니다."
  AAT_Sweden.8.a: "이 부랑자들이 새사람이 되기를 바랍니다"

  AAT_Sweden.9.t: "담배 밀수범, 새 삶을 살다"
  AAT_Sweden.9.desc: "리카르드 페르손은 다른 11명과 함께 릭스다그에 난입하려다 체포되었습니다. 담배 밀수 혐의로 수배 중이었던 그는 2년간 수감되었습니다. 우리는 그의 현재 행방을 추적했고, 그가 형기를 마친 후 새 삶을 살기로 결심하고 즉시 해군에 입대했다는 소식을 전하게 되어 기쁩니다.\n그의 상급 지휘관들은 그가 뛰어나고 의욕적인 젊은이라는 것을 알게 되었고, 이후 그의 노력과 타고난 재능 덕분에 진급했습니다."
  AAT_Sweden.9.a: "정말 감동적이군요"

  AAT_Sweden.10.t: "헤르만 에릭손, 사직서 제출"
  AAT_Sweden.10.desc: "오늘 헤르만 에릭손이 사직서를 제출하며, 은퇴 후 빈 오크 스프리트 AB의 최고 경영자 직을 맡고 싶다는 의사를 밝혔습니다.\n그의 바람에도 불구하고 정부는 여전히 그를 필요로 할 수 있지만, 국영 주류 생산업체의 CEO로 그를 두는 것에도 이점이 있을 수 있습니다."
  AAT_Sweden.10.a: "그는 아직 정부에 필요합니다"
  AAT_Sweden.10.b: "그를 보내주십시오"

  AAT_Sweden.11.t: "[GER.GetNameDef] 노동자들이 란츠베르크 공장을 장악했습니다"
  AAT_Sweden.11.desc: "[SWE.GetNameDef]과(와) [GER.GetNameDef] 간의 적대 행위가 발발한 후, 독일 인원들이 란츠베르크 공장을 일시적으로 장악하고 단지 내에 바리케이드를 치고 농성하는 데 성공했습니다. 군이 조만간 단지를 장악할 것으로 예상되지만, 교전 중 약간의 피해가 예상되므로 공장은 당분간 완전히 가동되지 못할 것입니다.\n독일 본토에 위치한 란츠베르크 공장에 대해서는 거의 알려진 바가 없지만, 스웨덴 당국은 [GER.GetNameDef] 정부가 보복으로 공장을 압류했을 것이라고 확신합니다."
  AAT_Sweden.11.a: "아마 [GER.GetNameDef] 소유의 군사 단지를 두는 것은 좋은 생각이 아니었나 봅니다"

  AAT_Sweden.12.t: "[?ROOT.GetLeader]이(가) 심장마비로 사망했습니다"
  AAT_Sweden.12.desc: "오늘 [?SWE.bus_capture_tag.GetAdjective] 당국은 [?SWE.GetLeader]의 생포와 그에 이은 사망을 방송했습니다. 그들의 발표에 따르면 [?SWE.bus_capture_tag.GetAdjective] 특공대가 전선 가까이에 고립되어 있던 총리의 이동 지휘부를 부분적으로 포위하는 데 성공했다고 합니다.\n[?SWE.GetLeader]와 그의 참모들이 갇혀 있던 버스와 접촉했을 때, 특공대는 총리가 차량에서 내리다가 비틀거리며 땅에 쓰러지는 것처럼 보였다고 주장했습니다. 계속되는 적대 행위에도 불구하고 [?SWE.bus_capture_tag.GetAdjective] 당국은 국장을 위해 고인이 된 총리의 시신을 정중하게 돌려보냈습니다. 부검 결과 총리가 심장마비를 겪은 후 심정지가 왔다는 것이 밝혀졌습니다.\n뒤따르는 혼란에도 불구하고, 타게 에를란데르가 정식 선거가 치러질 때까지 비상 총리로서 통제권을 인수했습니다."
  AAT_Sweden.12.a: "정말로 비극적인 일입니다"

  AAT_Sweden.13.t: "[SWE.GetNameDefCap]이(가) 노르웨이 북부에 대한 통제권을 요청합니다"
  AAT_Sweden.13.desc: "스웨덴 정부는 나르비크 주변 지역에 대한 통제권을 요청했습니다. 그들은 이것이 단지 인도주의적인 것이며, 진행 중인 분쟁으로부터 노르웨이 국민을 보호하려는 열망에서 비롯된 것이라고 주장합니다. 안보 보장책으로 그들은 해당 지역을 비무장지대로 유지할 것을 제안했으며, 분쟁이 끝날 때까지 필요한 모든 치안 활동을 수행할 것이라고 합니다.\n노르웨이 국민은 스웨덴 점령지 하에서 더 행복할 것이며, 이는 전선의 우리 군대를 위해 더 많은 자원을 확보해 줄 것입니다."
  AAT_Sweden.13.a: "좋은 거래처럼 들리는군요"
  AAT_Sweden.13.b: "모두 [THIS.GetNameDef]의 것입니다"
  AAT_Sweden.13.tt: "§R[SWE.GetName]이(가) 전쟁으로 확대할 수 있습니다§!"

  AAT_Sweden.14.t: "[FROM.GetNameDefCap]이(가) 굴복했습니다"
  AAT_Sweden.14.desc: "[FROM.GetNameDefCap]이(가) 나르비크 주변 비무장지대에 대한 우리의 제안을 수락했습니다. 그들의 군대는 모두 해당 지역을 떠났으며, 우리는 이제 이곳을 비전투 지역으로 선포할 것입니다. 전쟁이 끝나면 [NOR.GetAdjective] 정부가 영토 반환을 요청할 것으로 예상되지만, 지금은 [NOR.GetAdjective] 국민을 안전하게 보호할 것입니다."
  AAT_Sweden.14.a: "구호 물품을 보내는 것부터 시작합시다"
  AAT_Sweden.14.a_tt: "§Y전쟁이 끝나면 [NOR.GetNameDefCap]이(가) 영토 반환을 요구할 것입니다§!"

  AAT_Sweden.15.t: "[FROM.GetNameDefCap]이(가) 우리의 제안을 거절했습니다"
  AAT_Sweden.15.desc: "[FROM.GetNameDefCap]이(가) 나르비크 주변 비무장지대에 대한 우리의 제안을 거절했습니다. 우리는 북유럽 형제들의 이익을 위해 그러한 지대를 고집하거나, 아니면 그들을 어둠 속에 내버려 두는 방식으로 어떻게 대응할지 결정해야 합니다."
  AAT_Sweden.15.a: "이 일로 우리나라를 위험에 빠뜨릴 수는 없습니다"
  AAT_Sweden.15.b: "우리는 [NOR.GetName]을(를) 홀로 내버려 둘 수 없습니다"
  AAT_Sweden.15.a_tt: "§Y만약 그들이 거절하면 [FROM.GetNameDef]에 대한 전쟁 목표를 얻게 됩니다§!"


  AAT_Sweden.16.t: "[SWE.GetNameDef]이(가) 나르비크를 두고 적대 행위를 위협합니다"
  AAT_Sweden.16.desc: "나르비크 주변 지역의 인도를 거부하자, [SWE.GetAdjective] 정부는 우리가 북부 [NOR.GetAdjective] 영토를 넘겨주지 않을 경우 양국 간의 적대 행위가 발발할 것이라고 명백히 위협했습니다."
  AAT_Sweden.16.a: "더 이상의 적을 만들 수는 없습니다."
  AAT_Sweden.16.b: "오라고 하십시오."

  AAT_Sweden.17.t: "[FROM.GetNameDefCap]이(가) 완강히 나르비크 인도를 거부합니다"
  AAT_Sweden.17.desc: "나르비크를 둘러싼 적대 행위를 위협했음에도 불구하고 [FROM.GetName]은(는) 우리의 요구에 굴하지 않았습니다. 우리는 [NOR.GetAdjective] 국민이 비인간적인 환경에서 가축처럼 취급받도록 내버려 둘 수 없으며, 그러지도 않을 것입니다. 침략군을 차단하고 [NOR.GetAdjective] 국민을 해방하기 위해 [NOR.GetAdjective] 항구를 반드시 확보해야 합니다."
  AAT_Sweden.17.a: "Nu har du skitit i det blå skåpet [FROM.GetName]"

  AAT_Sweden.18.t: "[NOR.GetName]이(가) 나르비크 반환을 요청합니다"
  AAT_Sweden.18.desc: "복위된 [NOR.GetAdjective] 정부가 우리가 전쟁 동안 그들과 시민들을 보호한 것에 대한 보답으로 나르비크와 인접 영토의 인도를 요청하고 있습니다. 그들은 공식 성명에서 전쟁 중 우리 정부가 행한 일에 깊이 감사하며, 우리와의 추가적인 협력을 기대한다고 밝혔습니다. 전쟁의 암흑기 동안 이 작은 [NOR.GetAdjective] 독립을 지켜낸 이들을 기리기 위한 기념식이 열릴 것입니다."
  AAT_Sweden.18.a: "물론, 나르비크는 [NOR.GetName]의 것입니다."
  AAT_Sweden.18.b: "우리의 노력에 대한 대가로 나르비크의 영유권을 주장할 것입니다."

  AAT_Sweden.19.t: "[SWE.GetNameDefCap]이(가) 나르비크를 반환합니다"
  AAT_Sweden.19.desc: "마침내 [Nor.GetName]이(가) 다시 통일되는 밝은 날입니다. [SWE.GetName]은(는) 전쟁 동안 [SWE.GetAdjective] 정부가 보호했던 지역인 나르비크를 우리에게 반환해달라는 요청을 흔쾌히 수락했습니다. 우리는 [SWE.GetAdjective] 정부에 깊은 감사를 표했으며, 이는 진실로 우리 양국 간의 더 깊은 유대 관계가 한 시대 동안 지속될 것을 예고합니다."
  AAT_Sweden.19.a: "다시 한번 노르웨이가 하나가 되었습니다."
  AAT_Sweden.19_tt: "§Y[ROOT.GetNameDefCap]§!은(는) 이제 §Y야전 사령관§!에게 §Y노르웨이 명예 국방 십자훈장§!을 수여할 수 있게 됩니다."

  AAT_Sweden.20.t: "[SWE.GetNameDefCap]이(가) 나르비크 반환을 거부합니다"
  AAT_Sweden.20.desc: "전쟁 중 [SWE.GetNameDef]은(는) \"더 끔찍한 점령으로부터 노르웨이 인구를 구한다\"는 명목 하에 우리 영토의 일부를 뻔뻔하게 점령했습니다. 이는 그들 자신의 영토적 야심을 확장하려는 [SWE.GetAdjective] 정부의 계략에 불과했음이 드러났습니다. 그들은 \"전후 지속되는 전 세계적인 안정 문제와 불안\"을 이유로 점령지 반환을 거부했습니다. 우리는 이를 간파하고 있습니다. 이는 명백히 가장 기본적인 형태의 기회주의이며, 우리 국가의 자유와 통합을 위협하는 노골적인 배신 행위입니다. 나르비크는 노르웨이의 영토이며, 필요하다면 무력을 사용해서라도 그렇게 남을 것입니다."
  AAT_Sweden.20.a: "그렇다면 전쟁입니다."

  AAT_Sweden.21.t: "[FROM.GetName]이(가) 우리를 $scandinavian_defense_union$에 초대합니다"
  AAT_Sweden.21.desc: "전승국들 사이의 전후 긴장에 대한 우려를 표하며, [FROM.GetName]은(는) 우리가 고립적 중립이라는 실패한 정책으로 회귀해서는 안 되며, 오히려 미래에 침략을 더 잘 억제할 수 있도록 지역 전반에 걸쳐 군사 및 외교 정책을 조율해야 한다고 주장합니다."
  AAT_Sweden.21.a: "이 제안은 우리의 국익에 부합하지 않습니다."
  AAT_Sweden.21.b: "훌륭한 제안입니다."

  AAT_Sweden.22.t: "[FROM.GetName]이(가) 국방 연합 제안을 거부합니다"
  AAT_Sweden.22.desc: "오늘 [FROM.GetAdjective] 외교관들은 자국 정부가 $scandinavian_defense_union$ 가입을 원치 않는다고 우리에게 통보했습니다. 그들은 적어도 당분간은 그러한 조직 밖에 있는 것이 자국의 이익에 더 부합한다고 주장합니다."
  AAT_Sweden.22.a: "매우 실망스럽습니다."

  AAT_Sweden.23.t: "[FROM.GetName], 동맹 가입 요청"
  AAT_Sweden.23.desc: "[FROM.GetName]이(가) 전후 승전국 간의 긴장 고조 가능성에 대한 우려로 우리 동맹 가입을 요청했습니다. [FROM.GetName]을(를) 동맹에 받아들이면 해당 지역에 대한 우리의 영향력이 확대되겠지만, 추가적인 분쟁이 발생할 경우 그들을 방어해야 할 의무가 생길 것입니다."
  AAT_Sweden.23.a: "그들은 우리 안보에 부담이 될 것입니다."
  AAT_Sweden.23.b: "그들이 합류한다면 더할 나위 없이 기쁠 것입니다."

  AAT_Sweden.24.t: "[FROM.GetName], 동맹 가입 거부"
  AAT_Sweden.24.desc: "[FROM.GetName]이(가) 당분간 우리를 동맹원으로 받아들이는 것을 거부했습니다. 그들은 현시점에서 동맹을 확장하면 더 많은 분쟁에 휘말릴 수 있다는 우려를 표명했습니다. 지금으로서는 우리 혼자 힘으로 나아가야 할 것 같습니다."
  AAT_Sweden.24.a: "매우 실망스럽습니다. "

  AAT_Sweden.25.t: "특수부대 투자"
  AAT_Sweden.25.desc: "신설 특수부대의 자금 배정 방안을 두고 군 고위 참모진 사이에서 오랜 논의가 있었으나, 절차는 교착 상태에 빠졌습니다. 이 교착 상태를 타개할 유일한 방법은 정부가 개입하여 제안 중 하나에 힘을 실어주는 것뿐인 것 같습니다."
  AAT_Sweden.25.a: "우리 지형을 고려하면 레인저가 가장 효과적일 것입니다."
  AAT_Sweden.25.b: "해병대는 우리가 발트해를 장악하는 데 도움이 될 것입니다."
  AAT_Sweden.25.c: "공수부대는 가장 다재다능한 병력이 될 것입니다."

  AAT_Sweden.26.t: "[?195.GetName] 함락"
  AAT_Sweden.26.desc: "생각지도 못한 일이 일어났습니다. 우리 군이 [195.GetnameDef]의 통제권을 상실했으며, 러시아 민족의 핵심 기념물이 이제 적의 손에 넘어갔습니다. 이는 전략적 손실일 뿐만 아니라, 국가적 자부심과 군에 막대한 사기 저하를 초래합니다. 이미 일반 병사들 사이에서는 상당한 사기 저하가 나타나고 있으며, 탈영에 대한 소문이 만연합니다. 만약 이 전쟁을 계속한다면, 우리는 더 이상 헛된 전쟁에 목숨을 바칠 가치가 없다고 믿는 병사들과 함께 싸워야 할 것입니다."
  AAT_Sweden.26.a: "강화를 요청해야 합니다"
  AAT_Sweden.26.b: "이런 망신을 감당할 여유가 없습니다"

  AAT_Sweden.27.t: "[SOV.GetNameDefCap], [?146.GetName] 영유권 주장 포기"
  AAT_Sweden.27.desc: "우리 연합이 [?146.GetName]을(를) 점령한 후 붉은 군대가 입은 피해가 너무나 막대하여 모스크바는 침략 행위를 재고할 수밖에 없었습니다. 그들은 백지 평화에 동의하고 더 이상 영유권을 주장하지 않겠다고 약속했습니다. 스톡홀름과 헬싱키의 시민들은 환호하고 있습니다. 붉은 곰이 종이로 만들어졌다고 누가 생각이나 했겠습니까?"
  AAT_Sweden.27.a: "이는 분명 군의 사기를 진작시킬 것입니다"

  AAT_Sweden.28.t: "[SWE.GetNameDefCap], 상실 영토 반환 요구"
  AAT_Sweden.28.desc: "[SWE.GetLeader]의 수사가 점점 더 제국주의적으로 변해가는 것을 보면, [SWE.GetLeader.GetSheHe]이(가) 이제 잃어버린 제국 영토의 반환을 요구하는 것이 그리 놀라운 일은 아닐 것입니다. 어떠한 영유권 주장도 명백히 시효가 지났으며 기껏해야 허울뿐이지만, 분쟁 중에는 동맹을 잃을 여유가 없습니다. 아마도 선의의 제스처를 보이면 그들 지도자를 만족시킬 수 있을까요?"
  AAT_Sweden.28.a: "절대 안 됩니다"
  AAT_Sweden.28.b: "동맹을 위한 대가입니다"

  AAT_Sweden.29.t: "[FROM.GetNameDefCap], 영토 할양 거부"
  AAT_Sweden.29.desc: "[FROM.GetNameDefCap]은(는) 우리의 주장이 현대 지정학에 너무나 동떨어져 있어 단호한 거절 외의 다른 어떤 것도 이 희극을 너무 오래 끌게 될 것이라고 밝히며, 우리의 옛 식민지 할양 요구를 거절했습니다."
  AAT_Sweden.29.a: "본때를 보여주겠다"

  AAT_Sweden.30.t: "[FROM.GetNameDefCap], 식민지 할양"
  AAT_Sweden.30.desc: "[FROM.GetNameDefCap]은(는) 우리의 요구를 수락하고 이제 우리의 옛 식민지를 할양하고 있으며, 이는 더 큰 반발을 예상했던 우리 정부에게는 놀라운 일이었습니다. 이로 인해 우리의 새로운 영토에서 시위가 발생했지만, 시간이 지나면 분명 진정될 것입니다."
  AAT_Sweden.30.a: "잘못을 바로잡다"

  AAT_Sweden.31.t: "[FROM.GetNameDefCap], 보른홀름 요구"
  AAT_Sweden.31.desc: "[FROM.GetAdjective] 대사가 암울한 메시지를 전달했습니다. 그들은 반란으로 잃었기 때문에 보른홀름 섬이 [DEN.GetName]에 합법적으로 양도된 적이 없다고 주장하며, 우리에게 보른홀름을 반환할 것을 요구합니다. 이는 17세기의 일이었으므로, 이는 명백히 [FROM.GetAdjective]의 팽창주의를 위한 얄팍한 변명에 불과합니다."
  AAT_Sweden.31.a: "[FROM.GetName]과(와) 싸울 여유가 없습니다"
  AAT_Sweden.31.a_tt: "§R이는 결국 [FROM.GetName]이(가) 우리를 괴뢰화할 수 있게 만들 수 있습니다§!"
  AAT_Sweden.31.b: "터무니없는 소리다"

  AAT_Sweden.32.t: "[FROM.GetName], 보른홀름 포기"
  AAT_Sweden.32.desc: "[FROM.GetNameDefCap]은(는) 보른홀름에 대한 우리의 주장에 이의를 제기하지 않겠지만, 이는 북유럽의 안정을 위협하는 전례 없는 조치임을 알려왔습니다."
  AAT_Sweden.32.a: "전례 따위는 집어치워라"

  AAT_Sweden.33.t: "[FROM.GetName], 보른홀름 포기 거부"
  AAT_Sweden.33.desc: "[FROM.GetAdjective] 정부는 우리가 여전히 가지고 있다고 주장하는 어떤 권리든 수 세기 전에 유통기한이 지났다고 밝히며, 보른홀름에 대한 우리의 주장을 고려하지 않을 것이라고 통보했습니다. 그들이 넘겨주지 않는다면, 수 세기 전에 그랬던 것처럼 무력으로 빼앗아야 할 것입니다."
  AAT_Sweden.33.a: "다시 한번 해협을 건널 것이다"

  AAT_Sweden.34.t: "[FROM.GetName], 자치령 요구"
  AAT_Sweden.34.desc: "[FROM.GetAdjective] 대사는 국제 질서가 재정립됨에 따라 [THIS.GetAdjective] 정부는 더 이상 해외 영토를 제대로 보호할 수 없다는 것이 [SWE.GetAdjective] 정부의 견해라고 알려왔습니다. 만약 [THIS.GetName]이(가) 영토를 제대로 방어할 수 없다면, 할 수 있는 누군가에게 양도하는 것이 정부에 이로울 것이며, [FROM.GetAdjective]이(가) 선호되는 선택지가 될 것이라고 합니다."
  AAT_Sweden.34.a: "선택의 여지가 없습니다"
  AAT_Sweden.34.a_tt: "§R이는 [FROM.GetName]이(가) 우리를 괴뢰화할 수 있게 만들 것입니다§!"
  AAT_Sweden.34.b: "우리가 감당할 수 있는 일이 아닙니다"

  AAT_Sweden.35.t: "[FROM.GetName], [DEN.GetAdjective] 해외 영토 할양"
  AAT_Sweden.35.desc: "[FROM.GetName]은(는) 마지못해 자치령을 넘겨주기로 결정했습니다. 이는 분명 [FROM.GetName]과의 관계를 손상시키지만, 머지않아 그들이 우리의 세력권으로 휩쓸려 들어올 것이므로 장기적으로는 문제가 되지 않을 것입니다."
  AAT_Sweden.35.a: "훌륭하다"
  
  AAT_Sweden.36.t: "[FROM.GetName]이(가) [DEN.GetAdjective] 해외 영토 인도를 거부합니다"
  AAT_Sweden.36.desc: "[FROM.GetName]은(는) 신세계 질서에 대한 우리의 비전을 받아들이지 않겠다고 통보했습니다. 우리가 권리를 주장했음에도 불구하고 [FROM.GetAdjective] 정부는 우리의 정당한 영토를 완강히 반환하기를 거부하고 있습니다."
  AAT_Sweden.36.a: "그렇다면 무력으로 빼앗을 것이다"

  AAT_Sweden.37.t: "[DEN.GetName]의 운명"
  AAT_Sweden.37.desc: "[DEN.GetAdjective] 정부는 약화될 대로 약화되어, 이제는 그들에 대한 우리의 지배권을 주장하려는 집중적인 노력에 제대로 맞설 수 없는 지경에 이르렀습니다. 과거 우리가 덴마크인의 지배를 받았듯이, 이제 그들이 우리의 지배를 받게 될 것입니다. 우리는 최후통첩을 전달하기 전에 그들을 어떻게 처리할지 결정하기만 하면 됩니다."
  AAT_Sweden.37.a: "그들을 완충 지대로 활용할 것이다"
  AAT_Sweden.37.b: "$AAT_Sweden.37.a$"

  AAT_Sweden.38.t: "[FROM.GetName]이(가) [DEN.GetName]을(를) 괴뢰화하려 합니다"
  AAT_Sweden.38.desc: "전례 없는 움직임으로, [FROM.GetName]은(는) 우리 정부의 모든 기능과 기관을 자신들에게 이양하라고 요구했습니다. 우리 국가원수는 그들 대사에게 격렬히 항의했지만, 공교롭게도 코펜하겐에서 그리 멀지 않은 곳에서 [SWE.GetAdjective] 전함이 목격되었습니다. [DEN.GetAdjective] 정부는 이러한 위협에 대응할 힘이 없었고, 6시간 후 공식 항복 문서에 서명했습니다."
  AAT_Sweden.38.a: "빌어먹을"

  AAT_Sweden.39.t: "$AAT_Sweden.38.t$"
  AAT_Sweden.39.desc: "전례 없는 움직임으로, [FROM.GetName]은(는) 우리 정부의 모든 기능과 기관을 자신들에게 이양하라고 요구했습니다. 이제 분명해졌습니다. 우리를 도우려 하기보다는, [FROM.GetAdjective] 정부가 우리를 지배하는 데 편안함을 느낄 때까지 우리의 통합성을 조금씩 깎아내고 있었다는 사실이 말입니다."
  AAT_Sweden.39.a: "다시는 그들이 얼음을 건너오지 못하게 하리라!"
  AAT_Sweden.39.b: "$AAT_Sweden.38.a$"

  AAT_Sweden.40.t: "[FROM.GetName]이(가) [145.GetName]을(를) 요구합니다"
  AAT_Sweden.40.desc: "1919년에 그랬던 것처럼, [FROM.GetAdjective] 정부는 또다시 올란드 제도에 대한 분쟁을 일으키고 있습니다. 국제 연맹이 섬의 주권을 우리에게 양도하라고 판결했음에도 불구하고, [FROM.GetName]은(는) 가만히 내버려 두지 못하는 것 같습니다. 아마도 우리가 약한 위치에 있다고 믿고, 연맹이 붕괴하자 피 냄새를 맡은 것이겠지요. 모두 고의적인 기회주의자들입니다."
  AAT_Sweden.40.a: "우리는 [FROM.GetName]과(와) 싸울 수 없다"
  AAT_Sweden.40.b: "절대 양도하지 않을 것이다"

  AAT_Sweden.41.t: "[FROM.GetName]이(가) 굴복했다!"
  AAT_Sweden.41.desc: "[FROM.GetName]이(가) 굴복하여 올란드 제도를 우리에게 양도했습니다. 마침내 과거의 불의가 바로잡히고, 제도의 올바른 지위가 회복되었습니다."
  AAT_Sweden.41.a: "훌륭하다"

  AAT_Sweden.42.t: "[FROM.GetName]이(가) [145.GetName]의 양도를 거부합니다"
  AAT_Sweden.42.desc: "[FROM.GetName]이(가) 국제 연맹에 의해 이미 해결된 사안이라며 [145.GetName]의 할양을 격렬히 거부한다는 의사를 통보해왔습니다. 분명 [FROM.GetName]은(는) 자신들이 실제로 가졌던 영향력을 과대평가하고 있습니다. [FROM.GetName]에게 그들의 방식이 잘못되었음을 보여줘야 합니다."
  AAT_Sweden.42.a: "우리 것이 될 것이다"

  AAT_Sweden.43.t: "[FROM.GetName], [148.GetName]의 비무장화 요구"
  AAT_Sweden.43.desc: "[FROM.GetName]이(가) 우리 북부 국경의 비무장화를 요구했습니다. 그들은 자신들의 채광 작전에 대한 위협을 우려하는 한편, 생각할 수 있는 모든 위협은 서쪽이 아닌 동쪽에서 올 것이라고 강조하고 있습니다. 이는 올란드 위기 이후로 고조되어 온 [FROM.GetName]과 우리 사이의 긴장을 완화할 것입니다."
  AAT_Sweden.43.a: "작은 성의 표시가 긴장을 완화할 수도 있겠지"
  AAT_Sweden.43.b: "이는 우리 주권을 침해하는 행위다"

  AAT_Sweden.44.t: "[FROM.GetName], [148.GetName] 비무장화에 동의"
  AAT_Sweden.44.desc: "선의의 표시로 [FROM.GetName]이(가) [148.GetName]의 비무장화에 동의했습니다. 이는 동방 왕국을 복원하는 데 있어 우리에게 거대한 발판이 되며, [FROM.GetName]에 대한 우리의 영향력은 서서히 커지고 있습니다."
  AAT_Sweden.44.a: "계획대로군"

  AAT_Sweden.45.t: "[FROM.GetName], [148.GetName] 비무장화 거부"
  AAT_Sweden.45.desc: "[FROM.GetName]이(가) 자국 국경 내에서 하는 일에 대해 우리가 결정할 관할권이 없다고 주장하며 [148.GetName]의 비무장화를 거부했습니다. 이는 분명 그들이 우리를 상대로 적극적으로 음모를 꾸미고 있다는 뜻이 아닌가? 우리가 먼저 공격하는 것이 필수적이다."
  AAT_Sweden.45.a: "공모자인가?"

  AAT_Sweden.46.t: "[FIN.GetName] 문제"
  AAT_Sweden.46.desc: "[FIN.GetName]이(가) [SOV.GetAdjective]의 위협에 맞설 수 없다는 것은 모두에게 명백합니다. 핀란드인들은 자신들의 주권을 논하지만, 그들이 독립이라 인식하는 것은 어떤 정치적, 군사적 힘에 의해 주어진 것이 아니라 러시아 내전의 혼란 속에서 탄생한 결과물임을 깨닫지 못하고 있습니다. 그날 이후로 시계는 똑딱거리고 있으며 곧 0을 가리킬 것이고, 오랜 적이 다시 추악한 머리를 내밀 것입니다. 그러므로 [SOV.GetAdjective]이(가) 손을 쓰기 전에 우리가 [FIN.GetAdjective]의 정세에 대한 통제권을 장악하는 것이 필수적입니다."
  AAT_Sweden.46.a: "괴뢰화하라"
  AAT_Sweden.46.b: "$AAT_Sweden.46.a$"

  AAT_Sweden.47.t: "[FROM.GetName], 우리를 괴뢰화하려 움직이다"
  AAT_Sweden.47.desc: "우리 이웃의 안전에 대한 \"우려\"가 모두 계략이었음이 분명합니다. 의지를 상실하고 전략적 이점을 잃은 우리 군은 새로운 지리적 현실에 맞춰 조직되지 않았습니다. 허를 찔린 사이 [FROM.GetAdjective] 군함이 수도 밖에서 목격되었고, [FROM.GetAdjective] 군대가 북부 비무장지대를 넘고 있으며, 우리에게 항복 최후통첩이 전달되었습니다. 국제 사회는 우리를 버렸습니다."
  AAT_Sweden.47.a: "새로운 지배자가 관대하기를 바랄 수밖에."

  AAT_Sweden.48.t: "$AAT_Sweden.47.t$"
  AAT_Sweden.48.desc: "우리 이웃의 안전에 대한 \"우려\"가 모두 계략이었음이 분명합니다. [FROM.GetName] 정부는 이제 우리에게 동쪽의 공동의 적에 맞서 그들과 동맹을 맺을 것을 요구합니다. 그들의 요구를 받아들이는 것은 우리를 다시 한번 [FROM.GetAdjective] 세력권 안에 확고히 넣고 우리의 독립을 훼손할 것입니다. 문제는, 다른 대안이 더 나쁜가 하는 것입니다."
  AAT_Sweden.48.a: "다시는 다른 누군가에게 우리의 운명을 맡기지 않겠다"
  AAT_Sweden.48.b: "$AAT_Sweden.47.a$"

  AAT_Sweden.49.t: "[FROM.GetName]이(가) 굴복을 거부합니다"
  AAT_Sweden.49.desc: "[FROM.GetName]이(가) 우리의 요구를 전면 거부했습니다. 이는 우리의 우려를 노골적으로 무시하는 행위이며, 동시에 우리의 광산 작전을 위협하는 것입니다. 대응은 하나뿐입니다."
  AAT_Sweden.49.a: "외교가 실패했을 때..."

  AAT_Sweden.50.t: "[SWE.GetName]이(가) [144.GetName]을(를) 요구합니다"
  AAT_Sweden.50.desc: "[SWE.GetName]이(가) 나르비크 항구의 완전한 통제권을 요구했습니다. 그들 정부는 적이 나르비크에 상륙하여 스웨덴 철광석 광산을 공격할 수 있다는 우려를 들어 이러한 주장을 정당화하고 있습니다. 이에 동의하지 않을 경우, 분쟁이 더욱 격화될 수 있습니다."
  AAT_Sweden.50.a: "싸울 가치가 없습니다"
  AAT_Sweden.50.b: "터무니없는 소리입니다"
  AAT_Sweden.50.a_tt: "§R이로 인해 [SWE.GetName]이(가) 우리를 괴뢰국으로 만들 수 있게 됩니다§!"

  AAT_Sweden.51.t: "[FROM.GetName]이(가) 굴복합니다"
  AAT_Sweden.51.desc: "[FROM.GetName]이(가) 굴복하여 우리에게 나르비크를 할양했습니다. 이로써 옐리바레와 키루나의 철광석을 확보하는 동시에 [FROM.GetName]을(를) 약화시켰습니다"
  AAT_Sweden.51.a: "훌륭합니다"

  AAT_Sweden.52.t: "$AAT_Sweden.49.t$"
  AAT_Sweden.52.desc: "$AAT_Sweden.49.desc$"
  AAT_Sweden.52.a: "$AAT_Sweden.49.a$"

  AAT_Sweden.53.t: "[NOR.GetName] 문제"
  AAT_Sweden.53.desc: "[SWE.GetAdjective] 정부는 아무런 도발 없이 우리 군대를 해산하고 새로운 북유럽 국가에 합류할 것을 요구했습니다. 그들은 이것이 협력 프로그램이라고 주장하지만, 누가 종속되고 누가 주인이 될지는 명백합니다. 이는 사실상 과거 연합 시절로의 회귀입니다."
  AAT_Sweden.53.a: "절대 안 돼! 무기를 들어라"
  AAT_Sweden.53.b: "저항할 힘이 없습니다"

  AAT_Sweden_ball_bearing.1.t: "[FROM.FROM.GetName]과의 볼베어링 교역 조건 설정"
  AAT_Sweden_ball_bearing.1.desc: "우리의 볼베어링은 최고 수준이며, 세계 열강들이 전쟁 기계를 위해 탐내는 물품입니다. 우리는 이 귀중한 물품을 거래하기 위해 [FROM.GetName]과(와) 협상에 들어가려 합니다. 하지만 먼저 그 대가로 무엇을 원할지 결정해야 합니다."
  AAT_Sweden_ball_bearing.1.a: "식량을 확보해야 합니다"
  AAT_Sweden_ball_bearing.1.a_tt: "\n$we_will_gain_tt$\n  안정도: §G+2%§!\n  주간 인력: §G+15§!. \n이 효과는 중첩될 수 있습니다."
  AAT_Sweden_ball_bearing.1.b: "그들의 군사 전문 지식이 필요합니다"
  AAT_Sweden_ball_bearing.1.c: "지식 공유를 요청합니다"
  AAT_Sweden_ball_bearing.1.c_tt: "\n수락될 경우 [SWE.GetNameDef]은(는) §Y함선§!, §Y레이더§!, §Y합성 자원§! 또는 §Y지원 기술§! 중 하나에 대한 §G+25%§! 연구 보너스를 선택할 수 있게 됩니다!"
  AAT_Sweden_ball_bearing.1.d: "일단 협상 중단"

  AAT_Sweden_ball_bearing.2.t: "[SWE.GetNameDefCap]가 볼 베어링과 식료품의 교역을 요청합니다"
  AAT_Sweden_ball_bearing.2.desc: "[SWE.GetNameDefCap]이(가) 우리 군수 산업의 주요 자원이 될 귀중한 볼 베어링을 식량 수입과 교환하자고 요청했습니다. [SWE.GetAdjective] 정부는 대전쟁 당시 봉쇄 기간 동안 식량 문제가 주요 현안이었던 만큼, 미래에 발생할 수 있는 분쟁에서 이 중요한 수입품을 확보할 방법을 모색하는 것으로 보입니다."
  AAT_Sweden_ball_bearing.2.a: "상호 이익이 되는 교역"
  AAT_Sweden_ball_bearing.2.b: "이를 감당할 수 없습니다"

  AAT_Sweden_ball_bearing.3.t: "[SWE.GetNameDefCap]가 볼 베어링과 군사 전문 지식의 교역을 요청합니다"
  AAT_Sweden_ball_bearing.3.desc: "[SWE.GetNameDefCap]이(가) 우리 군수 산업의 주요 자원이 될 귀중한 볼 베어링을 우리의 군사 전문 지식과 교환하자고 요청했습니다. [SWE.GetAdjective] 정부는 미래에 발생할 수 있는 분쟁에서 군사적으로 더 발전한 유럽 열강과 대등한 경쟁의 장을 마련할 방법을 모색하는 것으로 보입니다."
  AAT_Sweden_ball_bearing.3.a: "$AAT_Sweden_ball_bearing.2.a$"
  AAT_Sweden_ball_bearing.3.b: "$AAT_Sweden_ball_bearing.2.b$"

  AAT_Sweden_ball_bearing.4.t: "[SWE.GetNameDefCap]가 볼 베어링과 지식 공유의 교역을 요청합니다"
  AAT_Sweden_ball_bearing.4.desc: "[SWE.GetNameDefCap]이(가) 우리 군수 산업의 주요 자원이 될 귀중한 볼 베어링을 우리의 과학적 노하우 및 발전상과 교환하자고 요청했습니다. [SWE.GetAdjective] 정부는 과학의 진보를 통해 잠재적인 분쟁에서 우위를 점할 방법을 모색하는 것으로 보이며, 이는 우리가 분명히 도울 수 있는 부분입니다."
  AAT_Sweden_ball_bearing.4.a: "$AAT_Sweden_ball_bearing.2.a$"
  AAT_Sweden_ball_bearing.4.b: "$AAT_Sweden_ball_bearing.2.b$"




  AAT_Sweden_ball_bearing.5.t: "[FROM.GetNameDefCap]이(가) 볼 베어링 교역을 수락했습니다"
  AAT_Sweden_ball_bearing.5.desc: "$AAT_Sweden.25.desc$\n이제 우리는 다른 주요 열강과의 격차를 줄이기 위해 어떤 유형의 기술에 대한 통찰력을 더 얻을지에 집중해야 합니다."
  AAT_Sweden_ball_bearing.5.a: "지원 기술"
  AAT_Sweden_ball_bearing.5.b: "레이더 기술"
  AAT_Sweden_ball_bearing.5.c: "합성 석유 기술"
  AAT_Sweden_ball_bearing.5.d: "함선 기술"

  AAT_Sweden_ball_bearing.6.t: "[FROM.GetNameDefCap]이(가) 볼 베어링 교역을 수락했습니다"
  AAT_Sweden_ball_bearing.6.desc: "[FROM.GetNameDefCap]이(가) 우리의 교역 제안을 흔쾌히 수락했습니다. 이 거래는 우리 양측 모두에게 상호 이익을 가져다줄 것이 분명합니다. 점점 더 불안정해지는 세계에서 교역은 주권 국가 간의 긴장을 완화하는 중요한 도구가 됩니다."
  AAT_Sweden_ball_bearing.6.a: "좋은 소식이군"

  AAT_Sweden_ball_bearing.7.t: "[FROM.GetNameDefCap], 볼베어링 거래 거부"
  AAT_Sweden_ball_bearing.7.desc: "[FROM.GetNameDefCap] 측은 상호 무역 협정 제안을 모두 거부했습니다. 그들은 세계 정치 환경의 급격한 악화를 이유로 들며, 그 결과로 모든 주요 군사 거래를 연기해야 한다고 밝혔습니다."
  AAT_Sweden_ball_bearing.7.a: "유감이군"

  AAT_Sweden_ball_bearing.8.t: "전쟁 발발로 볼베어링 거래 취소"
  AAT_Sweden_ball_bearing.8.desc: "우리 국가들 사이에 전쟁이 발발하자 양국 정부가 볼베어링 거래를 강제로 취소한 것은 놀라운 일이 아닙니다. 한때 세계 대전으로 향하는 느린 행진을 늦추는 디딤돌로 환영받았던 이 무역 협정은 의심할 여지 없이 실패했습니다.\n이제 이 핵심 도구들은 전쟁 기계로 변모하여 결국 피와 고통, 그리고 괴로움만을 낳을 것입니다."
  AAT_Sweden_ball_bearing.8.a: "불가피한 일이었나?"


  AAT_Sweden_flashpoints.10.t: "[SWE.GetName] 북부에 [SOV.GetAdjective] 공습"
  AAT_Sweden_flashpoints.10.desc: "오늘 [FIN.GetAdjective] 국경 근처 마을인 파얄라의 주민들이 여러 건물과 차량을 파괴한 연쇄 폭발에 놀랐습니다. 다행히 중상자는 없었습니다. 증거에 따르면 폭발은 [SOV.GetAdjective] 폭격기들이 해당 지역을 [FIN.GetName]의 목표물로 오인하여 발생한 것이 명백합니다.\n\n여론이 걷잡을 수 없이 악화되기 전에 상황을 통제해야 합니다. 그러나 [SOV.GetNameDef]와의 더 큰 분쟁을 유발하지 않도록 경계해야 합니다. "
  AAT_Sweden_flashpoints.10.a: "전 세계가 이 침략 행위를 알아야 합니다."
  AAT_Sweden_flashpoints.10.b: "사태 악화를 피하기 위해 [SOV.GetAdjective] 대사관에 신중히 접근할 것입니다."
  AAT_Sweden_flashpoints.10.c: "소비에트와 대립해봤자 얻을 것은 거의 없습니다."

  AAT_Sweden_flashpoints.11.t: "파얄라 폭격에 격분한 [SWE.GetName]"
  AAT_Sweden_flashpoints.11.desc: "[SOV.GetAdjective] 조종사들이 [FIN.GetName]의 목표물로 오인하여 [SWE.GetAdjective] 마을에 실수로 공습을 감행했습니다. [SWE.GetAdjective] 정부는 이제 분노에 차 행동하며, 이 불행한 사고에 대한 전 세계의 주목을 끌고 있습니다.\n\n우리가 이 사건을 인정하고 피해에 대한 배상금을 제안할 수도 있지만, 이는 우리 국민이 [FIN.GetName]에서의 군사 행동에 의문을 제기하게 만들고 다른 국가들에게 약점의 표시로 비칠 수 있습니다."
  AAT_Sweden_flashpoints.11.a: "더 큰 분쟁에 휘말릴 위험을 감수할 수 없습니다. [SWE.GetAdjective] 정부에 사과하겠습니다."
  AAT_Sweden_flashpoints.11.b: "관련 사실을 부인하고 [SWE.GetAdjective] 측이 공격을 스스로 조작했다고 비난하십시오."

  AAT_Sweden_flashpoints.12.t: "[SWE.GetAdjective] 외교관, 파얄라 폭격에 대한 해명 요구"
  AAT_Sweden_flashpoints.12.desc: "[SOV.GetAdjective] 조종사들이 [FIN.GetName]의 목표물로 오인하여 [SWE.GetAdjective] 마을에 실수로 공습을 감행했습니다. [SWE.GetAdjective] 대사관의 대사들이 우리에게 접근하여 공격에 대한 해명과 배상 방안을 요구하고 있습니다.\n\n다행히 사고 소식이 퍼지지 않아, 사태가 더 악화되기 전에 신속하게 해결할 기회가 있습니다."
  AAT_Sweden_flashpoints.12.a: "피해에 대해 [SWE.GetName]에 배상금을 지불하겠습니다."
  AAT_Sweden_flashpoints.12.b: "관련 사실을 부인하고 [SWE.GetAdjective] 측이 공격을 스스로 조작했다고 비난하십시오."

  AAT_Sweden_flashpoints.13.t: "[SOV.GetNameDefCap], 파얄라 폭격에 대해 사과"
  AAT_Sweden_flashpoints.13.desc: "[SOV.GetNameDef] 관리들이 최근 파얄라에서 발생한 공격에 대해 사과하며, 조종사들의 순전한 실수였다고 주장했습니다. 그들은 또한 발생한 피해에 대해 우리에게 배상하기로 합의했습니다. [SOV.GetAdjective] 측은 우리 사이의 추가적인 사태 악화를 피하기 위해 관계에서 보다 협조적인 태도를 취하려는 것으로 보입니다."
  AAT_Sweden_flashpoints.13.a: "이 문제는 해결된 것으로 간주하겠습니다."

  AAT_Sweden_flashpoints.14.t: "[SOV.GetNameDefCap], 파얄라 사건 개입 인정 거부"
  AAT_Sweden_flashpoints.14.desc: "우리 외교관들이 [SOV.GetAdjective] 관리들과 파얄라 사건을 추궁하려 했으나, 그들은 개입 사실을 부인하고 있습니다. 더 나아가, 그들은 [FIN.GetName]에서의 군사 작전을 방해하기 위한 구실로 폭격의 책임을 우리에게 떠넘기려 하고 있습니다. "
  AAT_Sweden_flashpoints.14.a: "터무니없는 태도입니다. 그들이 대가를 치르게 할 것입니다."
  AAT_Sweden_flashpoints.14.b: "상황을 악화시킬 위험을 감수할 수는 없습니다."

  AAT_Sweden_flashpoints.15.t: "[SWE.GetName], 군사 원조 파견"
  AAT_Sweden_flashpoints.15.desc: "[SOV.GetAdjective] 폭격기들이 최근 우리 영공을 넘어 [SWE.GetName]으로 진입해, [FIN.GetAdjective] 목표물로 오인한 마을을 폭격하는 것이 목격되었습니다. 그 이후로 [SOV.GetNameDef]과 [SWE.GetName] 사이에 외교적 위기가 발생했으며, 이제 [SWE.GetName]이 [SOV.GetAdjective]에 맞서 싸울 무기를 우리에게 적극적으로 공급하기로 결정할 정도로 상황이 악화되었습니다. [SOV.GetAdjective]이 어떻게 대응할지는 두고 봐야 합니다."
  AAT_Sweden_flashpoints.15.a: "비극적인 일이지만, 우리의 [SWE.GetAdjective] 이웃에게 감사합니다."

  AAT_Sweden_flashpoints.16.t: "[SWE.GetName]과의 긴장 완화"
  AAT_Sweden_flashpoints.16.desc: "[SWE.capital.GetCapitalVictoryPointName]과 [SOV.capital.GetCapitalVictoryPointName] 간에 고조되던 일련의 긴장 사태 끝에, 마침내 긴장이 완화되는 것 같습니다. [SWE.GetAdjective] 정부는 파얄라 사건을 둘러싼 공격적인 수사를 철회했으며, 우리가 이를 인정하도록 할 수 있는 방법이 거의 없다는 것을 받아들인 것 같습니다. "
  AAT_Sweden_flashpoints.16.a: "이제야 물러서는군요."

  AAT_Sweden_flashpoints.17.t: "[SWE.GetName], [FIN.GetName] 무장으로 긴장 고조"
  AAT_Sweden_flashpoints.17.desc: "파얄라 폭격 사건으로 우리의 명성을 훼손하려던 [SWE.GetName]의 시도가 실패하자, 이제 그들은 공공연하게 [FIN.GetAdjective] 군을 보병 장비로 무장시키고 있습니다. 이는 우리가 공격에 대한 책임을 인정하게 하거나, 더 많은 소비에트 병사들의 죽음을 감수하게 하려는 명백한 협박 시도입니다. \n\n우리는 [SWE.GetAdjective]이 [FIN.GetAdjective]의 동맹국으로서 전쟁에 완전히 휘말리는 것을 막기 위해 다음 수를 신중하게 평가해야 합니다."
  AAT_Sweden_flashpoints.17.a: " 그들이 멈추지 않는다면, 우리는 전쟁 위협으로 긴장을 완화시키기 위해 상황을 격화시킬 것입니다."
  AAT_Sweden_flashpoints.17.b: " 지금은 [SWE.GetAdjective]을 달래야 합니다."

  AAT_Sweden_flashpoints.18.t: "[SOV.GetNameDefCap], 무기 수송 중단 요구"
  AAT_Sweden_flashpoints.18.desc: " 우리가 [FIN.GetName]에 의도적으로 도발적인 무기를 수송한 것이 [SOV.GetNameDef]의 주목을 끌었습니다. 모스크바의 외교관들은 [SOV.GetLeader]이 우리의 행동을 [SOV.GetNameDef]에 대항하는 분쟁에 참여하는 것과 마찬가지로 간주하며, 우리에 대해 모든 필요한 조치를 취할 것이라고 통보해 왔습니다."
  AAT_Sweden_flashpoints.18.a: "[SOV.GetLeader]은 허세를 부리는 것이며 우리는 속지 않을 것입니다. 수송을 계속하십시오."
  AAT_Sweden_flashpoints.18.b: "소비에트와의 추가적인 긴장 고조를 감수할 수 없습니다."

  AAT_Sweden_flashpoints.19.t: "[SWE.GetName], 최후통첩 거부"
  AAT_Sweden_flashpoints.19.desc: "[SWE.GetAdjective] 외교관들은 우리가 파얄라 폭격에 대한 개입을 인정하고 배상금을 지불할 때까지 무기 수송을 중단할 의사가 없음을 분명히 했습니다. 만약 우리가 위협에 따라 행동하지 않는다면, 이 지역의 다른 강대국들이 우리를 자신들의 공격적인 행동을 위한 손쉬운 목표물로 볼 수 있습니다. 그러나 우리의 [FIN.GetAdjective] 군사 작전에 여러 국가를 얽히게 하면 분쟁이 세계적인 규모로 확대될 수 있습니다."
  AAT_Sweden_flashpoints.19.a: "그들은 우리에게 선택의 여지를 남기지 않았습니다."
  AAT_Sweden_flashpoints.19.b: "지금은 [SWE.GetAdjective]을 달래야 합니다."

  AAT_Sweden_flashpoints.20.t: "[SWE.GetName], 반-[SOV.GetAdjective] 동맹 제안"
  AAT_Sweden_flashpoints.20.desc: "[SWE.GetName]과 [SOV.GetNameDef] 간의 최근 긴장 고조가 공개적인 분쟁으로 번지면서, [SWE.GetAdjective] 대사들은 우리의 공동의 적에 대항하는 군사 동맹으로 그들과 더 긴밀하게 협력할 것을 제안했습니다."
  AAT_Sweden_flashpoints.20.a: "함께라면, [SOV.GetAdjective]의 위협을 극복할 수 있습니다."
  AAT_Sweden_flashpoints.20.b: "우리 힘으로도 충분히 감당할 수 있습니다."
  SWE_nordic_defense_pact: "북유럽 방위 조약"

  AAT_Sweden_flashpoints.21.t: "[SWE.GetAdjective]-[FIN.GetAdjective] 동맹"
  AAT_Sweden_flashpoints.21.desc: "[SWE.GetName]과 [SOV.GetNameDef] 간의 긴장이 최근 고조되어 전면전으로 번지자, 외교관들은 [FIN.GetAdjective] 측에 접촉하여 공동의 적에 맞서는 군사 동맹을 결성할 것을 제안하고 있습니다."
  AAT_Sweden_flashpoints.21.a: "양국 간의 협력을 더욱 증진해야 합니다."
  AAT_Sweden_flashpoints.21.b: "[FIN.GetAdjective]의 지원 없이도 [SOV.GetLeader]를 격파할 수 있습니다."

  AAT_Sweden_flashpoints.22.t: "[FIN.GetName], 동맹 제안 거절"
  AAT_Sweden_flashpoints.22.desc: "[FIN.GetAdjective] 외교관들은 [SOV.GetNameDef]라는 공동의 적이 있음에도 불구하고, 자국 정부의 전략적 목표가 우리와 너무 다르다고 알려왔습니다. 따라서 유감스럽게도 우리의 동맹 제안을 거절했습니다."
  AAT_Sweden_flashpoints.22.a: "유감스러운 결정입니다."

  AAT_Sweden_flashpoints.30.t: "[SWE.GetName] 내 통행권"
  AAT_Sweden_flashpoints.30.desc: "스칸디나비아에 성공적으로 발판을 마련했지만, 덴마크 해협을 통한 병력 및 장비 수송은 위험할 수 있습니다. 수송선단은 공해상에서 적의 공중 및 해상 공격의 먹잇감이 되기 쉽습니다. 따라서 해상 항로 사용을 최대한 줄이는 것이 전쟁 수행에 이로울 것입니다. \n\n따라서 이웃 국가인 [SWE.GetName]에 압력을 가해 철도 및 통신망에 대한 접근권을 허용하도록 하는 것이 가치가 있을 수 있습니다. 하지만 적의 작전 기지가 되는 것을 피하려면, 우리는 신중하게 행동하여 점진적으로 그들의 중립을 훼손해야 할 것입니다."
  AAT_Sweden_flashpoints.30.a: "[SWE.GetName]에 접근하여 철도망을 통한 인도주의적 통행을 요청하십시오."
  AAT_Sweden_flashpoints.30.b: "우리는 [SWE.GetAdjective]의 기반 시설이 필요 없습니다."

  AAT_Sweden_flashpoints.31.t: "[GER.GetName], 부상병 통행권 요청"
  AAT_Sweden_flashpoints.31.desc: "[GER.GetAdjective] 정부 관계자들이 우리에게 접근하여, 부상병과 휴가 중인 병사들이 [SWE.GetName]과 [DEN.GetName]을 거쳐 [GER.GetNameDef](으)로 오갈 수 있도록 철도망의 제한적 사용을 요청했습니다. 그들은 이 요청이 순전히 인도주의적 이유라고 주장하지만, 이를 이용해 우리의 중립을 점차 침해하리라는 것은 쉽게 상상할 수 있습니다."
  AAT_Sweden_flashpoints.31.a: "중립보다 생존이 더 중요합니다."
  AAT_Sweden_flashpoints.31.b: "요청을 거절하고 우리의 중립을 상기시키십시오."

  AAT_Sweden_flashpoints.32.t: "[SWE.GetName], 요청 거부"
  AAT_Sweden_flashpoints.32.desc: "[SWE.GetName]은 중립에 대한 약속을 내세우며 우리의 기반 시설 접근을 완강히 거부했습니다. 어쩌면 그들의 지속적인 독립이 우리가 유럽을 재편하는 동안 그들의 순응에 대한 보상에 불과하다는 것을 상기시켜주기 위해 더 단호한 대응이 필요할지도 모릅니다."
  AAT_Sweden_flashpoints.32.a: "[GER.GetLeader]가 그들의 중립을 의심하기 시작했다고 알리십시오."
  AAT_Sweden_flashpoints.32.b: "이 문제를 그만두십시오. 그들이 적에게 합류하는 위험을 감수할 수 없습니다."

  AAT_Sweden_flashpoints.33.t: "아돌프 히틀러, [SWE.GetAdjective]의 중립에 의문을 제기하다"
  AAT_Sweden_flashpoints.33.desc: "[GER.Capital.GetCapitalVictoryPointName](으)로부터 [GER.GetLeader]가 우리의 최근 요청 거부에 실망했다는 내용의 강경한 어조의 전보를 받았습니다. 보아하니 [GER.GetAdjective] 지도자는 우리의 중립에 의문을 품기 시작했으며, 우리의 최근 행동이 [GER.GetName]의 적들 편에 서려는 움직임을 시사한다고 믿는 것 같습니다. \n\n필요하다면 상황을 분쟁으로 격화시킬 의향도 있는 것으로 보입니다. 따라서 이제 우리의 현재 입장을 재평가할 때가 된 것 같습니다."
  AAT_Sweden_flashpoints.33.a: "생존이 중립보다 더 중요합니다."
  AAT_Sweden_flashpoints.33.b: "[GER.GetLeader]의 강압에 굴하지 않을 것이며, 병력 동원을 시작합니다. "

  AAT_Sweden_flashpoints.34.t: "[SWE.GetName] 군사 대비 태세 격상"
  AAT_Sweden_flashpoints.34.desc: "[SWE.GetAdjective]군이 의도적으로 도발적인 방식으로 높은 수준의 대비 태세에 돌입했습니다. 이는 우리의 압력에 저항하겠다는 의지를 보여주기 위함일 것입니다. 신중하게 행동해야 합니다. 그렇지 않으면 스칸디나비아에서 또 다른 분쟁에 휘말릴 위험이 있습니다."
  AAT_Sweden_flashpoints.34.a: "[SWE.GetName] 공격 준비를 시작하고 최후통첩을 보냅니다."
  AAT_Sweden_flashpoints.34.b: "이런 위험을 감수할 가치는 없습니다."

  AAT_Sweden_flashpoints.35.t: "[GER.GetName], 최후통첩 발령"
  AAT_Sweden_flashpoints.35.desc: "[GER.GetNameDefCap]이(가) 단호한 최후통첩을 보냈습니다. 그들은 우리 기반 시설 접근에 대한 최근 요구를 수용하라고 요구합니다. 만약 우리가 이를 이행하지 않을 경우, 우리를 [GER.GetNameDef]의 적으로 간주하고 스칸디나비아에서의 이익을 확보하기 위해 필요한 모든 무력을 사용할 것이라고 명시되어 있습니다."
  AAT_Sweden_flashpoints.35.a: "생존이 중립보다 더 중요합니다."
  AAT_Sweden_flashpoints.35.b: "전쟁이 불가피하다면, 우리에게 유리한 조건에서 싸워야 합니다."
  AAT_Sweden_flashpoints.35.c: "우리의 중립 노선에서 흔들리지 않을 것입니다."

  AAT_Sweden_flashpoints.36.t: "[GER.GetNameDef](와)의 긴장 완화"
  AAT_Sweden_flashpoints.36.desc: "최근 [GER.GetNameDef](와)의 긴장이 다행히도 해소되기 시작했습니다. 그들의 모든 허세에도 불구하고, 우리는 매우 어려운 외교적 상황을 헤쳐나간 것 같습니다. 하지만 우리의 최근 행동이 [GER.Capital.GetCapitalVictoryPointName]에서 우리에 대한 큰 분노를 불러일으켰을 가능성이 있으므로 경계를 늦추지 말아야 합니다."
  AAT_Sweden_flashpoints.36.a: "우리의 중립을 유지할 수 있기를 바랍니다."

  AAT_Sweden_flashpoints.37.t: "[SWE.GetName], 최후통첩 거부"
  AAT_Sweden_flashpoints.37.desc: "[SWE.GetAdjective] 정부는 자신들의 중립을 나약함이나 준비 부족의 인정으로 오해해서는 안 된다고 말하며 우리의 최후통첩을 단호히 거부했습니다. 그들은 만약 [SWE.GetName]에 대한 무모한 조치가 취해진다면, 우리 군은 심각한 인명 손실을 각오해야 할 것이라고 덧붙였습니다. \n\n이는 단순히 군사 행동을 억제하기 위한 허세일 수도 있지만, 스웨덴군을 관찰한 결과 그들은 독립을 위해 싸울 의지가 있는 것으로 보입니다."
  AAT_Sweden_flashpoints.37.a: "군을 무리하게 확장하는 위험을 감수할 수는 없습니다."
  AAT_Sweden_flashpoints.37.b: "[SWE.GetName] 침공을 시작합니다."

  AAT_Sweden_flashpoints.38.t: "[SWE.GetName], 선제공격 개시"
  AAT_Sweden_flashpoints.38.desc: "우리가 [SWE.GetAdjective]의 전투 의지를 심각하게 오판한 것 같습니다. 한 세기가 넘는 중립에도 불구하고, [SWE.GetAdjective] 군은 오늘 노르웨이에 있는 우리 군을 기습 선제공격했습니다. 분쟁의 결과는 아직 정해지지 않았지만, 우리 [SWE.GetAdjective] 상대의 대담함에 마지못해 경의를 표하지 않을 수 없습니다."
  AAT_Sweden_flashpoints.38.a: "[SWE.GetName]은(는) 우리 역사의 각주에 불과할 것입니다."
 
  AAT_Sweden_flashpoints.39.t: "[SWE.GetName], 부상병 통과 허가"
  AAT_Sweden_flashpoints.39.desc: "[SWE.GetName]이(가) 우리 부상병과 휴가 중인 병사들이 자국 철도망을 통해 [GER.GetNameDef](으)로 돌아가는 것을 허가했습니다. 하지만 비무장 인원만 통과할 수 있으며, 특정 시간에 스웨덴에 너무 많은 병력이 주둔하지 않도록 엄격한 할당량이 적용될 것이라고 주장합니다. "
  AAT_Sweden_flashpoints.39.a: "훌륭합니다. 더 이상 그들을 자극하지 않도록 하겠습니다."
  AAT_Sweden_flashpoints.39.b: "계속 압박하면, 그들의 통신망에 접근할 수 있을지도 모릅니다."

  AAT_Sweden_flashpoints.40.t: "[GER.GetName]이(가) 전화 및 전신망 접근을 요청"
  AAT_Sweden_flashpoints.40.desc: "우려했던 대로, 최근 독일이 우리 철도망에 대한 접근을 요청한 것이 이제 확대되었습니다. [GER.Adjective] 정부는 [NOR.GetName]과 [GER.GetNameDef] 간의 직접적인 통신을 위해 우리의 전신 및 전화망을 사용할 수 있도록 요청하고 있습니다.\n\n이 요구에 굴복하는 것은 우리의 중립에 또 다른 타격이 될 것이지만, 우리는 [GER.GetAdjective] 군대가 무엇을 계획하고 있는지 염탐하기 위해 통신선을 도청하는 것을 검토할 수 있습니다."
  AAT_Sweden_flashpoints.40.a: "생존이 중립보다 더 중요합니다."
  AAT_Sweden_flashpoints.40.b: "이것을 우리에게 유리하게 이용할 수 있습니다."
  AAT_Sweden_flashpoints.40.c: "우리는 중립을 포기할 수 없습니다."
  SWE_spying_on_GER: "우리 통신망을 통과하는 독일 통신을 염탐 중"
  AAT_Sweden_flashpoints_tt_arne_beurling: "고문으로 §Y아르네 베울링§!($MODIFIER_DECRYPTION_POWER$: §G+15§!)을(를) 해제합니다"

  AAT_Sweden_flashpoints.41.t: "[SWE.GetName], 전화 및 전신망 접근 허용"
  AAT_Sweden_flashpoints.41.desc: "스웨덴 정부의 협력 덕분에 [GER.Capital.GetCapitalVictoryPointName]과 [NOR.GetName] 주둔 우리 군대 간의 통신이 상당히 쉬워졌습니다. 우리가 얻은 양보를 잃을 위험을 감수하지 않도록 그들을 더 이상 적대시하지 말아야 할 것입니다. "
  AAT_Sweden_flashpoints.41.a: "훌륭합니다. 그들에게서 얻을 수 있는 만큼 얻었습니다."
  AAT_Sweden_flashpoints.41.b: "완전한 군사 통행권을 위해 마지막으로 한 번 더 압박해야 합니다."

  AAT_Sweden_flashpoints.42.t: "[GER.GetName], 군사 통행권 요청"
  AAT_Sweden_flashpoints.42.desc: "우리에게서 얻은 이전의 양보에 만족하지 못한 [GER.GetNameDef] 정부는 스칸디나비아에서의 군사 작전 부담을 덜기 위해 군사 통행권을 요청했습니다. 이것이 항상 [GER.GetAdjective]의 의도였음이 분명해 보이며, 우리 중립의 마지막 흔적을 양보하지 않는 것은 [GER.GetLeader]이(가) [SWE.GetName]을(를) 침공하는 명분으로 사용될 것입니다. 그러나 만약 우리가 접근을 허용한다면, 우리 이웃 국가들과 [GER.GetNameDef]의 적들은 우리가 그들의 [NOR.GetName] 점령에 공모한 것으로 볼 것입니다."
  AAT_Sweden_flashpoints.42.a: "우리는 [GER.GetName]과 싸울 힘이 없습니다."
  AAT_Sweden_flashpoints.42.b: "이 전쟁에 휘말리지 않으려면 이 요구에 저항해야 합니다."

  AAT_Sweden_flashpoints.43.t: "[SWE.GetName], 군사 통행권 허용"
  AAT_Sweden_flashpoints.43.desc: "[SWE.GetName]이(가) 자국에 대한 완전한 군사 통행권을 우리에게 부여했습니다. 이는 스칸디나비아에서의 우리 작전에 도움이 될 뿐만 아니라, [SWE.GetName]에 대한 우리의 영향력을 증대시키고 그들이 쉽게 우리 적들에게 합류하는 것을 막아줍니다."
  AAT_Sweden_flashpoints.43.a: "그들은 이름만 빼고는 우리 통제하에 있습니다."
  SWE_GER_military_access_tt: "§Y[GER.GetFlag][GER.GetNameDefCap]§!이(가) §Y[SWE.GetFlag][SWE.GetName]§!에 대한 §R군사 통행권을 얻습니다§!"

  AAT_Sweden_flashpoints.50.t: "내부의 적"
  AAT_Sweden_flashpoints.50.desc: "우리가 항상 극좌파의 활동을 주시해 왔지만, 공산주의자들이 [SOV.GetAdjective]의 [SWE.GetName] 침공을 더 쉽게 만들기 위해 우리 군대를 방해하거나 주요 산업에 불만을 퍼뜨릴 것을 예측하는 것은 불가능하지 않습니다. 따라서 우리는 [SOV.GetNameDefCap]에 동조하거나 더 일반적으로 극좌 성향을 가진 것으로 알려진 사람들을 억류함으로써 그러한 활동을 선제적으로 막아야 합니다."
  AAT_Sweden_flashpoints.50.a: "그들이 문제를 일으키도록 내버려 둘 수 없습니다. 그들을 가두십시오."
  AAT_Sweden_flashpoints.50.b: "이것은 민주 사회에서 용납될 수 없습니다. "

  AAT_Sweden_flashpoints.51.t: "억류 결정에 대한 분노"
  AAT_Sweden_flashpoints.51.desc: "[SWE.GetName] 전역의 급진 좌파를 억류하기 시작한 우리의 결정에 따라, 경찰이 그 목표를 달성하기 위해 벌인 급습과 체포는 노동자들의 격렬한 반대에 부딪혔습니다. 많은 이들은 급진파의 탈출을 돕거나 경찰관을 직접 공격하기까지 했습니다. 그들은 이러한 대규모 투옥이 경찰 국가를 만드는 것과 같다고 주장합니다. 신중하게 진행하지 않으면 상황이 걷잡을 수 없이 악화될 수 있습니다."
  AAT_Sweden_flashpoints.51.a: "경찰을 지원하기 위해 군대를 투입하라."
  AAT_Sweden_flashpoints.51.b: "이것은 실수였다, 이미 체포한 이들을 석방해야 한다."

  AAT_Sweden_flashpoints.52.t: "좌파 체포로 대규모 시위와 폭력 사태 발발"
  AAT_Sweden_flashpoints.52.desc: "급진 좌파 체포 작전에서 군대가 경찰을 지원하도록 한 우리의 결정은 국가를 내전으로 몰아넣을 수 있는 폭력의 악순환을 초래했습니다. 노동자와 경찰 간의 충돌로 다수의 사상자가 발생했습니다. 우리가 체포하지 못한 급진파들은 노동자들을 규합하여 우리에게 대항하고 있으며, 정부의 완전한 해산을 요구하고 있습니다. 게다가, 다수의 병사들이 명령 수행을 거부하고 심지어 군을 완전히 이탈하는 모습도 목격되었습니다. 이는 지난 한 세기 동안 국가가 직면한 가장 끔찍한 상황일지도 모릅니다."
  AAT_Sweden_flashpoints.52.a: "이 오합지졸이 우리나라를 파괴하게 둘 수는 없다."
  AAT_Sweden_flashpoints.52.b: "체포를 중단해야 한다, 우리가 국가를 파괴하고 있다."

  AAT_Sweden_flashpoints.53.t: "[SWE.GetAdjective] 내전 발발"
  AAT_Sweden_flashpoints.53.desc: "최근 몇 주간 산발적으로 발생하던 폭력 사태가 이제 전국적으로 조직적인 움직임으로 통합되고 있습니다. 이러한 움직임의 대부분은 $SWE_communism_party_long$과 연계되어 있으며, [SOV.GetNameDef]와 제휴했을 가능성도 있습니다.\n\n공산주의 민병대는 다수의 도시 지역을 장악하고, 최근의 좌파 억류 계획과 관련된 모든 인물을 체포하기 시작했습니다. 한편, 민족주의자들 또한 자신들의 마을이 공산주의자들의 손에 넘어가는 것을 막기 위해, 종종 지역 경찰의 지원을 받아 민병대를 조직하고 있습니다. 양측 단체와 우리 군 사이의 폭력은 내전이라고밖에 볼 수 없는 수준으로 격화되었습니다."
  AAT_Sweden_flashpoints.53.a: "이 혁명은 진작에 일어났어야 했다."
  AAT_Sweden_flashpoints.53.b: "우리는 [SOV.GetNameDef]의 첩자들을 분쇄할 것이다."

  AAT_Sweden_flashpoints.54.t: "[SWE.GetName]의 긴장 완화"
  AAT_Sweden_flashpoints.54.desc: "당국과 좌익 운동가 억류에 반대하는 이들 사이의 최근 긴장이 완화되기 시작했습니다. 정부와 국민 사이의 신뢰가 크게 손상되었지만, 상황이 종파 분쟁으로 악화될 위험은 더 이상 없는 것으로 보입니다."
  AAT_Sweden_flashpoints.54.a: "재앙을 간신히 피했다."

  AAT_Sweden_flashpoints.56.t: "고틀란드 제안"
  AAT_Sweden_flashpoints.56.desc: "다수의 육군 고위 장교들이 공산 혁명가들에게 합류함에 따라, 해군을 제외한 모든 군부에 대한 신뢰가 사상 최저 수준으로 떨어졌습니다. 최근 활동으로 국왕의 안전이 위태로워지자, 그의 생존을 보장하기 위한 과감한 조치가 제안되고 있습니다. 해군성은 국왕을 고틀란드 섬으로 옮기고 충성파로 구성된 군정을 수립하여, 보다 효율적이고 비교적 안전하게 국가를 통치함으로써 상황을 다시 통제하려는 대담한 계획을 제안했습니다."
  AAT_Sweden_flashpoints.56.a: "본토를 포기할 수는 없다."
  AAT_Sweden_flashpoints.56.b: "훌륭한 제안이다."

  AAT_Sweden_flashpoints.57.t: "스웨덴 국왕, 탈출 시도 중 부상"
  AAT_Sweden_flashpoints.57.desc: "이른 아침, 스웨덴 정부는 수도에서 국왕을 대피시켜 고틀란드의 더 안전한 장소로 옮기기로 결정했습니다. 호송대는 파르티잔에게 가로막혔고 국왕의 차량이 피격되어 앞 유리가 산산조각 났습니다.\n이어진 총격전에서 국왕은 왼쪽 눈에 영구적인 손상을 입는 중상을 입었습니다. 정부가 섬으로 탈출하면서 스웨덴의 정당한 정부로서 통제권을 되찾겠다고 맹세하지만, 부상 이후 새로운 열의를 얻은 국왕 자신이 사실상 정부를 장악했다는 소문이 무성합니다."
  AAT_Sweden_flashpoints.57.a: "이 얼마나 복잡한 난장판인가"

  AAT_Sweden_flashpoints_civil_war_tt: "§R공산주의자들이 높은 지지도를 유지할 경우 [SWE.GetFlag][SWE.GetName]의 안정도를 낮추면 내전으로 이어질 수 있습니다!§!"

  AAT_Sweden_flashpoints.60.t: "[SWE.GetName], 란츠베르크를 장악"
  AAT_Sweden_flashpoints.60.desc: "[SWE.GetName]이(가) 란츠베르크의 통제권을 장악했습니다. 이 회사는 우리가 [SWE.GetAdjective]과 함께 장갑 차량을 개발하기 위해 운영하던 곳입니다. 최근 몇 년간 란츠베르크의 효용성이 우리에게 감소하긴 했지만, 이는 [SWE.GetName]이(가) [GER.GetNameDef](으)로부터 거리를 두기를 원한다는 명백한 신호입니다."
  AAT_Sweden_flashpoints.60.a: "그렇다면 우리는 [THIS.GetNameDef] 내의 [SWE.GetAdjective] 자산을 장악할 것입니다."
  AAT_Sweden_flashpoints.60.b: "어차피 란츠베르크는 제구실을 다했습니다."

  AAT_Sweden_flashpoints.61.t: "[FROM.GetName], 스웨덴 자산을 장악"
  AAT_Sweden_flashpoints.61.desc: "우리의 란츠베르크 장악에 이은 급격한 긴장 고조 속에서, [GER.GetNameDef] 정부는 자국 내에서 [SWE.GetAdjective] 국민과 연관된 여러 자산을 압류하는 것으로 대응했습니다. 우리는 [GER.GetNameDef](으)로부터 서서히 거리를 두고 싶었지만, 이 결정은 [SWE.GetAdjective] 대중의 분노를 샀습니다."
  AAT_Sweden_flashpoints.61.a: "우리와의 교역 없이 어떻게 버티는지 지켜봅시다."
  AAT_Sweden_flashpoints.61.b: "놀랍지는 않지만, 유감스러운 일입니다."

  AAT_Sweden_flashpoints.62.t: "[FROM.GetName], [GER.GetNameDef]에 무역 금수 조치 발표"
  AAT_Sweden_flashpoints.62.desc: "오늘 [SWE.GetNameDef]은(는) [GER.GetNameDef]에 대한 무역 금수 조치를 발표함으로써 최근의 긴장을 새로운 수준으로 끌어올렸습니다. 이 결정은 군수 산업을 위한 철 생산 능력에 상당한 영향을 미칠 것입니다. "
  AAT_Sweden_flashpoints.62.a: "그들이 우리와 교역하지 않겠다면, 우리는 더 이상 그들의 국경을 존중하지 않을 것입니다."
  AAT_Sweden_flashpoints.62.b: "이 사태를 악화시키는 것은 우리가 약소국에 의존하는 것처럼 보이게 할 뿐입니다."

  AAT_Sweden_flashpoints.63.t: "[FROM.GetNameDefCap], 전쟁 위협"
  AAT_Sweden_flashpoints.63.desc: "최근 우리가 [GER.GetNameDef]에 내린 금수 조치 결정은 [GER.Capital.GetCapitalVictoryPointName]에서 격렬한 분노를 샀습니다. [SWE.GetAdjective] 철광석에 대한 역사적 의존도 때문에 공황에 빠진 것으로 보이며, 그들은 최후통첩을 보냈습니다. 최후통첩에 따르면, 만약 우리가 즉시 금수 조치를 해제하지 않는다면, 그들은 전쟁을 포함한 극단적인 조치를 우리에게 취할 수밖에 없을 것이라고 합니다."
  AAT_Sweden_flashpoints.63.a: "최후통첩을 거부한다."
  AAT_Sweden_flashpoints.63.b: "그런 분쟁을 감수할 수는 없습니다."

  AAT_Sweden_flashpoints.64.t: "[FROM.GetNameDefCap], 최후통첩 거부"
  AAT_Sweden_flashpoints.64.desc: "[SWE.GetNameDef]은(는) 우리의 최후통첩을 단호히 거부했습니다. 그들은 우리 군이 점령하기 훨씬 전에 갱도를 파괴할 것이므로, 자신들에 대한 어떠한 공격도 [SWE.GetAdjective] 광석 매장량에 대한 접근성을 개선하지 못할 것이라고 밝혔습니다."
  AAT_Sweden_flashpoints.64.a: "그들이 자초한 일입니다."
  AAT_Sweden_flashpoints.64.b: "그들 없이도 감당할 수 있습니다."

  AAT_Sweden_flashpoints.65.t: "[FROM.GetNameDefCap], 금수 조치 해제"
  AAT_Sweden_flashpoints.65.desc: "[SWE.GetAdjective] 정부가 마침내 분별력을 되찾고 우리에 대한 금수 조치를 해제하기로 결정했습니다. 양국 간의 교역이 완전히 정상화되기까지는 시간이 걸릴 수 있지만, 우리는 필요하다면 그들을 무릎 꿇릴 능력이 여전히 우리에게 있다는 것을 분명히 했습니다."
  AAT_Sweden_flashpoints.65.a: "이제야 세상에서 자신들의 위치를 깨달았군요."

  AAT_Sweden_flashpoints.70.t: "구매 함선, [ITA.GetAdjective] 항구에서 출항"
  AAT_Sweden_flashpoints.70.desc: "최근 [ITA.GetName]으로부터 구매한 함선들이 출항했습니다. 도중 재보급 필요성으로 인해 [SWE.GetNameDef](으)로의 항해는 약 1개월이 소요될 예정입니다."
  AAT_Sweden_flashpoints.70.a: "무운을 빕니다."

  AAT_Sweden_flashpoints.71.t: "[SWE.GetName](으)로 향하는 구 [ITA.GetAdjective] 함선"
  AAT_Sweden_flashpoints.71.desc: "오늘 구 [ITA.GetAdjective] 구축함 4척이 우리 항구 중 한 곳에 도착했습니다. 이 함선들은 [SWE.GetAdjective] 정부가 구매했으며 [SWE.GetName]으로 이전되는 중입니다. 함선들이 재보급하는 동안, 우리가 통제권을 장악하여 직접 사용할 수도 있습니다. 하지만 이는 [SWE.GetName]과의 관계를 악화시킬 가능성이 높습니다."
  AAT_Sweden_flashpoints.71.a: "저 함선들을 더 잘 활용할 수 있을 것이다."
  AAT_Sweden_flashpoints.71.b: "[SWE.GetName]과의 관계를 악화시키고 싶지 않다."

  AAT_Sweden_flashpoints.72.t: "[ENG.GetName], 아군 신규 함선 나포"
  AAT_Sweden_flashpoints.72.desc: "[ENG.GetAdjective]이(가) 통제하는 항구에 정박하던 중, 우리의 신규 함선 4척이 그들 해군에게 나포되었습니다. 그들은 '전시 선박 징발권'을 나포의 명분으로 내세우는 듯합니다. 전쟁을 일으키지 않고 함선들을 되찾으려면 신중하게 행동해야 합니다."
  AAT_Sweden_flashpoints.72.a: "이것은 전쟁 행위다. 함선들을 석방하지 않으면 그 대가를 치르게 될 것이다."
  AAT_Sweden_flashpoints.72.b: "[ENG.GetName]과(와) 전쟁할 위험을 감수할 수는 없다."

  AAT_Sweden_flashpoints.73.t: "[SWE.GetName], 함선 석방 요구"
  AAT_Sweden_flashpoints.73.desc: "[SWE.GetAdjective] 정부는 우리가 그들의 함선을 나포한 것을 전쟁 행위로 간주하며, 즉시 석방하지 않을 경우 같은 방식으로 대응할 수밖에 없다고 분명히 밝혔습니다."
  AAT_Sweden_flashpoints.73.a: "함선들을 석방할 의향은 없다."
  AAT_Sweden_flashpoints.73.b: "함선들을 계속 붙잡고 있어 봐야 얻을 것이 거의 없다."

  AAT_Sweden_flashpoints.74.t: "[SWE.GetName], 함선 억류 수용"
  AAT_Sweden_flashpoints.74.desc: "[SWE.GetAdjective] 정부는 함선을 되찾으려는 시도를 포기한 듯합니다. 약간의 개조를 거친 후, 함선들은 이제 우리 해군에 편입되어 임무를 수행할 준비가 되었습니다."
  AAT_Sweden_flashpoints.74.a: "그들에게 선택의 여지는 없었다."

  AAT_Sweden_flashpoints.75.t: "[ENG.GetName], 함선 석방 거부"
  AAT_Sweden_flashpoints.75.desc: "[ENG.GetAdjective] 정부는 억류된 우리 함선들의 석방을 완강히 거부했습니다. 함선들을 되찾을 유일한 방법은 싸워서 쟁취하는 것뿐인 듯합니다."
  AAT_Sweden_flashpoints.75.a: "그들은 새로운 적을 만들었다."
  AAT_Sweden_flashpoints.75.b: "이 문제로 전쟁까지 갈 가치는 없다."

  AAT_Sweden_flashpoints.76.t: "[ENG.GetName], 함선 석방"
  AAT_Sweden_flashpoints.76.desc: "우리 함선이 석방됨에 따라 [ENG.GetName]과(와) [SWE.GetName] 사이의 긴장이 마침내 완화되었습니다. 분명 [ENG.GetAdjective]은(는) 낡은 함선 몇 척 때문에 우리와 분쟁에 휘말리는 것을 피하고 싶었던 것입니다."
  AAT_Sweden_flashpoints.76.a: "드디어 그 함선들을 보게 되기를 기대한다."

  AAT_Sweden_flashpoints.77.t: "신규 함선, 무사히 도착"
  AAT_Sweden_flashpoints.77.desc: "[ITA.GetNameDef](으)로부터 구매한 함선들이 항해 중 큰 문제 없이 도착했습니다. 다만 승조원들의 보고에 따르면, 항해 도중 항구에서 재보급을 받을 때 상당한 감시를 받았다고 합니다."
  AAT_Sweden_flashpoints.77.a: "아주 유용하게 쓰일 것입니다."

  FIN_agree_peace_with_SWE: "핀란드가 평화를 대가로 우리에게 올란드 제도를 할양하는 데 동의했습니다"
  AAT_Sweden_flashpoints.78.t: "[SWE.GetName], 올란드 제도의 통제권 요구"
  AAT_Sweden_flashpoints.78.desc: "[SWE.GetName]은(는) 발트해의 제해권을 장악하는 데 사용될 수 있는 전략적 요충지 올란드 제도에 대한 우려를 표하고 있습니다.\n우리의 현 상황과 섬 인구 대다수가 [SWE.GetAdjective]인 점을 고려하여, [SWE.GetName] 정부는 세계 정세가 안정될 때까지 섬을 포기할 의향이 있는지 문의하고 있습니다. 그들은 섬이 적대 세력의 손에 넘어가는 것을 막고 [SWE.GetAdjective] 시민을 보호해야 한다는 명분을 내세웁니다."
  AAT_Sweden_flashpoints.78.a: "올란드는 우리의 영토이며, 앞으로도 그럴 것입니다"
  AAT_Sweden_flashpoints.78.b: "올바른 선택입니다"
  AAT_Sweden_flashpoints.78.c: "[SWE.GetName]이(가) 보상한다면"
  AAT_Sweden_flashpoints.79.t: "[FIN.GetName]의 거절"
  AAT_Sweden_flashpoints.79.desc: "[FIN.GetName]은(는) 올란드 제도의 통제권 이양 문제에 대해 매우 단호하게 '아니오'라고 답했습니다."
  AAT_Sweden_flashpoints.79.a: "유감입니다"
  AAT_Sweden_flashpoints.80.t: "[FIN.GetName]의 수락"
  AAT_Sweden_flashpoints.80.desc: "그들은 자신들이 처한 위태로운 상황을 이유로, 외국 점령군보다는 우리가 섬을 통제하는 편이 낫다고 판단했습니다. 이미 대다수가 [SWE.GetAdjective] 사용자인 현지인들은 이를 잘 받아들였으며, 그들의 삶은 평소와 같이 계속되고 있습니다."
  AAT_Sweden_flashpoints.80.a: "훌륭합니다"
  AAT_Sweden_flashpoints.81.t: "[FIN.GetName]의 조건부 수락"
  AAT_Sweden_flashpoints.81.desc: "[FIN.GetName]은(는) 올란드 제도를 포기할 의향이 있음을 인정하지만, 현재 자금난에 시달리고 있음을 강조합니다\n.그들은 잃어버린 수입을 보상하기 위해 우리 국고의 일부를 받는 대가로 섬의 통제권을 넘겨줄 의향이 있습니다."
  AAT_Sweden_flashpoints.81.a: "그럴 가치가 있습니다"
  AAT_Sweden_flashpoints.81.b: "거절한다"
  AAT_Sweden_flashpoints.82.t: "[SWE.GetName]의 동의"
  AAT_Sweden_flashpoints.82.desc: "[SWE.GetName]이(가) 올란드 제도에 대한 재정적 보상에 동의했습니다. 거래가 진행되는 동안 조촐한 기념식이 열렸으며, 일부 올란드 주민들이 자신들의 미래에 대해 당연히 걱정하고 있지만, [SWE.GetAdjective] 당국은 전환 과정이 최대한 원활하게 이루어지도록 하고 그들의 생활 방식을 존중할 것이라고 밝혔습니다."
  AAT_Sweden_flashpoints.82.a: "필요한 대가입니다"
  AAT_Sweden_flashpoints.83.t: "[SWE.GetName]의 거절"
  AAT_Sweden_flashpoints.83.desc: "[SWE.GetName]은(는) "올란드 이양을 위해 그만큼의 국고를 지출할 의사가 없다고 결정했습니다."
  AAT_Sweden_flashpoints.83.a: "[SWE.GetName] "그렇다면 그만큼 간절하지 않았던 모양이군"


  AAT_Sweden_BoP.10.t: "선거 운동 - 경제 정책"
  AAT_Sweden_BoP.10.desc: "선거철이 다시 돌아왔고 릭스다그의 지배권을 두고 다투는 정당들이 대대적인 선거 운동을 벌이고 있습니다. 유권자들의 관심을 사로잡은 주요 쟁점은 경제인 것 같습니다. 일부는 현 정책의 유지를 주장하는 반면 다른 이들은 급진적인 변화를 원하지만, 이 문제에 대해서는 단 하나의 선택지만이 지지를 얻고 있는 것 같습니다."
  AAT_Sweden_BoP.10.a: "경제는 노동 계급에 의해, 노동 계급을 위해 운영되어야 합니다."
  AAT_Sweden_BoP.10.b: "우리는 자본주의와 공산주의의 극단 사이에서 중도를 찾아야 합니다."
  AAT_Sweden_BoP.10.c: "왜 우리는 과도한 세금으로 사회에서 가장 성공한 이들을 억압하고 있습니까?"
  AAT_Sweden_BoP.10.d: "군비 확장은 실업률을 낮추고 국가 안보를 증진할 것입니다."

  AAT_Sweden_BoP.11.t: "선거 운동 - 사회 정책"
  AAT_Sweden_BoP.11.desc: "선거 운동은 사회 정책으로 넘어간 것 같으며, 이제 정당들은 사회의 병폐를 어떻게 해결할 것인지 공언하고 있습니다. 일부 정당은 문제 해결을 위해 정부의 급진적인 개편을 주장하는 반면, 다른 정당들은 점진적인 변화로 더 신중한 접근을 취하고 있습니다. 하지만 유권자들에게는 단 하나의 메시지만이 반향을 일으키는 것 같습니다."
  AAT_Sweden_BoP.11.a: "부르주아를 권력에서 몰아내기 전까지 사회적 평등은 있을 수 없습니다."
  AAT_Sweden_BoP.11.b: "교육과 의료 서비스에 대한 접근성 향상은 사람들이 빈곤에서 벗어나는 데 도움이 될 것입니다."
  AAT_Sweden_BoP.11.c: "우리는 대도시 외곽에 사는 사람들을 지원하기 위해 더 많은 노력을 기울여야 합니다."
  AAT_Sweden_BoP.11.d: "우리는 [ROOT.GetAdjective]인이 된다는 것이 무엇을 의미하는지 잊어버렸으며, 더 많은 애국 교육이 필요합니다."

  AAT_Sweden_BoP.12.t: "선거 운동 - 외교 정책"
  AAT_Sweden_BoP.12.desc: "선거일이 다가오면서 토론은 국가 안보와 외교 정책이라는 시급한 문제로 옮겨갔습니다. 많은 정당이 국가를 안전하게 지키기 위해 중립과 고립주의를 주장하는 반면, 다른 정당들은 더 단호한 외교 정책 방향을 추진하고 있습니다. 세계가 이토록 위태로운 상황에서, 단 하나의 메시지만이 유권자들에게 희망을 주는 것 같습니다."
  AAT_Sweden_BoP.12.a: "전 세계의 노동자들은 제국주의 침략 전쟁에 맞서 단결해야 합니다."
  AAT_Sweden_BoP.12.b: "우리는 강력한 군사적 억지력을 개발하면서 중립을 유지해야 합니다."
  AAT_Sweden_BoP.12.c: "우리는 약하고 취약합니다. 전쟁에 더 잘 대비해야 합니다."
  AAT_Sweden_BoP.12.d: "이 지역의 평화를 확보하는 유일한 방법은 이 지역에 대한 우리의 통제권을 주장하는 것입니다."

  AAT_Sweden_BoP.14.t: "선거 결과"
  AAT_Sweden_BoP.14.d_socialist: "선거일이 다가왔고 유권자들은 선택을 마쳤습니다. $SWE_communism_party_long$이(가) 곧 과반 정부를 구성할 것입니다. 국유화, 계급 연대, 외세 제국의 개입 거부와 같은 급진적인 정책이 대중의 마음을 사로잡은 것 같습니다. 이제 그들의 약속 중 얼마나 많은 것이 이행될지는 두고 볼 일입니다."
  AAT_Sweden_BoP.14.d_democratic: "선거일이 다가왔고 유권자들은 선택을 마쳤습니다. $SWE_democratic_party_long$이(가) 곧 과반 정부를 구성할 것입니다. 일부는 국민의 집(Folkhemmet)의 약속이 유권자들에게 식상해졌다고 믿었지만, 이번 결과는 그들이 틀렸음을 증명합니다. 이제 남은 것은 그들이 시작한 일을 마무리하는 것뿐입니다."
  AAT_Sweden_BoP.14.d_non_aligned: "선거일이 다가왔고 유권자들은 선택을 마쳤습니다.$SWE_neutrality_party_long$이(가) 곧 과반 정부를 구성할 것입니다.국방을 강화하고 농촌 유권자들의 마음을 사로잡으려는 그들의 계획은 명백히 성공했습니다. 이제 그들은 선거 기간 동안 홍보했던 낭만적인 [ROOT.GetName]의 모습을 만들어내야 합니다."
  AAT_Sweden_BoP.14.d_fascist: "선거일이 다가왔고 유권자들은 선택을 마쳤습니다.$SWE_fascism_party_long$이(가) 곧 과반 정부를 구성할 것이며, 그들 자신만큼 이 결과에 놀란 사람은 없는 것 같습니다. 새로운 정권 하에서 [ROOT.GetName]의 민주주의 체제가 얼마나 오래 지속될지는 불확실합니다. "
  AAT_Sweden_BoP.14.d_left: "선거일이 다가왔지만 정당들의 최선의 노력에도 불구하고, 릭스다그에서 과반 의석을 확보한 정당은 아무도 없었습니다. 하지만 사회주의자들과 사회민주주의자들은 연립 정부를 구성하기로 합의했습니다. 이 연정이 임기를 다 채울 수 있을지는 불확실하지만, 아마도 우파에 대한 두려움이 연정을 유지시킬 것입니다."
  AAT_Sweden_BoP.14.d_right: "선거일이 다가왔지만 정당들의 최선의 노력에도 불구하고, 릭스다그에서 과반 의석을 확보한 정당은 아무도 없었습니다. 하지만 보수주의자들과 파시스트들은 연립 정부를 구성하기로 합의했습니다. 이 연정이 임기를 다 채울 수 있을지는 불확실하지만, 아마도 좌파에 대한 두려움이 연정을 유지시킬 것입니다."
  AAT_Sweden_BoP.14.a: "유권자들은 뜻을 밝혔습니다. "

  SWE_folkhemmet_event_result_tt: "이 정책을 채택한 후 국민의 집 정신은 다음과 같은 가치를 갖게 됩니다:\n"

  AAT_Sweden_strike.1.t: "[?SWE.GetNameDef]의 소요"
  AAT_Sweden_strike.1.desc: "대전 당시 겪었던 것과 같은 식량 봉쇄 가능성으로 인해 [SWE.GetAdjective] 노동자들 사이에서 시위가 발생했습니다. 현지 선동가들에게 자극받은 소요는 공장에서부터 전국적인 문제로 확산되었습니다. 상황을 안정시키고, 이 불확실한 시기에 정부가 강력한 지도력을 발휘하는 것으로 인식되도록 해야 합니다."
  AAT_Sweden_strike.1.a: "지금은 기다리는 것 외에 할 수 있는 일이 없습니다."
  AAT_Sweden_strike.1.b: "국민 사기를 진작하고 이 상황을 진정시키기 위해 투자해야 합니다."

  AAT_Sweden_strike.2.t: "전국적인 폭동"
  AAT_Sweden_strike.2.desc: "유감스럽게도, 시위를 막으려는 우리의 노력은 실패했습니다. 거의 모든 공장 노동자, 재봉사, 목수가 거리로 나와 정부 정책에 항의하는 것으로 보입니다. 설상가상으로, 많은 시위가 폭력적으로 변하면서 민간인과 법 집행관 모두 부상을 입고 있습니다."
  AAT_Sweden_strike.2.a: "곧 잠잠해질 것입니다."
  AAT_Sweden_strike.2.b: "이 사태를 즉시 막아야 합니다."

  AAT_Sweden_nationalists.1.t: "[SWE.GetAdjective] 국가사회주의자들의 개입 요청"
  AAT_Sweden_nationalists.1.desc: "[SWE.GetName]의 주요 국가사회주의 정당 대표들이 우리에게 기회를 제안하며 접근해왔습니다. 그들은 현 정부를 전복하는 과정에 있으며, 그 시도에 대한 지원을 우리에게 호소했습니다. 군사 지원의 대가로, 그들은 자국을 우리의 세력권에 확실히 편입시키기로 동의했습니다."
  AAT_Sweden_nationalists.1.a: " 병력을 할애할 수는 없지만, 약간의 지원은 보낼 수 있습니다."
  AAT_Sweden_nationalists.1.b: "그들을 지원한다."

  AAT_Sweden_nationalists.2.t: "[FROM.GetNameDefCap]의 제안 거절"
  AAT_Sweden_nationalists.2.desc: "[GER.GetAdjective] 정부는 과도하게 확장된 군에 또 다른 전선을 만들고 싶지 않다는 이유로 우리의 제안을 거절했습니다. 하지만, 호의의 표시로 소총과 의용군을 보내왔습니다."
  AAT_Sweden_nationalists.2.a: "아무것도 없는 것보다는 낫습니다."

  AAT_Sweden_nationalists.3.t: "[FROM.GetNameDefCap]의 제안 수락"
  AAT_Sweden_nationalists.3.desc: "[GER.GetAdjective] 지도부는 국가 통제권을 확보하는 데 군사적으로 우리를 지원하기로 동의했습니다. 그들의 지원에 대한 대가로, 우리는 대륙에서 그들의 더 넓은 세력권의 일부가 되기로 합의했습니다. 언젠가 그들이 우리를 동등하게 보아주기를 바랍니다."
  AAT_Sweden_nationalists.3.a: "우리는 잿더미에서 일어나, 그 어느 때보다 강해질 것입니다!"

  AAT_Sweden_nationalists.4.t: "국가사회주의 운동 통합"
  AAT_Sweden_nationalists.4.desc: "국가사회주의 운동은 너무 분열되어 있어 [SWE.GetName]에서 권력을 장악할 수 없습니다. 이 상황을 바꾸려면, 운동은 사소한 내분을 멈추고 우리의 유일한 진정한 지도자 아래 단결해야 합니다."
  AAT_Sweden_nationalists.4.a: "$SWE_sven_olov_lindholm$는 다양한 민족주의 분파를 통합할 수 있습니다."
  AAT_Sweden_nationalists.4.b: "$SWE_birger_furugard$는 [SWE.GetName]의 지도자가 될 운명입니다."

  AAT_Sweden_nationalists.5.t: "[FROM.FROM.GetName]에서의 비참한 돌격대 행진"
  AAT_Sweden_nationalists.5.desc: "[FROM.FROM.GetName]에서 돌격대 행진을 방해하려는 반대 시위대에 대한 우려가 오늘 두 집단이 거리에서 격렬하게 충돌하며 극에 달했습니다. 양측 모두에서 많은 사상자가 발생했지만, 결국 여론은 반파시스트의 편인 것으로 보이며 돌격대는 경찰이 도착할 때까지 인근 상점으로 피신해야 했습니다."
  AAT_Sweden_nationalists.5.a: "그들은 기세가 꺾이고 있습니다."

  AAT_Sweden_nationalists.6.t: "[FROM.FROM.GetName]에서의 평온한 돌격대 행진"
  AAT_Sweden_nationalists.6.desc: "오늘 [FROM.FROM.GetName]에서 열린 돌격대 행진은 놀라울 정도로 조용한 행사였습니다. 소수의 대원만을 모을 수 있었던 주최 측은 사람들이 자신들의 일에만 신경 쓰는 동안 번화가를 통과하는 오합지졸 행렬을 이끌었습니다. 저조한 참여율에도 불구하고, 돌격대는 [SWE.GetAdjective] 정치의 주요 요소가 되고 있습니다."
  AAT_Sweden_nationalists.6.a: "그들은 서서히 기세를 얻고 있습니다."

  AAT_Sweden_nationalists.7.t: "[FROM.FROM.GetName]에서의 성공적인 돌격대 행진"
  AAT_Sweden_nationalists.7.desc: "반대 시위대를 저지하는 지역 경찰의 지원 덕분에 돌격대는 [FROM.GetName]에서 대규모 행진을 성공적으로 수행했습니다. 지역 번화가를 지나는 동안, 행진대는 거리를 가득 메운 열광적인 시민들의 환호를 받았습니다. "
  AAT_Sweden_nationalists.7.a: "그들이 [SWE.GetName]을(를) 재건할 것입니다."


  AAT_Sweden_nationalists.8.t: "귀족층의 지지 표명"
  AAT_Sweden_nationalists.8.desc: "귀족층은 선출직 공무원들 때문에 국정에 대한 자신들의 영향력이 축소되는 것에 오랫동안 불만을 품어왔습니다. 따라서 많은 이들이 남은 자원을 사용하여 우리의 민족주의 운동을 지원하기로 동의했습니다. 그 대가로, 운동이 의회(Riksdag)를 장악하면 약간의 정치적 양보를 기대할 것입니다."
  AAT_Sweden_nationalists.8.a: " 국가의 위대함을 되찾기 위한 작은 대가입니다."

  AAT_Sweden_nationalists.9.t: "산업가들의 지지 표명"
  AAT_Sweden_nationalists.9.desc: " 사회민주당과 스웨덴 노동조합 총연맹(Landsorganisationen)의 간섭으로 인해 [SWE.GetAdjective] 산업은 외국 경쟁자들과의 경쟁이 심화되었습니다. 따라서 다수의 주요 산업가들이 우리가 노동조합을 영원히 해체하는 데 동의한다면 우리의 민족주의 운동을 지원하기로 했습니다. "
  AAT_Sweden_nationalists.9.a: "노동조합은 제거될 것입니다. "

  AAT_Sweden_nationalists.10.t: "장교단의 지지 표명"
  AAT_Sweden_nationalists.10.desc: " 현 행정부 하의 국방 관리 부실에 실망한 장교들이 적지 않습니다. 따라서 육군과 해군의 많은 고위 장교들이 우리가 집권했을 때 국방 예산을 증액하는 대가로 민족주의 대의를 돕기로 동의했습니다. "
  AAT_Sweden_nationalists.10.a: "[SWE.GetName]은(는) 다시 한번 강대국이 될 것입니다."

  AAT_Sweden_nationalists.11.t: "농촌 지지 급증"
  AAT_Sweden_nationalists.11.desc: "[SWE.GetName]의 도시 중심부 외곽의 많은 사람들이 사회민주당의 정책으로 인해 소외감을 느끼고 있습니다. 더 나아가, 그들은 산업화에 위협을 느끼며 자신들의 전통적인 생활 방식이 침식되는 것을 우려합니다. 그들 사이에 불만의 씨앗을 뿌림으로써, 우리는 농촌에 투자하고 전통적 가치를 복원하겠다고 약속하는 민족주의 운동에 대한 지지의 급증을 만들어냈습니다."
  AAT_Sweden_nationalists.11.a: "농촌 주민들은 국가의 근간입니다."

  AAT_Sweden_nationalists.16.t: "[FROM.FROM.GetName]에서의 재앙적인 국왕 방문"
  AAT_Sweden_nationalists.16.desc: "오늘 다양한 반군주주의자들이 [FROM.FROM.GetName]으로의 국왕 방문을 방해하는 데 성공했습니다. 경찰이 시위대를 막기 위해 최선을 다했음에도 불구하고, 그들은 국왕 차량의 예정된 경로를 봉쇄하여 더 위험한 상황에 처할 것을 우려해 방문을 중단하게 만들었습니다."
  AAT_Sweden_nationalists.16.a: "평민들은 윗사람을 존경할 줄 모릅니다."

  AAT_Sweden_nationalists.17.t: "[FROM.FROM.GetName]에서의 별일 없었던 국왕 방문"
  AAT_Sweden_nationalists.17.desc: "[FROM.FROM.GetName]으로의 국왕 방문은 다소 따분한 행사였습니다. 국왕은 군중이 모여 자신을 환영하길 바랐으나, 거리에는 소수의 지지자만이 줄을 섰습니다. 국왕은 이 상황에 매우 불쾌해하고 당혹스러워했으며, 향후 이와 같은 경솔한 활동에 참여하지 않겠다고 맹세했다고 전해집니다."
  AAT_Sweden_nationalists.17.a: "그는 지지를 구축하기 위해 이를 계속해야 합니다"

  AAT_Sweden_nationalists.18.t: "[FROM.FROM.GetName]에서의 성공적인 국왕 방문"
  AAT_Sweden_nationalists.18.desc: "국왕의 [FROM.FROM.GetName] 방문은 군주의 인기를 크게 높이는 계기가 되었습니다. 환호하는 지지자들이 거리에 늘어서 [SWE.GetAdjective] 국기를 흔들고 국왕 앞에 꽃을 던졌습니다. 일부 반대자들도 있었지만, 현지 경찰력에 의해 행렬에서 멀리 떨어져 있었습니다. "
  AAT_Sweden_nationalists.18.a: "이러한 지지가 있다면 국왕의 권위를 회복할 수 있습니다."

  AAT_Sweden_nationalists.19.t: "국왕과의 피카"
  AAT_Sweden_nationalists.19.desc: "[SWE.Capital.GetCapitalVictoryPointName]의 왕궁에서 열린 비밀 회동 중, 다양한 민족주의 운동의 지도자들이 군주를 만나 [SWE.GetName]이 옛 영광을 되찾기를 바라는 열망에 대해 논의했습니다. 다양한 운동을 하나의 응집력 있는 운동으로 통합하는 방법에 대한 오랜 논의 끝에, 때가 되면 구스타프 국왕이 명목상의 군주가 아닌 통치자로서 자신을 다시 내세워야 한다는 결정이 내려졌습니다. 국왕은 그러한 계획에 전념하기를 주저하지만, 국민들의 지지를 가늠하기 위한 영토 순회를 시작으로 정치 문제에 더 적극적인 역할을 맡기로 동의했습니다. "
  AAT_Sweden_nationalists.19.a: "우리의 위대한 국가를 위해 아직 늦지 않았다는 것을 국왕께 보여드려야 합니다."

  AAT_Sweden_nationalists.20.t: "[FROM.GetName]이 통제권 확대를 원합니다"
  AAT_Sweden_nationalists.20.desc: "우리의 충성스러운 속국인 [FROM.GetName]이 북부 [SOV.GetName]의 영토를 할양하여 자신들의 책임을 확대해 줄 것을 요청했습니다. 이를 통해 우리는 속국들의 점령 부담을 덜고, 우리의 노력을 주적에게 집중할 수 있을 것입니다."
  AAT_Sweden_nationalists.20.a: "좋은 계획입니다"
  AAT_Sweden_nationalists.20.b: "모든 영토는 라이히의 것이다!"

  AAT_Sweden_nationalists.21.t: "[FROM.GetName]이 우리에게 통제권을 이양합니다"
  AAT_Sweden_nationalists.21.desc: "베를린은 북부 영토의 더 많은 부분을 이양하여 우리에게 더 많은 책임을 부여하기로 결정했으며, 이는 사실상 정식 국가판무관부 노르트란트를 형성하는 것입니다"
  AAT_Sweden_nationalists.21.a: "우리의 영향력이 커집니다"

  AAT_Sweden_nationalists.22.t: "[FROM.GetName]이 우리의 제안을 거절했습니다"
  AAT_Sweden_nationalists.22.desc: "베를린은 우리가 그토록 광대한 영토 교환에 따르는 막중한 책임을 감당할 준비가 되지 않았다는 이유를 들어 우리의 요청을 승인하지 않기로 결정했습니다. 어쩌면 그들은 국가판무관부에게 너무 많은 권력을 부여하는 것을 두려워하는지도 모릅니다."
  AAT_Sweden_nationalists.22.a: "어쩌면 이건 실수였을지도..."

  AAT_Sweden_nationalists.23.t: "어둠 속의 비수"
  AAT_Sweden_nationalists.23.desc: "[SWE.GetName]의 [GER.GetAdjective] 괴뢰국이 종주국 모르게 비밀 임무를 띤 사절을 보냈습니다. [SWE.GetAdjective] 국가는 불길한 징조를 보고 있으며, 이제 이 분쟁에서 벗어날 방법을 찾아 우리에게 제안을 해왔습니다. 현재 그들은 [GER.GetAdjective] 군대가 다른 곳에 정신이 팔린 틈을 타 [GER.GetAdjective] 본토를 장악하기 위한 대규모 이탈을 준비하고 있지만, 우리와 자신들의 종주국을 상대로 양면 전쟁을 감당할 수는 없다고 강조합니다. 그들은 지금은 위장을 계속하되, 그들이 전향하면 우리가 백지 평화 조약을 맺고 나란히 싸울 것을 제안합니다.\n때로는 대낮의 공성추보다 어둠 속의 비수가 더 효과적입니다."
  AAT_Sweden_nationalists.23.a: "그거 아주 훌륭한 생각입니다"
  AAT_Sweden_nationalists.23.a_tt: "§Y[SWE.GetName]§!은(는) 때가 되면 종주국에 대항해 봉기하여 우리와 함께 싸울 것입니다"
  AAT_Sweden_nationalists.23.b: "모든 파시스트에게 책임을 물어야 합니다"

  AAT_Sweden_nationalists.24.t: "[FROM.GetName]이(가) 우리의 제안을 수락했습니다"
  AAT_Sweden_nationalists.24.desc: "[FROM.GetName]이(가) 우리의 제안을 수락했습니다. 때가 되면 그들은 백색 평화에 동의하여, 우리가 함께 [GER.GetName]을(를) 무너뜨릴 수 있도록 할 것입니다."
  AAT_Sweden_nationalists.24.a: "필사적인 조치임은 분명하지만, 반드시 필요한 일입니다."

  AAT_Sweden_nationalists.25.t: "[FROM.GetName]이(가) 우리의 제안을 거절했습니다"
  AAT_Sweden_nationalists.25.desc: "[FROM.GetName]이(가) 우리의 제안을 거절했습니다. 승산이 희박했지만, 우리가 처한 절박한 상황을 고려하면 시도해 볼 가치는 있었습니다."
  AAT_Sweden_nationalists.25.a: "우리뿐인 것 같군"

  AAT_Sweden_nationalists.26.t: "[FROM.GetName]이(가) 반란을 일으켰습니다"
  AAT_Sweden_nationalists.26.desc: "이른 아침 [FROM.GetName] 주재 특사들과의 연락이 두절되었고, 경계 임무를 수행하던 소수 여단은 모두 항복한 것으로 보입니다. 해명을 요구하기 위해 [SWE.GetAdjective] 정부에 전화를 걸었으나 묵묵부답이었습니다. 이제 이 다루기 힘든 괴뢰국이 우리를 배제하고 더 큰 야망을 품고 있다는 것이 명백해졌습니다."
  AAT_Sweden_nationalists.26.a: "젠장"

  AAT_Sweden_nationalists.27.t: "[FROM.GetName]이(가) [FIN.GetAdjective] 영토의 영유권을 주장합니다"
  AAT_Sweden_nationalists.27.desc: "우리의 충실한 종속국인 [FROM.GetName]이(가) [FIN.GetName]의 영토를 할양하여 자신들의 책무를 확대해 달라고 요청했습니다. 이를 통해 우리는 종속국의 점령 부담을 덜고, 우리의 노력을 주적에게 집중할 수 있을 것입니다."
  AAT_Sweden_nationalists.27.a: "훌륭한 생각입니다"

  AAT_Sweden_nationalists.28.t: "$AAT_Sweden_nationalists.21.t$"
  AAT_Sweden_nationalists.28.desc: "$AAT_Sweden_nationalists.21.desc$"
  AAT_Sweden_nationalists.28.a: "$AAT_Sweden_nationalists.21.a$"

  AAT_Sweden_nationalists.29.t: "$AAT_Sweden_nationalists.22.t$"
  AAT_Sweden_nationalists.29.desc: "$AAT_Sweden_nationalists.22.desc$"
  AAT_Sweden_nationalists.29.a: "$AAT_Sweden_nationalists.22.a$"

  AAT_Sweden_nationalists.30.t: "[FROM.GetName]이(가) [FIN.GetAdjective] 영토의 영유권을 주장합니다"
  AAT_Sweden_nationalists.30.desc: "[GER.GetAdjective]의 괴뢰국인 [SWE.GetName]이(가) 아돌프 히틀러에게 우리 영토에 대한 자신들의 영유권을 인정해 달라고 요청했습니다. 이는 양측의 만연한 팽창주의에만 기여하는 허황된 주장입니다."
  AAT_Sweden_nationalists.30.a: "비열한 책략이군"
  
  AAT_Sweden_nordic_defense_council.1.t: "[SWE.GetNameDef](이)가 우리를 북유럽 방위 평의회에 초대합니다"
  AAT_Sweden_nordic_defense_council.1.desc: "세계가 유럽 주요 강대국 간의 피할 수 없는 충돌에 대비하는 가운데, 북유럽 국가들은 이어질 맹공에 짓밟힐 위험에 처해 있습니다. [FROM.GetAdjective] 정부는 우리 북유럽 국가들이 단일 군대를 창설하여 함께 더욱 응집력 있는 방어 체계를 구축할 것을 제안하고 있습니다."
  AAT_Sweden_nordic_defense_council.1.a: "우리는 다른 계획이 있습니다"
  AAT_Sweden_nordic_defense_council.1.b: "세력원으로 가입하겠습니다"
  AAT_Sweden_nordic_defense_council.1.c:  "통합 평의회원으로 가입하겠습니다"

  AAT_Sweden_nordic_defense_council.2.t: "[FROM.GetName](이)가 북유럽 방위 연합에 가입했습니다"
  AAT_Sweden_nordic_defense_council.2.desc: "[FROM.GetName](이)가 우리 연합에 가입하기로 결정했습니다. 적어도 이제 상상할 수 없는 일이 벌어지더라도 우리는 혼자가 아닙니다."
  AAT_Sweden_nordic_defense_council.2.a: "훌륭합니다"

  AAT_Sweden_nordic_defense_council.3.t: "[FROM.GetName](이)가 북유럽 방위 연합 제안을 거절했습니다"
  AAT_Sweden_nordic_defense_council.3.desc: "[FROM.GetName](은)는 세계의 긴장이 계속되고 있음에도 불구하고 우리 연합 가입을 거부했습니다. 그들은 다른 정책을 선호하는 것 같습니다. 바라건대 그 정책이 세계 무대에서 우리의 위상에 부정적인 영향을 미치지 않기를 바랍니다."
  AAT_Sweden_nordic_defense_council.3.a: "안타깝습니다"

  AAT_Sweden_nationalists.12.t: "귀족들, 개혁을 환영하다"
  AAT_Sweden_nationalists.12.desc: "법률 전문가를 제외한 모든 사람은 우리의 최근 개혁이 사실상 귀족 특권의 복원이라는 것을 알지 못했습니다. 물론, 언론이 우리의 통제하에 있었기 때문에 그러한 전문가들은 대중에게 불만을 퍼뜨릴 방법이 없었습니다. 한편, 귀족들은 개혁에 환호하며 최근 수십 년간의 잘못을 바로잡기를 고대하고 있습니다."
  AAT_Sweden_nationalists.12.a: "그들이 우리 앞길을 막지 않기를 바랄 뿐입니다."

  AAT_Sweden_nationalists.13.t: "산업가들, 경제 개혁에 고무되다"
  AAT_Sweden_nationalists.13.desc: "주요 산업가들은 노동조합의 불법화에 따라 앞으로 몇 년 동안 기록적인 이익과 배당금을 기대하고 있습니다. 노동조합이 금지되면서, 산업가들은 최근 몇 년간 사회민주당이 그들 앞에 놓아둔 관료주의적 형식주의를 타파하고 결과적으로 경제 성장을 촉진할 수 있을 것입니다."
  AAT_Sweden_nationalists.13.a: "이러한 개혁은 진작에 이루어졌어야 했습니다."

  AAT_Sweden_nationalists.14.t: "군부, 확장을 계획하다"
  AAT_Sweden_nationalists.14.desc: "전쟁부 장관은 국가가 스스로를 방어할 장비가 부족하다고 오랫동안 주장해 온 주요 장교들의 권고에 따라 군 예산을 증액할 것이라고 발표했습니다. 증액된 예산 덕분에, 우리 신정권에 대한 군부의 충성심은 온전한 것으로 보입니다."
  AAT_Sweden_nationalists.14.a: "군부를 우리 편으로 두는 것은 항상 최우선 과제가 될 것입니다."

  AAT_Sweden_nationalists.15.t: "농촌 노동자들, 지지를 유지하다"
  AAT_Sweden_nationalists.15.desc: "농촌 기반 시설에 대한 대규모 투자 이후, 전국의 노동자들은 우리 정부를 가장 목소리 높여 지지하는 이들 중 일부가 되었습니다. 그들의 지지와 국가 식량망에 대한 영향력을 바탕으로, 우리는 이제 미래에 도시 노동자들을 견제할 수 있는 확고한 지지 기반을 갖게 되었습니다."
  AAT_Sweden_nationalists.15.a: "이러한 지지는 권력에 대한 우리의 장악력을 공고히 할 것입니다."

  SWE_royal_visit_in_progress: "왕실 방문이 이미 진행 중입니다."
  SWE_appeal_for_support_in_progress: "이미 한 세력에게 지지를 구애하고 있습니다."

  AAT_Sweden_communism.1.t: "파시스트 반혁명의 속삭임"
  AAT_Sweden_communism.1.desc: "마침내 우리가 정부의 권력을 잡았고, [ROOT.GetDemocraticParty]는 민주주의에 걸맞은 품위로 유권자의 뜻을 받아들였지만, 극우 성향 정당들은 이 과정을 훨씬 덜 받아들이며 투표의 정당성에 의문을 제기하고 있습니다. 현재로서는 이들이 단순한 반체제 인사일 뿐이지만, 이것이 더 퍼지지 않도록 주의해야 합니다."
  AAT_Sweden_communism.1.a: "우려스럽군."

  AAT_Sweden_communism.2.t: "군부의 반발"
  AAT_Sweden_communism.2.desc: "군에 대한 정부 조사 결과, 여러 고위 지휘관이 선출된 정부를 약화시키려는 지하 파시스트 운동과 연계되어 있다는 서류가 나왔습니다. 보고서에 따르면 국가의 정치적 노선에 대한 군부의 수사가 더욱 대담해졌으며, 이러한 수사에 대한 조치가 필요하다고 권고합니다."
  AAT_Sweden_communism.2.a: "더욱 우려스럽군."
  
  AAT_Sweden_communism.3.t: "무기 재고 실종"
  AAT_Sweden_communism.3.desc: "정부 조사 결과 고급 군용 무기가 군 재고에서 사라진 것으로 드러났습니다. 보고서에 따르면 재고가 현재 어디에 있는지 아직 밝혀내지 못했지만, 누군가 발견하기 전에 최대 60%가 사라졌다고 합니다."
  AAT_Sweden_communism.3.a: "이것은 고위급 인사의 내부 소행일 수밖에 없다."

  AAT_Sweden_communism.4.t: "[ROOT.GetFascistParty]와 군부, 스톡홀름을 장악하다"
  AAT_Sweden_communism.4.desc: "[?global.date.GetDateStringShortMonth]에 국회의사당에서 여러 차례 큰 폭발음이 들렸고, 갈색 셔츠를 입은 정체불명의 무장 남성들이 수도 전역에 나타났습니다. 정부는 대피하여 지역 경찰과 주 방위군에 질서 회복을 요청했지만, 그 호소는 묵살되었습니다. 파시스트 갈색 셔츠단이 임시 정부를 구성하기 위해 최고위 장성들과 연합했다는 소문이 무성합니다. 진정한 정부에 충성하는 개별 군인들 덕분에 모든 직원이 불타는 수도를 탈출할 수 있었습니다."
  AAT_Sweden_communism.4.a: "우리는 돌아갈 것이다."

  AAT_Sweden_communism.5.t: "주모자들 노출"
  AAT_Sweden_communism.5.desc: "[ROOT.GetName]의 도심 전역에 있는 창고에서 중화기 은닉처가 발견되었습니다. 이 창고의 임대료를 지불한 기록은 모두 [ROOT.GetFascistParty]와 관련이 있으며, 당과 연계된 준군사조직인 갈색 셔츠단의 지도자들은 모두 체포되었습니다.\n이 창고 중 한 곳에서 발견된 편지들은 이 음모에 연루된 장성들도 폭로했는데, 이들은 애초에 이 총기들을 횡령하고 재고 수량을 조작했습니다. 이 주모자들이 상당수의 군 병력에 영향력을 행사할 수 있으므로, 여기서는 신중함이 가장 중요합니다."
  AAT_Sweden_communism.5.a: "그들을 기소하라."
  AAT_Sweden_communism.5.b: "주모자들을 \"승진\"시켜 권력에서 몰아내라."

  AAT_Sweden_communism.6.t: "베르나도테 가문의 운명."
  AAT_Sweden_communism.6.desc: "이 계몽된 시대에 아직도 군주제, 특히 권력 없는 군주제에 집착하는 것은 이상해 보입니다. 그럼에도 불구하고 늙은 왕은 이러한 행동이 부적절하고 위헌이라는 여러 경고에도 불구하고 정치에 깊이 관여하는 것을 멈출 수 없습니다. 설상가상으로 그는 차르, 카이저, 왕들의 옛 위엄을 추구하며 점점 더 정치 스펙트럼의 극우파와 손을 잡고 있습니다. 이것은 사회의 미래가 아니며 우리는 군주가 필요한 시대를 훨씬 지났습니다. 이제 국민의 이익을 위해 그들의 자산을 압수하고 그들이 평범한 사람들처럼 살게 할 때입니다. 그들은 원래 평범한 사람이니까요."
  AAT_Sweden_communism.6.a: "자산을 몰수하라, 다른 사람들처럼 일하면 된다."

  AAT_Sweden_communism.7.t: "킬봄, 플뤼그 축출 시도"
  AAT_Sweden_communism.7.desc: "칼 실봄이 당의 통제권을 장악하려 움직이고 있습니다. 이로 인해 당은 양분되었으며, 한쪽은 플뤼그를, 다른 한쪽은 실봄을 지지하고 있습니다. 이는 우리가 이미 이룩한 정치적 승리를 불안정하게 만들 위험이 있으며, 이대로 계속된다면 권력 전체를 잃을 수도 있습니다. 우리는 누가 [SWE.GetName]을(를) 밝은 미래로 이끌어야 할지 결정해야 합니다."
  AAT_Sweden_communism.7.a: "실봄이 우리를 미래로 이끌 것이다"
  AAT_Sweden_communism.7.b: "플뤼그가 정답이다"
  AAT_Sweden_communism__7_tt_1: "이는 우리를 연합국과 동맹하게 할 것입니다"
  AAT_Sweden_communism__7_tt_2: "이는 우리를 독일과 동맹하게 할 것입니다"
  AAT_Sweden_communism.7.c: "사실, 스탈린주의도 결국 그리 나쁜 생각은 아닐지도 모릅니다"
  #### DENMARK ####
 denmark_political_events.1.t: "불신임 결의안"
 denmark_political_events.1.desc: "최근 [Den.GetLeader]의 지도력은 심각한 감시와 비판에 직면했으며, 의회는 총리의 사임을 요구하고 있습니다."
 denmark_political_events.1.a: "불신임 투표"
 denmark_political_events.1.b: "조기 총선을 요구하라!"
 DEN_available_candidates_tt: "§Y선출 가능 후보:§!"
 denmark_political_events.2.t: "새 지도부 선출 투표"
 denmark_political_events.2.desc: "의회는 [Den.GetLeader] 총리의 지도력에 대한 불신임 투표를 진행하기로 결정했습니다. 이제 문제는 누가 그의 자리를 대신할 것인가입니다."
 denmark_political_events.2.a: "사회민주주의냐, 혼돈이냐!"
 denmark_political_events.2.b: "우리에겐 자유주의 정부가 필요하다"
 denmark_political_events.2.c: "유혈사태 없는 인민 혁명"
 denmark_political_events.2.d: "우리에겐 전통과 안정이 필요하다"
 denmark_political_events.2.e: "우리는 새로운 것을 시도해야 한다"
 DEN_prime_minister_resigns_tt: "§Y[DEN.GetLeader]§!이(가) §Y총리§!직에서 사임합니다!"
 denmark_political_events.3.t: "선거 운동 계획"
 denmark_political_events.3.desc: "[GetElectionCampaignDesc]"
 denmark_political_events.3.desc_annual_election: "[DEN.GetNameDef]에서 다시 선거를 치를 때가 왔습니다. 각 정당은 지지자들을 결집하고 유권자들을 각자의 대의에 동원하기 위해 다가오는 선거 운동을 계획하고 있습니다."
 denmark_political_events.3.desc_snap_election: "조기 총선 요구로 인해 [DEN.GetNameDef]의 정당들은 각자의 대의를 위해 유권자들의 마음을 돌리고자 서둘러 선거 운동을 준비하고 있습니다."
 denmark_political_events.3.a: "민주주의냐, 혼돈이냐"
 denmark_political_events.3.b: "공산주의 선거 운동 계획"
 denmark_political_events.3.c: "농민당 선거 운동 계획"
 denmark_political_events.3.d: "파시스트 선거 운동 계획"
 denmark_political_events.4.t: "민주주의 선거 운동 개시"
 denmark_political_events.4.desc: "여러 민주주의 정당 내에서 선거 운동 구성 방식을 두고 흔한 논쟁이 벌어지고 있습니다. 일부는 이미 고조된 긴장을 더 심화시키지 않고 선거 운동 기간 내내 정중한 어조를 유지하길 원합니다. 다른 이들은 바로 이 때문에 어두운 저류를 막고 압도적인 승리를 거두려면 공세에 나서야 한다고 주장합니다. 또 다른 이들은 상대를 권력에서 몰아내기 위해 적극적으로 공격해야 한다고 주장합니다."
 denmark_political_events.4.a: "정중함을 유지하라"
 denmark_political_events.4.b: "공세에 나서라"
 denmark_political_events.4.c: "적대 세력을 공격하라"
 denmark_political_events.5.t: "$DEN_communism_party$의 선거 운동 개시"
 denmark_political_events.5.desc: "$DEN_communism_party_long$ 내부에서 다가오는 선거 운동에 대한 논쟁이 불거졌습니다. 일부는 이미 고조된 긴장을 더 높이고 싶지 않다며 선거 운동 내내 정중한 태도를 유지해야 한다고 주장합니다. 다른 이들은 바로 이 때문에 우리가 공세에 나서야 한다고 주장합니다. 현존하는 악을 저지하기 위해서 말입니다. 또 다른 이들은 적대 세력을 권력에서 멀리 떨어뜨리기 위해 적극적으로 공격해야 한다고 주장합니다."
 denmark_political_events.6.t: "$DEN_neutrality_party$의 선거 운동 개시"
 denmark_political_events.6.desc: "$DEN_neutrality_party_long$ 내부에서 다가오는 선거 운동에 대한 논쟁이 불거졌습니다. 일부는 이미 고조된 긴장을 더 높이고 싶지 않다며 선거 운동 내내 정중한 태도를 유지해야 한다고 주장합니다. 다른 이들은 [DEN.GetNameDef]에 대한 우리의 비전을 실현하기 위해 공세에 나서야 한다고 주장합니다. 그리고 또 다른 이들은 적대 세력을 공격하는 것이 그들을 약화시키고 우리를 강화하는 유일한 방법이라고 주장합니다."
 denmark_political_events.7.t: "$DEN_fascism_party$의 선거 운동 개시"
 denmark_political_events.7.desc: "$DEN_fascism_party_long$ 내부에서 다가오는 선거 운동에 대한 논쟁이 불거졌습니다. 일부는 이미 고조된 긴장을 더 높이는 것을 주저하며 정중한 태도를 유지해야 한다고 주장합니다. 다른 이들은 [DEN.GetNameDef]에 대한 우리의 비전을 실현하기 위해 공세에 나서야 한다고 주장합니다. 그리고 또 다른 이들은 적대 세력을 공격하는 것이 그들을 약화시키고 우리를 강화하는 유일한 방법이라고 주장합니다."
 denmark_political_events.8.t: "새 정부 구성"
 denmark_political_events.8.desc: "덴마크 선거가 끝났습니다. 각 정당들은 국민들이 자신들의 대의에 투표하도록 설득하기 위해 최선을 다했습니다. 선거 운동은 끝났을지 모르지만, 어떤 이들은 가장 어려운 부분은 바로 지금, 즉 정부를 구성하는 일부터 시작된다고 주장할 것입니다. 총리 선출은 예측 가능한 미래 동안 [DEN.GetNameDef]의 나아갈 길을 결정할 것입니다."
 denmark_political_events.8.a: "민주주의 총리를 선택하라"
 denmark_political_events.8.b: "$DEN_aksel_larsen$이 우리를 새로운 시대로 이끌 것입니다!"
 denmark_political_events.8.c: "$DEN_knud_bach$이 우리를 올바른 길로 이끌 것입니다"
 denmark_political_events.8.d: "$DEN_frits_clausen$을 등극시키자"
 denmark_political_events.9.t: "민주주의 총리"
 denmark_political_events.9.desc: "덴마크 선거가 끝나면서, 명백한 승자는 민주주의입니다. 단일한 생각을 가진 공산주의자들이나 획일적인 파시스트들과는 달리, 민주주의 정당들은 단일체가 아닙니다. 각 정당들은 앞으로 다가올 격동의 시기를 헤쳐나갈 [Den.GetNameDef]을 가장 잘 이끌 방법에 대해 각자의 비전을 가지고 있습니다. 문제는, 누가 새 정부를 구성하도록 허락받아야 하는가입니다."
 denmark_political_events.9.a: "사회민주당이 우리를 혼돈에서 지켜줄 것입니다"
 denmark_political_events.9.b: "벤스터당이 우리를 자유롭고 분별 있게 지켜줄 것입니다"
 denmark_political_events.9.c: "보수인민당이 우리를 보호할 것입니다"
 denmark_political_events.10.t: "정치적 반대 세력"
 denmark_political_events.10.desc: "지난 선거에서 우리가 성공한 후, 우리 정부를 약화시키려는 악의적인 거짓말이 퍼지고 있습니다. 이 소문의 배후가 누구인지는 분명하지만, 우리가 할 수 있는 일은 거의 없습니다. 정치적 반대 세력이 이 거짓말을 중심으로 결집하는 것은 놀라운 일이 아닙니다!"
 denmark_political_events.10.a: "파시스트의 거짓말이다!"
 denmark_political_events.10.b: "공산주의자의 거짓말이다!"
 denmark_political_events.11.t: "군주주의 운동"
 denmark_political_events.11.desc: "[ROOT.GetNameDef]에 뭔가 썩은 것이 있습니다! 마침내 국민에 의한, 국민을 위한 정부가 들어섰지만, 모두가 행복한 것은 아닙니다. 애국자를 자처하는 운동이 일어나, 군주제라는 낡은 제도 뒤에 결집하고 있습니다. 그들은 어느 정도 세력을 얻고 있지만, 아직 위협이 되는 것 같지는 않습니다."
 denmark_political_events.11.a: "왔던 곳, 그 그림자 속으로 돌아가라!"
 #Occupation Events
 denmark_occupation_event.1.t: "싸울 것인가, 굴복할 것인가"
 denmark_occupation_event.1.desc: "우리가 명백히 중립을 선언했음에도 불구하고, 전쟁이 [DEN.GetNameDef]에 닥쳐왔습니다. 우리가 일찍 굴복하고 항복한다면, 아직 전쟁의 공포로부터 국민을 보호할 수 있을지도 모릅니다. 이런 식으로, 우리는 유리한 양보를 얻어내고 반독립적으로 계속 운영할 수 있을 것입니다."
 denmark_occupation_event.1.a: "이 싸움에서 이길 수 없습니다"
 DEN_denmark_keeps_government_form_tt: "[DEN.GetFlag]§Y[DEN.GetNameDefCap]§!은(는) 현재 정부 형태를 유지할 것입니다\n\n"
 denmark_occupation_event.1.b: "우리는 맞서 싸워야 합니다!"
 denmark_occupation_event.2.t: "[DEN.GetNameDefCap] 항복"
 denmark_occupation_event.2.desc: "덴마크 정부와 [DEN.GetLeader](으)로부터 항복 조건을 설명하는 전문을 받았습니다. 우리가 그들의 주권과 영토 보전을 인정하고 존중한다면, 그들은 무기를 내려놓고 우리의 사실상 보호국이 되는 것에 동의할 것입니다."
 denmark_occupation_event.2.a: "그들을 보호하겠다"
 denmark_occupation_event.2.b: "그저 작은 방해물일 뿐이다"
 denmark_occupation_event.3.t: "[FROM.GetNameDefCap]이(가) 우리의 항복을 수락"
 denmark_occupation_event.3.desc: "전쟁 초기에 [FROM.GetNameDef]과(와) 유리한 평화 협정을 체결함으로써, 우리는 독립성의 일부를 유지하고 정부 형태를 지킬 수 있었습니다. 사실상의 [FROM.GetAdjective] 보호국으로서 이 상대적인 자유를 보존하기 위해, 우리는 그들과 협력하고 광범위한 협력 정책을 수립해야만 합니다. 당분간은 말입니다."
 denmark_occupation_event.3.a: "적어도 약간의 독립성은 유지할 것입니다"
 denmark_occupation_event.5.t: "[FROM.GetNameDefCap]이(가) 우리의 제안을 기각"
 denmark_occupation_event.5.desc: "[FROM.GetNameDefCap]은(는) 우리의 관대한 항복 제안을 거부하고 폭력과 피를 선택했습니다. 우리는 [FROM.GetAdjective] 병력의 피를 말려버리고 우리가 그렇게 쉽게 정복되지 않는다는 것을 보여줄 것입니다!"
 denmark_occupation_event.5.a: "모든 덴마크인이여, 저항하라!"
 denmark_occupation_event.6.t: "[DEN.GetDanishIndependenceTitle]"
 denmark_occupation_event.6.t_declares_independence: "[DEN.GetNameDefCap], 독립을 선포하다!"
 denmark_occupation_event.6.t_asks_for_independence: "[DEN.GetNameDefCap], 독립을 요청"
 denmark_occupation_event.6.desc: "[DEN.GetDanishIndependenceDesc]"
 denmark_occupation_event.6.desc_declares_independence: "덴마크인들이 독립을 선언하고, 더는 그들에 대한 우리의 패권을 인정하지 않는다고 합니다. 우리의 보호 아래 안정과 안보를 제공해 주었더니, 이런 식으로 보답하는 겁니까?"
 denmark_occupation_event.6.desc_asks_for_independence: "우리의 충실한 속국 [FROM.GetNameDef]에서 [FROM.GetLeader]이(가) 직접 이끄는 대표단을 맞이했습니다. 그들은 예속 상태의 종식을 논하고 자유를 되돌려달라고 요청하기 위해 [ROOT.GetLeader]에게 직접 찾아온 것 같습니다."
 denmark_occupation_event.6.a: "은혜도 모르는 배신자들"
 denmark_occupation_event.6.b: "그들은 중요치 않다"
 denmark_occupation_event.7.t: "덴마크 독립 전쟁"
 denmark_occupation_event.7.desc: "[FROM.GetLeader]은(는) 또다시 이성을 거부하고 우리의 독립을 인정하지 않고 있습니다. 이 예속 상태에서 벗어날 다른 길은 없는 것 같으니, 우리는 자유를 주장하고 싸워야만 합니다. 피를 흘리게 되겠지만, [ROOT.GetNameDef]은(는) 다시 한번 자유로워질 것입니다!"
 denmark_occupation_event.7.a: "모든 덴마크인이여, 저항하라!"
 denmark_occupation_event.7.b: "정의는 승리할 것입니다!"
 denmark_occupation_event.8.t: "덴마크의 독립"
 denmark_occupation_event.8.desc: "[FROM.GetLeader]이(가) 마침내 이성을 되찾고 우리의 독립을 인정했습니다. 어떠한 유혈 사태도 없이 우리의 예속 상태가 끝난 것 같습니다."
 denmark_occupation_event.8.a: "이건... 예상외로 쉽군"
 denmark_occupation_event.10.t: "반점령 파업 발발"
 denmark_occupation_event.10.desc: "점령에 항의하는 파업이 [DEN.GetNameDef] 전역에서 일어났습니다. 이는 불만과 저항을 보여주는 평화적인 방법이지만, [?DEN.DEN_overlord_nation.GetNameDef]과의 관계에는 분명 해가 될 것입니다."
 denmark_occupation_event.10.a: "정말... 예상 밖이군"
 denmark_occupation_event.11.t: "반점령 파업 종료"
 denmark_occupation_event.11.desc: "[?DEN.DEN_overlord_nation.GetAdjective]의 점령에 항의하는 전국적인 파업이 끝났습니다. 덴마크 국민들은 점령군에게 자유와 해방을 향한 우리의 열망이 그 어느 때보다 강하다는 것을 보여주었습니다."
 denmark_occupation_event.11.a: "이것은 시작에 불과하다"
 denmark_occupation_event.20.t: "무기고 습격 성공"
 denmark_occupation_event.20.desc: "신중한 계획과 대담한 작전 끝에, 저항군 일원들이 명목상의 종주국을 위해 마련된 무기를 가지고 성공적인 습격에서 돌아왔습니다. 이번 행동은 자유를 위한 우리의 계속되는 투쟁에 힘을 실어줄 것입니다!"
 denmark_occupation_event.20.a: "이 무기들이 유용하게 쓰일 것이다"
 denmark_occupation_event.30.t: "민간 산업 시설 파괴 공작 성공"
 denmark_occupation_event.30.desc: "이번 작전에는 신중한 계획이 투입되었으며, 모든 준비와 적절한 상황을 기다린 오랜 기다림은 그만한 가치가 있었습니다. 우리는 [?DEN.DEN_overlord_nation.GetNameDef]에 덴마크 상품을 공급하던 핵심 산업 기반 시설을 성공적으로 파괴했습니다. 이 대담한 행동은 명목상의 종주국이 우리에게서 받는 생산품을 제한할 것입니다."
 denmark_occupation_event.30.a: "대성공이다!"
 denmark_occupation_event.40.t: "군수 산업 시설 파괴 공작 성공"
 denmark_occupation_event.40.desc: "저항 운동 단원들은 몇 달 동안 일련의 파괴 공작을 계획해 왔으며, 마침내 계획을 실행에 옮겼습니다. 중요한 군수 산업 기반 시설을 파괴함으로써 [?DEN.DEN_overlord_nation.GetNameDef]은 덴마크 영토에서 생산되는 무기를 더 적게 받게 될 것입니다."
 denmark_occupation_event.40.a: "대성공이다!"
 denmark_occupation_event.100.t: "덴마크의 재편성"
 denmark_occupation_event.100.desc: "덴마크 정부는 자신들의 최선의 이익이 어디에 있는지 깨닫고 우리와 정책 노선을 맞추기로 한 것 같습니다. 우리는 [FROM.GetLeader]로부터 군사 능력을 발전시키고 우리와 힘을 합칠 수 있도록 허락해 달라는 요청을 받았습니다. 이를 통해 그들은 우리로부터 더 독립적으로 더욱 공격적인 외교 정책을 추구할 수 있게 될 것입니다."
 denmark_occupation_event.100.a: "우리의 전우들을 환영한다!"
 denmark_occupation_event.100.b: "그들의 보잘것없는 군대 없이도 우리는 해낼 수 있다"
 denmark_occupation_event.101.t: "[FROM.GetNameDefCap]이(가) 우리의 동맹 제안을 수락하다"
 denmark_occupation_event.101.desc: "현명한 [FROM.GetLeader]은(는) 우리를 동맹으로 흔쾌히 받아들였으며, 전쟁에 기여할 우리의 능력을 인정했습니다. 또한 우리는 군사 능력을 발전시킬 허가도 받았습니다. 이 모든 것을 통해 우리는 더욱 공격적인 외교 정책을 추구하고, 우리의 [FROM.GetAdjective] 종주국을 위해 북유럽을 확보할 수 있을 것입니다."
 denmark_occupation_event.101.a: "실로 영광스러운 날이다!"
 denmark_occupation_event.102.t: "[FROM.GetNameDefCap]이(가) 우리의 동맹 제안을 거절하다"
 denmark_occupation_event.102.desc: "[FROM.GetLeader]은(는) 어리석게도 우리가 [FROM.GetNameDef]을(를) 돕고 지원을 제공할 수 있는, 양국 간의 더 깊은 협력을 시작하자는 우리의 손길을 거절했습니다. 그들은 동맹에 의존하는 대신 혼자서 해나가는 것을 선호하는 것 같습니다."
 denmark_occupation_event.102.a: "그들은 우리의 힘을 과소평가하고 있다!"
 denmark_occupation_event.110.t: "[FROM.GetNameDefCap]이(가) 충성을 맹세하다"
 denmark_occupation_event.110.desc: "[FROM.GetLeader]이(가) 직접 이끄는 덴마크 대표단이 우리 수도에 도착하여 [ROOT.GetLeadr]과(와) [ROOT.GetAdjective]의 대의에 개인적으로 충성을 맹세했습니다. 덴마크 정부는 우리의 협력을 전적으로 받아들이고 최선을 다해 지원하기로 결심한 것 같습니다."
 denmark_occupation_event.110.a: "두 팔 벌려 그들을 받아들여라"
 denmark_occupation_event.110.b: "그들의 충성은 필요 없다"
 denmark_occupation_event.111.t: "[FROM.GetNameDefCap]이(가) 우리의 충성을 환영하다"
 denmark_occupation_event.111.desc: "[FROM.GetLeader]은(는) 두 팔 벌려 [ROOT.GetLeader]을(를) 환영했으며, 우리의 가치와 파트너십에 대한 기여를 인정했습니다. 이는 양국을 더욱 긴밀하게 결속시켜 우리 모두를 더 강하게 만들 것입니다."
 denmark_occupation_event.111.a: "훌륭한 신뢰의 징표다"
 denmark_occupation_event.112.t: "[FROM.GetNameDefCap], 우리의 충성을 거부하다"
 denmark_occupation_event.112.desc: "[FROM.GetLeader]는 어리석게도 [ROOT.GetLeader]를 외면하고 우리의 충성을 거부했으며, 우리의 능력과 커져가는 힘을 얕보았습니다. 우리가 자유를 되찾고자 한다면 남은 선택지는 단 하나, 전쟁뿐입니다."
 denmark_occupation_event.112.a: "저들에게 뼈저린 교훈을 안겨주겠다!"
 #Resistance Events
 denmark_resistance_event.1.t: "[DEN.GetNameDefCap], 우리의 지원을 요청하다"
 denmark_resistance_event.1.desc: "[DEN.GetNameDef]로부터 극비리에 전달된 메시지를 받았습니다. 그들은 [?DEN.DEN_overlord_nation.GetNameDef]로부터 주권을 되찾고 독립을 선언할 그날이 왔을 때 자신들의 주장을 지지해 줄 동맹을 조용히 찾고 있습니다. 이 분쟁에서 어느 한쪽 편을 들겠습니까?"
 denmark_resistance_event.1.a: "자유로운 [DEN.GetNameDef]를 위하여!"
 denmark_resistance_event.1.b: "그들이 자초한 일이다"
 DEN_supports_denmark_TT: "우리는 [DEN.GetFlag]§Y[FROM.GetNameDef]§!이(가) 독립을 선언할 경우, 그들을 지원하고 동맹을 맺는 데 동의합니다"
 denmark_resistance_event.2.t: "[FROM.GetNameDefCap], 우리를 지원하기로 합의하다"
 denmark_resistance_event.2.desc: "용감한 [FROM.GetLeader]는 우리가 자유를 되찾기 위한 투쟁에 [FROM.GetAdjective]의 지원을 비밀리에 제공하기로 결정했습니다! 이는 우리가 잔혹한 지배자로부터 독립을 선언할 때가 오면 분명 큰 도움이 될 것입니다."
 denmark_resistance_event.2.a: "훌륭하군!"
 denmark_resistance_event.3.t: "[FROM.GetNameDefCap], 우리의 지원 요청을 거절하다"
 denmark_resistance_event.3.desc: "비겁한 [FROM.GetLeader]는 우리가 자유를 되찾기 위한 투쟁에 [FROM.GetAdjective]의 지원을 보류하기로 결정했습니다. 우리는 필요한 지원을 찾기 위해 다른 곳으로 눈을 돌려야 합니다."
 denmark_resistance_event.3.a: "제기랄!"
 denmark_resistance_event.4.t: "[DEN.GetNameDefCap], 무기를 요청하다"
 denmark_resistance_event.4.desc: "[DEN.GetNameDef]로부터 그들의 저항 운동을 무장시키고 자유를 되찾기 위한 투쟁을 돕기 위해 무기 인도를 요청받았습니다."
 denmark_resistance_event.4.a: "우리가 가진 것을 보급해주자"
 denmark_resistance_event.4.b: "여유분이 없다..."
 denmark_resistance_event.5.t: "[FROM.GetNameDefCap], 무기 인도를 수락하다"
 denmark_resistance_event.5.desc: "[FROM.GetAdjective] 측은 우리의 무기 요청에 응하기로 결정했으며, 물자를 공중 투하할 계획입니다. 저항군 대원들은 이미 [FROM.GetAdjective] 정보부 요원들과 인도받을 접선 장소와 시간을 조율했습니다."
 denmark_resistance_event.6.t: "[FROM.GetNameDefCap], 우리의 무기 요청을 거절하다"
 denmark_resistance_event.6.desc: "우리의 [FROM.GetAdjective] 동맹국에 대한 무기 요청이 거절되었습니다. 그들은 현재로서는 여분의 장비가 없다고 미안해하며 전해왔습니다."
 denmark_resistance_event.7.t: "[DEN.GetNameDefCap], 우리의 지원을 촉구하다"
 denmark_resistance_event.7.desc: "[DEN.GetNameDefCap]이(가) 억압적인 지배자로부터 독립을 선언했습니다. 보고에 따르면, [?DEN.DEN_overlord_nation.GetAdjective] 지도자 [?DEN.DEN_overlord_nation.GetLeader]는 소식을 듣고 분노에 차 욕설을 퍼부었다고 합니다. 이제 덴마크인들은 우리가 합의를 존중하여 그들을 동맹에 받아들여 줄 것을 촉구하고 있습니다."
 denmark_resistance_event.7.a: "그들과 힘을 합치자!"
 denmark_resistance_event.7.b: "상황이 변했다..."
 denmark_resistance_event.7.c: "우리가 결정할 입장이 아니다"
 denmark_resistance_event.8.t: "[FROM.GetNameDefCap], 우리를 세력으로 초대하다"
 denmark_resistance_event.8.desc: "[From.GetLeader]는 우리의 합의를 존중하여 그들의 동맹에 가입하라는 초대를 보내왔습니다."
 denmark_resistance_event.9.t: "[FROM.GetNameDefCap], 협정 철회"
 denmark_resistance_event.9.desc: "불명예스러운 [From.GetLeader]이(가) 우리의 합의를 어기고 동맹 초대를 거부했습니다!"
 denmark_resistance_event.9.a: "비열한 배신자들!"
 denmark_resistance_event.10.t: "[FROM.GetNameDefCap], [DEN.GetNameDefCap]의 세력 가입 요구"
 denmark_resistance_event.10.desc: "방금 [FROM.GetNameDef]이(가) [DEN.GetNameDef]의 독립 선언을 지지하고 군사적으로 협력하기로 하는 협정을 맺었다는 보고를 받았습니다. [FROM.GetLeader]은(는) 이제 우리가 덴마크인들과 맺은 그들의 협정을 존중하고 이행할 것을 주장하고 있습니다."
 denmark_resistance_event.10.a: "동맹 전체를 강화할 것입니다"
 denmark_resistance_event.10.b: "우리는 그들의 협정을 존중할 의무가 없습니다"
 denmark_resistance_event.11.t: "[DEN.GetNameDefCap], 정보 제공 제안"
 denmark_resistance_event.11.desc: "우리 정보기관 요원들에게 덴마크 측 정보기관이 접촉해 왔으며, 양국 간의 정보 공유를 원한다고 합니다. 이는 의심할 여지 없이 우리의 비밀 작전을 강화하고 양국 모두에게 이익이 될 것입니다."
 denmark_resistance_event.11.a: "적의 적은 친구라고들 하지..."
 denmark_resistance_event.11.b: "그들의 도움은 필요 없습니다"
 denmark_resistance_event.12.t: "[FROM.GetNameDefCap], 정보 교환 제안 수락"
 denmark_resistance_event.12.desc: "[FROM.GetAdjective] 정보기관은 양국 간의 정보 공유가 가져올 이점을 파악하고 우리의 제안에 동의했습니다. "
 denmark_resistance_event.12.a: "현명한 결정입니다"
 denmark_resistance_event.13.t: "[FROM.GetNameDefCap], 정보 교환 거부"
 denmark_resistance_event.13.desc: "[FROM.GetNameDef]의 정보기관은 현명하지 못하고 근시안적입니다. [FROM.GetAdjective] 정보부장은 양국 간의 정보 공유가 가져올 이점을 보지 못하고 우리의 제안을 거부했습니다."
 denmark_resistance_event.13.a: "어리석은 결정이군"
 
 denmark_resistance_event.20.t: "덴마크의 병력 주둔 문의"
 denmark_resistance_event.20.desc: "저희는 [DEN.GetLeader]로부터 비밀 문의를 받았습니다. [DEN.GetNameDef]의 완전한 해방을 준비하기 위해 [ROOT.GetAdjective] 영토에 덴마크군을 주둔시켜 훈련하고 장비를 갖추게 하는 것에 대한 저희의 관심을 떠보는 내용입니다. 그들을 '헌병'으로 위장하여 병력 수와 진짜 목적을 숨길 수 있을 것입니다."
 denmark_resistance_event.20.a: "그들을 주둔시키겠습니다"
 denmark_resistance_event.20.b: "그들의 종주국을 자극할 여유가 없습니다"
 denmark_resistance_event.21.t: "[FROM.GetNameDefCap], 우리 병력 주둔 수락"
 denmark_resistance_event.21.desc: "[FROM.GetNameDefCap]이(가) 때가 되면 [DEN.GetNameDef]의 해방을 준비할 수 있도록, 우리의 망명 덴마크 여단을 주둔시키는 것에 친절하게도 동의했습니다."
 denmark_resistance_event.22.t: "[FROM.GetNameDefCap], 우리 병력 거부"
 denmark_resistance_event.22.desc: "[FROM.GetNameDefCap]이(가) 우리의 망명 덴마크 여단 주둔을 불명예스럽게도 거부했으며, 때가 무르익었을 때 [DEN.GetNameDef]의 해방을 위해 그들을 준비시키지 않을 것입니다. 우리는 필요한 지원을 찾기 위해 다른 곳을 알아봐야 합니다."
 denmark_resistance_event.23.t: "[DEN.GetAdjective]의 구형 함선 구매 문의"
 denmark_resistance_event.23.desc: "덴마크 대표단이 비밀리에 저희를 방문하여, 저희의 구형 구축함 일부를 판매할 의향이 있는지 문의했습니다. [DEN.GetNameDefCap]은(는) [?DEN.DEN_overlord_nation.GetNameDef]의 지배하에 있으며, 이는 그들이 독립을 선언하기 위해 힘을 모으고 있다는 명백한 징후일 수 있습니다. 저희가 그들의 독립을 되찾는 것을 도울 의향이 있습니까?"
 denmark_resistance_event.23.a: "구형 구축함 몇 척을 제공한다"
 denmark_resistance_event.23.b: "그들의 종주국을 자극할 여유가 없습니다"
 denmark_resistance_event.24.t: "[FROM.GetNameDefCap], 구축함 판매에 동의"
 denmark_resistance_event.24.desc: "[FROM.GetNameDefCap] 측이 현명하게도 구형 구축함 일부를 우리에게 판매하기로 동의했습니다! 우리는 이 구축함들을 [?DEN.DEN_overlord_nation.GetNameDef]에게서 숨겨야 하며, 공격할 때가 왔을 때만 배치해야 합니다."
 denmark_resistance_event.25.t: "[FROM.GetNameDefCap], 구축함 판매 거부"
 denmark_resistance_event.25.desc: "[FROM.GetNameDefCap] 측이 어리석게도 구형 구축함 일부를 판매해 달라는 우리의 요청을 거절했습니다. 그들의 어리석은 행동이 우리 해역을 확보하기 위한 함대 증강을 막지는 못할 것이며, 우리는 더 우호적인 다른 국가를 찾아볼 것입니다."
 denmark_resistance_event.30.t: "국왕의 일일 순행"
 denmark_resistance_event.30.desc: "국왕께서는 점령군에 대한 조용한 저항의 표시로 매일 경호원 없이 코펜하겐을 말을 타고 지나가는 것을 습관으로 삼으셨으며, 이는 [?DEN.DEN_overlord_nation.GetAdjective]의 점령에 저항하는 온 국민의 상징이 되었습니다."
 denmark_resistance_event.30.a: "정말 용감하십니다!"
 denmark_overlord_events.1.t: "전보 위기"
 denmark_overlord_events.1.desc: "우리 국왕께서 보낸 전보로 인해 우리나라와 [?DEN.DEN_overlord_nation.GetNameDef] 사이에 외교적 위기가 발생하고 있습니다. 메시지 내용은 '진심으로 감사드립니다'가 전부였지만, [?DEN.DEN_overlord_nation.GetLeader]는 국왕의 생일에 대한 [?DEN.DEN_overlord_nation.GetAdjective] 지도자의 축하에 대한 국왕의 무성의한 답변으로 여겨 불쾌해했다고 합니다. \n양국 관계는 한동안 긴장 상태에 있었으며, 이것이 우리 종주국이 우리의 독립과 정부에 대한 통제를 강화하기 위해 찾고 있던 변명이 될 수도 있습니다."
 denmark_overlord_events.1.a: "사과하고 상황을 수습하려 노력한다"
 denmark_overlord_events.1.b: "[?DEN.DEN_overlord_nation.GetLeader]에게 안부를 전한다"
 denmark_overlord_events.2.desc: "자비로우신 우리 지도자 [ROOT.GetLeader]께서 [FROM.GetNameDef]의 국왕에게 생일을 축하하는 진심 어린 전보를 보냈으나, 짧고 냉담한 답장을 받았습니다. 이제 덴마크인들은 자신들의 모욕이 얼마나 심각한지 깨닫고 프레데리크 왕세자를 보내 [ROOT.GetLeader]에게 직접 사과할 것을 제안합니다. \n하지만 우리는 이 기회를 이용하여 우리 관할 하에서 상당히 자유로운 특권을 누려온 속국에 대해 더 엄격한 통제를 가할 수도 있습니다."
 denmark_overlord_events.2.a: "사과를 받아들인다"
 denmark_overlord_events.2.b: "그들의 무례함을 처벌한다"
 denmark_overlord_events.3.t: "[FROM.GetLeader], 우리의 사과를 수락하다"
 denmark_overlord_events.3.desc: "[FROM.GetLeader]를 달래려는 우리의 노력이 일단은 성과를 거둔 것 같습니다."
 denmark_overlord_events.3.a: "위기를 모면했다"
 denmark_overlord_events.4.t: "[FROM.GetLeader], 우리의 사과를 거부하다"
 denmark_overlord_events.4.desc: "[FROM.GetLeader]는 이성적으로 판단하기를 거부하고, 국왕께서 그의 축하에 보낸 짧은 전보 답장을 개인적인 모욕으로 받아들여 이 불행한 오해에 대해 우리를 처벌하기로 작정한 것 같습니다."
 denmark_overlord_events.4.a: "유감스럽군"
 denmark_overlord_events.5.desc: "자비로우신 우리 지도자 [ROOT.GetLeader]께서 [FROM.GetNameDef]의 국왕에게 생일을 축하하는 진심 어린 전보를 보냈으나, 짧고 냉담한 답장을 받았습니다. 설상가상으로, 덴마크인들은 이제 자기 국왕의 실수를 인정하고 제대로 사과하기를 거부하고 있습니다. \n이는 우리 속국에게 분수를 알게 하고, 우리 관할 하에서 누리는 그들만의 특권이 당연한 것이 아님을 상기시킬 절호의 기회가 될 수 있습니다."
 denmark_overlord_events.5.a: "처리해야 할 더 시급한 문제들이 있다..."
 denmark_overlord_events.5.b: "이 오만방자함은 처벌받아야 한다!"
 denmark_overlord_events.6.t: "전보 위기, 저절로 해결되다"
 denmark_overlord_events.6.desc: "[FROM.GetLeader]가 우리 국왕의 생일 전보에 대한 간결하지만 핵심을 찌르는 답변에 개인적으로 모욕을 느끼기로 한 것에 대해 우리가 사과를 거부한 것이 눈에 띄지 않았거나 무시된 것 같습니다."
 denmark_overlord_events.6.a: "그들이 잘못이 전적으로 자신들에게 있음을 인정한 것이 틀림없다"
 denmark_overlord_events.7.t: "[FROM.GetNameDefCap], 가혹한 신법을 부과하다"
 denmark_overlord_events.7.desc: "'전보 위기'로 알려진 사건과 [FROM.GetLeader]의 비이성적인 태도의 직접적인 결과로, 새롭고 가혹한 법률이 통과되어 우리에게 부과되었습니다."
 denmark_overlord_events.7.a: "이 법들은 일시적일 뿐이다. 우리가 그렇게 만들 것이다!"
 denmark_overlord_events.10.t: "[FROM.GetNameDefCap], [ROOT.GetLeader]의 사임을 요구하다"
 denmark_overlord_events.10.desc: "양국 관계가 악화됨에 따라 [FROM.GetAdjective] 외무부에서 [ROOT.GetLeader]의 사임을 공식적으로 요청했습니다. \n비록 우리가 [FROM.GetAdjective]의 '보호' 아래 독특한 자치권을 부여받았지만, 양국 관계를 더 악화시키는 것은 현명하지 못한 처사일 수 있습니다."
 denmark_overlord_events.10.a: "요구에 응해야 합니다"
 denmark_overlord_events.10.b: "이건 그들이 간섭할 일이 아닙니다!"
 denmark_overlord_events.11.t: "새 총리 선출"
 denmark_overlord_events.11.desc: "이제 [ROOT.GetNameDef]를 이끌 사람뿐만 아니라 [FROM.GetAdjective] 점령군을 상대할 인물도 선택해야 할 때가 왔습니다."
 denmark_overlord_events.11.a: "민주주의 지도자"
 denmark_overlord_events.11.b: "$DEN_knud_bach$"
 denmark_overlord_events.11.c: "$DEN_aksel_larsen$"
 denmark_overlord_events.11.d: "파시스트 지도자"
 denmark_overlord_events.12.desc: "민주주의의 장점은 지도자를 선택할 수 있는 다양한 선택지를 제시한다는 점입니다."
 denmark_overlord_events.12.a: "사회민주주의자"
 denmark_overlord_events.12.b: "자유주의자"
 denmark_overlord_events.12.c: "보수주의자"
 denmark_overlord_events.12.d: "외부인"
 denmark_overlord_events.13.desc: "오직 강력한 지도력만이 [ROOT.GetNameDef]를 앞으로 이끌 수 있습니다."
 denmark_overlord_events.13.a: "$DEN_frits_clausen$"
 denmark_overlord_events.13.b: "$DEN_cay_lembcke$"
 denmark_overlord_events.14.t: "[FROM.GetNameDefCap]에서 새 총리를 선출하다"
 denmark_overlord_events.14.desc: "덴마크 정부는 우리의 요구에 응하여 새 총리를 선출했습니다."
 denmark_overlord_events.14.a: "좋소"
 denmark_overlord_events.15.t: "[FROM.GetLeader], 사임을 거부하다"
 denmark_overlord_events.15.desc: "덴마크 정부가 양국 간의 더 나은 협력을 위해 [FROM.GetLeader]의 총리직 사임을 요구한 우리의 진심 어린 요청을 거부한 것 같습니다. 바로 이런 오만함이 덴마크 국민과의 관계를 악화시킨 원인입니다! 양국 정부 간의 지속적인 협력을 유지하기 위해 조치가 필요합니다."
 denmark_overlord_events.15.a: "지금은 때가 아니다"
 denmark_overlord_events.15.b: "본보기를 보여주자"
 denmark_overlord_events.15.c: "충성스러운 협력자를 세우자"
 denmark_overlord_events.16.desc: "[ROOT.GetLeader]의 사임에 대한 [FROM.GetAdjective]의 요구에 굴복하기를 거부하자, 우리의 상전은 우리에게 겸손과 복종을 가르치기 위해 새로운 법률을 부과하기로 결정했습니다."
 denmark_overlord_events.16.a: "언젠가 우리가 그들에게 진정한 겸손을 가르쳐 줄 것이다..."
 denmark_overlord_events.17.t: "[FROM.GetAdjective], 충성스러운 정부 수립 계획"
 denmark_overlord_events.17.desc: "[ROOT.GetLeader]가 총리직 사임을 거부하자, [FROM.GetNameDefCap]는 이에 대응하여 더 친[FROM.GetAdjective]적인 정부를 세우겠다는 목표를 분명히 했습니다. 준비 여부와 상관없이 지금 봉기하지 않는 한, 이는 우리의 독립성이 축소됨을 의미할 것입니다..."
 denmark_overlord_events.17.a: "선택의 여지가 없습니다..."
 denmark_overlord_events.17.b: "자유가 아니면 죽음을!"
 denmark_overlord_events.20.t: "[FROM.GetnameDefCap]이(가) 새 정부를 요구합니다"
 denmark_overlord_events.20.desc: "[FROM.GetnameDef]이(가) [FROM.GetRulingIdeologyNoun]의 열렬한 지지자이며 [ROOT.GetRulingIdeologyNoun]을(를) 극도로 경멸한다는 것은 공공연한 사실입니다. 따라서 그들이 더는 이 이념을 고수하는 속국을 용납할 수 없다는 것은 그리 놀라운 일이 아닐 것입니다. 그들은 우리가 [ROOT.GetRulingIdeologyNoun]을(를) 포기하기를 바란다는 점을 단호하고도 고통스럽게 분명히 했습니다."
 denmark_overlord_events.20.a: "국민을 위해서... 우리는 그래야만 합니다..."
 denmark_overlord_events.20.b: "절대 굴복하지 않겠다!"
 denmark_overlord_events.21.t: "새 정부"
 denmark_overlord_events.21.desc: "종주국의 뜻에 따를 수밖에 없으므로, 이제 우리는 새 정부를 구성해야 합니다."
 denmark_overlord_events.21.b: "왕과 조국을 위하여"
 denmark_overlord_events.21.c: "혁명 없는 공산주의"
 denmark_overlord_events.21.d: "유혈사태 없는 파시즘"
 denmark_overlord_events.22.t: "민주주의와 자유는 다양한 선택을 의미합니다"
 denmark_overlord_events.22.desc: "민주주의의 아름다움은 그것이 제시하는 지도력에 대한 다양한 선택지에 있습니다."
 denmark_overlord_events.23.t: "[FROM.GetNameDefCap]이(가) 굴복하고 정부를 교체합니다"
 denmark_overlord_events.23.desc: "우리는 덴마크인들이 잘못된 길을 버리고 [FROM.GetRulingIdeologyNoun]을(를) 받아들이도록 설득하는 데 성공했습니다."
 denmark_overlord_events.23.a: "좋아. 아주 좋아!"
 denmark_overlord_events.24.t: "[FROM.GetLeader]이(가) 권력 이양을 거부합니다"
 denmark_overlord_events.24.desc: "[FROM.GetNameDef]의 [FROM.GetRulingIdeology] 지도자 [FROM.GetLeader]은(는) 이성적인 말을 듣지 않고 조국을 위한 최선의 행동을 하기를 거부합니다. 이러한 권력에 굶주린 행동은 [FROM.GetRulingIdeologyNoun]의 전형이며, 덴마크의 반응에 그리 놀랄 필요는 없습니다. 그들을 본보기로 삼아야 할지도 모릅니다..."
 denmark_overlord_events.24.a: "나중에 처리하도록 하지"
 denmark_overlord_events.24.b: "그렇다면 강제로 따르게 하겠다"
 denmark_overlord_events.25.t: "[FROM.GetNameDefCap]이(가) [FROM.GetRulingIdeology] 정부 수립을 계획합니다"
 denmark_overlord_events.25.desc: "우리는 [ROOT.GetRulingIdeologyNoun]을(를) 포기하라는 [FROM.GetAdjective]의 요구를 단호히 거부했지만, 그들이 우리의 답변에 만족하지 않을 것이라는 점을 이해했어야 했습니다. [FROM.GetAdjective]의 [FROM.GetRulingIdeologyNoun]은(는) 끝을 모르며 항상 권력을 장악하려 할 것입니다."
 denmark_overlord_events.25.a: "국민을 전쟁으로부터 구하기 위해... 우리는 따라야만 합니다"
 denmark_overlord_events.26.t: "[FROM.GetNameDefCap]이(가) 공산주의 금지를 요구합니다"
 denmark_overlord_events.26.desc: "우리는 [FROM.GetNameDef](으)로부터 전국에 걸쳐 모든 공산주의 활동을 금지하라는 요구를 받았습니다. 그들은 우리의 단호한 [FROM.GetAdjective] 종주국이 공산주의를 전적으로 받아들인 국가에 맞서 자신과 자유 세계를 용감하게 방어하고 있을 때, 이 해로운 이념이 번성하도록 허용하는 것은 반역에 가까운 행위라고 주장합니다."
 denmark_overlord_events.26.a: "공산주의를 금지하라"
 denmark_overlord_events.26.b: "협박에 굴복하여 자유 의지를 금지하지는 않겠다!"
 denmark_overlord_events.27.t: "[FROM.GetNameDefCap]이(가) 공산주의를 금지합니다"
 denmark_overlord_events.27.desc: "우리는 바로 그 이념과 사투를 벌이고 있으므로, 덴마크 정부가 공산주의를 금지하도록 설득하는 데 성공했습니다. 승자는 오직 하나일 수 있으며, [ROOT.GetAdjective] 국민이 번영하기 위해 우리는 반드시 승리해야 합니다!"
 denmark_overlord_events.27.a: "승리를 향하여!"
 denmark_overlord_events.28.t: "[FROM.GetNameDefCap]이(가) 공산주의 금지를 거부합니다"
 denmark_overlord_events.28.desc: "우리의 간청과 설득에도 불구하고 덴마크 정부는 이성을 찾지 않고 공산주의 금지를 거부합니다. 이 타락한 이념은 이미 덴마크 국민의 마음속 깊이 발톱을 박은 듯하며, 우리는 공산주의라는 사상 자체와 사생결단의 투쟁을 벌이고 있습니다. 승자는 단 하나뿐이며, [ROOT.GetAdjective] 국민의 번영을 위해 우리가 반드시 승리해야 합니다!"
 denmark_overlord_events.28.a: "우리가 승리할 것이다!"
 denmark_overlord_events.29.t: "[FROM.GetNameDefCap] 측, 파시즘 금지 요구"
 denmark_overlord_events.29.desc: "[FROM.GetNameDef]로부터 국내 모든 파시즘 활동을 금지하라는 요구를 받았습니다. 그들은 우리의 확고한 [FROM.GetAdjective] 종주국이 파시즘을 전적으로 수용한 국가에 맞서 스스로와 자유 세계를 용감히 방어하고 있는 상황에서, 이 해로운 이념이 번성하도록 내버려 두는 것은 반역에 가까운 행위라고 주장합니다."
 denmark_overlord_events.29.a: "파시즘을 금지한다"
 denmark_overlord_events.30.t: "[FROM.GetNameDefCap], 파시즘 금지"
 denmark_overlord_events.30.desc: "우리는 덴마크 정부를 성공적으로 설득하여 파시즘을 금지시켰습니다. 우리는 바로 그 이념과 사생결단의 투쟁을 벌이고 있습니다. 승자는 단 하나뿐이며, [ROOT.GetAdjective] 국민의 번영을 위해 우리가 반드시 승리해야 합니다!"
 denmark_overlord_events.31.t: "[FROM.GetNameDefCap], 파시즘 금지 거부"
 denmark_overlord_events.31.desc: "우리의 간청과 설득에도 불구하고 덴마크 정부는 이성을 찾지 않고 파시즘 금지를 거부합니다. 이 타락한 이념은 이미 덴마크 국민의 마음속 깊이 발톱을 박은 듯하며, 우리는 파시즘이라는 사상 자체와 사생결단의 투쟁을 벌이고 있습니다. 승자는 단 하나뿐이며, [ROOT.GetAdjective] 국민의 번영을 위해 우리가 반드시 승리해야 합니다!"
 denmark_overlord_events.32.t: "[FROM.GetNameDefCap], 무기 수송 요구"
 denmark_overlord_events.32.desc: "[FROM.GetAdjective]의 비축량이 고갈되고 있는 것으로 보이며, 그들은 현재 진행 중인 분쟁에 필요한 무기를 공급해달라고 우리에게 요구하고 있습니다. \n이는 또한 교활한 방법으로 우리나라를 무장 해제시켜, 우리가 봉기하여 현재 처한 [FROM.GetAdjective]의 멍에를 뒤엎지 못하게 하려는 계략일 수도 있습니다."
 denmark_overlord_events.32.a: "무기를 전달한다"
 denmark_overlord_events.32.b: "얼마 없는 무기는 전쟁이 우리에게 닥칠 경우를 대비해 필요하다..."
 denmark_overlord_events.33.t: "[FROM.GetNameDefCap], 무기 제공"
 denmark_overlord_events.33.desc: "덴마크에 대한 무기 수송 요청이 받아들여져 첫 번째 물량을 수령했습니다."
 denmark_overlord_events.34.t: "[FROM.GetNameDefCap], 무기 제공 거부"
 denmark_overlord_events.34.desc: "덴마크에 대한 무기 수송 요청이 거부되었습니다. 덴마크 정부는 전쟁이 닥칠 경우를 대비해 얼마 없는 무기가 필요하다는 설득력 없는 답변을 내놓았습니다. 그들은 또한 자신들이 중립국이며 무기를 보내는 것은 중립을 위반하는 행위라고 덧붙였습니다..."
 denmark_overlord_events.34.a: "이번 한 번은 눈감아주겠다..."
 denmark_overlord_events.34.b: "그렇게 쉽게 우리를 속일 수는 없을 것이다!"
 denmark_overlord_events.35.desc: "[FROM.GetNameDefCap] 측이 우리의 허세를 간파하고, 우리 공장에서 생산되는 무기를 지속적으로 직접 공급하도록 규정하는 새로운 법을 부과했습니다."
 denmark_overlord_events.35.a: "우리에게도 그 무기가 절실히 필요했는데"
 denmark_overlord_events.36.t: "[FROM.GetNameDefCap], 징집병 요구"
 denmark_overlord_events.36.desc: "[FROM.GetAdjective]의 인력이 부족해지고 있는 것으로 보이며, 그들은 현재 진행 중인 분쟁에 투입할 병력을 공급해달라고 우리에게 요구하고 있습니다. \n이는 또한 교활한 방법으로 우리나라를 무력화시켜, 우리가 봉기하여 현재 처한 [FROM.GetAdjective]의 멍에를 뒤엎지 못하게 하려는 계략일 수도 있습니다."
 denmark_overlord_events.36.a: "주인의 명을 따라야만 한다..."
 denmark_overlord_events.36.b: "어떤 덴마크인도 타지에서 죽게 할 순 없다!"
 denmark_overlord_events.37.t: "[FROM.GetNameDefCap], 징집병 제공 수락"
 denmark_overlord_events.37.desc: "덴마크 징집병 파병 요청이 그들 정부에 의해 수락되어, 현재 진행 중인 분쟁에 도움을 줄 첫 부대를 파견했습니다."
 denmark_overlord_events.38.t: "[FROM.GetNameDefCap], 징집병 파병 거부"
 denmark_overlord_events.38.desc: "덴마크 징집병 파병 요청이 거부되었습니다. 덴마크 정부는 자국민을 타국을 위해 타지에서 싸우다 죽게 보낼 수 없다는 설득력 없는 답변을 내놓았습니다. 그들은 또한 자신들이 중립국이며 군대를 보내는 것은 중립을 위반하는 행위라고 덧붙였습니다..."
 denmark_overlord_events.38.b: "그렇다면 강제로 데려가겠다!"
 denmark_overlord_events.39.desc: "[FROM.GetNameDefCap] 측은 덴마크인을 외국의 전쟁에 보내 죽게 할 수 없다는 우리의 거부를 묵살하고, 모든 성인 남성의 일정 비율이 [FROM.GetAdjective] 군에 복무해야 한다는 새 법을 강제했습니다."
 denmark_overlord_events.39.a: "이런 만행이!"
 denmark_overlord_events.40.t: "[FROM.GetAdjective] 전권위원"
 denmark_overlord_events.40.desc: "[FROM.GetAdjective] 외무부의 지시에 따르면, [FROM.GetAdjective] 지도부는 양국 간의 미약한 협력과 긴장 관계에 염증을 느껴, 우리의 합법 정부를 [FROM.GetNameDef]에 충성하는 총독인 전권위원으로 교체하기로 결정했습니다.\n이는 우리에게 남은 자치권과 주권을 심각하게 제한하고 회복 불가능한 피해를 초래할 수 있습니다."
 denmark_overlord_events.40.a: "이것은 사실상 [FROM.GetAdjective] 정부나 다름없습니다."
 denmark_overlord_events.40.b: "[ROOT.GetAdjective] 국민은 결코 이에 굴복하지 않을 것입니다!"
 denmark_overlord_events.41.t: "[ROOT.GetAdjective] 전권위원이 권력을 장악하다"
 denmark_overlord_events.41.desc: "우리가 예상했던 대로, 덴마크 정부는 우리의 압력에 굴복했고 우리는 [FROM.GetNameDef]을 통치할 전권위원을 성공적으로 임명했습니다. 이를 통해 해당 국가에 대한 우리의 장악력을 강화하고 우리의 대의에 더 가깝게 만들 것입니다."
 denmark_overlord_events.41.a: "모든 것이 계획대로다."
 denmark_overlord_events.42.t: "덴마크 정부, 사임을 거부하다"
 denmark_overlord_events.42.desc: "[FROM.GetNameDef]을 통치할 충성스러운 전권위원을 임명하려던 우리의 계획이 덴마크 정부와 국민의 순전한 완고함과 어리석음으로 인해 좌절되었습니다! 우리의 대의에 충성하는 정부를 세웠더라면 해당 국가에 대한 우리의 장악력을 강화하고 우리에게 더 가깝게 만들 수 있었을 것입니다."
 denmark_overlord_events.42.a: "이 문제를 더는 밀어붙이지 않겠다."
 denmark_overlord_events.42.b: "변화는 순순히 오지 않는 법이다."
 denmark_overlord_events.43.t: "[FROM.GetNameDefCap], 전권위원 정부를 강요하다"
 denmark_overlord_events.43.desc: "[FROM.GetNameDefCap] 측은 다시 한번 그들을 신뢰할 수 없으며 덴마크의 독립을 끝내려 한다는 것을 보여주었습니다. [FROM.GetLeader]은(는) 전권위원이 우리 정부를 장악하는 것을 거부한 우리를 무시하고 기어이 한 명을 임명했습니다."
 denmark_overlord_events.43.a: "감히 이 문제를 더 밀어붙일 수 없다."
 denmark_overlord_events.43.b: "우리의 자유를 위해 싸울 것이다!"
 denmark_overlord_events.44.t: "[FROM.GetNameDefCap], 유틀란트 합병을 노리다!"
 denmark_overlord_events.44.desc: "우리는 방금 유틀란트 전역을 합병하려는 터무니없는 [FROM.GetAdjective]의 계획을 발견했습니다. 결코 용납할 수 없습니다!"
 denmark_overlord_events.45.t: "[FROM.GetNameDefCap], 유틀란트를 할양하다"
 denmark_overlord_events.45.desc: "유틀란트의 보호권을 넘겨받겠다는 우리의 제안이 아무래도 [FROM.GetLeader]의 내면을 무너뜨린 것 같습니다. 우리의 요청을 받은 그는 의자에 주저앉아 그저 고개를 끄덕였습니다."
 denmark_overlord_events.46.t: "[FROM.GetNameDefCap], 유틀란트 할양을 거부하다"
 denmark_overlord_events.46.desc: "유틀란트의 보호권을 넘겨받겠다는 우리의 요청에 [FROM.GetLeader]은(는) 격분했으며, 우리의 관대한 제안을 거부했습니다."
 denmark_overlord_events.46.b: "그래도 빼앗는다."
 denmark_overlord_events.47.t: "[FROM.GetNameDefCap], 우리의 남은 영토를 요구하다!"
 denmark_overlord_events.47.desc: "[FROM.GetCapitalVictoryPointName]에서 온 대표단이 도착하여, [ROOT.GetNameDef] 전체가 공식적으로 더 큰 [FROM.GetNameDef] 세력권에 통합될 것이라는 공식 선언문을 전달했습니다."
 denmark_overlord_events.48.t: "[FROM.GetNameDefCap], 합병을 거부하다"
 denmark_overlord_events.48.desc: "[FROM.GetLeader]은(는) 우리에게 '절대 불가'라는 단 한 단어만 적힌 짧은 전보를 보냈습니다. 아무래도 그들은 우리의 완전한 보호를 원하지 않는 것 같습니다."
 denmark_overlord_events.48.b: "그들의 미약한 힘으로는 우리 상대가 되지 않는다!"
 #Rearmament Events
 denmark_protection_event.1.t: "[FROM.GetNameDefCap]에서 불가침 조약을 제안"
 denmark_protection_event.1.desc: "오늘 아침, [FROM.GetAdjective] 정부로부터 불가침 조약 체결을 제안하는 사절을 받았습니다. 이 협정에 서명하는 것은 [FROM.GetAdjective]과 더 긴밀한 협력 관계를 발전시키는 것을 의미합니다."
 denmark_protection_event.1.a: "조약에 서명하겠습니다."
 denmark_protection_event.1.b: "지금 당장은 우리에게 최선의 이익이 되지 않습니다."
 denmark_protection_event.2.t: "[FROM.GetNameDefCap]에서 불가침 조약에 서명했습니다"
 denmark_protection_event.2.desc: "[FROM.GetNameDef](으)로 보냈던 사절이 좋은 소식과 함께 돌아왔습니다! [FROM.GetAdjective] 정부가 우리 조약에 서명하기로 결정했으며, 이제 양국은 불가침 조약을 맺게 되었습니다. 이는 우리 두 국가 모두에게 위대한 날입니다."
 denmark_protection_event.2.a: "훌륭합니다!"
 denmark_protection_event.3.t: "[FROM.GetNameDefCap]에서 불가침 조약을 거부했습니다"
 denmark_protection_event.3.desc: "[FROM.GetNameDef](으)로 보냈던 사절이 나쁜 소식과 함께 돌아왔습니다. [FROM.GetAdjective] 정부는 현재로서는 불가침 조약이 자국의 최선의 이익에 부합하지 않는다고 결정했습니다. 유감스러운 일이지만, 그들을 설득하기 위해 우리가 할 수 있는 일은 아무것도 없습니다."
 denmark_protection_event.3.a: "시간 낭비였군..."
 denmark_protection_event.4.t: "[FROM.GetNameDefCap]에서 무역 협정을 제안"
 denmark_protection_event.4.desc: "[FROM.GetNameDef]로부터 양국 간의 무역을 증진하고 싶다는 소식을 받았습니다. 이를 받아들인다면, 우리는 의심할 여지 없이 [FROM.GetAdjective]과 더 긴밀한 관계를 발전시킬 것입니다."
 denmark_protection_event.4.a: "무역 증진은 양국 모두에게 이익이 될 것입니다."
 denmark_protection_event.4.b: "우리에겐 필요 없습니다."
 denmark_protection_event.5.t: "[FROM.GetNameDefCap]에서 무역 협정을 수락했습니다"
 denmark_protection_event.5.desc: "우리가 [FROM.GetAdjective] 정부에 제안했던 거래가 수락되었습니다! 이제 이 새로운 무역 협정을 시행하기 위한 준비를 시작하겠습니다."
 denmark_protection_event.5.a: "조건 초안 작성을 시작하라!"
 denmark_protection_event.6.t: "[FROM.GetNameDefCap]에서 무역 협정을 거부했습니다"
 denmark_protection_event.6.desc: "유감스럽게도, 우리의 최선의 노력에도 불구하고 무역 증진 제안이 [FROM.GetNameDef]에 의해 거절되었습니다. 아무래도 다른 곳에 제안을 해야 할 것 같습니다."
 denmark_protection_event.6.a: "매우 유감스럽군."
 denmark_protection_event.7.t: "[FROM.GetNameDefCap]에서 연구 협정을 제안"
 denmark_protection_event.7.desc: "[FROM.GetNameDef]로부터 양국이 함께 연구 협정을 맺자는 제안이 들어왔습니다. 그렇게 하면 우리는 서로의 기술 발전을 공유하게 될 것입니다. 어떻게 진행해야겠습니까?"
 denmark_protection_event.7.a: "조약에 서명하라!"
 denmark_protection_event.7.b: "이럴 시간이 없습니다."
 denmark_protection_event.8.t: "[FROM.GetNameDefCap]에서 연구 협정을 수락했습니다"
 denmark_protection_event.8.desc: "오늘 아침 [FROM.GetNameDef]로부터 공동 연구 협정 제안을 받아들이기로 결정했다는 소식을 받았습니다. 이는 훌륭한 소식이며, 이제부터 우리의 기술 발전이 더욱 가속화될 것임을 의미합니다."
 denmark_protection_event.8.a: "훌륭하군!"
 denmark_protection_event.9.t: "[FROM.GetNameDefCap]에서 연구 협정을 거부했습니다"
 denmark_protection_event.9.desc: "오늘 아침 [FROM.GetNameDef]로부터 공동 연구 협정 제안을 거절하기로 결정했다는 소식을 받았습니다. 유감스럽게도 이는 우리가 [FROM.GetAdjective] 정부와의 기술 공유로부터 어떠한 이익도 얻지 못할 것임을 의미합니다."
 denmark_protection_event.9.a: "실망스럽군."
 denmark_protection_event.10.t: "[FROM.GetNameDefCap], 영토 매각 제안"
 denmark_protection_event.10.desc: "안전 보장을 얻기 위한 노력의 일환으로, [FROM.GetNameDef]에서 자국 영토 일부를 우리에게 매각하겠다고 제안했습니다. 이는 상당한 제안이므로, 이 거래를 어떻게 진행할지 신중하게 고려해야 합니다."
 denmark_protection_event.10.a: "거래를 수락한다."
 denmark_protection_event.10.b: "우리에게는 필요 없다."
 denmark_protection_event.11.t: "[FROM.GetNameDefCap], 영토 매각 제안 수락"
 denmark_protection_event.11.desc: "훌륭한 소식입니다! [FROM.GetNameDefCap]에서 안전 보장을 대가로 한 우리의 영토 매각 제안을 수락했습니다. 우리는 약속을 지키기 위해 최선을 다하고, [FROM.GetAdjective] 정부의 이름으로 소유권 증서를 이전할 준비를 해야 합니다."
 denmark_protection_event.11.a: "훌륭하군!"
 denmark_protection_event.12.t: "[FROM.GetNameDefCap], 영토 매각 제안 거절"
 denmark_protection_event.12.desc: "[FROM.GetNameDef]에 대한 우리의 영토 매각 제안이 거절된 것 같습니다. 다음 협상에서 성공하려면 거래 조건을 더 좋게 제시해야 할지도 모릅니다."
 denmark_protection_event.12.a: "그들의 손실이다."
 denmark_protection_event.100.t: "[FROM.GetNameDefCap], 동맹 제안"
 denmark_protection_event.100.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 우리에게 힘을 합치자는 제안을 해왔습니다. 함께 맞선다면 세계의 강대국들과도 경쟁할 수 있다고 주장합니다. 어떻게 하시겠습니까?"
 denmark_protection_event.100.a: "좋다, 수락한다."
 denmark_protection_event.100.b: "어딘가 수상쩍다."
 denmark_protection_event.101.t: "[FROM.GetNameDefCap], 우리 제안 수락"
 denmark_protection_event.101.desc: "[FROM.GetLeader]을(를) 대표하는 외교관들이 최근 우리의 동맹 제안에 대한 [FROM.GetNameDef]의 답변을 전달했습니다. 그들은 우리가 방어를 강화하고 협력하지 않는다면, 전쟁의 물결이 닥쳤을 때 우리 둘 다 무너질 것이 분명하다고 말합니다."
 denmark_protection_event.101.a: "그들은 올바른 선택을 했다."
 denmark_protection_event.102.t: "[FROM.GetNameDefCap], 우리 제안 거절"
 denmark_protection_event.102.desc: "[FROM.GetLeader]을(를) 대표하는 외교관들이 최근 우리의 동맹 제안에 대한 [FROM.GetNameDef]의 답변을 전달했습니다. 그들은 만약 우리와 합류한다면 우리가 부당하게 그들의 정치에 영향을 미치려 할 것이 분명하며, 이 제안으로부터 얻을 것이 아무것도 없다고 말하며 우리의 제안을 거절했습니다."
 denmark_protection_event.102.a: "자신들의 행동에 결과가 따른다는 것을 깨닫지 못하는군."
 denmark_protection_event.110.t: "합동 [ROOT.GetAdjective]-[FROM.GetAdjective] 육군 훈련"
 denmark_protection_event.110.desc: "[FROM.GetAdjective] 외교관들이 [DEN.GetNameDef]이(가) 미래를 더 잘 대비하고 양국 간의 협력을 강화하기 위해 합동 [ROOT.GetAdjective]-[FROM.GetAdjective] 육군 훈련을 실시하자는 요청을 해왔습니다."
 denmark_protection_event.110.a: "더 나은 일을 위한 것이다."
 denmark_protection_event.110.b: "이럴 시간 없다."
 denmark_protection_event.111.t: "합동 [ROOT.GetAdjective]-[FROM.GetAdjective] 육군 훈련"
 denmark_protection_event.111.desc: "[FROM.GetNameDefCap]에서 [ROOT.GetAdjective]-[FROM.GetAdjective] 군사 훈련을 실시하자는 우리의 제안을 수락했으며, 결과적으로 우리 둘 다 더욱 강해졌습니다."
 denmark_protection_event.111.a: "완벽하군!"
 denmark_protection_event.112.t: "[ROOT.GetAdjective]-[FROM.GetAdjective] 훈련은 없을 것이다"
 denmark_protection_event.112.desc: "[FROM.GetNameDefCap]이(가) 우리의 희망을 꺾고, 합동 [ROOT.GetAdjective]-[FROM.GetAdjective] 군사 훈련을 거부했습니다. 그들은 우리가 더 이상 시간과 노력을 들일 가치가 없을 만큼 중요하지 않다고 판단한 것 같습니다..."
 denmark_protection_event.112.a: "그들의 손실이다."
 denmark_protection_event.120.t: "[FROM.GetLeader], 기술 공유를 희망"
 denmark_protection_event.120.desc: "[FROM.GetNameDefCap]은(는) 다른 국가에 비해 여러 부문에서 뒤처져 있을 수 있으나 특정 분야에서는 뛰어난 역량을 보입니다. 그들은 양국 연구소 간의 협력을 강화하면 양측 모두에게 유익한 기술적 돌파구를 마련할 수 있다고 주장합니다. 이 제안을 수락하시겠습니까?"
 denmark_protection_event.120.a: "훌륭한 제안입니다!"
 denmark_protection_event.120.b: "우리 기술을 빼가려는 속셈입니다."
 denmark_protection_event.121.t: "[FROM.GetName], 기술 공유 수락"
 denmark_protection_event.121.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 우리의 기술 공유 요청을 기꺼이 수락했으며, 양국 과학자들은 이미 공동 연구를 조율하기 시작했습니다."
 denmark_protection_event.121.a: "함께할 때 더 강해집니다."
 denmark_protection_event.122.t: "[FROM.GetName], 기술 공유 거부"
 denmark_protection_event.122.desc: "[FROM.GetNameDef]의 배은망덕한 [FROM.GetLeader]이(가) 우리의 기술 공유 제안을 거절했습니다. 그들은 이번 교류로 얻을 것이 없으며, 우리가 단지 그들의 과학적 전문성을 빼가려 한다고 주장합니다."
 denmark_protection_event.122.a: "알겠다, 비밀이나 잘 간직하시지."
 denmark_protection_event.130.t: "[FROM.GetNameDefCap], 우리를 동맹에 초대"
 denmark_protection_event.130.desc: "[FROM.GetAdjective] 외교관들이 흥미로운 제안을 가지고 우리에게 접근했습니다. 그들은 우리가 함께 세력에 가입하여 평화와 상호 보호를 강화하고, 양측 모두의 안전을 보장할 수 있다고 주장합니다. 어떻게 답하시겠습니까?"
 denmark_protection_event.130.a: "함께 맞서 싸울 것입니다."
 denmark_protection_event.130.b: "우리는 독자 노선을 걷겠습니다."
 denmark_protection_event.131.t: "[FROM.GetNameDefCap], 우리 세력에 가입"
 denmark_protection_event.131.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 세력에 함께하자는 우리의 요청을 수락했습니다. 그들은 우리가 필요할 때 우리를 도울 준비가 되어 있으며, 우리 또한 그들이 필요할 때 똑같이 해주기를 바라고 있습니다."
 denmark_protection_event.131.a: "완벽합니다!"
 denmark_protection_event.132.t: "[FROM.GetNameDefCap], 우리 세력 가입을 거부"
 denmark_protection_event.132.desc: "[FROM.GetNameDef]의 [FROM.GetLeader]이(가) 우리 세력 가입 제안을 거절하며, 악마와 같은 자들과 거래해봤자 얻을 것이 거의 없다고 말했습니다. 그들은 지역을 불안정하게 만들고 있으니, 신속하게 처리해야 합니다!"
 denmark_protection_event.132.a: "그들 손해일 뿐입니다."
 denmark_protection_event.200.t: "육군 훈련"
 denmark_protection_event.200.desc: "전쟁에 직면하여, 육군이 어떤 상황에 처하든 대비시키는 것이 중요합니다. 이 훈련을 수행함으로써, 우리 군대는 필요할 때 언제든지 [DEN.GetNameDef]의 국경을 방어할 만반의 준비를 갖추게 될 것입니다."
 denmark_protection_event.200.a: "훌륭하다!"
 denmark_protection_event.201.t: "해군 훈련"
 denmark_protection_event.201.desc: "전쟁에 직면하여, 해군이 어떤 상황에 처하든 대비시키는 것이 중요합니다. 이 훈련을 수행함으로써, 우리 수병들은 필요할 때 언제든지 [DEN.GetNameDef]의 영해를 방어할 만반의 준비를 갖추게 될 것입니다."
 denmark_protection_event.201.a: "훌륭하다!"
 denmark_protection_event.202.t: "공군 훈련"
 denmark_protection_event.202.desc: "전쟁에 직면하여, 공군이 어떤 상황에 처하든 대비시키는 것이 중요합니다. 이 훈련을 수행함으로써, 우리 조종사들은 필요할 때 언제든지 [DEN.GetNameDef]의 영공을 방어할 만반의 준비를 갖추게 될 것입니다."
 denmark_protection_event.202.a: "훌륭하다!"
 #Conquest Events
 denmark_expansion_event.1.t: "[FROM.GetNameDefCap], 우리의 합병을 요구"
 denmark_expansion_event.1.desc: "[DEN.GetAdjective] 정부가 [ICE.GetNameDef]의 복종과 자국으로의 편입을 요구하는 최후통첩을 보냈습니다. 우리의 대응은 주권 국가로서 [ICE.GetNameDefCap]의 미래를 결정하거나, 최악의 경우 전쟁으로 이어질 수 있으므로 신중해야 합니다."
 denmark_expansion_event.1.a: "받아들일 수밖에 없습니다."
 denmark_expansion_event.1.b: "덴마크인들에게 굴복할 수는 없습니다!"
 denmark_expansion_event.2.t: "[FROM.GetNameDefCap], 우리의 재통합 제안 수락"
 denmark_expansion_event.2.desc: "오늘 아침, [ICE.GetAdjective] 정부가 그들의 영토를 [DEN.GetNameDefCap]으로 재통합하자는 우리의 제안을 관대하게 수락했다는 소식을 받았습니다. 이는 양국이 적에 맞서 함께 더 강하게 설 수 있도록 도울 것입니다."
 denmark_expansion_event.2.a: "그들이 이성을 되찾았다니 다행입니다."
 denmark_expansion_event.3.t: "[FROM.GetNameDefCap], 우리의 재통합 제안 거부"
 denmark_expansion_event.3.desc: "불행히도 [ICE.GetAdjective] 정부가 우리의 재통합 제안을 거부한 것 같습니다. 아무리 좋게 봐줘도 어리석은 결정이지만, 그렇다고 우리가 그 섬에 대한 권리를 행사하는 것을 막지는 못할 것입니다."
 denmark_expansion_event.3.a: "전쟁이다..."
 denmark_expansion_event.4.t: "[FROM.GetNameDefCap], [ICE.GetNameDef] 할양 요구"
 denmark_expansion_event.4.desc: "오늘 아침, [DEN.GetAdjective] 정부가 우리에게 [ICE.GetNameDef]의 소유권을 이전해달라고 요구했다는 소식을 받았습니다. 그들의 주장에 따르면, 이 섬 영토는 당연히 그들의 국경 내에 속한다고 합니다."
 denmark_expansion_event.4.a: "수용할 만한 제안입니다."
 denmark_expansion_event.4.b: "받아들일 수 없습니다."
 denmark_expansion_event.5.t: "[FROM.GetNameDefCap], 우리의 [ICE.GetNameDef] 요구 수락"
 denmark_expansion_event.5.desc: "[FROM.GetNameDefCap]이(가) [ICE.GetNameDef]에 대한 우리의 당연한 통제권 요구를 수락한 것 같습니다. 우방국들이 합리적으로 행동하는 것을 보니 고무적입니다."
 denmark_expansion_event.5.a: "[DEN.GetAdjective]의 주장은 절대적이다!"
 denmark_expansion_event.6.t: "[FROM.GetNameDefCap], 우리의 [ICE.GetNameDef] 요구 거부"
 denmark_expansion_event.6.desc: "[FROM.GetNameDef]이(가) 우리의 요구를 거부하다니 믿을 수 없습니다! 우리는 그 섬에 대한 정당한 영유권을 가지고 있으며, 만약 평화적으로 우리에게 넘어오지 않는다면 무력으로라도 차지해야 합니다!"
 denmark_expansion_event.6.a: "병력을 집결시켜라!"
 denmark_expansion_event.10.t: "[FROM.GetNameDefCap], 우리의 복속을 요구"
 denmark_expansion_event.10.desc: "[DEN.GetAdjective] 정부가 우리를 억압하려 드는 것 같습니다. 그들의 '제안'은 자원 획득을 명분으로 우리가 그들의 통치에 완전히 복종할 것을 요구합니다. 유혈사태를 피하고 싶다면 굴복해야 할지도 모릅니다. 그렇지 않으면, 그들이 우리에게 전쟁을 선포할 것입니다."
 denmark_expansion_event.10.a: "이웃과의 전쟁에 휘말려서는 안 됩니다."
 denmark_expansion_event.10.b: "[DEN.GetNameDefCap]은(는) 우리 영토에 대한 권리가 없습니다."
 denmark_expansion_event.11.t: "[FROM.GetNameDefCap], 우리의 복속 제안 수락"
 denmark_expansion_event.11.desc: "훌륭한 소식입니다! [SWE.GetNameDef]이(가) 자국의 자원을 우리와 공유하는 편이 더 낫다는 것을 이해한 것 같습니다. 이제 최소한, 그들의 국가는 우리의 새로운 현대 군사력으로 보호받을 수 있을 것입니다!"
 denmark_expansion_event.11.a: "[DEN.GetNameDefCap]은(는) 더욱 커질 것이다!"
 denmark_expansion_event.12.t: "[FROM.GetNameDefCap], 우리의 복속 제안 거부"
 denmark_expansion_event.12.desc: "[SWE.GetAdjective] 정부의 그 멍청이들이 우리의 합리적인 복속 제안을 거절하기로 결정했습니다! 좋습니다, 만약 그들이 우리에게 자원을 주지 않는다면 우리가 직접 가져가는 수밖에 없을 것입니다."
 denmark_expansion_event.12.a: "해협을 도하할 준비를 하라!"
 denmark_expansion_event.13.t: "[FROM.GetNameDefCap], [SWE.GetNameDef] 요구"
 denmark_expansion_event.13.desc: "오늘 아침, [DEN.GetAdjective] 정부로부터 [SWE.GetNameDef]의 통제권을 넘기라는 요구를 받았습니다. 양국 군주의 혈연 관계로 인해 [DEN.GetNameDef]에 대한 충성심이 있지만, 혈연 관계와 상관없이 거부할 경우 [DEN.GetNameDef]와의 전쟁으로 이어질 수 있다는 점을 고려해야 합니다."
 denmark_expansion_event.13.a: "그들을 노하게 하지 맙시다."
 denmark_expansion_event.13.b: "[SWE.GetNameDefCap]은(는) 우리의 보호 아래에 있습니다!"
 denmark_expansion_event.14.t: "[FROM.GetNameDefCap], [SWE.GetNameDef]에 대한 요구 수락"
 denmark_expansion_event.14.desc: "[NOR.GetAdjective]인들이 분별력을 발휘하여 우리의 요구에 굴복했습니다. [SWE.GetNameDefCap]은(는) 이제 우리의 것이며, 그들의 자원은 이제 새로운 군대의 자금으로 활용될 수 있습니다."
 denmark_expansion_event.14.a: "[DEN.GetAdjective] 주조소를 위한 [SWE.GetAdjective]의 금속."
 denmark_expansion_event.15.t: "[FROM.GetNameDefCap], [SWE.GetNameDef]에 대한 요구 거부"
 denmark_expansion_event.15.desc: "[NOR.GetNameDefCap]이(가) [SWE.GetAdjective] 합병 요구를 거부하기로 결정했습니다. 매우 실망스러운 일이지만, 이로 인해 우리가 정당하게 해당 자원을 요구하는 것을 멈출 수는 없습니다."
 denmark_expansion_event.15.a: "전쟁뿐입니다."
 denmark_expansion_event.20.desc: "남쪽에서 암울한 소식입니다. [DEN.GetNameDef]이(가) [NOR.GetNameDefCap]의 복속과 1814년 이래 처음으로 다시 [DEN.GetAdjective]의 통치하에 들어올 것을 요구하고 있습니다. 스웨덴인들로부터 독립을 쟁취하기 위해 힘겹게 싸웠지만, 과연 우리가 덴마크인들과 맞서 싸울 준비가 되어 있을까요?"
 denmark_expansion_event.20.a: "무릎을 꿇는 것 외에는 선택지가 없습니다."
 denmark_expansion_event.20.b: "다시는 다른 국가의 지배를 받지 않을 것입니다!"
 denmark_expansion_event.21.desc: "[NOR.GetNameDefCap]이(가) 현명하게도 우리 군에 의한 점령 제안을 수락했습니다. 북부의 영토가 확보되었으니, 이제 다른 곳으로 국경을 확장하는 데 집중할 수 있습니다."
 denmark_expansion_event.21.a: "북부 전선은 안전합니다."
 denmark_expansion_event.22.desc: "[NOR.GetAdjective]인들이 주권 확보를 명분으로 우리의 합병 제안을 거부했습니다. 이러한 변명이 우리가 해야 할 일을 막지는 못할 것입니다."
 denmark_expansion_event.22.a: "[NOR.GetNameDefCap]은(는) 다시 한번 [DEN.GetAdjective]의 것이 될 것입니다!"
 denmark_expansion_event.23.t: "[FROM.GetNameDefCap], [NOR.GetNameDef] 요구"
 denmark_expansion_event.23.desc: "[NOR.GetNameDef]의 현 점령자로서, [DEN.GetNameDef]이(가) 이 땅에 대한 요구를 해오는 것은 시간 문제였습니다. 그들은 [NOR.GetNameDef]이(가) 기술적으로 [DEN.GetAdjective]의 영토라고 주장합니다. 우리에게는 선택지가 있습니다. 덴마크인들에게 [NOR.GetNameDef]을(를) 넘겨주거나, 그들의 요구를 거부하고 전쟁 가능성에 대비하는 것입니다."
 denmark_expansion_event.23.a: "[DEN.GetNameDef]과(와) 다툴 생각은 없습니다. 그들에게 넘겨줍시다."
 denmark_expansion_event.23.b: "[NOR.GetNameDefCap]은(는) 우리의 것입니다!"
 denmark_expansion_event.24.t: "[FROM.GetNameDefCap], [NOR.GetNameDef]에 대한 요구 수락"
 denmark_expansion_event.24.desc: "[SWE.GetAdjective] 정부가 분별력이 있는 것 같습니다! 그들은 [NOR.GetNameDef]의 소유권을 우리에게 넘기는 데 동의했습니다. 그들 또한 우리를 그 땅의 정당한 통치자로 보고 있다는 소식을 들으니 기쁩니다."
 denmark_expansion_event.24.a: "훌륭합니다."
 denmark_expansion_event.25.t: "[FROM.GetNameDefCap], [NOR.GetNameDef]에 대한 요구 거부"
 denmark_expansion_event.25.desc: "불행하게도, [SWE.GetNameDef]이(가) [NOR.GetNameDef]의 소유권에 대한 우리의 요구에 굴복하기를 거부했습니다. 과거에 우리가 그 나라를 그들의 통제하에 넘겨주었기에 더욱 실망스럽습니다. 우리는 그들이 은혜를 갚기를 바랐습니다."
 denmark_expansion_event.25.a: "아아, 전쟁뿐입니다."
 denmark_expansion_event.100.t: "[FROM.GetNameDefCap], 통합 절차 개시"
 denmark_expansion_event.100.desc: "[DEN.GetLeader]이(가) 우리 나라를 더 넓은 [DEN.GetAdjective] 왕국에 진정으로 통합하는 절차를 시작했음을 알려왔습니다."
 denmark_expansion_event.100.a: "이를 허용하는 것 외에는 선택지가 없습니다."
 denmark_expansion_event.200.t: "[FROM.GetNameDefCap], 우리의 [ICE.GetAdjective] 영유지를 요구"
 denmark_expansion_event.200.desc: "[DEN.GetNameDefCap] 측은 자신들이 우리의 [ICE.GetAdjective] 영토에 대한 역사적 연고권을 가지고 있다고 여기는 듯합니다. 만약 이 요구를 들어준다면, 우리는 [DEN.GetAdjective]의 팽창주의에 영토를 잃을 위험을 감수해야 합니다. 거부할 경우, 전면전이 불가피할 것입니다."
 denmark_expansion_event.200.a: "저들의 요구에 굴복해야 합니다..."
 denmark_expansion_event.200.b: "[ROOT.GetNameDefCap]은(는) 덴마크인들에게 결코 굴복하지 않을 것이다!"
 denmark_expansion_event.201.t: "[FROM.GetNameDefCap], 우리의 [ICE.GetAdjective] 영유권 주장을 수용"
 denmark_expansion_event.201.desc: "[FROM.GetNameDefCap] 측은 그들의 영토에 대한 우리의 정당한 영유권 주장을 수용하는 현명한 결정을 내렸습니다. 분명 그들 정부의 현명한 조치입니다."
 denmark_expansion_event.201.a: "협상은 짧게 끝났습니다."
 denmark_expansion_event.202.t: "[FROM.GetNameDefCap], 우리의 [ICE.GetAdjective] 영유권 주장을 거부"
 denmark_expansion_event.202.desc: "유감스럽게도, [FROM.GetAdjective] 정부는 우리의 주장을 거부했습니다. 정당한 [DEN.GetAdjective]의 것을 확보하기 위해, 우리는 그들의 문턱까지 전쟁을 끌고 가는 것 외에는 선택지가 없는 것 같습니다."
 denmark_expansion_event.202.a: "아마 공격적인 태도를 보이면 더 순순해질 것입니다."
 denmark_expansion_event.210.t: "[FROM.GetNameDefCap], 우리의 [SWE.GetAdjective] 영유지를 요구"
 denmark_expansion_event.210.desc: "[DEN.GetNameDefCap] 측은 자신들이 우리의 [SWE.GetAdjective] 영토에 대한 역사적 연고권을 가지고 있다고 여기는 듯합니다. 만약 이 요구를 들어준다면, 우리는 [DEN.GetAdjective]의 팽창주의에 영토를 잃을 위험을 감수해야 합니다. 거부할 경우, 전면전이 불가피할 것입니다."
