 denmark_expansion_event.220.desc: "[DEN.GetNameDefCap] 측은 자신들이 우리의 [FIN.GetAdjective] 영토에 대한 역사적 연고권을 가지고 있다고 여기는 듯합니다. 만약 이 요구를 들어준다면, 우리는 [DEN.GetAdjective]의 팽창주의에 영토를 잃을 위험을 감수해야 합니다. 거부할 경우, 전면전이 불가피할 것입니다."
