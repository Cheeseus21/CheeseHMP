 state_is_in_the_mediterranean_sea_tt:0 "주가 지중해에 위치함"
 ITA_cooperation_programs_decisions_tt:0 "이탈리아 동맹국 및 그 해군과 협력하기 위한 §Y$ITA_naval_cooperation_programs_dec_cat$§! 디시전을 잠금 해제합니다."
 ITA_has_completed_cooperation_programs_focus_tt:0 "\n§Y$ITA_cooperation_programs$§! 중점을 완료하면:"
 ITA_unlocks_decision_cede_aquila_class_destroyers_to_spain_tt:0 "디시전 잠금 해제: §Y아퀼라급 구축함 양도§!\n\n"
 ITA_midget_submarines_decision_tt:0 "\n§Y$ITA_cooperation_programs$§! 중점을 완료하면: \n§Y$ITA_export_midget_submarines$§! 디시전 잠금 해제!"
 ITA_monarchia_d_italia:0 "이탈리아 군주정"
 ITA_monarchia_d_italia_desc:1 "비토리오 에마누엘레는 결코 파시즘에 이탈리아 정치의 문을 열어주지 말았어야 했습니다. 이제 이 실수를 바로잡고 파시스트들을 정부의 뒷전으로 물러나게 할 때입니다."
 ITA_new_corporations:0 "새로운 조합"
 ITA_new_corporations_desc:1 "우리는 파시스트 정권이 사용했던 이전의 조합 개념을 가져와 새 정부의 필요에 맞게 조정해야 합니다."
 ITA_extraction_industry:0 "채굴 산업"
 ITA_extraction_industry_desc:1 "생산 라인의 수요를 충족시키기 위해 자원 채굴 산업을 확장해야 합니다. 원자재 부족이 군수 생산을 위태롭게 하도록 내버려 둘 수 없습니다."
 ITA_prepare_for_the_coming_wars:0 "다가오는 전쟁 대비"
 ITA_prepare_for_the_coming_wars_desc:1 "전쟁의 그림자가 사방에 드리우고 있으며, 우리 군의 필요를 충족시키기 위해 강력한 군수 산업이 필요합니다."
 ITA_mobilize_the_railway_guns:0 "열차포 동원"
 ITA_mobilize_the_railway_guns_desc:1 "절박한 상황에는 절박한 조치가 필요한 법, 이제 우리의 낡은 열차포를 다시 운용할 때가 왔습니다."
 ITA_bring_back_old_glories:0 "지난 영광의 재현"
 ITA_bring_back_old_glories_desc:1 "여러 항구에 폐기를 기다리는 수많은 노후 함선이 있습니다. 일부 기술자들과 해군 장교들은 약간의 개조만 거치면 이 지난 영광들을 다시 운용할 수 있다고 주장합니다."
 ITA_new_forms_of_weaponry:0 "신형 무기"
 ITA_new_forms_of_weaponry_desc:1 "이탈리아가 세계 최강의 군사 강국 중 하나가 되려면 신형 무기를 연구해야 합니다. 우리 과학자들은 선구적인 원자력 연구 프로그램 개발이 큰 가능성을 지니고 있다고 확신합니다."

 ITA_revoke_the_acerbo_law:0 "아체르보법 폐지"
 ITA_revoke_the_acerbo_law_desc:1 "아체르보법은 무솔리니와 그의 파시스트당이 그토록 갈망하던 이탈리아에 대한 확고한 통제권을 부여했습니다. 이런 일이 다시는 일어나지 않도록 이 법을 폐지할 때입니다."
 ITA_christian_democracy:0 "기독교 민주주의"
 ITA_christian_democracy_desc:1 "기독교민주당은 알치데 데 가스페리가 이끄는 보수 중도 정치 조직으로, 기독교적 이상과 자유라는 이념을 결합하여 대중의 지지를 얻는 데 성공했습니다. 그들이 군주제에 충성하는 한, 정부를 구성하도록 허용해야 합니다."
 ITA_democratic_king:0 "민주적인 국왕"
 ITA_democratic_king_desc:1 "이탈리아 군주제가 국왕을 주요 지도자로 유지하면서, 더 민주적인 국가를 향해 한 걸음 나아갈 때가 왔습니다."
 ITA_cooperate_with_moderates:0 "온건파와 협력"
 ITA_cooperate_with_moderates_desc:1 "이전 파시스트 정권의 덜 급진적인 요소들과 협력하지 않을 이유가 없습니다. 이 새로워진 이탈리아 국가를 발전시키는 데 도움을 줄 수 있는 유능한 인재들이 있습니다."
 ITA_expand_intelligence_services:0 "정보 기관 확장"
 ITA_expand_intelligence_services_desc:1 "새로운 시대에는 지식이 힘입니다. 외국의 비밀 정보 기관과 경쟁할 수 있도록 다양한 정보 부서를 확장해야 합니다."
 ITA_crush_opposition:0 "반대파 분쇄"
 ITA_crush_opposition_desc:1 "아직도 우리의 정책에 반대하고 새 정부의 업무를 방해하는 옛 파시스트 정권의 지지자들이 많이 있습니다. 그들을 처리할 때가 왔습니다."
 ITA_power_to_the_king:0 "국왕에게 권력을"
 ITA_power_to_the_king_desc:1 "사회적, 정치적 긴장이 고조되는 이 시기에 파시스트든 공산주의든 극단주의 정권이 이탈리아에서 우세해지지 않도록 보장하는 유일한 방법은 국왕의 손에 권력을 집중시키는 것입니다. 국왕이야말로 우리나라를 이끌기에 가장 적합한 인물임이 틀림없습니다."
 ITA_disband_the_blackshirts:0 "검은 셔츠단 해체"
 ITA_disband_the_blackshirts_desc:1 "검은 셔츠단은 파시즘에 복무하는 매우 위험한 조직이므로, 그들의 파시스트 정권이 그랬던 것처럼 사라져야 할 때입니다. 모든 현역 부대를 즉시 해체할 것입니다."
 ITA_utilize_the_blackshirts:0 "검은 셔츠단 활용"
 ITA_utilize_the_blackshirts_desc:1 "검은 셔츠단이 역사적으로 파시스트 정권과 두체에게 충성했지만, 이 새로운 정권에서 그들의 조직이 번성할 여지가 있음을 보여준다면 우리 자신의 이익을 위해 그들을 이용할 수 있을 것입니다. 결국, 두 정권 사이에 그렇게 큰 차이가 있을까요?"
 ITA_expand_the_royal_guard:0 "왕실 근위대 확장"
 ITA_expand_the_royal_guard_desc:1 "우리는 이탈리아 군주제에 충성하고 필요시 모든 종류의 군사 작전에서 다양한 역할을 수행할 수 있는 신뢰할 수 있는 병력을 확보하기 위해 왕실 근위대를 강화하고 확장할 것입니다."
 ITA_gloria_al_regno_d_italia:0 "이탈리아 왕국에 영광을"
 ITA_gloria_al_regno_d_italia_desc:1 "군주제가 시대에 뒤떨어진 정부 체제라고 주장하는 자들은, 고귀하고 확고한 손 아래에서 미천한 국가가 어떻게 세계 최강대국 중 하나가 될 수 있는지 보지 못하는 어리석은 자들입니다. \n국왕 폐하 만세!"
 ITA_paramilitary_training:0 "준군사 훈련"
 ITA_paramilitary_training_desc:1 "의용 민병대 조직을 확장하고 군사 교육을 개선할 때입니다. 정예 사단의 뛰어난 장교들을 활용하여 신병을 훈련시키고 검은 셔츠단 부대를 이끌 것입니다."
 ITA_seek_papal_support:0 "교황의 지지 모색"
 ITA_seek_papal_support_desc:1 "우리나라의 증대되는 사회적, 정치적 불안정을 다루기 위해, 역사적으로 이탈리아 국민에게 막대한 영향력을 행사해 온 교회에 의지해야 할 것입니다. 우리는 교황의 승인과 지지를 얻기 위해 그에게 접근해야 합니다."
 ITA_agents_of_the_church:0 "교회의 요원들"
 ITA_agents_of_the_church_desc:1 "교회는 전 세계에 수많은 대표자를 두고 있습니다. 만약 우리가 바티칸을 우리 편으로 만드는 데 성공한다면, 교회의 사절이라는 완벽한 위장 신분을 가진 새로운 요원들을 마음대로 부릴 수 있게 되어 우리의 정보망을 개선할 것입니다."
 ITA_strengthen_the_papacy:0 "교황권 강화"
 ITA_strengthen_the_papacy_desc:1 "이탈리아 사회에서 교황의 영향력이 정말로 강력하다는 것은 분명합니다. 국가 안정을 유지하는 유일한 방법은 이탈리아 왕국 내에서 교회의 권한을 강화하는 것입니다."
 ITA_setting_course:0 "진로 설정"
 ITA_setting_course_desc:1 "이탈리아 왕국은 운명을 실현할 준비가 되었습니다. 위대함과 영광이 자랑스러운 이탈리아 국민을 기다리고 있으며, 이제 앞으로 나아갈 길을 결정할 때입니다."
 ITA_mare_nostrum_bba:0 "우리의 바다"
 ITA_mare_nostrum_bba_desc:0 "고대 로마가 처음 카르타고를 격파한 것은 바로 해군력이었습니다. 해군력에 투자함으로써 이탈리아는 지중해의 제해권을 장악하고 다시 한번 지중해를 '우리의 바다'로 만들 수 있습니다."
 ITA_auxiliaries:0 "보조군"
 ITA_auxiliaries_desc:1 "로마 시대의 조상들처럼, 오늘날에도 보조군은 정규군 지원, 지형 정찰, 적 교란에 있어 계속해서 중요한 역할을 수행하고 있습니다. 우리는 군을 강화하기 위해 이러한 준군사 민병대를 확장해야 합니다."
 ITA_the_italian_legions:0 "이탈리아 군단"
 ITA_the_italian_legions_desc:1 "과거 우리 군은 위기에 제대로 대처하지 못했을 수도 있지만, 이제 이탈리아 국민이 로마 유산을 그 어느 때보다 자랑스러워하는 만큼, 우리 군단이 수천 년 전처럼 오늘날에도 위협적이도록 군에 새로운 교리를 도입해야 합니다."
 ITA_new_roman_citizens:0 "새로운 로마 시민"
 ITA_new_roman_citizens_desc:1 "식민지의 원주민에게 시민권을 부여하면 현지인들의 지지와 협력을 얻는 데 분명 도움이 될 것입니다."
 ITA_all_roads_lead_to_rome:0 "모든 길은 로마로 통한다"
 ITA_all_roads_lead_to_rome_desc:1 "과거 로마 군단은 도로와 군 작전에 필요한 기반 시설을 건설하는 속도와 효율성으로 유명했습니다. 수천 년이 지난 지금, 전쟁을 수행하는 데 있어 군수 및 보급선은 훨씬 더 중요해졌습니다."
 ITA_the_king_of_the_skies:0 "하늘의 왕"
 ITA_the_king_of_the_skies_desc:1 "로마 시대 조상들과 달리, 우리 군은 육상과 해상에서 최적으로 작전하기 위해 제공권을 장악해야 합니다. 이탈리아 항공기는 이미 다재다능함과 품질로 유명하지만, 이제 항공 공학자들이 나서서 진정한 하늘의 요새를 개발할 때가 왔습니다."
 ITA_modern_musculus:0 "현대의 무스쿨루스"
 ITA_modern_musculus_desc:1 "로마인들이 그랬던 것처럼, 우리도 전장을 지배할 수 있는 강력한 전쟁 기계를 개발해야 합니다. 우리는 최전선을 돌파하고 적의 심장에 공포를 심어줄 궁극의 전차를 설계할 것입니다."
 ITA_caligulas_pride:0 "칼리굴라의 자부심"
 ITA_caligulas_pride_desc:1 "지금까지 존재했던 가장 위대한 군함을 개발할 때가 왔습니다. 최고의 해군 공학자들이 설계를 완성하고 시제품을 시험했으며, 이제 넵투누스가 지중해뿐만 아니라 그 너머의 왕이 될 것이라고 확신합니다."
 ITA_iberian_protection:0 "이베리아 보호"
 ITA_iberian_protection_desc:1 "이베리아 국가들은 최근까지 비교적 안정을 누렸지만, 지금 당장은 스스로 거대한 적대 세력에 맞서 방어할 수 없음이 분명합니다. 너무 늦기 전에 우리가 그들에게 보호를 제공해야 합니다."
 ITA_south_american_alliances:0 "남아메리카 동맹"
 ITA_south_american_alliances_desc:1 "이제 우리 세력의 경계를 확장할 때입니다. 우리는 라틴 아메리카 국가들에게 손을 뻗어, 우리 모두를 둘러싼 수많은 위협에 맞서 강력한 동맹을 형성하는 것의 중요성을 설득할 것입니다."
 ITA_the_papacy_reborn:0 "부활한 교황권"
 ITA_the_papacy_reborn_desc:1 "이제 교황 성하께서 왕을 타도하고 이탈리아를 완전히 장악했으니, 이탈리아 국민이 교회의 비전과 목표에 동조할 때입니다."
 ITA_deus_vult:0 "신께서 원하신다"
 ITA_deus_vult_desc:1 "가톨릭 교회는 수 세기 동안 유럽에서 희망과 안정의 등불이었으며, 앞으로 닥쳐올 암흑기를 마주한 지금, 우리는 다시 한번 이 빛의 등불이 되어야 합니다. \n신께서 원하신다!"
 ITA_catholic_action:0 "가톨릭 액션"
 ITA_catholic_action_desc:1 "우리의 가톨릭 청년 조직은 공산주의자를 뿌리 뽑고, 가톨릭 사회 정의 원칙을 증진하며, 열성적인 신병들로 우리 군의 대열을 불리는 데 매우 효율적인 도구임이 증명되고 있습니다."
 ITA_a_time_for_war:0 "전쟁의 때"
 ITA_a_time_for_war_desc:1 "유럽에 이단이 존재하는 한 평화는 있을 수 없습니다. 새로운 성전을 벌일 때입니다. 새로운 전쟁 기계들이 그분의 이름으로 포효하며, 정의로운 분노로 이단자를 타격할 준비를 마칠 것입니다. 105mm 포의 포신에서 모든 불신자에게 심판이 내릴 때까지 평화는 없을 것입니다."
 ITA_the_holy_lands:0 "성지"
 ITA_the_holy_lands_desc:1 "팔레스타인만큼 기독교 신앙에 중요한 지역은 마땅히 하느님의 왕국에 속합니다. 우리는 지체 없이 성지를 되찾아야 합니다."
 ITA_the_catholic_dominion:0 "가톨릭의 지배"
 ITA_the_catholic_dominion_desc:1 "교황청이 다시 한번 무시할 수 없는 강대국으로 부상함에 따라, 이제 우리는 모든 충실한 기독교인에게 손을 내밀고, 목자가 양 떼를 인도하고 악으로부터 보호하듯 백성을 이끄는 손이 되어야 합니다. 이는 하느님의 명령입니다!"

 ITA_unite_the_opposition:0 "반대파 규합"
 ITA_unite_the_opposition_desc:1 "이탈리아에 파시즘의 뿌리가 깊게 박혀 있어 이를 근절하려면 엄청난 노력이 필요할 것입니다. 파시스트 정권에 반대하는 여러 집단 사이의 공통된 목표를 찾아야 합니다. 단결해야만 혐오스러운 두체를 타도할 수 있기 때문입니다."
 ITA_liberate_gramsci:0 "그람시 해방"
 ITA_liberate_gramsci_desc:1 "우리의 동지이자 마르크스주의 철학자인 안토니오 그람시는 10년 넘게 파시스트 정부에 의해 투옥되어 있으며, 현재 그의 건강은 급격히 악화되고 있습니다. 우리는 그를 구출하고 생명을 구하기 위해 비밀 작전을 조직해야 합니다. 그는 분명 우리 노동자 혁명의 핵심 인물이 될 것이기 때문입니다."
 ITA_organize_strikes_in_the_north:0 "북부 파업 조직"
 ITA_organize_strikes_in_the_north_desc:1 "공격에 앞서, 우리는 이탈리아 산업 노동자들의 지지를 얻고 북부의 산업화된 지역들이 파시스트 정권에 맞서 우리와 함께하도록 모든 노력을 집중할 것입니다."
 ITA_the_southern_farmlands:0 "남부 농지"
 ITA_the_southern_farmlands_desc:1 "파시스트 정권의 헛된 노력에도 불구하고, 이탈리아는 사실상 농업 국가로 남아 있습니다. 우리는 혁명을 성공적으로 수행하기 위해 소작농에게 의존해야 하며, 이탈리아 남부에서 소작농의 힘이 가장 강력한 것은 분명합니다."
 ITA_defy_the_duce:0 "두체에게 반항하라"
 ITA_defy_the_duce_desc:1 "파시스트 정권에 맞서 봉기하고, 이탈리아 국민에게 재앙과도 같은 그들을 근절할 때가 왔습니다. \n이탈리아의 노동자들과 농민들이여, 무기를 들어라!"
 ITA_appeal_to_the_bourgeoisie:0 "부르주아지에 호소"
 ITA_appeal_to_the_bourgeoisie_desc:1 "우리는 파시스트 정권의 몰락에 관심 있는 부르주아 집단에 손을 내밀어야 합니다. 그들이 가진 자원과 우리 혁명가들의 용기가 있다면, 이 피비린내 나는 전쟁을 신속하게 끝낼 수 있을 것입니다!"
 ITA_seize_old_equipment:0 "구식 장비 확보"
 ITA_seize_old_equipment_desc:1 "전국 각지의 무기고에는 다량의 구식 군사 장비가 보관되어 있습니다. 낡았음에도 불구하고, 이 장비를 확보하여 우리 군에 분배한다면 전쟁 승리에 큰 도움이 될 것입니다."
 ITA_the_italian_republic:0 "이탈리아 공화국"
 ITA_the_italian_republic_desc:1 "군주제는 우리의 혁명을 방해할 뿐인 낡고 부패한 체제입니다. 이제 왕가를 제거하고 그 추종자들을 처리할 때입니다."
 ITA_the_popular_front:0 "인민 전선"
 ITA_the_popular_front_desc:1 "내전은 공산주의자들이 이탈리아 국민을 파시즘에 맞서 승리로 이끌 수 있을 뿐만 아니라, 우리나라가 절실히 필요로 했던 사회적, 산업적 진보로 이끌 수 있음을 보여주었습니다."
 ITA_the_garibaldi_legion:0 "가리발디 군단"
 ITA_the_garibaldi_legion_desc:1 "우리는 스페인 내전에서 국제 여단의 일원으로서 스페인 공화국의 동지들과 함께 싸울 의용 부대를 조직할 것입니다."
 ITA_gruppi_di_difesa_della_donna:0 "여성 방위단"
 ITA_gruppi_di_difesa_della_donna_desc:1 "다양한 정치 조직의 혁명 여성들이 전쟁 시 모든 계급과 사회 계층에서 병력의 적극적인 참여와 동원을 위해 여성 방위단을 결성할 것을 제안했습니다."
 ITA_a_new_era_for_the_red_shirts:0 "붉은 셔츠단의 새로운 시대"
 ITA_a_new_era_for_the_red_shirts_desc:1 "우리는 주세페 가리발디와 그의 붉은 셔츠단의 발자취를 따라, 이 민병대를 강화하고 훈련시켜 이탈리아군의 일원으로서든 해외 의용 여단으로서든 최적으로 임무를 수행하도록 할 것입니다."
 ITA_pugno_alzato:0 "치켜든 주먹"
 ITA_pugno_alzato_desc:1 "파시즘이라는 재앙과 그것이 전 인류에 가하는 위협을 근절할 때입니다. 이 중대한 투쟁에서 단결하여 주먹을 들어 올릴 것입니다!"
 ITA_a_leader_steps_forward:0 "지도자가 나서다"
 ITA_a_leader_steps_forward_desc:0 "새로운 이탈리아 공화국의 수장이 될 인물을 결정할 때입니다. 다행히도, 자질이 뛰어난 후보들 중에서 선택할 수 있습니다."
 ITA_the_path_to_progress:0 "진보로 가는 길"
 ITA_the_path_to_progress_desc:0 "우리에게 협력하고 파괴적인 내전으로부터의 회복을 도울 의향이 있는 전 세계의 공산주의 및 사회주의 정부에 접촉할 것입니다."
 ITA_industrial_socialization:0 "산업 사회화"
 ITA_industrial_socialization_desc:1 "대기업가와 부르주아의 손에서 대규모 공장을 몰수하여 전체 이탈리아 인민의 최대 이익을 위해 사용되도록 할 때입니다."
 ITA_institute_the_five_year_plan:0 "5개년 계획 수립"
 ITA_institute_the_five_year_plan_desc:1 "소련 동지들이 그랬던 것처럼, 세계 강대국들과 경쟁하기 위해 대부분이 농업 국가인 우리나라를 산업화해야 합니다. 우리는 내전 이전의 산업 수준으로 복귀하는 것을 넘어 훨씬 초과하는 데 도움이 될 5개년 계획을 수립할 것입니다."
 ITA_new_ricostruzione_industriale:0 "신 산업부흥공사"
 ITA_new_ricostruzione_industriale_desc:1 "산업부흥공사는 지금까지 파산한 은행과 민간 기업의 구제, 구조 조정, 자금 조달에 중요한 역할을 해왔습니다. 약간의 조정을 통해 과거의 파시스트적 색채를 배제하고 계속해서 기능하도록 할 것입니다."
 ITA_political_commissars:0 "정치위원"
 ITA_political_commissars_desc:1 "공산주의에 대한 헌신을 보존하고 군대에 이념적 열정을 불어넣기 위해, 군대에 정치위원 직책을 신설할 것입니다. 이들은 소속 부대의 정치 교육과 조직을 책임지게 됩니다."
 ITA_common_ground:0 "공통 기반"
 ITA_common_ground_desc:1 "실질적으로 같은 목표를 공유하는 다른 정치 세력과의 차이점은 접어두어야 합니다. 이제 새로운 이탈리아 국가를 진보로 이끌기 위해 협력할 때입니다."
 ITA_appease_the_military:0 "군부 회유"
 ITA_appease_the_military_desc:1 "군부의 많은 장교들이 새 정부나 내전 이후 자신들의 지위에 불만을 품고 있습니다. 군 내부의 불만을 근절하고 장교들이 전쟁에서 자신들의 역할이 인정받는다고 느끼게 하는 것이 현명할 것입니다."
 ITA_crush_the_mafia:0 "마피아 분쇄"
 ITA_crush_the_mafia_desc:1 "내전 기간 동안 마피아와 수많은 밀수업자, 갈취범, 일반 범죄자 무리가 다시 활개를 쳤습니다. 이들을 근절하고 국가의 안보와 안정을 회복하는 것이 이탈리아 인민에 대한 우리의 의무입니다."
 ITA_empower_the_carabinieri:0 "카라비니에리 권한 강화"
 ITA_empower_the_carabinieri_desc:1 "카라비니에리는 마피아 소탕과 국가의 평화 및 안전 유지에 핵심적인 역할을 합니다. 이 경찰력을 강화하여 추가 임무를 수행할 수 있도록 해야 합니다."
 ITA_army_modernization:0 "육군 현대화"
 ITA_army_modernization_desc:1 "우리 군은 다른 강대국들의 군대 및 교리에 발맞출 수 있도록 새로운 장비와 훈련 기술을 도입해야 합니다."
 ITA_union_in_the_party:0 "당내 단결"
 ITA_union_in_the_party_desc:1 "당내 단결은 우리나라가 공산주의로 발전하는 데 가장 중요한 요소입니다. 모든 당원이 동일한 비전과 목표를 공유하고, 이를 달성하기 위해 당이 수립한 절차를 따르도록 해야 합니다."
 ITA_follow_the_soviet_union:0 "소비에트 연방을 따르라"
 ITA_follow_the_soviet_union_desc:1 "소비에트 연방이 이미 제시한 공산주의로 가는 명확한 길이 있습니다. 새로운 공화국에 쏟은 우리의 노력이 결실을 맺고 진정한 공산주의 국가를 이루려면 그 길을 따라야 합니다."
 ITA_military_cooperation:0 "군사 협력"
 ITA_military_cooperation_desc:1 "이 세상에서 승리하려면 동맹국들과 군사 협력 협정을 맺어야 합니다. 우리를 둘러싼 강대국들은 명백히 프롤레타리아의 적이기 때문입니다."
 ITA_defense_against_capitalism:0 "자본주의에 대한 방어"
 ITA_defense_against_capitalism_desc:1 "파시즘은 우리의 첫 번째이자 가장 큰 이념적 적이지만, 유일한 적은 아닙니다. 자본주의자들은 우리나라와 프롤레타리아 혁명에 끔찍한 위협이 됩니다. 우리는 그들에게 맞설 준비를 해야 합니다."
 ITA_combined_research_effort:0 "공동 연구 노력"
 ITA_combined_research_effort_desc:1 "우리 군대가 적과 맞설 현대적인 장비를 갖추려면 기술 발전이 필수적입니다. 우리는 동맹국과 협력하여 특히 군사 분야에서 지속적인 과학 발전을 유지해야 합니다."
 ITA_special_brigades:0 "특수 여단"
 ITA_special_brigades_desc:1 "우리는 대규모 공세 중 전투에서 아군 부대를 지원할 수 있는 특수 돌격 여단을 편성할 것입니다. 이 여단은 소속 부대에서 두각을 나타낸 민병대원들로 구성될 것입니다."
 ITA_defend_the_land:0 "국토 방어"
 ITA_defend_the_land_desc:1 "소련과 그 정책은 프롤레타리아와 마르크스주의 이념을 저버렸습니다. 이탈리아 인민은 공산주의를 향한 자신만의 길을 갈 것이며, 그 길은 우리가 극복해야 할 장애물과 위협으로 가득하지만, 바라건대 서로를 도울 동지들과 동맹국들도 함께할 것입니다."
 ITA_united_anarchist_confederations:0 "통합 무정부주의 연합"
 ITA_united_anarchist_confederations_desc:1 "우리는 파시즘과 자본주의에 맞선 투쟁에서 스페인 무정부주의자들과 전 세계 다른 무정부주의자들의 협력을 구해야 합니다. 우리는 전 세계의 활동가, 지식인, 자유 투사들을 수용하기 위해 대협력위원회를 구성할 것입니다."
 ITA_the_fight_against_stalinism: "[GetAppropriateRussianGovernmentIdeology]"
 ITA_russian_government_ideology_default: "우리를 반대하는 자들과의 투쟁"
 ITA_russian_government_ideology_alt: "스탈린주의와의 투쟁"
 ITA_russian_government_ideology_alt2: "우리를 분열시키는 자들과의 투쟁"
 ITA_the_fight_against_stalinism_desc: "[GetAppropriateRussianGovernmentIdeologyDesc]"
 ITA_russian_government_ideology_desc_default: "우리가 스탈린주의 교리라는 위협에 대처하기도 전에, 그것은 이미 더 끔찍한 것으로 대체되었습니다. 현 지도부가 과거에 어떤 능력을 보여주었는지를 고려할 때, 우리는 그들이 공격하기를 가만히 기다릴 수 없으며, 우리가 먼저 공격해야 합니다!"
 ITA_russian_government_ideology_desc_alt: "불행히도, 자본주의와 파시즘만이 우리가 맞서야 할 유일한 적은 아닙니다. 스탈린주의 교리의 추종자들은 우리 정부와 국가를 자신들의 이익에 대한 위협으로 보고 있으며, 어떤 수단을 써서라도 우리를 파괴하려 합니다. 우리는 그들이 공격하기를 가만히 기다릴 수 없으며, 우리가 먼저 공격해야 합니다!"
 ITA_russian_government_ideology_desc_alt2: "불행히도, 우리를 분열시키기 위해 열심히 노력하는 국가들이 있습니다. 우리는 스탈린과 그의 정부에 대해 별다른 애정이 없었지만, 현재 상황도 그다지 나아지지 않았습니다. 그러한 국가들은 위협이 되므로, 우리는 그들이 공격하기를 가만히 기다릴 수 없으며, 우리가 먼저 공격해야 합니다!"
 ITA_raise_the_peoples:0 "인민을 일으켜라"
 ITA_raise_the_peoples_desc:1 "우리의 이상을 위해 기꺼이 싸울 용감한 이탈리아 농민들이 많이 있습니다. 그들과 함께 우리는 붉은 셔츠 부대를 더 많이 편성하여 우리 군대의 대열을 강화할 수 있습니다."
 ITA_il_sol_dell_avvenire:0 "Il Sol dell'Avvenire"
 ITA_il_sol_dell_avvenire_desc:1 "모든 시민이 국가 앞에서 자유롭고 평등한 새로운 이탈리아 국가, 이탈리아 국민 연합을 선포할 때입니다. \n미래의 태양이 이탈리아에서 떠오를 것입니다!"
 ITA_italian_socialism:0 "이탈리아 사회주의"
 ITA_italian_socialism_desc:1 "사회주의로 가는 길이 우리 앞에 열렸습니다. 우리 국경 내에서 정의로운 사회를 이루고, 국경 밖에서는 이탈리아 공화국이 마땅히 받아야 할 국제적 지위를 획득하겠다는 결의를 가지고 그 길을 가야 할 때입니다."
 ITA_cooperate_with_the_mafia:0 "마피아와 협력"
 ITA_cooperate_with_the_mafia_desc:1 "내전 중에 확산된 마피아 조직들은, 만약 우리가 그들에게 특정 특권과 양보를 기꺼이 부여한다면, 그들의 영역 내에서 민간 및 국영 기업의 성과를 향상시킬 기회가 될 수 있습니다."
 ITA_mafia_abroad:0 "해외의 마피아"
 ITA_mafia_abroad_desc:1 "우리가 협정을 맺은 마피아 가문의 영향력은 이탈리아뿐만 아니라 해외에서도 커지고 있습니다. 우리는 그들의 사업이 우리의 이익에 봉사하며 번창할 수 있는 거대 자본주의 강대국에 그들과 연계된 요원들을 보내야 합니다."
 ITA_empower_the_unions:0 "노동조합 권한 강화"
 ITA_empower_the_unions_desc:1 "이탈리아 프롤레타리아 계급에는 큰 잠재력이 있습니다. 우리는 노동조합이 우리나라의 노동력을 규제하고 최적화할 수 있는 수단과 권한을 갖도록 보장해야 합니다."
 ITA_production_lines:0 "생산 라인"
 ITA_production_lines_desc:1 "우리 군이 최고의 성능으로 계속 작전하는 데 필요한 보급품과 장비를 확실히 공급받을 수 있도록, 이제 주요 생산 라인을 확장하고 현대화해야 할 때입니다."
 ITA_the_republics_leadership:0 "공화국의 지도부"
 ITA_the_republics_leadership_desc:1 "우리는 젊은 이탈리아 공화국을 우리 인민이 마땅히 누려야 할 사회주의 사회로 이끌 올바른 정당과 정치 지도자를 선택해야 합니다. 페루초 파리와 이바노에 보노미는 모두 이 임무를 수행할 자격이 충분한 후보로 보입니다."
 ITA_bring_back_exiled_intellectuals:0 "망명 지식인 귀환"
 ITA_bring_back_exiled_intellectuals_desc:1 "파시스트 정권은 위대한 철학자, 지식인, 과학자를 포함한 수많은 이탈리아 시민을 망명시켰습니다. 이제 이 모든 난민에게 고국으로 돌아올 기회를 제공할 때입니다."
 ITA_social_stability:0 "사회 안정"
 ITA_social_stability_desc:1 "우리는 내전의 공포를 뒤로했으며, 우리 사회는 이제 더 정의롭고 평등합니다. 사회주의를 달성하기까지는 아직 갈 길이 멀지만, 이탈리아 인민이 마침내 사회적 평화를 이루었다고 자랑스럽게 말할 수 있습니다."
 ITA_aid_for_the_spanish_republic:0 "스페인 공화국 지원"
 ITA_aid_for_the_spanish_republic_desc:1 "우리는 내전 중인 스페인 동지들을 도와야 합니다. 그들의 사회주의 공화국은 지금 자신들이 파괴하고 있는 국가에 충성을 맹세했던 피에 굶주린 스페인 장군들에게 포위당하고 있으며, 이들은 유럽의 거대 파시스트 강대국들의 지원을 받고 있습니다."
 ITA_italia_libera:0 "자유 이탈리아"
 ITA_italia_libera_desc:1 "우리는 주도권을 잡고 우호적인 이웃 정부에 우리를 둘러싼 여러 위협에 맞서 협력하고 스스로를 방어할 수 있는 유럽 동맹 결성을 제안해야 합니다."
 ITA_european_democracies:0 "유럽 민주주의 국가"
 ITA_european_democracies_desc:1 "우리는 유럽 민주주의 국가 간의 연대와 협력 정책을 계속해야 합니다. 외교를 통해 우리는 다른 어떤 세력과도 맞설 수 있는 강력한 동맹을 형성할 수 있습니다."
 ITA_peace_preservation:0 "평화 유지"
 ITA_peace_preservation_desc:1 "이러한 불안정과 국제적 분쟁의 시기에, 오직 이탈리아 인민만이 유럽의 평화를 보존하고 강제할 임무를 감당할 수 있습니다."
 ITA_scientific_cooperation:0 "과학 협력"
 ITA_scientific_cooperation_desc:1 "우리는 다른 세계 강대국들의 기술 발전에 뒤처지지 않도록 과학 협력 프로그램을 개발해야 합니다."
 ITA_secure_the_borders:0 "국경 확보"
 ITA_secure_the_borders_desc:1 "전 세계적으로 국제적 긴장이 고조됨에 따라, 우리의 동맹이 아닌 모든 국가는 잠재적인 적대 세력으로 간주해야 합니다. 어떠한 침략이라도 막고 저지하기 위해 조속히 국경을 강화하고 주둔군을 배치해야 합니다."
 ITA_bring_down_fascist_strongholds:0 "파시스트 거점 타도"
 ITA_bring_down_fascist_strongholds_desc:1 "유럽의 위급한 상황을 고려할 때, 우리는 공격적인 파시스트 강대국들이 우리에게 공세를 시작하기를 기다릴 수 없습니다. 먼저 치는 자가 이기는 법이니, 우리는 파시스트들을 먼저, 그리고 강하게 타격할 것입니다."
 ITA_reestablish_old_alliances:0 "옛 동맹 재건"
 ITA_reestablish_old_alliances_desc:1 "우리는 대전쟁 동안 형성했던 동맹을 다시 맺도록 노력해야 합니다. 유럽의 위대한 민주주의 강대국들과 단결해야만 우리를 기다리는 많은 위협에 맞서 승리할 수 있을 것입니다."
 ITA_military_agreements:0 "군사 협정"
 ITA_military_agreements_desc:1 "우리는 동맹국들로부터 배울 것이 많으므로, 군사 및 기술 협력 프로그램 개발을 제안해야 합니다."
 ITA_the_enemies_of_capitalism:0 "자본주의의 적"
 ITA_the_enemies_of_capitalism_desc:1 "소비에트 공산주의는 유럽 전체, 따라서 이탈리아 국가에도 큰 위협이 됩니다. 이제 그들을 처리할 때가 왔습니다."
 ITA_the_ethiopian_question:0 "에티오피아 문제"
 ITA_the_ethiopian_question_desc:1 "에티오피아 전쟁은 잔인하고 부당한 사건이었습니다. 우리는 파시스트들이 그 나라에서 저지른 잔학 행위를 보상하고, 화해를 모색하기 위해 현지 당국에 손을 내밀어야 합니다."
 ITA_abolish_the_colonies:0 "식민지 폐지"
 ITA_abolish_the_colonies_desc:1 "이탈리아의 모든 지역에 대한 식민지 지위를 폐지하는 혁명적인 계획을 개발하여 제시할 것입니다. 우리나라 역사상 처음으로, 해당 지역의 현지 주민들이 자신들의 운명을 결정할 기회를 갖게 될 것입니다. 그들이 이탈리아 국가의 합법적인 주가 되는 것의 이점을 깨닫게 하는 것은 우리에게 달려 있습니다."
 ITA_cooperatives_for_intensive_exploitation:0 "집중 착취를 위한 협동조합"
 ITA_cooperatives_for_intensive_exploitation_desc:1 "아프리카는 막대한 자원이 매장된 풍요로운 대륙이므로, 이 매장지를 최대한 활용하기 위해 착취 방식을 개선하는 데 투자해야 합니다."
 ITA_condemn_colonialism:0 "식민주의 규탄"
 ITA_condemn_colonialism_desc:1 "이제 식민주의를 규탄하고 수많은 세월 동안 아프리카 민중을 억압해 온 유럽 열강들에게 촉구할 때입니다. 그리고 만약 상황이 악화된다면, 우리는 아프리카 민중의 이익을 위해 그들과 맞서 싸울 것입니다."
 ITA_new_colonial_policies:0 "새로운 식민 정책"
 ITA_new_colonial_policies_desc:1 "너무나 오랫동안 파시스트 정권은 식민지의 현지 주민들을 학대해 왔습니다. 이제 우리의 식민 정책을 재검토하여 이 지역들에 어느 정도의 자치권을 부여하고 과거에 야기된 불의를 바로잡을 때입니다."
 ITA_negotiations_with_albania:0 "알바니아와의 협상"
 ITA_negotiations_with_albania_desc:1 "지난 수십 년간 알바니아의 역사는 이탈리아의 강한 영향을 받아왔습니다. 이제 우리가 권위주의적인 파시스트 정권을 뒤로 했으니, 우리는 알바니아 정부에 양국 간의 유대를 강화하고, 나아가 알바니아 행정부를 우리에게 통합하여 양국을 공식적으로 통합할 가능성까지 제안해야 합니다."
 ITA_enlist_the_bashkimi_kombetar:0 "바시키미 컴브타르 징집"
 ITA_enlist_the_bashkimi_kombetar_desc:1 "우리 정부와 이념에 공감하여 붉은 셔츠 부대에 입대하기를 원하는 알바니아 출신 시민들이 많이 있습니다. 우리는 의용 민병대에 새로운 분과를 창설하여 이 신병들로 구성된 새로운 부대를 조직해야 합니다."
 ITA_the_italian_confederation:0 "이탈리아 연합"
 ITA_the_italian_confederation_desc:1 "우리의 식민 정책을 재검토한 후, 우리가 취해야 할 다음 단계는 이 탈식민화 과정에서 생겨난 모든 국가를 포함하는 연합을 형성하여, 우리 국가들이 협력하고 상호 이익을 얻을 수 있는 틀을 마련하는 것입니다."
 ITA_planned_economy:0 "계획 경제"
 ITA_planned_economy_desc:1 "우리의 새로운 연합 대표들은 그들의 주장에 따르면, 모든 회원국의 경제를 효율적이고 지속 가능한 방식으로 규제하고 활성화할 수 있는 경제 구상을 제안했습니다."
 ITA_the_fight_overseas:0 "해외에서의 전투"
 ITA_the_fight_overseas_desc:1 "아프리카 대륙에서 대규모 군사 작전을 지원하기 위해 방어를 강화하고 군수를 준비할 때가 왔습니다. 우리는 우리 군대와 해군이 마주칠 수많은 어려운 상황에서 최적의 성과를 낼 수 있도록 전문적인 훈련 기술을 개발할 것입니다."
 ITA_irregulars:0 "비정규군"
 ITA_irregulars_desc:1 "비정규군은 아프리카 전역에서 핵심적인 역할을 합니다. 우리는 현지 주민들 사이에서 모병을 늘리고 이 부대들이 받는 훈련을 개선해야 합니다."
 ITA_liberate_the_workers_of_africa:0 "아프리카 노동자 해방"
 ITA_liberate_the_workers_of_africa_desc:1 "이제 아프리카 민중을 억압하는 다양한 정부로부터 완전히 해방시킬 때가 왔습니다!"
 ITA_ascari:0 "아스카리"
 ITA_ascari_desc:1 "아프리카 현지 병력으로 구성된 정규 사단은 주둔군이나 예비군으로서뿐만 아니라, 다른 사단들이 고전할 험난한 지형에서의 군사 작전에서도 다양한 역할을 매우 효율적으로 수행함이 입증되었습니다."

