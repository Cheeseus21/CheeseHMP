 ITA_il_vento_aureo_desc:0 "오랫동안 교황청은 외세에 의해 억압받아 왔습니다. 하지만, 우리는 공군과 전투기 훈련 프로그램을 최적화하여 훨씬 저렴하면서도 용감한 조종사를 양성하고, 하늘에서부터 적들에게 가톨릭 교회의 황금빛 지배를 선사할 것입니다. 이것이 우리의 가장 장엄한 진혼곡이 될 것입니다!"
