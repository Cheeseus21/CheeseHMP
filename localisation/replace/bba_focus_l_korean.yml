 ITA_depose_mussolini_desc:0 "무솔리니를 권좌에서 몰아낼 때가 왔습니다! 그는 무능한 지도자임이 증명되었으며, 우리의 사랑하는 이탈리아를 수많은 불필요한 고난으로 끌고 가 한계점을 훨씬 넘어선 인내력을 시험했습니다. 앞으로 한동안 그의 그림자가 우리 위에 크게 드리워질지 모르지만, 이탈리아와 그 국민은 승리할 것입니다!"
 ITA_italo_balbo_focus:0 "이탈로 발보"
 ITA_italo_balbo_focus_desc:0 "앞으로 닥쳐올 격동의 시기를 헤쳐나갈 유능한 군사 지도자가 필요합니다. 이탈로 발보는 군사 지도자일 뿐만 아니라, 여러 외교 임무를 수행하고 우리의 리비아 영토를 매우 효과적으로 통치한 항공 영웅이기도 합니다. 그는 분명 우리 군의 빈약한 상태를 개선하고 이탈리아에 영광을 가져다줄 것입니다!"
 ITA_remove_balbo_as_advisor_tt:0 "§Y이탈로 발보§!를 더 이상 §Y고문§!이나 §Y원수§!로 임명할 수 없게 됩니다."
 ITA_dino_grandi_focus:0 "디노 그란디"
 ITA_dino_grandi_focus_desc:0 "우리가 번영하려면 외교에 능통하고 낡은 제도를 개편하는 것을 두려워하지 않는 인물이 필요합니다. 디노 그란디는 외무장관을 역임하며 외교 계급을 개혁하여 귀족 외의 다른 사람들에게도 문호를 개방했습니다. 그는 필요한 개혁을 단행하고 이탈리아를 새롭고 밝은 미래로 이끄는 것을 주저하지 않을 것입니다!"
 ITA_remove_grandi_as_advisor_tt:0 "§Y디노 그란디§!를 더 이상 §Y고문§!으로 임명할 수 없게 됩니다."
 ITA_has_new_duce_flag:0 "§Y대평의회§!에 의해 축출되었습니다."
 ITA_stop_the_squandering:0 "낭비 중단"
 ITA_stop_the_squandering_desc:0 "너무 오랫동안 무솔리니는 이탈리아가 감당할 수 없는 돈과 자원을 낭비해 왔습니다. 이제 이 무모한 낭비에 종지부를 찍을 때입니다! 우리는 지출을 억제하고 자본을 다른 분야 개선에 집중해야 합니다."
 ITA_consolidate_power:0 "권력 공고화"
 ITA_consolidate_power_desc:0 "당과 국가 전반에 대한 우리의 장악력은 여전히 약합니다. 우리는 가진 권력을 공고히 하고, 대중에게 우리가 그 어느 때보다 강력하고 신뢰할 수 있음을 보여줌으로써 체제를 강화해야 합니다!"
 ITA_purge_the_party:0 "당 숙청"
 ITA_purge_the_party_desc:0 "구체제가 복원되기를 바라는 자들이 있다는 소문이 우리 귀에 들려왔습니다. 무솔리니가 권좌에서 축출되었음에도 불구하고, 그의 그림자는 정부 전반과 국민의 마음속에 여전히 존재합니다. 우리는 무력을 과시하여 우리에게 진정으로 충성하지 않고 옛 두체에게 헌신하는 당내 분자들을 숙청해야 합니다."
 ITA_the_fate_of_mussolini:0 "무솔리니의 운명"
 ITA_the_fate_of_mussolini_desc:0 "무솔리니가 가택 연금 상태에 있는 동안, 그의 그림자가 우리 위에 드리워져 있어 진정으로 나아갈 수 없습니다. 우리는 당내 진정한 권력으로서의 입지를 확보했으며, 이제 전 두체의 운명을 결정할 때가 왔습니다!"
 ITA_divino_duce:0 "신성한 두체"
 ITA_divino_duce_desc:0 "한 사람이 국가와 국민에게 미칠 수 있는 영향력이 명백해졌습니다. 아마도 이는 우리가 사용하고 적용할 수 있는 것일지도 모릅니다. 국가 채널을 활용하여 우리의 새로운 두체를 이탈리아를 통일할 수 있는 강력하고 유능한 지도자로 홍보할 수 있습니다. 우리는 국민에게 믿을 수 있는 초인적인 존재, 신앙을 바칠 수 있는 신성한 존재를 선사할 것입니다!"
 ITA_blackshirt_loyalty:0 "검은 셔츠단의 충성 확보"
 ITA_blackshirt_loyalty_desc:0 "검은 셔츠단은 오랫동안 이탈리아 파시즘 내에서 특별한 위치를 차지해 왔으며, 만약 우리가 대중에게 영감을 불어넣고자 한다면 이 조직의 충성을 얻는 것이 좋을 것입니다. 그들은 영광스러운 새 두체에 대한 신성한 인식을 군대 전체와 그 너머로 퍼뜨리는 데 가장 유용할 것입니다."
 ITA_a_greater_purpose:0 "더 위대한 목적"
 ITA_a_greater_purpose_desc:0 "최근 당내 분쟁은 파시즘 사상을 특정 개인에게 너무 긴밀하게 묶는 것의 결점을 보여주었습니다. 우리는 파시즘을 한 개인의 유한한 삶을 초월하는 더 위대한 개념, 즉 사람들이 단결할 수 있는 이념으로 홍보하는 데 집중해야 합니다."
 ITA_spreading_the_eagles_wings:0 "독수리의 날개를 펼쳐라"
 ITA_spreading_the_eagles_wings_desc:0 "우리 주변의 다른 이념들은 무너지고 실패하고 있습니다. 오직 파시즘만이 이 격동의 사건들의 맹공을 회복력 있게 견뎌냈을 뿐만 아니라, 심지어 번성한 것처럼 보입니다. 이 안정을 다른 국가에도 가져다주는 것이 우리의 의무입니다. 이 어두운 시기에 그들에게 빛의 등불을 가져다주는 것입니다!"
 ITA_italian_hegemony:0 "이탈리아의 패권"
 ITA_italian_hegemony_desc:0 "전쟁으로 폐허가 된 세상 속에서, 우리는 우리의 패권 아래 모든 다양한 국가와 문화를 고무하고 통합하여, 파시즘과 [ROOT.GetNameDefCap]이 그들에게 어떻게 이익이 되는지 보여주어야 합니다. 우리는 더 밝은 미래를 향한 길을 이끌어야 합니다!"
 ITA_reorganize_regio_esercito:0 "Regio Esercito 재편성"
 ITA_reorganize_regio_esercito_desc:0 "새로운 지도부와 함께 새로운 통찰력이 생깁니다. 조금이라도 관심을 갖고 살펴보는 사람이라면 누구나 우리의 승리한 군대에 여전히 개선할 부분이 있다는 것을 명확히 알 수 있습니다. 최근 확보된 자원으로 더 많은 훈련에 투자하고 군대를 재편성하여 그 어떤 것도 그들의 앞을 가로막지 못하게 해야 합니다!"
 ITA_reinforce_regia_aeronautica:0 "Regia Aeronautica 강화"
 ITA_reinforce_regia_aeronautica_desc:0 "Regia Aeronautica는 전 세계적으로 존경과 부러움을 받고 있지만, 여전히 개선의 여지가 있습니다. 더 많은 자원을 즉시 사용할 수 있게 되었으므로, 장비와 훈련에 투자하여 가장 두려운 공군으로 만들어야 합니다!"
 ITA_compagnie_auto_avio_sahariane:0 "Compagnie Auto Avio Sahariane 확장"
 ITA_compagnie_auto_avio_sahariane_desc:0 "리비아의 Compagnie Auto Avio Sahariane는 자체 정찰기와 결합했을 때 매우 효과적임이 입증되었습니다. 이 설계를 확장하면 우리 군대는 더욱 강력해지고 적들에게 신의 공포를 심어줄 것입니다!"
 ITA_combined_land_and_air_warfare:0 "지상 및 공중 통합전"
 ITA_combined_land_and_air_warfare_desc:0 "Regia Aeronautica가 Regio Esercito를 지원함으로써 이탈리아 군이 보유한 역량을 입증했지만, 아직 발전의 여지가 있습니다! 이 협력을 심화하면 전장에서 적들을 초토화하고 이탈리아에 영원한 영광을 가져다줄 것입니다!"
 ITA_the_fourth_shore:0 "제4의 해안"
 ITA_the_fourth_shore_desc:0 "리비아는 종종 이탈리아의 '제4의 해안'으로 불리며, 우리 국가 미래의 필수적인 부분입니다. 이곳은 가장 가까운 식민지이자 아프리카 대륙의 나머지 지역과 연결되는 통로 역할을 하므로 가장 가치 있는 곳 중 하나입니다. 여기에 자원을 투자함으로써 우리는 해외 영토를 확보하고 미래에 충분한 이득을 얻을 수 있습니다."
 ITA_oil_in_tripoli:0 "트리폴리의 석유"
 ITA_oil_in_tripoli_desc:0 "리비아에서 금을 발견했습니다. 바로 검은 황금 말입니다! 트리폴리 외곽 사막에서 막대한 석유 매장량을 발견했습니다. 이런 기회를 놓칠 수 없으며, 이탈리아의 영광을 위해 이 자산을 개발해야 합니다!"
 ITA_steel_in_tripoli:0 "트리폴리의 강철"
 ITA_steel_in_tripoli_desc:0 "트리폴리 외곽 사막에는 우리가 파내어 가공하기만을 기다리는 다량의 철이 묻혀 있는 것 같습니다. 근처에 제철소를 건설하면 그 강철을 사용하여 우리 빛나는 군대의 발전을 더욱 촉진할 수 있을 것입니다!"
 ITA_novus_ordo:0 "새로운 질서"
 ITA_novus_ordo_desc:0 "이탈리아의 운명은 리비아와 밀접하게 연결되어 있으므로, 우리는 리비아를 우리 영역에 더욱 통합해야 합니다. 이는 우리를 위해 싸울 의향이 있는 모든 리비아인에게 '특별 시민권'을 제공함으로써 달성할 수 있으며, 이를 통해 지중해와 북아프리카에 대한 우리의 통제권을 확보할 수 있습니다."
 ITA_seek_british_military_cooperation:0 "영국과의 군사 협력 모색"
 ITA_seek_british_military_cooperation_desc:0 "지난 전쟁에서 이전 동맹국들에게 배신당했지만, 원한을 넘어 화해의 손길을 내미는 것이 여전히 합리적일 수 있습니다. 영국, 특히 그들의 해군과 공군에 관해서는 우리가 배울 점이 많습니다."
 ITA_anglo_italian_pact:0 "영국-이탈리아 협정 체결"
 ITA_anglo_italian_pact_desc:0 "영국과의 군사 협력은 우리에게 큰 도움이 되었으며, 불가침 조약 또한 마찬가지일 것입니다. 이러한 조약은 아프리카에 있는 우리 영토의 광대한 지역을 확보하여 다른 곳으로 눈을 돌릴 수 있게 해줄 것입니다."
 ITA_invite_france_to_military_partnership:0 "프랑스를 군사 동반자 관계로 초대"
 ITA_invite_france_to_military_partnership_desc:0 "프랑스는 우리의 가장 강력한 이웃 국가이자 오랜 동맹국입니다. 지난 전쟁에서 그들의 배신을 잊지는 않겠지만, 용서할 수는 있습니다. 아마도 이제는 오랜 원한을 뒤로하고 긴밀한 동반자 관계를 통해 군사력을 강화할 때일 것입니다."
 ITA_franco_italian_pact:0 "프랑스-이탈리아 협정 체결"
 ITA_franco_italian_pact_desc:0 "프랑스와의 군사 협력은 매우 가치 있었으며, 불가침 조약 또한 마찬가지일 것입니다. 유럽의 서부 전선을 확보할 뿐만 아니라 아프리카 영토의 상당 부분을 확보하여 다른 곳에 집중할 수 있게 될 것입니다."
 ITA_proclaim_the_italian_empire:0 "이탈리아 제국 선포"
 ITA_proclaim_the_italian_empire_desc:0 "최근 아프리카에서 획득한 영토와 함께, 우리에게 새로운 날이 밝아오고 있습니다. 급성장하는 제국과 군에 대한 현명한 투자로, 우리는 더 이상 단순한 왕국이 아닙니다. 마침내 우리는 이탈리아 제국의 여명을 선포할 자신감을 갖게 되었습니다! 우리는 이 순간을 오랫동안 기다려왔습니다!"
 ITA_italy_will_guarantee_tt:0 "[GetItalyGuaranteesMajor]"
 ITA_italy_will_guarantee_tt_standard:1 "§Y[ROOT.GetNameDefCap]§!은(는) §Y[ROOT.GetNameDefCap]§!을(를) §Y보장§!하는 모든 §Y주요 국가§!를 §Y보장§!할 것입니다."
 ITA_italy_will_guarantee_tt_fulfilled:1 "§Y[ROOT.GetNameDefCap]§!은(는) §Y[ROOT.GetNameDefCap]§!을(를) §Y보장§!하는 모든 §Y주요 국가§!를 §Y보장§!할 것입니다. 현재 효과:"
 ITA_african_conquests_tt:0 "우리의 야심찬 제국으로 인해, §Y아프리카 대륙§!의 영토를 §Y합병§!하는 데 드는 §Y비용이 감소§!합니다."
 ITA_economic_reforms:0 "경제 개혁"
 ITA_economic_reforms_desc:0 "구체제 하에서 경제는 크게 침체되었지만, 활력을 되찾은 국가 파시스트당과 함께라면 우리는 이 중대한 과업에 맞설 준비가 되어 있습니다! 이제 우리는 경제를 활성화할 자격이 있는 유능한 인재를 자유롭게 임명할 수 있습니다."
 ITA_improve_the_industries:0 "산업 개선"
 ITA_improve_the_industries_desc:0 "활성화된 경제 덕분에 이제 우리는 산업에 관심을 돌리고 광범위한 개혁을 단행할 자원을 갖게 되었습니다. 더 효율적인 산업은 승리하는 우리 군대에 더 많은 장비가 더 빨리 도달하는 것으로 이어질 것입니다."
 ITA_reorganize_the_party:0 "당 재조직"
 ITA_reorganize_the_party_desc:0 "국가 파시스트당은 음모와 자기 미화로 가득 찬 진부하고 다루기 힘든 기관이 되었습니다. 당에 대한 더 확고한 장악력을 바탕으로, 이제 우리는 당을 처음부터 재조직하여 더 효율적이고 역동적으로 만들 수 있습니다."
 ITA_meritocracy:0 "능력주의"
 ITA_meritocracy_desc:0 "우리 대오 내의 반대파를 진압했으므로, 이제 우리는 파시스트당 외부의 구성원들에게 여러 기관을 개방할 수 있습니다. 이는 새롭고 흥미로운 아이디어와 새로운 기회를 가져올 것입니다."
 ITA_expanded_corporatism:0 "확장된 조합주의"
 ITA_expanded_corporatism_desc:0 "조합주의는 파시즘의 근본적인 사상이며, 새로 획득한 모든 영토에서 가능한 한 최대한으로 시행해야 하는 것입니다. 하지만 이를 위해서는 현지 엘리트와 인재에 의존하고 파시스트 계층 내에서 승진할 수 있는 문을 열어야 합니다. 이는 우리의 새로운 지배 영역에 충성심과 효율성을 심어주는 쉬운 방법입니다."


 ITA_stop_the_squandering_military_industry_tt:0 "$ITA_modify_military_industry_dynamic_modifier_ns_intro$ \n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5.00%§! \n\n"
