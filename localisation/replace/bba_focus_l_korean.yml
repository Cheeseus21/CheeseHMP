 ITA_topple_amhara_rulers_event_chain_tt:0 "\n§Y현지 통치자들이 이탈리아 관리에게 접근§! 이벤트 연쇄를 시작하여, 원한다면 일부 에티오피아 주에서 순응도를 높이거나 이탈리아 괴뢰국을 수립할 수 있습니다."
