 # global flags 
 second_italo_ethiopian_war_flag:0 "제2차 이탈리아-에티오피아 전쟁 진행 중"
 ETH_selassie_left_flag:0 "$ETH_haile_selassie$가 에티오피아를 떠남"

 #Tech bonuses
 ETH_university_bonus:0 "[ROOT.Capital.GetCapitalVictoryPointName] 대학 전자공학 연구"
 ETH_new_weapons_and_tactics_bonus:0 "신무기 및 전술 연구"
 ETH_shipbuilding_bonus:0 "[ETH.GetAdjective] 조선"
 
 # Focuses
 ecole_militaire_haile_selassie_1er:0 "하일레 셀라시에 1세 사관학교"
 holeta_military_academy:0 "홀레타 사관학교"
 every_league_of_nations_member_tt:0 "모든 국제 연맹 회원국:"
 ETH_strengthen_the_black_lions:0 "흑사자단 강화"
 ETH_strengthen_the_black_lions_desc:0 "적에게 영토를 빼앗겼지만, 싸움은 계속되어야 합니다. 흑사자단은 이탈리아군에게 강력히 저항하고 있으므로, 우리는 가능한 모든 방법으로 그들을 지원해야 합니다."
 ETH_supporting_the_arbegnoch:0 "아르베뇨치 지원"
 ETH_supporting_the_arbegnoch_desc:1 "[ROOT.GetName] 전역에 [ITA.GetAdjective] 침략자들에 맞서 기꺼이 무기를 들 애국자들이 있습니다. 우리는 이 용감한 남녀들이 [ITA.GetAdjective] 전쟁 기계를 무력화시키는 것을 돕기 위해 할 수 있는 모든 것을 해야 합니다."
 ETH_ecole_militaire_haile_selassie_1er:0 "[GetEthiopianMilitaryAcademyName]"
 ETH_ecole_militaire_haile_selassie_1er_desc:1 "우리 군은 장비와 사상 양면에서 이 지역의 다른 강대국들에 비해 매우 구식임이 드러나고 있습니다. 우리는 현대전을 수행하는 방법을 새로운 세대의 장교들에게 훈련시키기 위해 자체 사관학교를 설립해야 합니다."
 ETH_ecole_militaire_haile_selassie_1er_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n$MODIFIER_XP_GAIN_ARMY$: §G+5%§! "
 ETH_unlock_academy_tt:0 "§Y$academy_spirit$§! 잠금 해제"
 ETH_university_of_capital:0 "[ROOT.Capital.GetCapitalVictoryPointName] 대학교"
 ETH_university_of_capital_desc:0 "과거에는 병력의 용맹함이 전투의 향방을 결정했습니다. 이제는 병사들이 서로를 보지도 않고 먼 거리에서 전투를 치를 수 있습니다. 우리는 전쟁 수행을 위한 신기술을 개발하고 그에 필요한 도구를 생산하기 위해 교육 기관에 투자해야 합니다."
 ETH_university_of_capital_tt:0 "§Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! 수정:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§! "
 ETH_scavenging_tactics:0 "노획 전술"
 ETH_scavenging_tactics_desc:0 "산업 기반을 확장하는 동안, 우리 병력이 전장에서 유용하고 회수 가능한 물품을 식별하도록 훈련해야 합니다. 이는 우리가 자체적으로 장비를 꾸준히 생산하고 수송할 수 있을 때까지 병력에 대한 보급을 원활하게 유지하는 데 큰 도움이 될 것입니다."
 ETH_scavenger_random_generals_tt:0 "무작위 육군 지휘관 §Y세 명§!이 §Y$scavenger$§! 특성을 획득합니다: \n-$MODIFIER_EQUIPMENT_CAPTURE_FACTOR$: §G+3%§! "
 ETH_keep_the_chitet:0 "[GetChitetName] 유지"
 ETH_keep_the_chitet_desc:0 "[GetChitetName]은 우리에게 큰 도움이 되었습니다. 상대적으로 농업 국가인 우리는 상시적인 직업 상비군을 유지하기 어려울 것입니다. 우리가 잘 아는 방식을 고수하는 것이 최선입니다."
 ETH_keep_the_chitet_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n $modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+5%§!\n 치테트 세파리 사단에 §Y2개 $irregular_infantry$§! 대대 추가."
 ETH_expand_the_mehal_sefari:1 "[ETH_GetSefariName] 확장"
 ETH_expand_the_mehal_sefari_desc:1 "[ETH_GetSefariName]의 병력은 잘 훈련된 직업 군인의 필요성을 입증했습니다. 위기 시에 단순히 농민군을 징집하던 시대는 이미 오래전에 지났습니다. 따라서 우리는 군대를 상설 상비군으로 재편성할 것입니다."
 ETH_chitet_sefari_no_recruiting_tt:1 "§Y치테트 세파리§! 사단은 더 이상 모집할 수 없습니다."
 ETH_expand_the_mehal_sefari_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+25%§! \n$MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!"
 ETH_the_ethiopian_air_force:0 "[ROOT.GetAdjective] 공군"
 ETH_the_ethiopian_air_force_desc:0 "전장에서의 병력 지원이든 적 기반 시설 파괴든, 항공기는 매우 귀중한 자산임이 입증되고 있습니다. 국민을 보호하고 적을 섬멸하려면 우리만의 공군을 창설해야 합니다."
 ETH_the_ethiopian_air_force_tt:0 "§Y$air_force_command_spirit$§! 잠금 해제"
 ETH_establish_a_naval_base:0 "해군 기지 설립"
 ETH_establish_a_naval_base_desc:0 "최근 항구를 획득함으로써, 우리는 또 다른 전장에 발을 들였습니다. 우리는 새로운 해안선을 방어하기 위해 자체 해군 기지를 설립하고 해군 건설을 시작해야 합니다."
 ETH_improve_the_administration:0 "행정 개선"
 ETH_improve_the_administration_desc:0 "교육계 내에는 여전히 상당한 부패가 만연합니다. 능력주의를 자랑으로 여긴다는 기관에서 이는 용납할 수 없는 일입니다. 우리는 학교와 대학에서 이 부패를 무자비하게 뿌리 뽑아야 합니다."
 ETH_improve_the_administration_tt:0 "§Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! 수정:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY_FACTOR$: §G+5%§!"
 ETH_mounted_levies:1 "기마 [GetChitetName]"
 ETH_mounted_levies_desc:0 "동쪽의 사막에서 서쪽의 산맥에 이르기까지, 우리 조국은 통과하기 어려운 다양한 지형으로 이루어져 있어 차륜 차량이나 궤도 차량에 적합하지 않습니다. 하지만 낙타와 말은 수천 년에 걸쳐 그 임무를 훌륭히 수행할 수 있음이 증명되었습니다."
 ETH_mounted_levies_tt:0 "§Y$cavalry$§! 및 §Y$camelry$§! 사단을 징집합니다."
 ETH_regional_training_centers:0 "지역 훈련소"
 ETH_regional_training_centers_desc:0 "[GetChitetName]은 완벽과는 거리가 멉니다. 지역 훈련소를 설립하여 우리 군대에게 전술적으로 싸우고 생각하는 법을 가르친다면 훨씬 더 효과적일 수 있을 것입니다. 이는 또한 상비군 없이도 군사 훈련을 표준화할 수 있게 해줄 것입니다."
 ETH_regional_training_centers_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n $modifier_army_sub_unit_irregular_infantry_defence_factor$: §G+5%§! \n $modifier_army_sub_unit_irregular_infantry_speed_factor$: §G+10%§! \n $modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+15%§!"
 ETH_expand_the_kebur_zabagna:1 "[ETH_GetGuardsName] 확장"
 ETH_expand_the_kebur_zabagna_desc:1 "[ETH_GetGuardsName]은 우리 군 내에서 최고 중의 최고임을 증명했습니다. 장비와 인력에 대한 접근성을 개선하여 그들의 능력을 더 많이 활용해야 합니다."
 ETH_expand_the_kebur_zabagna_tt:1 "추가 §YKebur Zabagna§! 사단을 징집합니다. \n§YKebur Zabagna§! 편제에 추가 §Y$infantry$§! 및 §Y$cavalry$§! 대대를 추가합니다.\n관련 기술이 연구되었다면 §Y$recon$§! 및 §Y$artillery$§!를 추가합니다."
 ETH_tactical_training:0 "표준화된 전술 훈련"
 ETH_tactical_training_desc:0 "우리 군이 받는 훈련은 일관성이 없고 구식인 경우가 너무 많습니다. 모든 군대가 받는 전술 훈련을 표준화하여 전장에서 더 효과적으로 싸울 수 있도록 해야 합니다."
 ETH_tactical_training_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! "
 ETH_peacekeeping_forces:0 "평화 유지군"
 ETH_peacekeeping_forces_desc:0 "우리 안보의 핵심은 해외의 모든 위기가 통제 불능으로 확대되기 전에 신속하게 처리되도록 보장하는 것입니다. 따라서 언제든지 전 세계에 배치할 수 있는 평화 유지군을 유지하는 것이 중요합니다."
 ETH_copy_plane_designs:0 "항공기 설계 복제"
 ETH_copy_plane_designs_desc:0 "다른 사람들이 이미 개발한 것을 다시 발명하는 것은 의미가 없습니다. 우리는 다른 국가의 항공기 설계를 그대로 복제하여 그들의 연구 투자를 활용할 것입니다."
 ETH_copy_light_plane_tt:0 "§Y$iw_small_airframe$§!의 파생형 생성: [ITA.GetFlag]CR.32§!"
 ETH_copy_medium_plane_tt:0 "§Y$iw_medium_airframe$§!의 파생형 생성: [ITA.GetFlag]Ca.101§!"
 ETH_asmera_naval_college:0 "[GetNavalCollegeName]"
 ETH_asmera_naval_college_desc:0 "단순히 함선을 생산하고 유지하는 것만으로는 해군을 구성하기에 충분하지 않습니다. 전투에서 해군 자산을 활용하는 방법에 대해 고도로 훈련된 장교와 전문가가 필요합니다. 따라서 우리는 [ETH.GetName] 최초의 해군 사관학교를 설립할 것입니다."
 ETH_asmera_naval_college_tt:0 "§Y[GetEthiopianNavySpiritName]§! 수정:\n$MODIFIER_NAVAL_DOCTRINE_COST_FACTOR$: §G-30%§!"
 unlock_spirit_of_naval_academy_tt:0 "§Y해군 사관학교 정신§! 해금"
 ETH_naval_college_reduction:0 "해군 사관학교 연구"
 ETH_capital_school_of_technology:0 "[ROOT.Capital.GetCapitalVictoryPointName] 공과대학"
 ETH_capital_school_of_technology_desc:0 "우리의 교육 개혁은 성공적이며 투자할 가치가 있음이 증명되고 있습니다. 국가의 공학 전문가들을 하나의 공과대학으로 모아 발전을 가속화해야 합니다."
 ETH_regional_supply_depots:0 "지역 보급창"
 ETH_regional_supply_depots_desc:0 "우리 군대는 탄약이나 식량이 없다면 조국을 방어할 수 없을 것입니다. 결국, 군대는 배가 불러야 행군하는 법입니다. [ETH.GetName] 전역에 지역 군사 보급창을 설립하여 군대가 항상 잘 보급받도록 해야 합니다."
 ETH_expand_the_levy:1 "[GetChitetName] 확장"
 ETH_expand_the_levy_desc:0 "더 나은 지원과 훈련으로 [GetChitetName]은(는) 강력하고 유연한 군사력이 되었습니다. 이 강력한 기반을 바탕으로, 우리는 모든 외세 침략자를 저지하기 위해 [GetChitetName]을(를) 확장할 것입니다."
 ETH_expand_the_levy_tt:1 "배치 가능한 치테트 세파리 사단의 수를 §Y48§!(으)로 증가시킵니다.\n치테트 세파리 사단에 §Y3 $irregular_infantry$§! 대대를 추가합니다. 관련 기술을 연구했다면 §Y$engineer$§!, §Y$military_police$§!, §Y$field_hospital$§!을(를) 추가합니다."
 ETH_the_junior_officer_corps:0 "초급 장교단"
 ETH_the_junior_officer_corps_desc:0 "군대는 수 세기 동안 귀족들에게 지배되어 왔습니다. 전장에서 군대를 더 효과적으로 만들고 싶다면, 우리는 연고주의보다 능력주의를 장려하는 사관학교와 훈련 프로그램을 설립해야 합니다. 이를 위한 발판은 초급 장교단을 창설하는 것입니다."
 ETH_camouflage:0 "위장"
 ETH_camouflage_desc:0 "전장에 항공기가 도입되면서 기습의 이점을 얻기가 점점 더 어려워지고 있습니다. 우리의 전술적 의도가 노출되는 것을 최소화하기 위해, 우리 병력은 위장 및 은폐 훈련에 참여해야 합니다."
 ETH_camouflage_army_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n $MODIFIER_CAS_DAMAGE_REDUCTION$: §G+10%§! \n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§!"
 ETH_camouflage_air_tt:0 "§Y[GetEthiopianAirforceSpiritName]§! 수정:\n $MODIFIER_ENEMY_ARMY_BONUS_AIR_SUPERIORITY_FACTOR$: §G-15%§! "
 ETH_the_fetno-derash:0 "페트노-데라시"
 ETH_the_fetno-derash_desc:0 "첩보 활동은 전장에서뿐만 아니라 정치 지도부의 안전을 유지하는 데에도 점점 더 결정적인 요인이 되고 있습니다. 따라서 우리는 안보를 유지하고 적을 더 잘 이해하기 위해 전담 정보 기관을 설립할 것입니다."
 ETH_debre_zeyit_air_force_training_center:0 "[ETHGetAirBaseName] 공군 훈련소"
 ETH_debre_zeyit_air_force_training_center_desc:0 "비행기를 조종하는 것 자체도 어려운 일입니다. 전투에서 비행기를 조종하는 것은 물론 훨씬 더 많은 전문 지식을 요구합니다. 우리 조종사들이 임무를 완수할 수 있도록, 우리는 전담 공군 훈련소를 설립하고 훈련을 표준화하기 시작할 것입니다."
 ETH_debre_zeyit_air_force_training_center_tt:0 "§Y[GetEthiopianAirforceSpiritName]§! 수정:\n$MODIFIER_AIR_DOCTRINE_COST_FACTOR$: §G-25%§! "
 ETH_unlock_spirit_airforce_tt:0 "§Y$air_force_spirit$§!을(를) 잠금 해제합니다!"
 ETH_purchase_obsolete_ships:0 "구식 함선 구매"
 ETH_purchase_obsolete_ships_tt:0 "열강으로부터 구식 함선을 구매하는 결정을 잠금 해제합니다."
 ETH_purchase_obsolete_ships_desc:0 "해군 발전에 진전을 보이고 있지만, 아직 해안선을 적절히 방어할 수 있는 함대를 배치할 능력은 없습니다. 그러나 함대를 강화하기 위해 다른 국가로부터 구식 함선을 일부 조달할 수 있을 것입니다."
 ETH_new_weapons_and_tactics:0 "신무기와 신전술"
 ETH_new_weapons_and_tactics_desc:0 "다른 군대의 기술 발전을 따라잡으려면 우리 군대에 지속적으로 투자하여, 항상 최신 위협에 대처할 수 있도록 장비를 갖추고 훈련시켜야 합니다."
 ETH_old_reliable:0 "믿음직한 구식"
 ETH_old_reliable_desc:0 "단순하고, 신뢰할 수 있으며, 수리하기 쉬운 무기는 현재 많은 군대가 배치하는 지나치게 복잡한 장치보다 전선에서 더 바람직합니다. 이미 낡은 소총을 사용하는 방법을 알고 있는데, 왜 시간과 자원을 낭비하여 새로운 소총으로 병력을 훈련시키겠습니까?"
 ETH_old_reliable_tt:0 "§Y[GetEthiopianArmySpiritName]§! 수정:\n $MODIFIER_MAX_DIG_IN$: §G+0.5§!\n $MODIFIER_DIG_IN_SPEED_FACTOR$: §G+25%§!\n $modifier_army_sub_unit_infantry_attack_factor$: §G+5%§!\n $modifier_army_sub_unit_infantry_defence_factor$: §G+10%§!\n $modifier_army_sub_unit_infantry_speed_factor$: §G+10%§!"
 ETH_bring_in_foreign_advisors:0 "외국인 고문 초빙"
 ETH_bring_in_foreign_advisors_desc:0 "[ETH.GetAdjective] 공군 창설에 지속적인 진전을 보이고 있음에도 불구하고, 우리 조종사들이 최대한의 능력을 발휘하도록 보장할 중요한 실전 경험이 부족합니다. 따라서 우리는 개선 방안에 대한 조언을 얻기 위해 해외에서 장교들을 초빙할 것입니다."
 ETH_bring_in_foreign_advisors_tt:0 "§Y[GetEthiopianAirforceSpiritName]§! 수정:\n $MODIFIER_ENEMY_ARMY_BONUS_AIR_SUPERIORITY_FACTOR$: §G-5%§!\n $MODIFIER_AIR_DOCTRINE_COST_FACTOR$: §G-5%§!\n $MODIFIER_AIR_ACCIDENTS$: §G-15%§!  "
 ETH_available_as_air_chief_tt:0 "공군 총감으로 임명 가능: "
 ETH_ethiopian_officers:0 "[ROOT.GetAdjective] 장교"
 ETH_ethiopian_officers_desc:0 "[ETH.GetAdjective] 공군의 발전이 계속됨에 따라, 우리 조종사들을 효과적으로 지휘할 수 있는 장교를 확보해야 합니다. 해외의 임시 고문에게 의존하기보다는, 우리는 처음부터 우리 자신의 전문성을 개발할 것입니다."
 ETH_ethiopian_officers_tt:0 "§Y[GetEthiopianAirforceSpiritName]§! 수정:\n $MODIFIER_AIR_ATTACK$: §G+15%§!"
 ETH_promote_the_war_heroes:0 "전쟁 영웅 진급"
 ETH_promote_the_war_heroes_desc:0 "우리가 자유를 계속 누릴 수 있는 것은 전장에서 목숨을 건 영웅들 덕분입니다. 높은 사기를 유지하고 군에 대한 지원을 계속하기 위해, 전쟁 영웅들을 더 명망 있는 직위로 승진시켜야 합니다."
 ETH_expand_the_officer_corps:0 "장교단 확장"
 ETH_expand_the_officer_corps_desc:0 "최근 몇 년간 군 내 능력주의의 부재는 가장 치명적인 약점이었습니다. 가장 숙련된 인원이 우리 군을 지휘하도록 하기 위해, 장교단을 확장하고 연고주의로 계급을 얻은 자들을 몰아내야 합니다."
 ETH_medal_gain_tt:0 "사단 지휘관이 훈장을 수여받을 때 획득하는 경험치 양을 §G+75%§!만큼 증가시킵니다!"
 ETH_officer_promotion_boost_tt:0 "앞으로 §Y장군§! 계급으로 진급하는 모든 §Y장교§!는 §G+1 공격§!과 §G+1 방어§!를 받습니다!"
 ETH_the_common_soldier:0 "일반 병사"
 ETH_the_common_soldier_desc:0 "보상이나 인정을 기대하지 않고 매일 목숨을 거는 일반 병사들 없이는 군대도 존재할 수 없습니다. 이 영웅들은 우리 공동의 안전에 기여한 공로로 존경받아야 합니다."
 ETH_develop_the_capital_region:1 "[271.GetName] 개발"
 ETH_develop_the_capital_region_desc:1 "우리 국민의 더 나은 삶과 [ETH.GetNameDef]의 보호를 위해 산업화 속도를 높여야 합니다. 따라서 [ETH.Capital.GetCapitalVictoryPointName] 주변 지역에 투자하여 [ETH.GetName]의 산업 중심지로 만들어야 합니다."
 ETH_develop_the_capital_region_tt:0 "[271.GetName] 전역을 포괄하도록 전력망을 확장하는 디시전을 잠금 해제합니다."

 ETH_the_state_bank_of_ethiopia:1 "[ETH.GetNonIdeologyName] 국립은행"
 ETH_the_state_bank_of_ethiopia_desc:0 "[ETH.GetName] 국립은행의 자원을 확장함으로써, 국민에게 새로운 신용 한도를 제공하고 병든 [ETH.GetAdjective] 경제에 금융 활력소 역할을 할 수 있습니다."
 ETH_the_state_bank_of_ethiopia_tt:0 "§Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! 수정:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!"
 ETH_infrastructure_projects:0 "사회 기반 시설 프로젝트"
 ETH_infrastructure_projects_desc:0 "[ETH.GetName]은 세계가 탐내는 많은 천연자원을 보유하고 있습니다. 하지만, 이 자원들을 공장으로 들여오거나 국외로 반출할 적절한 수단 없이는 활용할 수 없습니다. 우리는 신속하게 사회 기반 시설을 확장하고 이 경제적 병목 현상을 제거해야 합니다."
 ETH_rebuilding_the_country_idea:0 "국가 재건"
 ETH_cie:0 "[GetEthiopianRailwayName]"
 ETH_cie_imperial:0 "에티오피아 제국 철도 회사"
 ETH_anarchist_bank:0 "아프리카 공동체 은행"
 ETH_central_bank:0 "아프리카 중앙은행"
 ETH_GuardsNameCommunist:0 "혁명 수비대"
 ETH_GuardsNameDefault:0 "케부르 자바냐"
 ETH_GuardsNameDemocratic:0 "국가 방위대"
 ETH_SefariNameCommunist:0 "혁명군"
 ETH_SefariNameDemocratic:0 "국방군"
 ETH_SefariNameDefault:0 "메할 세파리"

 ETH_cie_anarcho_communist:0 "[ETH.GetAdjective] 철도 공동체"
 ETH_cie_stalinist:0 "[ETH.GetAdjective] 철도 위원회"
 ETH_cie_fascist:0 "에티오피아 제국 철도"
 ETH_host_nation_name:0 "[?ETH.host_nation.GetNameWithFlag]"
 ETH_host_nation_fallback_name:0 "주둔국"
 ETH_second_italo_ethiopian_war_flag:0 "제2차 이탈리아-에티오피아 전쟁"

 ETH_infrastructure_projects_tt:0 "§Y$ETH_state_development_dynamic_modifier$§! 수정:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!"
 ETH_state_owned_industry:0 "국영 산업"
 ETH_state_owned_industry_desc:0 "세계 열강들을 보면 명확히 알 수 있듯이, 자유 시장에 기꺼이 개입하려는 정부들은 생산을 통제하고 실업률을 낮춤으로써 막대한 경제적 이익을 보고 있습니다. 우리는 그들의 선례를 따라 국영 산업을 통해 경제를 급속도로 확장할 것입니다."
 ETH_state_owned_industry_tt:0 "§Y$ETH_state_development_dynamic_modifier$§! 수정:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+20%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+20%§!"
 ETH_encourage_local_development:0 "지역 개발 장려"
 ETH_encourage_local_development_desc:0 "누구도 경제 전체의 필요를 완전히 예측할 수 없으며, 그렇지 않은 척하는 것은 위험합니다. 우리는 각 지역이 적절하다고 판단하는 방식으로 발전하도록 맡길 것입니다. 결국, 지역의 정치 기득권층과 기업들이 자신들의 지역에 무엇이 필요한지 가장 잘 알 것입니다."
 ETH_encourage_local_development_tt:0 "§Y$ETH_state_development_dynamic_modifier$§! 수정:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!"
 ETH_encourage_local_development_2_tt:0 "지방 당국이 자체적으로 주 개선을 시작할 것입니다."
 ETH_a_port_of_our_own:0 "우리만의 항구"
 ETH_a_port_of_our_own_desc:0 "최근 해안 영토를 획득함에 따라, 우리만의 항구를 건설하여 국제 시장에 대한 접근성을 크게 향상시킬 기회를 얻었습니다. 이를 통해 물품 수출입이 훨씬 쉬워져 우리 경제에 막대한 도움이 될 것입니다."
 ETH_expanding_the_railway_network:0 "철도망 확장"
 ETH_expanding_the_railway_network_desc:0 "철도는 자원을 공장으로, 나아가 국내외 시장으로 운송하는 데 매우 중요합니다. 철도망을 확장함으로써, 우리는 해당 자원을 필요한 목적지로 운송하는 능력을 향상시킬 수 있습니다. 이는 또한 [ETH.GetName] 전역의 사람들이 성장하는 산업 도시로 이주할 더 큰 기회를 창출할 것입니다."
 ETH_taxing_the_nobility:1 "[ETH_GetSeizeAssetsTitle]"
 ETH_taxing_the_nobility_desc:1 "[ETH_GetTaxNobilityDesc]"
 ETH_expand_tax_exemptions:1 "[ETH_GetTaxExemptionTitle]"
 ETH_expand_tax_exemptions_desc:1 "[ETH_GetTaxExemptionDesc]"
 ETH_expand_tax_exemptions_tt:0 "§Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! 수정:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §R-5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §R-5%§!"
 ETH_reform_the_currency:0 "화폐 개혁"
 ETH_reform_the_currency_desc:0 "최근 몇 년간 [ETH.GetAdjective] 지폐 유통이 증가했지만, [ETH.GetName]에서 무역을 할 때 여전히 많은 사람들이 다른 나라의 통화를 사용하는 것을 선호합니다. 우리는 비르(birr)를 개혁하여 국내외에서 더 널리 통용되도록 만들어야 합니다."
 ETH_increased_factory_output:0 "공장 생산량 증대"
 ETH_increased_factory_output_desc:0 "세계가 점점 더 위험해짐에 따라, 군이 외국의 침략자들에게 신뢰할 만한 억지력으로 남을 수 있도록 공장에서 장비 생산량을 늘려야 합니다."
 ETH_increased_factory_output_tt:0 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+10%§!"
 ETH_adapt_and_improve:0 "적응 및 개선"
 ETH_adapt_and_improve_desc:0 "군과 협의함으로써, 산업계 지도자들은 전장에서 실제로 무엇이 필요한지에 대한 전문 지식을 얻고 이를 기술자들에게 피드백할 수 있습니다. 이는 우리 군대에 부적절한 장비가 공급되는 것을 막고, 그들이 신속하게 개선 제안을 할 수 있게 할 것입니다."
 ETH_adapt_and_improve_tt:0 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_LAND_EQUIPMENT_UPGRADE_XP_COST$: §G-25%§!\n$MODIFIER_AIR_EQUIPMENT_UPGRADE_XP_COST$: §G-25%§!"
 ETH_the_state_court:0 "국가 법원"
 ETH_the_state_court_desc:0 "[ETH.GetName]의 법률 체계는 수 세기 전으로 거슬러 올라가는 고대 관습에 뿌리를 두고 있습니다. 최근의 개혁 물결과 함께, 이제 헌법에 맞춰 더 많은 법을 성문화하고 국가적으로 중요한 사건을 심리하기 위한 현대적인 국가 법원을 설립할 적기입니다."
 ETH_the_state_court_tt:0 "§Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! 수정:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+10%§!"
 ETH_ethiopian_shipbuilding:0 "[ROOT.GetAdjective] 조선업"
 ETH_ethiopian_shipbuilding_desc:0 "이제 우리만의 항구를 건설했으니, 우리 해군을 건조하고 유지하기 위한 기반을 다지는 것이 현명할 것입니다. 세계 해운 항로에 대한 접근성을 유지하려면 의심할 여지 없이 우리 함선이 필요할 것입니다."
 ETH_connecting_the_south:0 "남부 연결"
 ETH_connecting_the_south_desc:0 "[ETH.GetName]의 남부 지역은 산악 지형으로 인해 수도권과 고립되어 있습니다. 이 지역을 급속히 팽창하는 우리 경제에 완전히 통합하려면, 철도를 통해 산업 중심지와 연결해야 합니다."
 ETH_bomb_proofing:0 "방폭"
 ETH_bomb_proofing_desc:0 "현대적인 군대를 지원할 충분한 산업 생산력을 유지하는 것은 전시 상황에서 매우 중요합니다. 이로 인해, 항공기가 적국의 산업 중심지를 목표로 삼으므로 항공전은 향후 모든 분쟁에서 결정적인 역할을 할 가능성이 높습니다. 따라서, 우리 공장이 그러한 공격에서 살아남을 수 있도록 해야 합니다."
 ETH_bomb_proofing_tt:0 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_INDUSTRY_AIR_DAMAGE_FACTOR$: §G-10%§!\n$MODIFIER_INDUSTRY_REPAIR_FACTOR$: §G+10%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5%§!"
 ETH_rapid_industrial_expansion:0 "급속한 산업 확장"
 ETH_rapid_industrial_expansion_desc:0 "후방 국민들의 영웅적인 노력에도 불구하고, 외국의 점령에서 벗어나려면 훨씬 더 큰 산업 생산력이 필요합니다. 따라서, 우리는 경제 계획의 속도를 높이고 훨씬 더 빠른 산업 확장을 추구할 것입니다."
 ETH_rapid_industrial_expansion_tt:0 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!"
 ETH_develop_the_horn_of_africa:0 "아프리카의 뿔 개발"
 ETH_develop_the_horn_of_africa_desc:0 "아프리카의 뿔에는 다양한 민족, 자원, 그리고 잠재력이 있습니다. 만약 우리가 경제적 문제에 대해 이 지역 정부들과 협력한다면, 상호 이익이 되는 방식으로 그 잠재력을 활용하기 시작할 수 있을 것입니다."
 ETH_develop_the_horn_of_africa_tt:0 "아프리카의 뿔에 있는 독립국 또는 [ROOT.getAdjective] 속국을 개선하고, 잠재적으로 통합할 수 있는 §Y결정§!을 잠금 해제합니다."
 ETH_horn_of_africa_tt:0 "아프리카의 뿔을 형성하는 §Y결정§!을 잠금 해제합니다."
 ETH_invest_tt:0 "주에 대한 투자 §Y결정§!을 잠금 해제합니다."
 ETH_invest_in_the_north:0 "북부에 투자"
 ETH_invest_in_the_north_desc:0 "[ETH.GetName]의 북부에서 기계 생산이 시작되고 있습니다. 우리는 이 성장하는 산업의 확장을 돕기 위해 투자를 늘려 이 발전을 지원해야 합니다."
 ETH_invest_in_the_east:0 "동부에 투자"
 ETH_invest_in_the_east_desc:0 "동부에 투자함으로써, 우리는 이 지역의 역사적인 무역망을 활용하고 이 지역을 [ETH.GetName]의 자원을 가공하여 수출 준비를 마치는 산업 중심지로 만들 수 있습니다."
 ETH_invest_in_the_west:0 "서부에 투자"
 ETH_invest_in_the_west_desc:0 "[ETH.GetName]의 여러 지역은 다양한 자원에 접근할 수 있습니다. 서부에 투자함으로써, 우리는 의류 생산의 산업화를 급속히 증가시키고 그 분야의 기존 전문 지식을 활용할 수 있습니다."
 ETH_expand_the_coffee_industry:0 "커피 산업 확장"
 ETH_expand_the_coffee_industry_desc:0 "전 세계적으로 커피를 요구하는 사람들은 부족하지 않습니다. 이 맛있는 각성제의 주요 공급원 중 하나로서, 우리는 커피 산업에 투자하고 수출을 늘려 이 수요를 활용해야 합니다. "
 ETH_modernizing_the_industry:0 "산업 현대화"
 ETH_modernizing_the_industry_desc:0 "우리는 최근 몇 년간 산업 생산력을 늘리는 데 큰 진전을 이루었습니다. 하지만, 경제의 요구가 변화하고 새로운 생산 방식이 등장함에 따라 이는 계속되는 과제가 될 것입니다. 따라서, 우리는 [ETH.GetName] 전역에 전기 및 기타 산업 발전을 가져오고 경제 현대화를 계속하기 위해 노력할 것입니다."
 ETH_modernizing_the_industry_tt:0 "투자가 이루어진 지역 내 모든 주:\n §Y건설 슬롯§! §G1§!개 추가.\n투자가 이루어진 각 지역의 주 하나:\n §Y$industrial_complex$§! §G1§!개 추가."
 ETH_animal_husbandry:0 "축산업"
 ETH_animal_husbandry_desc:0 "[ETH.GetNameDef] 전역에서 말과 낙타는 물자 분배와 인력 수송에 중요한 역할을 맡고 있습니다. 이 동물들의 공급과 품질이 절대 떨어지지 않도록 축산업에 대한 투자를 늘려야 합니다."
 ETH_ethiopian_industrial_research_institute:0 "[ROOT.GetAdjective] 산업 연구소"
 ETH_ethiopian_industrial_research_institute_desc:0 "산업적으로 다른 국가에 항상 한 발 뒤처지는 것을 피하려면, 국내 연구 기관을 개선해야 합니다. 이를 통해 해외에서 아이디어를 수입하는 대신 우리만의 혁신을 시작할 것입니다."
 ETH_invite_foreign_prospectors:0 "외국 탐사자 초청"
 ETH_invite_foreign_prospectors_desc:0 "해외의 연구 개발을 모방하려 애쓰기보다는, 외국 정부와 기업의 전문 지식을 활용하여 풍부한 천연자원을 더 잘 활용해야 합니다."
 ETH_invite_foreign_prospectors_tt:1 "[ROOT.GetName] 북부에서 §Y$ETH_prospect_for_resources$§! 결정이 잠금 해제됩니다. 탐사 결정을 내리려면 §Y$excavation2$§! 기술과 §Y2§!개 이상의 사용 가능한 §Y민간 공장§!이 필요합니다.\n\n"
 ETH_invite_foreign_industrialists:0 "외국 [ETH_GetInvestorName] 초청"
 ETH_invite_foreign_industrialists_desc:0 "최근 몇 년간 기반 시설과 산업을 대대적으로 개선하여 천연자원 활용이 훨씬 더 효율적으로 되었습니다. 그러나 외국 전문가와 산업가를 [ETH.GetName]에서 활동하도록 초청함으로써 산업 발전을 가속할 수 있습니다."
 ETH_invite_foreign_industrialists_tt:1 "대상 국가가 [ETH.GetFlag][ETH.GetNameDef]에 대해 §Y§G75§! 이상의 우호도§!를 가지고 있다면 다른 국가의 설계사를 이용할 수 있게 됩니다. \n\n§R선택된 설계사는 모국이 [ETH.GetNameDef]와 전쟁 중일 경우 비활성화됩니다!§! \n\n가능한 국가는 다음과 같습니다: §Y[ENG.GetFlag][ENG.GetName]§!, §Y[FRA.GetFlag][FRA.GetName]§!, §Y[GER.GetFlag][GER.GetName]§!, §Y[JAP.GetFlag][JAP.GetName]§!, §Y[CZE.GetFlag][CZE.GetName]§!, §Y[SWE.GetFlag][SWE.GetName]§!"
 ETH_the_second_italo-ethiopian_war:0 "제2차 이탈리아-에티오피아 전쟁"
 ETH_the_second_italo-ethiopian_war_desc:1 "크리스마스 공세는 우리가 바라고 필요했던 승리를 가져다주지 못했습니다. 이제 [ETH.GetLeader]가 수도를 떠나 직접 군대를 지휘할 때입니다. 이탈리아와의 전쟁을 끝내야 합니다!"
 ETH_the_second_italo-ethiopian_war_tt:0 "§Y$ETH_haile_selassie$§!이(가) 원수로 임명 가능해집니다"
 ETH_renewed_offensive:0 "공세 재개"
 ETH_renewed_offensive_desc:0 "이탈리아군이 주도권을 되찾으려 할지도 모릅니다. 하지만 이는 우리 군의 공격을 예상하지 못하고 있다는 뜻이기도 합니다. 버티기만 할 것이 아니라, 우리가 먼저 전투를 걸어야 합니다."
 ETH_renewed_offensive_tt:0 "보병 공격 §G+10%§!\n비정규 보병 공격 §G+10%§!\n사단 방어 §R-5%§!"
 ETH_renewed_offensive_tt_1:0 "§Y$ETH_army_1_dynamic_modifier$§! 수정:\n"
 ETH_falling_back:0 "후퇴"
 ETH_falling_back_desc:0 "전선은 빠르게 방어 불가능 상태가 되고 있으며 보급선은 한계에 다다랐습니다. [ROOT.Capital.GetCapitalVictoryPointName](으)로 조직적으로 후퇴하는 것이 현명할 수 있지만, 전장에서 완전히 패주하지 않도록 조심해야 합니다."
 ETH_falling_back_tt:0 "60일 동안 에티오피아 점령 국경 주에서 이탈리아 부대가 이동 및 공격 페널티를 받습니다."
 ETH_northern_thrust:0 "북부 돌파"
 ETH_northern_thrust_desc:0 "우리의 최우선 목표는 에리트레아를 점령하는 것입니다. 북부 항구에서 이탈리아군을 차단할 수 있다면, 그들은 부대 보급에 훨씬 더 큰 어려움을 겪을 것이며, 그 후에 우리는 더 약한 남부 전선을 처리할 수 있습니다."
 ETH_victory_in_the_desert:0 "사막에서의 승리"
 ETH_victory_in_the_desert_desc:0 "오가덴은 이탈리아 전선에서 가장 취약한 부분입니다. 그곳에서 적을 격파하는 데 노력을 집중하고, 이어서 남부의 항구들을 점령해야 합니다. 이렇게 하면 후방이 안전해지고, 에리트레아로 진격할 수 있게 될 것입니다."
 ETH_the_defense_of_addis_ababa:0 "아디스아바바 방어"
 ETH_the_defense_of_addis_ababa_desc:0 "아디스아바바는 역사적인 수도입니다. 또한 에티오피아의 산업 중심지이기도 합니다. 도시가 함락되면, 우리의 대의는 실패합니다. 도시를 사수하기 위해 할 수 있는 모든 것을 해야 합니다."
 ETH_the_defense_of_addis_ababa_tt_1:0 "§Y$VICTORY_POINTS_5010$§!:\n"
 ETH_the_defense_of_addis_ababa_tt_2:0 "§Y$VICTORY_POINTS_8036$§!:\n"
 ETH_the_hindenburg_wall:0 "힌덴부르크 방벽"
 ETH_the_hindenburg_wall_desc:0 "우리의 튀르키예인 고문, $ETH_wehib_pasha$는 하라르와 디레다와 시 주변에 지난 전쟁의 독일군 요새에 필적하는 방어 시설을 건설하고자 합니다. 이 지역을 사수하면 이탈리아군이 전선을 연결하는 것을 막고, 지부티 항구를 통해 바다로 나아가는 길을 확보할 수 있을 것입니다."
 ETH_the_hindenburg_wall_tt_1:0 "§Y$VICTORY_POINTS_7980$§!:\n"
 ETH_the_hindenburg_wall_tt_2:0 "§Y$VICTORY_POINTS_13249$§!:\n"
 ETH_mercenaries:0 "용병"
 ETH_mercenaries_desc:0 "다양한 이유로 우리와 함께 싸우고 싶어 하는 외국인들이 많습니다. 대부분은 우리 돈만 노리는 쓸모없는 모험가들이지만, 벨기에령 콩고와 아라비아에서 일부 용병을 모집할 수 있습니다. 이 숙련된 전사들을 우리 편으로 끌어들이면 전세를 유리하게 바꾸는 데 분명 도움이 될 것입니다."
 ETH_mercenaries_congo_tt:0 "§Y[838.GetName]§!과 §Y[837.GetName]§! 중 하나를 아군이 통제하고 있을 경우, §Y콩고 용병 부대 3개§!를 추가합니다."
 ETH_mercenaries_arabia_tt:0 "§Y[843.GetName]§!과 §Y[835.GetName]§! 중 하나를 아군이 통제하고 있을 경우, §Y아랍 용병 부대 2개§!를 추가합니다."
 ETH_reach_out_to_the_world:0 "전 세계에 호소"
 ETH_reach_out_to_the_world_desc:0 "[ROOT.GetName]에서 무슨 일이 벌어지고 있는지 전 세계가 알아야 합니다. 우리는 인간적으로 불가능할 정도로 오랫동안 수적으로 우세한 적에 맞서 버텼고, 유럽의 강대국과 교착 상태에 빠질 때까지 싸웠습니다. 국제 사회는 이 불법적인 침략에 맞서기 위해 우리에게 도움이 필요하다는 것을 알아야 합니다!"
 ETH_a_last_stand:0 "최후의 항전"
 ETH_a_last_stand_desc:1 "좌절에 굴복해서는 안 됩니다. 최후의 수단으로 $VICTORY_POINTS_13244$로 후퇴하여 그곳에서 방어선을 준비할 수 있습니다. 이탈리아군은 [ROOT.GetName]의 서쪽 끝까지 군대를 보급하는 데 어려움을 겪을 것입니다."
 ETH_the_lessons_of_war:0 "전쟁의 교훈"
 ETH_the_lessons_of_war_desc:1 "제국이나 국가가 어떻게 대처할지는 고사하고, 전장의 압박에 어떻게 대처할지는 아무도 모릅니다. 비록 현대전의 압박에 대한 준비가 부족했지만, 우리 군은 전쟁의 어려운 교훈을 배우고 그로 인해 더욱 강해졌습니다."
 ETH_the_lessons_of_war_tt:1 "§Y[GetEthiopianArmySpiritName]§!에 다음 효과 적용:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! \n$MODIFIER_MAX_DIG_IN$: §G+2§!\n$MODIFIER_DIG_IN_SPEED_FACTOR$: §G+10%§!"
 ETH_arms_purchases:0 "무기 구매"
 ETH_arms_purchases_desc:0 "국제 연맹은 이탈리아의 침공을 막는 데 실패했고, 대신 양국에 대한 무기 판매 금수 조치에 투표했을 뿐입니다. 이것이 [ITA.GetName]보다 우리에게 더 큰 타격을 준다는 것을 그들도 분명히 깨달았을 것입니다. 우리는 합법적인 방어자로서 국제적으로 무기를 구매할 수 있어야 한다고 주장할 근거가 있습니다."
 ETH_arms_purchases_tt:0 "국제 무기상으로부터 무기를 구매하는 디시전을 잠금 해제합니다."
 ETH_request_embargo:0 "금수 조치 요구"
 ETH_request_embargo_desc:0 "[ITA.GetName]에 대한 금수 조치는 그들에게 전혀 타격을 주지 않는 명목상의 조치일 뿐입니다. 국제 연맹은 우리의 요청을 들을 준비가 되어 있습니다. 우리는 이탈리아에 실질적인 타격을 줄 수 있는 강화된 금수 조치를 부과하도록 이사회를 설득하는 데 노력을 집중해야 합니다. 석유와 철강을 포함하는 조치 말입니다. 이 두 가지는 그들의 전쟁 기계에 필수적입니다."
 ETH_international_brigades:0 "국제 여단"
 ETH_international_brigades_desc:0 "이제 국제 연맹이 우리의 투쟁을 지원하기 위한 파병 금지를 해제할 뿐만 아니라, 회원국들이 침략자에 맞서 일어서도록 실제로 장려해야 할 때가 왔습니다!"
 ETH_league_of_nations_volunteer_resolution:0 "국제 연맹 국제 여단 결의안"
 ETH_closing_the_suez:0 "수에즈 운하 폐쇄"
 ETH_closing_the_suez_desc:0 "국제 연맹은 [453.Owner.GetNameDef]에게 [ITA.GetAdjective] 선박에 대해 수에즈 운하를 폐쇄하도록 강제해야 합니다. 이는 [ITA.GetAdjective] 전쟁 기계에 심각한 타격을 줄 것이며, 우리가 동등한 조건에서 전쟁을 치를 수 있게 해줄 것입니다."
 ETH_international_mediation:0 "국제 중재"
 ETH_international_mediation_desc:0 "국제 연맹은 두 회원국 간의 분쟁이 이렇게 오래 지속되도록 내버려 둘 수 없습니다. 그들은 조치를 취하여 [ITA.GetName]이 전쟁 이전 국경으로 철수하도록 강제해야 합니다!"
 ETH_international_mediation_tt:0 "[ITA.GetName]과 [ETH.GetName]이 백지 평화 조약을 체결합니다.\n "
 ETH_rally_around_the_emperor:0 "황제를 중심으로 단결"
 ETH_rally_around_the_emperor_desc:0 "황제 폐하 [ETH.GetLeader]는 우리의 다양한 제국을 하나로 묶는 핵심입니다. 이 위기의 시기에, 우리는 사소한 불만을 제쳐두고 황제 폐하를 중심으로 단결해야 합니다. [ETH.GetName]과 그 국민의 생존 자체가 위태롭기 때문입니다."
 ETH_rally_around_the_emperor_tt:0 "에티오피아 §Y망명 정부§!를 위한 §Y주재국§!을 설정하는 디시전을 잠금 해제합니다."
 ETH_support_spain_static_modifier:0 "스페인 지원"

 ETH_boarding_the_train:0 "열차 탑승"
 ETH_boarding_the_train_desc:0 "우리의 방어선이 무너지기 시작했으며, 극적인 변화가 없는 한 [ETH.GetName]은(는) 더는 존재하지 않을 것입니다. 많은 조언가가 옥좌가 비는 것의 악영향을 주장했지만, 황제 폐하 [ETH.GetLeader]께서는 국제 연맹에서 우리의 대의를 위한 국제적 지지를 결집하고자 제네바로 향하기로 결정하셨습니다."
 ETH_boarding_the_train_tt:0 "§Y$ETH_haile_selassie$§!이(가) 국제 연맹으로 가기 위해 [ROOT.GetName]을(를) 떠납니다. 만약 에티오피아가 항복하면, $ETH_haile_selassie$은(는) §Y망명 정부§!를 수립할 것입니다."
 ETH_has_host_nation_tt:0 "망명 정부를 위한 잠재적 §Y주재국§!이 설정되었습니다\n"
 ETH_the_emperor_stays:0 "황제는 남는다"
 ETH_the_emperor_stays_desc:0 "조언가들의 간청에도 불구하고, 황제 폐하 [ETH.GetLeader]께서는 [ETH.GetName]에 남아 용감한 전사들과 함께 싸움을 계속하기로 하는 영웅적인 결정을 내리셨습니다. 제국의 가장 어두운 시기에 그분께서 우리에게 승리를 가져다주시길 바랍니다."
 ETH_the_american_radio_address:0 "미국 라디오 연설"
 ETH_the_american_radio_address_desc:0 "침략 행위가 반복적으로 발생함에 따라 국제 연맹의 법은 끊임없이 위반되고 있습니다. 저주받은 자들의 정신이 인류를 지배하지 않도록, 모든 평화를 사랑하는 사람들은 합법성과 평화를 보존하기 위해 굳건히 맞설 수 있도록 협력해야 합니다."
 ETH_the_patriots:0 "애국자들"
 ETH_the_patriots_desc:0 "고잠의 애국자들이 [ETH.GetName] 제국 정부의 지역 계획에 방해가 되긴 했지만, 이제 그들은 [ITA.GetAdjective]인들이 이 지역을 전혀 통치하지 못하도록 막음으로써 우리를 돕고 있습니다. 우리는 애국자들을 돕기 위해 할 수 있는 모든 것을 하여 국내에 발판을 유지하고 [ITA.GetAdjective]인들이 너무 편안해지지 않도록 해야 합니다."
 ETH_the_patriots_tt:0 "§Y$ETH_supporting_the_arbegnoch$§! 연속 중점을 잠금 해제합니다.\n에티오피아 북부 및 중부의 적 점령 주에 저항 목표치 §G+10§!을(를) 추가합니다."
 ETH_allow_fundraising_campaigns_tt:0 "제국 재무부 자금을 늘리기 위한 모금 운동을 시작하는 §Y결정§!을(를) 잠금 해제합니다."
 ETH_patriot_resistance_tt:0 "아르베그노크의 적극적인 저항: §R+10%§!"
 ETH_addressing_the_league_of_nations:0 "국제 연맹 연설"
 ETH_addressing_the_league_of_nations_desc:0 "총회가 [ITA.GetName]의 정복 전쟁 문제에 대해 조치를 취하지 않은 것과, 그로 인해 침략의 희생자들을 저버리는 정책을 편 것은 연맹의 존재 자체를 위협합니다. 희생자를 저버리는 정책을 선택한 회원국들은 명심해야 합니다, 오늘은 우리지만, 내일은 당신들이 될 것입니다..."
 ETH_the_abuna:0 "아부나"
 ETH_the_abuna_desc:0 "[ITA.GetAdjective] 침략자들에게 저항하는 것은 황제에 대한 충성의 문제일 뿐만 아니라 도덕의 문제입니다. $ETH_abuna_qerellos_iv$와 상의함으로써, 우리는 국민에게 우리 대의의 정당성과 우리 신의 이름으로 의무를 다해야 할 필요성을 보여줄 수 있습니다."
 ETH_the_lion_stands_firm:0 "사자는 굳건히 서리라"
 ETH_the_lion_stands_firm_desc:0 "유다 부족의 정복하는 사자이신 황제 폐하 [ETH.GetLeader]께서는 유능한 전사임을 증명하셨습니다. 우리는 황제께서 병사들 곁에서 싸우시며 [ITA.GetAdjective]의 전쟁 기계를 패배시킬 수 있음을 보여줌으로써 군대를 결집해야 합니다."
 ETH_the_lion_stands_firm_tt:0 "\n§Y$ETH_army_1_dynamic_modifier$§! 수정:\n$modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+5%§!"
 ETH_unification_of_the_habesha:0 "하베샤족의 통일"
 ETH_unification_of_the_habesha_desc:0 "[ITA.GetName]과의 전쟁은 우리 기반 시설에 상상할 수 없는 피해를 입혔고 우리 국민에게 고통을 안겨주었습니다. 단순히 조국을 되찾는 것만으로는 더는 충분하지 않습니다. 우리는 하베샤 민족을 통일할 수 있도록 하는 영토 할양을 포함하여 [ITA.GetAdjective]인들에게 보상을 요구합니다."
 ETH_the_ferengi:0 "페렝기"
 ETH_the_ferengi_desc:0 "국제 연맹이 우리의 지원 요청에 늦게 대응하는 동안에도, 우리의 대의를 위해 기꺼이 싸우려는 외국인들은 부족하지 않습니다. 우리가 그들에게 돈을 지불하는 한 말입니다."
 ETH_the_ferengi_tt:0 "제국 재무부 자금을 사용하여 용병을 모집하는 §Y결정§!을(를) 잠금 해제합니다."
 ETH_recruit_from_the_african_diaspora:0 "아프리카 디아스포라에서 모집"
 ETH_recruit_from_the_african_diaspora_desc:0 "독립 아프리카의 마지막 흔적 중 하나가 사라지는 것을 보고 싶지 않은 전 세계의 많은 아프리카 디아스포라가 기꺼이 무기를 들고 우리와 함께 싸우려 합니다. 함께, 우리는 [ETH.GetName]뿐만 아니라 아프리카 자유라는 이념 자체를 구할 것입니다."
 ETH_anti-italian_propaganda:0 "반이탈리아 선전"
 ETH_anti-italian_propaganda_desc:0 "황제께서 이곳에 안전하게 거주하도록 허락해 준 주재국의 환대에 크게 감사하지만, 그들은 파시스트 점령으로부터 우리 국민의 해방을 가속하기 위해 더 많은 것을 할 수 있습니다. 우리는 그들에게 [ITA.GetAdjective]인들이 [ETH.GetName] 국민에게 자행한 공포를 완전히 인식시키고, 궁극적인 해방 작전을 위해 우리 편으로 결집시켜야 합니다."
 ETH_black_lions_resistance_tt:0 "흑사자단의 적극적인 저항: §R+10%§!"
 ETH_unlock_black_lions_tt:0 "§Y$ETH_strengthen_the_black_lions$§! 연속 중점을 잠금 해제합니다.\n에티오피아 남부의 적 점령지에 저항 목표치 §G+10§!만큼 추가합니다."
 ETH_the_heroes_of_ethiopia:0 "에티오피아의 영웅들"
 ETH_the_heroes_of_ethiopia_desc:1 "수많은 우리 군 지도자들이 스스로 뛰어난 전략가임을 증명했습니다. 적의 압도적인 물량 우세에도 불구하고, 우리 군 지도자들은 적의 진격을 저지했습니다. 우리는 [ETH.GetNameDef]의 계속되는 생존에 기여한 이 영웅들에게 보상해야 합니다."
 ETH_seyoum_mengesha_upgrade_tt:0 "획득: \n§Y$army_regrouping_2$§!"
 ETH_mulugeta_yeggazu_of_illubabor_upgrade_tt:0 "획득: \n§Y$army_chief_morale_3$§!"
 ETH_ras_imru_haile_selassie_upgrade_tt:0 "획득: \n§Y$army_infantry_2$§!"
 ETH_the_heroes_of_ethiopia_tt:0 "\n§Y$ETH_army_1_dynamic_modifier$§! 수정:\n$modifier_army_sub_unit_irregular_infantry_attack_factor$: §G+5%§!\n$modifier_army_sub_unit_irregular_infantry_speed_factor$: §G+5%§!"
 ETH_learning_from_the_enemy:0 "적에게서 배우기"
 ETH_learning_from_the_enemy_desc:0 "우리의 제한적인 산업 역량에도 불구하고, 우리는 [ITA.GetAdjective]의 차량과 장비를 역설계하여 그들의 기술적 우위를 활용하고, 그것들을 원래 주인에게 대항하는 데 사용할 수 있습니다."
 ETH_learning_from_the_enemy_tt:1 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!"
 ETH_learning_from_the_enemy_armor:0 "적에게서 배우기: 기갑 차량"
 ETH_learning_from_the_enemy_air:0 "적에게서 배우기: 항공기"
 ETH_light_tank_tt:0 "§Y$light_tank_chassis_1$§!의 파생형 생성: [ITA.GetFlag] L3/35§!"
 ETH_aircraft_tt:1 "§Y$small_plane_airframe_0$§!의 파생형 생성: [ITA.GetFlag] CR.32§! \n §Y$medium_plane_airframe_0$§!의 파생형 생성: [ITA.GetFlag] Ca.101§!"
 ETH_organize_regional_revolts:0 "지역 반란 조직"
 ETH_organize_regional_revolts_desc:0 "[ITA.GetAdjective]은 아직 우리 조국을 완전히 장악하지 못했습니다. 점령에 대한 저항은 꾸준히 그들의 장비, 인력, 그리고 가장 중요하게는 이 피비린내 나는 식민지 사업을 계속하려는 열의를 고갈시키고 있습니다. 우리는 계속해서 저항군을 지원하고 [ITA.GetAdjective] 점령군을 전복시키기 위한 노력을 조율해야 합니다."
 ETH_organize_regional_revolts_tt:0 "점령지에서 반란군을 조직하는 §Y디시전§!을 잠금 해제합니다."
 ETH_secure_arms:0 "무기 확보"
 ETH_secure_arms_desc:0 "[ETH.GetName]의 빈약한 산업은 군대를 지원할 수 없음이 명백합니다. 우리는 황실 금고의 부를 활용하여 무기를 구매하고 즉시 우리의 영웅적인 전사들에게 전달해야 합니다."
 ETH_secure_arms_tt:0 "황실 금고의 자금을 사용하여 군사 장비를 구매하는 §Y디시전§!을 잠금 해제합니다"
 ETH_volunteers:0 "의용군"
 ETH_volunteers_desc:0 "전 세계의 억압받는 민족들은 압도적인 제국주의 침략에 맞선 투쟁에서 [ETH.GetName]을 희망의 상징으로 바라보고 있습니다. 이제 우리 국경 너머의 사람들이 우리와 함께 싸우기 위해 [ETH.GetAdjective] 깃발 아래 모이기 시작했습니다. [ITA.GetLeader]의 변덕으로 자유의 꿈이 꺼지는 것을 보고 싶어 하지 않는 사람들이 아직 있는 것 같습니다."
 ETH_fait_accompli:0 "기정사실"
 ETH_fait_accompli_desc:0 "많은 이들이 [ETH.GetName]이 식민주의 역사에서 각주에 불과할 것이라 여겼지만, 오히려 압도적인 역경을 극복하고 [ITA.GetAdjective]의 침공을 격퇴했을 뿐만 아니라 동아프리카에서 [ITA.GetName]을 완전히 몰아냈습니다. 이제 남은 일은 [ITA.GetAdjective]이 공식적으로 패배를 인정하는 것뿐입니다."
 ETH_fait_accompli_tt:0 "§Y[ITA.GetNameWithFlag]§!이(가) §Y[ROOT.GetNameWithFlag]§!과(와) 평화 조약을 체결하고, [ROOT.GetNameDef]이(가) 통제하는 모든 아프리카 주를 할양할 것입니다.\n "
 ETH_reclaiming_ethiopia:0 "에티오피아 수복"
 ETH_reclaiming_ethiopia_desc:0 "우리는 [ITA.GetName]의 불법 점령에도 불구하고, 우리를 받아준 국가들이 [ETH.GetLeader]을(를) [ETH.GetName]의 계속되는 정당한 통치자로 공식 인정하도록 점차 설득하고 있습니다. 한 번만 더 밀어붙이면, 우리는 마침내 오랫동안 기다려온 해방 작전에 착수할 수 있을 것입니다."
 ETH_reclaiming_ethiopia_not_exile_tt:0 "\n망명 정부가 아닐 경우 효과:"
 ETH_reclaiming_ethiopia_exile_tt:0 "[ROOT.GetName]이(가) 망명 정부일 경우 효과:"

 ETH_haile_selassie_returns_tt:0 "$ETH_haile_selassie$가 [ETH.GetName](으)로 귀환:"
 ETH_reclaiming_ethiopia_event_tt:0 "§Y[GetEthiopianHostName]§!:"
 ETH_formal_request_unlocked_tt:0 "망명 정부일 경우, 주재국에 참전을 공식 요청하는 §Y결정§!이 잠금 해제됩니다"
 ETH_ethiopia_recognized_tt:0 "[ROOT.GetLeader]이(가) [ROOT.GetNameDef]의 진정한 지도자로 인정받습니다:\n §Y[ROOT.GetName]§!은(는) 동맹을 전쟁에 참전시킬 수 있습니다."
 ETH_the_heir_of_solomon:0 "솔로몬의 후계자"
 ETH_the_heir_of_solomon_desc:0 "[ENG.GetName]이(가) 팔레스타인에 일촉즉발의 긴장을 조성하여 국제 연맹 통치 위임령에 대한 지지가 붕괴되었습니다. 어쩌면 그들은 이 지역의 통치권을 다른 이에게 이양할 수도 있을 것입니다. 그리고 솔로몬의 후계자인 [ETH.GetLeader]보다 이 임무에 더 적합한 이가 누가 있겠습니까."
 ETH_protector_of_the_somalis:0 "소말리인의 보호자"
 ETH_protector_of_the_somalis_desc:0 "[SOM.GetAdjective]인들은 [ITA.GetAdjective]인들의 야만적인 통치를 받을 뿐만 아니라, [ITA.GetLeader]의 영토 확장을 위해 동족과 싸우도록 징집되었습니다. [ITA.GetName]이(가) 이 지역에서 축출되면, 우리는 다른 유럽 열강의 착취로부터 [SOM.GetAdjective]인들을 보호할 것입니다."
 ETH_the_king_of_kings:0 "왕 중의 왕"
 ETH_the_king_of_kings_desc:0 "황제 폐하, [ETH.GetLeader]께서는 우리를 [ITA.GetAdjective]인들의 하인이 되는 굴욕적인 운명에서 구해내셨습니다. 그분은 현대 세계에서 비할 데 없는 지도자이시며, 마땅히 존경받아야 합니다."
 ETH_rebuilding_the_country:0 "국가 재건"
 ETH_rebuilding_the_country_desc:0 "우리 영토에 대한 완전한 권위를 회복했으니, 마침내 [ITA.GetAdjective]인들이 초래한 가옥과 산업의 피해를 복구하기 시작할 수 있습니다."
 ETH_support_anti-colonialist_resistance:0 "반식민주의 저항 지원"
 ETH_support_anti-colonialist_resistance_tt:0 "§Y동아프리카§!의 식민지 주에서 저항을 증대시키는 §Y결정§!을 잠금 해제합니다."
 ETH_support_anti-colonialist_resistance_desc:0 "식민 열강이 동아프리카에 발판을 유지하는 한, 분쟁의 위협은 우리 머리 위를 영원히 맴돌 것입니다. 우리는 대중을 선동하고 그들에게 독립을 되찾을 수단을 제공하여 이 지역에서 그들을 몰아내야 합니다."
 ETH_empower_the_ras:0 "라스 권한 강화"
 ETH_empower_the_ras_desc:0 "교육받지 못한 제국의 농민들에게 더 많은 권한을 부여하는 것은 장기적으로 제국 체제의 파괴로 이어질 뿐입니다. 대신, 우리는 황제에 대한 지속적인 충성을 대가로 라스들에게 권한을 부여할 것입니다."
 ETH_re-convene_the_parliament:0 "의회 재소집"
 ETH_re-convene_the_parliament_desc:0 "이제 1931년 헌법을 복원하고 [ETH.GetName]의 제도를 현대화하는 과정을 계속할 때입니다. 우리는 제국 의회를 재소집하고 제국의 다양한 지역을 더 잘 통치하기 위해 의원 수를 늘릴 것입니다.  "
 ETH_unite_the_afar:0 "아파르족 통합"
 ETH_unite_the_afar_desc:0 "유럽의 관심이 자국 대륙으로 옮겨감에 따라, [DJI.GetName] 지역을 구매하여 수십 년간 분리되었던 아파르족을 재통합함으로써 북부 아파르족의 지지를 얻을 수 있을지도 모릅니다."
 ETH_lord_of_lords:0 "군주 중의 군주"
 ETH_lord_of_lords_desc:0 "우리 제국은 여러 문화로 구성되어 있지만, 모두 같은 군주 중의 군주에게 고개를 숙입니다. 가장 고귀한 군주들조차도 황제에 대한 의무를 알고 있습니다. 폐하께서는 이 땅의 명실상부한 통치자이십니다."
 ETH_elect_of_god:0 "신의 선민"
 ETH_elect_of_god_desc:0 "우리는 황제의 행동에서 신을 봅니다. 전장에서의 성공과 위대한 제국을 다스리는 그의 수완을 달리 어떻게 설명할 수 있겠습니까? 백성들은 황제의 명을 따르는 것이 전능자의 뜻에 따라 행동하는 것임을 알고 있습니다."
 ETH_restore_the_empire_of_axum:0 "악숨 제국 복원"
 ETH_restore_the_empire_of_axum_desc:0 "수단의 땅에서부터 아라비아 반도에 이르기까지, 한때 그 모든 곳이 우리 조상들의 지배하에 있었습니다. 우리의 지배권은 수세기에 걸쳐 조금씩 깎여나가 유럽인들의 변덕에 취약해졌습니다. 이제 흐름을 바꿀 때가 왔습니다. 우리는 악숨 제국을 재건하고 조상의 땅을 되찾아 우리의 유산을 받아들일 것입니다."
 ETH_restore_the_empire_of_axum_tt:0 "충분한 주를 통제할 때 악숨 제국을 형성하는 §Y결정§!을 잠금 해제합니다."
 ETH_a_federal_empire:0 "연방 제국"
 ETH_a_federal_empire_desc:0 "제국 통치 체제는 의회 민주주의의 혼란에 비해 훨씬 더 큰 안정성을 제공합니다. 다양한 지역의 군주들이 폐하 [ETH.GetLeader]께 계속 충성을 맹세하는 한, 그들이 자신의 영지를 어떻게 통치하든 우리는 신경 쓰지 않습니다."
 ETH_a_federal_empire_tt:0 "모든 주에서 §Y$ETH_state_decentralization_dynamic_modifier$§! 수정치를 제거합니다."
 ETH_federal_factories_tt:0 "해방된 각 괴뢰국에 §Y1개의 건설 슬롯§!과 §Y1개의 $industrial_complex$§!을 추가합니다."
 ETH_empower_the_chambers:0 "의회 권한 강화"
 ETH_empower_the_chambers_desc:0 "1931년 헌법은 황제의 역할을 성문화하는 데 충분하지 않았습니다. 또한 정부의 의사 결정 과정에 국민을 적절히 참여시키지도 못했습니다. 우리는 황제의 신성한 역할을 유지하면서도, 대의원에 국정에 대한 더 큰 통제권을 부여하여 권한을 강화해야 합니다."
 ETH_empower_the_chambers_tt:0 "§Y$ETH_corrupt_bureaucracy_dynamic_modifier$§!을 다음과 같이 수정:\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!"
 ETH_the_african_union:0 "아프리카 통일을 향하여"
 ETH_the_african_union_desc:0 "한 민족이 다른 민족을 지배하는 것은 잘못되었기에 우리는 식민주의의 종식을 요구합니다. 우리의 의견이 합당한 무게를 가지려면 모든 아프리카인이 공통된 문제에 대해 협력하여 행동하는 것이 필수적입니다. 따라서 우리는 가장 깊은 신념의 진실성과 확신에 따라 행동하여, 아프리카 대륙 전체의 해방을 위해 싸울 것입니다."
 ETH_african_independence_tt:0 "아프리카 국가들의 저항도를 높이고 자치도 획득을 증진할 수 있는 §Y디시전§!을 잠금 해제합니다."
 ETH_arabian_independence_tt:0 "아라비아 반도 국가들의 저항도를 높이고 자치도 획득을 증진할 수 있는 §Y디시전§!을 잠금 해제합니다."
 ETH_african_independence_join_tt:0 "§Y[ROOT.GetNameDef]§!이(가) 아프리카 독립 전쟁에 개입할 수 있도록 합니다."
 ETH_african_union_faction:0 "아프리카 연합"
 ETH_pan-africanism:0 "범아프리카주의"
 ETH_pan-africanism_desc:0 "우리가 추구하는 평등이라는 목표는 최근 아프리카 역사의 페이지가 길게 이야기하는, 한 민족이 다른 민족을 착취하는 것의 정반대입니다. 이 악은 어떤 모습을 하고 있든 존재하지 않는 곳에서는 피해야 하고, 존재하는 곳에서는 분쇄해야 합니다. 평등의 꿈이 아직 그것을 거부당한 모든 이들에게 마침내 실현되도록 보장하는 것이 우리의 신성한 의무입니다."
 ETH_the_one_true_heir_of_solomon:0 "솔로몬의 유일한 진정한 계승자"
 ETH_the_one_true_heir_of_solomon_desc:0 "황제 폐하, [ETH.GetLeader]께서는 위대한 솔로몬 왕까지 거슬러 올라가는 왕가의 혈통을 가지고 계십니다. 많은 국가가 신에게 등을 돌렸지만, 우리 [ETH.GetAdjective]인들은 굳건한 믿음을 지켜왔습니다. 이 혼돈의 시대에, 인간이 만든 이념의 타락한 영향력으로부터 성지를 보호하기 위해 솔로몬의 유일한 진정한 계승자가 성지를 다스리는 것이 마땅합니다."
 ETH_the_one_true_heir_of_solomon_tt:0 "솔로몬 제국을 형성하는 §Y디시전§!을 잠금 해제합니다."
 ETH_jah:0 "자"
 ETH_jah_desc:0 "라스타파리 운동은 전 세계에 예상치 못한 [ETH.GetName] 지지자들의 연결망을 형성했습니다. 많은 이들이 우리 황제, [ETH.Getleader]에게 큰 종교적 의미를 부여합니다. 일부는 그가 신의 화신, 더 정확히는 자의 화신이라고 주장하기까지 합니다. 아마도 우리는 이 라스타파리 운동을 포용하여 국제적인 지지를 활용해야 할 것입니다."
 ETH_jah_tt:0 "시온 제국을 형성하는 §Y디시전§!을 잠금 해제합니다."
 ETH_military_communism:0 "군사 공산주의"
 ETH_military_communism_desc:0 "우리가 전선에서 거둔 작은 성공은 세습 지도부가 아닌, 평범한 병사들의 독창성과 용기 덕분입니다. 불만의 소리가 점점 더 커지고 있습니다. 제국주의는 끝났습니다. 이제 무력으로 부를 재분배할 때입니다."
 ETH_defending_our_homes:0 "우리의 가정을 지키기 위해"
 ETH_defending_our_homes_desc:0 "[ROOT.Capital.GetCapitalVictoryPointName]의 제국주의 파벌은 오직 자신들의 안전에만 관심이 있습니다. 한편, 파괴된 것은 우리의 집과 가족입니다. 우리는 더 이상 이 상황을 용납할 수 없습니다. 우리는 황제가 아닌 우리 자신을 위해 조국의 모든 땅을 지킬 것입니다."
 ETH_anti_imperialist_agitation:0 "반제국주의 선동"
 ETH_anti_imperialist_agitation_desc:0 "국민들의 [ROOT.GetLeader]에 대한 충성심이 흔들리고 있습니다. 국민을 보호해야 하는 가장 중요한 의무를 다하지 못함으로써, 소위 지도자라는 자들은 자신들의 무능함을 완전히 드러냈습니다. 전선과 거리에서는 한때 상상할 수 없었던 일이 이제 공개적으로 논의되고 있습니다. 황제 없는 국가 말입니다."
 ETH_in_the_name_of_the_people:0 "인민의 이름으로"
 ETH_in_the_name_of_the_people_desc:0 "인민의 이름으로, 우리는 수세기 동안 [ROOT.GetName]을 지배해 온 왕조의 폭정을 해체할 것입니다. 그 자리에 우리는 봉건주의의 속박에서 벗어난 노동자 공화국을 세울 것입니다. 그리고 우리의 집단적인 힘을 통해 아프리카에서 파시즘을 물리칠 것입니다."
 EHT_in_the_name_of_the_people_tt:2 "[ETH.Capital.GetCapitalVictoryPointName]에 공산주의 정예 사단 §Y적위대§! §Y2개§!와 무정부주의 정예 사단 §Y흑사자§! §Y3개§!를 생성합니다. \n\n§R$ETH_seyoum_mengesha$은(는) 더 이상 이용할 수 없게 됩니다!§!"
 ETH_callout_to_the_world:0 "전 세계를 향한 외침"
 ETH_callout_to_the_world_desc:0 "파시즘에 맞선 우리의 투쟁은 우리 나라에만 국한된 것이 아니라, 권위주의에 맞선 더 넓은 세계적인 싸움의 일부입니다. 우리는 전 세계의 반파시즘 세력을 우리 대의에 규합할 것입니다. 오늘 잔혹하게 짓밟히는 것은 우리지만, 내일은 전 세계가 될 것이기 때문입니다."
 ETH_callout_to_the_world_tt:0 "§Y$ENG_sylvia_pankhurst$§! 및 §Y$IA_emma_goldman$§!을(를) 고문으로 영입할 수 있게 됩니다."
 ETH_soviet_aid:0 "소비에트의 지원"
 ETH_soviet_aid_desc:0 "우리는 성공적으로 봉건적 충성의 족쇄를 벗어던졌습니다. 이제 우리는 파시스트를 물리치고 노동자 공화국 건설을 시작해야 합니다. 우리의 대의에 공감할 이가 있다면, 그들은 분명 [SOV.Getname]의 인민일 것입니다."
 ETH_soviet_aid_tt:0 "§R\n[SOV.GetNameDefCap]은(는) 지원의 대가로 우리 내정에 대한 더 큰 통제권을 요구할 것입니다! §!"
 ETH_humanitarian_aid:0 "인도주의적 지원"
 ETH_humanitarian_aid_desc:0 "적은 우리 인민에게 얼마나 큰 고통을 안겨주는지 신경 쓰지 않습니다. 이 상황이 계속된다면, 지켜야 할 나라조차 남지 않을 것입니다. 전 세계는 이곳에서 벌어지는 참상을 보아야 하며, 즉각적인 인도주의적 지원을 보내야 합니다."
 ETH_humanitarian_aid_tt:0 "§Y$ETH_international_red_cross_dynamic_modifier$§!을(를) 다음과 같이 변경:\n$MODIFIER_INDUSTRY_REPAIR_FACTOR$: §G+10%§!"
 ETH_support_from_the_japanese_communists:0 "일본 아나코 공산주의"
 ETH_support_from_the_japanese_communists_desc:0 "[JAP.GetAdjective]과 [ETH.GetAdjective] 인민은 유럽의 식민화에 성공적으로 저항한 몇 안 되는 국가로서 오랫동안 서로를 존중해왔습니다. [ETH.GetNameDef]이(가) 봉건 시대를 벗어남에 따라, [JAP.GetNameDef]에도 우리의 이상을 공유하고 모범적인 아나코 공산주의 사회를 만드는 데 도움을 줄 수 있는 이들이 있습니다."
 ETH_support_from_the_japanese_communists_tt:0 "§Y$IA_sakutaro_iwasa$§! 및 §Y$IA_sanshiro_ishikawa$§!을(를) 고문으로 영입할 수 있게 됩니다."
 ETH_support_from_the_japanese_communists_fascist_tt:0 "§R[JAP.GetFlag][JAP.GetName]이(가) [ETH.GetFlag][ETH.GetName]에 대한 무역 금수 조치를 내릴 수 있습니다!§!"
 ETH_raise_from_the_ranks:0 "현장 발탁"
 ETH_raise_from_the_ranks_desc:0 "더는 귀족이 군의 지휘권을 갖지 않을 것입니다. 우리의 많은 용감한 병사들이 유능한 지도자임을 증명했습니다. 이제 왕조적 연줄이나 개인의 부 대신, 전장에서의 용기와 기술에 보상할 때입니다."
 ETH_raise_from_the_ranks_tt:1 "§Y장군§! 계급의 신임 장교 §Y두 명§!을 추가합니다."
 ETH_soviet_rifles:0 "소비에트 소총"
 ETH_soviet_rifles_desc:0 "[ITA.GetName]이(가) 우리를 공격했을 때, 우리의 준비는 처참할 정도로 미흡했습니다. 이제 우리 산업은 현대전의 군수 요구를 감당할 수 없습니다. 총을 들 수 있는 모든 이의 손에 소총과 탄약을 쥐여줘야 합니다. 아마 [SOV.Capital.GetCapitalVictoryPointName]의 동지들이 도울 수 있을 것입니다. "
 ETH_soviet_rifles_tt:1 "\n[SOV.GetFlag]§Y[SOV.GetName]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetName]§!은(는) §G10,000§!개의 보병 장비를 받게 됩니다."
 ETH_military_advisors:0 "소비에트 장군들"
 ETH_military_advisors_desc:0 "많은 장교들이 현대전의 요구에 적응했지만, 대부분 최선을 다해 임기응변으로 대처하고 있음이 분명합니다. 우리는 [SOV.GetAdjective]군의 동지들로부터 많은 것을 배울 수 있을 것입니다."
 ETH_military_advisors_tt:1 "\n[SOV.GetFlag]§Y[SOV.GetName]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetName]§!은(는) 원수(§Y$SOV_semyon_budyonny$§!) 한 명과 장군(§Y$SOV_vasily_kuznetsov$§!) 한 명을 얻게 됩니다."
 ETH_international_brigades_communist:0 "국제 여단"
 ETH_soviet_rejection_tt:0 "\n[SOV.GetFlag]§Y[SOV.GetNameDefCap]§!이(가) §R더는 공산주의가 아니거나 내전 중이라면 이 제안을 거부할 가능성이 높습니다!§!"
 ETH_international_brigades_communist_desc:0 "전 세계에는 [ITA.GetAdjective]에 맞선 우리의 투쟁에 공감하는 이들이 많습니다. 우리는 그들의 동정심을 활용하여 우리와 함께 파시즘에 맞서 무기를 들 기회를 제공해야 합니다."
 ETH_peoples_army:0 "인민군"
 ETH_peoples_army_desc:0 "현대전 수행에서 초기의 약점에도 불구하고, 우리는 비정규 전술을 사용하여 [ITA.GetAdjective]의 침공을 늦추는 데 성공했습니다. 우리는 이를 군사 교리에 명시하고 장교들에게 비대칭전을 수행하는 방법을 훈련시킬 수 있습니다."
 ETH_the_new_administration:0 "새로운 행정부"
 ETH_the_new_administration_desc:0 "최근의 혼란 속에서, 많은 이들이 조국을 지키기 위해 상상 이상의 노력을 했습니다. 세네두 게브루와 같은 일부는 사회를 극적으로 개선할 기술과 지식도 갖추고 있습니다. 이제, 우리는 그들에게 그렇게 할 기회를 주어야 합니다."
 ETH_the_new_administration_tt:0 "§Y세네두 게브루§!를 정치 고문으로 영입할 수 있게 됩니다.\n   $rebellious_educator_tt$ \n또한 §Y무작위§! 인물 두 명이 정치 고문으로 영입 가능해집니다."
 ETH_clearing_the_skies:0 "제공권 확보"
 ETH_clearing_the_skies_desc:0 "우리 병사들은 자신을 보호할 방법 없이 적 항공기에 완전히 노출되어 있습니다. 설상가상으로, 적은 항상 우리의 배치 위치와 움직임을 알고 있습니다. 승리의 희망을 가지려면 우리 자신의 공군과 대응책이 필요합니다. 따라서, 우리는 [SOV.GetAdjective] 공군과 함께 훈련할 지원자를 보내야 합니다."
 ETH_clearing_the_skies_tt:1 "\n[SOV.GetFlag]§Y[SOV.GetName]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetName]§!은(는) [SOV.GetAdjective] 전투기 §G100§!기와 §Y초기형 전투기§! 기술을 획득합니다."
 ETH_counter_the_armored_threat:0 "기갑 위협에 대응"
 ETH_counter_the_armored_threat_desc:0 "기갑전은 전장에서 기병의 역할을 명백히 대체하고 있습니다. 불행히도, 우리는 [ITA.GetAdjective] 기갑에 적절히 대응할 방법이 없으며, 우리 산업은 아직 기갑을 생산할 능력이 되지 않습니다. 어쩌면 [SOV.GetName]이(가) 구형 기갑 차량 일부를 기꺼이 넘겨줄지도 모릅니다."
 ETH_counter_the_armored_threat_LaR_tt:1 "\n[SOV.GetFlag]§Y[SOV.GetName]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetName]§!은(는) §Y전간기 장갑차§! 기술과 [SOV.GetAdjective] 장갑차 §G480§!대를 획득합니다."
 ETH_counter_the_armored_threat_NoLaR_tt:1 "\n[SOV.GetFlag]§Y[SOV.GetName]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetName]§!은(는) §Y전간기 전차§! 기술과 [SOV.GetAdjective] 전차 §G200§!대를 획득합니다."
 ETH_counter_the_armored_threat_NoNSB_tt:1 "\n[SOV.GetFlag]§Y[SOV.GetName]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetName]§!은(는) §Y대전차§! 기술과 [SOV.GetAdjective] 전차 §G200§!대를 획득합니다."
 ETH_peace_negotiations:0 "평화 협상"
 ETH_peace_negotiations_desc:0 "우리 국민은 [ITA.GetAdjective]의 침공을 저지하기 위해 막대한 희생을 치렀습니다. 이제 우리가 [ITA.GetAdjective]인들 앞에서 무너지지 않을 것임을 증명했으니, 평화를 이룰 기회가 생겼습니다. 아니면 적어도, 정전 협정이라도 맺을 수 있습니다."
 ETH_soviet_mediation:0 "소비에트의 중재"
 ETH_soviet_mediation_desc:0 "[ITA.GetAdjective]의 침공을 저지하려는 우리 국민의 영웅적인 노력에도 불구하고, 우리는 그들을 상대로 완전한 승리를 거두기에는 아직 역부족입니다. 국제 연맹은 우리를 도울 의사가 없음을 보여주었으므로, 우리의 유일한 희망은 [SOV.GetNameDefCap]입니다."
 ETH_soviet_mediation_tt:0 "§R\n[SOV.GetNameDefCap]이(가) [ITA.GetName]과(와)의 협상을 대가로 우리를 통제하려 시도할 수 있습니다! §!"
 ETH_support_spain:0 "스페인 지원"
 ETH_support_spain_desc:0 "스페인은 자국 내 파시스트들의 손에 고통받고 있습니다. 하지만 우리처럼 파시즘에 단호히 저항해야 하며, 인민이 스스로를 다스릴 수 있다고 믿는 이들이 있습니다. 우리는 [ITA.GetAdjective]과의 전쟁에서 얻은 교훈을 활용하여 [SPC.GetAdjective] 저항군을 도울 것입니다."
 ETH_local_committees:0 "지역 위원회"
 ETH_local_committees_desc:0 "우리는 필연적으로 부패를 낳고 인민의 의지를 억압하는 무의미한 계층 구조에서 벗어난 새로운 정부 체제를 만들 기회가 있습니다. 이 기회를 활용하여 각 코뮌이 아나코-코뮤니즘 원칙을 따르는 코뮌 연방을 형성해야 합니다."
 ETH_a_guiding_hand:0 "인도하는 손길"
 ETH_a_guiding_hand_desc:0 "상위 권위가 없는 느슨한 코뮌 연합은 너무 이상적입니다. 우리에겐 경제 정책을 이끌고 비상사태에 신속하게 대응할 대표와 전문가로 구성된 내각이 필요합니다. 위기 상황에서 제국 행정부의 실패를 결코 반복해서는 안 됩니다."
 ETH_transformation_of_nature:0 "자연의 변혁"
 ETH_transformation_of_nature_desc:0 "[ETH.GetNameDefCap]은(는) 개발을 기다리는 풍부한 천연자원을 보유하고 있습니다. 강에 수력 발전 댐을 건설하여 이 땅의 모든 가정에 전기를 공급할 수 있습니다. 동시에, 수로를 이용하여 증가하는 인구를 부양하기 위한 농업 생산력을 확장할 수 있습니다."
 ETH_transformation_of_nature_tt:0 "(§Y무작위로 선택된 소유 주 4개§!): 건설 슬롯 §G1§!개 추가"
 ETH_laying_the_tracks:0 "선로 부설"
 ETH_laying_the_tracks_desc:0 "우리나라의 인구와 산업 대부분은 서부에 집중되어 있습니다. 따라서 풍부한 천연자원을 더 잘 활용하기 위해서는, 자원을 공장으로 옮길 철도망의 대대적인 확장이 필요합니다."
 ETH_red_army_engineers:0 "적군 공병"
 ETH_red_army_engineers_desc:0 "우리 국가의 기반 시설 대부분이 [ITA.GetAdjective] 침공 중에 심하게 파괴되었습니다. 진정한 노동자 공화국을 건설하려면, 기존 시설을 복구하는 것뿐만 아니라 급속한 산업화 프로그램을 시작해야 합니다. 우리는 적군에 있는 동지들의 기술을 활용하여 이 과정을 시작해야 합니다."
 ETH_liberate_aussa:0 "아파르에 혁명을"
 ETH_liberate_aussa_desc:0 "[AFA.GetNameDefCap]은(는) 여러 차례 우리 적의 편을 든 배신적인 과두 정권이 통치하고 있습니다. [ETH.GetNameDef]에 대한 이러한 위협은 더 이상 무시할 수 없습니다. 우리는 [AFA.GetAdjective] 인민을 해방하고 그 지역을 우리 노동자 공화국에 통합할 것입니다."
 ETH_demand_DJI:0 "[268.GetName] 해방"
 ETH_demand_DJI_desc:0 "[AFA.GetName]의 해방으로, 우리는 이제 상당수의 아파르족을 통치하게 되었습니다. 그러나 아파르족은 [FRA.GetAdjective]의 [DJI.GetName] 점령으로 인해 여전히 분열되어 있습니다. 제국주의 통치로부터 아파르족의 해방을 요구함으로써, 우리는 아파르족의 충성을 얻고 그 과정에서 전략적 항구를 얻을 수 있을 것입니다."
 ETH_the_rif:0 "리프"
 ETH_the_rif_desc:0 "현재 스페인에서 권력을 다투는 많은 파시스트들은 과거 북부 모로코의 리프 공화국을 진압했던 군인들이었습니다. 우리는 [SPC.GetName]과의 긴밀한 관계를 이용하여 그들의 아프리카 소유지에 대한 탈식민지화를 추진해야 합니다. 그들이 진정한 우리의 동지라면, 분명히 동의할 것입니다. 그리고 그렇지 않다면, 우리는 이미 식민주의에 대처하는 방법을 알고 있습니다."
 #ETH_social_reforms: "Social Reforms"
 #ETH_social_reforms_desc: "Without the threat of a common enemy to unite us, we often find ourselves divided due to historic, cultural and religious grievances. We need a wave of social reforms to overcome these divisions so that we can remain united and continue the process of building a better [ETH.GetName]."
 #ETH_social_reforms_tt: "Unlock anarcho-communist social reform decisions."
 ETH_communal_education:0 "공동체 교육"
 ETH_communal_education_desc:0 "[ETH.GetNameDef]의 모든 공동체가 학교와 도서관을 통해 교육을 받을 수 있도록 보장하는 것은 인구의 생활 수준을 향상시키기 위해 필수적입니다."
 ETH_african_wildfire:0 "아프리카의 들불"
 ETH_african_wildfire_desc:0 "우리는 [ITA.GetAdjective]의 침공을 성공적으로 극복했지만, 모든 아프리카가 식민주의의 공포에서 해방될 때까지 쉬어서는 안 됩니다. 우리는 우리의 기술과 자원을 사용하여 대륙 전역에 저항의 불길을 부채질하고 제국주의자들이 철수하도록 강요해야 합니다."
 ETH_flames_across_the_sea:0 "바다 건너의 불길"
 ETH_flames_across_the_sea_desc:0 "유럽의 패권 아래 고통받은 것은 아프리카뿐만이 아닙니다. 홍해 건너편의 우리 이웃들은 제국주의자들의 요구로부터 실질적인 독립을 거의 이루지 못했습니다. 우리는 저항의 불길을 아라비아 반도로 퍼뜨려 그곳의 인민들이 언젠가 완전히 스스로를 통치할 기회를 가질 수 있도록 해야 합니다."
 ETH_heavy_industry:0 "중공업"
 ETH_heavy_industry_desc:0 "봉건 경제의 손아귀에서 벗어나려면 신속한 산업화 과정을 계속해야 합니다. 중공업의 창설은 노동자들을 도시로 끌어들여 기존의 소작농을 대신할 모범적인 프롤레타리아 계급을 창출할 것입니다."
 ETH_arms_production:0 "무기 생산"
 ETH_arms_production_desc:0 "산업화의 정점은 우리 자신의 무기 산업을 창설하는 것입니다. 다시는 방어 장비를 다른 국가에 의존하지 않을 것입니다."
 ETH_mytishchi-ababa_plant:0 "미티시-아바바 공장"
 ETH_mytishchi-ababa_plant_desc:0 "우리는 소비에트 연방과의 긴밀한 관계를 이용하여 국내 및 군사 기계 제조 전문 지식을 습득해야 합니다. 공동 공장 프로젝트는 그러한 지식을 얻기 위한 완벽한 수단이 될 것이며, 미티시 기계 제작소보다 더 나은 파트너는 없을 것입니다."
 ETH_send_home_advisors:0 "고문단 본국 송환"
 ETH_send_home_advisors_desc:0 "[ITA.GetName]과의 전쟁 중 [SOV.GetName]의 지원으로 이익을 얻었지만, 그들이 우리를 그들에게 그토록 종속적인 역할로 강요할 줄은 결코 예상하지 못했습니다. 우리 자신의 산업 및 군사 역량을 구축함에 따라, 우리는 점점 더 [SOV.GetAdjective]의 요구에 저항할 힘을 갖게 되었습니다. 따라서 이제 [ETH.Capital.GetCapitalVictoryPointName]에서 누가 책임자인지 명확히 할 때입니다."
 ETH_send_home_advisors_tt:0 "모든 [SOV.GetAdjective] 군사 고문을 [SOV.GetNameDef](으)로 돌려보냅니다."
 ETH_soviet-ethiopian_trade_agreement:0 "소비에트-에티오피아 무역 협정"
 ETH_soviet-ethiopian_trade_agreement_desc:0 "전 세계의 많은 국가들이 우리 노동자 공화국에 대한 이념적 반대로 인해 우리와의 교역을 꺼립니다. 그러나 우리는 [SOV.GetAdjective]과 상호 이익이 되는 무역 협정을 체결할 기회가 있으며, 이를 통해 일반적인 무역 장벽 없이 자원과 상품을 교환할 수 있습니다."
 ETH_seek_new_trading_partners:0 "새로운 무역 파트너 물색"
 ETH_seek_new_trading_partners_desc:0 "전 세계 사람들이 우리나라가 제공하는 부를 탐내지만, 우리는 [SOV.GetAdjective]과 독점적으로 교역하는 데 갇혀 있습니다. 우리는 다른 국가들에 손을 뻗어 우리가 단순히 [SOV.GetName]의 연장선이 아님을 보여주고, [ETH.GetAdjective] 인민에게 부를 다시 가져오기 시작해야 합니다."
 ETH_freedom_at_gunpoint:0 "총구 앞의 자유"
 ETH_freedom_at_gunpoint_desc:1 "우리는 우리 인민을 복속시키려는 [ITA.GetAdjective]의 시도를 지금까지 여러 번 격퇴했습니다. 그러나 우리 이웃들은 식민주의자들에게 저항하는 데 그만큼 운이 좋지 않았습니다. 이제 우리의 전쟁 경험과 새로 찾은 경제력을 아프리카 해방을 위해 돌릴 때입니다. 식민 열강이 이해하는 유일한 언어, 바로 무력을 사용해서 말입니다."
 ETH_freedom_at_gunpoint_tt:1 "아프리카 국가들을 해방시키기 위한 §Y총구 앞의 자유§! 디시전을 잠금 해제합니다."
 ETH_boots_on_the_shore:0 "해안의 군화"
 ETH_boots_on_the_shore_desc:0 "우리는 아라비아 반도의 민족들과 오랜 무역 및 문화 교류의 역사를 가지고 있습니다. 불행히도, 그들은 여전히 봉건적인 정부 체제에 갇혀 있습니다. 만약 우리가 반도의 인민을 해방시킨다면, 홍해를 따라 이어지는 중요한 무역로를 통제하고 중동 깊숙이 우리의 영향력을 투사할 수 있을 것입니다."
 ETH_request_soviet_hulls:0 "소비에트 전함 선체 요청"
 ETH_request_soviet_hulls_desc:1 "미래의 분쟁에서 봉쇄당하는 것을 피하고 싶다면, 우리 자신의 함선을 제조하는 법을 배워야 합니다. [SOV.GetNameDefCap]은 최근 일부 전함 프로젝트를 폐기했으며, 우리가 미완성 선체를 구매하는 것에 긍정적일 수 있습니다. 그러한 구매를 통해 우리는 많은 것을 배울 수 있을 것입니다."
 ETH_organization_of_african_unity:0 "아프리카 통일 기구"
 ETH_organization_of_african_unity_desc:0 "지금까지 유럽의 식민 지배로부터의 자유는 단순히 독립을 쟁취하는 문제로 여겨졌습니다. 하지만 아프리카 외부의 많은 지도자들 눈에는 우리 모두가 여전히 정복의 잠재적 목표물로 보이는 듯합니다. 아프리카인들이 다시 한번 피지배민으로 전락하는 것에 저항하려면 함께 단결하고 협력해야만 합니다."
 ETH_organization_of_african_unity_tt:0 "독립 아프리카 국가들을 §Y아프리카 통일 기구§!로 초대하는 디시전 잠금 해제"
 ETH_pan-africanism_liberate_tt:0 "아프리카의 모든 식민 열강에 대한 §Y해방 전쟁 목표§! 획득:"
 ETH_executive_council:0 "집행 위원회"
 ETH_executive_council_desc:0 "우리는 인민의 의지에 따라 행동하고 우리 지역의 안정에 대한 위협에 신속하게 대응할 수 있는 집행 기관을 창설하여 아프리카 통일 기구에서 더 큰 협력을 추진해야 합니다."
 ETH_executive_council_tt:0 "§Y아프리카 통일 기구§! 회원국을 집행 위원회로 초대하는 디시전 잠금 해제"
 ETH_african_union:0 "아프리카 연합"
 ETH_african_union_desc:0 "이제 아프리카인들이 아프리카 연합으로 단결할 때가 왔습니다. 아프리카 최초의 초강대국이 되기 위해 노력하는 동안 다시는 제국주의자나 파시스트에게 위협받지 않을 것입니다. "
 ETH_african_union_tt:0 "§Y집행 위원회§! 회원국을 §Y아프리카 연합§!으로 통합하는 디시전 잠금 해제"
 ETH_african_central_bank:1 "[ETH_GetCentralBankName]"
 ETH_african_central_bank_desc:1 "[ETH_GetCentralBankName] 창설로 아프리카 통일 기구 내 경제 통합 과정을 시작할 수 있습니다. 이를 통해 모든 회원국의 발전을 위해 우리의 자원과 기반 시설을 더 효율적으로 활용할 수 있게 될 것입니다."
 ETH_african_central_bank_tt:1 "§Y아프리카 통일 기구§! 회원국을 [ETH_GetCentralBankName]에 초대하는 디시전 잠금 해제"
 ETH_african_central_bank_2_tt:0 "$MODIFIER_STABILITY_FACTOR$: §R-5%§! \n$modifier_production_speed_industrial_complex_factor$: §R-10%§! \n$modifier_production_speed_infrastructure_factor$: §R-10%§!"
 ETH_mass_transit:0 "집단화된 대중교통"
 ETH_mass_transit_desc:0 "우리의 수송 기반 시설 대부분은 구식이며 더 효율적으로 활용될 수 있도록 재조직이 필요합니다. 그러한 개혁을 실행하는 데 가장 적합한 사람들은 바로 그 기반 시설을 운영하는 노동자들입니다."
 ETH_mutual_defense:0 "상호 방위 "
 ETH_mutual_defense_desc:0 "아프리카인들은 세계 각국이 우리를 식민화하려는 시도의 대가가 너무 크다는 것을 깨달을 때까지 결코 지속적인 평화를 누릴 수 없을 것입니다. 이를 달성하기 위해 아프리카 통일 기구 회원국들은 우리 중 누구라도 공격받을 경우 서로를 보호하겠다고 약속하는 상호 방위 협정을 체결해야 합니다."
 ETH_mutual_defense_tt:0 "§Y아프리카 통일 기구§! 회원국을 상호 방위 협정으로 초대하는 디시전 잠금 해제"
 ETH_our_own_path:0 "우리만의 길"
 ETH_our_own_path_desc:0 "우리의 내정을 장악하며 우리를 배신한 [SOV.GetAdjective]에 저항하기에는 우리가 너무 약했습니다. 이제 우리는 훨씬 더 강력한 위치에 있으며 마침내 독립을 되찾기 위한 조치를 취할 수 있습니다. 하지만 [SOV.GetAdjective]의 잠재적인 보복에 대비해야 합니다."
 ETH_our_own_path_tt:0 "§R이 행동 방침은 [SOV.GetNameDefCap]을(를) 격분시켜 에티오피아를 다시 [SOV.GetAdjective]의 통제하에 두려 할 수 있습니다!§!"
 ETH_communal_agriculture:0 "공동 농업"
 ETH_communal_agriculture_desc:0 "농업을 집단화하고 새로운 농법을 도입함으로써, 우리는 농업 생산량을 대폭 늘리고 모든 사람의 식량 접근성을 보장할 수 있습니다. 이는 또한 해방된 농민들이 자급자족 농업 대신 도시에서 다른 일자리를 찾을 수 있게 해줄 것입니다."
 ETH_communal_agriculture_industry_tt:0 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!"
 ETH_communal_agriculture_consumer_tt:1 "§Y$ETH_industrialization_dynamic_modifier$§! 수정:\n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-5%§!"
 ETH_seize_the_means:0 "생산 수단 장악"
 ETH_seize_the_means_desc:0 "여러 세대에 걸친 [ETH.GetAdjective] 노동자들이 밭을 갈고 도시의 산업을 건설했습니다. 그들의 피가 이 땅에 스며 있습니다. 따라서 우리는 더 이상 부유한 파벌이 그 자산의 소유권을 주장하는 것을 허용하지 않을 것입니다. 그것들은 인민에게 다시 돌아갈 것입니다."
 ETH_preparing_for_the_inevitable:0 "불가피한 사태에 대비"
 ETH_preparing_for_the_inevitable_desc:0 "전 세계의 권력자들은 자국민이 같은 것을 요구할 것을 두려워하여 [ETH.GetNameDef]에서의 우리의 급진적 개혁을 용납하지 않을 것입니다. 우리는 우리의 삶의 방식을 파괴하려는 그들의 불가피한 시도에 대비해야 합니다."
 ETH_refuge_for_the_spanish_exiles:0 "스페인 망명자들의 피난처"
 ETH_refuge_for_the_spanish_exiles_desc:0 "스페인의 이념적 동지들은 전 세계 파시스트, 스탈린주의자, 자본가들의 연합된 노력으로 아나키즘의 꿈이 짓밟히는 것을 목도했습니다. 우리는 실향민이 된 친구들에게 국경을 개방하고 더 나은 미래를 건설할 두 번째 기회를 제공해야 합니다."

 ETH_the_lion_and_the_sun:0 "사자와 태양"
 ETH_the_lion_and_the_sun_desc:0 "폐하 [ETH.GetLeader]와 일본 천황 [JAP.GetLeader]는 우리 위대한 두 제국 사이에서 많은 공통점을 찾아냈습니다. [JAP.GetLeader]는 우리가 마침내 조국을 되찾을 때 그의 정부가 [ETH.GetName]에 투자할 것을 제안하기까지 했습니다."
 ETH_japanese_investments_tt:0 "[ROOT.GetName]이 해방되면 [ROOT.GetName]에 대한 일본의 투자를 위한 §Y결정§!이 잠금 해제됩니다"
 ETH_an_ethiopian_navy_in_exile:0 "망명 에티오피아 해군"
 ETH_an_ethiopian_navy_in_exile_desc:0 "[JAP.GetAdjective] 해군의 위력을 목격한 후, 폐하 [ETH.GetLeader]는 우리 조국의 해방을 돕고 미래의 모든 공격으로부터 조국을 보호하기 위해 [ETH.GetAdjective] 해군을 건설하고자 우리의 자비로운 주최국에 지원을 요청했습니다."
 ETH_an_arabic_base:0 "아라비아 기지"
 ETH_an_arabic_base_desc:0 "[JAP.GetName]이 향후 몇 년 안에 아시아-태평양 지역을 재편하려 한다는 것이 점점 더 분명해지고 있습니다. [JAP.GetAdjective]와 점점 더 보조를 맞추게 된 이상, 우리 몫을 챙기는 것이 타당합니다. 우선, 우리는 아라비아 반도에 있는 우리 조상들의 땅에 대한 통제권을 요청해야 합니다."
 ETH_uk_arabia_tt:0 "모든 §Y아라비아§! 주는 §Y[ENG.GetNameWithFlag]§! 또는 §Y[ENG.GetNameDef]§!의 §Y동맹§!이 소유합니다."
 ETH_an_empire_in_the_shade_of_the_sun:0 "태양의 그늘 아래 제국"
 ETH_an_empire_in_the_shade_of_the_sun_desc:0 "폐하 [ETH.GetLeader]는 제국 없는 황제입니다. 이는 우리 황제에게 굴욕적일 뿐만 아니라, [ETH.GetName] 해방을 위한 준비를 할 수 있는 우리의 능력 또한 제한합니다. 아마도 [JAP.Capital.GetCapitalVictoryPointName]의 우리 친구들이 우리에게 섬의 통제권을 기꺼이 넘겨주어, 우리가 그 섬을 조국의 최종 해방을 위한 작전 기지로 사용할 수 있도록 해줄 것입니다."
 ETH_japan_has_island_tt:0 "일본이 최소 하나 이상의 비핵심 섬 주를 통제합니다."
 ETH_japan_joins_tt:0 "§Y[JAP.GetNameDefCap]§!이(가) [ITA.GetName]에 대한 §Y[ROOT.GetName]§!의 전쟁에 참전할 것입니다.\n§Y[ROOT.GetName]§!이(가) §Y[JAP.GetName]§!의 괴뢰국이 될 것입니다."

 ETH_an_audience_with_countryleadertitle:0 "[GetGermanCountryLeaderTitle] 알현"
 ETH_an_audience_with_countryleadertitle_desc:0 "[GER.GetLeader]는 [GER.GetNameDef]뿐만 아니라 전 세계를 재편하려는 야심 찬 계획을 가지고 있습니다. [GER.GetAdjective] 지도자를 알현함으로써, 세계는 계속해서 폐하 [ETH.GetLeader]를 [ETH.GetName]의 유일한 진정한 통치자로 보게 될 것입니다."
 GER_fascism_leader_title:0 "총통"
 GER_male_kaiser_title:0 "카이저"
 GER_female_kaiser_title:0 "카이저린"
 GER_chancellor_title:0 "총리"
 GER_generalfeldmarshall_title:0 "원수"

 ETH_befriend_goring:0 "괴링과 친선 관계 맺기"
 ETH_befriend_goring_desc:0 "독일 정부는 정치적 음모와 배신이 얽힌 거미줄과 같습니다. 어느 순간이든 [GER.GetLeader]의 신임을 얻는 자는 [GER.GetAdjective]의 정책 결정에 막대한 영향을 미칠 잠재력을 갖게 됩니다. 아마도 우리는 $GER_hermann_goring$과 같은 지배 엘리트의 일원과 친분을 쌓아 영향력을 얻을 수 있을 것입니다."
 ETH_steel_lions:0 "강철 사자"
 ETH_steel_lions_desc:0 "[GER.GetNameDefCap]은(는) 새로운 전쟁 수행 방식을 개척하고 있습니다. 기병대나 참호전의 시대는 끝났습니다. 미래는 전차의 것입니다. 우리는 [GER.GetNameDef]에 있는 동안 현대전 무기 활용법을 배우고 조국 해방을 준비해야 합니다."
 ETH_armor_officers_tt:0 "최대 두 명의 [ROOT.GetAdjective] 장교가 §Y$armor_officer$§! 특성을 획득합니다"
 ETH_german_mediation:0 "[GER.GetAdjective]의 중재"
 ETH_german_mediation_desc:0 "[GER.GetAdjective]과 [ITA.GetAdjective]의 야망이 일치하기 시작하면서, [ETH.GetName] 문제는 양국 간 협력 증대에 걸림돌로 남아 있습니다. 아마도 [GER.GetLeader]는 [ITA.GetLeader]를 설득하여 그의 무의미한 점령을 끝내고 황제가 [ETH.GetName]의 정당한 자리로 돌아올 수 있도록 할 수 있을 것입니다."
 ETH_ger_and_ita_have_same_dieology_tt:0 "[GER.GetFlag]§Y[GER.GetName]§!은(는) [ITA.GetFlag]§Y[ITA.GetName]§!와(과) 동일한 이념을 가졌습니다."
 ETH_sabotage_italo-german_relations:0 "이탈리아-독일 관계 방해 공작"
 ETH_sabotage_italo-german_relations_desc:0 "우리는 [GER.GetNameDef]와(과) [ITA.GetName]이(가) 서로를 잠재적 동맹국으로 여기도록 놔둘 수 없습니다. 우리는 양국 간의 관계를 방해하기 위해 모든 힘을 다해야 합니다. 그렇지 않으면, 폐하께서 [ITA.GetLeader]의 포로가 되고 자유로운 [ETH.GetName]의 꿈이 파괴되는 것을 보게 될지도 모릅니다."
 ETH_unlock_false_flag_tt:1 "[ITA.GetFlag] §Y[ITA.GetName]§!에게 누명을 씌우기 위한 위장 작전을 개시하는 디시전을 잠금 해제합니다!"

 ETH_joint_swedish-ethiopian_intelligence_program:0 "스웨덴-에티오피아 합동 정보 프로그램"
 ETH_joint_swedish-ethiopian_intelligence_program_desc:0 "[ETH.GetName]에 대한 직접적인 원조는 [SWE.GetName]의 중립성에 의문을 제기할 것입니다. 그러나, 그들은 그럴듯한 부인을 유지하기 위해 비밀 지원을 기꺼이 제공할 수도 있습니다. 이 지역의 인맥과 [SWE.GetName]의 자원을 활용하여, 아프리카에서 [ITA.GetAdjective]의 식민 통치를 조금씩 약화시킬 수 있습니다."
 ETH_anti-tank_guns:0 "대전차포"
 ETH_anti-tank_guns_desc:0 "[SWE.GetName]은(는) 세계 최고의 병기창 중 일부를 보유하고 있습니다. 비록 외교적으로는 중립이지만, [SWE.GetAdjective]은(는) 커져가는 파시스트 세력권을 억제할 수 있다면 대전차포 일부를 기꺼이 내어줄 수도 있습니다."
 ETH_a_libyan_revolt:0 "리비아 반란"
 ETH_a_libyan_revolt_desc:0 "[ITA.GetAdjective]은(는) 동아프리카에서 최근 획득한 영토의 통제권을 유지하는 데 어려움을 겪고 있습니다. 그들의 관심이 다른 곳으로 쏠린 틈을 타, 우리는 그들의 소중한 [LBA.GetAdjective] 영토에 반란의 씨앗을 뿌리기 위해 최선을 다할 것입니다."
 ETH_ethiopias_cause_is_ours:0 "에티오피아의 대의는 우리의 것"
 ETH_ethiopias_cause_is_ours_desc:0 "[SWE.GetAdjective] 정부는 아프리카에서의 파시스트 성공이 유럽에도 영향을 미칠 것이라는 점을 인식하기 시작하면서 중립에서 벗어나고 있습니다. 민족 자결과 국제법 존중이라는 우리의 목표는 일치하므로, 외교 정책에서 협력을 계속 심화하는 것이 타당합니다."
 ETH_SWE_join_war_tt:0 "만약 주요 국가들이 §Y[ITA.GetFlag][ITA.GetName]§!와(과) 전쟁 중이고 §Y[SWE.GetFlag][SWE.GetName]§!이(가) 상호 세력 가입 신청에 동의하면, 그들은 세력에 가입하여 전쟁에 참전하려고 시도할 것입니다.\n §R가입할 세력이 없다면, [SWE.GetFlag][SWE.GetName]은(는) [ITA.GetFlag][ITA.GetName]!§!에 맞서 단독으로 전쟁을 벌이지 않을 것입니다!"

 ETH_reach_out_to_the_italians:0 "이탈리아에 손을 내밀다"
 ETH_reach_out_to_the_italians_desc:0 "전장에서 [ITA.GetAdjective]을(를) 더 이상 이겨낼 희망이 없다는 것이 분명합니다. 그러나, [ETH.GetLeader]은(는) 계속해서 무익한 공세로 우리 병사들을 죽음으로 내몰고 있습니다. 이제는 이탈리아인들과 협력하고 조국에 평화를 가져올 수 있는 더 강력한 지도자 아래 새로운 지도부가 필요할 때입니다."
 ETH_reach_out_to_the_italians_tt:0 "영토를 대가로 평화를 제안하는 협력 제안이 §Y[ITA.GetNameDef]§!에게 보내질 것입니다."
 ETH_can_start_a_civil_war_tt:0 "[ROOT.GetName]은(는) §Y$ETH_declare_for_italy$§! 중점을 완료하여 내전을 시작할 수 있습니다."
 ETH_sway_the_warlords:0 "군벌들 회유"
 ETH_sway_the_warlords_desc:0 "비록 우리가 더 강력한 라스 중 누구도 $ETH_haile_selassie$에 대한 공개적인 반대를 선언하도록 설득할 수는 없더라도, 적어도 미래 협력을 위한 씨앗은 뿌릴 수 있습니다. 추가로, 우리는 일부 하급 군벌들에게 이탈리아인에 맞서기보다 협력하는 것의 이점을 설득해야 합니다."
 ETH_sway_the_warlords_tt:0 "봉기의 규모를 증가시킵니다. \n일부 충성파 장군들은 전쟁 후 모집할 수 있게 됩니다."
 ETH_expand_the_bodyguard:0 "경호대 확장"
 ETH_expand_the_bodyguard_desc:0 "[ETH.GetName]의 권력 구조가 분열되기 시작하면서 누구를 신뢰할 수 있는지 판단하기가 점점 더 어려워지고 있습니다. 이 어려운 시기에, 우리 위대한 국가의 미래 지도자는 반역적인 분자들로부터 자신을 보호하기 위해 오직 그에게만 충성하는 영구적인 경호대가 필요합니다."
 ETH_expand_the_bodyguard_tt:0 "내전이 시작될 때 추가 부대를 추가합니다"
 ETH_declare_for_italy:0 "이탈리아 지지 선언"
 ETH_declare_for_italy_desc:0 "많은 이들이 이를 배신으로 보고 진실에 등을 돌릴 것입니다. 하지만 그것이 바로 우리가 이 땅을 지배할 운명인 이유입니다. 왜냐하면 우리만이 국가의 이익을 위해 해야 할 일을 할 수 있는 의지력을 가지고 있다는 것을 알기 때문입니다. 이제 [ETH.GetLeader]을(를) 타도할 때입니다."
 ETH_restore_the_country:0 "국가 재건"
 ETH_restore_the_country_desc:0 "[ETH.GetName]에 마침내 평화가 회복되었으니, 이제 전국에 질서를 회복하는 과정을 시작할 때입니다. 우리는 집과 기반 시설을 이전보다 더 좋게 재건할 것이며, [ETH.GetLeader]의 통치 아래 우리 국민에게 밝은 미래가 기다리고 있음을 보여줄 것입니다."
 ETH_invite_italian_settlers:0 "이탈리아 정착민 초대"

 ETH_invite_italian_settlers_desc:0 "우리의 위대한 조국이 유럽 식민지의 또 다른 목적지가 되는 것은 많은 이들에게 받아들이기 힘든 일이 될 것입니다. 그러나 최근 역사는 우리 산업과 기반 시설의 취약성을 드러냈으며, 이를 개선하기 위한 급진적인 조치가 필요합니다. 따라서 우리는 순진한 [ITA.GetAdjective]인들의 전문 지식과 부를 이용하여 이곳에 정착하도록 초대함으로써 현 상황을 유리하게 활용할 것입니다."
 ETH_invite_italian_settlers_tt:1 "§Y소유한 2개 주§!가 [ITA.GetName]로부터 다수의 정착민을 얻어, 농촌 또는 목축 주에서 변화하고 §Y새로운 건설 슬롯§!을 얻게 됩니다."
 ETH_replace_the_abuna:0 "[Get_ETH_replace_the_abuna_name]"
 ETH_replace_the_abuna_desc:0 "[Get_ETH_replace_the_abuna_desc]"
 abuna_abraham_gojjam_tt:0 "§Y$ETH_abuna_abraham$§!:"
 ETH_replace_the_abuna_original:0 "아부나 교체"
 ETH_change_state_religion:0 "국교 변경"
 ETH_replace_the_abuna_desc_ethiopia:0 "정교회의 지도자인 $ETH_abuna_qerellos_iv$는 $ETH_haile_selassie$와 너무 밀접하게 연관되어 있습니다. 우리는 그를 우리 대의에 더 충성스러운 인물로 교체해야 합니다."
 ETH_replace_the_abuna_desc_gojjam:0 "정교회의 지도자인 $ETH_abuna_qerellos_iv$는 $ETH_haile_selassie$와 너무 밀접하게 연관되어 있습니다. $ETH_abuna_abraham$은 그를 대체할 완벽한 후보이며, 고잠을 제국의 정치적, 종교적 중심지로 만들 것입니다."
 ETH_replace_the_abuna_desc_jimma:0 "너무 오랫동안 정교회 테와히도 교회가 이 나라의 정치에 영향을 미쳐왔습니다. 이제 제국과 교회 사이의 관계를 공식적으로 끊을 때입니다. 대신 우리는 좁은 바다 건너편의 형제자매들과 더 긴밀한 관계를 추구해야 합니다."
 ETH_the_capital_victory_parade:0 "[ROOT.Capital.GetCapitalVictoryPointName] 승전 퍼레이드"
 ETH_the_capital_victory_parade_desc:0 "우리의 위대한 지도자가 우리를 확실한 파멸에서 구했음에도 불구하고, 많은 국민이 [ETH.GetLeader]의 동기를 의심하며 옛 황실 시절을 그리워하고 있습니다. 우리는 그들에게 [ETH.GetLeader]에게 얼마나 감사해야 하는지를 상기시키고 [ETH.GetName]을 기다리는 영광스러운 미래를 보여주어야 합니다."
 ETH_amedeos_feast_of_maskal:0 "아메데오의 마스칼 축제"

 ETH_amedeos_feast_of_maskal_desc:0 "[ETH.GetName]의 지속적인 안정을 보장하기 위해, 우리는 [ETH.Capital.GetCapitalVictoryPointName]에서 열리는 아메데오 공의 마스칼 축제에 남은 라스들을 모을 것입니다. 그곳에서 우리는 [ITA.GetAdjective] 동아프리카 총독과 만나 이 지역의 미래에 대해 논의할 것입니다."
 ETH_amedeos_feast_of_maskal_tt:1 "§Y$ETH_sway_the_warlords$§!를 완료했다면: \n§Y$ETH_seyoum_mengesha$§!, §Y$ETH_ayalew_birru$§!, §Y$ETH_ras_kassa$§!가 충성하게 됩니다."
 ETH_assertiveness:0 "[Get_ETH_assertiveness_name]"
 ETH_assertiveness_autonomy_effect:0 "단호한 네구스"

 ETH_assertiveness_desc:0 "우리는 파멸로부터 위대한 조국을 보호하기 위해 [ITA.GetAdjective]인들과 협력하기로 합의했지만, 이제 그들은 우리의 정체성과 문화를 박탈하고 우리를 일개 식민지로 만들려 합니다. 우리는 그런 일이 일어나도록 내버려 둘 수 없습니다. 우리는 그들에게 우리가 누구인지 똑똑히 알려주고, 그들의 식민화에 모든 단계에서 저항할 것입니다."
 ETH_assertiveness_tt:1 "§Y$ETH_sway_the_warlords$§!를 완료했고 국가가 §Y$jimma$§!라면:\n§Y$ETH_balcho_safo$§!와 §Y$ETH_tadesse_birru$§!가 충성하게 됩니다."
 ETH_assertiveness_gojjam:0 "고잠 네가쉬"
 ETH_assertiveness_jimma:0 "지마의 가라드"
 ETH_assertiveness_ethiopia:0 "셰와의 네구스"
 ETH_exploit_french_weakness:0 "프랑스의 약점 이용"
 ETH_exploit_french_weakness_desc:0 "[FRA.GetAdjective]인들이 제국의 잿더미를 놓고 다투는 데 정신이 팔린 동안, 우리는 프랑스령 소말릴란드 영토를 우리의 위대한 제국에 합병할 기회가 있습니다. [FRA.GetAdjective]인들이 또 다른 싸움을 벌일 의지가 있을 것 같지는 않지만, 우리는 만반의 준비를 해야 합니다."
 ETH_exploit_french_weakness_tt:0 "§Y프랑스령 소말릴란드§! 점령 결정 잠금 해제 \n§R이 결정을 내리면 비시 프랑스와의 전쟁 위험이 있습니다!§!"
 ETH_france_divided_tt:0 "프랑스가 분열되었습니다"
 ETH_invite_italian_investors:0 "이탈리아 투자자 초대"
 ETH_invite_italian_investors_desc:0 "새로운 지배자들을 활용하여 그들의 투자자들이 [ETH.GetName]을 방문하도록 유치해야 합니다. 투자 유입은 전쟁으로 인한 피해를 복구할 뿐만 아니라, 우리의 산업 역량을 대규모로 확장하는 데에도 큰 도움이 될 것입니다."
 ETH_italian_general_staff:0 "이탈리아 총참모부"

 ETH_italian_general_staff_desc:0 "우리 군은 현대화에 있어 아직 갈 길이 멉니다. 군을 위한 현대 장비를 생산하거나 조달하는 데 큰 진전을 이루고 있지만, 우리 장교들은 그것을 어떻게 활용할지에 대해 시대에 뒤떨어진 견해를 많이 가지고 있습니다. 아마도 [ITA.GetAdjective] 장교들을 우리 총참모부에 초빙하여 현대전을 수행하는 방법을 배울 수 있을 것입니다."
 ETH_italian_general_staff_tt:1 "이탈리아와의 관계가 긍정적이고 그들이 동의한다면, §Y$ITA_giuseppe_tellera$§!, §Y$ITA_mario_berti$§!, §Y$ITA_alessandro_pirzio_biroli$§! 장군이 에티오피아로 전속될 것입니다."
 ETH_cooperation:0 "[Get_ETH_cooperation_name]"

 ETH_cooperation_desc:0 "우리의 운명은 동아프리카 지배에 달려 있습니다. 하지만, 우리는 아직 그 목표를 달성하기까지 갈 길이 멉니다. 따라서 우리는 이 지역의 기존 권력 구조와 협력하여 얻을 수 있는 모든 이점을 얻으려고 시도해야 합니다."
 ETH_cooperation_sud_tt:0 "수단인 정치 고문 획득:\n§Y$economic_organizer$:§! \n   소비재 공장: §G-5%§!\n   안정도: §G+5%§!"
 ETH_cooperation_som_tt:0 "소말리아인 정치 고문 획득:\n§Y$economic_organizer$:§! \n   소비재 공장: §G-5%§!\n   안정도: §G+5%§!"

 ETH_cooperation_gugsa_tt:0 "§Y$ETH_domenico_mondelli$§! 인물을 §Y공군 참모총장§!으로 임명 가능: \n§Y$air_chief_ground_support_1$§!"
 ETH_cooperation_gojjam:0 "수단인과의 협력"
 ETH_cooperation_jimma:0 "아랍인과의 협력"
 ETH_cooperation_gugsa:0 "에리트레아인과의 협력"
 ETH_reinforce_dynamic_identity:0 "[Get_ETH_reinforce_dynamic_identity_name]"
 ETH_reinforce_dynamic_identity_desc:0 "국민들은 새 행정부 하에서 자신들의 국가 정체성에 대해 혼란스러워하고 있습니다. 그들의 사소한 불만과는 상관없이, 그들은 이제 [ETH.GetAdjective]인입니다. 그리고 이제 훌륭한 [ETH.GetAdjective]인은 [ETH.GetLeader]와 국가에 충성한다는 것을 배워야 할 때입니다."
 ETH_reinforce_ethiopian_identity:0 "에티오피아 정체성 강화"
 ETH_reinforce_gojjam_identity:0 "고잠 정체성 강화"
 ETH_reinforce_jimman_identity:0 "짐만 정체성 강화"
 ETH_reinforced_identity:0 "강화된 정체성"
 ETH_underground_wargames:0 "지하 전쟁연습"
 ETH_underground_wargames_desc:0 "우리는 지난 전쟁에서 최근 수십 년간 전쟁이 얼마나 변했는지에 대한 이해 부족으로 [ITA.GetAdjective]군을 격퇴하는 데 어려움을 겪었습니다. 다시는 같은 실수를 반복하지 않기 위해, 우리 장교들이 전쟁연습을 시작하고 [ITA.GetAdjective]군을 전복시킬 계획을 세우는 것이 필수적입니다. 물론 그렇게 하는 동안 의심을 사지 않도록 해야 합니다..."
 ETH_adopt_the_lira:0 "리라화 채택"

 ETH_adopt_the_lira_desc:0 "[ITA.GetName]과의 전쟁으로 인한 경제적 혼란과 재건 비용으로 인해 우리 통화 가치가 급락했습니다. 훼손된 통화를 안정시키려 하기보다는, 리라화를 채택하여 [ITA.GetAdjective]인들과의 경제 통합을 증진할 기회로 삼아야 합니다."
 ETH_request_italian_equipment:0 "이탈리아 장비 요청"
 ETH_request_italian_equipment_desc:0 "경제를 개혁하고 군대를 강화하는 데 큰 진전을 이루고 있지만, 우리는 여전히 이러한 과업에서 약간의 지원을 받으면 이득을 볼 수 있습니다. [ITA.GetAdjective]인들과의 관계가 깊어짐에 따라, 그들은 잉여 장비 일부를 우리에게 보내주는 것에 긍정적일 수 있습니다."
 ETH_request_italian_equipment_tt:1 "[ITA.GetFlag][ITA.GetName]이(가) 동의하면, [ETH.GetFlag][ETH.GetName]은(는) §G$artillery_equipment$ 500개§! 또는 §G$infantry_equipment_1$ 2500개§!를 받게 됩니다."
 ETH_recruit_mercenaries:0 "용병 모집"
 ETH_recruit_mercenaries_desc:0 "현재 군 내부에는 출신 배경이 다른 병사들 사이에 상당한 긴장이 감돌고 있습니다. 다수가 구체제에 충성하고 있어 신뢰할 수 없습니다. 이 불충한 분자들을 뿌리 뽑을 때까지, 우리에게 의심의 여지 없이 충성하는 병력이 필요합니다. 충성심을 고취하는 가장 쉬운 방법은 두둑한 현금입니다."
 ETH_askari_tt:0 "§Y에리트레아 아스카리§! §G4개 사단§! 모집"
 ETH_sudanese_mercs_tt:0 "§Y수단 용병§! §G4개 사단§! 모집"
 ETH_arab_mercs_colab_tt:0 "§Y아랍 용병§! §G4개 사단§! 모집"
 ETH_set_up_a_customs_barrier:0 "관세 장벽 설치"

 ETH_set_up_a_customs_barrier_desc:0 "우리 경제가 [ITA.GetName]과 얽히도록 오래 방치할수록, 그들의 부패한 영향력에서 벗어나기는 더욱 어려워질 것입니다. 비록 경제 성장이 둔화되겠지만, 양국 간의 교역을 더 어렵게 만들기 위해 관세 장벽을 시행해야 합니다. [ITA.GetAdjective] 정권은 이에 분노하겠지만, 필요하다면 경제적 명분을 찾아낼 것입니다."
 ETH_contact_the_exiles:0 "망명자들과 접촉"
 ETH_contact_the_exiles_desc:0 "[ITA.GetName]과의 전쟁이 막바지에 이르자, 많은 이들이 새 정권이 가져올 일에 대한 두려움으로 인근 지역으로 도망쳤습니다. 독립을 되찾기 위한 계획을 실행하기 시작하면서, 우리는 이 흩어진 동포들을 설득하여 우리와 함께하도록 할 수 있을 것입니다. 과거의 차이에도 불구하고, 지금이야말로 조국을 위해 협력할 때입니다."
 ETH_outsourced_production:0 "외주 생산"
 ETH_outsourced_production_desc:0 "우리 산업은 전쟁 도구를 제조하는 데 있어 여전히 규모가 작고 미숙합니다. 하지만 이제 우리는 [ITA.GetAdjective]의 영향권에 확고히 들어섰으므로, 생산 필요를 외주로 돌리고 그들 무기 제조업체의 전문 지식을 활용하여 이 상황을 최대한 이용할 수 있습니다."
 ETH_outsourced_production_tt:0 "[ITA.GetFlag]§Y[ITA.GetAdjective]§! 육군 또는 공군 설계사 요청:"
 ETH_outsourced_production_air_tt:0 "공군 설계사:"
 ETH_outsourced_production_army_tt:0 "\n육군 설계사:"
 ETH_outsourced_production_factories_tt:1 "\n [ITA.GetFlag]§Y[ITA.GetNameDef]§!이(가) 동의하면, [ETH.GetFlag]§Y[ETH.GetNameDef]§!은(는) §Y4개의 군수 공장§!을 획득합니다."
 ETH_together_for_victory:0 "승리를 위해 함께"

 ETH_together_for_victory_desc:0 "우리의 명예를 회복하고 이탈리아 억압의 사슬을 끊을 때가 다가오고 있습니다. 계획이 실패하지 않도록 하려면, 우리 군대를 강화하고 동아프리카 전역에서 지원을 얻어야 합니다. 함께해야만 승리가 보장될 것입니다."
 ETH_together_for_victory_tt:0 "독립 전쟁이 시작되면 반란군 전사들이 적진 후방에서 봉기할 것입니다"
 ETH_our_enemys_enemy:0 "적의 적"
 ETH_our_enemys_enemy_desc:0 "이념적 또는 전략적 이유로 [ITA.GetAdjective]의 팽창주의에 반대하는 국가들이 많이 있습니다. 우리 지역의 [ITA.GetAdjective] 군대를 전복시킬 수 있도록, 이들 국가에 접촉하여 무기 공급을 요청해야 합니다."
 ETH_our_enemys_enemy_tt:0 "한 국가가 무기 지원에 동의하면, [ETH.GetFlag][ETH.GetName]은(는) 그들로부터 §G1000개의 보병 장비§!를 받게 될 것입니다."
 ETH_raid_italian_depots:0 "이탈리아 보급고 습격"

 ETH_raid_italian_depots_desc:0 "이탈리아군은 우리나라 전역의 보급고에 막대한 양의 장비를 집중시켰습니다. 불가피한 대결을 준비하면서, 우리는 보급고를 습격하여 그들의 장비를 빼앗고 우리 군대를 강화할 수 있습니다."
 ETH_raid_italian_depots_tt:0 "향후 §Y1년§! 동안 산발적으로 습격이 일어나며, 매번 [ITA.GetFlag]§Y[ITA.GetAdjective]§! 장비가 [ETH.GetFlag]§Y[ETH.GetName]§!의 비축량에 추가될 것입니다."
 ETH_the_italian_language:0 "이탈리아어"
 ETH_the_italian_language_desc:0 "언어는 [ITA.GetAdjective]과의 더 깊은 협력에 있어 가장 큰 장벽 중 하나로 남아 있습니다. 따라서 우리는 군대를 포함한 행정부 전반에 걸쳐 [ITA.GetAdjective]를 제2언어로 채택할 것입니다. 이를 통해 우리 사이의 문화 교류가 가속화되고 전략 계획이 더욱 효율적으로 이루어지기를 바랍니다."
 ETH_compensation:0 "보상"

 ETH_compensation_desc:0 "우리 위대한 두 국가 간의 초기 긴장에도 불구하고, 우리는 [ITA.GetName]에 대한 충성을 거듭 증명했습니다. 하지만 이것이 우리 행정부에 대한 국민의 지지를 얻는 데에는 거의 도움이 되지 않았습니다. 아마도 [ITA.GetAdjective]인들은 우리 정권에 대한 지지를 강화할 수 있도록 그들의 다른 영토 일부에 대한 통제권으로 우리에게 보상해 줄 의향이 있을 것입니다."
 ETH_negusa_nagast:0 "네구사 네가스트"

 ETH_negusa_nagast_desc:0 "독립을 선언하여 [ETH.GetName]에서 [ITA.GetAdjective]의 영향력을 제거할 때가 왔습니다. [ETH.GetLeader]의 지도력 덕분에 우리는 곧 다시 한번 우리 운명의 주인이 될 것입니다."
 ETH_negusa_nagast_tt:0 "§Y[ROOT.GetNameWithFlag]§!이(가) 독립을 선언합니다"
 ETH_the_italo-ethiopian_empire:0 "이탈리아-[ETH.GetAdjective] 제국"
 ETH_the_italo-ethiopian_empire_desc:0 "우리가 옛 제국의 잿더미에서 일어서면서, 새로운 이탈리아-[ETH.GetAdjective] 제국이 형성되기 시작하고 있습니다. 최근까지 서로 싸웠지만, [ITA.GetName]과 [ETH.GetName] 모두 이제 함께할 때 더 강하다는 것이 점점 더 명확해지고 있습니다. 이제 우리 공동 제국의 영역을 확장하는 것이 우리의 의무입니다."
 ETH_the_italo-ethiopian_empire_tt:1 "§Y이탈리아-[ETH.GetAdjective] 제국§! 디시전을 잠금 해제하여 점령한 영유권 주장 영토에 핵심주를 획득합니다.\n영유권을 주장하는 주 또는 인접 주에 적 사단이 없는 경우 영토가 이전됩니다"
 ETH_reclaim_the_empire:0 "제국 수복"
 ETH_reclaim_the_empire_desc:0 "우리의 위대한 지도자 [ETH.GetLeader]의 통치 아래, 우리는 우리 위대한 국가에 대한 [ITA.GetName]의 부식적인 영향력을 거부하고 우리 민족의 비할 데 없는 힘을 재발견했습니다. 이제 우리 앞에 놓인 위대한 과업은 우리의 정당한 영토를 되찾고 [ETH.GetAdjective] 민족을 통일하는 것입니다."
 ETH_reclaim_the_empire_tt:0 "§Y제국 수복§! 디시전을 잠금 해제하여 [ITA.GetFlag][ITA.GetName]에 할양된 영토가 다시 [ETH.GetFlag][ETH.GetAdjective]의 통제 하에 들어오면 핵심주를 되찾습니다."
 ETH_the_liberator_of_country_short:0 "[Get_ETH_the_liberator_of_country_short_name]"

 ETH_the_liberator_of_country_short_desc:0 "[ETH.GetLeader]께서는 영웅적으로 우리를 독립으로 이끌어, [ITA.GetName]의 부패한 영향력에서 벗어나게 했습니다. 미래가 어떻게 될지는 알 수 없지만, [ETH.GetName]의 해방자가 우리를 이끄는 한 영광스러울 것이라는 점은 알고 있습니다."
 ETH_the_liberator_of_gojjam:0 "$gojjam$의 해방자"
 ETH_the_liberator_of_jimma:0 "$jimma$의 해방자"
 ETH_the_liberator_of_ethiopia:0 "$ETH$의 해방자"
 ETH_consolidate_east_africa:0 "동아프리카 통합"

 ETH_consolidate_east_africa_desc:0 "옛 제국들이 무너지기 시작하면서 우리 주변의 세계 질서가 변하고 있습니다. 이 새로운 질서 속에서 우리 민족의 자리를 확보하는 유일한 방법은 정복을 통해 어떤 장애물도 극복할 수 있는 우리의 능력을 증명하는 것입니다. 따라서 우리는 동아프리카를 우리 통제 하에 통합하고 [ETH.GetName]의 힘을 세계에 보여줄 것입니다."
 ETH_consolidate_east_africa_tt:0 "다음 지역에 대한 영유권 획득:\n§Y[SUD.GetName]§!\n§Y[SOM.GetName]§!\n§Y[ERI.GetName]§!\n§Y[DJI.GetName]§!\n§Y[KEN.GetName]§!\n§Y[UGA.GetName]§!\n[ETH.GetFlag][ETH.GetAdjective]의 통제 하에 들어온 영토를 핵심주로 만드는 디시전 획득."
 ETH_chitet_name:0 "치테트"
 ETH_chitet_name_democratic:0 "향토군"
 ETH_chitet_name_communist:0 "인민 민병대"
 ETH_naval_college_name_communist:0 "홍해 해군 대학"
 ETH_naval_college_name_historical:0 "아스메나 해군 대학"
 ETH_naval_college_name_fallback:0 "[ETH.GetAdjective] 해군 사관학교"
 ETH_airbase_name:0 "데브레 제이트"
 ETH_airbase_name_fallback:0 "[ETH.GetAdjective]"
 ETH_experts:0 "전문가"
 ETH_investors:0 "산업가"
 ETH_reintegrate_aussa:0 "아우사 통합"
 ETH_reintegrate_aussa_desc:0 "배신자 아우사 술탄국은 거듭 우리를 배신하고 [ITA.GetAdjective]의 편에 섰습니다. 이제 술탄국을 해체하고 해당 지역을 [ETH.GetName]에 통합할 때입니다."
 ETH_communist_tax_exemption_title:0 "전문가 지원"
 ETH_communist_tax_exemption_desc:0 "소비에트 연방이 혁명 이후 겪었던 '두뇌 유출'을 방지하기 위해, 전문가들이 [ETH.GetNameDef]에 계속 머물도록 장려하는 조세 제도를 만들어야 합니다. 적어도 우리가 새로운 세대의 프롤레타리아 전문가를 양성할 때까지는 말입니다..."
 ETH_communist_seize_assets_desc:0 "인민들이 겨우 생계를 유지하며 고군분투하는 동안, [ETH.GetName]의 혁명 전 엘리트들은 외화, 예술품, 그리고 물론 토지의 형태로 막대한 양의 자산을 착복했습니다. 우리는 인민의 이름으로 이 자산들을 몰수하고 부를 재분배해야 합니다."
 ETH_communist_seize_assets_title:0 "사유 재산 철폐"

 ETH_tax_exemption_default_desc:0 "우리는 귀족들을 만족시켜 [ETH.GetName]의 분열을 막아야 합니다. 따라서 우리는 그들의 지속적인 충성에 보답하기 위해 면세 혜택을 확대하여, 더 많은 부를 유지할 수 있도록 할 것입니다."
 ETH_seize_assets_default_desc:0 "[ETH.GetName]에서 가장 부유한 사람들 중 일부인 귀족들이 낡은 법과 허점을 통해 세금 납부를 회피하는 것은 경제적으로 거의 의미가 없습니다. 우리는 귀족들에게 제대로 세금을 부과하고 그 세수를 제국의 추가적인 산업화에 사용해야 합니다."
 ETH_tax_exemption_default_title:0 "면세 혜택 확대"
 ETH_seize_assets_default_title:0 "귀족 과세"


 # ITALY
 ITA_italian_highways_bba:0 "이탈리아 고속도로"
 ITA_italian_highways_bba_desc:0 "고대 로마인들은 전 세계의 부러움을 사는 도로를 건설했습니다. 이제 벼락출세한 독일인들은 자신들의 아우토반이 우리가 건설할 수 있는 그 어떤 것보다 훨씬 우월하다고 믿고 있습니다. 우리는 그들이 틀렸다는 것을 증명할 것입니다."
 ITA_develop_libya:0 "리비아 개발"
 ITA_develop_libya_desc:0 "리비아는 우리의 가장 가까운 식민지이며, 가장 높은 잠재력을 지니고 있습니다. 이 지역을 평정하기 위한 우리의 길고 힘든 노력의 완전한 결실을 거두기 전에, 우리는 기반 시설을 개선해야 합니다."
 ITA_develop_eritrea:0 "에리트레아 개발"
 ITA_develop_eritrea_desc:0 "에리트레아는 아프리카 대륙에서 가장 오래된 식민지이며, 단연 가장 가치 있는 곳 중 하나입니다. 뛰어난 전략적 위치 덕분에, 우리 식민 제국의 초석이 될 수 있도록 쉽게 건설될 수 있습니다."
 ITA_develop_somaliland:0 "소말릴란드 개발"
 ITA_develop_somaliland_desc:0 "언뜻 보기에, 아프리카의 뿔 지역은 많은 경제적 또는 전략적 잠재력을 지니고 있지 않은 것처럼 보입니다. 하지만 몇몇 적절한 투자를 통해, 우리는 이 지역을 인도양으로 더 나아가기 위한 발판으로 만들 수 있습니다."
 ITA_regional_development:0 "지역 개발"
 ITA_regional_development_desc:0 "제국 각지에 대한 우리의 이전 투자는 해당 지역의 경제 생산량을 크게 늘리기 위한 기반을 마련했습니다. 우리가 말만 하면, 곧바로 그 결실을 거둘 수 있습니다."
 ITA_ministry_of_italian_africa:0 "이탈리아령 아프리카부"
 ITA_ministry_of_italian_africa_desc:0 "아프리카의 다양한 부족과 민족들은 우리가 다른 피지배 민족을 다루는 것처럼 다룰 수 없습니다. 이 지역들을 관리하려면 다른 접근 방식이 필요할 것입니다."
 ITA_develop_ethiopia:0 "에티오피아 개발"
 ITA_develop_ethiopia_desc:0 "완고한 에티오피아인들은 오랫동안 우리에게 저항하고 굴욕을 안겨주었습니다. 이제 그들이 마침내 굴복했으니, 우리는 그들의 나라를 개발하여 우리의 침공이 그들 자신을 위한 것이었음을 보여줄 수 있습니다."
 ITA_ethiopian_railways:0 "에티오피아 철도"
 ITA_ethiopian_railways_desc:0 "낙후된 에티오피아 철도망은 식민지의 경제 발전을 저해하고 있습니다. 이탈리아 전문가를 파견하여 신속하게 이탈리아 수준으로 끌어올리고, 제국 어디에서든 열차가 항상 정시에 운행되도록 보장할 수 있습니다."
 ITA_polizia_dell_africa_italiana:0 "폴리치아 델라프리카 이탈리아나"
 ITA_polizia_dell_africa_italiana_desc:0 "우리 식민지 경찰은 지금까지 유능한 전력임을 입증했습니다. 약간의 추가 개혁을 통해, 우리가 식민지에 투자하는 만큼의 이익을 얻을 수 있도록 보장할 수 있을 것입니다."
 ITA_strengthen_ascari_corps:0 "아스카리 군단 강화"
 ITA_strengthen_ascari_corps_desc:0 "제국의 유럽 지역에서 온 우리 병력은 아프리카의 혹독한 기후에 종종 고전합니다. 원주민들은 당연히 같은 문제를 겪지 않으므로, 더운 기후에서 전투 시 우리 병력을 지원하기 위해 그들 중 일부를 고용해야 합니다."
 ITA_comandante_diavolo:0 "코만단테 디아볼로"
 ITA_comandante_diavolo_desc:0 "에리트레아 정복과 에티오피아 전쟁 중, 우리는 종종 원주민 기병의 속도와 끈기에 시달렸습니다. 그들을 상대로 고전했기에, 그들을 우리 편으로 끌어들인다면 많은 것을 얻을 수 있을 것입니다. 그리고 진취적인 젊은 장교가 우리만의 '악마 사령관'이 될 수 있을지도 모릅니다."
 ITA_prospect_for_oil:1 "석유 탐사"
 ITA_prospect_for_oil_desc:1 "우리 지질학자들은 리비아 사막 아래에 상당한 석유 매장량이 잠들어 있을 수 있다고 믿습니다. 그들이 맞는지 확인하기 위해 철저한 조사를 실시해야 합니다."
 ITA_libyan_refineries:0 "리비아 정유소"
 ITA_libyan_refineries_desc:1 "리비아 사막에서 대규모 석유 매장지가 확인되었으므로, 우리의 다음 단계는 이 지역의 석유 정제 능력을 증대하는 것이어야 합니다."
 ITA_libyan_infrastructure_bba:0 "리비아 기반시설"
 ITA_libyan_infrastructure_bba_desc:0 "북아프리카의 작전 기지로서 리비아의 중요성을 고려할 때, 필요 시 대규모 병력을 운용할 수 있도록 기반시설을 개선하기 위한 지속적인 노력을 기울여야 합니다."
 ITA_litoranea_balbo:1 "[GetAppropriateLitoraneaBalboName]"
 ITA_litoranea_balbo_default:0 "리토라네아 발보"
 ITA_litoranea_balbo_alt:0 "리토라네아 리비카"
 ITA_litoranea_balbo_desc:0 "리비아의 도로는 끔찍한 수준입니다. 해안 근처조차 도로망이 현대 국가에 걸맞지 않습니다. 해안을 따라 대규모 고속도로를 건설하는 것을 포함하여 이를 개선하기 위해 해야 할 일이 많습니다."
 ITA_via_della_vittoria:0 "비아 델라 비토리아"
 ITA_via_della_vittoria_desc:0 "열악한 기반시설이 북아프리카에서의 우리 작전을 계속해서 방해하고 있습니다. 단일 '승리의 길'에 더 큰 노력을 집중하면 상황을 극적으로 개선하고 이집트 국경 주변에서 더 자유롭게 작전할 수 있게 될 것입니다."
 ITA_libyan_railway:0 "리비아 철도"
 ITA_libyan_railway_desc:0 "리비아 도로망에 대한 투자는 분명 가치가 있지만, 대규모 병력, 자원, 보급품의 이동을 위해서는 현대적인 철도망이 필수적입니다."
 ITA_steel_industry_in_terni:0 "테르니 제철 산업"
 ITA_steel_industry_in_terni_desc:0 "테르니 제철소는 오랫동안 이탈리아 철강 생산의 중추를 형성해 왔습니다. 다가올 전쟁에서는 그들에게 더욱 의존해야 할 것입니다. 지금 약간의 투자를 해두면 나중에 막대한 이익으로 돌아올 것이 분명합니다."
 ITA_power_plants_in_terni:0 "테르니 발전소"
 ITA_power_plants_in_terni_desc:0 "현재 테르니의 발전소는 불충분하며, 이 지역을 더 큰 산업 중심지로 개발하려면 확장해야 합니다."
 ITA_industria_della_gomma_sintetica:0 "인두스트리아 델라 곰마 신테티카"
 ITA_industria_della_gomma_sintetica_desc:0 "지중해 중심부라는 우리의 지리적 위치는 적대 세력의 봉쇄에 유독 취약하게 만듭니다. 우리가 세계에서 정당한 위치를 차지하려면, 해외 수입 없이 우리 산업을 유지할 수 있어야 합니다."
 ITA_strengthen_northern_industry:0 "북부 산업 강화"
 ITA_strengthen_northern_industry_desc:0 "북부 이탈리아는 오랫동안 우리나라의 산업 중심지였습니다. 약간의 시간과 자원만 투자한다면, 이 지역 전체는 더욱 성장하기에 아주 좋은 위치에 있습니다."
 ITA_modernize_the_mezzogiorno:0 "메초조르노 현대화"
 ITA_modernize_the_mezzogiorno_desc:0 "이탈리아 남부는 통일 국가가 된 이래로 줄곧 골칫거리였습니다. 하지만 지중해의 패권국이 되고자 하는 우리의 열망에 따라, 아직 개발되지 않은 모든 잠재력을 동원해야 합니다."
 ITA_new_industrialization_program:0 "신규 산업화 계획"
 ITA_new_industrialization_program_desc:0 "세계의 다른 국가들을 따라잡으려면 끊임없는 혁신과 개선이 필요합니다. 현재의 성공에 안주한다면 경쟁력을 유지할 수 없을 것이며, 대신 끊임없이 더 많은 것을 위해 노력해야 합니다."
 ITA_railway_innovations:0 "철도 혁신"
 ITA_railway_innovations_desc:0 "자동차 시대에도 불구하고, 강력한 철도망은 여전히 강력한 경제의 중추입니다. 이탈리아 철도의 추가 확장은 미래 성장의 발판이 될 것입니다."
 ITA_expand_foggia_farm_fields:0 "포자 농경지 확장"
 ITA_expand_foggia_farm_fields_desc:0 "포자 지역은 오랫동안 이탈리아 전역을 먹여 살리는 곡창지대였습니다. 전쟁이 시작되면, 들판에서 일하는 많은 남성들을 군에 징집해야 할 것입니다. 국민들을 계속 먹여 살리려면 이 지역의 농업을 현대화하고 확장해야 합니다."
 ITA_investments_in_edison:0 "에디슨사에 투자"
 ITA_investments_in_edison_desc:0 "이탈리아는 유럽 최초의 발전소를 자랑했으며, 항상 기술의 선두에 서 왔습니다. 에디슨사에 투자함으로써 우리는 선두 자리를 계속 유지할 수 있습니다."
 ITA_expand_national_universities:0 "국립 대학 확장"
 ITA_expand_national_universities_desc:0 "우리와 같은 기술 선진국에게는 더 많은 기술자가 항상 필요합니다. 우리는 대학이 국가 경쟁력을 유지하기에 충분한 신규 전문가를 교육하는 데 가장 큰 병목 현상을 일으키는 곳임을 확인했습니다."
 ITA_fiocchi_munizioni:0 "피오키 무니치오니"
 ITA_fiocchi_munizioni_desc:0 "피오키는 오랫동안 우리 군에 고품질 탄약을 공급해 왔습니다. 다가올 전쟁에서 안정적인 탄약 공급은 필수적이므로, 피오키 공장이 그 임무를 감당할 수 있도록 해야 합니다."
 ITA_brescia_small_arms_industry:0 "브레시아 소화기 산업"
 ITA_brescia_small_arms_industry_desc:0 "이탈리아의 소화기는 높은 품질로 전 세계에 명성이 자자합니다. 하지만 우리 병사들이 전장에서 어떤 적이라도 이길 수 있도록 보장하려면, 가장 현대적인 유형의 무기를 충분히 공급해야 합니다."
 ITA_milan_comms_industry:0 "밀라노 통신 산업"
 ITA_milan_comms_industry_desc:0 "무선 탐지 및 거리 측정이라는 새로운 분야는 많은 기회를 제공하며, 의심할 여지 없이 군사 기술의 중요한 영역이 될 것입니다. 우리는 이 분야의 발전에 뒤처지지 않도록 해야 합니다."
 ITA_redirect_alfa_romeo_production:0 "알파 로메오 생산 전환"
 ITA_redirect_alfa_romeo_production_desc:0 "수십 년 동안 이탈리아 스포츠카는 기술의 정점에 있었습니다. 하지만 전쟁의 그림자가 다가오면서, 이탈리아의 모든 국민은 각자의 역할을 다해야 합니다. 우리는 무의미한 사치를 부릴 여유가 없으며, 알파 로메오 공장의 기계들은 군사적 목적으로 더 잘 사용될 수 있을 것입니다."
 ITA_increase_production:0 "생산량 증대"
 ITA_increase_production_desc:0 "산업화된 전쟁은 주로 한 가지, 바로 물량을 요구합니다. 대량의 포탄, 대량의 소총, 대량의 항공기. 무엇보다 중요한 것은 적보다 더 많은 물자를 보유하는 것입니다."
 ITA_keep_specialization:0 "전문화 유지"
 ITA_keep_specialization_desc:0 "세계의 다른 국가들은 기술, 정밀성, 품질의 가치를 잊었을지 모르지만, 우리 이탈리아는 그렇지 않습니다. 우리의 장인들은 항상 가장 작은 세부 사항에 주의를 기울이고, 그들이 작업하는 모든 장비에서 단연코 최고의 본보기를 만들어 낼 것입니다."
 ITA_thermojet_research:0 "서모제트 연구"
 ITA_thermojet_research_desc:0 "우리 기술자들은 미래에는 항공기가 더 이상 프로펠러로 구동되거나 피스톤 엔진으로 동력을 얻지 않을 것이라고 믿습니다. 대신, 새로운 기술이 항공기를 훨씬 더 빠르게 만들고 근본적으로 다른 항공기 설계를 가능하게 할 것입니다. 이탈리아는 이 개발의 선두에 서야 합니다."
 ITA_army_primacy_bba:0 "육군 우선주의"
 ITA_army_primacy_bba_desc:0 "최후의 순간에, 전쟁은 적의 영토에 병사를 투입하고 적이 전쟁을 수행하는 데 필요한 것들을 빼앗음으로써 승리합니다. 해군과 공군이 의심할 여지 없이 유용한 조직이긴 하지만, 전쟁에서 승리하는 것은 바로 육군입니다."
 ITA_preserve_army_traditions:0 "육군 전통 보존"
 ITA_preserve_army_traditions_desc:0 "요즘에는 새로운 전쟁 수행 방식에 대한 많은 아이디어가 떠돌고 있습니다. 이들 중 일부는 아마도 장점이 있겠지만, 성공적인 군대의 기반은 카이사르 시대 이래로 변하지 않았습니다. 바로 규율, 개인의 용기, 그리고 유능한 지휘력입니다."
 ITA_increase_artillery_production:0 "포병 생산 증대"
 ITA_increase_artillery_production_desc:0 "대전쟁은 주로 포병의 전쟁이었습니다. 다음 전쟁 또한 주로 포병에 의해 치러질 것이라 가정해야 합니다. 우리는 이 분야에서 뒤처져서는 안 됩니다."
 ITA_vallo_alpino_del_littorio:0 "리토리오 알프스 방벽"
 ITA_vallo_alpino_del_littorio_desc:0 "우리의 육상 국경은 거의 전부 알프스 산맥으로 덮여 있습니다. 이 산맥은 그 자체로 강력한 장애물이지만, 지난 전쟁에서 완전히 뚫을 수 없는 것은 아니라는 교훈을 얻었습니다. 일련의 요새를 건설하면 적의 지상 침공에 맞서 전선을 유지하는 데 도움이 될 것입니다."
 ITA_moschettieri_del_duce:1 "[GetAppropriateMoschetieridelDuceName]"
 ITA_moschettieri_del_duce_default:0 "두체의 총사대"
 ITA_moschettieri_del_duce_king:0 "왕의 총사대"
 ITA_moschettieri_del_duce_alt:0 "공화국 총사대"
 ITA_moschettieri_del_duce_pope: "성부의 총사대"
 ITA_moschettieri_del_duce_desc: "[GetAppropriateMoschetieridelDuceDesc]"
 ITA_moschettieri_del_duce_desc_default: "두체는 신변 보호를 위해 정예 저격수 부대를 휘하에 두고 있습니다. 물론 두체의 안전이 최우선이지만, 이 모범적인 병사들을 정규군 훈련에 투입하여 야전 효율성을 향상시킬 수도 있습니다."
 ITA_moschettieri_del_duce_desc_king: "국왕은 신변 보호를 위해 정예 저격수 부대를 휘하에 두고 있습니다. 물론 국왕의 안전이 최우선이지만, 이 모범적인 병사들을 정규군 훈련에 투입하여 야전 효율성을 향상시킬 수도 있습니다."
 ITA_moschettieri_del_duce_desc_pope: "교황 성하께서는 신변 보호를 위해 정예 저격수 부대를 휘하에 두고 있습니다. 물론 성하의 안전이 최우선이지만, 이 모범적인 병사들을 정규군 훈련에 투입하여 야전 효율성을 향상시킬 수도 있습니다."
 ITA_moschettieri_del_duce_desc_alt: "공화국 총사대는 국가 외부에서 오든 내부에서 오든 모든 위협으로부터 공화국을 수호하기로 맹세한 정예 저격수 부대입니다. 이 모범적인 병사들을 정규군 훈련에 투입하여 야전 효율성을 향상시킬 수도 있습니다."
 ITA_a_bandits_war:0 "비적의 전쟁"
 ITA_a_bandits_war_desc:0 "구시대적인 전쟁 방식은 이손초 전선의 참호에서 끝났어야 했습니다. 일부 구세대 장군들은 여전히 현대전이 병사들을 고기 분쇄기에 밀어 넣는 방식으로 승리할 수 있다고 믿습니다. 우리는 이제 더 잘 압니다. 현대전은 신속한 기동과 빠르게 반응할 수 있는 유연한 조직으로 승리하는 것입니다. 우리는 이런 종류의 전쟁에 대비하여 군대를 준비시켜야 합니다."
 ITA_carica_di_isbuscenskij:0 "이즈부셴스키 돌격"
 ITA_carica_di_isbuscenskij_desc:0 "어떤 이들은 전장에서 말과 기수의 시대는 끝났다고 말합니다. 기병의 역할은 전차와 항공기가 대신하게 되었다고 합니다. 하지만 그들은 틀렸습니다. 말은 연료도, 지상 지원 인력도 필요 없으며, 이따금 새 편자를 박는 것 외에는 부품도 필요 없습니다. 이는 현대 전장에서도 기병에게 명백한 이점을 줍니다."
 ITA_army_leaders:0 "육군 지휘관"
 ITA_army_leaders_desc:0 "우리 군은 항상 가장 유능한 장교들이 이끌어야 합니다. 우위를 유지하기 위해서는 유능한 신임 장교들을 꾸준히 배출하는 것이 필수적입니다."
 ITA_superesercito:0 "육군 최고사령부"
 ITA_superesercito_desc:0 "대규모 군대를 지휘하는 것은 쉬운 일이 아닙니다. 현장의 군을 지도하고 지원할 수 있는 최고사령부 구조를 만들어야 합니다."
 ITA_italian_tankettes:1 "이탈리아 소형전차"
 ITA_italian_tankettes_desc:1 "다른 나라들이 모든 전차를 구식으로 만들 초전차를 찾아 점점 더 크고 무거운 전차를 개발할지 모르지만, 우리는 최고의 전차란 실제로 전장에 있는 전차라는 것을 압니다. 전차는 필요할 때 제시간에 어디든 갈 수 있을 만큼 빨라야 하며, 소총을 견딜 수 있을 정도의 장갑만 있으면 충분합니다. 그런 차량은 저렴하고 신속하게 생산할 수 있을 것입니다."
 ITA_bersaglieri:0 "베르살리에리"
 ITA_bersaglieri_desc:0 "우리의 정예 경보병인 베르살리에리는 오랫동안 전투에서 두각을 나타냈습니다. 미래전이 기계화될지라도, 개별 병사의 자질은 여전히 결정적인 요소가 될 것입니다."
 ITA_divisioni_alpine:0 "산악 사단"
 ITA_divisioni_alpine_desc:0 "대전쟁에 대한 우리의 기억에는 높은 알프스에서의 잔혹한 전투가 영원히 남아있을 것입니다. 만약 다시 외국의 침략으로부터 조국을 지켜야 한다면, 침략은 분명 북쪽에서 올 것이고 험준한 산악 지대에서 더 많은 전투를 치러야 할 것입니다. 우리는 그 지형에서 효과적으로 싸울 수 있는 병사들을 보유해야 합니다."
 ITA_fanti_dell_aria:0 "공중 보병"
 ITA_fanti_dell_aria_desc:0 "대전쟁 당시 이손초 전선의 피비린내 나는 교착 상태는 우리로 하여금 잘 준비된 적에게 정면 공격을 감행하게 만들었습니다. 돌파구를 마련할 유일한 방법은 무인 지대를 건너 적의 참호를 점령하는 것이었습니다. 현대의 항공기는 한 무리의 병사들을 적의 후방 깊숙이 신속하게 수송할 수 있습니다. 낙하산으로 강하하여 전략적 목표를 점령하고 적 전선을 불안정하게 만들 수 있습니다."
 ITA_self_propelled_guns:0 "자주포"
 ITA_self_propelled_guns_desc:0 "전차는 전쟁에 혁명을 일으켰을지 모르지만, 여러 면에서 자주포는 전장에서 가장 가치 있는 차량입니다. 비교적 저렴하고 단순한 차량이 제공하는 화력 지원은 요새나 적 전차를 상대로 싸울 때 매우 귀중합니다."
 ITA_end_fiat_ansaldo_duopoly:0 "피아트-안살도 독과점 종식"
 ITA_end_fiat_ansaldo_duopoly_desc:0 "우리의 기계 및 동력 공학 부문은 오랫동안 피아트와 안살도라는 두 회사에 의해 지배되어 왔습니다. 이 두 회사는 절대적으로 세계적인 수준의 엔지니어링 회사이지만, 시장에서 경쟁자가 살아남을 수 없어 성장을 다소 저해했습니다. 장기적으로 건전한 엔지니어링 부문을 가지려면 이 독과점을 깨뜨려야 합니다."
 ITA_modernize_ansaldo_facilities:0 "안살도 시설 현대화"
 ITA_modernize_ansaldo_facilities_desc:0 "대전 이후의 경기 침체로 안살도는 심각한 재정난에 빠져 공장을 제대로 현대화할 수 없었습니다. 오직 그들의 높은 위상 덕분에 파산을 면할 수 있었습니다. 안살도가 우리 기계 공학 부문의 핵심적인 부분으로 남기를 원한다면, 그들이 현대적인 기계와 기술을 사용하도록 보장해야 합니다."
 ITA_ferrea_mole_ferreo_cuore:0 "Ferrea Mole Ferreo Cuore"
 ITA_ferrea_mole_ferreo_cuore_desc:0 "우리 전차 군단은 의심할 여지 없이 군사적으로 대담한 위업을 수행하도록 부름받을 것입니다. 이를 위해서는 단순히 철의 선체를 몰고 다니는 것만으로는 충분하지 않으며, 강철의 심장 또한 가져야 합니다."
 ITA_air_innovations_bba:0 "항공 혁신"
 ITA_air_innovations_bba_desc:0 "공중전은 현대전의 결정적인 분야 중 하나가 되었습니다. 이 중요한 영역에서 뒤처지는 것을 용납할 수 없습니다."
 ITA_citta_dell_aria:0 "Città dell'Aria"
 ITA_citta_dell_aria_desc:0 "우리의 연구 노력은 오랫동안 전국 여러 지역에 분산되어 있었습니다. 이로 인해 상당히 비효율적이었습니다. 우리는 연구 노력을 통합하고 '하늘의 도시'를 설립하여, 여러 연구 분야의 과학자와 기술자들이 함께 차세대 항공기를 제작할 수 있도록 해야 합니다."
 ITA_expand_rome_flying_school:0 "로마 비행 학교 확장"
 ITA_expand_rome_flying_school_desc:0 "현대 항공기의 복잡성이 증가함에 따라 조종사 훈련이 불충분할 경우 사고 위험이 커집니다. 우리는 비행 학교가 훈련의 질 측면에서 기술 발전에 발맞추고, 군대 확장에 따른 새로운 조종사 수요에 부응하도록 해야 합니다."
 ITA_reggianes_exports:0 "레지아네의 수출"
 ITA_reggianes_exports_desc:0 "레지아네 사는 공군 현대화를 추구하는 외국 군대의 주목을 받은 유능한 전투기 시리즈를 개발했습니다. 만약 그들이 항공기를 수출하도록 허용한다면, 기본 설계를 다른 사양에 맞게 수정하면서 얻는 경험은 의심할 여지 없이 우리 자체 개발 프로젝트에 매우 귀중할 것입니다."
 ITA_diving_bombers:0 "급강하 폭격기"
 ITA_diving_bombers_desc:0 "근접 항공 지원이라는 주제는 군사계에서 상당한 중요성을 얻었습니다. 오랫동안 항공기가 폭탄을 투하하는 데 사용되었지만, 몇몇 국가에서는 고고도에서 급강하하여 비할 데 없는 정확도로 폭탄을 투하할 수 있는 특수 항공기를 개발하기 시작한 것으로 보입니다. 우리 산업도 시간만 있다면 그런 항공기를 생산할 수 있겠지만, 바로 이 목적을 위한 설계를 가진 다른 나라들도 있습니다."
 ITA_superaereo:0 "Superaereo"
 ITA_superaereo_desc:0 "소규모 항공기 편대가 여기저기 날아다니던 시대는 오래전에 끝났습니다. 현대 공중전은 여러 면에서 지상 작전과 복잡성이 유사합니다. 따라서, 우리는 다양한 비행대대가 임무를 완수하기 위해 함께 행동할 수 있도록 조정할 전문 기획 참모가 필요합니다."
 ITA_officers_of_the_service_role:0 "군종 장교"
 ITA_officers_of_the_service_role_desc:0 "단순히 육군에서 장교를 데려와 비행술을 가르치는 것만으로는 더 이상 충분하지 않습니다. 우리 공군은 단순히 군종을 받아들이는 것이 아니라, 그 군종에 의해 길러지고 형성된 새로운 유형의 장교를 필요로 합니다."
 ITA_standardization:0 "표준화"
 ITA_standardization_desc:0 "공중전은 해전이나 지상전보다도 산업과 산업 간의 전쟁입니다. 오직 물량만이 결정적입니다. 나중에 설계를 변경하기가 더 어려워지더라도, 가능한 한 많은 항공기를 생산할 수 있도록 보장해야 합니다."
 ITA_specialization:0 "전문화"
 ITA_specialization_desc:0 "아무리 노력해도, 우리는 순수한 생산량 면에서 강대국들과 경쟁할 수 없을 것입니다. 공중에서 경쟁할 수 있는 유일한 방법은 다른 누구보다 더 나은 항공기를 만드는 것입니다. 각 항공기는 3대 1이나 4대 1로 수적 열세에 처하더라도 전투에서 이길 수 있어야 합니다."
 ITA_multirole_aircraft:1 "다목적 항공기"
 ITA_multirole_aircraft_desc:1 "전투에서 다양한 역할을 수행할 수 있는 기체를 개발함으로써 생산 비용과 승무원 훈련 시간을 크게 줄일 수 있습니다. 우리는 즉시 기술자들을 투입하여 이러한 다목적 기체를 설계하도록 할 것입니다."
 ITA_long_range_aircraft:0 "장거리 항공기"
 ITA_long_range_aircraft_desc:1 "적의 기지, 산업 시설, 보급선은 종종 전선 한참 뒤에 있습니다. 우리는 이러한 중요 목표에 도달하여 타격할 수 있도록 장거리 항공기를 개발하고 개선해야 합니다."
 ITA_fighter_designs:0 "전투기 설계"
 ITA_fighter_designs_desc:1 "전투기는 모든 공군의 중추입니다. 우리 전투기가 제공권을 장악하고 목표물로 향하는 폭격기를 보호할 수단을 갖추도록 보장해야 합니다."
 ITA_bomber_designs:0 "폭격기 설계"
 ITA_bomber_designs_desc:1 "새로운 폭격기 설계를 통해 우리 공군은 적군과 보급선을 위협하는 동시에 지상 및 해상 병력을 지원할 수 있게 될 것입니다."
 ITA_supremacy_in_the_skies:0 "제공권 장악"
 ITA_supremacy_in_the_skies_desc:1 "현대 군대는 강력한 공군의 지원 없이는 성공적으로 작전을 수행할 수 없습니다. 우리나라가 하늘을 지배하기 위한 최첨단 항공기와 기술을 보유하는 것이 무엇보다 중요합니다."
 ITA_naval_power_projection:0 "해군력 투사"
 ITA_naval_power_projection_desc:1 "선조들의 유산을 따라, 우리는 지중해에서 다른 어떤 해군보다도 이탈리아의 우위를 유지할 수 있는 강력한 해군을 개발하는 데 필요한 산업을 확보해야 합니다."
 ITA_intensify_torpedo_manufacturing:0 "어뢰 생산 강화"
 ITA_intensify_torpedo_manufacturing_desc:0 "이탈리아 어뢰는 세계에서 가장 신뢰할 수 있는 어뢰 중 하나입니다. 피우메는 어뢰의 발상지였으며, 그곳의 공장과 나폴리의 실루리피치오 이탈리아노 공장을 통해 우리는 이 치명적인 해군 무기의 사용을 더욱 확대할 수 있는 좋은 기반을 갖추고 있습니다."
 ITA_expand_naval_facilities:0 "해군 시설 확장"
 ITA_expand_naval_facilities_desc:0 "일류 해군은 강력한 전투 함대뿐만 아니라 이를 지원할 항구와 조선소도 필요합니다. 해군 기반 시설에 투자함으로써, 우리 해군은 전쟁 발발 시 필요한 기지와 건조 및 수리 능력을 갖추게 될 것입니다."
 ITA_oto_naval_guns:0 "OTO 함포"
 ITA_oto_naval_guns_desc:0 "이탈리아는 주력함의 대구경포를 안살도와 오데리-테르니-오를란도 회사에 의존하고 있습니다. 이들 회사의 생산 능력에 집중적으로 투자함으로써, 우리는 우리 전함을 세계의 부러움을 사는 존재로 만들 수 있습니다."
 ITA_improve_overseas_naval_bases:0 "해외 해군 기지 개선"
 ITA_improve_overseas_naval_bases_desc:0 "해외 영토의 항구를 개선하면 우리 해군이 성장하는 제국을 방어하고 적의 교역로를 위협할 수 있는 강력한 기반을 제공할 것입니다."
 ITA_milizia_marittima_di_artiglieria:0 "해안포 민병대"
 ITA_milizia_marittima_di_artiglieria_desc:0 "이탈리아는 광대한 해안선과 고립된 섬 항구를 가지고 있어 침공에 취약합니다. 해안 민병대를 개혁하고 해안 방어에 투자함으로써, 우리는 모든 침략자가 막대한 대가를 치르도록 할 수 있습니다."
 ITA_supermarina:0 "수페르마리나"
 ITA_supermarina_desc:0 "이탈리아 왕국 해군 총사령관을 위해 현대적인 작전 본부를 설립하여 지중해 전역과 그 너머에서 우리 해군 부대의 작전을 조율해야 합니다."
 ITA_stockpile_fuel:0 "연료 비축"
 ITA_stockpile_fuel_desc:0 "석유는 우리 함선의 혈관을 흐르는 피와 같아서, 이것이 없으면 함대는 활동 불능이 될 것입니다. 이탈리아는 상당한 국내 석유 공급이 부족하므로, 석유 저장 탱크를 건설하고 채워서 향후 분쟁으로 수입이 끊기더라도 우리 군을 유지하는 것이 중요합니다."
 ITA_forza_navale_especiale:0 "특수 해군"
 ITA_forza_navale_especiale_desc:0 "상륙 작전 수행 능력은 지중해의 어떤 분쟁에서도 매우 귀중한 것으로 증명될 것입니다. 상륙 작전을 위해 훈련되고 장비를 갖춘 특수 해군을 창설함으로써, 우리는 긴 지중해 해안선의 어느 지점에서든 해상에서 힘을 투사할 수 있게 될 것입니다."
 ITA_naval_air_coordination:0 "해공 협동 작전"
 ITA_naval_air_coordination_desc:0 "지금까지 공군 최고 사령부는 자체 교리를 따르며 해군과 제대로 협력하지 않았습니다. 이로 인해 이탈리아 왕국 해군의 효과적인 정찰 수행 능력이 제한되었습니다. 해공 합동 교리를 개발하고 해군과 공군 부대 간의 통신을 효율화함으로써, 우리 함선은 적을 더 잘 찾아내고 타격할 수 있을 것입니다."
 ITA_decima_flottiglia_mas:0 "제10 MAS 소함대"
 ITA_decima_flottiglia_mas_desc:0 "해군 공병대의 테세오 테세이와 엘리오스 토스키는 적 항구에 침투하는 데 사용할 수 있는 자체 추진 어뢰를 설계했습니다. 이 무기와 다른 독특한 무기들의 개발에 자금을 지원하고, 이를 사용할 특수 작전 부대를 훈련시킴으로써, 우리는 적에 대해 극적이고 예상치 못한 승리를 거둘 수 있을 것입니다."
 ITA_incrociatori_leggeri:0 "경순양함"
 ITA_incrociatori_leggeri_desc:0 "다른 경순양함과 교전하고 구축함을 쓸어버릴 만큼 빠르고 강력하면서도, 대량으로 건조할 만큼 저렴한 경순양함은 우리 해상 교통로를 보호하고 적 호송대에 전투를 거는 데 중요합니다. 콘도티에리, 몬테쿠콜리, 가리발디급에 대한 우리의 경험을 바탕으로, 우리는 유럽과 아프리카 사이의 바다를 지배할 순양함 부대를 창설할 수 있습니다."
 ITA_incrociatori_pesanti:0 "중순양함"
 ITA_incrociatori_pesanti_desc:0 "현재로서는 이탈리아의 산업 기반이 부족하여 우리가 필요로 하는 모든 곳에 동시에 배치할 만큼 충분한 수의 전함을 건조할 수 없습니다. 우리 차라급과 같은 강력하고 중무장한 순양함을 건조함으로써, 여러 작전 지역에 걸쳐 해상 통제권을 두고 다툴 함선을 확보할 것입니다."
 ITA_expand_naval_intelligence:0 "해군 정보부 확장"
 ITA_expand_naval_intelligence_desc:0 "이탈리아의 신호 정보부는 수년간 적은 예산으로 운영되어 왔으며, 조르조 베리타 포에타와 루이지 도니니의 상당한 재능에 의존해왔지만 이것만으로는 한계가 있습니다. 그들에게 더 많은 인력을 제공하고 엘리소 포르토 중위와 같은 새로운 인재를 영입함으로써, 우리는 적의 암호를 해독하고 적 부대의 위치를 발견할 가능성을 높일 것입니다."
 ITA_cooperation_programs:0 "협력 프로그램"
 ITA_cooperation_programs_desc:0 "우리의 견실한 조선 및 군수 산업은 그리스의 히드라급 구축함처럼 다른 국가들을 위해 군함을 건조하거나, 소련의 7호 계획함에 제공한 것과 같이 설계를 지원한 최근 이력이 있습니다. 유사한 기회를 모색하는 것은 앞으로 닥칠 시련에 대비하여 우리의 산업 기반을 더욱 발전시키는 데 도움이 될 것입니다."
 ITA_cruiser_submarines:0 "순양 잠수함"
 ITA_cruiser_submarines_desc:0 "지중해 외부에 있는 적의 해상 교통로를 공격하기 위해서는 대양을 누빌 수 있는 장거리 잠수함이 필요합니다. 주로 기술자 카발리니와 베르나르디스의 작업에 기반을 둔, 제1차 세계 대전 이후의 광범위한 잠수함 프로그램에 추가 지원을 제공하는 것은 이 목표를 달성하는 데 도움이 될 것입니다."
 ITA_midget_submarines:0 "소형 잠수함"
 ITA_midget_submarines_desc:0 "지중해의 맑은 바다는 대형 잠수함에게 위험합니다. 작고, 단거리이며, 저시인성인 잠수정을 건조하면 지중해 환경에서 생존 가능성을 높이고, 시칠리아 해협과 같은 중요한 병목 지점을 순찰하는 데 필요한 전력을 제공할 것입니다."
 ITA_cacciatorpediniere_di_scorta:0 "Cacciatorpediniere di Scorta"
 ITA_cacciatorpediniere_di_scorta_desc:0 "[GetAppropriateRegiaMarinaNsName]의 핵심 임무 중 하나는 이탈리아, 북아프리카, 그리고 우리 지중해 섬들 사이의 해상 교통로를 보호하는 것입니다. 대잠전에 중점을 둔 소형 구축함을 건조하고 승조원들을 효과적으로 훈련시킴으로써, 우리는 해외 주둔군에 대한 보급 흐름을 더 잘 유지할 수 있을 것입니다."
 ITA_ispettorato_dei_mezzi_antisommergibili:0 "Ispettorato dei Mezzi Antisommergibili"
 ITA_ispettorato_dei_mezzi_antisommergibili_desc:0 "마리안티솜을 대잠전 사령부로 창설하는 것은 우리 호위함들을 더 잘 조율할 수 있는 조직적 역량을 제공하고, 기술 혁신을 주도하여 적 잠수함과의 전투에서 우위를 점하게 해줄 것입니다."
 ITA_navi_da_battaglia:0 "Navi da Battaglia"
 ITA_navi_da_battaglia_desc:0 "리토리오급 전함은 주력함의 빠르고 강력한 표본입니다. 이 함선들을 더 많이 건조하고 이를 더 효과적으로 사용하기 위해 우리 교리를 개선하면, 우리의 전열을 상당히 강화할 것입니다."
 ITA_proper_carriers:0 "정규 항공모함"
 ITA_proper_carriers_desc:0 "루이지 가뇨토와 같은 혁신적인 설계자들은 지난 10년 동안 함대 항공모함 설계를 내놓았습니다. 이 전문 지식을 활용하고, 기존의 고속 여객선 로마의 선체에 새롭고 더 강력한 엔진을 장착하여 사용하면, 용골부터 새로 건조하는 것보다 더 빨리 운용 가능한 항공모함을 확보할 수 있습니다."
 ITA_refit_civilian_ships:0 "민간 선박 개조"
 ITA_refit_civilian_ships_desc:0 "정규 함대 항공모함이 훨씬 더 유능하지만, 항공모함을 빨리 원한다면 절차를 간소화해야 합니다. 렉스와 콘테 디 사보이아 같은 기존 여객선을 개조함으로써 우리 함대를 위한 공중 엄호를 신속하게 확보할 수 있습니다."
 ITA_flotta_d_evasione:0 "Flotta d'Evasione"
 ITA_flotta_d_evasione_desc:0 "너무 오랫동안 이탈리아는 해군에 대한 야망을 지중해와 홍해에 국한하는 데 만족해왔습니다. '돌파 함대'에 전념하고 대서양과 인도양을 위해 설계된 함선을 건조함으로써, 우리는 전 세계의 대양에 걸쳐 우리의 영향력을 행사할 수 있을 것입니다."
 ITA_ethiopian_war_logistics_bba:0 "에티오피아 전쟁 군수"
 ITA_ethiopian_war_logistics_bba_desc:0 "에티오피아에서의 진전 부족으로 보아, 현대 군대가 실제로 얼마나 많은 보급품을 필요로 하는지 우리가 과소평가했다는 것이 명백해지고 있습니다. 필요한 보급품이 전선에 도달할 수 있도록 동아프리카에 있는 우리 영토의 도로와 항구를 개선하기 위해 전념해야 합니다."
 ITA_the_abyssinian_fiasco:0 "아비시니아의 대실패"
 ITA_the_abyssinian_fiasco_desc:0 "우리의 에티오피아 침공은 재앙으로 변했습니다. 다시 한번, 우리는 이탈리아군이 에티오피아군을 극복하지 못하는 수치스러운 광경에 직면했습니다. 아두와에서의 우리 선조들처럼, 우리는 패배했습니다. 이 정도 규모의 패배가 이탈리아 파시스트 체제의 미래에 어떤 의미를 가질지 짐작만 할 수 있을 뿐입니다."
 ITA_solid_progress:0 "견고한 진전"
 ITA_solid_progress_desc:0 "우리는 전선을 과도하게 확장하거나 우리 군을 에티오피아의 반격에 노출시키지 않으면서 에티오피아에서 꾸준한 진전을 이루고 있습니다. 아직 승리를 거두지는 못했지만, 그것은 시간문제일 뿐입니다."
 ITA_struggle_in_ethiopia:0 "에티오피아에서의 고투"
 ITA_struggle_in_ethiopia_desc:0 "에티오피아에서의 우리 진전은 예정보다 훨씬 뒤처져 있지만, 이와 같은 사소한 차질이 우리의 사기를 꺾게 둘 수는 없습니다. 어떤 대가를 치르더라도 이탈리아의 군대와 파시스트 체제는 승리할 것입니다."

 ITA_undermine_the_duce:0 "두체 약화"
 ITA_undermine_the_duce_desc:0 "에티오피아를 정복하려는 무솔리니의 광적인 욕망은 우리를 다시 한번 패배의 벼랑 끝으로 몰고 갔습니다. 승리가 여전히 가능하긴 하지만, 이것이 무솔리니의 승리가 되지는 않을 것임은 분명합니다."
 ITA_conspiracies_in_the_shadows:0 "그림자 속의 음모"
 ITA_conspiracies_in_the_shadows_desc:0 "권력의 전당에서 속삭이는 목소리들이 무솔리니에 대한 불만을 점점 더 표출하고 있습니다. 보통은 공통점이 거의 없는 사람들 사이에 음모가 꾸며지고 동맹이 형성됩니다. 변화의 시간이 빠르게 다가오고 있습니다."
 ITA_servizio_informazione_militare:1 "Servizio Informazioni Militare"
 ITA_servizio_informazione_militare_desc:0 "우리 군은 작전을 계획하기 위해 정확한 정보가 필요합니다. 이를 위해 정보를 수집하고 분석하며, 필요하다면 선택된 목표에 대해 공세적인 조치를 취할 중앙 조직이 필요합니다."
 ITA_triumph_in_africa_bba:0 "아프리카에서의 승리"
 ITA_triumph_in_africa_bba_desc:0 "아드와의 치욕이 씻겨나갔습니다. 에티오피아인들의 손에 겪었던 굴욕 이후 약 40년 만에 마침내 복수했습니다. 우리 군은 의심의 여지 없이 그 능력을 증명했으며, 이제 전 세계는 우리의 힘을 인정해야만 합니다!"
 ITA_defeat_in_ethiopia_flag:0 "[ITA.GetNameDefCap]이(가) [ETH.GetNameDef]에서 패배했습니다"
 ITA_devaluate_the_lire:0 "리라화 평가절하"
 ITA_devaluate_the_lire_desc:1 "전쟁은 우리가 원했던 것보다 훨씬 더 많은 비용을 초래했습니다. 우리 경제는 그 후유증으로 어려움을 겪고 있습니다. 통화를 평가절하하면 국제 시장에서 우리 제품의 경쟁력이 높아지겠지만, 평범한 이탈리아인의 삶은 조금 더 힘들어질 것입니다. 이는 그들이 기꺼이 감수할 필요한 희생입니다."
 ITA_anglo_italian_agreements:0 "영국-이탈리아 협정"
 ITA_anglo_italian_agreements_desc:0 "동아프리카의 새로운 현실에 따라, 다른 식민 열강들은 우리와 타협해야 합니다. 우리는 그들이 수에즈 운하 통과를 허용하도록 해야 하지만, 그들은 우리를 훨씬 더 필요로 합니다. 만약 그들이 거부한다면, 우리는 다른 곳에서 지원을 찾아야 할지도 모릅니다."
 ITA_topple_amhara_rulers:0 "암하라 통치자 전복"
 ITA_topple_amhara_rulers_desc:0 "에티오피아는 대부분이 생각하는 것보다 훨씬 더 다양하고 분열된 국가입니다. 구 에티오피아 정권의 강력한 지지자가 아닌 집단이 많습니다. 그들에게 약간의 양보를 해주면 쉽게 우리 편으로 만들 수 있어, 이 지역을 평정하기가 훨씬 쉬워질 것입니다."
 ITA_the_new_emperor_of_ethiopia:0 "에티오피아의 새로운 황제"
 ITA_the_new_emperor_of_ethiopia_desc:0 "에티오피아 국민은 수세기 동안 황제의 통치 아래 살아왔습니다. 우리 국왕을 새로운 황제로 즉위시켜 그들의 옛 황제를 대체할 새로운 황제를 제시할 수만 있다면, 의심할 여지 없이 우리의 과업은 훨씬 더 간단해질 것입니다."
 ITA_ministero_della_cultura_popolare:0 "Ministero della Cultura Popolare"
 ITA_ministero_della_cultura_popolare_desc:0 "우리 국민은 항상 정확한 정보에 접근할 수 있어야 합니다. 전시에는 적대 세력이 쉽게 허위 정보를 퍼뜨릴 수 있으므로, 우리는 국민에게 실제 사건의 진실된 버전을 제공함으로써 이에 대응해야 합니다."
 ITA_culto_del_duce:0 "Culto del Duce"
 ITA_culto_del_duce_desc:0 "베니토 무솔리니, 아프리카의 정복자, 아드와의 복수자는 의심할 여지 없이 로마 황제 시대 이래 가장 중요한 이탈리아의 정치인입니다. 그는 두려움이 전혀 없는 남성성의 절대적인 정점입니다. 우리는 모든 이탈리아인이 인간으로서 가능한 한 무솔리니와 비슷해지기 위해 영원히 노력해야 한다는 것을 알도록 해야 합니다."
 ITA_devotion:0 "헌신"
 ITA_devotion_desc:0 "이탈리아 국민은 무솔리니에게 큰 빚을 졌습니다. 그는 순전히 의지력만으로 모든 의미 있는 방식으로 그들을 개선했습니다. 그들은 더 용감하고, 더 부유하며, 더 도덕적으로 완전한 사람이 되었습니다. 이탈리아 국민이 보답으로 할 수 있는 최소한의 일은 감사를 표하고 그의 명령을 따르는 것입니다."
 ITA_legge_bottai:0 "Legge Bottai"
 ITA_legge_bottai_desc:0 "로마의 예술과 문화는 유럽 모든 현대 문화의 기반이었습니다. 우리는 이 역사적인 보물들이 모더니즘에 의해 대체되는 것을 결코 허용할 수 없습니다. 이탈리아는 항상 미래를 바라봐야 하지만, 과거 또한 결코 잊어서는 안 됩니다."
 ITA_boost_the_grand_council_of_fascism:0 "파시즘 대평의회 강화"
 ITA_boost_the_grand_council_of_fascism_desc:0 "베니토 무솔리니는 이탈리아를 위해 많은 일을 했지만, 그는 최후의 순간에는 여전히 한낱 인간에 불과합니다. 만약 그가 나라를 잘못된 길로 이끈다면, 파시즘 대평의회가 그를 막기 위해 존재할 것입니다."
 ITA_to_live_as_a_lion:0 "사자처럼 살기"
 ITA_to_live_as_a_lion_desc:0 "이탈리아 국민은 양이 되기 위해 태어나지 않았습니다. 그들은 조용히 앉아 역사의 2선에서 만족하도록 만들어지지 않았습니다. 그들은 자신의 운명을 움켜쥐기 위해 태어났습니다! 베니토 무솔리니는 그들이 그렇게 하도록 만들고, 양으로 백 년을 사는 것보다 사자로 하루를 사는 것이 낫다는 것을 상기시켜 줄 사람입니다."
 ITA_la_battaglia_del_grano:0 "La Battaglia del Grano"
 ITA_la_battaglia_del_grano_desc:0 "식량을 타국에 의존하는 국가는 진정으로 위대하다고 할 수 없습니다. 우리가 진지하게 받아들여지려면 이탈리아는 기초 식량에서 독립해야 합니다. 이를 위해 우리는 다른 어떤 전투처럼 치열하게 싸워야 합니다. 오직 곡물 전투에서의 승리를 통해서만 전쟁에서의 승리를 바랄 수 있습니다."
 ITA_la_battaglia_per_la_terra:0 "토지 전투"
 ITA_la_battaglia_per_la_terra_desc:0 "강력한 파시스트 사회의 기반은 토지 그 자체와 그곳에서 일하는 사람들입니다. 이탈리아에는 아직 늪의 물을 빼고 농지에 관개하여 유용한 토지를 얻을 수 있는 지역이 많이 있습니다."
 ITA_la_battaglia_per_le_nascite:0 "출산 전투"
 ITA_la_battaglia_per_le_nascite_desc:0 "세계에서 우리의 정당한 자리를 차지하려면, 무력으로 그것을 쟁취할 군사력이 있어야 합니다. 이를 위해서는 병사가 필요합니다. 부부가 한두 명의 자녀를 갖는 것만으로는 충분하지 않습니다. 전쟁에서 승리하기 전에, 우리는 출산 전투에서 승리해야 합니다."
 ITA_strengthen_the_regime:0 "체제 강화"
 ITA_strengthen_the_regime_desc:0 "경제적 독립을 위한 전투들은 파시즘이 그 이전의 자유주의 체제처럼 약하고 무른 이념이 아님을 보여주었습니다. 우리는 국민이 이를 절대 잊지 않도록 해야 합니다."
 ITA_the_man_of_providence:0 "섭리의 인물"
 ITA_the_man_of_providence_desc:0 "무솔리니는 단순히 적시에 적소에 있었던 것이 아닙니다. 그가 이탈리아의 고삐를 쥐었을 때, 모든 발걸음은 마치 신의 뜻에 따라 인도되었습니다."
 ITA_believe_obey_fight:0 "믿고, 복종하고, 싸워라"
 ITA_believe_obey_fight_desc:0 "우리 당은 단순한 원칙 위에 세워졌습니다. 첫째, 권력을 잡으려면 그것이 가능하다고 믿어야 합니다. 둘째, 권력을 잡으려면 책임자에게 복종해야 합니다. 셋째, 권력을 잡으려면 싸워야 합니다. 그리고 권력을 잡는 것이야말로 그 이름에 걸맞은 모든 정치 운동의 유일한 진정한 목적입니다."
 ITA_banda_carita:0 "반다 카리타"
 ITA_banda_carita_desc:0 "전쟁이 항상 영광스러운 일은 아닙니다. 대중은 전선에서의 전투에 집중할지 모르지만, 우리는 후방 전선도 그만큼 중요하며 후방의 저항을 뿌리 뽑는 것 또한 그만큼 필요하다는 것을 알고 있습니다."
 ITA_banda_koch:0 "반다 코흐"
 ITA_banda_koch_desc:0 "현대전은 종종 민족 전체의 전쟁입니다. 이는 전선이 더 이상 전투가 일어나는 유일한 장소가 아님을 의미합니다. 우리는 또한 전투 부대를 사용하여 통신선을 확보할 준비가 되어 있어야 합니다."
 ITA_security_militias:0 "보안 민병대"
 ITA_security_militias_desc:0 "전선 부대를 후방 지역 보안에 투입하는 것은 훌륭한 병사들을 낭비하는 것입니다. 우리는 군의 후방을 경비하기 위한 부대를 특별히 편성하여, 더 많은 병사들이 적과 싸울 수 있도록 해야 합니다."
 ITA_battaglioni_d_assalto:0 "돌격대대"
 ITA_battaglioni_d_assalto_desc:1 "우리의 검은 셔츠단은 대전쟁의 돌격대라는 자랑스러운 전통을 잇고 있습니다. 그들을 우리 군에 통합함으로써, 우리는 전투에서 강력한 공격력을 부여할 것입니다."
 ITA_strengthen_the_blackshirts:0 "검은 셔츠단 강화"
 ITA_strengthen_the_blackshirts_desc:0 "왕립군은 구체제의 방식에 너무 얽매여 있으며, 파시스트적 열정이 부족하다는 점을 반복적으로 보여주었습니다. 우리에게 충성하는 검은 셔츠단으로만 구성된 사단 전체가 필요하다는 것은 분명합니다."
 ITA_milizia_coloniale:0 "식민지 민병대"
 ITA_milizia_coloniale_desc:1 "우리는 우리 체제에 충성하는 식민지의 징집병들을 더 많이 동원하여 우리의 파시스트 민병대인 검은 셔츠단을 강화하고 확장해야 합니다. 이탈리아 식민지 주민뿐만 아니라 현지 주민들 사이에서도 모집하면 그 수를 크게 늘릴 수 있을 것입니다."
 ITA_towards_a_greater_italy:0 "더 위대한 이탈리아를 향하여"
 ITA_towards_a_greater_italy_desc:1 "이탈리아의 실지회복주의는 대전쟁 이후 협상국에 의해 이탈리아 국민이 겪은 배신의 자연스러운 결과입니다. 정당하게, 이탈리아는 지중해를 완전히 지배해야 하며, 이를 위해 우리는 국경을 확장해야 합니다."
 ITA_heroes_of_the_nation:0 "국가의 영웅들"
 ITA_heroes_of_the_nation_desc:1 "우리는 국가의 위대한 영웅들의 공적을 인정하고 보상해야 합니다. 하지만 두체의 현명한 지도력이 없었다면 그들의 잠재력은 완전히 낭비되었을 것이라는 점을 잊어서는 안 됩니다."
 ITA_capo_supremo:0 "최고 수장"
 ITA_capo_supremo_desc:1 "이탈리아에는 우리 위대한 국가가 마땅히 누려야 할 영광과 권력을 가져올 수 있는 단 한 사람이 있습니다. 퇴폐적인 군주제의 시대는 끝났습니다. 이제 우리의 활기찬 두체께서 이탈리아의 최고 지도자가 될 때입니다."
 ITA_bend_the_bars:0 "창살을 부수어라"
 ITA_bend_the_bars_desc:1 "이탈리아는 대전쟁 이후 영국이 만든 감옥에 갇혀 있으며, 인구가 증가하고 국력이 강해질수록 감금으로 인한 고통은 더욱 심화될 것입니다. 이제 감옥의 창살을 구부리고 이탈리아의 지배력을 더욱 확장해야 할 때입니다."
 ITA_subdue_the_sentinels:0 "파수꾼 제압"
 ITA_subdue_the_sentinels_desc:1 "이탈리아 인민이 누려야 할 자유와 영광을 향한 다음 단계는 지중해의 감옥을 지키는 파수꾼, 즉 지브롤터와 수에즈를 제압하는 것입니다."
 ITA_a_colonial_empire:0 "식민 제국"
 ITA_a_colonial_empire_desc:1 "적과 경쟁자들의 방해에도 불구하고, 이탈리아는 강력한 식민 제국이 되었습니다. 우리는 영토를 최대한 활용하는 동시에 아프리카에서 이탈리아의 지배력을 계속해서 확장해야 합니다."
 ITA_by_blood_alone:0 "오직 피로써만"
 ITA_by_blood_alone_desc:1 "우리 군의 힘과 정권에 충성하는 이탈리아 실지회복주의자들의 무한한 열정 덕분에, 이탈리아는 마침내 역사의 연대기에 단순한 조연이 아닌 주역으로 이름을 새길 것입니다. \n오직 피만이 역사의 수레바퀴를 굴릴 수 있습니다!"
 ITA_masters_of_the_aegean:0 "에게 해의 지배자"
 ITA_masters_of_the_aegean_desc:1 "지중해를 장악하려면, 먼저 에게 해에 대한 이탈리아의 절대적 우위를 확보해야 합니다. 이를 통해 흑해와 발칸 해안 대부분의 접근로를 통제하고, 수에즈 운하를 확보할 새로운 해군 기지를 얻게 될 것입니다."
 ITA_masters_of_the_mediterranean:0 "지중해의 지배자"
 ITA_masters_of_the_mediterranean_desc:1 "국가의 힘은 그 해상 입지에 비례합니다. 우리 문명의 요람이었던 고대의 바다를 지배하는 것은 이탈리아 인민의 권리이므로, 이제 지중해의 완전한 통제권을 주장할 때입니다."

 ITA_convene_the_grand_council:0 "대평의회 소집"
 ITA_convene_the_grand_council_desc:0 "무솔리니의 처우를 논의하기 위해 파시즘 대평의회를 소집해야 합니다. 그의 최근 에티오피아 진출과 권력 및 책임 분담을 꺼리는 태도는 많은 이들로 하여금 그의 지도자적 역량에 의문을 갖게 했습니다. 그는 조국에 훌륭히 헌신했고 파시즘의 상징 그 자체이지만, 이제 새로운 지도부가 필요할 때일지도 모릅니다…"

 ITA_foreign_affairs:0 "외교"
 ITA_foreign_affairs_desc:1 "모든 강대국은 명확한 외교 정책 목표를 설정하고, 해당 목표를 달성할 수 있도록 외교를 수행할 훈련된 인재를 보유해야 합니다."
 ITA_balkan_ambition:0 "발칸의 야망"
 ITA_balkan_ambition_desc:1 "이제 이탈리아 국경을 동쪽으로 슬로베니아, 그리고 더 중요하게는 달마티아 해안까지 확장할 때입니다. 우리는 달마티아의 베네치아 문화유산을 강조하여, 과거 베네치아 통치가 달마티아인들에게 유익했을 뿐만 아니라 그들에게 널리 수용되었다는 점을 전 세계에 알릴 것입니다."
 ITA_potential_allies_in_the_balkans:0 "발칸의 잠재적 동맹국"
 ITA_potential_allies_in_the_balkans_desc:1 "발칸을 통제하기 위해 이 지역의 모든 국가를 예속시키고 지배할 필요는 없습니다. 외교를 통해 발칸에서 유익한 동맹을 확보한 후, 나머지를 굴복시킬 때입니다."
 ITA_albanian_occupation:0 "알바니아 점령"
 ITA_albanian_occupation_desc:1 "알바니아는 아군이 점령하기에 손쉬운 목표입니다. 큰 저항에 직면할 가능성은 낮습니다. 전 세계에 이탈리아의 위용을 과시하고 과거의 영광을 되찾아야 합니다!"
 ITA_albanian_oil:0 "알바니아 유전"
 ITA_albanian_oil_desc:1 "이제 알바니아의 구식 석유 채굴 장비를 교체하고, 국가를 완전히 장악했으니 강력한 석유 채굴 산업으로 전환할 때입니다."
 ITA_support_albanian_irredentism:0 "알바니아 실지회복주의 지원"
 ITA_support_albanian_irredentism_desc:1 "알바니아에 대한 이탈리아의 통치를 정당화해야 합니다. 코소보와 이피로스 지역, 나아가 그 너머까지 알바니아 실지회복주의를 지원하면 현지 주민들의 상당한 지지를 확보하고, 영향권을 더욱 확장할 기회를 얻게 될 것입니다."
 ITA_albanian_fascist_militia:1 "[GetAppropriateAlbanianFascistMilitiaName]"
 ITA_albanian_fascist_militia_default:0 "알바니아 파시스트 민병대"
 ITA_albanian_fascist_militia_alt:0 "레갈리테티 민병대"
 ITA_albanian_fascist_militia_desc:1 "알바니아에 이탈리아 검은 셔츠단의 새로운 분파를 창설하여, 이탈리아 식민지 주민뿐만 아니라 알바니아인 지원자도 반드시 모집할 것입니다."
 ITA_guarantee_austrian_independence:0 "오스트리아 독립 보장"
 ITA_guarantee_austrian_independence_desc:1 "오스트리아에 대한 독일의 간섭은 이탈리아 국가와 유럽의 세력 균형에 큰 위협이 되므로 용납할 수 없습니다. 우리는 오스트리아의 독립을 보장하고, 독일이 오스트리아에 영향력을 행사하려는 어떠한 외교적 책략에도 반대할 것입니다."
 ITA_negotiate_italian_claims:0 "이탈리아 영유권 협상"
 ITA_negotiate_italian_claims_desc:1 "독일에 대한 우리의 반대는 이탈리아와 독일 정권의 결별을 필사적으로 원하는 구 협상국에 대해 우리를 유리한 위치에 놓이게 했습니다. 우리는 이 상황을 우리에게 유리하게 이용하여 대전쟁 이후 우리에게 거부되었던 식민지를 되찾아야 합니다."
 ITA_peace_with_ethiopia_tt:1 "§Y[ETH.GetNameWithFlag]§!와의 평화 회담 이후:"
 ITA_ENG_must_control_necessary_states_tt:0 "§Y[ENG.GetNameWithFlag]§!이(가) 아프리카의 뿔과 몰타에 있는 역사적인 영국 식민지를 통제하고 있지 않습니다."
 ITA_FRA_must_control_necessary_states_tt:0 "§Y[FRA.GetNameWithFlag]§!이(가) 지부티와 튀니지에 있는 역사적인 프랑스 식민지를 통제하고 있지 않습니다."
 ITA_ratify_the_stresa_front:0 "스트레사 전선 비준"
 ITA_ratify_the_stresa_front_desc:1 "이제 이탈리아에 영토 할양이 이루어졌으므로, 이탈리아와 프랑스를 스트레사 전선이라는 군사 동맹으로 이끌 절차를 시작할 때입니다."
 ITA_joint_military_programs:0 "공동 군사 계획"
 ITA_joint_military_programs_desc:1 "군사 분야와 과학 분야는 밀접하게 관련되어 있으므로, 이탈리아와 새로운 동맹국 간의 협력을 증진해야 합니다."
 ITA_italys_destiny:0 "이탈리아의 운명"
 ITA_italys_destiny_desc:1 "우리는 이 동맹에서 이탈리아가 맡아야 할 역할, 즉 지중해의 최고 해상 강국이라는 역할을 확립해야 합니다. 이 목표를 달성하기 위한 다음 핵심 단계는 발칸반도에서의 지배력을 확보하는 것입니다."
 ITA_the_eastern_threat:0 "동방의 위협"
 ITA_the_eastern_threat_desc:1 "신흥 소비에트 연방이 우리뿐만 아니라 모든 서방 세력의 이익에 위협이 된다는 것은 공공연한 사실입니다. 우리는 소비에트 연방이 접근할 수 있는 가장 풍요로운 지역 중 하나인 흑해를 차단하여, 이 나라의 확장 능력을 마비시킬 것입니다."
 ITA_german_military_cooperation:0 "독일과의 군사 협력"
 ITA_german_military_cooperation_desc:1 "$ITA_german_millitary_cooperation_desc$"
 ITA_sea_wolves_bba:0 "바다의 늑대들"
 ITA_sea_wolves_bba_desc:1 "$ITA_sea_wolves_desc$"
 ITA_secret_weapons:0 "$secret_weapons$"
 ITA_secret_weapons_desc:0 "$secret_weapons_desc$"
 ITA_treaty_with_germany:0 "독일과의 조약"
 ITA_treaty_with_germany_desc:1 "$ITA_german_rd_treaty_desc$"
 ITA_request_control_of_french_territories:0 "프랑스 영토 통제권 요구"
 ITA_request_control_of_french_territories_desc:1 "$ITA_claims_on_france_desc$"
 ITA_befriend_japan:0 "일본과 친선 관계 수립"
 ITA_befriend_japan_desc:1 "$ITA_japan_friend_desc$"
 ITA_italian_irredentism:0 "이탈리아 실지 회복주의"
 ITA_italian_irredentism_desc:1 "우리의 파시스트 정권 덕분에 이탈리아 실지 회복주의는 대전쟁 이후 점점 더 공격적으로 변했습니다. 이제 이탈리아가 자연 국경에 도달하고, 이탈리아 민족에게 마땅히 속한 모든 영토를 통일할 때입니다!"
 ITA_war_with_france:0 "[FRA.GetName]에 대한 전쟁"
 ITA_war_with_france_desc:1 "$ITA_go_after_france_desc$"
 ITA_war_with_greece:0 "그리스와의 전쟁"
 ITA_war_with_greece_desc:2 "그리스를 포함하지 않는다면 우리가 건설하는 제국이 어찌 강력하다 할 수 있겠는가? 쉬운 목표가 될 것이다..."
 ITA_war_with_the_uk:0 "영국과의 전쟁"
 ITA_war_with_the_uk_desc:1 "$ITA_anti_uk_war_goals_desc$"
 ITA_befriend_greece:0 "그리스와 우호 관계 수립"
 ITA_befriend_greece_desc:1 "$ITA_greece_friend_desc$"
 ITA_claims_on_turkey_bba:0 "터키에 대한 영유권 주장"
 ITA_claims_on_turkey_bba_desc:1 "$ITA_claims_on_turkey_desc$"
 ITA_befriend_turkey:0 "터키와 우호 관계 수립"
 ITA_befriend_turkey_desc:1 "$ITA_turkey_friend_desc$"
 ITA_corpo_di_truppe_volontarie:0 "Corpo di Truppe Volontarie"
 ITA_corpo_di_truppe_volontarie_desc:1 "$ITA_support_nationalist_spain_desc$"
 ITA_spanish_italian_alliance:0 "스페인-이탈리아 동맹"
 ITA_spanish_italian_alliance_desc:1 "$ITA_spanish_italian_faction_desc$"
 ITA_demand_balearic_islands_bba:0 "발레아레스 제도 요구"
 ITA_demand_balearic_islands_bba_desc:1 "$ITA_demand_balearic_islands_desc$"
 ITA_befriend_portugal:0 "포르투갈과 우호 관계 수립"
 ITA_befriend_portugal_desc:1 "$ITA_portugal_friend_desc$"
 banda_carita_tt:0 "독일이 §Y$GER_assassinate_mussolini$§! 중점을 완료하는 것을 막습니다!"
 ITA_demand_ticino:0 "티치노 요구"
 ITA_demand_ticino_desc:0 "산악 국가인 스위스에는 다양한 민족이 살고 있지만, 그중에는 이탈리아인도 있으며, 이들은 주로 티치노와 같은 남부 주에 거주하고 있습니다. 위대한 이탈리아 국가를 확보하기 위해, 우리는 모든 우리 민족이 한 나라 안에서 살 수 있도록 보장해야 합니다."
 ITA_austrian_guarantees_tt:1 "독일이 안슐루스를 시도할 경우, 이탈리아는 개입할 수 있는 선택지를 얻게 됩니다."
 ITA_all_eth_initial_states_controlled_tt:0 "모든 초기 에티오피아 주를 §Y[ROOT.GetFlag][ROOT.GetNameDef]§! 또는 §Y[ROOT.GetAdjective] 동맹국§!이(가) 통제합니다."
 ITA_fronte_militare_clandestino_modifier_tt:0 "§Y$ITA_fronte_militare_clandestino_modifier$ (이탈리아)§! 추가 (§Y730§!일), 다음 효과 부여: \n   $MODIFIER_RESISTANCE_GROWTH_ON_OUR_OCCUPIED_STATES$: §G+10%§! \n   $MODIFIER_REQUIRED_GARRISON_FACTOR$: §R+15%§! \n\n"
 ITA_flotta_d_evasione_admiral_traits_tt:0 "무작위 제독 두 명이 §Y$bold$§! 특성을 획득합니다: \n- $MODIFIER_NAVAL_SPEED$: §G+10%§! \n- $MODIFIER_NAVAL_DAMAGE_FACTOR$: §G+5.00%§! \n\n"
 ITA_heroes_of_the_nation_general_traits_tt:0 "\n무작위 장군 세 명이 §Y$war_hero$§! 특성을 획득합니다: \n- $MODIFIER_UNIT_LEADER_PROMOTE_COST_FACTOR$: §G-50.0%§! \n- $MODIFIER_REASSIGNMENT_DURATION_FACTOR$: §R+50.0%§! \n\n"
 ITA_mussolini_becomes_field_marshal_tt:0 "$ITA_benito_mussolini$이(가) 원수가 됩니다."

 ITA_the_italian_liberation_war:0 "이탈리아 해방 전쟁"
 ITA_the_italian_liberation_war_desc:1 "파시스트에 맞서 봉기하여 그들의 병든 체제를 전복할 때가 왔습니다! 이탈리아 전역의 반파시스트 파르티잔들은 이 민족 해방 전쟁에서 싸우고 목숨을 바칠 준비가 되어 있습니다!"
 ITA_fronte_militare_clandestino:0 "Fronte Militare Clandestino"
 ITA_fronte_militare_clandestino_desc:1 "우리는 모든 이탈리아 도시의 저항군 조직과 군대에 소속된 비밀 군사 조직을 창설하여, 우리의 군사 작전과 전선 후방의 파르티잔 활동을 조율할 것입니다."
 ITA_corpo_volontari_della_liberta:0 "Corpo Volontari della Libertà"
 ITA_corpo_volontari_della_liberta_desc:1 "민족 해방 위원회는 더 많은 수의 파르티잔과 군대를 효율적으로 관리하고 조율하기 위해 우리의 군사 협력 기구인 자유 의용군단을 강화하기로 결정했습니다."
 ITA_the_carabinieri:0 "카라비니에리"
 ITA_the_carabinieri_desc:1 "파시스트 정권의 몰락에 카라비니에리가 기여한 역할 때문에, 그들은 이제 파시스트의 공격을 받고 있으며, 이로 인해 많은 이들이 이탈리아 저항 운동에 합류하고 있습니다. 우리는 이 부대들을 이탈리아 해방군단에 배속시켜야 합니다."
 ITA_gappisti:0 "Gappisti"
 ITA_gappisti_desc:1 "우리는 프랑스 레지스탕스와 유사하게 주로 도시에서 활동할 소규모 파르티잔 부대인 애국 행동단을 결성할 것입니다. 우리의 가피스티는 전선 후방에서 적을 강타하여 수비대의 사기를 꺾고 현지인의 지지를 얻을 것입니다."
 ITA_partisan_republics:0 "파르티잔 공화국"
 ITA_partisan_republics_desc:1 "우리는 파르티잔이 해방시킨 지역에 파르티잔 공화국 형태의 임시 국가 조직 결성을 장려하여, 저항군을 결집시키고 전선 후방에서 적을 교란할 것입니다."
 ITA_the_kings_finest:0 "국왕 정예병"
 ITA_the_kings_finest_desc:1 "우리는 이탈리아 왕실에 충성하는 장병들로 구성된 특별 사단을 창설하고, 이들을 우리 해방군의 정예로 훈련시킬 것입니다."
 ITA_grande_rivolta_rurale:0 "Grande Rivolta Rurale"
 ITA_grande_rivolta_rurale_desc:1 "이제 이탈리아 농민들이 우리의 대의에 동참하여 파시스트 압제자에 맞서 무기를 들 때입니다. 농촌 지역에서 적은 더 이상 버틸 수 없을 것입니다!"
 ITA_liberation_or_death:0 "해방이 아니면 죽음을!"
 ITA_liberation_or_death_desc:1 "우리는 파시스트의 압제로부터 이탈리아 인민을 해방시키기 위해 치열하게 싸워왔습니다. 우리는 막대한 손실을 견뎌냈지만 헛되지 않았습니다. 이제 이탈리아에서 파시즘을 완전히 뿌리 뽑기 위해 마지막 총력을 기울일 때입니다!"
 ITA_independence_rds:0 "이탈리아의 독립"
 ITA_independence_rds_desc:1 "소위 동맹국이라는 자들이 우리에게 가하는 이 굴종은 이제 끝입니다. 이제부터 이탈리아 민족은 스스로의 운명을 결정할 것입니다. 이 목표를 달성하기 위해 다시 한번 피를 흘려야 한다면, 자랑스러운 이탈리아 인민은 기꺼이 감수할 것입니다."
 ITA_the_italian_social_republic:0 "이탈리아 사회 공화국"
 ITA_the_italian_social_republic_desc:1 "이탈리아의 왕당파와 다른 반파시스트 세력들이 배신하여 우리 정권에 맞서 봉기했습니다. 우리는 당을 반군주주의 공화 파시스트당으로 개편하고, 이탈리아 파시스트 국가의 새로운 화신인 이탈리아 사회 공화국을 창설했습니다. 우리는 적의 공격에 저항하고 국토를 재통일할 것입니다!"
 ITA_guardia_nazionale_repubblicana:0 "Guardia Nazionale Repubblicana"
 ITA_guardia_nazionale_repubblicana_desc:1 "왕립 카라비니에리가 파시스트 정권 전복 시도에서 수행한 역할을 고려하여, 우리는 즉시 이 군대를 교체할 것입니다. 우리는 이미 검은 셔츠단을 재구성하고 경찰 및 군사 기능을 수행할 공화국 국가 방위대를 창설할 계획을 가지고 있습니다."
 ITA_integrate_polizia_dell_africa_italiana:0 "이탈리아령 아프리카 경찰 통합"
 ITA_integrate_polizia_dell_africa_italiana_desc:1 "이 부대들이 이탈리아와 우리 정권에 충성하는 동안 식민지 경찰을 통합해야 합니다. 파르티잔들이 곧 이 병력을 장악하려 할 것이 분명합니다..."
 ITA_anti_partisan_measures:0 "대파르티잔 조치"
 ITA_anti_partisan_measures_desc:1 "최근 적 파르티잔들이 이례적으로 활발하게 활동하며 우리의 예비군을 괴롭히고 보급선을 위협하고 있습니다. 우리는 대파르티잔전에 특화된 새로운 부대를 배치하여 이 저주받은 무리들을 저지해야 합니다."
 ITA_all_within_the_state:0 "모든 것은 국가 안에서"
 ITA_all_within_the_state_desc:1 "이 피비린내 나는 전쟁에서 승리하려면 모두가 전쟁 노력에 기여해야 합니다. 하지만 모든 것이 적과 직접 싸우는 것만은 아닙니다. 우리 전선은 병력만큼이나 강력한 산업과 군수 지원이 필요합니다."
 ITA_battaglioni_m:0 "M 대대"
 ITA_battaglioni_m_desc:1 "적의 공격을 저지하기 위해 새로운 정예 부대가 필요합니다. 전투에서 두각을 드러낸 검은 셔츠단 대대를 개편하고 강화하여, 이 병력으로 전선의 가장 취약한 지점을 보강하고 적을 원래 있던 곳으로 밀어내야 합니다."
 ITA_reinforce_the_gustav_line:0 "구스타프 방어선 강화"
 ITA_reinforce_the_gustav_line_desc:1 "적 부대의 진격을 막기 위해 방어선을 강화해야 합니다. 이탈리아 사회 공화국은 지금 흔들려서는 안 됩니다!"
 ITA_the_social_republic_prevails:0 "사회 공화국이 승리하리라!"
 ITA_the_social_republic_prevails_desc:1 "교활한 반역자 무리가 시작한 이 혹독한 전쟁에서 우리는 너무 많은 피를 흘렸지만, 이제는 이 전쟁을 끝낼 때입니다. 이탈리아 국가는 그 어느 때보다도 강력하게 다시 태어날 것입니다!"
 ITA_independence_rsi:0 "$ITA_independence_rds$"
 ITA_independence_rsi_desc:1 "$ITA_independence_rds_desc$"

