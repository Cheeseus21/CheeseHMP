 ITA_flotta_d_evasione_dockyards_tt:1 "\n§Y북아프리카§!, §Y이베리아 서해안§!, §Y프랑스 서해안§!의 특정 주들은 §Y[ROOT.GetFlag][ROOT.GetName]§! 또는 §Y[ROOT.GetAdjective]§! 괴뢰국에 의해 완전히 통제되는 한, §Y$dockyard$ 1개§!를 추가로 받게 됩니다."
