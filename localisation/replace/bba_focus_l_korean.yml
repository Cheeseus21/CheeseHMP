######################################################################

#########   Historical ####################
 SWI_swiss_guiding_principles:0 "스위스의 지도 원칙"
 SWI_swiss_guiding_principles_desc:0 "[ROOT.GetNameDefCap]는 대륙에서 가장 오래된 민주주의 국가로 서 있지만, 유럽의 급격한 변화 속도는 이를 위태롭게 하고 있습니다. 구스위스 연방과 1848년 헌법이 닦아놓은 길을 계속 가야 할까요, 아니면 새로운 길이 우리 앞에 나타날까요?"
 SWI_increase_defense_budget:0 "국방 예산 증액"
 SWI_increase_defense_budget_desc:0 "비록 대전쟁에서 중립과 주권을 유지하는 데 성공했지만, 과거의 영광에 안주할 수는 없습니다. 우리를 둘러싼 강대국 중 하나가 그들 사이에 구축된 요새를 우회하기 위해 우리나라를 침공할 실질적인 가능성이 있으며, 현재 예산으로는 이를 막기에 충분하지 않을 것입니다."
 SWI_national_defense_fund:0 "국방 기금"
 SWI_national_defense_fund_desc:0 "국방은 땀과 노력만으로 이루어지지 않으며, 최악의 상황에 대비하기 위해 장비 수입과 원자재 확보를 위한 자금도 필요합니다. [ROOT.GetAdjective] 시민들이 자발적으로 기부할 수 있는 기금을 설립하고 홍보하면 군사 예산 증액을 상쇄할 수 있으며, 이는 [ROOT.GetAdjective]의 참여적인 태도를 보여줄 것입니다."
 SWI_reaffirm_spiritual_defense:0 "정신적 국방 재확인"
 SWI_reaffirm_spiritual_defense_desc:1 "우리 연방은 1932년부터 주변에서 커져가는 권위주의의 위협에 대응하여 스위스의 국가적 가치를 수호하는 데 헌신해 왔습니다. 지금 그 위협은 그 어느 때보다도 크게 다가오고 있으므로, 우리는 우리의 삶의 방식을 물리적으로나 정신적으로 수호하겠다는 맹세를 새롭게 해야 합니다."
 SWI_fortify_border_with_germany:0 "독일 국경 요새화"
 SWI_fortify_border_with_germany_desc:0 "[GER.GetNameDefCap]은 [ROOT.GetAdjective] 연방의 생존에 실존적 위협이 됩니다. 만약 [GER.GetName]과 [FRA.GetName] 사이에 전쟁이 발발한다면, [GER.GetAdjective]은 [FRA.Getname]과의 중무장된 국경이나 [HOL.GetName] 및 [BEL.Getname]을 통과하는 대신 [ROOT.GetName]을 통과할 수 있습니다. 우리는 [GER.GetNameDef]을 저지하기 위해 양국 간에 요새를 건설할 수 있습니다."
 SWI_fortify_border_with_italy:0 "이탈리아 국경 요새화"
 SWI_fortify_border_with_italy_desc:1 "[ITA.GetAdjective]의 팽창주의적 야망은 언제든지 [ROOT.GetName]으로 번질 수 있습니다. 결국, 우리 인구의 상당 부분이 이탈리아어를 사용하며, [ITA.GetLeader]의 연설 한 번이면 [ROOT.GetName]은 그들의 표적이 될 것입니다. 우리는 그들에게 우리가 쉬운 상대가 아님을 보여주어야 합니다."
 SWI_fortify_border_with_france:0 "프랑스 국경 요새화"
 SWI_fortify_border_with_france_desc:2 "민주적 가치에 대한 헌신과 오랜 우호 관계에도 불구하고, [FRA.GetName]이 [GER.GetNonIdeologyName]이나 [ITA.GetNonIdeologyName]에 대한 기습 공격을 감행하기 위해 [ROOT.GetAdjective] 영토를 침범할 가능성을 무시할 수 없습니다."
 SWI_ban_foreign_nazi_propaganda:0 "외국 나치 선전 금지"
 SWI_ban_foreign_nazi_propaganda_desc:0 "이러한 외국의 선전 수단을 방치할 수 없습니다. 나치즘은 [ROOT.GetAdjective] 연방을 정의하는 모든 가치에 반합니다. 이러한 이유로, 우리처럼 민주주의와 관용을 바탕으로 세워진 국가에서는 나치즘을 용납할 수 없습니다. 그렇지 않으면 내부로부터 우리를 파괴하는 데 이용될 위험이 있습니다."
 SWI_buero_ha:0 "뷔로 하"
 SWI_buero_ha_desc:1 "우리가 이웃 국가에 대한 정보를 수집하려 한다는 사실을 그들이 알게 해서는 안 되므로, 우리의 비밀 작전을 수행하기 위해 반독립적인 정보 기관에 의존해야 합니다. 바로 이 지점에서 사진 사업가에서 첩보원으로 변신한 한스 하우자만이 등장합니다. 그의 작고 민첩한 정보국은 우리의 손을 더럽히지 않고 필요한 일을 해낼 수 있습니다."
 SWI_federal_police:0 "연방 경찰 정보부"
 SWI_federal_police_desc:0 "[ROOT.GetName]을 외부의 적으로부터 방어하면서 내부의 적에게 굴복하게 두는 것은 어리석은 일일 것입니다. 우리는 연방 경찰에 권한을 부여하여 국경 내의 잠재적 위협을 근절하고 우리 영토 내의 외국 세력으로부터 방어해야 합니다."
 SWI_spab_counter_intelligence_agency:0 "SpAb"
 SWI_spab_counter_intelligence_agency_desc:0 "우리는 [GER.GetNameDef]이 슈투트가르트에 '파노라마하임'이라 불리는 제5열 파괴 공작원 훈련소를 설립했다는 것을 알고 있습니다. 이것이 바로 우리가 이러한 위협에 대처하고 외국의 첩보 및 파괴 공작에 맞서 싸우기 위해 연방 경찰에 방첩(Spionage Abwehr) 부서를 신설하여 권한을 부여해야 하는 이유입니다."
 SWI_armed_neutrality:0 "무장 중립"
 SWI_armed_neutrality_desc:0 "우리의 오랜 중립은 [ROOT.GetAdjective] 정체성의 핵심적인 부분입니다. 그러나 중립만으로는 우리의 주권을 보장할 수 없습니다. 결국, 대전쟁에서 [BEL.GetNonIdeologyName]에 얼마나 도움이 되었습니까? 최선의 억제책은 온 국민이 무장하고 어떤 침략자에 맞서 싸울 준비가 되어 있는 것입니다."
 SWI_promote_guisan:0 "앙리 기장 진급"
 SWI_promote_guisan_desc:0 "우리의 정치 체제는 연방이 위험에 처한 극단적인 위기 상황에서만 단 한 명의 장군 겸 총사령관을 허용합니다. 지금이 바로 그런 상황 중 하나이며, 그 적임자는 명백합니다. 앙리 기장은 그 직책에 가장 적합한 인물일 뿐만 아니라, [ROOT.GetNameDef] 전역에서 폭넓은 인기를 누리고 있습니다."
 SWI_national_redoubt:0 "레뒤 나시오날"
 SWI_national_redoubt_desc:0 "앙리 기장은 [ROOT.GetName]을 방어하는 다른 방법을 제안하고 있습니다. 어떤 대가를 치르더라도 국경을 방어하려 애쓰는 대신, 전략적으로 스위스 고원을 내주고 알프스로 후퇴하여 적이 우리를 점령하는 데 막대한 대가를 치르게 할 수 있습니다."
 SWI_expedite_mobilization:0 "동원 가속화"
 SWI_expedite_mobilization_desc:0 "우리의 소규모 상비군의 역할은 [ROOT.GetName] 국민이 무기를 들고 우리 국방력의 주축인 시민 민병대를 조직하는 동안 적을 저지하는 것입니다. 따라서 상비군이 제압당할 위험을 줄이기 위해, 이들이 가능한 한 빨리 준비될 수 있도록 해야 합니다."
 SWI_fortify_the_jura:0 "쥐라 산맥 요새화"
 SWI_fortify_the_jura_desc:0 "알프스 산맥 요새화를 위해 많은 준비가 이루어졌지만, 쥐라 산맥 또한 요새화할 수 있습니다. 쥐라 산맥은 알프스만큼 가파르거나 방어에 용이하지는 않지만, 고원이 적의 수중에 넘어갔을 때 이를 공격하기 위한 제2 전선으로서 유리할 수 있습니다."
 SWI_rig_infrastructure_to_blow:0 "기반시설 폭파 준비"
 SWI_rig_infrastructure_to_blow_desc:0 "침략자들을 국경 안으로 들일 작정이라면, 모든 것을 순순히 내어줄 수는 없습니다. 적이 우리의 기반시설을 사용할 수 없도록 만들어, 그들의 진격을 늦추고 귀중한 자원을 소모하여 이를 대체하도록 강요하는 것이 무엇보다 중요합니다."
 SWI_emergency_industry:0 "비상 산업"
 SWI_emergency_industry_desc:0 "적이 우리 주를 침공하면 우리 스스로 산업 역량을 파괴해야 하므로, 남은 것을 가지고 재건하고 침략자들을 격퇴할 수 있는 예비책을 반드시 마련해야 합니다. 비밀 터널과 공장들이 우리 산과 계곡의 심장부를 채울 것이며, 일부는 국경 밖에 위치할 수도 있습니다."
 SWI_flood_the_valleys:0 "계곡 침수"
 SWI_flood_the_valleys_desc:0 "대규모 침공군이 콘스탄츠 호수 주변 지역을 통해 진격할 것으로 예상됩니다. 이곳은 운하와 제방을 설치하여 농지를 침수시키고 침입자들의 발을 묶기에 완벽한 장소입니다. 그들이 이 위험한 늪지대를 건너려 하는 동안, 우리는 이 기회를 이용해 가용 화력을 총동원하여 포격할 수 있습니다. 그들은 우리를 침공하려 한 것을 후회하게 될 것입니다."
 SWI_defend_the_skies:0 "제공권 방어"
 SWI_defend_the_skies_desc:0 "현대전은 제공권 우위와 공중 지원에 크게 의존합니다. [ROOT.GetName]은(는) 이러한 새로운 현실에 대비되어 있지 않으므로, 모든 칸톤이 적 항공기로부터 자국의 하늘을 방어할 수 있도록 준비해야 합니다."
 SWI_attack_from_the_mountains:0 "산악 공격"
 SWI_attack_from_the_mountains_desc:0 "알프스와 쥐라 산맥의 요새화된 진지에 배치되면, 계곡 아래의 적 부대를 유린할 수 있습니다. 적이 우리 영토에서 보내는 매 순간이 더 큰 인명과 물자 손실을 의미한다는 것을 확실히 각인시켜야 합니다."
 SWI_frontier_defense_plan:0 "국경 방어 계획"
 SWI_frontier_defense_plan_desc:0 "만약 적을 국경 안으로 들인다면 [ROOT.GetNameDef]은(는) 끝장입니다. 단 한 뼘의 영토도 내줄 수 없으며, 우리의 국경은 신성합니다. 따라서 국경을 요새화하고 방어할 준비를 갖춰야 합니다."
 SWI_fight_until_death:0 "결사항전"
 SWI_fight_until_death_desc:1 "승산은 우리에게 불리합니다. [ROOT.GetNAme]은(는) 수적으로 열세이고, 화력이 부족하며, 다가올 위협에 대한 준비가 미흡합니다. 따라서 모든 [ROOT.GetAdjective] 시민은 자신의 칸톤과 연방을 위해 목숨을 바칠 준비가 되어 있어야 합니다. "
 SWI_total_defense:0 "총력 방어"
 SWI_total_defense_desc:0 "총력전은 총력 방어를 의미합니다. 모든 민병대가 준비를 갖추고 침략자들에 맞서 모든 것을 바친다면, 우리에게 생존의 기회가 있을지도 모릅니다."
 SWI_the_army_position:0 "육군 진지"
 SWI_the_army_position_desc:0 "우리는 시민 민병대와 상비군을 [ROOT.GetName]의 국경에 배치할 것이므로, 침입자들을 저지하는 능력을 강화하기 위한 요새가 필요할 것입니다."
 SWI_prolonged_service:0 "복무 기간 연장"
 SWI_prolonged_service_desc:0 "현재의 의무 복무 기간은 장기전을 감당하기에 불충분합니다. 비록 일부 자유를 희생하더라도, 연방 정부에 시민들을 더 오래 무장시킬 수 있는 수단을 제공해야 합니다."
 SWI_enhanced_training:0 "강화 훈련"
 SWI_enhanced_training_desc:0 "[ROOT.GetName]이(가) 마지막으로 분쟁의 위험에 처했던 이래로 전쟁은 크게 변했습니다. 모든 유능한 시민이 받는 기초 훈련을 현대화하고 개선해야 합니다. 그들은 조국 방어에 있어 우리의 가장 큰 자산입니다."
 SWI_integrate_refugees_into_the_army:0 "난민의 군 편입"
 SWI_integrate_refugees_into_the_army_desc:1 "파시즘과 전쟁의 바다 한가운데에 있는 평화와 민주주의의 오아시스로서, 많은 이들이 안전한 피난처를 찾아 [ROOT.GetName](으)로 모여듭니다. 그들 중 일부는 자신들을 고향에서 쫓아낸 자들을 물리치기 위한 노력에 동참하기를 희망하며, 다수는 심지어 전문 군인입니다. 우리는 그들이 스위스와 더 나은 미래를 위한 싸움에 참여하도록 할 수 있습니다."
 SWI_expanded_military_support:0 "군사 지원 확대"
 SWI_expanded_military_support_desc:0 "우리의 민병대는 병사들로만 구성되어 있지 않으며, 잘 짜인 기계처럼 기능하기 위해서는 다른 많은 역할이 필요합니다. [ROOT.GetName] 방어에 성공하려면, 민병대를 위한 지원 중대를 모집, 훈련 및 보급해야 합니다."
 SWI_all_adults_training:0 "전 성인 훈련"
 SWI_all_adults_training_desc:0 "현재의 세계 정세에서 요행을 바랄 여지는 없습니다. 모든 유능한 성인은 어떠한 침략군에 맞서서라도 무기를 들 준비가 되어 있어야 합니다. 스위스는 우리 모두의 것이므로, 우리 모두가 지켜야 합니다."
 SWI_anti_tank_divisions:0 "대전차 사단"
 SWI_anti_tank_divisions_desc:0 "전차는 현대전의 창끝입니다. 우리 지형은 이미 전차에 대한 이점을 제공하지만, 우리 군에 대전차 장비를 보급한다면 그 창끝을 잘라내고 창을 무디게 만들 수 있을 것입니다."
 SWI_reduce_military_training_age:0 "징집 연령 인하"
 SWI_reduce_military_training_age_desc:0 "[ROOT.GetAdjective]인들은 보통 20세에 전투 훈련을 받기 시작하지만, 생존에 필요한 병력을 확보하기 위해 우리 시민들은 1년 일찍 훈련을 시작해야 합니다. 이것으로 충분하기를 바랍니다."
 SWI_veteran_sharpshooter_divisions:0 "숙련 저격수 사단"
 SWI_veteran_sharpshooter_divisions_desc:1 "수천 명의 숙련 저격수들이 보조병으로 군에 입대하여 조국과 민주주의 수호를 위해 자신의 역할을 다하겠다고 요청했습니다. 그들의 경험과 열정은 우리 민병대에 큰 힘이 될 것입니다."
 SWI_fortify_ticino:0 "포르테차 티치노"
 SWI_fortify_ticino_desc:0 "역사적으로 호전적인 세 나라 사이에 낀 중립국으로서, 죽음은 어느 쪽에서든 닥쳐올 수 있습니다. 우리는 경계를 늦출 수 없습니다. [ITA.GetName]은 [GER.GetNameDef]이나 [FRA.GetName]만큼이나 우리를 공격할 가능성이 있으며, 그들이 공격한다면 [846.GetName]을 통할 것입니다. 이것이 바로 우리가 [SWI.GetNameDef]을 위해 그곳을 뚫을 수 없는 요새로 만들어야 하는 이유입니다."
 SWI_fortify_sargans_gotthard_and_st_maurice:0 "자르간스, 고트하르트, 생모리츠 요새화"
 SWI_fortify_sargans_gotthard_and_st_maurice_desc:0 "우리 알프스산맥은 [ROOT.GetName]의 자랑이며, 이 불확실한 시기에 우리는 연방의 안전을 보장하기 위해 알프스를 요새화할 수 있습니다."
 SWI_defend_against_paratroopers:0 "공수부대 방어"
 SWI_defend_against_paratroopers_desc:0 "우리는 공수부대가 어떻게 모든 요새를 우회하고 모든 준비를 무용지물로 만드는지 보아왔습니다. 그들이 우리 방어선을 유린하기 전에 이들을 처리할 준비를 갖추는 것이 필수적입니다."
 SWI_expand_special_forces:0 "특수부대 확장"
 SWI_expand_special_forces_desc:1 "우리 상비군은 잘 준비되어 있지만, 다른 나라에 비해 극도로 작아서 [ROOT.GetName]의 방어를 우리에게 유리하게 이끌기에는 충분하지 않을 수 있습니다. [ROOT.GetAdjective]인들을 승리로 이끌기 위해 더 많은 특수부대가 필요할 것입니다!"
 SWI_purchase_german_planes:1 "[SWI_purchase_fascist_planes_name]"
 SWI_purchase_german_planes_default:0 "독일 항공기 구매"
 SWI_purchase_german_planes_alt:0 "파시스트 이웃 국가로부터 항공기 구매"
 SWI_purchase_german_planes_desc:0 "구식 공군을 보유하고 있으며, 항공기를 대량으로 생산할 산업과 기술이 부족하기에 우리는 이웃 국가로부터 구매하는 데 의존할 수밖에 없습니다. [GER.GetName]으로부터 필요한 항공기를 구매하는 것은 필요한 장비를 제공할 뿐만 아니라, 그들의 호의를 유지하는 데도 도움이 될 것입니다."
 SWI_ban_the_communist_party:0 "스위스 공산당 금지"
 SWI_ban_the_communist_party_desc:0 "공산당은 [SWI.GetNameDef]에 큰 위협이 됩니다. 우리와 [SOU.GetNameDef] 사이의 거리에도 불구하고, 그들의 혁명적 영향력이 공기 중에 느껴집니다. 이 위험한 시기에 국가를 불안정하게 만드는 위험을 감수할 수 없으므로, 우리 정부를 전복하고 약화시키려는 모든 정당을 신속하게 금지해야 합니다."
 SWI_withdraw_from_the_league_of_nations:0 "국제 연맹 탈퇴"
 SWI_withdraw_from_the_league_of_nations_desc:0 "국제 연맹 회원 자격은 우리가 [ROOT.GetName]에서 추구하는 중립과 양립할 수 없으므로, 이 죽어가는 조직을 버리는 것이 중요합니다. 또한 이웃 국가들에게 진정한 중립에 대한 우리의 의지를 보여주어, [ROOT.GetName]이 목표가 아님을 납득시키기를 바랍니다."
 SWI_limited_censorship_of_the_press:0 "제한적인 언론 검열"
 SWI_limited_censorship_of_the_press_desc:0 "[ROOT.GetName]을 노리는 세력은 우리를 침공하기 위해 무엇이든 정당화할 것입니다. 언론의 자유는 건강한 민주주의에 필수적이지만, 이웃 국가들의 야망에 빌미를 주지 않도록 당분간은 뒤로 미뤄야 합니다."
 SWI_tighten_press_censorship:0 "언론 검열 강화"
 SWI_tighten_press_censorship_desc:0 "실수의 여지는 없습니다. 단어 하나가 연방의 생존과 망각으로의 추락을 가를 수 있습니다. 자유 언론이 우리의 미래를 위태롭게 하도록 내버려 둘 수 없으며, [?SWI.SWI_biggest_fascist.GetNameDef]이 요구하는 방식대로 엄격하게 통제되어야 합니다."
 SWI_seek_trade_agreement_with_germany:0 "독일과의 무역 협정"
 SWI_seek_trade_agreement_with_germany_desc:0 "파시즘의 끔찍한 부상이 계속되고 있으며, 받아들이기 힘든 사실일지 모르지만, 어느 정도의 경제적 협력이 그들의 조준선에서 우리를 벗어나게 하는 데 필요할 수 있습니다."
 SWI_axis_gold:0 "추축국의 금"
 SWI_axis_gold_desc:0 "중립국이라는 것은 우리 시장이 모든 국가에 열려 있음을 의미하며, 이는 우리가 활용할 수 있는 이점입니다. [SWI_biggest_fascist.GetNameDef]에 우리 금 시장을 개방함으로써, 우리는 경제를 하나로 묶어 그들을 달래고 양국의 경제를 개선할 수 있습니다."
 SWI_spirit_of_resistance:0 "저항 정신"
 SWI_spirit_of_resistance_desc:0 "[ROOT.GetName] 국민의 마음과 정신은 우리의 생존을 위한 전투에서 가장 중요한 전선입니다. 우리는 모든 [ROOT.GetAdjective] 시민이 모든 것이 끝난 것처럼 보일 때에도 끝까지 싸울 준비가 되어 있도록 해야 합니다."
 SWI_pro_helvetia:0 "프로 헬베티아"
 SWI_pro_helvetia_desc:0 "[ROOT.GetName]의 정신적 방어를 위해서는 [ROOT.GetAdjective] 문화가 이웃 국가들과는 다른 단일하고, 분리할 수 없으며, 독특한 것으로 유지되어야 합니다. 이 새로운 조직인 프로 헬베티아는 우리의 민주주의와 깊이 연관된 공유된 스위스 가치를 보존하고 증진하며, 압도적인 위협에 맞서 우리의 생존을 보장할 것입니다."
 SWI_spirit_of_saint_bernard:0 "생베르나르의 정신"
 SWI_spirit_of_saint_bernard_desc:0 "예로부터 우리는 우리의 의료 전통과 도움이 필요한 사람들을 돕고자 하는 의지에 자부심을 가져왔습니다. 그랑 생베르나르 호스피스와 적십자사는 그 증거입니다. 이제 그 정신을 무기화하고 민병대에 재편성하여 우리의 방어 노력을 강화할 수 있습니다."
 SWI_adopt_romansh:1 "로만슈어 채택"
 SWI_adopt_romansh_desc:0 "[ROOT.GetName]은 탐욕스러운 이웃 국가들이 소유권을 주장할 수 있도록 [GER.GetAdjective], [FRA.GetAdjective], [ITA.GetAdjective] 지역으로 형성된 나라가 아닙니다. [ROOT.GetName]은 단일하고, 분리할 수 없는 다문화 국가입니다. 우리의 [ROOT.GetAdjective] 알프스 산맥에서만 사용되는 언어인 로만슈어를 채택하는 것은 언어에 상관없이 우리의 문화와 가치가 그들의 것과 다르다는 것을 보여줄 것입니다."
 SWI_patriotic_shooting_clubs:0 "애국 사격 클럽"
 SWI_patriotic_shooting_clubs_desc:0 "[ROOT.GetName]은 명사수 클럽과 대회의 오랜 전통을 가지고 있습니다. 우리 취미 사격수 중 일부는 다른 나라의 전문 저격수보다 더 뛰어난 실력을 갖추고 있습니다. 우리는 이 클럽들을 활용하고 민병대에 통합하여 방어 능력을 향상시킬 수 있습니다."
 SWI_aktion_nationaler_widerstand:0 "악치온 나치오날러 비더슈탄트"
 SWI_aktion_nationaler_widerstand_desc:0 "[ROOT.GetAdjective] 사회 각계각층에는 인구에 영향을 미치기 위해 비밀리에 협력하려는 소규모 민간인 집단이 있습니다. 그들의 목표는 패배주의와 싸우고, 단결을 고취하며, 침공 시 [ROOT.GetName]에서의 저항을 위한 기반을 마련하는 것입니다."
 SWI_heer_und_haus:0 "헤어 운트 하우스"
 SWI_heer_und_haus_desc:0 "스위스 국민, 즉 스위스 군대는 조국을 방어하기 위해 저항하고 싸우도록 내부로부터 격려받아야 합니다. 무엇이 위태로운지 상기시키기 위해, 프로 헬베티아는 악치온 나치오날러 비더슈탄트 그룹의 도움을 받아 그들이 [ROOT.GetAdjective]답게 생각하고 행동하도록 하는 열쇠입니다."
 SWI_ortswehren:0 "오르츠베렌"
 SWI_ortswehren_desc:0 "총력전은 모든 [ROOT.GetAdjective] 시민이 자신의 주를 방어할 준비가 되어야 함을 의미하지만, 모두가 우리 민병대에 합류할 수 있는 것은 아닙니다. 우리는 [SWI.GetName]을 방어하려는 민병대의 노력을 지원하기 위해 그들이 의지할 수 있는 중추 역할을 할 지역 경비대를 창설할 수 있습니다."
 SWI_luftschutz:0 "루프트슈츠"
 SWI_luftschutz_desc:0 "전쟁은 변했습니다. 공중은 새로운 전쟁의 영역이며, 우리는 그곳이 우리의 아킬레스건이 되도록 내버려 둘 수 없습니다. 민간인이 운용하는 지역 방공 부대를 창설하고, 공중 위협을 탐지하고 처리할 도구를 제공해야 합니다. 적들이 산 위로 넘어올 수 있다면 산을 방어하는 것은 의미가 없습니다!"
 SWI_train_swiss_women:0 "스위스 여성 훈련"
 SWI_train_swiss_women_desc:0 "만약 우리가 필사적으로 조국을 방어하고자 한다면, 인구의 절반을 우리의 노력에서 제외하는 것은 어리석은 일일 것입니다. [ROOT.GetAdjective] 여성들은 우리의 생존을 위한 싸움에 참여하도록 훈련받아야 합니다."
 SWI_ban_national_movement_for_switzerland:0 "스위스를 위한 국가 운동 금지"
 SWI_ban_national_movement_for_switzerland_desc:0 "파시스트들은 바퀴벌레처럼 사회의 구석구석에 숨어, 우리가 반대하기에는 너무 늦을 때까지 우리의 태만을 양분 삼아 힘을 키우는 경향이 있습니다. 더는 안 됩니다! 그들의 새로운 모습과 이름은 우리를 속이지 못할 것이며, 우리의 민주주의를 보존하려면 단호하게 타격해야 합니다."
 SWI_fortify_austrian_border:0 "오스트리아 국경 요새화"
 SWI_fortify_austrian_border_desc:0 "이제 오스트리아가 잠재적 적의 손에 들어갔으므로, 전쟁 시 적이 이용할 수 있는 열린 측면을 감수할 수 없습니다. [GER.GetNonIdeologyName]과의 국경과 마찬가지로, 우리는 이 전선을 요새화해야 합니다."
 SWI_seek_allied_trade:0 "연합국과의 무역 모색"
 SWI_seek_allied_trade_desc:0 "사방이 적인 상황에서, 우리는 생존을 위해 연합국과의 필수적인 무역을 확보해야 합니다. 운이 좋다면, 그들의 경쟁자와 더 긴밀한 무역을 추구함으로써 다른 이웃 국가들의 분노를 사는 것을 피할 수 있을 것입니다."
 SWI_case_north:0 "북부 작전"
 SWI_case_north_desc:0 "우리는 [?SWI.SWI_biggest_fascist.GetNameDef]에 대한 전쟁 가능성을 배제할 수 없으며, 이에 대비해야 합니다. 계획을 수립하고, 보급품을 할당하고, 참호를 파고, 병사들을 무장시켜야 합니다."
 SWI_freeze_german_assets:0 "독일 자산 동결"
 SWI_freeze_german_assets_desc:0 "수년 동안 [?SWI.SWI_biggest_fascist.GetNameDef]은 우리의 중립성과 은행 시스템의 허점을 이용하여 부당하게 얻은 부를 보호하고 경제를 유지해 왔습니다. 이것이 파장을 일으킬 것이 확실하더라도, 도덕적 의무가 절대적 중립보다 우선해야 할 것입니다."
 SWI_fund_resistance_groups:0 "저항 단체 자금 지원"
 SWI_fund_resistance_groups_desc:0 "유럽 국가들은 수 세기 동안 서로 분쟁하며 타 대륙의 민족들을 예속시켜 왔습니다. 우리 대륙의 끊임없는 전쟁으로 인한 희생자들을 돕고, 그들이 속박을 끊고 자신의 미래를 결정할 도구를 제공하는 것이 [ROOT.GetAdjective] 국민의 의무입니다."
 SWI_citizen_supply_mandate:0 "국민 보급령"
 SWI_citizen_supply_mandate_desc:0 "침공이 어떻게 전개될지 알 수 없으며, 설령 중앙 집중식 보급망에 의존할 수 있다 하더라도 이는 우리의 지휘 구조와 양립할 수 없습니다. 따라서 모든 [ROOT.GetAdjective] 가정은 자신들과 지역 민병대를 위해 최소 2개월분의 보급품을 자택에 비축해야 합니다."
 SWI_prepare_infrastructure_and_industry:0 "기반 시설 및 산업 준비"
 SWI_prepare_infrastructure_and_industry_desc:0 "국가 방위는 요새 건설에만 국한되지 않습니다. 병력과 민간 물자를 더 효율적으로 이동시키기 위해 알프스 산맥의 기반 시설을 강화해야 하며, 추가적인 발전을 위해 고원 지대에 더 큰 산업 기반을 마련해야 합니다."
 SWI_build_up_military_readiness:0 "군사 대비 태세 강화"
 SWI_build_up_military_readiness_desc:0 "스위스 국민을 대비시키는 임무는 끝이 없습니다. 침공의 위협이 사라지기 전까지, 그리고 어쩌면 영원히, 우리는 쉴 수 없습니다. 지체 없이 국가를 방어 준비 태세로 전환해야 합니다."
 SWI_support_active_militias_continuous_focus:0 "현역 민병대 지원"
 SWI_support_active_militias_continuous_focus_desc:0 "우리 시민들은 무장하여 지역 민병대에 배치되었습니다. 연방의 적들을 저지할 수 있도록, 가능한 모든 방법으로 그들을 지원하는 것이 나머지 모두의 의무입니다."

 SWI_rig_infrastructure_to_blow_TT:0 "우리의 핵심 주 중 하나가 적에게 점령당하면, 모든 §Y기반시설§!, §Y철도§!, §Y보급 허브§!, §Y벙커§!가 완전히 파괴됩니다. §Y군수 공장§!과 §Y민간 공장§!은 부분적으로 피해를 입습니다."
 SWI_create_anti_tank_template_TT:0 "§Y스위스 민병대 대전차§! 편제가 생성됩니다."

##### Submit to Germany #####

 SWI_closer_ties_with_germany:0 "[SWI_get_fascist_neighbor_cap]와(과)의 관계 강화"
 SWI_closer_ties_with_germany_desc:0 "북쪽에는 강력하고 위험한 이웃이 있습니다. 생존을 원한다면 그들의 호의를 얻는 것이 좋을 것입니다. 따라서 중립적 입장을 유지하면서 더 나은 관계를 모색하기 위해 그들에게 접근하는 것이 매우 중요합니다."
 SWI_panoramaheim_branch:0 "파노라마하임"
 SWI_panoramaheim_branch_desc:0 "슈투트가르트에는 '파노라마 하우스'라 불리는 집이 있으며, 그곳은 [ROOT.GetAdjective] 정부를 불안정하게 만들어 파시스트 주도 정권의 길을 열려는 목표를 가진 수많은 제5열 공작원들의 근원지였습니다."
 SWI_the_national_front:0 "국민 전선"
 SWI_the_national_front_desc:0 "국민 전선은 [ROOT.GetNonIdeologyName]의 주도적인 파시스트 정당으로, 이 민주주의 성향 국가에서 권력을 잡을 가능성이 가장 높은 세력입니다. 일부 고위 당원들은 이미 [GER.GetNameDef]와(과) 긴밀한 관계를 맺고 있어, 전쟁 발발 시 그들로부터 일종의 보호를 받을 수도 있습니다."
 SWI_infiltrate_federal_police:0 "연방 경찰에 침투"
 SWI_infiltrate_federal_police_desc:0 "외국의 선전과 비민주적 세력을 근절하는 임무를 맡은 연방 경찰은, 우리 파벌이 표적이 되는 것을 막기 위해 침투하기에 이상적인 장소입니다. 궁극적으로는 국가 안보를 명분으로 삼아 우리의 적들을 제거할 수도 있을 것입니다."
 SWI_the_petition_of_the_200:0 "200인의 청원"
 SWI_the_petition_of_the_200_desc:0 "[ROOT.GetAdjective] 파시즘과 권위주의를 대표하는 다양한 정당 소속 200명의 의원들이 의회에 청원을 제출했습니다. 그 내용은 국가 생존을 위해 [GER.GetNameDef]를(을) 받아들이고 협력하기 시작하자는 것입니다."
 SWI_case_west:0 "서부 계획"
 SWI_case_west_desc:0 "우리는 모든 가능한 시나리오에 대비해야 합니다. [FRA.GetName]은(는) [GER.GetNameDef]만큼이나 위협적이므로 그에 상응하게 대응해야 합니다. [FRA.GetAdjective]과의 전쟁에 대비해 군대와 국가를 준비시켜야 하며, 그렇지 않으면 [ROOT.GetNonIdeologyName]의 멸망을 감수해야 할 것입니다."
 SWI_german_industrial_investments:1 "[SWI_get_fascist_neighbor_adjective]의 산업 투자"
 SWI_german_industrial_investments_desc:0 "[?SWI.SWI_biggest_fascist.GetNonIdeologyName]의 산업력은 부인할 수 없습니다. 다가오는 전쟁에서 살아남으려면, 경쟁하고 지렛대로 활용할 우리만의 산업 기반이 필요합니다. 또한 [?SWI.SWI_biggest_fascist.GetNameDefCap]이(가) 우리에게 투자한다면, 그들이 [ROOT.GetNonIdeologyName]을(를) 온전하게 유지할 이유가 생길 것입니다."
 SWI_complete_siegfried_line:0 "지크프리트선 완공"
 SWI_complete_siegfried_line_desc:0 "[GER.GetNameDefCap]이(가) [FRA.GetName]을(를) 방어하기 위해 인상적인 방벽을 세웠으며, 우리 또한 그들을 상대로 방어해야 할 이유가 있습니다. 특히 우리가 [GER.GetNonIdeologyName]과(와) 더욱 긴밀하게 제휴하게 되면서, 상호 보완적인 방어 체계를 협력하여 구축해야 할 것입니다."
 SWI_military_exercises_with_germany:1 "[SWI_get_fascist_neighbor]와(과) 군사 훈련"
 SWI_military_exercises_with_germany_desc:0 "우리의 전통적인 민주적 가치에 대한 적대적인 성향에도 불구하고, [SWI_get_fascist_neighbor]은(는) 우리 자신을 방어할 때 귀중한 동맹이 될 수 있습니다. 더 나아가, 그들로부터의 침공 가능성을 줄여줄 것입니다."
 SWI_abandon_neutrality:0 "중립 포기"
 SWI_abandon_neutrality_desc:0 "유럽 전역에서 편이 갈리고 있습니다. 우리는 불의의 기습을 당할 수 없습니다. 유일한 해결책은 우리의 역사적인 중립 입장을 포기하고 [SWI_get_fascist_neighbor]의 보호를 구하거나, 진퇴양난에 빠질 위험을 감수하는 것입니다."
 SWI_promote_tobler:0 "토블러 등용"
 SWI_promote_tobler_desc:0 "[ROOT.GetAdjective] 의회에 선출된 유일한 파시스트 당원이자 국민전선의 지도자인 로베르트 토블러는 [ROOT.GetNonIdeologyName]을(를) 민주적 다원주의 국가에서 철권 통치하의 [SWI_get_fascist_neighbor_adjective] 동맹국으로 느리지만 꾸준히 전환시킬 명백한 후보입니다. 이는 물론 롤프 헨네를 당에서 제명하는 것을 의미합니다. 총통은 오직 한 명이어야 합니다."
 SWI_promote_henne:0 "헨네 등용"
 SWI_promote_henne_desc:0 "파시즘과 [SWI_get_fascist_neighbor]와의 협력을 강력히 지지하는 롤프 헨네는 국민전선과 [ROOT.GetName]을(를) [SWI_get_fascist_neighbor_adjective] 종속국으로 이끌 최고의 후보입니다. 이는 분명 우리의 안전과 생존을 포함한 이점을 가져올 것입니다. 물론 이는 로베르트 토블러가 필요한 조치를 취할 의사가 없으므로 그를 당에서 제명하는 것을 의미합니다."
 SWI_propagandize_swiss_military_tradition:0 "스위스 군사 전통 선전"
 SWI_propagandize_swiss_military_tradition_desc:0 "지금은 우리의 민주적인 과거를 회상할 때가 아닙니다. 대신, 우리는 우리의 상무적 전통에 집중해야 합니다. [ROOT.GetAdjective] 보병과 석궁병은 그들의 규율과 효율성으로 명성이 높았고, 전 세계에서 탐내는 용병으로 고용되었습니다. 다가오는 전쟁에서 살아남으려면, 우리 국민에게 그들의 군사적 역사를 상기시켜야 합니다."
 SWI_ban_democratic_party:0 "민주 정당 금지"
 SWI_ban_democratic_party_desc:0 "우리의 민주 정당들은 [SWI_get_fascist_neighbor]에 대한 우리의 접근을 위태롭게 하고 있습니다. 우리가 그들의 편에 더 다가서려면, 몇 년 전에는 상상도 할 수 없었던 일, 즉 우리의 민주 정당들을 제거해야만 합니다. 이것이 우리가 치러야 할 희생이라면, 그렇게 해야 합니다."
 SWI_centralize_switzerland:0 "스위스 중앙집권화"
 SWI_centralize_switzerland_desc:0 "우리가 나아가고 있는 [ROOT.GetNonIdeologyName]은(는) 거의 한 세기 동안 유지해 온 옛 스위스 연방과는 거리가 멉니다. 우리는 더 이상 연방이 아니라, 권력이 위에서부터 나와 대중에게 스며드는 중앙집권화된 국가가 될 것입니다."
 SWI_german_military_collaboration:1 "[SWI_get_fascist_neighbor_adjective] 군사 협력"
 SWI_german_military_collaboration_desc:0 "우리 군이 현대 세계에서 번창하기 위해 필요한 전쟁 경험이 부족합니다. 바로 이 지점에서 [?SWI.SWI_biggest_fascist.GetName]이(가) 필요합니다. 그들의 군대는 무시할 수 없는 세력이며, 그들과 협력하면 우리 자신을 방어하고, 심지어 다른 국가를 선제적으로 공격할 수도 있을 것입니다."
 SWI_join_the_axis:0 "추축국 가입"
 SWI_join_the_axis_desc:0 "바로 이겁니다. 이것이 다가오는 폭풍 속에서 [ROOT.GetNonIdeologyName]의 생존을 건 우리의 도박입니다. 우리는 [?SWI.SWI_biggest_fascist.GetName] 세력의 깃발 아래 그 폭풍에 합류할 것입니다. 우리가 올바른 선택을 했기를 바랍니다."
 SWI_become_german_puppet:1 "[SWI_get_fascist_neighbor_adjective] 괴뢰국 되기"
 SWI_become_german_puppet_desc:0 "헨네는 이 순간을 위해 그의 경력을 바쳤습니다. 일종의 [ROOT.GetNonIdeologyName]만의 안슐루스입니다. 비록 우리가 오랜 주권을 잃더라도, 그들의 떡고물이라도 얻을 수 있을지 모릅니다. 이것이 우리의 파멸을 의미하지 않기만을 바랄 뿐입니다."
 SWI_ask_for_vorarlberg:0 "[848.GetName] 요구"
 SWI_ask_for_vorarlberg_desc:0 "우리가 한동안 [?SWI_fascist_overlord.GetName]의 비호 아래 있으면서 충성심을 증명했으니, 이제 그들이 마땅히 우리 것인 영토를 우리에게 맡길 때입니다. [848.GetName]은(는) [ROOT.GetNonIdeologyName]이(가) 민주 연방이었을 때 우리에게 합류하기로 투표했으므로, 현재의 우리 체제에 합류하고 싶어 할 것이 틀림없습니다."
 SWI_size_and_opinion_chance_tooltip:0 "\n그들은 우리 군대의 §Y규모§!와 우리에 대한 그들의 §Y우호도§!에 따라 수락할 가능성이 더 높아집니다."
 SWI_request_austrian_occupation:0 "[AUS.GetAdjective] 점령지 요청"
 SWI_request_austrian_occupation_desc:0 "[ROOT.GetNonIdeologyName]이(가) [848.GetName]을(를) 합병한 것은 결코 우리의 최종 형태가 아닙니다. 우리는 더 넓은 영토의 행정을 처리할 수 있음을 [?SWI_fascist_overlord.GetName]에게 증명하여, 그들의 부담을 덜어주고 [ROOT.GetFactionName]을(를) 더 효율적인 전쟁 기계로 만들 수 있습니다."
 SWI_request_italian_alps_occupation:0 "[ITA.GetAdjective] 점령지 요청"
 SWI_request_italian_alps_occupation_desc:0 "우리나라의 일부가 [ITA.GetAdjective] 사용 시민으로 구성되어 있으므로, 우리는 [ITA.GetName]을(를) 원활하게 관리하고 그곳의 인력과 자원을 활용하여 이 전쟁을 완수하기 위한 노력을 계속할 수 있습니다."
 SWI_request_french_alps_occupation:0 "[FRA.GetAdjective] 점령지 요청"
 SWI_request_french_alps_occupation_desc:0 "[FRA.GetNonIdeologyName]은(는) 여러 세대에 걸쳐 우리 땅을 탐내 왔습니다. 이제 우리가 그들의 영토를 장악하고 양국의 미래를 위해 관리할 수 있는 위치에 있다는 것은 당연한 일입니다."
 SWI_the_alpine_supremacy:0 "알프스 패권"
 SWI_the_alpine_supremacy_desc:1 "[SWI.GetNonIdeologyName], 외교의 영역에 존재했던 온순하고 방향성 없던 국가는 더는 존재하지 않습니다. 이제 우리는 알프스와 그 너머의 민중에 대한 지배권을 상징하는 알프스 패권국으로 알려질 것입니다."

 SWI_professionalize_militias:0 "민병대 전문화"
 SWI_professionalize_militias_desc:0 "현 상황을 고려할 때, 예비군으로 구성된 임시 민병대로는 충분하지 않습니다. 다가올 분쟁에 대비하여 모든 가용 인력을 훈련시켜 두려움의 대상이 될 전문 군대로 만들어야 합니다."
 SWI_modernize_airforce:0 "공군 현대화"
 SWI_modernize_airforce_desc:0 "현대전은 전장에서 일어나는 일뿐만 아니라, 그 위, 즉 우리가 방어하고 지배하고자 하는 드넓은 창공에서 일어나는 일에 의해서도 정의된다는 것이 이제 명백합니다."
 SWI_swiss_airplane_designs:0 "스위스 항공기 설계"
 SWI_swiss_airplane_designs_desc:0 "우리가 하늘을 제패할 수 있게 해주는 기계류를 이웃 국가에 의존할 수는 없습니다. 그들이 순순히 자신들의 패배를 초래할 도구를 제공해 줄 것이라고 믿을 수 없기 때문입니다."
 SWI_license_axis_plane_designs:0 "추축국 항공기 설계 면허 생산"
 SWI_license_axis_plane_designs_desc:0 "하늘로 진출할 가장 빠른 방법은 파시스트 국가로부터 항공기 설계를 조달하는 것입니다. 오직 그들만이 전투에서 진정으로 승리하는 것이 무엇인지 우선순위를 정하는 데 필요한 최근의 전투 경험을 가지고 있으며, 이는 우리를 그들과 더 가깝게 만들어, 잠재적으로 그들의 침공을 억제할 수 있을 것입니다."
 SWI_airspace_surveillance:0 "영공 감시"
 SWI_airspace_surveillance_desc:0 "[ROOT.GetName]과 그 산악 지대를 방어하려면, 적을 찾기 위해 하늘을 계속 주시해야 합니다. 새로운 도구는 적을 찾아내어 우리 전투기와 대공포의 조준선에 올려놓을 수 있게 해줄 것입니다. "

 SWI_professionalize_militias_TT:2 "모든 §Y스위스 시민 민병대§! 사단이 §Y정규 보병§! 사단으로 전환되고 §Y$SWI_military_readiness_decisions_category$§! 결정이 비활성화됩니다."
 SWI_neutrality_decisions_disabled_TT:0 "§Y$SWI_absolute_neutrality_decisions_category$§! 결정이 비활성화됩니다."
 SWI_has_fascist_neighbor_trigger_TT:0 "적합한 파시스트 이웃 국가 보유"

 SWI_crack_down_on_dissent:0 "반체제 인사 단속"
 SWI_crack_down_on_dissent_desc:0 "우리 사회의 작은 균열 하나가 [ROOT.GetAdjective] 정부의 붕괴로 이어질 수 있는 시기에 [ROOT.GetNonIdeologyName]은 분열될 수 없습니다."
 SWI_military_police:0 "헌병"
 SWI_military_police_desc:0 "오랜 역사를 지닌 우리의 연방 기관만으로는 이 불확실한 시기에 필요한 질서를 유지하기에 충분하지 않습니다. 우리의 통합을 유지하고자 한다면 헌병이 필요할 것입니다."
 SWI_expand_federal_police_intelligence:0 "연방 경찰 정보부 확장"
 SWI_expand_federal_police_intelligence_desc:0 "적은 그림자 속에 숨어 있으며, 우리 국민의 모습을 포함하여 어떤 형태로든 나타날 수 있습니다. 이것이 바로 연방 경찰 정보부가 어디에 있든 반체제 세력을 분쇄할 수 있는 도구를 갖추어야 하는 이유입니다."
 SWI_martial_law:0 "계엄령"
 SWI_martial_law_desc:0 "어떤 상황은 메스를 필요로 하지만, 지금은 그런 시기가 아닙니다. [ROOT.GetNameDef]은(는) 적과 국민을 통제 하에 둘 수 있는 믿음직한 망치가 필요합니다."
####### Weapons Industry Sub Branch ####### 
 
 SWI_expand_weapons_industry:0 "무기 산업 확장"
 SWI_expand_weapons_industry_desc:0 "우리의 빈약한 군수 산업 역량으로는 총력전에서 충분하지 않을 것입니다. 현대전은 마지막까지 총알이 떨어지지 않는 쪽이 승리하므로, 우리는 전쟁 장비를 더 빠르고 더 오랫동안 생산할 수 있도록 해야 합니다."
 SWI_swiss_armored_divisions:0 "스위스 기갑사단"
 SWI_swiss_armored_divisions_desc:0 "역사적으로 우리는 뛰어난 보병을 보유한 것을 자랑스러워했지만, 적의 거대한 기갑 부대와 싸우기에는 그것만으로는 부족합니다. 우리는 우리만의 기계화된 괴물을 만들어야 합니다."
 SWI_alpine_specialization:0 "산악 전문화"
 SWI_alpine_specialization_desc:0 "그 어떤 국가보다도 우리는 산악 전통을 받아들여, 다른 누구와도 비교할 수 없이 산악 지대에서 방어하고 공격할 수 있는 막을 수 없는 부대를 훈련시킬 수 있습니다. 그들은 적을 쓸어버릴 눈사태가 될 것입니다."
 SWI_tank_development:0 "전차 개발"
 SWI_tank_development_desc:0 "새롭고 개선된 전차 개발에 경계를 늦출 수 없습니다. 그렇지 않으면 쓸모없고 구식인 강철 거북이에 강철을 낭비할 위험이 있습니다."
 SWI_mechanized_support:0 "기계화 지원"
 SWI_mechanized_support_desc:0 "우리 병사들은 그 어느 때보다 빠르게 전장에 도착해야 하며, 그들이 필요로 하는 지원도 마찬가지입니다. 그렇지 않으면 그 모든 신속함이 수포로 돌아갈 것입니다."
 SWI_artillery:0 "스위스 포병"
 SWI_artillery_desc:0 "우리 군이 진격할 때 적들에게 포탄의 비를 내리게 하십시오. 포병은 [ROOT.GetNonIdeologyName]이(가) 산악에서 방어하고 가장 효과적인 방식으로 전진하여, 납탄의 소나기 아래 저항 세력을 분쇄할 수 있게 할 것입니다."
 SWI_industrial_production:0 "산업 생산"
 SWI_industrial_production_desc:0 "우리는 후방을 무시할 수 없습니다. [ROOT.GetNonIdeologyName]의 칸톤에 있는 모든 건장한 이들은 우리의 전쟁 기계를 위해 기꺼이 자신을 희생해야 합니다."
 SWI_swiss_heavy_planes:0 "스위스 중형 항공기"
 SWI_swiss_heavy_planes_desc:0 "[ROOT.GetNonIdeologyName]의 기지에서부터, 그러한 임무에 필요한 중형 항공기가 있다면 먼 땅으로 작전을 개시할 수 있습니다. 하지만 먼저 그것들을 설계해야 합니다."
 SWI_air_research:0 "항공 연구"
 SWI_air_research_desc:0 "적의 발전에 뒤처지지 않고 궁극적으로 제공권을 장악하려면, 새로운 항공 기술의 연구 개발을 강화할 준비가 되어 있어야 합니다."
 SWI_air_production:0 "항공기 생산"
 SWI_air_production_desc:0 "비행할 항공기 설계도를 갖는 것은 퍼즐의 첫 조각에 불과합니다. 다음 조각은 지상과 하늘의 적과 싸우기 위해 항상 조종사들을 공중에 띄울 수 있도록 충분히 생산하는 것입니다."
 SWI_mountaneer_paratroopers:0 "산악 공수부대원"
 SWI_mountaneer_paratroopers_desc:0 "[ROOT.GetNonIdeologyName]은(는) 장엄한 봉우리들로 전 세계에 알려져 있으며, 우리 인구 중 다수가 산을 고향으로 삼고 있습니다. 우리는 이 이점을 활용하여 우수한 공수부대원을 훈련시킬 수 있습니다. 이들은 외국의 하늘에서 강하하여 [ROOT.GetNameDef]의 영광을 위해 외국의 산을 차지할 수 있는 부대입니다."

####### Allied/Aggrocratic ####### 
 
 SWI_purchase_american_planes:1 "[SWI_purchase_democratic_planes_title]"
 SWI_purchase_american_planes_usa:0 "미국 항공기 구매"
 SWI_purchase_american_planes_other:0 "민주주의 국가로부터 항공기 구매"
 SWI_purchase_american_planes_desc:0 "우리 공군은 효과적으로 방어하는 데 필요한 수와 기술이 부족하므로, 장비를 조달하기 위해 다른 곳을 찾아봐야 합니다. [SWI_purchase_american_planes_second_paragraph]"
 SWI_american_planes_desc_usa:0 "다른 국가에서 항공기를 구매해야 한다면, 민주주의 전통, 상대적 중립성, 그리고 뛰어난 항공 공학 기술을 갖춘 [USA.GetNameDef]이(가) 이상적인 후보입니다."
 SWI_american_planes_desc_other:0 "항공기 몇 대 때문에 우리의 민주적 가치를 타협할 수는 없으므로, 다른 민주주의 국가에서 장비를 조달하는 것이 중요하며, [?SWI.SWI_best_dem_ally.GetNameDef]이(가) 최선의 선택인 것 같습니다. "
 SWI_allied_gold:0 "연합국의 금"
 SWI_allied_gold_desc:0 "현재 정세를 둘러싼 대혼란과 제재로 금 거래가 더욱 제한적이고 어려워졌지만, 우리의 중립적인 입장을 통해 다른 민주주의 국가들과의 금 거래를 늘릴 가능성을 열 수 있습니다. 이는 파시즘을 저지하기 위해 민주주의 경제를 지탱하는 것입니다."
 SWI_closer_democratic_ties:0 "더 긴밀한 민주적 유대"
 SWI_closer_democratic_ties_desc:0 "독재가 유럽에 그림자를 드리우는 지금, 우리는 스스로를 지킬 수 없을지도 모릅니다. 하지만 다른 민주주의 국가들과 협력함으로써 그 진격을 막을 수 있을 것입니다. 첫 번째 단계는 그들과 더 긴밀한 관계를 모색하고 우리가 대의에 기여할 수 있음을 증명하는 것입니다."
 SWI_connect_to_the_maginot_line:0 "마지노선에 연결"
 SWI_connect_to_the_maginot_line_desc:0 "전쟁의 바람이 [FRA.GetName]을 향해 불고 있으며, 적들이 이른바 마지노선을 공격해야 할 가능성이 큽니다. 이는 [?SWI.SWI_biggest_fascist.GetNonIdeologyName]이 우리를 침공하여 이를 우회하려는 유혹에 빠질 수 있으므로 우리를 위험한 상황에 처하게 합니다. 이것이 우리가 [FRA.GetName]과 협력하여 공동 전선을 구축해야 하는 이유입니다."
 SWI_american_industrial_investments:0 "미국의 산업 투자"
 SWI_american_industrial_investments_desc:0 "대전쟁은 [USA.GetAdjective]의 산업력이 어떤 전세든 자신들에게 유리하게 바꿀 수 있다는 것을 명확히 보여주었습니다. 만약 우리가 그들에게 접근하여 산업 투자를 확보한다면, 우리는 우리 자신의 입지를 강화하고 우리의 독립을 지키는 것이 그들의 최선의 이익에 부합하도록 만들 수 있습니다."
 SWI_take_a_stance:0 "입장 표명"
 SWI_take_a_stance_desc:0 "파시스트 [?SWI_biggest_fascist.GetNonIdeologyName]은 가장 역겹고 비참한 정치 체제를 가지고 있습니다. [?SWI_biggest_fascist.GetNameDefCap]은 새로운 [ROOT.GetName]의 불구대천의 원수입니다. 이것이 우리가 어떤 수단을 써서라도 우리의 입장을 분명히 하고 민주주의를 수호해야 하는 이유입니다."
 SWI_join_france:0 "프랑스에 합류"
 SWI_join_france_desc:0 "항상 우호적인 관계는 아니었지만, [ROOT.GetName]과 [FRA.GetName]은 같은 민주적 가치와 심지어 언어까지 공유합니다. 따라서 다가오는 분쟁에서 편을 들어야 한다면, 그들의 보호가 다른 대안보다 명백히 더 바람직합니다."
 SWI_the_second_helvetic_republic:0 "제2 헬베티아 공화국"
 SWI_the_second_helvetic_republic_desc:0 "1798년, 악명 높은 독재자 나폴레옹 보나파르트는 [ROOT.GetName]을 정복하고 우리 민족을 예속시키기 위한 도구로 헬베티아 공화국을 세웠습니다. 다행히도 그런 시절은 끝났으며, 두 번째에는 우리의 오랜 이웃과 더 공평한 연합을 기대할 수 있을 것이라 확신합니다."
 SWI_alpine_aspirations:0 "알프스의 야망"
 SWI_alpine_aspirations_desc:0 "[ROOT.GetNonIdeologyName]의 중앙 정부는 헬베티아 공화국으로 확장되고 성숙했으며, 이제 우리는 더 넓은 지역을 관리할 자원을 갖추게 되었습니다. 우리는 [FRA.GetNameDef]에게 우리의 통제 구역을 확장해달라고 요청하여 단일 깃발 아래 알프스를 통일하는 데 더 가까워져야 합니다."
 SWI_support_allied_espionage:0 "연합국 첩보 활동 지원"
 SWI_support_allied_espionage_desc:0 "우리가 중립적인 외교 정책을 유지한다는 사실이 유럽에서 파시즘을 억압하려는 다른 민주주의 국가들의 노력을 은밀하게 지원하는 것을 막지는 않습니다. 사실, 우리의 중립성과 [?SWI.SWI_biggest_fascist.GetNameDef]에 대한 근접성은 파시즘에 대항하는 국제적인 투쟁에서 우리를 필수적인 존재로 만듭니다."
 SWI_expand_spy_networks:0 "첩보망 확장"
 SWI_expand_spy_networks_desc:0 "적은 저 밖에 있습니다. 위험이 닥치기 전에 국경과 본토를 방어하기 위해 손을 뻗어야 합니다. 우리의 첩보망은 외부에서 볼 때 여전히 중립적이고 무해해 보이는 방어의 기반이 될 수 있습니다."
 SWI_share_spy_networks:0 "첩보망 공유"
 SWI_share_spy_networks_desc:0 "[?SWI.SWI_best_dem_ally.GetNameDefCap]의 목표는 파시즘을 저지하는 것으로, 우리와 같습니다. 그리고 이를 달성하기 위해 [?SWI.SWI_biggest_fascist.GetNameDef]을 적대할 필요는 없습니다. [ROOT.GEtName]은 [GER.GetAdjective], [ITA.GetAdjective], [FRA.GetAdjective] 사회에 녹아들 수 있는 숙련된 요원들을 보유하고 있습니다. 우리는 그 이점을 [?SWI.SWI_best_dem_ally.GetNonIdeologyName]에게 빌려줄 수 있습니다."
 SWI_secret_pact_with_the_allies:0 "연합국과의 비밀 협정"
 SWI_secret_pact_with_the_allies_desc:0 "[ROOT.GetName]은 전면전을 치르거나 공개적으로 세력에 가담할 준비가 되어 있지 않지만, 친구 없이는 안전하지 않을 것이라고 확신할 수 있습니다. 기습 침공 시 우리의 민주주의를 지키기 위해, 우리는 [?SWI.SWI_best_dem_ally.GetNameDef]과 비밀리에 만나 협정을 맺을 수 있습니다. 우리는 그들이 전쟁에 참전할 준비를 시작하도록 은밀히 지원할 것을 약속하고, 그 대가로 우리가 공격받을 경우 그들이 우리를 보호해 줄 것입니다."
 SWI_oasis_of_democracy:0 "민주주의의 오아시스"
 SWI_oasis_of_democracy_desc:0 "민주주의의 적들이 [ROOT.GetName]을 둘러싸고 있으므로, 이 격동의 시기에 우리는 우리의 가치에 대한 약속을 굳건히 지켜야 합니다. [ROOT.GetName]과 그 민주주의는 불가분의 관계이므로, 그것을 지키기 위해 우리의 민주주의가 소멸한다면 국가로서 살아남는 것은 의미가 없습니다."
 SWI_oasis_of_democracy_tt:1 "§Y$SWI_axis_gold$§! 중점이 완료되고 최소 §Y1§!개의 파시스트 국가가 §Y$SWI_gold_trade$§! 정신을 보유하면:"
 SWI_volunteer_force:0 "의용군"
 SWI_volunteer_force_desc:0 "우리는 아직 전쟁 중이 아니지만, [ROOT.GetAdjective] 국민은 민주주의를 위해 싸울 준비가 되어 있습니다. 우리는 중립을 위반하는 것으로 보여서는 안 되지만, 민주주의 국가로서 우리는 국민이 어디로 가고 어디서 싸우는지를 통제할 수 없습니다. 그래서 우리는 조용히 폭정에 맞서 무기를 들도록 장려할 수 있으며, 이는 나머지 [ROOT.GetName]이 공개적으로 그 노력에 동참할 준비를 하는 것입니다."
 SWI_export_saboteurs:0 "사보타주 요원 파견"
 SWI_export_saboteurs_desc:0 "내부에서 적을 파괴할 수 있다면 전쟁에 참여할 필요가 없습니다. 우리 정보 기관은 억압자들이 점령한 영토에서 저항을 선동하고 강화하는 데 특화된 작전을 정교하게 다듬어, 서서히 그들의 힘을 깎아내릴 수 있습니다."
 SWI_lay_the_groundwork:0 "초석 다지기"
 SWI_lay_the_groundwork_desc:0 "총력전에 대비하기 위해서는 먼저 훌륭한 기반이 필요합니다. [ROOT.GetName]의 기반 시설과 수송망을 개선하고 현대화해야 합니다. 그래야만 우리 국민을 효율적으로 전선에 동원할 수 있을 것입니다."
 SWI_arsenal_of_the_alps:0 "알프스의 병기창"
 SWI_arsenal_of_the_alps_desc:0 "알프스의 험준한 봉우리, 우리가 구축한 견고한 요새, 그리고 지형에 대한 지식은 이곳을 군사력을 극적으로 증강하고 후퇴 시 이를 보존하기 위한 완벽한 장소로 만들어 줍니다."
 SWI_thunder_in_the_valleys:0 "계곡의 천둥"
 SWI_thunder_in_the_valleys_desc:0 "기갑전은 우리가 익숙한 산악 지형에는 어울리지 않지만, 만약 우리가 공세로 전환하여 적이 우리에게 도달하기 전에 공격하고자 한다면, 우리는 신속히 기술 격차를 따라잡고 우리만의 차량을 개발해야 합니다."
 SWI_fighting_for_the_hills:0 "고지전"
 SWI_fighting_for_the_hills_desc:0 "결국, 보병은 우리 군에서 가장 다재다능한 병력입니다. 그리고 [ROOT.GetNonIdeologyName]은 항상 자국의 보병을 자랑스러워했지만, 우리는 거의 한 세기 동안 전쟁을 치르지 않았으므로 보병 기술과 교리를 재검토하는 것이 가장 중요합니다."
 SWI_fly_over_the_mountains:0 "산맥을 넘어 날아라"
 SWI_weapons_of_democracy:0 "민주주의의 무기"
 SWI_weapons_of_democracy_desc:0 "적이 상상할 수 없는 일을 저지르기 전에, 우리는 그들을 막기 위해 필요한 일을 할 준비가 되어 있어야 합니다. 설령 그것이 적에게 지옥을 선사할 수 있는 무차별적인 대량 살상 무기를 사용하는 것을 의미하더라도 말입니다. 분명 그것이 그들의 추가적인 잔학 행위를 억제할 것입니다."
 SWI_jump_into_action:0 "행동 개시"
 SWI_jump_into_action_desc:0 "불과 10년 전만 해도 이것은 불가능한 일이었지만, [ROOT.GetNameDef]은(는) 적극적이고 공개적으로 전쟁에 참여하기 위한 모든 준비를 마쳤습니다. 우리는 지금껏 본 적 없는 총력전을 위해 기반 시설, 산업, 과학 기관을 준비했습니다. [ROOT.GetAdjective]의 전쟁 기계가 굉음을 내며 움직일 준비를 마쳤습니다."
 SWI_exiled_government:0 "망명 정부"
 SWI_exiled_government_desc:0 "최선을 다했음에도 불구하고, 우리는 조국을 지키는 데 실패한 것 같습니다. 이제 우리에게 남은 선택지는 멀리서 조국을 되찾기 위해 싸우는 것뿐입니다. [ROOT.GetAdjective]의 민주적 가치는 우리나라가 오랫동안 번영할 수 있게 한 원동력이었으며, 조국을 되찾는 길을 밝혀줄 등불이 될 것입니다. 결국, [ROOT.GetName]은(는) 영토나 주민이 사용하는 언어로 정의되는 것이 아니라, 상호 존중과 지지로 정의되기 때문입니다."
 SWI_join_the_allies:1 "연합국 가입"
 SWI_join_the_allies_desc:0 "중립을 유지하는 데 필요한 물질적 희생과 도덕적 타협이 감당할 수 없는 수준이 되고 있습니다. 특히 현재 유럽의 정치 상황에서는 더 이상 중립이 설 자리가 없습니다. 그들의 결점에도 불구하고, 우리의 영토와 연방을 보존하고자 한다면 연합국이 최선의 선택입니다. 지금은 정말 그 어느 때와도 다른 시기입니다."
 
 SWI_gotthardbund_party_name:0 "고트하르트분트"
 SWI_gotthardbund_party_name_long:0 "고트하르트분트"
   

 SWI_the_alpine_confederation:0 "알프스 연방"
 SWI_the_alpine_confederation_desc:0 "우리의 위대한 국가는 역사적인 국경을 넘어 확장되었으며, 우리 휘하의 새로운 주들이 슈비츠와 동일한 지위를 부여받았지만, 우리는 알프스의 수호자라는 새로운 지위를 인정해야 합니다. 새로운 민주주의 세력이 부상합니다. 바로 알프스 연방입니다!"
 SWI_the_alpine_confederation_chance_TT:0 "\n그들은 우리 군대의 §Y규모§!에 따라 우리에게 독립을 허가할 가능성이 더 높아질 것이며, 또한 우리에 대한 그들의 §Y우호도§!와 함께 추가적인 알프스 영토를 부여할 가능성도 높아질 것입니다."
 SWI_gotthard_union:0 "고트하르트분트"
 SWI_gotthard_union_desc:0 "말다툼과 파벌주의의 시대는 끝났습니다. [ROOT.GetNonIdeologyName]이(가) 단일 민주주의 아래 단결하여, 전면적인 조치를 취할 수 있는 단호한 권한을 가질 때입니다. 이 모든 것은 우리의 [ROOT.GetAdjective] 전통과 가치의 생존을 위한 것입니다. 우리는 저항하고 승리할 것입니다!"
 SWI_press_for_vorarlberg:0 "포어아를베르크 요구"
 SWI_press_for_vorarlberg_desc:0 "[AUS.GetAdjective] 정부가 혼란에 빠져 있는 동안, 우리는 1919년 국민투표에서 표명된 [848.GetName]의 민주적 의지를 이행하고 그들을 우리 민주주의에 통합해야 합니다. 파시즘과 독재로부터 그들을 보호하는 것은 [ROOT.GetNameDef]의 의무입니다."
 SWI_pre_empt_anschluss:0 "안슐루스 선점"
 SWI_pre_empt_anschluss_desc:0 "[GER.GetNameDef]이(가) [GER.GetAdjective] 통일이라는 명분 하에 [AUS.GetName]을(를) 병합하려 한다는 소문이 들려옵니다. 이는 [ROOT.GetNAmeDef]이(가) 용납할 수 없는 일입니다. [GER.GetNameDef]이(가) 우리나라의 독일어권 주에 대해서도 같은 주장을 펼칠 힘을 실어주게 될 것이기 때문입니다. 우리는 서둘러 [AUS.GetName] 전역을 방어할 준비를 해야 합니다."
 SWI_pre_empt_anschluss_tt:1 "§Y[AUS.GetNameDef]이(가) 수락하면 해당 국가의 핵심 주에 대한 핵심 주 권리를 획득합니다§! \n\n우리 군대의 §Y규모§!, 우리에 대한 §Y의견§!, 그리고 §Y[GER.GetNameDef]이(가) [AUS.GetName]을(를) 병합할 준비가 되었는지§!에 따라 수락할 가능성이 높아집니다."
 SWI_demand_italian_alps:0 "이탈리아령 알프스 요구"
 SWI_demand_italian_alps_desc:0 "수십 년 동안 [ITA.GetName]은(는) 뻔뻔하게도 우리나라의 [ITA.GetAdjective]어권 주에 대한 영유권을 주장해 왔습니다. 그들이 그렇게 할 수 있다면, 우리 역시 그들의 알프스 산맥이 우리의 민주 정권에 합류할 것을 요구할 수 있습니다. 결국 티치노가 [ITA.GetNameDef]에 속한 만큼, 그곳도 [ROOT.GetNameDef]에 속하기 때문입니다."
 SWI_demand_french_alps:0 "프랑스령 알프스 요구"
 SWI_demand_french_alps_desc:0 "[FRA.GetNameDef]이(가) 내외부의 압력으로 무너지는 것은 시간 문제입니다. 우리는 알프스 방어에 선제적인 태도를 취해야 합니다. 그렇지 않으면 위험한 적이 우리 영토 침공의 발판이 될 수 있는 방어 거점을 장악할 수 있습니다."
 SWI_alpine_redoubt:0 "알프스 보루"
 SWI_alpine_redoubt_desc:0 "후퇴할 수 있는 요새화된 지대가 있는 한, 우리는 침략자에 맞서 막을 수 없는 힘이 될 수 있습니다. 우리는 알프스를 더욱 난공불락으로 만들고, 그곳에서부터 외부로 영향력을 키워나가야 합니다. 그래야만 적이 어디에 있든 그들과 거리를 둘 수 있습니다."
 SWI_the_alpine_protectorate:0 "알프스 보호령"
 SWI_the_alpine_protectorate_desc:0 "오늘날까지 알프스가 단일 정권 아래 통일된 적은 없었습니다. 통합된 힘으로 우리는 어떤 위협에도 맞서 스스로를 방어할 수 있으며, 우리의 봉우리를 결코 흔들리지 않는 지휘소가 있는 난공불락의 성채로 삼아 알프스 너머까지 방어선을 확장할 수 있습니다. "
 SWI_bring_democracy_to_germany:0 "독일에 민주주의 전파"
 SWI_bring_democracy_to_germany_desc:0 "제3제국은 민주주의와는 거리가 멀고, 그 이전의 바이마르 공화국은 대전쟁 승전국의 인질에 불과했으며, 옛 [GER.GetNonIdeologyName]의 호전적인 정권은 카이저의 탐욕스러운 야망을 위한 도구에 지나지 않았습니다. 이제 북쪽의 이웃 국가가 민주주의가 무엇인지 알 때가 되었습니다."
 SWI_liberate_italy:0 "이탈리아 해방"
 SWI_liberate_italy_desc:0 "수 세기에 걸쳐 [ROOT.GetNonIdeologyName]은(는) 남쪽의 소규모 도시 국가와 왕국들이 서로 싸우다가 결국 허약한 군주국에 흡수되는 것을 지켜보았습니다. [ITA.GetNonIdeologyName]이(가) 형제 국가의 손에 의해 독재와 파시즘의 족쇄에서 해방되는 것은 당연한 일입니다."
 SWI_take_over_france:0 "프랑스 보호"
 SWI_take_over_france_desc:0 "[FRA.GetNonIdeologyName]은(는) 항상 변덕스러운 국가였으며, 잦은 격변 속에서 동전 던지기로 그날의 혁명 결과가 약한 민주주의가 될지 군사 정권이 될지 결정되었습니다. [ROOT.GetAdjective]의 보호 아래 [FRA.GetAdjective] 국민은 우리의 안정적인 민주주의 통치 아래 번영할 수 있을 것입니다."
 SWI_the_new_eidgenossenschaft:0 "새로운 서약동맹"
 SWI_the_new_eidgenossenschaft_desc:1 "13세기, 3개 창립 주의 지도자들은 우리가 서약동맹이라 부르는 영원한 동맹을 맹세했습니다. 이제 그 맹세를 갱신하여 확장하고, 더 많은 주가 우리의 민주 연방을 경험하게 할 때입니다."
 SWI_expand_the_confederation:0 "연방 확장"
 SWI_expand_the_confederation_desc:0 "어떤 국가도 빠르게 확산되는 전체주의로부터 안전하지 않습니다. 우리 주변 국가의 많은 지역이 우리의 중립 전통이 제공하는 보호와, 전쟁 발발 시 우리의 경외로운 방어 능력으로부터 혜택을 볼 수 있습니다."
 SWI_empower_the_council:0 "평의회 권한 강화"
 SWI_empower_the_council_desc:0 "위험이 우리 주위에 도사리고 있으며, 그 위험이 우리를 덮칠 때 우리끼리 다투기 시작하면 무력해질 것이고, 적들은 [ROOT.GetName]을(를) 지도에서 지워버릴 것입니다. 강력한 중앙 집권 정부만이 이 불안정한 시기를 헤쳐나갈 유일한 길입니다."
 SWI_switzerland_on_the_offense:0 "공세에 나선 스위스"
 SWI_switzerland_on_the_offense_desc:0 "우리는 산에 안주하며 공격받기를 기다릴 수 없습니다. 우리는 주도권을 잡고 적이 침략하기 전에 그들에게 싸움을 걸어야 합니다. 그래야만 [ROOT.GetNameDef]의 생존을 보장할 수 있습니다. 결국, 최선의 방어는 강력한 공격입니다."
 SWI_neutral_entente:0 "중립 협상"
 SWI_neutral_entente_desc:0 "우리는 세계 유일의 중립국이 아니며, 전쟁의 위험과 교전국들이 분쟁에서 벗어나려는 우리의 소망을 침해할 위험이 있으므로, 그들을 더욱 억제해야 합니다. 우리는 다른 모든 중립국의 상호 도움을 구해야 합니다. 그리하여 한 중립국에 대한 전쟁은 모든 중립국에 대한 전쟁을 의미하게 만들어야 합니다."
 SWI_plains_warfare:0 "평원전"
 SWI_plains_warfare_desc:0 "[ROOT.GetName]은(는) 계곡, 산, 언덕, 숲에서 훈련할 기회가 많았지만, 외국에서 싸우려면 현대전 교리에 적응해야 합니다. 우리는 빠르게 움직이는 기계화 보병이 어떻게 방어선을 충격하고 신속한 승리를 가져오는지 보았습니다. 이를 통해 배우고 [ROOT.GetAdjective] 군대를 20세기로 이끌 수 있습니다."
 SWI_multipurpose_tanks:0 "다목적 전차"
 SWI_multipurpose_tanks_desc:0 "보병에게 지급하는 다용도 멀티툴 나이프처럼, 우리는 어떤 공백이든 메우고 전쟁 노력에 필요한 모든 임무를 완수할 수 있는 기계가 필요합니다. 전차전 측면에서 따라잡아야 할 부분이 많으므로, 포괄적인 전력을 갖추기 위해 다양한 개발을 해야 합니다."
 SWI_rolling_fortresses:0 "움직이는 요새"
 SWI_rolling_fortresses_desc:0 "우리 전차는 현재 방어 교리의 일부가 될 수 있으며, 산악을 방어하는 요새의 전진 진지 역할을 합니다. 적이 우리의 요새화된 전선을 돌파하지 못한다면, 칸톤에 절대 도달할 수 없을 것입니다."
 SWI_extended_supply_lines:0 "확장된 보급선"
 SWI_extended_supply_lines_desc:0 "신속한 공세와 장기 작전이 벌어지는 세상에서 보급은 그 어느 때보다 중요합니다. 우리의 노력이 칸톤에서 멀어질수록 새롭고 더 나은 보급선이 필요해집니다. 보급선을 더 멀리 확장하고 새로운 보급선을 더 빨리 건설할 수 있도록 병참을 개선하는 방법을 배워야 합니다."
 SWI_dissolve_the_federal_council:0 "연방평의회 해산"
 SWI_president_for_life:0 "종신 대통령"
 SWI_president_for_life_desc:0 "연방평의회는 유럽 국가들 사이에서 독특한 제도로, 평화 시기에는 [ROOT.GetNonIdeologyName]에 훌륭히 기여했습니다. 하지만 이제 [?SWI.SWI_confederation_president.GetName]이 평의회와 국가 전체를 이끌고 있다는 것이 명백해졌으므로, [ROOT.GetNameDef]의 안정의 기둥으로서 [?SWI.SWI_confederation_president.GetHerHis] 통치를 무기한으로 계속하는 것이 타당합니다. "
 SWI_guisans_coup:0 "기장의 쿠데타"
 SWI_guisans_coup_desc:0 "[?SWI.SWI_confederation_president.GetName]은 위대하고 평화로운 우리 조국을 전쟁과 비참함으로 이끌었습니다. 이것은 우리가 알고 사랑하던 [ROOT.GetNonIdeologyName]이 아니며, 자기 보존이라는 명목 하에 타락했습니다. 이 전쟁을 완전히 끝내고, 한때 중립국이었던 이 나라를 다시 근본으로 되돌릴 만큼 대중적이고 유능한 인물은 단 한 명뿐입니다. 바로 앙리 기장입니다."
 SWI_return_to_the_old_switzerland:0 "옛 스위스로의 회귀"
 SWI_return_to_the_old_switzerland_desc:0 "전쟁이 막바지에 이르렀으니, 마침내 [ROOT.GetNonIdeologyName]을 이전의 모습, 즉 상호 존중과 자결의 원칙에 기초한 민주적이고 중립적인 국가로 되돌리기 위한 조치를 취할 수 있습니다. 전쟁이 끝나면, 우리는 마침내 주변에 민주주의와 중립을 강제할 수 있을 것입니다."
 SWI_a_swiss_navy:0 "스위스 해군"
 SWI_a_swiss_navy_desc:0 "[ROOT.GetAdjective] 역사상 처음으로 해안선을 갖게 되었습니다. 이는 해상에서 전쟁을 벌일 수 있다는 의미이기도 하지만, 이제 방어해야 할 새로운 전선이 생겼다는 뜻이기도 합니다. 우리는 [ROOT.GetName]을 위한 해군을 건설하기 위해 노력을 강화해야 합니다."
 SWI_buy_foreign_surplus_ships:0 "해외 잉여 함선 구매"
 SWI_buy_foreign_surplus_ships_desc:0 "한 나라의 잉여는 다른 나라의 해군이 됩니다. 세계의 많은 해군 강대국들은 이제 최신 함선으로 가득 찬 함대를 보유하고 있으며, 이는 구식 함선들이 거의 쓸모없어졌음에도 유지 비용이 든다는 것을 의미합니다. 신속하게 해군력을 증강하고 싶다면, 그들로부터 원치 않는 함선을 구매하는 것보다 더 좋은 방법은 없습니다."
 SWI_swiss_ship_designs:0 "스위스 함선 설계"
 SWI_swiss_ship_designs_desc:0 "우리는 항해에 적합한 군함의 설계 및 제조 경험이 많지 않을 수 있지만, 빨리 시작할수록 [ENG.GetNameDef]나 [ITA.GetName]과 같은 오래되고 위대한 해군 강대국들 사이에서 자립할 수 있게 될 것입니다."
 SWI_submarine_raiders:0 "잠수함 습격대"
 SWI_submarine_raiders_desc:0 "구 해군 강대국들이 거대한 강철 덩어리를 갖게 놔두십시오. 그들이 해상에서 무력으로 싸우는 동안, 우리는 잠수함으로 수면 아래에서 교활하게 싸워 그들의 낡고 쇠퇴한 해군력을 조금씩 깎아낼 것입니다."
 SWI_floating_fortresses:0 "떠다니는 요새"
 SWI_floating_fortresses_desc:0 "우리는 산과 계곡을 방어하기 위한 요새를 만드는 방법을 알고 있습니다. 이제 해안을 갖게 되었으니, 이를 바다로 확장하는 것이 가장 중요합니다. 우리의 함선은 파괴되지 않을 것입니다."
 SWI_naval_industry:0 "해군 산업"
 SWI_naval_industry_desc:0 "새로 획득한 해안선에 해군 산업의 잔재가 남아 있더라도, 우리는 서둘러 이를 포괄적으로 확장하고 진정으로 강력한 스위스 해군에 걸맞은 생산 및 유지 보수를 위한 응집력 있는 체계로 만들어야 합니다."
 SWI_naval_industry_tt:0 "모든 해안 주에 건설 슬롯 §G1§!개와 §Y해군 조선소§! 1개를 추가합니다. (최대 10개)"
 SWI_build_naval_bases:0 "해군 기지 건설"
 SWI_build_naval_bases_desc:0 "우리가 정복한 기지들만으로는 충분하지 않으며, 필요한 수준을 따라잡기 위해 충분히 빨리 새로운 기지를 건설할 수도 없습니다. 우리의 해군 목표를 달성하기 위해 새로운 노력이 필요합니다."
 SWI_build_naval_bases_tt:0 "모든 기존 §Y해군 기지§!에 §Y해군 기지§! 2개를 추가합니다. (최대 15개)"
 SWI_train_navy_staff:0 "해군 참모 훈련"
 SWI_protect_liechtenstein:0 "리히텐슈타인 보호"
 SWI_protect_liechtenstein_desc:0 "우리 세 칸톤 사이에 끼어 있는 작은 공국 리히텐슈타인은 국민을 보호하기 위해 반드시 지켜져야 합니다. 어쨌든 그들은 우리 군대를 포함한 어떤 외국 군대에도 맞설 수 없을 것입니다. 우리는 그들의 영토를 점령하여 지원을 제공할 수 있으며, 그들은 우리의 맹세에 동참하여 우리의 새로운 칸톤이 될 수 있습니다."
 SWI_train_navy_staff_desc:0 "해군 기반 시설은 강철과 콘크리트로만 만들어지는 것이 아니라, 바다와 대양에서 승리를 거두기 위한 용기와 훈련을 갖춘 남녀 인력 또한 필요합니다. "



 SWI_reduce_militia_activation_time_TT:1 "§Y시민 민병대§!를 완전히 동원하는 데 걸리는 시간이 §G$RIGHT|0$§!일 단축됩니다"
 SWI_generic_fascist_neighbor_cap:0 "우리의 파시스트 이웃"
 SWI_generic_fascist_neighbor:0 "우리의 파시스트 이웃"
 SWI_secret_pact_with_allies_TT:0 "전쟁에 휘말릴 경우, 즉시 해당 세력에 가입합니다."
 SWI_neutral_entente_faction:0 "중립 협상국"
 SWI_militias_turned_into_regulars:0 "시민 민병대가 전문화되었습니다"
 SWI_old_switzerland_TT:0 "\n§Y전쟁이 끝나면:§!\n"
 SWI_viable_fascist_in_europe:0 "유럽에 존속 가능한 §Y파시스트 국가§! 존재"
 
 # Horn of Africa
 HOA_develop_capitalstate:0 "[Root.Capital.GetName] 개발"
 HOA_develop_capitalstate_desc:0 "우리 국민의 삶을 개선하고 [ROOT.GetNameDef]을(를) 보호하기 위해 산업화 속도를 높여야 합니다. 따라서 우리는 [ROOT.Capital.GetCapitalVictoryPointName] 주변 지역에 투자하여 그곳을 국가의 산업 중심지로 만들 것입니다."
 HOA_the_state_bank_of_name:0 "[ROOT.GetNameDef] 국립은행"
 HOA_the_state_bank_of_name_desc:0 "[ROOT.GetNameDef] 중앙은행의 자원을 확충함으로써 국민에게 새로운 신용 한도를 제공하고, 병든 [ROOT.GetAdjective] 경제의 금융 순환을 촉진하는 역할을 할 수 있습니다."
 HOA_pave_the_roads:0 "도로 포장"
 HOA_pave_the_roads_desc:0 "현재 [ROOT.GetNameDef] 전역에서 인력과 물자를 수송하는 것은 너무 비효율적입니다. 도로에 투자하는 것은 경제에 도움이 될 뿐만 아니라, 군사 자산의 이동을 용이하게 하여 우리의 안보를 더욱 강화할 것입니다."
 HOA_the_steam_locomotive:0 "증기 기관차"
 HOA_the_steam_locomotive_desc:0 "자동차와 트럭은 단거리나 소량 수송에 유용하지만, 기차는 대량의 물자와 인력을 수송하는 데 훨씬 더 효율적입니다. 철도망에 투자하는 것은 국가 경제에 큰 활력이 될 것입니다."
 HOA_the_adjective_regional_development_fund:0 "[ROOT.GetAdjective] 지역 개발 기금"
 HOA_state_owned_industry_tt:0 "§Y$ETH_state_development_dynamic_modifier$§! 수정:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+15%§!"
 HOA_the_adjective_regional_development_fund_desc:0 "[ROOT.GetNameDef]의 지역들은 침체되어 있으며 투자가 절실히 필요합니다. 지역 개발 기금을 조성함으로써, 지방 정부가 해당 지역을 현대화하는 데 필요한 도구를 갖추도록 보장할 수 있습니다."
 HOA_the_adjective_industrial_fund:0 "[ROOT.GetAdjective] 산업 기금"
 HOA_the_adjective_industrial_fund_desc:0 "[ROOT.GetNameDefCap]은(는) 안타까울 정도로 산업화가 덜 되었습니다. 국민의 삶을 개선하고 외국의 침략으로부터 국민을 보호할 역량을 갖추려면, 국가를 신속히 산업화해야 합니다."
 HOA_exploit_national_resources:0 "국가 자원 개발"
 HOA_exploit_national_resources_desc:0 "[ROOT.GetNameDefCap]에는 개발을 기다리는 풍부한 천연자원이 있습니다. 약간의 투자만 있다면, 마침내 자원 개발을 시작할 수 있을 것입니다."
 HOA_support_the_agrarians:0 "농본주의자 지원"
 HOA_support_the_agrarians_desc:0 "[ROOT.GetNameDef]의 농업에 종사하는 농촌 인구는 국가의 근간입니다. 따라서, 우리는 그들이 수행하는 중요한 업무를 더 많이 지원해야 합니다."
 HOA_support_the_agrarians_tt:0 "§Y$ETH_state_development_dynamic_modifier$§! 수정:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!"
 HOA_promote_local_crafts:0 "지역 공예 진흥"
 HOA_promote_local_crafts_desc:0 "[ROOT.GetNameDefCap]에는 국가에 물품을 공급하기 위해 소규모로 일하는 숙련된 장인이 풍부합니다. 우리는 그들의 전문성을 기반으로 삼아 그들이 사업과 해당 물품 생산을 확장하기 쉽게 만들어야 합니다."
 HOA_use_the_natural_harbors:0 "천연항 활용"
 HOA_use_the_natural_harbors_desc:0 "최근 해안 지대를 획득함에 따라, 우리만의 항구를 건설하여 국제 시장에 대한 접근성을 크게 높일 기회가 생겼습니다. 이는 물품 수입과 수출을 훨씬 더 용이하게 하여 우리 경제에 막대한 도움이 될 것입니다."
 HOA_the_capital_city_airport:0 "[Root.Capital.GetCapitalVictoryPointName] 공항"
 HOA_the_capital_city_airport_desc:0 "항공 운송은 세계의 도시들을 세계 경제와 점점 더 긴밀하게 연결하고 있습니다. 우리는 이러한 추세를 활용하기 위해 우리만의 공항을 건설해야 합니다."
 HOA_a_steamboat_fleet:0 "증기선 함대"
 HOA_a_steamboat_fleet_desc:0 "해안선과 항로를 방어하기 위해, 우리는 모든 외국의 침략을 저지할 수 있는 연안 함대를 건설해야 합니다."
 HOA_improved_irrigation_systems:0 "관개 체계 개선"
 HOA_improved_irrigation_systems_desc:0 "견고한 식량 생산 능력 없이는 국가 안보를 보장할 수 없습니다. 작물 수확량을 늘리기 위해, 우리는 경작지 전역에 걸쳐 대규모 관개 사업에 투자할 것입니다."
 HOA_improved_irrigation_systems_tt:0 "§Y$ETH_state_development_dynamic_modifier$§! 수정:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+15%§!"
 HOA_the_adjective_air_fleet:0 "[ROOT.GetAdjective] 공군"
 HOA_the_adjective_air_fleet_desc:0 "공중전은 분쟁의 승패를 결정하는 핵심 무대가 빠르게 되어가고 있습니다. 따라서, 우리는 우리만의 공군을 창설하고 [ROOT.GetNameDef]의 하늘을 방어할 준비를 해야 합니다."
 HOA_state-funded_projects:0 "국가 지원 사업"
 HOA_state-funded_projects_desc:0 "우리 경제는 기반 시설과 산업의 부족으로 침체되어 있습니다. 이를 완화하기 위해, 우리는 [ROOT.GetNameDef] 전역에 걸쳐 새로운 사업에 막대한 투자를 할 것입니다."
 HOA_the_grand_university_of_capital:0 "[Root.Capital.GetCapitalVictoryPointName] 대학교"
 HOA_the_grand_university_of_capital_desc:0 "지식을 한 세대에서 다음 세대로 전수하는 것은 모든 국가의 안전과 성장에 매우 중요합니다. 따라서, 우리는 차세대 과학자, 역사가, 예술가들을 더 잘 교육하기 위해 [ROOT.Capital.GetCapitalVictoryPointName]에 새로운 대학교를 설립할 것입니다."

 HOA_the_adjective_armed_forces:0 "[ROOT.GetAdjective] 국군"
 HOA_the_adjective_armed_forces_desc:0 "강대국들 사이에 긴장이 고조되면서 세계는 점점 더 불안정해지고 있습니다. 우리가 독립을 유지하려면, [ROOT.GetAdjective] 군은 전쟁에 대비해야 합니다."
 HOA_warrior_tradition:0 "전사 전통"
 HOA_warrior_tradition_desc:0 "[ROOT.GetNameDefCap]은 잠재적 정복자들로부터 고향을 지켜온 용감한 전사들의 오랜 역사를 가지고 있습니다. 지금이야말로 조국 방어를 위해 그 전통을 활용해야 할 때입니다."
 HOA_strengthen_the_irregulars:0 "비정규군 강화"
 HOA_strengthen_the_irregulars_desc:0 "비정규군과 징집병 체계는 수 세기 동안 우리에게 큰 도움이 되었습니다. 효과가 입증된 것을 바꿀 이유는 거의 없습니다."
 HOA_every_man_a_warrior:0 "모두가 전사"
 HOA_every_man_a_warrior_desc:0 "[ROOT.GetNameDef]이(가) 외국의 침략자들에게 성공적으로 맞서려면, 국가 방위를 위해 필요할 때 모든 사람이 무기를 들 수 있을 정도로 사회를 군사화해야 합니다."
 HOA_names_finest:0 "[ROOT.GetName]의 정예"
 HOA_names_finest_desc:0 "우리 군대는 자신들이 우리 국가가 외세의 속국이 되는 것을 막는 유일한 장애물임을 알고 있습니다. 그 앎에서 조국 방위와 [ROOT.GetAdjective]의 자유 수호에 대한 흔들림 없는 헌신이 나옵니다."
 HOA_utilize_our_strengths:0 "우리의 강점 활용"
 HOA_utilize_our_strengths_desc:0 "우리 군은 타국만큼 규모가 크거나 정규화되지는 않았지만, 전장에서 활용할 수 있는 상당한 수준의 비정규 전문성을 보유하고 있습니다."
 HOA_reform_the_conscription:0 "징병제 개혁"
 HOA_reform_the_conscription_desc:0 "세계 정세가 점차 긴박해짐에 따라, 징병 제도를 확대하여 어떠한 형태의 외세 침략에도 대비해야 할 때입니다."
 HOA_eyes_on_the_imperialists:0 "제국주의자 주시"
 HOA_eyes_on_the_imperialists_desc:0 "이 지역의 제국주의 열강들은 [ROOT.GetNameDef]의 독립을 경멸하며 주시하고 있습니다. 우리는 경계를 늦추지 말고 그들의 야망의 희생양이 되는 것을 피해야 합니다."
 HOA_encourage_local_arms_production:0 "지역 무기 생산 장려"
 HOA_encourage_local_arms_production_desc:0 "우리 군대에 필요한 장비를 보급할 수 없다면, 그들은 국가를 제대로 방어할 수 없을 것입니다. 따라서 우리는 군수 산업의 생산 능력을 확장해야 합니다."
 HOA_metal_beasts:0 "강철 야수"
 HOA_metal_beasts_desc:0 "기갑전이 전장에서 점점 더 큰 역할을 할 것이 분명해지고 있습니다. 군은 이러한 차량을 가장 잘 활용하고 대응하는 방법을 배워야 합니다."
 HOA_the_roars_of_thunder:0 "천둥의 포효"
 HOA_the_roars_of_thunder_desc:0 "때때로 전장에서 적을 몰아내는 유일한 방법은 압도적인 화력입니다. 이를 발휘하는 가장 효과적인 방법은 포병을 이용하는 것입니다."
 HOA_develop_indigenous_models:0 "고유 모델 개발"
 HOA_develop_indigenous_models_desc:0 "보병 장비를 외국 설계에 의존하면 기술적으로 뒤처질 위험이 있습니다. 이러한 안보 위협은 소화기 개발 분야의 국내 전문성을 높여야만 적절히 대처할 수 있습니다."
 HOA_the_steel_lions:0 "강철 사자"
 HOA_the_steel_lions_desc:0 "정적 교리의 시대는 지났습니다. 이제 우리만의 특화된 기갑 부대를 전장에 배치하고 기동전의 방식을 배우기 시작할 때입니다."
 HOA_warfare_from_afar:0 "원거리 교전"
 HOA_warfare_from_afar_desc:0 "포병은 전장에서 거듭 그 가치를 증명했습니다. 우리는 특화된 포병 부대를 보병 사단에 더욱 긴밀히 통합하여 이를 더 잘 활용해야 합니다."
 HOA_modern_infantry:0 "현대 보병"
 HOA_modern_infantry_desc:0 "우리의 군 개혁은 군의 효율성을 높이는 데 큰 도움이 되었습니다. 우리는 야전 사단 수를 늘려 이러한 발전을 확대해야 합니다."
 HOA_the_first_album:0 "[ROOT.GetNameDefCap]"
 HOA_the_first_album_desc:0 "열강들 사이의 긴장이 고조되면서 세계는 점점 더 위험해 보이지만, 이는 또한 기회를 잡을 의지와 준비가 된 국가들에게는 기회의 세계를 열어줍니다."
 HOA_a_loyal_subject:0 "충성스러운 신하"
 HOA_a_loyal_subject_desc:0 "세계 무대의 상황이 점점 더 불안정해짐에 따라, 더 강한 국가의 보호 아래 있는 것이 더 나을 수도 있습니다. 적어도 지금은 말입니다..."
 HOA_political_stability:0 "정치적 안정"
 HOA_political_stability_desc:0 "국내가 분열되어 있다면 독립 국가로 남을 수 없습니다. 단결된 전선을 구축해야만 현재 세계를 휩쓸고 있는 변화의 바람에 휩쓸리지 않고 저항할 수 있습니다."
 HOA_the_capital_railroad:0 "[Root.Capital.GetCapitalVictoryPointName] 철도"
 HOA_the_capital_railroad_desc:0 "우리의 철도망을 이웃 국가와 연결함으로써, 우리의 상품과 자원을 그들에게 더 잘 수출할 수 있습니다. 이 과정에서 우리 경제에 활력을 불어넣을 수 있기를 바랍니다."
 HOA_invite_foreign_settlers:0 "외국인 정착민 유치"

 HOA_invite_foreign_settlers_desc:0 "우리나라를 현대화하는 데는 아직 갈 길이 멉니다. 경험 없는 정착민들에게 [ROOT.GetNameDef](으)로 이주할 동기를 부여하여 그들의 기술을 활용해야 합니다."
 HOA_countryleader:0 "[ROOT.GetLeader]"
 HOA_countryleader_desc:0 "[ROOT.GetLeader]은(는) 이 어려운 시기에 나라를 하나로 묶을 수 있는 유일한 인물이며, 따라서 국민들은 [ROOT.GetLeader.GetHerHim]을(를) 중심으로 단결해야 합니다."
 HOA_securing_the_adjective_future:0 "[ROOT.GetAdjective]의 미래 확보"
 HOA_securing_the_adjective_future_desc:0 "[ROOT.GetNameDefCap]은(는) 세계 무대에서 우방이 거의 없는 작은 국가입니다. 이러한 상황을 바꾸는 것은 우리 미래의 자유와 독립을 확보하는 데 큰 도움이 될 것입니다."
 HOA_improving_the_educational_system:0 "교육 제도 개선"
 HOA_improving_the_educational_system_desc:0 "우리 아이들이 국가의 운명을 손에 쥐고 있습니다. 따라서 가능한 최고의 교육을 제공하는 것은 [ROOT.GetNameDef]의 미래를 보장하는 데 큰 도움이 될 것입니다."
 HOA_construct_great_monuments:0 "위대한 기념물 건설"
 HOA_construct_great_monuments_desc:0 "[ROOT.GetAdjective] 국민은 자랑스러워할 것이 많습니다. 우리는 더 높은 경지를 향한 노력을 고무하는 기념물로 기념해야 할 오랜 역사를 가지고 있습니다."
 HOA_the_adjective_volunteer_force:0 "[ROOT.GetAdjective] 의용군"
 HOA_the_adjective_volunteer_force_desc:0 "다른 대륙에서의 소규모 국경 분쟁은 전 세계를 휩쓰는 거대한 분쟁을 촉발할 잠재력이 있습니다. 우리는 이러한 불씨가 또 다른 대전쟁을 일으키기 전에 진압하는 역할을 해야 합니다."
 HOA_military_cooperation:0 "군사 협력"
 HOA_military_cooperation_desc:0 "우리가 군대를 개선하는 데 큰 진전을 이루고 있지만, 합동 훈련과 군사 협력 강화를 통해 국제적 우방으로부터 배울 수 있는 교훈이 있습니다."
 HOA_that_which_is_rightfully_ours:0 "정당한 우리의 것"
 HOA_that_which_is_rightfully_ours_desc:0 "[ROOT.GetNameDefCap]은(는) 본래의 모습에 비해 그림자에 불과합니다. 역사를 보면 우리 조상들은 현 행정부보다 훨씬 더 넓은 땅을 지배했지만, 그 대부분을 여러 세대에 걸쳐 빼앗겼습니다. 이제 우리에게 정당하게 속한 것을 되찾을 때입니다."
 HOA_commandos:0 "특공대"
 HOA_commandos_desc:0 "전쟁에서는 때때로 작지만 잘 훈련된 병사 집단이 전장의 대규모 군대보다 적진 후방에서 더 큰 승리를 거둘 수 있습니다."
 HOA_a_jagged_alliance:0 "불안정한 동맹"
 HOA_a_jagged_alliance_desc:0 "우리가 다른 국가들과 항상 의견이 일치하는 것은 아니지만, 종종 같은 위협에 직면합니다. 이러한 공통된 문제에 집중하는 것이 지속적인 동맹과 국가 안보 강화의 기반이 될 수 있습니다."
 HOA_observe_and_learn:0 "관찰과 학습"
 HOA_observe_and_learn_desc:0 "전쟁은 기술 발전과 혁신적인 사고의 특성으로 인해 끊임없이 진화하고 있습니다. 강력한 군대를 유지하기 위해, 우리는 전쟁의 교훈을 배우고 개선할 방법을 끊임없이 찾아야 합니다."
 HOA_foreign_investors:0 "외국인 투자자"
 HOA_foreign_investors_desc:0 "우리가 번영하려면 산업과 기반 시설에 대한 투자가 필요합니다. 다행히도, 이익을 추구하는 외국인들은 얼마든지 있습니다."
 HOA_research_exchange_programmes:0 "연구 교류 프로그램"
 HOA_research_exchange_programmes_desc:0 "우리 산업은 현대화가 절실히 필요하며, 교류 프로그램을 마련함으로써 해외로부터 우리 공장에서 새로운 기술 발전을 가장 잘 활용하는 방법에 대한 지식을 얻을 수 있습니다."
 HOA_foreign_trained_officials:0 "해외 훈련 관료"
 HOA_foreign_trained_officials_desc:0 "해외 인사들의 전문 지식으로부터 배울 점이 아직 많습니다. 이제 그들에게 국가 내 권위 있는 직책을 부여하여 더 잘 활용할 때입니다."
 HOA_countryadjective_loyalist_advisors:0 "[ROOT.GetAdjective] 충성파 고문단"
 HOA_countryadjective_loyalist_advisors_desc:0 "우리의 국가와 문화가 제국주의자들에게 흡수되도록 내버려 둘 수 없습니다. [ROOT.GetNameDef]에 충성하는 이들을 권위 있는 자리에 앉히고 우리의 자유를 되찾는 과정을 시작해야 합니다."
 HOA_lay_claim_to_the_danakil:0 "다나킬 영유권 주장"
 HOA_lay_claim_to_the_danakil_desc:0 "[ROOT.GetNameDefCap]은 북부 다나킬 지역을 확보하지 않으면 항상 해상 침공에 취약할 것입니다."
 HOA_push_for_the_highlands:0 "고원지로 진격"
 HOA_push_for_the_highlands_desc:0 "동아프리카의 경제적 중심지는 고원지대에 있습니다. [ROOT.GetNameDef]을 위해 이곳을 확보하는 것은 우리의 경제적 잠재력을 확장하는 데 큰 도움이 될 것입니다."
 HOA_secure_the_ogaden:0 "오가덴 확보"
 HOA_secure_the_ogaden_desc:0 "오가덴을 확보하면 우리와 잠재적 침략자들 사이에 여러 자연 방벽이 생기는 동시에, 인도양을 통한 무역으로 우리 경제를 개방할 수 있습니다."
 HOA_rallying_the_adjective_people:0 "[ROOT.GetAdjective] 인민 규합"
 HOA_rallying_the_adjective_people_desc:0 "세계는 분쟁으로 황폐해지고 있습니다. 우리의 현재 자유와 예속의 심연 사이에 놓인 것은 [ROOT.GetAdjective] 인민이 일어나 싸우려는 의지뿐입니다. 뭉치면 살고, 흩어지면 죽습니다."
 HOA_the_capital_school_of_technology:0 "[Root.Capital.GetCapitalVictoryPointName] 기술 학교"
 HOA_the_capital_school_of_technology_desc:0 "불과 몇 년 전만 해도 전장과 공장에서 최첨단이었던 것이 오늘날에는 완전히 구식이 되는 경우가 많습니다. 새로운 기술의 발전에 발맞추려면 다음 세대를 교육하는 데 투자해야 합니다."
 HOA_promote_countryadjective_nationalism:0 "[ROOT.GetAdjective] 민족주의 고취"
 HOA_promote_countryadjective_nationalism_desc:0 "[ROOT.GetNameDef]의 인민은 더는 외세의 압제를 용납하지 않을 것입니다. 우리는 이 기회를 포착하여 독립 계획을 가속해야 합니다."
 HOA_crowning_of_the_negusa_nagast:0 "네구사 네가스트 대관식"
 HOA_crowning_of_the_negusa_nagast_desc:0 "우리가 이 지역의 지배적인 세력으로 부상함에 따라, 우리 지도자를 새로운 네구사 네가스트로 추대하여 우리의 역할을 받아들일 때가 왔습니다. 모두가 [ROOT.GetLeader.GetHerHim]의 뒤에 집결하거나, 우리의 분노에 직면해야 할 것입니다."
 HOA_control_ethiopia_tt:0 "모든 에티오피아 영토 통제"
 HOA_proclaim_east-african_hegemony:0 "동아프리카 패권 선포"
 HOA_proclaim_east-african_hegemony_desc:0 "아프리카의 뿔에서 계속되는 혼란스러운 상황은 오직 우리의 영광스러운 황제, [ROOT.GetName]의 통치하에서만 안정될 수 있습니다. 이 지역을 통일할 때가 왔습니다."
