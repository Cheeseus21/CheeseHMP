 SS_recruitment_pfu:0 "Recruit Waffen SS Divisions"
 SS_recruitment_pfu_desc:0 "Himmler requests we expand our Waffen SS to full sized combat divisions to fight alongside the Wehrmacht. This would be of great benefit to our war effort, allowing many possible volunteers from occupied and neutral countries to join our war against communism."
 SS_recruitment_leibstandarte:0 "1st SS Panzer Division LSSAH"
 SS_recruitment_leibstandarte_desc:0 "The 1st SS-Leibstandarte Adolf Hitler Division was an elite Waffen-SS unit that fought on both the Eastern, and Western fronts during World War II. LSSAH was regarded as one of the most effective, and well equiped German units of the war."
 SS_recruitment_dasreich:0 "2nd SS Panzer Division Das Reich"
 SS_recruitment_dasreich_desc:0 "SS-Das Reich Division was an elite Waffen-SS unit that fought on both the Eastern, and Western fronts during World War II. Das Reich was also well known for its gallantry in battle, especially during the battle of Kursk and later the Ardennes offensive."
 SS_recruitment_totenkopf:0 "3rd SS Panzer Division Totenkopf"
 SS_recruitment_totenkopf_desc:0 "SS-Totenkopf Division was an elite Waffen-SS unit that fought on both the Eastern, and Western fronts during World War II. Formed from prison guards and chosen troops from the SS, Totenkopf was known as the Death's Head Division for its distinctive skull and cross."
 SS_recruitment_polizei:0 "4th SS Panzer-Grenadier-Division Polizei"
 SS_recruitment_polizei_desc:0 "SS Division Polizei was originally a police brigade in the SS but later reorganized into a full size Panzer-Grenadier-Division. The unit was involved in the invasion of France, Greece, and later the Soviet Union."
 SS_recruitment_wiking:0 "5th SS Panzer Division Wiking"
 SS_recruitment_wiking_desc:0 "SS-Wiking Division was an elite foreign Waffen-SS unit that fought on the Eastern front during World War II. The division was composed of men from ideological volunteers in Denmark, Norway, Sweden, Finland, Estonia, the Netherlands and Belgium under the command of veteren German officers."
 SS_recruitment_nord:0 "6th SS Nord Gebirgsjäger-Division"
 SS_recruitment_nord_desc:0 "SS-Nord Division was an elite mountain division that fought on the Eastern front in the Arctic circle. The temperature in this climate was constantly below freezing, troops would often be wounded from frostbite in the midst of battle."
 SS_recruitment_prinz:0 "7th SS Prinz Eugen Gebirgsjäger-Division"
 SS_recruitment_prinz_desc:0 "SS Prinz Eugen was a Gebirgsjäger-Division composed mostly of ethnic Germans from the Balkans and southern Europe. The division fought mainly against communist Yugoslav partisans as an anti partisan role, however saw itself in combat against the advancing red army later in the war."
 SS_recruitment_hohenstaufen:0 "9th SS Panzer Division Hohenstaufen"
 SS_recruitment_hohenstaufen_desc:0 "SS-Hohenstaufen was an armored Waffen-SS division that fought on the Eastern and Western fronts during World War II. composed of young German conscripts with a seasoned NCO staff from the Leibstandarte division, it was a very capable unit."
 SS_recruitment_frundsberg:0 "10th SS Panzer Division Frundsberg"
 SS_recruitment_frundsberg_desc:0 "SS-Frundsberg was an armored Waffen-SS division that fought on the Eastern and Western fronts during World War II. composed of both young German and Hungarian conscripts with a seasoned NCO staff from the Leibstandarte division, it was a very capable unit."
 SS_recruitment_nordland:0 "11th SS Panzer-Grenadier-Division Nordland"
 SS_recruitment_nordland_desc:0 "SS-Nordland Division was another entirely foreign recruited Waffen-SS unit that fought on the Eastern front during World War II. composed of men from volunteers all across Scandanavia, it fought bravely in the siege of Leningrad and later the Battle of Tannenberg Line."
 SS_recruitment_hitlerjugend:0 "12th SS Panzer Division Hitlerjugend"
 SS_recruitment_hitlerjugend_desc:0 "SS-Hitlerjugend was an armored Waffen-SS division that fought on the Western front during World War II. composed entirely of Hitler youth, and an elite NCO staff from other Waffen-SS divisions, it was a very capable unit fighting a rear guard action in Normandy, but most notably in the Ardennes offensive."
 SS_recruitment_latvian_ss:0 "15th, 19th, 20th Baltic SS Panzer-Grenadier-Divisions"
 SS_recruitment_latvian_ss_desc:0 "Comprised of Latvian and Estonian volunteers, these divisions formed large Panzer-Grenadier-Divisions which fought against the Soviet Union throughout 1943-1945. Most renowned for their combat effectiveness in the Battle of Tannenberg Line, units of these divisions held off a Soviet army 8 times its size, inflicting over 10:1 casualties against them with little to no armor support."
 SS_recruitment_reichsfuhrer_ss:0 "16th, 17th, 18th German SS Panzer-Grenadier-Divisions"
 SS_recruitment_reichsfuhrer_ss_desc:0 "Comprised largely of Ethnic German volunteers from Hungary and other occupied territories, these divisions formed Panzer-Grenadier-Divisions which fought against the Soviet Union in Ukraine and Central Europe, and also in France against the allied invasions."
 SS_recruitment_handschar:0 "13th, 21st, 23rd Balkan Gebirgsjäger-Divisions"
 SS_recruitment_handschar_desc:0 "Comprised of Albanian, Bosnians, and Croatians, these divisions were largely anti-partisan SS Gebirgsjäger-Divisions which fought in the Balkans against Partisans, and later against the advancing Soviet army."
 SS_recruitment_charlemagne:0 "33rd SS Panzer-Grenadier-Division Charlemagne"
 SS_recruitment_charlemagne_desc:0 "The Charlemagne division was formed out of the remaining French volunteers in the Wehrmacht, and fought against the Soviet forces advancing into Germany. Renowned for being one of the last divisions in Berlin, they offered fierce resistance in the Reichstag and many refused to surrender, fearing reprecusions from their governments."
 
 
 
 ger_wehrmacht_pfu:0 "The Heer"
 ger_wehrmacht_pfu_desc:0 "The backbone of the German Armed Forces. If the Vaterland is to survive the coming storm, the OKH must be prepared to follow the Führer's directives no matter how drastic, lest we forget our oath."
 ger_luftwaffe_pfu:0 "The Luftwaffe"
 ger_luftwaffe_pfu_desc:0 "Goring has tasked the Luftwaffe with dealing a knock out blow to Britain with an extensive bombing campaign that should convince the British to consider peace, but, if we fail to achieve this promptly, OKW may consider reallocating our resources else were."
 ger_kriegsmarine_pfu:0 "The Kriegsmarine"
 ger_kriegsmarine_pfu_desc:0 "Due to the state of the Kriegsmarine Oberkommando der Marine Reader has ordered that we deploy a doctrine of commerce raiding in an attempt to starve the allies of vital resource from abroad and supply at the front."
 
 ger_wehrmacht_grossdeutschland:0 "Panzer-Division Großdeutschland"
 ger_wehrmacht_grossdeutschland_desc:0 "The Großdeutschland Division was an elite combat unit of the German Army that fought on the Eastern Front during World War II. Originally formed from a ceremonial guard unit in the 1930s, its actions on the Eastern front in the battle of Moscow, Rzev, and later Kursk earned its reputation." 
 ger_schwere_panzer:0 "Schwere Panzer-Division 502"
 ger_schwere_panzer_desc:0 "Schwere Panzer-Division 502, was a formation of heavy tanks following the onset of Operation Barbarossa and the introduction of superior Soviet T-34, and KV-1 tanks. Fighting on the Eastern front, It was one of the most successful German heavy tank divisions, claiming the destruction of 1,400 tanks and 2,000 assault guns."
 ger_volksturm:0 "Form the Volkssturm"
 ger_volksturm_desc:0 "The Volkssturm was a national militia established by the Nazi party during the last months of World War II. It was formed by men and children deemed unfit for service or otherwise not serving in the regular armed forces."
 
 ger_battle_of_britain:0 "Battle of Britain"
 ger_battle_of_britain_desc:0 " "
 ger_luftwaffe_goring_division:0 "Panzer Division Hermann Göring"
 ger_luftwaffe_goring_division_desc:0 "The Hermann Göring was an elite German Luftwaffe armoured division. The HG saw action in North Africa, Sicily, Italy and later on the Eastern Front."
 ger_luftwaffe_infantry:0 "Luftwaffen Feld-Divisionen"
 ger_luftwaffe_infantry_desc:0 "The Luftwaffen field divisions were formed from 200,000–250,000 Luftwaffe ground, support and other excess personnel. This decision was originally authorized in October 1942, following suggestions that the German Army could be bolstered by transferring personnel from other services."
 
 ger_battle_of_atlantic:0 "Battle of the Atlantic"
 ger_battle_of_atlantic_desc:0 " "
 ger_submarine_bases:0 "Construct Submarine Pens"
 ger_submarine_bases_desc:0 "Constructing Submarine bases and protective pens in France would help us operate our submarine forces in the Atlantic without having to cross the dangerous English channel to get repairs and service in Germany."
 ger_kriegsmarine_infantry:0 "Marine Infanterie-Divisionen"
 ger_kriegsmarine_infantry_desc:0 "The Marine Infantry divisions were activated from Kriegsmarine personnel no longer required to crew ships or for shore establishments. Following the Soviet and allied invasions of Germany, the divisions were deployed in defensive operations in north-west Germany."
 
