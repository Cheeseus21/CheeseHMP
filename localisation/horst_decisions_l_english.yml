 propaganda_campaings_default_desc:0 "With war on the horizon, we cannot afford for our people to be influenced by hostile ideas and eventually turn against our government. Only through active propaganda campaigns we can survive the next decade!"
 propaganda_campaings_democratic_desc:0 "Our nation is defeated. The Germans have taken our homeland, our people feel defeated and saddened. We need to resurrect the Dutch fighting spirit if we want to defend ourselves against the rising threat in the east."
