 HMP_ll_soviets_receive_desc:0 "We have [?Root.SOV_barb_ll_token|+0] £convoy_texticon §CShipments§! of war materials coming to aid us.\n\nEach £convoy_texticon §CShipment§! is worth approximately £production_cost §G2000 Production§! and can be exchanged for a roughly equivalent amount of production in the following equipment: §YInfantry Equipment I§!, §YAnti-Air Equipment II§!, §YSupport Equipment§!, §YArtillery Equipment II§!, §YRocket Artillery Equipment I§!, §YMotorized Rocket Artillery Equipment§!, §YAnti-Tank Equipment II§!, §YMotorized Equipment§!, §YMechanized Equipment I§!, §YAmphibious Tractor Equipment I§!, §YLight/Medium/Heavy Tank Equipment III§!, §YSuper Heavy Tank Equipment I§!, and §YHomeland Fighter Equipment II§!.\n\nIf the Allies control Iran we will be able to receive lend-lease as soon as Operation Barbarossa commences."
