 # Add PT Decisions
 prca_increase_poster_production2:0 "Increase Poster Production"
 prca_increase_poster_production2_desc:0 "Posters are the easiest way to communicate our goals and ideals to the masses. To ensure that we can continue to use this tool efficiently, we must increase the production of new posters."
 prca_publish_a_special_issue2:0 "Publish a Special Issue"
 prca_publish_a_special_issue2_desc:0 "The latest news has left some of our people feeling uncertain and critical. Although we cannot hide the current developments from the public, we can divert their attention through a special newspaper issue."
 prca_run_a_speech_of_leader2:0 "Radio Oranje Speech From [Root.GetLeader]"
 prca_run_a_speech_of_leader2_desc:0 "[Root.GetLeader] is the voice that holds our nation together even in difficult times. His latest speech has already inspired many people and it is of great importance that everyone can hear it."
 prca_produce_a_war_movie2:0 "Produce a War Movie"
 prca_produce_a_war_movie2_desc:0 "Whether drama, action or animated film, the heroic deeds of our soldiers must be portrayed in a proper manner. In this way we can continue to inspire the army and the home front for our cause."
 # Newspaper Department
 prca_form_newspaper_department2:0 "Form the Newspaper Department"
 prca_form_newspaper_department2_desc:0 "Newspapers, which can be produced quickly and in large quantities, offer the ideal means for manipulating public opinion in our favour. With war on the horizon, it is of great importance that we have complete control over this powerful weapon."
 prca_form_newspaper_department_tt:0 "Enables the §YNewspaper Department§!, which grants (Weekly Propaganda Tokens: §G+1.00§!).\n"
 # Radio Department
 prca_form_radio_department2:0 "Form the Radio Department"
 prca_form_radio_department2_desc:0 "The invention of radio has opened up countless new possibilities for the spreading of propaganda. By controlling the programs that are broadcasted, we can ensure that the powerful voice of our country is heard not only among our own people, but also throughout the entire world."
 prca_form_radio_department_tt:0 "Enables the §YRadio Department§!, which grants (Weekly Propaganda Tokens: §G+2.00§!).\n"
 # Movie Department
 prca_form_movie_department2:0 "Form the Movie Department"
