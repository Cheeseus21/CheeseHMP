 arctic_corridor_history:0 "§G+3 Lend-Lease Route Capacity§!\n\nThe Arctic Convoys was a lend-lease route that went through the Norwegian Sea and Barents Sea to the Soviet port of Murmansk. The route was fraught with fog, severe weather (especially during Winter), constant night, and drifting ice, making it one of the most dangeorus routes used."
 med_corridor_history:0 "§G+5 Lend-Lease Route Capacity§!\n\nThe Mediterranean Route was a lend-lease route that deliered British and American Lend-Lease supplies through the Bosphorous Strait into Soviet Black Sea ports. " 
 pacific_corridor_history:0 "§G+5 Lend-Lease Route Capacity§!\n\nThe Pacific Route was a lend-lease route that skirted along the US-Soviet coastline across the Bering Strait by which American Lend-Lease supplies were transferred. The Pacific Route was seen as dangerous due to the threat of Japanese submarines, but few ships were sunk by Japan out of fear of angering the Soviets."
 persian_corridor_history:0 "§G+25 Lend-Lease Route Capacity§!\n\nThe Persian Corridor was a lend-lease route through Iran into Soviet Azerbaijan by which British aid and American Lend-Lease supplies were transferred to the Soviet Union. This Persian Corridor became the only viable, all-weather route to be developed to supply Soviet needs." 
 HMP_soviet_lend_lease_system_desc:0 "We can send £convoy_texticon §CShipments§! worth £production_cost §G2000 Production§! in materials to the Soviet Union for every §GLend-Lease Corridor§! or §GStrategic Objective§! (see Balance of Power) we control during Operation Barbarossa. Each §GLend-Lease Corridor§! also gives §GLend-Lease Route Capacity§! which raises the limit for £convoy_texticon §CShipments§! we can prepare in any given month. Receival of our lend-lease shipments is predicated on control of at least one §GLend-Lease Corridors§! into the Soviet Union. Each click below will use five of our £convoy_texticon §CShipments§! as well as five §HConvoys§!. We will be able to send §CShipments§! starting November 1941."
