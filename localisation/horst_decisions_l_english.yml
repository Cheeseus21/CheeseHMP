 HMP_ll_soviets_send:0 "Lend-Lease the Soviet Union"
 HMP_ll_soviets_send_desc:0 "Operation Barbarossa is the largest military operation conducted in human history. The Axis war machine can only be whittled down by Soviet blood and Allied lend-lease.\n\nWe will send §CShipments§! to the Soviet Union for every §GSupply Corridor§! or §GStrategic Objective§! we control during Operation Barbarossa. Receival of our lend-lease shipments is predicated on control of key §GSupply Corridors§! into the Soviet Union. If every single §GSupply Corridor§! is closed then our Soviet allies will be unable to receive any lend-lease until the corridors are resecured.\n\nOne §CShipment§! is roughly equal to £production_cost §G2000 Production§! in materials.\n\nThe Soviet Union can exchange a §CShipment§! for a similar amount of the following equipment: §YInfantry Equipment I§!, §YAnti-Air Equipment II§!, §YSupport Equipment§!, §YArtillery Equipment II§!, §YRocket Artillery Equipment I§!, §YMotorized Rocket Artillery Equipment§!, §YAnti-Tank Equipment II§!, §YMotorized Equipment§!, §YMechanized Equipment I§!, §YAmphibious Tractor Equipment I§!, §YLight/Medium/Heavy Tank Equipment III§!, §YSuper Heavy Tank Equipment I§!, and §YHomeland Fighter Equipment II§!.\n\n§GSupply Corridors§! are currently [Root.GetSovSupplyRoute]\nThe §GArctic Route§! via Port of Murmansk is currently controlled by §O[213.CONTROLLER.GetFlag][213.CONTROLLER.GETNAME]§! [GetSovSupplyRouteMurmansk].\n\nThe §GPacific Route§! via Honolulu and Vladivostok is currently controlled by §O[416.CONTROLLER.GetFlag][416.CONTROLLER.GETNAME]§! and §O[408.CONTROLLER.GetFlag][408.CONTROLLER.GETNAME]§!, [GetSovSupplyRouteVladivostok]\n\nThe §GPersian Corridor§! via Iran and Baku is currently controlled by §O[412.CONTROLLER.GetFlag][412.CONTROLLER.GETNAME]§! and §O[229.CONTROLLER.GetFlag][229.CONTROLLER.GETNAME]§!, [GetSovSupplyRouteIran]\n\nThe §GMediterrenean Route§! via Malta and Sevastopol is currently controlled by §O[116.CONTROLLER.GetFlag][116.CONTROLLER.GETNAME]§! and §O[137.CONTROLLER.GetFlag][137.CONTROLLER.GETNAME]§!, [GetSovSupplyRouteMalta]\n\n[GetObjOkinawa]\n\n[GetObjIwoJima]\n\n[GetObjMarcusIsland]\n\n[GetObjPalau]\n\n[GetObjSingapore]\n\n[GetObjHongKong]\n\n[GetObjSaipan]\n\nThe Soviet Union has §O[?SOV.SOV_barb_ll_token|+0]§! §CShipments§! of war materials at their disposal.\n\nThe Soviet Union has received a total of §O[?SOV.SOV_barb_ll_token2|+0]§! §CShipments§! of war materials from the Allies over the course of the war."
