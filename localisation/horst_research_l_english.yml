 tank_petrol_electric_engine_H_desc:0 "A combination of a petrol-driven engine providing power to an electric motor. Complex, expensive and unreliable, it does however offer unmatched performance in tactical movements."
 tank_gas_turbine_engine_H:0 "Large Gas Turbine"
 tank_gas_turbine_engine_H_desc:0 "An turbine developed from jet engines. High fuel consumption, but the highest speed of any engine at a given Engine Size."
 
 tank_gasoline_engine_SH:0 "Huge Gasoline Engine"
 tank_gasoline_engine_SH_desc:0 "An Engine running on gasoline will be faster for a given Engine Size, but the fuel will be much more prone to catching fire."
 tank_diesel_engine_SH:0 "Huge Diesel Engine"
 tank_diesel_engine_SH_desc:0 "An Engine running on Diesel fuel is more reliable than a gasoline engine, but not as fast for the same Engine Size."
 tank_petrol_electric_engine_SH:0 "Huge Petrol-Electric Engine"
 tank_petrol_electric_engine_SH_desc:0 "A combination of a petrol-driven engine providing power to an electric motor. Complex, expensive and unreliable, it does however offer unmatched performance in tactical movements."
 tank_gas_turbine_engine_SH:0 "Huge Gas Turbine"
 tank_gas_turbine_engine_SH_desc:0 "An turbine developed from jet engines. High fuel consumption, but the highest speed of any engine at a given Engine Size."
 
 
 tank_modern_cannon:0 "§8Modern§! Cannon"
 tank_modern_howitzer:0 "§8Modern§! Howitzer"
 EQ_MOD_CAT_tank_modern_main_armament_TITLE:0 "Modern Armaments"
 tank_modern_cannon_desc:0 "A general-purpose weapon well suited to a wide variety of tasks. It excells at neither anti-infantry nor anti-tank work, but through its specialized ammunition it retains strong anti-armor characteristics."
 tank_modern_howitzer_desc:0 "A modern field howitzer adapted to be mounted in a vehicle. Its primary purpose is indirect fire support against soft targets, but it can be fired directly at a target if necessary. Carrying only a small amount of armor-percing ammunition, it is ill-suited for anti-tank work."
 tank_modern_anti_air_cannon:0 "§8Modern§! Anti-Air Gun"
 tank_modern_anti_air_cannon_desc:0 "A fast-firing automatic gun designed to engage aircraft. It has limited potential as a fire-support weapon against ground targets."

 modern_rocket_launcher:0 "§8Modern§! Rocket Launcher"
 modern_rocket_launcher_desc:0 "While there are a number of improvements to accuracy, the main advantage of this improved rocket launcher is that it can hold more rockets to fire at the enemy."
 modern_auto_cannon:0 "§8Modern§! Automatic Cannon"
 modern_auto_cannon_desc:0 "Adapted from a fast-firing anti-air gun, this automatic cannon can lay down a hail of fire that is devastating to soft targets. The small caliber does limit its anti-armor performance."
 tank_modern_high_velocity_cannon:0 "§8Modern§! High-Velocity Cannon"
 tank_modern_high_velocity_cannon_desc:0 "A cannon specifically designed to achieve a high muzzle velocity. Using specialized ammunition, it has superb anti-armor characteristics, but its performance against soft targets suffers."
 
 
 
