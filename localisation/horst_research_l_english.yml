 car_4x4_suspension:0 "Four-wheel Drive"
 car_4x4_suspension_desc:0 "4 wheels allow for greater speed and easier manufacturing, allowing for a fast and nimble scouting vehicle."
 car_6x6_suspension:0 "Six-wheel Drive"
 car_6x6_suspension_desc:0 "6 wheels are slower, but have better controlability making for better frontline infantry support vehicles and partisan hunters."
 car_8x8_suspension:0 "Eight-wheel Drive"
 car_8x8_suspension_desc:0 "An 8x8 configuration makes the armored car closer to its tank cousins, more controlability, more ambush potential."
 car_riveted_armor:0 "Riveted Armor"
 car_riveted_armor_desc:0 "Armor Plates bolted to the frame and held together by rivets driven into the edges. A very proven technology that is fairly cheap, but the rivetted edges provide weakpoints in the armor and might hurt the crew if the rivets are hit."
 car_welded_armor:0 "Welded Armor"
 car_welded_armor_desc:0 "Armor plates are welded to the chassis. A faster process than casting, while still providing good protection."
 car_flat_armor:0 "Flat Armor Layout"
 car_flat_armor_desc:0 "Dominant in the inter-war period, flat armor is easy to produce and provides a less cramped hull for the crew, increasing effective coordination."
 car_semi-flat_armor:0 "Semi-flat Armor Layout"
 car_semi-flat_armor_desc:0 "A compromise between angled and non-angled armor, in certain areas the angle is much steeper and therefore the effective thickness is greater while in other parts of the tank the flat hull plates allow for easier part placement."
 car_sloped_armor:0 "Sloped Armor Layout"
 car_sloped_armor_desc:0 "Armor placed at an angle to an incoming shell has a much greater effective thickness than the same amount of armor placed vertically. It also increases the chance that the shell will simply bounce off harmlessly. However, it requires the entire tank to be designed around it, making the vehicle more difficult to assemble."

 car_nft_two_man_tank_turret:0 "Casemate Gun Mount"
 car_nft_two_man_tank_turret_desc:0 "Putting the main gun on an open casemate allows us to mount bigger cannons."
 car_rocket_launcher:0 "§GBasic§! Rocket Launcher"
 car_rocket_launcher_desc:0 "A multi-barrelled launcher for unguided, high-explosive rockets. The high volume of fire gives it excellent performance against soft targets, but even direct hits do little against armored targets."
 car_rocket_launcher_2:0 "§2Improved§! Rocket Launcher"
 car_rocket_launcher_2_desc:0 "While there are a number of improvements to accuracy, the main advantage of this improved rocket launcher is that it can hold more rockets to fire at the enemy."
 car_medium_howitzer_desc:0 "A medium field howitzer adapted to be mounted in a vehicle. Its primary purpose is indirect fire support against soft targets, but it can be fired directly at a target if necessary. Carrying only a small amount of armor-percing ammunition, it is ill-suited for anti-tank work."
 car_medium_howitzer_2:0 "§GImproved§! Medium Howitzer"
 car_medium_howitzer_2_desc:0 "A medium field howitzer adapted to be mounted in a vehicle. Its primary purpose is indirect fire support against soft targets, but it can be fired directly at a target if necessary. Carrying only a small amount of armor-percing ammunition, it is ill-suited for anti-tank work."
 car_medium_howitzer_3:0 "§2Advanced§! Medium Howitzer"
 car_medium_howitzer_3_desc:0 "A medium field howitzer adapted to be mounted in a vehicle. Its primary purpose is indirect fire support against soft targets, but it can be fired directly at a target if necessary. Carrying only a small amount of armor-percing ammunition, it is ill-suited for anti-tank work."

 amtrac_chassis:0 "Amphibious Landing Vehicles"
 amtrac_chassis_short:0 "Amtracs"
 amtrac_chassis_desc:0 "Amphibious Tractors, or Amtracs, allow Marines to be landed on a beach under armored protection. However, this comes at the cost of poor fuel efficiency."
 amtrac_chassis_0:0 "Basic Amphibious Tractor"
 amtrac_chassis_0_short:0 "Basic Amtrac"
 amtrac_chassis_0_desc:0 "Amphibious Tractors, or Amtracs, allow Marines to be landed on a beach under armored protection. However, this comes at the cost of poor fuel efficiency."
 amtrac_chassis_1:0 "Improved Amphibious Tractor"
 amtrac_chassis_1_short:0 "Improved Amtrac"
 amtrac_chassis_1_desc:0 "These Amtracs feature several improvements over the base version, such as a rear loading ramp for easier unloading on the beach."

  
 
 
 car_medium_cannon_3:0 "§2Advanced§! Medium Cannon"
 car_medium_cannon_3_desc:0 "A general-purpose weapon well suited to a wide variety of tasks. It excells at neither anti-infantry nor anti-tank work, but it provides a vehicle with a lot of flexibility."
 car_medium_cannon_desc:0 "A general-purpose weapon well suited to a wide variety of tasks. It excells at neither anti-infantry nor anti-tank work, but it provides a vehicle with a lot of flexibility."
 car_medium_cannon_2_desc:0 "A general-purpose weapon well suited to a wide variety of tasks. It excells at neither anti-infantry nor anti-tank work, but it provides a vehicle with a lot of flexibility."
 car_high_velocity_cannon_m1:0 "§gBasic§! High-Velocity Medium Cannon"
 car_high_velocity_cannon_m1_desc:0 "A cannon specifically designed to achieve a high muzzle velocity. Using specialized ammunition, it has superb anti-armor characteristics, but its performance against soft targets suffers."
 car_high_velocity_cannon_m2:0 "§GImproved§! High-Velocity Medium Cannon"
 car_high_velocity_cannon_m2_desc:0 "A cannon specifically designed to achieve a high muzzle velocity. Using specialized ammunition, it has superb anti-armor characteristics, but its performance against soft targets suffers."
