 SUBDOCTRINE_JUNGLE_FIGHTING:0 "Jungle Warfare"
 SUBDOCTRINE_JUNGLE_FIGHTING_DESC:0 "The dense foliage and extreme conditions of the deep jungle require entirely new approaches to combat. By equipping our engineers with heavy machetes, flamethrowers, and specialized clearing tools, we can cut paths through the thickest undergrowth and root out unseen defenders."
