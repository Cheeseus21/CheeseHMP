 tank_front_plate_fixed_superstructure_turret:0 "Turret Shield"
 tank_front_plate_fixed_superstructure_turret_desc:0 "Metal Armor Plates are mounted on the desired main armament to protect the gunner team from forward-facing small arms fire. However, the sides are left seriously opposed compared to a more complete fixed superstructure. It does allow the factory to mount a larger cannon than ordinarily possible on a lighter chassis. The shield also costs next to nothing to produce compared to other options."
 tank_platform_mount_turret:0 "Gun Platform"
 tank_platform_mount_turret_desc:0 "A platform for mounting a field piece is retrofitted onto the chassis. The gunner crew is exposed to a small arms fire while firing the cannon. Making the tank nearly utterly useless in a traditional armor role. It provides the team better protection while on the move than other motorized field pieces. It also makes the tank cheaper to produce as a whole due to the reduced need for armor plating and a little faster. The factory can also mount a larger cannon than ordinarily possible on the chassis. Admittedly, it makes the tank look like a metal platform and some wood placed on an oversized tractor."
 
 
 
 hull_gun:0 "Close Support Gun"
 hull_gun_desc:0 "A close support gun mounted on a secondary turret or within the hull of the tank. The placement of the gun significantly limits its arc of fire, and thereby effectiveness, but allows for more targets to be engaged. This is particularly useful on the attack."
 tank_module_camouflage_net:0 "Camouflage"
 tank_module_camouflage_net_desc:0 "A mix of colored paint and carefully constructed nets helps blend the tank in with the surrounding environment."
 car_module_camouflage_net:0 "Camouflage"
 car_module_camouflage_net_desc:0 "A mix of colored paint and carefully constructed nets helps blend the armored car in with the surrounding environment."
 mech_module_camouflage_net:0 "Camouflage"
 mech_module_camouflage_net_desc:0 "A mix of colored paint and carefully constructed nets helps blend the half-track in with the surrounding environment."
 amtrac_module_camouflage_net:0 "Camouflage"
 amtrac_module_camouflage_net_desc:0 "A mix of colored paint and carefully constructed nets helps blend the amtrac in with the surrounding environment."
 tank_module_improved_turning_mechanisms:0 "Assisted Turret Drive"
 tank_module_improved_turning_mechanisms_desc:0 "Increased turret rotation speed for tanks."
 car_module_improved_turning_mechanisms:0 "Assisted Turret Drive"
 car_module_improved_turning_mechanisms_desc:0 "Increased turret rotation speed for tanks."

 tank_pintle_hmg:0 "Pintle Mounted Heavy Machine Gun"
 tank_pintle_hmg_desc:0 "A heavy machine gun pintle mounted atop a tank turret. The placement of the gun exposes the crewmember, lowering the gun's overall effectiveness, but it does allow the tank to engage more targets, including aircraft. This is particularly useful on the attack."
 car_pintle_hmg:0 "Pintle Mounted Heavy Machine Gun"
 car_pintle_hmg_desc:0 "A heavy machine gun pintle mounted atop an armored car turret. The placement of the gun exposes the crewmember, lowering the gun's overall effectiveness, but it does allow the armored car to engage more targets, including aircraft. This is particularly useful on the attack."
  
 tank_rocket_rails:0 "Side Mounted Rockets"
 tank_rocket_rails_desc:0 "A set of rail-mounted rocket launchers installed onto the side of a turret."
 car_rocket_rails:0 "Side Mounted Rockets"
 car_rocket_rails_desc:0 "A set of rail-mounted rocket launchers installed onto the side of a turret."
 car_heavy_machine_gun_special:1 "Internal Heavy Machine Gun"
 car_heavy_machine_gun_special_desc:0 "A heavy machine gun in a machine gun mount within the main hull. The placement of the gun limits its arc of fire, lowering overall effectiveness, but it does allow the armored car to engage more targets. This is particularly useful when on the attack."

 
 mechanized_chassis_desc:0 "Mechanized infantry is infantry equipped with armored personnel carriers (APCs) or infantry fighting vehicles (IFVs) for transport and combat. Mechanized infantry is distinguished from motorized infantry in that its vehicles provide a degree of protection from hostile fire, as opposed to soft-skinned wheeled vehicles (trucks or jeeps) for motorized infantry."
 mechanized_chassis_0_desc:0 "Mechanized infantry is infantry equipped with armored personnel carriers (APCs) or infantry fighting vehicles (IFVs) for transport and combat. Mechanized infantry is distinguished from motorized infantry in that its vehicles provide a degree of protection from hostile fire, as opposed to soft-skinned wheeled vehicles (trucks or jeeps) for motorized infantry."
