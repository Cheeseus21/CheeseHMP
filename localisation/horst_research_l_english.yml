 SUBDOCTRINE_ROAD_ENGINEERING:0 "Road & Bridge Engineering"
 SUBDOCTRINE_ROAD_ENGINEERING_DESC:0 "Modern mechanized warfare requires extensive infrastructure to maintain momentum. By focusing our engineering corps on rapid bridge laying, road clearance, and efficient traffic control, our supply lines will never falter and our spearheads will never stall."
