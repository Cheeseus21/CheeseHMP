 amtrac_gasoline_engine:0 "Gasoline Engine"
 amtrac_gasoline_engine_desc:0 "An engine running on gasoline will be faster for a given engine size, but the fuel will be much more prone to catching fire."
 amtrac_diesel_engine:0 "Diesel Engine"
 amtrac_diesel_engine_desc:0 "An engine running on diesel fuel is more reliable than a gasoline engine, but not as fast for the same engine size."
 amtrac_riveted_armor:0 "Riveted Armor"
 amtrac_riveted_armor_desc:0 "Merging Steel plates with rivets is cheap and fast, not requiring a skilled workforce. This however has the side effect of each rivet becoming a weak point."
 amtrac_rolled_homo_armor:0 "Welded Armor"
 amtrac_rolled_homo_armor_desc:0 "Welding together steel plates which have been rolled to a desired thickness, aligning the metal grains within."
 amtrac_easy_maintenance:0 "Easy Maintenance"
 amtrac_easy_maintenance_desc:0 "Hatches around the vehicle give access to many different components of the vehicle, and allow the crew to perform even complex maintenance fairly easily."
 amtrac_radio:0 "Radio"
 amtrac_radio_desc:0 "A basic two-way radio allows mechanized infantry to coordinate tactical maneuvers on a small scale."
 amtrac_smoke_launchers:0 "Smoke Launchers"
 amtrac_smoke_launchers_desc:0 "A battery of pyrotechnic devices that can be triggered from inside the tank to create a thick cloud of smoke to hide the tank. Very useful when on the defensive or after driving into an ambush."
 amtrac_extra_ammo_storage:0 "Extra Ammunition Storage"
 amtrac_extra_ammo_storage_desc:0 "Additional racks of ready ammunition allow the tank to stay in the fight much longer without resupply. However, if the armor is penetrated, the results are likely to be catastrophic. This is particularly problematic when attacking."
 amtrac_wet_ammo_storage:0 "Wet Ammunition Storage"
 amtrac_wet_ammo_storage_desc:0 "Water jackets added to ammunition racks dramatically reduce the risk of the ammunition exploding after the tank is hit, which is greatly appreciated by the crews."
 amtrac_petrol_electric_engine:0 "Petrol-Electric Engine"
 amtrac_petrol_electric_engine_desc:0 "A combination of a petrol-driven engine providing power to an electric motor. Complex, expensive and unreliable, it does however offer unmatched performance in tactical movements."
 amtrac_gas_turbine_engine:0 "Gas Turbine"
 amtrac_gas_turbine_engine_desc:0 "A turbine developed from jet engines. High fuel consumption, but the highest speed of any engine at a given Engine Size."
 car_gas_turbine_engine:0 "Gas Turbine"
 car_gas_turbine_engine_desc:0 "A turbine developed from jet engines. High fuel consumption, but the highest speed of any engine at a given Engine Size."

