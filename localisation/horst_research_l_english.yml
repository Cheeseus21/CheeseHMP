 car_small_cannon:0 "§gBasic§! Small Cannon"
 car_small_cannon_desc:0 "A small and cheap cannon, able to fire both anti-infantry and anti-armor rounds. Its small caliber limits its usefulness."
 car_small_cannon_2:0 "§GImproved§! Small Cannon"
 car_small_cannon_2_desc:0 "A small and cheap cannon, able to fire both anti-infantry and anti-armor rounds. Its small caliber limits its usefulness."
