 mech_full_horstmann_suspension:0 "Tracked Horstmann Suspension"
 mech_full_horstmann_suspension_desc:0 "Similar to the Christie suspension, the Horstmann Suspension distributes weight on multiple wheels allowing mounting of heavier equipment without fear of breakdowns."
