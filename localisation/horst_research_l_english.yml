 armored_car_chassis:0 "Armored Car"
 armored_car_chassis_desc:0 "A chassis built from the ground up to be an armored reconnaissance vehicle, a far cry from the crude metal death boxes of the Great war."
 armored_car_chassis_1_desc:0 "An improved design with the ability to mount more weight and armor while still remaining relativly fast."
 armored_car_chassis_2_desc:0 "A low profile vehicle, fast enough to get in position and get out, providing crucial reconnaissance and having enough bite to take out enemy armor."

 
