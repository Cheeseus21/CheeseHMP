 car_one_man_car_turret:0 "One Man Armored Car Turret"
 car_one_man_car_turret_desc:0 "A small turret barely large enough to hold a single crew member, who is tasked with aiming and loading the main armament as well as keeping watch for targets and threats."
 car_two_man_car_turret:0 "Two Man Armored Car Turret"
 car_two_man_car_turret_desc:0 "A turret that allows for two crew members to share the work of operating the armament and observing the situation. It still does not allow for an effective division of labor amongst the crew."
 car_one_man_tank_turret:0 "One Man Light Tank Turret"
 car_one_man_tank_turret_desc:0 "A small turret barely large enough to hold a single crew member, who is tasked with aiming and loading the main armament as well as keeping watch for targets and threats."
 car_two_man_tank_turret:0 "Two Man Light Tank Turret"
 car_two_man_tank_turret_desc:0 "A turret that allows for two crew members to share the work of operating the armament and observing the situation. It still does not allow for an effective division of labor amongst the crew."
 car_three_man_tank_turret:0 "Three Man Light Tank Turret"
 car_three_man_tank_turret_desc:0 "A turret big enough for the three crew members to divide the tasks of loading and aiming the main armament as well as staying aware of the situation around them."
 car_three_man_car_turret:0 "Three Man Armored Car Turret"
 car_three_man_car_turret_desc:0 "A turret big enough for the three crew members to divide the tasks of loading and aiming the main armament as well as staying aware of the situation around them."

 
 
 car_gasoline_engine:0 "Gasoline Engine"
 car_gasoline_engine_desc:0 "An engine running on gasoline will be faster for a given engine size, but the fuel will be much more prone to catching fire."
 car_diesel_engine:0 "Diesel Engine"
 car_diesel_engine_desc:0 "An engine running on diesel fuel is more reliable than a gasoline engine, but not as fast for the same engine size."

 car_stabilizer:0 "Stabilizer"
 car_stabilizer_desc:0 "A vertical stabilizer improves accuracy on the move, small bumps in terrain no longer give the gunner vertigo."
 car_vision_ports:0 "Improved Vision Ports"
 car_vision_ports_desc:0 "More and better vision ports for crew members allow for better battlefield awareness and efficient recon missions."
 car_smoke_launchers:0 "Smoke Launchers"
 car_smoke_launchers_desc:0 "A set of triggerable smoke grenades allow the armored car to enter and retreat out of position with minimal risk of destruction."
 car_extra_ammo_storage_desc:0 "More ammunition means the vehicle can have prolonged missions at the cost of constant fear of catastrophic failure and detonation if the vehicle is hit."
 car_extra_ammo_storage:0 "Extra Ammunition Storage"
 car_wet_ammo_storage:0 "Wet Ammunition Storage"
 car_wet_ammo_storage_desc:0 "Water jackets added to ammunition racks dramatically reduce the risk of the ammunition exploding after the armored car is hit, this is greatly appreciated by the crew."
 car_auto_loader:0 "Auto Loader"
 car_auto_loader_desc:0 "An auto loading system allows the armored car to keep up fire rate for prolonged periods of time"
 car_easy_maintenance:0 "Easy Maintenance"
 car_easy_maintenance_desc:0 ""
 car_additional_machine_guns:0 "Additional Machine Guns"
 car_additional_machine_guns_desc:0 "Machine guns mounted on the cars turret allow crews to defend against infantry and Air attacks."
 car_internal_machine_gun:0 "Internal Machine Gun"
 car_internal_machine_gun_desc:0 "A internal machine gun for defense against infantry."
 amtrac_machine_gun:0 "Additional Machine Guns"
 amtrac_machine_gun_desc:0 "Machine guns mounted on the amtracs hull allow crews to defend against infantry and Air attacks."
 mech_machine_gun:0 "Additional Machine Guns"
 mech_machine_gun_desc:0 "Machine guns mounted on the mechanizeds hull allow crews to defend against infantry and Air attacks."

