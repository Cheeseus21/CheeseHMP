 SUBDOCTRINE_ARTILLERY_SPAM:0 "Massed Artillery Doctrine"
 SUBDOCTRINE_ARTILLERY_SPAM_DESC:0 "By concentrating our industrial output on heavy guns and rocket systems, we can overwhelm enemy trench lines with an unrelenting wall of shrapnel and high explosives."
