 SUBDOCTRINE_MOUNTAIN_FIGHTING:0 "Mountain Warfare"
 SUBDOCTRINE_MOUNTAIN_FIGHTING_DESC:0 "Combat in mountainous and highly rugged terrain requires specialized engineering. By training our pioneers to blow paths through solid rock and clear extensive cave networks, we can maintain offensive momentum even in the most unforgiving environments."
 mountain_fighting_highland_clearance_tactics:0 "Highland Clearance Tactics"
