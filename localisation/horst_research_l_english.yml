 SUBDOCTRINE_REGIMENTAL_FIREPOWER_DESC:0 "By heavily integrating artillery, anti-tank, and anti-air assets directly into our frontline regiments as dedicated support companies, we ensure that every division commander has immediate access to the heavy firepower required to shatter enemy assaults and repel armored spearheads without waiting for corps-level support."
