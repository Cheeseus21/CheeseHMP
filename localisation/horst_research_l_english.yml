 SUBDOCTRINE_STREAMLINED_DEPLOYMENT_DESC:0 "By standardizing our chassis designs and prioritizing maximum industrial throughput over individual vehicle quality, we can flood the battlefield with an endless swarm of armor, overwhelming the enemy through sheer numbers and relentless momentum."
 
