 car_close_support_gun3_desc:0 "A small weapon designed to fire high-explosive shells against enemy field fortifications to help the infantry on the attack. While capable of engaging tanks, its short barrel and limited ammunition make it unable to deal with more powerful enemy tanks."
 
 
 car_heavy_machine_gun:0 "§gBasic§! Heavy Machine Gun"
 car_heavy_machine_gun_desc:0 "A machine gun provides decent anti-infantry capability for a low cost. Even with special armor-piercing ammunition, its anti-armor performance leaves a lot to be desired."
 car_heavy_machine_gun_2:0 "§GImproved§! Heavy Machine Gun"
 car_heavy_machine_gun_2_desc:0 "A machine gun provides decent anti-infantry capability for a low cost. Even with special armor-piercing ammunition, its anti-armor performance leaves a lot to be desired."
