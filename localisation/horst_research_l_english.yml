 car_squeezebore_adaptor:0 "Squeeze-bore Adaptor"
 car_squeezebore_adaptor_desc:0 "A special adaptor at the end of the gun lowers the diameter of the barrel and squeezes a shell down to a smaller caliber. This significantly increases muzzle velocity and thereby the penetration power of the gun. It does require special ammunition made from rare materials."

 car_holzgas_engine:0 "Holzgas Engine"
 car_holzgas_engine_desc:0 "An engine that burns wood to produce combustible gas or uses compressed gas to power an engine. No oil is required, but the engine itself is very cumbersome and unrelieable."
 car_hydrostatic_engine:0 "Hydrostatic Drive"
 car_hydrostatic_engine_desc:0 "Although the Hydrostatic Drive is a transmission that requires a specialized engine to power it. This makes the tanks turret rotation and tank traverse speed faster, while also consuming less fuel due to being powered by hydraulics."
 car_petrol_electric_engine:0 "Petrol-Electric Engine"
 car_petrol_electric_engine_desc:0 "A combination of a petrol-driven engine providing power to an electric motor. Complex, expensive and unreliable, it does however offer unmatched performance in tactical movements."
  
 tank_designer_mech_amtrac_chassis:0 "Amphibious Mechanized"
 amtrac_full_torsion_bar_suspension:0 "Torsion Bar"
 amtrac_full_torsion_bar_suspension_desc:0 "A fairly reliable suspension system of metal bars fixed to the vehicle chassis that provides a smoother ride than other suspension types."
 amtrac_full_horstmann_suspension:0 "Horstmann Suspension"
 amtrac_full_horstmann_suspension_desc:0 "Similar to the Christie suspension, the Horstmann Suspension distributes weight on multiple wheels allowing mounting of heavier equipment without fear of breakdowns."
 amtrac_full_hydropneumatic_suspension:0 "Hydropneumatic Suspension"
 amtrac_full_hydropneumatic_suspension_desc:0 "A more complex type of suspension, road wheels lift up upon encoutering bumps on terrain, allowing for more accurate fire on the move and taking up defensive positions on rough terrain."
 
 amtrac_hydrostatic_engine:0 "Hydrostatic Drive"
 amtrac_hydrostatic_engine_desc:0 "Although the Hydrostatic Drive is a transmission that requires a specialized engine to power it. This makes the tanks turret rotation and tank traverse speed faster, while also consuming less fuel due to being powered by hydraulics."
 
