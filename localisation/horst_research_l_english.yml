 mech_full_hydropneumatic_suspension_desc:0 "A more complex type of suspension, road wheels lift up upon encoutering bumps on terrain, allowing for more accurate fire on the move and taking up defensive positions on rough terrain."
 mech_hydrostatic_engine:0 "Hydrostatic Drive"
 mech_hydrostatic_engine_desc:0 "Although the Hydrostatic Drive is a transmission that requires a specialized engine to power it. This makes the tanks turret rotation and tank traverse speed faster, while also consuming less fuel due to being powered by hydraulics."

