 mtg_britain.3131.d:0 "We have some budget surplus to invest into one of the arms of military, However there is much debate around the situation."
 mtg_britain.3131.a:0 "Our armed forces are more important."
 mtg_britain.3131.b:0 "The skies must be ours."
 mtg_britain.3131.c:0 "The seas will be controlled by us."
 
