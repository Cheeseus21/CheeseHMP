 romania.1.t:0 "Election of 1937"
 romania.1.d:0 "For the first time, the "government party" failed to reach the 40% threshold required to automatically gain a massive majority in parliament. With no clear winner and the Iron Guard coming in a strong third, the King used the "chaos" as an excuse to appoint a fringe far-right government (the Goga-Cuza government), which lasted only 44 days before the King declared his own dictatorship."
 romania.1.a:0 "Carol II declares Royal Dictatorship!"
 romania.1.b:0 "Iron Guard assassinates Carol II!"
 
 vichy_event.1.t:0 "Arrest Gamelin"
 vichy_event.1.d:0 "Our defeat in Belgium and Ardennes cannot be fully attributed to General Gamelin, However someone has to be a scapegoat for our humiliating defeat. We have 2 choices: Arrest Gamelin and his staff or let them keep working under the new regime."
 vichy_event.1.a:0 "We cannot arrest him and his men."
 vichy_event.1.b:0 "We need to focus on other areas."
 
 vichy_event.2.t:0 "Secure Darlan"
 vichy_event.2.d:0 "Admiral Darlan refuses to both hand over the French Fleet to either of the sides. Due to his position in the navy removing him and his influence would take a long time. A choice has to be made!"
 vichy_event.2.a:0 "Arrest Darlan immediately!"
 vichy_event.2.b:0 "Slowly remove his influence."
 vichy_event.2.c:0 "We need to focus on other areas."
 
 vichy_event.3.t:0 "Armistice Proposals"
 vichy_event.3.d:0 "We have won the war! The remaining administration of France has sent us their peace proposals. What should we do mein Fuhrer?"
 vichy_event.3.a:0 "Establish a Reichskommissariat"
 vichy_event.3.b:0 "Establish a Free Zone"
 
 FRA_1936_naval_mtg:0 "French Navy"
 EFR_1936_navy:0 "French Navy"
 
 vichy_event.4.t:0 "Italians Claims"
 vichy_event.4.d:0 "Even though Mussolini's Italy botched their offensive against us, They are now claiming our French lands to themselves. We can use this opportunity to not pay any reparations and just give everything or give up Savoy and pay some reparations!"
 vichy_event.4.a:0 "We will give up Savoy..."
 vichy_event.4.b:0 "We will give up all their claims..."