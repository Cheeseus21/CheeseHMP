l_english:
 NSB_soviet_five_year_plan.4643.t:0 "Allied Grand Strategy System"
 NSB_soviet_five_year_plan.4643.desc:0 "The 'Allied Grand Startegy' balance of power system can modify your war effort against the Axis and the Greater East Asia Co-Prosperity Sphere massively. You can get bonuses and debuffs based on how far you lean into either Japan First! or Germany First! The more you lean into one of these the more powerful your faction is in fighting that nation hence the more relevant it is to Allied Grand Strategy. As the Allies it is critical you sit somewhere on the Germany First! spectrum before launching D-Day, Husky, or otherwise fighting the Axis. You must contain Japan by preventing them from taking historical objectives they failed to reach, such as §BArunchal Pradesh§!, §BPapua New Guinea§!, §BWake Island§!, and §BCeylon§!. Japan will also force the Allies towards Japan First! after taking Singapore. The more objectives Japan takes, the faster the Allies move towards Japan First!. Conversely, taking certain objectives against Japan will move you towards Germany First!, namely those of §BMarcus Island§!, §BTaiwan§!, §BOkinawa§!, §BBangkok§!, and §BIwo Jima§!."
 NSB_soviet_five_year_plan.4643.a:0 "Understood."
 
 romania.7:0 "Iron Guard Gathering"
 romania.7.t:0 "Iron Guard Gathering"
 romania.7.desc:0 "The Iron Guard have gathered at a local plaza, a gathering like this is dangerous for many reasons. They have been known to organize defilements of local monuments, harass local minorities, protest again government activities and to start fights with local law enforcement."
 romania.7.a:0 "Let them have their little gathering..."
 romania.7.b:0 "Having them gather makes it easier to imprison them."
 romania.8:0 "Harassing Minority Citizens"
 romania.8.t:0 "Iron Guard Harassing Minorities"
 romania.8.desc:0 "The Iron Guard are infamous for their xenophobic ideals, and they will gladly demonstrate these ideals to those in Romania that are not considered 'Romanian.' Failure to assist these minorities will lead to an international outcry no matter our current stance on such matters."
 romania.8.a:0 "Who cares?"
 romania.8.b:0 "This will not stand"
 romania.9:0 "Infiltration of Army Elements"
 romania.9.t:0 "Iron Guard Infiltrating the Army"
 romania.9.desc:0 "Our spy network reports that the Iron Guard have been infiltrating the army to give them more political power in the country, if the Iron Guard is allowed to slowly build up support in the army there is no one that can stop them in the case of an armed revolt."
 romania.9.a:0 "The army is powerful enough to deal with this themselves." 
 romania.9.b:0 "Launch a full scale investigation"
 romania.10.t:0 "Political Assassination"
 romania.10.desc:0 "A lower politican has been assassinated, the assassin has been found and he claims that the politician in question was accused of soliciting to non-Romanian activities. The police currently have him locked up in jail." 
 romania.10.a:0 "The politician was too outspoken"
 romania.10.b:0 "Justice strikes the iron when it is hot"
 romania.11.t:0 "Terror Bombing" 
 romania.11.desc:0 "Major terror bombings have happened around Romania, the Iron Guard are claiming to be destroying the properties of non-Romanians. The public is in an outcry and are fearful for their lives, and questioning as to why and how the government could permit something like this..."
 romania.11.a:0 "All unfortunate accidents..." 
 romania.11.b:0 "You will all be reimbursed and the culprits will be caught."
 romania.12.t:0 "The Romanian Elections of 1937"
 romania.12.desc:0 "In the December 1937 elections, the National Liberal government of Prime Minister Gheorghe Tătărescu won the largest number of seats, but less than the required to form a majority government in parliament. The All for Fatherland party won 16% of the vote in the 1937 election, marking the highpoint of the Iron Guard's electoral success. But despite this, King Carol II, swore in the radical anti-Semitic poet Octavian Goga as prime minister."
 romania.12.a:0 "Is this how democracy dies?"
 romania.13.t:0 "The Romanian Elections of 1938"
 romania.13.desc:0 "Carol agreed to Goga's request to dissolve parliament for new elections on 18 January 1938, The 1938 election was one of the most violent elections in Romanian history as the Iron Guard and Lăncieri para-military wing of the National Christian Party battled one another for control of the streets of Bucharest while seeking to establish their anti-Semitic creditations by assaulting Jews. This was of course all a setup by Carol, who was immensely power hungry and ambitious, so that he could take over the government of Romania. Romania now stands at a crossroad, either we give in to the paramilitary wings that are slowly becoming more and more aggressive or we trust in our King to protect the country and its interests."  
 romania.13.a:0 "This is how democracy dies..."
 
 Manhattan.1.a:0 "We will follow this closely."
 countrystartup.129.t:0 "Operation Compass in Horst §0(READ OR LOSE)§!"
 countrystartup.129.desc:0 "What is Operation Compass? It was the British invasion of Libya in late 1940. In Horst, Operation Compass is a state of war between Italy and the Allies concurrent with the Battle of France. Italy joins the war at the same time as Germany declares it.\n\nWhat to know if you are playing Axis:\n-Have a tank minor in Libya; build some tanks as Italy\n-Have some fighters and CAS ready in Libya as Italy or Germany\n-The entire Axis will receive bonuses to encirclement penalty, entrenchment speed, planning speed, org loss on low org, HP, supply range, and supply consumption for each state in Libya lost to the Allies to counter-balance the difficulties in retaking Libya.\n\nWhat to know if you are playing Allies:\n-You will prepare 1 convoy shipment per Libyan state you control per month"
 fincon.11.t:0 "The Battle of Britain"
 fincon.11.d:0 "As the battle of France comes to an end, German bombers and fighters prepare to clash with the RAF over the skies of England. The aerial campaign over Britain may signify prepartions for an upcoming amphibious operation."
 fincon.11.a:0 "The world watches on..."
 britain.193.t:0 "Germany Appropriates Resources in Northern Sweden"
 britain.193.d:0 "Following demands by German foreign minister Joachim von Ribbentrop, Sweden has transferred rights to Lapplands resources and mines to the Third Reich. Reichsminister of Economics, Walter Funk, drafted the "Trade Deal" earlier last week, calling it a milestone in ensuring "peace and friendship" betweeen the two nations."
 britain.193.a:0 "The German war economy grows..."
 finland.12.t:0 "105 Days of Snow and Blood"
 finland.12.d:0 "The last three months have soaked Finland's white and green forests red with the blood of Soviet invaders. We have achieved the unthinkable, defending every meter of Finnish soil against a nation fifty times our size!"
 finland.12.a:0 "Finland is safe, for the moment."
 finland.11.t:0 "Disaster in Finland"
 finland.11.d:0 "The Red Army has made an embaressing display of itself, losing battle after battle to the Finns. This mockery cannot stand and someone must pay for this incompetence!"
 finland.11.a:0 "Go to Gulag!"
 finland.20.t:0 "The Liberation of Finland"
 finland.20.d:0 "The Finnish proletariat along with our communist comrades have languished in Finland since the Reds lost the civil war. Germany has meanwhile become increasingly militaristic and jingoistic, constituting an existential threat to the Union. We have demanded that Finland hand over border territories that we need to secure ourselves, but predictably they have rejected them. It is now time to prepare an invasion of Finland and liberate them from capitalist oppression."
 finland.20.a:0 "We will drop 'bread baskets' on them."
 finland.21.t:0 "The Soviet Union Prepares for War"
 Winter_War_Threat:0 "The Winter War"
 poland.1148.d:0 "The German Reich has constructed a wall of coastal forts from Southern France all the way up to the western coast of Norway.\n\n§RThis series of fortifications poses a serious threat to naval invasions unless it is bombed out§!."
 finland.21.d:0 "Since our successful breakaway from the Soviet Empire and winning the civil war against the Reds, the Soviet Union has been an antagonistic and dangerous enemy only tempered by time. Our intelligence now informs us that they prepare for war and will invade in approximately two months."
 news.9990.t:0 "Germany launches Case Blue!"
 zit_failed:0 "Operation Citadel has failed"
 zit_launched:0 "Operation Citadel has been Launched"
 news.9990.d:0 "The German Reich has initiated a summertime operation against the Soviet Union, code name 'Case Blue', aimed at knocking it out of the war following setbacks during Operation Barbarossa. Without winter and mud to slow Germany, the Soviets are forced once again on the backfoot."
 news.9990.a:0 "Another five months of hell..."
 news.9990.b:0 "To Moscow!"
 
 britain.4254.t:0 "Admiral Yamamoto Dead!"
 britain.4254.desc:0 "Horrible news! Admiral Yamamoto has been shot down over the Pacific by American fighters! How did they know it was his plane?"
 britain.4254.a:0 "They must have gotten lucky..."
 
 britain.1315.t:0 "Allies Prepare for Torch"
 britain.1315.d:0 "Military intelligence suggests that the allies are preparing an invasion of Vichy French North Africa. We can expect this invasion to occur in about a month."
 britain.1315.a:0 "Worrisome"
 nsb_news.6131.t:0 "USA Expands Lend-Lease to the Soviet Union"
 nsb_news.6131.a:0 "Ok."
 nsb_news.6131.desc:0 "The Western Allies look in on concern as Operation Barbarossa pushes ever deeper into the Soviet Union. The United States and United Kingdom have jointly agreed to support the Soviet Union materially in their war against the Axis.\n\nTHE ALLIES CAN NOW START LEND-LEASING THE SOVIET UNION"
 countrystartup.29.t:0 "Navy and Sea Lion in Horst §0(READ OR LOSE)§!"
 countrystartup.29.desc:0 "1) You should have multiple fleets, with no fleet exceeding a Command Limit of 100.\n2) Fleets designed to engage other fleets should always have 2 carriers and no more than 2 carriers\n3) Fleets should have high screening values for capitals and carriers\n4) If an engagement looks bad, disengage\n5) Shore bombardment is important! Navies can also block naval invasions with 40% naval superiority\n6) Build screens, capitals, and carriers\n7) Armor can potentially be useful.\n\n§BFleet Command Limit§!\n\nEvery ship class has a 'command limit' value. A fleet (all taskforces underneath one admiral) can support at most 100 'command limit'. As long as you are at or below your command limit value for every fleet with an admiral leading it, then you will not have special debuffs applied to your admiral and country. Any admiral which is leading a fleet that contains capitals or light cruisers will appear in a list just right of the admiral portraits. This list contains useful information about your fleets so that you can easily adhere to this system.\n\nDestroyers/Submarines - 1 command limit\nLight Cruisers/Heavy Cruisers - 2 command limit\nBattleships and Battlecruisers - 4 command limit\nCarriers/Super Heavy Battleships - 6 command limit.\n\n§RON SEA LION§!: Only South-West England and Sussex are invadable for the European Axis. The European Axis will be teleported if they attempt to invade any other part of the UK or Ireland! SEA LION IS PERMITTED!"
 mtg_netherlands.344.a:0 "We must learn more immediately!\n§GWe will unlock a new national focus!§!"
 mtg_netherlands.345.d:0 "A team of archaelogists from Athens has arrived at the island, forced to row to it in a smaller vessel due to no suitable docking site. The island is overgrown with vegetation, which when combined with the thick mist covering the island served to hide something truly astounding. Perfectly preserved ruins were discovered resembling architecture from both the Mycenaean and Hellenic periods of our history. While surveying is continuing, troves of historical artifacts are being discovered in what appears to be a site the size of a modern Greek city!"
 mtg_netherlands.344.d:0 "Archeologists have found an isolated island in a stormy section of the Atlantic ocean. The island is previously uncharted and undiscovered, appearing on no maps from the last five centuries. Suggestions that it formed recently from volcanic activity are impossible, as a cursory survey suggests no volcanic activity. The island is covered in a dense fog, which is anomalous for this area of the Atlantic. Researchers have been unable to find a suitable location to dock or moor the ship. What appears to be a tower of some sorts was spotted peaking through the mist, but it was unclear of what national origin or time period it was from. A new expedition has been organized to discover what lays hidden away on this strange island..." 
 mtg_news.791.d:0 "Since the start of Operation Barbarossa the Workers' and Peasants' Red Army has been plagued by routing, leaving many Soviet industrial and urban centers near the border under Axis control. Joseph Stalin has responded with an order to all Red Army commanders to cease unauthorized retreats and set up special detachments for dealing with deserters."
 mtg_news.792.d:0 "Following a long and arduous process of recovering from the trials of the Great Purge, the Red Army, through the fire and flames of war, has proven itself to be just as tactically competent as the Wehrmacht, despite the retreats. Joseph Stalin has ordered an end to retreating: 'Not one step back'."
 
 
 italy.668.d:0 "Welcome to the Horstorical Multiplayer focus tree for Slovakia! Horst has heavily modified the Slovakia focus tree by mumiago from Hearts of Oak 2 mod for use in Horstorical Multiplayer. Thank you mumiago!"
 italy.968.d:0 "Welcome to the Horstorical Multiplayer focus tree for Mongolia! Horst has heavily modified the Mongolia focus tree by Fantom#8759 from Road to 56 mod for use in Horstorical Multiplayer. Thank you to Fantom#8759!"
 italy.969.d:0 "Welcome to the Horstorical Multiplayer focus tree for Romania! Horst has heavily modified the Romania focus tree by mumiago from Hearts of Oak 2 mod for use in Horstorical Multiplayer. Thank you Mumiago!"
 italy.970.d:0 "Welcome to the Horstorical Multiplayer focus tree for New Zealand! Horst has heavily modified the New Zealand focus tree by featherus from Road to 56 mod for use in Horstorical Multiplayer. Thank you featherus!"
 italy.971.d:0 "Welcome to the Horstorical Multiplayer focus tree for Siam! Horst has heavily modified the Siam focus tree by simpyslav from Road to 56 mod for use in Horstorical Multiplayer. Thank you simpyslav!"
 italy.972.d:0 "Welcome to the Horstorical Multiplayer focus tree for British Raj! Horst has heavily modified the British Raj focus tree by asfinag from Road to 56 mod for use in Horstorical Multiplayer. Thank you asfinag!"
 italy.973.d:0 "Welcome to the Horstorical Multiplayer focus tree for South Africa! Horst has heavily modified the South Africa focus tree by Sarge from South Africa Reworked mod for use in Horstorical Multiplayer. Thank you Sarge!"
 
 
 
 
 italy.663.d:0 "If you see this then your host does not have the new 'Battle for the Bosphorus' DLC by Paradox. Instead of that, Horst has heavily modified the 'Mila Rodino Bulgaria' focus tree by Caon for use in the Horstorical Multiplayer mod. Thank you Caon for the permission to use the mod's assets, including Bulgarian unit leaders, focus icons, and more."
 mtg_news.777.d:0 "The Russian mud season, also known as the Rasputitsa, is a nasty beast, wrecking havoc on motorized vehicles especially. Mud season will end in sixty days.\n\n§RAll divisions on Soviet core territory will have 15% less division attack, suffer 10% attrition, and have a -20% speed penalty (-35% for  armor divisions).§!"
 mtg_news.778.desc:0 "The Russian winter, amicably called General Frost by Russian soldiers, creates massive logistical problems for warfare."
 news.484.t:0 "The Royal Dictatorship"
 news.484.d:0 "International observers of the Romanian election have reported that King Carol the II has suspended the Constitution and seized emergency powers. Carol then proclaimed martial law and suspended all civil liberties under the grounds that the violent election campaign was running the risk of plunging the nation into civil war.\nAfter sacking the old government that he had installed under the anti-semite Goga, Carol codified his new powers by ratifying the constitution, turning the government into a de facto legal dictatorship. All of the governing powers in Romania were at his hands, turning Romania from a democracy into an absolute monarchy."
 news.484.a:0 "The Balkans Never Disappoint"
 news.485.t:0 "The Iron Price"
 news.485.d:0 "Corneliu Zelea Codreanu, "the Captain" who preached a message of ferociously xenophobic ultra-nationalism, intense Orthodox mysticism, extremely violent anti-Semitism, a populist disdain for all the elites and a glorification of death in the service of the cause as the most beautiful, glorious, noble and erotic experience in the entire world was today sworn in as Prime Minister of Romania. With the violence of the elections, and the appointment of the Octavian Goga cabinet, the King saw no other option but to deliver the power that Codreanu desired to him by making him the leader of Romania, although Codreanu was at first reluctant to accept, he was then able to convince Carol to in fact hand him absolute and totalitarian powers over the state, effectively turning the formerly democratic country into a totalitarian dictatorship."
 news.485.a:0 "The Balkans Never Disappoint"
 news.486.t:0 "Antonescu's Rise to Power"
 news.486.d:0 "Fabricius the German Diplomat in Romania called Carol the II and had one simple demand, to put Antonescu in charge of Romania. With the fall of France, the francophile elite of Romania had lost most of its influence and say almost overnight. Antonescu partly complied with the request but also asked Carol to bestow upon him the reserve powers for Romanian heads of state. Carol yielded and, on September 5, 1940, the general became Prime Minister, and Carol transferred most of his dictatorial powers to him. The latter's first measure was to curtail potential resistance within the Army by relieving Bucharest Garrison chief Gheorghe Argeșanu of his position and replacing him with Dumitru Coroamă."
 news.486.a:0 "The Balkans Never Disappoint" 
 news.487.t:0 "The March on Bucharest"
 news.487.d:0 " After the execution of Codreanu, the Iron Guard had remained silent for a long time, but they were not dead, merely laying dormant and waiting for the best opportunity to strike. They had been revived under the leadership of Horia Sima, and was organizing a coup d'état, now with Antonescu’s imprisonment the perfect opportunity had come as the general was full of resentment for the current government and wished to end the Royal Dictatorship that was bringing Romania to the brink of destruction. With his widespread influence and control over the Romanian army, especially the third army that was stationed in the eastern provinces, Antonescu’s soldier and the Iron Guard marched upon the capital, in an event that shall be known as the “March on Bucharest”. Soldiers who were meant to protect the capital from the “insurrection” as Carol had branded it, simply laid down their weapons or joined with the march. Carol managed to escape in the last moment on a train, whilst chased by elements of the Romanian army and the Iron Guard."
 news.487.a:0 "The Balkans Never Disappoint"
 news.488.t:0 "The Death of Codreanu"
 news.488.d:0 " Loyalist generals of King Carol the II used loyal army elements to eliminate Romanian prime minister Corneliu Zelea Codreanu as the latter was on his way back to the capital after touring the country. Treating this as an insurrection within the army, Antonescu was quick to take charge and took full control over the situation by ordering the generals soldiers to stand down on charges of mutiny and to hand over the culprits to the authorities. After the army was curtailed, Antonescu quickly replaced the other generals with his own loyalists and effectively took full control over the armed forces of Romania, putting him, effectively, in charge of the country. After being treated as a hero after avenging the death of the popular Codreanu, Antonescu placed himself in charge of the country as a Co-Conducator who was to guide the existing Iron Guard leadership."
 news.488.a:0 "The Balkans Never Disappoint"
 Manhattan.1.t:0 "The Manhattan Project"
 Manhattan.1.d:0 "In utmost secrecy, the United States has initiated "The Manhattan Project," a monumental research endeavor involving the world's finest scientific minds. The project's goal is harnessing atomic energy's destructive potential. Whispers in the intelligence community suggest it aims to create a superweapon capable of ending wars swiftly. The major powers closely monitor the project, knowing its outcome could shift global dominance. The project's success or failure will determine the future of global geopolitics."
 Trinity.1.t:0 "Project Trinity"
 Trinity.1.d:0 "In the early hours of this morning, under the cloak of utmost secrecy, the combined efforts of some of the world's most brilliant minds bore fruit in a blinding flash of light and a monumental mushroom cloud in the New Mexico desert. Codenamed "Trinity", the test of the world's first atomic bomb has fundamentally changed the course of warfare and global politics."
 news.9991.t:0 "Germany launches Operation Citadel!"
 news.9991.d:0 "The German Reich has initiated yet another summertime operation against the Soviet Union, code name 'Operation Citadel, aimed at destroying the Soviet army and forcing a peace. Without winter and mud to slow Germany, the Soviets are forced once again on the backfoot, but this time with two campaigns worth of experience."
 news.9991.a:0 "How much longer must the Soviets endure?"
 news.9991.b:0 "The beginning of the end."
 news.9992.t:0 "Germany launches Operation Solstice!"
 news.9992.d:0 "The German Reich has initiated yet another summertime operation against the Soviet Union, code name 'Operation Solstice, aimed at destroying the Soviet army and forcing a peace. Without winter and mud to slow Germany, the Soviets are forced once again on the backfoot, but this time with two campaigns worth of experience."
 news.9992.a:0 "Can the Soviet Union win the war?"
 news.9992.b:0 "Will the Reich succeed finally?"
 ger_heavy.1.t:0 "Germany Begins Heavy Water Production"
 ger_heavy.1.d:0 "MI6 agents have reported that the German Reich has begun production of Heavy Water for the use of nuclear fission experiments. It is impossible to know if or when Germany will learn how to produce a nuclear bomb, but it is certain that if they do so before us that it will cause unimaginable havoc and toil on the free nations of the world. We must seize Norway to prevent this!"
 ger_heavy.1.a:0 "§RGermany will unlock Nuclear Reactors and a 350% Nuclear bombs bonus in 1000 days"
 finland.21.a:0 "We have reached a breaking point!"
 italy.152.t:0 "Athens Captured"
 countrystartup.28.desc:0 "1. Divisions must be 39.2 to 40.0 combat width \n\n2. Divisions must have zero cw of armor battalions or twenty to twenty-six cw of armor, of which all must be of the same class, with the remainder being mobile infantry (not mech/moto ARTY, mech/moto  AT, or mech/moto AA) \n\n3.No Infantry Battalions mixed with Armored or Mobile Battalions \n\n3. No deleting/consolidating/modifying/changing templates when: divisions are intercepted, divisions are 1-5 tiles from the frontline or if divisions are in danger of encirclement (Naval invasions expected) \n\n4. No starting naval invasions or paradropping with under 90% equipped divisions (Unless shot down by anti-air) \n\n5. [ALLIES] No non-French/Dutch/Polish/Greek/Norwegian divisions in French North Africa before France capitulates \n\n6. There cannot be more than 200 carrier based planes on AS over an airzone \n\n7. It is forbidden to have more than one task force assigned to a sea zone or holding in a sea zone (moving is excepted) \n\n9. The ports in Spain are only allowed during The Spanish Civil War."
 mtg_news.788.desc:0 "Following the Fall of Kuibyshev, Soviet leadership has relocated deep behind the Urals and accepted a German call for truce. The Armistice of Kuibyshev has effectively ended war in the east."
 britain.1115.d:0 "The Soviet Union is as much of a murderous and evil political regime, reducing the individual to a face cog in the wheel. In order for a free Europe to exist, the Soviet state must be destroyed."
 britain.1116.d:0 "With the defeat of the German menace threatening the balance of power in continental Europe we have secured ourselves against one tyrannical foe, but another exists in the East. We can re-arm the Italian and German armies to supplement our divisions, of course under the condition that they fully transition to a free market democratic system."
 japan.144.t:0 "Strike South!"
 japan.144.d:0 "With the world's attention on the war in Europe, Asia has been left weakened and vulnerable. Now is the perfect time to launch a strike on the Southern Resource Area!"
 japan.144.a:0 "To war!"
 peace.1.t:0 "Declare War to Reset Volunteers or White Peace All Enemies"
 soviet.509.t: "The Future of China"
 soviet.509.d: "We currently control some of the territory within Manchuria, raising the question of what to do with it. Top members of the Politburo strongly suggest to hand it over to local Communists and creating a satellite state in Asia. Our allies in the Communist Party of China will greatly appreciate this."
 soviet.509.a: "The Union and China will become the two pillars of communism in Asia."
 fincon.1.t: "The Continuation War"
 fincon.1.d: "The Germans have finally launched their crusade against Bolsheviks and we can now reclaim the land we've lost during the Winter War."
 fincon.1.a: "Restore the former Finnish border!"
 fincon.1.b: "Not a good idea, the Germans will probably lose this war..."
 fincon.2.t: "The Continuation War Begins"
 fincon.2.d: "Finland, the loser of the Winter War, has yet again renewed hostilities against the Soviet Union in hopes of regaining its own territory. With the bulk of Soviet forces tied to the south against the Germans the Soviet Union's situation got even worse as they now have to deal with both Germany and Finland at the same time."
 fincon.2.a: "The end of Bolshevik regime draws ever nearer."
 fincon.2.b: "They can reach Leningrad by the end of the year..."
 fincon.6.t: "Moscow Armistice"
 fincon.6.d: "The long and fruitless Continuation War is now over. Finland wasn't able to gain any territory from the Soviets and furthermore it lost control over Petsamo and its naval base of Porkkala. Soviets on the other hand weren't able to conquer Finland, but are now free to focus on Germany."
 fincon.6.a: "Traitors! All of them!"
 fincon.6.b: "The war in Europe is nearing its conclusion."
 britain.1113.t:0 "Norway Seeks to Join the Allies"
 britain.1113.d:0 "The Scandanavian nation of Norway has fallen under attack by Axis forces. If we, as an island nation protected by the channel from the chaos of European affairs, are to win this war then we need to forge new alliances with all those who fall under the oppression of Germany and her allies."
 britain.1113.a:0 "We shall fight on the mountains too!"
 britain.1114.t:0 "Britain Welcomes Us"
 britain.1114.d:0 "Our diplomats have phoned us from London, informing us that we have successfully entered into a formal military alliance with Britain and her allies. As a member of the Allies, every struggle from from London to Wellington, Oslo to Cairo is now part of our struggle for Norway."
 britain.1114.a:0 "God Save Our Kings!"
 news.1463.t:0 "Arabian Neutrality Violated"
 news.1463.d:0 "In a surprise turn of events, the entire Arabian peninsula has been invaded and entered the war."
 iran.4.t:0 "Iran Surrenders"
 iran.4.d:0 "After the success of operation Countenance, the Persian government and its Shah have surrendered to the joint British-Soviet forces at Tehran. Iran and her resources are now securely out of the grips of the Germans."
 iran.4.a:0 "Cheers to the Anglo-Soviet Alliance!"
 iran.2.t:0 "Iran Concedes Northern Territories"
 iran.2.d:0 "Iranian Azerbaijan and Turkmenistan has finally been reuinited with their Soviet kin. Installation of civil administration as well indoctrination is well underway by Comrades from both republics."
 iran.2.a:0 "Welcome to the Union!"
 iran.3.t:0 "Iran Concedes Oil Fields"
 iran.3.d:0 "After Iran's surrender at Tehran, Iran has ceded control of Southern Iran to the UK, allowing the Allies to control strategic oil fields, utilise the strategic Persian corridor, and the Trans-Iranian Railway."
 iran.3.a:0 "Capital!"
 italy.142.t:0 "Addis Ababa Captured"
 italy.142.d:0 "With the fall of Addis Ababa, we are nearly in full control of Ethiopia.  Now that our long overdue arm of our colonial empire is ours, it remains to be determined how we will administer the territory."
 italy.142.a:0 "Bene! Now to decide what to do with Ethiopia..."
 italy.143.t:0 "The Fate of Ethiopia"
 italy.143.d:0 "Ethiopia has long been a thorn in the side of Italian national pride since losing the last Italo-Ethiopian War. Now the world may look upon Italy's ascendency as the masters of the Mediterrenean. King Victor Emmanuel III has bestowed the title of 'Duke of Addis Ababa' to Marshal Pietro Badoglio for his work.  Ethiopia can either be administtered directly by Italy, or as part of a colonial puppet state administered by a colonial viceroy."
 italy.143.b:0 "Create a colonial protectorate out of Ethiopia, Somaliland, and Eritrea"
 italy.143.a:0 "Annex Ethiopia directly into Italy"
 italy.144.t:0 "The Fate of Ethiopia"
 italy.144.d:0 "Ethiopia has long been a thorn in the side of Italian national pride since losing the last Italo-Ethiopian War. Now the world may look upon Italy's ascendency as the masters of the Mediterrenean. King Victor Emmanuel III has bestowed the title of 'Duke of Addis Ababa' to Marshal Pietro Badoglio for his work.  Ethiopia can either be administtered directly by Italy, or as part of a colonial puppet state administered by a colonial viceroy."
 italy.144.a:0 "Create a colonial protectorate out of Ethiopia, Somaliland, and Eritrea"
 iran.1.t:0 "Iran Capitulates"
 spain.29.t:0 "The British Aren't Watching"
 spain.29.d:0 "Following Germany's intervention in Poland, the Allies have aggressed upon the Reich and seek war. As a neutral bystander to this conflagaration, we stand to benefit immensely from it. Germany is very rich in steel, but poor in rare metals such as tungsten, which is plentiful in neighboring Portugal. The British are too busy in France to do prevent a sudden invasion of the Portugese mainland. We can then benefit immensely from trade with the resource hungry Axis war machine."
 spain.29.a:0 "It is time to Make Spain great again."
 italy.146.t:0 "Mussolini Arrested"
 italy.146.d:0 "Following our failures in North Africa and the subsequent Allied invasion of Southern Italy, support for Il Duce has fallen dramatically. With war raging on our soil, and with chronic food shortages, and worsening labor strikes, the Grand Council of Italy has turned against Mussolini in a vote of no confidence. King Victor Emmanuel himself has dismissed Il Duce and ordered his arrest, replacing him with Marshal Pietro Badoglio. Mussolini has been transported all around Italy before finally being imprisoned at Campo Imperatore, a ski resort in Abruzzo."
 italy.146.a:0 "Who will make the trains run on time?"
 italy.147.t:0 "Monarchist Coup d'Etat in Italy"
 italy.147.d:0 "Following Italian incompetence in North Africa and the subsequent Allied invasion of Southern Italy, our all Mussolini, has been betrayed by his countrymen and is now under arrest somewhere in Italy. This is very dangerous for the Reich, as without Mussolini we cannot expect Italy to continue staying in the war on our side. We must carefully consider our next moves."
 italy.147.a:0 "Contact the Abwehr - we must find where Mussolini is being held immediately"
 italy.147.b:0 "This is Italian incompetence at it's finest - we can win the war without their help"
 italy.148.t:0 "Benito Mussolini Located"
 italy.148.d:0 "Thanks to the Abwehr decoding an Italian radio message, we have located Mussolini to a sky resort in Abruzzo near Gran Sasso mountain. High Command has already drawn up several plans for rescuing Mussolini, but the finest of which has come from one of our star generals: Kurt Student. He has planned for a daring Commando raid on the ski resort using a glider plane for transport."
 italy.148.a:0 "Student has proven himself time and time again - make it so."
 italy.148.b:0 "This isn't worth the effort - cancel all plans to intervene."
 italy.149.t:0 "Mussolini Freed"
 italy.149.d:0 "At 1400 today, German SS and Fallschirmjäger troops have made a daring assault on the Campo Imperatore Hotel, freeing Benito Mussolini from his imprisonment. The hotel was stormed without firing a shot, with the few defenders inside surrendering immediately. Mussolini is now to be flown to Munich for a meeting with the Fuhrer. We expect him to co-operate more closely with the Reich and under our supervision."
 italy.149.a:0 "Leave it to a German to save Italy."
 italy.150.t:0 "The Banda Koch"
 italy.150.d:0 "Since the declaration of the Italian Social Republic, anti-Fascist elements from the right, center, and left have been launching raids and attacks against our army. These unpatriotic elements have been a thorn in our side, but in response Pietro Koch, a disreputable Italian of German descent, has formed an anti-partisan unit called 'Banda Koch' to crack down on these terrorists. Their methods, however, are excessive."
 italy.150.a:0 "It is a temporary situation anyways."
 italy.151.t:0 "Il Duce Returns!"
 italy.151.d:0 "Thanks to German bravery and ingenuity, Mussolini has been freed from his detainment and returned to power. The Italian state is to be remade into a republic, as, to quote Mussolini, "It is not the regime that has betrayed the monarchy, it is the monarchy that has betrayed the regime." The new state is to be called 'The Italian Social Republic'."
 italy.151.a:0 "Avanti!"
 france.350.t:0 "The fight continues on!"
 france.350.desc:0 "Following the evacuation of the French army from France, General De Gaulle has announced that the battle for France will continue onwards in Frances colonial empire.  The de facto capital has been moved to Casablanca, as the French military has relocated its headquarters and supply deepots there, in preparation for an Africa campaign." 
 france.351.t:0 "Setbacks in Africa"
 france.351.desc:0 ""
 france.352.t:0 "Admiral Emile Henry Muselier takes over"
 france.352.desc:0 ""
 france.353.t:0 "Admiral resigns; Economy minister takes over and relocates civilian administration to New Caledonia"
 britain.193.a:0 "Host an emergency session in the House of Commons
 tfv_south_africa.133.t:0 "Hertzog Resigns"
 tfv_south_africa.133.d:0 "Today, Prime Minister J. B. M. Hertzog attempted to declare neutrality towards the Nazi aggression in Europe, and attempted to leave South Africa out of the war, as allowed by the Stature of Westminster. However, the bill was rejected by Parliament in Pretoria, led by Jan Smuts, 80 votes to 67. Hertzog attempted to dissolve Parliament and call for a general election, hoping that his bill would pass, however this was rejected by the Governor-general, Sir Patrick Duncan. The result of this was the resignation of Hertzog and appointment of Smuts as the new Prime Minister."
 tfv_south_africa.133.a:0 "To war it is then!"
 afghanistan.1.t:00 "Afghanistan Capitulates"
 wtt_manchukou.100.t:0 "Railway Expansion in Liaoning"
 wtt_manchukou.100.desc:0 "As part of Emperor Puyi's Five Year Plan, it is imperative that we expand our railway networks through Manchuria in order industrialize and keep up with our production targets. Liaoning province is the center of our grand economic transformation. From here, we will industrialize the rest of Manchukuo with the aid of Japanese investment."
 wtt_manchukou.100.a:0 "Immediately work on a line to Mukden"
 wtt_manchukou.120.t:0 "Railway Expansion in Liaotung"
 wtt_manchukou.120.desc:0 "With our railway work modernized and expanded in Liaotung we now have access to prime real estate for steel mining. The aluminum mines of Kirin could stand to benefit from expansion, as can the currently underdeveloped oil fields of Heillungkiang. Much of our country remains underdeveloped."
 wtt_manchukou.101.t:0 "Railway Expansion Direction Needed"
 wtt_manchukou.101.desc:0 "With railway work recently completed we are now able to continue expansion in other parts of our country. Where should we lay tracks next?"
 wtt_manchukou.101.a:0 "In Jehol, to develop our dockyards and shipbuilding industry"
 wtt_manchukou.101.b:0 "In Kirin, to develop our aluminum industry and expand our capital"
 wtt_manchukou.101.c:0 "In Heilungkiang, to develop our petrochemical industry"
 wtt_manchukou.101.z:0 "In Chahar, to develop small arms and artillery industries"
 wtt_manchukou.101.e:0 "In South Chahar, to develop our "tobacco" industry"
 wtt_manchukou.101.f:0 "In Sunkiang, to develop our aviation industry"
 wtt_manchukou.101.g:0 "In Hulunbuir, to develop our armor industry"
 wtt_manchukou.101.h:0 "We have completed our railway expansion program!"
