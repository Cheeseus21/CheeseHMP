 wtt_manchukou.127.t:0 "Completion of the Five-Year Plan"
 wtt_manchukou.127.d:0 "Following years of hard labor and central planning we have finally connected every corner of empire. Our industry has grown considerably, as has our access to our natural mineral and petrochemical wealth. The Five-Year Plan has been completed in as little as four years, thanks to aid from our Japanese brothers and Manchurian will."
 wtt_manchukou.127.a:0 "The Pan-Asian project will soon be realized!"
 wtt_denmark.2.t:0 "Operation Fork"
 wtt_denmark.2.d:0 "At the crack of dawn this morning a contingent of British warships arrived off the coast of Iceland with a complement of 750 Royal Marines. The island nation has offered no resistance whatsoever asides from a diplomatic protest. Icelandic neutrality is irrelevant if it'll cost us precious materials and warships."
 wtt_denmark.2.a:0 "Better us than the Jerries"
 unitednations.0.t: "United Nations Declaration"
 unitednations.0.d: "The Governments signatory hereto, [...] Being convinced that complete victory over their enemies is essential to defend life, liberty, independence and religious freedom, and to preserve human rights and justice in their own lands as well as in other lands, and that they are now engaged in a common struggle against savage and brutal forces seeking to subjugate the world, Declare: (1) [...] to employ its full resources, military or economic, against those members of the Tripartite Pact and its adherents with which such government is at war. (2) [...] to cooperate with the Governments signatory hereto and not to make a separate armistice or peace with the enemies. The foregoing declaration may be adhered to by other nations which are, or which may be, rendering material assistance and contributions in the struggle for victory over Hitlerism."
 unitednations.0.a: "Void words..."
 unitednations.0.b: "Now the real war against the Axis begins!"
 HORST_FUELSYS_TT:0 "Open §GFaction Fuel Management System§!"
 HORST_FUELSYS_TT_DELAYED:0 "§WClicking this button will open a menu which will allow you to manage the fuel supply of your entire faction. This option is only available to Faction Leaders (UK, Germany, Japan)"

 horsthelp.1.t:0 "Help with Fuel Manager"
 horsthelp.1.d:0 "The Fuel Manager is made so that the faction leader of one faction can manage all of the fuel in a faction.\n\nYou can assign a percentage of required fuel reserves to the country that the country should have. The Fuel Manager will try to keep the assigned percentage by taking fuel from the UK, Germany, or Japan. You can also assign a priority based on the position that nation has in the system. To change the priority of a country, click on the arrows."
 horsthelp.1.a:0 "Thank you Horst, very cool!"
 vichy.1.desc:0 "A spearhead of Commonwealth and Free French tanks broke through the Italian lines at Bardia, rushing through Cyrenaica deep into Libya. Allied support planes bomb the Axis tanks fleeing through the desert to Tripoli just several hundred kilometers from French Algeria. Relations with the [ENG.GetFactionName] have been antagonistic at best. With the collapse of Italian Africa, it is fair to suspect that the [ENG.GetFactionName] will use this opportunity to push into Algiers. We have previous few days to prepare a defense in Africa."

 italy.600.t:0 "Italy Surrenders"
 italy.600.d:0 "The culmination of years of Italian incompetence has come to its ultimate conclusion - the capitulation of Italy.  What remains of the Regio Esercito is now under the command of the Heer where it will be put to good use."
 italy.600.a:0 "Alter!"
 
 romania.12.t:0 "The Romanian Elections of 1937"
 romania.12.desc:0 "In the December 1937 elections, the National Liberal government of Prime Minister Gheorghe Tătărescu won the largest number of seats, but less than the required to form a majority government in parliament. The All for Fatherland party won 16% of the vote in the 1937 election, marking the highpoint of the Iron Guard's electoral success. But despite this, King Carol II, swore in the radical anti-Semitic poet Octavian Goga as prime minister."
 romania.12.a:0 "Is this how democracy dies?"

 yugoslavia.101.t:0 "The Nymphenburg Gala"
 yugoslavia.101.d:0 "The question of marriage and succession in the Kingdom of Serbia has long been on the lips of the political class. The length of time we have spent without a legitimate king on the throne has made some question the legitimacy of Karađorđević rule. However, at a recent gala in Bavaria, the young King Peter’s heart was stolen by a fair noblewoman. Already, members of the royal cabinet are discussing wedding plans to secure the King’s romantic interest with a wedding. No doubt, whomever he marries will have a lasting diplomatic impact on our nation."
 yugoslavia.101.a:0 "Duchess Anastasia of Mecklenburg-Schwerin"
 yugoslavia.101.b:0 "Princess Maria Antonia of Hohenzollern"
 yugoslavia.101.c:0 "Princess Marie Louise of Bulgaria"
 yugoslavia.101.e:0 "Princess Marie Françoise of Bourbon-Parma"
 yugoslavia.101.g:0 "Princess Cecilie of Prussia"

 hungarian_princess_name:0 "Duchess Anastasia"
 romanian_princess_name:0 "Princess Maria Antonia"
 bulgarian_princess_name:0 "Princess Marie Louise"
 spanish_princess_name:0 "Princess Marie-Françoise"
 german_princess_name:0 "Princess Cecilie"

 yugoslavia.102.t:0 "Serbia Seeks a Queen"
 yugoslavia.102.d:0 "The Karađorđevićs of Serbia seek to continue the existence of both their royal line and their nation through a royal wedding. It seems that the young King Peter II has become quite infatuated with [Root.GetPrincessName], and has professed his love and devotion to her publicly through the sacred bonds of matrimony in a ceremony held in Belgrade to cheering crowds, witnessing the fairy-tale romance of two lovers brought together in a time of crisis."
 yugoslavia.102.a:0 "How romantic!"

 yugoslavia.103.t:0 "Serbia Seeks a Queen"
 yugoslavia.103.d:0 "The Karađorđevićs of Serbia seek to continue the existence of both their royal line and their nation through a royal wedding. It seems that the young King Peter II has become quite infatuated with [Root.GetPrincessName], and has professed his love and devotion to her publicly through the sacred bonds of matrimony in a ceremony held in Belgrade to cheering crowds, witnessing the fairy-tale romance of two lovers brought together in a time of crisis."
 yugoslavia.103.a:0 "How romantic!"

 countrystartup.100.t:0 "Allied Minor Nations in Horstorical Multiplayer"
 countrystartup.100.d:0 "Allied Minor Step-by-Step \n\n1. Ask the UK player on what build you should do \n\n2. Ask the UK player if they want you in Africa/Asia/DDAY etc. \n\n3. Listen to anything the UK player says \n\n4. Buildup until 1939 August 31st or 1941 January 1st depending on which front UK assigned you \n\nREMEMBER: PAY ATTENTION TO THE UK PLAYER, LISTEN TO THE UK PLAYER, PRAY AND BEG FOR THE UK PLAYER TO HAVE MERCY UPON YOUR SOUL"
 countrystartup.100.a:0 "Thanks for the tip!"
 countrystartup.101.t:0 "Axis Minor Nations in Horstorical Multiplayer"
 countrystartup.101.d:0 "Axis Minor Step-by-Step \n\n1. Ask the Germany player on what build you should do \n\n2. Ask the Germany player if they want you in Africa/Asia/DDAY etc. \n\n3. Listen to anything the Germany player says \n\n4. Buildup until 1939 August 31st or 1941 January 1st depending on which front Germany assigned you \n\nREMEMBER: PAY ATTENTION TO THE GERMANY PLAYER, LISTEN TO THE GERMANY PLAYER, PRAY AND BEG FOR THE GERMANY PLAYER TO HAVE MERCY UPON YOUR SOUL"
 countrystartup.101.a:0 "Thanks for the tip!"
 countrystartup.102.t:0 "United Kingdom in Horstorical Multiplayer"
 countrystartup.102.d:0 "United Kingdom Step-by-Step \n\n1. Produce air for the Allies. \n\n2. Secure naval superiority against Italy and Germany \n\n3. Fight in Africa to bleed Germany before Barbarossa \n\n4. Contain or Capitulate Japan in Asia \n\n5. Keep pressure on Africa during Barbarossa \n\n6. Plan an endgame, either Husky or DDAY and finish the game \n\nREMEMBER: You are the faction leader, make sure that you command your team well! \n\nAlso remember that South-West England, Sussex, Greater London Area and East Anglia are invadable."
 countrystartup.102.a:0 "Thanks for the tip!" 
 countrystartup.103.t:0 "France in Horstorical Multiplayer"
 countrystartup.103.d:0 "France Step-by-Step \n\n1. Build tanks (and extra infantry) for Battle of France in 1939 August 31st \n\n2. You gain 1 Legitimacy per day, so hold until at least until November 1st \n\n3. After you capitulate you will be given rewards on how well you held \n\n4. Hold Africa with your faction \n\nREMEMBER: You are the strongest Allied tank minor in the game, make sure to support your team well!"
 countrystartup.103.a:0 "Thanks for the tip!"
 countrystartup.104.t:0 "United States in Horstorical Multiplayer"
 countrystartup.104.d:0 "United States Step-by-Step \n\n1. Your early economy is limited by The Great Depression, rush focuses to get rid of it \n\n2. Watch your congress seats, you will need them to do critical focuses \n\n3. Build up a Asia Defence with your faction and try to delay/contain/capitulate Japan \n\n4. Plan an endgame with UK, either help with the Husky or DDAY with your faction \n\nREMEMBER: You are a late game major, you will have enough IC to deal with everyone in the game starting in 1942."
 countrystartup.104.a:0 "Thanks for the tip!" 
 countrystartup.105.t:0 "Soviet Union in Horstorical Multiplayer"
 countrystartup.105.d:0 "Soviet Union Step-by-Step \n\nThis Step-by-Step will be different from others due to the unique situation of your nation. \n\n1. Prepare for the Winter War in 1939 December 1st \n\n2. Prepare for Barbarossa in 1941 22nd June \n\n3. Try to counter the Axis by going down into different political paths in your focus tree \n\n4. You might face a Iranian and a Japanese Front in the future, pray that your Allies do well \n\n5. And if the Allies dont do well, Carry the game! \n\nREMEMBER: Your frontline cities starts with %10 core defence and the backline cities starts with %5 core defence, so take care in choosing which line to hold."
 countrystartup.105.a:0 "Thanks for the tip!"  
 countrystartup.106.t:0 "British Raj in Horstorical Multiplayer"
 countrystartup.106.d:0 "British Raj Step-by-Step \n\n1. Ask your UK if they want you to capitulate Ethiopia or to help Africa out. \n\n2. Prepare Burma and Bengal against the Japanese Invasion in 1941 January 1st \n\n3. Survive. \n\nREMEMBER: You are the strongest minor in the game, The Asian Front basically depends on whether you capitulate or not. So make sure not to capitulate, deal with Japan and win the game!"
 countrystartup.106.a:0 "Thanks for the tip!"  
 countrystartup.107.t:0 "Germany in Horstorical Multiplayer"
 countrystartup.107.d:0 "Germany Step-by-Step \n\n1. Prepare Infantry/Tanks/Air for the war in 1939 August 31st \n\n2. Declare war on Poland and capitulate it \n\n3. Declare war on Denmark and Norway and either capitulate them yourself or ask your minors to do it \n\n4. Declare war on Netherlands and go around into France \n\n5. Go into Africa and capture Aswan (or push beyond it, remember the more you bleed the less you will have for Barbarossa) \n\n6. Prepare for Barbarossa in 1941 June 22nd \n\n7. Defend DDAY and capitulate Soviet Union \n\nREMEMBER: Remember to do "Atlantic Wall" focus and make sure you manage what your minors are doing, Germany basically controls the flow of the game with its actions, so take initiative."
 countrystartup.107.a:0 "Thanks for the tip!"   
 countrystartup.108.t:0 "Italy in Horstorical Multiplayer"
 countrystartup.108.d:0 "Italy Step-by-Step \n\n1. Build up an appropriate amount of army/air/navy for the war in 1939 August 31st \n\n2. Hold down Africa until France capitulates, make sure you secure naval supremacy in the Central Mediterrean Sea \n\n3. Push as much as your Germany allows you to, secure defensive lines \n\n4. Hold Africa/Iran/Torch down until your faction capitulates Soviet Union \n\nREMEMBER: You are basically a weaker version of Japan, your minimum responsibility in the game is to hold down The Allies until Soviet Union capitulates. Make good use of the chokepoints and hold Africa as long as you can."
 countrystartup.108.a:0 "Thanks for the tip!"   
 countrystartup.109.t:0 "Japan in Horstorical Multiplayer"
 countrystartup.109.d:0 "Japan Step-by-Step \n\n1. Buildup until 1941 January 1st \n\n2. Make good use of your "Tora! Tora!" and "Invasion Plans" bonus, they only last a limited amount of time, so run wild and capture as much land as you can \n\n3. Your ultimate objective in this game is to bleed out Allied IC and eventually to completely kill them \n\nREMEMBER: Japan has some of the strongest modifiers in the mod, make sure you make good use of them and eventually declare war on the Soviet Union by fulfilling the objectives in your "War against The Soviet Union" focus."
 countrystartup.109.a:0 "Thanks for the tip!"   
 countrystartup.110.t:0 "Finland in Horstorical Multiplayer"
 countrystartup.110.d:0 "Finland Step-by-Step \n\n1. Prepare for a brief war (Winter War) in 1939 December 1st and for Barbarossa in 1941 June 22nd \n\n2. Winning The Winter War will give you 5 civilian factories and 10 Veterans with Medals but you may also choose to not fight against The Soviet Union \n\n3. Your ultimate goal is to "Join the Axis" focus, make sure you fulfill the conditions and hold the Soviets down in the North \n\nREMEMBER: Your MIOs has some of the strongest traits in the game, so make sure to take advantage of them in your fight against the Red Menace."
 countrystartup.110.a:0 "Thanks for the tip!"   
 countrystartup.111.t:0 "Vichy France in Horstorical Multiplayer"
 countrystartup.111.d:0 "Vichy France Step-by-Step \n\n1. Buildup until France capitulates \n\n2. Help Italy with the defense of Africa \n\n3. Hold the state of Constantine for 30 days to avoid serious nerfs to your nation when Torch is declared \n\n4. Your ultimate objective is doing the "End the Occupation" focus, so hold Africa tight until you can."
 countrystartup.111.a:0 "Thanks for the tip!"    
 countrystartup.112.t:0 "Italian East Africa/Iraq in Horstorical Multiplayer"
 countrystartup.112.d:0 "Italian East Africa is more of a timekiller minor nation. You have no special role or gameplan other than delaying when you capitulate. By default, you will play as co-op Italy when you capitulate, but Italy can flag you via a decision to play as Iraq after they complete 'Stoke Iraqi Nationalism'.\n\nIf you end up as Iraq, your job is very straight forward - help Italy defend Iran (and if need be, Arabia) against the Allies. Your research, production, and industry management are not very important, as you play as Iraq in the middle of the game and do not need to play in any particular way to be relevant in 1941. Be sure to coordinate with Italy on how to defend Iran (and Arabia) as well as what doctrine you get from focus."
 countrystartup.112.a:0 "Thanks for the tip!"    
 countrystartup.113.t:0 "Croatia in Horstorical Multiplayer"
 countrystartup.113.d:0 "Croatia Step-by-Step \n\n1. Build your nation up until France capitulates and Germany invades your nation \n\n2. Hold Africa tightly and help Italy out in their defense \n\n3. Defend against any invasions from the Allies \n\nREMEMBER: You are basically a Manchukuo to your Italy player, so the most optimal build you can do for Italy are Tanks. You also dont get any Barbarossa bonuses against the Soviet Union so it is unoptimal for you to fight against them."
 countrystartup.113.a:0 "Thanks for the tip!"     
 countrystartup.114.t:0 "Manchukuo in Horstorical Multiplayer"
 countrystartup.114.d:0 "Manchukuo Step-by-Step \n\n1. Buildup until 1941 January 1st \n\n2. You can either handle an entire front with special forces or do Tanks to help Japan out \n\n3. Coordinate with Japan to fight against the Allies."
 countrystartup.114.a:0 "Thanks for the tip!"     
 
 HMP_tank_minor_tips:0 "Tank Minor Tips"
 countrystartup.115.t:0 "Tank Minor Tips"
 countrystartup.115.d:0 "1. Your 4th to 6th focus should be your tank research bonus focus, make sure you dont delay it. \n\n2. 600-900 research time (even with the bonus) is normal, do not try to put anymore research in between. Your tier 2 tank research should arrive in early 1938. \n\n3. Remember to build your land facility in around 1938. \n\n4. %70 of your military production should be for tanks, %20 for mechanized and %10 for other stuff. \n\n5. If you are new please use the tanks from the "recommended" designs. \n\n6. Make sure you research even the "special projects" required for the templates, you may also need to license whatever it is you need from other players. (Such as katyushas, flamethrowers etc.)"
 countrystartup.115.a:0 "Thanks for the tip!"
 
 HMP_infantry_minor_tips:0 "Infantry Minor Tips"
 countrystartup.116.t:0 "Infantry Minor Tips"
 countrystartup.116.d:0 "1. Your 4th to 6th focus should be whatever you need to rush for your team, make sure you dont delay it. If you are not obligated to rush anything, you can delay it a bit. \n\n2. There are pre-designed templates available in the "Player Panel", however you can modify them to counter your opponent. \n\n3. Make sure you produce "Special Forces Equipment" to equip your forces. \n\n4. Recon tanks and Flamethrower tanks can strenghten your divisions a lot, please dont skip them just because they are expensive. \n\n5. MW doctrine will give you organization walls, GBP will give you defensive and planning stats and SF will give you divisions that can hit anytime."
 countrystartup.116.a:0 "Thanks for the tip!"

 iraq_hist.1.t:0 "The Golden Square launches coup!"
 iraq_hist.1.desc:0 "Threats by the fascist organization of officers known the the Al-Murabbaʿ al-Dhahabī (Golden Square) have been increasing ever since the death of our King Ghazi I and the regency of [IRQ.GetLeader]. The 'square' itself consists of Colonel Salah al-Din al-Sabbagh, Colonel Kamil Shabib, Colonel Fahmi Said, and Colonel Mahmud Salman. These officers advocate for a nationalist government takeover and installing Rashid Ali al-Gaylani as leader of Iraq.\n\nToday these figures have launched their plot. The militant units under al-Sabbagh are moving to secure the royal palace and key strategic locations in Baghdad. Time is of the essence to quell this coup before it succeeds."
 iraq_hist.1.a:0 "A Free Iraq?"
 iraq_hist.2.t:0 "Golden Square takeover in Iraq!"
 iraq_hist.2.desc:0 "An organization of nationalist military officers has successfully launched a coup in Iraq, overthrowing the regent for the young King Faisal II. Rashid Ali al-Gaylani is the new head of government, a stauncly Arab nationalist figure. The new Golden Square National Defense Government has realigned against the British, and is reportedly seeking assistance from [GER.GetNameDef] to resist a likely British invasion.\n\nThis change in geopolitical alignment is likely to bring the war to the Middle East."
 iraq_hist.2.a:0 "We must move to secure our strategic position!"
 iraq_hist.2.b:0 "So it goes."
 iraq_hist.2.c:0 "Organize assistance for our [IRQ.GetAdjective] colleagues, at once!"
 iraq_hist.2.d:0 "Send them our best wishes, but we will remain ambivalent."
 iraq_hist.4.t:0 "[GER.GetNameDefCap] sends materiel support"
 iraq_hist.4.desc:0 "In our coming struggle with the imperialist British, [GER.GetNameDef] has sent support in the form of a light aircraft squadron. It is not much, but still a much needed aid against the aggressor!"
 iraq_hist.4.a:0 "Our thanks to [GER.GetNameDef]"
 iraq_hist.5.t:0 "[ITA.GetNameDefCap] sends materiel support"
 iraq_hist.5.desc:0 "In our coming struggle with the imperialist British, [ITA.GetNameDef] has sent support in the form of a small arms shipment. It is not much, but still a much needed aid against the aggressor!"
 iraq_hist.5.a:0 "Our thanks to [ITA.GetNameDef]" 
 
 iraq_hist.6.t:0 "Iraqi provocations at RAF Habbaniya!"
 iraq_hist.6.desc:0 "An envoy representing [IRQ.GetNameDef] has informed the commanding officer at Royal Air Force Base Habbaniya that the plateau nearby has been occupied to conduct a 'training exercise'. Also as part of the communication, the envoy has demanded that all flying should cease immediately and that no movement, over land or in the air, take place from the base. This has been interpreted as a direct threat."
 iraq_hist.6.a:0 "We must respond with force!"
 iraq_hist.6.b:0 "Withdraw from the base, our position is compromised."
 iraq.1.t:0 "Golden Square Launch Coup d'Etat"
 iraq.1.d:0 "The coup is led by four Iraqi nationalist army generals, known as "the Golden Square", who intend to use the war to press for full Iraqi independence following the limited independence granted by us to them in 1932. MI6 reports that they are coordinating with German intelligence and have accepted military assistance from both Germany and Italy."
 iraq.1.a:0 "This cannot be tolerated!"
 iraq.4.t:0 "The Arabian Revolution"
 iraq.4.d:0 "Our covert efforts to stir Arab nationalism via Ambassador Friz Grobbba have proven successful: Four nationalist Iraqi officers have staged a coup in support of al-Gaylani, a revolutionary nationalist opposed to the British empire and their Bolshevik allies, against the client state government in Baghdad. Al-Gaylani is a clear opportunity to bolster Axis support in the region."
 iraq.4.a:0 "Their petty squabble does not concern the Reich."
 iraq.4.b:0 "We will support the Arab nationalist cause!"
 iraq.5.t:0 "The Siege of RAF Habbaniya"
 iraq.5.d:0 "Amidst the chaos of al-Gaylani's coup, Golden Square forces have surrounded and encircled our RAF Habbaniya airbase, cutting off its supply lines with the outside world. Any further hostile action would constitute an act of war."
 iraq.5.a:0 "Demand the Golden Square withdraws from the airbase"
 iraq.6.t:0 "The Assault on RAF Habbaniya"
 iraq.6.d:0 "After the sucessful Coup d'état, the Golden Circle and its leader, Rashid Ali, secretly continued to strength its ties with the Axis powers. After British reinforcements arrived to continue to secure its petroleum interest, Iraqi forces launched an assault on RAF Habbaniya, one of two remaining RAF bases in lraq."
 iraq.6.a:0 "This is an act of war!"
 iraq.7.t:0 "The Siege of RAF Habbaniya is Lifted"
 iraq.7.d:0 "Allied forces at RAF Habbanijya have successfully lifted the siege by their own resources, allowing RAF planes stationed there to challenge the Iraqi airforce, systematically wiping them out.  This has enabled us to launch a counter-attack towards Baghhdad, paving the way to the restoration of the Iraqi monarchy under Faisal II."
 iraq.7.a:0 "We will storm across the desert."

 sov_great_purge_event.01.t:0 "Industrial Quotas Not Met"
 sov_great_purge_event.01.desc:0 "Our advisors are telling us in our monthly reports that we have not met our industrial quotas, Stalin is furious; he wants answers and he wants them now!"
 sov_great_purge_event.01.a:0 "Falsify Reports"
 sov_great_purge_event.01.b:0 "Blame The Workers and Double Quotas"
 
 sov_great_purge_event.02.t:0 "Suspicious Actions From The Military?"
 sov_great_purge_event.02.desc:0 "Our spies have spotted various meetings between officers, and also some suspicious movement between barracks. Stalin thinks this is an unprecedented crisis and wants it solved now!"
 sov_great_purge_event.02.a:0 "Indicate Our Spies"
 sov_great_purge_event.02.b:0 "Purge The Military (again.)"
 
 sov_great_purge_event.03.t:0 "The Airforce Plot?"
 sov_great_purge_event.03.desc:0 "We have some reports coming from our informants within the airforce, they believe the training exercises over the cities that were done over the last few weeks were for a coup d'etat! Stalin is furious and wants action taken now!"
 sov_great_purge_event.03.a:0 "Assure Him About Exercises"
 sov_great_purge_event.03.b:0 "Purge The Airforce (again.)"
 
 sov_great_purge_event.04.t:0 "The Navy Reports..."
 sov_great_purge_event.04.desc:0 "Our crew informants report that some of the captains of ships and some quartermasters have been spreading anti-communistic sentiment, Comrade Stalin will absolutely not accept this."
 sov_great_purge_event.04.a:0 "Double Check Our Informants"
 sov_great_purge_event.04.b:0 "Purge Our Admirals"
 
 sov_great_purge_event.05.t:0 "First Moscow Trial"
 sov_great_purge_event.05.desc:0 "The investigation into the murder of Comrade Kirov in 1934 has uncovered a lot of leads that point towards a conspiracy between Zinoviev and Trotsky. Following a series of arrests and interrogations, the evidence has only grown more substantial. \n\nAfter a meeting with [Root.GetLeader], Zinoviev and Kamenev have at last confessed to working with Trotsky to overthrow the government, assassinate Soviet leaders and ultimately restore capitalism in the Soviet Union. They are now put on trial with 14 of their co-conspirators. The charges against them weigh heavy - a conviction would mean certain death."
 sov_great_purge_event.05.a:0 "Another group of traitors brought to justice."
 
 sov_great_purge_event.06.t:0 "Second Moscow Trial"
 sov_great_purge_event.06.desc:0 "Following the trial of the first group of Trotskyists and terrorists, investigations by the NKVD have continued and uncovered more evidence. Karl Radek was arrested and eventually cracked during interrogation. He has revealed the existence of a wide-spread network of people fully or partially working with Trotsky in practically all areas of government, including the military. The ringleaders have already been arrested and confessed under interrogation.\n\nThese ringleaders, including Radek, are now on trial. Their crimes are less than the ones charged in the last trial - but the death penalty is certainly a possibility."
 sov_great_purge_event.06.a:0 "Another group of traitors brought to justice."
 
 sov_great_purge_event.07.t:0 "Trial of the Generals"
 sov_great_purge_event.07.desc:0 "The investigations before the Second Moscow Trial also revealed a large network of Trotskyists in the military and upper party leadership, led by Bukharin. These people have been arrested and interrogated, where they have confessed to the most serious and heinous of crimes - from planned sabotage to attempted assassination, conspiring with foreign powers and even mixing nails into butter to injure or kill regular Soviet citizens.\n\nIf convicted, the penalty for these crimes would almost certainly be death by shooting.""
 sov_great_purge_event.07.a:0 "All traitors must pay the ultimate price."
 
 sov_great_purge_event.08.t:0 "Third Moscow Trial"
 sov_great_purge_event.08.desc:0 "NKVD agents have uncovered a disturbing new conspiracy involving several members of our party. All the more worrying since, after several arrests and exhaustive interrogations, the names of several former Bolsheviks have come to light. Further investigation has revealed evidence that a number of these alleged conspirators had indeed been involved in acts of sabotage, factionalism and anti-soviet conduct. These men have been put on trial and are now awaiting the verdict. Judging by the charges against them, conviction will undoubtedly mean a very harsh sentence."
 sov_great_purge_event.08.a:0 "Another group of traitors brought to justice."

