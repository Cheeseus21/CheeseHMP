 poland.26.t:0 "Polish Exiled Army"
 poland.26.d:0 "Our armies are beaten and we have been throughly exiled from our own country, however our exiled government has managed to escape to London through Romania. We can organize armed resistance with the help of our friends!"
 poland.26.a:0 "Organize our commandos into marine units."
 poland.26.b:0 "Organize our army into camelry units."
 poland.26.c:0 "Organize our tanks crews into armored units."
 POL_first_corps_tt:0 "We will organize 10 marines in London."
 POL_second_corps_tt:0 "We will organize 20 camelry units in London."
 POL_exiled_tt:0 "We will organize 6 light tanks/4 medium tanks/2 heavy tanks units in London."
 
 SAF_open_engineering_schools_tt:0 "Hofmeyr's Reforms will give you 2 civilian factories. \n\nDebate and Appeasement will give you 2x Industry Research Bonuses."