 SLO_vojtech_tuka:0 "보이테흐 투카"
 SLO_vojtech_tuka_desc:0 "보이테흐 라자르 투카는 슬로바키아의 정치인이자 흘린카의 슬로바키아 인민당의 급진 친나치파 대표였습니다. 국가 재판소에서 사형을 선고받고 1946년 8월 20일에 처형되었습니다."
 SLO_alexander_mach:0 "알렉산데르 마흐"
 SLO_alexander_mach_desc:0 "알렉산데르 마흐는 슬로바키아의 정치인이자 언론인이었습니다. 흘린카 근위대 사령관, 슬로바키아국의 내무부 장관 겸 부총리를 역임했습니다. 그는 슬로바키아 유대인과 반파시스트 박해에 공동 책임이 있었습니다. 1947년에는 징역 30년형을 선고받았습니다."
 SLO_durcanskys_ideas:0 "두르찬스키의 사상"
 SLO_durcanskys_ideas_desc:0 "1939년부터 1940년까지 그는 슬로바키아 공화국의 외무부 장관과 내무부 장관을 겸임했습니다. 그는 독일로부터 슬로바키아 외교 정책의 일정 수준의 독립성을 유지하려 했고, 그 때문에 아돌프 히틀러의 명령에 따라 소환되었습니다."
