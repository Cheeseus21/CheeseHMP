 CIC_2_idea_desc:0 "§H모드 개발자 코멘트§!: 이것은 모드의 일반적인 부분이 아닙니다. 이것은 초심자들이 주로 참여하는 로비에서 산업 수준을 일반적인 게임과 비슷하게 맞추기 위해 명시적으로 요청된 사항입니다. 이것은 밸런싱에서 고려되지 않았으며, 일반적인 플레이를 위해 의도된 것도 아닙니다."
