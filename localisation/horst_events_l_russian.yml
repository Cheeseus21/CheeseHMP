 wtt_manchukou.127.t: "Завершение Пятилетнего плана"
 wtt_manchukou.127.d: "После лет тяжелого труда и централизованного планирования мы наконец соединили каждый уголок империи. Наша промышленность значительно выросла, как и наш доступ к природным минеральным и нефтехимическим богатствам. Пятилетний план был завершен всего за четыре года, благодаря помощи наших японских братьев и маньчжурской воле."
 wtt_manchukou.127.a: "Паназиатский проект скоро будет реализован!"
 wtt_denmark.2.t: "Операция «Вилка»"
 wtt_denmark.2.d: "На рассвете сегодня утром отряд британских военных кораблей прибыл к побережью Исландии с десантом в 750 королевских морских пехотинцев. Островное государство не оказало никакого сопротивления, кроме дипломатического протеста. Нейтралитет Исландии не имеет значения, если это будет стоить нам драгоценных материалов и военных кораблей."
 wtt_denmark.2.a: "Лучше мы, чем эти фрицы"
 unitednations.0.t: "Декларация Объединённых Наций"
 unitednations.0.d: "Правительства, подписавшие настоящий документ, [...] Будучи убеждены, что полная победа над их врагами необходима для защиты жизни, свободы, независимости и религиозной свободы, а также для сохранения прав человека и справедливости в своих собственных странах и в других странах, и что они сейчас участвуют в общей борьбе против диких и жестоких сил, стремящихся поработить мир, заявляют: (1) [...] использовать все свои ресурсы, военные или экономические, против тех членов Тройственного пакта и его а..."
 unitednations.0.a: "Пустые слова..."
 unitednations.0.b: "Теперь начинается настоящая война против Оси!"
 HORST_FUELSYS_TT: "Открыть §GСистему управления топливом фракции§!"
 HORST_FUELSYS_TT_DELAYED: "§WНажатие на эту кнопку откроет меню, которое позволит вам управлять поставками топлива всей вашей фракции. Эта опция доступна только лидерам фракций (Великобритания, Германия, Япония)"

 horsthelp.1.t: "Справка по диспетчеру топлива"
 horsthelp.1.d: "Диспетчер топлива создан для того, чтобы лидер фракции мог управлять всем топливом во фракции.\n\nВы можете назначить стране процент необходимых топливных резервов, который она должна иметь. Диспетчер топлива попытается поддерживать назначенный процент, забирая топливо у Великобритании, Германии или Японии. Вы также можете назначить приоритет на основе положения страны в списке. Чтобы изменить приоритет страны, нажмите на стрелки."
 horsthelp.1.a: "Спасибо, Хорст, очень круто!"
 vichy.1.desc: "Танковый клин войск Содружества и Свободной Франции прорвал итальянские линии у Бардии, стремительно пройдя через Киренаику вглубь Ливии. Союзные самолеты поддержки бомбят танки Оси, бегущие через пустыню к Триполи, который находится всего в нескольких сотнях километров от Французского Алжира. Отношения с [ENG.GetFactionName] в лучшем случае были антагонистическими. С крахом Итальянской Африки можно обоснованно подозревать, что [ENG.GetFactionName] воспользуется этой возможностью, чтобы продвинуться в Алжир. У нас осталось мало..."

 italy.600.t: "Италия капитулирует"
 italy.600.d: "Кульминация многолетней итальянской некомпетентности пришла к своему логическому завершению — капитуляции Италии. То, что осталось от Regio Esercito, теперь находится под командованием Вермахта, где будет использовано с пользой."
 italy.600.a: "Чёрт возьми!"
 
 romania.12.t: "Румынские выборы 1937 года"
 romania.12.desc: "На выборах в декабре 1937 года правительство национал-либералов премьер-министра Георге Тэтэреску получило наибольшее количество мест, но меньше, чем необходимо для формирования правительства большинства в парламенте. Партия «Всё за Отечество» получила 16% голосов на выборах 1937 года, что стало высшей точкой электорального успеха «Железной гвардии». Но, несмотря на это, король Кароль II привёл к присяге радикального антисемитского поэта Октавиана Гогу в качестве премьер-министра."
 romania.12.a: "Так умирает демократия?"

 yugoslavia.101.t: "Гала-вечер в Нимфенбурге"
 yugoslavia.101.d: "Вопрос брака и престолонаследия в Королевстве Сербия уже давно на устах у политического класса. Долгое время, проведенное без законного короля на троне, заставило некоторых усомниться в легитимности правления Карагеоргиевичей. Однако на недавнем гала-вечере в Баварии сердце юного короля Петра было покорено прекрасной дворянкой. Члены королевского кабинета уже обсуждают планы свадьбы, чтобы закрепить романтический интерес короля. Без сомнения, кем бы ни была его избранница..."
 yugoslavia.101.a: "Герцогиня Анастасия Мекленбург-Шверинская"
 yugoslavia.101.b: "Принцесса Мария Антония Гогенцоллерн"
 yugoslavia.101.c: "Принцесса Мария Луиза Болгарская"
 yugoslavia.101.e: "Принцесса Мария Франсуаза Бурбон-Пармская"
 yugoslavia.101.g: "Принцесса Цецилия Прусская"

