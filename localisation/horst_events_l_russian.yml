 yugoslavia.102.t: "Сербия ищет королеву"
 yugoslavia.102.d: "Карагеоргиевичи из Сербии стремятся продолжить существование как своей королевской линии, так и своей нации через королевскую свадьбу. Похоже, что юный король Пётр II сильно увлекся [Root.GetPrincessName] и публично засвидетельствовал свою любовь и преданность ей священными узами брака на церемонии в Белграде под ликование толпы, ставшей свидетелем сказочного романа двух влюблённых, соединившихся в кризисное время."
 yugoslavia.102.a: "Как романтично!"

 yugoslavia.103.t: "Сербия ищет королеву"
 yugoslavia.103.d: "Карагеоргиевичи из Сербии стремятся продолжить существование как своей королевской линии, так и своей нации через королевскую свадьбу. Похоже, что юный король Пётр II сильно увлекся [Root.GetPrincessName] и публично засвидетельствовал свою любовь и преданность ей священными узами брака на церемонии в Белграде под ликование толпы, ставшей свидетелем сказочного романа двух влюблённых, соединившихся в кризисное время."
 yugoslavia.103.a: "Как романтично!"

 countrystartup.100.t: "Малые нации Союзников в Horstorical Multiplayer"
 countrystartup.100.d: "Пошаговое руководство для малых наций Союзников \n\n1. Спросите игрока за Великобританию, какой билд вам делать \n\n2. Спросите игрока за Великобританию, нужны ли вы им в Африке/Азии/День Д и т.д. \n\n3. Слушайтесь игрока за Великобританию \n\n4. Наращивайте мощь до 31 августа 1939 г. или 1 января 1941 г., в зависимости от того, на какой фронт вас назначил игрок за Великобританию \n\nПОМНИТЕ: УДЕЛЯЙТЕ ВНИМАНИЕ ИГРОКУ ЗА ВЕЛИКОБРИТАНИЮ, СЛУШАЙТЕСЬ ИГРОКА ЗА ВЕЛИКОБРИТАНИЮ, МОЛИТЕСЬ И УМОЛЯЙТЕ ИГРОКА ЗА ВЕЛИКОБРИТАНИЮ СМИЛОВАТЬСЯ НАД ВАШЕЙ ДУШОЙ"
 countrystartup.100.a: "Спасибо за совет!"
 countrystartup.101.t: "Малые нации Оси в Horstorical Multiplayer"
 countrystartup.101.d: "Пошаговое руководство для малых наций Оси \n\n1. Спросите игрока за Германию, какой билд вам делать \n\n2. Спросите игрока за Германию, нужны ли вы им в Африке/Азии/День Д и т.д. \n\n3. Слушайтесь игрока за Германию \n\n4. Наращивайте мощь до 31 августа 1939 г. или 1 января 1941 г., в зависимости от того, на какой фронт вас назначил игрок за Германию \n\nПОМНИТЕ: УДЕЛЯЙТЕ ВНИМАНИЕ ИГРОКУ ЗА ГЕРМАНИЮ, СЛУШАЙТЕСЬ ИГРОКА ЗА ГЕРМАНИЮ, МОЛИТЕСЬ И УМОЛЯЙТЕ ИГРОКА ЗА ГЕРМАНИЮ СМИЛОВАТЬСЯ НАД ВАШЕЙ ДУШОЙ"
 countrystartup.101.a: "Спасибо за совет!"
 countrystartup.102.t: "Великобритания в Horstorical Multiplayer"
 countrystartup.102.d: "Пошаговое руководство для Великобритании \n\n1. Производите авиацию для Союзников. \n\n2. Обеспечьте военно-морское превосходство над Италией и Германией \n\n3. Сражайтесь в Африке, чтобы обескровить Германию до Барбароссы \n\n4. Сдерживайте или капитулируйте Японию в Азии \n\n5. Сохраняйте давление в Африке во время Барбароссы \n\n6. Спланируйте эндгейм, либо Хаски, либо День Д, и завершите игру \n\nПОМНИТЕ: Вы лидер фракции, убедитесь, что вы хорошо командуете своей командой! \n\nТакже помните, что Юго-Западная Англия, Суссекс, район Большого Лондона и Восточная..."
 countrystartup.102.a: "Спасибо за совет!"
 countrystartup.103.t: "Франция в Horstorical Multiplayer"
 countrystartup.103.d: "Пошаговое руководство для Франции \n\n1. Стройте танки (и дополнительную пехоту) для Битвы за Францию 31 августа 1939 г. \n\n2. Вы получаете 1 Легитимности в день, поэтому держитесь как минимум до 1 ноября \n\n3. После капитуляции вы получите награду в зависимости от того, как долго вы продержались \n\n4. Удерживайте Африку вместе со своей фракцией \n\nПОМНИТЕ: Вы сильнейшая танковая малая нация Союзников в игре, обязательно хорошо поддерживайте свою команду!"
 countrystartup.103.a: "Спасибо за совет!"
 countrystartup.104.t: "Соединённые Штаты в Horstorical Multiplayer"
 countrystartup.104.d: "Пошаговое руководство для США \n\n1. Ваша ранняя экономика ограничена Великой депрессией, проходите фокусы, чтобы избавиться от неё \n\n2. Следите за местами в Конгрессе, они понадобятся вам для критически важных фокусов \n\n3. Стройте оборону Азии вместе со своей фракцией и пытайтесь задержать/сдержать/капитулировать Японию \n\n4. Спланируйте эндгейм вместе с Великобританией, либо помогите с Хаски, либо с Днём Д \n\nПОМНИТЕ: Вы поздний мейджор, у вас будет достаточно IC, чтобы справиться со всеми в игре, начиная с 1942 года."
 countrystartup.104.a: "Спасибо за совет!"
 countrystartup.105.t: "Советский Союз в Horstorical Multiplayer"
 countrystartup.105.d: "Пошаговое руководство для СССР \n\nЭто пошаговое руководство будет отличаться от других из-за уникальной ситуации вашей нации. \n\n1. Готовьтесь к Зимней войне 1 декабря 1939 г. \n\n2. Готовьтесь к Барбароссе 22 июня 1941 г. \n\n3. Старайтесь противодействовать Оси, выбирая различные политические пути в своём дереве фокусов \n\n4. В будущем вы можете столкнуться с Иранским и Японским фронтами, молитесь, чтобы ваши союзники справились \n\n5. А если союзники не справятся, тащите игру! \n\nПОМНИТЕ: Ваша линия фронта..."
 countrystartup.105.a: "Спасибо за совет!"
 countrystartup.106.t: "Британская Индия в Horstorical Multiplayer"
 countrystartup.106.d: "Пошаговое руководство для Британской Индии \n\n1. Спросите игрока за Великобританию, хотите ли вы капитулировать Эфиопию или помочь в Африке. \n\n2. Подготовьте Бирму и Бенгалию к японскому вторжению 1 января 1941 г. \n\n3. Выживите. \n\nПОМНИТЕ: Вы сильнейшая малая нация в игре, Азиатский фронт в основном зависит от того, капитулируете вы или нет. Так что не капитулируйте, разберитесь с Японией и выиграйте игру!"
 countrystartup.106.a: "Спасибо за совет!"
 countrystartup.107.t: "Германия в Horstorical Multiplayer"
 countrystartup.107.d: "Пошаговое руководство для Германии \n\n1. Готовьте пехоту/танки/авиацию к войне 31 августа 1939 г. \n\n2. Объявите войну Польше и капитулируйте её \n\n3. Объявите войну Дании и Норвегии и либо капитулируйте их сами, либо попросите ваши малые нации сделать это \n\n4. Объявите войну Нидерландам и обойдите Францию \n\n5. Идите в Африку и захватите Асуан (или продвигайтесь дальше, помните, чем больше вы истекаете кровью, тем меньше у вас останется для Барбароссы) \n\n6. Готовьтесь к Барбароссе 22 июня 1941 г. \n\n7. Защищайтесь от Дня Д и ка..."
 countrystartup.107.a: "Спасибо за совет!"
 countrystartup.108.t: "Италия в Horstorical Multiplayer"
 countrystartup.108.d: "Пошаговое руководство для Италии \n\n1. Нарастите соответствующее количество армии/авиации/флота к войне 31 августа 1939 г. \n\n2. Удерживайте Африку до капитуляции Франции, обязательно обеспечьте военно-морское превосходство в Центральном Средиземном море \n\n3. Наступайте настолько, насколько вам позволит ваша Германия, обеспечьте оборонительные линии \n\n4. Удерживайте Африку/Иран/Торч до тех пор, пока ваша фракция не капитулирует Советский Союз \n\nПОМНИТЕ: Вы по сути более слабая версия Японии, ваша минимальная обязанность в игре — сдерживать Сою..."
 countrystartup.108.a: "Спасибо за совет!"
 countrystartup.109.t: "Япония в Horstorical Multiplayer"
 countrystartup.109.d: "Пошаговое руководство для Японии \n\n1. Наращивайте мощь до 1 января 1941 г. \n\n2. Используйте свои бонусы «Тора! Тора!» и «Планы вторжения», они действуют ограниченное время, так что действуйте дерзко и захватывайте как можно больше земель \n\n3. Ваша конечная цель в этой игре — истощить IC Союзников и в конечном счёте полностью уничтожить их \n\nПОМНИТЕ: У Японии одни из сильнейших модификаторов в моде, обязательно используйте их с умом и в конечном счёте объявите войну Советскому Союзу, выполнив цель..."
 countrystartup.109.a: "Спасибо за совет!"
 countrystartup.110.t: "Финляндия в Horstorical Multiplayer"
 countrystartup.110.d: "Пошаговое руководство для Финляндии \n\n1. Готовьтесь к короткой войне (Зимняя война) 1 декабря 1939 г. и к Барбароссе 22 июня 1941 г. \n\n2. Победа в Зимней войне даст вам 5 гражданских заводов и 10 ветеранов с медалями, но вы также можете выбрать вариант не воевать против Советского Союза \n\n3. Ваша конечная цель — фокус «Присоединиться к Оси», убедитесь, что вы выполнили условия и сдерживаете советских на севере \n\nПОМНИТЕ: Ваши МИО (MIO) обладают одними из сильнейших черт в игре, так что обязательно возьмите..."
 countrystartup.110.a: "Спасибо за совет!"
 countrystartup.111.t: "Вишистская Франция в Horstorical Multiplayer"
 countrystartup.111.d: "Пошаговое руководство для Вишистской Франции \n\n1. Наращивайте мощь до капитуляции Франции \n\n2. Помогите Италии с обороной Африки \n\n3. Удерживайте штат Константина в течение 30 дней, чтобы избежать серьёзных ослаблений для вашей нации при объявлении операции «Факел» \n\n4. Ваша конечная цель — выполнить фокус «Покончить с оккупацией», так что держите Африку до последнего."
 countrystartup.111.a: "Спасибо за совет!"
 countrystartup.112.t: "Итальянская Восточная Африка/Ирак в Horstorical Multiplayer"
 countrystartup.112.d: "Итальянская Восточная Африка — это скорее малая нация для убийства времени. У вас нет особой роли или игрового плана, кроме как задержать момент своей капитуляции. По умолчанию после капитуляции вы будете играть за кооперативную Италию, но Италия может отметить вас через решение, чтобы вы играли за Ирак после того, как они завершат фокус «Разжигание иракского национализма».\n\nЕсли вы в итоге окажетесь Ираком, ваша задача очень проста — помочь Италии защитить Иран (и, если потребуется, Аравию) от Союзников. Ваши исследования, производство и управление промышленностью не очень важны..."
 countrystartup.112.a: "Спасибо за совет!"
 countrystartup.113.t: "Хорватия в Horstorical Multiplayer"
 countrystartup.113.d: "Пошаговое руководство для Хорватии \n\n1. Развивайте свою нацию до капитуляции Франции и вторжения Германии \n\n2. Крепко держите Африку и помогайте Италии в её обороне \n\n3. Отражайте любые вторжения Союзников \n\nПОМНИТЕ: Вы по сути Маньчжоу-го для игрока Италии, поэтому самый оптимальный билд, который вы можете сделать для Италии — это танки. Вы также не получаете никаких бонусов Барбароссы против Советского Союза, поэтому для вас неоптимально воевать против них."
 countrystartup.113.a: "Спасибо за совет!"
 countrystartup.114.t: "Маньчжоу-го в Horstorical Multiplayer"
 countrystartup.114.d: "Пошаговое руководство для Маньчжоу-го \n\n1. Наращивайте мощь до 1 января 1941 г. \n\n2. Вы можете либо удерживать целый фронт силами спецназа, либо делать танки, чтобы помочь Японии \n\n3. Координируйте действия с Японией для борьбы против Союзников."
 countrystartup.114.a: "Спасибо за совет!"
 
 HMP_tank_minor_tips: "Советы для танковых малых наций"
 countrystartup.115.t: "Советы для танковых малых наций"
 countrystartup.115.d: "1. Ваш 4-й по счёту фокус должен быть фокусом на бонус к исследованию танков, убедитесь, что вы его не задерживаете. \n\n2. 600-900 дней исследования (даже с бонусом) — это нормально, не пытайтесь втиснуть между ними другие исследования. Ваше исследование танков 2-го уровня должно завершиться в начале 1938 года. \n\n3. Не забудьте построить наземное предприятие (Land Facility) примерно в 1938 году. \n\n4. %70 вашего военного производства должно идти на танки, %20 на механизированную пехоту и %10 на остальное. \n\n5. Если вы новичок, используйте танки из «рекомендованных» проектов."
 countrystartup.115.a: "Спасибо за совет!"
 
 HMP_infantry_minor_tips: "Советы для пехотных малых наций"
 countrystartup.116.t: "Советы по пехоте для малых стран"
 countrystartup.116.d: "1. Ваш 4-й по 6-й фокусы должны быть тем, что вам нужно срочно сделать для вашей команды, убедитесь, что вы не задерживаете их. Если вы не обязаны ничего спешить, вы можете немного отложить. \n\n2. Доступны предварительно разработанные шаблоны в «Панели игрока», однако вы можете изменить их, чтобы противостоять противнику. \n\n3. Убедитесь, что вы производите «Снаряжение специальных войск», чтобы оснастить ваши силы. \n\n4. Танки-разведчики и танки-огнеметы могут значительно усилить ваши дивизии, пожалуйста, не пропускайте их только потому, что они "
 countrystartup.116.a: "Спасибо за совет!"

 iraq_hist.1.t: "Золотой квадрат совершает переворот!"
 iraq_hist.1.desc: "Угрозы от фашистской организации офицеров, известной как Аль-Мурбабба ад-Дахаби (Золотой квадрат), усиливаются со времен смерти нашего короля Гази I и регентства [IRQ.GetLeader]. Сам «квадрат» состоит из полковника Салах ад-Дина ас-Саббага, полковника Камиля Шабиба, полковника Фахми Саида и полковника Махмуда Салмана. Эти офицеры выступают за захват власти националистическим правительством и установление Рашида Али аль-Гайлани в качестве лидера Ирака.\n\nСегодня эти фигуры запустили свой заговор. "
 iraq_hist.1.a: "Свободный Ирак?"
 iraq_hist.2.t: "Захват власти Золотым квадратом в Ираке!"
 iraq_hist.2.desc: "Организация националистических военных офицеров успешно совершила переворот в Ираке, свергнув регента молодого короля Фейсала II. Рашид Али аль-Гайлани стал новым главой правительства, ярый арабский националист. Новое правительство национальной обороны Золотого квадрата переориентировалось против британцев и, как сообщается, ищет помощи у [GER.GetNameDef] для сопротивления вероятному британскому вторжению.\n\nЭто изменение геополитического курса, вероятно, приведет войну на Ближний Вос"
 iraq_hist.2.a: "Мы должны действовать, чтобы обеспечить наше стратегическое положение!"
 iraq_hist.2.b: "Вот так."
 iraq_hist.2.c: "Немедленно организуйте помощь для наших [IRQ.GetAdjective] коллег!"
 iraq_hist.2.d: "Передайте им наши наилучшие пожелания, но мы сохраним нейтралитет."
 iraq_hist.4.t: "[GER.GetNameDefCap] отправляет материальную поддержку"
 iraq_hist.4.desc: "В нашей грядущей борьбе с империалистическими британцами [GER.GetNameDef] отправил поддержку в виде легкой авиационной эскадрильи. Это немного, но все же столь необходимая помощь против агрессора!"
 iraq_hist.4.a: "Наша благодарность [GER.GetNameDef]"
 iraq_hist.5.t: "[ITA.GetNameDefCap] отправляет материальную поддержку"
 iraq_hist.5.desc: "В нашей грядущей борьбе с империалистическими британцами [ITA.GetNameDef] отправил поддержку в виде партии стрелкового оружия. Это немного, но все же столь необходимая помощь против агрессора!"
 iraq_hist.5.a: "Наша благодарность [ITA.GetNameDef]"
 
 iraq_hist.6.t: "Иракские провокации на базе RAF Хаббания!"
 iraq_hist.6.desc: "Посланник, представляющий [IRQ.GetNameDef], проинформировал командующего на базе Королевских ВВС Хаббания, что близлежащее плато занято для проведения «учебных маневров». Также в рамках сообщения посланник потребовал немедленно прекратить все полеты и чтобы никакие передвижения, по земле или по воздуху, не происходили с базы. Это было расценено как прямая угроза."
 iraq_hist.6.a: "Мы должны ответить силой!"
 iraq_hist.6.b: "Отойти от базы, наша позиция скомпрометирована."
 iraq.1.t: "Золотой квадрат совершает государственный переворот"
 iraq.1.d: "Переворот возглавляют четыре иракских националистических армейских генерала, известных как «Золотой квадрат», которые намерены использовать войну для добивания полной независимости Ирака после ограниченной независимости, предоставленной нами им в 1932 году. MI6 сообщает, что они координируются с немецкой разведкой и приняли военную помощь как от Германии, так и от Италии."
 iraq.1.a: "Это не может быть терпимо!"
 iraq.4.t: "Арабская революция"
 iraq.4.d: "Наши тайные усилия по разжиганию арабского национализма через посла Фрица Гробба оказались успешными: четыре иракских националистических офицера совершили переворот в поддержку аль-Гайлани, революционного националиста, выступающего против Британской империи и их большевистских союзников, против марионеточного правительства в Багдаде. Аль-Гайлани — это явная возможность укрепить поддержку Оси в регионе."
 iraq.4.a: "Их мелкая склока не касается Рейха."
 iraq.4.b: "Мы поддержим арабское националистическое дело!"
 iraq.5.t: "Осада базы RAF Хаббания"
 iraq.5.d: "В хаосе переворота аль-Гайлани силы Золотого квадрата окружили и блокировали нашу авиабазу RAF Хаббания, перерезав ее линии снабжения с внешним миром. Любое дальнейшее враждебное действие будет считаться актом войны."
 iraq.5.a: "Потребовать, чтобы Золотой квадрат отошел от авиабазы"
 iraq.6.t: "Штурм RAF Хаббания"
 iraq.6.d: "После успешного государственного переворота Золотой круг и его лидер Рашид Али тайно продолжили укреплять свои связи с державами Оси. После прибытия британских подкреплений для продолжения обеспечения своих нефтяных интересов иракские силы начали штурм RAF Хаббания, одной из двух оставшихся баз RAF в Ираке."
 iraq.6.a: "Это акт войны!"
 iraq.7.t: "Осада RAF Хаббания снята"
 iraq.7.d: "Силы союзников на базе RAF Хаббания успешно сняли осаду собственными силами, позволив самолетам RAF, базировавшимся там, бросить вызов иракским ВВС, систематически уничтожая их. Это позволило нам начать контратаку на Багдад, проложив путь к восстановлению иракской монархии под руководством Фейсала II."
 iraq.7.a: "Мы прорвемся через пустыню."

 sov_great_purge_event.01.t: "Производственные планы не выполнены"
 sov_great_purge_event.01.desc: "Наши советники сообщают нам в ежемесячных отчетах, что мы не выполнили производственные планы; Сталин в ярости; он требует ответов, и требует их сейчас!"
 sov_great_purge_event.01.a: "Сфальсифицировать отчеты"
 sov_great_purge_event.01.b: "Обвинить рабочих и удвоить планы"
 
 sov_great_purge_event.02.t: "Подозрительные действия военных?"
 sov_great_purge_event.02.desc: "Наши шпионы заметили различные встречи между офицерами, а также некоторые подозрительные перемещения между казармами. Сталин считает это беспрецедентным кризисом и требует немедленного решения!"
 sov_great_purge_event.02.a: "Довериться нашим шпионам"
 sov_great_purge_event.02.b: "Провести чистку военных (снова.)"
 
 sov_great_purge_event.03.t: "Заговор ВВС?"
 sov_great_purge_event.03.desc: "У нас есть несколько сообщений от информаторов внутри ВВС; они считают, что учебные полеты над городами, проводившиеся в последние недели, были подготовкой к государственному перевороту! Сталин в ярости и требует немедленных действий!"
 sov_great_purge_event.03.a: "Уверить его насчет учений"
 sov_great_purge_event.03.b: "Провести чистку ВВС (снова.)"
 
 sov_great_purge_event.04.t: "Доклады флота..."
 sov_great_purge_event.04.desc: "Наши информаторы среди экипажей сообщают, что некоторые капитаны кораблей и некоторые интенданты распространяют антикоммунистические настроения. Товарищ Сталин этого абсолютно не потерпит."
 sov_great_purge_event.04.a: "Перепроверить наших информаторов"
 sov_great_purge_event.04.b: "Провести чистку адмиралов"
 
 sov_great_purge_event.05.t: "Первый Московский процесс"
 sov_great_purge_event.05.desc: "Расследование убийства товарища Кирова в 1934 году выявило много зацепок, ведущих к заговору Зиновьева и Троцкого. После серии арестов и допросов улики стали еще более очевидными.\n\n[Root.GetLeader] принял Зиновьева и Каменева, и те наконец признались, что совместно с Троцким планировали свергнуть правительство, убить советских лидеров и восстановить в Советском Союзе капитализм. Теперь их и 14 их сообщников-заговорщиков ждет суд. Им предъявлены серьезные обвинения, приговор за которые означает верную смерть."
 sov_great_purge_event.05.a: "Очередных предателей ждет справедливое наказание."
 
 sov_great_purge_event.06.t: "Второй Московский процесс"
 sov_great_purge_event.06.desc: "После процесса над первой группой троцкистов и террористов следователи НКВД обнаружили новые улики. Карл Радек был арестован и впоследствии на допросе признался во всем. Он раскрыл существование широкой сети агентов, полностью или частично сотрудничающих с Троцким практически по всем правительственным вопросам, включая военные. Главари уже арестованы и во всем признались на допросах.\n\nНад главарями, включая и Радека, сейчас идет суд. Их преступления не так серьезны, как те, что разбирались на предыдущем процессе, но смертная казнь вполне вероятна."
 sov_great_purge_event.06.a: "Очередных предателей ждет справедливое наказание."
 
 sov_great_purge_event.07.t: "Процесс генералов"
 sov_great_purge_event.07.desc: "Расследования перед Вторым Московским процессом также выявили крупную сеть троцкистов в военных и высшем партийном руководстве, возглавляемую Бухариным. Эти люди были арестованы и допрошены, где они признались в самых серьезных и гнусных преступлениях — от планирования саботажа до попыток убийства, сговора с иностранными державами и даже подмешивания гвоздей в масло, чтобы ранить или убить обычных советских граждан.\n\nВ случае осуждения наказание за эти преступления было бы почти наверняк"
 sov_great_purge_event.07.a: "Все предатели должны заплатить по максимуму."
 
 sov_great_purge_event.08.t: "Третий Московский процесс"
 sov_great_purge_event.08.desc: "Агенты НКВД раскрыли новый опасный заговор, в который вовлечены некоторые члены нашей партии. Хуже того, после нескольких арестов и изнурительных допросов всплыли имена бывших большевиков. Дальнейшее расследование показало, что несколько предполагаемых заговорщиков и в самом деле были вовлечены в акты саботажа, раскола и антисоветской деятельности. Они преданы суду и в настоящее время ожидают приговора. Судя по предъявленным обвинениям, тех, кого признают виновным, ждет суровое наказание."
 sov_great_purge_event.08.a: "Очередных предателей ждет справедливое наказание."

