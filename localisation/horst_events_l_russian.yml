 mtg_britain.3131.t: "Награды Инскипа"
 mtg_britain.3131.d: "У нас есть некоторый избыток бюджета для инвестирования в один из родов войск, однако вокруг ситуации ведутся большие дебаты."
 mtg_britain.3131.a: "Наши вооруженные силы важнее."
 mtg_britain.3131.b: "Небо должно быть нашим."
 mtg_britain.3131.c: "Моря будут под нашим контролем."
 
 mtg_britain.313131.t: "Имперские бронетанковые дивизии"
 mtg_britain.313131.d: "Нам нужно решить, какой доминион будет обеспечивать потребности империи в бронетанковых дивизиях."
 mtg_britain.313131.a: "Канада возьмется."
 mtg_britain.313131.b: "Южная Африка возьмется."
 mtg_britain.313131.c: "Британский Радж возьмется."
 mtg_britain.313131option.d: "Австралия возьмется."
 
 mtg_britain.31313131.t: "Имперская пехотная армия"
