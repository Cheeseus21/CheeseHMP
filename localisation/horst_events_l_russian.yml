wtt_manchukou.127.t:0 "Завершение Пятилетнего плана"
wtt_manchukou.127.d:0 "После многих лет тяжелого труда и центрального планирования мы наконец связали каждый угол империи. Наша промышленность значительно выросла, также как и наш доступ к природному минеральному и нефтехимическому богатству. Пятилетний план был завершен всего за четыре года, благодаря помощи наших японских братьев и воле маньчжуров."
wtt_manchukou.127.a:0 "Скоро будет реализован проект Паназиатского объединения!"

wtt_denmark.2.t:0 "Операция 'Вилка'"
wtt_denmark.2.d:0 "Рассветом этого утра контингент британских военных кораблей прибыл у побережья Исландии с дополнительными 750 королевскими морскими пехотинцами. Островная нация не предложила никакого сопротивления, кроме дипломатической протестации. Исландская нейтралитет не имеет значения, если это обойдется нам дорогой в ценных материалах и военных кораблях."
wtt_denmark.2.a:0 "Лучше мы, чем немцы."

unitednations.0.t: "Декларация Объединенных Наций"
unitednations.0.d: "Правительства, подписавшие настоящий документ, [...] Будучи убежденными в том, что полная победа над их врагами существенна для защиты жизни, свободы, независимости и религиозной свободы, а также для сохранения прав человека и справедливости на своей собственной земле и в других странах, и что они сейчас участвуют в общей борьбе против диких и жестоких сил, стремящихся подчинить себе весь мир, Декларируют: (1) [...] использовать все свои ресурсы, военные или экономические, против тех членов Тройственного пакта и его сторонников, с которыми такое правительство находится в состоянии войны. (2) [...] сотрудничать с правительствами, подписавшими настоящий документ, и не заключать отдельных перемирий или миров с врагами. Приведенное выше заявление может быть принято и другими нациями, которые оказывают или могут оказывать материальную помощь и вклад в борьбу за победу над гитлеризмом."
unitednations.0.a: "Пустые слова..."
unitednations.0.b: "Теперь начинается настоящая война против Оси!"
HORST_FUELSYS_TT:0 "Открыть §GСистему управления топливом фракции§!"
HORST_FUELSYS_TT_DELAYED:0 "§WНажатие этой кнопки откроет меню, которое позволит вам управлять поставкой топлива для всей вашей фракции. Эта опция доступна только лидерам фракции (Великобритания, Германия, Япония)."

horsthelp.1.t:0 "Помощь по управлению топливом"
horsthelp.1.d:0 "Менеджер топлива создан так, чтобы лидер фракции мог управлять всем топливом во фракции.\n\nВы можете назначить процент обязательных резервов топлива для страны. Менеджер топлива будет пытаться поддерживать назначенный процент, извлекая топливо из Великобритании, Германии или Японии. Вы также можете назначить приоритет на основе позиции этой страны в системе. Чтобы изменить приоритет страны, нажмите на стрелки."
horsthelp.1.a:0 "Спасибо, Хорст, очень круто!"

vichy.1.desc:0 "Колонна танков Содружества и свободнофранцузских войск прорвалась через итальянские позиции у города Бардия, мчится через Киренаику глубоко в Ливию. Союзные воздушные силы бомбят бегущие из пустыни итальянские танки, когда они приближаются к Триполи всего в нескольких сотнях километров от Французской Алжира. Отношения с [ENG.GetFactionName] были, мягко говоря, антагонистичными. С крахом итальянской Африки справедливо предполагать, что [ENG.GetFactionName] воспользуется этой возможностью для продвижения в Алжир. У нас осталось всего несколько дней, чтобы подготовить оборону в Африке."

italy.600.t:0 "Италия капитулирует"
italy.600.d:0 "Завершение многолетней неспособности Италии привело к ее окончательной капитуляции. То, что осталось от Regio Esercito, теперь находится под командованием Heer, где оно будет использовано на благо."
italy.600.a:0 "Изменить!"

romania.12.t:0 "Румынские выборы 1937 года"
romania.12.desc:0 "На декабрьских выборах 1937 года Национально-либеральное правительство премьер-министра Георге Тэтэреску получило наибольшее число мест, но не достаточное для формирования большинства в парламенте. Партия "Все за Родину" получила 16% голосов на выборах 1937 года, что стало вершиной избирательного успеха Железной Гвардии. Тем не менее, король Карол II принял присягу радикальному антисемите Октавиану Гоге на пост премьер-министра."
romania.12.a:0 "Так ли умирает демократия?"


 
 countrystartup.100.t:0 "Союзники: Малые нации в Horstorical Multiplayer"
countrystartup.100.d:0 "У большинства малых союзнических наций есть хорошие варианты для строительства с бонусами и генералами, поддерживающими механизированные, пехотные и танковые стройки в одной нации. Любая из них может быть полезной, но вам следует скоординироваться с вашим игроком из Великобритании, чтобы определить, что лучше всего делать. Союзникам необходимо иметь смесь танков и качественной пехоты для борьбы на любом театре войны, поэтому не лучшая идея, если каждая малая нация занимается только танками или только пехотой. Независимо от выбора стройки, вы должны строить гражданские заводы до 1938 года, а затем только военные заводы. Ваш выбор доктрины также будет варьироваться в зависимости от вашей стройки.\n\nВаше действие обычно начнется в Африке. Вы должны быть готовыми к бою в Египте к началу 1940 года, так как кампания в Африке начнется в конце 1939 года или вскоре после этого. Ее продолжительность может варьироваться от нескольких месяцев до более чем года, в зависимости от баланса командного мастерства и координации. После завершения кампании в Африке у вас есть три варианта: (а) Перейти в Азию и сразиться с Японией (б) Подождать в Африке и работать над ее восстановлением после начала Барбароссы или (в) смешать оба варианта. Опять же, скоординируйтесь с игроком из Великобритании. Любой из этих вариантов полезен и может включать в себя много микроуправления.\n\nВ конечном итоге, позднее в игре вы попытаетесь участвовать в операции "Гусеница" (вторжение в Италию) или операции "Оверлорд" (День Д). Идеально, это ваша конечная цель и завершающая часть игры для союзников."
countrystartup.100.a:0 "Спасибо за совет!"
 countrystartup.101.t:0 "Ось: Малые нации в Horstorical Multiplayer"
countrystartup.101.d:0 "Большинство малых стран Оси имеют разнообразные варианты для построек, с бонусами к исследованиям и генералами, поддерживающими механизированные, пехотные и танковые постройки в одной и той же стране. Любой из них может быть полезным, но вам следует согласовать действия с вашим игроком за Германию, чтобы определить, что лучше всего делать. У союзников должна быть комбинация танков и качественной пехоты, чтобы вести бои в любом театре военных действий, поэтому не лучше, если каждая малая страна будет заниматься только танками или только пехотой. Независимо от выбора построек, вам следует строить гражданские заводы до 1938 года, а затем перейти к военным заводам. Ваш выбор в области доктрины также будет меняться в зависимости от того, что вы строите.\n\nКак малая страна Оси, вы должны либо играть в поддерживающей роли в битве за Францию, либо готовиться помочь в театре войны в Африке. Если ваш игрок за Германию не против того, чтобы вы просто сидели в стороне до Барбароссы, старайтесь сделать все возможное, чтобы помочь вашим крупным союзникам. Будьте осторожны с поставками! Сотрудничайте с другими игроками, чтобы не перегружать хаб случайно или давать союзникам возможность планирования, пуша, когда этого не следует делать. Так что проявите инициативу и постарайтесь помочь. После завершения действий в Африке (это может занять до года), вам следует готовиться к Барбароссе (если не указано иное). Снова же, координация - ключевой момент, поэтому работайте с игроками за Германию над тем, как поступить. Барбаросса должна стать завершением вашей игры, но возможно, вас придется вернуть обратно в Южную или Западную Европу, чтобы помочь отразить нашествия союзников."
countrystartup.101.a:0 "Спасибо за совет!"
 countrystartup.102.t:0 "Великобритания в Horstorical Multiplayer"
countrystartup.102.d:0 "Великобритания - главный инициатор союзников, строитель авиации и поддержка (по количеству) пехоты с 1939 по 1940 год. У вас есть исследовательские опции и генералы для механизированных или бронированных войск, но рекомендуется сосредотачиваться на пехоте, если вы не уверены или хорошо скоординированы со своими малыми нациями. Вы должны убедиться, что у вас достаточно истребителей и Штурмовиков для борьбы в Африке, а также флот, который может помочь в береговом обстреле и удерживать Италию в заливе.\n\nСамое важное - иметь план игры, как защищать Египет и план, как вы хотите, чтобы ваши малые нации действовали. Вам понадобится смесь танков и пехоты в Африке, поэтому убедитесь, что некоторые из ваших союзников строят пехоту (Верблюдов или Горную пехоту), а некоторые - танки. Если у вас есть проблемы с уверенностью в себе или у большинства ваших союзников, рекомендуется не удерживаться в Эль-Аламейне, а, скорее, где-то ближе к реке Нилу или Асванским горам. Убедитесь, что у вас есть хотя бы одна кооперация к началу 1940 года, иначе ваш опыт игры будет очень трудным из-за избыточного микроуправления, необходимого для игры за Великобританию (игнорируйте это, если ваш лобби небольшое).\n\nК к 1941 году вам нужно изменить свою ментальность с оборонительной на наступательную. Вы все равно должны планировать оборону, например, как удерживать Британскую Индию от Японии, но вам нужно иметь готовый план по повторному вторжению в Египет, Иран и, в конечном итоге, в Северо-Западную Африку. Даты для этого - начало Барбароссы, конец августа 1941 года и декабрь 1941 года соответственно. На этот момент у вас должно быть достаточно оборудования для большей части пехоты как для Египта, так и для Ирана. Вам понадобится поддержка танков против всего, что не является горами. Обязательно сообщите своим игрокам из малых наций, где и когда вы хотите, чтобы они действовали.\n\nНаконец, вам следует планировать операцию «Хаски» (Италия) или операцию «Оверлорд» (День D). Идеально, это ваша конечная цель и завершение вашей игры. Убедитесь, что все проходит гладко, так как вторые шансы могут быть трудно организовать."
countrystartup.102.a:0 "Спасибо за совет!"
countrystartup.103.t:0 "Франция в Horstorical Multiplayer"
countrystartup.103.d:0 "Франция обычно является более мощной минорной нацией танков. Вы строите базовую пехоту для Битвы за Францию, чтобы сражаться за Легитимность (вы получаете 1 в день), который вам нужно завершить или разблокировать фокусы в вашем фокус-дереве после капитуляции. Большая часть вашей игры после Битвы за Францию не будет сильно отличаться от игры за минорную нацию среди союзников.\n\nВ Африке вы будете тесно сотрудничать с Великобританией в обороне и позднее поможете в Азии или в восстановлении контроля над Африкой. Ваши ядра на северо-западе Африки очень полезны для наступления в 1942 году, а также для операции "День Д" в конечном итоге."
countrystartup.103.a:0 "Спасибо за совет!""
countrystartup.104.t:0 "Соединенные Штаты в Horstorical Multiplayer"
countrystartup.104.d:0 "США - это скорее поздняя крупная нация в Horst. Ваша производственная мощность достаточна только для обороны некоторых частей Азии и противостояния флоту Японии в 1941 году. Вы легко можете набрать достаточное количество промышленной мощности для Дня Д в 1943 году, или в 1942 году с участием некоторых других наций-союзников, но ваше начальное положение очень слабое. В остальном игра для США не сильно отличается от стандартной версии или других модов."
countrystartup.104.a:0 "Спасибо за совет!"
countrystartup.105.t:0 "Советский Союз в Horstorical Multiplayer"
countrystartup.105.d:0 "Как Советский Союз, вы проводите большую часть игры, готовясь к Операции Барбаросса. Вы не вступаете в какие-либо военные действия до 22 июня 1941 года, когда ось, как правило, начинает свое вторжение. Таким образом, у вас есть достаточно времени, чтобы подготовить оборону, но не ошибитесь, думая, что у вас есть много времени на строительство гражданских заводов. Вам придется начать строительство военных заводов в какой-то момент в 1938 году, иначе вам придется столкнуться с трудностями в начале Барбароссы или позже в игре.\n\n§BНастоятельно рекомендуется начать оборону на линии Молотова или Сталина и быть готовыми отступать от нее так долго, как это необходимо. Вы начинаете Барбароссу с бонусами обороны на нац.территорях в размере 12% и 9% соответственно, которые уменьшаются на 1% каждые 15 дней§!\n\nВы должны стремиться к постройке, включающей в себя авиацию, танки и пехоту. Массированый Штурм - рекомендуемый выбор доктрины, хотя другие также могут потенциально сработать. Вы должны быть бдительны по поводу снабжения - убедитесь, что ваши железнодорожные линии достаточно улучшены от вашей столицы до ваших пунктов снабжения. Помимо основного фронта против Оси, вам следует быть бдительными по поводу Финляндии, потенциального фронта в Иране и еще одного потенциального фронта против Японии. Союзники должны быть способны предотвратить фронт против Японии и удержать фронт Оси против вас в Иране, но это не гарантировано."
countrystartup.105.a:0 "Спасибо за совет!"
countrystartup.106.t:0 "Индия в Horstorical Multiplayer"
countrystartup.106.d:0 "Британская Индия, как и в любом другом моде или в стандартной версии игры, в основном занимается обороной Бирмы и Бенгала от японского вторжения. Второстепенным направлением является поддержка в Африке как нации заднего фронта или помощь в капитуляции Итальянской Восточной Африки. Ваша основная фокусировка - это пехота, но различие заключается в том, что вы должны рассмотреть возможность использования специальных войск в дополнение к обычной пехоте. Рейнджеры полезны для атаки джунглей, а Горные войска отлично подходят как для обороны, так и для атаки на холмах или в горах. Все три из этих типов местности актуальны в Бирме и вокруг Бенгала, поэтому убедитесь, что вы строите некоторые из них. Количество противотанковых сил, которые вы хотите строить для вашей пехоты, будет зависеть от того, насколько Япония инвестирует в танки, в частности, строит ли она их исключительно в качестве поддерживающей компании или как самостоятельные юниты. Очень важно, чтобы вы проверяли состояние снабжения вашего фронта и информировали игрока за Великобританию обо всех проблемах, будь то плохое снабжение, отсутствие воздушной поддержки или недостаток союзных юнитов для помощи. Начните вашу оборону на первой речной линии в Бирме и со временем отступайте назад."
countrystartup.106.a:0 "Спасибо за совет!" 
 countrystartup.107.t:0 "Германия в Horstorical Multiplayer"
countrystartup.107.d:0 "Германия похожа на Германию в других модификациях/ванильных версиях. Вы исследуете танки (средние), самолеты (истребители/штурмовики), и в 1939 году осуществляете вторжение в Европу через принятие решений. В 1940 году вы вторгаетесь в Африку, а в 1941 году начинаете вторжение в Советский Союз. Важные моменты, которые отличаются от ванильной версии или других модификаций, включают следующее:\n- Германия сама контролирует воздушные силы во всей Оси\n- Мощные малые нации Оси требуют согласования для достижения победы\n- После капитуляции Франции, вы увидите формирование Вишийской Франции на ее исторических территориях, что означает, что вам нужно беспокоиться только о Египте и Ближнем Востоке\n- В Ближнем Востоке есть значительно больше нефти, особенно в Ираке, что необходимо для поддержания вашей армии\n- Советский Союз, вероятно, будет строить пехоту, танки и авиацию, поэтому ожидайте это во время Барбароссы\n- Контроль над Норвегией ключевой для доступа к ресурсам Швеции, так что обязательно атакуйте и обороняйтесь в Норвегии.\n\nИ, наконец, не забудьте сделать фокус на Атлантический вал, чтобы помочь отражать попытки День-Д."
countrystartup.107.a:0 "Спасибо за совет!"
countrystartup.108.t:0 "Италия в Horstorical Multiplayer"
countrystartup.108.d:0 "Италия имеет общие сходства с другими модификациями и ванильным вариантом, но в Horst она намного более сложная. Вы вступаете в войну 10 декабря 1939 года, независимо от того, была ли капитуляция Франции, и удерживаете Африку до прихода немецких танков для наступления на Египет. Вам не нужно беспокоиться о фронте в Алжире из-за установления Вишийской Франции, но союзники могут вторгнуться туда позднее в 1941 году, открывая там фронт. Вам следует играть в основном в качестве поддержки пехоты, помогая удерживать Европу и предоставляя большую часть пехоты для задержания союзников в Африке. Если у вас есть игрок, управляющий Хорватией, рекомендуется попросить их заниматься технологиями или какой-либо механизированной поддержкой, чтобы у вас была подвижная поддержка в Африке впоследствии. В противном случае, вам следует сделать это самостоятельно. Вы также должны производить воздушные силы для Оси до Барбароссы, когда вам они понадобятся для собственного использования. Германия должна отправить вам несколько истребителей, а также послать вам несколько штурмовиков, чтобы вы могли конкурировать с воздушной силой союзников над Египтом. Чем дольше вы удерживаете, тем лучше, но будьте бдительны перед новыми фронтами в Иране и северо-западной Африке. Обязательно получите согласованные действия для Италии, так как управление микроуправлением слишком требовательно для одного игрока. У вас может быть потенциально три малых нации: Хорватия, Ирак и Вишийская Франция, которые все помогут вам, что очень важно для взаимодействия с таким количеством игроков-союзников. Обязательно общайтесь о любых проблемах, которые возникают у вас в Оси, и согласовывайтесь с упомянутыми малыми нациями, чтобы они вам помогли."
countrystartup.108.a:0 "Спасибо за совет!"
countrystartup.109.t:0 "Япония в Horstorical Multiplayer"
countrystartup.109.d:0 "Япония следует общему плану, аналогичному другим модификациям и ванильной версии - в 1941 году вы объявите войну Союзникам и вторгнетесь в Индию, Голландские Восточные Индии и Филиппины. В чем отличие? Главным образом, здесь нет Сино-японской войны, и вам следует строить танки для поддержки бронетехники и, возможно, создавать несколько самостоятельных танковых дивизий для поддержки вашей пехоты в Бирме. У Японии есть очень сильный бонус 'Тора! Тора! Тора!', поэтому воспользуйтесь им насколько это возможно. В отношении макроэкономики, вам следует построить несколько верфей поздней осенью 1937 года, а затем строить военные фабрики. Манчжурия - необязательна, но обратите внимание, что в Horst Манчжурия значительно более полезна, поэтому, если вы хотите, чтобы малая нация специализировалась в чем-то, это может быть очень полезно для Японии."
countrystartup.109.a:0 "Спасибо за совет!" 
countrystartup.110.t:0 "Финляндия в Horstorical Multiplayer"
countrystartup.110.d:0 "Финляндия, как и Советский Союз, ведет войну Зимы и Войну Продолжения (Барбаросса). Вам необходимо подготовиться к обороне своей территории к 1 декабря 1939 года, так как именно в это время Советский Союз нападет на вас (позже вы вторгнетесь с Германией в середине 1941 года). Рекомендуется строить не более одной гражданской фабрики, чтобы вы могли произвести достаточно оборудования для обороны от Советов. Вы не будете входить в Ось, если не выполните фокус, который блокируется определенными условиями. Вы можете получить несколько бесплатных истребителей и поддержку наземных войск от фокуса, чтобы иметь поддержку в воздухе до этого момента, но это не продлится очень долго. Рекомендуется проводить строй пехоты и попытаться прорываться через Салла или Карелию в Советский Союз. Поставки будут серьезной проблемой в любой другой оси, пока вы не захватите центры поставок у Советов."
countrystartup.110.a:0 "Спасибо за совет!"
countrystartup.111.t:0 "Вишисткая Франция в in Horstorical Multiplayer"
countrystartup.111.d:0" "Виши-Франция - в целом неудачное небольшое государство. Вы исследуете и тратите политическую власть так же, как и другие небольшие государства, но у вас нет промышленной базы до тех пор, пока Франция не капитулирует, передавая вам контроль над большей частью материковой Франции и некоторой колониальной империей Франции. Ваша игра должна вращаться вокруг помощи Италии в Африке, особенно потому, что ваша нация очень зависит от нее.\n\nВы практически наверняка столкнетесь с нашествием Союзников в Северо-Западной Африке, либо из Атлантики, либо из обороняющейся Ливии. Вам нужно удержать состояние Константин в течение полных 30 дней, чтобы избежать серьезных последствий для стабильности и поддержки войны, которые могут привести к завершению игры. Рекомендуется строить пехоту, чтобы облегчить такую оборону. До 1942 года вы должны помогать Италии в обеспечении и защите Египта."
countrystartup.111.a:0" "Спасибо за совет!"  
countrystartup.112.t:0 "Эфиопия/Ирак в Horstorical Multiplayer"
countrystartup.112.d:0" "Итальянская Восточная Африка - это скорее небольшое государство, несущее временное значение. У вас нет особой роли или стратегии, кроме как задерживать свою капитуляцию. По умолчанию, когда вы капитулируете, вы будете играть в сотрудничестве с Италией, но Италия может активировать вас решением, чтобы играть за Ирак после выполнения 'Подогрев национализма в Ираке'.\n\nЕсли вы окажетесь в роли Ирака, ваша задача будет очень простой - помогать Италии защищать Иран (и при необходимости Аравию) от Союзников. Ваши исследования, производство и управление индустрией не очень важны, так как вы играете за Ирак в середине игры и не обязаны играть определенным образом, чтобы быть актуальными в 1941 году. Обязательно согласуйтесь с Италией по поводу защиты Ирана (и Аравии), а также по поводу выбора доктрины."
countrystartup.112.a:0" "Спасибо за совет!"    
countrystartup.113.t:0 "Хорватия в Horstorical Multiplayer"
countrystartup.113.d:0 "Хорватия отличается от большинства малых стран Оси тем, что не получает бонусов Барбароссы и является куклой Италии, а не Германии. Вам следует тесно сотрудничать с игроком за Италию и помогать ему как в захвате, так и в обороне Африки. Хорватия очень важна для Италии как малая страна, поэтому играйте с ожиданием, что вы должны следовать указаниям игрока за Италию. У вас есть бонусы и генералы для большинства возможных строительных путей, и, как и другие малые страны Оси, вам следует прекратить строительство гражданских заводов в 1938 году.\n\nОжидайте наступление в Африке до тех пор, пока Германия не решит прекратить наступление, обычно где-то около южного Асуана. Затем вам придется перейти к обороне до конца игры, будь то в Египте или Иране, поскольку союзники начнут контрнаступление и откроют новые фронты. Чем дольше они будут удерживаться в Африке, тем больше времени вы выиграете для Оси."
countrystartup.113.a:0 "Спасибо за совет!"
countrystartup.114.t:0 "Маньчжурия в Horstorical Multiplayer"
countrystartup.114.d:0 "Маньчжоу-Го может гибко выбирать из нескольких стратегий, но в конечном итоге ваш выбор зависит от потребностей и пожеланий Японии, учитывая, что вы являетесь единственной малой нацией Японии. Согласуйте свой план с Японией."
countrystartup.114.a:0 "Спасибо за совет!"     
 
 

iraq_hist.1.t:0 "Золотой Квадрат запускает переворот!"
iraq_hist.1.desc:0 "Угрозы фашистской организации офицеров, известной как 'Золотой Квадрат' (Al-Murabbaʿ al-Dhahabī), растут с момента смерти нашего короля Гази I и регентства [IRQ.GetLeader]. 'Квадрат' включает полковников Салаха аль-Дина ас-Саббага, Камиля Шабиба, Фахми Саида и Махмуда Салмана. Эти офицеры выступают за националистическое захватывание власти и установку Рашида Али аль-Гайлани в качестве лидера Ирака.\n\nСегодня эти фигуры осуществили свой заговор. Боевые подразделения под командованием ас-Саббага движутся для обеспечения безопасности королевского дворца и ключевых стратегических объектов в Багдаде. Время исчезает, чтобы подавить этот переворот, пока он не принесет успех."

iraq_hist.1.a:0 "Свободный Ирак?"

iraq_hist.2.t:0 "Захват Золотого Квадрата в Ираке!"
iraq_hist.2.desc:0 "Организация националистических военных офицеров успешно осуществила переворот в Ираке, свергнув регента юного короля Фейсала II. Рашид Али аль-Гайлани становится новым главой правительства, крайне арабским националистическим лидером. Новое правительство Национальной Оборонной Власти Золотого Квадрата переориентировалось против британцев и, как сообщается, ищет помощи у [GER.GetNameDef], чтобы сопротивляться предполагаемому британскому вторжению.\n\nЭто изменение геополитической ориентации, вероятно, приведет к войне на Ближнем Востоке."

iraq_hist.2.a:0 "Нам нужно обеспечить нашу стратегическую позицию!"
iraq_hist.2.b:0 "Так и есть."
iraq_hist.2.c:0 "Организуйте помощь для наших коллег из [IRQ.GetAdjective], немедленно!"
iraq_hist.2.d:0 "Передайте им наши наилучшие пожелания, но мы останемся безразличными."

iraq_hist.4.t:0 "[GER.GetNameDefCap] отправляет материальную поддержку"
iraq_hist.4.desc:0 "В нашей предстоящей борьбе с империалистическими британцами [GER.GetNameDef] отправил поддержку в виде эскадрильи легких самолетов. Это не много, но все же очень нужная помощь против агрессора!"

iraq_hist.4.a:0 "Благодарим [GER.GetNameDef]"

iraq_hist.5.t:0 "[ITA.GetNameDefCap] отправляет материальную поддержку"
iraq_hist.5.desc:0 "В нашей предстоящей борьбе с империалистическими британцами [ITA.GetNameDef] отправил поддержку в виде поставки стрелкового оружия. Это не много, но все же очень нужная помощь против агрессора!"

iraq_hist.5.a:0 "Благодарим [ITA.GetNameDef]"
 

iraq_hist.6.t:0 "Провокации Ирака в РАБ Хаббания!"
iraq_hist.6.desc:0 "Посланник, представляющий [IRQ.GetNameDef], сообщил командующему офицеру базы Королевских Воздушных Сил Хаббания, что плато поблизости было занято для проведения 'учебных упражнений'. Также в рамках связи посол потребовал немедленно прекратить все полеты и запретить движение, над землей или в воздухе, от базы. Это было воспринято как прямая угроза."

iraq_hist.6.a:0 "Нам нужно ответить силой!"
iraq_hist.6.b:0 "Отступаем с базы, наша позиция под угрозой."

iraq.1.t:0 "Золотой Квадрат осуществляет государственный переворот"
iraq.1.d:0 "Переворот проводят четыре генерала иракской армии-националиста, известные как 'Золотой Квадрат', которые намерены использовать войну, чтобы добиться полной независимости Ирака после ограниченной нами независимости, предоставленной им в 1932 году. MI6 сообщает, что они сотрудничают с немецкой разведкой и принимают военную помощь как от Германии, так и от Италии."

iraq.1.a:0 "Этого нельзя терпеть!"

iraq.4.t:0 "Арабская революция"
iraq.4.d:0 "Наши скрытые усилия по поддержке арабского национализма через посла Фрица Гроббы оказались успешными: четверо националистических офицеров Ирака устроили переворот в поддержку аль-Гайлани, революционного националиста, противника Британской империи и их большевистских союзников, против клиентского правительства в Багдаде. Аль-Гайлани - четкая возможность укрепить поддержку Оси в этом регионе."

iraq.4.a:0 "Их мелкая ссора не касается Рейха."
iraq.4.b:0 "Мы поддержим арабскую националистическую идею!"

iraq.5.t:0 "Осада РАБ Хаббания"
iraq.5.d:0 "В хаосе переворота аль-Гайлани силы Золотого Квадрата окружили и заблокировали нашу авиабазу РАБ Хаббания, перерезав ее связь с внешним миром. Любые дальнейшие враждебные действия будут являться актом войны."

iraq.5.a:0 "Требуем от Золотого Квадрата покинуть авиабазу"
iraq.6.t:0 "Атака на РАБ Хаббания"
iraq.6.d:0 "После успешного государственного переворота Золотой Круг и его лидер Рашид Али тайно продолжили укреплять связи с силами Оси. После прибытия британских подкреплений для защиты их нефтяных интересов, иракские силы начали атаку на РАБ Хаббания, одну из двух оставшихся баз РАБ в Ираке."

iraq.6.a:0 "Это акт войны!"
iraq.7.t:0 "Осада РАБ Хаббания снята"
iraq.7.d:0 "Союзнические силы в РАБ Хаббания успешно сняли осаду своими силами, позволив ВВС, размещенным там, бросить вызов иракским ВВС, систематически уничтожая их. Это позволило нам начать контратаку в направлении Багдада, открывая путь к восстановлению иракской монархии под Фейсалом II."

iraq.7.a:0 "Мы прорвемся через пустыню."
