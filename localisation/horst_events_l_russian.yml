l_russian:
 countrystartup.129.t:0 "Операция Компас в Хорсте §0(ПРОЧИТАЙ ПОЖАЛУЙСТА)§!"
 countrystartup.129.desc:0 "Что такое Операция Компас? Это было британское вторжение в Ливию в конце 1940 года. В Хорсте, Операция Компас представляет собой состояние войны между Италией и союзниками, совпадающее с Битвой за Францию. Италия присоединяется к войне в то же время, что и Германия объявляет ее начало.\n\nЧто вам нужно знать если вы играете за Ось:\n-Выделите хотя бы одного танкового минора в Ливию; постройте немного танков за Италию\n-Имейте немного Истребителей и Штурмовиков в Ливии\n-Италия имеет бонус +10 к окопанности до тех пор, пока Восточная Африка не будет сдана на 50% или пока не наступит ноябрь 1939 г.\n-За каждый проигранный союзникам регион в Ливии Ось получает бонусы к уменьшению штрафа за окружение, скорости окопанности, скорости планирования, потери органзации при низком уровне организации, Прочности, дальности снабжения и расходу снабжения, чтобы уравновесить трудности, связанные с возвращением Ливии.\n\nЧто вам нужно знать если вы играете за Союзников:\n-Если вы хотите начать вторжение в Ливию, вы должны сначала сдержать, а потом уже надавить на итальянскую Восточную Африку, пока она не перейдет к 50% капитуляции\n- Так же вы будете тратить по 1 конвойу на каждый контролируемый вами регион в Ливии в месяц"

fincon.11.t:0 "Битва за Британию"
fincon.11.d:0 "По мере завершения битвы за Францию, немецкие бомбардировщики и истребители готовятся столкнуться с RAF в небесах Англии. Воздушная кампания над Британией может свидетельствовать о подготовках к предстоящей амфибийной операции."
fincon.11.a:0 "Мир следит за событиями..."

britain.193.t:0 "Германия апроприирует ресурсы в северной Швеции"
britain.193.d:0 "В ответ на требования министра иностранных дел Германии Йоахима фон Риббентропа, Швеция передала права на ресурсы и шахты Лаппландии Третьему Рейху. Рейхсминистр экономики Вальтер Функ составил "Сделку о Торговле" на прошлой неделе, назвав ее вехой в обеспечении "мира и дружбы" между двумя нациями."
finland.12.t:0 "105 Дней Снега и Крови"
finland.12.d:0 "За последние три месяца Финляндия пропитала свои белые и зеленые леса кровью советских захватчиков. Мы добились невозможного, защищая каждый метр финской земли от нации в пятьдесят раз большей, чем мы!"
finland.12.a:0 "Финляндия в безопасности, пока что."
finland.11.t:0 "Бедствие в Финляндии"

finland.11.d:0 "Красная Армия позорно проигрывает финнам сражение за сражением. Этого издевательства нельзя допустить, и кто-то должен заплатить за эту некомпетентность!"
finland.11.a:0 "В ГУЛАГ!"
finland.20.t:0 "Освобождение Финляндии"
finland.20.d:0 "Финский пролетариат вместе с нашими товарищами-коммунистами томится в Финляндии с тех пор, как красные проиграли гражданскую войну. Германия тем временем становится все более милитаристской и джингоистичной, представляя собой экзистенциальную угрозу для Союза. Мы потребовали от Финляндии передачи приграничных территорий, необходимых нам для обеспечения безопасности, но она, как и следовало ожидать, отказалась. Настало время готовить вторжение в Финляндию и освобождать ее от капиталистического гнета."
finland.20.a:0 "Мы сбросим на них 'хлебные корзины'."
finland.21.t:0 "Советский Союз готовится к войне"
Winter_War_Threat:0 "Зимняя война"
poland.1148.d:0 "Германская Рейх построила стену береговых фортов от Южной Франции до западного побережья Норвегии.\n\n§RЭта система укреплений представляет серьезную угрозу для морских вторжений, пока она не будет разрушена§!."
finland.21.d:0 "После нашего успешного отделения от Советской империи и победы в гражданской войне против Красных, Советский Союз стал антагонистическим и опасным врагом, который лишь время от времени умеряется. Наши сведения сейчас информируют нас о их подготовке к войне, и они намерены вторгнуться примерно через два месяца."
news.9990.t:0 "Германия запускает операцию 'Блау'!"
zit_failed:0 "Операция 'Цитадель' провалилась"
news.9990.d:0 "Германская Рейх начала летнюю операцию против Советского Союза, кодовое название 'Синий случай', с целью вытеснить его из войны после неудач в ходе операции 'Барбаросса'. Без зимы и грязи, замедляющих Германию, Советы снова оказываются в тяжелом положении."
news.9990.a:0 "Еще пять месяцев ада..."
news.9990.b:0 "К Москве!"
 
britain.4254.t:0 "Адмирал Ямамото мертв!"
britain.4254.desc:0 "Ужасные новости! Адмирал Ямамото был сбит американскими истребителями над Тихим океаном! Как они узнали, что это был его самолет?"
britain.4254.a:0 "Они, должно быть, просто повезло..."

britain.1315.t:0 "Союзники готовятся к операции 'Факел'"
britain.1315.d:0 "Военная разведка указывает на то, что союзники готовятся к вторжению в Северную Африку Вичи. Можно ожидать, что это вторжение произойдет примерно через месяц."
britain.1315.a:0 "Волнующие новости"

nsb_news.6131.t:0 "США расширяет программу 'Подай и дай' в пользу Советского Союза"
nsb_news.6131.a:0 "ОК."
nsb_news.6131.desc:0 "Западные союзники с тревогой следят, как операция 'Барбаросса' продвигается все глубже внутрь Советского Союза. Соединенные Штаты и Соединенное Королевство согласились совместно поддерживать Советский Союз материально в его войне против Оси.\n\nТЕПЕРЬ СОЮЗНИКИ МОГУТ НАЧАТЬ ПОСТАВКУ МАТЕРИАЛОВ В СОВЕТСКИЙ СОЮЗ"
countrystartup.29.t:0 "Военно-морской флот и Морской Лев в Хорсте §0(ПРОЧИТАЙ ПОЖАЛУЙСТА)§!"
countrystartup.29.desc:0 "1)У вас может быть несколько флотов, при этом ни один флот не должен превышать командный лимит в 100.\n2) Флоты, предназначенные для борьбы с другими флотами, всегда должны иметь 2 авианосца  и не более двух авианосцев.\n3)  Флоты должны иметь высокие показатели скрининга(прикрытия) линкоров и авианосцев.\n4) Если бой выглядит плохо, то лучше выходите из боя.\n5) Поддержка с моря Важна! ВМС также могут блокировать морские вторжения, имея 40% превосходства в море.\n6) Стройте скрины(прикрытие) Линкоры и Авианосцы.\n7) Броня потенциально может быть полезной.\n\n§BКомандный лимит флота§!\n\nКаждый класс кораблей имеет значение 'командного лимита'. Флот (все боевые группы под управлением одного адмирала) может поддерживать максимум 100 'командных лимитов'. Пока вы находитесь в пределах или ниже значения командного лимита для каждого флота с адмиралом на его часах, вам не будут применяться специальные наказания к вашему адмиралу и стране. Любой адмирал, ведущий флот, который содержит эсминцы или легкие крейсеры, будет отображаться в списке справа от портретов адмиралов. Этот список содержит полезную информацию о ваших флотах, чтобы вы могли легко следовать этой системе.\n\nЭсминцы/Подлодки - 1 командный ресурс\nЛегкие Крейсеры/Тяжелые Крейсеры - 2 командных ресурса\nЛинкоры - 4 командных ресурса\nАвианосцы/Сверх Тяжелые Линкоры - 6 командного ресурса.\n\n§RМОРСКОЙ ЛЕВ§!: Возможно вторжение только в юго-западную часть Англии и Сассекс. Если европейская Ось попытается вторгнуться в любую другую часть Великобритании или Ирландии, она будет перемещена! ВОЗМОЖНОСТЬ 'МОРСКОГО ЛЕВА' РАЗРЕШЕНА!"
mtg_netherlands.344.a:0 "Нам необходимо немедленно узнать больше!\n§GМы разблокируем новый национальный фокус!§!"
mtg_netherlands.345.d:0 "Группа археологов из Афин прибыла на остров, вынужденная добираться до него на небольшом судне из-за отсутствия подходящего места для швартовки. Остров зарос растительностью, которая, совмещенная с густым туманом, скрывала по-настоящему поразительное. Были обнаружены прекрасно сохранившиеся руины, напоминающие архитектуру как периода Микенской культуры, так и эпохи Греции. Пока продолжается исследование, обнаруживаются скопища исторических артефактов на территории, которая, кажется, равна по размерам современному городу Греции!"
mtg_netherlands.344.d:0 "Археологи обнаружили изолированный остров в бурной части Атлантического океана. Остров ранее не был отмечен на картах последних пяти столетий и оставался неизведанным. Предположения о его недавнем формировании из-за вулканической активности исключаются, так как краткий обзор не выявил признаков вулканической деятельности. Остров покрыт густым туманом, что аномально для этой части Атлантического океана. Исследователи не смогли найти подходящее место для швартовки судна. Показалось, что сквозь туман виднеется какая-то башня, но не было ясно, какого национального происхождения или временного периода она была. Организована новая экспедиция для изучения того, что скрыто на этом странном острове..."
mtg_news.791.d:0 "С начала операции 'Барбаросса' Красная армия рабочих и крестьян страдает от отступлений, что приводит к тому, что многие промышленные и городские центры Советского Союза, расположенные близко к границе, переходят под контроль Оси. Иосиф Сталин ответил приказом всем командирам Красной Армии прекратить несанкционированные отступления и организовать специальные отряды для борьбы с дезертирами."
mtg_news.792.d:0 "После длительного и тяжелого процесса восстановления после испытаний Великой Чистки, Красная Армия, через огонь и пламя войны, доказала свою тактическую компетентность, несмотря на отступления. Иосиф Сталин отдал приказ прекратить отступления: 'Ни шагу назад'."
italy.668.d:0 "Добро пожаловать в дерево фокусов для мультиплеера в стиле 'Хорс'. 'Хорст' тяжело модифицировал дерево фокусов для Словакии, созданное Mumiago#0123 из мода 'Director's Cut', для использования в мультиплеерном моде 'Хорс'. Спасибо Mumiago за разрешение на использование!"
italy.669.d:0 "Добро пожаловать в дерево фокусов для мультиплеера в стиле 'Хорс' для Финляндии! 'Хорст' модифицировал дерево фокусов для Финляндии, созданное DavideGß#3001 из мода 'Sidi Barrani Friends United', для использования в мультиплеерном моде 'Хорс'. Спасибо DavideGß за разрешение на использование!"
italy.663.d:0 "Если вы видите это сообщение, значит, у вашего хоста нет нового дополнения 'Битва за Босфор' от Paradox. Вместо этого 'Хорст' тяжело модифицировал дерево фокусов 'Мила Родино Болгария' от Caon для использования в мультиплеерном моде 'Хорс'. Спасибо Caon за разрешение на использование активов мода, включая болгарских лидеров юнитов, значки фокусов и многое другое."
mtg_news.777.d:0 "Русский сезон грязи, также известный как Распутица, - это неприятное явление, особенно разрушительное для моторизированных транспортных средств. Сезон грязи закончится через шестьдесят дней. Все подразделения на ядре Советской территории будут иметь 15% меньше атаки, подвергаться 10% аттриции и иметь штраф в скорости -20% (-35% для дивизий бронетехники)."
mtg_news.778.desc:0 "Русская зима, дружелюбно именуемая русскими солдатами Генералом Морозом, создает огромные логистические проблемы для ведения войны."

news.484.t:0 "Королевская диктатура"
news.484.d:0 "Международные наблюдатели выборов в Румынии сообщили, что Король Карол II приостановил Конституцию и захватил чрезвычайные полномочия. Затем Карол ввел военное положение и приостановил все гражданские свободы, сославшись на то, что насильственная избирательная кампания ставит под угрозу нацию гражданской войной. После того как он уволил старое правительство, установленное при поддержке антисемита Гоги, Карол закрепил свои новые полномочия, ратифицировав Конституцию, превратив правительство в фактический правовой диктат. Все власти в Румынии были в его руках, превращая Румынию из демократии в абсолютную монархию."
news.485.d:0 "Корнелиу Зелеа Кодряну, "Капитан", который проповедовал послание жестокого ксенофобного ультра-национализма, интенсивного православного мистицизма, чрезвычайного антисемитизма, популистского презрения ко всем элитам и прославления смерти во имя идеи как самого красивого, величайшего, благородного и эротичного опыта во всем мире, был назначен премьер-министром Румынии. После насилия на выборах и назначения правительства Гоги, Король не видел другой возможности, кроме как передать Кодряну желаемую им власть, сделав его лидером Румынии. Хотя Кодряну изначально не хотел принимать власть, он смог убедить Карола в том, чтобы передать ему абсолютные и тоталитарные полномочия над государством, фактически превращая ранее демократическую страну в тоталитарную диктатуру."
news.486.d:0 "Дипломат Германии в Румынии Фабрициус позвонил Каролу II и выдвинул ему одно простое требование: взять под свой контроль Антонеску. С падением Франции франкогильдеристская элита Румынии потеряла почти всю свою власть и влияние. Антонеску частично согласился с запросом, но также попросил Карола передать ему резервные полномочия для глав государства Румынии. Карол уступил, и 5 сентября 1940 года генерал стал премьер-министром, а Карол передал ему большую часть своих диктаторских полномочий. Первой мерой Антонеску было ослабление потенциального сопротивления в армии, сменив начальника гарнизона Бухареста Георге Арджешану на Думитру Короамэ."
news.487.d:0 "После казни Кодряну, Железная Гвардия оставалась молчаливой в течение длительного времени, но она не была мертвой, просто лежала в спячке, ждущей лучшего момента для удара. Она возродилась под руководством Гории Сима и готовила переворот. С арестом Антонеску настал идеальный момент, так как генерал был полон негодования по отношению к текущему правительству и хотел окончания Королевской Диктатуры, которая толкнула Румынию на край краха. Имея широкое влияние и контроль над румынской армией, особенно над Третьей армией, размещенной в восточных провинциях, солдаты Антонеску и Железной Гвардии двинулись на столицу, в событие, которое будет известно как 'Марш на Бухарест'. Солдаты, которые должны были защищать столицу от 'восстания', как назвал это Карол, просто бросили оружие или присоединились к маршу. Каролу удалось уехать в последний момент на поезде, преследуемый элементами румынской армии и Железной Гвардии."
news.488.d:0 "Лояльные генералы короля Карола II использовали верных солдат для устранения премьер-министра Румынии Корнелиу Зелеа Кодряну, когда тот был возвращен в столицу после турне по стране. Рассматривая это как мятеж в армии, Антонеску был быстр взять контроль над ситуацией, приказав солдатам генералов отказаться от мятежа и передать виновных властям. После укрощения армии Антонеску быстро заменил других генералов своими верными и фактически взял под свой контроль вооруженные силы Румынии, делая его фактически правителем страны. После того как его приветствовали как героя за месть смерти популярного Кодряну, Антонеску поставил себя во главе страны как соруководитель, который должен был руководить существующим руководством Железной Гвардии."
 

news.9991.t:0 "Германия запускает операцию Цитадель!"
news.9991.d:0 "Германская Рейх инициировала еще одну летнюю операцию против Советского Союза под кодовым названием 'Операция Крепость', направленную на уничтожение советской армии и насильственное наступление на мир. Без зимы и грязи, замедляющих Германию, советским приходится снова отступать, но на этот раз с опытом, накопленным в течение двух кампаний."
news.9991.a:0 "Сколько еще советам придется страдать?"
news.9991.b:0 "Начало конца."
news.9992.t:0 "Германия запускает операцию Солнцестояние!"
news.9992.d:0 "Германская Рейх инициировала еще одну летнюю операцию против Советского Союза под кодовым названием 'Операция Солнцестояние', направленную на уничтожение советской армии и насильственное наступление на мир. Без зимы и грязи, замедляющих Германию, советским приходится снова отступать, но на этот раз с опытом, накопленным в течение двух кампаний."
news.9992.a:0 "Сможет ли Советский Союз выиграть войну?"
news.9992.b:0 "Удастся ли Рейху, наконец, победить?"
ger_heavy.1.t:0 "Германия начинает производство тяжелой воды"
ger_heavy.1.d:0 "Агенты MI6 сообщают, что Германская Рейх начала производство тяжелой воды для проведения экспериментов по ядерному делению. Невозможно знать, смогут ли они научиться производить ядерную бомбу и когда это произойдет, но одно известно: если они сделают это раньше нас, то это принесет невообразимый хаос и страдания свободным нациям мира. Мы должны захватить Норвегию, чтобы предотвратить это!"
ger_heavy.1.a:0 "Германия разблокирует Ядерные реакторы и бонус в 350% к ядерным бомбам через 1000 дней"
finland.21.a:0 "Мы достигли точки критического состояния!"
italy.152.t:0 "Захвачены Афины"

countrystartup.28.desc:0 "ПРАВИЛА\n1) Пехотные батальоны не могут быть совмещены с танковыми батальонами.\n2) Без удаления/обьединения/модифицирования/изменения шаблонов: дивизий находящихся в котле или , при угрозе котла.\n3) Без Не-Французких (непринадлежащих не к французам/голландцам/полякам/грекам/норвежцам) дивизий на континентальной Европе или во Французской Северной Африке до капитуляции Франции.\n4) Все танковые батальоны в шаблоне должны состоять из одного типа.\n5) Все дивизии должны иметь ширину фронта 40.0"
mtg_news.788.desc:0 "После падения Куйбышева советское руководство переместилось вглубь Урала и приняло призыв Германии к перемирию. Куйбышевское перемирие фактически завершило войну на востоке."
britain.1115.d:0 "Советский Союз - это такой же убийственный и злобный политический режим, сводящий человека к винтику в колесе. Для того чтобы свободная Европа могла существовать, советское государство должно быть уничтожено."
britain.1116.d:0 "С разгромом немецкой угрозы балансу сил в континентальной Европе мы обезопасили себя от одного тиранического врага, но на Востоке существует другой. Мы можем перевооружить итальянскую и немецкую армии для пополнения наших дивизий, конечно, при условии, что они полностью перейдут к демократической системе свободного рынка."
japan.144.t:0 "Удар на юг!"
japan.144.d:0 "В условиях, когда все внимание мира приковано к войне в Европе, Азия оказалась ослабленной и уязвимой. Сейчас самое время нанести удар по Южной ресурсной зоне!"
japan.144.a:0 "На войну!"
peace.1.t:0 "Объявить войну, чтобы сбросить добровольцев или заключить белый мир со всеми врагами"
soviet.509.t: "Будущее Китая"
soviet.509.d: "В настоящее время мы контролируем часть территории в Манчжурии, возникает вопрос, что с ней делать. Высшие члены Политбюро настоятельно предлагают передать ее местным коммунистам и создать спутниковое государство в Азии. Наши союзники в Коммунистической партии Китая будут очень благодарны за это."
soviet.509.a: "Союз и Китай станут двумя столпами коммунизма в Азии."
fincon.1.t: "Продолжение войны"
fincon.1.d: "Наконец-то немцы начали свой поход против большевиков, и теперь мы можем восстановить потерянные во время Зимней войны земли."
fincon.1.a: "Восстановить бывшую границу Финляндии!"
fincon.1.b: "Не лучшая идея, немцы, возможно, проиграют эту войну..."
fincon.2.t: "Начинается Продолжение войны"
fincon.2.d: "Финляндия, проигравшая Зимнюю войну, снова возобновила вражду против Советского Союза в надежде вернуть свою территорию. С большей частью советских сил, застрявших на юге против немцев, ситуация Советского Союза ухудшилась, так как им теперь приходится иметь дело и с Германией, и с Финляндией одновременно."
fincon.2.a: "Конец большевистского режима приближается."
fincon.2.b: "Они могут дойти до Ленинграда к концу года..."
fincon.6.t: "Московский перемирие"
fincon.6.d: "Долгая и бесплодная Продолжение войны закончена. Финляндия не смогла вернуть территорию у Советов и, более того, потеряла контроль над Петсамо и своей военной базой Порккала. Советы, с другой стороны, не смогли завоевать Финляндию, но теперь свободны сосредоточиться на Германии."
fincon.6.a: "Предатели! Все они!"

fincon.6.b: "Война в Европе близится к завершению."
britain.1113.t:0 "Норвегия стремится присоединиться к союзникам"
britain.1113.d:0 "Скандинавская нация Норвегия подверглась атаке со стороны сил Оси. Если мы, как островная нация, защищенная каналом от хаоса европейских дел, хотим победить в этой войне, нам нужно создать новые союзы со всеми, кто страдает под давлением Германии и ее союзников."
britain.1113.a:0 "Мы будем сражаться и в горах!"
britain.1114.t:0 "Британия приветствует нас"
britain.1114.d:0 "Наши дипломаты позвонили нам из Лондона, сообщив, что мы успешно вступили в официальный военный союз с Британией и ее союзниками. Как члены Союзников, каждая борьба от Лондона до Веллингтона, от Осло до Каира, теперь является частью нашей борьбы за Норвегию."
britain.1114.a:0 "Бог храни наших королей!"
news.1463.t:0 "Нарушение арабской нейтралитета"
news.1463.d:0 "В неожиданный поворот событий весь Аравийский полуостров был вторгнут и вступил в войну."
iran.4.t:0 "Иран сдается"
iran.4.d:0 "После успешной операции 'Countenance' правительство Персии и ее Шах сдались совместным британско-советским силам в Тегеране. Иран и его ресурсы теперь надежно находятся вне досягаемости для немцев."
iran.4.a:0 "Бокал за англо-советский союз!"
iran.2.t:0 "Иран соглашается на северные территории"
iran.2.d:0 "Иранская Азербайджан и Туркменистан, наконец, вновь объединились со своими советскими собратьями. Установка гражданской администрации, а также индоктринация, активно осуществляются товарищами из обеих республик."
iran.2.a:0 "Добро пожаловать в Союз!"
iran.3.t:0 "Иран сдает нефтяные месторождения"
iran.3.d:0 "После сдачи Ирана в Тегеране, Иран уступил контроль над южным Ираном Великобритании, позволив Союзникам контролировать стратегические нефтяные месторождения, использовать стратегический персидский коридор и Трансиранскую железнодорожную магистраль."
iran.3.a:0 "Отлично!"
italy.142.t:0 "Захвачена Аддис-Абеба"
italy.142.d:0 "После падения Аддис-Абебы мы практически полностью контролируем Эфиопию. Теперь, когда наша долгожданная колониальная империя расширилась, предстоит определить, как мы будем управлять этой территорией."
italy.142.a:0 "Отлично! Теперь решим, что делать с Эфиопией..."

italy.143.t:0 "Судьба Эфиопии"
italy.143.d:0 "Эфиопия давно является шипом в плоти итальянской национальной гордости с тех пор, как была потеряна после последней итало-эфиопской войны. Теперь мир может взглянуть на Италию как на господаря Средиземного моря. Король Виктор Эммануил III наградил маршала Пьетро Бадольо титулом 'Герцог Аддис-Абебы' за его работу. Эфиопия может быть управляема непосредственно Италией или в качестве колониального кукольного государства под управлением колониального вице-короля."
italy.143.b:0 "Создать колониальный протекторат из Эфиопии, Сомалиленда и Эритреи"
italy.143.a:0 "Присоединить Эфиопию непосредственно к Италии"

italy.144.t:0 "Судьба Эфиопии"
italy.144.d:0 "Эфиопия давно является шипом в плоти итальянской национальной гордости с тех пор, как была потеряна после последней итало-эфиопской войны. Теперь мир может взглянуть на Италию как на господаря Средиземного моря. Король Виктор Эммануил III наградил маршала Пьетро Бадольо титулом 'Герцог Аддис-Абебы' за его работу. Эфиопия может быть управляема непосредственно Италией или в качестве колониального кукольного государства под управлением колониального вице-короля."
italy.144.a:0 "Создать колониальный протекторат из Эфиопии, Сомалиленда и Эритреи"

iran.1.t:0 "Иран капитулирует"
spain.29.t:0 "Британцы не наблюдают"
spain.29.d:0 "После вмешательства Германии в Польше союзники агрессировали против Рейха и ищут войны. Как нейтральный свидетель этой конфляграции, мы можем извлечь из этого огромные выгоды. Германия богата сталью, но бедна в редких металлах, таких как вольфрам, который изобилирует в соседнем Португалии. Британцы слишком заняты во Франции, чтобы предотвратить внезапное вторжение на португальскую территорию. Мы можем получить огромные выгоды от торговли с ресурсоголодной военной машиной Оси."
spain.29.a:0 "Пришло время сделать Испанию снова великой."

italy.146.t:0 "Муссолини арестован"
italy.146.d:0 "После наших неудач в Северной Африке и последующего нашествия со стороны союзников в Южную Италию поддержка Иль Дуче резко упала. С войной, бушующей на нашей земле, и с хроническими продовольственными недостатками и ухудшением забастовок, Великий совет Италии выразил недовольство Иль Дуче в голосовании недоверия. Сам король Виктор Эммануил отстранил Иль Дуче и приказал его арестовать, назначив маршала Пьетро Бадольо его заместителем. Муссолини был перемещен по всей Италии, прежде чем его заключили под стражу в Кампо Императоре, горнолыжном курорте в Абруццо."
italy.146.a:0 "Кто будет управлять железнодорожным расписанием?"

italy.147.t:0 "Монархический переворот в Италии"
italy.147.d:0 "Вслед за неспособностью Италии в Северной Африке и последующим нашествием союзников в Южную Италию наш союзник, Иль Дуче, был предан своими соотечественниками и теперь находится под арестом где-то в Италии. Это очень опасно для Рейха, так как без Муссолини мы не можем рассчитывать на то, что Италия продолжит оставаться на нашей стороне в войне. Мы должны тщательно рассмотреть наши следующие шаги."
italy.147.a:0 "Свяжитесь с Абвером - нам срочно нужно узнать, где держат Муссолини"
italy.147.b:0 "Это наилучший образ итальянской неспособности - мы можем выиграть войну без их помощи"

italy.148.t:0 "Бенито Муссолини обнаружен"
italy.148.d:0 "Благодаря декодированию итальянского радиосообщения Абвером, мы обнаружили Муссолини в горнолыжном курорте в Абруццо, недалеко от горы Гран-Сассо. Главнокомандующие уже разработали несколько планов по спасению Муссолини, но лучший из них пришел от одного из наших выдающихся генералов: Курта Штудента. Он разработал дерзкую командос-операцию на горнолыжном курорте с использованием планера для транспортировки."
italy.148.a:0 "Студент доказал себя снова и снова - воплотите это в жизнь."
italy.148.b:0 "Это не стоит усилий - отмените все планы по вмешательству."

italy.149.t:0 "Муссолини освобожден"
italy.149.d:0 "Сегодня в 14:00 немецкие силы СС и фальшермажеры провели дерзкое нападение на отель 'Кампо Императоре', освободив Бенито Муссолини из его заключения. Отель был взят без единого выстрела, и немедленно сдались единственные защитники внутри. Муссолини теперь отправляется в Мюнхен на встречу с Фюрером. Мы ожидаем, что он будет сотрудничать более тесно с Рейхом под нашим наблюдением."
italy.149.a:0 "Оставьте это немцу, чтобы спасти Италию."

italy.150.t:0 "Банда Кох"
italy.150.d:0 "С момента объявления Итальянской Социальной Республики антифашистские элементы справа, по центру и слева начали совершать рейды и нападки против нашей армии. Эти непатриотические элементы стали шипом в нашей плоти, и в ответ на них Пьетро Кох, непочтительный итальянец немецкого происхождения, создал антипартизанское подразделение 'Банда Кох' для борьбы с этими террористами. Однако их методы чрезмерны."
italy.150.a:0 "Все равно это временная ситуация."

italy.151.t:0 "Иль Дуче возвращается!"
italy.151.d:0 "Благодаря смелости и находчивости немцев Муссолини был освобожден от заключения и вернулся к власти. Итальянское государство будет переформировано в республику, так как, цитируя Муссолини, 'Это не режим предал монархию, монархия предала режим'. Новое государство будет называться 'Итальянская Социальная Республика'."
italy.151.a:0 "Вперед!"

france.350.t:0 "Борьба продолжается!"
france.350.desc:0 "После эвакуации французской армии из Франции генерал де Голль объявил, что битва за Францию продолжится в ее колониальной империи. Де-факто столицей стала Касабланка, так как французская армия перебралась туда вместе с главными штабами и складами для подготовки к кампании в Африке."

france.351.t:0 "Неудачи в Африке"
france.351.desc:0 ""

france.352.t:0 "Адмирал Эмиль Генри Мюзелье заменяет"
france.352.desc:0 ""


france.353.t:0 "Адмирал уходит в отставку; Министр экономики берет на себя и переводит гражданское управление на Новую Каледонию"

britain.193.a:0 "Провести экстренное заседание в Палате общин"

tfv_south_africa.133.t:0 "Херцог уходит в отставку"
tfv_south_africa.133.d:0 "Сегодня премьер-министр Южной Африки Дж. Б. М. Херцог попытался объявить нейтралитет по отношению к нацистской агрессии в Европе и попытался оставить Южную Африку в стороне от войны, как позволяет Закон Статута Вестминстера. Однако законопроект был отклонен парламентом в Претории под руководством Яна Смутса со счетом 80 голосов против 67. Херцог попытался распустить парламент и объявить о проведении всеобщих выборов в надежде, что его законопроект будет принят, однако это было отклонено генерал-губернатором Сэром Патриком Дунканом. В результате этого Херцог ушел в отставку, и новым премьер-министром стал Смутс."
tfv_south_africa.133.a:0 "Значит, идем на войну!"

afghanistan.1.t:0 "Афганистан капитулирует"

wtt_manchukou.100.t:0 "Расширение железнодорожной сети в Ляонинге"
wtt_manchukou.100.desc:0 "В рамках Пятилетнего плана императора Пуйи имеет решающее значение расширить наши железнодорожные сети через Манчжурию для индустриализации и выполнения наших производственных планов. Провинция Ляонинг является центром нашего великого экономического преобразования. Отсюда мы индустриализируем остаток Манчжуо при поддержке японских инвестиций."
wtt_manchukou.100.a:0 "Сразу начать строительство линии в Мукден"
wtt_manchukou.120.t:0 "Расширение железнодорожной сети в Ляотунге"
wtt_manchukou.120.desc:0 "С усовершенствованным и расширенным железнодорожным строительством в Ляотунге у нас теперь есть доступ к пригодной земле для добычи стали. Алюминиевые рудники Кирина могли бы получить выгоду от расширения, также как и в настоящее время недоразвитые нефтяные месторождения Хейлунгцзян. Большая часть нашей страны остается недоразвитой."
wtt_manchukou.101.t:0 "Необходимо указание направления расширения железнодорожной сети"
wtt_manchukou.101.desc:0 "После недавнего завершения работ по железнодорожному строительству мы теперь можем продолжить расширение в других частях нашей страны. Куда следует укладывать пути дальше?"
wtt_manchukou.101.a:0 "В Цзэхол, для развития наших доков и судостроительной промышленности"
wtt_manchukou.101.b:0 "В Кирин, для развития алюминиевой промышленности и расширения нашей столицы"
wtt_manchukou.101.c:0 "В Хейлунгцзян, для развития нашей нефтехимической промышленности"
wtt_manchukou.101.z:0 "В Чахар, для развития промышленности стрелкового оружия и артиллерии"
wtt_manchukou.101.e:0 "В Южном Чахаре, для развития нашей 'табачной' промышленности"
wtt_manchukou.101.f:0 "В Сункианге, для развития нашей авиационной промышленности"
wtt_manchukou.101.g:0 "В Хулунбуйре, для развития нашей бронетанковой промышленности"
wtt_manchukou.101.h:0 "Мы завершили программу расширения железнодорожной сети!"
