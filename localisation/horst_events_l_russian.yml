l_russian:
 NSB_soviet_five_year_plan.4643.t: "Система большой стратегии союзников"
 NSB_soviet_five_year_plan.4643.desc: "Система баланса сил 'Allied Grand Startegy' может значительно изменить ваши военные усилия против Оси и Сферы сопроцветания Великой Восточной Азии. Вы можете получать бонусы и штрафы в зависимости от того, насколько вы склоняетесь к 'Япония прежде всего!' или 'Германия прежде всего!'. Чем больше вы склоняетесь к одному из них, тем сильнее ваша фракция в борьбе с этой нацией, и тем более значимой она становится для большой стратегии союзников. Как союзник, крайне важно занимать какую-то позицию на спектре 'Германия прежде всего!' перед началом "
 NSB_soviet_five_year_plan.4643.a: "Принято к сведению."
 
 romania.7: "Собрание «Железной гвардии»"
 romania.7.t: "Собрание «Железной гвардии»"
 romania.7.desc: "«Железная гвардия» собралась на местной площади. Такие собрания опасны по многим причинам. Известно, что они организуют осквернение местных памятников, преследуют местные меньшинства, протестуют против действий правительства и затевают драки с местной полицией."
 romania.7.a: "Пусть проводят своё маленькое собрание..."
 romania.7.b: "Пусть собираются — так их легче будет арестовать."
 romania.8: "Преследование граждан-меньшинств"
 romania.8.t: "«Железная гвардия» преследует меньшинства"
 romania.8.desc: "«Железная гвардия» печально известна своими ксенофобскими идеалами, и они с радостью демонстрируют эти идеалы тем в Румынии, кто не считается 'румыном'. Неспособность помочь этим меньшинствам приведёт к международному возмущению, независимо от нашей текущей позиции по таким вопросам."
 romania.8.a: "Кого это волнует?"
 romania.8.b: "Мы этого не потерпим."
 romania.9: "Проникновение в армейские круги"
 romania.9.t: "«Железная гвардия» проникает в армию"
 romania.9.desc: "Наша шпионская сеть докладывает, что «Железная гвардия» проникает в армию, чтобы получить больше политической власти в стране. Если «Железной гвардии» позволят постепенно наращивать поддержку в армии, в случае вооружённого мятежа их никто не сможет остановить."
 romania.9.a: "Армия достаточно сильна, чтобы разобраться с этим самостоятельно."
 romania.9.b: "Начать полномасштабное расследование"
 romania.10.t: "Политическое убийство"
 romania.10.desc: "Убит политик низшего ранга. Убийца найден, и он утверждает, что данный политик был обвинён в причастности к нерумынской деятельности. Полиция сейчас держит его в тюрьме."
 romania.10.a: "Этот политик был слишком откровенен"
 romania.10.b: "Правосудие куёт железо, пока горячо"
 romania.11.t: "Террористические бомбардировки"
 romania.11.desc: "По всей Румынии произошли крупные террористические бомбардировки. «Железная гвардия» заявляет, что уничтожает собственность нерумынов. Общественность возмущена, люди опасаются за свою жизнь и задаются вопросом, почему и как правительство могло допустить подобное..."
 romania.11.a: "Все это несчастные случаи..."
 romania.11.b: "Всем будет выплачена компенсация, а виновные будут пойманы."
 romania.12.t: "Румынские выборы 1937 года"
 romania.12.desc: "На выборах в декабре 1937 года правительство национал-либералов премьер-министра Георге Тэтэреску получило наибольшее количество мест, но меньше, чем необходимо для формирования правительства большинства в парламенте. Партия «Всё за Отечество» получила 16% голосов на выборах 1937 года, что стало высшей точкой электорального успеха «Железной гвардии». Но, несмотря на это, король Кароль II привёл к присяге радикального антисемитского поэта Октавиана Гогу в качестве премьер-министра."
 romania.12.a: "Так умирает демократия?"
 romania.13.t: "Румынские выборы 1938 года"
 romania.13.desc: "Кароль согласился на просьбу Гоги распустить парламент для новых выборов 18 января 1938 года. Выборы 1938 года стали одними из самых жестоких в истории Румынии: «Железная гвардия» и полувоенное крыло Lăncieri Национально-христианской партии боролись друг с другом за контроль над улицами Бухареста, стремясь утвердить свою антисемитскую репутацию, нападая на евреев. Это, конечно, было частью плана Кароля, который был невероятно властолюбив и амбициозен, чтобы он мог взять..."
 romania.13.a: "Так умирает демократия..."
 
 Manhattan.1.a: "Мы будем внимательно следить за этим."
 countrystartup.129.t: "Операция «Компас» в Horst §0(ПРОЧИТАЙ ИЛИ ПРОИГРАЕШЬ)§!"
 countrystartup.129.desc: "Что такое операция «Компас»? Это британское вторжение в Ливию в конце 1940 года. В Horst операция «Компас» — это состояние войны между Италией и союзниками, одновременно с битвой за Францию. Италия вступает в войну в то же время, когда Германия объявляет её.\n\nЧто нужно знать, если вы играете за Ось:\n-Иметь одну танковую страну в Ливии; строить некоторые танки за Италию\n-Иметь несколько истребителей и CAS в Ливии за Италию или Германию\n-Вся Ось получает бонусы к штрафу за окружение, скорости окопов, пла"
 fincon.11.t: "Битва за Британию"
 fincon.11.d: "По мере завершения битвы за Францию немецкие бомбардировщики и истребители готовятся к столкновению с RAF в небе над Англией. Воздушная кампания над Британией может означать подготовку к предстоящей десантной операции."
 fincon.11.a: "Мир наблюдает..."
 britain.193.t: "Германия присваивает ресурсы в Северной Швеции"
 britain.193.d: "После требований министра иностранных дел Германии Иоахима фон Риббентропа Швеция передала права на ресурсы и шахты Лаппланда Третьему рейху. Рейхсминистр экономики Вальтер Функ разработал «Торговую сделку» на прошлой неделе, назвав её важной вехой в обеспечении «мира и дружбы» между двумя нациями."
 britain.193.a: "Военная экономика Германии растёт..."
 finland.12.t: "105 дней снега и крови"
 finland.12.d: "Последние три месяца пропитали белые и зелёные леса Финляндии кровью советских захватчиков. Мы добились немыслимого, защищая каждый метр финской земли от нации, в пятьдесят раз превышающей нашу!"
 finland.12.a: "Финляндия в безопасности, пока что."
 finland.11.t: "Катастрофа в Финляндии"
 finland.11.d: "Красная Армия выставила себя в позорном свете, проигрывая битву за битвой финнам. Этот фарс не может продолжаться, и кто-то должен заплатить за эту некомпетентность!"
 finland.11.a: "Отправить в Гулаг!"
 finland.20.t: "Освобождение Финляндии"
 finland.20.d: "Финский пролетариат вместе с нашими коммунистическими товарищами томился в Финляндии с тех пор, как красные проиграли гражданскую войну. Германия тем временем становилась всё более милитаристской и шовинистической, представляя экзистенциальную угрозу для Союза. Мы потребовали, чтобы Финляндия передала приграничные территории, необходимые для нашей безопасности, но, предсказуемо, они отвергли это требование. Теперь настало время подготовить вторжение в Финляндию и освободить её от капиталистического гнёта."
 finland.20.a: "Мы сбросим на них «хлебные корзины»."
 finland.21.t: "Советский Союз готовится к войне"
 Winter_War_Threat: "Зимняя война"
 poland.1148.d: "Германский рейх построил стену береговых укреплений от Южной Франции до западного побережья Норвегии.\n\n§RЭтот ряд укреплений представляет серьёзную угрозу для морских десантов, если не будет разрушен бомбардировками§!."
 finland.21.d: "С момента нашего успешного отделения от Советской империи и победы в гражданской войне над красными Советский Союз был антагонистичным и опасным врагом, лишь несколько смягчённым временем. Наша разведка сообщает, что они готовятся к войне и вторгнутся примерно через два месяца."
 news.9990.t: "Германия запускает операцию «Блау»!"
 zit_failed: "Операция «Цитадель» провалена"
 zit_launched: "Операция «Цитадель» была запущена"
 news.9990.d: "Германский рейх начал летнюю операцию против Советского Союза под кодовым названием «Блау», направленную на вывод его из войны после неудач в ходе операции «Барбаросса». Без зимних и грязевых условий, замедляющих Германию, Советы снова вынуждены обороняться."
 news.9990.a: "Ещё пять месяцев ада..."
 news.9990.b: "На Москву!"
 
 britain.4254.t: "Адмирал Ямамото мёртв!"
 britain.4254.desc: "Ужасная новость! Адмирал Ямамото был сбит над Тихим океаном американскими истребителями! Откуда они узнали, что это его самолёт?"
 britain.4254.a: "Наверное, им просто повезло..."
 
 britain.1315.t: "Союзники готовятся к «Факелу»"
 britain.1315.d: "Военная разведка предполагает, что союзники готовятся к вторжению в Вишистскую Францию в Северной Африке. Мы можем ожидать, что это вторжение произойдёт примерно через месяц."
 britain.1315.a: "Тревожно"
 nsb_news.6131.t: "США расширяют ленд-лиз для Советского Союза"
 nsb_news.6131.a: "Хорошо."
 nsb_news.6131.desc: "Западные союзники с беспокойством наблюдают, как операция «Барбаросса» продвигается всё глубже в Советский Союз. Соединённые Штаты и Соединённое Королевство совместно согласились оказать Советскому Союзу материальную поддержку в его войне против Оси.\n\nСОЮЗНИКИ ТЕПЕРЬ МОГУТ НАЧАТЬ ЛЕНД-ЛИЗ В СОВЕТСКИЙ СОЮЗ"
 countrystartup.29.t: "Флот и «Морской лев» в Horst §0(ПРОЧИТАЙ ИЛИ ПРОИГРАЕШЬ)§!"
 countrystartup.29.desc: "1) У вас должно быть несколько флотов, при этом ни один флот не должен превышать лимит командования в 100.\n2) Флоты, предназначенные для боя с другими флотами, должны всегда иметь 2 авианосца и не более 2 авианосцев.\n3) Флоты должны иметь высокие показатели эскортных кораблей для капитанов и авианосцев.\n4) Если бой складывается плохо, выходите из боя.\n5) Обстрел побережья важен! Флоты также могут блокировать морские десанты при 40% морского превосходства.\n6) Стройте эскортные корабли, капитаны и авианосцы.\n7) Броня может быть полезна.\n\n§BЛимит командования флот"
 mtg_netherlands.344.a: "Мы должны узнать больше немедленно!\n§GМы откроем новую национальную цель!§!"
 mtg_netherlands.345.d: "Команда археологов из Афин прибыла на остров, вынужденная грести к нему на меньшем судне из-за отсутствия подходящего места для швартовки. Остров зарос растительностью, что в сочетании с густым туманом, окутывающим остров, скрывало нечто поистине поразительное. Были обнаружены отлично сохранившиеся руины, напоминающие архитектуру как микенского, так и эллинистического периодов нашей истории. Пока продолжается обследование, находятся тайники с историческими артефактами, что ап"
 mtg_netherlands.344.d: "Археологи обнаружили изолированный остров в штормовом районе Атлантического океана. Остров ранее не был нанесён на карты и не был открыт, не появляясь ни на одной карте за последние пять столетий. Предположения о том, что он недавно образовался в результате вулканической активности, невозможны, так как беглый осмотр не выявляет вулканической активности. Остров покрыт густым туманом, что аномально для этой части Атлантики. Исследователи не смогли найти подходящего места для швартовки или стоянки судна. Что, кажется"
 mtg_news.791.d: "С начала операции «Барбаросса» Рабоче-крестьянская Красная Армия страдала от поражений, оставив многие советские промышленные и городские центры у границы под контролем Оси. Иосиф Сталин ответил приказом всем командирам Красной Армии прекратить несанкционированные отступления и создать специальные отряды для борьбы с дезертирами."
 mtg_news.792.d: "После долгого и трудного процесса восстановления после испытаний Великой чистки Красная Армия, через огонь и пламя войны, доказала свою тактическую компетентность наравне с вермахтом, несмотря на отступления. Иосиф Сталин приказал прекратить отступление: 'Ни шагу назад'."
 
 
 italy.668.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Словакии! Horst существенно модифицировал дерево фокусов Словакии от mumiago из мода Hearts of Oak 2 для использования в Horstorical Multiplayer. Спасибо, mumiago!"
 italy.968.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Монголии! Horst существенно модифицировал дерево фокусов Монголии от Fantom#8759 из мода Road to 56 для использования в Horstorical Multiplayer. Спасибо, Fantom#8759!"
 italy.969.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Румынии! Horst существенно модифицировал дерево фокусов Румынии от mumiago из мода Hearts of Oak 2 для использования в Horstorical Multiplayer. Спасибо, Mumiago!"
 italy.970.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Новой Зеландии! Horst существенно модифицировал дерево фокусов Новой Зеландии от featherus из мода Road to 56 для использования в Horstorical Multiplayer. Спасибо, featherus!"
 italy.971.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Сиама! Horst существенно модифицировал дерево фокусов Сиама от simpyslav из мода Road to 56 для использования в Horstorical Multiplayer. Спасибо, simpyslav!"
 italy.972.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Британского Раджа! Horst существенно модифицировал дерево фокусов Британского Раджа от asfinag из мода Road to 56 для использования в Horstorical Multiplayer. Спасибо, asfinag!"
 italy.973.d: "Добро пожаловать в дерево фокусов Horstorical Multiplayer для Южной Африки! Horst существенно модифицировал дерево фокусов Южной Африки от Sarge из мода South Africa Reworked для использования в Horstorical Multiplayer. Спасибо, Sarge!"
 
 
 
 
 italy.663.d: "Если вы видите это, значит, у вашего хоста нет нового DLC 'Battle for the Bosphorus' от Paradox. Вместо этого Horst существенно модифицировал дерево фокусов 'Mila Rodino Bulgaria' от Caon для использования в моде Horstorical Multiplayer. Спасибо Caon за разрешение использовать активы мода, включая лидеров болгарских юнитов, иконки фокусов и многое другое."
 mtg_news.777.d: "Российский сезон грязи, также известный как распутица, — это мерзкий зверь, особенно разрушительный для моторизованных машин. Сезон грязи закончится через шестьдесят дней.\n\n§RВсе дивизии на советской основной территории будут иметь на 15% меньше атаки дивизии, 10% потерь от истощения и -20% к скорости (-35% для бронетанковых дивизий).§!"
 mtg_news.778.desc: "Русская зима, ласково называемая русскими солдатами генералом Морозом, создаёт огромные логистические проблемы для ведения войны."
 news.484.t: "Королевская диктатура"
 news.484.d: "Международные наблюдатели на румынских выборах сообщили, что король Кароль II приостановил действие конституции и взял на себя чрезвычайные полномочия. Затем Кароль ввёл военное положение и приостановил все гражданские свободы на том основании, что насильственная избирательная кампания могла ввергнуть страну в гражданскую войну.\nУволив старое правительство, которое он поставил во главе с антисемитом Гогой, Кароль закрепил свои новые полномочия, ратифицировав конституцию, превратив правительство в "
 news.484.a: "Балканы никогда не разочаровывают"
 news.485.t: "Железная цена"
 news.485.d: "Корнелиу Зеля Кодряну, \"Капитан\", проповедовавший яростно ксенофобский ультранационализм, интенсивную православную мистику, крайне жестокий антисемитизм, популистское презрение ко всем элитам и прославление смерти на службе делу как самого прекрасного, славного, благородного и эротического опыта во всём мире, был сегодня приведён к присяге в качестве премьер-министра Румынии. Из-за насилия на выборах и назначения кабинета Октавиана Гоги король не увидел иного"
 news.485.a: "Балканы никогда не разочаровывают"
 news.486.t: "Приход Антонеску к власти"
 news.486.d: "Фабрициус, немецкий дипломат в Румынии, позвонил Каролю II и выдвинул одно простое требование: поставить Антонеску во главе Румынии. С падением Франции франкофильская элита Румынии почти в одночасье потеряла большую часть своего влияния и права голоса. Антонеску частично выполнил просьбу, но также попросил Кароля даровать ему резервные полномочия для румынских глав государства. Кароль уступил, и 5 сентября 1940 года генерал стал премьер-министром, а Кароль передал большую часть своей диктаторской власти"
 news.486.a: "Балканы никогда не разочаровывают"
 news.487.t: "Марш на Бухарест"
 news.487.d: " После казни Кодряну «Железная гвардия» долгое время хранила молчание, но они не умерли, а лишь затаились, ожидая подходящего момента для удара. Они возродились под руководством Хории Симэ и организовывали государственный переворот, и теперь, с заключением Антонеску, наступил идеальный момент, так как генерал был полон недовольства текущим правительством и желал положить конец королевской диктатуре, которая вела Румынию к краху. "
 news.487.a: "Балканы никогда не разочаровывают"
 news.488.t: "Смерть Кодряну"
 news.488.d: " Верные королю Каролю II генералы использовали лояльные армейские элементы для устранения премьер-министра Румынии Корнелиу Зеля Кодряну, когда тот возвращался в столицу после поездки по стране. Расценив это как мятеж в армии, Антонеску быстро взял ситуацию под свой контроль, приказав солдатам генералов разойтись по обвинению в мятеже и передать виновных властям. После того как армия была усмирена, Антонеску быстро за"
 news.488.a: "Балканы никогда не разочаровывают"
 Manhattan.1.t: "Манхэттенский проект"
 Manhattan.1.d: "В условиях строжайшей секретности Соединённые Штаты запустили \"Манхэттенский проект\", — монументальное исследовательское начинание с участием лучших научных умов мира. Цель проекта — использование разрушительного потенциала атомной энергии. Слухи в разведывательном сообществе предполагают, что он направлен на создание супероружия, способного быстро завершать войны. Великие державы внимательно следят за проектом, понимая, что его исход может изменить глобальное доминирование. Успех или провал проекта определит будущее глобальной войны и геополитической стабильности."
 Trinity.1.t: "Проект «Тринити»"
 Trinity.1.d: "Ранним утром под покровом строжайшей секретности совместные усилия некоторых из самых блестящих умов мира принесли плоды в виде ослепительной вспышки света и гигантского грибовидного облака в пустыне Нью-Мексико. Испытание первой в мире атомной бомбы под кодовым названием \"Тринити\" коренным образом изменило ход войны и глобальную политику."
 news.9991.t: "Германия запускает операцию «Цитадель»!"
 news.9991.d: "Германский рейх начал очередную летнюю операцию против Советского Союза под кодовым названием «Операция Цитадель», направленную на уничтожение советской армии и принуждение к миру. Без зимы и грязи, замедляющих Германию, Советы снова вынуждены отступать, но на этот раз с опытом двух кампаний."
 news.9991.a: "Как долго еще должны терпеть Советы?"
 news.9991.b: "Начало конца."
 news.9992.t: "Германия начинает операцию «Зимнее солнцестояние»!"
 news.9992.d: "Германский рейх начал очередную летнюю операцию против Советского Союза под кодовым названием «Операция Зимнее солнцестояние», направленную на уничтожение советской армии и принуждение к миру. Без зимы и грязи, замедляющих Германию, Советы снова вынуждены отступать, но на этот раз с опытом двух кампаний."
 news.9992.a: "Сможет ли Советский Союз выиграть войну?"
 news.9992.b: "Добьется ли Рейх наконец успеха?"
 ger_heavy.1.t: "Германия начинает производство тяжелой воды"
 ger_heavy.1.d: "Агенты МИ-6 сообщили, что Германский рейх начал производство тяжелой воды для использования в экспериментах по ядерному делению. Невозможно узнать, сможет ли Германия создать ядерную бомбу и когда это произойдет, но несомненно, что если они сделают это раньше нас, это вызовет невообразимые разрушения и страдания для свободных наций мира. Мы должны захватить Норвегию, чтобы предотвратить это!"
 ger_heavy.1.a: "§RГермания откроет ядерные реакторы и получит бонус в 350% к производству ядерных бомб через 1000 дней"
 finland.21.a: "Мы достигли критической точки!"
 italy.152.t: "Афины захвачены"
 countrystartup.28.desc: "1. Дивизии должны иметь ширину от 39.2 до 40.0 \n\n2. Дивизии должны иметь нулевую ширину бронетанковых батальонов или от двадцати до двадцати шести ширины брони, причем вся броня должна быть одного класса, а остальное — мобильная пехота (не мех/мот АРТ, мех/мот ПТО или мех/мот ПВО) \n\n3. Нельзя смешивать пехотные батальоны с бронетанковыми или мобильными батальонами \n\n3. Нельзя удалять/объединять/изменять/менять шаблоны, когда: дивизии перехвачены, дивизии находятся в 1-5 клетках от линии фронта или если дивизии "
 mtg_news.788.desc: "После падения Куйбышева советское руководство переместилось глубоко за Урал и приняло предложение Германии о перемирии. Куйбышевское перемирие фактически положило конец войне на востоке."
 britain.1115.d: "Советский Союз является столь же жестоким и злым политическим режимом, сводящим личность к винтику в механизме. Чтобы существовала свободная Европа, советское государство должно быть уничтожено."
 britain.1116.d: "С поражением немецкой угрозы, нарушавшей баланс сил в континентальной Европе, мы обезопасили себя от одного тиранического врага, но другой существует на Востоке. Мы можем перевооружить итальянскую и немецкую армии для пополнения наших дивизий, разумеется, при условии их полного перехода к свободной рыночной демократической системе."
 japan.144.t: "Удар на юг!"
 japan.144.d: "В то время как внимание мира приковано к войне в Европе, Азия осталась ослабленной и уязвимой. Сейчас идеальное время для нанесения удара по Южному ресурсному району!"
 japan.144.a: "В бой!"
 peace.1.t: "Объявить войну для сброса добровольцев или заключить белый мир со всеми врагами"
 soviet.509.t: "Будущее Китая"
 soviet.509.d: "В настоящее время мы контролируем часть территории Маньчжурии, что ставит вопрос о том, что с ней делать. Высшие члены Политбюро настоятельно рекомендуют передать ее местным коммунистам и создать сателлитное государство в Азии. Наши союзники из Коммунистической партии Китая будут весьма признательны за это."
 soviet.509.a: "Союз и Китай станут двумя столпами коммунизма в Азии."
 fincon.1.t: "Война-продолжение"
 fincon.1.d: "Немцы наконец начали свой крестовый поход против большевиков, и теперь мы можем вернуть земли, потерянные во время Зимней войны."
 fincon.1.a: "Восстановить прежнюю границу Финляндии!"
 fincon.1.b: "Плохая идея, немцы, вероятно, проиграют эту войну..."
 fincon.2.t: "Война-продолжение начинается"
 fincon.2.d: "Финляндия, проигравшая Зимнюю войну, вновь возобновила военные действия против Советского Союза в надежде вернуть свою территорию. Поскольку основные силы советских войск были связаны на юге боями с немцами, положение Советского Союза еще больше ухудшилось, так как теперь им приходится одновременно иметь дело и с Германией, и с Финляндией."
 fincon.2.a: "Конец большевистского режима становится всё ближе."
 fincon.2.b: "Они могут достичь Ленинграда к концу года..."
 fincon.6.t: "Московское перемирие"
 fincon.6.d: "Долгая и бесплодная Война-продолжение теперь окончена. Финляндия не смогла получить никакой территории от Советов и, более того, потеряла контроль над Петсамо и своей военно-морской базой Порккала. Советы, с другой стороны, не смогли завоевать Финляндию, но теперь могут свободно сосредоточиться на Германии."
 fincon.6.a: "Предатели! Все они предатели!"
 fincon.6.b: "Война в Европе близится к завершению."
 britain.1113.t: "Норвегия стремится присоединиться к союзникам"
 britain.1113.d: "Скандинавская страна Норвегия подверглась нападению сил Оси. Если мы, как островная нация, защищенная Ла-Маншем от хаоса европейских дел, собираемся выиграть эту войну, то нам нужно заключать новые союзы со всеми, кто подвергается угнетению со стороны Германии и ее союзников."
 britain.1113.a: "Мы будем сражаться и в горах!"
 britain.1114.t: "Британия приветствует нас"
 britain.1114.d: "Наши дипломаты позвонили нам из Лондона, сообщив, что мы успешно вступили в официальный военный союз с Британией и ее союзниками. Как член союзников, каждая борьба от Лондона до Веллингтона, от Осло до Каира теперь является частью нашей борьбы за Норвегию."
 britain.1114.a: "Боже, храни наших королей!"
 news.1463.t: "Нейтралитет Аравии нарушен"
 news.1463.d: "В результате неожиданного поворота событий весь Аравийский полуостров был захвачен и вступил в войну."
 iran.4.t: "Иран капитулирует"
 iran.4.d: "После успеха операции «Согласие» персидское правительство и его шах капитулировали перед объединенными англо-советскими силами в Тегеране. Иран и его ресурсы теперь надежно выведены из лап немцев."
 iran.4.a: "Слава Англо-Советскому Альянсу!"
 iran.2.t: "Иран уступает северные территории"
 iran.2.d: "Иранский Азербайджан и Туркменистан наконец воссоединились со своими советскими братьями. Товарищи из обеих республик уже активно устанавливают гражданскую администрацию и проводят идеологическую обработку."
 iran.2.a: "Добро пожаловать в Союз!"
 iran.3.t: "Иран уступает нефтяные поля"
 iran.3.d: "После капитуляции Ирана в Тегеране Иран уступил контроль над Южным Ираном Великобритании, позволив союзникам контролировать стратегические нефтяные месторождения, использовать стратегический Персидский коридор и Трансиранскую железную дорогу."
 iran.3.a: "Отлично!"
 italy.142.t: "Аддис-Абеба захвачена"
 italy.142.d: "С падением Аддис-Абебы мы почти полностью контролируем Эфиопию. Теперь, когда эта давно назревшая часть нашей колониальной империи наконец-то наша, остается решить, как мы будем управлять этой территорией."
 italy.142.a: "Бене! Теперь нужно решить, что делать с Эфиопией..."
 italy.143.t: "Судьба Эфиопии"
 italy.143.d: "Эфиопия была бельмом на глазу итальянской национальной гордости с момента поражения в последней Итало-эфиопской войне. Теперь мир может увидеть возвышение Италии как хозяина Средиземноморья. Король Виктор Эммануил III даровал маршалу Пьетро Бадольо титул «Герцог Аддис-Абебы» за его заслуги. Эфиопией может управлять либо напрямую Италия, либо она может стать частью колониального государства-сателлита под управлением колониального вице-короля."
 italy.143.b: "Создать колониальный протекторат из Эфиопии, Сомалиленда и Эритреи"
 italy.143.a: "Аннексировать Эфиопию напрямую в состав Италии"
 italy.144.t: "Судьба Эфиопии"
 italy.144.d: "Эфиопия была бельмом на глазу итальянской национальной гордости с момента поражения в последней Итало-эфиопской войне. Теперь мир может увидеть возвышение Италии как хозяина Средиземноморья. Король Виктор Эммануил III даровал маршалу Пьетро Бадольо титул «Герцог Аддис-Абебы» за его заслуги. Эфиопией может управлять либо напрямую Италия, либо она может стать частью колониального государства-сателлита под управлением колониального вице-короля."
 italy.144.a: "Создать колониальный протекторат из Эфиопии, Сомалиленда и Эритреи"
 iran.1.t: "Иран капитулирует"
 spain.29.t: "Британцы не смотрят"
 spain.29.d: "После вмешательства Германии в Польшу союзники напали на Рейх и ищут войны. Как нейтральные наблюдатели за этим конфликтом, мы можем получить от него огромную выгоду. Германия очень богата сталью, но бедна редкими металлами, такими как вольфрам, которого много в соседней Португалии. Британцы слишком заняты во Франции, чтобы предотвратить внезапное вторжение на материковую часть Португалии. Затем мы можем получить огромную выгоду от торговли с ресурсоголодной военной машиной Оси."
 spain.29.a: "Пришло время снова сделать Испанию великой."
 italy.146.t: "Муссолини арестован"
 italy.146.d: "После наших неудач в Северной Африке и последующего вторжения союзников в Южную Италию поддержка дуче резко упала. В условиях войны, бушующей на нашей земле, хронической нехватки продовольствия и усиливающихся забастовок, Большой фашистский совет вынес Муссолини вотум недоверия. Сам король Виктор Эммануил отправил дуче в отставку и приказал арестовать его, заменив маршалом Пьетро Бадольо. Муссолини перевозили по всей Италии, прежде чем..."
 italy.146.a: "Кто теперь заставит поезда ходить по расписанию?"
 italy.147.t: "Монархический переворот в Италии"
 italy.147.d: "После некомпетентности итальянцев в Северной Африке и последующего вторжения союзников в Южную Италию наш союзник Муссолини был предан своими соотечественниками и сейчас находится под арестом где-то в Италии. Это очень опасно для Рейха, так как без Муссолини мы не можем рассчитывать на то, что Италия продолжит войну на нашей стороне. Мы должны тщательно обдумать наши следующие шаги."
 italy.147.a: "Свяжитесь с абвером — мы должны немедленно найти, где держат Муссолини"
 italy.147.b: "Это вопиющая итальянская некомпетентность — мы можем выиграть войну без их помощи"
 italy.148.t: "Бенито Муссолини обнаружен"
 italy.148.d: "Благодаря расшифровке абвером итальянского радиосообщения мы обнаружили Муссолини на горном курорте в Абруццо, недалеко от горы Гран-Сассо. Верховное командование уже разработало несколько планов спасения Муссолини, но лучший из них предложил один из наших выдающихся генералов: Курт Штудент. Он спланировал дерзкий рейд коммандос на горнолыжный курорт с использованием планёра для транспортировки."
 italy.148.a: "Штудент не раз доказывал свою компетентность — действуйте."
 italy.148.b: "Это не стоит усилий — отмените все планы по вмешательству."
 italy.149.t: "Муссолини освобождён"
 italy.149.d: "Сегодня в 14:00 немецкие войска СС и парашютисты совершили дерзкий штурм отеля «Кампо-Императоре», освободив Бенито Муссолини из заточения. Отель был взят штурмом без единого выстрела, а немногочисленные защитники внутри немедленно сдались. Муссолини будет доставлен в Мюнхен на встречу с фюрером. Мы ожидаем, что теперь он будет более тесно сотрудничать с Рейхом под нашим надзором."
 italy.149.a: "Только немец мог спасти Италию."
 italy.150.t: "Банда Кох"
 italy.150.d: "С момента провозглашения Итальянской Социальной Республики антифашистские элементы справа, в центре и слева совершают рейды и нападения на нашу армию. Эти непатриотичные элементы были бельмом на глазу, но в ответ Пьетро Кох, итальянец немецкого происхождения с сомнительной репутацией, сформировал антипартизанский отряд под названием «Банда Кох» для борьбы с этими террористами. Однако их методы чрезмерны."
 italy.150.a: "В любом случае, это временная ситуация."
 italy.151.t: "Дуче возвращается!"
 italy.151.d: "Благодаря немецкой храбрости и изобретательности Муссолини был освобожден из-под стражи и возвращен к власти. Итальянское государство будет преобразовано в республику, поскольку, цитируя Муссолини, «Не режим предал монархию, а монархия предала режим». Новое государство будет называться «Итальянская Социальная Республика»."
 italy.151.a: "Вперед!"
 france.350.t: "Борьба продолжается!"
 france.350.desc: "После эвакуации французской армии из Франции генерал де Голль объявил, что битва за Францию продолжится во французской колониальной империи. Фактическая столица перенесена в Касабланку, так как французские военные передислоцировали туда свой штаб и склады снабжения, готовясь к африканской кампании."
 france.351.t: "Неудачи в Африке"
 france.351.desc: ""
 france.352.t: "Адмирал Эмиль Анри Мюзелье принимает командование"
 france.352.desc: ""
 france.353.t: "Адмирал уходит в отставку; министр экономики принимает командование и переносит гражданскую администрацию в Новую Каледонию"
 britain.193.a:0 "Host an emergency session in the House of Commons
 tfv_south_africa.133.t: "Герцог уходит в отставку"
 tfv_south_africa.133.d: "Сегодня премьер-министр Дж. Б. М. Герцог попытался объявить нейтралитет в отношении нацистской агрессии в Европе и попытался оставить Южную Африку вне войны, как это было разрешено Вестминстерским статутом. Однако законопроект был отклонен парламентом в Претории, возглавляемым Яном Смэтсом, 80 голосами против 67. Герцог попытался распустить парламент и назначить всеобщие выборы, надеясь, что его законопроект будет принят, однако это было отклонено генерал-губернатором сэром Патриком Дунканом. Результатом этого стало..."
 tfv_south_africa.133.a: "Значит, война!"
 afghanistan.1.t: "Афганистан капитулирует"
 wtt_manchukou.100.t: "Расширение железных дорог в Ляонине"
 wtt_manchukou.100.desc: "В рамках пятилетнего плана императора Пу И мы должны расширить нашу железнодорожную сеть по всей Маньчжурии, чтобы индустриализироваться и не отставать от наших производственных целей. Провинция Ляонин является центром нашей великой экономической трансформации. Отсюда мы индустриализируем остальную часть Маньчжоу-го при помощи японских инвестиций."
 wtt_manchukou.100.a: "Немедленно начать работу над линией до Мукдена"
 wtt_manchukou.120.t: "Расширение железных дорог в Ляодуне"
 wtt_manchukou.120.desc: "С модернизацией и расширением нашей железнодорожной сети в Ляодуне мы получили доступ к первоклассным участкам для добычи стали. Алюминиевые шахты Гирина могут выиграть от расширения, как и ныне слаборазвитые нефтяные месторождения Хэйлунцзяна. Большая часть нашей страны остается неразвитой."
 wtt_manchukou.101.t: "Необходимо выбрать направление расширения железных дорог"
 wtt_manchukou.101.desc: "С недавним завершением железнодорожных работ мы теперь можем продолжить расширение в других частях нашей страны. Где нам прокладывать пути дальше?"
 wtt_manchukou.101.a: "В Жэхэ, чтобы развивать наши доки и судостроительную промышленность"
 wtt_manchukou.101.b: "В Кирúне, чтобы развить нашу алюминиевую промышленность и расширить наш капитал"
 wtt_manchukou.101.c: "В Хэйлунцзяне, чтобы развить нашу нефтехимическую промышленность"
 wtt_manchukou.101.z: "В Чахáре, чтобы развить промышленность стрелкового оружия и артиллерии"
 wtt_manchukou.101.e: "В Южном Чахáре, чтобы развить нашу «табачную» промышленность"
 wtt_manchukou.101.f: "В Сунцзяне, чтобы развить нашу авиационную промышленность"
 wtt_manchukou.101.g: "В Хулунбуире, чтобы развить нашу бронетанковую промышленность"
 wtt_manchukou.101.h: "Мы завершили нашу программу расширения железных дорог!"
