 GER_himmler_surrender_operation_name: "Подготовить оккупационное правительство"
 GER_himmler_surrender_operation_desc: "Мы заложим основу для нового оккупационного правительства на территориях, которые мы захватим в будущем."
 GER_himmler_mil_output_operation_name: "Саботаж военных заводов"
 GER_himmler_mil_output_operation_desc: "Мы будем саботировать военно-промышленные сети страны и получим материальное преимущество."
 GER_himmler_dockyard_output_operation_name: "Устроить диверсию на верфях"
 GER_himmler_dockyard_output_operation_desc: "Мы будем саботировать верфи страны и получим военно-морское преимущество."
 
 romania.1.t: "Выборы 1937 года"
 romania.1.d: "Впервые «правительственная партия» не смогла достичь 40-процентного порога, необходимого для автоматического получения подавляющего большинства в парламенте. Поскольку явного победителя не было, а «Железная гвардия» заняла уверенное третье место, король использовал «хаос» как предлог для назначения маргинального крайне правого правительства (правительства Гоги-Кузы), которое просуществовало всего 44 дня, после чего король провозгласил свою диктатуру."
 romania.1.a: "Кароль II объявляет королевскую диктатуру!"
 romania.1.b: "Железная гвардия убивает Кароля II!"
 
 vichy_event.1.t: "Арест Гамелена"
 vichy_event.1.d: "Наше поражение в Бельгии и Арденнах нельзя полностью приписывать генералу Гамелену. Однако кому-то нужно быть козлом отпущения за наше унизительное поражение. У нас есть два варианта: арестовать Гамелена и его штаб или позволить им продолжать работать при новом режиме."
 vichy_event.1.a: "Мы не можем арестовать его и его людей."
 vichy_event.1.b: "Нам нужно сосредоточиться на других направлениях."
 
 vichy_event.2.t: "Нейтрализация Дарлана"
 vichy_event.2.d: "Адмирал Дарлан отказывается передавать французский флот любой из сторон. Из-за его положения во флоте его устранение и лишение влияния займут много времени. Необходимо сделать выбор!"
 vichy_event.2.a: "Немедленно арестовать Дарлана!"
 vichy_event.2.b: "Постепенно устранять его влияние."
 vichy_event.2.c: "Нам нужно сосредоточиться на других направлениях."
 
 vichy_event.3.t: "Предложения о перемирии"
 vichy_event.3.d: "Мы выиграли войну! Оставшаяся администрация Франции прислала нам свои предложения о мире. Что нам делать, мой фюрер?"
 vichy_event.3.a: "Учредить рейхскомиссариат"
 vichy_event.3.b: "Создать свободную зону"
 
 FRA_1936_naval_mtg: "Французский флот"
 EFR_1936_navy: "Французский флот"
 
 vichy_event.4.t: "Итальянские претензии"
 vichy_event.4.d: "Хотя Италия Муссолини провалила своё наступление против нас, теперь они претендуют на наши французские земли. Мы можем воспользоваться этой возможностью: не платить никаких репараций и просто отдать всё, или уступить Савойю и выплатить некоторые репарации!"
 vichy_event.4.a: "Мы уступим Савойю..."
 vichy_event.4.b: "Мы уступим всем их претензиям..."
 
 spain_events.3.t: "Объявить о нашем неучастии в войне"
 spain_events.3.d: "Наша страна всё ещё восстанавливается после гражданской войны. Мы не можем рисковать новой войной, иначе страна на этот раз действительно развалится! Мы должны подождать и восстановиться, прежде чем сможем присоединиться к войне в каком-либо качестве."
 spain_events.3.a: "Объявить о неучастии в войне до 1940 года"
 spain_events.3.b: "Объявить о неучастии в войне до 1941 года"
 spain_events.3.c: "Объявить о неучастии в войне до 1942 года"
 
 spain_events.1.t: "Гражданская война в Испании"
 spain_events.1.d: "Этим утром в 5:00, спустя ровно сутки после потери связи с североафриканскими гарнизонами, по всей Испании началась хорошо подготовленная военная операция. Её целью был захват контроля над всеми правительственными институтами и стратегически важными местами в крупных городах. Армия, флот и авиация по большей части перестали реагировать на приказы правительства. Одновременно с этим на севере страны взбунтовалось карлистское ополчение.\n\nЛишь неофициальное народное ополчение, которое быстро среагировало на ситуацию и смогло удержать контроль над многими районами и городами, ставшими целью мятежников, предотвратило переворот. Несмотря на то что изначальных целей лидерам мятежников достичь не удалось, вряд ли они сдадутся так же легко, как в 1932 г. Ни одна из сторон не желает идти на уступки, и текущая ситуация имеет все шансы перерасти в настоящую гражданскую войну..."
 spain_events.1.a: "...которую мы, объединённый Националистический фронт, и выиграем!"
 
 spain_events.2.t: "Победа националистов в гражданской войне в Испании"
 spain_events.2.d: "После долгой и жестокой гражданской войны националисты, объединённые под командованием Франсиско Франко, наконец-то победили врагов-республиканцев и захватили полный контроль над Испанией. В изолированных очагах республиканского сопротивления до сих пор идёт партизанская война, способная помешать националистическому контролю в ранее республиканских районах, но маловероятно, что она перерастёт в масштабное скоординированное сопротивление.\n\nСтрана бросила все силы на восстановление пострадавших от войны городов и промышленности; пока неясно, как примесь идеологии националистов повлияет на внешнюю политику и будет ли возвращена полученная ими щедрая военная помощь из-за рубежа."
 spain_events.2.a: "Такую победу мы одобряем."

 # Trial of the Sixteen
 soviet_purge_events.1.t: "Процесс шестнадцати"
 soviet_purge_events.1.d: "Григорий Зиновьев, Лев Каменев и четырнадцать других видных старых большевиков предстали перед Военной коллегией, обвинённые в создании «троцкистско-зиновьевского террористического центра». Обвинение, возглавляемое Андреем Вышинским, утверждает, что они сговорились убить советских лидеров и захватить власть. После интенсивных допросов подсудимые публично признались в этих обвинениях. Их неминуемая казнь знаменует собой резкое усиление мер внутренней безопасности государства."
 soviet_purge_events.1.a: "Предатели революции! (Организация)"
 soviet_purge_events.1.b: "Предатели революции! (Воздушные миссии)"
 soviet_purge_events.1.c: "Предатели революции! (Прочность дивизии)"

 # Trial of the Seventeen
 soviet_purge_events.2.t: "Процесс семнадцати"
 soviet_purge_events.2.d: "Чистка продолжается, и «Антисоветский троцкистский центр» предстаёт перед судом. Видные деятели, такие как Юрий Пятаков и Карл Радек, обвиняются в промышленном саботаже, шпионаже и сговоре с иностранными державами — в частности с Германией и Японией — с целью разрушить советское государство. Показательный процесс вновь дал драматические, отрепетированные признания, что ещё больше укрепляет официальную версию о широком предательстве внутри партии."
 soviet_purge_events.2.a: "Мы должны искоренить всех саботажников. (Организация)"
 soviet_purge_events.2.b: "Мы должны искоренить всех саботажников. (Воздушные миссии)"
 soviet_purge_events.2.c: "Мы должны искоренить всех саботажников."

 # Secret Trial of the Generals
 soviet_purge_events.3.t: "Секретный процесс над генералами"
 soviet_purge_events.3.d: "По Красной Армии прокатилась ударная волна. Маршал Михаил Тухачевский и несколько высокопоставленных военных командиров были арестованы и подвергнуты секретному ускоренному суду специального трибунала. Обвинённые в создании «Троцкистской антисоветской военной организации» и сговоре с Верховным командованием Германии, они были быстро осуждены и казнены, что глубоко потрясло вооружённые силы, лишив их наиболее опытных военных умов."
 soviet_purge_events.3.a: "Никто не стоит выше подозрений. (Организация)"
 soviet_purge_events.3.b: "Никто не стоит выше подозрений. (Воздушные миссии)"
 soviet_purge_events.3.c: "Никто не стоит выше подозрений. (Прочность дивизии)"

 # Trial of the Twenty-One
 soviet_purge_events.4.t: "Процесс двадцати одного"
 soviet_purge_events.4.d: "Последний крупный показательный процесс, «Дело антисоветского правотроцкистского блока», завершился. Бывшие высокопоставленные чиновники, включая Николая Бухарина и Алексея Рыкова, столкнулись с обширным и абсурдным списком обвинений, начиная от заговора с целью расчленения Советского Союза и заканчивая попыткой убийства самого Ленина. С их осуждением и казнью последние видные фигуры старого большевистского руководства были устранены."
 soviet_purge_events.4.a: "Партия наконец в безопасности. (Организация)"
 soviet_purge_events.4.b: "Партия наконец в безопасности. (Воздушные миссии)"
 soviet_purge_events.4.c: "Партия наконец в безопасности. (Прочность дивизии)"
