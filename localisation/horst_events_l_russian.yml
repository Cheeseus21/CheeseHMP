 poland.26.t: "Польская армия в изгнании"
 poland.26.d: "Наши армии разбиты, и мы были полностью изгнаны из собственной страны, однако наше правительство в изгнании сумело бежать в Лондон через Румынию. Мы можем организовать вооруженное сопротивление с помощью наших друзей!"
 poland.26.a: "Организовать наших коммандос в морские подразделения."
 poland.26.b: "Организовать нашу армию в верблюжьи подразделения."
 poland.26.c: "Организовать экипажи наших танков в бронетанковые подразделения."
 POL_first_corps_tt: "Мы организуем 10 морских пехотинцев в Лондоне."
 POL_second_corps_tt: "Мы организуем 20 верблюжьих подразделений в Лондоне."
 POL_exiled_tt: "Мы организуем 6 подразделений легких танков/4 подразделения средних танков/2 подразделения тяжелых танков в Лондоне."
 
 SAF_open_engineering_schools_tt: "Реформы Хофмейра дадут вам 2 гражданских завода. \n\nДебаты и умиротворение дадут вам 2x бонуса к исследованию промышленности."
 
 japan.999.t: "Американский флот на Гавайях"
 japan.999.d: ":Мы получили известие, что американский Тихоокеанский флот находится в Перл-Харборе. У нас есть беспрецедентный шанс сделать что-то действительно забавное."
 japan.999.a: "Адмирал Ямамото... Сбросьте это"
