 JAP_rejuvenate_the_qing_dynasty:0 "청 왕조 부흥"
 JAP_rejuvenate_the_qing_dynasty_desc:0 "너무 오랫동안 만주 행정은 군사적 필요와 임시 감독으로 혼란스러웠습니다. 부흥한 대청의 미래를 확보하기 위해, 우리는 모든 정당한 영토를 신경의 행정부로 반환하고, 최종적인 황권 복원을 준비하며 영역을 공고히 할 것입니다."
 JAP_restore_imperial_heartlands:0 "제국의 심장부 복원"
 JAP_restore_imperial_heartlands_desc:0 "본토가 확보되었으므로, 광대한 내륙을 통치하는 부담은 천황께서 지실 필요가 없습니다. 내륙 지방을 만주국에 이양함으로써, 우리는 제국의 심장부를 새로운 청나라에 복원하고 그들의 정통성을 확보하는 한편, 중요한 해안선은 일본 제국의 직접 통제하에 유지할 것입니다."

