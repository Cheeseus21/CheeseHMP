 fin_soviet_threat:0 "볼셰비키의 위협"
 fin_soviet_threat_desc:0 "소비에트는 한계를 모릅니다. 내전에서 적군이 패배했다고 해서 핀란드가 공산주의로부터 안전하다는 뜻은 아닙니다. 이 평화는 전쟁의 일시적인 중단에 불과합니다."
 fin_karelianism:0 "대핀란드"
 fin_karelianism_desc:0 "핀란드는 핀란드인만을 위한 국가가 아니라, 모든 핀족 계열 민족을 위한 국가이며, 그들을 동족과 재결합시키는 것은 우리의 권리이자 의무입니다."
 fin_continuation_prep:0 "상처 회복"
