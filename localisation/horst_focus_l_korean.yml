 JAP_USA_shinjuwan_pacific_naval_base_desc:0 "한때 미국의 해군 상징이었던 진주만은 이제 일본의 해상 지배력을 과시합니다. 과거의 대결을 상기시키는 이 기지는 우리의 태평양 제해권을 보장합니다. 이곳에 주둔함으로써 일본이 이 해역을 장악했음을 선포합니다."
 
 ##### CHI WAR BRANCH
 JAP_CHI_build_upon_the_tanggu_truce:0 "당고 협정 확대"
 JAP_CHI_build_upon_the_tanggu_truce_desc:0 "당고 협정은 1933년 5월 31일 톈진 탕구구에서 중화민국과 일본 제국 사이에 체결된 정전 협정입니다. 이 협정으로 2년 전 시작된 일본의 만주 침공이 공식적으로 종결되었습니다. 중국인의 눈에는 굴욕적인 패배로 비춰집니다. 그들이 옳으며, 우리는 그들에게 이 사실을 똑똑히 상기시켜 줄 것입니다."
 JAP_CHI_expand_the_western_roads:0 "서부 도로 확장"
 JAP_CHI_expand_the_western_roads_desc:0 ""
 JAP_CHI_prepare_the_southern_invasion_plan:0 "남부 침공 계획 준비"
 JAP_CHI_prepare_the_southern_invasion_plan_desc:0 "중국 침공은 완벽하게 계획되어야 합니다. 우리의 육군, 공군, 해군은 단 한 번의 거대한 일격으로 공격을 조율하여 몇 달 안에 중국의 방어선을 분쇄할 것입니다. 이 모든 것은 최고 전쟁 평의회인 군사참의원에서 지휘할 것입니다."
 JAP_CHI_expand_mengkukuoan_cavalry_army:0 "몽강 기병군 확장"
 JAP_CHI_expand_mengkukuoan_cavalry_army_EXPL:0 "기병 사단 §H4개§! 획득.\n"
 JAP_CHI_expand_mengkukuoan_cavalry_army_desc:0 "차하르와 외몽골에 세운 우리의 괴뢰 정권은 스스로를 방어할 수 없다면 우리에게 거의 쓸모가 없습니다. 다행히도, 현지인들은 말 안장에서 전투를 이끄는 오랜 전통을 가지고 있으며, 우리는 이를 최대한 활용할 것입니다. 어쨌든, 트럭은 남쪽의 산악 지대로 잠입할 수 없습니다."
 JAP_CHI_execute_the_grand_invasion_of_china_plan:0 "중국 대침공 계획 실행"
 JAP_CHI_execute_the_grand_invasion_of_china_plan_desc:0 ""
 
 JAP_CHI_marco_polo_bridge_incident:0 "노구교 사건"
 JAP_CHI_marco_polo_bridge_incident_EXPL1:0 "   §H허베이 동부§!의 우리 군대가 [CHI.GetFlag]§H[CHI.GetName]§!을 상대로 §H국경 전쟁§!을 시작합니다. 충돌은 더욱 §R확전§!될 것입니다.\n   §H국경 전쟁§!에 대한 우리의 통제력은 §H통제 불능의 군국주의자§! 국민정신 수준에 따라 §R제한§!될 것입니다.\n"
 JAP_CHI_marco_polo_bridge_incident_EXPL2:0 "[PRC.GetFlag]§H[PRC.GetName]§!은 §H국경 전쟁§!에 부분적으로 개입하여 분쟁이 더 이상 §R확전§!되지 않을 확률을 §R감소§!시킬 수 있습니다.\n"
