 ENG_rearmament_program_desc:0 "영국의 재무장 계획은 1930년대 중반 나치 독일과 다른 군국주의 강대국들의 커져가는 위협에 대응하여 시작되었습니다"
 ENG_raw_materials_allocation_plan_desc:0 "제2차 세계 대전 중 영국의 원자재 재분배 계획은 전쟁 수행 노력을 유지하는 데 필수적이었습니다. 전쟁이 격화되면서 영국은 철강, 고무, 석유와 같은 핵심 자원의 심각한 부족에 직면했습니다. 이를 해결하기 위해 정부는 민간 사용보다 군사적 필요를 우선시하며 엄격한 통제와 배급제를 시행했습니다."
 ENG_national_defence_contribution_act_desc:0 "국방 기여법은 1937년 영국 정부가 재무장 노력의 일환으로 도입했습니다. 이 법은 고수익을 올리는 기업에 세금을 부과하여 잠재적 분쟁에 대비한 국가의 군비 증강 자금 조달을 돕기 위한 것이었습니다."
 ENG_battle_of_britain_desc:0 "영국 본토 항공전(1940년 7월 10일 – 10월 31일)은 영국 공군(RAF)과 나치 독일의 루프트바페 사이에 벌어진 주요 항공전이었습니다. 프랑스 함락 이후, 히틀러는 침공 준비를 위해 제공권을 장악하여 영국을 항복시키려 했습니다."
 ENG_expansion_of_steel_mills_desc:0 "무기, 선박, 항공기 생산을 지원하기 위한 철강 수요가 급증함에 따라 기존 제철소를 확장하고 새로운 시설을 건설했습니다. 정부는 안정적인 공급을 보장하기 위해 자원과 노동력을 할당하며 철강 생산을 우선시했습니다."
 ENG_highlands_mining_act_desc:0 "제2차 세계 대전 중 스코틀랜드 고원지대는 국내 자원 생산을 증대시키려는 영국의 노력의 일환으로 광업 활동이 증가했습니다. 납, 아연, 중정석과 같은 광물 매장지로 알려진 이 지역은 이러한 자재에 대한 전시 수요가 증가함에 따라 전략적으로 더욱 중요해졌습니다."
 ENG_expand_aluminum_trade_desc:0 "알루미늄은 항공기 생산에 필수적이었기 때문에 제2차 세계 대전 중 영국에 알루미늄 무역은 매우 중요했습니다. 초기에 영국은 수입에 크게 의존했으며, 특히 풍부한 자원과 근접성 덕분에 주요 공급국이 된 캐나다에 의존했습니다."
 ENG_synthetic_rubber_desc:0 "제2차 세계 대전 중 영국은 일본이 동남아시아의 주요 고무 생산 지역을 통제함에 따라 천연 고무의 심각한 부족에 직면했습니다. 이에 대응하여 영국 정부는 합성 고무의 개발 및 생산에 투자했습니다."
 ENG_colonial_defence_desc:0 "제2차 세계 대전 중 영국의 식민지 방어는 전 세계의 영국 영토와 식민지를 추축국으로부터 보호하는 것을 포함했습니다. 여기에는 지브롤터, 수에즈 운하, 그리고 아프리카와 아시아의 다양한 식민지 소유지와 같은 전략적 요충지를 방어하는 것이 포함되었습니다."
 ENG_african_campaign_desc:0 "아프리카 전역, 주로 북아프리카 전역(1940–1943)으로 알려진 이 전역은 영국과 영연방군이 북아프리카의 통제권을 두고 추축국, 특히 독일과 이탈리아와 싸운 것입니다. 주요 전투로는 토브룩 공방전, 제2차 엘 알라메인 전투, 횃불 작전이 있습니다."
 ENG_egypt_fortification_desc:0 "제2차 세계 대전 중 이집트를 요새화하는 것은 주요 전략적 해상 경로인 수에즈 운하를 통제하는 데 매우 중요했습니다. 영국은 지중해와 홍해를 잇는 이 중요한 연결고리를 보호하기 위해 이집트의 방어력을 강화하는 데 집중했습니다. 주요 요새화 노력에는 서부 사막과 카이로 주변과 같은 주요 위치를 따라 방어 진지, 벙커, 대전차 장애물을 건설하는 것이 포함되었습니다."
 ENG_asyut_fortification_desc:0 "이집트 중부의 도시인 아시우트는 전략적 위치 때문에 제2차 세계 대전 중 영국에 중요했습니다. 이곳은 서부 사막과 수에즈 운하의 전선으로 오가는 보급품과 병력의 핵심 경유지였습니다."
 ENG_khartoum_fortification_desc:0 "수단의 수도인 하르툼은 제2차 세계 대전 중 영국에 전략적으로 중요했습니다. 청나일강과 백나일강의 합류 지점에 위치한 하르툼은 북아프리카와 중동에서 영국 작전의 핵심 병참 및 행정 중심지 역할을 했습니다."
 ENG_asian_campaign_desc:0 "제2차 세계 대전 중 영국의 아시아 전역은 동남아시아와 태평양에서 중요한 군사 작전을 포함했습니다. 영국군은 영연방 및 현지 부대와 함께 일본의 침공에 맞서 말라야와 싱가포르를 방어하는 등 주요 전투에 참여했으나, 이는 연합군의 현저한 패배로 끝났습니다. 버마에서는 중국과 미국 동맹의 지원을 받는 영국군과 인도군이 있었습니다."
 ENG_singapore_strategy_desc:0 "1920년대와 1930년대에 영국이 개발한 싱가포르 전략은 아시아-태평양 지역에서 대영제국의 이익을 방어하는 데 초점을 맞췄습니다. 이 전략은 싱가포르를 핵심 해군 기지 및 요새로 삼아 해상 항로를 보호하고 일본의 팽창을 억제하려는 의도였습니다. 이 전략은 싱가포르의 강력한 해군 방어력과 동방에서 영국 함대의 주요 기지로서의 역할에 크게 의존했습니다."
 ENG_hong_kong_gamble_desc:0 "홍콩은 영국의 식민지이자 제2차 세계 대전 중 주요 전략적 위치였습니다. 1941년 12월, 진주만 공격 직후 일본군은 홍콩 침공을 개시했습니다. 영국, 캐나다, 인도, 그리고 현지 중국군 부대의 결사적인 방어에도 불구하고, 식민지는 1941년 12월 25일에 일본에 함락되었습니다."
 ENG_ceylon_strategy_desc:0 "제2차 세계 대전 중 실론(현재 스리랑카)은 인도양의 전략적 요충지로서 연합군 작전에 매우 중요했습니다. 영국은 해상 항로와 보급선, 특히 중동과 호주를 연결하는 경로를 보호하기 위해 실론을 해군 및 공군 작전 기지로 사용했습니다."
 ENG_general_rearmament_desc:0 "영국 정부는 나치 독일의 커져가는 위협에 대응하여 군대를 현대화하고 확장하기 위한 포괄적인 계획을 시작했습니다. 이 재무장 노력에는 무기, 항공기, 해군 함정의 생산을 늘리고 기존 군사 장비를 개선하는 것이 포함되었습니다."
 ENG_war_production_council_desc:0 "이 부처들은 무기, 차량 및 기타 필수 보급품의 개발과 제조를 감독하며 영국의 전쟁 노력을 유지하는 데 중요한 역할을 했습니다. 또한, 특정 요구를 해결하고 여러 부문에 걸쳐 전시 생산을 간소화하기 위해 다양한 생산 위원회와 위원회가 설립되었습니다."
 ENG_dig_for_victory_desc:0 ""승리를 위한 경작"은 1940년에 시작된 영국의 전시 캠페인으로, 시민들이 직접 식량을 재배하도록 장려했습니다. 전쟁으로 인한 물자 부족과 보급 차질의 위협에 직면한 정부는 개인 및 공공장소에서 채소밭 경작을 장려했습니다."
 ENG_bevin_boys_desc:0 "베빈 보이스는 제2차 세계 대전 중 영국 탄광 산업에 징집된 이들로, 이 제도를 도입한 노동부 장관 어니스트 베빈의 이름을 딴 것입니다. 1943년부터 1948년까지 추첨을 통해 선발된 수천 명의 젊은이들이 군 복무 대신 탄광에서 일하도록 전환되었습니다."
 
 ENG_imperial_policy_desc:0 "제2차 세계 대전 중 영국의 제국 정책은 식민지 자원 동원, 전략적 요충지 확보, 식민지 충성 유지에 초점을 맞췄습니다. 영국은 병력, 원자재, 재정 지원을 식민지에 의존했습니다."
 ENG_canadian_investments_desc:0 "이러한 투자로 우리 식민지들과의 제국적 유대가 더욱 강해질 것입니다."
 ENG_embezzle_canadian_funds_desc:0 "전쟁이 그 어느 때보다 가까워짐에 따라, 우리는 수단과 방법을 가리지 않고 군수 산업에 자금을 지원해야 합니다!"
 ENG_south_african_investments_desc:0 "이러한 투자로 우리 식민지들과의 제국적 유대가 더욱 강해질 것입니다."
 ENG_embezzle_south_african_funds_desc:0 "전쟁이 그 어느 때보다 가까워짐에 따라, 우리는 수단과 방법을 가리지 않고 군수 산업에 자금을 지원해야 합니다!"
 ENG_australian_investments_desc:0 "이러한 투자로 우리 식민지들과의 제국적 유대가 더욱 강해질 것입니다."
 ENG_embezzle_australian_funds_desc:0 "전쟁이 그 어느 때보다 가까워짐에 따라, 우리는 수단과 방법을 가리지 않고 군수 산업에 자금을 지원해야 합니다!"
 ENG_indian_investments_desc:0 "이러한 투자로 우리 식민지들과의 제국적 유대가 더욱 강해질 것입니다."
 ENG_embezzle_indian_funds_desc:0 "전쟁이 그 어느 때보다 가까워짐에 따라, 우리는 수단과 방법을 가리지 않고 군수 산업에 자금을 지원해야 합니다!"
 
 ENG_create_defence_requirements_committee_desc:0 "국방소요 소위원회(DRSC)는 제2차 세계 대전 중 군사적 필요를 위한 자원 배분과 생산의 우선순위를 정하고 조정하기 위해 설립된 영국의 전시 기구였습니다. 1940년에 결성된 이 기구는 군수부의 광범위한 구조의 일부였으며, 군 각 부서의 요구 사항을 평가하고 결정하는 책임을 맡았습니다."
 ENG_create_bef_desc:0 "영국 해외원정군(BEF)은 제2차 세계 대전 발발 시 유럽 본토에 파견된 주요 영국군으로서 1939년에 창설되었습니다. 창설은 전쟁 발발에 따른 것이었으며, 독일의 침략에 맞서 프랑스와 벨기에를 지원하는 것을 주된 임무로 했습니다."
 ENG_lobby_for_funds_desc:0 "제2차 세계 대전 중 영국 육군은 군의 확장과 현대화를 지원하기 위해 증액된 자금을 위해 로비를 벌였습니다. 이러한 노력에는 병력을 무장시키고 훈련하며, 신무기를 개발하고, 필수 기반 시설을 건설하기 위한 더 많은 재정 자원을 옹호하는 것이 포함되었습니다. 육군의 요구는 추축국의 증대하는 위협에 대응하고 장기적인 군사 작전을 지속해야 할 필요에 의해 촉발되었습니다."
 ENG_request_for_more_reserves_desc:0 "제2차 세계 대전 이전, 영국 육군은 나치 독일과 다른 잠재적 적들의 증대하는 위협에 대처하기 위해 병력을 확장하는 데 어려움을 겪었습니다. 육군은 전력과 준비 태세를 강화하기 위해 더 많은 예비군을 요청했습니다. 여기에는 훈련된 예비 인력의 수를 늘리고, 추가적인 모병 활동과 확장된 훈련 프로그램을 위한 로비가 포함되었습니다."
 ENG_partial_funds_desc:0 ""육군 소외"는 특정 기간 동안 영국 육군이 군사 및 국가 전략의 다른 부서나 측면에 비해 덜 우선시되었던 상황을 의미합니다. 제2차 세계 대전 이전에 이런 일은 정치적, 경제적 초점이 유화 정책과 예산 제약으로 옮겨가면서 발생했으며, 이는 육군 확장이나 현대화에 대한 강조가 줄어드는 결과로 이어졌습니다."
 ENG_blank_cheque_for_raf_desc:0 "1930년대 후반, 나치 독일과의 긴장이 고조되면서 정부는 상당한 재정적, 물질적 자원을 공군(RAF)에 투입하여 항공기 편대를 신속하게 확장하고 현대화할 수 있도록 했습니다. 이 결정은 특히 공중 위협의 부상과 독일의 제공권에 대항할 필요성 때문에 공군력의 전략적 중요성에 대한 믿음에 의해 추진되었습니다."
 ENG_radar_research_desc:0 "제2차 세계 대전 중 영국의 레이더 연구는 방공을 강화하고 군사 작전을 확보하는 데 중추적이었습니다. 1930년대부터 영국의 과학자들과 기술자들은, 특히 통신 연구소(TRE)에서 레이더 기술을 개발하고 개선했습니다. 이 연구는 적 항공기를 탐지하고 방어 대응을 유도하는 데 결정적이었던 조기 경보 레이더 시스템의 개발로 이어졌습니다."
 ENG_british_commonwealth_air_training_plan1_desc:0 "1939년에 수립된 영국 연방 항공 훈련 계획(BCATP)은 연합군을 위한 항공 승무원을 훈련시키는 주요 전시 계획이었습니다. 이 계획은 영국, 캐나다, 호주, 뉴질랜드, 남아프리카 간의 협력이었습니다. 이들 국가 전역에 훈련 시설을 설치하는 것을 포함했으며, 캐나다는 광활한 공간과 유리한 조건 덕분에 주요 훈련 중심지 역할을 했습니다."
 ENG_full_funding_desc:0 ""완전 자금 지원 공군"이라는 용어는 제2차 세계 대전 중 왕립 공군(RAF)에 대한 영국 정부의 상당한 재정적 약속을 의미합니다. 특히 나치 독일의 위협에 비추어 공군력의 중요성이 커지고 있음을 인식한 정부는 공군을 확장하고 현대화하기 위해 상당한 자원을 할당했습니다."
 ENG_demands_from_the_royal_navy_desc:0 "제2차 세계 대전 이전, 왕립 해군은 세계적인 지배력을 유지하고 새로운 위협에 대처할 수 있도록 보장하기 위해 몇 가지 요구를 했습니다. 이러한 요구에는 특히 새로운 전함, 항공모함, 잠수함을 건조하여 함대를 현대화하고 확장하기 위한 자금 증액이 포함되었습니다."
 ENG_two_power_standart_desc:0 ""양강 표준"은 19세기 후반과 20세기 초에 채택된 영국의 해군 정책이었습니다. 이는 다음으로 큰 두 해군 강국의 연합 함대에 대해 왕립 해군의 우위를 유지하는 것을 목표로 했습니다. 이 정책은 대영제국의 세계적 이익을 보호하고 해상 지배력을 확보해야 할 필요에 의해 추진되었습니다."
 ENG_commission_for_more_ships_desc:0 "전쟁으로 이어지는 몇 년 동안, 영국 왕립 해군은 해군력과 준비 태세를 강화하기 위해 신규 함정의 취역을 우선시했습니다. 여기에는 전함, 항공모함, 구축함을 포함한 군함의 건조, 의장, 장비 장착을 완료하는 것이 포함되었습니다. 목표는 함대가 새로운 위협에 대응하고 해상 우위를 유지할 수 있도록 보장하는 것이었습니다."
 ENG_rule_the_waves_desc:0 ""바다를 지배하라"는 다른 국가들에 대한 해상 우위와 지배력을 유지하는 전략적 목표를 의미합니다. 해상 무역과 세계적 존재에 대한 의존도를 고려할 때, 대영제국에게 이것은 중요했습니다. 이러한 지배력을 달성하기 위해서는 전 세계에 힘을 투사하고 영국의 이익을 보호할 수 있는 강력하고 기술적으로 진보된 해군을 건설하고 유지하는 것이 필요했습니다."
 
 ENG_gather_the_rearmament_plans_desc:0 "1937년부터 1940년까지 영국 총리였던 네빌 체임벌린은 나치 독일의 증대하는 위협에 대응하여 재무장에 집중했습니다. 체임벌린 정부는 재무장 계획을 수집하고 조정했으며, 영국군의 확장과 현대화를 우선시했습니다. 여기에는 국방비 증액과 육해군 강화가 포함되었습니다."
 ENG_army_demands_desc:0 "제2차 세계 대전으로 이어지는 재무장 계획에서, 영국 육군은 능력의 상당한 향상을 추구했습니다. 여기에는 전차와 포병 같은 새로운 장비를 획득하는 데 중점을 두어 군대를 현대화하고 확장하기 위한 자금 증액이 포함되었습니다. 또한 현대전을 위해 병사들을 준비시키기 위한 훈련 프로그램 개선에도 강한 강조가 있었습니다."
 ENG_establish_royal_tank_regiment_desc:0 "왕립 전차 연대(RTR)는 영국 육군에서 가장 오래되고 저명한 기갑 연대 중 하나이며, 그 기원은 제1차 세계 대전 중인 1916년으로 거슬러 올라갑니다. 당시 신기술이었던 전차를 운용하기 위해 설립되었으며, 전차전의 발전과 진화에 핵심적인 역할을 했습니다."
 ENG_expansion_of_tank_regiment_desc:0 "전쟁이 진행됨에 따라, RTR은 모병이 증가하고 추가 전차 대대가 편성되었습니다. 이러한 확장에는 마틸다, 셔먼, 처칠 전차와 같은 새로운 전차 모델의 획득과 새로운 전술 및 훈련 프로그램의 개발이 포함되었습니다. 연대의 성장은 주요 전역을 지원하는 데 결정적이었습니다."
 ENG_universal_tanks_desc:0 "영국의 첫 주력 전차는 제2차 세계 대전 중에 개발된 처칠 전차였습니다. 1941년에 도입된 이 전차는 다양한 전투 역할을 위해 중장갑과 화력을 제공하도록 설계되었습니다. 처칠은 두꺼운 장갑, 강력한 75mm 포, 그리고 당시로서는 좋은 기동성을 특징으로 하여 공격 및 방어 작전 모두에서 효과적이었습니다."
 ENG_special_air_service1_desc:0 "특수 공수 부대(SAS)는 제2차 세계 대전 중인 1941년 데이비드 스털링에 의해 창설된 영국 육군의 저명한 특수 부대 연대입니다. 원래 공중 정찰과 적진 후방 습격을 위해 설계된 SAS는 독일 비행장과 보급선에 대한 습격을 포함하여 북아프리카에서의 대담한 작전으로 유명해졌습니다."
 ENG_long_range_desert_group_desc:0 "장거리 사막단(LRDG)은 1940년에 결성된 영국의 특수 부대로, 제2차 세계 대전 중 북아프리카에서의 정찰과 습격을 전문으로 했습니다. 랠프 배그놀드 소령에 의해 설립된 LRDG는 사막 항법 전문 지식과 장거리 임무를 위한 개조 차량 사용으로 유명했습니다."
 ENG_commandos_desc:0 "영국 코만도는 습격, 정찰, 적진 후방 직접 공격을 포함한 특수 작전을 수행하기 위해 제2차 세계 대전 중에 결성된 정예 군사 부대였습니다. 1940년 루이 마운트배튼 중장의 지휘 하에 설립된 이 부대들은 비정규전과 상륙 공격을 수행하도록 설계되었습니다."
 ENG_full_funding_for_the_army_desc:0 "우리 육군에 자금이 완전히 지원되었으니, 이제 파시스트에 대항하는 장기전을 위한 더 광범위한 계획에 대해 이야기할 수 있습니다!"
 
 ENG_raf_demand_desc:0 "제2차 세계 대전으로 이어지는 재무장 계획에서, 왕립 공군(RAF)은 능력을 확장하고 현대화하기 위해 상당한 투자가 필요함을 강조했습니다. 공군은 새롭고 진보된 항공기를 획득하고, 구식 모델을 교체하며, 레이더 및 통신 시스템과 같은 기술을 개선하기 위해 자금 증액을 요구했습니다."
 ENG_air_ministry_specifications_desc:0 "항공성 사양은 영국 항공성이 항공기 설계 및 생산을 위해 설정한 상세한 요구 사항이었습니다. 이 사양들은 항공기가 충족해야 하는 필요한 성능, 운용, 기술 표준을 개괄했습니다."
 ENG_defence_scheme_desc:0 "제2차 세계 대전 중 항공성을 위한 방어 계획은 영국을 공습으로부터 보호하고 제공권을 확보하기 위한 포괄적인 전략을 포함했습니다."
 ENG_more_specifications_desc:0 "항공성은 전쟁 내내 공중에서의 기술 경쟁에 뒤처지지 않기 위해 점점 더 많은 요구를 했습니다."
 ENG_bomber_development_program_desc:0 "폭격기 개발 계획은 제2차 세계 대전 중 폭격기 편대를 강화하고 확장하기 위한 영국 정부의 전략적 계획이었습니다. 이 계획은 증대하는 공중전의 요구를 충족시키기 위해 다양한 첨단 폭격기를 개발하고 생산하는 데 중점을 두었습니다."
 ENG_air_production_and_supply_program_desc:0 "항공기 생산 및 보급 프로그램은 항공기 및 관련 장비에 대한 증가하는 수요를 충족시키기 위한 제2차 세계 대전 중의 포괄적인 노력이었습니다. 이는 주로 영국 항공성이 관리하고 산업계와 협력했습니다."
 ENG_air_staff_reports_desc:0 "우리 공군 참모진은 이 공중전을 가능한 한 효율적으로 계속 이어나갈 방법에 대한 귀중한 분석을 제공합니다!"
 ENG_full_plans_achieved_desc:0 "이만큼의 지원이 있다면 우리는 분명히 하늘에서 파시스트들을 격추할 수 있을 것입니다!"
 
 ENG_navy_demands_desc:0 "영국 왕립 해군은 효율성과 준비 태세를 보장하기 위해 몇 가지 주요 요구를 강조했습니다. 해군은 새로운 전함, 항공모함, 구축함을 포함하여 강력하고 현대적인 함대를 건설하고 유지하기 위해 자금 증액을 추구했습니다. 레이더와 개선된 무장과 같은 기술 발전은 경쟁 우위를 유지하는 데 결정적이었습니다."
 ENG_battleship_programs_desc:0 "제2차 세계 대전 발발 전과 초기의 전함 프로그램은 크고 중무장한 군함을 개발하고 유지하기 위한 해군 강국들의 상당한 노력을 포함했습니다."
 ENG_carrier_programs_desc:0 "제2차 세계 대전 중 항공모함 프로그램은 해전의 중심이 된 항공모함을 개발하고 확장하는 데 중점을 두었습니다."
 ENG_submarine_projects_desc:0 "제2차 세계 대전 중 잠수함 프로젝트는 적 선박을 효과적으로 공격하고 해군 작전을 지원하기 위해 잠수함의 설계, 생산, 능력을 향상시키는 데 중점을 두었습니다."
 ENG_cruiser_programs_desc:0 "제2차 세계 대전 중 순양함 프로그램은 해전에서 결정적인 역할을 한 순양함의 설계와 능력을 향상시키는 것을 목표로 했습니다."
 ENG_destroyer_programs_desc:0 "제2차 세계 대전 중 구축함 프로그램은 해전에 필수적이었던 구축함의 설계, 생산, 능력을 향상시키는 데 중점을 두었습니다."
 ENG_two_standarts_achieved_desc:0 "우리 국가가 요구한 대로 양강 표준을 달성했습니다!"
 
