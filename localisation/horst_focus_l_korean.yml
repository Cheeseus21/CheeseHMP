 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_tt:0 "이 중점을 §Y남방자원지대 공격§!보다 먼저 완료하면, [ENG.GetFactionName]에 선전포고 시 다음과 같은 일이 일어납니다:\n\n"
 JAP_the_southern_colonies:0 "남방 식민지"
 JAP_the_southern_colonies_desc:0 "국제연맹에서 탈퇴했음에도 불구하고, 우리는 여전히 남양 군도 위임통치령에 대한 통제권을 유지하고 있습니다. 우리의 태평양 이익을 위해서는 남쪽의 모든 섬들을 적절히 개발하고, 그곳에 거주하는 자들이 제국 내에서 자신의 위치를 알도록 하는 것이 필수적입니다."
 JAP_develop_the_south:0 "남양 개발"
 JAP_develop_the_south_desc:0 "타이완과 위임통치령이 재정적으로 자급자족하고 있지만, 아직 해야 할 일이 많습니다. 우리의 정착민과 행정부를 통해, 우리는 기반 시설과 기업 양쪽에 더 많은 기회를 장려할 수 있습니다."
 JAP_stengthen_taiwan:0 "타이완 강화"
 JAP_stengthen_taiwan_desc:0 "타이완은 우리 제국의 첫 식민지였으며, 현재 가장 중요한 곳 중 하나입니다. 이곳은 남쪽으로의 모든 침공을 위한 발판이 될 것입니다. 따라서, 우리 군을 지원하기 위해 이곳의 산업 발전을 강화할 것입니다."
 JAP_island_industry:0 "도서 산업 장려"
 JAP_island_industry_desc:0 "남양에 대한 투자는 생산성의 극적인 증가를 가능하게 했습니다. 이러한 현지 산업을 적절히 지원하면 이 지역에서 생산되는 상품이 크게 증가할 것입니다."
 JAP_ease_native_restrictions:0 "원주민 규제 완화"
 JAP_ease_native_restrictions_desc:0 "우리의 통치에 의해 부과된 규제는 원주민 섬 주민들의 분노를 샀습니다. 이러한 규제를 완화함으로써, 우리는 제국의 신민이 된다는 것이 무엇을 의미하는지에 대한 더 우호적인 이미지를 만들 수 있습니다."
 JAP_island_fortifications:0 "도서 요새화"
 JAP_island_fortifications_desc:0 "위임통치령의 섬들은 우리의 가장 취약한 소유지입니다. 우리의 통제 조건이 요새화를 금지하고 있음에도 불구하고, 이 가라앉지 않는 항공모함들을 활용하지 않는 것은 어리석은 일일 것입니다."
 JAP_improve_ssdc:0 "남양흥발 지원"
 JAP_improve_ssdc_desc:0 "남양흥발의 성공이 명백해지자, 해군은 이 회사에 추가 자금을 지원하기로 결정했습니다. 이러한 조치는 남태평양에서의 우리의 경제 및 개발 목표를 훨씬 더 관리하기 쉽게 만들 것입니다."
 JAP_upgrade_nanyo_kohatsu_tt:0 "산업 설계사 §Y$south_seas_development$§! 수정 효과: 소비재 공장: §Y-2.0%§! \n§Y공군 기지§! 건설 속도: §G+5.00%§! \n§Y해군 기지§! 건설 속도: §G+5.00%§! \n§Y대공포§! 건설 속도: §G+5.00%§! \n\n"
 JAP_foothold_in_timor:0 "티모르의 발판"
 JAP_foothold_in_timor_desc:0 "해군은 티모르로부터의 무역에 대한 네덜란드의 장악을 깨뜨릴 계획을 구상했습니다. 남양흥발 회사를 활용하여, 우리는 원주민들과 합작 투자를 설립함으로써 이 지역에서의 전략적 목표를 더욱 발전시킬 수 있습니다."
 JAP_continue_truk_fortifications:0 "트루크 요새화 계속"
 JAP_continue_truk_fortifications_desc:0 "트루크 환초는 남태평양에서 제국 해군의 주요 거점입니다. 요새와 시설을 증강하는 것은 이 지역에서 우리의 지배력을 확보하는 데 큰 도움이 될 것입니다."
 GER_bob:0 "영국 본토 항공전"
 GER_bob_desc:0 "우리는 영국으로 전장을 옮겨 그들을 폭격하여 굴복시켜야 합니다. 강력한 공중전만이 영국이 평화 조약에 서명하도록 강제할 수 있습니다."
 HUN_arrow_cross_deal_2:0 "살러시에게 권력 부여"
 HUN_arrow_cross_deal_2_desc:0 "모든 파시스트 정당이 단결하고 통합되었으니, 이제 당명을 마지막으로 바꿀 때가 되었습니다. 바로 화살십자당입니다. 살러시 페렌츠는 당의 모든 측면을 완전히 장악했으며, 몇 주 안에 공식적으로 헝가리의 지도자가 될 것입니다. 화살십자는 고대 헝가리 부족의 상징이자, 트리아농 조약을 무효화하고 국경을 확장하려는 우리의 의도를 보여주는 표시이기도 합니다."
 HUN_fascism_warning_tt:0 "\n이 중점을 완료하기 전에 §H파시스트 강화§! 또는 §H파시스트 국왕 선출§!을 선택하지 않으면 헝가리는 비동맹으로 남게 됩니다!"
 HUN_enforce_corporatism_1:0 "협동조합주의 시행"
 HUN_enforce_corporatism_1_desc:0 "우리의 새로운 사회는 모든 노동 가능 인구가 각자 수행해야 할 과업을 가질 때만 작동할 수 있습니다. 이탈리아인들은 코포라티즘이라는 매우 훌륭한 체제를 가지고 있는데, 이는 사회를 동일한 이해관계에 따라 여러 직업 단체로 나눕니다. 이 새로운 체제를 시행함으로써 우리는 공장 생산량을 극대화하고 사회를 우리 뜻대로 재구성할 수 있습니다."
 HUN_consolidate_horthys_power_1:0 "권력 집중"
 HUN_consolidate_horthys_power_1_desc:0 "헝가리는 10년 넘게 왕 없는 왕국이었습니다. 이로 인해 발생한 정치적 긴장은 한계점에 다다르고 있으며, 신속히 조치하지 않으면 우리가 아는 체제가 붕괴될 수도 있습니다. 우리는 [ROOT.GetLeader]이(가) 이 어려운 시기에 확고한 통제력을 유지하기 위해 자신의 권력을 유지할 뿐만 아니라 확대하도록 보장해야 합니다."
 HUN_szalasi_ferenc:0 "설러시 페렌츠"
 HUN_call_for_a_revisionist_king:0 "새로운 왕조"
 HUN_call_for_a_revisionist_king_desc:0 "국민들은 과거의 영광을 되찾기를 열망하고 있습니다. 합스부르크 가문은 기회가 있었지만 실패했습니다. 이제 다른 곳에서 왕을 찾아야 할 때입니다. 우리는 현재 섭정인 호르티 미클로시에게 국민들의 눈에 비친 그의 영웅적인 지위를 고려하여 왕위를 제안해야 합니다."
 HUN_ban_arrow_cross:0 "설러시 투옥"
 HUN_ban_arrow_cross_desc:0 "설러시 페렌츠는 나라에 너무 많은 문제를 일으켜 더 이상 자유롭게 놔둘 수 없습니다. 그의 첫 정당인 국민의지당(NAP)이 금지된 이래로, 그는 수십 건의 소송에 휘말렸습니다. 증거 부족으로 이 소송들은 오랫동안 연기되었으며, 마침내 구체적인 판결을 내릴 때가 왔습니다: 유죄."
 HUN_strengthen_the_regency_1:0 "섭정 체제 강화"
 HUN_strengthen_the_regency_1_desc:0 "호르티 미클로시는 공식적으로 왕이 아니더라도 국가를 이끌 충분한 능력이 있음을 모두에게 증명했습니다. 호르티의 통치가 완벽하게 충분하다면 헝가리가 군주제로 돌아가야 할 이유를 모르겠습니다. 왕도 독재자도 아닌 그는 유럽에 다가오는 정치적 혼란 속에서 어느 편에도 완전히 동조하지 않고 신중하게 나아갈 수 있습니다."
 HUN_arrow_cross_deal_1:0 "파시스트와 협상"
 HUN_arrow_cross_deal_1_desc:0 "우리는 설러시 페렌츠의 화살십자당의 파시스트 강령을 수용하고 그들과 협력하여 헝가리의 잃어버린 영토를 되찾을 것입니다. 우리는 더 이상 화살십자당과 싸우거나 억압하지 않을 것입니다."
 HUN_calvinist_tt:0 "만약 호르티가 왕으로 즉위하기 전에 가톨릭으로 개종하지 않는다면, 이는 국민과 귀족들을 분노하게 할 것입니다!\n\n"
 HUN_coopt_fascists_tt:0 "\n만약 우리가 사회의 파시스트 분자들과 적극적으로 협력하고 포섭하지 않는다면, 우리는 적대적인 지하 파시스트 운동에 대처해야 할 것입니다!\n\n"
 HUN_crown_king_1:0 "호르티 즉위"
 HUN_crown_king_1_desc:0 "우리의 현 섭정이자 오스트리아-헝가리 함대의 제독, 전쟁 영웅이자 국민적 상징인 호르티 미클로시가 헝가리의 새로운 왕이 될 것입니다. 그와 함께, 수백 년간 외국인 왕이 다스렸던 이 나라는 마침내 헝가리인 왕을 갖게 되었습니다. 그가 바로 우리 민족을 영광으로 이끌 사람입니다."
 HUN_convert_horthy:0 "호르티의 개종"
 HUN_convert_horthy_desc:0 "호르티 가문은 칼뱅파의 오랜 가계에서 유래했습니다. 만약 호르티가 새롭고 진정한 헝가리 왕가를 세우려 한다면, 그는 먼저 그의 백성들의 종교인 가톨릭으로 개종해야 합니다."
 USA_fire_king:0 "어니스트 킹 해임"
 USA_fire_king_desc:0 "어니스트 킹의 영국 혐오는 동맹국과의 관계를 저해할 뿐만 아니라, 마크 14 어뢰와 같이 비효율적인 것으로 판명된 프로젝트를 지원하게 만들고 있습니다."
 FRA_operation_dragoon:0 "용기병 작전"
 FRA_operation_dragoon_desc:0 "프랑스 남부에서의 상륙 작전은 독일 부대를 대서양 방벽에서 끌어내어, 프랑스 북부에서의 더 본격적인 침공을 가능하게 할 수 있습니다."
 RAJ_indian_labor:0 "인도인 노동자"
 RAJ_indian_labor_desc:0 "대영제국은 광대하며 전쟁 수행을 위한 도로, 요새, 철도 건설에 필요한 노동력이 절실히 필요합니다."
 CAN_ford_general_motors:0 "포드 캐나다"
 CAN_ford_general_motors_desc:0 "미국 자동차 회사 '포드 자동차 회사'의 사업을 확장하면 트럭과 하프트랙 생산이 증대될 것입니다."
 CAN_ford_general_motors_idea:0 "포드 캐나다"
 SOV_rehabilitated_military_buffs_tt:0 "§Y선택 시:§!\n§Y모스크바 전략 공세 작전§! 추가, §Y60§!일 동안 (£attack_texticon  사단 공격: §G+20.0%§!) 부여.\n\n"
 ROM_modern_at_guns_2:0 "75mm 레시타 1943년형"
 ROM_modern_at_guns_2_desc:0 "75mm 레시타 1943년형은 대전차 설계에 있어 놀라운 혁신입니다."

 HUN_hussar_doctrine:0 "후사르 교리"
 HUN_hussar_doctrine_desc:0 "속도와 기동은 후사르의 교리이며, 마찬가지로 우리 군의 교리가 될 것입니다."
 HUN_mechanized_hussars:0 "현대 후사르"
 HUN_mechanized_hussars_desc:0 "기계화는 기동 보병의 미래입니다."

 HUN_arpad_line:0 "아르파드 방어선 건설"
 HUN_arpad_line_desc:0 "우리는 하로시 장군의 '유연 방어' 이론에 따라 카르파티아 산맥에 만네르헤임선을 본뜬 경요새망을 건설할 것입니다."
 HUN_arpad_line_tt:0 "카르파티아 산맥을 가로지르는 방어선을 건설하는 디시전이 잠금 해제됩니다.\n\n"
 HUN_theory_of_flexible_defence:0 "유연 방어 이론"
 HUN_theory_of_flexible_defence_desc:0 "테오필 하로시 장군은 새로운 방어전 이론을 개발했습니다. 유연 방어는 가능한 보급선만 차단했기 때문에, 적은 요새선을 우회할 수 있었지만, 재보급이 없는 모든 전투단은 빠르게 탄약과 식량이 고갈되었습니다."
 HUN_study_rocket_designs:0 "독일 로켓 설계 연구"
 HUN_study_rocket_designs_desc:0 "독일의 로켓 공학 발전은 로켓포로 역설계하고 배울 수 있도록 신중하게 연구되어야 합니다."
 poglavnik:0 "포글라브니크"
 HUN_militarize_the_levente:0 "레벤테 군사화"
 HUN_militarize_the_levente_desc:0 "레벤테 협회는 공식적으로 군대 규모를 늘리지 않고 수십만 명의 청소년을 퇴역 군인의 지휘와 훈련 아래 둠으로써 트리아농 조약을 우회하는 우리의 수단입니다. 이 운동을 군사화하면 우리의 인력이 크게 증강될 것입니다."
 HUN_increase_metal_processing_capacity:0 "금속 처리 능력 증대"
 HUN_increase_metal_processing_capacity_desc:0 "더 많은 광석을 채굴할수록, 더 많은 금속을 처리해야 합니다."
 HUN_invest_in_north_transylvanian_mining:0 "북부 트란실바니아 광업에 투자"
 HUN_invest_in_north_transylvanian_mining_desc:0 "트란실바니아는 수세기 전으로 거슬러 올라가는 강력한 광업 역사를 가지고 있습니다. 채굴된 광물이 군수 공장에 직접적으로 유용한 자원을 가져오지 않더라도, 경제에 상당한 기여를 할 것입니다."
 HUN_support_urbanization_2:0 "부다페스트 개발"
 HUN_support_urbanization_2_desc:0 "부다페스트를 세계적인 도시로 만들기 위해 개발 노력을 집중해야 합니다."
 HUN_mountain_artillery:0 "산악 포병"
 HUN_mountain_artillery_desc:0 "소비에트 연방과의 국경은 산과 언덕으로 가득합니다. 헝가리를 방어하려면 그곳에서 포병을 운용하는 법을 배워야 합니다."
 CRO_nuclear_effort:0 "토미슬라브의 위력"
 CRO_nuclear_effort_desc:0 "물리학자들이 너무 멀리 나갔는가?"
 ROM_national_christian_party_ii:0 "옥타비안 만세!"
 ROM_national_christian_party_ii_desc:0 "옥타비안 고가가 이끄는 국가기독당은 마침내 루마니아 농촌 사람들의 의지를 실현할 것입니다."
 CRO_italian_influence_focus_desc:0 "이탈리아와 그 어느 때보다 긴밀한 관계를 맺고 있습니다."
 CRO_recovery_teams:0 "회수반"
 CRO_recovery_teams_desc:0 "장비 손실을 더욱 줄이려면, 전장에서 무기와 차량을 회수할 팀을 조직해야 합니다."
 CRO_prospect_for_resources:0 "자원 탐사"
 CRO_prospect_for_resources_desc:0 "우리 땅은 이 시대의 싸움에 도움이 될 자원을 품고 있습니다. 최대한 빨리 자원을 확보하여 최대한 활용해야 합니다."
 CRO_industrial_planning:0 "산업 계획"
 CRO_industrial_planning_desc:0 "산업 발전을 계속하려면 장기적인 전략을 수립하고 적합한 부지를 찾아야 합니다."
 CRO_secret_preparations:0 "우스타샤 민병대 비밀 편성"
 CRO_secret_preparations_desc:0 "독일 대사에게 비밀리에 연락하여 크로아티아 국민이 유고슬라비아로부터 분리 독립을 원한다는 사실을 알릴 것입니다. 독일이 이 노력을 도와주기를 바랍니다."
 FIN_petsamo:0 "페차모 해방!"
 FIN_petsamo_desc:0 "살라의 핀란드인들은 소비에트 점령에서 해방될 것입니다!"
 GER_weserubung2:0 "베저위붕 작전 (노르웨이)"
 GER_weserubung2_desc:0 "덴마크를 확보했으니, 이제 우리 군은 안전하게 노르웨이를 침공하고 점령할 수 있습니다."
 lower_air_purge_tt:0 "공중 임무 효율 숙청 불이익이 5%만큼 감소합니다."
 lower_air_purge2_tt:0 "공중 임무 효율 숙청 불이익이 2.5%만큼 감소합니다."
 removed_air_purge_tt:0 "§Y소비에트 공군§!에서 §R공중 임무 효율 불이익§!을 완전히 제거했습니다! (현재: [?SOV.SOV_purge_air_factor|%R1])"
 SOV_PLANE_STUFF_TT:0 "\n§C1940년형 전투기를 연구할 것입니다§!"
 SOV_PLANE_STUFF2_TT:0 "\n§C1944년형 전투기를 연구할 것입니다§!"
 war_in_the_west_start:0 "서부 전쟁 책갈피 선택됨"
 NOR_norsk_hydro_focus:0 "노르스크 하이드로"
 ENG_dieppe:0 "디에프 기습"
 ENG_dieppe_desc:0 "디에프 마을에 소규모 침공을 감행하여 유럽 해안선에 대한 독일의 방어 태세를 더 자세히 알아볼 것입니다."
 NOR_navy_3:0 "신속한 해군"
 NOR_navy_3_desc:0 "빠른 함선!"
 SPR_AZUL_tt:0 "§H스페인 내전§! §R베테랑§! 사단 10개가 전쟁 중의 경험과 용맹을 인정받아 (강력한) 훈장과 함께 모집될 것입니다."
 ROM_iron_guard_ii:0 "대루마니아 복원"
 ROM_iron_guard_ii_desc:0 "소비에트의 부코비나와 베사라비아 점령은 복수해야 할 국가적 굴욕이었습니다."
 ROM_iron_guard_iii:0 "오데사 영유권 주장"
 ROM_iron_guard_iii_desc:0 "바르바로사 작전 지원에 대한 보상으로, 독일국은 우리 국경에 인접한 소비에트 영토를 약속했습니다."
 ITA_reinforce_the_gustav_line_tt:0 "이탈리아 전선을 따라 즉시 §H7레벨§! 요새선을 건설할 것입니다\n\n"
 ITA_strengthen_the_blackshirts_spawn_divs2_tt:0 "§Y[THIS.GetName]§!에 §Y검은 셔츠단§! 사단 30개를 창설합니다."
 NOR_norsk_hydro_focus_desc:0 "노르스크 하이드로는 알루미늄과 보크사이트의 주요 공급업체일 뿐만 아니라, 중수 생산을 통해 핵과학에도 기여합니다."
 SOV_approach_germany_molotov_tt:0 "§G뱌체슬라프 몰로토프§!가 우리의 §Y외무인민위원§!입니다!"
 axis_minor_railways_tt:0 "\n§C우리의 소규모 동맹국들이 수도와 3레벨 철도로 연결될 것입니다.§! \n\n§C동맹인 소규모 국가들과 거래 시 20%의 추가 교역을 얻게 됩니다.§!"
 italian_railways_tt:0 "\n§C이탈리아의 모든 철도가 1레벨씩 개선될 것입니다.§!"
 ENG_tonks_tt:0 "\n숙련된 중형전차 4대를 배치하고 이를 지원할 비축 물자를 받게 됩니다."
