 GER_rocketry:0 "로켓 포병"
 steiner_tt:0 "§R슈타이너가 베를린에서 8개의 기갑 사단으로 군대를 편성할 것입니다§!"

 USA_reorganization_act:0 "개편법"
 USA_reorganization_act_desc:0 "§R개편법§! - 이는 기업 권리의 소유권 전부 또는 일부 변경, 사업의 조직-법적 형태 변경, 개별 단위의 제거 또는 하나의 기반 위에 여러 개를 창설하거나 기업을 폐쇄하는 것을 포함하는 상당히 복잡한 절차임."
 USA_roosevelt_deal:0 "루스벨트의 뉴딜"
 USA_roosevelt_deal_desc:0 "§R루스벨트의 뉴딜§! - 1933년부터 1939년까지 미국 대통령 F. 루스벨트 행정부가 대공황의 여파를 극복하고 산업, 농업, 금융, 에너지, 노동 관계의 구조적 개혁을 목표로 시행한 경제 및 사회 프로그램임."
 USA_invest_in_north_east:0 "북동부 투자"
 USA_invest_in_north_east_desc:0 "북동부에 투자함으로써 우리는 미래에 필요할 강철 매장지를 개발할 수 있게 될 것임. "
 USA_the_bank_of_america:0 "뱅크 오브 아메리카"
 USA_the_bank_of_america_desc:0 "§R뱅크 오브 아메리카§! - 우리 동맹국들의 금 보유고를 보관하고, 우리와 그들에게 전쟁 자금을 대출해 줄 수 있게 될 것임."
 USA_invest_in_midvest:0 "중서부 투자"
 USA_invest_in_midvest_desc:0 "미국의 주요 산업 기반에 투자함으로써 우리는 이를 더욱 강력하게 만들 수 있음."
 USA_national_labour_act:0 "전국 노동 관계법"
 USA_national_labour_act_desc:0 "§R전국 노동 관계법§! - 이는 미국 노동법의 기본법임. 민간 부문 직원의 노동조합 결성, 단체 교섭, 파업과 같은 단체 행동을 할 권리를 보장함. " 
 USA_office_of_scientific_research_and_developmentx:0 "과학 연구 개발실"
 USA_office_of_scientific_research_and_developmentx_desc:0 "전쟁이 임박함에 따라, 우리는 잠재적인 적에게 뒤처지지 않도록 과학적 노력에 집중해야 함."
 USA_increase_defence_budget:0 "국방 예산 증액"
 USA_increase_defence_budget_desc:0 "국방 예산을 증액함으로써 우리는 국가를 방어하기 위해 더 많은 자원과 인력을 유치할 수 있음."
 USA_vinsons_naval_act:0 "빈슨 해군법"
 USA_vinsons_naval_act_desc:0 "§R빈슨 해군법§! - 미합중국 해군의 구성을 확립하고, 특정 해군 함정의 건조를 승인하며, 기타 목적을 위한 법률임."
 focus_on_asia:0 "아시아 집중"
 focus_on_asia_desc:0 "아시아에 집중함으로써, 일본이 섬들을 점령하는 것을 막을 수 있음.."

 ROM_anti_air_modernization:0 "부릴레아누 II 개발"
 ROM_anti_air_modernization_desc:0 "우리 군은 외국산 대공 설계 및 생산에 위험할 정도로 의존하고 있음. 우리는 지난 전쟁의 유명한 부릴레아누 대공포의 후계기를 만들어야 함."
 ROM_protect_ploesti:0 "플로에슈티 유전 보호"
 ROM_protect_ploesti_desc:0 "우리는 즉시 플로에슈티 유전 주변에 현대적인 대공포 포대망 건설을 시작할 것임."
 ROM_siebel:0 "지벨 페리"
 ROM_siebel_desc:0 "우리는 바다사자 작전을 위해 독일 국방군이 만든 임시 페리를 받게 될 것임."
 BUL_peace_tt:0 "\n§R소비에트 연방과 중립을 유지할 것임!§R"
 pick_trotsky_tt:0 "만약 §H영구혁명§! 중점을 완료하면, 다음의 정치 고문을 해금할 것임:"
 pick_soviet_tt:0 "\n만약 §H소비에트 권력 강화§! 및 §H사회주의적 인본주의§! 중점을 완료하면, 다음의 정치 고문을 해금할 것임:"
 pick_soviet2_tt:0 "\n만약 §H소비에트 권력 강화§! 및 §H신경제정책으로의 회귀§! 중점을 완료하면, 다음의 정치 고문을 해금할 것임:"
 permanent_revolution_tt:0 "\n§R모든 비공산주의 국가와 외교 관계를 단절하여, 외국 기술 면허 생산, 연합국 무기 대여, 연합국과의 교역이 불가능해질 것임§!"
 SOV_release_innocents:0 "무고한 자들을 석방하라"
 SOV_release_innocents_desc:0 "너무나 많은 동지들이 스탈린에 의해 추방되거나 투옥되었음. 우리는 그들을 석방하고 조국으로 다시 환영해야 함."
 ENG_mince:0 "민스미트 작전"
 ENG_mince_desc:0 "유럽 침공을 성공적으로 수행하기 위해, 우리는 우리의 움직임과 계획을 은폐해야 함. 육군 대위로 위장한 노숙자의 부풀어 오른 시체에 가짜 계획을 심어두면 독일군을 속일 수 있을 것임."
 HUN_convert_horthy_ii:0 "사도 왕국 선포"
 HUN_convert_horthy_ii_desc:0 "우리는 성스러운 왕관의 도움으로 거대한 힘을 키우는 데 성공했음. 이제 우리는 지상과 천상을 잇는 연결고리이자 지상에서 신의 권능을 대표하는 지상의 천국, 사도 왕국을 선포할 권리가 있음. 우리는 기독교와 성스러운 교회의 수호자이며, 세상 끝날 때까지 그럴 것임.  "
 HUN_mission_to_germany_1:0 "독일 외교 사절단"
 HUN_mission_to_germany_1_desc:0 "헝가리가 나아갈 유일한 길은 독일 귀족 아래에서 독일과 함께하는 것임이 분명함. 우리는 양국의 미래를 논의하고 우리가 그들의 친구임을 확신시키기 위해 독일에 대표단을 보내야 함. 그들은 우리의 영토 회복을 돕고 우리 제품을 기꺼이 구매하려 하므로, 그들의 도움에 감사함을 표하는 것이 논리적임."
 HUN_the_kings_guard_1:0 "왕의 근위대"
 HUN_the_kings_guard_1_desc:0 "수백 년에 걸쳐 모든 헝가리 왕들은 자신만의 근위대를 두었으며, 이러한 경향은 헝가리 밖, 전 세계 거의 모든 곳에서 찾아볼 수 있음. 우리는 혼베드의 최정예로 구성된, 국왕의 보호를 목표로 하는 준군사 조직인 왕의 근위대를 창설할 것임."
