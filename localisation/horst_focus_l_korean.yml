 POL_prepare_for_the_inevitable_tt:0 "25,000 또는 50,000명 이상의 사상자를 내면 항복 후 얻게 될 공장의 수가 증가합니다. (기본 공장 6개에서 보상으로 24개 및 36개 공장으로 증가합니다.) \n\n폴란드가 50,000명의 사상자를 내는 데 성공하면 보상으로 망명군을 얻게 됩니다."
 
