 USA_station_in_pearl_harbor:0 "진주만에서 개장"
 USA_station_in_pearl_harbor_desc:0 "피자-초밥 추축국을 조심하십시오."
 USA_station_in_pearl_harbor_tt:0 "§Y진주만§!에서 §Y초기 구형 함선§!의 개장을 시작할 것입니다. \n\n최대 §Y\n항공모함 3척 \n전함 15척§!까지 개장할 수 있습니다. \n\n하지만 우리 제독들은 함대가 §Y기습 공격에 취약§!해질 것을 우려하고 있습니다! \n\n(함선은 개장을 위해 하와이에 머물러야 하며, 언급된 수보다 더 많이 배치하지 마십시오.) \n\n(일부 전함은 파괴되더라도 인양되지만, 개장은 평소보다 더 오래 걸릴 것입니다.)"
 
