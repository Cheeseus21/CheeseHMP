India_Political:0 "인도 중점 트리"
RAJ_Reinforce_the_Government_of_India_Act:0 "인도 통치법 시행"
RAJ_Reinforce_the_Government_of_India_Act_desc:0 "1935년 인도 통치법은 인도 제국의 구조적 재확립에 있어 획기적인 사건이었으며, 우리는 이를 그대로 시행할 것입니다."
RAJ_Linlithgows_Reign:0 "린리스고의 통치"
RAJ_Linlithgows_Reign_desc:0 "지난 5년간 인도 총독직은 윌링던 경이 맡아왔으나, 영국 행정부는 린리스고 경을 임명하고 윌링던을 은퇴시키기로 결정했습니다. 인도 제국의 야당들은 이를 침체로 간주하고 협력에 대한 반대를 점차 강화하고 있습니다. 이 노선을 계속 유지한다면 인도 국민들이 폭력에 의존할 수도 있습니다. 하지만 야당들을 서로 이간질하면 우리가 우위를 점할 수도 있습니다."
RAJ_Provincial_Elections:0 "주의회 선거"
RAJ_Provincial_Elections_desc:0 "첫 인도 총선이 시작되면서, 참여하는 모든 정당 앞에는 수개월간의 힘든 선거 운동이 놓여 있습니다."
RAJ_Independent_Labour_Party:0 "독립노동당"
RAJ_Independent_Labour_Party_desc:0 "우리의 최우선 과제는 인도에 공정을 가져오고 카스트 제도를 파괴하는 것입니다."
RAJ_Indian_National_Congress:0 "인도 국민회의"
RAJ_Indian_National_Congress_desc:0 "우리는 모두 단결하여 영국의 지배에서 벗어나야 합니다."
RAJ_Unionist_Party:0 "연합당"
RAJ_Unionist_Party_desc:0 "신중하고 계산된 정치적 행동을 통해서만 인도를 안정적으로 유지할 수 있습니다."
RAJ_Prepare_the_Lucknow_Session:0 "러크나우 회의 준비"
RAJ_Prepare_the_Lucknow_Session_desc:0 "우리는 모든 국민회의 구성원을 모아 우리 앞에 놓인 과제들을 논의해야 합니다."
RAJ_Secure_Rural_Hindus:0 "농촌 힌두교도 확보"
RAJ_Secure_Rural_Hindus_desc:0 "농촌 힌두교도들은 창립 이래로 국민회의의 핵심 지지자였습니다."
RAJ_Broaden_our_Coalition:0 "연합 확대"
RAJ_Broaden_our_Coalition_desc:0 "국민회의에 새로운 인물들을 영입해야만 승리를 확보할 수 있습니다."
RAJ_Nehrus_Campaign:0 "네루의 선거 운동"
RAJ_Nehrus_Campaign_desc:0 "우리는 자금을 모아 네루의 활동을 지원해야 합니다."
RAJ_An_Offer_for_Rajagopalachari:0 "마노하르에게 제안"
RAJ_An_Offer_for_Rajagopalachari_desc:0 "선거가 끝난 후 그에게 내각 직책을 제안한다면, 우리는 분명 지지를 얻을 수 있을 것입니다."
RAJ_Azads_Support:0 "레이즈먼의 지지"
RAJ_Azads_Support_desc:0 "레이즈먼은 인도 제국에 충성하며 충실히 복무해왔지만, 그는 독립 인도에서 복무하는 데 아무런 문제가 없을 것이며 새로운 아대륙에서 그의 능력을 발휘할 것입니다."
RAJ_Nehrus_Candidacy:0 "네루의 입후보"
RAJ_Nehrus_Candidacy_desc:0 "널리 사랑받는 자와할랄 네루가 인도 국민회의를 이끌어야만 우리는 승리를 볼 수 있을 것입니다."
RAJ_New_Leadership:0 "의회사회당 세력 흡수"
RAJ_New_Leadership_desc:0 "의회사회당은 인도 국민회의의 '급진' 분파로 여겨지며, 기회주의의 편에 서서 우리 땅의 소부르주아로 구성된 정당에 합류한 많은 사회주의자를 포함하고 있습니다. 그들을 향한 우리의 수사를 강화함으로써, 우리는 분명히 그들 구성원 다수가 정의의 편에 서도록 설득할 것입니다."
RAJ_Appeal_to_the_Lower_Castes:0 "하층 카스트에 호소"
RAJ_Appeal_to_the_Lower_Castes_desc:0 "하층 카스트의 투표권은 제한적이지만, 그들의 표 대다수를 얻는 것은 여전히 중요합니다."
RAJ_Subvert_Stalinist_Influence:0 "노동자에게 호소"
RAJ_Subvert_Stalinist_Influence_desc:0 "우리의 주된 선거 목표는 카스트 제도 철폐이지만, 물론 이것이 힌두 사회의 유일한 억압 체제는 아닙니다. 프롤레타리아와 부르주아, 고용주와 피고용인의 관계는 매우 착취적이며 이 또한 없어져야 합니다."
RAJ_Pillais_Influence:0 "필라이의 영향력"
RAJ_Pillais_Influence_desc:0 "P. 크리슈나 필라이는 인도 공산당의 귀중한 일원이며, 그의 통찰력으로 우리는 미래에 더 나은 전략을 취할 것입니다."
RAJ_Danges_Influence:0 "당게의 영향력"
RAJ_Danges_Influence_desc:0 "인도 공산당의 공동 창립자인 슈리파드 암리트 당게는 소수만이 가진 경험을 가지고 있으며, 우리의 최종 목표에 필수적일 수 있습니다."
RAJ_Local_Organization:0 "IIM과의 협력"
RAJ_Local_Organization_desc:0 "자존심 있는 모든 인도 정당들은 인도 독립이라는 필연적인 목표를 향해 노력하고 있으며, 영국이 인도인들을 착취한 것을 잊는 것은 어리석은 일일 것입니다. 통합된 세력으로서 인도는 자치를 향해 훨씬 더 빨리 나아갈 수 있습니다."
RAJ_Centralize_the_Party:0 "혁명 정신"
RAJ_Centralize_the_Party_desc:0 "만약 우리가 인도 아대륙의 소부르주아 정당들에게 불의에 맞선 투쟁에서 우리와 동등하다는 정당성을 부여하고 우리의 혁명적 마르크스주의 정신을 계승하지 않는다면, 우리는 착취에서 벗어난 사회주의 사회라는 우리의 최종 목표를 해치는 것입니다."
RAJ_Organize_a_Conference:0 "봄베이 회의"
RAJ_Organize_a_Conference_desc:0 "많은 인도 좌파 조직들이 있지만 그들은 한 가지 문제에 대해 함께 협력할 기회가 없었습니다. 하지만 우리의 성공은 평등을 원하는 인도의 모든 이들의 목표를 한데 모읍니다."
RAJ_A_Society_of_All_Classes:0 "분할할 수 없는 인도"
RAJ_A_Society_of_All_Classes_desc:0 "인도는 그 자체로 다양한 대륙이므로, 힌두교도, 무슬림 또는 상류층만을 대표하는 자들에 의해 통치될 수 없습니다. 모든 문화, 언어, 민족, 카스트의 연합에 의해 공동으로 통치되어야 합니다."
RAJ_Democracy_and_Socialism:0 "승리한 민주주의"
RAJ_Democracy_and_Socialism_desc:0 "통일 인도를 위해 제시된 건국 비전은 자유에 초점을 맞춘 다당제 연방 정치 체제를 통해서만 실현될 수 있습니다."
RAJ_Assemble_the_Constitutional_Assembly:0 "제헌 의회"
RAJ_Assemble_the_Constitutional_Assembly_desc:0 "영국령 인도가 마침내 과거의 산물이 되었으므로, 이제 우리는 그 자리에 새로운 인도 국가를 건설할 기회와 의무를 갖게 되었습니다."
RAJ_Strengthen_Liberal_Elements:0 "자유주의 세력 강화"
RAJ_Strengthen_Liberal_Elements_desc:0 "인도 국민회의와 그 사회주의적 성향이 인도를 독립으로 이끄는 데 큰 역할을 했지만, 그들의 경제 정책은 100년간의 식민주의에서 회복 중인 국가에는 지탱할 수 없는 것입니다."
RAJ_Nehrus_Vision_for_India:0 "네루의 인도 구상"
RAJ_Nehrus_Vision_for_India_desc:0 "인도 국민회의의 자와할랄 네루와 그의 지지자들은 오랫동안 영국의 통치에 맞서 싸워 승리했습니다. 이제 자연스럽게 그가 탈식민지 세계를 통해 인도를 이끌게 될 것입니다."
RAJ_Cut_down_on_Tariffs:0 "관세 인하"
RAJ_Cut_down_on_Tariffs_desc:0 "인도 경제는 오랫동안 영국 지배자들에 의해 농업 위주로 유지되어 왔으며, 그 결과 황마와 차 수출을 제외하고는 세계 시장에서 대부분 배제되었습니다. 이제 우리는 인도와의 무역을 더 쉽게 만들어 세계 경제에 다시 통합할 것입니다."
RAJ_Relieve_the_Administrative_Burden:0 "행정 부담 완화"
RAJ_Relieve_the_Administrative_Burden_desc:0 "영국이 현지 토후들과 거래하고 일반적인 분할 통치 전략을 사용하면서 영국령 인도의 구조는 복잡성이 폭발적으로 증가했습니다. 행정 구조를 재편하면 미래로 나아갈 준비가 훨씬 더 잘 될 것입니다."
RAJ_Thorough_Corruption_Audits:0 "철저한 부패 감사"
RAJ_Thorough_Corruption_Audits_desc:0 "인도에서 영국 통치하에 매우 두드러졌던 또 다른 특징은 부패였습니다. 많은 관료주의적인 공무원들이 사리사욕을 채우기 위해 사업에 인위적인 장벽을 자주 세웁니다. 우리는 기록을 광범위하게 조사하여 최악의 범인들을 찾아낼 것입니다."
RAJ_Reconect_broken_up_Industries:0 "분단된 산업 재연결"
RAJ_Reconect_broken_up_Industries_desc:0 "인도의 분리는 결코 유쾌한 일이 아니었으며, 파키스탄과 인도 국민 사이에는 여전히 분노가 남아 있습니다. 하지만 이것이 우리 두 나라의 발전을 추구하는 것을 막아서는 안 됩니다. 국경이 너무 부주의하게 그어지면서 많은 공급망이 반으로 잘렸습니다. 국경을 넘나드는 사업을 더 쉽게 만들면 분단으로 황폐해진 일부 산업을 구제할 수 있을 것입니다."
RAJ_Loosen_Rupee_Exchange:0 "루피 환율 완화"
RAJ_Loosen_Rupee_Exchange_desc:0 "인도 루피는 현재 파운드 스털링에 직접 고정되어 있어 금융 안정에 큰 요인이 되지만, 현재 상당한 무역 적자를 겪고 있는 인도 정부가 절실히 필요한 외화를 차입하는 능력을 심각하게 저해합니다. 루피의 통제권을 시장에 넘김으로써 우리는 자유화의 바람을 타고 새로운 번영의 고지로 나아갈 것입니다."
RAJ_Reproachment_with_the_West:0 "서방과의 화해"
RAJ_Reproachment_with_the_West_desc:0 "과거 유럽과의 관계가 썩 유쾌하지 않았던 것은 분명하지만, 협력의 경제적 이익이 현 정부에 남아 있는 어떤 분노보다 더 크다는 사실은 변함이 없습니다."
RAJ_Extensive_Agricultural_Subsidies:0 "광범위한 농업 보조금"
RAJ_Extensive_Agricultural_Subsidies_desc:0 "평범한 농부는 인도의 중추이며, 산업 경제로 나아가는 것이 우리의 목표일지라도 농업 노동자들의 경제 활동은 계속 지원받아야 합니다."
RAJ_Ties_Across_Asia:0 "아시아 전역과의 유대"
RAJ_Ties_Across_Asia_desc:0 "유럽 식민주의라는 공통된 경험은 대부분의 아시아 국가에서 찾아볼 수 있습니다. 우리는 이러한 공통점을 활용하여 군사적, 경제적, 정치적 협력을 더욱 증진할 것입니다."
RAJ_Indo_Soviet_Friendship_Treaty:0 "인도-[SOV.GetAdjective] 우호 조약"
RAJ_Indo_Soviet_Friendship_Treaty_desc:0 "[RAJ_Indo_Soviet_Treaty_Pakistan][SOV.GetNameDef]와의 우호 관계는 국제적 위상뿐만 아니라 세계 최대 경제국 중 하나와 더 긴밀한 경제 관계를 제공하는 데에도 큰 도움이 될 것입니다."
RAJ_Want_Peace_Prepare_for_War:0 "평화를 원한다면, 전쟁을 준비하라"
RAJ_Want_Peace_Prepare_for_War_desc:0 "세계는 점점 더 폭력적으로 변하고 있으며, 우리 국가의 평화와 번영을 보장하려면 이를 방어할 준비가 되어 있어야 합니다. 이는 군사력을 강화하고, 다른 국가와 동맹을 맺고, 우리 안보에 대한 위협에 경계를 늦추지 않는 것을 의미합니다. 전쟁에 대비해야만 진정으로 평화를 이룰 수 있습니다."
RAJ_war_preparation:0 "전쟁 준비"
RAJ_Foster_Mining_Jobs:0 "광업 일자리 육성"
RAJ_Foster_Mining_Jobs_desc:0 "인도의 농촌 지역에 발전을 가져오기 위해, 우리는 오랫동안 번영이 없었던 시골 전역에 여러 광업을 육성할 것입니다."
RAJ_Indo_Soviet_Friendship_Treaty_pakistan:0 "파키스탄의 노선이 점점 더 불확실해짐에 따라, 우리는 아대륙에서 우리의 입지를 강화하기 위해 국제적 지원을 받을 준비를 해야 합니다. "
RAJ_Federalize_Education:0 "교육 연방화"
RAJ_Federalize_Education_desc:0 "우리는 모든 인도 학교에 공통 교육과정을 제정하여, 모든 인도인이 민족, 종교, 언어에 관계없이 세계에 대한 공통된 이해를 공유할 수 있도록 할 것입니다."
RAJ_Reform_the_Rupee:0 "루피 개혁"
RAJ_Reform_the_Rupee_desc:0 "우리는 영국으로부터의 독립을 위해 한 세기 동안 싸워왔지만, 그럼에도 불구하고 인도 루피는 여전히 파운드 스털링에 직접 고정되어 있습니다. 우리는 대신 엔, 달러, 루블과 같은 신흥 세계 통화에 환율을 고정할 것입니다."
RAJ_Constitutional_Minority_Protections:0 "헌법적 소수자 보호"
RAJ_Constitutional_Minority_Protections_desc:0 "아마도 가장 다양하고 활기찬 아대륙인 인도는 모든 지역에 상당한 언어적, 종교적, 민족적 소수자가 있는 나라입니다. 그들의 안전과 번영을 보장하는 것은 인도 전체의 안전과 번영을 보장하는 것입니다."
RAJ_Crackdown_on_Radicalism:0 "급진주의 단속"
RAJ_Crackdown_on_Radicalism_desc:0 "싸움은 끝났고, 인도는 독립했습니다. 수백만 명의 추종자를 거느린 수십 개의 혁명 조직이 여전히 존재하므로 일부 사람들은 그 사실을 깨닫지 못했을 수도 있습니다. 우리는 이들을 민주주의라는 공동의 장으로 다시 데려와 함께 미래를 만들어갈 것입니다."
RAJ_India_United_under_Britain:0 "영국 아래 연합한 인도"
RAJ_India_United_under_Britain_desc:0 "가장 급진적이고 유토피아적인 사회를 위해 경쟁하는 다른 정당들과는 달리, 우리는 인도를 발전시키기 위해 균형 잡히고 차분한 전략을 유지합니다."
RAJ_Ally_with_the_Muslim_League:0 "무슬림 연맹과 동맹"
RAJ_Ally_with_the_Muslim_League_desc:0 "별도의 파키스탄을 약속함으로써 우리는 전인도 무슬림 연맹의 지지를 얻고 사회주의자들과 함께 싸울 수 있습니다."
RAJ_Fight_the_Muslim_League:0 "무슬림 연맹과 투쟁"
RAJ_Fight_the_Muslim_League_desc:0 "무슬림 연맹의 분리된 무슬림 국가라는 생각은 사람들의 마음에서 없애버려야 합니다."
RAJ_Siphon_Congress_Ministers:0 "국민회의 지지 세력 빼내기"
RAJ_Siphon_Congress_Ministers_desc:0 "국민회의 내에는 사회주의 정책이 너무 과하다고 느끼는 사람들이 많으며, 약간의 선거 운동만으로 그들의 충성심을 바꿀 수 있을지도 모릅니다."
RAJ_Appeal_to_Anglo_Indians:0 "앵글로-인도인에게 호소"
RAJ_Appeal_to_Anglo_Indians_desc:0 "아대륙의 앵글로-인도인은 인도와 영국 정치인 모두에게 오랫동안 소외된 소수 집단이었으며, 우리는 이를 활용하여 그들의 표를 얻을 수 있습니다."
RAJ_Content_for_British_Rule:0 "영국 통치에 만족"
RAJ_Content_for_British_Rule_desc:0 "급진적인 지도부의 예측 불가능한 행동은 인도의 핵심을 파괴할 뿐이며, 이들과 함께 안정적인 인도를 건설할 수는 없습니다."
RAJ_Establish_a_Precense_in_Sindh:0 "신드 주에 영향력 확보"
RAJ_Establish_a_Precense_in_Sindh_desc:0 "우리 당의 창립 주 바로 남쪽에는 소외된 다민족 주가 있습니다. 이곳에 더 많은 관심을 기울여야 합니다."
RAJ_National_Unity:0 "국가 통합"
RAJ_National_Unity_desc:0 "힌두교도부터 시크교도, 불교도, 무슬림에 이르기까지 국가의 모든 구성원을 하나로 모아야 합니다. 그래야만 평화를 이룰 수 있습니다."
RAJ_Appeal_to_the_Peasentry:0 "농민층에 호소"
RAJ_Appeal_to_the_Peasentry_desc:0 "농민층은 인도의 가장 중요한 부분이며, 이들을 무시하는 자는 선거에서 패배할 것입니다."
RAJ_Implement_Equal_Education:0 "평등 교육 시행"
RAJ_Implement_Equal_Education_desc:0 "모든 계급 사회에서 양질의 교육은 대부분 상류층의 전유물이지만, 하층민의 입장에서 인도의 교육 제도는 특히나 열악합니다. 사회 전반의 명석한 인재들이 번영할 수 있도록 교육을 평등하게 만드는 것이 우리의 의무입니다."
RAJ_Dismantle_the_Judicial_System:0 "사법 체계 해체"
RAJ_Dismantle_the_Judicial_System_desc:0 "힌두 사법 체계는 복잡하고 뒤얽혀 있으며, 상류층을 편애하고 다수를 소외시킵니다. 우리 법원이 혁명적인 사회와 같은 비전을 가질 때만이 인도에 공정성을 가져올 수 있습니다."
RAJ_Abolish_the_Reservation_System:0 "유보 제도 폐지"
RAJ_Abolish_the_Reservation_System_desc:0 "상위 카스트는 공공 부문 채용 시 종종 우대를 받으며, 때로는 특정 직위가 그들에게만 개방되기도 합니다. 이는 관료 행정의 효율성 저하를 초래했습니다."
RAJ_Seize_Influence_from_Upper_Castes:0 "상위 카스트의 영향력 장악"
RAJ_Seize_Influence_from_Upper_Castes_desc:0 "사회 상류층은 영국 통치 기간에도 철권으로 권력을 장악해 왔습니다. 착취에서 해방된 사회주의 사회에서 이러한 상황은 용납될 수 없습니다. 우리는 압도적 다수로서 그들의 영향력을 강제로 장악할 것입니다."
RAJ_Expand_Healthcare_Facilities:0 "대학 확장"
RAJ_Expand_Healthcare_Facilities_desc:0 "초등 및 중등 교육 제도가 개혁되고 평등해졌으니, 이제 고등 교육 제도를 손볼 차례입니다."
RAJ_Establish_The_Revolutionary_Guard:0 "혁명 수비대 창설"
RAJ_Establish_The_Revolutionary_Guard_desc:0 "혁명은 어떤 대가를 치르더라도 반혁명 운동으로부터 보호받아야 합니다! 우리는 적군과 유사한 군대를 창설하는 데 집중할 것입니다."
RAJ_Invite_Soviet_Planners:0 "소비에트 계획가 초청"
RAJ_Invite_Soviet_Planners_desc:0 "\"국가는 계급 지배의 기관이자 한 계급이 다른 계급을 억압하기 위한 기관이다. 국가는 계급 간의 충돌을 완화함으로써 이 억압을 합법화하고 영속시키는 질서를 창조한다.\"\n—블라디미르 레닌"
RAJ_Invite_International_Theorists:0 "국제 이론가 초청"
RAJ_Invite_International_Theorists_desc:0 "\"정부 구성원만을 위한 자유, 당원만을 위한 자유는—그 수가 아무리 많다 할지라도—결코 자유가 아니다. 자유는 언제나 다르게 생각하는 사람의 자유이다.\"\n—로자 룩셈부르크"
RAJ_Agricultural_Collectivisation:0 "농업 집산화"
RAJ_Agricultural_Collectivisation_desc:0 "우리의 주된 목표는 물론 인도 프롤레타리아의 확장이지만, 누가 그들을 먹여 살리겠습니까? 현재의 사유 농장 제도는 구식이며 비효율적이므로, 농민들의 작은 토지를 더 큰 '집단 농장'으로 통합하기 위해 노력해야 합니다."
RAJ_Expand_Soviet_Aid:0 "소비에트 원조 확대"
RAJ_Expand_Soviet_Aid_desc:0 "소비에트인들은 베푸는 민족이며, 자신들이 그랬던 것처럼 농업 경제가 강력한 산업을 성장시키도록 돕습니다. 우리는 산업화 속도를 급격히 높이기 위해 더 많은 원조를 요청해야 합니다."
RAJ_Rethink_Resource_Policy:0 "자원 정책 재고"
RAJ_Rethink_Resource_Policy_desc:0 "구 식민 정권은 자원 추출을 주로 수익성 있는 수출품에 집중했으며, 산업화와 그에 필요한 철강 및 석탄과 같은 자원은 거의 완전히 무시했습니다. 우리는 성장하는 프롤레타리아를 지원하기 위해 이러한 현실을 근본적으로 바꿔야 합니다."
RAJ_Combat_Institutional_Corruption:0 "제도적 부패 척결"
RAJ_Combat_Institutional_Corruption_desc:0 "부패는 모든 인도 기관에 깊이 뿌리박혀 있습니다. 영국령 인도 제국 시기에 곪아 터졌으며, 우리가 이를 끝내지 못한다면 계속될 것입니다."
RAJ_Establish_a_Central_Committee:0 "중앙위원회 설립"
RAJ_Establish_a_Central_Committee_desc:0 "중앙에서 계획한 산업 목표를 공장에 강요함으로써 수학적인 효율성을 얻을 수 있지만, 노동자들의 자유는 제한됩니다."
RAJ_Incentivize_Workplace_Democracy:0 "직장 민주주의 시행"
RAJ_Incentivize_Workplace_Democracy_desc:0 "지역 기반 사회주의에 집중함으로써 노동자들에게 더 많은 자유를 부여하는 대신, 더 넓은 산업 목표는 희생하게 될 것입니다."
RAJ_The_Liberation_of_South_Asia:0 "남아시아의 해방"
RAJ_The_Liberation_of_South_Asia_desc:0 "인도 프롤레타리아는 선거와 선출 정부라는 양보를 얻었을지 모르지만, 남아시아의 일부 지역은 그렇지 못합니다. 우리는 무기 지원, 군사 개입, 정치적 전복 등 다양한 수단을 통해 그들의 노동자 운동을 은밀히 지원할 것입니다.\nVishv ke karmachaaree ekajut ho gae!"
RAJ_Seize_the_Means:0 "수단을 장악하라..."
RAJ_Seize_the_Means_desc:0 "사회주의를 확립하기 위한 첫걸음은 생산, 분배, 교환 수단을 장악하는 것입니다. 다만, 신중하지 않으면 국내 일부 세력의 반발을 살 수 있습니다."
RAJ_of_Production:0 "...생산 수단을"
RAJ_of_Production_desc:0 "부르주아지는 너무 오랫동안 가장 큰 몫을 차지해 왔습니다. 이제 노동자들이 자신들의 노동의 결실을 맛볼 때입니다."
RAJ_of_Distribution:0 "...분배 수단을"
RAJ_of_Distribution_desc:0 "제품을 분배할 방법이 없다면 공장은 아무 소용이 없습니다. 인도 인민의 이익을 위해 사유 철도를 장악해야 합니다."
RAJ_of_Exchange:0 "...교환 수단을"
RAJ_of_Exchange_desc:0 "국가 예산을 조정하려면 국영 은행이 필요합니다. 이 은행은 우리의 통화를 규제하고 재정을 감독할 것입니다."
RAJ_Connect_the_Rural_Areas:0 "농촌 지역 연결"
RAJ_Connect_the_Rural_Areas_desc:0 "영국은 항구에서 천연자원까지 철도를 건설하는 데만 신경 썼을 뿐, 국토 대부분은 방치했습니다. 이제 영국의 과오를 바로잡는 것이 우리의 의무입니다."
RAJ_The_Ceylon_Emergency:0 "실론 비상사태"
RAJ_The_Ceylon_Emergency_desc:0 "신할라족은 우리가 지원한 모든 무기와 정치적 지지를 바탕으로 영국에 대한 봉기를 시작할 준비를 마쳤으며, 이제 우리의 신호만 기다리고 있습니다."
RAJ_Overthrow_the_Rana_dynasty:0 "네팔 반란"
RAJ_Overthrow_the_Rana_dynasty_desc:0 "네팔 인민은 오랫동안 조직을 결성해왔으며, 이제 억압적인 라나 정권에 맞서 봉기할 때입니다."
RAJ_The_Bhutanese_Revolt:0 "부탄의 반란"
RAJ_The_Bhutanese_Revolt_desc:0 "왕축 왕조는 사랑받았을지 모르나, 국가의 가장 빈곤한 계층을 구제하는 데 실패했으며 인민은 이에 저항할 준비가 되었습니다."
RAJ_The_Remaining_Ports:0 "남은 항구들"
RAJ_The_Remaining_Ports_desc:0 "아대륙에는 평화적으로든 강제적으로든 반드시 제거해야 할 식민주의의 불미스러운 싹이 여전히 남아있습니다."
RAJ_Jinnahs_Kingdom:0 "우리의 무슬림 동지들"
RAJ_Jinnahs_Kingdom_desc:0 "아대륙의 모든 종교, 언어, 문화 집단은 서로 얽혀 있으며 상호 의존적입니다. 그중 하나를 떼어내는 것은 인도라는 국가를 심각하게 약화시킬 것입니다. 오랫동안 방치되었지만 이 국가의 매우 중요한 부분은 신드, 펀자브, 벵골 땅에 거주하는 무슬림들입니다."
RAJ_A_New_Movement:0 "새로운 운동"
RAJ_A_New_Movement_desc:0 "스탈린의 러시아는 공정한 사회주의 사회를 건설하는 데 실패했으므로, 우리는 그들과 거리를 두고 앞으로 나아갈 새로운 운동에 불을 지펴야 합니다."
RAJ_The_Third_International:0 "제3인터내셔널"
RAJ_The_Third_International_desc:0 "스탈린의 러시아는 먼 길을 걸어왔고 수년간 살아남았습니다. 우리가 내일을 기약하려면 그들과 연대해야 합니다."
RAJ_Asian_Anti_Colonialism:0 "아시아의 반식민주의"
RAJ_Asian_Anti_Colonialism_desc:0 "우리는 미래를 보장하기 위해, 수많은 세월 끝에 마침내 아시아 대륙에서 유럽인들을 몰아내야 합니다."
RAJ_Bind_South_Asia_Closer:0 "남아시아 결속 강화"
RAJ_Bind_South_Asia_Closer_desc:0 "우리는 남아시아에 사회주의를 확립했으며, 마침내 그들을 군사적으로 동맹시켜야 합니다."
RAJ_Socialist_Science:0 "사회주의 과학"
RAJ_Socialist_Science_desc:0 "소비에트 인민은 과학적 사업에서 큰 발전을 이루었으며, 새로운 인도 노동자 국가에 필요한 수많은 기술을 보유하고 있습니다. 우리가 과학 교류 프로그램을 시작한다면 우리 두 사회 모두 이익을 얻을 수 있을 것입니다."
RAJ_Military_Cooperation:0 "군사 협력"
RAJ_Military_Cooperation_desc:0 "새로 찾은 동맹국들과 함께 방어 전략을 조율하고 군사 기밀을 공유할 것입니다."
RAJ_Technological_Cooperation:0 "기술 협력"
RAJ_Technological_Cooperation_desc:0 "우리는 우리 학계뿐만 아니라 동맹국들의 학계 또한 강화해야 합니다."
RAJ_Establish_a_National_Government:0 "국가 정부 수립"
RAJ_Establish_a_National_Government_desc:0 "선거에서 승리한 후, 우리는 이제 중앙 집권 정부를 수립하고 내각을 구성할 것입니다."
RAJ_Battle_the_Untouchables:0 "불가촉천민 제도 철폐"
RAJ_Battle_the_Untouchables_desc:0 "카스트 중 가장 약한 계층은 절실한 도움이 필요하며, 민주적인 인도는 그들의 지위를 향상시키는 데 도움을 주어야 합니다."
RAJ_Encourage_Rural_Education:0 "농촌 교육 장려"
RAJ_Encourage_Rural_Education_desc:0 "우리가 산업 강국이 되려면 모든 계층의 교육을 장려해야 합니다."
RAJ_Expand_Delhi_University:0 "델리 대학교 확장"
RAJ_Expand_Delhi_University_desc:0 "고등 교육에 대한 수요가 증가함에 따라, 우리는 가장 위대한 대학인 델리 대학교를 확장해야 합니다."
RAJ_Economic_Restructuring:0 "경제 구조 조정"
RAJ_Economic_Restructuring_desc:0 "현재 상태의 우리 경제는 미래에 적합하지 않으며, 이를 개혁하기 위해 신속하게 행동하지 않으면 농업 사회에 머물게 될 것입니다."
RAJ_Expand_the_Public_Sector:0 "공공 부문 확장"
RAJ_Expand_the_Public_Sector_desc:0 "우리의 산업 역량을 확장하는 가장 좋은 방법은 정부의 직접적인 개입이지만, 이는 우리 조직의 일부 보수적인 구성원들을 소외시킬 수 있습니다."
RAJ_Soviet_Assistance:0 "소비에트의 지원"
RAJ_Soviet_Assistance_desc:0 "현재의 지정학적 환경에서 소비에트 연방은 인도를 서방 세력에 대한 균형추로 성장시키는 데 기득권을 가지고 있습니다."
RAJ_Establish_the_Planning_Commission:0 "계획 위원회 설립"
RAJ_Establish_the_Planning_Commission_desc:0 "우리는 산업적 노력을 단일 기관 아래에 집중시킬 것이며, 이 기관은 모든 종류의 정부 지원 경제 계획을 책임지게 될 것입니다."
RAJ_Agricultural_Investments:0 "농업 투자"
RAJ_Agricultural_Investments_desc:0 "농업 생산량을 향상시킴으로써 우리는 농촌 공동체가 다른 부문으로 이동하도록 장려할 뿐만 아니라, 일반 인도인의 생활 수준도 향상시킵니다."
RAJ_Expell_the_Socialists:0 "사회주의자 축출"
RAJ_Expell_the_Socialists_desc:0 "우리 당은 오랫동안 포괄적인 운동이었지만, 이제 공동의 목표가 달성되었으므로 우리 조직의 극단적인 분자들을 축출할 것입니다."
RAJ_Unify_the_Courts:0 "법원 통합"
RAJ_Unify_the_Courts_desc:0 "우리의 사법 체계는 불필요하게 복잡하고 수백 년이나 되었습니다. 효율성을 높이기 위해 이를 통합할 것입니다."
RAJ_Concessions_to_Princes:0 "번왕들에 대한 양보"
RAJ_Concessions_to_Princes_desc:0 "번왕들이 우리의 새 정부에 동의하지 않는 것은 분명하지만, 이념적 차이로 인해 실용주의를 외면해서는 안 됩니다."
RAJ_No_Compromises:0 "타협은 없다"
RAJ_No_Compromises_desc:0 "수 세기 동안 억압적이었던 번왕국 제도는 우리의 새롭고 현대적인 국가에서 그 어떤 것도 신뢰할 수 없습니다. 이러한 봉건주의의 잔재와 타협하는 것은 어떤 현대 국가에서도 용납될 수 없는 일입니다."
RAJ_Integrate_the_Princely_States:0 "번왕국 통합"
RAJ_Integrate_the_Princely_States_desc:0 "독립을 향한 우리의 진전과 함께, 번왕국들은 자의든 타의든 통합될 것입니다."
RAJ_Democratize_our_Institutions:0 "제도 민주화"
RAJ_Democratize_our_Institutions_desc:0 "우리의 기관들은 수 세기 전에 도입된 체제에서 비롯된 부패에 시달리고 있습니다. 안정을 확보하기 위해 이를 재구성하고 개혁해야 합니다."
RAJ_Central_Bureau_of_Investigation:0 "중앙수사국"
RAJ_Central_Bureau_of_Investigation_desc:0 "새로 설립된 우리의 기관들은 마주할 수 있는 모든 위협으로부터 보호받아야 합니다. 이제 압베어, MI6, CIA에 대한 우리의 대응책을 마련할 때입니다."
RAJ_Reform_our_Police_Force:0 "경찰력 개혁"
RAJ_Reform_our_Police_Force_desc:0 "인도 제국 경찰은 우리나라에서 깊은 반감을 사고 있으며, 만약 우리가 그들의 경찰 제도를 계속 유지한다면 우리 정권도 마찬가지일 것입니다. 이제 영국의 경찰 제도를 폐지하고 명백히 인도적인 제도를 수립할 때입니다."
RAJ_Revise_Taxation_Policies:0 "조세 정책 개정"
RAJ_Revise_Taxation_Policies_desc:0 "영국령 인도는 종종 불공정한 방법으로 우리 인도 인구에게 과도한 세금을 부과했습니다. 건강한 경제와 사회를 유지하기 위해 우리는 영국의 조세 제도를 명백히 인도적인 제도로 대체하기 위해 노력해야 합니다."
RAJ_Reestablish_our_Armed_Forces:0 "국군 재건"
RAJ_Reestablish_our_Armed_Forces_desc:0 "영국령 인도군은 거대한 기관이었으며, 그 주된 창설 목적은 인도를 향한 영국의 지배를 보장하는 것이었습니다. 우리는 인도 국가에 복무하는 새로운 군대를 위한 길을 열어야 합니다."
RAJ_No_Resentments:0 "원한은 없다"
RAJ_No_Resentments_desc:0 "영국과의 역사가 평온했다고는 할 수 없지만, 현재의 지정학적 상황은 서방 강대국들과의 연대를 요구합니다. 물론 영국 식민주의의 상처는 여전히 생생하지만, 우리는 동등한 파트너로서 함께 서야 합니다."
RAJ_Protect_the_Arabian_Sea:0 "아라비아해 보호"
RAJ_Protect_the_Arabian_Sea_desc:0 "우리와 영국의 세계 방어축인 수에즈 사이에는 넓고 노출된 아라비아해가 있습니다. 그곳에서 해적과 적 잠수함들은 중동 및 그 너머로 향하는 우리의 수송을 방해할 충분한 기회를 찾았습니다. 연계된 레이더 기지와 공군 기지를 설치하는 것은 인도양의 통제권을 되찾는 데 큰 도움이 될 것입니다."
RAJ_Equal_Partners:0 "동등한 파트너"
RAJ_Equal_Partners_desc:0 "이제 식민지와 종주국의 관계가 동등한 파트너 관계로 바뀌었으니, 우리는 영국의 손이 닿지 않는 곳의 자유를 수호하기 위해 국제 정치에서 더 큰 부분을 차지할 것입니다."
RAJ_A_New_Way_Forward:0 "새로운 길"
RAJ_A_New_Way_Forward_desc:0 "인도는 전쟁에 개입해서 얻을 것이 아무것도 없으며, 설령 우리의 노력으로 단 하나의 전쟁이라도 막을 수 있다면 우리는 수천 명의 생명을 구하게 될 것입니다."
RAJ_Mutual_Investments:0 "상호 투자"
RAJ_Mutual_Investments_desc:0 "유럽인들이 우리보다 훨씬 더 산업화되어 있지만, 이러한 투자는 여전히 상호 이익이 될 것입니다."
RAJ_The_Non_Aligned_Movement:0 "비동맹 운동"
RAJ_The_Non_Aligned_Movement_desc:0 "우리는 우리 시대의 초강대국으로부터 독립적인 국제 공동체를 육성하고 함께 세계 평화를 위해 싸울 것입니다."
RAJ_Bring_Democracy_to_South_Asia:0 "남아시아에 민주주의를"
RAJ_Bring_Democracy_to_South_Asia_desc:0 "인도는 민주주의의 빛나는 보루가 되었지만, 우리는 여전히 민주주의가 부재하고 폭정이 가득한 대륙에 살고 있습니다."
RAJ_South_Asian_Economic_Integration:0 "남아시아 경제 통합"
RAJ_South_Asian_Economic_Integration_desc:0 "인도 아대륙은 세계 시장에서 여러 공통된 목표를 가지고 있습니다. 만약 우리가 경제를 통합하고 단결시킨다면 번영은 모두에게 돌아갈 것입니다. 또한 국제 무역 파트너와의 협상도 훨씬 더 효과적일 것입니다."
RAJ_Pressure_the_British_about_Ceylon:0 "실론에 대해 영국 압박"
RAJ_Pressure_the_British_about_Ceylon_desc:0 "실론 사람들은 인도의 독립이 자신들도 영국의 착취에서 벗어나는 것을 의미하기를 바라며 오랫동안 독립을 위해 조직해왔습니다. 비록 그렇지 않았을지라도, 이제 우리는 그 운동이 목소리를 낼 수 있도록 도울 수 있습니다."
RAJ_Armed_Neutrality:0 "무장 중립"
RAJ_Armed_Neutrality_desc:0 "아무도 전쟁을 원하지 않으며, 지도자들은 오직 전쟁의 전리품만을 원합니다. 이 전리품을 최대한 얻기 어렵게 만드는 것이 모든 중립적이면서도 주권적인 국가의 목표가 되어야 합니다. 우리는 군의 사기를 높이고 군수 산업을 강화할 것입니다."
RAJ_Expand_its_Competences:0 "권한 확대"
RAJ_Expand_its_Competences_desc:0 "아마도 우리가 이 조직을 확장하고 통합한다면 우리의 말에 더 큰 힘이 실리고, 약소국들의 권리를 보호하는 데 더 효율적이게 될 것입니다."
RAJ_Emphasise_Anti_Colonialist_Sentiment:0 "반식민주의 정서 강조"
RAJ_Emphasise_Anti_Colonialist_Sentiment_desc:0 "식민주의는 추악하고, 시대에 뒤떨어졌으며, 인기 없는 제도이며 그 시대는 이미 오래전에 끝났어야 했습니다. 이 메시지는 전 세계에 퍼져야 합니다. 그렇지 않으면 이 행성의 식민지화된 사람들은 수십 년간 불필요한 고통을 견뎌야 할 것입니다."
RAJ_Take_back_the_Ports:0 "항구 탈환"
RAJ_Take_back_the_Ports_desc:0 "유럽의 항구들은 우리의 식민지 과거를 상기시키는 추악한 유물입니다. 물론 우리는 이 문제를 평화적으로 해결하기를 바라지만, 말에만 의존할 수는 없습니다."
RAJ_Launch_The_Quit_India_Movement:0 "인도 퇴거 운동 개시"
RAJ_Launch_The_Quit_India_Movement_desc:0 "우리는 현재 영국을 몰아내기 위해 가능한 모든 수단을 동원하고 있습니다. 하지만 아마도 우리의 정적들과 화해하고 전국적인 파업을 시작하면 압박을 더욱 가중시킬 수 있을 것입니다."
RAJ_Intervention_in_Pakistan:0 "파키스탄 개입"
RAJ_Intervention_in_Pakistan_desc:0 "진나의 민주주의라는 허울 좋은 명분은 무너졌고 펀자브, 신드, 벵골에 거주하는 무슬림, 시크교도, 힌두교도들에게 독재 통치가 강요되었습니다. 이러한 극단적인 정권의 존재를 용납하는 것은 인도 아대륙에 대한 통제권을 얻으려는 외세들을 초대하는 것과 같습니다. 인도 국군은 너무 늦기 전에 개입해야 합니다."
RAJ_Offer_the_British_Concessions:0 "영국에 대한 양보"
RAJ_Offer_the_British_Concessions_desc:0 "영국 제도는 여러 가지 이유로 인도를 붙잡고 있으며, 그중 주된 이유는 인도 아대륙의 막대한 천연자원입니다. 만약 우리가 자원 일부를 공유하겠다고 약속한다면 협상은 훨씬 더 순조롭게 진행될 것입니다. "
RAJ_Mutual_Security:0 "상호 안보"
RAJ_Mutual_Security_desc:0 "우리의 새로운 동맹에서 우리는 군사 전략을 조율하여 우리 모두의 안보를 증진할 것입니다."
RAJ_The_Remains_of_South_Asia:0 "남아시아의 잔재"
RAJ_The_Remains_of_South_Asia_desc:0 "남아시아는 여전히 자국민을 억압하는 전제 정권으로 가득합니다. 우리는 영국의 도움을 받아 그 권위주의 정권들에 민주주의를 도입할 것입니다."
RAJ_Outwards_to_the_World:0 "세계를 향하여"
RAJ_Outwards_to_the_World_desc:0 "우리는 인도의 입지를 확보하기 위해 외부 동맹을 찾아야 합니다."
RAJ_The_Womens_Status:0 "여성의 지위"
RAJ_The_Womens_Status_desc:0 "여성은 우리 사회에서 오랫동안 억압받아 왔습니다. 온갖 야만적이고 낡은 관습이 여전히 여성에게 강요되고 있습니다. 그리고 이를 바로잡기 위해서는 입법 이상의 것이 필요하지만, 그것이 공정한 인도를 세우는 첫걸음입니다."
RAJ_Caste_Reform:0 "카스트 제도 개혁"
RAJ_Caste_Reform_desc:0 "카스트 차별 제도는 오랫동안 인도를 뒤덮어 왔으며 여전히 많은 지역을 지배하고 있습니다. 힌두 사회에서 이 제도는 사람들을 경직된 사회 집단으로 분류하며, 하위 카스트는 정기적으로 착취당하고 있습니다."
RAJ_Develop_the_Defense_Industry:0 "국방 산업 개발"
RAJ_Develop_the_Defense_Industry_desc:0 "최근 국유화 관련 경제 개혁 이후, 이제는 우리 경제와 군대 모두를 돕기 위해 국가 방위 산업을 강화할 때입니다."
RAJ_Establishing_A_Indian_Navy:0 "인도 해군 창설"
RAJ_Establishing_A_Indian_Navy_desc:0 "인도양은 넓고 위험한 바다이며, 순찰에는 대규모 수상 함대가 필요하지만 현재 우리는 이를 보유하고 있지 않습니다. 해군 생산을 증대하는 것이 매우 중요합니다."
RAJ_Unity_in_India:0 "인도의 통합"
RAJ_Unity_in_India_desc:0 "오랫동안 인도의 무슬림들은 소외되어 왔지만, 자유롭고 민주적이며 공정한 사회는 그러한 악을 용납할 수 없습니다. 우리는 그들의 요구를 수용하여 국가를 통합해야 합니다."
RAJ_The_Ones_Who_Got_Away:0 "도망친 자들"
RAJ_The_Ones_Who_Got_Away_desc:0 "인도로의 통합 요구에 대해 우리는 매우 단호했지만, 몇몇 군주들이 우리 손아귀에서 벗어났습니다. 이제 아대륙을 확보할 때입니다."
RAJ_Industrial_Expertise:0 "산업 전문성"
RAJ_Industrial_Expertise_desc:0 "소련 고문단과 델리 대학교의 신규 졸업생들의 지적 재능을 결합하여, 우리는 향상된 기술로 산업 공정을 개선할 것입니다."
RAJ_Mechanized_Agriculture:0 "농업 기계화"
RAJ_Mechanized_Agriculture_desc:0 "우리 국민은 이제 이전과는 비교할 수 없을 정도로 교육을 받았습니다. 이 모든 새로운 전문 지식을 바탕으로 전국적인 농업 기계화 시스템을 도입하여 생산량을 급격히 늘릴 수 있습니다."
RAJ_Minimum_Wage_Legislation:0 "최저 임금법 제정"
RAJ_Minimum_Wage_Legislation_desc:0 "인도의 노동자들은 여러 세대에 걸쳐 착취당해 왔습니다. 만약 우리가 최저 임금법을 도입한다면, 최빈곤층의 생활 수준을 크게 향상시킬 수 있을 것입니다."
RAJ_Relieve_Indias_Struggling_Food_Supply:0 "인도의 식량 공급난 완화"
RAJ_Relieve_Indias_Struggling_Food_Supply_desc:0 "인도의 식량 공급은 기후에 크게 의존합니다. 만약 몬순 계절이 할당량을 채우지 못하면 수요를 맞추기 위해 곡물을 수입해야 합니다. 관개 및 농업 방식을 개선한다면, 미래의 기근을 예방할 수 있을 것입니다."
RAJ_Placate_the_Nobles:0 "귀족 회유"
RAJ_Placate_the_Nobles_desc:0 "귀족들은 영국 통치하에서 번영했으며 우리의 독립을 그다지 달가워하지 않습니다. 하지만 우리가 그들에게 약간의 양보를 한다면 그 사실을 바꿀 수 있을지도 모릅니다."
RAJ_Military_Research_Department:0 "군사 연구부"
RAJ_Military_Research_Department_desc:0 "우리는 많은 장군들이 제안하는 단순한 양적 팽창이 아니라, 진정한 기술적 우위를 통해 군사적 역량을 확장해야 합니다."
RAJ_Sit_Down_with_the_Farmers:0 "농민과의 대화"
RAJ_Sit_Down_with_the_Farmers_desc:0 "자신의 땅을 경작하는 자영농은 우리 땅과 국가의 생명선이며, 그의 필요는 식민 정부가 그에게 제공했던 것보다 더 많은 관심을 받을 자격이 있습니다."
RAJ_Token_Social_Reform:0 "형식적인 카스트 개혁"
RAJ_Token_Social_Reform_desc:0 "카스트 제도는 인도의 질서와 안정을 유지하는 데 항상 큰 역할을 해왔지만, 영국의 철수로 인해 높은 역량이 요구되는 많은 직책이 상위 카스트 출신으로 채워지지 못한 채 공석으로 남게 되었습니다. 일부 규제를 완화함으로써 식민지 시대의 효율성을 유지할 수 있기를 바랍니다."
RAJ_Expand_our_Ordance_Industry:0 "군수 산업 확장"
RAJ_Expand_our_Ordance_Industry_desc:0 "세계에 감도는 분쟁 속에서 [RAJ.GetNameDef](은)는 자국민을 보호하고, 그에 못지않게 중요한 모두의 자유를 수호할 준비를 해야 합니다."
RAJ_Answer_The_Call:0 "부름에 응답하라"
RAJ_Answer_The_Call_desc:0 "브리튼 제도는 현재 패배할 여유가 없는 전쟁에 휘말려 있으며, 어떤 형태의 항복이든 수백만 명을 폭정과 어둠 속으로 몰아넣을 수 있습니다. 자유가 위험에 처한 곳이라면 어디든 싸우는 것이 우리의 도덕적 의무이며, 이제는 부름에 응답할 때입니다."
RAJ_Institute_The_Draft:0 "징병제 실시"
RAJ_Institute_The_Draft_desc:0 "이 전쟁에 참여하는 것이 도덕적 의무이기는 하지만, 모든 국민이 우리 상황의 심각성을 깨닫고 있는 것은 아닙니다. 안타깝게도 우리는 전 세계 사람들을 해방시키기 위해 자원하지 않는 남성들을 징집해야 합니다."
RAJ_Cross_Country_Railways:0 "국토 횡단 철도"
RAJ_Cross_Country_Railways_desc:0 "영국은 철도 시스템에 막대한 투자를 했지만, 노선은 제한적이고 이윤 중심으로 운영되었습니다. 우리는 인도의 이익을 위해 이 철도망을 확장해야 합니다."
RAJ_Industrial_Investments:0 "산업 투자"
RAJ_Industrial_Investments_desc:0 "우리 경제가 성장하고 번영하도록 돕기 위해 전국 각지의 공장에 막대한 투자를 해야 합니다."
RAJ_Aquire_War_Material:0 "전쟁 물자 획득"
RAJ_Aquire_War_Material_desc:0 "미래의 잠재적인 적들에게 맞서기 위해서는, 용감한 우리 병사들을 뒷받침할 새로 연구되고 잘 생산된 무기를 준비해야 합니다."
RAJ_Internal_Security_Act:0 "내부 보안법"
RAJ_Internal_Security_Act_desc:0 "이 나라의 극단주의 세력이 모든 것을 무너뜨리도록 내버려 둘 수 없습니다. 우리는 위대한 인도라는 나라를 파괴하려는 자들을 체포하는 영국의 정책을 계속 이어나갈 것입니다."
RAJ_Placate_the_British:0 "영국 회유"
RAJ_Placate_the_British_desc:0 "우리의 독립은 확보되었지만, 경제를 유지하기 위해 여전히 영국의 투자에 크게 의존하고 있습니다. 영국인들을 회유하기만 한다면 인도로 더 많은 투자를 유치할 수 있을 것입니다."
RAJ_Federalisation:0 "국민 문해력"
RAJ_Federalisation_desc:0 "우리는 교육 부문 확장을 통해 문해율을 극적으로 높여야 합니다. 인도의 미래가 여기에 달려 있습니다!"
RAJ_A_Truly_Indian_Navy:0 "진정한 인도 해군"
RAJ_A_Truly_Indian_Navy_desc:0 "인도양은 넓고 위험한 바다이며, 순찰에는 대규모 수상 함대가 필요하지만 현재 우리는 이를 보유하고 있지 않습니다. 해군 생산을 증대하는 것이 매우 중요합니다."
RAJ_Fighting_Tyranny_whereever_it_may_be:0 "어디에 있든 폭정에 맞서 싸워라"
RAJ_Fighting_Tyranny_whereever_it_may_be_desc:0 "우리 군대는 주로 남아시아에서 인도의 이익을 보호하는 데 사용되었지만, 우리는 더 큰 그림을 보지 못했습니다. 우리는 전 세계의 자유를 돕고, 자유를 잿더미로 만들려는 자들에게 맞서 싸워야 합니다."
RAJ_Assemble_our_Cabinet:0 "내각 구성"
RAJ_Assemble_our_Cabinet_desc:0 "새로운 총독이 부임할 때마다 그의 인도에서의 노력을 지원하는 새로운 내각이 구성됩니다. 총독 행정 위원회는 한때 자문 위원회에 불과했지만, 시간이 지남에 따라 더 많은 영향력을 얻었으므로 우리는 유능한 장관들을 찾아야 합니다."
RAJ_Meet_with_the_Legislative:0 "입법부와 회동"
RAJ_Meet_with_the_Legislative_desc:0 "국왕 대리인이 입법부에 막강한 권력을 행사하지만, 본국과는 달리, 우리는 여전히 그들이 우리 뜻대로 투표하도록 만들어야 합니다."
RAJ_Meet_with_the_Judiciary:0 "사법부와 회동"
RAJ_Meet_with_the_Judiciary_desc:0 "영국 관습법이 인도 전역에 대체로 적용되었지만, 사법 체계는 토착 방식에 따라 구축되었습니다. 그들이 우리에게 반대하지 않도록 하는 것이 미래의 골칫거리를 덜어줄 것입니다."
RAJ_Attend_the_Imperial_Conference:0 "제국 회의 참석"
RAJ_Attend_the_Imperial_Conference_desc:0 "제국 회의는 정기적으로 열리지만, 이번 회의는 특별한 중요성을 지닙니다. 왕실의, 뭐랄까, 논란 이후 많은 자치령이 혼란에 빠졌으며, 런던은 제국과의 유대를 다시 강화하는 것을 목표로 하고 있습니다."
RAJ_Common_Economic_Policy:0 "공동 경제 정책"
RAJ_Common_Economic_Policy_desc:0 "제국에 더 가까워지기 위한 첫걸음으로, [ENG.GetLeader]은(는) 제국 공동 경제 정책 개편을 고려하고 있습니다."
RAJ_Reinvigorate_Imperial_Shipping:0 "제국 해운 재활성화"
RAJ_Reinvigorate_Imperial_Shipping_desc:0 "인도양을 통과하는 항로가 영국령 라지의 재정을 희생시키며 다소 쇠퇴했습니다. 우리는 제국 해운에 대한 지속적인 투자를 추진해야 합니다."
RAJ_Common_Defence_Policy:0 "공동 방위 정책"
RAJ_Common_Defence_Policy_desc:0 "전 세계적으로 고조되는 긴장을 영국 행정부도 인지하고 있습니다. 그들은 아마도 자치령, 본토, 그리고 인도가 제국을 수호하기 위해 군대를 더 잘 조율해야 한다고 제안했습니다."
RAJ_The_Indian_Merchant_Navy:0 "인도 상선대"
RAJ_The_Indian_Merchant_Navy_desc:0 "인도가 역사적으로 가장 해양 활동이 활발한 국가는 아니었지만, 우리는 제국이 제공하는 무역에 크게 의존하고 있습니다. 우리의 자원을 더 잘 활용하기 위해서는 인도양 순찰을 위한 해군 역량 확장을 시작해야 합니다."
RAJ_An_Army_serving_the_Empire:0 "제국에 복무하는 군대"
RAJ_An_Army_serving_the_Empire_desc:0 "우리 군대는 주로 남아시아에서, 부차적으로는 아프리카에서 운용되었지만, 본토에서는 인도 군인들을 위한 더 많은 국제 작전을 제안하고 있습니다."
RAJ_Assist_in_the_Singapore_Strategy:0 "싱가포르 전략 지원"
RAJ_Assist_in_the_Singapore_Strategy_desc:0 "일본 제국은 오랫동안 아시아의 유럽 영토를 노려왔으며, 이에 대응하여 영국은 이미 아시아 방어를 싱가포르에 집중하는 계획을 수립했습니다."
RAJ_Indianise_the_Royal_Indian_Navy:0 "왕립 인도 해군 인도화"
RAJ_Indianise_the_Royal_Indian_Navy_desc:0 "왕립 인도 해군은 대부분 영국인으로 구성되어 있어 정식 왕립 해군의 보조 부대로 암암리에 불리고 있습니다. 더 많은 인도인을 고위직에 신임함으로써, 왕립 인도 해군(RIN)의 독자적인 목적을 만들어낼 수 있을 것입니다."
RAJ_Expand_the_Indian_Air_Force:0 "인도 공군 확장"
RAJ_Study_British_Armour:0 "영국 기갑 연구"
RAJ_Study_British_Armour_desc:0 "보병 기반인 우리 군대는 기갑 차량이 크게 부족합니다. 외부 위협으로부터 우리를 보호하기 위해 군대를 현대화하려면 해외 설계를 연구하는 것이 중요합니다."
RAJ_Expand_the_Indian_Air_Force_desc:0 "전쟁, 전쟁은 변했습니다. 우리 장군 다수는 아직도 대전쟁의 승리에 안주하고 있습니다. 하지만 현대전은 지상뿐만 아니라 하늘에서도 벌어집니다. 앞서 언급한 전장은 오랫동안 우리에게 등한시되어 왔습니다. 이제 이 슬픈 현실을 바꿀 때입니다."
RAJ_British_Arms_Shipments:0 "영국 무기 수송"
RAJ_British_Arms_Shipments_desc:0 "제국을 위해 기꺼이 목숨을 바칠 헌신적인 병사들은 많지만, 우리 힘만으로는 모두 무장시킬 수 없습니다. 본토로부터의 지원은 우리의 효율성을 크게 향상시킬 것입니다."
RAJ_British_Investments:0 "영국 투자"
RAJ_British_Investments_desc:0 "인도는 산업 강국으로 특별히 알려져 있지 않으며, 우리가 조만간 그 사실을 바꿀 수는 없을 것입니다. 하지만 영국 기업들의 투자는 그 과정에서 우리에게 도움이 될 수 있습니다."
RAJ_Our_First_Order_of_Business:0 "최우선 과제"
RAJ_Our_First_Order_of_Business_desc:0 "정부의 다른 모든 부처와 회동한 후, 이제 우리는 린리스고 총독 하의 첫 번째 법안을 제국 입법 평의회에 제출하여 표결에 부칠 기회를 갖게 되었습니다."
RAJ_New_Excavation_Companies:0 "신규 채굴 회사"
RAJ_New_Excavation_Companies_desc:0 "새로 확장된 기반 시설 덕분에, 신규 회사들이 이제 인도 영토로 진출하여 풍요로운 인도 땅의 결실을 거둘 수 있게 되었습니다."
RAJ_New_Industrial_Centers:0 "새로운 산업 중심지"
RAJ_New_Industrial_Centers_desc:0 "확장된 철도는 또한 우리에게 전국에 공장을 건설하고 새로운 인도 노동자 계급을 창출할 기회를 제공했습니다."
RAJ_Expand_Urban_Centers:0 "도시 중심지 확장"
RAJ_Expand_Urban_Centers_desc:0 "인도의 식량 안보가 이제 어느 정도 확립되었으므로, 우리는 이제 도시 중심지를 확장하고 한때 가난했던 농촌 대중에게 새로운 기회를 창출할 수 있습니다."

Railway_Expansion_Act_init:0 "철도 확장법 작업 착수"
Railway_Expansion_Act_passed:0 "철도 확장법 통과"
Railway_Expansion_Act_failed:0 "철도 확장법 통과 실패"
RAJ_Railway_Expansion_Act:0 "§W추가§! 철도 확장법"
RAJ_Railway_Expansion_Act_desc:0 "우리나라의 기반 시설은 국토 대부분 지역에서 부족합니다. 우리는 지금까지 수익성 있는 노선을 따라서만 철도를 건설하는 데 그쳤지만, 세계 경제에서 경쟁하려면 이제 바뀌어야 합니다."
Agricultural_Stabilisation_Act_init:0 "농업 안정화법 작업 착수"
Agricultural_Stabilisation_Act_passed:0 "농업 안정화법 통과"
Agricultural_Stabilisation_Act_failed:0 "농업 안정화법 통과 실패"
RAJ_Agricultural_Stabilisation_Act:0 "§W추가§! 농업 안정화법"
RAJ_Agricultural_Stabilisation_Act_desc:0 "인도는 예로부터 농업 사회였지만, 잦은 가뭄이 인도의 식량 공급을 망가뜨렸습니다. 외부의 도움이 종종 보류되는 상황에서, 우리 스스로 곡물 생산량을 확보하는 것만이 우리의 이익에 부합합니다."
Educational_Reform_Act_init:0 "교육 개혁법 작업 착수"
Educational_Reform_Act_passed:0 "교육 개혁법 통과"
Educational_Reform_Act_failed:0 "교육 개혁법 통과 실패"
RAJ_Educational_Reform_Act:0 "교육 개혁법"
RAJ_Educational_Reform_Act_desc:0 "가장 재능 있는 지식인들은 항상 국왕 폐하의 왕관 아래 최고의 교육을 받기 위해 본국으로 이주했습니다. 하지만 현지 대학을 확장한다면, 인도의 더 많은 인재를 붙잡을 수 있을 것입니다."
Insurance_Act_init:0 "보험법 제정 작업 시작"
Insurance_Act_passed:0 "보험법 통과"
Insurance_Act_failed:0 "보험법 통과 실패"
RAJ_Insurance_Act:0 "보험법"
RAJ_Insurance_Act_desc:0 "인도에서는 법적 체계나 유인책이 거의 없어 오랫동안 보험 사업이 등한시되었습니다. 유일하게 발을 들일 수 있었던 산업은 해운 산업이었으며, 이 법안으로 상황을 바꿀 수 있기를 바랍니다."
War_Powers_Act_init:0 "전시권한법 제정 작업 시작"
War_Powers_Act_passed:0 "전시권한법 통과"
War_Powers_Act_failed:0 "전시권한법 통과 실패"
RAJ_War_Powers_Act:0 "전시권한법"
RAJ_War_Powers_Act_desc:0 "인도인들은 참전 결정에 아무런 의견도 내지 못했을지 모르지만, 전 세계적으로 부상하는 파시즘의 사악한 손아귀를 물리치려는 우리의 가장 숭고한 목표를 분명히 지지할 것입니다."

RAJ_His_Majesties_University:0 "국왕 폐하의 대학교"
RAJ_His_Majesties_University_desc:0 "델리 대학교는 오래전에 설립되었지만, 여전히 런던에서 유학하는 인도 지식인들의 요구를 충족시키지 못하고 있습니다. 교육 인재 양성을 지원함으로써, 우리는 교육 수준을 크게 향상시킬 수 있을 것입니다."
RAJ_Department_of_War_Studies:0 "전쟁 연구부"
RAJ_Department_of_War_Studies_desc:0 "물론 많은 학문 분야가 있지만, 국경을 방어하는 데 도움을 주는 군사 분야만큼 중요한 것은 없습니다."
RAJ_Open_for_Business:0 "사업 개방"
RAJ_Open_for_Business_desc:0 "새로운 법적 체계와 보험 회사가 생기면서, 국제적인 사업가들은 인도를 탐험할 만한 수익성 있는 시장으로 여길 수 있습니다. 이는 어려움을 겪는 인도 경제에 도움이 될 뿐입니다."
RAJ_Healthcare_Investments:0 "의료 투자"
RAJ_Healthcare_Investments_desc:0 "우리의 의료 체계가 심각한 상태라는 사실은 부인할 수 없습니다. 대부분의 인도 원주민은 병원에 갈 여유가 없으며, 이는 사회와 경제 전체에 해를 끼칩니다. 인민의 정부는 이 비참한 상황이 계속되도록 내버려 둘 수 없습니다. 우리는 행동해야 합니다!"
RAJ_Civil_Aviation_Expansion:0 "철도 통합"
RAJ_Civil_Aviation_Expansion_desc:0 "우리의 철도는 때때로 분열되고 비효율적으로 건설되었습니다. 이제는 네트워크의 허점을 보완하고 화물 및 보급 체계를 개선해야 할 때입니다."
RAJ_Wheat_Exports:0 "밀 수출"
RAJ_Wheat_Exports_desc:0 "이제 인도의 식량 공급이 어느 정도 안정되었으니, 곡물을 좀 수출해도 나쁘지 않을 겁니다.\n그렇죠?"
RAJ_Primary_Education:0 "초등 교육"
RAJ_Primary_Education_desc:0 "다수의 시골 인도인들은 초등 및 중등 교육 시스템의 저개발 외에 다른 이유 없이 교육을 받지 못하고 있습니다. 새로 부여된 자금을 현명하게 투자한다면, 일반 노동력의 전문성을 향상시킬 수 있을 것입니다."
RAJ_Drought_Prevention_Measures:0 "가뭄 예방 조치"
RAJ_Drought_Prevention_Measures_desc:0 "몬순 계절의 인도는 세계에서 가장 경작 가능한 지역 중 하나입니다. 유일한 문제는 아대륙을 식량 불안으로 괴롭히는 계절 패턴의 불규칙성입니다. 관개 조치를 확장한다면, 연간 강우에 대한 의존도를 줄일 수 있을 것입니다."
RAJ_Bolster_our_Security_Forces:0 "보안군 강화"
RAJ_Bolster_our_Security_Forces_desc:0 "사업이 제대로 기능하려면, 새로운 기업가들을 기만적인 사기꾼과 도둑으로부터 보호해야 합니다. 보호 능력의 부재가 외국인 투자에 대한 가장 큰 장애물이었을지도 모릅니다. 적어도 지금까지는 말입니다."
RAJ_Gather_Industrial_Funds:0 "산업 자금 모집"
RAJ_Gather_Industrial_Funds_desc:0 "이번 선거에서 우리의 주요 경쟁자인 인도 국민회의는 일반 민중의 폭넓은 지지를 받고 있습니다. 우리는 인도의 지주와 자본가들에게 막대한 약속을 함으로써 이를 상쇄할 수 있을 것입니다. 그들의 금고는 바닥이 없으며, 인도의 정치적 미래는 가치 있는 투자입니다."
RAJ_Arms_Industry_Expansion:0 "군수 산업 확장"
RAJ_Arms_Industry_Expansion_desc:0 "인도군은 역사상 가장 큰 지원군이 되었지만, 새로 입대한 많은 병사들에게는 그들의 투쟁을 지원할 적절한 장비가 부족합니다. 과거에는 영국의 무기 수송에 의존했지만, 이제는 남아시아의 심장부에 방위 산업을 육성해야 할 때입니다."
RAJ_Implement_Conscription:0 "징병제 실시"
RAJ_Implement_Conscription_desc:0 "우리의 지원군은 큽니다. 특히 식민 정부 상황 하에서는 엄청나게 크다고 할 수 있습니다. 하지만 여전히 런던은 이 전쟁에서 승리하기 위해 더 많은 병력을 요구하고 있으며, 우리에게 무언가 있다면 그것은 바로 인력입니다. 이는 우리 국민에게 좋게 받아들여지지 않을 수 있지만, 그만한 가치가 있습니다."
RAJ_The_August_Offer:0 "8월 제안"
RAJ_The_August_Offer_desc:0 "아대륙 원주민들과의 관계는 기껏해야 험난했지만, 그들을 영원히 정부에서 배제할 수는 없습니다. 특히 수백만 명의 인도인들이 고통받는 이 전쟁 시기에는, 인도 제국이 폭력적인 반란으로 무너지지 않도록 해야 합니다. 몇 가지 양보를 제안하면 개혁에 대한 그들의 갈망을 만족시킬 수 있을 것입니다."
RAJ_Expand_Tata_Steel:0 "타타 제철 확장"
RAJ_Expand_Tata_Steel_desc:0 "널리 알려진 제철 회사 TISCO는 대영제국에서 가장 큰 철강 생산 업체 중 하나가 될 궤도에 올랐습니다. 이미 가장 큰 제철소를 운영하며 인도 전체에 기본적인 제련 자재를 공급하고 있습니다."
RAJ_Expand_the_Burma_Road:0 "버마 로드 확장"
RAJ_Expand_the_Burma_Road_desc:0 "중국은 일본 제국에 맞서는 싸움에서 자연스러운 동맹이며, 우리는 아시아를 징고이즘이라는 폭압적인 개념에서 해방시키기 위해 버마 로드를 통한 대중국 원조를 늘려야 합니다."
RAJ_Border_Fortifications:0 "국경 요새화"
RAJ_Border_Fortifications_desc:0 "아시아에는 팽창주의적인 제국이 많으므로, 동부 전선을 확보하는 것이 우리의 최우선 과제여야 합니다. 우리는 동부 버마의 산과 강을 따라 요새를 건설할 수 있습니다."

raj_diverse_investments_tt:0 "민간 기업의 §Y군수 공장§! 및 §Y알루미늄 공장§! 투자를 활성화합니다."
raj_invest_relations_10_tt:0 "§Y투자자 관계§!를 §G10§!만큼 증가시킵니다."
raj_invest_relations_15_tt:0 "§Y투자자 관계§!를 §G15§!만큼 증가시킵니다."

RAJ_Establish_the_Planning_Commission:0 "계획 위원회 설립"
RAJ_Establish_the_Planning_Commission_desc:0 "식민지 경제는 자신들의 이익을 위해 대중을 착취하는 방식으로 구축되었습니다. 이제 모든 인도 국민의 필요와 복지를 우선시하고 지속 가능하며 공평한 경제를 재건하기 위한 개혁을 시행할 때입니다. 이 노력의 첫걸음은 국가 계획 위원회를 설립하여 우리 경제를 올바르게 발전시키는 동시에 공정한 임금과 노동 조건을 보장하는 것입니다."
RAJ_Common_Economic_Policy:0 "공동 경제 정책"
RAJ_Common_Economic_Policy_desc:0 "제국 회의에서 설명된 바와 같이, 제국 내 경제 성장을 촉진하기 위해 제국 각 부분의 경제 정책은 일치되어야 합니다."
RAJ_Foster_Private_Investment:0 "민간 투자 육성"
RAJ_Foster_Private_Investment_desc:0 "인도 내 경제 성장과 발전을 촉진하기 위해서는 국내외 민간 투자를 장려하는 것이 중요합니다. 이는 세금 혜택, 사업 규제 완화, 유리한 투자 환경 조성 등 다양한 조치를 통해 달성할 수 있습니다. 민간 투자를 육성함으로써 경제를 활성화하고 다양한 부문에서 혁신을 이끌 수 있습니다."
RAJ_Reform_the_Colonial_Economy:0 "식민지 경제 개혁"
RAJ_Reform_the_Colonial_Economy_desc:0 "과거 [RAJ.GetNameDef]의 경제 계획은 자원 추출과 이익 극대화를 위해 인도 인구의 필요를 무시해 왔습니다. 이처럼 어려운 시기에 인도에 대한 통치를 유지하려면 이것은 바뀌어야 합니다."
RAJ_Initiate_Land_Reform:0 "토지 개혁 착수"
RAJ_Initiate_Land_Reform_desc:0 "현재 인도의 토지 소유권과 분배는 심각한 결함이 있으며 부유하고 영향력 있는 자들에게 불균형적으로 유리합니다. 토지 개혁 조치를 시작함으로써 우리는 보다 공평한 토지 분배를 위해 노력하고 소농과 소외된 공동체의 권리가 보호되도록 보장할 수 있습니다. 이는 이들 집단에 이익이 될 뿐만 아니라, 국가 전체의 경제 성장과 발전을 촉진하는 데도 도움이 될 것입니다."
RAJ_Centralise_the_Courts:0 "법원 중앙집권화"
RAJ_Centralise_the_Courts_desc:0 "인도의 법원 체계는 주로 식민지 이전 왕국들 때문이기도 하지만, 영국의 간섭으로 인해 불필요하게 복잡한 관할권의 망을 이루고 있습니다. 이로 인해 사업이 필요 이상으로 훨씬 어려워집니다."
RAJ_Open_our_Markets:0 "시장 개방"
RAJ_Open_our_Markets_desc:0 "아대륙의 폐쇄적인 성격 때문에 영국 이외의 다른 출처로부터의 인도에 대한 해외 투자는 드물었습니다. 따라서 새 행정부는 인도가 무역과 투자를 두 팔 벌려 환영한다는 것을 전 세계에 알려야 합니다."
RAJ_Rural_Education:0 "농촌 교육"
RAJ_Rural_Education_desc:0 "마을 학교의 확장은 농촌 인구가 더 나은 고용 기회를 찾고 그들 공동체의 발전에 기여하는 데 큰 도움이 될 것입니다. 나아가, 더 잘 교육받은 대중은 경제 성장을 증대시키고 농촌 지역의 관료제를 개선할 것입니다. 마지막으로, 교육 기회 확대는 빈곤과 불평등을 줄여 더 나은 인도를 건설하는 데 도움이 될 수 있습니다."
RAJ_Cross_Country_Railways:0 "국토 횡단 철도"
RAJ_Cross_Country_Railways_desc:0 "국토 횡단 철도망을 통해 인도의 광대하고 다양한 지역을 연결하면 우리 도시와 마을 간의 교통과 통신이 크게 개선될 것입니다. 이는 상품과 사람의 흐름을 더욱 효율적으로 만들어 경제 성장과 발전으로 이어질 것입니다. 또한, 이 철도의 건설과 유지보수는 일자리를 창출하고 경제를 활성화할 것입니다. 국토 횡단 철도에 투자하는 것은 우리 국가를 현대화하고 통합하기 위한 중요한 단계입니다."
RAJ_Electrify_the_Network:0 "철도망 전화(電化)"
RAJ_Electrify_the_Network_desc:0 "우리 교통 체계의 중추로서 철도 체계는 국가의 경제 발전에 매우 중요합니다. 철도망을 전화(電化)함으로써 우리는 열차의 효율성과 속도를 높이고, 해외 화석 연료에 대한 의존도를 줄이며, 이를 통해 국내 경제를 크게 강화할 수 있습니다."
RAJ_Cooperation_with_the_Princes:0 "토후들과의 협력"
RAJ_Cooperation_with_the_Princes_desc:0 "인도를 효과적으로 통치하기 위해서는 현지 토후들과 그들의 영토와 강력한 관계를 구축해야 합니다. 함께 협력함으로써 우리는 국가의 모든 지역에 안정과 번영을 보장할 수 있습니다. 여기에는 자원 공유, 정책 조율, 인도 국민에게 이익이 되는 프로젝트 협력이 포함될 수 있습니다."
RAJ_Expand_Tata_Steel:0 "타타 제철 확장"
RAJ_Expand_Tata_Steel_desc:0 "타타 제철은 지난 30년간 인도 산업화의 초석이었습니다. 세계 경제의 급격한 변화에 보조를 맞추기 위해 우리는 타타 제철의 확장과 현대화에 계속 투자해야 합니다. 이는 선도적인 철강 생산국으로서의 우리의 입지를 확보할 뿐만 아니라, 새로운 일자리를 창출하고 전국에 걸쳐 경제 성장을 이끌 것입니다."
RAJ_Rewrite_Business_Law:0 "민간 투자 다각화"
RAJ_Rewrite_Business_Law_desc:0 "우리가 새로운 독립의 시대로 전환함에 따라, 국가의 안정과 성장을 보장하기 위해 민간 투자를 다각화하는 것이 필수적입니다. 다양한 부문과 산업에 걸쳐 투자를 분산함으로써 우리는 특정 분야에서 발생할 수 있는 잠재적인 위험과 차질로부터 우리 자신을 보호할 수 있습니다. 이 전략은 우리가 자신 있게 전진하고 인도를 위한 강력하고 번영하는 미래를 건설할 수 있게 해줄 것입니다."
RAJ_Sideline_the_Unions:0 "노동조합 배제"
RAJ_Sideline_the_Unions_desc:0 "인도의 노동조합은 종종 진보에 대한 방해와 장애의 원천이었습니다. 그들의 영향력을 배제하고 노동자들의 우려를 해결할 대안적인 방법을 찾음으로써, 우리는 국가를 현대화하고 강화하는 중요한 과업에 집중할 수 있습니다. 이는 또한 노사 관계를 개선하여 더 효율적이고 생산적인 노동력으로 이어질 것입니다."
RAJ_Commercial_Port_Expansion:0 "상업항 확장"
RAJ_Commercial_Port_Expansion_desc:0 "[RAJ.GetNameDef]의 경제가 계속 확장하고 산업화됨에 따라, 우리의 상업항 또한 확장하고 개선하는 것이 필수적입니다. 이 항구들의 수용력과 효율성을 증대시킴으로써 우리는 다른 국가와의 무역을 더 잘 촉진하고 우리 산업의 증가하는 수요를 지원할 수 있습니다. 이 확장은 우리 경제에 이익이 될 뿐만 아니라, 인도 국민을 위한 새로운 고용 기회도 창출할 것입니다."
RAJ_Irrigation_Infrastructure:0 "관개 기반 시설"
RAJ_Irrigation_Infrastructure_desc:0 "인도가 계속 성장하고 발전함에 따라, 현대적인 관개 기반 시설에 투자하는 것이 필수적입니다. 운하와 저수지를 건설함으로써 우리는 가뭄 시기에도 작물이 신뢰할 수 있는 수자원을 확보하도록 보장할 수 있습니다. 이는 농부들과 그들의 생계에 이익이 될 뿐만 아니라, 우리 국가의 전반적인 경제에도 긍정적인 영향을 미칠 것입니다."
RAJ_Foundations_for_the_First_Five_Year_Plan:0 "제1차 5개년 계획의 기반"
RAJ_Foundations_for_the_First_Five_Year_Plan_desc:0 "새로 설립된 계획 위원회는 경제 성장을 위한 계획을 수립했으며, 이는 장기적으로 인도 경제를 크게 활성화할 것입니다. 이를 실행하지 못할 경우 약간의 경기 침체를 초래할 수 있습니다."
RAJ_Seek_Trading_Partners:0 "토지 불하 발행"
RAJ_Seek_Trading_Partners_desc:0 "우리는 이 아대륙에서 전례 없는 규모로 개발 허가, 토지 취득, 토지 불하를 발행할 것입니다. 이는 인도 경제의 발전을 크게 이끌 것입니다."
RAJ_Invite_Mining_Companies:0 "광산 회사 초청"
RAJ_Invite_Mining_Companies_desc:0 "인도의 천연자원은 광대하고 미개발 상태입니다. 광산 회사들을 초청하여 우리 땅을 개발하게 함으로써, 우리는 국민을 위한 일자리를 창출할 뿐만 아니라 국가 발전에 절실히 필요한 자본을 유치할 수 있습니다. 이 회사들은 기술과 전문 지식을 가져와 우리의 자원을 최대한으로 추출하고 활용하는 데 도움을 줄 것입니다."
RAJ_Development_funds_for_the_States:0 "토후국들을 위한 개발 기금"
RAJ_Development_funds_for_the_States_desc:0 "대부분 작고 미개발된 토후국들의 기반 시설 및 산업 건설을 돕는 것은 인도의 산업 기반을 크게 강화할 것입니다."
RAJ_Bastions_of_Stablity:0 "안정의 보루"
RAJ_Bastions_of_Stablity_desc:0 "정치적 격변과 불확실성의 시기에, 우리는 토후국들이 제공하는 안정과 질서에 의존하는 것이 중요합니다. 이 국가들은 오랜 통치의 역사를 가지고 있으며 국경 내외에서 평화와 번영을 유지하는 데 신뢰할 수 있는 파트너임이 입증되었습니다."
RAJ_Industrial_Expertise:0 "산업 전문성"
RAJ_Industrial_Expertise_desc:0 "교육, 해외 원조, 국내 개발의 조합을 통해 인도의 산업 노동력은 이 지역에서는 볼 수 없었던 수준의 전문성을 갖추게 되었습니다."
RAJ_Mechanized_Agriculture:0 "농업 기계화"
RAJ_Mechanized_Agriculture_desc:0 "우리는 농업 생산량을 크게 늘리기 위해 가장 큰 농장들에 기계 쟁기와 기타 농기구를 도입할 것입니다."
RAJ_Minimum_Wage_Legislation:0 "최저 임금 법제화"
RAJ_Minimum_Wage_Legislation_desc:0 "인도가 새로운 시대로 접어들고 산업 발전이 전국을 휩쓸면서, 우리 노동 계급의 권리와 임금을 보호하는 것이 중요합니다. 최저 임금 법제화의 도입은 모든 근로자가 자신의 노동에 대해 공정한 보상을 받도록 보장하고, 우리 사회의 빈곤과 불평등을 완화하는 데 도움이 될 것입니다."
RAJ_Protectionist_Tariffs:0 "보호주의 관세"
RAJ_Protectionist_Tariffs_desc:0 "더 높은 관세를 도입하는 것은 인도 기업들에게 명백한 순이익이 될 것입니다. 이는 그들이 국제 기업들과 더 공평한 경쟁의 장에서 경쟁할 수 있게 하고 외부 경제 압력으로부터 더 많은 보호를 제공할 것이기 때문입니다. 또한 인도 기업에 절실히 필요한 지원을 제공하고 일자리를 창출하며 경제 성장을 촉진하는 데 도움이 될 수 있습니다."
RAJ_Integrate_Princely_Economies:0 "토후국 경제 통합"
RAJ_Integrate_Princely_Economies_desc:0 "과거 영국령 인도는 여러 번왕국이 독자적인 경제를 유지하도록 허용하여, 다양한 체제와 관행이 뒤섞인 상태였습니다. 이제 이 경제들을 하나로 모아 통일된 전체로 통합할 때입니다. 이를 통해 더 효율적인 무역과 경제 성장을 이루고, 국가 내 통합 의식을 고취할 수 있을 것입니다."
RAJ_Solidify_Control_over_the_Banks:0 "은행 통제권 강화"
RAJ_Solidify_Control_over_the_Banks_desc:0 "인도의 은행은 오랫동안 국민의 문제에 무지한 외세의 통제를 받아왔지만, 이제 우리가 통제권을 장악하여 국가의 발전과 성장을 지원하는 데 사용할 때입니다. 은행이 소수의 이익에만 봉사하는 것이 아니라, 국민의 최선의 이익을 위해 운영되도록 보장해야 합니다."
RAJ_Broad_Union_Support:0 "대규모 국유화"
RAJ_Broad_Union_Support_desc:0 "신생 독립국으로서 우리 자원과 산업의 통제권을 장악하는 것은 중요합니다. 에너지, 교통, 제조업과 같은 핵심 부문의 대규모 국유화는 우리가 미래를 더 잘 만들어나가고, 이 산업들에서 창출된 이익이 우리 나라에 재투자되도록 보장할 것입니다."
RAJ_Ease_Agricultural_Regulations:0 "농업 규제 완화"
RAJ_Ease_Agricultural_Regulations_desc:0 "농업 규제는 오랫동안 농민에게 부담이 되어 왔으며, 생산품을 생산하고 판매하는 능력을 저해했습니다. 이 규제들을 완화함으로써 농민들이 운영에 더 많은 자유를 누리고 번창할 수 있도록 하여, 인도의 농업을 더욱 강화할 수 있습니다."
RAJ_Rural_Development:0 "농촌 개발"
RAJ_Rural_Development_desc:0 "인도 농촌 지역에 절실히 필요한 변화를 가져오기 위해, 우리는 기반 시설 개선, 교육 및 의료 접근성 향상, 경제 발전 촉진에 집중해야 합니다. 이 분야에 투자함으로써 지역 사회를 빈곤에서 구제하고 우리 경제를 크게 강화할 수 있습니다."
RAJ_Excavation_Investments:0 "발굴 투자"
RAJ_Excavation_Investments_desc:0 "인도 전역의 발굴 사업에 투자함으로써, 국가에 경제 성장과 발전을 위한 새로운 기회를 가져올 수 있습니다. 이러한 투자는 귀중한 자원을 발견하고 광업 및 발굴 부문에서 새로운 일자리를 창출하는 데 도움이 될 것입니다."
RAJ_Large_Scale_Privitizations:0 "대규모 민영화"
RAJ_Large_Scale_Privitizations_desc:0 "경제 성장을 촉진하고 효율성을 높이기 위해, 우리는 국영 산업의 대규모 민영화를 시행할 계획입니다. 이를 통해 민간 부문의 투자와 경영을 유치하여, 이 산업들에 새로운 아이디어와 혁신을 가져올 것입니다. 이 정책의 성공은 일자리 창출과 세계 시장에서의 경쟁력 강화로 이어져 인도 국민에게 큰 혜택을 줄 것입니다."
RAJ_Electrification_of_India:0 "인도의 전화(電化)"
RAJ_Electrification_of_India_desc:0 "전국 시민의 삶의 질을 현대화하고 향상시키기 위한 노력의 일환으로, 우리는 산업 중심지에 막대한 양의 전력을 공급할 계획을 시행하고 있습니다. 여기에는 새로운 발전소 건설, 송전선 확장, 산업 부문에 안정적인 전력 접근 제공이 포함됩니다."
RAJ_Manufacturing_Plants:0 "제조 공장"
RAJ_Manufacturing_Plants_desc:0 "경제 성장을 견인하고 일자리를 창출하기 위해, 우리는 인도 전역에 제조 공장을 설립하고 확장하는 데 집중해야 합니다. 이 시설들은 소비재에서 산업 장비에 이르기까지 다양한 제품을 생산하여 우리 경제를 다각화하고 전국 국민에게 기회를 제공하는 데 도움이 될 것입니다."
RAJ_Arms_Foundries:0 "무기 주조소"
RAJ_Arms_Foundries_desc:0 "성장하는 우리 군의 무기와 병기에 대한 증가하는 수요를 충족시키기 위해, 우리는 전국에 무기 주조소를 설립해야 합니다. 이 주조소들은 우리 병사들에게 절실히 필요한 장비를 제공할 뿐만 아니라, 철강, 석탄, 유황 산업에 대한 수요도 촉진할 것입니다."
RAJ_Import_Industrial_Machinery:0 "산업 기계 수입"
RAJ_Import_Industrial_Machinery_desc:0 "우리의 급진적인 경제 목표를 달성하기 위해, 인도는 세계의 산업 강대국으로부터 최신의 가장 효율적인 산업 기계를 수입해야 합니다. 외국 장비를 도입함으로써 우리는 다양한 산업에서 생산성과 경쟁력을 높이고, 궁극적으로 국가의 경제 성장과 번영을 이끌 수 있습니다."
RAJ_Solidify_Business_Ties:0 "사업 관계 공고화"
RAJ_Solidify_Business_Ties_desc:0 "저개발 경제에 투자하는 현실이 닥치면서 투자자들의 낙관론이 사라지기 시작했습니다. 하지만 그들의 우려를 듣기 위한 일련의 회의를 통해 그들을 잠재울 수 있을 것입니다."
RAJ_International_Division_of_Labour:0 "국제 분업"
RAJ_International_Division_of_Labour_desc:0 "국제 분업이란 각국이 고유한 장점과 자원을 바탕으로 특정 상품이나 서비스 생산에 특화하는 방식을 의미합니다. 이를 통해 각국은 자신의 전문 분야에 집중하고 필요한 상품과 서비스는 다른 나라와 교역함으로써, 더 효율적이고 비용 효과적인 생산이 가능해집니다. 국제 분업을 수용함으로써 인도는 자국의 강점과 자원을 활용하여 경제 성장과 번영을 촉진할 수 있습니다."
RAJ_Soviet_Economic_Assistance:0 "소련의 경제 지원"
RAJ_Soviet_Economic_Assistance_desc:0 "경제를 활성화하고 인도에 번영을 가져오기 위한 노력의 일환으로, 우리는 소련에 경제 원조 및 개발 사업 형태의 지원을 요청할 것입니다. 이는 절실히 필요한 자원과 지원을 제공할 뿐만 아니라, 소련과의 정치적, 경제적 유대를 강화할 것입니다."
RAJ_Further_British_Investments:0 "영국의 추가 투자"
RAJ_Further_British_Investments_desc:0 "[RAJ.GetNameDef](이)가 계속해서 발전하고 현대화됨에 따라, 우리의 식민 종주국인 영국과 강력한 관계를 유지하는 것이 중요합니다. 본국으로부터의 투자는 우리의 경제적 유대를 강화할 뿐만 아니라, 우리 산업에 새로운 기술과 전문 지식을 가져올 것입니다. 이는 우리가 제국의 더 밝은 미래를 함께 만들어 감에 따라 인도 아대륙과 브리튼 제도 모두에게 이익이 될 것입니다."
RAJ_Machinery_for_Textiles:0 "섬유 산업용 기계"
RAJ_Machinery_for_Textiles_desc:0 "인도의 섬유 산업은 항상 거대했지만, 직조기 및 유사 기계의 도입으로 생산성이 폭발적으로 증가하여 공급을 충족시킬 시장이 필요합니다. 우리는 세계의 사회주의 경제권에서 그 시장을 찾을 것이며, 그들 중 다수는 발전된 산업 중심지를 가지고 있어, 우리 산업 발전에 필요한 동력을 제공할 기계를 수입할 것입니다."
RAJ_Raw_Material_Imports:0 "원자재 수입"
RAJ_Raw_Material_Imports_desc:0 "인도는 자원이 풍부한 광대한 아대륙이지만, 대부분은 추출하기 어렵고 다양성도 부족합니다. 우리는 우리 생산 사슬에 없는 이러한 원자재를 수입하기 위해 형제 국가들을 바라보고 있습니다."
RAJ_Exchange_of_Luxury_Goods:0 "사치품 교환"
RAJ_Exchange_of_Luxury_Goods_desc:0 "인도는 설탕과 커피 비축량이 넘쳐나는 반면, 동유럽 경제권은 가축과 리넨이 과잉 공급되고 있습니다. 비필수재 무역을 촉진하면 양국의 생활 수준을 크게 향상시킬 것입니다."
RAJ_Resources_for_the_Home_Isles:0 "본국을 위한 자원"
RAJ_Resources_for_the_Home_Isles_desc:0 "영국의 안보에 대한 위협이 고조되고 있으며, 영국 제조업에 필요한 자원을 제공하는 것은 제국의 임무입니다."
RAJ_Agricultural_Subsidies:0 "농업 보조금"
RAJ_Agricultural_Subsidies_desc:0 "인도의 농업 부문은 수백만 시민에게 고용과 생계를 제공하는 우리 경제의 중추입니다. 하지만 날씨와 시장 변동에 큰 영향을 받는 산업이기도 합니다. 농업 보조금을 시행함으로써 우리는 농민들에게 절실히 필요한 지원을 제공하고 이 필수적인 부문의 지속적인 성장과 성공을 보장할 수 있습니다."
RAJ_Continued_Expansion_of_the_Ordnance_Foundries:0 "병기창의 지속적인 확장"
RAJ_Continued_Expansion_of_the_Ordnance_Foundries_desc:0 "인도의 병기창은 우리 군을 위한 무기와 탄약 생산에 매우 중요합니다. 이 병기창을 계속 확장하고 현대화함으로써, 우리 병사들이 국가를 방어하기 위한 최상의 장비를 갖추도록 보장할 수 있습니다."
RAJ_Contributions_to_the_War_Effort:0 "전쟁 노력에 대한 기여"
RAJ_Contributions_to_the_War_Effort_desc:0 "과거 대전쟁 당시 번왕국의 지원은 독일 제국을 격파하는 전쟁 노력에 큰 도움이 되었으며, 또 다른 대전쟁이 임박한 지금 우리는 다시 한번 그들의 지원을 기대할 수 있을 것입니다."
RAJ_Connect_the_Remote_Provinces:0 "외곽 주 개발"
RAJ_Connect_the_Remote_Provinces_desc:0 "인도의 농촌 및 고립된 인구는 종종 아대륙의 인구 중심지를 위해 등한시되어 왔습니다. 농업이 소량의 잉여 생산물만 생산하는 영국령 인도의 소외된 지역을 개발하면 국가 식량 공급에 도움이 될 것입니다."
RAJ_Expand_the_Diplomatic_Corps:0 "외교단 확장"
RAJ_Expand_the_Diplomatic_Corps_desc:0 "인도는 야심찬 외교 정책 의제를 가지고 있으며, 외교단 확장은 그 목표를 달성하는 데 도움이 될 것으로 기대됩니다. 새로운 외교적 주둔은 인도가 중요한 파트너와 더 잘 교류하고 국제 문제에서 더 큰 주도권을 쥐게 할 것이며, 인도의 안전을 보장하는 안보 조약을 찾는 우리의 노력에 큰 도움이 될 것입니다."
