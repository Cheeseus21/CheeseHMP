 ilp_concessions:0 "사회주의적 양보"
 ilp_concessions_desc:0 "인도의 좌파는 분열되어 각기 다른 목표를 추구하고 있습니다. \n카스트 제도에 대한 우리의 집중은 상충하는 요구를 가질 수 있는 다른 여러 집단과 협력하고 타협할 충분한 기회를 제공합니다. 하지만 공동의 이익 균형을 맞춘다면 우리의 선거 전략에 큰 도움이 될 것입니다."
 invade_pak_or_placate_muslims:0 "§Y파키스탄§!이 독립 국가일 경우, 해당 국가에 대한 §Y전쟁 목표§!를 획득합니다. 그렇지 않다면, 핵심 주의 §Y무슬림§!들을 회유합니다."
 viceroy_anger_very_high:0 "이는 총독의 분노를 §R매우 크게§! 증가시킬 것입니다."
 viceroy_anger_high:0 "이는 총독의 분노를 §R상당히§! 증가시킬 것입니다."
 viceroy_anger_medium:0 "이는 총독의 분노를 §Y다소§! 증가시킬 것입니다."
 viceroy_anger_low:0 "이는 총독의 분노를 §Y미미하게§! 증가시킬 것입니다."
 viceroy_anger_init:0 "총독은 우리의 정책을 면밀히 주시하고 있습니다."
 operation_polo:0 "폴로 작전"
 
