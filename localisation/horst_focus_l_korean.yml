 GER_lowe:0 "크루프와 계약"
 GER_lowe_designer:0 "뢰베 계획"
 GER_lowe_desc:0 "크루프와 계약하여 그들의 초중전차 설계안인 7호 전차 뢰베를 생산할 것입니다."
 GER_project_riese:0 "리제 계획"
 GER_project_riese_desc:0 "영국 폭격기들을 피해 지하에 안전하게 새로운 정유소와 군수공장을 건설해야 합니다."
 GER_strafbat:0 "형벌 부대 창설"
 GER_strafbat_desc:0 "전쟁으로 인한 막대한 인력 수요가 귀중한 군수품 생산을 위협하고 있습니다. 죄수, 전쟁 포로, 불복종 병사들로 슈트라프바탈리온을 편성하여 이를 지연시킬 수 있습니다. 이 부대들은 위험한 육체 노동을 위한 최전선 건설 대대로도 활용될 수 있습니다."
 GER_strafbat_idea:0 "슈트라프바탈리온"
 ITA_balkan_war_goal:0 "발칸반도 지배"
 ITA_balkan_war_goal_desc:0 "발칸반도를 포함하지 않고서야 무슨 로마 제국을 복원하겠습니까? 쉬운 목표가 될 것입니다..."
 ITA_defense_italia:0 "요새 이탈리아"
 GER_volunteers:0 "외국인 의용병 및 징집병"
 GER_volunteers_desc:0 "하인리히 힘러가 정복지 출신의 외국인 의용병과 징집병으로 비독일인 준군사 부대를 창설할 것을 제안했습니다. 이 이론상의 사단들은 그의 지휘 하에, 육군(Heer)의 통제를 벗어나게 될 것이며, 이는 거의 확실하게 독일 장성들의 심기를 건드릴 것입니다. 그럼에도 불구하고, 독일은 더 많은 병력이 현장에 필요합니다."
 GER_volunteers_idea:0 "외국인 의용병 및 징집병"
 GER_totaler_krieg_idea2_desc:0 "§R독일 병사들은 승리를 위해 집결했지만, 전쟁이 너무 길어지고 국가의 안정도나 전쟁 지지도가 너무 낮아지면(<50%) 주도권을 잃게 될 것입니다!§!"
