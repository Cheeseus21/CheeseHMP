  SAFR_liberian_rubber:0 "라이베리아 고무 농장 확장"
  SAF_liberian_rubber_deposits:0 "고무 농장 확장"
  SAFR_fahud_oil:0 "파후드 유전 개발"
  SAF_fahud_oil_deposits:0 "파후드 유전 시추"
  
  ### Tooltips
  SAF_party_split_elections_tt:0 "§R일주일 내로 조기 총선이 실시될 것입니다.§!\n"
  SAFR_elections_held:0 "선거가 실시되었습니다.\n"
  #SAFR_favoured_havenga:0 "Favoured Havenga's Germany trade deal.\n"
  #SAFR_favoured_pirow:0 "Favoured Pirow's Germany military deal.\n"
  fra_needs_approval:0 "§R마다가스카르를 넘겨주기 전에 프랑스의 동의를 얻어야 합니다. 프랑스가 북아프리카 영토를 통제하고 있다면 동의할 가능성이 훨씬 높아집니다.§!\n"
  SAF_african_commanders_tt:0 "새로운 지휘관 두 명을 얻습니다.\n"
  SAFR_civil_war_tt:0 "§R케이프타운과 남서아프리카의 §Y연방군§!과 국가의 나머지 지역에 있는 §Y공산주의 혁명가§! 사이에 §R내전이 발발합니다§!.\n"
  procure_expertise_tt:0 "§R설계 및 건설 전문 지식을 얻기 위해 한 국가에만 접근할 수 있으므로 신중하게 선택해야 합니다.§!\n"
  SAFR_create_unit_boer_commandos_tt:0 "트란스발에서 정예 §Y보어 코만도§! 부대 두 개를 얻습니다.\n"
  SAFR_create_unit_greyshirts_tt:0 "케이프에서 §Y회색셔츠단 민병대§! 부대 하나를 얻습니다.\n"
  SAFR_create_unit_stormjaers_tt:0 "오세바브란트바흐와 회색셔츠단의 지원을 모두 얻었으므로, 남서아프리카에서 §Y스톰야에르스와 회색셔츠단 민병대§! 부대를 소집할 수 있습니다.\n"
  SAFR_making_new_friends:0 "§R이를 통해 이들에게 영향력을 행사하여 우리와 동맹을 맺도록 유도할 수 있습니다.§!\n"
  
  ### Focuses
  SAF_force_parliament_debate:0 "의회 토론 강행"
  SAF_force_parliament_debate_desc:0 "또 다른 대전쟁의 길로 접어들 것이 거의 확실해진 지금, 더 이상 방관만 할 수는 없습니다. 우리는 지금 영국에 헌신하기로 결정하고 준비를 시작해야 합니다. 스뮈츠는 당 다수의 지지를 받고 있으며, 이 문제에 대한 표결을 강행할 수 있습니다."
  SAF_begin_rearmament:0 "재무장 시작"
  SAF_begin_rearmament_desc:0 "이제 참전을 결정했으니, 군대를 완벽하게 무장시키려면 군수 생산 능력을 확장하는 정책을 제정해야 합니다."
  SAF_relax_worker_restrictions:0 "노동자 제한 완화"
  SAF_relax_worker_restrictions_desc:0 "일할 의지가 있는 건강한 남성들이 많으며, 그들이 일할 의향이 있다면 피부색에 관계없이 일할 수 있도록 허용해야 합니다."
  SAF_split_in_the_party:0 "당의 분열"
  SAF_split_in_the_party_desc:0 "헤르초흐의 국민당과 스뮈츠의 남아프리카당이 합병하여 결성된 연합당은 잠재적인 전쟁에서 영국을 지지할 것인가에 대한 문제로 확고하게 분열되어 있습니다. 또한 인종 차별 문제도 있는데, 헤르초흐는 이를 강력히 지지하고 스뮈츠는 더 온건한 접근 방식을 취하고 있습니다. 아마도 이제 연정을 끝낼 때가 된 것 같습니다."
  SAF_focus_europe:0 "인도로 공병 파견"
  SAF_focus_europe_desc:0 "유럽에서의 전쟁에서 승리하는 것이 이 전쟁을 끝내는 열쇠이므로, 다가올 치열한 전투에 대비하여 군대를 준비시키는 데 노력을 집중해야 합니다."
  SAF_focus_asia:0 "오지로 공병 파견"
  SAF_focus_asia_desc:0 "아시아의 상황이 절망적으로 변하고 있으며, 연합군은 너무 넓게 분산되어 있습니다. 따라서 우리는 그곳의 어려운 환경에 대비하여 군대를 준비시켜야 합니다."
  SAF_an_iron_grip:0 "철권 통치"
  SAF_an_iron_grip_desc:0 "정부는 안정되었으며, 이제 국가의 미래는 우리가 원하는 대로 만들어갈 수 있게 되었습니다."
  SAF_strategic_reach:0 "전략적 도달 범위"
  SAF_strategic_reach_desc:0 "남아프리카는 세계의 여러 지역과 멀리 떨어져 고립되어 있습니다. 우리가 잠재력을 최대한 발휘하고 동맹국을 지원하려면 필요에 따라 지구상의 어느 곳이든 도달할 수 있어야 합니다."
  SAF_support_appeasement:0 "유화 정책 지속 지지"
  SAF_support_appeasement_desc:0 "독일은 정당한 불만을 가지고 있으며, 자치령들은 지난 전쟁에서 큰 고통을 겪었습니다. 우리는 우리 시대의 평화를 위한 모든 기회를 활용해야 합니다."
  SAF_civil_investment:0 "민간 산업 투자"
  SAF_civil_investment_desc:0 "독일이 유화 정책에 만족하는 동안 우리는 내부 문제에 집중할 수 있습니다. 우선 산업에 투자하여 경제를 활성화하는 것부터 시작할 수 있습니다."
  SAF_propose_joint_exercises:0 "지역군 재편성"
  SAF_propose_joint_exercises_desc:0 "우리 군은 전쟁 준비가 되어 있지 않습니다. 대공황으로 인한 최근의 지출 삭감은 우리의 전투 능력을 마비시켰습니다. 우리는 다음 대전쟁에 대비하여 병력을 확장하고 훈련시키는 계획을 시작해야 합니다."
  SAF_yield_to_smuts:0 "스뮈츠에게 양보"
  SAF_yield_to_smuts_desc:0 "전쟁이 임박한 가운데, 영국 편에 서서 전쟁에 참여할 것인지에 대한 의회 토론에서 얀 스뮈츠가 승리했습니다. 선택의 여지가 없어진 헤르초흐는 자신의 당 추종자들을 이끌고 말란의 정화국민당(PNP)과 합당을 모색하고 있습니다."
  #SAF_rearmament:0 "New Munitions Factories"
  #SAF_rearmament_desc:0 "A plan has been put into place to begin rapid construction of new munitions factories."
  SAF_support_the_afrikaner_broederbond_np:0 "아프리카너 브루더본트 지원"
  SAF_support_the_afrikaner_broederbond_np_desc:0 "아프리카너 브루더본트는 아프리카너 민족의 더 큰 목소리와 더 강력한 인종 분리를 선동해 왔습니다. 보어 전쟁 당시 영국의 정책에 대한 기억은 여전히 생생하며, 브루더본트는 새로운 남아프리카를 만드는 데 도움을 줄 수 있습니다."
  SAF_republic_agenda:0 "공화국을 향하여"
  SAF_republic_agenda_desc:0 "영국으로부터 독립을 쟁취하는 것이 우리의 최우선 과제여야 합니다. 우리는 이 필연적인 결과를 실현하기 위해 필요한 모든 정책을 제정하고 모든 법을 통과시킬 것입니다. "
  SAF_malans_plan:0 "말란의 비전"
  SAF_malans_plan_desc:0 "말란의 첫 번째 목표는 독립과 새로운 남아프리카 공화국 수립이 될 것입니다. 그 외에도 단순히 이 지역에 대한 우리의 영향력을 확대하거나, 아니면 더 대담한 무언가가 될 수도 있습니다."
  SAF_pirow_havenga_mission:0 "베를린 임무"
  SAF_pirow_havenga_mission_desc:0 "하벤가와 피로우를 독일에 외교 사절단으로 파견하여 우리의 존재감을 알리고, 독일 측에 우리가 새로운 가능성에 열려 있음을 알릴 수 있습니다."
  SAF_ref_republic:0 "공화국 국민투표"
  SAF_ref_republic_desc:0 "남아프리카가 대영제국과 그 꼭두각시들로부터 벗어나 자신만의 길을 개척할 때가 왔습니다. 우리는 공화국이 되어 영연방을 탈퇴할 것인지에 대한 국민투표를 실시할 것입니다."
  SAF_rearm_udf:0 "연방방위군 재무장"
  SAF_rearm_udf_desc:0 "연방방위군은 끔찍한 상태에 있습니다. 국가를 위한 효과적인 전투 부대가 되기 위해서는 새로운 장비와 훈련이 필요할 것입니다."
  SAF_focus_saaf:0 "공군 우선"
  SAF_focus_saaf_desc:0 "적이 하늘에서 마음대로 폭격할 수 있다면 지상군은 무슨 소용이 있겠습니까? 우리의 하늘을 지키는 것이 새로운 소총 몇 자루보다 훨씬 더 중요합니다."
  SAF_focus_army:0 "육군 우선"
  SAF_focus_army_desc:0 "땅을 확보할 병력이 없다면 비행기 몇 대가 무슨 소용이 있겠습니까? 우리 보병을 위한 최고의 무기와 장비가 최우선입니다."
  SAF_prepare_for_third_boer_war:0 "제3차 보어 전쟁 준비"
  SAF_prepare_for_third_boer_war_desc:0 "이번에는 준비될 것입니다."
  SAF_pirows_new_order:0 "피로우의 신질서"
  SAF_pirows_new_order_desc:0 "피로우는 독일의 나치당을 모델로 한 급진적인 일당 독재 국가를 선호합니다. 그가 목표를 달성하면 무엇을 할지는 아무도 모릅니다."
  SAF_promte_urbanisation:0 "도시화 촉진"
  SAF_promte_urbanisation_desc:0 "노동자들을 도시로 유치함으로써 기존 산업 지역을 확장하는 데 그들을 활용하고, 국민에게 더 많은 일자리를 제공할 수 있습니다."
  SAF_recruitment_drive:0 "농촌 징집 운동"
  SAF_recruitment_drive_desc:0 "농촌 지역에는 복무할 기회를 잡으려는 실업자들이 많이 있습니다. 그들에게 더 잘 다가가기 위해 이 지역에 지역 징병소를 설치할 것입니다."
  SAF_hofmeyrs_reforms:0 "호프메이어의 개혁"
  SAF_hofmeyrs_reforms_desc:0 "호프메이어는 정부 내에서 인종에 관계없이 남아프리카 모든 사람의 권리를 옹호하는 외로운 목소리였습니다. 이제 그에게 개혁을 단행할 권한을 부여하고 우리를 새로운 남아프리카로 이끌도록 해야 합니다."
  SAF_repeal_job_reservation_act:0 "직업 유보법 폐지"
  SAF_repeal_job_reservation_act_desc:0 "직업 유보법은 이 인종 불평등 체제가 세워진 기둥 중 하나였습니다. 이제 그것을 없애고 과거의 유물로 만들어야 할 때입니다."
  SAF_wartime_worker_laws:0 "전시 노동법"
  SAF_wartime_worker_laws_desc:0 "전시에는 어떤 종류의 직업 우대 기회보다 우리 군대의 보급을 우선시해야 합니다."
  SAF_equal_worker_pay:0 "노동자 임금 균등화"
  SAF_equal_worker_pay_desc:0 "사람들이 같은 일을 하기를 기대한다면, 그들은 동료와 같은 임금을 받을 것을 기대해야 합니다."
  SAF_economic_boom:0 "급성장하는 경제"
  SAF_economic_boom_desc:0 "우리의 개혁은 생산성을 대폭 향상시켰으며, 새로운 노동력을 활용하여 산업 확장을 시작할 수 있게 할 것입니다."
  #SAF_oppenheimers_deal:0 "Oppenheimer's Plan"
  #SAF_oppenheimers_deal_desc:0 "."
  SAF_expand_gold_mining_operations:0 "금 및 다이아몬드 채굴 사업 확장"
  SAF_expand_gold_mining_operations_desc:0 "오펜하이머는 새로운 갱도를 열고 기존 갱도를 더 깊이 파서 채굴 사업을 늘리고 싶어 합니다. 우리는 그의 노력에 자금을 지원할 수 있습니다."
  SAF_vanderbijlpark_expansion_project:0 "판데르베일파르크 개발 계획"
  SAF_vanderbijlpark_expansion_project_desc:0 "판데르베일파르크는 북부의 산업 중심지이며, 이 지역을 개발하고 잠재력을 높일 공간이 아직 더 있습니다."
  SAF_open_engineering_schools:0 "공과대학 설립"
  SAF_open_engineering_schools_desc:0 "오펜하이머는 대학에 새로운 공과대학과 학과를 개설할 계획을 가지고 있습니다. 이는 분명 미래 세대에게 이익이 될 것이며 국가 내 더 많은 공학 혁신을 장려할 것입니다."
  SAF_battlefield_medical_advancements:0 "전장 의학 발전"
  SAF_battlefield_medical_advancements_desc:0 "독일군 군의관들은 전장 의학에서 수많은 개선과 발전을 이루었습니다. 동원할 수 있는 병력이 제한적이므로, 우리 군대가 가능한 최고의 의료 지원을 받도록 보장하여 그들을 다시 전투에 복귀시켜야 합니다."
  SAF_remove_segregation_shared:0 "복무 제한 해제"
  SAF_remove_segregation_shared_desc:0 "한 사람이 자신의 나라를 위해 싸울 의지와 능력이 있다면, 일부의 생각과는 달리 피부색에 관계없이 그렇게 할 수 있도록 허용되어야 합니다. 이는 또한 농촌 지역의 실업자들이 군에 입대하도록 장려할 것입니다."
  SAF_offer_protection_of_madagascar:0 "마다가스카르 보호 제안"
  SAF_offer_protection_of_madagascar_desc:0 "이제 우리가 마다가스카르의 통제권을 성공적으로 되찾았으니, 우리가 더 잘 보호할 수 있는 위치에 있으므로 연방으로 이양해달라고 청원할 수 있습니다."
  SAF_native_representation_act:0 "원주민 대표법"
  SAF_native_representation_act_desc:0 "케이프 공동 명부에서 아프리카인 유권자를 제거함으로써, 우리는 앞으로 정부 내에서 우리의 입지를 강화할 수 있습니다."
  SAF_directorate_war_supplies:0 "전시 보급국"
  SAF_directorate_war_supplies_desc:0 "우리 군대뿐만 아니라 영연방군 또한 전투 장비가 필요합니다. 우리는 영연방 국가들에 무기와 탄약을 공급하기 위해 최선을 다해야 합니다."
  SAF_peace_expansion_scheme:0 "평화 확장 계획"
  SAF_peace_expansion_scheme_desc:0 "피에르 판 레이네펠트는 영국 제조업체로부터 항공기를 구매하여 우리 공군을 확장할 계획을 고안했습니다. 이는 우리 자체 항공기 제조업이 따라잡을 때까지 추진해야 할 일입니다."
  SAF_tanks_lend_lease:0 "셔먼과 파이어플라이"
  SAF_tanks_lend_lease_desc:0 "미국과 영국이 우리 기갑사단을 위해 신형 전차와 대전차자주포를 무기대여해주기로 합의했습니다."
  SAF_create_unit_boer_commandos_tt:0 "트란스발에 정예 보어 코만도 부대 2개를 얻습니다.\n"
  SAF_military_research_bureau:0 "군사 연구국"
  SAF_military_research_bureau_desc:0 "어떤 전쟁에서든 승리의 열쇠는 발전된 무기와 장비이므로, 이제부터 우리의 연구는 이 분야에 집중될 것입니다. "
  SAF_fight_against_communism:0 "공산주의의 위협"
  SAF_fight_against_communism_desc:0 "영국은 성가신 존재지만, 진정한 위협은 전 세계에 퍼지는 공산주의의 오점입니다. 우리는 이를 끝내기 위해 할 수 있는 모든 것을 해야 합니다."
  SAF_the_anti_revolution:0 "반혁명"
  SAF_the_anti_revolution_desc:0 "이 "혁명"을 끝낼 때가 왔습니다. 지금 공격합시다."
  SAF_deal_with_liberia:0 "대서양의 발판"
  SAF_deal_with_liberia_desc:0 "라이베리아는 북대서양으로 가는 전략적으로 유용한 발판이자, 우리가 확실히 확장할 수 있는 고무 농장을 가지고 있습니다. 그들은 손쉬운 먹잇감이 될 것입니다."
  SAF_deal_with_oman:0 "아시아로 가는 관문"
  SAF_deal_with_oman_desc:0 "최근 조사에 따르면 파후드 지역에서 미개발 석유 매장량이 발견되었습니다. 우리는 전쟁 기계에 연료를 공급할 석유가 필요하며, 이는 또한 아시아의 부로 확장할 수 있는 새로운 길을 열어줍니다."
  SAF_riches_of_india:0 "인도의 부"
  SAF_riches_of_india_desc:0 "인도는 우리가 필요로 하는 모든 자원, 특히 국내에서 부족한 자원을 가지고 있습니다. 그들의 자원을 우리 것으로 만듭시다."
  SAF_split_portugal:0 "포르투갈 식민지 점령"
  SAF_split_portugal_desc:0 "포르투갈 식민지는 경비가 허술하고 포르투갈에서 멀리 떨어져 있습니다. 포르투갈이 손가락 하나 까딱하기 전에 신속하게 점령할 수 있습니다."
  SAF_appeal_to_greyshirts:0 "회색셔츠단에 호소"
  SAF_appeal_to_greyshirts_desc:0 "남아프리카 국가당은 이 전투를 홀로 싸우려 하고 있습니다. 우리는 그들에게 연락하여 남아프리카의 새로운 시대를 열기 위한 노력을 조율해야 합니다."
  SAF_equip_stormjaers:0 "스톰예어르 무장"
  SAF_equip_stormjaers_desc:0 "스톰예어르는 날이 갈수록 점점 더 많은 신병을 끌어들이고 있습니다. 이 신병들을 무장시킬 수 있다면, 필요할 때 부를 수 있는 충성스러운 병사들을 갖게 될 것입니다."
  SAF_equip_greyshemde:0 "회색셔츠단 무장"
  SAF_equip_greyshemde_desc:0 "회색셔츠단은 병력은 있지만 총알이 없습니다. 우리는 그들에게 무기를 주고 진정한 전투 부대로 조직할 수단을 가지고 있습니다."
  SAF_reactivate_kommandos:0 "보어 코만도 재활성화"
  SAF_reactivate_kommandos_desc:0 "코만도 체계는 200년 넘게 우리 나라 국방의 핵심 부분이었습니다. 그리고 마지막 보어 전쟁 이후 해체되었음에도 불구하고 비공식적인 집단으로 남아 있었으며, 지금이야말로 공식적으로 재활성화하기에 가장 좋은 시기입니다."
  SAF_armor_mech_bonus:0 "구데리안의 이론 채택"
  SAF_armor_mech_bonus_desc:0 "하인츠 구데리안은 현대전에서 전차를 사용하는 데 있어 선구자이며, 그의 아이디어를 배우지 않는 것은 어리석은 일일 것입니다."
  SAF_seawolf_bonus:0 "되니츠의 전술 채택"
  SAF_seawolf_bonus_desc:0 "되니츠는 잠수함을 "늑대 떼"라는 대규모 사냥 무리로 사용하는 독특한 아이디어를 가지고 있습니다. 우리는 이 새로운 방식을 받아들여야 합니다."
  SAF_mobile_warfare_exercises:0 "기동전 훈련"
  SAF_mobile_warfare_exercises_desc:0 "우리는 국방군으로부터 배울 점이 많습니다. 전차와 기동 보병을 효과적으로 조율할 수 있도록 합동 훈련 작전을 제안할 것입니다."
  SAF_wolfpack_exercises:0 "늑대 떼 훈련"
  SAF_wolfpack_exercises_desc:0 "독일 유보트가 우리 항구에 정박해 있는 동안, 우리는 그들과 함께 훈련하고 그들의 지휘관과 선원들로부터 배울 기회를 가질 수 있습니다."
  SAF_invite_ig_farben:0 "IG 파르벤 초청"
  SAF_invite_ig_farben_desc:0 "IG 파르벤은 합성 연료 기술의 세계적인 선두 주자입니다. 우리는 석탄을 가지고 있지만, 이를 활용할 전문 지식이 필요합니다. 우리는 그들에게 접근하여 우리 지역의 연료 액화 회사를 설립하는 데 도움을 요청해야 합니다."
  SAF_empower_trade_unions:0 "노동조합 권한 강화"
  SAF_empower_trade_unions_desc:0 "현 정부는 아프리카 노동자들의 노력에 크게 의존하면서도 그들에게 쥐꼬리만 한 임금을 지불하고 있습니다. 우리는 노동조합을 모아 그들의 목소리가 들릴 때까지 파업과 행진을 조직할 수 있습니다."
  #SAF_the_bloodless_revolution:0 "The Bloodless Revolution"
  #SAF_the_bloodless_revolution_desc:0 "We have gathered enough support behind us to force the government to step down and hand over power to the people of Africa."
  SAF_expand_industrial_zones:0 "산업 지대 확장"
  SAF_expand_industrial_zones_desc:0 "남아프리카에서 부족하지 않은 한 가지는 공간입니다. 이 땅의 일부는 대규모 산업 지대를 위해 따로 마련되어야 합니다."
  SAF_support_indian_independence:0 "인도 독립 지원"
  SAF_support_indian_independence_desc:0 "우리는 성공적으로 식민주의의 멍에를 벗어던졌으니, 인도가 똑같이 할 수 있도록 돕겠습니다."
  #SAF_institute_development_program:0 "Institute Development Program"
  #SAF_institute_development_program_desc:0 "If we are to truly stand as equals among the world's powers we must begin a program of econmic and industrial development."
  SAF_economic_technical_exchange:0 "경제 기술 교류"
  SAF_economic_technical_exchange_desc:0 "인도와 남아프리카는 서로가 현대 산업 국가로 성장하는 것을 돕기에 완벽한 위치에 있습니다. 서로의 경제와 기반 시설에 투자하는 것으로 시작합시다. 또한 그들이 자체 연구 기관을 설립하는 것을 도울 수 있습니다."
  #SAF_coordinate_company_expansions:0 "Coordinate Company Expansions"
  #SAF_coordinate_company_expansions_desc:0 "India and South Africa both have unique skills in certain areas through our various companies. If we can help set up local branches of these companies then we can both benefit in areas we lack in."
  SAF_workers_for_engineers:0 "노동자와 기술자 교환"
  SAF_workers_for_engineers_desc:0 "인도는 기회를 찾는 거대한 노동력 풀을 가지고 있으며, 우리는 다년간의 광업 경험과 전문 지식을 가지고 있습니다. 우리는 가장 지식이 풍부한 기술자들을 보내주는 대가로 인도 노동자들의 이민을 장려해야 합니다."
  SAF_safeguard_our_oceans:0 "해양 수호"
  SAF_safeguard_our_oceans_desc:0 "전쟁 발발 시, 아군 간의 고립을 방지하기 위해 인도양의 제해권을 확보하는 것은 필수적입니다. "
  SAF_research_institute:0 "전략 연구부"
  SAF_research_institute_desc:0 "우리는 기술 발전 면에서 많은 서방 국가에 뒤처져 있으므로, 새로운 연구 기관을 설립하여 가장 뛰어난 인재들을 모으고 기술 혁신을 촉진할 것입니다."
  SAF_research_area_priority:0 "전략 연구부 지침"
  SAF_research_area_priority_desc:0 "적절한 지침이 없다면 과학자들이 무엇을 만들어낼지 알 수 없습니다. 그들에게 연간 지침을 제공함으로써, 우리는 연구 노력을 가장 필요한 분야에 집중시킬 수 있습니다."
  SAF_the_darkest_hour:0 "가장 어두운 시간"
  SAF_the_darkest_hour_desc:0 "많은 동맹국이 쓰러졌으며, 추축국과 육로로 직접 연결되어 있기에 국경에서 그들의 전쟁 기계의 온전한 힘을 느끼게 될 것입니다. 우리는 쓰라린 끝까지 싸울 준비를 해야 하며, 자비를 베풀지 말아야 합니다."
  SAF_ask_for_soviet_aid:0 "소련에 원조 요청"
  SAF_ask_for_soviet_aid_desc:0 "지난 몇 년간 우리 공산당의 주요 당원 다수가 소련에서 유학했으며, 우리는 그들의 인맥과 영향력을 이용하여 다가오는 혁명을 위한 소련의 원조를 확보할 수 있습니다."
  SAF_secure_peoples_state:0 "인민 국가 안정화"
  SAF_secure_peoples_state_desc:0 "혁명은 달성되었지만, 여전히 저항하는 자들이 있습니다. 우리는 남은 모든 반대 세력을 분쇄하고 국가 내에서 우리의 입지를 확보할 것입니다."
  SAF_encourage_soviet_investment:0 "소련 투자 장려"
  SAF_encourage_soviet_investment_desc:0 "우리 경제에 대한 소련의 투자를 유치하기 위해 인센티브와 기회를 제공합시다."
  SAF_institute_planned_economy:0 "계획 경제 도입"
  SAF_institute_planned_economy_desc:0 "우리의 새로운 아프리카 노동자 유토피아에 자본주의적 자유 시장 정책이 설 자리는 없습니다. 정부가 국가의 산업 및 경제 확장을 감독할 것입니다."
  SAF_seize_means_of_production:0 "생산 수단 장악"
  SAF_seize_means_of_production_desc:0 "부유한 자본가들의 손에 너무 많은 회사가 있습니다. 우리는 그들에게서 부의 짐을 덜어주고 우리의 목적을 위해 그것을 사용할 것입니다."
  SAF_exploit_mineral_wealth:0 "광물 자원 개발"
  SAF_exploit_mineral_wealth_desc:0 "우리나라의 자원은 나마콸란드에서 발견한 새로운 텅스텐 광상처럼 방대하고 대부분 미개발 상태입니다. 땅속에 그냥 묻혀 있는 것은 누구에게도 이롭지 않으니 유용하게 사용할 것입니다."
  SAF_national_rationing_recycling_program:0 "배급 및 재활용 프로그램 시행"
  SAF_national_rationing_recycling_program_desc:0 "우리 인민은 그렇게 많은 사치품이 필요하지 않으므로, 그것을 재활용하도록 장려하여 대신 무기를 만드는 데 사용할 것입니다."
  SAF_the_revolution:0 "혁명 시작"
  SAF_the_revolution_desc:0 "인민이 우리를 지지하고 있으니, 지금보다 혁명을 시작하기에 더 좋은 때는 없습니다."
  SAF_peoples_army:0 "인민군"
  SAF_peoples_army_desc:0 "우리가 생존하려면 군인이 필요합니다. 우리 인민이 우리를 위해 싸우도록 독려합시다."
  #SAF_workers_army:0 "The Worker's Army"
  #SAF_workers_army_desc:0 "While soldiers are important, we must not forget that it is guns that will win us wars. Our factories must get all the resources and workers they need."
  SAF_african_utopia:0 "아프리카의 유토피아"
  SAF_african_utopia_desc:0 "아프리카의 노동자들은 남아프리카를 미래를 보장할 이상적인 장소로 보게 되었고, 그래서 우리의 부를 나누기 위해 대륙 각지에서 오고 있습니다."
  SAF_liberate_spanish:0 "스페인 식민지 해방"
  SAF_liberate_spanish_desc:0 "더 많은 식민주의자는 더 많은 노동자 억압을 의미합니다. 이것은 아프리카 노동자 해방 역사의 또 다른 장이 될 것입니다."
  SAF_liberate_italian:0 "이탈리아 식민지 해방"
  SAF_liberate_italian_desc:0 "이탈리아인들은 식민지 잔치에 늦게 도착했습니다. 우리는 그들이 일찍 떠나도록 만들 것입니다."
  SAF_an_african_peoples_republic:0 "아프리카 인민 공화국"
  SAF_an_african_peoples_republic_desc:0 "역사상 처음으로 아프리카가 하나의 대륙으로 통일되었습니다. 전 세계에 우리를 알리고, 우리가 무시할 수 없는 새로운 세력임을 알립시다."
  SAF_asymmetric_warfare:0 "비대칭전"
  SAF_asymmetric_warfare_desc:0 "보어 전쟁과 대전쟁 당시 독일 식민지에서의 전투 경험을 통해, 우리는 비전통적인 방식과 험난한 지형에서 전쟁을 치르는 것에 대한 독특한 이해를 얻었습니다. 이 지식과 경험을 유지하고 새로운 장교와 병사들에게 전수해야 합니다."
  SAF_sa_engineer_medical_corps:0 "남아프리카 공병 및 의무 군단"
  SAF_sa_engineer_medical_corps_desc:0 "우리 병사들을 계속 전장에 남게 하려면, 남아프리카 의무 군단은 현대적인 장비와 훈련이 필요합니다."
  SAF_improve_infantry:0 "보병 현대화"
  SAF_improve_infantry_desc:0 "보병은 우리 군의 중추입니다. 전투에서 우위를 점하기 위해 최고의 장비와 자원이 필요합니다."
  SAF_retool_pretoria_mint:0 "프리토리아 조폐국 개조"
  SAF_retool_pretoria_mint_desc:0 "프리토리아 조폐국은 약간의 개조만 거치면, 군을 위한 무기와 장비를 생산하는 데 사용될 수 있습니다."
  SAF_pretoria_metal_pressings:0 "프리토리아 금속 프레스와 계약"
  SAF_pretoria_metal_pressings_desc:0 "프리토리아 금속 프레스는 한동안 탄약과 폭발물을 생산해 왔습니다. 그들의 생산 능력을 확장하여 우리에게 훨씬 더 많은 장비를 공급할 수 있도록 합시다."
  SAF_mechanize_army:0 "육군 기계화"
  SAF_mechanize_army_desc:0 "전쟁의 양상이 급격하게 변하고 있습니다. 우리는 변화에 발맞추어 병사들에게 현대적인 기동 전투 차량을 제공해야 합니다."
  SAF_the_sarc_mki:0 "SARC 1형"
  SAF_the_sarc_mki_desc:0 "우리는 모든 경험과 전문 지식을 총동원하여 우리 군을 위한 새로운 장갑차를 만들었습니다. 이를 활용하여 더 나은 차량에 투자합시다."
  SAF_expand_artillery_aircraft_depot:0 "포병 및 항공기 보급소 확장"
  SAF_expand_artillery_aircraft_depot_desc:0 "로버츠하이츠의 포병 및 항공기 보급소는 공군을 위해 호커 하트비스트를 면허 생산해왔습니다. 시설을 확장하면 더 많고 더 좋은 항공기를 생산할 수 있을 것입니다."
  SAF_protect_the_trade_2:0 "상선단 개선"
  SAF_protect_the_trade_2_desc:0 "개조된 상선과 포경선은 잠수함 사냥 및 소해 작전에서 훌륭한 임무를 수행했지만, 항상 더 새로운 장비가 필요합니다."
  SAF_disrupt_the_trade_2:0 "어뢰 개선"
  SAF_disrupt_the_trade_2_desc:0 "대잠전이 점점 더 효율적으로 변하고 있으므로, 우리는 적의 노력보다 앞서나가 신형 어뢰를 개발해야 합니다."
  SAF_expand_repair_facilities:0 "수리 시설 확장"
  SAF_expand_repair_facilities_desc:0 "케이프타운과 더반 조선소는 아프리카를 순항하는 선박을 수리하고 개장하는 핵심 항구였습니다. 공간이 부족할 수 있으므로, 대신 대형 부유식 도크를 건설해야 합니다."
  SAF_saaf_coastal_command:0 "남아프리카 공군 해안 사령부"
  SAF_saaf_coastal_command_desc:0 "남아프리카 주변 해역을 감시할 전담 해안 사령부를 창설하면 항로의 안전을 보장할 수 있을 것입니다."
  SAF_flexible_airforce:0 "유연한 공군"
  SAF_flexible_airforce_desc:0 "전술 폭격기는 다양한 역할을 적절히 수행할 수 있습니다. 하나의 기종으로 필요한 모든 임무를 수행할 수 있다면 여러 종류의 항공기는 필요하지 않습니다."
  SAF_specialised_airforce:0 "특화된 공군"
  SAF_specialised_airforce_desc:0 "우리 공군은 모든 역할을 최대한 효과적으로 수행할 수 있어야 하므로, 특화된 기종을 제공해야 합니다."
  SAF_flying_tanks:0 "날아다니는 전차"
  SAF_flying_tanks_desc:0 "근접항공지원 항공기가 그 이름에 걸맞은 활약을 하려면 신형 모델이 필요합니다."
  SAF_protect_cape_sea_route:0 "희망봉 항로 보호"
  SAF_protect_cape_sea_route_desc:0 "희망봉 항로를 보호하는 것은 전쟁 수행에 필수적입니다. 해안 주둔군을 더욱 확장하면 항로 통제권을 유지할 수 있을 것입니다."
  SAF_sa_airforce_college:0 "남아프리카 공군사관학교"
  SAF_sa_airforce_college_desc:0 "남아프리카 공군사관학교는 지금까지 육군사관학교의 일부였습니다. 조종사들에게 더 나은 교육을 제공하기 위해 독립적인 기관을 설립합시다."
  SAF_sa_naval_college:0 "남아프리카 해군사관학교"
  SAF_sa_naval_college_desc:0 "남아프리카 해군사관학교는 일부 동맹국에 비해 규모가 작습니다. 신규 해군 병력의 잠재력을 최대한 이끌어내기 위해 더 나은 시설과 훈련에 투자해야 합니다."
  SAF_hulamin_aluminium_plant:0 "훌라민 알루미늄 공장"
  SAF_hulamin_aluminium_plant_desc:0 "우리 산업에는 알루미늄이 필요하므로 자체 생산 수단에 투자합시다. 리처즈베이에 신규 공장을 짓는 것이 이상적인 위치입니다."
  SAF_sasol_non_aligned:0 "사솔 설립"
  SAF_sasol_non_aligned_desc:0 "남아프리카는 석유와 고무를 항상 수입에 의존할 수 없으며, 자급자족을 위해 노력해야 합니다. 우리는 합성 연료를 생산하는 데 사용할 수 있는 풍부한 석탄 매장량을 보유하고 있습니다."
  SAF_electronics_bonus:0 "전자공학에 투자"
  SAF_electronics_bonus_desc:0 "전자공학 분야는 빠르게 발전하고 있습니다. 우리는 뒤처지지 말아야 합니다."
  SAF_hulamin_aluminium_plant_ii:0 "알루미늄 공장 확장"
  SAF_hulamin_aluminium_plant_ii_desc:0 "우리는 항상 더 많은 알루미늄이 필요할 것이므로, 추가 생산 능력에 투자합시다."
  SAF_iscor_expansion_ii:0 "신규 아이스코어 공장"
  SAF_iscor_expansion_ii_desc:0 "판데르베일파르크에 새로 짓는 완전 통합 제철소는 우리 산업의 수요를 충족시킬 수 있을 것입니다."
  SAF_invite_german_settlers:0 "독일인 정착민 초청"
  SAF_invite_german_settlers_desc:0 "아프리카에는 진취적인 개인들이 부를 축적할 충분한 공간이 있습니다. 우리는 남서아프리카 및 다른 지역에 독일인의 재정착을 장려할 것입니다."
  SAF_expand_cape_franchise:0 "케이프 선거권 확대"
  SAF_expand_cape_franchise_desc:0 "선거 연령에 도달한 모든 남성과 여성은 자신의 미래를 위해 투표할 수 있어야 합니다. 전국적으로 모든 인종에게 선거권을 확대함으로써 새로운 남아프리카를 향한 실질적인 진전을 시작할 수 있습니다."
  SAF_free_elections:0 "자유 선거 실시"
  SAF_free_elections_desc:0 "이 나라 최초의 자유 선거를 실시할 때가 왔습니다. 많은 이들이 확실한 승자는 한 명뿐일 것이라고 예상합니다."
  SAF_reconciliation:0 "화해 정책"
  SAF_reconciliation_desc:0 "이 새로운 남아프리카에서 우리는 하나의 국가로서 평화롭게 나아가기 위해 포용과 화해를 위해 노력해야 합니다."
  SAF_namibian_freedom:0 "나미비아의 자유"
  SAF_namibian_freedom_desc:0 "우리가 과거의 식민 정책을 계속한다면 아프리카에 어떤 본보기를 보이겠습니까. 우리는 나미비아를 그 국민에게 넘겨주고 완전한 독립으로 이끌 것입니다."
  
  ### Events
  SAFR.1.t:0 "마다가스카르 보호 제안"
  SAFR.1.d:0 "남아프리카가 이 지역의 연합국 이익을 보호하기 위해, 당분간 마다가스카르의 통제권을 넘겨달라고 요청했습니다. 어떻게 대응해야 할까요?"
  SAFR.1.a:0 "좋소, 일단은 그들에게 넘겨주시오."
  SAFR.1.b:0 "절대 안 돼! 그들은 단지 국경을 확장하고 싶을 뿐이다."
  SAFR.2.t:0 "프랑스가 우리의 제안에 동의"
  SAFR.2.d:0 "프랑스 정부는 우리가 남인도양에서 연합국의 통제권과 이익을 유지하기에 더 나은 위치에 있다는 것을 현명하게도 인정하고, 마다가스카르의 통제권을 넘겨주는 데 동의했습니다."
  SAFR.2.a:0 "저희가 잘 관리하겠습니다."
  SAFR.3.t:0 "프랑스, 우리의 제안을 거부하다"
  SAFR.3.d:0 "선견지명과 이성이 부족하다는 것을 놀랍도록 보여주며, 프랑스 정부는 마다가스카르의 통제권을 넘겨받으라는 우리의 제안을 거부했습니다. 그들은 우리가 자신들의 \"정당한\" 영토에 영향력을 확장하는 데에만 관심이 있다고 주장합니다."
  SAFR.3.a:0 "어리석은 놈들"
  #SAFR.4.t:0 "South Africa Demands Colonies"  
  #SAFR.4.d:0 "South Africa has demanded that we immediately hand over control of our colonies of Angola and Mozambique to them, citing a rise in communist element in the regions and our inability to properly govern the countries."
  #SAFR.4.a:0 "We will never surrender our African holdings!"   
  #SAFR.4.b:0 "Fine, we have too much on our plate as it is."
  #SAFR.5.t:0 "Portugal Refuses"  
  #SAFR.5.d:0 "The Portuguese government has refused our demands for Angola and Mozambique. They say they are fully capable of taking care of their colonies, and have laughed off our attempt to strong-arm them."
  #SAFR.5.a:0 "We'll have them one way or another..."
  #SAFR.5.b:0 "On second thoughts, we don't need them."
  #SAFR.6.t:0 "Portugal Agrees"  
  #SAFR.6.d:0 "The Portuguese have seen reason and have officialy relinquished control over Angola and Mozambique to us."
  #SAFR.6.a:0 "Our influence grows."
  SAFR.7.t:0 "남아프리카, 혁명을 위한 총기 요청"
  SAFR.7.d:0 "남아프리카가 자국에서 일어나고 있는 잠재적인 혁명에 대한 우리의 지원을 요청했습니다."
  SAFR.7.a:0 "아주 좋소"
  SAFR.7.b:0 "아니, 우리도 필요하다"
  SAFR.8.t:0 "소련, 수락하다"
  SAFR.8.d:0 "소련이 정부 전복을 돕기 위해 소총을 보내주기로 동의했습니다. 소총은 혁명이 시작된 후 얼마 지나지 않아 도착할 것입니다."
  SAFR.8.a:0 "훌륭하군"
  SAFR.9.t:0 "소련, 거부하다"
  SAFR.9.d:0 "소련은 우리가 가진 것으로 어떻게든 해내야 한다며 어떠한 지원도 거부했습니다."
  SAFR.9.a:0 "대의를 저버린 배신자들!"
  SAFR.10.t:0 "소련제 총기 도착"
  SAFR.10.d:0 "소련은 약속을 지켜 혁명 민병대를 무장시킬 무기를 성공적으로 전달했습니다. 무기를 조달하는 데 도움을 준 인원들 또한 남아서 식민주의와 자본주의에 맞서는 우리의 대의를 돕기로 결정했습니다."
  SAFR.10.a:0 "유용하게 사용하겠다."
  SAFR.15.t:0 "내전"
  SAFR.15.d:0 "혁명을 시작하고 영국인들을 인도에서 완전히 몰아낼 때가 왔습니다."
  SAFR.15.a:0 "좋다!"
  SAFR.16.t:0 "새로운 SRD 지침 하달 가능"
  SAFR.16.d:0 "과학자들이 이전 임무를 완수했으며, 올해의 새로운 지침을 기다리고 있다고 보고했습니다."
  SAFR.16.a:0 "알겠다"
  SAFR.17.t:0 "당 쿠데타"
  SAFR.17.d:0 "헤르초흐가 국민당으로 복귀하여 아프리카너와 영국계 남아프리카인 간의 화해를 주장했으나, 대다수 당원에게 거부당했습니다. 그 결과 그는 정계에서 물러나 은퇴하기로 결정했습니다. 선거가 치러지기 전에 새로운 당 대표를 선출해야 합니다. 말란의 의도는 분명합니다. 공화국 수립과 남아프리카의 독립입니다. 반면 피로의 비전은 단순한 자유보다 훨씬 더 극단적인 것으로 보입니다."
  SAFR.17.b:0 "피로를 지지한다."
  SAFR.17.a:0 "말란을 지지한다."
  SAFR.18.t:0 "말란 승리"
  SAFR.18.d:0 "치열한 접전 끝에 말란의 재통일국민당이 국민의 지지를 얻어 새 정부를 이끌게 되었습니다. 영국으로부터의 독립이 새 정부의 주요 의제인 것으로 보이지만, 그 너머에 무엇이 있을지는 지켜봐야 할 것입니다."
  SAFR.18.a:0 "훌륭하다"
  SAFR.19.t:0 "피로 승리"
  SAFR.19.d:0 "근소한 차이로 선거에서 승리한 재통일국민당이 승리했으며, 이제 피로가 총리직을 맡게 됩니다. 피로의 정확한 정책은 당내 많은 이들에게 불분명하며, 일부는 그것이 실로 매우 급진적인 것일 수 있다고 의심하고 있습니다."
  SAFR.19.a:0 "훌륭하다"
  SAFR.21.t:0 "베를린의 하벵하와 피로"
  SAFR.21.d:0 "베를린에서의 우리 회담이 독일 정부에 호의적으로 받아들여진 것 같습니다. 우리 앞에 두 가지 제안이 놓여 있지만, 현실적으로는 하나만 이행할 수 있습니다. 하벵하는 상호 이익이 되는 무역 협정을 협상해냈고, 피로는 히틀러 및 독일 고위 관리들과의 이전 회담과 유창한 독일어 실력 덕분에 우리의 최고 장성들과 장교들을 독일로 보내 베어마흐트와 함께 훈련 및 연습을 할 수 있게 되었습니다."
  SAFR.21.a:0 "하벵하의 거래"
  SAFR.21.b:0 "피로의 거래"
  SAFR.22.t:0 "남아프리카, 우리 식민지에 대한 종주권 요구"
  SAFR.22.d:0 "남아프리카는 자신들이 우리의 남부 아프리카 식민지들을 더 잘 보호할 수 있으며, 그들에게 제한적인 자치권을 부여할 것이라고 주장합니다. 이를 허용해야 할까요?"
  SAFR.22.a:0 "수락한다."
  SAFR.22.b:0 "거부한다."
  SAFR.23.t:0 "영국이 우리의 제안에 동의"
  SAFR.23.d:0 "영국이 남부 아프리카 식민지를 이양하는 데 동의했습니다. 우리는 즉시 이들에게 어느 정도의 자치권을 부여한 후 통치권을 완전히 넘겨줄 것입니다."
  SAFR.23.a:0 "훌륭하다."
  SAFR.24.t:0 "영국이 우리의 제안을 거부"
  SAFR.24.d:0 "영국이 우리의 제안을 거부했습니다. 시대에 뒤떨어진 식민 정책에 변화가 없는 것 같습니다."
  SAFR.24.a:0 "유감이다."
  SAFR.25.t:0 "영국이 타협안을 제시"
  SAFR.25.d:0 "영국이 우리에게 타협안을 제시했습니다. 베추아날란드와 로디지아를 이양하는 데 동의했지만, 북부의 식민지는 유지할 것입니다."
  SAFR.25.a:0 "시작에 불과하다."






 ##### NANSHIN-RON DOCTRINE BRANCH
 JAP_nanshin_ron_doctrine:0 "남진론\n교리"
 JAP_nanshin_ron_doctrine_EXPL1:0 "\n§H남진론§! 교리는 §H통제파§!가 §C지지§!하는 교리입니다. §H황도파§!의 편에 서서 이 교리를 따를 경우 다음과 같은 §R효과§!가 발생합니다:\n"
 JAP_nanshin_ron_doctrine_EXPL2:0 "\n귀하는 §H북진론§! 교리를 지지하는 §H황도파§!의 편에 섰습니다. 따라서 북진론을 완료하기 전에 이 중점을 선택하면 다음과 같은 §R효과§!가 발생합니다:\n"
 JAP_nanshin_ron_doctrine_desc:0 "'남방확장정책'은 동남아시아와 태평양 제도를 일본의 세력권으로 규정하고, 해당 지역의 경제적, 영토적 확장이 다른 곳보다 일본 제국에 더 큰 잠재적 가치를 지닌다고 명시한 일본 제국의 군사 및 정치 교리입니다."
 
 JAP_expand_the_hosaku_kenkyu_kai:0 "방책연구회\n확장"
 JAP_expand_the_hosaku_kenkyu_kai_desc:0 "'방책연구회' 또는 남양방책연구회는 남방으로의 군사 및 경제 확장 전략을 모색하기 위해 설립된 단체입니다. 또한 척무성(拓務省)과 협력하여 대만과 미크로네시아의 군사적 역할을 남방 확장을 위한 전진 기지로서 강조합니다."

 JAP_move_to_indochina:0 "인도차이나로 이동"
