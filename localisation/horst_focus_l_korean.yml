 YUG_urbanized_state_desc:0 ""
 YUG_give_up_serbia_tt:0 "독일의 지원을 받아 세르비아 분리주의를 억제하고, 독일이 §R세르비아를 군사 점령§!하도록 허용할 것입니다."
 YUG_give_up_croatia_tt:0 "추축국 우호 정부가 영유권을 주장하는 §R영토를 할양§!하여, 우리가 추축국에 가입하는 데 대한 모든 반대를 제거할 것입니다."
 YUG_urbanized_state_tt:0 "도시로 유입되는 시민들을 수용하기 위해 §G우리 본토 주를 개발§!할 것입니다."

 GER_fortify_the_vaterland_tt:0 "이 중점은 요새화를 위한 모든 최신 기술을 연구할 것입니다."
 
 JAP_a_green_persimmon_tt:0 "소련은 전쟁 준비를 마치고 국경에 충분한 보급품과 전차 사단을 보유하게 될 것입니다."
 JAP_the_persimmon_has_ripened_tt:0 "소련은 우리의 공격에 대비하지 못할 것입니다. 천황 폐하 만세!"
 
 JAP_the_imperial_defense_plan:0 "제국 국방 계획"
