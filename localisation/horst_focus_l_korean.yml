 ##### HOKUSHIN-RON DOCTRINE BRANCH
 JAP_hokushin_ron_doctrine:0 "북진론\n교리"
 JAP_hokushin_ron_doctrine_EXPL1:0 "\n§H북진론§! 교리는 §H황도파§! 파벌이 §C장려§!하는 것입니다. §H통제파§! 파벌의 편에 서서 이 교리를 따를 경우, 다음과 같은 §R효과§!가 발생합니다:\n"
 JAP_hokushin_ron_doctrine_EXPL2:0 "\n당신은 §H남진론§! 교리를 장려하는 §H통제파§! 파벌의 편에 섰습니다. 따라서 남진론을 완료하기 전에 이 중점을 선택하면 다음과 같은 §R효과§!가 발생합니다:\n"
 JAP_hokushin_ron_doctrine_desc:0 "'북진론'은 만주와 시베리아가 일본의 세력권이며, 해당 지역에서의 경제적, 영토적 팽창이 일본에 가져다줄 잠재적 가치가 다른 곳보다 크다고 명시하는 군사적, 정치적 교리입니다."
 
