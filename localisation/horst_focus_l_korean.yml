 RAJ_Princely_States:0 "토후국"
 RAJ_Princely_States_desc:0 "영국령 인도 제국의 행정부는 델리에 위치하지만, 명목상 영토 전체가 수도에서 통제되는 것은 아닙니다. 현지 토후들은 영국과 동맹을 맺어 상당한 자치권을 확보했습니다. 영향을 받는 주는 다음과 같습니다:\n\n§Y구자라트, 라자스탄, 인도르, 하이데라바드, 마이소르, 카슈미르, 발루치스탄§!"
 RAJ_Princely_States_tt:0 "§Y토후국§! 내 지역 건설 속도 [?RAJ.prince_state_build_speed|%0=+]\n§Y토후국§! 내 해당 주 지역 인력 [?RAJ.prince_state_manpower|%0=+]\n§Y토후국§! 내 해당 주 지역 자원 [?RAJ.prince_state_resources|%0=+]\n"
