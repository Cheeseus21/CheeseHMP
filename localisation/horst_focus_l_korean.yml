 SOV_docking:0 "무르만스크에 영국 해군 기지 허용"
 SOV_docking_desc:0 "붉은 함대가 레닌그라드에 배치되어 있어, 북극의 교역과 보급을 보호할 함선이 부족합니다. 이를 용이하게 하려면 무르만스크에 영국 해군의 기지 사용권을 허용해야 합니다."
 SOV_mongolian_aid:0 "몽골로부터 원조 수령"
 tur_divide_by_zero:0 "중립 유지"
 SOV_mongolian_aid_desc:0 "우리 군은 인력과 장비가 부족하므로, 전투 준비 태세를 갖추기 위해 외부의 도움이 필요합니다."
