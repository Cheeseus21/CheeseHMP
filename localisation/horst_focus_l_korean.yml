 fin_special_forces_desc:0 "정예 부대가 필요합니다. 산악 부대와 공수부대를 최우선으로 해야 합니다."
 fin_aviation_effort:0 "항공 노력"
 fin_aviation_effort_tt:0 "§Y공군 기지§를 건설할 공간이 부족합니다!"
 fin_aviation_effort_desc:0 "공중전만큼 기술 발전이 빠른 분야는 없습니다. 항공은 모든 현대 국가가 숙달해야 할 분야입니다."
 fin_fighter_focus:0 "전투기 중점"
 fin_fighter_focus_desc:0 "대전쟁에서 벌어진 공중전이 마지막이 아닐 것입니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 가져다줄 것입니다."
 fin_bomber_focus:0 "폭격기 중점"
 fin_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불벼락이 가장 두드러질 것입니다. 우리는 그 이야기가 적들의 입에서 나오도록 최선을 다할 것입니다."
 fin_aviation_effort_2:0 "항공 노력 II"
 fin_aviation_effort_2_desc:0 "공군을 다른 군종과 잘 통합하기 위해서는 항공 분야의 추가적인 발전이 필요할 것입니다."
 fin_CAS_effort:0 "근접항공지원 노력"
 fin_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중의 항공기 지원도 필요합니다."
 fin_rocket_effort:0 "로켓 노력"
 fin_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 항공기 모두에게 전례 없는 속도를 가능하게 합니다. 이 기술들을 선도하면 적의 허를 찌를 수 있을 것입니다."
 fin_NAV_effort:0 "해군항공 노력"
 fin_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서 벌어지듯, 일부는 바다 위 상공에서 벌어집니다."
 fin_naval_effort:0 "해군 노력"
 fin_naval_effort_tt:0 "§Y해군 조선소§를 건설할 공간이 부족합니다!"
 fin_naval_effort_desc:0 "해군 확장이 최우선 과제여야 합니다. 모든 가용 자원을 새로운 조선소와 경함선 연구에 할당하십시오."
 fin_industrial_effort:0 "산업 노력"
 fin_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업을 크게 도약시키는 데 집중하십시오."
 fin_industrial_effort_2:0 "산업 노력 II"
 fin_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 또 다른 위대한 산업 노력을 위해 국민을 동원할 수 있습니다."
 fin_construction_effort:0 "건설 노력"
 fin_construction_effort_tt:0 "§Y민간 공장§을 건설할 공간이 부족합니다!"
 fin_construction_effort_desc:0 "전쟁이 세계를 위협할 때에도 민간 산업 역량을 과소평가해서는 안 됩니다."
 fin_production_effort:0 "군수 노력"
 fin_production_effort_tt:0 "§Y군수 공장§을 건설할 공간이 부족합니다!"
 fin_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 fin_construction_effort_2:0 "건설 노력 II"
 fin_construction_effort_2_desc:0 "공장을 계속 확장하면 교역품 생산과 추가 건설 노력의 속도를 높일 수 있을 것입니다."
 fin_production_effort_2:0 "군수 노력 II"
 fin_production_effort_2_desc:0 "민간 공장을 군사 장비 생산에 맞게 개조하려는 시도는 비효율적입니다. 지금부터 군수 생산을 준비하는 데 집중해야 합니다."
 fin_production_effort_3:0 "군수 노력 III"
 fin_production_effort_3_desc:0 "새로운 장비 수요를 충족하기 위해서는 군수 공장을 확장하려는 지속적인 노력이 필요합니다."
 fin_infrastructure_effort:0 "기반시설 노력"
 fin_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 고급 프로젝트나 건설을 추진할 수 없습니다."
 fin_infrastructure_effort_tt:0 "§Y기반시설§을 건설할 공간이 부족합니다!"
 fin_infrastructure_effort_2:0 "기반시설 노력 II"
 fin_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 프로젝트에 필요한 수송과 통신이 가능해질 것입니다."
 fin_construction_effort_3:0 "건설 노력 III"
 fin_construction_effort_3_desc:0 "기반시설망 확장은 우리의 건설 능력을 크게 향상시켰습니다."
 fin_nuclear_effort:0 "핵 노력"
 fin_nuclear_effort_desc:0 "세상을 바꿀 발견의 문턱에 서 있는 지금, 언젠가 지구를 집어삼킬지도 모를 불을 다른 이들이 지피게 놔둘 수는 없습니다."
 fin_extra_tech_slot:0 "추가 연구 슬롯"
 fin_extra_tech_slot_desc:0 "산업 확장과 최근의 다른 발전 덕분에 더 많은 연구개발을 동시에 수행할 수 있을 것입니다."
 fin_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 fin_extra_tech_slot_2_desc:0 "국가의 급속한 산업화는 우리가 추구해야 할 연구개발의 새로운 기회를 열었습니다."
 fin_technology_sharing:0 "기술 공유"
 fin_technology_sharing_desc:0 "동맹국과 기술 발전을 공유함으로써, 우리 세력 전체가 전시 연구개발을 더 효율적으로 수행할 수 있을 것입니다."
 fin_secret_weapons:0 "비밀 병기"
 fin_secret_weapons_desc:0 "모든 여유 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구 등 완전히 새로운 과학 분야에 있습니다."
 fin_political_effort:0 "정치적 노력"
 fin_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리 자신의 국가에 변화를 가져올 수 있어야 합니다. 우리의 정치적 입지를 강화하는 것이 우선되어야 합니다."
 fin_collectivist_ethos:0 "집단주의 정신"
 fin_collectivist_ethos_desc:0 "적들이 약소국을 분열시켜 정복할지라도, 우리 국민은 단결하여 맞설 것입니다. 하나는 모두를 위하고, 모두는 하나를 위합니다."
 fin_why_we_fight:0 "우리가 싸우는 이유"
 fin_why_we_fight_effect:0 "만약 §Y중립 외교 정책§! 정신이 없다면 세력을 창설할 수 있게 됩니다.\n"
 fin_why_we_fight_desc:0 "세계는 점점 더 위험해지고 있습니다. 우리 국민은 권력을 탐하는 자들이 저지르는 잔학 행위를 목도해야 합니다. 이제 국민을 우리 대의에 결집시키고 모두가 자유를 위해 싸울 준비를 갖추게 할 때입니다."
 fin_political_commissars:0 "정치장교"
 fin_political_commissars_desc:0 "우리의 정책이 군사적으로도 잘 이행되도록, 정치적으로 임명된 관료를 군 계급에 도입할 것입니다."
 fin_internationalism_focus:0 "국제주의 중점"
 fin_internationalism_focus_desc:0 "이념에는 국경이 없습니다. 다른 국가가 스스로를 주권 국가라 칭할지라도, 우리의 신념은 그러한 주장 위에 있습니다."
 fin_nationalism_focus:0 "민족주의 중점"
 fin_nationalism_focus_desc:0 "우리 국가는 독특하며, 우리의 정치적 성과는 오직 이곳에서만 일어날 수 있었습니다. 우리는 어떤 대가를 치르더라도 이를 위해 싸워야 합니다."
 fin_ideological_fanaticism:0 "이념적 광신"
 fin_ideological_fanaticism_desc:0 "우리가 정치적으로 확립한 가치와 목표는 고대의 신앙만큼이나 목숨을 바칠 가치가 있습니다. 모든 추종자는 죽음을 마주할 준비가 되어 있어야 하며, 길을 벗어나는 자들은 죽음을 각오해야 할 것입니다."
 GRE_metaxas:0 "요르요스 2세와 메탁사스"
 GRE_metaxas_desc:0 "우리가 사랑하는 요르요스 2세 국왕의 도움으로, 메탁사스는 의회를 정지시키고 권력을 장악할 수 있었습니다. 이제 우리는 마침내 강력한 전체주의 지도자를 둔 보수 정권을 수립하여, 그리스 국민이 우러러볼 수 있는 인물을 갖게 될 기회를 얻었습니다."
 GRE_the_backbone_of_our_army2:0 "그리스제 총기"
 GRE_the_backbone_of_our_army2_desc:0 "우리 장비는 한심할 정도로 구식입니다. 이제 (프랑스제) 그리스 총기로 장비를 현대화할 때입니다!"
 nor_drill_exile_army:0 "망명군 훈련"
 nor_drill_exile_army_desc:0 "작전 전략, 부대 전술, 사격술에 대한 일일 훈련과 강의를 통해 우리 훈련 수준을 독일 국방군과 동등하게 만들 것입니다."
 nor_operation_crofter:0 "크로프터 작전"
 nor_operation_crofter_desc:0 "노르웨이로 돌아가는 편도 여행에 오를 때입니다. 우리는 독일의 위협에 맞서 조국을 해방시키거나, 그러다 죽을 것입니다!"
 nor_train_with_sas:0 "SAS와 합동 훈련"
 nor_train_with_sas_desc:0 "영국 측 상대와 합동으로 훈련함으로써, 우리는 세계에서 가장 치명적인 병사들을 내보낼 수 있습니다."
 nor_fleischers_plan:0 "플라이셔의 계획"
 GRE_new_weapons_old_tricks2:0 "그리스-터키 전쟁"
 GRE_new_weapons_old_tricks2_desc:0 "우리는 1919-22년 그리스-터키 전쟁 당시 포를 운용하고 정찰을 수행한 경험이 꽤 있습니다. 기술은 변했을지 몰라도, 전술은 분명 변하지 않았으니, 장비 현대화가 우리가 나아갈 길입니다."
 GRE_rejuvenating_athens2:0 "관광 장려"
 GRE_rejuvenating_athens2_desc:0 "그리스는 풍부한 역사 덕분에 인류 문명의 아름다움을 보여주는 인상적인 랜드마크를 보유하고 있습니다. 하지만, 사람들은 우리의 기적적인 지리적 위치를 잊는 경향이 있습니다. 이 나라에는 아름다운 자연 명소가 많이 있습니다. 우리의 유리한 상황을 활용합시다."
 GRE_thema_nautikon2:0 "오랜 상륙전 전통"
 GRE_thema_nautikon2_desc:0 "우리나라는 본토와 거대한 군도로 이루어져 있습니다. 세계 최초의 문명 중 하나로서, 우리는 이 군도 지역에서 싸운 경험이 있으니, 과거의 경험에서 배웁시다."
 GRE_a_modern_navy2:0 "그리스의 불 발명가"
 GRE_a_modern_navy2_desc:0 "우리의 조상, 기억에 남는 비잔티움인들은 작고 치명적인 갤리선에 혁명적인 그리스의 불을 발명했습니다. 그리스의 불 덕분에, 우리는 수 세기 동안 콘스탄티노플 주변 해역을 지배했습니다. 이 해군의 혁신성을 부활시킵시다!"
 GRE_a_land_of_mountains2:0 "레오니다스의 유산"
 GRE_academy_of_athens2:0 "철학의 발상지"
 GRE_academy_of_athens2_desc:0 "그리스는 철학의 발상지이며 위대한 과학자들과 철학자들을 배출했습니다. 아리스토텔레스, 플라톤, 소크라테스, 히포크라테스, 제논, 피타고라스, 아낙사고라스, 데모크리토스 등이 그 예입니다."
 GRE_a_legacy_of_war2:0 "알렉산드로스의 유산"
 GRE_a_legacy_of_war2_desc:0 "메가스 알렉산드로스, 바실레우스 마케도논, 스트라테고스 아우토크라토르 헬라도스, 페론 아이깁투, 바실레우스 페르손, 퀴리오스 테스 아시아스, 역사상 가장 위대한 인물."
 GRE_a_long_and_proud_tradition2:0 "테미스토클레스의 유산"
 GRE_atlantis:0 "잃어버린 아틀란티스 왕국"
 GRE_atlantis_desc:0 "고대 아틀란티스인들은 우리의 잃어버린 문화적 선조였습니다. 조국이 점령당한 동안 우리는 아틀란티스의 안전한 곳으로 함대를 이끌고 돌아가야 합니다."
 GRE_an_orthodox_state2_desc:0 "그리스는 정교회의 본거지이며, 우리 선조인 비잔티움인들이 1054년 동서 분열 이후 우리의 위대한 신앙을 도입했습니다. 정교회가 우리의 국가 정체성과 얽혀 있다는 것을 우리 국민에게 다시 한번 분명히 합시다. 정교회는 이 절망적인 시기에 우리의 길을 밝히는 빛이 될 것입니다!"
 GRE_an_orthodox_state2:0 "그리스 정교회"
 GRE_island:0 "[GetAtlantisFocusName]"
 GRE_island_desc:0 "[GetAtlantisFocusDesc]"
 AtlantisHidden:0 "수수께끼의 안개..."
 AtlantisHiddenDesc:0 "아소르스 서쪽 대서양의 한 지역이 수수께끼의 안개에 휩싸여 있습니다. 해당 해역은 혹독한 기상 조건과 외진 위치 탓에 해도에 제대로 기록되지 않았지만, 언젠가는 상황이 나아질지도 모릅니다."
 AtlantisSpotted:0 "수수께끼의 섬..."
 AtlantisSpottedDesc:0 "대서양에서 새로운 섬이 발견되었습니다. 이 기묘한 장소에 대해 더 알아보기 위해 고고학자들을 파견해야 합니다..."
 gre_island_spotted:0 "기상 조건이 변하여 추가 탐사가 가능해졌습니다..."
 GRE_island_tt:0 "\n§R이탈리아가 '발칸반도 지배'를 완료하기 전에 이 중점을 선택해야 합니다. 그렇지 않으면 게임이 끝납니다!!!§!"
 GRE_reviving_the_spartan_warrior_spirit2:0 "아테나와 아레스"
 GRE_reviving_the_spartan_warrior_spirit2_desc:0 "이 암울한 시기에, 사랑하는 조국을 되찾으려면 우리가 얻을 수 있는 모든 도움이 필요합니다. 고대의 전쟁신 아테나와 아레스에게 기도하여, 그들의 정신을 다시 한번 우리 안에서 느낄 수 있도록 해야 합니다."
 GRE_a_long_and_proud_tradition2_desc:0 "이번에는 테미스토클레스가 아데이만토스와 코린토스인들을 향한 독설을 섞어 길게 답했습니다. 그는 아테네인들이 병력이 완전히 충원된 200척의 배를 보유하는 한, 그들의 도시와 땅이 사실상 저들보다 위대하며, 헬레네스인들 중 누구도 그들이 공격을 개시한다면 격퇴할 수 없을 것이라고 선언했습니다. - 헤로도토스, 《역사》, 살라미스 해전에서 아테네의 지휘권을 결정하며."
 nor_fleischers_plan_desc:0 "소규모의 고도로 훈련된 정예 병력이야말로 우리 조국 노르웨이를 해방시키는 데 필요한 것입니다."
 nor_ruges_plan:0 "루게의 계획"
 nor_ruges_plan_desc:0 "전문적으로 훈련된 대규모 재래식 군대는 노르웨이의 여러 지역을 동시에 침공하여 적을 압도할 수 있게 해줄 것입니다."
 nor_winter_mountain_training:0 "극한지 훈련"
 nor_winter_mountain_training_desc:0 "노르웨이는 대부분 추운 산악 지대입니다. 자유 노르웨이군의 용감한 장병들은 우리 고향의 지형에 적응해야 합니다. 다행히도, 스코틀랜드에서 이 훈련을 할 수 있습니다."
 nor_norway_in_exile:0 "자유 노르웨이 왕립군"
 nor_norway_in_exile_desc:0 "모두 노르웨이를 위해!"
 nor_norway_in_exile_navy:0 "자유 노르웨이 왕립 해군"
 nor_norway_in_exile_navy_desc:0 "모두 노르웨이를 위해!"
 nor_prepare_operation_crofter:0 "크로프터 작전 준비"
 nor_prepare_operation_crofter_desc:0 "우리의 해방을 신중하게 계획해야 합니다. 함선이 출항하면 되돌아갈 수 없습니다."
 nor_civillian_effort:0 "풍부한 수력 발전"
 nor_ski_inf:0 "스키 보병"
 nor_ski_inf_desc:0 "도로가 없는 숲이 우거진 시골 지형은 겨울철 보병에게 험난하지만, 스키 부대에게는 그렇지 않습니다."
 nor_civillian_effort_desc:0 "전국에 위치한 수많은 댐 덕분에 저렴하게 국가를 전화(電化)하여 더 많은 경제 발전을 이룰 수 있습니다."
 nor_military_effort:0 "콩스베르그 그루펜 확장"
 nor_military_effort_desc:0 "우리의 가장 큰 군수 산업체 중 하나인 콩스베르그 그루펜은 침공에 대비하여 확장해야 합니다."
 nor_fullindustrial_effort:0 "경제 예비력 결집"
 nor_fullindustrial_effort_desc:0 "노르웨이 시민들이여, 다른 일에 종사하지 않는 모든 이가 공장에 있지 않는 한, 우리나라는 분명히 무너질 것입니다!"
 nor_army_effort:0 "노르웨이 육군"
 nor_army_effort_desc:0 "공중전과 해전의 가능성이 커지고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 준비를 통해 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 nor_equipment_effort:0 "크라그-예르겐센 개량"
 nor_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 계속해서 넓어지고 있습니다. 우리는 병사들에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 nor_motorization_effort:0 "대전쟁 이후 포병 발전"
 nor_motorization_effort_desc:0 "최근 포병 무기 기술의 발전을 연구해야 합니다."
 nor_doctrine_effort:0 "현대 교리 연구"
 nor_doctrine_effort_desc:0 "대전쟁의 지상전을 정의했던 군사 교리는 구식이 되었습니다. 우리는 최고의 인재들을 투입하여 미래의 군사 사상을 형성해야 합니다."
 nor_equipment_effort_2:0 "지원 여단 집중"
 nor_equipment_effort_2_desc:0 "우리 보병이 당대 최고의 지원 여단으로 무장할 수 있도록 계속해서 노력할 것입니다."
 nor_mechanization_effort:0 "대전차 집중"
 nor_mechanization_effort_desc:0 "필요한 모든 수단을 동원하여 전차로부터 우리 보병 사단을 보호해야 합니다."
 nor_doctrine_effort_2:0 "전술적 발전"
 nor_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서도 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 nor_equipment_effort_3:0 "노르웨이산 돌격소총"
 nor_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 nor_armor_effort:0 "대공 집중"
 nor_armor_effort_desc:0 "우리는 양질의 대공 여단으로 보병 사단을 보호해야 합니다."
 nor_tank_forces:0 "전차 부대 확장"
 nor_tank_forces_desc:0 "오늘날의 군대는 기동성 없고 취약한 보병으로만 구성될 수 없습니다. 우리는 적절한 기갑 장비로 보병을 기계화하고 보호해야 합니다. "
 nor_special_forces:0 "노르웨이 특수사령부 확장"
 nor_special_forces_desc:0 "정예 부대가 필요합니다. 산악 부대와 공수부대를 최우선으로 해야 합니다."
 nor_fighter_focus:0 "전투기 중점"
 nor_fighter_focus_desc:0 "대전쟁에서 공중전이 마지막으로 목격된 것은 아닙니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 가져다줄 것입니다."
 nor_bomber_focus:0 "폭격기 중점"
 nor_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불비가 두드러지게 등장할 것입니다. 우리는 그 이야기가 적들에 의해 전해지도록 최선을 다할 것입니다."
 nor_aviation_effort_2:0 "항공 노력 II"
 nor_aviation_effort_2_desc:0 "공군을 다른 군 분과와 잘 통합하기 위해서는 항공 분야의 추가적인 발전이 필요할 것입니다."
 nor_CAS_effort:0 "근접항공지원 노력"
 nor_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중에서도 차량의 지원이 필요합니다."
 nor_rocket_effort:0 "로켓 노력"
 nor_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 기체 모두에게 전례 없는 속도를 가능하게 합니다. 이러한 기술을 선도하면 적을 기습할 수 있을 것입니다."
 nor_NAV_effort:0 "해군항공대 노력"
 nor_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서 벌어지듯, 일부는 해수면 위 공중에서 벌어집니다."
 nor_naval_effort:0 "해군 노력"
 nor_naval_effort_tt:0 "§Y해군 조선소§!를 지을 건설 슬롯이 부족합니다!"
 nor_naval_effort_desc:0 "해군 확장이 최우선 과제입니다. 모든 가용 자원을 새로운 조선소와 경수상함 연구에 할당해야 합니다."
 nor_flexible_navy:0 "유연한 해군"
 nor_flexible_navy_desc:0 "잠수함 기술의 발전을 고려하여 해전을 재창조하면 적 수송선단을 효율적으로 타격할 수 있을 것입니다."
 nor_large_navy:0 "대규모 해군"
 nor_large_navy_desc:0 "대형함을 수용하고 무역 수송선단의 안전을 보장하도록 해군 교리를 조정하면 어떤 종류의 함선이 필요한지에 대해 많은 것을 배울 수 있을 것입니다."
 nor_submarine_effort:0 "잠수함 노력"
 nor_submarine_effort_desc:0 "잠수함전은 어뢰정 발명 이래 가장 흥미로운 해군 발전입니다. 잠수함으로부터 방어할 뿐만 아니라, 적 선박을 상대로 잠수함을 사용하는 것도 좋을 것입니다."
 nor_cruiser_effort:0 "순양함 노력"
 nor_cruiser_effort_desc:0 "고급 전함 연구에 착수하기 전에, 더 작은 순양함들을 교체해야 합니다."
 nor_destroyer_effort:0 "구축함 노력"
 nor_destroyer_effort_desc:0 "잠수함의 설계와 전략적 사용을 연구하면서, 우리는 그러한 전략에 대응하는 방법도 배웠습니다. 이를 위해 구축함이 중요할 것입니다."
 nor_capital_ships_effort:0 "주력함 노력"
 nor_capital_ships_effort_desc:0 "가장 많은 전함을 보유한 국가가 바다를 지배할 것입니다. 전함과 항공모함은 해군 우위의 과거와 현재를 대표합니다."
 nor_industrial_effort:0 "산업 노력"
 nor_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업을 대약진시키는 데 집중합니다."
 nor_industrial_effort_2:0 "산업 노력 II"
 nor_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 우리는 또 다른 위대한 산업 노력을 위해 국민을 동원할 수 있습니다."
 nor_construction_effort:0 "건설 노력"
 nor_construction_effort_tt:0 "§Y민간 공장§!을 지을 건설 슬롯이 부족합니다!"
 nor_construction_effort_desc:0 "전쟁이 세계를 위협할 때에도 민간 산업 역량을 과소평가해서는 안 됩니다."
 nor_production_effort:0 "군수 노력"
 nor_production_effort_tt:0 "§Y군수 공장§!을 지을 건설 슬롯이 부족합니다!"
 nor_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 nor_construction_effort_2:0 "건설 노력 II"
 nor_construction_effort_2_desc:0 "공장을 계속 확장하면 무역품 생산과 추가 건설 노력을 가속화할 수 있습니다."
 nor_production_effort_2:0 "군수 노력 II"
 nor_production_effort_2_desc:0 "민간 공장을 군사 장비 생산에 맞게 조정하려는 시도는 비효율적입니다. 지금 바로 군수 생산 준비에 집중해야 합니다."
 nor_production_effort_3:0 "군수 노력 III"
 nor_production_effort_3_desc:0 "새로운 장비 수요를 충족시키기 위해 군수 공장을 확장하려는 지속적인 노력이 필요합니다."
 nor_infrastructure_effort:0 "기반시설 노력"
 nor_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 고급 프로젝트나 건설을 추진할 수 없습니다."
 nor_infrastructure_effort_tt:0 "§Y기반시설§!을 지을 건설 슬롯이 부족합니다!"
 nor_infrastructure_effort_2:0 "기반시설 노력 II"
 nor_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 프로젝트에 필요한 수송과 통신이 가능해질 것입니다."
 nor_construction_effort_3:0 "건설 노력 III"
 nor_construction_effort_3_desc:0 "사회 기반 시설망 확충으로 건설 역량이 크게 향상되었습니다."
 nor_nuclear_effort:0 "핵 개발 노력"
 nor_nuclear_effort_desc:0 "세계를 바꿀 발견의 문턱에 서 있는 지금, 언젠가 지구를 집어삼킬 불을 다른 이들이 지피게 놔둘 수는 없습니다."
 nor_extra_tech_slot:0 "추가 연구 슬롯"
 nor_extra_tech_slot_desc:0 "산업 확장과 최근의 여러 발전으로 더 많은 연구개발을 병렬로 수행할 수 있게 될 것입니다."
 nor_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 nor_extra_tech_slot_2_desc:0 "국가의 급속한 산업화로 인해 우리가 추구해야 할 새로운 연구개발 기회가 열렸습니다."
 nor_technology_sharing:0 "노르웨이 경제대학교"
 nor_technology_sharing_desc:0 "수많은 로비와 노력, 특히 크리스토페르 렘쿨의 헌신 끝에, 1936년 9월 7일 월요일 호콘 7세 국왕에 의해 NHH가 마침내 개교했습니다."
 nor_secret_weapons:0 "전자공학 개발"
 nor_secret_weapons_desc:0 "모든 여유 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구와 같은 완전히 새로운 과학 분야에 있습니다."
 nor_political_effort:0 "뉘고르스볼 내각 강화"
 nor_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리 나라에 변화를 가져올 수 있어야 합니다. 정치적 입지를 강화하는 것이 우선입니다."
 nor_collectivist_ethos:0 "집단주의 정신"
 nor_collectivist_ethos_desc:0 "적들이 약소국을 분열시켜 정복할지라도, 우리 국민은 단결하여 맞설 것입니다. 하나는 모두를 위하고, 모두는 하나를 위합니다."
 nor_liberty_ethos:0 "자유주의 정신"
 nor_liberty_ethos_desc:0 "인간 정신을 억압하려는 이념적 광신도들의 시대에, 우리는 개인의 자유와 권리를 수호할 것입니다."
 nor_militarism:0 "군국주의"
 nor_militarism_desc:0 "군대를 필요악으로 여기는 자들은 전쟁 앞에서 주저할 수밖에 없습니다. 우리는 군국주의를 우리 문화에 뿌리내려 국민 모두가 군인이 되도록 할 것입니다."
 nor_political_correctness:0 "정치적 올바름"
 nor_political_correctness_desc:0 "약간 논란이 되거나 당혹스러운 의견을 가진 사람들이 자신들을 겨냥한 광범위한 음모가 있다고 우려하는 것 같습니다. 이는 훌륭한 생각처럼 보입니다."
 nor_neutrality_focus:0 "엄정 중립 선포"
 nor_neutrality_focus_desc:0 "다른 이들은 세계 분쟁에서 편을 드는 것이 용기와 지혜를 필요로 한다고 주장할지 모르나, 우리는 거부하는 것이 더 큰 용기와 지혜를 필요로 한다는 것을 압니다."
 nor_interventionism_focus:0 "개입주의 중점"
 nor_interventionism_focus_desc:0 "우리는 우리 국민뿐만 아니라 모든 이의 자유를 소중히 여깁니다. 폭정을 막는 것이 전쟁을 의미한다면, 기꺼이 감수할 것입니다."
 nor_military_youth:0 "군사 청년단"
 nor_military_youth_desc:0 "우리나라 젊은이들의 기강과 정치 교육을 증진하기 위한 조직은 조기에 충성심과 자기희생 정신을 함양할 것입니다."
 nor_deterrence:0 "억제력"
 nor_deterrence_desc:0 "홀로 서 있는 우리는 전쟁에서 이득을 보는 경우가 거의 없습니다. 다행히도, 우리는 최고의 방어란 결코 사용할 필요가 없을 정도로 잘 알려진 방어라는 것을 압니다."
 nor_volunteer_corps:0 "의용군"
 nor_volunteer_corps_desc:0 "국민에게 자유라는 이상을 위해 죽으라고 강요하는 것은 모순이겠지만, 해외의 사람들을 돕고자 하는 이들을 위한 수단을 마련하는 것은 그렇지 않습니다."
 nor_paramilitarism:0 "준군사주의"
 nor_paramilitarism_desc:0 "군사 원칙은 군대 밖에서도 적용될 수 있습니다. 우리 군을 보완할 준군사 부대를 개발함으로써 더 많은 사람이 군사 훈련을 받게 될 것입니다."
 nor_indoctrination_focus:0 "교화"
 nor_indoctrination_focus_desc:0 "우리의 이념을 진리에 기반한 것으로 확립했으니, 이제 진리로서 가르칠 수 있습니다. 교육과 언론은 이 교훈을 반영해야 합니다."
 nor_foreign_expeditions:0 "해외 원정"
 nor_foreign_expeditions_desc:0 "적들이 자신들의 이상을 위해 먼 곳의 분쟁에 개입할 준비가 되어 있으니, 우리도 우리의 이상을 위해 똑같이 준비해야 합니다."
 nor_why_we_fight:0 "우리가 싸우는 이유"
 nor_why_we_fight_effect:0 "§Y중립적 외교 정책§! 정신이 없다면, 세력을 생성할 수 있습니다.\n"
 nor_why_we_fight_desc:0 "세계는 점점 더 불안정해지고 있습니다. 우리 국민은 권력을 탐하는 자들이 저지르는 잔학 행위를 보아야 합니다. 이제 국민을 우리 대의에 결집시키고 모두가 자유를 위해 싸울 준비를 갖추도록 해야 할 때입니다."
 nor_political_commissars:0 "정치장교"
 nor_political_commissars_desc:0 "우리의 정책이 군사적으로도 관철되도록, 정치적으로 임명된 관리를 군 계급에 도입할 것입니다."
 nor_internationalism_focus:0 "국제주의 중점"
 nor_internationalism_focus_desc:0 "이념에는 국경이 없습니다. 다른 나라가 스스로를 주권 국가라 칭할지라도, 우리의 신념은 그러한 주장을 초월합니다."
 nor_nationalism_focus:0 "민족주의 중점"
 nor_nationalism_focus_desc:0 "우리 국가는 독특하며, 우리의 정치적 성과는 오직 이곳에서만 이룰 수 있었습니다. 어떤 대가를 치르더라도 이를 위해 싸워야 합니다."
 nor_ideological_fanaticism:0 "이념적 광신주의"
 nor_ideological_fanaticism_desc:0 "우리가 정치적으로 확립한 가치와 목표는 어떤 고대의 신앙만큼이나 목숨을 바칠 가치가 있습니다. 모든 추종자는 죽음을 마주할 준비가 되어 있어야 하며, 길을 벗어나는 자들은 죽음을 각오해야 할 것입니다."
 nor_narvik:0 "나르비크 항구"
 nor_narvik_desc:0 "나르비크 북부 항구는 북부 무역의 중요한 거점이며, 이 항구를 조국 수복을 위한 교두보로 삼을 수 있습니다."
 nor_coastal_forts:0 "오슬로 강화"
 nor_coastal_forts_desc:0 "추축국이 우리 수도를 재차 침공하려 할 경우에 대비해야 합니다."
 nor_combine_training:0 "연합 훈련"
 nor_combine_training_desc:0 "영국군과 함께 새로운 전투 방식을 배울 수 있으며, 그들 또한 우리에게서 배울 수 있습니다."
 nor_king_speech:0 "용감한 국왕"
 nor_king_speech_desc:0 "우리의 용감한 국왕 호콘은 항복을 거부하며 노르웨이인들이 저항하고 싸우도록 고무하고 있습니다."
 nor_lower_recruitment_standars:0 "징병 기준 완화"
 nor_lower_recruitment_standars_desc:0 "조국을 해방하기에 충분한 규모의 군대를 편성하려면 징병을 확대해야 하지만, 남은 지원자들은 너무 늙었거나 신체적으로 복무에 부적합합니다. 기준을 낮춤으로써, 질적 저하를 감수하는 대신 군대를 확장할 수 있습니다."
 nor_greenland:0 "그린란드 점령"
 nor_greenland_desc:0 "독일군에 맞서 싸우기 위해 그린란드의 노르드 형제들을 규합해야 합니다."
 nor_iceland:0 "아이슬란드 점령"
