  SIA_peaceful_pan_thaiism_category:0 "평화적 범타이주의"
  SIA_peaceful_pan_thaiism_category_desc:0 "시암, 라오스, 캄보디아 국가들 사이에 흩어져 있던 다양한 타이 민족들은 식민 전쟁 이후 분리되었습니다. 이제 세 국가가 각각 어느 정도 독립을 되찾았으니, 우리 민족의 안녕을 위해 세 국가의 통일이 필요하다는 것을 국민들에게 설득하기 위해 큰 노력을 기울여야 합니다.\n\n라오스 내 범타이주의 지지도: §Y[?SIA.laos_pan_thai_popularity]%§!\n\n캄보디아 내 범타이주의 지지도: §Y[?SIA.cambodia_pan_thai_popularity]%§!"
