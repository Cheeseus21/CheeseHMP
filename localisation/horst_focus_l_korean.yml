 NOR_sjoforsvaret:0 "Sjøforsvaret"

 NOR_sjoforsvaret_desc:0 "Norges marinförsvar, 노르웨이 해군은 우리의 제1 방어선입니다"
 NOR_norwegian_shipping:0 "노르웨이 해운"
 NOR_norwegian_shipping_desc:0 "노르웨이의 조선업자들은 세계를 선도합니다"
 NOR_merchant_marine_protection:0 "상선단 호위"
