 ##### KANTOKUEN BRANCH
 JAP_prepare_the_kantokuen:0 "관동군 특종 연습 준비"
 JAP_prepare_the_kantokuen_desc:0 "'관동군 특종 연습'은 일본 제국 육군 참모본부가 수립한 소련 극동 지역 침공 및 점령 작전 계획입니다. 7개 일본군과 제국 해공군 주력을 동원하는 이 작전은 일본 역사상 가장 큰 단일 제병합동작전이자, 역사상 가장 큰 작전 중 하나가 될 것입니다."
 JAP_bases_and_supply_lines_alongside_amur_river:0 "아무르 강변 기지 및 보급선"
 JAP_bases_and_supply_lines_alongside_amur_river_desc:0 "소련 극동으로 진격할 준비를 함에 따라, 우리는 아무르 강을 따라 있는 국경 지방에 기지를 개발해야 합니다. 철도, 도로, 공항, 병원, 군수 창고 등 모든 것이 우리가 전쟁의 뿔피리를 불 때를 대비해 준비되어야 합니다."
 JAP_RFA_use_the_anti_soviets:0 "반소련 세력 이용"
 JAP_RFA_use_the_anti_soviets_EXPL:0 "\n이것은 §C대응 중점§!입니다. 만약 '§H만주국군 개선§!' 중점을 완료했다면, 이 중점은 대신 다음과 같은 §G효과§!를 가집니다:\n"
 JAP_RFA_use_the_anti_soviets_desc:0 "소련 혁명 때문에 러시아를 떠났거나, 여전히 그곳에 남아 새 정권에 조용히 반대하는 사람들이 아직도 많이 있습니다. 이들 모두는 우리가 극동 정복 작전을 개시할 때 큰 도움이 될 수 있습니다."
 JAP_RFA_genrikh_lyushkovs_far_east_informations:0 "겐리흐 류시코프의 극동 정보"
 JAP_RFA_genrikh_lyushkovs_far_east_informations_desc:0 "겐리흐 사모일로비치 류시코프는 소련 장교이자 NKVD 요원입니다.\n최근 상황에 비추어 볼 때 그는 조국을 탈영하여 극동 지역 소련군에 대한 핵심 정보를 가지고 만주 국경을 넘을 의향이 있습니다. 만약 우리가 그를 받아들이는 데 동의한다면, 이는 우리에게 큰 이점을 제공할 수 있습니다."
 JAP_RFA_mobilize_the_white_russians:0 "백계 러시아인 동원"
 JAP_RFA_mobilize_the_white_russians_EXPL1:0 "\n이것은 §C대응 중점§!입니다. 만약 '§H만주국군 개선§!' 중점을 완료했다면, 이 중점은 대신 다음과 같은 §G효과§!를 가집니다:\n"
 JAP_RFA_mobilize_the_white_russians_EXPL2:0 "§H4§!개 아사노 전러시아 사단을 획득합니다.\n"
 JAP_RFA_mobilize_the_white_russians_desc:0 ""
 JAP_RFA_form_provisional_far_eastern_government:0 "극동 임시정부 수립"
 JAP_RFA_form_provisional_far_eastern_government_EXPL:0 "\n이 중점을 §C완료§!함으로써, 우리는 [SOV.GetFlag]§H[SOV.GetName]§!을(를) 성공적으로 정복한 후 극동에 세울 그들의 국가에 §H백계 러시아인§!에게 일정 수준의 §H자치권§!을 제공하는 데 동의할 것입니다."
