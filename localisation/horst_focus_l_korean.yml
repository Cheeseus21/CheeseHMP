 india.100.t:0 "행정부 분할"
 india.100.desc:0 "영국 정부가 아덴 식민지와 버마 식민지의 창설을 발표하면서, 우리 행정부의 규모가 상당히 축소되었습니다."
  
 RAJ_Tariff_Income:0 "관세 수입"
 RAJ_Increased_Trade_Volume:0 "무역량 증가"
 ENG_split_up_the_British_Raj:0 "영국령 인도 제국 분할"
 ENG_split_up_the_British_Raj_desc:0 "버마와 아덴에 별도의 식민지를 설립하여 식민 통치의 효율성을 높일 것입니다."
 raj_port_operation:0 "현재 항구 확보 작업을 진행 중입니다."
 india.295.t:0 "인도, 코민테른 가입 제안"
 india.295.desc:0 "최근 유럽의 제국주의 식민 지배자들을 축출하고 코민테른에 가입한 인도는 이후 남아시아에서 영향력을 확대했으며, 이제 우리에게 세계 프롤레타리아 동맹에 가입할 의사가 있는지 묻고 있습니다."
 india.295.a:0 "만국의 노동자여, 단결하라!"
 india.295.b:0 "차라리 모스크바의 노선에서 벗어나겠습니다."

 india.296.t:0 "인도, [RAJ.GetFactionName] 가입 제안"
 india.296.desc:0 "최근 유럽의 제국주의 식민 지배자들을 축출하고 [RAJ.GetFactionName]을(를) 창설한 인도는 이후 남아시아에서 영향력을 확대했으며, 이제 우리에게 남아시아 프롤레타리아 동맹에 가입할 의사가 있는지 묻고 있습니다."
 india.296.a:0 "만국의 노동자여, 단결하라!"
 india.296.b:0 "차라리 델리의 노선에서 벗어나겠습니다."
 
 india.400.t:0 "고아에 감도는 소문"
 india.400.desc:0 "식민 도시 고아에서 임박한 침공에 대한 소문이 돌고 있습니다. 누구나 이런 시나리오를 상상할 수는 있겠지만, 우리 최고 사령부는 미묘한 사단 이동을 감지했습니다. 침공은 450년간 포르투갈에 충성해 온 현지 주민들에게 재앙적인 결과를 초래할 수 있습니다. 우리가 입장을 고수한다면 국제 사회는 아마 우리를 지지할 것입니다. 하지만 진정으로 국제 사회의 지원이 인도군을 막아낼 수 있을까요? 우리 군이 이 임무를 감당할 수 있을까요? 질문은 쉽지만, 답하기는 어렵습니다."
 india.400.a:0 "그들은 지나갈 수 없다!"
 india.400.b:0 "차라리 피를 흘리지 않겠습니다."
 
 india.401.t:0 "인도, 고아 점령 성공"
 india.401.desc:0 "남아시아에 몇 안 남은 유럽 식민주의의 잔재 중 하나가 새로 수립된 [RAJ.GetNameDef]의 손에 넘어갔습니다. 포르투갈 제국은 무너지고 있는 것 같습니다."
 india.401.a:0 "식민주의자들을 몰아내라!"
 india.401.b:0 "포르투갈에게는 슬픈 날입니다."
 
 india.402.t:0 "인도, 고아 점령 실패"
 india.402.desc:0 "포르투갈군은 인도 공격군에 용감히 맞서 싸워 격퇴했으며, 포르투갈 제국의 작은 일부를 지켜냈습니다."
 india.402.a:0 "이 빌어먹을 식민주의자들."
 india.402.b:0 "우리 제국은 오늘도 건재합니다."
 
 india.403.t:0 "인도, [320.GetName]에서 국민투표 추진"
 india.403.desc:0 "우리 식민지인 프랑스령 인도에서 대규모 시위 운동이 일어났습니다. 이 불안의 물결 배후에는 새로 수립된 인도 정부가 있는 것으로 보입니다. 대부분의 식민지 고문들은 이 소수의 항구와 도시들이 실질적인 경제적 이익을 제공하지 않으므로 포기할 것을 제안합니다. 우리는 이 운동을 진압할 수도 있습니다. 만약 진압을 시도한다면, 예기치 못한 결과에 대비하는 것이 바람직합니다."
 india.403.a:0 "총독을 데려오시오."
 india.403.b:0 "민주주의의 흐름에 맡기시오."
 
 india.404.t:0 "프랑스령 인도 문제"
 india.404.descre:0 "현지 경찰력이 진압에 지쳐감에 따라 시위는 계속 확산되고 있습니다. 처음부터 시위를 진압하는 것은 불가능해 보였습니다. 하지만 우리는 한순간의 망설임도 없이 제국 통치를 강화하기로 결정했습니다. 그러나 이 결정은 섬의 행정관들 사이에서 그다지 인기가 없었으며, 그들은 현지 요구에 굴복하여 해당 주를 인도에 넘겨주었습니다."
 india.404.desc:0 "국민투표는 예상대로 인도와의 통합에 찬성하는 결과가 나왔으며, 우리는 이 이양을 막을 힘이 없습니다. 현지 [Root.GetAdjective]군은 철수하고, 행정관들은 재배치되며, [Root.GetAdjective] 국기는 내려지고 마침내 인도 국기가 게양될 것입니다."
 india.404.a:0 "어디 한번 두고 봅시다."
 india.404.b:0 "우리가 겪어온 일들을 생각하면, 다소 허무한 결말이군."
 
 india.405.t:0 "버마 문제"
 india.405.desc:0 "우리는 오랫동안 버마를 인도에서 분리하는 것을 고려해왔으며, 일부 외교관들은 이미 행정 계획을 수립하고 있습니다. [Raj.GetNameDef] 정부는 경제적, 행정적 목적을 위해 아대륙을 분할된 상태로 유지해 달라고 우리에게 간청했습니다. 이 계획들을 포기하면 우리 외교관들이 다른 분야에 집중할 여유가 생길 것입니다."
 india.405.a:0 "우리에겐 더 중요한 일이 있습니다."
 india.405.b:0 "우리 외교관들은 계속 임무를 수행할 것입니다."
 
 india.406.t:0 "영국이 우리의 요청을 수락했습니다."
 india.406.desc:0 "별도의 버마 행정부 수립 계획을 짜던 영국 외교관들이 다른 임무에 재배치되었으며, 우리 행정부는 온전하게 유지되었습니다."
 india.406.a:0 "현명한 결정입니다."
 
 india.407.t:0 "영국이 우리의 요청을 거부했습니다."
 india.407.desc:0 "영국 정부는 인도를 통일 상태로 유지하려는 우리의 청원을 전면 거부했으며, 영국 외교관들은 버마 식민지 계획을 계속 추진하고 있습니다."
 india.407.a:0 "저주받을 앵글로 놈들."
 
 india.408.t:0 "실론 문제"
 india.408.desc:0 "우리의 새로운 동등한 동맹인 인도가 스리랑카의 소위 동맹국에 대해 점점 더 압력을 가하고 있습니다. 최근 몇 달간 독립을 향한 그들의 외침이 더욱 커지고 있지만, 우리가 과연 제국의 이 중요한 부분을 포기해야 할까요?"
 india.408.a:0 "그들에게 자치령 지위를 부여할 것이다."
 india.408.b:0 "그들이 우리의 국내 정책을 좌우하게 놔둘 순 없다."
 
 india.409.t:0 "영국이 우리의 요청을 수락했습니다."
 india.409.desc:0 "영국 정부가 이전 왕령 식민지였던 실론에 [SRL.GetNameDef]라는 새로운 이름으로 자치령 지위를 부여했습니다. 이는 아시아 원주민들에게 위대한 승리입니다."
 india.409.a:0 "즉시 대사관 설립을 추진할 것이다."
 
 india.410.t:0 "영국이 우리의 요청을 거부했습니다."
 india.410.desc:0 "영국은 실론 식민지를 포기할 의사가 없다고 답신했습니다. 이는 아시아 원주민들에게 상당한 타격입니다."
 india.410.a:0 "저주받을 앵글로 놈들."
 
 burma_separate:0 "버마 식민지가 설립되었습니다"
 plead_against_seperation:0 "버마 식민지 설립 반대 로비"
 plead_against_seperation_desc:0 "영국은 오랫동안 우리 행정부에서 버마를 분리하여 별도의 식민지를 만들 계획을 세워왔습니다. 우리는 이 문제에 대한 우리의 의견을 영국에게 알려야 합니다."
 raj_prevent_state_modifier:0 "§Y버마§!가 자체 식민지가 되어 우리가 그들 자원의 §Y대부분§!을 §R잃는§! 것을 방지합니다."
 
 RAJ_port_of_yanoan:0 "코엘 작전"
 RAJ_port_of_yanoan_desc:0 "현지 주민들에게 인도와의 통일에 대한 국민투표를 약속하면, 프랑스는 우리의 요청을 거부할 명분이 없을 것입니다."
 
 RAJ_port_of_goa:0 "브릭샤 딥 작전"
 RAJ_port_of_goa_desc:0 "유럽 식민주의의 마지막 사악한 잔재 중 하나는 정당한 주인에게 반환되어야 합니다. 필요하다면 무력을 동원해서라도 말입니다."
 
 GOA_border_incident_notification:0 "임박한 국경 전쟁"
 
 RAJ_border_incident_forgotten:0 "잊혀진 국경 전쟁."
 RAJ_escalate_incident_to_border_conflict_GOA:0 "고아 국경 전쟁 격화."
 
 south_asian_liberation:0 "남아시아 해방"
 south_asian_liberation_desc:0 "남아시아에 반란의 씨앗을 뿌리기 위해, 우리는 억압받는 국가들에 군사 및 정치적 원조를 보내야 합니다.\n\n봉기와 관련된 중점을 완료하면, 어떠한 보복으로부터도 방어할 수 있도록 정치적 지원과 무기가 전달될 것입니다.\n\n[RAJ.GetSalVariable]"
 raj_sal_variable:0 "[SRL.GetFlag] §Y스리랑카§! §R봉기§!용 무기: §Y[?SRL_arms]§!.\n[SRL.GetFlag] §Y랑카 사마 사마자당§! §R봉기§! 지원: §Y[?SRL_pol]§!.\n\n[NEP.GetFlag] §Y네팔§! §R봉기§!용 무기: §Y[?NEP_arms]§!.\n[NEP.GetFlag] §Y네팔 공산당§! §R봉기§! 지원: §Y[?NEP_pol]§!.\n\n[SRL.GetFlag] §Y부탄§! §R봉기§!용 무기: §Y[?BHU_arms]§!.\n[BHU.GetFlag] §Y부탄 공산당§! §R봉기§! 지원: §Y[?BHU_pol]§!."
 raj_may_lead_to_war:0 "§R전쟁으로 이어질 수 있습니다!§!"
 ilp_bhu_uprising:0 "§Y부탄 공산당§!이 [BHU.GetLeader]을(를) 축출하고 §Y공산주의§! 정부를 수립할 것입니다."
 ilp_srl_uprising:0 "§Y랑카 사마 사마자당§!이 실론 식민 정부에 대항하여 봉기하고 §Y영국 제국주의§!의 분노에 저항할 것입니다!"
 ilp_nep_uprising:0 "§Y네팔 공산당§!이 라나 왕조를 전복시키고 §Y사회주의§!를 도입할 것입니다."
 
 RAJ_eastern_forts:0 "버마의 방어가 용이한 동부 위치에 §Y2개의 육상 요새§!를 건설합니다."
 raj_push_even_further:0 "더욱 밀어붙이기"
 raj_push_even_further_desc:0 "시민권은 아무리 발전해도 충분하지 않습니다. 우리는 과거 인도가 저지른 모든 잘못을 바로잡아 우리 사회가 안심하고 잠들 수 있도록 해야 합니다."
