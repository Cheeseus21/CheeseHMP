 ETH_army_effort:0 "육군 총력"
 ETH_army_effort_desc:0 "공중전과 해전의 가능성이 증대되고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 준비를 통해, 우리는 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 ETH_why_we_fight:0 "우리가 싸우는 이유"
 ETH_why_we_fight_effect:0 "§Y중립 외교 정책§! 정신이 없다면, 파벌을 생성할 수 있게 될 것입니다.\n"
 ETH_why_we_fight_desc:0 "세계는 점점 더 불안정해지고 있습니다. 우리 국민은 권력을 탐하는 자들이 저지르는 잔학 행위를 목도해야 합니다. 이제 우리 대의에 국민을 결집시키고 모두가 자유를 위해 싸울 준비를 갖추도록 해야 할 때입니다."

