 RAJ_nep_gurkhas:0 "§H8개§! 산악 사단이 §H카트만두§!에서 우리 지휘 하에 모집될 것입니다."
 RAJ_viceroy:0 "인도 총독령"
 RAJ_viceroy_desc:0 "인도 총독은 국왕의 대리인이며 국왕을 대신하여 결정을 내릴 모든 권한을 가집니다. '인도 총독'이라고도 불리는 총독의 지위는 인도 국민회의의 급진파에 의해 의문이 제기되었습니다."
 RAJ_guided_by_britain:0 "영연방 유대 강화"
 RAJ_guided_by_britain_desc:0 "영국 왕실에 가깝고 충성스럽게 머무름으로써 우리는 영국령 인도를 더 나은 미래로 이끌 수 있습니다."
 RAJ_ban_the_quit_india_movement:0 "인도 퇴거 운동 금지"
 RAJ_ban_the_quit_india_movement_desc:0 "간디의 인도 독립 운동은 영국이 인도를 떠나라는 요구와 함께 절정에 달했습니다. 제국에 대한 그러한 요구는 용납될 수 없습니다!"
 RAJ_the_x_force:0 "X 부대"
 RAJ_the_x_force_desc:0 "버마 인근의 중국 정규군은 우리 영토로 후퇴할 기회가 있습니다. 만약 우리가 그들을 받아들인다면 그들은 우리 야전 사령관의 통제 하에 들어올 것입니다."
 RAJ_nepalese_gurkhas:0 "네팔 구르카 용병"
 RAJ_nepalese_gurkhas_desc:0 "일본의 위협이 커짐에 따라, 우리는 네팔 왕국에 지원 요청을 보내는 것을 고려해야 합니다."
