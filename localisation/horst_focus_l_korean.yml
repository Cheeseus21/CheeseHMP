 cold_train_tt:0 "§C우리의 모든 장군들은 혹한 기후 조건에 적응할 것입니다!§!"
 SOV_cold_train:0 "혹한기 전투 훈련"
 SOV_cold_train_desc:0 "우리의 장군들은 동장군에 맞서 싸우기보다, 그를 이용해 싸우는 법을 배울 것입니다."
 SOV_son:0 "축복받은 병사들"
 SOV_father:0 "축복받은 무기들"
