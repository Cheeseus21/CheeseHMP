 india.279.t:0 "여성의 지위"
 india.279.desc:0 "우리는 이전 행정부로부터 이어진 많은 정책과 불의를 이미 다루었지만, 성 평등 문제만큼은 완전히 회피해왔습니다. 이 문제에 대해서는 달래야 할 의견이 많으며, 이 문제를 신속하게 처리하는 것이 최선입니다."
 india.279.a:0 "우리의 후진성을 계속 이어가서는 안 됩니다."
 india.279.b:0 "여기서 성급하게 굴지 맙시다."
 india.279.c:0 "일부 전통은 유지하는 편이 낫습니다."

 india.280.t:0 "총독의 우려"
 india.280.desc:0 "총독의 직책은 지방 선거와 거리를 두어야 하지만, 우리의 선거 운동을 방해하려는 시도가 있었다는 소문이 있습니다. 물론 그 시도가 크게 성공했다면 우리가 이 자리에 있지도 못했겠지요. 그럼에도 총독은 자신의 지위를 이용해 부적절하다고 여기는 정책을 뒤엎고 우리의 운동을 방해할지 여부를 저울질하는 것 같습니다. 총독의 분노를 피하려면 신중하게 행동해야 합니다."
 india.280.a:0 "그는 신경 쓸 필요 없습니다."

 india.281.t:0 "우리의 정책에 대한 간섭"
 india.281.desc:0 "권력에 굶주린 식민주의자 총독이 우리가 사설 철도와 일반 기반 시설을 장악한 기회를 포착하여, 늘 그랬듯이 변화를 되돌리고 인도의 유통망을 방치했습니다. 이 모든 것이 고작 무엇을 위한 것이었을까요? 사소하고 보잘것없는 정치적 이득을 위해서였습니다. 이 조치 자체는 인도 국민에게 널리 비판받았고 총독의 결정은 보기 좋게 역효과를 낳았습니다. 영국의 선의를 믿었던 소수의 원주민들마저 마침내 그들의 본모습, 즉 착취적이고 가식적인 제국주의자라는 것을 깨닫게 되었습니다."

 india.282.desc:0 "권력에 굶주린 식민주의자 총독이 우리가 직원들을 위해 사설 공장과 일반 기업을 장악한 기회를 포착하여, 늘 그랬듯이 변화를 되돌리고 인도의 경제를 방치했습니다. 이 모든 것이 고작 무엇을 위한 것이었을까요? 사소하고 보잘것없는 정치적 이득을 위해서였습니다. 이 조치 자체는 인도 국민에게 널리 비판받았고 총독의 결정은 보기 좋게 역효과를 낳았습니다. 영국의 선의를 믿었던 소수의 원주민들마저 마침내 그들의 본모습, 즉 착취적이고 가식적인 제국주의자라는 것을 깨닫게 되었습니다."

 india.283.desc:0 "권력에 굶주린 식민주의자 총독이 우리가 은행 협동조합을 장악한 기회를 포착하여, 늘 그랬듯이 변화를 되돌리고 인도의 유통망을 방치했습니다. 이 모든 것이 고작 무엇을 위한 것이었을까요? 사소하고 보잘것없는 정치적 이득을 위해서였습니다. 이 조치 자체는 인도 국민에게 널리 비판받았고 총독의 결정은 보기 좋게 역효과를 낳았습니다. 영국의 선의를 믿었던 소수의 원주민들마저 마침내 그들의 본모습, 즉 착취적이고 가식적인 제국주의자라는 것을 깨닫게 되었습니다."
 
 india.291.t:0 "스리랑카의 백지 평화 제안"
 india.291.d:0 "스리랑카 대표단이 마두라이에서 우리 대표단과 만나 양국의 평화와 번영을 향한 중요한 발걸음을 내디뎠습니다."
 india.292.t:0 "네팔의 백지 평화 제안"
 india.292.d:0 "네팔 대표단이 델리에서 우리 대표단과 만나 양국의 평화와 번영을 향한 중요한 발걸음을 내디뎠습니다."
 india.293.t:0 "부탄의 백지 평화 제안"
 india.293.d:0 "부탄 대표단이 캘커타에서 우리 대표단과 만나 양국의 평화와 번영을 향한 중요한 발걸음을 내디뎠습니다."
 india.294.t:0 "여성 인권 단체들이 요구를 관철합니다."
 india.294.d:0 "선거 기간 동안 우리는 여러 여성 인권 단체에 완전한 평등을 약속했습니다. 그 덕분에 많은 표를 얻었고, 어쩌면 그들 덕분에 선거에서 이겼을지도 모릅니다. 이제 우리가 그 약속을 어겼으니, 그들이 다시 우리를 압박하고 있습니다."
 india.294.a:0 "그다지 좋은 생각은 아니었습니다."
 india.2940.t:0 "여성 인권 단체들이 해명을 요구합니다."
 india.2940.d:0 "선거 기간 동안 우리는 전국의 여러 여성 단체에 도움을 구하며, 여성의 권리를 위해 끝까지 나아갈 의지가 있는 것은 우리뿐이라고 약속했습니다. 하지만 우리의 약속은 아직 이행되지 않았고, 이는 우리 내부에서도 의문을 제기하게 만들었습니다."
 india.2940.a:0 "언젠가는 처리할 겁니다."
 women_rights_demands_tt:0 "압박을 받기 전에 완전한 평등을 제정하는 것이 현명할 것입니다."
 india.291.a:0 "마침내 평화가."
 india.291.b:0 "제국을 위해, 항복은 없습니다."
 RAJ_Immediate_Famine_Response:0 "즉각적인 기근 대응"
 RAJ_Further_Recovery_Efforts:0 "추가 기근 복구 노력"
 grant_concessions_to_the_british:0 "영국에 이권 양도"
 grant_concessions_to_the_british_desc:0 "소규모 자원 이권을 영국에 양도하면, 그들이 우리를 더 순순히 놓아줄 것입니다."
 grant_concessions_to_the_british_2:0 "영국에 추가 이권 양도"
 grant_concessions_to_the_british_2_desc:0 "더 큰 규모의 자원 이권을 영국에 양도하면, 그들이 우리를 더 순순히 놓아줄 것입니다."
 organize_large_scale_strikes:0 "대규모 파업 조직"
 organize_large_scale_strikes_desc:0 "노동자 착취는 영국인들만 저지르는 것이 아니지만, 그들로부터 벗어나는 것이 해방의 첫걸음이 될 것입니다. 우리는 영국이 손을 쓰도록 강제하기 위해 광범위한 파업에 돌입할 것입니다."
 instigate_communal_violence:0 "공동체 폭력 선동"
 instigate_communal_violence_desc:0 "식민 지배자들을 압박하려던 다른 방법들은 실패했습니다. 남은 유일한 선택지는 영국이 그에 맞춰 반응하리라는 희망을 품고, 긴장 상태에 있는 다민족 도시들의 불길을 부채질하는 것뿐인 듯합니다."
 promote_ethnic_harmony:0 "민족 화합 증진"
 promote_ethnic_harmony_desc:0 "진나와 그의 무슬림 연맹이 소수 집단의 분리를 설파하는 동안, 우리는 정반대의 입장을 취해야 합니다. 지속적인 민족적, 문화적, 종교적 화합을 지지하는 입장 말입니다."
 utilize_more_extrem_factions:0 "극단주의 분파 활용"
 utilize_more_extrem_factions_desc:0 "우리의 주된 활동은 순조롭게 진행되는 듯하지만, 비밀리에 극단주의자들을 지원함으로써 협상에서 우위를 점할 수도 있습니다."
 concede_to_capitalists:0 "자본가에게 양보"
 concede_to_capitalists_desc:0 "우리나라의 부유한 산업가들에게 지원을 약속함으로써, 영국 대표단에 맞설 그들의 지지를 확보할 것입니다."
 hinder_pak_influence:0 "전인도 무슬림 연맹 영향력 방해"
 hinder_pak_influence_desc:0 "우리는 아대륙을 확보하려는 파키스탄 대표단의 노력을 방해해야 합니다."
 appeal_for_international_support:0 "국제적 지지 호소"
 appeal_for_international_support_desc:0 "우리 외교관들이 영국을 압박하기 위해 노력하고 있지만, 외국 정부의 지지를 받는다면 더욱 효과적일 것입니다."
 india.10.t:0 "[?RAJBACKER.GetName](이)가 자유 인도를 요구합니다."
 india.10.e:0 "[?RAJBACKER.GetAdjective] 정부가 현재 독립을 위해 노력 중인 §Y인도§! 대표단에 대한 공식적인 외교 지지를 표명했습니다. 그들에게 발언할 특권을 부여하면 우리의 식민 통치에 반대하기가 더 쉬워질 수 있습니다."
 india.10.a:0 "최소한 발언할 기회는 줍시다."
 india.10.b:0 "우리의 정책을 [?RAJBACKER.GetNameDef] 마음대로 정하게 두지 않겠습니다."
 indinfluence15:0 "§Y인도 대표단§!이 §Y인도 독립§!을 위해 압력을 가하기가 더 쉬워질 것입니다!"
 increase_both_influence:0 "전인도 무슬림 연맹과의 협력"
 increase_both_influence_desc:0 "우리의 노력을 결합함으로써, 영국이 아대륙을 식민주의에서 더 빨리 해방시키도록 더욱 효율적으로 압력을 가할 것이나, 우리의 위대한 국가가 둘로 갈라질 가능성을 감수해야 합니다."
 declare_independence_100_influence:0 "§Y[Root.GetReigningGovernmentColor]§!은(는) 영국에 §Y100의 영향력§!을 행사해야 합니다"
