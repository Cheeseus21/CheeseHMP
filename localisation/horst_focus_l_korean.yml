 efr_industrial_effort:0 "산업 총력"
 efr_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업 육성에 집중하여 위대한 도약을 이룩할 것입니다."
 efr_industrial_effort_2:0 "산업 총력 II"
 efr_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로 국민을 동원하여 또 다른 위대한 산업 총력을 기울일 수 있습니다."
 efr_construction_effort:0 "건설 총력"
 efr_construction_effort_tt:0 "§Y민간 공장§을 지을 건설 슬롯이 부족합니다!"
 efr_construction_effort_desc:0 "전쟁의 그림자가 세계를 뒤덮을 때에도 민간 산업 역량을 과소평가해서는 안 됩니다."
 efr_construction_effort_2:0 "건설 총력 II"
 efr_construction_effort_2_desc:0 "공장을 계속 확장하면 무역품 생산과 추가 건설 노력을 가속할 수 있습니다."
 efr_construction_effort_3:0 "건설 총력 III"
 efr_construction_effort_3_desc:0 "기반시설망 확장은 우리의 건설 역량을 크게 향상시켰습니다."
 efr_production_effort:0 "군수 총력"
 efr_production_effort_tt:0 "§Y군수 공장§을 지을 건설 슬롯이 부족합니다!"
 efr_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 군수 생산 능력이 뒤처지게 놔둬서는 안 됩니다."
 efr_production_effort_2:0 "군수 총력 II"
 efr_production_effort_2_desc:0 "민간 공장을 군수 장비 생산에 맞게 개조하는 것은 비효율적입니다. 지금 당장 군수 생산 준비에 집중해야 합니다."
 efr_production_effort_3:0 "군수 총력 III"
 efr_production_effort_3_desc:0 "새로운 장비 수요를 충족하려면 군수 공장을 확장하려는 지속적인 노력이 필요합니다."
 efr_infrastructure_effort:0 "기반시설 총력"
 efr_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 고급 사업이나 건설을 추진할 수 없습니다."
 efr_infrastructure_effort_tt:0 "§Y기반시설§을 지을 건설 슬롯이 부족합니다!"
 efr_infrastructure_effort_2:0 "기반시설 총력 II"
 efr_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 사업에 필요한 수송과 통신이 가능해질 것입니다."
 efr_political_effort:0 "정치 총력"
 efr_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리나라에 변화를 가져올 수 있어야 합니다. 우리의 정치적 입지를 강화하는 것이 우선입니다."
 order227_set:0 "명령 227호가 자동으로 발령되었습니다"
 SOV_southern_thrust_tt:0 "영연방 사단과 협력하여 신속한 페르시아 침공을 조율할 것입니다. 이는 페르시아를 소련과 영국의 영향권으로 분할할 것입니다.  \n \n"

 the_plan_tt:0 "§R주목: 바닐라 중점은 미국/영국제가 아닌 캐나다제 항공기에만 적용됩니다§!"
 
 efr_army_effort:0 "육군 투자"
 efr_army_effort_desc:0 "공중전과 해전의 가능성이 증대되고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 철저히 준비한다면, 참호전의 지옥을 되풀이하는 것을 피할 수 있을 것입니다."
 efr_equipment_effort:0 "장비 투자"
 efr_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 병력에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 efr_motorization_effort:0 "차량화 투자"
 efr_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 이탈시키는 데 매우 중요합니다. 이러한 개발에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 efr_doctrine_effort:0 "교리 투자"
 efr_doctrine_effort_desc:0 "대전쟁 당시의 지상전을 정의했던 군사 교리는 이제 구식이 되었습니다. 우리는 최고의 두뇌들을 동원하여 미래의 군사 사상을 정립해야 합니다."
 efr_equipment_effort_2:0 "장비 투자 II"
 efr_equipment_effort_2_desc:0 "우리는 보병과 지원 부대가 당대 최고의 장비로 무장할 수 있도록 지속적으로 노력할 것입니다."
 efr_mechanization_effort:0 "기계화 투자"
 efr_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고함으로써, 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 efr_doctrine_effort_2:0 "교리 투자 II"
 efr_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 우리는 이를 반영하기 위해 지속적으로 교리를 재평가해야 합니다."
 efr_equipment_effort_3:0 "장비 투자 III"
 efr_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 efr_armor_effort:0 "기갑 투자"
 efr_armor_effort_desc:0 "보병 기계화 과정에서 얻은 교훈을 적용하여, 기갑 차량 또한 개선할 수 있습니다."
 efr_special_forces:0 "특수부대"
