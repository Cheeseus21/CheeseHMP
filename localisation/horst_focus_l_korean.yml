 RAJ_Reinvigorated_Imperial_Shipping:0 "제국 해운 활성화"
 RAJ_Expanding_the_Indian_Air_Force:0 "인도 공군 확장"
 RAJ_Expanding_the_Indian_Air_Force_desc:0 "인도 공군은 현재 아대륙의 제공권을 장악하기 위해 조종사 훈련과 항공기 생산을 늘리고 있습니다."
 RAJ_Caste_Debuff_4:0 "분리주의적 카스트 제도"
 RAJ_Caste_Debuff_4_desc:0 "게이머의 순간"
 RAJ_Caste_Debuff_3:0 "카스트 제도"
 RAJ_Caste_Debuff_3_desc:0 "일부 형태의 카스트 제도는 고대 인도부터 존재했지만, 시간이 지나면서 당시 인도의 황제에게 더 적합하도록 변형되었으며 영국령 라지도 예외는 아니었습니다. 오히려 그 반대로, 카스트 제도는 영국 행정부에 의해 명확하게 정의되고 널리 사용되었습니다. 이는 대학 입학 제한부터 고도로 계획되고 제한적인 군대에 이르기까지 인도 사회의 모든 측면에 스며들어 있습니다. 어떤 이들은 이를 부도덕한 악으로 보지만, 다른 이들은 이를 사회의 논리적인 조직으로 봅니다."
 RAJ_Caste_Debuff_3_mit:0 "완화된 카스트 제도"
 RAJ_Caste_Debuff_3_mit_desc:0 "카스트 제도의 최악의 폐단은 억제되었지만, 공동체와 사회 계층 간의 불평등은 여전히 만연합니다."
 RAJ_Caste_Debuff_2:0 "개혁된 카스트 제도"
 RAJ_Caste_Debuff_2_desc:0 "이처럼 전통주의적인 사회에서 카스트 제도를 해체하는 것은 어려운 일이지만, 평등을 향한 끊임없는 진전은 필연적으로 더 나은 결말을 가져올 것입니다."
 RAJ_Caste_Debuff_1:0 "법적으로 해체된 카스트 제도"
 RAJ_Caste_Debuff_1_desc:0 "모든 저항과 시위를 뚫고, 우리는 마침내 완전한 법적 평등을 달성했으며 필요한 모든 의지력을 동원하여 이를 시행할 것입니다."
 RAJ_Caste_Buff:0 "완전히 해체된 카스트 제도"
 RAJ_Caste_Buff_desc:0 "법적 평등도 좋지만, 수백 년간의 차별로 인해 많은 지역 사회가 여전히 빈곤하며 그 상태에서 벗어나기 어려울 것입니다. 그렇기 때문에 이들 공동체를 향한 차별 철폐 조치가 유일한 도덕적 선택입니다."
 RAJ_Establishing_National_Government:0 "국가 정부 건설"
 RAJ_Establishing_National_Government:0 "우리는 현재 헌법을 제정하고 있으며, 이를 통해 역사상 최초로 마주할 수 있는 모든 역경에 맞설 준비가 된 토착 민주주의 아대륙 정부를 건설하고 있습니다."
 RAJ_Expanded_Police_Force:0 "확장된 경찰력"
 raj_not_in_famine:0 "현재 §R기근§! §Y상태§!가 아니거나 §Y회복 중§!이 아님"
