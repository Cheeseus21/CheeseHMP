 GER_fortify_the_vaterland_tt:0 "이 중점은 요새화를 위한 모든 최신 기술을 연구할 것입니다."
 
 JAP_a_green_persimmon_tt:0 "소비에트는 전쟁 준비를 마치고 국경에 충분한 보급품과 전차 사단을 배치할 것입니다."
 JAP_the_persimmon_has_ripened_tt:0 "소비에트는 우리의 공격에 대비하지 못할 것입니다, 천황 폐하 만세!"
 
 JAP_the_imperial_defense_plan:0 "제국 국방 계획"
