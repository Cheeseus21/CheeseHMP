 wtt_news.44.t:0 "푸이가 천명을 주장하다"
 wtt_news.44.desc:0 "중국 황제에 걸맞은 화려한 용포를 입고, 천자이자 만세의 군주, 대청 제국의 황제인 아이신기오로 푸이가 이례적인 두 번째 대관식을 통해 용상에 올랐으며 이제 선조들처럼 자금성 안에 거주하고 있습니다. 그는 이전의 연호를 되찾고 다시 선통제로 선포되었습니다. 옛 관습을 따라, 선통제는 중국 내전에서 거둔 군대의 승리가 자신이 중국을 이끌 천명을 받았다는 증거라고 주장합니다.\n\n이전 황제들이 주장했던 것처럼 '천하'를 아우를 때까지 통치를 넓히려 할지는 아직 지켜봐야 할 일입니다."
 wtt_news.44.a:0 "천자가 돌아왔다."
 wtt_news.44.b:0 "잘못된 것이 바로잡혔다."
 wtt_news.44.c:0 "대체 자기가 뭐라고 생각하는 거지?"
 
 SOV_secure_leningrad_tt:0 "이 중점은 폴란드가 항복하면 완료됩니다. \n\n완료 시 핀란드와의 전쟁이 활성화됩니다."
 SOV_baltic_security_tt:0 "이 중점은 "단치히냐 전쟁이냐" 중점 이후 285일이 지난 1940년 6월 12일에 완료됩니다. \n\n완료되면 모든 발트해 국가가 귀하에게 양도되고 해당 지역에 핵심 주가 추가됩니다."
 SOV_claims_on_poland_tt:0 "이 중점은 폴란드가 항복하면 완료됩니다. \n\n"몰로토프-리벤트로프 조약"에 따라 독일과 합의한 주들을 양도받게 됩니다."
 SOV_claim_on_bessarabia_tt:0 "이 중점은 1940년 7월 2일에 완료됩니다. \n\n베사라비아 주들이 귀하에게 양도되고 해당 지역에 핵심 주가 추가됩니다."
 SOV_preemptive_invasion_of_iran_tt1:0 "이 중점은 연합국이 이란에 선전포고하면 완료됩니다. \n\n이 중점은 국경을 방어하기 위해 이란 주에 특수부대를 생성합니다. \n\n또한 연합국에 "이란 장군"을 제공합니다."
 
