 CAN_wartime_industries_control_board:0 "전시 산업 통제 위원회"
 CAN_wartime_industries_control_board_desc:0 "전쟁 수행을 위해 생산을 감독하고, 자원을 할당하며, 산업을 조정할 중앙 집권적 기관을 창설해야 합니다."
 CAN_dominion_housing_act:0 "자치령 주택법"
 CAN_dominion_housing_act_desc:0 "현대화되는 자치령은 전국에 걸쳐 표준화된 주택 규제를 마련해야 합니다. 우리는 모든 캐나다인의 생활 환경을 개선해야 합니다."
 CAN_expand_national_housing:0 "국가 주택 확대"
 CAN_expand_national_housing_desc:0 "자치령 주택법의 성공에 따라, 주택 부족 문제를 해결하고 이 어려운 시기에 국가적 단결을 도모하기 위해 이 정책의 확대를 추진해야 합니다."
 CAN_national_employment_commission:0 "국가 고용 위원회"
 CAN_national_employment_commission_desc:0 "국가 고용 위원회는 부문 간 노동 공급과 수요를 조정하여 고용을 효율화하고, 생산성을 극대화하며, 경제 성장을 가속할 것입니다."
 CAN_public_works_construction:0 "공공사업 건설"
 CAN_public_works_construction_desc:0 "실업 문제에 대처하고 경제를 활성화하기 위해, 정부는 대규모 공공사업을 착수할 것입니다. 도로, 교량, 기반 시설을 건설하여 캐나다인들을 다시 일터로 복귀시킬 것입니다."
 CAN_dustbowl_recovery_fund:0 "더스트볼 복구 기금"
 CAN_dustbowl_recovery_fund_desc:0 "가뭄에 시달리는 앨버타와 서스캐처원에는 연방의 지원이 필요합니다. 해안 기반 시설의 진척을 바탕으로, 이제 우리는 대초원을 복구하고 핵심 체계를 현대화하는 데 집중할 것입니다."
 CAN_DOSCO:0 "도스코"
 CAN_DOSCO_desc:0 "도미니언 철강 석탄 공사의 설립은 산업력의 새로운 시대를 열 것입니다. 캐나다의 천연자원을 활용하여 경제 성장을 촉진하고 국가의 미래를 뒷받침할 것입니다."
 CAN_king_or_chaos:0 "킹이냐, 혼돈이냐"
 CAN_king_or_chaos_desc:0 "베넷의 위기 대응 리더십 부재는 국가를 혼돈에 빠뜨릴 위협이 됩니다. 우리는 매켄지 킹을 신뢰해야 합니다. 그의 경험은 이 격동의 시기에 캐나다가 필요로 하는 안정적인 지침을 제공할 것입니다."
 CAN_federal_unemployment_act:0 "연방 실업법"
 CAN_federal_unemployment_act_desc:0 "로웰-시로이스 위원회의 권고에 따라, 연방 실업법은 실업자에게 구제와 지원을 제공하기 위한 국가적 틀을 마련할 것입니다."
 CAN_st_lawrence_seaway_development:0 "세인트로렌스 수로 개발"
 CAN_st_lawrence_seaway_development_desc:0 "세인트로렌스 수로는 경로를 따라 위치한 주요 도시들을 변화시켜 상업, 산업, 도시 성장을 촉진할 것입니다. 이 사업은 진행 중인 수력 발전 댐 건설을 보완하며, 지역 전반의 경제 확장에 동력을 제공할 것입니다."
 CAN_government_of_national_unity:0 "거국 내각"
 CAN_government_of_national_unity_desc:0 "국가가 전쟁의 막대한 도전에 직면함에 따라, 캐나다의 정치 지도자들은 매켄지 킹의 지도 아래 연립 정부를 구성하여 안정적인 리더십을 제공하고, 불확실한 시기에 국가 안정을 보존해야 합니다."
 CAN_intervene_in_quebec_elections:0 "퀘벡 선거 개입"
 CAN_intervene_in_quebec_elections_desc:0 "뒤플레시의 반전 및 분리주의 운동이 캐나다의 통합을 약화시키도록 내버려 둘 수 없습니다. 1939년 퀘벡 선거에 개입하여, 우리는 연방주의 세력을 지원하고 이 위태로운 시기에 국가 안정을 확보할 것입니다."
 CAN_back_the_quebec_liberals:0 "퀘벡 자유당 지원"
 CAN_back_the_quebec_liberals_desc:0 "자유당은 오랫동안 퀘벡 주민들의 신뢰를 받아왔으며, 불확실한 시기에 안정적인 리더십을 제공했습니다. 그들의 지도력을 지지함으로써, 우리는 국가 전쟁 수행을 위해 주(州)로부터 지속적인 협력을 보장받을 수 있습니다."
 CAN_dissolve_the_parliament:0 "의회 해산"
 CAN_dissolve_the_parliament_desc:0 "개입 이후의 정치적 교착 상태는 충격적이고 심히 우려스러우며, 특히 전시 상황에서는 더욱 그렇습니다. 우리는 이 무능한 의회를 해산하고, 전시 통치의 도전을 헤쳐나갈 능력이 있는 새로운 장관들을 임명해야 합니다."
 CAN_british_north_america_act:0 "영국령 북아메리카 법"
 CAN_british_north_america_act_desc:0 "영국령 북아메리카 법에 따라 제정된 새로운 헌법은 연방 정부에 더 큰 권한을 부여하여, 증대되는 전쟁의 불안정성을 관리하는 데 있어 더 강력한 통제력을 보장합니다."
 CAN_bank_of_canada:0 "캐나다 은행"
 CAN_bank_of_canada_desc:0 "대공황의 혼란은 규제되지 않은 금융 시스템의 위험성을 드러냈습니다. 이제 신뢰를 회복하고, 통화를 안정시키며, 경제 회복을 이끌기 위해 중앙은행이 필수적입니다."
 CAN_canadian_broadcasting_corporation:0 "캐나다 방송 협회"
 CAN_canadian_broadcasting_corporation_desc:0 "CBC는 중요한 국영 방송사로서, 우리의 공유된 가치와 다양한 공동체를 반영하는 유익한 프로그램을 통해 해안에서 해안까지 캐나다인들을 연결할 것입니다."
 CAN_bennett_new_deal:0 "베넷의 뉴딜"
 CAN_bennett_new_deal_desc:0 "베넷의 안정적인 지도력은 캐나다를 회복의 길로 이끌었습니다. 이 취약한 진전을 보존하기 위해, 우리는 그의 정책을 계속 유지하고 국가가 다시 불안정에 빠지는 것을 막아야 합니다."
 CAN_disallow_the_padlock_act:0 "자물쇠법 금지"
 CAN_disallow_the_padlock_act_desc:0 "주 법률이 시민의 자유를 짓밟도록 내버려 둘 수 없습니다. 캐나다는 법치를 수호하고 전국적으로 민주적 권리를 보호해야 합니다. 자물쇠법은 폐지되어야 합니다."
 CAN_challenge_the_courts:0 "법원에 이의 제기"
 CAN_challenge_the_courts_desc:0 "법원은 우리의 뉴딜 정책이 위헌이라고 판결할 수도 있지만, 이 개혁은 캐나다 국민을 빈곤에서 구하고, 고용을 회복하며, 더 정의로운 사회를 건설하는 데 필수적입니다. 정부는 국가의 미래를 위해 판결에 이의를 제기할 것입니다."
 CAN_censur_duplessis:0 "뒤플레시 견책"
 CAN_censur_duplessis_desc:0 "뒤플레시 주지사의 자물쇠법 사용과 뉴딜 개혁 반대는 민주주의와 국가 회복을 위협합니다. 정부는 그의 전술에 반대하기 위해 공식적인 견책을 발표해야 합니다."
 CAN_invoke_the_war_measures_act:0 "전시조치법 발동"
 CAN_invoke_the_war_measures_act_desc:0 "이 비상한 투쟁의 시기에는 비상한 조치가 필요합니다. 전시조치법을 발동하면 대공황에서 국가를 구하는 데 도움이 될 중요한 법안을 신속하게 통과시킬 수 있습니다."
 CAN_amend_the_constitution:0 "헌법 개정"
 CAN_amend_the_constitution_desc:0 "전시조치법을 통해 확보한 권한을 바탕으로, 이제 연방 정부에 의료 및 연금에 대한 통제권을 부여하여 국가 복지에 필수적인 사회 프로그램을 조율하도록 헌법 개정을 추진합니다."
 CAN_imperial_economic_cooperation:0 "제국 경제 협력"
 CAN_imperial_economic_cooperation_desc:0 "전쟁의 위협이 다가오는 가운데, 대영제국 내의 긴밀한 경제적 유대는 필수적입니다. 조율된 산업 노력은 우리의 집단 방위를 강화하고 캐나다 경제를 동원 체제로 준비시킬 것입니다."
 CAN_royal_tour_of_canada:0 "왕실의 캐나다 순방"
 CAN_royal_tour_of_canada_desc:0 "조지 6세 국왕과 엘리자베스 여왕의 방문은 역사적인 순간으로, 캐나다와 왕실 간의 유대를 강화하고, 국가적 자부심을 고취하며, 세계적인 분쟁 직전에 캐나다 국민을 단결시킬 것입니다."

