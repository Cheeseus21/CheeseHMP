 fin_soviet_threat:0 "볼셰비키의 위협"
 fin_soviet_threat_desc:0 "소련은 한계를 모른다. 내전에서 적군이 패배했다고 해서 핀란드가 공산주의로부터 안전한 것은 아니다. 지금의 평화는 전쟁의 일시적인 중단에 불과하다."
 fin_karelianism:0 "대핀란드"
 fin_karelianism_desc:0 "핀란드는 핀족만의 국가가 아니라 모든 핀계 민족의 국가이며, 그들이 동족과 재결합하도록 하는 것은 우리의 권리이자 의무이다."
 fin_continuation_prep:0 "상처 회복"
