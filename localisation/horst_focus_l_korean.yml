 JAP_CHI_pact_of_silk_desc:0 ""
 JAP_CHI_expand_zaibatsus_influence_in_china:0 "중국 내 재벌 영향력 확대"
 JAP_CHI_expand_zaibatsus_influence_in_china_desc:0 ""
 JAP_CHI_sino_japanese_military_mission:0 "중일 군사 고문단"
