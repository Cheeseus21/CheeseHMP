  BUL_steel_exports2:0 "마케도니아 텅스텐 광산"
  ENG_bomber_harris_desc:0 "'우리가 함부르크에 저지른 짓이 끔찍했다고 인정하길 바라는 건가? 그래. 그건 *정말로* 끔찍했어. *소름 끼쳤다고*! 이제 기분 좀 나아졌나? 전쟁을 더 빨리 이길 수 있는 다른 목표를 제시할 수 없다면, 닥쳐! 자네는 자네의 양심으로 돌아가고, 나는 전쟁으로 돌아가게 해줘. 알겠나?' -항의하는 목사에 대한 해리스의 답변"
  BUL_steel_exports2_desc:0 "독일의 투자를 받아, 우리는 서쪽에 오랫동안 방치되었던 텅스텐 광산을 개발할 수 있습니다."
  BUL_war_games:0 "비밀 군사 훈련"
  efr_secret_weapons:0 "비밀 병기"
  ITA_modernized_artillery_at:0 "현대화된 대전차포"
  ITA_modernized_artillery_at_desc:0 "아군의 대전차 무기는 심각하게 구식이라 개선이 필요합니다."
  SOV_great_purge_NEW:0 "대숙청"
  ENG_compass:0 "컴퍼스 작전"
  ENG_operation_compass:0 "컴퍼스 작전"
  #ENG_operation_compass_desc:0 "This operation will fail as soon as we lose control of Giza"
  ENG_compass_desc:0 "이것은 아프리카에서 추축국을 상대로 벌이는 아군의 첫 주요 작전입니다. 사막에서 적을 포위 섬멸하기 위해서는 전략적 기동성이 필요합니다."
  SOV_great_purge_NEW_desc:0 "장교단, 심지어 최고위급 장교들 사이에서 위험한 트로츠키주의자들의 음모가 꾸며지고 있습니다. 트로츠키의 개인적인 연루 여부는 아직 불분명하지만, 위협은 실재합니다. 소련은 또 다른 내전에 휘말릴 수도 있습니다... 우리가 약간의 희생을 감수할 준비가 되어 있지 않다면 말입니다."
  EFR_torch_declared:0 "횃불 작전이 선포되었습니다"
  BUL_war_games_desc:0 "미래의 분쟁에 대비하기 위해 비밀리에 군사 훈련을 실시할 것입니다."
  BUL_restore_the_bulgarian_army:0 "불가리아군 재건"
  BUL_greater_bulgaria:0 "대불가리아"
  air_war_plans_division_focus2:0 "호위 전투기"
  ETH_industrial_effort2:0 "산업 역량 강화 II"
  ETH_industrial_effort2_desc:0 "계속해서 민간 산업 개발에 집중할 것입니다."
  ETH_production_effort5:0 "군수품 생산 V"
  ETH_production_effort5_desc:0 "더 많은 군수공장, 더 많은 총."
  ETH_production_effort4:0 "군수품 생산 IV"
  ETH_production_effort4_desc:0 "더 많은 군수공장, 더 많은 총."
  ETH_construction_effort5:0 "에티오피아 면화 회사 II"
  ETH_construction_effort5_desc:0 "섬유 산업을 더욱 확장할 것입니다."
  ETH_construction_effort4:0 "에티오피아 면화 회사 I"
  ETH_construction_effort4_desc:0 "섬유 산업을 확장할 것입니다."
  irq_militarism:0 "군국주의"
  IRQ_revolution2:0 "시리아로 혁명 전파"
  ITA_sword_of_islam:0 "이슬람의 검"
  ENG_bomber_harris:0 "제공권을 통한 승리"
  IRQ_eco4:0 "바빌론의 화살"
  IRQ_eco3:0 "프랑스 투자 국유화"
  IRQ_eco4_desc:0 "아군의 화살은 적의 비행 전차를 모조리 꿰뚫을 것입니다."
  ITA_sword_of_islam_desc:0 "영국과 프랑스의 제국주의에 맞서 북아프리카의 아랍인들과 동맹을 맺어야 합니다. 지중해 아랍인들의 환심을 사기 위해, 우리는 이슬람의 수호자를 자처할 것입니다."
  MAN_the_two_emperorsx:0 "두 황제"
  MAN_the_two_emperorsx_desc:0 "우리가 일본의 완전한 동등 파트너가 아니라는 터무니없는 생각을 버릴 때가 왔습니다. 우리 두 황제는 형제와도 같습니다!"
  MAN_chinese_leadershipx:0 "중국의 지도력"
  MAN_chinese_leadershipx_desc:0 "중국 인민에게는 중국인 지도자가 필요합니다. 우리는 중국 전역에 대한 황제의 통치를 완전히 복원하는 것 외에는 다른 목표가 없음을 공개적으로 선언해야 합니다."
  MAN_vassalize_mengukuox:0 "몽강국 종속화"
  MAN_vassalize_mengukuox_desc:0 "몽강국의 왕은 만주국 황제와 나란히 설 자격이 없습니다. 이 어리석은 실험을 끝내고 그를 제자리로 돌려놓을 때입니다."
  MAN_national_cooperation_governmentx:0 "국민 협력 정부"
  MAN_national_cooperation_governmentx_desc:0 "일본이 다른 중국 정치인, 즉 평민들을 내세워 협력 정부를 구성하는 것을 고려하고 있다는 충격적인 소문을 들었습니다. 이는 용납할 수 없습니다. 우리 연합군이 점령한 모든 중국 영토는 반드시 우리가 관리하도록 해야 합니다."
  MAN_alliance_with_the_kwantung_armyx:0 "관동군과의 동맹"
  MAN_alliance_with_the_kwantung_armyx_desc:0 "국내 주둔 일본군은 종종 우리의 생각과 충돌합니다. 가능한 한 갈등을 줄이고 협력할 수 있도록 그들과 더 긴밀한 관계를 구축해야 합니다."
  MAN_national_defense_state:0 "국가 국방 체제"
  MAN_national_defense_state_desc:0 "전쟁에서 승리하여 중국 전역을 다시 통치하게 될 때까지, 우리는 모든 노력을 기울이고, 모든 희생을 감수하며, 가용한 모든 자원을 동원하여 전쟁을 수행해야 합니다."
  MAN_social_research_unitx:0 "사회 연구부"
  MAN_social_research_unitx_desc:0 "우리 인민의 방식과 관습을 연구할 특별 부서를 설립하여, 그들이 국가의 생산적인 시민이 되도록 더 잘 이끌 수 있어야 합니다."
  MAN_invite_japanese_investorsx:0 "일본 투자자 유치"
  MAN_invite_japanese_investorsx_desc:0 "국가를 발전시키려면 외부의 도움이 필요합니다. 일본의 여러 기업이 우리나라에 투자할 의향이 있음을 밝혔습니다."
  MAN_hoankyokux:0 "보안국"
  MAN_hoankyokux_desc:0 "우리 정부는 중국의 밝은 미래를 위한 최고의 희망입니다. 분명히 많은 사람이 우리 정부의 파괴에 관심을 가지고 있습니다. 우리는 이런 자들을 추적하여 국가를 보호할 조직이 필요합니다."
  jap_nav_2:0 "1940년형 해군 폭격기를 연구할 것입니다.\n\n"
  jap_nav_3:0 "1944년형 해군 폭격기를 연구할 것입니다.\n\n"
 
 
 
 
 SLO_diet_of_the_slovak_land:0 "슬로바키아 국토 의회"
 SLO_diet_of_the_slovak_land_desc:0 "1939년 3월 13일, 히틀러는 요제프 티소를 베를린으로 초청하여 슬로바키아의 독립을 선포할 것을 촉구했습니다. 티소는 스스로 그런 결정을 내리기를 거부했고, 그 후 히틀러는 그에게 슬로바키아의 독립을 승인할 슬로바키아 의회 회의를 조직하도록 허락했습니다."
 SLO_telegram_to_berlin:0 "베를린으로 보내는 전보"
 SLO_telegram_to_berlin_desc:0 "우리만의 주권 슬로바키아 국가가 탄생함에 따라, 이제 우리는 티소가 히틀러에게 한 약속을 지키고 추축국에 가입할 수 있습니다."
 SLO_zone_of_protection:0 "보호 조약"
 SLO_zone_of_protection_desc:0 "처음부터 슬로바키아 국가는 독일의 영향력 아래 있었습니다. 1939년 3월 23일에 체결된 보호 조약은 외교, 군사, 경제 정책을 부분적으로 독일에 종속시켰습니다."
 SLO_appoint_competent_economists:0 "유능한 경제학자 임명"
 SLO_appoint_competent_economists_desc:0 "고위직에 유능한 인사를 임명함으로써, 우리는 독일의 지도가 우리 경제에 미친 파괴적인 영향을 줄일 수 있습니다."
 SLO_industrial_enterprises:0 "슬로바키아 산업에 대한 독일의 통제"
 SLO_industrial_enterprises_desc:0 "우리 신생 국가의 첫해 동안, 독일은 막대한 재정 자원을 이용하여 국내 대규모 산업 기업에 대한 통제권을 행사했습니다. 물론 이는 유능한 경제학자들을 임명하여 해결해야 합니다. 그들은 우리의 국유 자산을 독일에 팔아넘기지 않음으로써 국가의 온전함을 지킬 것입니다."
 SLO_currency:0 "강력한 통화"
 SLO_currency_desc:0 "독일 통화 대비 슬로바키아 코루나의 환율은 1 라이히스마르크당 11 슬로바키아 코루나 수준이었습니다."
 SLO_factories:0 "신규 공장 건설"
 SLO_factories_desc:0 "슬로바키아 국가 존속 기간 동안 200개 이상의 산업 기업이 설립되었습니다."
 SLO_infrastructure:0 "신규 기반시설 건설"
 SLO_infrastructure_desc:0 "슬로바키아 국가 존속 기간 동안 100km 이상의 신규 철도와 287km의 도로가 건설되었습니다."
 SLO_hungarian_invasion:0 "헝가리의 침공"
 SLO_hungarian_invasion_desc:0 "1939년 3월 23일 새벽, 헝가리는 카르파티아-우크라이나에서 갑자기 슬로바키아를 공격했으며, \"가능한 한 서쪽으로 멀리 진격하라\"는 지시를 받았습니다[출처 필요]. 헝가리는 선전포고 없이 슬로바키아를 공격하여 슬로바키아군을 기습했습니다. 많은 슬로바키아 병사들이 체코 지역에서 이동 중이었고 아직 슬로바키아 부대에 도착하지 않았기 때문입니다."
 SLO_seasonal_works_in_germany:0 "독일의 계절 노동자"
 SLO_seasonal_works_in_germany_desc:0 "매년 40,000명의 노동자가 계절 노동을 위해 독일로 갔고, 생산 가능 인구의 일부는 전선으로 보내졌습니다."
 SLO_salzburger_diktat:0 "잘츠부르크 회담"
 SLO_salzburger_diktat_desc:0 "1940년 7월 27일부터 28일까지 잘츠부르크에서 독일 관리들은 티소에게 정부 교체를 지시했습니다. 논란의 여지가 있는 슬로바키아 정치인 보이테흐 투카가 총리로 임명되었고, 흘린카 근위대(HG) 사령관 알렉산데르 마흐가 내무부 장관이 되었습니다. 슬로바키아 국가 체제 형성의 새로운 단계가 시작되었으며, 이 단계에서 국가사회주의 요소가 삶의 모든 영역에 침투했습니다."
 SLO_evacuation:0 "남부 슬로바키아의 위기"
 SLO_evacuation_desc:0 "헝가리가 새로 획득한 지역에서, 고향에 남아 있던 슬로바키아인들은 거의 즉시 박해, 굴욕, 폭력 또는 공공연한 박해의 희생자가 되었습니다. 국가는 50,000명의 슬로바키아인을 대피시키고 새로운 거주지를 제공할 수 있습니다."
 SLO_radical_wing:0 "급진파"
 SLO_radical_wing_desc:0 "보이테흐 투카와 알렉산데르 마흐가 이끄는 슬로바키아 인민당(HSĽS)의 급진파는 독일 체제를 모방하고자 했습니다."
 SLO_moderate_wing:0 "온건파"
 SLO_moderate_wing_desc:0 "요제프 티소는 온건파의 지도자 중 한 명이었으며, 친프라하 노선은 주로 마르틴 소콜 서기장과 요제프 부다이가 대표했습니다."
 SLO_fate_in_german_hands:0 "독일의 손에 달린 슬로바키아의 운명"
 SLO_fate_in_german_hands_desc:0 "히틀러를 방문하는 동안, 투카는 공개적으로 선언합니다.\"나의 총통, 저는 제 민족의 운명을 당신의 손에 맡깁니다. 제 민족은 당신으로부터의 해방을 기대하고 있습니다.\""
 SLO_detention_camp:0 "구금 수용소 건설"
 SLO_detention_camp_desc:0 "독립 국가 수립 직후, 정부는 슬로바키아 국가의 적을 구금하는 규정을 발표합니다. 적이란 정권에 따르면 새로운 국가 건설에 장애가 될 수 있다고 주장되는 모든 사람을 의미합니다."
 SLO_mobilize_slovak_army:0 "슬로바키아군 동원"
 SLO_mobilize_slovak_army_desc:0 "1939년 4월, 히틀러는 폴란드에 대한 군사 작전 계획을 수립하라는 명령을 내렸습니다. 그는 폴란드의 영토를 독일 제국에 합병하고 싶어했습니다. 8월 말, 슬로바키아군의 동원이 시작되었습니다."
 SLO_president_of_slovak_republic:0 "슬로바키아 공화국 초대 대통령"
 SLO_president_of_slovak_republic_desc:0 "1939년 7월 헌법은 대통령의 광범위한 직무를 규정하고 있지만, 슬로바키아 공화국에는 아직 대통령이 없었습니다. 1939년 10월 26일, 요제프 티소가 슬로바키아 공화국의 대통령이 되었습니다."
 SLO_life_in_new_slovakia:0 "새로운 슬로바키아"
 SLO_life_in_new_slovakia_desc:0 "선전 기관은 통제된 언론을 이용하여 슬로바키아를 평화롭고 번영하는 국가라는 이미지로 퍼뜨립니다. 보호령이나 폴란드와 비교할 때, 슬로바키아에서는 제3제국의 직접적인 영향력이 훨씬 덜 느껴집니다. "
 SLO_lomnicky_manifest:0 "롬니츠키 선언"
 SLO_lomnicky_manifest_desc:0 "순수 예술조차 슬로바키아에서 일어난 정치적 변화의 결과를 피하지 못합니다. 1939년 10월, 진보적인 예술 공예 학교가 폐교되었고, 브라티슬라바에 있는 슬로바키아 공과대학교의 소묘 및 회화과가 그 자리를 대신하게 되었습니다."
 SLO_german_advisors:0 "독일인 고문단"
 SLO_german_advisors_desc:0 "잘츠부르크 회담 이후, 더 많은 독일인 고문들이 슬로바키아의 주요 부처와 관청, 그리고 정권의 권력 구조에 들어옵니다. 그들의 역할은 이 기관들의 기능을 감시하고, 독일에 대한 충성과 보호 조약 의무 준수를 보장하는 것입니다."
 SLO_economic_loan:0 "경제 회복을 위한 차관"
 SLO_economic_loan_desc:0 "국가 남부가 헝가리에 합병되면서, 슬로바키아는 광업, 가죽, 인쇄 산업의 중심지 몇 곳과 함께 농업적으로 중요한 지역을 잃었습니다. 송전선 시스템뿐만 아니라 교통 및 통신 구조도 혼란에 빠졌습니다. 상황을 개선하기 위한 노력의 일환으로, 1939년 2월 정부는 슬로바키아의 경제 회복을 위한 차관을 발표했습니다."
 SLO_propaganda_campaings:0 "선전 활동"
 SLO_propaganda_campaings_desc:0  "경제 성장 호황의 이면은 "미소 짓는 슬로바키아"나 "노동의 기쁨"과 같은 선전 활동으로 부분적으로 가려져 있습니다."
 SLO_bata:0 "바타 공장"
 SLO_bata_desc:0 "파르티잔스케에 있는 바타 공장은 1939년에 설립되었습니다. 파르티잔스케는 유명한 사업가 토마시 바타가 활동을 전개했던 장소 중 하나였습니다. 그의 목표는 사람들이 일자리, 주거, 여가를 찾을 수 있는 도시를 만드는 것이었습니다. 공장에서는 제화업에 생산이 집중되었으며, 이는 오늘날까지도 그곳에서 주를 이루고 있습니다."
 SLO_universities:0 "신규 대학 개교"
 SLO_universities_desc:0 "1942년 슬로바키아 과학 예술 아카데미가 설립되었고, 1년 후 활동을 시작했습니다. 이러한 측면에서, 비교적 유리했던 시기는 다양한 종류의 출판물 총 발행 부수 증가에도 반영되었습니다."
 SLO_expand_mines:0 "광산 확장"
 SLO_expand_mines_desc:0 "슬로바키아는 독일에게 중요한 광물, 농산물, 전략 군수품 생산의 원천이며 통신망 또한 계속 사용되고 있으므로, 독일은 특정 지역 개발에 자체적인 관심을 보이고 있습니다."
 SLO_apollo:0 "아폴로"
 SLO_apollo_desc:0 "1895년, 부다페스트에서 브라티슬라바에 정유소를 건설하기로 결정했습니다. 아폴로 정유소는 1896년에 가동을 시작했습니다. 이 새롭고 현대적인 공장은 군주국에서 두 번째로 큰 광유 정제소 중 하나였습니다. 휘발유, 등유, 파라핀, 양초, 바셀린, 아스팔트, 심지어 인공 얼음까지 생산했습니다. 슬로바키아 공화국 시절, 이 공장은 다이너마이트 노벨 AG 브라티슬라바와 IG 파르벤이 소유했습니다."
 SLO_hitlers_protection:0 ""히틀러의 보호 아래""
 SLO_hitlers_protection_desc:0 "슬로바키아는 남동부 유럽 국가들에게 본보기가 되어, 히틀러의 "보호" 아래 국가가 평화롭게 살 수 있다는 것을 보여주어야 합니다."
 SLO_demand_southern_slovakia:0 "하나의 민족, 하나의 정당, 하나의 지도자"
 SLO_demand_southern_slovakia_desc:0 "새로 획득한 헝가리 지역에서 슬로바키아인들은 거의 즉시 박해, 굴욕, 폭력의 희생양이 되었습니다. 경제적으로 점령지는 펜괴를 체코슬로바키아 코루나로 비현실적으로 환전하면서 피해를 입었습니다. 따라서 대독일제국을 위한 전쟁에서 많은 슬로바키아 군인들이 전사함에 따라, 슬로바키아 공화국은 남부 슬로바키아와의 재통일을 요구합니다."
 SLO_dynamitka:0 "디나미트카"
 SLO_dynamitka_desc:0 "1941년, 자본금은 1억 5천만 코루나에 달하여 슬로바키아 최대의 주식회사가 되었습니다. 폭발물 생산은 전쟁 중 가장 수익성이 높은 사업 중 하나였으며, 1941년이 1,900만 코루나의 순이익으로 마감된 데 결정적인 역할을 했습니다."
 industrial_research_tt:0 "획득"
 SLO_nehera:0 "네헤라"
 SLO_nehera_desc:0 "체코슬로바키아의 체코 지역에 성공적으로 자리를 잡은 후, 슬로바키아에도 새로운 공장이 건설되었습니다. 1939년, 트렌친에 네헤라 의류 서비스가 문을 열었고, 초기에는 하루에 200벌의 바지를 생산했습니다. 직원이 늘어남에 따라 취급 품목의 범위도 넓어져 스포츠 정장과 남성용 재킷까지 포함하게 되었습니다."
 SLO_anti_social:0 "반사회부"
 SLO_anti_social_desc:0 "1941년, "직업 없는 집시"를 포함한 소위 반사회적 집단을 위한 노동부가 만들어지기 시작했습니다. 처음에는 계절적으로 운영되었으나, 1942년부터는 상설 기관으로 설립되었습니다."
 SLO_slovak_airforce:0 "슬로바키아 공군"
 SLO_slovak_airforce_desc:0 "슬로바키아 공군은 6개의 체코-슬로바키아 공군 연대 중 유일하게 슬로바키아에 주둔했던 체코-슬로바키아 공군 제3연대 "밀란 라스티슬라프 슈테파니크 공군 대장"을 기반으로 창설되었습니다. 1939년 3월 슬로바키아 공화국이 수립된 후, 새로 창설된 공군은 항공 무장과 조직 구조를 인수했습니다."
 SLO_lessons:0 ""소전쟁"의 교훈"
 SLO_lessons_desc:0 "슬로바키아 공군은 1939년 3월, 헝가리군이 카르파티아 루테니아를 정복한 후 슬로바키아 동부 영토를 침공했을 때 첫 실전을 치렀습니다. 헝가리 공군에 맞서 B.534 항공기 20대를 보유한 제45, 49 전투비행대대와 Š.328 항공기 약 20대로 무장한 제12, 13 관측비행대대가 배치되었습니다."
 SLO_strategic_destruction:0 "전략적 파괴"
 SLO_strategic_destruction_desc:0 ""
 SLO_fighter_focus:0 "전투기 현대화"
 SLO_fighter_focus_desc:0 ""
 SLO_bomber_focus:0 "폭격기 현대화"
 SLO_bomber_focus_desc:0 ""
 SLO_battlefield_support:0 "전장 지원"
 SLO_battlefield_support_desc:0 ""
 SLO_cas_focus:0 "근접항공지원 현대화"
 SLO_cas_focus_desc:0 ""
 SLO_operational_integrity:0 "작전 무결성"
 SLO_operational_integrity_desc:0 ""
 SLO_messerschmitt:0 "메서슈미트"
 SLO_messerschmitt_desc:0 ""
 SLO_junkers:0 "융커스"
 SLO_junkers_desc:0 ""
 SLO_heinkel:0 "하인켈"
 SLO_heinkel_desc:0 ""
 SLO_cas_production:0 "근접항공지원기 생산"
 SLO_cas_production_desc:0 ""
 SLO_fighter_production:0 "전투기 생산"
 SLO_fighter_production_desc:0 ""
 SLO_bomber_production:0  "전술 폭격기 생산"
 SLO_bomber_production_desc:0 ""
 SLO_aa_defense:0  "전시 경제 보호"
 SLO_aa_defense_desc:0 "제2차 세계대전 동안 폭격기 공습만큼 우리나라를 경제적으로 파괴한 것은 없었습니다. 주요 목표는 독일에 합성 가솔린을 공급하던 주요 업체 중 하나인 아폴로 광유 정제소였습니다."
 SLO_prepare_our_airforce:0 "공군 준비"
 SLO_prepare_our_airforce_desc:0 ""
 SLO_invasion_of_poland:0 "백색 작전 준비"
 SLO_invasion_of_poland_desc:0 "1939년 9월 1일, 독일군이 폴란드 영토에 진입하며 제2차 세계대전이 시작되었습니다. 해외에서 제3제국의 위성국으로 인식되는 슬로바키아가 나치의 폴란드 침공에 군대를 참여시킨 것은 이러한 입장을 공공연히 확인하는 것이었으며, 이 행위는 서방 강대국과의 외교 관계 즉각 중단을 의미했습니다."
 SLO_munition_factory:0 "군수 공장"
 SLO_munition_factory_desc:0 "두브니차와 포바슈스카비스트리차의 무기 공장은 가장 중요한 전쟁 장비 제조업체 중 하나였습니다."
 SLO_mobile_warfare:0 "기동전"
 SLO_mobile_warfare_desc:0 ""
 SLO_superior_firepower:0 "우세 화력"
 SLO_superior_firepower_desc:0 ""
 SLO_trench_warfare:0 "참호전"
 SLO_trench_warfare_desc:0 ""
 SLO_mass_assault:0  "대규모 강습"
 SLO_mass_assault_desc:0 ""
 SLO_tank_focus:0 "리흘라 스쿠피나 '칼린치아크'"
 SLO_tank_focus_desc:0 "신속사단은 동부 전선에서 추축군 측에서 싸운 슬로바키아 기갑사단이었습니다. 신속사단은 1941년 7월 23일, 이전의 신속단이었던 신속여단이 여러 차례 재편성된 후 창설되었습니다. 이후 캅카스에서 철수한 후, 사단은 제1보병사단 또는 제1기술사단으로 개명되었습니다."
 SLO_motorized_focus:0 "슬로바키아 기동 사령부 "
 SLO_motorized_focus_desc:0 "슬로바키아 기동 사령부는 독일 제17군에 배속되었고, 얼마 지나지 않아 독일의 직접 지휘를 받게 되었습니다. 이 부대는 1941년 7월까지 제17군과 함께 싸웠으며, 우만 전투와 리포베츠 전투에도 참전했습니다."
 SLO_prepare_production:0 "신형 전차"
 SLO_prepare_production_desc:0  "더 까다로운 유형의 전차를 생산할 수 있도록 생산 라인을 준비해야 합니다"
 SLO_daimler_benz:0  "다임러-벤츠"
 SLO_daimler_benz_desc:0 ""
 ger_medium_tank_1936:0 "판처 3호 A형"
 SLO_medium_panzer:0 "독일 면허 구매"
 SLO_medium_panzer_desc:0 ""
 SLO_medium_tt:0 "15개 대대 규모의 §Y중형전차§! 사단 획득"
 SLO_continue_production:0 "전차 생산 집중"
 SLO_continue_production_desc:0 "우리가 이미 잘 알고 있는 경전차 생산을 계속함으로써 공장의 생산량을 쉽게 극대화할 수 있습니다"
 SLO_light_tank:0 "CKD"
 SLO_light_tank_desc:0 "CKD는 구 체코슬로바키아에서 가장 큰 엔지니어링 회사 중 하나였습니다. 이 회사의 가장 주목할 만한 제품은 자체 설계한 경전차인 38(t) 전차와 38(t) 구축전차였습니다."
 SLO_light_tank_modernization:0 "신형 경전차"
 SLO_light_tank_modernization_desc:0 ""
 SLO_light_tt:0 "15개 대대 규모의 §Y경전차§! 사단 획득"
 SLO_german_assistance:0 "독일의 지원"
 SLO_german_assistance_desc:0 ""
 SLO_motorization:0 "아군 차량화"
 SLO_motorization_desc:0 ""
 SLO_mechanization:0 "슬로바키아 기계화보병"
 SLO_mechanization_desc:0 ""
 SLO_improved_mechanization:0 "추가 기계화 노력"
 SLO_improved_mechanization_desc:0 ""
 SLO_moto_mech_idea:0 "기계화 집중"
 SLO_special_forces:0 "특공대 훈련소"
 SLO_special_forces_desc:0  "제2차 세계대전 초반 독일 공수부대의 성공은 많은 중부 유럽 국가들이 자체 공수부대를 창설하는 계기가 되었습니다. 1942년 초, 독일의 동맹국인 슬로바키아는 공수 훈련소를 창설하기로 결정했습니다."
 SLO_dispersed_support:0 "분산 지원"
 SLO_dispersed_support_desc:0 ""
 SLO_integrated_support:0 "통합 지원"
 SLO_integrated_support_desc:0 ""
 SLO_infiltration:0 "침투"
 SLO_infiltration_desc:0 ""
 SLO_assault:0 "강습"
 SLO_assault_desc:0 ""
 SLO_mass_mobilization:0 "대규모 동원"
 SLO_mass_mobilization_desc:0 ""
 SLO_deep_battle:0  "종심 전투"
 SLO_deep_battle_desc:0 ""
 SLO_purchase_guns:0  "독일로부터 장비 구매"
 SLO_purchase_guns_desc:0 "슬로바키아 국방부는 독일에 슬로바키아 공수부대의 공수 훈련 지원 및 공수 장비 인도를 요청했습니다."
 SLO_cavalry_focus:0 "기병대 현대화"
 SLO_cavalry_focus_desc:0 "슬로바키아 기병 분견대는 슬로바키아국 건국 첫해 동안 여러 차례 현대화를 거쳤습니다."
 SLO_purchase_transports:0 "수송기"
 SLO_purchase_transports_desc:0 "1943년 11월 15일, He-111에서 첫 강하가 이루어졌습니다. 1943년 11월 30일, 질리나 마을 근처에서 첫 대규모 강하 시범이 열리는 매우 흥미로운 순간이 있었습니다(He-111 2기에서 공수부대원 20명 강하)."
 SLO_commando:0 "특공대"
 SLO_commando_desc:0 "1942년 10월, 첫 지원자 그룹이 공수 훈련소에 입소했습니다. 유라이 메슈코가 이 그룹의 지휘관으로 임명되었으며, 이들은 미래 슬로바키아 공수부대의 핵심이 되었습니다."
 SLO_paratroopers_tt:0 "각 15개 대대로 구성된 정예 §Y공수부대§! 2개를 획득합니다"
 SLO_motorized_tt:0 "각 15개 대대로 구성된 정예 §Y차량화§! 부대 2개를 획득합니다"
 SLO_arty_1:0 "지원포"
 SLO_arty_1_desc:0 ""
