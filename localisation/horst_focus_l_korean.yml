RAJ_a_new_indian_elite:0 "새로운 인도 엘리트"
RAJ_british_departure:0 "영국의 철수"
RAJ_british_departure_desc:0 "영국의 권위가 급속히 붕괴함에 따라, 지금이 바로 기회를 잡아 우리의 정치 체제를 조직할 때입니다."
RAJ_assemble_the_congress:0 "의회 소집"
RAJ_assemble_the_congress_desc:0 "영국으로부터의 자유가 보장되었으니, 인도 의회는 개혁을 논의하기 위해 소집되어야 합니다."
RAJ_concessions_to_the_untouchables:0 "불가촉천민에 대한 양보"
RAJ_concessions_to_the_untouchables_desc:0 "최하층 계급인 불가촉천민은 사회 전체로부터 멸시받지만, 인정받아야 할 대중 세력을 대표합니다. 빔라오 람지 암베드카르가 시작한 운동을 인정하지 않는다면 사회 구조를 뒤흔들 수 있습니다. 그들이 이슬람교, 기독교로 개종하거나 심지어 무신론적 공산주의를 받아들이는 것을 보느니, 몇 가지 실질적인 양보를 하는 것이 훨씬 쉽다는 점이 이제 명백해졌습니다."
RAJ_modernization_program:0 "현대화 계획"
RAJ_modernization_program_desc:0 "식민지 독점이 철폐되었으니, 새로운 경제를 건설할 수 있습니다. 2020년까지 우리는 초강대국이 될 것입니다!"
RAJ_a_new_indian_elite_focus:0 "새로운 인도 엘리트"
RAJ_a_new_indian_elite_focus_desc:0 "인도의 기업가들은 이미 식민 통치하에서도 활동했지만, 식민지의 제약 속에서 움직여야 했습니다. 영국 통치자들이 사라졌으니, 이제 인도 엘리트가 부상할 때입니다."
RAJ_towards_a_post_colonial_economy:0 "탈식민지 경제를 향하여"
RAJ_towards_a_post_colonial_economy_desc:0 "경제 개혁과 인도 잠재력의 해방은 인도 기업의 부흥을 가져올 것입니다."
RAJ_influence_of_the_radicals:0 "급진파의 영향력"
RAJ_influence_of_the_radicals_desc:0 "전인도 전진동맹의 급진파들이 점점 더 활발하게 활동하며 의회의 비폭력 원칙에 이의를 제기하고 있습니다."
RAJ_indian_socialism:0 "인도 사회주의"
RAJ_indian_socialism_desc:0 "종교와 계급이 우리를 분열시키지 않는 공동의 인도 사회를 건설한다는 목표는 우리를 밝은 미래로 이끌 것입니다."
RAJ_religious_equality:0 "종교적 평등"
RAJ_religious_equality_desc:0 "마르크스주의는 종교의 폐지를 주장하지만, 지금 당장 그것을 실행할 수는 없다는 것을 압니다. 하지만 적어도 종교를 사회 분열의 요인에서 제거할 수는 있습니다."
RAJ_popular_mobilization:0 "대중 동원"
RAJ_popular_mobilization_desc:0 "권리를 박탈당한 달리트 대중, 가난한 소작농, 착취당하는 쿨리들이 이제 혁명의 대의를 위해 일함으로써 자신들의 해방을 정치적으로 인식하게 되었습니다. 새로운 인도를 지킬 준비가 된 군대를 건설할 때입니다."
RAJ_collectivism:0 "집산주의"
RAJ_land_reform:0 "토지 개혁"
RAJ_land_reform_desc:0 "토지를 재분배하라!"
RAJ_modernized_agriculture:0 "농업 현대화"
RAJ_modernized_agriculture_desc:0 "들판에 트랙터가 있다면, 농업 생산성을 유지하는 데 더 적은 수의 농민이 필요할 것입니다."
RAJ_collectivism_desc:0 "우리는 여전히 수년간의 식민주의가 남긴 후과에 시달리고 있지만, 이제 미래는 우리 손에 달려 있습니다. 우리가 가진 것을 한데 모으면 사회를 더 신속하게 현대화할 수 있을 것입니다."
RAJ_support_anti_imperialism_in_china:0 "중국 지원"
RAJ_support_anti_imperialism_in_china_desc:0 "중국을 지켜야 합니다! 우리는 이제 중국의 미래를 보장할 연결고리의 일부를 유지할 책임을 맡았습니다."
RAJ_increased_chinese_cooperation:0 "중국과의 협력 강화"
RAJ_increased_chinese_cooperation_desc:0 "아시아를 보호하기 위해 중국을 지키고 그들의 전쟁 노력에 동참합시다!"
RAJ_join_the_comintern:0 "코민테른 가입"
RAJ_join_the_comintern_desc:0 "공산주의 국가로서 모스크바와 접촉하여 그들과 불가분의 유대를 형성하는 것은 논리적인 수순입니다."
RAJ_hindu_nationalism:0 "힌두 민족주의"
RAJ_hindu_nationalism_desc:0 "우리는 모두 어머니 인도를 사랑해야 하며, 힌두교가 우리 모두를 단결시키는 것임을 인식해야 합니다."
RAJ_substitution_technologies:0 "대체 기술"
RAJ_substitution_technologies_desc:0 "대영제국의 일부 자원에 접근할 수 없으므로, 대체 프로그램을 실행하고 자급자족적 독립을 보장하는 것이 시급합니다."
RAJ_redistribute_properties:0 "자산 재분배"
RAJ_redistribute_properties_desc:0 "영국의 자산을 재분배하고 토지를 나눔으로써, 권리를 박탈당한 수많은 이들의 미래를 보장할 수 있습니다."
RAJ_militarized_hindutva:0 "군사화된 힌두트바"
RAJ_militarized_hindutva_desc:0 "시바의 이름으로! 모든 힌두교도는 어머니 인도에 봉사하고 적들로부터 그 신들을 지켜야 합니다."
RAJ_weapons_for_the_new_india:0 "새로운 인도를 위한 무기"
RAJ_weapons_for_the_new_india_desc:0 "혁명은 수호되어야 한다!"
RAJ_dream_of_akhand_hindustan:0 "아칸드 힌두스탄의 꿈"
RAJ_dream_of_akhand_hindustan_desc:0 "외세는 수 세기 동안 대인도를 분열시켰지만, 이제 단결된 인도인들이 그들의 계략을 분쇄하고 인도의 통일을 완성할 것입니다."
RAJ_invade_afghanistan:0 "아프가니스탄 침공"
RAJ_invade_afghanistan_desc:0 "아프가니스탄은 한때 인도의 영향권 아래 있었습니다... 그리고 다시 그렇게 될 것입니다."
RAJ_the_mountain_frontier:0 "산악 국경"
RAJ_the_mountain_frontier_desc:0 "네팔과 부탄은 반도의 일부이며, 우리의 완전한 연방에 통합되어야 합니다."
RAJ_reclaim_treaty_ports:0 "조약항 수복"
RAJ_reclaim_treaty_ports_desc:0 "폰디체리와 고아를 수복하여 어머니 인도에 합류시켜야 합니다."
RAJ_bring_back_burma:0 "버마 병합"
RAJ_bring_back_burma_desc:0 "영국령 인도의 일부였던 불교 영토로서, 버마 또한 대인도의 정당한 일부입니다."
RAJ_unify_dravidian_lands:0 "드라비다 영토 통일"
RAJ_unify_dravidian_lands_desc:0 "남부에는 아직 어머니 인도에 합류하지 않은 드라비다인들이 거주하는 영토가 있습니다. 이제 그것을 바꿀 때입니다."
RAJ_operation_polo:0 "폴로 작전"
RAJ_operation_polo_desc:0 "독립을 선언한 하이데라바드를 응징하고 인도를 통일합시다!"
RAJ_tfv_land_reform:0 "토지 개혁"
RAJ_crush_hyderabad:0 "하이데라바드 분쇄"
RAJ_crush_hyderabad_desc:0 "[HYD.GetNameDef]의 무슬림 엘리트들은 경건한 힌두교도들을 억압하고 있습니다. 그들은 힌두교도의 완전한 자유와 인도 전체의 통일로 가는 길의 장애물입니다."
RAJ_join_the_axis:0 "추축국 가입"
RAJ_join_the_axis_desc:0 "영불 제국주의라는 공동의 적이 인도와 새로운 독일을 단결시킵니다. 우리는 이 동맹을 공식화해야 합니다."
RAJ_reactivate_our_japanese_contacts:0 "일본과의 접선 재개"
RAJ_reactivate_our_japanese_contacts_desc:0 "일본 제국과 그 대동아공영권은 유럽 제국들과 그에 딸린 모든 것을 전복시킬 힘을 가진 유일한 세력입니다. 우리는 그들과의 오랜 접촉선을 활용하여 새로운 동맹의 조건을 협상해야 합니다."
RAJ_new_scientific_order:0 "새로운 과학 질서"
RAJ_new_scientific_order_desc:0 "인도와 우리 동맹국들의 학계는 지속적인 혁신을 보장하기 위해 끊임없이 접촉해야 합니다."
RAJ_ideological_air_force:0 "이념 공군"
RAJ_ideological_air_force_desc:0 "동맹국 및 다른 군부와의 협력을 증진하기 위해, 우리의 가치가 공군에 깊이 뿌리내리도록 해야 합니다."

r56_RAJ_revolt_against_the_oppressors:0 "압제자에 맞선 봉기"
r56_RAJ_revolt_against_the_oppressors_desc:0 "때가 왔습니다. 무기를 들어라! 무기를 들어라! 모든 마을의 모든 이가 식민주의자들에 맞서 싸워야 합니다!"
r56_RAJ_hindu_nationalism:0 "힌두 민족주의"
r56_RAJ_hindu_nationalism_desc:0 "우리는 모두 조국 인도를 사랑하고, 힌두교가 우리 모두를 단결시키는 것임을 인식해야 합니다."
r56_RAJ_substitution_technologies:0 "대체 기술"
r56_RAJ_substitution_technologies_desc:0 "대영제국의 일부 자원에 접근할 수 없으므로, 대체 프로그램을 실행하고 자급자족적 독립을 보장하는 것이 필수적입니다."
r56_RAJ_redistribute_properties:0 "재산 재분배"
r56_RAJ_redistribute_properties_desc:0 "영국의 재산을 재분배하고 토지를 분할함으로써, 우리는 수많은 권리를 박탈당한 이들의 미래를 보장할 수 있습니다."
r56_RAJ_militarized_hindutva:0 "군사화된 힌두트바"
r56_RAJ_militarized_hindutva_desc:0 "시바 신의 이름으로! 모든 힌두교도는 조국 인도에 봉사하고, 적들로부터 신들을 수호해야 합니다."
r56_RAJ_weapons_for_the_new_india:0 "새로운 인도를 위한 무기"
r56_RAJ_weapons_for_the_new_india_desc:0 "혁명은 수호되어야 합니다!"
r56_RAJ_dream_of_akhand_hindustan:0 "아칸드 힌두스탄의 꿈"
r56_RAJ_dream_of_akhand_hindustan_desc:0 "수 세기 동안 외세가 대인도를 분열시켰지만, 이제 단결한 인도인들이 그들의 계략을 분쇄하고 인도의 통일을 완수할 것입니다."
r56_RAJ_invade_afghanistan:0 "아프가니스탄 침공"
r56_RAJ_invade_afghanistan_desc:0 "아프가니스탄은 한때 인도의 영향력 아래에 있었습니다... 그리고 다시 그렇게 될 것입니다."
r56_RAJ_the_mountain_frontier:0 "산악 국경"
r56_RAJ_the_mountain_frontier_desc:0 "네팔과 부탄은 반도의 일부이며, 우리의 완전한 연방에 통합되어야 합니다."
r56_RAJ_reclaim_treaty_ports:0 "조약항 수복"
r56_RAJ_reclaim_treaty_ports_desc:0 "퐁디셰리와 고아는 수복되어 조국 인도에 합류해야 합니다."
r56_RAJ_bring_back_burma:0 "버마 병합"
r56_RAJ_bring_back_burma_desc:0 "인도 제국의 일부였던 불교 영토로서, 버마 또한 대인도의 정당한 일부입니다."
r56_RAJ_unify_dravidian_lands:0 "드라비다 영토 통일"
r56_RAJ_unify_dravidian_lands_desc:0 "남쪽에는 아직 조국 인도에 합류하지 않은 드라비다인 거주 영토가 있습니다. 이제 그것을 바꿀 때입니다."
r56_RAJ_operation_polo:0 "폴로 작전"
r56_RAJ_operation_polo_desc:0 "독립을 선언한 하이데라바드를 응징하고 인도를 통일합시다!"
r56_RAJ_land_reform:0 "토지 개혁"
r56_RAJ_crush_hyderabad:0 "하이데라바드 분쇄"
r56_RAJ_crush_hyderabad_desc:0 "[HYD.GetNameDef]의 무슬림 엘리트들은 경건한 힌두교도들을 억압하고 있습니다. 그들은 힌두교도의 완전한 자유와 전 인도 통일로 가는 길의 장애물입니다."
r56_RAJ_join_the_axis:0 "추축국 가입"
r56_RAJ_join_the_axis_desc:0 "영불 제국주의라는 공동의 적이 인도와 새로운 독일을 단결시킵니다. 우리는 이 동맹을 공식화해야 합니다."
r56_RAJ_reactivate_our_japanese_contacts:0 "일본 연락책 재가동"
r56_RAJ_reactivate_our_japanese_contacts_desc:0 "일본 제국과 그 대동아공영권은 유럽 제국들과 그에 딸린 모든 것을 전복시킬 힘을 가진, 우리 손에 닿는 유일한 세력입니다. 우리는 그들과의 오랜 연락책을 활용하여 새로운 동맹의 조건을 협상해야 합니다."
r56_RAJ_new_scientific_order:0 "새로운 과학 질서"
r56_RAJ_new_scientific_order_desc:0 "인도와 동맹국들의 학계는 지속적인 접촉을 유지하여 끊임없는 혁신을 보장해야 합니다."
r56_RAJ_ideological_air_force:0 "이념 공군"
r56_RAJ_ideological_air_force_desc:0 "동맹국 및 다른 군부와의 협력을 증진하기 위해, 우리의 가치가 공군에 깊이 뿌리내리도록 해야 합니다."
r56_RAJ_towards_a_post_colonial_economy:0 "탈식민지 경제를 향하여"
r56_RAJ_towards_a_post_colonial_economy_desc:0 "경제 개혁과 인도의 잠재력 해방은 인도 기업의 부흥을 가져올 것입니다."
r56_RAJ_modernization_program:0 "현대화 계획"
r56_RAJ_modernization_program_desc:0 "식민지 독점이 철폐되었으니 새로운 경제를 건설할 수 있습니다. 2020년까지 우리는 초강대국이 될 것입니다!"
r56_RAJ_indian_education:0 "인도식 교육"
r56_RAJ_indian_education_desc:0 "식민주의자들은 우리에게 순종적이고 비굴하도록 가르쳤습니다... 우리는 그 지배의 도구들을 내던지고 지식을 이용해 인도를 해방시켜야 합니다!"

 r56_RAJ_establish_a_general_staff:0 "[ROOT.GetAdjective] 총참모부"
 r56_RAJ_establish_a_general_staff_desc:0 "우리 군은 적절한 전술과 조직이 부족합니다. 제대로 된 총참모부를 설립하면 약화된 군 체제를 공고히 할 것입니다."
 r56_RAJ_army_reform:0 "육군 개혁"
 r56_RAJ_army_reform_desc:0 "군의 재편성은 긴 과정입니다. 우리의 새로운 총참모부는 병사들을 훈련시키고 장교들을 교육하기 위한 군사 기동의 필요성을 시사합니다."
 r56_RAJ_doctrine_effort:0 "교리 연구"
 r56_RAJ_equipment_effort:0 "장비 연구"
 r56_RAJ_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 병력에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 r56_RAJ_equipment_effort_2:0 "소화기 현대화"
 r56_RAJ_equipment_effort_2_desc:0 "우리는 보병과 지원 부대가 당대 최고의 장비로 무장할 수 있도록 노력을 계속할 것입니다."
 r56_RAJ_mechanization_effort:0 "기계화 연구"
 r56_RAJ_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고하여, 오늘날 우리가 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 r56_RAJ_doctrine_effort_2:0 "모의 훈련"
 r56_RAJ_doctrine_effort_2_desc:0 "전간기와 최근 분쟁을 거치며 전장의 양상이 변화했습니다. 이를 반영하기 위해 우리는 교리를 지속적으로 재평가해야 합니다."
 r56_RAJ_establish_a_military_academy:0 "육군사관학교 설립"
 r56_RAJ_establish_a_military_academy_desc:0 "새로 설립된 육군사관학교 내에서 교리 연구와 군사 지식 교류를 촉진할 수 있습니다."
 r56_RAJ_equipment_effort_3:0 "야포 연구"
 r56_RAJ_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 우리는 보병 무기 분야의 세계적인 선두 주자가 되어야 합니다."
 r56_RAJ_doctrine_effort_desc:0 "대전쟁 당시 지상전을 정의했던 군사 교리는 시대에 뒤떨어졌습니다. 우리는 최고의 인재들을 투입하여 미래의 군사 사상을 형성해야 합니다."
 r56_RAJ_army_modernization:0 "육군 현대화"
 r56_RAJ_army_modernization_desc:0 "가장 혹독한 군사 기동 및 훈련을 견디기 위해, 우리 병사들에게는 적절한 피복, 장비, 그리고 도구가 필요합니다."
 r56_RAJ_motorization_effort:0 "차량화 연구"
 r56_RAJ_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 이탈시키는 데 매우 중요합니다. 이러한 개발에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 r56_RAJ_establish_a_armor_corp:0 "기갑 군단 창설"
 r56_RAJ_establish_a_armor_corp_desc:0 "최근 구매한 외국 군사 장비는 현지 기술자들이 상상 이상으로 빠르고, 내구성이 뛰어나며, 강력한 신형 기갑 차량을 개발하도록 영감을 주었습니다."
 r56_RAJ_field_hospitals:0 "야전 병원 개선"
 r56_RAJ_field_hospitals_desc:0 "현 상황에서 전투 중 유능하고 경험 많은 병사들을 잃는 것은 용납할 수 없는 사치입니다."
 r56_RAJ_special_forces:0 "특수부대"
 r56_RAJ_special_forces_desc:0 "우리에게는 정예 부대가 필요합니다. 산악 부대와 공수부대를 최우선으로 해야 합니다."
 r56_RAJ_signal_companies:0 "통신 중대"
 r56_RAJ_signal_companies_desc:0 "통신 장비를 갖춘 추가 인력을 투입한다면, 타격 및 군사 작전의 조율이 훨씬 더 효과적일 것입니다. "
 r56_RAJ_modern_logistics:0 "현대적 군수"
 r56_RAJ_modern_logistics_desc:0 "군의 충성심은 우리의 대의를 위해 싸울 수 있는 능력에 기반합니다. 군에 필요한 장비를 보급하지 못한다면, 반란과 대규모 탈영을 겪을 수도 있습니다."

 r56_RAJ_expand_mazagon_dock:0 "마자곤 조선소 확장"
 r56_RAJ_expand_mazagon_dock_desc:0 "뭄바이의 마자곤 조선소는 서해안에서 가장 중요한 조선소입니다. 이 세계적인 위기 속에서 더 큰 생산 능력이 필요합니다."
 r56_RAJ_found_scindia_shipyard:0 "신디아 조선소 설립"
 r56_RAJ_found_scindia_shipyard_desc:0 "우리는 동해안에 조선소가 필요하므로, 비사카파트남에 신디아 조선소를 설립하는 것은 우리 해군의 미래를 위해 합리적인 결정입니다."
 r56_RAJ_royal_indian_navy:0 "왕립 인도 해군"
 r56_RAJ_royal_indian_navy_desc:0 "왕립 인도 해군은 신속하게 확장되어야 합니다. 새로운 전술과 신형 함선이 최우선 과제가 되어야 합니다."
 r56_RAJ_screening_effort:0 "호위 집중"
 r56_RAJ_screening_effort_desc:0 "인도는 수에즈 운하로 가는 남부 항로를 방어하는 데 중요한 역할을 합니다. 초계 및 호위 임무는 유럽과 아프리카 전선으로 중요한 보급품과 병력이 도달하는 데 도움이 될 것입니다."
 r56_RAJ_cruiser_effort:0 "순양함 연구"
 r56_RAJ_cruiser_effort_desc:0 "인도 해군력의 발전과 확장에 있어 당분간은 순양함으로 충분할 것입니다."
 r56_RAJ_submarine_effort:0 "잠수함 연구"
 r56_RAJ_submarine_effort_desc:0 "아시아에서 일본 해군 수상함대의 힘이 커짐에 따라, 잠수함을 이용한 수중 타격에 역량을 집중하는 것이 합리적일 수 있습니다."
 r56_RAJ_capital_ship_effort:0 "주력함 연구"
 r56_RAJ_capital_ship_effort_desc:0 "영국의 전초기지로서, 인도는 주력함이 바다를 지배하는 힘을 목격했습니다. 우리는 우리만의 중순양함과 전함을 건조해야 합니다."
 r56_RAJ_modernizing_navy:0 "해군 현대화"
 r56_RAJ_modernizing_navy_desc:0 "더 나은 엔진, 더 넓은 승조원 공간, 더 빠른 속도, 그리고 더 큰 함포. 인도 해군은 곧 대륙 최고 수준에 도달할 것입니다."
 r56_RAJ_naval_equipment:0 "해군 장비 개량"
 r56_RAJ_naval_equipment_desc:0 "우리 함선에 탑재된 다양한 요소들은 현대화될 수 있으며, 또 그렇게 되어야 합니다."
 r56_RAJ_military_technologies:0 "군사 기술"
 r56_RAJ_military_technologies_desc:0 "우리는 현대화 노력의 혜택을 누리고 신기술에 투자해야 합니다."

 r56_RAJ_aviation_effort:0 "자유 인도 공군"
 r56_RAJ_aviation_effort_desc:0 "우리는 우리의 땅뿐만 아니라 하늘도 해방시켜야 합니다!"
 r56_RAJ_fighter_focus:0 "전투기 개발"
 r56_RAJ_fighter_focus_desc:0 "기민함과 속도는 제공권 장악에 필수적입니다."
 r56_RAJ_bomber_focus:0 "폭격기 개발"
 r56_RAJ_bomber_focus_desc:0 "공격 능력과 항속거리는 적을 제거하는 최선의 방법입니다."
 r56_RAJ_torpedo_bombers:0 "해상 공격기"
 r56_RAJ_torpedo_bombers_desc:0 "항공기가 어뢰로 해군을 타격하는 능력은 영국 해군을 무력화하는 데 매우 중요할 것입니다."
 r56_RAJ_aviation_effort_2:0 "고등 공중 전술"
 r56_RAJ_aviation_effort_2_desc:0 "모든 항공기의 효율을 극대화하고 조종사 손실을 제한하기 위해 새로운 공중 전투 전술을 고안해야 합니다."
 r56_RAJ_rocket_effort:0 "제트 엔진"
 r56_RAJ_rocket_effort_desc:0 "로켓 엔진은 항공 기술의 미래입니다!"
 
 r56_RAJ_revolt_against_the_oppressors_showcase:0 "압제자에 맞선 봉기"
 r56_RAJ_revolt_against_the_oppressors_showcase_desc:0 "우리는 너무나도 오랫동안 타오르는 태양 아래에서 우리의 정당한 유산과 자리를 거부당해왔습니다. 때가 왔습니다. 무기를 들어라, 형제자매들이여! 무기를 들어라, 노동자와 농민들이여! 모든 마을, 소도시, 대도시의 모든 이들이 식민주의자들에 맞서 싸워야 합니다!"
 RAJ_ignore_and_then_support_hazad_hind_to_trigger_the_civil_war:0 "이 루트를 해금하려면, 아자드 힌드가 제기하는 위협을 무시하고 결정을 통해 그들의 주둔을 강화하십시오."
 r56_indian_revolt_focus:0 "아자드 힌드 봉기 중점 트리"
 r56_india_generic:0 "인도 공용 중점 트리"


india.500.t:0 "인도의 통합"
india.500.desc:0 "영국은 인도 아대륙을 단독으로 통치한 것이 아니며, 오히려 그 반대였습니다. 상당한 양의 영토가 여전히 옛 왕조들의 소유입니다. 그들에게는 인민의 안녕보다 자신의 사적인 부가 더 중요하며, 이것이 바로 타협이나 유혈 사태 없이는 그들을 통합하기 어려운 이유입니다. 우리는 우리 인민의 이익을 위해 이들 번왕국들의 완전한 통합을 보장해야 합니다."
india.500.a:0 "전진."

india.501.t:0 "가장 약한 번왕들이 동의하다."
india.501.desc:0 "작은 영지를 다스리는 많은 번왕들이 즉시 그들의 모든 영토를 인도에 할양하는 데 동의했습니다. 고작 몇 제곱마일에 불과한 영토를 다스리는 군주들이 인도 국군에 맞서고 싶어 하지 않을 것이라는 점은 대부분의 고문에게 명백했지만, 결코 확신할 수는 없는 법입니다."
india.501.a:0 "당연한 일이지."

india.4270.t:0 "아사프 자, 인도로의 통합을 거부하다"
india.4270.desc:0 "아사프 자 7세는 새로운 인도 정부로의 통합을 단호히 거부했습니다. 니잠 왕조는 무슬림이지만 인구 대다수는 힌두교도이며, 그들은 자신들의 종교를 통합에 반대하는 주된 논거로 사용해왔습니다."
india.4270.a:0 "사라져가는 세계의 잔재로군."

india.4271.t:0 "하이데라바드, 인도로 통합되다"
india.4271.desc:0 "아사프 자 7세는 오늘 아침 합병 문서에 서명하는 것을 수락하여, 인도로 합류했습니다."
india.4271.a:0 "인도의 승리다."

india.4410.t:0 "잠무 카슈미르, 인도로의 통합을 거부하다"
india.4410.desc:0 "하리 싱이 현 상황에서는 인도로의 통합에 동의하지 않을 것이라고 공개적으로 선언했다고 보고되었습니다."
india.4410.a:0 "때가 되면 대가를 치를 것이다."

india.4411.t:0 "잠무 카슈미르, 자발적으로 인도로 통합되다"
india.4411.desc:0 "어젯밤 그의 궁전에서 하리 싱은 마침내 합병 문서에 서명하고 잠무 카슈미르를 새로운 인도 정부에 할양하는 데 동의했습니다."
india.4411.a:0 "북부 국경이 확보되었다."

india.4250.t:0 "마이소르, 인도 연방 가입을 거부하다"
india.4250.desc:0 "제25대 마이소르의 마하라자는 그의 왕국의 운명을 결정하는 데 많은 이들보다 더 오랜 시간이 걸렸지만, 마침내 인도로의 통합을 거부하는 어리석은 결정을 내렸습니다."
india.4250.a:0 "포기하기에는 너무나도 중요하다."

india.4251.t:0 "마이소르 왕국, 인도로 합류하다"
india.4251.desc:0 "제25대 마이소르의 마하라자는 그의 왕국의 운명을 결정하는 데 많은 이들보다 더 오랜 시간이 걸렸지만, 마침내 그 미래가 인도와 함께한다는 것을 깨달을 만큼 현명했습니다."
india.4251.a:0 "인도의 필수적인 부분입니다!"

india.4440.t:0 "발루치스탄, 저항을 보이다"
india.4440.desc:0 "현 칼라트 칸이 오늘 경솔하고 잘못된 결정을 내려, 자신의 변방 영지를 인도 국민으로부터 격리하여 독차지하기로 했습니다."
india.4440.a:0 "서부를 확보해야 합니다."

india.4441.t:0 "발루치스탄, 인도에 합류하다"
india.4441.desc:0 "현 칼라트 칸이 오늘 정보에 입각한 합리적인 결정을 내려, 자신과 그의 영지가 인도 연방에 참여하기로 했습니다."
india.4441.a:0 "서부 국경이 확보되었습니다."

india.4370.t:0 "괄리오르국, 통일 거부"
india.4370.desc:0 "괄리오르국의 지바지라오 신디아가 인도로의 통합에 대한 어떤 개념도 차단했습니다. 대부분의 국민이 인도와의 통일을 추구하고 있어, 이는 그의 왕국을 크게 불안정하게 만들었습니다."
india.4370.a:0 "언젠가 그들을 해방시킬 것입니다."

india.4371.t:0 "괄리오르국, 통일 환영"
india.4371.desc:0 "괄리오르국의 지바지라오 신디아는 자신의 왕국과 자신의 미래에 대해 오랫동안 숙고했으며, 우리의 호의적인 양보 덕분에 인도로 통합하기로 결정했습니다."
india.4371.a:0 "영광스러운 날입니다."

india.4330.t:0 "자이푸르국, 통합 폐기"
india.4330.desc:0 "자이푸르의 17대 마하라자 만 싱 2세가 유감스럽게도 자이푸르국에 대한 완전한 통제권을 유지하기로 결정했으며, 거리의 사람들은 이 이기적인 결정에 항의하고 있습니다."
india.4330.a:0 "정말 유감입니다."

india.4331.t:0 "자이푸르국, 통합 수용"
india.4331.desc:0 "근본적으로 지식인인 자이푸르의 17대 마하라자는 통일된 인도를 요구하는 민족주의적 목소리를 인지하고, 통일 인도에 합류하는 것이 자신의 도덕적 의무임을 깨달았습니다."
india.4331.a:0 "참으로 현명한 조치입니다."

india.4280.t:0 "림디국, 편입 거절"
india.4280.desc:0 "림디국의 다울라트신지 자쉬완트신지는 잘라 왕조의 전통적인 일원으로, 그는 완고한 보수주의자이며 그의 왕국은 대부분 농촌 공동체로 구성되어 있습니다. 그가 자신의 구식 견해를 고수하고 통일에 반대하기로 결정한 것은 사실 놀라운 일이 아닙니다."
india.4280.a:0 "슬픈 현실입니다."

india.4281.t:0 "림디국, 병합 수락"
india.4281.desc:0 "림디국의 왕자는 강경한 전통주의자일 수 있지만, 그는 잘못된 결정의 지정학적 결과를 깨닫고 가입 문서에 서명하여 그의 백성을 구했습니다."
india.4281.a:0 "현명한 결정입니다."


  # Focus
 SIA_resist_the_governement:0 "카나 랏사돈에 저항하라"
 SIA_resist_the_governement_desc:0 "카나 랏사돈 정부는 매일 권위주의와 민족주의, 그리고 맹목적 애국주의 수사로 점점 더 기울고 있습니다. 시암은 결코 파시스트 국가가 되지 않을 것이며, 이를 확실히 하는 가장 좋은 방법은 그들을 제거하는 것입니다!"
 SIA_the_democratic_cause:0 "민주주의 대의"
 SIA_the_democratic_cause_desc:0 "우리 첫 혁명의 문제는 군부가 너무 큰 중요성을 차지했다는 것입니다. 보다 민간적인 정부를 창설함으로써, 우리는 우리 국민이 오랫동안 기다려온 자유와 민주주의를 성취할 것입니다."
 SIA_the_monarchist_cause:0 "왕정주의 대의"
 SIA_the_monarchist_cause_desc:0 "혁명, 헌법... 이 모든 것은 우리 국가에 어울리지 않습니다. 완벽하게 작동하던 체제를 바꾸려 한 것은 잘못된 결정이었지만, 군부 때문에 나라를 떠나야 했던 시암의 정당한 왕 라마 7세에게 왕위를 복위시키는 것부터 시작하여 그 효과를 되돌릴 시간은 아직 있습니다."
 SIA_write_a_new_constitution:0 "새 헌법 제정"
 SIA_write_a_new_constitution_desc:0 "정부에 대한 훨씬 더 큰 민간 통제를 보장하는 새 헌법이 우리 입법에 대한 군사적 영향력을 영구히 제거하기 위해 제정될 것입니다."
 SIA_restore_rama_vii:0 "라마 7세 복위"
 SIA_restore_rama_vii_desc:0 "라마 7세가 공식적으로 시암에 귀국했으며, 대관식 준비를 하고 있습니다. 대관식에서 그의 왕위가 반환되고 1932년 헌법은 폐지될 것입니다."
 SIA_closer_to_the_west:0 "서방과 가깝게"
 SIA_closer_to_the_west_desc:0 "우리가 힘들게 얻은 자유의 가치를 지키고 싶다면, 일본 제국과 같은 팽창주의적 위협에 맞서 스스로를 방어할 수 있는 동맹이 필요할 것입니다."
 SIA_opening_the_economy:0 "사업 개시!"
 SIA_opening_the_economy_desc:0 "전 세계의 많은 자유 민주주의 국가와 유사한 경제 모델을 채택함으로써, 우리는 시암 또한 투자의 땅이 될 수 있음을 보여줄 수 있습니다."
 SIA_the_yellow_cover_dossier:0 "황색 표지 문서철"
 SIA_the_yellow_cover_dossier_desc:0 "1933년 초, 쁘리디 파놈용은 대공황의 여파에 맞서기 위해 사회주의 모델에 기반한 경제 개혁안인 '황색 표지 문서'를 통과시키려 했으나, 국왕과 군부는 이에 반대하여 쁘리디에게 충성하는 카나 랏사돈의 민간파를 약화시키기 위해 새로운 쿠데타까지 일으켰습니다. 이제 공화국을 완전히 장악한 그는 자신의 개혁을 실행하고 시암 인민에게 이로운 방향으로 경제를 개혁할 수 있게 되었습니다."
 SIA_monitor_the_army:0 "군 감시"
 SIA_monitor_the_army_desc:0 "군이 다시는 권력을 잡지 못하도록 하기 위해, 우리는 주요 개혁을 시행할 것입니다. 특히 군인이 장군보다 정부에 먼저 복종하도록 하여 장군들의 영향력을 줄일 것입니다."
 SIA_a_model_democracy:0 "모범적인 민주주의"
 SIA_a_model_democracy_desc:0 "수년간의 독재 정권 끝에, 시암은 과오를 딛고 일어서 이제 아시아에서 가장 민주적인 국가 중 하나가 되었습니다!"
 SIA_denounce_fascism:0 "파시즘 규탄"
 SIA_denounce_fascism_desc:0 "파시즘은 인민을 억압하고 분열시키기 위해 고안된 이념입니다. 카나 랏사돈의 많은 이들이 이러한 운동에 동조했으며, 우리와 같은 고통을 자국민에게 가하려는 모든 정부에 반대하는 것이 우리의 의무입니다."
 SIA_negociations_with_france:0 "프랑스와의 협상"
 SIA_negociations_with_france_desc:0 "프랑스가 우리를 가장 많이 대적했고, 동시에 캄보디아나 라오스를 잃게 만들어 우리에게 굴욕을 안겨준 국가인 것은 사실입니다. 하지만 그것은 절대 왕정 시대의 일이었습니다. 우리는 변했고, 평화적으로 프랑스에 접근할 준비가 되어 있습니다. 그 대가로, 어쩌면 우리는 라오스와 캄보디아 형제들과 재회할 권리를 얻을 수 있지 않을까요?"
 SIA_boom_in_foreign_investments:0 "해외 투자 급증"
 SIA_boom_in_foreign_investments_desc:0 "우리의 외교적 책략은 성공적이었습니다. 우리 정권의 새로운 안정성에 힘입어 우리가 받는 투자가 크게 증가했습니다. 우리는 경제의 새로운 시대의 여명에 서 있습니다!"
 SIA_the_british_military_mission:0 "영국 군사 고문단"
 SIA_the_british_military_mission_desc:0 "우리는 영국으로부터 군사 대표단을 파견받는 협상을 할 수 있었습니다. 전 세계의 전장을 경험한 사람들을 우리 군인들의 교관으로 두는 것은 큰 자산이 될 것입니다."
 SIA_a_westernised_nation:0 "서구화된 국가"
 SIA_a_westernised_nation_desc:0 "우리는 많은 서방 국가에 필적하는 수준의 경제, 군사, 정부 연구 및 개발을 달성했습니다. 우리는 이 세상의 중요한 국가들 사이에서 우리의 자리를 얻었습니다."
 SIA_the_oligarchic_governement:0 "과두 정부"
 SIA_the_oligarchic_governement_desc:0 "개발 중"
 SIA_supreme_council:0 "최고 국무 위원회"
 SIA_supreme_council_desc:0 "시암 최고 국무 위원회는 입법 위원회였으며, 당시에는 라마 7세의 결정을 돕기 위해 짜끄리 왕조의 왕자들로 구성되었습니다. 위원회를 재설치하면 이 혼란한 시기에 유능하고 중요한 관리들을 곁에 둘 수 있을 것입니다."
 SIA_municipalism:0 "지방 자치주의"
 SIA_municipalism_desc:0 "프라차피반, 즉 지방 자치주의는 라마 7세가 수년 전부터 발전시켜 온 개념입니다. 지방 자치 단체는 자체적으로 세금을 걷고 예산을 가질 수 있게 될 것입니다."
 SIA_consolidate_Khana_Ratsadon:0 "카나 랏사돈 공고화"
 SIA_consolidate_Khana_Ratsadon_desc:0 "수많은 반대에도 불구하고, 프라야 파혼폰파유하세나 정부는 시암에 대한 통제권을 공고히 하는 데 성공했습니다. 군국주의적이고 일당 독재적인 정책으로, 시암은 유럽 파시즘이나 일본 군국주의를 자국식으로 각색한 형태로 서서히 빠져드는 것 같습니다."
 SIA_increase_the_artistic_propaganda:0 "예술 선전 강화"
 SIA_increase_the_artistic_propaganda_desc:0 "몇 년 전부터 우리 국민들 사이에 민족주의 정신을 함양하기 위해 문화적 차원에서 많은 노력을 기울여 왔습니다. 영화, 연극 등 모든 것이 태국 인민이 전사 정신을 기르도록 마련되었으며, 그 대가로 우리는 징집병 수를 늘릴 수 있을 것입니다."
 SIA_weaken_the_civilian_wing:0 "민간파 약화"
 SIA_weaken_the_civilian_wing_desc:0 "당의 민간파는 우리의 길에 또 다른 장애물일 뿐이었습니다. 그들은 강력한 군의 존재를 비난하고 더 평화주의적인 외교 정책을 원했습니다. 분열의 위험을 제거하기 위해서는 당의 재조직이 필요하다는 것이 분명합니다."
 SIA_fate_of_the_monarchy:0 "군주제의 운명"
 SIA_fate_of_the_monarchy_desc:0 "많은 이들이 라마 7세가 정부에 항의하다 결국 망명하게 된 것을 기억합니다. 당내에서는 군주제 기관의 완전한 폐지를 요구하는 목소리가 여럿 들리지만, 다른 이들은 공화국 창설이 민주주의나 공산주의 운동을 부추길 수 있다고 우려합니다. "
 SIA_phibun_ascension:0 "피분 집권"
 SIA_phibun_ascension_desc:0 "전 국방부 장관이자 정부의 2인자였던 쁠랙 피분송크람 원수는 우리 국가를 이끌 적임자로 보입니다. 그의 이상은 이탈리아나 독일과 같은 일부 유럽 파시스트 운동과 유사할 수 있습니다. 피분은 기본적으로 위대한 애국자이며, 태국 인민을 끊임없이 분열시키고 해체해 온 유럽 제국주의자들에 맞서 태국 인민의 부활을 바라고 있습니다."
 SIA_anti_chinese_rethoric:0 "반중 수사"
 SIA_pan_thai_propaganda:0 "마하 아나착 타이"
 SIA_pan_thai_propaganda_desc:0 ""대태국 제국"을 의미하는 "마하 아나착 타이"는 피분의 충실한 동맹이자 민족주의 및 실지회복주의 이데올로그인 루앙 위칫와타깐이 주로 발전시킨 개념입니다. 태국 인민이 강대국들 사이에서 제자리를 찾기를 원한다면, 서구 제국주의자들에 의해 부당하게 분리된 우리 민족을 재통합하는 것부터 시작해야 합니다."
 SIA_economic_nationalism:0 "경제적 민족주의"
 SIA_economic_nationalism_desc:0 "우리는 경제적 자급자족을 달성하고, 우리 민족이 아닌 민족에 대한 의존의 상징인 중국 자본을 제거해야 합니다. 상업 이익에 대한 세금이 인상될 것이며, 특히 군수품과 관련된 국영 기업이 도입될 것입니다."
 SIA_dictatorial_control:0 "독재 통제"
 SIA_dictatorial_control_desc:0 "이제 대부분의 경쟁자들이 체포되거나 추방되었으므로, 피분은 누구에게도 권력에 도전받을 위험 없이 자신이 구상하는 태국을 세울 수 있을 것입니다."
 SIA_prepare_for_the_reconquest:0 "재정복 준비"
 SIA_prepare_for_the_reconquest_desc:0 "수십 년 전에 잃어버린 우리 영토를 재정복하기 위해 정부와 태국 인민 모두 엄청난 노력을 기울여야 할 것입니다. 군수 산업이나 군 경력에 대한 대대적인 선전이 전개되어 우리가 전쟁에 나설 준비가 되도록 할 것입니다."
 SIA_choosing_a_side:0 "산업 기밀 공유"
 SIA_choosing_a_side_desc:0 "제국주의 열강을 물리치기 위해서는 우리와 같은 목표를 가진 동맹국이 필요할 것입니다. 동쪽에는 일본이 있는데, 가깝다는 이점과 영국 함대와 경쟁할 수 있는 함대를 보유하고 있습니다. 그들의 도움으로 우리는 목표를 달성하기 위한 더 나은 무기를 얻을 수 있습니다."
 SIA_increase_the_military_budget:0 "군사 예산 증액"
 SIA_increase_the_military_budget_desc:0 "우리의 모든 경제적 노력은 우리 군인들이 적수에게 맞설 수 있도록 충분한 첨단 장비를 갖출 수 있는 군수 공장을 건설하는 데 투자되어야 합니다."
 SIA_retake_our_lands:0 "우리 영토 탈환"
 SIA_retake_our_lands_desc:0 "유럽인들에 의해 우리의 많은 옛 영토가 식민지화되었던 우리 역사의 오점을 지울 때가 왔습니다. 곧, 우리는 모든 태국 민족을 하나로 모으고, 아시아와 세계의 강대국으로서 우리의 지위를 확고히 할 것입니다!"
 SIA_winds_of_the_revolution:0 "혁명의 바람"
 SIA_winds_of_the_revolution_desc:0 "공산주의 운동은 아시아에서 매일 더 많은 지지를 얻고 있습니다. 우리가 진정으로 우리 인민을 해방시키고 싶다면, 식민 제국을 통해 인민을 억압하는 것을 멈추지 않았던 자본주의 또한 물리쳐야 합니다."
 SIA_massive_land_reforms:0 "대규모 토지 개혁"
 SIA_massive_land_reforms_desc:0 "수 세기 동안 농민들은 봉건 제도하에 고통받아 왔으며, 그들이 경작하는 땅조차 그들의 소유가 아니었습니다. 우리는 토지를 국유화하고 이를 경작하는 이들에게 공평하게 재분배함으로써 이 불의를 바로잡을 것입니다."
 SIA_finding_allies:0 "동맹 모색"
 SIA_finding_allies_desc:0 "아시아, 나아가 전 세계에서 혁명을 완수하기 위해 우리는 다른 공산주의 국가들의 지원을 모색해야 합니다. 특히 소비에트 연방은 오랫동안 혁명의 발상지이자 보루로 여겨져 왔습니다."
 SIA_the_socialist_secret_police:0 "사회주의 비밀경찰"
 SIA_the_socialist_secret_police_desc:0 "잠재적인 반혁명 분자로부터 국가를 보호하기 위해, 우리는 위험인물로 간주되는 자들에 대한 방첩 및 감시를 전담하는 경찰력을 창설할 것입니다."
 SIA_remove_the_monarchist_system:0 "군주제 폐지"
 SIA_remove_the_monarchist_system_desc:0 "퇴폐적인 군주제는 시암 인민 억압의 상징입니다. 시암 인민은 오랫동안 왕가에서 태어났다는 것만이 유일한 장점인 지도자의 기대에 부응해야 했습니다. 우리의 새로운 혁명은 이 모든 것을 숙청하고 이 제도를 진정한 능력주의로 대체할 것입니다."
 SIA_defending_the_revolution:0 "혁명 수호"
 SIA_guerilla_units:0 "게릴라 부대"
 SIA_guerilla_units_desc:0 "모든 인민은 우리의 영광스러운 혁명을 막으려는 자본주의 세력에 맞서 싸우고 저항하는 법을 배워야 합니다. 우리 인민은 무장해야 하며, 모든 이가 혁명을 수호하는 애국적 의무를 다할 수 있도록 해야 합니다!"
 SIA_housing_program:0 "주택 공급 계획"
 SIA_establish_a_new_bureaucracy:0 "새로운 관료제 수립"
 SIA_revolutionnary_education:0 "혁명 교육"
 SIA_revolutionnary_education_desc:0 ""
 SIA_crush_the_remaining_capitalists:0 "잔존 자본가 분쇄"
 SIA_crush_the_remaining_capitalists_desc:0 "우리 국가를 병들게 하던 마지막 남은 자본주의 분자들을 거의 다 제거했습니다. 은행과 모든 공장, 그리고 마지막으로 농장이 국유화될 것입니다."
 SIA_army_purge:0 "군부 숙청"
 SIA_army_purge_desc:0 "군부에는 여전히 군주제나 카나 랏사돈에 충성하는 분자들이 남아있을 수 있습니다. 혁명을 위해, 반동 쿠데타가 일어나지 않도록 숙청이 필요합니다."
 SIA_disturb_indochina:0 "인도차이나 교란"
 SIA_disturb_indochina_desc:0 "우리의 인도차이나 동지들은 수년간 이 지역의 프랑스 식민 통치에 맞서 싸워왔습니다. 정치적이든 군사적이든 공식적인 지원을 제공함으로써, 우리는 인도차이나에서 프랑스 세력을 몰아내고 이 지역 전체에 반란을 촉발시킬 수 있을 것입니다."
 SIA_exporting_the_revolution:0 "SIA_exporting_the_revolution"
 SIA_bring_the_revolution_to_asia:0 "아시아에 혁명을"
 SIA_bring_the_revolution_to_asia_desc:0 "아시아를 분할하기로 결정한 식민 제국들 때문에 많은 민족이 여전히 고통받고 있습니다. 이들은 우리의 도움이 필요하며, 우리는 그들을 도울 것입니다! 아시아의 노동자들이여, 단결하라!"
 SIA_a_new_bastion_of_communism:0 "공산주의의 새로운 보루"
 SIA_a_new_bastion_of_communism_desc:0 "우리의 혁명은 이제 시암 인민의 마음속에 완벽히 뿌리내렸습니다. 우리는 공산주의 혁명이 우리와 같은 나라에서도 작동할 수 있다는 것을 세계에 증명하는 데 성공했습니다."
 SIA_the_siamese_leap_forward:0 "시암의 대약진 운동"
 SIA_the_siamese_leap_forward_desc:0 "이제 우리 사회와 국가 전체를 현대화할 계획을 시작할 때입니다. 장기적으로 가장 완전한 평등이 달성되고 더 정의로운 사회가 자리 잡을 수 있도록 할 것입니다."
 SIA_begin_industrialisation_projects:0 "산업화 계획 착수"
 SIA_end_the_depression:0 "대공황 종식"
 SIA_end_the_depression_desc:0 "대공황은 우리의 수출, 특히 쌀 수출에 큰 타격을 주었고 급격한 인플레이션을 유발했습니다. 다양한 경제 개혁과 수출 파트너 변경을 통해, 우리는 위기 이전과 비슷한 경제 수준으로 회복하는 데 성공했습니다."
 SIA_begin_industrialisation_plans:0 "산업화 개발"
 SIA_begin_industrialisation_plans_desc:0 "경제적 경쟁력을 유지하려면 산업 단지 건설이 필수적입니다. 미래는 들판뿐만 아니라 공장에도 있습니다."
 SIA_increase_the_education_budget:0 "교육 예산 증액"
 SIA_increase_the_education_budget_desc:0 "지난 수십 년간 더 많은 인구가 교육을 받을 수 있도록 많은 노력이 있었습니다. 공교육 예산을 증액함으로써, 우리는 매년 졸업생 수가 증가하도록 보장할 것입니다."
 SIA_improve_our_roads:0 "도로 개발 계획"
 SIA_improve_our_roads_desc:0 "일부 지역의 기반 시설은 여전히 상대적으로 미개발 상태이며, 이는 해당 지역의 경제적 잠재력을 심각하게 저해합니다. 이 도로들을 개선하기 위한 대규모 사업을 시작함으로써, 우리는 이 지역에 대한 정부의 통제력이 향상되도록 보장할 수 있습니다."
 SIA_improve_the_rubber:0 "SIA_improve_the_rubber"
 SIA_improve_the_rubber_extraction:0 "고무 채취 개선"
 SIA_develop_rubber_extraction:0 "고무 채취 개발"
 SIA_develop_rubber_extraction_desc:0 "고무는 시암에서 매우 풍부한 자원입니다. 이를 수확하기 위한 많은 시설이 이미 마련되어 있지만, 생산량 측면에서 크게 개선될 수 있습니다."
 SIA_electronic_research:0 "전자공학 연구"
 SIA_electronic_research_desc:0 "전자공학은 빠른 속도로 발전하고 있으며, 다음 전쟁에서 중요한 위치를 차지할 수 있습니다. 이 분야에서 세계적인 수준에 도달하려는 노력은 가치가 있을 것입니다..."
 SIA_abandon_the_gold_standard:0 "금본위제 폐지"
 SIA_attract_investments:0 "투자 유치"
 SIA_attract_investments_desc:0 "국가 현대화에 대한 우리의 의지를 보여주고 외국인 투자에 우호적인 정책을 제안함으로써, 우리는 우리나라가 산업 기반을 구축하는 것을 볼 수 있을 것입니다."
 SIA_state_sponsored_civilian_construction:0 "국가 주도 민간 건설"
 SIA_state_sponsored_civilian_construction_desc:0 "민간 물자 생산과 건물 개선에 사용될 수 있는 공장을 짓는 것은 정부의 역할입니다."
 SIA_dig_for_tungsten:0 "텅스텐 채굴"
 SIA_dig_for_tungsten_desc:0 "우리 지하에는 금속, 특히 일부 군사 장비 생산에 필수적인 재료인 텅스텐이 풍부합니다. 이를 채굴하면 포나 이를 필요로 하는 다른 부품 생산에 있어 세계 무역에 대한 의존도를 줄일 수 있습니다."
 SIA_electrification_effort:0 "전기화 완료"
 SIA_electrification_effort_desc:0 "전기는 아직도 국내 가장 시골 지역에서는 비교적 접근하기 어렵습니다. 에너지 생산과 분배를 발전시킴으로써, 우리는 다른 지역에 발전소를 건설할 수 있을 것입니다."
 SIA_urbanisation_effort:0 "도시화 장려"
 SIA_urbanisation_effort_desc:0 "우리 인구의 상당 부분은 여전히 농부로 구성되어 있어, 공장에서 일할 수 없습니다. 대도시에 주택 건설 프로그램을 만들고 사람들의 이주를 장려함으로써, 우리 공장의 노동력을 늘릴 수 있을 것입니다."
 SIA_open_new_universities:0 "신규 대학 설립"
 SIA_open_new_universities_desc:0 "도시 인구의 증가는 대학 정원 수요 증가로 이어졌습니다. 고등 교육을 받고자 하는 모든 이들이 그럴 수 있도록 새로운 대학을 짓는 것이 우리의 의무입니다."
 SIA_artillery_factories:0 "포병 공장"
 SIA_artillery_factories_desc:0 "포병 장비 건설에 필요한 자원을 보유하고 있으므로, 이 기회를 활용하여 포병 장비 생산에 전념하는 공장을 만드는 것이 현명할 것입니다."
 SIA_armament_effort:0 "SIA 군비 증강"
 SIA_establish_military_factories:0 "군수 공장 설립"
 SIA_establish_military_factories_desc:0 "다음 전쟁에서 살아남으려면 우리 군대에 필요한 모든 장비를 제공할 수 있는 실질적인 산업 단지를 설립하는 것이 필수적입니다."
 SIA_second_siamese_revolution:0 "제2차 시암 혁명"
 SIA_second_siamese_revolution_desc:0 "카나 랏사돈은 절대 왕정의 종식을 이용하여 시암 국민에게 자신들의 폭정을 강요했습니다. 시암에서 폭군을 몰아내기 위해서는 새로운 혁명이 필요한 것 같습니다."
 SIA_naval_developement_plan:0 "해군 개발 계획"
 SIA_naval_developement_plan_desc:0 "해상전은 계속해서 전쟁의 필수 요소이며, 잠재적인 해상 침투에 취약한 우리의 위치 때문에 그 중요성은 더욱 강화됩니다. 잠재적으로 적의 해군에 저항할 수 있는 해군을 창설하는 것이 필수적입니다."
 SIA_reform_our_tactics:0 "전술 개혁"
 SIA_reform_our_tactics_desc:0 "시대와 상관없이, 해전의 승리는 가장 크고 강한 함선을 소유한 자의 것입니다. 질적 정책에 집중함으로써, 우리는 해안을 더 잘 방어할 수 있을 것입니다."
 SIA_adopt_new_tactics:0 "신규 전술 채택"
 SIA_adopt_new_tactics_desc:0 "최근 몇 년간의 기술 발전은 해상전의 양상을 완전히 바꾸어 놓았습니다. 수중, 레이더, 기뢰 등, 이 상황에서 벗어나려면 우리는 이러한 신기술에 적응해야 합니다."
 SIA_quality_over_quantity:0 "양보다 질"
 SIA_quality_over_quantity_desc:0 "승리는 다른 어떤 함선에도 견딜 수 있는 함선을 건조하는 데 있습니다. 전함의 현대화가 필요합니다."
 SIA_develop_naval_fortifications:0 "해안 요새 개발"
 SIA_develop_naval_fortifications_desc:0 "만약 적이 우리 함대를 격침시킨다면, 우리는 잠재적인 해상 침공을 격퇴하기 위해 항구를 방어할 준비가 되어 있어야 합니다!"
 SIA_modernise_our_battleships:0 "전함 현대화"
 SIA_modernise_our_battleships_desc:0 "전함은 우리 해군에 필요한 것입니다. 강력하고, 저항력이 있으며, 전함과 함께라면 실패할 수 없습니다."
 SIA_study_submarines:0 "잠수함 연구"
 SIA_study_submarines_desc:0 "수중전은 적의 보급선을 방해하거나 심지어 차단하고, 일부 대형 함선을 은밀하게 공격할 수 있게 해줄 것입니다. "
 SIA_naval_mass_production:0 "해군 함선 대량 생산"
 SIA_naval_mass_production_desc:0 "해군의 성공은 항상 맞서 싸우고 적을 효과적으로 괴롭힐 수 있는 능력에 달려 있습니다. 대량 생산에 집중함으로써, 우리는 영구적인 해상 주둔을 유지할 수 있을 것입니다."
 SIA_develop_cruisers:0 "순양함 개발"
 SIA_develop_cruisers_desc:0 "우리 잠수함 함대를 지원하기 위해 순양함 개발이 필요합니다."
 SIA_destroyers_effort:0 "구축함 증강"
 SIA_destroyers_effort_desc:0 "적 잠수함으로부터 우리를 보호하기 위해, 잠수함을 추적하고 제거하는 데 특화된 함선을 개발해야 할 것입니다."
 SIA_establish_a_naval_college:0 "해군 사관학교 설립"
 SIA_establish_a_naval_college_desc:0 "자격 있는 선원이 부족하지 않도록, 새로운 해군 학교를 설립할 것입니다."
 SIA_naval_fortifications:0 "해안 요새"
 SIA_naval_fortifications_desc:0 "우리 해군이 무력화될 경우, 해상 침공을 피하기 위해 항구에 요새를 건설해야 합니다."
 SIA_increase_the_naval_production:0 "해군 함선 생산 증대"
 SIA_increase_the_naval_production_desc:0 "함선 생산 능력은 명백히 불충분합니다. 새로운 조선소 건설을 조직함으로써, 우리는 생산량 증가를 보장할 수 있을 것입니다."
 SIA_increase_navy_fundings:0 "해군 예산 증액"
 SIA_increase_navy_fundings_desc:0 "우리 해군이 필요한 모든 자원을 갖출 수 있도록, 예산의 더 큰 부분을 해군 현대화에 할당해야 합니다."
 SIA_army_reform_plan:0 "육군 개혁 계획"
 SIA_army_reform_plan_desc:0 "우리 군은 대전쟁 이후 새로운 분쟁을 겪지 않았으며, 그 결과 이 지역을 포함한 다른 군대에 비해 그다지 현대적이지 않습니다. 현대 장비를 채택하고 전차와 같은 신기술을 사용하는 것이 필요합니다."
 SIA_new_rifles:0 "신형 소총"
 SIA_new_rifles_desc:0 "소총은 항상 군인의 대표적인 무기였습니다. 구식 소총을 사용할 여유가 없으므로, 새로운 모델을 개발해야 합니다."
 SIA_listen_to_new_officers:0 "신임 장교의 의견 경청"
 SIA_listen_to_new_officers_desc:0 "전쟁은 끊임없이 변화하고, 새로운 전술이 발명되며 다른 전술은 버려져야 합니다. 신임 장교들의 아이디어에 더 큰 중요성을 부여함으로써, 더는 필요하지 않은 전술을 사용하는 것을 피할 수 있을 것입니다."
 SIA_jungle_training:0 "정글 훈련"
 SIA_jungle_training_desc:0 "정글 전투를 위한 특별 훈련은 우리가 잘 아는 환경에서 더 잘 방어할 수 있게 해줄 것입니다."
 SIA_improve_logistics:0 "병참 개선"
 SIA_improve_logistics_desc:0 "진지전에서 우리 부대와 장비를 적절히 이동시키는 능력은 필수적입니다. 무선 통신과 같은 기술 개발은 우리 군대를 더 잘 조율하는 데 도움이 될 것입니다."
 SIA_artillery_developement:0 "포병 개발"
 SIA_artillery_developement_desc:0 "우리 군에 포병 연대를 추가하면 절실히 필요한 돌파 능력을 크게 향상시킬 수 있을 것입니다."
 SIA_anti_tank_research:0 "대전차 연구"
 SIA_anti_tank_research_desc:0 "소총만으로는 전차에 저항하기가 매우 어려울 것이므로, 장갑을 관통할 수 있는 새로운 유형의 포를 개발해야 합니다."
 SIA_tanks_research:0 "전차 연구"
 SIA_study_tanks:0 "전차 연구"
 SIA_study_tanks_desc:0 "전차는 비용이 많이 들지만 그 효과는 논쟁의 여지가 없는 기술입니다. 우리만의 모델을 개발하는 것이 우선순위가 되어야 합니다."
 SIA_improved_r_d:0 "개량된 연구개발"
 SIA_improved_r_d_desc:0 "시간이 지남에 따라 전쟁에서 승리하기 위해 기술 발전이 더욱 중요해집니다. 연구개발에 대한 투자를 늘려 연구 역량을 증대시킬 것입니다."
 SIA_doctrines_improvement:0 "교리 개선"
 SIA_doctrines_improvement_desc:0 "우리 군을 위한 명확한 전략을 정의하고, 그 전략을 개선하는 데 모든 노력을 집중해야 합니다."
 SIA_national_mobilisation:0 "국가 총동원"
 SIA_national_mobilisation_desc:0 "예비군이 고갈되지 않도록 더 엄격한 징병제를 시행해야 합니다."
 SIA_ready_for_war:0 "전쟁 준비 완료"
 SIA_ready_for_war_desc:0 "우리 군은 마침내 다가올 분쟁에 맞설 준비를 마쳤습니다. 적들은 우리 병사들을 보고 공포에 떨게 될 것입니다!"
 SIA_the_siamese_air_force:0 "시암 공군"
 SIA_the_siamese_air_force_desc:0 "항공 기술은 정찰이나 폭격이 가능한 항공기를 통해 민간 및 군사 양면에서 진정한 혁명을 일으켰습니다. 적의 공군에 맞서기 위해 진정한 공군을 창설하는 것이 시급합니다!"
 SIA_build_new_airports:0 "신규 공항 건설"
 SIA_build_new_airports_desc:0 "모든 항공기 생산을 시작하기 전에, 항공기를 출격시킬 수 있는 공군 기지를 건설해야 합니다."
 SIA_rule_the_skies:0 "제공권 장악"
 SIA_rule_the_skies_desc:0 "무엇보다도 우리 병력과 기반 시설을 방어하는 것을 생각해야 하며, 적 폭격기를 공격할 수 있는 더 빠른 항공기를 개발해야 합니다."
 SIA_death_from_the_skies:0 "하늘에서 내려온 죽음"
 SIA_death_from_the_skies_desc:0 "더 강력한 폭격기를 개발함으로써 적의 기반 시설에 피해를 주어 산업과 보급을 방해할 수 있습니다."
 SIA_establish_aviation_school:0 "항공 학교 설립"
 SIA_establish_aviation_school_desc:0 "미래의 조종사 훈련에 전념하는 학교는 우리 기계를 운용하는 인원들이 최대한의 자격을 갖추도록 보장하는 데 필요합니다."
 SIA_anti_air_protection:0 "대공 방어"
 SIA_anti_air_protection_desc:0 "우리 항공기만으로는 모든 적기를 격추하지 못할 수도 있습니다. 이것이 바로 지상에서 그들을 지원할 수 있는 지상포를 건설하려는 이유입니다."
 SIA_long_range_fighters:0 "장거리 전투기"
 SIA_long_range_fighters_desc:0 "우리에게 필요한 것은 더 빠른 전투기입니다! 더 강력하고! 더 멀리 가는!"
 SIA_troops_destruction:0 "병력 파괴"
 SIA_troops_destruction_desc:0 "상공에서 적군을 공격하여 큰 피해를 입힐 수 있으며, 이는 지상 전투를 용이하게 할 것입니다."
 SIA_a_new_bureaucracy:0 "새로운 관료제"
 SIA_ensure_loyalty_in_the_army:0 "군 내 충성 확보"
 SIA_ensure_loyalty_in_the_army_desc:0 "군은 1932년 쿠데타의 주역이었으며, 이는 군 내에 불충이 존재함을 증명합니다. 첫 쿠데타의 주요 선동자들에 대한 재판에 이어, 우리는 군 내에 더 이상 반역자가 없도록 해야 합니다."
 SIA_a_new_bureaucracy_desc:0 "군부가 수립한 관료제는 우리 왕국이 필요로 하는 것과 전혀 맞지 않습니다. 우리는 많은 관할 구역의 운영 방식을 다시 작성해야 할 것입니다."
 SIA_the_devoted_king:0 "헌신적인 국왕"
 SIA_the_devoted_king_desc:0 "라마 7세는 자비로운 국왕으로, 오직 백성을 위한 최선만을 바랍니다. 그는 청원을 읽고 백성의 소리에 귀를 기울입니다. 이는 군주제에 대한 국민의 신뢰를 구축하며, 이 혼란한 시기에 우리에게 절실히 필요한 것입니다."
 SIA_stay_on_guard:0 "경계 태세 유지"
 SIA_stay_on_guard_desc:0 "이 혼란한 시기에는 어떤 동맹국도 무너질 수 있고, 누구든 우리의 적이 될 수 있습니다. 실용적인 외교 정책을 유지함으로써 우리는 지정학적 변화에 적응할 수 있을 것이며, 다음 전쟁에서 살아남을 수도 있을 것입니다."
 SIA_the_royal_cult:0 "왕실 숭배"
 SIA_the_royal_cult_desc:0 "라마 7세는 자비로운 국왕으로, 오직 백성을 위한 최선만을 바랍니다. 그는 청원을 읽고 백성의 소리에 귀를 기울입니다. 이는 군주제에 대한 국민의 신뢰를 구축하며, 이 혼란한 시기에 우리에게 절실히 필요한 것입니다."
 SIA_surpass_the_nobility:0 "귀족 세력 억제"
 SIA_surpass_the_nobility_desc:0 "우리는 귀족을 통제하고 그들이 정부에서 너무 많은 영향력을 얻는 것을 막아야 합니다. 결국, 그들은 국왕에게, 그리고 오직 국왕에게만 답해야 합니다."
 SIA_royal_youth_leagues:0 "왕립 청년 연맹"
 SIA_the_royal_research_foundation:0 "왕립 연구 재단"
 SIA_the_royal_research_foundation_desc:0 "군사 및 기술 발전에 대한 국왕의 요청에 직접 응답하는 새로운 연구 기관을 설립하면 국가 지식인 사회에서 우리의 이미지를 개선할 수 있을 것입니다."
 SIA_a_better_kingdom:0 "더 나은 왕국"
 SIA_a_better_kingdom_desc:0 "개혁과 결정을 통해 라마 7세는 선대 국왕들의 전통을 이어 시암을 현대적이고 더 정의로운 국가로 만들었습니다. 우리는 우리 국가의 새로운 시대의 여명에 서 있습니다!"
 SIA_cement_sector_improvement:0 "시멘트 부문"
 SIA_cement_sector_improvement_desc:0 "시멘트는 우리의 주요 비농업 수출품 중 하나입니다. 생산에 전념하는 회사들을 재정적으로 지원함으로써, 이 부문이 점점 더 많은 일자리를 창출하도록 보장할 것입니다."
 SIA_ammunitions_production:0 "탄약 생산"
 SIA_ammunitions_production_desc:0 "우리의 탄약 생산 능력은 더 이상 충분하지 않습니다. 우리 군대가 탄약 부족을 겪지 않도록 탄약 생산 전용 공장을 신설하는 것이 시급합니다."
 SIA_mechanization_of_agriculture:0 "농업 기계화"
 SIA_mechanization_of_agriculture_desc:0 "우리 국민 대부분은 농부입니다. 트랙터와 같은 신기술에 대한 접근을 용이하게 하여 그들의 작업을 돕는 것이 우리의 의무입니다."
 SIA_wellfare_program:0 "복지 프로그램"
 SIA_wellfare_program_desc:0 "국가와 선출된 대표자들의 의무는 국민의 생활 환경을 최대한 개선하는 것입니다. 우리는 가장 도움이 필요한 사람들을 돕기 위해 교육과 건강 보험을 무상으로 만드는 개혁을 추진할 것입니다."
 SIA_the_war_has_changed:0 "전쟁은 변했다"
 SIA_the_war_has_changed_desc:0 "최근 몇 년 동안, 우리는 대전쟁 당시에는 아직 알려지지 않았던 많은 기술의 발전을 목격했습니다. 이러한 새로운 발명품에 대한 연구 노력이 필요합니다."
 SIA_import_foreign_tanks:0 "해외 전차 수입"
 SIA_import_foreign_tanks_desc:0 "우리는 해외 열강과 협상하여 전차를 획득한 다음, 그것들을 연구하여 우리 고유의 모델을 만들도록 노력해야 합니다."
 SIA_terrain_analysis:0 "지형 분석"
 SIA_terrain_analysis_desc:0 "전쟁이 우리 문턱까지 다가온다면 현장 연구는 필수적입니다. 우리는 환경이 제공하는 모든 기회를 활용하여 그것을 모르는 적보다 우위를 점할 준비가 되어 있어야 합니다."
 SIA_support_our_troops:0 "우리 군대 지원"
 SIA_support_our_troops_desc:0 "전투가 아닌 정찰, 요새화 또는 보급 관리를 통해 우리 군대를 돕는 데 전념하는 중대들은 우리 병사들이 자신의 능력을 최대한 발휘할 수 있도록 할 것입니다."
 SIA_royal_thai_marines:0 "태국 왕립 해병대"
 SIA_royal_thai_marines_desc:0 "우리는 물로 둘러싸여 있으므로, 이를 최대한 활용하여 해양 환경에서의 전투에 특화된 부대를 창설해야 합니다."
 SIA_a_faster_army:0 "더 빠른 군대"
 SIA_a_faster_army_desc:0 "평탄한 말레이시아 지형과 같이 속도가 승리의 결정적 요인인 상황에서는 차량화 보병의 사용이 흥미로울 수 있습니다."
 SIA_remembering_the_great_war:0 "대전쟁을 기억하며"
 SIA_remembering_the_great_war_desc:0 "우리는 대전쟁 당시 유럽에서 싸우기 위해 원정군을 파견했고, 그들은 강대국들이 사용하던 전투 전술에 대한 많은 경험을 가져왔습니다. 우리는 군 현대화 계획에 이 지식을 재사용해야 합니다."
 SIA_a_cannon_on_a_car:0 "차량 탑재포"
 SIA_a_canon_on_a_car:0 "차량 탑재포"
 SIA_a_canon_on_a_car_desc:0 "우리의 차량화 보병은 로켓과 같은 더 강력한 장비를 제공한다면 훨씬 더 효과적이고 강력하다는 것을 증명할 수 있을 것입니다. "
 SIA_adapt_to_the_new_conflicts:0 "새로운 분쟁에 적응"
 SIA_adapt_to_everything:0 "모든 것에 적응하라"
 SIA_adapt_to_everything_desc:0 "우리는 기습당하지 않도록 적의 전술에 끊임없이 적응할 수 있어야 합니다."
 SIA_negotiations_with_france:0 "프랑스와의 협상"
 SIA_negotiations_with_france_desc:0 "프랑스가 우리를 가장 많이 대적하고, 동시에 캄보디아나 라오스를 잃게 만들어 우리에게 굴욕을 안겨준 국가인 것은 사실입니다. 하지만 그것은 우리 절대 군주정 시대의 일이었습니다. 우리는 변했고, 평화롭게 프랑스에 접근할 준비가 되어 있습니다. 그 대가로, 어쩌면 우리는 라오스와 캄보디아 형제들과 재결합할 권리를 얻게 될지도 모릅니다."
 SIA_welfare_program:0 "복지 프로그램"
 SIA_welfare_program_desc:0 "국가와 선출된 대표자들의 의무는 국민의 생활 환경을 최대한 개선하는 것입니다. 우리는 가장 도움이 필요한 사람들을 돕기 위해 교육과 건강 보험을 무상으로 만드는 개혁을 추진할 것입니다."
 SIA_cultural_revolution:0 "문화 혁명"
 SIA_cultural_revolution_desc:0 "태국 문화를 쇄신하고 현대화하기 위한 일련의 명령이 시행될 것입니다. 국호는 "태국인의 땅"을 의미하는 "태국"으로 변경되고, 주민들은 현지 언어 대신 태국어를 사용하도록 장려되며, 복장은 유럽인들의 것과 더 가깝게 현대화될 것입니다... 이것은 태국인이 문명화되고 진화한 민족임을 보여줄 것입니다."
 SIA_the_cult_of_the_marshall:0 "원수 숭배"
 SIA_the_cult_of_the_marshall_desc:0 "피분은 미덕, 용기, 국가에 대한 헌신의 귀감이 되었습니다. 왕당파나 공산주의 음모가들로부터 입헌주의를 수호하기 위한 그의 감동적인 연설, 약속, 행동을 통해 그는 왕을 능가하는 정신적 지도자가 되었습니다. "
 SIA_eliminate_songsuradet:0 "송수라뎃 추방"
 SIA_eliminate_songsuradet_desc:0 "프라야 송수라뎃은 정계에서 은퇴했지만, 여전히 군대에서 중요한 역할을 하고 있습니다. 그가 정부에 대항하여 음모를 꾸미는 것을 막기 위해, 그의 모든 군사적 직무를 박탈하고 국외로 추방할 것입니다. 랑싯 쁘라유라삭디 왕자와 같은 그의 측근들은 체포되어 법정에 서게 될 것입니다."
 SIA_replace_the_national_hymn:0 "국가 교체"
 SIA_replace_the_national_hymn_desc:0 "프라 첸두리양과 루앙 사라누프라판이 작곡한, 단순히 "태국 국가"라고 불리는 새로운 국가는 태국 민족의 군국주의와 희생을 강조하며, 결국 기존의 왕실 찬가를 완전히 대체하게 될 것입니다. 애국적인 노래로 활기를 불어넣어, 우리 군대가 우리 민족의 영광을 되찾는 데 필요한 모든 동기를 부여할 것입니다."
 SIA_replace_the_national_anthem:0 "국가 교체"
 SIA_replace_the_national_anthem_desc:0 "프라 첸두리양과 루앙 사라누프라판이 작곡한, 단순히 "태국 국가"라고 불리는 새로운 국가는 태국 민족의 군국주의와 희생을 강조하며, 결국 기존의 왕실 찬가를 완전히 대체하게 될 것입니다. 애국적인 노래로 활기를 불어넣어, 우리 군대가 우리 민족의 영광을 되찾는 데 필요한 모든 동기를 부여할 것입니다."
 SIA_spiritual_mobilisation:0 "유와촌 타한 동원"
 SIA_spiritual_mobilisation_desc:0 "유와촌 타한은 1934년 피분이 설립한 군사 청소년 조직입니다. 이제 전쟁이 임박했으니, 우리는 그들을 동원하여 전선으로 보내야 합니다."
 SIA_the_cult_of_the_marshal:0 "원수 숭배"
 SIA_the_cult_of_the_marshal_desc:0 "피분은 미덕, 용기, 국가에 대한 헌신의 귀감이 되었습니다. 왕당파나 공산주의 음모가들로부터 입헌주의를 수호하기 위한 그의 감동적인 연설, 약속, 행동을 통해 그는 왕을 능가하는 정신적 지도자가 되었습니다. "
 SIA_our_own_democracy:0 "우리만의 "민주주의""
 SIA_our_own_democracy_desc:0 "라마 7세는 시암과 같은 국가에 적합한 민주주의 체제를 수립하는 방법을 알고 있습니다. "보통 선거"와 같은 개혁은 불필요하며, 득보다 실이 많을 수 있습니다."
 SIA_the_only_true_guide:0 "유일한 참된 지도자"
 SIA_the_only_true_guide_desc:0 ""보통 선거"와 같은 요구는 우리 국가에 거의 의미가 없습니다. 국왕과 귀족은 어떤 개혁이 시행되어야 하는지 이해하는 데 필요한 모든 기술을 갖추고 있습니다."
 SIA_a_new_era:0 "새로운 시대"
 SIA_a_new_era_desc:0 "우리는 시암의 새로운 시대의 여명에 서 있습니다. 자유와 민주주의가 전체주의를 이겨냈습니다. 우리는 다시는 파시즘의 어둠 속으로 빠지지 않을 것입니다. "
 SIA_a_liberal_governement:0 "자유주의 정부"
 SIA_a_liberal_governement_desc:0 "디렉 자야나마의 인민급진당이 선거에서 승리했습니다. 사회 진보주의를 강령으로 삼은 이 정당은 개인의 권리 확대와 특정 경제 개입을 시행하고자 합니다"
 SIA_a_conservative_governement:0 "보수주의 정부"
 SIA_conservatism_and_democracy:0 "보수주의와 민주주의"
 SIA_conservatism_and_democracy_desc:0 "세니 쁘라못의 민주당이 선거에서 승리했습니다. 태국의 전통을 보존하면서 민주주의 체제를 증진시키고자 하는 이 정당의 주요 결정 중 하나는 왕실이 모든 권력을 박탈당하는 순수한 입헌 군주제 형태로 군주제를 복원하는 것이었습니다."
 SIA_a_constitutional_monarchy:0 "입헌 군주제"
 SIA_a_constitutional_monarchy_desc:0 "공화정 체제는 시암에 적합하지 않습니다. 우리는 전통과 과거를 자랑스러워하는 민족이며, 우리의 군주제는 바로 그 전통의 일부입니다. 이제 라마 7세를 왕좌에 복위시킬 때입니다."
 SIA_state_invervention:0 "국가 개입"
 SIA_state_invervention_desc:0 "강자에 의한 약자 착취를 피하기 위해서는 국가의 경제 개입이 필수적입니다. 노동자를 보호하기 위한 법률이 제정될 것입니다"
 SIA_the_freer_the_market:0 "더 자유로운 시장"
 SIA_the_freer_the_market_desc:0 "시민의 더 큰 자유를 향한 첫걸음은 국가가 경제 문제에 개입하는 것을 피하고, 기업이 스스로 규제하도록 하는 것입니다."
 SIA_follow_the_soviet_model:0 "소비에트 모델 추종"
 SIA_follow_the_soviet_model_desc:0 "소비에트 연방은 우리가 따라야 할 공산주의의 모범입니다. 불과 몇 년 만에 볼셰비키는 러시아를 농업 국가에서 완전히 산업화된 현대 국가로 탈바꿈시켰으며, 우리도 똑같이 해내기 위해 최선을 다할 것입니다!"
 SIA_peasant_communism_desc:0 "우리는 러시아가 아니며, 시민들을 농지에서 도시로 이주시켜 그들의 삶의 방식을 완전히 바꿀 여유가 없습니다. 하지만 그들을 착취하는 체제 아래에 내버려 둘 수도 없습니다. 우리는 농민을 위한 사회주의를 건설할 것이며, 그곳에서 모든 농부는 평등하고 품위 있는 삶을 살 수 있을 것입니다."
 SIA_peasant_communism:0 "농민 공산주의"
 SIA_healthcare_for_the_people:0 "인민을 위한 의료"
 SIA_healthcare_for_the_people_desc:0 "가장 약하고 소외된 계층에게 의료 서비스 접근은 때때로 어려울 수 있으며, 우리는 바로 그들을 위해 싸우고 있습니다. 인구 전체의 건강을 개선하기 위해 모든 곳, 특히 가장 외진 농촌 지역에 공공 진료소가 개설될 것입니다."
 SIA_a_gun_in_every_home:0 "모든 가정에 총기를"
 SIA_a_gun_in_every_home_desc:0 "인민이 자본가에 맞서 스스로를 방어할 수 있기를 원한다면, 그들이 그렇게 할 수단을 갖추도록 보장해야 합니다. 요청하는 모든 시민은 자택에 총기를 소지할 권리를 갖게 될 것입니다."
 SIA_centralised_production:0 "중앙집권적 생산"
 SIA_centralised_production_desc:0 "경제 관리를 중앙집권화함으로써, 자원이 국가의 이익을 위해 적절히 배분되도록 보장할 것입니다."
 SIA_state_atheism:0 "국가 무신론"
 SIA_state_atheism_desc:0 "우리가 건설하는 새로운 국가에서 종교는 어떠한 역할도 할 수 없습니다. 우리는 인민에 대한 불교의 영향력을 제거하여, 그들을 또 하나의 족쇄에서 해방시켜야 합니다."
 SIA_negotiate_indochinese_freedom:0 "인도차이나 독립 협상"
 SIA_negotiate_indochinese_freedom_desc:0 "프랑스가 공산주의를 채택했음에도 불구하고 동아시아에 식민주의가 존재한다는 것은 해결해야 할 이념적 모순을 낳습니다."
