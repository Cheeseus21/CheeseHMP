 GER_festungberlin:0 "베를린 최후의 항전"
 GER_festungberlin_desc:0 ""
 GER_steinercounteroffensive:0 "슈타이너의 반격"
 GER_steinercounteroffensive_desc:0 "주코프의 제1벨라루스 전선군이 형성한 거대한 돌출부로 인해, 제9군은 돌출부 남쪽으로 진격하고, 그동안 상급집단지도자 펠릭스 슈타이너는 새로 회복한 분견대와 함께 베를린 북동쪽으로 진격하여 주코프의 군대를 포위한 후 1941년 국경까지 밀어내야 합니다. 이는 총통의 명령이며, 우리는 그를 신뢰합니다.  "
 stg_tt:0 "§R3형 보병 장비 5,000개를 획득합니다 (연구하지 않았다면 아무것도 얻을 수 없습니다.)§!"
 mech_tt:0 "§R2형 기계화보병 장비 400대를 획득합니다 (연구하지 않았다면 아무것도 얻을 수 없습니다.) 템플릿을 잊지 마십시오!!!§!"
 ssbat_tt:0 "§R장비가 60% 보급된 보병 사단 48개를 획득합니다§!"
