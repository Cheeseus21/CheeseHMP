 USA_support_sov_desc:0 ""
 winter_war_tt:0 "이 중점은 바르바로사 작전 시작 시 이벤트를 통해 자동으로 완료됩니다"
 army_inno_3_tt:0 "§C대전차 장갑차를 해금할 것입니다§!\n\n"
 fin_join_axis:0 "추축국 가입"
 ITA_blackshirts:0 "검은 셔츠단 모집"
 ITA_blackshirts_desc:0 "전장에 8백만 개의 총검을 배치해야만 우리 군이 두려움의 대상이 될 것입니다."
 black_shirts:0 "검은 셔츠단"
 fin_join_axis_desc:0 "삼국 동맹 조약에 서명하고, 소비에트 연방에 대한 영유권 주장을 유지하는 대가로 추축국의 정식 회원국이 될 것입니다."
 fin_supremacy_of_will:0 "의지의 우월성"
 fin_supremacy_of_will_desc:0 "우리에겐 죽음보다 더 두려워할 것은 없습니다."
 MAN_railways_chahar_desc:0 ""
 MAN_railways_schahar_desc:0 ""
 plan_zzz_tt:0 "§R수상 함대에 대한 투자는 비용이 매우 많이 들며, 군의 다른 분야에 더 집중적으로 투자하는 것을 막을 것입니다!§!\n\n§C상당한 양의 해군 기술을 자동으로 연구할 것입니다.§!\n\n"
 GER_guns1_desc:0 "우리의 무기 제조업체들은 병사들을 위한 새로운 표준 무기의 가능성을 연구했습니다. 이 신무기는 모든 신병을 즉시 기관총 사수로 만들어 줄 것입니다. 소총 구경 탄환을 사용하는 이 새로운 기관단총으로, 우리는 적에 대해 우위를 점할 것입니다."
 MAN_railways_sungkiang_desc:0 ""
 MAN_railways_hulunbuir_desc:0 ""
 GER_plan_z_cv:0 "그라프 체펠린 실험"
 GER_plan_z_cv_desc:0 ""
 GER_plan_z_bb:0 "비스마르크 건조"
 GER_plan_z_bb_desc:0 ""
 MAN_railways_heilungkiang_desc:0 ""
 MAN_railways_jehol_desc:0 ""
 JAP_capture_chinese_scientists:0 "중국 과학자 포섭"
 JAP_capture_chinese_scientists_desc:0 "우리의 연구 개발을 진척시키기 위해 중국 지식인들을 활용할 것입니다"
 GER_integrate_spanish_economy:0 "스페인 전쟁 경제 통합"
 GER_integrate_spanish_economy_desc:0 "군사적 지원을 대가로 스페인 형제들에게 무기와 식량을 지원할 것입니다."
 disable_ai_stuff:0 "AI 생산 비활성화"
 wunder_tt:0 "우리의 핵무기 프로그램인 우란프로옉트를 시작하고, 노르웨이를 통제하고 있다면 §C중수§! 생산을 시작할 것입니다.\n\n§C'원자력 연구'§!를 연구합니다."
 rocket_stuff_tt:0 "우리의 로켓 프로그램인 보복무기를 시작할 것입니다.\n\n§C'실험용 로켓'§!을 연구합니다.\n\n"
 RAJ_expand_air_bases2:0 "동부 공군 기지 확장"
 RAJ_expand_air_bases2_desc:0 "버마는 일본과의 최전선에 있습니다. 그곳에 비행장이 필요합니다."
 HUN_hmp_heavy_fighter_effort:0 "전투기 집중"
 HUN_hmp_heavy_fighter_effort_desc:0 "아군 상공의 제공권을 장악하고 국가를 위협하는 적기를 요격하려면 전투기가 필요합니다."
 HUN_hmp_tac_focus:0 "폭격기 집중"
 HUN_hmp_tac_focus_desc:0 "현대적인 군대는 지상뿐만 아니라 공중에서도 항공기의 지원이 필요합니다."
 france_is_kill:0 "항복함"
 VIC_join_axis:0 "삼국 동맹 조약 서명"
 VIC_join_axis_desc:0 "연합국이 우리의 주권과 식민지를 계속해서 침해함에 따라, 우리는 영국과 선전포고 없는 전쟁 상태에 놓였습니다. 국가를 보호하기 위해 독일과 공식적으로 동맹을 맺어야 합니다!"
 JAP_the_zero2_tt:0 "§C함재 전투기 3§!을(를) 연구하고 생산 목록에 §Y'제로센'§!을(를) 추가합니다."
 amerika_bomber_tt:0 "§C현대 대형 기체§!을(를) 연구합니다."
 jet_focus_tt:0 "§G독일§!과 §G이탈리아§! 양국 모두 §C제트 전투기§!와 §C제트 엔진§!을(를) 연구합니다."
 ural_bomber_tt:0 "§C현대 중형 기체§!을(를) 연구합니다."
 ETH_generals_focus_tt:0 "\n§R이라크로 플레이할 수 없게 됩니다§!\n\n"
 ENG_us_civs_1:0 "현금 수송법"
 TIB_nothing45:0 "스트래터지스트리머즈 가입"
 CAN_ATLANTIC_DEMOCRATIC:0 "대서양 연방"
 ENG_us_civs_2:0 "소규모 대영 무기대여"
 ENG_us_civs_3:0 "대영 무기대여"
 ENG_us_civs_4:0 "대규모 대영 무기대여"
 ENG_us_civs_5:0 "민주주의의 병기창"
 linie:0 "§L라인선, 슈테틴선, 베를린 요새를 건설합니다§!"
 TIB_nothing2:0 "호르스트: 글로벌 오펜시브 출시"
 ENG_no_asia_idea:0 "서부 전선 균형추"
 ENG_no_asia_idea_desc:0 "이 국민정신은 연합국의 능력을 '폭풍의 서막' 시작일의 연합국과 비슷하게 만들기 위해 영국에 추가됩니다."
 ENG_no_asia_idea2:0 "전쟁으로 가는 길"
 ENG_no_asia_idea2_desc:0 "당신에게는 전쟁과 불명예라는 선택지가 주어졌소. 당신은 불명예를 택했고, 결국 전쟁을 치르게 될 것이오. -윈스턴 처칠"
 ENG_no_asia_idea3:0 "전쟁"
 ENG_no_asia_idea3_desc:0 "…우리는 해변에서 싸울 것이며, 상륙지에서 싸울 것이고, 들판과 거리에서 싸울 것이며, 언덕에서도 싸울 것입니다. 우리는 결코 항복하지 않을 것입니다… -윈스턴 처칠"
 I_HATE_ASIA_NAME:0 "서부 전선"
 I_HATE_ASIA_DESC:0 "극동에서의 전쟁이 없는 제2차 세계대전입니다.\n\n연합국/코민테른: 영국, 프랑스, 캐나다, 남아프리카, 노르웨이, 폴란드, 그리스, 소비에트 연방.\n\n추축국: 독일, 이탈리아, 루마니아, 헝가리, 핀란드, 비시 프랑스, 이탈리아령 동아프리카, 크로아티아, 슬로바키아, 불가리아."
 ENG_overlord_states:0 "오버로드 작전"
 ENG_overlord_states_desc:0 "유럽은 요새이므로, 그곳에 대한 공격을 신중하게 계획해야 합니다."
 NZL_bob_semple_tank_tt:0 "§H밥 셈플§의 생산을 활성화합니다"
 fourth_shore_tt:0 "§G리비아 전역이 우리의 핵심 영토가 될 것입니다§!"
 ITA_fourth_shore:0 "제4의 해안"
 ITA_sword:0 "이슬람의 검"
 ITA_sword_desc:0 "리비아에 대한 오스만 제국의 권위를 계승한 자로서, 우리는 이슬람의 보호자를 정당하게 자처할 수 있습니다."
 ITA_fourth_shore_desc:0 "이탈리아의 무슬림은 이탈리아의 제4의 해안이자, 이탈리아 국가의 필수적인 부분입니다. 쿠란 학교를 짓고, 모스크를 복원하며, 이슬람 문화 학교를 건설함으로써 우리는 리비아를 이탈리아에 통합할 수 있습니다. 우리는 평화, 정의, 번영, 그리고 예언자의 율법에 대한 존중을 보장할 것입니다."
 MAN_found_the_northeast_transport_committeex_desc:0 "우리가 아시아의 경제 대국이 되려면, 일본 재벌과 남만주 철도의 영향력에서 벗어나야 합니다. 만주인이 소유하고 운영하는 철도를 건설함으로써, 우리는 만주국에 우선적으로 이익이 되는 방향으로 발전을 이끌 수 있습니다."
 MAN_five_year_plan_new_desc:0 "소비에트 연방의 급속한 산업화는 경제 발전에 자본주의가 필요 없다는 증거입니다. 우리는 순수한 의지력과 결단력으로 해낼 수 있습니다. 푸이 황제의 계획은 만주국을 산업 강국으로 만들 것입니다."
 MAN_railways_opener_desc:0 "남만주 철도의 체계적인 확장과 개발은 강력한 경제로 가는 지름길입니다."
 MAN_anshan_steelworks_desc:0 "제철소를 설립하면 나머지 중공업이 발전할 수 있을 것입니다."
 #MAN_showa_steel_desc:0 "We can further develop our steel mill in Liaotung into the largest in east Asia with the help of Japan."
 MAN_railways_extend_to_port_arthur_desc:0 "일본과의 무역을 개선하기 위해 다롄까지 철도를 확장해야 합니다."
 MAN_railways_expand_to_east_hebei_desc:0 "일본과의 무역을 개선하기 위해 기동방공자치정부까지 철도를 확장해야 합니다."
 MAN_railways_extend_to_pyongyang_desc:0 "일본과의 무역을 개선하기 위해 조선까지 철도를 확장해야 합니다."
 MAN_railways_japanese_imports_desc:0 "일본 개발 계획의 일환으로, 우리는 일본의 공산품을 쉽게 얻을 수 있습니다."
 SOV_shbb_tt:0 "\n거의 완성된 소비에츠키 소유즈급 초중전함을 생산에 추가합니다.\n\n"
 SOV_expand_red_fleet2:0 "독일 전쟁해군에 대한 도전"
 SOV_expand_red_fleet2_desc:0 "독일 전쟁해군의 해군 재무장 계획은 발트해 연안에 급속한 위협을 조성했습니다. 우리는 덴마크 해협의 통제권을 두고 독일과 경쟁하고 파시스트의 지배로부터 우리의 바다를 지키기 위해 새로운 기함을 건조해야 합니다."
 USA_army_of_the_united_states2:0 "여군 통합 복무법"
 USA_war_with_japan:0 "떠오르는 태양을 타격하라"
 USA_war_with_japan_desc:0 "승리하려는 의지 없이 전쟁에 뛰어드는 것은 치명적입니다."
 FRA_victors_of_wwi2:0 "대전쟁의 승리자"
 USA_overlord:0 "오버로드 작전"
 USA_overlord_desc:0 "유럽은 요새이므로 신중하게 공격을 계획해야 합니다."
 fin_army_effort:0 "육군 총력"
 GER_guns2:0 "판처파우스트"
 GER_guns2_desc:0 "징집된 모든 병사는 가장 효과적이고 현대적인 대전차 병기인 판처파우스트로 무장할 것입니다. 모든 병사에게 이 무시무시하면서도 저렴한 무기를 지급하면, 적 기갑 부대는 보병 엄호를 기다리기 위해 진격을 늦추거나 완전한 파멸의 위험을 감수해야 할 것입니다."
 GER_guns1:0 "슈투름게베어"
 GER_guns3:0 "밤피르"
 GER_guns3_desc:0 "야간에 적을 볼 수 있는 능력은 전쟁의 완전히 새로운 차원을 열어줍니다. 즉, 별다른 방해 없이 적군을 상대로 효과적인 야간 작전을 수행할 수 있게 됩니다."
 GER_shtank:0 "우월한 화력"
 GER_shtank_desc:0 "관통 불가능한 초중전차..."
 FIN_armor_effort:0 "기갑 총력"
 EFR_devalue_the_franc:0 "프랑 평가절하"
 FIN_armor_effort_desc:0 "보병 기계화에서 얻은 교훈을 적용하여 기갑 차량 또한 개선할 수 있습니다."
 EFR_devalue_the_franc_desc:1 "다른 국가들이 경제를 살리기 위해 자국 통화의 가치를 떨어뜨리는 동안, 우리는 단호히 이를 거부해왔습니다. 그 결과, 우리 경제는 다른 나라에 뒤처지고 있습니다. 경쟁력을 높이고 다가올 폭풍을 이겨내려면, 비록 인기 없는 조치가 될지라도 통화 평가절하를 즉각 기각해서는 안 됩니다."
 EFR_autoroutes:0 "고속도로"
 EFR_autoroutes_desc:0 "독일은 자국의 여러 지역을 연결하는 제한된 접근성의 고속도로 개념으로 세계를 놀라게 했습니다. 우리도 그들만큼 잘할 수 있다는 것을 세계에 보여줄 수 있습니다."
 EFR_invest_in_the_metropole:1 "본토 개발"
 EFR_invest_in_the_metropole_desc:0 "산업을 재건하기 위한 첫 단계는 대륙 본토의 산업 기반을 개선하는 것이어야 합니다."
 EFR_invest_in_the_colonies:1 "식민지 개발"
 EFR_invest_in_the_colonies_desc:0 "유럽의 산업 중심지에는 대규모 산업 확장을 지속할 인구와 자원이 부족합니다. 우리 경제가 세계의 다른 나라들과 경쟁하려면 식민지를 활용해야 합니다."
 EFR_colonial_industry_effect_tt:2 "이전에 투자했던 모든 식민지 주에 §Y민간 공장§! 2개를 추가합니다.\n"
 EFR_industrial_expansion_effect_tt:1 "이전에 투자했던 본토 주에 §Y민간 공장§! 2개를 추가합니다.\n"
 EFR_military_factories_effect_tt:1 "이전에 투자했던 모든 주에 §Y군수 공장§! 2개를 추가합니다.\n"
 EFR_invest_in_west_africa:0 "서아프리카에 투자"
 EFR_invest_in_west_africa_desc:0 "서아프리카의 방대한 노동력과 자원 덕분에 이곳은 투자를 위한 완벽한 후보지입니다."
 EFR_invest_in_indochina:0 "인도차이나에 투자"
 EFR_invest_in_indochina_desc:0 "인도차이나에 있는 우리 영토와 본토 사이의 먼 거리는 단점처럼 보일 수 있지만, 그곳의 모든 산업을 적의 공격으로부터 보호해주기도 합니다."
 EFR_invest_in_syria:0 "시리아에 투자"
 EFR_invest_in_syria_desc:0 "시리아는 유럽이나 아프리카에서 전쟁이 발생할 경우 우리에게 보급품을 공급하기에 완벽한 위치에 있습니다. 시리아의 산업 잠재력을 강화하는 것은 이 지역에서 우리의 입지를 뒷받침할 것입니다."
 EFR_global_integration:0 "세계적 통합"
 EFR_global_integration_desc:0 "대영제국은 상호 지원하는 부분들로 정교하게 조정된 체계입니다. 우리도 식민지를 가지고 그들만큼 잘하지 못할 이유가 없습니다."
 EFR_begin_rearmament:0 "재무장 시작"
 EFR_begin_rearmament_desc:1 "1919년 포슈 원수가 예견했던 20년간의 휴전이 빠르게 끝나가고 있으며, 세계는 향후 몇 년 안에 전쟁에 휩싸일 가능성이 점점 커지고 있습니다. 우리는 준비해야 합니다."
 EFR_firepower_kills:0 "화력이 곧 살상력"
 EFR_firepower_kills_desc:0 "대전쟁의 교훈은 잔인했던 만큼이나 간단했습니다. 병사들이 가늠자를 통해 서로 싸우던 시대는 끝났습니다. 오늘날, 살상은 최신 무기를 사용하여 원거리에서 대규모로 이루어집니다."
 EFR_methodical_battle:0 "체계적 전투"
 EFR_methodical_battle_desc:0 "어떤 이들은 전투가 혼돈이라고 주장하지만, 그들은 어리석은 자들입니다. 전투란 전체 계획에 따라 적절한 도구를 체계적으로 적용하는 것에 불과합니다. 계획을 잘 세우면, 적의 의도는 역사책의 각주에나 실릴 것입니다."
 EFR_division_cuirassee:0 "디비지옹 퀴라세"
 EFR_division_cuirassee_desc:0 "드골이라는 이름의 진취적인 장교가 중기갑, 보병, 중형전차를 결합하여 하나의 통합된 부대로 싸우는 새로운 종류의 사단을 제안했습니다."
 EFR_infantry_tanks:0 "보병전차"
 EFR_infantry_tanks_desc:0 "무엇보다도, 전차의 첫 번째이자 마지막 임무는 보병이 영토를 점령하고 유지할 수 있도록 하는 것입니다. 따라서, 우리는 항상 보병 부대에 현대적이고 유능한 전차를 장비해야 합니다."
 EFR_special_forces:0 "특수부대"
 EFR_special_forces_desc:0 "미래에는 일반 보병이 한계에 부딪히는 지역에서 전쟁이 점점 더 많이 벌어질 것입니다. 우리는 이러한 조건에서 임무를 수행할 수 있는 새롭고 더 유능한 부대를 창설해야 합니다."
 EFR_fusiliers_marine:1 "퓌질리에 마랭"
 EFR_fusiliers_marine_desc:0 "해안이 뚫을 수 없는 방어선이었던 시대는 끝났습니다. 미래에는 적이 어디에 있든 그들에게 싸움을 걸고, 어떠한 저항에도 맞서 상륙 거점을 확보할 수 있어야 합니다."
 EFR_battle_of_maneuver:0 "기동전"
 EFR_battle_of_maneuver_desc:0 "군대가 충돌하는 좁은 지역으로서의 전장이라는 낡은 개념은 사라졌습니다. 대규모 기동화, 항공기, 고속 무선 통신으로 인해 전투는 수백 킬로미터에 걸쳐 빠르게 전개됩니다. 이에 빨리 대비할수록 좋습니다."
 EFR_air_dominance_desc:0 "항공기의 발전은 군대가 걱정해야 할 제3의 측면을 만들어냈습니다. 이 측면을 확보하지 못하면 파국에 직면할 것입니다."
 EFR_air_ground_cooperation:0 "공지 협동"
 EFR_air_ground_cooperation_desc:0 "공중전은 지상 목표를 추구할 때만 실질적인 군사적 결과를 낳습니다. 공중전과 지상전을 더 잘 통합할수록 우리는 더 효과적이 될 것입니다."
 EFR_flying_artillery_desc:0 "오늘날의 빠른 기동전에서는 느린 지상 포병이 속도를 따라가지 못할 수 있습니다. 폭탄을 탑재한 항공기가 그 역할을 대신할 수 있습니다."
 EFR_form_the_popular_front:0 "인민전선 결성"
 EFR_form_the_popular_front_desc:1 "독일과 이탈리아에서 파시즘이 부상함에 따라, 우리의 대의가 살아남으려면 좌파의 내분을 멈춰야 한다는 것이 분명해졌습니다. 모든 좌파 정당으로 구성된 광범위한 인민전선은 파시즘을 낳는 경제적 상황을 마침내 해결할 국민적 위임을 받게 될 것입니다."
 EFR_ban_communism_desc:0 "누군가가 자신의 조국에 공산주의 혁명의 혼란과 유혈사태를 불러오고 싶어 한다는 것은 상상할 수 없는 일이지만, 우리 중에는 바로 그런 짓을 하려는 자들이 있는 것 같습니다. 그들이 더 이상 국가에 대항하여 음모를 꾸미도록 내버려 둘 수 없습니다. 가장 가혹한 조치가 취해져야 합니다."
 EFR_invite_communist_ministers:0 "공산주의자 장관 임명"
 EFR_invite_communist_ministers_desc:0 "급진 우파의 반발에 대한 두려움 때문에 실제 정부에 공산주의자들을 포함시키지 못했습니다. 하지만 두려움은 좋은 조언자가 아닙니다. 이 충돌을 피할 수 없다면, 오라고 하십시오."
 EFR_strengthen_the_unions:0 "노동조합 강화"
 EFR_strengthen_the_unions_desc:0 "너무나 오랫동안 개별 노동자가 동료들과 단결하여 단체 교섭을 할 권리가 공격에 무방비로 노출되어 왔습니다. 더는 안 됩니다."
 EFR_celebrate_the_commune:0 "코뮌 기념"
 EFR_celebrate_the_commune_desc:0 "비록 단명했지만, 파리 코뮌은 프랑스 땅에 공산주의 사회를 건설하려는 최초의 시도였습니다."
 EFR_womens_suffrage_desc:1 "자신의 권리를 쟁취하기 위해 몇 번이고 바리케이드에서 싸웠던 프랑스의 근면한 여성들이 선거에서 투표하는 것이 허용되지 않는다는 것은 부조리하고 수치스러운 일입니다. 우리는 이 불의를 근절할 것입니다."
 EFR_legal_equality:0 "법적 평등"
 EFR_legal_equality_desc:0 "모든 중요한 면에서 여성은 여전히 남성의 의지에 종속된 2등 시민으로 간주됩니다. 이런 말도 안 되는 상황은 이제 끝입니다."
 EFR_industrial_collectivization:0 "산업 집산화"
 EFR_industrial_collectivization_desc:1 "오늘날 프랑스 경제는 직원이 거의 없는 소규모 회사들로 구성되어 있으며, 이들은 영원히 서로 경쟁하며 비효율적인 소규모 생산으로 자원을 낭비하고 있습니다. 우리는 이 작은 회사들을 통합하여 마침내 세계 무대에서 경쟁할 수 있는 기업을 만들 것입니다."
 EFR_agricultural_collectivization_desc:0 "산업에 적용되는 원칙은 프랑스 전역의 농부들에게도 똑같이 적용됩니다. 소규모 농장들은 현대적인 장비를 감당할 수 없어 대부분 증조부 세대와 같은 방식으로 일하고 있습니다. 이들을 농업 생산 단위로 통합함으로써 효율성과 생산량을 늘릴 것입니다."
 EFR_force_the_issue:0 "결단 강요"
 EFR_force_the_issue_desc:1 "인민전선을 결성한 이래로 우리는 먼 길을 왔습니다. 하지만 우리의 과업을 미완으로 남겨둘 수는 없습니다. 이제 좌파의 모든 이들이 혁명에 동참할 것인지, 아니면 반대할 것인지 선택하고 입장을 정해야 할 때입니다."
 EFR_force_the_issue_tt:0 "안정도 페널티는 §Y민주주의§! 정당의 지지도에 따라 달라집니다.\n"
 EFR_reconciliation:0 "화해"
 EFR_reconciliation_desc:0 "과거에 프랑스 혁명은 너무나 자주 나라를 혁명과 반혁명 테러의 끝없는 발작 속으로 몰아넣었습니다. 이제는 혁명을 지지했든 안 했든 모두가 제자리를 찾을 수 있는 공화국을 건설할 때일지도 모릅니다."
 EFR_constitutional_convention:0 "제헌 의회"
 EFR_constitutional_convention_desc:0 "우리 공화국의 본질에 대한 근본적인 변화는 하룻밤 사이에 이루어질 수 없으며, 새로운 헌법 협상 없이는 불가능합니다."
 EFR_anti_fascist_coalition:0 "반파시스트 연합"
 EFR_anti_fascist_coalition_desc:0 "진보의 행진에 가장 큰 위협은 반동적 파시즘의 확산입니다. 우리는 이 위협에 맞서 싸우려는 모든 나라와 함께 서야 합니다. 그렇지 않으면 우리 모두에게 내일은 없을 것입니다."
 EFR_invite_anti_fascist_emigrants:0 "반파시스트 이민자 초청"
 EFR_invite_anti_fascist_emigrants_desc:1 "모든 파시스트 정권이 취하는 첫 번째 조치는 비판자들과 국가를 어떻게 조직할 수 있는지에 대한 대안적 비전을 제시할 수 있는 사람들을 추방하는 것입니다. 하지만 이 사람들은 또한 자국이 해방될 날을 대비하여 망명 정부를 구성하기에 완벽하게 적합합니다."
 EFR_reconnect_to_the_balkans:0 "발칸 반도와 관계 재개"
 EFR_reconnect_to_the_balkans_desc:0 "프랑스는 오랫동안 중부 유럽의 강대국들을 견제하기 위해 발칸 반도의 국가들과 관계를 맺어왔습니다. 최근 들어 다소 소원해졌지만, 이 연결은 여전히 존재합니다."
 EFR_pre_empt_the_fascist_attack:0 "파시스트 공격 선제 타격"
 EFR_pre_empt_the_fascist_attack_desc:0 "왜 우리가 적이 평화롭게 준비하고 자신들에게 가장 유리한 순간에 필연적인 공격을 감행하도록 내버려 둬야 합니까? 우리가 먼저 공격하여, 이 위협이 준비를 갖추기 전에 분쇄할 것입니다."
 EFR_loyalty_to_moscow:0 "모스크바에 대한 충성"
 EFR_loyalty_to_moscow_desc:0 "소비에트 연방에서 실행되는 사회주의 모델이 완벽하지는 않을지라도, 소비에트 연방이 사회주의 사상을 가장 높은 수준으로 구현했다는 점은 합리적인 의심의 여지가 없습니다. 우리만의 길을 찾으려 한다면 어리석은 짓일 것입니다."
 EFR_league_of_french_bolshevist_volunteers_desc:1 "하나의 사회주의 국가가 외국의 침략자에게 위협받을 때, 모든 사회주의 국가가 위협받는 것입니다. 동지들이 목숨을 걸고 싸우는 동안 가만히 앉아 있어서는 안 됩니다."
 EFR_host_the_german_exiles:0 "독일 망명자 수용"
 EFR_host_the_german_exiles_desc:0 "마르크스와 엥겔스의 고향인 독일은 한때 공산주의 사상과 실천의 선두에 있었습니다. 많은 독일 공산주의자들이 나치가 권력을 잡았을 때 망명했습니다. 만약 우리가 그들에게 거처를 제공한다면, 그들은 우리가 해방된 영토에 더 효과적인 정부를 조직하는 데 도움을 줄 수 있습니다."
 EFR_revolution_to_the_utmost:0 "극한의 혁명"
 EFR_revolution_to_the_utmost_desc:0 "반쯤 끝난 혁명은 전혀 혁명이 아닙니다. 과업이 완수되고 새로운 정치 체제가 안전해질 때까지 멈춰서는 안 됩니다. 어떤 대가를 치르더라도 말입니다."
 EFR_destroy_the_counter_revolution:0 "반혁명 분쇄"
 EFR_destroy_the_counter_revolution_desc:0 "지금 이 순간에도 프랑스의 일부 사람들은 자국민이 잠시라도 약점을 보이면 그들의 등에 비수를 꽂을 준비를 하고 있습니다. 우리는 그들을 내버려 두지 않고 먼저 공격할 것입니다."
  EFR_appeal_to_the_french_nation:0 "프랑스 국민에게 고함"
 EFR_appeal_to_the_french_nation_desc:0 "프랑스는 전투에서 졌을지 모르지만, 전쟁에서 진 것은 아닙니다. 저항하는 것은 모든 애국적인 프랑스인의 의무입니다."
 EFR_appeal_to_overseas_territories:0 "해외 영토에 호소"
 EFR_appeal_to_overseas_territories_desc:0 "프랑스 본토는 적에게 함락되었을지 모르지만, 제국의 많은 영토는 여전히 자유롭습니다. 만약 그들을 우리 편으로 규합할 수 있다면, 우리는 적에게 반격할 수 있습니다."
 EFR_appeal_to_overseas_territories_tt:0 "세계 각지의 식민지 영토가 우리 편으로 전환될 기회가 있습니다."
 EFR_intervention_in_north_africa:0 "북아프리카 개입"
 EFR_intervention_in_north_africa_desc:0 "북아프리카는 본토 수복을 위한 침공에 최적의 발판을 제공합니다. 그곳을 우리 편으로 만드는 것은 우리의 해방 작전에 필수적입니다."
 EFR_intervention_in_west_africa:0 "서아프리카 개입"
 EFR_intervention_in_west_africa_desc:0 "서아프리카에는 우리 본토를 되찾기 위한 새로운 군대로 징집될 수 있는 수백만 명의 주민이 있습니다."
 EFR_intervention_in_syria:0 "시리아 개입"
 EFR_intervention_in_syria_desc:0 "시리아의 전략적 영토를 적에게서 빼앗는 것은 수에즈 운하를 보호하고 동지중해에서의 우리 상황을 극적으로 개선합니다."
 EFR_intervention_in_indochina:0 "인도차이나 개입"
 EFR_intervention_in_indochina_desc:0 "유럽의 전투에서 멀리 떨어진 인도차이나의 우리 식민지는 이 지역에서 우리의 이익을 지키는 데 도움을 줄 이상적인 지역입니다."
 EFR_intervention_in_central_africa:0 "중앙아프리카 개입"
 EFR_intervention_in_central_africa_desc:0 "중앙아프리카는 연합군의 전쟁 노력에 매우 중요하며, 우리에게 중요한 선전적 성과로서 점령될 수 있습니다."
 EFR_intervention_in_madagascar:0 "마다가스카르 개입"
 EFR_intervention_in_madagascar_desc:2 "만약 적이 마다가스카르를 점령하고 요새화하도록 허용한다면, 우리는 인도양에서 재앙에 직면하게 될 것입니다. 신속하고 결정적인 조치는 그 섬이 우리 편에 남도록 보장할 수 있습니다."
 EFR_form_the_national_committee:0 "국가위원회 구성"
 EFR_form_the_national_committee_desc:0 "우리의 대의가 성공할 것이라고 믿는 사람은 거의 없었을 것입니다. 하지만 이제 우리는 마침내 적에게서 해방된 모든 프랑스 영토를 통제할 준비가 된, 완전히 기능하는 망명 정부의 구성을 선포할 만큼 강해졌습니다."
 EFR_form_the_provisional_government_of_the_republic:1 "임시정부 수립"
 EFR_form_the_provisional_government_of_the_republic_desc:0 "파리 해방과 함께 우리는 더 이상 망명 정부가 아닙니다. 이제 우리 나라를 재건하는 어려운 작업을 시작할 때입니다."
 EFR_continue_the_fight:0 "전투 계속"
 EFR_continue_the_fight_desc:0 "지금까지 우리에게 합류하기로 선택한 병사는 거의 없지만, 우리가 가진 병사들은 무장하고 장비를 갖춰야 합니다."
 EFR_the_free_french_navy:0 "자유 프랑스 해군"
 EFR_the_free_french_navy_desc:0 "우리 동맹국들은 생존을 위한 필사적인 투쟁에 갇혀 있으며, 이를 위해 해상 항로는 필수적입니다. 우리는 그들을 돕기 위해 우리의 역할을 다해야 합니다."
 EFR_colonial_recruitment_desc:0 "본토에서 징병이 불가능한 상황에서, 우리는 도움을 얻기 위해 식민지로 눈을 돌려야 합니다. 우리 신민 중 다수는 우리를 위해 기꺼이 무기를 들고 싸울 것입니다."
 EFR_the_regiment_normandie:0 "노르망디 연대"
 EFR_the_regiment_normandie_desc:0 "우리 프랑스인이 모든 전선에서 싸우는 모습을 보여주는 것이 중요합니다. 이제 소련이 우리의 공동의 적과 교전하고 있으므로, 우리는 그들을 돕기 위해 소규모 전투기 조종사 그룹을 보낼 수 있습니다."
 EFR_refus_absurde:0 "불합리한 거부"
 EFR_refus_absurde_desc:0 "패배의 순간에도, 저항하려는 의지는 일부의 마음속에 강하게 남아있습니다. 그들은 점령지에서 저항 운동의 기반을 형성할 것입니다."
 EFR_the_maquis:0 "마키"
 EFR_the_maquis_desc:1 "프랑스의 시골 지역은 점령군이나 그들의 부역자들로부터 탈출하려는 모든 이들에게 은신처를 제공합니다. 우리는 저항 행위로서 적에게 노동력 제공을 거부하는 사람들을 지원하여, 때가 되면 그 지역들을 저항의 온상으로 바꿀 수 있도록 해야 합니다."
 EFR_reach_out_to_trade_unions:0 "노동조합에 접촉"
 EFR_reach_out_to_trade_unions_desc:0 "이제 적에게 징발된 산업에 타격을 가하려면, 그곳의 노동자들과 좋은 소통을 유지하는 것이 최선의 방법으로 보입니다. 그들은 어떤 외부 세력보다 훨씬 효율적으로 이루어지는 모든 생산을 지연시키거나 방해할 수 있습니다."
 EFR_cooperation_with_the_communists:0 "공산주의자들과의 협력"
 EFR_cooperation_with_the_communists_desc:0 "우리의 공동 투쟁에서, 우리는 스스로를 자처하는 어떤 동맹도 거부해서는 안 됩니다 - 비록 그들이 스스로를 동지라고 부를지라도 말입니다."
 EFR_connections_to_industrialists:0 "산업가들과의 연계"
 EFR_connections_to_industrialists_desc:0 "군수 산업의 노동자들과 협력하는 것이 도움이 되지만, 공장을 운영하는 사람들과 협력하는 것 자체로도 이점이 있습니다."
 EFR_the_civil_and_military_organization:0 "민군 조직"
 EFR_the_civil_and_military_organization_desc:0 "저항 활동을 수행하는 많은 소규모 그룹들이 더 큰 조직을 형성하기 위해 단결하고 있습니다. 우리는 이를 승인해야 합니다."
 EFR_national_council_of_the_resistance_desc:0 "프랑스 내 저항 세력이 점점 더 강해지고 있으며, 그 활동을 조정하기 위한 새로운 운영 위원회가 필요할 정도로 강력해졌습니다."
 EFR_national_uprising_desc:0 "때가 왔습니다. 지금이 바로 무기를 들고 수년 동안 당신을 가려왔던 그림자에서 벗어날 때입니다!"
 EFR_french_forces_of_the_interior:0 "프랑스 국내군"
 EFR_french_forces_of_the_interior_desc:1 "저항군은 프랑스 전역에 걸쳐 수천 명의 무장 병력을 보유하고 있습니다. 우리와 동맹국들이 국토를 가로질러 진격함에 따라, 우리는 그들을 규합하여 우리 군대의 병사로 만들 것입니다."
 EFR_french_forces_of_the_interior_tt:0 "모든 해방된 핵심 주에 약한 보병 부대를 생성합니다."
 EFR_naval_rearmament:0 "해군 재무장"
 EFR_naval_rearmament_desc:0 "우리가 다른 분야의 발전에 보조를 맞추는 데 집중하는 동안 우리의 조선 산업은 침체된 채 방치되었습니다. 그 결과, 우리는 이제 지중해와 대서양에서 경쟁국들에게 뒤처질 큰 위험에 처해 있습니다. 우리는 잃어버린 시간을 만회하기 위해 더 많이 투자해야 합니다."
 EFR_colonial_naval_bases:0 "식민지 해군 기지"
 EFR_colonial_naval_bases_desc:0 "전 세계적인 전력 투사의 핵심은 본국 해역에서 멀리 떨어진 곳에서 함대를 유지하는 능력입니다. 우리는 이미 넓은 식민지를 보유하고 있으며, 이제 우리 함대의 재보급 및 수리 기지 역할을 하도록 개발해야 합니다."
 EFR_develop_colonial_dockyards:0 "식민지 조선소 개발"
 EFR_develop_colonial_dockyards_desc:0 "우리 제국 각지의 해군 기지가 확장되고 현대화됨에 따라, 우리는 필요한 중공업을 정착시키고 해외에서 함선을 건조하는 데 필요한 대형 부두를 건설하는 것을 고려할 수 있습니다."
 EFR_the_old_school:0 "구식 학파"
 EFR_the_old_school_desc:0 "해군 기술의 모든 발전에도 불구하고, 해군력의 핵심 요소는 여전히 다른 함대 부대의 지원을 받는 주력함입니다. 이 주력함이 여전히 전함이든 새로운 항공모함이든, 우리는 다른 해군 강국들과 보조를 맞출 수 있도록 조선 산업의 규모를 더욱 늘려야 합니다."
 EFR_carrier_planes:0 "함재기"
 EFR_carrier_planes_desc:0 "항공모함의 성능은 함재기에 달려있습니다. 현대적인 함재기 없이는 어떤 항공모함도 낭비된 투자일 뿐입니다."
 EFR_rush_the_richelieus:0 "리슐리외급 건조 가속"
 EFR_rush_the_richelieus_desc:0 "유럽의 상황이 점점 더 절망적으로 변하고 있어, 재래식 방법으로 신형 수상함을 건조할 시간이 없습니다. 신형 전함을 최대한 빨리 실전 배치하기 위해 자재를 우선적으로 배정해야 합니다."
 EFR_prioritize_the_joffre:0 "조프르 우선 건조"
 EFR_prioritize_the_joffre_desc:0 "현재 우리의 항공모함 함대는 절망적일 정도로 구식이며, 잠재적인 적에게 상대가 되지 않습니다. 신형 항공모함 계획에 최우선 순위를 부여해야 합니다."
 EFR_the_young_school:0 "청년학파"
 EFR_the_young_school_desc:0 "항공, 잠수함, 어뢰의 발전으로 주력함은 구식이 되었습니다. 제한된 해군 산업력으로는 현대 해전의 위협에 무력한 거대한 해상 요새를 건조하는 데 시간과 돈을 낭비할 여유가 없습니다. 대신 효율성을 개선하여 더 많은 소형 함정을 건조하는 데 집중해야 합니다."
 EFR_undersea_combat:0 "수중 전투"
 EFR_undersea_combat_desc:0 "잠수함은 지난 10년 동안 성숙기에 접어들었습니다. 이제 모든 수상함에 치명적인 위협이 되었으며, 탐지하고 파괴하기는 점점 더 어려워지고 있습니다."
 EFR_surface_combat:0 "수상 전투"
 EFR_surface_combat_desc:0 "포술의 발전으로 다른 주력함과의 장기적인 포격전에서 살아남을 수 있는 함선을 건조하는 것은 거의 불가능해졌습니다. 차라리 현대적인 구축함과 어뢰정 함대로 집중적인 어뢰 일제 사격을 통해 적을 압도하는 것이 훨씬 낫습니다."
 EFR_prioritize_the_joffre_tt:0 "현대적인 §Y항공모함§!을 40% 완성된 상태로 생산 대기열에 추가합니다."
 EFR_revolutionary_zeal_desc:1 "프랑스 국민은 낡은 질서를 뿌리 뽑고 새로운 질서를 세우려는 특별한 열정을 항상 지녀왔습니다. 이를 좌절시켜서는 안 됩니다."
 EFR_loyalty_to_the_cause:0 "대의에 대한 충성"
 EFR_loyalty_to_the_cause_desc:1 "다른 나라들은 자신들만의 공산주의 비전을 구상할지 모르지만, 우리가 우리의 비전을 타협할 이유는 없습니다. 그들은 목적이 수단을 정당화하는지에 대한 의심에 사로잡혀 중도에 멈췄을지 모릅니다. 우리는 그러지 않을 것입니다."
 EFR_carry_the_revolution_north:0 "북쪽으로 혁명 전파"
 EFR_carry_the_revolution_north_desc:0 "영국 해협 건너편에는 산업 혁명의 발상지이자 현대 자본주의의 본고장이 있습니다. 이곳이 반혁명 세력의 발판이 되도록 내버려 둘 수 없습니다."
 EFR_carry_the_revolution_west:0 "서쪽으로 혁명 전파"
 EFR_carry_the_revolution_west_desc:1 "이베리아 반도의 정권들은 민중 혁명에 휩쓸릴 준비가 된 채 실낱같은 명맥을 유지하고 있습니다. 우리가 그 실을 끊을 것입니다."
 EFR_carry_the_revolution_east:0 "동쪽으로 혁명 전파"
 EFR_carry_the_revolution_east_desc:0 "동쪽 국경에는 우리의 새로운 질서에 대한 가장 큰 위협이 도사리고 있습니다. 그곳에 집결한 반동 세력은 우리가 가장 감당하기 어려울 때 공격해 올 것입니다. 단, 우리가 그들에게 준비할 시간을 줄 경우에만 말입니다."
 EFR_carry_the_revolution_south:0 "남쪽으로 혁명 전파"
 EFR_carry_the_revolution_south_desc:0 "파시즘에 처음으로 무너진 나라는 이탈리아였습니다. 그 결과, 이 이념은 이탈리아에 확고히 자리 잡았습니다. 우리의 세계관은 평화롭게 공존할 수 없습니다. 그들도 우리만큼이나 이 사실을 잘 알고 있으며, 분명 행동을 준비할 것입니다. 우리도 그래야 합니다."
 EFR_egalite_liberte_solidarite_desc:1 "최초의 프랑스 혁명은 천 년간 지속된 체제를 쓸어버렸고, 유럽의 지형을 영원히 바꿔 놓았습니다. 우리는 그들이 시작한 것을 끝낼 것입니다."
 EFR_reform_the_labour_laws:0 "노동법 개혁"
 EFR_reform_the_labour_laws_desc:0 "프랑스의 노동자들은 낮은 임금과 적은 혜택 속에서 가혹한 조건으로 일하고 있습니다. 이제 그들의 처지를 개선하기 위한 포괄적인 개혁안을 시행할 때입니다."
 EFR_nationalize_key_industry:0 "핵심 산업 국유화"
 EFR_nationalize_key_industry_desc:0 "현재 상황에서, 다가오는 위협에 맞서기 위해 경제를 급진적으로 재편하는 것을 주저해서는 안 됩니다. 시간이 촉박합니다. 자유 시장이 이 문제를 해결해 주기를 기다릴 수 없습니다."
 EFR_reorganize_the_aviation_industry:0 "항공 산업 재편"
 EFR_reorganize_the_aviation_industry_desc:0 "수십 개의 작은 회사로 분열된 우리의 항공 산업은 독일과 미국의 산업에 수십 년 뒤처져 있습니다. 급진적인 구조조정이 필요합니다."
 EFR_form_the_state_arsenals:0 "국영 조병창 설립"
 EFR_form_the_state_arsenals_desc:0 "우리 군에 현대적인 무기를 공급하기 위해, 민간 기업들이 필요한 생산 능력을 갖출 때까지 기다릴 수 없습니다."
 EFR_general_work_council:0 "총노동위원회"
 EFR_general_work_council_desc:0 "우리는 고용주와 피고용인 간의 분쟁을 처리하고, 노동자들이 가능한 가장 효율적인 방식으로 고용되도록 보장하기 위한 국가 기관을 설립할 것입니다."
 EFR_national_champions:0 "국가 대표 기업"
 EFR_national_champions_desc:0 "세계적인 수준에서 경쟁할 잠재력이 있는 몇몇 기업을 선정하고 최고 수준으로 지원함으로써, 우리는 다른 어떤 경제와도 동등한 현대 경제를 창출할 수 있습니다."
 EFR_dirigisme_desc:0 "소비에트 모델의 전면적인 계획 경제는 분명히 너무 극단적인 조치이지만, 우리 경제를 최적화하기 위해서는 어느 정도의 계획과 지도가 필요합니다."
 EFR_ban_the_leagues:0 "우익 연맹 해산"
 EFR_ban_the_leagues_desc:0 "극우 연맹들이 제약 없이 조직하는 것이 허용되어 왔습니다. 현재는 쿠데타를 시도하기에는 너무 약하지만, 미래에 그들이 무엇을 할 수 있을지는 알 수 없습니다. 지금 해산하는 것이 최선입니다."
 EFR_the_blum_viollette_proposal:0 "블룸-비올레트 제안"
 EFR_the_blum_viollette_proposal_desc:1 "프랑스 공화국의 시민권은 자격이 있는 모든 이에게 개방되어야 합니다. 알제리에 있는 우리의 충성스러운 신민 다수가 완전한 시민이 되기를 원하지만, 아직 허용되지 않고 있습니다. 그들을 완전한 시민으로 만듦으로써, 우리는 알제리를 프랑스에 훨씬 더 가깝게 묶을 수 있을 것입니다."
 EFR_expand_the_citizenship:0 "시민권 확대"
 EFR_expand_the_citizenship_desc:0 "공화국의 영토에 사는 일부 사람들이 시민이 되는 것을 허용하지 않는 것은 용납할 수 없는 일이지만, 이러한 상황이 우리 영토 내에서 지속되도록 방치되어 왔습니다. 우리는 즉시 이를 바로잡아야 합니다."
 EFR_france_undividable_desc:0 "프랑스는 하나의 깃발 아래 단일한 단위로 형성되어야 합니다. 분열에 대한 두려움을 잠재우기 위해서라도, 이제 우리가 이 사실을 공개적으로 인정할 때입니다."
 EFR_french_union:0 "프랑스 연합"
 EFR_french_union_desc:0 "이제 새로운 프랑스, 전 세계에 걸쳐 있으며 우리 영역의 모든 부분이 통합된 프랑스를 선포할 때입니다. 우리는 모든 지역에서 국민투표를 실시하여 이 새롭고 더 위대한 프랑스의 일부가 되려는 국민의 의지를 확인할 것입니다."
 EFR_french_union_tt:0 "우리 식민 제국의 여러 지역에서 국민투표가 실시될 것입니다. 일부 지역은 대신 완전히 독립하는 것을 선택할 수도 있습니다."
 EFR_encourage_immigration:0 "이민 장려"
 EFR_encourage_immigration_desc:1 "우리 본토는 대전쟁에서 입은 손실을 메우기 위해 노동자가 절실히 필요합니다. 프랑스 정착을 더 쉽게 만듦으로써, 우리는 이 부족분을 메울 수 있는 숙련된 이민자들을 유치할 수 있습니다."
 EFR_review_foreign_policy:0 "외교 정책 재검토"
 EFR_review_foreign_policy_desc:0 "1919년에 수립된 대륙 질서가 점점 더 위협받고 있는 것으로 보입니다. 다가오는 폭풍을 이겨낼 새로운 동맹을 확보하기 위해 우리의 외교 정책 선택지를 재검토할 때입니다."
 EFR_intervention_in_spain:0 "스페인 개입"
 EFR_intervention_in_spain_desc:0 "스페인 내전으로 이념 간의 충돌이 우리 문턱까지 닥쳤습니다. 분쟁이 우리나라로 번지지 않도록 신중하게 행동해야 합니다."
 EFR_support_the_finns:0 "핀란드 지원"
 EFR_support_the_finns_desc:0 "핀란드인들은 목숨을 걸고 싸우고 있습니다. 우리는 그들을 도와야 합니다."
 EFR_confirm_eastern_commitments:0 "동유럽 공약 확인"
 EFR_confirm_eastern_commitments_desc:0 "대전 이후, 우리는 부활하는 독일과 팽창주의 소련에 대한 평형추로서 동유럽에 동맹망을 구축했습니다. 이 지역의 동맹국들은 이제 우리가 요청을 받으면 실제로 도와줄 것인지 궁금해하고 있습니다. 그들이 다른 곳에서 도움을 구하기 전에 우리는 그들을 안심시켜야 합니다."
 EFR_strengthen_the_little_entente:0 "소협상 강화"
 EFR_strengthen_the_little_entente_desc:0 "소협상에 따라 우리는 동유럽과 발칸 반도의 동맹국들을 도와야 할 의무가 있습니다. 우리는 이 동맹이 약화되도록 내버려 두었지만, 지금은 그 어느 때보다도 필요합니다. 이제 동맹을 부활시킬 때입니다."
 EFR_invest_in_our_weaker_allies:0 "약소 동맹국에 투자"
 EFR_invest_in_our_weaker_allies_desc:0 "전쟁 시 유능한 동맹국을 확보하려면, 그들이 자체적인 군사적 필요를 충족할 수 있도록 해야 합니다. 그들의 산업에 대한 적절한 투자 프로그램은 그들이 필요한 군수품을 현지에서 생산할 수 있게 할 것입니다."
 EFR_invest_in_our_weaker_allies_trigger_tt:0 "우리보다 군수 공장이 적음"
 EFR_coordinate_rearmament:0 "재무장 협력"
 EFR_coordinate_rearmament_desc:0 "독일과 다른 적들의 통일된 개발 과정에 맞서기 위해, 우리도 동맹국들과 노력을 조율해야 합니다."
 EFR_foreign_guest_workers:0 "외국인 초청 노동자"
 EFR_foreign_guest_workers_desc:0 "노동력 부족은 우리 산업을 확장하고 군대 규모를 키우는 데 있어 주요 병목 현상입니다. 동맹국에서 숙련된 노동자를 초청하여 우리 공장에서 일하게 하면 군대에 보낼 인력을 확보할 수 있습니다."
 EFR_join_the_ententes:0 "협상국 가입"
 EFR_join_the_ententes_desc:1 "프랑스는 두 개의 상호 방위 조약을 동시에 유지할 수 없습니다. 영국이 우리의 공약도 존중하도록 설득하지 못한다면, 우리는 선택을 해야 할 것입니다. 우리의 분산된 동맹망을 하나로 통합함으로써, 우리는 동맹의 억지력을 기하급수적으로 증가시킬 수 있습니다."
 EFR_revive_the_franco_polish_alliance:1 "프랑스-폴란드 동맹 부활"
 EFR_revive_the_franco_polish_alliance_desc:0 "프랑스는 항상 독립 폴란드를 지지해왔습니다. 최근 몇 년간 양국 관계는 다소 냉각되었습니다. 독일의 위협이 다가오는 지금, 우리의 조약을 다시 불붙일 때입니다."
 EFR_revive_the_franco_polish_alliance_tt:0 "\n우리가 우리 세력의 지도자라면 폴란드가 우리 세력으로 초대될 것입니다."
 EFR_buy_time:0 "시간 벌기"
 FRA_autoroutes_tt:0 "이 중점을 더 일찍 선택할수록 기반 시설 개발이 더 좋아지지만, 1939년 이전에 이 중점을 선택하면 프랑스는 가봉에 추가 건설 슬롯을 얻게 됩니다. 1938년 이전에 선택하면 6개의 추가 슬롯을, 1938년과 1939년 사이에 선택하면 3개의 추가 슬롯을, 그 이후에는 슬롯을 얻지 못합니다.\n\n"
 EFR_buy_time_desc:0 "우리는 전장에서 독일군을 마주할 준비가 되어 있지 않습니다. 우리 동맹국은 약하고, 우리 군은 구식입니다. 살아남으려면 약간의 희생을 감수해야 할지도 모릅니다."
 EFR_arms_purchases_in_the_us:1 "미국에서 무기 구매"
 EFR_arms_purchases_in_the_us_desc:0 "우리 군수 산업은 우리 군대에 필요한 현대 무기를 공급할 능력이 부족합니다. 하지만 미국은 여유 생산 능력을 갖추고 있습니다. 그들이 고립주의로 돌아가지 않는 한, 우리에게 필요한 무기를 팔도록 설득할 수 있을 것 같습니다."
 EFR_france_leads:0 "프랑스가 주도한다"
 EFR_france_leads_desc:0 "프랑스처럼 자랑스러운 역사를 가진 국가는 다른 나라가 자국의 외교 정책을 좌지우지하게 놔둘 수 없습니다. 우리는 우리 자신의 이익에 따라 우리 자신의 선택을 할 것입니다."
 EFR_concessions_to_italy:1 "이탈리아에 대한 양보"
 EFR_concessions_to_italy_desc:0 "이탈리아는 여전히 아프리카 제국을 꿈꾸고 있습니다. 만약 우리가 약간의 양보를 제안하고 에티오피아 정복을 승인한다면, 로마와 베를린 사이에 추축국이 형성되는 것을 막을 수 있을지도 모릅니다."
 EFR_ratify_the_stresa_front:0 "스트레사 전선 비준"
 EFR_ratify_the_stresa_front_desc:0 "이탈리아는 아프리카 영토를 대가로 우리 세력에 합류할 의사를 밝혔습니다. 이제 펜을 들어 필요한 조약을 비준할 때입니다."
 EFR_franco_soviet_treaty:1 "프랑스-[SOV.GetAdjective] 조약"
 EFR_franco_soviet_treaty_desc:1 "[SOV.GetAdjective]인들은 우리만큼이나 유럽에서의 파시즘 부상에 대해 우려하고 있습니다. 때가 되면 우리를 지원하도록 그들을 설득할 수 있을지도 모릅니다."
 EFR_revive_the_national_bloc:0 "국민 블록 부활"
 EFR_revive_the_national_bloc_desc:0 "정치 지형은 날이 갈수록 점점 더 급진적으로 변하고 있습니다. 좌파는 공산주의자들과 공동의 대의를 만들자고 속삭입니다. 지금 필요한 것은 강력하고 안정적인 지도력입니다."
 EFR_laissez_faire:0 "자유방임주의"
 EFR_laissez_faire_desc:0 "공산주의자들은 우리나라의 경제 구조를 어떤 급진적인 방식으로 개조하고, 열심히 일하는 사람에게서 정당한 재산을 빼앗는 것에 대해 공공연하게 이야기합니다. 이에 맞서, 우리는 자유라는 단순한 개념을 내세울 것입니다. 역동적인 경제는 언제나 숨 막히는 관료주의라는 좌파의 악몽을 능가할 것입니다."
 EFR_protect_the_rights_of_man:0 "인권 보호"
 EFR_protect_the_rights_of_man_desc:0 "그들은 결코 공개적으로 말하지 않을지 모르지만, 보는 눈이 있는 사람이라면 누구나 명백히 알 수 있습니다. 재산권을 축소하는 것은 우리의 자랑스러운 조상들이 그토록 힘들게 싸워 쟁취한 모든 권리를 없애는 첫걸음에 불과합니다. 우리는 이를 용납하지 않을 것입니다!"
 EFR_freedom_front:0 "자유 전선"
 EFR_freedom_front_desc:0 "공산주의자들이 약속하는 혼란과 격변에 직면했을 때, 개인적으로 비난받을 만하다고 생각하는 정당과도 기꺼이 동맹을 맺어야 합니다."
 EFR_stimulate_the_dynamic_market:0 "역동적 시장 활성화"
 EFR_stimulate_the_dynamic_market_desc:0 "역동적 시장은 가장 효율적인 경제 조직 형태임이 입증되었습니다. 그러나 여전히 인간에 의해 운영되며, 인간은 때때로 자신의 노력이 헛되지 않을 것이라는 확신이 필요합니다. 일부 규제를 법으로 없애고 보증을 제공함으로써, 우리는 투자자들이 두려움을 극복하고 우리 경제를 활성화하는 데 도움을 줄 수 있습니다."
 EFR_agricultural_protectionism_desc:0 "세계 경제는 우리의 전통적인 생산 방식에 점점 더 적대적으로 변했습니다. 농부들을 보호하기 위한 조치를 취하지 않는다면, 해외에서 들어오는 대량 생산된 식료품에 맞서 우리 농부들이 경쟁력을 유지할 수 없게 되면서 곧 상상할 수 없는 규모의 위기에 직면하게 될 것입니다."
 EFR_economic_devolution:0 "경제권 이양"
 EFR_economic_devolution_desc:0 "파리의 어떤 관료가 보르도에 있는 회사에 무엇이 최선인지 안다고 생각하는 것은 터무니없는 일입니다. 우리는 우리 기업가들을 신뢰하고 그들이 스스로 해결책을 만들 수 있도록 권한을 부여해야 합니다."
 EFR_promote_entrepeneurship:0 "기업가 정신 장려"
 EFR_promote_entrepeneurship_desc:0 "역동적 시장의 약동하는 심장은 항상 기회를 보자마자 이를 활용하기 위해 신속하게 움직이는 개인이었습니다. 최근 몇 년 동안, 이 정신은 불필요한 규제로 억압되어 왔습니다. 우리는 그것들을 철폐해야 합니다."
 EFR_utilize_the_leagues:0 "연맹 활용"
 EFR_utilize_the_leagues_desc:0 "정치적 폭력이 프랑스에서 흔한 일이 되었다는 것은 슬픈 사실입니다. 만약 국가가 공산주의 혁명의 위협에서 살아남으려면, 만일의 사태가 발생했을 때 거리에서 공산주의 폭력배들과 맞서 싸울 수 있고 또 그럴 사람들의 도움을 피해서는 안 됩니다."
 EFR_national_regeneration:0 "국가 재건"
 EFR_national_regeneration_desc:0 "과도한 민주주의와 잘못된 공화주의가 우리나라를 병들게 하고 국민을 분열시켰습니다. 이 상처를 치유하는 데는 오랜 시간이 걸리겠지만, 마침내 첫걸음을 내디뎠습니다."
 EFR_national_regeneration_trigger_tt:0 "비동맹주의와 파시스트의 총 지지율이 50%를 초과합니다"
 EFR_destroy_decadence:0 "퇴폐 타파"
 EFR_destroy_decadence_desc:1 "아주 사소한 문제조차 몇 달씩 토론하도록 내버려 두는 나라가 위대했던 적은 없습니다. 바다 뒤에 안전하게 자리 잡고 세계적인 제국의 지원을 받는 일부 국가는 이러한 사치를 누릴 수 있다고 믿을지도 모릅니다. 우리는 그럴 수 없습니다."
 EFR_integralism:0 "통합주의"
 EFR_integralism_desc:0 "통합주의 이념에 따르면 사회의 모든 측면이 함께 모여 더 큰 전체의 작은 한 조각인 것처럼 작동해야 합니다. 이 사회는 질서정연해야 하며, 모든 부분이 조화롭게 함께 작동하도록 보장해야 합니다."
 EFR_work:0 "노동"
 EFR_work_desc:0 "장인은 경제에서 가장 중요한 구성 요소입니다. 올바른 사람들의 인도를 받을 때, 자신의 노동을 국가에 봉사하는 것보다 더 고귀한 소명은 없습니다."
 EFR_family:0 "가족"
 EFR_industrial_expansion_tt:0 "이 중점을 1938년 이전에 완료하면, 이전 두 중점에서 표시된 각 주마다 휴전 이후 민간 공장 3개를 받게 됩니다. 1938년에서 1939년 사이에 완료하면, 표시된 주마다 2개를 받게 되며 1939년 이후, 하지만 휴전 이전에 완료하면 주마다 1개만 받게 됩니다. 프랑스는 가봉에서 이 중점을 완료하면 민간 공장을 절반만큼 받게 됩니다.\n\n"
 EFR_military_factories_tt:0 "이 중점을 1938년 이전에 완료하면, 이전 두 중점에서 표시된 각 주마다 휴전 이후 군수 공장 4개를 받게 됩니다. 1938년에서 1939년 사이에 완료하면, 표시된 주마다 3개를 받게 되며 1939년 이후, 하지만 휴전 이전에 완료하면 주마다 2개만 받게 됩니다. 프랑스는 약속된 군수 공장당 2~3개 보병 사단을 장비할 수 있는 충분한 장비를 받게 됩니다.\n\n"
 EFR_family_desc:0 "사회에서 가장 작은 단위는 개인이 아니라 가족입니다. 이 단순하고 명백한 사실에 이의를 제기하는 것이 구 공화국의 가장 큰 결점이었습니다."
 EFR_fatherland:0 "조국"
 EFR_fatherland_desc:0 "국가는 다른 모든 것 위에 있습니다. 이에 대해서는 의심의 여지가 없습니다."
 EFR_political_unity:0 "정치적 통합"
 EFR_political_unity_desc:1 "절대왕정 붕괴 이후 프랑스의 역사는 정치적 내분의 역사였습니다. 통합이 있었을 때 프랑스는 승리했습니다. 내분이 있었을 때 프랑스는 패배했습니다. 이러한 이유로, 우리는 소수의 야망이 다수의 생계를 해치도록 내버려 둘 수 없습니다."
 EFR_diplomatic_freedom:0 "외교적 자유"
 EFR_diplomatic_freedom_desc:1 "공화국 정부는 동유럽의 인위적인 구조물에 스스로를 옭아맸습니다. 우리가 원조를 철회하는 순간 무너질 것들입니다. 그들은 자산이 아니라 부채이며, 따라서 우리는 그들에게서 손을 뗄 것입니다."
 EFR_latin_entente:0 "라틴 협상"
 EFR_latin_entente_desc:1 "로마 제국의 후계 국가들 사이에 존재하는 형제애는 부인할 수 없습니다. 유럽의 게르만 민족은 너무 오랫동안 대륙을 지배해왔습니다. 이제 우리가 민족적 권리를 되찾을 때입니다."
 EFR_reach_out_to_spain:0 "스페인에 손 내밀기"
 EFR_reach_out_to_spain_desc:0 "내전에서 막 회복한 스페인은 대륙을 재편하려는 우리의 시도에 있어 자연스러운 동맹입니다."
 EFR_invite_portugal:0 "포르투갈 초대"
 EFR_invite_portugal_desc:1 "포르투갈의 식민 제국은 많이 축소되었지만, 탐험과 정복의 불꽃은 모든 포르투갈인의 마음속에서 여전히 타오르고 있습니다."
 EFR_compensate_italy:0 "이탈리아에 보상"
 EFR_compensate_italy_desc:0 "과거에는 사막의 작은 땅뙈기를 둘러싼 갈등이 우리 두 나라를 분쟁으로 이끌었습니다. 그런 어리석은 일은 쉽게 멈출 수 있으며, 상호 합의 가능한 결과를 신속하게 찾을 수 있습니다."
 EFR_intervention_in_greece:0 "그리스 개입"
 EFR_intervention_in_greece_desc:0 "그리스는 지중해에서 가장 가치 있는 영토 일부를 통제하고 있습니다. 적대적인 정부가 그곳을 통제하도록 내버려 둘 수 없으므로, 우리가 먼저 행동해야 합니다."
 EFR_the_congress_of_paris:0 "파리 회의"
 EFR_the_congress_of_paris_desc:0 "베를린 회의에서 아프리카의 국경이 형성되었습니다. 하지만 오늘날의 지도는 누더기처럼 보입니다. 지도를 다시 그릴 때가 되었으며, 이를 통해 새로운 식민 제국의 기반을 형성해야 합니다."
 EFR_the_natural_borders_of_france:0 "프랑스의 자연 국경"
 EFR_the_natural_borders_of_france_desc:0 "한 나라가 자국의 이익을 먼저 생각하는 것은 당연합니다. 우리는 우리의 투쟁에서 독일인과 평화롭게 공존할 수 없으므로, 우리의 심장부를 방어하기 위해 자연 국경을 확보해야 합니다."
 EFR_towards_a_new_europe:0 "새로운 유럽을 향하여"
 EFR_towards_a_new_europe_desc:1 "프랑스는 기로에 서 있습니다. 우리는 구질서에 얽매일 수도 있고, 새로운 질서를 받아들일 수도 있습니다. 독일인들이 대륙을 재편할 태세를 갖춘 지금, 그들의 편에 서는 것이 우리에게 이로울 것입니다."
 EFR_establish_spheres_of_influence:0 "세력권 확립"
 EFR_establish_spheres_of_influence_desc:1 "수 세기 동안, 우리 민족은 우리가 불구대천의 원수라는 믿음 속에서 살아왔습니다. 이 믿음은 우리의 이해관계가 양립할 수 없다는 생각에 기반을 두었습니다. 하지만 우리가 세력권을 명확히 하고 서로 간섭하지 않으려 노력한다면 분명 합의에 이를 수 있을 것입니다."
 EFR_split_belgium:0 "벨기에 분할"
 EFR_split_belgium_desc:0 "이제 벨기에가 우리의 세력권에 들어왔으니, 프랑스어권 지역을 고국으로 불러들일 때입니다. 나머지는 새로운 국가로 형성될 것입니다."
 EFR_align_belgium:0 "벨기에 포섭"
 EFR_align_belgium_desc:0 "벨기에인들은 우리 덕분에 존재하며, 우리는 그들이 그 사실을 잊게 내버려 둘 수 없습니다. 만약 그들이 독립을 유지하도록 둔다면, 우리는 최소한 우호적인 정부가 들어서도록 보장할 것입니다."
 EFR_grow_the_empire:0 "제국 확장"
 EFR_grow_the_empire_desc:0 "벨기에만 한 크기의 나라가 자기보다 몇 배나 큰 식민지를 보유하도록 허용되는 것은 터무니없는 일입니다. 우리는 그러한 영토를 관리하는 데 훨씬 더 적합합니다."
 EFR_bring_home_quebec:0 "퀘벡 귀환"
 EFR_bring_home_quebec_desc:0 "오래전에 잃어버린 주는, 때가 되면 다시 우리의 것이 될 것입니다. 전 세계의 모든 프랑스어권 사람들은 결국 조국과 재회하게 될 것입니다."
 EFR_expand_to_the_suez:0 "수에즈로 확장"
 EFR_expand_to_the_suez_desc:0 "레반트에서 우리와 영국 사이의 통제권 분할은 실행 불가능한 타협이었으며, 다행히도 이제는 더 이상 따를 필요가 없습니다."
 EFR_dominate_the_middle_east:0 "중동 지배"
 EFR_dominate_the_middle_east_desc:0 "중동 국가들은 오스만 제국의 시체에서 조각된 인위적인 구조물입니다. 그들은 평범한 프랑스 마을보다 더 주권을 가지고 있지 않으며, 이제 그들에게 그 사실을 상기시켜 줄 때입니다."
 EFR_the_council_of_rambouillet:0 "랑부예 평의회"
 EFR_the_council_of_rambouillet_desc:0 "나라가 혼란에 빠지자, 사람들은 강력한 지도자를 찾고 있습니다. 공화주의가 프랑스 국민을 실망시켰다는 것이 명백해졌으며, 프랑스의 타고난 통치자들이 돌아올 때입니다. 하지만 먼저, 군주제 복원을 위한 기반이 마련되어야 합니다."
 EFR_revise_the_constitution:0 "헌법 개정"
 EFR_revise_the_constitution_desc:0 "공화국 헌법은 항상 임시방편으로 의도되었으나, 너무 오랫동안 유지되도록 방치되었습니다. 이제 군주가 복위할 수 있도록 헌법을 다시 쓸 것입니다."
 EFR_repeal_the_law_of_exile:0 "망명법 폐지"
 EFR_repeal_the_law_of_exile_desc:0 "프랑스 왕가의 수장이나 그 후계자는 명시적인 허가 없이는 프랑스 영토에 들어올 수 없습니다. 군주제의 성공적인 복귀를 이루기 전에, 이 성가시고 사소한 장애물을 제거해야 합니다."
 EFR_orleanist_restoration:1 "오를레앙 왕정복고"
 EFR_orleanist_restoration_desc:2 "오를레앙 가문은 프랑스 왕당파 사이에서 상당한 지지를 받고 있습니다. 일부 비방가들은 다른 왕위 후보를 선호하겠지만, 오를레앙 가문의 후계자가 평화적으로 국가를 통합할 가장 좋은 기회를 가졌다는 점에는 의심의 여지가 거의 없습니다."
 EFR_guarantee_the_constitution:0 "헌법 보장"
 EFR_guarantee_the_constitution_desc:0 "공화파 언론이 왕정의 정통성에 대한 근거 없는 공세를 시작하기도 전에, 우리는 국민의 개인적 권리를 존중한다는 확고한 보장을 통해 그들의 입지를 약화시켜야 합니다."
 EFR_the_first_citizen_of_the_state:0 "국가 제1시민"
 EFR_the_first_citizen_of_the_state_desc:0 "왕은 상당한 권력을 부여받았지만, 결코 구시대의 폭군이나 절대주의 통치자로 보여서는 안 됩니다. 대신, 현대의 군주는 법을 존중하고 불법적으로 권력을 찬탈하려는 자들에 맞서는 첫 번째 방어선이 되어야 합니다."
 EFR_counter_action_desc:0 "악시옹 프랑세즈는 오랫동안 군주제 복귀의 가장 강력한 옹호자였습니다. 불행히도, 다른 주제에 대한 그들의 견해는 덜 마음에 듭니다. 이제 그들에게 목적을 다했음을 알리고 처리할 때입니다."
 EFR_no_further_humiliations:0 "더 이상의 굴욕은 없다"
 EFR_no_further_humiliations_desc:0 "수년간, 역대 공화국 정부는 독일이 국제 조약을 짓밟도록 방치했으며, 일부 조약은 잉크가 마르기도 전에 뻔뻔하게 파기되었습니다. 이제 이 모든 것을 끝낼 것입니다."
 EFR_slum_clearing:0 "빈민가 정리"
 EFR_slum_clearing_desc:0 "세계 강대국 중 하나임에도 불구하고, 평범한 프랑스 노동자는 종종 끔찍하고 역겨운 불결함 속에서 살고 있습니다. 왕이라는 칭호에 걸맞은 군주라면 자신의 신민이 그런 상태로 사는 것을 용납할 수 없습니다."
 EFR_public_welfare:0 "공공복지"
 EFR_public_welfare_desc:0 "가장 미천한 신민을 위해 일하지 않는 왕은 왕이 아닙니다."
 EFR_the_legitimate_heir:0 "정당한 후계자"
 EFR_the_legitimate_heir_desc:1 "정통왕당파는 카를로스파 분파를 프랑스 왕위의 정당한 후계자로 간주합니다. 그들의 후보를 왕위에 앉히면 스페인과 프랑스를 이중 군주국으로 통치할 수 있는 매력적인 가능성이 열립니다."
 EFR_secure_the_crown_of_spain:0 "스페인 왕위 확보"
 EFR_secure_the_crown_of_spain_desc:0 "왕의 생득권을 주장하기 위한 첫 단계는 우후죽순처럼 생겨난 여러 참칭 정부로부터 스페인을 확보하는 것입니다. 그들의 사소한 다툼은 이미 한 차례 국가를 피비린내 나는 내전으로 몰아넣었습니다. 다시는 그런 일이 일어나게 놔둘 수 없습니다."
 EFR_unite_the_crowns:0 "왕위 통합"
 EFR_unite_the_crowns_desc:0 "스페인을 확보했으니, 이제 왕위를 통합하여 새로운 왕국인 프랑스-스페인 왕국을 세울 수 있습니다."
 EFR_two_countries_two_crowns:0 "두 나라, 두 왕위"
 EFR_two_countries_two_crowns_desc:0 "한쪽이 다른 쪽의 속국으로 여기지 않으면서 두 나라를 통합할 실현 가능한 방법은 없습니다. 대신 우리는 왕에게 법적인 연합이 아닌, 동군연합으로 두 나라를 통치하도록 조언할 것입니다."
 EFR_proclaim_the_third_empire:0 "제3제국 선포"
 EFR_proclaim_the_third_empire_desc:0 "보나파르트파는 왕위 쟁탈전에서 외부인으로 간주될 수 있지만, 그들은 모든 유럽이 프랑스 황제에게 고개 숙였던 시절의 꿈을 품고 있습니다."
 EFR_avenge_waterloo:0 "워털루의 복수"
 EFR_avenge_waterloo_desc:0 "나폴레옹 1세의 역사는 그의 가장 큰 패배로 영원히 정의될 것입니다. 우리가 성공하려면, 그가 패배했던 곳에서 승리할 수 있음을 보여주어야 합니다."
 EFR_reorganize_the_dutch:0 "네덜란드 재편"
 EFR_reorganize_the_dutch_desc:0 "네덜란드 또한 한때 프랑스 제국의 일부였습니다. 이제 그들이 패배했으니, 이 자연스러운 상태로 돌아갈 때입니다."
 EFR_retribution_for_sedan:0 "스당에 대한 보복"
 EFR_retribution_for_sedan_desc:0 "반세기 이상 동안, 독일인들은 스당 전투와 그곳에서 나폴레옹 3세를 상대로 거둔 승리를 기념해왔습니다. 미래에는 모든 독일인이 그 장소의 이름을 저주하게 될 것입니다."
 EFR_disunite_germany:0 "독일 분열"
 EFR_disunite_germany_desc:0 "프랑스에 대한 승리로 프로이센은 소규모 독일 국가들을 자신의 깃발 아래 통합할 수 있었습니다. 이제 독일이 패배했으니, 이 과정을 되돌리는 것이 마땅합니다."
 EFR_return_to_borodino:0 "보로디노로의 귀환"
 EFR_return_to_borodino_desc:0 "보로디노에서 나폴레옹은 유럽에서의 승리에 가장 가까웠습니다. 러시아군은 거의 괴멸되었고, 그가 조금만 더 빨랐더라면 러시아를 굴복시킬 수 있었을 것입니다. 우리는 그것이 가능하다는 것을 세상에 보여줄 것입니다."
 EFR_je_suis_la_deluge:1 "Je Suis Le Déluge"
 EFR_je_suis_la_deluge_desc:0 "프랑스 혁명은 오랫동안 유럽을 지배해 온 낡고 약한 정권들을 휩쓸어버린 홍수였습니다. 이제, 새로운 홍수가 도래했습니다."
 EFR_coordinate_rearmament_tt:0 "우리 세력 구성원의 생산 면허 비용을 감소시킵니다."
   EFR_metropolitan_france:2 "프랑스 본토에 투자"
 EFR_metropolitan_france_tt:0 "프랑스 본토에 §Y기반시설§!을 건설할 공간이 부족합니다"
 EFR_metropolitan_france_desc:0 "라 메트로폴(본토)이 항상 우선이어야 합니다. 기반시설을 개선하여 일자리를 창출하고 더 빠른 병력 배치를 가능하게 하는 것부터 시작할 수 있습니다."
 EFR_algerie_france:2 "프랑스령 알제리에 투자"
 EFR_algerie_france_tt:0 "식민지 프랑스에 §Y기반시설§!을 건설할 공간이 부족합니다"
 EFR_algerie_france_desc:0 "유럽은 위험한 시기를 맞고 있습니다. 우리는 남쪽의 영토를 개선하고 항상 본토를 지원할 수 있도록 보장하는 데 집중해야 합니다."
 EFR_industrial_expansion:0 "산업 확장"
 EFR_industrial_expansion_desc:0 "국내에 더 강력한 산업 기반이 필요합니다. 준비된 노동력은 충분하지만, 더 많은 공장 라인이 필요합니다."
 EFR_colonial_industry:0 "식민지 산업"
 EFR_colonial_industry_tt:0 "식민지 프랑스에 §Y민간 공장§!을 건설할 공간이 부족합니다"
 EFR_colonial_industry_desc:1 "식민지 산업에 집중해야 합니다. 유럽의 긴장이 고조될 경우, 적 폭격기의 사정권 밖에 있는 산업 생산 능력을 계속 유지할 수 있을 것입니다."
 EFR_military_factories:0 "군수 공장"
 EFR_military_factories_desc:1 "우리의 전쟁 기계는 생산 능력 면에서 뒤처지고 있습니다. 우리 군이 지속적으로 새로운 장비를 보급받을 수 있도록 본토에서의 군사 장비 생산에 집중해야 합니다."
 EFR_colonial_military_factories:0 "식민지 군수 공장"
 EFR_colonial_military_factories_tt:0 "프랑스 식민지에 §Y군수 공장§!을 지을 건설 슬롯이 부족합니다"
 EFR_colonial_military_factories_desc:0 "군수 생산 시설을 유럽 외부에 배치하면, 적이 우리 영공을 장악하더라도 최전선 부대에 장비를 지속적으로 공급할 수 있습니다."
 EFR_extra_research_slot:2 "그랑제콜 지원"
 EFR_extra_research_slot_desc:0 "유망한 젊은 인재들이 곳곳에서 나타나고 있습니다. 그들이 연구를 수행할 수 있도록 시설을 제공해야 합니다. 기술의 발전은 가장 필요한 곳에서 우리에게 우위를 제공할 수 있습니다."
 EFR_nuclear_effort:0 "핵 개발 노력"
 EFR_nuclear_effort_desc:0 "핵 과학의 초기 실험에서 유망한 결과가 나왔습니다. 그 힘을 이용하면 인류가 본 적 없는 무기를 얻을 수 있습니다."
 EFR_jet_effort:0 "제트기 개발 노력"
 EFR_jet_effort_desc:0 "공중전의 핵심은 기동성입니다. 제트 엔진은 매우 강력한 진보이므로, 우리가 적 조종사들을 하늘에서 격추하는 동안 그들은 정지해 있는 것처럼 보일 것입니다."
 EFR_extra_research_slot_2:2 "국립 연구 센터 설립"
 EFR_extra_research_slot_2_desc:0 "유망한 젊은 인재들이 곳곳에서 나타나고 있습니다. 그들이 연구를 수행할 수 있도록 시설을 제공해야 합니다. 기술의 발전은 가장 필요한 곳에서 우리에게 우위를 제공할 수 있습니다."
 EFR_defensive_focus:0 "방어 중점"
 EFR_defensive_focus_desc:0 "이러한 시기에는 방어를 강화하는 것이 최선입니다. 위협이 있다면, 우리 영토에서 처리할 수 있도록 그들이 오게 놔두십시오. 우리 군을 이끌 완벽한 후보자가 있습니다. 당신의 허락만 있으면 됩니다."
 EFR_aggressive_focus:0 "공격 중점"
 EFR_aggressive_focus_desc:0 "적이 국경으로 이동하는 것을 좌시할 수 없습니다. 또한 전쟁 시나리오에서 동맹국들이 스스로를 방어하도록 내버려 둘 수도 없습니다. 군대를 준비시키십시오! 가믈랭이 그 임무에 적임자입니다."
 EFR_fortification_focus:0 "요새화 중점"
 EFR_fortification_focus_desc:0 "우리 요새가 매우 중요했던 만큼, 더 효율적으로 건설할 방법을 찾아야 합니다. 마지노선은 적군에 대한 강력한 억제력이었으며, 이와 같은 방어 시설의 안전을 더 활용할 수 있습니다."
 EFR_alpine_forts:0 "알프스 요새"
 EFR_alpine_forts_desc:0 "새로 계획된 방어선으로 알프스를 뒤덮고 나면 이탈리아군은 국경을 쉽게 넘지 못할 것입니다. 우리는 대응하고 진지를 강화할 시간을 벌게 될 것입니다."
 EFR_extend_the_maginot_line:0 "마지노선 확장"
 EFR_extend_the_maginot_line_desc:0 "벨기에가 자리를 지킬 것이라고 믿을 수 없습니다. 만약 그들이 적군을 통과시킨다면 우리는 곤경에 처할 것입니다. 마지노선을 확장하는 것은 원치 않는 군대가 프랑스로 들어오지 못하게 하는 데 매우 중요합니다!"
 EFR_infantry_focus:0 "국민총동원"
 EFR_infantry_focus_desc:0 "싸울 수 있는 모든 남녀가 싸울 것입니다. 무기를 대량 생산하면 비용이 절감될 것입니다. 모든 이의 손에 소총을 쥐여줄 것입니다."
 EFR_artillery_focus:0 "대규모 포대"
 EFR_artillery_focus_desc:0 "우리 포병은 단일의 강력한 부대를 형성하여 특정 지점에 집중 포격을 가할 것입니다. 일제 사격으로 적 전선을 약화시키고, 필요하다면 돌파구를 열 것입니다!"
 EFR_heavy_armor_focus:0 "전투 전차"
 EFR_heavy_armor_focus_desc:0 "전투 전차는 프랑스 육군의 나아갈 길입니다. 우리는 전장을 지배하길 원하며, 이를 위해 새롭고 강력한 전차가 필요합니다!"
 EFR_motorized_focus:0 "차량화 중점"
 EFR_motorized_focus_desc:0 "보병 차량을 더 잘 만드는 방법을 찾는 것은 최전선을 지원하고 강화하는 능력을 향상시키는 데 도움이 될 것입니다."
 EFR_mechanized_focus:0 "기계화 중점"
 EFR_mechanized_focus_desc:0 "장갑 차량은 전쟁에서 점점 더 중요한 역할을 하고 있습니다. 일반적인 전차보다 위협적이진 않지만, 통신, 지휘, 수송 및 시가전에서 우리에게 우위를 제공합니다. "
 EFR_light_medium_armor:0 "장갑차"
 EFR_light_medium_armor_desc:0 "법에 따라 보병이 모든 전차 부대를 통제합니다. 더 가볍고 빠른 기병 '차량' 또는 장갑차는 이동에 더 적합하며, 탑재된 무기로 여전히 어느 정도의 피해를 줄 수 있습니다."
 EFR_army_reform:0 "육군 개혁"
 EFR_army_reform_desc:0 "보병 부대나 첨단 전차만으로는 전쟁에서 승리할 수 없습니다. 우리는 전술적 및 전략적 능력을 모두 개발하는 데 노력을 기울여야 합니다. 적임자가 있다면 우리는 군대로서 발전할 수 있습니다."
 EFR_navy_focus:0 "해군 중점"
 EFR_navy_focus_tt:0 "§Y해군 기지§!를 지을 건설 슬롯이 부족합니다!"
 EFR_navy_focus_desc:0 "해군을 확장할 계획이라면 첫 단계는 해군 기지를 개선하고 확장하는 것입니다. 우리의 독특한 함선들은 항상 전투 준비 상태를 유지하기 위해 지속적인 주의가 필요합니다."
 EFR_improved_screen_ships:0 "개량된 호위함"
 EFR_improved_screen_ships_desc:0 "구축함과 경순양함은 우리의 중전함이나 항공모함을 방어하는 데 핵심적인 역할을 합니다. 해상 방어선을 잃으면 모든 함선과 병력을 잃을 위험이 있습니다. 우리 함선이 최신 기술로 건조되도록 해야 합니다."
 EFR_capital_ship_focus:0 "주력함 중점"
 EFR_capital_ship_focus_desc:0 "전함의 설계를 개선하면 엄청난 전술적 이점을 얻을 수 있습니다. 그들의 사거리와 위력은 독보적이므로, 아무도 그들의 함포를 피할 수 없을 것입니다."
 EFR_carrier_focus:0 "항공모함 중점"
 EFR_carrier_focus_desc:0 "해군 이론가들은 우리의 구식 항공모함에 주목했습니다. 그들은 개발이 올바른 방향으로 추진된다면 항공모함을 더욱 활용할 수 있는 방법에 대한 제안을 가지고 있습니다. 우리의 전폭적인 지원 없이는 진정한 진전을 이룰 수 없습니다."
 EFR_initiate_government_reform:0 "정부 개혁"
 EFR_initiate_government_reform_desc:0 "세상은 위험해졌습니다. 더 이상 우리 자신의 사소한 다툼에 얽매일 수 없습니다. 이제 정치인들에게 힘을 실어주고 프랑스를 위해 나아갈 때입니다."
 EFR_support_the_left:0 "좌파 지원"
 EFR_support_the_left_desc:0 "코민테른이 강해지고 있습니다. 우리의 이해관계가 일치할 수 있음을 보여주고, 우리 공산주의 조직을 지원할 때입니다."
 EFR_leftist_rhetoric:0 "좌익 수사"
 EFR_leftist_rhetoric_desc:0 "목표는 명확합니다. 모두를 위한 평등입니다. 우리는 프랑스 정치에 자본주의적 이해관계가 개입하는 것을 원치 않습니다. 우리 공산주의 조직이 번성할 수 있도록 최적의 조건을 제공하는 것이 필수적입니다."
 EFR_scw_intervention_republicans:0 "공화파 개입"
 EFR_scw_intervention_republicans_desc:0 "공화파 스페인은 우리의 도움이 필요합니다! \n대의를 위해 싸우고자 하는 사람은 누구나 허용되어야 합니다. 또 다른 파시스트 정권이 세를 불리는 것을 용납할 수 없습니다."
 EFR_national_mobilization:0 "국가 총동원"
 EFR_national_mobilization_desc:0 "마침내 행동에 나설 수 있는 정부가 들어섰습니다. 이제 우리 군을 강화하고 프랑스를 위해 싸울 준비를 할 때입니다."
 EFR_humanite_unie:0 "통합된 인류"
 EFR_humanite_unie_desc:0 "살찐 은행가들과 권력에 굶주린 선동가들이 세상에 대한 피비린내 나는 장악력을 강화하고 있습니다. 날이 갈수록 자유인들이 노예가 되고, 개인의 탐욕이 빚어낸 위기 속으로 세상은 더욱 깊이 빠져들고 있습니다. 프랑스의 이상이 그 어느 때보다 필요합니다! 인류는 우리를 필요로 하며, 우리는 인류를 통합해야 합니다!"
 EFR_join_comintern:0 "코민테른 가입"
 EFR_join_comintern_desc:0 "사방에 적이 있는 상황에서, 우리는 강력한 동맹국들과 함께 우리의 입지를 강화해야 합니다. 코민테른과의 유대는 더욱 강해졌으며, 이제 그들의 대의에 전적으로 헌신할 때입니다."
 EFR_support_status_quo:0 "현상 유지 지지"
 EFR_support_status_quo_desc:0 "프랑스는 자유의 요람이자 수호자이며, 앞으로도 그래야 합니다. 다시 통합을 이루고자 한다면, 민주주의가 쇠퇴하기 전에 안정시켜야 합니다."
 EFR_little_entente:0 "소협상"
 EFR_little_entente_desc:0 "소협상은 대전쟁 이후 오스트리아와 헝가리의 주변국 침략을 막기 위해 결성된 동맹으로, 프랑스의 지원을 받았으나 지금은 와해되기 시작했습니다. 영국과의 관계를 확보하는 대신, 우리는 주도권을 잡고 창립국인 체코슬로바키아부터 시작하여 이 세력을 복원하고 공고히 해야 합니다."
 EFR_go_with_britain:0 "영국과 함께"
 EFR_go_with_britain_desc:0 "러시아가 영원히 변해버린 지금, 옛 삼국 협상에는 프랑스와 영국만이 남았습니다. 역사가 반복될 운명이라면, 우리는 유럽 민주주의와 자유의 보루인 이 두 국가가 동맹으로 남도록 보장해야 합니다."
 EFR_strengthen_government_support:0 "정부 강화"
 EFR_strengthen_government_support_desc:0 "우리는 내년에 프랑스 전역 국민의 염원을 충족시킬 계획을 세웠습니다. 우리가 행동할 능력이 있고 프랑스를 통치할 자격이 있음을 보여주어, 다시 한번 단결할 수 있도록 해야 합니다."
 EFR_defensive_strategems:0 "방어 전략"
 EFR_defensive_strategems_desc:0 "프랑스 국민이 우리를 위해 전쟁에 나서길 원한다면, 그 어느 때보다 명확한 방향을 제시하는 것이 중요합니다. 우리는 내분을 멈추고, 대신 프랑스와 "자유, 평등, 박애"를 위해 싸워야 합니다."
 EFR_invite_yugoslavia:0 "유고슬라비아 초대"
 EFR_invite_yugoslavia_desc:0 "유고슬라비아는 팽창주의적인 이웃 국가를 걱정하지 않아도 될 만큼 이미 충분한 우려를 안고 있습니다. 그들을 소협상으로 다시 끌어들이는 것은 그들과 우리 모두에게 큰 도움이 될 것입니다."
 EFR_invite_romania:0 "루마니아 초대"
 EFR_invite_romania_desc:0 "루마니아의 민주주의는 내부 파시스트 세력과 소비에트 공산주의 사이에 끼어 취약한 상태입니다. 그들을 소협상에 끌어들이면 우리의 지원을 받아 안정을 유지할 수 있을 것입니다."
 EFR_polish_guarantee:0 "폴란드 독립 보장"
 EFR_polish_guarantee_desc:0 "폴란드 외교관들은 국경의 긴장에 대한 우려를 표명했습니다. 우리 강대국의 보장은 침략을 계획하는 모든 이를 저지할 것입니다."
 EFR_czech_guarantee:0 "체코 독립 보장"
 EFR_czech_guarantee_desc:0 "체코 국경에서 긴장이 고조되고 있습니다. 팽창주의 국가가 자유롭고 민주적인 국가를 점령하도록 내버려 둘 수 없습니다. 체코인들은 자유로운 민족으로 남아야 합니다. 우리의 보장이 있다면 침략을 계획하는 자는 누구든 재고하게 될 것입니다."
 EFR_revise_versailles:0 "베르사유 조약 개정"
 EFR_revise_versailles_desc:0 "독일인들은 이미 베르사유 조약에 명시된 배상금을 무시하며, 프랑스가 더는 존중받지 못함을 보여주고 있습니다. 오히려 우리는 대전쟁에서 희생된 생명에 대해 더 많은 것을 요구할 권리가 있지만, 정의로운 조약을 시행하려면 강력한 프랑스, 새로운 프랑스가 필요합니다."
 EFR_support_the_right:0 "우익 지원"
 EFR_support_the_right_desc:0 "프랑스는 언제나 강하고 자랑스러운 국가였지만, 정부의 무대책으로 국민이 분열되었습니다. 우리는 프랑스를 통합하고 우리의 우월성과 힘을 주장하여 쇠퇴에 빠지는 것을 피해야 합니다."
 EFR_right_wing_rhetoric:0 "우익 수사"
 EFR_right_wing_rhetoric_desc:0 "우리는 모든 프랑스인에게 다가가 그들의 민족정신을 고양하는 데 집중해야 합니다. 우리가 그들에게 필요한 강력한 지도자가 될 수 있음을 보여주면, 그들은 우리 영광스러운 국가의 자랑스러운 시민이 될 것입니다."
 EFR_scw_intervention_nationalists:0 "국민파 개입"
 EFR_scw_intervention_nationalists_desc:0 " 국민파가 마침내 스페인에서 세를 얻고 있습니다. 그들의 대의는 정의로우며, 그들을 위해 싸우고자 하는 사람은 누구나 허용되어야 합니다."
 EFR_army_of_aggression:0 "침략군"
 EFR_army_of_aggression_desc:0 "우리의 적들이 유럽 전역에서 활개 치는 동안, 더는 낡아빠진 벽 뒤에 앉아 있을 수 없습니다. 군대를 강화하고 국경을 넓혀 프랑스가 계속 위대한 국가로 남도록 할 때입니다."
 EFR_france_first:0 "프랑스 우선주의"
 EFR_france_first_desc:0 "우리는 프랑스다! 대전쟁의 승리자! 유럽의 구원자! 우리는 이 세상이 본 가장 위대한 사상가들의 고향이다. 너무나 많은 국가가 세상을 혼돈에 빠뜨리려 하고 있다. 우리는 필요하며, 그 부름에 응할 것이다. 우리는 키를 잡고, 폭풍을 헤쳐나가며, 우리의 통치 아래 인류를 안전으로 이끌 것이다!"
 EFR_woo_italy:0 "이탈리아 구애"
 EFR_woo_italy_desc:0 "이탈리아는 강대국이 될 잠재력을 가지고 있습니다. 무솔리니의 강력한 지도력 덕분에 이탈리아 국민은 단결하여 올바른 대의를 위해 싸울 준비가 되어 있습니다. 그 대의가 우리의 것이 되게 합시다."
 EFR_dismantle_the_democracies:0 "민주주의 해체"
 EFR_dismantle_the_democracies_desc:0 "중부 유럽의 새로운 [GER.GetAdjective] 민주주의 동맹이 우리가 새로 찾은 입지를 위협하고 있습니다. 그들이 더 강력해지기 전에 지금 행동을 취해야 합니다."
 EFR_join_germany:0 "독일과 동맹"
 EFR_join_germany_desc:0 "독일국은 무시할 수 없는 세력이 되고 있습니다. 더 나은 미래에 대한 그들의 비전은 우리의 이해관계와 일치할 수 있습니다. 우리는 그들을 지원해야 하며, 일단 사태가 진정되면 프랑스는 유럽에서 정당한 몫을 차지하게 될 것입니다."
 EFR_naval_doctrine:0 "해군 교리"
 EFR_naval_doctrine_desc:0 "최근 함선 설계의 발전으로 전술 및 전략적 기동에 새로운 선택지가 열렸습니다. 이 새로운 이론들로 모험을 하기 전에, 우리는 이를 적절히 시험하고 계획을 확고히 해야 합니다."
 EFR_air_focus:0 "공군 중점"
 EFR_air_focus_desc:0 "공군을 확장할 때가 왔습니다! 병력과 항공기 양면의 대대적인 증강을 지원하기 위해 새로운 공군 기지 건설을 시작할 계획이 이미 수립되었습니다."
 EFR_cas_focus:0 "근접항공지원기 중점"
 EFR_cas_focus_desc:0 "지상군과 함선을 지원하는 항공기는 비교적 적은 투자로 매우 효율적인 전력 증강이었습니다. 이제 이 항공기들에 대한 몇 가지 개선안이 제안되었습니다. 우리 기술진은 차세대 지원 항공기를 개발할 수 있습니다."
 EFR_fighter_focus:0 "전투기 중점"
 EFR_fighter_focus_desc:0 "일부 혁신적인 민간 공학 기술을 우리 전투기에 적용하여 속도, 항속거리, 최대 고도를 향상시킬 수 있습니다. 타국의 발전에 뒤처지지 않으려면 이에 집중해야 합니다."
 EFR_bomber_focus:0 "폭격기 중점"
 EFR_bomber_focus_desc:0 "항공 지원은 우리 방어 및 공격 능력의 중요한 부분입니다. 더 빠르고, 민첩하며, 정확한 폭격기 개발에 노력을 집중한다면 어떤 지상전에서도 우위를 유지할 수 있을 것입니다."
 EFR_heavy_fighter_focus:0 "중전투기 중점"
 EFR_heavy_fighter_focus_desc:0 "우리 중전투기는 더 취약한 폭격기를 지원할 수 있어야 합니다. 이를 위해서는 속도를 일부 희생하는 대신 더 강력한 무장과 더 긴 항속거리가 필요합니다."
 EFR_air_doctrine:0 "공군 교리"
 EFR_air_doctrine_desc:0 "우리는 더 빠른 속도로 새로운 공중전 이론을 시험할 충분한 경험을 쌓았습니다. 이를 통해 새로운 전술적, 전략적 가능성을 탐색할 수 있을 것입니다. 공중전은 현대전의 핵심입니다."
 EFR_heavy_bomber_focus:0 "중폭격기 중점"
 EFR_heavy_bomber_focus_desc:0 "현대 중폭격기는 소규모 공중 교전을 자체적으로 처리할 수 있도록 무장할 것입니다. 우리 기술진이 최신 기술 개발에 집중하도록 한다면 적의 생산 시설을 파괴할 더 나은 기회를 갖게 될 것입니다."
 EFR_naval_bomber_focus:0 "해군 폭격기 중점"
 EFR_naval_bomber_focus_desc:0 "함선은 항공기에 매우 취약하다는 것이 입증되었습니다. 어떠한 대응책보다 앞서 나가기 위해 우리는 기술을 계속해서 개선해야 합니다."
 ETH_research_slot:0 "연구 슬롯"
 ETH_research_slot_desc:0 "연구는 모든 전쟁에서 승리하기 위한 열쇠입니다!"
 ETH_imperial_road:0 "제국의 도로 건설"
 ETH_imperial_road_desc:0 "수도를 항구와 연결해야 합니다!"
 ETH_equipment_effortb:0 "대전쟁 이후 포병 발전"
 ETH_equipment_effortb_desc:0 "최근 포병 무기의 발전을 연구해야 합니다."
 ETH_equipment_effort_2b:0 "포병 투자"
 ETH_equipment_effort_2b_desc:0 "우수한 포병 여단으로 보병 사단을 현대화해야 합니다."
 ETH_equipment_effort_3b:0 "포병 투자 II"
 ETH_equipment_effort_3b_desc:0 "우수한 포병 여단으로 보병 사단을 현대화해야 합니다."
 ETH_red_sea:0 "홍해의 수호자"
 ETH_red_sea_desc:0 "적들에 맞서 홍해의 제해권을 장악하기 위해 강력한 해군을 건설해야 합니다"
 ETH_air_innovation:0 "Linea dell'Impero"
 ETH_air_innovation_desc:0 "하늘을 지배하지 않고는 현대전을 이길 수 없습니다. 공군을 발전시키기 위해 모든 힘을 쏟아야 합니다!"
 ETH_force_labor:0 "원주민 노동자"
 ETH_force_labor_desc:0 "산업을 활성화하기 위해, 원주민을 고용하여 무기 생산 공장에서 일하게 해야 합니다."
 ETH_force_labor2:0 "식민지 산업 확장"
 ETH_force_labor2_desc:0 "원주민 노동자를 활용하는 프로그램을 확장할 것입니다."
 ETH_puntland:0 "영국령 및 프랑스령 소말릴란드 영유권 주장"
 ETH_puntland_desc:0 ""
 ETH_sudan_north:0 "하르툼 영유권 주장"
 ETH_sudan_north_desc:0 ""
 ETH_sudan_south:0 "수단 영유권 주장"
 ETH_sudan_south_desc:0 ""
 ETH_kenya:0 "영국령 동아프리카 영유권 주장"
 ETH_kenya_desc:0 ""
 ETH_uganda:0 "우간다 영유권 주장"
 ETH_uganda_desc:0 ""
 ETH_tanganyika:0 "탕가니카 영유권 주장"
 ETH_tanganyika_desc:0 ""
 ETH_yemen:0 "영국령 예멘 영유권 주장"
 ETH_yemen_desc:0 ""
 ETH_equipment_effort:0 "소총 기술 따라잡기"
 ETH_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 병사들에게 가용 가능한 최고의 도구를 제공하는 데 집중할 것입니다."
 ETH_motorization_effort:0 "차량화 투자"
 ETH_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 이탈시키는 데 매우 중요합니다. 이러한 개발에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 ETH_doctrine_effort:0 "교리 연구"
 ETH_doctrine_effort_desc:0 "대전쟁의 지상전을 정의했던 군사 교리는 시대에 뒤떨어졌습니다. 우리는 최고의 두뇌들을 동원하여 미래의 군사 사상을 형성해야 합니다."
 ETH_equipment_effort_2:0 "현대화된 소총"
 ETH_equipment_effort_2_desc:0 "우리 보병이 당대 최고의 총기로 무장하도록 보장하기 위한 노력을 계속할 것입니다."
 ETH_mechanization_effort:0 "기계화 연구"
 ETH_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고하여, 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 ETH_doctrine_effort_2:0 "교리 연구 II"
 ETH_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 ETH_doctrine_effort_3:0 "교리 연구 III"
 ETH_doctrine_effort_3_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 ETH_equipment_effort_3:0 "실험용 소총"
 ETH_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 ETH_armor_effort:0 "기갑 연구"
 ETH_armor_effort_desc:0 "보병 기계화에서 얻은 교훈을 적용하여, 장갑 차량 또한 개선할 수 있습니다."
 ETH_special_forces:0 "특수부대"
 ETH_special_forces_desc:0 "우리는 정예 부대가 필요합니다. 산악 부대와 공수부대를 최우선으로 해야 합니다."
 ETH_aviation_effort:0 "항공 연구"
 ETH_aviation_effort_tt:0 "§Y공군 기지§를 지을 건설 슬롯이 부족합니다!"
 ETH_aviation_effort_desc:0 "공중전만큼 기술 발전이 빠른 곳은 없습니다. 항공은 모든 현대 국가가 숙달해야 하는 분야입니다."
 ETH_fighter_focus:0 "전투기 집중"
 ETH_fighter_focus_desc:0 "대전쟁에서 벌어진 공중전이 마지막이 아니었습니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 제공할 것입니다."
 ETH_bomber_focus:0 "폭격기 집중"
 ETH_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불비가 두드러지게 언급될 것입니다. 우리는 그 이야기가 적들의 입에서 나오도록 최선을 다할 것입니다."
 ETH_aviation_effort_2:0 "항공 연구 II"
 ETH_aviation_effort_2_desc:0 "항공 분야의 추가적인 발전은 우리 공군을 다른 군종과 잘 통합하는 데 필요할 것입니다."
 ETH_CAS_effort:0 "근접항공지원 연구"
 ETH_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중에서도 항공기의 지원이 필요합니다."
 ETH_rocket_effort:0 "로켓 연구"
 ETH_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 항공기 모두에게 전례 없는 속도를 제공합니다. 이러한 기술을 선도하면 적의 허를 찌를 수 있을 것입니다."
 ETH_NAV_effort:0 "해군 항공 연구"
 ETH_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서 벌어지듯이, 일부는 해상 상공에서 벌어집니다."
 ETH_naval_effort:0 "해군 연구"
 ETH_naval_effort_tt:0 "§Y해군 조선소§를 지을 건설 슬롯이 부족합니다!"
 ETH_naval_effort_desc:0 "해군 확장이 최우선 과제여야 합니다. 모든 가용 자원을 새로운 조선소와 경수상함 연구에 할당하십시오."
 ETH_industrial_effort:0 "산업 연구"
 ETH_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업 건설에 집중하여 대약진을 이룩합시다."
 ETH_industrial_effort_2:0 "산업 연구 II"
 ETH_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 우리는 또 다른 위대한 산업적 노력을 위해 인민을 동원할 수 있습니다."
 ETH_construction_effort:0 "에티오피아 전력 회사"
 ETH_construction_effort_tt:0 "§Y민간 공장§을 지을 건설 슬롯이 부족합니다!"
 ETH_construction_effort_desc:0 "우리는 에티오피아 내에 전력망을 구축해야 합니다."
 ETH_production_effort:0 "군수품 연구"
 ETH_production_effort_tt:0 "§Y군수 공장§을 지을 건설 슬롯이 부족합니다!"
 ETH_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 우리의 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 ETH_construction_effort_2:0 "에티오피아 시멘트 공장"
 ETH_construction_effort_2_desc:0 "공장과 군사 시설의 대량 건설을 촉진하기 위해 시멘트 생산은 필수적입니다."
 ETH_production_effort_2:0 "군수품 연구 II"
 ETH_production_effort_2_desc:0 "민간 공장을 군사 장비 생산에 맞게 개조하려는 시도는 비효율적입니다. 우리는 지금 군수 생산을 준비하는 데 집중해야 합니다."
 ETH_production_effort_3:0 "군수품 연구 III"
 ETH_production_effort_3_desc:0 "신규 장비 수요를 충족시키려면 군수 공장 확장 노력을 지속해야 합니다."
 ETH_infrastructure_effort:0 "기반시설 확충"
 ETH_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 발전된 사업이나 건설을 추진할 수 없습니다."
 ETH_infrastructure_effort_tt:0 "§Y기반시설§ 건설 슬롯이 부족합니다!"
 ETH_infrastructure_effort_2:0 "기반시설 확충 II"
 ETH_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 사업에 필요한 수송 및 통신이 가능해질 것입니다."
 ETH_construction_effort_3:0 "Trasporti Automobilistici (Citao)"
 ETH_construction_effort_3_desc:0 "이 땅을 쉽게 가로지를 수 있도록 정비 및 운송 산업을 발전시켜야 합니다."
 ETH_nuclear_effort:0 "핵 개발 노력"
 ETH_nuclear_effort_desc:0 "세상을 바꿀 발견의 문턱에 서 있는 지금, 언젠가 지구를 집어삼킬지도 모를 불을 다른 이들이 지피게 놔둘 수는 없습니다."
 ETH_extra_tech_slot:0 "추가 연구 슬롯"
 ETH_extra_tech_slot_desc:0 "산업 확장과 최근의 다른 발전 덕분에 더 많은 연구개발을 병렬로 수행할 수 있게 될 것입니다."
 ETH_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 ETH_extra_tech_slot_2_desc:0 "국가의 급속한 산업화는 우리가 추구해야 할 새로운 연구개발 기회를 열어주었습니다."
 ETH_technology_sharing:0 "기술 공유"
 ETH_technology_sharing_desc:0 "동맹국과 기술 발전을 공유함으로써, 우리 세력 전체가 전시 연구개발을 더 효율적으로 수행할 수 있게 될 것입니다."
 ETH_secret_weapons:0 "비밀 병기"
 ETH_secret_weapons_desc:0 "모든 추가 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구와 같은 완전히 새로운 과학 분야에 있습니다."
 ETH_political_effort:0 "정치적 노력"
 ETH_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리 자신의 국가에 변화를 가져올 수 있어야 합니다. 정치적 입지를 강화하는 것이 우선되어야 합니다."
 ETH_collectivist_ethos:0 "집단주의 정신"
 ETH_collectivist_ethos_desc:0 "적들이 약소국을 분열시켜 정복할지라도, 우리 인민은 단결하여 맞설 것입니다. 하나는 전체를 위하고, 전체는 하나를 위합니다."
 ETH_liberty_ethos:0 "자유주의 정신"
 ETH_liberty_ethos_desc:0 "인간 정신을 억압하려는 이념적 광신도들의 시대에, 우리는 개인의 자유와 권리를 수호할 것입니다."
 ETH_militarism:0 "군국주의"
 ETH_militarism_desc:0 "군대를 필요악으로 여기는 자들은 전쟁 앞에서 주저할 운명입니다. 우리는 군국주의를 우리 문화에 뿌리내려 군인의 민족이 될 것입니다."
 ETH_political_correctness:0 "정치적 올바름"
 ETH_political_correctness_desc:0 "다소 논란의 여지가 있거나 당혹스러운 의견을 가진 사람들은 자신들을 겨냥한 광범위한 음모가 있다고 우려하는 것 같습니다. 이거 아주 훌륭한 생각인 것 같습니다."
 ETH_neutrality_focus:0 "중립 중점"
 ETH_neutrality_focus_desc:0 "다른 이들은 세계적인 분쟁에서 편을 드는 데 용기와 지혜가 필요하다고 주장할지 모르지만, 우리는 거부하는 데 더 큰 것이 필요하다는 것을 압니다."
 ETH_interventionism_focus:0 "개입주의 중점"
 ETH_interventionism_focus_desc:0 "우리는 우리 시민뿐만 아니라 모든 인민의 자유를 소중히 여깁니다. 폭정을 막는 것이 전쟁을 의미한다면, 기꺼이 받아들이겠습니다."

 
 fin_army_effort_desc:0 "공중전과 해전의 가능성이 커지고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 준비를 통해 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 fin_equipment_effort:0 "장비 확충"
 fin_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 우리 군에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 fin_motorization_effort:0 "차량화 노력"
 fin_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 이탈시키는 데 매우 중요합니다. 이러한 발전에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 fin_doctrine_effort:0 "교리 연구"
 fin_doctrine_effort_desc:0 "대전쟁의 지상전을 정의했던 군사 교리는 구식이 되었습니다. 우리는 미래의 군사 사상을 형성하는 과업에 최고의 두뇌들을 투입해야 합니다."
 fin_equipment_effort_2:0 "장비 확충 II"
 fin_equipment_effort_2_desc:0 "우리는 보병과 지원 부대가 우리 시대 최고의 장비로 무장하도록 노력을 계속할 것입니다."
 fin_mechanization_effort:0 "기계화 노력"
 fin_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고함으로써, 우리는 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 fin_doctrine_effort_2:0 "교리 연구 II"
 fin_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 우리는 이를 반영하기 위해 지속적으로 교리를 재평가해야 합니다."
 fin_doctrine_effort_3:0 "교리 연구 III"
 fin_doctrine_effort_3_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 우리는 이를 반영하기 위해 지속적으로 교리를 재평가해야 합니다."
 fin_equipment_effort_3:0 "장비 확충 III"
 fin_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 삼아야 합니다."
 fin_armor_effort:0 "기갑 노력"
 fin_armor_effort_desc:0 "보병 기계화 과정에서 얻은 교훈을 적용하여, 기갑 차량 또한 개선할 수 있습니다."
