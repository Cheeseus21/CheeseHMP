 RAJ_escalate_incident_to_border_conflict_GOA:0 "고아 국경 전쟁 격화."
 
 south_asian_liberation:0 "남아시아 해방"
 south_asian_liberation_desc:0 "남아시아에 반란의 씨앗을 뿌리기 위해 우리는 억압받는 국가들에 군사 및 정치적 지원을 보내야 합니다.\n\n봉기에 관한 중점이 완료되면 어떠한 보복에도 맞서 방어할 수 있도록 정치적 지원과 무기가 보내질 것입니다.\n\n[RAJ.GetSalVariable]"
 raj_sal_variable:0 "[SRL.GetFlag] §Y스리랑카§!의 §R봉기§!용 무기: §Y[?SRL_arms]§!.\n[SRL.GetFlag] §Y랑카 사마 사마자당§!의 §R봉기§! 지지: §Y[?SRL_pol]§!.\n\n[NEP.GetFlag] §Y네팔§!의 §R봉기§!용 무기: §Y[?NEP_arms]§!.\n[NEP.GetFlag] §Y네팔 공산당§!의 §R봉기§! 지지: §Y[?NEP_pol]§!.\n\n[SRL.GetFlag] §Y부탄§!의 §R봉기§!용 무기: §Y[?BHU_arms]§!.\n[BHU.GetFlag] §Y부탄 공산당§!의 §R봉기§! 지지: §Y[?BHU_pol]§!."
