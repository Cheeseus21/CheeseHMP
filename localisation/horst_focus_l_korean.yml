 efr_industrial_effort:0 "산업 역량 강화"
 efr_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업 건설에 집중하여 대약진을 이룩합니다."
 efr_industrial_effort_2:0 "산업 역량 강화 II"
 efr_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로 국민을 동원하여 다시 한번 위대한 산업 역량 강화를 이룰 수 있습니다."
 efr_construction_effort:0 "건설 역량 강화"
 efr_construction_effort_tt:0 "§Y민간 공장§을 지을 건설 슬롯이 부족합니다!"
 efr_construction_effort_desc:0 "전 세계에 전쟁의 그림자가 드리울 때에도 민간 산업 역량을 과소평가해서는 안 됩니다."
 efr_construction_effort_2:0 "건설 역량 강화 II"
 efr_construction_effort_2_desc:0 "공장을 계속 확장하면 무역품 생산 속도를 높이고 추가적인 건설 노력을 기울일 수 있습니다."
 efr_construction_effort_3:0 "건설 역량 강화 III"
 efr_construction_effort_3_desc:0 "기반 시설망 확장으로 건설 역량이 크게 향상되었습니다."
 efr_production_effort:0 "군수 역량 강화"
 efr_production_effort_tt:0 "§Y군수 공장§을 지을 건설 슬롯이 부족합니다!"
 efr_production_effort_desc:0 "트랙터를 만들 수 있다면 전차도 만들 수 있습니다! 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 efr_production_effort_2:0 "군수 역량 강화 II"
 efr_production_effort_2_desc:0 "민간 공장을 개조하여 군사 장비를 생산하려는 시도는 비효율적입니다. 지금부터 군수 생산을 준비하는 데 집중해야 합니다."
 efr_production_effort_3:0 "군수 역량 강화 III"
 efr_production_effort_3_desc:0 "신규 장비 수요를 충족하려면 군수 공장을 확장하기 위한 지속적인 노력이 필요합니다."
 efr_infrastructure_effort:0 "기반 시설 역량 강화"
 efr_infrastructure_effort_desc:0 "기반 시설이 제대로 갖춰지지 않은 국가는 발전된 사업이나 건설을 추진할 수 없습니다."
 efr_infrastructure_effort_tt:0 "§Y기반시설§!을 건설할 건물 슬롯이 부족합니다!"
 efr_infrastructure_effort_2:0 "기반시설 확충 II"
 efr_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 작전에 필요한 수송 및 통신이 가능해질 것입니다."
 efr_political_effort:0 "정치적 노력"
 efr_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리 나라에 변화를 가져올 수 있어야 합니다. 우리의 정치적 입지를 강화하는 것이 우선되어야 합니다."
 order227_set:0 "명령 제227호가 자동으로 발령되었습니다"
 SOV_southern_thrust_tt:0 "영연방 사단과 협력하여 신속한 페르시아 침공을 조율할 것입니다. 이를 통해 페르시아는 소련과 영국의 영향권으로 분할될 것입니다.  \n \n"

 the_plan_tt:0 "§R참고: 바닐라 중점은 미국/영국제가 아닌 캐나다제 항공기에만 적용됩니다§!"
 
 efr_army_effort:0 "육군 강화"
 efr_army_effort_desc:0 "공중전과 해전의 가능성이 커지고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 준비를 통해 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 efr_equipment_effort:0 "장비 확충"
 efr_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 계속해서 확장되고 있습니다. 우리는 병력에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 efr_motorization_effort:0 "차량화 노력"
 efr_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 이탈시키는 데 매우 중요합니다. 이러한 개발에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 efr_doctrine_effort:0 "교리 연구"
 efr_doctrine_effort_desc:0 "대전쟁의 지상전을 정의했던 군사 교리는 시대에 뒤떨어졌습니다. 우리는 최고의 두뇌들을 동원하여 미래의 군사 사상을 형성해야 합니다."
 efr_equipment_effort_2:0 "장비 확충 II"
 efr_equipment_effort_2_desc:0 "우리는 보병과 지원 부대가 당대 최고의 장비로 무장할 수 있도록 계속 노력할 것입니다."
 efr_mechanization_effort:0 "기계화 노력"
 efr_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고함으로써, 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 efr_doctrine_effort_2:0 "교리 연구 II"
 efr_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서도 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 efr_equipment_effort_3:0 "장비 확충 III"
 efr_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 efr_armor_effort:0 "기갑 강화"
 efr_armor_effort_desc:0 "보병 기계화에서 얻은 교훈을 적용하여, 우리의 기갑 차량 또한 개선할 수 있습니다."
 efr_special_forces:0 "특수부대"
 efr_special_forces_desc:0 "우리는 정예 부대가 필요합니다. 산악병과 공수부대가 우리의 우선순위가 되어야 합니다."
 efr_aviation_effort:0 "항공력 증강"
 efr_aviation_effort_tt:0 "§Y공군 기지§!를 건설할 건물 슬롯이 부족합니다!"
 
 SOV_cold_snap:0 "1941-1942년의 겨울"
 SOV_cold_snap_idea:0 "동장군"
 SOV_cold_snap_desc:0 "1941-1942년의 겨울은 소련군과 독일군 양측에 혹독한 영향을 미쳤습니다. 양측 모두 제대로 대비하지 못했지만, 특히 독일군에게는 그 정도가 훨씬 심했습니다."
 SOV_winter_equipment_1:0 "동계 장비"
 SOV_wartime_industry:0 "전시 산업"
 SOV_wartime_industry_idea:0 "전시 산업"
 SOV_partisans:0 "스탈린의 게릴라"
 SOV_partisans_desc:0 "독일 보병과 전차의 급류 사이, 적진 후방에는 진정한 소련의 애국자들이 흩어져 있습니다. 이 파르티잔들은 후방에서 공격하여 파시스트 전쟁 기계에 대혼란을 일으킵니다."
 SOV_partisans_idea:0 "소련 파르티잔 봉기"
 SOV_partisans_idea_desc:0 "철도가 파괴되고, 다리가 폭파되며, 보병이 볼셰비키 테러리스트들에게 괴롭힘을 당하고 있습니다."
 SOV_partisans_idea2:0 "보안 사단"
 SOV_partisans_idea2_desc:0 "우리의 보안 사단은 대반란 작전에 특화된 훈련을 받아 파르티잔 활동을 억제합니다."
 GER_volunteers_tt:0 "§R\n전쟁 피로도가 0.5%만큼 증가할 것입니다§!"
 GER_sd:0 "보안 사단"
 GER_sd_desc:0 "소련 파르티잔 활동이 예상보다 훨씬 더 격렬한 것으로 드러났습니다"
 SOV_tankograd:0 "탄코그라드"
 SOV_tankograd_idea:0 "탄코그라드"
 SOV_strafbat:0 "슈트라프바트"
 SOV_strafbat_desc:0 "겁쟁이들은 붉은 군대에서 최악의 전선 임무를 맡게 됩니다."
 SOV_strafbat_idea:0 "슈트라프바트"
 tech_military_police_sov:0 "슈트라프바트"
 GER_totaler_krieg:0 "총력전 선포"
 GER_totaler_krieg_idea:0 "토탈러 크리크"
 GER_totaler_krieg_idea2:0 "토탈러 크리크 - 퀴르체스터 크리크!"
 GER_amerikabomber:0 "아메리카봄버"
 GER_amerikabomber_desc:0 "미국의 산업 중심지를 폭격하여 미국의 민간 및 군사 산업을 내륙으로 돌리게 함으로써, 영국을 고립시켜 제2의 공중전을 준비할 수 있습니다."
 GER_maus:0 "포르셰와 계약"
 GER_maus_designer:0 "마우스 계획"
 GER_maus_designer_desc:0 "동계 전차"
 GER_maus_desc:0 "페르디난트 포르셰와 계약하여 그의 초중전차 설계안인 8호 전차 마우스를 제작할 것입니다."
 GER_e100:0 "헨셸과 계약"
 GER_e100_designer:0 "E-100 계획"
 GER_e100_desc:0 "헨셸과 계약하여 그들의 초중전차 설계안인 E-100 전차를 제작할 것입니다."
 GER_lowe:0 "크루프와 계약"
 GER_lowe_designer:0 "뢰베 계획"
 GER_lowe_desc:0 "크루프와 계약하여 그들의 초중전차 설계안인 7호 전차 뢰베를 제작할 것입니다."
 GER_project_riese:0 "리제 계획"
 GER_project_riese_desc:0 "영국 폭격기를 피해 지하에 안전하게 새로운 정유소와 군수공장을 건설해야 합니다."
 GER_strafbat:0 "형벌 부대 편성"
 GER_strafbat_desc:0 "전쟁으로 인한 막대한 인력 수요가 귀중한 군수품 생산을 위협하고 있습니다. 죄수, 전쟁 포로, 불복종 병사들로 슈트라프바탈리온을 편성하여 이를 지연시킬 수 있습니다. 이 부대들은 위험한 육체노동을 위한 최전선 건설 대대로도 활용될 수 있습니다."
 GER_strafbat_idea:0 "슈트라프바탈리온"
 ITA_balkan_war_goal:0 "발칸반도 지배"
 ITA_balkan_war_goal_desc:0 "발칸반도를 포함하지 않는다면 우리가 복원하는 로마 제국은 대체 무엇입니까? 쉬운 목표가 될 것입니다..."
 ITA_defense_italia:0 "포르테차 이탈리아"
 GER_volunteers:0 "외국인 의용병 및 징집병"
 GER_volunteers_desc:0 "하인리히 힘러가 정복지 출신의 외국인 의용병과 징집병으로 비독일인 준군사 부대를 창설하는 것에 대해 접근해왔습니다. 이 이론상의 사단들은 그의 지휘 하에, 육군의 통제를 벗어나게 될 것이며, 이는 거의 확실하게 독일 고위 장성들을 화나게 할 것입니다. 그럼에도 불구하고, 독일은 더 많은 병력이 필요합니다."
 GER_volunteers_idea:0 "외국인 의용병 및 징집병"
 GER_totaler_krieg_idea2_desc:0 "§R독일 병사들은 승리를 위해 집결했지만, 전쟁이 너무 길어지고 국가의 안정도나 전쟁 지지도가 너무 낮아지면(<50%) 주도권을 잃게 될 것입니다!§!"
 GER_speers_miracle_idea:0 "군비의 기적"
 GER_speers_miracle_idea_desc:0 ""
