 RAJ_nep_gurkhas:0 "§H8§!개 산악 사단이 §H카트만두§!에서 우리 지휘 하에 징집될 것입니다."
 RAJ_viceroy:0 "인도 총독부"
 RAJ_viceroy_desc:0 "인도 총독은 국왕의 대리인이며 국왕을 대신하여 결정을 내릴 모든 권한을 가집니다. '인도 총독'이라고도 불리는 이 직위는 인도 국민회의의 급진파에 의해 의문이 제기되었습니다."
 RAJ_guided_by_britain:0 "영연방 유대 강화"
 RAJ_guided_by_britain_desc:0 "영국 왕실에 대한 충성과 긴밀한 관계를 유지함으로써 우리는 영국령 인도를 더 나은 미래로 이끌 수 있습니다."
 RAJ_ban_the_quit_india_movement:0 "인도를 떠나라 운동 금지"
 RAJ_ban_the_quit_india_movement_desc:0 "인도 독립을 위한 간디의 운동은 영국인에게 인도를 떠나라는 요구와 함께 절정에 달했습니다. 제국에 반하는 이러한 요구는 용납될 수 없습니다!"
 RAJ_the_x_force:0 "X 부대"
 RAJ_the_x_force_desc:0 "버마 인근의 정규 중국군은 우리 영토로 후퇴할 기회가 있습니다. 만약 우리가 그들을 받아들인다면, 그들은 우리 야전 사령관의 지휘 하에 들어올 것입니다."
 RAJ_nepalese_gurkhas:0 "네팔 구르카"
 RAJ_nepalese_gurkhas_desc:0 "일본의 위협이 더욱 커짐에 따라, 네팔 왕국에 지원을 요청하는 것을 고려해야 합니다."
