 ALLIES_marines_eng:0 "§H8개§! §R정예§! 해병 사단이 §H런던§!에서 우리 지휘 하에 편성될 것입니다."
 ALLIES_marines_usa:0 "§H8개§! §R정예§! 해병 사단이 §H워싱턴§!에서 우리 지휘 하에 편성될 것입니다."
 ALLIES_seamen_eng:0 "망명 함대가 §H도버§!에서 우리 지휘 하에 편성될 것입니다."
 ALLIES_seamen_usa:0 "망명 함대가 §H워싱턴§!에서 우리 지휘 하에 편성될 것입니다."
 ALLIES_commonwealth_of_nations:0 "[ENG.GetFactionName]"
 ALLIES_commonwealth_of_nations_desc:0 "[ENG.GetFactionName]은 단결할 것입니다!"
 ALLIES_joint_training_program:0 "합동 훈련 프로그램"
 ALLIES_joint_training_program_desc:0 "합동으로 실시하는 워게임과 훈련을 통해 우리의 군사 기술을 연마할 수 있습니다."
 ALLIES_continue_the_fight:0 "항전 지속"
 ALLIES_continue_the_fight_desc:0 "우리는 해변에서 싸울 것입니다. 우리는 상륙지에서 싸울 것입니다. 우리는 들과 거리에서 싸울 것입니다. 우리는 언덕에서 싸울 것입니다. 우리는 결코 항복하지 않을 것입니다!"
 ALLIES_continue_the_fight_navy:0 "자유 [ROOT.GetAdjective] 해군"
 ALLIES_continue_the_fight_navy_desc:0 "망명 국가로서, 우리는 [ENG.GetFactionName]이 추축국에 맞서 싸우는 것을 돕기 위해 함대를 창설하고 유지하는 데 노력을 집중할 것입니다."
 ALLIES_continue_the_fight_navy_seamen:0 "건장한 선원 모집"
 ALLIES_continue_the_fight_navy_seamen_desc:0 "우리는 연합군 항구에 기반을 둔 작은 함대를 긁어모을 것입니다."
 ALLIES_continue_the_fight_navy_convoy:0 "자유의 수송선"
 ALLIES_continue_the_fight_navy_convoy_desc:0 "수송선 생산은 전쟁 수행에 필수적입니다. 이는 우리가 쉽게 도울 수 있는 부분입니다."
 ALLIES_continue_the_fight_navy_marine:0 "자유 [ROOT.GetAdjective] 해병대"
 ALLIES_continue_the_fight_navy_marine_desc:0 "우리는 우리 해군에 소속될 해병 보병 부대를 창설할 것입니다."
 ALLIES_continue_the_fight_army:0 "자유 [ROOT.GetAdjective] 군"
 ALLIES_continue_the_fight_army_desc:0 "우리의 항복으로 싸움이 끝나는 것이 아닙니다 - 그것은 단지 이 전쟁의 새로운 장의 시작일 뿐입니다!"
 ALLIES_continue_the_fight_army_spawn:0 "망명 베테랑 동원"
 ALLIES_continue_the_fight_army_spawn_desc:0 "[Root.GetName]의 함락을 피해 탈출한 모든 [ROOT.GetAdjective]인들은 하나의 군대로 결집될 것입니다."
 ALLIES_continue_the_fight_army_sabotage:0 "점령된 공장 파괴 공작"
 ALLIES_continue_the_fight_army_sabotage_desc:0 "저항군 요원들은 우리가 남기고 온 산업 시설을 파괴하여 적의 전쟁 수행을 방해할 것입니다."
 ALLIES_continue_the_fight_army_volunteers:0 "지원병 모집"
 ALLIES_continue_the_fight_army_volunteers_desc:0 "우리는 국외 거주자들을 찾아내 우리 군에 입대시킬 것입니다."
 ALLIES_eng_patron:0 "영국의 전문 지식 탐색"
 ALLIES_eng_patron_desc:0 "우리는 사막전과 군사 계획에 대한 영국의 전문 지식을 구하고, 영국의 산업 설계도 연구할 것입니다."
 ALLIES_usa_patron:0 "미국으로부터 배우기"

 ALLIES_usa_patron_desc:0 "우리는 정글전과 군사 계획에 대한 미국의 경험을 배우고, 미국의 산업 설계도 연구할 것입니다."
 ALLIES_usa_dock:0 "상륙전"
 ALLIES_usa_dock_desc:0 "우리는 상륙 침공을 계획하고 개시하는 방법을 연구할 것입니다."
 ALLIES_eng_operations:0 "대전쟁의 교훈"
 ALLIES_eng_operations_desc:0 "우리는 대전쟁 당시 영국의 군사 계획을 연구할 것입니다."
 ALLIES_eng_spec:0 "사막 전술"
 ALLIES_eng_spec_desc:0 "우리는 사막에서 싸우는 방법을 배울 것입니다."
 ALLIES_usa_spec:0 "레인저 전술"
 ALLIES_usa_spec_desc:0 "우리는 정글에서 싸우는 방법을 배울 것입니다."
 desert_tactics_allies_effect:0 "§H사막 훈련§! 활성화\n§H전차, 장갑차, 보병\n    사막 및 혹독한 사막§!\n방어: §G+10%§!"
 jungle_tactics_allies_effect:0 "§H레인저 훈련§! 활성화\n§H전차, 장갑차, 보병\n    정글 및 숲§!\n      공격: §G+5%§!"

 GER_luftwaffe_expansion:0 "루프트바페 확장"
 GER_luftwaffe_expansion_desc:0 "제공권을 장악하지 않고는 현대전에서 승리할 수 없습니다. 우리는 공군을 발전시키기 위해 모든 힘을 쏟아야 합니다!\""
 GER_air_shield:0 "플라크탑"
 GER_air_shield_desc:0 "플라크탑은 플라크 대공포를 탑재한 거대한 콘크리트 탑입니다."
 GER_trust_in_the_luftwaffe:0 "루프트바페에 대한 신뢰"
 GER_trust_in_the_luftwaffe_desc:0 "우리의 용감한 에이스와 전문 정비팀은 추가 지원을 받고 연구 대기업과의 협력을 증진하여, 우리의 전술과 장비가 최신 상태를 유지하도록 할 것입니다. 우리는 괴링의 루프트바페에 전적인 신뢰를 보낼 것입니다."
 GER_volkssturmm:0 "국민돌격대 사단 창설"
 GER_volkssturmm_desc:0 "총동원령으로 국민 의용군을 창설하면 소련과 연합국에 맞선 전쟁의 흐름을 바꿀 수 있을 것입니다."
 GER_ss_focus:0 "친위대"
 GER_prepare:0 "불가피한 사태에 대비하라"
 GER_jag:0 "총력전!"
 GER_riga:0 "프스코프 전투"
 GER_riga_desc:0 "북쪽에서 공격을 개시함으로써 우리는 소련을 발트해로부터 차단하고 레닌그라드 공격로를 열 수 있을 것입니다 "
 GER_kiev_desc:0 "남쪽에서 공세를 개시함으로써, 우리는 흑해의 주요 해군 기지와 돈바스의 주요 산업 지대를 점령할 수 있을 것이며, 이는 소련의 군사 경제를 약화시킬 것입니다"
 GER_kiev:0 "키예프 전투"
 GER_vitebsk:0 "스몰렌스크 전투"
 GER_vitebsk_desc:0 "모스크바를 공격함으로써 우리는 소련군의 사기를 꺾고, 이곳을 기점으로 북쪽이나 남쪽으로 공세를 확장할 수 있을 것입니다."
 GER_prepare_desc:0 "나는 오랫동안 서쪽에서 시작할지 동쪽에서 시작할지 고심했다. 하지만 나는 베어마흐트가 공격하지 않도록 창설한 것이 아니다. 내 안에는 항상 전쟁에 대한 내적인 준비가 되어 있었다. "
 GER_ss_focus_desc:0 "친위대, 즉 'SS'는 아돌프 히틀러와 나치당에 직접 복무하는 준군사조직입니다. 나치당 회의의 단순한 경호 분견대로 시작했던 것이 하인리히 힘러의 지휘 아래 히틀러의 전체주의 정권을 위한 강력하고 두려운 도구로 성장했습니다."
 GER_winter:0 "§B겨울§! 1941-42"
 GER_winter_desc:0 "혹독한 서리와 동계 피복 부족으로 인해 우리 병사들은 막대한 손실을 입고 있으며, 이는 작전 진행에 영향을 미치고 있습니다."
 GER_continuetheoffence:0 "공세 계속!"
 GER_continuetheoffence_desc:0 "보급품을 보충하면, 다시 공세 작전을 수행할 수 있을 것입니다."
 GER_halttheoffence:0 "공세 중지!"
 GER_halttheoffence_desc:0 "공세를 중지함으로써 우리는 보급품을 보충하고 병사들에게 휴식을 주어 다시 공격할 수 있습니다."
 GER_entrenching:0 "제대식 방어"
 GER_entrenching_desc:0 "방어 시설을 건설하고 제대식 방어를 수행함으로써, 우리는 적이 후방으로 돌파하는 것을 허용하지 않을 것입니다"
 GER_typhoon_desc:0 "우리는 다시 모스크바로 돌파를 시도할 것이며, 이번에는 더 준비된 상태일 것입니다"
 GER_typhoon:0 "§W태풍§! 작전"
 GER_fallblau:0 "§R청색§! 작전"
 GER_Leningrad:0 "북극광 작전"
 GER_Leningrad_desc:0 "레닌그라드를 점령함으로써 우리는 다른 공세 작전을 위해 수십만 명의 병력을 확보할 수 있습니다."
 GER_Moscow:0 "모스크바 점령"
 GER_Moscow_desc:0 ""
 GER_appointottoskorzeny:0 "오토 스코르체니"
 GER_appointottoskorzeny_desc:0 ""
 GER_Stalingrad:0 "왜가리 작전"
 GER_Stalingrad_desc:0 "우리는 볼가강 남부 유역을 확보해야 합니다."
 GER_fallblau_desc:0 "본 작전의 공세는 돈강 하류를 타격하는 부대가, 타간로크, 아르테몹스크, 돈강 하류, 그리고 보로실로프그라드에서 도네츠강을 건너 동쪽으로 진격하는 부대와 스탈린그라드 지역에서 합류하도록 조직되어야 합니다. 이후 이 부대들은 스탈린그라드로 진격하는 기갑군과 연결되어야 합니다."
 GER_citadel:0 "치타델 §R작전§!"
 GER_citadel_desc:0 "남쪽으로 방향을 전환하여 남하하는 기동은 한 개 이상의 사단으로 수행되어야 합니다. 북동쪽(프로호롭카 방면 - Z.V.)으로의 공세는 지금은 가능하지만, 적이 이 지역(프로호롭카 지역 - Z.V.)에 새로운 기갑 부대를 집결시켰으므로 나중에는 불가능할 것입니다. 만약 Z 기갑 부대의 공격이 성공하지 못할 경우, 방어 태세로 전환해야 하며 우익의 부대(제4기갑사단 - ZV)나 오보얀 북쪽의 부대를 서쪽 방향의 공세를 전개하는 데 사용할 수 있습니다."
 GER_france_gg:0 "§g프랑스 함락§!"
 GER_france_gg_desc:0 "프랑스가 함락된 후, 우리는 병력을 국민돌격대 및 SS 대대 편성에 투입할 수 있습니다."
 GER_deployhitlerjugend:0 "히틀러유겐트 징집"
 GER_deployhitlerjugend_desc:0 "히틀러유겐트를 징집하여 부족한 사단을 새로운 인력으로 보충할 수 있습니다."
 GER_ardennesoffensive:0 "아르덴 공세"
 GER_ardennesoffensive_desc:0 "아르덴에서 연합군을 격파한 후, 우리는 그들을 바다로 밀어내고 동부 전선에 집중할 수 있습니다."
