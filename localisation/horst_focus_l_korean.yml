 ilp_bhu_uprising:0 "§Y부탄 공산당§!이 [BHU.GetLeader]를 축출하고 §Y공산주의§! 정부를 수립할 것입니다."
 ilp_srl_uprising:0 "§Y랑카 사마 사마자당§!이 실론 식민 정부에 대항하여 봉기하고 §Y대영제국주의§!의 분노에 저항할 것입니다!"
 ilp_nep_uprising:0 "§Y네팔 공산당§!이 라나 왕조를 전복하고 §Y사회주의§!를 도입할 것입니다."
 
 RAJ_eastern_forts:0 "버마의 방어가 용이한 동부 위치에 §Y2개 육상 요새§!를 건설합니다."
 raj_push_even_further:0 "더욱 밀어붙이기"
 raj_push_even_further_desc:0 "시민권은 아무리 보장해도 충분하지 않습니다. 우리는 과거 인도가 저지른 모든 잘못이 바로잡히도록 해야 하며, 그래야 우리 사회가 안심하고 잠들 수 있습니다."
