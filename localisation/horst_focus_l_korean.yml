 JAP_harsh_condition_army_training:0 "혹한지 군사 훈련"
 JAP_harsh_condition_army_training_EXPL1:0 "무작위 장군 §H2§!명에게 §H동계 전문가§! 특성을 추가합니다.\n"
 JAP_harsh_condition_army_training_EXPL2:0 "   당신의 §H보병 장비§!를 사용하여 장군들을 훈련시키고, §G1§!의 추가 보급 기술과 §H동계 전문가§! 특성을 부여합니다.\n"
