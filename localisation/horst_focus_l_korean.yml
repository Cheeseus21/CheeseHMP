 USA_station_in_pearl_harbor_desc:0 "피자-초밥 추축국을 조심하십시오."
 USA_station_in_pearl_harbor_tt:0 "§Y진주만§!에서 우리의 §Y초기 구형 함선들§!을 개장하기 시작할 것입니다. \n\n최대 §Y\n항공모함 3척 \n전함 15척§!까지 개장할 수 있습니다. \n\n하지만 우리 제독들은 함대가 §Y기습 공격에 취약§!해질 것을 우려합니다! \n\n(함선들은 개장을 위해 하와이에 머물러야 하며, 언급된 숫자보다 더 많이 배치하지 마십시오.) \n\n(일부 전함은 격침되더라도 인양될 수 있지만, 개장에는 평소보다 더 오랜 시간이 걸릴 것입니다.)"
 
