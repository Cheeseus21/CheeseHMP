 AIML_UP_COALITION:0 "연합당은 전인도 무슬림 연맹과 연정을 맺었습니다."
 aiml_up_coalition_news:0 "그들은 논란의 여지가 있는 전인도 무슬림 연맹과 동맹을 맺어 독립 파키스탄으로 가는 길을 열었기 때문에, 무슬림이 다수인 주에서의 지지는 대단히 압도적이었습니다."
 aiml_up_fight_news:0 "그들은 무슬림을 위한 별도의 국가를 제안하고 이 아이디어로 많은 표와 관심을 끈, 널리 인기 있는 전인도 무슬림 연맹에 맞서 용감하게 싸웠습니다."
 aiml_up_neutral_news:0 "그들은 각 주에서 소수 집단에게 가장 폭넓은 지지를 받는 정당으로 부상했으며, 어쩌면, 어쩌면 마침내 이 오랫동안 분열된 아대륙에 평화가 찾아올지도 모릅니다."
 
 ifyouseethisreportitasabug:0 "\n\n이 메시지가 보인다면 디스코드에 버그로 제보해 주십시오. 가능하다면 세이브 파일도 함께 첨부해 주십시오."
 
