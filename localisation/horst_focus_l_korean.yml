 SOV_partisans:0 "스탈린의 유격대"
 SOV_partisans_desc:0 "독일 보병과 전차의 물결 사이, 적진 후방에는 진정한 소비에트 애국자들이 흩어져 있습니다. 이 파르티잔들은 후방을 공격하여 파시스트 전쟁 기계에 대혼란을 야기합니다."
 SOV_partisans_idea:0 "소비에트 파르티잔 봉기"
 SOV_partisans_idea_desc:0 "볼셰비키 테러리스트들에 의해 철도가 파괴되고, 교량이 폭파되고, 보병이 괴롭힘을 당하고 있습니다."
 SOV_partisans_idea2:0 "지허룽스디비지오넨"
 SOV_partisans_idea2_desc:0 "우리 보안 사단은 대분란전 작전에 특화된 훈련을 받아 파르티잔 활동을 억제합니다."
 GER_volunteers_tt:0 "§R\n전쟁 피로도가 0.5%만큼 증가합니다§!"
 GER_sd:0 "보안 사단"
