  SIA_socialist_secret_police:0 "사회주의 비밀경찰"
  SIA_army_opposition:0 "군부의 반대"
  SIA_capitalist_resistance:0 "자본가의 저항"
  SIA_anti_fascism:0 "반파시즘"
