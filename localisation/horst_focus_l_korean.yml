 AIML_UP_COALITION:0 "연합당이 전인도 무슬림 연맹과 연정을 맺었습니다."
 aiml_up_coalition_news:0 "그들은 논란의 여지가 있는 전인도 무슬림 연맹과 동맹을 맺어 무슬림이 다수인 주에서 압도적인 지지를 얻었으며, 이는 독립 파키스탄의 길을 열었습니다."
 aiml_up_fight_news:0 "그들은 무슬림을 위한 분리 국가를 제안하여 많은 표와 관심을 끌었던, 널리 지지받는 전인도 무슬림 연맹에 맞서 용감히 싸웠습니다."
 aiml_up_neutral_news:0 "그들은 각 주에서 소수 집단에게 가장 폭넓은 지지를 받는 정당으로 부상했습니다. 그래서 어쩌면, 정말 어쩌면 오랫동안 분열되었던 이 아대륙이 마침내 평화를 맞이할지도 모릅니다."
 
 ifyouseethisreportitasabug:0 "\n\n이 메시지가 보인다면, 가급적 저장 파일과 함께 디스코드에 버그로 보고해 주십시오."
 
 INC_victory:0 "§Y인도 국민회의§!가 선거에서 승리했습니다"
 UP_victory:0 "§Y연합당§!이 선거에서 승리했습니다"
 ILP_victory:0 "§Y독립노동당§!이 선거에서 승리했습니다"
 
 inc_support:0 "우리는 인도 국민회의를 지지했습니다"
 upa_support:0 "우리는 연합당을 지지했습니다"
 ifb_support:0 "우리는 독립노동당을 지지했습니다"
 
 raj_influencing_country:0 "현재 한 국가의 정치에 영향력을 행사하는 중입니다"
 
 r56_raj.1.t:0 "린리스고 경의 임명"
 r56_raj.1.d:0 "제22대 인도 총독 겸 부왕인 프리먼 프리먼토머스 윌링던이 새로 임명된 빅터 호프 린리스고로 교체되었으며, 그는 곧 제23대 인도 총독으로 취임할 것입니다. 동시대인들은 그를 유능하고 야심찬 정치가로 평했으며, 그의 정치적 열정은 초대 호주 총독이었던 아버지에게서 물려받은 것입니다. 전 세계는 그의 총독 임기가 인도 아대륙에 어떤 영향을 미칠지 주목하고 있습니다."
 r56_raj.1.a:0 "알겠습니다."
 
 r56_raj.2.t:0 "총독의 마지막 시간들"
 r56_raj.2.desc:0 "지난 5년은 총독에게 고된 시간이었습니다. 시민 소요가 끊이지 않았으나, 윌링던 경은 봄베이 총독 시절 이러한 운동을 다룬 풍부한 경험으로 이에 익숙했습니다. 상부의 명령은 협력을 목표로 했지만, 이는 인도 자치령의 법적 틀 내에서 활동하는 이들에게만 한정되었습니다. 이 임무에 따라 그는 대대적인 투옥을 감행했고, 이는 오늘날까지 그의 인기에 걸림돌이 되고 있습니다. 그럼에도 그는 인도인들의 생각과 무관하게 인도에서의 시간을 순전히 긍정적으로 회고했습니다. 하지만 이전 모든 총독의 통치가 막을 내렸듯, 그의 통치도 끝나야 합니다."
 r56_raj.2.a:0 "후임자에게 행운을 빌어주게, 분명 필요할 테니."
 
 r56_raj.3.t:0 "아치볼드 웨이벌의 임명"
 r56_raj.3.d:0 "린리스고 경이 총독으로 임명되었을 때 맡은 임무는 결코 쉽지 않았습니다. 대중의 불만은 꾸준히 커져갔고, 1937년 지방 선거로 귀결된 몇 가지 정치적 양보로 잠시 억제할 수 있었을 뿐입니다. 인도인의 높은 참여율에 따라 가장 유능한 정치인 다수가 내각에 초청되어, 역사상 처음으로 영국 관리의 수를 능가했습니다. 하지만 윌링던 경의 통치가 끝나야 했듯이, 린리스고의 통치도 끝나야 합니다."
 r56_raj.3.a:0 "새로운 주인을 맞이하라..."
 
 r56_raj.4.t:0 "루이 마운트배튼의 임명"
 r56_raj.4.d:0 "웨이벌의 노력은 대부분의 인도 정치인들에게 고귀한 것으로 여겨졌으나, 런던에 의해 억제되었습니다. 델리의 총독 관저에 도착한 직후 그는 벵골의 식량 공급을 다소 완화하기 위해 노력했습니다. 그는 또한 저명한 인도 정치 지도자들과 자치를 논의한 최초의 총독이었지만, 많은 이들을 실망스럽게도 이러한 노력은 어떤 대가를 치르더라도 인도를 지키고자 하는 런던에 의해 훼손되었습니다."
 r56_raj.4.i:0 "웨이벌의 노력은 대부분의 인도 정치인들에게 고귀한 것으로 여겨졌으나, 런던에 의해 억제되었습니다. 델리의 전 총독 관저에 도착한 직후 그는 벵골의 식량 공급을 다소 완화하기 위해 노력했습니다. 그는 인도 정부에 매우 협조적이면서도 런던에 있는 군주의 충성스러운 대표자였습니다. 물론, 제국만큼이나 오래된 이야기처럼, 그는 루이 마운트배튼으로 교체될 것입니다."
 r56_raj.4.a:0 "...이전 주인과 다를 바 없군"
 
 r56_raj.101.t:0 "지방 선거 종료"
 r56_raj.101.desc:0 "총독이 꽤 오랫동안 두려워하던 날이 왔습니다. 제국 입법 위원회가 재편성되고 새로 선출된 대표 및 야당 의원들이 이제 우리 입법부를 장악하여, 이 회의장에서 우리의 의지를 관철시키기가 더 어려워졌습니다."
 r56_raj.101.a:0 "인도의 새로운 새벽."
 
 r56_raj.102.t:0 "철도 확장법 통과"
 r56_raj.102.d:0 "델리 정부 청사에서 몇 달간의 지루한 토론 끝에, 총독은 아대륙 전체에 걸쳐 영광스럽고, 현대적이며, 효율적인 철도를 건설하기 위해 막대한 자금이 할당될 것이라고 자랑스럽게 발표합니다."
 r56_raj.102.a:0 "당장 기차표를 예매해야겠군!"
 
 r56_raj.103.t:0 "철도 확장법 부결"
 r56_raj.103.d:0 "총독은 이 빌어먹을 법안을 통과시키기 위해 길고 힘들게 싸웠지만, 아아, 제국 입법 위원회에서 지지를 확보하지 못했습니다. 그는 마지못해 법안의 실패를 인정하는 연설을 할 것으로 예상됩니다."
 r56_raj.103.a:0 "표를 사려면 좀 더 기다려야겠군."
 
 r56_raj.104.t:0 "농업 안정화법 통과"
 r56_raj.104.d:0 "이 법은 인도의 잦은 기근에 종지부를 찍는 것으로 칭송받았으며, 총독은 그 장점을 확실히 강조했습니다. 이 때문에 힌두교 및 이슬람교 입법자들의 지지는 압도적이었고, 법안은 꽤 쉽게 통과되었습니다."
 r56_raj.104.a:0 "인도가 안도의 한숨을 내쉰다."
 
 r56_raj.105.t:0 "농업 안정화법 부결"
 r56_raj.105.d:0 "이 법안은 기근을 막기 위한 혁명적인 조치로 여겨졌고 대부분의 인도인들을 실망시켰지만, 제국 입법부에서 법으로 통과될 만큼 충분한 지지를 얻는 데 실패했습니다.\n가뭄 예방 개선을 위해 이미 수립된 계획들은 이제 폐기되었습니다."
 r56_raj.105.a:0 "안타까운 상황입니다."
 
 r56_raj.106.t:0 "교육 개혁법 가결"
 r56_raj.106.d:0 "인도의 가장 총명하고 재능 있는 인재들은 최고의 교육을 받기 위해 고국을 등지고 오랫동안 브리튼 제도로 이주해 왔습니다. 총독은 지식인들이 진정으로 번성할 수 있는 사회를 건설하는 것의 중요성을 오랫동안 강조해 왔으며, 우리 학교 및 대학 시스템의 개혁은 그 목표를 향한 논리적인 첫걸음입니다."
 r56_raj.106.a:0 "우리 앞에 빛나는 미래가 펼쳐져 있습니다."
 
 r56_raj.107.t:0 "교육 개혁법 부결"
 r56_raj.107.d:0 "그토록 많은 것을 약속했던 교육 개혁법이 왜 그토록 가슴 아프게 부결되었는지는 분명하지 않습니다. 하지만 한 가지는 분명합니다. 교육 문제에 관해 총독의 손발이 묶일 것이라는 점입니다. 인도는 어땠을지 궁금해하고 있습니다."
 r56_raj.107.a:0 "그럼 런던으로 가야겠군요."
 
 r56_raj.108.t:0 "보험법 가결"
 r56_raj.108.d:0 "인도는 종종 다른 많은 농업 중심의 저개발 경제와 비교되곤 합니다. 이는 주로 도시화와 산업화에 대한 미미한 지원 때문입니다. 그러나 우리 시장에 대한 외국인 투자는 경제 성장을 가속하는 데 도움이 될 수 있습니다. 이 때문에 많은 야당 의원들이 이 획기적인 법안을 지지하기 위해 몰려들었습니다."
 r56_raj.108.a:0 "사업을 시작할 준비가 되었습니다."
 
 r56_raj.109.t:0 "보험법 부결"
 r56_raj.109.d:0 "농업 중심의 아대륙에 대한 추가적인 국제 투자를 허용하는 획기적인 법안이 될 예정이었던 것이 우리 입법부를 통과하는 데 극적으로 실패했습니다. 총독은 이 법안에 많은 시간과 노력을 투자했지만, 많은 야당 의원들에게 그 이점을 설득하는 데 실패했습니다. 투자를 열망하던 해외 관측통들은 이제 한 발 물러서서, 오히려 더 안정적인 시장에 자본을 투자하려 하고 있습니다."
 r56_raj.109.a:0 "제 사업은 기다려야겠군요."
 
 r56_raj.110.t:0 "전쟁 권한법 가결"
 r56_raj.110.d:0 "독일의 Bf 110기들이 영국 시골을 유린하자, 본국에 필요한 것은 제국이라는 점이 분명해졌습니다. 그리고 우리의 가장 명예로운 입법 평의회에서 전쟁 권한법이 최근 성공적으로 통과됨에 따라 제국이 그에 응답한 것 같습니다. 이제 인도 행정부는 제2차 세계 대전에 훨씬 더 많은 자산을 투입할 수 있게 될 것입니다."
 r56_raj.110.a:0 "전쟁터로 떠납시다!"
 
 r56_raj.111.t:0 "전쟁 권한법 부결"
 r56_raj.111.d:0 "이 법안은 힌두교도와 무슬림을 막론하고 많은 인도인들에게 설득하기 어려운 것이었습니다. 그들은 어떠한 협의나 일말의 고려도 없이 이 전쟁에 끌려 들어왔으며, 이제 대부분 새로 선출된 제국 입법부가 전시 행정부 권력 확장에 반대 투표를 할 것이라고 많은 이들이 예측했습니다."
 r56_raj.111.a:0 "런던은 어떻게 생각할까요?"
  
 r56_raj.112.t:0 "입법부와의 회동"
 r56_raj.112.d:0 "제국 입법 평의회 구성원 대부분이 임명직이지만, 그들의 충성심은 총독뿐만 아니라 개인적인 이익과 선거 자금을 대는 이들에게도 향해 있습니다. 그럼에도 불구하고 평의회와의 회의는 결코 비생산적이지 않았습니다. 우리는 행정부의 많은 미래 계획을 논의했고 이미 그에 대한 일부 지지를 확보했기 때문입니다. 물론 약속과는 거리가 멀지만, 린리스고 행정부가 생산적이기를 바란다면 그 표가 필요할 것입니다."
 r56_raj.112.a:0 "언젠가 이곳을 장악할 것이다."
 
 r56_raj.113.t:0 "사법부와의 만남"
 r56_raj.113.d:0 "인도의 법률 체계는 수많은 지방 하급 법원 때문에 외부인으로서 파악하기가 늘 어려웠습니다. 하지만 첫 접촉점으로는 런던에 위치한 추밀원이 가장 쉬울 것입니다. 추밀원은 모든 문제에 대한 최종 결정권을 가지지만, 인도 문제에는 거의 관여하지 않습니다. 우리의 두 번째 목표는 각 주에서 막대한 권력을 쥐고 있는 현지 고등 법원과 만나는 것입니다. 그들의 충성을 확보하기 위한 모든 조치가 최우선 순위가 될 것입니다."
 r56_raj.113.a:0 "복잡하게 얽힌 그물망이군."
 
 r56_raj.114.t:0 "우리의 첫 번째 임무"
 r56_raj.114.d:0 "입법부와 사법부의 연줄을 확보했으니, 이제 어디에 노력을 기울일지 선택해야 합니다. 우리 내각은 철도 체계 확장 또는 식량 공급 안정화라는 두 가지 가능성을 제시했으며, 우리가 무엇을 먼저 선택하든 인도에 중요할 것입니다."
 r56_raj.114.a:0 "수송 체계는 개혁이 절실하다."
 r56_raj.114.b:0 "우리의 농업 상황은 끔찍하다."
 r56_raj.114.c:0 "대신 이 전쟁에 집중해야 한다!"
 
 r56_raj.115.t:0 "산업노동부"
 r56_raj.115.d:0 "산업부 장관은 어떤 행정부에서든 가장 강력한 내각 구성원 중 하나라고들 하니, 누가 그 직책에 적합할지 신중하게 고려해야 합니다."
 r56_raj.115.a:0 "신중을 기하도록 하자."
 r56_raj.115.b:0 "국내 최고의 경제학자들을 찾아라."
 
 r56_raj.116.t:0 "국방군수부"
 r56_raj.116.d:0 "세계의 긴장이 고조되고 있어 언제든 전쟁이 발발할 수 있으니, 임무에 적합한 국방부 장관을 임명해야 합니다."
 r56_raj.116.a:0 "지주를 임명해 동원력을 강화할 것이다."
 r56_raj.116.b:0 "전쟁 기계를 구축할 산업가가 필요하다."

 r56_raj.117.t:0 "보건교육토지부"
 r56_raj.117.d:0 "다른 부처들이 산업 발전과 징병 수치를 늘리는 데 집중하는 반면, 사회 부처들은 인도의 심장을 채우는 존재이며 그에 걸맞게 대우받아야 합니다."
 r56_raj.117.a:0 "보수적인 선택."
 r56_raj.117.b:0 "진보적인 선택."
 
 RAJ_agricultural_shipments:0 "농산물 수송"
 RAJ_agricultural_shipments_desc:0 "우리는 인도에게 매우 힘든 이 시기에 식량을 공급하는 의무를 다했습니다. 구원받은 생명은 아마 수백만 명에 이를 것이며, 다른 건 몰라도 이는 다른 국가들 사이에서 우리에게 많은 위신을 가져다줄 것입니다."

 raised_support_railway:0 "§Y철도 확장법§! 통과에 집중할 것입니다.\n\n§Y농업 안정화법§!은 §Y사업 개시§!를 완료할 때까지 잠금 해제되지 않습니다."
 raised_support_agri:0 "§Y농업 안정화법§! 통과에 집중할 것입니다.\n\n§Y철도 확장법§!은 §Y전쟁 연구부§!를 완료할 때까지 잠금 해제되지 않습니다."
 raised_support_war:0 "§Y전쟁권한법§!에 대한 지지도를 §Y보통§! 수준으로 올립니다."

 

