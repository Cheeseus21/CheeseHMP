 wtt_news.44.t:0 "푸이가 천명을 주장하다"
 wtt_news.44.desc:0 "중국 황제에 걸맞은 화려한 용포를 입은 천자이자 만세의 군주, 대청 제국의 황제 아이신기오로 푸이가 이례적인 두 번째 대관식을 통해 용상에 올랐으며, 이제 조상들처럼 자금성 안에 거주합니다. 그는 이전의 연호를 되찾아 다시 한번 선통제로 선포되었습니다. 옛 관습을 따라, 선통제는 중국 내전에서 자신의 군대가 거둔 승리가 바로 자신이 중국을 이끌 천명을 받았다는 증거라고 주장합니다.\n\n이전 황제들이 주장했던 것처럼 그의 통치가 '천하'를 아우를 때까지 확장될 의도가 있는지는 아직 지켜봐야 합니다."
 wtt_news.44.a:0 "천자가 돌아왔다."
 wtt_news.44.b:0 "잘못이 바로잡혔다."
 wtt_news.44.c:0 "자기가 뭐라고 생각하는 거지?"
 
