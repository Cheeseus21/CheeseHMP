 raj_5_destroyers_tt:0 "§Y구축함 5척§!이 §Y인도 해군§!에 추가됩니다!"
 raj3progressindependence:0 "인도의 독립 진행도가 매일 §G+0.3%§!씩 빨라집니다."
 raj_3progressindependence:0 "인도의 독립 진행도가 §G일당 +0.3%§! 만큼 느려집니다."
