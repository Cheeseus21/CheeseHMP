 uk_iraq_focus2_desc:0 "이라크의 합법 정부인 파이살 2세 국왕의 궁정을 복위시키면, 연합국이 지중해 전역에서 현지 석유 공급원에 쉽게 접근할 수 있게 될 것입니다."
 TIB_resource5:0 "로드 투 56에서 재호스팅"
