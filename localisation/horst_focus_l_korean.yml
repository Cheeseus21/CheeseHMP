 declare_independence:0 "독립 선포"
 declare_independence_desc:0 "때가 무르익었습니다! 우리는 이제 영국 내에서 충분한 영향력을 확보하여, 세계 속에서 부상하는 것을 가로막던 군홧발로부터 마침내 아대륙을 해방시킬 수 있습니다."
 demand_oaths_of_loyalty:0 "충성 맹세 요구"
 demand_oaths_of_loyalty_desc:0 "이제 마침내 인도를 통합하여 아대륙을 단일 정부 아래 통일할 때입니다."
 
