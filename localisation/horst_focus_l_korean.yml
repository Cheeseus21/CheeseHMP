 #### ROM  ####
 ROM_lessons_of_war:0 "전쟁의 교훈"
 ROM_lessons_of_war_desc:0 "얼마간의 전투를 통해 우리는 많은 것을 배웠습니다. 이를 활용하여 장군과 장교들을 개선할 수 있습니다."
 ROM_romanian_rearmament:0 "재무장 시작"
 ROM_romanian_rearmament_desc:0 "독일에서 히틀러가 부상하고 동유럽에서 스탈린의 야망이 커지면서 우려가 깊어지고 있습니다. 루마니아군은 미래의 분쟁에 대비해야 하며, 무엇보다도 루마니아의 주권을 수호할 준비가 되어 있어야 합니다."
 staunch_traditionalist:0 "강경한 전통주의자"
 ROM_this_will_stop_terrorist_attacks_tt:0 "이 중점을 완료하면, 국가를 향한 §Y철위대§!의 지속적인 테러 공격을 막을 수 있습니다."
 ROM_deploy_reserve_divisions_tt:0 "이 §Y중점§!은 현 육군을 강화하기 위해 §Y5§!개 예비 사단을 배치할 것입니다."


 ROM_secured_our_territorial_integrity_tt:0 "\n최근 나치즘 이념을 채택한 덕분에, 우리는 외교적으로 §Y[GER.GETNAME]§!와 더욱 가까워질 수 있었고, 이를 통해 대루마니아의 전망이 온전히 유지될 수 있는 입지를 확보했습니다.\n"
 trait_industrial_concern:0 "산업 기업"
 ### ROMANIA FOCUSES ###
 ROM_for_the_preservation_of_greater_romania:0 "대루마니아의 보존"
 ROM_for_the_preservation_of_greater_romania_desc:0 "우리는 선조들의 과업을 완수했습니다. 용담공 미하이가 잠시나마 이룩했던 것, 즉 카르파티아 산맥 양쪽 경사면에 루마니아 연합을 영원히 세우는 것입니다. 어떤 요인도 우리에게서 이 업적을 빼앗아가지 못하도록 하는 것이 우리의 의무입니다. "
 ROM_honoring_the_crusade_against_atheism:0 "무신론에 맞선 십자군을 기리며"
 ROM_honoring_the_crusade_against_atheism_desc:0 "신을 믿지 않는 자는 결코 신뢰할 수 없습니다. 루마니아에서 이 '무신론'이라는 사상을 제거하는 것이 우리의 의무입니다."
 ROM_reject_french_containment_strategies:0 "프랑스의 봉쇄 전략 거부"
 ROM_reject_french_containment_strategies_desc:0 "독일은 베르사유 조약의 족쇄를 벗어던졌고, 프랑스는 그 조약의 이행을 보장하는 데 있어 우유부단하고 나약한 모습을 보였습니다. 이제 프랑스와 거리를 두고, 우리나라와 더 가까운 국가들, 어쩌면 독일과 대화를 시작할 때일지도 모릅니다."
 ROM_the_decay_of_democracy:0 "민주주의의 쇠퇴"
 ROM_the_decay_of_democracy_desc:0 "민주 정당들은 철위대와의 갈등과 카롤 2세 국왕의 권위주의적 성향 사이에서 압박받고 있습니다. 이처럼 혼란스러운 정치적 분위기를 얼마나 오래 유지할 수 있을지 의문입니다."
 ROM_elections_of_1937:0 "마지막 지푸라기"
 ROM_elections_of_1937_desc:0 "우리나라는 더 이상 정치권의 혼란을 용납할 수 없습니다. 카롤 2세 국왕에게 재량권을 부여하여 결단력 있는 조치를 취하도록 하거나, 아니면 마침내 철위대가 루마니아의 야망을 실현하도록 허용해야 합니다.  "
 ROM_institute_a_royal_dictatorship:0 "왕실 독재"
 ROM_institute_a_royal_dictatorship_desc:0 "폭력적인 선거 운동으로 인해 국가가 내전의 위험에 빠지고 있습니다. 카롤 2세 국왕은 계엄령을 선포하고 모든 시민의 자유를 중단시킬 것입니다. 그는 위대한 우리나라에 안정을 되찾게 할 것입니다."
 ROM_imprison_the_iron_guard:0 "흡혈귀의 밤"
 ROM_imprison_the_iron_guard_desc:0 "완전히 새로운 국가 보안군인 세쿠리타테를 창설함으로써, 마침내 우리나라를 위협하는 철위대를 타격하기 위한 조직을 갖출 수 있습니다. '흡혈귀의 밤' 작전은 철위대를 동시다발적이고 신속하게 진압하기 위해 조직될 것입니다."
 ROM_form_the_front_of_national_rebirth:0 "국가부흥전선 창설"
 ROM_form_the_front_of_national_rebirth_desc:0 "우리는 철위대의 경각심을 불러일으킬 정도로 높은 영향력에 맞서야 합니다. 이에 따라, 우리는 이에 맞서고 국왕의 이익을 강화하고 보호하기 위해 국가부흥전선을 창설할 것입니다."
 ROM_fascist_economics:0 "파시스트 경제학"
 ROM_fascist_economics_desc:0 "우리는 전 세계와 함께 독일의 급속한 경제 회복과 부흥을 목격했습니다. 이제 우리나라 경제를 발전시키기 위해 그들의 정책 일부를 채택할 때입니다."
 ROM_operetta_fascism:0 "오페레타 파시즘"
 ROM_operetta_fascism_desc:0 "우리는 국가부흥전선(NRF)이 단순히 국가사회주의 독일 노동자당(NSDAP)이나 국가 파시스트당(PNF)의 모조품이 아닌, 독자적인 정당임을 확고히 하기 위해 상징, 제복, 경례를 채택해야 합니다."
 ROM_sentinels_of_the_motherland:0 "조국의 파수꾼"
 ROM_sentinels_of_the_motherland_desc:0 "국가부흥전선은 우리나라 청년들을 모범 시민으로 양성하고, 철위대가 루마니아 청년층에 미치는 영향력 증대에 대응하는 부차적 역할을 수행하는 데 활용될 것입니다."
 ROM_pressure_antonescu_into_becoming_prime_minister:0 "콘두커토르"
 ROM_pressure_antonescu_into_becoming_prime_minister_desc:0 "이온 안토네스쿠는 국내에서 점점 더 인기 있는 인물이 되었습니다. 국가에 만연한 거대한 불안 속에서, 그는 루마니아의 질서를 회복할 수 있는 몇 안 되는 인물 중 한 명입니다. "
 ROM_arrest_general_antonescu:0 "안토네스쿠 장군 체포"
 ROM_arrest_general_antonescu_desc:0 "안토네스쿠의 반왕실 입장은 문제가 됩니다. 국가의 안정을 보장하고 불안한 분위기를 막기 위해, 왕의 지시에 따라 그를 구금하는 것이 필수적입니다. "
 ROM_antonescus_coup_detat:0 "안토네스쿠의 쿠데타"
 ROM_antonescus_coup_detat_desc:0 "카롤 2세 국왕은 온 나라의 수치였습니다. 그는 퇴위할 염치조차 없었으니, 이제 안토네스쿠 장군이 권력을 잡고 국정을 바로잡을 때입니다."
 ROM_ask_codreanue_to_form_government:0 "철위대에 굴복"
 ROM_ask_codreanue_to_form_government_desc:0 "철위대는 오랫동안 꾸준히 인기를 얻어왔습니다. 많은 젊은 루마니아 지식인, 특히 대학생들은 철위대의 '루마니아 천재성' 찬양과 친프랑스 엘리트보다 루마니아어를 사용하는 것을 자랑스러워하는 지도자들에게 매료되었습니다. 이제 그들이 국정 운영에 더 큰 역할을 하도록 허용할 때가 된 것 같습니다."
 ROM_national_legionary_state:0 "국민군단 국가"
 ROM_national_legionary_state_desc:0 "루마니아의 더 큰 안정을 보장하기 위해 정부에 권한을 부여해야 합니다. 이를 위해 국가를 파시스트 일당 독재 이두정치 체제로 전환해야 합니다."
 ROM_dismantle_the_monarchy:0 "군주제 폐지"
 ROM_dismantle_the_monarchy_desc:0 "카롤 2세 국왕은 극심한 무능과 사치스러운 생활 방식으로 부적합한 통치자임을 스스로 증명했습니다. 그는 제거되어야 하며, 그와 같은 자가 다시는 나라를 괴롭히지 못하도록 군주제 전체를 폐지해야 합니다."
 ROM_integrate_the_iron_guard_into_the_army:0 "철위대를 군에 통합"
 ROM_integrate_the_iron_guard_into_the_army_desc:0 "철위대는 매우 잘 무장된 준군사조직으로, 권총부터 기관총까지 모든 것을 갖추고 있으며 자체 트럭까지 보유하고 있습니다. 우리 군은 철위대에서 유입되는 새로운 병력으로부터 큰 이익을 얻을 것입니다."
 ROM_secure_our_territorial_integrity:0 "영토 보전 확보"
 ROM_secure_our_territorial_integrity_desc:0 "오늘날 우리는 대루마니아에 서 있으며, 관리해야 할 넓은 지역을 가지고 있습니다. 우리는 그 영토의 보전을 보장하기 위한 정치적, 물리적 수단을 가져야 합니다"
 ROM_abandon_the_ententes:0 "과거의 모든 동맹 포기"
 ROM_abandon_the_ententes_desc:0 "프랑스는 독일이 베르사유 조약을 위반한 것에 대해 책임을 묻기에는 너무 약하다는 것을 증명했으므로, 우리의 오랜 우정을 버리고 새로운 우정을 만드는 것이 최선이며 국익에 부합할 것입니다."
 ROM_co_conducator:0 "공동 지도자"
 ROM_co_conducator_desc:0 "안토네스쿠 장군은 인기 있는 인물임을 증명했으며 우리의 대의에 공감을 표했습니다. 우리의 인기를 더욱 높이기 위해, 우리는 그를 우리 정권에 포함시킬 방법을 찾아야 합니다."
 ROM_order_of_the_dragon:0 "용 기사단"
 ROM_order_of_the_dragon_desc:0 "용 기사단, 즉 '소시에타스 드라코니스타룸'은 선발된 고위 귀족과 군주들을 위한 군주제 기사단이었습니다. 십자군 전쟁의 군사 기사단을 본떠 만들어졌으며, 입회자들에게 십자가를 수호하고 기독교의 적들과 싸울 것을 요구했습니다. 오늘날, 이 기사단에는 선조들처럼 조국을 수호할 루마니아의 하늘의 기사들이 포함될 것입니다."
 ROM_romanian_aircraft_purchasing_commission:0 "항공기 구매 위원회"
 ROM_romanian_aircraft_purchasing_commission_desc:0 "우리의 국내 산업 및 기술 전문성은 유럽의 주요 국가들에 비해 크게 뒤처져 있습니다. 우리는 외국 항공기와 그 설계를 검토하고 구매할 수 있는 위원회를 설립할 것입니다. "
 ROM_light_metal_production:0 "국내 군수품 생산"
 ROM_light_metal_production_desc:0 "우리나라는 상당한 양의 원자재를 보유하고 있으며, 이를 적절히 추출하고 가공하면 신생 항공 산업에 안정적이고 신뢰할 수 있는 공급원을 제공할 수 있습니다."
 ROM_invite_german_air_companies:0 "독일 항공사 초청"
 ROM_invite_german_air_companies_desc:0 "독일 공군, 즉 루프트바페는 매우 강력하다는 것을 증명했지만, 공군은 보유한 항공기만큼만 강할 뿐입니다. 우리는 그들의 항공기 회사 중 일부를 우리나라에 초청해야 합니다."
 ROM_copy_succesful_german_fighters:0 "독일제 우수 전투기 모방"
 ROM_copy_succesful_german_fighters_desc:0 "독일은 현시대 최고의 항공기를 일부 개발하여 운용하고 있습니다. 어쩌면 그들의 설계에서 "약간의" 아이디어를 차용하여 우리 고유의 설계를 강화하고 현대적인 항공기를 생산할 수 있을 것입니다."
 ROM_prioritize_aircraft_industry:0 "항공 산업에 노동력 우선 배정"
 ROM_prioritize_aircraft_industry_desc:0 "항공기는 인간 공학의 정점입니다. 이 복잡한 기계를 제작하려면 정밀한 노동력이 필요하므로, 항공 산업을 우선시하고 최고의 노동력을 이 비행 기계 생산에 배정할 것입니다."
 ROM_expand_the_army:0 "육군 확장"
 ROM_expand_the_army_desc:0 "육군은 국가가 야망을 실현하는 도구입니다. 징병을 시작하고, 훈련을 강화하며, 신무기를 도입하여 육군을 확대하고 강화해야 합니다."
 ROM_expand_small_arms_manufacturing:0 "소화기 생산"
 ROM_expand_small_arms_manufacturing_desc:0 "육군은 사용하는 총의 수준에 따라 결정됩니다. 따라서 우리는 양질의 소총을 육군에 충분한 수량으로 생산하기 시작할 것입니다. "
 ROM_deploy_reserve_divisions:0 "예비 사단 배치"
 ROM_deploy_reserve_divisions_desc:0 "육군 확장 대계획의 일환으로, 예비 사단을 소집하여 배치하고 군의 전선 전력을 강화할 것입니다."
 ROM_grand_army:0 "대육군"
 ROM_grand_army_desc:0 "우리는 육군을 확장하기 위해 여러 정책을 성공적으로 시행했습니다. 이 정책들 덕분에 과거 보잘것없던 우리 군은 마침내 "대육군"으로 변모하고 있습니다."
 ROM_import_and_convert_antique_artillery:0 "구식 포 개조"
 ROM_import_and_convert_antique_artillery_desc:0 "최고 육군 장교들의 최근 연구에 따르면, 현재 우리 포병의 구경, 포구 속도, 기동성은 끊임없이 변화하는 현대 전장에서 사용하기에 부적합한 것으로 밝혀졌습니다. 우리는 구식 포의 대다수를 정비하는 계획을 시작할 것입니다."
 ROM_organizing_logistics:0 "병참 조직화"
 ROM_organizing_logistics_desc:0 "군은 배고픈 채로 싸울 수 없습니다. 병참선을 관리하기 위한 전담 절차를 수립하는 것은 최전선의 루마니아 병사가 결코 배고픈 채로 싸우지 않도록 보장하는 데 큰 도움이 될 것입니다."
 ROM_modernize_the_army:0 "육군 현대화"
 ROM_modernize_the_army_desc:0 "병력 수만으로는 전장에서의 승리를 보장할 수 없습니다. 우리 야전 사단 중 일부는 여전히 대전쟁 시절의 구식 무기로 무장하고 있습니다. 루마니아 육군이 이웃 국가들과 대등한 수준의 현대 무기를 갖추도록 자금을 투입해야 합니다."
 ROM_focus_on_support_tanks:0 "지원 전차에 집중"
 ROM_focus_on_support_tanks_desc:0 "전차를 만드는 과정은 비용이 많이 들고 복잡합니다. 우리는 "급조품" 형태의 대안이나, 저렴한 비용에도 불구하고 전장에서 루마니아 보병에게 필요한 화력 지원을 제공할 수 있도록 처음부터 설계된 전용 자주포를 만들 수 있습니다."
 ROM_the_R_series:0 "R 시리즈 중형전차"
 ROM_the_R_series_desc:0 "체코는 LT-35 전차를, 프랑스는 R35를 개발했습니다. 이들 국가와의 긴밀한 관계를 통해 우리는 상당히 저렴한 가격에 이 전차들을 구매할 수 있습니다. 이 차량들과 그 파생형들은 R-시리즈 전차로서 우리 군에 즉시 투입될 수 있습니다."
 ROM_the_magpie_scheme:0 "모든 것을 회수하라!"
 ROM_the_magpie_scheme_desc:0 "우리 기갑 능력의 위태로운 상황 속에서, 쓸모없는 기갑은 없습니다. 우리는 루마니아 육군의 필요를 충족시키기 위해 모든 곳에서 회수하고 긁어모아야 합니다."
 ROM_invite_axis_motor_companies:0 "추축국 자동차 회사 초청"
 ROM_invite_axis_motor_companies_desc:0 "몇몇 최고의 회사들이 추축국, 특히 독일에 본사를 두고 있습니다. 우리 자동차 산업의 비참할 정도로 저조한 성과를 고려할 때, 이 분야에서 우리 고유의 역량을 개발하는 데 도움을 받기 위해 그들 중 일부를 루마니아로 초청해야 합니다."
 ROM_mechanized_soldiers:0 "장병 기계화"
 ROM_mechanized_soldiers_desc:0 "전쟁의 속도는 계속해서 빨라지고 있으며, 더 빠른 속도는 더 큰 공격 능력을 의미합니다. 루마니아 육군은 병사를 신속하게 최전선으로 수송하면서 충분한 방호력을 제공할 수 있는 차량을 갖추어야 합니다."
 ROM_haide_haide_haide:0 "전진! 전진! 전진!"
 ROM_haide_haide_haide_desc:0 "우리는 루마니아 육군을 현대 무기와 현대 기술로 무장시켰습니다. 이 모든 것을 긴밀하게 통합하여 루마니아 육군에 적을 완전히 섬멸하는 데 필요한 공격력을 부여해야 합니다. 전진! 전진! 전진!"
 ROM_national_recovery:0 "대공황으로부터의 회복"
 ROM_national_recovery_desc:0 "대공황으로 세계 곡물 가격이 붕괴하면서 루마니아는 농업 위기에 빠졌습니다. 소작농들은 연체에 시달렸고, 정부는 이들의 곤경을 덜어주기 위해 가격 지지 정책을 시행하고 농업 부채에 대한 지불 유예를 의결했습니다. 이제 회복이 시작되었으니, 국내 자본을 사용하여 군수 산업을 포함한 신규 산업에 자금을 지원하고 농업 침체에서 벗어날 것입니다."
 ROM_encourage_trade_with_germany:0 "독일과의 신규 무역 협정"
 ROM_encourage_trade_with_germany_desc:0 "독일은 장기적으로 귀중한 동맹이 될 수 있으므로, 우리는 제3제국과 협정을 체결해야 합니다. 우리는 농업, 목재, 석유 분야의 다양한 루마니아 상품을 독일에 제공하고, 그 대가로 기술 노하우와 군사 장비를 받을 것입니다. 이 협정은 또한 자유 무역 지대 형태로 루마니아 내 독일 기업에 무역 혜택을 제공할 것입니다."
 ROM_carpathian_network:0 "카르파티아 기반 시설망"
 ROM_carpathian_network_desc:0 "카르파티아산맥은 우리나라의 넓은 지역에 대한 접근을 어렵게 만들었습니다. 우리는 즉시 새로운 도로를 건설하고 기존 도로를 확장하여 카르파티아 외딴 지역의 접근성을 개선하는 새로운 계획을 시작할 것입니다."
 ROM_oil_for_armaments:0 "군수품을 위한 석유"
 ROM_oil_for_armaments_desc:0 "독일은 각 분야에서 최고의 무기들을 개발했습니다. 독일과 체결한 무역 협정의 일환으로, 우리는 그들에게 절실히 부족한 석유를 제공하고 군수품을 받을 것입니다."
 ROM_nationalize_the_oil:0 "석유 국유화"
 ROM_nationalize_the_oil_desc:0 "우리나라의 가장 귀중한 자산은 석유입니다. 우리는 변덕스러운 민간 소유주들이 국가의 이익에 기여할 것이라고 믿을 수 없습니다. 우리는 유전을 더 잘 활용하기 위해 유전의 통제권을 개인에게서 국가로 이전할 것입니다."
 ROM_reichswerke_subsidiary:0 "루마니아에 대한 제국공업의 영향력"
 ROM_reichswerke_subsidiary_desc:0 "제국공업은 여러 루마니아 자산을 인수했으며, 국가의 거의 모든 석탄 및 철강 생산 능력은 일련의 우호적인 협정을 통해 인수되어 독일-루마니아 공동 통제하에 놓였습니다. 갈라치에 있는 우리의 가장 큰 조선소에 특별한 주의가 기울여졌습니다. 독일의 전문 지식은 우리나라 발전에 큰 도움이 될 것이지만, 그 영향력을 견제하지 않으면 주권에 영향을 미칠 수 있습니다."
 ROM_improve_cross_country_railways:0 "국토 횡단 철도 개선"
 ROM_improve_cross_country_railways_desc:0 "추출 현장에서 가공 센터까지의 운송 시간을 단축하여, 특히 귀중한 석유의 자원 추출률을 높일 수 있습니다. 이는 철도망을 개선함으로써 쉽게 달성할 수 있습니다."
 ROM_autarky:0 "석유 생산 확대"
 ROM_autarky_desc:0 "현대 국가는 석유로 움직입니다. 추출되지 않은 석유는 낭비된 석유이므로, 기존 시설을 개선하여 석유 생산을 늘릴 것입니다."
 ROM_bucharest_technical_institute:0 "공과대학"
 ROM_bucharest_technical_institute_desc:0 "루마니아는 국가 생산성을 향상시키기 위해 많은 기술 전문가가 필요합니다. 우리는 현재 공과대학의 교과 과정을 개정하고 새로운 학교를 설립하여 양과 질을 모두 높일 것입니다."
 ROM_reduce_reliance_on_foreign_imports:0 "굴착 장비 개선"
 ROM_reduce_reliance_on_foreign_imports_desc:0 "우리는 광업 및 석유 추출 산업의 효율성을 대폭 향상시키기 위해 굴착 도구의 최신 혁신 기술을 도입할 것입니다."
 ROM_more_efficient_agricultural_procurement:0 "농업 효율화"
 ROM_more_efficient_agricultural_procurement_desc:0 "루마니아는 인구의 많은 부분이 농업 부문에 종사하고 있습니다. 우리는 새로운 방법과 도구를 도입하여 효율성을 대폭 높이고, 빠르게 발전하는 산업 기반을 위해 노동력을 확보할 수 있습니다."
 ROM_expand_the_axis_oil_trade:0 "석유 무역 확대"
 ROM_expand_the_axis_oil_trade_desc:0 "유럽의 군대는 성장하고 있으며, 점점 더 많은 수의 전차와 항공기가 생산되고 있습니다. 유럽 국가 중 (어차피 누가 교역하겠냐만은, 소련을 제외하고) 그들에게 연료를 공급할 만한 석유를 가진 나라는 없습니다. 우리는 다른 유럽 국가에 석유를 팔아 막대한 이익을 얻을 수 있습니다."
 ROM_expand_fuel_stockpiles:0 "연료 비축분 준비"
 ROM_expand_fuel_stockpiles_desc:0 "우리가 어느 편에 서든, 우리의 석유는 우리를 동맹국뿐만 아니라 적에게도 전략적으로 중요한 지역으로 만듭니다. 적들은 우리의 유전을 목표로 삼을 가능성이 높습니다. 생산에 차질이 생길 경우를 대비하여 대규모 연료 비축 시설을 건설해야 합니다."
 ROM_expand_the_war_industry:0 "신규 군수 공장 건설"
 ROM_expand_the_war_industry_desc:0 "루마니아군을 강화하기 위해 충분한 수의 신무기를 생산할 군수 공장을 더 많이 건설해야 합니다."
 ROM_the_duty_to_work:0 "높은 수요 충족"
 ROM_the_stabilization_plan:0 "안정화 계획"
 ROM_the_stabilization_plan_desc:0 "불안정한 경제 상황과 최근의 국가적 정치 격변으로 인해 루마니아 국민들은 혼란에 빠져 있습니다. 루마니아가 번영하기 위해서는 국가의 경제 및 정치적 분위기를 안정시켜야 합니다."
 ROM_malaxa_focus:0 "석유 대체 산업"
 ROM_malaxa_focus_desc:0 "우리나라 경제는 석유에 상당히 의존하고 있으므로, 경제에 기여할 다른 대안을 찾기 시작해야 합니다."
 ROM_reduce_reliance_on_oil:0 "석유 의존도 감축"
 ROM_reduce_reliance_on_oil_desc:0 "석유 무역으로 인해 다른 국가들은 우리를 석유 생산국으로만 인식하고 있습니다. 루마니아를 발전시키고 더 강한 이미지를 구축하기 위해, 우리는 석유 의존에서 벗어나야 합니다."
 ROM_improve_living_standards:0 "생활 수준 향상"
 ROM_improve_living_standards_desc:0 "산업과 군대를 향상시키는 또 다른 방법은 급여 인상, 휴가 증대, 도시 정화 등을 통해 생활 수준을 높이는 것입니다. 이 모든 것은 더 행복한 국민을 만들 것이며, 그들은 더 나은 삶을 살게 해준 국가를 위해 더 열심히, 더 잘 일할 의지를 갖게 될 것입니다."
 ROM_domestic_industrial_developments:0 "국내 산업 개발"
 ROM_domestic_industrial_development_desc:0 "루마니아는 더 크고 더 나은 산업 기반이 필요합니다. 장기적으로 큰 도움이 될 것이므로 산업 부문에 막대한 투자를 해야 합니다."
 ROM_the_romanian_miracle:0 "자원의 저주 극복"
 ROM_the_romanian_miracle_desc:0 ""
 ROM_force_the_king_to_abdicate:0 "국왕 강제 퇴위"
 ROM_force_the_king_to_abdicate_desc:0 "루마니아는 베사라비아와 북부 부코비나를 소련에, 북부 트란실바니아를 헝가리에, 남부 도브루자를 불가리아에 할양해야만 했습니다. 이러한 영토 상실 이후, 카롤 2세 국왕은 이전보다 루마니아에 더 큰 수치거리가 되었습니다. 루마니아가 재기하기 위해서는 그가 퇴위해야 합니다."
 ROM_axis_friendly_government:0 "친추축국 정부"
 ROM_axis_friendly_government_desc:0 "프랑스는 패배하여 황폐해졌고, 영국은 대륙에 있지도 않습니다. 독일은 유럽의 유일한 강대국으로 남았습니다. 이 불확실한 미래에서 살아남으려면, 우리는 독일의 이익과 우리의 이익을 일치시켜야 합니다."
 ROM_wargoal_on_bulgaria:0 "불가리아 확보"
 ROM_wargoal_on_bulgaria_desc:0 "불가리아는 헝가리와 함께 우리와 국경을 맞대고 있으며 국경 분쟁도 겪고 있습니다. 남쪽 국경을 보호하기 위해 남부 도브루자 문제 해결에 착수해야 합니다."
 ROM_wargoal_on_hungary:0 "헝가리 확보"
 ROM_wargoal_on_hungary_desc:0 "헝가리는 불가리아와 함께 우리와 국경을 맞대고 있으며 국경 분쟁도 겪고 있습니다. 북쪽 국경을 보호하기 위해 북부 트란실바니아 문제 해결에 착수해야 합니다."
 ROM_integrate_hungary:0 "헝가리 통합"
 ROM_integrate_bulgaria:0 "불가리아 통합"
 ROM_federation_of_the_danube:0 "유고슬라비아 왕국 파괴"
 ROM_federation_of_the_danube_desc:0 "유고슬라비아는 모든 발칸 국가들에게 일방적으로 미움을 받고 있으며, 그들 중 다수와 국경 분쟁을 겪고 있습니다. 우리는 유고슬라비아 왕국을 파괴하는 데 이 \"동맹국들\"의 도움을 받을 수 있습니다."
 ROM_legionnaires_rebellion:0 "군단병의 반란"
 ROM_legionnaires_rebellion_desc:0 "콘두커토르 이온 안토네스쿠에 의해 철위대 준군사조직의 특권이 점차 박탈되자, 군단병으로도 알려진 그 구성원들이 반란을 일으켰습니다. 철위대는 정부에 대항하여 반란을 일으켰고, 부쿠레슈티의 유대인에 대한 포그롬을 시작했습니다."
 ROM_ensure_agricultural_self_sufficiency:0 "농업 자급자족 보장"
 ROM_ensure_agricultural_self_sufficiency_desc:0 "우리는 기술 전문 지식을 독일에 의존할 수 있지만, 다른 어떤 나라에도 의존할 수 없는 한 가지는 바로 우리의 식량 공급입니다. 자급자족을 달성하기 위해 농업 부문에 특별한 중점을 두어야 합니다."
 ROM_support_the_war_industry:0 "군수 산업 지원"
 ROM_support_the_war_industry_desc:0 "모든 시민은 전쟁 중 자신의 역할을 이해해야 합니다. 전쟁 채권을 구매하고, 후방에서 생산된 총알이 제때 최전선에 도달하도록 열심히 일함으로써 전쟁 노력에 기여하는 것은 모든 시민의 애국적인 의무입니다. 이제 모두가 군수 산업을 지원할 때입니다."
   
   









