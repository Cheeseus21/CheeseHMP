 post_election_struggle:0 "독립을 위한 투쟁"
 post_election_struggle_desc:0 "유혈 사태 없이 §Y독립§!을 쟁취하려면 §Y영국§!에 압력을 가해야 합니다. 또한 우리 국경에서 파키스탄을 분리하려는 경쟁 상대인 §Y전인도 무슬림 연맹§!보다 더 많은 영향력을 행사해야 합니다.\n\n\t[RAJ.GetFlag]현재 §Y[Root.GetReigningGovernmentColor]§! 영향력은 [?Root.ind_influence]입니다\n\t[PAK.GetFlag]현재 §Y전인도 무슬림 연맹§! 영향력은 [?Root.pak_influence]입니다\n\n현재 우리는 매일 §Y[?Root.ind_influence_daily]의 영향력§!을 얻는 반면, AIML은 §Y[?Root.pak_influence_daily]의 영향력§!을 얻습니다.\n\n§Y독립§!을 쟁취하려면 100의 영향력을 행사해야 하지만, 만약 §YAIML§!이 우리 §Y영향력§!의 50% 이상을 가지게 되면 영국은 파키스탄을 별개의 국가로 독립시킬 것입니다. 만약 §YAIML§!이 우리 영향력의 66% 이상을 가지게 되면, 그들은 카슈미르도 획득할 것입니다."
