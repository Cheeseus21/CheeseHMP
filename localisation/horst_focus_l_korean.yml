 IRE_emergency:0 "국가비상권법"
 IRE_emergency_desc:0 "전쟁이 유럽을 휩쓸고 있어 아일랜드가 위험에 처했다. 국가 비상사태를 선포하여 아일랜드를 보호해야 한다."
 TIB_resource1337:0 "호르스트란디아 건국 중"
