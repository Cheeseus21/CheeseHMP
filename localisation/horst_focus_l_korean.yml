 NOR_naval_modernisation:0 "해군 현대화"
 NOR_naval_modernisation_desc:0 "피오르 해역에서의 해군 패권을 위한 열쇠입니다"
 NOR_aquire_the_stord_class_destroyers:0 "스토르급 구축함"
 NOR_aquire_the_stord_class_destroyers_desc:0 "스토르급 구축함을 획득합니다"
 NOR_new_submarines:0 "신형 잠수함"
 NOR_new_submarines_desc:0 "잠수함대를 현대화합니다"
 NOR_upgrade_from_the_norge_class:0 "노르게급 개량"
 NOR_navy_4:0 "고속 어뢰"
 NOR_navy_4_desc:0 "재장전 시간과 폭발 장약을 희생하는 대신, 어뢰에 추진제를 과부하하여 고속에 도달하고 장거리까지 속도를 유지하게 함으로써, 호위함을 더 쉽게 우회할 수 있습니다."
 NOR_upgrade_from_the_norge_class_desc:0 "새로운 주력함이 필요합니다. 연안 방어함이 우리의 필요에 잘 맞을 것입니다."
 NOR_naval_drills:0 "해상 훈련"
 NOR_escort_effort:0 "호위 노력"
 NOR_convoy_effort:0 "상선단 재건"
 NOR_convoy_effort_desc:0 "모든 전쟁은 보급선에 의해 싸워지고, 승리하며, 패배합니다. 우리의 전문 조선업자들은 연합국을 위해 수송선을 신속하게 건조할 수 있습니다."
 NOR_escort_effort_desc:0 "대잠 및 호위 구축함이 필요합니다. 우리는 이 문제에 대해 연합국을 도와야 합니다."
 NOR_naval_drills_desc:0 "적절한 준비는 우리에게 귀중한 교훈을 가르쳐 줄 것입니다"
 NOR_free_navy:0 "자유 노르웨이 해군"
 NOR_free_navy_desc:0 "우리는 연합국에게 우리 해운을 보호하기 위해 그들의 구축함 몇 척을 빌려달라고 요청할 것입니다"
 NOR_ASW:0 "영국 대잠전 학교"
 NOR_cold_navy:0 "한랭 해역 해군"
 NOR_cold_navy_desc:0 "북극 국가로서, 우리 수병들은 한랭 해역에서의 해상전에 잘 훈련되어 있어 추축국에 비해 우위를 점합니다."
 NOR_naval_radar:0 "해상 레이더"
 NOR_naval_radar_desc:0 "레이더는 적에게서 밤의 엄호를 빼앗고 악천후 속에서도 그들을 탐지할 수 있는 매력적인 가능성을 제공합니다."
 NOR_ASW_desc:0 "영국은 적 유보트와의 전투에서 많은 진전을 이루었습니다. 우리는 그들과 협력하여 우리 자신의 교리를 개선할 수 있습니다."
 NOR_standing_navy:0 "상비 해군"
 NOR_standing_navy_desc:0 "현대적인 상비 해군은 우리가 바다를 지배하게 할 것입니다"
 NOR_carriers:0 "호위 항공모함"
 NOR_carriers_desc:0 "잠수함과 소규모 해군 기동부대로부터 상선단을 호위하기 위해 소형 항공모함을 건조하는 것이 정규 함대 항공모함을 건조하는 것보다 우리가 달성하기에 더 현실적입니다."
 TIB_anti_meme33:0 "일본으로부터 런던 해방"
 GER_the_great_turn:0 "최종 승리"
 GER_the_great_turn_desc:0 "국제 볼셰비키 음모에 대한 승리는 필연적입니다! 독일 국민은 전세를 뒤집고 승리할 운명이며, 패배는 불가능합니다!"
 TIB_anti_meme:0 "1.4 버전 대인 공격력으로 되돌리기"
 endsieg_tt:0 "§H우리의§! §C핵심 영토 내 사단 공격력§! §H및§! §C핵심 영토 내 사단 방어력§!§H이(가)§! §C20%§! §H만큼 증가합니다. 또한 전선을 유지하기 위해 §G72개의 40너비 보병 사단§!을 배치할 것입니다.§!\n\n§H우리의 공장 생산량은 통제권을 잃은 주의 수에 따라 증가할 것입니다.§!"
 ITA_fort_milan:0 "밀라노 요새"
 ITA_fort_milan_desc:0 "우리는 마지막 이탈리아인까지 싸울 것입니다! 밀라노를 이탈리아의 스탈린그라드로 만들 것입니다!"
 ITA_The_Riches_Of_The_North:0 "북부의 부"
 ITA_The_Riches_Of_The_North_desc:0 "본토 북부는 우리 제국의 경제적 심장부입니다. 더 안정적인 경제를 위해 그 심장을 더 강하게 만듭시다."
 ITA_Dont_Forget_The_Colonies:0 "제국의 나머지 영토"
 ITA_Dont_Forget_The_Colonies_desc:0 "우리는 이탈리아뿐만 아니라 제국 전체에 문명과 부를 가져와야 합니다. 우리는 리비아 식민지에 우리의 체제를 전파하고, 아랍인들을 국가 파시스트당에 통합시키며, 수천 킬로미터의 새로운 도로를 건설해야 합니다. 그래야만 미래에 굳건히 설 수 있을 것입니다!"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire:0 "빈곤 지역 일자리 창출"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire_desc:0 "우리는 미개척 지역의 빈민들을 위해 부를 창출해야 합니다. 어떻게 하냐고요? 우리는 국가의 군사화 증대에 기여할 일자리를 만들 것입니다. 이것은 서로에게 이득이 되는 상황입니다."
 ITA_Skillful_Workers:0 "채워진 배"
 ITA_Skillful_Workers_desc:0 "빈곤층은 이제 경험과 무엇보다도 채워진 배 덕분에 우리가 그들을 위해 지은 새로운 무기 단지에서 무기 제작에 꽤 능숙해졌습니다. 일자리는 빈민에게 돈을 만들어주고, 돈은 가족에게 식량을 제공합니다. 이 '채워진 배' 전략은 우리의 생산량 수치에서 성과를 보입니다."
 ITA_Our_Finest_Hour:0 "우리의 가장 영광스러운 시간"
 ITA_Our_Finest_Hour_desc:0 "우리의 산업 변혁이 완료되었으며, 곧 닥쳐올 암흑기에 대비가 되었습니다. 지금이 바로 우리의 가장 영광스러운 시간이 될 것입니다."
 GER_standardpanzer:0 "표준 전차"
 GER_standardpanzer_desc:0 "최종 표준화 전차 계열을 도입할 것입니다. 이 계열은 소형 E-10부터 E-50 표준 중형전차, E-75 표준 중전차, 그리고 마지막으로 E-100 초중전차까지 포함합니다. 이 표준화되었지만 급조된 설계 덕분에, 우리는 훨씬 저렴한 비용으로 전차를 생산할 수 있을 것입니다. 이는 전차 잉여분을 창출하여 최종 승리를 달성하는 데 도움이 될 것입니다."
 MAN_resources:0 "광업 및 석유 산업 개발"
 MAN_resources_desc:0 "우리 영토는 알루미늄, 강철, 석유가 풍부하지만 오랫동안 방치되었습니다. 이 자원들을 개발하는 것이 앞으로 나아갈 길입니다."
 MAN_railways_kirin_desc:0 ""
 GER_choco_foc:0 "전차 초콜릿"
 GER_choco_foc_desc:0 "우리에게 필요한 것은 속도뿐입니다."
 GER_pillen_foc:0 "헤르만 괴링 알약"
 GER_pillen_foc_desc:0 "더 단단하게, 더 빠르게, 더 강하게."
 GER_stuka_foc:0 "슈투카 정제"
 GER_stuka_foc_desc:0 "우리의 급강하 폭격기 조종사들은 세계 최고 수준이지만, 전쟁은 우리가 가진 것의 120%를 요구합니다."
 SOV_support_usa:0 "연합군 지원"
 fin_shocktroops:0 "친위 예거"
 fin_shocktroops_desc:0 "레닌그라드 시는 도시 요새이며 우리 군 대부분이 공격하기에는 너무 어렵습니다 - 우리는 시가전 훈련을 받은 특수 보병 부대가 필요합니다."
 fin_ranger:0 "시시 부대"
 fin_ranger_desc:0 "우리는 핀란드와 러시아의 빽빽한 숲속에서 보급선과 멀리 떨어진 곳에서도 싸울 수 있는 부대의 창설을 지원해야 합니다."
 SOV_support_usa_desc:0 ""
