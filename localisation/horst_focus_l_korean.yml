FIN_cedeland:0 "핀란드는 무르만스크, 오네가, 코민테른 가입을 대가로 소비에트 연방에 카리알라를 할양할 것입니다. \n"

civilian_kitchens_idea:0 "민간 야전 취사장"
civilian_kitchens_idea_desc:0 "핀란드는 텐트, 난로 및 기타 장비 보급에 큰 차질을 빚었지만, 야전에 취사장을 설치하고 부대에 식량을 제공한 민간 자원봉사자들 덕분에 많은 사망자를 피할 수 있었습니다."

FIN_motitus_tactics:0 "모티 전술"
FIN_motitus_tactics_desc:0 "모티는 완전히 포위된 적 부대를 가리키는 핀란드 군대 속어입니다. 모티투스는 경보병이 험지를 통과하는 능력을 이용해 도로 위의 적 부대를 포위하는 이중 포위 기동입니다. 이 전술은 특히 핀란드의 눈 덮인 기후에서 수적으로 크게 열세하지만 기동성 있는 부대에게 유용합니다."

FIN_white_guard_idea:0 "백위대"
FIN_white_guard_idea_desc:0 "겨울전쟁에서 백위대는 동원령 수행을 책임졌습니다. 야전군 병력의 4분의 1이 백위대 대원들로 구성되었습니다. 기본 보급품조차 부족했던 군대에서 백위대 대원들이 가장 잘 훈련받고 장비를 갖춘 인력이었기 때문에, 이들의 기여는 중요했습니다."

FIN_mannerheim_legacy_idea:0 "만네르헤임의 유산"
FIN_mannerheim_legacy_idea_desc:0 "소련 국경에 요새를 건설하려는 만네르헤임의 계획 덕분에 핀란드에는 숙련된 군사 기술자들이 많이 남게 되었습니다. 우리는 그들의 지식이 낭비되게 해서는 안 됩니다."

FIN_stolentanks:0 "탈취와 학습"

FIN_communism_banned:0 "공산주의 금지"
FIN_communism_banned_desc:0 "핀란드 내 급진 우익 정당의 부상과 소련과의 관계 악화로 인해, 코민테른에 우호적인 SKP를 비롯한 핀란드의 많은 공산당이 금지되었습니다."

