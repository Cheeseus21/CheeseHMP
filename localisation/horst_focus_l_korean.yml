 USA_continue_the_new_deal1:0 "뉴딜 정책 지속"
 USA_continue_the_new_deal1_desc:0 "뉴딜 정책은 효과가 입증되었습니다. 이제 와서 방향을 잃어서는 안 됩니다"
 USA_the_new_american_generations:0 "침묵의 세대"
 USA_the_new_american_generations_desc:0 "1928년부터 1945년경까지 태어난 세대로, '가장 위대한 세대'의 뒤를 잇고 '베이비붐 세대'에 앞선 이들은 민권 운동의 지도자들이었습니다."
 USA_landon_deal:0 "랜던의 뉴딜"
 USA_landon_deal_desc:0 "§R앨프리드 모스먼 랜던 (1887년 9월 9일 – 1987년 10월 12일)§! - 미국의 석유업자이자 정치인으로, 1933년부터 1937년까지 제26대 캔자스 주지사를 역임했습니다. 공화당원이었던 그는 1936년 대통령 선거에서 공화당 후보로 지명되었으나, 현직 대통령이었던 프랭클린 D. 루스벨트에게 압도적인 표차로 패배했습니다. - §RGanked 추천§!"
 USA_reaffirm_the_gold_standart:0 "금본위제 재확인"
 USA_reaffirm_the_gold_standart_desc:0 "인플레이션을 억제하고, 외국 정부가 금으로 달러를 되사들여 체제에 과부하를 주는 것을 막기 위해 금본위제를 재확인해야 합니다."
 USA_cash_and_carry:0 "캐시 앤 캐리"
 USA_cash_and_carry_desc:0 "§R캐시 앤 캐리§! - 1939년 9월 21일, 유럽에서 전쟁이 발발한 후 미국 대통령 프랭클린 델라노 루스벨트가 미국 의회 합동 회의에서 발표한 정책입니다. 이 정책은 1937년의 중립법을 대체했습니다."
 USA_national_defence_research_committee:0 "국방연구위원회"
 USA_national_defence_research_committee_desc:0 "§R국방연구위원회(NDRC)§! - 무력 투쟁의 기구 및 장치의 개발, 생산, 사용의 근간이 되는 문제에 대한 연구를 조정, 감독, 수행하기 위해 설립된 미국 국가 국방 위원회 산하 위원회로, 1940년 6월 27일부터 1941년 6월 28일까지 존재했습니다."
 USA_urban_electrification_act:0 "도시 전력화법"
 USA_urban_electrification_act_desc:0 "§R1936년 도시 전력화법§! - 1936년 5월 20일에 제정되었으며, 미국 도시 지역에 전력을 공급하기 위한 배전 시스템 설치를 위해 연방 대출을 제공했습니다."
 USA_extraction_of_rare_metals:0 "희귀 금속 추출"
 USA_extraction_of_rare_metals_desc:0 "희귀 금속 추출은 신무기, 함선, 전차 생산에 도움이 될 것이며, 경제를 활성화하고 과학을 발전시키는 데에도 기여할 것입니다."
 USA_farm_secutity_administartion:0 "농업안정국"
 USA_farm_secutity_administartion_desc:0 "§R농업안정국(FSA)§! - 1937년에 창설된 뉴딜 정책 기관으로, 미국 대공황 시기 농촌의 빈곤을 퇴치하기 위한 것이었습니다. 재정착 관리국(1935–1937)의 후신입니다."
 USA_support_local_businnes:0 "지역 사업 지원"
 USA_support_local_businnes_desc:0 "선진국의 경험에서 알 수 있듯이, 중소기업은 경제에서 매우 중요한 역할을 합니다. 중소기업의 발전은 경제 성장, 과학 기술 발전의 가속화, 시장에 필요한 품질의 상품 공급, 추가 일자리 창출에 영향을 미칩니다."
 USA_naval_act_of_1938:0 "1938년 해군법"
 USA_naval_act_of_1938_desc:0 "§R1938년 해군법§! - 미 해군의 구성을 확립하고, 특정 해군 함정의 건조를 승인하며, 기타 목적을 위한 법안입니다."
 USA_keynesian_economist:0 "케인스 경제학"
 USA_keynesian_economist_desc:0 "1930년대 대공황 시기, 기존의 경제 이론은 전 세계적인 심각한 경제 붕괴의 원인을 설명하거나 생산과 고용을 재개하기 위한 적절한 공공 정책 해결책을 제공할 수 없었습니다."
 USA_cut_the_taxes:0 "세금 감면"
 USA_cut_the_taxes_desc:0 "대통령은 의회를 설득하여 25,000달러를 초과하는 소득에 100%의 세금을 부과하도록 시도할 것입니다."
 focus_on_europe:0 "유럽 집중"
 focus_on_europe_desc:0 "유럽에 집중함으로써 대부분의 지상군과 해군을 그곳에 집결시켜 이탈리아와 독일에 대한 작전을 수행할 수 있을 것입니다."
 USA_improve_our_building_plans:0 "전국 산업 부흥법"
 USA_improve_our_building_plans_desc:0 "§R전국 산업 부흥법§! - 대공황 시기 경제 회복을 촉진하기 위해 공식적으로 제정된 이 법은, 프랭클린 루스벨트 대통령이 공산품의 임금과 가격을 모두 규제할 수 있도록 허용했습니다."
