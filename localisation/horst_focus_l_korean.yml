 ### NATIONAL FOCUSES 
 NZL_a_sustainable_army:0 "지속 가능한 군대"
 NZL_a_sustainable_army_desc:0 "우리 군이 세계 최강은 아니지만, 투자와 훈련을 증강하여 전력을 개선했습니다."
 NZL_new_zealand_will_not_fall:0 "뉴질랜드는 무너지지 않는다"
 NZL_improve_the_radars:0 "레이더 개선"
 NZL_improve_the_radars_desc:0 "우리 레이더는 심각하게 구식이며, 해전이 발전함에 따라 우리의 기술도 발전해야 합니다."
 NZL_train_new_officers:0 "신임 장교 훈련"
 NZL_train_new_officers_desc:0 "우리의 역량을 향상시키기 위해 현재 해군 지휘부를 재편성해야 합니다."
 NZL_solidify_the_new_zealand_division:0 "상비 해군 창설"
 NZL_solidify_the_new_zealand_division_desc:0 "현재 우리 해군은 감탄할 만한 수준이 아니지만, 개선 조치를 취할 수 있습니다."
 NZL_naval_profit:0 "해군 이윤 증대"
 NZL_naval_profit_desc:0 "해군 산업은 우리나라에 큰 이익을 가져다주었으며, 계속 확장한다면 분명히 성과를 거둘 것입니다."
 NZL_form_the_new_zealand_navy:0 "뉴질랜드 해군 창설"
 NZL_form_the_new_zealand_navy_desc:0 "과거 우리 해군은 소규모 예비 함대에 불과했지만, 이제는 독자적인 군사력으로 만들 수 있습니다."
 NZL_destroyer_production:0 "구축함 생산"
 NZL_destroyer_production_desc:0 "구축함은 보유한 모든 해군에게 유용함이 입증되었으므로, 우리도 자체적으로 생산해야 합니다."
 NZL_submarine_production:0 "잠수함 생산"
 NZL_submarine_production_desc:0 "현대 해전에서 잠수함은 결정적인 요소였으므로, 우리도 자체 생산을 검토해야 합니다."
 NZL_supply_the_new_zealand_navy_divsion:0 "뉴질랜드 사단 보급"
 NZL_supply_the_new_zealand_navy_divsion_desc:0 "우리 해군을 유지하기 위해 장비가 필요합니다."
 NZL_support_ships:0 "민간 선박 전용"
 NZL_support_ships_desc:0 "지원함은 모든 해군에 필요하며, 우리 해군을 성장시키려면 필수적입니다."
 NZL_pride_of_the_fleet:0 "전함 설계 협력"
 NZL_pride_of_the_fleet_desc:0 "영국과 협력하여 새로운 전함 설계를 혁신할 수 있습니다."
 NZL_mution_companies_investments:0 "식민지 군수품 제조"
 NZL_mution_companies_investments_desc:0 "육군을 개선하기 위한 첫 단계는 우리 병사들을 위한 장비를 공급하고 생산하는 회사에 투자하는 것입니다."
 NZL_remember_anzac:0 "대전쟁의 교훈"
 NZL_remember_anzac_desc:0 "개선된 교리는 우리 군을 재정비하는 데 매우 중요하므로, 과거의 약점을 검토하고 개선해야 합니다."
 NZL_ford_munition_plant:0 "포드 군수 공장"
 NZL_ford_munition_plant_desc:0 "일부 미국 기업을 활용하여 우리나라에 군수 공장을 건설할 수 있습니다."
 NZL_new_charlton_automatic_rifles:0 "신형 찰턴 자동소총"
 NZL_new_charlton_automatic_rifles_desc:0 "미래에 발생할 수 있는 모든 분쟁에 대비하여 새로운 소총을 도입해야 합니다."
 NZL_expand_our_tank_warfare:0 "밥 셈플 전차 개발"
 NZL_expand_our_tank_warfare_desc:0 "우리나라는 기계화전으로 유명하지는 않지만, 시도해 볼 수는 있습니다."
 NZL_foundations_of_an_aritllery_regiment:0 "포병 연대의 기반"
 NZL_foundations_of_an_aritllery_regiment_desc:0 "포병 연대는 모든 군대에서 중요하므로, 우리만의 연대를 창설해야 합니다."
 NZL_engineer_and_supplY_corp:0 "공병 및 보급 군단"
 NZL_engineer_and_supplY_corp_desc:0 "유용할 수 있는 새로운 병과를 추가하여 우리 군을 더욱 성장시킵시다."
 NZL_construct_the_whenuapai_base:0 "훼누아파이 기지 건설"
 NZL_construct_the_whenuapai_base_desc:0 "우리 항공기들은 훈련하고 수리할 장소가 필요하며, 이 기지가 그들을 지원할 수 있습니다."
 NZL_fighter_productions:0 "방어용 항공기 생산"
 NZL_fighter_productions_desc:0 "전쟁이 발발할 경우, 뉴질랜드는 공습의 위협을 받게 될 것입니다. 이에 대한 방어 수단이 필요합니다."
 NZL_bomber_production:0 "영연방을 위한 항공기 개발"
 NZL_bomber_production_desc:0 "유럽과의 거리를 고려할 때, 우리나라는 전쟁 시 항공기를 개발하기에 최적의 장소가 될 것입니다."
 NZL_allocate_resources_to_the_rnzf:0 "RNZF에 자원 할당"
 NZL_allocate_resources_to_the_rnzf_desc:0 "전력을 늘리기 위해 항공기를 수입하여 싸울 기회를 마련해야 합니다."
 NZL_new_zealand_special_forces:0 "뉴질랜드 특수부대"
 NZL_new_zealand_special_forces_desc:0 "오늘날의 전쟁에서 특수부대는 제 역할을 다하고 있으므로, 이를 도입하는 것은 훌륭한 조치가 될 것입니다."
 NZL_piolt_recuitment_drive:0 "영연방 항공 훈련 계획"
 NZL_piolt_recuitment_drive_desc:0 "다른 영연방 회원국과 함께 훈련하여 조종사의 경험과 재능을 키울 수 있습니다."
 NZL_connect_the_nation:0 "국가 도로 위원회에 자금 지원"
 NZL_connect_the_nation_desc:0 "국내 및 군사적 용도 모두의 이동을 용이하게 하려면 도로 개선이 필요합니다."
 NZL_taranaki_oil_field:0 "타라나키 유전"
 NZL_taranaki_oil_field_desc:0 "우리나라는 천연자원이 제한적이지만, 유용하게 쓰일 수 있는 유전이 일부 있습니다."
 NZL_new_zealand_steel_works:0 "뉴질랜드 제철소"
 NZL_new_zealand_steel_works_desc:0 "우리나라의 강철은 다양한 용도로 사용될 수 있으므로, 이를 채취할 필요가 있습니다. "
 NZL_resource_imports:0 "새로운 무역 정책 채택"
 NZL_resource_imports_desc:0 "어떤 종류의 생산이라도 유지하려면, 우리의 천연자원이 어디에 투자되고 있는지 재검토해야 합니다."
 NZL_the_inudtrial_segment:0 "농촌 지역 산업화"
 NZL_the_inudtrial_segment_desc:0 "뉴질랜드에는 여전히 신도시와 산업 중심지를 건설할 최적의 부지가 있습니다. 이를 활용해야 합니다."
 NZL_the_wairarapa_sheep_farms:0 "와이라라파 양 목장"
 NZL_the_wairarapa_sheep_farms_desc:0 "수많은 목장에서 나오는 수익을 전쟁 수행에 투입할 수 있습니다."
 NZL_industrial_awakening:0 "도시 성장 촉진"
 NZL_industrial_awakening_desc:0 "몇몇 항구 도시가 경제 및 인구 측면에서 급격한 성장을 경험했습니다. 이 성장을 지속할 수 있다면 국가에 이로울 것입니다."
 NZL_negotiate_off_the_debt:0 "부채 탕감 협상"
 NZL_negotiate_off_the_debt_desc:0 "영국과 협상하여 향후 전쟁에서 지원하는 대가로, 부채 일부를 탕감받을 수 있습니다."
 NZL_distribute_the_national_defense_budget:0 "국방 예산 분배"
 NZL_distribute_the_national_defense_budget_desc:0 "오늘날의 국제 정세 속에서 국방군에 대한 예산 증액이 필요합니다."
 NZL_the_tsunami_project:0 "쓰나미 프로젝트"
 NZL_the_tsunami_project_desc:0 "미국과 협력하여 우리 섬을 방어할 수 있는 폭탄을 개발하는 것을 우선순위로 삼을 수 있습니다."
 NZL_hire_physicists:0 "물리학자 고용"
 NZL_hire_physicists_desc:0 "과학 지식을 증진하고 군사 프로젝트를 지원하기 위해 물리학자를 고용해야 합니다."
 NZL_Train_New_Officers:0 "신임 장교 훈련"
 NZL_Train_New_Officers_desc:0 "해군이 성장하려면, 장교의 수도 함께 늘어나야 합니다."
 NZL_hot_climate_equipment:0 "혹서기 장비 획득"
 NZL_hot_climate_equipment_desc:0 "전쟁 발발 시 부대가 혹서기 장비를 필요로 하는 지역에 배치될 수 있으므로, 해당 장비를 획득해야 합니다."
 NZL_form_the_new_zealand_air_force:0 "뉴질랜드 공군 창설"
 NZL_form_the_new_zealand_air_force_desc:0 "이제 우리 항공 부대는 영국 왕립 공군의 연장선에서 벗어나 독자적인 전투 부대로 거듭나야 할 때입니다."
 NZL_air_training_progam:0 "항공 훈련 프로그램"
 NZL_air_training_progam_desc:0 "영연방과 협력하여 조종사를 훈련하는 것은 유용할 것입니다."
 NZL_trust_in_the_opposition:0 "야당에 대한 신뢰"
 NZL_trust_in_the_opposition_desc:0 "맥밀런이 노동당을 이끌도록 선택되었습니다. 그가 성공하기 위해서는 국가의 신뢰가 필요합니다."
 NZL_public_health_service:0 "공중 보건 서비스"
 NZL_public_health_service_desc:0 "공중 보건 서비스를 설립하는 것은 노동당 복지 프로그램의 중요한 단계입니다."
 NZL_research_grants:0 "연구 보조금"
 NZL_research_grants_desc:0 "노동당은 연구가 국가 성장의 핵심적인 측면이라고 믿으며, 따라서 예산을 증액할 것입니다."
 NZL_review_the_prison_system:0 "교도소 체계 재검토"
 NZL_review_the_prison_system_desc:0 "우리나라의 교도소 체계는 근본적으로 결함이 있습니다. 우리는 이를 개선하려고 노력해야 합니다."
 NZL_reconcile_political_opponents:0 "정적과 화해"
 NZL_reconcile_political_opponents_desc:0 "존 A. 리는 언제나 재능 있는 지도자였습니다. 그의 기술을 활용할 수 있다면 그와 화해할 수도 있을 것입니다."
 NZL_denounce_conservative_politicians:0 "보수 정치인 규탄"
 NZL_denounce_conservative_politicians_desc:0 "보수적인 이상은 국가의 발전을 짓누릅니다. 우리는 모든 자원을 동원하여 그들을 침묵시켜야 합니다."
 NZL_frasers_leadership:0 "프레이저의 지도력"
 NZL_frasers_leadership_desc:0 "피터 프레이저는 유능한 지도자임을 증명했으며, 이 어려운 시기에 우리나라를 이끌 자격이 있습니다."
 NZL_rally_the_opponents:0 "반대파 규합"
 NZL_rally_the_opponents_desc:0 "국가를 발전시키기 위해 우리는 노동당 외부의 인물들을 포함한 모든 반대파와 협력해야 합니다."
 NZL_attempt_at_a_war_economy:0 "전시 경제 시도"
 NZL_attempt_at_a_war_economy_desc:0 "뉴질랜드 경제는 대규모 분쟁에 대비한 적이 없었지만, 지금은 그 어느 때보다도 시도하는 것 자체가 지극히 중요합니다."
 NZL_lower_labor_wages:0 "노동 임금 인하"
 NZL_lower_labor_wages_desc:0 "동원을 지원하기 위해, 우리는 경제를 더욱 성장시키려면 일부 임금을 삭감해야 합니다."
 NZL_silence_the_discontent:0 "불만 묵살"
 NZL_silence_the_discontent_desc:0 "일부 사람들이 우리의 더 가혹한 동원법에 불만을 품고 있는 것 같습니다. 이러한 사상이 일반 대중에게 퍼지기 전에 그들을 검열해야 합니다."
 NZL_fight_for_control_over_our_soldiers:0 "징병제 도입"
 NZL_fight_for_control_over_our_soldiers_desc:0 "우리나라는 분쟁 발생 시 복무할 더 많은 인원이 필요합니다. 인기가 없겠지만, 징병제를 다시 도입해야 할 때일지도 모릅니다."
 NZL_the_labour_partys_reform:0 "새비지 내각"
 NZL_the_labour_partys_reform_desc:0 "마이클 새비지와 노동당은 뉴질랜드 주민들에게 여러 가지를 약속했습니다. 이제 이 개혁안들을 통과시키기 시작할 때입니다."
 NZL_critize_uk_foreign_policy:0 "유화 정책 비판"
 NZL_critize_uk_foreign_policy_desc:0 "유화 정책은 정당한 외교 형태가 아닙니다. 이 문제에 대해 우리가 홀로 서더라도, 영국에 이 점을 전달하는 것이 중요합니다."
 NZL_protect_maori_land:0 "유용한 마오리 토지 몰수"
 NZL_protect_maori_land_desc:0 "마오리족은 우리의 자연스러운 확장에 필요한 여러 지역을 소유하고 있습니다. 이제 정당한 보상을 제공하고 이 토지를 되찾을 때입니다."
 NZL_respect_maori_culture:0 "원주민 문화 존중"
 NZL_respect_maori_culture_desc:0 "마오리족이 아무런 피해 없이 자신들의 전통을 실천할 수 있도록 허용해야 합니다."
 NZL_minor_native_representation_in_gov:0 "소수 원주민 대표"
 NZL_minor_native_representation_in_gov_desc:0 "일부 원주민이 뉴질랜드 정부 기구에서 발언권을 갖도록 허용할 수 있습니다. 이는 일부 시위대를 진정시킬 수 있을 것입니다."
 NZL_the_maori_division:0 "마오리 사단"
 NZL_the_maori_division_desc:0 "분쟁 발생 시 사단을 창설하도록 일부 마오리족 국회의원에게 압력을 가해야 합니다."
 NZL_begin_lobbying_for_reforms:0 "제안 위원회 배정"
 NZL_begin_lobbying_for_reforms_desc:0 "우리 국가가 사회 보장의 최상의 측면을 얻기 위해서는, 해당 법안에 대한 모든 개정안을 제안할 전문 위원회를 배정해야 합니다."
 NZL_universal_medical_benefits:0 "보편적 의료 혜택"
 NZL_universal_medical_benefits_desc:0 "모든 시민에게 기본적인 건강 혜택을 제공하는 것은 법안 통과를 향한 한 걸음입니다."
 NZL_nationalize_commerical_broadcasting:0 "상업 방송 국유화"
 NZL_nationalize_commerical_broadcasting_desc:0 "정부는 윤리적인 광고를 보장하기 위해 라디오를 통제해야 합니다."
 NZL_state_controlled_bank:0 "국가 통제 준비은행 설립"
 NZL_state_controlled_bank_desc:0 "우리는 대공황으로부터 교훈을 얻었으며, 그중 하나는 은행의 안전을 보장하는 것입니다."
 NZL_the_social_security_acts:0 "사회보장법"
 NZL_the_social_security_acts_desc:0 "노동당은 한동안 이 법안의 통과를 약속해 왔으며, 이는 뉴질랜드가 모두를 위한 진보적인 프로그램을 갖추도록 보장할 것입니다."
 NZL_unenmployment_benefit:0 "실업 수당"
 NZL_unenmployment_benefit_desc:0 "사회보장법안의 한 측면은 빈곤율을 낮추기 위한 실업 수당입니다."
 NZL_construct_state_housing:0 "국영 주택 건설"
 NZL_construct_state_housing_desc:0 "자신의 집을 구매하기에는 너무 빈곤한 사람들을 위한 주택은 모든 현대화된 국가에 필요합니다."
 NZL_the_second_nzl_volunteer_force:0 "제2차 의용군"
 NZL_the_second_nzl_volunteer_force_desc:0 "전쟁 발생 시, 뉴질랜드는 자신과 동맹국을 보호하기 위해 군대를 모집해야 합니다."
 NZL_old_age_pension:0 "노령 연금"
 NZL_old_age_pension_desc:0 "이 국가에 평생을 바친 노인 시민들을 부양하는 것은 정부의 임무입니다."
 NZL_open_ties_with_washington:0 "워싱턴과의 관계 개설"
 NZL_open_ties_with_washington_desc:0 "미국인들은 현대 세계에서 무시하기에는 너무 중요하므로, 그들과 관계를 여는 것은 유용할 것입니다."
 NZL_supply_food_stuffs:0 "장비를 대가로 식량 공급"
 NZL_supply_food_stuffs_desc:0 "비록 우리가 많은 병사를 투입하거나 장비를 보낼 수는 없지만, 식량 보급으로 구호를 보낼 수 있으며, 어쩌면 장비와 교환할 수도 있습니다."
 NZL_dedicate_men:0 "전쟁 수행에 인력 헌신"
 NZL_australian_nzl_agreement:0 "ANZAC 협정"
 NZL_australian_nzl_agreement_desc:0 "태평양에서의 우리 이익을 보장하기 위해, 이웃 국가들과 협력하여 우리 지역의 평화를 지켜야 합니다."
 NZL_national_party_triumphant:0 "국민당의 승리"
 NZL_national_party_triumphant_desc:0 "너무 오랫동안 노동당은 공허한 정책들만 약속해왔습니다. 국민당은 실제로 목표를 달성하고, 노동당의 실수를 바로잡을 수 있습니다."
 NZL_appeal_rural_communities:0 "농촌 지역 사회에 호소"
 NZL_appeal_rural_communities_desc:0 "우리 당의 주된 기반은 뉴질랜드 시골의 작은 농촌 마을에 있습니다. 우리의 지위를 유지하기 위해서는 그들을 달래야 합니다."
 NZL_condem_intervention:0 "정부 개입 규탄"
 NZL_condem_intervention_desc:0 "정부는 민간 기업에 관여하지 말고 경제에 일절 개입해서는 안 됩니다."
 NZL_absorb_conservative_remains:0 "보수 정당 흡수"
 NZL_absorb_conservative_remains_desc:0 "일부 노동당원들은 우리 당의 일부 정책에 공감하고 있습니다. 우리는 그들의 능력을 활용할 수 있을지도 모릅니다."
 NZL_equality_conscription:0 "징병을 통한 평등"
 NZL_equality_conscription_desc:0 "원주민 역시 징집되어야 합니다. 그들의 지위가 국가에 대한 의무로부터 그들을 보호해주지는 않습니다."
 NZL_fight_militant_worker_union:0 "호전적인 노동조합과의 투쟁"
 NZL_fight_militant_worker_union_desc:0 "일부 노조는 더 높은 임금으로 쉽게 진정되지 않으므로, 그들을 체포해야 한다면 그렇게 할 것입니다."
 NZL_tackle_inflation:0 "인플레이션 억제"
 NZL_tackle_inflation_desc:0 "인플레이션이 정말로 문제가 되기 전에 대책을 강구해야 합니다."
 NZL_war_council:0 "전시 자문 위원회"
 NZL_war_council_desc:0 "모든 정당이 참여하는 전쟁 위원회를 창설하면 우리 군의 성과를 향상시킬 수 있습니다."
 NZL_open_up_to_free_market:0 "자유 시장 개방"
 NZL_open_up_to_free_market_desc:0 "자유 시장 개방은 우리 당의 주된 목표입니다. 선거에서 승리한 지금, 마침내 그 목표를 달성할 수 있습니다."
 NZL_combined_intelligence_centre:0 "연합 정보 본부"
 NZL_combined_intelligence_centre_desc:0 "암호화된 메시지를 확보하고 해독하기 위해 영국과 협력해야 합니다. "
 NZL_construct_shore_fortification:0 "해안 요새 건설"
 NZL_construct_shore_fortification_desc:0 "모든 침략자에 대비하여 해안선을 준비하고 우리의 안전을 보장해야 합니다."
 NZL_emerge_from_the_caves:0 "공산주의 운동 통합"
 NZL_emerge_from_the_caves_desc:0 "뉴질랜드의 공산주의 운동은 기사를 찍어내고 시위나 하는 동굴 거주자들의 무리에 지나지 않습니다. 권력을 얻으려면 우리는 하나의 정당으로 통합해야 합니다."
 NZL_lobby_soviet:0 "소비에트 연방에 로비"
 NZL_lobby_soviet_desc:0 "우리가 권력을 잡는다면 소비에트 연방은 가장 중요한 투자자가 될 것이므로, 그들의 지원을 확보해야 합니다."
 NZL_the_peoples_voice:0 "인민의 목소리"
 NZL_the_peoples_voice_desc:0 "인민의 목소리는 대중에게 우리의 이상을 전파하는 가장 강력한 수단입니다. 계속해서 발행되도록 해야 합니다."
 NZL_invite_radical_labour_exiles:0 "급진 노동당 망명자 초청"
 NZL_invite_radical_labour_exiles_desc:0 "존 A. 리와 빌 바너드는 우리의 대의에 어느 정도 공감할 수 있으며, 그들의 기술과 영향력을 간과해서는 안 됩니다."
 NZL_new_wave_of_feminism:0 "페미니즘의 새로운 물결"
 NZL_new_wave_of_feminism_desc:0 "우리의 새로운 국가에서는 양성을 포함한 모든 사람이 법 앞에 평등해야 합니다."
 NZL_maori_equality:0 "완전한 마오리족 평등"
 NZL_maori_equality_desc:0 "마오리족은 너무 오랫동안 억압받아 왔습니다. 그들은 다른 모든 시민과 동등한 권리를 누릴 자격이 있습니다."
 NZL_nationalize_bank:0 "뉴질랜드 은행 국유화"
 NZL_nationalize_bank_desc:0 "지속적인 경제 성장을 보장하기 위해 뉴질랜드 은행을 국유화해야 합니다."
 NZL_public_housing:0 "공공 주택 우선 공급"
 NZL_public_housing_desc:0 "기본적인 생활 필수품을 감당할 수 없는 시민들에게 제공하는 것은 우리 국가의 진보성을 보여줄 것입니다."
 NZL_encourage_selfless_citizens:0 "이타적인 시민 장려"
 NZL_encourage_selfless_citizens_desc:0 "이 세상에서 살아남으려면 모든 주민이 이타심과 미덕을 갖추어야 합니다. 비겁함이 설 자리는 없습니다."
 NZL_join_sov:0 "연방과의 동맹"
 NZL_join_sov_desc:0 "우리는 수적으로 열세이며 적대적인 이웃들에게 둘러싸여 있습니다. 생존을 보장하기 위해 공산주의의 옹호자들과 동맹을 맺어야 합니다."
 NZL_neutral:0 "내정 안정화"
 NZL_neutral_desc:0 "국가에 대한 우리의 통치를 공고히 하는 것이 외교 문제에 관여하는 것보다 더 중요합니다."
 NZL_legion_ideals:0 "레기온의 이상 부활"
 NZL_legion_ideals_desc:0 "레기온은 사라진 지 꽤 오래되었지만, 그들의 이상은 여전히 유효합니다. 우리는 그들의 당에 아직 남아있는 사람들에게 힘을 실어주어야 합니다."
 NZL_party_funding:0 "정당 자금 확보"
 NZL_party_funding_desc:0 "레기온은 재정 지원 부족으로 고사했습니다. 우리는 같은 실수가 반복되도록 내버려 둘 수 없습니다."
 NZL_unite_party:0 "레기온 통합"
 NZL_unite_party_desc:0 "레기온은 분열된 정당이므로, 통제권을 장악하기 위해서는 모든 그룹을 통합하는 것이 필요한 단계입니다."
 NZL_the_individual:0 "개인주의의 지침"
 NZL_the_individual_desc:0 "개인은 우리 국가가 가진 가장 위대한 자원이며, 개인의 자유를 포용하는 것은 우리 교리의 핵심입니다."
 NZL_insulationsim:0 "경제적 고립주의"
 NZL_insulationsim_desc:0 "경제 정책에 대해 더 보수적인 입장을 취하는 것은 뉴질랜드에 대한 우리의 통제력을 공고히 하는 데 유용한 도구가 될 수 있습니다."
 NZL_minimalize_government_spending:0 "정부 지출 최소화"
 NZL_minimalize_government_spending_desc:0 "정부의 역할은 시장에 개입하는 것이 아닙니다. 이는 성장률을 낮추고 번영을 저해할 뿐입니다."
 NZL_maori_assimilation:0 "마오리족 동화"
 NZL_maori_assimilation_desc:0 "마오리족은 시위를 계속하는 대신 사회에 동화되는 법을 배워야 합니다."
 NZL_ban_poarties:0 "정당 활동 금지"
 NZL_ban_poarties_desc:0 "정당은 국가를 분열시킬 뿐이며, 우리는 모두 동포로서 단결해야 합니다."
 NZL_join_jap:0 "대동아공영권 가입"
 NZL_join_jap_desc:0 "일본은 아시아에서 떠오르는 강대국이며, 우리 자신을 보호하기 위해서라도 그들과 합류해야 합니다."
 NZL_home_defence:0 "향토 방위군 창설"
 NZL_home_defence_desc:0 "싸울 수는 있지만 전성기나 최상의 상태가 아닌 잠재적 병사들로 본토 섬들을 방어하기 위한 민방위군을 창설해야 합니다."

 NZL_increased_defense_spending:0 "국방비 증액"
 NZL_increased_defense_spending_desc:0 "전쟁에는 현대적인 장비가 필요하며, 동맹국의 연구 결과에만 의존할 수는 없습니다."
 NZL_central_research_planning:0 "중앙 연구 계획"
 NZL_central_research_planning_desc:0 "경제 계획은 국가가 미래에 필요로 할 기술로 과학자들을 이끄는 것을 의미합니다. 마치 위대한 지성이 미래를 보고 최선의 선택을 하는 것처럼 말입니다."
 NZL_national_research_grants:0 "국가 연구 보조금"
 NZL_national_research_grants_desc:0 "우리는 외국의 혁신보다 현저히 우수한 우리 고유의 혁신에 의존해야 합니다. 그것이 바로 이 섬의 주민들이 위험한 새들에게 패배하는 대신 그들을 제거한 방법입니다."
 NZL_corporate_innovations:0 "기업 혁신"
 NZL_corporate_innovations_desc:0 "민간 부문은 신기술을 개발하는 방법을 알고 있으며, 경쟁을 통해 우리나라의 최고 역량을 이끌어낼 것입니다."

 NZL_naval_equipment:0 "해군 장비"
 NZL_naval_equipment_desc:0 "현대적인 선체도 현대적인 장비 없이는 아무 소용이 없습니다."

 ###################
 NZL_a_poor_army:0 "장비가 부족한 군대"
 NZL_a_poor_army_desc:0 "우리 경제는 영국이나 프랑스만큼 효과적인 대규모 군대를 지원할 만큼 강력하지 않습니다. 이로 인해 우리 군은 강대국의 그늘에 가려져 있습니다."
 NZL_destruction_of_the_lee_afair:0 "존 리 축출"
 NZL_destruction_of_the_lee_afair_desc:0 "존 A. 리는 급진적인 면모로 알려진 저명한 정치인이었습니다. 그는 노동당의 모든 행보를 신랄하게 비판했으며, 이에 대한 대응으로 우리는 그를 막강한 권력을 가진 직위에서 강등시켰습니다."
 NZL_upset_maori_population:0 "불만을 품은 원주민"
 NZL_upset_maori_population_desc:0 "원주민들은 꽤 오랫동안 거리에서 폭동을 일으켜 왔으며, 이는 주로 자치권 문제와 토지 몰수 때문입니다. 이제 잠재적인 해결책을 찾아야 할 때일지도 모릅니다."
 NZL_organizing_communists:0 "조직화되는 공산주의자들"
 NZL_stiff_opposition:0 "거센 반대"
 NZL_unemployment_benefit:0 "실업 수당"
 NZL_the_engineer_corp:0 "포병 연대"
 NZL_create_a_satnding_navy:0 "상비 해군 창설"
 NZL_lessons_of_the_great_war:0 "대전의 교훈"
 NZL_pilot_recruitment_drive:0 "조종사 모집 운동"
 socialist_finance_minister:0 "사회주의 재무장관"
 socialist_follower:0 "리 지지자"
 labour_party_remnant:0 "노동당 잔존파"
 NZL_obtain_funding:0 "정당 자금 확보"
 NZL_prioritize_house:0 "공공 주택"
 NZL_fight_for_authority_over_our_troops:0 "징병제 도입"
 NZL_commie_tt:0 "이 중점을 완료하면 선거에서 공산주의 루트가 해금됩니다"
 NZL_legion_tt:0 "이 중점을 완료하면 선거에서 파시스트 루트가 해금됩니다"
 
 new_zealand.1.t:0 "마이클 새비지 병세 악화, 신임 총리 임명 예정"
 new_zealand.1.d:0 "긴장이 고조되고 노동당이 분열된 상황에서, 병세가 악화되는 마이클 조지프 새비지의 후계자를 선택해야 합니다. 피터 프레이저는 유능한 지도자임을 증명했으며, 월터 내시와 새비지 총리 모두에게서 높은 지지를 받았습니다. 하지만 거번 맥밀런이 이끄는 새비지 반대파는 자신들의 의제를 더욱 강하게 밀어붙이고 있습니다. 논란이 많은 인물인 맥밀런은 추방된 노동당원 존 A. 리에게 동정심을 표하여 엄청난 비난을 받고 있습니다."
 new_zealand.1.a:0 "피터 프레이저가 노동당의 병폐를 해결할 최선의 방책입니다."
 new_zealand.1.b:0 "거번 맥밀런의 온건함이 노동당을 바로잡을 것입니다."
 new_zealand.1.c:0 "당이 너무 분열되어 선택할 수 없습니다. 결정할 시간이 더 필요합니다."
 new_zealand.2.t:0 "마이클 조지프 새비지 총리 서거"
 new_zealand.2.d:0 "마이클 새비지 총리가 오늘 서거했습니다. 그는 뉴질랜드가 영국과 함께할 것이며 국가에 대한 지지를 선언했습니다. 그는 영웅이자, 잘못되었다고 생각하는 것을 비판하기를 두려워하지 않았던 위대한 지도자였습니다. 모두가 그를 그리워할 것입니다. 이제 노동당은 그의 서거에 맞춰 재정비하고 국가를 이끌 준비를 해야 합니다."
 new_zealand.2.a:0 "편히 잠드소서."
 new_zealand.2.b:0 "당이 준비하도록 두십시오. 지금은 새로운 미래를 위한 때입니다."
 new_zealand.3.t:0 "1938년 총선거"
 new_zealand.3.d:0 "이번 선거에서 맞붙는 두 주요 정당은 대중의 마음을 얻기 위해 점점 더 좋은 공약을 내걸고 있습니다. 노동당은 꽤 오랫동안 국가를 이끌어 왔으며, 노령 연금과 실업 수당을 약속하는 사회 보장법 통과를 공약으로 내세웠습니다. 이는 노동당의 정책을 공개적으로 비판하는 국민당에 비해 훌륭한 지렛대가 되었습니다. 국민당은 신생 정당이지만 수년간 인기가 상승해 왔으며, 노동당 정부의 약점을 파고들어 지지를 결집했습니다. 선거는 노동당에 유리할 가능성이 높지만, 국민당이 다른 결과를 증명할 가능성도 있습니다."
 new_zealand.3.a:0 "노동당은 약속을 지켜야 합니다."
 new_zealand.3.b:0 "노동당의 시대는 끝났습니다. 국가는 필요한 변화를 단행해야 합니다."
 new_zealand.3.c:0 "뉴질랜드는 인민의 미래, 즉 우리 자신의 미래를 개척할 것입니다."
 new_zealand.3.e:0 "군단이 뉴질랜드를 영광으로 이끌 것입니다."
 new_zealand.4.t:0 "군단 잔존파, 노동당원 사임 강요"
 new_zealand.4.d:0 "노동당 총리 마이클 새비지 서거 후, 존 오먼드가 이끄는 군단 지지자들이 피터 프레이저와 월터 내시 같은 저명한 노동당 관리들의 사임을 요구하기 시작했습니다. 지도자의 죽음과 명확한 후계자 부재로 약화된 노동당 정부는 오먼드의 요구에 별다른 저항 없이 응하는 것으로 보입니다. 군단이 뉴질랜드의 미래에 주요 정당이 될 수 있을지는 시간이 지나야 알 수 있을 것입니다."
 new_zealand.4.a:0 "군단은 뉴질랜드의 미래를 위한 최고의 희망입니다."
 new_zealand.5.t:0 "공산주의 신문, 전국으로 확산되다"
 new_zealand.5.d:0 "주요 도시에서 이상한 신문들이 점점 더 퍼지고 있으며, 이는 군단 잔존 세력과 노동당의 이상에 정면으로 반대하는 새로운 체제를 옹호하고 있습니다. 아무도 이 신문들의 출처를 찾지 못했지만, 시골 지역의 가능한 은신처에서 나오는 것으로 추정됩니다. 그 결과 일부는 더욱 동요하게 되었고, 모든 정부 관료의 해임과 군단 및 그 지도자 오먼드의 종식을 요구하는 폭동이 전국적으로 일어났습니다. 지도자가 없는 노동당은 이에 순응할 것으로 보이지만, 오먼드는 자신의 지지자들과 함께 폭동에 맞서 싸우겠다고 위협했습니다."
 new_zealand.5.a:0 "물러나십시오, 공산주의자들이 우리보다 수가 많습니다."
 new_zealand.5.b:0 "이 폭동을 즉시 진압하십시오. 상황을 악화시킬 뿐입니다."
 new_zealand.6.t:0 "총독, 충성파를 규합하다"
 new_zealand.6.d:0 "뉴질랜드의 자치령 지위에 의문이 제기되고 영국에서 군주제가 완전한 권력을 되찾으면서, 많은 정당이 독립을 제안하고 있습니다. 그러나 조지 몽크턴-아룬델 총독이 이끄는 강력한 충성파 운동이 국가 내 통제력을 공고히 하려 시도하고 있습니다. 이 운동은 이미 웰링턴 거리에서 급진 정당들 간의 공개적인 전투를 촉발시켰으며, 일부는 국가의 안보에 의문을 제기하게 만들었습니다."
 new_zealand.6.a:0 "총독이 요구하게 두십시오. 뉴질랜드는 영국과 함께할 것입니다."
 new_zealand.6.b:0 "모든 충성파 운동을 진압하십시오. 이들은 우리 안보에 위협이 됩니다."
 new_zealand.9.t:0 "공산주의자들, 노동당과 군단을 축출하다"
 new_zealand.9.d:0 "공산당의 인기가 계속해서 높아지면서, 특히 노동당 정부가 붕괴한 이후 사람들은 새롭게 부활한 군단에 맞서 폭동을 일으켰습니다. 수적으로 열세에 몰린 오먼드 씨는 물러났고, 뉴질랜드의 미래를 공산당의 손에 맡겼습니다."
 new_zealand.10.t:0 "시드니 홀랜드, 통제권을 장악하다"
 new_zealand.10.d:0 "오늘 애덤 해밀턴이 국민당 대표와 총리직에서 물러나면서 그 자리는 시드니 홀랜드에게 열렸습니다. 홀랜드는 가치 있는 후계자임을 증명했으며, 국민당의 의제를 계속 이어나갈 것이라고 밝혔습니다."
 new_zealand.10.a:0 "홀랜드는 큰 가능성을 보여줍니다."

