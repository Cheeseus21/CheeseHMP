 JAP_CHI_reorganize_military_advance_in_china:0 "중국 내 군사 진격 재편성"
 JAP_CHI_reorganize_military_advance_in_china_desc:0 ""
 JAP_CHI_find_a_common_way_out:0 "공동의 출구 모색"
 JAP_CHI_find_a_common_way_out_EXPL:0 "   중일전쟁을 끝내기 위해 [CHI.GetFlag]§H[CHI.GetName]§!에게 소규모, 중규모 또는 대규모의 §H요구§!를 합니다.\n\n이것은 §C대응 중점§!입니다. [CHI.GetFlag]§H[CHI.GetName]§!의 §H항복 진행도§!가 높을수록, §H요구§!의 범위는 더 §G커집니다§!.\n"
 JAP_CHI_find_a_common_way_out_desc:0 ""
 JAP_CHI_establish_reorganized_government_of_china:0 "중화민국 유신정부 수립"
 JAP_CHI_establish_reorganized_government_of_china_EXPL1:0 "§H왕징웨이§! 휘하의 정권이 §H난징§!을 수도로 하여 [CHI.GetFlag]§H[CHI.GetName]§!에서 §H내전§!을 시작할 것입니다. 우리가 통제하는 §H중국§! 내 모든 주가 그들에게 이양될 것입니다.\n"
 JAP_CHI_establish_reorganized_government_of_china_EXPL2:0 "   §H[608.GetName]§!, §H[614.GetName]§!, §H[597.GetName]§!, §H[743.GetName]§!, §H[598.GetName]§!을(를) 직접 통제합니다.\n   §H왕징웨이§! 군대에 §H장비§!를 제공합니다.\n"
 JAP_CHI_establish_reorganized_government_of_china_desc:0 ""
 JAP_CHI_ichi_go_sakusen:0 "이치고 작전"
 JAP_CHI_ichi_go_sakusen_EXPL:0 "   이 임무를 성공적으로 §G완수§!하려면 [CHI.GetFlag]§H[CHI.GetName]§!을(를) §H항복§!시키거나, 그들의 모든 해안 주와 [GXC.GetFlag]§H[GXC.GetName]§!의 모든 주를 통제해야 합니다.\n"
 JAP_CHI_ichi_go_sakusen_desc:0 "이치고 작전, 즉 '1호 작전'은 일본 군사 역사상 가장 큰 규모의 작전입니다. 이치고 작전의 두 가지 주요 목표는 프랑스령 인도차이나로 가는 육로를 개척하고, 미국 폭격기가 일본 본토와 수송선을 공격하는 중국 남동부의 공군 기지를 점령하는 것입니다."
 JAP_CHI_retool_chinese_industry:0 "중국 산업 개편"
 JAP_CHI_retool_chinese_industry_EXPL:0 "사용 가능한 중국 내 모든 해안 주에서 §H민간 공장 1개§! 제거.\n영향을 받은 모든 주에 건설 슬롯 §G1§!개, §H군수 공장 1개§!, §H조선소 1개§! 추가."
 JAP_CHI_retool_chinese_industry_desc:0 ""
