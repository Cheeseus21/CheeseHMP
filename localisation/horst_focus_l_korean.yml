 SOV_shattered_retreat:0 "궤멸적 후퇴"
 SOV_shattered_retreat_desc:0 "독일군의 초기 공격으로 아군이 완전히 궤멸되었습니다! 후퇴하여 재정비해야 합니다!"
 SOV_regroup:0 "전선 재정비"
 SOV_regroup_desc:0 "최악의 상황은 넘겼으니, 이제 군을 재정비하고 반격을 개시해야 합니다!"
 SOV_directive_three:0 "지령 제3호"
 SOV_directive_three_desc:0 "스탈린 동지께서 지금 즉시 반격을 개시하길 원하십니다! 전선을 밀어내고 귀중한 시간과 공간을 최대한 확보해야 합니다!"
 SOV_operational_space:0 "작전 공간"
 SOV_operational_space_desc:0 "이번 반격을 성공이라 부를 수 있을지는 모르겠지만... 전선을 따라 여러 기동을 개시할 충분한 공간을 확보하는 데는 성공했습니다!"
 SOV_stockpile_for_the_next_attack:0 "춘계 공세 비축"
 SOV_stockpile_for_the_next_attack_desc:0 "이번 겨울 동안 가능한 한 많은 물자를 비축하고, 다음 작전을 준비할 것입니다!"
 SOV_winter_offensive:0 "동계 공세"
 SOV_winter_offensive_desc:0 "독일군은 정말로 눈을 본 적이 없는 모양입니다! 바로 지금, 여기서 놈들을 격파할 수 있습니다!"
 SOV_operational_space_tt:0 "반격이 성공할 경우, 120일 동안 다음 효과를 얻습니다; \n\n£organization_texticon 사단 조직력: §G+%10.0§!\n£army_morale_texticon 사단 회복률: §G+%10.0§! \n\n패배할 경우, 동일한 보정치와 함께 체력 약화 효과를 받습니다: \n\n£organization_texticon 사단 조직력: §G+%10.0§!\n£army_morale_texticon 사단 회복률: §G+%10.0§!\n£strenght_texticon  체력: §R-%10.0§!"
 
