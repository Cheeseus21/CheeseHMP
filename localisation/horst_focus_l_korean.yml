 YUG_give_up_serbia_tt:0 "독일의 지원을 받아 세르비아 분리주의를 억제하고, 독일이 §R세르비아를 군사 점령§!하도록 허용할 것입니다."
 YUG_give_up_croatia_tt:0 "추축국에 우호적인 정부가 영유권을 주장하는 §R영토를 할양§!하여, 추축국 가입에 대한 반대를 제거할 것입니다."
