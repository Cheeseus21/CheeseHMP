 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor:0 "진주만 함대 선제 타격"
 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_EXPL:0 "§H진주만§!에 위치한 [USA.GetFlag]§H[USA.GetName]§!의 기지를 상대로 최대 §H세 차례의 공격§!을 개시합니다. 공격은 다음과 같은 §G효과§!를 가질 수 있습니다:\n   최대 §H4척§!의 전함 격침.\n   §H기반시설§! 및 §H해군 기지§!에 피해를 입힙니다.\n   §H하와이§!에서 숙련된 사단 §H12개§!를 획득합니다.\n   태평양에서 미국의 §H해군 능력§!을 저해합니다.\n[USA.GetFlag]§H[USA.GetName]§!에 §R전쟁을 선포§!합니다.\n[USA.GetFlag]§H[USA.GetName]§!은 우리가 개시한 공격 횟수에 따라 우리를 상대로 한 §H전쟁 지지도§!, §H징병률§!, §H공격§!에 상당한 §R보너스§!를 받게 됩니다."
