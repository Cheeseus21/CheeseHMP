raj_investor_relations_desc:0 "새롭게 수립된 인도 시장 경제에 초대된 외국인 투자자들은 즉시 그들이 원하던 이익을 찾아냈습니다. 하지만 필연적으로 야망과 함께 기대치도 커지기 마련이며, 우리가 이를 충족시키지 못한다면 투자의 흐름이 끊길 수도 있습니다.\n\n  그들의 현재 태도는 [RAJ.GetInvestorRelations]입니다.\n  이로 인해 현재 투자 간격은 다음과 같습니다:\n   [?RAJ.investors_timeout|Y0]일 (투자 횟수로 인해 +[?RAJ.num_of_investments_days])\n  그리고 특정 건물 건설 속도 보너스는 [?RAJ.investor_bonus|G%2]입니다.\n"
