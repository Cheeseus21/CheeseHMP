  SIA_convoy_tactics:0 "호위 소함대"




  SIA_thai_empire_lands:0 "일본 선배를 돕는 대가로 프랑스령 인도차이나를 받게 될 것이며, 싱가포르와 프랑스령 인도차이나에 추가 핵심 주를 획득할 것입니다!"
  SIA_disturbing_indochina_decision:0 "인도차이나 교란"
  SIA_disturbing_indochina_decision_desc:0 "인도차이나의 우리 동지들은 프랑스 식민주의자들의 억압 아래 계속 고통받고 있습니다. 그들은 우리의 도움이 필요하며, 우리는 그들을 위해 존재합니다! 그들이 충분히 준비되면, 우리는 제국주의의 지배로부터 인도차이나를 해방시킬 최후의 봉기를 일으킬 수 있습니다!\n\n베트남 내 선동: §Y[?SIA.vietnam_agitation]%§!\n\n라오스 내 선동: §Y[?SIA.laos_agitation]%§!\n\n캄보디아 내 선동: §Y[?SIA.cambodia_agitation]%§!"
  SIA_smuggle_weapons_in_vietnam:0 "베트남에 무기 밀수:\n§R베트남 내 선동 +10%§!"
  SIA_smuggle_weapons_in_laos:0 "라오스에 무기 밀수:\n§R라오스 내 선동 +10%§!"
  SIA_smuggle_weapons_in_cambodia:0 "캄보디아에 무기 밀수:\n§R캄보디아 내 선동 +10%§!"
  SIA_launch_the_insurrection:0 "봉기 개시!"
  SIA_sabotage_campaign:0 "사보타주 작전:\n§R모든 지역에 선동 +8%§!"
  SIA_ask_for_soviet_help:0 "소련에 지원 요청:\n§R소련의 응답에 따라 결정됨§!"
  SIA_invade_indochina:0 "인도차이나 침공:\n§R프랑스와 전쟁!§!"


  SIA_join_the_allies:0 "연합국 가입"
  SIA_join_the_allies_desc:0 "영국은 세계의 주요 강대국 중 하나이며, 과거 우리 두 국가는 주로 버마 영토를 두고 여러 차례 전쟁을 치렀습니다. 하지만 일본 제국과 같은 새로운 위협이 등장함에 따라, 적어도 파시즘과 같은 위험이 극복될 때까지는 영국과 군사 동맹을 맺는 것이 우리의 국익에 부합할 것입니다."
  SIA_woo_australia:0 "오스트레일리아 포섭"
  SIA_woo_australia_desc:0 "최근 영국으로부터 독립한 오스트레일리아는 일본의 위협을 억제하기 위해 주로 태평양에 초점을 맞춘 자체 군사 동맹을 창설했습니다. 그들과 동맹 조약을 체결하면 우리의 안전을 보장할 수 있을 것입니다."
  SIA_treaty_with_japan:0 "일본과의 조약"
  SIA_treaty_with_japan_desc:0 "일본에 민주적이고 팽창주의에 반대하는 새 정부가 들어섰습니다. 이제 일본이 더 이상 위협이 되지 않으므로, 앞으로 발생할 수 있는 새로운 위협으로부터 서로를 보호하기 위해 동맹 조약을 체결해야 합니다."
  SIA_alliance_with_china:0 "중국과의 동맹"
  SIA_alliance_with_china_desc:0 "최근 일본 제국을 격파한 중국 정부는 주로 아시아에 초점을 맞춘 자체 동맹을 창설하기로 결정했습니다. 이 신흥 강대국과 힘을 합치는 것이 우리의 국익에 부합할 것입니다."
  SIA_ally_with_the_united_states:0 "미국과 동맹"
  SIA_ally_with_the_united_states_desc:0 "미국은 자유와 민주주의 이념의 주된 수호자이며, 자체적인 정치 동맹을 창설하기로 결정했습니다. 미국은 일본 제국주의에 저항하기에 가장 좋은 위치에 있으므로, 그들의 동맹에 가입하기 위한 협상을 하는 것이 현명할 것입니다."
  SIA_help_france:0 "프랑스 지원"
  SIA_help_france_desc:0 "프랑스가 인도차이나를 식민지화하는 동안 우리를 분열시킨 주된 국가 중 하나였던 것은 사실입니다. 하지만 오늘날, 훨씬 더 심각한 위험이 다가오고 있습니다. 영토 분쟁은 나중에 해결할 것이며, 지금은 우리 국가 자체를 방어해야 할 때입니다."


  SIA_join_the_axis:0 "추축국 가입"
  SIA_join_the_axis_desc:0 "독일은 재무장했으며 구 협상국 세력과 싸울 준비가 된 것으로 보입니다. 우리의 목표는 공통되므로, 그들과 힘을 합치는 것이 우리의 국익에 부합할 것입니다."
  SIA_treaty_with_italy:0 "이탈리아와의 조약"
  SIA_treaty_with_italy_desc:0 "파시즘의 발상지인 이탈리아는 우리가 새로운 국가를 건설하는 데 있어 모델이 되는 국가입니다. 이탈리아는 자체 군사 동맹을 결성하기로 결정했으며, 이에 합류를 모색하는 것이 흥미로울 것입니다."
  SIA_alliance_with_japan:0 "일본과의 동맹"
  SIA_alliance_with_japan_desc:0 "일본은 아시아의 주요 강대국이며, 서구 제국주의자들과 맞서기로 결심한 것으로 보입니다. 우리의 목표는 같으므로, 그들과 힘을 합쳐야 합니다."

  SIA_alliance_with_japan_monarchist:0 "일본의 보호 요청"
  SIA_alliance_with_japan_monarchist_desc:0 "일본 제국은 아시아 전역으로 영향력을 계속 확장하며 서구 열강과 대치하고 있습니다. 그들의 멍에 아래 놓이기를 원치 않는다면, 동맹 조약을 체결하는 것이 더 나을 것입니다."
  SIA_alliance_with_britain_monarchist:0 "영국과의 동맹"
  SIA_alliance_with_britain_monarchist_desc:0 "일본 제국이 아시아에 대한 지배만을 원하며, 언젠가 우리 국가를 공격할 의도임이 분명합니다. 이를 피할 유일한 방법은 영국과 동맹을 맺고 일본을 격파할 수 있기를 바라는 것뿐입니다."

  SIA_join_the_communist_faction:0 "[FROM.getFactionName]에 가입"
  SIA_join_the_communist_faction_desc:0 "[FROM.getNameDefCap]은(는) 세계의 주요 공산주의 세력 중 하나로 여겨집니다. 혁명이 승리하기를 원한다면, 우리는 단결해야 합니다"

  SIA_reintegrate_cambodia:0 "캄보디아 재통합"
  SIA_reintegrate_cambodia_desc:0 "수 세기 동안 캄보디아 지역은 우리의 통제하에 있었으며, 두 민족은 많은 뿌리를 공유합니다. 이제 우리가 이 지역을 다시 점령했으니, 그들의 행정부를 재조직하여 우리 나라의 한 지방으로 만들 때입니다"
  SIA_reintegrate_laos:0 "라오스 재통합"
  SIA_reintegrate_laos_desc:0 "라오스가 이제 우리의 통제하로 돌아왔습니다. 라오스인들은 우리 민족과 같은 타이족의 뿌리를 공유하며, 이제 그들을 우리 국가에 완전히 통합할 때입니다"

 # Events
  siam.1.t:0 "논타부리 연설"
  siam.1.d:0 "카나 랏사돈의 민간부 소속으로, 때로는 마르크스주의에 가까운 급진적인 토지 개혁 사상으로 알려진 쁘리디 파놈용이 오늘 논타부리 시에서 연설을 했습니다.\n\"친애하는 시암 국민 여러분, 퇴폐적이고 시대에 뒤떨어진 정치 체제에서 벗어나 마침내 국민이 목소리를 낼 수 있는 체제로 전환하게 한 우리의 영광스러운 혁명이 오늘 시험대에 오른 것 같습니다. 저 자신도 제가 속한 바로 그 정당 내에서 일부 세력이 자신들만의 독재를 세우고 싶어 한다는 것을 알아차렸습니다. 차이점이라면 왕과 귀족들이 장군과 군인들로 대체될 것이라는 점뿐입니다. 하지만 저는 시암 국민을 믿습니다. 그들은 결코 그런 일이 일어나도록 내버려 두지 않을 것입니다. 우리는 한 번 폭정을 물리쳤고, 다시 한번 물리칠 것입니다.\"\n많은 이들은 이 연설이 전 총리였던 프라야 마노빠꼰 니띠타다에 대한 쿠데타 이후 총리가 된 프라야 파혼폰파유하세나를 겨냥한 것이라고 믿고 있습니다. 쁘리디는 마노빠꼰과 가까웠지만, 그의 개혁 계획 때문에 공산주의자로 몰렸습니다. 이 연설이 영향을 미칠지 여부는 아무도 모르지만, 우리는 쁘리디를 계속 주시해야 할 것입니다"
  siam.1.a:0 "고작 교사 한 명이 무슨 해를 끼칠 수 있겠는가?"


  siam.2.t:0 "라디오 세리팝"
  siam.2.d:0 "자유 타이 운동이 그들의 통제력이 가장 강한 북부 지역의 라디오 방송국을 장악한 것 같습니다. 그들은 이 방송국을 이용해 '자유 라디오'를 의미하는 '라디오 세리팝'을 방송하며, 체제에 대한 맹렬한 공격과 함께 매번 합류를 촉구하고 있습니다. 일부 방송은 정부가 패배한 후 시암을 어떻게 재편할 것인가에 대한 토론과도 관련이 있는데, 반군 내에서 구성원 수가 거의 동등해 보이는 자유주의자들과 공산주의자들 사이에 명백한 분열이 있습니다."
  siam.2.a:0 "저걸 폐쇄해야 한다!"

  siam.3.t:0 "호찌민의 초대"
  siam.3.d:0 "시암의 새 헌법 초안 작성 과정이 시작된 이래, 임시 정부의 일부 구성원들은 유명한 베트남 혁명가인 호찌민에 대한 존경심을 표했습니다. 베트남 독립을 위한 그의 투쟁은 카나 랏사돈에 대한 투쟁과 여러 번 비교되었습니다. 많은 이들이 가장 위대하고 현명한 인도차이나 혁명가로 여겨지는 그에게 조언을 받고 싶다는 소망을 표현했습니다.\n그러나 더 온건한 구성원들은 호와 공산주의의 연관성을 언급하며 불신을 표했고, 그의 방문이 정부와 국민의 상당수가 볼셰비키의 혁명을 모델로 한 혁명을 채택하기를 원하게 될 것을 우려했습니다."
  siam.3.a:0 "환영합니다, 호 아저씨!"
  siam.3.b:0 "그의 존재를 감수할 수는 없다."

  siam.4.t:0 "붉은 행진"
  siam.4.d:0 "단순히 의회 제도로 전환하는 것만으로는 충분하지 않았던 것 같습니다. 평범한 월요일이 될 예정이었지만, 시암 공산당은 자본주의에 대한 거대한 반란을 촉구하며 주민들에게 생산 수단을 스스로 장악하도록 독려했습니다. 이후 공산당의 주요 사상가가 된 쁘리디 파놈용은 군중에게 주요 연설을 하며 시암은 이제 노동자들의 것이라고 선언했습니다.\n세니 쁘라못은 시위의 규모를 보고도 공산주의 체제를 따르기를 거부하여 사임할 수밖에 없었고, 가족과 함께 비행기를 타고 미국으로 갔다고 합니다. 파놈용은 시암 공산당을 유일 정당으로 선포하고 "우리 혁명에 더 적합한" 새로운 정치 체제를 수립하겠다고 발표했습니다."
  siam.4.a:0 "혁명 만세!"

  siam.5.t:0 "공화국 선포"
  siam.5.d:0 "임시 정부 수반인 디렉 자야나마가 오늘 방콕에서 정부 수반으로서의 첫 연설에 참석하기 위해 모인 군중에게 연설했습니다.\n\"시암 국민 여러분, 여러분 중 남은 이들이 평화롭고 자유롭게 살 수 있도록 많은 형제들의 피를 흘려야 했습니다. 그들이 싸우고 희생한 것은 자유를 위해서였으며, 우리는 바로 이 가치를 위해 그들을 기릴 것입니다. 시암 국민 여러분, 자유는 폭정의 어둠을 이겨냈으며, 저는 우리가 용기를 증명해 보인 우리의 가치에 기반한 공화국을 건설할 것임을 자랑스럽게 선포합니다\"."
  siam.5.a:0 "공화국 만세!"

  siam.6.t:0 "무기고 습격!"
  siam.6.d:0 "밤사이 방콕에서 멀지 않은 곳에 위치한 우리의 주요 무기고 중 하나가 자유 타이 운동 소속으로 확인된 반군에게 공격당했습니다. 경보가 전혀 울리지 않은 것으로 보아 대부분의 경비병이 은밀하게 살해된 것으로 보이며, 이는 경비병 중에 동조자가 있었음을 암시합니다. 창고는 완전히 비워졌고, 그들은 소총과 탄약을 가져갔습니다."
  siam.6.a:0 "이것은 좋은 징조가 아니다..."

  siam.7.t:0 "쁘리디의 편지"
  siam.7.d:0 "육군 장성 중 한 명이 폿 파혼요틴 총리에게 가서 반정부 혁명가들의 군 잠입 가능성에 대한 우려를 전했습니다. 그는 기숙사 중 한 곳에서 쁘리디 파놈용이 쓴 메시지를 발견했다고 주장합니다. 이 메시지는 병사들에게 평화적으로 정부에 반대할 것을 독려하며, 그들이 "파시즘의 변종"이라고 부르는 것에 의해 지휘받기를 거부한다고 선언했습니다.\n장군은 이 편지를 쁘리디 파놈용을 소요 선동 혐의로 체포하고 반란 사상이 퍼지는 것을 막기 위한 명분으로 사용할 것을 제안했습니다."
  siam.7.a:0 "사이비 혁명가들에게 우리가 어떻게 하는지 보여주겠다."

  siam.8.t:0 "사크라이 사건"
  siam.8.d:0 "어젯밤, 북동부 사크라이 지역의 한 마을에 있는 경찰서가 10명의 무장한 괴한에게 공격당했습니다. 현장에 있던 두 명의 경찰관은 살해되거나 납치되어 사라진 것으로 보이며, 목격자에 따르면 공격자들은 몇 분 후 현장을 떠났다고 합니다. 목격자는 그들 중 한 명이 공식 라디오 방송국이 없는 것에 대해 불평하는 것을 들었다고 말했습니다.\n이 공격 소식은 정부 내에서 많은 반응을 불러일으켰습니다. 일부는 당국이 여전히 행방을 쫓고 있는 쁘리디 파놈용의 저항 촉구에 영감을 받았을 수 있다고 생각합니다. 거대한 저항 조직이 구축되고 있다는 소문이 돌고 있으며, 프라야 파혼폰파유하세나는 이 지역의 경찰관 수를 늘릴 의사를 밝혔습니다."
  siam.8.a:0 "단지 고립된 행동이었기를 바란다."

  siam.9.t:0 "자유 타이 운동"
  siam.9.d:0 "여느 때와 다름없는 오후가 될 예정이었지만, 군용 라디오에서 매우 특별한 메시지가 들려왔습니다:\n\"우리는 자유 타이 운동이다. 카나 랏사돈의 군인들은 배신자들이다. 그들은 혁명을 이용하여 왕의 폭정 대신 자신들의 폭정을 세웠다. 우리는 우리 국가에 정의와 민주주의를 가져오고 싶으며, 시암 국민에게 마침내 자유를 주기 위해 어떤 망설임도 없을 것이다. 만약 당신이 정부의 동맹이라면, 당신은 우리의 적이다. 만약 당신이 정부에 반대한다면, 당신은 우리의 동맹이다. 우리는 무고한 사람들을 해치고 싶지 않지만, 우리의 아름다운 국가가 파시즘의 함정에 빠지는 것을 막고 싶다. 우리는 이탈리아, 독일, 헝가리에서 무슨 일이 일어났는지 보았다. 공포, 증오, 광신, 절망이 지배한다. 우리는 우리의 아름다운 나라가 이런 운명을 피하고, 국민의 필요를 충족시키려는 의도로 행동할 새로운 정부를 건설하고 싶다. 왜냐하면 우리가 바로 국민이기 때문이다.\"\n들려온 목소리는 다름 아닌 카나 랏사돈 민간부의 또 다른 전직 구성원인 디렉 자야나마의 것이었습니다. 그는 쁘리디 파놈용에 대한 추적의 주요 비판자 중 한 명이 되었습니다. 그는 대규모 반란을 통해 정부를 전복시키기 위해 후자와 합류하기로 결정한 것 같습니다. 우리는 현재 그들의 수를 알지 못하며, 그들은 주로 국가의 북동쪽에 숨어 있어 추적하기가 어렵습니다."
  siam.9.a:0 "그렇다면 그들에게 전쟁을 선포하겠다!"

  siam.10.t:0 "디바바의 반란"
  siam.10.d:0 "단순한 봉기가 진짜 반란으로 변했습니다. 라마 8세를 대신하여 섭정을 맡았던 아디탸 디바바 왕자는 총리가 카나 랏사돈의 여러 구성원에게 보낸 편지를 발견했다고 선언하며, 그 편지에 앞으로 몇 달 안에 군주제를 폐지하려는 그의 야망이 담겨 있다고 밝혔습니다. 그는 \"왕에게 여전히 충성하는 모든 이들\"에게 반란에 동참할 것을 크게 호소했습니다. 많은 이들은 방콕 수비대가 합류를 거부하여 실패했던 1933년 보워라뎃 왕자의 반란과 같은 방식으로 진압될 것이라고 생각했습니다.\n하지만 이번에는 그렇지 않았습니다. 수비대는 즉시 반군에 합류하기 위해 떠났고, 반군은 몇 시간 안에 방콕을 장악할 수 있었습니다.\n전 정부의 주요 구성원들, 특히 총리인 프라야 파혼폰파유하세나와 플랙 피분송크람은 체포되어 재판을 기다리고 있으며, 왕자는 1932년 헌법의 폐지를 선언하고, 군사적 압력으로 인해 그의 퇴위가 무효라고 선언하며 라마 7세를 시암의 왕으로 복위시킬 의사를 밝혔습니다."
  siam.10.a:0 "부패한 정부가 패배했습니다!"
  SIA_provisional_monarchist_governement_party:0 "임시 왕정 정부"
  SIA_provisional_monarchist_governement_party_long:0 "임시 왕정 정부"

  siam.11.t:0 "방콕 전투"
  siam.11.d:0 "정권에 맞서는 마지막 전투가 시작되었습니다. 쁘리디 파놈용이 직접 세리팝 라디오를 통해 모든 자유 타이인에게 발표한 "반란 선언"에 따라, 반란군 대다수가 정부 당국을 장악하기 위해 방콕으로 집결했습니다. 민병대의 3분의 2는 북쪽에서 도시를 공격했고, 나머지는 동쪽에서 공격했으며, 소규모 부대는 해군 반란으로 얻은 보트를 이용해 항구에서 공격을 시도한 것으로 보입니다. 한편, 쁠랙 피분송크람이 이끄는 정부 충성파 군대는 추후 공지가 있을 때까지 통행금지령이 내려진 도시에 배치되었으며, 항공기는 정찰 지원을 위해 이륙을 준비하고 있습니다. 시암의 운명은 앞으로 며칠 안에 결정될 것입니다..."
  siam.11.a:0 "이걸로 끝내자!"

  siam.12.t:0 "라마 7세의 귀환"
  siam.12.d:0 "아직 유럽에 망명 중이던 라마 7세가 시암으로 돌아와 왕위를 되찾는 데 동의했습니다. 그가 방콕 공항에 도착했을 때, 수많은 군중이 국왕과 군주제의 영광을 외치며 그를 기다렸습니다. 임시 정부 수반인 아디탸 디바바 왕자도 참석하여 몇 시간 후 대관식까지 라마 7세를 수행했습니다.\n라마 7세는 다시 한번 시암의 국왕이 되었으며, 1932년 쿠데타 이전에 시행했던 개혁, 특히 최고 위원회를 다시 이행하고 행정의 지방 분권화를 더욱 강화할 의사를 밝혔습니다."
  siam.12.a:0 "라마 7세 폐하 만세!"
  SIA_monarchy_party:0 "짜끄리 왕조"
  SIA_monarchy_party_long:0 "짜끄리 왕조"

  siam.13.t:0 "군주제 문제"
  siam.13.d:0 "공식적으로 시암은 1932년 쿠데타 이후 입헌 군주국이었으며, 국왕은 여전히 정부에 대해 어느 정도 권력을 가지고 있습니다. 그러나 라마 7세로도 알려진 쁘라자티뽁이 정치의 주도 세력이 된 군부와의 불화로 퇴위한 이후, 시암은 국왕이 없는 상태가 되었습니다. 그의 후계자인 아난타 마히돈, 즉 라마 8세는 스위스에서 유학 중인 어린아이에 불과하며, 그의 섭정들은 매우 제한적인 영향력만을 가지고 있습니다. 그러나 일부 정부 구성원들은 장기적으로 새 국왕이 다시 군부의 발목을 잡을 위험이 있다고 우려하여 군주제 폐지를 제안했습니다. 하지만 군주제와 같이 중요한 제도를 폐지하는 것은 가볍게 여겨서는 안 될 일입니다..."
  siam.13.a:0 "국가의 안녕을 위해, 유지해야 합니다"
  siam.13.b:0 "더는 필요 없습니다"

  siam.14.t:0 "라마 7세의 입헌적 복위"
  siam.14.d:0 "국민 절반 이상이 라마 7세 국왕의 복위를 결정한 국민 투표에 따라, 그는 이틀 후 방콕 공항에 도착하여 세니 쁘라못 총리의 환영을 받았습니다. 몇 시간 후, 그는 새로운 시암 헌법이 부과한 한계를 존중할 것을 맹세하며 대관식을 치렀습니다."
  siam.14.a:0 "국왕 폐하 만세! 헌법 만세!"

  siam.15.t:0 "반란군의 승리!"
  siam.15.d:0 "방콕 전투는 며칠 동안 계속되었고, 총과 소총은 발포를 멈추지 않았으며, 군인과 반란군은 동네마다 싸웠습니다. 국회 의사당을 점령한 후, 마지막 정부군은 무기를 내려놓는 데 동의했습니다. 일부 군인들에 따르면, 반혁명군을 지휘했던 쁠랙 피분송크람은 자신의 군대가 패배하는 것을 목격하느니 자살을 택했다고 합니다. 전 총리였던 프라야 파혼폰파유하세나는 배를 타고 캄보디아로 탈출한 것으로 보입니다. 혁명 지도자 쁘리디 파놈용은 라디오 연설을 했습니다.\n\"친애하는 시암 국민 여러분, 군사 독재는 이제 끝났습니다. 국민들은 모든 억압과 싸움에도 불구하고 결의를 유지하고 압제자를 물리칠 수 있음을 보여주었습니다. 이제부터 권력은 인민, 농민, 노동자에게 넘겨질 것이며, 그들은 마침내 해방될 것입니다. 우리는 새로운 시대의 여명에 서 있으며, 밝고 희망찬 미래를 향해 나아가고 있습니다\""
  siam.15.a:0 "혁명 만세!"

  siam.16.t:0 "시암 사회주의 공화국 창건"
  siam.16.d:0 "이제 시암을 사회주의 사상을 따르는 공화국으로 공식 선포할 때입니다. 레닌이 러시아에서 이룬 것을, 우리는 여기 시암에서 이룰 것이며, 자본주의의 족쇄에서 벗어난 새로운 국가를 건설할 것입니다."
  siam.16.a:0 "시암에 붉은 별이 떠오른다"
  siam.18.t:0 "쁠랙 피분송크람, 총리로 선출되다"
  siam.18.d:0 "프라야 파혼폰파유하세나는 더 이상 국가를 이끌 위치에 있지 않은 것 같습니다. 그에게 스캔들이 터졌습니다. 보도에 따르면 그는 왕실 물품을 장교들에게 평소보다 훨씬 낮은 가격에 팔았다고 합니다. 게다가, 첫 직접 선거 이후 그의 지지자들은 인민 의회에서 소수파가 되었습니다. 결국, 그의 내각은 예산 개혁안을 통과시키지 못하고 붕괴했습니다. 새로운 선거가 치러졌고, 쁠랙 피분송크람이 국가를 이끌도록 선택되었습니다"
  siam.18.a:0 "큰 야망을 가진 남자"

  siam.19.t:0 "반란군, 이산을 점령하다"
  siam.19.d:0 "자유 타이인 반란군이 이산에서 대규모 공세를 시작하여 이 지역에서 가장 큰 도시인 나콘랏차시마를 점령하는 데 성공했습니다. 이제 라오스와 국경을 맞대게 되면서, 많은 이들이 반란군이 파테트라오나 심지어 비엣민과 연계를 맺으려 할 것을 우려하고 있습니다.\n국방부 장관인 쁠랙 피분송크람은 정찰을 통해 그들의 주요 기지를 찾아낸 후 공중에서 폭격하여 사기를 꺾을 것을 제안했지만, 우리 영토와 국민에게 이런 행동을 하는 것은 매우 강력한 파장을 일으킬 수 있습니다...."
  siam.19.a:0 "이 숲을 불태워라! 마지막 한 놈까지 죽여라!"
  siam.19.b:0 "남쪽으로 후퇴하라!"
  SIA_kill_pridi_tooltip:0 "이것은 민주주의 루트를 해금할 것입니다"
  SIA_dont_kill_pridi_tooltip:0 "이것은 공산주의 루트를 해금할 것입니다"
  
  siam.20.t:0 "공습으로 사망한 쁘리디 파놈용"
  siam.20.d:0 "이산에 대한 우리의 공습은 반란군 훈련 캠프 두 곳과 그들의 본부로 보이는 곳에 피해를 입혔습니다. 오늘 아침, 세리팝 라디오에서 디렉 자야나마는 쁘리디 파놈용이 공습으로 사망했으며, "이 위대한 분이 하늘에서 우리가 성취하는 것을 지켜볼 과업을 완수하는 것"이 자신에게 달려 있다고 발표했습니다. 반란군 지도자의 상실이 그들의 사기를 꺾은 것 같지는 않으며, 설상가상으로 많은 화재를 일으킨 공습으로 농작물을 잃은 많은 농부들이 그들에게 합류하기로 결정했다고 합니다"
  siam.20.a:0 "머리 하나를 자르면, 둘이 돋아난다!"

  siam.21.t:0 "인도차이나의 반란!"
  siam.21.d:0 "공산주의 반란 단체들이 인도차이나 도시의 상당 부분을 장악했습니다! 아마도 시암의 공산주의 이웃의 도움을 받아, 그들은 프랑스 식민 행정부를 몰아내려 했습니다. 이제 질서를 회복할 때입니다..."
  siam.21.a:0 "전진!"

  siam.22.t:0 "방콕 전투"
  siam.22.d:0 "정권에 맞서는 마지막 전투가 시작되었습니다. 디렉 자야나마가 직접 세리팝 라디오를 통해 모든 자유 타이인에게 발표한 '반란 선언'에 따라, 대다수의 반란군이 정부 당국을 장악하기 위해 방콕으로 집결했습니다. 민병대의 3분의 2는 북쪽에서 도시를 공격했고, 나머지는 동쪽에서 공격했으며, 소규모 그룹은 해군 반란으로 얻은 보트를 이용해 항구에서 공격을 시도한 것으로 보입니다. 한편, 쁠랙 피분송크람이 이끄는 정부 충성파 군대는 도시에 배치되었고, 추후 공지가 있을 때까지 통행금지령이 내려졌으며, 항공기는 정찰 지원을 위해 이륙을 준비하고 있습니다. 시암의 운명은 앞으로 며칠 안에 결정될 것입니다..."
  siam.22.a:0 "이걸로 끝내자!"

  siam.23.t:0 "반란군의 승리!"
  siam.23.d:0 "방콕 전투는 며칠 동안 계속되었고, 총과 소총의 발포는 멈추지 않았으며, 군인과 반란군은 동네마다 싸웠습니다. 국회의사당 건물이 점령된 후, 마지막 정부군은 무기를 내려놓는 데 동의했습니다. 일부 군인에 따르면, 반혁명군을 지휘했던 쁠랙 피분송크람은 자신의 군대가 패배하는 것을 목격하느니 자살을 택했다고 합니다. 전 총리였던 프라야 파혼폰파유하세나는 배를 타고 캄보디아로 탈출한 것으로 보입니다. 혁명 지도자 디렉 자야나마는 라디오 연설을 했습니다.\n\"사랑하는 시암 국민 여러분, 군사 독재는 이제 끝났습니다. 국민은 온갖 억압과 싸움에도 불구하고 결의를 유지하고 압제자를 물리칠 수 있음을 보여주었습니다. 이제부터 권력은 인민, 농민, 노동자에게 넘겨질 것이며, 그들은 마침내 해방될 것입니다. 우리는 새로운 시대의 여명에 서 있으며, 밝고 희망찬 미래를 향해 나아가고 있습니다\""
  siam.23.a:0 "혁명 만세!"

  siam.24.t:0 "선거일"
  siam.24.d:0 "오늘은 새로운 공화국의 초대 정부를 결정할 총선거일입니다. 두 명의 후보가 가장 유력한 선택지로 꼽힙니다. 쁘리디 사후 세리 타이의 지도자가 된 디렉 자야나마는 프랑스 급진주의와 프랭클린 델러노 루스벨트의 정책을 본보기로 삼아 '인민급진당'을 창당했으며, 국민의 복지를 보장하기 위해 경제에 대한 국가 개입을 원합니다. 반면, 세리 타이의 또 다른 일원인 세니 쁘라못은 보수적인 '민주당'을 창당했으며, 왕족 출신인 그는 1932년 최초의 혁명가들이 했던 것보다 훨씬 더 제한된 형태로 군주제를 복원하고자 합니다. 경제적으로 그는 영국 보수당에 훨씬 더 가까우며, 비개입주의 경제 정책이 국가와 국민에게 이로울 것이라고 믿습니다."
  siam.24.a:0 "인민급진당"
  siam.24.b:0 "민주당"
  siam.25.t:0 "시암의 지원 요청"
  siam.25.d:0 "시암 대사는 [SOV.GetLeader]에게만 전달될 매우 특별한 서신을 가져왔습니다. 이 서신은 인도차이나의 프랑스 식민화에 반대하는 공산주의 운동을 지원하려는 시암 정부의 계획을 설명하고 있습니다.\n서신은 시암의 지원 요청으로 마무리되는데, 우리에 비해 산업 능력이 낮아 무기와 장비 수송이 느리고 매우 비싸므로, 인도차이나에 공산주의 이념을 전파할 장비를 보내주기를 희망한다고 설명합니다."
  siam.25.a:0 "제국주의에 맞서는 투쟁을 전적으로 지지한다"
  siam.25.b:0 "전쟁이 다가오고 있지만, 그들을 외면할 수는 없다."
  siam.25.c:0 "가망 없는 명분에 소총 한 자루라도 내줄 여유가 없다"

  siam.26.t:0 "소비에트 연방의 지원 동의"
  siam.26.d:0 "소비에트 연방은 인도차이나 식민화에 맞서는 우리의 투쟁을 돕기 위해 대량의 소총과 기타 군사 장비를 보내주기로 동의했습니다.\n그들처럼 발전된 군사 장비를 획득하면 우리 저항 조직의 힘이 크게 증가할 것입니다!"
  siam.26.a:0 "훌륭하다!"
  SIA_soviet_union_sends_many_guns:0 "§R모든 곳에서 선동 +25%§!"

  siam.27.t:0 "소비에트 연방, 소규모 지원에 동의"
  siam.27.d:0 "소비에트 연방은 우리를 돕기 위해 소량의 군사 장비를 보내주기로 동의했지만, 소련이 처한 위험한 상황 때문에 당분간은 전폭적인 지원이 어려울 것이라고 밝혔습니다.\n추가 군사 장비를 받는 것만으로도 우리 저항 조직을 개선할 수 있을 것입니다"
  siam.27.a:0 "없는 것보다는 낫겠지"
  SIA_soviet_union_sends_some_guns:0 "§R모든 곳에서 선동 +10%§!"

  siam.28.t:0 "소비에트 연방의 장비 지원 거부"
  siam.28.d:0 "소비에트 연방은 자신들이 처한 상황 때문에 당분간은 어떠한 군사 장비도 내어줄 여유가 없으며, 우리의 봉기가 성공하기를 바랄 뿐이라고 밝혔습니다.\n이번 일은 우리 혼자서 해내야 한다는 것이 분명해졌습니다."
  siam.28.a:0 "적어도 그들은 '일국사회주의'는 고수하는군"

  siam.29.t:0 "프라야 파혼폰파유하세나의 재판"
  siam.29.d:0 "재판받을 첫 카나 랏사돈의 일원은 전 총리 프라야 파혼폰파유하세나로, 그는 공화주의적 감정을 품고 정부 수반의 지위를 이용해 군주제를 폐지하려 했다는 혐의를 받고 있습니다.\n이러한 종류의 범죄는 국왕뿐만 아니라 시암 왕국 전체에 대한 대역죄로 간주될 것이며, 사형 선고가 논리적인 선택으로 보입니다.\n하지만 우리는 그가 매우 유능한 군인이기도 하며, 다가오는 잠재적 분쟁을 고려할 때 미래에 중요한 인물이 될 수 있다는 점을 잊어서는 안 됩니다..."
  siam.29.a:0 "그는 죽어 마땅하다"
  siam.29.b:0 "우리는 아직 그가 필요하다"

  siam.30.t:0 "쁠랙 피분송크람의 재판"
  siam.30.d:0 "쁠랙 피분송크람은 재판받을 두 번째 카나 랏사돈의 일원으로, 특히 국왕의 권위를 회복하려는 첫 시도였던 보워라뎃 왕자의 반란을 진압한 역할과 디바바 왕자의 반란 당시 방콕 시 방어에 참여한 것으로 유명합니다. 따라서 그는 카나 랏사돈 정부를 방어한 죄가 있으며, 이는 군주제에 대한 반역으로 간주될 수 있는 행위입니다. 하지만 그가 단지 당시 정부의 명령을 따랐을 뿐이며, 따라서 우리 정부의 명령을 따르는 데에도 도덕적인 문제가 없을지 의문이 들 수 있습니다...."
  siam.30.a:0 "우리를 돕고 싶었다면, 처음부터 우리 편에 섰을 것이다!"
  siam.30.b:0 "그처럼 유능한 인물을 잃을 수는 없다"

  siam.31.t:0 "비엔티안 조약"
  siam.31.d:0 "프랑스 정부와의 오랜 협상 끝에, 프랑스 측은 캄보디아와 시암에서 다시 시암에 합류할 것인지를 결정하기 위한 국민투표를 실시하는 데 동의했습니다. 찬성표가 80% 이상을 득표하여, 이 영토에 대한 주권이 우리에게 이전될 것입니다. 정부는 프랑스가 이 지역에서 경제적 이익을 누릴 자격이 있음을 보장함으로써 프랑스를 안심시켰습니다."
  siam.31.a:0 "우리는 다시 형제들과 재결합했다!"

  siam.32.t:0 "인도차이나에서의 패배"
  siam.32.d:0 "인도차이나의 반란을 진압하는 데 실패함에 따라, 이 영토를 다시 우리 통제하에 두려는 모든 희망이 사라진 것 같습니다. 우리는 우리 국가들 간의 적대 행위를 끝내기 위해 4개의 인도차이나 국가와 평화 조약을 체결했으며, 이로써 이 지역에서 수십 년간 이어져 온 프랑스의 존재가 종식되었습니다."
  siam.32.a:0 "우리의 유일한 수익성 있는 식민지였는데..."

  siam.33.t:0 "인도차이나에서의 패배"
  siam.33.d:0 "인도차이나 반란 진압에 실패함에 따라, 해당 영토를 다시 우리 통제하에 둘 희망은 사라진 것으로 보입니다. 우리는 4개 인도차이나 국가와 적대 행위를 중단하는 평화 조약을 체결했으며, 이로써 이 지역에서 수십 년간 이어져 온 프랑스의 주둔은 막을 내렸습니다."
  siam.33.a:0 "우리의 가장 수익성 높은 식민지..."

  siam.34.t:0 "시암, 라오스와 캄보디아에 국민투표 요구"
  siam.34.d:0 "평화로운 범타이주의를 증진하려는 시암 정부의 최근 여러 노력은 이제 라오스와 캄보디아의 시암 합병에 대한 국민투표 실시라는 매우 특정한 요구로 귀결되었습니다. 시암 대사는 이 지역에서 프랑스의 경제적 이익이 보존될 것이라 약속했으며, 국민투표가 성공할 경우 프랑스에 특정 경제적 이점을 부여하는 조약을 체결할 것이라고 약속했습니다."
  siam.34.a:0 "국민투표를 실시하겠다"
  siam.34.b:0 "거부한다"

  siam.35.t:0 "프랑스, 국민투표 거부"
  siam.35.d:0 "프랑스와 시암 모두에게 이익이 되었을 범타이주의를 증진하려는 우리의 많은 노력에도 불구하고, 프랑스는 국민투표 실시에 대해 부정적인 반응을 보였습니다."
  siam.35.a:0 "시도라도 해봤으니 됐다"

  siam.36.t:0 "[SIA.GetNameDefCap], 인도차이나 식민주의 종식 요구"
  siam.36.d:0 "[SIA.GetNameDefCap], 인도차이나 식민주의 종식 요구"
  siam.36.a:0 "그렇다면 독립과 자유다!"
  siam.36.b:0 "우리가 그들을 자유로 이끌 것이다."


  # Ideas
  SIA_fascist_sympathies_in_the_army:0 "군 내 파시스트 동조 세력"
  SIA_fascist_sympathies_in_the_army_desc:0 "플랙 피분송크람의 영향으로 파시스트 이념이 군 내에서 큰 지지를 얻었으며, 이는 이미 시행 중인 권위주의 정책으로 더욱 두드러졌습니다. 이미 정치 권력의 상당 부분을 장악하고 있는 군부는 시암이 이 이념을 공유하는 강대국들과 더 가까워지도록 압박할 가능성이 매우 높습니다."
  SIA_civilian_wing_opposition:0 "문민파의 반대"
  SIA_civilian_wing_opposition_desc:0 "1932년 혁명 이래로 '인민당'인 카나 랏사돈은 민주주의와 사회 개혁을 지지하는 문민파와 국가 확장 및 사회 군사화를 지지하는 군부파, 두 개의 주요 파벌로 나뉘었습니다. 민주주의자들은 우리의 군사 능력 확장을 끊임없이 비판하고 반대해왔으므로, 계획을 완수하려면 어떤 조치를 취해야만 합니다."
  SIA_democratic_opposition:0 "민주주의 세력의 반대"
  SIA_cultural_revolution_idea_1:0 "문화 혁명"
  SIA_cultural_revolution_idea_2:0 "문화 혁명"
  SIA_artistic_propaganda:0 "예술 선전"
  SIA_artistic_propaganda_desc:0 ""
  SIA_small_depression_effects:0 "대공황의 잔재"
  SIA_small_depression_effects_desc:0 "대공황은 시암 경제에 큰 타격을 주었습니다. 특히 파운드 스털링 평가절하로 인해 우리 쌀의 시장 가격이 훨씬 비싸지면서 수출에 큰 영향을 미쳤습니다. 수많은 경제 개혁을 통해 그 여파를 상당 부분 완화했지만, 일부는 여전히 남아있어 이를 완전히 해소하기 위해서는 국가의 최종 개입이 필요할 것입니다."
  SIA_greater_thai_ambitions_1:0 "대타이 제국의 야망"
  SIA_greater_thai_ambitions_2:0 "대타이 제국의 야망"
  SIA_increased_education_budget:0 "교육 예산 증액"
