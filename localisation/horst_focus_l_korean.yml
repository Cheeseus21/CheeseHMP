  BUL_steel_exports2:0 "마케도니아 텅스텐 광산"
  ENG_bomber_harris_desc:0 "'우리가 함부르크에 저지른 짓이 끔찍한 일이었다고 인정하길 바라는 거요? 그래. 그건 *정말로* 끔찍했소. *소름끼치는* 일이었지! 이제 좀 속이 시원하시오? 전쟁을 더 빨리 이길 수 있는 다른 목표를 제시할 수 없다면, 닥치시오! 당신은 당신의 양심에게나 돌아가고, 나는 전쟁으로 돌아가겠소. 알겠소?' -항의하는 목사에 대한 해리스의 답변"
  BUL_steel_exports2_desc:0 "독일의 투자로, 우리는 서쪽에 오랫동안 방치되었던 텅스텐 광산을 개발할 수 있습니다."
  BUL_war_games:0 "비밀 군사 훈련"
  efr_secret_weapons:0 "비밀 병기"
  ITA_modernized_artillery_at:0 "현대화된 대전차포"
  ITA_modernized_artillery_at_desc:0 "우리의 대전차 무기는 심각하게 구식이며 개선이 필요합니다."
  SOV_great_purge_NEW:0 "대숙청"
  ENG_compass:0 "컴퍼스 작전"
  ENG_operation_compass:0 "컴퍼스 작전"
  #ENG_operation_compass_desc:0 "This operation will fail as soon as we lose control of Giza"
  ENG_compass_desc:0 "이것은 아프리카에서 추축국에 맞서는 우리의 첫 주요 작전입니다. 적을 포위하고 섬멸하기 위해서는 사막에서의 전략적 기동성이 필요합니다."
  SOV_great_purge_NEW_desc:0 "장교들, 심지어 최고위급 사이에서 위험한 트로츠키주의자들의 음모가 꾸며지고 있습니다. 트로츠키의 개인적인 개입 여부는 알려지지 않았지만, 그 위협은 상당합니다. 우리가 약간의 희생을 감수할 준비가 되어 있지 않다면, 소련은 또 다른 내전에 휩싸일 수도 있습니다..."
  EFR_torch_declared:0 "횃불 작전이 선포되었습니다"
  BUL_war_games_desc:0 "미래의 분쟁에 대비하기 위해 비밀리에 군사 훈련을 실시할 것입니다."
  BUL_restore_the_bulgarian_army:0 "불가리아군 복원"
  BUL_greater_bulgaria:0 "대불가리아"
  air_war_plans_division_focus2:0 "호위 전투기"
  ETH_industrial_effort2:0 "산업 역량 II"
  ETH_industrial_effort2_desc:0 "우리는 민간 산업 발전에 계속 집중할 것입니다."
  ETH_production_effort5:0 "군비 역량 V"
  ETH_production_effort5_desc:0 "더 많은 군수 공장, 더 많은 총."
  ETH_production_effort4:0 "군비 역량 IV"
  ETH_production_effort4_desc:0 "더 많은 군수 공장, 더 많은 총."
  ETH_construction_effort5:0 "Compagnie per il Cotone d'Etiopi II"
  ETH_construction_effort5_desc:0 "우리는 섬유 산업을 더욱 확장할 것입니다."
  ETH_construction_effort4:0 "Compagnie per il Cotone d'Etiopia I"
  ETH_construction_effort4_desc:0 "우리는 섬유 산업을 확장할 것입니다."
  irq_militarism:0 "군국주의"
  IRQ_revolution2:0 "시리아로 혁명 전파"
  ITA_sword_of_islam:0 "이슬람의 검"
  ENG_bomber_harris:0 "공군을 통한 승리"
  IRQ_eco4:0 "바빌론의 화살"
  IRQ_eco3:0 "프랑스 투자 국유화"
  IRQ_eco4_desc:0 "우리의 화살은 적의 비행 전차를 모조리 꿰뚫을 것입니다."
  ITA_sword_of_islam_desc:0 "우리는 영국과 프랑스의 제국주의에 맞서 북아프리카의 아랍인들과 동맹을 맺어야 합니다. 지중해의 아랍인들에게 환심을 사기 위해, 우리는 이슬람의 수호자로 자리매김할 것입니다."
  MAN_the_two_emperorsx:0 "두 황제"
  MAN_the_two_emperorsx_desc:0 "우리가 일본과 완전히 동등한 파트너가 아니라는 터무니없는 생각을 떨쳐버릴 때가 왔습니다. 우리 두 황제께서는 형제와도 같습니다!"
  MAN_chinese_leadershipx:0 "중국의 지도자"
  MAN_chinese_leadershipx_desc:0 "중국 인민에게는 중국인 지도자가 필요합니다. 우리는 중국 전역에 대한 황제의 통치를 완전히 복원하는 것 외에는 다른 목표가 없음을 공개적으로 선언해야 합니다."
  MAN_vassalize_mengukuox:0 "몽강국 종속화"
  MAN_vassalize_mengukuox_desc:0 "몽강국의 왕은 만주국 황제와 나란히 설 자격이 없습니다. 이 어리석은 실험을 끝내고 그를 제자리에 앉힐 때가 왔습니다."
  MAN_national_cooperation_governmentx:0 "국민 협력 정부"
  MAN_national_cooperation_governmentx_desc:0 "일본이 다른 중국 정치인들, 즉 평민들을 내세워 괴뢰 정부를 세우려 한다는 불안한 소문이 들려옵니다. 이는 용납할 수 없는 일입니다. 우리는 연합군이 점령한 중국 영토는 반드시 우리가 관리하도록 해야 합니다."
  MAN_alliance_with_the_kwantung_armyx:0 "관동군과의 동맹"
  MAN_alliance_with_the_kwantung_armyx_desc:0 "국내 주둔 일본군은 종종 우리의 생각과 충돌합니다. 가능한 한 갈등을 최소화하며 협력할 수 있도록 그들과 더 긴밀한 관계를 구축해야 합니다."
  MAN_national_defense_state:0 "국방 국가"
  MAN_national_defense_state_desc:0 "전쟁에서 승리하고 중국 전역을 다시 통치하게 될 때까지, 우리는 모든 노력을 기울이고, 모든 희생을 감수하며, 가용한 모든 자원을 동원하여 전쟁을 수행해야 합니다."
  MAN_social_research_unitx:0 "사회 연구부"
  MAN_social_research_unitx_desc:0 "우리 인민의 방식과 관습을 연구할 특별 부서를 설립하여, 그들을 국가의 생산적인 시민으로 더 잘 이끌 수 있도록 해야 합니다."
  MAN_invite_japanese_investorsx:0 "일본 투자자 유치"
  MAN_invite_japanese_investorsx_desc:0 "조국을 발전시키려면 외부의 도움이 필요합니다. 일본의 여러 기업이 우리나라에 투자할 의향이 있음을 밝혔습니다."
  MAN_hoankyokux:0 "보안국"
  MAN_hoankyokux_desc:0 "우리 정부는 중국의 밝은 미래를 위한 최고의 희망입니다. 분명 많은 이들이 우리 정부의 파괴에 이해관계를 갖고 있습니다. 이들을 추적하여 소탕하고 국가를 보호할 조직이 필요합니다."
  jap_nav_2:0 "1940년형 해군 폭격기를 연구할 것입니다.\n\n"
  jap_nav_3:0 "1944년형 해군 폭격기를 연구할 것입니다.\n\n"
 
 
 
 
 SLO_diet_of_the_slovak_land:0 "슬로바키아 영토 의회"
 SLO_diet_of_the_slovak_land_desc:0 "1939년 3월 13일, 히틀러는 요제프 티소를 베를린으로 초청하여 슬로바키아의 독립을 선포하라고 촉구했습니다. 티소는 스스로 그런 결정을 내리기를 거부했고, 그 후 히틀러는 그에게 슬로바키아 의회를 소집하여 독립을 승인하도록 허락했습니다."
 SLO_telegram_to_berlin:0 "베를린으로 보내는 전보"
 SLO_telegram_to_berlin_desc:0 "우리 주권 슬로바키아 국가의 탄생과 함께, 이제 우리는 티소가 히틀러에게 한 약속을 지키고 추축국에 가입할 수 있습니다."
 SLO_zone_of_protection:0 "보호 조약"
 SLO_zone_of_protection_desc:0 "슬로바키아국은 처음부터 독일의 영향력 아래에 있었습니다. 1939년 3월 23일에 체결된 보호 조약으로 인해 외교, 군사, 경제 정책이 부분적으로 독일에 종속되었습니다."
 SLO_appoint_competent_economists:0 "유능한 경제학자 임명"
 SLO_appoint_competent_economists_desc:0 "고위직에 유능한 인사를 임명하면 독일의 지도가 우리 경제에 미친 파괴적인 영향을 줄일 수 있습니다."
 SLO_industrial_enterprises:0 "슬로바키아 산업에 대한 독일의 통제"
 SLO_industrial_enterprises_desc:0 "우리 신생국의 첫해 동안 독일은 막대한 재정 자원을 이용해 국내 대규모 산업 기업에 대한 통제권을 행사했습니다. 이는 물론 유능한 경제학자들을 임명하여 국가 자산을 독일에 팔아넘기지 않음으로써 국가의 온전함을 지키도록 하여 해결해야 합니다."
 SLO_currency:0 "강력한 통화"
 SLO_currency_desc:0 "독일 통화와 슬로바키아 코루나의 환율은 1 라이히스마르크 대 11 슬로바키아 코루나 수준이었습니다."
 SLO_factories:0 "신규 공장 건설"
 SLO_factories_desc:0 "슬로바키아국이 존속하는 동안 200개 이상의 산업 기업이 설립되었습니다."
 SLO_infrastructure:0 "신규 기반시설 건설"
 SLO_infrastructure_desc:0 "슬로바키아국이 존속하는 동안 100km 이상의 신규 철도와 287km의 도로가 건설되었습니다."
 SLO_hungarian_invasion:0 "헝가리의 침공"
 SLO_hungarian_invasion_desc:0 "1939년 3월 23일 새벽, 헝가리는 "가능한 한 서쪽으로 진격하라"[출처 필요]는 지시를 받고 카르파티아 우크라이나에서 슬로바키아를 기습 공격했습니다. 헝가리는 선전포고 없이 슬로바키아를 공격했으며, 많은 슬로바키아 병사들이 체코 지역에서 이동 중이라 아직 슬로바키아 부대에 도착하지 못했기 때문에 슬로바키아군은 무방비 상태였습니다."
 SLO_seasonal_works_in_germany:0 "독일 내 계절 노동자"
 SLO_seasonal_works_in_germany_desc:0 "매년 4만 명의 노동자가 계절 노동을 위해 독일로 갔고, 생산 가능 인구의 일부는 전선으로 보내졌습니다."
 SLO_salzburger_diktat:0 "잘츠부르크 회담"
 SLO_salzburger_diktat_desc:0 "1940년 7월 27일부터 28일까지 잘츠부르크에서 독일 관리들은 티소에게 정부 교체를 지시했습니다. 논란이 많은 슬로바키아 정치인 보이테흐 투카가 총리로 임명되었고, 흘린카 근위대 사령관 알렉산데르 마흐가 내무부 장관이 되었습니다. 이로써 슬로바키아 국가 체제 형성의 새로운 단계가 시작되었으며, 국가사회주의 요소가 삶의 모든 영역에 침투하게 됩니다."
 SLO_evacuation:0 "남부 슬로바키아의 위기"
 SLO_evacuation_desc:0 "헝가리가 새로 획득한 지역에서, 고향에 남아 있던 슬로바키아인들은 거의 즉시 박해, 굴욕, 폭력 또는 공공연한 핍박의 희생자가 됩니다. 국가는 5만 명의 슬로바키아인들을 대피시키고 새로운 정착지를 제공할 수 있습니다."
 SLO_radical_wing:0 "급진파"
 SLO_radical_wing_desc:0 "보이테흐 투카와 알렉산데르 마흐가 이끄는 HSĽS의 급진파는 독일 체제를 모방하고자 했습니다."
 SLO_moderate_wing:0 "온건파"
 SLO_moderate_wing_desc:0 "요제프 티소는 온건파의 지도자 중 한 명이었으며, 친프라하 노선은 주로 마르틴 소콜 서기장과 요제프 부다이가 대표했습니다."
 SLO_fate_in_german_hands:0 "독일의 손에 달린 슬로바키아의 운명"
 SLO_fate_in_german_hands_desc:0 "히틀러를 방문하는 동안 투카는 공개적으로 선언합니다. "총통 각하, 저는 제 민족의 운명을 당신의 손에 맡깁니다. 제 민족은 당신으로부터의 해방을 기대하고 있습니다.""
 SLO_detention_camp:0 "구금 수용소 건설"
 SLO_detention_camp_desc:0 "독립 국가 수립 직후, 정부는 슬로바키아국의 적들을 구금하는 규정을 발표합니다. 정권에 따르면, 적이란 새로운 국가 건설에 장애물이 될 수 있다고 주장되는 모든 이들을 의미합니다."
 SLO_mobilize_slovak_army:0 "슬로바키아군 동원"
 SLO_mobilize_slovak_army_desc:0 "1939년 4월, 히틀러는 폴란드에 대한 군사 작전 계획을 수립하라는 명령을 내렸습니다. 그는 폴란드의 영토를 독일국에 합병하기를 원했습니다. 8월 말, 슬로바키아군의 동원이 시작되었습니다."
 SLO_president_of_slovak_republic:0 "슬로바키아 공화국 초대 대통령"
 SLO_president_of_slovak_republic_desc:0 "1939년 7월 헌법은 대통령의 광범위한 직무를 규정하고 있으나, 슬로바키아 공화국에는 아직 대통령이 없습니다. 1939년 10월 26일, 요제프 티소가 슬로바키아 공화국의 대통령이 되었습니다."
 SLO_life_in_new_slovakia:0 "새로운 슬로바키아"
 SLO_life_in_new_slovakia_desc:0 "선전 기관은 통제된 언론을 이용하여 슬로바키아를 평화롭고 번영하는 국가라는 이미지로 퍼뜨립니다. 보호령이나 폴란드와 비교하면, 슬로바키아에서는 제3제국의 직접적인 영향력이 훨씬 덜 느껴집니다."
 SLO_lomnicky_manifest:0 "롬니츠키 선언"
 SLO_lomnicky_manifest_desc:0 "순수 미술조차 슬로바키아에서 일어난 정치적 변화의 결과를 피하지 못했습니다. 1939년 10월, 진보적인 예술 공예 학교는 문을 닫았고, 브라티슬라바에 있는 슬로바키아 공과대학교의 소묘 및 회화 학과가 그 자리를 대신하게 되었습니다."
 SLO_german_advisors:0 "독일인 고문단"
 SLO_german_advisors_desc:0 "잘츠부르크 회담 이후 더 많은 독일인 고문들이 슬로바키아의 주요 부처와 관청, 그리고 정권의 권력 구조에 들어옵니다. 그들의 역할은 이 기관들의 기능을 감시하고 독일에 대한 충성심과 보호 조약의 의무 준수를 보장하는 것입니다."
 SLO_economic_loan:0 "경제 회복을 위한 차관"
 SLO_economic_loan_desc:0 "국가 남부를 헝가리에 할양하면서, 슬로바키아는 광업, 피혁, 인쇄 산업의 중심지 몇 곳과 함께 농업적으로 중요한 지역을 잃었습니다. 송전선 시스템뿐만 아니라 교통 및 통신 구조도 혼란에 빠졌습니다. 상황을 개선하기 위한 노력의 일환으로, 1939년 2월 정부는 슬로바키아의 경제 회복을 위한 차관을 발표했습니다."
 SLO_propaganda_campaings:0 "선전 활동"
 SLO_propaganda_campaings_desc:0 "경제 성장 호황의 이면은 "미소 짓는 슬로바키아"나 "노동의 기쁨"과 같은 선전 활동에 의해 부분적으로 가려져 있습니다."
 SLO_bata:0 "바탸 공장"
 SLO_bata_desc:0 "파르티잔스케에 있는 바탸 공장은 1939년에 설립되었습니다. 파르티잔스케는 유명한 사업가 토마시 바탸가 활동을 펼친 장소 중 하나였습니다. 그의 목표는 사람들이 일자리, 주거, 여가를 찾을 수 있는 도시를 만드는 것이었습니다. 공장에서는 제화업에 생산이 집중되었으며, 이는 오늘날까지도 그곳의 주요 산업입니다."
 SLO_universities:0 "신규 대학 개교"
 SLO_universities_desc:0 "1942년에 슬로바키아 과학 예술 아카데미가 설립되었고, 1년 후 활동을 시작했습니다. 이러한 점에서, 비교적 순조로웠던 이 시기는 다양한 종류의 출판물 총 발행 부수 증가에도 반영되었습니다."
 SLO_expand_mines:0 "광산 확장"
 SLO_expand_mines_desc:0 "슬로바키아는 독일에게 중요한 광물, 농산물, 전략 군수품 생산의 원천이며, 통신망 또한 계속해서 사용되고 있으므로, 독일은 특정 분야의 발전에 자체적인 관심을 보입니다."
 SLO_apollo:0 "아폴로"
 SLO_apollo_desc:0 "1895년 부다페스트에서 브라티슬라바에 정유소를 건설하기로 결정했습니다. 아폴로 정유소는 1896년에 가동을 시작했습니다. 이 새롭고 현대적인 공장은 군주국에서 두 번째로 큰 광유 정제소 중 하나였습니다. 휘발유, 등유, 파라핀, 양초, 바셀린, 아스팔트, 심지어 인공 얼음까지 생산했습니다. 슬로바키아 공화국 시절, 이 공장은 다이너마이트 노벨 AG 브라티슬라바와 IG 파르벤이 소유했습니다."
 SLO_hitlers_protection:0 ""히틀러의 보호 아래""
 SLO_hitlers_protection_desc:0 "슬로바키아는 남동유럽 국가들에게 본보기가 되어야 하며, 히틀러의 "보호" 아래 국가가 평화롭게 살 수 있다는 것을 보여줘야 합니다."
 SLO_demand_southern_slovakia:0 "하나의 국가, 하나의 정당, 하나의 지도자"
 SLO_demand_southern_slovakia_desc:0 "헝가리가 새로 획득한 지역의 슬로바키아인들은 거의 즉시 박해, 굴욕, 폭력의 희생자가 되었습니다. 경제적으로 점령지는 펜괴를 체코슬로바키아 코루나로 비현실적으로 환전하면서 피해를 입었습니다. 따라서, 대독일제국을 위한 전쟁에서 많은 슬로바키아 군인들이 전사함에 따라, 슬로바키아 공화국은 남부 슬로바키아와의 재통일을 요구합니다."
 SLO_dynamitka:0 "디나미트카"
 SLO_dynamitka_desc:0 "1941년, 자본금은 1억 5천만 코루나에 달해 슬로바키아 최대의 주식회사가 되었습니다. 폭발물 생산은 전쟁 중 가장 수익성이 높은 사업 중 하나였으며, 1941년이 1,900만 코루나의 순이익으로 마감되는 데 결정적인 역할을 했습니다."
 industrial_research_tt:0 "획득"
 SLO_nehera:0 "네헤라"
 SLO_nehera_desc:0 "체코슬로바키아의 체코 지역에 성공적으로 자리 잡은 후, 슬로바키아에도 새로운 공장이 건설되었습니다. 1939년, 트렌친에 네헤라 의류 서비스가 문을 열었으며, 초기에는 하루에 바지 200벌을 생산했습니다. 직원 수가 증가함에 따라 취급 품목의 범위도 늘어났고, 스포츠 정장과 남성용 재킷까지 포함하도록 확장되었습니다."
 SLO_anti_social:0 "반사회 부서"
 SLO_anti_social_desc:0 "1941년, 소위 반사회적 집단, 즉 "무직 집시"를 포함한 이들을 위한 노동 부서가 창설되기 시작했습니다. 처음에는 계절적으로 운영되었으나, 1942년부터는 영구적인 기관으로 설립되었습니다."
 SLO_slovak_airforce:0 "Slovenské Vzdušné Zbrane"
 SLO_slovak_airforce_desc:0 "슬로바키아 공군은 6개의 체코-슬로바키아 공군 연대 중 유일하게 슬로바키아에 주둔했던 체코-슬로바키아 제3공군연대 "밀란 라스티슬라프 슈테파니크 공군 대장"을 기반으로 창설되었습니다. 1939년 3월 슬로바키아 공화국이 수립된 후, 새로 창설된 공군은 항공 무장과 조직 구조를 인수했습니다."
 SLO_lessons:0 ""작은 전쟁"의 교훈"
 SLO_lessons_desc:0 "슬로바키아 공군은 1939년 3월, 헝가리군이 카르파티아 루테니아를 정복한 후 동부 슬로바키아 영토를 침공했을 때 첫 실전을 치렀습니다. B.534 항공기 20대를 보유한 제45, 49전투비행대대와 약 20대의 Š.328 항공기로 무장한 제12, 13관측비행대대가 헝가리 공군에 맞서 배치되었습니다."
 SLO_strategic_destruction:0 "전략적 파괴"
 SLO_strategic_destruction_desc:0 ""
 SLO_fighter_focus:0 "전투기 현대화"
 SLO_fighter_focus_desc:0 ""
 SLO_bomber_focus:0 "폭격기 현대화"
 SLO_bomber_focus_desc:0 ""
 SLO_battlefield_support:0 "전장 지원"
 SLO_battlefield_support_desc:0 ""
 SLO_cas_focus:0 "근접항공지원 현대화"
 SLO_cas_focus_desc:0 ""
 SLO_operational_integrity:0 "작전 무결성"
 SLO_operational_integrity_desc:0 ""
 SLO_messerschmitt:0 "메서슈미트"
 SLO_messerschmitt_desc:0 ""
 SLO_junkers:0 "융커스"
 SLO_junkers_desc:0 ""
 SLO_heinkel:0 "하인켈"
 SLO_heinkel_desc:0 ""
 SLO_cas_production:0 "근접항공지원기 생산"
 SLO_cas_production_desc:0 ""
 SLO_fighter_production:0 "전투기 생산"
 SLO_fighter_production_desc:0 ""
 SLO_bomber_production:0  "전술 폭격기 생산"
 SLO_bomber_production_desc:0 ""
 SLO_aa_defense:0  "전시 경제 보호"
 SLO_aa_defense_desc:0 "제2차 세계 대전 중 폭격기 공습만큼 우리나라를 경제적으로 파괴한 것은 없었습니다. 그들의 주요 목표는 독일의 주요 합성 가솔린 공급원 중 하나인 아폴로 정유 공장이었습니다."
 SLO_prepare_our_airforce:0 "공군 준비"
 SLO_prepare_our_airforce_desc:0 ""
 SLO_invasion_of_poland:0 "백색 작전 준비"
 SLO_invasion_of_poland_desc:0 "1939년 9월 1일, 독일군이 폴란드 영토에 진입하며 제2차 세계 대전이 시작되었습니다. 해외에서 제3제국의 위성국으로 인식되는 슬로바키아와 나치의 폴란드 침공에 슬로바키아군이 참여한 것은 이러한 입장을 공공연히 확인시켜주는 것이며, 이 행동은 서방 강대국들과의 외교 관계 즉각 중단을 의미합니다."
 SLO_munition_factory:0 "군수 공장"
 SLO_munition_factory_desc:0 "두브니차와 포바슈스카 비스트리차의 무기 공장은 가장 중요한 전쟁 장비 제조업체 중 하나였습니다."
 SLO_mobile_warfare:0 "기동전"
 SLO_mobile_warfare_desc:0 ""
 SLO_superior_firepower:0 "우세 화력"
 SLO_superior_firepower_desc:0 ""
 SLO_trench_warfare:0 "참호전"
 SLO_trench_warfare_desc:0 ""
 SLO_mass_assault:0 "대규모 강습"
 SLO_mass_assault_desc:0 ""
 SLO_tank_focus:0 "칼린치아크 신속집단"
 SLO_tank_focus_desc:0 "신속사단은 동부 전선에서 추축군 편에 서서 싸운 슬로바키아 전차 사단이었습니다. 신속사단은 1941년 7월 23일, 이전의 신속집단이었던 신속여단이 여러 차례 재편된 후 창설되었습니다. 이후 캅카스에서 철수한 후, 사단은 제1보병사단 또는 제1기술사단으로 개명되었습니다."
 SLO_motorized_focus:0 "슬로바키아 기동 사령부 "
 SLO_motorized_focus_desc:0 "슬로바키아 기동 사령부는 독일 제17군에 배속되었고, 얼마 지나지 않아 독일의 직접 지휘를 받게 되었습니다. 이 부대는 1941년 7월까지 제17군과 함께 싸웠으며, 우만 전투와 리포베츠 전투에도 참전했습니다."
 SLO_prepare_production:0 "신형 전차"
 SLO_prepare_production_desc:0 "우리는 생산 라인이 더 까다로운 유형의 전차를 생산할 준비가 되었는지 확인해야 합니다"
 SLO_daimler_benz:0 "다임러-벤츠"
 SLO_daimler_benz_desc:0 ""
 ger_medium_tank_1936:0 "3호 전차 A형"
 SLO_medium_panzer:0 "독일 면허 구매"
 SLO_medium_panzer_desc:0 ""
 SLO_medium_tt:0 "15개 대대로 구성된 §Y중형전차§! 사단 획득"
 SLO_continue_production:0 "전차 생산에 집중"
 SLO_continue_production_desc:0 "우리가 이미 알고 있는 경전차 생산을 계속함으로써 공장의 생산량을 쉽게 극대화할 수 있습니다"
 SLO_light_tank:0 "ČKD"
 SLO_light_tank_desc:0 "ČKD는 구 체코슬로바키아에서 가장 큰 기술 회사 중 하나였습니다. 이 회사의 가장 주목할 만한 제품은 자체 설계한 경전차인 38(t) 전차와 38(t) 구축전차였습니다."
 SLO_light_tank_modernization:0 "신형 경전차"
 SLO_light_tank_modernization_desc:0 ""
 SLO_light_tt:0 "15개 대대로 구성된 §Y경전차§! 사단 1개 획득"
 SLO_german_assistance:0 "독일의 지원"
 SLO_german_assistance_desc:0 ""
 SLO_motorization:0 "육군 차량화"
 SLO_motorization_desc:0 ""
 SLO_mechanization:0 "슬로바키아 기계화보병"
 SLO_mechanization_desc:0 ""
 SLO_improved_mechanization:0 "추가 기계화 노력"
 SLO_improved_mechanization_desc:0 ""
 SLO_moto_mech_idea:0 "기계화 중점"
 SLO_special_forces:0 "특공대 훈련소"
 SLO_special_forces_desc:0 "제2차 세계대전 초반 독일 공수부대원의 성공은 많은 중부 유럽 국가들이 자체 공수부대를 창설하는 계기가 되었습니다. 1942년 초, 독일의 동맹국인 슬로바키아는 공수 훈련소를 설립하기로 결정했습니다."
 SLO_dispersed_support:0 "분산 지원"
 SLO_dispersed_support_desc:0 ""
 SLO_integrated_support:0 "통합 지원"
 SLO_integrated_support_desc:0 ""
 SLO_infiltration:0 "침투"
 SLO_infiltration_desc:0 ""
 SLO_assault:0 "강습"
 SLO_assault_desc:0 ""
 SLO_mass_mobilization:0 "대규모 동원"
 SLO_mass_mobilization_desc:0 ""
 SLO_deep_battle:0 "종심 전투"
 SLO_deep_battle_desc:0 ""
 SLO_purchase_guns:0 "독일로부터 장비 구매"
 SLO_purchase_guns_desc:0 "슬로바키아 국방부는 독일에 슬로바키아 공수부대원의 공수 훈련과 공수 장비 인도를 지원해달라고 요청했습니다."
 SLO_cavalry_focus:0 "기병대 현대화"
 SLO_cavalry_focus_desc:0 "슬로바키아 기병 분견대는 슬로바키아국 건국 첫해 동안 수차례 현대화를 거쳤습니다."
 SLO_purchase_transports:0 "수송기"
 SLO_purchase_transports_desc:0 "1943년 11월 15일, He-111에서의 첫 강하가 실시되었습니다. 1943년 11월 30일에는 질리나 마을 인근에서 첫 대규모 강하 시범이 있었습니다(He-111 2기에서 공수부대원 20명 강하)."
 SLO_commando:0 "특공대"
 SLO_commando_desc:0 "1942년 10월, 첫 지원자 그룹이 공수 훈련소에 입소했습니다. 유라이 메슈코가 이 그룹의 지휘관으로 임명되었으며, 이들은 미래 슬로바키아 공수부대의 핵심이 되었습니다."
 SLO_paratroopers_tt:0 "각각 15개 대대로 구성된 2개의 베테랑 §Y공수부대§! 사단을 획득합니다."
 SLO_motorized_tt:0 "각각 15개 대대로 구성된 2개의 베테랑 §Y차량화§! 사단을 획득합니다."
 SLO_arty_1:0 "지원포"
 SLO_arty_1_desc:0 ""
 SLO_tiger_tank:0 "티거 전차 획득"
 SLO_tiger_tank_desc:0 ""
 SLO_pack_arty:0 "산악포"
 SLO_pack_arty_desc:0 ""
 SLO_expand_centre:0 "공수 훈련소 확장"
 SLO_expand_centre_desc:0 ""
 SLO_infantry_equip:0 "보병 장비 현대화"
 SLO_infantry_equip_desc:0 ""
 SLO_infantry_focus:0 "보병 중점"
 SLO_infantry_focus_desc:0 ""
 SLO_infantry_tt:0 "각각 15개 대대로 구성된 3개의 §Y보병 사단§!을 획득합니다."
 SLO_tank_tt:0 "15개 대대로 구성된 1개의 §Y중전차§! 사단을 획득합니다."
 SLO_equipment_for_our_soldiers:0 "우리 병사들을 위한 장비"
 SLO_equipment_for_our_soldiers_desc:0 ""
 SLO_arty_2:0 "우리 병사들을 위한 포병"
 SLO_arty_2_desc:0 ""
 SLO_submachine_guns:0 "기관단총"
 SLO_submachine_guns_desc:0 ""
 SLO_gun_mass_production:0 "총기 생산 집중"
 SLO_gun_mass_production_desc:0 ""
 SLO_arty_3:0 "포병 현대화"
 SLO_arty_3_desc:0 ""
 SLO_security_tt:0 "각 15개 대대로 구성된 §Y보안 사단§! 4개를 획득합니다"
 SLO_security_divisions:0 "보안 사단"
 SLO_security_divisions_desc:0 "보안 보병 사단은 주로 독일군 전선 후방 지역에서 치안 및 대유격 작전에 투입되었습니다. 본래 보안 사단은 독일군이 동부로 진격하며 지나친 소련군 저항 세력을 소탕하는 데 사용되었습니다. 이후 슬로바키아 보안 사단은 지토미르 지역에서 대유격 작전에 투입되었습니다."
 SLO_soviet_war:0  "캅카스를 향해!"
 SLO_soviet_war_desc:0 "1941년 10월 2일, 신속 사단은 제1기갑군의 일원으로 페레쉬치나 지역 인근 드네프르강 동부에서 전투를 벌였습니다. 이 시점에서 사단은 전차 대부분을 상실했습니다. 사단은 1942년 초 독일군의 캅카스 지역 진격에 참여했으며, 로스토프 공격 및 점령에서 핵심적인 역할을 수행했습니다."
 SLO_hlinka_chad:0 "흘린카 근위대"
 SLO_hlinka_chad_desc:0 "흘린카 근위대는 1938년부터 1945년까지 슬로바키아 인민당이 유지했던 민병대입니다. 슬로바키아의 가톨릭 사제이자 사회 운동가였던 안드레이 흘린카의 이름을 따서 명명되었습니다."
 SLO_hlinka_youth:0 "흘린카 청년단"
 SLO_hlinka_youth_desc:0 "흘린카 근위대와 마찬가지로, 흘린카 청년단 또한 슬로바키아 인민당(HSPP)에 종속된 조직이었습니다. 1938년 청년 협회 및 조직들의 해산 및 재구성 이후 단일 전국 조직으로 결성되었습니다. 상징적으로 최고 사령관은 요제프 티소였으나, 1940년부터 1945년까지의 총사령관은 알로이즈 마체크였습니다."
 SLO_na_straz:0 "나 스트라시"
 SLO_na_straz_desc:0 "나 스트라시는 슬로바키아의 극우 정치와 관련된 체코와 슬로바키아의 구호입니다. 이는 '하일 히틀러의 슬로바키아 버전'으로 묘사되어 왔습니다. 슬로바키아국 시대에 이 구호는 흘린카 근위대원들이 비공식적인 인사로 사용했습니다."
 SLO_expand_hlinka_youth:0 "흘린카 청년단 확장"
 SLO_expand_hlinka_youth_desc:0 "초기에 흘린카 청년단은 소년들만을 위한 조직이었으나, 나중에는 소녀들을 위한 지부도 생겼습니다."
 ger_mechanised_infantry:0 "기초 독일군 하프트랙"
 SLO_southern_slovakia_tt:0 "만약 제1차 빈 중재가 발생하지 않았다면:\n§Y남부 슬로바키아:§!\n   §Y민간 공장 2개§! 추가\n§Y독일국§! 정치력 §G+100§!"
 SLO_spawn_mot:0 "차량화 사단"
 SLO_hitlers_demands:0 "히틀러의 요구 수용"
 SLO_hitlers_demands_desc:0 "이 거대한 투쟁 속에서 인력 요구가 끊임없이 증가하자, 히틀러는 우리가 동원할 수 있는 모든 인원을 징집하라는 명령을 내렸습니다."
 SLO_men_in_black:0 "검은 옷을 입은 사나이들"
 SLO_men_in_black_desc:0 ""
 SLO_heydrich_focus:0 "하이드리히를 국가 지도자로 초청"
 SLO_heydrich_focus_desc:0 ""
 SLO_decree:0 "주데텐 칙령"
 SLO_decree_desc:0 ""
 SLO_martial_law:0 "계엄령 선포"
 SLO_martial_law_desc:0 ""
 SLO_nuke:0 "원자폭탄 실험"
 SLO_nuke_desc:0 ""
 MAN_pacify_the_countrysidex:0 "시골 지역 평정"
 MAN_pacify_the_countrysidex_desc:0 "우리가 집권한 이래로, 국가의 더 외진 지역에서 무법자와 반란군들이 우리의 통치에 도전해 왔습니다. 정부로서 진지하게 받아들여지기를 원한다면, 이 테러리스트들을 뿌리 뽑고 국민들에게 우리가 통치권을 행사할 수 있음을 보여줘야 합니다."
 MAN_law_universityx:0 "법률 대학"
 MAN_law_universityx_desc:0 "우리나라는 아직 신생국입니다. 우리는 정부에 대한 가장 현대적인 이해를 바탕으로 완전히 새로운 법률 체계를 만들 진정한 기회를 가졌습니다. 이를 위해, 아시아에서 가장 뛰어난 인재들을 한데 모을 전문 시설을 만들어야 합니다."
 MAN_research_and_education_departmentx:0 "연구 교육부"
 MAN_research_and_education_departmentx_desc:0 "국가가 성장함에 따라, 우리의 교육 및 연구 시설도 그에 맞춰 성장하도록 보장해야 합니다. 우리의 연구 노력이 가장 필요한 곳에 집중되도록 더 큰 노력을 기울여야 합니다."
 MAN_trade_delegationx:0 "무역 대표단"
 MAN_trade_delegationx_desc:0 "세계의 다른 나라들은 우리보다 산업 기술이 더 발전해 있습니다. 우리는 대표단을 파견하여 그들의 기술을 연구하고 우리 자신을 개선할 방법을 찾아야 합니다."
 MAN_expand_the_textile_industryx:0 "섬유 산업 확장"
 MAN_expand_the_textile_industryx_desc:0 "우리의 섬유 공장은 오랫동안 우리 산업의 주축이었으며, 더 많은 외자를 획득하여 우리의 산업 기반을 확장하는 가장 쉬운 방법이 될 것입니다."
 MAN_obediencex:0 "복종"
 MAN_obediencex_desc:0 "어떤 이들은 우리를 일본의 단순한 꼭두각시라고 부르지만, 그들은 우리의 가깝고 동등한 관계를 근본적으로 오해하고 있습니다. 우리의 후원자에게 맞서는 것은 자식이 부모에게 맞서는 것과 같습니다."
 MAN_mukden_military_academy_idea:0 "봉천 군관학교"
 MAN_mukden_military_academyx_desc:0 ""
 MAN_army_modernizationx:0 "육군 현대화"|
 IRQ_retool_the_army:0 "육군 재정비"
 IRQ_retool_the_army_desc:0 "육군이 올바른 장비로 무장하고 있지 않으므로, 상황을 바로잡기 위해 긴급 조치를 취해야 합니다."
 MAN_five_people_armiesx:0 "오족군"
 MAN_five_people_armiesx_desc:0 "모든 국민이 평등하다면, 모든 국민은 외국의 압제자들에 맞서 국가를 방어할 준비와 의지가 동등하게 있어야 합니다."
 MAN_showa_steel_desc:0 "우리는 일본의 도움으로 요동에 있는 제철소를 동아시아 최대 규모로 더욱 발전시킬 수 있습니다."
 IRQ_revolution3:0 "왕실을 넘어선 피"
 IRQ_revolution4:0 "무프티를 귀환시켜라"
 IRQ_revolution5:0 "우리 동족의 재결합"
 IRQ_revolution6:0 "고대 영토 통합"
 IRQ_revolution7:0 "제국 선포"
 ALB_TO_IRQ_fascism:0 "황금 방진 이라크"
 IRQ_revolution:0 "RAF 하바니야 강습"
 IRQ_revolution_desc:0 ""
 IRQ_ita_revolution:0 "이슬람의 검, 동쪽으로 진군하다"
 IRQ_ita_revolution_desc:0 ""
 IRQ_eco1:0 "영국 투자 국유화"
 IRQ_eco1_desc:0 "수십 년간 이어진 영국의 약탈에 대해 그들의 자산을 압류하여 보상받을 것입니다."
 IRQ_eco3_desc:0 "수십 년간 이어진 영국의 약탈에 대해 그들의 자산을 압류하여 보상받을 것입니다."
 IRQ_the_golden_square_coup:0 "황금 사각형 쿠데타"
 IRQ_the_golden_square_coup_desc:0 "오랫동안 앵글로족이 우리 땅을 점령하고 귀중한 석유를 빼앗아 갔으며, 우리를 그들 기업의 노예로 만들었습니다. 우리의 타락한 군주제는 나약하며, 국가를 제대로 대표하지 못합니다. 이런 변변찮은 지도자를 몰아내고, 파시스트 원칙을 따르는 강력한 지도자를 세워 국가를 위대함으로 이끌어야 합니다!"
 IRQ_army_doctrine5:0 "국민 규합"
 IRQ_army_doctrine5_desc:0 "앵글로족의 위협에 맞서 국가를 규합할 것입니다!"
 IRQ_eco2:0 "토지 개혁"
 IRQ_army_doctrine4:0 "알푸투와 청년단"
 IRQ_army_doctrine4_desc:0 "우리의 청년들에게 파시즘과 범아랍주의 이념을 주입할 것입니다."
 IRQ_army_doctrine:0 "새로운 군사 교리"
 IRQ_army_doctrine2:0 "교리 개발 가속화"
 IRQ_army_doctrine2_desc:0 "전쟁은 최고의 스승입니다."
 IRQ_army_doctrine3:0 "공화국 수비대"
 IRQ_army_doctrine3_desc:0 "최정예 중의 최정예를 수도에 배치합니다."
 IRQ_army_doctrine_desc:0 "우리에게는 훌륭한 군사 이론가가 없어 낡은 대전쟁 전술에 얽매여 있습니다. 외국인을 고용하여 전쟁 기술을 배워야 합니다."
 ITA_align_iraq:0 "이라크 민족주의 선동"
 ITA_align_iraq_desc:0 "우리는 현지 친추축국 이라크 정부에게 '해방자'로 자리매김하여 그들의 군대를 우리 대의에 끌어들여야 합니다."
 RAJ_hyderabad_rails:0 "하이데라바드 철도"
 RAJ_hyderabad_rails_desc:0 "인도 중부에 철도를 개발할 것입니다."
 RAJ_pakistani_rails:0 "중앙아시아로 향하는 도로 포장"
 RAJ_pakistani_rails_desc:0 "아프가니스탄과 이란으로 이어지는 기반 시설을 개발할 것입니다."
 RAJ_gujarat_rails:0 "구자라트 해운 개발"
 RAJ_gujarat_rails_desc:0 "봄베이를 모든 물품이 통과하는 주요 항구로 만들 것입니다."
 BUL_sign_salonika_agreement:0 "살로니카 협정 체결"
 BUL_ignore_treaty_neuilly_sur_seine:0 "뇌이쉬르센 조약 무시"
 BUL_vmz_sopot:0 "VMZ 소포트"
 ETH_army_reform:0 "식민지군 개혁"
 ETH_army_reform_desc:0 "우리 군은 지휘 구조와 사단 편제에 있어 상명하달식 개혁이 절실히 필요합니다."
 BUL_krali_marko_line:0 "크랄리 마르코 방어선"
 BUL_prosveta_publishing_house:0 "프로스베타 출판사"
 FIN_prepare_for_war:0 "전쟁 준비"
 FIN_prepare_for_war_desc:0 "외국의 침략에 대비하여 불의의 기습을 당할 여유가 없습니다. 군사 장비는 가장 필요할 때 부족한 것보다, 사용하지 않더라도 미리 만들어 두는 것이 낫습니다."
 FIN_develop_the_war_machine:0 "마보이마트 개발"
 FIN_develop_the_war_machine_desc:0 "군사 장비 생산을 늘리면 주권을 수호하는 데 도움이 될 것입니다. 일부에서는 더욱 공격적인 태세를 취해야 한다는 논의도 시작되었습니다."
 BUL_girdap:0 "기르다프"
 BUL_local_antitank_innovation:0 "국산 대전차 기술 혁신"
 BUL_interventionism:0 "개입주의"
 BUL_dedication_to_the_axis_desc:0 "추축국에 대한 우리의 헌신은 결실을 맺어, 우리나라가 파시즘을 더욱 지지하는 것처럼 보입니다. 지도자를 선출할 때 흐리스토 루코프는 현명한 선택이 될 것입니다."
 BUL_the_wrong_axis_desc:0 "우리가 잘못된 동맹에 가입한 것 같습니다. 추축국은 우리를 보호할 만큼 강하지 않으며, 우리는 소련 외교관들과의 관계를 유지해왔습니다. 이제 그들을 활용할 때입니다."
 BUL_negotiate_with_the_soviets_desc:0 "이제 코민테른 가입 가능성에 대해 소련과 협상을 시작할 때입니다. 우리는 독일의 생존보다 우리 자신의 생존을 먼저 확보해야 하며, 소련이 이를 도울 수 있습니다."
 BUL_align_with_the_west_desc:0 "유럽의 즉각적인 위협에 직면한 지금, 우리의 유일한 안전지대는 서유럽의 보호 아래 있는 연합국뿐입니다."
 BUL_appease_the_allies_desc:0 "연합국은 니콜라 무샤노프와 그의 민주당을 총리로 지지한다는 의사를 밝혔습니다. 무샤노프 정권을 수립하면 우리의 대의에 큰 도움이 될 것입니다."
 BUL_deal_with_the_allies_desc:0 "더 이상 수상한 뒷거래는 없습니다. 이제 불가리아가 모든 선의를 위해 연합국의 공식적인 일원이 되었음을 세상에 알릴 것입니다."
 BUL_balkan_alignment_desc:0 "우리의 의제를 진전시키기 위해, 우리는 몇 가지 정렬 변경을 수행해야 합니다. 발칸과 함께 정렬하거나, 발칸을 정렬하거나 둘 중 하나입니다."
 BUL_befriend_greece_desc:0 "수십 년간 이어진 그리스와의 경쟁 관계를 끝내야 합니다. 지금까지는 즐겁고 좋았지만, 이제는 함께 뭉칠 때입니다."
 BUL_befriend_romania_desc:0 "북쪽의 이웃인 루마니아는 우리를 그다지 좋아하지 않습니다. 이제는 그것을 바꿀 때입니다. 그래야 발칸 국가들이 함께 뭉쳐 하나씩 각개격파당하지 않을 것입니다."
 BUL_formalise_the_balkan_entente_desc:0 "협상국 체제의 일원이 되는 것은 좋지만, 우리를 침략하려는 자들에게 맞서기 위해 이를 재확인하는 것을 고려해야 합니다."
 BUL_alliance_with_the_entente_desc:0 "이제 유고슬라비아, 루마니아, 그리스를 달랬으니, 발칸 협상국에 가입하는 것을 고려해야 합니다. 발칸 협상국은 우리를 강하게 지켜줄 것입니다."
 BUL_albanian_inheritance_desc:0 "알바니아는 슬라브족일 뿐만 아니라, 과거 위대한 불가리아 제국의 일부였습니다. 이제 상황을 바로잡고 그들의 독립이 우리의 자비에 달려 있음을 상기시켜 줄 때입니다."
 BUL_local_armour_acquirements_desc:0 "기갑 장비를 외부 공급원에 의존하기보다, 우리 스스로 설계하고 생산해야 합니다. 그렇게 해야 항상 안전할 것입니다."
 BUL_over_the_balkans_desc:0 "산악 사단은 발칸 반도에서 유용합니다. 이를 연구하고 배치하면 장기적으로 우리에게 엄청난 도움이 될 것입니다."
 BUL_protect_the_balkans_desc:0 "발칸을 보호하기 위해, 우리는 뚫을 수 없는 요새선을 구축하고 군사력으로 이를 확보해야 합니다."
 BUL_girdap_desc:0 "불가리아의 기르다프 은행에서 자금을 확보해야 합니다. 그들은 많은 정부 프로젝트에 자금을 지원하고 우리가 돕기 꺼리는 일부 분야에서 지원을 제공할 수 있습니다."
 BUL_across_the_land_desc:0 "전 국토에 걸쳐 기반 시설을 개선해야 합니다. 현재 우리 도로는 훌륭하지 않으며, 미래의 군사 이동을 지원하기 위해 이것은 좋은 시작입니다."
 BUL_bulgarian_electronics_desc:0 "전자공학 연구는 미래로 나아가는 한 걸음입니다. 우리는 그 미래로 나아갈 계획을 실현해야 합니다."
 BUL_steel_exports_desc:0 "불가리아는 막대한 양의 강철을 보유하고 있지는 않지만, 불가리아의 수요를 충족하고 최소한의 수준으로 수출하기에는 충분합니다."
 BUL_global_detection_desc:0 "현대화의 다음 단계는 바로 레이더입니다. 대규모 방송은 바카렐에 대형 송신기를 설립하는 것을 시작으로 불가리아를 미래로 이끌 것입니다."
 BUL_institute_for_nuclear_research_desc:0 "불가리아가 시대에 발맞춰 발전하려면, 우리 스스로 원자력 연구를 시작하는 것이 가장 중요합니다."
 BUL_jet_fighters_desc:0 "우리의 구형 전투기들이 현재 우리 군에 적합하지만, 이 상태가 계속되지는 않을 것입니다. 도약을 통해 발전하는 것보다 더 좋은 방법이 있을까요?"
 BUL_derhavna_samoletna_fabrika_desc:0 "데르하브나 사몰레트나 파브리카는 불가리아 군을 위해 여러 폴란드 전투기를 현지에서 생산하기 위해 불가리아에 설립된 폴란드 공장입니다."
 BUL_retake_thrace_desc:0 "트라키아는 명목상 우리의 영토입니다! 제2차 발칸 전쟁 이전, 트라키아는 불가리아의 핵심 영토였으나, 그 더러운 그리스 놈들이 우리에게서 빼앗아갔습니다! 무슨 수를 써서라도 되찾아야 합니다!"
 BUL_soviet_t_34_desc:0 "소련의 기술을 획득하려면, 그들의 주력 전차인 T-34를 획득해야 합니다. 전차 획득에 노력을 기울일 것입니다."
 BUL_bulgarian_dars_desc:0 "불가리아의 DAR사는 과거에 많은 훈련기를 제작했습니다. 아마 이 훈련기들을 조종사들이 비행하며 경험을 쌓는 데 활용할 수 있을 것입니다."
 BUL_dismantle_the_government_desc:0 "정부가 보리스 차르를 배신했습니다! 반대파가 쿠데타를 시도하기 전에 제거해야 합니다!"
 BUL_depose_the_king_desc:0 "마침내 가짜 왕을 제거할 때가 왔습니다. 그는 더 이상 불가리아를 이끌 자격이 없습니다."
 BUL_local_antitank_innovation_desc:0 "국가로서 불가리아는 다른 나라에 대항할 만큼 충분히 좋은 전차를 생산할 수 없으므로, 전차에 대처할 다른 방법을 찾아야 합니다."
 BUL_interventionism_desc:0 "이제 우리가 세상을 안전하게 만들 때입니다. 과거에 수없이 패배했으니, 이제 명예를 회복할 기회를 얻었습니다."
 BUL_vrazhdebna_airfield_desc:0 "우리 공군은 비행장이 필요하며, 이를 위해 비행장을 건설할 부지를 확보해야 합니다. 정부의 포고령에 따라 건설될 것입니다."
 BUL_bulgarian_revanchism_desc:0 "우리는 대전쟁의 패배에 대한 조치를 취하고, 다시 한번 위대한 불가리아로 가는 길을 확보해야 합니다."
 BUL_demand_dobrudja_desc:0 "도브루자는 마땅히 우리의 영토이며, 루마니아가 대전쟁과 발칸 전쟁의 결과로 부당하게 빼앗아갔습니다."
 BUL_our_brothers_in_macedonia_desc:0 "바르다르 마케도니아는 마땅히 불가리아의 영토이며, 우리는 그들이 유고슬라비아 정부에 맞서 싸우도록 고무할 수 있습니다."
 BUL_deal_with_germany_desc:0 "독일이 유고슬라비아를 침공할 계획이 있다고 합니다. 이는 우리가 독일로부터 마케도니아를 획득할 이상적인 위치에 놓이게 합니다."
 BUL_yugoslavia_for_ourselves_desc:0 "우리는 유고슬라비아를 나누지 않을 것입니다. 그들은 슬라브인이며 불가리아와 통합되어야 합니다."
 BUL_return_to_the_aegan_desc:0 "에게해는 과거 우리의 영향권에 있었습니다. 대불가리아를 위해 다시 한번 확보할 것입니다."
 BUL_enemy_of_my_enemy_desc:0 "이탈리아는 우리가 그리스로부터 트라키아를 확보하는 데 도움을 줄 수 있습니다. 이탈리아가 침공하면, 우리는 트라키아의 통제권을 요청하고 단계적으로 옛 제국을 복원할 수 있습니다."
 BUL_fleet_of_the_aegan_desc:0 "지중해의 통제권을 확보하고 해상 지배력을 강화하기 위해, 지중해에서 함대를 생산하기 시작해야 합니다."
 BUL_anti_air_defence_of_sofia_desc:0 "수도에 대한 치명적인 폭격을 방지하기 위해, 소피아에 대공 방어 시설을 설치해야 합니다."
 BUL_befriend_turkey_desc:0 "협상국과 우호 관계를 맺기 위한 노력의 일환으로, 터키와 친선을 도모해야 합니다."
 BUL_cut_ties_with_germany_desc:0 "연합국은 우리가 독일과의 관계를 완전히 단절하면 도와주겠다고 했습니다. 이제 불가리아가 자립할 때입니다."
 BUL_protect_bulgaria_desc:0 "스스로를 방어하기 위한 노력으로, 국경을 따라 요새선을 건설해야 합니다. 이는 향후 모든 침공에 맞서는 데 도움이 될 것입니다."
 BUL_agrarian_utopia_desc:0 "불가리아는 대부분 농민과 농본주의자로 구성되어 있습니다. 우리는 이를 공산주의로 나아가는 길에 잘 활용할 수 있습니다."
 BUL_slavic_confederation_desc:0 "소련에 가담하는 대신, 이웃 국가들과 동맹을 맺고 올바른 길을 보여줌으로써 이곳 발칸 반도에서 우리의 영향력을 가장 잘 발휘할 수 있습니다."
 BUL_macedonian_literary_circle_desc:0 "우리 정부의 공산주의자들은 마케도니아인들의 발전을 돕기 위해 이른바 마케도니아 문학회를 설립했습니다. 이제 우리는 그것을 전반적인 발전을 위해 사용할 것입니다."
 BUL_support_urbanisation_desc:0 "더 이상 건설할 공간이 충분하지 않습니다. 공간을 좀 확보해야 합니다."
 BUL_synthetic_experiments_desc:0 "불행히도 우리는 무역을 위해 영원히 외부 세계에 의존할 수 없으며, 특히 전쟁 시에는 더욱 그렇습니다. 합성 자원을 제조하는 시도를 해야 합니다."
 BUL_better_excavation_equipment_desc:0 "우리의 굴착 장비는 구식입니다. 개선할 수 있으며, 개선해야만 합니다!"
 BUL_buy_from_britain_desc:0 "아마 영국은 우리가 그들과 다른 연합국들로부터 장비를 구매하는 것을 허락할 것입니다. 더 많은 곳에서 구매할 수 있다면, 더 많은 장비를 구할 수 있지 않겠습니까?"
 BUL_support_macedonian_industry_desc:0 "우리의 마케도니아 괴뢰국은 산업화에 약간의 지원이 필요합니다. 우리는 그들을 도와야 하며, 결국 그들은 우리에게 더 유용해질 것입니다."
 BUL_the_macedonian_question_desc:0 "일반적으로 마케도니아인들은 불가리아에서 문제입니다. 우리는 이 문제를 해결할 방법을 찾아야 합니다."

 BUL_mechanised_effort_desc:0 "너무 오랫동안 차량화 부대에 의존해 왔습니다. 다음 단계인 기계화로 나아가야 합니다!"
 BUL_local_factories_desc:0 "국산품을 생산하려면, 그것을 생산할 공장이 있어야 하지 않겠습니까? 정부가 낡은 건물들을 철거하면 그 자리에 공장을 지을 수 있습니다."
 BUL_support_equipment_desc:0 "불가리아군은 지원 장비가 필요합니다! 총만으로는 다가올 전쟁에서 승리할 수 없습니다."
   
 BUL_may_provoke_aggression:0 "§R이는 마케도니아의 침략을 유발할 수 있습니다.§!"
 bogdan_filov_leader:0 "보그단 필로프가 집권했습니다"
 boris_iii_leader:0 "보리스 3세가 최고 지도자로 임명되었습니다"
 BUL_permit_german_access_tt:0 "독일군의 불가리아 영내 통행을 허가합니다."
 ###
 NOR_sjoforsvaret:0 "셰포르스바레트"
 NOR_sjoforsvaret_desc:0 "노르웨이 해군(Norges marinförsvar)은 우리의 제1 방어선입니다"
 NOR_norwegian_shipping:0 "노르웨이 해운"
 NOR_norwegian_shipping_desc:0 "노르웨이의 조선업은 세계를 선도합니다"
 NOR_merchant_marine_protection:0 "상선단 호위"
 NOR_merchant_marine_protection_desc:0 "우리는 강력한 상선단을 보호해야 합니다"
 NOR_support_the_shipbuilding_industry:0 "조선업 지원"
 NOR_support_the_shipbuilding_industry_desc:0 "조선소들이 다시 가동될 것입니다"
 NOR_naval_modernisation:0 "해군 현대화"
 NOR_naval_modernisation_desc:0 "피오르에서의 해상 우위를 점하기 위한 핵심입니다"
 NOR_aquire_the_stord_class_destroyers:0 "스토르급 구축함"
 NOR_aquire_the_stord_class_destroyers_desc:0 "스토르급 구축함을 획득합니다"
 NOR_new_submarines:0 "신형 잠수함"
 NOR_new_submarines_desc:0 "잠수함 함대를 현대화합니다"
 NOR_upgrade_from_the_norge_class:0 "노르게급 개량"
 NOR_navy_4:0 "고속 어뢰"
 NOR_navy_4_desc:0 "재장전 시간과 폭발 장약량을 희생하는 대신 어뢰에 추진제를 과급하여, 고속으로 장거리까지 나아가게 함으로써 방호망을 더 쉽게 돌파할 수 있습니다."
 NOR_upgrade_from_the_norge_class_desc:0 "우리는 새로운 주력함이 필요합니다. 연안 방어함이 우리의 요구에 잘 부합할 것입니다."
 NOR_naval_drills:0 "해상 훈련"
 NOR_escort_effort:0 "호위 전력 확충"
 NOR_convoy_effort:0 "상선단 재건"
 NOR_convoy_effort_desc:0 "모든 전쟁은 보급선에 의해 수행되고, 승리하며, 패배합니다. 우리의 숙련된 조선공들은 연합국을 위해 수송선을 신속하게 건조할 수 있습니다."
 NOR_escort_effort_desc:0 "대잠 및 호위 구축함이 필요합니다. 우리는 이 문제에 대해 연합국을 지원해야 합니다."
 NOR_naval_drills_desc:0 "철저한 준비를 통해 귀중한 교훈을 얻을 수 있을 것입니다."
 NOR_free_navy:0 "자유 노르웨이 해군"
 NOR_free_navy_desc:0 "우리는 연합국에 우리 선박을 보호하기 위해 그들의 구축함 몇 척을 빌려달라고 요청할 것입니다."
 NOR_ASW:0 "영국 대잠전 학교"
 NOR_cold_navy:0 "한랭 해역 해군"
 NOR_cold_navy_desc:0 "북극 국가로서, 우리 수병들은 한랭 해역에서의 해전에 잘 훈련되어 있어 추축국에 비해 우위를 점할 수 있습니다."
 NOR_naval_radar:0 "해상 레이더"
 NOR_naval_radar_desc:0 "레이더는 적에게서 야음의 이점을 빼앗고 악천후 속에서도 그들을 탐지할 수 있는 매력적인 가능성을 제공합니다."
 NOR_ASW_desc:0 "영국은 적 유보트와의 전투에서 많은 진전을 이루었습니다. 우리는 그들과 협력하여 우리 교리를 개선할 수 있습니다."
 NOR_standing_navy:0 "상비 해군"
 NOR_standing_navy_desc:0 "현대적인 상비 해군은 우리가 제해권을 장악하게 해줄 것입니다."
 NOR_carriers:0 "호위 항공모함"
 NOR_carriers_desc:0 "잠수함과 소규모 해군 기동부대로부터 상선을 호위하기 위한 소형 항공모함을 건조하는 것이 정규 함대 항공모함보다 우리가 달성하기에 더 실현 가능성이 높습니다."
 TIB_anti_meme33:0 "일본으로부터 런던 해방"
 GER_the_great_turn:0 "최종 승리"
 GER_the_great_turn_desc:0 "국제 볼셰비키 음모에 대한 승리는 필연적입니다! 독일 민족은 전세를 역전시켜 승리할 운명이며, 패배는 불가능합니다!"
 TIB_anti_meme:0 "1.4 버전 대인 공격력으로 회귀"
 endsieg_tt:0 "§H우리의§! §C핵심 영토 사단 공격력§! §H과§! §C핵심 영토 사단 방어력§! §H이(가)§! §C20%§! §H만큼 증가합니다.§! §H또한 우리는 전선을 유지하기 위해 §G72개의 40너비 보병 사단§!을(를) 배치할 것입니다.§!\n\n§H우리의 공장 생산량은 우리가 통제권을 잃는 주의 수에 따라 증가할 것입니다.§!"
 ITA_fort_milan:0 "요새 밀라노"
 ITA_fort_milan_desc:0 "우리는 마지막 이탈리아인까지 싸울 것입니다! 밀라노를 이탈리아의 스탈린그라드로 만들 것입니다!"
 ITA_The_Riches_Of_The_North:0 "북부의 부"
 ITA_The_Riches_Of_The_North_desc:0 "본토 북부는 우리 제국의 경제적 심장부입니다. 더 안정적인 경제를 위해 그 심장을 더 강하게 만듭시다."
 ITA_Dont_Forget_The_Colonies:0 "제국의 나머지 영토"
 ITA_Dont_Forget_The_Colonies_desc:0 "우리는 이탈리아뿐만 아니라 제국 전체에 문명과 부를 가져와야 합니다. 리비아 식민지에 우리 체제를 전파하고, 아랍인들을 국가 파시스트당에 통합시키며, 수천 킬로미터의 새로운 도로를 건설해야 합니다. 그래야만 우리는 미래에 굳건히 설 수 있을 것입니다!"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire:0 "빈곤 지역 일자리 창출"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire_desc:0 "우리는 낙후된 지역의 빈민들을 위해 부를 창출해야 합니다. 어떻게 하냐고요? 우리는 국가의 군사화 증대에 기여할 일자리를 만들 것입니다. 이것은 서로에게 이득이 되는 상황입니다."
 ITA_Skillful_Workers:0 "채워진 배"
 ITA_Skillful_Workers_desc:0 "빈민들은 경험과 무엇보다도 채워진 배 덕분에 우리가 그들을 위해 지은 새로운 무기 단지에서 무기 제작에 꽤 능숙해지고 있습니다. 일자리는 빈민에게 돈을 벌게 해주고, 돈은 가족에게 식량을 제공합니다. 이 '채워진 배' 전략은 우리의 생산량 수치에서 성과를 보이고 있습니다."
 ITA_Our_Finest_Hour:0 "최고의 순간"
 ITA_Our_Finest_Hour_desc:0 "우리의 산업 변혁이 완료되었습니다. 우리는 곧 닥쳐올 암흑기에 대비가 되었으며, 이것이 우리의 최고의 순간이 될 것입니다."
 GER_standardpanzer:0 "표준 전차"
 GER_standardpanzer_desc:0 "우리는 최종 표준화 전차 계열을 도입할 것입니다. 이 계열은 소형 E-10부터, E-50 표준 중형전차, E-75 표준 중전차, 그리고 최종적으로 E-100 초중전차까지 포함합니다. 이러한 표준화되었지만 급조된 설계 덕분에 우리는 상당히 저렴한 비용으로 전차를 생산할 수 있을 것입니다. 이는 전차 잉여분을 창출하여 우리의 최종 승리를 달성하는 데 도움이 될 것입니다."
 MAN_resources:0 "광업 및 석유 산업 개발"
 MAN_resources_desc:0 "우리 영토는 알루미늄, 강철, 석유가 풍부하지만 오랫동안 방치되어 왔습니다. 이러한 자원을 개발하는 것이 앞으로 나아갈 길입니다."
 MAN_railways_kirin_desc:0 ""
 GER_choco_foc:0 "전차 초콜릿"
 GER_choco_foc_desc:0 "속도만이 우리가 필요한 전부입니다."
 GER_pillen_foc:0 "헤르만 괴링 알약"
 GER_pillen_foc_desc:0 "더 단단하게, 더 빠르게, 더 강하게."
 GER_stuka_foc:0 "슈투카 정제"
 GER_stuka_foc_desc:0 "우리의 급강하 폭격기 조종사들은 세계 최고 수준이지만, 전쟁은 우리가 가진 것의 120%를 요구합니다."
 SOV_support_usa:0 "연합군 지원"
 fin_shocktroops:0 "친위 예거"
 fin_shocktroops_desc:0 "레닌그라드 시는 도시 요새이며 우리 군 대부분이 공격하기에는 너무 어렵습니다. 우리는 시가전 훈련을 받은 특수 보병 부대가 필요합니다."
 fin_ranger:0 "시시 부대"
 fin_ranger_desc:0 "우리는 핀란드와 러시아의 울창한 숲속에서 보급선과 멀리 떨어진 곳에서 싸울 수 있는 부대 창설을 지원해야 합니다."
 SOV_support_usa_desc:0 ""
 USA_support_sov:0 "소비에트 연방 지원"
 USA_support_sov_desc:0 ""
 winter_war_tt:0 "이 중점은 바르바로사 작전 시작 시 이벤트를 통해 자동으로 완료됩니다"
 army_inno_3_tt:0 "§C대전차 장갑차를 해금할 것입니다§!\n\n"
 fin_join_axis:0 "추축국 가입"
 ITA_blackshirts:0 "검은 셔츠단 모집"
 ITA_blackshirts_desc:0 "우리 군은 전장에 8백만 개의 총검을 배치해야만 두려움의 대상이 될 것입니다."
 black_shirts:0 "검은 셔츠단"
 fin_join_axis_desc:0 "우리는 소비에트 연방에 대한 영유권 주장을 유지하는 대가로 삼국 동맹 조약에 서명하고 추축국의 정식 회원국이 될 것입니다."
 fin_supremacy_of_will:0 "의지의 우월성"
 fin_supremacy_of_will_desc:0 "우리에게 죽음보다 더 두려워할 것은 없습니다."
 MAN_railways_chahar_desc:0 ""
 MAN_railways_schahar_desc:0 ""
 plan_zzz_tt:0 "§R수상 함대에 대한 투자는 비용이 매우 많이 들며, 군의 다른 분야에 더 집중적으로 투자하는 것을 막을 것입니다!§!\n\n§C상당한 양의 해군 기술을 자동으로 연구하게 될 것입니다.§!\n\n"
 GER_guns1_desc:0 "우리 무기 제조업체들은 병사들을 위한 새로운 표준 무기의 가능성을 연구했습니다. 이 새로운 무기는 모든 신병을 즉시 기관총 사수로 만들어 줄 것입니다. 소총 구경탄을 사용하는 이 새로운 기관단총으로, 우리는 적에 대한 우위를 점할 것입니다."
 MAN_railways_sungkiang_desc:0 ""
 MAN_railways_hulunbuir_desc:0 ""
 GER_plan_z_cv:0 "그라프 체펠린 실험"
 GER_plan_z_cv_desc:0 ""
 GER_plan_z_bb:0 "비스마르크 건조"
 GER_plan_z_bb_desc:0 ""
 MAN_railways_heilungkiang_desc:0 ""
 MAN_railways_jehol_desc:0 ""
 JAP_capture_chinese_scientists:0 "중국인 과학자 확보"
 JAP_capture_chinese_scientists_desc:0 "우리는 연구 및 개발을 진전시키기 위해 중국인 지식인들을 활용할 것입니다."
 GER_integrate_spanish_economy:0 "스페인 전쟁 경제 통합"
 GER_integrate_spanish_economy_desc:0 "우리는 군사적 지원의 대가로 스페인 형제들에게 무기와 식량을 지원할 것입니다."
 disable_ai_stuff:0 "AI 생산 비활성화"
 wunder_tt:0 "우리의 핵무기 프로그램인 우란프로옉트를 시작하고, 노르웨이를 통제한다면 §C중수§! 생산을 시작할 것입니다.\n\n§C'원자력 연구'§! 연구"
 rocket_stuff_tt:0 "우리의 로켓 프로그램인 보복무기를 시작할 것입니다.\n\n§C'실험용 로켓'§! 연구\n\n"
 RAJ_expand_air_bases2:0 "동부 공군 기지 확장"
 RAJ_expand_air_bases2_desc:0 "버마는 일본과의 최전선에 있습니다. 그곳에 비행장이 필요합니다."
 HUN_hmp_heavy_fighter_effort:0 "전투기 집중"
 HUN_hmp_heavy_fighter_effort_desc:0 "아군 병력 상공의 제공권을 장악하고, 국가를 위협하는 적기를 요격하기 위해 전투기가 필요합니다."
 HUN_hmp_tac_focus:0 "폭격기 집중"
 HUN_hmp_tac_focus_desc:0 "현대적인 군대는 지상뿐만 아니라 공중에서의 지원도 필요합니다."
 france_is_kill:0 "항복함"
 VIC_join_axis:0 "삼국 동맹 조약 서명"
 VIC_join_axis_desc:0 "연합국의 주권 및 식민지 침해로 인해 우리는 영국과 선전포고 없는 전쟁 상태에 있습니다. 우리 국가를 보호하기 위해 공식적으로 독일과 동맹을 맺어야 합니다!"
 JAP_the_zero2_tt:0 "§C3티어 함상 전투기§!를 연구하고 §Y'제로센'§!을 생산 목록에 추가합니다."
 amerika_bomber_tt:0 "§C현대 대형 기체§! 연구"
 jet_focus_tt:0 "§G독일§!과 §G이탈리아§! 양국 모두 §C제트 전투기§! 및 §C제트 엔진§!을 연구합니다."
 ural_bomber_tt:0 "§C현대 중형 기체§!를 연구합니다."
 ETH_generals_focus_tt:0 "\n§R이라크로 플레이할 수 없게 됩니다§!\n\n"
 ENG_us_civs_1:0 "캐시 앤 캐리"
 TIB_nothing45:0 "StrategyStreamers 가입"
 CAN_ATLANTIC_DEMOCRATIC:0 "대서양 연방"
 ENG_us_civs_2:0 "영국에 소규모 무기 대여"
 ENG_us_civs_3:0 "영국에 무기 대여"
 ENG_us_civs_4:0 "영국에 대규모 무기 대여"
 ENG_us_civs_5:0 "민주주의의 병기창"
 linie:0 "§L라인리니에, 슈테틴리니에, 베를린 요새를 건설합니다§!"
 TIB_nothing2:0 "Horst: Global Offensive 발매"
 ENG_no_asia_idea:0 "서부 전선 조정"
 ENG_no_asia_idea_desc:0 "이 국가 정신은 연합국의 능력을 '폭풍의 서막' 시작일의 연합국과 유사하게 만들기 위해 영국에 추가됩니다."
 ENG_no_asia_idea2:0 "전쟁으로 가는 길"
 ENG_no_asia_idea2_desc:0 "전쟁과 불명예 사이의 선택권이 주어졌습니다. 당신은 불명예를 택했고, 전쟁을 치르게 될 것입니다. -윈스턴 처칠"
 ENG_no_asia_idea3:0 "전쟁"
 ENG_no_asia_idea3_desc:0 "…우리는 해변에서 싸울 것이며, 상륙지에서도 싸울 것이고, 들판과 거리에서도 싸울 것이며, 언덕에서도 싸울 것입니다. 우리는 결코 항복하지 않을 것입니다… -윈스턴 처칠"
 I_HATE_ASIA_NAME:0 "서부 전선"
 I_HATE_ASIA_DESC:0 "극동에서의 전쟁이 없는 제2차 세계대전.\n\n연합국/코민테른: 영국, 프랑스, 캐나다, 남아프리카, 노르웨이, 폴란드, 그리스, 소비에트 연방.\n\n추축국: 독일, 이탈리아, 루마니아, 헝가리, 핀란드, 비시 프랑스, 이탈리아령 동아프리카, 크로아티아, 슬로바키아, 불가리아."
 ENG_overlord_states:0 "오버로드 작전"
 ENG_overlord_states_desc:0 "유럽은 요새이므로 공격을 신중하게 계획해야 합니다."
 NZL_bob_semple_tank_tt:0 "§H밥 셈플§ 생산을 활성화합니다"
 fourth_shore_tt:0 "§G리비아 전역이 우리의 핵심 영토가 될 것입니다§!"
 ITA_fourth_shore:0 "네 번째 해안"
 ITA_sword:0 "이슬람의 검"
 ITA_sword_desc:0 "리비아에 대한 오스만 제국의 권위를 계승한 자로서, 우리는 정당하게 이슬람의 수호자를 자처할 수 있습니다."
 ITA_fourth_shore_desc:0 "이탈리아의 무슬림은 이탈리아의 네 번째 해안이자 이탈리아 민족의 필수적인 부분입니다. 쿠란 학교 설립, 모스크 복원, 이슬람 문화 학교 건설을 통해 리비아를 이탈리아에 통합할 수 있습니다. 우리는 평화, 정의, 복지, 그리고 예언자의 율법에 대한 존중을 보장할 것입니다."
 MAN_found_the_northeast_transport_committeex_desc:0 "우리가 아시아의 경제 강국이 되려면, 일본 재벌과 남만주 철도의 영향력에서 벗어나기 위해 노력해야 합니다. 만주인이 소유하고 운영하는 철도를 건설함으로써, 우리는 만주국에 우선적으로 이익이 되는 방향으로 개발을 이끌 수 있습니다."
 MAN_five_year_plan_new_desc:0 "소비에트 연방의 급속한 산업화는 우리 경제를 발전시키는 데 자본주의가 필요 없다는 증거입니다. 우리는 순수한 의지력과 결단력으로 해낼 수 있습니다. 푸이 황제의 계획은 만주국을 산업 강국으로 만들 것입니다."
 MAN_railways_opener_desc:0 "남만주 철도의 체계적인 확장과 개발은 강력한 경제로 가는 지름길입니다."
 MAN_anshan_steelworks_desc:0 "제철소를 설립하면 나머지 중공업을 발전시킬 수 있을 것입니다."
 #MAN_showa_steel_desc:0 "We can further develop our steel mill in Liaotung into the largest in east Asia with the help of Japan."
 MAN_railways_extend_to_port_arthur_desc:0 "일본과의 무역을 개선하기 위해 철도 확장을 다롄까지 연장해야 합니다."
 MAN_railways_expand_to_east_hebei_desc:0 "일본과의 무역을 개선하기 위해 철도 확장을 기동방공자치정부까지 연장해야 합니다."
 MAN_railways_extend_to_pyongyang_desc:0 "일본과의 무역을 개선하기 위해 철도 확장을 조선까지 연장해야 합니다."
 MAN_railways_japanese_imports_desc:0 "일본 개발 계획의 일환으로 일본 공산품을 쉽게 이용할 수 있습니다."
 SOV_shbb_tt:0 "\n거의 완성된 소비에츠키 소유즈급 초중전함을 생산에 추가합니다.\n\n"
 SOV_expand_red_fleet2:0 "크릭스마리네에 도전"
 SOV_expand_red_fleet2_desc:0 "크릭스마리네의 해군 재무장 계획은 발트해 연안에 급속한 위협을 만들었습니다. 우리는 덴마크 해협의 통제권을 두고 독일에게 도전하고 파시스트의 지배로부터 우리 바다를 지키기 위해 새로운 기함을 건조해야 합니다."
 USA_army_of_the_united_states2:0 "여성 군 복무 통합법"
 USA_war_with_japan:0 "욱일 타격"
 USA_war_with_japan_desc:0 "승리하려는 의지 없이 전쟁에 돌입하는 것은 치명적입니다."
 FRA_victors_of_wwi2:0 "대전쟁의 승리자"
 USA_overlord:0 "오버로드 작전"
 USA_overlord_desc:0 "유럽은 요새이므로 신중하게 공격을 계획해야 합니다."
 fin_army_effort:0 "육군 중점"
 GER_guns2:0 "판처파우스트"
 GER_guns2_desc:0 "군에 징집된 모든 병사는 가장 효과적이고 현대적인 대전차 무기인 판처파우스트로 무장할 것입니다. 모든 병사에게 이 무시무시하지만 저렴한 무기를 지급하면 적 기갑 부대는 보병 엄호를 기다리기 위해 진격을 늦추거나, 완전한 파괴를 감수해야 할 것입니다."
 GER_guns1:0 "돌격소총"
 GER_guns3:0 "밤피르"
 GER_guns3_desc:0 "야간에 적을 볼 수 있는 능력은 전쟁의 완전히 새로운 차원을 열어줍니다. 즉, 큰 방해 없이 적군에 대해 효과적으로 야간 작전을 수행할 수 있는 능력입니다."
 GER_shtank:0 "우월한 화력"
 GER_shtank_desc:0 "격파 불가능한 초중전차..."
 FIN_armor_effort:0 "기갑 중점"
 EFR_devalue_the_franc:0 "프랑 평가 절하"
 FIN_armor_effort_desc:0 "보병을 기계화하며 배운 것을 적용하여 기갑 차량 또한 개선할 수 있습니다."
 EFR_devalue_the_franc_desc:1 "다른 나라들은 경제를 돕기 위해 자국 통화의 가치를 떨어뜨리는 것을 허용했지만, 우리는 단호히 거부해왔습니다. 그 결과, 우리 경제는 다른 나라에 뒤처지고 있습니다. 경쟁력을 더 높이고 다가오는 폭풍을 이겨내려면, 비록 인기 없는 조치가 될지라도 통화 평가 절하를 무턱대고 기각해서는 안 됩니다."
 EFR_autoroutes:0 "아우토루트"
 EFR_autoroutes_desc:0 "독일은 자국의 여러 지역을 연결하는 접근 제한 고속도로라는 개념으로 세계를 경탄시켰습니다. 우리도 그만큼 잘할 수 있다는 것을 세계에 보여줄 수 있습니다."
 EFR_invest_in_the_metropole:1 "본토 개발"
 EFR_invest_in_the_metropole_desc:0 "산업 재건을 위한 첫걸음은 대륙 본토의 산업 기반을 개선하는 것이어야 합니다."
 EFR_invest_in_the_colonies:1 "식민지 개발"
 EFR_invest_in_the_colonies_desc:0 "유럽의 산업 중심지에는 대규모 산업 확장을 지속할 인구와 자원이 부족합니다. 우리 경제가 세계와 경쟁력을 갖추려면 식민지를 활용해야 합니다."
 EFR_colonial_industry_effect_tt:2 "이전에 투자했던 모든 식민지 주에 §Y민간 공장§! 2개를 추가합니다.\n"
 EFR_industrial_expansion_effect_tt:1 "이전에 투자했던 모든 본토 주에 §Y민간 공장§! 2개를 추가합니다.\n"
 EFR_military_factories_effect_tt:1 "이전에 투자했던 모든 주에 §Y군수 공장§! 2개를 추가합니다.\n"
 EFR_invest_in_west_africa:0 "서아프리카에 투자"
 EFR_invest_in_west_africa_desc:0 "서아프리카의 방대한 노동력과 자원 매장량은 투자를 위한 완벽한 후보지입니다."
 EFR_invest_in_indochina:0 "인도차이나에 투자"
 EFR_invest_in_indochina_desc:0 "인도차이나 영토와 우리 본토 사이의 먼 거리는 단점처럼 보일 수 있지만, 이는 적의 공격으로부터 그곳의 모든 산업을 보호해주기도 합니다."
 EFR_invest_in_syria:0 "시리아에 투자"
 EFR_invest_in_syria_desc:0 "시리아는 유럽이나 아프리카에서 전쟁이 발발할 경우 우리에게 보급하기에 완벽한 위치에 있습니다. 시리아의 산업 잠재력을 강화하는 것은 이 지역에서 우리의 입지를 뒷받침할 것입니다."
 EFR_global_integration:0 "세계 통합"
 EFR_global_integration_desc:0 "대영제국은 상호 지원하는 부분들로 구성된 정교하게 조정된 체계입니다. 우리가 식민지를 가지고 그만큼 잘 해내지 못하리란 법은 없습니다."
 EFR_begin_rearmament:0 "재무장 시작"
 EFR_begin_rearmament_desc:1 "1919년 포슈 원수가 예견했던 20년의 휴전이 빠르게 끝나가고 있으며, 세계는 향후 몇 년 안에 전쟁에 휩싸일 가능성이 점점 더 커지고 있습니다. 우리는 준비해야 합니다."
 EFR_firepower_kills:0 "화력이 곧 살상력"
 EFR_firepower_kills_desc:0 "대전쟁의 교훈은 잔혹했던 만큼이나 간단했습니다. 가늠쇠를 통해 서로를 조준하며 싸우던 시대는 끝났다는 것입니다. 오늘날 살상은 최신 무기를 사용하여 장거리에서 대규모로 이루어집니다."
 EFR_methodical_battle:0 "체계적 전투"
 EFR_methodical_battle_desc:0 "어떤 이들은 전투가 혼돈이라고 주장하지만, 그들은 어리석은 자들입니다. 전투란 전체 계획에 따라 올바른 도구를 체계적으로 적용하는 것에 불과합니다. 계획을 잘 세우면, 적의 의도는 역사 속 각주에 불과하게 될 것입니다."
 EFR_division_cuirassee:0 "기갑 사단"
 EFR_division_cuirassee_desc:0 "드골이라는 이름의 진취적인 장교가 새로운 종류의 사단을 제안했습니다. 중장갑을 보병 및 중형전차와 결합하여 하나의 통합된 부대로서 싸우는 방식입니다."
 EFR_infantry_tanks:0 "보병전차"
 EFR_infantry_tanks_desc:0 "다른 무엇보다도, 전차의 첫 번째이자 마지막 임무는 보병이 영토를 점령하고 유지할 수 있도록 하는 것입니다. 따라서, 우리는 항상 보병 부대에 현대적이고 유능한 전차를 장비해야 합니다."
 EFR_special_forces:0 "특수부대"
 EFR_special_forces_desc:0 "미래에는 일반 보병이 한계에 부딪히는 지역에서 전쟁이 점점 더 많이 벌어질 것입니다. 우리는 이러한 조건에서 임무를 수행할 수 있는 새롭고 더 유능한 편제를 만들어야 합니다."
 EFR_fusiliers_marine:1 "해군 소총수"
 EFR_fusiliers_marine_desc:0 "해안이 뚫을 수 없는 방어선이었던 시대는 끝났습니다. 미래에는 적이 어디에 있든 그들에게 전투를 걸고, 어떠한 저항에도 맞서 상륙 거점을 확보할 수 있어야 합니다."
 EFR_battle_of_maneuver:0 "기동전"
 EFR_battle_of_maneuver_desc:0 "군대가 충돌하는 좁은 지역으로서의 전장이라는 낡은 개념은 사라졌습니다. 대규모 기계화, 항공기, 빠른 무선 통신으로 인해 전투는 수백 킬로미터에 걸쳐 빠르게 진행됩니다. 이에 빨리 대비할수록 좋습니다."
 EFR_air_dominance_desc:0 "항공기의 발전은 군이 걱정해야 할 제3의 측면을 만들어냈습니다. 우리는 이 측면을 확보해야 하며, 그렇지 않으면 파국을 맞이할 것입니다."
 EFR_air_ground_cooperation:0 "지상-공중 협력"
 EFR_air_ground_cooperation_desc:0 "공중전이 실질적인 군사적 결과를 낳는 것은 지상 목표를 추구할 때뿐입니다. 공중전과 지상전을 더 잘 통합할수록 우리는 더 효과적이게 될 것입니다."
 EFR_flying_artillery_desc:0 "오늘날의 빠르게 움직이는 전투에서 지상의 느린 포병은 속도를 따라가지 못할 수 있습니다. 폭탄을 실은 항공기가 그 역할을 대신할 수 있습니다."
 EFR_form_the_popular_front:0 "인민전선 결성"
 EFR_form_the_popular_front_desc:1 "독일과 이탈리아에서 파시즘이 부상함에 따라, 우리의 대의가 살아남기 위해서는 좌파의 내분을 멈춰야 한다는 것이 명백해졌습니다. 모든 좌파 정당으로 구성된 광범위한 인민전선은 파시즘을 낳는 경제적 상황을 마침내 해결할 국민적 위임을 받게 될 것입니다."
 EFR_ban_communism_desc:0 "누군가가 자신의 조국에 공산주의 혁명의 혼란과 유혈 사태를 불러오기를 진심으로 원한다는 것은 상상할 수 없는 일이지만, 우리 중에는 바로 그런 짓을 하려는 자들이 있는 것 같습니다. 더 이상 그들이 국가에 대항하여 음모를 꾸미도록 내버려 둘 수 없습니다. 가장 가혹한 조치가 취해져야 합니다."
 EFR_invite_communist_ministers:0 "공산주의자 장관 초빙"
 EFR_invite_communist_ministers_desc:0 "급진 우파의 반발에 대한 두려움 때문에 공산주의자들이 실제 정부에 포함되지 못했습니다. 하지만 두려움은 좋지 않은 조언자입니다. 이 충돌을 피할 수 없다면, 오라고 하십시오."
 EFR_strengthen_the_unions:0 "노동조합 강화"
 EFR_strengthen_the_unions_desc:0 "너무나 오랫동안 동료들과 단결하여 단체 교섭을 할 개별 노동자의 권리가 공격에 무방비로 노출되어 왔습니다. 더는 안 됩니다."
 EFR_celebrate_the_commune:0 "코뮌 기념"
 EFR_celebrate_the_commune_desc:0 "비록 단명했지만, 파리 코뮌은 프랑스 땅에 공산주의 사회를 건설하려는 첫 번째 시도였습니다."
 EFR_womens_suffrage_desc:1 "자신들의 권리를 얻기 위해 몇 번이고 바리케이드에서 싸웠던 프랑스의 근면한 여성들이 선거에서 투표하는 것이 허용되지 않는다는 것은 부끄러운 만큼이나 터무니없는 일입니다. 우리는 이 불의를 근절할 것입니다."
 EFR_legal_equality:0 "법적 평등"
 EFR_legal_equality_desc:0 "모든 중요한 면에서 여성은 여전히 남성의 의지에 종속된 2등 시민으로 여겨집니다. 이 말도 안 되는 상황은 이제 끝입니다."
 EFR_industrial_collectivization:0 "산업 집산화"
 EFR_industrial_collectivization_desc:1 "오늘날 프랑스 경제는 소수의 직원을 둔 작은 회사들로 구성되어, 서로 영원히 경쟁하며 비효율적인 소규모 생산으로 자원을 낭비하고 있습니다. 우리는 이 작은 회사들을 통합하여 마침내 세계 무대에서 경쟁할 수 있는 회사를 만들 것입니다."
 EFR_agricultural_collectivization_desc:0 "산업에 적용되는 원칙은 프랑스 전역의 농부들에게도 똑같이 적용됩니다. 소규모 농장은 현대 장비를 감당할 수 없으며, 대부분 증조부 세대처럼 일하고 있습니다. 이들을 농업 생산 단위로 통합함으로써 우리는 효율성과 생산량을 늘릴 것입니다."
 EFR_force_the_issue:0 "문제 강행"
 EFR_force_the_issue_desc:1 "인민전선을 결성한 이래로 우리는 먼 길을 왔습니다. 하지만 우리의 일을 중간에 그만둘 수는 없습니다. 이제 좌파의 모든 이들이 혁명에 동참할 것인지, 아니면 반대할 것인지 선택하고 입장을 정해야 할 때입니다."
 EFR_force_the_issue_tt:0 "안정도 페널티는 §Y민주주의§! 정당들의 인기도에 따라 달라집니다.\n"
 EFR_reconciliation:0 "화해"
 EFR_reconciliation_desc:0 "과거 프랑스 혁명은 너무나 자주 나라를 혁명과 반혁명 테러의 끝없는 발작 속으로 몰아넣었습니다. 이제는 혁명을 지지했든 안 했든 상관없이 모든 사람이 자신의 자리를 가질 수 있는 공화국을 건설할 때일지도 모릅니다."
 EFR_constitutional_convention:0 "제헌 의회"
 EFR_constitutional_convention_desc:0 "우리 공화국 본질의 근본적인 변화는 하룻밤 사이에 이루어질 수 없으며, 새로운 헌법을 협상하지 않고는 이루어질 수 없습니다."
 EFR_anti_fascist_coalition:0 "반파시스트 연합"
 EFR_anti_fascist_coalition_desc:0 "진보의 행진에 가장 큰 위협은 반동적 파시즘의 확산입니다. 이 위협에 맞서 싸울 의지가 있는 모든 국가와 함께 서야 합니다. 그렇지 않으면 우리 모두에게 내일은 없을 것입니다."
 EFR_invite_anti_fascist_emigrants:0 "반파시스트 이민자 초청"
 EFR_invite_anti_fascist_emigrants_desc:1 "모든 파시스트 정권이 취하는 첫 번째 조치는 비판가들과 국가 조직에 대한 대안적인 비전을 제시할 수 있는 사람들을 추방하는 것입니다. 하지만 이들은 조국이 해방될 날을 대비하여 망명 정부를 구성하기에 완벽하게 적합한 인물들이기도 합니다."
 EFR_reconnect_to_the_balkans:0 "발칸과 관계 복원"
 EFR_reconnect_to_the_balkans_desc:0 "프랑스는 오랫동안 발칸 국가들과 관계를 맺음으로써 중부 유럽 강대국들을 견제하고자 했습니다. 최근 들어 이 관계가 다소 소원해지기는 했지만, 여전히 연결고리는 남아 있습니다."
 EFR_pre_empt_the_fascist_attack:0 "파시스트 공격 선제 저지"
 EFR_pre_empt_the_fascist_attack_desc:0 "왜 우리가 적이 평화롭게 준비하고, 그들에게 가장 유리한 순간에 필연적인 공격을 감행하도록 내버려 둬야 합니까? 우리가 먼저 공격하여, 이 위협이 준비를 마치기 전에 분쇄할 것입니다."
 EFR_loyalty_to_moscow:0 "모스크바에 대한 충성"
 EFR_loyalty_to_moscow_desc:0 "소비에트 연방에서 실행되는 사회주의 모델이 완벽하지는 않을 수 있으나, 소비에트 연방이 사회주의 사상을 가장 높은 수준으로 구현했다는 점에는 합리적인 의심의 여지가 없습니다. 우리만의 길을 찾으려 한다면 어리석은 짓일 것입니다."
 EFR_league_of_french_bolshevist_volunteers_desc:1 "하나의 사회주의 국가가 외국의 침략자에게 위협받을 때, 모든 사회주의 국가는 위협받는 것입니다. 동지들이 목숨을 걸고 싸우는 동안 수수방관해서는 안 됩니다."
 EFR_host_the_german_exiles:0 "독일 망명자 수용"
 EFR_host_the_german_exiles_desc:0 "마르크스와 엥겔스의 고향인 독일은 한때 공산주의 사상과 실천의 선두에 있었습니다. 많은 독일 공산주의자들이 나치가 권력을 잡았을 때 도망쳤습니다. 만약 우리가 그들에게 안식처를 제공한다면, 그들은 우리가 해방된 영토에 더 효과적인 정부를 조직하는 데 도움을 줄 수 있을 것입니다."
 EFR_revolution_to_the_utmost:0 "끝까지 혁명을"
 EFR_revolution_to_the_utmost_desc:0 "반쯤 끝난 혁명은 전혀 혁명이 아닙니다. 과업이 완수되고 새로운 정치 체제가 안전해질 때까지 멈춰서는 안 됩니다. 어떤 대가를 치르더라도 말입니다."
 EFR_destroy_the_counter_revolution:0 "반혁명 세력 분쇄"
 EFR_destroy_the_counter_revolution_desc:0 "지금 이 순간에도 프랑스의 일부 세력은 우리 인민이 잠시라도 약점을 보이면 그 등에 비수를 꽂을 준비를 하고 있습니다. 우리는 그들을 용납하지 않고 먼저 공격할 것입니다."
  EFR_appeal_to_the_french_nation:0 "프랑스 국민에게 고함"
 EFR_appeal_to_the_french_nation_desc:0 "프랑스는 전투에서는 졌을지 모르나, 전쟁에서 진 것은 아닙니다. 저항하는 것은 모든 애국적인 프랑스인의 의무입니다."
 EFR_appeal_to_overseas_territories:0 "해외 영토에 호소"
 EFR_appeal_to_overseas_territories_desc:0 "프랑스 본토는 적에게 함락되었을지 모르나, 제국의 많은 부분은 여전히 자유롭습니다. 만약 우리가 그들을 규합하여 우리를 돕게 한다면, 적에게 반격할 수 있을 것입니다."
 EFR_appeal_to_overseas_territories_tt:0 "세계 각지의 식민지 영토가 우리 편으로 넘어올 기회가 있습니다."
 EFR_intervention_in_north_africa:0 "북아프리카 개입"
 EFR_intervention_in_north_africa_desc:0 "북아프리카는 본토 수복을 위한 침공의 최적의 발판을 제공합니다. 이곳을 우리 편으로 만드는 것은 우리의 해방 작전에 필수적입니다."
 EFR_intervention_in_west_africa:0 "서아프리카 개입"
 EFR_intervention_in_west_africa_desc:0 "서아프리카에는 수백만 명의 주민이 있으며, 이들을 징집하여 본토를 되찾기 위한 새로운 군대를 창설할 수 있습니다."
 EFR_intervention_in_syria:0 "시리아 개입"
 EFR_intervention_in_syria_desc:0 "시리아의 전략적 영토를 적에게 넘겨주지 않는 것은 수에즈 운하를 보호하고 동부 지중해에서의 우리 상황을 극적으로 개선합니다."
 EFR_intervention_in_indochina:0 "인도차이나 개입"
 EFR_intervention_in_indochina_desc:0 "유럽의 전투에서 멀리 떨어진 인도차이나의 우리 식민지는 이 지역에서 우리의 이익을 지키는 데 도움을 줄 이상적인 지역입니다."
 EFR_intervention_in_central_africa:0 "중앙아프리카 개입"
 EFR_intervention_in_central_africa_desc:0 "중앙아프리카는 연합군의 전쟁 노력에 매우 중요하며, 우리에게는 중요한 선전적 쾌거로서 장악할 수 있습니다."
 EFR_intervention_in_madagascar:0 "마다가스카르 개입"
 EFR_intervention_in_madagascar_desc:2 "적이 마다가스카르를 점령하고 요새화하도록 내버려 둔다면, 우리는 인도양에서 재앙을 맞게 될 것입니다. 신속하고 결단력 있는 조치를 취한다면 섬이 우리 편에 남도록 할 수 있습니다."
 EFR_form_the_national_committee:0 "국가위원회 결성"
 EFR_form_the_national_committee_desc:0 "우리의 대의가 성공할 것이라고 믿는 사람은 거의 없었을 것입니다. 하지만 이제 우리는 마침내 적에게서 해방된 프랑스 영토를 통제할 준비가 된, 완벽하게 기능하는 망명 정부의 수립을 선포할 만큼 강력해졌습니다."
 EFR_form_the_provisional_government_of_the_republic:1 "임시정부 수립"
 EFR_form_the_provisional_government_of_the_republic_desc:0 "파리가 해방됨에 따라, 우리는 더 이상 망명 정부가 아닙니다. 이제 조국을 재건하는 어려운 과업을 시작할 때입니다."
 EFR_continue_the_fight:0 "항전 계속"
 EFR_continue_the_fight_desc:0 "지금까지 우리에게 합류한 병사는 소수에 불과하지만, 이들을 무장시키고 장비를 갖춰야 합니다."
 EFR_the_free_french_navy:0 "자유 프랑스 해군"
 EFR_the_free_french_navy_desc:0 "우리 동맹국들은 생존을 위한 필사적인 투쟁에 휘말려 있으며, 해상 항로는 이에 필수적입니다. 우리는 그들을 돕기 위해 우리의 역할을 다해야 합니다."
 EFR_colonial_recruitment_desc:0 "본토에서 징집이 불가능해졌으므로, 우리는 식민지에 도움을 요청해야 합니다. 많은 식민지 주민들이 우리를 위해 기꺼이 무기를 들고 싸우려 합니다."
 EFR_the_regiment_normandie:0 "노르망디 연대"
 EFR_the_regiment_normandie_desc:0 "우리 프랑스인이 모든 전선에서 싸우는 모습을 보여주는 것이 중요합니다. 이제 소련이 공동의 적과 교전하고 있으니, 그들을 돕기 위해 소규모 전투기 조종사 그룹을 파견할 수 있습니다."
 EFR_refus_absurde:0 "터무니없는 거부"
 EFR_refus_absurde_desc:0 "패배의 순간에도, 저항하려는 의지는 일부의 마음속에 강하게 남아있습니다. 그들은 점령지에서 저항 운동의 기반을 형성할 것입니다."
 EFR_the_maquis:0 "마키"
 EFR_the_maquis_desc:1 "프랑스의 시골 지역은 점령군이나 그들의 부역배들로부터 탈출하려는 모든 이에게 은신처를 제공합니다. 우리는 저항 행위로 적에게 노동력 제공을 거부하는 사람들을 지원하여, 시간이 지나면 그 지역들을 저항의 온상으로 만들어야 합니다."
 EFR_reach_out_to_trade_unions:0 "노동조합에 접촉"
 EFR_reach_out_to_trade_unions_desc:0 "이제 적에게 징발된 산업에 타격을 가하려면, 그곳의 노동자들과 원활한 소통을 유지하는 것이 최선의 방법으로 보입니다. 그들은 외부 세력보다 훨씬 효율적으로 이루어지는 모든 생산을 지연시키거나 파괴 공작을 벌일 수 있습니다."
 EFR_cooperation_with_the_communists:0 "공산주의자들과의 협력"
 EFR_cooperation_with_the_communists_desc:0 "공동의 투쟁에서, 우리는 스스로 동맹을 자처하는 이들을 거부해서는 안 됩니다. 설령 그들이 스스로를 동무라 부를지라도 말입니다."
 EFR_connections_to_industrialists:0 "산업가들과의 연계"
 EFR_connections_to_industrialists_desc:0 "군수 산업 노동자들과의 협력도 도움이 되지만, 공장을 운영하는 사람들과 협력하는 것 자체에도 이점이 있습니다."
 EFR_the_civil_and_military_organization:0 "민군 조직"
 EFR_the_civil_and_military_organization_desc:0 "저항 활동을 수행하는 많은 소규모 그룹들이 더 큰 조직을 형성하기 위해 단결하고 있습니다. 우리는 이를 승인해야 합니다."
 EFR_national_council_of_the_resistance_desc:0 "프랑스 내 저항 세력은 점점 더 강해지고 있으며, 그 활동을 조정할 새로운 운영위원회가 필요할 정도로 강력해졌습니다."
 EFR_national_uprising_desc:0 "때가 왔습니다. 이제 무기를 들고, 수년간 당신들을 가려왔던 어둠 속에서 걸어 나올 때입니다!"
 EFR_french_forces_of_the_interior:0 "프랑스 국내군"
 EFR_french_forces_of_the_interior_desc:1 "저항군은 프랑스 전역에 걸쳐 수천 명의 무장 병력을 보유하고 있습니다. 우리와 동맹국들이 국토를 가로질러 진격함에 따라, 우리는 그들을 규합하여 우리 군대의 병사로 만들 것입니다."
 EFR_french_forces_of_the_interior_tt:0 "해방된 모든 핵심 주에 약한 보병 부대를 생성합니다."
 EFR_naval_rearmament:0 "해군 재무장"
 EFR_naval_rearmament_desc:0 "우리의 조선 산업은 다른 분야의 발전을 따라잡는 데 집중하는 동안 침체되었습니다. 그 결과, 우리는 이제 지중해와 대서양의 경쟁국들에게 뒤처질 큰 위험에 처해 있습니다. 잃어버린 시간을 만회하기 위해 더 많은 투자를 해야 합니다."
 EFR_colonial_naval_bases:0 "식민지 해군 기지"
 EFR_colonial_naval_bases_desc:0 "전 세계적 전력 투사의 핵심은 본국 영해에서 멀리 떨어진 곳에서 함대를 유지하는 능력입니다. 우리는 이미 광대한 식민지 영토를 보유하고 있으며, 이제 함대의 보급 및 수리 기지 역할을 하도록 개발해야 합니다."
 EFR_develop_colonial_dockyards:0 "식민지 조선소 개발"
 EFR_develop_colonial_dockyards_desc:0 "제국 각지의 해군 기지가 확장되고 현대화됨에 따라, 필요한 중공업을 정착시키고 해외에서 함선을 건조하는 데 필요한 대형 부두를 건설할 수 있게 되었습니다."
 EFR_the_old_school:0 "구식 학파"
 EFR_the_old_school_desc:0 "해군 기술의 모든 발전에도 불구하고, 해상 전력의 핵심 요소는 여전히 다른 함대 부대의 지원을 받는 주력함입니다. 이 주력함이 여전히 전함이든 새로운 항공모함이든, 우리는 다른 해군 강국들과 보조를 맞출 수 있도록 조선 산업의 규모를 더욱 확대해야 합니다."
 EFR_carrier_planes:0 "함재기"
 EFR_carrier_planes_desc:0 "항공모함의 가치는 그 함재기에 달려 있습니다. 현대적인 함재기 없이는 어떤 항공모함도 낭비된 투자일 뿐입니다."
 EFR_rush_the_richelieus:0 "리슐리외급 급속 건조"
 EFR_rush_the_richelieus_desc:0 "유럽의 상황이 점점 더 절망적으로 변하면서, 통상적인 방법으로 새로운 수상함을 건조할 시간이 없습니다. 새로운 전함들을 가능한 한 빨리 취역시키기 위해 자재를 우선적으로 배정해야 합니다."
 EFR_prioritize_the_joffre:0 "조프르급 우선 건조"
 EFR_prioritize_the_joffre_desc:0 "우리의 현재 항공모함 함대는 절망적으로 구식이며 어떤 잠재적인 적에게도 상대가 되지 않습니다. 새로운 항공모함 프로젝트에 최우선 순위를 부여해야 합니다."
 EFR_the_young_school:0 "청년 학파"
 EFR_the_young_school_desc:0 "항공, 잠수함, 어뢰의 발전은 주력함을 구식으로 만들었습니다. 제한된 해군 산업으로는 현대 해전의 위협에 무력한 거대한 해상 요새를 짓는 데 시간과 돈을 낭비할 여유가 없습니다. 대신 효율성을 향상시켜 더 많은 소형 함선을 건조하는 데 집중해야 합니다."
 EFR_undersea_combat:0 "수중전"
 EFR_undersea_combat_desc:0 "잠수함은 지난 10년 동안 성숙기에 접어들었습니다. 이제 모든 수상함에 치명적인 위협이 되며, 탐지하고 파괴하기는 점점 더 어려워지고 있습니다."
 EFR_surface_combat:0 "수상전"
 EFR_surface_combat_desc:0 "포술의 발전으로, 다른 주력함과의 장기적인 난타전에서 살아남을 수 있는 함선을 건조하는 것은 거의 불가능해졌습니다. 현대적인 구축함과 어뢰정 함대로 집중적인 어뢰 일제 사격을 통해 적을 압도하는 것이 훨씬 낫습니다."
 EFR_prioritize_the_joffre_tt:0 "생산 대기열에 40% 완성도의 현대적인 §Y항공모함§!을 추가합니다."
 EFR_revolutionary_zeal_desc:1 "프랑스 인민은 언제나 구체제를 근절하고 새로운 체제를 세우려는 특별한 열정을 지녀왔습니다. 이를 꺾어서는 안 됩니다."
 EFR_loyalty_to_the_cause:0 "대의에 대한 충성"
 EFR_loyalty_to_the_cause_desc:1 "다른 나라들은 자신들만의 공산주의 비전을 구상할 수도 있지만, 우리가 우리의 비전을 타협해야 할 이유는 없습니다. 그들은 목적이 수단을 정당화하는지에 대한 의심에 사로잡혀 중도에 멈췄을지 모릅니다. 우리는 그러지 않을 것입니다."
 EFR_carry_the_revolution_north:0 "북으로 혁명 전파"
 EFR_carry_the_revolution_north_desc:0 "해협 건너편에는 산업 혁명의 발상지이자 현대 자본주의의 본고장이 있습니다. 이곳이 반혁명 세력의 발판이 되도록 내버려 둘 수 없습니다."
 EFR_carry_the_revolution_west:0 "서로 혁명 전파"
 EFR_carry_the_revolution_west_desc:1 "이베리아 반도의 정권들은 인민 혁명에 휩쓸려 사라질 위기에 처해 있으며, 실낱같은 명맥을 유지하고 있습니다. 우리는 그 실낱을 끊어버릴 것입니다."
 EFR_carry_the_revolution_east:0 "동으로 혁명 전파"
 EFR_carry_the_revolution_east_desc:0 "우리의 동부 국경에는 신질서에 대한 가장 큰 위협이 도사리고 있습니다. 그곳에 집결한 반동 세력은 우리가 가장 감당하기 힘들 때 공격해 올 것입니다. 하지만 이는 우리가 그들에게 준비할 시간을 줄 때만 가능한 일입니다."
 EFR_carry_the_revolution_south:0 "남으로 혁명 전파"
 EFR_carry_the_revolution_south_desc:0 "파시즘에 무너진 첫 번째 국가는 이탈리아였습니다. 그 결과, 이 이념은 이탈리아에 확고히 자리 잡았습니다. 우리의 세계관은 평화롭게 공존할 수 없습니다. 그들도 우리만큼이나 이 사실을 잘 알고 있으며, 의심할 여지 없이 행동할 준비를 할 것입니다. 우리도 그래야 합니다."
 EFR_egalite_liberte_solidarite_desc:1 "최초의 프랑스 혁명은 천 년간 지속된 체제들을 쓸어버렸고, 유럽의 지형을 영원히 바꾸었습니다. 우리는 그들이 시작한 것을 끝낼 것입니다."
 EFR_reform_the_labour_laws:0 "노동법 개정"
 EFR_reform_the_labour_laws_desc:0 "프랑스의 노동자들은 낮은 임금과 적은 혜택 속에서 가혹한 조건으로 노동하고 있습니다. 그들의 처지를 개선하기 위해 포괄적인 개혁안을 시행할 때입니다."
 EFR_nationalize_key_industry:0 "핵심 산업 국유화"
 EFR_nationalize_key_industry_desc:0 "현 상황에서, 우리는 다가오는 위협에 맞서기 위해 경제를 급진적으로 재편하는 것을 주저해서는 안 됩니다. 시간이 촉박합니다. 자유 시장이 이 문제를 해결하기를 기다릴 수 없습니다."
 EFR_reorganize_the_aviation_industry:0 "항공 산업 재편"
 EFR_reorganize_the_aviation_industry_desc:0 "수십 개의 작은 회사로 분열된 우리 항공 산업은 독일과 미국의 산업에 수십 년 뒤처져 있습니다. 급진적인 구조 조정이 필요합니다."
 EFR_form_the_state_arsenals:0 "국영 조병창 설립"
 EFR_form_the_state_arsenals_desc:0 "우리 군에 현대적인 무기를 공급하기 위해, 민간 기업들이 필요한 생산 능력을 갖출 때까지 기다릴 수 없습니다."
 EFR_general_work_council:0 "총노동위원회"
 EFR_general_work_council_desc:0 "우리는 고용주와 피고용인 간의 분쟁을 처리하고, 우리 노동자들이 가능한 가장 효율적인 방식으로 고용되도록 보장하기 위한 국가 기관을 설립할 것입니다."
 EFR_national_champions:0 "국가 대표 기업"
 EFR_national_champions_desc:0 "세계적인 수준에서 경쟁할 잠재력이 있는 소수의 기업을 선정하고 최고 수준으로 지원함으로써, 우리는 다른 어떤 경제와도 동등한 현대 경제를 창출할 수 있습니다."
 EFR_dirigisme_desc:0 "소련 모델의 전면적인 계획 경제는 분명히 너무 극단적인 조치이지만, 우리 경제를 최적화하기 위해서는 어느 정도의 계획과 지시가 필요합니다."
 EFR_ban_the_leagues:0 "연맹 금지"
 EFR_ban_the_leagues_desc:0 "극우 연맹들이 제약 없이 조직되도록 방치되었습니다. 현재는 쿠데타를 시도하기에는 너무 약하지만, 미래에 그들이 무엇을 할 수 있을지는 알 수 없습니다. 지금 해산하는 것이 최선입니다."
 EFR_the_blum_viollette_proposal:0 "블룸-비올레트 제안"
 EFR_the_blum_viollette_proposal_desc:1 "프랑스 공화국의 시민권은 자격을 갖춘 모든 이에게 열려 있어야 합니다. 알제리에 있는 우리의 많은 충성스러운 신민들이 완전한 시민이 되기를 원하지만, 아직 허용되지 않고 있습니다. 그들을 완전한 시민으로 만듦으로써, 우리는 알제리를 프랑스에 훨씬 더 가깝게 묶을 수 있을 것입니다."
 EFR_expand_the_citizenship:0 "시민권 확대"
 EFR_expand_the_citizenship_desc:0 "공화국 영토에 사는 일부 사람들이 시민이 되는 것을 허용하지 않는 것은 용납할 수 없는 일이지만, 이러한 상황이 우리 공화국 내에서 지속되도록 방치되어 왔습니다. 우리는 즉시 이를 바로잡아야 합니다."
 EFR_france_undividable_desc:0 "프랑스는 하나의 깃발 아래, 단일한 단위로 형성되어야 합니다. 분열에 대한 두려움을 잠재우기 위해서라도, 우리가 이를 공개적으로 인정할 때입니다."
 EFR_french_union:0 "프랑스 연합"
 EFR_french_union_desc:0 "전 세계에 걸쳐 있고 우리 영역의 모든 부분이 통합된 새로운 프랑스를 선포할 때입니다. 우리는 모든 지역에서 국민투표를 실시하여 이 새롭고 더 위대한 프랑스의 일부가 되려는 국민의 의지를 확인할 것입니다."
 EFR_french_union_tt:0 "우리 식민 제국의 여러 지역에서 국민투표가 실시될 것입니다. 일부 지역은 대신 완전히 독립하는 것을 선택할 수도 있습니다."
 EFR_encourage_immigration:0 "이민 장려"
 EFR_encourage_immigration_desc:1 "우리 조국은 대전쟁에서 입은 손실을 메우기 위해 노동자가 절실히 필요합니다. 프랑스에 정착하기 쉽게 만듦으로써, 우리는 이 부족분을 메울 수 있는 숙련된 이민자들을 유치할 수 있습니다."
 EFR_review_foreign_policy:0 "외교 정책 재검토"
 EFR_review_foreign_policy_desc:0 "1919년에 수립된 대륙 질서가 점점 더 위협받고 있는 것으로 보입니다. 다가오는 폭풍을 이겨내기 위해 새로운 동맹을 확보할 수 있도록 우리의 외교 정책 선택지를 재검토할 때입니다."
 EFR_intervention_in_spain:0 "스페인 개입"
 EFR_intervention_in_spain_desc:0 "스페인 내전으로 이념 간의 충돌이 우리 문턱까지 닥쳤습니다. 분쟁이 우리나라로 번지지 않도록 신중하게 행동해야 합니다."
 EFR_support_the_finns:0 "핀란드 지원"
 EFR_support_the_finns_desc:0 "핀란드인들은 목숨을 걸고 싸우고 있습니다. 우리는 그들을 도와야 합니다."
 EFR_confirm_eastern_commitments:0 "동부 공약 재확인"
 EFR_confirm_eastern_commitments_desc:0 "대전쟁 이후, 우리는 부활하는 독일과 팽창주의 소련에 대한 균형추로서 동유럽에 동맹망을 구축했습니다. 이제 이 지역의 동맹국들은 우리가 요청을 받으면 실제로 도와줄 것인지 궁금해하고 있습니다. 그들이 다른 곳에서 도움을 찾기로 결정하기 전에 안심시켜야 합니다."
 EFR_strengthen_the_little_entente:0 "소협상 강화"
 EFR_strengthen_the_little_entente_desc:0 "소협상은 우리가 동유럽과 발칸 반도의 동맹국들을 돕도록 의무를 지웁니다. 우리는 이 동맹이 약화되도록 방치했지만, 지금 그 어느 때보다도 필요합니다. 이제 되살릴 때입니다."
 EFR_invest_in_our_weaker_allies:0 "약소 동맹국에 투자"
 EFR_invest_in_our_weaker_allies_desc:0 "전쟁 시 유능한 동맹국을 두려면, 그들이 스스로 군사적 필요를 충족할 수 있도록 해야 합니다. 그들의 산업에 대한 적절한 투자 프로그램은 그들이 필요한 군수품을 현지에서 생산할 수 있게 해줄 것입니다."
 EFR_invest_in_our_weaker_allies_trigger_tt:0 "우리보다 군수 공장이 적음"
 EFR_coordinate_rearmament:0 "재무장 협력"
 EFR_coordinate_rearmament_desc:0 "독일과 다른 적들의 통일된 개발 과정에 맞서기 위해, 우리도 동맹국들과 노력을 조율해야 합니다."
 EFR_foreign_guest_workers:0 "외국인 초청 노동자"
 EFR_foreign_guest_workers_desc:0 "노동력 부족은 산업 확장과 군대 규모 증대에 있어 주요한 병목 현상입니다. 동맹국에서 숙련된 노동자를 우리 공장으로 초청하면 군대로 보낼 인력을 확보할 수 있습니다."
 EFR_join_the_ententes:0 "협상국 연합 가입"
 EFR_join_the_ententes_desc:1 "프랑스는 동시에 두 개의 상호 방위 조약을 유지할 수 없습니다. 영국이 우리의 공약도 존중하기로 동의하지 않는 한, 우리는 선택해야 할 것입니다. 우리의 분산된 동맹망을 하나로 통합함으로써, 우리는 동맹의 억지력을 한 차원 높일 수 있습니다."
 EFR_revive_the_franco_polish_alliance:1 "프랑스-폴란드 동맹 부활"
 EFR_revive_the_franco_polish_alliance_desc:0 "프랑스는 항상 독립 폴란드를 지지해 왔습니다. 최근 몇 년간 양국 관계는 다소 냉각되었습니다. 독일의 위협이 다가오는 지금, 우리의 조약을 다시 불붙일 때입니다."
 EFR_revive_the_franco_polish_alliance_tt:0 "\n우리가 세력의 지도자라면 폴란드를 우리 세력으로 초대할 것입니다."
 EFR_buy_time:0 "시간 벌기"
 FRA_autoroutes_tt:0 "이 중점을 빨리 찍을수록 기반 시설 개발이 더 좋아지지만, 1939년 이전에 이 중점을 찍으면 프랑스는 가봉에 추가 건설 슬롯을 얻습니다. 1938년 이전에 찍으면 추가 슬롯 6개를, 1938년과 1939년 사이에 찍으면 추가 슬롯 3개를 얻으며, 그 이후에는 없습니다.\n\n"
 EFR_buy_time_desc:0 "우리는 아직 전장에서 독일군을 마주할 준비가 되지 않았습니다. 우리 동맹국들은 약하고, 우리 군은 구식입니다. 살아남으려면 약간의 희생을 감수해야 할지도 모릅니다."
 EFR_arms_purchases_in_the_us:1 "미국에서 무기 구매"
 EFR_arms_purchases_in_the_us_desc:0 "우리 군수 산업은 부대에 필요한 현대 무기를 공급할 능력이 부족합니다. 하지만 미국은 여유 생산 능력을 갖추고 있습니다. 그들이 고립주의로 회귀하기로 결정하지 않는 한, 우리가 필요한 무기를 팔도록 설득할 수 있을 것 같습니다."
 EFR_france_leads:0 "프랑스의 주도"
 EFR_france_leads_desc:0 "프랑스처럼 자랑스러운 역사를 가진 국가는 다른 나라가 외교 정책을 좌지우지하게 둘 수 없습니다. 우리는 우리 자신의 이익에 따라 스스로 선택할 것입니다."
 EFR_concessions_to_italy:1 "대 이탈리아 양보"
 EFR_concessions_to_italy_desc:0 "이탈리아는 여전히 아프리카 제국을 꿈꾸고 있습니다. 우리가 약간의 양보를 제안하고, 그들의 에티오피아 정복을 승인한다면 로마와 베를린 사이에 추축국이 형성되는 것을 막을 수 있을지도 모릅니다."
 EFR_ratify_the_stresa_front:0 "스트레사 전선 비준"
 EFR_ratify_the_stresa_front_desc:0 "이탈리아는 아프리카 영토를 대가로 우리 세력에 합류할 의사를 밝혔습니다. 이제 펜을 들고 필요한 조약을 비준할 때입니다."
 EFR_franco_soviet_treaty:1 "프랑스-[SOV.GetAdjective] 조약"
 EFR_franco_soviet_treaty_desc:1 "[SOV.GetAdjective]인들도 우리만큼이나 유럽에서의 파시즘 부상을 우려하고 있습니다. 때가 되면 우리를 지원하도록 설득할 수 있을지도 모릅니다."
 EFR_revive_the_national_bloc:0 "국민 연합 부활"
 EFR_revive_the_national_bloc_desc:0 "정치 지형은 날이 갈수록 급진화되고 있습니다. 좌파는 공산주의자들과 공동의 대의를 만들자고 속삭입니다. 지금 필요한 것은 강력하고 안정적인 지도력입니다."
 EFR_laissez_faire:0 "자유방임주의"
 EFR_laissez_faire_desc:0 "공산주의자들은 우리나라의 경제 구조를 급진적인 방식으로 개조하고, 열심히 일하는 사람들에게서 정당한 재산을 빼앗는 것에 대해 공공연히 이야기합니다. 이에 맞서, 우리는 자유라는 단순한 개념을 내세울 것입니다. 역동적인 경제는 언제나 숨 막히는 관료주의라는 좌파의 악몽을 능가할 것입니다."
 EFR_protect_the_rights_of_man:0 "인권 수호"
 EFR_protect_the_rights_of_man_desc:0 "그들은 결코 공개적으로 말하지 않을지 모르지만, 눈이 있는 사람이라면 누구에게나 명백합니다. 재산권을 축소하는 것은 우리의 자랑스러운 조상들이 그토록 힘들게 싸워 쟁취한 모든 권리를 없애기 위한 첫걸음에 불과합니다. 우리는 이를 용납하지 않을 것입니다!"
 EFR_freedom_front:0 "자유 전선"
 EFR_freedom_front_desc:0 "공산주의자들이 약속하는 혼란과 격변에 직면했을 때, 개인적으로 비난받아 마땅하다고 생각하는 정당이라 할지라도 다른 정당들과 기꺼이 동맹을 맺어야 합니다."
 EFR_stimulate_the_dynamic_market:0 "역동적인 시장 활성화"
 EFR_stimulate_the_dynamic_market_desc:0 "역동적인 시장은 가장 효율적인 형태의 경제 조직임이 입증되었습니다. 하지만 여전히 인간에 의해 운영되며, 인간은 때때로 자신의 노력이 헛되지 않을 것이라는 약간의 확신이 필요합니다. 일부 규제를 법으로 없애고 보증을 제공함으로써, 우리는 투자자들이 두려움을 극복하고 경제를 활성화하도록 도울 수 있습니다."
 EFR_agricultural_protectionism_desc:0 "세계 경제는 우리의 전통적인 생산 방식에 점점 더 적대적으로 변했습니다. 만약 우리 농부들을 보호하기 위한 조치를 취하지 않는다면, 해외에서 들어오는 대량 생산된 식료품에 맞서 경쟁력을 유지할 수 없게 되어 곧 엄청난 규모의 위기에 직면하게 될 것입니다."
 EFR_economic_devolution:0 "경제 분권화"
 EFR_economic_devolution_desc:0 "파리의 어떤 관료가 보르도에 있는 회사를 위해 무엇이 최선인지 안다고 생각하는 것은 터무니없습니다. 우리는 기업가들을 신뢰하고 그들이 스스로 해결책을 만들 수 있도록 권한을 부여해야 합니다."
 EFR_promote_entrepeneurship:0 "기업가 정신 장려"
 EFR_promote_entrepeneurship_desc:0 "역동적인 시장의 살아 숨 쉬는 심장은 언제나 기회를 포착하고 이를 활용하기 위해 신속하게 움직이는 개인이었습니다. 최근 몇 년간, 이 정신은 불필요한 규제로 인해 억압받아 왔습니다. 우리는 그것들을 철폐해야 합니다."
 EFR_utilize_the_leagues:0 "연맹 활용"
 EFR_utilize_the_leagues_desc:0 "프랑스에서 정치적 폭력이 일상화된 것은 슬픈 사실입니다. 만약 국가가 공산주의 혁명의 위협에서 살아남으려면, 만일의 사태가 발생했을 때 거리에서 공산주의 폭력배들과 맞서 싸울 수 있고 또 그럴 사람들의 도움을 피해서는 안 됩니다."
 EFR_national_regeneration:0 "국가 재건"
 EFR_national_regeneration_desc:0 "과도한 민주주의와 잘못된 공화주의가 우리나라를 병들게 하고 국민을 분열시켰습니다. 이 상처를 치유하는 데는 오랜 시간이 걸리겠지만, 마침내 첫걸음을 내디뎠습니다."
 EFR_national_regeneration_trigger_tt:0 "비동맹주의와 파시스트 지지도의 총합이 50%를 초과합니다"
 EFR_destroy_decadence:0 "퇴폐 타파"
 EFR_destroy_decadence_desc:1 "아주 사소한 문제조차 몇 달씩 토론하도록 내버려 두는 나라가 위대했던 적은 없습니다. 바다 뒤에 안전하게 자리 잡고 세계적인 제국의 지원을 받는 일부 국가들은 이런 사치를 누릴 수 있다고 믿을지도 모릅니다. 우리는 그럴 수 없습니다."
 EFR_integralism:0 "통합주의"
 EFR_integralism_desc:0 "통합주의 이념은 사회의 모든 측면이 마치 더 큰 전체의 작은 한 조각인 것처럼 함께 모여 작동해야 한다고 말합니다. 이 사회는 모든 부분이 조화롭게 함께 작동하도록 잘 정돈되어야 합니다."
 EFR_work:0 "노동"
 EFR_work_desc:0 "장인은 경제의 가장 중요한 구성 요소입니다. 올바른 사람들의 인도를 받을 때, 자신의 노동을 조국에 바치는 것보다 더 고귀한 소명은 없습니다."
 EFR_family:0 "가족"
 EFR_industrial_expansion_tt:0 "이 중점을 1938년 이전에 완료하면, 이전 두 중점에서 표시된 각 주마다 휴전 협정 이후 민간 공장 3개를 받게 됩니다. 1938년과 1939년 사이에 완료하면, 표시된 주당 2개가 될 것이며 1939년 이후, 하지만 휴전 협정 이전에는 주당 1개만 받게 됩니다. 프랑스는 가봉에서 이 중점을 완료하면 민간 공장을 절반만 받게 됩니다.\n\n"
 EFR_military_factories_tt:0 "1938년 이전에 이 중점을 완료하면, 이전 두 중점에서 표시된 각 주마다 휴전 이후 군수 공장 4개를 받게 됩니다. 1938년과 1939년 사이에 완료하면 표시된 주마다 3개를, 1939년 이후 휴전 이전에 완료하면 주마다 2개만 받게 됩니다. 프랑스는 약속된 군수 공장 하나당 2~3개 보병 사단을 장비할 수 있는 충분한 장비를 받게 될 것입니다.\n\n"
 EFR_family_desc:0 "사회의 가장 작은 단위는 개인이 아니라 가족입니다. 이 단순하고 명백한 사실에 이의를 제기하는 것이 구 공화국의 가장 큰 결점이었습니다."
 EFR_fatherland:0 "조국"
 EFR_fatherland_desc:0 "국가는 다른 모든 것에 우선합니다. 이에 대해서는 의심의 여지가 없습니다."
 EFR_political_unity:0 "정치적 통합"
 EFR_political_unity_desc:1 "절대왕정 붕괴 이후 프랑스의 역사는 정치적 내분의 역사였습니다. 통합이 있을 때 프랑스는 승리했고, 내분이 있을 때 프랑스는 패배했습니다. 이러한 이유로, 우리는 소수의 야망이 다수의 생계를 해치도록 내버려 둘 수 없습니다."
 EFR_diplomatic_freedom:0 "외교적 자유"
 EFR_diplomatic_freedom_desc:1 "공화국 정부는 동유럽의 인위적인 구조물에 스스로를 옭아맸습니다. 이들은 우리가 원조를 철회하는 순간 무너질 것입니다. 그들은 자산이 아니라 부채이며, 따라서 우리는 그들로부터 손을 뗄 것입니다."
 EFR_latin_entente:0 "라틴 협상"
 EFR_latin_entente_desc:1 "로마 제국의 후계 국가들 사이에 존재하는 형제애는 부인할 수 없습니다. 유럽의 게르만 민족은 너무 오랫동안 대륙을 지배해 왔습니다. 이제 우리가 민족적 타고난 권리를 되찾을 때입니다."
 EFR_reach_out_to_spain:0 "스페인에 손을 내밀다"
 EFR_reach_out_to_spain_desc:0 "내전에서 갓 회복한 스페인은 대륙을 재편하려는 우리의 시도에 있어 자연스러운 동맹입니다."
 EFR_invite_portugal:0 "포르투갈 초대"
 EFR_invite_portugal_desc:1 "포르투갈의 식민 제국은 많이 축소되었지만, 탐험과 정복의 불꽃은 모든 포르투갈인의 마음속에서 여전히 타오르고 있습니다."
 EFR_compensate_italy:0 "이탈리아에 보상"
 EFR_compensate_italy_desc:0 "과거에, 사막의 작은 땅뙈기를 둘러싼 분쟁이 우리 두 나라를 갈등으로 몰아넣었습니다. 그런 어리석은 일은 쉽게 멈출 수 있으며, 상호 합의 가능한 결과도 신속하게 찾을 수 있습니다."
 EFR_intervention_in_greece:0 "그리스 개입"
 EFR_intervention_in_greece_desc:0 "그리스는 지중해에서 가장 가치 있는 영토 일부를 통제하고 있습니다. 우리는 적대적인 정부가 그곳을 통제하도록 내버려 둘 수 없으며, 따라서 우리가 먼저 행동해야 합니다."
 EFR_the_congress_of_paris:0 "파리 회의"
 EFR_the_congress_of_paris_desc:0 "베를린 회의에서 아프리카의 국경이 정해졌습니다. 하지만 오늘날의 지도는 누더기처럼 보입니다. 이제 지도를 다시 그려 새로운 식민 제국의 기반을 형성할 때입니다."
 EFR_the_natural_borders_of_france:0 "프랑스의 자연 국경"
 EFR_the_natural_borders_of_france_desc:0 "한 국가가 자국의 이익을 최우선으로 생각하는 것은 당연합니다. 우리는 투쟁 속에서 독일인들과 평화롭게 공존할 수 없으며, 따라서 우리의 심장부를 방어하기 위해 자연 국경을 확보해야 합니다."
 EFR_towards_a_new_europe:0 "새로운 유럽을 향하여"
 EFR_towards_a_new_europe_desc:1 "프랑스는 기로에 서 있습니다. 우리는 구질서에 얽매일 수도 있고, 새로운 질서를 받아들일 수도 있습니다. 독일인들이 대륙을 재편할 태세를 갖춘 지금, 그들의 편에 서는 것이 우리에게 이로울 것입니다."
 EFR_establish_spheres_of_influence:0 "세력권 확립"
 EFR_establish_spheres_of_influence_desc:1 "수 세기 동안, 우리 민족은 우리가 불구대천의, 대를 잇는 적이라는 믿음 속에서 살아왔습니다. 이 믿음은 우리의 이해관계가 양립할 수 없다는 생각에 기반을 두고 있었습니다. 하지만 우리가 각자의 세력권을 정의하고 신중하게 간섭을 삼가기만 한다면, 분명히 합의에 이를 수 있을 것입니다."
 EFR_split_belgium:0 "벨기에 분할"
 EFR_split_belgium_desc:0 "이제 벨기에가 우리의 세력권에 들어왔으니, 프랑스어권 지역을 고국으로 불러들일 때입니다. 나머지 지역은 새로운 국가로 형성될 것입니다."
 EFR_align_belgium:0 "벨기에 포섭"
 EFR_align_belgium_desc:0 "벨기에인들은 그들의 존재를 우리에게 빚지고 있으며, 우리는 그들이 그 사실을 잊도록 내버려 둘 수 없습니다. 만약 그들이 독립을 유지하도록 둔다면, 우리는 최소한 우호적인 정부가 들어서도록 보장할 것입니다."
 EFR_grow_the_empire:0 "제국 확장"
 EFR_grow_the_empire_desc:0 "벨기에만한 크기의 국가가 자국보다 몇 배나 큰 식민지를 보유하도록 허용되는 것은 터무니없는 일입니다. 우리는 그러한 영토를 관리하는 데 훨씬 더 적합합니다."
 EFR_bring_home_quebec:0 "퀘벡 수복"
 EFR_bring_home_quebec_desc:0 "오래 전에 잃어버린 주가 때가 되면 다시 우리의 것이 될 것입니다. 세상의 모든 프랑스어권 사람들은 결국 조국과 재결합하게 될 것입니다."
 EFR_expand_to_the_suez:0 "수에즈까지 확장"
 EFR_expand_to_the_suez_desc:0 "레반트에서 우리와 영국 간의 통제권 분할은 실행 불가능한 타협안이며, 이제 우리는 다행히도 더는 이를 따를 필요가 없습니다."
 EFR_dominate_the_middle_east:0 "중동 지배"
 EFR_dominate_the_middle_east_desc:0 "중동 국가들은 오스만 제국의 시체에서 조각된 인위적인 창조물입니다. 그들은 평범한 프랑스 마을보다 더 주권을 가지고 있지 않으며, 이제 그들에게 그 사실을 상기시켜 줄 때입니다."
 EFR_the_council_of_rambouillet:0 "랑부예 평의회"
 EFR_the_council_of_rambouillet_desc:0 "국가가 혼란에 빠지자, 국민들은 강력한 지도자를 찾고 있습니다. 공화주의가 프랑스 국민을 실망시켰다는 것이 명백해졌으며, 이제 프랑스의 타고난 통치자들이 돌아올 때입니다. 하지만 먼저, 군주제 복원을 위한 기틀을 마련해야 합니다."
 EFR_revise_the_constitution:0 "헌법 개정"
 EFR_revise_the_constitution_desc:0 "공화국 헌법은 항상 임시방편으로 의도되었으나 너무 오랫동안 지속되도록 방치되었습니다. 이제 우리는 군주가 돌아올 수 있도록 헌법을 다시 쓸 것입니다."
 EFR_repeal_the_law_of_exile:0 "추방법 폐지"
 EFR_repeal_the_law_of_exile_desc:0 "프랑스 왕가의 수장이나 그 후계자는 명시적인 허가 없이는 프랑스 영토에 들어올 수 없습니다. 군주제의 개선 복귀가 이루어지기 전에, 우리는 이 성가신 작은 장애물을 제거해야 합니다."
 EFR_orleanist_restoration:1 "오를레앙 왕정복고"
 EFR_orleanist_restoration_desc:2 "오를레앙 가문은 프랑스 왕당파 사이에서 상당한 지지를 받고 있습니다. 일부 비방가들은 다른 왕위 후보를 선호하겠지만, 오를레앙 가문의 후계자가 평화롭게 국가를 통합할 가장 좋은 기회를 가졌다는 점에는 의심의 여지가 거의 없습니다."
 EFR_guarantee_the_constitution:0 "헌법 보장"
 EFR_guarantee_the_constitution_desc:0 "공화주의 언론이 왕정의 정당성에 대한 근거 없는 공세를 시작하기도 전에, 우리는 국민의 개인 권리를 존중하겠다는 확고한 보장을 통해 그들의 입지를 약화시켜야 합니다."
 EFR_the_first_citizen_of_the_state:0 "국가의 제1시민"
 EFR_the_first_citizen_of_the_state_desc:0 "왕은 상당한 권력을 부여받았지만, 결코 구시대의 폭군이나 절대주의 통치자로 보여서는 안 됩니다. 대신, 현대의 군주는 법을 존중하고 불법적으로 권력을 찬탈하려는 자들에 대한 첫 번째 방어선이 되어야 합니다."
 EFR_counter_action_desc:0 "악시옹 프랑세즈는 오랫동안 군주제 복귀의 가장 강력한 옹호자였습니다. 불행히도, 다른 주제에 대한 그들의 견해는 덜 마음에 듭니다. 이제 그들에게 목적을 다했음을 알리고 처리할 때입니다."
 EFR_no_further_humiliations:0 "더 이상의 굴욕은 없다"
 EFR_no_further_humiliations_desc:0 "수년 동안, 역대 공화국 정부는 독일이 국제 조약을 유린하도록 내버려 두었으며, 그중 일부는 잉크가 마르기도 전에 뻔뻔하게 파기되었습니다. 이제 이 모든 것을 끝냅니다."
 EFR_slum_clearing:0 "빈민가 정리"
 EFR_slum_clearing_desc:0 "세계 열강 중 하나임에도 불구하고, 평범한 프랑스 노동자는 종종 역겨운 불결함 속 끔찍한 환경에서 살고 있습니다. 왕이라는 칭호에 걸맞은 왕이라면 자신의 신하가 그런 상태로 사는 것을 용납할 수 없습니다."
 EFR_public_welfare:0 "공공복지"
 EFR_public_welfare_desc:0 "가장 미천한 신하를 위해 일하지 않는 왕은 왕이 아닙니다."
 EFR_the_legitimate_heir:0 "정당한 후계자"
 EFR_the_legitimate_heir_desc:1 "정통왕당파는 카를로스파 분파를 프랑스 왕위의 정당한 후계자로 간주합니다. 그들의 후보를 왕위에 앉히면 스페인과 프랑스를 이중군주제로 통치할 수 있는 매력적인 가능성이 열립니다."
 EFR_secure_the_crown_of_spain:0 "스페인 왕위 확보"
 EFR_secure_the_crown_of_spain_desc:0 "왕의 타고난 권리를 주장하기 위한 첫걸음은 우후죽순 생겨난 여러 왕위 주장 정부로부터 스페인을 확보하는 것입니다. 그들의 사소한 분쟁은 이미 한 번 이 나라를 피비린내 나는 내전으로 몰아넣었습니다. 다시는 그런 일이 반복되게 해서는 안 됩니다."
 EFR_unite_the_crowns:0 "왕관 통합"
 EFR_unite_the_crowns_desc:0 "스페인을 확보했으니, 이제 왕관을 통합하고 새로운 왕국, 프랑코-스페인 왕국을 세울 수 있습니다."
 EFR_two_countries_two_crowns:0 "두 나라, 두 왕관"
 EFR_two_countries_two_crowns_desc:0 "한쪽이 다른 쪽의 속국으로 여겨지지 않으면서 두 나라를 통합할 수 있는 실현 가능한 방법은 없습니다. 대신 왕에게 법적이 아닌 개인적인 동군연합으로 두 나라를 통치하도록 조언할 것입니다."
 EFR_proclaim_the_third_empire:0 "제3제국 선포"
 EFR_proclaim_the_third_empire_desc:0 "보나파르트파는 왕위 계승 투쟁에서 외부인으로 여겨질 수 있지만, 그들은 모든 유럽이 프랑스 황제에게 고개 숙였던 시절의 꿈을 품고 있습니다."
 EFR_avenge_waterloo:0 "워털루의 복수"
 EFR_avenge_waterloo_desc:0 "나폴레옹 1세의 역사는 영원히 그의 가장 큰 패배로 정의될 것입니다. 우리가 성공하려면, 그가 패배했던 곳에서 승리할 수 있음을 보여주어야 합니다."
 EFR_reorganize_the_dutch:0 "네덜란드 재편"
 EFR_reorganize_the_dutch_desc:0 "네덜란드 또한 한때 프랑스 제국의 일부였습니다. 이제 그들이 패배했으니, 이 자연스러운 상태로 돌아갈 때입니다."
 EFR_retribution_for_sedan:0 "스당에 대한 보복"
 EFR_retribution_for_sedan_desc:0 "반세기가 넘도록 독일인들은 스당 전투와 그곳에서 나폴레옹 3세를 상대로 거둔 승리를 기념해 왔습니다. 미래에는 모든 독일인이 그곳의 이름을 저주하게 될 것입니다."
 EFR_disunite_germany:0 "독일 분열"
 EFR_disunite_germany_desc:0 "프랑스에 대한 승리로 프로이센은 소규모 독일 국가들을 자신의 깃발 아래 통합할 수 있었습니다. 이제 독일이 패배했으니, 이 과정을 되돌리는 것이 마땅합니다."
 EFR_return_to_borodino:0 "보로디노로의 귀환"
 EFR_return_to_borodino_desc:0 "보로디노에서 나폴레옹은 유럽에서의 승리에 가장 가까웠습니다. 러시아군은 거의 궤멸되었고, 그가 조금만 더 빨랐다면 러시아를 굴복시킬 수 있었을 것입니다. 우리는 그것이 가능하다는 것을 세상에 보여줄 것입니다."
 EFR_je_suis_la_deluge:1 "Je Suis Le Déluge"
 EFR_je_suis_la_deluge_desc:0 "프랑스 혁명은 오랫동안 유럽을 지배해 온 낡고 약한 정권들을 휩쓸어버린 홍수였습니다. 이제, 새로운 홍수가 도래했습니다."
 EFR_coordinate_rearmament_tt:0 "우리 세력 구성원의 생산 면허 비용을 감소시킵니다."
   EFR_metropolitan_france:2 "프랑스 본토에 투자"
 EFR_metropolitan_france_tt:0 "프랑스 본토에 §Y기반시설§!을 건설할 슬롯이 부족합니다"
 EFR_metropolitan_france_desc:0 "본토가 항상 우선이어야 합니다. 기반시설을 개선하여 일자리를 창출하고 더 빠른 병력 배치를 가능하게 하는 것부터 시작할 수 있습니다."
 EFR_algerie_france:2 "프랑스령 알제리에 투자"
 EFR_algerie_france_tt:0 "프랑스 식민지에 §Y기반시설§!을 건설할 슬롯이 부족합니다"
 EFR_algerie_france_desc:0 "유럽은 위험한 시기를 맞고 있습니다. 우리는 남쪽의 영토를 개선하는 데 집중하여 언제나 본토를 지원할 수 있도록 보장해야 합니다."
 EFR_industrial_expansion:0 "산업 확장"
 EFR_industrial_expansion_desc:0 "국내에 더 강력한 산업 기반이 필요합니다. 준비된 노동력은 충분하지만, 더 많은 공장 라인이 필요합니다."
 EFR_colonial_industry:0 "식민지 산업"
 EFR_colonial_industry_tt:0 "프랑스 식민지에 §Y민간 공장§!을 건설할 슬롯이 부족합니다"
 EFR_colonial_industry_desc:1 "식민지 산업에 집중해야 합니다. 유럽의 긴장이 고조될 경우, 적 폭격기의 사정거리 밖에 있는 산업 생산 능력을 계속 유지할 수 있을 것입니다."
 EFR_military_factories:0 "군수공장"
 EFR_military_factories_desc:1 "우리의 전쟁 기계는 생산 능력 면에서 뒤처지고 있습니다. 우리 군이 지속적으로 새로운 장비를 보급받을 수 있도록 본토에서의 군사 장비 생산에 집중해야 합니다."
 EFR_colonial_military_factories:0 "식민지 군수공장"
 EFR_colonial_military_factories_tt:0 "식민지 프랑스에 §Y군수공장§!을 지을 건설 슬롯이 부족합니다"
 EFR_colonial_military_factories_desc:0 "군수 생산 시설을 유럽 외부에 배치하면, 적이 우리 영공을 장악하더라도 최전선 부대에 장비를 지속적으로 공급할 수 있습니다."
 EFR_extra_research_slot:2 "그랑제콜 지원"
 EFR_extra_research_slot_desc:0 "유망한 젊은 인재들이 곳곳에서 나타나고 있습니다. 그들이 연구를 수행할 수 있도록 시설을 제공해야 합니다. 기술의 발전은 우리가 가장 필요로 하는 부분에서 우위를 점하게 해줄 것입니다."
 EFR_nuclear_effort:0 "핵 개발 노력"
 EFR_nuclear_effort_desc:0 "핵 과학의 초기 실험에서 유망한 결과가 나타났습니다. 그 힘을 활용하면 인류가 본 적 없는 무기를 손에 넣을 수 있을 것입니다."
 EFR_jet_effort:0 "제트기 개발 노력"
 EFR_jet_effort_desc:0 "공중전의 핵심은 기동성입니다. 제트 엔진은 매우 강력한 진보이므로, 우리가 적 조종사들을 하늘에서 격추하는 동안 그들은 정지해 있는 것처럼 보일 것입니다."
 EFR_extra_research_slot_2:2 "국립 연구 센터 설립"
 EFR_extra_research_slot_2_desc:0 "유망한 젊은 인재들이 곳곳에서 나타나고 있습니다. 그들이 연구를 수행할 수 있도록 시설을 제공해야 합니다. 기술의 발전은 우리가 가장 필요로 하는 부분에서 우위를 점하게 해줄 것입니다."
 EFR_defensive_focus:0 "방어 중점"
 EFR_defensive_focus_desc:0 "이러한 시기에는 방어를 강화하는 것이 최선입니다. 위협이 있다면, 우리 영토에서 처리할 수 있도록 그들이 오게 하십시오. 우리 군을 이끌 완벽한 후보가 있으며, 당신의 허락만 있으면 됩니다."
 EFR_aggressive_focus:0 "공격 중점"
 EFR_aggressive_focus_desc:0 "적이 국경으로 이동하는 것을 좌시할 수 없습니다. 또한 전쟁 상황에서 동맹국들이 스스로를 방어하도록 내버려 둘 수도 없습니다. 군대를 준비시키십시오! 가믈랭이 그 임무에 적임자입니다."
 EFR_fortification_focus:0 "요새화 중점"
 EFR_fortification_focus_desc:0 "우리 요새들이 매우 중요했던 만큼, 더 효율적으로 건설할 방법을 찾아야 합니다. 마지노선은 적군에 대한 강력한 억제력이었으며, 이와 같은 방어 시설이 더 있다면 안보를 강화할 수 있을 것입니다."
 EFR_alpine_forts:0 "알프스 요새"
 EFR_alpine_forts_desc:0 "새로 계획된 방어선으로 알프스를 뒤덮고 나면 이탈리아군은 국경을 쉽게 넘지 못할 것입니다. 우리는 대응하고 진지를 보강할 시간을 벌게 될 것입니다."
 EFR_extend_the_maginot_line:0 "마지노선 확장"
 EFR_extend_the_maginot_line_desc:0 "벨기에가 자리를 지킬 것이라고 믿을 수 없으며, 만약 그들이 적군을 통과시킨다면 우리는 곤경에 처할 수 있습니다. 마지노선을 확장하는 것은 원치 않는 군대가 프랑스로 들어오지 못하게 하는 데 매우 중요합니다!"
 EFR_infantry_focus:0 "국민총동원령"
 EFR_infantry_focus_desc:0 "싸울 수 있는 모든 남녀가 싸울 것입니다. 무기를 대량 생산하면 비용이 절감될 것입니다. 우리는 모든 사람의 손에 소총을 쥐여줄 것입니다."
 EFR_artillery_focus:0 "대규모 포대"
 EFR_artillery_focus_desc:0 "우리 포병은 단일의 강력한 부대를 형성하여 특정 지점에 집중 포화를 가할 것입니다. 한 번의 일제 사격으로 적 전선을 약화시키고, 필요하다면 돌파구를 열 것입니다!"
 EFR_heavy_armor_focus:0 "전투 전차"
 EFR_heavy_armor_focus_desc:0 "전투 전차는 프랑스 육군의 미래입니다. 우리는 전장을 지배하고자 하며, 이를 위해 새롭고 강력한 전차가 필요할 것입니다!"
 EFR_motorized_focus:0 "차량화 중점"
 EFR_motorized_focus_desc:0 "보병 차량을 더 효율적으로 생산하는 방법을 찾는 것은 전선을 지원하고 증강하는 능력을 향상시킬 것입니다."
 EFR_mechanized_focus:0 "기계화 중점"
 EFR_mechanized_focus_desc:0 "장갑 차량은 전쟁에서 점점 더 중요한 역할을 하고 있습니다. 일반적인 전차보다는 위협적이지 않지만, 통신, 지휘, 수송 및 시가전에서 우리에게 우위를 제공합니다. "
 EFR_light_medium_armor:0 "오토미트라예즈"
 EFR_light_medium_armor_desc:0 "법에 따라, 보병이 모든 전차 부대를 통제합니다. 더 가볍고 빠른 기병 '차량' 또는 오토미트라예즈는 기동에 더 적합하며, 탑재된 무기로 어느 정도 피해를 줄 수 있습니다."
 EFR_army_reform:0 "육군 개혁"
 EFR_army_reform_desc:0 "보병 부대나 첨단 전차만으로는 전쟁에서 승리할 수 없습니다. 우리는 전술적, 전략적 역량을 모두 개발하는 데 노력을 기울여야 합니다. 적임자를 배치한다면 우리 군은 발전할 수 있습니다."
 EFR_navy_focus:0 "해군 중점"
 EFR_navy_focus_tt:0 "§Y해군 기지§를 지을 건설 슬롯이 부족합니다!"
 EFR_navy_focus_desc:0 "해군을 확장할 계획이라면, 첫 단계는 해군 기지를 개선하고 확장하는 것입니다. 우리의 특수한 함선들은 항상 전투 준비 태세를 유지하기 위해 지속적인 관리가 필요합니다."
 EFR_improved_screen_ships:0 "개량된 호위함"
 EFR_improved_screen_ships_desc:0 "구축함과 경순양함은 우리의 중전함이나 항공모함을 방어하는 데 핵심적인 역할을 합니다. 해상 방어선이 무너지면 모든 함선과 병력을 잃을 위험에 처합니다. 우리는 함선이 최신 기술로 건조되도록 해야 합니다."
 EFR_capital_ship_focus:0 "주력함 중점"
 EFR_capital_ship_focus_desc:0 "전함의 설계를 개선하면 엄청난 전술적 이점을 얻을 수 있을 것입니다. 그들의 사거리와 위력은 독보적이므로, 누구도 그 주포를 피할 수 없을 것입니다."
 EFR_carrier_focus:0 "항공모함 중점"
 EFR_carrier_focus_desc:0 "해군 이론가들은 우리의 낡은 항공모함에 주목했습니다. 그들은 올바른 방향으로 개발이 추진된다면 항공모함을 더욱 활용할 수 있는 방안을 제시했습니다. 우리의 전폭적인 지원 없이는 실질적인 진전을 이룰 수 없습니다."
 EFR_initiate_government_reform:0 "정부 개혁"
 EFR_initiate_government_reform_desc:0 "세계는 위험해졌습니다. 더 이상 우리 내부의 사소한 다툼에 얽매일 수 없습니다. 이제 정치인들에게 힘을 실어주고 프랑스를 위해 전진할 때입니다."
 EFR_support_the_left:0 "좌파 지원"
 EFR_support_the_left_desc:0 "코민테른이 강해지고 있습니다. 우리의 이해관계가 일치할 수 있음을 보여주고, 우리 공산주의 조직들을 지원할 때입니다."
 EFR_leftist_rhetoric:0 "좌파적 수사"
 EFR_leftist_rhetoric_desc:0 "목표는 명확합니다. 모두를 위한 평등입니다. 우리는 프랑스 정치에 자본주의적 이해관계가 개입하는 것을 원하지 않습니다. 우리 공산주의 조직들이 번성할 수 있도록 최적의 조건을 제공하는 것이 필수적입니다."
 EFR_scw_intervention_republicans:0 "공화파 개입"
 EFR_scw_intervention_republicans_desc:0 "스페인 공화파가 우리의 도움을 필요로 합니다! \n대의를 위해 싸우려는 사람은 누구든 허락해야 합니다. 또 다른 파시스트 정권이 세력을 얻도록 내버려 둘 수 없습니다."
 EFR_national_mobilization:0 "국가 총동원"
 EFR_national_mobilization_desc:0 "마침내 행동에 나설 수 있는 정부가 들어섰습니다. 이제 군대를 강화하고 프랑스를 위해 싸울 준비를 할 때입니다."
 EFR_humanite_unie:0 "인류 통합"
 EFR_humanite_unie_desc:0 "살찐 은행가들과 권력에 굶주린 선동가들이 세계에 대한 피비린내 나는 장악력을 강화하고 있습니다. 날이 갈수록 자유로운 사람들이 노예가 되고, 개인의 탐욕이 빚어낸 위기 속으로 세계는 더욱 깊이 빠져들고 있습니다. 프랑스의 이상이 그 어느 때보다 필요합니다! 인류는 우리를 필요로 하며, 우리는 인류를 통합해야 합니다!"
 EFR_join_comintern:0 "코민테른 가입"
 EFR_join_comintern_desc:0 "사방이 적으로 둘러싸인 지금, 강력한 동맹과 함께 우리의 입지를 강화해야 합니다. 코민테른과의 유대는 더욱 강해졌으며, 이제 그들의 대의에 전적으로 헌신할 때입니다."
 EFR_support_status_quo:0 "현상 유지 지지"
 EFR_support_status_quo_desc:0 "프랑스는 자유의 요람이자 수호자이며 앞으로도 그래야 합니다. 다시 통합을 이루고자 한다면, 민주주의가 쇠퇴하기 전에 안정시켜야 합니다."
 EFR_little_entente:0 "소협상"
 EFR_little_entente_desc:0 "소협상은 대전쟁 이후 오스트리아와 헝가리가 이웃 국가를 침략하는 것을 막기 위해 결성된 동맹으로, 프랑스의 지원을 받았으나 지금은 와해되기 시작했습니다. 영국과의 유대를 확보하는 대신, 우리는 주도권을 잡고 창립국인 체코슬로바키아부터 시작하여 이 세력을 복원하고 공고히 해야 합니다."
 EFR_go_with_britain:0 "영국과의 동행"
 EFR_go_with_britain_desc:0 "러시아가 영원히 변해버린 지금, 옛 삼국 협상에는 프랑스와 영국만이 남았습니다. 역사가 반복될 운명이라면, 유럽 민주주의와 자유의 보루인 이 두 국가가 동맹으로 남도록 해야 합니다."
 EFR_strengthen_government_support:0 "정부 강화"
 EFR_strengthen_government_support_desc:0 "우리는 프랑스 전역 국민들의 염원을 충족시킬 내년 계획을 수립했습니다. 우리가 행동할 능력이 있고 프랑스를 통치할 자격이 있음을 보여주어, 다시 한번 단결할 수 있도록 해야 합니다."
 EFR_defensive_strategems:0 "방어 전략"
 EFR_defensive_strategems_desc:0 "프랑스 국민이 우리를 위해 전쟁에 나서게 하려면, 그 어느 때보다 명확한 방향을 제시하는 것이 중요합니다. 우리는 내분을 멈추고, 대신 프랑스와 \"자유, 평등, 박애\"를 위해 싸워야 합니다."
 EFR_invite_yugoslavia:0 "유고슬라비아 초대"
 EFR_invite_yugoslavia_desc:0 "유고슬라비아는 팽창주의적인 이웃 국가를 걱정하지 않아도 될 만큼 이미 충분한 우려를 안고 있습니다. 그들을 소협상으로 다시 끌어들이는 것은 그들과 우리 모두에게 큰 도움이 될 것입니다."
 EFR_invite_romania:0 "루마니아 초대"
 EFR_invite_romania_desc:0 "루마니아의 민주주의는 내부의 파시스트 파벌과 소비에트 공산주의 사이에 끼어 취약한 상태입니다. 그들을 소협상에 끌어들이면 우리의 지원을 받아 안정을 유지할 수 있을 것입니다."
 EFR_polish_guarantee:0 "폴란드 독립 보장"
 EFR_polish_guarantee_desc:0 "폴란드 외교관들은 국경의 긴장 상태에 대해 우려를 표명했습니다. 우리 강대국의 보장은 침략을 계획하는 모든 세력을 저지할 것입니다."
 EFR_czech_guarantee:0 "체코 독립 보장"
 EFR_czech_guarantee_desc:0 "체코 국경에서 긴장이 고조되고 있습니다. 우리는 팽창주의 국가가 자유롭고 민주적인 국가를 점령하도록 내버려 둘 수 없습니다. 체코인들은 자유로운 민족으로 남아야 합니다. 우리의 보장이 있다면 침략을 계획하는 자는 누구든 재고하게 될 것입니다."
 EFR_revise_versailles:0 "베르사유 조약 개정"
 EFR_revise_versailles_desc:0 "독일인들은 이미 베르사유 조약에 명시된 배상금을 무시하고 있으며, 이는 프랑스가 더는 존중받지 못한다는 것을 보여줍니다. 오히려 우리는 대전쟁에서 희생된 생명에 대해 더 많은 것을 요구할 권리가 있지만, 정의로운 조약을 시행하려면 강력한 프랑스, 새로운 프랑스가 필요합니다."
 EFR_support_the_right:0 "우파 지지"
 EFR_support_the_right_desc:0 "프랑스는 언제나 강하고 자랑스러운 국가였지만, 정부의 무능으로 국민이 분열되었습니다. 우리는 프랑스를 통합하고 우리의 우월성과 힘을 주장하여 쇠퇴에 빠지는 것을 막아야 합니다."
 EFR_right_wing_rhetoric:0 "우익 선동"
 EFR_right_wing_rhetoric_desc:0 "우리는 모든 프랑스인에게 다가가 그들의 민족정신을 고양하는 데 집중해야 합니다. 우리가 그들에게 필요한 강력한 지도자가 될 수 있음을 보여주면, 그들은 우리의 영광스러운 국가의 자랑스러운 시민이 될 것입니다."
 EFR_scw_intervention_nationalists:0 "국민파 개입"
 EFR_scw_intervention_nationalists_desc:0 " 국민파가 마침내 스페인에서 세를 얻고 있습니다. 그들의 대의는 정의로우며, 그들을 위해 싸우려는 사람은 누구든 허용되어야 합니다."
 EFR_army_of_aggression:0 "침략군"
 EFR_army_of_aggression_desc:0 "적들이 유럽 전역에서 활개 치는 동안, 우리는 더 이상 낡아빠진 벽 뒤에 앉아 있을 수 없습니다. 군대를 강화하고 국경을 확장하여 프랑스가 계속 위대한 국가로 남을 수 있도록 해야 할 때입니다."
 EFR_france_first:0 "프랑스 우선주의"
 EFR_france_first_desc:0 "우리는 프랑스다! 대전쟁의 승리자! 유럽의 구원자! 우리는 이 세상이 배출한 가장 위대한 사상가들의 고향이다. 너무나 많은 국가가 세계를 혼돈에 빠뜨리려 하고 있다. 우리는 필요하며, 그 부름에 응할 것이다. 우리는 키를 잡고, 폭풍을 헤쳐나가, 인류를 우리의 통치 아래 안전하게 이끌 것이다!"
 EFR_woo_italy:0 "이탈리아 포섭"
 EFR_woo_italy_desc:0 "이탈리아는 강대국이 될 잠재력이 있습니다. 무솔리니의 강력한 지도력 덕분에 이탈리아 국민은 단결하여 올바른 대의를 위해 싸울 준비가 되어 있습니다. 그 대의를 우리의 것으로 만듭시다."
 EFR_dismantle_the_democracies:0 "민주주의 해체"
 EFR_dismantle_the_democracies_desc:0 "중부 유럽의 새로운 [GER.GetAdjective] 민주주의 동맹이 우리가 새로 얻은 지위를 위협하고 있습니다. 그들이 더 강력해지기 전에 지금 조치를 취해야 합니다."
 EFR_join_germany:0 "독일에 합류"
 EFR_join_germany_desc:0 "독일국은 무시할 수 없는 세력이 되고 있습니다. 더 나은 미래에 대한 그들의 비전은 우리의 이익과 일치할 수 있습니다. 우리는 그들을 지원해야 하며, 상황이 진정되면 프랑스는 유럽에서 정당한 몫을 차지하게 될 것입니다."
 EFR_naval_doctrine:0 "해군 교리"
 EFR_naval_doctrine_desc:0 "최근 함선 설계의 발전으로 전술 및 전략적 기동에 새로운 선택지가 열렸습니다. 이 새로운 이론들을 섣불리 시도하기 전에, 제대로 시험하고 계획을 확고히 해야 합니다."
 EFR_air_focus:0 "공군 중점"
 EFR_air_focus_desc:0 "공군을 확장할 때가 왔습니다! 병력과 항공기의 대규모 증강을 지원하기 위해 새로운 공군 기지 건설을 시작할 계획이 이미 수립되었습니다."
 EFR_cas_focus:0 "근접항공지원 중점"
 EFR_cas_focus_desc:0 "지상군과 함선을 지원하는 항공기는 비교적 적은 투자로 매우 효율적인 전력이 되었습니다. 이제 이 항공기들에 대한 몇 가지 개선안이 제안되었습니다. 우리 기술자들은 차세대 지원 항공기를 개발할 수 있습니다."
 EFR_fighter_focus:0 "전투기 중점"
 EFR_fighter_focus_desc:0 "일부 혁신적인 민간 공학 기술을 우리 전투기에 적용하여 속도, 항속거리, 최대 고도를 향상시킬 수 있습니다. 다른 국가들의 발전을 따라잡으려면 여기에 집중해야 합니다."
 EFR_bomber_focus:0 "폭격기 중점"
 EFR_bomber_focus_desc:0 "공중 지원은 우리의 방어 및 공격 능력 모두에서 중요한 부분입니다. 빠르고, 더 민첩하며, 정확한 폭격기를 개발하는 데 노력을 집중한다면 어떤 지상전에서도 우위를 유지할 수 있을 것입니다."
 EFR_heavy_fighter_focus:0 "중전투기 중점"
 EFR_heavy_fighter_focus_desc:0 "우리 중전투기는 더 취약한 폭격기를 지원할 수 있어야 합니다. 이를 위해서는 속도를 일부 희생하는 대신 더 강력한 무장과 더 긴 항속거리가 필요합니다."
 EFR_air_doctrine:0 "공군 교리"
 EFR_air_doctrine_desc:0 "우리는 공중전의 새로운 이론들을 더 빠른 속도로 시험할 만큼 충분한 경험을 쌓았습니다. 이를 통해 새로운 전술적, 전략적 가능성을 탐구할 수 있을 것입니다. 공중전은 현대전의 핵심입니다."
 EFR_heavy_bomber_focus:0 "중폭격기 중점"
 EFR_heavy_bomber_focus_desc:0 "현대 중폭격기는 소규모 공중 교전을 자체적으로 처리할 수 있도록 무장할 것입니다. 우리 기술자들이 최신 기술 개발에 집중하도록 한다면, 적의 생산 시설을 파괴할 더 좋은 기회를 갖게 될 것입니다."
 EFR_naval_bomber_focus:0 "해군 폭격기 중점"
 EFR_naval_bomber_focus_desc:0 "함선은 항공기에 유달리 취약하다는 것이 증명되었습니다. 어떤 대응책보다 앞서 나가기 위해 우리는 그 기술을 계속해서 개선해야 합니다."
 ETH_research_slot:0 "연구 슬롯"
 ETH_research_slot_desc:0 "연구는 모든 전쟁에서 승리하기 위한 열쇠입니다!"
 ETH_imperial_road:0 "제국의 도로 건설"
 ETH_imperial_road_desc:0 "수도와 항구를 연결해야 합니다!"
 ETH_equipment_effortb:0 "대전쟁 이후의 포병 발전"
 ETH_equipment_effortb_desc:0 "최근 포병 무기 발전을 연구해야 합니다."
 ETH_equipment_effort_2b:0 "포병대 증강"
 ETH_equipment_effort_2b_desc:0 "우수한 포병 여단으로 보병 사단을 현대화해야 합니다."
 ETH_equipment_effort_3b:0 "포병대 증강 II"
 ETH_equipment_effort_3b_desc:0 "우수한 포병 여단으로 보병 사단을 현대화해야 합니다."
 ETH_red_sea:0 "홍해의 수호자"
 ETH_red_sea_desc:0 "적국에 맞서 홍해의 제해권을 장악하기 위해 강력한 해군을 건설해야 합니다."
 ETH_air_innovation:0 "리네아 델림페로"
 ETH_air_innovation_desc:0 "제공권을 장악하지 못하면 현대전에서 승리할 수 없습니다. 공군 발전을 위해 모든 역량을 총동원해야 합니다!"
 ETH_force_labor:0 "원주민 노동자"
 ETH_force_labor_desc:0 "산업을 증진하기 위해, 원주민 인구를 고용하여 무기 생산 공장에서 일하게 해야 합니다."
 ETH_force_labor2:0 "식민지 산업 확장"
 ETH_force_labor2_desc:0 "원주민 노동자를 활용하는 계획을 확장할 것입니다."
 ETH_puntland:0 "영국령 및 프랑스령 소말릴란드 영유권 주장"
 ETH_puntland_desc:0 ""
 ETH_sudan_north:0 "하르툼 영유권 주장"
 ETH_sudan_north_desc:0 ""
 ETH_sudan_south:0 "수단 영유권 주장"
 ETH_sudan_south_desc:0 ""
 ETH_kenya:0 "영국령 동아프리카 영유권 주장"
 ETH_kenya_desc:0 ""
 ETH_uganda:0 "우간다 영유권 주장"
 ETH_uganda_desc:0 ""
 ETH_tanganyika:0 "탕가니카 영유권 주장"
 ETH_tanganyika_desc:0 ""
 ETH_yemen:0 "영국령 예멘 영유권 주장"
 ETH_yemen_desc:0 ""
 ETH_equipment_effort:0 "소총 기술 따라잡기"
 ETH_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리 군에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 ETH_motorization_effort:0 "차량화 박차"
 ETH_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 철수시키는 데 매우 중요합니다. 이러한 개발에 집중하면 신속하게 행동할 수 있을 것입니다."
 ETH_doctrine_effort:0 "교리 연구"
 ETH_doctrine_effort_desc:0 "대전쟁의 지상전을 정의했던 군사 교리는 시대에 뒤떨어졌습니다. 우리는 최고의 두뇌들을 투입하여 미래의 군사 사상을 형성해야 합니다."
 ETH_equipment_effort_2:0 "현대화된 소총"
 ETH_equipment_effort_2_desc:0 "우리 보병이 당대 최고의 총기로 무장할 수 있도록 계속 노력할 것입니다."
 ETH_mechanization_effort:0 "기계화 연구"
 ETH_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고하여, 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 ETH_doctrine_effort_2:0 "교리 연구 II"
 ETH_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서도 변화했습니다. 이를 반영하기 위해 교리를 지속적으로 재평가해야 합니다."
 ETH_doctrine_effort_3:0 "교리 연구 III"
 ETH_doctrine_effort_3_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서도 변화했습니다. 이를 반영하기 위해 교리를 지속적으로 재평가해야 합니다."
 ETH_equipment_effort_3:0 "실험용 소총"
 ETH_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 ETH_armor_effort:0 "기갑 연구"
 ETH_armor_effort_desc:0 "보병 기계화에서 얻은 교훈을 적용하여, 장갑 차량 또한 개선할 수 있습니다."
 ETH_special_forces:0 "특수부대"
 ETH_special_forces_desc:0 "우리에게는 정예 부대가 필요합니다. 산악 부대와 공수부대가 우리의 우선순위가 되어야 합니다."
 ETH_aviation_effort:0 "항공 연구"
 ETH_aviation_effort_tt:0 "§Y공군 기지§를 지을 건설 슬롯이 부족합니다!"
 ETH_aviation_effort_desc:0 "공중전만큼 기술 발전이 빠른 곳은 없습니다. 항공은 모든 현대 국가가 숙달해야 하는 분야입니다."
 ETH_fighter_focus:0 "전투기 중점"
 ETH_fighter_focus_desc:0 "대전쟁에서 벌어진 공중전이 마지막이 아니었습니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 가져다줄 것입니다."
 ETH_bomber_focus:0 "폭격기 중점"
 ETH_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불비가 두드러지게 언급될 것입니다. 우리는 그 이야기가 우리 적들의 입에서 나오도록 최선을 다할 것입니다."
 ETH_aviation_effort_2:0 "항공 연구 II"
 ETH_aviation_effort_2_desc:0 "우리 공군을 다른 군종과 잘 통합하기 위해서는 항공 분야의 추가적인 발전이 필요할 것입니다."
 ETH_CAS_effort:0 "근접항공지원 연구"
 ETH_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중에서도 차량의 지원이 필요합니다."
 ETH_rocket_effort:0 "로켓 연구"
 ETH_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 항공기 모두에게 전례 없는 속도를 가능하게 합니다. 이러한 기술을 선도하면 적의 허를 찌를 수 있을 것입니다."
 ETH_NAV_effort:0 "해군 항공 노력"
 ETH_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서, 또 일부는 해수면 위의 상공에서 벌어집니다."
 ETH_naval_effort:0 "해군 노력"
 ETH_naval_effort_tt:0 "§Y해군 조선소§!를 지을 건설 슬롯이 부족합니다!"
 ETH_naval_effort_desc:0 "해군 확장이 최우선 과제입니다. 모든 가용 자원을 신규 조선소 건설과 경수상함 연구에 배정해야 합니다."
 ETH_industrial_effort:0 "산업 노력"
 ETH_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업의 대도약에 집중해야 합니다."
 ETH_industrial_effort_2:0 "산업 노력 II"
 ETH_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 또 다른 위대한 산업 노력을 위해 인민을 동원할 수 있습니다."
 ETH_construction_effort:0 "에티오피아 전력 회사"
 ETH_construction_effort_tt:0 "§Y민간 공장§!을 지을 건설 슬롯이 부족합니다!"
 ETH_construction_effort_desc:0 "에티오피아 내 전력망을 구축해야 합니다."
 ETH_production_effort:0 "군수 노력"
 ETH_production_effort_tt:0 "§Y군수 공장§!을 지을 건설 슬롯이 부족합니다!"
 ETH_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 군수 생산 능력이 뒤처지게 놔둘 수 없습니다."
 ETH_construction_effort_2:0 "에티오피아 시멘트 공장"
 ETH_construction_effort_2_desc:0 "시멘트 생산은 공장과 군사 시설의 대량 건설을 촉진하는 데 필수적입니다."
 ETH_production_effort_2:0 "군수 노력 II"
 ETH_production_effort_2_desc:0 "민간 공장을 군사 장비 생산에 맞게 개조하려는 시도는 비효율적입니다. 지금 당장 군수 생산 준비에 집중해야 합니다."
 ETH_production_effort_3:0 "군수 노력 III"
 ETH_production_effort_3_desc:0 "신규 장비 수요를 충족시키기 위해 군수 공장을 확장하려는 지속적인 노력이 필요합니다."
 ETH_infrastructure_effort:0 "기반시설 노력"
 ETH_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 고급 사업이나 건설을 추진할 수 없습니다."
 ETH_infrastructure_effort_tt:0 "§Y기반시설§!을 지을 건설 슬롯이 부족합니다!"
 ETH_infrastructure_effort_2:0 "기반시설 노력 II"
 ETH_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 사업에 필요한 수송과 통신이 가능해질 것입니다."
 ETH_construction_effort_3:0 "자동차 운송 (치타오)"
 ETH_construction_effort_3_desc:0 "이 땅을 쉽게 횡단할 수 있도록 기계 및 운송 산업을 발전시켜야 합니다."
 ETH_nuclear_effort:0 "핵 노력"
 ETH_nuclear_effort_desc:0 "세상을 바꿀 발견의 문턱에 서 있는 지금, 언젠가 지구를 집어삼킬지도 모를 불을 다른 이들이 지피게 놔둘 수는 없습니다."
 ETH_extra_tech_slot:0 "추가 연구 슬롯"
 ETH_extra_tech_slot_desc:0 "산업 확장 및 최근의 기술 발전으로 더 많은 연구개발을 병렬로 수행할 수 있게 되었습니다."
 ETH_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 ETH_extra_tech_slot_2_desc:0 "국가의 급속한 산업화는 우리가 추구해야 할 연구개발 분야에 새로운 기회를 열어주었습니다."
 ETH_technology_sharing:0 "기술 공유"
 ETH_technology_sharing_desc:0 "동맹국과 기술 발전을 공유함으로써, 우리 세력 전체가 전시 연구개발을 더 효율적으로 수행할 수 있게 될 것입니다."
 ETH_secret_weapons:0 "비밀 병기"
 ETH_secret_weapons_desc:0 "모든 여유 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구와 같은 완전히 새로운 과학 분야에 있습니다."
 ETH_political_effort:0 "정치적 노력"
 ETH_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리나라에 변화를 가져올 수 있어야 합니다. 정치적 입지 강화가 최우선 과제입니다."
 ETH_collectivist_ethos:0 "집단주의 정신"
 ETH_collectivist_ethos_desc:0 "적들이 약소국을 분열시켜 정복할지라도, 우리 국민은 단결하여 맞설 것입니다. 하나는 전체를 위하고, 전체는 하나를 위합니다."
 ETH_liberty_ethos:0 "자유 정신"
 ETH_liberty_ethos_desc:0 "인간 정신을 억압하려는 이념적 광신도들이 날뛰는 이 시대에, 우리는 개인의 자유를 수호할 것입니다."
 ETH_militarism:0 "군국주의"
 ETH_militarism_desc:0 "군대를 필요악으로 여기는 자들은 전쟁 앞에서 주저할 수밖에 없습니다. 우리는 군국주의를 우리 문화에 뿌리내려 군인의 민족이 될 것입니다."
 ETH_political_correctness:0 "정치적 올바름"
 ETH_political_correctness_desc:0 "다소 논란의 여지가 있거나 당혹스러운 의견을 가진 사람들은 자신들을 겨냥한 광범위한 음모가 있다고 우려하는 것 같습니다. 이거 아주 훌륭한 생각인 것 같습니다."
 ETH_neutrality_focus:0 "중립 중점"
 ETH_neutrality_focus_desc:0 "다른 이들은 세계적인 분쟁에서 편을 드는 것이 용기와 지혜를 필요로 한다고 주장할지 모르지만, 우리는 거부하는 데에 더 많은 것이 필요하다는 것을 압니다."
 ETH_interventionism_focus:0 "개입주의 중점"
 ETH_interventionism_focus_desc:0 "우리는 우리 시민뿐만 아니라 모든 사람의 자유를 소중히 여깁니다. 폭정을 막는 것이 전쟁을 의미한다면, 기꺼이 받아들이겠습니다."

 
 fin_army_effort_desc:0 "공중전과 해전의 가능성이 커지고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 준비를 통해 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 fin_equipment_effort:0 "장비 집중"
 fin_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 병력에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 fin_motorization_effort:0 "차량화 집중"
 fin_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장에 투입하고 이탈시키는 데 매우 중요합니다. 이러한 발전에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 fin_doctrine_effort:0 "교리 집중"
 fin_doctrine_effort_desc:0 "대전쟁에서 지상전을 정의했던 군사 교리는 시대에 뒤떨어졌습니다. 우리는 최고의 두뇌들을 투입하여 미래의 군사 사상을 정립해야 합니다."
 fin_equipment_effort_2:0 "장비 개발 노력 II"
 fin_equipment_effort_2_desc:0 "보병과 지원 부대가 당대 최고의 장비로 무장할 수 있도록 계속해서 노력할 것입니다."
 fin_mechanization_effort:0 "기계화 노력"
 fin_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고하여, 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 fin_doctrine_effort_2:0 "교리 개발 노력 II"
 fin_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 fin_doctrine_effort_3:0 "교리 개발 노력 III"
 fin_doctrine_effort_3_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 fin_equipment_effort_3:0 "장비 개발 노력 III"
 fin_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 fin_armor_effort:0 "기갑 노력"
 fin_armor_effort_desc:0 "보병을 기계화하며 배운 것을 적용하여, 우리의 기갑 차량 또한 개선할 수 있습니다."
 fin_special_forces:0 "특수부대"
 fin_special_forces_desc:0 "우리는 정예 부대가 필요하며, 산악 부대와 공수부대를 우선시해야 합니다."
 fin_aviation_effort:0 "항공 노력"
 fin_aviation_effort_tt:0 "§Y공군 기지§를 지을 건설 슬롯이 부족합니다!"
 fin_aviation_effort_desc:0 "공중전만큼 기술 발전이 빠른 곳은 없습니다. 항공은 현대 국가라면 반드시 숙달해야 할 분야입니다."
 fin_fighter_focus:0 "전투기 집중"
 fin_fighter_focus_desc:0 "대전쟁에서 벌어진 공중전이 마지막이 아니었습니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 가져다줄 것입니다."
 fin_bomber_focus:0 "폭격기 집중"
 fin_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불벼락이 두드러지게 언급될 것입니다. 우리는 그 이야기가 적들의 입에서 나오도록 최선을 다할 것입니다."
 fin_aviation_effort_2:0 "항공 노력 II"
 fin_aviation_effort_2_desc:0 "항공 분야의 추가적인 발전은 우리 공군을 다른 군 분과와 잘 통합하는 데 필요할 것입니다."
 fin_CAS_effort:0 "근접항공지원 노력"
 fin_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중의 항공기로부터도 지원을 받아야 합니다."
 fin_rocket_effort:0 "로켓 노력"
 fin_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 항공기 모두에게 전례 없는 속도를 제공합니다. 이 기술들을 선도하면 적의 허를 찌를 수 있을 것입니다."
 fin_NAV_effort:0 "해군 항공 노력"
 fin_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서 벌어지듯, 일부는 해상 상공에서 벌어집니다."
 fin_naval_effort:0 "해군 집중"
 fin_naval_effort_tt:0 "§Y해군 조선소§!를 건설할 슬롯이 부족합니다!"
 fin_naval_effort_desc:0 "해군 확장이 최우선 과제입니다. 모든 가용 자원을 신규 조선소 건설과 경수상함 연구에 투입해야 합니다."
 fin_industrial_effort:0 "산업 집중"
 fin_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업의 대도약에 집중해야 합니다."
 fin_industrial_effort_2:0 "산업 집중 II"
 fin_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 우리는 또 한 번의 위대한 산업 집중을 위해 국민을 동원할 수 있습니다."
 fin_construction_effort:0 "건설 집중"
 fin_construction_effort_tt:0 "§Y민간 공장§!을 건설할 슬롯이 부족합니다!"
 fin_construction_effort_desc:0 "전쟁의 그림자가 세계를 뒤덮을 때에도 민간 산업 역량을 과소평가해서는 안 됩니다."
 fin_production_effort:0 "군수 집중"
 fin_production_effort_tt:0 "§Y군수 공장§!을 건설할 슬롯이 부족합니다!"
 fin_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 우리의 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 fin_construction_effort_2:0 "건설 집중 II"
 fin_construction_effort_2_desc:0 "공장을 계속 확장하면 무역품 생산과 추가 건설 속도를 높일 수 있습니다."
 fin_production_effort_2:0 "군수 집중 II"
 fin_production_effort_2_desc:0 "민간 공장을 군수 장비 생산에 맞게 개조하는 것은 비효율적입니다. 지금부터 군수 생산 준비에 집중해야 합니다."
 fin_production_effort_3:0 "군수 집중 III"
 fin_production_effort_3_desc:0 "신규 장비 수요를 충족시키기 위해서는 군수 공장을 확장하려는 지속적인 노력이 필요합니다."
 fin_infrastructure_effort:0 "기반시설 집중"
 fin_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 고급 프로젝트나 건설을 추진할 수 없습니다."
 fin_infrastructure_effort_tt:0 "§Y기반시설§!을 건설할 슬롯이 부족합니다!"
 fin_infrastructure_effort_2:0 "기반시설 집중 II"
 fin_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 프로젝트에 필요한 수송 및 통신이 가능해질 것입니다."
 fin_construction_effort_3:0 "건설 집중 III"
 fin_construction_effort_3_desc:0 "기반시설망 확장은 우리의 건설 역량을 크게 향상시켰습니다."
 fin_nuclear_effort:0 "핵 개발 집중"
 fin_nuclear_effort_desc:0 "세상을 바꿀 발견의 문턱에 서 있는 지금, 언젠가 지구를 집어삼킬지도 모를 불을 다른 이들이 지피게 놔둘 수는 없습니다."
 fin_extra_tech_slot:0 "추가 연구 슬롯"
 fin_extra_tech_slot_desc:0 "산업 확장과 최근의 다른 발전 덕분에 더 많은 연구개발을 병렬로 수행할 수 있을 것입니다."
 fin_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 fin_extra_tech_slot_2_desc:0 "국가의 급속한 산업화로 연구 개발에 새로운 기회가 열렸습니다."
 fin_technology_sharing:0 "기술 공유"
 fin_technology_sharing_desc:0 "동맹국과 기술적 진보를 공유함으로써, 우리 세력 전체가 전시 연구 개발을 더욱 효율적으로 수행할 수 있게 될 것입니다."
 fin_secret_weapons:0 "비밀 병기"
 fin_secret_weapons_desc:0 "모든 여유 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구와 같은 완전히 새로운 과학 분야에 있습니다."
 fin_political_effort:0 "정치적 노력"
 fin_political_effort_desc:0 "세계에 변화를 가져오려면, 먼저 우리 내부의 변화를 이끌어낼 수 있어야 합니다. 정치적 입지를 강화하는 것이 최우선 과제입니다."
 fin_collectivist_ethos:0 "집단주의 정신"
 fin_collectivist_ethos_desc:0 "적들이 약소국을 분열시켜 정복할지라도, 우리 국민은 단결하여 맞설 것입니다. 하나는 전체를 위하고, 전체는 하나를 위합니다."
 fin_why_we_fight:0 "우리가 싸우는 이유"
 fin_why_we_fight_effect:0 "만약 §Y중립 외교 정책§! 정신을 보유하고 있지 않다면 세력을 창설할 수 있게 됩니다.\n"
 fin_why_we_fight_desc:0 "세계는 점점 더 불안정해지고 있습니다. 우리 국민은 권력을 탐하는 자들이 저지르는 잔학 행위를 목도해야 합니다. 이제 국민을 우리 대의에 결집시키고 모두가 자유를 위해 싸울 준비를 갖추도록 해야 할 때입니다."
 fin_political_commissars:0 "정치장교"
 fin_political_commissars_desc:0 "우리의 정책이 군사적으로도 관철되도록 하기 위해, 정치적으로 임명된 관료를 군대에 배치할 것입니다."
 fin_internationalism_focus:0 "국제주의 중점"
 fin_internationalism_focus_desc:0 "이념에는 국경이 없습니다. 다른 국가가 스스로를 주권 국가라 칭할지라도, 우리의 신념은 그러한 주장을 초월합니다."
 fin_nationalism_focus:0 "민족주의 중점"
 fin_nationalism_focus_desc:0 "우리 국가는 특별하며, 우리의 정치적 성과는 오직 이곳에서만 이룰 수 있었습니다. 어떤 대가를 치르더라도 이를 위해 싸워야 합니다."
 fin_ideological_fanaticism:0 "이념적 광신"
 fin_ideological_fanaticism_desc:0 "우리가 정치적으로 확립한 가치와 목표는 고대의 신앙만큼이나 목숨을 바칠 가치가 있습니다. 모든 추종자는 죽음을 각오해야 하며, 이 길에서 벗어나는 자들 또한 죽음을 각오해야 할 것입니다."
 GRE_metaxas:0 "요르요스 2세와 메탁사스"
 GRE_metaxas_desc:0 "우리가 사랑하는 국왕 요르요스 2세의 도움으로, 메탁사스는 의회를 정지시키고 권력을 장악할 수 있었습니다. 이제 우리는 마침내 강력한 전체주의 지도자와 함께 보수 정권을 수립하여, 그리스 국민이 우러러볼 수 있는 존재를 갖게 될 것입니다."
 GRE_the_backbone_of_our_army2:0 "그리스제 총기"
 GRE_the_backbone_of_our_army2_desc:0 "우리 장비는 심각하게 노후화되었으니, 이제 (프랑스제) 그리스 총기로 장비를 현대화할 때입니다!"
 nor_drill_exile_army:0 "망명군 훈련"
 nor_drill_exile_army_desc:0 "작전 전략, 부대 전술, 사격술에 대한 매일의 훈련과 강의는 우리의 훈련 수준을 독일 국방군(Wehrmacht)과 동등하게 만들 것입니다."
 nor_operation_crofter:0 "크로프터 작전"
 nor_operation_crofter_desc:0 "이제 노르웨이로 돌아가는 편도 여행에 오를 때입니다. 독일의 위협에 맞서 조국을 해방시키거나, 해방시키지 못하면 죽음뿐입니다!"
 nor_train_with_sas:0 "SAS와의 합동 훈련"
 nor_train_with_sas_desc:0 "영국 측과 합동 훈련을 통해 세계에서 가장 치명적인 병사들을 양성할 수 있습니다."
 nor_fleischers_plan:0 "플라이셔 계획"
 GRE_new_weapons_old_tricks2:0 "그리스-터키 전쟁"
 GRE_new_weapons_old_tricks2_desc:0 "1919-22년 그리스-터키 전쟁 동안 우리는 포병 운용과 정찰 수행에 상당한 경험을 쌓았습니다. 기술은 변했을지 몰라도 전술은 확실히 변하지 않았으니, 장비 현대화가 우리가 나아갈 길입니다."
 GRE_rejuvenating_athens2:0 "관광 장려"
 GRE_rejuvenating_athens2_desc:0 "그리스는 풍부한 역사 덕분에 인류 문명의 아름다움을 보여주는 인상적인 랜드마크를 보유하고 있습니다. 하지만 사람들은 우리의 기적적인 지리적 위치를 잊는 경향이 있습니다. 이 나라는 아름다운 자연 랜드마크를 많이 보유하고 있습니다. 우리의 유리한 상황을 활용합시다."
 GRE_thema_nautikon2:0 "유구한 상륙전 전통"
 GRE_thema_nautikon2_desc:0 "우리나라는 본토와 거대한 군도로 이루어져 있습니다. 세계 최초의 문명 중 하나로서, 우리는 이 군도 지역에서 싸운 경험이 있습니다. 과거의 경험에서 교훈을 얻읍시다."
 GRE_a_modern_navy2:0 "그리스의 불 발명가"
 GRE_a_modern_navy2_desc:0 "우리의 조상인 위대한 비잔티움 제국은 작고 치명적인 갤리선에 혁명적인 '그리스의 불'을 발명했습니다. 그리스의 불 덕분에 우리는 수 세기 동안 콘스탄티노폴리스 주변 해역을 지배했습니다. 이 해군의 혁신 정신을 부활시킵시다!"
 GRE_a_land_of_mountains2:0 "레오니다스의 유산"
 GRE_academy_of_athens2:0 "철학의 발상지"
 GRE_academy_of_athens2_desc:0 "그리스는 철학의 발상지이며 아리스토텔레스, 플라톤, 소크라테스, 히포크라테스, 제논, 피타고라스, 아낙사고라스, 데모크리토스 등 위대한 과학자와 철학자들을 배출했습니다."
 GRE_a_legacy_of_war2:0 "알렉산드로스의 유산"
 GRE_a_legacy_of_war2_desc:0 "메가스 알렉산드로스, 바실레우스 마케도논, 스트라테고스 아우토크라토르 헬라도스, 페론 아이깁투, 바실레우스 페르손, 퀴리오스 테스 아시아스, 역사상 가장 위대한 인물."
 GRE_a_long_and_proud_tradition2:0 "테미스토클레스의 유산"
 GRE_atlantis:0 "잃어버린 아틀란티스 왕국"
 GRE_atlantis_desc:0 "고대 아틀란티스인들은 우리의 잃어버린 문화적 선조였습니다. 조국이 점령당한 동안 우리는 아틀란티스의 안전한 곳으로 함대를 이끌고 돌아가야 합니다."
 GRE_an_orthodox_state2_desc:0 "그리스는 정교회의 본거지이며, 우리의 선조인 비잔티움 제국은 1054년 동서 분열 이후 우리의 위대한 신앙을 도입했습니다. 정교회가 우리의 국가 정체성과 얽혀 있다는 것을 우리 국민에게 다시 한번 분명히 합시다. 정교회는 이 절망적인 시기에 우리의 길잡이가 될 것입니다!"
 GRE_an_orthodox_state2:0 "그리스 정교회"
 GRE_island:0 "[GetAtlantisFocusName]"
 GRE_island_desc:0 "[GetAtlantisFocusDesc]"
 AtlantisHidden:0 "의문의 안개..."
 AtlantisHiddenDesc:0 "아소르스 제도 서쪽 대서양의 한 지역이 의문의 안개에 휩싸여 있습니다. 이 해역은 혹독한 기상 조건과 외딴 위치 때문에 해도에 제대로 기록되지 않았지만, 언젠가는 상황이 나아질지도 모릅니다."
 AtlantisSpotted:0 "의문의 섬..."
 AtlantisSpottedDesc:0 "대서양에서 새로운 섬이 발견되었습니다. 이 기묘한 장소에 대해 더 알아보기 위해 고고학자들을 보내야 합니다..."
 gre_island_spotted:0 "기상 조건이 바뀌어 추가 탐사가 가능해졌습니다..."
 GRE_island_tt:0 "\n§R이탈리아가 '발칸 지배'를 완료하기 전에 이 중점을 반드시 선택하십시오. 그렇지 않으면 게임이 끝납니다!!!§!"
 GRE_reviving_the_spartan_warrior_spirit2:0 "아테나와 아레스"
 GRE_reviving_the_spartan_warrior_spirit2_desc:0 "이 암울한 시기에 사랑하는 조국을 되찾으려면 가능한 모든 도움이 필요합니다. 우리는 고대의 전쟁 신인 아테나와 아레스에게 기도하여, 그들의 영혼을 우리 안에서 다시 한번 느낄 수 있도록 해야 합니다."
 GRE_a_long_and_proud_tradition2_desc:0 "이번에는 테미스토클레스가 아데이만토스와 코린토스인들을 향한 독설을 담아 길게 답했습니다. 그는 아테네인들이 완전 무장한 200척의 함선을 보유하고 있는 한, 그들의 도시와 영토가 코린토스인들의 것보다 위대하며, 어떤 헬라스인도 그들의 공격을 격퇴할 수 없을 것이라고 선언했습니다. 헤로도토스, 《역사》, 살라미스 해전에서 아테네의 지휘권을 결정짓다."
 nor_fleischers_plan_desc:0 "조국을 해방시키기 위해 노르웨이에는 소규모의 고도로 훈련된 정예 병력이 필요합니다."
 nor_ruges_plan:0 "루게 계획"
 nor_ruges_plan_desc:0 "대규모의 전문적으로 훈련된 정규군은 노르웨이 내 여러 지역을 동시에 침공하여 적을 압도할 수 있게 할 것입니다."
 nor_winter_mountain_training:0 "혹한기 훈련"
 nor_winter_mountain_training_desc:0 "노르웨이는 대부분 춥고 험준한 산악 지대이므로, 자유 노르웨이군의 용감한 장병들은 본토 지형에 적응해야 합니다. 다행히 스코틀랜드에서 이 훈련을 수행할 수 있습니다."
 nor_norway_in_exile:0 "자유 노르웨이 왕립군"
 nor_norway_in_exile_desc:0 "모두 노르웨이를 위하여!"
 nor_norway_in_exile_navy:0 "자유 노르웨이 왕립 해군"
 nor_norway_in_exile_navy_desc:0 "모두 노르웨이를 위하여!"
 nor_prepare_operation_crofter:0 "크로프터 작전 준비"
 nor_prepare_operation_crofter_desc:0 "해방 작전은 신중하게 계획해야 합니다. 함선이 한번 출항하면 되돌릴 수 없기 때문입니다."
 nor_civillian_effort:0 "풍부한 수력 발전"
 nor_ski_inf:0 "스키 보병"
 nor_ski_inf_desc:0 "도로가 없는 삼림 및 시골 지형은 겨울철 보병에게는 험난하지만, 스키 부대에게는 아닙니다."
 nor_civillian_effort_desc:0 "전국에 위치한 수많은 댐 덕분에 저렴한 비용으로 국가를 전화(電化)할 수 있으며, 이는 더 많은 경제 발전을 가능하게 합니다."
 nor_military_effort:0 "콩스베르그 그루펜 확장"
 nor_military_effort_desc:0 "우리의 최대 군수 산업체 중 하나인 콩스베르그 그루펜을 침공에 대비하여 확장해야 합니다."
 nor_fullindustrial_effort:0 "경제 예비력 총동원"
 nor_fullindustrial_effort_desc:0 "노르웨이 시민들이여, 다른 일에 종사하지 않는 모든 이가 공장으로 가지 않는 한, 우리나라는 분명히 무너질 것입니다!"
 nor_army_effort:0 "노르웨이 육군"
 nor_army_effort_desc:0 "공중전과 해전의 가능성이 커지고 있음에도 불구하고, 지상전은 여전히 미래 전쟁의 핵심입니다. 철저한 준비를 통해 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 nor_equipment_effort:0 "크라그-요르겐센 소총 개량"
 nor_equipment_effort_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 병사들에게 가용한 최고의 장비를 제공하는 데 집중할 것입니다."
 nor_motorization_effort:0 "대전쟁 이후의 포병 발전"
 nor_motorization_effort_desc:0 "우리는 포병 무기의 최신 발전을 연구해야 합니다."
 nor_doctrine_effort:0 "현대 교리 연구"
 nor_doctrine_effort_desc:0 "대전쟁의 지상전을 정의했던 군사 교리들은 구식이 되었습니다. 우리는 미래의 군사 사상을 형성하는 과업에 최고의 인재들을 투입해야 합니다."
 nor_equipment_effort_2:0 "지원 부대 집중"
 nor_equipment_effort_2_desc:0 "우리 보병이 당대 최고의 지원 여단으로 무장할 수 있도록 노력을 계속할 것입니다."
 nor_mechanization_effort:0 "대전차 노력"
 nor_mechanization_effort_desc:0 "필요한 모든 수단을 동원해 전차로부터 우리 보병 사단을 보호해야 합니다."
 nor_doctrine_effort_2:0 "전술적 발전"
 nor_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서 변화했습니다. 이를 반영하기 위해 우리는 지속적으로 교리를 재평가해야 합니다."
 nor_equipment_effort_3:0 "노르웨이 돌격소총"
 nor_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 nor_armor_effort:0 "대공 노력"
 nor_armor_effort_desc:0 "우수한 대공 여단으로 우리 보병 사단을 보호해야 합니다."
 nor_tank_forces:0 "전차 부대 확장"
 nor_tank_forces_desc:0 "오늘날의 군대는 기동성 없고 취약한 보병만으로 구성될 수 없습니다. 적절한 기갑으로 보병을 기계화하고 보호해야 합니다. "
 nor_special_forces:0 "국방특수사령부 확장"
 nor_special_forces_desc:0 "우리는 정예 부대가 필요합니다. 산악 부대와 공수부대를 최우선으로 해야 합니다."
 nor_fighter_focus:0 "전투기 집중"
 nor_fighter_focus_desc:0 "대전에서 벌어진 공중전이 마지막이 아닐 것입니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 가져다줄 것입니다."
 nor_bomber_focus:0 "폭격기 집중"
 nor_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불비가 두드러지게 언급될 것입니다. 우리는 그 이야기가 적들의 입에서 나오도록 최선을 다할 것입니다."
 nor_aviation_effort_2:0 "항공 노력 II"
 nor_aviation_effort_2_desc:0 "공군을 다른 군 분과와 잘 통합하기 위해서는 항공 분야의 추가적인 발전이 필요할 것입니다."
 nor_CAS_effort:0 "근접항공지원 노력"
 nor_CAS_effort_desc:0 "현대 군대는 지상 차량뿐만 아니라 공중에서의 지원도 필요합니다."
 nor_rocket_effort:0 "로켓 노력"
 nor_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 항공기 모두에게 전례 없는 속도를 가능하게 합니다. 이러한 기술을 선도하면 적의 허를 찌를 수 있을 것입니다."
 nor_NAV_effort:0 "해상초계기 노력"
 nor_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서 벌어지듯, 일부는 해상 상공에서 벌어집니다."
 nor_naval_effort:0 "해군 노력"
 nor_naval_effort_tt:0 "§Y해군 조선소§!를 지을 건설 슬롯이 부족합니다."
 nor_naval_effort_desc:0 "해군 확장이 최우선 과제여야 합니다. 모든 가용 자원을 새로운 조선소와 경함 연구에 할당하십시오."
 nor_flexible_navy:0 "유연한 해군"
 nor_flexible_navy_desc:0 "잠수함 기술의 발전을 고려하여 해전을 재정립하면 적 수송선단을 효율적으로 타격할 수 있을 것입니다."
 nor_large_navy:0 "대규모 해군"
 nor_large_navy_desc:0 "해군 교리를 대형함에 맞게 조정하고 무역 호송단의 안전을 보장함으로써, 우리에게 어떤 종류의 함선이 필요한지 많은 것을 배울 수 있을 것입니다."
 nor_submarine_effort:0 "잠수함 중점"
 nor_submarine_effort_desc:0 "잠수함전은 어뢰정 발명 이래 가장 흥미로운 해군 발전입니다. 잠수함으로부터 방어하는 것뿐만 아니라, 적 선박을 공격하는 데 잠수함을 사용하는 것이 현명할 것입니다."
 nor_cruiser_effort:0 "순양함 중점"
 nor_cruiser_effort_desc:0 "첨단 전함 연구에 착수하기 전에, 소형 순양함들을 교체해야 합니다."
 nor_destroyer_effort:0 "구축함 중점"
 nor_destroyer_effort_desc:0 "잠수함의 설계와 전략적 사용을 연구하면서, 우리는 그 전략에 대응하는 방법도 배웠습니다. 이를 위해 구축함이 매우 중요할 것입니다."
 nor_capital_ships_effort:0 "주력함 중점"
 nor_capital_ships_effort_desc:0 "가장 많은 전함을 보유한 국가가 해양을 지배할 것입니다. 전함과 항공모함은 해군 우위의 구세대와 신세대를 상징합니다."
 nor_industrial_effort:0 "산업 중점"
 nor_industrial_effort_desc:0 "모든 정치적 노력을 민간 산업 건설에 집중하여 위대한 도약을 이룩해야 합니다."
 nor_industrial_effort_2:0 "산업 중점 II"
 nor_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 우리는 인민을 동원하여 또 다른 위대한 산업적 노력을 이룰 수 있습니다."
 nor_construction_effort:0 "건설 중점"
 nor_construction_effort_tt:0 "§Y민간 공장§을 건설할 슬롯이 부족합니다!"
 nor_construction_effort_desc:0 "전 세계에 전쟁의 그림자가 드리울 때조차도 민간 산업 역량을 과소평가해서는 안 됩니다."
 nor_production_effort:0 "군수 중점"
 nor_production_effort_tt:0 "§Y군수 공장§을 건설할 슬롯이 부족합니다!"
 nor_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 우리의 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 nor_construction_effort_2:0 "건설 중점 II"
 nor_construction_effort_2_desc:0 "공장을 계속 확장하면 무역품 생산을 가속화하고 추가적인 건설 노력을 가능하게 할 것입니다."
 nor_production_effort_2:0 "군수 중점 II"
 nor_production_effort_2_desc:0 "민간 공장을 군사 장비 생산에 맞게 조정하는 것은 비효율적입니다. 우리는 지금 군수 생산 준비에 집중해야 합니다."
 nor_production_effort_3:0 "군수 중점 III"
 nor_production_effort_3_desc:0 "신규 장비에 대한 수요를 충족시키기 위해서는 군수 공장을 확장하려는 지속적인 노력이 필요합니다."
 nor_infrastructure_effort:0 "기반시설 중점"
 nor_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 첨단 프로젝트나 건설을 추진할 수 없습니다."
 nor_infrastructure_effort_tt:0 "§Y기반시설§을 건설할 슬롯이 부족합니다!"
 nor_infrastructure_effort_2:0 "기반시설 중점 II"
 nor_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 프로젝트에 필요한 수송과 통신이 가능해질 것입니다."
 nor_construction_effort_3:0 "건설 III"
 nor_construction_effort_3_desc:0 "사회 기반 시설망 확충으로 건설 역량이 크게 향상되었습니다."
 nor_nuclear_effort:0 "핵 개발"
 nor_nuclear_effort_desc:0 "세상을 바꿀 발견의 문턱에 서 있는 지금, 언젠가 지구를 집어삼킬 불을 다른 이들이 지피게 놔둘 수는 없습니다."
 nor_extra_tech_slot:0 "추가 연구 슬롯"
 nor_extra_tech_slot_desc:0 "산업 확장과 최근의 다른 발전 덕분에 더 많은 연구개발을 동시에 수행할 수 있게 될 것입니다."
 nor_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 nor_extra_tech_slot_2_desc:0 "국가의 급속한 산업화로 연구개발 분야에서 우리가 추구해야 할 새로운 기회가 열렸습니다."
 nor_technology_sharing:0 "노르웨이 경제대학교"
 nor_technology_sharing_desc:0 "수많은 로비와 노력, 특히 크리스토페르 렘쿨의 헌신 끝에 1936년 9월 7일 월요일, 호콘 7세 국왕께서 마침내 NHH의 개교를 선포하셨습니다."
 nor_secret_weapons:0 "전자공학 개발"
 nor_secret_weapons_desc:0 "모든 여유 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구와 같은 완전히 새로운 과학 분야에 있습니다."
 nor_political_effort:0 "뉘고르스볼 내각 강화"
 nor_political_effort_desc:0 "세계에 변화를 가져오려면 먼저 우리나라에 변화를 가져올 수 있어야 합니다. 우리의 정치적 입지를 강화하는 것이 우선입니다."
 nor_collectivist_ethos:0 "집단주의 정신"
 nor_collectivist_ethos_desc:0 "적들은 약소국을 분열시켜 정복할지 모르지만, 우리 국민은 단결하여 맞설 것입니다. 하나는 모두를 위하고, 모두는 하나를 위합니다."
 nor_liberty_ethos:0 "자유주의 정신"
 nor_liberty_ethos_desc:0 "인간 정신을 억압하려는 이념적 광신도들의 시대에, 우리는 개인의 자유를 수호할 것입니다."
 nor_militarism:0 "군국주의"
 nor_militarism_desc:0 "군대를 필요악으로 여기는 자들은 전쟁 앞에서 망설일 수밖에 없습니다. 우리는 군국주의를 문화에 뿌리내려 국민 모두가 군인이 되도록 할 것입니다."
 nor_political_correctness:0 "정치적 올바름"
 nor_political_correctness_desc:0 "다소 논란의 여지가 있거나 당혹스러운 의견을 가진 사람들은 자신들을 겨냥한 광범위한 음모가 있다고 우려하는 것 같습니다. 아주 훌륭한 생각인 것 같군요."
 nor_neutrality_focus:0 "엄정 중립 선포"
 nor_neutrality_focus_desc:0 "다른 이들은 세계 분쟁에서 편을 드는 것이 용기와 지혜를 필요로 한다고 주장할지 모르지만, 우리는 거부하는 데 더 큰 용기와 지혜가 필요하다는 것을 압니다."
 nor_interventionism_focus:0 "개입주의 중점"
 nor_interventionism_focus_desc:0 "우리는 자국민뿐만 아니라 모든 인민의 자유를 소중히 여깁니다. 폭정을 막는 것이 전쟁을 의미한다면, 기꺼이 받아들이겠습니다."
 nor_military_youth:0 "군사 청년단"
 nor_military_youth_desc:0 "국가 청년들의 기강과 정치 교육을 장려하는 조직은 조기에 충성심과 자기희생 정신을 함양할 것입니다."
 nor_deterrence:0 "억제력"
 nor_deterrence_desc:0 "홀로 서 있는 우리는 전쟁에서 이득을 보는 경우가 거의 없습니다. 다행히도, 우리는 최고의 방어란 결코 사용할 필요가 없을 정도로 잘 알려진 방어라는 것을 알고 있습니다."
 nor_volunteer_corps:0 "의용군단"
 nor_volunteer_corps_desc:0 "자유라는 이상을 위해 국민을 죽음으로 내모는 것은 아이러니한 일이지만, 해외의 사람들을 돕고자 하는 이들을 위한 수단을 마련하는 것은 그렇지 않습니다."
 nor_paramilitarism:0 "준군사주의"
 nor_paramilitarism_desc:0 "군사 원칙은 군대 밖에서도 적용될 수 있습니다. 우리 군을 보완할 준군사 부대를 개발함으로써 더 많은 사람들이 군사 훈련을 받게 될 것입니다."
 nor_indoctrination_focus:0 "교화"
 nor_indoctrination_focus_desc:0 "우리의 이념을 진리에 기반한 것으로 확립했으니, 이를 진리로 가르칠 수 있습니다. 교육과 언론은 이 교훈을 반영해야 합니다."
 nor_foreign_expeditions:0 "해외 원정"
 nor_foreign_expeditions_desc:0 "적들이 자신들의 이상을 위해 먼 곳의 분쟁에 개입할 준비가 되어 있으므로, 우리도 우리의 이상을 위해 똑같이 할 준비가 되어 있어야 합니다."
 nor_why_we_fight:0 "우리가 싸우는 이유"
 nor_why_we_fight_effect:0 "§Y중립 외교 정책§! 정신이 없다면, 세력을 생성할 수 있게 됩니다.\n"
 nor_why_we_fight_desc:0 "세상은 점점 더 불안정해지고 있습니다. 우리 국민은 권력을 탐하는 자들이 저지르는 잔학 행위를 보아야 합니다. 이제 국민을 우리 대의에 결집시키고 모두가 우리의 자유를 위해 싸울 준비가 되도록 해야 할 때입니다."
 nor_political_commissars:0 "정치장교"
 nor_political_commissars_desc:0 "우리의 정책이 군사적으로도 잘 이행되도록 보장하기 위해, 정치적으로 임명된 관료를 군 계급에 도입할 것입니다."
 nor_internationalism_focus:0 "국제주의 중점"
 nor_internationalism_focus_desc:0 "이념에는 국경이 없습니다. 다른 국가가 스스로를 주권 국가라 칭할지라도, 우리의 신념은 그러한 주장 위에 있습니다."
 nor_nationalism_focus:0 "국가주의 중점"
 nor_nationalism_focus_desc:0 "우리 국가는 독특하며, 우리의 정치적 성과는 오직 이곳에서만 이룰 수 있었던 것입니다. 어떤 대가를 치르더라도 이를 위해 싸워야 합니다."
 nor_ideological_fanaticism:0 "이념적 광신"
 nor_ideological_fanaticism_desc:0 "우리가 정치적으로 확립한 가치와 목표는 고대의 신앙만큼이나 목숨을 바칠 가치가 있습니다. 모든 추종자는 죽음을 마주할 준비가 되어 있어야 하며, 길을 벗어나는 자들은 죽음을 각오해야 할 것입니다."
 nor_narvik:0 "나르비크 항"
 nor_narvik_desc:0 "북부의 나르비크 항은 북방 무역의 핵심 거점이며, 우리는 이 항구를 조국 수복을 위한 교두보로 삼을 수 있습니다."
 nor_coastal_forts:0 "오슬로 강화"
 nor_coastal_forts_desc:0 "추축국이 우리 수도를 다시 침공하려 할 경우에 대비해야 합니다."
 nor_combine_training:0 "합동 훈련"
 nor_combine_training_desc:0 "우리는 영국군으로부터 새로운 전투 방식을 배울 수 있으며, 그들 또한 우리에게서 배울 수 있습니다."
 nor_king_speech:0 "용감한 국왕"
 nor_king_speech_desc:0 "우리의 용감한 국왕 호콘 폐하께서 항복을 거부하시고 노르웨이인들이 저항하고 싸우도록 고무하고 계십니다."
 nor_lower_recruitment_standars:0 "모병 기준 완화"
 nor_lower_recruitment_standars_desc:0 "조국을 해방시키기에 충분한 규모의 군대를 편성하기 위해 징병을 확대해야 하지만, 남아있는 지원자들은 너무 늙었거나 복무하기에 신체적으로 부적합합니다. 기준을 낮춤으로써, 질적 저하를 감수하고 군대를 확장할 수 있습니다."
 nor_greenland:0 "그린란드 점령"
 nor_greenland_desc:0 "독일에 맞서 싸우기 위해 그린란드의 북유럽 형제들을 규합해야 한다."
