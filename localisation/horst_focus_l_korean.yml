 GER_totaler_krieg_idea:0 "총력전"
 GER_totaler_krieg_idea2:0 "총력전 - 최단기전!"
 GER_amerikabomber:0 "아메리카봄버"
 GER_amerikabomber_desc:0 "미국의 산업 심장부를 폭격하여 미국의 민간 및 군사 산업을 본토로 돌리게 함으로써, 제2차 공중전을 위해 영국을 고립시킬 수 있습니다."
 GER_maus:0 "포르셰와 계약"
 GER_maus_designer:0 "마우스 계획"
 GER_maus_designer_desc:0 "동계 전차"
 GER_maus_desc:0 "페르디난트 포르셰와 계약하여 그의 초중전차 설계안인 8호 전차 마우스를 생산할 것입니다."
 GER_e100:0 "헨셸과 계약"
