 SOV_plowshares_into_swords:0 "[Root.GetSovMilCivName]"
 SOV_church_masses:0 "연방을 위한 미사"
 SOV_church_masses_desc:0 "우리 연방의 사제들은 이제 종교적 허튼소리와 더불어 반파시스트 투쟁을 설교하며, 농민과 노동계급이 우리의 애국 투쟁에서 승리하는 데 필요한 희생을 감내하도록 독려합니다."
 SOV_priests_integrated:0 "사제를 군사 작전에 통합"
 SOV_priests_integrated_desc:0 "병사들의 사기를 증진하여 전투 작전을 지원하는 데 러시아 정교회를 철저히 이용할 것입니다."
 SOV_plowshares:0 "쟁기를 검으로"
 HMP_oppose_mills_tt:0 "§C50개의 군수 공장이 시베리아에 추가될 것입니다§!"
 fp_attache_idea:0 "무관 파견"
 fp_attache:0 "무관 파견"
 HMP_neutral_mills_tt:0 "§C우리는 군수 산업을 확장할 것입니다§!"
 SOV_stalinsmills:0 "사회주의의 병기창"
 SOV_neutralmills:0 "군사 산업 확장"
 SOV_oppose_the_church:0 "연방, 스탈린, 그리고 사회주의"
 no_depression_tt:0 "우리는 §O대공황§!의 파괴로부터 완전히 회복했습니다."
 GER_army_innovation_3:0 "육군 혁신 III"
 GER_speers_miracle:0 "슈페어의 군수 기적"
 GER_speers_miracle_desc:0 "알베르트 슈페어는 군수 산업과 노동력을 재편하여 군수품 생산을 대폭 늘릴 수 있다고 대담하게 주장했습니다. 연합군 및 소련군과 싸우기 위해 군수품 생산을 늘려야 하므로 그에게 이 기회를 주어야 합니다."
 GER_army_innovation_3_desc:0 "프랑스와 폴란드 전역은 다양한 종류의 전차 모델의 필요성뿐만 아니라 전차 파생형의 중요성을 가르쳐주었습니다."
 GER_jag_tt:0 "§C육군 회복 및 충원율에 일시적인 강화 효과를 받습니다. 또한 경제법을 §Y총동원령§!으로 변경합니다!§!\n\n민간 공장 40개가 즉시 군수 공장 40개로 전환됩니다.\n\n§R전쟁 지지도가 50% 미만으로 떨어지면 최단기 전쟁이 제거됩니다!§!\n\n§R매월 전쟁 지지도를 2.0% 잃게 됩니다§!"§!\n\n"
 ITA_sword_tt:0 "\n북아프리카와 중동의 아랍/무슬림 국가 통제에 따라 §C안정도§!와 §C전쟁 지지도§!에 보너스를 받습니다."
 ITA_Skillful_Workers_tt:0 "북아프리카와 중동의 아랍/무슬림 국가 통제로 얻는 §C안정도§!와 §C전쟁 지지도§! 보너스에 더해, 북아프리카와 중동 국가 통제로부터 얻은 안정도/전쟁 지지도의 절반에 해당하는 §C공장 생산량§! 및 §C조선소 생산량§! 보너스를 받습니다.§!\n\n§Y최대 가능 수치는 안정도 14.5%와 공장/조선소 생산량 7.75%입니다§!"
 SOV_oppose_the_church_desc:0 "지금도 사회주의, 내일도 사회주의, 영원히 사회주의!"
 SOV_barb3_idea:0 "대조국전쟁"
 SOV_brest:0 "브레스트 요새의 교훈"
 HOL_knil2:0 "KNIL 징집병"
 HOL_curacao_desc:0 "서쪽에 있는 퀴라소를 개발해야 합니다. 휴가를 보내기에 완벽한 장소이며, 우리가 지은 재미있고 다채로운 집들과 함께 엄청난 양의 석유가 매장되어 있습니다!"
 HOL_invest_desc:0 "서쪽의 영토에도 눈을 돌려야 합니다. 크기는 꽤 작지만 자원은 매우 풍부합니다. 자원은 언제나 유용합니다. 이는 또한 해외 무역을 증진시킬 것이며, 이는 항상 좋은 일이고, 우리 함대는 번성할 것입니다!"
 HOL_suriname_desc:0 "수리남은 인구가 꽤 많고 자원도 상당합니다. 이곳을 더욱 개발하는 것은 결코 나쁜 선택이 아닐 것입니다."
 HOL_knil2_desc:0 "본토가 함락되었고, 이제 우리의 식민지만이 전투에서 우리를 도울 수 있습니다. 원주민들을 우리 대의에 규합할 수 있다면, 중국군만큼이나 거대한 군대를 형성할 수 있을 것입니다!"
 stalin_barb_leader_trait2:0 "소비에트 연방 대원수"
 mrp_was_done:0 "독소 불가침 조약을 체결했습니다"
 SOV_at:0 "현대화된 대전차전"
 SOV_at_desc:0 "독일 기갑사단의 엄청난 양과 질은 우리가 대전차 무기를 신속하게 현대화할 것을 요구합니다."
 SOV_order270_desc:0 "포위된 부대와 편제는 마지막까지 사심 없이 싸워 물자를 눈동자처럼 보호하고, 적군의 후방을 돌파하여 파시스트 개들을 격멸해야 한다.\n\n국가방위위원회 의장 - 이. 스탈린"
 SOV_man_of_steel:0 "강철의 대원수"
 SOV_man_of_steel_desc:0 "스탈린 대원수는 모든 움직임을 지시하고... 모든 결정을 내렸습니다... 그는 역사상 가장 위대하고 현명한 군사적 천재입니다... -게오르기 주코프"
 SOV_invade_Japan:0 "8월의 폭풍 작전"
 SOV_invade_Japan_desc:0 "일본과의 국경 분쟁은 너무 오래 지속되었습니다. 일본 정부가 공인된 국경을 존중할 것이라고 믿을 수 없다면, 그 정부를 교체해야 할 것입니다."
 SOV_china_prc:0 "중화인민공화국 지원"
 SOV_china_prc_desc:0 "우리는 사회주의 정부 아래 중국의 해방과 통일에 헌신할 것입니다."
 SOV_wtf:0 "신경 쇠약에 걸린 스탈린"
 SOV_wtf_desc:0 "파시스트들의 갑작스러운 침공으로 스탈린 동지가 잠시 마비되었습니다."
 SOV_barb1:0 "다차에서 스탈린 데려오기"
 SOV_barb1_desc:0 "스탈린 동지의 명령 없이는 우리의 모든 지휘 체계가 마비됩니다. 그가 정상으로 돌아와야 우리가 맞서 싸울 수 있습니다!"
 rasputitsa:0 "라스푸티차"
 rasputitsa_tt:0 "소련의 진흙 계절의 힘이 소련에서 싸우는 모든 군대에 닥칠 것입니다! §Y3월과 4월§! 그리고 §Y10월과 11월§! 내내 모든 사단이 다음 수정치의 영향을 받습니다: §R사단 속도 -20%§!, §R기갑사단 속도 -20% (총 40%)§!, §R소모율 10%§!, 그리고 §R회복률 -30%§!.\n\n이 자연의 힘은 1945년 중반까지 1년에 두 번 발생합니다."
 GER_zwangsarbeit:0 "강제 노동 복무"
 GER_zwangsarbeit_desc:0 ""
 GER_zwangsarbeit_idea:0 "강제 노동"
 GER_winter_equipment:0 "장비 동계화"
 GER_winter_equipment_desc:0 "겨울 내내 싸우려면 장비를 동계화해야 합니다. 그것도 신속하게 말입니다."
 GER_blau_desc:0 "우리는 이겨야만 한다, 그리고 신속하게. -요제프 괴벨스"
 GER_barbarossa_others_text:0 "§C\n우리 동맹국들도 공격 계획의 혜택을 받을 것입니다.§!"
 GER_blau_text:0 "§R\n우리의 공격 계획은 1942년 11월 23일 이후 만료됩니다!§!"
 GER_jag_desc:0 "독일은 국제 볼셰비키의 음모에 의해 포위되었습니다. 연합군과 소련의 경제력을 합치면 어마어마하지만, 총력전에서 독일 민족을 총동원하면 극복할 수 있습니다. 그 누구도 상상할 수 없었던 것보다 더 급진적인 총력전 말입니다."
 GER_totaler_krieg_tt:0 "§R신속하게 전쟁을 끝내지 못하면 독일에 재앙적인 결과가 초래될 것입니다!§!\n\n"
 GER_jet_focus:0 "메서슈미트의 계획"
 GER_jet_focus_desc:0 "메서슈미트는 제트 엔진으로 추진되는 유형의 항공기를 개발해왔습니다. 이 항공기, Me 262는 우리가 제공권을 장악하는 데 도움이 될 것입니다."
 GER_uralabomber:0 "우랄 폭격기"
 GER_uralabomber_desc:0 "소련의 산업 시설이 시베리아로 이전하여 우리 폭격기의 항속거리 밖으로 벗어났습니다. 이 공장들에 도달하려면 더 크고 항속거리가 긴 폭격기를 개발해야 합니다."
 amerika_bomber:0 "아메리카 폭격기 계획"
 amerika_bomber_desc:0 "미국이 본토를 방어하기 위해 대공포와 전투기에 집중하도록 강제할 수 있다면, 우리는 자유롭게 영국을 무차별 폭격할 수 있을 것입니다!"
 uk_africa_focus:0 "수단 개발"
 uk_africa_focus_desc:0 "지중해가 우리 수송선단에 통행 불가능해져서 그곳을 통해 보급품을 수송해야 할 경우를 대비해, 우리는 수단 지역의 도로망과 해군 기지를 개발해야 합니다."
 uk_levant_focus:0 "레반트 방어"
 uk_levant_focus_desc:0 "동지중해는 해안선 근처의 공군 기지망으로만 방어할 수 있습니다. 만약 동지중해의 제해권을 잃는다면, 우리는 분명 이집트의 통제권도 잃게 될 것입니다."
 uk_sumeria_focus:0 "중동 기지"
 uk_sumeria_focus_desc:0 "만약 우리가 동지중해의 제해권을 잃게 될 경우를 대비하여, 중동의 군사 기반 시설을 개발하는 것은 레반트 주둔군에 보급하는 데 핵심적입니다."
 uk_africa_last_defense:0 "수단 방어 준비"
 uk_africa_last_defense_desc:0 "수에즈를 상실했습니다! 우리는 추축국이 아프리카의 나머지 지역으로 진격하는 것을 막아야 합니다!"
 

 
 
 CHI_french_drillx:0 "이탈리아식 훈련"
 CHI_french_drillx_desc:0 "대전에서 이탈리아가 겪은 경험은 방어에 뛰어난 군대를 만들어냈습니다. 그들의 훈련 방식과 기준을 채택함으로써 우리의 방어 능력을 향상시킬 수 있습니다."
 CHI_reach_out_to_francex:0 "이탈리아에 접촉"
 CHI_reach_out_to_francex_desc:0 "이탈리아가 반복적으로 우리에게 굴욕을 안기고 새로운 양보를 강요했음에도 불구하고, 현 상황에서는 그들의 도움이 필요하게 될 수도 있습니다."
 GER_mech_3_focus:0 "Sd.Kfz. 251"
 GER_mech_3_focus_desc:0 "우리의 하노마크에 적외선 탐조등을 장착하면 야간에 더 효과적으로 전투를 수행할 수 있으며, 전투 인지 능력을 향상시킬 수 있습니다."
 
 eth_give_tanks:0 "이탈리아로부터 §Y1.20K§!대의 §Y개량형 경전차§!를 받게 됩니다"
 eth_research_tanks:0 "최대 §Y1936년형 경전차§!까지 연구할 것입니다!"

 USA_army_reform_cooldown:0 "새로운 텍스트 상자를 인쇄 중입니다"
 USA_army_reform_cooldowntt:0 "새로운 텍스트 상자를 만드는 데 90일이 소요됩니다"


