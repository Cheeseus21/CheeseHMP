 declare_independence:0 "독립 선포"
 declare_independence_desc:0 "때가 무르익었습니다! 이제 우리는 영국 내에서 충분한 영향력을 확보하여, 세계로 웅비하려는 아대륙을 짓누르는 군홧발로부터 마침내 해방시킬 것입니다."
 demand_oaths_of_loyalty:0 "충성 맹세 요구"
