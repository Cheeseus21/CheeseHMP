 indian_provincial_election:0 "인도 지방 선거"
 indian_provincial_election_desc:0 "인도 지방 선거가 코앞으로 다가왔으며, 주요 정치 운동 세력들이 각 주에서 영향력을 얻기 위해 경쟁하고 있습니다. 인도 통치법에 명시된 이번 선거의 결과는 아대륙의 미래를 결정하는 요인이 될 것입니다.\n\n§Y인도 국민회의§!는 현재 주(州)의 §Y[?inc_control]§!%를 장악하고 있습니다.\n§Y연합당§!은 현재 주(州)의 §Y[?upa_control]§!%를 장악하고 있습니다.\n§Y독립 노동당§!은 현재 주(州)의 §Y[?ifb_control]§!%를 장악하고 있습니다.\n주의 §Y[?neutral_control]§!%는 §g소수 정당§!이 통제하거나 교착 상태에 있습니다.\n\n승리한 정당이 더 많은 주를 통제할수록 평화적으로 독립을 달성하기가 더 쉬워질 것입니다."
 indian_provincial_election_map:0 "이 주들에서 우리 당의 영향력을 높일 수 있습니다"
 indian_provincial_enemy_election:0 "야당의 선거 운동"
 indian_provincial_enemy_election_desc:0 "지방 선거에 참여하는 정당과 조직이 얼마나 많은지 일일이 설명하기 어려울 정도이며, 우리의 선거 운동 성과가 인상적이긴 했지만 야당도 가만히 있지 않았습니다. 오히려 인도 전역에서 끊임없이 집회와 토론이 벌어지고 있습니다."
 indian_provincial_election_enemy_map:0 "야당이 이 주에서 영향력을 높이고 있습니다"
 congress_majority:0 "인도 국민회의 다수"
 congress_majority_desc:0 "§O[From.GetName]§! §W(은)는 현재 §C인도 국민회의§!의 영향력 아래에 있습니다\n§C인도 국민회의§!의 영향력: §G[?From.inc]§!\n§C연합당§!의 영향력: §G[?From.upa]§!\n§C독립 노동당§!의 영향력: §G[?From.ifb]§!\n§g소수 정당§!의 영향력: §G[?From.neutral]§!\n"
 united_party_majority:0 "연합당 다수"
 united_party_majority_desc:0 "§O[From.GetName]§! §W(은)는 현재 §C연합당§!의 영향력 아래에 있습니다\n§C인도 국민회의§!의 영향력: §G[?From.inc]§!\n§C연합당§!의 영향력: §G[?From.upa]§!\n§C독립 노동당§!의 영향력: §G[?From.ifb]§!\n§g소수 정당§!의 영향력: §G[?From.neutral]§!\n"
 all_india_forward_bloc_majority:0 "독립 노동당 다수"
 all_india_forward_bloc_majority_desc:0 "§O[From.GetName]§! §W(은)는 현재 §C독립 노동당§!의 영향력 아래에 있습니다\n§C인도 국민회의§!의 영향력: §G[?From.inc]§!\n§C연합당§!의 영향력: §G[?From.upa]§!\n§C독립 노동당§!의 영향력: §G[?From.ifb]§!\n§g소수 정당§!의 영향력: §G[?From.neutral]§!\n"
 neutral_stalemate:0 "소수파 장악/교착 상태"
 neutral_stalemate_desc:0 "§O[From.GetName]§! §W(은)는 현재 교착 상태에 있거나 §g소수 정당§!에 의해 통제되고 있습니다!\n§C인도 국민회의§!의 영향력은 §G[?From.inc]§!입니다!\n§C연합당§!의 영향력은 §G[?From.upa]§!입니다!\n§C독립노동당§!의 영향력은 §G[?From.ifb]§!입니다!\n§g소수 정당§!의 영향력은 §G[?From.neutral]§!입니다!\n"

 invite_george_orwell_to_speak:0 "조지 오웰 연설 초청"
 invite_george_orwell_to_speak_desc:0 "《버마의 나날》과 같은 책으로 유명한 소설가 조지 오웰은 오랫동안 영국 독립노동당의 목소리를 내는 일원이었습니다. 이처럼 박식한 인물이 연단에 서게 하는 것은 우리의 사상에 도움이 될 뿐입니다."
 princely_state_mod:0 "번왕국"
 princely_state_mod_desc:0 "번왕국은 영국령 라지의 봉건 제후국으로, 어느 정도의 자치권을 가지고 군주제 질서 하에 운영됩니다. 번왕국은 여전히 영국령 라지의 일부이며 어떠한 선거에도 참여하지 않을 것이며, 인도의 통일에 저항할 수 있습니다."

 princely_state_independence_mod:0 "독립 번왕국"
 princely_state_independence_mod_desc:0 "번왕국들은 영국령 라지 하의 제후국이었습니다. 그러나 이제 영국 행정부와 인도 정부가 번왕들에게 불합리한 요구를 부과하자, 그들은 중앙 정부에 반항하며 자신들만의 독립적인 왕국을 세웠습니다."

 marginalized_muslims:0 "소외된 무슬림"
 marginalized_muslims_0:0 "억압받는 무슬림"
 marginalized_muslims_1:0 "소외된 무슬림"
 marginalized_muslims_2:0 "방치된 무슬림"
 marginalized_muslims_3:0 "보호받는 무슬림"
 marginalized_muslims_4:0 "권한이 강화된 무슬림"
 marginalized_muslims_desc:0 "같은 국가 체제에 거주하는 남아시아 힌두교도와 무슬림 간의 관계는 항상 긴장 상태였습니다. 인도의 압도적인 힌두교 인구로 인해 다수와 소수의 이익은 신중하게 균형을 이루어야 합니다."

 slight_religious_minority:0 "종교적 소수자"

 placated_muslims:0 "회유된 무슬림"
 placated_muslims_desc:0 "우리는 신드, 펀자브, 벵골 지역의 무슬림들과의 관계를 성공적으로 개선했으며, 이제 그들은 훨씬 더 협조적으로 나올 것입니다."

 enraged_muslims:0 "격분한 무슬림"
 enraged_muslims_desc:0 "우리 행정부의 최근 조치들은 무슬림 인구를 격분시켰으며, 그들과의 관계를 영구적으로 악화시켰습니다."

 princely_state_policing_action:0 "[From.GetOperationName]"
 princely_state_policing_action_default:0 "[From.GetName]에서의 치안 활동"
 princely_state_policing_action_desc:0 "[From.GetPrinceName]의 농간은 더 이상 용납할 수 없습니다! 우리는 그의 중세 왕국에 갑작스러운 종말을 고해야 합니다."
 operation_or_cooldown:0 "최근에 치안 활동을 실행하지 않았습니다."
 integrated_princely_states:0 "통합된 번왕국"
 prince_state_force:0 "남아있는 §Y번왕국§!을 무력으로 점령하는 §Y결단§!을 잠금 해제합니다."

 raj_lin_investment_running:0 "현재 투자 유치 중"
 RAJ_Jinnahs_Kingdom_compliance:0 "무슬림 동지 통합"
 india.411.t:0 "극도로 성공적인 작전"
 india.411.desc:0 "새로 창설된 인도군은 [?current_prince_state.GetName]의 [?current_prince_state.GetPrinceName]이 세운 보잘것없는 방어선을 최소한의 사상자로 돌파하는 데 아무런 문제가 없었습니다. 그의 비참한 변명거리에 불과했던 나라는 이제 다시 인도의 것이 되었습니다."
 india.411.a:0 "우리 군대가 못할 게 무엇이겠는가."
 
 india.412.t:0 "성공적인 작전"
 india.412.desc:0 "새로 창설된 인도군은 [?current_prince_state.GetName]의 영토에 대해 전문적이고 전술적인 침공을 수행했습니다. [?current_prince_state.GetPrinceName]의 군대는 제압되었고 사상자는 적었습니다. "
 india.412.a:0 "잘했다, 제군들."
 
 india.413.t:0 "끔찍한 작전"
 india.413.desc:0 "새로 창설된 무질서한 인도군은 [?current_prince_state.GetName]의 [?current_prince_state.GetPrinceName]이 세운 인상적인 방어선을 돌파하는 데 상당한 어려움을 겪었습니다. 수많은 인도인의 목숨을 잃은 후, 이제는 화해하고 현지 행정부를 재건할 때입니다."
 india.413.a:0 "훈련을 확대해야 한다."
 
 india.414.t:0 "재앙적인 작전"
 india.414.desc:0 "인도 대중은 최근 사상자 보고에 격분하고 있습니다. 소규모 치안 활동으로 예정되었던 것이 [?current_prince_state.GetName] 국경 외곽에 인도인의 시체가 쌓여가는 값비싼 전투로 변질되었습니다. 국제 참관인들은 [?current_prince_state.GetPrinceName]이 동원한 군사력에 당혹감을 감추지 못하고 있습니다. 비록 [?current_prince_state.GetName]이(가) 필연적으로 함락되었지만, 그 대가는 무엇이었습니까?"
 india.414.a:0 "장군을 데려오라."
 
 india.415.t:0 "영국의 철수"
 india.415.desc:0 "영국이 대륙에서 철수한 후, 3세기에 걸친 예속 끝에 자랑스럽게 인도 삼색기가 뉴델리의 국회의사당 위에 게양되었습니다. 영국은 떠났고, 인도는 깨어났습니다. 이제 미래로 나아가 스스로의 운명을 개척하기로 결심했습니다."
 india.415.a:0 "밝은 날입니다."
 
 india.416.t:0 "영국의 철수"
 india.416.desc:0 "영국이 대륙에서 철수한 후, 3세기에 걸친 예속 끝에 자랑스럽게 인도 삼색기가 뉴델리의 국회의사당 위에 게양되었습니다. 하지만 인도 북서부의 상황은 완전히 달랐습니다. 신드 주의회 건물 위에는 짙은 녹색 바탕에 이슬람 초승달이 그려진, 누가 봐도 인도 국기가 아닌 깃발이 휘날리고 있었습니다. 독립을 향한 우리의 노력은 기념비적이었지만, 전인도 무슬림 연맹이 너무 큰 영향력을 얻어 서부와 벵골 지방을 지킬 수 없게 되었습니다. 통일 인도의 꿈이 산산조각난 지금, 미래를 향해 나아가야 합니다."
 india.416.a:0 "더 이상 통일 인도는 없다."
 india.416.b:0 "소수 민족을 보호하는 고귀한 방법입니다."
 
 india.417.t:0 "제52차 국민회의가 시작되다"
 india.417.desc:0 "자와할랄 네루의 지도 아래 인도 국민회의는 건설적인 5년을 보냈지만, 네루의 정치적 지배 이후 회의 내 많은 이들이 새로운 지도자를 갈망하고 있습니다. 최종 투표 결과가 들어왔고..."
 india.417.a:0 "...네루가 5년 더 집권하게 되었다!"
 india.417.b:0 "...프라사드가 집권하게 되었다!"
 
 india.418.t:0 "지도력 문제"
 india.418.desc:0 "시칸데르 하야트 칸이 안타깝게 세상을 떠나 더 이상 인도를 이끌 수 없게 되자, 그를 중심으로 뭉쳤던 연합당은 혼란에 빠졌습니다. 그럼에도 불구하고 우리는 미래를 내다보고 향후 몇 년간 효과적인 지도력을 확보해야 합니다."
 india.418.a:0 "키자르 티와나를 대통령으로!"
 
 india.419.t:0 "보팔 회의"
 india.419.desc:0 "암베드카르는 인도 공산당이 광범위한 선거 지지를 받고 있다는 소문을 들었고, 카스트 제도 철폐라는 그의 주된 목표가 대부분 달성된 지금, 그는 자신의 목적이 이미 달성되었는지, 그리고 새로운 지도부가 자신이 보지 못했던 문제들을 해결할 수 있을지 스스로에게 물었습니다. 그는 보팔 회의에서 자신의 결정을 공개적으로 발표해야 한다고 확신했습니다."
 india.419.a:0 "5년 더!"
 india.419.b:0 "아마도 새로운 지도부가 인도를 위해 최선일 것입니다."
 
 india.420.t:0 "중앙수사국 보고 - 하이데라바드"
 india.420.desc:0 "중앙수사국은 다수의 강대국이 하이데라바드의 독립을 지지하고 나설 것이라고 방금 확인했습니다. 이는 그들의 한심한 국가 흉내에 정당성을 부여하는 꼴입니다. 그들이 영구적인 외교 공관을 설립하기 전에 신속히 행동해야 합니다!"
 india.420.a:0 "어리석은 자들 같으니."
 
 india.421.t:0 "인도 개입"
 india.421.desc:0 "우리의 행정부, 함선, 군대가 인도 아대륙에서 철수했지만, 과도기 동안 최소한 인도와 파키스탄의 주권을 보호하기로 결정했습니다. 대부분의 고문들은 완전한 정치적 불개입을 선호하지만, 인도가 외세의 손에 넘어가지 않도록 보장하는 것 또한 이로울 수 있습니다."
 india.421.a:0 "대사에게 알리시오."
 india.421.b:0 "상황이 완벽하게 흘러가고 있습니다."
 
 india.422.t:0 "세계 무대"
 india.422.desc:0 "내부 입지를 확보했으니, 이제 국제적 입지를 확보할 때입니다. 우리 당과 국가는 국제 동맹에 참여할지 여부를 두고 분열되었습니다. 하지만 헌신적인 지도력으로 결정이 관철되었습니다. 이제 우리의 최고 외교관 다수가 어디로 향할지에 대한 명령을 기다리고 있습니다."
 india.422.descalt:0 "문제에 대한 가장 논리적이거나 실용적인 해결책으로 보이는 것이 종종 함정으로 드러날 수 있습니다. 협상이 순조롭지 않았으니, 다른 곳을 알아보는 것이 더 현명할 것입니다."
 india.422.c:0 "난징으로 간다."
 india.422.j:0 "도쿄로 간다."
 india.422.s:0 "방콕으로 간다."
 india.422.i:0 "테헤란으로 간다."
 india.422.e:0 "아디스아바바로 간다."
 india.422.p:0 "카라치로 간다."
 india.422.r:0 "모스크바로 간다."
 india.422.it:0 "로마로 간다."
 india.422.tu:0 "앙카라로 간다."
 india.422.f:0 "파리로 간다."
 india.422.sp:0 "마드리드로 간다."
 
 india.423.t:0 "인도가 [Root.GetFactionName] 가입을 모색하다"
 india.423.desc:0 "3세기에 걸친 영국의 지배 끝에, 인도는 식민주의의 족쇄에서 벗어나 새로운 길을 걷고 있습니다. 그들은 민주 정부를 수립하고 내부 정책을 안정시켰으며, 이후 국제 무대에서 자신들의 위치가 어떠할지 고심했습니다. 그들은 우리와의 동맹이 자국에 가장 큰 이익이 될 것이라는 결론에 도달한 것 같습니다. 우리도 그렇게 말할 수 있을까요?"
 india.423.a:0 "물론 할 수 있습니다!"
 india.423.b:0 "영향력을 위한 기회주의적 탈취입니다."
 
 india.424.t:0 "[RAJ.GetReigningGovernment]의 정권 장악"
 india.424.d:0 "국민의 압도적인 지지에 힘입어 [RAJ.GetReigningGovernment]가 인도의 정당한 집권당으로 자리 잡는 것은 필연적이었습니다."
 india.424.a:0 "네루 대통령"
 india.424.b:0 "하야트 칸 대통령"
 india.424.c:0 "암베드카르 대통령"
 

 india.425.t:0 "자치령 지위 상실"
 india.425.d:0 "최근의 정치적 사건으로 인해 [Root.GetName]으로서의 우리 지위는 더 이상 유효하지 않으며, 추가 통지 없이 독립이 달성될 것입니다."
 india.425.a:0 "앞으로."

 RAJ_AFG_Railway_Alignment:0 "펀자브-타슈켄트 철도"
 RAJ_AFG_Railway_Alignment_desc:0 "모스크바와의 새로운 동맹은 우리 두 본국 간의 물자, 병력, 정보 수송을 요구합니다. 그레이트 게임의 결과로 아프가니스탄이 그 목표를 가로막고 있습니다. 아프가니스탄을 우리의 이해관계에 맞춰 조정한다면 소비에트와의 유대를 크게 강화할 수 있을 것입니다."

 raj_first_five_year_plan:0 "5개년 계획 1단계"
 RAJ_full_speed_ahead:0 "5개년 계획"
 RAJ_failed_five_year_plan:0 "5개년 계획 실패"

 RAJ_reformed_airforce_command:0 "중앙 항공 사령부"
 RAJ_deterrence:0 "억제력"
 

 india.426.t:0 "[RAJ.GetFaction]의 제안"
 india.426.d:0 "인도와 소비에트 연방의 동맹으로 인해, 우리는 자연스럽게 양국의 경제와 군대를 연결하려는 공동 개입을 두려워해 왔습니다. 현재 [ROOT.GetLeader]의 책상 위에 놓인 인도의 제안으로 인해 이러한 두려움이 아프가니스탄에 현실로 다가왔습니다. 펀자브와 소비에트 연방의 중앙아시아 공화국들을 연결하는 철도 건설은 양국이 전액 자금을 지원하며, 우리 경제에 추가적인 경제적 인센티브도 제공될 것입니다. 단점은 당연히 델리와 모스크바가 우리에게 가하는 통제가 증가한다는 점일 것입니다.\n\n계속 성장하는 [AFG.GetCommunistParty]는 [AFG.GetRulingParty] 정부가 이 제안을 수락할 것을 요구하며 자신들의 입장을 분명히 했습니다."
 india.426.a:0 "압력에 굴복한다."
 india.426.b:0 "소비에트는 회랑을 얻지 못할 것이다."

 india.427.t:0 "5개년 계획의 목표"
 india.427.d:0 "[RAJ_Leader_Description] [RAJ.GetLeader]의 책상 위에는 첫 5개년 계획 실행을 위한 두 가지 제안이 놓여 있습니다. 첫 번째 계획은 덜 야심차지만, 사회 기반 시설 프로젝트와 군비 생산을 위한 더 많은 건설 역량을 제공합니다. 우리 정부의 많은 이들은 두 번째 계획을 선호하는데, 이 계획에서는 중공업 부문의 경제 성장이 최우선 순위를 차지합니다. 현재 우리는 첫 번째 제안에서 우선시되는 경제 부문을 지원할 산업 역량을 갖추지 못했다는 주장이 있습니다."
 india.427.a:0 "목표를 다각화한다."
 india.427.b:0 "산업 생산을 추진한다."

 india.428.t:0 "자금 운용"
 india.428.d:0 "구 번왕국들은 연방의 주로서 구 지방들 옆에서 인도 내 동등한 위치를 찾아야 합니다. 우리의 계획이 확실히 그 목표를 달성하기 위해 최선을 다하고 있지만, 경제 고문들은 두 특정 주 중 하나에 더 깊은 투자를 제안했습니다. 하지만 두 주 중 어느 곳을 권고하는지는 고문의 종교에 따라 달라지는 것 같습니다."
 india.428.a:0 "서부 주에 투자한다."
 india.428.b:0 "중부 주에 투자한다."
 
 raj_five_year_goal_tt:0 "내년까지 우리 산업을 §G[?projected_factories_calc]§!개 이상의 §Y민간 공장§!으로 확장해야 합니다.\n\n성공 시 §Y1460§!일 동안 보조금 지급:\n"
 RAJ_industrial_mismanagement:0 "산업 관리 부실"
 RAJ_industrial_mismanagement_desc:0 "5개년 계획의 완전한 실적 부진 이후, 대규모의 관료들이 해고되었으며 경제기획위원회는 회복하는 데 시간이 걸릴 수 있습니다."

 india.440.t:0 "기근의 속삭임"
 india.440.desc:0 "벵골 지역은 최근 인구가 꾸준히 증가하고 일자리를 구하기가 매우 어려움에도 불구하고 농업 생산이 정체되어 왔습니다. 이러한 정체는 종종 농부와 그들이 일하는 땅 사이의 소외, 그리고 지주들의 노골적인 권력 장악 때문으로 여겨집니다. 한동안 긴장된 상황이었지만, 몬순 비가 내리지 않으면 기근이라는 훨씬 더 끔찍한 운명을 맞이할 수 있습니다. 인도가 벵골 인구를 먹여 살리는 데 필요한 작물을 공급할 수 없다는 것은 분명하므로, 기근을 피할 유일한 희망은 외국 물품을 수입하는 것입니다. 우리는 우리의 끔찍한 상황을 세계에 최대한 명확히 알려야 합니다. 그렇지 않으면 수백만 명의 무고한 생명을 잃을 수 있습니다."
 india.440.a:0 "곰은 나눠줄 것이 많습니다."
 india.440.b:0 "미국인들이 우리를 도와줄 겁니다."
 india.440.c:0 "분명, 영국인들은 우리의 최선의 이익을 염두에 두고 있을 겁니다."
 india.440.d:0 "근거 없는 소문일 뿐입니다."

 india.441.t:0 "인도의 기근"
 india.441.desc:0 "몬순이 오지 않아 인도, 특히 벵골 지역이 기근에 직면했으며 행정부는 우리의 도움과 보급을 요청했습니다. 이 행동 요청에 응한다면 인도 정부와 국민은 분명 우리나라를 호의적으로 볼 것입니다. 그 외에도, 식량 보급은 도덕적인 선택이며, 어떤 이들은 우리의 도덕적 의무라고 말할 수도 있습니다. 하지만 자원이 가용한지는 도덕이 결정할 문제가 아닙니다."
 india.441.sov.desc:0 "무모한 영국 식민 행정으로 인해 인도는 기근에 직면했으며, 많은 현지 정치인들이 우리의 번영하는 연방에 도움을 요청했습니다. 일부 전문가들은 인도가 빈곤에 시달리는 인구를 먹여 살릴 외부 보급을 받지 못하면 수백만 명의 목숨이 위태로워질 수 있다는 데 동의합니다. 이 요청을 거부하는 것에 대한 도덕적 의문을 제쳐두고라도, 이는 또한 인도인들이 3세기 동안 직면해 온 방치와 억압에 대해 깨닫게 하는 데 도움이 될 수 있습니다. 서기장 동지, 선택은 당신의 몫입니다."
 india.441.a:0 "인도의 동지들에게 보급품을 지원하겠다!"
 india.441.b:0 "물자를 보내고, 민주주의도 약간 곁들여 보내주게."
 india.441.c:0 "제국의 보석을 위해서라면 무엇이든."
 india.441.d:0 "자원이 부족하다."

 india.442.t:0 "[From.GetAdjective]의 응답"
 india.442.desc:0 "[From.GetLeader]는 자신의 응답에 대해 깊이 고심한 것 같으며, 위태로운 수백만 명의 목숨에게는 다행스럽게도 자국 경제를 희생하여 식량 수송을 지지하기로 했습니다."
 india.442.a:0 "벵골이 안도의 한숨을 내쉬었습니다"
 
 india.443.t:0 "[From.GetAdjective]의 응답"
 india.443.desc:0 "[From.GetLeader]로부터 비겁한 응답을 받았습니다. 그들은 자원 부족을 핑계로 수백만 명을 헛되이 죽게 내버려 두는 것을 정당화했습니다. 인도는 이를 잊지 않을 것입니다."
 india.443.a:0 "지옥이 우리를 덮쳤다."
 colony_of_burma:0 "버마 식민지"
 colony_of_burma_desc:0 "1937년 버마 식민지는 영국령 인도에서 분리되어 더 이상 그 행정 하에 있지 않습니다."
 
 india.444.t:0 "제국 회의 개회"
 india.444.desc:0 "대관식 이후 조지 6세와 그의 배우자인 엘리자베스 왕비는 이 어려운 시기에 제국의 문제를 논의하기 위해 또 다른 제국 회의를 소집했습니다. 더 통합된 경제 및 군사 정책에 대한 논의가 있을 것으로 예상됩니다."
 india.444.a:0 "솔깃한 제안이군."

 india.445.t:0 "SAARC 가입 초청"
 india.445.d:0 "새로 건국된 [RAJ.GetNameDef]가 이 지역의 만연한 제국주의와 저개발에 맞서기 위해 '남아시아 지역 협력 연합'(약칭 SAARC)이라는 경제 동맹 창설 작업을 시작했습니다. 우리는 이 새로운 경제 블록에 참여하도록 초청받았습니다."
 india.445.a:0 "솔깃한 제안이군."
 india.445.b:0 "한 착취자를 다른 착취자로 대체하지 않겠다."

 india.446.t:0 "[PRC.GetNameDef] 방문"
 india.446.desc:0 "아시아 식민주의를 저지하려는 최근의 노력에서, 우리는 유럽 열강에 직접 점령당한 억압받는 동포들에게 집중했습니다. 하지만 서구의 영향력, 취약한 통치, 열악한 생활 환경에 시달리다 마오의 공산주의 운동이라는 대안을 찾은 중국 인민을 무시하는 것은 치명적인 약점입니다. 중국 본토에서 우리는 중국 인민에게 어떤 지원을 제공할지 결정해야 합니다."
 india.446.a:0 "중국을 보호하고 해방시키기 위한 소화기를!"
 india.446.b:0 "중화인민공화국을 공고히 하기 위한 정치적 지원을."
 india.446.c:0 "노동자들의 지위를 향상시키기 위한 산업 지원을."

 india.447.t:0 "[RAJ.GetAdjective]의 지원 도착!"
 india.447.desc:0 "새롭게 민주적이고 독립적인 사회주의 인도가 우리에게 귀중한 지원을 보내주었으며, 중국 인민은 이를 결코 잊지 않을 것입니다."
 india.447.a:0 "이 인도제 총들이 압제자들을 저지할 것입니다."
 india.447.b:0 "이 정치적 지원은 중국 공산당에 큰 도움이 됩니다"
 india.447.c:0 "이 새로운 산업들은 중국 노동자들을 지원할 것입니다."

