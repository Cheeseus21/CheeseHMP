 princely_state_independence:0 "인도 통합"
 princely_state_independence_desc:0 "인도가 곧 독립을 앞두고 있으며, 인도가 영유권을 주장하는 영토를 다스리는 많은 토후들은 중앙 집권 정부 수립 문제로 고심하고 있습니다.\n언제든지 그들에게 편을 선택하라고 요구할 수 있지만, 너무 빨리 행동하면 그들은 통합에 반대할 가능성이 높습니다.[RAJ.GetVariableEnable]"
 princely_state_independence_variable:0 "\n\n§g[428.GetName]§!의 §g[428.GetPrinceName]§!은(는) §Y[?428.voting_chance]%§! 확률로 찬성할 것입니다.\n§g[433.GetName]§!의 §g[433.GetPrinceName]§!은(는) §Y[?433.voting_chance]%§! 확률로 찬성할 것입니다.\n§g[437.GetName]§!의 §g[437.GetPrinceName]§!은(는) §Y[?437.voting_chance]%§! 확률로 찬성할 것입니다.\n§g[427.GetName]§!의 §g[427.GetPrinceName]§!은(는) §Y[?427.voting_chance]%§! 확률로 찬성할 것입니다.\n§g[425.GetName]§!의 §g[425.GetPrinceName]§!은(는) §Y[?425.voting_chance]%§! 확률로 찬성할 것입니다.\n[RAJ.PakistanOwned]"
