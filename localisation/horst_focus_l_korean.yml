 JAP_claim_the_kyokuto:0 "극동 영유권 주장"
 JAP_claim_the_kyokuto_TRIG1:0 "§H우리§! 또는 우리 §H괴뢰국§!이 §H탄누 투바§!, §H브라츠크§!, §H키렌스크§!에서 동쪽까지의 모든 주를 점령하고 있습니다."
 JAP_claim_the_kyokuto_EXPL1:0 "[SOV.GetFlag]§H[SOV.GetName]§!의 외만주에 있는 모든 이전 영토를 획득합니다."
 JAP_claim_the_kyokuto_EXPL2:0 "[SOV.GetFlag]§H[SOV.GetName]§!의 몽골과 탄누 투바에 있는 모든 이전 영토를 획득합니다."
 JAP_claim_the_kyokuto_EXPL3:0 "[SOV.GetFlag]§H[SOV.GetName]§!의 시베리아에 있는 모든 이전 영토를 획득합니다."
 JAP_claim_the_kyokuto_EXPL4:0 "[SOV.GetFlag]§H[SOV.GetName]§!의 극동에 있는 모든 이전 영토를 획득합니다."
 JAP_claim_the_kyokuto_desc:0 "떠오르는 태양이 시베리아를 비추며, 극동의 운명이 일본과 함께함을 알린다. 한때 차르의 국경이었던 이곳은 이제 일본 정신을 되새긴다. 우리 병사들의 진격은 이 동방 영토에 대한 우리의 지배권을 공고히 한다. 일본의 유산은 이제 시베리아의 광활한 대지와 얽혀 있다."
 
