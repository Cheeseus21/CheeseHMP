 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_tt:0 "이 중점을 §Y남방 자원지대 타격§!보다 먼저 완료하면, [ENG.GetFactionName]에 전쟁을 선포할 때 다음 효과가 발생합니다:\n\n"
 JAP_the_southern_colonies:0 "남방 식민지"
 JAP_the_southern_colonies_desc:0 "국제 연맹에서 탈퇴했음에도 불구하고, 우리는 여전히 남양 군도 위임통치령에 대한 통제권을 유지하고 있습니다. 태평양에서의 국익을 위해 모든 남방 도서를 적절히 개발하고, 그곳의 주민들이 제국 내에서 자신의 위치를 알도록 하는 것이 중요합니다."
 JAP_develop_the_south:0 "남양 군도 개발"
 JAP_develop_the_south_desc:0 "타이완과 위임통치령은 재정적으로 자급자족이 가능하지만, 아직 해야 할 일이 많습니다. 우리의 정착민과 행정부를 통해 기반시설과 기업 양쪽에 더 많은 기회를 장려할 수 있습니다."
 JAP_stengthen_taiwan:0 "타이완 강화"
 JAP_stengthen_taiwan_desc:0 "타이완은 우리 제국의 첫 식민지였으며, 지금은 가장 중요한 곳 중 하나입니다. 이곳은 남쪽으로의 모든 침공을 위한 발판이 될 것입니다. 따라서, 우리 군을 지원하기 위해 타이완의 산업 발전을 강화할 것입니다."
 JAP_island_industry:0 "도서 산업 장려"
 JAP_island_industry_desc:0 "남양 군도에 대한 투자는 생산성의 극적인 증가를 가져왔습니다. 이러한 현지 산업을 적절히 지원하면 해당 지역에서 생산되는 물자를 상당히 늘릴 수 있을 것입니다."
 JAP_ease_native_restrictions:0 "원주민 규제 완화"
 JAP_ease_native_restrictions_desc:0 "우리의 통치로 부과된 규제는 원주민 섬 주민들의 분노를 샀습니다. 이러한 규제를 완화함으로써, 제국의 신민이 된다는 것이 무엇을 의미하는지에 대한 더 우호적인 이미지를 만들 수 있습니다."
 JAP_island_fortifications:0 "도서 요새화"
 JAP_island_fortifications_desc:0 "위임통치령의 섬들은 우리의 가장 취약한 영토입니다. 통치 조약상 요새화가 금지되어 있지만, 이 가라앉지 않는 항공모함들을 활용하지 않는 것은 어리석은 일일 것입니다."
 JAP_improve_ssdc:0 "남양개발 지원"
 JAP_improve_ssdc_desc:0 "남양개발의 성공이 명백해지자, 해군은 이 회사에 추가 자금을 지원하기로 결정했습니다. 이러한 조치는 남태평양에서의 경제 및 개발 목표를 훨씬 더 관리하기 쉽게 만들어 줄 것입니다."
 JAP_upgrade_nanyo_kohatsu_tt:0 "산업 설계사 §Y$south_seas_development$§! 수정:\n소비재 공장: §Y-2.0%§! \n§Y공군 기지§! 건설 속도: §G+5.00%§! \n§Y해군 기지§! 건설 속도: §G+5.00%§! \n§Y대공포§! 건설 속도: §G+5.00%§! \n\n"
 JAP_foothold_in_timor:0 "티모르 교두보 확보"
 JAP_foothold_in_timor_desc:0 "해군은 티모르 무역에 대한 네덜란드의 장악을 깨뜨릴 계획을 구상했습니다. 남양개발 회사를 활용하여 원주민들과 합작 투자를 설립함으로써 이 지역에서 우리의 전략적 목표를 더욱 진전시킬 수 있습니다."
 JAP_continue_truk_fortifications:0 "트럭 환초 요새화 계속"
 JAP_continue_truk_fortifications_desc:0 "트럭 환초는 남태평양에서 제국 해군의 주요 거점입니다. 요새와 시설을 증강하는 것은 이 지역에서 우리의 우위를 확보하는 데 큰 도움이 될 것입니다."
 GER_bob:0 "영국 본토 항공전"
 GER_bob_desc:0 "우리는 영국 본토로 전선을 옮겨 폭격으로 굴복시켜야 합니다. 강력한 공중전만이 영국이 평화 조약에 서명하도록 강제할 수 있습니다."
 HUN_arrow_cross_deal_2:0 "살러시에게 권력 부여"
 HUN_arrow_cross_deal_2_desc:0 "모든 파시스트 정당이 통합되고 공고해졌으니, 이제 당명을 마지막으로 바꿀 때가 되었습니다: 화살십자당. 살러시 페렌츠는 당의 모든 측면을 완전히 장악했으며, 몇 주 안에 공식적으로 헝가리의 지도자가 될 것입니다. 화살십자는 고대 헝가리 부족의 상징이자, 트리아농 조약을 무효화하고 국경을 확장하려는 우리의 의도를 보여주는 표시이기도 합니다."
 HUN_fascism_warning_tt:0 "\n이 중점을 완료하기 전에 §H파시스트 강화§! 또는 §H파시스트 국왕 선출§!을 선택하지 않으면 헝가리는 비동맹 상태를 유지합니다!"
 HUN_enforce_corporatism_1:0 "조합주의 시행"
 HUN_enforce_corporatism_1_desc:0 "우리의 새로운 사회는 모든 노동 가능 인구가 각자 수행해야 할 과업을 가질 때만 작동할 수 있습니다. 이탈리아인들은 조합주의라는 매우 훌륭한 체제를 가지고 있는데, 이는 사회를 동일한 이해관계를 기반으로 한 여러 기업 집단으로 나눕니다. 이 새로운 체제를 시행함으로써 우리는 공장 생산량을 극대화하고 우리가 원하는 대로 사회를 재구성할 수 있습니다."
 HUN_consolidate_horthys_power_1:0 "권력 집중"
 HUN_consolidate_horthys_power_1_desc:0 "헝가리는 10년 넘게 왕 없는 왕국이었습니다. 이로 인해 발생한 정치적 긴장은 한계점에 다다르고 있으며, 신속하게 조치하지 않으면 우리가 아는 체제가 붕괴될 수도 있습니다. 우리는 [ROOT.GetLeader]이(가) 이 어려운 시기에 확고한 통제력을 유지하기 위해 자신의 권력을 유지할 뿐만 아니라 확대하도록 보장해야 합니다."
 HUN_szalasi_ferenc:0 "살러시 페렌츠"
 HUN_call_for_a_revisionist_king:0 "새로운 왕조"
 HUN_call_for_a_revisionist_king_desc:0 "국민들은 우리의 옛 영광을 되찾기를 열망하고 있습니다. 합스부르크 가문은 기회가 있었지만 실패했습니다. 이제 우리는 다른 곳에서 왕을 찾아야 할 때입니다. 우리는 현재 섭정인 호르티 미클로시에게 국민들의 눈에 비친 그의 영웅적인 지위를 고려하여 왕위를 제안해야 합니다."
 HUN_ban_arrow_cross:0 "살러시 투옥"
 HUN_ban_arrow_cross_desc:0 "살러시 페렌츠는 나라에 너무 많은 문제를 일으켜 더 이상 자유롭게 놔둘 수 없습니다. 그의 첫 정당인 국민의지당(NAP)이 금지된 이래로, 그는 수많은 소송에 시달려왔습니다. 증거 부족으로 이 소송들은 오랫동안 연기되었고, 마침내 구체적인 판결을 내릴 때가 왔습니다: 유죄."
 HUN_strengthen_the_regency_1:0 "섭정 체제 강화"
 HUN_strengthen_the_regency_1_desc:0 "호르티 미클로시는 공식적으로 왕이 아니더라도 국가를 이끌기에 완벽하게 유능하다는 것을 모두에게 증명했습니다. 호르티의 통치가 완벽하게 충분하다면 헝가리가 군주제로 돌아갈 필요가 있다고 보지 않습니다. 왕도, 독재자도 아닌 그는 어느 한쪽에도 완전히 편승하지 않고 유럽의 다가오는 정치적 혼란을 조심스럽게 헤쳐나갈 수 있습니다."
 HUN_arrow_cross_deal_1:0 "파시스트와 협상"
 HUN_arrow_cross_deal_1_desc:0 "우리는 살러시 페렌츠의 화살십자당의 파시스트 강령을 수용하고 헝가리의 잃어버린 영토를 회복하기 위해 그들과 협력할 것입니다. 우리는 더 이상 화살십자당과 싸우거나 억압하지 않을 것입니다."
 HUN_calvinist_tt:0 "호르티가 왕으로 즉위하기 전에 가톨릭으로 개종하지 않으면 국민과 귀족들이 분노할 것입니다!\n\n"
 HUN_coopt_fascists_tt:0 "\n만약 우리가 사회의 파시스트 세력과 적극적으로 협력하고 포섭하지 않는다면, 우리는 적대적인 지하 파시스트 운동에 대처해야 할 것입니다!\n\n"
 HUN_crown_king_1:0 "호르티 즉위"
 HUN_crown_king_1_desc:0 "우리의 현 섭정이자 오스트리아-헝가리 함대의 제독, 전쟁 영웅이자 국가의 인기 있는 상징인 호르티 미클로시가 헝가리의 새로운 왕이 될 것입니다. 그와 함께, 수백 년간의 외국인 왕 통치 끝에 마침내 헝가리인 왕을 갖게 되었습니다. 그가 바로 우리 민족을 영광으로 이끌 사람입니다."
 HUN_convert_horthy:0 "호르티의 개종"
 HUN_convert_horthy_desc:0 "호르티 가문은 칼뱅파의 오랜 혈통을 이어왔습니다. 호르티가 새롭고 진정한 헝가리 왕가를 세우려면 먼저 그의 백성들의 종교인 가톨릭으로 개종해야 합니다."
 USA_fire_king:0 "어니스트 킹 해임"
 USA_fire_king_desc:0 "어니스트 킹의 영국 혐오는 동맹국과의 관계를 저해할 뿐만 아니라, 마크 14 어뢰처럼 비효율적인 것으로 판명된 프로젝트를 지원하게 만들고 있습니다."
 FRA_operation_dragoon:0 "용기병 작전"
 FRA_operation_dragoon_desc:0 "프랑스 남부에서의 상륙 작전은 독일 부대를 대서양 방벽에서 끌어내어 프랑스 북부에서의 더 본격적인 침공을 가능하게 할 수 있습니다."
 RAJ_indian_labor:0 "인도인 노동자"
 RAJ_indian_labor_desc:0 "대영제국은 광대하며 전쟁 수행을 위한 도로, 요새, 철도 건설에 필요한 노동력이 절실히 필요합니다."
 CAN_ford_general_motors:0 "포드 캐나다"
 CAN_ford_general_motors_desc:0 "미국 자동차 회사 '포드 자동차 회사'의 사업을 확장하면 트럭 및 하프트랙 생산이 확대될 것입니다."
 CAN_ford_general_motors_idea:0 "포드 캐나다"
 SOV_rehabilitated_military_buffs_tt:0 "§Y선택 시:§!\n§Y모스크바 전략 공세 작전§! 추가, §Y60§!일 동안 (£attack_texticon 사단 공격: §G+20.0%§!) 효과 부여.\n\n"
 ROM_modern_at_guns_2:0 "75mm 레시타 모델 1943"
 ROM_modern_at_guns_2_desc:0 "75mm 레시타 모델 1943은 대전차 설계에 있어 놀라운 혁신입니다."

 HUN_hussar_doctrine:0 "후사르 교리"
 HUN_hussar_doctrine_desc:0 "속도와 기동은 후사르의 교리이며, 마찬가지로 우리 군의 교리가 될 것입니다."
 HUN_mechanized_hussars:0 "현대 후사르"
 HUN_mechanized_hussars_desc:0 "기계화는 기동 보병의 미래입니다."

 HUN_arpad_line:0 "아르파드 방어선 건설"
 HUN_arpad_line_desc:0 "하로시 장군의 '유연 방어' 이론에 따라 카르파티아산맥에 만네르하임선을 본뜬 경요새망을 건설할 것입니다."
 HUN_arpad_line_tt:0 "카르파티아산맥을 가로지르는 방어선을 건설하는 디시전을 잠금 해제할 것입니다.\n\n"
 HUN_theory_of_flexible_defence:0 "유연 방어 이론"
 HUN_theory_of_flexible_defence_desc:0 "테오필 하로시 장군은 새로운 방어전 이론을 개발했습니다. 유연 방어는 가능한 보급선을 차단할 뿐이므로, 적은 요새선을 우회할 수 있지만, 재보급이 없는 모든 전투단은 빠르게 탄약과 식량이 고갈될 것입니다."
 HUN_study_rocket_designs:0 "독일 로켓 설계 연구"
 HUN_study_rocket_designs_desc:0 "독일의 로켓 공학 발전을 신중히 연구하여, 이를 학습하고 역설계해 로켓 포를 개발할 것입니다."
 poglavnik:0 "포글라브니크"
 HUN_militarize_the_levente:0 "레벤테 군사화"
 HUN_militarize_the_levente_desc:0 "레벤테 협회는 공식적으로 군 병력을 증강하지 않으면서도 수십만 명의 청년들을 퇴역 군인의 지휘와 훈련 아래 둠으로써 트리아농 조약을 우회하는 수단입니다. 이 운동을 군사화하면 인력이 크게 강화될 것입니다."
 HUN_increase_metal_processing_capacity:0 "금속 처리 용량 증대"
 HUN_increase_metal_processing_capacity_desc:0 "광석을 더 많이 채굴할수록, 더 많은 금속을 처리해야 합니다."
 HUN_invest_in_north_transylvanian_mining:0 "북트란실바니아 광업에 투자"
 HUN_invest_in_north_transylvanian_mining_desc:0 "트란실바니아는 수 세기에 걸친 강력한 광업 역사를 가지고 있습니다. 군수 공장에 직접적으로 유용한 자원을 가져오지 않더라도, 채굴된 광물은 경제에 크게 기여할 것입니다."
 HUN_support_urbanization_2:0 "부다페스트 개발"
 HUN_support_urbanization_2_desc:0 "부다페스트를 세계적인 도시로 만들기 위해 개발 노력을 집중해야 합니다."
 HUN_mountain_artillery:0 "산악포"
 HUN_mountain_artillery_desc:0 "소련과의 국경은 산과 언덕으로 가득합니다. 헝가리를 방어하려면 그곳에서 포병을 운용하는 법을 배워야 합니다."
 CRO_nuclear_effort:0 "토미슬라브의 위력"
 CRO_nuclear_effort_desc:0 "물리학자들이 너무 멀리 간 걸까요?"
 ROM_national_christian_party_ii:0 "옥타비아누스 만세!"
 ROM_national_christian_party_ii_desc:0 "옥타비안 고가가 이끄는 국가기독당은 마침내 루마니아 농민들의 뜻을 실현할 것입니다."
 CRO_italian_influence_focus_desc:0 "우리는 이탈리아와 그 어느 때보다 긴밀한 관계를 맺고 있습니다."
 CRO_recovery_teams:0 "회수팀"
 CRO_recovery_teams_desc:0 "장비 손실을 더욱 줄이기 위해, 전장에서 무기와 차량을 회수할 팀을 조직해야 합니다."
 CRO_prospect_for_resources:0 "자원 탐사"
 CRO_prospect_for_resources_desc:0 "우리 국토는 현 시대의 투쟁에 도움이 될 자원을 품고 있습니다. 우리는 가능한 한 빨리 이 자원들을 개발하여 최대한 활용해야 합니다."
 CRO_industrial_planning:0 "산업 계획"
 CRO_industrial_planning_desc:0 "산업 발전을 지속하기 위해, 우리는 장기적인 전략을 수립하고 적합한 부지를 찾아야 합니다."
 CRO_secret_preparations:0 "우스타샤 민병대 비밀 편성"
 CRO_secret_preparations_desc:0 "우리는 비밀리에 독일 대사에게 접촉하여 크로아티아 국민이 유고슬라비아로부터 분리독립을 원한다는 사실을 알릴 것입니다. 우리는 독일이 이 시도에 우리를 도와주기를 바랍니다."
 FIN_petsamo:0 "페차모 해방!"
 FIN_petsamo_desc:0 "살라의 핀란드인들은 소련의 점령에서 해방될 것입니다!"
 GER_weserubung2:0 "베저위붕 작전 (노르웨이)"
 GER_weserubung2_desc:0 "덴마크를 확보했으므로, 우리 군은 이제 안전하게 노르웨이를 침공하고 점령할 수 있습니다."
 lower_air_purge_tt:0 "공중 임무 효율 숙청 페널티가 5%만큼 감소합니다."
 lower_air_purge2_tt:0 "공중 임무 효율 숙청 페널티가 2.5%만큼 감소합니다."
 removed_air_purge_tt:0 "§Y소련 공군§!의 §R공중 임무 효율 페널티§!를 완전히 제거했습니다 (현재: [?SOV.SOV_purge_air_factor|%R1])"
 SOV_PLANE_STUFF_TT:0 "\n§C1940년형 전투기를 연구합니다§!"
 SOV_PLANE_STUFF2_TT:0 "\n§C1944년형 전투기를 연구합니다§!"
 war_in_the_west_start:0 "서부 전쟁 책갈피 선택됨"
 NOR_norsk_hydro_focus:0 "노르스크 하이드로"
 ENG_dieppe:0 "디에프 기습"
 ENG_dieppe_desc:0 "우리는 디에프 마을에 소규모 침공을 감행하여 유럽 해안선에 대한 독일의 방어 태세를 더 자세히 알아볼 것입니다."
 NOR_navy_3:0 "신속한 해군"
 NOR_navy_3_desc:0 "빠른 함선!"
 SPR_AZUL_tt:0 "전쟁 중 쌓은 경험과 용맹을 기려 (강력한) 훈장을 수여받은 §H스페인 내전§! §R베테랑§! 사단 10개가 모집됩니다."
 ROM_iron_guard_ii:0 "대루마니아 재건"
 ROM_iron_guard_ii_desc:0 "소련의 부코비나와 베사라비아 점령은 국가적 굴욕이었으며, 반드시 복수해야 합니다."
 ROM_iron_guard_iii:0 "오데사 영유권 주장"
 ROM_iron_guard_iii_desc:0 "바르바로사 작전 지원에 대한 보상으로, 독일국은 우리 국경에 인접한 소련 영토를 우리에게 약속했습니다."
 ITA_reinforce_the_gustav_line_tt:0 "이탈리아 전선을 따라 즉시 §H7레벨§! 요새선을 생성합니다\n\n"
 ITA_strengthen_the_blackshirts_spawn_divs2_tt:0 "§Y[THIS.GetName]§!에 §Y30 카미치에 네레§! 사단을 생성합니다."
 NOR_norsk_hydro_focus_desc:0 "노르스크 하이드로는 알루미늄과 보크사이트의 주요 공급원이며, 중수 생산을 통해 핵과학 연구에도 기여하고 있습니다."
 SOV_approach_germany_molotov_tt:0 "§G뱌체슬라프 몰로토프§!는 우리의 §Y외무인민위원§!입니다."
 axis_minor_railways_tt:0 "\n§C우리의 소규모 동맹국들은 수도와 3레벨 철도로 연결될 것입니다.§! \n\n§C동맹인 소규모 국가들과 거래 시 20%의 추가 교역을 얻게 됩니다.§!"
 italian_railways_tt:0 "\n§C이탈리아의 모든 철도가 1레벨씩 업그레이드될 것입니다.§!"
 ENG_tonks_tt:0 "\n4개의 숙련된 중형전차를 배치하고 이를 지원할 비축 물자를 받게 됩니다."
 TIB_nothing335:0 "호르스트의 제3차 5개월 계획 시작"
 HMP_ignite_the_warsaw_uprising_tt:0 "§H모든 폴란드 핵심 주에서 2개의 보병 사단이 봉기할 것입니다§!"
 SOV_send_military_advisors_to_spain_tt:0 "§H엔리케 리스터§!라는 이름의 §H기술 6 장군§!이 등장합니다."
 SLO_commando_tt:0 "§Y코만도 (전문가)§!를 §G무료§!로 고용할 수 있게 됩니다."
 gdansk2_tt:0 "\n§G그단스크에 대한 단속을 시작하여, 궁극적으로 그곳의 모든 인구와 산업을 우리의 직접 통제하에 둘 것입니다.§!"
 gdansk_tt:0 "\n§G그단스크의 산업과 인구에 대한 통제력을 완전히 강화할 것입니다.§!"
 no_dutch_player:0 "네덜란드령 동인도 전쟁 기계"
 no_dutch_player_desc:0 "§R자바의 통제권을 잃으면 이 정신은 제거됩니다!§!"
 UK_PLANE_STUFF_TT:0 "§C미국과 영국이 1944년형 전략 폭격기를 연구할 것입니다§!"
 YUG_yugoslavian_rail_network:0 "유고슬라비아 철도망"
 ENG_tank_focus2:0 "왕립 전차 군단"
 POL_get_em_wojtek:0 "해치워라, 보이테크!"
 POL_get_em_wojtek_desc:0 "크아아아아아아아!"
 Wojtek_tt:0 "§Y보이테크§!라는 이름의 §Y기술 9 장군§!이 등장합니다."
 ENG_tank_focus2_desc:0 "현대 전차는 현대 군대의 중추입니다."
 ENG_tank_focus3:0 "엘 알라메인 전투"
 ENG_tank_focus3_desc:0 "왕립 전차 군단의 정예 병력을 배치할 것입니다."
 YUG_yugoslavian_rail_network_desc:1 "우리는 국가의 모든 지역에 걸쳐 국영 철도망을 동등하게 확장해야 합니다. 우리 국가의 어느 지역도 다른 지역보다 더 중요하지는 않습니다."
 YUG_bosnian_poverty_system:0 "경공업 개선"
 GER_army_innovation_tt:0 "§C\n48개의 완편된 40너비 보병으로 구성된 군대를 배치할 것입니다.§!"
 YUG_bosnian_poverty_system_desc:1 "우리는 이미 내부 불안을 겪고 있으므로, 경공업이 뒤처져 국민들이 일상생활에 필요한 필수품을 박탈당하게 해서는 안 됩니다."
 ENG_home_defence_tt:0 "\n우리는 침공 방어를 위해 잉글랜드 남부에 6레벨 요새선인 총사령부 방어선을 건설할 것입니다.\n\n"
 
 ENG_fall_back_to_ireland:0 "아일랜드로 철수"
 ENG_fall_back_to_ireland_desc:0 "우리는 언젠가 이 운명의 땅으로 반드시 돌아올 것입니다."
 ENG_fall_back_to_ireland_tt:0 "\n우리는 §Y잉글랜드 본토에서 통제하는 모든 주에서 군수 공장 5개를 제거§!할 것입니다. 하지만 군수 문제의 한계로 인해, 어떤 경우에도 보상으로는 §Y군수 공장 75개§!만 받게 됩니다.\n\n"
 ENG_fall_back_to_ireland_tt1:0 "이 중점은 §Y북아일랜드와 페로 제도§!를 강화하고 §Y연합국의 저항!§!을 제거합니다!"
 
 ENG_fall_back_to_canada:0 "캐나다로 철수"
 ENG_fall_back_to_canada_desc:0 "이 중점 아이콘에는 동맹국들의 얼굴이 그려져 있습니다."
 ENG_fall_back_to_canada_tt:0 "이 중점은 §Y호르스토리컬 메인 모더 치저스§!의 후원으로 §Y군수 공장 50개§!를 추가로 제공합니다!"
 ENG_fall_back_to_canada_tt1:0 "이 중점은 §Y뉴펀들랜드와 아이슬란드§!도 강화합니다!"
 
 FIN_red_soil_government_tt:0 "이 중점은 선거가 실시된 후 자동으로 완료됩니다\n\n"
# make focus about Lorković–Vokić plot to make coalition peasant party - moderate ustasha, join the allies and fight the communists
 USA_social_security_act:0 "사회보장법"
 USA_social_security_act_desc:0 "우리나라의 노인들은 대부분 빈곤 속에서 살아가고 있으며, 쉬운 탈출구가 없습니다. 노년층을 위한 연방 복지 프로그램을 만들면 그들의 복지가 크게 향상될 것입니다. 동시에, 비슷하지만 더 단기적인 프로그램으로 일시적 실업으로 인한 빈곤 문제를 해결할 수 있습니다."
 ENG_dresden_idea:0 "지역 폭격"
 HOL_empire:0 "네덜란드 제국"
 HOL_huygens:0 "하위헌스의 정신"
 HOL_huygens_desc:0 "네덜란드 국적의 뛰어난 수학자, 물리학자, 발명가, 천문학자였던 하위헌스. 그는 과학에 매료되었으며 17세기 과학 혁명의 주역 중 한 명이었습니다. 그는 국경을 믿지 않았습니다. 과학은 언제 어디에나 존재했습니다. 과학에는 국경이 없습니다. 우리는 공동의 대의를 위해 모든 기술을 동맹국과 공유해야 합니다."
 HOL_reinforce_sumatra:0 "수마트라 강화" 
 HOL_reinforce_sumatra_desc:0 "수마트라는 자바를 제외하고 동인도 제도에서 두 번째로 중요한 섬입니다. 이 섬을 사수하는 것이 자바 방어의 핵심입니다. 수마트라가 함락되지 않으면, 자바도 함락되지 않습니다."
 HOL_binnenlands:0 "Binnenlandse Strijdkrachten"
 HOL_binnenlands_desc:0 "마침내 본토에 저항 세력이 뿌리내렸습니다. 오랫동안 주로 협력주의가 만연했지만, 나치의 공포 정치가 시작된 이래 우리 국민은 각성했습니다. 이제 저항은 조직화되었으며, 우리의 모험심 넘치는 왕자, 베른하르트 폰 리페비스터펠트 공에 의해 공식 군대로 통합될 수 있습니다."
 HOL_devour:0 "사자가 태양을 삼키다"
 BRA_tenentes:0 "테넨치스 유지"
 BRA_tenentes_desc:0 "유럽에서 훈련받은 젊은 장교들인 테넨치스는 군 내에서 상당한 영향력을 가지고 있으며, 스스로를 구세대보다 우월하다고 생각합니다. 비록 그들 중 다수가 사회주의적 성향과 배경을 가지고 있지만, 새로운 브라질 군대를 다루는 방식은 매우 혁신적이고 미래 지향적입니다. 우리는 어떤 대가를 치르더라도 그들과 우호적인 관계를 유지해야 합니다."
 BRA_mobilise:0 "통합주의자 동원"
 BRA_mobilise_desc:0 "바르가스의 이스타두 노부 이념을 실현하기 위해, 그는 권력을 중앙 집중화할 충분한 지지를 얻어야 합니다. 마르크스주의자들이 브라질의 안정에 위협이 되므로, 우리는 이념적 동조자들과 접촉해야 합니다. 통합주의자 파벌은 바르가스의 낙원을 더욱 건설하는 데 필요한 군국주의-민족주의적 감성을 가져다줄 것입니다."
 BRA_establish:0 "TSN 설립"
 HUN_GER_subject:0 "헝가리 왕국"
 ROM_GER_subject:0 "루마니아 왕국"
 POL_ENG_subject:0 "폴란드"
 GRE_ENG_subject:0 "자유 그리스"
 BUL_GER_subject:0 "불가리아 왕국"
 YUG_ITA_subject:0 "크로아티아 독립국"
 SER_GER_subject:0 "세르비아 왕국"
 CZE_GER_subject:0 "슬로바키아"
 
 BRA_establish_desc:0 "국가안전보장재판소(Tribunal de Segurança Nacional)를 설립해야 합니다. 공산주의자 봉기 이후 기소해야 할 '공산주의자'들이 넘쳐납니다. 최고군사법원에서 이 문제를 처리하게 하고 싶었지만, 너무 오래 걸릴 것입니다. 그래서 최고군사법원 산하에 더 신속하게 운영될 수 있는 기관을 설립하는 것입니다."
 BRA_general:0 "주앙 바프치스타 마스카레냐스 지 모라이스 진급"
 BRA_general_desc:0 "마스카레냐스 지 모라이스는 바르가스의 새로운 정권에 충성스러운 장교임을 증명했습니다. 실패한 쿠데타 당시 공산주의자들과 싸운 그의 활약은 그가 진압에 참여했던 다른 모든 쿠데타에 더해 리우 내에서 어느 정도 명성을 얻게 했습니다. 우리는 그에게 경력을 더욱 발전시킬 기회를 주어야 합니다. 그는 잠재력이 많습니다."
 BRA_estadonovo2:0 "에스타두 노부"
 BRA_estadonovo2_desc:0 "새로운 국가가 탄생했습니다. 제3 브라질 공화국은 현실이 되었습니다. 당신은 이 새로운 국가가 얼마나 급진적으로 개혁될지 선택했습니다. 우리의 위대한 지도자 바르가스는 산업, 교육, 그리고 국가의 전반적인 발전에 관한 놀라운 계획을 세웠습니다. 새로운 여명이 밝았습니다. 이제 전투, 축제, 그리고 자부심의 시간입니다! 질서와 진보!"
 BRA_second:0 "브라질 합중국 공화국"
 BRA_usa:0 "미국산 철강 수입"
 BRA_usa_desc:0 "미국 산업은 현재 폭발적으로 성장하고 있습니다. 새로운 브라질군이 현대적인 방식을 추구하려면 많은 철강이 필요할 것입니다. 브라질의 산업화는 아직 발전 중입니다. 그러나 우리의 지리적으로 당연한 동맹이자 아메리카 대륙의 최대 강국인 미국은 무한한 양의 철강을 판매하고 있습니다. 우리는 철강 공급을 확보하기 위해 그 철강 중 일부를 반드시 수입해야 합니다."
 BRA_milpolice:0 "군사경찰"
 BRA_milpolice_desc:0 "바르가스 정권 이전, 군사경찰은 국가에 위협이었습니다. 여러 자치주의 주지사들은 각 주의 군사경찰을 사병으로 이용하고 있었습니다. 1932년 권력 중앙화 과정에서 연방군은 이 군사경찰 부서들이 브라질의 여러 주가 아닌, 리우에 다시 충성하도록 만들었습니다. 이제 우리는 이들을 현대화해야 합니다."
 BRA_wagon:0 "카니발용 퍼레이드 차량"
 BRA_wagon_desc:0 "카니발은 화려하게 장식된 차량을 광범위하게 사용하는 것으로 잘 알려져 있습니다. 이제부터 국가는 이러한 '장식된' 차량을 만드는 데에도 집중할 것이며, 이 차량들은 기존의 퍼레이드 차량보다 약간 더 '실용성'을 갖추게 될 것입니다."
 BRA_copacabana:0 "코파카바나의 불꽃놀이"
 BRA_copacabana_desc:0 "리우데자네이루의 코파카바나는 세계에서 가장 유명한 해변일 것입니다. 구세주 그리스도상이 방문객들을 내려다보는 아름다운 도시 만에 위치한 이곳은 진정으로 멋진 광경입니다. 곧, 불꽃놀이는 관광객과 브라질인들이 이 해변에서 목격할 수 있는 유일한 불빛 쇼가 아닐 것입니다. 우리 카튜샤의 인근 전투 훈련은 해변에서 놀라운 '불타는' 광경을 연출할 것입니다."
 BRA_authority:0 "사기업에 대한 권한"
 BRA_authority_desc:0 "기업의 민영화는 실수였습니다. 우리나라는 준국가계획경제로부터 더 많은 이익을 얻을 것입니다. 우리는 해당 기업들의 수익에서 더 큰 부분을 얻어 공동 프로젝트에 투자할 것입니다. 이제 우리는 공급 부족으로 인해 일부 기업이 얻는 이익을 줄이기 위해, 공급이 부족한 분야의 기업에 생산량 증가를 요구할 능력도 갖게 되었습니다."
 BRA_coronelismo:0 "코로넬리즈무로부터의 해방"
 BRA_coronelismo_desc:0 "코로넬리즈무, 즉 대령들의 통치는 사라져야 합니다. 종종 커피를 생산하는 이 지역 과두정치 세력들은 농촌 지역에서 너무 많은 권력을 가지고 있습니다. 그들은 도시의 경제 발전을 저해합니다. 경제 중심은 도시로 이동해야 합니다. 우리는 그들을 제거해야 하지만, 동시에 지역의 농산물 수출 이익도 보호할 것입니다. 충성 아니면 죽음뿐입니다."
 BRA_snake1:0 "브라질 원정군"
 BRA_snake1extra:0 "브라질 원정군"
 BRA_snake1_desc:0 "우리의 군사적 노력이 마침내 결실을 보기 시작했습니다. 이 혼란스러운 시기에, 젊고 활기찬 상당한 규모의 브라질군은 필요한 곳 어디든 타격할 준비가 되어 있습니다. 브라질은 이제 막강한 군사력을 보유하게 되었습니다. 우리는 가능한 모든 곳에서 우리의 힘을 과시하고, 추축군을 섬멸하며, 세계 평화에 크게 기여해야 합니다. 우리의 적들에게 분노한 브라질인의 분노를 맛보게 합시다!"
 BRA_snake1extra_desc:0 "우리의 군사적 노력이 마침내 결실을 보기 시작했습니다. 이 혼란스러운 시기에, 젊고 활기찬 상당한 규모의 브라질군은 필요한 곳 어디든 타격할 준비가 되어 있습니다. 브라질은 이제 막강한 군사력을 보유하게 되었습니다. 우리는 가능한 모든 곳에서 우리의 힘을 과시하고, 추축군을 섬멸하며, 세계 평화에 크게 기여해야 합니다. 우리의 적들에게 분노한 브라질인의 분노를 맛보게 합시다!"
 BRA_nav2:0 "미나스제라이스 개장"
 BRA_nav2_desc:0 "한때 미나스제라이스는 세계의 부러움을 샀던, 세계의 다른 어떤 함선도 따라올 수 없는 규모의 일제 사격을 가할 수 있는 드레드노트급 전함이었습니다. 이 함선은 여전히 매우 명망 높으며 브라질은 이를 매우 자랑스러워합니다. 그렇기에 이 함선은 제2의 삶을 살아야 합니다. 현대 해전의 관점에서 이 함선은 수명이 다해가고 있습니다. 항구로 돌려보내 대대적으로 개장하는 것은 멋진 일일 것입니다. 그 악명은 계속될 것입니다."
 BRA_disband:0 "모든 정당 해산"
 BRA_disband_desc:0 "정당은 브라질 국민에게 위협입니다. 그들은 국가를 불안정하게 만들기 위해 우리의 내부 정책에 간섭하려 할 뿐입니다. 파시스트부터 공산주의자까지, 모두 리우에 복종할 것입니다. 조합주의가 새로운 규범이 될 것입니다. 더 이상의 정치적 대의는 없으며, 오직 직업적 대의만이 존재할 것입니다."
 BRA_latifundios:0 "라티푼디움에 대한 양보"
 BRA_latifundios_desc:0 "대지주, 즉 라티푼디움은 항상 우리나라에 상당한 영향력을 행사해왔습니다. 우리가 그들에게 자치권을 주면, 그들은 비교적 버려진 지역을 안정적으로 유지하고 경제적으로 중요하게 만듭니다. 바르가스가 권력을 유지하고 모든 공산주의자를 제거하기 위해, 그들과 그들의 통합주의 지지자들과 '거래'를 하는 것은 터무니없는 생각이 아닙니다."
 BRA_cometobrazil:0 "브라질로 오세요!"
 BRA_cometobrazil_desc:0 "브라질은 지구상에서 가장 아름다운 나라입니다. 눈이 닿는 곳까지 아름다운 자연으로 뒤덮여 있습니다. 문화적으로는 식민지 시대의 과거 덕분에 서구와 상당히 가깝습니다. 예를 들어, 우리는 익숙한 언어를 사용합니다. 우리 해안선은 세계에서 가장 현대적인 지역 중 하나입니다! 가장 중요한 것은, 서구의 고향에서 멀리 떨어져 있다는 점입니다. 잠시 휴식을 취하기에 완벽한 장소입니다. 당신은 브라질로 가게 될 것입니다!"
 BRA_martial:0 "§R계엄령§을 선포하라!"
 BRA_martial_desc:0 "우리나라는 폐허가 되었습니다. 부패는 일상이 되었고, 더는 어떤 것도 효율적으로 작동하지 않습니다. 이 상황을 계속 방치한다면, 브라질은 시대에 뒤떨어지게 될 것입니다. 바르가스는 완전한 권력을 장악하고 필요한 곳에 계엄령을 시행해야 합니다. 그것만이 우리나라를 다시 궤도에 올려놓을 유일한 방법입니다."
 BRA_blackmail:0 "영국 협박"
 BRA_blackmail_desc:0 "이념적 유사성 때문에, 우리는 추축국과 상당한 양의 무역을 유지해왔습니다. 이제 세계 긴장이 고조되자, 연합국은 우리가 이들 국가와의 무역을 줄일 것을 요구합니다. 사실, 우리는 추축국에 가담하겠다고 위협해야 합니다. 만약 영국이 우리가 추축국에 가담하지 않고 그들과의 무역을 줄이기를 원한다면, 우리는 은근하고 교묘한 협박을 통해 상당한 양의 보조금을 요구할 수 있습니다."
 BRA_goodneighbor:0 "선린 정책"
 BRA_goodneighbor_desc:0 "미국은 라틴 아메리카 국가들과 좋은 관계를 맺으려 하고 있습니다. 이 지역에서 경제적으로 가장 큰 나라인 브라질은 이 선린 정책에서 근본적인 역할을 합니다. 양국 간의 협력이 증진된다면 양측 모두 엄청난 이익을 얻을 것입니다. 서구에서 유명한 무용수인 카르멘 미란다가 우리의 상징적인 사절이 될 것입니다. 그녀는 포르투갈에서 태어나 브라질에서 자랐습니다!"
 BRA_nav1:0 "늑대 사냥"
 BRA_nav1_desc:0 "유럽 내 긴장이 고조되고 있으며, 필연적으로 군수품 혁신도 마찬가지입니다. 해전도 포함됩니다. 새로운 유형의 함선인 잠수함이 세계 무대에 본격적으로 등장하고 있습니다. 이 함선들은 유럽 및 나머지 아메리카 대륙과의 무역에 위협이 될 수 있습니다. 우리는 이 잠수함과의 전투에 막대한 투자를 해야 합니다. 우리 해군은 어떤 대가를 치르더라도 무역을 보호해야 합니다. "
 BRA_amazons:0 "아마존의 고향"
 BRA_amazons_desc:0 "1542년, 스페인의 연대기 작가인 가스파르 데 카르바할은 한 부족을 만났는데, 그는 이들이 호메로스와 헤로도토스의 이야기에 나오는 진짜 아마존이라고 믿었습니다. 그는 그들을 다음과 같이 묘사했습니다: '매우 희고 키가 크며, 아주 긴 머리를 땋아 머리에 감고 있다. 그들은 매우 강건하며, 사적인 부위만 가린 채 벌거벗고 활과 화살을 손에 들고 있으며, 인디언 남자 10명만큼이나 싸움을 잘한다.'"
 BRA_centralize:0 "리우로 권력 중앙 집중"
 BRA_centralize_desc:0 "지역 과두 세력과 싸우고 농촌 지역에 대한 권력을 유지하기 위해, 우리는 확고한 중앙 집권화 노력을 시작하는 것이 절대적으로 필요합니다. 우리는 주요 부패에 뚫리지 않는 효율적인 관료 체제를 구축할 것이며, 이는 중앙 지휘권과 바르가스의 권력을 증대시킬 것입니다. 리우를 주요 무역 중심지로 만들고 중앙 집권화를 통해, 우리는 모든 종류의 필요한 산업을 유치할 것입니다. 리우데자네이루는 거대 도시가 될 것입니다! "
 BRA_dops:0 "정치사회질서부"
 BRA_dops_desc:0 "정치사회질서부는 브라질 국가의 안정과 번영을 보장하기 위한 우리의 싸움에서 경찰의 힘을 크게 강화할 것입니다. DOPS는 국가 내의 모든 '불안정 요소'를 제거하는 데 도움이 될 강력한 정치 경찰이자 비밀 기관이 될 것입니다. 때로는 지루하고 긴 재판 없이 누군가를 그냥 사라지게 하는 것이 더 나을 때도 있습니다."
 BRA_tradeunion:0 "§G노동조합을 통제하라§!"
 BRA_tradeunion_desc:0 "이제 대공황이 끝나가면서, 노동조합의 영향력은 점점 약해지고 있습니다. 그들은 파업을 통해 많은 불안정과 그로 인한 부패를 야기했습니다. 노동조합을 통제할 때가 가까워졌습니다. 그들의 활동은 우리가 필요로 하지 않는 너무 많은 불안정을 야기할 뿐입니다! 그들은 에스타두 노부에 어울리지 않습니다."
 BRA_tsn:0 "§O자율적인 TSN§!"
 BRA_tsn_desc:0 "국가안보재판소는 국가에 불안정을 가져오는 자들, 주로 공산주의자들과 정치적 반대자들을 심판하기 위해 이미 설립되었습니다. 소송이 충분히 빠르게 진행되지 않고, 끝없는 법적 절차가 일반적입니다. 우리에게는 급진적인 개혁의 여지가 있습니다. 항소를 제기하는 것을 불가능하게 만들어야 합니다. 우리는 TSN을 나머지 법률 체계에서 해방시켜야 합니다."
 BRA_constitution:0 "§H1937년 헌법§!"
 BRA_constitution_desc:0 "바르가스의 4년 대통령 임기가 거의 끝나가고 있습니다. 어쨌든 우리나라는 비교적 불안정한 상태에 있습니다. 자유 선거를 조직한다면 부패가 우리나라를 무너뜨릴 것입니다. 우리의 코언 계획으로 급진적인 개혁을 통과시킬 때입니다. 새로운 헌법이 제도화될 것입니다. 바르가스는 권력을 유지할 것입니다. 공산주의자들이 그 대가를 치르게 될 것입니다."
 BRA_surdo:0 "새로운 수르두"
 BRA_surdo_desc:0 "수르두는 전통적인 브라질의 베이스 드럼입니다. 카니발에 '느낌'과 폭발음을 주기 위해 고안된 강력한 악기입니다. 곧, 이 수르두뿐만 아니라 우리가 새로 설계한 포들이 브라질의 거리를 떨게 할 것입니다. 우리의 새로운 포들이 도시 전체를 뒤흔들 것입니다. 이 영광스러운 폭발음은 브라질에 위신을 가져다줄 것입니다!"
 BRA_prestes:0 "프레스치스의 추종자들"
 BRA_prestes_desc:0 "유럽에서 훈련받은 젊은 장교들인 테넨치스는 군대 내에서 상당한 영향력을 가지고 있으며, 자신들이 구세대보다 우월하다고 생각합니다. 그들은 급진적인 개혁을 갈망합니다. 그들의 전 지도자인 프레스치스는 심지어 공산주의자 봉기를 일으킨 공산주의자로 밝혀졌습니다! 우리는 군대 내의 전통적인 방식을 유지하고 공산주의자를 따랐던 이 모든 위험한 젊은 장교들을 숙청해야 합니다!"
 BRA_second_desc:0 "1930년 혁명으로 제1공화국은 막을 내렸습니다. 혼란스러운 탄생으로 인해, 제2공화국은 현재의 형태로 붕괴 직전에 있습니다. 이 부패와의 전쟁에서는 강력한 지도자가 필수적입니다. 누군가 브라질을 과감하게 개혁하지 않으면, 우리는 이 끊임없이 변화하는 세상에서 멸망할 것입니다."
 BRA_gunimport:0 "미국산 총기 수입"
 BRA_gunimport_desc:0 "상당한 규모의 군대를 갖추려면 병력이 필요합니다. 다행히 병력은 많습니다. 단기적으로 부족한 것은 총, 포탄, 포, 탄약뿐입니다. 다행히도, 근처에 산업 강국인 미합중국이 있습니다. 군사 정책에 관한 목표를 달성하려면, 엉클 샘에게서 총기를 일부 주문해야 합니다."
 BRA_snake2:0 "브라질 기갑대대"
 BRA_snake2extra:0 "브라질 기갑대대"
 BRA_snake2_desc:0 "우리의 군사적 노력이 마침내 결실을 맺기 시작했습니다. 이 혼란스러운 시기에, 젊고 활기찬 초현대적 브라질군은 필요한 곳이라면 어디든 타격할 준비가 되어 있습니다. 브라질은 거대한 군대가 필요하지 않으며, 아메리카 대륙에 직접적인 군사 위협은 없습니다. 대신 우리는 가끔 힘을 과시하고, 가능한 모든 곳에서 동맹을 도우며, 세계 평화에 기여해야 합니다. 적들에게 브라질의 진격하는 강철의 분노를 맛보게 하십시오!"
 BRA_alliedtrade:0 "연합국과의 무역 협정"
 BRA_alliedtrade_desc:0 "브라질은 지리적으로 연합국과의 무역에 엄청나게 의존하고 있습니다. 이념적으로 브라질은 추축국에 더 친숙하지만, 추축국에 너무 의존하게 되면 경제적으로 취약해질 것입니다. 그런 일이 일어나게 해서는 안 됩니다."
 BRA_axistrade_desc:0 "추축국, 특히 이탈리아는 브라질에 구현된 우리 자신의 이념과 이념적으로 매우 가깝습니다. 우리는 추축국과의 협력을 증진해야 합니다. 새로운 질서를 만드는 데 있어 우리 형제들을 실망시키지 않을 것입니다!"
 BRA_axistrade:0 "추축국과의 무역 협정"
 BRA_estadonovo:0 "바르가스 시대"
 BRA_estadonovo_desc:0 "우리의 위대한 지도자, 제툴리우 바르가스는 브라질 내의 점점 더 긴장되는 정치 상황을 처리하기 위해 더 큰 권한을 받아야 합니다. 새로운 브라질, 새로운 국가, '이스타두 노부'를 건설할 때입니다. 공산주의의 위협은 항상 존재합니다. 언제나."
 BRA_communist:0 "'공산주의 봉기'의 여파"
 BRA_communist_desc:0 "지난 11월, 프레스치스 휘하의 그 성가신 공산주의자들이 '공산주의 봉기'에서 쿠데타를 일으켜 권력을 장악하려 했습니다! 가소롭기 짝이 없습니다! 다행히도 끔찍하게 실패했습니다. 우리는 공산주의를 완전히 금지하고 숙청하기 시작해야 합니다. 이 문제에 대해 바르가스에게 더 많은 권한을 부여하는 것도 필요하며, 이는 국가의 안정에 크게 달려 있습니다."
 HOL_request_allied_favors2:0 "저항군의 은행가"
 HOL_request_allied_favors2_desc:0 "발라번 판 할은 진정한 영웅입니다. 그는 독일군과 협력함으로써 대규모 은행 사기를 저질러 본토의 저항군에게 자금을 조달할 수 있습니다. 이 전쟁에 그가 있다는 것에 정말 감사해야 합니다."
 HOL_devour_desc:0 "우리는 일본과 역사가 있으며, 항상 폐하와 우호적인 관계를 유지했고 데지마 섬에서 수년간 그들과 교역했습니다. 이제 그들이 우리에게 등을 돌렸으니, 우리는 그들의 약점을 압니다. 네덜란드의 사자가 떠오르는 태양을 삼킬 것입니다. 이는 필연적입니다."
 HOL_empire_desc:0 "우리 제국이 여전히 존재하는 유일한 이유는 우리의 뛰어난 해상 지위 때문입니다. 식민지와 세계 무대에서의 탁월한 지위를 유지하려면 함대를 잘 유지하고 해군에 더 많이 투자해야 합니다."
 HOL_doorman:0 "도르만의 견해"
 HOL_suriname:0 "수리남 개발" 
 HOL_propaganda:0 "§O네덜란드 전쟁 선전 활동을 활성화합니다.§!"
 NED:0 "네덜란드 왕국"
 HOL_curacao:0 "퀴라소 개발"
 HOL_invest:0 "서인도에 투자"
 HOL_the_east_indies_war_machine2:0 "네덜란드령 동인도 전투"
 HOL_the_east_indies_war_machine2_desc:0 "때가 왔습니다. 우리는 마지막 한 사람까지 우리의 두 번째 고향을 지켜야 합니다. 여왕께서 우리 모두를 지켜주시고 일본군을 몰아내시길. 도르만은 우리의 상당한 함대로 가장 큰 도시들을 보호할 것입니다. 하지만 이 거대한 땅을 방어하기 위해서는 더 많은 장비가 필요할 것입니다."
 HOL_doorman_desc:0 "우리는 카렐 도르만 제독의 해군 접근법을 따라야 합니다. 함대는 우리 제국의 중추이며, 대양 함대만이 우리의 중추를 튼튼하게 유지할 것입니다. 다시 한번 일어나라 네덜란드 해군이여, 날개를 펴고 어떤 대가를 치르더라도 제국을 유지하라!"
 HOL_helfrich_desc:0 "'작고, 저렴하지만, 매우 효과적인' 이것이 콘라트 헬프리히 제독의 접근법입니다. 잠수함은 우리 제국을 안전하게 지킬 수 있는 저렴한 방법을 제공할 것입니다. 네덜란드 해군은 거포를 중시한 적이 거의 없었으며, 그 접근법은 종종 영리하고 효과적인 해군이었습니다. 그 길을 계속 갑시다."
 HOL_helfrich:0 "헬프리히의 견해"
 HOL_dewitt:0 "드 비트의 접근법"
 HOL_dewitt_desc:0 "요한 드 비트는 공화국의 경제적, 문화적 절정기에 통치했으며, 해군을 우선시하여 증가하고 더 보호받는 무역으로 막대한 번영을 가져왔습니다. 그의 함대는 상당한 기간 동안 국가와 그 부, 그리고 풍부한 문화를 지켜냈습니다. 그때는 잉글랜드가 우리의 주권과 무역을 위협했지만, 지금은 일본, 이탈리아, 독일이 그러합니다. 그들에게 우리 해군의 유산을 맛보게 합시다..."
 HOL_ship_a_day_sinking_quotas2:0 "마우리츠의 접근법"
 HOL_ship_a_day_sinking_quotas2_desc:0 "오라녜 가문의 일원인 마우리츠는 꽤 오랜 기간 동안 우리나라를 (공동) 통치했습니다. 그의 말에 따르면, 유럽 본토에 확고한 발판을 마련하기 위해 육군을 우선시하는 것이 시급했습니다. 해군은 효과적이어야 하지만, 규모가 크거나 비용이 많이 들어서는 안 됩니다. 육지의 괴물을 막아야 하는 우리에게는 이것이 올바른 접근법으로 보입니다."
 HOL_fokker2:0 "포커 우선"
 HOL_fokker2_desc:0 "지금이야말로 포커가 가장 필요한 때입니다. 그들의 항공기 없이는 이 전쟁에서 이길 가능성이 없습니다. 우리의 전쟁 기계를 구축하는 데 도움을 주기 위해 포커에 막대한 보조금을 일시적으로 지급해야 합니다. 우리에게 다른 선택지는 없습니다."
 HOL_eendracht:0 "단결로 작은 것들이 자라나니"
 HOL_eendracht_desc:0 "단결은 힘을 만듭니다. 더 라위터르 제독은 이 보편적인 진리의 가장 좋은 예일 것입니다. 1665년, 우리가 막강한 왕립 해군과 전쟁을 벌이고 있을 때, 그는 내부 갈등 없이 그를 지지하는 단호한 국가 덕분에 놀라운 일들을 해낼 수 있었습니다. 그는 바랄 수 있는 모든 필요를 갖추고 있었고, 이는 왕립 해군의 섬멸이라는 결과를 낳았습니다."
 HOL_shell:0 "로열 더치 셸"
 HOL_shell_desc:0 "셸은 우리나라의 가장 큰 국영 기업 중 하나이자 세계에서 가장 큰 석유 회사 중 하나입니다. 석유 수요가 하늘 높은 줄 모르고 치솟고 있으며, 이는 셸과 국가에 막대한 이익을 가져다줄 것입니다. 셸은 매우 유망하며 앞으로 큰 미래가 펼쳐져 있습니다."
 HOL_hoogoven:0 "에이마위던 왕립 용광로"
 HOL_hoogoven_desc:0 "우리의 산업적 자부심, 에이마위던 왕립 용광로입니다. 이곳은 유럽 최대의 제철소 중 하나이며 정부에 매우 중요합니다. 우리가 처한 이 경제적 지옥에서 더 많은 고용을 창출하기 위해 제철소를 확장해야 합니다. 제철소를 계속 확장하고 활성화한다면, 수십 년간 지속되며 국가의 자부심이 될 것입니다."
 HOL_NS:0 "네덜란드 철도"
 HOL_NS_idea:0 "네덜란트서 스포르베헌"
 railway_company2:0 "철도 회사"
 FIN_salla:0 "살라를 해방하라!"
 FIN_salla_desc:0 "살라의 핀란드인들은 소비에트 점령에서 해방될 것입니다!"
 FIN_karelia:0 "카리알라를 해방하라!"
 FIN_karelia_desc:0 "카리알라의 핀란드인들은 소비에트 점령에서 해방될 것입니다!"
 HOL_NS_desc:0 "국가의 철도 회사들을 하나의 명확한 회사, 네덜란드 철도로 통합해야 합니다. 우리는 활성화되는 경제의 생산량을 늘리기 위해 더 많은 고용을 창출하고자 철도망을 확장할 것입니다. 그리고 이 국영 회사를 잘 조직한다면, 앞으로 수십 년간 네덜란드 국민에게 이익이 될 것입니다. 모든 사람이 우리의 정교하고 잘 조직된 철도망을 이용할 수 있게 될 것입니다."
 #ENG_dresden_idea_desc:0 ""
 ITA_messe_desc:0 "에티오피아에서 돌아온 메세는 대대적인 군 개혁을 주장했습니다. 그가 계획을 실행에 옮길 공간을 줍시다. 첫 번째 개혁은 차량화입니다. 우리 군은 여전히 기병에 크게 의존하고 있으며, 기병은 빠르게 구식이 되어가고 있습니다."
 ITA_messe:0 "메세의 군 개혁"
 ITA_naval_air_effort2:0 "사보이아-마르케티 폭격기"
 ITA_naval_air_effort2_desc:0 "해군 폭격기는 해전의 필수적인 부분이 되었습니다. 지중해에서 영국의 힘에 맞서려면, 이 폭격기들이 필요합니다."
 ITA_fascismo:0 "파시스트 이념을 위하여"
 ITA_fascismo_desc:0 "우리는 결코 이 민주주의자들에게 이탈리아를 내주지 않을 것입니다, 파시스트 이념을 위하여! (파시스트 이념을 위하여!)"
 ITA_liberatori:0 "여기 '해방자'들이 있다"
 ITA_italian_highways2:0 "적어도 기차는 제시간에 다니게 됐지!"
 ITA_italian_highways2_desc:0 "무솔리니가 직접 열차 운행 일정을 관리할 것입니다! 파시즘이 모든 것의 해결책은 아닐지 몰라도, 일은 확실히 처리합니다! 기차를 제시간에 달리게 하는 것처럼 말이죠, 훌륭합니다!"
 ITA_liberatori_desc:0 "이제 우리가 제4의 해안을 잃었으니, 연합군의 주된 목표는 이탈리아 본토를 향하게 되었습니다. 앞으로 이탈리아 영토에 대한 폭격은 더 잦아질 것입니다. 우리는 스스로를 '해방자'라 칭하는 자들의 공습에 맞서 싸워야 합니다."
 ITA_bomber_effort2:0 "필리포 차파타 폭격기"
 ITA_bomber_effort2_desc:0 "연합군의 산업력에 맞서기 위해, 우리는 그들의 산업적 우위를 최대한 방해할 폭격기가 필요합니다."
 ITA_jet_engine_effort2_desc:0 "전시에는 군사 개발이 과열되고, 차세대 항공기가 등장했습니다."
 ITA_africa_campaign1:0 "Britannia Annhilianda"
 ITA_africa_campaign3:0 "Le Vedova di Italia"
 ITA_africa_campaign3_desc:0 "우리는 조국의 젊은이들의 피로 얼룩진 이 저주받은 전쟁에서 파시스트의 이상을 위해 오랫동안 싸워왔습니다. 우리가 그토록 많은 피를 흘린 땅을 연합군이 되찾게 할 수 없습니다. 만약 우리의 땅을 잃는다면, 남편이 저지른 이념적 희생에서 평화를 찾으며 눈물을 참아온 이탈리아의 모든 미망인들에게 설명할 길이 없을 것입니다..."
 ITA_jet_engine_effort2:0 "레지아네 제트기"
 ITA_defense_italia_desc:0 "전쟁이 반드시 이탈리아에 유리하게 돌아가는 것은 아니지만, 아직 전세를 뒤집을 시간은 있습니다. 포르테차 이탈리아가 여기 있습니다! 하지만 이 계획이 성공하려면, 우리의 영공을 최대한 잘 방어해야 합니다."
 ITA_africa_campaign1_desc:0 "우리는 다시 한번 이집트의 비옥한 땅으로 진군합니다. 이번에는 정복되기를 기다리는 이집트의 케메트인이 아닙니다. 이번에는 로마 제국을 능가하는 규모의 훨씬 더 거대한 적, 바로 대영제국입니다. 영국은 반드시 파괴되어야 합니다. 브리타니아 안니힐란다."
 ITA_africa_campaign2:0 "Mare Nostrum"
 ITA_africa_campaign2_desc:0 "Novum nostrum Imperium Romanum nunc capiendum est, Imperator vivat, super nos regnet et regnent naves nostra nostra maria! (우리의 새로운 로마 제국은 지금 당장 쟁취해야 하며, 황제 폐하 만세, 황제께서 우리를 통치하시고 우리의 함선이 우리의 바다를 지배하리라!)"
 ITA_steal_canada_mech_manufacturing_plan:0 "캐나다 기계화 설계도 탈취"
 ITA_steal_canada_mech_manufacturing_plan_desc:0 "캐나다인들이 더 저렴하면서도 성능이 동일한 기계화 설계도를 보유하고 있다는 정보를 입수했습니다. 우리는 공식적인 임무 외에 다른 '부수적인' 활동을 할 '대사'를 보내야 합니다."
 ITA_learn_germany:0 "판처에게서 배우기"
 ITA_learn_germany_desc:0 "우리의 전차와 기갑 전술은 세계 최고가 아니며, 이는 에티오피아 전쟁 중에 깨달았습니다. 하지만 독일의 전차와 기갑 전술은 단연코 세계에서 가장 혁신적입니다. 아마도 독일 전문가 몇몇이 베를린에서 로마로 날아와 우리를 도울 수 있을 것입니다... "
 ITA_modernized_artillery_at2:0 "Cannone da 47/32"
 ITA_modernized_artillery_at2_desc:0 "우리의 대전차 모델은 구식이며 현대 기갑에 대항하기에 충분하지 않을 것입니다."
 ITA_Expand_Roma:0 "로마 확장"
 ITA_Expand_Roma_desc:0 "두체께서는 지난 몇 년간 여러 측면에서 우리의 수도를 크게 개선하셨습니다. 로마는 우리나라의 자부심이자 수도이며, 곧 주요 산업 강국 중 하나가 될 것입니다!"
 ITA_armored_effort2:0 "이탈리아 기갑"
 ITA_armored_effort2_desc:0 "에티오피아에서 메세는 기갑이 지상전의 미래가 될 것이라는 것을 배웠습니다. 우리의 가장 저명한 장군의 말에 귀를 기울입시다."
 ITA_Littorio_Classe:0 "Classe Littorio"
 ITA_Littorio_Classe_desc:0 "리토리오급은 릭토르의 이름을 따서 명명되었습니다. 릭토르는 로마 제국에서 고위 행정관을 호위하는 임무를 맡은 고위 하인이었고, 따라서 국가의 수호자였습니다. RN 리토리오, RN 비토리오 베네토, RN 로마, RN 임페로는 거의 완성되었으며, 이들 또한 국가의 수호자가 될 것입니다. 이 아름다운 함선들은 임페라토레스 마리움(바다의 사령관/황제)이 될 것입니다."
 ITA_Aquila_Classe:0 "Classe Aquila"
 ITA_Aquila_Classe_desc:0 "아퀼라(독수리)는 수천 년 동안 로마의 상징이었습니다. 이 아퀼라 항공모함은 아퀼라가 로마를 지켰던 것처럼 우리의 바다를 잘 지켜낼 것입니다."
 ITA_blow_away:0 "초토화"
 ITA_blow_away_desc:0 "현대 군대에서 포병의 중요성이 점점 더 커지고 있습니다. 우리의 포병을 현대화하고 포격 전술을 개발하는 것은 현명한 조치가 될 것입니다."
 ITA_WW1_strategy:0 "제1차 세계대전 전술 기반 구축"
 ITA_WW1_strategy_desc:0 "제1차 세계대전의 오스트리아-헝가리 전선은 가장 유연한 전선은 아니었지만, 적어도 안정적이었습니다. 만약 우리가 이 제1차 세계대전 전술을 좀 더 발전시킨다면, 이탈리아 측 전선이 붕괴되지 않도록 할 수 있을 것이며, 아마도 미래의 전선에서 몇 미터라도 밀고 나갈 여지가 생길지도 모릅니다."
 ITA_equipment_modernization:0 "MAB-38"
 ITA_equipment_modernization_desc:0 "모스케토 아우토마티코 베레타 모델로 1938은 우리의 군수 제조업체들이 개발한 새롭게 설계된 강력한 총입니다. 총은 병사의 여섯 번째 감각입니다. 만약 우리의 여섯 번째 감각이 적의 것보다 뛰어나다면, 우리는 전장에서 큰 이점을 갖게 될 것입니다."
 ITA_modernized_artillery2:0 "Cannone da 149/40 Modello 35"
 ITA_modernized_artillery2_desc:0 "새로운 칸노네 다 149/40 모델로 35는 이탈리아군의 핵심이 되어 적의 심장에 공포를 심어줄 것입니다."
 ITA_cheap_artillery:0 "브레다 사의 국가 할인"
 ITA_cheap_artillery_desc:0 "우리의 포병 설계사인 브레다 사가 '자발적으로' 생산 할인을 제공했습니다. 참으로 편리하군요!"
 ITA_strong_artillery:0 "정교한 강철 제련"
 ITA_strong_artillery_desc:0 "새로운 강철 제련법을 발견하여, 고정밀 포를 제작할 수 있게 되었습니다. 이는 전투에서 우리에게 큰 도움이 될 것입니다."
 ITA_cheap_equipment:0 "대량 배치"
 ITA_cheap_equipment_desc:0 "총기 설계를 약간 변경함으로써, 더 빠르고 효율적으로 총을 생산할 수 있습니다. 사고가 더 자주 일어날 수도 있지만, 병사들에게는 말하지 않을 것입니다."
 ITA_superior_tactics:0 "진보된 제1차 세계대전 전술 개발"
 ITA_superior_tactics_desc:0 "우리는 오랫동안 제1차 세계대전 전술을 연구해왔으며, 현대전에서 사용할 수 있는 수준으로 개선했습니다."
 ITA_special_forcess:0 "아르디티에게서 배우다"
 ITA_special_forcess_desc:0 "아르디티(대담한 자들)는 제1차 세계대전 당시 두려움의 대상이었던 이탈리아 정예 특수부대였습니다. 그들은 전장에서 극도의 인내력을 보여주었고 국가의 자랑이었습니다. 그들의 전술을 채택하고 개선하여, 우리의 현대 특수부대가 그것을 배우고 더 나아질 수 있도록 합시다."
 ITA_commence_mare:0 "마레 노스트룸 개시"
 ITA_commence_mare_desc:0 "우리는 지중해의 모든 섬을 정복하기 위한 원대한 계획을 세웠습니다. 이것이 마레 노스트룸을 향한 첫걸음입니다!"
 ITA_arditi:0 "아르디티의 재창설"
 ITA_arditi_desc:0 "이탈리아에서 가장 두려운 지상군을 부활시킬 때가 왔습니다. 아르디티는 그들의 상징이 암시하고 과거의 업적이 증명했듯이, 이 암흑의 시대에 번성할 것입니다. 그들의 승리를 위해 기도합시다..."
 ITA_improved_infantry_weapons:0 "MAB-38"
 ITA_soldati_classe:0 "카미치아 네라급"
 ITA_soldati_classe_desc:0 "솔다티급은 이탈리아의 준군사조직인 검은 셔츠단, 즉 카미치아 네라의 이름을 딴 카미치아 네라급으로 더 잘 알려져 있습니다. 1922년 로마 진군 때와 마찬가지로, 카미치아 네라는 위협적인 대중이 될 것이지만, 이번에는 치열한 해전 속에서 그럴 것입니다."
 ITA_condottieri_classe:0 "콘도티에리급"
 ITA_condottieri_classe_desc:0 "콘도티에리는 수 세기 전 이 나라에 있었던 수많은 용병 군대의 대장이었습니다. 콘도티에리는 장군과 병사 사이의 다리 역할을 했습니다. 우리의 순양함은 해상 전장에서 바로 이와 같은 역할을 맡게 될 것입니다."
 ITA_regia_marina:0 "칸티에리 루이니티 델'아드리아티코"
 ITA_regia_marina_desc:0 "칸티에리 루이니티 델'아드리아티코는 부활한 파시스트 레지아 마리나를 위한 우리의 왕립 해군 제조업체가 될 것입니다. 이 회사는 우리 지중해의 척추가 될 것입니다!"
 ITA_yamato:0 "캄피오니의 일본 파견 임무"
 ITA_yamato_desc:0 "일본은 인류가 본 것 중 가장 위대한 전함을 건조했습니다. 우리는 해상 기술 교류를 위해 캄피오니를 야마모토에게 보내야 합니다. 레지아 마리나가 일본처럼 효율적으로 전함을 건조하는 법을 배우는 것은 필수적이며, 우리의 생존이 여기에 달려 있습니다..."
 ITA_Rule_Supreme:0 "브리타니아 카이데투르"
 ITA_Rule_Supreme_desc:0 "왕립 해군이라고요? 요즘 어린애들을 위한 동화일 뿐입니다. 브리타니아 카이데투르! (브리튼은 도살될 것이다!)"
 ITA_san_marco_brigade:0 "산 마르코 해병 여단"
 ITA_san_marco_brigade_desc:0 "1550년에 창설된 산 마르코 여단은 세계에서 가장 오래된 해병대 중 하나입니다. 오랜 전통과 현대화가 결합하여 세계에서 가장 두려운 특수부대 중 하나가 될 것입니다."
 ITA_marconi_classe:0 "마르코니급"
 ITA_marconi_classe_desc:0 "굴리엘모 마르코니는 위대한 이탈리아 과학자였습니다. 그는 라디오를 이 세상에 가져온 사람입니다. 혁명적이죠! 그의 잘 알려진 발명품은 우리의 새로운 치명적인 잠수함 함대가 호송선단 습격 작전을 수행하는 데 분명히 도움이 될 것입니다."
 ITA_Challenge_The_Royal_Navy:0 "이탈리아 대 브리타니아"
 ITA_Challenge_The_Royal_Navy_desc:0 "우리 조국의 수호자인 이탈리아 투리타가 지중해 문제를 완전히 해결하기 위해 브리타니아 여사에게 도전했습니다. 따라서 이탈리아의 공동 대의를 완수하기 위해 우리의 지원과 맹렬함, 그리고 충성이 필요합니다."
 Roman_Empire_fascism:0 "Novum Imperium Romanum"
 Roman_Empire_fascism_DEF:0 "Novum Imperium Romanum"
 ITA_form_rome:0 "Reformate Imperium Romanum"
 Imperator_Romanorum:0 "Imperator Romanorum"
 ITA_annex_syria:0 "시리아 합병"
 ITA_Italian_Development:0 "이탈리아에 집중"
 ITA_Italian_Development_desc:0 "식민지를 갖는 것도 좋지만, 이탈리아는 우리 제국의 근간입니다. 우리의 본거지를 더욱 발전시킵시다."
 ITA_National_Projects:0 "국가 사업"
 ITA_National_Projects_desc:0 "신고전주의 양식의 새로운 국가 건설 사업은 옛 이탈리아의 건축 정신을 되살렸습니다. 건설하라! 건설하라! 건설하라!"
 ENG_tfv:0 "승리를 위하여 함께!"
 ENG_tfv_desc:0 "우리가 함께 땀과 피를 흘려야만 저 독일 놈들을 물리칠 수 있습니다."
 ENG_dresden:0 "지역 폭격"
 ENG_dresden_desc:0 "'만약 러시아가 지상에서 독일을 막아낼 수 있다면, 나는 독일이 12개월에서 18개월간 이어지는, 더욱 강화되고 증가하는 폭격을 견뎌낼 수 있을지 의문입니다. 이는 필연적으로 독일의 전쟁 생산, 저항 능력, 산업, 그리고 저항 의지(즉, 사기)에 영향을 미칠 것입니다.' -존 에드워드 싱글턴 경"
 CRO_ivan_orsanic:0 "이반 오르샤니치"
 CRO_milan_budak:0 "밀란 부다크"
 CRO_vladimir_nazor:0 "블라디미르 나조르"
 CRO_bozidar_magovac:0 "보지다르 마고바츠"
 CRO_andrija_hebrang:0 "안드리야 헤브랑"
 CRO_august_kosutic:0 "아우구스트 코슈티치"
 CRO_mladen_lorkovic:0 "믈라덴 로르코비치"
 CRO_ante_vokic:0 "안테 보키치"
 CRO_vladko_macek:0 "블라드코 마체크"
 CRO_vjekoslav_vrancic:0 "브예코슬라브 브란치치"
 HOL_marines:0 "Korps Mariniers"
 HOL_marines_desc:0 "우리 해병대는 황금기였던 1665년에 창설되었습니다. 창설 직후, 그들은 메드웨이 강을 습격하여 유럽 전역에 악명을 떨쳤습니다. 그 공포를 추축국에게 다시 한번 보여줍시다."
 HOL_secret_staff_talks2:0 "베네룩스 통합 사령부"
 HOL_secret_staff_talks2_desc:0 "세계의 긴장이 무섭게 고조되고 있습니다. 계속해서 성장하는 추축국에 맞서기 위해 가장 가까운 동맹국인 벨기에, 룩셈부르크와의 긴밀한 군사 협력이 필수적일 것입니다."
 HOL_light_tanks_for_the_colonies2:0 "네덜란드식 전격전"
 HOL_light_tanks_for_the_colonies2_desc:0 "동쪽의 이웃, 독일인들은 기갑 기술을 지능적으로 사용하여 매우 무섭지만 현대적인 지상군을 개발했습니다. 우리는 그들을 좀 따라 해야 할지도 모릅니다, 게르만 형제니 뭐니 하는 그런 것들 말이죠. 오직 우리 자신의 강철 파도만이 그들의 것을 막을 수 있습니다. 기갑은 또한 동쪽 식민지의 광활한 영토에서도 매우 유용할 것입니다."
 HOL_lessons_from_the_low_countries2:0 "폴더 게릴라"
 HOL_lessons_from_the_low_countries2_desc:0 "우리의 수륙 양용 지형은 지난 수 세기 동안 저주이자 축복이었습니다. 때로는 바다 때문에 곤경에 처했고, 때로는 바다가 우리를 보호했습니다. 예를 들어, 워터라인은 여러 차례 우리를 보호했습니다. 지형에 대한 우리의 경험은 외세의 위협에 맞서 싸울 때 유리하게 작용할 것입니다."
 HOL_liberation2:0 "해방!"
 HOL_liberation2_desc:0 "신이시여 조국을 축복하소서."
 HOL_hussars:0 "왕립 후사르"
 HOL_hussars_desc:0 "후사르 보릴 연대는 세계 최고의 정예 후사르 부대 중 하나로 여겨져 왔습니다. 이 불확실한 시기에 우리는 잘 훈련된 정예 후사르가 그 어느 때보다 더 필요합니다."
 HOL_anti_tank_guns_for_the_continent2:0 "강철 파도를 막아라"
 HOL_anti_tank_guns_for_the_continent2_desc:0 "몇 달 안에 고도로 현대화된 기갑 부대를 창설할 수는 없을 것이며, 그 과정은 수년이 걸릴 것입니다. 우리에게는 그럴 시간이 없습니다. 제국이 동쪽 국경을 두드리고 있으므로, 우리는 대전차포에 투자해야 합니다. 저렴하고 효율적이며, 사용 가능하기까지 수년간의 추가 개발이 필요하지 않습니다."
 HOL_production_under_license2:0 "1770년대 무기 거래의 은혜를 되돌려받기"
 HOL_production_under_license2_desc:0 "미국 독립 전쟁 당시, 우리나라는 미국 반란군에게 군수물자를 제공하여 많은 도움을 주었습니다. 이제 미국이 우리에게 군수물자를 제공하여 도와준다면 기쁠 것입니다. 우리의 가장 오래된 동맹국 중 하나가 이에 동의해 주기를 바랍니다."
 HOL_appoint_new_supreme_commander2:0 "KNIL 투자"
 HOL_appoint_new_supreme_commander2_desc:0 "왕립 네덜란드 동인도 육군, KNIL은 투자가 필요합니다. 떠오르는 태양의 공격적인 행동은 우리 제국에 잠재적인 위협이 될 수 있으며, 이는 우리가 분명히 원하지 않는 바입니다. 만약 떠오르는 태양이 미래에 위협적인 계획을 세우고 있다면, 우리는 즉시 반격하여 그들을 짓밟을 수 있어야 합니다."
 HOL_modernize_our_infantry_equipment2:0 "네덜란드 만리허 현대화"
 HOL_modernize_our_infantry_equipment2_desc:0 "현재 상태의 우리 장비로는 유럽의 어떤 현대화된 군대와도 상대가 되지 않는다는 것을 알고 있습니다. 우리는 군 장비, 특히 보병 총기인 독일제 1차 세계대전 소총을 개량해야 합니다. 시간이 오래 걸리지 않고, 비교적 저렴하며 매우 효과적입니다. 우리는 보병을 비교적 신속하게 현대적인 지상군으로 탈바꿈시킬 수 있을 것입니다."
 HOL_krijgsmacht:0 "네덜란드 국군"
 HOL_krijgsmacht_desc:0 "왕립 해군, 육군, 공군, 이들은 우리 국군의 공식 조직입니다. 세계적인 긴장이 고조됨에 따라, 수십 년간의 방치 끝에 다시 군에 더 많이 투자해야 합니다. 우리의 생존이 바로 여기에 달려 있습니다."
 HOL_zevenprovincien:0 "제벤 프로빈시엔" 
 HOL_zevenprovincien_desc:0 "코르넬리스 더빗은 그와 더 라위터르 제독이 제벤 프로빈시엔 함에 탑승하여 악명 높은 작전을 지휘하며 채텀에서 로열 찰스호를 나포한 후 이렇게 썼습니다. '지금까지 신의 자비로운 축복으로 바라던 성공의 영광스러운 관을 썼다.' 그 이후로 제벤 프로빈시엔은 함대의 영원한 자부심이었습니다. 앞으로도 계속 그렇게 합시다."
 HOL_fokker1:0 "포커사 지정"
 HOL_fokker1_desc:0 "포커는 1차 세계대전 당시 중립국으로서 고품질 대량 판매 덕분에 가장 성공한 항공기 회사입니다. 그들의 군용기는 전 세계적으로 사용되었지만, 때때로 자신들의 뿌리를 잊는 경향이 있습니다. 포커사와의 유대를 강화합시다."
 JAP_strike_on_the_northern_resource_area:0 "북방 자원 지대 타격"
 JAP_strike_on_the_northern_resource_area_desc:0 "우리의 계획은 성공적이었습니다. 하지만 우리가 얻은 자원만으로는 군수 산업을 유지하기에 충분하지 않습니다. 우리는 육군이 선호하는 교리를 따라 북쪽의 소련을 공격해야 합니다."
 CRO_tomislav_II:0 "토미슬라브 2세"
 CRO_tomislav_II_desc:0 "이탈리아 국왕 비토리오 에마누엘레 3세의 사촌인 사보이의 아이모네 공이 크로아티아의 왕위를 수락했습니다. 크로아티아 군주제의 재건을 기념하기 위해, 그는 크로아티아의 건국자인 토미슬라브의 후계자로서 토미슬라브 2세라는 칭호를 선택했습니다."
 JAP_armored_divisions2:0 "치리 전차"
 JAP_armored_divisions2_desc:0 "현대적인 중형전차 연구를 시작할 것입니다."
 cro_diplomacy_focus:0 "크로아티아 외교"
 #croatia semi generic
 CRO_officer_training:0 "장교 훈련"
 CRO_officer_training_desc:0 "공중전과 해전의 가능성이 커지고 있음에도 불구하고, 지상전은 미래의 전쟁에서 여전히 핵심입니다. 준비를 통해 참호전의 지옥을 되풀이하는 것을 피할 수 있습니다."
 CRO_improve_conscripts_equipment:0 "징집병 장비 개선"
 CRO_improve_conscripts_equipment_desc:0 "보병이 휴대할 수 있는 장비의 한계는 끊임없이 확장되고 있습니다. 우리는 우리 군에게 가용한 최고의 도구를 제공하는 데 집중할 것입니다."
 CRO_motorization_effort:0 "차량화 지원"
 CRO_motorization_effort_desc:0 "기동성과 방호력은 보병을 안전하게 전장으로 투입하고 철수시키는 데 매우 중요합니다. 이러한 개발에 집중하면 신속하게 행동을 취할 수 있을 것입니다."
 CRO_army_maneuvers:0 "육군 기동 훈련"
 CRO_army_maneuvers_desc:1 "우리 군을 정예화하기 위해 새로운 기동 훈련을 실시해야 합니다. 이 경험은 또한 의심할 여지 없이 현대전에 대한 새로운 통찰로 이어질 것입니다."
 CRO_supremacy_of_offense:0 "공세 우위"
 CRO_supremacy_of_offense_desc:1 "공세 행동은 승리의 열쇠이며, 따라서 우리의 전반적인 전략과 새로운 교리 개발을 지시해야 합니다."
 CRO_supremacy_of_defense:0 "방어 우위"
 CRO_supremacy_of_defense_desc:1 "사방이 적으로 둘러싸인 상황에서, 우리는 동맹국이 우리에게 쏠린 압박을 덜어줄 때까지 충분히 오래 버텨야 합니다. 새로운 군사 교리의 개발은 우리 조국 방어에 초점을 맞춰야 합니다."
 CRO_artillery_regiments:0 "포병 연대"
 CRO_artillery_regiments_desc:1 "우리 사단에 강력한 포병 연대를 도입함으로써 전반적인 전투력이 크게 증가할 것입니다."
 CRO_domestic_artillery_production:0 "국내 포병 생산"
 CRO_domestic_artillery_production_desc:1 "현대적인 국내 포병 모델의 개발을 촉진함으로써, 우리는 우리 군이 우리가 제공할 수 있는 최고의 화력 지원을 받도록 보장할 수 있습니다."
 CRO_anti_tank_defenses:0 "대전차 방어"
 CRO_anti_tank_defenses_desc:1 "전차가 현대전의 중심이 됨에 따라, 우리 보병이 이 장갑 거수들을 격파할 수 있도록 대전차 야포 분야에서 새로운 개발이 요구됩니다."
 CRO_mountain_brigades:0 "산악 여단"
 CRO_mountain_brigades_desc:1 "우리 국토의 상당 부분은 산으로 이루어져 있어, 이러한 유형의 지형에서의 전투에 특화된 특수 여단을 편성해야 합니다."
 CRO_tank_conversions:0 "전차 개조"
 CRO_tank_conversions_desc:1 "지금은 전차가 필요할지 모르지만, 다음 달에는 동일한 차체를 기반으로 한 자주포나 구축전차가 필요할 수 있습니다. 우리의 기갑 장비는 현재의 필요에 맞춰 유연하고 적응 가능해야 합니다."
 CRO_modern_tanks:0 "현대 전차"
 CRO_modern_tanks_desc:1 "대구경 주무장을 추가함으로써, 기갑 기술은 병력을 A 지점에서 B 지점으로 안전하게 수송한다는 단순한 의도를 훨씬 뛰어넘어 발전했습니다. 우리는 이웃 국가들과 경쟁하기 위해 우리만의 현대 전차를 개발해야 합니다."
 CRO_Science:0 "과학"
 CRO_Science_desc:1 "우리는 연구에 투자해야 합니다"
 
 CRO_small_arms:0 "M95 교체"
 CRO_small_arms_desc:0 "우리는 구식 보병 소총을 교체해야 합니다."
 CRO_armored_cavalry:0 "기계화 지원"
 CRO_armored_cavalry_desc:0 "차량화 부대를 장갑화하면, 소화기 사격의 영향을 줄일 수 있습니다."
 CRO_equipment_effort_2:0 "장비 개발 II"
 CRO_equipment_effort_2_desc:0 "보병과 지원 부대가 당대 최고의 장비를 갖추도록 지속적으로 노력할 것입니다."
 CRO_mechanization_effort:0 "기계화 노력"
 CRO_mechanization_effort_desc:0 "차량화 보병의 가능성을 재고하여, 오늘날 제작할 수 있는 차량의 한계를 뛰어넘을 수 있습니다."
 CRO_doctrine_effort_2:0 "교리 개발 II"
 CRO_doctrine_effort_2_desc:0 "전장은 전간기뿐만 아니라 최근 분쟁을 거치면서도 변화했습니다. 우리는 이를 반영하기 위해 교리를 지속적으로 재평가해야 합니다."
 CRO_equipment_effort_3:0 "장비 개발 III"
 CRO_equipment_effort_3_desc:0 "외국 장비를 모방하거나 구매하는 대신, 보병 무기 분야에서 세계를 선도하는 것을 목표로 해야 합니다."
 CRO_armor_effort:0 "기갑 노력"
 CRO_armor_effort_desc:0 "보병 기계화에서 얻은 교훈을 적용하여, 우리의 기갑 차량 또한 개선할 수 있습니다."
 CRO_special_forces:0 "특수부대"
 CRO_special_forces_desc:0 "우리에게는 정예 부대가 필요합니다. 산악 부대와 돌격 부대를 우선적으로 편성해야 합니다."
 CRO_aviation_effort:0 "항공 노력"
 CRO_aviation_effort_tt:0 "§Y공군 기지§를 지을 건설 슬롯이 부족합니다!"
 CRO_aviation_effort_desc:0 "항공전만큼 기술 발전이 빠른 곳은 없습니다. 항공은 모든 현대 국가가 숙달해야 하는 분야입니다."
 CRO_fighter_focus:0 "전투기 중점"
 CRO_fighter_focus_desc:0 "대전쟁에서 벌어진 공중전이 마지막이 아니었습니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 제공할 것입니다."
 CRO_bomber_focus:0 "폭격기 중점"
 CRO_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불비가 두드러지게 언급될 것입니다. 우리는 그 이야기가 적들의 입에서 나오도록 최선을 다할 것입니다."
 CRO_aviation_effort_2:0 "항공 노력 II"
 CRO_aviation_effort_2_desc:0 "공군을 다른 군종과 잘 통합하기 위해서는 항공 분야의 추가적인 발전이 필요합니다."
 CRO_CAS_effort:0 "근접항공지원 노력"
 CRO_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중에서도 차량의 지원이 필요합니다."
 CRO_rocket_effort:0 "로켓 개발"
 CRO_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 비행체 모두에게 전례 없는 속도를 가능하게 합니다. 이 기술들을 선도하면 적을 기습할 수 있을 것입니다."
 CRO_NAV_effort:0 "해군 항공 노력"
 CRO_NAV_effort_desc:0 "새로운 해전이 일부는 수면 아래에서 벌어지듯이, 다른 일부는 해상 상공에서 벌어집니다."
 CRO_naval_effort:0 "해군 노력"
 CRO_naval_effort_tt:0 "§Y해군 조선소§를 지을 건설 슬롯이 부족합니다!"
 CRO_naval_effort_desc:0 "해군 확장을 최우선 과제로 삼아야 합니다. 모든 가용 자원을 새로운 조선소 건설과 경수상함 연구에 할당하십시오."
 CRO_flexible_navy:0 "유연한 해군"
 CRO_flexible_navy_desc:0 "잠수함 기술의 발전을 고려하여 해상전을 재창조하면 적 수송선단을 효율적으로 타격할 수 있게 될 것입니다."
 CRO_large_navy:0 "대규모 해군"
 CRO_large_navy_desc:0 "해군 교리를 대형함에 맞게 조정하고 아군 무역 수송선단의 안전을 확보하면 어떤 종류의 함선이 필요한지에 대해 많은 것을 배울 수 있을 것입니다."
 CRO_submarine_effort:0 "잠수함 집중"
 CRO_submarine_effort_desc:0 "잠수함전은 어뢰정 발명 이래 가장 흥미로운 해군 발전입니다. 잠수함으로부터 방어할 뿐만 아니라, 적 선박을 공격하는 데 잠수함을 사용하는 것이 현명할 것입니다."
 CRO_cruiser_effort:0 "순양함 집중"
 CRO_cruiser_effort_desc:0 "고급 전함 연구에 착수하기 전에, 더 작은 순양함들을 교체해야 합니다."
 CRO_destroyer_effort:0 "구축함 집중"
 CRO_destroyer_effort_desc:0 "잠수함의 설계와 전략적 사용을 연구하면서, 우리는 그 전략에 대응하는 방법도 배웠습니다. 이를 위해 구축함은 매우 중요할 것입니다."
 CRO_capital_ships_effort:0 "주력함 집중"
 CRO_capital_ships_effort_desc:0 "가장 많은 전함을 보유한 국가가 해양을 지배할 것입니다. 전함과 항공모함은 해상 우위의 과거와 현재를 상징합니다."
 CRO_industrial_effort:0 "산업 집중"
 CRO_industrial_effort_desc:0 "대도약을 위해 모든 정치력을 민간 산업 건설에 집중해야 합니다."
 CRO_industrial_effort_2:0 "산업 집중 II"
 CRO_industrial_effort_2_desc:0 "강철 같은 의지와 끊임없는 노동 윤리로, 우리는 또 다른 위대한 산업 집중을 위해 국민을 동원할 수 있습니다."
 CRO_construction_effort_tt:0 "§Y민간 공장§을 지을 건설 슬롯이 부족합니다!"
 CRO_construction_effort:0 "건설 집중"
 CRO_construction_effort_desc:0 "건설 집중"
 CRO_production_effort:0 "생산 집중"
 CRO_production_effort_tt:0 "§Y군수 공장§을 지을 건설 슬롯이 부족합니다!"
 CRO_production_effort_desc:0 "트랙터를 만들 수 있다면, 전차도 만들 수 있습니다! 군수 생산 능력이 뒤처지게 해서는 안 됩니다."
 CRO_construction_effort_2:0 "건설 집중"
 CRO_construction_effort_2_desc:0 "공장 확장을 계속하면 무역품 생산을 가속화하고 추가적인 건설 노력을 뒷받침할 수 있습니다."
 CRO_production_effort_2:0 "중차량 산업 지원"
 CRO_production_effort_2_desc:0 "유럽의 주요 항구 중 하나인 안트베르펜은 수출 중심 산업을 발전시키기에 좋은 위치에 있습니다."
 CRO_production_effort_3:0 "기갑 제조업체 지원"
 CRO_production_effort_3_desc:0 "신규 장비 수요를 충족하려면 군수 공장을 확장하려는 노력을 계속해야 합니다."
 CRO_infrastructure_effort:0 "기반시설 집중"
 CRO_infrastructure_effort_desc:0 "적절한 기반시설이 없는 국가는 고급 사업이나 건설을 추진할 수 없습니다."
 CRO_infrastructure_effort_tt:0 "§Y기반시설§!을 건설할 공간이 부족합니다!"
 CRO_coal_mines:0 "림뷔르흐 탄광 완전 개발"
 CRO_coal_mines_desc:0 "석탄은 우리의 주요 자원이며, 채굴량을 반드시 극대화해야 합니다."
 CRO_synth_oil_effort_tt:0 "§Y합성 정유 공장§!을 건설할 공간이 부족합니다!"
 CRO_infrastructure_effort_2:0 "기반시설 확충 II"
 CRO_infrastructure_effort_2_desc:0 "기반시설을 더욱 확장하면 첨단 비밀 작전에 필요한 수송 및 통신이 가능해질 것입니다."
 CRO_construction_effort_3:0 "산업력 증진 III"
 CRO_construction_effort_3_desc:0 "기반시설망 확충으로 건설 역량이 크게 향상되었습니다."
 CRO_rockets:0 "독일 로켓"
 CRO_rockets_desc:0 "독일 연구원 초빙"
 CRO_extra_tech_slot:0 "추가 연구 슬롯"
 CRO_extra_tech_slot_desc:0 "산업 확장과 최근의 여러 발전으로 더 많은 연구개발을 동시에 수행할 수 있게 될지도 모릅니다."
 CRO_extra_tech_slot_2:0 "추가 연구 슬롯 II"
 CRO_extra_tech_slot_2_desc:0 "국가의 급속한 산업화는 우리가 추구해야 할 새로운 연구개발 기회를 열어주었습니다."
 CRO_technology_sharing:0 "기술 공유"
 CRO_technology_sharing_desc:0 "동맹국과 기술 발전을 공유함으로써, 우리 세력 전체가 전시 연구개발을 더 효율적으로 수행할 수 있게 될 것입니다."
 CRO_secret_weapons:0 "비밀 병기"
 CRO_secret_weapons_desc:0 "모든 여유 자원을 전차와 항공기 개발에 쏟아붓고 싶은 유혹이 들지만, 전쟁 승리의 비결은 전자공학, 로켓 공학, 핵 연구와 같은 완전히 새로운 과학 분야에 있습니다."
 CRO_political_effort:0 "결전의 시간"
 CRO_political_effort_desc:0 "일어서라!"
 CRO_collectivist_ethos:0 "신디케이트 강화"
 CRO_collectivist_ethos_desc:0 "적들이 약소국을 분열시켜 정복할지라도, 우리 인민은 단결하여 맞설 것입니다. 하나는 모두를 위하고, 모두는 하나를 위한다."
 CRO_liberty_ethos:0 "민주적 합의"
 CRO_liberty_ethos_desc:0 "인간 정신을 억압하려는 이념적 광신도들의 시대에, 우리는 개인의 자유와 권리를 수호할 것입니다."
 CRO_militarism_desc:0 "군대를 필요악으로 여기는 자들은 전쟁 앞에서 주저할 수밖에 없습니다. 우리는 군국주의를 문화에 깊이 새겨, 국민 모두가 군인이 되도록 할 것입니다."
 CRO_political_correctness:0 "정치적 올바름"
 CRO_political_correctness_desc:0 "다소 논란의 여지가 있거나 당혹스러운 의견을 가진 사람들이 자신들을 겨냥한 광범위한 음모가 있다고 우려하는 것 같습니다. 아주 훌륭한 생각인 것 같군요."
 CRO_neutrality_focus:0 "중립주의 중점"
 CRO_neutrality_focus_desc:0 "세계적인 분쟁에서 편을 드는 데 용기와 지혜가 필요하다고 주장하는 이들도 있겠지만, 우리는 거부하는 데 더 큰 용기와 지혜가 필요하다는 것을 압니다."
 CRO_interventionism_focus:0 "개입주의 중점"
 CRO_interventionism_focus_desc:0 "우리는 자국민뿐만 아니라 모든 이들의 자유를 소중히 여깁니다. 폭정을 막기 위해 전쟁이 필요하다면, 기꺼이 감수할 것입니다."
 CRO_military_youth:0 "우스타샤 믈라데주"
 CRO_military_youth_desc:0 "우리나라 젊은이들의 기강과 정치 교육을 증진하기 위한 조직은 조기에 충성심과 자기희생 정신을 함양할 것입니다."
 CRO_deterrence:0 "억제력"
 CRO_deterrence_desc:0 "고립된 상태에서는 전쟁으로 이득을 보는 경우가 거의 없습니다. 다행히도, 우리는 최선의 방어란 결코 사용할 필요가 없을 정도로 잘 알려진 방어라는 것을 알고 있습니다."
 CRO_volunteer_corps:0 "의용군단"
 CRO_volunteer_corps_desc:0 "자유라는 이상을 위해 국민을 죽음으로 내모는 것은 아이러니한 일이지만, 해외의 사람들을 돕고자 하는 이들을 위한 수단을 마련하는 것은 그렇지 않습니다."
 CRO_paramilitarism:0 "준군사주의"
 CRO_paramilitarism_desc:0 "군사 원칙은 군대 밖에서도 적용될 수 있습니다. 우리 군을 보완할 준군사 부대를 개발함으로써, 더 많은 사람들이 군사 훈련을 받게 될 것입니다."
 CRO_indoctrination_focus:0 "교화"
 CRO_indoctrination_focus_desc:0 "우리의 이념이 진리에 기반을 두고 있음을 확립했으니, 이제 진리로서 가르칠 수 있습니다. 교육과 언론은 이 교훈을 반영해야 합니다."
 CRO_foreign_expeditions:0 "해외 원정"
 CRO_foreign_expeditions_desc:0 "적들이 자신들의 이상을 위해 먼 곳의 분쟁에 개입할 준비가 되어 있으므로, 우리도 우리의 이상을 위해 똑같이 할 준비가 되어 있어야 합니다."
 CRO_why_we_fight:0 "우리가 싸우는 이유"
 CRO_why_we_fight_effect:0 "만약 §Y중립 외교 정책§! 정신이 없다면 우리는 파벌을 생성할 수 있게 될 것입니다.\n"
 CRO_why_we_fight_desc:0 "세계는 점점 더 불안정해지고 있습니다. 우리 국민은 권력을 탐하는 자들이 저지르는 잔학 행위를 목격해야 합니다. 이제 국민을 우리 대의에 결집시키고 모두가 우리의 자유를 위해 싸울 준비를 갖추도록 해야 할 때입니다."
 CRO_political_commissars:0 "정치장교"
 CRO_political_commissars_desc:0 "우리의 정책이 군사적으로도 잘 이행되도록 보장하기 위해, 정치적으로 임명된 관료를 군 계급에 도입할 것입니다."
 CRO_internationalism_focus:0 "국제주의 중점"
 CRO_internationalism_focus_desc:0 "이념에는 국경이 없습니다. 다른 국가가 스스로를 주권 국가라 칭할지라도, 우리의 신념은 그러한 주장 위에 있습니다."
 CRO_nationalism_focus:0 "국가 재탄생"
 CRO_clergy:0 "성직자 통합"
 CRO_clergy_desc:0 "우리는 가톨릭 교회를 정부에 통합하여 통치를 정당화할 것입니다."
 CRO_enforce_pavelic_rule:0 "파벨리치 통치 강행"
 CRO_enforce_pavelic_rule_desc:0 "이제 우스타샤가 마침내 정권을 장악했으니, 우리는 우리의 경애하는 지도자, 포글라브니크 안테 파벨리치가 모든 충성스러운 [CRO.GetAdjective]인들에게 우리나라의 정당한 통치자로 인정받도록 할 수 있습니다."
 CRO_militarism:0 "향토 방위군 창설"
 CRO_nationalism_focus_desc:0 "우리 국가는 독특하며, 우리의 정치적 성과는 오직 이곳에서만 이룰 수 있었습니다. 우리는 어떤 대가를 치르더라도 이를 위해 싸워야 합니다."
 CRO_ideological_fanaticism_communism:0 "이념적 광신"
 CRO_ideological_fanaticism_ustasha:0 "이념적 광신"

 CRO_ideological_fanaticism_desc:0 "정치적으로 확립된 우리의 가치와 목표는 고대의 신념만큼이나 목숨을 바칠 가치가 있습니다. 모든 추종자는 죽음을 각오해야 하며, 이탈자는 죽음을 맞이할 준비를 해야 할 것입니다."
 CRO_catholic_dominance_focus:0 "크로아티아 민족주의"
 CRO_catholic_dominance_focus_desc:0 "크로아티아 민족주의."
 CRO_secularism_focus:0 "세속주의"
 CRO_secularism_focus_desc:0 "세속주의."
 CRO_integrate_muslim_croats_focus:0 "향토 방위군 창설"
 CRO_integrate_muslim_croats_focus_desc:0 "우리는 최초의 국가 민병대인 크로아티아 향토 방위군을 창설할 것입니다."
 CRO_integrate_orthodox_croats_focus:0 "정교회 크로아티아인 통합"
 CRO_integrate_orthodox_croats_focus_desc:0 "우리는 정교회 크로아티아인들을 부당하게 대우해왔지만, 선량한 크로아티아인이 로마 가톨릭 교회의 일원이라 할지라도 세르비아인의 종교로 개종한 크로아티아인 역시 결국 크로아티아인이므로 국가 공동체로 통합해야 합니다."
 CRO_integrate_religious_minorities_focus:0 "종교적 소수자 통합"
 CRO_integrate_religious_minorities_focus_desc:0 "우리나라에는 종교적 소수자들이 있으며, 그들의 특수성은 존중받아야 합니다."
 CRO_war_economy:0 "전시 경제"
 CRO_war_economy_desc:0 "전시 경제에 박차를 가해야 합니다"
 CRO_proffesional_army:0 "전문적인 군대"
 CRO_proffesional_army_desc:0 "우리 군은 항상 전쟁에 대비해야 합니다!"
 CRO_develop_tanks:0 "전차 개발"
 CRO_develop_tanks_desc:0 "그냥 투자하십시오"
 CRO_prepare_for_war:0 "전쟁 준비"
 CRO_prepare_for_war_desc:0 "우리는 전쟁을 준비해야 합니다"
 CRO_invite_serbian_officers:0 "세르비아 장교 초빙"
 CRO_invite_serbian_officers_desc:0 "유고슬라비아군에서 복무했던 숙련된 세르비아 장교들을 초빙해야 합니다"
 CRO_a_king_for_our_people_focus:0 "우리 인민을 위한 왕"
 CRO_a_king_for_our_people_focus_desc:0 "과거 자유 크로아티아 왕국의 위대함을 복원하기 위해, 우리는 새로 태어난 크로아티아 인민을 이끌 왕을 선택해야 합니다."
 CRO_italian_influence_focus:0 "이탈리아의 영향력"
 CRO_italian_influence_desc:0 "이제 이탈리아인이 크로아티아의 왕좌에 올랐으니, 우리나라는 그 어느 때보다 이탈리아와 긴밀한 관계를 맺게 되었습니다.."
 CRO_italo_croat_legion:0 "이탈리아-크로아티아 군단"
 CRO_italo_croat_legion_desc:0 "이탈리아-크로아티아 군단"
 CRO_dalmatian_question_focus:0 "달마티아 문제"
 CRO_dalmatian_question_focus_desc:0 "많은 이들이 이탈리아인 왕을 선택하면 이탈리아와의 관계가 완화될 것이라 생각했지만, 토미슬라브 2세는 자신의 왕국에 대한 이탈리아의 영향력을 환영하지 않았습니다. 새 왕은 달마티아 해안이 이탈리아화될 수 있다는 사실에 의문을 제기했습니다. 사실 그는 이탈리아가 이 지역에 대한 영유권을 포기하고 해안 전체를 통제하도록 강요할 것으로 보입니다."


FIN_prepare_for_winter:0 "겨울 대비"
FIN_stockpile_rations:0 "배급품 비축"
FIN_stockpile_rations_desc:0 "혹독한 겨울은 국민, 그리고 아마 더 중요하게는 우리 군을 위한 식량이 줄어든다는 것을 의미합니다. 우리 병사들이 영광스러운 조국을 수호하려면 기반 시설을 개선해야 합니다."
FIN_imitate_sweden:0 "동맹국 모색"
FIN_prepare_for_winter_desc:0 "앞으로 힘든 시기가 닥칠 것은 의심의 여지가 없습니다. 동쪽의 옛 적들과 남쪽에서 고조되는 긴장, 그리고 우리 삶의 방식에 대한 해외의 위협 속에서, 우리 정부는 핀란드 국민을 가장 잘 보호할 방법에 대해 합의해야 하며, 이를 신속히 해야 합니다."
FIN_invest_in_the_private_sector:0 "민간 부문에 투자"
FIN_invest_in_the_private_sector_desc:0 "튼튼한 경제는 결코 무시할 수 없습니다. 우리가 어떤 길을 선택하든, 우리가 원하는 미래를 건설하기 위해서는 강력한 민간 부문이 필요할 것입니다."
FIN_expand_the_mines:0 "광산 확장"
FIN_expand_the_mines_desc:0 "북부 광산은 자원이 풍부합니다. 만약 우리가 그곳에 투자하기로 결정한다면, 수출용이나 내수용으로 더 많은 자원을 확보할 수 있을 것입니다."
FIN_nokia:0 "다중 언어 교육"
FIN_nokia_desc:0 "변화하는 인구 구성은 핀란드어를 구사하지 못하는 많은 학생들에게 문제를 일으키고 있습니다. 스웨덴어와 러시아어를 모두 공용어로 지정함으로써, 우리 국민이 더 나은 교육을 받을 수 있도록 보장할 수 있습니다."
FIN_the_red_wall:0 "제2 만네르헤임선"
FIN_the_red_wall_desc:0 "만네르헤임선은 핀란드가 소련에 대항하여 카렐리야 지협에 건설한 방어 요새선이었습니다. 강력한 방어를 준비하기 위해 동부 전선에 유사한 구조의 요새와 벙커에 투자하는 것이 현명할 수 있습니다."
FIN_frantic_planning:0 "모티 전술"
FIN_frantic_planning_desc:0 "모티는 완전히 포위된 적 부대를 가리키는 핀란드 군대 속어입니다. 모티투스는 경보병이 험지를 이동하는 능력을 이용해 도로 위의 적 부대를 포위하는 이중 포위 기동입니다. 이 전술은 특히 핀란드의 눈 덮인 기후에서 수적으로 크게 열세이지만 기동성 있는 부대에게 특히 유용합니다."
FIN_eastern_defense:0 "동부 방어"
FIN_eastern_defense_desc:0 "동부 전선은 넓고 방어하기 어렵습니다. 소련과의 전쟁에서 살아남으려면 더 많은 방어 구조물을 건설하는 데 집중해야 합니다."
FIN_democratic_support:0 "민주주의 지원"
FIN_democratic_support_desc:0 "일부 법률을 완화하고 인권 보호를 위한 추가 입법을 통해 잠재적으로 이웃 국가들을 강력한 동맹으로 만들고 해외에서 우방을 찾을 수 있습니다."
FIN_nationalist_support:0 "민족주의 지원"
FIN_nationalist_support_desc:0 "핀란드 국민은 당연히 자부심이 강한 민족입니다. 우리는 유럽에서 우리의 우월성을 확립하고 우리의 민족주의적 비전을 공유하는 국가들과 동맹을 맺어야 합니다."
FIN_expansionism:0 "팽창주의"
FIN_expansionism_desc:0 "최근의 정치적 변화와 함께, 국경 확장에 대한 지지가 증가하고 있습니다."
FIN_invite_norway:0 "노르웨이 초대"
FIN_invite_norway_desc:0 "노르웨이는 우리 및 나머지 스칸디나비아 국가들과 좋은 관계를 맺고 있습니다. 이를 염두에 두면, 그들은 또한 전략적으로 매우 중요한 해안을 보유하고 있으며 그들의 북부 국경은 우리에게 완충 지대 역할을 할 수 있습니다. 새로운 칼마르 동맹에 그들을 포함시키는 것을 고려하지 않는 것은 어리석은 일일 것입니다."
FIN_invite_denmark:0 "덴마크 초대"
FIN_invite_denmark_desc:0 "덴마크는 나머지 스칸디나비아 국가들과 강력한 문화적, 이념적 유대를 맺고 있습니다. 유럽 본토 남쪽에 위치한 그들의 지리적 위치는 매우 중요한 자산입니다. 우리 고문들은 제2차 칼마르 동맹에 그들을 초대할 것을 제안합니다."
FIN_promote_sisu:0 "백위대 확장"
FIN_promote_sisu_desc:0 "겨울 전쟁에서 백위대는 동원령 실행을 책임졌습니다. 야전군 병력의 4분의 1이 백위대 대원들로 구성되었습니다. 기본적인 보급품조차 부족했던 군대에서 백위대 대원들은 가장 잘 훈련되고 장비를 갖춘 인력이었기 때문에, 이들의 기여는 중요했습니다."
FIN_civilian_kitchens:0 "민간 야전 취사장"
FIN_civilian_kitchens_desc:0 "핀란드는 텐트, 난로 및 기타 장비 보급에 큰 어려움을 겪었지만, 야전에서 취사장을 설치하고 군대에 식량을 제공한 민간 자원봉사자들 덕분에 많은 사망자를 피할 수 있었습니다."
FIN_ski_infantry:0 "스키 보병"
FIN_ski_infantry_desc:0 "스키 부대는 1939년 겨울 전쟁 당시 소련에 맞선 핀란드군의 성공에 핵심적인 역할을 수행했습니다. 핀란드 스키 부대는 도로가 없는 숲이 우거진 시골 지형을 활용하여 진격하는 소련 기계화 부대에 맞서 큰 성공을 거두었습니다."
FIN_molotov_cocktails:0 "몰로토프 칵테일"
FIN_molotov_cocktails_desc:0 "핀란드군은 화염병의 설계와 전술적 사용을 완성했습니다. 추가적인 개량에는 방풍 성냥이나 파손 시 발화하는 화학물질 약병을 부착하는 것이 포함되어, 병에 미리 불을 붙일 필요가 없어졌으며, 병을 약 3분의 1 정도 비워두면 더 잘 깨지는 것으로 밝혀졌습니다."
FIN_wolf_divisions:0 "늑대 사단"
FIN_wolf_divisions_desc:0 "우리 군의 규모와 힘이 커짐에 따라, 우리는 더욱 공격적인 전술을 사용하는 데 집중해야 합니다. 우리 군은 더 이상 단순한 방어 병력이 아닙니다."
FIN_the_winter_war:0 "대핀란드 건설"
FIN_the_winter_war_desc:0 "대핀란드는 핀란드의 영토 확장을 강조하는 실지회복주의 및 민족주의 사상입니다. 가장 일반적인 대핀란드의 개념은 핀족과 카렐리야인이 거주하는 영토를 아우르는 자연 국경으로 정의되었으며, 백해에서 오네가 호수까지, 그리고 스비리 강과 네바 강을 따라 잉그리아 지역과 콜라 반도를 포함하는 범위였습니다."
FIN_southern_foothold:0 "남부 교두보"
FIN_southern_foothold_desc:0 "확장을 원한다면, 서쪽과 동쪽의 혹한 기후보다 더 많은 기회가 필요할 것입니다. 에스토니아는 우리 군의 상대가 되지 못할 것이며, 그들의 영토는 바다 건너편에 전략적 교두보를 제공해 줄 것입니다."
FIN_german_support:0 "추축국 가입"
FIN_german_support_desc:0 "강력한 독일국은 동쪽의 권력에 굶주린 코민테른과 우리의 자존심을 비난하는 어리석은 서방 민주주의 국가들에 맞서 우리를 기꺼이 도울 것입니다. 우리나라에서 추축국에 대한 지지는 엇갈리지만, 대다수는 우리가 이토록 강력한 동맹을 거부할 여유가 없다는 데 동의합니다."
FIN_independent_revolution:0 "독자 혁명"
FIN_independent_revolution_desc:0 "우리의 영광스러운 혁명은 부패한 코민테른의 도움 없이도 성공할 수 있습니다. 우리는 우리만의 원칙에 따라 진정한 공산주의 국가를 만드는 것이 최선일 것입니다."
FIN_propaganda_machine:0 "선전"
FIN_propaganda_machine_desc:0 "고무적인 포스터, 영화, 연설이 우리 국민을 결집시켰습니다. 그들은 어떤 일이 일어나든 우리를 지지할 준비가 되어 있습니다."
FIN_the_lotta_svard:0 "로타 스베르드"
FIN_the_lotta_svard_desc:0 "겨울 전쟁 동안 '로타'가 업무를 대신한 약 10만 명의 남성들이 군 복무를 할 수 있게 되었습니다. 로타는 병원, 공습 경보 초소 및 기타 군과 연계된 보조 임무를 수행했습니다. 그러나 로타는 공식적으로 비무장이었습니다. 유일한 예외는 헬싱키에 있던 로타 스베르드 회원들로 구성된 자원 대공포대였습니다."
FIN_pacifist_sentiment:0 "평화주의 정서"
FIN_pacifist_sentiment_desc:0 "우리 국민은 세계 평화에 대한 신념으로 단결해 있습니다. 그들은 또한 평화를 위협하려는 자들에 대한 억제력으로 작용하기 위해서라도 때로는 동맹을 맺어야 한다는 것을 이해합니다."
FIN_found_valpo:0 "발포 창설"
FIN_found_valpo_desc:0 "역사적으로 1937년에 창설된 발티올리넨 폴리시(Valtiollinen poliisi, 약칭 발포(ValPo), '국가 경찰'을 의미)는 핀란드 보안정보국의 전신이었습니다. 이 조직의 스파이들은 무엇보다도 하인리히 힘러가 핀란드를 방문했을 때 그의 서류 가방을 촬영한 것으로 알려져 있습니다."
FIN_deterrence:0 "억제력"
FIN_deterrence_desc:0 "슬프게도, 모두가 평화에 대한 우리의 비전을 공유하는 것은 아닙니다. 따라서 우리는 국방에 투자해야 하며, 그렇게 함으로써 전쟁광 팽창주의자들에게 쉬운 목표물로 보이지 않을 것입니다."
FIN_military_necessity:0 "군사적 필요성"
FIN_military_necessity_desc:0 "핀란드 민족은 전쟁 시기에 혁신적인 정신이 얼마나 귀중한지 잘 알고 있습니다. 단기적으로나 장기적으로나 우리의 미래를 보장하려면 과학자들이 계속 노력하여 새로운 돌파구를 마련하도록 장려해야 합니다."
FIN_secret_weapons:0 "비밀 병기"
FIN_secret_weapons_desc:0 "일부 국가들이 어떤 비장의 무기를 가지고 있을지 누가 알겠습니까? 기습의 요소는 전쟁에서 가장 귀중한 자산이 될 수 있으므로, 수많은 발명품이 오랫동안 비밀로 유지됩니다."
FIN_cautious_politics:0 "신중한 정치"
FIN_cautious_politics_desc:0 "다가오는 폭풍 속에서 최소한의 손실로 벗어나려면, 어느 편도 들지 않는 것이 최선일 것입니다. 우리 스스로 표적이 될 이유가 없습니다."
FIN_limited_motorization:0 "제한적인 동력화"
FIN_limited_motorization_desc:0 "핀란드군은 오랫동안 동력화 보병보다 기병 연대를 선호했습니다. 말은 소련군을 멈추게 한 깊은 눈 속을 달릴 수 있었고, 이는 핀란드 육군의 동력화가 상당히 지연되었음을 의미합니다."
FIN_tuli_isku:0 "툴리-이스쿠"
FIN_tuli_isku_desc:0 "'툴리-이스쿠'는 핀란드어로 '화력 타격'을 의미합니다. 지원 포병은 겨울 전쟁과 계속 전쟁 모두에서 핀란드군에 의해 광범위하게 사용되었습니다."
FIN_study_foreign_vehicles:0 "외국 차량 연구"
FIN_study_foreign_vehicles_desc:0 "대부분의 핀란드 차량은 겨울 전쟁 이후에도 상당히 구식이었습니다. 현재 모델의 생산을 계속하는 대신, 검증된 수입 차량을 연구하는 것이 최선일 것입니다."
FIN_import_tanks:0 "전차 수입"
FIN_import_tanks_desc:0 "더 많은 양의 전차를 수입함으로써 신형 전차의 연구 및 배치를 극적으로 가속할 수 있습니다. 그렇게 하면 전차를 완전히 역설계하기 전에 신형 모델을 사용하는 대대를 보유할 수 있을 것입니다."
FIN_theft_and_learning:0 "노획과 학습"
FIN_theft_and_learning_desc:0 "이전의 전쟁 덕분에, 우리는 여전히 많은 노획 전차를 보유하고 있습니다. 이 '빌린' 전차에 더 집중함으로써 전체 연구 프로젝트를 더 저렴하고 빠르게 만들 수 있습니다!"
FIN_aviation_effort:0 "항공 분야 투자"
FIN_aviation_effort_tt:0 "§Y공군 기지§를 지을 건설 슬롯이 부족합니다!"
FIN_aviation_effort_desc:0 "공중전만큼 기술 발전이 빠른 곳은 없습니다. 항공은 모든 현대 국가가 숙달해야 하는 분야입니다."
FIN_fighter_focus:0 "전투기 중점"
FIN_fighter_focus_desc:0 "대전쟁에서 벌어진 공중전이 마지막이 아닐 것입니다. 전투기 개발에서 앞서 나가는 것은 미래에 우리에게 우위를 제공할 것입니다."
FIN_bomber_focus:0 "폭격기 중점"
FIN_bomber_focus_desc:0 "미래의 사람들이 오늘날 전쟁의 공포에 대해 이야기할 때, 하늘에서 쏟아지는 불벼락이 두드러지게 언급될 것입니다. 우리는 그 이야기가 적들의 입에서 나오도록 최선을 다할 것입니다."
FIN_aviation_effort_2:0 "항공 분야 투자 II"
FIN_aviation_effort_2_desc:0 "공군을 다른 군부대와 잘 통합하려면 항공 분야의 추가적인 발전이 필요할 것입니다."
FIN_CAS_effort:0 "근접항공지원 투자"
FIN_CAS_effort_desc:0 "현대 군대는 지상뿐만 아니라 공중에서도 차량의 지원이 필요합니다."
FIN_rocket_effort:0 "로켓 기술 투자"
FIN_rocket_effort_desc:0 "로켓과 제트 엔진은 무인 및 유인 항공기 모두에게 전례 없는 속도를 제공합니다. 이 기술들을 선도하면 적의 허를 찌를 수 있을 것입니다."
FIN_nav_effort:0 "해군 항공 투자"
FIN_nav_effort_desc:0 "새로운 해전의 일부가 수면 아래에서 벌어지는 것처럼, 그 일부는 바다 위 상공에서도 벌어집니다."
FIN_naval_effort:0 "해군력 증강"
FIN_naval_effort_tt:0 "§Y해군 조선소§를 지을 건설 슬롯이 부족합니다!"
FIN_naval_effort_desc:0 "해군 확장이 우리의 최우선 과제여야 합니다. 모든 가용 자원을 신규 조선소와 경함선 연구에 할당하십시오."
FIN_flexible_navy:0 "유연한 해군"
FIN_flexible_navy_desc:0 "잠수함 기술의 발전을 고려하여 해전 방식을 재정립하면, 적 수송선단을 효율적으로 타격할 수 있을 것입니다."
FIN_large_navy:0 "해외 함선 설계 연구"
FIN_large_navy_desc:0 "대형 함선을 수용하도록 해군 교리를 조정하고 아군 무역 수송선단의 안전을 보장하는 과정에서, 어떤 종류의 함선이 필요한지에 대해 많은 것을 배우게 될 것입니다."
FIN_submarine_effort:0 "잠수함 집중"
FIN_submarine_effort_desc:0 "잠수함전은 어뢰정 발명 이래 가장 흥미로운 해군 발전입니다. 잠수함으로부터 아군을 보호할 뿐만 아니라, 적 함선을 상대로 잠수함을 활용하는 것이 현명할 것입니다."
FIN_cruiser_effort:0 "순양함 집중"
FIN_cruiser_effort_desc:0 "첨단 전함 연구에 착수하기 전에, 더 작은 순양함들을 교체해야 합니다."
FIN_destroyer_effort:0 "구축함 집중"
FIN_destroyer_effort_desc:0 "잠수함의 설계와 전략적 사용법을 연구하면서, 그 전략에 대응하는 방법 또한 배웠습니다. 이를 위해서는 구축함이 매우 중요할 것입니다."
FIN_capital_ships_effort:0 "주력함 집중"
FIN_capital_ships_effort_desc:0 "가장 많은 전함을 보유한 국가가 바다를 지배할 것입니다. 전함과 항공모함은 해상 우위의 과거와 현재를 대표합니다."
FIN_further_artillery_support:0 "추가 포병 지원"
FIN_further_artillery_support_desc:0 "포병 지원은 아군에게 매우 귀중한 것으로 증명되었습니다. 더 많은 동포의 생명을 구하기 위해 신기술의 지속적인 개선과 배치를 최우선 과제로 삼아야 합니다."
FIN_fortress_aland:0 "올란드 요새"
FIN_fortress_aland_desc:0 "섬을 요새화하여 강력한 해군 기지로 만들 수 있습니다. 해군 조선소를 확장하면 우위를 확립하고 유지할 수단을 확보하게 될 것입니다."
FIN_marines_and_landing_craft:0 "산마르코 여단"
FIN_marines_and_landing_craft_desc:0 "전쟁은 해군력만으로 이길 수 없습니다. 우리는 파도를 넘어 군대를 수송하고 안전하게 상륙시킬 수 있어야 합니다..."
FIN_paratroopers_and_air_bases:0 "공수부대와 공군 기지"
FIN_paratroopers_and_air_bases_desc:0 "전쟁은 항공기만으로 이길 수 없습니다. 우리는 하늘을 넘어 군대를 수송하고 안전하게 적진 후방에 투입할 수 있어야 합니다..."
FIN_flying_lottas:0 "비행 로타"
FIN_flying_lottas_desc:0 "국내 다른 곳에서는 보조 지원을 위한 '로타 스베르드' 조직에 대한 논의가 있지만, 공군에서도 여성의 참여에 대한 논의를 시작했습니다. 핀란드 여성들은 그들의 결의를 증명했으며, 대부분의 지도부는 그들을 조종사 대열에 받아들이는 데 개방적입니다."
finland.17.t:0 "제2차 칼마르 동맹으로의 초대"
 finland.17.d:0 "북유럽을 강화하고 동쪽과 남쪽에서 재발할 수 있는 공격적인 팽창주의를 억제하기 위한 노력의 일환으로, 핀란드가 이 국가들을 하나로 모으는 것을 목표로 하는 동맹에 우리를 초대했습니다."
 finland.17.a:0 "기꺼이 받아들이겠다. 칼마르 동맹은 재건되어야 한다."
 finland.17.b:0 "[Root.GetName]은(는) 독자 노선을 걷는다."
 finland.18.t:0 "[From.GetName]이(가) 제2차 칼마르 동맹에 가입"
 finland.18.d:0 "스칸디나비아 연합을 설립하려는 우리의 계획이 성공하고 있습니다. [From.GetLeader]은(는) 우리의 노력을 승인하고 동맹 초대를 수락했습니다."
 finland.18.a:0 "칼마르 동맹 재건에 한 걸음 더 다가섰다."
 finland.19.t:0 "[From.GetName]이(가) 제2차 칼마르 동맹을 거부"
 finland.19.d:0 "제2차 칼마르 동맹에 지원을 제공하려는 최선의 노력에도 불구하고, 최근 해당 국가 중 한 곳에 접촉하려는 시도는 회의적인 반응을 얻었습니다. [From.GetLeader]는 우리의 동기를 의심하거나, 혹은 우리와 너무 긴밀하게 동맹을 맺으면 표적이 될 것을 우려하여 동맹 가입을 거부했습니다."
 finland.19.a:0 "그들이 아는 한, 이미 표적이 되었을 수도 있습니다!"

 finland.29.t:0 "영국, 동맹 요청 수락"
 finland.29.d:0 "'위대한 국가들이 함께할 때 얼마나 많은 것을 성취할 수 있는지는 역사가 증명합니다. 우리는 귀국을 친구로서뿐만 아니라, 연합국으로서 환영하게 되어 자랑스럽습니다. 우리는 함께 억압의 어둠이 잠식하는 세상에서 자유의 빛나는 등불이 될 것입니다!'\n\n영국에 연합국으로 가입하려는 우리의 요청이 수락되었습니다. 앞으로 다가올 격동의 시기에 그들의 전폭적인 지원을 기대할 수 있습니다."
 finland.29.a:0 "함께 전선을 사수하리라!"
 finland.30.t:0 "영국, 동맹 요청 거부"
 finland.30.d:0 "'과거에 좋은 관계를 유지해왔지만, 해협 너머의 분쟁이 격화될 위험을 감수할 수는 없습니다. 독일은 해군 협정을 존중하여 우리의 신뢰를 얻었으며, 소비에트 연방을 자극할 이유도 없습니다. 불길이 번진다면 우리 자신을 방어하겠지만, 불길을 키우는 위험은 감수하지 않을 것입니다. 평화는 언제나 모든 민주주의 국가의 목표여야 합니다.'\n\n영국에 연합국으로 가입하려는 우리의 요청이 거부되었습니다. 영국 정부는 독일이나 소비에트 연방을 더는 적대하려 하지 않으며, 현재의 평화를 위태롭게 하지 않을 것입니다."
 finland.30.a:0 "또 다른 국가가 핀란드를 잊었군. 본때를 보여주겠다!"
 
 finland.25.t:0 "핀란드, 연합국 가입 희망"
 finland.25.d:0 "세계는 점점 더 불안정해지고 있습니다. 영국과 핀란드는 유럽에서 민주주의와 자유의 보루로 남아 있으며, 이제 핀란드가 연합국에 가입할 것을 제안합니다.\n어떻게 회답하시겠습니까?"
 finland.25.a:0 "예"
 finland.25.b:0 "아니요"
 
 
 finland.31.t:0 "독일, 동맹 요청 수락"
 finland.31.d:0 "'위대한 국가들이 함께할 때 얼마나 많은 것을 성취할 수 있는지는 역사가 증명합니다. 우리는 귀국을 친구로서뿐만 아니라, 동맹인 추축국 구성원으로서 환영하게 되어 자랑스럽습니다. 우리는 함께 공산주의의 어둠과 연합국의 나약함이 잠식하는 세상에 질서를 가져올 것입니다!'\n\n독일에 추축국 구성원으로 가입하려는 우리의 요청이 수락되었습니다. 앞으로 다가올 격동의 시기에 그들의 전폭적인 지원을 기대할 수 있습니다."
 finland.31.a:0 "함께 전선을 사수하리라!"
 finland.32.t:0 "독일, 동맹 요청 거부"
 finland.32.d:0 "'우리의 영광스러운 세력에 가입하려는 귀국의 요청은 감사하지만, 하찮은 국가 하나 때문에 소비에트 연방을 자극하고 연합국을 더 도발할 이유는 없습니다.'\n\n추축국에 가입하려는 우리의 요청이 거부되었습니다. 독일 정부는 소비에트 연방이나 다른 주요 세력을 더는 적대하려 하지 않으며, 현재의 평화를 위태롭게 하지 않을 것입니다."
 finland.32.a:0 "또 다른 국가가 핀란드를 잊었군. 본때를 보여주겠다!"
 
 finland.333.t:0 "핀란드, 추축국 가입 희망"
 finland.333.d:0 "세계는 점점 더 불안정해지고 있습니다. 독일과 핀란드는 유럽에서 국가적 자긍심과 군사력의 보루로 남아 있으며, 이제 핀란드가 추축국에 가입할 것을 제안합니다.\n어떻게 회답하시겠습니까?"
 finland.333.a:0 "예"
 finland.333.b:0 "아니요"
 
 finland.355.t:0 "핀란드, 코민테른 가입 희망"
 finland.355.d:0 "세계는 점점 더 불안정해지고 있습니다. 소비에트 연방과 핀란드는 이 세계에서 프롤레타리아 세력의 몇 안 되는 보루 중 하나로 남아 있습니다. 이제 핀란드가 카리알라를 대가로 코민테른과 우리의 카렐리야 영토에 합류할 것을 제안합니다.\n어떻게 회답하시겠습니까?"
 finland.355.a:0 "예"
 finland.355.b:0 "아니요"
 
 finland.33.t:0 "소비에트 연방, 동맹 요청 수락"
 finland.33.d:0 "'우리 국가들이 협력을 거부할 때 얼마나 많은 것을 잃게 되는지는 역사가 증명했습니다. 우리는 동지를 친구로서뿐만 아니라 동무로서 환영하게 되어 자랑스럽습니다. 우리는 함께 자본주의와 파시스트 정서의 어둠에 잠식된 평등과 정의를 가져올 것입니다!'\n\n코민테른의 일원으로서 소련에 가입하려는 우리의 요청이 수락되었습니다. 앞으로 닥쳐올 격동의 시기에 그들의 전폭적인 지원을 기대할 수 있습니다."
 finland.33.a:0 "함께 혁명을 도웁시다!"
 finland.34.t:0 "소비에트 연방, 동맹 요청 거부"
 finland.34.d:0 "'우리의 영광스러운 혁명에 동참하려는 귀국의 요청은 감사하지만, 하찮은 나라 하나 때문에 다른 강대국들과의 관계를 악화시키고 긴장을 고조시킬 이유는 없습니다. '\n\n코민테른 가입 요청이 거부되었습니다. 소비에트 정부는 소비에트 연방이나 연합국을 적대시하거나 다른 세력을 자극할 위험을 감수할 의사가 없으며, 현재의 평화를 위태롭게 하지 않을 것입니다."
 finland.34.a:0 "또 다른 나라가 핀란드를 잊었군. 본때를 보여주겠다!"
 
  finland.920.t:0 "영국, 핀란드와의 동맹 수락"
 finland.920.d:0 "핀란드는 유럽의 안정에 대한 불특정한 위협을 이유로 영국에 공식 동맹을 요청했습니다.\n\n오늘 그들의 요청은 영국 의회에서 승인되었고, 핀란드는 [ENG.GetFactionName]에 가입했습니다."
 finland.920.a:0 "우리는 함께 맞설 것입니다."
 finland.920.b:0 "그들은 최악의 상황에 대비하고 있군."
 finland.920.c:0 "궁지에 몰린 쥐새끼들처럼 뭉치는군."
 finland.920.e:0 "영국이 운명을 함께하기로 했군."
 finland.921.t:0 "영국, 핀란드와의 동맹 거부"
 finland.921.d:0 "놀랍게도, 오늘 영국 의회는 두 국가 간의 공식 동맹에 대한 [FIN.GetName]의 요청을 거부했습니다. 제시된 이유는 이미 취약한 유럽 대륙의 균형을 뒤흔드는 것을 피하기 위함이었습니다.\n\n핀란드 정부는 이를 영국의 이익을 위해 핀란드의 안보를 희생시키는 정치적 행위라고 비난했습니다."
 finland.921.a:0 "좀 더 정중하게 요청했어야지."
 finland.921.b:0 "민주주의의 멍청이들이 분열되어 있군."
 finland.921.c:0 "핀란드에게는 암울한 날이다."
 
  finland.922.t:0 "제2차 칼마르 동맹"
 finland.922.d:0 "공동의 적에 대항하는 통일 전선을 구축하기 위해 [From.GetName]이 스웨덴에 접근하여 공동의 적에 맞서기 위한 "칼마르 동맹" 재결성을 제안했습니다. 방위 조약 참여 제안을 받았으나, 영국 총리는 영국이 해당 동맹을 '유럽 자유 수호에 유익하지 않다'고 간주한다는 입장을 분명히 했습니다. \n\n그럼에도 불구하고 핀란드는 위협을 느낄 수 있는 다른 국가들과 외교 관계를 수립했으며, 스칸디나비아의 외교 균형을 유지하고 미래의 분쟁을 방지하기 위해 단결을 촉구하고 있습니다. 그들의 성공 여부는 시간이 지나야 알 수 있을 것입니다."
 finland.922.a:0 "나중에 우리에게 와서 울고불고하지나 마시오!"
 finland.922.b:0 "Länge leve Kalmarunionen!"
 finland.922.c:0 "스칸디나비아가 위협이 되도록 내버려둬서는 안 됩니다."
 finland.922.e:0 "스칸디나비아는 파시스트와 공산주의 침략자들에 맞서 단결해야 합니다!"
 finland.922.f:0 "고조되는 유럽 긴장의 징조로군."
 
 
  finland.928.t:0 "독일, 핀란드의 추축국 가입 수락"
 finland.928.d:0 "핀란드가 유럽의 안정과 자국의 안보에 대한 불특정 위협을 이유로 독일에 공식 동맹을 요청했습니다.\n\n오늘 독일 총리가 이 요청을 승인했으며, 핀란드는 [GER.GetFactionName]에 가입했습니다."
 finland.928.a:0 "우리는 함께 맞선다."
 finland.928.b:0 "그들은 최악의 상황에 대비하고 있다."
 finland.928.c:0 "궁지에 몰린 쥐들처럼 뭉치는군."
 finland.928.e:0 "독일이 그들과 운명을 함께하기로 했다."
 finland.929.t:0 "독일, 핀란드와의 동맹 거부"
 finland.929.d:0 "놀랍게도, 오늘 독일 총리는 양국 간의 공식 동맹을 맺자는 [FIN.GetName]의 요청을 거부했습니다. 제시된 이유는 이미 불안정한 유럽 대륙의 균형을 뒤흔드는 것을 피하기 위함이었습니다.\n\n핀란드 정부는 이를 독일의 이익을 위해 핀란드의 안보를 희생시키는 정치적 행보라고 비난했습니다."
 finland.929.a:0 "좀 더 정중하게 요청했어야지."
 finland.929.b:0 "민주주의 바보들이 분열되어 있군."
 finland.929.c:0 "핀란드에겐 암울한 날이다."
 
   finland.998.t:0 "카리알라 협정"
 finland.998.d:0 "양국 간의 화해를 모색하며, 핀란드는 유럽의 안정과 자국의 안보에 대한 불특정 위협을 이유로 소련에 공식 동맹을 요청했습니다. 긴장을 더욱 완화하기 위해, 핀란드는 다수의 핀란드 소수민족이 거주하는 무르만스크와 오네가 주를 받는 대가로 카리알라를 소련에 할양하는 데 동의했습니다.\n\n오늘 소련 서기장이 이 협정을 승인했으며, 핀란드는 [SOV.GetFactionName]에 가입했습니다."
 finland.998.a:0 "우리는 함께 맞선다."
 finland.998.b:0 "그들은 최악의 상황에 대비하고 있다."
 finland.998.c:0 "궁지에 몰린 쥐들처럼 뭉치는군."
 finland.998.e:0 "소련이 그들과 운명을 함께하기로 했다."
 finland.999.t:0 "소련, 카리알라 협정 거부"
 finland.999.d:0 "놀랍게도, 소련 서기장은 양국 간의 공식 동맹을 맺자는 [FIN.GetName]의 요청을 거부했습니다. 제시된 이유는 카리알라 협정이 상호 이익이 되는 것이 아니라, 단지 핀란드의 국경을 확장하기 위한 방편으로 보였기 때문입니다."
 finland.999.a:0 "좀 더 정중하게 요청했어야지."
 finland.999.b:0 "공산주의 바보들이 분열되어 있군."
 finland.999.c:0 "혁명에겐 암울한 날이다."
 
 finland.952.t:0 "핀란드, 에스토니아 영토에 대한 영유권 주장 발표"
 finland.952.d:0 "발트해 연안의 핀란드인들에게 연설하며, [From.GetLeader]은(는) [EST.GetName] 내 핀란드어 사용 지역을 [From.GetName]의 정당한 일부로 간주한다고 발표했습니다. [From.GetLeader]은(는) 또한 에스토니아 지역의 전략적 중요성을 언급하며, 핀란드 아래 양국을 통합함으로써 더 많은 사람을 외부의 더 큰 위협으로부터 보호할 수 있다고 주장합니다. \n\n공식 성명은 이러한 주장을 뒷받침하며, 필요하다면 [From.GetName]이 무력으로 영토를 점령할 준비가 되어 있음을 분명히 했습니다."
 finland.952.a:0 "그곳은 핀란드 땅이 아니라 에스토니아 땅이다!"
 finland.952.b:0 "그들은 이 지역의 이미 불안정한 균형을 뒤흔들고 있다."
 finland.952.c:0 "저 영토는 에스토니아보다 핀란드에 더 가까워 보인다."
 
 
