 GER_paratroop_tt:0 "추가로 §Y6개 공수부대§! 사단을 모집할 수 있게 됩니다."
 GER_paratroop:0 "팔슈름예거 확장"
 GER_paratroop_desc:0 "적진 후방에 보병을 배치하여 주요 거점을 확보하는 능력은 미래전의 핵심입니다. 더 많은 팔슈름예거 사단을 모집하는 것은 제국에 이익이 될 뿐입니다."
 VIC_africa_corps_3_tt:0 "§Y프랑스국§! 수정:\n안정도: §G+5.0%§!\n전쟁 지지도: §G+5.0%§!"
 VIC_africa_corps_3:0 "정통 프랑스"
 VIC_africa_corps_3_desc:0 "우리가 유일한 진정한 프랑스입니다."
 VIC_Installing_Patriotism:0 "애국심 고취"
 VIC_Installing_Patriotism_desc:0 "프랑스 국민은 자랑스러워할 것이 많지만, 먼저 자랑스러워하는 법을 배워야 합니다."
 VIC_mainland_defense:0 "본토 집중"
 VIC_mainland_defense_desc:0 "아프리카는 우리에게 너무 큰 부담입니다. 우리는 알제리를 포기할 준비를 해야 합니다."
 VIC_mainland_defense_2:0 "요새 마르세유"
 VIC_mainland_defense_2_desc:0 "마르세유는 지중해에서 프랑스로 들어오는 주요 병참 경로입니다. 이곳이 미래에 프랑스 침공이 일어날 장소이므로, 우리는 이곳에 방어 노력을 집중할 것입니다."
 VIC_africa_corps:0 "알제리 방벽"
 VIC_africa_corps_desc:0 "알제리는 툴루즈나 마르세유와 마찬가지로 프랑스 본토의 일부입니다. 이곳은 외국의 침공에 맞서는 우리의 남부 방어선입니다."
 ALLIES_resist:0 "귀향"
 ALLIES_resist_desc:0 "해방의 시간이 다가오고 있습니다. 우리는 집으로 돌아갈 것입니다."
 GER_abwehr:0 "아프베어 재편성"
 GER_abwehr_desc:0 "라인란트를 확고히 장악한 지금, 베르사유의 족쇄는 나날이 느슨해지는 것 같습니다. 계속해서 조약을 무너뜨리고, 아프베어를 진정한 정보 기관으로 재편성합시다."
 GER_abwehr2:0 "해외 작전 확장"
 GER_abwehr2_desc:0 "내부 문제만으로는 한계가 있습니다. 우리의 광범위한 동맹 네트워크를 통해 유용한 정보 요원을 찾아낼 수 있을 것입니다."
 GER_transports:0 "마리네페르프람 건조"
 GER_transports_desc:0 "성공적인 상륙 작전을 개시하기 위해 상륙정을 현대화해야 합니다."
 ALLIES_sov_def:0 "종심 방어"
 ALLIES_sov_def_desc:0 "종심 방어(심층 방어 또는 탄력 방어라고도 함)는 공격자의 진격을 막기보다는 지연시켜 공간을 내주는 대가로 시간을 벌고 추가적인 사상자를 유발하려는 군사 전략입니다."
 ALLIES_friends_near_and_afar:0 "가깝고도 먼 친구"
 ALLIES_friends_near_and_afar_desc:0 "우리는 힘과 지원을 얻기 위해 직속 동맹국 너머를 바라봐야 합니다..."
 ALLIES_sov_factory:0 "5개년 계획 시작"
 ALLIES_sov_factory_desc:0 "소련의 경제 계획을 본떴지만 자본주의 체제 내에서 '5개년 계획'을 시작할 것입니다."
 ALLIES_preparations:0 "군사 준비"
 ALLIES_preparations_desc:0 "수많은 침공 시나리오에 대한 워게임을 실시할 것입니다."
 ALLIES_go_it_alone:0 "가까운 친구"
 ALLIES_go_it_alone_desc:0 "우리가 다른 국가들과 동맹을 맺고 있다 하더라도, 우리 군이 그들의 군과 상호 교환 가능하다는 의미는 아닙니다. 육군, 해군, 공군은 외국의 군사 기획자들과 독립적으로 작전을 수행할 것입니다."
 ALLIES_soviet_aid:0 "먼 친구"
 ALLIES_soviet_aid_desc:0 "소련식 계획과 조직은 이를 실행할 위험을 감수하려는 국가들에게 큰 이점을 제공하는 것 같습니다. 우리는 소련을 본보기로 삼아야 합니다."
 ALLIES_paramil:0 "충성스러운 준군사조직"
 ALLIES_paramil_desc:0 "강력한 준군사조직을 구축하면 우리 군을 보완하고, 외국 침략자에 저항할 준비가 된 훈련된 인구의 비율을 높일 수 있습니다."
 AXIS_ita_patron:0 "이탈리아 코포라티즘"
 AXIS_ita_patron_desc:0 "이탈리아의 파시스트 노동조합은 노동자로부터 시작하여 우리 사회를 건설하는 상향식 모델을 제공합니다."
 AXIS_ita_patron_1:0 "이탈리아 방어 교리"
 AXIS_ita_patron_1_desc:0 "요새화는 최선의 방어 수단입니다."
 AXIS_ger_patron_1:0 "힘보다 지략"
 AXIS_ger_patron_1_desc:0 "전장을 승리로 이끄는 것은 양보다 질, 방법보다 결과입니다."

 AXIS_ita_patron_3:0 "정시 운행 열차"
 AXIS_ita_patron_3_desc:0 "우리의 한심한 철도망을 정비하여 열차를 정시에 운행하도록 만들 것입니다!"
 AXIS_ita_patron_4:0 "제해권"
 AXIS_ita_patron_4_desc:0 "해전에서의 승리는 지상전의 승리로도 이어질 것입니다."
 AXIS_ita_patron_2:0 "파시스트 민병대"
 AXIS_ita_patron_2_desc:0 "파시즘이 풀뿌리 정치 운동인 것처럼, 우리는 인민이 무기를 들고 적에게 맞서도록 의지할 것입니다!"
 AXIS_ger_patron_3:0 "비상 연료 비축"
 AXIS_ger_patron_3_desc:0 "연료는 현대전의 핵심 자원입니다. 반드시 비축해야 합니다."
 AXIS_ger_patron_4:0 "늑대 떼 전술"
 AXIS_ger_patron_4_desc:0 "우리 해군은 늑대 떼처럼 움직이며 유리한 목표를 타격해야 합니다."
 AXIS_ger_patron_2:0 "공수부대 확장"
 AXIS_ger_patron_2_desc:0 "공수부대는 새로운 군사 전술의 최첨단입니다. 결정적인 우위를 점하기 위해 공수부대 확장에 투자해야 합니다."
 AXIS_ger_patron_2_tt:0 "모집 가능한 공수 사단 수가 §C1§!만큼 증가합니다."
 AXIS_ger_patron:0 "독일의 광신"
 AXIS_ger_patron_desc:0 "독일 국민은 히틀러 휘하의 국가사회주의자들에게 구애받고 흔들렸습니다. 유사한 방법을 사용하여 우리 국가에도 동일한 이념적 광신을 재현할 수 있습니다."
 AXIS_jap_patron:0 "쇼와 국가주의"
 AXIS_jap_patron_desc:0 "일본인들은 천황을 살아있는 신처럼 숭배하며, 안정적이고 동질적인 사회를 만듭니다."
 AXIS_jap_patron_4:0 "결전"
 AXIS_jap_patron_4_desc:0 "우리의 해군 생산량과 함대는 여러 전투를 치르기에는 너무 작습니다. 최선의 행동 방침은 적을 상대로 단 한 번의 결정적인 전투에서 승리하는 것입니다."
 AXIS_jap_patron_3:0 "일본의 조선소 전문 기술"
 AXIS_jap_patron_3_desc:0 "영광스러운 해군을 건설하기 위해서는 조선소를 건설해야 합니다. 일본이 이 분야에서 좋은 본보기를 보이는 것 같습니다."
 AXIS_jap_patron_2:0 "일본 특공대 훈련"
 AXIS_jap_patron_2_desc:0 "일본 특수부대는 그들의 회복력으로 유명합니다. 마침 일본 무관이 주재하고 있으니 다행입니다."
 AXIS_jap_patron_1:0 "현지 조달"
 AXIS_jap_patron_1_desc:0 "일본 부대는 종종 적 보급선 깊숙이 들어가 제대로 보급받지 못하지만, 그들은 계속 싸우며 가진 것으로 버텨냅니다. 만약 우리가 적 영토에서 물자를 조달하는 법을 배운다면, 우리 군은 이전에 가능하다고 생각했던 것보다 더 오래, 더 깊이 싸울 수 있을 것입니다."
 AXIS_pact_of_steel:0 "강철 조약"
 AXIS_pact_of_steel_desc:0 "독일의 지도 아래 우리 국가를 새로운 경지로 이끌 것입니다."
 AXIS_joint_training_program:0 "독일과의 합동 훈련"
 AXIS_joint_training_program_desc:0 "독일과 군사 훈련을 실시하면 우리의 준비 태세가 향상될 것입니다."

