 JAP_CHI_exploit_chinese_wealth_desc:0 ""
 
 ##### HOKUSHIN-RON DOCTRINE BRANCH
 JAP_hokushin_ron_doctrine:0 "북진론\n교리"
 JAP_hokushin_ron_doctrine_EXPL1:0 "\n§H북진론§! 교리는 §H황도파§!에 의해 §C추진§!됩니다. §H통제파§!와 손을 잡고 이 교리를 따를 경우, 다음과 같은 §R효과§!가 발생합니다:\n"
 JAP_hokushin_ron_doctrine_EXPL2:0 "\n당신은 §H남진론§! 교리를 추진하는 §H통제파§!와 손을 잡았습니다. 따라서 남진론을 완료하기 전에 이 중점을 선택하면 다음과 같은 §R효과§!가 발생합니다:\n"
 JAP_hokushin_ron_doctrine_desc:0 "북진론은 만주와 시베리아가 일본의 세력권이며, 해당 지역에서의 경제적, 영토적 팽창이 일본에 가져다줄 잠재적 가치가 다른 어느 곳보다 크다고 주장하는 군사적, 정치적 교리입니다."
 
 ##### CHI ALLY BRANCH
 JAP_CHI_ishiwaras_east_asian_league_dream:0 "이시와라의 동아연맹의 꿈"
 JAP_CHI_ishiwaras_east_asian_league_dream_desc:0 ""
 JAP_CHI_concessions_to_china:0 "중국에 대한 양보"
 JAP_CHI_concessions_to_china_desc:0 "외몽골에 우리의 괴뢰국을 확고히 수립한 몽강 협정은 1935년 이래로 예상치 못하게 개선되던 국민당 중국과의 관계를 다시금 악화시켰습니다. 이 작전이 우리 군의 궁극적인 승리였음에도 불구하고, 우리는 이 성공을 포기하고 외몽골을 국민당에 반환해야 합니다. 그렇게 하면 다시 한번 그들의 호의를 얻을 수 있을 것입니다."
 JAP_CHI_get_rid_of_chiang_kai_shek:0 "장제스를 제거하라"
 JAP_CHI_get_rid_of_chiang_kai_shek_EXPL:0 "만약 그들의 §R안정도§!가 §R50%§! 미만이라면, 이 중점은 다음과 같은 §R효과§!도 가집니다:\n"
 JAP_CHI_get_rid_of_chiang_kai_shek_desc:0 "장제스의 통치는 거의 완전한 독재로 간주될 수 있지만, 그는 오랫동안 더 유연한 왕징웨이의 반대에 부딪혀 왔습니다. 만약 우리가 중국인들을 설득하여 장제스에게 작은 사고를 주선할 수 있다면, 왕징웨이가 중국의 총통으로서 그의 자리를 계승할 수 있을 것입니다. 이는 분명 우리의 미래 협력을 용이하게 할 것입니다."
 JAP_CHI_non_aggression_pact_with_china:0 "중국과 불가침 조약 체결"
 JAP_CHI_non_aggression_pact_with_china_desc:0 ""
 JAP_CHI_pact_of_silk:0 "비단 조약"
 JAP_CHI_pact_of_silk_EXPL1:0 "민병대 사단 §H24§!개 획득.\n"
 JAP_CHI_pact_of_silk_desc:0 ""
 JAP_CHI_expand_zaibatsus_influence_in_china:0 "중국 내 재벌 영향력 확장"
 JAP_CHI_expand_zaibatsus_influence_in_china_desc:0 ""
 JAP_CHI_sino_japanese_military_mission:0 "중일 군사 사절단"
 JAP_CHI_sino_japanese_military_mission_desc:0 ""
 JAP_CHI_kick_up_chinese_shipbuilding_industry:0 "중국 조선 산업 활성화"
 JAP_CHI_kick_up_chinese_shipbuilding_industry_desc:0 "이제 우리는 중국인들과 피를 나누었으니, 그들의 해군이 최소한 자국 해안을 보호할 능력을 갖추도록 보장해야 합니다. 그리고 우리의 해군 경험은 의심할 여지 없이 유용할 것입니다."
