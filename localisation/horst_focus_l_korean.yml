 r56_raj.1.t:0 "린리스고 경의 임명"
 r56_raj.1.d:0 "제22대 인도 총독 겸 부왕인 프리먼 프리먼토머스 윌링던이 새로 임명된 빅터 호프 린리스고로 교체되었으며, 그는 곧 제23대 인도 총독으로 취임할 것입니다. 그는 동시대인들에게 야심 차고 포부가 큰 정치인으로 묘사되었으며, 초대 호주 총독이었던 아버지로부터 정치적 열정을 물려받았습니다. 전 세계는 그의 총독 임기가 인도 아대륙에 어떤 영향을 미칠지 궁금해하며 인도를 주시하고 있습니다."
 r56_raj.1.a:0 "알겠습니다."
 
 r56_raj.2.t:0 "총독의 마지막 시간"
 r56_raj.2.desc:0 "지난 5년은 총독에게 힘든 시간이었습니다. 시민 소요가 끊이지 않았던 시기였지만, 윌링던 경은 봄베이 총독 시절 이러한 운동을 다룬 풍부한 경험이 있어 이에 익숙했습니다. 상부의 명령은 협력이 목표라고 명시했지만, 이는 오직 인도 제국의 법적 틀 안에서 활동하는 이들에게만 해당되었습니다. 이 임무에 따라 그는 대대적인 투옥을 감행했고, 이는 오늘날까지도 그의 인기에 걸림돌이 되고 있습니다. 그럼에도 그는 인도 국민의 생각과 무관하게 인도에서의 시간을 전체적으로 긍정적으로 회고했습니다. 하지만 이전의 모든 총독의 통치가 끝나야 했듯이, 그의 통치도 막을 내립니다."
 r56_raj.2.a:0 "후임자에게 행운을. 필요할 것이다."
 
 r56_raj.3.t:0 "아치볼드 웨이벌의 임명"
 r56_raj.3.d:0 "린리스고 경은 총독 겸 부왕으로 임명되었을 때 쉬운 임무를 맡은 것이 아니었습니다. 대중의 불만은 꾸준히 커져갔고, 1937년 지방 선거로 이어진 몇 가지 정치적 양보로 잠시 멈출 수 있었을 뿐입니다. 인도인의 높은 참여에 따라 가장 유능한 정치인 다수가 내각에 초청되어, 역사상 처음으로 영국인 관료의 수를 넘어섰습니다. 하지만 윌링던 경의 통치가 끝나야 했듯이, 린리스고의 통치도 막을 내립니다."
 r56_raj.3.a:0 "새로운 상관을 맞이하라..."
 
 r56_raj.4.t:0 "루이 마운트배튼의 임명"
 r56_raj.4.d:0 "웨이벌의 노력은 대부분의 인도 정치인들에게 고귀한 것으로 여겨졌으나, 런던에 의해 제지되었습니다. 델리의 총독 관저에 도착한 직후 그는 벵골의 식량 공급을 다소 완화하기 위해 노력했습니다. 그는 또한 저명한 인도 정치 지도자들과 자치를 논의한 최초의 총독 겸 인도 총독이었지만, 많은 이들의 실망스럽게도 이러한 노력은 어떤 대가를 치르더라도 인도를 붙잡고 싶어 하는 런던에 의해 약화되었습니다."
 r56_raj.4.i:0 "웨이벌의 노력은 대부분의 인도 정치인들에게 고귀한 것으로 여겨졌으나, 런던에 의해 제지되었습니다. 델리의 전 총독 관저에 도착한 직후 그는 벵골의 식량 공급을 다소 완화하기 위해 노력했습니다. 그는 인도 정부에 매우 협조적이었으며 런던에 있는 군주의 충실한 대표자였습니다. 물론 제국만큼이나 오래된 이야기지만, 그는 루이 마운트배튼으로 교체될 것입니다."
 r56_raj.4.a:0 "...전임자와 다를 바 없군"
 
 r56_raj.101.t:0 "지방 선거 종결"
 r56_raj.101.desc:0 "제국 입법 평의회가 재편성되고 새로 선출된 대표 및 야당 의원들이 이제 우리 입법부를 장악하여, 이 의회를 통해 우리의 의지를 관철하기가 더 어려워졌기에, 총독이 꽤 오랫동안 두려워하던 날이었습니다."
 r56_raj.101.a:0 "인도의 새로운 새벽."
 
 r56_raj.102.t:0 "철도 확장법 통과"
 r56_raj.102.d:0 "델리 정부 청사에서 몇 달간의 지친 토론 끝에, 총독은 인도 아대륙 전체에 걸쳐 영광스럽고 현대적이며 효율적인 철도를 건설하는 데 막대한 자금이 할당될 것이라고 자랑스럽게 발표합니다."
 r56_raj.102.a:0 "당장 기차표를 예매해야겠군!"
 
 r56_raj.103.t:0 "철도 확장법 부결"
 r56_raj.103.d:0 "총독은 이 젠장맞을 법안을 통과시키기 위해 오랫동안 열심히 싸웠지만, 안타깝게도 제국 입법 평의회에서 지지를 확보하지 못했습니다. 그는 마지못해 법안의 실패를 인정하는 연설을 할 것으로 예상됩니다."
 r56_raj.103.a:0 "표를 사기 전에 기다려야겠군."
 
 r56_raj.104.t:0 "농업 안정화법 통과"
 r56_raj.104.d:0 "이 법은 인도의 잦은 기근에 종지부를 찍는 것으로 칭송받았으며, 총독은 그 장점을 확실히 강조했습니다. 이 때문에 힌두교도 및 무슬림 의원들의 지지가 압도적이었고 법안은 상당히 쉽게 통과되었습니다."
 r56_raj.104.a:0 "인도가 안도의 한숨을 내쉽니다."
 
 r56_raj.105.t:0 "농업 안정화법 부결"
 r56_raj.105.d:0 "이 법은 기근을 예방하기 위한 혁명적인 조치로 여겨졌고 대부분의 인도인들을 실망시켰지만, 제국 입법부의 회의장에서 법으로 통과될 만큼 충분한 지지를 얻지 못했습니다.\n이미 수립된 가뭄 예방 개선 계획은 이제 폐기되었습니다."
 r56_raj.105.a:0 "슬픈 상황이로군."
 
 r56_raj.106.t:0 "교육 개혁법 통과"
 r56_raj.106.d:0 "인도의 가장 똑똑하고 재능 있는 인재들은 고향 땅을 뒤로한 채 최고의 교육을 받기 위해 오랫동안 브리튼 제도로 이주해 왔습니다. 총독은 오랫동안 지식인들이 진정으로 번성할 수 있는 사회를 만드는 것의 중요성을 강조해 왔으며, 우리 학교와 대학 시스템의 개혁은 그 목표를 향한 논리적인 첫걸음입니다."
 r56_raj.106.a:0 "우리 앞에 빛나는 미래가 놓여 있습니다."
 
 r56_raj.107.t:0 "교육 개혁법 부결"
 r56_raj.107.d:0 "교육 개혁법이 그토록 많은 것을 약속했음에도 불구하고 가슴 아픈 패배로 이어진 원인은 명확하지 않습니다. 하지만 한 가지는 분명합니다. 교육이라는 주제에 대해 총독의 손이 묶일 것이라는 점입니다. 인도는 어땠을지 궁금해합니다."
 r56_raj.107.a:0 "그럼 런던으로 가야겠군."
 
 r56_raj.108.t:0 "보험법 통과"
 r56_raj.108.d:0 "인도는 종종 다른 많은 농업 중심의 저개발 경제와 비교됩니다. 이는 주로 도시화 및 산업화에 대한 미미한 지원에 기인합니다. 그러나 우리 시장에 대한 해외 투자는 우리 경제 성장을 가속하는 데 도움이 될 수 있습니다. 이로 인해 많은 야당 의원들이 이 획기적인 법안을 지지하기 위해 모여들었습니다."
 r56_raj.108.a:0 "사업을 시작할 준비가 되었습니다."
 
 r56_raj.109.t:0 "보험법 부결"
 r56_raj.109.d:0 "농업 중심의 아대륙에 대한 추가적인 전 세계적 투자를 허용하는 획기적인 법안이 될 예정이었던 것이 우리 입법부를 통과하는 데 극적으로 실패했습니다. 총독은 이 법안에 많은 시간과 노력을 투자했지만 많은 야당 의원들에게 그 장점을 설득하는 데 실패했습니다. 투자를 갈망하던 외국의 관측통들은 이제 한 발 물러서서, 오히려 더 안정적인 시장에 자본을 투자하려고 합니다."
 r56_raj.109.a:0 "내 사업은 기다려야겠군."
 
 r56_raj.110.t:0 "전쟁 권한법 통과"
 r56_raj.110.d:0 "독일의 Bf 110 전투기가 영국 시골을 휩쓸자 본토 제도에 필요한 것은 제국이라는 것이 분명해졌습니다. 그리고 우리의 가장 명예로운 입법 평의회에서 전쟁 권한법이 최근 성공한 덕분에 제국이 응답한 것 같습니다. 인도 행정부는 이제 제2차 세계 대전에 훨씬 더 큰 자산을 투입할 수 있게 될 것입니다."
 r56_raj.110.a:0 "전쟁터로 가자!"
 
 r56_raj.111.t:0 "전쟁 권한법 부결"
 r56_raj.111.d:0 "이 법은 힌두교도와 무슬림 모두에게 설득하기 어려운 것이었습니다. 그들은 협의나 아주 약간의 고려도 없이 이 전쟁에 끌려 들어왔으며, 이제 막 대부분 선출된 제국 입법부가 전시 행정부의 권한 확대에 반대 투표를 할 것이라고 많은 이들이 예측했습니다."
 r56_raj.111.a:0 "런던은 어떻게 생각할까?"
  
 r56_raj.112.t:0 "입법부와의 회의"
 r56_raj.112.d:0 "제국 입법 평의회 의원 대부분은 임명직이지만, 그들의 충성심은 총독뿐만 아니라 그들의 개인적인 이익과 선거 자금을 공급하는 사람들에게도 향해 있습니다. 그럼에도 불구하고 평의회와의 회의는 행정부의 많은 미래 계획을 논의하고 이미 일부 지지를 확보했기 때문에 전혀 비생산적이지 않았습니다. 물론 약속과는 거리가 멀지만, 린리스고 행정부가 생산적이기를 바란다면 우리는 그 표가 필요할 것입니다."
 r56_raj.112.a:0 "언젠가 이곳을 휘어잡고 말 것입니다."
 
 r56_raj.113.t:0 "사법부와의 만남"
 r56_raj.113.d:0 "인도의 법률 체계는 수많은 지방 하급 법원 때문에 외부인이 파악하기에는 언제나 어려웠습니다. 하지만 런던에 위치한 추밀원이 손쉬운 첫 접촉 지점이 될 것입니다. 추밀원은 모든 문제에 대한 최종 결정권을 가지고 있지만, 인도 문제에 관여하는 일은 드뭅니다. 우리의 두 번째 목표는 각 주에서 막강한 권력을 쥐고 있는 현지 고등 법원과 만나는 것입니다. 그들의 충성을 확보하기 위해 할 수 있는 모든 일이 최우선 순위가 될 것입니다."
 r56_raj.113.a:0 "뒤얽힌 그물망."
 
 r56_raj.114.t:0 "최우선 처리 안건"
 r56_raj.114.d:0 "입법부와 사법부의 인맥을 확보했으니, 이제 어디서부터 노력을 시작할지 선택해야 합니다. 내각은 철도 체계 확장 또는 식량 공급 안정화라는 두 가지 가능성을 제시했으며, 우리가 무엇을 먼저 선택하든 인도에 중요할 것입니다."
 r56_raj.114.a:0 "수송 체계는 절실히 개혁이 필요합니다."
 r56_raj.114.b:0 "우리의 농업 상황은 심각합니다."
 r56_raj.114.c:0 "대신 이 전쟁에 집중해야 합니다!"
 
 r56_raj.115.t:0 "산업노동부"
 r56_raj.115.d:0 "어떤 이들은 산업부 장관이 어느 행정부에서나 가장 강력한 각료 중 한 명이라고 말하므로, 우리는 누가 그 직책에 적합한지 신중하게 고려해야 합니다."
 r56_raj.115.a:0 "신중하게 접근합시다."
 r56_raj.115.b:0 "나라에서 최고의 경제학자들을 찾으시오."
 
 r56_raj.116.t:0 "국방군수부"
 r56_raj.116.d:0 "전 세계의 긴장이 고조됨에 따라 언제라도 전쟁이 발발할 수 있으니, 우리는 그 임무에 걸맞은 국방부 장관을 두어야 합니다."
 r56_raj.116.a:0 "지주와 함께라면 동원력을 강화할 것입니다."
 r56_raj.116.b:0 "전쟁 기계를 구축할 산업가가 필요합니다."

 r56_raj.117.t:0 "보건교육국토부"
 r56_raj.117.d:0 "다른 부처들이 산업 발전과 징집 수치를 늘리는 데 주력하는 동안, 사회 부처들은 인도의 심장을 채우는 역할을 하므로 그에 맞게 대우받아야 합니다."
 r56_raj.117.a:0 "보수적인 선택."
 r56_raj.117.b:0 "진보적인 선택."
 
 RAJ_agricultural_shipments:0 "농산물 수송"
 RAJ_agricultural_shipments_desc:0 "우리는 이 매우 어려운 시기에 인도에 식량을 공급하는 의무를 다했습니다. 구해낸 생명은 아마 수백만에 달할 것이며, 다른 건 몰라도 이는 우리에게 다른 국가들 사이에서 큰 위신을 세워줍니다."

