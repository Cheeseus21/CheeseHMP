  SIA_France_restore_order_in_indochina_desc:0 "인도차이나에서 프랑스 행정부를 몰아내려는 대규모 공산주의 봉기가 발발했습니다. 이들은 중무장했으며 시암의 지원을 받고 있습니다. 우리 식민지의 통제권을 되찾는 것이 시급합니다"

