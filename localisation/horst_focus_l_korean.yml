 JAP_CHI_kick_up_chinese_shipbuilding_industry:0 "중국 조선 산업 활성화"
 JAP_CHI_kick_up_chinese_shipbuilding_industry_desc:0 "이제 우리가 중국인들과 피를 나누었으니, 그들의 해군이 최소한 자국 해안을 보호할 수 있도록 보장해야 합니다. 그리고 우리의 해군 경험은 의심할 여지 없이 유용할 것입니다."
