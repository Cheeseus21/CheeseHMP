RAJ_Joint_Indo_Soviet_Railways_desc:0 "국제적 협력과 협동의 정신에 입각하여, [RAJ.GetNameDef]와 [SOV.GetNameDef]는 공동 철도 사업에 착수하기 위해 힘을 합칠 것입니다. 이 사업은 양국을 연결하고 경제 성장과 발전을 촉진할 철도 체계망을 구축하는 광범위하고 장기적인 노력이 될 것입니다. 이 공동의 노력은 양국 간의 오랜 상호 호혜적인 관계를 더욱 강화하고, 모두를 위한 더 밝은 미래라는 공동의 목표에 더 가까이 다가가게 할 것입니다. 현재 상호 번영의 길에 놓인 유일한 장애물은 [AFG.GetNameDef]의 정치 상황이지만, 외교적 압력으로 그 불안을 확실히 잠재울 수 있을 것입니다."
