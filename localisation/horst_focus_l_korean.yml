 RAJ_provincial_election_countdown:0 "주의회 선거 종료"
 RAJ_provincial_election_countdown_desc:0 "곧 주의회 선거가 끝나겠지만 인도인들의 상황은 조금도 나아지지 않을 것입니다. 이번 선거는 현지 정당에게 총독에 대항할 실질적인 권력을 부여하지 않습니다. 이 암담한 사실은 우리 인구의 호전적인 세력을 반란으로 이끌 수 있으므로, 신중하게 대처해야 합니다."
 english_departure:0 "§Y인도 국기§!가 붉은 요새 위에 게양되고 §Y인도는 자유를 얻습니다§!."
 india.intro.t:0 "인도 주의회 선거 시작"
 india.intro.desc:0 "불과 1년 전, 제국 입법 위원회는 영국령 인도 제국의 행정 구조를 개편하는 획기적인 조치를 취했습니다. 여러 조치 중에서도 특히 인도의 첫 총선거를 규정했습니다. 투표권은 여전히 제한적이고 지주들이 막강한 권력을 유지하고 있지만, 이는 민주주의를 향한 첫걸음입니다. 인도에서 민주적 권리를 처음으로 행사하는 이 선거에 참여하려는 정치 세력은 매우 다양하여 인도 시민들은 선택의 폭이 넓습니다. 하지만 이 일생일대의 정치적 대사건의 결과는 어떻게 될까요? 영국이 통치 지위를 공고히 할 것인가? 아니면 급진파가 인도를 독립으로 이끌 것인가? 오직 시간만이 답을 알려줄 것입니다."
 india.intro.a:0 "영국의 통치는 협상의 대상이 아니다."
 india.intro.b:0 "이 억압은 너무 오랫동안 계속되었습니다!"
 india.intro.c:0 "제국주의 앞에서 선거주의는 무력합니다."
 
 india.1.t:0 "대영제국, 아덴 장악"
 india.1.desc:0 "아덴 항구는 인도, 유럽, 극동 간의 무역에서 가장 중요한 항구 중 하나입니다. 1935년 인도 통치법에는 이전에 최고 행정관 관할주로 관리되던 이 항구의 통제권을 런던 정부로 직접 이관하는 내용이 포함되어 있었습니다. 이제 영국 정부가 공식적으로 항구를 장악하고 별도의 식민지로 설립했습니다."
 india.1.a:0 "계획대로다."

 india.4.t:0 "1937년 인도 주의회 선거 종료"
 india.4.desc:0 "1년간의 선거 운동 끝에, 인도의 미래에 대한 영향력을 확보하기 위해 세 주요 정당이 용감하게 싸웠습니다. 하지만 오직 한 정당만이 과반수를 확보하기에 충분한 주에서 광범위한 지지를 얻었습니다. 앞으로 닥쳐올 모든 위협으로부터 인도의 미래를 돌보고 시민을 보호하는 것이 그들의 의무가 될 것입니다."
 india.4.a:0 "인도 국민회의가 선거에서 승리했습니다!"
 india.4.b:0 "연합당이 선거에서 승리했습니다!"
 india.4.c:0 "독립노동당이 선거에서 승리했습니다!"

 r56_raj.5.t:0 "자유 인도 선포"
 r56_raj.5.d:0 "수바스 찬드라 보스는 오랫동안, 특히 벵골 지역에서 대영 제국으로부터의 무장 독립을 위한 지지를 구축해왔고, 이제 그 긴장이 극에 달해 아자드 힌드는 현재 영국령 라지와 전쟁 상태에 놓였습니다. 인도인들은 이 봉기에 대해 엇갈린 반응을 보이는 듯합니다. 일부는 정부의 권위주의적 성격을 비판하는 반면, 일부는 인도 독립의 목표를 진전시켰다고 칭찬합니다.\n\n영국령 라지는 이제 이 반란에 대한 적절한 방어를 구축하기 위해 안간힘을 쓰고 있지만, 이미 사보타주 행위가 행정부를 괴롭힐 것으로 예상됩니다. [ENG.GetLeader]은(는) 이미 이 반란을 진압하는 데 있어 영국령 라지에 대한 일방적인 지지를 선언했습니다."
 r56_raj.5.a:0 "마침내, 자유 인도를."
 r56_raj.5.b:0 "사소한 꿈이로군."
 r56_raj.5.c:0 "대영 제국에 흠집이 났군."
 
 r56_raj.6.t:0 "인도 국민군 재판에 대한 대규모 시위"
 r56_raj.6.d:0 "불법적인 '자유 인도'를 위해 싸운 인도 국민군의 사실상 패배 이후, 가담자들은 선동과 전쟁 범죄 혐의로 재판을 받고 있습니다. 이는 물론 자치 또는 '스와라지'라는 사소한 이념에 매달리는 유치한 반란의 당연한 결과입니다. 그러나 인도인들의 반응은 우리에게 유리하지 않습니다. 모든 주요 도시에서 특히 인도 국민회의가 조직한 시위가 벌어졌으며, 그 구성원들은 전범들을 변호하기도 했습니다. 시위는 전국으로 확산되어 영국령 라지를 크게 불안정하게 만들고 있습니다."
 r56_raj.6.a:0 "이 폭동을 진압하라."
 
 r56_raj.7.t:0 "버마 민족 자결 요구"
 r56_raj.7.d:0 "찌는 듯한 버마 정글에서의 전투는 혹독했고, 이 지역 출신의 많은 군인이 용감하게 목숨을 바쳤습니다. 살아남은 동포들은 버마가 인도에서 분리되되 자유 인도와 동맹을 맺는 국가를 형성해야 한다는 목소리를 높이고 있습니다. 그들의 요구는 받아들여질까요?"
 r56_raj.7.a:0 "현 상황이 우리에게 유리하다."
 r56_raj.7.b:0 "괴뢰 정부를 세우는 것이 좋겠다."
 r56_raj.7.c:0 "우리는 진정으로 자유로운 버마를 건설할 것이다."
 india.2.t:0 "1937년 인도 관구 선거"
 india.2.desc:0 "총선에 참여하는 정당들은 정치 스펙트럼 전반에 흩어져 있으며, 인도의 미래가 걸려 있습니다.\n\n 통치할 기회를 잡는 자는 누구든 분열된 아대륙의 험난한 미래를 헤쳐나가야 하는 어려운 의무를 지게 됩니다."
 india.2.a:0 "인도 국민회의가 우리 민족을 전진시킬 것입니다."
 india.2.b:0 "연합당이 우리를 자치령 지위로 격상시킬 것입니다."
 india.2.c:0 "우리는 착취에서 벗어나기 위해 독립노동당이 필요합니다."
 raj_election_start:0 "§Y지역 영향력 증대§! 디시전이 해제됩니다. 이 디시전으로 §Y주§!에서 과반을 확보해야 합니다.\n\n가장 많은 주를 §Y장악§!한 §Y정당§!이 §G정부를 구성§!하게 됩니다."
 
 india.5.t:0 "인도 관구 선거 종료"
 india.5.d:0 "이번 주, [RAJ.GetLeader]이(가) 오랫동안 기다려온 첫 인도 총선 결과를 발표했습니다. 수많은 정당과 운동이 정치 투쟁에 참여했지만, 오직 하나만이 정상에 올랐습니다.\n[RAJ.GetElectionNews]"
 india.5.a:0 "독립을 향한 중요한 진전이군."
 india.5.b:0 "헛된 노력이군."
 india.5.c:0 "행운을 비네, 동지들."
 india.5.e:0 "민주주의가 작동하고 있군."
 india.5.f:0 "흥미롭군."
 
 india.6.t:0 "인도, 독립을 쟁취하다"
 india.6.d:0 "마지막 영국 수송선단이 항구에 도착해 남은 보급품을 모두 영국 해군 함선 '조직'호에 싣고 떠나자, 인도는 안도의 한숨을 내쉬었습니다. 국왕의 왕관에 박힌 보석이었던 시절은 끝났으며, 이제 인도 원주민들은 영국령 인도의 폐허 위에서 재건을 시작합니다.\n\n아대륙의 수많은 종교적, 언어적, 문화적 소수 집단을 고려하면 얼마나 많은 것을 재건해야 할지는 자명해 보입니다. 그럼에도 불구하고, 인도는 의심의 여지 없이 이 상처를 치유하고 자신감 있게 미래로 나아갈 것입니다."
 india.6.d.alt:0 "마지막 영국 수송선단이 항구에 도착해 남은 보급품을 모두 떠나는 영국 해군 함선에 싣자, 인도 아대륙은 불안정하고 분열되었으며, 혹자는 아수라장이 되었다고도 말합니다.\n\n이슬람 분리주의자들은 인구 이동이 폭력을 유발하면서 자신들의 국가를 확보했고, 이는 아마도 세계가 본 것 중 가장 큰 난민 위기를 초래했습니다. 미래가 어떻게 되든, 아대륙은 각자 알아서 해결해야 할 것입니다."
 india.6.a:0 "길고 긴 3세기였군..."
 india.6.b:0 "아마 제국의 날도 얼마 남지 않았을 것이다."
 india.6.c:0 "이 무슨 비극인가."
 india.6.e:0 "흥미롭군."
 
 
 india.290.t:0 "봄베이 회의"
 india.290.desc:0 "최근 선거 정치에서의 성공으로 독립노동당은 인도에 사회주의를 도입하기에 유리한 위치에 있는 것으로 보입니다. 사회주의 경제가 수립된 후 안정적이고 기능적인 인도를 유지하려면 인도의 다른 많은 공산주의 조직의 지원이 필수적입니다. 일부 강경파의 협력을 얻기 위해 양보해야 할 수도 있습니다. \n\n인도 공산당(CPI)의 국제주의자들은 독립 후 코민테른 가입을 요구하는 반면, 반대파인 국가 공산주의자들은 모스크바와의 단절을 요구합니다. 전인도 노동조합회의는 향후 정부 업무에서 노동조합 대표성을 요구합니다. 여성해방협회는 완전하고 전적인 성 평등을 요구합니다."
 india.290.a:0 "이 거미줄을 조심스럽게 헤쳐나가야 한다"
 
 india.300.t:0 "인도 국민회의, 농촌 힌두교도들 사이에서 인기 급증"
 india.300.desc:0 "우리 선거 운동 본부는 네루가 최근 북부 농촌 힌두교도라는 중요한 선거인단의 지지를 얻는 데 성공한 것을 목격했습니다. 어려울 수도 있지만, 반대 캠페인을 시작하면 그들의 영향력을 저지하는 데 도움이 될 수 있습니다."
 india.300.a:0 "우리 선거 운동은 이미 벅차다."
 india.300.b:0 "중요한 기회다."
 
 india.301.t:0 "연합당, 산업계의 지지를 확보하다."
 india.301.desc:0 "작지만 영향력 있는 인도 부르주아 집단은 안정 약속을 주된 이유로 들며 대부분 연합당을 지지했습니다. 약간의 설득만으로도 그들이 다른 곳을 보도록 할 수 있습니다."
 india.301.a:0 "인도 노동자들을 팔아넘길 수는 없다."
 india.301.b:0 "놓칠 수 없는 기회다."
 india.301.c:0 "실용적인 해결책일 뿐, 그 이상도 이하도 아니다."
 
 india.302.t:0 "독립노동당에 대한 국제적 지원"
 india.302.desc:0 "그들을 지지하는 권위주의자들에 의해 모든 인도인의 자유를 위해 일하는 유일한 정당으로 묘사된 정당이 외부 자금과 연사를 확보하여 부당하게 선거 운동을 강화하고 있습니다. 이 문제에 어떻게 대처해야 할까요?"
 india.302.a:0 "그들의 위선이 그들의 몰락을 초래할 것입니다."
 india.302.b:0 "가능한 한 그들을 방해하십시오."
 
 
 inc_victory_news:0 "자와할랄 네루의 지도 아래 인도 국민회의가 분열된 아대륙 전역에서 뼈를 깎는 선거 운동으로 대중의 지지를 얻어 어떻게든 통합을 이뤄냈습니다. 인도를 미래로 이끌기 위한 그들의 가장 큰 정치적 장애물은 별도의 무슬림 국가를 세우려는 전인도 무슬림 연맹이 될 것입니다."
 up_victory_news:0 "이 다채로운 아대륙에서 통합과 동포애의 중요성을 강조하며 종교적으로 다양한 주에서 폭넓은 지지를 얻어낸 연합당이 승리했습니다. 또 다른 큰 지지 기반은 일반적으로 더 반동적인 사회 정책을 선호하는 산업가들에게서 나왔습니다. [RAJ.GetAIMLUP]"
 ilp_victory_news:0 "통치 책임은 독립노동당에게 돌아갔습니다. 미래에 대한 그들의 급진적인 비전은 국가의 산업 및 식민 기반을 불안정하게 만들었습니다. 그들이 정책을 시행할 수 있을지는 지켜봐야겠지만, 만약 성공한다면 누구의 예상보다도 빨리 인도의 영국 통치에 종말을 고하게 될 수도 있습니다. 또한 사회 빈곤층이 널리 반대하는 카스트 제도의 미래 또한 불확실합니다."
 
 RAJ_1936_naval_legacy:0 "인도화된 왕립 해군"
 RAJ_1936_naval_legacy_mtg:0 "인도화된 왕립 해군"

 raj_disable_focus_tree:0 "§R이것은 당신의 중점 트리를 비활성화할 것입니다§!"

 the_bombay_uprising:0 "봄베이 봉기"
 the_bombay_uprising_desc:0 "벵골 지역 주민들이 새로이 찾은 자유는 매력적이며, 특히 화약고와 같은 봄베이는 작은 불꽃만으로도 폭발할 준비가 된 것 같습니다."
 RAJ_SPR_arms_smuggling:0 "[FROM.GetNameDef]에 무기 밀수"

 RAJ_agrarian_economy:0 "농업 경제"
 RAJ_agrarian_economy_desc:0 "한때 세계의 제조업 중심지였던 인도는 영국의 정책으로 고통받았습니다. 여기에는 급속한 탈공업화, 자원 수탈 확대, 착취적인 과세가 포함되었습니다. 이러한 경제 문제를 해결하는 것은 가까운 미래의 범위를 훨씬 넘어서는 과제가 될 것입니다. 식량 안보를 향한 점진적인 조치는 인도를 통치하려는 모든 정부의 우선순위가 되어야 합니다."

