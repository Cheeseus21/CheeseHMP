   raj_legislative_situation:0 "입법 상황"
 raj_legislative_situation_desc:0 "우리 행정부가 법안을 통과시키려면 선출직 및 임명직 의원과 다양한 이익 집단이 혼재된 제국 입법 위원회와 맞서야 합니다. 모든 정치적 절차가 끝난 후 안정적인 국가를 건설하려면 이들의 요구를 신중하게 조율해야 합니다.\n\n[RAJ.Current_Act][RAJ.Legislative_Status]"
 finalize_the_vote:0 "투표 최종 확정"
 legislative_status:0 "\n\t현재 법안에 대한 힌두교도 의견: [RAJ.ind_support_loc]\n\t현재 법안에 대한 무슬림 의견: [RAJ.pak_support_loc]\n"
 
 FOCUS_FILTER_RAJ_PROVINCIAL_ELECTIONS:0 "주의회 선거"
 legislative_railway:0 "정부 최고위층에서 철도 확장법에 대한 격렬한 토론이 벌어지고 있습니다. 이 법안의 목표는 우리의 산업 목표를 더욱 발전시키기 위해 국유화된 비영리 철도망을 건설하는 것입니다."
 legislative_agriculture:0 "농업 안정화법에 대한 격렬한 논쟁이 정부 최고 회의실에서 벌어지고 있습니다. 우리가 가장 강조하는 목표는 지역 관개 시설 개선과 곡물 및 수입품의 유도 생산입니다."
 legislative_education:0 "교육 개혁법에 대한 격렬한 논쟁이 정부 최고 회의실에서 벌어지고 있습니다. 우리는 인도 지식인들의 영국 대학 유출을 막고, 산업 및 농업 전문성 증대를 위해 농촌 교육을 개선하는 것을 가장 중요한 목표로 제시했습니다."
 legislative_insurance:0 "보험법에 대한 격렬한 논쟁이 정부 최고 회의실에서 벌어지고 있습니다. 가장 열렬한 지지자들은 인도 투자의 열악한 상태를 해결하려는 주요 문제로 꼽으며, 마침내 보험 사업을 규제함으로써 이 문제를 해결하고자 합니다."
 legislative_war:0 "전쟁 권한법에 대한 격렬한 논쟁이 정부 최고 회의실에서 벌어지고 있습니다. 총독은 지금은 논쟁할 때가 아니며, 인도는 전쟁 중이므로 행정부가 이 전쟁을 수행할 권한을 가져야 한다고 강조했습니다. 이 법안의 지연은 적의 전쟁 노력을 지원하는 꼴이 될 것입니다!"
 legislative_idle:0 "제국 입법 평의회의 회의장은 한산하며, 현재 논의 중인 법안이 없습니다."

 raj_sov_nuclear_name:0 "국방 신기술에 관한 협정"
 raj_sov_nuclear_desc:0 "원자력 시대가 도래했으며, 세계의 사회주의 국가들은 핵 프로그램에서 자본주의 국가들에게 뒤처질 여유가 없습니다. 우리의 원자력 연구 결과를 소비에트 인민과 공유하고, 그들의 결과를 공유받는 것은 양국의 안보에 큰 이익이 될 것입니다."

