 stalin_command_tt:0 "§C스탈린 동지가 부재에서 회복하여 명령을 내리기 시작할 것입니다.§!"
 SOV_shaposhnikov1:0 "샤포슈니코프를 총참모장으로 복직"
 SOV_barb2:0 "국방위원회 창설"
 SOV_barb2_idea:0 "국방위원회"
 stalin_barb_leader_trait:0 "대원수"
 SOV_barb2_desc:0 "스탈린 동지가 충격에서 회복함에 따라, 이제 독일에 대한 연방의 대응을 조직하는 데 집중할 수 있습니다. 소련 최고 소비에트 상임위원회에 의해 구성되며, 연방에 대한 최고 권력과 감독권을 가진 위원회를 창설하는 것으로 시작하겠습니다."
 SOV_shaposhnikov1_desc:00 "지금이야말로, 그 어느 때보다도 보리스 샤포슈니코프가 총참모장으로 필요합니다."
 SOV_icebreaker:0 "쇄빙선 작전"
 SOV_icebreaker_desc:0 "붉은 군대는 파시스트 야수를 타격하고 유럽의 노동자들을 해방시키기 시작할 만큼 충분히 동원하고 준비했습니다. 그들에게 소비에트 연방의 힘을 보여줍시다!"
 SOV_icebreaker2:0 "쇄빙선 작전"
 SOV_icebreaker2_desc:0 "붉은 군대는 파시스트 야수를 타격하고 유럽의 노동자들을 해방시키기 시작할 만큼 충분히 동원하고 준비했습니다. 그들에게 소비에트 연방의 힘을 보여줍시다!"
 horst_modded_barb:0 "수정된 바르바로사"
 GER_blau:0 "청색 작전"

 GER_blau_start:0 "독일이 청색 작전을 개시했습니다"
 USA_intervention_in_europe2:0 "아시아 개입"
 GER_barb_buff_tt:0 "§R\n우리의 공격 계획은 1941년 11월 22일 이후 만료됩니다§!\n\n"
 GER_ot:0 "토트 조직 확장"
 GER_ot_desc:0 "우리의 노동력 수요에 필요한 지원자는 부족하지 않습니다"
 GER_ot_idea:0 "토트 조직"
 SOV_270:0 "270호 명령"
 SOV_order270:0 "270호 명령"
 SOV_wartime_research:0 "전시 연구"
 SOV_wartime_research_desc:0 "전쟁으로 인해 우리의 연구 개발 부서에서 위대한 혁신이 촉진되고 있습니다."
 cold_train_tt:0 "§C우리의 모든 장군들이 혹한의 기상 조건에 적응할 것입니다!§!"
 SOV_cold_train:0 "혹한기 전투 훈련"
 SOV_cold_train_desc:0 "우리 장군들은 동장군에 맞서 싸우는 대신, 그와 함께 싸우는 법을 배울 것입니다."
 SOV_son:0 "축복받은 병사들"
 SOV_father:0 "축복받은 무기들"
 SOV_holy_spirit:0 "축복받은 방어"
 SOV_plowshares_into_swords:0 "[Root.GetSovMilCivName]"
 SOV_church_masses:0 "연방을 위한 예배"
 SOV_church_masses_desc:0 "우리 연방의 사제들은 이제 그들의 종교적인 허튼소리와 함께 반파시스트 투쟁을 설교하며, 농민과 노동자 계급이 우리의 애국적인 투쟁에서 승리하기 위해 필요한 희생을 감내하도록 독려합니다."
 SOV_priests_integrated:0 "군사 작전에 사제 통합"
 SOV_priests_integrated_desc:0 "우리는 병사들의 사기를 증진시켜 전투 작전을 지원하는 데 러시아 정교회를 철저히 활용할 것입니다."
 SOV_plowshares:0 "쟁기를 검으로"
 HMP_oppose_mills_tt:0 "§C시베리아에 50개의 군수 공장이 추가될 것입니다§!"
 fp_attache_idea:0 "파견된 무관"
 fp_attache:0 "무관 파견"
 HMP_neutral_mills_tt:0 "§C우리의 군수 산업을 확장할 것입니다§!"
 SOV_stalinsmills:0 "사회주의의 병기창"
 SOV_neutralmills:0 "군사 산업 확장"
 SOV_oppose_the_church:0 "연방, 스탈린, 그리고 사회주의"
 no_depression_tt:0 "우리는 §O대공황§!의 파괴로부터 완전히 회복했습니다!"
 GER_army_innovation_3:0 "육군 혁신 III"
 GER_speers_miracle:0 "슈페어의 군비 기적"
 GER_speers_miracle_desc:0 "알베르트 슈페어는 우리의 군사 산업과 노동력을 재편성하여 군수품 생산을 대폭 늘릴 수 있다는 대담한 주장을 했습니다. 연합군 및 소련군과 싸우기 위해서는 군수품 생산을 늘려야 하므로, 우리는 그에게 이 기회를 주어야 합니다."
 GER_army_innovation_3_desc:0 "프랑스와 폴란드 전역은 우리에게 전차 파생형의 중요성과 더불어 다양한 종류의 전차 모델의 필요성을 가르쳐 주었습니다."
 GER_jag_tt:0 "§C육군 회복 및 충원율에 일시적인 강화 효과를 받습니다. 또한 경제법을 §Y총동원령§!§!(으)로 변경합니다.\n\n40개의 민간 공장이 즉시 40개의 군수 공장으로 전환됩니다.\n\n§R전쟁 지지도가 50% 미만으로 떨어지면 최단기 전쟁이 제거됩니다!§!\n\n§R매월 전쟁 지지도를 2.0%씩 잃게 됩니다§!§!\n\n"
 ITA_sword_tt:0 "\n북아프리카와 중동의 아랍/이슬람 국가 통제에 따라 §C안정도§!와 §C전쟁 지지도§!에 보너스를 받습니다."
 ITA_Skillful_Workers_tt:0 "북아프리카와 중동의 아랍/이슬람 국가 통제로부터 얻는 §C안정도§! 및 §C전쟁 지지도§! 보너스에 더하여, 북아프리카와 중동 국가 통제로부터 얻은 안정도/전쟁 지지도의 절반에 해당하는 §C공장 생산량§! 및 §C조선소 생산량§! 보너스를 받게 됩니다.§!\n\n§Y최대 가능 수치는 안정도 14.5% 및 공장/조선소 생산량 7.75%입니다§!"
 SOV_oppose_the_church_desc:0 "지금도 사회주의, 내일도 사회주의, 영원히 사회주의!"
 SOV_barb3_idea:0 "대조국전쟁"
 SOV_brest:0 "브레스트 요새의 교훈"
 HOL_knil2:0 "KNIL 징집병"
 HOL_curacao_desc:0 "우리는 서쪽의 퀴라소를 개발해야 합니다. 그곳은 휴가를 보내기에 완벽한 장소이며, 석유가 풍부하고 우리가 지은 재미있고 다채로운 집들이 있습니다!"
 HOL_invest_desc:0 "우리는 또한 서쪽의 영토에도 눈을 돌려야 합니다. 크기는 꽤 작지만 자원은 매우 풍부합니다. 우리는 언제나 자원을 사용할 수 있습니다. 이는 또한 우리의 해외 무역을 증가시킬 것이며, 이는 언제나 좋은 일이고, 우리 함대는 번창할 것입니다!"
 HOL_suriname_desc:0 "수리남은 인구가 꽤 많고 자원도 상당하므로, 그곳을 더 개발하는 것은 전혀 나쁜 선택이 아닐 것입니다."
 HOL_knil2_desc:0 "본토가 함락되었으니, 오직 우리의 식민지들만이 이 싸움에서 우리를 도울 수 있습니다. 만약 우리가 원주민들을 우리 대의 뒤에 결집시킬 수 있다면, 중국군만큼이나 거대한 군대를 형성할 수 있을 것입니다!"
 stalin_barb_leader_trait2:0 "소비에트 연방 대원수"
 mrp_was_done:0 "몰로토프-리벤트로프 조약을 체결했습니다"
 SOV_at:0 "현대화된 대전차전"
 SOV_at_desc:0 "독일 전차 사단의 엄청난 양과 질은 우리가 신속하게 대전차 무기를 현대화할 것을 요구합니다."
 SOV_order270_desc:0 "포위된 부대와 편제는 마지막까지 사심 없이 싸워야 하며, 군수물자를 눈동자처럼 보호하고, 적군의 후방을 돌파하여 파시스트 개들을 격파해야 한다.\n\n국가방위위원회 위원장 - 이. 스탈린"
 SOV_man_of_steel:0 "강철의 사나이"
 SOV_man_of_steel_desc:0 "스탈린 대원수께서 모든 움직임을 지시하셨고... 모든 결정을 내리셨다... 그는 역사상 가장 위대하고 현명한 군사적 천재이다... -게오르기 주코프"
 SOV_invade_Japan:0 "8월의 폭풍 작전"
 SOV_invade_Japan_desc:0 "일본과의 국경 분쟁은 충분히 오래 지속되었습니다. 만약 우리가 일본 정부가 공인된 국경을 존중할 것이라고 믿을 수 없다면, 우리는 그 정부를 교체해야만 할 것입니다."
 SOV_china_prc:0 "중화인민공화국 지원"
 SOV_china_prc_desc:0 "우리는 사회주의 정부 아래 중국의 해방과 통일에 헌신할 것입니다."
 SOV_wtf:0 "신경 쇠약에 걸린 스탈린"
 SOV_wtf_desc:0 "파시스트들의 갑작스러운 침공으로 스탈린 동지가 잠시 마비 상태에 빠졌습니다."
 SOV_barb1:0 "별장에서 스탈린을 모셔오라"
 SOV_barb1_desc:0 "스탈린 동지의 명령 없이는 우리의 모든 지휘 체계가 마비됩니다. 그가 정상으로 돌아와야 우리가 저항할 수 있습니다!"
 rasputitsa:0 "라스푸티차"
 rasputitsa_tt:0 "소련의 진흙 계절의 힘이 소련에서 싸우는 모든 군대에 강림할 것입니다! §Y3월과 4월§! 그리고 §Y10월과 11월§! 내내 모든 사단이 다음의 수정치에 영향을 받습니다: §R사단 속도 -20%§!, §R기갑 사단 속도 -20% (총 40%)§!, §R소모율 10%§!, §R회복률 -30%§!.\n\n이 자연의 힘은 1945년 중반까지 일 년에 두 번 발생합니다."
 GER_zwangsarbeit:0 "강제 노동 복무"
 GER_zwangsarbeit_desc:0 ""
 GER_zwangsarbeit_idea:0 "강제 노동"
 GER_winter_equipment:0 "장비 동계화"
 GER_winter_equipment_desc:0 "겨울 내내 싸우려면 장비를 동계화해야 합니다 - 그것도 신속하게."
 GER_blau_desc:0 "우리는 이겨야만 한다, 그리고 신속하게. -요제프 괴벨스"
 GER_barbarossa_others_text:0 "§C\n우리의 동맹국들도 공격 계획의 혜택을 받을 것입니다.§!"
 GER_blau_text:0 "§R\n우리의 공격 계획은 1942년 11월 23일 이후 만료됩니다!§!"
 GER_jag_desc:0 "독일은 국제 볼셰비키의 음모에 의해 포위되었습니다. 연합군과 소련의 경제력을 합치면 괴물과 같지만, 총력전에서 독일 민족을 총동원하면 극복할 수 있습니다. 그 누구도 상상할 수 없었던 것보다 더 급진적인, 그런 총력전 말입니다."
 GER_totaler_krieg_tt:0 "§R신속하게 전쟁을 끝내지 못하면 독일에 재앙적인 결과가 초래될 것입니다!§!\n\n"
 GER_jet_focus:0 "메서슈미트의 계획"
 GER_jet_focus_desc:0 "메서슈미트는 제트 엔진으로 추진되는 항공기를 개발해 왔습니다. 이 항공기, Me 262는 우리가 제공권을 장악하는 데 도움이 될 것입니다."
 GER_uralabomber:0 "우랄 폭격기"
 GER_uralabomber_desc:0 "소련의 산업 시설이 시베리아로 이전하여 우리 폭격기의 사거리에서 벗어났습니다. 이 공장들에 도달하기 위해서는 더 크고 장거리 비행이 가능한 폭격기를 개발해야 합니다."
 amerika_bomber:0 "아메리카 폭격기 계획"
 amerika_bomber_desc:0 "미국이 본토를 방어하기 위해 대공포와 전투기에 집중하도록 강제할 수 있다면, 우리는 영국을 무차별적으로 폭격할 자유를 얻게 될 것입니다!"
 uk_africa_focus:0 "수단 개발"
 uk_africa_focus_desc:0 "지중해에서 우리 수송선단이 통행할 수 없게 될 경우를 대비하여 수단 지역의 도로망과 해군 기지를 개발하고, 그곳을 통해 보급품을 수송해야 합니다."
 uk_levant_focus:0 "레반트 방어"
 uk_levant_focus_desc:0 "동지중해는 해안선 근처의 공군 기지망으로만 방어할 수 있습니다. 만약 동지중해의 통제권을 잃는다면, 우리는 분명 이집트의 통제권도 잃게 될 것입니다."
 uk_sumeria_focus:0 "중동 기지"
 uk_sumeria_focus_desc:0 "중동의 군사 기반 시설을 개발하는 것은 동지중해의 통제권을 잃었을 경우 레반트 주둔군에 보급하는 데 핵심적입니다."
 uk_africa_last_defense:0 "수단 방어 준비"
 uk_africa_last_defense_desc:0 "수에즈를 상실했습니다! 우리는 아프리카의 나머지 지역에서 추축국을 저지해야 합니다!"
 

 
 
 CHI_french_drillx:0 "이탈리아식 훈련"
 CHI_french_drillx_desc:0 "대전에서 이탈리아가 쌓은 경험은 방어에 뛰어난 군대를 만들어냈습니다. 그들의 훈련 방식과 기준을 채택함으로써, 우리 자신의 방어 능력을 향상시킬 수 있습니다."
 CHI_reach_out_to_francex:0 "이탈리아에 접촉"
 CHI_reach_out_to_francex_desc:0 "이탈리아가 반복적으로 우리에게 굴욕을 주고 새로운 양보를 강요했음에도 불구하고, 현 상황에서는 그들의 도움이 필요하게 될 수도 있습니다."
 GER_mech_3_focus:0 "Sd.Kfz. 251"
 GER_mech_3_focus_desc:0 "하노마크에 적외선 탐조등을 장착하면 야간에 더 효과적으로 전투를 수행하여 전투 인지도를 향상시킬 수 있습니다."
 
 eth_give_tanks:0 "이탈리아로부터 §Y개량형 경전차§! §Y1.20K§!대를 지원받을 것입니다"
 eth_research_tanks:0 "§Y1936년형 경전차§!까지 연구할 것입니다!"

