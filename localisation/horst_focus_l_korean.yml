 india.100.t:0 "행정부 분할"
 india.100.desc:0 "영국 정부가 아덴 식민지와 버마 식민지의 창설을 발표하여, 우리의 행정 규모가 크게 축소되었습니다."
  
 RAJ_Tariff_Income:0 "관세 수입"
 RAJ_Increased_Trade_Volume:0 "교역량 증가"
 ENG_split_up_the_British_Raj:0 "영국령 인도 분할"
 ENG_split_up_the_British_Raj_desc:0 "식민 통치의 효율성을 높이기 위해 버마와 아덴에 별도의 식민지를 설립할 것입니다."
 raj_port_operation:0 "현재 항구 획득을 위해 작업 중입니다."
 india.295.t:0 "인도의 코민테른 가입 제안"
 india.295.desc:0 "유럽의 제국주의 식민 지배자들을 축출한 후 최근 코민테른에 가입한 인도는, 이후 남아시아에서 영향력을 확장했으며 이제 우리에게 세계 프롤레타리아 동맹에 가입할 의사가 있는지 묻고 있습니다."
 india.295.a:0 "만국의 노동자여, 단결하라!"
 india.295.b:0 "우리는 모스크바의 노선에서 벗어나겠습니다."

 india.296.t:0 "인도의 [RAJ.GetFactionName] 가입 제안"
 india.296.desc:0 "유럽의 제국주의 식민 지배자들을 축출한 후 최근 [RAJ.GetFactionName]을 창설한 인도는, 이후 남아시아에서 영향력을 확장했으며 이제 우리에게 남아시아 프롤레타리아 동맹에 가입할 의사가 있는지 묻고 있습니다."
 india.296.a:0 "만국의 노동자여, 단결하라!"
 india.296.b:0 "우리는 델리의 노선에서 벗어나겠습니다."
 
 india.400.t:0 "고아의 속삭임"
 india.400.desc:0 "식민 도시 고아에서 침공이 임박했다는 소문이 돌고 있습니다. 누구나 이런 시나리오를 상상할 수 있겠지만, 우리 최고 사령부는 군사 사단의 미묘한 이동을 감지했습니다. 침공은 450년간 포르투갈에 충성해 온 현지 주민들에게 재앙적인 결과를 초래할 수 있습니다. 우리가 입장을 고수한다면 국제 사회는 아마 우리를 지지할 것입니다. 하지만 진정으로 국제 사회의 지원이 인도군을 막을 수 있을까요? 우리 군이 이 임무를 감당할 수 있을까요? 글쎄요, 질문은 쉽지만 답하기는 어렵습니다."
 india.400.a:0 "놈들은 지나가지 못한다!"
 india.400.b:0 "유혈 사태는 피하는 편이 낫겠습니다."
 
 india.401.t:0 "인도, 고아 점령 성공"

 india.401.desc:0 "남아시아에 몇 안 남은 유럽 식민주의의 잔재 중 하나가 새로 수립된 [RAJ.GetNameDef]에 함락되었습니다. 포르투갈 제국은 무너지고 있는 듯합니다."
 india.401.a:0 "식민주의자들을 몰아내라!"
 india.401.b:0 "포르투갈에게는 슬픈 날이군."
 
 india.402.t:0 "인도의 고아 점령 실패"
 india.402.desc:0 "포르투갈은 인도 공격군에 용감하게 맞서 싸워 포르투갈 제국의 작은 일부를 지켜냈습니다."
 india.402.a:0 "이 빌어먹을 식민주의자들."
 india.402.b:0 "우리 제국은 하루 더 버텼다."
 
 india.403.t:0 "인도, [320.GetName]에서 국민투표 추진"
 india.403.desc:0 "우리 식민지인 프랑스령 인도에서 대규모 시위 운동이 형성되었으며, 새로 수립된 인도 정부가 이 불안의 물결 배후에 있는 것으로 보입니다. 대부분의 식민지 고문들은 이 소수의 항구와 도시들이 실질적인 경제적 이익을 제공하지 않으므로 포기할 것을 제안합니다. 우리는 이 운동을 진압할 수도 있습니다. 만약 그렇게 한다면, 예기치 못한 결과에 대비하는 것이 바람직합니다."
 india.403.a:0 "총독을 데려오게."
 india.403.b:0 "민주주의의 뜻에 맡기자."
 
 india.404.t:0 "프랑스령 인도 문제"
 india.404.descre:0 "현지 경찰력이 진압에 지쳐감에 따라 시위는 계속 확산되고 있습니다. 처음부터 시위를 진압하는 것은 불가능해 보였습니다. 하지만 우리는 조금도 망설이지 않고 제국의 통치를 강화하기로 결정했습니다. 이 결정은 섬의 행정관들 사이에서 그다지 인기가 없었으며, 그들은 현지 요구에 굴복하여 해당 주를 인도에 넘겨주었습니다."
 india.404.desc:0 "예상대로 국민투표는 인도와의 통일에 찬성하는 결과가 나왔으며, 우리는 이 이양을 막을 힘이 없습니다. 현지 [Root.GetAdjective] 군대는 철수하고, 행정관들은 재배치되며, [Root.GetAdjective] 국기는 내려지고 마침내 인도 국기가 게양될 것입니다."
 india.404.a:0 "두고 보도록 하지."
 india.404.b:0 "우리가 겪은 일에 비하면, 다소 허무한 결말이군."
 
 india.405.t:0 "버마 문제"
 india.405.desc:0 "우리는 오랫동안 버마를 인도에서 분리하는 것을 고려해왔으며, 일부 외교관들은 이미 행정 계획을 수립하고 있습니다. [Raj.GetNameDef] 정부는 경제 및 행정상의 목적으로 아대륙이 분리되지 않도록 해달라고 간청했습니다. 이 계획들을 포기하면 우리 외교관들이 다른 분야에 집중할 수 있게 될 것입니다."
 india.405.a:0 "우리에겐 더 중요한 일이 있다."
 india.405.b:0 "우리 외교관들은 계속 임무를 수행할 것이다."
 
 india.406.t:0 "영국이 우리 요청을 수락했다."
 india.406.desc:0 "버마 분리 행정 계획을 수립하던 영국 외교관들이 다른 임무에 재배치되었으며, 우리 행정부는 온전하게 유지되었습니다."
 india.406.a:0 "현명한 결정이다."
 
 india.407.t:0 "영국이 우리 요청을 거부했다."
 india.407.desc:0 "영국 정부는 인도를 통합된 상태로 유지해 달라는 우리의 청원을 단호히 거부했으며, 그들의 외교관들은 버마 식민지 계획을 계속 진행하고 있습니다."
 india.407.a:0 "저주받을 앵글로 놈들."
 
 india.408.t:0 "실론 문제"
 india.408.desc:0 "우리의 새로운 동등한 동맹인 인도가 스리랑카에 있는 자신들의 동맹이라 주장하는 이들에 대해 점점 더 많은 압력을 가하고 있습니다. 최근 몇 달 동안 그들의 독립을 향한 외침이 더욱 커지고 있지만, 우리가 정말로 제국의 이 중요한 부분을 포기해야 할까요?"
 india.408.a:0 "그들에게 자치령 지위를 부여하겠다."
 india.408.b:0 "그들이 우리의 국내 정책을 좌지우지하게 둘 순 없다."
 
 india.409.t:0 "영국이 우리 요청을 수락했다."
 india.409.desc:0 "영국 정부는 이전의 직할 식민지 실론에 [SRL.GetNameDef]라는 새로운 이름으로 자치령 지위를 부여했습니다. 이것은 아시아 원주민들에게 위대한 승리입니다."
 india.409.a:0 "즉시 대사관 설립을 추진하겠다."
 
 india.410.t:0 "영국이 우리 요청을 거부했다."
 india.410.desc:0 "영국은 실론 식민지를 포기할 의사가 없다고 회신했습니다. 이것은 아시아 원주민들에게 상당한 타격입니다."
 india.410.a:0 "저주받을 앵글로 놈들."
 
 burma_separate:0 "버마 식민지가 수립되었습니다"
 plead_against_seperation:0 "버마 식민지에 반대하는 로비"
 plead_against_seperation_desc:0 "영국은 오랫동안 우리 행정부에서 버마를 분리하여 별도의 식민지를 만들 계획을 세워왔습니다. 우리는 이 주제에 대한 우리의 의견을 영국에 알려야 합니다."
 raj_prevent_state_modifier:0 "§Y버마§!가 별도의 식민지가 되어 우리가 그들의 §Y자원 대부분§!을 §R상실§!하는 것을 방지합니다."
 
 RAJ_port_of_yanoan:0 "코엘 작전"
 RAJ_port_of_yanoan_desc:0 "현지 주민에게 인도와의 통일에 대한 국민투표를 약속함으로써 프랑스는 우리의 요구를 거부할 힘이 없을 것입니다."
 
 RAJ_port_of_goa:0 "브릭샤 딥 작전"
 RAJ_port_of_goa_desc:0 "유럽 식민주의의 마지막 사악한 잔재 중 하나는 정당한 주인에게 반환되어야 하며, 필요하다면 무력을 동원해서라도 되찾아야 합니다."
 
