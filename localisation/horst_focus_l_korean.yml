 SLO_submachine_guns_desc:0 ""
 SLO_gun_mass_production:0 "총기 생산 집중"
 SLO_gun_mass_production_desc:0 ""
 SLO_arty_3:0 "포병 현대화"
 SLO_arty_3_desc:0 ""
 SLO_security_tt:0 "각 15개 대대로 구성된 §Y경비 사단§! 4개를 획득합니다"
 SLO_security_divisions:0 "경비 사단"
 SLO_security_divisions_desc:0 "경비 보병 사단은 주로 독일 전선 후방 지역에서 경비 및 대유격 작전에 사용되었습니다. 원래 경비 사단은 독일군이 동쪽으로 진격하면서 지나친 소련 저항 세력의 소탕에 사용되었습니다. 이후 슬로바키아 경비 사단은 지토미르 지역의 대유격 작전에 투입되었습니다."
 SLO_soviet_war:0  "캅카스로!"
 SLO_soviet_war_desc:0 "1941년 10월 2일, 신속 사단은 제1기갑군의 일원으로 드네프르강 동쪽 페레시치나 지역 근처에서 전투를 벌였습니다. 이때쯤 사단은 거의 모든 전차를 잃었습니다. 사단은 1942년 초 독일군의 캅카스 지역 진격에 참여했으며, 로스토프 공격 및 점령에서 중요한 역할을 했습니다."
 SLO_hlinka_chad:0 "흘린카 근위대"
 SLO_hlinka_chad_desc:0 "흘린카 근위대는 1938년부터 1945년까지 슬로바키아 인민당이 유지했던 민병대입니다. 슬로바키아의 가톨릭 사제이자 사회 운동가였던 안드레이 흘린카의 이름을 따서 명명되었습니다."
 SLO_hlinka_youth:0 "흘린카 청년단"
 SLO_hlinka_youth_desc:0 "흘린카 근위대와 마찬가지로 흘린카 청년단도 슬로바키아 인민당(HSPP) 산하 조직이었습니다. 1938년 청년 협회 및 단체들의 해산과 재구성 이후 단일 전국 조직으로 결성되었습니다. 상징적으로 최고 사령관은 요제프 티소였지만, 1940년부터 1945년까지의 총사령관은 알로이즈 마체크였습니다."
 SLO_na_straz:0 "Na stráž"
 SLO_na_straz_desc:0 "Na stráž는 슬로바키아의 극우 정치와 관련된 체코 및 슬로바키아어 구호입니다. "슬로바키아판 하일 히틀러"로 묘사되기도 했습니다. 슬로바키아국 시대에 이 구호는 흘린카 근위대원들이 비공식적으로 인사말로 사용했습니다."
 SLO_expand_hlinka_youth:0 "흘린카 청년단 확장"
 SLO_expand_hlinka_youth_desc:0 "초기에 흘린카 청년단은 소년들만을 위한 조직이었지만, 나중에는 소녀들을 위한 지부도 생겼습니다."
 ger_mechanised_infantry:0 "기초 독일군 하프트랙"
 SLO_southern_slovakia_tt:0 "제1차 빈 중재가 발생하지 않았을 경우:\n§Y남부 슬로바키아:§!\n   §Y민간 공장 2개§! 추가\n§Y독일국§! 정치력 §G+100§!"
 SLO_spawn_mot:0 "차량화 사단"
 SLO_hitlers_demands:0 "히틀러의 요구 수용"
 SLO_hitlers_demands_desc:0 "이 거대한 투쟁에서 인력 수요가 계속 증가함에 따라, 히틀러는 우리가 동원할 수 있는 모든 병력을 징집하라는 명령을 내렸습니다."
 SLO_men_in_black:0 "검은 옷을 입은 사나이들"
 SLO_men_in_black_desc:0 ""
 SLO_heydrich_focus:0 "하이드리히를 국가 지도자로 초빙"
 SLO_heydrich_focus_desc:0 ""
 SLO_decree:0 "주데텐 포고령"
 SLO_decree_desc:0 ""
 SLO_martial_law:0 "계엄령 선포"
 SLO_martial_law_desc:0 ""
 SLO_nuke:0 "원자폭탄 실험"
 SLO_nuke_desc:0 ""
 MAN_pacify_the_countrysidex:0 "교외 지역 평정"
 MAN_pacify_the_countrysidex_desc:0 "우리가 집권한 이래로, 무법자들과 반란군들이 국가의 외딴 지역에서 우리의 통치에 도전해 왔습니다. 정부로서 진지하게 받아들여지려면, 이 테러리스트들을 뿌리 뽑고 국민에게 우리의 통치력을 행사할 수 있음을 보여줘야 합니다."
 MAN_law_universityx:0 "법률 대학"
 MAN_law_universityx_desc:0 "우리나라는 아직 신생국입니다. 가장 현대적인 정부 이해에 기반한 완전히 새로운 법률 체계를 만들 진정한 기회가 있습니다. 이를 위해, 아시아 최고의 인재들을 모을 전문 시설을 만들어야 합니다."
 MAN_research_and_education_departmentx:0 "연구 교육부"
 MAN_research_and_education_departmentx_desc:0 "국가가 성장함에 따라, 교육 및 연구 시설도 그에 맞춰 성장하도록 보장해야 합니다. 연구 노력이 가장 필요한 곳에 집중되도록 더 큰 노력을 기울여야 합니다."
 MAN_trade_delegationx:0 "무역 대표단"
 MAN_trade_delegationx_desc:0 "세계의 다른 국가들은 우리보다 산업 기술이 앞서 있습니다. 대표단을 파견하여 그들의 기술을 연구하고 우리 기술을 개선할 방법을 찾아야 합니다."
 MAN_expand_the_textile_industryx:0 "섬유 산업 확장"
 MAN_expand_the_textile_industryx_desc:0 "우리 섬유 공장은 오랫동안 우리 산업의 주축이었으며, 산업 기반을 확장하기 위해 더 많은 외자를 획득하는 가장 쉬운 방법이 될 것입니다."
 MAN_obediencex:0 "복종"
 MAN_obediencex_desc:0 "어떤 이들은 우리를 일본의 단순한 꼭두각시라고 부르지만, 그들은 우리의 긴밀하고 평등한 관계를 근본적으로 오해하고 있습니다. 우리의 후원자에게 맞서는 것은 자식이 부모에게 맞서는 것과 같습니다."
 MAN_mukden_military_academy_idea:0 "봉천 군관학교"
 MAN_mukden_military_academyx_desc:0 ""
 MAN_army_modernizationx:0 "육군 현대화"|
 IRQ_retool_the_army:0 "육군 재정비"
 IRQ_retool_the_army_desc:0 "육군이 올바른 장비로 무장하고 있지 않습니다. 상황을 바로잡기 위해 비상 조치를 취해야 합니다."
 MAN_five_people_armiesx:0 "오족군"
 MAN_five_people_armiesx_desc:0 "모든 국민이 평등하다면, 모든 국민은 외세의 압제자들에 맞서 국가를 방어할 준비와 의지가 동등하게 갖추어져 있어야 합니다."
 MAN_showa_steel_desc:0 "일본의 도움으로 랴오둥의 제철소를 동아시아 최대 규모로 더욱 발전시킬 수 있습니다."
 IRQ_revolution3:0 "왕실보다 피"
 IRQ_revolution4:0 "무프티의 귀환"
 IRQ_revolution5:0 "우리 동족의 재결합"
 IRQ_revolution6:0 "고대 영토 통합"
 IRQ_revolution7:0 "제국 선포"
 ALB_TO_IRQ_fascism:0 "황금 사각형 이라크"
 IRQ_revolution:0 "RAF 하바니야 공습"
 IRQ_revolution_desc:0 ""
 IRQ_ita_revolution:0 "이슬람의 검, 동쪽으로 진군하다"
 IRQ_ita_revolution_desc:0 ""
 IRQ_eco1:0 "영국 투자 국유화"
 IRQ_eco1_desc:0 "영국의 수십 년에 걸친 약탈에 대한 보상으로 그들의 재산을 압류할 것입니다."
 IRQ_eco3_desc:0 "영국의 수십 년에 걸친 약탈에 대한 보상으로 그들의 재산을 압류할 것입니다."
 IRQ_the_golden_square_coup:0 "황금 사각형 쿠데타"
 IRQ_the_golden_square_coup_desc:0 "오랫동안 영국인들은 우리 땅을 점령하고, 귀중한 석유를 빼앗아 갔으며, 우리를 그들 기업의 노예로 만들었습니다. 우리의 퇴폐적인 군주제는 약하고 우리나라를 제대로 대표하지 못합니다. 우리는 이 변명거리에 불과한 지도자를 몰아내고, 파시스트 원칙에 따라 강력한 지도자를 세워 우리나라를 위대함으로 이끌어야 합니다!"
 IRQ_army_doctrine5:0 "국민 규합"
 IRQ_army_doctrine5_desc:0 "영국의 위협에 맞서 우리 국민을 규합할 것입니다!"
 IRQ_eco2:0 "토지 개혁"
 IRQ_army_doctrine4:0 "알푸투와 청년단"
 IRQ_army_doctrine4_desc:0 "우리는 청년들에게 파시즘과 범아랍주의라는 우리의 이상을 주입할 것입니다."
 IRQ_army_doctrine:0 "새로운 군사 교리"
 IRQ_army_doctrine2:0 "교리 개발 가속화"
 IRQ_army_doctrine2_desc:0 "전쟁은 최고의 스승입니다."
 IRQ_army_doctrine3:0 "공화국 수비대"
 IRQ_army_doctrine3_desc:0 "최고 중의 최고를 바로 우리 수도에 배치합니다."
 IRQ_army_doctrine_desc:0 "우리에게는 훌륭한 군사 이론가가 없어 구식 대전 전술에 얽매여 있습니다. 우리는 전쟁 기술을 가르쳐 줄 외국인을 고용해야 합니다."
 ITA_align_iraq:0 "이라크 민족주의 고취"
 ITA_align_iraq_desc:0 "우리는 현지 친추축국 이라크 정부에 우리 자신을 '해방자'로 내세워 그들의 군대를 우리 대의에 끌어들여야 합니다."
 RAJ_hyderabad_rails:0 "하이데라바드 철도"
 RAJ_hyderabad_rails_desc:0 "인도 중부에 철도를 개발할 것입니다."
 RAJ_pakistani_rails:0 "중앙아시아로 향하는 도로 포장"
 RAJ_pakistani_rails_desc:0 "아프가니스탄과 이란으로 이어지는 기반 시설을 개발할 것입니다."
 RAJ_gujarat_rails:0 "구자라트 해운 개발"
 RAJ_gujarat_rails_desc:0 "봄베이를 모든 물품이 통과하는 주요 항구로 만들 것입니다."
 BUL_sign_salonika_agreement:0 "살로니카 협정 체결"
 BUL_ignore_treaty_neuilly_sur_seine:0 "뇌이쉬르센 조약 무시"
 BUL_vmz_sopot:0 "VMZ 소포트"
 ETH_army_reform:0 "식민지군 개혁"
 ETH_army_reform_desc:0 "우리 군은 지휘 구조와 사단 편제에 대한 상명하달식 개혁이 절실히 필요합니다."
 BUL_krali_marko_line:0 "크랄리 마르코선"
 BUL_prosveta_publishing_house:0 "프로스베타 출판사"
 FIN_prepare_for_war:0 "전쟁 준비"
 FIN_prepare_for_war_desc:0 "외국의 침공에 대비하지 못할 여유가 없습니다. 가장 필요할 때 군사 장비가 부족한 것보다, 사용하지 않더라도 만들어 두는 것이 낫습니다."
 FIN_develop_the_war_machine:0 "마보이마트 개발"
 FIN_develop_the_war_machine_desc:0 "군사 장비 생산 증가는 우리 주권을 지키는 데 도움이 될 것입니다. 일부에서는 더 공격적인 태세를 취하자는 논의도 시작되었습니다."
 BUL_girdap:0 "기르다프"
 BUL_local_antitank_innovation:0 "자국 대전차 혁신"
 BUL_interventionism:0 "개입주의"
 BUL_dedication_to_the_axis_desc:0 "추축국에 대한 우리의 헌신은 결실을 보았고, 우리나라가 파시즘을 더 지지하는 것 같습니다. 지도자를 선출할 때 흐리스토 루코프는 현명한 선택이 될 것입니다."
 BUL_the_wrong_axis_desc:0 "우리가 잘못된 동맹에 가입한 것 같습니다. 추축국은 우리를 보호할 만큼 강하지 않으며, 우리는 소련 외교관들과 관계를 유지해 왔습니다. 이제 그들을 활용할 때입니다."
 BUL_negotiate_with_the_soviets_desc:0 "이제 코민테른 가입 가능성에 대해 소련과 협상을 시작할 때입니다. 우리는 독일보다 우리 자신의 생존을 먼저 확보해야 하며, 소련이 이를 도울 수 있습니다."
 BUL_align_with_the_west_desc:0 "유럽의 즉각적인 위협에 직면하여, 우리의 유일한 안전지대는 서유럽의 보호 아래 있는 연합국뿐입니다."
 BUL_appease_the_allies_desc:0 "연합국은 니콜라 무샤노프와 그의 민주당을 총리로 지지한다는 의사를 밝혔습니다. 무샤노프 정권을 세우는 것은 우리 대의에 큰 도움이 될 것입니다."
 BUL_deal_with_the_allies_desc:0 "더 이상 수상한 뒷거래는 없습니다. 이제 불가리아가 모든 선의를 위해 연합국의 공식적인 일원이 되었음을 세상에 알릴 것입니다."
 BUL_balkan_alignment_desc:0 "우리의 의제를 진전시키기 위해, 우리는 약간의 노선 변경을 수행해야 합니다. 우리가 발칸에 합류하거나, 발칸이 우리에게 합류하게 만들어야 합니다."
 BUL_befriend_greece_desc:0 "그리스와의 수십 년에 걸친 경쟁은 이제 끝나야 합니다. 지금까지는 재미있었지만, 이제는 함께 뭉쳐야 할 때입니다."
 BUL_befriend_romania_desc:0 "우리의 북쪽 이웃인 루마니아는 우리를 그다지 좋아하지 않습니다. 이제는 그것을 바꿀 때입니다. 그래야 발칸 국가들이 함께 뭉쳐 하나씩 각개격파당하지 않을 것입니다."
 BUL_formalise_the_balkan_entente_desc:0 "협상 체제의 일원이 되는 것은 좋지만, 우리를 침략하려는 자들에게 맞설 수 있도록 이를 재확인하는 것을 고려해야 합니다."
 BUL_alliance_with_the_entente_desc:0 "이제 유고슬라비아, 루마니아, 그리스를 달랬으니, 발칸 협상에 가입하는 것을 고려해야 합니다. 발칸 협상은 우리를 강하게 지켜줄 것입니다."
 BUL_albanian_inheritance_desc:0 "알바니아는 슬라브계일 뿐만 아니라, 과거 위대한 불가리아 제국의 일부였습니다. 이제 상황을 바로잡고 그들의 독립이 우리의 자비에 달려 있음을 상기시켜 줄 때입니다."
 BUL_local_armour_acquirements_desc:0 "기갑 장비를 외부 공급원에 의존하기보다는 우리 스스로 고안하고 생산해야 합니다. 그래야 항상 안전할 것입니다."
 BUL_over_the_balkans_desc:0 "산악 사단은 발칸 반도에서 매우 유용합니다. 이들을 연구하고 배치하는 것은 장기적으로 우리에게 막대한 도움이 될 것입니다."
 BUL_protect_the_balkans_desc:0 "발칸 반도를 보호하기 위해, 우리는 뚫을 수 없는 요새선을 구축하고 군사력으로 이를 확보해야 합니다."
 BUL_girdap_desc:0 "불가리아의 기르다프 은행으로부터 자금을 확보해야 합니다. 그들은 많은 정부 프로젝트에 자금을 지원하고 우리가 돕기 꺼리는 일부 분야에서 지원을 제공할 수 있습니다."
 BUL_across_the_land_desc:0 "전국에 걸쳐 기반 시설을 개선해야 합니다. 현재 우리 도로는 훌륭하지 않으며, 미래의 군사 이동을 지원하기 위해 이것은 좋은 시작이 될 것입니다."
 BUL_bulgarian_electronics_desc:0 "전자공학 연구는 미래로 나아가는 한 걸음입니다. 우리는 그 미래로 나아가기 위한 계획을 실현해야 합니다."
 BUL_steel_exports_desc:0 "불가리아는 막대한 양의 강철을 보유하고 있지는 않지만, 불가리아의 수요를 충족시키기에는 충분하며 최소한의 수준으로 수출까지 할 수 있습니다."
 BUL_global_detection_desc:0 "현대화의 다음 단계는 바로 레이더입니다. 대규모 방송은 바카렐에 대형 송신기를 설립하는 것을 시작으로 불가리아를 미래로 이끌 것입니다."
 BUL_institute_for_nuclear_research_desc:0 "불가리아가 시대에 발맞춰 발전하려면, 우리 자신의 원자력 연구를 시작하는 것이 가장 중요합니다."
 BUL_jet_fighters_desc:0 "우리의 구형 전투기들이 현재 우리 군에 적합하지만, 이 상태가 계속되지는 않을 것입니다. 도약으로 발전하는 것보다 더 나은 방법이 있겠습니까?"
 BUL_derhavna_samoletna_fabrika_desc:0 "데르자브나 사몰레트나 파브리카는 불가리아 군을 위해 현지에서 여러 폴란드 전투기를 생산하기 위해 불가리아에 설립된 폴란드 공장입니다."
 BUL_retake_thrace_desc:0 "트라키아는 명목상 우리 땅입니다! 제2차 발칸 전쟁 이전에 트라키아는 불가리아의 핵심 영토였지만, 저 더러운 그리스인들이 우리에게서 훔쳐갔습니다! 우리는 어떤 대가를 치르더라도 되찾아야 합니다!"
 BUL_soviet_t_34_desc:0 "소련의 기술을 획득하고자 한다면, 그들의 주력 전차인 T-34를 획득해야 합니다. 우리는 그 전차를 획득하기 위해 노력할 것입니다."
 BUL_bulgarian_dars_desc:0 "불가리아 회사 DAR은 과거에 많은 훈련기를 제작했습니다. 아마도 우리는 이 훈련기들을 활용하여 조종사들이 비행하며 경험을 쌓도록 할 수 있을 것입니다."
 BUL_dismantle_the_government_desc:0 "정부가 보리스 차르를 배신했습니다! 그들이 쿠데타를 시도하기 전에 반대파를 제거해야 합니다!"
 BUL_depose_the_king_desc:0 "마침내 가짜 왕을 제거할 때가 왔습니다. 그는 더 이상 불가리아를 이끌 자격이 없습니다."
 BUL_local_antitank_innovation_desc:0 "국가로서 불가리아는 다른 나라에 대항할 만큼 충분히 좋은 전차를 생산할 수 없으므로, 우리는 전차에 대처하기 위한 다른 방법을 찾아야 합니다."
 BUL_interventionism_desc:0 "이제 우리가 세상을 안전하게 만들 때입니다. 과거에 너무 많이 패배했기에, 우리는 스스로를 만회할 기회를 얻었습니다."
 BUL_vrazhdebna_airfield_desc:0 "우리 공군은 비행장이 필요하며, 이를 위해 비행장을 건설할 토지를 수용해야 합니다. 정부 법령에 따라 건설될 것입니다."
 BUL_bulgarian_revanchism_desc:0 "우리는 대전쟁의 패배에 대해 행동을 취하고, 다시 한번 위대함을 향한 불가리아의 길을 확보해야 합니다."
 BUL_demand_dobrudja_desc:0 "도브루자는 당연히 우리 땅이며, 대전쟁과 발칸 전쟁의 결과로 루마니아가 부당하게 우리에게서 빼앗아 갔습니다."
 BUL_our_brothers_in_macedonia_desc:0 "바르다르 마케도니아는 당연히 불가리아의 영토이며, 우리는 그들이 유고슬라비아 정부에 맞서 싸우도록 고무할 수 있습니다."
 BUL_deal_with_germany_desc:0 "독일이 유고슬라비아를 침공할 계획이 있다고 합니다. 이는 우리가 독일로부터 마케도니아를 획득하기에 이상적인 위치에 놓이게 합니다."
 BUL_yugoslavia_for_ourselves_desc:0 "우리는 유고슬라비아를 나누지 않을 것입니다. 그들은 슬라브인이며 불가리아와 통합되어야 합니다."
 BUL_return_to_the_aegan_desc:0 "에게해는 한때 우리의 영향권에 있었습니다. 우리는 대불가리아를 위해 다시 한번 그곳을 확보할 것입니다."
 BUL_enemy_of_my_enemy_desc:0 "이탈리아는 우리가 그리스로부터 트라키아를 확보하는 것을 도울 수 있습니다. 이탈리아가 침공하면, 우리는 트라키아에 대한 통제권을 요청하고 단계적으로 이전 제국을 복원할 수 있습니다."
 BUL_fleet_of_the_aegan_desc:0 "지중해의 통제권을 확보하고 바다에 대한 더 많은 통제권을 갖기 위해, 지중해에서 함대를 생산하기 시작해야 합니다."
 BUL_anti_air_defence_of_sofia_desc:0 "수도에 대한 치명적인 폭격을 방지하기 위해, 우리는 소피아에 대공 방어 시설을 설치해야 합니다."
 BUL_befriend_turkey_desc:0 "협상국과 친선을 도모하기 위한 노력의 일환으로, 우리는 터키와 친선을 맺어야 합니다."
 BUL_cut_ties_with_germany_desc:0 "연합국은 우리가 독일과의 관계를 완전히 끊는다면 우리를 돕겠다고 말했습니다. 이제 불가리아가 자립할 때입니다."
 BUL_protect_bulgaria_desc:0 "우리 자신을 방어하기 위한 노력의 일환으로, 국경을 따라 요새선이 건설되어야 합니다. 이것들은 미래의 모든 침공에 맞서 우리에게 도움이 될 것입니다."
 BUL_agrarian_utopia_desc:0 "불가리아는 대부분 농민과 농본주의자들로 구성되어 있습니다. 우리는 공산주의를 향한 우리의 여정에서 이것을 잘 활용할 수 있습니다."
 BUL_slavic_confederation_desc:0 "소련에 가입하는 대신, 우리는 이웃 국가들과 동맹을 맺고 그들에게 올바른 길을 보여줌으로써 여기 발칸 반도에서 우리의 영향력을 가장 잘 발휘할 수 있습니다."
 BUL_macedonian_literary_circle_desc:0 "우리 정부의 공산주의자들은 마케도니아인들의 발전을 돕기 위해 이른바 마케도니아 문학회를 설립했습니다. 이제 우리는 그것을 전반적인 발전을 위해 사용할 것입니다."
 BUL_support_urbanisation_desc:0 "더 이상 건설할 공간이 충분하지 않습니다. 우리는 공간을 좀 확보해야 합니다."
 BUL_synthetic_experiments_desc:0 "불행히도 우리는 무역을 위해 영원히 외부 세계에 의존할 수 없으며, 특히 전쟁의 경우에는 더욱 그렇습니다. 우리는 합성 자원을 제조하려는 시도를 해야 합니다."
 BUL_better_excavation_equipment_desc:0 "우리의 굴착 장비는 구식입니다. 우리는 그것을 개선할 수 있고 또 개선해야 합니다!"
 BUL_buy_from_britain_desc:0 "아마도 영국은 우리가 그들과 다른 연합국들로부터 장비를 구매하는 것을 허용할 것입니다. 더 많은 곳에서 구매할 수 있다면 더 많은 장비에 접근할 수 있겠죠?"
 BUL_support_macedonian_industry_desc:0 "우리의 마케도니아 괴뢰국은 산업화에 약간의 지원이 필요합니다. 우리는 그들을 도와야 하며, 결국 그들은 우리에게 더 유용해질 것입니다."
 BUL_the_macedonian_question_desc:0 "일반적으로 마케도니아인들은 불가리아에서 문제입니다. 그리고 우리는 그것을 해결할 방법을 찾아야 합니다."
 BUL_mechanised_effort_desc:0 "우리는 너무 오랫동안 차량화에 의존해 왔습니다. 우리는 다음 단계인 기계화로 나아가야 합니다!"
 BUL_local_factories_desc:0 "현지 제품을 생산하고 싶다면, 그렇게 할 공장이 있어야 하지 않겠습니까? 정부가 오래된 건물들을 일부 철거하면 우리는 그것들로 공장을 만들 수 있습니다."
 BUL_support_equipment_desc:0 "불가리아 군은 지원 장비가 필요합니다! 총만으로는 다가올 전쟁에서 이길 수 없습니다."
   
 BUL_may_provoke_aggression:0 "§R이는 마케도니아의 공격을 유발할 수 있습니다.§!"
 bogdan_filov_leader:0 "보그단 필로프가 집권했습니다"
 boris_iii_leader:0 "보리스 3세가 최고 지도자로 임명되었습니다"
 BUL_permit_german_access_tt:0 "독일군의 불가리아 영내 진입을 허가합니다."
