 RAJ_Societal_Investments:0 "사회 투자"
 RAJ_Assured_Stability:0 "안정 보장"
 RAJ_Assured_Stability_desc:0 "인도의 다른 모든 주요 정당들이 전면적인 급진적 변화를 약속하는 반면, 점진적인 변화를 도입하고 풍파를 일으키지 않는 것이 훨씬 바람직합니다."
 RAJ_First_Phase_Five_Year_Plan:0 "5개년 계획 1단계"
 
 raj_military_research:0 "군사 연구"
 army_research_navy:0 "해군 연구 중점"
 army_research_navy_desc:0 "인도는 해양 국가로 알려진 적이 없지만, 이제는 그 인식을 바꿀 때가 되었을지도 모릅니다."
 army_research_airplane:0 "항공 연구 중점"
 army_research_airplane_desc:0 "하늘에서의 적절한 지원이 없다면, 우리의 전함과 포병 시설은 취약해질 것입니다."
 army_research_armour:0 "기갑 연구 중점"
 army_research_armour_desc:0 "인도의 광활한 평원과 사막을 횡단하기 위해, 우리 병사들을 위한 기갑 지원은 전투 효율성을 크게 향상시킬 것입니다."
 army_research_artillery:0 "포병 연구 중점"
 army_research_artillery_desc:0 "보병 돌격이라는 군사 전술은 오래전에 구식이 되었으며, 적 거점에 대한 전략적 포격으로 대체되어야 합니다."
 army_research_infantry:0 "보병 연구 중점"
 army_research_infantry_desc:0 "우리의 소화기는 국제 사회에 비해 오랫동안 부족했습니다. 소총 개발에 투자하는 것은 고도로 효율적인 군대를 만드는 데 큰 도움이 될 것입니다."
 army_research_running:0 "현재 연구 중점 진행 중"
 
