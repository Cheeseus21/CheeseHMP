 pacifistic_activist:0 "평화주의 독립운동가"
 RAJ_subhas_chanda_bose_desc:0 "인도 국민회의는 인도를 독립시키는 데 실패했습니다. 이제 영국에 직접 맞서 싸울 때입니다."
