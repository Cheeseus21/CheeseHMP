  SIA_France_restore_order_in_indochina:0 "질서 회복"
  SIA_France_restore_order_in_indochina_desc:0 "인도차이나에서 프랑스 행정부를 몰아내려는 대규모 공산주의 봉기가 발발했습니다. 이들은 시암의 지원을 받아 중무장한 상태입니다. 우리 식민지의 통제권을 되찾는 것이 급선무입니다."

  SIA_revolutionnary_women:0 "혁명 여성"
  SIA_revolutionnary_women_desc:0 "자본주의의 종식은 여성 소외의 종식을 의미해야 합니다. 여성들은 가정에서든, 공장에서든, 군대에서든 남성과 동등한 지위를 가져야 합니다."
