raj_investor_relations_desc:0 "새롭게 수립된 인도 시장 경제에 초청된 외국인 투자자들은 즉시 원하는 수익을 찾아냈습니다. 필연적으로 야망과 기대가 커지기 마련이며, 우리가 이를 충족시키지 못하면 투자 흐름이 고갈될 수 있습니다.\n\n  현재 이들의 태도는 [RAJ.GetInvestorRelations]입니다.\n  이로 인해 현재 투자 간격은 다음과 같습니다:\n   [?RAJ.investors_timeout|Y0]일 (투자 횟수로 인한 +[?RAJ.num_of_investments_days])\n  그리고 특정 건물 건설 속도 보너스는 [?RAJ.investor_bonus|G%2]입니다.\n"
