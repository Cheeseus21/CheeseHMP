 stalin_barb_leader_trait:0 "대원수"
 SOV_barb2_desc:0 "스탈린 동지가 충격에서 회복함에 따라, 이제 우리는 독일에 대한 연방의 대응을 조직하는 데 집중할 수 있습니다. 소련 최고 소비에트 상임위원회에 의해 구성되며, 연방에 대한 최고 권력과 감독권을 갖는 위원회를 창설하는 것으로 시작하겠습니다."
 SOV_shaposhnikov1_desc:00 "지금이야말로 그 어느 때보다 보리스 샤포슈니코프가 총참모장으로 필요합니다."
 SOV_icebreaker:0 "쇄빙선 작전"
 SOV_icebreaker_desc:0 "적군이 동원과 준비를 충분히 마쳤으니, 파시스트 야수를 타격하고 유럽의 노동자들을 해방시킬 것입니다. 소비에트 연방의 힘을 보여줍시다!"
 SOV_icebreaker2:0 "쇄빙선 작전"
