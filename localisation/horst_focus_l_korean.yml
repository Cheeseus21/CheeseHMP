 JAP_CHI_concessions_to_china:0 "중국에 대한 양보"
 JAP_CHI_concessions_to_china_desc:0 "외몽골에 우리의 괴뢰국을 확실히 형성한 몽강 협정은 1935년부터 예상외로 개선되던 국민당 중국과의 관계를 다시 한번 악화시켰습니다. 이 작전이 우리 군의 궁극적인 승리였음에도 불구하고, 우리는 우리의 성공을 포기하고 외몽골을 국민당에 돌려주어야 합니다. 그렇게 하면 바라건대 다시 한번 그들의 호의를 얻을 수 있을 것입니다."
 JAP_CHI_get_rid_of_chiang_kai_shek:0 "장제스를 제거하라"
 JAP_CHI_get_rid_of_chiang_kai_shek_EXPL:0 "만약 그들의 §R안정도§!가 §R50%§! 미만이라면, 이 중점은 다음과 같은 §R효과§!도 가집니다:\n"
 JAP_CHI_get_rid_of_chiang_kai_shek_desc:0 "장제스의 통치는 거의 완전한 독재로 간주될 수 있지만, 그는 오랫동안 더 유연한 왕징웨이의 반대에 부딪혀 왔습니다. 만약 우리가 중국인들을 설득하여 장제스에게 작은 사고를 꾸미게 할 수 있다면, 왕징웨이가 중국의 주석으로서 그의 자리를 차지할 수 있을 것입니다. 이는 분명 우리의 미래 협력을 용이하게 할 것입니다."
 JAP_CHI_non_aggression_pact_with_china:0 "중국과 불가침 조약"
 JAP_CHI_non_aggression_pact_with_china_desc:0 ""
