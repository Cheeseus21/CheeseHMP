 SOV_docking:0 "무르만스크에 영국 왕립 해군 주둔 허용"
 SOV_docking_desc:0 "붉은 함대가 레닌그라드에 배치되어 있어 북극의 무역과 보급을 보호할 함선을 할애할 수 없습니다. 이를 용이하게 하려면 무르만스크에 영국 왕립 해군의 기지 사용권을 허용해야 합니다."
 SOV_mongolian_aid:0 "몽골로부터 원조 수령"
