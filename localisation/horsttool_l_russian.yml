 horsthelp.2.t: "Помощь с Horst Tool"
 horsthelp.2.d: "Система Horst Tool создана для того, чтобы хостам было проще вести игры, не тратить время на хотджойны, а партии не заканчивались из-за того, что Германия случайно исследовала что-то не то со своими бонусами, и т.п. У Horst Tool есть несколько функций: \n\n 1. Изменение границ \nHorst Tool может аннексировать страны, передавать штаты и добавлять национальные территории. Чтобы аннексировать страну, отметьте один из её штатов, затем выберите страну, к которой хотите её присоединить, и нажмите кнопку аннексии. Чтобы передать штаты/добавить национальные территории, отметьте штат, затем выберите принимающую страну и нажмите передачу штатов/добавление национальных территорий. \n\n2. Добавление технологических бонусов.\n Для этого выберите целевую страну, нажмите нужный бонус и кнопку «Чит» с иконкой исследования.\n\n3. Перевод игроков в наблюдатели. \nДля этого выберите страну, за которую играет игрок, и нажмите кнопку наблюдения. \n\n4. Белый мир между странами. \nЧтобы заключить белый мир со страной, выберите целевую страну и нажмите кнопку белого мира."
 horsthelp.2.a: "Спасибо, Horst, очень круто!"
 
