 FIX_PRODUCTION_TT_DELAYED: "Используйте это, чтобы исправить ситуацию «Нам нужно перезапустить, я случайно удалил свою линию истребителей» и избежать ненужного перезапуска. \n\nЧто оно делает: §YБазовая эффективность для всех текущих и новых линий устанавливается на 130% на один день. Эффективность немедленно снизится до прежнего максимального предела.§!\n\nИспользуйте это только для исправления серьёзных ошибок в производстве (например, случайного удаления линии истребителей или замены линии танков на ЗСУ) в случаях, когда нация, допустившая ошибку, уже имеет или близка к максимальной эффективности на большинстве оставшихся назначенных заводов (оцените ситуацию сами). Будьте очень избирательны при использовании этого!"
