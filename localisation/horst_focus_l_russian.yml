 india.9.t: "Проблемы с движением Азад Хинд"
 india.9.d: "Субхас Чандра Бос был отчуждён Индийским национальным конгрессом из-за своих радикальных взглядов и теперь стремится создать подпольную армию, чтобы разжечь насильственную революцию, когда наступит подходящий момент. Наша разведка выяснила местонахождение глав организации. Если мы будем действовать быстро, мы сможем отсечь голову змеи, прежде чем она сможет нанести какой-либо ущерб."
