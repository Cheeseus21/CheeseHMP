 ROM_lessons_of_war: "Уроки войны"
 ROM_lessons_of_war_desc: "После некоторого времени боёв мы многому научились. Мы можем использовать это, чтобы улучшить наших генералов и офицеров."
 ROM_romanian_rearmament: "Начать перевооружение"
 ROM_romanian_rearmament_desc: "Приход Гитлера к власти в Германии, в сочетании с амбициями Сталина в Восточной Европе, вызывают беспокойство. Румынские вооружённые силы должны быть готовы к будущему конфликту, и прежде всего они должны быть готовы защищать суверенитет Румынии."
 staunch_traditionalist: "Ярый традиционалист"
 ROM_this_will_stop_terrorist_attacks_tt: "Выполнив эту задачу, вы остановите текущие §Yтеррористические атаки Железной гвардии§! против нации."
 ROM_deploy_reserve_divisions_tt: "Эта §YЗадача§! развернёт §Y5§! резервных дивизий для усиления нашей текущей армии."


 ROM_secured_our_territorial_integrity_tt: "\nБлагодаря нашему недавнему принятию идеологии нацизма, мы смогли дипломатически сблизиться с §Y[GER.GETNAME]§! и таким образом обеспечили положение, при котором перспектива Великой Румынии останется нетронутой.\n"
 trait_industrial_concern: "Промышленный концерн"
 ### ROMANIA FOCUSES ###
 ROM_for_the_preservation_of_greater_romania: "Сохранение Великой Румынии"
 ROM_for_the_preservation_of_greater_romania_desc: "Мы выполнили задачу наших предков — установить навечно то, что Михаил Великий смог установить лишь на мгновение, а именно: румынское объединение на обоих склонах Карпат. Наш долг — гарантировать, что никакой фактор никогда не отнимет у нас это достижение."
 ROM_honoring_the_crusade_against_atheism: "Почтить крестовый поход против атеизма"
 ROM_honoring_the_crusade_against_atheism_desc: "Любой безбожный человек никогда не заслуживает доверия. Наш долг — искоренить эту идею «атеизма» из Румынии."
 ROM_reject_french_containment_strategies: "Отклонить французские стратегии сдерживания"
 ROM_reject_french_containment_strategies_desc: "Германия сбросила оковы Версальского договора, Франция показала себя нерешительной и слабой в обеспечении его соблюдения. Возможно, пришло время дистанцироваться от французов и, возможно, даже начать переговоры с более близкими к нашей стране государствами, возможно, даже с Германией."
 ROM_the_decay_of_democracy: "Упадок демократии"
 ROM_the_decay_of_democracy_desc: "Демократические партии оказываются зажатыми между конфликтами с Железной гвардией и авторитарными тенденциями короля Кароля II. Сомнительно, как долго мы сможем поддерживать такую запутанную политическую атмосферу."
 ROM_elections_of_1937: "Последняя капля"
 ROM_elections_of_1937_desc: "Наша страна больше не может терпеть всю неразбериху в политической атмосфере. Либо королю Каролю II должна быть предоставлена полная свобода действий и позволено принимать решительные меры, либо нам нужно наконец позволить Железной гвардии реализовать амбиции Румынии."
 ROM_institute_a_royal_dictatorship: "Королевская диктатура"
 ROM_institute_a_royal_dictatorship_desc: "Ожесточённая избирательная кампания рискует ввергнуть страну в гражданскую войну. Король Кароль II объявит военное положение и приостановит все гражданские свободы. Он обеспечит восстановление стабильности в нашей великой стране."
 ROM_imprison_the_iron_guard: "Ночь вампиров"
 ROM_imprison_the_iron_guard_desc: "Основав Секуритате, совершенно новую государственную службу безопасности, мы наконец-то сможем начать организованно разгромить Железную гвардию, терроризирующую нашу нацию. Ночь вампиров будет организована, чтобы одновременно и быстро подавить Железную гвардию."
 ROM_form_the_front_of_national_rebirth: "Сформировать Национальный фронт возрождения"
 ROM_form_the_front_of_national_rebirth_desc: "Нам нужно противодействовать тревожно высокому влиянию Железной гвардии. Соответственно, мы сформируем Фронт национального возрождения (Frontul Renașterii Naționale), чтобы противостоять ему и укрепить и защитить интересы короля."
 ROM_fascist_economics: "Фашистская экономика"
 ROM_fascist_economics_desc: "Мы, как и весь остальной мир, стали свидетелями быстрого экономического восстановления и подъёма в Германии. Пришло время перенять некоторые из их политик для развития экономики нашей страны."
 ROM_operetta_fascism: "Опереточный фашизм"
 ROM_operetta_fascism_desc: "Нам нужно принять символы, униформу и приветствия, чтобы утвердить NRF (Национальный фронт возрождения) как уникальную партию, а не просто копию NSDAP или PNF."
 ROM_sentinels_of_the_motherland: "Стражи Родины"
 ROM_sentinels_of_the_motherland_desc: "Фронт национального возрождения (Frontul Renașterii Naționale) будет использоваться для воспитания молодёжи нашей страны в образцовых граждан, а также для выполнения второстепенной задачи — противодействия растущему влиянию, которое Железная гвардия оказывает на румынскую молодёжь."
 ROM_pressure_antonescu_into_becoming_prime_minister: "Кондукэтор"
 ROM_pressure_antonescu_into_becoming_prime_minister_desc: "Ион Антонеску становится всё более популярной фигурой в стране. В условиях массовых волнений в стране он один из немногих, кто может восстановить порядок в Румынии."
 ROM_arrest_general_antonescu: "Арестовать генерала Антонеску"
 ROM_arrest_general_antonescu_desc: "Позиция Антонеску против короля является проблематичной. По указанию короля необходимо задержать его, чтобы обеспечить стабильность и предотвратить напряжённую атмосферу в стране."
 ROM_antonescus_coup_detat: "Государственный переворот Антонеску"
 ROM_antonescus_coup_detat_desc: "Король Кароль II был позором для всей страны. У него даже не хватило порядочности отречься от престола. Пришло время генералу Антонеску прийти к власти и навести порядок в делах государства."
 ROM_ask_codreanue_to_form_government: "Уступить Железной гвардии"
 ROM_ask_codreanue_to_form_government_desc: "Железная гвардия неуклонно наращивала свою популярность в течение долгого времени. Многие из молодой румынской интеллигенции, особенно студенты университетов, привлечены прославлением Железной гвардией «румынского гения» и её лидерами, которые хвастаются, что гордятся говорить на румынском языке в противовес франкофильской элите. Возможно, пришло время позволить им иметь больше рычагов в управлении страной."
 ROM_national_legionary_state: "Национальное легионерское государство"
 ROM_national_legionary_state_desc: "Нам нужно укрепить правительство, чтобы обеспечить большую стабильность в Румынии. Для этого нам необходимо преобразовать государство в фашистский однопартийный тоталитарный диархический режим."
 ROM_dismantle_the_monarchy: "Демонтировать монархию"
 ROM_dismantle_the_monarchy_desc: "Король Кароль II своей грубой некомпетентностью и чрезмерным образом жизни показал себя неподходящим правителем. Его необходимо отстранить, и чтобы гарантировать, что никто вроде него больше не будет мучить нацию, вся система монархии должна быть демонтирована."
 ROM_integrate_the_iron_guard_into_the_army: "Интегрировать Железную гвардию в армию"
 ROM_integrate_the_iron_guard_into_the_army_desc: "Железная гвардия — это чрезвычайно хорошо вооружённая полувоенная сила, оснащённая всем, от револьверов до пулемётов, и даже имеющая собственные грузовики. Наши вооружённые силы получат огромную выгоду от притока новых людей из Железной гвардии."
 ROM_secure_our_territorial_integrity: "Обеспечить нашу территориальную целостность"
 ROM_secure_our_territorial_integrity_desc: "Сегодня мы стоим в Великой Румынии, у нас большая территория для управления. Мы должны иметь политические и физические средства для обеспечения её целостности."
 ROM_abandon_the_ententes: "Отказаться от всех наших прежних союзов"
 ROM_abandon_the_ententes_desc: "Французы оказались слишком слабыми, чтобы призвать Германию к ответу за нарушение Версальского договора. Возможно, будет лучше и в интересах нашей нации отказаться от старых дружеских связей и завести новые."
 ROM_co_conducator: "Ко-кондукэтор"
 ROM_co_conducator_desc: "Генерал Антонеску показал себя популярной фигурой, а также проявил симпатии к нашему делу. Чтобы повысить нашу популярность, мы должны найти способ включить его в наш режим."
 ROM_order_of_the_dragon: "Орден Дракона"
 ROM_order_of_the_dragon_desc: "Орден Дракона или Societas Draconistarum был монархическим рыцарским орденом для избранной высшей знати и монархов. Он был создан по образцу военных орденов крестовых походов, требуя от посвящённых защищать крест и сражаться с врагами христианства. Сегодня он будет включать воздушных рыцарей Румынии, которые будут защищать свою родину, как их предшественники."
 ROM_romanian_aircraft_purchasing_commission: "Комиссия по закупке самолётов"
 ROM_romanian_aircraft_purchasing_commission_desc: "Наш отечественный промышленный и технологический потенциал значительно отстаёт от крупных стран Европы. Мы создадим комиссию для рассмотрения и возможной закупки иностранных самолётов и их конструкций."
 ROM_light_metal_production: "Производство отечественной материальной части"
 ROM_light_metal_production_desc: "Наша страна располагает значительными запасами сырья, которые при правильной добыче и переработке могут обеспечить нашу зарождающуюся авиационную промышленность стабильным и надёжным источником."
 ROM_invite_german_air_companies: "Пригласить немецкие авиационные компании"
 ROM_invite_german_air_companies_desc: "ВВС Германии — Люфтваффе показали себя чрезвычайно мощными, но воздушный флот настолько хорош, насколько хороши его самолёты. Нам следует пригласить некоторые из их авиастроительных компаний в нашу страну."
 ROM_copy_succesful_german_fighters: "Скопировать успешные немецкие истребители"
 ROM_copy_succesful_german_fighters_desc: "Немцы разработали и применили одни из лучших самолётов современности. Возможно, мы можем позаимствовать «некоторые» идеи из их конструкций, чтобы усилить наши собственные разработки и создать несколько современных самолётов."
 ROM_prioritize_aircraft_industry: "Приоритет труда для авиационной промышленности"
 ROM_prioritize_aircraft_industry_desc: "Самолёты — это вершина инженерной мысли. Для создания этих сложных машин требуется высокоточный труд, поэтому авиационная промышленность будет приоритетной, и наши лучшие рабочие кадры будут направлены на производство этих летательных аппаратов."
 ROM_expand_the_army: "Расширить армию"
 ROM_expand_the_army_desc: "Армия — это инструмент, с помощью которого нация реализует свои амбиции. Должен начаться призыв, необходимо активизировать обучение и внедрять новое оружие, чтобы увеличить и усилить армию."
 ROM_expand_small_arms_manufacturing: "Производство стрелкового оружия"
 ROM_expand_small_arms_manufacturing_desc: "Армия настолько хороша, насколько хороши используемые ею винтовки. Соответственно, мы начнём производство винтовок хорошего качества и в достаточном количестве для армии."
 ROM_deploy_reserve_divisions: "Развернуть резервные дивизии"
 ROM_deploy_reserve_divisions_desc: "В рамках нашей более масштабной программы расширения армии мы призовём наши резервные дивизии и развернём их для укрепления боевой мощи нашей армии на фронте."
 ROM_grand_army: "Великая армия"
 ROM_grand_army_desc: "Мы успешно реализовали несколько политик по расширению армии. Эти политики наконец-то превращают нашу бывшую жалкую армию в «Великую армию»."
 ROM_import_and_convert_antique_artillery: "Переделать старую артиллерию"
 ROM_import_and_convert_antique_artillery_desc: "Недавние исследования наших высокопоставленных офицеров показали, что текущие калибр, начальные скорости снарядов и мобильность нашей артиллерии непригодны для использования на постоянно меняющемся современном поле боя. Мы запустим программу капитального ремонта большинства наших устаревших артиллерийских орудий."
 ROM_organizing_logistics: "Организация логистики"
 ROM_organizing_logistics_desc: "Армия не может воевать на пустой желудок. Налаживание специальных процедур управления нашими линиями снабжения может во многом гарантировать, что румынский солдат на передовой никогда не будет сражаться голодным."
 ROM_modernize_the_army: "Модернизация армии"
 ROM_modernize_the_army_desc: "Одни только числа не гарантируют победы на поле боя. Несколько наших полевых дивизий всё ещё вооружены устаревшим оружием времён Великой войны. Нам нужно направить финансирование на оснащение румынской армии современным оружием, сопоставимым с оружием соседей."
 ROM_focus_on_support_tanks: "Сосредоточиться на танках поддержки"
 ROM_focus_on_support_tanks_desc: "Процесс создания танка дорог и сложен. Мы можем создать альтернативы в виде «гибридов» или специализированных самоходных орудий, изначально спроектированных как таковые, которые, несмотря на низкую стоимость, могут обеспечить румынскому пехотинцу необходимую огневую поддержку на поле боя."
 ROM_the_R_series: "Средний танк серии R"
 ROM_the_R_series_desc: "Чехи разработали танк LT-35, а французы — R35. Наши тесные отношения с этими странами позволят нам купить эти танки по значительно низкой цене. Эти машины и их производные могут быть легко приняты на вооружение в качестве танков серии R."
 ROM_the_magpie_scheme: "Собирать всё!"
 ROM_the_magpie_scheme_desc: "В шаткой ситуации наших бронетанковых возможностей никакая броня не является бесполезной. Мы должны собирать и выискивать отовсюду, чтобы удовлетворить потребности румынской армии."
 ROM_invite_axis_motor_companies: "Пригласить моторные компании стран Оси"
 ROM_invite_axis_motor_companies_desc: "Несколько ведущих стран имеют штаб-квартиры в странах Оси, особенно в Германии. При плачевно низкой производительности нашей моторной промышленности нам следует пригласить некоторые из них в Румынию, чтобы помочь нам развить собственные возможности в этой области."
 ROM_mechanized_soldiers: "Механизация наших солдат"
 ROM_mechanized_soldiers_desc: "Темпы ведения войны постоянно растут, большая скорость означает большую наступательную способность. Румынская армия должна быть оснащена транспортными средствами, которые могут быстро доставить солдата на передовую, обеспечивая ему достаточную защиту."
 ROM_haide_haide_haide: "Хайде! Хайде! Хайде!"
 ROM_haide_haide_haide_desc: "Мы вооружили румынскую армию современным оружием и современными технологиями. Всё это должно быть тесно интегрировано, чтобы придать румынской армии необходимую наступательную мощь для полного уничтожения врага. ХАЙДЕ! ХАЙДЕ! ХАЙДЕ!"
 ROM_national_recovery: "Восстановление после Великой депрессии"
 ROM_national_recovery_desc: "С Великой депрессией мировые цены на зерно рухнули, и Румыния была ввергнута в сельскохозяйственный кризис. Крестьяне-землевладельцы погрязли в долгах, и правительство ввело поддержку цен и приняло мораторий на сельскохозяйственные долги, чтобы облегчить их положение. Теперь, когда восстановление началось, мы будем использовать внутренний капитал для финансирования новых отраслей промышленности, включая производство вооружений, чтобы выбраться из сельскохозяйственного спада."
 ROM_encourage_trade_with_germany: "Новые торговые соглашения с Германией"
 ROM_encourage_trade_with_germany_desc: "Германия может быть ценным союзником в долгосрочной перспективе, мы должны подписать соглашение с Рейхом. Мы будем поставлять в Германию различные румынские товары в области сельского хозяйства, древесину и нефть в обмен на технические ноу-хау и военное оборудование. Соглашение также предоставит торговые льготы немецким компаниям в Румынии в виде свободных торговых зон."
 ROM_carpathian_network: "Карпатская инфраструктурная сеть"
 ROM_carpathian_network_desc: "Карпатские горы создали трудности с доступностью для большой части нашей страны. Мы немедленно начнём новую программу строительства новых дорог и расширения существующих, чтобы улучшить доступность отдалённых регионов Карпатии."
 ROM_oil_for_armaments: "Нефть в обмен на вооружение"
 ROM_oil_for_armaments_desc: "Германия разработала одно из лучших вооружений в своих категориях. В рамках подписанного с ними торгового соглашения мы будем поставлять им нефть, в которой они отчаянно нуждаются, в обмен на вооружение."
 ROM_nationalize_the_oil: "Национализировать нефть"
 ROM_nationalize_the_oil_desc: "Самым ценным достоянием нашей страны является нефть. Мы не можем доверять непостоянным частным владельцам, чтобы они способствовали благу нации. Мы передадим контроль над нефтяными месторождениями от частных лиц государству, чтобы лучше их использовать."
 ROM_reichswerke_subsidiary: "Влияние Рейхсверке на Румынию"
 ROM_reichswerke_subsidiary_desc: "Рейхсверке приобрело несколько румынских активов; почти весь угольный и сталелитейный потенциал страны был взят под контроль через серию дружественных соглашений и передан под совместный германо-румынский контроль. Особое внимание было уделено нашей крупнейшей верфи в Галаце. Немецкий опыт во многом будет способствовать развитию нашей страны, однако, если влияние останется бесконтрольным, это может иметь последствия для нашего суверенитета."
 ROM_improve_cross_country_railways: "Улучшение междугородних железных дорог"
 ROM_improve_cross_country_railways_desc: "Мы можем увеличить скорость добычи ресурсов, особенно нашей драгоценной нефти, сократив время транспортировки от места добычи до перерабатывающего центра. Этого легко можно достичь, улучшив наши железнодорожные сети."
 ROM_autarky: "Расширить добычу нефти"
 ROM_autarky_desc: "Современная нация работает на нефти. Нефть, не добытая, — это потерянная нефть. Мы увеличим добычу нефти, улучшив существующие объекты."
 ROM_bucharest_technical_institute: "Инженерные школы"
 ROM_bucharest_technical_institute_desc: "Румыния требует большого количества технических специалистов для повышения производительности нашей страны. Мы пересмотрим учебные программы наших текущих инженерных школ и создадим новые школы, чтобы увеличить как количество, так и качество."
 ROM_reduce_reliance_on_foreign_imports: "Улучшить экскавационное оборудование"
 ROM_reduce_reliance_on_foreign_imports_desc: "Мы внедрим новейшие разработки в области экскаваторного оборудования, чтобы значительно повысить эффективность нашей горнодобывающей и нефтедобывающей промышленности."
 ROM_more_efficient_agricultural_procurement: "Повышение эффективности сельского хозяйства"
 ROM_more_efficient_agricultural_procurement_desc: "Румыния имеет большую долю населения, занятого в сельском хозяйстве. Мы можем внедрить новые методы и инструменты для значительного повышения эффективности и высвобождения рабочей силы для нашей быстро развивающейся промышленной базы."
 ROM_expand_the_axis_oil_trade: "Расширение торговли нефтью"
 ROM_expand_the_axis_oil_trade_desc: "Растущие армии Европы расширяются, строится всё больше танков и самолётов, и ни одна европейская страна (кроме СССР, но кто с ними вообще торгует?) не имеет необходимой нефти для их обеспечения. Мы можем получить большую прибыль, продавая нашу нефть другим европейским странам."
 ROM_expand_fuel_stockpiles: "Подготовка запасов топлива"
 ROM_expand_fuel_stockpiles_desc: "Какой бы стороны мы ни придерживались, наша нефть делает нас стратегически важным регионом как для союзников, так и для врагов, которые, вероятно, нацелятся на наши нефтяные месторождения. Нам следует создать большие запасы топлива на случай нарушения добычи."
 ROM_expand_the_war_industry: "Строительство новых оружейных заводов"
 ROM_expand_the_war_industry_desc: "Нам нужно построить больше оружейных заводов, чтобы производить новое оружие в достаточных количествах для укрепления румынской армии."
 ROM_the_duty_to_work: "Удовлетворение высокого спроса"
 ROM_the_stabilization_plan: "План стабилизации"
 ROM_the_stabilization_plan_desc: "Из-за нестабильности нашей экономики и недавних политических потрясений румынский народ находится в замешательстве. Нам необходимо начать стабилизацию экономической и политической атмосферы в стране, если Румыния когда-либо хочет процветать."
 ROM_malaxa_focus: "Промышленная альтернатива нефти"
 ROM_malaxa_focus_desc: "Экономика нашей страны значительно зависит от нефти, нам нужно начать поиск других альтернатив для вклада в нашу экономику."
 ROM_reduce_reliance_on_oil: "Снижение зависимости от нефти"
 ROM_reduce_reliance_on_oil_desc: "Торговля нефтью привела к тому, что другие страны знают нас только благодаря нашей нефти. Чтобы развивать Румынию и создать её более сильный образ, нам нужно начать отходить от нефти."
 ROM_improve_living_standards: "Повысить уровень жизни"
 ROM_improve_living_standards_desc: "Другой способ улучшить нашу промышленность и армию — повысить зарплаты, увеличить отпуска, сделать города чище и т.д. Всё это может создать более счастливое население, которое будет готово работать усерднее и лучше для государства, которое помогло им улучшить жизнь."
 ROM_domestic_industrial_developments: "Внутреннее промышленное развитие"
 ROM_domestic_industrial_development_desc: "Румынии нужна более крупная и лучшая промышленная база. Нам нужно активно инвестировать в наш промышленный сектор, так как это может сильно помочь нам в долгосрочной перспективе."
 ROM_the_romanian_miracle: "Преодоление ресурсного проклятия"
 ROM_the_romanian_miracle_desc: ""
 ROM_force_the_king_to_abdicate: "Заставить короля отречься от престола"
 ROM_force_the_king_to_abdicate_desc: "Румыния была вынуждена уступить Бессарабию и Северную Буковину Советскому Союзу, Северную Трансильванию — Венгрии, а Южную Добруджу — Болгарии. После этих территориальных потерь король Кароль II стал ещё большим позором для Румынии, чем раньше. Он должен отречься, если Румыния когда-либо сможет восстановиться."
 ROM_axis_friendly_government: "Дружественное Оси правительство"
 ROM_axis_friendly_government_desc: "Французы разбиты и опустошены, британцев даже нет на континенте. Германия осталась единственной державой в Европе, и нам нужно начать согласовывать наши интересы с интересами Германии, если мы хотим выжить в этом неопределённом будущем."
 ROM_wargoal_on_bulgaria: "Обеспечение безопасности Болгарии"
 ROM_wargoal_on_bulgaria_desc: "Болгария, как и Венгрия, имеет общие границы и пограничные споры с нами. Нам нужно начать работу по решению вопроса Южной Добруджи, чтобы защитить нашу южную границу."
 ROM_wargoal_on_hungary: "Обеспечение безопасности Венгрии"
 ROM_wargoal_on_hungary_desc: "Венгрия, как и Болгария, имеет общие границы и пограничные споры с нами. Нам нужно начать работу по решению вопроса Северной Трансильвании, чтобы защитить нашу северную границу."
 ROM_integrate_hungary: "Интегрировать Венгрию"
 ROM_integrate_bulgaria: "Интегрировать Болгарию"
 ROM_federation_of_the_danube: "Уничтожение Королевства Югославия"
 ROM_federation_of_the_danube_desc: "Югославия единогласно ненавидима всеми балканскими странами, имея пограничные споры со многими из них. Мы можем заручиться помощью этих «союзников» в уничтожении Королевства Югославия."
 ROM_legionnaires_rebellion: "Мятеж легионеров"
 ROM_legionnaires_rebellion_desc: "Из-за того, что кондукэтор Йон Антонеску постепенно урезал привилегии военизированной организации «Железная гвардия», её члены, также известные как легионеры, восстали. «Железная гвардия» подняла мятеж против правительства и устроила погром евреев в Бухаресте."
 ROM_ensure_agricultural_self_sufficiency: "Обеспечение сельскохозяйственной самодостаточности"
 ROM_ensure_agricultural_self_sufficiency_desc: "Мы можем полагаться на Германию в технологическом опыте, но единственное, что не может зависеть от другой страны, — это наше продовольственное снабжение. Особое внимание следует уделить нашему сельскохозяйственному сектору для достижения самодостаточности."
 ROM_support_the_war_industry: "Поддержать военную промышленность"
 ROM_support_the_war_industry_desc: "Каждый гражданин должен понимать свою роль во время войны, это патриотический долг каждого гражданина — вносить вклад в военные усилия, покупая военные облигации, усердно работая, чтобы пули, произведённые в тылу, вовремя попадали на фронт. Пришло время всем поддержать военную промышленность."
   
   









