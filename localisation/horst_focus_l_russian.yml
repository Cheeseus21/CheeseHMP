 steiner_tt: "§RШтейнер организует армию из 8 танковых дивизий в вашей столичной провинции§!"

 USA_reorganization_act: "Закон о реорганизации"
 USA_reorganization_act_desc: "§RЗакон о реорганизации§! — Это довольно сложная процедура, включающая полную или частичную смену собственника корпоративных прав, изменение организационно-правовой формы бизнеса, ликвидацию отдельных подразделений или создание на базе одного из нескольких, либо закрытие предприятия."
 USA_roosevelt_deal: "Новый курс Рузвельта"
 USA_roosevelt_deal_desc: "§RНовый курс Рузвельта§! — Экономическая и социальная программа, проводимая администрацией президента США Ф. Рузвельта с 1933 по 1939 год, направленная как на преодоление последствий Великой депрессии, так и на структурные реформы в промышленности, сельском хозяйстве, финансах, энергетике и трудовых отношениях."
 USA_invest_in_north_east: "Инвестиции в Северо-Восток"
 USA_invest_in_north_east_desc: "Инвестируя в Северо-Восток, мы сможем разрабатывать месторождения стали, которые понадобятся нам в будущем."
 USA_the_bank_of_america: "Bank of America"
 USA_the_bank_of_america_desc: "§RBank of America§! — Сможет хранить золотые запасы наших союзников, а также выдавать нам и им кредиты на войну."
 USA_invest_in_midvest: "Инвестиции в Средний Запад"
 USA_invest_in_midvest_desc: "Инвестируя в крупную промышленную базу США, мы сможем сделать её ещё сильнее."
 USA_national_labour_act: "Национальный закон о трудовых отношениях"
 USA_national_labour_act_desc: "§RНациональный закон о трудовых отношениях§! — Это основополагающий закон в трудовом праве США. Он гарантирует право работников частного сектора создавать профсоюзы, вести коллективные переговоры и принимать коллективные действия, такие как забастовки."
 USA_office_of_scientific_research_and_developmentx: "Управление научных исследований и разработок"
 USA_office_of_scientific_research_and_developmentx_desc: "С приближением войны мы должны сосредоточиться на наших научных усилиях, чтобы не уступать потенциальному противнику."
 USA_increase_defence_budget: "Увеличить оборонный бюджет"
 USA_increase_defence_budget_desc: "Увеличивая оборонный бюджет, мы сможем привлечь больше ресурсов и людей для защиты нашей страны."
 USA_vinsons_naval_act: "Закон Винсона о флоте"
 USA_vinsons_naval_act_desc: "§RЗакон Винсона о флоте§! — Закон, устанавливающий состав Военно-морских сил США, разрешающий строительство определённых военных кораблей и для других целей."
 focus_on_asia: "Фокус на Азию"
 focus_on_asia_desc: "Сосредоточившись на Азии, мы сможем остановить захват Японией островов."

 ROM_anti_air_modernization: "Разработать Burileanu II"
 ROM_anti_air_modernization_desc: "Наша армия опасно зависит от иностранных зенитных разработок и производства. Нам необходимо создать преемника знаменитого зенитного орудия Burileanu прошлой войны."
 ROM_protect_ploesti: "Защитить нефтяные месторождения Плоешти"
 ROM_protect_ploesti_desc: "Мы немедленно начнём строительство современной сети зенитных батарей вокруг нефтяных месторождений Плоешти."
 ROM_siebel: "Паром Зибеля"
 ROM_siebel_desc:0 "We will receive makeshift ferries made by the Wehrmacht for Operation Sea Lion
 BUL_peace_tt: "\n§RМы сохраним нейтралитет с Советским Союзом!§R"
 pick_trotsky_tt: "Если мы завершим фокус §HПерманентная революция§!, мы получим следующих политических советников:"
 pick_soviet_tt: "\nЕсли мы завершим фокус §HУкрепить Советы§! и §HСоциалистический гуманизм§!, мы получим следующих политических советников:"
 pick_soviet2_tt: "\nЕсли мы завершим фокус §HУкрепить Советы§! и §HВозвращение к НЭПу§!, мы получим следующих политических советников:"
 permanent_revolution_tt: "\n§RМы разорвём дипломатические отношения со всеми некоммунистическими государствами, что помешает нам лицензировать иностранные технологии, получать ленд-лиз от Союзников и торговать с ними§!"
 SOV_release_innocents: "Освободить невиновных"
 SOV_release_innocents_desc: "Слишком много наших товарищей было сослано или заключено в тюрьмы Сталиным. Мы должны освободить их и приветствовать их возвращение на Родину."
 ENG_mince: "Операция «Мясной фарш»"
 ENG_mince_desc: "Чтобы успешно провести вторжение в Европу, мы должны скрыть наши передвижения и планы. Подброска ложных планов на труп бездомного, одетого как армейский капитан, может обмануть немцев."
 HUN_convert_horthy_ii: "Провозгласить Апостольское королевство"
 HUN_convert_horthy_ii_desc: "Нам удалось достичь гигантского могущества, всё с помощью святой короны. Теперь мы имеем право провозгласить апостольское королевство, небесную страну на земле, которая является связующим звеном между землёй и небом и представляет силу бога на земле. Мы защитники христианства и святой церкви и будем ими до скончания веков."
 HUN_mission_to_germany_1: "Дипломатическая миссия в Германию"
 HUN_mission_to_germany_1_desc: "Ясно, что единственный путь вперёд для Венгрии — вместе с Германией под руководством немецкого дворянина. Нам следует отправить делегацию в Германию для обсуждения будущего наших двух стран и заверения их в нашей дружбе. Они предлагают помощь с ревизией и готовы покупать нашу продукцию, поэтому логично показать, что мы ценим их помощь."
 HUN_the_kings_guard_1: "Королевская гвардия"
 HUN_the_kings_guard_1_desc: "За сотни лет у всех венгерских королей была своя королевская гвардия, и эта традиция встречается за пределами Венгрии почти повсюду в мире. Мы учредим Королевскую гвардию — военизированную организацию для защиты нашего короля, состоящую из элиты хонведа."
 HUN_the_kings_guard_1a_tt: "Увеличить лимит шаблонов §YКоролевская гвардия§! на §G+20§!."
