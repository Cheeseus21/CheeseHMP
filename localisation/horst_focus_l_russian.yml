 SIA_small_depression_effects: "Остаточные эффекты Депрессии"
 SIA_small_depression_effects_desc: "Великая депрессия оказала сильное влияние на экономику Сиама, особенно на экспорт после девальвации фунта стерлингов, что сделало наш рис гораздо дороже на рынке. После многих экономических реформ нам удалось смягчить многие её последствия, но некоторые из них всё ещё заметны и потребуют окончательного вмешательства государства, чтобы избавиться от них навсегда."
