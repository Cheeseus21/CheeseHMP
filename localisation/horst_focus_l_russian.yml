 all_india_forward_bloc_majority_desc: "§O[From.GetName]§! §Wнаходится под влиянием §CНезависимой лейбористской партии§!\n§CИндийский национальный конгресс§! имеет влияние §G[?From.inc]§!\n§CЮнионистская партия§! имеет влияние §G[?From.upa]§!\n§CНезависимая лейбористская партия§! имеет влияние §G[?From.ifb]§!\n§gМалые партии§! имеют влияние §G[?From.neutral]§!\n"
