 NOR_navy_4: "Быстрые торпеды"
 NOR_navy_4_desc: "Ценой времени перезарядки и заряда взрывчатки мы можем перегрузить наши торпеды топливом, позволяя им развивать высокую скорость и поддерживать её на больших дистанциях, легче преодолевая экраны."
 NOR_upgrade_from_the_norge_class_desc: "Нам нужны новые крупные корабли. Броненосцы береговой обороны хорошо подойдут для наших нужд."
 NOR_naval_drills: "Военно-морские учения"
 NOR_escort_effort: "Развитие эскортов"
 NOR_convoy_effort: "Восстановить торговый флот"
 NOR_convoy_effort_desc: "Все войны ведутся, выигрываются и проигрываются на линиях снабжения. Наши опытные кораблестроители могут быстро построить конвойные суда для Союзников."
 NOR_escort_effort_desc: "Есть потребность в противолодочных и эскортных эсминцах. Нам нужно помочь нашим Союзникам с этим."
 NOR_naval_drills_desc: "Правильная подготовка преподаст нам ценные уроки"
 NOR_free_navy: "Норвежский свободный флот"
 NOR_free_navy_desc: "Мы попросим наших союзников одолжить нам несколько их эсминцев для защиты нашего собственного судоходства"
 NOR_ASW: "Британская школа ПЛО"
 NOR_cold_navy: "Флот холодных вод"
 NOR_cold_navy_desc: "Будучи арктической нацией, наши моряки хорошо обучены ведению морского боя в холодных водах, что даёт им преимущество над Осью."
 NOR_naval_radar: "Морской радар"
 NOR_naval_radar_desc: "Радар открывает заманчивые возможности лишить врагов покрова ночи и обнаруживать их даже в плохую погоду."
 NOR_ASW_desc: "Соединённое Королевство добилось большого прогресса в борьбе с вражескими подводными лодками. Мы можем работать с ними, чтобы улучшить собственную доктрину."
 NOR_standing_navy: "Постоянный флот"
 NOR_standing_navy_desc: "Современный постоянный флот позволит нам властвовать над волнами"
 NOR_carriers: "Авианосцы сопровождения"
 NOR_carriers_desc: "Строительство авианосцев малого размера для сопровождения торгового флота против подводных лодок и небольших тактических групп флота более осуществимо для нас, чем полноценные ударные авианосцы."
 TIB_anti_meme33: "Освобождение Лондона от Японии"
 GER_the_great_turn: "Финальная победа"
 GER_the_great_turn_desc: "Победа над международным большевистским заговором неизбежна! Немецкому народу суждено переломить ход войны и победить, поражение невозможно!"
 TIB_anti_meme: "Возврат к атаке 1.4"
 endsieg_tt: "§HНаша§! §CАтака дивизии на ключевой территории§! §Hи§! §CОборона дивизии на ключевой территории§! §Hувеличатся на§! §C10%§! \n\n§HВыпуск продукции на наших заводах увеличится в зависимости от количества потерянных нами штатов. \n\nРасчёт выпуска продукции начинается после 22.06.1942.§!"
 ITA_fort_milan: "Крепость Милан"
 ITA_fort_milan_desc: "Мы будем сражаться до последнего итальянца! Мы сделаем Милан сталинградом Италии!"
 ITA_The_Riches_Of_The_North: "Богатство Севера"
 ITA_The_Riches_Of_The_North_desc: "Северная часть материка — экономическое сердце нашей империи; сделаем это сердце сильнее для более стабильной экономики."
 ITA_Dont_Forget_The_Colonies: "Остальная империя"
 ITA_Dont_Forget_The_Colonies_desc: "Мы должны нести цивилизацию и богатство всей нашей империи, а не только Италии. Мы должны распространить нашу систему в колонии Ливия, интегрировав арабов в Национальную фашистскую партию и построив тысячи километров новых дорог. Только тогда мы устоим в будущем!"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire: "Создание рабочих мест в бедных регионах"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire_desc: "Нам нужно создать богатство для бедных в наших нецивилизованных регионах. Как, спросите вы? Мы создадим рабочие места, которые будут способствовать растущей милитаризации нашей страны. Это беспроигрышная ситуация."
 ITA_Skillful_Workers: "Сытые желудки"
 ITA_Skillful_Workers_desc: "Бедняки теперь довольно искусны в производстве оружия на новых оружейных комплексах, построенных для них, благодаря опыту и, прежде всего, сытым желудкам. Рабочие места приносят деньги бедным, а деньги обеспечивают едой семью. Эта стратегия сытых желудков окупается в наших производственных показателях."
 ITA_Our_Finest_Hour: "Наш звездный час"
 ITA_Our_Finest_Hour_desc: "Наша промышленная трансформация завершена. Мы готовы к темным временам, которые скоро наступят. Это будет наш звездный час."
 GER_standardpanzer: "Стандартный танк"
 GER_standardpanzer_desc: "Мы внедрим финальную стандартизированную серию танков. Эта серия будет варьироваться от малого E-10, среднего танка E-50 Standardpanzer до тяжелого танка E-75 и, наконец, сверхтяжелого E-100. С этими стандартизированными, хоть и поспешными, проектами мы сможем производить танки со значительно меньшими затратами. Это поможет создать излишки танков, которые позволят нам одержать окончательную победу."
 MAN_resources: "Развитие горнодобывающей и нефтяной промышленности"
 MAN_resources_desc: "Наши земли богаты алюминием, сталью и нефтью, но долгое время они были заброшены. Развитие этих ресурсов — путь вперед."
 MAN_railways_kirin_desc: ""
 GER_choco_foc: "Танковый шоколад"
 GER_choco_foc_desc: "Скорость — это всё, что нам нужно."
 GER_pillen_foc: "Таблетки Германа Геринга"
 GER_pillen_foc_desc: "Выше, быстрее, сильнее."
 GER_stuka_foc: "Таблетки «Штука»"
 GER_stuka_foc_desc: "Наши пилоты пикирующих бомбардировщиков — одни из лучших в мире, но война требует от нас 120% того, что у нас есть."
 SOV_support_usa: "Поддержка Союзников"
 fin_shocktroops: "Гвардейские егеря"
 fin_shocktroops_desc: "Город Ленинград — городская крепость, слишком трудная для штурма большей частью нашей армии. Нам нужны специализированные пехотные части, обученные городскому бою."
 fin_ranger: "Сисси-войска"
 fin_ranger_desc: "Мы должны поддержать создание подразделений, способных сражаться вдали от линий снабжения в густых лесах Финляндии и России."
 SOV_support_usa_desc: ""
