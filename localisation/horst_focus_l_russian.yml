 disable_ai_stuff: "Производство ИИ отключено"
 wunder_tt: "Мы начнем нашу программу ядерного оружия, Уранпроект, и начнем производство §CТяжелой воды§!, если контролируем Норвегию.\n\nИсследует §C«Атомные исследования»§!"
 rocket_stuff_tt: "Мы начнем нашу ракетную программу, Фау.\n\nИсследует §C«Экспериментальные ракеты»§!\n\n"
 RAJ_expand_air_bases2: "Расширение восточных авиабаз"
 RAJ_expand_air_bases2_desc: "Бирма находится на передовой с Японией — нам нужны аэродромы для нее."
 HUN_hmp_heavy_fighter_effort: "Выпуск истребителей"
 HUN_hmp_heavy_fighter_effort_desc: "Нам нужны истребители, способные завоевывать воздушное превосходство и перехватывать вражеские самолеты, угрожающие нашей стране."
 HUN_hmp_tac_focus: "Развитие бомбардировщиков"
 HUN_hmp_tac_focus_desc: "Современная армия нуждается в поддержке не только на земле, но и в воздухе."
 france_is_kill: "Капитулировала"
 VIC_join_axis: "Подписание Тройственного пакта"
 VIC_join_axis_desc: "Из-за всех посягательств Союзников на наш суверенитет и колонии мы находимся в необъявленной войне с Британией. Нам следует формально присоединиться к Германии, чтобы защитить нашу нацию!"
 JAP_the_zero2_tt: "Исследует §CПалубные истребители 3§! и добавляет §Y«Zero»§! в производство."
 amerika_bomber_tt: "Исследует §CСовременный большой планер§!"
 jet_focus_tt: "Исследует §CРеактивный истребитель§! и §CРеактивные двигатели§! как для §GГермании§!, так и для §GИталии§!."
 ural_bomber_tt: "Исследует §CСовременный средний планер§!"
 ETH_generals_focus_tt: "\n§RЭто ОТКЛЮЧИТ возможность играть за Ирак§!\n\n"
 ENG_us_civs_1: "Плати и вези"
 TIB_nothing45: "Присоединение к StrategyStreamers"
 CAN_ATLANTIC_DEMOCRATIC: "Атлантическое Содружество"
 ENG_us_civs_2: "Малый ленд-лиз Британии"
 ENG_us_civs_3: "Ленд-лиз Британии"
 ENG_us_civs_4: "Крупный ленд-лиз Британии"
 ENG_us_civs_5: "Арсенал демократии"
 linie: "§LСтроит Рейнскую линию, Штеттинскую линию и крепость Берлин§!"
 TIB_nothing2: "Издание Horst: Global Offensive"
 ENG_no_asia_idea: "Балансир войны на Западе"
 ENG_no_asia_idea_desc: "Этот национальный дух добавлен Соединенному Королевству, чтобы сделать Союзников похожими на Союзников из даты начала «Собирающейся бури» по возможностям."
 ENG_no_asia_idea2: "Дорога к войне"
 ENG_no_asia_idea2_desc: "Вам дали выбор между войной и бесчестьем. Вы выбрали бесчестье, и вы получите войну. — Уинстон Черчилль"
 ENG_no_asia_idea3: "Война"
 ENG_no_asia_idea3_desc: "…мы будем сражаться на пляжах, мы будем сражаться на посадочных площадках, мы будем сражаться в полях и на улицах, мы будем сражаться на холмах; мы никогда не сдадимся… — Уинстон Черчилль"
 I_HATE_ASIA_NAME: "Война на Западе"
 I_HATE_ASIA_DESC: "Вторая мировая война без войны на Дальнем Востоке.\n\nСоюзники/Коминтерн: Великобритания, Франция, Канада, ЮАС, Норвегия, Польша, Греция и Советский Союз.\n\nОсь: Германия, Италия, Румыния, Венгрия, Финляндия, Вишистская Франция, Итальянская Восточная Африка, Хорватия, Словакия и Болгария."
 ENG_overlord_states: "Операция «Повелитель»"
 ENG_overlord_states_desc: "Европа — крепость, поэтому мы должны тщательно спланировать наш штурм."
 NZL_bob_semple_tank_tt: "Включает производство §HБоба Семпла§"
 fourth_shore_tt: "§GВся Ливия станет нашей основной территорией§!"
 ITA_fourth_shore: "Четвертый берег"
 ITA_sword: "Меч Ислама"
 ITA_sword_desc: "Как наследник османской власти в Ливии, мы можем по праву претендовать на звание Защитника ислама."
 ITA_fourth_shore_desc: "Итальянские мусульмане — четвертый берег Италии, неотъемлемая часть итальянской нации. Строя коранические школы, восстанавливая мечети и создавая школы исламской культуры, мы сможем интегрировать Ливию в Италию. Мы гарантируем мир, справедливость, благополучие и уважение к законам Пророка."
 MAN_found_the_northeast_transport_committeex_desc: "Если мы хотим стать экономической державой Азии, мы должны освободиться от влияния японских дзайбацу и Южно-Маньчжурской железной дороги. Создавая принадлежащие и управляемые Маньчжоу-го железные дороги, мы сможем направлять развитие так, чтобы оно в первую очередь приносило пользу Маньчжоу-го."
 MAN_five_year_plan_new_desc: "Быстрая индустриализация Советского Союза — доказательство того, что нам не нужен капитализм для развития экономики; мы можем сделать это благодаря одной лишь силе воли и решимости. План императора Пу И превратит Маньчжоу-го в промышленную державу."
 MAN_railways_opener_desc: "Систематическое расширение и развитие Южно-Маньчжурской железной дороги — наш билет к мощной экономике."
 MAN_anshan_steelworks_desc: "Основание сталелитейного завода позволит развить остальную тяжелую промышленность"
 #MAN_showa_steel_desc: "Мы можем развить наш сталелитейный завод в Ляотуне до крупнейшего в Восточной Азии с помощью Японии."
 MAN_railways_extend_to_port_arthur_desc: "Нам следует расширить нашу железную дорогу до Даляня, чтобы улучшить торговлю с Японией"
 MAN_railways_expand_to_east_hebei_desc: "Нам следует расширить нашу железную дорогу до Восточно-Хэбэйского автономного правительства, чтобы улучшить торговлю с Японией"
 MAN_railways_extend_to_pyongyang_desc: "Нам следует расширить нашу железную дорогу до Кореи, чтобы улучшить торговлю с Японией"
 MAN_railways_japanese_imports_desc: "В рамках программы развития Японии мы имеем легкий доступ к японским промышленным товарам."
 SOV_shbb_tt: "\nДобавляет в производство почти завершенный сверхтяжелый линкор класса «Советский Союз».\n\n"
 SOV_expand_red_fleet2: "Бросить вызов Кригсмарине"
 SOV_expand_red_fleet2_desc: "Программа перевооружения Кригсмарине быстро создала угрозу на наших балтийских берегах. Мы должны заложить новые флагманы, чтобы бросить вызов Германии за контроль над Датскими проливами и обезопасить наши моря от фашистского господства."
 USA_army_of_the_united_states2: "Закон об интеграции женщин в армию"
 USA_war_with_japan: "Удар по Восходящему солнцу"
 USA_war_with_japan_desc: "Фатально вступать в войну без воли победить."
 FRA_victors_of_wwi2: "Победители Великой войны"
 USA_overlord: "Операция «Повелитель»"
 USA_overlord_desc: "Европа — крепость, поэтому мы должны тщательно спланировать наш штурм."
 fin_army_effort: "Развитие армии"
 GER_guns2: "Панцерфауст"
 GER_guns2_desc: "Каждый призванный в армию человек должен быть вооружен нашим самым эффективным и современным средством уничтожения танков — панцерфаустом. Оснащение каждого солдата этим грозным, но дешевым оружием заставит вражескую бронетехнику замедлить продвижение, ожидая свою пехоту, или рисковать полным уничтожением."
 GER_guns1: "Sturmgewehr"
 GER_guns3: "Вампир"
 GER_guns3_desc: "Способность видеть врага ночью открывает совершенно новое измерение войны — возможность эффективно проводить ночные операции против сил противника без значительных помех."
 GER_shtank: "Превосходство огневой мощи"
 GER_shtank_desc: "Непробиваемые сверхтяжелые танки..."
 FIN_armor_effort: "Развитие бронетехники"
 EFR_devalue_the_franc: "Девальвация франка"
 FIN_armor_effort_desc: "Применив знания, полученные в ходе моторизации нашей пехоты, мы также можем усовершенствовать бронетехнику."
 EFR_devalue_the_franc_desc: "Пока другие страны пытались помочь экономике, позволяя своей валюте терять ценность, мы твёрдо отказались идти на подобный шаг. В результате наша экономика оказалась в числе отстающих. Если мы хотим повысить конкурентоспособность и выдержать грядущую бурю, мы не должны упускать возможность девальвации своей валюты, даже если это окажется непопулярным решением."
 EFR_autoroutes: "Автомагистрали"
 EFR_autoroutes_desc: "Немцы потрясли весь мир системой своих скоростных дорог с ограниченной доступностью, соединяющих разные регионы страны. Мы можем показать миру, что и сами способны сделать не хуже."
 EFR_invest_in_the_metropole: "Развитие метрополии"
 EFR_invest_in_the_metropole_desc: "Нашим первым шагом по восстановлению индустрии станет улучшение индустриальной базы в наших континентальных владениях."
 EFR_invest_in_the_colonies: "Развитие колоний"
 EFR_invest_in_the_colonies_desc: "В наших европейских индустриальных центрах не хватает населения и ресурсов для массового расширения производства. Чтобы наша экономика была конкурентоспособна в мировом масштабе, надо задействовать колонии."
 EFR_colonial_industry_effect_tt: "Добавляет две §Yфабрики§! в каждое колониальное государство, в которое ранее вкладывались инвестиции.\n"
 EFR_industrial_expansion_effect_tt: "Добавляет две §Yфабрики§! в каждую метрополию, в которую ранее вкладывались инвестиции.\n"
 EFR_military_factories_effect_tt: "Добавляет два §Yвоенных завода§! в каждое государство, в которое ранее делались инвестиции.\n"
 EFR_invest_in_west_africa: "Инвестировать в Западную Африку"
 EFR_invest_in_west_africa_desc: "Благодаря своим обширным резервам рабочей силы и ресурсов Западная Африка — идеальный кандидат для инвестиций."
 EFR_invest_in_indochina: "Инвестировать в Индокитай"
 EFR_invest_in_indochina_desc: "Большое расстояние от наших владений в Индокитае до метрополии может показаться недостатком, но оно же и защитит производство от атак врага."
 EFR_invest_in_syria: "Инвестировать в Сирию"
 EFR_invest_in_syria_desc: "Сирия идеально расположена для нашего снабжения в случае войны в Европе или Африке. Усилив индустриальный потенциал страны, мы также улучшим свою позицию в регионе."
 EFR_global_integration: "Глобальная интеграция"
 EFR_global_integration_desc: "Британская империя — отлично настроенная система из взаимоподдерживающих элементов. Нам вполне по силам так же безупречно наладить взаимодействие с колониями."
 EFR_begin_rearmament: "Начать перевооружение"
 EFR_begin_rearmament_desc: "Двадцатилетнее перемирие, предсказанное маршалом Фошем в 1919 году, быстро подходит к концу, и по всему видно, что в ближайшие годы мир погрузится в войну. Мы должны быть готовы."
 EFR_firepower_kills: "Убийственная огневая мощь"
 EFR_firepower_kills_desc: "Уроки Великой войны оказались столь же простыми, сколь и жестокими: дни, когда солдаты убивали друг друга с небольшого расстояния, прошли. Сегодня убивают массово и с большой дистанции при помощи самого современного оружия."
 EFR_methodical_battle: "Методичные битвы"
 EFR_methodical_battle_desc: "Есть те, кто утверждает, будто битва — это хаос, но они глупцы. Битва — это методичное использование нужных инструментов исходя из общего плана. Если планировать тщательно, все усилия противника могут пойти насмарку."
 EFR_division_cuirassee: "Моторизированная дивизия"
 EFR_division_cuirassee_desc: "Изобретательный офицер по фамилии де Голль предложил новый вид дивизий, в которых тяжёлая бронетехника будет объединена с пехотой и средними танками."
 EFR_infantry_tanks: "Пехотные танки"
 EFR_infantry_tanks_desc: "Первая и последняя обязанность танков — помогать пехоте захватывать и удерживать территорию. Следовательно, мы всегда должны укомплектовывать наши пехотные подразделения современными и эффективными танками."
 EFR_special_forces: "Войска специального назначения"
 EFR_special_forces_desc: "В будущем война всё чаще будет вестись там, где обычные пехотинцы наткнутся на предел собственных возможностей. Мы должны создать новые, особо подготовленные подразделения, которые смогут действовать в таких условиях."
 EFR_fusiliers_marine: "Морская пехота"
 EFR_fusiliers_marine_desc: "Дни неприступных береговых укреплений прошли. В будущем мы должны быть способны навязывать врагу бой на его территории, где бы она ни была, и захватывать плацдармы в любых условиях."
 EFR_battle_of_maneuver: "Манёвренные бои"
 EFR_battle_of_maneuver_desc: "Старое восприятие поля боя как небольшого пространства, на котором происходит стычка армий, уже неактуально. Сейчас, с массовой моторизацией, развитием авиации и быстрой радиосвязью армии в сражениях перемещаются на сотни километров. Чем скорее мы будем к этому готовы, тем лучше."
 EFR_air_dominance_desc: "С развитием авиации у армий появился третий фланг, который надо защищать. Мы должны позаботиться об этом фланге, иначе катастрофа неминуема."
 EFR_air_ground_cooperation: "Сотрудничество наземных войск и авиации"
 EFR_air_ground_cooperation_desc: "Воздушные сражения только тогда приносят военные плоды, когда они ведутся для достижения цели на земле. Чем лучше мы скоординируем действия авиации и наземных войск, тем эффективнее будем воевать."
 EFR_flying_artillery_desc: "В современных стремительных боях медленные наземные артиллерийские орудия могут не поспевать за общим ходом битвы. Их роль могут взять на себя самолёты с бомбами."
 EFR_form_the_popular_front: "Образовать Народный фронт"
 EFR_form_the_popular_front_desc: "С расцветом фашизма в Германии и Италии стало очевидно, что если мы хотим, чтобы наше дело сохранилось, нужно прекратить распри с левыми. Широкий народный фронт, собранный из всех партий левого толка, получит достаточную народную поддержку, чтобы наконец-то заняться решением экономических проблем, способствующих зарождению фашизма."
 EFR_ban_communism_desc: "Невозможно представить себе, чтобы кто-то сознательно хотел навлечь на свою родную страну хаос и кровопролитие коммунистической революции, но похоже, что среди нас есть именно такие люди. Мы больше не можем позволять им замышлять против государства. Необходимо предпринять самые строгие меры."
 EFR_invite_communist_ministers: "Пригласить министров-коммунистов"
 EFR_invite_communist_ministers_desc: "Страх отрицательной реакции от радикально правых сил не дал нам включить в состав правительства коммунистов. Но страх — плохой советчик. Раз нам суждено схлестнуться с правыми, то так тому и быть."
 EFR_strengthen_the_unions: "Усилить профсоюзы"
 EFR_strengthen_the_unions_desc: "Слишком долго ущемлялось право рабочих объединяться с товарищами, чтобы сообща вести переговоры с работодателем. Больше такого не будет."
 EFR_celebrate_the_commune: "Устроить праздник в честь коммуны"
 EFR_celebrate_the_commune_desc: "Как бы мало она ни просуществовала, Парижская коммуна была первой попыткой создать коммунистическое общество на французской земле."
 EFR_womens_suffrage_desc: "Тот факт, что трудолюбивые женщины Франции, снова и снова отстаивающие свои права на баррикадах, не имеют права голосовать, столь же абсурден, сколь и позорен. Мы устраним эту несправедливость."
 EFR_legal_equality: "Равенство перед законом"
 EFR_legal_equality_desc: "Во всех аспектах жизни женщины считаются людьми второго сорта, подчиненными воле мужчин. Пора с этим кончать."
 EFR_industrial_collectivization: "Коллективизация промышленности"
 EFR_industrial_collectivization_desc: "Сегодняшняя французская экономика состоит из крохотных компаний с небольшим количеством персонала, увязших в конкуренции друг с другом и расходующих ресурсы на неэффективное мелкомасштабное производство. Мы объединим эти маленькие компании в крупные, которые наконец-то смогут конкурировать на мировой арене."
 EFR_agricultural_collectivization_desc: "Что применимо к индустрии, применимо и к фермерам по всей Франции. Крошечные фермы не могут позволить себе современную технику и по большей части работают так же, как работали прадеды. Объединив их в сельскохозяйственные производственные единицы, мы повысим их эффективность и выход продукции."
 EFR_force_the_issue: "Принуждение"
 EFR_force_the_issue_desc: "Мы проделали большой путь со времён создания Народного фронта, но останавливаться нельзя. Пришла пора всем левым принять решение и занять свою позицию — либо они за революцию, либо против неё."
 EFR_force_the_issue_tt: "Штраф к стабильности зависит от популярности §Yдемократических§! партий.\n"
 EFR_reconciliation: "Примирение"
 EFR_reconciliation_desc: "В прошлом французские революции слишком часто швыряли страну в бесконечные судороги революционного и контрреволюционного террора. Возможно, пришло время создать республику, в которой найдётся место всем вне зависимости от того, поддерживали ли они республику или нет."
 EFR_constitutional_convention: "Конституционный конвент"
 EFR_constitutional_convention_desc: "Фундаментальный сдвиг в самой структуре нашей республики нельзя осуществить в одночасье — и нельзя осуществить, не обсудив новую конституцию."
 EFR_anti_fascist_coalition: "Антифашистская коалиция"
 EFR_anti_fascist_coalition_desc: "Самая большая угроза маршу прогресса — распространение реакционного фашизма. Мы должны объединиться с любыми странами, что готовы сражаться с этой угрозой, иначе ни у кого из нас не будет будущего."
 EFR_invite_anti_fascist_emigrants: "Пригласить эмигрантов-антифашистов"
 EFR_invite_anti_fascist_emigrants_desc: "Первым делом любой фашистский режим изгоняет из страны своих критиков и людей, обладающих альтернативным взглядом на государственное устройство. С другой стороны, именно такие люди отлично подходят для формирования ссыльного правительства, которое будет ждать, когда страна станет свободной."
 EFR_reconnect_to_the_balkans: "Восстановить связь с Балканами"
 EFR_reconnect_to_the_balkans_desc: "Франция давно желала уравновесить силы Центральной Европы, установив связь с балканскими странами. Эта связь по-прежнему действует — хоть, возможно, и ослабла в последнее время."
 EFR_pre_empt_the_fascist_attack: "Нанести упреждающий удар по фашистской угрозе"
 EFR_pre_empt_the_fascist_attack_desc: "Зачем давать врагу возможность мирно готовить свою атаку и выбирать удобный момент для нападения? Мы нанесём удар первыми и сокрушим угрозу, пока она не набрала силу."
 EFR_loyalty_to_moscow: "Верность Москве"
 EFR_loyalty_to_moscow_desc: "Возможно, модель социализма, практикуемая в Советском Союзе, не идеальна, но нет никакого сомнения в том, что в реализации его идей Советский Союз достиг максимума. Глупо было бы отвергать его опыт и пытаться идти собственным путём."
 EFR_league_of_french_bolshevist_volunteers_desc: "Если одна социалистическая страна находится под угрозой вторжения, значит, под угрозой все такие страны. Мы не должны бездействовать, пока наши товарищи сражаются за свои жизни."
 EFR_host_the_german_exiles: "Приютить немецких ссыльных"
 EFR_host_the_german_exiles_desc: "Германия, родина Маркса и Энгельса, некогда находилась на острие коммунистической мысли. С приходом к власти нацистов многие немецкие коммунисты бежали из страны. Если мы приютим их, они помогут нам организовать более эффективное управление освобождёнными территориями."
 EFR_revolution_to_the_utmost: "Революция по максимуму"
 EFR_revolution_to_the_utmost_desc: "Революция, брошенная на полпути, — не революция вовсе. Нельзя останавливаться, пока дело не сделано и новая политическая система не утвердилась. Чего бы это ни стоило."
 EFR_destroy_the_counter_revolution: "Уничтожить контрреволюцию"
 EFR_destroy_the_counter_revolution_desc: "Даже сейчас во Франции есть те, кто готовится воткнуть нож в спину собственному народу, как только тот покажет секундную слабость. Мы этого не допустим и ударим первыми."
 EFR_appeal_to_the_french_nation: "Воззвать к французской нации"
 EFR_appeal_to_the_french_nation_desc: "Пусть Франция и проиграла битву, но она не проиграла войну. Сопротивляться — долг каждого француза-патриота."
 EFR_appeal_to_overseas_territories: "Воззвать к заморским территориям"
 EFR_appeal_to_overseas_territories_desc: "Хоть французская метрополия и пала перед врагом, большая часть её империи по-прежнему свободна. Призвав заморские территории на помощь, мы можем ответить на атаки врага."
 EFR_appeal_to_overseas_territories_tt: "У колониальных территорий в разных частях света есть шанс перейти на нашу сторону."
 EFR_intervention_in_north_africa: "Вторжение в Северную Африку"
 EFR_intervention_in_north_africa_desc: "Северная Африка лучше всего подходит для вторжения и последующего возвращения родины. Необходимо склонить её на нашу сторону, чтобы наша кампания по освобождению увенчалась успехом."
 EFR_intervention_in_west_africa: "Вторжение в Западную Африку"
 EFR_intervention_in_west_africa_desc: "В Западной Африке проживают миллионы человек, которых можно призвать в новую армию, чтобы с её помощью вернуть себе родину."
 EFR_intervention_in_syria: "Вторжение в Сирию"
 EFR_intervention_in_syria_desc: "Лишив врага доступа к стратегическим территориям в Сирии, мы защитим Суэцкий канал и значительно улучшим ситуацию в Восточном Средиземноморье."
 EFR_intervention_in_indochina: "Вторжение в Индокитай"
 EFR_intervention_in_indochina_desc: "Наши колонии в Индокитае находятся далеко от европейских сражений и идеально подходят, чтобы помочь нам защитить свои интересы в регионе."
 EFR_intervention_in_central_africa: "Вторжение в Центральную Африку"
 EFR_intervention_in_central_africa_desc: "Центральная Африка очень важна для военной экономики и как элемент пропаганды."
 EFR_intervention_in_madagascar: "Вторжение в Мадагаскар"
 EFR_intervention_in_madagascar_desc: "Если мы позволим врагу взять и укрепить Мадагаскар, в Индийском океане нас ждёт крах. Нужно действовать быстро и решительно, чтобы остров остался нашим."
 EFR_form_the_national_committee: "Основать Национальный комитет"
 EFR_form_the_national_committee_desc: "Мало кто верил в успех нашего дела. Но теперь мы наконец-то достаточно сильны, чтобы объявить о создании полноценного ссыльного правительства, которое готово взять на себя управление любой французской территорией, освобождённой от врагов."
 EFR_form_the_provisional_government_of_the_republic: "Образовать временное правительство"
 EFR_form_the_provisional_government_of_the_republic_desc: "Теперь, когда Париж освобождён, мы больше не ссыльное правительство. Пора браться за нелёгкий труд по восстановлению страны."
 EFR_continue_the_fight: "Продолжать борьбу"
 EFR_continue_the_fight_desc: "Пока что к нам перешло совсем немного солдат, но и тех, что перешли, надо вооружить и экипировать."
 EFR_the_free_french_navy: "Свободный французский флот"
 EFR_the_free_french_navy_desc: "Наши союзники заняты отчаянной борьбой за выживание, в которой крайне важны морские пути. Мы должны им помочь."
 EFR_colonial_recruitment_desc: "Теперь, когда вербовать солдат с родины нельзя, надо обратиться за помощью к нашим колониям. Многие из наших подданных готовы воевать за нас с оружием в руках."
 EFR_the_regiment_normandie: "Полк «Нормандия-Неман»"
 EFR_the_regiment_normandie_desc: "Очень важно, чтобы мир видел: мы, французы, сражаемся на всех фронтах. Теперь, когда Советы воюют с нашим общим врагом, мы можем отправить им на помощь небольшую группу лётчиков-истребителей."
 EFR_refus_absurde: "Refus Absurde"
 EFR_refus_absurde_desc: "Даже в час поражения в некоторых сердцах сильна воля к сопротивлению. Они станут основой Сопротивления на оккупированных территориях."
 EFR_the_maquis: "Маки"
 EFR_the_maquis_desc: "Сельские районы Франции предоставляют убежище для тех, кто хочет избежать оккупантов или их коллаборационистских приспешников. Мы должны поддержать людей, которые отказываются от своего труда врагу в акте сопротивления, чтобы со временем превратить эти районы в очаги сопротивления."
 EFR_reach_out_to_trade_unions: "Обратиться к профсоюзам"
 EFR_reach_out_to_trade_unions_desc: "Если мы хотим ударить по промышленности, которую вынудили работать на врага, следует установить хорошую связь с рабочими. Они могут задерживать или саботировать любое производство куда эффективнее любых внешних сил."
 EFR_cooperation_with_the_communists: "Сотрудничество с коммунистами"
 EFR_cooperation_with_the_communists_desc: "В нашей общей борьбе мы не должны отказываться ни от одного предложения помощи, даже если предлагающие называют себя товарищами."
 EFR_connections_to_industrialists: "Связи с промышленниками"
 EFR_connections_to_industrialists_desc: "Сотрудничество с рабочими военной промышленности полезно, но и сотрудничество с людьми, управляющими заводами, даёт свои преимущества."
 EFR_the_civil_and_military_organization: "Гражданская и военная организация"
 EFR_the_civil_and_military_organization_desc: "Многие небольшие группы бойцов Сопротивления объединяются в более крупную организацию. Надо высказать им свою поддержку."
 EFR_national_council_of_the_resistance_desc: "Французское сопротивление становится всё сильнее и сильнее. Оно набрало такую мощь, что теперь ему нужен новый комитет по координации действий."
 EFR_national_uprising_desc: "Время пришло. Пора взять оружие и выйти из тени, закрывавшей вас долгие годы!"
 EFR_french_forces_of_the_interior: "Французские внутренние силы"
 EFR_french_forces_of_the_interior_desc: "В рядах Сопротивления по всей Франции тысячи вооружённых людей. Продвигаясь вместе с союзниками по стране, мы соберём их и превратим в солдат нашей армии."
 EFR_french_forces_of_the_interior_tt: "Создаёт маломощные пехотные части на каждой освобождённой национальной территории."
 EFR_naval_rearmament: "Перевооружение флота"
 EFR_naval_rearmament_desc: "Пока мы старались выдержать темп развития в других областях, наша кораблестроительная индустрия чахла без должного внимания. В результате перед нами встала реальная опасность отстать от соперников в эффективности средиземноморского и атлантического флотов. Мы должны увеличить инвестиции, чтобы компенсировать потерянное время."
 EFR_colonial_naval_bases: "Колониальные морские базы"
 EFR_colonial_naval_bases_desc: "Ключевую роль в транспортировке войск играет возможность содержать флот в удалении от родных вод. У нас уже есть крупные колонии, и теперь мы должны развить их так, чтобы они служили базами дозаправки и ремонта для нашего флота."
 EFR_develop_colonial_dockyards: "Развитие колониальных верфей"
 EFR_develop_colonial_dockyards_desc: "Теперь, когда морские базы в разных частях нашей империи расширены и модернизированы, мы можем заняться развитием тяжелой индустрии и возвести большие верфи, необходимые для строительства кораблей за границей."
 EFR_the_old_school: "Старая школа"
 EFR_the_old_school_desc: "Несмотря на всё развитие морских технологий ключевым элементом господства на море по-прежнему остаются крупные корабли, действующие при поддержке других морских боевых единиц. Будь это линкоры или новые авианосцы, мы должны расширить масштаб своей кораблестроительной индустрии, чтобы не отставать от других морских держав."
 EFR_carrier_planes: "Самолёты на авианосцах"
 EFR_carrier_planes_desc: "Авианосец эффективен настолько, насколько эффективны его самолёты. Без современных самолётов любой авианосец — выброшенные на ветер деньги."
 EFR_rush_the_richelieus: "«Ришелье», вперёд!"
 EFR_rush_the_richelieus_desc: "Ситуация в Европе становится всё более и более критической, и у нас нет времени строить корабли обычными средствами. Нам надо сделать упор на создание материалов, чтобы как можно быстрее спустить на воду новые линкоры."
 EFR_prioritize_the_joffre: "Приоритет для «Жоффра»"
 EFR_prioritize_the_joffre_desc: "Наш авианосный флот безнадежно устарел и уступает таковым у любых потенциальных противников. Нужно приложить максимальные усилия, чтобы разработать новый проект авианосца."
 EFR_the_young_school: "Новая школа"
 EFR_the_young_school_desc: "Прогресс в производстве авиации, подлодок и торпед сделал концепцию крупных кораблей устаревшей. Мы с нашими ограниченными возможностями морской индустрии не можем позволить себе тратить время и деньги на строительство огромных плавающих крепостей, беспомощных в современных морских боях. Вместо этого надо сосредоточиться на повышении эффективности, что позволит нам строить больше малых кораблей."
 EFR_undersea_combat: "Подводный бой"
 EFR_undersea_combat_desc: "За последнее десятилетие окончательно созрела концепция применения подводных лодок. Теперь субмарины представляют смертельную угрозу для любого надводного флота, а обнаружить и уничтожить их становится всё труднее."
 EFR_surface_combat: "Надводный бой"
 EFR_surface_combat_desc: "С развитием артиллерии стало практически невозможно построить корабль, у которого есть шанс выжить в долгом бою с другим крупным кораблём. Гораздо лучше располагать флотом современных эсминцев и торпедных катеров, которые могут сокрушить врагов массированными торпедными залпами."
 EFR_prioritize_the_joffre_tt: "Добавляет в очередь строительства современный §Yавианосец§! на 40% готовности."
 EFR_revolutionary_zeal_desc: "Французский народ всегда обладал особой страстью к разрушению старого порядка и установлению нового. Не стоит остужать в нём эту страсть."
 EFR_loyalty_to_the_cause: "Верность общему делу"
 EFR_loyalty_to_the_cause_desc: "Иные страны вольны формулировать собственное видение коммунизма, но у нас нет причин поступаться принципами. Пусть другие и остановились на полпути, сомневаясь, оправдывает ли цель средства, но мы этого делать не станем."
 EFR_carry_the_revolution_north: "Нести революцию на север"
 EFR_carry_the_revolution_north_desc: "За Ла-Маншем расположилась родина индустриальной революции и пристанище современного капитализма. Нельзя допустить, чтобы оттуда к нам пришла контрреволюция."
 EFR_carry_the_revolution_west: "Нести революцию на запад"
 EFR_carry_the_revolution_west_desc: "Режимы Иберийского полуострова висят на волоске, и их вот-вот сметёт народная революция. Мы оборвём этот волосок."
 EFR_carry_the_revolution_east: "Нести революцию на восток"
 EFR_carry_the_revolution_east_desc: "У восточной границы лежит самая большая угроза нашему новому порядку. Реакционные силы, собравшиеся там, нанесут удар тогда, когда мы будем менее всего готовы, — но только если мы позволим им подготовиться."
 EFR_carry_the_revolution_south: "Нести революцию на юг"
 EFR_carry_the_revolution_south_desc: "Первой страной, попавшей под влияние фашизма, стала Италия. В результате там твёрдо закрепилась эта идеология. Мирное сосуществование наших с ней взглядов на мир невозможно. Они понимают это не хуже нас и, без сомнения, уже готовятся действовать. Мы тоже должны готовиться."
 EFR_egalite_liberte_solidarite_desc: "Первая Французская революция смела режимы, существовавшие веками, и навсегда изменила расклад сил в Европе. Мы закончим начатое ею дело."
 EFR_reform_the_labour_laws: "Реформировать законы о труде"
 EFR_reform_the_labour_laws_desc: "Французские рабочие трудятся в суровых условиях, за малую зарплату и почти без социальных гарантий. Пора ввести реформы, чтобы улучшить им жизнь."
 EFR_nationalize_key_industry: "Национализировать ключевые отрасли промышленности"
 EFR_nationalize_key_industry_desc: "В текущей ситуации нам следует без колебаний реструктуризировать экономику, чтобы быть готовыми к наступающей угрозе. Времени мало, нам некогда ждать, пока всё решит свободный рынок."
 EFR_reorganize_the_aviation_industry: "Реорганизовать индустрию авиастроения"
 EFR_reorganize_the_aviation_industry_desc: "Наша авиационная индустрия, разделённая на десятки крошечных компаний, на десятки лет отстаёт от немецкой и американской. Необходима радикальная реструктуризация."
 EFR_form_the_state_arsenals: "Создать государственные арсеналы"
 EFR_form_the_state_arsenals_desc: "Нам нужно снабдить армию современным оружием, и мы не можем ждать, пока частные компании выйдут на нужный объём производства."
 EFR_general_work_council: "Общий промышленный совет"
 EFR_general_work_council_desc: "Мы создадим национальное агентство по улаживанию споров между работодателями и работниками, чтобы наших рабочих нанимали наиболее эффективным способом."
 EFR_national_champions: "Национальные чемпионы"
 EFR_national_champions_desc: "Выбрав и всемерно поддерживая несколько компаний, у которых есть возможность конкурировать на глобальном уровне, мы сможем создать современную экономику, не уступающую другим."
 EFR_dirigisme_desc: "Очевидно, что полностью плановая экономика советской модели — слишком экстремальная мера, но определённая доля планирования и направления необходима для оптимизации нашей экономики."
 EFR_ban_the_leagues: "Запретить лиги"
 EFR_ban_the_leagues_desc: "Мы слишком долго разрешали лигам правого толка существовать без всякого надзора. Сейчас они слишком слабы, чтобы попробовать организовать переворот, но неизвестно, на что они станут способны в будущем. Лучше устранить их уже сейчас."
 EFR_the_blum_viollette_proposal: "Предложение Блюма-Виолетта"
 EFR_the_blum_viollette_proposal_desc: "Гражданство Французской республики должно быть доступно каждому, кто подходит для него. Многие наши верные подданные в Алжире хотели бы стать полноправными гражданами, но до сих пор им этого не дозволяли. Дав им гражданство, мы заметно сблизим Алжир и Францию."
 EFR_expand_the_citizenship: "Предоставить гражданство"
 EFR_expand_the_citizenship_desc: "Для республики немыслимо, чтобы люди, живущие на её территории, не могли стать её гражданами, но именно так у нас сейчас и обстоят дела. Надо немедленно это исправить."
 EFR_france_undividable_desc: "Франция должна быть одной страной под одним флагом. Пора открыто признать это и усмирить страх разделения."
 EFR_french_union: "Французский союз"
 EFR_french_union_desc: "Пора провозгласить новую Францию — Францию, раскинувшуюся по всему земному шару, в которой будут объединены все части наших владений. Мы проведём референдумы повсюду, чтобы подтвердить желание народа стать частью это новой и лучшей Франции."
 EFR_french_union_tt: "В разных частях нашей колониальной империи будут проведены референдумы. Некоторые из этих территорий могут проголосовать за свою полную независимость."
 EFR_encourage_immigration: "Поддержать иммиграцию"
 EFR_encourage_immigration_desc: "Наша родина отчаянно нуждается в рабочих, чтобы восполнить потери Великой войны. Облегчив процедуру переезда во Францию, мы можем привлечь квалифицированных мигрантов, которые помогут восполнить недостаток."
 EFR_review_foreign_policy: "Пересмотреть внешнюю политику"
 EFR_review_foreign_policy_desc: "Судя по всему, угроза континентальному ордену, основанному в 1919 году, постоянно нарастает. Нам пора пересмотреть свою внешнюю политику, чтобы заключить новые союзы и справиться с грядущей бурей."
 EFR_intervention_in_spain: "Вторжение в Испанию"
 EFR_intervention_in_spain_desc: "Из-за гражданской войны в Испании столкновение идеологий происходит прямо у нас на пороге. Надо соблюдать осторожность, иначе конфликт захлестнёт и нашу страну."
 EFR_support_the_finns: "Поддержка Финляндии"
 EFR_support_the_finns_desc: "Финны сражаются за свою жизнь. Надо им помочь."
 EFR_confirm_eastern_commitments: "Подтвердить восточные обязательства"
 EFR_confirm_eastern_commitments_desc: "После Великой войны мы наладили в Восточной Европе сеть союзов в противовес встающей с колен Германии и желающему расширять территории Советскому Союзу. Теперь наши союзники в том регионе задаются вопросом — а действительно ли мы придём к ним на помощь, если нас позвать? Мы должны заверить их в готовности держать слово, пока они не решили искать помощь где-нибудь ещё."
 EFR_strengthen_the_little_entente: "Усилить Малую Антанту"
 EFR_strengthen_the_little_entente_desc: "Условия Малой Антанты обязывают нас приходить на помощь союзникам в Восточной Европе и на Балканах. Мы допустили ослабевание этого союза, но сейчас он необходим как никогда. Пора его оживить."
 EFR_invest_in_our_weaker_allies: "Инвестировать в наших более слабых союзников"
 EFR_invest_in_our_weaker_allies_desc: "Если мы хотим, чтобы в случае войны у нас были надёжные союзники, надо сделать так, чтобы они могли удовлетворять свои военные нужды. Программа умеренных инвестиций в их промышленность позволит им производить нужное снаряжение на месте."
 EFR_invest_in_our_weaker_allies_trigger_tt: "Военных заводов меньше, чем у нас"
 EFR_coordinate_rearmament: "Координировать перевооружение"
 EFR_coordinate_rearmament_desc: "Чтобы не отставать в совместной разработке от немцев и других наших противников, мы тоже должны скоординировать свои усилия с союзниками."
 EFR_foreign_guest_workers: "Иностранные рабочие"
 EFR_foreign_guest_workers_desc: "Недостаток рабочих — главный фактор, который замедляет расширение нашей индустрии и увеличение армии. Пригласив квалифицированных рабочих из стран-союзников трудиться на наших заводах, мы высвободим людские ресурсы для армии."
 EFR_join_the_ententes: "Вступить в Антанту"
 EFR_join_the_ententes_desc: "Франция не может поддерживать два договора о взаимопомощи одновременно. Если мы не сможем обеспечить выполнение своих обязательств британцами, нам придётся выбирать. Объединив наши разрозненные альянсы в единое целое, мы многократно увеличим их сдерживающий фактор."
 EFR_revive_the_franco_polish_alliance: "Возрождение франко-польского союза"
 EFR_revive_the_franco_polish_alliance_desc: "Франция всегда поддерживала независимость Польши. В последние годы отношения между нашими странами немного остыли. Теперь, когда на горизонте маячит немецкая угроза, пока их восстановить."
 EFR_revive_the_franco_polish_alliance_tt: "\nПольша была бы приглашена в наш альянс, если бы мы были его лидерами."
 EFR_buy_time: "Выиграть время"
 FRA_autoroutes_tt: "Чем раньше мы возьмем этот фокус, тем лучше будет развитие нашей инфраструктуры, но Франция также получит дополнительные строительные слоты в Габоне, если мы возьмем этот фокус до 1939 года. Она получит шесть дополнительных слотов, если фокус взят до 1938 года, и три дополнительных слота, если он взят между 1938 и 1939 годами, и ноль после.\n\n"
 EFR_buy_time_desc: "Мы не готовы столкнуться с Германией лицом к лицу. Наши союзники слабы, наша армия устарела. Если мы хотим выжить, нам, возможно, придётся пойти на жертвы."
 EFR_arms_purchases_in_the_us: "Закупка вооружений в США"
 EFR_arms_purchases_in_the_us_desc: "Наша военная промышленность просто не способна снабдить наши войска необходимым современным оружием. США же располагают огромными производственными мощностями. Если они не решат вернуться к своей политике изоляционизма, возможно, их можно убедить продать нам нужное вооружение."
 EFR_france_leads: "Франция лидирует"
 EFR_france_leads_desc: "Нация с такой славной историей, как Франция, не может допустить, чтобы её внешнюю политику диктовали другие государства. Мы будем сами делать свой выбор исходя из собственных интересов."
 EFR_concessions_to_italy: "Уступки Италии"
 EFR_concessions_to_italy_desc: "Италия до сих пор мечтает об империи в Африке. Если мы предложим определённые уступки и одобрим её завоевание Эфиопии, мы, возможно, предотвратим формирование оси между Римом и Берлином."
 EFR_ratify_the_stresa_front: "Ратифицировать «Фронт Стрезы»"
 EFR_ratify_the_stresa_front_desc: "Италия показала, что готова вступить в наш альянс в обмен на территории в Африке. Пора взяться за перо и ратифицировать необходимые договоры."
 EFR_franco_soviet_treaty: "Франко-[SOV.GetAdjective]ий договор"
 EFR_franco_soviet_treaty_desc: "[SOV.GetAdjective]ая держава обеспокоена ростом фашизма в Европе не меньше нашего. Возможно, мы сможем убедить их поддержать нас в час нужды."
 EFR_revive_the_national_bloc: "Восстановить национальный блок"
 EFR_revive_the_national_bloc_desc: "Политический ландшафт с каждым днём становится всё более и более радикальным. Левые тайком обсуждают сотрудничество с коммунистами. Нам нужно сильное и стабильное лидерство."
 EFR_laissez_faire: "Принцип невмешательства"
 EFR_laissez_faire_desc: "Коммунисты открыто обсуждают радикальное изменение экономической структуры нашей страны, лишение рабочего человека его законной собственности. Мы противопоставим этому понятную всем свободу. Динамическая экономика всегда победит неповоротливую бюрократическую систему, порождение воспалённого разума леваков."
 EFR_protect_the_rights_of_man: "Защитить права человека"
 EFR_protect_the_rights_of_man_desc: "Об этом никогда не говорят открыто, но это очевидно всем, кто не зажмуривает глаза: ограничение прав на собственность — лишь первый шаг к искоренению всех прав, за которые так упорно сражались наши доблестные предки. Мы этого не потерпим!"
 EFR_freedom_front: "Фронт свободы"
 EFR_freedom_front_desc: "Перед лицом хаоса и потрясений, которые обещает нам власть коммунистов, нужно быть готовым заключать союзы с другими партиями — даже с теми, которые лично вы не одобряете."
 EFR_stimulate_the_dynamic_market: "Стимулировать динамичный рынок"
 EFR_stimulate_the_dynamic_market_desc: "Динамичный рынок показал себя самой эффективной формой экономической организации, но он по-прежнему управляется людьми, а людям иногда нужны гарантии, что их усилия будут вознаграждены. Убрав законодательно часть ограничений и предоставив гарантии, мы поможем инвесторам преодолеть свои опасения и простимулировать нашу экономику."
 EFR_agricultural_protectionism_desc: "Мировая экономика становится всё более и более враждебной нашим традиционным способам производства. Если мы не предпримем меры по защите наших фермеров, нас ждёт кризис невиданного масштаба, так как наши фермеры не могут конкурировать с массово производимой продукцией из-за рубежа."
 EFR_economic_devolution: "Передача экономической власти"
 EFR_economic_devolution_desc: "Мысль о том, что какой-то бюрократ в Париже знает, что лучше для компании в Бордо, абсурдна. Мы должны доверять нашим предпринимателям и дать им возможность самим решать свои задачи."
 EFR_promote_entrepeneurship: "Пропагандировать предпринимательство"
 EFR_promote_entrepeneurship_desc: "Сердцем динамического рынка всегда были индивидуумы, которые, увидев возможность, сразу же пользуются ей. В последние годы дух предпринимательства был задушен ненужными ограничениями. Надо их отменить."
 EFR_utilize_the_leagues: "Использовать лиги"
 EFR_utilize_the_leagues_desc: "Печально, но факт — во Франции повсеместно вспыхивают акты политического насилия. Чтобы страна пережила угрозу коммунистической революции, мы должны не стесняться прибегать к помощи тех, кто может при необходимости выйти против коммунистических головорезов на улицах."
 EFR_national_regeneration: "Восстановление нации"
 EFR_national_regeneration_desc: "Чрезмерная демократия и ошибочный республиканизм отравили нашу страну и разделили наш народ. Потребуется много времени, чтобы залечить эти раны, но по крайней мере первые шаги уже сделаны."
 EFR_national_regeneration_trigger_tt: "Объединённая доля нейтральных сторонников и сторонников фашизма больше 50%"
 EFR_destroy_decadence: "Уничтожить декадентство"
 EFR_destroy_decadence_desc: "Ни одна страна не добьётся величия, если будет позволять себе месяцами обсуждать даже самые мелкие проблемы. Возможно, некоторые государства, надёжно укрытые за океанами и поддерживаемые глобальными империями, могут позволить себе такую роскошь. Мы — нет."
 EFR_integralism: "Интегрализм"
 EFR_integralism_desc: "Идеология интегрализма гласит, что все аспекты общества должны быть связаны друг с другом и действовать так, будто они — одна небольшая часть крупного целого. Такое общество должно быть хорошо упорядочено, чтобы все его части работали совместно в гармонии."
 EFR_work: "Работа"
 EFR_work_desc: "Рабочий — самая важная часть экономики. При правильном управлении нет призвания благородней, чем трудиться на благо своей страны."
 EFR_family: "Семья"
 EFR_industrial_expansion_tt: "Если этот фокус завершен до 1938 года, мы получим три гражданских завода после перемирия за каждый штат, отмеченный в двух предыдущих фокусах. Если завершен между 1938 и 1939 годами, количество будет два за отмеченный штат, а после 1939 года, но до перемирия, только один за штат. Франция получит вдвое меньше гражданских заводов по завершении этого фокуса в Габоне.\n\n"
 EFR_military_factories_tt: "Если этот фокус завершен до 1938 года, мы получим четыре военных завода после перемирия за каждый штат, отмеченный в двух предыдущих фокусах. Если завершен между 1938 и 1939 годами, количество будет три за отмеченный штат, а после 1939 года, но до перемирия, только два за штат. Франция получит достаточно снаряжения для оснащения двух-трех пехотных дивизий за каждый обещанный военный завод.\n\n"
 EFR_family_desc: "Минимальная ячейка общества не индивидуум — это семья. Оспаривать такой простой и очевидный факт было главной ошибкой старой республики."
 EFR_fatherland: "Отчизна"
 EFR_fatherland_desc: "Страна превыше всего. В этом не может быть сомнений."
 EFR_political_unity: "Политическое единство"
 EFR_political_unity_desc: "Со времён падения абсолютизма история Франции — это история политических разногласий. Во времена единства Франция была победоносной. Во времена внутренних распрей Францию побеждали. Вот почему мы не можем позволить, чтобы амбиции немногих вредили жизни большинства."
 EFR_diplomatic_freedom: "Дипломатическая свобода"
 EFR_diplomatic_freedom_desc: "Республиканские правительства привязали себя к искусственным конструктам в Восточной Европе, которые падут, как только мы перестанем им помогать. От этих стран нет выгоды, одни лишь убытки, и потому мы отстранимся от участия в их делах."
 EFR_latin_entente: "Латинская Антанта"
 EFR_latin_entente_desc: "Нельзя отрицать, что государства — наследники Римской империи объединены братством. Германские народы Европы слишком долго правили континентом. Пора нам вернуть себе свои права по рождению."
 EFR_reach_out_to_spain: "Обратиться к Испании"
 EFR_reach_out_to_spain_desc: "Испания, только что оправившаяся от гражданской войны, — наш естественный союзник в попытках изменить континент."
 EFR_invite_portugal: "Пригласить Португалию"
 EFR_invite_portugal_desc: "Колониальная империя Португалии заметно уменьшилась, но пламя путешествий и завоеваний до сих пор пылает в сердце каждого португальца."
 EFR_compensate_italy: "Подготовить компенсацию для Италии"
 EFR_compensate_italy_desc: "В прошлом наши нации порой враждовали из-за крошечных клочков пустыни. Это недоразумение легко остановить. Мы можем быстро найти решение, подходящее нам всем."
 EFR_intervention_in_greece: "Вторжение в Грецию"
 EFR_intervention_in_greece_desc: "Греция контролирует одни из самых ценных территорий Средиземноморья. Мы не можем допустить, чтобы ими управляло враждебное нам правительство, и потому должны действовать первыми."
 EFR_the_congress_of_paris: "Парижский конгресс"
 EFR_the_congress_of_paris_desc: "На Берлинском конгрессе были определены границы Африки, но сегодняшняя карта больше похожа на лоскутное оделяло. Пора провести эти границы заново и заложить таким образом основу новой колониальной империи."
 EFR_the_natural_borders_of_france: "Естественные границы Франции"
 EFR_the_natural_borders_of_france_desc: "Для страны естественно в первую очередь следить за своими интересами. Ведя свою борьбу, мы не можем мирно сосуществовать с Германией и потому должны обеспечить безопасность своих естественных границ, чтобы защищать свои земли."
 EFR_towards_a_new_europe: "По пути к Новой Европе"
 EFR_towards_a_new_europe_desc: "Франция на перепутье. Мы можем сковать себя старым порядком или принять новый. Немцы намерены перекроить континент, и нам стоит заручиться их хорошим отношением."
 EFR_establish_spheres_of_influence: "Установить сферы влияния"
 EFR_establish_spheres_of_influence_desc: "Столетиями наши народы жили с верой, что мы — урождённые враги до самой смерти. Эта вера основана на идее, что наши интересы несовместимы, но мы вполне можем прийти к соглашению. Для этого нужно лишь определить сферы влияния и тщательно воздерживаться от вмешательства в чужие дела."
 EFR_split_belgium: "Разделить Бельгию"
 EFR_split_belgium_desc: "Теперь, когда Бельгия находится в нашей сфере влияния, пора присоединить к нам её франкоговорящие части. Остальная Бельгия образует новое государство."
 EFR_align_belgium: "Установить дружественный режим в Бельгии"
 EFR_align_belgium_desc: "Своим существованием бельгийцы обязаны нам, и давать им забывать это нельзя. Если мы позволим им сохранить независимость, то по крайней мере убедимся, что там установлен дружественный нам режим."
 EFR_grow_the_empire: "Нарастить империю"
 EFR_grow_the_empire_desc: "Позволять стране таких размеров, как Бельгия, обладать колонией во много раз больше её самой абсурдно. Мы куда лучше приспособлены для управления такой территорией."
 EFR_bring_home_quebec: "Вернуть Квебек"
 EFR_bring_home_quebec_desc: "Давно утерянная провинция со временем снова будет нашей. Все франкоговорящие народы в мире постепенно вновь объединятся с родиной."
 EFR_expand_to_the_suez: "Расшириться до Суэца"
 EFR_expand_to_the_suez_desc: "Разделение контроля над Левантом между нами и Британией — неработающий компромисс, который мы, к счастью, более не обязаны соблюдать."
 EFR_dominate_the_middle_east: "Установить господство на Ближнем Востоке"
 EFR_dominate_the_middle_east_desc: "Страны Ближнего Востока — искусственные конструкты, вырезанные из трупа Османской империи. Суверенитета в них не больше, чем у средней французской деревни, и пора напомнить им об этом факте."
 EFR_the_council_of_rambouillet: "Совет Рамбуйе"
 EFR_the_council_of_rambouillet_desc: "Когда в стране переполох, люди начинают искать сильного лидера. Стало ясно, что республиканство французскому народу не подходит и пришла пора вернуться естественным правителям Франции. Но сперва надо заложить фундамент для восстановления монархии."
 EFR_revise_the_constitution: "Поправки в конституции"
 EFR_revise_the_constitution_desc: "Республиканская конституция изначально создавалась как временная мера, и её действие затянулось дольше необходимого. Теперь мы перепишем её так, чтобы можно было вернуть к власти монарха."
 EFR_repeal_the_law_of_exile: "Отменить закон об изгнании"
 EFR_repeal_the_law_of_exile_desc: "Ни главе французской королевской семьи, ни его наследнику нельзя появляться на французской земле без прямого разрешения. Прежде чем мы сможем организовать триумфальное возвращение монархии, нужно избавиться от этого досадного препятствия."
 EFR_orleanist_restoration: "Возрождение орлеанистов"
 EFR_orleanist_restoration_desc: "Орлеанский дом пользуется значительной поддержкой среди французских роялистов. Хотя некоторые клеветники и предпочли бы видеть на троне другого кандидата, нет сомнений, что именно у орлеанского наследника больше шансов на мирное объединение страны."
 EFR_guarantee_the_constitution: "Гарантировать конституцию"
 EFR_guarantee_the_constitution_desc: "Прежде чем республиканская пресса сможет хотя бы запустить свою необоснованную кампанию против легитимности королевского правления, мы должны подорвать её позиции, дав железные гарантии соблюдения прав личности."
 EFR_the_first_citizen_of_the_state: "Первый гражданин государства"
 EFR_the_first_citizen_of_the_state_desc: "Король, хоть и наделенный значительной властью, не должен восприниматься как тиран или правитель-абсолютист старого толка. Современный монарх должен уважать закон и быть первым рубежом обороны от тех, кто хотел бы незаконно захватить власть."
 EFR_counter_action_desc: "Французское действие долгое время было самым сильным сторонником возвращения к монархии. К сожалению, их взгляды на другие вопросы менее приемлемы. Пришло время сообщить им, что они выполнили свою цель, и избавиться от них."
 EFR_no_further_humiliations: "Конец унижениям"
 EFR_no_further_humiliations_desc: "Годами одно республиканское правительство за другим позволяло Германии попирать международные договорённости — порою даже быстрее, чем высыхали чернила на закреплявших их документах. Пора с этим кончать."
 EFR_slum_clearing: "Расчистка трущоб"
 EFR_slum_clearing_desc: "Несмотря на то что Франция — одна из величайших держав мира, простые рабочие там зачастую живут в грязи и запустении. Ни один достойный своего титула король не станет терпеть подобное для своих подданных."
 EFR_public_welfare: "Социальное обеспечение"
 EFR_public_welfare_desc: "Король, не желающий потрудиться ради самых бедных своих подданных, — не король вовсе."
 EFR_the_legitimate_heir: "Законный наследник"
 EFR_the_legitimate_heir_desc: "Легитимисты считают карлистскую ветвь законными наследниками французского трона. Назначение их кандидата королём открывает соблазнительную возможность править сразу Испанией и Францией посредством двойной монархии."
 EFR_secure_the_crown_of_spain: "Захватить испанскую корону"
 EFR_secure_the_crown_of_spain_desc: "Первый шаг к обеспечению прав короля, которыми он обладает по рождению, — отнять Испанию у расплодившихся самозваных правительств. Их мелочные распри один раз уже довели страну до кровавой гражданской войны — мы не допустим повторения."
 EFR_unite_the_crowns: "Объединить короны"
 EFR_unite_the_crowns_desc: "Захватив власть в Испании, мы теперь можем объединить короны и создать новое, франко-испанское королевство."
 EFR_two_countries_two_crowns: "Две страны, две короны"
 EFR_two_countries_two_crowns_desc: "Невозможно объединить две страны так, чтобы одна из них не была вынуждена считать себя подчинённой другой. Вместо этого мы посоветуем королю править обеими странами в рамках личного, но не законного союза."
 EFR_proclaim_the_third_empire: "Провозгласить Третью империю"
 EFR_proclaim_the_third_empire_desc: "Пусть бонапартисты и считаются неудачниками в борьбе за престол, но они лелеют добрые воспоминания о времени, когда вся Европа склонилась перед императором Франции."
 EFR_avenge_waterloo: "Отомстить за Ватерлоо"
 EFR_avenge_waterloo_desc: "Историю Наполеона Первого всегда будут помнить по его главному поражению. Если мы хотим преуспеть, мы должны показать, что можем выиграть там, где проиграл он."
 EFR_reorganize_the_dutch: "Реорганизовать Голландию"
 EFR_reorganize_the_dutch_desc: "Голландцы некогда тоже были частью Французской империи. Теперь, когда они побеждены, пора вернуться к естественному положению дел."
 EFR_retribution_for_sedan: "Возмездие за Седан"
 EFR_retribution_for_sedan_desc: "Более полувека немцы отмечают победу в битве при Седане и свой триумф над Наполеоном Третьим. В будущем каждый немец будет вспоминать это название с проклятьями."
 EFR_disunite_germany: "Разобщить Германию"
 EFR_disunite_germany_desc: "Триумф над Францией позволил Пруссии объединить под своим знаменем небольшие немецкие регионы. Теперь, когда немцы побеждены, будет справедливо обратить этот процесс вспять."
 EFR_return_to_borodino: "Вернуться в Бородино"
 EFR_return_to_borodino_desc: "В Бородино Наполеон был как никогда близок к победе в Европе. Русская армия находилась на грани уничтожения, и окажись он лишь чуточку быстрее, он смог бы диктовать русским свои условия. Мы покажем миру, что это осуществимо."
 EFR_je_suis_la_deluge: "Je Suis Le Déluge"
 EFR_je_suis_la_deluge_desc: "Французская революция была мощным потопом, смывшим старые и слабые режимы, слишком долго правившие Европой. Новый потоп уже здесь."
 EFR_coordinate_rearmament_tt: "Снижает стоимость лицензий на производство для членов нашего альянса."
 EFR_metropolitan_france: "Французская метрополия"
 EFR_metropolitan_france_tt: "Недостаточно стройплощадок для §Yинфраструктуры§! во французской метрополии"
 EFR_metropolitan_france_desc: "Интересы метрополии всегда должны стоять во главе угла. Для начала следует улучшить инфраструктуру, чтобы создать рабочие места. Это позволит быстрее разворачивать войска при необходимости."
 EFR_algerie_france: "Французский Алжир"
 EFR_algerie_france_tt: "Недостаточно стройплощадок для §Yинфраструктуры§! в колониальной Франции"
 EFR_algerie_france_desc: "В Европе наступают тяжелые времена. Мы должны сосредоточиться на улучшении своих владений на юге, чтобы оттуда на материк в любой момент могла прийти поддержка."
 EFR_industrial_expansion: "Промышленная экспансия"
 EFR_industrial_expansion_desc: "Нужно укреплять промышленность в своих границах. У нас достаточно рабочей силы, но слишком мало фабрик."
 EFR_colonial_industry: "Колониальная промышленность"
 EFR_colonial_industry_tt: "Недостаточно стройплощадок для §Yфабрик§! в колониальной Франции"
 EFR_colonial_industry_desc: "Нужно развивать промышленность в колониях. Если напряжённость в Европе возрастёт, наши фабрики останутся вне досягаемости для бомбардировщиков противника."
 EFR_military_factories: "Военные заводы"
 EFR_military_factories_desc: "Наша военная промышленность буксует. Нужно сосредоточиться на производстве военной техники и боеприпасов на родной земле, чтобы у нашей армии не было перебоев с новейшим вооружением."
 EFR_colonial_military_factories: "Колониальные военные заводы"
 EFR_colonial_military_factories_tt: "Недостаточно стройплощадок для §Yвоенных заводов§! в колониальной Франции"
 EFR_colonial_military_factories_desc: "Если разместить военную промышленность за пределами Франции, мы сможем обеспечить бесперебойное снабжение войск оружием и боеприпасами, даже если враг будет контролировать наше воздушное пространство."
 EFR_extra_research_slot: "Поддержка Grandes Écoles"
 EFR_extra_research_slot_desc: "У нас в стране множество светлых умов, которым нужно предоставить возможность вести свои исследования. Развитие технологий выведет нас в мировые лидеры в тех областях, где это особенно необходимо."
 EFR_nuclear_effort: "Развитие атомной энергетики"
 EFR_nuclear_effort_desc: "Первые ядерные испытания показали интересные результаты. Если мы сумеем укротить эту энергию, то получим оружие, равных которому человечество не знало."
 EFR_jet_effort: "Развитие реактивных двигателей"
 EFR_jet_effort_desc: "В воздушном бою главное — это маневренность. Реактивные двигатели дают огромное преимущество: противник ничего не сможет противопоставить нашим асам, мы с легкостью уничтожим его."
 EFR_extra_research_slot_2: "Создание национального исследовательского центра"
 EFR_extra_research_slot_2_desc: "У нас в стране множество светлых умов, которым нужно предоставить возможность вести свои исследования. Развитие технологий выведет нас в мировые лидеры в тех областях, где это особенно необходимо."
 EFR_defensive_focus: "Ставка на оборону"
 EFR_defensive_focus_desc: "Настали времена, когда необходимо всячески укреплять оборону. Пусть враги приходят, мы встретим их на родной земле. У нас есть отличный кандидат на пост главнокомандующего, достаточно лишь вашего слова."
 EFR_aggressive_focus: "Ставка на нападение"
 EFR_aggressive_focus_desc: "Мы не можем сидеть сложа руки, когда враги теснятся у наших границ. Мы также не можем оставить союзников в одиночку справляться с военной угрозой. Готовьте армию! Гамелен возглавит ее."
 EFR_fortification_focus: "Ставка на укрепления"
 EFR_fortification_focus_desc: "Фортификации всегда играли ключевую роль в обороне, и сейчас нам нужно использовать их еще эффективнее. Линия Мажино долгое время служила для сдерживания противника. Нам нужно больше таких укреплений."
 EFR_alpine_forts: "Альпийские укрепления"
 EFR_alpine_forts_desc: "Итальянцам будет сложнее перейти нашу границу, когда мы укрепим Альпы новыми фортификациями. Это даст нам время собрать силы и нанести ответный удар."
 EFR_extend_the_maginot_line: "Продление линии Мажино"
 EFR_extend_the_maginot_line_desc: "Не стоит рассчитывать на то, что бельгийцы продержатся. Если враг прорвется на их территорию, нам несдобровать. Следует продлить линию Мажино, чтобы никакой враг не сумел захватить Францию!"
 EFR_infantry_focus: "Всеобщий призыв"
 EFR_infantry_focus_desc: "Все мужчины и женщины, способные сражаться, будут это делать. Массовое производство оружия снизит его стоимость. Мы вложим винтовку в руки каждого."
 EFR_artillery_focus: "Большая батарея"
 EFR_artillery_focus_desc: "Наша артиллерия будет объединяться в единый мощный кулак для ведения сосредоточенного огня по указанным направлениям. Один залп — и мы ослабим вражескую линию фронта и прорвемся через нее, если потребуется."
 EFR_heavy_armor_focus: "Боевой танк"
 EFR_heavy_armor_focus_desc: "Производство танков — залог успеха французской армии. Мы хотим контролировать поле боя, а это невозможно без новейших мощных танков!"
 EFR_motorized_focus: "Ставка на автотранспорт"
 EFR_motorized_focus_desc: "Чем более эффективной будет наша пехотная техника, тем проще будет доставлять войска и боеприпасы к линии фронта."
 EFR_mechanized_focus: "Ставка на бронетранспорт"
 EFR_mechanized_focus_desc: "Роль бронемашин в войне стремительно растет. Они не столь грозные, как танки, зато куда более маневренны во всем, что касается коммуникаций, управления, мобильности и действий в городских условиях."
 EFR_light_medium_armor: "Бронетехника"
 EFR_light_medium_armor_desc: "Неоспоримый факт: пехота контролирует танковые войска. Более легкая и скоростная бронетехника лучше подходит для перемещения войск и способна наносить урон установленным на ней оружием."
 EFR_army_reform: "Реформы армии"
 EFR_army_reform_desc: "Выиграть войну не сможет ни отдельная пехотная часть, ни самый современный танк. Мы должны всесторонне развивать стратегию и тактику боя. Расставив правильных людей на ключевых позициях, мы значительно укрепим армию."
 EFR_navy_focus: "Ставка на флот"
 EFR_navy_focus_tt: "Недостаточно стройплощадок для §Yморских баз§!"
 EFR_navy_focus_desc: "Если мы намерены расширять флот, первым шагом должно стать улучшение и строительство новых морских баз. Это необходимо для поддержания наших кораблей в постоянной боевой готовности."
 EFR_improved_screen_ships: "Улучшенные эскорты флотилии"
 EFR_improved_screen_ships_desc: "Эсминцы и легкие крейсеры играют ключевую роль в защите более тяжелых линкоров и авианосцев. Если мы лишимся своей линии обороны, то рискуем потерять все суда и личный состав. Наши корабли должны быть самыми современными."
 EFR_capital_ship_focus: "Ставка на крупные корабли"
 EFR_capital_ship_focus_desc: "Усовершенствование линкоров даст нам огромное тактическое преимущество. Если дальностью действия и мощью они будут превосходить корабли противника, никто не сможет уйти из-под огня их орудий."
 EFR_carrier_focus: "Ставка на авианосцы"
 EFR_carrier_focus_desc: "Теоретики морского дела указывают на то, что наши авианосцы устарели. У них есть идеи, как усовершенствовать эти корабли, если развитие пойдет в правильном направлении. Но это невозможно без вашей полной поддержки."
 EFR_initiate_government_reform: "Реформа правительства"
 EFR_initiate_government_reform_desc: "Мир становится все более небезопасным. Мелкие дрязги не должны мешать нам идти вперед. Пора наделить политиков большими полномочиями и отдать все силы на благо родной Франции."
 EFR_support_the_left: "Поддержать левых"
 EFR_support_the_left_desc: "Коминтерн становится сильнее. Пора показать, что наши интересы могут быть едиными, и поддержать коммунистов внутри страны."
 EFR_leftist_rhetoric: "Левоцентристская риторика"
 EFR_leftist_rhetoric_desc: "Наша цель ясна: равенство для всех. Мы не потерпим капиталистических устремлений во французской политике. Необходимо создать оптимальные условия для процветания коммунистических организаций."
 EFR_scw_intervention_republicans: "Оказать помощь республиканцам"
 EFR_scw_intervention_republicans_desc: "Республиканцам в Испании нужна наша помощь! \nВсе, кто готов сражаться на их стороне, должны иметь такую возможность. Мы не можем позволить фашистам завладеть еще одним плацдармом."
 EFR_national_mobilization: "Национальная мобилизация"
 EFR_national_mobilization_desc: "Наконец мы получили правительство, которое способно действовать. Пора укреплять армию и готовиться сражаться за Францию."
 EFR_humanite_unie: "Уния человечества"
 EFR_humanite_unie_desc: "Хватка разжиревших банкиров и жадных до власти демагогов сжимается. С каждым днем все больше людей становятся рабами: мир погружается в кризис, вызванный жадностью индивидуалистов. Сейчас французские идеи нужны, как никогда! Мы должны объединить человечество!"
 EFR_join_comintern: "Вступление в Коминтерн"
 EFR_join_comintern_desc: "Враги окружают со всех сторон, и нам необходимы надежные союзники. Мы укрепили связи с Коминтерном, теперь пришло время безоговорочного объединения."
 EFR_support_status_quo: "Поддержать статус-кво"
 EFR_support_status_quo_desc: "Франция — колыбель и бастион свободы, и никакие силы не смогут это изменить. Если мы хотим вновь достичь единства, нужно укреплять пошатнувшуюся демократию."
 EFR_little_entente: "Малая Антанта"
 EFR_little_entente_desc: "Союз Малой Антанты, созданный после Великой войны для противодействия агрессии Австрии и Венгрии, в свое время был поддержан Францией, но сейчас начал распадаться. Вместо того чтобы строить отношения с Великобританией, нам следует восстановить и укрепить этот альянс, начиная с Чехословакии."
 EFR_go_with_britain: "Встать на сторону Великобритании"
 EFR_go_with_britain_desc: "Россия изменилась бесповоротно, и от прежней Антанты остались только Франция и Великобритания. Если история обречена повторяться, эти две державы — цитадели демократии и свободы в Европе — должны оставаться союзниками."
 EFR_strengthen_government_support: "Укрепить правительство"
 EFR_strengthen_government_support_desc: "Мы составили на следующий год планы, отвечающие интересам всех граждан Франции. Нужно показать народу, что мы готовы действовать и способны управлять страной. Только так мы добьемся единства."
 EFR_defensive_strategems: "Оборонительная стратегия"
 EFR_defensive_strategems_desc: "Если мы хотим, чтобы французский народ воевал за нас в грядущей войне, необходимо дать нации четкие ориентиры. Хватит грызни друг с другом, мы должны сражаться за Францию и свободу, равенство, братство."
 EFR_invite_yugoslavia: "Приглашение Югославии"
 EFR_invite_yugoslavia_desc: "У Югославии достаточно проблем и без соседей, которые вынашивают захватнические планы. Если мы пригласим эту страну в Малую Антанту, это пойдет на пользу и югославам, и нам."
 EFR_invite_romania: "Пригласить Румынию"
 EFR_invite_romania_desc: "Позиции демократов в Румынии остаются шаткими, на них оказывают давление как фашистские партии, так и советские коммунисты. Если мы пригласим румын в Малую Антанту, наша поддержка укрепит их стабильность."
 EFR_polish_guarantee: "Гарантии для Польши"
 EFR_polish_guarantee_desc: "Польские дипломаты высказывают озабоченность относительно напряженности на своих границах. Если наша могучая держава поддержит Польшу своими гарантиями, это может остановить любого агрессора."
 EFR_czech_guarantee: "Гарантии для Чехословакии"
 EFR_czech_guarantee_desc: "Напряжение на чешской границе растет. Нельзя допустить, чтобы агрессивная держава напала на независимую демократическую страну. Чехи должны оставаться свободными. Мы поддержим их своими гарантиями, это заставит передумать любого, кто пытается их захватить."
 EFR_revise_versailles: "Пересмотреть Версальский договор"
 EFR_revise_versailles_desc: "Немцы уже некоторое время назад прекратили выплату репараций по Версальскому договору, Франция больше не внушает им уважения. Мы имеем полное право требовать платы за все потери, понесенные в той войне, однако Франция должна стать сильной, чтобы заставить Германию соблюдать договор."
 EFR_support_the_right: "Поддержать правых"
 EFR_support_the_right_desc: "Франция всегда была сильной и гордой державой, однако слабость правительства привела к тому, что народ утратил единство. Мы должны объединить Францию и заявить о своем превосходстве. Только сила остановит разложение."
 EFR_right_wing_rhetoric: "Правоцентристская риторика"
 EFR_right_wing_rhetoric_desc: "Мы должны приложить все усилия к тому, чтобы укрепить патриотический дух французов, и показать, что именно мы — те сильные лидеры, в которых нуждается народ. С нами Франция вернет себе былую славу, а ее граждане — былую гордость."
 EFR_scw_intervention_nationalists: "Оказать помощь националистам"
 EFR_scw_intervention_nationalists_desc: "Националисты одерживают в Испании победу за победой. Их дело — правое, и любой, кто желает сражаться на их стороне, должен иметь такую возможность."
 EFR_army_of_aggression: "Армия агрессии"
 EFR_army_of_aggression_desc: "Мы больше не можем сидеть за обветшавшей стеной, пока наши враги правят бал во всей Европе. Пора укреплять армию и расширять свои границы. Франция должна оставаться великой державой."
 EFR_france_first: "Франция превыше всего"
 EFR_france_first_desc: "Мы – Франция! Победители Великой войны! Спасители Европы! Наша страна дала миру величайших мыслителей. Слишком многие нации желают ввергнуть мир в хаос, а значит, человечеству нужны мы. И мы откликнемся на зов. Мы встанем у руля, преодолеем штормы и выведем человечество на нужный курс!"
 EFR_woo_italy: "Привлечь Италию на свою сторону"
 EFR_woo_italy_desc: "Италия способна стать великой державой. Под руководством сильного лидера Муссолини итальянский народ обрел единство и теперь готов сражаться за правое дело. Настало время выработать единые цели."
 EFR_dismantle_the_democracies: "Уничтожить демократии"
 EFR_dismantle_the_democracies_desc: "Нашим только что завоёванным позициям угрожает новый [GER.GetAdjective]ий демократический альянс в Центральной Европе. Мы должны принять меры, прежде чем они станут сильнее."
 EFR_join_germany: "Присоединиться к Германии"
 EFR_join_germany_desc: "Третий Рейх становится силой, с которой нельзя не считаться. Их планы на будущее можно привести в согласие с нашими собственными целями. Мы должны поддержать их, и когда уляжется пыль, Франция займет то место в Европе, которое принадлежит ей по праву."
 EFR_naval_doctrine: "Морская доктрина"
 EFR_naval_doctrine_desc: "Успехи, достигнутые в области кораблестроения, открывают новые возможности тактического и стратегического маневрирования. Но все эти теории нуждаются в проверке, пока мы не выстроим новые планы и не начнем применять их на практике."
 EFR_air_focus: "Ставка на авиацию"
 EFR_air_focus_desc: "Пришло время расширять наши ВВС! Мы уже составили планы по строительству новых авиабаз, чтобы размещать там больше личного состава и самолётов."
 EFR_cas_focus: "Ставка на штурмовики"
 EFR_cas_focus_desc: "Поддержка кораблей и наземных войск с воздуха стала эффективным дополнением военной стратегии и обошлась сравнительно недорого. Теперь появились предложения по улучшению этих самолетов. Пусть наши инженеры займутся разработкой нового поколения штурмовиков."
 EFR_fighter_focus: "Ставка на истребители"
 EFR_fighter_focus_desc: "Новейшие достижения в гражданском самолетостроении могут быть использованы для увеличения скорости, дальности и высоты полета наших истребителей. Нужно сосредоточиться на этом, если мы не хотим отстать от других держав."
 EFR_bomber_focus: "Ставка на бомбардировщики"
 EFR_bomber_focus_desc: "Поддержка с воздуха необходима при планировании как обороны, так и наступательных операций. Если мы сосредоточим все усилия на создании более скоростных, маневренных и точных бомбардировщиков, это даст нам преимущество в любом сражении на суше."
 EFR_heavy_fighter_focus: "Ставка на тяжелые истребители"
 EFR_heavy_fighter_focus_desc: "Наши тяжелые истребители должны быть способны поддержать более уязвимые бомбардировщики. Им нужно улучшить вооружение и повысить дальность полета, пусть даже ценой скорости."
 EFR_air_doctrine: "Воздушная доктрина"
 EFR_air_doctrine_desc: "Мы накопили достаточно опыта, чтобы быстрее проверять на практике новые теории ведения воздушного боя. Это откроет перед нами новые тактические и стратегические возможности. Воздушный бой — ключ к победе в современной войне."
 EFR_heavy_bomber_focus: "Ставка на тяжелые бомбардировщики"
 EFR_heavy_bomber_focus_desc: "Современные тяжелые бомбардировщики должны быть достаточно хорошо вооружены, чтобы постоять за себя в воздушном бою. Если наши конструкторы разработают новые технологии, самолетам станет проще уничтожать заводы противника."
 EFR_naval_bomber_focus: "Ставка на морские бомбардировщики"
 EFR_naval_bomber_focus_desc: "Как показал опыт прошлой войны, корабли уязвимы для атак с воздуха. Надо постоянно улучшать эти технологии, чтобы никакой противник не мог нас опередить."
 ETH_research_slot: "Ячейка исследований"
 ETH_research_slot_desc: "Исследования — ключ к победе в любой войне!"
 ETH_imperial_road: "Построить имперские дороги"
 ETH_imperial_road_desc: "Мы должны соединить нашу столицу с портами!"
 ETH_equipment_effortb: "Развитие артиллерии после Великой войны"
 ETH_equipment_effortb_desc: "Мы должны изучить последние достижения в области артиллерийского вооружения."
 ETH_equipment_effort_2b: "Разработка артиллерии"
 ETH_equipment_effort_2b_desc: "Мы должны модернизировать наши пехотные дивизии, оснастив их качественными артиллерийскими бригадами."
 ETH_equipment_effort_3b: "Артиллерийские усилия II"
 ETH_equipment_effort_3b_desc: "Мы должны модернизировать наши пехотные дивизии, оснастив их качественными артиллерийскими бригадами."
 ETH_red_sea: "Страж Красного моря"
 ETH_red_sea_desc: "Мы должны построить мощный флот, чтобы обеспечить превосходство на Красном море над нашими врагами."
 ETH_air_innovation: "Linea dell'Impero"
 ETH_air_innovation_desc: "Победа в современной войне невозможна без господства в воздухе. Мы должны любой ценой развивать военно-воздушные силы!"
 ETH_force_labor: "Местные рабочие"
 ETH_force_labor_desc: "Чтобы поднять нашу промышленность, следует нанять местное население для работы на наших заводах по производству вооружений."
 ETH_force_labor2: "Расширение колониальной промышленности"
 ETH_force_labor2_desc: "Мы расширим наши программы с участием местных рабочих."
 ETH_puntland: "Аннексировать Британский и Французский Сомалиленд"
 ETH_puntland_desc: ""
 ETH_sudan_north: "Аннексировать Хартум"
 ETH_sudan_north_desc: ""
 ETH_sudan_south: "Аннексировать Судан"
 ETH_sudan_south_desc: ""
 ETH_kenya: "Аннексировать Британскую Восточную Африку"
 ETH_kenya_desc: ""
 ETH_uganda: "Аннексировать Уганду"
 ETH_uganda_desc: ""
 ETH_tanganyika: "Аннексировать Танганьику"
 ETH_tanganyika_desc: ""
 ETH_yemen: "Аннексировать Британский Йемен"
 ETH_yemen_desc: ""
 ETH_equipment_effort: "Наверстать отставание в стрелковом вооружении"
 ETH_equipment_effort_desc: "Есть предел тому, какой вес может нести на себе пехотинец. Мы сосредоточим все усилия на том, чтобы обеспечить войска самым лучшим снаряжением."
 ETH_motorization_effort: "Развитие транспорта"
 ETH_motorization_effort_desc: "Основные характеристики транспортных средств пехоты — маневренность и защищенность. Сосредоточившись на развитии этого направления, мы сможем быстрее бросать войска в бой."
 ETH_doctrine_effort: "Развитие доктрины"
 ETH_doctrine_effort_desc: "Военные доктрины Великой войны, определявшие методы ведения наземного боя, безнадежно устарели. Наши лучшие умы должны разработать новую тактику и стратегию."
 ETH_equipment_effort_2: "Модернизированные винтовки"
 ETH_equipment_effort_2_desc: "Мы продолжим наши усилия по обеспечению пехоты лучшим стрелковым оружием нашего времени."
 ETH_mechanization_effort: "Развитие механизации"
 ETH_mechanization_effort_desc: "Всесторонне развивая моторизированную пехоту, мы научимся создавать самые совершенные транспортные средства."
 ETH_doctrine_effort_2: "Развитие доктрины II"
 ETH_doctrine_effort_2_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 ETH_doctrine_effort_3: "Доктринальные усилия III"
 ETH_doctrine_effort_3_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 ETH_equipment_effort_3: "Экспериментальные винтовки"
 ETH_equipment_effort_3_desc: "Хватит копировать чужие образцы и закупать снаряжение за рубежом! Мы должны стать ведущим мировым производителем пехотного оружия."
 ETH_armor_effort: "Развитие бронетехники"
 ETH_armor_effort_desc: "Применив знания, полученные в ходе моторизации нашей пехоты, мы также можем усовершенствовать бронетехнику."
 ETH_special_forces: "Войска специального назначения"
 ETH_special_forces_desc: "Нам необходимы элитные войска; приоритетной задачей должно стать создание горно-стрелковых и воздушно-десантных подразделений."
 ETH_aviation_effort: "Развитие авиации"
 ETH_aviation_effort_tt: "Недостаточно стройплощадок для §Yавиабаз§!"
 ETH_aviation_effort_desc: "Война в воздухе — это направление, где научно-технический прогресс идет стремительными темпами. Любая современная держава обязана развивать авиацию."
 ETH_fighter_focus: "Ставка на истребители"
 ETH_fighter_focus_desc: "Великая война научила нас маневренному воздушному бою, но это было только начало. Чтобы сохранить преимущество в будущем, мы должны создавать самые современные истребители."
 ETH_bomber_focus: "Ставка на бомбардировщики"
 ETH_bomber_focus_desc: "Когда люди будущего станут говорить об ужасах сегодняшних войн, они вспомнят огонь, падающий с неба. Мы должны сделать все для того, чтобы такие воспоминания остались только у наших врагов."
 ETH_aviation_effort_2: "Развитие авиации II"
 ETH_aviation_effort_2_desc: "Необходимо совершенствовать военно-воздушные силы, чтобы координировать их действия с другими родами войск."
 ETH_CAS_effort: "Развитие штурмовиков"
 ETH_CAS_effort_desc: "Современная армия нуждается в поддержке не только на земле, но и в воздухе."
 ETH_rocket_effort: "Развитие ракет"
 ETH_rocket_effort_desc: "Ракеты и реактивные двигатели позволяют пилотируемым и беспилотным летательным аппаратам достигать очень высоких скоростей. Прогресс в этой области даст нам возможность заставать врага врасплох."
 ETH_NAV_effort: "Развитие аэронавигации"
 ETH_NAV_effort_desc: "В новые времена война на море ведется и под водой, и в воздухе над водной поверхностью."
 ETH_naval_effort: "Развитие военно-морского флота"
 ETH_naval_effort_tt: "Недостаточно стройплощадок для §Yверфей§!"
 ETH_naval_effort_desc: "Развитие флота должно стать для нас приоритетной задачей. Нужно направить все доступные ресурсы на строительство новых верфей и развитие легких надводных кораблей."
 ETH_industrial_effort: "Развитие промышленности"
 ETH_industrial_effort_desc: "Все политические усилия следует сосредоточить на том, чтобы обеспечить развитие промышленности мирного назначения."
 ETH_industrial_effort_2: "Развитие промышленности II"
 ETH_industrial_effort_2_desc: "Стальная воля и всенародный трудовой подъем помогут нам собрать силы для нового промышленного прорыва."
 ETH_construction_effort: "Imprese Elettriche d'Etiopia"
 ETH_construction_effort_tt: "Недостаточно стройплощадок для §Yфабрик§!"
 ETH_construction_effort_desc: "Мы должны развивать электросеть в Эфиопии."
 ETH_production_effort: "Развитие вооружений"
 ETH_production_effort_tt: "Недостаточно стройплощадок для §Yвоенных заводов§!"
 ETH_production_effort_desc: "Кто умеет делать трактора, сумеет делать и танки! Мы не можем допустить отставания военной промышленности."
 ETH_construction_effort_2: "Cementerie d'Etiopia"
 ETH_construction_effort_2_desc: "Производство цемента необходимо для массового строительства заводов и военных объектов."
 ETH_production_effort_2: "Развитие вооружений II"
 ETH_production_effort_2_desc: "Не стоит пытаться переориентировать фабрики на выпуск военной продукции. Мы должны сосредоточиться на развитии военной промышленности как таковой."
 ETH_production_effort_3: "Развитие вооружений III"
 ETH_production_effort_3_desc: "Необходимо и дальше совершенствовать военные заводы для производства самой современной военной техники."
 ETH_infrastructure_effort: "Развитие инфраструктуры"
 ETH_infrastructure_effort_desc: "Страна без соответствующей инфраструктуры не может заниматься продвинутыми исследованиями и строительством."
 ETH_infrastructure_effort_tt: "Недостаточно стройплощадок для §Yинфраструктуры§!"
 ETH_infrastructure_effort_2: "Развитие инфраструктуры II"
 ETH_infrastructure_effort_2_desc: "Необходимо расширять инфраструктуру, развивая транспорт и средства связи для работы над высокотехнологичными секретными проектами."
 ETH_construction_effort_3: "Trasporti Automobilistici (Citao)"
 ETH_construction_effort_3_desc: "Мы должны развивать механическую и транспортную промышленность, чтобы легко передвигаться по этой земле."
 ETH_nuclear_effort: "Развитие атомной энергетики"
 ETH_nuclear_effort_desc: "Мы стоим на пороге открытия, способного изменить мир. Нельзя допустить, чтобы наши противники запалили огонь, способный уничтожить Землю."
 ETH_extra_tech_slot: "Доп. ячейка для исследований"
 ETH_extra_tech_slot_desc: "Развитие промышленности и другие открытия последнего времени позволяют нам вести параллельные научно-технические исследования."
 ETH_extra_tech_slot_2: "Доп. ячейка для исследований II"
 ETH_extra_tech_slot_2_desc: "Быстрая индустриализация нашей страны открыла новые возможности для технических исследований, которыми нам стоит воспользоваться."
 ETH_technology_sharing: "Обмен технологиями"
 ETH_technology_sharing_desc: "Обмен новейшими технологиями с союзниками повысит эффективность военно-научных исследований всего нашего альянса."
 ETH_secret_weapons: "Секретное оружие"
 ETH_secret_weapons_desc: "Направить все свободные ресурсы на строительство танков и самолетов — это заманчиво, однако победу в войне способны обеспечить лишь новейшие научные направления: электроника, ракетостроение и атомная энергетика."
 ETH_political_effort: "Развитие политики"
 ETH_political_effort_desc: "Чтобы изменить мир вокруг нас, мы должны сперва изменить собственную страну. И для начала — укрепить свои политические позиции."
 ETH_collectivist_ethos: "Дух коллективизма"
 ETH_collectivist_ethos_desc: "Враги могут разделять и покорять малые страны, но наш народ сохранит единство. Один за всех, и все за одного."
 ETH_liberty_ethos: "Дух свободы"
 ETH_liberty_ethos_desc: "В эпоху идеологических фанатиков, которые стремятся подавить в людях человечность, мы будем выступать за сохранение личных прав и свобод."
 ETH_militarism: "Милитаризм"
 ETH_militarism_desc: "Те, кто рассматривает армию лишь как необходимое зло, будут колебаться — вступать в войну или нет. Мы сделаем милитаризм частью своей культуры и станем нацией воинов."
 ETH_political_correctness: "Политкорректность"
 ETH_political_correctness_desc: "Люди, отстаивающие взгляды, расходящиеся с мнением большинства, беспокоятся о том, что против них существует глобальный заговор. Это любопытная идея."
 ETH_neutrality_focus: "Ставка на нейтралитет"
 ETH_neutrality_focus_desc: "Говорят, отвага и мудрость необходимы для выбора стороны в международном конфликте, но мы точно знаем, что еще больше они нужны, чтобы отказаться от выбора."
 ETH_interventionism_focus: "Ставка на интервенционизм"
 ETH_interventionism_focus_desc: "Мы готовы отстаивать свободу всех народов, а не только своих граждан. Если для победы над тиранией нужна война — пусть так."

 
 fin_army_effort_desc: "Несмотря на все новые возможности ведения боевых действий на море и в воздухе, сухопутные войска остаются ключевым элементом войны. При должной подготовке мы сумеем избежать прежнего ада в траншеях."
 fin_equipment_effort: "Развитие снаряжения"
 fin_equipment_effort_desc: "Есть предел тому, какой вес может нести на себе пехотинец. Мы сосредоточим все усилия на том, чтобы обеспечить войска самым лучшим снаряжением."
 fin_motorization_effort: "Развитие транспорта"
 fin_motorization_effort_desc: "Основные характеристики транспортных средств пехоты — маневренность и защищенность. Сосредоточившись на развитии этого направления, мы сможем быстрее бросать войска в бой."
 fin_doctrine_effort: "Развитие доктрины"
 fin_doctrine_effort_desc: "Военные доктрины Великой войны, определявшие методы ведения наземного боя, безнадежно устарели. Наши лучшие умы должны разработать новую тактику и стратегию."
 fin_equipment_effort_2: "Развитие снаряжения II"
 fin_equipment_effort_2_desc: "Мы будем и дальше прилагать все усилия к тому, чтобы наша пехота и войска поддержки были обеспечены наилучшим образом."
 fin_mechanization_effort: "Развитие механизации"
 fin_mechanization_effort_desc: "Всесторонне развивая моторизированную пехоту, мы научимся создавать самые совершенные транспортные средства."
 fin_doctrine_effort_2: "Развитие доктрины II"
 fin_doctrine_effort_2_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 fin_doctrine_effort_3: "Доктринальные усилия III"
 fin_doctrine_effort_3_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 fin_equipment_effort_3: "Развитие снаряжения III"
 fin_equipment_effort_3_desc: "Хватит копировать чужие образцы и закупать снаряжение за рубежом! Мы должны стать ведущим мировым производителем пехотного оружия."
 fin_armor_effort: "Развитие бронетехники"
 fin_armor_effort_desc: "Применив знания, полученные в ходе моторизации нашей пехоты, мы также можем усовершенствовать бронетехнику."
 fin_special_forces: "Войска специального назначения"
 fin_special_forces_desc: "Нам необходимы элитные войска; приоритетной задачей должно стать создание горно-стрелковых и воздушно-десантных подразделений."
 fin_aviation_effort: "Развитие авиации"
 fin_aviation_effort_tt: "Недостаточно стройплощадок для §Yавиабаз§!"
 fin_aviation_effort_desc: "Война в воздухе — это направление, где научно-технический прогресс идет стремительными темпами. Любая современная держава обязана развивать авиацию."
 fin_fighter_focus: "Ставка на истребители"
 fin_fighter_focus_desc: "Великая война научила нас маневренному воздушному бою, но это было только начало. Чтобы сохранить преимущество в будущем, мы должны создавать самые современные истребители."
 fin_bomber_focus: "Ставка на бомбардировщики"
 fin_bomber_focus_desc: "Когда люди будущего станут говорить об ужасах сегодняшних войн, они вспомнят огонь, падающий с неба. Мы должны сделать все для того, чтобы такие воспоминания остались только у наших врагов."
 fin_aviation_effort_2: "Развитие авиации II"
 fin_aviation_effort_2_desc: "Необходимо совершенствовать военно-воздушные силы, чтобы координировать их действия с другими родами войск."
 fin_CAS_effort: "Развитие штурмовиков"
 fin_CAS_effort_desc: "Современная армия нуждается в поддержке не только на земле, но и в воздухе."
 fin_rocket_effort: "Развитие ракет"
 fin_rocket_effort_desc: "Ракеты и реактивные двигатели позволяют пилотируемым и беспилотным летательным аппаратам достигать очень высоких скоростей. Прогресс в этой области даст нам возможность заставать врага врасплох."
 fin_NAV_effort: "Развитие аэронавигации"
 fin_NAV_effort_desc: "В новые времена война на море ведется и под водой, и в воздухе над водной поверхностью."
 fin_naval_effort: "Развитие военно-морского флота"
 fin_naval_effort_tt: "Недостаточно стройплощадок для §Yверфей§!"
 fin_naval_effort_desc: "Развитие флота должно стать для нас приоритетной задачей. Нужно направить все доступные ресурсы на строительство новых верфей и развитие легких надводных кораблей."
 fin_industrial_effort: "Развитие промышленности"
 fin_industrial_effort_desc: "Все политические усилия следует сосредоточить на том, чтобы обеспечить развитие промышленности мирного назначения."
 fin_industrial_effort_2: "Развитие промышленности II"
 fin_industrial_effort_2_desc: "Стальная воля и всенародный трудовой подъем помогут нам собрать силы для нового промышленного прорыва."
 fin_construction_effort: "Развитие строительства"
 fin_construction_effort_tt: "Недостаточно стройплощадок для §Yфабрик§!"
 fin_construction_effort_desc: "Не следует недооценивать гражданскую промышленность, даже когда надвигается мировая война."
 fin_production_effort: "Развитие вооружений"
 fin_production_effort_tt: "Недостаточно стройплощадок для §Yвоенных заводов§!"
 fin_production_effort_desc: "Кто умеет делать трактора, сумеет делать и танки! Мы не можем допустить отставания военной промышленности."
 fin_construction_effort_2: "Развитие строительства II"
 fin_construction_effort_2_desc: "Мы должны усовершенствовать фабрики, чтобы ускорить производство товаров для торговли и обеспечить дальнейшее строительство."
 fin_production_effort_2: "Развитие вооружений II"
 fin_production_effort_2_desc: "Не стоит пытаться переориентировать фабрики на выпуск военной продукции. Мы должны сосредоточиться на развитии военной промышленности как таковой."
 fin_production_effort_3: "Развитие вооружений III"
 fin_production_effort_3_desc: "Необходимо и дальше совершенствовать военные заводы для производства самой современной военной техники."
 fin_infrastructure_effort: "Развитие инфраструктуры"
 fin_infrastructure_effort_desc: "Страна без соответствующей инфраструктуры не может заниматься продвинутыми исследованиями и строительством."
 fin_infrastructure_effort_tt: "Недостаточно стройплощадок для §Yинфраструктуры§!"
 fin_infrastructure_effort_2: "Развитие инфраструктуры II"
 fin_infrastructure_effort_2_desc: "Необходимо расширять инфраструктуру, развивая транспорт и средства связи для работы над высокотехнологичными секретными проектами."
 fin_construction_effort_3: "Развитие строительства III"
 fin_construction_effort_3_desc: "Расширение нашей инфраструктуры открыло для нас новые возможности в строительной сфере."
 fin_nuclear_effort: "Развитие атомной энергетики"
 fin_nuclear_effort_desc: "Мы стоим на пороге открытия, способного изменить мир. Нельзя допустить, чтобы наши противники запалили огонь, способный уничтожить Землю."
 fin_extra_tech_slot: "Доп. ячейка для исследований"
 fin_extra_tech_slot_desc: "Развитие промышленности и другие открытия последнего времени позволяют нам вести параллельные научно-технические исследования."
 fin_extra_tech_slot_2: "Доп. ячейка для исследований II"
 fin_extra_tech_slot_2_desc: "Быстрая индустриализация нашей страны открыла новые возможности для технических исследований, которыми нам стоит воспользоваться."
 fin_technology_sharing: "Обмен технологиями"
 fin_technology_sharing_desc: "Обмен новейшими технологиями с союзниками повысит эффективность военно-научных исследований всего нашего альянса."
 fin_secret_weapons: "Секретное оружие"
 fin_secret_weapons_desc: "Направить все свободные ресурсы на строительство танков и самолетов — это заманчиво, однако победу в войне способны обеспечить лишь новейшие научные направления: электроника, ракетостроение и атомная энергетика."
 fin_political_effort: "Развитие политики"
 fin_political_effort_desc: "Чтобы изменить мир вокруг нас, мы должны сперва изменить собственную страну. И для начала — укрепить свои политические позиции."
 fin_collectivist_ethos: "Дух коллективизма"
 fin_collectivist_ethos_desc: "Враги могут разделять и покорять малые страны, но наш народ сохранит единство. Один за всех, и все за одного."
 fin_why_we_fight: "Почему мы сражаемся"
 fin_why_we_fight_effect: "Если у нас нет национального духа §YНейтральная внешняя политика§!, мы сможем создавать альянсы.\n"
 fin_why_we_fight_desc: "Мир становится все более небезопасным. Народ должен видеть, какие зверства совершаются теми, кто рвется к власти. Пора привлечь людей под наши знамена, чтобы они были готовы отстаивать свою свободу."
 fin_political_commissars: "Политические комиссары"
 fin_political_commissars_desc: "Чтобы наша политика последовательно проводилась в вооруженных силах, мы назначим в войска особых должностных лиц — политических руководителей."
 fin_internationalism_focus: "Ставка на интернационализм"
 fin_internationalism_focus_desc: "Идеология не признает границ. Любая нация может объявить себя суверенной, однако наши убеждения выше подобных ограничений."
 fin_nationalism_focus: "Ставка на национализм"
 fin_nationalism_focus_desc: "Наша нация уникальна, и все наши политические достижения возможны только здесь. Мы должны отстаивать это любой ценой."
 fin_ideological_fanaticism: "Идеологический фанатизм"
 fin_ideological_fanaticism_desc: "Наши политические ценности и задачи стоят того, чтобы за них умереть — как прежде люди умирали за веру. Истинный последователь должен быть готов принять смерть, а тем, кто сбился с пути, лучше приготовиться к ней."
 GRE_metaxas: "Георг II и Метаксас"
 GRE_metaxas_desc: "С помощью нашего любимого короля Георга II Метаксас смог захватить власть, приостановив работу парламента. Теперь у нас наконец есть возможность установить консервативный режим с сильным тоталитарным лидером, чтобы у народа Греции наконец появился тот, на кого можно равняться."
 GRE_the_backbone_of_our_army2: "Греческие орудия"
 GRE_the_backbone_of_our_army2_desc: "Наше снаряжение безнадежно устарело. Пора модернизировать его с помощью (французских) греческих орудий!"
 nor_drill_exile_army: "Муштра армии изгнанников"
 nor_drill_exile_army_desc: "Ежедневные учения и лекции по оперативной стратегии, тактике подразделений и стрельбе уравняют нашу подготовку с вермахтом."
 nor_operation_crofter: "Операция «Крофтер»"
 nor_operation_crofter_desc: "Пора отправиться в один конец обратно в Норвегию. Мы освободим нашу родину от немецкой угрозы или погибнем!"
 nor_train_with_sas: "Совместные учения с SAS"
 nor_train_with_sas_desc: "Проводя совместные учения с нашими британскими коллегами, мы сможем подготовить одних из самых смертоносных солдат в мире."
 nor_fleischers_plan: "План Флейшера"
 GRE_new_weapons_old_tricks2: "Греко-турецкая война"
 GRE_new_weapons_old_tricks2_desc: "Мы получили немалый опыт в артиллерии и разведке во время греко-турецкой войны 1919-1922 годов. Технологии могли измениться, но тактика — точно нет, поэтому модернизация снаряжения — наш путь."
 GRE_rejuvenating_athens2: "Поощрить туризм"
 GRE_rejuvenating_athens2_desc: "Греция, благодаря своей богатой истории, может похвастаться впечатляющими достопримечательностями, которые показывают красоту человеческой цивилизации. Но люди склонны забывать о нашем чудесном географическом положении. В стране много природных красот. Давайте воспользуемся нашим выгодным положением."
 GRE_thema_nautikon2: "Долгая амфибийная традиция"
 GRE_thema_nautikon2_desc: "Наша страна состоит из материковой части и большого архипелага. Будучи одной из первых цивилизаций мира, мы имеем некоторый опыт ведения боевых действий в этих архипелагах. Давайте учиться на нашем прошлом опыте."
 GRE_a_modern_navy2: "Изобретатели греческого огня"
 GRE_a_modern_navy2_desc: "Наши предки, хорошо нам известные византийцы, были изобретателями революционного греческого огня на наших небольших смертоносных галерах. Благодаря греческому огню мы веками господствовали в морских регионах вокруг Константинополя. Пусть это военно-морское новаторство возродится!"
 GRE_a_land_of_mountains2: "Наследие Леонида"
 GRE_academy_of_athens2: "Колыбель философии"
 GRE_academy_of_athens2_desc: "Греция является родиной философии и дала миру великих учёных и философов: Аристотеля, Платона, Сократа, Гиппократа, Зенона, Пифагора, Анаксагора, Демокрита и многих других."
 GRE_a_legacy_of_war2: "Наследие Александра"
 GRE_a_legacy_of_war2_desc: "Мегас Александрос, Басилевс Македонян, Стратегос Автократор Геллас, Ферон Эгипту, Басилевс Персон, Кириос тес Асиас, величайший всех времён."
 GRE_a_long_and_proud_tradition2: "Наследие Фемистокла"
 GRE_atlantis: "Затерянное королевство Атлантида"
 GRE_atlantis_desc: "Древние атланты были нашими давно утраченными культурными предками. Мы должны бежать обратно в безопасность Атлантиды, пока наша родина оккупирована."
 GRE_an_orthodox_state2_desc: "Греция является оплотом Православной церкви. Наши предки, византийцы, даровали нам нашу великую веру в 1054 году, после Восточного раскола. Давайте ещё раз разъясним нашему народу, что Православная церковь неразрывно связана с нашей национальной идентичностью. Православие будет нашим путеводным светом в эти отчаянные времена!"
 GRE_an_orthodox_state2: "Греческое православие"
 GRE_island: "[GetAtlantisFocusName]"
 GRE_island_desc: "[GetAtlantisFocusDesc]"
 AtlantisHidden: "Таинственный туман..."
 AtlantisHiddenDesc: "Район Атлантики к западу от Азорских островов окутан таинственным туманом. Воды остаются плохо изученными из-за суровых погодных условий и удалённости места, но, возможно, однажды ситуация улучшится?"
 AtlantisSpotted: "Таинственный остров..."
 AtlantisSpottedDesc: "В Атлантике обнаружен новый остров. Нам следует отправить археологов, чтобы узнать больше об этом необычном месте..."
 gre_island_spotted: "Погодные условия изменились, что позволяет провести дальнейшие исследования..."
 GRE_island_tt: "\n§RОбязательно выберите этот фокус до того, как Италия завершит 'Балканское господство', иначе ваша игра будет окончена!!!§!"
 GRE_reviving_the_spartan_warrior_spirit2: "Афина и Арес"
 GRE_reviving_the_spartan_warrior_spirit2_desc: "В эти тёмные времена нам нужна любая помощь, какую только можно получить, если мы хотим когда-нибудь отвоевать нашу любимую родину. Мы будем молиться нашим древним божествам войны, Афине и Аресу, чтобы мы снова почувствовали их дух внутри себя."
 GRE_a_long_and_proud_tradition2_desc: "На это Фемистокл ответил пространно и с ядом, направленным против Адейманта и коринфян; он заявил, что на самом деле город и земля афинян больше, чем их, пока у них есть 200 собственных кораблей, полностью укомплектованных экипажем, ибо никто из эллинов не сможет отразить их, если они пойдут в атаку. Геродот, История, принятие афинского руководства в битве при Саламине."
 nor_fleischers_plan_desc: "Небольшие, хорошо обученные и элитные силы — это то, что нужно Норвегии, чтобы освободить наше отечество."
 nor_ruges_plan: "План Руге"
 nor_ruges_plan_desc: "Крупная, профессионально обученная обычная армия позволит нам вторгнуться в несколько регионов Норвегии одновременно и подавить противника."
 nor_winter_mountain_training: "Арктическая подготовка"
 nor_winter_mountain_training_desc: "Норвегия — это в основном холодные горы — храбрым людям из Свободных норвежских сил нужно акклиматизироваться к родной местности. К счастью, мы можем сделать это в Шотландии."
 nor_norway_in_exile: "Свободные королевские норвежские силы"
 nor_norway_in_exile_desc: "Alt for Norge!"
 nor_norway_in_exile_navy: "Свободные королевские военно-морские силы Норвегии"
 nor_norway_in_exile_navy_desc: "Alt for Norge!"
 nor_prepare_operation_crofter: "Подготовка операции «Крофтер»"
 nor_prepare_operation_crofter_desc: "Мы должны тщательно спланировать наше освобождение — обратного пути не будет, как только корабли выйдут в море."
 nor_civillian_effort: "Обильная гидроэнергия"
 nor_ski_inf: "Лыжная пехота"
 nor_ski_inf_desc: "Лесистая, сельская местность без дорог является сложной местностью для пехоты зимой, но не для лыжных войск."
 nor_civillian_effort_desc: "Наши многочисленные плотины, расположенные по всей стране, позволяют нам дешёво электрифицировать нацию, способствуя дальнейшему экономическому развитию."
 nor_military_effort: "Расширение Kongsberg Gruppen"
 nor_military_effort_desc: "Kongsberg Gruppen, одна из наших крупнейших военных промышленных компаний, должна быть расширена на случай вторжения."
 nor_fullindustrial_effort: "Сбор экономических резервов"
 nor_fullindustrial_effort_desc: "Граждане Норвегии, если не все, кто не занят в других делах, не окажутся на заводе, наша страна обязательно падёт!"
 nor_army_effort: "Норвежская армия"
 nor_army_effort_desc: "Несмотря на все новые возможности ведения боевых действий на море и в воздухе, сухопутные войска остаются ключевым элементом войны. При должной подготовке мы сумеем избежать прежнего ада в траншеях."
 nor_equipment_effort: "Улучшение Krag-Jorgensen"
 nor_equipment_effort_desc: "Есть предел тому, какой вес может нести на себе пехотинец. Мы сосредоточим все усилия на том, чтобы обеспечить войска самым лучшим снаряжением."
 nor_motorization_effort: "Послевоенные разработки артиллерии"
 nor_motorization_effort_desc: "Мы должны изучить недавние достижения в области артиллерийского вооружения."
 nor_doctrine_effort: "Изучение современных доктрин"
 nor_doctrine_effort_desc: "Военные доктрины Великой войны, определявшие методы ведения наземного боя, безнадежно устарели. Наши лучшие умы должны разработать новую тактику и стратегию."
 nor_equipment_effort_2: "Усиление поддержки фокуса"
 nor_equipment_effort_2_desc: "Мы продолжим наши усилия, чтобы обеспечить нашу пехоту наилучшими возможными бригадами поддержки нашего времени."
 nor_mechanization_effort: "Противотанковые усилия"
 nor_mechanization_effort_desc: "Мы должны защитить наши пехотные дивизии от танков всеми необходимыми средствами."
 nor_doctrine_effort_2: "Тактические усовершенствования"
 nor_doctrine_effort_2_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 nor_equipment_effort_3: "Норвежская штурмовая винтовка"
 nor_equipment_effort_3_desc: "Хватит копировать чужие образцы и закупать снаряжение за рубежом! Мы должны стать ведущим мировым производителем пехотного оружия."
 nor_armor_effort: "Противо-воздушные усилия"
 nor_armor_effort_desc: "Мы должны защитить наши пехотные дивизии качественными зенитными бригадами."
 nor_tank_forces: "Расширение танковых войск"
 nor_tank_forces_desc: "В наши дни армия не может состоять только из неповоротливых и слабых пехотинцев. Нам нужно механизировать и защитить нашу пехоту надлежащей броней."
 nor_special_forces: "Расширение Forsvarets Spesialkommando"
 nor_special_forces_desc: "Нам необходимы элитные войска; приоритетной задачей должно стать создание горно-стрелковых и воздушно-десантных подразделений."
 nor_fighter_focus: "Ставка на истребители"
 nor_fighter_focus_desc: "Великая война научила нас маневренному воздушному бою, но это было только начало. Чтобы сохранить преимущество в будущем, мы должны создавать самые современные истребители."
 nor_bomber_focus: "Ставка на бомбардировщики"
 nor_bomber_focus_desc: "Когда люди будущего станут говорить об ужасах сегодняшних войн, они вспомнят огонь, падающий с неба. Мы должны сделать все для того, чтобы такие воспоминания остались только у наших врагов."
 nor_aviation_effort_2: "Развитие авиации II"
 nor_aviation_effort_2_desc: "Необходимо совершенствовать военно-воздушные силы, чтобы координировать их действия с другими родами войск."
 nor_CAS_effort: "Развитие штурмовиков"
 nor_CAS_effort_desc: "Современная армия нуждается в поддержке не только на земле, но и в воздухе."
 nor_rocket_effort: "Развитие ракет"
 nor_rocket_effort_desc: "Ракеты и реактивные двигатели позволяют пилотируемым и беспилотным летательным аппаратам достигать очень высоких скоростей. Прогресс в этой области даст нам возможность заставать врага врасплох."
 nor_NAV_effort: "Развитие аэронавигации"
 nor_NAV_effort_desc: "В новые времена война на море ведется и под водой, и в воздухе над водной поверхностью."
 nor_naval_effort: "Развитие военно-морского флота"
 nor_naval_effort_tt: "Недостаточно стройплощадок для §Yверфей§!"
 nor_naval_effort_desc: "Развитие флота должно стать для нас приоритетной задачей. Нужно направить все доступные ресурсы на строительство новых верфей и развитие легких надводных кораблей."
 nor_flexible_navy: "ВМФ на основе многоцелевых судов"
 nor_flexible_navy_desc: "Новая тактика ведения войны на море с учетом применения подводных лодок позволит эффективнее наносить удары по вражеским конвоям."
 nor_large_navy: "ВМФ на основе крупных судов"
 nor_large_navy_desc: "Включение крупных судов в нашу доктрину морской войны и обеспечение безопасности торговых конвоев покажет, какие типы кораблей нам нужнее всего."
 nor_submarine_effort: "Строительство подводных лодок"
 nor_submarine_effort_desc: "Война с использованием субмарин стала особенно перспективным направлением с момента появления торпедных катеров. Нам нужно научиться не только защищаться от подлодок противника, но и использовать их против вражеских кораблей."
 nor_cruiser_effort: "Развитие крейсеров"
 nor_cruiser_effort_desc: "Прежде чем заниматься продвинутыми разработками линкоров, нам нужно заменить устаревшие крейсеры."
 nor_destroyer_effort: "Строительство эсминцев"
 nor_destroyer_effort_desc: "Конструируя подводные лодки и изучая методы их применения, мы научились противостоять данной тактике ведения боя. Эсминцы для этого жизненно необходимы."
 nor_capital_ships_effort: "Развитие крупных кораблей"
 nor_capital_ships_effort_desc: "Держава, обладающая самым крупным флотом, будет править морями. Линкоры и авианосцы представляют старый и новый подходы к концепции господства на море."
 nor_industrial_effort: "Развитие промышленности"
 nor_industrial_effort_desc: "Все политические усилия следует сосредоточить на том, чтобы обеспечить развитие промышленности мирного назначения."
 nor_industrial_effort_2: "Развитие промышленности II"
 nor_industrial_effort_2_desc: "Стальная воля и всенародный трудовой подъем помогут нам собрать силы для нового промышленного прорыва."
 nor_construction_effort: "Развитие строительства"
 nor_construction_effort_tt: "Недостаточно стройплощадок для §Yфабрик§!"
 nor_construction_effort_desc: "Не следует недооценивать гражданскую промышленность, даже когда надвигается мировая война."
 nor_production_effort: "Развитие вооружений"
 nor_production_effort_tt: "Недостаточно стройплощадок для §Yвоенных заводов§!"
 nor_production_effort_desc: "Кто умеет делать трактора, сумеет делать и танки! Мы не можем допустить отставания военной промышленности."
 nor_construction_effort_2: "Развитие строительства II"
 nor_construction_effort_2_desc: "Мы должны усовершенствовать фабрики, чтобы ускорить производство товаров для торговли и обеспечить дальнейшее строительство."
 nor_production_effort_2: "Развитие вооружений II"
 nor_production_effort_2_desc: "Не стоит пытаться переориентировать фабрики на выпуск военной продукции. Мы должны сосредоточиться на развитии военной промышленности как таковой."
 nor_production_effort_3: "Развитие вооружений III"
 nor_production_effort_3_desc: "Необходимо и дальше совершенствовать военные заводы для производства самой современной военной техники."
 nor_infrastructure_effort: "Развитие инфраструктуры"
 nor_infrastructure_effort_desc: "Страна без соответствующей инфраструктуры не может заниматься продвинутыми исследованиями и строительством."
 nor_infrastructure_effort_tt: "Недостаточно стройплощадок для §Yинфраструктуры§!"
 nor_infrastructure_effort_2: "Развитие инфраструктуры II"
 nor_infrastructure_effort_2_desc: "Необходимо расширять инфраструктуру, развивая транспорт и средства связи для работы над высокотехнологичными секретными проектами."
 nor_construction_effort_3: "Развитие строительства III"
 nor_construction_effort_3_desc: "Расширение нашей инфраструктуры открыло для нас новые возможности в строительной сфере."
 nor_nuclear_effort: "Развитие атомной энергетики"
 nor_nuclear_effort_desc: "Мы стоим на пороге открытия, способного изменить мир. Нельзя допустить, чтобы наши противники запалили огонь, способный уничтожить Землю."
 nor_extra_tech_slot: "Доп. ячейка для исследований"
 nor_extra_tech_slot_desc: "Развитие промышленности и другие открытия последнего времени позволяют нам вести параллельные научно-технические исследования."
 nor_extra_tech_slot_2: "Доп. ячейка для исследований II"
 nor_extra_tech_slot_2_desc: "Быстрая индустриализация нашей страны открыла новые возможности для технических исследований, которыми нам стоит воспользоваться."
 nor_technology_sharing: "Норвежская школа экономики"
 nor_technology_sharing_desc: "После долгой борьбы и упорной работы, особенно Кристофера Лемкуля, NHH была наконец открыта королём Хоконом VII в понедельник 7 сентября 1936 года."
 nor_secret_weapons: "Развитие электроники"
 nor_secret_weapons_desc: "Направить все свободные ресурсы на строительство танков и самолетов — это заманчиво, однако победу в войне способны обеспечить лишь новейшие научные направления: электроника, ракетостроение и атомная энергетика."
 nor_political_effort: "Укрепление кабинета Нюгорсвольда"
 nor_political_effort_desc: "Чтобы изменить мир вокруг нас, мы должны сперва изменить собственную страну. И для начала — укрепить свои политические позиции."
 nor_collectivist_ethos: "Дух коллективизма"
 nor_collectivist_ethos_desc: "Враги могут разделять и покорять малые страны, но наш народ сохранит единство. Один за всех, и все за одного."
 nor_liberty_ethos: "Дух свободы"
 nor_liberty_ethos_desc: "В эпоху идеологических фанатиков, которые стремятся подавить в людях человечность, мы будем выступать за сохранение личных прав и свобод."
 nor_militarism: "Милитаризм"
 nor_militarism_desc: "Те, кто рассматривает армию лишь как необходимое зло, будут колебаться — вступать в войну или нет. Мы сделаем милитаризм частью своей культуры и станем нацией воинов."
 nor_political_correctness: "Политкорректность"
 nor_political_correctness_desc: "Люди, отстаивающие взгляды, расходящиеся с мнением большинства, беспокоятся о том, что против них существует глобальный заговор. Это любопытная идея."
 nor_neutrality_focus: "Провозглашение строгого нейтралитета"
 nor_neutrality_focus_desc: "Говорят, отвага и мудрость необходимы для выбора стороны в международном конфликте, но мы точно знаем, что еще больше они нужны, чтобы отказаться от выбора."
 nor_interventionism_focus: "Ставка на интервенционизм"
 nor_interventionism_focus_desc: "Мы готовы отстаивать свободу всех народов, а не только своих граждан. Если для победы над тиранией нужна война — пусть так."
 nor_military_youth: "Милитаризация молодежи"
 nor_military_youth_desc: "Организации, призванные заниматься поддержанием дисциплины и политическим образованием молодежи, будут с ранних лет воспитывать ее в духе преданности и самопожертвования."
 nor_deterrence: "Сдерживание"
 nor_deterrence_desc: "Трудно в одиночку извлечь из войны пользу. К счастью, мы знаем, что наилучшая защита — это оружие, которое внушает такой страх, что его не нужно применять."
 nor_volunteer_corps: "Добровольческие корпуса"
 nor_volunteer_corps_desc: "Мы никогда не стали бы заставлять своих граждан отдавать жизнь за идеалы свободы, однако если люди сами желают помогать другим странам, мы должны предоставить им такую возможность."
 nor_paramilitarism: "Вооруженные формирования"
 nor_paramilitarism_desc: "Принципы военного обучения могут применяться не только в армии. С развитием полувоенных формирований, дополняющих вооруженные силы, больше людей смогут проходить боевую подготовку."
 nor_indoctrination_focus: "Идеологическая обработка"
 nor_indoctrination_focus_desc: "Поскольку наша идеология является истинной, ее следует преподносить как истину в последней инстанции. Система образования и средства массовой информации должны донести это до каждого."
 nor_foreign_expeditions: "Иностранные экспедиции"
 nor_foreign_expeditions_desc: "Поскольку наши враги намерены вмешиваться к конфликты других держав, отстаивая собственные идеалы, мы должны готовиться к аналогичным действиям."
 nor_why_we_fight: "Почему мы сражаемся"
 nor_why_we_fight_effect: "Если у нас нет национального духа §YНейтральная внешняя политика§!, мы сможем создавать альянсы.\n"
 nor_why_we_fight_desc: "Мир становится все более небезопасным. Народ должен видеть, какие зверства совершаются теми, кто рвется к власти. Пора привлечь людей под наши знамена, чтобы они были готовы отстаивать свою свободу."
 nor_political_commissars: "Политические комиссары"
 nor_political_commissars_desc: "Чтобы наша политика последовательно проводилась в вооруженных силах, мы назначим в войска особых должностных лиц — политических руководителей."
 nor_internationalism_focus: "Ставка на интернационализм"
 nor_internationalism_focus_desc: "Идеология не признает границ. Любая нация может объявить себя суверенной, однако наши убеждения выше подобных ограничений."
 nor_nationalism_focus: "Ставка на национализм"
 nor_nationalism_focus_desc: "Наша нация уникальна, и все наши политические достижения возможны только здесь. Мы должны отстаивать это любой ценой."
 nor_ideological_fanaticism: "Идеологический фанатизм"
 nor_ideological_fanaticism_desc: "Наши политические ценности и задачи стоят того, чтобы за них умереть — как прежде люди умирали за веру. Истинный последователь должен быть готов принять смерть, а тем, кто сбился с пути, лучше приготовиться к ней."
 nor_narvik: "Порт Нарвик"
 nor_narvik_desc: "Северный порт Нарвик — ключевая точка торговли на севере. Мы можем превратить порт в плацдарм для освобождения нашей страны."
 nor_coastal_forts: "Укрепление Осло"
 nor_coastal_forts_desc: "Мы должны быть готовы, если Ось попытается снова вторгнуться в нашу столицу."
 nor_combine_training: "Совместные учения"
 nor_combine_training_desc: "Мы можем научиться новым методам ведения боя у британцев, а они — у нас."
 nor_king_speech: "Отважный король"
 nor_king_speech_desc: "Наш отважный король Хокон отказывается капитулировать и вдохновляет норвежцев на сопротивление и борьбу."
 nor_lower_recruitment_standars: "Снижение стандартов призыва"
 nor_lower_recruitment_standars_desc: "Нам нужно расширить призыв, чтобы собрать достаточно большую армию для освобождения родины, но оставшиеся кандидаты либо слишком стары, либо недостаточно физически подготовлены. Снижая стандарты, мы можем расширить армию ценой падения качества."
 nor_greenland: "Захват Гренландии"
 nor_greenland_desc: "Мы должны объединить наших нордических братьев из Гренландии для борьбы с немцами."
 nor_iceland: "Захват Исландии"
 nor_iceland_desc: "Мы должны объединить наших нордических братьев из Исландии для борьбы с немцами."
 TIB_nothing: "Копирование кода GDU в Horstorical Multiplayer"
 TIB_resource: "Поиск германо-советского коопа на иранском фронте"
 fin_continuation: "Война-продолжение"
 fin_continuation_desc: "Мы освободим Карелию от красной угрозы!"
 TIB_iraq: "Добавление 6 тайлов к микро Гибралтара"
 irq_rev: "Восстание за Ирак!"
 irq_purge: "Чистка оппозиции"
 irq_war: "Атака на RAF Хаббания"
 TIB_resource2: "Высадка в Нормандии с Невиллом Чемберленом"
 uk_iraq_focus2: "Восстановление династии Хашимитов"
 uk_iraq_focus2_desc: "Восстановление законного правительства Ирака при дворе короля Фейсала II обеспечит Союзникам лёгкий доступ к местной нефти на Средиземноморском театре."
 TIB_resource5: "Перезапуск в Road to 56"
 TIB_resource134: "Увеличение товаров народного потребления США до 97%"
 TIB_resource4: "Выдача Германии 6 бонусов к исследованиям ПВО"
 fin_soviet_threat: "Большевистская угроза"
 fin_soviet_threat_desc: "Советы не знают границ — тот факт, что красные проиграли гражданскую войну, не означает, что Финляндия в безопасности от коммунизма. Этот мир — лишь пауза в войне."
 fin_karelianism: "Суур-Суоми"
 fin_karelianism_desc: "Финляндия — это не просто нация для финнов, но для всех финских народов, и наше право и долг — воссоединить их с родичами."
 fin_continuation_prep: "Залечивание ран"
 fin_continuation_prep_desc: "Проявив терпение, мы найдём возможность освободить Карелию."
 TIB_resource11: "Добавление значков SS везде"
 TIB_resource3: "Высокая рокировка Канады"
 irq_kuwait: "Претензия на Кувейт"
 TIB_resource20: "Установка всех символов дивизий по стандарту НАТО"
 IRE_emergency: "Закон о чрезвычайных полномочиях"
 IRE_emergency_desc: "Война охватывает Европу, и Ирландия в опасности. Мы должны объявить чрезвычайное положение и защитить ирландское государство."
 TIB_resource1337: "Основание Хорстландии"
 TIB_resource1338: "Включение камикадзе для Болгарии"
 SOV_docking: "Разрешить базирование Королевского флота в Мурманске"
 SOV_docking_desc: "Поскольку Красный флот развёрнут в Ленинграде, мы не можем выделить корабли для защиты торговли и снабжения в Арктике. Мы должны предоставить Королевскому флоту права базирования в Мурманске."
 SOV_mongolian_aid: "Получение помощи от Монголии"
 tur_divide_by_zero: "Соблюдение нейтралитета"
 SOV_mongolian_aid_desc: "Поскольку наши вооружённые силы недоукомплектованы и плохо оснащены, нам необходима внешняя помощь для приведения их в боевую готовность."
 TIB_anti_meme1: "Разрешение игроку за Нидерланды"
 TIB_anti_meme2: "Удаление заводов Канады"
 TIB_resource312: "Удержание линии де Голля"
 ETH_army_effort: "Развитие армии"
 ETH_army_effort_desc: "Несмотря на все новые возможности ведения боевых действий на море и в воздухе, сухопутные войска остаются ключевым элементом войны. При должной подготовке мы сумеем избежать прежнего ада в траншеях."
 ETH_why_we_fight: "Почему мы сражаемся"
 ETH_why_we_fight_effect: "Если у нас нет национального духа §YНейтральная внешняя политика§!, мы сможем создавать альянсы.\n"
 ETH_why_we_fight_desc: "Мир становится все более небезопасным. Народ должен видеть, какие зверства совершаются теми, кто рвется к власти. Пора привлечь людей под наши знамена, чтобы они были готовы отстаивать свою свободу."

 ITA_italia_irredenta: "Итальянский ирредентизм"
 ITA_italia_irredenta_desc: "Italia искуплена."
 ITA_mediterranean_wall: "Стена «Mare Nostrum»"
 ITA_mediterranean_wall_desc: "С потерей наших африканских колоний возникла угроза вторжения. Италия должна защитить свои берега от иностранных захватчиков."
 ROM_ig_farben_romania: "IG Farben Abt. Rumänien"
 ROM_ig_farben_romania_desc: "Более тесное экономическое партнёрство с Германией приносит множество выгод, таких как открытие предприятий IG Farben в Мунтении."
 continuous_recruitment_drive: "Кампания по вербовке в армию"
 continuous_recruitment_drive_desc: "Начать массовую кампанию по призыву в армию."
 tooltip_fra_dont_capitulate: "§RВы не можете взять этот фокус, если вы капитулировали!§!\n"
 tooltip_jap_war: "§RЭто объявит войну ВСЕМ странам Союзников!§!\n\n"

 tooltip_MAN_railways: "§YНачинаются работы по созданию железнодорожной сети по всей Маньчжурии§ \n\n§YРаботы по строительству железных дорог завершаются каждые 105 дней, пока не будут развиты все провинции. Расширение железных дорог добавляет 1 гражданскую фабрику, 2 уровня инфраструктуры и 3 строительных слота§\n\n"
