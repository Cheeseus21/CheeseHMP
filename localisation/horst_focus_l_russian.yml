 india.279.t: "Статус женщин"
 india.279.desc: "Мы уже решили многие политики и несправедливости, доставшиеся от предыдущей администрации, но мы полностью избегали вопроса гендерного равенства. По этому вопросу есть много разных мнений, которые нужно умиротворить, и в наших интересах решить этот вопрос быстро."
 india.279.a: "Давайте не будем продолжать нашу отсталость."
 india.279.b: "Давайте не будем торопиться."
 india.279.c: "Некоторые традиции лучше сохранить."

 india.280.t: "Вице-король начинает беспокоиться"
 india.280.desc: "Хотя офис вице-короля должен быть отдалён от провинциальных выборов, ходят слухи о попытках саботировать нашу кампанию. Конечно, они не могли быть слишком успешными, иначе нас бы здесь не было. Тем не менее, похоже, вице-король оценивает, стоит ли использовать своё положение, чтобы отменить политику, которую он считает неприемлемой, и саботировать наше движение. Мы должны действовать осторожно, чтобы избежать гнева генерал-губернатора."
 india.280.a: "К чёрту его."

 india.281.t: "Вмешательство в нашу политику"
 india.281.desc: "Властолюбивые, колониалистские пальцы вице-короля воспользовались возможностью после нашей национализации частных железных дорог и общей инфраструктуры, отменив изменения и оставив распределительную сеть Индии в стороне, как он делал всегда, и всё ради чего? Ради какой-то мелкой, незначительной политической выгоды. Хотя сам этот шаг был широко раскритикован индийским населением, решение вице-короля с треском провалилось: немногие местные жители, верившие в добрую волю Британии, наконец увидели их такими, какие они есть: эксплуататорскими, претенциозными империалистами."

 india.282.desc: "Властолюбивые, колониалистские пальцы вице-короля воспользовались возможностью после нашей национализации частных фабрик и предприятий, управляемых работниками, отменив изменения и оставив экономику Индии в стороне, как он делал всегда, и всё ради чего? Ради какой-то мелкой, незначительной политической выгоды. Хотя сам этот шаг был широко раскритикован индийским населением, решение вице-короля с треском провалилось: немногие местные жители, верившие в добрую волю Британии, наконец увидели их такими, какие они есть: эксплуататорскими, претенциозными империалистами."

 india.283.desc: "Властолюбивые, колониалистские пальцы вице-короля воспользовались возможностью после нашей национализации банковских кооперативов, отменив изменения и оставив распределительную сеть Индии в стороне, как он делал всегда, и всё ради чего? Ради какой-то мелкой, незначительной политической выгоды. Хотя сам этот шаг был широко раскритикован индийским населением, решение вице-короля с треском провалилось: немногие местные жители, верившие в добрую волю Британии, наконец увидели их такими, какие они есть: эксплуататорскими, претенциозными империалистами."
 
 india.291.t: "Шри-ланкийцы предлагают белый мир"
 india.291.d: "Шри-ланкийские делегации встретились с нашими в Мадурае, сделав важный шаг к миру и процветанию обеих наших стран."
 india.292.t: "Непальцы предлагают белый мир"
 india.292.d: "Шри-ланкийские делегации встретились с нашими в Дели, сделав важный шаг к миру и процветанию обеих наших стран."
 india.293.t: "Бутанцы предлагают белый мир"
 india.293.d: "Бутанские делегации встретились с нашими в Калькутте, сделав важный шаг к миру и процветанию обеих наших стран."
 india.294.t: "Женские правозащитные группы навязывают свои требования."
 india.294.d: "Во время выборов мы пообещали нескольким женским правозащитным группам полное равенство. Мы получили много голосов благодаря этому и, возможно, даже выиграли выборы благодаря им. Теперь, когда мы нарушили это обещание, они снова вынудили нас действовать."
 india.294.a: "Это была не самая лучшая идея."
 india.2940.t: "Женские правозащитные группы требуют ответов."
 india.2940.d: "Во время выборов мы обратились за помощью к различным женским организациям по всей стране и пообещали им, что мы единственные, кто готов зайти достаточно далеко в вопросах прав женщин. Однако наше обещание осталось невыполненным, что вызвало вопросы в наших рядах."
 india.2940.a: "Мы займёмся этим когда-нибудь."
 women_rights_demands_tt: "Было бы разумно ввести полное равенство, пока нас не вынудили."
 india.291.a: "Мир, наконец"
 india.291.b: "Никакой капитуляции, ради империи"
 RAJ_Immediate_Famine_Response: "Немедленное реагирование на голод"
 RAJ_Further_Recovery_Efforts: "Дальнейшие усилия по восстановлению после голода"
 grant_concessions_to_the_british: "Предоставить уступки британцам"
 grant_concessions_to_the_british_desc: "Предоставив британцам мелкие ресурсные уступки, они охотнее отпустят нас."
 grant_concessions_to_the_british_2: "Предоставить дополнительные уступки британцам"
 grant_concessions_to_the_british_2_desc: "Предоставив британцам более крупные ресурсные уступки, они охотнее отпустят нас."
 organize_large_scale_strikes: "Организовать крупномасштабные забастовки"
 organize_large_scale_strikes_desc: "Эксплуатация рабочих осуществляется не только британцами, но избавление от них станет первым шагом к освобождению. Мы приступим к масштабным забастовкам, чтобы вынудить британцев действовать."
 instigate_communal_violence: "Разжигать общинные столкновения"
 instigate_communal_violence_desc: "Другие методы давления на наших колониальных хозяев провалились. Единственный оставшийся вариант — подливать масло в огонь в напряжённых этнически разнообразных городах в надежде, что британцы отреагируют соответствующим образом."
 promote_ethnic_harmony: "Продвигать этническую гармонию"
 promote_ethnic_harmony_desc: "Пока Джинна и его Мусульманская лига проповедуют отделение для меньшинств, мы должны принять прямо противоположную позицию. Позицию постоянной этнической, культурной и религиозной гармонии."
 utilize_more_extrem_factions: "Использовать радикальные фракции"
 utilize_more_extrem_factions_desc: "Хотя наша основная кампания идёт хорошо, тайная поддержка экстремистов может дать нам преимущество на переговорах."
 concede_to_capitalists: "Уступить капиталистам"
 concede_to_capitalists_desc: "Обеспечив поддержку богатых промышленников нашей страны, мы заручимся их поддержкой против британских делегаций."
 hinder_pak_influence: "Препятствовать влиянию ВМЛ"
 hinder_pak_influence_desc: "Мы должны саботировать усилия пакистанских делегаций, чтобы обезопасить наш субконтинент."
 appeal_for_international_support: "Обратиться за международной поддержкой"
 appeal_for_international_support_desc: "Хотя наши дипломаты изо всех сил пытаются оказать давление на британцев, это может быть более эффективным, если нас поддержит иностранное правительство."
 india.10.t: "[?RAJBACKER.GetName] требует свободную Индию."
 india.10.e: "Правительство [?RAJBACKER.GetAdjective] официально выразило дипломатическую поддержку §YИндийским§! делегациям, добивающимся независимости. Предоставление им права голоса может облегчить им сопротивление нашему колониальному правлению."
 india.10.a: "По крайней мере, дайте им возможность высказаться."
 india.10.b: "Мы не позволим [?RAJBACKER.GetNameDef] диктовать нашу политику."
 indinfluence15: "§YИндийским делегациям§! будет легче оказывать давление для §YИндийской независимости§!"
 increase_both_influence: "Сотрудничество с ВМЛ"
 increase_both_influence_desc: "Объединив усилия, мы будем более эффективно оказывать давление на британцев, чтобы они скорее освободили субконтинент от колониализма, ценой возможного раскола нашей великой нации на две части."
