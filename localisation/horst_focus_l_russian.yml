 CAN_wartime_industries_control_board: "Совет по контролю военной промышленности"
 CAN_wartime_industries_control_board_desc: "Должен быть создан централизованный орган для управления производством, распределения ресурсов и координации промышленности для военных нужд."
 CAN_dominion_housing_act: "Закон о жилье доминиона"
 CAN_dominion_housing_act_desc: "Современному доминиону нужны единые стандарты жилищного строительства в масштабах страны. Мы должны улучшить жилищные условия всех канадцев."
 CAN_expand_national_housing: "Расширение национального жилищного строительства"
 CAN_expand_national_housing_desc: "После успеха Закона о жилье доминиона необходимо добиваться расширения этой политики для решения проблемы нехватки жилья и содействия национальному единству в эти трудные времена."
 CAN_national_employment_commission: "Национальная комиссия по занятости"
 CAN_national_employment_commission_desc: "Координируя спрос и предложение рабочей силы в различных секторах, Национальная комиссия по занятости оптимизирует трудоустройство, максимизирует производительность и ускоряет экономический рост."
 CAN_public_works_construction: "Строительство общественных работ"
 CAN_public_works_construction_desc: "Для борьбы с безработицей и оживления экономики правительство запустит масштабные общественные работы — строительство дорог, мостов и инфраструктуры, чтобы вернуть канадцев к работе."
 CAN_dustbowl_recovery_fund: "Фонд восстановления Пыльного котла"
 CAN_dustbowl_recovery_fund_desc: "Пострадавшие от засухи Альберта и Саскачеван нуждаются в федеральной помощи. Развивая успехи в прибрежной инфраструктуре, мы теперь сосредоточимся на восстановлении Прерий и модернизации их важнейших систем."
 CAN_DOSCO: "DOSCO"
 CAN_DOSCO_desc: "Создание Dominion Steel and Coal Corporation знаменует новую эру промышленной мощи, используя природные ресурсы Канады для стимулирования экономического роста и поддержки будущего нации."
 CAN_king_or_chaos: "Король или хаос"
 CAN_king_or_chaos_desc: "Отсутствие кризисного руководства у Беннета грозит ввергнуть страну в хаос. Мы должны довериться Маккензи Кингу, чей опыт обеспечивает надежное руководство, необходимое Канаде в эти смутные времена."
 CAN_federal_unemployment_act: "Федеральный закон о безработице"
 CAN_federal_unemployment_act_desc: "Следуя рекомендациям комиссии Роуэлла-Сиройса, Федеральный закон о безработице создаст национальную систему оказания помощи и поддержки безработным."
 CAN_st_lawrence_seaway_development: "Развитие морского пути Святого Лаврентия"
 CAN_st_lawrence_seaway_development_desc: "Морской путь Святого Лаврентия преобразит ключевые города на своем маршруте, стимулируя торговлю, промышленность и городской рост. Этот проект дополнит текущее строительство гидроэлектростанций, обеспечивая энергией экономическое расширение региона."
 CAN_government_of_national_unity: "Правительство национального единства"
 CAN_government_of_national_unity_desc: "Перед лицом огромных вызовов войны политические лидеры Канады должны объединиться в коалиционное правительство под руководством Маккензи Кинга, чтобы обеспечить стабильное руководство и сохранить национальную стабильность в неопределенные времена."
 CAN_intervene_in_quebec_elections: "Вмешаться в выборы в Квебеке"
 CAN_intervene_in_quebec_elections_desc: "Мы не можем допустить, чтобы антивоенная и сепаратистская кампания Дюплесси ослабила единство Канады. Вмешавшись в выборы 1939 года в Квебеке, мы поддержим федералистские силы для обеспечения национальной стабильности в эти опасные времена."
 CAN_back_the_quebec_liberals: "Поддержать квебекских либералов"
 CAN_back_the_quebec_liberals_desc: "Либеральная партия давно пользуется доверием жителей Квебека, обеспечивая надежное руководство в неопределенные времена. Поддержав их лидерство, мы сможем гарантировать дальнейшее сотрудничество провинции в общенациональных военных усилиях."
 CAN_dissolve_the_parliament: "Распустить парламент"
 CAN_dissolve_the_parliament_desc: "Политический тупик после вмешательства шокирует и глубоко тревожит, особенно во время войны. Мы должны распустить этот недееспособный парламент и назначить новых министров, способных вести страну через вызовы военного управления."
 CAN_british_north_america_act: "Акт о Британской Северной Америке"
 CAN_british_north_america_act_desc: "Новая конституция, принятая в соответствии с Актом о Британской Северной Америке, предоставляет федеральному правительству больше полномочий, обеспечивая более твердую руку в управлении растущей нестабильностью войны."
 CAN_bank_of_canada: "Банк Канады"
 CAN_bank_of_canada_desc: "Хаос Великой депрессии показал опасность нерегулируемой финансовой системы. Центральный банк теперь необходим для восстановления доверия, стабилизации валюты и направления экономического восстановления."
 CAN_canadian_broadcasting_corporation: "Канадская радиовещательная корпорация"
 CAN_canadian_broadcasting_corporation_desc: "CBC будет служить важным национальным вещателем, соединяя канадцев от побережья до побережья через информационные программы, отражающие наши общие ценности и разнообразные сообщества."
 CAN_bennett_new_deal: "Новый курс Беннета"
 CAN_bennett_new_deal_desc: "Твердая рука Беннета поставила Канаду на путь восстановления. Чтобы сохранить этот хрупкий прогресс, мы должны продолжить его политику и не допустить возвращения страны к нестабильности."
 CAN_disallow_the_padlock_act: "Отменить закон «Амбула»"
 CAN_disallow_the_padlock_act_desc: "Мы не можем допустить, чтобы провинциальное законодательство попирало гражданские свободы. Канада должна поддерживать верховенство закона и защищать демократические права по всей стране. Закон «Амбула» должен быть отменен."
 CAN_challenge_the_courts: "Оспорить решение судов"
 CAN_challenge_the_courts_desc: "Суды могут назвать наш Новый курс неконституционным, но эти реформы жизненно необходимы, чтобы вывести канадцев из бедности, восстановить занятость и построить более справедливое общество. Правительство оспорит решение — ради будущего нации."
 CAN_censur_duplessis: "Вынести порицание Дюплесси"
 CAN_censur_duplessis_desc: "Использование премьером Дюплесси закона «Амбула» и его оппозиция реформам Нового курса угрожают демократии и национальному восстановлению. Правительство должно вынести официальное порицание, чтобы противостоять его тактике."
 CAN_invoke_the_war_measures_act: "Ввести в действие Акт о мерах военного времени"
 CAN_invoke_the_war_measures_act_desc: "В эти необычайно трудные времена требуются необычайные меры; введение Акта о мерах военного времени позволит быстро принять важнейшее законодательство, чтобы помочь вывести нашу нацию из Депрессии."
 CAN_amend_the_constitution: "Внести поправки в конституцию"
 CAN_amend_the_constitution_desc: "Основываясь на полномочиях, полученных через Акт о мерах военного времени, мы теперь стремимся внести поправки в конституцию, чтобы предоставить федеральному правительству контроль над здравоохранением и пенсиями, обеспечивая скоординированные социальные программы, жизненно важные для национального благосостояния."
 CAN_imperial_economic_cooperation: "Имперское экономическое сотрудничество"
 CAN_imperial_economic_cooperation_desc: "С приближением угрозы войны более тесные экономические связи внутри Британской империи необходимы. Скоординированные промышленные усилия укрепят нашу коллективную оборону и подготовят экономику Канады к мобилизации."
 CAN_royal_tour_of_canada: "Королевский тур по Канаде"
 CAN_royal_tour_of_canada_desc: "Предстоящий визит короля Георга VI и королевы Елизаветы знаменует исторический момент, укрепляя связи между Канадой и Короной, повышая национальную гордость и объединяя канадцев накануне глобального конфликта."

