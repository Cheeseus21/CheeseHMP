 princely_state_independence_desc: "Индия скоро получит независимость, и вопрос централизованного правительства беспокоит многих князей, правящих на территориях, на которые претендует Индия.\nМы можем потребовать, чтобы они выбрали сторону в любое время, но если мы действуем слишком рано, они, скорее всего, решат против объединения.[RAJ.GetVariableEnable]"
