 GER_paratroop_tt: "Мы сможем набрать дополнительные §Y6 парашютно-десантных§! дивизий."
 GER_paratroop: "Увеличить численность Fallschirmjäger"
 GER_paratroop_desc: "Возможность высадки пехоты в тылу врага для захвата ключевых позиций — это будущее войны. Набор дополнительных дивизий Fallschirmjäger принесёт только пользу Рейху."
 VIC_africa_corps_3_tt: "Изменить §YÉtat Français§! на:\nСтабильность: §G+5.0%§!\nПоддержка войны: §G+5.0%§!"
 VIC_africa_corps_3: "Законная Франция"
 VIC_africa_corps_3_desc: "Мы — единственная настоящая Франция."
 VIC_Installing_Patriotism: "Воспитывать патриотизм"
 VIC_Installing_Patriotism_desc: "Народу Франции есть чем гордиться, но сначала его нужно научить гордиться."
 VIC_mainland_defense: "Оборона метрополии"
 VIC_mainland_defense_desc: "Африка слишком сильно нас обременяет – мы должны готовиться к оставлению Алжира."
 VIC_mainland_defense_2: "Крепость Марсель"
 VIC_mainland_defense_2_desc: "Марсель – главный логистический путь из Средиземноморья во Францию. Именно здесь будет нанесён удар в случае вторжения, и именно здесь мы сосредоточим наши оборонительные усилия."
 VIC_africa_corps: "Алжирский бастион"
 VIC_africa_corps_desc: "Алжир – такая же часть метрополии Франции, как Тулуза или Марсель. Это наш южный оборонительный рубеж против иностранного вторжения."
 ALLIES_resist: "Возвращение домой"
 ALLIES_resist_desc: "Час освобождения близок – мы возвращаемся домой."
 GER_abwehr: "Реорганизация абвера"
 GER_abwehr_desc: "С установлением твёрдого контроля над Рейнской областью тиски Версаля, похоже, с каждым днём ослабевают. Продолжим разрушать договор и реорганизуем абвер в настоящую разведывательную службу."
 GER_abwehr2: "Расширение внешних операций"
 GER_abwehr2_desc: "Внутренние дела могут завести лишь до определённого предела. Используя нашу обширную сеть союзников, мы сможем найти полезных оперативных агентов."

 GER_transports: "Построить Marinefährprahm"
 GER_transports_desc: "Для успешного проведения морских десантов необходимо модернизировать наши десантные средства."
 ALLIES_sov_def: "Глубокая оборона"
 ALLIES_sov_def_desc: "Эшелонированная оборона (также известная как глубокая оборона или упругая оборона) – это военная стратегия, направленная на сдерживание, а не на полное блокирование продвижения противника. Она позволяет выиграть время и нанести дополнительные потери, уступая территорию."
 ALLIES_friends_near_and_afar: "Близкие и дальние друзья"
 ALLIES_friends_near_and_afar_desc: "Нам следует искать силы и поддержки не только среди ближайших союзников…"
 ALLIES_sov_factory: "Начать пятилетку"
 ALLIES_sov_factory_desc: "Мы начнём «пятилетку» по образцу советского экономического планирования, но в рамках капиталистической системы."
 ALLIES_preparations: "Военная подготовка"
 ALLIES_preparations_desc: "Будут проведены штабные учения по множеству сценариев вторжения."
 ALLIES_go_it_alone: "Близкие друзья"
 ALLIES_go_it_alone_desc: "Хотя мы и состоим в союзе с другими странами, это не означает взаимозаменяемости наших вооружённых сил. Армия, флот и авиация будут действовать независимо от иностранных военных планировщиков."
 ALLIES_soviet_aid: "Дальние друзья"
 ALLIES_soviet_aid_desc: "Советское планирование и организация, похоже, дают большие преимущества странам, готовым рискнуть применить их. Нам следует брать пример с Советского Союза."
 ALLIES_paramil: "Лояльные вооружённые формирования"
 ALLIES_paramil_desc: "Создание мощной парамилитарной организации позволит усилить армию и увеличить долю населения, уже обученного для сопротивления иностранным захватчикам."
 AXIS_ita_patron: "Итальянский корпоративизм"
 AXIS_ita_patron_desc: "Фашистские профсоюзы Италии предлагают модель построения общества снизу вверх, начиная с рабочих."
 AXIS_ita_patron_1: "Итальянская оборонительная доктрина"
 AXIS_ita_patron_1_desc: "Укрепления – лучшее средство обороны."
 AXIS_ger_patron_1: "Ум превыше силы"
 AXIS_ger_patron_1_desc: "Качество, а не количество; результат, а не метод – вот что принесёт победу на поле боя."
 AXIS_ita_patron_3: "Заставить поезда ходить по расписанию!"
 AXIS_ita_patron_3_desc: "Мы исправим плачевное состояние нашей железнодорожной сети и заставим поезда ходить по расписанию!"
 AXIS_ita_patron_4: "Превосходство на море"
 AXIS_ita_patron_4_desc: "Победа на море приведёт и к победе на суше."
 AXIS_ita_patron_2: "Фашистские ополчения"
 AXIS_ita_patron_2_desc: "Подобно тому, как фашизм является массовым политическим движением, мы будем опираться на народ, чтобы он взялся за оружие против наших врагов!"
 AXIS_ger_patron_3: "Чрезвычайные запасы топлива"
 AXIS_ger_patron_3_desc: "Топливо – критически важный ресурс современной войны; мы должны создать его запасы."
 AXIS_ger_patron_4: "Тактика волчьей стаи"
 AXIS_ger_patron_4_desc: "Наш флот должен действовать как волчья стая, атакуя выгодные цели."
 AXIS_ger_patron_2: "Расширение воздушно-десантных войск"
 AXIS_ger_patron_2_desc: "Воздушно-десантные войска – передовой край новой военной тактики. Нам следует вложиться в расширение наших ВДВ, чтобы получить решающее преимущество."
 AXIS_ger_patron_2_tt: "Число парашютно-десантных дивизий, которые мы можем набрать, увеличится на §C1§!."
 AXIS_ger_patron: "Немецкий фанатизм"
 AXIS_ger_patron_desc: "Немецкий народ был очарован и увлечён национал-социалистами под руководством Гитлера. Используя схожие методы, мы сможем воссоздать ту же идеологическую фанатичность в нашей стране."
 AXIS_jap_patron: "Статизм периода Сёва"
 AXIS_jap_patron_desc: "Японцы почитают своего императора как живого бога, что обеспечивает стабильное и однородное общество."
 AXIS_jap_patron_4: "Решающая битва"
 AXIS_jap_patron_4_desc: "Наше военно-морское производство и флот слишком малы для ведения множества сражений. Наилучший курс действий – одержать одну решающую победу в бою с противником."
 AXIS_jap_patron_3: "Японские верфные эксперты"
 AXIS_jap_patron_3_desc: "Для строительства великого флота нам потребуется возводить доки. Японцы, похоже, являются хорошим примером в этом деле."
 AXIS_jap_patron_2: "Японская подготовка коммандос"
 AXIS_jap_patron_2_desc: "Японские силы специального назначения славятся своей стойкостью. К счастью, у нас есть японский военный атташе."
 AXIS_jap_patron_1: "Снабжение за счёт противника"
 AXIS_jap_patron_1_desc: "Японские подразделения часто углубляются далеко в тыл врага, лишаясь нормального снабжения, но они продолжают сражаться, обходясь тем, что есть. Если мы научимся добывать припасы на вражеской территории, наша армия сможет воевать дольше и на большую глубину, чем считалось возможным ранее."
 AXIS_pact_of_steel: "Стальной пакт"
 AXIS_pact_of_steel_desc: "Под руководством Германии мы приведём нашу страну к новым высотам."
 AXIS_joint_training_program: "Совместные учения с Германией"
 AXIS_joint_training_program_desc: "Проведение совместных военных учений с Германией повысит нашу боеготовность."

