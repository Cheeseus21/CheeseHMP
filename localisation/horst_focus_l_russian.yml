 wtt_news.44.t: "Пуи провозглашает Небесный мандат"
 wtt_news.44.desc: "Облачившись в богато украшенные одеяния, подобающие императору Китая, Айсиньгёро Пуи, Сын Неба, Владыка Десяти Тысяч Лет, Император Великой династии Цин, взошёл на Драконий трон в необычной второй коронации и теперь resides в Запретном городе, как и его предки. Он вернул себе прежнее тронное имя и вновь провозглашён императором Сюаньтун. Ссылаясь на древние обычаи, император Сюаньтун утверждает, что победа его сил в гражданской войне в Китае доказывает, что он имеет Небесный мандат на руководство Китаем.\n\nБудет ли он стремиться распространить свою власть до «Всего под небом», как утверждали предыдущие императоры, пока неясно."
 wtt_news.44.a: "Сын неба вернулся."
 wtt_news.44.b: "Порядок восстановлен."
 wtt_news.44.c: "Кем он себя возомнил?"
 
