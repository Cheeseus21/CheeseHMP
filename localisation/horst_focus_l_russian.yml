 JAP_claim_the_kyokuto: "Заявить права на Кёкуто"
 JAP_claim_the_kyokuto_TRIG1: "§HМы§! или наши §Hмарионетки§! контролируем все штаты от §HTannu Tuva§!, §HБратск§! и §HКиренск§! на Восток."
 JAP_claim_the_kyokuto_EXPL1: "Получить все бывшие территории [SOV.GetFlag]§H[SOV.GetName]§! во Внешней Маньчжурии."
 JAP_claim_the_kyokuto_EXPL2: "Получить все бывшие территории [SOV.GetFlag]§H[SOV.GetName]§! в Монголии и Танну-Туве."
