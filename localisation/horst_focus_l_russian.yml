 ENG_compass: "Операция «Компас»"
 ENG_operation_compass: "Операция «Компас»"
 #ENG_operation_compass_desc: "Эта операция провалится, как только мы потеряем контроль над Гизой"
 ENG_compass_desc: "Это наша первая крупная операция против стран Оси в Африке. Нам нужна стратегическая мобильность в пустынях, чтобы окружать и уничтожать наших противников."
 SOV_great_purge_NEW_desc: "В офицерской среде зреет опасный троцкистский заговор, в нем замешан ряд высших армейских чинов. Неизвестно, имеет ли сам Троцкий к этому отношение, но угроза слишком велика. СССР может быть ввергнут в новую гражданскую войну... если мы не проявим решительность и безжалостность."
 EFR_torch_declared: "Объявлена операция «Факел»"
 BUL_war_games_desc: "Мы проведём секретные военные игры, чтобы подготовить нашу армию к будущим конфликтам."
