 SOV_church_masses: "Мессы за Союз"
 SOV_church_masses_desc: "Священники нашего Союза теперь наряду со своей религиозной чепухой проповедуют антифашистскую борьбу, побуждая крестьянство и рабочий класс стойко переносить жертвы, необходимые для победы в нашей патриотической борьбе."
 SOV_priests_integrated: "Интеграция священников в армейские операции"
 SOV_priests_integrated_desc: "Мы будем в полной мере использовать Русскую православную церковь для поддержки боевых операций, повышая моральный дух солдат."
 SOV_plowshares: "Перековать мечи на орала"
 HMP_oppose_mills_tt: "§CПятьдесят оружейных заводов будут добавлены в Сибири§!"
 fp_attache_idea: "Военный атташе направлен"
 fp_attache: "Направить военного атташе"
 HMP_neutral_mills_tt: "§CМы расширим нашу военную промышленность§!"
 SOV_stalinsmills: "Арсенал социализма"
 SOV_neutralmills: "Расширение военной промышленности"
 SOV_oppose_the_church: "Союз, Сталин и социализм"
 no_depression_tt: "Мы полностью оправились от разрушений §OВеликой депрессии§!"
 GER_army_innovation_3: "Армейские инновации III"
 GER_speers_miracle: "Чудо вооружений Шпеера"
 GER_speers_miracle_desc: "Альберт Шпеер сделал смелое заявление, что может массово увеличить производство вооружений, реорганизовав нашу военную промышленность и рабочую силу. Следует предоставить ему эту возможность, поскольку нам нужно наращивать производство вооружений для борьбы с силами Союзников и СССР."
 GER_army_innovation_3_desc: "Кампании во Франции и Польше показали нам важность вариантов танков, а также необходимость в различных типах танковых моделей."
 GER_jag_tt: "§CМы получим временные бонусы к восстановлению армии и скорости пополнения. Мы также изменим наш экономический закон на §YТотальную мобилизацию§!§!\n\n40 гражданских заводов будут немедленно переоборудованы в 40 военных заводов.\n\n§RKurzester Krieg будет удалён, если наша поддержка войны упадёт ниже 50%!§!\n\n§RМы будем терять 2,0% поддержки войны ежемесячно§!\"§!\n\n"
 ITA_sword_tt: "\nМы получим бонус к §CСтабильности§! и §CПоддержке войны§! в зависимости от контроля над арабскими/мусульманскими государствами в Северной Африке и на Ближнем Востоке."
 ITA_Skillful_Workers_tt: "В дополнение к бонусам к §CСтабильности§! и §CПоддержке войны§! от контроля над арабскими/мусульманскими государствами в Северной Африке и на Ближнем Востоке, мы получим бонус к §CВыпуску заводов§! и §CВыпуску верфей§!, равный половине стабильности/поддержки войны, полученной от контроля над Северной Африкой и Ближневосточными государствами.§!\n\n§YМаксимально возможное значение составляет 14,5% стабильности и 7,75% выпуска заводов/верфей§!"
 SOV_oppose_the_church_desc: "Социализм сегодня, социализм завтра, социализм навсегда!"
 SOV_barb3_idea: "Великая Отечественная война"
 SOV_brest: "Уроки Брестской крепости"
 HOL_knil2: "Призывники KNIL"
 HOL_curacao_desc: "Нам стоит развить Кюрасао на западе. Это прекрасное место для отдыха, и там много нефти, а также забавные разноцветные домики!"
 HOL_invest_desc: "Нам также следует обратить внимание на наши западные владения. Они невелики по размеру, но довольно богаты ресурсами. Ресурсы нам всегда пригодятся. Это также увеличит нашу заморскую торговлю, что всегда хорошо — наш флот будет процветать!"
 HOL_suriname_desc: "Суринам довольно населён и обладает немалыми ресурсами. Дальнейшее его развитие — совсем неплохой выбор."
 HOL_knil2_desc: "Метрополия пала, только наши колонии могут помочь нам в борьбе. Если нам удастся сплотить туземцев под нашим знаменем, мы сможем собрать армию, равную по численности китайской!"
 stalin_barb_leader_trait2: "Генералиссимус Советского Союза"
 mrp_was_done: "Мы подписали пакт Молотова-Риббентропа"
 SOV_at: "Модернизированная противотанковая война"
 SOV_at_desc: "Количество и качество немецких танковых дивизий требует от нас срочной модернизации нашего противотанкового вооружения."
 SOV_order270_desc: "Окружённые части и соединения обязаны самоотверженно сражаться до последнего, беречь матчасть как зеницу ока, пробиваться из тыла вражеских войск, нанося поражение фашистским псам.\n\nПредседатель Государственного Комитета Обороны - И. СТАЛИН"
 SOV_man_of_steel: "Человек из стали"
 SOV_man_of_steel_desc: "Генералиссимус Сталин руководил каждым шагом... принимал каждое решение... Он величайший и мудрейший военный гений из когда-либо живших... -Георгий Жуков"
 SOV_invade_Japan: "Операция «Августовский шторм»"
 SOV_invade_Japan_desc: "Пограничный конфликт с Японией продолжается уже довольно долго. Если мы не можем добиться от японского правительства соблюдения установленных границ, нам придется сместить это правительство."
 SOV_china_prc: "Поддержать Китайскую Народную Республику"
 SOV_china_prc_desc: "Мы будем добиваться освобождения и объединения Китая под социалистическим правительством."
 SOV_wtf: "Сталин на грани нервного срыва"
 SOV_wtf_desc: "Внезапное вторжение фашистов на короткое время парализовало товарища Сталина."
 SOV_barb1: "Вернуть Сталина с дачи"
 SOV_barb1_desc: "Вся наша командная структура парализована без приказов товарища Сталина. Нам нужно, чтобы он вернулся в своё обычное состояние, чтобы мы могли бороться с вторжением!"
 rasputitsa: "Распутица"
 rasputitsa_tt: "Сила советского сезона распутицы обрушится на все армии, сражающиеся в Советском Союзе! В течение всех §Yмарта и апреля§! И всех §Yоктября и ноября§! на каждую дивизию будут действовать следующие модификаторы: §R-20% скорости дивизии§!, §R-20% скорости бронетанковой дивизии (всего 40%)§!, §R10% потерь от износа§! и §R-30% к скорости восстановления§!.\n\nЭто стихийное явление будет происходить дважды в год до середины 1945 года."
 GER_zwangsarbeit: "Обязательная трудовая повинность"
 GER_zwangsarbeit_desc: ""
 GER_zwangsarbeit_idea: "Принудительный труд"
 GER_winter_equipment: "Подготовить снаряжение к зиме"
 GER_winter_equipment_desc: "Если мы собираемся воевать зимой, мы должны подготовить наше снаряжение к зиме — и быстро."
 GER_blau_desc: "Мы должны победить, и быстро -Йозеф Геббельс"
 GER_barbarossa_others_text: "§C\nНаши союзники также получат выгоду от планов наступления.§!"
 GER_blau_text: "§R\nНаши планы наступления истекают после 23 ноября 1942 года!§!"
 GER_jag_desc: "Германия находится в осаде со стороны международного большевистского заговора против неё. Объединённая экономика Союзников и СССР чудовищна, но её можно преодолеть с помощью полной мобилизации немецкого народа в тотальной войне. Войне настолько тотальной, что она будет радикальнее всего, что кто-либо мог себе представить."
 GER_totaler_krieg_tt: "§RМы начнём терять -3,5% поддержки войны каждый месяц!§!\n\n"
 GER_jet_focus: "Проект Мессершмитта"
 GER_jet_focus_desc: "Мессершмитт работал над типом самолёта, движимого реактивным двигателем. Этот самолёт, Me 262, поможет нам выиграть воздушную войну."
 GER_uralabomber: "Уральский бомбардировщик"
 GER_uralabomber_desc: "Советская промышленность была перемещена в Сибирь, что вывело её из зоны досягаемости наших бомбардировщиков. Нам нужно разработать более крупные и дальние бомбардировщики, чтобы достичь этих заводов."
 amerika_bomber: "Программа «Америкабомбер»"
 amerika_bomber_desc: "Если мы сможем вынудить США сосредоточить свою зенитную артиллерию и истребители на защите родины, то у нас будут развязаны руки для беспорядочных бомбардировок Британии!"
 uk_africa_focus: "Развитие Судана"
 uk_africa_focus_desc: "Нам следует развивать дорожную сеть и военно-морские базы в районе Судана на случай, если Средиземное море станет непроходимым для наших конвоев, и нам придётся прокладывать снабжение через него."
 uk_levant_focus: "Оборона Леванта"
 uk_levant_focus_desc: "Восточное Средиземноморье можно защитить только сетью авиабаз вдоль его побережья. Если мы потеряем контроль над Восточным Средиземноморьем, мы наверняка потеряем контроль над Египтом."
 uk_sumeria_focus: "Ближневосточные базы"
 uk_sumeria_focus_desc: "Развитие военной инфраструктуры на Ближнем Востоке является ключом к снабжению наших войск в Леванте, если мы потеряем контроль над Восточным Средиземноморьем."
 uk_africa_last_defense: "Подготовить оборону в Судане"
 uk_africa_last_defense_desc: "Суэц потерян! Мы должны удержать Ось от продвижения в остальную Африку!"
 

 
 
 CHI_french_drillx: "Итальянская муштра"
 CHI_french_drillx_desc: "Опыт итальянской армии в Великой войне создал армию, превосходную в обороне. Переняв их методы обучения и стандарты, мы сможем улучшить наши собственные оборонительные возможности."
 CHI_reach_out_to_francex: "Обратиться к Италии"
 CHI_reach_out_to_francex_desc: "Хотя итальянцы неоднократно унижали нас и навязывали нам новые уступки, в текущей ситуации их помощь может нам понадобиться."
 GER_mech_3_focus: "Sd.Kfz. 251"
 GER_mech_3_focus_desc: "Если мы установим инфракрасные прожекторы на наши «Ханомаги», мы сможем более эффективно сражаться ночью, улучшая ситуационную осведомлённость в бою."
 
 eth_give_tanks: "Италия передаст нам §Y1.20K§! §Y«Улучшенных лёгких танков»§!"
 eth_research_tanks: "Мы изучим технологию вплоть до §Y«Лёгких танков 1936 года»§!"

