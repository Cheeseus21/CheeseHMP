 buy_more_time: "Купить время"
 USA_continue_the_new_deal1: "Продолжение «Нового курса»"
 USA_continue_the_new_deal1_desc: "Политика Нового курса доказала свою эффективность. Мы не должны сбиться с пути."
 USA_the_new_american_generations: "Тихое поколение"
 USA_the_new_american_generations_desc: "Поколение людей, родившихся примерно с 1928 по 1945 год, следующее за величайшим поколением и предшествующее беби-бумерам. Они были лидерами движения за гражданские права."
 USA_landon_deal: "Новый курс Лэндона"
 USA_landon_deal_desc: "§RАльфред Моссман Лэндон (9 сентября 1887 – 12 октября 1987)§! — американский нефтепромышленник и политик, занимавший пост 26-го губернатора Канзаса с 1933 по 1937 год. Член Республиканской партии, он был её кандидатом на президентских выборах 1936 года и потерпел сокрушительное поражение от действующего президента Франклина Д. Рузвельта. — §RРекомендовано Ganked§!"
 USA_reaffirm_the_gold_standart: "Подтверждение золотого стандарта"
 USA_reaffirm_the_gold_standart_desc: "Нам необходимо подтвердить золотой стандарт, чтобы сдерживать инфляцию и не допустить перегрузки системы иностранными правительствами, выкупающими свои доллары за золото."
 USA_cash_and_carry: "Плати и вези"
 USA_cash_and_carry_desc: "§RПлати и вези§! — политика, объявленная президентом США Франклином Делано Рузвельтом на совместном заседании Конгресса США 21 сентября 1939 года после начала войны в Европе. Она заменила Закон о нейтралитете 1937 года."
 USA_national_defence_research_committee: "Национальный комитет оборонных исследований"
 USA_national_defence_research_committee_desc: "§RНациональный комитет оборонных исследований (NDRC)§! — комитет при Совете национальной обороны США, созданный для координации, надзора и проведения исследований по проблемам, лежащим в основе разработки, производства и использования механизмов и устройств вооружённой борьбы. Существовал с 27 июня 1940 года по 28 июня 1941 года."
 USA_urban_electrification_act: "Закон об электрификации городов"
 USA_urban_electrification_act_desc: "§RЗакон об электрификации городов 1936 года§!, принятый 20 мая 1936 года, предусматривал федеральные займы на установку систем распределения электроэнергии для обслуживания городских районов Соединённых Штатов."
 USA_extraction_of_rare_metals: "Добыча редких металлов"
 USA_extraction_of_rare_metals_desc: "Добыча редких металлов поможет нам производить новое оружие, корабли, танки, стимулировать экономику, а также развивать науку."
 USA_farm_secutity_administartion: "Управление по безопасности фермерских хозяйств"
 USA_farm_secutity_administartion_desc: "§RУправление по безопасности фермерских хозяйств (FSA)§! — агентство «Нового курса», созданное в 1937 году для борьбы с сельской бедностью во время Великой депрессии в США. Оно пришло на смену Администрации по переселению (1935–1937)."
 USA_support_local_businnes: "Поддержка местного бизнеса"
 USA_support_local_businnes_desc: "Как показывает опыт развитых стран, малые и средние предприятия играют очень важную роль в экономике: их развитие влияет на экономический рост, ускорение научно-технического прогресса, насыщение рынка товарами требуемого качества и создание дополнительных рабочих мест."
 USA_naval_act_of_1938: "Закон о флоте 1938 года"
 USA_naval_act_of_1938_desc: "§RЗакон о флоте 1938 года§! — закон, устанавливающий состав Военно-морских сил США, разрешающий строительство определённых военных кораблей и другие цели."
 USA_keynesian_economist: "Кейнсианская экономика"
 USA_keynesian_economist_desc: "Во время Великой депрессии 1930-х годов существовавшая экономическая теория не смогла ни объяснить причины тяжёлого мирового экономического коллапса, ни предложить адекватное решение государственной политики для возобновления производства и занятости."
 USA_cut_the_taxes: "Снизить налоги"
 USA_cut_the_taxes_desc: "Президент попытается добиться от Конгресса введения 100-процентного налога на доходы свыше 25 000 долларов."
 focus_on_europe: "Акцент на Европе"
 focus_on_europe_desc: "Сосредоточившись на Европе, мы сможем собрать там большую часть наших наземных войск и флота для проведения операций против Италии и Германии."
 USA_improve_our_building_plans: "Закон о восстановлении национальной промышленности"
 USA_improve_our_building_plans_desc: "§RЗакон о восстановлении национальной промышленности§! — закон, формально направленный на стимулирование экономического подъёма во время Великой депрессии, позволял президенту Франклину Рузвельту регулировать как заработную плату, так и цены на промышленные товары."
