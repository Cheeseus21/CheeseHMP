 SOV_shattered_retreat_desc: "Первые немецкие атаки полностью уничтожили нашу армию! Нам нужно отступить и перегруппироваться!"
 SOV_regroup: "Перегруппировка линий"
 SOV_regroup_desc: "Мы пережили худшее, теперь мы должны перегруппировать нашу армию и начать контратаку!"
 SOV_directive_three: "Директива №3"
 SOV_directive_three_desc: "Товарищ Сталин приказывает немедленно начать контратаку! Мы должны отбросить врага и выиграть драгоценное время и пространство!"
 SOV_operational_space: "Оперативное пространство"
 SOV_operational_space_desc: "Можем ли мы назвать эту контратаку успешной или нет... Мы все же смогли получить достаточно пространства для проведения нескольких маневров вдоль линии фронта!"
 SOV_stockpile_for_the_next_attack: "Накопление для весеннего наступления"
 SOV_stockpile_for_the_next_attack_desc: "Мы будем накапливать все, что сможем, в течение этого зимнего периода и готовиться к следующей кампании!"
 SOV_winter_offensive: "Зимнее наступление"
 SOV_winter_offensive_desc: "Немцы никогда раньше не видели снега! Мы можем разбить их прямо сейчас!"
 SOV_operational_space_tt: "Если контрнаступление увенчалось успехом, вы получаете следующее на 120 дней: \n\n£organization_texticon Организация дивизии: §G+%10.0§!\n£army_morale_texticon Скорость восстановления дивизии: §G+%10.0§! \n\nПоражение даст те же модификаторы, но с штрафом к ОЗ: \n\n£organization_texticon Организация дивизии: §G+%10.0§!\n£army_morale_texticon Скорость восстановления дивизии: §G+%10.0§!\n£strenght_texticon ОЗ: §R-%10.0§!"
 
