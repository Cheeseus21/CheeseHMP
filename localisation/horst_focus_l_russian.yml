 SIA_peaceful_pan_thaiism_category: "Мирный пан-таилизм"
 SIA_peaceful_pan_thaiism_category_desc: "Различные тайские народы, рассеянные между государствами Сиама, Лаоса и Камбоджи, были разделены после колониальных войн. Теперь, когда каждое из трёх государств обрело некоторую независимость, необходимо приложить большие усилия, чтобы убедить население в том, что объединение наших трёх наций необходимо для блага нашего народа.\n\nПопулярность пан-таилизма в Лаосе: §Y[?SIA.laos_pan_thai_popularity]%§!\n\nПопулярность пан-таилизма в Камбодже: §Y[?SIA.cambodia_pan_thai_popularity]%§!"
 SIA_hold_a_pan_thai_exposition: "Проведение пан-тайской выставки §G+7% для всех"
 SIA_glorify_thai_culture: "Прославление тайской культуры §G+5% для всех"
 SIA_support_pan_thaiists_in_laos: "Поддержка пан-таилистов в Лаосе §G+5%§! в Лаосе"
 SIA_support_pan_thaiists_in_cambodia: "Поддержка пан-таилистов в Камбодже §G+5%§! в Камбодже"
 SIA_treaty_of_vientiane: "Вьентьянский договор"
 hundred_percent_in_all_thai_nations: "§R100% популярности пан-таилизма в Лаосе и Камбодже§!"
 SIA_tooltip_treaty_of_vientiane: "§YВы аннексируете все три тайские нации и получите ядра на их землях§!"
 SIA_cruisers: "Модернизация крейсеров"
 SIA_battleship: "Ставка на линкоры"
 SIA_naval_guns: "Более крупные орудия"
 SIA_convoy_tactics: "Эскортная флотилия"




 SIA_thai_empire_lands: "Мы получим Французский Индокитай в обмен на помощь нашему японскому сэмпаю, и мы получим больше ядер! (Сингапур и Французский Индокитай)"
 SIA_disturbing_indochina_decision: "Дестабилизация Индокитая"
 SIA_disturbing_indochina_decision_desc: "Наши индокитайские товарищи продолжают страдать под игом французских колонизаторов. Они нуждаются в нашей помощи, и мы готовы её оказать! Как только они будут достаточно подготовлены, мы сможем начать финальное восстание, которое освободит Индокитай от империалистического контроля!\n\nАгитация во Вьетнаме: §Y[?SIA.vietnam_agitation]%§!\n\nАгитация в Лаосе: §Y[?SIA.laos_agitation]%§!\n\nАгитация в Камбодже: §Y[?SIA.cambodia_agitation]%§!"
 SIA_smuggle_weapons_in_vietnam: "Контрабанда оружия во Вьетнам:\n§R+10% к агитации во Вьетнаме§!"
 SIA_smuggle_weapons_in_laos: "Контрабанда оружия в Лаос:\n§R+10% к агитации в Лаосе§!"
 SIA_smuggle_weapons_in_cambodia: "Контрабанда оружия в Камбоджу:\n§R+10% к агитации в Камбодже§!"
 SIA_launch_the_insurrection: "Начать восстание!"
 SIA_sabotage_campaign: "Диверсионная кампания:\n§R+8% к агитации повсюду§!"
 SIA_ask_for_soviet_help: "Просить советской помощи:\n§RЗависит от их ответа§!"
 SIA_invade_indochina: "Вторгнуться в Индокитай:\n§RВойна с Францией!§!"


 SIA_join_the_allies: "Примкнуть к Союзникам"
 SIA_join_the_allies_desc: "Британия — одна из доминирующих держав мира, и в прошлом между нашими странами было много войн, в основном за бирманские территории. Но сейчас, когда появляются новые угрозы, такие как Японская империя, было бы в наших интересах искать военный союз с ними, по крайней мере до тех пор, пока такие опасности, как фашизм, не будут преодолены."
 SIA_woo_australia: "Привлечение Австралии"
 SIA_woo_australia_desc: "Австралия, недавно получив независимость от Соединённого Королевства, основала собственный военный союз, ориентированный в основном на Тихий океан, чтобы сдерживать японскую угрозу. Подписание союзного договора с ними может обеспечить нашу безопасность."
 SIA_treaty_with_japan: "Договор с Японией"
 SIA_treaty_with_japan_desc: "В Японии установилось новое правительство, демократическое и выступающее против экспансионизма. Теперь, когда они больше не представляют угрозы, нам следует подписать союзный договор с ними, чтобы защищать друг друга от новых возможных угроз."
 SIA_alliance_with_china: "Союз с Китаем"
 SIA_alliance_with_china_desc: "Китайское правительство, недавно разгромив Японскую империю, решило создать собственный союз, ориентированный в основном на Азию. Было бы в наших интересах объединить усилия с этой восходящей державой."
 SIA_ally_with_the_united_states: "Союз с Соединёнными Штатами"
 SIA_ally_with_the_united_states_desc: "Соединённые Штаты являются главным защитником идеалов свободы и демократии, и они решили создать собственный политический союз. Они лучше всех могут противостоять японскому империализму, поэтому было бы разумно договориться о вступлении в их союз."
 SIA_help_france: "Помощь Франции"
 SIA_help_france_desc: "Верно, что Франция была одним из главных расчленителей наших земель во время колонизации Индокитая. Но сегодня на горизонте гораздо более серьёзные опасности. Мы уладим наши территориальные разногласия позже, сейчас настало время защищать сами наши нации."


 SIA_join_the_axis: "Вступить в Ось"
 SIA_join_the_axis_desc: "Германия перевооружилась и, похоже, готова сразиться с бывшими державами Антанты. Наши цели общие, поэтому было бы в наших интересах объединить с ними силы"
 SIA_treaty_with_italy: "Договор с Италией"
 SIA_treaty_with_italy_desc: "Италия, страна происхождения фашизма, является образцом, на котором мы строим наше новое государство. Она решила сформировать собственный военный союз, и было бы интересно попытаться в него интегрироваться."
 SIA_alliance_with_japan: "Союз с Японией"
 SIA_alliance_with_japan_desc: "Япония является главной державой в Азии и, похоже, полна решимости противостоять западным империалистам. Наши цели одинаковы, мы должны объединить с ними силы"

 SIA_alliance_with_japan_monarchist: "Искать японской защиты"
 SIA_alliance_with_japan_monarchist_desc: "Японская империя продолжает распространять своё влияние по всей Азии, противостоя западным державам. Если мы не хотим оказаться под их игом, лучше подписать союзный договор"
 SIA_alliance_with_britain_monarchist: "Союз с Соединённым Королевством"
 SIA_alliance_with_britain_monarchist_desc: "Совершенно ясно, что Японская империя хочет только доминирования в Азии и намерена однажды напасть на нашу страну. Единственный способ избежать этого — заключить союз с Соединённым Королевством и надеяться, что мы сможем её победить."

 SIA_join_the_communist_faction: "Вступить в [FROM.getFactionName]"
 SIA_join_the_communist_faction_desc: "[FROM.getNameDefCap] считается одной из главных коммунистических держав мира. Если мы хотим, чтобы революция победила, мы должны быть едины"

 SIA_reintegrate_cambodia: "Реинтеграция Камбоджи"
 SIA_reintegrate_cambodia_desc: "На протяжении нескольких столетий регион Камбоджи находился под нашим контролем, и у наших народов общие корни. Теперь, когда этот регион снова в нашем владении, пришло время реорганизовать их администрацию, чтобы сделать её провинцией нашей страны"
 SIA_reintegrate_laos: "Реинтеграция Лаоса"
 SIA_reintegrate_laos_desc: "Лаос теперь снова под нашим контролем. Лаосцы имеют те же тайские корни, что и наш народ, и пришло время полностью интегрировать их в нашу нацию"

 # Events
 siam.1.t: "Речь в Нонтхабури"
 siam.1.d: "Приди Баномйонг, представитель гражданского крыла Кхана Ратсадон, известный своими радикальными, порой близкими к марксизму идеями земельных реформ, сегодня выступил с речью в городе Нонтхабури.\n\"Дорогой народ Сиама, наша славная революция, благодаря которой мы перешли от упадочной и устаревшей политической системы к системе, где народ наконец обрёл голос, похоже, сегодня проходит испытание. Я сам заметил, что внутри той же партии, из которой вышел я, некоторые элементы хотят установить собственную форму тирании, лишь заменив короля и знать генералами и солдатами. Но я верю в сиамский народ, который никогда не позволит этому случиться. Мы уже однажды победили тиранию и победим её снова\".\nМногие считают, что эта речь была посвящена Пхрая Пхахонпхонпхаюхасене, ставшему премьер-министром после переворота против прежнего премьер-министра Пхрая Манопакорна Нититады, с которым Приди был близок, но которого обвиняли в коммунизме из-за его планов реформ. Никто не знает, повлияет ли эта речь на ситуацию, но нам придётся следить за Приди."
 siam.1.a: "Какой ущерб может причинить простой учитель?"


 siam.2.t: "Radio Seriphaph"
 siam.2.d: "Похоже, что «Свободные тайцы» взяли под контроль радиостанцию на севере страны, где у них наибольшее влияние. Они используют её для трансляции собственного радио «Radio Seriphaph», что означает «Радио Свободы», с яростными нападками на режим, а также с призывом присоединиться к ним всякий раз. Некоторые их передачи также связаны с дебатами о том, как следует реорганизовать Сиам после поражения правительства, где существует явный раскол между либералами и коммунистами, которые, по-видимому, равны по численности среди повстанцев."
 siam.2.a: "Мы должны закрыть её!"

 siam.3.t: "Приглашение Хо Ши Мина"
 siam.3.d: "С начала процесса разработки новой конституции Сиама некоторые члены временного правительства выразили своё восхищение личностью Хо Ши Мина, известного вьетнамского революционера, чью борьбу за независимость Вьетнама много раз сравнивали с борьбой против Кхана Ратсадон. Многие выразили желание получать советы от того, кого считают величайшим и мудрейшим индокитайским революционером.\nОднако более умеренные члены выразили недоверие, ссылаясь на связь Хо с коммунизмом и опасаясь, что его визит приведёт к тому, что большая часть правительства и населения захочет принять революцию по образцу той, что..."
 siam.3.a: "Добро пожаловать, дядюшка Хо!"
 siam.3.b: "Его присутствие — слишком большой риск"

 siam.4.t: "Красный марш"
 siam.4.d: "Казалось, простого перехода к парламентской системе было недостаточно. Хотя это должен был быть обычный понедельник, Коммунистическая партия Сиама призвала к грандиозному восстанию против капитализма, призывая жителей самим захватывать средства производства. Приди Фонмайонг, ставший главным идеологом Коммунистической партии, обратился к толпе с речью, заявив, что Сиам теперь принадлежит рабочим.\nСени Прамой, видя масштаб протестов, но отказываясь следовать коммунистической системе, был вынужден уйти в отставку и, как говорят, улетел с семьёй в США. Фонмайонг, сказал Коммунистическая партия Сиама единый пар..."
 siam.4.a: "Да здравствует революция!"

 siam.5.t: "Провозглашение Республики"
 siam.5.d: "Дирек Джаянама, глава временного правительства, сегодня обратился к толпе в Бангкоке, собравшейся, чтобы услышать его первую речь в качестве главы правительства.\n\\"Народ Сиама, кровь многих ваших братьев должна была пролиться, чтобы остальные могли жить в мире и свободе. Именно за свободу они сражались и жертвовали собой, и именно эти ценности мы будем чтить. Народ Сиама, свобода восторжествовала над тьмой тирании, и я горд объявить, что мы построим республику, основанную на наших ценностях, за которые мы доказали свою храбрость\\"."
 siam.5.a: "Да здравствует республика!"

 siam.6.t: "Рейд на склад оружия!"
 siam.6.d: "Ночью один из наших главных складов оружия, расположенный недалеко от Бангкока, был атакован повстанцами, идентифицированными как «Свободные тайцы». Похоже, большинство охранников были незаметно убиты, поскольку тревога так и не была поднята, что также предполагает наличие сообщника среди охраны. Склад был полностью опустошён, забрав винтовки и боеприпасы."
 siam.6.a: "Это не сулит ничего хорошего..."

 siam.7.t: "Письмо от Приди"
 siam.7.d: "Один из армейских генералов отправился к премьер-министру Пхоту Пахоньонтхину, чтобы сообщить о своих опасениях по поводу возможного проникновения в армию антиправительственных революционеров. Он утверждает, что нашёл в одном из общежитий послание, написанное Приди Баномйонгом. Это послание призывало солдат мирно выступать против правительства, заявляя об отказе подчиняться тому, что они называют «адаптацией фашизма».\nГенерал предложил использовать это письмо как повод для ареста Приди Баномйонга за подстрекательство к беспорядкам и попытаться предотвратить распространение идей мятежа."
 siam.7.a: "Мы покажем ему, что мы делаем с лжереволюционерами"

 siam.8.t: "Инцидент в Сакхрае"
 siam.8.d: "Прошлой ночью полицейский участок в деревне в северо-восточном районе Сакхрай был атакован бандой из десяти вооружённых мужчин. Двое присутствовавших полицейских, по-видимому, исчезли — убиты или похищены, а нападавшие покинули место через несколько минут, по словам свидетеля, которому удалось остаться незамеченным. Он говорит, что слышал, как один из мужчин жаловался на отсутствие официальной радиостанции.\nНовость об этой атаке вызвала множество реакций в правительстве; некоторые считают, что нападавшие могли вдохновиться призывом Приди Баномйонга к сопротивлению, которого власти всё ещё ищут, но который остаётся неучтённым. Ходят слухи, что формируется обширная сеть сопротивления..."
 siam.8.a: "Будем надеяться, это лишь единичный случай"

 siam.9.t: "Свободные тайцы"
 siam.9.d: "День должен был пройти как любой другой, но по военному радио прозвучало особое сообщение:\n\"Мы — движение «Свободные тайцы». Солдаты Кхана Ратсадон — предатели, использовавшие революцию, чтобы вместо тирании короля установить собственную тиранию. Мы хотим принести нашей нации справедливость и демократию и не остановимся ни перед чем, чтобы наконец дать сиамскому народу свободу. Если вы союзник правительства, вы наш враг. Если вы против него, вы наш союзник. Мы не хотим причинять вред невинным людям, но хотим не дать нашей прекрасной стране попасть в ловушку фашизма. Мы видели, что произошло в Италии, Германии и Венгрии. Там царят террор, ненависть, фанатизм и отчаяние. Мы хотим избежать такой судьбы для нашей прекрасной страны и построить новое правительство, которое будет действовать ради нужд народа, ведь мы и есть народ\".\nГолос принадлежал не кому иному, как Диреку Джаянаме, ещё одному бывшему члену гражданского крыла Кхана Ратсадон, ставшему одним из главных критиков охоты на Приди Баномйонга. Похоже, он решил присоединиться к нему в попытке свергнуть правительство через крупномасштабное восстание. Мы пока не знаем их численности, и, судя по всему, они скрываются главным образом на северо-востоке страны, что затрудняет их обнаружение."
 siam.9.a: "Тогда мы объявим им войну!"

 siam.10.t: "Восстание Дибабхи"
 siam.10.d: "То, что должно было быть простым восстанием, превратилось в настоящий мятеж. Заявив, что он нашёл письмо премьер-министра к нескольким членам Кхана Ратсадон, указывающее на его намерения отменить монархию в ближайшие месяцы, принц Адитья Дибабха, бывший регентом при Раме VIII, обратился с великим призывом к восстанию «ко всем, кто всё ещё верен королю». Многие думали, что оно будет подавлено так же, как восстание принца Боварадета в 1933 году, провалившееся из-за отказа бангкокских гарнизонов присоединиться к нему.\nНо на этот раз всё было иначе. Гарнизон немедленно покинул город, чтобы присоединиться к повстанцам, которые смогли взять под контроль Бангкок за несколько часов.\nН"
 siam.10.a: "Коррумпированное правительство повержено!"
 SIA_provisional_monarchist_governement_party: "Временное монархическое правительство"
 SIA_provisional_monarchist_governement_party_long: "Временное монархическое правительство"

 siam.11.t: "Битва за Бангкок"
 siam.11.d: "Началась последняя битва против режима. После «Декларации о восстании», обнародованной самим Приди Баномйонгом для всех Свободных тайцев по радио Серифап, подавляющее большинство повстанцев сошлись на Бангкок, надеясь взять под контроль правительственные учреждения. Две трети ополченцев атаковали город с севера, остальные — с востока, а небольшая группа, по-видимому, попыталась атаковать из портов на лодках, полученных в результате мятежа на флоте. Тем временем верная правительству армия под командованием Плэка Пибунсонгкрама развернулась в городе, где до особого распоряжения был введён комендантский час, и авиация готовится взлететь для обеспечения разведывательной поддержки."
 siam.11.a: "Покончим с этим!"

 siam.12.t: "Возвращение Рамы VII"
 siam.12.d: "Рама VII, всё ещё находившийся в изгнании в Европе, согласился вернуться в Сиам и вернуть себе трон. Когда он прибыл в аэропорт Бангкока, его ждала огромная толпа, скандирующая лозунги во славу короля и монархии. Принц Адитья Дибабха, глава временного правительства, также присутствовал и сопровождал Раму VII до церемонии коронации несколько часов спустя.\nТаким образом, Рама VII снова стал королём Сиама и объявил о своём намерении вновь ввести реформы, которые он проводил до переворота 1932 года, в частности Верховный совет, и о своём намерении осуществить большую децентрализацию управления."
 siam.12.a: "Да здравствует Рама VII!"
 SIA_monarchy_party: "Династия Чакри"
 SIA_monarchy_party_long: "Династия Чакри"

 siam.13.t: "Вопрос о монархии"
 siam.13.d: "Официально Сиам является конституционной монархией с момента государственного переворота 1932 года, и король продолжает иметь некоторую власть над правительством. Но после отречения Прачадипока, также известного как Рама VII, из-за разногласий с военными, ставшими главной политической силой, Сиам остался без короля. Его преемник, Ананда Махидол или Рама VIII, всего лишь ребёнок, обучающийся в Швейцарии, и его регенты имеют лишь очень ограниченное влияние. Однако некоторые члены правительства опасаются, что в долгосрочной перспективе новый король может снова вставлять палки в колёса военным, и поэтому предложили упразднить монархию. Но упразднение такого института, как..."
 siam.13.a: "Ради блага страны её нужно сохранить"
 siam.13.b: "Она нам больше не нужна"

 siam.14.t: "Конституционное восстановление Рамы VII"
 siam.14.d: "После всенародного референдума, на котором более половины населения решило восстановить короля Раму VII на троне, он прибыл в аэропорт Бангкока два дня спустя, встреченный премьер-министром Сени Прамоем. Несколько часов спустя состоялась церемония его коронации, присягнув уважать ограничения, налагаемые новой сиамской конституцией."
 siam.14.a: "Да здравствует король! Да здравствует конституция!"

 siam.15.t: "Победа повстанцев!"
 siam.15.d: "Битва за Бангкок бушевала днями напролёт, пушки и винтовки не умолкали, солдаты и повстанцы сражались от квартала к кварталу. После захвата здания Национальной ассамблеи последние правительственные силы согласились сложить оружие. По словам некоторых солдат, Плэк Пибунсонгкрам, командовавший антиреволюционными войсками, предпочёл покончить с собой, чем наблюдать поражение своих сил. Прайя Пахонпонпаюхасена, бывший премьер-министр, по-видимому, сумел сесть на корабль и бежать в Камбоджу. Приди Баномйонг, лидер революционеров, выступил по радио.\n\\"Дорогой народ Сиама, военная тирания теперь позади. Наро..."
 siam.15.a: "Ура революции!"

 siam.16.t: "Создание Социалистической Республики Сиам"
 siam.16.d: "Настало время официально провозгласить Сиам Республикой, следующей социалистической мысли. То, чего Ленин добился в России, мы добьёмся здесь, в Сиаме, мы построим новую нацию, свободную от оков капитализма."
 siam.16.a: "Красная звезда восходит над Сиамом"
 siam.18.t: "Плэк Пибунсонгкрам избран премьер-министром"
 siam.18.d: "Похоже, Прайя Пахонпонпаюхасена больше не в состоянии руководить страной. Его поразил скандал: якобы он продавал королевские товары офицерам по ценам, гораздо ниже обычных. Кроме того, его сторонники оказались в меньшинстве в Народной ассамблее после первых прямых выборов. Наконец, его кабинет не смог провести бюджетную реформу и рухнул. Были проведены новые выборы, и Плэк Пибунсонгкрам был избран для руководства страной."
 siam.18.a: "Человек с большими амбициями"

 siam.19.t: "Повстанцы занимают Исан"
 siam.19.d: "Повстанцы «Свободных тайцев» начали крупное наступление в Исане и сумели захватить важный город Накхонратчасима, крупнейший в регионе. Теперь, гранича с Лаосом, многие опасаются, что повстанцы попытаются установить связи с Патет Лао или даже с Вьетминем.\nПлэк Пибунсонгкрам, министр обороны, предложил использовать разведку для обнаружения их основных баз, а затем бомбить их с воздуха, чтобы подорвать их моральный дух, но такие действия на нашей собственной земле и против нашего народа могут иметь очень серьёзные последствия..."
 siam.19.a: "Сожгите эти леса! Убейте их до последнего!"
 siam.19.b: "Отступить на юг!"
 SIA_kill_pridi_tooltip: "Это откроет демократический путь"
 SIA_dont_kill_pridi_tooltip: "Это откроет коммунистический путь"
  
 siam.20.t: "Приди Баномйонг убит в результате авианалётов"
 siam.20.d: "Наш авианалёт на Исан смог повредить два учебных лагеря повстанцев, а также то, что выглядело как их штаб. Сегодня утром по радио Серифап Дирек Джаянама объявил, что Приди Баномйонг был убит в результате авианалётов, и что теперь его очередь «Завершить задачу, которую этот великий человек увидит, как мы выполняем с небес». Потеря лидера повстанцев, похоже, не уменьшила их моральный дух; более того, говорят, что многие фермеры решили присоединиться к ним после потери урожая из-за авианалётов, вызвавших множество пожаров."
 siam.20.a: "Мы отрубаем одну голову, а вырастают две!"

 siam.21.t: "Восстание в Индокитае!"
 siam.21.d: "Коммунистические повстанческие группы захватили большую часть городов Индокитая! Вероятно, им помог коммунистический сосед Сиама, стремящийся изгнать французскую колониальную администрацию. Пришло время восстановить порядок..."
 siam.21.a: "Вперёд!"

 siam.22.t: "Битва за Бангкок"
 siam.22.d: "Началась последняя битва против режима. После «Декларации о восстании», обнародованной самим Диреком Джаянамой для всех Свободных тайцев по радио Серифап, подавляющее большинство повстанцев сошлись на Бангкок, надеясь взять под контроль правительственные учреждения. Две трети ополченцев атаковали город с севера, остальные — с востока, а небольшая группа, по-видимому, попыталась атаковать из портов на лодках, полученных в результате мятежа на флоте. Тем временем верная правительству армия под командованием Плэка Пибунсонгкрама развернулась в городе, где до особого распоряжения был введён комендантский час, и авиация готовится взлететь для обеспечения разведывательной поддержки. Т"
 siam.22.a: "Покончим с этим!"

 siam.23.t: "Победа повстанцев!"
 siam.23.d: "Битва за Бангкок бушевала днями напролёт, пушки и винтовки не умолкали, солдаты и повстанцы сражались от квартала к кварталу. После захвата здания Национальной ассамблеи последние правительственные силы согласились сложить оружие. По словам некоторых солдат, Плэк Пибунсонгкрам, командовавший антиреволюционными войсками, предпочёл покончить с собой, чем наблюдать поражение своих сил. Прайя Пахонпонпаюхасена, бывший премьер-министр, по-видимому, сумел сесть на корабль и бежать в Камбоджу. Дирек Джаянама, лидер революционеров, выступил по радио.\n\\"Дорогой народ Сиама, военная тирания теперь позади. Наро..."
 siam.23.a: "Ура революции!"

 siam.24.t: "День выборов"
 siam.24.d: "Сегодня день всеобщих выборов, которые определят первое правительство новой Республики. Два кандидата являются наиболее вероятными. Дирек Джаянама, лидер Сери Тай после смерти Приди, основавший «Народную радикальную партию», беря пример с французского радикализма и политики Франклина Делано Рузвельта, который хочет установить государственное вмешательство в экономику для обеспечения благосостояния народа. С другой стороны, Сени Прамой, другой член Сери Тай, основал консервативную «Демократическую партию». Сам Сени, имея королевское происхождение, хотел бы восстановить монархию, но ограничив её гораздо сильнее, чем первая..."
 siam.24.a: "Народная радикальная партия"
 siam.24.b: "Демократическая партия"
 siam.25.t: "Сиам просит о помощи"
 siam.25.d: "Посол Сиама привёз с собой особое письмо, предназначенное исключительно для [SOV.GetLeader]. В этом письме объяснялся план сиамского правительства по поддержке коммунистических движений, выступающих против французской колонизации Индокитая.\nПисьмо завершается призывом о помощи от Сиама, объясняя, что из-за низкой промышленной мощности по сравнению с нашей, отправка оружия и снаряжения идёт медленно и очень дорого, и они надеются, что мы отправим им снаряжение для распространения коммунистических идей в Индокитае."
 siam.25.a: "Борьба с империализмом имеет нашу полную поддержку"
 siam.25.b: "Грядёт война, но мы не можем бросить их."
 siam.25.c: "Мы не можем позволить себе отдать винтовку безнадёжному делу"

 siam.26.t: "Советский Союз соглашается прислать помощь"
 siam.26.d: "Советский Союз согласился прислать нам большое количество винтовок и другого военного снаряжения, чтобы помочь нам в борьбе против колонизации Индокитая.\nПолучение такого передового военного снаряжения, как у них, значительно увеличит мощь нашей сети сопротивления!"
 siam.26.a: "Отлично!"
 SIA_soviet_union_sends_many_guns: "§R+25% к агитации повсюду§!"

 siam.27.t: "Советский Союз соглашается прислать небольшую помощь"
 siam.27.d: "Советский Союз согласился прислать нам небольшое количество военного снаряжения, чтобы помочь, однако заявив, что полная помощь не может быть оказана в данный момент из-за опасной ситуации, в которой оказался СССР.\nПолучение дополнительного военного снаряжения всё же позволит нам улучшить нашу сеть сопротивления."
 siam.27.a: "Лучше, чем ничего, полагаю"
 SIA_soviet_union_sends_some_guns: "§R+10% к агитации повсюду§!"

 siam.28.t: "Советский Союз отказывается отправлять снаряжение"
 siam.28.d: "Советский Союз заявил, что из-за своего текущего положения не может позволить себе расстаться с каким-либо военным снаряжением, и ограничился пожеланием нам успеха в нашем восстании.\nЯсно, что в этом мы будем предоставлены сами себе."
 siam.28.a: "По крайней мере, они придерживаются своего принципа \\"социализма в одной стране\\""

 siam.29.t: "Суд над Прайей Пахонпонпаюхасеной"
 siam.29.d: "Первым членом Кхана Ратсадон, предстающим перед судом, является Прайя Пахонпонпаюхасена, бывший премьер-министр, обвиняемый в республиканских настроениях и желании использовать своё положение главы правительства для попытки отменить монархию.\nТакое преступление будет считаться государственной изменой не только королю, но и всему королевству Сиам, и смертный приговор кажется логичным выбором.\nНо не следует забывать, что он также очень компетентный солдат и может оказаться важным для будущего в свете приближающихся потенциальных конфликтов..."
 siam.29.a: "Он заслуживает только смерти"
 siam.29.b: "Он нам всё ещё нужен"

 siam.30.t: "Суд над Плэком Пибунсонгкрамом"
 siam.30.d: "Плэк Пибунсонгкрам — второй член Кхана Ратсадон, которого судят, в частности, за его роль в подавлении восстания принца Боварадета, первой попытке восстановить власть короля, и за его участие в обороне Бангкока во время восстания принца Дибабхи. Таким образом, он виновен в защите правительства Кхана Ратсадон — акт, который можно считать изменой монархии. Но можно задаться вопросом, не просто ли он выполнял приказы тогдашнего правительства и, следовательно, не будет иметь моральных проблем с выполнением наших..."
 siam.30.a: "Если бы он хотел помочь нам, он бы присоединился к нам с самого начала!"
 siam.30.b: "Мы не можем расстаться с таким компетентным человеком, как он"

 siam.31.t: "Вьентьянский договор"
 siam.31.d: "После долгих переговоров с французским правительством последнее согласилось провести референдум в Камбодже и Сиаме, чтобы определить, хотят ли они снова присоединиться к Сиаму. За «Да» проголосовало более 80%, и суверенитет над этими территориями будет передан нам. Правительство заверило Францию, гарантировав ей экономические выгоды в регионе."
 siam.31.a: "Мы снова едины с нашими братьями!"

 siam.32.t: "Поражение в Индокитае"
 siam.32.d: "Не сумев подавить восстание в Индокитае, похоже, что всякая надежда снова увидеть эти территории под нашим контролем исчезла. Мы подписали мирный договор с четырьмя индокитайскими государствами, чтобы положить конец военным действиям между нашими странами, завершив несколько десятилетий французского присутствия в регионе."
 siam.32.a: "Наша единственная прибыльная колония..."

 siam.33.t: "Поражение в Индокитае"
 siam.33.d: "Потерпев неудачу в подавлении восстания в Индокитае, похоже, что всякая надежда снова увидеть эти территории под нашим контролем исчезла. Мы подписали мирный договор с четырьмя индокитайскими государствами, чтобы прекратить боевые действия, положив конец нескольким десятилетиям французского присутствия в регионе."
 siam.33.a: "Наша самая прибыльная колония..."

 siam.34.t: "Сиам требует референдума в Лаосе и Камбодже"
 siam.34.d: "Разнообразные недавние усилия сиамского правительства по продвижению мирного пан-таизма теперь достигли кульминации в весьма конкретном требовании: проведении референдума в Лаосе и Камбодже о присоединении последних к Сиаму. Сиамский посол пообещал, что французские экономические интересы в регионе будут сохранены, и заверил, что в случае успешного референдума будут заключены договоры, которые предоставят Франции определённые экономические преимущества в регионе."
 siam.34.a: "Мы проведём референдум"
 siam.34.b: "Мы отказываемся"

 siam.35.t: "Франция отвергает референдум"
 siam.35.d: "Несмотря на наши многочисленные усилия по продвижению пан-таизма, который был бы выгоден и Франции, и Сиаму, ответ Франции был отрицательным относительно проведения референдума."
 siam.35.a: "По крайней мере, мы попытались"

 siam.36.t: "[SIA.GetNameDefCap] требует прекращения колониализма в Индокитае"
 siam.36.d: "[SIA.GetNameDefCap] требует прекращения колониализма в Индокитае"
 siam.36.a: "Независимость и свобода, так тому и быть!"
 siam.36.b: "Мы поведём их к свободе."


  # Ideas
 SIA_fascist_sympathies_in_the_army: "Фашистские симпатии в армии"
 SIA_fascist_sympathies_in_the_army_desc: "Под влиянием Плэка Пибунсонгкрама фашистские идеи получили широкое распространение в армии, чему способствовала уже проводимая авторитарная политика. Весьма вероятно, что последний, уже обладающий значительной политической властью, подтолкнёт Сиам к сближению с державами, разделяющими эту идеологию."
 SIA_civilian_wing_opposition: "Оппозиция гражданского крыла"
 SIA_civilian_wing_opposition_desc: "После революции 1932 года «Кхана Ратсадон» («Народная партия») разделилась на два основных крыла: гражданское, выступающее за демократию и социальные реформы, и военное, выступающее за расширение государства и милитаризацию общества. Демократы постоянно критиковали и выступали против нашего расширения военного потенциала, и что-то нужно будет сделать, если мы хотим завершить реализацию наших планов."
