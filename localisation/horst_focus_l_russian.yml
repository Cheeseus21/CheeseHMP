 BUL_aegean_naval_power_tt: "§CЭтот фокус позволит вам пройти через пролив Босфор!§!"
 
 horst_decaying_mils_tt: "Даёт §Y24§! военных завода на случайных базовых провинциях. Награда уменьшается на §Y1§! завод за каждый месяц после января 1936 года."
 horst_dynamic_factory_tt: "В зависимости от предыдущих фокусов даёт §Y[?ui_horst_civ_reward|Y0]§! гражданских заводов ИЛИ §Y[?ui_horst_mil_reward|Y0]§! военных заводов на случайных базовых провинциях. \n\n§C(Награда уменьшается за каждый месяц задержки после оптимального времени завершения и будет уменьшаться, даже если фокусы не выбраны).§!"
 
 SOV_the_plan_of_consolidation_tt: "§YЗавершение пятилетки§! даст вам максимум §Y12 гражданских заводов§!."
 SOV_rearmament_efforts_tt: "§YЗавершение пятилетки§! даст вам максимум §Y18 военных заводов§!."
 
 SOV_human_wave_tactics_tt: "Применяет следующие эффекты к батальонам §Yпехоты§!, §Yартиллерии§!, §YПТО§! и §YПВО§!:\n Использование снаряжения: §G-25%§!\n Макс. ОЗ: §R-25%§!"
 SOV_armored_wave_tactics_tt: "Применяет следующие эффекты к батальонам §Yлёгких танков§!, §Yсредних танков§! и §Yтяжёлых танков§!:\n Использование снаряжения: §G-15%§!\n Макс. ОЗ: §R-100%§!"
 SOV_human_wave_tactics_tech: "Тактика «человеческой волны»"
 SOV_armored_wave_tactics_tech: "Тактика «бронетанковой волны»"
 
 SOV_guard_units_tt: "Открывает элитные шаблоны §Yгвардейской брони§!.\n\nГвардейские батальоны представляют собой лучших из лучших в Красной Армии, обладая увеличением §Yмягкой атаки§! и §Yжёсткой атаки§! на §G+10%§! по сравнению со стандартными аналогами.\n\n§RСтрого ограничено:§! Из-за интенсивной подготовки и требований к элитному снаряжению мы можем иметь максимум §Y6§! дивизий для каждого типа гвардии (лёгкой, средней и тяжёлой)."
 convert_30_civs_tt: "Преобразует до §Y30§! гражданских заводов в военные заводы на наших контролируемых базовых провинциях."
 
 SOV_purge_timeline_tt: "Государство заражено пятой колонной, вредителями и сочувствующими фашистам. Необходимо провести серию глубоких внутренних чисток, чтобы обеспечить абсолютную верность революции.\n\n§YЗапланированные события:§!\n* §YПроцесс шестнадцати§! — произойдёт §C19 августа 1936§! \n* §YПроцесс семнадцати§! — произойдёт §C23 января 1937§! \n* §YТайный процесс генералов§! — произойдёт §C11 июня 1937§! \n* §YПроцесс двадцати одного§! — произойдёт §C2 марта 1938§! \n\n§YТри выбора:§!\nВо время этих процессов ваши решения определят, куда чистка ударит сильнее всего, вынуждая вас принять один из трёх постоянных военных штрафов:\n1. §RШтраф к организации дивизий§! \n2. §RШтраф к эффективности авиации на заданиях§! \n3. §RШтраф к прочности дивизий§! \n\nЗавершение последнего процесса (§YПроцесс двадцати одного§!) автоматически завершит этот национальный фокус и откроет остальную часть политической ветки."
 
 SOV_shift_to_armaments_production_tt: "Весь промышленный фокус нашей страны был перенаправлен на приближающийся конфликт с Германским рейхом. Всё производство должно служить военным нуждам.\n\n§C(Идея истекает 1 января 1941 г.)§!"

 SOV_second_fyp_construction_of_dual_purpose_factories_tt: "Мы начнём отслеживать наше промышленное расширение. Когда мы решим воспользоваться этим, мы получим §Y1§! £arms_factory_texticon военный завод за каждые §Y2§! £industrial_complex_texticon гражданских завода, которые мы получили."
 
 SOV_continue_the_three_good_years_tt: "Открывает решения §Yвторой пятилетки§!, позволяющие получить либо:\n* §G+20%§! к скорости строительства гражданских заводов\n* §G+100%§! к максимальным строительным слотам в провинциях"

 SOV_education_of_the_worker_class_tt: "Открывает решения §Yвторой пятилетки§!, которые расширят наш академический аппарат, позволяя получить:\n* §Y+1§! исследовательский слот\n* §G+20%§! к скорости исследований"

 SOV_strategy_of_dual_use_tt: "Открывает решения §Yвторой пятилетки§!, позволяющие получить либо:\n* Механику преобразования §Yзаводов двойного назначения§!\n* §G+20%§! к скорости строительства военных заводов"
 
 SOV_war_preparations_focus: "Подготовка к войне"
 SOV_war_preparations_focus_desc: "Время мира прошло. Мы должны полностью задействовать наш государственный аппарат для подготовки Красной Армии и гражданской инфраструктуры к неизбежному конфликту."

 SOV_ural_shadow_industry: "Уральская теневая промышленность"
 SOV_ural_shadow_industry_desc: "Создав резервные промышленные зоны в глубине Уральских гор, мы гарантируем, что наше тяжёлое производство продолжит работать, даже если наши западные территории падут перед врагом."

 SOV_fortification_of_cities_and_villages: "Укрепить города и деревни"
 SOV_fortification_of_cities_and_villages_desc: "Каждый город, каждая улица и каждое здание должны быть превращены в грозный опорный пункт. Враг заплатит кровью за каждый дюйм советской земли, который попытается захватить."

 SOV_construction_of_defensive_lines: "Построить оборонительные линии"
 SOV_construction_of_defensive_lines_desc: "Массивные земляные укрепления, противотанковые рвы и комплексы бункеров должны быть быстро возведены по всей сельской местности, чтобы ослабить натиск фашистского моторизованного наступления."

 SOV_last_stand_on_leningrad: "Последний рубеж Ленинграда"
 SOV_last_stand_on_leningrad_desc: "Колыбель революции окружена. Защитники и жители Ленинграда должны удержать город перед лицом голода, мороза и артиллерийских обстрелов до самого конца."

 SOV_order_270: "Приказ № 270"
 SOV_order_270_desc: "Советских военнопленных нет, есть только предатели. Любой командир или комиссар, который сорвёт знаки различия и сдастся врагу, будет рассматриваться как злостный дезертир."

 SOV_defense_of_crimea: "Оборона Крыма"
 SOV_defense_of_crimea_desc: "Черноморский флот и наш жизненно важный южный фланг зависят от удержания Крымского полуострова. Мы должны усилить Севастополь и не дать врагу выйти к морю."

 SOV_last_stand_on_stalingrad: "Последний рубеж Сталинграда"
 SOV_last_stand_on_stalingrad_desc: "Город, носящий имя нашего великого вождя, не может пасть. Мы будем сражаться за каждый заводской цех и каждую груду развалин. Судьба Советского Союза решится здесь."
 
 SOV_second_five_year_plan: "Вторая пятилетка"
 SOV_second_five_year_plan_desc: "Первая пятилетка заложила фундамент, но вторая построит дом. Мы должны значительно расширить нашу тяжёлую промышленность, завершить коллективизацию сельского хозяйства и вывести советскую экономику в современную эпоху."

 SOV_the_plan_of_consolidation: "План консолидации"
 SOV_the_plan_of_consolidation_desc: "Вместо безрассудной экспансии нашей непосредственной целью должно быть закрепление недавних промышленных достижений. Мы сосредоточимся на улучшении инфраструктуры, устранении производственных узких мест и обеспечении максимальной эффективности наших текущих заводов."

 SOV_rearmament_efforts: "Усилия по перевооружению"
 SOV_rearmament_efforts_desc: "Международная обстановка ухудшается с каждым днём. Мы должны переориентировать экономическое планирование на приоритет военно-промышленного комплекса, обеспечив Красную Армию оружием, необходимым для защиты пролетариата."

 SOV_continue_the_three_good_years: "Продолжить три хороших года"
 SOV_continue_the_three_good_years_desc: "После трудностей начала 30-х годов мы наконец достигли периода стабильного экономического и сельскохозяйственного роста. Мы должны поддерживать эту динамику, чтобы рабочие были сыты, а сборочные линии работали."

 SOV_education_of_the_worker_class: "Образование рабочего класса"
 SOV_education_of_the_worker_class_desc: "Современное индустриальное государство не может управляться неграмотными крестьянами. Масштабное расширение наших технических школ и университетов превратит нашу рабочую силу в высококвалифицированных инженеров и учёных."

 SOV_strategy_of_dual_use: "Стратегия двойного назначения"
 SOV_strategy_of_dual_use_desc: "Тракторные заводы сегодня, танковые завтра. Обеспечив наше гражданское производственное оборудование оснасткой двойного назначения, мы сможем в любой момент перейти к экономике тотальной войны."

 SOV_annexation_of_tannu_tuva: "Аннексия Танну-Тувы"
 SOV_annexation_of_tannu_tuva_desc: "Тувинская Народная Республика долгое время находилась под нашим защитным зонтиком. Пришло время официально включить её в состав Советского Союза в качестве автономной области, обезопасив наши границы."

 SOV_hand_over_the_administration_of_tannu_tuva: "Административная автономия Тувы"
 SOV_hand_over_the_administration_of_tannu_tuva_desc: "Вместо прямой аннексии мы позволим тувинскому правительству сохранить номинальную независимость и заниматься местной администрацией, освободив наших собственных бюрократов для более насущных дел на Западе."

 SOV_international_aid_for_communists: "Помощь международному коммунизму"
 SOV_international_aid_for_communists_desc: "Революция в одной стране надёжна, но глобальная борьба продолжается. Мы должны тайно поставлять оружие, советников и промышленное оборудование коммунистическим партизанам, борющимся с фашистским угнетением по всему миру."
 
 SOV_import_construction_know_how: "Импорт строительного опыта"
 SOV_import_construction_know_how_desc: ""
 
 SOV_human_wave_tactics: "Тактика «человеческой волны»"
 SOV_human_wave_tactics_desc: "Фашистские захватчики полагаются на точную логистику и механизированные клинья. Мы сломим их неудержимым потоком советского народа. Подавив их оборонительные линии непрерывными массированными атаками пехоты, мы разрушим их позиции через грубое, неумолимое истощение."

 SOV_armored_wave_tactics: "Тактика «бронетанковой волны»"
 SOV_armored_wave_tactics_desc: "Наши заводы за Уралом штампуют танки с темпом, который враг едва может comprehend. Адаптировав наши доктрины массированного штурма к бронетанковому корпусу, мы сосредоточим сотни машин в подавляющие механизированные волны, сокрушая фашистские линии под бесконечными стальными гусеницами."
 
 SOV_kharkiv_komintern_locomotive_plant: "Харьковский паровозостроительный завод имени Коминтерна"
 SOV_kharkiv_komintern_locomotive_plant_desc: "Завод ХПЗ на Украине долгое время был жемчужиной нашей тяжёлой промышленности, выпуская тепловозы, связующие нашу огромную страну. Однако под руководством наших лучших инженеров его специализированные тракторные цеха должны быть переоборудованы. Сборочные линии здесь скоро станут местом рождения нового, революционного поколения советской бронетехники."
 
 SOV_rehabilitated_military_tt1: "§GУменьшает§! ослабления §Yорганизации дивизий§!, §YОЗ дивизий§! или §Yэффективности воздушных миссий§!, выбранные во время Великой чистки, на §G50%§!."
 
 SOV_guard_units: "Сформировать гвардейские части"
 SOV_guard_units_desc: "Дивизии, отличившиеся в горниле боёв, будут повышены до престижного статуса гвардейских. Эти элитные, закалённые в боях формирования получат приоритетное снаряжение и будут служить несокрушимым остриём наших контрнаступлений."

 SOV_convert_civilian_industry: "Конвертировать гражданскую промышленность"
 SOV_convert_civilian_industry_desc: "Выживание Родины требует, чтобы всё производство было посвящено военным усилиям. Мы должны немедленно прекратить выпуск несущественных потребительских товаров и переоборудовать наши гражданские заводы для производства боеприпасов, оружия и бронетехники для фронта."
 
 SOV_an_adaptable_army_tt: "Добавляет черту §YПриспособляемость§! каждому генералу в нашей армии."

 NOR_info_focus: "Информация о Норвегии"
 NOR_info_focus_desc: ""
 norway_cap_tt_1: "§CПоследний рубеж отключён для этой страны до 1 июля 1940 года.§! \n\nКогда у §YНорвегии§! будет больше §R25% прогресса капитуляции§!:\n\n§YГлобальные эффекты:§!\nНорвегия немедленно эвакуирует свои вооружённые силы на §YЯн-Майен§!.\n§YГермания§! оккупирует норвежский материк и развернёт §Y40 гарнизонных дивизий§! для контроля территории.\n\n§YЕсли Норвегией управляет ИИ:§!\n§YВеликобритания§! аннексирует Норвегию.\n§YЯн-Майен§! будет сильно укреплён: появится §G16§! новых ячеек строительства, §G12§! военных заводов и §G4§! гражданских завода.\n§YВеликобритания§! получит §G+2§! к лимиту парашютно-десантных дивизий.\n\n§YЕсли Норвегией управляет игрок:§!\nНорвежское правительство бежит, перенеся новую столицу на §YЯн-Майен§!.\nЕсли Норвегия ещё не состоит во фракции, она присоединится к фракции §YВеликобритании§!."
 
 SOV_they_will_know_fear_tt: "Выбраны все решения фокуса §YОбразование рабочего класса§!."
 
 GER_fuhrer_directives: "Директивы фюрера"
 GER_fuhrer_directives_desc: "Меняющиеся реалии войны требуют централизованного, абсолютного командования. Новые стратегические директивы верховного командования обойдут стандартную военную бюрократию, чтобы обеспечить немедленное достижение наших оперативных целей."

 GER_volkskrieg: "Фольксшрайг"
 GER_volkskrieg_desc: "Концепция ограниченной войны мертва. Мы должны подготовить немецкое население к настоящей народной войне, мобилизовав все аспекты общества, промышленности и людских ресурсов для поддержки фронтов."

 GER_the_broad_gauge_conversions: "Перешивка широкой колеи"
 GER_the_broad_gauge_conversions_desc: "Советская железнодорожная сеть использует более широкую колею, чем наша, что угрожает парализовать наши логистические сети при продвижении на восток. Мы должны быстро перешить захваченные рельсы на стандартную европейскую колею, чтобы наши клинья были обеспечены снабжением."

 GER_ostfront_blitzkrieg: "Блицкриг, который покончит со всеми блицкригами"
 GER_ostfront_blitzkrieg_desc: "Скорость и шок — наше величайшее оружие. Сосредоточив наши механизированные силы в массивные клинья, мы сможем сокрушить Красную Армию прежде, чем она успеет должным образом мобилизовать свои глубокие резервы."

 GER_start_the_winter_preperations: "Начать подготовку к зиме"
 GER_start_the_winter_preperations_desc: "Русская зима печально известна своей суровостью. Вместо того чтобы ставить всё на быструю осеннюю победу, мы должны немедленно начать накопление зимней одежды, антифриза и специализированного оборудования, чтобы обеспечить эффективность наших войск при наступлении морозов."

 GER_winter_of_41: "Зима 41-го"
 GER_winter_of_41_desc: "Наступление застопорилось, и температура падает. Мы должны остановить крупные наступательные операции, окопаться на оборонительных позициях и пережить эту жестокую зиму, чтобы сохранить силы для весенней оттепели."

 GER_operation_typhoon: "Операция «Тайфун»"
 GER_operation_typhoon_desc: "Москва в пределах досягаемости. Мы предпримем финальный, массированный концентрированный штурм, чтобы захватить советскую столицу, выбить сердце их командной структуры и вынудить к полному коллапсу, прежде чем зима остановит наше продвижение."
 
 GER_war_of_attrition: "Война на истощение"
 GER_war_of_attrition_desc: "Дни стремительных охватов начала войны прошли. Мы должны окопаться, укрепить наши линии и заставить врага истекать кровью за каждый дюйм земли. Этот театр военных действий теперь превратится в изматывающее состязание промышленной выносливости и живой силы."

 GER_battle_of_kursk: "Битва под Курском"
 GER_battle_of_kursk_desc: "Вражеский выступ под Курском даёт последнюю, неотразимую возможность вернуть стратегическую инициативу. Запустив массивное концентрированное бронированное клещевое движение с нашими новейшими тяжёлыми танками, мы можем поймать в ловушку их резервы и решительно подорвать их наступательные возможности."

 GER_grind_guest_workers: "Призыв остарбайтеров"
 GER_grind_guest_workers_desc: "Наши оружейные заводы голодают из-за нехватки рабочей силы, поскольку всё больше трудоспособных мужчин отправляются на Восточный фронт. Мы должны систематически призывать работников с оккупированных территорий, чтобы поддерживать работу военной машины, максимизируя наше промышленное производство любой ценой."

 GER_one_final_push: "Последний рывок"
 GER_one_final_push_desc: "Это наш последний реальный шанс добиться решающего исхода на Востоке. Мы бросим абсолютно все оставшиеся элитные резервы в одно массированное наступление, чтобы сломить линии врага и его волю к сопротивлению."
 
 GER_the_broad_gauge_conversions_tt: "Сосредоточение внимания на оккупированных железных дорогах гарантирует, что наше следующее наступление не будет иметь проблем со снабжением. \n\n§CВо время операции «Блау» получите +25% радиуса действия снабжения.§!"
 GER_ostfront_blitzkrieg_tt: "§CМы потеряем наш бонус по завершении фокуса.§!"
 GER_start_the_winter_preperations_tt: "Мы используем время и пространство, предоставленные нашим первоначальным наступлением, чтобы подготовиться к зиме. \n\n§CПервые зимние фокусы будут усилены.§!"
 
 GER_elite_units_tt: "Открывает элитные шаблоны §Yэлитной брони§!.\n\nЭлитные батальоны представляют собой лучших из лучших в немецкой армии, обладая увеличением §Yмягкой атаки§! и §Yжёсткой атаки§! на §G+10%§! по сравнению со стандартными аналогами.\n\n§RСтрого ограничено:§! Из-за интенсивной подготовки и требований к элитному снаряжению мы можем иметь максимум §Y10§! дивизий для каждого типа элиты (лёгкого, среднего и тяжёлого). \n\n§CЛюбые фокусы, связанные с этими типами дивизий, увеличат лимит на 10.§!"
 GER_stormtroopers_tt: "Открывает элитные шаблоны §Yштурмовиков§!.\n\nБатальоны штурмовиков представляют собой лучших из лучших в немецкой армии, обладая увеличенными §Yместностными бонусами§!, §Yхарактеристиками§! и, в отличие от других сил спецназа, не используют §Yспециальное снаряжение§!.\n\n§RСтрого ограничено:§! Из-за интенсивной подготовки и требований к элитному снаряжению мы можем иметь максимум §Y10§! дивизий. \n\n§CЛюбые фокусы, связанные с этим типом дивизий, увеличат лимит на 40.§!"
 
 GER_plan_z_tt: "§CЭта идея не будет доступна после 1 января 1940 г.§!"
 
 GER_develop_heraeus_facilities_tt: "§CЭтот фокус даст дополнительный слот для исследований, если ни один игрок не играет за: Венгрию, Румынию, Болгарию и Испанию.§!"
 
 GER_concentration_of_production_tt: "§YРейнланд§! и §YМозелланд§! получают §G+50§! максимальных слотов для строительства.\n\n§RОднако эти регионы получат модификатор, накладывающий -100% к скорости ремонта всех зданий.§!"
 
 GER_construction_of_fuel_siloes: "Расширение хранилищ топлива"
 GER_construction_of_fuel_siloes_desc: ""
 GER_expansion_of_mining_facilities: "Расширение горнодобывающих предприятий"
 GER_expansion_of_mining_facilities_desc: ""
 
 GER_concentration_of_production: "Концентрация производства"
 GER_concentration_of_production_desc: ""
 GER_dispersal_of_production: "Распределение производства"
 GER_dispersal_of_production_desc: ""
 
 GER_trade_deal_with_sweden_tt: "Даже без контроля над Осло, мы можем закупать половину шведских ресурсов в течение некоторого времени. \n\n§R(Не делайте этот фокус, если у вас нет выбора.)§!"
 
 GER_ascension_of_todt_tt: "Инженер по образованию, Тодт служил в Luftstreitkräfte во время Первой мировой войны и был награждён Железным крестом. \n\n§CОн подойдёт для руководства военной экономикой в среднесрочной перспективе.§!"
 GER_ascension_of_speer_tt: "Архитектор по образованию, Шпеер вступил в НСДАП в 1931 году. Его архитектурные навыки сделали его всё более заметным в партии, и он вошёл в ближний круг Гитлера. \n\n§CОн подойдёт для руководства военной экономикой в долгосрочной перспективе.§!"
 GER_ascension_of_goring_tt: "Толстяк по образованию, ему было поручено ускорить программу перевооружения самим Гитлером. \n\n§CОн подойдёт для руководства военной экономикой в краткосрочной перспективе и может даже дать чудесные результаты.§!"
 GER_ascension_of_goring_tt1: "§YБонусы, предоставляемые Герингом, будут действовать только до начала войны.§!"
 
 GER_veterans_tooltip: "Создаёт §Y10 награждённых дивизий§!. Эти подразделения отмечены уникальными медалями, дающими им следующие постоянные бонусы:\n§G+10%§! к максимальной организации\n§G+10%§! к скорости восстановления организации\n§G+10%§! к атаке\n§G+10%§! к обороне"
 
 GER_integration_of_puppet_economies_tt: "Даёт динамический бонус к §Yвыпуску заводов§! в зависимости от даты завершения. Мы сможем разграбить экономики §YЕвропы и Египта§! для нашей военной экономики:\n\n§YСентябрь 1939 - Январь 1940:§! §G+20%§! к выпуску заводов\n§YЯнварь 1940 - Март 1940:§! §G+15%§! к выпуску заводов\n§YМарт 1940 - Июнь 1940:§! §G+10%§! к выпуску заводов\n§YПосле июня 1940:§! §G+5%§! к выпуску заводов \n\n§C(Эта идея будет действовать до начала «Барбароссы».)§!"
 
 GER_absorb_the_abwehr: "Подготовка сил специального назначения"
