 SIA_France_restore_order_in_indochina: "Восстановить порядок"
 SIA_France_restore_order_in_indochina_desc: "В Индокитае вспыхнуло широкомасштабное коммунистическое восстание, стремящееся изгнать французскую администрацию. Повстанцы хорошо вооружены и пользуются поддержкой Сиама. Крайне необходимо вернуть контроль над колониями."

 SIA_revolutionnary_women: "Женщины и революция"
 SIA_revolutionnary_women_desc: "Конец капитализма должен означать и конец маргинализации женщин. Последние должны быть уравнены в правах с мужчинами, будь то дома, на фабриках или в армии."
