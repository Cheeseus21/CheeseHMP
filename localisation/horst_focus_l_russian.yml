 RAJ_nep_gurkhas: "§HВосемь§! горнострелковых дивизий будут набраны в §HKathmandu§! под нашим командованием."
 RAJ_viceroy: "Вице-королевство Индии"
 RAJ_viceroy_desc: "Вице-король Индии является представителем Короны и обладает полными полномочиями принимать решения от её имени. Также называемый «генерал-губернатором Индии», пост вице-короля ставится под сомнение радикалами из партии Индийский национальный конгресс."
 RAJ_guided_by_britain: "Укрепление связей с Содружеством"
 RAJ_guided_by_britain_desc: "Оставаясь близкими и верными Британской короне, мы сможем наилучшим образом привести Британский Радж к лучшему будущему."
 RAJ_ban_the_quit_india_movement: "Запретить движение «Вон из Индии»"
 RAJ_ban_the_quit_india_movement_desc: "Кампания Ганди за независимость Индии достигла апогея с призывом к британцам покинуть Индию. Подобные призывы против империи не должны допускаться!"
 RAJ_the_x_force: "Силы Икс"
 RAJ_the_x_force_desc: "Регулярные китайские части вблизи Бирмы имеют возможность отступить на нашу территорию. Если мы примем их, они перейдут под контроль наших полевых командиров."
 RAJ_nepalese_gurkhas: "Непальские гуркхи"
 RAJ_nepalese_gurkhas_desc: "С приближением японской угрозы нам следует рассмотреть возможность направления запроса о помощи Королевству Непал."
 viceroy_of_raj: "Вице-король Индии"
