 BUL_agricultural_exports_tt: "Мы будем экспортировать наш табак, зерно и другие продукты питания в Германию и получать за это рейхскредиты. \n\n§C(\"Когда начнётся война, эта идея исчерпает себя.\")§!"
 BUL_economic_colony_of_germany_tt: "Мы прочно привяжем нашу экономику к выгодному рынку Германии и модернизируем нашу промышленность. \n\n§C(\"Когда начнётся война, эта идея исчерпает себя.\")§!"
 
