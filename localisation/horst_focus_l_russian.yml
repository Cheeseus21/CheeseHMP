 ### NATIONAL FOCUSES 
 NZL_a_sustainable_army: "Устойчивая армия"
 NZL_a_sustainable_army_desc: "Наша армия, очевидно, не самая сильная в мире, но благодаря увеличению инвестиций и тренировок мы сможем улучшить положение."
 NZL_new_zealand_will_not_fall: "Новая Зеландия не падёт"
 NZL_improve_the_radars: "Улучшить РАДАРЫ"
 NZL_improve_the_radars_desc: "Наши РАДАРЫ невероятно устарели, и поскольку морская война развивается, наши технологии тоже должны."
 NZL_train_new_officers: "Обучить новых офицеров"
 NZL_train_new_officers_desc: "Мы должны пополнить наш текущий военно-морской штаб, чтобы улучшить наши возможности."
 NZL_solidify_the_new_zealand_division: "Создать постоянный флот"
 NZL_solidify_the_new_zealand_division_desc: "В настоящее время наш флот не является чем-то выдающимся, но мы можем принять меры для его улучшения."
 NZL_naval_profit: "Увеличить доходность флота"
 NZL_naval_profit_desc: "Морская промышленность принесла нашей стране большую пользу; если мы продолжим её расширять, это обязательно окупится."
 NZL_form_the_new_zealand_navy: "Сформировать флот Новой Зеландии"
 NZL_form_the_new_zealand_navy_desc: "В прошлом наш флот был лишь небольшим флотом резервных кораблей; теперь мы можем сделать его собственной независимой силой."
 NZL_destroyer_production: "Производство эсминцев"
 NZL_destroyer_production_desc: "Эсминцы доказали свою полезность для любого флота, который ими обладает; нам стоит производить свои собственные."
 NZL_submarine_production: "Производство подводных лодок"
 NZL_submarine_production_desc: "В современной морской войне подводные лодки стали решающим фактором; нам стоит рассмотреть возможность создания своих собственных."
 NZL_supply_the_new_zealand_navy_divsion: "Снабдить дивизию Новой Зеландии"
 NZL_supply_the_new_zealand_navy_divsion_desc: "Нашему флоту нужно снаряжение для поддержания себя."
 NZL_support_ships: "Переоборудовать гражданские суда"
 NZL_support_ships_desc: "Вспомогательные корабли нужны любому флоту; если мы расширяем свой, они необходимы."
 NZL_pride_of_the_fleet: "Сотрудничество в разработке линкоров"
 NZL_pride_of_the_fleet_desc: "Работая с Великобританией, мы можем внедрять инновации в проекты новых линкоров."
 NZL_mution_companies_investments: "Колониальное производство боеприпасов"
 NZL_mution_companies_investments_desc: "Наш первый шаг к созданию улучшенной армии — это инвестиции в компании, которые поставляют и создают снаряжение для наших солдат."
 NZL_remember_anzac: "Уроки Великой войны"
 NZL_remember_anzac_desc: "Совершенствование доктрин имеет решающее значение для возрождения нашей армии; мы должны изучить наши старые слабости и поработать над ними."
 NZL_ford_munition_plant: "Оружейный завод Форда"
 NZL_ford_munition_plant_desc: "Некоторые американские компании могут быть использованы для строительства оружейных заводов в нашей стране."
 NZL_new_charlton_automatic_rifles: "Новые автоматические винтовки Чарльтона"
 NZL_new_charlton_automatic_rifles_desc: "Нам нужно принять на вооружение новые винтовки на случай любого потенциального будущего конфликта."
 NZL_expand_our_tank_warfare: "Разработать танк Боба Семпла"
 NZL_expand_our_tank_warfare_desc: "Наша страна не славится механизированной войной, но мы всё равно можем попытаться."
 NZL_foundations_of_an_aritllery_regiment: "Основы артиллерийского полка"
 NZL_foundations_of_an_aritllery_regiment_desc: "Артиллерийский полк важен в любой армии; нам следует создавать свои собственные."
 NZL_engineer_and_supplY_corp: "Инженерный корпус и корпус снабжения"
 NZL_engineer_and_supplY_corp_desc: "Давайте ещё больше увеличим нашу армию, добавив новые подразделения, которые могут оказаться полезными."
 NZL_construct_the_whenuapai_base: "Построить базу Уэнуапай"
 NZL_construct_the_whenuapai_base_desc: "Нашим самолётам нужно место для тренировок и ремонта; эта база сможет их обеспечить."
 NZL_fighter_productions: "Производить оборонительные самолёты"
 NZL_fighter_productions_desc: "В случае войны Новая Зеландия может подвергнуться угрозе воздушных налётов. Нам нужна защитная мера против этого."
 NZL_bomber_production: "Разрабатывать самолёты для Содружества"
 NZL_bomber_production_desc: "Наша удалённость от Европы сделает нашу страну идеальным местом для разработки самолётов в случае войны."
 NZL_allocate_resources_to_the_rnzf: "Выделить ресурсы для RNZF"
 NZL_allocate_resources_to_the_rnzf_desc: "Нам следует импортировать самолёты, чтобы увеличить нашу численность и дать себе шанс на борьбу."
 NZL_new_zealand_special_forces: "Силы специального назначения Новой Зеландии"
 NZL_new_zealand_special_forces_desc: "Спецназ занимает своё место в современной войне; принять его на вооружение было бы отличным шагом."
 NZL_piolt_recuitment_drive: "Программа лётной подготовки Содружества"
 NZL_piolt_recuitment_drive_desc: "Тренируясь с другими членами Содружества, мы можем повысить опыт и мастерство наших пилотов."
 NZL_connect_the_nation: "Профинансировать Национальное дорожное управление"
 NZL_connect_the_nation_desc: "Наши дороги не помешало бы улучшить, чтобы сделать передвижение более лёгким как для гражданских, так и для военных нужд."
 NZL_taranaki_oil_field: "Нефтяное месторождение Таранаки"
 NZL_taranaki_oil_field_desc: "Наша страна ограничена в национальных ресурсах, однако у нас есть несколько нефтяных месторождений, которые могут оказаться полезными."
 NZL_new_zealand_steel_works: "Сталелитейные заводы Новой Зеландии"
 NZL_new_zealand_steel_works_desc: "Сталь нашей страны может использоваться для различных целей, что создаёт необходимость её добычи. "
 NZL_resource_imports: "Принять новые торговые доктрины"
 NZL_resource_imports_desc: "Если мы хотим поддерживать какое-либо производство, мы должны пересмотреть, куда вкладываются наши природные ресурсы."
 NZL_the_inudtrial_segment: "Индустриализировать сельские общины"
 NZL_the_inudtrial_segment_desc: "В Новой Зеландии всё ещё есть отличные участки для строительства новых городов и промышленных центров. Мы должны этим воспользоваться."
 NZL_the_wairarapa_sheep_farms: "Овцеводческие фермы Вайрарапы"
 NZL_the_wairarapa_sheep_farms_desc: "Мы могли бы использовать прибыль от наших многочисленных ферм для финансирования военных нужд."
 NZL_industrial_awakening: "Расширять наши города"
 NZL_industrial_awakening_desc: "Несколько портовых городов переживают всплеск роста как в экономическом плане, так и в плане населения. Если мы сможем продолжить этот рост, это будет выгодно для страны."
 NZL_negotiate_off_the_debt: "Договориться о списании долга"
 NZL_negotiate_off_the_debt_desc: "Договорившись с Британией о помощи в будущих войнах, мы сможем добиться списания части нашего долга."
 NZL_distribute_the_national_defense_budget: "Распределить бюджет национальной обороны"
 NZL_distribute_the_national_defense_budget_desc: "Увеличение бюджета наших сил обороны необходимо в нынешней международной обстановке."
 NZL_the_tsunami_project: "Проект «Цунами»"
 NZL_the_tsunami_project_desc: "Сотрудничество с американцами в разработке бомбы, способной защитить наш остров, может стать приоритетом."
 NZL_hire_physicists: "Нанять физиков"
 NZL_hire_physicists_desc: "Чтобы расширить научные знания, а также помочь в любых военных проектах, нам следует нанять физиков."
 NZL_Train_New_Officers: "Обучить новых офицеров"
 NZL_Train_New_Officers_desc: "Чтобы наш флот рос, должна расти и численность наших офицеров."
 NZL_hot_climate_equipment: "Получить снаряжение для жаркого климата"
 NZL_hot_climate_equipment_desc: "Мы должны получить оборудование для жаркого климата, так как в случае войны наши части могут быть направлены в районы, где оно потребуется."
 NZL_form_the_new_zealand_air_force: "Сформировать военно-воздушные силы Новой Зеландии"
 NZL_form_the_new_zealand_air_force_desc: "Пришло время нашим воздушным силам перестать быть придатком RAF и стать самостоятельной боевой силой."
 NZL_air_training_progam: "Программа подготовки пилотов"
 NZL_air_training_progam_desc: "Сотрудничество с Содружеством в подготовке наших пилотов может оказаться полезным."
 NZL_trust_in_the_opposition: "Доверие к оппозиции"
 NZL_trust_in_the_opposition_desc: "Макмиллан был избран лидером Лейбористской партии, и для успеха ему необходима вера нации."
 NZL_public_health_service: "Государственная служба здравоохранения"
 NZL_public_health_service_desc: "Создание государственной службы здравоохранения — важный шаг в программе социального обеспечения лейбористов."
 NZL_research_grants: "Гранты на исследования"
 NZL_research_grants_desc: "Лейбористы считают исследования ключевым аспектом развития страны, поэтому они увеличат их бюджет."
 NZL_review_the_prison_system: "Пересмотр тюремной системы"
 NZL_review_the_prison_system_desc: "Тюремная система в нашей стране имеет фундаментальные недостатки. Мы должны попытаться улучшить её."
 NZL_reconcile_political_opponents: "Примирить политических оппонентов"
 NZL_reconcile_political_opponents_desc: "Джон А. Ли всегда был талантливым лидером; мы могли бы примириться с ним, если это позволит использовать его навыки."
 NZL_denounce_conservative_politicians: "Осудить консервативных политиков"
 NZL_denounce_conservative_politicians_desc: "Консервативные идеи тормозят прогресс нашей страны. Мы должны использовать все ресурсы, чтобы заставить их замолчать."
 NZL_frasers_leadership: "Лидерство Фрейзера"
 NZL_frasers_leadership_desc: "Питер Фрейзер проявил себя как способный лидер, достойный вести нашу страну через эти трудные времена."
 NZL_rally_the_opponents: "Сплотить оппонентов"
 NZL_rally_the_opponents_desc: "Мы должны сотрудничать со всеми оппонентами, даже за пределами Лейбористской партии, ради прогресса страны."
 NZL_attempt_at_a_war_economy: "Попытка создания военной экономики"
 NZL_attempt_at_a_war_economy_desc: "Экономика Новой Зеландии никогда не была ориентирована на крупный конфликт, но сейчас, как никогда, важно хотя бы попытаться."
 NZL_lower_labor_wages: "Снизить заработную плату"
 NZL_lower_labor_wages_desc: "Чтобы поддержать мобилизацию, мы должны урезать некоторые зарплаты для дальнейшего роста экономики."
 NZL_silence_the_discontent: "Заглушить недовольство"
 NZL_silence_the_discontent_desc: "Кажется, некоторые недовольны нашими более жёсткими законами о мобилизации. Мы должны подвергнуть их цензуре, прежде чем эти идеи проникнут в общество."
 NZL_fight_for_control_over_our_soldiers: "Ввести призыв"
 NZL_fight_for_control_over_our_soldiers_desc: "Нашей стране нужно больше мужчин для службы в случае конфликта; хотя это непопулярно, возможно, пришло время вновь ввести призыв."
 NZL_the_labour_partys_reform: "Кабинет Сэвиджа"
 NZL_the_labour_partys_reform_desc: "Майкл Сэвидж и Лейбористская партия пообещали жителям Новой Зеландии многое. Настало время начать проводить эти реформы."
 NZL_critize_uk_foreign_policy: "Критиковать политику умиротворения"
 NZL_critize_uk_foreign_policy_desc: "Политика умиротворения не является законной формой дипломатии; даже если мы останемся в одиночестве в этом вопросе, важно донести это до Великобритании."
 NZL_protect_maori_land: "Конфисковать полезные земли маори"
 NZL_protect_maori_land_desc: "Маори владеют несколькими территориями, необходимыми для нашего естественного расширения; пришло время вернуть эти земли за надлежащую компенсацию."
 NZL_respect_maori_culture: "Уважать культуру коренных народов"
 NZL_respect_maori_culture_desc: "Маори должно быть разрешено следовать своим традициям без какого-либо вреда."
 NZL_minor_native_representation_in_gov: "Незначительное представительство коренных народов"
 NZL_minor_native_representation_in_gov_desc: "Мы могли бы позволить некоторым коренным жителям иметь голос в правительстве Новой Зеландии. Это может успокоить некоторых протестующих."
 NZL_the_maori_division: "Дивизия маори"
 NZL_the_maori_division_desc: "Нам следует оказать давление на некоторых членов парламента от маори, чтобы они сформировали дивизию на случай конфликта."
 NZL_begin_lobbying_for_reforms: "Назначить комитеты по предложениям"
 NZL_begin_lobbying_for_reforms_desc: "Чтобы наша страна получила лучшие аспекты социального обеспечения, нам необходимо назначить специализированные комитеты для внесения предложений по пересмотру закона."
 NZL_universal_medical_benefits: "Всеобщие медицинские пособия"
 NZL_universal_medical_benefits_desc: "Предоставление всем гражданам базовых медицинских пособий — это шаг вперёд к принятию закона."
 NZL_nationalize_commerical_broadcasting: "Национализировать коммерческое вещание"
 NZL_nationalize_commerical_broadcasting_desc: "Правительство должно контролировать радио, чтобы обеспечить этичную рекламу."
 NZL_state_controlled_bank: "Создать государственные резервные банки"
 NZL_state_controlled_bank_desc: "Мы извлекли уроки из депрессии, и один из них — обеспечение безопасности банков."
 NZL_the_social_security_acts: "Закон о социальном обеспечении"
 NZL_the_social_security_acts_desc: "Лейбористская партия уже некоторое время обещает принять этот закон; он гарантирует, что Новая Зеландия будет иметь прогрессивные программы, доступные для всех."
 NZL_unenmployment_benefit: "Пособие по безработице"
 NZL_unenmployment_benefit_desc: "Одним из аспектов законопроекта о социальном обеспечении является пособие по безработице для снижения уровня бедности."
 NZL_construct_state_housing: "Строительство государственного жилья"
 NZL_construct_state_housing_desc: "Жильё для тех, кто слишком беден, чтобы купить собственный дом, необходимо для любого модернизированного государства."
 NZL_the_second_nzl_volunteer_force: "Вторые добровольческие силы"
 NZL_the_second_nzl_volunteer_force_desc: "В случае войны Новая Зеландия должна собрать войска для защиты себя и своих союзников."
 NZL_old_age_pension: "Пенсия по старости"
 NZL_old_age_pension_desc: "Обязанность правительства — заботиться о пожилых гражданах, посвятивших свою жизнь этой стране."
 NZL_open_ties_with_washington: "Установить связи с Вашингтоном"
 NZL_open_ties_with_washington_desc: "Американцы слишком важны в современном мире, чтобы их игнорировать; установление связей с ними было бы полезно."
 NZL_supply_food_stuffs: "Поставлять продовольствие в обмен на оборудование"
 NZL_supply_food_stuffs_desc: "Хотя мы, возможно, не сможем выделить много солдат или отправить оборудование, мы можем отправить помощь продовольствием, возможно, даже в обмен на оборудование."
 NZL_dedicate_men: "Направить людей на военные нужды"
 NZL_australian_nzl_agreement: "Соглашение АНЗАК"
 NZL_australian_nzl_agreement_desc: "Чтобы гарантировать наши интересы в Тихом океане, мы должны сотрудничать с нашими соседями для обеспечения мира в нашем регионе."
 NZL_national_party_triumphant: "Триумф Национальной партии"
 NZL_national_party_triumphant_desc: "Слишком долго Лейбористская партия обещала пустые программы. Национальная партия может на самом деле достичь своих целей и исправить ошибки лейбористов."
 NZL_appeal_rural_communities: "Обращение к сельским общинам"
 NZL_appeal_rural_communities_desc: "Основная база нашей партии находится в небольших сельских городках новозеландской провинции. Мы должны умиротворить их, чтобы сохранить наши позиции."
 NZL_condem_intervention: "Осуждать государственное вмешательство"
 NZL_condem_intervention_desc: "Правительство не должно вмешиваться в частный бизнес и вообще не должно вмешиваться в экономику."
 NZL_absorb_conservative_remains: "Поглотить консервативные партии"
 NZL_absorb_conservative_remains_desc: "Некоторые члены Лейбористской партии симпатизируют некоторым политикам нашей партии. Мы могли бы использовать их навыки."
 NZL_equality_conscription: "Равенство через призыв"
 NZL_equality_conscription_desc: "Коренные жители также должны призываться; их статус не освобождает их от долга перед страной."
 NZL_fight_militant_worker_union: "Борьба с воинствующими профсоюзами"
 NZL_fight_militant_worker_union_desc: "Некоторые профсоюзы не так легко успокоить повышением зарплаты, поэтому, если нам придётся их арестовать, пусть так и будет."
 NZL_tackle_inflation: "Предотвратить инфляцию"
 NZL_tackle_inflation_desc: "Мы должны принять меры против инфляции, прежде чем она действительно станет проблемой."
 NZL_war_council: "Консультативный военный совет"
 NZL_war_council_desc: "Создание военного совета с участием всех партий может повысить эффективность наших вооружённых сил."
 NZL_open_up_to_free_market: "Открыться свободному рынку"
 NZL_open_up_to_free_market_desc: "Открытие свободному рынку — главная цель нашей партии. Теперь, после нашего успеха на выборах, мы наконец можем этого достичь."
 NZL_combined_intelligence_centre: "Объединённый разведывательный центр"
 NZL_combined_intelligence_centre_desc: "Мы должны сотрудничать с Великобританией для защиты и взлома закодированных сообщений."
 NZL_construct_shore_fortification: "Строительство береговых укреплений"
 NZL_construct_shore_fortification_desc: "Мы должны подготовить наши береговые линии против любых агрессоров и обеспечить нашу безопасность."
 NZL_emerge_from_the_caves: "Объединить коммунистические движения"
 NZL_emerge_from_the_caves_desc: "Коммунистическое движение в Новой Зеландии — не более чем кучка пещерных жителей, печатающих статьи и протестующих. Чтобы получить власть, мы должны объединиться в одну партию."
 NZL_lobby_soviet: "Лоббирование в Советском Союзе"
 NZL_lobby_soviet_desc: "Советский Союз будет нашим самым важным инвестором, если мы получим власть; необходимо заручиться их поддержкой."
 NZL_the_peoples_voice: "Голос народа"
 NZL_the_peoples_voice_desc: "«Голос народа» — наш самый мощный инструмент для распространения наших идей среди масс. Давайте убедимся, что он продолжает печататься."
 NZL_invite_radical_labour_exiles: "Пригласить радикальных лейбористов-изгнанников"
 NZL_invite_radical_labour_exiles_desc: "Джон А. Ли и Билл Барнард могут симпатизировать нашему делу; их навыки и влияние не должны остаться незамеченными."
 NZL_new_wave_of_feminism: "Новая волна феминизма"
 NZL_new_wave_of_feminism_desc: "В нашем новом государстве все должны быть равны перед законом, включая оба пола."
 NZL_maori_equality: "Полное равенство маори"
 NZL_maori_equality_desc: "Народ маори подвергался угнетению слишком долго. Они заслуживают тех же прав, что и все остальные наши граждане."
 NZL_nationalize_bank: "Национализировать Банк Новой Зеландии"
 NZL_nationalize_bank_desc: "Банк Новой Зеландии должен быть национализирован для обеспечения дальнейшего экономического роста."
 NZL_public_housing: "Приоритет государственного жилья"
 NZL_public_housing_desc: "Обеспечение базовых жизненных потребностей граждан, которые не могут себе этого позволить, продемонстрирует прогрессивность нашей нации."
 NZL_encourage_selfless_citizens: "Поощрение самоотверженных граждан"
 NZL_encourage_selfless_citizens_desc: "Самоотверженность и добродетель — качества, которыми должны обладать все жители, если мы хотим выжить в этом мире. В нас нет места трусости."
 NZL_join_sov: "Союз с Советским Союзом"
 NZL_join_sov_desc: "Мы уступаем в силе и окружены враждебными соседями. Чтобы обеспечить выживание, мы должны заключить союз с чемпионами коммунизма."
 NZL_neutral: "Стабилизация внутренних дел"
 NZL_neutral_desc: "Укрепление собственной власти над страной важнее, чем вмешательство в иностранные дела."
 NZL_legion_ideals: "Возрождение идеалов Легиона"
 NZL_legion_ideals_desc: "Легиона не существует уже довольно давно, но их идеалы актуальны как никогда. Мы должны поддержать тех, кто остался от их партии."
 NZL_party_funding: "Получить финансирование партии"
 NZL_party_funding_desc: "Легион был обескровлен из-за отсутствия финансовой поддержки, мы не можем допустить той же ошибки."
 NZL_unite_party: "Объединить Легион"
 NZL_unite_party_desc: "Легион — раздробленная партия; чтобы взять власть, необходимо объединить все группы."
 NZL_the_individual: "Путь индивидуализма"
 NZL_the_individual_desc: "Отдельная личность — величайший ресурс нашей нации. Принятие личной свободы является главным пунктом нашей доктрины."
 NZL_insulationsim: "Изоляционизм в экономике"
 NZL_insulationsim_desc: "Принятие более консервативной позиции в нашей экономической политике может оказаться полезным инструментом для укрепления нашего контроля над Новой Зеландией."
 NZL_minimalize_government_spending: "Минимизация государственных расходов"
 NZL_minimalize_government_spending_desc: "Роль правительства заключается не во вмешательстве в рынок. Оно лишь снижает темпы роста и препятствует процветанию."
 NZL_maori_assimilation: "Ассимиляция маори"
 NZL_maori_assimilation_desc: "Народ маори должен научиться ассимилироваться в обществе, вместо того чтобы продолжать протесты."
 NZL_ban_poarties: "Запретить политические партии"
 NZL_ban_poarties_desc: "Политические партии только разделяют нацию. Мы все должны объединиться как соотечественники."
 NZL_join_jap: "Присоединиться к Сфере процветания"
 NZL_join_jap_desc: "Япония — восходящая держава в Азии. Присоединение к ним необходимо даже для нашей собственной защиты."
 NZL_home_defence: "Сформировать ополчение"
 NZL_home_defence_desc: "Мы должны создать силы гражданской обороны из потенциальных солдат, способных сражаться, но не оптимального возраста или состояния, для защиты родных островов."

 NZL_increased_defense_spending: "Повышенные расходы на оборону"
 NZL_increased_defense_spending_desc: "Война требует современного оборудования, и мы не можем полагаться только на разработки наших союзников."
 NZL_central_research_planning: "Централизованное планирование исследований"
 NZL_central_research_planning_desc: "Планирование экономики также подразумевает направление ученых к технологиям, которые понадобятся государству в будущем, как если бы великий разум видел будущее и выбирал лучшие варианты."
 NZL_national_research_grants: "Государственные исследовательские гранты"
 NZL_national_research_grants_desc: "Мы должны полагаться на наши инновации, которые, как известно, превосходят зарубежные. Именно так жители этих островов уничтожили опасных птиц, а не проиграли им."
 NZL_corporate_innovations: "Корпоративные инновации"
 NZL_corporate_innovations_desc: "Частный сектор умеет разрабатывать новые технологии, и конкуренция выявит лучшее в нашей стране."

 NZL_naval_equipment: "Оснащение флота"
 NZL_naval_equipment_desc: "Современный корпус — ничто без современного оборудования."

 ###################
 NZL_a_poor_army: "Недостаточно оснащенная армия"
 NZL_a_poor_army_desc: "Наша экономика недостаточно сильна, чтобы содержать армию, достаточно большую для эффективности на уровне Британии или Франции. Это оставляет наши силы в тени более сильных государств."
 NZL_destruction_of_the_lee_afair: "Разгром дела Ли"
 NZL_destruction_of_the_lee_afair_desc: "Джон А. Ли был известным политиком, известным своей радикальной стороной. Он резко критикует каждый шаг лейбористов. В ответ мы понизили его в должности, лишив слишком большой власти."
 NZL_upset_maori_population: "Недовольное коренное население"
 NZL_upset_maori_population_desc: "Коренное население уже довольно давно бунтует на улицах, в основном из-за вопросов автономии и захвата земель. Возможно, пришло время найти потенциальные решения."
 NZL_organizing_communists: "Организация коммунистов"
 NZL_stiff_opposition: "Жесткая оппозиция"
 NZL_unemployment_benefit: "Пособие по безработице"
 NZL_the_engineer_corp: "Артиллерийский полк"
 NZL_create_a_satnding_navy: "Создать постоянный военно-морской флот"
 NZL_lessons_of_the_great_war: "Уроки Великой войны"
 NZL_pilot_recruitment_drive: "Кампания по набору пилотов"
 socialist_finance_minister: "Министр финансов-социалист"
 socialist_follower: "Сторонник Ли"
 labour_party_remnant: "Остатки Лейбористской партии"
 NZL_obtain_funding: "Получить финансирование партии"
 NZL_prioritize_house: "Государственное жилье"
 NZL_fight_for_authority_over_our_troops: "Ввести призыв в армию"
 NZL_commie_tt: "Завершение этого фокуса откроет коммунистический путь на выборах"
 NZL_legion_tt: "Завершение этого фокуса откроет фашистский путь на выборах"
 
 new_zealand.1.t: "Майкл Сэвидж заболевает, будет назначен новый премьер-министр"
 new_zealand.1.d: "В условиях растущей напряженности и раздробленного состояния Лейбористской партии мы должны выбрать преемника постоянно болеющего Майкла Джозефа Сэвиджа. Питер Фрейзер проявил себя как более чем способный лидер и получил высокую поддержку как Уолтера Нэша, так и премьер-министра Сэвиджа. Однако это не останавливает оппозицию Сэвиджа во главе с Джерваном Макмилланом, которая пытается продвигать свою повестку еще активнее. Макмиллан, более противоречивый выбор, выразил симпатии экстрадированным "
 new_zealand.1.a: "Питер Фрейзер — лучшее решение для проблем лейбористов."
 new_zealand.1.b: "Умеренность Джервана Макмиллана исцелит Лейбористскую партию."
 new_zealand.1.c: "Партия слишком разделена, чтобы сделать выбор, нам нужно больше времени для принятия решения."
 new_zealand.2.t: "Майкл Джозеф Сэвидж скончался"
 new_zealand.2.d: "Премьер-министр Майкл Сэвидж сегодня скончался, заявив, что Новая Зеландия будет стоять вместе с Британией, и выразив свою поддержку нации. Герой и великий лидер, не боявшийся критиковать то, что считал неправильным, он будет нам не хватать. Теперь Лейбористская партия должна перестроиться в связи с его кончиной и подготовиться к руководству страной."
 new_zealand.2.a: "Покойся с миром."
 new_zealand.2.b: "Пусть партия сделает свои приготовления, сейчас время для нового будущего."
 new_zealand.3.t: "Всеобщие выборы 1938 года"
 new_zealand.3.d: "Две основные партии, противостоящие на этих выборах, сделали все более громкие предложения, чтобы повлиять на общественность. Лейбористская партия руководит страной уже довольно давно и пообещала принять Закон о социальном обеспечении, который гарантирует пенсии по старости и пособия по безработице. Это оказалось отличным рычагом давления на Национальную партию, которая открыто критикует политику лейбористов. Национальная партия, хотя и новая, за эти годы набрала популярность и "
 new_zealand.3.a: "Лейбористская партия должна выполнить свои обещания."
 new_zealand.3.b: "Лейбористы свое отслужили, страна должна провести необходимые изменения."
 new_zealand.3.c: "Новая Зеландия выкует свое собственное будущее, будущее народа."
 new_zealand.3.e: "Легион приведет Новую Зеландию к славе."
 new_zealand.4.t: "Остатки Легиона требуют отставки лейбористов"
 new_zealand.4.d: "После кончины премьер-министра-лейбориста Майкла Сэвиджа сторонники Легиона во главе с Джоном Ормондом начали требовать отставки видных лейбористских чиновников, таких как Питер Фрейзер и Уолтер Нэш. Правительство лейбористов, ослабленное смертью своего лидера и не имеющее четкой замены, похоже, выполняет требования Ормонда почти без сопротивления. Только время покажет, сможет ли Легион стать крупной партией в будущем Новой Зеландии."
 new_zealand.4.a: "Легион — лучшая надежда на будущее Новой Зеландии."
 new_zealand.5.t: "Коммунистические газеты распространяются по стране"
 new_zealand.5.d: "Странные газеты все активнее распространяются в крупных городах, пропагандируя новую систему, прямо противоположную идеалам остатков Легиона и Лейбористской партии. Никто не может найти источник этих газет, хотя считается, что они исходят из возможных укрытий в сельской местности. Некоторые становятся более возбужденными в результате, по всей стране вспыхивают беспорядки с требованием отставки всех государственных чиновников, а также прекращения деятельности Легиона и его лидера Ормонда. Ле"
 new_zealand.5.a: "Уйдите в отставку, коммунистов больше, чем нас."
 new_zealand.5.b: "Немедленно подавите эти беспорядки, они только ухудшат наше положение."
 new_zealand.6.t: "Генерал-губернатор сплачивает лоялистов"
 new_zealand.6.d: "Поскольку статус Новой Зеландии как доминиона поставлен под сомнение, а монархия возвращается к полной власти в Британии, многие партии предлагают независимость. Однако сильное движение лоялистов во главе с генерал-губернатором Джорджем Монктон-Арунделлом пытается укрепить контроль в стране. Это движение уже спровоцировало открытые столкновения между радикальными партиями на улицах Веллингтона, заставляя некоторых сомневаться в безопасности нации."
 new_zealand.6.a: "Пусть губернатор выдвигает свои требования, Новая Зеландия вместе с Британией."
 new_zealand.6.b: "Подавить все движения лоялистов, они представляют опасность для нашей безопасности."
 new_zealand.9.t: "Коммунисты изгоняют лейбористов и Легион"
 new_zealand.9.d: "В связи с постоянно растущей популярностью коммунистической партии люди устраивают беспорядки против недавно возрожденного Легиона, особенно после краха правительства лейбористов. Превзойденный численностью, мистер Ормонд ушел в отставку, оставив будущее Новой Зеландии в руках Коммунистической партии."
 new_zealand.10.t: "Сидни Холланд берет на себя управление"
 new_zealand.10.d: "Адам Гамильтон ушел с поста лидера Национальной партии и премьер-министра, оставив эту должность открытой для Сидни Холланда. Холланд доказал, что является достойным преемником, и заявил о намерении продолжать повестку Национальной партии."
 new_zealand.10.a: "Холланд подает большие надежды."

