 indian_provincial_election: "Индийские провинциальные выборы"
 indian_provincial_election_desc: "Индийские провинциальные выборы уже близко, и основные политические движения борются за влияние в провинциях. Результаты этих выборов, определённые в Законе об управлении Индией, станут решающим фактором для будущего субконтинента.\n\n§YИндийский национальный конгресс§! в настоящее время контролирует §Y[?inc_control]§!% провинций.\n§YЮнионистская партия§! в настоящее время контролирует §Y[?upa_control]§!% провинций.\n§YНезависимая лейбористская партия§! в настоящее время контролирует §Y[?ifb_control]§!% провинций.\n§Y[?neutral_control]§!% провинций контролируются §gПартиями меньшинства§! или находятся в тупике.\n\nЧем больше провинций контролирует победившая партия, тем легче будет..."
 indian_provincial_election_map: "Мы можем увеличить влияние нашей партии в этих штатах"
 indian_provincial_enemy_election: "Предвыборная кампания оппозиционной партии"
 indian_provincial_enemy_election_desc: "Не хватит дыхания, чтобы описать, сколько различных политических партий и организаций участвует в провинциальных выборах, и хотя наши кампании достигли впечатляющих успехов, оппозиция не дремала. Напротив, по всей Индии проходят постоянные митинги и обсуждения."
 indian_provincial_election_enemy_map: "Оппозиционная партия увеличивает своё влияние в этом штате"
 congress_majority: "Большинство Индийского национального конгресса"
 congress_majority_desc: "§O[From.GetName]§! §Wнаходится под влиянием §CИндийского национального конгресса§!\n§CИндийский национальный конгресс§! имеет влияние §G[?From.inc]§!\n§CЮнионистская партия§! имеет влияние §G[?From.upa]§!\n§CНезависимая лейбористская партия§! имеет влияние §G[?From.ifb]§!\n§gМалые партии§! имеют влияние §G[?From.neutral]§!\n"
 united_party_majority: "Большинство Юнионистской партии"
 united_party_majority_desc: "§O[From.GetName]§! §Wнаходится под влиянием §CЮнионистской партии§!\n§CИндийский национальный конгресс§! имеет влияние §G[?From.inc]§!\n§CЮнионистская партия§! имеет влияние §G[?From.upa]§!\n§CНезависимая лейбористская партия§! имеет влияние §G[?From.ifb]§!\n§gМалые партии§! имеют влияние §G[?From.neutral]§!\n"
