 neutral_stalemate_desc: "§O[From.GetName]§! §Wнаходится в патовой ситуации или контролируется §gМалыми партиями§!\n§CИндийский национальный конгресс§! имеет влияние §G[?From.inc]§!\n§CЮнионистская партия§! имеет влияние §G[?From.upa]§!\n§CНезависимая лейбористская партия§! имеет влияние §G[?From.ifb]§!\n§gМалые партии§! имеют влияние §G[?From.neutral]§!\n"

 invite_george_orwell_to_speak: "Пригласить Джорджа Оруэлла для выступления"
 invite_george_orwell_to_speak_desc: "Джордж Оруэлл, известный писатель, автор таких книг, как «Бирманские дни», давно является активным членом Британской независимой лейбористской партии, и предоставление такому эрудированному человеку трибуны может только помочь нашим идеям."
 princely_state_mod: "Княжеское государство"
 princely_state_mod_desc: "Княжеское государство — это феодальный вассал Британского Раджа, действующий с определённой степенью автономии и монархическим строем. Оно по-прежнему является частью Британского Раджа, не будет участвовать в выборах и может сопротивляться возможному объединению Индии."

 princely_state_independence_mod: "Независимое княжеское государство"
 princely_state_independence_mod_desc: "Княжеские государства были вассалами Британского Раджа. Но теперь, когда британская администрация и индийское правительство предъявили князьям необоснованные требования, они бросили вызов центральному правительству и создали свои независимые владения."

 marginalized_muslims: "Маргинализированные мусульмане"
 marginalized_muslims_0: "Угнетаемые мусульмане"
 marginalized_muslims_1: "Маргинализированные мусульмане"
 marginalized_muslims_2: "Забытые мусульмане"
 marginalized_muslims_3: "Защищённые мусульмане"
 marginalized_muslims_4: "Полноправные мусульмане"
 marginalized_muslims_desc: "Отношения между индуистами Южной Азии и мусульманами, проживающими в одной государственной структуре, всегда были напряжёнными. Из-за подавляющего большинства индуистов в Индии необходимо тщательно балансировать интересы большинства и меньшинств."

 slight_religious_minority: "Религиозные меньшинства"

 placated_muslims: "Умиротворённые мусульмане"
 placated_muslims_desc: "Мы успешно восстановили отношения с мусульманами регионов Синд, Пенджаб и Бенгалия, и теперь они гораздо более склонны к сотрудничеству."

 enraged_muslims: "Разгневанные мусульмане"
 enraged_muslims_desc: "Недавние действия нашей администрации привели в ярость мусульманское население и навсегда испортили наши отношения с ними."

 princely_state_policing_action: "[From.GetOperationName]"
 princely_state_policing_action_default: "Полицейская акция в [From.GetName]"
 princely_state_policing_action_desc: "Выходки [From.GetPrinceName] больше нельзя терпеть! Мы должны резко положить конец его средневековому царству."
 operation_or_cooldown: "Проводится или не проводилась недавно полицейская акция."
 integrated_princely_states: "Интегрированные княжеские государства"
 prince_state_force: "Открывает §Yрешения§! для захвата оставшихся §Yкняжеских государств§! военной силой."

 raj_lin_investment_running: "В настоящее время ищет инвестиции"
 RAJ_Jinnahs_Kingdom_compliance: "Интеграция наших мусульманских товарищей"
 india.411.t: "Чрезвычайно успешная операция"
 india.411.desc: "Недавно созданная индийская армия без труда прорвала жалкую оборону [?current_prince_state.GetPrinceName] из [?current_prince_state.GetName] с минимальными потерями. Его жалкое подобие страны теперь снова индийское."
 india.411.a: "Что не может сделать наша армия."
 
 india.412.t: "Успешная операция"
 india.412.desc: "Недавно созданная индийская армия провела профессиональное тактическое вторжение на земли [?current_prince_state.GetName]. Силы [?current_prince_state.GetPrinceName] были сокрушены, а потери невелики."
 india.412.a: "Хорошая работа, ребята."
 
 india.413.t: "Ужасная операция"
 india.413.desc: "Недавно созданная дезорганизованная индийская армия столкнулась с серьёзными трудностями при прорыве впечатляющей обороны [?current_prince_state.GetPrinceName] из [?current_prince_state.GetName]. После потери такого количества индийских жизней пришло время примириться и восстановить местную администрацию."
 india.413.a: "Нам нужно расширить подготовку."
 
 india.414.t: "Катастрофическая операция"
 india.414.desc: "Индийская общественность возмущена последним отчётом о потерях. То, что должно было стать мелкой полицейской акцией, превратилось в дорогостоящую битву, в которой тела индийцев громоздятся на окраинах границ [?current_prince_state.GetName]. Международные наблюдатели озадачены военной мощью, которую собрал [?current_prince_state.GetPrinceName]. Хотя [?current_prince_state.GetName] неизбежно пал, но какой ценой?"
 india.414.a: "Приведите ко мне генерала."
 
 india.415.t: "Уход британцев"
 india.415.desc: "После ухода британцев с континента, гордо после трёх веков подчинения, индийский триколор был поднят над зданием парламента в Нью-Дели. Британцы ушли, и Индия пробуждается, полная решимости идти в будущее и формировать свою судьбу."
 india.415.a: "Светлый день."
 
 india.416.t: "Уход британцев"
 india.416.desc: "После ухода британцев с континента, гордо после трёх веков подчинения, индийский триколор был поднят над зданием парламента в Нью-Дели. Но на северо-западе Индии была совсем другая история. Над зданием Ассамблеи Синда развевался исламский полумесяц на тёмно-зелёном фоне, явно не индийский флаг. Хотя наши усилия по достижению независимости следует считать монументальными, Всеиндийская мусульманская лига набрала слишком большое влияние, чтобы мы могли сохранить наши западные и бенгальские провинции. Поскольку мечта о единой Индии рухнула, давайте смотреть в будущее."
 india.416.a: "Индия, больше не единая."
 india.416.b: "Благородный способ защитить меньшинства."
 
 india.417.t: "Началась пятьдесят вторая сессия Конгресса"
 india.417.desc: "Пять лет были конструктивными для Индийского национального конгресса под руководством Джавахарлала Неру, но многие в Конгрессе жаждут нового руководства после политического доминирования Неру. Итоговые голоса подсчитаны и..."
 india.417.a: "...Неру получает ещё пять лет!"
 india.417.b: "...Прасад вступает в должность!"
 
 india.418.t: "Вопрос лидерства"
 india.418.desc: "Поскольку Сикандер Хайат Хан, к сожалению, скончался и больше не может нести бремя руководства Индией, Юнионистская партия находится в смятении, так как партия была сосредоточена вокруг государственного деятеля. Тем не менее, мы должны смотреть в будущее и обеспечить эффективное руководство на ближайшие несколько лет."
 india.418.a: "Президент Хизар Тивана!"
 
 india.419.t: "Бхопальский конгресс"
 india.419.desc: "Когда Амбедкар услышал слухи о широкой поддержке Коммунистической партии Индии на выборах, и теперь, когда его главная цель — ликвидация кастовой системы — была в значительной степени достигнута, он задался вопросом, выполнена ли его миссия и может ли новое руководство решить проблемы, которые он, возможно, не заметил. Он был уверен, что на Бхопальском конгрессе он должен публично объявить о своём решении."
 india.419.a: "Ещё пять лет!"
 india.419.b: "Возможно, новое руководство лучше послужит Индии."
 
 india.420.t: "Отчёт ЦБР - Хайдарабад"
 india.420.desc: "Центральное бюро расследований только что подтвердило, что множество крупных держав выступят в поддержку независимости Хайдарабада, тем самым легитимизируя их жалкое подобие страны. Мы должны действовать быстро, прежде чем они создадут постоянные дипломатические миссии!"
 india.420.a: "Какие же они дураки."
 
 india.421.t: "Вовлечение Индии"
 india.421.desc: "Хотя наша администрация, корабли и войска покинули Индийский субконтинент, мы решили, по крайней мере, защищать суверенитет Индии и Пакистана в переходный период. Большинство советников склоняются к полному политическому невмешательству, но гарантия того, что Индия не попадёт в чужие руки, также может быть выгодной."
 india.421.a: "Сообщите послу."
 india.421.b: "Ситуация складывается идеально."
 
 india.422.t: "Мировая арена"
 india.422.desc: "Обеспечив наше внутреннее положение, теперь, возможно, пришло время укрепить наше международное положение. Наша партия и страна были разделены по вопросу вступления в международные альянсы, но благодаря решительному руководству решение было принято. Теперь многие из наших ведущих дипломатов ждут нашего приказа о том, куда направить свой курс."
 india.422.descalt: "То, что часто кажется наиболее логичным или практичным решением проблемы, может оказаться ловушкой. Переговоры прошли не очень хорошо, и, возможно, разумнее поискать в другом месте."
 india.422.c: "Мы отправляемся в Нанкин."
 india.422.j: "Мы отправляемся в Токио."
 india.422.s: "Мы отправляемся в Бангкок."
 india.422.i: "Мы отправляемся в Тегеран."
 india.422.e: "Мы отправляемся в Аддис-Абебу."
 india.422.p: "Мы отправляемся в Карачи."
 india.422.r: "Мы отправляемся в Москву."
 india.422.it: "Мы отправляемся в Рим."
 india.422.tu: "Мы отправляемся в Анкару."
 india.422.f: "Мы отправляемся в Париж."
 india.422.sp: "Мы отправляемся в Мадрид."
 
 india.423.t: "Индия стремится присоединиться к [Root.GetFactionName]"
 india.423.desc: "После трёх веков британского господства Индия освободилась от оков колониализма и теперь вступает на новый путь. Они установили демократическое правительство и обеспечили свою внутреннюю политику, после чего задумались о том, каким будет их место на международной арене. Похоже, они пришли к выводу, что их страна получит наибольшую выгоду от союза с нами. Можем ли мы сказать то же самое?"
 india.423.a: "Конечно, можем!"
 india.423.b: "Оппортунистический захват влияния."
 
 india.424.t: "Захват власти [RAJ.GetReigningGovernment]"
 india.424.d: "При подавляющей поддержке народа [RAJ.GetReigningGovernment] неизбежно установила себя в качестве законной правящей партии Индии."
 india.424.a: "Президент Неру"
 india.424.b: "Президент Хайат Хан"
 india.424.c: "Президент Амбедкар"
 

 india.425.t: "Утрата статуса доминиона"
 india.425.d: "Из-за недавних политических событий наш статус [Root.GetName] больше не действует, и независимость будет достигнута без дополнительных уведомлений."
 india.425.a: "Вперёд."

 RAJ_AFG_Railway_Alignment: "Пенджабско-Ташкентская железная дорога"
 RAJ_AFG_Railway_Alignment_desc: "Наш новый союз с Москвой требует перевозки товаров, солдат и информации между двумя нашими родинами. Из-за Большой игры Афганистан стоит на пути этой цели. Приведение их в соответствие с нашими интересами значительно укрепит наши связи с Советами."

 raj_first_five_year_plan: "Первый этап пятилетнего плана"
 RAJ_full_speed_ahead: "Пятилетний план"
 RAJ_failed_five_year_plan: "Провал пятилетнего плана"

 RAJ_reformed_airforce_command: "Централизованное командование ВВС"
 RAJ_deterrence: "Сдерживание"
 

 india.426.t: "Предложение от [RAJ.GetFaction]"
 india.426.d: "Союз между Индией и Советским Союзом вызвал у нас естественные опасения по поводу совместной интервенции для соединения их двух экономик и армий. С текущим индийским предложением на столе [ROOT.GetLeader] эти страхи настигли Афганистан. Строительство железной дороги, соединяющей Пенджаб с центральноазиатскими республиками Советского Союза, будет полностью профинансировано двумя державами с дополнительными экономическими стимулами для нашей экономики. Обратной стороной, естественно, станет усиление контроля, оказываемого на нас Дели и Москвой.\n\nПостоянно растущая [AFG.GetCommunistParty] ясно заявила о своей позиции, требуя, чтобы правительство [AFG.GetRulingParty] приняло предложение."
 india.426.a: "Уступить давлению."
 india.426.b: "Советы не получат свой коридор."

 india.427.t: "Цели пятилетнего плана"
 india.427.d: "На столе [RAJ_Leader_Description] [RAJ.GetLeader] лежат два предложения по выполнению нашего первого пятилетнего плана. Первый план, хотя и менее амбициозный, обеспечивает больше строительных мощностей для инфраструктурных проектов и производства вооружений. Многие в нашем правительстве отдают предпочтение второму плану, в котором экономический рост секторов тяжелой промышленности получает наивысший приоритет. Утверждается, что в настоящее время мы не обладаем промышленной мощью для поддержки тех частей нашей экономики, которые приоритезированы в первом предложении."
 india.427.a: "Диверсифицировать наши цели."
 india.427.b: "Развивать промышленное производство."

 india.428.t: "Направление средств"
 india.428.d: "Бывшие княжеские государства должны найти себе равное место в Индии, наряду с бывшими провинциями, как штаты союза. Хотя наша инициатива, безусловно, старается изо всех сил достичь этой цели, экономические советники предложили более глубокие инвестиции в один из двух конкретных штатов. Хотя кажется, что то, какой из двух рекомендуется, зависит от религии советника."
 india.428.a: "Инвестировать в западный штат."
 india.428.b: "Инвестировать в центральный штат."
 
 raj_five_year_goal_tt: "В течение следующего года ожидается, что мы расширим нашу промышленность до более чем §G[?projected_factories_calc]§! §YГражданских фабрик§!.\n\nВ случае успеха дает на §Y1460§! дней:\n"
 RAJ_industrial_mismanagement: "Промышленная бесхозяйственность"
 RAJ_industrial_mismanagement_desc: "После полного провала пятилетнего плана большие группы бюрократов были уволены, и Комиссия по экономическому планированию может некоторое время восстанавливаться."

 india.440.t: "Шепот голода"
 india.440.desc: "Земли Бенгалии в последнее время находятся в застое в сельскохозяйственном производстве, несмотря на то, что население неуклонно растет, а работа очень востребована. Этот застой часто объясняется отчуждением между фермерами и землей, которую они обрабатывают, и вопиющим захватом власти землевладельцами. Это была напряженная ситуация в течение некоторого времени, но неудачные муссонные дожди могут привести к гораздо более страшной судьбе - голоду. Ясно, что Индия не может поставить зерно, необходимое для прокормления населения Бенгалии, поэтому наша единственная надежда избежать голода - это импорт иностранных товаров. Мы должны как можно яснее донести всю серьезность нашего положения до мира, иначе мы можем потерять миллионы"
 india.440.a: "У медведя есть чем поделиться."
 india.440.b: "Янки нас прикроют."
 india.440.c: "Конечно, британцы желают нам добра."
 india.440.d: "Беспочвенные слухи."

 india.441.t: "Голод в Индии"
 india.441.desc: "Из-за неудачных муссонов Индия, в частности Бенгалия, движется к голоду, и администрация взывала о нашей помощи и поставках. Если мы ответим на этот призыв, индийское правительство и население, безусловно, будут благосклонны к нашей стране. Кроме того, поставки продовольствия, конечно, являются моральным выбором, и некоторые могут сказать, нашим моральным долгом. Но то, есть ли у нас ресурсы, не морали решать."
 india.441.sov.desc: "Из-за безрассудного британского колониального управления Индия движется к голоду, и многие местные политики взывали о помощи из нашего процветающего Союза. Некоторые эксперты считают, что на карту поставлены миллионы жизней, если Индия не получит внешние поставки, чтобы прокормить свое бедствующее население. Помимо сомнительной морали отказа в этой просьбе, это также может помочь пробудить индийский народ к пренебрежению и угнетению, с которыми они сталкивались на протяжении трех столетий. Генеральный секретарь, выбор за вами."
 india.441.a: "Мы снабдим наших товарищей в Индии!"
 india.441.b: "Отправим товары, а с ними немного демократии."
 india.441.c: "Всё ради Драгоценности."
 india.441.d: "У нас нет ресурсов."

 india.442.t: "Ответ [From.GetAdjective]"
 india.442.desc: "Кажется, [From.GetLeader] серьезно обдумал свой ответ, и, к счастью для миллионов жизней, стоящих на кону, он выступил в пользу поставок продовольствия ценой собственной экономики."
 india.442.a: "Бенгалия вздыхает с облегчением"
 
 india.443.t: "Ответ [From.GetAdjective]"
 india.443.desc: "Мы получили трусливый ответ от [From.GetLeader], в котором утверждается, что у них якобы нет ресурсов, что служит оправданием тому, почему они позволят миллионам умереть напрасно. Индия этого не забудет."
 india.443.a: "Ад настал."
 colony_of_burma: "Колония Бирма"
 colony_of_burma_desc: "В 1937 году Колония Бирма была отделена от Британского Раджа и больше не находится под его управлением."
 
 india.444.t: "Начало Имперской конференции"
 india.444.desc: "После коронации король Георг VI и его супруга королева Елизавета созвали очередную Имперскую конференцию для обсуждения дел империи в такие нелегкие времена. Ожидается, что состоятся переговоры о более единой экономической и военной политике."
 india.444.a: "Заманчивое предложение."

 india.445.t: "Приглашение в СААРК"
 india.445.d: "Недавно основанный [RAJ.GetNameDef] начал работу над экономическим альянсом под названием: \\"Ассоциация регионального сотрудничества Южной Азии\\", сокращенно СААРК, для борьбы с безудержным империализмом и отсталостью в регионе. Мы получили приглашение принять участие в этом новом экономическом блоке."
 india.445.a: "Заманчивое предложение."
 india.445.b: "Мы не заменим одного эксплуататора на другого."

 india.446.t: "Визит в [PRC.GetNameDef]"
 india.446.desc: "В наших недавних усилиях по противодействию азиатскому колониализму мы сосредоточились на наших угнетенных братьях, находящихся под прямой оккупацией европейских держав. Но было бы критической слабостью игнорировать, например, народ Китая, который страдал от западного влияния, слабого управления и плохих условий жизни. Пока они не получили альтернативу в лице коммунистического движения Мао. На китайской родине мы должны решить, какую помощь китайский народ мог бы использовать."
 india.446.a: "Стрелковое оружие для защиты и освобождения Китая!"
 india.446.b: "Политическая поддержка для укрепления КНР."
 india.446.c: "Промышленная поддержка для подъема рабочих."

 india.447.t: "Прибывает поддержка [RAJ.GetAdjective]!"
 india.447.desc: "Новая демократическая, независимая, социалистическая Индия оказала нам неоценимую поддержку, которую китайский народ никогда не забудет."
 india.447.a: "Эти индийские ружья остановят угнетателей."
 india.447.b: "Эта политическая поддержка очень помогает КПК"
 india.447.c: "Эти новые предприятия поддержат китайских рабочих."

