 cold_train_tt: "§CВсе наши генералы адаптируются к условиям холодной погоды!§!"
 SOV_cold_train: "Обучение бою в Арктике"
 SOV_cold_train_desc: "Наши генералы научатся воевать с генералом Морозом, а не против него."
