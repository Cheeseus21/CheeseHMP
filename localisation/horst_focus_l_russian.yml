 GER_plan_h: "План Z"
 GER_plan_h_desc: "Линкоры типа H будут созданы на базе успешных линкоров типа «Бисмарк», но будут крупнее и оснащены более мощными 42-см орудиями."
 GER_trade_deal_with_sweden: "Торговое соглашение со Швецией"
 GER_trade_deal_with_sweden_desc: "Швеция является ценным экспортным рынком для немецкого оборудования, вооружений и услуг – нам следует дорожить этим."
 AST_british_armor_engineers: "Королевские танковые заводы"
 AST_british_armor_engineers_desc: "Наше текущее производство танков практически отсутствует. Следует построить заводы по всей стране, желательно в относительно безопасных районах."

 RAJ_british_armor_engineers: "Королевские танковые заводы"
 RAJ_british_armor_engineers_desc: "Наше текущее производство танков практически отсутствует. Следует построить заводы по всей стране, желательно в относительно безопасных районах."
 RAJ_emergency_dakka_fortifications_tt: "Мы построим §Y6 наземных укреплений§! на провинциях вдоль Даккской линии."
 RAJ_fortify_the_burma_line_tt: "Мы построим §Y3 наземных укрепления§! на провинциях вдоль первой речной линии."
 RAJ_fortify_the_burma_line: "Укрепление на Салуине"
