 RAJ_Joint_Indo_Soviet_Railways: "Совместные индо-советские железные дороги"
 RAJ_Joint_Indo_Soviet_Railways_desc: "В духе международного сотрудничества [RAJ.GetNameDef] и [SOV.GetNameDef] объединят усилия для реализации совместного железнодорожного проекта. Это будет масштабное и долгосрочное предприятие, создающее сеть железных дорог, соединяющих обе страны и способствующую экономическому росту и развитию. Это совместное усилие进一步加强ит давние взаимовыгодные отношения между нашими странами и приблизит нас к общей цели — brighter future for all. Единственное препятствие на пути взаимного процветания — политическая обстановка в [AFG.GetNameDef], но дипломатическое давление обязательно это урегулирует."
