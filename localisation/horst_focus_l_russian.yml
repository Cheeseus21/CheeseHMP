 BUL_steel_exports2: "Македонские вольфрамовые рудники"
 ENG_bomber_harris_desc: "«Вы хотите, чтобы я признал, что мы совершили ужасную вещь в Гамбурге? Ладно. Это *было* чертовски ужасно. Это было *чудовищно*! Теперь легче? Если вы не можете предложить мне альтернативные цели, которые быстрее выиграют войну, заткнитесь! Возвращайтесь к своей совести, а мне дайте вернуться к войне. Ясно?» - Харрис в ответ на протестующего священника"
 BUL_steel_exports2_desc: "С немецкими инвестициями мы сможем разработать давно заброшенные вольфрамовые рудники на западе."
