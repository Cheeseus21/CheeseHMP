 r56_RAJ_invade_afghanistan_desc: "Афганистан когда‑то был под индийским влиянием… и снова будет."
 r56_RAJ_the_mountain_frontier: "Горный фронтир"
 r56_RAJ_the_mountain_frontier_desc: "Непал и Бутан – часть полуострова, их необходимо включить в наше идеальное объединение."
 r56_RAJ_reclaim_treaty_ports: "Вернуть договорные порты"
 r56_RAJ_reclaim_treaty_ports_desc: "Понджирри и Гоа необходимо вернуть и присоединить к Матери Индии"
 r56_RAJ_bring_back_burma: "Вернуть Бирму"
 r56_RAJ_bring_back_burma_desc: "Будучи буддийской территорией, бывшей частью Воеводства, Бирма также является законной частью Великой Индии."
 r56_RAJ_unify_dravidian_lands: "Объединить Дравидские земли"
 r56_RAJ_unify_dravidian_lands_desc: "На южных территориях живут дравиды, которые ещё не присоединились к Матери Индии. Время менять это."
 r56_RAJ_operation_polo: "Операция Поло"
 r56_RAJ_operation_polo_desc: "Надо наказать Хайдарабад за объявление независимости и объединить Индию!"
 r56_RAJ_land_reform: "Земельная реформа"
 r56_RAJ_crush_hyderabad: "Завоевать Хайдарабад"
 r56_RAJ_crush_hyderabad_desc: "Муниципальная элита [HYD.GetNameDef] угнетает благочестивых индуистов. Они препятствуют полной свободе индуистов и объединению всей Индии."
 r56_RAJ_join_the_axis: "Присоединиться к странам Оси"
 r56_RAJ_join_the_axis_desc: "Общий враг англо-французского империализма объединяет Индию и новую Германию. Мы должны формализовать этот союз."
 r56_RAJ_reactivate_our_japanese_contacts: "Активировать наши японские контакты"
 r56_RAJ_reactivate_our_japanese_contacts_desc: "Китайская империя и её Сфера совместного процветания – единственные силы рядом, способные свергнуть европейские империи и всё, что с ними связано. Мы должны воспользоваться нашими старыми контактами, чтобы договориться о новых условиях союза."
 r56_RAJ_new_scientific_order: "Новый научный порядок"
 r56_RAJ_new_scientific_order_desc: "Академические сообщества Индии и наших союзников должны быть в постоянном контакте, чтобы обеспечить непрерывные инновации."
 r56_RAJ_ideological_air_force: "Идеологические воздушные силы"
 r56_RAJ_ideological_air_force_desc: "Нужно закрепить наши ценности глубоко в военно‑воздушных войсках, чтобы продвигать сотрудничество с союзниками и другими военными ветвями."
 r56_RAJ_towards_a_post_colonial_economy: "В направлении постколониальной экономики"
 r56_RAJ_towards_a_post_colonial_economy_desc: "Экономические реформы и освобождение индийского потенциала приведут к росту индийского предпринимательства."
 r56_RAJ_modernization_program: "Программа модернизации"
 r56_RAJ_modernization_program_desc: "С удалением колониальных монополий можно построить новую экономику. К 2020 году мы станем суперпаукой!"
 r56_RAJ_indian_education: "Индийское образование"
 r56_RAJ_indian_education_desc: "Колонизаторы учили нас быть послушными и слугами... Мы должны избавиться от этих инструментов властвования и использовать знания для освобождения Индии!"

 r56_RAJ_establish_a_general_staff: "Общее штаб [ROOT.GetAdjective]"
 r56_RAJ_establish_a_general_staff_desc: "Наша армия лишена надлежащих тактик и организации. Создание надлежащего общего штаба укрепит ослабленную военную структуру."
 r56_RAJ_army_reform: "Реформы армии"
 r56_RAJ_army_reform_desc: "Реорганизация армии – долгий процесс. Наш новый общий штаб требует подготовки солдат и обучения офицеров."
 r56_RAJ_doctrine_effort: "Развитие доктрины"
 r56_RAJ_equipment_effort: "Развитие снаряжения"
 r56_RAJ_equipment_effort_desc: "Пределы того, что пехота может носить, постоянно расширяются. Мы будем сосредоточены на оснащении наших войск лучшими доступными средствами."
 r56_RAJ_equipment_effort_2: "Модернизировать небольшое оружие"
 r56_RAJ_equipment_effort_2_desc: "Мы будем и дальше прилагать все усилия к тому, чтобы наша пехота и войска поддержки были обеспечены наилучшим образом."
 r56_RAJ_mechanization_effort: "Развитие механизации"
 r56_RAJ_mechanization_effort_desc: "Пересматривая возможности моторизованной пехоты, мы можем переставить пределы того, какие транспортные средства мы можем создать сегодня."
 r56_RAJ_doctrine_effort_2: "Учения"
 r56_RAJ_doctrine_effort_2_desc: "Поле боя изменилось в межвоенные годы и в последующих конфликтах. Мы должны постоянно пересматривать наши доктрины, чтобы отразить это."
 r56_RAJ_establish_a_military_academy: "Создать военную академию"
 r56_RAJ_establish_a_military_academy_desc: "Изучение доктрин и обмен военным знаниями можно облегчить в стенах новой академии."
 r56_RAJ_equipment_effort_3: "Исследования полевых частей"
 r56_RAJ_equipment_effort_3_desc: "Вместо подражания или покупки иностранного оборудования мы должны стать мировым лидером в оружии пехоты."
 r56_RAJ_doctrine_effort_desc: "Военные доктрины Великой войны, определявшие методы ведения наземного боя, безнадежно устарели. Наши лучшие умы должны разработать новую тактику и стратегию."
 r56_RAJ_army_modernization: "Модернизация армии"
 r56_RAJ_army_modernization_desc: "Чтобы выдержать самые тяжёлые военные манёвры и тренировку солдат, нужны надлежащая экипировка, инструменты и оборудование."
 r56_RAJ_motorization_effort: "Развитие транспорта"
 r56_RAJ_motorization_effort_desc: "Мобильность и защита критичны для безопасного перемещения пехоты в полевых условиях. Фокус на развитии этих функций позволит нам быстро действовать."
 r56_RAJ_establish_a_armor_corp: "Создать корпус бронетехники"
 r56_RAJ_establish_a_armor_corp_desc: "Недавно купленное иностранное военное оборудование вдохновило местных инженеров на разработку нового типа бронетехники, которая кажется быстрее, прочнее и мощнее, чем мы могли себе представить."
 r56_RAJ_field_hospitals: "Улучшить наши полевые госпитали"
 r56_RAJ_field_hospitals_desc: "Потеря талантливых и опытных солдат на поле боя недопустима в нынешних обстоятельствах."
 r56_RAJ_special_forces: "Войска специального назначения"
 r56_RAJ_special_forces_desc: "Нам нужны элитные войска; горные войска и парашютщики должны быть нашей приоритетной группой."
 r56_RAJ_signal_companies: "Сигнальные компании"
 r56_RAJ_signal_companies_desc: "Координация ударов и военных операций будет существенно более эффективной, если мы отведём дополнительного персонала с оборудованием связи."
 r56_RAJ_modern_logistics: "Современная логистика"
 r56_RAJ_modern_logistics_desc: "Военная лояльность основана на способности бороться за нашу цель. Если мы не сможем снабжать армию необходимым оборудованием, могут случиться мятежи и массовый бегство."

 r56_RAJ_expand_mazagon_dock: "Расширить верфь Мазагон"
 r56_RAJ_expand_mazagon_dock_desc: "Верфь Мазагон в Мумбае – наша главная судостроительная компания на западном побережье. Мы должны расширить ее с учетом текущего мирового кризиса."
 r56_RAJ_found_scindia_shipyard: "Построить верфь Скиндиа"
 r56_RAJ_found_scindia_shipyard_desc: "Нам нужна судостроительная компания на восточном побережье страны. Заложив верфь Скиндиа в городе Вишакхапатнам, мы упрочим будущее нашего флота."
 r56_RAJ_royal_indian_navy: "Королевский индийский флот"
 r56_RAJ_royal_indian_navy_desc: "Королевский индийский флот необходимо быстро расширить. Новые тактики и новые корабли должны стать приоритетом."
 r56_RAJ_screening_effort: "Заградительная стратегия"
 r56_RAJ_screening_effort_desc: "Индия играет важную роль в защите южного маршрута, ведущего к Суэцкому каналу. Заграждения и сопровождение судов позволят бойцам и важным грузам добраться до европейского и африканского театров боевых действий."
 r56_RAJ_cruiser_effort: "Развитие крейсеров"
 r56_RAJ_cruiser_effort_desc: "Круизеры будут достаточны на данный момент для развития и расширения индийского военно‑морского баланса."
 r56_RAJ_submarine_effort: "Строительство подводных лодок"
 r56_RAJ_submarine_effort_desc: "Япония наращивает силу своего надводного флота в Азии, поэтому нам лучше направить свою энергию в глубину и наносить удары, используя подводные лодки."
 r56_RAJ_capital_ship_effort: "Развитие крупных кораблей"
 r56_RAJ_capital_ship_effort_desc: "Являясь британским аванпостом, Индия хорошо знает, что крупные корабли – ключ к морскому владычеству. Мы должны создать собственный флот тяжелых крейсеров и линкоров."
 r56_RAJ_modernizing_navy: "Модернизация флота"
 r56_RAJ_modernizing_navy_desc: "Более современные двигатели, больше места для экипажей, более скорострельные и крупнокалиберные орудия. Индийский флот скоро будет равен по силе лучшим ВМФ континента."
 r56_RAJ_naval_equipment: "Пересмотреть военно‑морское оборудование"
 r56_RAJ_naval_equipment_desc: "Различные элементы на борту наших кораблей можно модернизировать и необходимо."
 r56_RAJ_military_technologies: "Военные технологии"
 r56_RAJ_military_technologies_desc: "Мы должны воспользоваться нашими усилиями по модернизации и инвестировать в новые технологии."

 r56_RAJ_aviation_effort: "Свободная индийская авиация"
 r56_RAJ_aviation_effort_desc: "Мы должны не только освободить нашу землю, но и освободить наши небеса!"
 r56_RAJ_fighter_focus: "Разработать истребители"
 r56_RAJ_fighter_focus_desc: "Гибкость и скорость являются ключевыми для воздушного превосходства."
 r56_RAJ_bomber_focus: "Разработать бомбардировщики"
 r56_RAJ_bomber_focus_desc: "Оффенсивные возможности и дальность – лучший способ уничтожить наших врагов."
 r56_RAJ_torpedo_bombers: "Военно‑транспортные самолёты"
 r56_RAJ_torpedo_bombers_desc: "Возможность самолётов наносить торпедарую атаку на флот будет критична для нейтрализации британского морского флота."
 r56_RAJ_aviation_effort_2: "Продвинутые воздушные тактики"
 r56_RAJ_aviation_effort_2_desc: "Новые воздушные тактики должны быть разработаны, чтобы максимизировать эффективность каждого самолёта и ограничить потери наших пилотов."
 r56_RAJ_rocket_effort: "Реактивные двигатели"
 r56_RAJ_rocket_effort_desc: "Ракетные двигатели – будущее авиации!"
 
 r56_RAJ_revolt_against_the_oppressors_showcase: "Провалить захватчиков"
 r56_RAJ_revolt_against_the_oppressors_showcase_desc: "Нам долго было отказано в нашей законной наследственности и месте под Бурящим Солнцем. Время пришло. Взбесись, братья и сестры! Взбесись, рабочие и фермеры! Каждый мужчина в каждом селе, городе или деревне должен сражаться против колонизаторов!"
 RAJ_ignore_and_then_support_hazad_hind_to_trigger_the_civil_war: "Чтобы открыть этот путь, игнорируйте угрозу, представляемую Азад Хинд, и используйте решения для укрепления их присутствия."
 r56_indian_revolt_focus: "Именительный путь фокуса Азад Хинд"
 r56_india_generic: "Общий фокусный путь Индии"


 india.500.t: "Интеграция Индии"
 india.500.desc: "Британцы не управляли Индийским субконтинентом сами, а наоборот. Большая часть земли до сих пор принадлежит старым династиям. Их личное богатство важнее благополучия народа, поэтому будет сложно интегрировать их без компромиссов и кровопролития. Мы должны обеспечить полную интеграцию этих владений во благо нашего народа."
 india.500.a: "Вперёд."

 india.501.t: "Самые слабые принцы согласились."
 india.501.desc: "Многие принцы, правившие небольшими территориями, сразу согласились передать всю свою землю Индии. Для большинства советников было очевидно, что монархи, владеющие всего несколькими квадратными милями, не захотят столкнуться с индийскими вооружёнными силами, но вы никогда не можете быть уверены."
 india.501.a: "Конечно они так делают."

 india.4270.t: "Асф Джах отказался от интеграции в Индию"
 india.4270.desc: "Асф Джах VII полностью отказался от интеграции в новое индийское правительство. Низатская династия является мусульманской, но большинство населения – индуисты, которые использовали религию как аргумент против интеграции."
 india.4270.a: "Остаток исчезающе мира."

 india.4271.t: "Хайдарабад присоединился к Индии"
 india.4271.desc: "Асф Джах VII сегодня принял решение подписать акт присоединения, тем самым объединившись с Индией."
 india.4271.a: "Победа для Индии."

 india.4410.t: "Джимму и Кашмир отказались от интеграции в Индию"
 india.4410.desc: "Сообщается, что Хари Шинг публично заявил, что он не согласится с интеграцией в Индию при текущих обстоятельствах."
 india.4410.a: "Он заплатит за это вовремя."

 india.4411.t: "Джимму и Кашмир добровольно присоединились к Индии"
 india.4411.desc: "В прошлый вечер в его дворце Хари Шинг наконец подписал акт присоединения и согласился передать Джимму и Кашмир новому индийскому правительству."
 india.4411.a: "Наша северная граница защищена."

 india.4250.t: "Майсам присуждался к объединению индийского союза"
 india.4250.desc: "25‑й мацар Мысора потребовал больше времени, чем многие, чтобы найти судьбу своего царства, но в конце концов он отказался от интеграции в Индию."
 india.4250.a: "У него слишком важное решение."

 india.4251.t: "Королевство Майсора присоединилось к Индии"
 india.4251.desc: "25‑й мацар Майсора потребовал больше времени, чем многие, чтобы найти судьбу своего царства, но в конечном итоге он мудрый достаточно, чтобы понять, что его будущее в Индии."
 india.4251.a: "Важная часть Индии!"

 india.4440.t: "Балучистан проявил стойкость"
 india.4440.desc: "Текущий кхан Калата сегодня принял поспешное и ошибочное решение оставить свои владения, запертые от индийского народа."
 india.4440.a: "Нужно защитить запад."

 india.4441.t: "Балучистан присоединился к Индии"
 india.4441.desc: "Текущий кхан Калата сегодня принял обоснованное и рациональное решение участия своих земель в Индианском союзе."
 india.4441.a: "Западная граница защищена."

 india.4370.t: "Штат Гвалпур отверг объединение"
 india.4370.desc: "Дживаджирао Синдхия, правитель штата Гвалпур, заблокировал любые идеи интеграции в Индию. Это сильно destabilизировало его царство, поскольку большинство его граждан ищут соединения с Индией."
 india.4370.a: "Мы их когда‑то освободим."

 india.4371.t: "Гвальjọрский штат приветствует объединение"
 india.4371.desc: "Живажирао Синджа из Гвальжорского штата долго и тщательно мыслил о будущем своего владения и самого себя, и благодаря нашим добросовестным уступкам решил интегрироваться в Индию."
 india.4371.a: "Славный день."

 india.4330.t: "Штат Джайпур отказывается от интеграции"
 india.4330.desc: "Седьмой махарадж Джайпура, Ман Сингх II, печально решил сохранить полный контроль над штатом Джайпур, а люди на улицах протестуют против этого эгоистичного решения."
 india.4330.a: "Как позор."

 india.4331.t: "Штат Джайпур принимает интеграцию"
 india.4331.desc: "Седьмой махарадж Джайпура, истинно интеллектуал, заметил националистические про­вал­ы к объединённой Индии и признал, что ему морально обязательно отдать свою страну одн­ом‑ьным-Индийской."
 india.4331.a: "Настоящая умная идея."

 india.4280.t: "Штат Лимбди отклоняет присоединение"
 india.4280.desc: "Даулацисинг Джасываантисинг из Штаба Лимбди, традиционный член Династии Жала, строгий консерватор, владеющий преимущественно сельскими сообществами. Неудивительно, что он придерживался своих старомодных взглядов и отказался от объединения."
 india.4280.a: "Грустная реальность."

 india.4281.t: "Штат Лимбди принимает аннексию"
 india.4281.desc: "Хотя принц штата Лимбди может быть строгим традиционалистом, он осознал геополитические последствия ошибочного решения и подписал акт о присоединении, тем самым спасая свой народ."
 india.4281.a: "Мудрое решение."


  # Focus
 SIA_resist_the_governement: "Сопротивляемся Кхана-Ратсаду"
 SIA_resist_the_governement_desc: "Правительство Кхана-Ратсаду всё чаще становится авторитарным и националистичным, а также жгучей риторикой. Сиам никогда не станет фашистской страной, и лучший способ убедиться в этом – избавиться от них!"
 SIA_the_democratic_cause: "Демократическая причина"
 SIA_the_democratic_cause_desc: "Проблема первой революции заключалась в том, что военные занимали слишком большую роль. Стремясь создать более гражданское правительство, мы добьёмся свободы и демократии, над которыми наши люди долго ждут."
 SIA_the_monarchist_cause: "Монархистская причина"
 SIA_the_monarchist_cause_desc: "Революция, конституция… Всё это не подходит нашему государству. Желание изменить систему, работающую идеально, было ошибкой, но есть время для обратного шага, начиная с восстановления трона Рамы VII, законного короля Сиама, вынужденного покинуть страну военными."
 SIA_write_a_new_constitution: "Написать новую конституцию"
 SIA_write_a_new_constitution_desc: "Новая конституция, обеспечивающая гораздо больший гражданский контроль над правительством, будет издана, чтобы навсегда избавиться от военного влияния на нашу законодательно‑правовую систему."
 SIA_restore_rama_vii: "Восстановить Раму VII"
 SIA_restore_rama_vii_desc: "Рама VII официально вернулся в Сиам и готовится к коронационной церемонии, при которой трон вернётся ему и отменится конституция 1932 г."
 SIA_closer_to_the_west: "Близость к Западу"
 SIA_closer_to_the_west_desc: "Если мы хотим защитить наши ценности свободы, нам нужны союзники, способные защитить нас от экспансионистских угроз, таких как Японская империя."
 SIA_opening_the_economy: "Открыт для бизнеса!"
 SIA_opening_the_economy_desc: "Применяя экономическую модель, схожую с многими либеральными демократиями, мы покажем, что Сиам тоже может стать местом для инвестиций."
 SIA_the_yellow_cover_dossier: "Дневник «Жёлтой оболочки»"
 SIA_the_yellow_cover_dossier_desc: "С 1933 г. Приди Панумла пытался ввести «Жёлтую финансовую» реформу, основанную на социалистической модели, чтобы смягчить последствия Великой депрессии, но король и военные противостояли ей, проводя новый переворот, чтобы ослабить гражданскую часть Кхана‑Ратсада, лояльную Приди. Теперь, когда последняя имеет полный контроль над республикой, она может реализовать свои реформы и сделать экономику выгодной для сиамцев."
 SIA_monitor_the_army: "Контроль над армией"
 SIA_monitor_the_army_desc: "Для того чтобы армия больше не захватывала власть, мы введём серьёзные реформы, в том числе приказа, чтобы солдаты подчинялись правительству, а не генералам, тем самым уменьшая их влияние."
 SIA_a_model_democracy: "Модель демократии"
 SIA_a_model_democracy_desc: "После многих лет автократического правления Сиам смог восстановиться и сейчас является одной из самых демократичных стран Азии!"
 SIA_denounce_fascism: "Осуждение фашизма"
 SIA_denounce_fascism_desc: "Фашизм – идеология, предназначенная для подавления и разделения народов. Многие люди в Кхана‑Ратсадоре были склонны к этим движениям, и нам необходимо противодействовать правительствам, стремящимся причинить народу такой же боли, как и нам."
 SIA_negociations_with_france: "Переговоры с Францией"
 SIA_negociations_with_france_desc: "Франция действительно была страной, которая больше всего сталкивалась с нами и одновременно унижала нас, особенно заставляя потерять Камбодгу или Лаос. Но это стало в эпоху нашего абсолютного монархизма. Мы изменились, и готовы подписать мирное соглашение. Взамен, возможно, получим право объединиться с нашими лаотинскими и камбоджийскими братьями?"
 SIA_boom_in_foreign_investments: "Бум иностранных инвестиций"
 SIA_boom_in_foreign_investments_desc: "Наши дипломатические манёвр приёмы принесли успешно, поскольку инвестиции существенно увеличились, усиленные новой стабильностью нашего режима. Мы находимся на пороге новой эры для нашей экономики!"
 SIA_the_british_military_mission: "Британская военная миссия"
 SIA_the_british_military_mission_desc: "Мы смогли договориться о посылке британской военной делегации. Наличие людей, которые видели военные поля по всему миру, в качестве учителей для наших солдат, будет большим преимуществом."
 SIA_a_westernised_nation: "Западный народ"
 SIA_a_westernised_nation_desc: "Мы достигли уровня исследования и развития в экономике, армии и государственных делах, сопоставимого с многими западными странами. Мы нашли своё место среди важных стран этого мира"
 SIA_the_oligarchic_governement: "Олигархическое правительство"
 SIA_the_oligarchic_governement_desc: "WIP"
 SIA_supreme_council: "Верховный Государственный Совет"
 SIA_supreme_council_desc: "Высший Совет штата Сиам был законодательным советом, состоящим из принцев династии Чакри, чтобы помочь Раме VII в его решениях. Переселение позволит нам окружить компетентными и важными чиновниками в такие трудные времена."
 SIA_municipalism: "Муниципализм"
 SIA_municipalism_desc: "Прахапибан или муниципализм - концепция, которую Рама VII разрабатывал уже несколько лет. Муниципалитетам будет позволено собирать свои налоги и иметь собственный бюджет"
 SIA_consolidate_Khana_Ratsadon: "Укрепление Кхана‑Ратсада"
 SIA_consolidate_Khana_Ratsadon_desc: "Несмотря на многочисленные оппозиции, правительство Пхарайя Пхаонпонпайухасены удалось укрепить контроль над Сиамом. Своей милитаристской и однопартийной политикой Сиам, кажется, постепенно скользят к собственной адаптации европейского фашизма или японского милитаризма"
 SIA_increase_the_artistic_propaganda: "Усилить художественную пропаганду"
 SIA_increase_the_artistic_propaganda_desc: "В течение нескольких лет на уровне культуры прилагаются великие усилия, чтобы развить националистический дух среди нашего населения. Фильмы, театральные пьесы, всё подготовлено для того, чтобы тайцы развивали воинский дух, и в ответ мы можем значительно увеличить число рекрутов"
 SIA_weaken_the_civilian_wing: "Ослабить гражданскую часть"
 SIA_weaken_the_civilian_wing_desc: "Гражданская часть партии была лишь очередным препятствием на пути нашего пути, обвиняя сильное военное присутствие и желая более пацифисткую внешнюю политику. Очевидно, что реорганизация партии необходима, чтобы устранить любой риск разделения."
 SIA_fate_of_the_monarchy: "Судьба монархии"
 SIA_fate_of_the_monarchy_desc: "Многие помнят протесты Рамы VII против правительства, которые в итоге привели его к изгнанию. Некоторые голоса в партии требуют полного отмены монархистских институтов, но другие опасаются, что создание республики может способствовать развитию демократических или коммунистических движений."
 SIA_phibun_ascension: "Восхождение Пхибуна"
 SIA_phibun_ascension_desc: "Маршал Плак Пхибунсонграм, бывший министр обороны и второй по важности во власти, кажется, хорошо подходит для руководства нашим государством. Его идеалы похожи на некоторые европейские фашистские движения, такие как в Италии или Германии. Пхибун – великий патриот, желающий возврата тайцев к европейским империалистам, которые никогда не прекращали распылять и разделять этот народ."
 SIA_anti_chinese_rethoric: "Анти‑китайская риторика"
 SIA_pan_thai_propaganda: "Маха Анахак Тай"
 SIA_pan_thai_propaganda_desc: "Маха Анахак Тай, означающий «Великая тайская империя», – концепция, разработанная Луанг Вичитватаканом, верным сторонником Пхибуна и националистом-идеологом. Если мы хотим, чтобы тайцы были среди великих держав, мы должны начать с объединения нашего народа, несправедливо разделённого западными империалистами."
 SIA_economic_nationalism: "Экономический национализм"
 SIA_economic_nationalism_desc: "Мы должны достичь экономической самодостаточности и избавиться от китайского капитала, знака зависимости от народа, который не наш. Налоги на коммерческие прибыли будут повышены, а государственные компании, особенно связанные с вооружением, будут введены."
 SIA_dictatorial_control: "Диктаторский контроль"
 SIA_dictatorial_control_desc: "Теперь, когда большинство наших соперников арестованы или изгнаны, Пхибун сможет устроить Таиланд, как он видит это, не рискуя, чем бы он подвергается."
 SIA_prepare_for_the_reconquest: "Подготовиться к восстановлению"
 SIA_prepare_for_the_reconquest_desc: "Подготовка к восстановлению наших территорий, которые мы потеряли десятилетия назад, потребует больших усилий со стороны правительства и тайцев. Огромная пропаганда по работе в военной индустрии и карьере будет использована для того, чтобы убедиться, что мы готовы к войне"
 SIA_choosing_a_side: "Обмен секретами индустрии"
 SIA_choosing_a_side_desc: "Чтобы победить империалистические державы, нам нужны союзники с похожими целями, как и у нас. На востоке – Япония, которой выгодно находиться рядом и иметь флот, способный противостоять Британии, с их помощью мы получим лучшие оружия для достижения целей."
 SIA_increase_the_military_budget: "Увеличить военный бюджет"
 SIA_increase_the_military_budget_desc: "Все наши экономические усилия будут инвестированы в создание военного арсенала, способного обеспечить наших солдат современным оружием, чтобы они могли противостоять нашим противникам."
 SIA_retake_our_lands: "Взять наши земли снова"
 SIA_retake_our_lands_desc: "Пора убрать этот след в нашей истории, который был колонизацией многих наших бывших земель европейцами. Скоро мы объединим всех тайцев и подтвердим статус силы в Азии и мире!"
 SIA_winds_of_the_revolution: "Ветра революции"
 SIA_winds_of_the_revolution_desc: "Коммунистические движения получают всё большую поддержку в Азии. Если мы действительно хотим освободить наш народ, мы должны победить капитализм, который не перестаёт подавлять народы колониальными империями."
 SIA_massive_land_reforms: "Масштабные земельные реформы"
 SIA_massive_land_reforms_desc: "В течение веков крестьяне страдали от феодальных систем, где земля, которую они культивируют, даже не принадлежала им. Мы исправим это зло, национализировав землю и перераспределив её справедливо тем, кто её культивирует."
 SIA_finding_allies: "Найти союзников"
 SIA_finding_allies_desc: "Чтобы завершить революцию в Азии и в мире, мы должны искать поддержку других коммунистических стран, особенно Советского Союза, давно считавшегося родиной и оплотом революции."
 SIA_the_socialist_secret_police: "Коммунистические тайные службы"
 SIA_the_socialist_secret_police_desc: "Чтобы защитить нашу страну от любых потенциальных контрреволюционных элементов, мы создадим полицейские силы, посвящённые контрразведке и наблюдению за людьми, считающимися опасными."
 SIA_remove_the_monarchist_system: "Удалить монархический режим"
 SIA_remove_the_monarchist_system_desc: "Декладущий монархизм - символ угнетения народа Сиама, который долгие годы ждёт, что лидер будет поколён в королевской семье. Наша новая революция все уничтожит и заменит этот режим истинной мерриканческим."
 SIA_defending_the_revolution: "Защита революции"
 SIA_guerilla_units: "Гайморские подразделения"
 SIA_guerilla_units_desc: "Все наши люди должны научиться сражаться и сопротивляться капиталистическим силам, пытающихся остановить нашу славную революцию. Мы должны вооружить народ, чтобы каждый мог выполнить свой патриотический долг защитить революцию!"
 SIA_housing_program: "Программа жилья"
 SIA_establish_a_new_bureaucracy: "Создать новую бюрократию"
 SIA_revolutionnary_education: "Революционное образование"
 SIA_revolutionnary_education_desc: ""
 SIA_crush_the_remaining_capitalists: "Разрушить оставшихся капиталистов"
 SIA_crush_the_remaining_capitalists_desc: "Мы почти завершили избавление от последних капиталистических элементов, которые отравляли нашу страну. Банки будут национализированы, а также все фабрики, и, наконец, фермы"
 SIA_army_purge: "Пурга армии"
 SIA_army_purge_desc: "Армия, по-видимому, ещё состоит из элементов, верных монархии или Кхана‑Ратсада. Для блага революции необходимо провести чистку, чтобы не показался контрпутчер."
 SIA_disturb_indochina: "Порушение Индокита"
 SIA_disturb_indochina_desc: "Наши индокитайские товарищи уже много лет лжут против французского колонизированного региона. Предоставляя им официальную поддержку, будь то политический или военный, мы можем вступиться за вырывание могущественной революционных безделий."
 SIA_exporting_the_revolution: "Перевозка революции"
 SIA_bring_the_revolution_to_asia: "Переннохождение революции"
 SIA_bring_the_revolution_to_asia_desc: "Многие народы всё ещё страдают избыточной колониальной громой по рифакторде,  позволяя насёнрань  ."
 SIA_a_new_bastion_of_communism: "Новый бастион коммунизма"
 SIA_a_new_bastion_of_communism_desc: "Наша революция укоренилась в сознании сиамского народа. Мы доказали, что коммунистическая революция может функционировать даже в нашей стране."
 SIA_the_siamese_leap_forward: "Сиамский Прыжок Вперед"
 SIA_the_siamese_leap_forward_desc: "Настало время начать план по модернизации всего общества и страны, чтобы в долгосрочной перспективе достичь максимально полного равенства и перейти к более справедливому обществу."
 SIA_begin_industrialisation_projects: "Начать Индустриализацию"
 SIA_end_the_depression: "Прекратить Рекреацию"
 SIA_end_the_depression_desc: "Великая депрессия сильно отразилась на наших экспортных поставках, особенно рисе, и вызвала резкое инфляционное повышение. Через различные экономические реформы и смену экспортных партнёров мы смогли восстановить экономический уровень, сопоставимый с до кризиса."
 SIA_begin_industrialisation_plans: "Развитие Индустриализации"
 SIA_begin_industrialisation_plans_desc: "Создание промышленного комплекса необходимо, если мы хотим сохранять экономическую конкурентоспособность. Будущее не только в полях, но и в фабриках."
 SIA_increase_the_education_budget: "Увеличить Бюджет Образования"
 SIA_increase_the_education_budget_desc: "В течение нескольких десятилетий предпринимаются усилия, чтобы предоставить большему числу населения доступ к образованию. Увеличив бюджет публичного образования, мы гарантируем рост числа выпускников ежегодно."
 SIA_improve_our_roads: "План Развития Дорог"
 SIA_improve_our_roads_desc: "В некоторых регионах инфраструктура ещё довольно недоразвита, что существенно замедляет их экономический потенциал. Запустив крупный проект по улучшению этих дорог, мы сможем усилить государственный контроль в этих районах."
 SIA_improve_the_rubber: "Улучшить Извлечение Гума"
 SIA_improve_the_rubber_extraction: "Улучшить Извлечение Гума"
 SIA_develop_rubber_extraction: "Развитие Извлечения Гума"
 SIA_develop_rubber_extraction_desc: "Гум - благоприятный ресурс в Сиаме. Уже существует множество объектов по его сбору, но их можно значительно улучшить с точки зрения выхода."
 SIA_electronic_research: "Электронные Исследования"
 SIA_electronic_research_desc: "Электроника развивается с высокой скоростью и может занять важное место в следующей войне. Глобализация в этой области может оказаться выгодной…"
 SIA_abandon_the_gold_standard: "Отказ от золотого стандарта"
 SIA_attract_investments: "Привлечь Инвестиции"
 SIA_attract_investments_desc: "Показав готовность модернизировать страну и предложив политику, благоприятную для иностранных инвестиций, мы сможем начать строить индустриальный арсенал."
 SIA_state_sponsored_civilian_construction: "Государственная Конструкция"
 SIA_state_sponsored_civilian_construction_desc: "Роль правительства — строить фабрики, которые могут использоваться для производства гражданских материалов, а также улучшать здания."
 SIA_dig_for_tungsten: "Свернуть Тантал"
 SIA_dig_for_tungsten_desc: "Наши подземные помещения наполнены металлами, особенно танталом, материалом, необходимым для производства некоторого военного оборудования. Его добыча позволит нам быть менее зависимыми от мировой торговли при производстве артиллерии и другого аппарата, требующего его."
 SIA_electrification_effort: "Завернуть Электрификацию"
 SIA_electrification_effort_desc: "Электричество ещё относительно недоступно в самых сельских районах страны. Развивая производство и распределение энергии, мы сможем строить заводы в других регионах."
 SIA_urbanisation_effort: "Побуждать Урбанизацию"
 SIA_urbanisation_effort_desc: "Большая часть населения всё ещё состоит из фермеров, что делает их недоступными для наших фабрик. Создав программу строительства жилья в крупнейших городах и мотивируя людей переезжать, мы увеличим рабочую силу для наших фабрик."
 SIA_open_new_universities: "Открыть Новые Университеты"
 SIA_open_new_universities_desc: "Рост городской популяции привел к увеличению спроса на места в университетах. Это наша обязанность — строить новые учебные заведения, чтобы все желающие получить высшее образование могли это сделать."
 SIA_artillery_factories: "Артиллерийские Заводы"
 SIA_artillery_factories_desc: "Обладая необходимыми ресурсами для строительства артиллерийских объектов, стоит воспользоваться возможностью создать заводы, посвящённые их производству."
 SIA_armament_effort: "Взвод Продвижения Обороны"
 SIA_establish_military_factories: "Создать Военные Заводы"
 SIA_establish_military_factories_desc: "Создание реального промышленного комплекса, способного обеспечить все необходимое оборудование для наших войск, необходимо для выживания в следующей войне."
 SIA_second_siamese_revolution: "Вторая Сиамская Революция"
 SIA_second_siamese_revolution_desc: "Кхана Ратсадон воспользовался окончанием абсолютной монархии, чтобы навязать свою тиранию сиамскому народу. Похоже, что нужна новая революция, чтобы избавить Сиам от тиранистов."
 SIA_naval_developement_plan: "План Военно-Морского Развития"
 SIA_naval_developement_plan_desc: "Морская война продолжает оставаться ключевым элементом конфликта, укрепляемый нашей позицией, делая нас уязвимыми к возможным морским погони. Создание флота, способного потенциально сопротивляться вражескому флоту, является необходимым."
 SIA_reform_our_tactics: "Реформировать Тактику"
 SIA_reform_our_tactics_desc: "Независимо от времени, победа в морском сражении принадлежит тому, кто владеет самыми крупными и сильными кораблями. Сфокусировав нашу политику качества, мы сможем лучше защищать наши побережья."
 SIA_adopt_new_tactics: "Принять Новые Техники"
 SIA_adopt_new_tactics_desc: "Недавнее технологическое развитие полностью изменило лицо морской войны. Подводные, радарные, минные, если мы хотим устоять, нам нужно адаптироваться к этим новым технологиям."
 SIA_quality_over_quantity: "Качество, а не количество"
 SIA_quality_over_quantity_desc: "Победа заключается в создании кораблей, способных выдержать любой другой корабль. Необходима модернизация туземных кораблей."
 SIA_develop_naval_fortifications: "Развитие Военно-Морских Оборонительных Структур"
 SIA_develop_naval_fortifications_desc: "Если враг потопит наш флот, мы будем готовы защищать порты, чтобы отразить любую потенциальную морскую инвазий!"
 SIA_modernise_our_battleships: "Модернизировать Наши Титаны"
 SIA_modernise_our_battleships_desc: "Титаны — то, чего нам нужен флот. Мощные, стойкие, с ними мы не ошибемся."
 SIA_study_submarines: "Изучить Подводные Корабли"
 SIA_study_submarines_desc: "Подводная война позволит нам нарушить или даже обрезать линии поставок врагов, а также атакуя некоторые из его крупнейших кораблей скрытно."
 SIA_naval_mass_production: "Массовое Производство Водоемов"
 SIA_naval_mass_production_desc: "Успех флота заключается в способности всегда стоять и эффективно преследовать врагов. Сосредоточив внимание на массовом производстве, мы сможем поддерживать постоянное морское присутствие."
 SIA_develop_cruisers: "Развитие Крейсеров"
 SIA_develop_cruisers_desc: "Развитие крейсеров необходимо для поддержки нашего подводного флота."
 SIA_destroyers_effort: "Сборка Разрушителей"
 SIA_destroyers_effort_desc: "Чтобы защититься от вражеских подводных лодок, необходимо развивать специальные корабли, посвященные их отслеживанию и уничтожению."
 SIA_establish_a_naval_college: "Создать Военно-Морской Колледж"
 SIA_establish_a_naval_college_desc: "Чтобы убедиться, что у нас не иссякнет квалифицированный персонал моряков, мы создадим новый морской учебный центр."
 SIA_naval_fortifications: "Военно-Морские Оборонные Структуры"
 SIA_naval_fortifications_desc: "Если наш флот будет отключён, мы должны построить защиту в портах, чтобы избежать морских инвазий."
 SIA_increase_the_naval_production: "Строительство кораблей"
 SIA_increase_the_naval_production_desc: "Наша производство судов явно недостаточно. Организовав строительство новых верфи, мы сможем увеличить производство."
 SIA_increase_navy_fundings: "Увеличить Финансирование Флота"
 SIA_increase_navy_fundings_desc: "Нужно выделить большую часть бюджета на модернизацию флота, чтобы он имел все необходимые ресурсы."
 SIA_army_reform_plan: "План Реформы Войска"
 SIA_army_reform_plan_desc: "Наша армия не сталкивалась с новыми конфликтами после Великой Войны, поэтому она не очень актуальна по сравнению с армиями других стран в регионе. Принятие современного оборудования и использование новых технологий, таких как танки, необходимо."
 SIA_new_rifles: "Новые Бинты"
 SIA_new_rifles_desc: "Бинт всегда был превосходным оружием солдата. Мы не можем позволить себе использовать устаревшие бинки – поэтому нужно разрабатывать новые модели."
 SIA_listen_to_new_officers: "Слушать Новых Офицеров"
 SIA_listen_to_new_officers_desc: "Война постоянно меняется, новые тактики появляются, а старые отбрасываются. Придавая больше внимания идеям новых офицеров, мы избежим использования тактик, которые больше не нужны."
 SIA_jungle_training: "Подготовка к войне в джунглях"
 SIA_jungle_training_desc: "Специальная подготовка для джунглей позволяет лучше защищаться в известной нам среде."
 SIA_improve_logistics: "Улучшить Логистику"
 SIA_improve_logistics_desc: "Возможность правильно перемещать военные войска и их оборудование крайне важна в позиционной войне. Развитие технологий, таких как радио, поможет нам лучше координировать армии."
 SIA_artillery_developement: "Развитие артиллерии"
 SIA_artillery_developement_desc: "Добавление артиллерийских резервов к нашей армии даст ей гораздо лучшую способность пробиваться, чего нам крайне нужно."
 SIA_anti_tank_research: "Антитанковые Исследования"
 SIA_anti_tank_research_desc: "Трудно будет противостоять танкам простыми ружьями, что делает необходимым разрабатывать новое оружие, способное пробивать броню."
 SIA_tanks_research: "Идентификация Танк"
 SIA_study_tanks: "Изучить Танк"
 SIA_study_tanks_desc: "Танки – это дорогостоящая технология, но её эффективность трудно оспорить. Разработка собственных моделей должна стать приоритетом."
 SIA_improved_r_d: "Улучшенное НИОКР"
 SIA_improved_r_d_desc: "С течением времени технологический прогресс становится всё более важным для победы в войнах. Увеличив поставки в НИОКР, мы увеличим нашу исследовательскую мощность."
 SIA_doctrines_improvement: "Улучшение Доктрин"
 SIA_doctrines_improvement_desc: "Нужно определить чёткую стратегию для армии и сосредоточить все усилия на улучшении этой же стратегии."
 SIA_national_mobilisation: "Национальная Мобилизация"
 SIA_national_mobilisation_desc: "Нужно ввести более строгий призыв, чтобы не исчерпать резервистов."
 SIA_ready_for_war: "Готов к Войне"
 SIA_ready_for_war_desc: "Наша армия наконец готова столкнуться с следующими конфликтами. Враг дрожит при виде наших солдат!"
 SIA_the_siamese_air_force: "Сиамская Военно-Воздушная Сила"
 SIA_the_siamese_air_force_desc: "Авиация – настоящая революция, как в гражданском, так и в военном плане, с самолетами, способными к разведке или бомбежкам. Необходимо построить настоящую авиацию, чтобы противостоять вражеской военной авиации!"
 SIA_build_new_airports: "Построить Новые Аэропорты"
 SIA_build_new_airports_desc: "Прежде чем начать производство всех наших самолетов, необходимо строить авиационные базы, откуда мы сможем их посылать."
 SIA_rule_the_skies: "Победить Небеса"
 SIA_rule_the_skies_desc: "Нам необходимо думать об защите наших войск и инфраструктуры, развивая всё более быстрые самолёты, способные атаковать вражеские бомбер."
 SIA_death_from_the_skies: "Смерть с небес"
 SIA_death_from_the_skies_desc: "Развивая более мощные бомбы, мы могли бы нанести ущерб инфраструктуре врага, чтобы нарушить его промышленность и снабжение."
 SIA_establish_aviation_school: "Создать Авиационную Школу"
 SIA_establish_aviation_school_desc: "Университет, посвящённый обучению будущих пилотов, необходим для обеспечения того, чтобы люди, управляющие нашими машинами, были максимально квалифицированными."
 SIA_anti_air_protection: "Защита От Птиц"
 SIA_anti_air_protection_desc: "Мы можем не разгонять всех вражеских самолетов по нашему собственному. Поэтому мы собираемся строить наземные пулемёты, которые могут использоваться с наземной позиции, чтобы поддерживать их."
 SIA_long_range_fighters: "Истребители дальнего действия"
 SIA_long_range_fighters_desc: "Нужны быстрые охотники! Более мощные! И что дальше!"
 SIA_troops_destruction: "Уничтожение войск"
 SIA_troops_destruction_desc: "Мы можем причинить огромный вред враждующему войску, нападая сверху, что облегчает наземный бой."
 SIA_a_new_bureaucracy: "Новая Бюрократия"
 SIA_ensure_loyalty_in_the_army: "Обеспечить Лояльность в Армии"
 SIA_ensure_loyalty_in_the_army_desc: "Армия была главной силой государственного переворота 1932 года, доказав наличие нелояльности в её рядах. После суда над главными зачинщиками первого переворота мы должны будем гарантировать, что в армии больше не осталось предателей."
 SIA_a_new_bureaucracy_desc: "Бюрократия, созданная военными, совершенно не подходит для нужд нашего королевства. Нам придётся переписать порядок работы многих юрисдикций."
 SIA_the_devoted_king: "Преданный Король"
 SIA_the_devoted_king_desc: "Рама VII — добрый король, желающий своему народу только лучшего. Он читает петиции и выслушивает людей. Это укрепляет доверие народа к монархии, в чём мы отчаянно нуждаемся в эти неспокойные времена."
 SIA_stay_on_guard: "Быть начеку"
 SIA_stay_on_guard_desc: "В эти неспокойные времена любой союзник может пасть, и любой может стать нашим врагом. Придерживаясь прагматичной внешней политики, мы сможем адаптироваться к геополитическим изменениям и, возможно, пережить следующую войну."
 SIA_the_royal_cult: "Культ Монархии"
 SIA_the_royal_cult_desc: "Рама VII — добрый король, желающий своему народу только лучшего. Он читает петиции и выслушивает людей. Это укрепляет доверие народа к монархии, в чём мы отчаянно нуждаемся в эти неспокойные времена."
 SIA_surpass_the_nobility: "Превзойти Знать"
 SIA_surpass_the_nobility_desc: "Мы не должны забывать контролировать знать и не допускать, чтобы она получила слишком большое влияние в правительстве. В конце концов, они должны отвечать перед королём и только перед ним."
 SIA_royal_youth_leagues: "Королевские Молодёжные Союзы"
 SIA_the_royal_research_foundation: "Королевский Исследовательский Фонд"
 SIA_the_royal_research_foundation_desc: "Создание новой исследовательской организации, напрямую отвечающей на запросы Короля о военном и технологическом прогрессе, улучшит наш имидж в интеллектуальных кругах страны."
 SIA_a_better_kingdom: "Лучшее Королевство"
 SIA_a_better_kingdom_desc: "Своими реформами и решениями Рама VII продолжил традиции своих предшественников и сделал Сиам современным и более справедливым государством. Мы стоим на пороге новой эры для нашей страны!"
 SIA_cement_sector_improvement: "Цементная Промышленность"
 SIA_cement_sector_improvement_desc: "Цемент — один из наших основных несельскохозяйственных экспортных товаров. Финансово поддерживая компании, занимающиеся его производством, мы обеспечим создание всё большего количества рабочих мест в этом секторе."
 SIA_ammunitions_production: "Производство Боеприпасов"
 SIA_ammunitions_production_desc: "Наши мощности по производству боеприпасов больше не достаточны. Необходимо создать новые заводы, специализирующиеся на их выпуске, чтобы наши войска не испытывали в них нужды."
 SIA_mechanization_of_agriculture: "Механизация Сельского Хозяйства"
 SIA_mechanization_of_agriculture_desc: "Большинство наших граждан — фермеры. Наш долг — помочь им в их труде, облегчив доступ к новым технологиям, таким как трактора."
 SIA_wellfare_program: "Программа Социального Обеспечения"
 SIA_wellfare_program_desc: "Долг государства и избранных представителей — максимально улучшать условия жизни своего народа. Мы проведём реформы, чтобы сделать образование и медицинскую страховку бесплатными, помогая тем, кто больше всего в этом нуждается."
 SIA_the_war_has_changed: "Война Изменилась"
 SIA_the_war_has_changed_desc: "За последние годы мы стали свидетелями развития множества технологий, которые были нам неизвестны во время Великой войны. Необходимы исследования этих новых изобретений."
 SIA_import_foreign_tanks: "Импорт Иностранных Танков"
 SIA_import_foreign_tanks_desc: "Нам следует попытаться договориться с иностранными державами о приобретении танков, после чего изучить их и попытаться создать собственные модели."
 SIA_terrain_analysis: "Анализ Местности"
 SIA_terrain_analysis_desc: "Изучение местности необходимо, если война придёт к нашим границам. Мы должны быть готовы использовать любую возможность, которую даёт наша окружающая среда, чтобы получить преимущество над врагом, который её не знает."
 SIA_support_our_troops: "Поддержка Наших Войск"
 SIA_support_our_troops_desc: "Компании, занимающиеся не боевыми действиями, а помощью нашим войскам — разведкой, фортификацией или управлением снабжением — позволят нашим солдатам проявить свои способности наилучшим образом."
 SIA_royal_thai_marines: "Королевская Морская Пехота Таиланда"
 SIA_royal_thai_marines_desc: "Мы окружены водой, поэтому мы должны максимально использовать это и создать подразделения, специализирующиеся на боевых действиях в морской среде."
 SIA_a_faster_army: "Более Быстрая Армия"
 SIA_a_faster_army_desc: "Использование моторизованной пехоты может быть интересно в ситуациях, где скорость является решающим фактором победы, например, на равнинной малайской местности."
 SIA_remembering_the_great_war: "Вспоминая Великую Войну"
 SIA_remembering_the_great_war_desc: "Мы отправили экспедиционный корпус для сражений в Европе во время Великой войны, и он привёз с собой большой опыт в тактике ведения боя, используемой великими державами. Нам следует использовать эти знания в нашем плане модернизации армии."
 SIA_a_cannon_on_a_car: "Пушка на Автомобиле"
 SIA_a_canon_on_a_car: "Пушка на Автомобиле"
 SIA_a_canon_on_a_car_desc: "Наша моторизованная пехота может стать гораздо более эффективной и грозной, если обеспечить её более мощным вооружением, например, ракетами."
 SIA_adapt_to_the_new_conflicts: "SIA_adapt_to_the_new_conflicts"
 SIA_adapt_to_everything: "Адаптироваться ко Всему"
 SIA_adapt_to_everything_desc: "Мы должны постоянно уметь адаптироваться к тактике противника, чтобы нас не застали врасплох."
 SIA_negotiations_with_france: "Переговоры с Францией"
 SIA_negotiations_with_france_desc: "Верно, что Франция была нацией, которая чаще всего противостояла нам и в то же время унижала нас, в частности, заставив потерять Камбоджу и Лаос. Но это было во времена нашей абсолютной монархии. Мы изменились и готовы подойти к Франции с миром. Взамен, возможно, мы сможем воссоединиться с нашими лаосскими и камбоджийскими братьями?"
 SIA_welfare_program: "Программа Социального Обеспечения"
 SIA_welfare_program_desc: "Долг государства и избранных представителей — максимально улучшать условия жизни своего народа. Мы проведём реформы, чтобы сделать образование и медицинскую страховку бесплатными, помогая тем, кто больше всего в этом нуждается."
 SIA_cultural_revolution: "Культурная Революция"
 SIA_cultural_revolution_desc: "Будет введён ряд мандатов, направленных на обновление и модернизацию тайской культуры. Страна будет переименована в «Таиланд», что означает «Земля тайцев»; жителей будут поощрять говорить на тайском языке, а не на местных наречиях; дресс-код будет модернизирован, чтобы приблизиться к европейскому... Это покажет, что тайский народ — цивилизованная и развитая нация."
 SIA_the_cult_of_the_marshall: "Культ Маршала"
 SIA_the_cult_of_the_marshall_desc: "Пибун стал образцом добродетели, мужества и преданности нации. Благодаря своим вдохновляющим речам, обещаниям и действиям по защите конституционализма от роялистских или коммунистических заговорщиков он стал духовным лидером, превзойдя даже короля."
 SIA_eliminate_songsuradet: "Изгнать Сонгсурадета"
 SIA_eliminate_songsuradet_desc: "Пхрайя Сонгсурадет, хотя и отошёл от политической жизни, всё ещё играет важную роль в армии. Чтобы помешать ему строить заговоры против правительства, все его военные обязанности будут отняты, и он будет выслан из страны. Близкие к нему люди, такие как принц Рангсит Праюрасакди, будут арестованы и предстанут перед судом."
 SIA_replace_the_national_hymn: "Заменить Государственный Гимн"
 SIA_replace_the_national_hymn_desc: "Новый государственный гимн, названный просто «Тайский государственный гимн», написанный Пхра Чендуриянгом и Луангом Саранупрафаном, подчёркивающий милитаризм и жертвенность тайской расы, будет введён, чтобы со временем полностью заменить старый королевский гимн. Воодушевлённые патриотической песней, мы дадим нашим войскам всю необходимую мотивацию для восстановления славы нашего народа."
 SIA_replace_the_national_anthem: "Заменить Государственный Гимн"
 SIA_replace_the_national_anthem_desc: "Новый государственный гимн, названный просто «Тайский государственный гимн», написанный Пхра Чендуриянгом и Луангом Саранупрафаном, подчёркивающий милитаризм и жертвенность тайской расы, будет введён, чтобы со временем полностью заменить старый королевский гимн. Воодушевлённые патриотической песней, мы дадим нашим войскам всю необходимую мотивацию для восстановления славы нашего народа."
 SIA_spiritual_mobilisation: "Мобилизовать Ювачон Тхахан"
 SIA_spiritual_mobilisation_desc: "Ювачон Тхахан — это военная молодёжная организация, основанная Пибаном в 1934 году. Теперь, когда война близка, мы должны мобилизовать их и отправить на фронт."
 SIA_the_cult_of_the_marshal: "Культ Маршала"
 SIA_the_cult_of_the_marshal_desc: "Пибун стал образцом добродетели, мужества и преданности нации. Благодаря своим вдохновляющим речам, обещаниям и действиям по защите конституционализма от роялистских или коммунистических заговорщиков он стал духовным лидером, превзойдя даже короля."
 SIA_our_own_democracy: "Наша Собственная «Демократия»"
 SIA_our_own_democracy_desc: "Рама VII знает, как установить систему демократии, которая будет работать для такой страны, как Сиам. Такие реформы, как «всеобщее избирательное право», не нужны и могут принести больше вреда, чем пользы."
 SIA_the_only_true_guide: "Единственный Истинный Путеводитель"
 SIA_the_only_true_guide_desc: "Требования, такие как «всеобщее избирательное право», имеют мало смысла для нашей нации. Король и знать обладают всеми необходимыми навыками, чтобы понять, какие реформы нужно провести."
 SIA_a_new_era: "Новая Эра"
 SIA_a_new_era_desc: "Мы стоим на пороге новой эры для Сиама. Свобода и демократия восторжествовали над тоталитаризмом. Мы больше никогда не погрузимся во тьму фашизма."
 SIA_a_liberal_governement: "Либеральное Правительство"
 SIA_a_liberal_governement_desc: "Народная радикальная партия Дирека Джаянамы победила на выборах. Основываясь на платформе социального прогрессивизма, партия намерена реализовать расширение индивидуальных прав, а также определённое государственное вмешательство в экономику."
 SIA_a_conservative_governement: "Консервативное Правительство"
 SIA_conservatism_and_democracy: "Консерватизм и Демократия"
 SIA_conservatism_and_democracy_desc: "Демократическая партия Сени Прамота победила на выборах. Желая сохранить тайские традиции, продвигая демократическую систему, одним из её главных решений было восстановление монархии в чисто конституционной форме, где королевская семья была бы лишена всякой власти."
 SIA_a_constitutional_monarchy: "Конституционная Монархия"
 SIA_a_constitutional_monarchy_desc: "Республиканская система не подходит для Сиама. Мы — народ, гордящийся своими традициями и своим прошлым, и наша монархия является частью этих традиций. Пришло время вернуть Раму VII на трон."
 SIA_state_invervention: "Государственное Вмешательство"
 SIA_state_invervention_desc: "Государственное вмешательство в экономику необходимо, чтобы избежать эксплуатации слабейших сильнейшими. Будут введены законы, защищающие работников и предоставляющие им льготы."
 SIA_the_freer_the_market: "Чем Свободнее Рынок"
 SIA_the_freer_the_market_desc: "Первый шаг к большей свободе для наших граждан — это избежать вмешательства государства в экономические дела и позволить компаниям саморегулироваться."
 SIA_follow_the_soviet_model: "Следовать Советской Модели"
 SIA_follow_the_soviet_model_desc: "Советский Союз — это коммунистический пример, которому мы должны следовать. За несколько лет большевики превратили Россию из крестьянской страны в полностью индустриализованную и современную нацию, и мы сделаем всё возможное, чтобы сделать то же самое!"
 SIA_peasant_communism_desc: "Мы не Россия, и мы не можем позволить себе полностью менять образ жизни наших граждан, забирая их с полей в города, но мы не можем оставлять их в системе, которая их эксплуатирует. Мы построим социализм, созданный для наших крестьян, где каждый фермер будет равен и сможет вести достойную жизнь."
 SIA_peasant_communism: "Крестьянский Коммунизм"
 SIA_healthcare_for_the_people: "Здравоохранение для Народа"
 SIA_healthcare_for_the_people_desc: "Доступ к здравоохранению иногда может быть затруднён для самых слабых и обездоленных, и мы боремся именно за них. Повсеместно, особенно в сельской местности, будут открыты государственные клиники для улучшения общего здоровья нашего населения."
 SIA_a_gun_in_every_home: "Оружие в Каждом Доме"
 SIA_a_gun_in_every_home_desc: "Если мы хотим, чтобы наш народ мог защитить себя от капиталистов, мы должны обеспечить его достаточным количеством оружия. Любой гражданин, который попросит, будет иметь право на хранение огнестрельного оружия в своём доме."
 SIA_centralised_production: "Централизованное Производство"
 SIA_centralised_production_desc: "Централизовав управление экономикой, мы обеспечим правильное распределение ресурсов на благо нации."
 SIA_state_atheism: "Государственный атеизм"
 SIA_state_atheism_desc: "Религия не может играть никакой роли в новом государстве, которое мы строим. Мы должны избавиться от влияния буддизма на наш народ и тем самым освободить их от ещё одной цепи."
 SIA_negotiate_indochinese_freedom: "Договориться о Свободе Индокитая"
 SIA_negotiate_indochinese_freedom_desc: "Присутствие колониализма в Восточной Азии, несмотря на принятие французами коммунизма, создаёт идеологическое противоречие, которое необходимо разрешить."
