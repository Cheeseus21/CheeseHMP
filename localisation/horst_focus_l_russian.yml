 ilp_concessions_desc: "Индийские левые разделены и преследуют разные цели. \nНаш фокус на кастовой системе дает нам широкие возможности для сотрудничества и компромисса с различными другими группами, у которых также могут быть противоречивые требования. Но если мы сбалансируем наши общие интересы, это очень поможет нашей избирательной стратегии."
