 ENG_rearmament_program_desc: "Программа перевооружения Соединённого Королевства началась в середине 1930-х годов в ответ на растущую угрозу со стороны нацистской Германии и других милитаристских держав."
 ENG_raw_materials_allocation_plan_desc: "Планы перераспределения сырья в Великобритании во время Второй мировой войны были необходимы для поддержания военных усилий. По мере усиления войны Британия столкнулась с острой нехваткой ключевых ресурсов, таких как сталь, каучук и нефть. Для решения этой проблемы правительство ввело строгий контроль и нормирование, отдавая приоритет военным нуждам перед гражданскими."
 ENG_national_defence_contribution_act_desc: "Закон о взносе на национальную оборону был введён правительством Великобритании в 1937 году в рамках усилий по перевооружению. Он вводил налог на предприятия с высокой прибылью, предназначенный для финансирования военного наращивания страны в преддверии возможного конфликта."
 ENG_battle_of_britain_desc: "Битва за Британию (10 июля – 31 октября 1940 года) была крупной воздушной кампанией между Королевскими ВВС (RAF) и люфтваффе нацистской Германии. После падения Франции Гитлер стремился принудить Британию к капитуляции, добившись господства в воздухе для подготовки вторжения."
 ENG_expansion_of_steel_mills_desc: "По мере того как спрос на сталь рос для поддержки производства оружия, кораблей и самолётов, существующие заводы расширялись, а также строились новые предприятия. Правительство приоритизировало производство стали, выделяя ресурсы и рабочую силу для обеспечения стабильных поставок."
 ENG_highlands_mining_act_desc: "Во время Второй мировой войны в Шотландском нагорье активизировалась добыча полезных ископаемых в рамках усилий Великобритании по увеличению внутреннего производства ресурсов. Регион, известный месторождениями таких минералов, как свинец, цинк и барит, стал более стратегически важным по мере роста военного спроса на эти материалы."
 ENG_expand_aluminum_trade_desc: "Торговля алюминием была жизненно важна для Великобритании во время Второй мировой войны, поскольку алюминий был необходим для производства самолётов. Первоначально Британия сильно зависела от импорта, особенно из Канады, которая стала основным поставщиком благодаря своим обильным ресурсам и близости."
 ENG_synthetic_rubber_desc: "Во время Второй мировой войны Великобритания столкнулась со значительной нехваткой натурального каучука из-за японского контроля над ключевыми регионами по производству каучука в Юго-Восточной Азии. В ответ британское правительство инвестировало в разработку и производство синтетического каучука."
 ENG_colonial_defence_desc: "Оборона колоний Великобритании во время Второй мировой войны включала защиту британских территорий и колоний по всему миру от держав Оси. Это включало оборону стратегических точек, таких как Гибралтар, Суэцкий канал и различные колониальные владения в Африке и Азии."
 ENG_african_campaign_desc: "Африканская кампания, в основном известная как Североафриканская кампания (1940–1943), включала боевые действия британских сил и сил Содружества против держав Оси, в частности Германии и Италии, за контроль над Северной Африкой. Ключевыми сражениями были осада Тобрука, второе сражение при Эль-Аламейне и операция «Факел»."
 ENG_egypt_fortification_desc: "Укрепление Египта во время Второй мировой войны было решающим для контроля над Суэцким каналом, ключевым стратегическим морским путём. Великобритания сосредоточилась на усилении обороны в Египте для защиты этой жизненно важной связи между Средиземным и Красным морями. Основные работы по укреплению включали строительство оборонительных позиций, бункеров и противотанковых заграждений вдоль ключевых районов, таких как Западная пустыня и вокруг Каира."
 ENG_asyut_fortification_desc: "Асьют, город в центральном Египте, был важен для Великобритании во время Второй мировой войны из-за своего стратегического расположения. Он был ключевым перевалочным пунктом для снабжения и войск, следовавших на линию фронта в Западной пустыне и к Суэцкому каналу и обратно."
 ENG_khartoum_fortification_desc: "Хартум, столица Судана, был стратегически важен для Великобритании во время Второй мировой войны. Расположенный у слияния Голубого и Белого Нила, Хартум служил ключевым логистическим и административным центром для британских операций в Северной Африке и на Ближнем Востоке."
 ENG_asian_campaign_desc: "Азиатская кампания для Великобритании во время Второй мировой войны включала значительные военные операции в Юго-Восточной Азии и Тихом океане. Британские силы вместе с войсками Содружества и местными подразделениями участвовали в ключевых сражениях, таких как оборона Малайи и Сингапура от японского вторжения, которая закончилась заметным поражением союзников. В Бирме британские и индийские силы при поддержке китайских и американских союзников..."
 ENG_singapore_strategy_desc: "Сингапурская стратегия, разработанная британцами в 1920-х и 1930-х годах, была направлена на защиту интересов Британской империи в Азиатско-Тихоокеанском регионе. В её основе лежал Сингапур как ключевая военно-морская база и крепость, предназначенная для защиты морских путей и сдерживания японской экспансии. Стратегия в значительной степени полагалась на сильную морскую оборону Сингапура и его роль как главной базы британского флота на Востоке."
 ENG_hong_kong_gamble_desc: "Гонконг был британской колонией и ключевым стратегическим пунктом во время Второй мировой войны. В декабре 1941 года, вскоре после нападения на Пёрл-Харбор, японские силы начали вторжение в Гонконг. Несмотря на решительную оборону британских, канадских, индийских и местных китайских войск, колония пала 25 декабря 1941 года."
 ENG_ceylon_strategy_desc: "Во время Второй мировой войны Цейлон (ныне Шри-Ланка) был стратегическим пунктом в Индийском океане, имевшим решающее значение для операций союзников. Британцы использовали Цейлон как базу для морских и воздушных операций для защиты морских путей и линий снабжения, особенно тех, что соединяли Ближний Восток и Австралию."
 ENG_general_rearmament_desc: "Британское правительство инициировало комплексную программу модернизации и расширения своих вооружённых сил в ответ на растущую угрозу со стороны нацистской Германии. Эти усилия по перевооружению включали увеличение производства оружия, самолётов и военных кораблей, а также модернизацию существующего военного снаряжения."
 ENG_war_production_council_desc: "Эти министерства контролировали разработку и производство оружия, транспортных средств и других предметов первой необходимости, играя решающую роль в поддержании британских военных усилий. Кроме того, были созданы различные производственные советы и комитеты для удовлетворения конкретных потребностей и оптимизации военного производства в различных секторах."
 ENG_dig_for_victory_desc: "«Копай ради победы» — это британская военная кампания, запущенная в 1940 году для поощрения граждан выращивать собственную еду. Столкнувшись с нехваткой и угрозой сбоев в поставках из-за войны, правительство пропагандировало выращивание овощных садов в частных и общественных местах."
 ENG_bevin_boys_desc: "Парни Бевина были призваны в британскую угольную промышленность во время Второй мировой войны, названные в честь Эрнеста Бевина, министра труда, который ввёл эту схему. С 1943 по 1948 год тысячи молодых людей, отобранных по лотерее, были отвлечены от военной службы для работы на угольных шахтах."
 
 ENG_imperial_policy_desc: "Во время Второй мировой войны британская имперская политика была сосредоточена на мобилизации колониальных ресурсов, защите стратегических пунктов и поддержании лояльности колоний. Великобритания полагалась на свои колонии в плане войск, сырья и финансовой поддержки."
 ENG_canadian_investments_desc: "С этими инвестициями наши имперские связи с колониями станут крепче."
 ENG_embezzle_canadian_funds_desc: "С каждым днём война всё ближе, и нам нужно финансировать нашу военную промышленность любыми средствами!"
 ENG_south_african_investments_desc: "С этими инвестициями наши имперские связи с колониями станут крепче."
 ENG_embezzle_south_african_funds_desc: "С каждым днём война всё ближе, и нам нужно финансировать нашу военную промышленность любыми средствами!"
 ENG_australian_investments_desc: "С этими инвестициями наши имперские связи с колониями станут крепче."
 ENG_embezzle_australian_funds_desc: "С каждым днём война всё ближе, и нам нужно финансировать нашу военную промышленность любыми средствами!"
 ENG_indian_investments_desc: "С этими инвестициями наши имперские связи с колониями станут крепче."
 ENG_embezzle_indian_funds_desc: "С каждым днём война всё ближе, и нам нужно финансировать нашу военную промышленность любыми средствами!"
 
 ENG_create_defence_requirements_committee_desc: "Подкомитет по оборонным потребностям (DRSC) был британским военным органом, созданным для определения приоритетов и координации распределения ресурсов и производства для военных нужд во время Второй мировой войны. Сформированный в 1940 году, он был частью более широкой структуры Министерства снабжения и отвечал за оценку и определение потребностей различных родов вооружённых сил."
 ENG_create_bef_desc: "Британские экспедиционные силы (БЭС) были созданы в 1939 году как основные британские военные силы, развёрнутые в континентальной Европе в начале Второй мировой войны. Их создание последовало за началом войны с главной задачей поддержки Франции и Бельгии против немецкой агрессии."
 ENG_lobby_for_funds_desc: "Во время Второй мировой войны британская армия лоббировала увеличение финансирования для поддержки своего расширения и модернизации. Эти усилия включали пропаганду выделения дополнительных финансовых ресурсов на оснащение и обучение войск, разработку нового оружия и создание необходимой инфраструктуры. Требования армии были вызваны необходимостью противостоять растущей угрозе со стороны стран Оси и вести затяжные военные операции."
 ENG_request_for_more_reserves_desc: "Перед Второй мировой войной британская армия столкнулась с проблемами при расширении своих сил для противодействия растущей угрозе со стороны нацистской Германии и других потенциальных противников. Армия запросила дополнительные резервы для усиления своей мощи и боеготовности. Это включало лоббирование увеличения численности обученного резервного персонала, дополнительные призывные кампании и расширенные программы обучения."
 ENG_partial_funds_desc: "«Отодвигание армии на второй план» относится к ситуации, когда британской армии уделялось меньше приоритета по сравнению с другими родами войск или аспектами военной и национальной стратегии в определенные периоды. Перед Второй мировой войной это происходило, когда политический и экономический фокус смещался в сторону политики умиротворения и бюджетных ограничений, что приводило к меньшему вниманию к расширению или модернизации армии."
 ENG_blank_cheque_for_raf_desc: "В конце 1930-х годов, по мере роста напряженности с нацистской Германией, правительство выделило значительные финансовые и материальные ресурсы Королевским ВВС, что позволило им быстро расшириться и модернизировать свой парк самолетов. Это решение было продиктовано верой в стратегическую важность воздушной мощи, особенно после роста воздушных угроз и необходимости противодействовать немецкому превосходству в воздухе."
 ENG_radar_research_desc: "Исследования в области радиолокации в Великобритании во время Второй мировой войны сыграли ключевую роль в усилении противовоздушной обороны и обеспечении безопасности военных операций. Начиная с 1930-х годов, британские ученые и инженеры, в частности в Исследовательском центре телекоммуникаций (TRE), разрабатывали и совершенствовали радиолокационные технологии. Эти исследования привели к созданию систем раннего предупреждения, которые были жизненно важны для обнаружения вражеских самолетов и организации оборонительных действий."
 ENG_british_commonwealth_air_training_plan1_desc: "План подготовки авиационных кадров Британского Содружества (BCATP), созданный в 1939 году, был крупной военной инициативой по обучению летных экипажей для союзных сил. План был результатом сотрудничества Великобритании, Канады, Австралии, Новой Зеландии и Южной Африки. Он предусматривал создание учебных центров в этих странах, причем Канада служила основным учебным центром благодаря своей обширной территории и благоприятным условиям."
 ENG_full_funding_desc: "Термин «полностью финансируемые Королевские ВВС» относится к значительным финансовым обязательствам британского правительства перед Королевскими ВВС во время Второй мировой войны. Признавая растущую важность воздушной мощи, особенно в свете угрозы со стороны нацистской Германии, правительство выделило substantial ресурсы на расширение и модернизацию RAF."
 ENG_demands_from_the_royal_navy_desc: "Перед Второй мировой войной Королевский флот выдвинул несколько требований для поддержания своего глобального господства и противодействия возникающим угрозам. Эти требования включали увеличение финансирования для модернизации и расширения флота, особенно в части строительства новых линкоров, авианосцев и подводных лодок."
 ENG_two_power_standart_desc: "«Стандарт двух держав» — это британская военно-морская политика, принятая в конце XIX — начале XX века. Она была направлена на сохранение превосходства Королевского флота над объединенными флотами двух следующих по величине военно-морских держав. Эта политика была продиктована необходимостью защиты глобальных интересов Британской империи и обеспечения ее морского доминирования."
 ENG_commission_for_more_ships_desc: "В годы, предшествовавшие войне, британский Королевский флот уделял первостепенное внимание вводу в строй новых кораблей для повышения своей военно-морской мощи и боеготовности. Это включало завершение строительства, оснащения и оборудования военных кораблей, включая линкоры, авианосцы и эсминцы. Целью было обеспечение способности флота противостоять возникающим угрозам и поддерживать морское превосходство."
 ENG_rule_the_waves_desc: "«Владычица морей» относится к стратегической цели сохранения военно-морского превосходства и доминирования над другими нациями. Для Британской империи это было крайне важно из-за ее зависимости от морской торговли и глобального присутствия. Достижение этого доминирования включало создание и поддержание мощного и технологически развитого флота, способного проецировать силу и защищать британские интересы по всему миру."
 
 ENG_gather_the_rearmament_plans_desc: "Невилл Чемберлен, будучи премьер-министром Великобритании с 1937 по 1940 год, сосредоточился на перевооружении в ответ на растущие угрозы со стороны нацистской Германии. Правительство Чемберлена собирало и координировало планы перевооружения, уделяя первостепенное внимание расширению и модернизации британских вооруженных сил. Это предполагало увеличение расходов на оборону и усиление армии и флота."
 ENG_army_demands_desc: "В рамках планов перевооружения, предшествовавших Второй мировой войне, британская армия добивалась значительного повышения своих возможностей. Это включало увеличение финансирования для модернизации и расширения сил, с акцентом на приобретение нового оборудования, такого как танки и артиллерия. Также уделялось большое внимание улучшению программ обучения для подготовки солдат к современной войне."
 ENG_establish_royal_tank_regiment_desc: "Королевский танковый полк (RTR) — один из старейших и наиболее заслуженных бронетанковых полков британской армии, чье происхождение восходит к 1916 году, временам Первой мировой войны. Он был создан для эксплуатации танков — новой на тот момент технологии — и сыграл ключевую роль в развитии и эволюции танковой войны."
 ENG_expansion_of_tank_regiment_desc: "По мере развития войны RTR наблюдал увеличение набора и формирование дополнительных танковых батальонов. Это расширение включало приобретение новых моделей танков, таких как Matilda, Sherman и Churchill, а также разработку новой тактики и учебных программ. Рост полка был крайне важен для поддержки крупных кампаний."
 ENG_universal_tanks_desc: "Первым основным боевым танком Великобритании был танк «Черчилль», разработанный во время Второй мировой войны. Представленный в 1941 году, он был предназначен для обеспечения тяжелой брони и огневой мощи для различных боевых задач. «Черчилль» имел толстую броню, мощную 75-мм пушку и хорошую для своего времени подвижность, что делало его эффективным как в наступательных, так и в оборонительных операциях."
 ENG_special_air_service1_desc: "Специальная авиадесантная служба (SAS) — это известный полк специального назначения британской армии, основанный в 1941 году Дэвидом Стерлингом во время Второй мировой войны. Первоначально предназначенная для воздушной разведки и рейдов в тылу врага, SAS прославилась своими дерзкими операциями в Северной Африке, включая рейды на немецкие аэродромы и линии снабжения."
 ENG_long_range_desert_group_desc: "Группа пустынной дальней разведки (LRDG) была британским подразделением специального назначения, сформированным в 1940 году и специализировавшимся на разведке и рейдах в Северной Африке во время Второй мировой войны. Созданная майором Ральфом Бэгнолдом, LRDG была известна своим опытом навигации в пустыне и использованием модифицированных автомобилей для миссий на дальние расстояния."
 ENG_commandos_desc: "Британские коммандос были элитными воинскими подразделениями, сформированными во время Второй мировой войны для проведения специальных операций, включая рейды, разведку и прямые атаки в тылу врага. Созданные в 1940 году под руководством вице-адмирала Луиса Маунтбеттена, эти подразделения были предназначены для ведения нетрадиционных боевых действий и десантных операций."
 ENG_full_funding_for_the_army_desc: "Теперь, когда наша армия полностью профинансирована, мы можем обсудить более широкие планы по ведению затяжной войны против фашистов!"
 
 ENG_raf_demand_desc: "В рамках планов перевооружения, предшествовавших Второй мировой войне, Королевские ВВС (RAF) подчеркивали необходимость значительных инвестиций для расширения и модернизации своих возможностей. RAF требовали увеличения финансирования для приобретения новых и современных самолетов, замены устаревших моделей и улучшения технологий, таких как радиолокация и системы связи."
 ENG_air_ministry_specifications_desc: "Спецификации Министерства авиации были подробными требованиями, установленными британским Министерством авиации для проектирования и производства самолетов. В этих спецификациях излагались необходимые эксплуатационные, операционные и технические стандарты, которым должны были соответствовать самолеты."
 ENG_defence_scheme_desc: "План обороны Министерства авиации во время Второй мировой войны включал комплексную стратегию защиты Великобритании от воздушных атак и обеспечения превосходства в воздухе."
 ENG_more_specifications_desc: "У Министерства авиации было все больше и больше требований на протяжении войны, чтобы не отставать в технологической гонке в воздухе."
 ENG_bomber_development_program_desc: "Программа развития бомбардировщиков была стратегической инициативой британского правительства по усилению и расширению парка бомбардировщиков во время Второй мировой войны. Программа была сосредоточена на разработке и производстве ряда передовых бомбардировщиков для удовлетворения растущих потребностей воздушной войны."
 ENG_air_production_and_supply_program_desc: "Программа авиационного производства и снабжения была комплексной мерой во время Второй мировой войны, направленной на удовлетворение растущих потребностей в самолетах и связанном с ними оборудовании. Управлялась в основном британским Министерством авиации и координировалась с промышленностью."
 ENG_air_staff_reports_desc: "Наш штаб ВВС предоставляет нам ценный анализ того, как вести эту воздушную войну максимально эффективно!"
 ENG_full_plans_achieved_desc: "При такой поддержке мы обязательно сможем сбивать фашистов с неба!"
 
 ENG_navy_demands_desc: "Королевский флот Великобритании подчеркивал несколько ключевых требований для обеспечения своей эффективности и боеготовности. Флот добивался увеличения финансирования для строительства и содержания мощного и современного флота, включая новые линкоры, авианосцы и эсминцы. Технологические достижения, такие как радиолокация и улучшенное вооружение, были необходимы для сохранения конкурентного преимущества."
 ENG_battleship_programs_desc: "Программы строительства линкоров в период, предшествующий Второй мировой войне и в первые ее годы, включали значительные усилия военно-морских держав по разработке и сохранению крупных, тяжеловооруженных военных кораблей."
 ENG_carrier_programs_desc: "Программы строительства авианосцев во время Второй мировой войны были сосредоточены на разработке и расширении парка авианосцев, которые стали центральными в морской войне."
 ENG_submarine_projects_desc: "Подводные проекты во время Второй мировой войны были направлены на улучшение конструкции, производства и возможностей подводных лодок для эффективного нападения на вражеское судоходство и поддержки военно-морских операций."
 ENG_cruiser_programs_desc: "Программы строительства крейсеров во время Второй мировой войны были направлены на улучшение конструкции и возможностей крейсеров, которые играли решающую роль в морской войне."
 ENG_destroyer_programs_desc: "Программы строительства эсминцев во время Второй мировой войны были сосредоточены на улучшении конструкции, производства и возможностей эсминцев, которые были важны для морской войны."
 ENG_two_standarts_achieved_desc: "Мы достигли «Стандарта двух держав», как того требовала наша страна!"
 
