 JAP_rejuvenate_the_qing_dynasty: "Возродить династию Цин"
 JAP_rejuvenate_the_qing_dynasty_desc: "Слишком долго управление Маньчжурией было хаотичным делом военной необходимости и временного надзора. Чтобы обеспечить будущее возрожденной Великой Цин, мы вернем все законные территории администрации в Синьцзине, консолидировав владения в преддверии возможного восстановления имперской власти."
 JAP_restore_imperial_heartlands: "Восстановить имперские сердца"
 JAP_restore_imperial_heartlands_desc: "С обеспечением безопасности материка бремя управления обширными внутренними территориями не должно лежать на Императоре. Передав внутренние провинции Маньчжоу-го, мы восстановим имперские сердца в новой Цин и укрепим их легитимность, обеспечив при этом, чтобы жизненно важное побережье оставалось под прямым имперским японским контролем."

