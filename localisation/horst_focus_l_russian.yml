 ##### KANTOKUEN BRANCH
 JAP_prepare_the_kantokuen: "Подготовить Катокюэн"
 JAP_prepare_the_kantokuen_desc: "«Кантокуэн» — это оперативный план, созданный Генеральным штабом Императорской армии Японии для вторжения и оккупации дальневосточного региона Советского Союза. Вовлекая семь японских армий, а также значительную часть военно-морских и военно-воздушных сил империи, это будет крупнейшая единая общевойсковая операция в истории Японии и одна из крупнейших за всё время."
 JAP_bases_and_supply_lines_alongside_amur_river: "Базы и линии снабжения вдоль реки Амур"
 JAP_bases_and_supply_lines_alongside_amur_river_desc: "Готовясь к продвижению на советский Дальний Восток, мы должны развивать наши базы в приграничных провинциях вдоль реки Амур. Железные дороги, шоссе, аэропорты, госпитали, склады боеприпасов — всё должно быть готово к тому моменту, когда мы затрубим в военные горны."
 JAP_RFA_use_the_anti_soviets: "Использовать антисоветчиков"
 JAP_RFA_use_the_anti_soviets_EXPL: "\nЭто §Cреактивный фокус§!. Если мы завершили фокус '§HУлучшить Императорскую Маньчжурскую армию§!', то этот фокус вместо этого будет иметь следующие §Gэффекты§!:\n"
 JAP_RFA_use_the_anti_soviets_desc: "Все еще существует огромное количество людей, которые либо покинули Россию из-за Советской революции, либо все еще там, но молча противятся новому режиму. Все они могут быть очень полезны для нас, когда мы начнем нашу операцию по завоеванию Дальнего Востока."
 JAP_RFA_genrikh_lyushkovs_far_east_informations: "Информация Генриха Люшкова о Дальнем Востоке"
 JAP_RFA_genrikh_lyushkovs_far_east_informations_desc: "Генрих Самойлович Люшков — советский офицер и член НКВД.\nВ свете недавних событий он готов дезертировать из своей страны и пересечь границу в Маньчжурии с важной информацией о советской армии в Дальневосточном регионе. Это может дать нам огромное преимущество, если мы согласимся принять его."
 JAP_RFA_mobilize_the_white_russians: "Мобилизовать белых русских"
 JAP_RFA_mobilize_the_white_russians_EXPL1: "\nЭто §Cреактивный фокус§!. Если мы завершили фокус '§HУлучшить Императорскую Маньчжурскую армию§!', то этот фокус вместо этого будет иметь следующие §Gэффекты§!:\n"
 JAP_RFA_mobilize_the_white_russians_EXPL2: "Получите §H4§! всеобщих русских дивизий Асано.\n"
 JAP_RFA_mobilize_the_white_russians_desc: ""
 JAP_RFA_form_provisional_far_eastern_government: "Сформировать временное дальневосточное правительство"
 JAP_RFA_form_provisional_far_eastern_government_EXPL: "\n§CЗавершив§! этот фокус, мы согласимся предоставить §Hбелым русским§! определенный уровень §Hавтономии§! в их государстве на Дальнем Востоке после нашего успешного завоевания [SOV.GetFlag]§H[SOV.GetName]§!."
 JAP_RFA_form_provisional_far_eastern_government_desc: ""
 
 JAP_harsh_condition_army_training: "Подготовка армии в суровых условиях"
 JAP_harsh_condition_army_training_EXPL1: "Добавить черту §HСпециалист по зиме§! §H2§! случайным генералам.\n"
 JAP_harsh_condition_army_training_EXPL2: "Используйте ваше §HПехотное снаряжение§!, чтобы обучить ваших генералов и предоставить им §G1§! дополнительный навык логистики и черту §HСпециалист по зиме§!.\n"
