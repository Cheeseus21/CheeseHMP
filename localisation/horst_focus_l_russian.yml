 GER_festungdesdeutschenvaterland: "Укрепить Отечество"
 GER_festungdesdeutschenvaterland_desc: ""
 GER_festungberlin: "Последний рубеж Берлина"
 GER_festungberlin_desc: ""
 GER_steinercounteroffensive: "Контрнаступление Штейнера"
 GER_steinercounteroffensive_desc: "Имея огромный выступ, созданный 1-й Белорусской армией Жукова, 9-я армия должна наступать к югу от выступа, тем временем обергруппенфюрер Феликс Штейнер вместе со своим восстановленным отрядом должен наступать на северо-восток от Берлина и окружить армию Жукова, а затем отбросить её к границам 1941 года. Таков приказ фюрера, и мы верим ему."
 stg_tt: "§RМы получим 5,000 винтовок 3 (Если не исследовано, ничего не получите.)§!"
 mech_tt: "§RМы получим 400 механизированного снаряжения 2 (Если не исследовано, ничего не получите.) НЕ ЗАБУДЬТЕ ШАБЛОН!!!§!"
