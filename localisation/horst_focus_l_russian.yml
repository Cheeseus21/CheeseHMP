 SLO_bomber_production: "Производство тактических бомбардировщиков"
 SLO_bomber_production_desc: ""
 SLO_aa_defense: "Защита нашей военной экономики"
 SLO_aa_defense_desc: "Ничто не разрушало нашу страну экономически во время Второй мировой войны так, как бомбардировочные рейды. Их главной целью был нефтеперерабатывающий завод «Аполло», один из основных поставщиков синтетического бензина для Германии."
 SLO_prepare_our_airforce: "Подготовить наши ВВС"
 SLO_prepare_our_airforce_desc: ""
 SLO_invasion_of_poland: "Подготовка к Fall Weiss"
 SLO_invasion_of_poland_desc: "1 сентября 1939 года немецкие войска вступили на территорию Польши, и началась Вторая мировая война. Для Словакии, которая воспринимается за рубежом как сателлит Третьего рейха, а участие ее армии в нацистском вторжении в Польшу открыто подтверждает эту позицию, этот акт означает немедленное приостановление дипломатических отношений с западными державами."
 SLO_munition_factory: "Оружейные заводы"
 SLO_munition_factory_desc: "Оружейные заводы в Дубнице и Поважской Быстрице были частью одного из важнейших производителей боевого снаряжения."
 SLO_mobile_warfare: "Маневренная война"
 SLO_mobile_warfare_desc: ""
 SLO_superior_firepower: "Превосходство огневой мощи"
 SLO_superior_firepower_desc: ""
 SLO_trench_warfare: "Позиционная война"
 SLO_trench_warfare_desc: ""
 SLO_mass_assault: "Массированный штурм"
 SLO_mass_assault_desc: ""
 SLO_tank_focus: "Rýchla Skupina 'Kalinciak'"
 SLO_tank_focus_desc: "Быстрая дивизия была словацкой танковой дивизией, сражавшейся на Восточном фронте на стороне войск Оси. Быстрая дивизия была создана 23 июля 1941 года после многократных реорганизаций Быстрой бригады, ранее Быстрой группы. Позже, после отхода с Кавказа, дивизия была переименована в 1-ю пехотную или 1-ю техническую."
 SLO_motorized_focus: "Словацкое мобильное командование"
 SLO_motorized_focus_desc: "Словацкое мобильное командование было придано немецкой 17-й армии и вскоре после этого передано под прямое немецкое командование. Это подразделение сражалось в составе 17-й армии на протяжении июля 1941 года, в том числе в битве под Уманью и битве под Липовцем."
 SLO_prepare_production: "Новый тип танков"
 SLO_prepare_production_desc: "Мы должны убедиться, что наши производственные линии готовы к более требовательному типу танка."
 SLO_daimler_benz: "«Даймлер-Бенц»"
 SLO_daimler_benz_desc: ""
 ger_medium_tank_1936: "Panzer III Ausf.A"
 SLO_medium_panzer: "Купить немецкие лицензии"
 SLO_medium_panzer_desc: ""
 SLO_medium_tt: "Получите §Yсреднюю танковую§! дивизию из 15 батальонов."
 SLO_continue_production: "Фокус на производство танков"
 SLO_continue_production_desc: "Продолжая производство уже известных нам лёгких танков, мы можем легко максимизировать выпуск наших заводов."
 SLO_light_tank: "ЧКД"
 SLO_light_tank_desc: "CKD была одной из крупнейших машиностроительных компаний бывшей Чехословакии. Наиболее известной продукцией компании были лёгкие танки собственной разработки — Panzer 38(t) — и Jagdpanzer 38(t)."
 SLO_light_tank_modernization: "Новые лёгкие танки"
 SLO_light_tank_modernization_desc: ""
 SLO_light_tt: "Получение дивизии §Yлёгких танков§! численностью 15 батальонов"
 SLO_german_assistance: "Германская помощь"
 SLO_german_assistance_desc: ""
 SLO_motorization: "Моторизация нашей армии"
 SLO_motorization_desc: ""
 SLO_mechanization: "Словацкие панцергренадеры"
 SLO_mechanization_desc: ""
 SLO_improved_mechanization: "Дальнейшие усилия по механизации"
 SLO_improved_mechanization_desc: ""
 SLO_moto_mech_idea: "Ставка на бронетранспорт"
 SLO_special_forces: "Учебный центр коммандос"
 SLO_special_forces_desc: "Успех немецких парашютистов в первые годы Второй мировой войны послужил импульсом для многих центральноевропейских стран к созданию собственных воздушно-десантных войск. В первые месяцы 1942 года Словацкое государство, союзник Германии, решило создать учебный центр воздушно-десантной подготовки."
 SLO_dispersed_support: "Рассредоточенная поддержка"
 SLO_dispersed_support_desc: ""
 SLO_integrated_support: "Комплексное взаимодействие"
 SLO_integrated_support_desc: ""
 SLO_infiltration: "Внедрение"
 SLO_infiltration_desc: ""
 SLO_assault: "Штурм"
 SLO_assault_desc: ""
 SLO_mass_mobilization: "Массовая мобилизация"
 SLO_mass_mobilization_desc: ""
 SLO_deep_battle: "Глубокий бой"
 SLO_deep_battle_desc: ""
 SLO_purchase_guns: "Закупка снаряжения у Германии"
 SLO_purchase_guns_desc: "Министерство обороны Словакии обратилось к Германии за помощью в воздушно-десантной подготовке словацких парашютистов и поставке парашютного снаряжения."
 SLO_cavalry_focus: "Модернизация кавалерии"
 SLO_cavalry_focus_desc: "Словацкие кавалерийские отряды прошли множественные модернизации в течение первого года существования Словацкого государства."
 SLO_purchase_transports: "Транспортные самолёты"
 SLO_purchase_transports_desc: "Первый прыжок с He-111 состоялся 15 ноября 1943 года. Весьма интересный момент произошёл 30 ноября 1943 года — первая показательная массовая выброска состоялась близ города Жилина (20 парашютистов прыгнули с двух He-111)."
 SLO_commando: "Коммандо"
 SLO_commando_desc: "Первая группа добровольцев поступила в воздушно-десантный центр в октябре 1942 года. Юрай Мешко был назначен командиром этой группы — ядра будущего словацкого подразделения парашютистов."
 SLO_paratroopers_tt: "Получение двух дивизий §Yпарашютистов§! со статусом «ветеран» численностью по 15 батальонов каждая"
 SLO_motorized_tt: "Получение двух дивизий §Yмоторизованной пехоты§! со статусом «ветеран» численностью по 15 батальонов каждая"
