 GER_totaler_krieg_idea2: "Тотальная война — кратчайшая война!"
 GER_amerikabomber: "Америкабомбер"
 GER_amerikabomber_desc: "Разбомбив промышленное сердце США, мы сможем отвлечь американскую гражданскую и военную промышленность на защиту материка, изолировав Британию для второй воздушной битвы."
 GER_maus: "Контракт с Porsche"
 GER_maus_designer: "Проект «Маус»"
 GER_maus_designer_desc: "Зимние танки"
 GER_maus_desc: "Мы заключим контракт с Фердинандом Порше на строительство его сверхтяжёлого танка Panzerkampfwagen VIII Maus"
 GER_e100: "Контракт с Henschel"
 GER_e100_designer: "Проект E-100"
 GER_e100_desc: "Мы привлечём Henschel к строительству сверхтяжёлого танка Panzerkampfwagen E-100"
 GER_lowe: "Контракт с Krupp"
 GER_lowe_designer: "Проект «Лёве»"
 GER_lowe_desc: "Мы заключим контракт с Krupp на строительство сверхтяжёлого танка Panzerkampfwagen VII Löwe"
 GER_project_riese: "Проект «Ризе»"
 GER_project_riese_desc: "Мы должны построить новые нефтеперерабатывающие заводы и оружейные фабрики безопасно под землёй, вдали от британских бомбардировщиков."
 GER_strafbat: "Сформировать штрафные батальоны"
 GER_strafbat_desc: "Насущные потребности войны в людских ресурсах угрожают сократить ценное производство вооружений. Мы можем отсрочить это, сформировав штрафные батальоны из осуждённых, военнопленных и непокорных солдат. Эти подразделения могут также служить фронтовыми строительными батальонами для опасных ручных работ."
 GER_strafbat_idea: "Штрафные батальоны"
 ITA_balkan_war_goal: "Балканское господство"
 ITA_balkan_war_goal_desc: "Какую Римскую империю мы восстанавливаем, если не включим Балканы? Это должна быть лёгкая цель..."
 ITA_defense_italia: "Крепость Италия"
 GER_volunteers: "Иностранные добровольцы и призывники"
 GER_volunteers_desc: "Генрих Гиммлер обратился к нам с предложением о создании негерманских военизированных подразделений из иностранных добровольцев и призывников с завоёванных территорий. Эти теоретические дивизии будут под его командованием, вне контроля Heer, что почти наверняка вызовет недовольство старшего германского генерального штаба. Тем не менее, Германии нужно больше людей на поле боя."
 GER_volunteers_idea: "Иностранные добровольцы и призывники"
 GER_totaler_krieg_idea2_desc: "§RНемецкие солдаты сплочены для победы, но если война затянется слишком долго, а стабильность или поддержка войны в нашей стране станет слишком низкой (<50%), то мы потеряем инициативу!§!"
