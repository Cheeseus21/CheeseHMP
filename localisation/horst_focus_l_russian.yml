 army_inno_3_tt: "§CМы откроем противотанковые бронеавтомобили§!\n\n"
 fin_join_axis: "Присоединиться к странам Оси"
 ITA_blackshirts: "Набор чернорубашечников"
 ITA_blackshirts_desc: "Наша армия будет вызывать страх только тогда, когда мы выставим на поле восемь миллионов штыков."
 black_shirts: "Чернорубашечники"
 fin_join_axis_desc: "Мы подпишем Тройственный пакт и станем официальным членом Оси в обмен на сохранение наших территориальных претензий к Советскому Союзу."
 fin_supremacy_of_will: "Превосходство воли"
 fin_supremacy_of_will_desc: "Нам нечего бояться, кроме смерти."
 MAN_railways_chahar_desc: ""
 MAN_railways_schahar_desc: ""
 plan_zzz_tt: "§RИнвестиции в надводный флот очень дороги и помешают нам более активно инвестировать в другие области наших вооруженных сил!§!\n\n§CМы автоматически исследуем значительное количество военно-морских технологий.§!\n\n"
 GER_guns1_desc: "Наши производители оружия исследовали возможность создания нового стандартного оружия для солдат. Это новое оружие должно превратить каждого рекрута в пулеметчика. С этими новыми пистолетами-пулеметами, использующими винтовочные патроны, мы добьемся превосходства над врагом."
