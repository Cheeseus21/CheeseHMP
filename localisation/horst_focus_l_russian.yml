 USA_station_in_pearl_harbor: "Модернизация в Перл-Харборе"
 USA_station_in_pearl_harbor_desc: "Остерегайтесь оси пиццы и суши."
 USA_station_in_pearl_harbor_tt: "Мы начнем модернизацию наших §Yстарых кораблей§! в §YПерл-Харборе.§! \n\nМы можем модернизировать до: §Y\n3 авианосцев \n15 линкоров§! \n\nОднако наши адмиралы опасаются, что флот будет §Yуязвим для внезапных атак!§! \n\n(Корабли должны оставаться на Гавайях для модернизации. Не помещайте больше указанного числа.) \n\n(Некоторые линкоры будут спасены, даже если они будут уничтожены, однако их модернизация займет больше времени, чем обычно.)"
 
