 ENG_dieppe: "Рейд на Дьепп"
 ENG_dieppe_desc: "Мы попытаемся узнать больше о немецкой обороне на побережье Европы, проведя небольшую высадку у города Дьепп."
 NOR_navy_3: "Быстрый флот"
 NOR_navy_3_desc: "Быстрые корабли!"
 SPR_AZUL_tt: "Десять §Rветеранских§! дивизий §HГражданской войны в Испании§! будут набраны с (мощной) медалью в знак признания их опыта и доблести во время войны."
 ROM_iron_guard_ii: "Восстановление Великой Румынии"
 ROM_iron_guard_ii_desc: "Советская оккупация Буковины и Бессарабии стала национальным унижением, которое должно быть отомщено."
 ROM_iron_guard_iii: "Претензии на Одессу"
 ROM_iron_guard_iii_desc: "В награду за участие в операции «Барбаросса» Германский рейх обещал нам советские территории на границе наших земель."
 ITA_reinforce_the_gustav_line_tt: "Мы немедленно создадим линию укреплений §H7-го уровня§! вдоль линии фронта в Италии\n\n"
 ITA_strengthen_the_blackshirts_spawn_divs2_tt: "Создать §Y30 дивизий «чернорубашечников»§! в §Y[THIS.GetName]§!."
 NOR_norsk_hydro_focus_desc: "Norsk Hydro является крупным поставщиком алюминия и бокситов, а также материалов для ядерных исследований благодаря производству тяжёлой воды."
 SOV_approach_germany_molotov_tt: "§GВячеслав Молотов§! является нашим §Yнародным комиссаром иностранных дел§!"
 axis_minor_railways_tt: "\n§CНаши малые союзники получат железнодорожное сообщение 3-го уровня с нашей столицей.§! \n\n§CМы получим %20 дополнительной торговли при взаимодействии с нашими союзниками-малыми.§!"
 italian_railways_tt: "\n§CКаждая железная дорога в Италии будет улучшена на 1 уровень.§!"
 ENG_tonks_tt: "\nМы развернём 4 опытных средних танка и получим склад снабжения для их поддержки."
 TIB_nothing335: "Начало третьей пятимесячной пятилетки Хорста"
 HMP_ignite_the_warsaw_uprising_tt: "§HВ каждом польском базовом штате восстанут две пехотные дивизии§!"
 SOV_send_military_advisors_to_spain_tt: "Появится §Hгенерал 6-го уровня§! по имени §HЭнрике Листер§!"
 SLO_commando_tt: "§YКоммандос (Эксперт)§! будет доступен для найма §Gбесплатно§!"
 gdansk2_tt: "\n§GМы начнём усиливать контроль над Данцигом, в конечном итоге взяв под прямой контроль всё его население и промышленность.§!"
 gdansk_tt: "\n§GМы полностью усилим наш контроль над промышленностью и населением Данцига.§!"
 no_dutch_player: "Военная машина Голландской Ост-Индии"
 no_dutch_player_desc: "§RЭтот дух исчезает, если мы теряем контроль над Явой!§!"
 UK_PLANE_STUFF_TT: "§CСША и Великобритания исследуют стратегические бомбардировщики 1944 года§!"
 YUG_yugoslavian_rail_network: "Югославская железнодорожная сеть"
 ENG_tank_focus2: "Королевский танковый корпус"
 POL_get_em_wojtek: "Взять их, Войтек!"
 POL_get_em_wojtek_desc: "Рррраааааауууу!"
 Wojtek_tt: "Появится §Yгенерал 9-го уровня§! по имени §YВойтек§!."
 ENG_tank_focus2_desc: "Современные танки — основа современных армий."
 ENG_tank_focus3: "Битва при Эль-Аламейне"
 ENG_tank_focus3_desc: "Мы развернём лучшее из Королевского танкового корпуса"
 YUG_yugoslavian_rail_network_desc: "Нам следует расширить железнодорожные сети во всех частях страны. Все они одинаково важны."
 YUG_bosnian_poverty_system: "Развитие легкой промышленности"
 GER_army_innovation_tt: "§C\nМы развернём армию из 48 полностью оснащённых 40-ширинных пехотных дивизий.§!"
 YUG_bosnian_poverty_system_desc: "Принимая во внимание уровень внутреннего недовольства, было бы разумно уделить больше внимания нашей легкой промышленности, чтобы жители не оказались без необходимых в повседневной жизни товаров."
 ENG_home_defence_tt: "\nМы построим линию Генерального штаба — линию фортов 6-го уровня в Южной Англии для защиты от вторжения.\n\n"
 
 ENG_fall_back_to_ireland: "Эвакуация в Ирландию"
 ENG_fall_back_to_ireland_desc: "Мы обязательно вернёмся однажды на эту роковую землю."
 ENG_fall_back_to_ireland_tt: "\nМы §Yудалим 5 военных заводов§! из §Yкаждого штата, который контролируем в материковой Англии§!, однако независимо от этого получим лишь §Y75 заводов взамен§! из-за ограничений в логистике.\n\n"
 ENG_fall_back_to_ireland_tt1: "Этот фокус также укрепит §YСеверную Ирландию и Фарерские острова§! и §Yснизит сопротивление союзников!§!"
 
 ENG_fall_back_to_canada: "Эвакуация в Канаду"
 ENG_fall_back_to_canada_desc: "Лица ваших союзников изображены на иконке этого фокуса."
 ENG_fall_back_to_canada_tt: "Этот фокус даст вам §Yна 50 военных заводов больше§!, спонсированных §Yглавным моддером Horstorical Cheeseus.§!"
 ENG_fall_back_to_canada_tt1: "Этот фокус также укрепит §YНьюфаундленд и Исландию.§!"
 
 FIN_red_soil_government_tt: "Этот фокус автоматически завершится после проведения выборов\n\n"
# make focus about Lorković–Vokić plot to make coalition peasant party - moderate ustasha, join the allies and fight the communists
 USA_social_security_act: "Закон о социальном обеспечении"
 USA_social_security_act_desc: "Пожилые люди в нашей стране в основном живут в бедности без лёгкого способа её преодолеть. Создание федеральной программы социального обеспечения для пожилых граждан значительно улучшит их благосостояние. В то же время мы можем бороться с бедностью из-за временной безработицы с помощью аналогичной, но более краткосрочной программы."
 ENG_dresden_idea: "Ковровая бомбардировка"
 HOL_empire: "Голландская империя"
 HOL_huygens: "Дух Гюйгенса"
 HOL_huygens_desc: "Гюйгенс, блестящий математик, физик, изобретатель и астроном голландского происхождения. Этот человек был движим наукой и был одной из ключевых фигур в научной революции XVII века. Он не верил в границы. Наука была везде и всегда. У науки нет границ. Мы должны делиться всеми нашими технологиями с союзниками ради общего дела."
 HOL_reinforce_sumatra: "Укрепить Суматру"
 HOL_reinforce_sumatra_desc: "Суматра — наш второй по важности остров в Ост-Индии после Явы. Удержание этого острова — ключ к обороне Явы. Если Суматра не падёт, Ява не падёт."
 HOL_binnenlands: "Binnenlandse Strijdkrachten"
 HOL_binnenlands_desc: "Сопротивление наконец укоренилось на материке. После долгого времени преимущественно коллаборации наш народ пробудился с началом нацистского террора. Сопротивление теперь организовано и может быть консолидировано в официальные вооружённые силы нашим собственным авантюрным принцем; принцем Бернхардом цур Липпе-Бистерфельдом."
 HOL_devour: "Лев поглощает солнце"
 BRA_tenentes: "Сохранить тенентистов"
 BRA_tenentes_desc: "Молодые офицеры, обученные в Европе, тенентисты, имеют значительное влияние в армии и считают себя выше старой гвардии. Хотя у многих из них социалистические наклонности и происхождение, у них действительно инновационный и прогрессивный подход к управлению новой бразильской армией. Мы должны любой ценой сохранить с ними дружеские отношения."
 BRA_mobilise: "Мобилизовать интегралистов"
 BRA_mobilise_desc: "Чтобы реализовать идеи Варгаса об Estado Novo, ему нужно получить достаточную поддержку для централизации власти. Поскольку марксисты угрожают стабильности Бразилии, нам необходимо установить контакт с идеологическими сторонниками. Интегралистское крыло даёт то милитаристско-националистическое чувство, которое нам нужно для дальнейшего построения рая Варгаса."
 BRA_establish: "Учредить TSN"
 HUN_GER_subject: "Королевство Венгрия"
 ROM_GER_subject: "Королевство Румыния"
 POL_ENG_subject: "Польша"
 GRE_ENG_subject: "Свободная Греция"
 BUL_GER_subject: "Царство Болгария"
 YUG_ITA_subject: "Свободное государство Хорватия"
 SER_GER_subject: "Королевство Сербия"
 CZE_GER_subject: "Словакия"
 
 BRA_establish_desc: "Мы должны учредить Трибунал национальной безопасности, Tribunal de Segurança Nacional. После «Интентоны коммуниста» у нас множество «коммунистов», которых нужно привлечь к ответственности. Мы хотели поручить это Высшему военному суду, но это заняло бы слишком много времени. Поэтому мы создаём орган при Высшем военном суде, который сможет действовать быстрее."
 BRA_general: "Продвинуть Жуана Баптисту Маскареньяса де Мораиса"
 BRA_general_desc: "Маскареньяс де Мораис доказал свою лояльность новому режиму Варгаса. Его борьба с коммунистами во время неудавшегося переворота сделала его известным в Рио вдобавок ко всем другим подавленным им мятежам. Мы должны дать ему возможность дальнейшего развития карьеры. У него большой потенциал."
 BRA_estadonovo2: "Новое государство"
 BRA_estadonovo2_desc: "Новое государство родилось. Третья Бразильская Республика — факт. Вы выбрали, насколько радикально реформировано это новое государство. Наш великий лидер Варгас разработал потрясающие планы по промышленности, образованию и общему развитию страны. Наступил новый рассвет. Теперь время борьбы, партий и гордости! Ordem e Progresso!"
 BRA_second: "República dos Estados Unidos do Brasil"
 BRA_usa: "Импорт американской стали"
 BRA_usa_desc: "Американская промышленность сейчас бурно развивается. Новой бразильской армии потребуется много стали, если мы хотим идти по современному пути. Индустриализация Бразилии всё ещё развивается. Однако наш географический естественный союзник, крупнейшая держава в Америке, США, имеет бесконечные запасы стали для продажи. Нам обязательно стоит импортировать часть этой стали, чтобы обеспечить наши поставки."
 BRA_milpolice: "Polícia Militar"
 BRA_milpolice_desc: "До режима Варгаса военная полиция была угрозой для страны. Губернаторы разных автономных штатов использовали силы каждого штата как свои личные армии. Во время централизации власти в 1932 году федеральная армия обеспечила, чтобы эти департаменты военной полиции стали снова лояльными. Лояльными Рио, а не разным штатам Бразилии. Теперь нам нужно их модернизировать."
 BRA_wagon: "Парадные повозки для карнавала"
 BRA_wagon_desc: "Карнавал известен своим обширным использованием украшенных транспортных средств. Отныне государство также сосредоточится на создании таких «украшенных» транспортных средств; только у них будет немного больше «практичности», чем у уже существующих парадных повозок."
 BRA_copacabana: "Фейерверки на Копакабане"
 BRA_copacabana_desc: "Копакабана в Рио-де-Жанейро, возможно, самый известный пляж в мире. Его расположение в красивой городской бухте с Кристо Редентором, наблюдающим за посетителями, — поистине чудесное зрелище. Скоро фейерверки будут не единственным световым шоу, которое туристы и бразильцы смогут увидеть на этом пляже. Боевая подготовка наших «катюш» поблизости приведёт к замечательному «огненному» зрелищу на пляже."
 BRA_authority: "Власть над частными компаниями"
 BRA_authority_desc: "Приватизация компаний была ошибкой. Наша страна выиграет от полугосударственного планирования экономики. Мы получим бóльшую долю доходов этих компаний, которые инвестируем в коллективные проекты. Теперь у нас также будет возможность требовать от компаний увеличения производства в условиях дефицита предложения, чтобы уменьшить прибыль, которую некоторые компании получают из-за этого дефицита."
 BRA_coronelismo: "Освободиться от коронелизма"
 BRA_coronelismo_desc: "Коронелизм, или власть коронелов, должен исчезнуть. Эти местные олигархи, часто производящие кофе, имеют слишком много власти в сельской местности. Они подавляют рост экономического городского развития. Экономический центр должен сместиться в города. Нам нужно избавиться от них, хотя мы будем одновременно защищать местные интересы агроэкспорта. Верность или смерть."
 BRA_snake1: "Бразильский экспедиционный корпус"
 BRA_snake1extra: "Бразильский экспедиционный корпус"
 BRA_snake1_desc: "Наши военные усилия наконец окупаются. В эти смутные времена молодая и боеспособная бразильская армия готова нанести удар там, где это необходимо. Бразилия теперь обладает огромной силой. Мы должны демонстрировать наши мускулы везде, где возможно, уничтожить силы Оси и внести большой вклад в глобальный мир. Пусть наши враги почувствуют ярость разгневанного бразильца!"
 BRA_snake1extra_desc: "Наши военные усилия наконец начинают приносить плоды. В эти смутные времена молодая и полная сил бразильская армия готова нанести удар там, где это необходимо. Бразилия теперь обладает огромной силой. Мы должны демонстрировать свою мощь при любой возможности, уничтожить силы Оси и внести весомый вклад в глобальный мир. Пусть наши враги познают ярость разгневанного бразильца!"
 BRA_nav2: "Модернизация «Минас-Жерайс»"
 BRA_nav2_desc: "Когда-то «Минас-Жерайс» был предметом зависти всего мира, дредноутом, способным дать залп такой мощи, которой не знал равных. Этот корабль по-прежнему весьма престижен, и Бразилия невероятно гордится им. Именно поэтому корабль должен обрести вторую жизнь. В условиях современной морской войны он находится на последнем издыхании. Отправить его обратно в док для капитальной модернизации было бы великолепно. Его слава будет жить вечно."
 BRA_disband: "Роспуск всех политических партий"
 BRA_disband_desc: "Политические партии представляют угрозу для бразильского населения. Они лишь пытаются вмешиваться в нашу внутреннюю политику, чтобы дестабилизировать нацию. От фашистов до коммунистов — все подчинятся Рио. Корпоративизм станет новой нормой. Никакого политического представительства, только профессиональное."
 BRA_latifundios: "Уступки латифундистам"
 BRA_latifundios_desc: "Землевладельцы, или латифундисты, всегда имели значительное влияние в нашей стране. Мы даем им автономию, а они следят за тем, чтобы относительно заброшенные регионы оставались стабильными и экономически значимыми. Чтобы гарантировать, что Варгас останется у власти, и избавиться от всех коммунистов, не лишено смысла подумать о заключении неких «сделок» с ними и их сторонниками-интегралистами."
 BRA_cometobrazil: "Приезжайте в Бразилию!"
 BRA_cometobrazil_desc: "Бразилия — самая красивая страна на земле. Мы окружены великолепной природой, насколько хватает глаз. С культурной точки зрения мы довольно близки к Западу благодаря нашему колониальному прошлому. Мы говорим, например, на знакомом языке. Наше побережье принадлежит к одним из самых современных районов мира! Самое главное, это далеко от западных домов. Идеальное место, чтобы немного расслабиться. Вы едете в Бразилию!"
 BRA_martial: "Ввести §Rвоенное положение§!"
 BRA_martial_desc: "Наша страна в руинах. Коррупция стала повседневной привычкой. Ничто больше не работает эффективно. Если мы позволим этому продолжаться, Бразилия будет отброшена назад во времени. Варгас должен захватить всю полноту власти и ввести военное положение там, где это необходимо. Это единственный способ снова насильно поставить нашу страну на рельсы."
 BRA_blackmail: "Шантажировать Британию"
 BRA_blackmail_desc: "Из-за нашего идеологического сходства мы поддерживали значительный объем торговли со странами Оси. Теперь, когда мировое напряжение растет, Союзники требуют, чтобы мы сократили нашу торговлю с этими странами. На самом деле, нам следует пригрозить присоединиться к Оси. Если Британия хочет, чтобы мы не присоединялись к Оси И сократили нашу торговлю с ними, мы могли бы потребовать приличную сумму субсидий посредством обычного и тонкого шантажа."
 BRA_goodneighbor: "Политика добрососедства"
 BRA_goodneighbor_desc: "США пытаются установить хорошие отношения со странами Латинской Америки. Как экономически крупнейшая страна в этом регионе, Бразилия играет фундаментальную роль в этой политике добрососедства. Обе стороны получат огромную выгоду, если сотрудничество между нашими странами усилится. Кармен Миранда будет нашим символическим посланником, она известная танцовщица на Западе. Родилась в Португалии, выросла в Бразилии!"
 BRA_nav1: "Уничтожить волков"
 BRA_nav1_desc: "Напряженность в Европе растет, и неизбежно растут и инновации в военных товарах. Морская война не исключение. На мировую арену выходит новый тип корабля — подводная лодка. Эти корабли могут стать угрозой для нашей торговли с Европой и остальным Американским континентом. Мы должны активно инвестировать в борьбу с этими подводными лодками. Наша торговля должна быть защищена нашим флотом любой ценой."
 BRA_amazons: "Родина амазонок"
 BRA_amazons_desc: "В 1542 году Гаспар де Карвахаль, испанский хронист, столкнулся с племенем, которое, как он полагал, было настоящими амазонками из рассказов Гомера и Геродота. Он описал их как: «очень белых и высоких, с очень длинными волосами, заплетенными в косы и обвитыми вокруг голов. Они очень сильны и ходят нагими, прикрыв срамные места, с луками и стрелами в руках, сражаясь как десять индейцев-мужчин»."
 BRA_centralize: "Централизовать власть в Рио"
 BRA_centralize_desc: "Чтобы бороться с местными олигархами и сохранить власть над сельскими районами, нам абсолютно необходимо начать решительные усилия по централизации. Мы создадим эффективную бюрократию, непроницаемую для крупной коррупции, что усилит центральное командование и власть Варгаса. Централизуя и превращая Рио в крупный торговый узел, мы также привлечем всевозможные необходимые отрасли промышленности. Рио-де-Жанейро станет мегаполисом!"
 BRA_dops: "Departamento de Ordem Política e Social"
 BRA_dops_desc: "Департамент политического и социального порядка значительно усилит власть полиции в нашей борьбе за обеспечение стабильности и процветания бразильского государства. DOPS будет могущественной политической полицией и секретной службой, которая поможет нам избавиться от любых «нестабильных элементов» внутри государства. Иногда лучше просто позволить кому-то исчезнуть без скучного длительного суда."
 BRA_tradeunion: "§GОбуздать профсоюзы§!"
 BRA_tradeunion_desc: "Теперь, когда Великая депрессия подходит к концу, профсоюзы становятся все менее влиятельными. Своими забастовками они вызвали много нестабильности и, как следствие, коррупции. Пришло время обуздать профсоюзы. Их деятельность просто вызывает слишком много нестабильности, которая нам не нужна! Им не место в Estado Novo."
 BRA_tsn: "§OАвтономный TSN§!"
 BRA_tsn_desc: "Трибунал национальной безопасности (Tribunal de Segurança Nacional) уже создан для суда над теми, кто вносит нестабильность в нацию, в основном над коммунистами и политическими оппонентами. Судебные процессы идут недостаточно быстро, нормой стали вечные юридические процедуры. У нас есть возможности для радикальных реформ. Мы должны сделать невозможным подачу апелляций по делам. Мы должны освободить TSN от остальной правовой системы."
 BRA_constitution: "§HКонституция 1937 года§!"
 BRA_constitution_desc: "4-летний президентский срок Варгаса почти подошел к концу. Однако наше государство находится в относительно нестабильном состоянии. Коррупция разрушит нашу страну, если мы проведем свободные выборы. Пришло время провести радикальную реформу с нашим планом Коэн. Будет введена новая конституция. Варгас сохранит власть. Коммунисты заплатят за это."
 BRA_surdo: "Новый сурду"
 BRA_surdo_desc: "Сурду, традиционный бразильский бас-барабан. Мощный инструмент, созданный, чтобы придать «ощущение» карнавалу, удар. Скоро не только эти сурду заставят содрогаться улицы Бразилии. Наши недавно разработанные артиллерийские орудия заставят трястись целые города. Эти славные залпы принесут престиж Бразилии!"
 BRA_prestes: "Последователи Престеса"
 BRA_prestes_desc: "Молодые офицеры, обученные в Европе, тенентисты, имеют значительное влияние в армии и считают себя выше старой гвардии. Они жаждут радикальных реформ. Их бывший лидер Престес оказался коммунистом, который даже развязал Intentona Communista! Мы должны сохранить наши традиционные устои в армии и очистить ее от всех этих опасных молодых офицеров, последовавших за коммунистом!"
 BRA_second_desc: "Революция 1930 года положила конец Первой республике. Из-за своего хаотичного рождения Вторая республика в ее нынешней форме находится на грани краха. Сильный лидер жизненно важен в этой борьбе с коррупцией. Кто-то должен радикально реформировать Бразилию, иначе мы погибнем в этом постоянно меняющемся мире."
 BRA_gunimport: "Импорт американского оружия"
 BRA_gunimport_desc: "Поскольку мы пытаемся создать армию внушительных размеров, нам нужны люди. К счастью, у нас их много. Единственное, чего нам не хватает в краткосрочной перспективе, — это винтовки, снаряды, артиллерия и пули. К счастью, рядом с нами находится промышленная держава — Соединенные Штаты Америки. Если мы хотим достичь наших целей в области военной политики, нам нужно заказать немного оружия у Дяди Сэма."
 BRA_snake2: "Бразильский бронетанковый батальон"
 BRA_snake2extra: "Бразильский бронетанковый батальон"
 BRA_snake2_desc: "Наши военные усилия наконец начинают приносить плоды. В эти смутные времена молодая и жизненно важная сверхсовременная бразильская армия готова нанести удар там, где это необходимо. Бразилии не нужна огромная армия, в Америке нет прямой военной угрозы. Вместо этого мы должны время от времени демонстрировать свою мощь, помогать нашим союзникам везде, где можем, и вносить вклад в глобальный мир. Пусть наши враги познают ярость бразильской катящейся стали!"
 BRA_alliedtrade: "Торговые соглашения с Союзниками"
 BRA_alliedtrade_desc: "Географически Бразилия невероятно сильно зависит от торговли с Союзниками. Идеологически Бразилия ближе к странам Оси, но делать себя слишком зависимой от Оси было бы экономически уязвимо. Мы не должны этого допустить."
 BRA_axistrade_desc: "Страны Оси, особенно Италия, идеологически очень близки к нашей собственной внедренной идеологии в Бразилии. Мы должны усилить сотрудничество со странами Оси. Мы не подведем наших братьев в создании нового порядка!"
 BRA_axistrade: "Торговые соглашения с Осью"
 BRA_estadonovo: "Эра Варгаса"
 BRA_estadonovo_desc: "Жетулиу Варгас, наш великий лидер, должен получить большие полномочия для управления все более напряженной политической ситуацией в Бразилии. Пришло время построить новую Бразилию, новое государство — «O Estado Novo». Коммунистическая угроза присутствует всегда. Всегда."
 BRA_communist: "Последствия «Intentona Communista»"
 BRA_communist_desc: "В прошлом ноябре эти докучливые коммунисты под руководством Престеса попытались захватить власть, предприняв попытку переворота в «коммунистической попытке»! Смехотворно! К счастью, она провалилась с треском. Мы должны начать запрещать и искоренять коммунизм раз и навсегда. Также необходимо предоставить Варгасу больше полномочий в этом вопросе, это сильно зависит от стабильности нации."
 HOL_request_allied_favors2: "Банкир сопротивления"
 HOL_request_allied_favors2_desc: "Валравен ван Холл — абсолютный герой. Сотрудничая с немцами, он способен совершать крупные банковские махинации для финансирования сопротивления на материке. Мы должны быть очень благодарны ему за то, что он есть на этой войне."
 HOL_devour_desc: "У нас есть история с японцами, мы всегда поддерживали дружеские отношения с его величеством и годами торговали с ними на острове Дэдзима. Теперь, когда они обратились против нас, мы знаем их слабости. Голландский Лев проглотит Восходящее Солнце. Это неизбежно."
 HOL_empire_desc: "Единственная причина, по которой наша империя все еще существует, — это наше выдающееся военно-морское положение. Мы должны хорошо поддерживать наш флот и больше инвестировать в наши военно-морские силы, если хотим сохранить наши колонии и наше видное положение на мировой арене."
 HOL_doorman: "Взгляд Доормана"
 HOL_suriname: "Развитие Суринама"
 HOL_propaganda: "§OАКТИВИРУЕТ ГОЛЛАНДСКИЕ ВОЕННЫЕ ПРОПАГАНДИСТСКИЕ КАМПАНИИ.§!"
 NED: "Королевство Нидерландов"
 HOL_curacao: "Развитие Кюрасао"
 HOL_invest: "Инвестиции в Запад"
 HOL_the_east_indies_war_machine2: "Битва за Голландскую Ост-Индию"
 HOL_the_east_indies_war_machine2_desc: "Время пришло, мы должны защищать наш второй дом до последнего человека, да хранит нас королева и прогонит японцев. Доорман защитит наши крупнейшие города нашим уважаемым флотом. Но нам понадобится больше снаряжения для защиты этой огромной территории суши."
 HOL_doorman_desc: "Мы должны следовать военно-морскому подходу нашего адмирала Карела Доормана. Флот является опорой нашей империи, и только мощный флот сохранит нашу опору сильной. Восстань вновь, Голландский флот, расправь свои крылья и сохраняй империю любой ценой!"
 HOL_helfrich_desc: "«Маленький, дешевый, но высокоэффективный» — таков подход адмирала Конрада Хельфриха. Подводные лодки обеспечат доступный способ сохранения нашей империи в безопасности. Голландский флот никогда не был связан с большими орудиями; подход часто заключался в умном и эффективном флоте, так что давайте продолжать этот путь."
 HOL_helfrich: "Взгляд Хельфриха"
 HOL_dewitt: "Подход де Витта"
 HOL_dewitt_desc: "Ян де Витт правил Республикой в период ее экономического и культурного расцвета; приоритет флота принес огромное процветание благодаря усилению и лучшей защите торговли. Его флот защищал страну, ее богатство и богатую культуру в течение довольно долгого времени. Тогда англичане угрожали нашему суверенитету и торговле, теперь — японцы, итальянцы и немцы. Давайте дадим им вкусить наше морское наследие..."
 HOL_ship_a_day_sinking_quotas2: "Подход Маурица"
 HOL_ship_a_day_sinking_quotas2_desc: "Мауриц, член дома Оранских, (со)правил нашей страной довольно долгое время. По его мнению, было необходимо уделять первоочередное внимание армии, чтобы иметь прочную опору в континентальной Европе. Флот должен быть эффективным, но не большим и не дорогим. Этот подход кажется правильным, поскольку нам нужно остановить монстра на суше."
 HOL_fokker2: "Приоритет Fokker"
 HOL_fokker2_desc: "Настало время, когда Fokker нужен нам больше всего, без их самолетов у нас нет шансов выиграть эту войну. Мы должны временно предоставить Fokker огромные субсидии, чтобы помочь выковать нашу военную машину. У нас нет другого выбора."
 HOL_eendracht: "Concordia Res Parvae Crescunt"
 HOL_eendracht_desc: "В единстве — сила. Адмирал де Рюйтер, возможно, лучший пример этой общей истины. Еще в 1665 году, когда мы вели войну против могущественного Королевского флота, он мог совершать впечатляющие дела благодаря решительной нации, стоявшей за ним без каких-либо внутренних конфликтов. Он обладал всем, что мог пожелать, что привело к уничтожению Королевского флота."
 HOL_shell: "Роял Датч Шелл"
 HOL_shell_desc: "Shell — одна из наших крупнейших государственных компаний и одна из крупнейших нефтяных компаний в мире. Спрос на нефть стремительно растет, что принесет огромную выгоду Shell и, следовательно, государству. У Shell большие перспективы и большое будущее."
 HOL_hoogoven: "Королевские печи Эймёйдена"
 HOL_hoogoven_desc: "Наша промышленная гордость — Королевские печи Эймёйдена. Один из крупнейших сталелитейных заводов в Европе и невероятно важный для правительства. Мы должны расширить сталелитейный завод, чтобы создать больше рабочих мест в этой экономической преисподней, в которой мы находимся. Если мы продолжим расширение и будем стимулировать сталелитейный завод, он прослужит десятилетия и будет гордостью нашей нации."
 HOL_NS: "Голландские железные дороги"
 HOL_NS_idea: "Nederlandse Spoorwegen"
 railway_company2: "Железнодорожная компания"
 FIN_salla: "Освободить Саллу!"
 FIN_salla_desc: "Финны Саллы будут освобождены от советской оккупации!"
 FIN_karelia: "Освободить Карьялу!"
 FIN_karelia_desc: "Финны Карьялы будут освобождены от советской оккупации!"
 HOL_NS_desc: "Мы должны объединить железнодорожные компании государства в одну компанию — Голландские железные дороги. Мы расширим железнодорожную сеть, чтобы создать больше рабочих мест для увеличения производства в нашей возрождающейся экономике, и, если мы хорошо организуем эту государственную компанию, это принесет пользу голландскому народу в ближайшие десятилетия. Каждый сможет пользоваться нашей сложной и хорошо организованной железнодорожной сетью."
 #ENG_dresden_idea_desc: ""
 ITA_messe_desc: "После возвращения Мессе из Эфиопии он настоял на крупных армейских реформах. Давайте дадим ему пространство для реализации своих планов. Первая реформа — моторизация. Наша армия все еще в значительной степени основана на кавалерии, а кавалерия быстро выходит из моды."
 ITA_messe: "Армейские реформы Мессе"
 ITA_naval_air_effort2: "Бомбардировщики Savoia-Marchetti"
 ITA_naval_air_effort2_desc: "Морские бомбардировщики стали неотъемлемой частью морской войны; если мы хотим оспорить британское могущество в Средиземноморье, нам нужны эти бомбардировщики."
 ITA_fascismo: "Per L'Ideologia Fascista"
 ITA_fascismo_desc: "Мы никогда не отдадим Италию этим демократам, per l'ideologia fascista! (за фашистскую идеологию!)"
 ITA_liberatori: "Ecco I 'Liberatori'"
 ITA_italian_highways2: "По крайней мере, они ходят по расписанию!"
 ITA_italian_highways2_desc: "Муссолини лично позаботится о расписании движения поездов! Фашизм, возможно, и не решение всех проблем, но он заставляет дела делаться! Например, поезда ходят вовремя, великолепно!"
 ITA_liberatori_desc: "Теперь, когда мы потеряли Четвертый берег, основная цель Союзников сместилась на материковую часть Италии. Бомбардировки итальянской территории в будущем участятся. Нам нужно бороться с воздушными атаками тех, кто называет себя «liberatori»."
 ITA_bomber_effort2: "Бомбардировщики Filippo Zappata"
 ITA_bomber_effort2_desc: "Чтобы противостоять промышленной мощи Союзников, нам нужны бомбардировщики, чтобы максимально нарушить их промышленное преимущество."
 ITA_jet_engine_effort2_desc: "Военное время переводит военные разработки на высокие обороты, появилось новое поколение самолетов."
 ITA_africa_campaign1: "Britannia Annhilianda"
 ITA_africa_campaign3: "Le Vedova di Italia"
 ITA_africa_campaign3_desc: "Долго мы сражались за фашистские идеалы в этой проклятой войне, пропитанной кровью молодых людей нашей страны. Мы не можем позволить силам Союзников отвоевать землю, за которую мы пролили столько крови. Если бы мы потеряли наши земли, это было бы необъяснимо для всех итальянских вдов, которые сдерживали слезы, находя покой в идеологической жертве, которую принесли их мужья..."
 ITA_jet_engine_effort2: "Реактивные самолеты Reggiane"
 ITA_defense_italia_desc: "Война идет не обязательно в пользу Италии, но у нас еще есть время переломить ход событий. Fortezza Italia здесь! Однако, чтобы это сработало, наше воздушное пространство должно охраняться как можно лучше."
 ITA_africa_campaign1_desc: "Снова мы маршируем к плодородным землям Египта. На этот раз нас ждет не кеметический народ Египта, готовый к завоеванию. На этот раз враг гораздо более грозный, враг, превзошедший имперский Рим по размеру, — империя Британия. Британия, которая должна быть уничтожена. Brittania Annihilanda."
 ITA_africa_campaign2: "Наше море"
 ITA_africa_campaign2_desc: "Novum nostrum Imperium Romanum nunc capiendum est, Imperator vivat, super nos regnet et regnent naves nostra nostra maria! (Нашу Новую Римскую империю нужно взять сейчас, да здравствует Император, да правит он над нами и да правят наши корабли над нашими морями!)"
 ITA_steal_canada_mech_manufacturing_plan: "Украсть канадские планы механизированного производства"
 ITA_steal_canada_mech_manufacturing_plan_desc: "Нам сообщили, что канадцы располагают более дешёвой, но не уступающей по качеству конструкцией механизированного снаряжения. Стоит отправить «посла», который помимо официальных обязанностей займётся кое-какими «попутными» делами."
 ITA_learn_germany: "Учиться у панцерваффе"
 ITA_learn_germany_desc: "Наши танки и бронетанковая тактика не лучшие в мире – мы усвоили это во время войны в Эфиопии. Но немецкие танки и их тактика сейчас наиболее инновационны. Возможно, несколько немецких экспертов могли бы прилететь из Берлина в Рим, чтобы помочь нам..."
 ITA_modernized_artillery_at2: "Cannone da 47/32"
 ITA_modernized_artillery_at2_desc: "Наши противотанковые модели устарели и не смогут эффективно противостоять современной броне."
 ITA_Expand_Roma: "Расширение Рима"
 ITA_Expand_Roma_desc: "За последние годы дуче значительно улучшил нашу столицу во многих аспектах. Рим – гордость, столица и вскоре один из главных промышленных центров нашей страны!"
 ITA_armored_effort2: "Итальянская броня"
 ITA_armored_effort2_desc: "В Эфиопии Мессе понял, что броня станет будущим сухопутной войны. Прислушаемся к нашему прославленному генералу."
 ITA_Littorio_Classe: "Класс «Литторио»"
 ITA_Littorio_Classe_desc: "Класс «Литторио» назван в честь ликтора – высокопоставленного слуги Римской империи, приставленного охранять высших магистратов, то есть стражей государства. Линкоры RN Littorio, RN Vittorio Veneto, RN Roma и RN Impero почти завершены и тоже станут стражами государства. Эти красавцы будут Imperatores Marium (повелителями морей)."
 ITA_Aquila_Classe: "Класс «Аквила»"
 ITA_Aquila_Classe_desc: "Аквила была символом Рима тысячелетиями. Этот авианосец «Аквила» будет охранять наши моря так же хорошо, как орёл охранял Рим."
 ITA_blow_away: "Смести их"
 ITA_blow_away_desc: "Артиллерия становится всё более важной в современных армиях. Модернизация артиллерии и развитие тактики бомбардировок будут мудрым шагом."
 ITA_WW1_strategy: "Развить тактику Первой мировой"
 ITA_WW1_strategy_desc: "Австро-венгерский фронт Первой мировой был не самым манёвренным, но по крайней мере стабильным. Если мы продолжим развивать эту тактику, то не допустим прорыва фронта на итальянской стороне и, возможно, даже сможем продвинуться на несколько метров на будущих фронтах."
 ITA_equipment_modernization: "Беретта М1938"
 ITA_equipment_modernization_desc: "Moschetto Automatico Beretta Modello 1938 – это новое мощное оружие, разработанное нашими военными производителями. Винтовка – шестое чувство солдата. Если наше шестое чувство будет лучше вражеского, мы получим огромное преимущество на поле боя."
 ITA_modernized_artillery2: "Cannone da 149/40 Modello 35"
 ITA_modernized_artillery2_desc: "Новое орудие Cannone da 149/40 modello 35 станет основой итальянской армии и вселит страх в сердца врагов."
 ITA_cheap_artillery: "Государственные скидки на Breda"
 ITA_cheap_artillery_desc: "Breda, наш разработчик артиллерии, «спонтанно» предоставила нам производственные скидки. Как удобно!"
 ITA_strong_artillery: "Совершенствование выплавки стали"
 ITA_strong_artillery_desc: "Мы открыли новые способы выплавки стали, позволяющие создавать высокоточные артиллерийские орудия. Это серьёзно поможет нам в бою."
 ITA_cheap_equipment: "Массовое развёртывание"
 ITA_cheap_equipment_desc: "Слегка изменив конструкцию винтовок, мы сможем производить их быстрее и эффективнее, хотя несчастные случаи могут участиться, но об этом солдатам знать не обязательно."
 ITA_superior_tactics: "Развитие передовой тактики Первой мировой"
 ITA_superior_tactics_desc: "Мы долго изучали нашу тактику Первой мировой и довели её до уровня, пригодного для современной войны."
 ITA_special_forcess: "Учиться у ардити"
 ITA_special_forcess_desc: "Ардити («Отчаянные») были грозным итальянским спецназом времён Первой мировой. Они проявляли невероятную выносливость на поле боя и были гордостью нации. Перенимем и улучшим их тактику, чтобы наши современные силы спецназначения учились на ней и становились лучше."
 ITA_commence_mare: "Начать «Mare Nostrum»"
 ITA_commence_mare_desc: "Мы разработали грандиозный план по завоеванию всех средиземноморских островов. Это первый шаг к «Mare Nostrum»!"
 ITA_arditi: "Воссоздание ардити"
 ITA_arditi_desc: "Настало время возродить самые грозные сухопутные силы Италии. Ардити будут процветать в эти тёмные времена, как и говорит их эмблема, и как доказали их прошлые подвиги. Помолимся за их победы..."
 ITA_improved_infantry_weapons: "Беретта М1938"
 ITA_soldati_classe: "Класс «Camicia Nera»"
 ITA_soldati_classe_desc: "Класс «Soldati» более известен как класс «Camicia Nera», названный в честь итальянской полувоенной организации чернорубашечников. Как и во время Марша на Рим в 1922 году, Camicia Nera станет устрашающей массой, но теперь в пылу морского сражения."
 ITA_condottieri_classe: "Класс «Condottieri»"
 ITA_condottieri_classe_desc: "Кондотьеры были капитанами огромных армий наёмников, которые действовали в этой стране столетия назад. Они были связующим звеном между генералами и солдатами. Наши крейсера будут играть ту же роль на морском поле боя."
 ITA_regia_marina: "Cantieri Ruiniti dell'Adriatico"
 ITA_regia_marina_desc: "Cantieri Ruiniti dell'Adriatico станет нашим королевским военно-морским производителем для возрождённого фашистского Regia Marina. Она будет становым хребтом нашего средиземноморского тела!"
 ITA_yamato: "Миссия Кампиони в Японию"
 ITA_yamato_desc: "Японцы построили величайший линкор, который когда-либо видело человечество. Мы должны отправить Кампиони к Ямамото для обмена морскими технологиями. Regia Marina необходимо научиться строить линкоры так же эффективно, как японцы. Это зависит от нашего собственного выживания..."
 ITA_Rule_Supreme: "Brittania Caedetur"
 ITA_Rule_Supreme_desc: "Королевский флот, говорите? Сейчас это сказка для маленьких детей. Brittania caedetur! (Британия будет уничтожена!)"
 ITA_san_marco_brigade: "Brigata Marina San Marco"
 ITA_san_marco_brigade_desc: "Бригада Сан-Марко, основанная в 1550 году, является одним из старейших морских корпусов в мире. Долгие традиции в сочетании с модернизацией приведут к созданию одного из самых грозных спецподразделений в мире."
 ITA_marconi_classe: "Класс «Marconi»"
 ITA_marconi_classe_desc: "Гульельмо Маркони был великим итальянским учёным, человеком, подарившим миру радио. Революция! Его известное изобретение непременно поможет нашей новой смертоносной подводной лодке в операциях по нарушению судоходства."
 ITA_Challenge_The_Royal_Navy: "Италия против Британии"
 ITA_Challenge_The_Royal_Navy_desc: "Italia turrita, защитница нашей нации, бросила вызов леди Британии, чтобы раз и навсегда решить средиземноморский вопрос. Поэтому она ищет нашей поддержки, ярости и верности в достижении этой общей итальянской цели."
 Roman_Empire_fascism: "Novum Imperium Romanum"
 Roman_Empire_fascism_DEF: "Novum Imperium Romanum"
 ITA_form_rome: "Reformate Imperium Romanum"
 Imperator_Romanorum: "Imperator Romanorum"
 ITA_annex_syria: "Аннексировать Сирию"
 ITA_Italian_Development: "Сосредоточиться на Италии"
 ITA_Italian_Development_desc: "Колонии — это хорошо, но Италия — становой хребет нашей Империи. Будем развивать нашу родную базу."
 ITA_National_Projects: "Национальные проекты"
 ITA_National_Projects_desc: "Новые государственные строительные проекты в неоклассическом стиле возродили древний итальянский строительный дух. Строй! Строй! Строй!"
 ENG_tfv: "Вместе к победе!"
 ENG_tfv_desc: "Только общим потом и кровью мы сможем одолеть фрицев."
 ENG_dresden: "Ковровая бомбардировка"
 ENG_dresden_desc: "«Если Россия сможет сдерживать Германию на суше, я сомневаюсь, выдержит ли Германия 12 или 18 месяцев непрерывных, усиленных и нарастающих бомбардировок, которые неизбежно скажутся на её военном производстве, способности к сопротивлению, промышленности и воле к сопротивлению (под чем я подразумеваю моральный дух)». — Сэр Джон Эдвард Синглтон"
 CRO_ivan_orsanic: "Иван Оршанич"
 CRO_milan_budak: "Милан Будак"
 CRO_vladimir_nazor: "Владимир Назор"
 CRO_bozidar_magovac: "Божидар Маговац"
 CRO_andrija_hebrang: "Андрия Хебранг"
 CRO_august_kosutic: "Август Кошутич"
 CRO_mladen_lorkovic: "Младен Лоркович"
 CRO_ante_vokic: "Анте Вокич"
 CRO_vladko_macek: "Владко Мачек"
 CRO_vjekoslav_vrancic: "Векослав Вранчич"
 HOL_marines: "Korps Mariniers"
 HOL_marines_desc: "Наш корпус морской пехоты был основан в 1665 году, в расцвет нашего Золотого века. Тогда они совершили рейд на Медуэй и прославились на всю Европу. Пусть Ось снова почувствует тот же страх."
 HOL_secret_staff_talks2: "Объединённое командование Бенилюкса"
 HOL_secret_staff_talks2_desc: "Мировая напряжённость достигла пугающего уровня. Тесное военное сотрудничество с нашими ближайшими союзниками, Бельгией и Люксембургом, будет необходимо, чтобы устоять перед растущей угрозой стран Оси."
 HOL_light_tanks_for_the_colonies2: "Голландский блицкриг"
 HOL_light_tanks_for_the_colonies2_desc: "Наши восточные соседи, немцы, создали чрезвычайно грозную и современную сухопутную армию благодаря разумному использованию бронетанковых технологий. Может, нам стоит немного скопировать их? Всё-таки германские братья. Только наша собственная железная волна может остановить их. Броня также будет очень полезна на огромных просторах нашей восточной колонии."
 HOL_lessons_from_the_low_countries2: "Польдерная герилья"
 HOL_lessons_from_the_low_countries2_desc: "Наш амфибийный ландшафт на протяжении веков был и проклятием, и благословением. Иногда море нас топило, иногда защищало. Ватерлиния, например, несколько раз нас спасала. Наш опыт борьбы с ландшафтом должен пойти нам на пользу в борьбе с внешней угрозой."
 HOL_liberation2: "Bevrijding!"
 HOL_liberation2_desc: "God zegene het Vaderland."
 HOL_hussars: "Koninklijke Huzaren"
 HOL_hussars_desc: "Полк гусар Бореля считается одним из самых элитных гусарских подразделений в мире. Наши хорошо обученные элитные гусары нужны нам сейчас как никогда в эти неспокойные времена."
 HOL_anti_tank_guns_for_the_continent2: "Остановить железную волну"
 HOL_anti_tank_guns_for_the_continent2_desc: "Мы не сможем создать высокосовременную бронированную армию за несколько месяцев — это займёт годы. У нас нет такого времени. Пока рейх стучится в нашу восточную границу, мы должны инвестировать в противотанковые орудия: они дёшевы, эффективны и не требуют лет дополнительных разработок."
 HOL_production_under_license2: "Вернуть долг за поставки оружия 1770-х"
 HOL_production_under_license2_desc: "Во время Войны за независимость США наша страна здорово помогла американским повстанцам, поставляя им военное снаряжение. Было бы замечательно, если бы США теперь помогли НАМ с военными материалами. Надеемся, один из наших старейших союзников согласится."
 HOL_appoint_new_supreme_commander2: "Инвестиции в KNIL"
 HOL_appoint_new_supreme_commander2_desc: "KNIL, Королевская голландская ост-индская армия, не помешали бы инвестиции. Агрессивное поведение Восходящего солнца может стать потенциальной угрозой для нашей империи, что нам, очевидно, не нравится. Если Восходящее солнце строит угрожающие планы на будущее, мы должны быть готовы нанести контрудар немедленно и сокрушить их под своими сапогами."
 HOL_modernize_our_infantry_equipment2: "Модернизировать голландский Mannlicher"
 HOL_modernize_our_infantry_equipment2_desc: "Мы знаем, что наше снаряжение в нынешнем состоянии не годится для противостояния любой модернизированной армии Европы. Нужно модернизировать армейское снаряжение, особенно винтовки — немецкие винтовки времён Первой мировой. Это не займёт много времени, относительно дёшево и весьма эффективно. Мы сможем относительно быстро превратить нашу пехоту в современную сухопутную силу."
 HOL_krijgsmacht: "Nederlandsche Krijgsmacht"
 HOL_krijgsmacht_desc: "De Koninklijke Marine, Landmacht en Luchtmacht — это официальные составляющие наших национальных вооружённых сил. В условиях растущей напряжённости в мире мы должны снова вложиться в наши вооружённые силы после десятилетий пренебрежения. Наше собственное выживание зависит от этого."
 HOL_zevenprovincien: "Zeven Provinciën"
 HOL_zevenprovincien_desc: "«До сих пор они были коронованы славными успехами по божьей милости», — писал Корнелис де Витт после того, как он и адмирал де Рейтер захватили «Ройял Чарльз» в Чатеме, командуя знаменитой операцией на борту «Семи провинций». С тех пор «Семь провинций» является вечной гордостью флота. Пусть так и будет."
 HOL_fokker1: "Назначить Fokker"
 HOL_fokker1_desc: "Fokker — наша самая успешная авиастроительная компания благодаря массовым продажам качественной продукции в годы Первой мировой войны в качестве нейтральной стороны. Её военные самолёты использовались по всему миру, хотя они иногда забывают свои корни. Укрепим наши связи с Fokker."
 JAP_strike_on_the_northern_resource_area: "Удар по северной ресурсной зоне"
 JAP_strike_on_the_northern_resource_area_desc: "Наши планы увенчались успехом. Однако полученные ресурсы недостаточны для поддержания нашей военной промышленности. Мы должны следовать доктрине, которую предпочитает армия, и нанести удар на север, в Советский Союз."
 CRO_tomislav_II: "Томислав II"
 CRO_tomislav_II_desc: "Принц Аймоне Савойский, двоюродный брат короля Италии Виктора-Эммануила III, принял корону Хорватии. Чтобы отметить это событие как воссоздание хорватской монархии, он выбрал имя Томислав II, преемник Томислава, основателя Хорватии."
 JAP_armored_divisions2: "Chi-Ri"
 JAP_armored_divisions2_desc: "Мы начнём исследования современных средних танков."
 cro_diplomacy_focus: "Хорватская дипломатия"
 #croatia semi generic
 CRO_officer_training: "Обучение офицеров"
 CRO_officer_training_desc: "Несмотря на все новые возможности ведения боевых действий на море и в воздухе, сухопутные войска остаются ключевым элементом войны. При должной подготовке мы сумеем избежать прежнего ада в траншеях."
 CRO_improve_conscripts_equipment: "Улучшение снаряжения призывников"
 CRO_improve_conscripts_equipment_desc: "Есть предел тому, какой вес может нести на себе пехотинец. Мы сосредоточим все усилия на том, чтобы обеспечить войска самым лучшим снаряжением."
 CRO_motorization_effort: "Моторизованная поддержка"
 CRO_motorization_effort_desc: "Основные характеристики транспортных средств пехоты — маневренность и защищенность. Сосредоточившись на развитии этого направления, мы сможем быстрее бросать войска в бой."
 CRO_army_maneuvers: "Маневры"
 CRO_army_maneuvers_desc: "Необходимо организовать маневры и привести нашу армию в форму. Кроме того, новый опыт, вне всяких сомнений, откроет нам глаза на особенности современных военных действий."
 CRO_supremacy_of_offense: "Преобладание нападения"
 CRO_supremacy_of_offense_desc: "Ключ к победе – решительные наступательные действия. Это должно быть учтено при формировании общей стратегии и разработке новых военных доктрин."
 CRO_supremacy_of_defense: "Преобладание обороны"
 CRO_supremacy_of_defense_desc: "Враги окружают нас со всех сторон, и мы должны быть способны продержаться до прибытия подкреплений от наших союзников. Разработка новых военных доктрин должна сосредоточиться на защите границ."
 CRO_artillery_regiments: "Артиллерийские полки"
 CRO_artillery_regiments_desc: "Добавление артиллерийских соединений в состав наших дивизий значительно повысит их общую боеспособность."
 CRO_domestic_artillery_production: "Отечественная артиллерия"
 CRO_domestic_artillery_production_desc: "Поддержка отечественной разработки современных артиллерийских орудий даст нашим войскам достойную огневую поддержку."
 CRO_anti_tank_defenses: "Противотанковая оборона"
 CRO_anti_tank_defenses_desc: "Поскольку сегодня центром современной военной доктрины является танк, нам необходимо сосредоточить наши усилия на разработке противотанковых орудий, которые позволили бы пехоте не бояться этих стальных великанов."
 CRO_mountain_brigades: "Горнострелковые бригады"
 CRO_mountain_brigades_desc: "Значительную часть нашей территории занимают горы, а значит, нам необходимы специальные войска, обученные для ведения боевых действий в соответствующих условиях."
 CRO_tank_conversions: "Конверсия бронетехники"
 CRO_tank_conversions_desc: "Пусть сейчас нам нужны преимущественно танки, но в ближайшем будущем нам может потребоваться и самоходная артиллерия – в том числе противотанковая – на том же шасси. Наша бронетехника должна оставаться гибкой и адаптироваться под текущие нужды."
 CRO_modern_tanks: "Современные танки"
 CRO_modern_tanks_desc: "Установка крупнокалиберных орудий расширила задачи нашей бронетехники далеко за пределы простой перевозки сил из пункта А в пункт Б. Мы должны разработать собственные модели танков, не уступающие вооружению наших соседей."
 CRO_Science: "Наука"
 CRO_Science_desc: "Мы должны инвестировать в исследования"
 
 CRO_small_arms: "Замена M95"
 CRO_small_arms_desc: "Мы должны заменить устаревшую пехотную винтовку."
 CRO_armored_cavalry: "Механизированная поддержка"
 CRO_armored_cavalry_desc: "Если мы бронируем наши моторизованные формирования, мы можем снизить воздействие огня стрелкового оружия."
 CRO_equipment_effort_2: "Развитие снаряжения II"
 CRO_equipment_effort_2_desc: "Мы будем и дальше прилагать все усилия к тому, чтобы наша пехота и войска поддержки были обеспечены наилучшим образом."
 CRO_mechanization_effort: "Развитие механизации"
 CRO_mechanization_effort_desc: "Всесторонне развивая моторизированную пехоту, мы научимся создавать самые совершенные транспортные средства."
 CRO_doctrine_effort_2: "Развитие доктрины II"
 CRO_doctrine_effort_2_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 CRO_equipment_effort_3: "Развитие снаряжения III"
 CRO_equipment_effort_3_desc: "Хватит копировать чужие образцы и закупать снаряжение за рубежом! Мы должны стать ведущим мировым производителем пехотного оружия."
 CRO_armor_effort: "Развитие бронетехники"
 CRO_armor_effort_desc: "Применив знания, полученные в ходе моторизации нашей пехоты, мы также можем усовершенствовать бронетехнику."
 CRO_special_forces: "Войска специального назначения"
 CRO_special_forces_desc: "Нам нужны элитные войска: горные стрелки и штурмовики должны стать нашим приоритетом."
 CRO_aviation_effort: "Развитие авиации"
 CRO_aviation_effort_tt: "Недостаточно стройплощадок для §Yавиабаз§!"
 CRO_aviation_effort_desc: "Война в воздухе — это направление, где научно-технический прогресс идет стремительными темпами. Любая современная держава обязана развивать авиацию."
 CRO_fighter_focus: "Ставка на истребители"
 CRO_fighter_focus_desc: "Великая война научила нас маневренному воздушному бою, но это было только начало. Чтобы сохранить преимущество в будущем, мы должны создавать самые современные истребители."
 CRO_bomber_focus: "Ставка на бомбардировщики"
 CRO_bomber_focus_desc: "Когда люди будущего станут говорить об ужасах сегодняшних войн, они вспомнят огонь, падающий с неба. Мы должны сделать все для того, чтобы такие воспоминания остались только у наших врагов."
 CRO_aviation_effort_2: "Развитие авиации II"
 CRO_aviation_effort_2_desc: "Необходимо совершенствовать военно-воздушные силы, чтобы координировать их действия с другими родами войск."
 CRO_CAS_effort: "Развитие штурмовиков"
 CRO_CAS_effort_desc: "Современная армия нуждается в поддержке не только на земле, но и в воздухе."
 CRO_rocket_effort: "Развитие ракет"
 CRO_rocket_effort_desc: "Ракеты и реактивные двигатели позволяют пилотируемым и беспилотным летательным аппаратам достигать очень высоких скоростей. Прогресс в этой области даст нам возможность заставать врага врасплох."
 CRO_NAV_effort: "Развитие аэронавигации"
 CRO_NAV_effort_desc: "В новые времена война на море ведется и под водой, и в воздухе над водной поверхностью."
 CRO_naval_effort: "Развитие военно-морского флота"
 CRO_naval_effort_tt: "Недостаточно стройплощадок для §Yверфей§!"
 CRO_naval_effort_desc: "Развитие флота должно стать для нас приоритетной задачей. Нужно направить все доступные ресурсы на строительство новых верфей и развитие легких надводных кораблей."
 CRO_flexible_navy: "ВМФ на основе многоцелевых судов"
 CRO_flexible_navy_desc: "Новая тактика ведения войны на море с учетом применения подводных лодок позволит эффективнее наносить удары по вражеским конвоям."
 CRO_large_navy: "ВМФ на основе крупных судов"
 CRO_large_navy_desc: "Включение крупных судов в нашу доктрину морской войны и обеспечение безопасности торговых конвоев покажет, какие типы кораблей нам нужнее всего."
 CRO_submarine_effort: "Строительство подводных лодок"
 CRO_submarine_effort_desc: "Война с использованием субмарин стала особенно перспективным направлением с момента появления торпедных катеров. Нам нужно научиться не только защищаться от подлодок противника, но и использовать их против вражеских кораблей."
 CRO_cruiser_effort: "Развитие крейсеров"
 CRO_cruiser_effort_desc: "Прежде чем заниматься продвинутыми разработками линкоров, нам нужно заменить устаревшие крейсеры."
 CRO_destroyer_effort: "Строительство эсминцев"
 CRO_destroyer_effort_desc: "Конструируя подводные лодки и изучая методы их применения, мы научились противостоять данной тактике ведения боя. Эсминцы для этого жизненно необходимы."
 CRO_capital_ships_effort: "Развитие крупных кораблей"
 CRO_capital_ships_effort_desc: "Держава, обладающая самым крупным флотом, будет править морями. Линкоры и авианосцы представляют старый и новый подходы к концепции господства на море."
 CRO_industrial_effort: "Развитие промышленности"
 CRO_industrial_effort_desc: "Все политические усилия следует сосредоточить на том, чтобы обеспечить развитие промышленности мирного назначения."
 CRO_industrial_effort_2: "Развитие промышленности II"
 CRO_industrial_effort_2_desc: "Стальная воля и всенародный трудовой подъем помогут нам собрать силы для нового промышленного прорыва."
 CRO_construction_effort_tt: "Недостаточно стройплощадок для §Yфабрик§!"
 CRO_construction_effort: "Развитие строительства"
 CRO_construction_effort_desc: "Развитие строительства"
 CRO_production_effort: "Производственные усилия"
 CRO_production_effort_tt: "Недостаточно стройплощадок для §Yвоенных заводов§!"
 CRO_production_effort_desc: "Кто умеет делать трактора, сумеет делать и танки! Мы не можем допустить отставания военной промышленности."
 CRO_construction_effort_2: "Развитие строительства"
 CRO_construction_effort_2_desc: "Мы должны усовершенствовать фабрики, чтобы ускорить производство товаров для торговли и обеспечить дальнейшее строительство."
 CRO_production_effort_2: "Поддержка индустрии тяжёлой техники"
 CRO_production_effort_2_desc: "Будучи одним из главных европейских портов, Антверпен находится в хорошем положении для развития промышленности, ориентированной на экспорт."
 CRO_production_effort_3: "Поддержка производителей бронетехники"
 CRO_production_effort_3_desc: "Необходимо и дальше совершенствовать военные заводы для производства самой современной военной техники."
 CRO_infrastructure_effort: "Развитие инфраструктуры"
 CRO_infrastructure_effort_desc: "Страна без соответствующей инфраструктуры не может заниматься продвинутыми исследованиями и строительством."
 CRO_infrastructure_effort_tt: "Недостаточно стройплощадок для §Yинфраструктуры§!"
 CRO_coal_mines: "Полная разработка лимбургских угольных шахт"
 CRO_coal_mines_desc: "Уголь — наш основной ресурс, и мы должны максимально увеличить его добычу."
 CRO_synth_oil_effort_tt: "Недостаточно стройплощадок для §Yнефтеперерабатывающих заводов§!"
 CRO_infrastructure_effort_2: "Развитие инфраструктуры II"
 CRO_infrastructure_effort_2_desc: "Необходимо расширять инфраструктуру, развивая транспорт и средства связи для работы над высокотехнологичными секретными проектами."
 CRO_construction_effort_3: "Индустриальные усилия III"
 CRO_construction_effort_3_desc: "Расширение нашей инфраструктуры открыло для нас новые возможности в строительной сфере."
 CRO_rockets: "Германские ракеты"
 CRO_rockets_desc: "Пригласить германских исследователей"
 CRO_extra_tech_slot: "Доп. ячейка для исследований"
 CRO_extra_tech_slot_desc: "Развитие промышленности и другие открытия последнего времени позволяют нам вести параллельные научно-технические исследования."
 CRO_extra_tech_slot_2: "Доп. ячейка для исследований II"
 CRO_extra_tech_slot_2_desc: "Быстрая индустриализация нашей страны открыла новые возможности для технических исследований, которыми нам стоит воспользоваться."
 CRO_technology_sharing: "Обмен технологиями"
 CRO_technology_sharing_desc: "Обмен новейшими технологиями с союзниками повысит эффективность военно-научных исследований всего нашего альянса."
 CRO_secret_weapons: "Секретное оружие"
 CRO_secret_weapons_desc: "Направить все свободные ресурсы на строительство танков и самолетов — это заманчиво, однако победу в войне способны обеспечить лишь новейшие научные направления: электроника, ракетостроение и атомная энергетика."
 CRO_political_effort: "Наше время настало"
 CRO_political_effort_desc: "Восстань!"
 CRO_collectivist_ethos: "Усиление синдикатов"
 CRO_collectivist_ethos_desc: "Враги могут разделять и покорять малые страны, но наш народ сохранит единство. Один за всех, и все за одного."
 CRO_liberty_ethos: "Демократический консенсус"
 CRO_liberty_ethos_desc: "В эпоху идеологических фанатиков, которые стремятся подавить в людях человечность, мы будем выступать за сохранение личных прав и свобод."
 CRO_militarism_desc: "Те, кто рассматривает армию лишь как необходимое зло, будут колебаться — вступать в войну или нет. Мы сделаем милитаризм частью своей культуры и станем нацией воинов."
 CRO_political_correctness: "Политкорректность"
 CRO_political_correctness_desc: "Люди, отстаивающие взгляды, расходящиеся с мнением большинства, беспокоятся о том, что против них существует глобальный заговор. Это любопытная идея."
 CRO_neutrality_focus: "Ставка на нейтралитет"
 CRO_neutrality_focus_desc: "Говорят, отвага и мудрость необходимы для выбора стороны в международном конфликте, но мы точно знаем, что еще больше они нужны, чтобы отказаться от выбора."
 CRO_interventionism_focus: "Ставка на интервенционизм"
 CRO_interventionism_focus_desc: "Мы готовы отстаивать свободу всех народов, а не только своих граждан. Если для победы над тиранией нужна война — пусть так."
 CRO_military_youth: "Усташская молодёжь"
 CRO_military_youth_desc: "Организации, призванные заниматься поддержанием дисциплины и политическим образованием молодежи, будут с ранних лет воспитывать ее в духе преданности и самопожертвования."
 CRO_deterrence: "Сдерживание"
 CRO_deterrence_desc: "Трудно в одиночку извлечь из войны пользу. К счастью, мы знаем, что наилучшая защита — это оружие, которое внушает такой страх, что его не нужно применять."
 CRO_volunteer_corps: "Добровольческие корпуса"
 CRO_volunteer_corps_desc: "Мы никогда не стали бы заставлять своих граждан отдавать жизнь за идеалы свободы, однако если люди сами желают помогать другим странам, мы должны предоставить им такую возможность."
 CRO_paramilitarism: "Вооруженные формирования"
 CRO_paramilitarism_desc: "Принципы военного обучения могут применяться не только в армии. С развитием полувоенных формирований, дополняющих вооруженные силы, больше людей смогут проходить боевую подготовку."
 CRO_indoctrination_focus: "Идеологическая обработка"
 CRO_indoctrination_focus_desc: "Поскольку наша идеология является истинной, ее следует преподносить как истину в последней инстанции. Система образования и средства массовой информации должны донести это до каждого."
 CRO_foreign_expeditions: "Иностранные экспедиции"
 CRO_foreign_expeditions_desc: "Поскольку наши враги намерены вмешиваться к конфликты других держав, отстаивая собственные идеалы, мы должны готовиться к аналогичным действиям."
 CRO_why_we_fight: "Почему мы сражаемся"
 CRO_why_we_fight_effect: "Если у нас нет национального духа §YНейтральная внешняя политика§!, мы сможем создавать альянсы.\n"
 CRO_why_we_fight_desc: "Мир становится все более небезопасным. Народ должен видеть, какие зверства совершаются теми, кто рвется к власти. Пора привлечь людей под наши знамена, чтобы они были готовы отстаивать свою свободу."
 CRO_political_commissars: "Политические комиссары"
 CRO_political_commissars_desc: "Чтобы наша политика последовательно проводилась в вооруженных силах, мы назначим в войска особых должностных лиц — политических руководителей."
 CRO_internationalism_focus: "Ставка на интернационализм"
 CRO_internationalism_focus_desc: "Идеология не признает границ. Любая нация может объявить себя суверенной, однако наши убеждения выше подобных ограничений."
 CRO_nationalism_focus: "Национальное возрождение"
 CRO_clergy: "Интеграция духовенства"
 CRO_clergy_desc: "Мы узаконим нашу власть, включив католическую церковь в состав правительства."
 CRO_enforce_pavelic_rule: "Укрепление власти Павелича"
 CRO_enforce_pavelic_rule_desc: "Теперь, когда усташи окончательно взяли власть, мы можем гарантировать, что наш дорогой лидер, поглавник Анте Павелич, признан всеми верными [CRO.GetAdjective]ами законным правителем нашей страны."

 CRO_militarism: "Создание домобрана"
 CRO_nationalism_focus_desc: "Наша нация уникальна, и все наши политические достижения возможны только здесь. Мы должны отстаивать это любой ценой."
 CRO_ideological_fanaticism_communism: "Идеологический фанатизм"
 CRO_ideological_fanaticism_ustasha: "Идеологический фанатизм"
 CRO_ideological_fanaticism_desc: "Наши политические ценности и задачи стоят того, чтобы за них умереть — как прежде люди умирали за веру. Истинный последователь должен быть готов принять смерть, а тем, кто сбился с пути, лучше приготовиться к ней."
 CRO_catholic_dominance_focus: "Хорватский национализм"
 CRO_catholic_dominance_focus_desc: "Хорватский национализм."
 CRO_secularism_focus: "Секуляризм"
 CRO_secularism_focus_desc: "Секуляризм."
 CRO_integrate_muslim_croats_focus: "Подъём домобрана"
 CRO_integrate_muslim_croats_focus_desc: "Мы основаем нашу первую национальную милицию — Хорватский домобран."
 CRO_integrate_orthodox_croats_focus: "Интеграция православных хорватов"
 CRO_integrate_orthodox_croats_focus_desc: "Хотя мы плохо обращались с православными хорватами, мы должны признать, что даже если добрые хорваты являются членами римско-католической церкви, хорваты, принявшие религию сербов, всё равно остаются хорватами и должны быть интегрированы в национальное сообщество."
 CRO_integrate_religious_minorities_focus: "Интеграция религиозных меньшинств"
 CRO_integrate_religious_minorities_focus_desc: "Наша страна является домом для религиозных меньшинств, и их особенности следует уважать."
 CRO_war_economy: "Военная экономика"
 CRO_war_economy_desc: "Мы должны подпитывать нашу военную экономику"
 CRO_proffesional_army: "Профессиональная армия"
 CRO_proffesional_army_desc: "Наша армия должна быть готова к войне в любое время!"
 CRO_develop_tanks: "Разработка танков"
 CRO_develop_tanks_desc: "Просто инвестируй, братан"
 CRO_prepare_for_war: "Подготовиться к войне"
 CRO_prepare_for_war_desc: "мы должны готовиться к войне"
 CRO_invite_serbian_officers: "Приглашение сербских офицеров"
 CRO_invite_serbian_officers_desc: "Нам следует пригласить опытных сербских офицеров, служивших в югославской армии."

 CRO_a_king_for_our_people_focus: "Король для нашего народа"
 CRO_a_king_for_our_people_focus_desc: "Чтобы восстановить величие свободного Хорватского королевства прошлого, мы должны выбрать короля, который поведёт возрождённый хорватский народ."
 CRO_italian_influence_focus: "Итальянское влияние"
 CRO_italian_influence_desc: "Теперь, когда на троне Хорватии находится итальянец, наша страна имеет более тесные связи с Италией, чем когда-либо прежде."
 CRO_italo_croat_legion: "Итало-хорватский легион"
 CRO_italo_croat_legion_desc: "Итало-хорватский легион"
 CRO_dalmatian_question_focus: "Далматинский вопрос"
 CRO_dalmatian_question_focus_desc: "Хотя многие думали, что выбор итальянского короля смягчит отношения с Италией, Томислав II не приветствовал итальянское влияние на своё королевство. Новый король поставил под сомнение возможность итальянизации далматинского побережья. Более того, он, похоже, намерен заставить Италию отказаться от претензий на этот регион и взять под контроль всё побережье."

 FIN_prepare_for_winter: "Подготовка к зиме"
 FIN_stockpile_rations: "Накопление пайков"
 FIN_stockpile_rations_desc: "Суровая зима означает меньше еды для нашего народа и, что, возможно, важнее, для наших войск. Если наши солдаты должны защищать нашу славную нацию, нам нужно улучшить инфраструктуру."
 FIN_imitate_sweden: "Поиск союзников"
 FIN_prepare_for_winter_desc: "Впереди, несомненно, трудные времена. С бывшими врагами на востоке, растущей напряжённостью на юге и заморскими угрозами нашему образу жизни, нашему правительству необходимо прийти к согласию о том, как лучше всего защитить финский народ, и сделать это нужно быстро."
 FIN_invest_in_the_private_sector: "Инвестиции в частный сектор"
 FIN_invest_in_the_private_sector_desc: "Хорошая экономика — это не шутка. Какой бы путь мы ни выбрали, нам понадобится сильный частный сектор, чтобы построить желаемое будущее."
 FIN_expand_the_mines: "Расширение шахт"
 FIN_expand_the_mines_desc: "Северные шахты полны ресурсов. Если мы решим инвестировать в них, мы сможем добывать больше ресурсов для экспорта или внутреннего использования."
 FIN_nokia: "Многоязычное образование"
 FIN_nokia_desc: "Изменение демографической ситуации создаёт проблемы для многих студентов, не говорящих по-фински. Сделав шведский и русский официальными языками, мы сможем обеспечить лучшее образование для нашего населения."
 FIN_the_red_wall: "Вторая линия Маннергейма"
 FIN_the_red_wall_desc: "Линия Маннергейма была оборонительной линией укреплений на Карельском перешейке, построенной Финляндией против Советского Союза. Возможно, будет разумно инвестировать в аналогичную структуру фортов и бункеров на восточном фронте для подготовки мощной обороны."
 FIN_frantic_planning: "Тактика «Мотти»"
 FIN_frantic_planning_desc: "Мотти — это финский военный сленг для полностью окружённой вражеской единицы. Мотитус — это маневр двойного охвата, использующий способность лёгких войск передвигаться по пересечённой местности для окружения вражеских войск на дороге. Эта тактика особенно полезна для сильно уступающих в численности, но мобильных сил, особенно в снежном климате Финляндии."
 FIN_eastern_defense: "Восточная оборона"
 FIN_eastern_defense_desc: "Восточный фронт обширен и его трудно оборонять. Нам следует сосредоточиться на возведении дополнительных оборонительных сооружений, если мы хотим пережить войну с Советским Союзом."
 FIN_democratic_support: "Демократическая поддержка"
 FIN_democratic_support_desc: "Смягчив некоторые законы и приняв дополнительные меры по защите прав человека, мы потенциально можем приобрести могущественных союзников среди соседей и найти друзей за рубежом."
 FIN_nationalist_support: "Националистическая поддержка"
 FIN_nationalist_support_desc: "Финский народ по праву горд. Нам нужно утвердить наше превосходство в Европе и объединиться с нациями, разделяющими наше националистическое видение."
 FIN_expansionism: "Экспансионизм"
 FIN_expansionism_desc: "В связи с недавними политическими изменениями мы наблюдаем растущую поддержку расширения наших границ."
 FIN_invite_norway: "Пригласить Норвегию"
 FIN_invite_norway_desc: "Норвегия находится в хороших отношениях с нами и остальной Скандинавией. Принимая это во внимание, они также обладают побережьями огромного стратегического значения, и их северные границы могут служить для нас буферной зоной. Было бы глупо не рассматривать их включение в новый Кальмарский союз."
 FIN_invite_denmark: "Пригласить Данию"
 FIN_invite_denmark_desc: "Дания имеет прочные культурные и идеологические связи с остальной Скандинавией. Её положение на юге материковой Европы является невероятно важным активом. Наши советники предлагают пригласить их во Второй Кальмарский союз."
 FIN_promote_sisu: "Расширение Шюцкора"
 FIN_promote_sisu_desc: "В Зимней войне Шюцкор отвечал за проведение мобилизации. Четверть личного состава полевой армии составляли члены гвардии. Этот вклад оказался важным, так как члены гвардии были наиболее обученным и оснащённым персоналом в армии, испытывавшей недостаток даже в базовых припасах."
 FIN_civilian_kitchens: "Гражданские полевые кухни"
 FIN_civilian_kitchens_desc: "Финляндия испытывала большой дефицит палаток, печей и другого снаряжения, но многих смертей удалось избежать благодаря гражданским добровольцам, которые устанавливали кухни и обеспечивали едой войска на поле боя."
 FIN_ski_infantry: "Лыжная пехота"
 FIN_ski_infantry_desc: "Лыжные войска сыграли ключевую роль в успехах финских военных усилий против Советского Союза во время Зимней войны 1939 года. Лесистая, сельская местность без дорог использовалась финскими лыжниками с большим успехом против наступающих механизированных советских войск."
 FIN_molotov_cocktails: "Коктейли Молотова"
 FIN_molotov_cocktails_desc: "Финны усовершенствовали конструкцию и тактическое применение бутылок с зажигательной смесью. Дальнейшие улучшения включали прикрепление непромокаемых спичек или ампулы с химикатами, которые воспламенялись при разбитии, что устраняло необходимость предварительного поджигания бутылки; также было обнаружено, что оставление бутылки примерно на треть пустой увеличивает вероятность её разбития."
 FIN_wolf_divisions: "Волчьи дивизии"
 FIN_wolf_divisions_desc: "По мере того как наша армия растёт как в численности, так и в мощи, нам следует начать уделять внимание более агрессивной тактике. Наши войска больше не являются лишь оборонительной силой."
 FIN_the_winter_war: "Создание Великой Финляндии"
 FIN_the_winter_war_desc: "Великая Финляндия — это ирредентистская и националистическая идея, подчёркивающая территориальную экспансию Финляндии. Наиболее распространённая концепция Великой Финляндии определялась естественными границами, охватывающими территории, населённые финнами и карелами, от Белого моря до Онежского озера и вдоль рек Свирь и Нева, включая Ингрию и Кольский полуостров."
 FIN_southern_foothold: "Южный плацдарм"
 FIN_southern_foothold_desc: "Если мы хотим расширяться, нам понадобится больше возможностей, чем замороженный климат запада и востока. Эстония не будет ровней нашей армии, а её земли обеспечивают нам стратегический плацдарм за морем."
 FIN_german_support: "Вступление в Ось"
 FIN_german_support_desc: "Могущественный Германский рейх готов помочь нам против жаждущего власти Коминтерна на востоке и глупых западных демократий, которые осуждают нашу гордость. Поддержка оси в нашей стране неоднозначна, но большинство согласно, что мы не можем позволить себе отвергнуть такого могущественного союзника."
 FIN_independent_revolution: "Независимая революция"
 FIN_independent_revolution_desc: "Наша славная революция может добиться успеха без помощи продажного Коминтерна. Нам будет лучше всего создать истинное коммунистическое государство в соответствии с нашими собственными принципами."
 FIN_propaganda_machine: "Пропаганда"
 FIN_propaganda_machine_desc: "Вдохновляющие плакаты, фильмы и речи сплотили наш народ. Он готов поддерживать нас, что бы ни случилось."
 FIN_the_lotta_svard: "Лотта Свярд"
 FIN_the_lotta_svard_desc: "Во время Зимней войны около 100 000 мужчин, чьи рабочие места заняли «Лотты», были освобождены для военной службы. Лотты работали в больницах, на постах воздушного оповещения и выполняли другие вспомогательные задачи при вооружённых силах. Однако Лотты официально не имели оружия. Единственным исключением была добровольная зенитная батарея в Хельсинки, состоявшая из членов «Лотты Свярд»."
 FIN_pacifist_sentiment: "Пацифистские настроения"
 FIN_pacifist_sentiment_desc: "Наш народ един в вере в мир во всём мире. Они также понимают, что иногда необходимо заключать союзы, хотя бы для сдерживания тех, кто иначе угрожал бы миру."
 FIN_found_valpo: "Основать ВалПо"
 FIN_found_valpo_desc: "Основанная исторически в 1937 году, Valtiollinen poliisi, сокращённо ValPo, что означает «государственная полиция», была предшественником Финской службы безопасности. Шпионы организации, как утверждается, среди прочего якобы сумели сфотографировать портфель Генриха Гиммлера во время его визита в Финляндию."
 FIN_deterrence: "Сдерживание"
 FIN_deterrence_desc: "К сожалению, не все разделяют наше видение мира. Поэтому нам следует инвестировать в нашу оборону, чтобы не выглядеть лёгкой мишенью для поджигателей войны и экспансионистов."
 FIN_military_necessity: "Военная необходимость"
 FIN_military_necessity_desc: "Финская нация знает цену инновационному мышлению во время войны. Нам нужно поощрять учёных продолжать их усилия и совершать новые прорывы, чтобы обеспечить наше будущее как в краткосрочной, так и в долгосрочной перспективе."
 FIN_secret_weapons: "Секретное оружие"
 FIN_secret_weapons_desc: "Кто знает, что у некоторых наций в рукаве? Бесчисленные изобретения держатся в секрете долгое время, ведь внезапность может быть самым ценным преимуществом в войне."
 FIN_cautious_politics: "Осторожная политика"
 FIN_cautious_politics_desc: "Чтобы выйти из назревающей бури с минимальными потерями, нам лучше не выбирать сторону. Нет смысла навлекать на себя угрозу."
 FIN_limited_motorization: "Ограниченная моторизация"
 FIN_limited_motorization_desc: "Финны долгое время предпочитали кавалерийские полки моторизованной пехоте. Лошади могли бежать по глубокому снегу, останавливавшему советские силы, что значительно замедлило моторизацию финской армии."
 FIN_tuli_isku: "Tuli-Isku"
 FIN_tuli_isku_desc: "«Tuli-Isku» означает «Огненный удар» по-фински. Артиллерийская поддержка широко использовалась финнами как в Зимней войне, так и в Войне-продолжении."
 FIN_study_foreign_vehicles: "Изучение иностранной техники"
 FIN_study_foreign_vehicles_desc: "Большинство финских машин были довольно устаревшими даже после Зимней войны. Нам лучше изучить проверенные импортные образцы, чем продолжать производство текущих моделей."
 FIN_import_tanks: "Импорт танков"
 FIN_import_tanks_desc: "Мы можем значительно ускорить наши исследования и развёртывание новых танков, импортируя их в больших количествах. Таким образом, мы сможем оснастить батальоны новыми моделями ещё до полного обратного проектирования."
 FIN_theft_and_learning: "Кража и обучение"
 FIN_theft_and_learning_desc: "Благодаря предыдущим военным усилиям у нас всё ещё есть много трофейных танков. Сосредоточившись на этих «заимствованных» танках, мы можем сделать весь исследовательский проект как дешевле, так и быстрее!"
 FIN_aviation_effort: "Развитие авиации"
 FIN_aviation_effort_tt: "Недостаточно стройплощадок для §Yавиабаз§!"
 FIN_aviation_effort_desc: "Война в воздухе — это направление, где научно-технический прогресс идет стремительными темпами. Любая современная держава обязана развивать авиацию."
 FIN_fighter_focus: "Ставка на истребители"
 FIN_fighter_focus_desc: "Великая война научила нас маневренному воздушному бою, но это было только начало. Чтобы сохранить преимущество в будущем, мы должны создавать самые современные истребители."
 FIN_bomber_focus: "Ставка на бомбардировщики"
 FIN_bomber_focus_desc: "Когда люди будущего станут говорить об ужасах сегодняшних войн, они вспомнят огонь, падающий с неба. Мы должны сделать все для того, чтобы такие воспоминания остались только у наших врагов."
 FIN_aviation_effort_2: "Развитие авиации II"
 FIN_aviation_effort_2_desc: "Необходимо совершенствовать военно-воздушные силы, чтобы координировать их действия с другими родами войск."
 FIN_CAS_effort: "Развитие штурмовиков"
 FIN_CAS_effort_desc: "Современная армия нуждается в поддержке не только на земле, но и в воздухе."
 FIN_rocket_effort: "Развитие ракет"
 FIN_rocket_effort_desc: "Ракеты и реактивные двигатели позволяют пилотируемым и беспилотным летательным аппаратам достигать очень высоких скоростей. Прогресс в этой области даст нам возможность заставать врага врасплох."
 FIN_nav_effort: "Усилия ВМС и авиации"
 FIN_nav_effort_desc: "В новые времена война на море ведется и под водой, и в воздухе над водной поверхностью."
 FIN_naval_effort: "Развитие военно-морского флота"
 FIN_naval_effort_tt: "Недостаточно стройплощадок для §Yверфей§!"
 FIN_naval_effort_desc: "Развитие флота должно стать для нас приоритетной задачей. Нужно направить все доступные ресурсы на строительство новых верфей и развитие легких надводных кораблей."
 FIN_flexible_navy: "ВМФ на основе многоцелевых судов"
 FIN_flexible_navy_desc: "Новая тактика ведения войны на море с учетом применения подводных лодок позволит эффективнее наносить удары по вражеским конвоям."
 FIN_large_navy: "Изучение зарубежных корабельных проектов"
 FIN_large_navy_desc: "Включение крупных судов в нашу доктрину морской войны и обеспечение безопасности торговых конвоев покажет, какие типы кораблей нам нужнее всего."
 FIN_submarine_effort: "Строительство подводных лодок"
 FIN_submarine_effort_desc: "Война с использованием субмарин стала особенно перспективным направлением с момента появления торпедных катеров. Нам нужно научиться не только защищаться от подлодок противника, но и использовать их против вражеских кораблей."
 FIN_cruiser_effort: "Развитие крейсеров"
 FIN_cruiser_effort_desc: "Прежде чем заниматься продвинутыми разработками линкоров, нам нужно заменить устаревшие крейсеры."
 FIN_destroyer_effort: "Строительство эсминцев"
 FIN_destroyer_effort_desc: "Конструируя подводные лодки и изучая методы их применения, мы научились противостоять данной тактике ведения боя. Эсминцы для этого жизненно необходимы."
 FIN_capital_ships_effort: "Развитие крупных кораблей"
 FIN_capital_ships_effort_desc: "Держава, обладающая самым крупным флотом, будет править морями. Линкоры и авианосцы представляют старый и новый подходы к концепции господства на море."
 FIN_further_artillery_support: "Дальнейшая артиллерийская поддержка"
 FIN_further_artillery_support_desc: "Артиллерийская поддержка оказалась неоценимой для наших армий. Повышение эффективности и внедрение новых технологий для спасения жизней наших соотечественников должно быть главным приоритетом."
 FIN_fortress_aland: "Крепость Аланд"
 FIN_fortress_aland_desc: "Укрепив остров, мы сможем превратить его в грозную военно-морскую базу. Расширение военно-морских верфей также даст нам возможность установить и поддерживать превосходство."
 FIN_marines_and_landing_craft: "Бригада «Сан-Марко»"
 FIN_marines_and_landing_craft_desc: "Одних только мощных кораблей недостаточно, чтобы выигрывать войны: мы должны перевозить войска по морю и безопасно высаживать их на берег..."
 FIN_paratroopers_and_air_bases: "Десантники и авиабазы"
 FIN_paratroopers_and_air_bases_desc: "Войны выигрываются не только самолётами; мы также должны уметь перебрасывать наши армии по воздуху и безопасно высаживать их в тылу врага..."
 FIN_flying_lottas: "Летающие Лотты"
 FIN_flying_lottas_desc: "Пока в других частях страны ведутся разговоры об организации вспомогательной поддержки «Лотта Свярд», ВВС также начали обсуждать участие женщин. Финские леди доказали свою решимость, и большая часть руководства открыта для их приёма в ряды наших пилотов."
 finland.17.t: "Приглашение во Вторую Кальмарскую унию"
 finland.17.d: "В попытке укрепить север и сдержать возможное возрождение агрессивного экспансионизма с востока и юга, Финляндия предложила нам присоединиться к союзу, направленному на объединение этих наций."
 finland.17.a: "С удовольствием. Кальмарскую унию необходимо восстановить."
 finland.17.b: "[Root.GetName] пойдет своим путем."
 finland.18.t: "[From.GetName] присоединяется ко Второй Кальмарской унии"
 finland.18.d: "Наш план по созданию Скандинавского союза удаётся. [From.GetLeader] одобряет наши усилия и принял наше приглашение в альянс."
 finland.18.a: "Мы на шаг ближе к восстановлению Кальмарской унии."
 finland.19.t: "[From.GetName] отклоняет Вторую Кальмарскую унию"
 finland.19.d: "Несмотря на все наши усилия по поддержке Второй Кальмарской унии, наша последняя попытка связаться с одной из наций была встречена скептицизмом. [From.GetLeader] отказался присоединиться к альянсу, возможно, сомневаясь в наших мотивах или опасаясь, что слишком тесная связь с нами сделает их мишенью."
 finland.19.a: "Вообще-то, они и без того могут быть мишенью!"

 finland.29.t: "Великобритания соглашается стать союзником"
 finland.29.d: "«История показала, как многого можно достичь, когда великие нации стоят плечом к плечу. Мы гордимся тем, что приветствуем вас не только как друзей, но и как союзников. Вместе мы будем сияющим маяком свободы в мире, окутанном тьмой угнетения!»\n\nНаш запрос на вступление к Британии в качестве Союзников был принят. Мы можем рассчитывать на их полную поддержку в грядущие неспокойные времена."
 finland.29.a: "Вместе мы сдержим натиск!"
 finland.30.t: "Великобритания отказывается стать союзником"
 finland.30.d: "«Хотя в прошлом у нас были хорошие отношения, мы не можем рисковать эскалацией конфликтов через Ла-Манш. Германия заслужила наше доверие в соблюдении нашего Военно-морского пакта, и у нас нет причин злить Советский Союз. Мы будем защищать себя, если огонь распространится, но мы не станем рисковать, раздувая пламя. Мир всегда должен быть целью любой демократической нации.»\n\nНаш запрос на вступление к Британии в качестве Союзников был отклонён. Британское правительство не желает дальнейшей конфронтации с Германией или Советским Союзом и не будет рисковать текущим миром."
 finland.30.a: "Ещё одна нация забывает о Финляндии. Мы им покажем!"
 
 finland.25.t: "Финляндия хочет вступить в Союзников"
 finland.25.d: "Мир становится всё менее безопасным. Британия и Финляндия остаются бастионами демократии и свободы в Европе, и Финляндия предлагает присоединиться к Союзникам.\nКак нам ответить?"
 finland.25.a: "Да"
 finland.25.b: "Нет"
 
 
 finland.31.t: "Германия принимает запрос о союзе"
 finland.31.d: "«История показала, как многого можно достичь, когда великие нации стоят плечом к плечу. Мы гордимся тем, что приветствуем вас не только как друзей, но и как союзников по Оси. Вместе мы принесём порядок в мир, окутанный тьмой коммунизма и слабостью Союзников!»\n\nНаш запрос на вступление к Германии в качестве участника Оси был принят. Мы можем рассчитывать на их полную поддержку в грядущие неспокойные времена."
 finland.31.a: "Вместе мы сдержим натиск!"
 finland.32.t: "Германия отклоняет запрос о союзе"
 finland.32.d: "«Хотя мы ценим ваш запрос на вступление в наш славный блок, у нас нет причин злить Советский Союз и ещё больше провоцировать Союзников ради одной незначительной страны».\n\nНаш запрос на вступление в Ось был отклонён. Германское правительство не желает дальнейшей конфронтации с Советским Союзом или любой другой крупной фракцией и не будет рисковать текущим миром."
 finland.32.a: "Ещё одна нация забывает о Финляндии. Мы им покажем!"
 
 finland.333.t: "Финляндия хочет вступить в Ось"
 finland.333.d: "Мир становится всё менее безопасным. Германия и Финляндия остаются бастионами национальной гордости и военной мощи в Европе, и Финляндия предлагает присоединиться к Оси.\nКак нам ответить?"
 finland.333.a: "Да"
 finland.333.b: "Нет"
 
 finland.355.t: "Финляндия хочет вступить в Коминтерн"
 finland.355.d: "Мир становится всё менее безопасным. Советский Союз и Финляндия остаются одними из немногих бастионов пролетарской мощи в этом мире. Финляндия предлагает присоединиться к Коминтерну и передать наши карельские территории в обмен на Карьялу.\nКак нам ответить?"
 finland.355.a: "Да"
 finland.355.b: "Нет"
 
 finland.33.t: "Советский Союз принимает запрос о союзе"
 finland.33.d: "«История показала, как много мы можем потерять, когда наши страны отказываются сотрудничать. Мы гордимся тем, что приветствуем вас не только как друзей, но и как товарищей. Вместе мы принесём равенство и справедливость в мир, окутанный тьмой капитализма и фашистских настроений!»\n\nНаш запрос на вступление к СССР в качестве участника Коминтерна был принят. Мы можем рассчитывать на их полную поддержку в грядущие неспокойные времена."
 finland.33.a: "Вместе мы поможем революции!"
 finland.34.t: "Советский Союз отклоняет запрос о союзе"
 finland.34.d: "«Хотя мы ценим ваш запрос на вступление в нашу славную революцию, у нас нет причин повышать напряжённость и ставить под угрозу наши отношения с другими великими державами ради одной незначительной страны».\n\nНаш запрос на вступление в Коминтерн был отклонён. Советское правительство не желает конфронтации с другими фракциями и не будет рисковать текущим миром."
 finland.34.a: "Ещё одна нация забывает о Финляндии. Мы им покажем!"
 
 finland.920.t: "Британия принимает финский союз"
 finland.920.d: "Финляндия запросила формальный союз с Британией, ссылаясь на неопределённые угрозы стабильности Европы.\n\nСегодня британский парламент одобрил их запрос, и Финляндия присоединилась к [ENG.GetFactionName]."
 finland.920.a: "Мы будем сражаться вместе."
 finland.920.b: "Они готовятся к худшему."
 finland.920.c: "Прижались друг к другу, как крысы, загнанные в угол."
 finland.920.e: "Британия определила свою судьбу."
 finland.921.t: "Британия отклоняет союз с Финляндией"
 finland.921.d: "Неожиданно британский парламент сегодня отклонил запрос [FIN.GetName] о формальном союзе между двумя странами. Причиной было названо избежание обострения и без того хрупкого баланса на европейском континенте.\n\nФинское правительство осудило это как политический ход, жертвующий безопасностью Финляндии ради британских интересов."
 finland.921.a: "Им нужно было просить более вежливо."
 finland.921.b: "Демократические глупцы разделены."
 finland.921.c: "Тёмный день для Финляндии."
 
 finland.922.t: "Вторая Кальмарская уния"
 finland.922.d: "Стремясь создать единый фронт против общих врагов, [From.GetName] обратился к Швеции с предложением реформировать «Кальмарскую унию» для объединения против общих врагов. Хотя Британскому премьер-министру было предложено место в оборонительном пакте, он чётко дал понять, что Британия не считает альянс «полезным для защиты европейской свободы».\n\nТем не менее Финляндия установила дипломатические связи с другими нациями, которые могут чувствовать угрозу, и поощряет единство ради сохранения дипломатического баланса в Скандинавии и предотвращения будущих конфликтов. Только время покажет, сможет ли она преуспеть."
 finland.922.a: "Тогда не прибегайте к нам потом плакаться!"
 finland.922.b: "Länge leve Kalmarunionen!"
 finland.922.c: "Мы никогда не должны допустить, чтобы Скандинавия стала угрозой."
 finland.922.e: "Скандинавия должна объединиться против фашистских и коммунистических агрессоров!"
 finland.922.f: "Признак растущей напряженности в Европе."
 
 
 finland.928.t: "Германия принимает Финляндию в Ось"
 finland.928.d: "Финляндия запросила формальный союз с Германией, ссылаясь на неопределённые угрозы стабильности Европы и своей собственной безопасности.\n\nСегодня немецкий канцлер одобрил их запрос, и Финляндия присоединилась к [GER.GetFactionName]."
 finland.928.a: "Мы будем сражаться вместе."
 finland.928.b: "Они готовятся к худшему."
 finland.928.c: "Прижались друг к другу, как крысы, загнанные в угол."
 finland.928.e: "Германия сделала свой выбор."
 finland.929.t: "Германия отклоняет союз с Финляндией"
 finland.929.d: "Неожиданно немецкий канцлер сегодня отклонил запрос [FIN.GetName] о формальном союзе между двумя странами. Причиной было названо избежание обострения и без того хрупкого баланса на европейском континенте.\n\nФинское правительство осудило это как политический ход, жертвующий безопасностью Финляндии ради германских интересов."
 finland.929.a: "Им нужно было просить более вежливо."
 finland.929.b: "Демократические глупцы разделены."
 finland.929.c: "Тёмный день для Финляндии."
 
 finland.998.t: "Карьяльское соглашение"
 finland.998.d: "Стремясь к примирению двух стран, Финляндия запросила формальный союз с Советским Союзом, ссылаясь на неопределённые угрозы стабильности Европы и своей собственной безопасности. Для дальнейшего ослабления напряжённости Финляндия согласилась уступить Карьялу Советскому Союзу в обмен на штаты Мурманск и Онега, где проживает большое количество финских меньшинств.\n\nСегодня сделка была одобрена Председателем Совета Народных Комиссаров СССР, и Финляндия присоединилась к [SOV.GetFactionName]."
 finland.998.a: "Мы будем сражаться вместе."
 finland.998.b: "Они готовятся к худшему."
 finland.998.c: "Прижались друг к другу, как крысы, загнанные в угол."
 finland.998.e: "СССР сделал свой выбор."
 finland.999.t: "Советский Союз отклоняет Карьяльское соглашение"
 finland.999.d: "Неожиданно Председатель Совнаркома СССР отклонил запрос [FIN.GetName] о формальном союзе между двумя странами. Причиной было названо то, что Карьяльская сделка не рассматривалась как взаимовыгодная, а лишь как способ расширения границ Финляндии."
 finland.999.a: "Им нужно было просить более вежливо."
 finland.999.b: "Коммунистические глупцы разделены."
 finland.999.c: "Тёмный день для революции."
 
 finland.952.t: "Финляндия заявляет претензии на территорию Эстонии"
 finland.952.d: "Обращаясь к финскому населению вдоль балтийского побережья, [From.GetLeader] объявил, что [From.GetName] полностью считает финноязычную территорию в [EST.GetName] законной частью [From.GetName]. [From.GetLeader] также сослался на стратегическую важность Эстонского региона и заявил, что, объединив две страны под властью Финляндии, можно защитить больше людей от крупных внешних угроз.\n\nОфициальное заявление подтвердило эти претензии, давая понять, что [From.GetName] готова взять территорию силой, если потребуется."
 finland.952.a: "Это эстонские земли, а не финские!"
 finland.952.b: "Они нарушают и без того хрупкий баланс сил в регионе."
 finland.952.c: "Эти территории выглядят скорее финскими, чем эстонскими."
 
 
 FIN_gwtank: "Мы теперь можем развёртывать дивизии танков Великой войны"
 FIN_fighter: "Мы теперь можем развёртывать ранние истребители \n"
 FIN_bomber: "Мы теперь можем развёртывать ранние бомбардировщики \n"
