 RAJ_provincial_election_countdown: "Окончание провинциальных выборов"
 RAJ_provincial_election_countdown_desc: "Скоро провинциальные выборы завершатся, и индийцы не станут от этого жить лучше. Выборы не дают местным партиям реальной власти для противостояния вице-королю. Этот удручающий факт может подтолкнуть воинственную часть нашего населения к восстанию. Нам нужно действовать осторожно."
 english_departure: "§YИндийский флаг§! поднимается над Красным фортом, и §YИндия свободна§!."
 india.intro.t: "Начинаются провинциальные выборы в Индии"
 india.intro.desc: "Всего год назад Имперский законодательный совет предпринял знаменательный шаг по реструктуризации администрации Британского Раджа. Помимо прочего, он провёл первые всеобщие выборы в Индии. Хотя избирательные права всё ещё ограничены, а землевладельцы сохраняют огромную власть, это первый шаг к демократии. Политический спектр, планирующий участвовать в этой первой демонстрации демократических прав в Индии, разнообразен как никогда, так что у индийского гражданина нет недостатка в вариантах. Но каким будет исход этого политического зрелища на всю жизнь? Укрепят ли британцы своё господство? Приведут ли радикалы Индию к независимости? Время покажет."
 india.intro.a: "Британское правление не обсуждается."
 india.intro.b: "Это подчинение длилось слишком долго!"
 india.intro.c: "Электорализм бесполезен перед лицом империализма."
 
 india.1.t: "Великобритания берёт под контроль Аден"
 india.1.desc: "Порт Аден — один из важнейших в торговле между Индией, Европой и Дальним Востоком. Закон об управлении Индией 1935 года включал передачу контроля над этим портом непосредственно правительству Лондона, тогда как ранее он управлялся как провинция главного комиссара. Британское правительство теперь официально взяло порт под контроль и учредило его как отдельную колонию."
 india.1.a: "Как и планировалось"

 india.4.t: "Итоги провинциальных выборов в Индии 1937 года"
 india.4.desc: "После года предвыборной кампании появились три основные партии, которые доблестно боролись за своё влияние на будущее Индии, но только одна заручилась широкой поддержкой в достаточном количестве провинций, чтобы получить большинство. Их долг — заботиться о будущем Индии и защищать её граждан от любых невзгод."
 india.4.a: "Индийский национальный конгресс выиграл выборы!"
 india.4.b: "Юнионистская партия выиграла выборы!"
 india.4.c: "Независимая лейбористская партия выиграла выборы!"

 r56_raj.5.t: "Провозглашена Свободная Индия"
 r56_raj.5.d: "Субхас Чандра Бос долгое время наращивал поддержку, особенно в регионе Бенгалии, для вооружённого отделения от Британской империи, и теперь эта напряжённость достигла апогея. Азад Хинд оказывается в состоянии войны с Британским Раджем. Индийское население, похоже, неоднозначно реагирует на восстание: некоторые критикуют его за авторитарный характер правительства, а другие хвалят за продвижение цели независимости Индии.\n\nБританский Радж сейчас лихорадочно пытается организовать надлежащую оборону от мятежа, хотя уже ожидается, что акты саботажа будут преследовать администрацию. [ENG.GetLeader] уже объявил об односторонней поддержке Британского Раджа в"
 r56_raj.5.a: "Наконец-то свободная Индия."
 r56_raj.5.b: "Мелкая мечта."
 r56_raj.5.c: "Трещина в Британской империи."
 
 r56_raj.6.t: "Масштабные протесты из-за процессов над ИНА"
 r56_raj.6.d: "После фактического поражения Индийской национальной армии, сражавшейся за нелегитимную «Свободную Индию», её участников судят за подстрекательство и военные преступления. Это, конечно, естественное следствие такого инфантильного восстания, цепляющегося за мелкие идеи самоуправления или «Сварадж». Однако реакция индийского населения оказалась не в нашу пользу. Во всех крупных городах прошли протесты, организованные в частности Индийским национальным конгрессом, члены которого также защищали военных преступников, и протесты охватили всю страну, сильно дестабилизируя Британский Радж."
 r56_raj.6.a: "Подавить эти бунты."
 
 r56_raj.7.t: "Призывы к самоопределению Бирмы"
 r56_raj.7.d: "Бои в палящих бирманских джунглях были жестокими, и многие солдаты, уроженцы этого региона, храбро отдали свои жизни. Их выжившие соотечественники усилили призывы к тому, чтобы Бирма образовала государство, отделённое от Индии, но связанное со Свободной Индией. Будут ли их призывы услышаны?"
 r56_raj.7.a: "Текущая ситуация нас устраивает."
 r56_raj.7.b: "Марионеточное правительство будет в порядке."
 r56_raj.7.c: "Мы построим по-настоящему свободную Бирму."
 india.2.t: "Провинциальные выборы в Индии 1937 года"
 india.2.desc: "Политические партии, участвующие во всеобщих выборах, разбросаны по всему политическому спектру, и будущее Индии поставлено на карту.\n\nУ кого бы ни была возможность управлять, у него будет трудная обязанность вести проблемное будущее разделённого субконтинента."
 india.2.a: "Индийский национальный конгресс продвинет нашу нацию вперёд."
 india.2.b: "Юнионистская партия возвысит нас до статуса доминиона."
 india.2.c: "Нам нужна Независимая лейбористская партия, чтобы освободить нас от эксплуатации."
 raj_election_start: "Открывает решения §YУвеличить местное влияние§!, для получения которых нужны большинство в §Yпровинциях§!.\n\n§YПолитическая партия§! с наибольшим числом провинций под §Yконтролем§! получит возможность §Gсоздать правительство§!."
 
 india.5.t: "Провинциальные выборы в Индии завершены"
 india.5.d: "На этой неделе результаты долгожданных первых всеобщих выборов в Индии были объявлены [RAJ.GetLeader]. Множество партий и движений приняли участие в политической борьбе, но лишь одна вышла победителем.\n[RAJ.GetElectionNews]"
 india.5.a: "Важное событие на пути к независимости."
 india.5.b: "Тщетные усилия."
 india.5.c: "Удачи, товарищи."
 india.5.e: "Демократия в действии."
 india.5.f: "Любопытно."
 
 india.6.t: "Индия обретает независимость"
 india.6.d: "Когда последний британский конвой входит в порт, загружая все оставшиеся припасы на отплывающее судно Королевского флота «Georgic», Индия облегчённо вздыхает. Её дни как жемчужины в короне короля окончены, и индийцы начинают строить на руинах Британского Раджа.\n\nИ сколько им предстоит строить, очевидно, учитывая многочисленные религиозные, языковые и культурные меньшинства субконтинента. Тем не менее, Индия, несомненно, залечит эти раны и уверенно шагнёт в будущее."
 india.6.d.alt: "Когда последний британский конвой входит в порт, загружая все оставшиеся припасы на отплывающее судно Королевского флота, он оставляет Индийский субконтинент нестабильным, разделённым и, можно сказать, в руинах.\n\nМусульманские сепаратисты закрепили своё государство, в то время как перемещение населения провоцирует насилие, вызывая, возможно, крупнейший кризис беженцев, который когда-либо видел мир. Каким бы ни было будущее, субконтинент будет решать его отдельно."
 india.6.a: "Три долгих столетия..."
 india.6.b: "Возможно, дни Империи сочтены."
 india.6.c: "Какая трагедия."
 india.6.e: "Любопытно."
 
 
 india.290.t: "Бомбейская конференция"
 india.290.desc: "Благодаря недавним успехам в электоральной политике Независимая лейбористская партия, кажется, находится в выгодном положении для установления социализма в Индии. Поддержка многих других коммунистических организаций в Индии жизненно важна для поддержания стабильной и функционирующей Индии после установления социалистической экономики. Чтобы заставить некоторых сторонников жёсткой линии сотрудничать, нам, возможно, придётся пойти на уступки. \n\nИнтернационалисты из КПИ требуют нашего вступления в Коминтерн после независимости, в то время как их оппоненты — национальные коммунисты — требуют разрыва с Москвой. Всеиндийский конгресс профсоюзов требует представительства профсоюзов в будущих государственных делах. Ассоциация освобождения женщин требует полного и тотального ge"
 india.290.a: "Мы должны осторожно ориентироваться в этой паутине"
 
 india.300.t: "ИНК завоевал популярность среди сельских индуистов"
 india.300.desc: "Наша кампания заметила недавние успехи Неру в привлечении на свою сторону ключевой электоральной группы сельских индуистов севера; это может быть трудно, но запуск контркампании может помочь нам ослабить их влияние."
 india.300.a: "Наша кампания и так напряжена."
 india.300.b: "Важная возможность."
 
 india.301.t: "Юнионистская партия заручается поддержкой промышленников."
 india.301.desc: "Небольшая, но влиятельная группа индийской буржуазии в основном поддержала Юнионистскую партию, ссылаясь на обещания стабильности как на основную причину. С помощью небольшой убедительной работы мы можем быть уверены, что они посмотрят в другую сторону."
 india.301.a: "Мы не можем продать индийских рабочих."
 india.301.b: "Возможность, которую мы не можем упустить."
 india.301.c: "Прагматичное решение, не более."
 
 india.302.t: "Международная поддержка Независимой лейбористской партии."
 india.302.desc: "То, что описывается как единственная партия, работающая на свободу всех индийцев, теми авторитариями, которые оказывают ей поддержку, получает внешние средства и ораторов, несправедливо усиливая их кампанию. Как нам с этим поступить?"
 india.302.a: "Их лицемерие станет их падением."
 india.302.b: "Препятствовать им насколько это возможно."
 
 
 inc_victory_news: "Именно Индийский национальный конгресс под руководством Джавахарлала Неру завоевал народную поддержку благодаря невероятно напряжённой кампании по всему разделённому субконтиненту, каким-то образом объединив его. Самым большим политическим препятствием на пути Индии в будущее станет Всеиндийская мусульманская лига, желающая создать отдельное мусульманское государство."
 up_victory_news: "Это Юнионистская партия, которая прорвалась благодаря широкой поддержке в религиозно разнообразных провинциях, подчёркивая важность единства и братства в этом очень разном субконтиненте. Ещё один большой блок поддержки исходил от промышленников, в целом предпочитающих более реакционную социальную политику. [RAJ.GetAIMLUP]"
 ilp_victory_news: "Это Независимая лейбористская партия, на которую легла ответственность за управление. Их радикальное видение будущего встревожило промышленную и колониальную базу нации. Ещё предстоит увидеть, смогут ли они реализовать свою политику, но если смогут, это может означать конец британского правления в Индии раньше, чем кто-либо думал. Также неопределённо будущее кастовой системы, широко осуждаемой бедными слоями общества."
 
