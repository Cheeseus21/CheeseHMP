 raj_legislative_situation: "Законодательная ситуация"
 raj_legislative_situation_desc: "Если наша администрация вообще собирается провести что-либо в качестве закона, мы должны считаться с Имперским законодательным советом, в котором есть смесь избранных и назначенных членов и различных групп интересов. Мы должны тщательно балансировать их потребности, если хотим в итоге получить стабильное государство после всей политики.\n\n[RAJ.Current_Act][RAJ.Legislative_Status]"
 finalize_the_vote: "Завершить голосование"
 legislative_status: "\n\tВ настоящее время мнение индуистов по закону: [RAJ.ind_support_loc]\n\tВ настоящее время мнение мусульман по закону: [RAJ.pak_support_loc]\n"
 
 FOCUS_FILTER_RAJ_PROVINCIAL_ELECTIONS: "Выборы в провинциях"
 legislative_railway: "В высших палатах правительства ведутся ожесточённые дебаты по поводу Закона о расширении железных дорог. Его цели изложены как строительство национализированных, некоммерческих железнодорожных соединений для дальнейшего развития наших промышленных целей."
 legislative_agriculture: "В высших палатах правительства ведутся ожесточённые дебаты по поводу Закона о стабилизации сельского хозяйства. Наши наиболее важные цели — улучшение местного орошения и регулируемое производство зерна и импорта."
 legislative_education: "В высших палатах правительства ведутся ожесточённые дебаты по поводу Закона об образовательной реформе. Мы представили его важнейшие цели как: предотвращение бегства индийских интеллектуалов в английские университеты и улучшение сельского образования для повышения промышленной и сельскохозяйственной квалификации."
 legislative_insurance: "В высших палатах правительства ведутся ожесточённые дебаты по поводу Закона о страховании. Его самые преданные сторонники ссылаются на плохое состояние индийских инвестиций как на главную проблему, которую они пытаются решить. Они хотят решить её, наконец, регулируя страховой бизнес."
 legislative_war: "В высших палатах правительства ведутся ожесточённые дебаты по поводу Закона о военных полномочиях. Вице-король подчеркнул, что сейчас не время для дебатов, Индия находится в состоянии войны, и исполнительная власть должна иметь полномочия вести эту войну. Любая задержка этого законопроекта поддержит военные усилия врага!"
 legislative_idle: "Залы Имперского законодательного совета бездействуют, в настоящее время никакой законопроект не обсуждается."

 raj_sov_nuclear_name: "Соглашение о новых технологиях для национальной обороны"
 raj_sov_nuclear_desc: "Наступил атомный век, и социалистические страны мира не могут позволить себе отставать от капиталистических государств в своей ядерной программе. Обмен нашими атомными открытиями с советским народом и наоборот принесёт большую пользу безопасности обоих государств."

