 RAJ_Expanding_the_Indian_Air_Force: "Расширение ВВС Индии"
 RAJ_Expanding_the_Indian_Air_Force_desc: "ВВС Индии в настоящее время наращивают подготовку пилотов и производство самолетов, чтобы очистить небо над субконтинентом."
 RAJ_Caste_Debuff_4: "Сегрегационистская кастовая система"
 RAJ_Caste_Debuff_4_desc: "Геймерский момент"
 RAJ_Caste_Debuff_3: "Кастовая система"
 RAJ_Caste_Debuff_3_desc: "Некоторые версии кастовых систем существовали еще в древней Индии, но со временем она трансформировалась, чтобы лучше соответствовать текущему Императору Индии, и Британский Радж не является исключением. Напротив, кастовая система была четко определена и широко использовалась британской администрацией. Она проникает во все аспекты индийского общества, от ограничения приема в университеты до строго регламентированной и ограничительной армии. Некоторые видят в этом аморальное зло, а некоторые — логичную организацию общества."
 RAJ_Caste_Debuff_3_mit: "Смягченная кастовая система"
 RAJ_Caste_Debuff_3_mit_desc: "Худшие проявления кастовой системы были обузданы, хотя неравенство между общинами и социальными классами все еще широко распространено."
 RAJ_Caste_Debuff_2: "Реформированная кастовая система"
 RAJ_Caste_Debuff_2_desc: "Демонтаж кастовой системы в таком традиционном обществе — сложная задача, но постоянный прогресс в сторону уравнивания неизбежно приведет к лучшему результату."
 RAJ_Caste_Debuff_1: "Юридически демонтированная кастовая система"
 RAJ_Caste_Debuff_1_desc: "Преодолев все сопротивление, все протесты, мы наконец добились полного юридического равенства и будем обеспечивать его со всей необходимой решимостью."
 RAJ_Caste_Buff: "Полностью демонтированная кастовая система"
 RAJ_Caste_Buff_desc: "Юридическое равенство — это хорошо, но из-за сотен лет дискриминации многие районы все еще находятся в бедности и с трудом выбираются из нее. Именно поэтому позитивные действия в отношении этих сообществ являются единственным моральным выбором."
 RAJ_Establishing_National_Government: "В настоящее время мы составляем конституцию и вместе с ней впервые в истории строим местное демократическое правительство, охватывающее весь субконтинент, готовое противостоять любым невзгодам, с которыми оно может столкнуться."
 RAJ_Establishing_National_Government: "В настоящее время мы составляем конституцию и вместе с ней впервые в истории строим местное демократическое правительство, охватывающее весь субконтинент, готовое противостоять любым невзгодам, с которыми оно может столкнуться."
