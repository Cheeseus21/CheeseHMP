 BUL_greater_bulgaria: "Великая Болгария"
 air_war_plans_division_focus2: "Истребители сопровождения"
 ETH_industrial_effort2: "Развитие промышленности II"
 ETH_industrial_effort2_desc: "Мы продолжим сосредотачиваться на развитии нашей гражданской промышленности."
 ETH_production_effort5: "Военные усилия V"
 ETH_production_effort5_desc: "Больше военных заводов, больше оружия."
 ETH_production_effort4: "Военные усилия IV"
 ETH_production_effort4_desc: "Больше военных заводов, больше оружия."
