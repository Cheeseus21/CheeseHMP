 south_asian_liberation_desc: "Чтобы посеять корни восстания в Южной Азии, мы должны отправить военную и политическую помощь угнетенным странам.\n\nПосле завершения любого направления, касающегося восстания, политическая поддержка и оружие будут отправлены для защиты от любого возмездия.\n\n[RAJ.GetSalVariable]"
