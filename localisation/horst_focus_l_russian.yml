 India_Political: "Индийское дерево фокусов"
 RAJ_Reinforce_the_Government_of_India_Act: "Укрепить действие Закона об управлении Индией"
 RAJ_Reinforce_the_Government_of_India_Act_desc: "Закон об управлении Индией 1935 года стал важной вехой в структурном восстановлении Раджа, и мы должны применять его как таковой."
 RAJ_Linlithgows_Reign: "Правление Линлитгоу"
 RAJ_Linlithgows_Reign_desc: "Пост генерал-губернатора Индии последние пять лет занимал лорд Уиллингдон, и британская администрация решила назначить лорда Линлитгоу, отправив Уиллингдона на пенсию. Оппозиционные партии Раджа видят в этом застой и всё активнее выступают против сотрудничества. Если мы продолжим следовать этому курсу ещё долго, индийский народ может прибегнуть к насилию. Однако, играя на противоречиях между оппозиционными партиями, мы можем получить преимущество."
 RAJ_Provincial_Elections: "Выборы в провинциях"
 RAJ_Provincial_Elections_desc: "С началом первых всеобщих выборов в Индии перед всеми участвующими партиями стоят многие месяцы тяжёлой предвыборной борьбы."
 RAJ_Independent_Labour_Party: "Независимая партия труда"
 RAJ_Independent_Labour_Party_desc: "Нашим приоритетом номер один должно быть установление справедливости в Индии и уничтожение кастовой системы."
 RAJ_Indian_National_Congress: "Национальный конгресс"
 RAJ_Indian_National_Congress_desc: "Мы все должны объединиться, чтобы освободиться от британского правления."
 RAJ_Unionist_Party: "Юнионистская партия"
 RAJ_Unionist_Party_desc: "Только с помощью тщательных и продуманных политических действий мы сможем сохранить стабильность в Индии."
 RAJ_Prepare_the_Lucknow_Session: "Подготовить Лакхнаускую сессию"
 RAJ_Prepare_the_Lucknow_Session_desc: "Мы должны собрать всех членов Конгресса для обсуждения стоящих перед нами задач."
 RAJ_Secure_Rural_Hindus: "Закрепить поддержку сельских индуистов"
 RAJ_Secure_Rural_Hindus_desc: "Сельские индуисты были ключевыми сторонниками Конгресса с момента его основания."
 RAJ_Broaden_our_Coalition: "Расширить нашу коалицию"
 RAJ_Broaden_our_Coalition_desc: "Только с новыми лицами в Конгрессе мы сможем обеспечить победу."
 RAJ_Nehrus_Campaign: "Кампания Неру"
 RAJ_Nehrus_Campaign_desc: "Мы должны собрать средства для поддержки операции Неру."
 RAJ_An_Offer_for_Rajagopalachari: "Предложение для Манохара"
 RAJ_An_Offer_for_Rajagopalachari_desc: "Мы, безусловно, сможем заручиться поддержкой, если предложим ему пост в кабинете министров после завершения выборов."
 RAJ_Azads_Support: "Поддержка Райсмана"
 RAJ_Azads_Support_desc: "Хотя Райсман является лоялистом Раджа и верно служил ему, у него, несомненно, не возникнет проблем со служением независимой Индии и демонстрацией своих навыков на новом субконтиненте."
 RAJ_Nehrus_Candidacy: "Кандидатура Неру"
 RAJ_Nehrus_Candidacy_desc: "Всеми любимый Джавахарлал Неру должен будет возглавить Индийский национальный конгресс, если мы хотим увидеть лицо победы."
 RAJ_New_Leadership: "Переманивание из CSP"
 RAJ_New_Leadership_desc: "Конгресс-социалистическая партия считается 'радикальным' крылом Индийского национального конгресса, включающим многих социалистов, которые, похоже, встали на сторону оппортунизма и присоединились к партии, состоящей из мелкой буржуазии наших земель. Усилив риторику против них, мы непременно убедим многих их членов встать на сторону справедливости."
 RAJ_Appeal_to_the_Lower_Castes: "Обращение к низшим кастам"
 RAJ_Appeal_to_the_Lower_Castes_desc: "Хотя избирательные права низших каст ограничены, для нас по-прежнему важно получить большинство их голосов."
 RAJ_Subvert_Stalinist_Influence: "Обращение к рабочим"
 RAJ_Subvert_Stalinist_Influence_desc: "Наша главная цель на выборах — разрушение кастовой системы, но она, конечно, не является единственной угнетающей системой в индуистском обществе. Отношения между пролетариатом и буржуазией, работодателем и работником, являются глубоко эксплуататорскими и также должны быть упразднены."
 RAJ_Pillais_Influence: "Влияние Пиллаи"
 RAJ_Pillais_Influence_desc: "П. Кришна Пиллаи является ценным членом Коммунистической партии Индии, и с его пониманием мы в будущем примем лучшую стратегию."
 RAJ_Danges_Influence: "Влияние Данге"
 RAJ_Danges_Influence_desc: "Шрипад Амрит Данге, сооснователь Коммунистической партии Индии, обладает опытом, который есть у немногих, и может быть жизненно важен для нашей конечной цели."
 RAJ_Local_Organization: "Сотрудничество с IIM"
 RAJ_Local_Organization_desc: "Все уважающие себя индийские партии работают над неизбежной целью независимости Индии, и было бы глупо забыть об эксплуатации индийцев британцами. Как единый блок, Индия может намного быстрее двигаться к самоуправлению."
 RAJ_Centralize_the_Party: "Революционный дух"
 RAJ_Centralize_the_Party_desc: "Если мы предоставим мелкобуржуазным партиям Индийского субконтинента легитимность как равным в борьбе против несправедливости и не будем продвигать наш революционный марксистский дух, мы навредим нашей конечной цели — социалистическому обществу, свободному от эксплуатации."
 RAJ_Organize_a_Conference: "Бомбейская конференция"
 RAJ_Organize_a_Conference_desc: "Существует множество индийских левых организаций, но у них никогда не было возможности работать вместе над одной проблемой, однако наш успех объединяет цели всех в Индии, кто желает равенства."
 RAJ_A_Society_of_All_Classes: "Неразделимая Индия"
 RAJ_A_Society_of_All_Classes_desc: "Индия, будучи разнообразным континентом, не может управляться теми, кто представляет только индуистов, мусульман или даже высший класс. Она должна управляться коллективно коалицией всех культур, языков, этносов и каст."
 RAJ_Democracy_and_Socialism: "Демократия восторжествовала"
 RAJ_Democracy_and_Socialism_desc: "Основополагающее видение единой Индии может быть реализовано только в многопартийной федеральной политической системе, которая ставит во главу угла свободу."
 RAJ_Assemble_the_Constitutional_Assembly: "Учредительное собрание"
 RAJ_Assemble_the_Constitutional_Assembly_desc: "Теперь, когда Британский Радж наконец остался в прошлом, у нас есть возможность и обязанность построить на его месте новое индийское государство."
 RAJ_Strengthen_Liberal_Elements: "Укрепить либеральные элементы"
 RAJ_Strengthen_Liberal_Elements_desc: "Хотя Индийский национальный конгресс и его социалистические наклонности привели Индию к независимости, их экономическая политика неприемлема для страны, оправляющейся от ста лет колониализма."
 RAJ_Nehrus_Vision_for_India: "Видение Неру для Индии"
 RAJ_Nehrus_Vision_for_India_desc: "Джавахарлал Неру и его сторонники в Индийском национальном конгрессе долго боролись против британского правления и одержали победу. Теперь на него, естественно, ляжет ответственность за руководство Индией в постколониальном мире."
 RAJ_Cut_down_on_Tariffs: "Сократить тарифы"
 RAJ_Cut_down_on_Tariffs_desc: "Экономика Индии долгое время сохранялась в аграрном состоянии нашим британским господином, поэтому мы были в основном исключены из мирового рынка, за исключением экспорта джута и чая. Теперь мы должны реинтегрироваться в мировую экономику, сделав торговлю с Индией проще."
 RAJ_Relieve_the_Administrative_Burden: "Облегчить административное бремя"
 RAJ_Relieve_the_Administrative_Burden_desc: "Из-за взаимодействия британцев с местными князьями и их общей стратегии «разделяй и властвуй» структура Британского Раджа приобрела огромную сложность. С реструктурированной администрацией мы будем гораздо лучше подготовлены к движению в будущее."
 RAJ_Thorough_Corruption_Audits: "Тщательные проверки на коррупцию"
 RAJ_Thorough_Corruption_Audits_desc: "Ещё одной яркой чертой британского правления в Индии была коррупция. Многие бюрократические государственные служащие часто возводят искусственные барьеры для бизнеса, чтобы обогатиться. Мы тщательно изучим записи и найдём худших виновников."
 RAJ_Reconect_broken_up_Industries: "Воссоединить разрозненные отрасли"
 RAJ_Reconect_broken_up_Industries_desc: "Разделение Индии действительно было не самым приятным событием, и до сих пор существует неприязнь между пакистанским и индийским населением. Но это не должно останавливать нас в поиске путей улучшения наших двух стран. Многие цепочки поставок были разорваны, когда границу так небрежно провели. Упрощение ведения бизнеса через нашу границу может помочь некоторым отраслям, пострадавшим от раздела."
 RAJ_Loosen_Rupee_Exchange: "Либерализация обмена рупии"
 RAJ_Loosen_Rupee_Exchange_desc: "В настоящее время индийская рупия напрямую привязана к фунту стерлингов, что является важным фактором финансовой стабильности, хотя это серьёзно препятствует способности индийского правительства занимать иностранные деньги, в которых оно отчаянно нуждается, поскольку в настоящее время у нас значительный торговый дефицит. Передав контроль над рупией рынку, мы поплывём на ветрах либерализации к новым высотам процветания."
 RAJ_Reproachment_with_the_West: "Сближение с Западом"
 RAJ_Reproachment_with_the_West_desc: "Наши прошлые отношения с Европой, очевидно, были не слишком приятными, но остаётся фактом, что экономические выгоды от сотрудничества перевешивают любые сохраняющиеся обиды в нашем нынешнем правительстве."
 RAJ_Extensive_Agricultural_Subsidies: "Обширные сельскохозяйственные субсидии"
 RAJ_Extensive_Agricultural_Subsidies_desc: "Простой фермер — это опора Индии, и хотя наша цель — двигаться в направлении индустриальной экономики, сельскохозяйственные рабочие всё равно должны получать поддержку в своей экономической деятельности."
 RAJ_Ties_Across_Asia: "Связи по всей Азии"
 RAJ_Ties_Across_Asia_desc: "Общий опыт европейской колонизации есть у большинства азиатских стран. Мы будем использовать эти общие черты для дальнейшего военного, экономического и политического сотрудничества."
 RAJ_Indo_Soviet_Friendship_Treaty: "Индо-[SOV.GetAdjective] договор о дружбе"
 RAJ_Indo_Soviet_Friendship_Treaty_desc: "[RAJ_Indo_Soviet_Treaty_Pakistan]Дружественные связи с [SOV.GetNameDef] будут очень выгодны не только для международного положения, но и для установления более тесных экономических связей с одной из крупнейших экономик мира."
 RAJ_Want_Peace_Prepare_for_War: "Хочешь мира — готовься к войне"
 RAJ_Want_Peace_Prepare_for_War_desc: "Мир становится всё более жестоким, и если мы хотим обеспечить мир и процветание нашей нации, мы должны быть готовы защищать его. Это означает укрепление нашей армии, создание союзов с другими странами и бдительность перед лицом угроз нашей безопасности. Только будучи готовыми к войне, мы можем действительно надеяться на достижение мира."
 RAJ_war_preparation: "Подготовка к войне"
 RAJ_Foster_Mining_Jobs: "Развитие горнодобычи"
 RAJ_Foster_Mining_Jobs_desc: "Чтобы принести развитие сельским общинам Индии, мы создадим несколько горнодобывающих предприятий в сельской местности, чтобы принести процветание туда, где его давно не хватало."
 RAJ_Indo_Soviet_Friendship_Treaty_pakistan: "Поскольку позиция Пакистана становится всё менее определённой, мы должны быть готовы заручиться международной поддержкой для укрепления нашего положения на субконтиненте."
 RAJ_Federalize_Education: "Федерализация образования"
 RAJ_Federalize_Education_desc: "Мы введём единую учебную программу для всех индийских школ, чтобы каждый индиец, независимо от этнической принадлежности, религии или языка, мог иметь общее понимание мира."
 RAJ_Reform_the_Rupee: "Реформа рупии"
 RAJ_Reform_the_Rupee_desc: "Мы боролись за независимость от Британии целое столетие, однако индийская рупия по-прежнему привязана к фунту стерлингов. Мы привяжем обменный курс к формирующимся мировым валютам, таким как иена, доллар и рубль."
 RAJ_Constitutional_Minority_Protections: "Конституционная защита меньшинств"
 RAJ_Constitutional_Minority_Protections_desc: "Индия, как, вероятно, самый разнообразный и динамичный субконтинент, является страной, в каждом регионе которой есть значительные языковые, религиозные и этнические меньшинства. Обеспечение их безопасности и процветания гарантирует это для всей Индии."
 RAJ_Crackdown_on_Radicalism: "Подавление радикализма"
 RAJ_Crackdown_on_Radicalism_desc: "Борьба окончена, Индия независима. Некоторые, возможно, этого не осознали, так как всё ещё существуют десятки революционных организаций с миллионами последователей. Мы вернём этих людей в общее русло демократии и будем ковать наше будущее вместе."
 RAJ_India_United_under_Britain: "Индия, объединённая под властью Британии"
 RAJ_India_United_under_Britain_desc: "В отличие от других политических партий, стремящихся к самым радикальным и утопическим обществам, мы придерживаемся сбалансированной и спокойной стратегии продвижения Индии вперёд."
 RAJ_Ally_with_the_Muslim_League: "Союз с Мусульманской лигой"
 RAJ_Ally_with_the_Muslim_League_desc: "Пообещав отдельный Пакистан, мы сможем заручиться поддержкой AIML и вместе бороться с социалистами."
 RAJ_Fight_the_Muslim_League: "Борьба с Мусульманской лигой"
 RAJ_Fight_the_Muslim_League_desc: "Идею Мусульманской лиги о создании отдельного мусульманского государства необходимо вытравить из умов людей."
 RAJ_Siphon_Congress_Ministers: "Переманивание поддержки Конгресса"
 RAJ_Siphon_Congress_Ministers_desc: "Многие в Конгрессе считают, что социалистическая политика заходит слишком далеко, и, возможно, мы сможем изменить их лояльность с помощью небольшой агитации."
 RAJ_Appeal_to_Anglo_Indians: "Привлечение англо-индийцев"
 RAJ_Appeal_to_Anglo_Indians_desc: "Англо-индийцы на субконтиненте были давно забытым меньшинством как для индийских, так и для британских политиков, чем мы можем воспользоваться, чтобы получить их голоса."
 RAJ_Content_for_British_Rule: "Согласие на британское правление"
 RAJ_Content_for_British_Rule_desc: "Мы не можем построить стабильную Индию с радикальным руководством, которое может быть непредсказуемым в своих будущих действиях и только разрушит основу Индии."
 RAJ_Establish_a_Precense_in_Sindh: "Установление присутствия в Синде"
 RAJ_Establish_a_Precense_in_Sindh_desc: "К югу от провинции основания нашей великой партии находится забытая, этнически разнообразная провинция, которой мы должны уделять больше внимания."
 RAJ_National_Unity: "Национальное единство"
 RAJ_National_Unity_desc: "Мы должны объединить всю нашу нацию: индуистов, сикхов, буддистов и мусульман. Только тогда мы сможем достичь мира."
 RAJ_Appeal_to_the_Peasentry: "Привлечение крестьянства"
 RAJ_Appeal_to_the_Peasentry_desc: "Крестьянство — самая важная часть Индии, и любой, кто игнорирует их, пострадает на выборах."
 RAJ_Implement_Equal_Education: "Введение равного образования"
 RAJ_Implement_Equal_Education_desc: "Во всех классовых обществах качественное образование в основном предназначено для высших классов, но в Индии особенно плохая система образования, если спросить низшие слои общества. Наш долг — наконец уравнять образование, чтобы светлые умы из всех слоёв общества могли процветать."
 RAJ_Dismantle_the_Judicial_System: "Демонтаж судебной системы"
 RAJ_Dismantle_the_Judicial_System_desc: "Индуистская судебная система — это запутанный и сложный беспорядок, который благоприятствует высшему классу и пренебрегает большинством. Справедливость для Индии может быть достигнута только если наши суды будут разделять то же видение, что и наше революционное общество."
 RAJ_Abolish_the_Reservation_System: "Отмена системы резервирования"
 RAJ_Abolish_the_Reservation_System_desc: "Высшие касты общества часто получают льготные условия при найме в государственный сектор. Иногда должности даже открыты только для них. Это привело к снижению эффективности бюрократии."
 RAJ_Seize_Influence_from_Upper_Castes: "Изъятие влияния у высших каст"
 RAJ_Seize_Influence_from_Upper_Castes_desc: "Высший класс общества держал власть железной хваткой даже во время британского правления. Это положение не может сохраниться в социалистическом обществе, свободном от эксплуатации. Мы, широкое большинство, силой отнимем у них влияние."
 RAJ_Expand_Healthcare_Facilities: "Расширение университетов"
 RAJ_Expand_Healthcare_Facilities_desc: "После реформирования и уравнивания начального и среднего образования мы займёмся высшей системой."
 RAJ_Establish_The_Revolutionary_Guard: "Создание Революционной гвардии"
 RAJ_Establish_The_Revolutionary_Guard_desc: "Революцию нужно защищать от контрреволюционных движений любой ценой! Мы сосредоточимся на создании армии, подобной Красной Армии."
 RAJ_Invite_Soviet_Planners: "Приглашение советских планировщиков"
 RAJ_Invite_Soviet_Planners_desc: "\\"Государство есть орган классового господства, орган угнетения одного класса другим; оно создаёт порядок, который узаконивает и упрочивает это угнетение, смягчая столкновение между классами.\\"\n—Владимир Ленин"
 RAJ_Invite_International_Theorists: "Приглашение международных теоретиков"
 RAJ_Invite_International_Theorists_desc: "\\"Свобода только для членов правительства, только для членов партии — пусть их довольно много — это совсем не свобода. Свобода всегда есть свобода инакомыслящих.\\"\n—Роза Люксембург"
 RAJ_Agricultural_Collectivisation: "Коллективизация сельского хозяйства"
 RAJ_Agricultural_Collectivisation_desc: "Наша главная цель, конечно, расширение индийского пролетариата, но кто будет их кормить? Наша нынешняя система частного фермерства устарела и неэффективна. Мы должны стремиться объединить мелкие крестьянские хозяйства в более крупные «коллективные фермы»."
 RAJ_Expand_Soviet_Aid: "Расширить помощь Советов"
 RAJ_Expand_Soviet_Aid_desc: "Советы — щедрый народ, помогающий аграрным экономикам развивать сильную промышленность, как они это сделали. Мы должны запросить больше помощи, чтобы резко увеличить темпы нашей индустриализации."
 RAJ_Rethink_Resource_Policy: "Пересмотр ресурсной политики"
 RAJ_Rethink_Resource_Policy_desc: "Старый колониальный режим в основном сосредоточил добычу ресурсов на прибыльных экспортных продуктах и почти полностью проигнорировал индустриализацию и ресурсы, такие как сталь и уголь. Мы должны радикально изменить это, чтобы поддержать наш растущий пролетариат."
 RAJ_Combat_Institutional_Corruption: "Борьба с институциональной коррупцией"
 RAJ_Combat_Institutional_Corruption_desc: "Коррупция глубоко укоренилась во всех индийских институтах. Она процветала во времена Британского Раджа и будет продолжаться, если мы не положим этому конец."
 RAJ_Establish_a_Central_Committee: "Создание Центрального комитета"
 RAJ_Establish_a_Central_Committee_desc: "Навязывая нашим фабрикам централизованные плановые промышленные цели, мы пожинаем плоды эффективности математики, но ограничиваем свободу наших рабочих."
 RAJ_Incentivize_Workplace_Democracy: "Принуждение к производственной демократии"
 RAJ_Incentivize_Workplace_Democracy_desc: "Сосредоточившись на местном социализме, мы предоставим рабочим больше свободы, жертвуя нашими более широкими промышленными целями."
 RAJ_The_Liberation_of_South_Asia: "Освобождение Южной Азии"
 RAJ_The_Liberation_of_South_Asia_desc: "В то время как индийский пролетариат, возможно, получил уступки в виде выборов и избранного правительства, некоторые части Южной Азии не столь удачливы. Мы будем незаметно поддерживать их рабочие движения различными способами, включая поставки оружия, военную интервенцию и политическую подрывную деятельность.\nVishv ke karmachaaree ekajut ho gae!"
 RAJ_Seize_the_Means: "Захват средств..."
 RAJ_Seize_the_Means_desc: "Нашим первым шагом к установлению социализма должен быть захват средств производства, распределения и обмена. Это может расстроить некоторые части страны, если мы не будем осторожны."
 RAJ_of_Production: "...производства"
 RAJ_of_Production_desc: "Буржуазия слишком долго получала львиную долю. Настало время рабочим вкусить плоды своего труда."
 RAJ_of_Distribution: "...распределения"
 RAJ_of_Distribution_desc: "Фабрика — ничто без способа распространять её продукцию. Мы должны захватить частные железные дороги на благо индийского народа."
 RAJ_of_Exchange: "...обмена"
 RAJ_of_Exchange_desc: "Для координации национального бюджета нам нужен государственный банк, который будет регулировать нашу валюту, счета и балансы."
 RAJ_Connect_the_Rural_Areas: "Соединение сельских районов"
 RAJ_Connect_the_Rural_Areas_desc: "Британцы утруждали себя строительством железных дорог только от наших портов до природных ресурсов, оставив большую часть страны нетронутой. Теперь наш долг — задним числом исправить британские ошибки."
 RAJ_The_Ceylon_Emergency: "Цейлонский кризис"
 RAJ_The_Ceylon_Emergency_desc: "Получив оружие и политическую поддержку, сингалы теперь готовы начать восстание против британцев и ждут только нашего слова."
 RAJ_Overthrow_the_Rana_dynasty: "Непальское восстание"
 RAJ_Overthrow_the_Rana_dynasty_desc: "Непальский народ долго организовывался, и пришло время нанести удар по угнетающему режиму Рана."
 RAJ_The_Bhutanese_Revolt: "Бутанское восстание"
 RAJ_The_Bhutanese_Revolt_desc: "Династия Вангчук, как бы её ни любили, не смогла помочь беднейшим слоям страны, и народ готов выступить против неё."
 RAJ_The_Remaining_Ports: "Оставшиеся порты"
 RAJ_The_Remaining_Ports_desc: "На субконтиненте всё ещё остаются неприглядные ростки колониализма, которые должны быть захвачены мирным или даже насильственным путём."
 RAJ_Jinnahs_Kingdom: "Наши мусульманские товарищи"
 RAJ_Jinnahs_Kingdom_desc: "Все религиозные, языковые и культурные группы субконтинента переплетены и зависят друг от друга. Вырывание одной из них сильно ослабит нацию Индии. Долгое время забытой, но чрезвычайно важной частью этой нации являются мусульмане, населяющие земли Синда, Пенджаба и Бенгалии."
 RAJ_A_New_Movement: "Новое движение"
 RAJ_A_New_Movement_desc: "Россия Сталина не смогла создать справедливое социалистическое общество, и мы должны дистанцироваться и зажечь новое движение вперёд."
 RAJ_The_Third_International: "Третий интернационал"
 RAJ_The_Third_International_desc: "Россия Сталина прошла долгий путь и выжила долгие годы; мы должны присоединиться к ним, если хотим увидеть ещё один день."
 RAJ_Asian_Anti_Colonialism: "Азиатский антиколониализм"
 RAJ_Asian_Anti_Colonialism_desc: "Мы должны, спустя столько лет, наконец изгнать европейцев с азиатского континента, чтобы обезопасить наше будущее."
 RAJ_Bind_South_Asia_Closer: "Укрепление связей в Южной Азии"
 RAJ_Bind_South_Asia_Closer_desc: "Мы установили социализм в Южной Азии, и наконец мы должны объединить их в военном отношении."
 RAJ_Socialist_Science: "Социалистическая наука"
 RAJ_Socialist_Science_desc: "Советский народ далеко продвинулся в своих научных начинаниях и обладает множеством технологий, желательных для нового Индийского государства рабочих. Если мы начнём программы научного обмена, оба наших общества выиграют."
 RAJ_Military_Cooperation: "Военное сотрудничество"
 RAJ_Military_Cooperation_desc: "С нашими новообретёнными союзниками мы скоординируем нашу оборонную стратегию и поделимся военными секретами."
 RAJ_Technological_Cooperation: "Технологическое сотрудничество"
 RAJ_Technological_Cooperation_desc: "Мы должны укрепить не только нашу академическую сферу, но и академическую сферу наших союзников."
 RAJ_Establish_a_National_Government: "Создание национального правительства"
 RAJ_Establish_a_National_Government_desc: "После победы на выборах мы создадим централизованное правительство и сформируем кабинет."
 RAJ_Battle_the_Untouchables: "Борьба с неприкасаемостью"
 RAJ_Battle_the_Untouchables_desc: "Самые слабые из каст остро нуждаются в помощи, и демократическая Индия должна помочь улучшить их положение."
 RAJ_Encourage_Rural_Education: "Поощрение сельского образования"
 RAJ_Encourage_Rural_Education_desc: "Если мы хотим стать индустриальной державой, мы должны поощрять образование во всех слоях общества."
 RAJ_Expand_Delhi_University: "Расширение Делийского университета"
 RAJ_Expand_Delhi_University_desc: "С увеличением спроса на высшее образование, мы должны расширить наш величайший университет — Делийский университет."
 RAJ_Economic_Restructuring: "Экономическая реструктуризация"
 RAJ_Economic_Restructuring_desc: "В своем нынешнем состоянии наша экономика не готова к будущему, и мы должны действовать быстро, чтобы реформировать её, либо оставаться аграрным обществом."
 RAJ_Expand_the_Public_Sector: "Расширение Госсектора"
 RAJ_Expand_the_Public_Sector_desc: "Лучший способ расширить наши промышленные возможности — это прямое вмешательство правительства, что может оттолкнуть некоторых наших более консервативных членов."
 RAJ_Soviet_Assistance: "Советская Помощь"
 RAJ_Soviet_Assistance_desc: "В нынешней геополитической обстановке у СССР есть заинтересованность в укреплении Индии как противовес западным державам."
 RAJ_Establish_the_Planning_Commission: "Образование Комиссии по планированию"
 RAJ_Establish_the_Planning_Commission_desc: "Мы сосредоточим наши промышленные усилия в рамках одного учреждения, которое будет отвечать за все виды государственно управляемого экономического планирования."
 RAJ_Agricultural_Investments: "Сельскохозяйственные инвестиции"
 RAJ_Agricultural_Investments_desc: "Улучшая наш сельскохозяйственный потенциал, мы не только стимулируем сельские общины перемещаться в другие сектора, но и повышаем уровень жизни обычного индийца."
 RAJ_Expell_the_Socialists: "Изгнание социалистов"
 RAJ_Expell_the_Socialists_desc: "Наша партия давно была широким движением, но теперь, когда наша общая цель достигнута, мы изгоним радикальные элементы нашей организации."
 RAJ_Unify_the_Courts: "Унификация судов"
 RAJ_Unify_the_Courts_desc: "Наша судебная система излишне сложна и устарела веками. Мы унифицируем её, чтобы повысить эффективность."
 RAJ_Concessions_to_Princes: "Уступки принцам"
 RAJ_Concessions_to_Princes_desc: "Хотя сыновья принцов, безусловно, не согласны с нашим новым правительством, мы не должны позволять своим идеологическим разногласиям ослеплять нас от прагматизма."
 RAJ_No_Compromises: "Никаких компромиссов"
 RAJ_No_Compromises_desc: "Веково вступавшие учреждения сиротских территорий не заслуживают доверия в силу чего угодно из нашего нового современного государства. Компромисс с этими остатками феодализма недопустим для любого современного государства."
 RAJ_Integrate_the_Princely_States: "Интеграция герцогских территорий"
 RAJ_Integrate_the_Princely_States_desc: "С нашим прогрессом к Независимости Герцогские территории будут интегрированы, по доброй воле или нет."
 RAJ_Democratize_our_Institutions: "Демократизация наших учреждений"
 RAJ_Democratize_our_Institutions_desc: "Наши учреждения заражены коррупцией, корни которой идут от систем, введённых веками назад, мы должны перестроить и реформировать их для обеспечения стабильности."
 RAJ_Central_Bureau_of_Investigation: "Центральное управление расследований"
 RAJ_Central_Bureau_of_Investigation_desc: "Нам необходимо защитить наши недавно созданные учреждения от всех угроз, с которыми они могут столкнуться. Настало время нашего ответа на Абвер, MI6 и ЦРУ."
 RAJ_Reform_our_Police_Force: "Реформа полиции"
 RAJ_Reform_our_Police_Force_desc: "Британская Имперская Полиция глубоко непопулярна в нашей стране, и такими же непопулярными будут наше правительство, если мы продолжим их полицейскую систему. Пришло время отменить британскую полицейскую систему и установить distinctly индийскую."
 RAJ_Revise_Taxation_Policies: "Пересмотр налоговой политики"
 RAJ_Revise_Taxation_Policies_desc: "Британский мандатировал наш индийский народ, часто с несправедливыми методами. Чтобы поддерживать здоровую экономику и общество,我们必须 стремиться заменить британскую налоговую систему на distinctly индийскую."
 RAJ_Reestablish_our_Armed_Forces: "Восстановление наших Вооруженных Сил"
 RAJ_Reestablish_our_Armed_Forces_desc: "Британская армия Индии была крупным институтом, чья главная цель была обеспечить безопасность британского правления в Индии. Нам нужно создать новую армию, служащую нации Индия."
 RAJ_No_Resentments: "Нет обид"
 RAJ_No_Resentments_desc: "Наше прошлое с Британией нельзя описать как спокойное, но нынешние геополитические обстоятельства требуют нашего союза с западными державами. Хотя раны британского колониализма всё ещё пульсируют, нам необходимо стоять плечо к плечу как равным партнёрам."
 RAJ_Protect_the_Arabian_Sea: "Защита Аравийского моря"
 RAJ_Protect_the_Arabian_Sea_desc: "Между нами и британской осью глобальной обороны на Суэцком канале лежит широкое и открытое Аравийское море. Там пираты и submarine противника нашли множество возможностей для вмешательства в наши поставки на Ближний Восток и за его пределы. Создание скоординированных радиолокационных станций и аэродромов значительно поможет нам вернуть контроль над Индийским океаном."
 RAJ_Equal_Partners: "Равные партнеры"
 RAJ_Equal_Partners_desc: "Теперь, когда отношения между Колонией и Превосходством изменились на отношения равноправных партнёров, мы займём более важную часть международной политики для защиты свободы, в тех руках Британии не достигнет."
 RAJ_A_New_Way_Forward: "Новый путь вперёд"
 RAJ_A_New_Way_Forward_desc: "У Индии нет выгоды от вовлечения в войну, и даже если благодаря нашим усилиям мы остановим одну войну, мы спасём тысячи жизней."
 RAJ_Mutual_Investments: "Взаимные инвестиции"
 RAJ_Mutual_Investments_desc: "Пока европейцы значительно более индустриализированы, чем мы, эти инвестиции всё равно будут взаимовыгодными."
 RAJ_The_Non_Aligned_Movement: "Движение без блоков"
 RAJ_The_Non_Aligned_Movement_desc: "Мы будем fostering глобальное сообщество, независимое от сверхдержав нашего времени, и вместе будем бороться за мир в мире."
 RAJ_Bring_Democracy_to_South_Asia: "Принести демократию в Южную Азию"
 RAJ_Bring_Democracy_to_South_Asia_desc: "Хотя Индия превратилась в процветающий оплот демократии, мы всё ещё затеняем континент, лишенный демократии и полный тирании."
 RAJ_South_Asian_Economic_Integration: "Экономическая интеграция Южной Азии"
 RAJ_South_Asian_Economic_Integration_desc: "Индийский субконтинент имеет общую цель, среди прочего, на мировом рынке. Если мы консолидируем и интегрируем нашу экономику, процветание достигнет всех. Кроме того, переговоры с международными торговыми партнёрами станут гораздо более эффективными."
 RAJ_Pressure_the_British_about_Ceylon: "Давить на Британию по поводу Шри-Ланки"
 RAJ_Pressure_the_British_about_Ceylon_desc: "Народ Шри-Ланки давно организовался за независимость, надеясь, что независимость Индии также означает их освобождение от британской эксплуатации. Хотя это, возможно, не было так, теперь мы можем помочь движению приобрести голос."
 RAJ_Armed_Neutrality: "Вооруженный нейтралитет"
 RAJ_Armed_Neutrality_desc: "Никто не хочет войны, лидеры хотят только трофеи войны, и целью любой нейтрализованной, но суверенной нации должно быть сделать эти трофеи как можно труднее достижимыми. Мы будем улучшать моральный дух в моей армии и укреплять нашу промышленность вооружений."
 RAJ_Expand_its_Competences: "Расширить свои компетенции"
 RAJ_Expand_its_Competences_desc: "Возможно, если мы будем расширять и объединять эту организацию, наши слова будут иметь больше поддержки, и мы будем более эффективны в защите прав малых стран."
 RAJ_Emphasise_Anti_Colonialist_Sentiment: "Акцентировать антиколониальные настроения"
 RAJ_Emphasise_Anti_Colonialist_Sentiment_desc: "Колониализм — это уродлирое, устаревшее и непопулярное учреждение, судьба которого давно решена. Этому сообщению должно быть распространено по всему глобусу, иначе десятилетия ненужных страданий придется endure колонизированным народам этой планеты."
 RAJ_Take_back_the_Ports: "Взять назад порты"
 RAJ_Take_back_the_Ports_desc: "Европейские порты — уродливое напоминание нашего колониального прошлого. Хотя мы, конечно, надеемся решить эту проблему мирно, мы не можем полагаться только на слова."
 RAJ_Launch_The_Quit_India_Movement: "Запустить движение «Свободная Индия»"
 RAJ_Launch_The_Quit_India_Movement_desc: "В настоящее время мы применяем все доступные нам меры, чтобы выбросить британцев, но, возможно, примирение с нашими политическими противниками и начало всеобщей забастовки увеличат давление."
 RAJ_Intervention_in_Pakistan: "Вмешательство в Пакистане"
 RAJ_Intervention_in_Pakistan_desc: "Хрупкое оправдание Джиннаха демократии пало, и диктаторский режим был насильственно навязан мусульманам, сикхам и индуистам, проживающим в Пенджабе, Синде и Бенгалии. Разрешение такому экстремальному режиму существования — это приглашение для внешних держав, стремящихся взять контроль над индийским субконтинентом. Вооружённые силы Индии должны вмешаться, прежде чем будет слишком поздно."
 RAJ_Offer_the_British_Concessions: "Концессии Британии"
 RAJ_Offer_the_British_Concessions_desc: "Британские острова держатся Индии по многим причинам, среди главных из них есть огромные природные богатства индийского субконтинента. Переговоры пойдут намного проще, если мы пообещим поделиться некоторыми нашими ресурсами."
 RAJ_Mutual_Security: "Взаимная безопасность"
 RAJ_Mutual_Security_desc: "В нашем новом альянсе мы будем координировать военные стратегии, чтобы продвинуть безопасность всех нас."
 RAJ_The_Remains_of_South_Asia: "Остатки Южной Азии"
 RAJ_The_Remains_of_South_Asia_desc: "Южная Азия всё ещё полна деспотических режимов, подавляющих свой народ. Мы будем, с помощью Британии, внедрять демократию в эти авторитарные режимы."
 RAJ_Outwards_to_the_World: "На выход во внешний мир"
 RAJ_Outwards_to_the_World_desc: "Мы должны искать внешние союзы для обеспечения положения Индии."
 RAJ_The_Womens_Status: "Статус женщин"
 RAJ_The_Womens_Status_desc: "Женщины долго были угнетены в нашем обществе. Все виды варварских, устаревших практик всё ещё навязываются женщинам. И хотя для исправления этого требуется гораздо больше, чем законодательство, это первый шаг к установлению справедливой Индии."
 RAJ_Caste_Reform: "Реформа каст"
 RAJ_Caste_Reform_desc: "Система кастового разделения долго нависала над Индией и доминирует во многих её частях. В индуистском обществе она категоризирует людей в жёсткие социальные группы. При этом нижние касты регулярно эксплуатируются."
 RAJ_Develop_the_Defense_Industry: "Развитие оборонной промышленности"
 RAJ_Develop_the_Defense_Industry_desc: "После наших недавних экономических реформ в отношении национализации, теперь настало время также укрепить нашу национальную оборонную индустрию для помощи как нашей экономике, так и нашим вооружённым силам."
 RAJ_Establishing_A_Indian_Navy: "Создание индийского флота"
 RAJ_Establishing_A_Indian_Navy_desc: "Индийский океан велик и опасен, и патрулирование его требует большогоurface флота, которого у нас в настоящее время нет. Критически важно запустить производство военно-морских сил."
 RAJ_Unity_in_India: "Индийская единство"
 RAJ_Unity_in_India_desc: "Долгое время мусульмане Индии маргинализировались, но ни свободное, демократическое и справедливое общество не может терпеть такого зла. Мы должны уступить их требованиям и объединить страну."
 RAJ_The_Ones_Who_Got_Away: "Тебя, кто сбежал"
 RAJ_The_Ones_Who_Got_Away_desc: "Хотя мы были довольно строгими в нашем требовании интeграции в Индию, несколько принцйэслей смогли дать нам сбежать. Теперь настало время укрепить субконтинент."
 RAJ_Industrial_Expertise: "Промышленная экспертиза"
 RAJ_Industrial_Expertise_desc: "С объединённым интеллектуальным талантом советских советников и недавно оканчивающих студентов Делиского университета мы улучшим наш промышленный процесс с улучшенной технологией."
 RAJ_Mechanized_Agriculture: "Механизированное сельское хозяйство"
 RAJ_Mechanized_Agriculture_desc: "Наше население теперь образовано, как никогда раньше. С всей этой новой экспертизой мы можем внедрить всеобщую систему механизированного сельского хозяйства, что значительно увеличит наш выход."
 RAJ_Minimum_Wage_Legislation: "Законодательство о минимальной заработной плате"
 RAJ_Minimum_Wage_Legislation_desc: "Рабочие Индии были эксплуатированы на протяжении поколений. Если мы введём законы о минимальной заработной плате, мы значительно улучшим уровень жизни самых бедных из бедных."
 RAJ_Relieve_Indias_Struggling_Food_Supply: "Обеспечить продовольствием Индию"
 RAJ_Relieve_Indias_Struggling_Food_Supply_desc: "Продовольственная база Индии очень зависит от климата. Если сезон дождей не достигнет квоты, зерно придется импортировать, чтобы удовлетворить спрос. Если мы будем улучшать наши ирригационные методы и агротехнику, мы сможем предотвратить будущих голодовок."
 RAJ_Placate_the_Nobles: "Утешите аристократов"
 RAJ_Placate_the_Nobles_desc: "Аристократия процветала по-британским правилам, и они недовольна их Независимостью. Мы можем изменить этот факт, однако, если мы хотели бы предоставить им некоторую концессию."
 RAJ_Military_Research_Department: "Военно-исследовательское бюро"
 RAJ_Military_Research_Department_desc: "Мы должны расширить наши военные возможности не через сырое количество, как советуют многие наши генералы, но через истинное технологическое превосходство."
 RAJ_Sit_Down_with_the_Farmers: "Диалог с фермерами"
 RAJ_Sit_Down_with_the_Farmers_desc: "Самообеспечивающийся фермер, работающий на своей земле, есть кровеносная система нашей земли, нашей нации, и его потребности заслуживают больше внимания, чем предлагало ему колониальное правительство."
 RAJ_Token_Social_Reform: "Символическая реформа каст"
 RAJ_Token_Social_Reform_desc: "Кастовая система всегда хорошо служила Индии в сохранении порядка и стабильности, хотя отъезд британцев оставил многие должности, требующие высокой компетентности, пустыми, без кого-либо из высших каст, чтобы заполнить их. Снимая некоторые нормативные акты, мы, возможно, сможем поддерживать эффективность колонизированного времени."
 RAJ_Expand_our_Ordance_Industry: "Расширить промышленность оружейных производств"
 RAJ_Expand_our_Ordance_Industry_desc: "В возникающих конфликтах мира [RAJ.GetNameDef] должен быть готов защитить своих граждан, и почти столь же важно свобода всех."
 RAJ_Answer_The_Call: "Отзовитесь назов"
 RAJ_Answer_The_Call_desc: "Сейчас Великобритания находится в войне, которую она не может позволить себе проиграть. Любая форма капитуляции может погрузить миллионы людей в тиранию и тьму. Это наш moral долг бороться за свободу там, где она находится под угрозой, и пришло время ответить на этот вызов."
 RAJ_Institute_The_Draft: "Внедрить призыв"
 RAJ_Institute_The_Draft_desc: "Хотя наше участие в этой войне является нравственным долгом, не каждый наш гражданин осознает серьезность нашего положения. Мы вынуждены прибирать мужчин, которые не желают добровольно откликнуться, чтобы освободить людей по всему миру."
 RAJ_Cross_Country_Railways: "Межконтинентальные железные дороги"
 RAJ_Cross_Country_Railways_desc: "Британия вложила огромные средства в систему железных дорог, но линии ограничены и ориентированы на прибыль. Мы должны расширить эту сеть во благо Индии."
 RAJ_Industrial_Investments: "Инвестиции в промышленность"
 RAJ_Industrial_Investments_desc: "Мы должны существенно инвестировать в заводы по всей стране, чтобы помочь нашему экономическому росту и процветанию."
 RAJ_Aquire_War_Material: "Закупить военное снаряжение"
 RAJ_Aquire_War_Material_desc: "Если мы хотим противостоять возможным будущим врагам, мы должны быть готовы с новым исследовательским и хорошо произведенным оружием для поддержки наших храбрых солдат."
 RAJ_Internal_Security_Act: "Внутренний закон о безопасности"
 RAJ_Internal_Security_Act_desc: "Мы не можем позволить экстремистским факциям в этой стране разрушить всё. Мы будем придерживаться британской политики арестов тех, кто хочет разрушить эту великую нацию – Индию."
 RAJ_Placate_the_British: "Задобрить Великобританию"
 RAJ_Placate_the_British_desc: "Хотя наша независимость обеспечена, мы всё ещё сильно полагаемся на британские инвестиции, чтобы удержать нашу экономику на плаву. Мы могли бы привлечь больше инвестиций в Индию, если бы только устранят недовольство англичан."
 RAJ_Federalisation: "Повышение грамотности"
 RAJ_Federalisation_desc: "Нам необходимо радикально повысить уровень грамотности за счет расширения образовательного сектора. Индия зависит от этого!"
 RAJ_A_Truly_Indian_Navy: "Настоящая индийская флотилия"
 RAJ_A_Truly_Indian_Navy_desc: "Индийский океан – огромный и опасный, охрана его требует большой морской флотилии, которой у нас сейчас нет. Критически важно увеличить морское производство."
 RAJ_Fighting_Tyranny_whereever_it_may_be: "Борьба с тиранией по всему миру"
 RAJ_Fighting_Tyranny_whereever_it_may_be_desc: "Наше вооруженные силы использовались в основном для защиты индийских интересов в Южной Азии, но мы не сообразили полной картины. Мы должны помочь свободе по всему миру и вести борьбу с теми, кто хочет превратить всё в пепел."
 RAJ_Assemble_our_Cabinet: "Образовать наше правительство"
 RAJ_Assemble_our_Cabinet_desc: "У каждого нового挂件 (губернатора) появляется новое правительство, поддерживающее его усилия в Индии. Хотя Исполнительный совет挂件 был лишь консультативным, со временем он приобрёл больше влияния, и нам нужно найти компетентных министров."
 RAJ_Meet_with_the_Legislative: "Встреча с законодательной властью"
 RAJ_Meet_with_the_Legislative_desc: "Хотя представитель короны обладает большой властью над законодательным органом, в отличие от метрополии, нам всё равно следует убедиться, что они проголосуют за нас."
 RAJ_Meet_with_the_Judiciary: "Встреча с судебной системой"
 RAJ_Meet_with_the_Judiciary_desc: "Хотя английский common law был в основном применён в Индии, судебная система построена по местному образцу. Убедиться, что они нас не противостоят, спасет нас от будущих трудностей."
 RAJ_Attend_the_Imperial_Conference: "Участвовать в Имперской конференции"
 RAJ_Attend_the_Imperial_Conference_desc: "Имперские конференции проводятся регулярно, и только эта имеет особое значение. После королевского, скажем так, скандала многие доминионы были в беспорядке, и цель Лондона – снова укрепить связи с Империей."
 RAJ_Common_Economic_Policy: "Общая экономическая политика"
 RAJ_Common_Economic_Policy_desc: "В качестве первого шага к сближению с Империей [ENG.GetLeader] рассматривает пересмотр Имперской общей экономической политики."
 RAJ_Reinvigorate_Imperial_Shipping: "Возрождение Имперского судоходства"
 RAJ_Reinvigorate_Imperial_Shipping_desc: "Судоходные пути через Индийский океан немного иссякли в ущерб британским касовкам Радж. Нам необходимо настаивать на дальнейших инвестициях в Имперское судоходство."
 RAJ_Common_Defence_Policy: "Общая оборонная политика"
 RAJ_Common_Defence_Policy_desc: "Растущее напряжение во всем мире не прошло мимо британской администрации. Они предложили, что, возможно, доминионам, островам и Индии необходимо лучше координировать свои вооруженные силы для защиты Империи."
 RAJ_The_Indian_Merchant_Navy: "Индийский торговый флот"
 RAJ_The_Indian_Merchant_Navy_desc: "Хотя Индия исторически не была самой мореходной нацией, мы сильно зависим от торговли, которую нам предоставляет Империя. Для лучшего использования наших ресурсов необходимо начать расширять возможности нашего флота для патрулирования Индийского океана."
 RAJ_An_Army_serving_the_Empire: "Армия на службе Империи"
 RAJ_An_Army_serving_the_Empire_desc: "Хотя наша армия использовалась в основном в Южной Азии и вторично в Африке, домашние острова предлагают международные операции для индийских солдат."
 RAJ_Assist_in_the_Singapore_Strategy: "Участвовать в Сингапурской стратегии"
 RAJ_Assist_in_the_Singapore_Strategy_desc: "Империя Японии давно видела европейские владения в Азии, а Британия, реагируя на это, уже разработала планы сосредоточить защиту Азии вокруг Сингапура."
 RAJ_Indianise_the_Royal_Indian_Navy: "Индийскана Королевского индийского флота"
 RAJ_Indianise_the_Royal_Indian_Navy_desc: "Королевский индийский флот тайно назывался вспомогательным по отношению к правильному Королевскому флоту, так как он в основном штатится британцами. Доверяя больше индийцам высшим постам, это может создать индивидуальный для РИН."
 RAJ_Expand_the_Indian_Air_Force: "Расширение Индийских Воздушных Сил"
 RAJ_Study_British_Armour: "Изучение британской бронетехники"
 RAJ_Study_British_Armour_desc: "Наша пехотная армия крайне не хватает бронированных машин, важно изучать иностранные конструкции, чтобы модернизировать нашу армию и защитить себя от иностранных угроз."
 RAJ_Expand_the_Indian_Air_Force_desc: "Война изменилась. Многие наши генералы всё ещё живут с победой в Великой войне. Но современная война ведётся не только на земле, но и в небе. aforementioned боевое поле давно было нами игнорировано. Пришло время исправить это печальное состояние дел."
 RAJ_British_Arms_Shipments: "Британские поставки оружия"
 RAJ_British_Arms_Shipments_desc: "Хотя у нас много преданных мужчин, готовых умереть за Империю, не всех их вооружить можем, а подкрепление с островов существенно улучшит нашу эффективность."
 RAJ_British_Investments: "Британские инвестиции"
 RAJ_British_Investments_desc: "Индия особенно не известна как промышленный центр, и мы, безусловно, не изменим это в ближайшее время, но инвестиции британских компаний также могут помочь нам по пути."
 RAJ_Our_First_Order_of_Business: "Наше первое дело"
 RAJ_Our_First_Order_of_Business_desc: "После встреч со всеми другими ветвями правительства, у нас now есть возможность представить первый закон Линлитго на Имперском Законодательном совете на голосование."
 RAJ_New_Excavation_Companies: "Новые компании по разработке"
 RAJ_New_Excavation_Companies_desc: "С нашей недавно расширенной инфраструктурой новые компании теперь могут войти на индийскую территорию для сбора наград богатой индийской земли."
 RAJ_New_Industrial_Centers: "Новые промышленные центры"
 RAJ_New_Industrial_Centers_desc: "Наш расширенный железные дороги также предоставили нам возможность строить заводы по всей стране и создавать новый класс индийских рабочих."
 RAJ_Expand_Urban_Centers: "Расширение городских центров"
 RAJ_Expand_Urban_Centers_desc: "Поскольку индийская продовольственная безопасность теперь в целом установлена, мы можем перейти к расширению наших городских центров и созданию новых возможностей для ранее бедных сельских масс."

 Railway_Expansion_Act_init: "Начата работа над Законом о расширении железных дорог"
 Railway_Expansion_Act_passed: "Принят Закон о расширении железных дорог"
 Railway_Expansion_Act_failed: "Не принят Закон о расширении железных дорог"
 RAJ_Railway_Expansion_Act: "§WAdd§! Закон о расширении железных дорог"
 RAJ_Railway_Expansion_Act_desc: "Инфраструктура нашей страны недостаточна в большинстве частей страны. До сих пор мы беспокоились только о строительстве железных дорог по прибыльным линиям, но это должно измениться, если мы когда-либо конкурируем в мировой экономике."
 Agricultural_Stabilisation_Act_init: "Начата работа над Законом о стабилизации сельского хозяйства"
 Agricultural_Stabilisation_Act_passed: "Принят Закон о стабилизации сельского хозяйства"
 Agricultural_Stabilisation_Act_failed: "Не принят Закон о стабилизации сельского хозяйства"
 RAJ_Agricultural_Stabilisation_Act: "§WAdd§! Закон о стабилизации сельского хозяйства"
 RAJ_Agricultural_Stabilisation_Act_desc: "Индия всегда была сельским обществом, но частые засухи разрушили индийское продовольственное снабжение. С внешней помощью часто withholding, в наших интересах обеспечить собственное производство зерна."
 Educational_Reform_Act_init: "Начата работа над Законом об образовательной реформе"
 Educational_Reform_Act_passed: "Принят Закон об образовательной реформе"
 Educational_Reform_Act_failed: "Не принят Закон об образовательной реформе"
 RAJ_Educational_Reform_Act: "Закон об образовательной реформе"
 RAJ_Educational_Reform_Act_desc: "Наши самые талантливые интеллигенты всегда переезжали на домашние острова для лучшего образования под короной короля. Но если мы будем расширять местные университеты, мы сможем сохранить больше ярких умов Индии."
 Insurance_Act_init: "Начата работа над Законом об страховании"
 Insurance_Act_passed: "Принят Закон об страховании"
 Insurance_Act_failed: "Не принят Закон об страховании"
 RAJ_Insurance_Act: "Закон об страховании"
 RAJ_Insurance_Act_desc: "Дело страхования давно игнорировалось в Индии из-за отсутствия правовой базы или стимулов. Единственной отраслью, куда оно смогло ступить, была морская отрасль, мы можем Hopefully изменить это с помощью этого закона."
 War_Powers_Act_init: "Начата работа над Законом о вооруженных силах"
 War_Powers_Act_passed: "Принят Закон о вооруженных силах"
 War_Powers_Act_failed: "Не принят Закон о вооруженных силах"
 RAJ_War_Powers_Act: "Закон о полномочиях военного времени"
 RAJ_War_Powers_Act_desc: "Хотя индийцы могли не иметь прямого участия в решении войти в войну, они определенно поддержат наши благородные цели по поражению подлого захвата фашизма, поднимающегося во всем мире."

 RAJ_His_Majesties_University: "Университет Его Величества"
 RAJ_His_Majesties_University_desc: "Делийский университет давно установлен, но не осознает нужды индийских интеллигентов, которые всё ещё учатся в Лондоне. Помочь облегчить преподавательский талант, мы можем значительно улучшить наше образование."
 RAJ_Department_of_War_Studies: "Отделение военных исследований"
 RAJ_Department_of_War_Studies_desc: "Хотя, конечно, есть много областей обучения, ни одна не так важна как военные, помогающие нашей стране защищать свои границы."
 RAJ_Open_for_Business: "Открыто для бизнеса"
 RAJ_Open_for_Business_desc: "С новыми правовыми рамками и страховыми компаниями международных предпринимателей могут рассматривать Индию как прибыльный рынок для исследования. Это может только помочь struggling индийской экономике."
 RAJ_Healthcare_Investments: "Инвестиции в здравоохранение"
 RAJ_Healthcare_Investments_desc: "Нельзя отрицать, что наша система здравоохранения в плохом состоянии. Большинство местных индийцев не могут позволить себе пойти к врачу, что вредит обществу и экономике в целом, правительство народа не может позволить этому печальному состоянию длиться вечно. Нам нужно действовать!"
 RAJ_Civil_Aviation_Expansion: "Унификация железных дорог"
 RAJ_Civil_Aviation_Expansion_desc: "Наши железные дороги иногда фракционированы и неэффективно построены, пришло время исправить отверстия в сети и улучшить наши грузовые и системы снабжения."
 RAJ_Wheat_Exports: "Экспорт пшеницы"
 RAJ_Wheat_Exports_desc: "Имея теперь в некоторой степени стабилизированное индийское продовольственное снабжение, точно бы не помешало экспортировать немного зерна.\nПравильно?"
 RAJ_Primary_Education: "Начальное образование"
 RAJ_Primary_Education_desc: "Большинство сельских индийцев не имеют образования, только потому из-за недоразвития начальной и средней школьной системы. Если мы инвестируем newly granted деньги разумным образом, мы можем быть уверены улучшить экспертизу нашего основного рабочего корпуса."
 RAJ_Drought_Prevention_Measures: "Меры по предотвращению засухи"
 RAJ_Drought_Prevention_Measures_desc: "Индия во время муссонов является одной из самых сельскохозяйственных областей мира. Единственная проблема – несоответствие сезонного паттерна, изматывающего субконтинент продовольственной безопасностью. Если мы расширим меры орошения, мы сможем снизить зависимость от годовых дождей."
 RAJ_Bolster_our_Security_Forces: "Укрепление сил безопасности"
 RAJ_Bolster_our_Security_Forces_desc: "Для того чтобы бизнес правильно функционировал, мы должны защитить новых предпринимателей от мошенников и воров. Неумение защищать возможно было самым большим препятствием для иностранных инвестиций. По крайней мере, до сих пор."
 RAJ_Gather_Industrial_Funds: "Сбор промышленных средств"
 RAJ_Gather_Industrial_Funds_desc: "Национальный Конгресс Индии, наш главный соперник в этой кампании, имеет широкую поддержку народа. Мы можем компенсировать это обширными обещаниями землевладельцам и капиталистам Индии. Их казны бездонны, и политическое будущее Индии – достойная инвестиция."
 RAJ_Arms_Industry_Expansion: "Расширение оружейной промышленности"
 RAJ_Arms_Industry_Expansion_desc: "Индийская армия стала самой крупной волонтерской армией в истории, но многие из новобранцев лишены надлежащего снаряжения для поддержания борьбы. Хотя в прошлом мы полагались на поставки оружия британцами, сейчас настало время предоставить оборонную промышленность в южноазиатских землях."
 RAJ_Implement_Conscription: "Внедрить всеобщую воинскую повинность"
 RAJ_Implement_Conscription_desc: "Наша армия волонтеров огромна, некоторые скажут — необычайно велика, особенно в условиях колониального правительства. Однако Лондону нужны еще больше людей, чтобы выиграть эту войну, и если у нас есть что-то ценное, так это мужчины. Это может быть воспринято населением негативно, но цена того стоит."
 RAJ_The_August_Offer: "Августовский заместитель"
 RAJ_The_August_Offer_desc: "Хотя наши отношения с коренными жителями субконтинента были отнюдь не идеальными, мы не можем исключить их от управления навсегда. Особенно в это время войны, когда миллионы индийцев страдают, мы должны убедиться, что не допустим бунта. Предоставление некоторых уступок должно удовлетворить их жажду реформ."
 RAJ_Expand_Tata_Steel: "Расширить производственные мощности стали Tata"
 RAJ_Expand_Tata_Steel_desc: "Стальную компанию Tata являлась краеугольным камнем индустриализации Индии на протяжении последних тридцати лет. Чтобы держатьась в ритме быстрой смены в мировой экономике, необходимо продолжать инвестировать в расширение и модернизацию Tata Steel. Это не только закрепит наше положение как ведущего производителя стали, но и создаст новые рабочие места и стимулирует экономический рост во всей стране."
 RAJ_Expand_the_Burma_Road: "Расширение Бирманской дороги"
 RAJ_Expand_the_Burma_Road_desc: "Китай является естественным союзником в борьбе против Японской Империи, и нам необходимо увеличить нашу помощь им по Дороге в Бирму, чтобы освободить Азию от тиранического понятия Джингосизма."
 RAJ_Border_Fortifications: "Кордонные укрепления"
 RAJ_Border_Fortifications_desc: "В Азии много агрессивных империй, и охрана нашего восточного фронте должна быть нашим главным приоритетом. Мы можем построить укрепления вдоль гор и рек восточной Бирмы."

 raj_diverse_investments_tt: "Разреши частным лицам инвестировать в §YMасштабные Производственные цеха§! и §YАлюминиевые заводы§!."
 raj_invest_relations_10_tt: "Увеличивает §YОтношения с инвесторами§! на §G10§!."
 raj_invest_relations_15_tt: "Увеличивает §YОтношения с инвесторами§! на §G15§!."

 RAJ_Establish_the_Planning_Commission: "Создать Комиссию по планированию"
 RAJ_Establish_the_Planning_Commission_desc: "Колониальная экономика была устроена таким образом, чтобы эксплуатировать население ради собственной выгоды. Теперь настало время внести реформы, которые ставят во главу угла потребности и благополучие всех индийских людей и восстанавливают устойчивую и справедливую экономику. Наш первый шаг в этом направлении — создание национальной Комиссии по планированию для надлежащего развития нашей экономики, а также обеспечения公平的 зарплат и условий труда."
 RAJ_Common_Economic_Policy: "Общая экономическая политика"
 RAJ_Common_Economic_Policy_desc: "Как указано на Имперском Конференции, экономические политики частей Империи должны быть согласованы для стимуляции межимперского экономического роста."
 RAJ_Foster_Private_Investment: "Поощрять частные инвестиции"
 RAJ_Foster_Private_Investment_desc: "Для стимулирования экономического роста и развития в Индии важно поощрять частные инвестиции как из внутренних, так и из иностранных источников. Этого можно достичь различными мерами, такими как налоговые льготы, упрощение делового регулирования и создание благоприятной инвестиционной среды. Поощряя частные инвестиции, мы можем стимулировать экономику и стимулировать инновации в различных секторах."
 RAJ_Reform_the_Colonial_Economy: "Реформировать колониальную экономику"
 RAJ_Reform_the_Colonial_Economy_desc: "Ранее экономическое планирование в [RAJ.GetNameDef] игнорировало потребности индийского населения ради максимизации извлечения ресурсов и прибыли. Если мы хотим сохранять власть над Индией в это трудное время, это должно измениться."
 RAJ_Initiate_Land_Reform: "Иницировать земельную реформу"
 RAJ_Initiate_Land_Reform_desc: "Текущая собственность и распределение земель в Индии глубоко дефективны и несоразмерно благоприятствуют богатым и влиятельным. Иницируя меры по земельной реформе, мы можем стремиться к более справедливому распределению земли и обеспечить защиту прав мелких фермеров и маргинализированных сообществ. Это не только поможет этим группам, но и будет способствовать стимулированию экономического роста и развития всей страны."
 RAJ_Centralise_the_Courts: "Централизовать Судебную систему"
 RAJ_Centralise_the_Courts_desc: "Судебная система Индии является, главным образом из-за предколониальных королевств, но также и из-за британского вмешательства, ненужно сложной сетью юрисдикций. Это делает ведение бизнеса значительно сложнее, чем необходимо."
 RAJ_Open_our_Markets: "Открыть наши рынки"
 RAJ_Open_our_Markets_desc: "Иностранные инвестиции в Индию со сторонних источников, кроме Британии, были скудны из-за закрытости субконтинента. Новое правительство должно поэтому объявить миру, что Индия с открытыми объятиями принимает торговлю и инвестиции."
 RAJ_Rural_Education: "За городное образование"
 RAJ_Rural_Education_desc: "Расширение сельских школ greatly помогло бы сельскому населению найти лучшие возможности трудоустройства и внести вклад в развитие своих сообществ. Кроме того, более грамотное население приведет к увеличению экономического роста и улучшению бюрократии в сельских районах. Наконец, расширенный доступ к образованию может также помочь сократить бедность и неравенство, чтобы построить лучшую Индию."
 RAJ_Cross_Country_Railways: "Переходовые поперечные железные дороги"
 RAJ_Cross_Country_Railways_desc: "Связать огромные и разнообразие регионы Индии через сеть поперечных железных дорог значительно улучшит транспорт и связь между нашими городами и деревнями. Это позволит потоку товаров и людей быть более эффективным, что приведет к экономическому росту и развитию. Кроме того, строительство и обслуживание этих железных дорог создаст рабочие места и усилит экономику. Инвестиции в поперечные железные дороги являются важным шагом к модернизации и единению нашего государства."
 RAJ_Electrify_the_Network: "Электроифицировать сеть"
 RAJ_Electrify_the_Network_desc: "Как базой нашего транспортномая систем, железнодорожная система жизненно важна для экономического развития нашей страны. Электроифицируя железнодорожную сеть, мы можем увеличить эффективность и скорость наших поездов, снизить зависимость от иностранных ископаемых видов топлива и тем самым greatly укрепить нашу внутреннюю экономику."
 RAJ_Cooperation_with_the_Princes: "Сотрудничество с Правителями"
 RAJ_Cooperation_with_the_Princes_desc: "Для эффективного управления Индией необходимо установить прочные отношения с местными царственниками и их территориями. Работая вместе, мы можем обеспечить стабильность и процветание для всех регионов страны. Это может включать обмен ресурсами, координацию политики и сотрудничество в проектах на благо народа Индии."
 RAJ_Expand_Tata_Steel: "Расширить производственные мощности стали Tata"
 RAJ_Expand_Tata_Steel_desc: "Стальную компанию Tata являлась краеугольным камнем индустриализации Индии на протяжении последних тридцати лет. Чтобы держатьась в ритме быстрой смены в мировой экономике, необходимо продолжать инвестировать в расширение и модернизацию Tata Steel. Это не только закрепит наше положение как ведущего производителя стали, но и создаст новые рабочие места и стимулирует экономический рост во всей стране."
 RAJ_Rewrite_Business_Law: "Диверсифицировать частные инвестиции"
 RAJ_Rewrite_Business_Law_desc: "По мере нашего перехода в новую эпоху независимости, жизненно важно, что мы диверсифицируем наши частые инвестиции для обеспечения стабильности и роста нашего государства. Рассредоточивая наши инвестиции по различным секторам и отраслям, мы можем защитить себя от потенциальных рисков и неудач, которые могут возникнуть в любой определенной области. Эта стратегия позволит нам уверенно двигаться вперед и строить сильное и процветающее будущее для Индии."
 RAJ_Sideline_the_Unions: "Ограничить влияние профсоюзов"
 RAJ_Sideline_the_Unions_desc: "Профсоюзы в Индии часто были источником disruptions препятствий прогрессу. Ограничивая их влияние и находя альтернативные способы решения проблем работников, мы можем сосредоточиться на важных задачах модернизации и укрепления нашего государства. Это также поможет улучшить отношения между руководством и трудом, приводя к более эффективным и продуктивным рабочим силам."
 RAJ_Commercial_Port_Expansion: "Расширение коммерческих портов"
 RAJ_Commercial_Port_Expansion_desc: "По мере того как экономика [RAJ.GetNameDef] продолжает расширяться и индустриализироваться, важно, чтобы мы также расширили и улучшили наши коммерческие порты. Увеличивая пропускную способность и эффективность этих портов, мы можем лучше способствовать торговле с другими странами и удовлетворять растущие потребности наших propres отраслей. Это расширение не только выиграет нашу экономику, но и создаст новые рабочие возможности для людей Индии."
 RAJ_Irrigation_Infrastructure: "Инфраструктура орошения"
 RAJ_Irrigation_Infrastructure_desc: "По мере того как Индия продолжает расти и развиваться, жизненно важно инвестировать в современную инфраструктуру орошения. Строя каналы и reservoirs, мы можем убедиться, что наши культуры имеют надежный источник воды, даже во время засухи. Это не только выберет фермеров и их прожиток, но и будет иметь позитивное влияние на общую экономику нашего государства."
 RAJ_Foundations_for_the_First_Five_Year_Plan: "Фундаменты для Первого пятилетнего плана"
 RAJ_Foundations_for_the_First_Five_Year_Plan_desc: "Новообразованная Комиссия по планированию разработала планы экономического роста, которые greatly ускорят индийскую экономику в долгосрочной перспективе. Неисполнение их может привести к некоторому экономическому снижению."
 RAJ_Seek_Trading_Partners: "Выдать земельные субсидии"
 RAJ_Seek_Trading_Partners_desc: "Мы разделим разрешения на развитие, приобретение земель и земельные субсидии в масштабе, никогда не виданном на этом субконтиненте. Это greatly вызовет развитие индийской экономики."
 RAJ_Invite_Mining_Companies: "Пригласить горнодобывающие компании"
 RAJ_Invite_Mining_Companies_desc: "Природные ресурсы Индии огромны и неисследованы. Приглашая горнодобывающие компании захватить нашу землю, мы не только создадим рабочие места для нашего народа, но и привлечем долгожданного капитала для развития нашего народа. Эти компании принесут с собой технологии и знания, помогая нам извлекать и использовать наши ресурсы до предела их потенциала."
 RAJ_Development_funds_for_the_States: "Фонды развития для Государств"
 RAJ_Development_funds_for_the_States_desc: "Оказание помощи преимущественно небольшим и неразвитым Царственным Государствам в строительстве инфраструктуры и промышленности greatly укрепит индустриальную базу Индии."
 RAJ_Bastions_of_Stablity: "Оплоты Стабильности"
 RAJ_Bastions_of_Stablity_desc: "Время политических потрясений и неопределенности важно, чтобы мы опирались на стабильность и порядок, предоставляемый Царственными Государствами. Эти Государства имеют долгую историю правления и доказали себя надежными партнерами в поддержании мира и процветания внутри и за пределами их границ."
 RAJ_Industrial_Expertise: "Промышленное мастерство"
 RAJ_Industrial_Expertise_desc: "В результате комбинации образования, иностранной помощи и внутреннего развития индустриальная рабочая сила Индии достигла уровня экспертизы, невиданного в этом регионе."
 RAJ_Mechanized_Agriculture: "Механизированное сельское хозяйство"
 RAJ_Mechanized_Agriculture_desc: "Мы внедрим механические плуги и другое сельскохозяйственное оборудование на крупнейшие фермы, чтобы greatly увеличить наше сельскохозяйственное производство."
 RAJ_Minimum_Wage_Legislation: "Законодательство о минимальной зарплате"
 RAJ_Minimum_Wage_Legislation_desc: "По мере нашего движения в новую эру для Индии, когда промышленные достижения побуют по нашей нации, жизненно важно защищать права и зарплаты нашей рабоче класса. Введение законодательства о минимальной зарплате обеспечит, что все сотрудники получают справедливую компенсацию за свой труд, и поможет снизить бедность и неравенство в нашем обществе."
 RAJ_Protectionist_Tariffs: "Протекционистские тарифы"
 RAJ_Protectionist_Tariffs_desc: "Введение большего количества тарифов будет явным чистым положительным эффектом для индийского бизнеса, так как позволит им конкурировать равноправно с международным бизнесом и предоставит им более защиты от внешних экономических давлений. Это может также предоставить долгожданную подпорку индийскому бизнесу и помочь создать рабочие места и стимулировать экономический рост."
 RAJ_Integrate_Princely_Economies: "Интеграция Царственных экономик"
 RAJ_Integrate_Princely_Economies_desc: "В прошлом британский Радж позволил различным Царственным государствам поддерживать свою собственную экономику, приводя к лоскутной мозаике различных систем и практик. Теперь настало время объединить эти экономики и интеграцировать их в единое целое. Это позволит более эффективную торговлю и экономический рост, а также большее чувство единства внутри нации."
 RAJ_Solidify_Control_over_the_Banks: "Укрепить контроль над банками"
 RAJ_Solidify_Control_over_the_Banks_desc: "Индийские банки долго контролировались иностранными интересами, не знающими проблем населения, но настало время для нас взять контроль и использовать их для поддержки развития и роста нашего государства. Мы должны убедиться, что банки работают в интересах народа и не служат интересам избранных нескольких."
 RAJ_Broad_Union_Support: "Массовая национализация"
 RAJ_Broad_Union_Support_desc: "Как новообласованное независимое государство, важно, чтобы мы взяли контроль над собственными ресурсами и индустриями. Массовая национализация ключевых секторов, таких как энергетика, транспорт и производство, позволит нам лучше формировать собственное будущее и убедиться, что прибыль, полученная от этих отраслей, реинвестируется обратно в нашу страну."
 RAJ_Ease_Agricultural_Regulations: "Упростить сельскохозяйственное регулирование"
 RAJ_Ease_Agricultural_Regulations_desc: "Сельскохозяйственное регулирование долго было бременем для фермеров и затормаживало их способность производить и продавать свою продукцию. Упростив это регулирование, мы можем позволить фермерам иметь большую свободу в их операциях и позволить им процветать, приводя к более сильной сельскохозяйственной промышленности в Индии."
 RAJ_Rural_Development: "Развитие сельской местности"
 RAJ_Rural_Development_desc: "Для того чтобы внести нужды изменений в сельской Индии, мы должны сосредоточиться на улучшении инфраструктуры, доступа к образованию и здравоохранению, и продвигать экономическое развитие. Инвестируя в эти области, мы можем поднять сообщества из бедности и greatly укрепить нашу экономику."
 RAJ_Excavation_Investments: "Инвестиции в раскопки"
 RAJ_Excavation_Investments_desc: "Инвестируя в проекты раскопок по всей Индии, мы можем внести новые возможности экономического роста и развития в страну. Эти инвестиции могут помочь открыть ценные ресурсы и создать новые рабочие места в горнодобывающем и строительных секторах."
 RAJ_Large_Scale_Privitizations: "Массовая приватизация"
 RAJ_Large_Scale_Privitizations_desc: "Для стимуляции экономического роста и увеличения эффективности, мы планируем внедрение массовой приватизации государственных отраслей. Это позволит для частного инвестиционного подряда и управления, принося новям идеи и инновации в эти отрасли. Успех этой политики greatly выиграет индийского народа, так как приведет к созданию рабочих мест и увеличенной конкурентоспособности на мировом рынке."
 RAJ_Electrification_of_India: "Электроификация Индии"
 RAJ_Electrification_of_India_desc: "В попытке модернизировать и улучшить качество жизни для граждан по всей стране, мы внедряем план, чтобы принести огромные объемы электроэнергии в наши промышленные центры. Это включает строительство новых электростанций, расширение линий передачи и обеспечение стабильного доступа к нашему промышленному сектору."
 RAJ_Manufacturing_Plants: "Производственные заводы"
 RAJ_Manufacturing_Plants_desc: "Для стимулирования экономического роста и создания рабочих мест, нам необходимо сосредоточиться на создании и расширении производственных заводов по всей Индии. Эти объекты будут производить широкий спектр продукции, от товаров народного потребления до промышленного оборудования, помогая диверсифицировать нашу экономику и предоставлять возможности для людей по всей стране."
 RAJ_Arms_Foundries: "Оружейные заводы"
 RAJ_Arms_Foundries_desc: "Для удовлетворения растущего спроса на оружие и вооружения для нашей растущей армии, нам необходимо создать оружейные заводы по всей стране. Эти заводы не только предоставят долгожданное оборудование для наших солдат, но и увеличат спрос на наши отрасли стали, угля и серы."
 RAJ_Import_Industrial_Machinery: "Импорт промышленного оборудования"
 RAJ_Import_Industrial_Machinery_desc: "Для того чтобы успеть за нашими радикальными экономическими целями, необходимо для Индии импортировать новейшее и наиболее эффективное промышленное оборудование от индустриальных держав мира. Вводя иностранное оборудование, мы можем увеличить продуктивность и конкурентоспособность в различных отраслях, в конечном итоге приводя к экономическому росту и процветанию нации."
 RAJ_Solidify_Business_Ties: "Укрепить деловые связи"
 RAJ_Solidify_Business_Ties_desc: "Оптимизм инвесторов начинает угасать по мере того, как реалии инвестирования в неразвитую экономику догоняют их. Но серия встреч, чтобы услышать их заботы, должна заставить их замолчать."
 RAJ_International_Division_of_Labour: "Международное разделение труда"
 RAJ_International_Division_of_Labour_desc: "Международное разделение труда относится к тому, как разные страны специализируются в производстве определенных товаров или услуг, на основе их уникальных преимуществ и ресурсов. Это позволяет более эффективное и低成本 производство, так как страны могут сосредоточиться на своих областях экспертизы и торговать с другими странами за товары и услуги, которых им нужны. Принимая международное разделение труда, Индия может использовать свои силы и ресурсы для стимулирования своего экономического роста и процветания."
 RAJ_Soviet_Economic_Assistance: "Советская экономическая помощь"
 RAJ_Soviet_Economic_Assistance_desc: "В попытке стимулировать экономику и принести процветание в Индия, мы будем искать помощь от Советского Союза в форме экономической помощи и проектов развития. Это не только предоставит долгожданные ресурсы и подпорку, но и укрепит наши политические и экономические связи с Советским Союзом."
 RAJ_Further_British_Investments: "Дополнительные Британские инвестиции"
 RAJ_Further_British_Investments_desc: "По мере того как [RAJ.GetNameDef] продолжает развиваться и модернизироваться, важно поддерживать прочные отношения с нашим колониальным владыкой, Британией. Инвестиции от Домашних Островов не только укрепят наши экономические связи, но и принесут новые технологии и знания в наши отрасли. Это выиграет как индийский субконтинент, так и Британию, по мере того как мы работаем вместе, чтобы создать более светлое будущее для Империи."
 RAJ_Machinery_for_Textiles: "Оборудование для текстильной промышленности"
 RAJ_Machinery_for_Textiles_desc: "Текстильная индустрия Индии всегда была огромной, но с введением ткацких машин и подобных механизмов ее производительность взорвалась и рынку нужны, чтобы выполнить поставки. Мы найдем эти рынки в социалистических экономиках мира, многие из которых имеют развитые промышленные центры, из которых мы импортируем оборудование, необходимое для питания нашего промышленного развития."
 RAJ_Raw_Material_Imports: "Импорт сырья"
 RAJ_Raw_Material_Imports_desc: "Индия — огромный субконтинент, богатый ресурсами, но много из них трудно извлечь, и их разнообразие также недостаточно. Мы смотрим на наших братских братьев для импорта этих сырьевых товаров, отсутствующих в нашей цепочке производства."
 RAJ_Exchange_of_Luxury_Goods: "Обмен предметов роскоши"
 RAJ_Exchange_of_Luxury_Goods_desc: "Пока Индия имеет переполные запасы сахара и кофе, восточно-европейские экономики переизбытка скота и льна. Содействие торговли нематериальными товарами greatly увеличит стандарты жизни для обеих наций."
 RAJ_Resources_for_the_Home_Isles: "Ресурсы для Домашних Островов"
 RAJ_Resources_for_the_Home_Isles_desc: "Угрозы безопасности Британии возрастают, и это работа Империи предоставить ресурсы, необходимые для британского производства."
 RAJ_Agricultural_Subsidies: "Сельскохозяйственные субсидии"
 RAJ_Agricultural_Subsidies_desc: "Сельскохозяйственный сектор Индии является основой нашей экономики, обеспечивая заработок и продовольствие для миллионов наших граждан. Однако это отрасль, которая сильно зависит от погодных условий и колебаний рынка. Внедрение сельскохозяйственных субсидий позволит нам предоставить необходимую поддержку нашим фермерам и обеспечить дальнейший рост и успех этого vital сектора."
 RAJ_Continued_Expansion_of_the_Ordnance_Foundries: "Продолжающееся расширение оружейных заводов"
 RAJ_Continued_Expansion_of_the_Ordnance_Foundries_desc: "Оружейные заводы в Индии являются критически важными для производства оружия и боеприпасов для наших вооруженных сил. Continuing to expand and modernize these foundries позволит обеспечить наших солдат наилучшим возможным оборудованием для защиты нашей страны."
 RAJ_Contributions_to_the_War_Effort: "Вклад в военные усилия"
 RAJ_Contributions_to_the_War_Effort_desc: "Пока шла Великая война, поддержка княжеских штатов сильно помогала в борьбе с Германской империей. С новой крупной войной на горизонте мы, безусловно, снова можем рассчитывать на их поддержку."
 RAJ_Connect_the_Remote_Provinces: "Развитие отдаленных провинций"
 RAJ_Connect_the_Remote_Provinces_desc: "Рural and изолированные народы Индии часто игнорируются в пользу населенных пунктов субконтинента. Развитие этих Neglected частей Британской Индии, где сельское хозяйство дает лишь небольшой избыток, поможет обеспечить национальный продовольственный фонд."
 RAJ_Expand_the_Diplomatic_Corps: "Расширение дипломатических органов"
 RAJ_Expand_the_Diplomatic_Corps_desc: "Индия имеет амбициозную внешнюю политическую повестку дня, и расширение ее дипломатического корпуса поможет достичь ее целей. Новая дипломатическая миссия позволит Индии лучше взаимодействовать с важными партнерами и активнее действовать в глобальных делах, что greatly поможет нам найти пакт безопасности, гарантирующий безопасность Индии."

