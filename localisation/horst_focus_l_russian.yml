 JAP_USA_shinjuwan_pacific_naval_base_desc: "Синдзювана, некогда символ американского военно-морского могущества, теперь демонстрирует морское господство Японии. Перекликаясь с прошлыми противостояниями, эта база обеспечивает наше превосходство в Тихом океане. Наше присутствие здесь заявляет о господстве Японии в этих водах."
 
 ##### CHI WAR BRANCH
 JAP_CHI_build_upon_the_tanggu_truce: "Развитие перемирия в Тангу"
 JAP_CHI_build_upon_the_tanggu_truce_desc: "Тангуское перемирие было прекращением огня, подписанным между Китайской Республикой и Японской империей в районе Тангу, Тяньцзинь, 31 мая 1933 года. Оно формально положило конец японскому вторжению в Маньчжурию, которое началось двумя годами ранее. В глазах китайцев это рассматривается как унизительное поражение. Они правы, и мы проследим, чтобы они об этом помнили."
 JAP_CHI_expand_the_western_roads: "Расширить западные дороги"
 JAP_CHI_expand_the_western_roads_desc: ""
 JAP_CHI_prepare_the_southern_invasion_plan: "Подготовить план южного вторжения"
 JAP_CHI_prepare_the_southern_invasion_plan_desc: "Наше вторжение в Китай должно быть спланировано идеально. Наша армия, авиация и флот скоординируют атаки в одном огромном ударе, который сокрушит китайскую оборону в течение нескольких месяцев. Всем этим будет руководить Гундзи Сангиин, Верховный военный совет."
 JAP_CHI_expand_mengkukuoan_cavalry_army: "Расширить кавалерийскую армию Мэнцзяна"
 JAP_CHI_expand_mengkukuoan_cavalry_army_EXPL: "Получить §H4§! кавалерийских дивизии.\n"
 JAP_CHI_expand_mengkukuoan_cavalry_army_desc: "Наш марионеточный режим, созданный в Чахар и Внешней Монголии, мало чем может быть нам полезен, если он не может защитить себя. К счастью, местные жители имеют давние традиции ведения войны верхом, которые мы используем наилучшим образом. В конце концов, грузовики не могут незаметно пробраться в горы на юге."
 JAP_CHI_execute_the_grand_invasion_of_china_plan: "Выполнить план великого вторжения в Китай"
 JAP_CHI_execute_the_grand_invasion_of_china_plan_desc: ""
 
 JAP_CHI_marco_polo_bridge_incident: "Инцидент на мосту Марко Поло"
 JAP_CHI_marco_polo_bridge_incident_EXPL1: "   Наши войска в §HВосточном Хэбэе§! начнут §Hпограничный конфликт§! с [CHI.GetFlag]§H[CHI.GetName]§!. Столкновение будет §Rэскалироваться§!.\n   Наш контроль над §Hпограничным конфликтом§! будет §Rограничен§! в зависимости от уровня национального духа §H«Неконтролируемые милитаристы»§!.\n"
 JAP_CHI_marco_polo_bridge_incident_EXPL2: "[PRC.GetFlag]§H[PRC.GetName]§! сможет частично вмешаться в §Hпограничный конфликт§! и §Rуменьшить§! наши шансы избежать дальнейшей §Rэскалации§! конфликта.\n"
 JAP_CHI_marco_polo_bridge_incident_desc: ""
 JAP_CHI_reorganize_military_advance_in_china: "Реорганизовать военное наступление в Китае"
 JAP_CHI_reorganize_military_advance_in_china_desc: ""
 JAP_CHI_find_a_common_way_out: "Найти общий выход из положения"
 JAP_CHI_find_a_common_way_out_EXPL: "   Выдвинуть [CHI.GetFlag]§H[CHI.GetName]§! либо малые, средние или крупные §Hтребования§! для прекращения Японо-китайской войны.\n\nЭто §Cреактивный фокус§!. Если уровень §Hкапитуляции§! [CHI.GetFlag]§H[CHI.GetName]§! выше, масштаб §Hтребований§! будет §Gбольше§!.\n"
 JAP_CHI_find_a_common_way_out_desc: ""
 JAP_CHI_establish_reorganized_government_of_china: "Создать реорганизованное правительство Китая"
 JAP_CHI_establish_reorganized_government_of_china_EXPL1: "Режим под руководством §HВан Цзинвэя§! начнёт §Hгражданскую войну§! в [CHI.GetFlag]§H[CHI.GetName]§! со столицей в §HНанкине§!. Все контролируемые нами регионы в §HКитае§! будут переданы им.\n"
 JAP_CHI_establish_reorganized_government_of_china_EXPL2: "   Взять под прямой контроль §H[608.GetName]§!, §H[614.GetName]§!, §H[597.GetName]§!, §H[743.GetName]§! и §H[598.GetName]§!.\n   Предоставить §Hснаряжение§! для армии §HВан Цзинвэя§!.\n"
 JAP_CHI_establish_reorganized_government_of_china_desc: ""
 JAP_CHI_ichi_go_sakusen: "Ити-Го Сакусэн"
 JAP_CHI_ichi_go_sakusen_EXPL: "   Для успешного §Gзавершения§! этой задачи вы должны либо §Hпринудить к капитуляции§! [CHI.GetFlag]§H[CHI.GetName]§!, либо контролировать все их прибрежные регионы и все регионы [GXC.GetFlag]§H[GXC.GetName]§!.\n"
 JAP_CHI_ichi_go_sakusen_desc: "Операция «Ити-Го» («Операция номер один») — крупнейшая японская операция в военной истории. Двумя основными целями «Ити-Го» являются открытие сухопутного маршрута во Французский Индокитай и захват авиабаз в юго-восточном Китае, с которых американские бомбардировщики атаковали японскую метрополию и судоходство."
 JAP_CHI_retool_chinese_industry: "Модернизировать китайскую промышленность"
 JAP_CHI_retool_chinese_industry_EXPL: "Удалить §H1 гражданский завод§! в каждом прибрежном регионе Китая, где он есть.\nДобавить §G1§! строительный слот, §H1 военный завод§! и §H1 верфь§! в каждом затронутом регионе."
 JAP_CHI_retool_chinese_industry_desc: ""
 JAP_CHI_exploit_chinese_wealth: "Эксплуатация китайского богатства"
 JAP_CHI_exploit_chinese_wealth_desc: ""
 
 ##### HOKUSHIN-RON DOCTRINE BRANCH
 JAP_hokushin_ron_doctrine: "Хокусин-рон\nДоктрина"
 JAP_hokushin_ron_doctrine_EXPL1: "\n§HДоктрина Хокусин-рон§! §Cпродвигается§! фракцией §HKōdōha§!. Присоединение к фракции §HTōseiha§! и следование этой доктрине также вызовет следующие §Rэффекты§!:\n"
 JAP_hokushin_ron_doctrine_EXPL2: "\nВы присоединились к фракции §HTōseiha§!, которая продвигает доктрину §HNanshin-ron§!. Поэтому выбор этого до завершения Nanshin-ron будет иметь следующие §Rэффекты§!:\n"
 JAP_hokushin_ron_doctrine_desc: "«Доктрина северного расширения» — это военно-политическая доктрина, которая утверждает, что Маньчжурия и Сибирь являются сферой интересов Японии, и что потенциальная ценность для Японии экономического и территориального расширения в этих районах была выше, чем где-либо еще."
 
 ##### CHI ALLY BRANCH
 JAP_CHI_ishiwaras_east_asian_league_dream: "Мечта Исивары о Восточноазиатской лиге"
 JAP_CHI_ishiwaras_east_asian_league_dream_desc: ""
 JAP_CHI_concessions_to_china: "Уступки Китаю"
 JAP_CHI_concessions_to_china_desc: "Мэнцзянское соглашение, которое окончательно сформировало наше государство-сателлит во Внешней Монголии, снова ухудшило наши отношения с националистическим Китаем, которые неожиданно улучшались с 1935 года. Хотя эта операция была полной победой наших сил, мы должны от наших успехов отказаться и вернуть Внешнюю Монголию националистам. Это, надеюсь, снова обеспечит их расположение."
 JAP_CHI_get_rid_of_chiang_kai_shek: "Избавиться от Чан Кайши"
 JAP_CHI_get_rid_of_chiang_kai_shek_EXPL: "Если их §RСтабильность§! ниже §R50%§!, этот фокус также будет иметь следующие §Rэффекты§!:\n"
 JAP_CHI_get_rid_of_chiang_kai_shek_desc: "Правление Чан Кайши можно почти считать полной диктатурой, хотя ему уже давно противостоит более гибкий Ван Цзинвэй. Если мы сможем убедить китайцев устроить Чану небольшой несчастный случай, Ван мог бы занять его место в качестве президента Китая. Это, безусловно, облегчит наше будущее сотрудничество."
 JAP_CHI_non_aggression_pact_with_china: "Пакт о ненападении с Китаем"
 JAP_CHI_non_aggression_pact_with_china_desc: ""
 JAP_CHI_pact_of_silk: "Шелковый пакт"
 JAP_CHI_pact_of_silk_EXPL1: "Получите §H24§! дивизий ополчения.\n"
 JAP_CHI_pact_of_silk_desc: ""
 JAP_CHI_expand_zaibatsus_influence_in_china: "Расширить влияние дзайбацу в Китае"
 JAP_CHI_expand_zaibatsus_influence_in_china_desc: ""
 JAP_CHI_sino_japanese_military_mission: "Китайско-японская военная миссия"
 JAP_CHI_sino_japanese_military_mission_desc: ""
 JAP_CHI_kick_up_chinese_shipbuilding_industry: "Поднять китайскую судостроительную промышленность"
 JAP_CHI_kick_up_chinese_shipbuilding_industry_desc: "Теперь, когда у нас общая кровь с китайцами, мы должны гарантировать, что их флот будет хотя бы способен защищать свои берега. И наш военно-морской опыт, несомненно, пригодится."
