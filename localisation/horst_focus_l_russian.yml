 post_election_struggle: "Борьба за независимость"
 post_election_struggle_desc: "Если мы хотим добиться §YНезависимости§! без кровопролития, нам нужно оказать давление на §Yбританцев§!. Мы также должны иметь больше влияния, чем соперничающая с нами §YВсеиндийская мусульманская лига§!, стремящаяся отделить Пакистан от наших территорий.\n\n\t[RAJ.GetFlag]Текущее влияние §Y[Root.GetReigningGovernmentColor]§!: [?Root.ind_influence]\n\t[PAK.GetFlag]Текущее влияние §YВсеиндийской мусульманской лиги§!: [?Root.pak_influence]\n\nСейчас мы ежедневно получаем §Y[?Root.ind_influence_daily] влияния§!, а AIML получает §Y[?Root.pak_influence_daily] влияния§!.\n\nЧтобы добиться §YНезависимости§!, нам нужно набрать 100 влияния, но если у §YAIML§! будет больше 50% нашего §Yвлияния§!, британцы выделят Пакистан в отдельное государство. Если у §YAIML§! будет больше 66% нашего влияния, они также получат Кашмир."
