 RAJ_agrarian_economy_desc: "Индия, некогда производственное сердце мира, пострадала от британской политики. Которая включала быструю деиндустриализацию, расширенную добычу ресурсов и эксплуататорское налогообложение. Исправление этих экономических проблем станет задачей, масштабы которой выходят далеко за пределы нашего ближайшего будущего. Поэтапные шаги к продовольственной безопасности должны стать приоритетом для любого правительства, пытающегося управлять Индией."

