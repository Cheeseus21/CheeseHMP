 efr_industrial_effort: "Развитие промышленности"
 efr_industrial_effort_desc: "Все политические усилия следует сосредоточить на том, чтобы обеспечить развитие промышленности мирного назначения."
 efr_industrial_effort_2: "Развитие промышленности II"
 efr_industrial_effort_2_desc: "Стальная воля и всенародный трудовой подъем помогут нам собрать силы для нового промышленного прорыва."
 efr_construction_effort: "Развитие строительства"
 efr_construction_effort_tt: "Недостаточно стройплощадок для §Yфабрик§!"
 efr_construction_effort_desc: "Не следует недооценивать гражданскую промышленность, даже когда надвигается мировая война."
 efr_construction_effort_2: "Развитие строительства II"
 efr_construction_effort_2_desc: "Мы должны усовершенствовать фабрики, чтобы ускорить производство товаров для торговли и обеспечить дальнейшее строительство."
 efr_construction_effort_3: "Развитие строительства III"
 efr_construction_effort_3_desc: "Расширение нашей инфраструктуры открыло для нас новые возможности в строительной сфере."
 efr_production_effort: "Развитие вооружений"
 efr_production_effort_tt: "Недостаточно стройплощадок для §Yвоенных заводов§!"
 efr_production_effort_desc: "Кто умеет делать трактора, сумеет делать и танки! Мы не можем допустить отставания военной промышленности."
 efr_production_effort_2: "Развитие вооружений II"
 efr_production_effort_2_desc: "Не стоит пытаться переориентировать фабрики на выпуск военной продукции. Мы должны сосредоточиться на развитии военной промышленности как таковой."
 efr_production_effort_3: "Развитие вооружений III"
 efr_production_effort_3_desc: "Необходимо и дальше совершенствовать военные заводы для производства самой современной военной техники."
 efr_infrastructure_effort: "Развитие инфраструктуры"
 efr_infrastructure_effort_desc: "Страна без соответствующей инфраструктуры не может заниматься продвинутыми исследованиями и строительством."
 efr_infrastructure_effort_tt: "Недостаточно стройплощадок для §Yинфраструктуры§!"
 efr_infrastructure_effort_2: "Развитие инфраструктуры II"
 efr_infrastructure_effort_2_desc: "Необходимо расширять инфраструктуру, развивая транспорт и средства связи для работы над высокотехнологичными секретными проектами."
 efr_political_effort: "Развитие политики"
 efr_political_effort_desc: "Чтобы изменить мир вокруг нас, мы должны сперва изменить собственную страну. И для начала — укрепить свои политические позиции."
 order227_set: "Приказ № 227 выполнен автоматически"
 SOV_southern_thrust_tt: "Мы скоординируем стремительное вторжение в Персию совместно с дивизиями Содружества. Это разделит Персию на советскую и английскую сферы влияния. \n \n"

 the_plan_tt: "§RПРИМЕЧАНИЕ: ВАНИЛЬНЫЙ ФОКУС ПРИМЕНИМ ТОЛЬКО К КАНАДСКИМ САМОЛЁТАМ, НЕ К АМЕРИКАНСКИМ/БРИТАНСКИМ§!"
 
 efr_army_effort: "Развитие армии"
 efr_army_effort_desc: "Несмотря на все новые возможности ведения боевых действий на море и в воздухе, сухопутные войска остаются ключевым элементом войны. При должной подготовке мы сумеем избежать прежнего ада в траншеях."
 efr_equipment_effort: "Развитие снаряжения"
 efr_equipment_effort_desc: "Есть предел тому, какой вес может нести на себе пехотинец. Мы сосредоточим все усилия на том, чтобы обеспечить войска самым лучшим снаряжением."
 efr_motorization_effort: "Развитие транспорта"
 efr_motorization_effort_desc: "Основные характеристики транспортных средств пехоты — маневренность и защищенность. Сосредоточившись на развитии этого направления, мы сможем быстрее бросать войска в бой."
 efr_doctrine_effort: "Развитие доктрины"
 efr_doctrine_effort_desc: "Военные доктрины Великой войны, определявшие методы ведения наземного боя, безнадежно устарели. Наши лучшие умы должны разработать новую тактику и стратегию."
 efr_equipment_effort_2: "Развитие снаряжения II"
 efr_equipment_effort_2_desc: "Мы будем и дальше прилагать все усилия к тому, чтобы наша пехота и войска поддержки были обеспечены наилучшим образом."
 efr_mechanization_effort: "Развитие механизации"
 efr_mechanization_effort_desc: "Всесторонне развивая моторизированную пехоту, мы научимся создавать самые совершенные транспортные средства."
 efr_doctrine_effort_2: "Развитие доктрины II"
 efr_doctrine_effort_2_desc: "Представление о ведении боевых действий изменилось не только за период между мировыми войнами, но и в ходе недавних конфликтов. Мы должны постоянно совершенствовать свою доктрину с учетом нового опыта."
 efr_equipment_effort_3: "Развитие снаряжения III"
 efr_equipment_effort_3_desc: "Хватит копировать чужие образцы и закупать снаряжение за рубежом! Мы должны стать ведущим мировым производителем пехотного оружия."
 efr_armor_effort: "Развитие бронетехники"
 efr_armor_effort_desc: "Применив знания, полученные в ходе моторизации нашей пехоты, мы также можем усовершенствовать бронетехнику."
 efr_special_forces: "Войска специального назначения"
 efr_special_forces_desc: "Нам необходимы элитные войска; приоритетной задачей должно стать создание горно-стрелковых и воздушно-десантных подразделений."
 efr_aviation_effort: "Развитие авиации"
 efr_aviation_effort_tt: "Недостаточно стройплощадок для §Yавиабаз§!"
 
 SOV_cold_snap: "Зима 1941-1942 годов"
 SOV_cold_snap_idea: "Генерал Мороз"
 SOV_cold_snap_desc: "Зима 1941-1942 годов тяжело сказалась как на советской, так и на германской армиях, которые не были должным образом к ней подготовлены, хотя последняя пострадала гораздо сильнее."
 SOV_winter_equipment_1: "Зимнее снаряжение"
 SOV_wartime_industry: "Промышленность военного времени"
 SOV_wartime_industry_idea: "Промышленность военного времени"
 SOV_partisans: "Сталинские партизаны"
 SOV_partisans_desc: "Между потоками немецкой пехоты и танков находятся истинные советские патриоты, рассеянные в тылу врага. Эти партизаны наносят удары с тыла, сея хаос в фашистской военной машине."
 SOV_partisans_idea: "Советские партизанские восстания"
 SOV_partisans_idea_desc: "Железнодорожные пути саботируются, мосты взрываются, а пехота подвергается нападениям большевистских террористов."
 SOV_partisans_idea2: "Охранные дивизии"
 SOV_partisans_idea2_desc: "Наши охранные дивизии специально обучены противоповстанческим операциям, сдерживая партизанскую активность."
 GER_volunteers_tt: "§R\nИстощение от войны увеличится на 0.5%§!"
 GER_sd: "Охранные дивизии"
 GER_sd_desc: "Советская партизанская активность оказалась значительно выше ожидаемой"
