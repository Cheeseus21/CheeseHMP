  ### Tooltips
 SAF_party_split_elections_tt: "§RВнеочередные выборы пройдут через неделю.§!\n"
 SAFR_elections_held: "Выборы состоялись.\n"
 #SAFR_favoured_havenga: "Предпочтительна торговая сделка Хейвенги с Германией.\n"
 #SAFR_favoured_pirow: "Предпочтительна военная сделка Пироу с Германией.\n"
 fra_needs_approval: "§RФранция должна одобрить соглашение перед передачей Мадагаскара. Они будут гораздо более склонны согласиться, если будут контролировать свои североафриканские территории.§!\n"
 SAF_african_commanders_tt: "Получение двух новых командиров.\n"
 SAFR_civil_war_tt: "§RНачинается гражданская война§! между §YСоюзными силами§! в Кейптауне и Юго-Западной Африке и §Yкоммунистическими революционерами§! на остальной территории страны.\n"
 procure_expertise_tt: "§RМы можем обратиться только к одной стране за опытом проектирования и строительства, поэтому следует выбирать тщательно.§!\n"
 SAFR_create_unit_boer_commandos_tt: "Будет получено два отряда элитных §YБурских коммандос§! в Трансваале.\n"
 SAFR_create_unit_greyshirts_tt: "Получение отряда ополчения §Y«Серых рубашек»§! в Капе.\n"
 SAFR_create_unit_stormjaers_tt: "Заручившись поддержкой Оссевабрандвах и «Серых рубашек», мы можем призвать отряды §YСтормьяерс и ополчения «Серых рубашек»§! в Юго-Западной Африке.\n"
 SAFR_making_new_friends: "§RЭто позволит нам влиять на них, чтобы они были открыты для заключения союза с нами.§!\n"
  
  ### Focuses
 SAF_force_parliament_debate: "Принудить к дебатам в парламенте"
 SAF_force_parliament_debate_desc: "Теперь ясно, что мы почти наверняка на пути к еще одной большой войне, мы не можем больше оставаться в стороне. Мы должны решить, стоит ли сейчас встать на сторону Британии, и начать подготовку. Смутс имеет поддержку большинства партии и может провести голосование по этому вопросу."
 SAF_begin_rearmament: "Начать перевооружение"
 SAF_begin_rearmament_desc: "Теперь, когда мы приняли решение, нам необходимо провести политику расширения наших производственных мощностей, чтобы полностью оснастить нашу армию."
 SAF_relax_worker_restrictions: "Ослабление ограничений для рабочих"
 SAF_relax_worker_restrictions_desc: "У нас много трудоспособных мужчин, желающих работать, и если они готовы это делать, им следует позволить, независимо от цвета кожи."
 SAF_split_in_the_party: "Раскол в партии"
 SAF_split_in_the_party_desc: "Слияние Национальной партии Герцога и Южноафриканской партии Смутса для формирования Объединённой партии решительно разделено по вопросу поддержки Британии в возможной войне. Также есть вопрос расовой сегрегации, где Герцог решительно за, а Смутс придерживается более умеренного подхода. Возможно, нам пора прекратить коалицию."
 SAF_focus_europe: "Инженеры в Индию"
 SAF_focus_europe_desc: "Победа в войне в Европе — ключ к завершению этой войны, поэтому мы должны сосредоточить усилия на подготовке нашей армии к предстоящим жестоким боям."
 SAF_focus_asia: "Инженеры в Аутбэк"
 SAF_focus_asia_desc: "Ситуация в Азии становится отчаянной, союзники растянуты слишком тонко, поэтому нам нужно подготовить наши войска к сложным условиям там."
 SAF_an_iron_grip: "Железная хватка"
 SAF_an_iron_grip_desc: "Правительство в безопасности, и будущее страны теперь в наших руках, чтобы сформировать его так, как мы считаем нужным."
 SAF_strategic_reach: "Стратегический охват"
 SAF_strategic_reach_desc: "Южная Африка находится далеко и изолирована от многих частей мира. Если мы хотим полностью реализовать наш потенциал и помогать нашим союзникам, мы должны иметь возможность достигать любой точки земного шара по мере необходимости."
 SAF_support_appeasement: "Продолжать поддержку политики умиротворения"
 SAF_support_appeasement_desc: "У Германии есть поводы для законного недовольства, а доминионам крепко досталось в предыдущей войне. Мы должны использовать все возможности для поддержания мира."
 SAF_civil_investment: "Инвестиции в гражданскую промышленность"
 SAF_civil_investment_desc: "Пока Германия остается умиротворенной, мы можем сосредоточиться на внутренних делах. Мы можем начать с инвестиций в нашу промышленность, чтобы стимулировать экономику."
 SAF_propose_joint_exercises: "Реорганизация окружных сил"
 SAF_propose_joint_exercises_desc: "Наша армия не готова к войне. Недавние сокращения расходов из-за Великой депрессии подорвали нашу боеспособность. Мы должны начать план расширения и обучения, чтобы подготовить людей к следующей большой войне."
 SAF_yield_to_smuts: "Уступить Смутсу"
 SAF_yield_to_smuts_desc: "С началом войны на горизонте дебаты в парламенте о вступлении в войну на стороне Британии выиграл Ян Смутс. Не имея других вариантов, Герцог взял своих сторонников и стремится объединиться с ННП Малана."
 #SAF_rearmament: "Новые оружейные заводы"
 #SAF_rearmament_desc: "Был принят план по началу быстрого строительства новых оружейных заводов."
 SAF_support_the_afrikaner_broederbond_np: "Поддержать Братство африканеров"
 SAF_support_the_afrikaner_broederbond_np_desc: "Братство африканеров призывает активнее учитывать их мнение и ввести более жесткое разделение между расами. Память о действиях британцев во время англо-бурской войны до сих пор жива, и Братство поможет нам построить новую Южную Африку."
 SAF_republic_agenda: "В сторону республики"
 SAF_republic_agenda_desc: "Получение независимости от британцев должно быть нашим приоритетом номер один. Мы примем каждую политику, примем каждый закон, необходимый для осознания этой неизбежности."
 SAF_malans_plan: "Видение Малана"
 SAF_malans_plan_desc: "Первой целью Малана будет независимость и новая Южноафриканская республика. Помимо этого, может быть просто расширение нашего влияния в регионе или, возможно, что-то более смелое."
 SAF_pirow_havenga_mission: "Миссия в Берлин"
 SAF_pirow_havenga_mission_desc: "Отправив Хавенгу в Берлин с дипломатической миссией в Германию, мы сможем заявить о своем присутствии и дать понять немцам, что мы открыты для новых возможностей."
 SAF_ref_republic: "Референдум о республике"
 SAF_ref_republic_desc: "Пришло время Южной Африке проложить свой собственный путь, свободный от Британской империи и её марионеток. Мы проведем референдум о том, стать ли республикой и выйти из Содружества."
 SAF_rearm_udf: "Перевооружение ЮСО"
 SAF_rearm_udf_desc: "ЮСО находятся в плачевном состоянии. Они потребуют нового снаряжения и обучения, чтобы стать эффективной боевой силой для страны."
 SAF_focus_saaf: "Приоритет ВВС"
 SAF_focus_saaf_desc: "Какая польза от войск на земле, если противник может просто бомбить их с неба? Защита нашего неба гораздо важнее нескольких новых винтовок."
 SAF_focus_army: "Приоритет армии"
 SAF_focus_army_desc: "Какая польза от нескольких самолетов, если у нас нет людей, чтобы защищать землю? Лучшее оружие и снаряжение для наших пехотинцев — это приоритет."
 SAF_prepare_for_third_boer_war: "Подготовка к третьей англо-бурской войне"
 SAF_prepare_for_third_boer_war_desc: "На этот раз мы будем готовы."
 SAF_pirows_new_order: "Новый порядок Пироу"
 SAF_pirows_new_order_desc: "Пироу выступает за радикальное однопартийное государство по образцу нацистской партии Германии. Что он сделает, если сможет достичь своей цели, остается только догадываться."
 SAF_promte_urbanisation: "Поощрение урбанизации"
 SAF_promte_urbanisation_desc: "Привлекая рабочих в город, мы можем использовать их для расширения существующих промышленных зон и предоставления людям больше работы."
 SAF_recruitment_drive: "Кампания по набору в сельской местности"
 SAF_recruitment_drive_desc: "У нас много безработных мужчин в сельской местности, которые могут ухватиться за возможность служить. Мы создадим местные призывные пункты в этих районах, чтобы лучше до них достучаться."
 SAF_hofmeyrs_reforms: "Реформы Хофмейра"
 SAF_hofmeyrs_reforms_desc: "Хофмейр был одиноким голосом в правительстве, защищающим права всех людей в Южной Африке, независимо от расы. Пришло время позволить ему провести свои реформы и вывести нас на путь к новой Южной Африке."
 SAF_repeal_job_reservation_act: "Отмена Закона о резервировании рабочих мест"
 SAF_repeal_job_reservation_act_desc: "Закон о резервировании рабочих мест был одной из опор, на которых построена эта система расового неравенства. Пришло время избавиться от него и предать его прошлому."
 SAF_wartime_worker_laws: "Законы о рабочих в военное время"
 SAF_wartime_worker_laws_desc: "В военное время мы должны ставить снабжение наших войск превыше любых привилегированных возможностей трудоустройства."
 SAF_equal_worker_pay: "Уравнять оплату труда рабочих"
 SAF_equal_worker_pay_desc: "Если мы ожидаем, что люди выполняют одну и ту же работу, то они должны рассчитывать на такую же оплату, как и их коллеги."
 SAF_economic_boom: "Экономический бум"
 SAF_economic_boom_desc: "Наши реформы привели к огромному росту производительности и позволят нам использовать нашу новую рабочую силу для начала расширения нашей промышленности."
 #SAF_oppenheimers_deal: "План Оппенгеймера"
 #SAF_oppenheimers_deal_desc: "."
 SAF_expand_gold_mining_operations: "Расширение добычи золота и алмазов"
 SAF_expand_gold_mining_operations_desc: "Оппенгеймер хочет увеличить добычу, открыв новые шахты и углубив существующие. Мы можем помочь профинансировать его усилия."
 SAF_vanderbijlpark_expansion_project: "Проект развития Вандербейлпарка"
 SAF_vanderbijlpark_expansion_project_desc: "Вандербейлпарк — индустриальное сердце севера, и здесь ещё есть место для развития района и повышения его потенциала."
 SAF_open_engineering_schools: "Открытие инженерных школ"
 SAF_open_engineering_schools_desc: "У Оппенгеймера есть планы открыть новые инженерные школы и факультеты в университетах. Это, несомненно, принесёт пользу будущим поколениям и будет способствовать развитию инженерных инноваций в стране."
 SAF_battlefield_medical_advancements: "Достижения в военно-полевой медицине"
 SAF_battlefield_medical_advancements_desc: "Врачи немецкой армии сделали ряд улучшений и разработок в военно-полевой медицине. Учитывая ограниченное количество людей, мы должны обеспечить, чтобы наши войска получали наилучшую медицинскую помощь, чтобы вернуть их в строй."
 SAF_remove_segregation_shared: "Снятие ограничений на службу"
 SAF_remove_segregation_shared_desc: "Если человек готов и способен сражаться за свою страну, ему должно быть позволено это делать независимо от цвета кожи, вопреки мнению некоторых. Это также должно побудить безработных мужчин из сельской местности записываться на службу."
 SAF_offer_protection_of_madagascar: "Предложение защиты Мадагаскара"
 SAF_offer_protection_of_madagascar_desc: "Теперь, когда мы успешно вернули контроль над Мадагаскаром, мы можем ходатайствовать о его передаче Южно-Африканскому Союзу, поскольку мы лучше расположены для его защиты."
 SAF_native_representation_act: "Закон о представительстве коренного населения"
 SAF_native_representation_act_desc: "Удалив африканских избирателей из общего списка избирателей Капской провинции, мы сможем укрепить наши позиции в правительстве в будущем."
 SAF_directorate_war_supplies: "Директорат военного снабжения"
 SAF_directorate_war_supplies_desc: "Не только наша собственная армия испытывает нехватку снаряжения, но и силы Содружества нуждаются в боевом оснащении. Мы должны сделать всё возможное, чтобы снабжать страны Содружества оружием и боеприпасами."
 SAF_peace_expansion_scheme: "Мирный план расширения"
 SAF_peace_expansion_scheme_desc: "Пьер ван Рейневельд разработал план расширения наших ВВС за счёт закупок самолётов у британских производителей. Этим стоит заниматься, пока наша собственная авиастроительная промышленность не догонит их."
 SAF_tanks_lend_lease: "«Шерманы» и «Файрфлаи»"
 SAF_tanks_lend_lease_desc: "Американцы и британцы согласились передать нам по ленд-лизу несколько современных танков и истребителей танков для наших бронетанковых дивизий."
 SAF_create_unit_boer_commandos_tt: "Получит два отряда элитных буровских коммандос в Трансваале.\n"
 SAF_military_research_bureau: "Военное исследовательское бюро"
 SAF_military_research_bureau_desc: "Современное оружие и снаряжение — ключ к победе в любой войне, поэтому теперь наши исследовательские усилия будут сосредоточены в этой области. "
 SAF_fight_against_communism: "Угроза коммунизма"
 SAF_fight_against_communism_desc: "Хотя британцы и являются помехой, настоящая угроза — это растущее пятно коммунизма по всему миру. Мы должны сделать всё возможное, чтобы покончить с ним."
 SAF_the_anti_revolution: "Антиреволюция"
 SAF_the_anti_revolution_desc: "Настало время положить конец этой «революции». Ударим сейчас."
 SAF_deal_with_liberia: "Атлантический трамплин"
 SAF_deal_with_liberia_desc: "Либерия — это как стратегически полезная ступенька в Северную Атлантику, так и страна с каучуковыми плантациями, которые мы, несомненно, сможем расширить. Она станет лёгкой добычей."
 SAF_deal_with_oman: "Ворота в Азию"
 SAF_deal_with_oman_desc: "Недавнее исследование обнаружило неиспользованные запасы нефти в регионе Фахуд. Нам нужна нефть для нашей военной машины, и это также открывает новые пути для экспансии к богатствам Азии."
 SAF_riches_of_india: "Богатства Индии"
 SAF_riches_of_india_desc: "В Индии есть все ресурсы, которые нам нужны, особенно те, которых нам не хватает на месте. Давайте возьмём их ресурсные богатства себе."
 SAF_split_portugal: "Захват португальских колоний"
 SAF_split_portugal_desc: "Португальские колонии слабо охраняются и находятся далеко от Португалии. Мы можем быстро захватить их, прежде чем Португалия успеет пошевелиться для их защиты."
 SAF_appeal_to_greyshirts: "Обращение к «Серым рубашкам»"
 SAF_appeal_to_greyshirts_desc: "SANP пытаются сражаться в этой битве в одиночку. Мы должны связаться с ними и скоординировать наши усилия, чтобы принести новую эру в Южную Африку."
 SAF_equip_stormjaers: "Оснащение «Штурмовых отрядов»"
 SAF_equip_stormjaers_desc: "«Штурмовые отряды» привлекают всё больше и больше новобранцев с каждым днём. Если мы сможем вооружить этих новобранцев, у нас будут лояльные солдаты, которых можно будет призвать в нужное время."
 SAF_equip_greyshemde: "Оснащение «Серых рубашек»"
 SAF_equip_greyshemde_desc: "У «Серых рубашек» есть люди, но нет пуль. У нас есть средства, чтобы дать им оружие и организовать их в настоящую боевую силу."
 SAF_reactivate_kommandos: "Реактивация буровских коммандос"
 SAF_reactivate_kommandos_desc: "Система коммандос была неотъемлемой частью обороны нашей страны на протяжении более 200 лет. И хотя они были расформированы после последней англо-бурской войны, они остались в качестве неформальных групп, и сейчас самое подходящее время для их формальной реактивации."
 SAF_armor_mech_bonus: "Принятие теорий Гудериана"
 SAF_armor_mech_bonus_desc: "Хайнц Гудериан — пионер в использовании танков в современной войне, мы были бы глупцами, если бы не учились на его идеях."
 SAF_seawolf_bonus: "Принятие тактики Дёница"
 SAF_seawolf_bonus_desc: "Дёниц имеет уникальные идеи об использовании подводных лодок, применяя их в больших охотничьих стаях — «волчьих стаях». Мы должны перенять эту новую практику."
 SAF_mobile_warfare_exercises: "Учения мобильной войны"
 SAF_mobile_warfare_exercises_desc: "Нам есть чему поучиться у Вермахта. Мы предложим совместные учебные операции, чтобы эффективно координировать наши танки и мобильную пехоту."
 SAF_wolfpack_exercises: "Учения «Волчьи стаи»"
 SAF_wolfpack_exercises_desc: "Пока немецкие подводные лодки находятся в наших портах, мы можем использовать возможность проводить с ними учения и учиться у их командиров и матросов."
 SAF_invite_ig_farben: "Приглашение IG Farben"
 SAF_invite_ig_farben_desc: "IG Farben — мировой лидер в технологиях синтетического топлива. У нас есть уголь, нам нужен лишь опыт его использования. Нам следует обратиться к ним за помощью в создании собственной местной компании по сжижению топлива."
 SAF_empower_trade_unions: "Расширение прав профсоюзов"
 SAF_empower_trade_unions_desc: "Нынешнее правительство в значительной степени полагается на усилия африканских рабочих, платя им за это гроши. Мы можем собрать профсоюзы и организовать забастовки и марши, пока их голоса не будут услышаны."
 #SAF_the_bloodless_revolution: "Бескровная революция"
 #SAF_the_bloodless_revolution_desc: "Мы собрали достаточную поддержку, чтобы заставить правительство уйти в отставку и передать власть народу Африки."
 SAF_expand_industrial_zones: "Расширение промышленных зон"
 SAF_expand_industrial_zones_desc: "Чего нам не хватает в Южной Африке, так это пространства. Часть этой земли необходимо выделить под крупные промышленные зоны."
 SAF_support_indian_independence: "Поддержка независимости Индии"
 SAF_support_indian_independence_desc: "Мы успешно сбросили колониалистское иго, так давайте поможем Индии сделать то же самое."
 #SAF_institute_development_program: "Программа институционального развития"
 #SAF_institute_development_program_desc: "Если мы действительно хотим стать равными среди мировых держав, мы должны начать программу экономического и промышленного развития."
 SAF_economic_technical_exchange: "Экономико-технический обмен"
 SAF_economic_technical_exchange_desc: "Индия и Южная Африка идеально подходят для взаимопомощи в превращении в современные индустриальные державы. Давайте начнём с инвестиций в экономику и инфраструктуру друг друга. Мы также можем помочь им создать свой собственный научно-исследовательский институт."
 #SAF_coordinate_company_expansions: "Координация расширения компаний"
 #SAF_coordinate_company_expansions_desc: "Индия и Южная Африка обладают уникальными навыками в определенных областях благодаря нашим различным компаниям. Если мы сможем помочь открыть местные филиалы этих компаний, то обе стороны выиграют в тех областях, в которых мы испытываем недостаток."
 SAF_workers_for_engineers: "Рабочие для инженеров"
 SAF_workers_for_engineers_desc: "В Индии большой пул рабочих, ищущих возможности, а у нас есть многолетний опыт и знания в горном деле. Нам следует поощрять иммиграцию индийских рабочих в обмен на некоторых из наших самых знающих инженеров."
 SAF_safeguard_our_oceans: "Защита нашего океана"
 SAF_safeguard_our_oceans_desc: "В случае войны мы должны контролировать Индийский океан, чтобы не быть изолированными друг от друга. "
 SAF_research_institute: "Отдел стратегических исследований"
 SAF_research_institute_desc: "Мы отстаём от многих западных стран в технологических достижениях, поэтому мы создадим новый научно-исследовательский институт, чтобы собрать наши самые светлые умы и способствовать технологическим инновациям."
 SAF_research_area_priority: "Директивы ОСИ"
 SAF_research_area_priority_desc: "Без надлежащего руководства кто знает, что создадут наши учёные. Давая им ежегодные директивы, мы можем сосредоточить их исследовательские усилия на наиболее нужных нам областях."
 SAF_the_darkest_hour: "Самый тёмный час"
 SAF_the_darkest_hour_desc: "Многие из наших союзников пали, и, имея прямую сухопутную связь с державами Оси, мы обязательно почувствуем всю силу их военной машины на наших границах. Мы должны быть готовы сражаться до конца и не давать пощады."
 SAF_ask_for_soviet_aid: "Просьба о советской помощи"
 SAF_ask_for_soviet_aid_desc: "Ряд ведущих членов нашей Коммунистической партии учились в Советском Союзе в последние годы, и мы можем использовать их связи и влияние для получения советской помощи в предстоящей революции."
 SAF_secure_peoples_state: "Упрочение народного государства"
 SAF_secure_peoples_state_desc: "Революция совершена, но ещё есть те, кто сопротивляется. Мы сокрушим всю оставшуюся оппозицию и закрепим наше положение в стране."
 SAF_encourage_soviet_investment: "Поощрение советских инвестиций"
 SAF_encourage_soviet_investment_desc: "Давайте предоставим стимулы и возможности для советских инвестиций в нашу экономику."
 SAF_institute_planned_economy: "Введение плановой экономики"
 SAF_institute_planned_economy_desc: "Нет места капиталистической политике свободного рынка в нашей новой утопии африканских рабочих. Правительство будет контролировать промышленное и экономическое развитие страны."
 SAF_seize_means_of_production: "Захватить средства производства"
 SAF_seize_means_of_production_desc: "Слишком много компаний находится в руках богатых капиталистов. Мы избавим их от бремени их богатства и используем его для наших собственных целей."
 SAF_exploit_mineral_wealth: "Эксплуатация минеральных богатств"
 SAF_exploit_mineral_wealth_desc: "Ресурсы нашей страны обширны и в основном не используются, например, новые месторождения вольфрама, которые мы нашли в Намакваленде. Им никому не принесёт пользы просто лежать в земле, так что мы используем их с толком."
 SAF_national_rationing_recycling_program: "Введение программы нормирования и переработки"
 SAF_national_rationing_recycling_program_desc: "Нашим людям не нужно так много предметов роскоши, поэтому мы призовём их сдавать их на переработку, чтобы мы могли использовать их для изготовления оружия."
 SAF_the_revolution: "Начало революции"
 SAF_the_revolution_desc: "Народ с нами, нет лучшего времени, чем сейчас, чтобы начать революцию."
 SAF_peoples_army: "Народная армия"
 SAF_peoples_army_desc: "Нашей стране нужны солдаты, если мы хотим выжить. Давайте призывать наших людей сражаться за нас."
 #SAF_workers_army: "Рабочая армия"
 #SAF_workers_army_desc: "Хотя солдаты важны, мы не должны забывать, что именно оружие выигрывает войны. Наши заводы должны получать все необходимые ресурсы и рабочих."
 SAF_african_utopia: "Африканская утопия"
 SAF_african_utopia_desc: "Рабочие Африки начали рассматривать Южную Африку как идеальное место для обеспечения своего будущего, и поэтому они приезжают со всех континентов, чтобы разделить наше богатство."
 SAF_liberate_spanish: "Освободить испанские колонии"
 SAF_liberate_spanish_desc: "Больше колониалистов, больше угнетения рабочих. Это будет очередная глава в истории освобождения африканского рабочего."
 SAF_liberate_italian: "Освободить итальянские колонии"
 SAF_liberate_italian_desc: "Итальянцы опоздали на колониальную вечеринку. Мы проследим, чтобы они ушли с неё тоже пораньше."
 SAF_an_african_peoples_republic: "Африканская Народная Республика"
 SAF_an_african_peoples_republic_desc: "Африка впервые в истории объединена как континент. Давайте заявим о себе миру и дадим им понять, что мы — новая сила, с которой придётся считаться."
 SAF_asymmetric_warfare: "Асимметричная война"
 SAF_asymmetric_warfare_desc: "Благодаря нашему опыту в Англо-бурских войнах и боях в немецких колониях во время Великой войны мы получили уникальное понимание ведения войны нестандартными методами и на сложной местности. Мы должны сохранить и передать эти знания и опыт нашим новым офицерам и солдатам."
 SAF_sa_engineer_medical_corps: "Инженерный &Медицинский корпус ЮАС"
 SAF_sa_engineer_medical_corps_desc: "Южноафриканский медицинский корпус нуждается в современном оборудовании и подготовке, чтобы наши солдаты оставались на поле боя."
 SAF_improve_infantry: "Модернизировать пехоту"
 SAF_improve_infantry_desc: "Пехотинцы — основа нашей армии. Им нужно лучшее оборудование и ресурсы, чтобы получить преимущество в бою."
 SAF_retool_pretoria_mint: "Переоборудовать Преторийский монетный двор"
 SAF_retool_pretoria_mint_desc: "Преторийский монетный двор, после небольшого переоснащения, можно использовать для производства оружия и снаряжения для армии."
 SAF_pretoria_metal_pressings: "Заключить контракт с Pretoria Metal Pressings"
 SAF_pretoria_metal_pressings_desc: "Завод Pretoria Metal Pressings уже некоторое время производит боеприпасы и взрывчатые вещества. Давайте расширим их возможности, чтобы они могли поставлять нам ещё больше снаряжения."
 SAF_mechanize_army: "Механизировать армию"
 SAF_mechanize_army_desc: "Ведение войны начинает кардинально меняться. Давайте убедимся, что мы успеваем за переменами и обеспечиваем наших солдат современными мобильными боевыми машинами."
 SAF_the_sarc_mki: "SARC Mk I"
 SAF_the_sarc_mki_desc: "Мы объединили весь наш опыт и знания для создания нового бронеавтомобиля для нашей армии. Давайте воспользуемся этим и вложим средства в ещё более совершенные машины."
 SAF_expand_artillery_aircraft_depot: "Расширить артиллерийско-авиационное депо"
 SAF_expand_artillery_aircraft_depot_desc: "Артиллерийско-авиационное депо в Робертс-Хайтс собирает лицензионные Hawker Hartbees для ВВС. Если мы расширим там мощности, они смогут производить для нас больше и лучших самолётов."
 SAF_protect_the_trade_2: "Модернизировать торговый флот"
 SAF_protect_the_trade_2_desc: "Наши переоборудованные торговые суда и китобои отлично справляются с охотой на подводные лодки и тралением мин, но им всегда пригодится новое оборудование."
 SAF_disrupt_the_trade_2: "Модернизировать торпеды"
 SAF_disrupt_the_trade_2_desc: "Противолодочная оборона становится всё более эффективной, поэтому мы должны опережать их усилия и разрабатывать более новые торпеды."
 SAF_expand_repair_facilities: "Расширить ремонтные мощности"
 SAF_expand_repair_facilities_desc: "Доки Кейптауна и Дурбана были жизненно важными портами для ремонта и модернизации судов, следующих вокруг Африки. Поскольку места может не хватать, нам следует вместо этого построить большие плавучие доки."
 SAF_saaf_coastal_command: "Береговое командование ВВС ЮАС"
 SAF_saaf_coastal_command_desc: "Создание выделенного Берегового командования для наблюдения за водами вокруг Южной Африки обеспечит безопасность судоходных путей."
 SAF_flexible_airforce: "Гибкие ВВС"
 SAF_flexible_airforce_desc: "Тактические бомбардировщики могут адекватно выполнять несколько ролей. Нет необходимости в нескольких типах самолётов, если один может выполнять все необходимые задачи."
 SAF_specialised_airforce: "Специализированные ВВС"
 SAF_specialised_airforce_desc: "Наши ВВС должны выполнять все свои задачи максимально эффективно, поэтому нам необходимо предоставить им специализированные типы самолётов."
 SAF_flying_tanks: "Летающие танки"
 SAF_flying_tanks_desc: "Нам нужны новые модели штурмовиков, если они хотят оправдывать своё название."
 SAF_protect_cape_sea_route: "Защитить мысный морской путь"
 SAF_protect_cape_sea_route_desc: "Защита мысного морского пути жизненно важна для военных действий. Дальнейшее расширение гарнизона вдоль побережья позволит нам сохранить контроль над судоходными маршрутами."
 SAF_sa_airforce_college: "Колледж ВВС ЮАС"
 SAF_sa_airforce_college_desc: "Колледж ВВС ЮАС до сих пор был частью Армейского колледжа. Давайте создадим независимое учреждение, чтобы лучше служить нашим пилотам."
 SAF_sa_naval_college: "Военно-морской колледж ЮАС"
 SAF_sa_naval_college_desc: "Военно-морской колледж Южной Африки невелик по масштабу по сравнению с некоторыми нашими союзниками. Нам следует вложить средства в лучшие условия и подготовку для наших новых моряков, чтобы выжать из них максимум."
 SAF_hulamin_aluminium_plant: "Алюминиевый завод Hulamin"
 SAF_hulamin_aluminium_plant_desc: "Наша промышленность нуждается в алюминии, поэтому давайте вложим средства в собственные источники производства. Новый завод в Ричардс-Бэй — идеальное место для этого."
 SAF_sasol_non_aligned: "Основать Sasol"
 SAF_sasol_non_aligned_desc: "Южная Африка не может всегда полагаться на импорт нефти и каучука, мы должны стремиться к самообеспечению. У нас есть большие запасы угля, которые можно использовать для производства синтетического топлива."
 SAF_electronics_bonus: "Инвестировать в электронику"
 SAF_electronics_bonus_desc: "Область электроники быстро развивается. Мы должны успевать за ней."
 SAF_hulamin_aluminium_plant_ii: "Расширить алюминиевые заводы"
 SAF_hulamin_aluminium_plant_ii_desc: "Нам всегда будет нужно больше алюминия, поэтому давайте вложимся в расширение мощностей."
 SAF_iscor_expansion_ii: "Новый завод Iscor"
 SAF_iscor_expansion_ii_desc: "Новый полностью интегрированный сталелитейный завод в Вандербейл-парке позволит нам удовлетворить потребности нашей промышленности."
 SAF_invite_german_settlers: "Пригласить немецких поселенцев"
 SAF_invite_german_settlers_desc: "В Африке достаточно места для предприимчивых людей, желающих сколотить состояние. Мы будем поощрять немецкое переселение в Юго-Западную Африку и другие места."
 SAF_expand_cape_franchise: "Расширить Капское избирательное право"
 SAF_expand_cape_franchise_desc: "Каждый мужчина и женщина, достигшие избирательного возраста, должны иметь право голосовать за своё будущее. Распространив избирательные права на все расы по всей стране, мы сможем начать реальный прогресс на пути к новой Южной Африке."
 SAF_free_elections: "Провести свободные выборы"
 SAF_free_elections_desc: "Пришло время провести первые свободные выборы в стране. Многие ожидают, что будет только один явный победитель."
 SAF_reconciliation: "Политика примирения"
 SAF_reconciliation_desc: "В этой новой Южной Африке мы должны стремиться к инклюзивности и примирению, чтобы мирно двигаться вперёд как нация."
 SAF_namibian_freedom: "Свобода Намибии"
 SAF_namibian_freedom_desc: "Какой пример мы подадим Африке, если продолжим старую колониальную политику. Мы передадим Намибию её народу и направим его к полной независимости."
  
  ### Events
 SAFR.1.t: "Предложение протектората над Мадагаскаром"
 SAFR.1.d: "Южная Африка запросила контроль над Мадагаскаром, по крайней мере, на обозримое будущее, чтобы, как они говорят, защитить интересы союзников в этом регионе. Как нам ответить?"
 SAFR.1.a: "Хорошо, пусть пока забирают."
 SAFR.1.b: "Никогда! Они просто хотят расширить свои границы."
 SAFR.2.t: "Франция соглашается на наше предложение"
 SAFR.2.d: "Французское правительство мудро признало, что мы находимся в лучшем положении для поддержания контроля союзников и интересов в южной части Индийского океана, и согласилось передать нам контроль над Мадагаскаром."
 SAFR.2.a: "Мы позаботимся о нём."
 SAFR.3.t: "Франция отклоняет наше предложение"
 SAFR.3.d: "Демонстрируя поразительное отсутствие дальновидности и здравого смысла, французское правительство отклонило наше предложение взять под контроль Мадагаскар. Они утверждают, что мы заинтересованы лишь в распространении нашего влияния на их \"законную\" территорию."
 SAFR.3.a: "Глупцы"
 #SAFR.4.t: "Южная Африка требует колонии"
 #SAFR.4.d: "Южная Африка потребовала, чтобы мы немедленно передали им контроль над нашими колониями Анголой и Мозамбиком, ссылаясь на рост коммунистического элемента в этих регионах и нашу неспособность должным образом управлять странами."
 #SAFR.4.a: "Мы никогда не отдадим наши африканские владения!"
 #SAFR.4.b: "Хорошо, у нас и так слишком много дел."
 #SAFR.5.t: "Португалия отказывается"
 #SAFR.5.d: "Португальское правительство отказалось выполнить наши требования по Анголе и Мозамбику. Они заявляют, что полностью способны заботиться о своих колониях, и высмеяли нашу попытку оказать на них давление."
 #SAFR.5.a: "Мы получим их так или иначе..."
 #SAFR.5.b: "Передумали, они нам не нужны."
 #SAFR.6.t: "Португалия соглашается"
 #SAFR.6.d: "Португальцы образумились и официально передали нам контроль над Анголой и Мозамбиком."
 #SAFR.6.a: "Наше влияние растет."
 SAFR.7.t: "Южная Африка запрашивает оружие для революции"
 SAFR.7.d: "Южная Африка запросила нашу помощь в связи с потенциальной революцией, назревающей в стране."
 SAFR.7.a: "Хорошо"
 SAFR.7.b: "Нет, они нужны нам"
 SAFR.8.t: "Советский Союз соглашается"
 SAFR.8.d: "Советский Союз согласился отправить нам винтовки для помощи в свержении правительства. Они должны прибыть вскоре после начала революции."
 SAFR.8.a: "Превосходно."
 SAFR.9.t: "Советский Союз отказывает"
 SAFR.9.d: "Советский Союз отказался выделить нам какую-либо помощь, заявив, что нам придётся обходиться тем, что у нас есть."
 SAFR.9.a: "Предатели дела!"
 SAFR.10.t: "Советское оружие прибыло"
 SAFR.10.d: "Советский Союз сдержал слово и успешно доставил оружие для вооружения нашего революционного ополчения. Люди, которые помогли нам получить оружие, также решили остаться и помочь нашему делу борьбы с колониализмом и капитализмом."
 SAFR.10.a: "Они нам очень даже пригодятся."
 SAFR.15.t: "Гражданская война"
 SAFR.15.d: "Пришло время начать революцию и вышвырнуть британцев из Индии раз и навсегда."
 SAFR.15.a: "Да!"
 SAFR.16.t: "Доступна новая директива SRD"
 SAFR.16.d: "Наши учёные докладывают, что завершили предыдущее задание и ожидают новых указаний на год."
 SAFR.16.a: "Принято."
 SAFR.17.t: "Партийный переворот"
 SAFR.17.d: "Герцог вернулся в Национальную партию и выступал за примирение между африканерами и британскими южноафриканцами, что было отвергнуто большинством членов партии, и в результате он решил уступить и уйти из политики. Необходимо выбрать нового лидера партии до проведения выборов. Намерения Малана ясны: республика и независимость для Южной Африки. В то время как видение Пироу кажется гораздо более радикальным, чем просто свобода."
 SAFR.17.b: "Поддержать Пироу."
 SAFR.17.a: "Поддержать Малана."
 SAFR.18.t: "Победа Малана"
 SAFR.18.d: "В ходе напряжённого голосования воссоединённая Национальная партия Малана завоевала поддержку народа и теперь возглавит новое правительство. Кажется, главным пунктом повестки нового правительства является независимость от Британии, но нам остаётся лишь ждать и смотреть, что последует за этим."
 SAFR.18.a: "Превосходно."
 SAFR.19.t: "Победа Пироу"
 SAFR.19.d: "Одержав победу с небольшим перевесом, воссоединённая Национальная партия восторжествовала, и Пироу теперь займёт пост премьер-министра. Точная политика Пироу неясна для многих в партии, и некоторые подозревают, что она может быть действительно радикальной."
 SAFR.19.a: "Превосходно."
 SAFR.21.t: "Хавенга и Пироу в Берлине"
 SAFR.21.d: "Похоже, наши встречи в Берлине были благосклонно приняты немецким правительством. У нас есть два предложения на столе, хотя мы реалистично можем реализовать только одно. Хавенге удалось договориться о взаимовыгодной торговой сделке, в то время как предыдущие встречи Пироу с Гитлером и высокопоставленными немецкими чиновниками, а также его свободное владение немецким языком позволят нам отправить наших лучших генералов и офицеров в Германию для обучения и учений с Вермахтом."
 SAFR.21.a: "Сделка Хавенги"
 SAFR.21.b: "Сделка Пироу"
 SAFR.22.t: "Южная Африка запрашивает управление нашими колониями."
 SAFR.22.d: "Южная Африка утверждает, что может лучше защитить наши южноафриканские колонии, и обещает предоставить им ограниченное самоуправление. Стоит ли нам соглашаться на это?"
 SAFR.22.a: "Мы согласны."
 SAFR.22.b: "Нет."
 SAFR.23.t: "Британия соглашается на наше предложение"
 SAFR.23.d: "Британия согласилась передать свои южноафриканские колонии. Мы немедленно проследим за тем, чтобы им была предоставлена некоторая форма автономии, прежде чем полностью передать им бразды правления."
 SAFR.23.a: "Превосходно."
 SAFR.24.t: "Британия отклоняет наше предложение"
 SAFR.24.d: "Британия отклонила наше предложение. Похоже, в их устаревшей колониальной политике ничего не изменилось."
 SAFR.24.a: "Очень жаль."
 SAFR.25.t: "Британия предлагает компромисс"
 SAFR.25.d: "Британия предложила нам компромисс. Они согласились передать Бечуаналенд и Родезию, но сохранят свои колонии на севере."
 SAFR.25.a: "Это начало."






 ##### NANSHIN-RON DOCTRINE BRANCH
 JAP_nanshin_ron_doctrine: "Нансин-рон\nДоктрина"
 JAP_nanshin_ron_doctrine_EXPL1: "\nДоктрина §H«Нансин-рон»§! продвигается §Cфракцией §HТосэйха§!. Выбор стороны §Hфракции §HКодоха§! и следование этой доктрине также приведёт к следующим §Rэффектам§!:\n"
 JAP_nanshin_ron_doctrine_EXPL2: "\nВы выбрали сторону §Hфракции §HКодоха§!, которая продвигает доктрину §H«Хокусин-рон»§!. Таким образом, выбор этой доктрины до завершения «Хокусин-рон» будет иметь следующие §Rэффекты§!:\n"
 JAP_nanshin_ron_doctrine_desc: "Доктрина «Нансин-рон» (доктрина «Южной экспансии») — это военная и политическая доктрина Японской империи, гласящая, что Юго-Восточная Азия и острова Тихого океана являются сферой интересов Японии и что потенциальная ценность этих регионов для экономической и территориальной экспансии Японской империи выше, чем где-либо ещё."
 
 JAP_expand_the_hosaku_kenkyu_kai: "Расширить\nХосаку Кэнкю-кай"
 JAP_expand_the_hosaku_kenkyu_kai_desc: "«Хосаку Кэнкю-кай», или «Политика в отношении южных морей», — это созданная группа для изучения стратегий военной и экономической экспансии на юг, которая также сотрудничает с Министерством по делам колоний (Такуму-сё), чтобы подчеркнуть военную роль Тайваня и Микронезии в качестве передовых баз для дальнейшей южной экспансии."

 JAP_move_to_indochina: "Продвижение в Индокитай"
 JAP_move_to_indochina_desc: ""
 
 JAP_f_kikan: "F Кикан"
 JAP_f_kikan_desc: "«Фудзивара Кикан», названная в честь своего лидера майора Фудзивары Ивайти, — это разведывательная операция, которая будет создана Императорской ставкой. Её задачей будет установление контакта с индийским движением за независимость, зарубежными китайцами и малайскими султанами с целью поощрения дружбы и сотрудничества с Японией."
 
