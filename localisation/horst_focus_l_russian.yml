 JAP_claim_the_kyokuto_EXPL4: "Получить все бывшие территории [SOV.GetFlag]§H[SOV.GetName]§! на Дальнем Востоке."
 JAP_claim_the_kyokuto_desc: "Восходящее солнце освещает Сибирь, отмечая судьбу Кёкуто с Японией. Некогда царский фронтир, теперь он отражает дух Ниппона. Продвижение наших солдат закрепляет наше управление этим восточным царством. Наследие Японии теперь переплетается с бескрайними просторами Сибири."
 
