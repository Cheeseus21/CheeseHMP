 r56_raj.1.t: "Назначение лорда Линлитгоу"
 r56_raj.1.d: "22-й вице-король и генерал-губернатор Индии, Фримен Фримен-Томас Уиллингдон, был заменён недавно назначенным Виктором Хоупом Линлитгоу, который вскоре вступит в должность 23-го вице-короля Индии. Современники описывали его как амбициозного и устремлённого политика, унаследовавшего политическую лихорадку от своего отца, первого генерал-губернатора Австралии. Мир смотрит на Индию, задаваясь вопросом, как его правление повлияет на субконтинент."
 r56_raj.1.a: "Принято к сведению."
 
 r56_raj.2.t: "Последние часы вице-короля"
 r56_raj.2.desc: "Последние пять лет были изнурительными для генерал-губернатора. Это было время гражданских волнений, к которым лорд Уиллингдон привык, получив большой опыт в борьбе с этими движениями ещё во времена своего губернаторства в Бомбее. Приказы сверху гласили, что их целью было сотрудничество, но только с теми, кто действует в рамках правовой системы Раджа. После этого он начал массовые аресты, что до сих пор подрывает его популярность. Тем не менее, он оглядывался на своё время в Индии как на чисто позитивное, независимо от того, что думало об этом индийское население. Но так же, как правление каждого предыдущего вице-короля должно закончиться, так и его подходит к концу."
 r56_raj.2.a: "Удачи преемнику, она ему понадобится."
 
 r56_raj.3.t: "Назначение Арчибальда Уэйвелла"
 r56_raj.3.d: "Лорду Линлитгоу не дали лёгкой работы при его назначении вице-королём и генерал-губернатором, поскольку народное недовольство неуклонно росло и могло быть лишь временно остановлено несколькими политическими уступками, достигшими апогея на провинциальных выборах 1937 года. После высокой явки индийцев многие из наиболее эффективных политиков были приглашены в кабинет, впервые в истории превысив численность британских чиновников. Но так же, как должно было закончиться правление лорда Уиллингдона, заканчивается и правление Линлитгоу."
 r56_raj.3.a: "Встречайте нового босса..."
 
 r56_raj.4.t: "Назначение Луиса Маунтбэттена"
 r56_raj.4.d: "Усилия Уэйвелла считались большинством индийских политиков благородными, но были ограничены Лондоном. Вскоре после прибытия в резиденцию вице-короля в Дели он работал над облегчением продовольственного снабжения Бенгалии. Он также стал первым вице-королём и генерал-губернатором, обсуждавшим самоуправление с видными индийскими политическими лидерами, но, к разочарованию многих, эти усилия были подорваны Лондоном, желавшим удержать Индию любой ценой."
 r56_raj.4.i: "Усилия Уэйвелла считались большинством индийских политиков благородными, но были ограничены Лондоном. Вскоре после прибытия в бывшую резиденцию вице-короля в Дели он работал над облегчением продовольственного снабжения Бенгалии. Он был как чрезвычайно сговорчив с индийским правительством, так и лояльным представителем монарха в Лондоне. Хотя, конечно, по старой имперской традиции его заменит Луис Маунтбэттен."
 r56_raj.4.a: "...такой же, как старый босс"
 
 r56_raj.101.t: "Провинциальные выборы завершены"
 r56_raj.101.desc: "Это был день, которого вице-король довольно долго опасался, поскольку Имперский законодательный совет был переформирован, и теперь в нём доминируют вновь избранные представители и оппозиционные члены, что затрудняет проведение нашей воли через эти палаты."
 r56_raj.101.a: "Новая заря для Индии."
 
 r56_raj.102.t: "Закон о расширении железных дорог принят"
 r56_raj.102.d: "После месяцев утомительных дебатов в залах правительства в Дели вице-король с гордостью объявляет, что будут выделены большие средства на строительство великолепных, современных и эффективных железных дорог, охватывающих весь субконтинент."
 r56_raj.102.a: "Я закажу билет на поезд сию же минуту!"
 
 r56_raj.103.t: "Закон о расширении железных дорог провален"
 r56_raj.103.d: "Вице-король долго и упорно боролся за принятие этого проклятого законопроекта, но, увы, не смог заручиться поддержкой в Имперском законодательном совете. Ожидается, что он произнесёт речь, с неохотой признавая провал законопроекта."
 r56_raj.103.a: "Думаю, мне придётся подождать с покупкой билета."
 
 r56_raj.104.t: "Закон о стабилизации сельского хозяйства принят"
 r56_raj.104.d: "Этот закон был назван последним гвоздём в крышку гроба частых голодов в Индии, и вице-король не преминул подчеркнуть его преимущества. Благодаря этому поддержка среди индуистских и мусульманских законодателей была подавляющей, и законопроект был принят довольно легко."
 r56_raj.104.a: "Индия вздыхает с облегчением."
 
 r56_raj.105.t: "Закон о стабилизации сельского хозяйства провален"
 r56_raj.105.d: "Хотя этот закон рассматривался как революционная мера по предотвращению голода, к разочарованию большинства индийцев, он не получил достаточной поддержки в палатах Имперского законодательного собрания, чтобы стать законом.\nУже разработанные планы по улучшению предотвращения засух теперь отменены."
 r56_raj.105.a: "Печальное положение дел."
 
 r56_raj.106.t: "Закон об образовательной реформе принят"
 r56_raj.106.d: "Самые яркие и талантливые люди Индии уже давно мигрируют на Британские острова, чтобы получить высшее образование, покидая свою родину. Вице-король давно подчёркивает важность создания общества, в котором интеллектуалы могут действительно процветать, и реформа нашей школьной и университетской системы является логическим первым шагом к этой цели."
 r56_raj.106.a: "Сияющее будущее лежит перед нами."
 
 r56_raj.107.t: "Закон об образовательной реформе провален"
 r56_raj.107.d: "Неясно, что привело к душераздирающему поражению Закона об образовательной реформе, когда он обещал так много. Но одно ясно: руки вице-короля будут связаны в вопросе образования. Индия задаётся вопросом, что могло бы быть."
 r56_raj.107.a: "Тогда, полагаю, я поеду в Лондон."
 
 r56_raj.108.t: "Закон о страховании принят"
 r56_raj.108.d: "Индию часто используют для сравнения со многими другими аграрными, неразвитыми экономиками. Это во многом зависит от посредственной поддержки урбанизации и индустриализации. Однако иностранные инвестиции в наши рынки могут помочь ускорить рост нашей экономики. Благодаря этому многие члены оппозиции объединились, чтобы поддержать этот знаковый законопроект."
 r56_raj.108.a: "Мы открыты для бизнеса."
 
 r56_raj.109.t: "Закон о страховании провален"
 r56_raj.109.d: "То, что должно было стать знаковым законопроектом, позволяющим дальнейшие глобальные инвестиции в аграрный субконтинент, с треском провалилось в нашем Законодательном собрании. Вице-король вложил много времени и усилий в этот закон, но не смог убедить многих членов оппозиции в его преимуществах. Иностранные наблюдатели, стремившиеся инвестировать, теперь отступили, предпочитая вкладывать свой капитал в более стабильные рынки."
 r56_raj.109.a: "Думаю, моему предприятию придётся подождать."
 
 r56_raj.110.t: "Закон о военных полномочиях принят"
 r56_raj.110.d: "Пока немецкие Bf 110 сеяли хаос в британской сельской местности, стало ясно, что Британским островам нужна их империя. И кажется, Империя ответила благодаря недавнему успеху Закона о военных полномочиях в нашем почётном Законодательном совете. Индийской администрации теперь будет разрешено выделять гораздо больше ресурсов на Вторую мировую войну."
 r56_raj.110.a: "Мы отправляемся на войну!"
 
 r56_raj.111.t: "Закон о военных полномочиях провален"
 r56_raj.111.d: "Этот закон было трудно продать многим индийцам, как индуистам, так и мусульманам. Их втянули в эту войну без консультаций и даже малейшего учёта их мнения, и для многих было предсказуемо, что Имперское законодательное собрание, теперь состоящее в основном из вновь избранных, проголосовало против расширения полномочий исполнительной власти в военное время."
 r56_raj.111.a: "Что подумает Лондон?"
  
 r56_raj.112.t: "Встреча с законодателями"
 r56_raj.112.d: "Хотя большинство членов Имперского законодательного совета назначаются, их верность направлена не только вице-королю, но и их личным интересам и интересам тех, кто предоставляет средства на их избирательные кампании. Тем не менее встреча с Советом была далеко не бесплодной, поскольку мы обсудили многие будущие планы администрации и уже заручились некоторой поддержкой. Хотя это, конечно, не обещание, нам понадобятся эти голоса, если администрация Линлитгоу намерена быть продуктивной."
 r56_raj.112.a: "Мы когда-нибудь приведём это место в порядок."
 
 r56_raj.113.t: "Встреча с судебной властью"
 r56_raj.113.d: "Правовую систему в Индии постороннему всегда было трудно понять из-за множества местных судов низшей инстанции. Но первым лёгким контактным пунктом является Тайный совет, находящийся в Лондоне. Он имеет окончательное слово во всех вопросах, но редко вмешивается в дела Индии. Нашей второстепенной целью будет встреча с местными высокими судами, обладающими большой властью в провинциях. Всё, что мы можем сделать, чтобы обеспечить их лояльность, получит высший приоритет."
 r56_raj.113.a: "Запутанная сеть."
 
 r56_raj.114.t: "Первый пункт нашей повестки дня"
 r56_raj.114.d: "С нашими связями в законодательной и судебной ветвях власти, теперь мы сами можем выбирать, с чего начать наши усилия. Наш кабинет предложил возможности либо расширения нашей железнодорожной системы, либо стабилизации нашего продовольственного снабжения. Что бы мы ни выбрали первым, это будет важно для Индии."
 r56_raj.114.a: "Транспортная система отчаянно нуждается в реформе."
 r56_raj.114.b: "Наше сельское хозяйство в плачевном состоянии."
 r56_raj.114.c: "Вместо этого мы должны сосредоточиться на этой войне!"
 
 r56_raj.115.t: "Министерство промышленности и труда"
 r56_raj.115.d: "Некоторые могут сказать, что министр промышленности является одним из самых влиятельных членов кабинета в любой администрации, поэтому мы должны тщательно обдумать, кто подходит для этой работы."
 r56_raj.115.a: "Давайте действовать с осторожностью."
 r56_raj.115.b: "Найти лучших экономистов в стране."
 
 r56_raj.116.t: "Министерство обороны и военного снабжения"
 r56_raj.116.d: "Поскольку напряжённость в мире нарастает, война может вспыхнуть в любой момент, и у нас должен быть министр обороны, способный справиться с этой задачей."
 r56_raj.116.a: "С землевладельцем мы усилим мобилизацию."
 r56_raj.116.b: "Нам нужен промышленник, строящий военную машину."

 r56_raj.117.t: "Министерство здравоохранения, образования и земель"
 r56_raj.117.d: "В то время как другие министерства занимаются увеличением показателей промышленного развития и численности призывников, социальные министерства наполняют сердце Индии и должны рассматриваться соответствующим образом."
 r56_raj.117.a: "Консервативный выбор."
 r56_raj.117.b: "Прогрессивный выбор."
 
 RAJ_agricultural_shipments: "Сельскохозяйственные поставки"
 RAJ_agricultural_shipments_desc: "Мы выполнили свой долг, обеспечив Индию продовольствием в эти очень трудные для неё времена. Спасённые души, вероятно, исчисляются миллионами, и это, как минимум, приносит нам много престижа среди других стран."

 raised_support_railway: "Мы сосредоточимся на продвижении §YЗакона о расширении железных дорог§!\n\n§YЗакон о стабилизации сельского хозяйства§! будет заблокирован, пока мы не завершим §YОткрытость для бизнеса§!."
 raised_support_agri: "Мы сосредоточимся на продвижении §YЗакона о стабилизации сельского хозяйства§!\n\n§YЗакон о расширении железных дорог§! будет заблокирован, пока мы не завершим §YУправление военных исследований§!."
 raised_support_war: "§YУмеренно§! повышает поддержку §YЗакона о военных полномочиях§!"

 

