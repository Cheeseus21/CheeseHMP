 civilian_kitchens_idea: "Гражданские полевые кухни"
 civilian_kitchens_idea_desc: "Финляндия столкнулась с острой нехваткой палаток, печей и другого снаряжения, но многих смертей удалось избежать благодаря гражданским добровольцам, которые организовали кухни и обеспечивали войска горячей пищей в полевых условиях."

 FIN_motitus_tactics: "Тактика «Мотти»"
 FIN_motitus_tactics_desc: "Мотти — это финский военный сленг для полностью окружённого подразделения противника. Мотитус — это манёвр двойного охвата, использующий способность лёгких войск передвигаться по пересечённой местности для окружения вражеских войск на дороге. Тактика особенно эффективна для значительно уступающих в численности, но мобильных сил, особенно в снежном климате Финляндии."

 FIN_white_guard_idea: "Белая гвардия"
 FIN_white_guard_idea_desc: "Во время Зимней войны Белая гвардия отвечала за проведение мобилизации. Четверть личного состава полевой армии составляли члены гвардии. Этот вклад оказался важным, так как гвардейцы были наиболее обученным и оснащённым персоналом в армии, которая испытывала нехватку даже базовых припасов."

 FIN_mannerheim_legacy_idea: "Наследие Маннергейма"
 FIN_mannerheim_legacy_idea_desc: "Инициатива Маннергейма по строительству фортов на границе с СССР оставила Финляндии множество опытных военных инженеров. Не дадим их знаниям пропасть даром."

 FIN_stolentanks: "Кража и обучение"

 FIN_communism_banned: "Запрет коммунизма"
 FIN_communism_banned_desc: "Подъём радикальных правых партий в Финляндии, а также всё более напряжённые отношения с СССР привели к запрету многих финских коммунистических партий, в первую очередь дружественной Коминтерну СКП."

