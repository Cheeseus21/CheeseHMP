 ALLIES_army_eng: "§HВосемнадцать§! §Rветеранских§! рейнджерских дивизий будут собраны в §HLondon§! под нашим командованием."
 ALLIES_army_usa: "§HВосемнадцать§! §Rветеранских§! рейнджерских дивизий будут собраны в §HWashington§! под нашим командованием."
 ALLIES_marines_eng: "§HВосемь§! §Rветеранских§! дивизий морской пехоты будут собраны в §HLondon§! под нашим командованием."
 ALLIES_marines_usa: "§HВосемь§! §Rветеранских§! дивизий морской пехоты будут собраны в §HWashington§! под нашим командованием."
 ALLIES_seamen_eng: "Флот в изгнании будет собран в §HDover§! под нашим командованием."
 ALLIES_seamen_usa: "Флот в изгнании будет собран в §HWashington§! под нашим командованием."
 ALLIES_commonwealth_of_nations: "[ENG.GetFactionName]"
 ALLIES_commonwealth_of_nations_desc: "[ENG.GetFactionName] будет стоять вместе!"
 ALLIES_joint_training_program: "Совместная программа обучения"
 ALLIES_joint_training_program_desc: "Благодаря совместным военным играм и тренировкам мы сможем отточить наши военные навыки."
 ALLIES_continue_the_fight: "Продолжать борьбу"
 ALLIES_continue_the_fight_desc: "Мы будем сражаться на пляжах, мы будем сражаться на полях, мы будем сражаться на улицах и на холмах; мы никогда не сдадимся!"
 ALLIES_continue_the_fight_navy: "Свободный флот [ROOT.GetAdjective]"
 ALLIES_continue_the_fight_navy_desc: "Будучи нацией в изгнании, мы сосредоточим усилия на создании и поддержании флота для помощи [ENG.GetFactionName] против Оси."
 ALLIES_continue_the_fight_navy_seamen: "Поиск опытных моряков"
 ALLIES_continue_the_fight_navy_seamen_desc: "Мы соберём небольшой флот, базирующийся в союзном порту."
 ALLIES_continue_the_fight_navy_convoy: "Корабли свободы"
 ALLIES_continue_the_fight_navy_convoy_desc: "Производство конвоев необходимо для военных усилий. Это то, с чем мы можем легко помочь."
 ALLIES_continue_the_fight_navy_marine: "Свободный корпус морской пехоты [ROOT.GetAdjective]"
 ALLIES_continue_the_fight_navy_marine_desc: "Мы создадим корпус морской пехоты, который будет придан нашему флоту."
 ALLIES_continue_the_fight_army: "Свободные силы [ROOT.GetAdjective]"
 ALLIES_continue_the_fight_army_desc: "Борьба не заканчивается с нашей капитуляцией — это лишь начало новой главы этой войны!"
 ALLIES_continue_the_fight_army_spawn: "Мобилизация ветеранов в изгнании"
 ALLIES_continue_the_fight_army_spawn_desc: "Все [ROOT.GetAdjective], которым удалось бежать после падения [Root.GetName], будут объединены в армию."
 ALLIES_continue_the_fight_army_sabotage: "Саботаж захваченных заводов"
 ALLIES_continue_the_fight_army_sabotage_desc: "Бойцы сопротивления будут саботировать промышленность, которую мы оставили, чтобы затруднить военные усилия нашего врага."
 ALLIES_continue_the_fight_army_volunteers: "Набор добровольцев"
 ALLIES_continue_the_fight_army_volunteers_desc: "Мы найдём наших экспатриантов и завербуем их в нашу армию."
 ALLIES_eng_patron: "Поиск британского опыта"
 ALLIES_eng_patron_desc: "Мы перенять британский опыт ведения войны в пустыне и военного планирования, а также изучим британские промышленные разработки."
 ALLIES_usa_patron: "Учиться у американцев"
 ALLIES_usa_patron_desc: "Мы перенять американский опыт ведения войны в джунглях и военного планирования, а также изучим американские промышленные разработки."
 ALLIES_usa_dock: "Война на море"
 ALLIES_usa_dock_desc: "Мы изучим, как планировать и проводить морские десантные операции."
 ALLIES_eng_operations: "Уроки Великой войны"
 ALLIES_eng_operations_desc: "Мы изучим британское военное планирование со времён Великой войны."
 ALLIES_eng_spec: "Тактика пустыни"
 ALLIES_eng_spec_desc: "Мы научимся воевать в пустынях."
 ALLIES_usa_spec: "Тактика рейнджеров"
 ALLIES_usa_spec_desc: "Мы научимся воевать в джунглях."
 desert_tactics_allies_effect: "Открывает §HОбучение пустыне§!\n§HТанки, бронемашины и пехота\n    Пустыня и глубокая пустыня§!\nОборона: §G+10%§!"
 jungle_tactics_allies_effect: "Открывает §HОбучение рейнджеров§!\n§HТанки, бронемашины и пехота\n    Джунгли и лес§!\n      Атака: §G+5%§!"

 GER_luftwaffe_expansion: "Расширение люфтваффе"
 GER_luftwaffe_expansion_desc: "Современные войны невозможно выиграть без господства в небе. Мы должны сделать всё возможное для развития военно-воздушных сил!"
 GER_air_shield: "Зенитные башни"
 GER_air_shield_desc: "Зенитные башни — гигантские бетонные сооружения, оснащённые зенитной артиллерией."
 GER_trust_in_the_luftwaffe: "Доверие к люфтваффе"
 GER_trust_in_the_luftwaffe_desc: "Наши отважные асы и профессиональные механики получат дополнительную поддержку и усилят сотрудничество с исследовательскими концернами, чтобы наша тактика и снаряжение были современными. Мы полностью доверимся люфтваффе Геринга."
 GER_volkssturmm: "Сформировать дивизии Фольксштурма"
 GER_volkssturmm_desc: "Формирование всенародного ополчения позволит переломить ход войны против СССР и Союзников."
 GER_ss_focus: "Schutzstaffel"
 GER_prepare: "Подготовка к неизбежному"
 GER_jag: "Тотальная война!"
 GER_riga: "Псковское сражение"
 GER_riga_desc: "Начав наступление с севера, мы сможем отрезать Советский Союз от Балтийского моря и открыть путь к атаке на Ленинград."
 GER_kiev_desc: "Начав наступление с юга, мы сможем занять важные военно-морские базы на Чёрном море, а также важные промышленные зоны в Донбассе, что подорвёт военную экономику Советского Союза."
 GER_kiev: "Киевское сражение"
 GER_vitebsk: "Смоленское сражение"
 GER_vitebsk_desc: "Начав наступление на Москву, мы подорвём боевой дух советской армии и сможем развивать наступление отсюда на север или юг."
 GER_prepare_desc: "Я долго сомневался, начинать ли на Западе или на Востоке. Но я создал вермахт не для того, чтобы он не наносил удар. Во мне всегда была внутренняя готовность к войне."
 GER_ss_focus_desc: "Schutzstaffel, или «СС», — это военизированная группа, напрямую подчиняющаяся Адольфу Гитлеру и нацистской партии. Начавшись как простой отряд охраны собраний НСДАП, она выросла под руководством Генриха Гиммлера в мощный и внушающий страх инструмент тоталитарного режима Гитлера."
 GER_winter: "§BЗима§! 1941–42"
 GER_winter_desc: "Из-за сильных морозов и отсутствия зимнего обмундирования наши солдаты несут большие потери, что сказывается на ходе операции."
 GER_continuetheoffence: "Продолжить наступление!"
 GER_continuetheoffence_desc: "Пополнив запасы, мы сможем снова проводить наступательные операции."
 GER_halttheoffence: "Остановить наступление!"
 GER_halttheoffence_desc: "Остановив наступление, мы сможем пополнить снабжение и дать людям отдых, чтобы снова нанести удар."
 GER_entrenching: "Эшелонированная оборона"
 GER_entrenching_desc: "Строя укрепления и используя эшелонированную оборону, мы не позволим врагу прорваться в наш тыл."
 GER_typhoon_desc: "Мы попытаемся снова прорваться к Москве, на этот раз более подготовленными."
 GER_typhoon: "Операция §WТайфун§!"
 GER_fallblau: "Операция §RБлау§!"
 GER_Leningrad: "Операция «Северное сияние»"
 GER_Leningrad_desc: "Захват Ленинграда позволит высвободить сотни тысяч войск для других наступательных операций."
 GER_Moscow: "Захватить Москву"
 GER_Moscow_desc: ""
 GER_appointottoskorzeny: "Отто Скорцени"
 GER_appointottoskorzeny_desc: ""
 GER_Stalingrad: "Unternehmen Fischreiher"
 GER_Stalingrad_desc: "Мы должны обеспечить контроль над южной частью бассейна Волги."
 GER_fallblau_desc: "Наступление в этой операции должно быть организовано так, чтобы силы, наносящие удар вниз по течению Дона, соединились в районе Сталинграда с силами, наступающими из района Таганрога, Артёмовска между низовьями Дона, Дона и Ворошиловграда через реку Донец на восток. Эти силы должны затем соединиться с танковой армией, наступающей на Сталинград."
 GER_citadel: "Операция §RЦитадель§!"
 GER_citadel_desc: "Поворот на юг и движение в южном направлении должны осуществляться более чем одной дивизией. Наступление в северо-восточном направлении (прохоровское направление. — З.В.) сейчас ещё возможно, но позже станет невозможным, так как противник сосредоточил в этом районе (в районе Прохоровки. — З.В.) новые танковые силы. Если атака Z-й танковой части окажется неудачной, ей следует перейти к обороне, а её подразделения на правом фланге (4-я ТД — З.В.) или севернее Обояни могут быть использованы для развития наступления в западном направлении."
 GER_france_gg: "§gПадение Франции§!"
 GER_france_gg_desc: "После падения Франции мы сможем направить силы на формирование батальонов Фольксштурма и СС."
 GER_deployhitlerjugend: "Вербовать в Гитлерюгенд"
 GER_deployhitlerjugend_desc: "Вербуя в Гитлерюгенд, мы сможем пополнить недостающие дивизии новой рабочей силой."
 GER_ardennesoffensive: "Арденнское наступление"
 GER_ardennesoffensive_desc: "Разгромив Союзников в Арденнах, мы сможем отбросить их к морю, а затем сосредоточиться на Восточном фронте."
