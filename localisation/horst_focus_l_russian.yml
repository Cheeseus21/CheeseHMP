 india.100.t: "Наша администрация разделилась."
 india.100.desc: "Британское правительство только что объявило о создании колонии Аден и колонии Бирма, тем самым значительно сократив размер нашей администрации."
  
 RAJ_Tariff_Income: "Тарифный доход"
 RAJ_Increased_Trade_Volume: "Увеличенный объем торговли"
 ENG_split_up_the_British_Raj: "Разделить Британский Радж"
 ENG_split_up_the_British_Raj_desc: "Мы создадим отдельные колонии в Бирме и Адене, чтобы сделать наше колониальное управление более эффективным."
 raj_port_operation: "В настоящее время мы работаем над приобретением порта."
 india.295.t: "Индия приглашает нас в Коминтерн"
 india.295.desc: "После недавнего вступления Индии в Коминтерн после изгнания империалистических колонизаторов Европы, она расширила свое влияние в Южной Азии и теперь спрашивает, не согласимся ли мы вступить в глобальный пролетарский альянс."
 india.295.a: "Пролетарии всех стран, соединяйтесь!"
 india.295.b: "Мы предпочтем отклониться от курса Москвы."

 india.296.t: "Индия приглашает нас в [RAJ.GetFactionName]"
 india.296.desc: "После недавнего создания Индией [RAJ.GetFactionName] после изгнания империалистических колонизаторов Европы, она расширила свое влияние в Южной Азии и теперь спрашивает, не согласимся ли мы вступить в южноазиатский пролетарский альянс."
 india.296.a: "Пролетарии всех стран, соединяйтесь!"
 india.296.b: "Мы предпочтем отклониться от курса Дели."
 
 india.400.t: "Слухи в Гоа"
 india.400.desc: "В колониальном городе Гоа ходят слухи, слухи о неизбежном вторжении. Хотя любой может придумать такой сценарий, наше верховное командование заметило незначительное перемещение военных дивизий. Вторжение может иметь катастрофические последствия для местного населения, верного Португалии на протяжении 450 лет. Международное сообщество, вероятно, поддержит нас, если мы будем стоять на своем, но искренне ли сможет международная поддержка сдержать индийские войска? Готовы ли наши вооруженные силы к этой задаче? Что ж, задавать вопросы легко, но отвечать на них трудно."
 india.400.a: "Они не пройдут!"
 india.400.b: "Мы предпочтем не проливать кровь."
 
 india.401.t: "Индия успешно захватила Гоа"
 india.401.desc: "Один из немногих оставшихся пережитков европейского колониализма в Южной Азии пал перед недавно созданным [RAJ.GetNameDef]. Португальская империя, кажется, рушится."
 india.401.a: "Долой колонизаторов!"
 india.401.b: "Печальный день для Португалии."
 
 india.402.t: "Индия не смогла захватить Гоа"
 india.402.desc: "Португальцы бесстрашно отразили атакующую индийскую армию и сохранили небольшую часть Португальской империи."
 india.402.a: "Проклятые колонизаторы."
 india.402.b: "Наша империя проживет еще один день."
 
 india.403.t: "Индия настаивает на референдуме в [320.GetName]"
 india.403.desc: "Массовое протестное движение сформировалось в нашей колонии Французская Индия, похоже, что за этой волной беспорядков стоит недавно созданное индийское правительство. Большинство колониальных советников предлагают отпустить несколько портов и городов, так как они не приносят реальной экономической выгоды. Мы также можем попытаться подавить движение. Если мы это сделаем, желательно подготовиться к непредвиденным последствиям."
 india.403.a: "Приведите губернатора."
 india.403.b: "Пусть демократия проявит себя."
 
 india.404.t: "Проблема Французской Индии."
 india.404.descre: "Протесты продолжают распространяться, так как наша местная полиция устала от подавления. С самого начала казалось, что подавить их невозможно. Но не колеблясь ни секунды, мы решили укрепить наше имперское правление. Это решение, однако, было не слишком популярно среди администраторов островов, которые уступили местным требованиям и передали провинцию Индии."
 india.404.desc: "Референдум, как и ожидалось, прошел в пользу объединения с Индией, и мы бессильны остановить передачу. Местные [Root.GetAdjective] войска будут выведены, администраторы перемещены, [Root.GetAdjective] флаг будет спущен, и, наконец, будет поднят индийский флаг."
 india.404.a: "Мы еще посмотрим."
 india.404.b: "Какое разочарование после всего, что мы пережили."
 
 india.405.t: "Вопрос о Бирме"
 india.405.desc: "Мы долгое время думали об отделении Бирмы от Индии, и некоторые дипломаты уже разрабатывают планы для администрации. Правительство [Raj.GetNameDef] умоляло нас сохранить субконтинент разделенным как в экономических, так и в административных целях. Отказ от этих планов освободит наших дипломатов для работы в других областях."
 india.405.a: "У нас есть более важные дела."
 india.405.b: "Наши дипломаты продолжат свою работу."
 
 india.406.t: "Британцы приняли нашу просьбу."
 india.406.desc: "Британские дипломаты, работавшие над разработкой планов для отдельной бирманской администрации, были переназначены на другие задачи, и наша администрация осталась нетронутой."
 india.406.a: "Мудрое решение."
 
 india.407.t: "Британцы отклонили наш запрос."
 india.407.desc: "Британское правительство прямо отказало в нашей петиции о сохранении Индии единой, и их дипломаты продолжают свои планы для колонии Бирма."
 india.407.a: "Проклятые англичане."
 
 india.408.t: "Вопрос о Цейлоне"
 india.408.desc: "Наш новый равный союзник Индия оказывает все большее давление по поводу их предполагаемых союзников в Шри-Ланке. Хотя их крики о независимости становятся все более слышными в последние месяцы, стоит ли нам действительно отказываться от этой важной части империи?"
 india.408.a: "Мы предоставим им статус доминиона."
 india.408.b: "Они не будут диктовать нашу внутреннюю политику."
 
 india.409.t: "Британцы приняли нашу просьбу."
 india.409.desc: "Британское правительство предоставило бывшей коронной колонии Цейлон статус доминиона под новым названием [SRL.GetNameDef]. Это великая победа для коренных народов Азии."
 india.409.a: "Мы немедленно откроем посольство."
 
 india.410.t: "Британцы отклонили нашу просьбу."
 india.410.desc: "Британцы ответили, что не намерены отпускать колонию Цейлон. Это довольно сильный удар по коренным народам Азии."
 india.410.a: "Проклятые англичане."
 
