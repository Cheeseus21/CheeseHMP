 RAJ_Princely_States_desc: "Хотя администрация Британского Раджа может находиться в Дели, не вся его номинальная территория контролируется из столицы. Местные князья обеспечили себе значительную степень автономии, вступив в союз с британцами. Затронутые штаты:\n\n§YГуджарат, Раджастан, Индаур, Хайдарабад, Майсур, Кашмир, Белуджистан§!"
