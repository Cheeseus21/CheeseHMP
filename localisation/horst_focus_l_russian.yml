 SOV_barb2_idea: "Государственный комитет обороны"

 stalin_barb_leader_trait: "Генералиссимус"
 SOV_barb2_desc: "После того как товарищ Сталин оправился от шокового состояния, мы можем сосредоточиться на организации ответа нашего Союза на действия Германии. Мы начнём с формирования комитета, обладающего верховной властью и надзором над Союзом, сформированного из Президиума Верховного Совета СССР."
 SOV_shaposhnikov1_desc: "Сейчас, как никогда, нам нужен Борис Шапошников на посту начальника Генерального штаба."
 SOV_icebreaker: "Операция «Ледокол»"
 SOV_icebreaker_desc: "Красная Армия мобилизована и достаточно подготовлена, чтобы нанести удар по фашистскому зверю и начать освобождение рабочих Европы. Мы покажем им мощь Советского Союза!"
 SOV_icebreaker2: "Операция «Ледокол»"
 SOV_icebreaker2_desc: "Красная Армия мобилизована и достаточно подготовлена, чтобы нанести удар по фашистскому зверю и начать освобождение рабочих Европы. Мы покажем им мощь Советского Союза!"
