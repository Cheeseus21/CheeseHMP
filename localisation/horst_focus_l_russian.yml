 ETH_construction_effort4_desc: "Мы расширим нашу текстильную промышленность."
 irq_militarism: "Милитаризм"
 IRQ_revolution2: "Распространить революцию на Сирию"
 ITA_sword_of_islam: "Меч Ислама"
 ENG_bomber_harris: "Победа путем господства в воздухе"
 IRQ_eco4: "Стрелы Вавилона"
 IRQ_eco3: "Национализировать французские инвестиции"
 IRQ_eco4_desc: "Наши стрелы пронзят любые вражеские летающие колесницы."
 ITA_sword_of_islam_desc: "Мы должны объединиться с арабами Северной Африки против британского и французского империализма. Мы позиционируем себя как защитников ислама, чтобы завоевать расположение арабов Средиземноморья."
 MAN_the_two_emperorsx: "Два императора"
 MAN_the_two_emperorsx_desc: "Пришло время поставить крест на домыслах о том, что мы с Японией не являемся равноправными партнерами. Наши два императора подобны двум братьям!"
 MAN_chinese_leadershipx: "Власть Китая"
 MAN_chinese_leadershipx_desc: "Китайскому народу нужен китайский лидер. Мы должны публично заявить, что стремимся ни к чему иному, как к полному восстановлению имперской власти над всем Китаем."
 MAN_vassalize_mengukuox: "Вассализация Мэнцзяна"
 MAN_vassalize_mengukuox_desc: "Принц Мэнцзяна недостоин считаться равным императору Маньчжоу-го. Настало время прекратить этот дурацкий эксперимент и поставить его на место."
 MAN_national_cooperation_governmentx: "Правительство народного содействия"
 MAN_national_cooperation_governmentx_desc: "До нас доходят тревожные слухи о том, что японцы планируют сформировать марионеточное правительство из других китайских политиков-простолюдинов. Это недопустимо. Нам нужны гарантии того, что все китайские территории, захваченные совместно, окажутся под властью нашей администрации."
 MAN_alliance_with_the_kwantung_armyx: "Альянс с Квантунской армией"
 MAN_alliance_with_the_kwantung_armyx_desc: "Размещенные в нашей стране японские войска зачастую не разделяют наши идеи. Нужно идти на более тесный контакт с ними, чтобы гарантировать максимально бесконфликтное взаимодействие."
 MAN_national_defense_state: "Режим национальной обороны"
 MAN_national_defense_state_desc: "Пока мы не вернем себе власть над всем Китаем, мы должны прикладывать все усилия, идти на любые жертвы и использовать все доступные ресурсы, чтобы стремиться к победе."
 MAN_social_research_unitx: "Отдел социальных исследований"
 MAN_social_research_unitx_desc: "Мы сформируем специальную группу для изучения традиций и обычаев нашего народа, чтобы помочь людям стать продуктивными гражданами великой нации."
 MAN_invite_japanese_investorsx: "Привлечение японских инвесторов"
 MAN_invite_japanese_investorsx_desc: "В деле развития нашей страны не обойтись без иностранной помощи. Некоторые японские компании изъявляют желание вложить средства в нашу экономику."
 MAN_hoankyokux: "Хоанкёку"
 MAN_hoankyokux_desc: "Наше правительство дает Китаю наилучшие шансы на светлое будущее. Однако многие замышляют уничтожить его. Нам нужна организация, которая возьмет на себя борьбу с подобными элементами и защиту нашего государства."
 jap_nav_2: "Мы исследуем морские бомбардировщики 1940 года.\n\n"
 jap_nav_3: "Мы исследуем морские бомбардировщики 1944 года.\n\n"
 
 
 
 
 SLO_diet_of_the_slovak_land: "Сейм Словацкой земли"
 SLO_diet_of_the_slovak_land_desc: "13 марта 1939 года Гитлер пригласил Йозефа Тисо в Берлин и призвал его провозгласить независимость Словакии. Тисо отказался принять такое решение самостоятельно, после чего Гитлер разрешил ему организовать собрание словацкого парламента, которое одобрит независимость Словакии."
 SLO_telegram_to_berlin: "Телеграмма в Берлин"
 SLO_telegram_to_berlin_desc: "С рождением нашего собственного суверенного словацкого государства мы можем теперь сдержать обещание, данное Тисо Гитлеру, и присоединиться к державам Оси."
 SLO_zone_of_protection: "Охранный договор"
 SLO_zone_of_protection_desc: "С самого начала словацкое государство находилось под влиянием Германии. Охранный договор, подписанный 23 марта 1939 года, частично подчинил его внешнюю, военную и экономическую политику германской."
 SLO_appoint_competent_economists: "Назначить компетентных экономистов"
 SLO_appoint_competent_economists_desc: "На высоких постах мы можем уменьшить пагубное влияние, которое немецкое руководство оказало на нашу экономику."
 SLO_industrial_enterprises: "Германский контроль над словацкой промышленностью"
 SLO_industrial_enterprises_desc: "В течение первого года существования нашего нового государства немцы использовали свои огромные финансовые ресурсы для установления контроля над крупными отечественными промышленными предприятиями. Это, конечно, должно быть исправлено назначением компетентных экономистов, которые обеспечат целостность нашей нации, не распродавая наши национальные активы немцам."
 SLO_currency: "Сильная валюта"
 SLO_currency_desc: "Курс обмена немецкой валюты на словацкую крону составлял 1 рейхсмарку за 11 словацких крон."
 SLO_factories: "Построить новые заводы"
 SLO_factories_desc: "За время существования Словацкого государства было основано более 200 промышленных предприятий."
 SLO_infrastructure: "Построить новую инфраструктуру"
 SLO_infrastructure_desc: "За время существования Словацкого государства было построено более 100 км новых железных дорог и 287 км автомобильных дорог."
 SLO_hungarian_invasion: "Венгерское вторжение"
 SLO_hungarian_invasion_desc: "На рассвете 23 марта 1939 года Венгрия внезапно атаковала Словакию со стороны Карпатской Украины, получив приказ «продвигаться как можно дальше на запад»[citation needed]. Венгрия напала на Словакию без объявления войны, застав словацкую армию врасплох, поскольку многие словацкие солдаты находились в пути из чешского региона и ещё не добрались до своих словацких частей."
 SLO_seasonal_works_in_germany: "Сезонные рабочие в Германии"
 SLO_seasonal_works_in_germany_desc: "Ежегодно 40 000 рабочих выезжали в Германию на сезонные работы, а часть трудоспособного населения отправлялась на фронт."
 SLO_salzburger_diktat: "Зальцбургская конференция"
 SLO_salzburger_diktat_desc: "С 27 по 28 июля 1940 года в Зальцбурге немецкие чиновники продиктовали Тисо смену правительства. Противоречивый словацкий политик Войтех Тука был назначен премьер-министром, а командир Гвардии Глинки (HG) Александр Мах стал министром внутренних дел. Начинается новый этап в формировании режима Словацкого государства, в котором национал-социалистические элементы проникают во все сферы жизни."
 SLO_evacuation: "Кризис в Южной Словакии"
 SLO_evacuation_desc: "На вновь приобретенной территории Венгрии словацкое население, оставшееся проживать в своих домах, почти сразу становится жертвой преследований, унижений, насилия или открытых гонений. Государство может эвакуировать и предоставить новое место жительства для 50 000 словаков."
 SLO_radical_wing: "Радикальное крыло"
 SLO_radical_wing_desc: "Радикальное крыло HSĽS во главе с Войтехом Тукой и Александром Махом стремилось копировать германский режим."
 SLO_moderate_wing: "Умеренное крыло"
 SLO_moderate_wing_desc: "Йозеф Тисо был одним из лидеров умеренного крыла; пропражское направление было представлено главным образом генеральным секретарем Мартином Соколом и Йозефом Будаем."
 SLO_fate_in_german_hands: "Судьба Словакии в руках Германии"
 SLO_fate_in_german_hands_desc: "Во время визита к Гитлеру Тука открыто заявляет: «Мой фюрер, я вверяю судьбу моего народа в ваши руки. Мой народ ожидает освобождения от вас.»"
 SLO_detention_camp: "Построить лагерь для задержанных"
 SLO_detention_camp_desc: "Вскоре после создания независимого государства правительство издает постановление о задержании врагов Словацкого государства. Врагами являются все те, кто, по мнению режима, может якобы быть препятствием для построения нового государства."
 SLO_mobilize_slovak_army: "Мобилизовать словацкие вооруженные силы"
 SLO_mobilize_slovak_army_desc: "В апреле 1939 года Гитлер отдал приказ разработать план военной кампании против Польши, территории которой он хотел присоединить к Германскому рейху. В конце августа началась мобилизация словацкой армии."
 SLO_president_of_slovak_republic: "Первый президент Словацкой Республики"
 SLO_president_of_slovak_republic_desc: "Конституция июля 1939 года определяет обширные функции для президента, которого у Словацкой Республики еще нет. 26 октября 1939 года Йозеф Тисо стал президентом Словацкой Республики."
 SLO_life_in_new_slovakia: "Новая Словакия"
 SLO_life_in_new_slovakia_desc: "Пропаганда использует подконтрольные СМИ для распространения образа Словакии как мирной и процветающей страны. По сравнению с Протекторатом или даже Польшей, прямое влияние Третьего рейха в Словакии ощущается гораздо меньше."
 SLO_lomnicky_manifest: "Ломницкий манифест"
 SLO_lomnicky_manifest_desc: "Даже изобразительное искусство не обходит стороной последствия политических изменений, произошедших в Словакии. В октябре 1939 года прогрессивная Школа искусств и ремесел прекратила свое существование, и ее должна была заменить кафедра рисования и живописи Словацкого технического университета в Братиславе."
 SLO_german_advisors: "Немецкие советники"
 SLO_german_advisors_desc: "После Зальцбурга больше немецких советников приходят в ключевые словацкие министерства и ведомства, а также в силовые структуры режима. Их роль заключается в наблюдении за функционированием этих учреждений и обеспечении лояльности Германии и соблюдения обязательств охранного договора."
 SLO_economic_loan: "Займ на экономическое восстановление"
 SLO_economic_loan_desc: "В результате присоединения юга страны к Венгрии Словакия потеряла важный в сельскохозяйственном отношении район с несколькими центрами горнодобывающей, кожевенной и полиграфической промышленности. Нарушена транспортная и телекоммуникационная структура, а также система линий электропередач. В стремлении улучшить ситуацию в феврале 1939 года правительство объявило займ на экономическое восстановление Словакии."
 SLO_propaganda_campaings: "Пропагандистские кампании"
 SLO_propaganda_campaings_desc: "Оборотная сторона бума экономического роста частично скрывается пропагандистскими кампаниями, такими как «Улыбающаяся Словакия» или «Радость труда»."
 SLO_bata: "Заводы «Батя»"
 SLO_bata_desc: "Заводы «Батя» в Партизанске были основаны в 1939 году. Партизанске был одним из мест, где известный предприниматель Томаш Батя развивал свою деятельность. Его целью было создать город, где люди могли бы найти работу, жилье и досуг. На фабриках производство было сосредоточено на производстве обуви, которое преобладает там и по сей день."
 SLO_universities: "Открыть новые университеты"
 SLO_universities_desc: "В 1942 году была основана Словацкая академия наук и искусств, которая начала свою деятельность годом позже. В этом отношении относительно благоприятный период отразился также на увеличении общего количества опубликованных изданий различного рода."
 SLO_expand_mines: "Расширить шахты"
 SLO_expand_mines_desc: "Поскольку страна является важным источником полезных ископаемых, сельскохозяйственной продукции и стратегического производства вооружений для Германии, а использование ее коммуникационной сети продолжается, она проявляет собственную заинтересованность в их развитии в определенных областях."
 SLO_apollo: "«Аполло»"
 SLO_apollo_desc: "В 1895 году было принято решение построить нефтеперерабатывающий завод в Братиславе в Будапеште. Нефтеперерабатывающий завод «Аполло» был введен в эксплуатацию в 1896 году. Новый и современный завод был одним из вторых по величине нефтеперерабатывающих заводов в монархии. Он производил бензин, керосин, парафин, свечи, вазелин, асфальт, даже искусственный лед. Во времена Словацкой Республики завод принадлежал компаниям Dynamit Nobel AG Bratislava и IG Farben."
 SLO_hitlers_protection: "«Под защитой Гитлера»"
 SLO_hitlers_protection_desc: "Словакия должна подать пример странам юго-восточной Европы и показать, что под «защитой» Гитлера нация может жить мирно."
 SLO_demand_southern_slovakia: "Одна нация, одна партия, один лидер"
 SLO_demand_southern_slovakia_desc: "На вновь приобретенной территории Венгрии словацкое население почти сразу стало жертвой преследований, унижений и насилия. Экономически оккупированная территория была подорвана нереалистичным обменом пенгё на чехословацкую крону. Поэтому с падением многих словацких солдат в войне за Великогерманский рейх Словацкая Республика требует воссоединения с Южной Словакией."
 SLO_dynamitka: "Dynamitka"
 SLO_dynamitka_desc: "В 1941 году акционерный капитал достиг 150 миллионов крон, что сделало его крупнейшим акционерным обществом в Словакии. Производство взрывчатых веществ было одной из самых прибыльных операций во время войны и сыграло решающую роль в том, что 1941 год завершился чистой прибылью в 19 миллионов крон."
 industrial_research_tt: "Дает"
 SLO_nehera: "Nehera"
 SLO_nehera_desc: "После успешного создания в чешской части Чехословакии новый завод был построен также и в Словакии. В 1939 году Швейная служба Nehera открыла свои ворота в Тренчине, первоначально производя 200 брюк в день. С увеличением числа сотрудников расширялся и ассортимент, который пополнился спортивными костюмами и мужскими пиджаками."
 SLO_anti_social: "Антисоциальные отделы"
 SLO_anti_social_desc: "В 1941 году начали создаваться рабочие отделы для так называемых асоциальных групп, включая «цыган без работы». Сначала они строятся как сезонные, но с 1942 года они учреждаются как постоянные."
 SLO_slovak_airforce: "Slovenské Vzdušné Zbrane"
 SLO_slovak_airforce_desc: "Словацкие ВВС были созданы на основе Чешско-Словацкого авиационного полка 3 «Генерал-летчик Милан Растислав Штефаник», который как единственный из шести чешско-словацких авиаполков находился в Словакии. После создания Словацкой Республики в марте 1939 года вновь созданное Воздушное оружие переняло его авиационное вооружение и организационную структуру."
 SLO_lessons: "Уроки «Малой войны»"
 SLO_lessons_desc: "Боевое крещение Словацкие ВВС прошли в марте 1939 года, когда венгерская армия вторглась на территорию восточной Словакии после завоевания Подкарпатской Руси. Против венгерских ВВС были развернуты 45-я и 49-я истребительные эскадрильи с двадцатью самолетами B.534 и 12-я и 13-я разведывательные эскадрильи, вооруженные примерно двадцатью самолетами Š.328."
