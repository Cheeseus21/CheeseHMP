 JAP_ventures_in_timor: "Предприятия на Тиморе"
 JAP_ventures_in_indonesia: "Предприятия в Голландской Ост-Индии"
 JAP_occupied_timor: "Оккупированный Тимор"
 JAP_transferred_timor: "Переданный Тимор"
 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_tt: "Если этот фокус будет завершён до §YУдар по Южному ресурсному району§!, то при объявлении войны [ENG.GetFactionName] произойдёт следующее:\n\n"
 JAP_the_southern_colonies: "Южные колонии"
 JAP_the_southern_colonies_desc: "Несмотря на выход из Лиги Наций, мы сохраняем контроль над мандатом Южных морей. Для наших тихоокеанских интересов жизненно важно, чтобы все южные острова были должным образом развиты, а их жители знали своё место в Империи."
 JAP_develop_the_south: "Развивать Южные моря"
 JAP_develop_the_south_desc: "Хотя Тайвань и мандат финансово самостоятельны, предстоит ещё много работы. Силами наших поселенцев и администрации мы сможем создать больше возможностей для развития инфраструктуры и предпринимательства."
 JAP_stengthen_taiwan: "Укрепить Тайвань"
 JAP_stengthen_taiwan_desc: "Тайвань был первой колонией нашей империи и теперь является одной из важнейших. Он станет плацдармом для любого вторжения на юг. Поэтому его промышленное развитие будет усилено для поддержки наших сил."
 JAP_island_industry: "Поощрять промышленность на островах"
 JAP_island_industry_desc: "Инвестиции в Южные моря позволили значительно повысить их производительность. Соответствующая поддержка местной промышленности приведёт к заметному увеличению поставок товаров из региона."
 JAP_ease_native_restrictions: "Ослабить ограничения для туземцев"
 JAP_ease_native_restrictions_desc: "Ограничения, налагаемые нашей властью, вызвали недовольство среди коренного населения островов. Ослабив их, мы сможем создать более благоприятный образ подданства Империи."
 JAP_island_fortifications: "Островные укрепления"
 JAP_island_fortifications_desc: "Острова мандата — наши самые уязвимые владения. Хотя условия контроля запрещают их укрепление, было бы неразумно не воспользоваться этими непотопляемыми авианосцами."
 JAP_improve_ssdc: "Поддержать Nanyo Kohatsu"
 JAP_improve_ssdc_desc: "Учитывая очевидный успех Nanyo Kohatsu, флот решил продолжить финансирование компании. Это соглашение сделает наши экономические и developmental цели в южной части Тихого океана гораздо более выполнимыми."
 JAP_upgrade_nanyo_kohatsu_tt: "Изменить промышленного проектировщика §Y$south_seas_development$§! на: Фабрики товаров народного потребления: §Y-2.0%§! \nСкорость строительства §Yавиабаз§!: §G+5.00%§! \nСкорость строительства §Yвоенно-морских баз§!: §G+5.00%§! \nСкорость строительства §YПВО§!: §G+5.00%§! \n\n"
 JAP_foothold_in_timor: "Плацдарм на Тиморе"
 JAP_foothold_in_timor_desc: "Флот разработал план по прорыву голландской монополии на торговлю с Тимором. Используя компанию Nanyo Kohatsu, мы сможем продвигать наши стратегические цели в регионе, создавая совместные предприятия с местным населением."
 JAP_continue_truk_fortifications: "Продолжить укрепление Трука"
 JAP_continue_truk_fortifications_desc: "Лагуна Трук является главным оплотом Императорского флота в южной части Тихого океана. Усиление её укреплений и объектов будет способствовать обеспечению нашего господства в регионе."
 GER_bob: "Битва за Британию"
 GER_bob_desc: "Мы должны перенести боевые действия на территорию Соединённого Королевства и бомбардировками принудить его к капитуляции. Только мощная воздушная кампания сможет заставить Британию подписать мирный договор."
 HUN_arrow_cross_deal_2: "Укрепить Салаши"
 HUN_arrow_cross_deal_2_desc: "С объединением и консолидацией всех фашистских партий пришло время переименовать партию в последний раз: Партия скрещённых стрел. Ференц Салаши полностью контролирует все аспекты партии и через несколько недель станет официальным лидером Венгрии. Скрещённая стрела — древний символ племенной Венгрии, а также знак нашего намерения аннулировать Трианонский договор и расширить границы."
 HUN_fascism_warning_tt: "\nВенгрия останется неприсоединившейся, если до завершения этого фокуса не будут приняты §HУсиление фашистов§! или §HИзбрание фашистского короля§!!"
 HUN_enforce_corporatism_1: "Внедрить корпоративизм"
 HUN_enforce_corporatism_1_desc: "Наше новое общество сможет функционировать, только если каждый трудоспособный человек будет иметь свою задачу. У итальянцев есть отличная система, называемая корпоративизмом, которая делит общество на различные корпоративные группы по интересам. Внедрение этой системы позволит максимизировать выпуск продукции на заводах и перестроить общество по нашему усмотрению."
 HUN_consolidate_horthys_power_1: "Централизовать власть"
 HUN_consolidate_horthys_power_1_desc: "Венгрия уже более десяти лет является королевством без короля. Политическое напряжение, вызванное этим, достигло точки кипения, и если не принять меры, это может привести к краху системы. Мы должны обеспечить, чтобы [ROOT.GetLeader] не только сохранил, но и расширил свои полномочия для поддержания контроля твёрдой рукой в эти трудные времена."
 HUN_szalasi_ferenc: "Ференц Салаши"
 HUN_call_for_a_revisionist_king: "Новая династия"
 HUN_call_for_a_revisionist_king_desc: "Нация жаждет возвращения к былой славе. Габсбурги получили свой шанс и потерпели неудачу. Пришло время искать короля в другом месте. Мы должны предложить титул нашему нынешнему регенту Миклошу Хорти ввиду его героического статуса в глазах народа."
 HUN_ban_arrow_cross: "Заключить Салаши в тюрьму"
 HUN_ban_arrow_cross_desc: "Ференц Салаши доставил стране слишком много хлопот, чтобы оставаться на свободе. С момента запрета его первой партии, НАП, на него было заведено дюжина судебных дел. Из-за отсутствия доказательств эти дела откладывались достаточно долго, и наконец пришло время вынести окончательный вердикт: виновен."
 HUN_strengthen_the_regency_1: "Укрепить регентство"
 HUN_strengthen_the_regency_1_desc: "Миклош Хорти доказал всем, что он вполне способен руководить страной, не будучи официально королём. Мы не видим причин возвращать монархию, если правление Хорти полностью удовлетворяет потребности. Не будучи ни королём, ни диктатором, он может осторожно провести нас через грядущий политический хаос в Европе, не примыкая полностью ни к одной из сторон."
 HUN_arrow_cross_deal_1: "Договориться с фашистами"
 HUN_arrow_cross_deal_1_desc: "Мы примем фашистскую платформу Партии скрещённых стрел Ференца Салаши и будем сотрудничать с ними для восстановления утраченных территорий Венгрии. Мы больше не будем бороться с Партией скрещённых стрел и подавлять её."
 HUN_calvinist_tt: "Если до коронации королём Хорти не перейдёт в католицизм, это вызовет недовольство населения и знати!\n\n"
 HUN_coopt_fascists_tt: "\nЕсли мы не будем активно сотрудничать с фашистскими элементами и не включим их в свою структуру, нам придётся иметь дело с враждебным подпольным фашистским движением!\n\n"
 HUN_crown_king_1: "Короновать Хорти"
 HUN_crown_king_1_desc: "Миклош Хорти, наш нынешний регент, адмирал австро-венгерского флота, герой войны и народный лидер, станет новым королём Венгрии. С ним, наконец, после сотен лет правления иностранных королей, у страны появится венгерский король. Именно он поведёт нашу нацию к славе."
 HUN_convert_horthy: "Обращение Хорти"
 HUN_convert_horthy_desc: "Семья Хорти происходит из длинного рода кальвинистов. Если Хорти собирается основать новую королевскую и по-настоящему венгерскую династию, он должен сначала перейти в религию своего народа — католицизм."
 USA_fire_king: "Уволить Эрнеста Кинга"
 USA_fire_king_desc: "Англофобия Эрнеста Кинга вредит нашим отношениям с союзниками, а также приводит к поддержке проектов, оказавшихся неэффективными, таких как торпеда Mark 14."
 FRA_operation_dragoon: "Операция «Драгун»"
 FRA_operation_dragoon_desc: "Десантная операция на юге Франции может отвлечь немецкие части от Атлантического вала, сделав более серьёзное вторжение на севере Франции более вероятным."
 RAJ_indian_labor: "Индийские рабочие"
 RAJ_indian_labor_desc: "Британская империя обширна и отчаянно нуждается в рабочей силе для строительства дорог, укреплений и железных дорог для военных нужд."
 CAN_ford_general_motors: "Ford Canada"
 CAN_ford_general_motors_desc: "Расширение деятельности американской автомобильной компании «Ford Motor Company» увеличит наше производство грузовиков и полугусеничных бронетранспортёров."
 CAN_ford_general_motors_idea: "Ford Canada"
 SOV_rehabilitated_military_buffs_tt: "§YПри выборе:§!\nДобавляется §YМосковская стратегическая наступательная операция§!, предоставляющая (£attack_texticon  Атака дивизий: §G+20.0%§!) на §Y60§! дней.\n\n"
 ROM_modern_at_guns_2: "75-мм пушка «Решица» мод. 1943"
 ROM_modern_at_guns_2_desc: "75-мм пушка Resita образца 1943 года является выдающимся новшеством в противотанковом вооружении."

 HUN_hussar_doctrine: "Гусарская доктрина"
 HUN_hussar_doctrine_desc: "Скорость и манёвр — доктрина гусара, и такова же будет доктрина нашей армии."
 HUN_mechanized_hussars: "Современные гусары"
 HUN_mechanized_hussars_desc: "Моторизация — будущее мобильной пехоты."

 HUN_arpad_line: "Построить линию Арпада"
 HUN_arpad_line_desc: "Мы построим сеть лёгких укреплений по образцу линии Маннергейма в Карпатских горах, следуя теории «гибкой обороны» генерала Хароши."
 HUN_arpad_line_tt: "Мы откроем решения для строительства оборонительной линии вдоль Карпатского хребта.\n\n"
 HUN_theory_of_flexible_defence: "Теория гибкой обороны"
 HUN_theory_of_flexible_defence_desc: "Генерал Теофил Хароши разработал новую теорию оборонительной войны. Гибкая оборона перекрывала только возможные линии снабжения, поэтому противник мог обойти укреплённую линию, но каждая группа без снабжения быстро оставалась без боеприпасов и продовольствия."
 HUN_study_rocket_designs: "Изучить немецкие ракетные разработки"
 HUN_study_rocket_designs_desc: "Достижения немецких учёных в области ракетостроения должны быть тщательно изучены, чтобы перенять опыт и создать на их основе реактивную артиллерию."
 poglavnik: "Поглавник"
 HUN_militarize_the_levente: "Милитаризовать Levente"
 HUN_militarize_the_levente_desc: "Ассоциации Levente — это наш способ обойти Трианонский договор, поставив сотни тысяч молодых людей под руководство и обучение ветеранов без формального увеличения численности вооружённых сил. Милитаризация этого движения значительно увеличит наши людские ресурсы."
 HUN_increase_metal_processing_capacity: "Увеличить мощность по переработке металла"
 HUN_increase_metal_processing_capacity_desc: "Чем больше руды мы добудем, тем больше металла нужно переработать."
 HUN_invest_in_north_transylvanian_mining: "Инвестировать в горнодобычу Северной Трансильвании"
 HUN_invest_in_north_transylvanian_mining_desc: "Трансильвания имеет богатую историю горного дела, уходящую вглубь веков. Даже если добываемые ресурсы не пригодятся напрямую военным заводам, добытые полезные ископаемые всё равно внесут значительный вклад в экономику."
 HUN_support_urbanization_2: "Развитие Будапешта"
 HUN_support_urbanization_2_desc: "Следует сосредоточить усилия на превращении Будапешта в город мирового класса."
 HUN_mountain_artillery: "Горная артиллерия"
 HUN_mountain_artillery_desc: "Наши границы с Советским Союзом изобилуют горами и холмами. Мы должны научиться действовать там артиллерией, чтобы защитить Венгрию."
 CRO_nuclear_effort: "Мощь Томислава"
 CRO_nuclear_effort_desc: "Зайдут ли физики слишком далеко?"
 ROM_national_christian_party_ii: "Славься Октавиан!"
 ROM_national_christian_party_ii_desc: "НХП под руководством Октавиана Гоги наконец реализует волю румынского народа."
 CRO_italian_influence_focus_desc: "Наши связи с Италией сейчас крепче, чем когда-либо."
 CRO_recovery_teams: "Команды по восстановлению"
 CRO_recovery_teams_desc: "Чтобы сократить потери снаряжения, нам необходимо организовать группы для сбора оружия и техники на полях сражений."
 CRO_prospect_for_resources: "Разведка ресурсов"
 CRO_prospect_for_resources_desc: "Наша земля хранит ресурсы, которые помогут в борьбе нашего времени. Мы должны как можно скорее их освободить и использовать наилучшим образом."
 CRO_industrial_planning: "Промышленное планирование"
 CRO_industrial_planning_desc: "Чтобы продолжать наше промышленное развитие, мы должны разработать долгосрочные стратегии и найти подходящие земли."
 CRO_secret_preparations: "Тайное формирование ополчения усташей"
 CRO_secret_preparations_desc: "Мы тайно свяжемся с немецким послом и заявим, что народ Хорватии желает отделиться от Югославии. Мы надеемся, что Германия поможет нам в этом начинании."
 FIN_petsamo: "Освободить Петсамо!"
 FIN_petsamo_desc: "Финны Саллы будут освобождены от советской оккупации!"
 GER_weserubung2: "Операция «Везерюбунг» (Норвегия)"
 GER_weserubung2_desc: "Обеспечив контроль над Данией, наша армия может безопасно вторгнуться в Норвегию и оккупировать её."
 lower_air_purge_tt: "Штраф к эффективности воздушных миссий от чисток уменьшится на 5%"
 lower_air_purge2_tt: "Штраф к эффективности воздушных миссий от чисток уменьшится на 2,5%"
