 raj_investor_relations_desc: "Иностранные инвесторы, пригласившиеся на новый индийский рынок, сразу нашли желаемую прибыль. Хотя безусловно, амбиции, и с ними ожидания, растут, и если мы не сможем их удовлетворить, поток инвестиций может прекратиться.\n\n  Их текущая позиция — [RAJ.GetInvestorRelations].\n  В связи с этим текущий интервал инвестиций:\n   [?RAJ.investors_timeout|Y0] дней (+[?RAJ.num_of_investments_days] из-за количества инвестиций)\n  и бонус скорости строительства конкретных зданий составляет [?RAJ.investor_bonus|G%2].\n"
