 EFR_sign_the_armistice_tt: "§RЭтот фокус будет завершён после капитуляции Франции.§!"
 
 EFR_reichskommissariat_frankreich_tt1: "§RЭтот фокус может быть завершён, когда Германия определит условия перемирия.§!"
 EFR_reichskommissariat_frankreich_tt: "Мы учредим §YReichskommissariat§! на §Yвсей территории Франции.§! \n\n§CГермания сможет определять нашу экономическую политику.§! \n\n(Германия получит решения для изъятия заводов у игрока за Виши.)"
 
 EFR_vichy_france_tt1: "§RЭтот фокус может быть завершён, когда Германия определит условия перемирия.§!"
 EFR_vichy_france_tt: "Мы учредим §Y«Свободную зону»§! в §Yрегионе Северной Франции.§! \n\n§CВ этом регионе мы сможем сохранить нашу автономию.§!"
 
 EFR_emergency_powers_to_petain_tt: "§YМы предоставим Петену чрезвычайные полномочия, чтобы вывести нашу страну из кризиса!§! \n\n(Этот фокус создаст новое дерево фокусов. Для вступления в силу может потребоваться несколько дней.)"
 
 pick_first_spain_tt: "Выбор этой стороны до противоположной даст вам 4 единицы, в противном случае вы получите 2 единицы."
 
 DDR_exile_the_disloyal_generals_tt: "Ссылка нелояльных генералов в колонии вместо подавления бунтов поможет нашей базе сторонников, но они смогут действовать более свободно. \n\n§CНационалисты будут лучше организованы. Они начнут с идеей, действующей 90 дней, которая даст им бонусы.§!"
 DDR_disperse_the_leftist_militants_tt: "Разгон левых масс, лояльных нам, обеспечит удовлетворённость правых, но будет стоить нам ценной поддержки."
 
 DDR_ignore_the_seizures_tt: "Игнорирование призывов о помощи землевладельцев и среднего класса будет полезно для нашего имиджа, но они перейдут на сторону националистов. \n\n§CНационалисты получат 2 военных и 2 гражданских завода в начале войны.§!"
 DDR_stop_illegal_land_seizures_tt: "Помощь землевладельцам и среднему классу в защите их земель, безусловно, заставит их пока сохранять нейтралитет, но будет стоить нам поддержки левых."
 
 DDR_arrest_primo_de_rivera_tt: "Арест Примо де Риверы, безусловно, ограничит ущерб от его фалангистских головорезов. Но эти боевики помогут делу националистов. \n\n§CНационалисты получат 4 дополнительных парамилитарных дивизии в начале войны.§!"
 DDR_let_the_falangist_be_tt: "Оставление фалангистов в покое, безусловно, поставит их в более нейтральное положение, однако наша поддержка радикальных левых значительно сократится."
 
 DDR_impeach_niceto_alcala_zamora_tt: "Импичмент действующего президента позволит нам привести к власти нашего человека, но это уничтожит любую оставшуюся легитимность Республики. \n\n§CНационалисты получат 10 дополнительных единиц стабильности и поддержки войны в начале войны.§!"
 DDR_let_niceto_alcala_zamora_be_tt: "Импичмент действующего президента будет катастрофическим для нашей Республики. Это может ослабить наши политические позиции, но мы позволим ему остаться."
 
 DDR_coup_d_etat_tt: "§YДля работы этого фокуса в правилах игры должен быть включён «Гражданская война в Испании»!§!"
 
 DDR_the_question_of_anarchists_tt: "Радикальные левые коммуны, базирующиеся в Барселоне, отказались сотрудничать с нами. §YМы насильственно их интегрируем.§!"
 DDR_the_question_of_basque_tt: "Сепаратистские группы, собравшиеся вокруг Басков, отказались сотрудничать с нами. §YМы насильственно их интегрируем.§!"
 
 DDR_winners_of_the_1936_elections_tt: "Испания медленно подходит к точке кипения. Мы должны быть готовы любой §Rценой.§! \n\n§C(За этот фокус мы получим 1,5 млн людских ресурсов и снаряжение для 80 дивизий.)§!"
 
 SPR_assemble_junta_de_generales_scw_on_tt: "Республика подвела общественность. Мы должны готовиться любой §Rценой.§! \n\n§C(За этот фокус мы получим 1,5 млн людских ресурсов и снаряжение для 60 дивизий. Некоторые фокусы будут сокращены до 35 дней.)§!"
 SPR_assemble_junta_de_generales_scw_off_tt: "Республика подвела общественность. Мы должны готовиться любой §Rценой.§! \n\n§C(Гражданская война в Испании отключена. Этот фокус обойдёт все ненужные фокусы.)§!"
 
 SPR_securing_northern_garrisons_tt: "Мы сначала обеспечим гарнизоны и офицеров северных гарнизонов и укрепим над ними контроль. \n\n§CС началом войны мы получим 6 дивизий из различных северных регионов.§!"
 SPR_secure_madrid_and_barcelona_garrisons_tt: "Наш контроль над Мадридом и Барселоной, мягко говоря, сомнителен. Мы должны усилить наш контроль над этими регионами. \n\n§CС началом войны мы получим 6 дивизий, которые появятся в Мадриде и Барселоне.§!"
 
 SPR_negotiate_with_requetes_tt: "Заручиться поддержкой опытных карлистских парамилитаристов было бы отлично для наших военных усилий! \n\n§CС началом войны мы получим 2 опытные дивизии.§!"
 SPR_negotiate_with_falangists_tt: "Заручиться поддержкой гражданских фалангистских ополчений гарантирует, что на наших линиях будет достаточно людей. \n\n§CС началом войны мы получим 4 опытные дивизии.§!"
 
 SPR_seize_the_regional_armories_tt: "Мы нацелимся на оружейные склады и склады снабжения, когда начнём наш заговор! \n\n§CС началом войны мы получим 4 военных завода.§!"
 SPR_infiltrate_regional_unions_tt: "Мы внедримся в профсоюзы и рабочие союзы, прежде чем начнём заговор, и дезорганизуем их производство! \n\n§CС началом войны мы дадим республиканцам идею на 90 дней, которая сильно ограничит их производственные возможности.§!"
 
 SPR_the_dragon_rapide_tt: "Нам нужно как можно быстрее доставить Франко с Канарских островов. Нам помогут несколько агентов SIS. \n\n§CС началом войны мы получим 30-дневный бонус к характеристикам.§!"
 SPR_instrucciones_reservadas_tt: "Генерал Мола поручил нам проводить кампании террора по всему полуострову. \n\n§CС началом войны республиканская Испания потеряет 5% стабильности и поддержки войны.§!"
 
 SPR_consequences_of_the_war_tt1: "Наша страна лежит в руинах из-за гражданской войны. Мы должны объединить Испанию! \n\n§C(Все бонусы Гражданской войны будут сброшены.)§!"
 SPR_consequences_of_the_war_tt: "Наша страна лежит в руинах из-за гражданской войны. Мы должны объединить Испанию!"
 
 SPR_volunteer_forces_tt: "Мы не будем сохранять нейтральную позицию и отправим наши добровольческие силы в Ось. \n\n§C(Все штрафы для армии будут сняты.)§!"
 
 SPR_grant_amnesty_to_the_defeated_tt: "Мы предоставим амнистию нашим заблудшим соотечественникам и используем их с пользой."
 
 SPR_the_law_of_political_responsibilities_tt: "Люди должны нести ответственность за свои политические взгляды. Массы будут перевоспитаны любой ценой."
 
 SPR_decree_of_unification_tt: "Мы объединим дезорганизованные карлистские и фалангистские силы под нашей регулярной армией! \n\n§C(Решение «Запланированное наступление» будет улучшено.)§!"
 SPR_keep_the_paramilitaries_tt: "Мы оставим дезорганизованные карлистские и фалангистские силы отдельно от нашей регулярной армии. \n\n§C(Идеи «Запланированного наступления» будут стоить дешевле.)§!"
 
 DDR_keep_the_militias_seperate_tt: "Мы объединим дезорганизованные анархистские и республиканские силы под нашей регулярной армией! \n\n§C(Решение «Запланированное наступление» будет улучшено.)§!"
 DDR_merge_with_the_militias_tt: "Мы оставим дезорганизованные анархистские и республиканские силы отдельно от нашей регулярной армии. \n\n§C(Идеи «Запланированного наступления» будут стоить дешевле.)§!"
 
 SPR_end_neutrality_towards_allies_tt: "Прекращение нейтралитета приведёт к серьёзным морским блокадам и экономическим потрясениям в нашей стране."
 
 SPR_policy_of_non_belligerence_tt: "§C(Все штрафы для армии будут сняты.)§!"
 
 SPR_consequences_of_the_war_available_tt: "§RЭтот фокус будет автоматически завершён через событие 1 апреля 1939 года или после окончания Гражданской войны в Испании!§!"
 coup_available_tt: "§RЭтот фокус будет автоматически завершён через событие 17 июля 1936 года§!"

