 SLO_security_divisions: "Охранные дивизии"
 SLO_security_divisions_desc: "Охранная пехотная дивизия использовалась главным образом в охранных и антипартизанских операциях в тыловых районах немецких линий. Изначально охранная дивизия применялась для зачистки очагов советского сопротивления, которые немцы миновали при продвижении на восток. Позднее Словацкая охранная дивизия использовалась в антипартизанских операциях в районе Житомира."
 SLO_soviet_war: "На Кавказ!"
 SLO_soviet_war_desc: "2 октября 1941 года Быстрая дивизия входила в состав 1-й танковой армии, сражавшейся на восточном берегу Днепра в районе Перещепино. К тому времени дивизия потеряла почти все свои танки. Дивизия участвовала в продвижении немцев в Кавказский регион в начале 1942 года, где сыграла жизненно важную роль в штурме и захвате Ростова."
 SLO_hlinka_chad: "Глинкова гвардия"
 SLO_hlinka_chad_desc: "Глинкова гвардия была ополчением, которое содержалось Словацкой народной партией в период с 1938 по 1945 годы. Она была названа в честь Андрея Глинки, словацкого католического священника и общественного деятеля."
 SLO_hlinka_youth: "Глинкова молодёжь"
 SLO_hlinka_youth_desc: "Подобно Глинковой гвардии, Глинкова молодёжь также была организацией, подведомственной HSPP. Она была сформирована как единая общенациональная организация после роспуска и реорганизации молодёжных объединений и организаций в 1938 году. Символически верховным командующим был Йозеф Тисо, но главным командиром в период с 1940 по 1945 год был Алойз Мацек."
 SLO_na_straz: "Na stráž"
 SLO_na_straz_desc: "«Na stráž» — чешская и словацкая фраза, ассоциирующаяся с ультраправой политикой в Словакии. Она описывалась как «словацкая версия Heil Hitler». В эпоху Словацкого государства эта фраза неофициально использовалась как приветствие членами Глинковой гвардии."
 SLO_expand_hlinka_youth: "Расширение Глинковой молодёжи"
 SLO_expand_hlinka_youth_desc: "Первоначально Глинкова молодёжь была организацией только для мальчиков, но позже появилось также отделение для девочек."
 ger_mechanised_infantry: "Базовые немецкие полугусеничные бронетранспортёры"
 SLO_southern_slovakia_tt: "Если Первый Венский арбитраж не состоялся:\n§YЮжная Словакия:§!\n   Добавление §Y2 заводов гражданской продукции§!\n§YГерманский рейх§!: Очки политической власти §G+100§!"
 SLO_spawn_mot: "Моторизованные дивизии"
 SLO_hitlers_demands: "Выполнить требования Гитлера"
 SLO_hitlers_demands_desc: "В условиях всё возрастающих требований к людским ресурсам в этой гигантской борьбе Гитлер отдал приказ призвать каждого доступного мужчину."
 SLO_men_in_black: "Люди в чёрном"
 SLO_men_in_black_desc: ""
 SLO_heydrich_focus: "Пригласить Гейдриха возглавить нашу страну"
 SLO_heydrich_focus_desc: ""
 SLO_decree: "Судетский декрет"
 SLO_decree_desc: ""
 SLO_martial_law: "Ввести комендантский час"
 SLO_martial_law_desc: ""
 SLO_nuke: "Испытания атомной бомбы"
 SLO_nuke_desc: ""
 MAN_pacify_the_countrysidex: "Наведение порядка в стране"
 MAN_pacify_the_countrysidex_desc: "Как только мы пришли к власти, многочисленные бандиты и повстанцы стали пытаться установить контроль над удаленными регионами страны. Чтобы показать серьезность своих намерений, мы должны избавиться от террористов и продемонстрировать народу, что мы способны поддерживать законность."
 MAN_law_universityx: "Юридический университет"
 MAN_law_universityx_desc: "Наша страна только-только сформировалась, а потому у нас есть уникальная возможность выстроить с нуля новую систему законов на основе наиболее современных теорий государственности. Для этого мы создадим учреждение, под крышей которого соберутся лучшие умы Азии."
 MAN_research_and_education_departmentx: "Наука и образование"
 MAN_research_and_education_departmentx_desc: "Вместе с ростом страны мы должны обеспечить развитие и в вопросах науки и образования. Нужно приложить все усилия для того, чтобы научный прогресс шел в наиболее важном для нас направлении."
 MAN_trade_delegationx: "Обмен опытом"
 MAN_trade_delegationx_desc: "Мы ощутимо отстаем от всего мира в вопросах промышленного развития. Следует отправить делегацию, которая изучит иностранные методики и выработает способы улучшения наших собственных."
 MAN_expand_the_textile_industryx: "Упор на текстильную промышленность"
 MAN_expand_the_textile_industryx_desc: "Текстильная промышленность исторически очень важна для нас. Привлечь иностранный капитал для ее развития будет проще всего."
 MAN_obediencex: "Послушание"
 MAN_obediencex_desc: "Некоторые называют нас марионетками Японии, но причиной тому коренное непонимание наших тесных — и равноправных — отношений. Выступать против наших благодетелей — уподобиться неразумному дитя, спорящему со своими родителями."
 MAN_mukden_military_academy_idea: "Мукденская военная академия"
 MAN_mukden_military_academyx_desc: ""
 MAN_army_modernizationx: "Модернизация армии"
 IRQ_retool_the_army: "Переоснащение армии"
 IRQ_retool_the_army_desc: "Армия не оснащена надлежащим снаряжением, необходимо принять срочные меры для исправления ситуации."
 MAN_five_people_armiesx: "Армия пяти народов"
 MAN_five_people_armiesx_desc: "Если все граждане равны, то каждый из них должен быть в равной степени готов защищать родину от внешних врагов."
 MAN_showa_steel_desc: "Мы можем с помощью Японии развить наш сталелитейный завод в Ляодуне до крупнейшего в Восточной Азии."
 IRQ_revolution3: "Кровь превыше королевской власти"
 IRQ_revolution4: "Возвращение муфтия"
 IRQ_revolution5: "Воссоединение наших родственников"
 IRQ_revolution6: "Интеграция древних земель"
 IRQ_revolution7: "Провозглашение империи"
 ALB_TO_IRQ_fascism: "Ирак «Золотого квадрата»"
 IRQ_revolution: "Штурм RAF Хаббания"
 IRQ_revolution_desc: ""
 IRQ_ita_revolution: "Меч ислама шествует на восток"
 IRQ_ita_revolution_desc: ""
 IRQ_eco1: "Национализация британских инвестиций"
 IRQ_eco1_desc: "Мы получим компенсацию за десятилетия грабежа со стороны британцев, конфисковав их собственность."
 IRQ_eco3_desc: "Мы получим компенсацию за десятилетия грабежа со стороны британцев, конфисковав их собственность."
 IRQ_the_golden_square_coup: "Переворот Золотого квадрата"
 IRQ_the_golden_square_coup_desc: "Долгое время англосаксы занимали наши земли, выкачивая нашу драгоценную нефть и порабощая нас в угоду своим корпорациям. Наша упадочная монархия слаба и не отражает интересов нации. Нам следует свергнуть этого никчёмного лидера и поставить сильного человека, приверженного фашистским принципам, чтобы вести нашу нацию к величию!"
 IRQ_army_doctrine5: "Поднять народ"
 IRQ_army_doctrine5_desc: "Мы сплотим нашу нацию против англосаксонской угрозы!"
 IRQ_eco2: "Земельная реформа"
 IRQ_army_doctrine4: "Молодёжь «Аль-Футувва»"
 IRQ_army_doctrine4_desc: "Мы будем воспитывать нашу молодёжь в духе наших идеалов фашизма и панарабизма."
 IRQ_army_doctrine: "Новая военная доктрина"
 IRQ_army_doctrine2: "Ускорение разработки доктрин"
 IRQ_army_doctrine2_desc: "Война — лучший учитель."
 IRQ_army_doctrine3: "Республиканская гвардия"
 IRQ_army_doctrine3_desc: "Лучшие из лучших, прямо в нашей столице."
 IRQ_army_doctrine_desc: "У нас нет хороших военных теоретиков, и мы застряли на устаревшей тактике Великой войны. Мы должны нанять иностранца, чтобы он обучил нас военному искусству."
 ITA_align_iraq: "Разжигание иракского национализма"
 ITA_align_iraq_desc: "Мы должны позиционировать себя как «освободителей» по отношению к местному про-Оси иракскому правительству, чтобы завербовать их силы для нашего дела."
 RAJ_hyderabad_rails: "Железные дороги Хайдарабада"
 RAJ_hyderabad_rails_desc: "Мы будем развивать железные дороги в центральной Индии."
 RAJ_pakistani_rails: "Проложить дороги в Центральную Азию"
 RAJ_pakistani_rails_desc: "Мы будем развивать нашу инфраструктуру, ведущую в Афганистан и Иран."
 RAJ_gujarat_rails: "Развитие гуджаратского судоходства"
 RAJ_gujarat_rails_desc: "Мы сделаем Бомбей главным портом, через который будут проходить все наши товары."
 BUL_sign_salonika_agreement: "Подписание Салоникского соглашения"
 BUL_ignore_treaty_neuilly_sur_seine: "Игнорирование Нёйиского договора"
 BUL_vmz_sopot: "VMZ Сопот"
 ETH_army_reform: "Реформы колониальной армии"
 ETH_army_reform_desc: "Наши вооружённые силы отчаянно нуждаются в реформах сверху донизу: как в командной структуре, так и в организации дивизий."
 BUL_krali_marko_line: "Линия Крали Марко"
 BUL_prosveta_publishing_house: "Издательство «Просвета»"
 FIN_prepare_for_war: "Готовиться к войне"
 FIN_prepare_for_war_desc: "Мы не можем позволить себе быть застигнутыми врасплох в случае иностранного вторжения. Лучше произвести военное снаряжение, которое никогда не понадобится, чем испытывать его нехватку, когда оно наиболее необходимо."
 FIN_develop_the_war_machine: "Развитие Maavoimat"
 FIN_develop_the_war_machine_desc: "Увеличение производства военной техники поможет защитить наш суверенитет. Некоторые уже начали обсуждать более агрессивную позицию."
 BUL_girdap: "Гирдап"
 BUL_local_antitank_innovation: "Местные противотанковые разработки"
 BUL_interventionism: "Интервенционизм"
 BUL_dedication_to_the_axis_desc: "Наша преданность Оси приносит плоды: наша страна, кажется, всё больше поддерживает фашизм. Христо Луков был бы мудрым выбором, когда мы будем избирать нашего лидера."
 BUL_the_wrong_axis_desc: "Похоже, мы выбрали не тот альянс. Державы Оси недостаточно сильны, чтобы защитить нас, а мы сохранили советских дипломатов. Пришло время воспользоваться ими."
 BUL_negotiate_with_the_soviets_desc: "Пора начать переговоры с Советами о возможном вступлении в Коминтерн. Мы должны обеспечить собственное выживание раньше, чем немецкое, и Советы могут в этом помочь."
 BUL_align_with_the_west_desc: "Перед лицом непосредственных угроз в Европе наша единственная зона безопасности — в Союзниках, под защитой Западной Европы."
 BUL_appease_the_allies_desc: "Союзники дали понять, что поддерживают Николу Мушанова в качестве премьер-министра с его Демократической партией. Установление режима Мушанова значительно поможет нашему делу."
 BUL_deal_with_the_allies_desc: "Больше никаких тёмных закулисных сделок — мир может знать, что Болгария теперь официальный член Союзников, к вящей пользе."
 BUL_balkan_alignment_desc: "Чтобы продвигать нашу повестку, следует провести некоторые изменения в ориентации. Либо мы сближаемся с Балканами, либо мы сближаем... Балканы."
 BUL_befriend_greece_desc: "Нашему десятилетнему соперничеству с Грецией пора положить конец. Всё это было забавно, но сейчас время объединиться."
 BUL_befriend_romania_desc: "Наш северный сосед, Румыния, не слишком нас жалует. Пора это изменить, чтобы Балканы держались вместе и не были разбиты поодиночке."
 BUL_formalise_the_balkan_entente_desc: "Участие в системе Антанты — это хорошо, но стоит его подтвердить, чтобы мы могли противостоять тем, кто стремится вторгнуться к нам."
 BUL_alliance_with_the_entente_desc: "Теперь, когда мы умиротворили Югославию, Румынию и Грецию, следует рассмотреть вступление в Балканскую Антанту. Балканская Антанта сохранит нашу силу."
 BUL_albanian_inheritance_desc: "Албания не только славянская, но и некогда входила в состав великих Болгарских империй. Пора исправить ситуацию и напомнить им, что их независимость зависит от нашей милости."
 BUL_local_armour_acquirements_desc: "Вместо того чтобы полагаться на внешние источники бронированной техники, нам следует разработать и производить собственную. Так мы всегда будем в безопасности."
 BUL_over_the_balkans_desc: "Горно-стрелковые дивизии весьма полезны на Балканах. Их исследование и развёртывание принесут нам огромную пользу в долгосрочной перспективе."
 BUL_protect_the_balkans_desc: "Чтобы защитить Балканы, нам нужно построить непреодолимую линию фортов и обеспечить их прикрытие нашими войсками."
 BUL_girdap_desc: "Нам следует получить финансирование от банка «Гирдап» в Болгарии; он может профинансировать многие правительственные проекты и оказать поддержку в тех областях, где мы менее склонны помогать."
 BUL_across_the_land_desc: "Следует модернизировать инфраструктуру по всей стране. В нынешнем виде наши дороги не блещут, и для поддержки будущих армейских перемещений это хорошее начало."
 BUL_bulgarian_electronics_desc: "Исследования в области электроники — это шаг в будущее. Нам следует реализовать планы по вступлению в это будущее."
 BUL_steel_exports_desc: "Хотя Болгария не обладает огромными запасами стали, их достаточно для удовлетворения потребностей страны и даже для экспорта, пусть и минимального."
 BUL_global_detection_desc: "Следующий шаг модернизации — РАДАР; масштабное вещание выведет Болгарию в будущее, начиная с установки крупного передатчика в Вакареле."
 BUL_institute_for_nuclear_research_desc: "Если Болгария хочет идти в ногу со временем, крайне важно начать собственные исследования ядерной энергии."
 BUL_jet_fighters_desc: "Хотя наши старые истребители пока удовлетворяют потребности армии, так будет не всегда. А что может быть лучше скачка вперёд?"
 BUL_derhavna_samoletna_fabrika_desc: "«Державна самолетна фабрика» — это польский завод, созданный в Болгарии для производства нескольких польских истребителей на месте для болгарской армии."
 BUL_retake_thrace_desc: "Фракия по праву наша! До Второй Балканской войны Фракия была болгарской землёй, и эти грязные греки украли её у нас! Мы должны вернуть её любой ценой!"
 BUL_soviet_t_34_desc: "Если мы собираемся получить советские технологии, то заполучим Т-34, их основной боевой танк. Мы приложим усилия для его приобретения."
 BUL_bulgarian_dars_desc: "Болгарская компания DAR построила немало учебных самолётов в прошлом. Возможно, мы могли бы использовать эти тренажёры для полётов наших пилотов и получения опыта."
 BUL_dismantle_the_government_desc: "Правительство предало царя Бориса! Нам нужно устранить оппозицию, прежде чем они попытаются совершить государственный переворот!"
 BUL_depose_the_king_desc: "Пора наконец устранить лжецаря. Он больше не заслуживает руководить Болгарией."
 BUL_local_antitank_innovation_desc: "Как страна, Болгария не может производить танки достаточно хорошо, чтобы противостоять другим странам, поэтому нам нужно искать другие методы борьбы с танками."
 BUL_interventionism_desc: "Настало наше время сделать мир безопасным. Победив его так много в прошлом, мы получаем шанс искупить себя."

 BUL_vrazhdebna_airfield_desc: "Нашим ВВС нужен аэродром, а для этого необходимо выделить землю под его строительство. По указу правительства он будет построен."
 BUL_bulgarian_revanchism_desc: "Нам нужно действовать в ответ на потери в Великой войне и снова обеспечить болгарский путь к величию."
 BUL_demand_dobrudja_desc: "Добруджа по праву наша, и Румыния несправедливо отняла её у нас в результате Великой войны и Балканских войн."
 BUL_our_brothers_in_macedonia_desc: "Вардарская Македония по праву болгарская, и мы можем вдохновить их на борьбу с югославским правительством."
 BUL_deal_with_germany_desc: "Говорят, у немцев есть планы вторгнуться в Югославию, что ставит нас в идеальное положение для получения Македонии от Германии."
 BUL_yugoslavia_for_ourselves_desc: "Мы не будем делить Югославию; они славяне и должны объединиться с Болгарией."
 BUL_return_to_the_aegan_desc: "Эгейское море когда-то было в нашей сфере влияния; мы снова обеспечим его для Великой Болгарии."
 BUL_enemy_of_my_enemy_desc: "Итальянцы могут помочь нам отвоевать Фракию у Греции. Когда Италия вторгнется, мы сможем запросить контроль над Фракией и восстановить нашу былую империю шаг за шагом."
 BUL_fleet_of_the_aegan_desc: "Чтобы обеспечить контроль над Средиземноморьем и иметь больше власти на море, необходимо начать строительство флота в Средиземном море."
 BUL_anti_air_defence_of_sofia_desc: "Чтобы предотвратить возможные смертоносные бомбардировки столицы, необходимо установить средства ПВО в Софии."
 BUL_befriend_turkey_desc: "В попытке сдружиться с Антантой нам следует подружиться с Турцией."
 BUL_cut_ties_with_germany_desc: "Союзники сказали, что помогут нам, если мы полностью разорвём связи с Германией; Болгарии пора встать на ноги."
 BUL_protect_bulgaria_desc: "Для самообороны вдоль границ следует построить линию фортов. Они помогут нам против любых будущих вторжений."
 BUL_agrarian_utopia_desc: "Болгария состоит в основном из крестьян и аграриев; мы могли бы использовать это в нашем стремлении к коммунизму."
 BUL_slavic_confederation_desc: "Вместо вступления в СССР мы могли бы лучше всего проявить своё влияние здесь, на Балканах, объединившись с соседями и показав им правильный путь."
 BUL_macedonian_literary_circle_desc: "Коммунисты в нашем правительстве создали так называемый Македонский литературный кружок для продвижения македонцев; теперь мы используем его для общего прогресса."
 BUL_support_urbanisation_desc: "У нас больше нет места для строительства; следует освободить немного пространства."
 BUL_synthetic_experiments_desc: "К сожалению, мы не можем вечно полагаться на внешний мир в торговле, особенно в случае войны. Следует попытаться производить синтетические ресурсы."
 BUL_better_excavation_equipment_desc: "Наше экскавационное оборудование устарело; мы можем и должны его улучшить!"
 BUL_buy_from_britain_desc: "Возможно, британцы позволят нам купить у них снаряжение, а также у других Союзников. Если мы сможем покупать у большего числа стран, у нас будет доступ к большему количеству снаряжения, верно?"
 BUL_support_macedonian_industry_desc: "Наш македонский сателлит нуждается в поддержке индустриализации; мы должны помочь ему, и в итоге он будет полезнее нам."
 BUL_the_macedonian_question_desc: "Македонцы в целом являются проблемой в Болгарии, и мы должны найти способ её урегулировать."
 BUL_mechanised_effort_desc: "Мы слишком долго использовали моторизованную технику; пора переходить к следующему этапу — механизированной!"
 BUL_local_factories_desc: "Если мы хотим производить местные товары, разве у нас не должно быть для этого заводов? Правительство может расчистить старые здания, и мы сможем сделать из них заводы."
 BUL_support_equipment_desc: "Болгарская армия нуждается в вспомогательном снаряжении! Одними винтовками грядущее не выиграть."
   
 BUL_may_provoke_aggression: "§RЭто может спровоцировать македонскую агрессию.§!"
 bogdan_filov_leader: "Богдан Филов избран на пост"
 boris_iii_leader: "Борис III назначен верховным правителем"
 BUL_permit_german_access_tt: "Разрешить доступ немецких войск в Болгарию."
