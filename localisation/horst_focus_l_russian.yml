 RAJ_a_new_indian_elite: "Новая индийская элита"
 RAJ_british_departure: "Отток британцев"
 RAJ_british_departure_desc: "Поскольку британская власть быстро распадается, пора воспользоваться моментом и реформировать нашу политическую систему."
 RAJ_assemble_the_congress: "Созвать конгресс"
 RAJ_assemble_the_congress_desc: "Обеспечив свободу от Британии, индийский конгресс должен собраться и обсудить реформы."
 RAJ_concessions_to_the_untouchables: "Уступки неприкасаемым"
 RAJ_concessions_to_the_untouchables_desc: "Неприкасаемые, самая низшая кастовая группа, презираемая обществом, представляют популярную силу, которую следует признать. Движение, возглавляемое Бхимрао Рамджи Амбедкаром, может разрушить общественный строй, если его игнорировать. Сейчас ясно, что практические уступки легче воплотить, чем попытки обратить их в ислам, христианство или атеистический коммунизм."
 RAJ_modernization_program: "Программа модернизации"
 RAJ_modernization_program_desc: "Сняв колониальные монополии, можно построить новую экономику. К 2020‑му году мы станем сверхдержавой!"
 RAJ_a_new_indian_elite_focus: "Новая индийская элита"
 RAJ_a_new_indian_elite_focus_desc: "Индийские промышленники уже работали в колониальный период, но под ограничениями. С исчезновением британского владычества пришло время поднять индийскую элиту."
 RAJ_towards_a_post_colonial_economy: "К постколониальной экономике"
 RAJ_towards_a_post_colonial_economy_desc: "Экономические реформы и раскрытие индийского потенциала приведут к росту индийского бизнеса."
 RAJ_influence_of_the_radicals: "Влияние радикалов"
 RAJ_influence_of_the_radicals_desc: "Радикалы Всеиндийского прогрессивного блока становятся всё активнее и бросают вызов ненасильственной доктрине конгресса."
 RAJ_indian_socialism: "Индийский социализм"
 RAJ_indian_socialism_desc: "Цель – построить общую индийскую общность, где религия и касты не разделяют нас, что приведёт к светлому будущему."
 RAJ_religious_equality: "Религиозное равенство"
 RAJ_religious_equality_desc: "Марксизм требует отмены религии, но пока мы не можем этого сделать; хотя бы устраним её как фактор общественного раскола."
 RAJ_popular_mobilization: "Народная мобилизация"
 RAJ_popular_mobilization_desc: "Объединив обездоленных далитов, бедных крестьян и эксплуатируемых кули, мы создаём политически осознанный народ, готовый защищать новую Индию. Пора сформировать армию для её обороны."
 RAJ_collectivism: "Коллективизм"
 RAJ_land_reform: "Земельная реформа"
 RAJ_land_reform_desc: "Перераспределить землю!"
 RAJ_modernized_agriculture: "Модернизация сельского хозяйства"
 RAJ_modernized_agriculture_desc: "С тракторами в полях потребуется меньше крестьян для поддержания продуктивности."
 RAJ_collectivism_desc: "Мы всё ещё страдаем от последствий колониального гнёта, но объединив наши ресурсы, сможем быстрее модернизировать общество."
 RAJ_support_anti_imperialism_in_china: "Поддержка Китая"
 RAJ_support_anti_imperialism_in_china_desc: "Китай должен быть защищён! Мы обязаны поддерживать связь с Китаем, чтобы обеспечить его будущее."
 RAJ_increased_chinese_cooperation: "Усиление сотрудничества с Китаем"
 RAJ_increased_chinese_cooperation_desc: "Чтобы защитить Азию, давайте поддержим Китай и присоединимся к его военным усилиям!"
 RAJ_join_the_comintern: "Вступить в Коминтерн"
 RAJ_join_the_comintern_desc: "Как коммунистическое государство, логично установить тесную связь с Москвой и создать неразрывный союз."
 RAJ_hindu_nationalism: "Индуистский национализм"
 RAJ_hindu_nationalism_desc: "Мы должны любить Родину Индию и признавать индуизм тем, что объединяет всех нас."
 RAJ_substitution_technologies: "Технологии замещения"
 RAJ_substitution_technologies_desc: "Без доступа к ресурсам Британской империи необходимо внедрять программы замещения и обеспечивать автarkic независимость."
 RAJ_redistribute_properties: "Перераспределение собственности"
 RAJ_redistribute_properties_desc: "Перераспределив британскую собственность и землю, мы обеспечим будущее для множества обездоленных."
 RAJ_militarized_hindutva: "Милитаристская Хиндутава"
 RAJ_militarized_hindutva_desc: "Во имя Шивы! Все индуисты должны служить Родине и защищать её богов от врагов."
 RAJ_weapons_for_the_new_india: "Оружие для новой Индии"
 RAJ_weapons_for_the_new_india_desc: "Революцию надо защищать!"
 RAJ_dream_of_akhand_hindustan: "Мечта об Акханд Хиндустане"
 RAJ_dream_of_akhand_hindustan_desc: "Иностранцы разделяли Великую Индию веками, но объединённые индийцы сейчас развернут их планы и завершат объединение страны."
 RAJ_invade_afghanistan: "Вторгнуться в Афганистан"
 RAJ_invade_afghanistan_desc: "Афганистан когда‑то был под индийским влиянием… и снова будет."
 RAJ_the_mountain_frontier: "Горный фронтир"
 RAJ_the_mountain_frontier_desc: "Непал и Бутан – часть полуострова, их необходимо включить в наше идеальное объединение."
 RAJ_reclaim_treaty_ports: "Вернуть договорные порты"
 RAJ_reclaim_treaty_ports_desc: "Пондичерри и Гоа должны быть возвращены и присоединены к Матери‑Индии."
 RAJ_bring_back_burma: "Вернуть Бирму"
 RAJ_bring_back_burma_desc: "Как буддистская территория, бывшая частью Радж, Бирма также является законным элементом Великой Индии."
 RAJ_unify_dravidian_lands: "Объединить дравидийские земли"
 RAJ_unify_dravidian_lands_desc: "На юге находятся территории, населённые дравидийцами, которые ещё не присоединились к Матери‑Индии. Пора это исправить."
 RAJ_operation_polo: "Операция «Поло»"
 RAJ_operation_polo_desc: "Накажем Гиджараб за провозглашение независимости и объединим Индию!"
 RAJ_tfv_land_reform: "Земельная реформа"
 RAJ_crush_hyderabad: "Разгромить Гиджараб"
 RAJ_crush_hyderabad_desc: "Мусульманская элита [HYD.GetNameDef] подавляет благочестивых индуистов. Они – препятствие на пути к полной свободе индуистов и объединению всей Индии."
 RAJ_join_the_axis: "Присоединиться к странам Оси"
 RAJ_join_the_axis_desc: "Общий враг – англо‑французский империализм, объединяющий Индию и новую Германию. Необходимо формализовать этот альянс."
 RAJ_reactivate_our_japanese_contacts: "Восстановить контакты с Японией"
 RAJ_reactivate_our_japanese_contacts_desc: "Японская империя и её Сферальный блок – единственные силы, способные свергнуть европейские империи. Нужно воспользоваться нашими старыми контактами для переговоров о новых условиях альянса."
 RAJ_new_scientific_order: "Новый научный порядок"
 RAJ_new_scientific_order_desc: "Академические сообщества Индии и наших союзников должны поддерживать постоянный контакт для обеспечения непрерывных инноваций."
 RAJ_ideological_air_force: "Идеологические ВВС"
 RAJ_ideological_air_force_desc: "Мы должны внедрить наши ценности в ВВС, чтобы укрепить сотрудничество с союзниками и другими родами войск."

 r56_RAJ_revolt_against_the_oppressors: "Восстание против угнетателей"
 r56_RAJ_revolt_against_the_oppressors_desc: "Настал час. К оружию! К оружию! Каждый человек в каждой деревне должен сразиться с колонизаторами!"
 r56_RAJ_hindu_nationalism: "Индуистский национализм"
 r56_RAJ_hindu_nationalism_desc: "Мы должны любить Родину Индию и признавать индуизм тем, что всех нас объединяет."
 r56_RAJ_substitution_technologies: "Технологии замещения"
 r56_RAJ_substitution_technologies_desc: "Без доступа к ресурсам Британской империи необходимо внедрять программы замещения и обеспечивать автarkic независимость."
 r56_RAJ_redistribute_properties: "Перераспределение собственности"
 r56_RAJ_redistribute_properties_desc: "Перераспределив британскую собственность и землю, мы обеспечим будущее для множества обездоленных."
 r56_RAJ_militarized_hindutva: "Милитаристская Хиндутава"
 r56_RAJ_militarized_hindutva_desc: "Во имя Шивы! Все индуисты должны служить Родине и защищать её богов от врагов."
 r56_RAJ_weapons_for_the_new_india: "Оружие для новой Индии"
 r56_RAJ_weapons_for_the_new_india_desc: "Революцию надо защищать!"
