#Army#
MON_organize_army_inspection:0 "육군 시찰 조직"
MON_organize_army_inspection_desc:0 "막대한 국방 예산에도 불구하고, 우리 군은 현대 장비 부족, 구식 전술 의존, 군 인력의 강한 정치화로 인해 극도로 열악한 상태에 머물러 있습니다. 현대 시대로 진입하고자 한다면, 우리는 필요한 모든 수단을 동원하여 군을 개선해야 합니다."

MON_mobilize_the_reserves:0 "예비군 동원"
MON_mobilize_the_reserves_desc:0 "이전의 시험 동원령은 계획했던 20,000명 대신 징병 위원회에 2,000명만이 소집되어 극도로 비효율적이었음이 증명되었습니다. 우리에게는 전투 능력이 있는 예비군이 일부 있지만, 평시에 이러한 징병은 극도로 인기가 없을 것입니다."

MON_field_hospital_initiative:0 "야전 병원 계획"
MON_field_hospital_initiative_desc:0 "비용이 많이 드는 전쟁은 우리 병사들의 부모님 어깨에 무거운 짐을 지웠습니다. 전장에서 돌아오지 못한 이들뿐만 아니라, 그 과정에서 부상을 입고도 제대로 된 도움을 받지 못한 이들까지도 말입니다. 우리는 다음 날, 그리고 다음 전투를 위해 병사들의 생명을 보존할 수 있는 야전 병원을 도입해야 합니다."

MON_desperate_measures:0 "필사적인 조치"
MON_desperate_measures_desc:0 "절박한 시기에는 필사적인 조치가 필요하며, 조국의 승리를 위해 싸울 수 있는 모든 신병이 필요합니다! 대규모 모병 활동에 자금을 지원하여 우리 군단의 부족한 병력을 채워야 합니다."

MON_demids_legacy:0 "데미드의 유산"
MON_demids_legacy_desc:0 "게레그도르지인 데미드는 오랫동안 군의 차량화와 기계화를 주장해왔습니다. 이는 기병이 최전선 전투 부대로서의 유용성을 다했으며, 일부 험난한 지형에서는 오히려 군수 목적에 더 적합하다는 것을 의미합니다. 우리는 그의 발자취를 따라 시작된 개혁을 완수해야 합니다."

MON_improve_coordination_capabilities:0 "협조 능력 개선"
MON_improve_coordination_capabilities_desc:0 "지휘관이 시각적으로나 전령을 통해 활동을 조율할 수 없는 대규모 전장에서는 다양한 전투 연대 간의 통신이 점점 더 중요해지고 있습니다. 이러한 현대화가 성공하려면 무전기를 대규모로 도입해야 합니다."

MON_lessons_from_1934_rebellion:0 "1934년 반란의 교훈"
MON_lessons_from_1934_rebellion_desc:0 "룸베 사건과 같은 해에 일어난 농민 봉기는 민병대와 비정규 연대가 장갑 차량, 특히 기동성이 뛰어난 대보병 차량과 트럭의 공격에 제대로 저항할 수 없다는 것을 보여주었습니다. 이러한 차량은 정찰 목적으로도 사용될 수 있습니다."

MON_foundation_for_special_task_battalion:0 "특수 임무 대대 창설"
MON_foundation_for_special_task_battalion_desc:0 "제한된 인력으로는 대규모 군대를 무장시키고 유지할 여력이 없지만, 국내외에서 우리의 이익을 지켜야 할 필요성을 무시할 수는 없습니다. 장교단은 이미 정예 [ROOT.getAdjective] 특수 임무 연대 창설 계획을 수립했으며, 이 계획은 정치인들의 공식적인 승인만 받으면 됩니다."

MON_mountainous_specialization:0 "산악 전문화"
MON_mountainous_specialization_desc:0 "북서쪽에서 남동쪽으로 뻗어 있는 산맥과 국가 북쪽의 많은 산등성이를 고려할 때, 특수부대가 우리나라의 암석 지대에 몇 개의 주둔지와 훈련장을 설립하는 것은 당연한 일이며, 이는 국가 정예 부대의 산악 지형 전문화를 의미합니다."

MON_gobi_training_facilities:0 "고비 훈련 시설"
MON_gobi_training_facilities_desc:0 "우리나라 남쪽 국경 전체가 고비 사막의 모래 언덕으로 덮여 있습니다. 그곳의 혹독하고 적대적인 환경은 가까운 미래에 실시될 예정인 극한 환경 조건 훈련에 완벽한 장소입니다. 또한 이러한 조건에서 임무를 수행할 수 있는 지휘관을 훈련시키는 것도 매우 중요합니다."

MON_equipment_recovery_teams:0 "장비 회수팀"
MON_equipment_recovery_teams_desc:0 "우리 특수부대의 보고에 따르면, 주둔지 위치의 환경적 특수성으로 인해 훈련 중 많은 장비가 완전히 손상되거나 분실되고 있다고 합니다. 우리 주변의 날씨를 바꿀 수는 없지만, 손상된 장비의 대부분을 회수할 수 있는 특수 인력을 훈련시켜 잠재적인 손실을 최소화할 수 있습니다."

MON_expand_the_general_staff:0 "총참모부 확장"
MON_expand_the_general_staff_desc:0 "우리 총참모부에는 매우 저명하고 경험 많은 인원들이 있지만, 일부 강대국처럼 적절한 자금과 대규모 조직을 갖추지는 못했습니다. 당분간은 현대적 기준에 맞게 참모진을 확장하는 것을 고려해야 합니다. 이 계획은 사관학교의 젊은 졸업생들에게도 매력적일 것입니다."

MON_ratify_battleplans:0 "방어 전투 계획 비준"
MON_ratify_battleplans_desc:0 "국가가 계속되는 군사 작전의 어려움에 대비할 수 있도록, 전투 계획을 설계, 조직, 실행하는 것을 유일한 목적으로 하는 특정 부서를 창설해야 합니다. 이웃 국가의 영토에 전쟁이 닥치면서, 우리는 전방 관측병을 파견하여 적의 가능한 기동을 예측하려고 시도할 수 있습니다."

MON_old_heritage:0 "오랜 유산"
MON_old_heritage_desc:0 "기병은 우리 군의 핵심 요소였고, 현재도 그러하며, 앞으로도 그럴 것입니다. 군사 교리가 아무리 발전하고 전략가들이 아무리 선견지명이 있더라도, 우리는 우리의 유산에 대한 뿌리를 지키고 말의 지배자로 남을 것입니다."

MON_soldier_devotion:0 "병사의 헌신"
MON_soldier_devotion_desc:0 "세상은 변하고 있습니다. 이제 지상군은 대부분 보병 편제로 구성되며, 이들은 기병보다 기동성은 떨어지지만 조직적인 측면에서는 훨씬 더 신뢰할 수 있고 견고합니다. 이러한 개념을 지지하는 것은 전장에서 우리에게 우위를 제공할 것입니다."

MON_legacy_of_tachanka:0 "타찬카의 유산"
MON_legacy_of_tachanka_desc:0 "러시아 내전 당시 인간의 독창성은 새로운 전쟁 기술을 개발하는 데 한계가 없었습니다. 기관총을 실은 마차는 막강한 화력과 비교적 편안함을 갖추고 장거리를 주파할 수 있었으며, 이는 우리 군의 기반이 될 것입니다!"

MON_support_old_officers_corps:0 "구 장교단 지원"
MON_support_old_officers_corps_desc:0 "우리 장교 다수는 국가 독립을 위해 싸운 노련한 지휘관들이며, 국민들 사이에서 여전히 인기 있는 인물들입니다. 그들을 지원하고 군 내에서 확고한 입지를 보장해 준다면 숙련된 장군과 충성스러운 병사들을 얻게 될 것입니다. 그들 중 일부는 여전히 늙고 보수적이지만, 그것이 정말 문제가 될까요?"

MON_favour_young_officers:0 "청년 장교 우대"
MON_favour_young_officers_desc:0 "세상이 변하고 있으며 군사 전술과 전략도 마찬가지입니다. 신세대 지휘관들이 현재 해외 사관학교에서 조국으로 돌아오고 있습니다. 어쩌면 그들이 무언가 새로운 것을 가져올 수 있지 않을까요?"

MON_revive_forgotten_doctrines:0 "잊힌 교리 부활"
MON_revive_forgotten_doctrines_desc:0 "20세기 초, 우리나라는 제국주의 열강에 맞서 독립을 위해 용감히 싸웠으며, 이는 게릴라전 외에는 달리 설명할 수 없는 것이었습니다. 민병대와 소규모 보병 분대가 우리 국민의 가정과 마음을 지켰습니다. 그리고 그들의 유산은 전례 없이 효과적인 전쟁 유형을 채택함으로써 계속될 것입니다."

MON_bolster_national_awareness:0 "국가 의식 고취"
MON_bolster_national_awareness_desc:0 "우리가 어떤 전쟁을 치르든, 우리는 국가의 영광과 번영을 위해 싸웁니다. 그리고 모든 시민은 이를 달성하기 위해 작은 희생을 치를 준비가 되어 있어야 하며, 이는 우리의 전쟁 노력을 강화할 것입니다!"

MON_expand_universal_military_act:0 "보편적 병역법 확대"
MON_expand_universal_military_act_desc:0 "보편적 병역법은 신병의 연령과 성별에 엄격한 제한을 두기 위한 것입니다. 우리의 관료적 문서에 설정된 일부 기준과 요건을 완화하면, 국가 행정에 심각한 지장을 주지 않으면서도 더 많은 인구를 징집할 수 있게 될 것입니다."

MON_improve_militia_formations:0 "민병대 편성 개선"
MON_improve_militia_formations_desc:0 "부하 남녀의 능력을 더 잘 아는 지역 지휘관의 지휘 아래에 놓인다면, 지역 민병대는 더 효과적으로 싸울 수 있습니다."

MON_ideological_loyalty_of_the_masses:0 "대중의 이념적 충성심"
MON_ideological_loyalty_of_the_masses_desc:0 "국민들은 무엇을 위해 싸우고 무엇이 위태로운지 알아야 합니다. 전국 각지에서 약간의 선전을 하는 것은 분명 누구에게도 해가 되지 않을 것입니다."

MON_good_old_new_ways:0 "익숙하고도 새로운 길"
MON_good_old_new_ways_desc:0 "민병대의 광범위한 사용을 중심으로 군의 지휘, 행정, 전략을 중앙화한 것은 우리에게 귀중한 경험을 제공했으며, 이는 정규군 편제에 유용하게 활용되고 채택될 수 있습니다."

MON_rely_on_soviet_tactics:0 "[SOV.getAdjective] 전술에 의존"
MON_rely_on_soviet_tactics_desc:0 "[SOV.getAdjective] 고문들은 전장 다수 지역에서 적을 제압하고 와해시킨 후, 전술적 성공을 이용해 적 편제를 포위하고 섬멸하는 데 중점을 둔 "종심 전투" 군사 교리의 채택을 옹호해 왔습니다. 대규모 병력이 투입될 경우 매우 효과적입니다."

MON_weapon_prototype_development:0 "무기 시제품 개발"
MON_weapon_prototype_development_desc:0 "아군의 방어선을 뚫고 들어오는 다양한 세력과의 끊임없는 국경 분쟁은 우리에게 몇 가지 교훈을 주었으며, 그중 하나는 우리 군이 대량으로 보유한 단발식 화기의 엄청난 비효율성입니다. 우리는 후원자들에게 연락하여 현대 무기 설계도를 획득해야 합니다."

MON_mass_firearm_production:0 "화기 대량 생산"
MON_mass_firearm_production_desc:0 "화기 없이 대규모 타격대를 보유하는 것은 사기나 이념적 교화와는 상관없이 어떠한 방어적 또는 공격적 노력도 무용지물로 만들 것입니다. 우리는 국가이므로, 제공해야 합니다. 어쩌면 국민을 위해서가 아닐지라도, 최소한 병사들을 위해서는 말입니다."

MON_focus_on_infantry:0 "보병 집중"
MON_focus_on_infantry_desc:0 "교리, 정치 체제, 이념적 의제와는 상관없이 보병은 지상군의 핵심 요소였으며, 앞으로도 그럴 것입니다. 우리는 어떤 수단을 써서라도 이 기반을 강화해야 합니다."

MON_the_inevitable_counterblow:0 "필연적인 반격"
MON_the_inevitable_counterblow_desc:0 "공격이 아무리 훌륭하더라도, 첫 공격 파상 공세에서 적이 완전히 섬멸되지 않는 한 항상 적군의 반격이 뒤따를 것입니다. 이 특별한 교훈을 배우는 데는 많은 대가를 치렀지만, 모든 병사가 기억해야 할 중요한 점입니다!"

MON_suitable_high_command:0 "적절한 최고 사령부"
MON_suitable_high_command_desc:0 "병사는 최고 사령부의 명령을 수행하는 그릇입니다. 만약 후자가 경험이 부족하거나 주어진 부대를 지휘할 능력이 없다면, 그 또는 그녀는 직위에서 해임되거나, 적절한 훈련과 개선의 기회를 받아야 합니다. 선택은 항상 우리의 몫입니다..."

MON_the_grand_stratagem:0 "대전략"
MON_the_grand_stratagem_desc:0 "\"승리는 준비를 사랑한다\" - 옛 현자가 말했습니다. 결정적이고 궁극적인 승리를 위해, 우리는 알려진 세계 최고의 기획가와 전략가들을 능가할 수 있는 적절한 전략이 필요합니다!"

MON_favour_stronghold_defenses:0 "요새 방어 선호"
MON_favour_stronghold_defenses_desc:0 "모든 사단의 모든 대대는 본부로부터 반격 명령이 도착할 때까지 오랜 기간 침략에 저항할 수 있는 움직이는 요새가 되어야 합니다. 그때, 그 요새는 전장을 가로질러 움직이기 시작할 것입니다..."

MON_advanced_fortification_studies:0 "고급 요새화 연구"
MON_advanced_fortification_studies_desc:0 "우리 공병들은 낡은 요새를 수리하고 새로운 요새를 더 빠른 속도로 건설하는 법을 배우는 추가적인 수준의 훈련을 받을 수 있습니다. 이 지식은 우리 군을 위한 거점을 준비하는 데 유용할 것입니다."

MON_support_tactical_decision_freedom:0 "전술적 결정의 자유 지원"
MON_support_tactical_decision_freedom_desc:0 "적의 전략적 배치와 아군 약점에 대한 신속한 반격은 일부 본부 명령이 적에게 감청될 가능성이 있음을 시사합니다. 개별 대대의 현지 지휘관에게 제한된 자유를 부여하는 것은 우리 군의 전반적인 장기적 성과를 향상시킬 것입니다."

MON_optimize_infantry_formations:0 "보병 대형 최적화"
MON_optimize_infantry_formations_desc:0 "현지 지휘관들이 총참모부로부터 병력의 대형과 운용에 대한 적절한 지침을 받는다면 우리 지상군의 잠재력을 최대한 활용할 수 있습니다. 그러한 지침은 우리 군의 핵심이 더 효율적으로 기능하도록 할 것입니다."

MON_unified_operational_command:0 "통합 작전 사령부"
MON_unified_operational_command_desc:0 "최근 보고에 따르면 최고 사령부가 군의 여러 부대에 혼란스럽고 비직관적인 명령을 내려 병사들의 잠재적 효율성을 저해했다고 합니다. 지휘 체계의 통합과 공고화는 해당 지역의 오차 요인을 무효화할 것입니다."

MON_adopt_tsogs_methods:0 "초그의 방식 채택"
MON_adopt_tsogs_methods_desc:0 "수미 포병학교를 최근 졸업한 부토친 초그는 우리 총참모부가 적용하던 기존의 전술에 새로운 바람을 불어넣어, 포병 부대의 모든 잠재력을 활용하는 데 집중할 수 있게 되었습니다."

MON_investigate_improvement_opportunities:0 "포병 개선 기회"
MON_investigate_improvement_opportunities_desc:0 "우리 군의 많은 무기들은 여전히 1911년 신해혁명과 독립 선언 시기까지 거슬러 올라갑니다. 후원국들의 일부 새로운 설계를 도입하여 우리 시설에서 잠재적으로 운용할 수 있을 것입니다."

MON_feature_compact_mortar_designs:0 "소형 박격포 설계 도입"
MON_feature_compact_mortar_designs_desc:0 "박격포는 전장에서 우리 화력의 핵심 요소이며, 이를 필요로 하는 모든 이에게 보급되어야 합니다. 이러한 노력에는 되돌릴 수 없는 공장 설비 개조가 필요할 것입니다..."

MON_strengthen_air_land_links:0 "공지 연계 강화"
MON_strengthen_air_land_links_desc:0 "우리 포병은 목표물의 좌표가 필요하며, 이는 공중 또는 지상 정찰팀을 통해 획득할 수 있습니다. 공중 정찰팀은 더 빠르고 기동성이 좋지만, 지상 정찰팀은 자신을 노출하지 않고 더 나은 정보를 제공할 수 있습니다. 이들 간의 협력을 강화해야 합니다!"

MON_combined_arms_operations:0 "제병협동작전"
MON_combined_arms_operations_desc:0 "오직 공중, 해상, 지상에서의 통합된 일격만이 적에게 최대의 피해를 입힐 수 있습니다. 우리의 독수리들이 적의 머리 위를 날 때, 우리의 호랑이들은 근거리에서 그들을 쓰러뜨려 마음과 영혼에 공포를 심어줄 것입니다!"

MON_the_ultimate_weapon:0 "궁극의 무기"
MON_the_ultimate_weapon_desc:0 "파괴력이 높은 무기들은 분명 인상적이지만, 숙련된 병사의 손에 들린 잘 만들어진 포 한 문이 우리에게 훨씬 더 빠르고 유익하게 임무를 수행할 수 있습니다. 이러한 종류의 무기를 장려하여 이 기반을 강화합시다!"

MON_experimental_mobility:0 "실험적 기동성"
MON_experimental_mobility_desc:0 "서방의 군사 훈련소에서 빠른 병력 이동과 적지에서의 격렬한 전투를 위해 고기동성 차량을 사용하는 것을 특징으로 하는 완전히 새로운 교리가 등장했습니다. 대규모로 이행하기는 어렵지만, 제한된 타격 부대로서는 엄청난 잠재력을 가집니다!"

MON_study_motorized_equipment:0 "차량화 장비 연구"
MON_study_motorized_equipment_desc:0 "소련과의 협력으로 사람과 물자의 수송 수요를 충족하고, 도로를 확장하며 군용 차량을 제공하는 것을 목표로 하는 합작 회사 몽골트란스가 설립되었습니다. 군용 차량 제공을 잘 활용하여, 우리는 법령을 발표하고 일부 차량을 우리에게 유리하게 징발할 수 있습니다."

MON_specialization_on_vehicle_production:0 "차량 생산 전문화"
MON_specialization_on_vehicle_production_desc:0 "우리는 산업을 더욱 다각화하고 적절한 기술을 적용하여 군용 및 민간 차량 생산 시설을 현대화하고 개선할 수 있습니다."

MON_acquire_foreign_tank_designs:0 "해외 기계화 설계 획득"
MON_acquire_foreign_tank_designs_desc:0 "해외 협력은 이미 풍성한 결실을 맺어 현대적인 총기, 포, 산업 도구 및 전기 장치를 제공했습니다. 이러한 기반을 강화하고, 나아가 [ROOT.getAdjective] 기원의 새로운 기계화 설계를 탄생시키는 데 적용할 수도 있을 것입니다."

MON_utilize_new_designs_strength:0 "신규 설계 강점 활용"
MON_utilize_new_designs_strength_desc:0 "우리와 같이 제한된 산업 기반으로는 다양한 종류의 기갑 장비를 완전히 대량 생산할 수 없습니다. 하지만 다른 분야에서의 불이익을 감수하고 특수 목적의 설계를 생산하도록 시설을 전문화할 수는 있습니다. "

MON_train_specialized_crews:0 "전문 승무원 훈련"
MON_train_specialized_crews_desc:0 "전차 승무원은 아무 병사나 뽑아서 구성할 수 없습니다. 그런 병사들은 소중한 기계와 그보다 더 소중한 자신들의 목숨을 잃게 할 뿐입니다. 이를 위해서는 자신이 무엇을 하는지 제대로 아는 인원을 적재적소에 배치해야 합니다."


#navy
MON_establish_the_trade_fleet:0 "무역 함대 창설"
MON_establish_the_trade_fleet_desc:0 "오랫동안 내륙국이었기 때문에, 우리는 국제 해상 무역의 많은 원칙과 그 조직 방식을 잊어버렸습니다. 약간의 투자로 무역과 보급을 위한 구식 민간 선박을 구매할 수 있을 것입니다. 시작으로는 이 정도로 충분합니다."

MON_lease_foreign_dockyards:0 "해외 조선소 임대"
MON_lease_foreign_dockyards_desc:0 "우리 산업의 제한된 역량으로는 선박 건조를 위한 시설 건설까지 감당할 수 없습니다. 하지만 외국과 협력하여 그들의 시설을 우리의 이익을 위해 활용할 수 있으며, 또 그래야만 합니다."

MON_joint_naval_academy:0 "합동 해군 사관학교"
MON_joint_naval_academy_desc:0 "합동 해군 협력의 다음 단계는 해군 사관학교를 설립하는 것입니다. 그곳에서 우리 해군의 새싹들이 외국 바다의 늑대들로부터 그들의 경험을 배우게 될 것입니다."

MON_naval_integration:0 "해군 통합"
MON_naval_integration_desc:0 "우리는 다른 해군 강국을 전복시켜 울란바토르의 명령을 따르는 복종적인 괴뢰국으로 만드는 데 성공했습니다. 이는 우리가 원한다면 그들의 해군을 우리 군이 유용하게 사용할 수 있음을 의미합니다. 이러한 협력에는 다른 분야에서 그들에게 더 많은 자치권을 부여하는 대가가 따릅니다."

MON_ensure_branches_independence:0 "각 군 독립성 보장"
MON_ensure_branches_independence_desc:0 "해군 산업 설립에 있어 외국인에게 의존할 수 없습니다. 그들 중 다수는 경험 없는 [ROOT.getAdjective] 선원과 함장들을 착취하려고만 하기 때문입니다! 지금부터는 정부 투자를 받는 독립적인 군으로 나아갈 것입니다!"

MON_local_specialists:0 "현지 전문가"
MON_local_specialists_desc:0 "우리는 해외 경험으로부터 배울 것이 많으며, 일부 젊은 제독들은 기꺼이 우리 선원들과 지식을 공유하려 합니다. 이는 미래에 유용하게 쓰일 귀중한 경험을 제공할 것입니다."

MON_fund_mongolian_naval_forces:0 "[ROOT.getAdjective] 해군에 자금 지원"
MON_fund_mongolian_naval_forces_desc:0 "내륙국의 주된 문제 중 하나는 항해 경험의 완전한 부재와 투자 부족입니다. 이러한 어려운 상황을 개선하기 위해 일부 정부 자금을 투입해야 합니다."

MON_maritime_infantry:0 "[MON.getAdjective] 해병대"
MON_maritime_infantry_desc:0 "만약 우리가 도하 작전이나 상륙 작전에 관심이 있다면, 소수의 헌신적인 남녀가 큰 차이를 만들어낼 수 있습니다. 우브스 호수에 비밀 훈련소를 설립하여 이들을 훈련시킬 수 있습니다."

MON_improve_naval_doctrines:0 "해군 교리 개선"
MON_improve_naval_doctrines_desc:0 "해전 전술은 외국 열강에 의해 끊임없이 현대화되고 개선되고 있습니다. 우리는 최신 기술을 결코 외면해서는 안 됩니다. 해상 전투에서 이는 매우 중요할 수 있기 때문입니다!"

MON_amphibious_effort:0 "상륙전 역량 강화"
MON_amphibious_effort_desc:0 "1274년과 1281년의 실패한 침공의 유산은 [ROOT.getAdjective] 민족에게 가해진 운명의 불공평함을 결코 잊지 않은 많은 국민의 마음속에 여전히 남아있습니다. 현대 기술은 날씨에 좌우되지 않으므로, 우리는 이에 투자해야 합니다."

MON_prioritize_small_vessels:0 "소형 함선 우선"
MON_prioritize_small_vessels_desc:0 "대규모 해군을 건설하자는 생각은 민족주의자와 애국자들에게는 매력적일 수 있지만, 우리에게는 이를 실행할 적절한 역량과 산업이 없습니다. 대형 함선 설계 개발로 넘어가기 전에 우선 소형 함선에 집중하는 것이 더 낫습니다."

MON_support_the_mechants:0 "상선 지원"
MON_support_the_mechants_desc:0 "방비가 허술한 우리 선박을 악랄하게 노리는 저 성가신 잠수함들로부터 우리 상선들을 보호해야 합니다. 일부 설계는 이미 건조 현장에 있었지만, 우리의 이익을 위해 이를 더욱 개선할 수 있습니다."

MON_modernize_escort_tactics:0 "호위 전술 현대화"
MON_modernize_escort_tactics_desc:0 "수송선단 방어 교리를 완성함으로써, 우리는 해상 항로의 안전을 더욱 향상시켜 물자와 자원이 방해 없이 흐르도록 할 수 있습니다."

MON_sea_raiders:0 "해상 습격대"
MON_sea_raiders_desc:0 "우리는 자원이 부족하지 않지만, 적들은 그렇지 않습니다. 적 함선들은 일어날 수 있는 결과를 생각지도 않고 바다를 항해하고 있습니다. 우리 해상 습격대가 그들의 과신에 대해 교훈을 가르쳐 줄 것입니다."

MON_emphasise_naval_blockades:0 "해상 봉쇄 강조"
MON_emphasise_naval_blockades_desc:0 "적은 여전히 구축함과 경순양함이 해상 보급을 지킬 수 있다고 생각합니다. 그들의 폭뢰는 효과적이지만, 몇 가지 새로운 어뢰 설계가 전세를 뒤바꿀 것입니다."

MON_large_ships_effort:0 "대형함 건조 노력"
MON_large_ships_effort_desc:0 "13세기, 우리 해군은 세계에서 가장 큰 해군 중 하나였으며, 대형 함선들이 황해를 항해하며 모두를 유린했습니다. 이제 과거의 영광을 기억하고 해군 강국들에게 깊은 인상을 줄 수 있는 대규모 함대에 투자할 때입니다!"

#air
MON_establish_provisional_airforce:0 "임시 공군 창설"
MON_establish_provisional_airforce_desc:0 "우리나라는 상공에서 임무를 수행할 수 있는 적절한 군 인력이 부족합니다. 수송 및 정찰에서 항공의 역할이 커지고 있음을 고려할 때 몽골의 공식 공군 창설을 위한 기반을 마련하는 것이 필요합니다."

MON_situational_aerial_presence:0 "상황적 공중 주둔"
MON_situational_aerial_presence_desc:0 "국가의 광활한 영공에서 전투를 수행할 수 있는 대규모 항공 함대를 유지하는 것은 불가능합니다. 선호되는 전술은 전국에 다양한 소규모 공군 기지를 설립하여, 제한된 수의 비행대대가 몽골 상공의 안전을 확보하는 임무를 효과적으로 수행하게 하는 것입니다."

MON_focus_on_local_engagements:0 "국지 교전 집중"
MON_focus_on_local_engagements_desc:0 "설립된 공군 기지는 활주로의 범위가 경비행기에 적합하여 수용 능력이 제한적입니다. 따라서 신형 항공기 개발 노력은 더 가벼운 모델과 파생형에 국한될 것입니다."

MON_institute_air_landing_batallions:0 "공중 강습 대대 창설"
MON_institute_air_landing_batallions_desc:0 "새로 창설된 특수 부대는 극한의 적대적 환경에서 공중 침투를 수행할 수 있는 정예 공수부대가 창설된다면 큰 이점을 얻을 수 있습니다."

MON_foreign_air_equipment_coordination:0 "해외 항공 장비 협력"
MON_foreign_air_equipment_coordination_desc:0 "국가 연구팀은 특히 실전 경험이 심각하게 부족한 항공 분야에서 해외 동료들로부터 많은 것을 얻을 수 있습니다. 일부 협력 조약을 연장하면 수많은 신형 항공기 설계 개선점을 얻게 될 것입니다."

MON_improve_air_doctrine:0 "공군 교리 개선"
MON_improve_air_doctrine_desc:0 "개량된 항공기와 숙련된 조종사는 많은 교전에서 승리할 수 있지만, 장기적으로 결정적인 요소는 현대 공중전 교리에도 있습니다. 이러한 전략을 다듬고 확고히 하면 우리 에이스들이 하늘에서 우위를 점할 수 있을 것입니다."

MON_air_recon_and_intelligence_protection:0 "항공 정찰 및 정보 보호"
MON_air_recon_and_intelligence_protection_desc:0 "현대전은 정보 수집, 처리, 활용이 핵심적인 역할을 하는 기만의 전쟁입니다. 신속한 정찰과 정보 수집을 위한 항공 정찰의 중요성이 커짐에 따라, 우리는 가능한 모든 수단을 동원하여 우위를 점해야 합니다!"

MON_strengthen_air_navy_cooperation:0 "공군-해군 협력 강화"
MON_strengthen_air_navy_cooperation_desc:0 "적 해군을 효과적으로 타격할 수 있는 항공기 모델을 개발하여, 최근에 발전시킨 공군과 명목상의 해군을 조율할 많은 기회가 있습니다."

MON_capital_operations_focus:0 "주요 작전 집중"
MON_capital_operations_focus_desc:0 "소규모의 기동성 있는 비행대대는 너무 분산되어 우세한 적 공군과 효과적으로 싸우기 어려울 수 있습니다. 따라서 우리는 원하는 공역에 대규모로 타격할 수 있는, 일관된 항공 타격력을 구축해야 합니다."

MON_wastness_devours:0 "광야가 집어삼킨다"
MON_wastness_devours_desc:0 "우리나라의 광활한 영토는 몽골 본토의 제공권 장악 구역에 비해 항속 거리가 너무 짧은 일부 경전투기로는 공중에서 효과적으로 방어할 수 없습니다. 제조업체들은 장거리 항공기를 개량하면 이 문제를 효과적으로 해결하여 우리 항공기가 경쟁 없이 하늘을 날 수 있게 될 것이라고 제안하고 있습니다."


#industrial#
MON_transfer_the_funds_of_mongolbank:0 "몽골은행 자금 이전"
MON_transfer_the_funds_of_mongolbank_desc:0 "1924년 [SOV.getAdjective] 및 [MON.getAdjective] 투자자 간의 합작 회사로 설립된 몽골은행은 국가 경제 발전, 은행 부문 및 거래 감독, 국가 금 보유고 통제를 목표로 하는 50대 50의 협동조합으로 남아있었습니다. 우리는 몽골 본토를 계속 발전시키기 위해 그 자금에 대한 통제권을 확보해야 합니다."

MON_build_the_railroads:0 "철도 건설"
MON_build_the_railroads_desc:0 "철도 운송의 발전은 대량의 물자를 빠르고 효과적으로 운송할 수 있는 새로운 가능성의 길을 열었습니다. 새로 획득한 정부 자금 중 일부는 수도와 국가 외곽을 연결하는 철도망을 구축하는 데 사용될 수 있습니다."

MON_expand_elementary_schools:0 "초등학교 확장"
MON_expand_elementary_schools_desc:0 "우리 국민의 높은 문맹률은 정부가 자금을 지원하는 초등학교가 자연적으로 부족한 결과입니다. 초등학교는 평범한 남녀가 읽고, 쓰고, 계산하는 법을 배우는 곳으로, 안타깝게도 많은 우리 시민에게 부족한 능력입니다."

MON_strengthen_tugrik:0 "투그릭 강화"
MON_strengthen_tugrik_desc:0 "국가의 금 보유고는 여전히 러시아 루블, 몽골 은달러, 중국 위안, 일본 엔, 미국 달러와 같은 통화 운영에 사용되는 다양한 통화에 의존하고 있습니다. 투그릭이 루블과 1대 1 비율로 연동되어 있으므로, 우리는 국고 지폐의 역할을 강화하기 위해 다른 지폐의 통화 운영에 제한을 가해야 합니다."

MON_encourage_foreign_trade:0 "해외 무역 장려"
MON_encourage_foreign_trade_desc:0 "국가의 낮은 경제 성장 원인은 1924년 국가가 투자자 자산을 국유화하고 해외 무역에 제한을 가한 것에서 찾을 수 있으며, 이는 국가 안보를 위해 우리나라에서 외국 기업의 발전을 효과적으로 저해했습니다. 우리는 일부 투자자들이 몽골로 돌아오도록 장려하기 위해 시장을 개방해야 합니다."

MON_improve_machine_tools:0 "공작 기계 개선"
MON_improve_machine_tools_desc:0 "국가 시설들은 주로 낮은 생산 효율성, 기계 장비 대신 수작업에 대한 의존, 그리고 인력 부족 때문에 부과된 할당량을 채우지 못하고 있습니다. 후자는 즉시 해결할 수 없지만, 처음 두 가지 요인은 해외에서 필요한 장비 일부를 구매하여 바로잡을 수 있습니다."

MON_study_foreign_radio_equipment:0 "해외 무선 장비 연구"
MON_study_foreign_radio_equipment_desc:0 "현재로서는 최신 무선 및 전자 장비를 생산할 수 있는 시설이 없습니다. 이웃 국가로부터 배우고 그 문제에 대해 상황을 어떻게 개선할 수 있는지 알아보는 것이 현명합니다."

MON_pastures_into_farms:0 "목초지를 농장으로"
MON_pastures_into_farms_desc:0 "농업에 대한 의존은 지금까지 우리에게 큰 도움이 되었으며, 우리나라 발전의 자연스러운 과정을 해칠 뿐인 복잡한 신규 산업 기술을 개발할 큰 필요는 없습니다. 그러나 우리는 일부 토지를 현대화하여 국민이 사용할 더 많은 양의 상품을 생산할 수 있는 적절한 농업 시설로 만들 수 있습니다."

MON_end_reliance_on_animal_husbandry:0 "축산업 의존 종식"
MON_end_reliance_on_animal_husbandry_desc:0 "진부하고 매우 구식인 국가 전체 경제 체제는 먼저 차지한 자들에 의해 제대로 활용되지 않고 착취당하는 광대한 농경지에 크게 의존했습니다. 이러한 결정은 매우 인기가 없을 수 있지만, 우리는 우리나라를 위한 적절한 산업 기반을 구축해야 합니다."

MON_support_arats:0 "아라트 지원"
MON_support_arats_desc:0 "이 유망한 유목민 사회 민족 집단은 우리나라 모든 지역에 존재하며, 우리 국민에게 다양한 농업 기원의 생산품을 제공합니다. 그들은 우리 산업 사회의 핵심 요소를 대표하며, 정부 관리들에게 그들의 중요성을 보여주는 몇 가지 특권을 부여받아야 합니다."

MON_expand_woolwashing_facilities:0 "양모 세척 시설 확장"
MON_expand_woolwashing_facilities_desc:0 "양모는 아라트가 현지 시장에 공급하는 주요 자원이므로, 이를 가공할 수 있는 시설에 적절한 자금을 지원하고 성장하는 산업을 뒷받침하기 위해 확장하는 것이 무엇보다 중요합니다."

MON_build_energokombinat:0 "에네르고콤비나트 건설"
MON_build_energokombinat_desc:0 "전기가 여러 [ROOT.getAdjective] 도시와 마을에 보급됨에 따라, 주민들에게 지속적이고 안정적으로 전기를 공급하는 문제가 점점 더 자주 제기되고 있습니다. 이처럼 중요한 생산 분야가 외국인의 손에 남아있는 것은 용납할 수 없으며, 현지 주민에 의해 건설되고 유지되어야 합니다."

MON_build_mechanical_factory:0 "기계 공장 건설"
MON_build_mechanical_factory_desc:0 "최신 농기구와 기계 다수는 교체 가능한 부품을 필요로 하는데, 이는 보통 가격이 비싸고 구하기 어려우며 현지 시설로 배송하기도 힘듭니다. 최근의 계획은 적극적인 시민들로부터 자금을 모아 울란바토르 인근에 그러한 공장을 설립하는 것입니다."

MON_industrial_expansion:0 "산업 확장"
MON_industrial_expansion_desc:0 "우리 산업의 효과적인 발전에 따라, 생산품의 품질과 현장 인력의 효율성을 높이는 것을 목표로 하는 노동자 계획에 사람들이 참여하도록 장려할 수 있습니다."

MON_new_veterinary_facilities:0 "신규 수의 시설"
MON_new_veterinary_facilities_desc:0 "질병과 전염병은 준비되지 않은 농부들의 취약한 가축을 덮칠 수 있습니다. 전국적으로 수의 시설을 설립하고 정부 지원 검사를 정기적으로 실시한다면 감염 위험과 잠재적 피해를 최소화할 수 있습니다."

MON_ulan_bator_promcombinat:0 "울란바토르 프롬콤비나트"
MON_ulan_bator_promcombinat_desc:0 "울란바토르를 산업 중심지로 확립하는 것은 국가 경제 발전에 필수적인 단계입니다. 이는 민간 수요를 위한 최대 생산 시설이 되어 수천 명의 실업 상태인 우리 시민들에게 일자리를 제공할 수 있을 것입니다."

MON_improve_mining_facilities:0 "채광 시설 개선"
MON_improve_mining_facilities_desc:0 "아둔출룬과 후슈트 탄광은 국내 영토에서 가장 큰 탄광 중 하나로 여겨지며, 우리의 선반과 압축기에 철과 석탄을 공급하여 국가와 국민에게 봉사하고 있습니다. 이 탐사 지역의 산업 생산량을 향상시키기 위해 일부 정부 자금을 이 부문에 투입할 수 있습니다."

MON_armament_expansion:0 "군비 확장"
MON_armament_expansion_desc:0 "지금까지 우리나라의 산업 발전은 주로 민수품과 그 수요에 초점을 맞춰왔고, 군대는 등한시된 것처럼 보였습니다. 국가의 이익을 위해 봉사하고 안정을 수호하는 이들을 생각하면 이는 용납할 수 없는 일입니다. 그들의 필요를 위해 군수품 생산 시설을 몇 군데 설립하는 것이 공익에 부합합니다."

MON_southern_development_focus:0 "남부 개발 집중"
MON_southern_development_focus_desc:0 "고비 사막은 혹독하고 변덕스러운 기상 조건으로 유명합니다. 어떤 수단을 써서라도 이 지역에 사는 사람들은 물, 가스, 전기에 대한 적절한 접근이 필요합니다. 새로운 정부 프로그램이 필요한 이들을 위해 이를 제공할 것입니다."

MON_southwest_resource_prospection_area:0 "남서부 자원 탐사 지역"
MON_southwest_resource_prospection_area_desc:0 "남서부 지역이 우리 통제 하에 들어왔으며, 이 지역은 천연자원이 풍부한 것으로 보이므로 몇 가지 광물 및 원자재 탐사 계획을 개발할 수 있습니다."

MON_encourage_southern_agriculture:0 "남부 농업 장려"
MON_encourage_southern_agriculture_desc:0 "구 마씨 군벌의 영토는 제국과 공화국의 투자자들에게 잠재력이 전혀 없는 후진적인 지역으로 여겨졌습니다. 사막이 목초지로 확장되는 것을 막아낸 경험을 바탕으로, 몇몇 녹지 경작지를 조성하고 새로운 농경지의 기반을 닦을 수 있을 것입니다."

MON_expand_chahars_processing_region:0 "차하르 가공 지역 확장"
MON_expand_chahars_processing_region_desc:0 "내몽골 지역은 양모와 육류 가공을 포함한 가축 사육에 널리 사용될 수 있습니다. 이 지역의 많은 사람들에게 일자리를 제공하기 위해, 현지에 양모 세척 시설과 도축장을 설립해야 합니다."

MON_ordos_plateau_exploitation:0 "오르도스 고원 개발"
MON_ordos_plateau_exploitation_desc:0 "이 영토는 정부로부터 집중적인 지원을 받아, 유망한 지역의 경제 발전을 위한 다음 단계로서 현지 제조업체들이 시설을 확장할 수 있도록 할 것입니다."

MON_utilize_available_spaces:0 "가용 공간 활용"
MON_utilize_available_spaces_desc:0 "새로운 산업화 계획은 번영하는 우리 국가의 경제력을 증대시키기 위해 설립될 수 있는 많은 신규 시설을 위한 공간을 마련했습니다!"

MON_new_research_centres:0 "신규 연구소 설립"
MON_new_research_centres_desc:0 "성장하고 발전하는 우리의 산업 역량은 도구 및 재료 제조업체, 전자제품 개발자, 젊은 과학자, 군산 복합체 전문가를 포함한 다양한 연구 개발 시설을 아우르는 과학 네트워크를 구축할 독특한 기회를 제공했습니다. 이들은 모두 [ROOT.getAdjective] 인민의 선을 위해 일할 것입니다!"

MON_modernize_transportation_system:0 "교통 체계 현대화"
MON_modernize_transportation_system_desc:0 "유목민적 사고방식을 가진 많은 사람들에게 도로는 그다지 중요하지 않았습니다. 이는 이전 정부와 정권들이 아이막, 허돈, 그리고 여러 마을 사이에 중앙 집중식 교통망을 구축하는 데 집중하지 않았음을 의미합니다. 국가가 커짐에 따라, 이 과업은 언제든 내리칠 준비가 된 다모클레스의 검처럼 통치자의 머리 위에 매달려 있습니다..."

MON_assist_subsidized_region:0 "보조금 지원 지역 지원"
MON_assist_subsidized_region_desc:0 "투바 자치구는 낮은 산업화 수준, 대규모 방목 농업을 위한 영토 부족, 불충분한 정부 자금을 고려할 때 막대한 보조금을 받는 지역입니다. 이 지역에 대한 아주 작은 투자라도 산업 건설을 위한 몇 가지 기회를 제공할 것입니다."

MON_develop_mongolia_proper:0 "몽골 본토 개발"
MON_develop_mongolia_proper_desc:0 "이 작전에서 어떤 지역도 잊혀서는 안 되며, 우리 국가의 심장부인 몽골 본토 또한 이 계획들로부터 혜택을 받을 것입니다. 다양한 목축 지역에 산업을 설립하면 우리 대의에 대한 현지 지원이 증가할 것입니다."

MON_improve_baigaal_dalai_industries:0 "바이칼 호 산업 개선"
MON_improve_baigaal_dalai_industries_desc:0 "부랴티아는 이르쿠츠크, 치타, 울란우데의 잘 확립된 산업, 광범위한 교통망, 널리 퍼진 벌목 시설로 잘 알려져 있으며, 이는 몇 차례의 목표 지정 국가 기부금으로 여전히 개선될 수 있습니다."

MON_develop_the_rear:0 "후방 개발"
MON_develop_the_rear_desc:0 "많은 동부 지방은 강력한 경제 발전 잠재력을 가지고 있음에도 불구하고 적절한 자금이 부족합니다. 그곳에서 우리의 존재감과 영향력을 확장하면 해당 자원을 더 효과적으로 사용할 수 있을 것입니다."

MON_military_industries_expansion:0 "군수 산업 확장"
MON_military_industries_expansion_desc:0 "국가 투자를 군사 부문에 집중하여 기존 주요 주들이 군사 시설을 설립하도록 지원할 수 있으며, 이를 통해 우리 군을 대폭 강화할 수 있습니다."



############################POLITICAL FOCUSES #################################################
MON_hold_plenum_of_central_committee:0 "중앙위원회 총회 개최"
MON_hold_plenum_of_central_committee_desc:0 "회의 결과는 [SOV.getLeader] 동지가 위기의 시기에 [MON.getAdjective] 국가를 보호하고 혁명의 수단을 위해 투쟁할 의지가 있음을 명확히 보여주었습니다. 하지만 우리 대표단장은 개인적인 야망을 품고 있었기에, 미래에 대해 더 "신뢰할 수 있는" 비전을 가진 인물로 교체해야 합니다."

MON_deal_with_genden:0 "겐덴 처리"
MON_deal_with_genden_desc:0 "겐덴은 특히 빈민과 농촌 주민들 사이에서 여전히 상당한 지지를 받고 있습니다. 우리의 [SOV.getAdjective]에 대한 그의 불복종은 무시할 수 없습니다. 하지만 그의 도발적인 행동을 어떻게 처벌해야 할지에 대한 문제는 여전히 남아있습니다."

MON_invite_frinovsky:0 "프리놉스키 초청"
MON_invite_frinovsky_desc:0 "미하일 프리놉스키는 잘 알려진 [SOV.getAdjective] 내무인민위원부 장교로, 그의 "트로이카" 조직 방식은 소련 내외의 혁명의 적들을 색출하는 데 매우 효과적인 것으로 입증되었습니다. 우리 혁명에 대한 그의 지원은 현 정권의 성공에 매우 중요할 것입니다."

MON_secure_the_transition_of_power:0 "권력 이양 확보"
MON_secure_the_transition_of_power_desc:0 "새 정부는 당과 [MON.getNameDef]에 진정한 헌신을 보여준 저명한 당원들을 필요로 합니다! 이 혁명의 영웅들은 국가가 새로이 조직한 선전 활동에서 중요한 본보기로 내세워야 합니다! "

MON_prepare_leftist_takeover:0 "좌파 집권 준비"
MON_prepare_leftist_takeover_desc:0 "1933년에 나라를 통치했던 좌파 인사들이나 1928년에 추방되었던 우파 야당원들처럼, 겐덴과 데미드는 이미 사라졌습니다. 또 다른 숙청이 임박했으며, 우리는 또 다른 독재자가 권력을 잡는 것을 막기 위해 모든 것을 해야 합니다!"

MON_learn_from_lkhumbe_affair:0 "룸베 사건에서 교훈을 얻다"
MON_learn_from_lkhumbe_affair_desc:0 "룸베 사건으로 알려진 1934년 봉기의 실패는 주로 반란군이 무기와 탄약에 대한 접근이 제한적이었던 반면, 정부군은 상당한 양의 총, 박격포, 장갑차, 심지어 몇 대의 항공기까지 보유하고 있었기 때문입니다. 지하 공방을 설립하면 무장 봉기 시 야권에 큰 이익이 될 것입니다."

MON_partial_religious_compromise:0 "부분적인 종교적 타협"
MON_partial_religious_compromise_desc:0 "불교계는 전국에 많은 지지자를 두고 있습니다. 이전 정권은 당분간 그들을 무시했지만, 우리는 정부 변화에 대한 대중의 지지를 높이기 위해 타협을 호소해야 합니다. 당분간 사원은 귀중한 동맹이 될 수 있습니다."

MON_arm_civil_militia:0 "민병대 무장"
MON_arm_civil_militia_desc:0 "우리나라의 광활한 영토는 정규군이 도착하여 침략자를 격퇴하는 것을 도울 때까지 진지를 사수할 수 있는 독립 연대의 편성을 필요로 합니다. 주민들에게 무기를 지급함으로써, 우리는 대의를 위해 기꺼이 목숨을 바칠 성인 남성들의 지지를 확보할 수 있습니다."

MON_invite_political_exiles:0 "정치 망명자 초청"
MON_invite_political_exiles_desc:0 "1933년, 급격한 국가 정책 변화 이후 수많은 좌파 당원들이 추방당하고 더욱 심하게 탄압받았습니다. 우리는 남은 좌파들과 접촉하여 우리 정부에 자리를 제안했습니다. 그들의 귀국은 정권 장악 성공 후 새 정부가 국가를 효과적으로 통치할 수 있도록 보장할 것입니다."

MON_ensure_control_over_the_railways:0 "철도 통제권 확보"
MON_ensure_control_over_the_railways_desc:0 "지지자들을 노동 여단원으로 위장시켜 전국 철도망 건설을 지원함으로써, 미래 전쟁을 위한 전략적 군수 요충지에 대한 통제권을 확보할 수 있습니다. 이를 통해 혁명의 대의를 위해 외국의 장비를 탈취할 수 있게 될 것입니다."

MON_contact_the_bandits:0 "산적과 접촉"
MON_contact_the_bandits_desc:0 "인구가 희박한 남부 지역은 대규모 사단 병력으로는 탐지하고 대응하기 어려운 비정규 산적 부대라는 사막의 위협을 품고 있습니다. 그들의 지도자들에게 호소함으로써, 우리는 국민을 동요시키는 대가로 몇 가지 귀중한 교훈을 배우고 인력과 경험 면에서 제한적인 지원을 받을 수 있습니다."

MON_confiscate_soviet_weaponry:0 "[SOV.getAdjective] 무기 압수"
MON_confiscate_soviet_weaponry_desc:0 "철도가 우리 통제 하에 있으므로, 추가 검문소를 설치하여 통과하는 미등록 장비를 압수할 수 있습니다. 물론, 자유롭고 공정한 무역을 위해서 말입니다!"

MON_seize_the_power:0 "권력 장악"
MON_seize_the_power_desc:0 "병력을 모집 및 무장시키고, 군수 중심지를 준비했으며, 정부 내에 충성스러운 인원들을 확보했으니, 우리는 부패한 혁명가들의 잿더미에서 새로운 몽골이 일어섰으며 이제부터 새로운 시대가 시작될 것임을 선포할 것입니다!"

MON_begin_the_collectivization:0 "집산화 시작"
MON_begin_the_collectivization_desc:0 "새 정부가 안정되었으니, 수출입이 증대되고 국가 자본이 크게 확장되었던 1928-1933년 개혁을 계속해서 이어나가는 것이 최선입니다. 이제 전례 없는 규모의 집산화가 시작될 것입니다."

MON_seize_our_advantages:0 "우리의 이점 활용"
MON_seize_our_advantages_desc:0 "겐덴은 그의 "부자 되기" 정책으로 자본가들을 회유하려 했으며, 이는 부자를 더 부유하게 만들고 가난한 이들을 착취하는 것을 목표로 했습니다. 우리는 더 이상 차별하지 않을 것이며, 우리는 평등하게 창조되었으므로, 이 재화를 압수하여 노동자와 농민에게 재분배해야 합니다."

MON_reassure_the_soviets:0 "[SOV.getAdjective] 안심시키기"
MON_reassure_the_soviets_desc:0 "모스크바로부터 직접 지시를 받는다면 우리 공화국의 내부 의제가 훨씬 더 효과적일 것이며, 이를 통해 우리 정치인, 외교관, 첩보원들이 외부에 집중할 수 있게 될 것입니다. [SOV.getNameDef]의 관리들에게 [SOV.getAdjective]의 통치 하에 있는 동등한 공화국으로서 우리를 코민테른에 다시 받아들여 달라고 호소하는 것은 당연한 일입니다. 이러한 조치는 당분간 우리의 직접적인 정치 활동을 분명히 제한하겠지만, 장기적으로는 이로울 것입니다."

MON_end_political_opportunism:0 "정치적 기회주의 종식"
MON_end_political_opportunism_desc:0 "너무나 오랫동안 몽골은 외세의 앞잡이였습니다! 우리는 스스로 일어서서 이 세상에서 우리 자신의 운명을 추구할 수 있는 용감하고 자랑스러운 민족입니다. 물론, 코민테른의 일원으로서 말입니다."

MON_reorganize_state_agenda:0 "국가 의제 재편성"
MON_reorganize_state_agenda_desc:0 "형세가 역전되었습니다! 인민을 억압하고 오도했던 자들은 이제 우리의 번영하는 공산주의 유토피아에서 사라지거나 추방되었습니다. 그러나 어떤 사람들은 여전히 그 유독한 사상을 마음에 품고 외부의 영향을 받을 수 있습니다. 무신론 선전은 우리 인민의 충성심과 맑은 정신 상태를 보장할 것입니다."

MON_make_use_of_monastery_assets:0 "사원 자산 활용"
MON_make_use_of_monastery_assets_desc:0 "불교 교단에 대한 공격 이후 사원들은 텅 비거나 폐허가 되었습니다. 이를 염두에 두고, [MON.getLeader]의 특별 법령에 따라 종교 기관의 잔존 자산을 국유화하여 평시와 전시 체제를 가동하는 데 필요한 자금을 정부에 제공합니다."

MON_example_of_communist_paradise:0 "공산주의 낙원의 모범"
MON_example_of_communist_paradise_desc:0 "[MON.getLeader]가 권력을 장악한 이래 우리나라의 정치 및 경제 지형은 영원히 바뀌었습니다. 마르크스-레닌주의 원칙에 대한 충성을 바탕으로, 우리는 중앙아시아에 또 다른 소비에트 공화국의 건국을 선포하여 이웃 국가들의 시기 어린 시선이 우리에게 더욱 집중되도록 할 수 있습니다!"

MON_thinking_out_of_bounds:0 "틀을 벗어난 사고"
MON_thinking_out_of_bounds_desc:0 "국가의 대내외 정치가 모스크바의 지배를 받는 상황에서, 우리는 중국 중원 전역의 여러 곳에서 영향력을 행사하고 다양한 인맥을 가진 야심 차고 창의적인 인물들을 장악하고 있습니다. 우리의 의제를 적절히 활용하면, 소비에트 위성국인 우리는 [SOV.getAdjective]의 개입 없이도 중국이 인민 혁명에 계속 헌신하도록 보장할 수 있을 것입니다."

MON_means_of_propaganda:0 "선전 수단"
MON_means_of_propaganda_desc:0 "국가 의제는 여러 방법으로 전파될 수 있으며, 그중 하나는 과도한 선전 활동입니다. 이를 위해 인력을 적극적으로 훈련하고 교육할 수 있는 기관을 설립한다면 선전 활동은 더욱 효율적이 될 수 있습니다."

MON_destabilize_the_central_plain:0 "중원 불안정화"
MON_destabilize_the_central_plain_desc:0 "중국의 중원 지역은 수십 년 동안 제국주의의 앞잡이, 부패한 국민당 관리, 또는 현지 군벌의 억압적인 행정에 맞선 농민 봉기를 겪어왔습니다. 하지만 이 모든 봉기는 부실한 조직과 졸렬한 계획이라는 단순한 이유로 실패했습니다. [MON.getAdjective]의 지원이 있다면, 그들은 결코 쓰러지지 않을 것입니다!"

MON_fruits_of_revolution:0 "혁명의 결실"
MON_fruits_of_revolution_desc:0 "혁명의 씨앗이 자라나 수확할 준비가 된 결실을 맺었습니다. 그리고 중원이 농민 봉기의 불길에 휩싸인 지금, 가능한 모든 수단을 동원하여 새로운 공산주의 정권을 돕는 것은 지극히 논리적인 일입니다. 설령 강제로 동맹을 맺는 한이 있더라도 말입니다."

MON_industrial_relocation:0 "산업 이전"
MON_industrial_relocation_desc:0 "침략자가 발을 들여 [SOV.getAdjective] 조국을 위협하고 있습니다! 몇몇 보고에 따르면 이미 산업 시설이 우크라이나, 벨라루스, 발트해 연안에서 러시아 중부와 우랄 지역으로 이전되고 있다고 합니다. 만약 적이 우랄에 도달하여 우리 형제들의 이전된 산업을 위협한다면 어떻게 될까요? 우리는 [SOV.getAdjective]에 연락하여 훨씬 더 동쪽으로의 이전을 제안해야 합니다."

MON_new_comintern_beacon:0 "새로운 코민테른의 횃불"
MON_new_comintern_beacon_desc:0 "형세가 역전되어 이제는 우리가 적으로부터 [SOV.getNameDef]를 보호할 수 있게 된 것이 분명합니다. [SOV.getAdjective] 국가가 붕괴하는 상황에서, 우리는 제3인터내셔널의 고삐를 쥐고 지금부터 혁명의 수호자 역할을 맡아야 합니다!"

MON_one_union_government:0 "단일 연합 정부"
MON_one_union_government_desc:0 "세계가 변하고 있습니다. 이제 누가 감히 [ROOT.getNameDef]와 [SOV.getNameDef]의 군대에 맞설 힘이 있겠습니까? [ROOT.getLeader]와 [SOV.getLeader]의 위력과 두 국가의 연합에 맞서려는 자가 누구입니까. 나의 친구 [SOV.getLeader]여, 함께 이 세계를 혁명으로 이끌어 지배합시다."
#A proper description just to be sure
#We have done everything to assist them, but it is not enough: the [SOV.getAdjective] state appears to collapse sooner or later under the overwhelming weight of its invaders. The only applicable solution in these circumstances is to propose a unitary government which shall be in charge of revolutionary struggle from now on!"

MON_struggle_for_communal_liberation:0 "공동체 해방을 위한 투쟁"
MON_struggle_for_communal_liberation_desc:0 "우리의 소비에트 동지들과는 반대로, 우리는 새로운 연방 내 모든 국가의 투쟁을 장려하여 침략자들과 싸우고 진격하는 적을 가능한 모든 수단을 동원해 격퇴할 것입니다!"

#MON_new_union_leadership:0 "New Union Leadership"
#MON_new_union_leadership_desc:0 "We have taken a hard burden of carrying a giant nation in the struggle for national liberation and prosperity of the people of the Union. Efficient governance would invoke also the application of Soviet-style policies, but with some degree of Mongolian specifics."

#choibalsan focuses#
MON_appoint_soviet_protege:0 "[SOV.getAdjective]의 피후견인 임명"
MON_appoint_soviet_protege_desc:0 "가장 오래되고 신뢰할 수 있는 혁명가 중 한 명인 허를러깅 처이발상은 모스크바에서 [MON.getNameDef]의 현 지도자 후계자로 여겨집니다. 그는 이미 내무부 장관, 경제부 장관, 육군 총사령관 직을 맡고 있습니다. 그에게 더 많은 권력을 부여하는 것이 미래에 문제를 일으킬 리가 없습니다."

MON_deal_with_religious_centre:0 "종교 중심지 처리"
MON_deal_with_religious_centre_desc:0 "트로이카 위원회는 전국 사원의 라마승들로 구성된 반혁명 불교 중심지를 적발했습니다. 그들의 계획이 무엇이었는지는 불분명하지만, 일부 구성원들이 도움을 얻기 위해 [JAP.getAdjective] 관리들에게 접촉했다는 점을 고려하면 그들은 내부 안정에 위협이 되며, 만약 권력을 가지고 있다면 권력에서 제거해야 합니다."

MON_reorganize_homeland_security:0 "국토 안보부 개편"
MON_reorganize_homeland_security_desc:0 "방첩 및 첩보 활동에서 [SOV.getAdjective]의 지원에 의존하는 것은 그들이 제공하는 자료에 얽매인다는 것을 의미합니다. 국토 안보국을 설립하면 침투 위험을 최소화하고 우리 요원들이 최신 정보를 받을 수 있도록 보장할 것입니다."

MON_the_great_terror:0 "대숙청"
MON_the_great_terror_desc:0 "[SOV.getNameDef]에서처럼, 우리 정부는 출신 불명의 부패한 관리들, 권력에 굶주린 파괴적인 혁명가들, 수정주의 우파들로 가득 차 있습니다. 우리는 해야 할 일을 해야 하며 대의를 위해 이러한 요소들은 근절되어야 합니다."

MON_new_generation_of_intelligentsia:0 "신세대 인텔리겐치아"
MON_new_generation_of_intelligentsia_desc:0 "시대의 변화는 사람의 변화를 요구하며, 우리에게는 이러한 목적을 위해 지적, 이념적 전쟁을 수행할 수 있는 젊은 인재들이 많이 있습니다. 그들의 교육과 충성심은 [SOV.getNameDef] 최고의 대학에서 단련되었으며, 최근 사건 이후의 공백을 메우는 데 필수적일 것입니다."

MON_new_party_elite:0 "새로운 당 엘리트 형성"
MON_new_party_elite_desc:0 "국가 기구는 대의를 위해 손을 더럽힐 준비가 된 사람들을 필요로 합니다. 일부 지역 지휘관과 관료들은 처이발상에게 뛰어난 충성심을 보였으며 그들의 직위에서 승진할 것입니다."

MON_remove_nominal_leadership:0 "명목상 지도부 제거"
MON_remove_nominal_leadership_desc:0 "국민들에게 사랑받는 만큼, 아나딘 아므르는 처이발상이 [MON.getAdjective] 국가를 위해 건설하고 구상한 모든 것을 파괴할 수 있는 위험한 지도자로 성장했습니다. 내부 안정과 정부 안보를 위해, 그는 즉시 처리되어야 합니다."

MON_true_hero_for_the_people:0 "인민의 진정한 영웅"
MON_true_hero_for_the_people_desc:0 "마르크스-레닌주의 원칙에 대한 유일한 헌신과 그의 통치에 대한 반대가 전혀 없다는 점은 [MON.getLeader]이 얼마나 사랑받고 인기 있는 인물이 되었는지를 보여줍니다! [JAP.getAdjective] 침략자들과의 전투에서 보여준 그의 전술적 천재성에 대한 소문이 인민들 사이에 퍼지면서 이는 더욱 명확해졌습니다. 우리의 위대한 [MON.getLeader]에게 영광을!"

MON_first_five_year_plan_focus:0 "제1차 5개년 계획"
MON_first_five_year_plan_focus_desc:0 "신노선 정책은 모든 면에서 인민의 마음에 혼란을 퍼뜨리는 위험하고 시대에 뒤떨어진 정책입니다. 우리는 [SOV.getAdjective]의 사례를 따라 우리만의 제1차 5개년 계획을 수립하여 인민의 수요를 충족시킬 것입니다."

MON_changing_times:0 "변화의 시대"
MON_changing_times_desc:0 "구 지도부는 여전히 국가를 이끌 능력이 있는 것처럼 보이지만, 그들의 신체적, 정신적 상태가 계속 악화됨에 따라 권력을 유지하고 국가를 효율적으로 통치하는 것이 점점 더 힘들어질 수 있습니다. 아마도 당 내의 새로운 인물들을 최고위 당직에 승진시킬 때가 된 것 같습니다."

MON_join_the_big_brother:0 "빅 브라더에 합류"
MON_join_the_big_brother_desc:0 "우리 국가는 그 목적을 다했을지도 모릅니다. 위원회의 목표가 마침내 달성되었기 때문입니다. 젊은 공산주의자들이 이 사실을 깨달으면서 우리의 위대한 친구이자 후원자인 [SOV.getNameDef]와의 공식적인 연합을 요청할 수 있는 상황에 이르렀습니다."

#assisting Soviets#
MON_support_the_red_army_focus:0 "적군 지원"
MON_support_the_red_army_focus_desc:0 "[SOV.getNameDef]와 혁명에는 해외에 많은 적이 있습니다. 우리는 모든 수단을 동원하여 혁명의 성공을 위한 이 투쟁에서 우리의 형제자매들을 지원해야 합니다. 우리의 친구들처럼 거대한 군대를 파견할 수는 없지만, 우리는 동맹국에 말, 식량, 양모, 고기를 제공함으로써 산업 및 인도주의적 지원을 제공할 수 있습니다."

MON_vessels_of_the_future_war:0 "미래전의 병기"
MON_vessels_of_the_future_war_desc:0 "전장에서 기갑 차량의 효율성은 미래에 주력 부대가 되지는 않더라도 매우 중요할 것임을 나타냅니다. 그리고 우리 스스로 전차 사단을 창설할 수단은 부족하지만, 그러한 사단을 장비할 자금을 모을 수는 있습니다. 비용이 많이 들지만 가치 있는 노력입니다."

MON_aerial_support_initiative:0 "공중 지원 계획"
MON_aerial_support_initiative_desc:0 "중앙위원회가 비준한 이 계획은 [MON.getAdjective] 인민이 자금을 축적하여 최신 전투기 시제품으로 구성된 공군 비행대대를 구매하고 장비할 것을 제안합니다. 노동자의 승리를 달성하기 위한 또 다른 막대한 투자입니다."

MON_improve_transportation_network:0 "철도망 개선"
MON_improve_transportation_network_desc:0 "울란바토르와 시베리아 횡단 철도 사이에 적절한 교통망이 구축된다면 우리의 [SOV.getNameDef] 지원 노력은 훨씬 더 적은 장애물에 부딪힐 것입니다. 몇 대의 낡은 열차도 구매하여 우리 쪽 철도에 기계 부족이 없도록 할 것으로 예상됩니다."
#Amar socialist focuses#

MON_reject_choibalsan_advances:0 "초이발산의 진출 거부"
MON_reject_choibalsan_advances_desc:0 "초이발산은 기회주의적이고 권력에 굶주린 압제자를 대표하며, 오직 권력을 얻어 개인적인 욕망을 위해 착취하려고만 합니다. 아마르가 집권하면, 국가 여러 지역에 대한 그의 영향력은 점차 감소하여 결국 현재의 모습은 온데간데없이 사라질 것입니다."

MON_separate_army_and_politics:0 "군과 정치의 분리"
MON_separate_army_and_politics_desc:0 "사회주의 군대 구조는 인원에 대한 이념적 교화에 크게 의존하며, 이는 정치인이 군대에 큰 영향을 미치고 그 반대의 경우도 마찬가지인 상황을 초래합니다. 이러한 체제는 국가가 쿠데타 시도에 제대로 기능하고 대응하는 능력을 저해합니다."

MON_local_command_structure:0 "현지 지휘 체계"
MON_local_command_structure_desc:0 "총참모부가 전장에 직접 주둔하지 않아도 우리 군이 제대로 싸울 수 있습니다. 현지 지휘관을 개별 사단이나 대대에 배치할 수 있으며, 이를 통해 전장에서 지상군의 전투력을 크게 향상시킬 수 있습니다."

MON_decrease_defense_budget:0 "국방 예산 삭감"
MON_decrease_defense_budget_desc:0 "[SOV.getAdjective] 관리들은 우리 국민이 이미 겪고 있는 물자 부족에도 불구하고 국방비를 증액하라고 우리 정부에 지속적으로 압력을 가하고 있습니다. 최근 몇 년간 국방비는 놀랍게도 40%에 달했으며, 이는 투그릭의 가치를 마비시키고 시장에서의 가치를 더욱 하락시켰습니다."

MON_finalize_army_reform:0 "군 개혁 완수"
MON_finalize_army_reform_desc:0 "군 상황 개선을 목표로 도입된 개혁이 제대로 작동하는 것으로 보입니다. 군인들이 조국에 대한 의무에 집중하면서, 우리 군의 전반적인 태세가 크게 향상되었습니다."

MON_tolerate_religious_groups:0 "종교 단체 용인"
MON_tolerate_religious_groups_desc:0 "불과 몇 년 전, 불교계는 소위 "진보적" 좌파의 개혁으로 인해 심각한 고통을 겪었습니다. 이 개혁은 사람들을 종교로부터 분리하고 새로운 정치적 의제에 그들의 정신을 종속시키려는 목적이었습니다. 이러한 노력은 [MON.getAdjective] 불교의 국가적 특성을 파괴했을 뿐이며, 현 정부는 종교적 타협을 제안함으로써 과거의 실수를 인정할 준비가 되어 있습니다."

MON_establish_socialist_society:0 "사회주의 사회 건설"
MON_establish_socialist_society_desc:0 "우리와 같은 혁명 정권은 취약하며 외세의 의제에 노출되기 쉽습니다. 이 주장은 분명 타당하지만, 일부 관리들이 그러하듯 잘못된 맥락에서 사용되면 착취와 남용의 가능성을 열어줍니다. 그러한 사람들을 강등시키고 특정 집단에 대한 적극적인 공격을 막음으로써, 새로운 정부, 즉 사회주의 정부를 구성할 수 있을 것입니다."

MON_workers_focus:0 "노동자..."
MON_workers_focus_desc:0 "우리나라의 노동자들은 과거 정부 정권들에게 무시당해 왔습니다. 새로운 시설을 건설하여 우리에게 그들의 중요성을 강조하는 것은 우리 정권의 정당성에 대한 그들의 믿음을 강화할 뿐입니다."

MON_peasants_focus:0 "... 그리고 농민"
MON_peasants_focus_desc:0 "집단화로 인해 많은 가정이 가축과 집, 저축을 잃었으며, 이는 현 관리들에게 반역에 가까운 행위로 간주되어 가능한 한 빨리 해결되어야 합니다. 국가의 이익을 위해 개혁은 반드시 이루어져야 합니다."

MON_workers_and_peasants_unite_focus:0 "... 단결하라!"
MON_workers_and_peasants_unite_focus_desc:0 ""분열하면 쓰러지고, 단결하면 강하다!" - 이 표어는 우리나라의 모든 남녀에게 알려져야 할 것입니다. 노동자와 농민의 협력은 제대로 적용된다면 훌륭한 결과를 가져올 것입니다. 그리고 아마르는 그 방법을 알고 있습니다!"

MON_a_socialist_republic:0 "현대 사회주의 공화국"
MON_a_socialist_republic_desc:0 "우리 국가에서 실시된 사회주의 개혁은 겐덴의 통치 이래로 얼마나 많은 것들이 개선되었는지를 보여줍니다. 몽골에서 사회주의적 입지가 확고해짐에 따라, 국가는 외국인에게 문호를 개방하고 현대 세계에서 자신의 운명을 받아들일 수 있습니다."

MON_sideline_the_left:0 "좌파 소외"
MON_sideline_the_left_desc:0 "정부 내 좌파와 우파는 1928년 제7차 당대회 이후 수년간 분열되어 왔습니다. 현재의 정부 개혁은 좌파가 국정에 관여하지 않고서는 안전하게 수행될 수 없습니다. 게다가, 그들의 일부 지도자들은 우리의 입법에 공개적으로 반대하므로, 그들을 권력에서 배제할 필요가 있습니다."

MON_liberalize_trade_policies:0 "무역 정책 자유화"
MON_liberalize_trade_policies_desc:0 "30년대 초의 '좌경 이탈'은 국가의 대외 무역 독점 체제를 확립했으며, 특히 [CHI.getAdjective]와의 무역에서 그러했습니다. 이제 국가를 공고히 했으니, 세계로 눈을 돌려 문호를 개방해야 합니다."

MON_increase_border_patrols:0 "국경 순찰 강화"
MON_increase_border_patrols_desc:0 "우리의 광활한 국경은 산적, 반란 민병대, 적 공작원들에게 끊임없이 침범당하고 있습니다. 국경에 병력을 동원하는 것은 우리 안보와 국가의 올바른 발전을 위해 필요합니다."

MON_affirm_rearmament_program:0 "재무장 계획 확립"
MON_affirm_rearmament_program_desc:0 "동방의 긴장이 고조됨에 따라, 우리는 [SOV.getAdjective]의 원조에 크게 의존하고 있습니다. 하지만 이는 영원히 지속되지 않을 것이며, 우리는 다가올 폭풍에 대비해야 합니다."

MON_tackle_the_eastern_threat:0 "동방의 위협에 대처"
MON_tackle_the_eastern_threat_desc:0 "[MAN.getAdjective] 군의 국경 침범이 더는 무시할 수 없는 전례 없는 수준에 이르렀습니다! 그들은 내몽골과 외몽골 사이의 국경이 우리 영토 깊숙이 뻗어 있다고 주장하며, 우리가 본 적도 없는 낡은 지도를 근거로 들고 있습니다. 그들에게 교훈을 가르쳐 줄 때가 왔으며, 우리의 [SOV.getAdjective] 동지들은 이 노력을 기꺼이 도울 것입니다."

MON_assist_the_revolutionary_struggle:0 "혁명 투쟁 지원"
MON_assist_the_revolutionary_struggle_desc:0 "내부 지도부 투쟁은 가장 파괴적인 분쟁 중 하나의 발발로 이어졌으며, 이는 [SOV.getNameDef] 전체를 전쟁의 불길 속으로 삼킬 것으로 예상됩니다. 코민테른의 가장 강력하고 신뢰할 수 있는 회원국 중 하나로서, 우리는 다양한 외교적 목표를 달성할 능력이 있습니다."

MON_rebuke_1932_mediation_issue:0 "1932년 중재 문제 규탄"
MON_rebuke_1932_mediation_issue_desc:0 "더 많은 영토를 얻으려는 가식적인 노력으로, [TAN.getNameDef]는 1932년 소련에 호소하여 두스-다그 산 지역의 전략적 소금 광산을 받아내는 데 성공했습니다. 그곳은 마땅히 [MON.getAdjective]의 영토입니다! [SOV.getAdjective]가 현재 다른 일에 몰두하고 있는 틈을 타, 우리는 기회주의적으로 이 상황을 이용하여 한때 우리 것이었던 땅을 재통일할 수 있습니다."

#soviet cooperation#
MON_ratify_mutual_assistance_treaty:0 "상호 원조 조약 비준"
MON_ratify_mutual_assistance_treaty_desc:0 "우리의 [SOV.getNameDef]에 대한 명백한 충성은 공식적으로 비준되기 위해 우리 관리들의 서명 몇 개만 필요할 뿐이며, 이는 강력하고 상호 이익이 되는 협력의 길을 열 것입니다. [CHI.getNameDefCap]는 좋아하지 않겠지만, 우리가 신경 쓸 바는 아닙니다."

MON_invite_soviet_advisors:0 "[SOV.getAdjective] 고문단 초청"
MON_invite_soviet_advisors_desc:0 "상호 원조 조약의 일환으로, [SOV.getAdjective] 군은 이제 우리나라 영토의 주요 전략적 지역에 주둔할 수 있습니다. [SOV.getAdjective] 군사 고문단을 초청하여 군 발전에 참여시키고 우리 지휘관들의 훈련과 기동을 지원하게 함으로써 군사 협력을 확장할 수 있습니다."

MON_approach_soviet_planners:0 "[SOV.getAdjective] 계획가 접촉"
MON_approach_soviet_planners_desc:0 "경제 협력의 일환으로, 국가의 산업 발전을 지원하기 위해 한 무리의 [SOV.getAdjective] 계획가들이 몽골에 초청되었습니다. 혹독한 기후 조건과 낮은 도시화 수준으로 인해, 이 그룹의 초점은 건물 건설에서 [SOV.getAdjective]의 산업 혁신 기술을 우리 기술자들과 공유하는 과제로 전환되었습니다."

MON_joint_technological_development:0 "공동 기술 개발"
MON_joint_technological_development_desc:0 "[SOV.getAdjective] 과학자 및 기술자들과의 협력을 증진하는 것이 우리에게 최선의 이익입니다. 우리는 물질적 지원을 거의 제공할 수 없지만, 그들은 우리 연구 시설을 개선할 귀중한 도구를 제공해 줄 수 있습니다."

MON_intensify_cooperation:0 "협력 강화"
MON_intensify_cooperation_desc:0 "현재 울란바토르는 몽골 내 안정적이고 신뢰할 수 있는 전자 부품 생산의 견고한 기반을 제공할 수 없습니다. 그러나 [SOV.getAdjective]의 지원이 있다면 전세를 역전시키고, 새로운 기술과 부품을 개발하여 우리나라에 컴퓨팅 장치가 등장하게 할 수 있습니다."

MON_student_exchange_program:0 "학생 교환 프로그램"
MON_student_exchange_program_desc:0 "[SOV.getNameDefCap]은 연방의 여러 공화국에서 온 수천 명의 젊은이들을 교육할 수 있는 상당한 규모의 교육 기관망을 갖추고 있습니다. 우리는 최고의 학생들을 교환 프로그램에 보내 후원자들로부터 배울 수 있습니다."

MON_reform_national_script:0 "국가 문자 개혁"
MON_reform_national_script_desc:0 "현재 [MON.getAdjective] 문자는 다양한 알파벳으로 구성되어 있으며, 그중 일부는 우리 인민의 적들이 사용하고 있습니다. 현재 우리나라에 대한 [SOV.getAdjective]의 영향력과 그들 언어학자들의 존재 덕분에, 우리 전문가들과의 긴밀한 협력을 통해 새로운 버전의 문자가 개발되었습니다. 이는 키릴 문자를 기반으로 하며, 우리 인민의 문맹 퇴치에 크게 기여할 것입니다."

MON_solidify_language_institutes:0 "언어 연구소 공고화"
MON_solidify_language_institutes_desc:0 "외국 알파벳과 표기법에 의존하면서 우리나라는 지난 세기 동안 다양한 정권의 지배를 받게 되었습니다. 독립 선언과 함께, 다양한 구어 방언과 사용 문자를 인민에게 봉사하기 위한 일관된 체계로 통합하려는 많은 노력이 있었습니다."

MON_ulaanbaatar_national_university:0 "울란바토르 국립대학교"
MON_ulaanbaatar_national_university_desc:0 "몇 달 전, 훗날 몽골 국립대학교의 기반으로 사용될 수 있는 "고등 교육 기관" 설립을 목표로 하는 정부 결의안이 통과되었습니다. 현재의 자금과 지식에 목마른 학생들 덕분에 큰 성공을 거둘 것으로 기대됩니다!"

#Greater Mongolia#
MON_dream_of_greater_mongolia:0 "대몽골의 꿈"
MON_dream_of_greater_mongolia_desc:0 "수년 동안 우리는 몽골 인구를 하나의 국가 통치 아래 통합하려는 꿈을 소중히 간직해왔습니다. 그러나 식민 위성국이나 낙후된 지방이 아니라, 몽골인이 다스리는 국가로서 말입니다! 이제 그러한 꿈을 현실로 여기고 잃어버린 땅을 되찾기 시작할 때가 왔습니다!"

MON_gather_ulaanbaatar_conference:0 "울란바토르 회의 소집"
MON_gather_ulaanbaatar_conference_desc:0 "중앙아시아와 동아시아의 힘의 균형은 이 지역의 세 주요 행위자, 즉 [SOV.getAdjective], [JAP.getAdjective], [CHI.getAdjective]의 손에 달린 섬세한 문제입니다. 그들을 "중립 지대"에서 만나도록 초대함으로써 우리는 [MON.getAdjective] 민족의 문제를 제기하고 평화적으로 논의하고 해결되기를 바랄 수 있습니다."

MON_divide_spheres_of_influence:0 "세력권 분할"
MON_divide_spheres_of_influence_desc:0 "열강들은 아마도 우리가 중화인민공화국과 충동적이고 예측 불가능한 동맹을 맺은 것에 충격을 받았을 것입니다. 그러나 빠른 생각과 신속한 의사 결정의 시대는 끝났습니다. 이제 우리는 진정한 몽골과 중국 지역을 나누고, 세력권을 분리하여 이 지역의 통제권과 상호 이익을 확보함으로써 그들과의 협력을 강화해야 합니다."

MON_secure_hexi_corridor:0 "하서회랑 확보"
MON_secure_hexi_corridor_desc:0 "이 무역로와 신강으로 가는 가장 신뢰할 수 있는 전략적 통로에 대한 통제권은 1926년 북벌 당시 현지 민병대가 이 지역을 장악하면서 마씨 군벌의 통제하에 들어갔습니다. 새로운 동맹과 함께 우리는 북쪽과 동쪽 측면에서 효과적으로 적을 공격하여, 광대한 전선에 걸쳐 적의 대형을 분산시키고 우리 주력군이 큰 어려움 없이 분쟁 지역을 확보할 수 있도록 할 것입니다."

MON_joint_piligrimage_to_mount_wutai:0 "오대산 공동 순례"
MON_joint_piligrimage_to_mount_wutai_desc:0 "중국 불교 4대 성산 중 하나가 현재 기회주의적인 군벌들의 통제하에 있으며, 이들은 영험한 곳에서 축복을 구하는 순례자들을 끊임없이 착취하고 있습니다. 새로운 동맹과 함께 호위병을 파견하여 행정적인 문제 발생 시 이들을 지원할 수 있습니다."

MON_secure_the_rear:0 "후방 확보"
MON_secure_the_rear_desc:0 "신장과 동투르키스탄의 지도자들은 주변 정치 상황의 전개에 따라 친중에서 친소 또는 친파시스트로 끊임없이 충성심을 바꾸는 것으로 보입니다. 만약 우리가 중원에 집중하고 또 다른 배신을 걱정하고 싶지 않다면, 즉시 이 지역을 확보해야 합니다."

MON_reignite_the_civil_war:0 "내전 재점화"
MON_reignite_the_civil_war_desc:0 "이제 핵심 지역이 확보되고 보급로가 구축되었으니, 더 큰 목표를 세워 사람들이 진정한 혁명을 받아들이지 못하게 방해하는 부패한 구조의 심장부, 바로 국민당을 직접 타격할 수 있습니다! 이 권력에 굶주린 짐승을 타도할 때입니다!"

MON_the_second_northern_expedition:0 "제2차 북벌"
MON_the_second_northern_expedition_desc:0 "제1차 북벌은 중앙 정부가 봉천 지역의 다양한 군벌 파벌을 격파하는 데 성공했음을 보여주었습니다. 그리고 국민당이 비적 잔당 소탕에 실패하고 북부를 포기했으므로, 우리는 진군하여 새로운 울란바토르-산시 추축을 위해 이 지역을 확보해야 합니다!"

MON_a_pragmatic_diplomacy:0 "실용적 외교"
MON_a_pragmatic_diplomacy_desc:0 "통일된 [MON.getAdjective] 국가를 달성하기 위해 핵심 영토를 되찾는 일은 우리 혼자 힘으로 해야 한다는 것이 분명합니다. 당분간 전쟁은 불가능하지만, 어쩌면 더 섬세한 접근법을 찾을 수 있을지도 모릅니다."

MON_disagreements_with_sinkiang:0 "신장과의 불화"
MON_disagreements_with_sinkiang_desc:0 "우리의 남부 국경은 [SIK.getLeader]와 그의 비적들이 가하는 위협에 끊임없이 노출되어 있습니다. 그뿐만 아니라 중가리아와 다반청에 거주하는 많은 몽골계 민족이 현지 정부의 탄압 때문에 피난처를 찾아 도망쳤습니다! 그 땅을 되찾고 다시 통합하는 것은 고귀한 행동이 될 것입니다."

MON_one_mongolia_policy:0 "하나의 몽골 정책"
MON_one_mongolia_policy_desc:0 "내몽골 자치구는 외교관들의 눈에 항상 기묘한 구성체였습니다. [MAN.getAdjective]과 [CHI.getAdjective]의 통치하에서의 자치, 독립 투쟁, 그리고 지위를 보존하기 위한 일본과의 동맹은 민족 자결 경향의 부재로 인한 명백한 정치적 기회주의입니다. 이 문제는 해결될 수 있으며 해결되어야 합니다..."

MON_gobi_border_realignment:0 "고비 국경 재조정"
MON_gobi_border_realignment_desc:0 "남쪽의 많은 지역에는 본토 몽골과의 재통합을 추구하는 몽골계 부족들이 거주하고 있습니다. 이 땅은 오랫동안 [SHX.getNameDef]와 [XSM.getNameDef]의 일부였으며, 이들은 민족 자결이라는 개념을 전복시켜 우리 민족에게 명백한 모욕을 주었습니다. 중원의 자칭 지도자들에게 모래 맛이 어떤지 보여줄 때입니다."

MON_delegation_to_tuva:0 "투바 파견단"
MON_delegation_to_tuva_desc:0 "1922년 명목상의 독립을 선언한 이래로, [TAN.getNameDef]는 끊임없는 인구 이동뿐만 아니라 두스다그의 전략적 소금 산 때문에 우리 국가와 긴장된 관계를 유지해 왔습니다. 우리의 공동 문화 및 역사적 유산을 활용하여 그들과 더욱 긴밀한 유대를 추구하고, 이를 기반으로 단일 국가를 형성할 수도 있을 것입니다."

MON_a_unity_with_buryats:0 "부랴트와의 통합"
MON_a_unity_with_buryats_desc:0 "1934년은 부랴트와의 관계에 많은 변화가 있었던 해였습니다. [SOV.getAdjective] 관리들이 우리 국가들을 분리하고 우리 정치인들을 서로 경쟁시키기 위해 \"두드러진 이념적, 문화적, 역사적 이유\"를 재빨리 결정했기 때문입니다. 하지만 시대는 변했고, 우리는 하나의 깃발 아래 몽골 민족을 통합하는 꿈을 실현하기 위해 우리만의 부랴트-몽골 연합을 구축할 수 있습니다."

MON_incorporate_new_lands:0 "신규 영토 편입"
MON_incorporate_new_lands_desc:0 "우리의 야망은 위대하며, 이제 완전히 실현될 것입니다! [MON.getAdjective] 인민이 하나의 강력한 민족 국가로 단결할 것임을 전 세계에 알리십시오!"


########## National Strength Mongolia###############
MON_rely_on_national_strength:0 "국력에 의존"
MON_rely_on_national_strength_desc:0 "우리나라가 다른 국가와 무력 충돌에 돌입할 경우 [SOV.getAdjective]의 지원에 전적으로 의존할 수 없다는 것을 인민은 알아야 합니다. 몇몇 선전 활동과 약간의 애국심 고취는 올바른 손에 맡겨진다면 기적을 일으킬 수 있습니다."

MON_limited_research_cooperation:0 "제한적 연구 협력"
MON_limited_research_cooperation_desc:0 "최선의 민족주의적 노력에도 불구하고, 우리 국가는 현대 시대에 제대로 기능하기 위한 적절한 장비와 인력이 부족하다는 사실을 부인할 수 없습니다. 결국 강해지려면 약간의 희생이 필요합니다."

MON_strengthen_existing_industrial_contracts:0 "기존 산업 계약 강화"
MON_strengthen_existing_industrial_contracts_desc:0 "일부 낡은 계약을 폐기하고 상호 이익이 되는 협력을 기반으로 갱신하면, 발전하는 우리 산업을 위한 현대적인 도구를 획득할 수 있는 새로운 투자 기회가 열릴 것입니다."

MON_subvert_soviet_control:0 "[SOV.getAdjective]의 통제 전복"
MON_subvert_soviet_control_desc:0 "[SOV.getAdjective]의 개입이나 [SOV.getAdjective]이 지원하는 쿠데타의 위험 속에서 완전히 독립적인 외교 정책을 추구할 수는 없지만, 적재적소에 있는 소수의 올바른 인물들이 미묘하게 행동의 방향을 바꾸고 '붉은 형님'에 대한 의존도를 지속적으로 낮추는 것은 여전히 가능해 보입니다."

MON_expel_choibalsan:0 "처이발상 축출"
MON_expel_choibalsan_desc:0 "스탈린주의자 첩자들은 "위대한 혁명가" 처이발상을 필두로 한 국가 엘리트를 포함하여 우리 정부의 다양한 측면에 여전히 존재합니다. 그의 몽골에 대한 충성심은 의심할 여지가 없지만, 그는 인민이 원하는 운명을 선택하는 길을 가로막고 있습니다. 1928년의 우익 숙청과 르흠베 사건은 이미 그의 방식이 잘못되었음을 보여주었습니다. 그를 제거할 때입니다."

MON_sabotage_great_khural:0 "국가 대후랄 방해 공작"
MON_sabotage_great_khural_desc:0 "정부 정책의 변경은 곧 회기가 소집될 국가 대후랄의 승인을 필요로 합니다. 그리고 자립적인 몽골에 대한 지지가 인민들 사이에서 꾸준히 증가하고 있지만, 관리들은 이전처럼 새로운 법안에 거부권을 행사하고 친[SOV.getAdjective] 입장을 추구할 수도 있습니다. 하지만 만약 회기 중에 극좌 급진 우익에 의해 어떤 종류의 공격이 발생한다면..."

MON_faciliate_cooperation_with_china:0 "중국과의 협력 촉진"
MON_faciliate_cooperation_with_china_desc:0 "[CHI.getNameDef]은 우리 나라들을 갈라놓은 이념적 차이에도 불구하고 이 힘든 시기에 우리의 주요 교역 상대국 중 하나로 남아 있습니다. 의심의 여지 없이, 과거 그들의 관리들은 우리 나라를 착취했지만, 이제는 상호 이익이 되는 협력을 위해 마음을 열 때가 아닐까요?"

MON_expand_the_role_of_urga_national_library:0 "울가 국립 도서관의 역할 확대"
MON_expand_the_role_of_urga_national_library_desc:0 "1921년에 설립된 수도의 국립 도서관은 지금까지 일반 대중이 거의 접근할 수 없었던 고대 및 현대 지식의 주요 보고로 남아 있습니다. 추가 열람 공간을 개방하고 인민들에게 서적을 보급하면 인민의 문해율을 높일 것입니다."

###democratic focuses#
MON_stabilize_the_country:0 "국가 안정화"
MON_stabilize_the_country_desc:0 "국가 대회의에 대한 파괴적인 공격은 우리 사회에 심각한 상처를 남겼으며, 많은 이들이 현 정권의 정통성에 의문을 제기하고 소련과 그들의 의제로부터 거리를 둘 것을 제안하고 있습니다. 그것이 매력적으로 들릴 수도 있지만, 우리는 지금까지 우리가 가진 사회주의 체제의 남은 부분을 안정시키는 것을 목표로 삼아야 합니다."

MON_reach_out_to_moscow:0 "모스크바에 접촉"
MON_reach_out_to_moscow_desc:0 "최근 전국에서 벌어진 모든 사건 이후 [SOV.getAdjective] 관리들이 대의에 대한 우리의 충성심에 의문을 제기하고 있는 것은 의심의 여지가 없습니다. 우리는 모스크바에 특사를 보내 그들의 외교관과 보안 장교를 초청 방문하게 하여 국가가 안전하다는 것을 보여줌으로써 우리의 지지를 확신시켜야 합니다."

MON_ensure_mvd_loyalty:0 "내무부의 충성 확보"
MON_ensure_mvd_loyalty_desc:0 "우리는 우리 대열, 특히 내무부에 있는 [SOV.getAdjective] 요원들이 상부로부터 명령을 받으면 일반 사람들의 삶을 방해할 수 있다는 것을 잘 알고 있습니다. 우리에게는 사용할 수 있는 수단이 있으며, 이를 올바르게 사용한다면 그들을 설득하여 우리 개인적인 용도를 위한 귀중한 정보를 제공하게 할 수도 있을 것입니다..."

MON_support_the_rebels:0 "반군 지원"
MON_support_the_rebels_desc:0 "많은 국가들이 이 불확실한 시기에 [SOV.getAdjective] 통치에 반대하기로 결정하고 독립을 선언했습니다! 우리는 중앙아시아와 극동 국가들에 대한 권력만을 추구하는 인민의 압제자들에 맞선 그들의 싸움에 동참할 것입니다! 무기를 들어라, 형제자매들이여, 서쪽으로 향하는 우리의 영광스러운 행진이 결코 잊히지 않게 하라!"

MON_formalize_the_treaty:0 "조약 공식화"
MON_formalize_the_treaty_desc:0 "하나씩이라면 우리는 쉽게 패배할 수 있지만, 뭉치면 우리는 강합니다! 신생국들의 안보를 보장하기 위해, 비공식 상호 원조 조약을 공식 동맹으로 공식화하는 것이 최선입니다!"

MON_contest_the_insurgents:0 "반란군에 대항"
MON_contest_the_insurgents_desc:0 "소련의 내분은 현대에서 가장 파괴적인 분쟁 중 하나의 발발로 이어졌습니다! 그리고 내부 권력 투쟁이 우리 형제들을 불구로 만드는 동안, 일부 기회주의적 민족주의자들은 기회를 포착하여 민족주의적, 심지어 제국주의적 야망까지 실현하기로 결정했습니다! 모스크바와 동맹을 맺음으로써, 우리는 그들을 위해 일부 정권들을 확보할 수 있습니다! 물론, 대가를 치르고서 말입니다..."

MON_form_the_rightist_cabinet:0 "우익 내각 구성"
MON_form_the_rightist_cabinet_desc:0 "소위 '우익 기회주의'의 시대는 1928년 또 다른 정부 숙청으로 끝났지만, 그 유산은 살아있습니다! 일부 정치인들은 내무인민위원회의 끊임없는 감시의 눈을 피해 탈출했으며, 이제 그들을 다시 초청하여 제2차 우익 내각을 구성할 수 있습니다. 이는 지난 10년간 네 번째 급진적인 내각 개편을 의미합니다."

MON_denounce_politizised_army:0 "정치화된 군대 규탄"
MON_denounce_politizised_army_desc:0 "공산주의 정권은 보통 당이 군을 감독하고 군이 국가 정치에 직접적으로 영향을 미치는 체제를 확립하려 하는데, 두 사안이 완전히 다른 성격임을 고려할 때 이는 용납할 수 없습니다! 이러한 행동을 공개적으로 규탄함으로써 우리는 정부 기구가 독립성을 유지하고 자유롭게 국가 정책을 선택할 수 있도록 할 수 있습니다."

MON_compromise_with_lamas:0 "라마승과 타협"
MON_compromise_with_lamas_desc:0 "불교는 사회주의 혁명의 물질세계와 세계를 지배하는 더 높은 힘의 멀고 추상적인 가치 사이의 다리 역할을 하며 [ROOT.getAdjective] 사회의 필수적인 부분을 대표합니다. 우리는 그들의 선택을 존중하고 우리의 의제가 그들의 길을 방해하지 않도록 보장해야 합니다."

MON_secularization_of_education:0 "교육의 세속화"
MON_secularization_of_education_desc:0 "최선의 의도에도 불구하고 종교 기관이 국가의 교육 정책을 좌우해서는 안 된다는 것을 잊어서는 안 됩니다. 교육의 세속화는 현대 몽골의 현실과 접촉을 유지하면서 사회주의 정책을 추구하는 주목할 만한 노력입니다."

MON_repay_old_debths:0 "오래된 빚 상환"
MON_repay_old_debths_desc:0 "1921년 혁명 이후, 이 지역에 공산주의 정권을 수립하고 외세의 위협으로부터 안전을 확보하기 위한 자금을 마련하고자 인민군이 자산을 국유화하고 부채를 탕감하자 많은 외국 기업들이 몽골을 떠났습니다. 일부 대표들에게 호소하고 옛 부채를 상환함으로써 우리 대의에 대한 지지를 얻을 수 있습니다."

MON_invite_foreign_investors:0 "외국인 투자자 유치"
MON_invite_foreign_investors_desc:0 "과거의 과오를 인정한 후, 일부 투자자들은 몽골을 이 지역에서 안전한 피난처로 굳건히 설 수 있는 개발도상국으로 보고 있습니다. 5년 또는 10년 계약을 체결하여 그들에게 앞으로도 계속 그럴 것임을 보장해야 합니다."

MON_prepare_for_the_inevitable:0 "불가피한 사태에 대비"
MON_prepare_for_the_inevitable_desc:0 "우리의 최선의 노력에도 불구하고, 이 지역의 평화가 더는 유지될 수 없음은 자명합니다. 따라서 중앙아시아와 극동을 휩쓸 다가올 폭풍에 대비해야만 합니다."

MON_frontline_infrastructure:0 "전선 기반 시설"
MON_frontline_infrastructure_desc:0 "시베리아의 잠재적 적들과 대등한 조건으로 싸우려면 국경 주변에 적절한 군수 중심지와 보급 기지를 건설해야 합니다! 그렇게 해야만 이 혹독한 환경 속에서 승리를 보장할 수 있습니다!"

MON_excessive_military_build_up:0 "과도한 군비 증강"
MON_excessive_military_build_up_desc:0 "강력하고 현대적인 군대를 창설하기 위한 정부 지원 프로그램은 장기적으로 막대한 이익을 가져다주지만, 비용과 자원이 많이 소모되는 일입니다. 만약 침공이 발생한다면, 우리는 그저 초기 단계를 버텨내기만 하면 됩니다."

MON_peace_and_prosperity:0 "평화와 번영"
MON_peace_and_prosperity_desc:0 "가까운 미래에 우리나라가 군사 분쟁에 휘말릴 것이라고는 상상하기 어렵습니다. 산업 기반을 확충하고 직장에서의 시민 안전을 보장하는 데 집중합시다!"

MON_stay_on_guard:0 "경계 태세 유지"
MON_stay_on_guard_desc:0 "외세의 제국주의적 야망과 혁명 투쟁이 오랫동안 아시아 전역의 수많은 국가를 뒤흔들었습니다. 경계를 늦추지 말고 모든 방면에서 국경을 보호하며, 우리 시설에 병력을 완전히 배치하여 잠재적인 전투에 대비해야 합니다."

#democratic aggressive#
MON_central_asia_defensive_pact:0 "중앙아시아 방위 조약"
MON_central_asia_defensive_pact_desc:0 "최근 몇 년간 우리는 자국민 보호를 목표로 하는 지역 강국으로서 이 지역에서의 입지를 공고히 했습니다. 이제 중앙아시아 모두에게 공통된 가치를 수호함으로써 우리의 평화 유지 의지를 보여줄 때입니다."

MON_mengjian_issue:0 "몽강 문제"
MON_mengjian_issue_desc:0 "분리 독립국 몽강은 국제적인 인정을 받지 못함에도 불구하고 존속하고 있습니다! 그들의 독립 개념에는 외몽골 또한 자신들의 고유 영토로 포함됩니다. 공식적으로는 아니지만, 일반 대중이 이 사소한 모순을 알아차리게 해야 하지 않겠습니까?"

MON_intervene_in_sinkiang:0 "신장 개입"
MON_intervene_in_sinkiang_desc:0 "바얀울기, 호브드, 고비알타이 아이막에 대한 끊임없는 국경 도발과 적 기병대의 습격은 신장이 이 지역에 가하는 위협을 명백히 보여줍니다. 그들의 도적단은 습격을 감행할 때마다 세력을 키우고 있으며, 우리 국민은 재산과 생명을 잃고 있습니다. 이 위협을 종식시켜야 합니다."

MON_expand_the_treaty:0 "조약 확장"
MON_expand_the_treaty_desc:0 "억압에 맞서는 외로운 늑대의 싸움은 분명 사람들의 눈에 가치 있는 투쟁이지만, 거대한 전쟁은 외부의 지원 없이는 승리할 수 없습니다. 우리 주변의 일부 국가들은 우리의 가치와 원칙을 공유하며, 이는 우리가 중요한 이념적 동맹을 얻을 수 있게 해줍니다."

MON_oppose_soviet_colonialism:0 "[SOV.getAdjective] 식민주의 반대"
MON_oppose_soviet_colonialism_desc:0 "그들은 스스로를 인민의 보호자라 칭하지만, 실상은 지난 세기의 착취적인 식민 세력에 불과합니다! 과거 우리의 나약함 때문에 그렇게 말할 수 없었지만, 이제는 중앙아시아와 극동에서의 [SOV.getAdjective] 지도부와 그들의 제국주의적 야망을 공개적으로 비난할 수 있습니다! 우리가 그들을 향해 가고 있음을 똑똑히 알려줍시다!"

MON_support_east_siberian_independists:0 "동시베리아 독립주의자 지원"
MON_support_east_siberian_independists_desc:0 "러시아 내전 당시 녹색 우크라이나와 극동 공화국을 포함한 극동의 많은 지역이 구 러시아 제국을 집어삼키는 붉은 물결에 맞서 협상국 편에 섰습니다. 아직도 우리의 대의를 지지하는 많은 이들이 있으며, 그들은 봉기를 일으키기 위한 약간의 지원만을 필요로 합니다."

MON_plea_to_the_russian_far_east:0 "러시아 극동에 호소"
MON_plea_to_the_russian_far_east_desc:0 "극동은 러시아 제국에 가장 최근에 편입된 지역 중 하나로 알려져 있으며, 이는 그곳에서 러시아의 대의에 대한 지지가 최저 수준임을 의미합니다. 이는 우리에게 매우 유리한 상황입니다."

MON_weaken_soviet_control_over_northwestern_siberia:0 "시베리아에 대한 [SOV.getAdjective] 통제력 약화"
MON_weaken_soviet_control_over_northwestern_siberia_desc:0 "시베리아의 광활한 영토는 러시아의 군홧발이 닿은 적이 거의 없었기에, 우리의 침투조에게 완벽한 기반을 제공합니다. 우리는 이 지역에서 우리의 지지를 공고히 하기 위해 시간과 약간의 자원만 필요할 뿐입니다."

MON_infiltrate_transural_region:0 "우랄 너머 지역 침투"
MON_infiltrate_transural_region_desc:0 "광활한 영토와 황무지 풍경을 지닌 우랄 지역의 아시아 부분은 러시아의 큰 관심을 끌지 못했으며, 이는 그곳에 임시 기지를 세울 준비가 된 우리와 우리 침투조에게 이로울 뿐입니다."

MON_expand_influence_into_greater_steppe:0 "대초원으로 영향력 확장"
MON_expand_influence_into_greater_steppe_desc:0 "멘셰비키는 내전 중 중앙아시아 현지 주민들의 대중적 지지를 얻는 데 실패했습니다. 우리의 공동 유산과 지리적 위치를 바탕으로 이 지역 사람들과 더 긴밀한 유대를 추구할 수 있으며, 이를 통해 가장 먼 구 아시아 소비에트 사회주의 공화국들에서 지지자들을 규합할 수 있습니다."

MON_increase_presence_in_caucasus:0 "캅카스 내 영향력 증대"
MON_increase_presence_in_caucasus_desc:0 "지난 수 세기 동안 트란스캅카스의 용감한 영웅들은 러시아와 오스만 무리에 맞서 싸웠습니다. 우리는 분명히 그 지역에서 우리의 대의를 위한 지지를 얻을 수 있을 것입니다!"

MON_launch_peoples_uprising:0 "인민 봉기 개시"
MON_launch_peoples_uprising_desc:0 "이제 우리 파괴공작원들이 제자리에 위치하고, 군수 창고는 파괴되었으며, 지지자들은 필요한 무기로 무장했으니, 우리는 중앙아시아와 극동의 마을과 도시에 진정한 깃발을 내걸어야 합니다. 이는 해당 지역에 대한 억압적인 러시아 통치의 종식을 의미할 것입니다!"

#democratic rather peaceful#
MON_declare_official_neutrality:0 "공식 중립 선언"
MON_declare_official_neutrality_desc:0 "[ROOT.getAdjective] 영토에서 발생하는 어떠한 군사적 충돌이라도 우리 사회의 모든 분야에 파괴적인 결과를 초래할 것입니다. 우리는 이 험난한 바다에서 우리나라가 섬과 같다고 공개적으로 선언하는 것이 좋겠습니다."

MON_open_up_the_country:0 "국가 개방"
MON_open_up_the_country_desc:0 "민주사회주의 원칙에 대한 헌신을 바탕으로, 전 세계의 수많은 민주주의 기관과 더욱 긴밀한 관계를 추구할 수 있습니다. 이를 통해 민주주의의 기반을 강화하고 국민의 자유를 보장할 것입니다."

MON_riders_of_the_storm:0 "폭풍의 기수들"
MON_riders_of_the_storm_desc:0 "세계 각지의 민주주의 기관을 보호할 수 있는 전략 특수 부대의 창설과 파견을 허가할 것입니다. 이 전투단은 그림자 속에 머물며 눈에 띄지 않는 이름을 유지할 것입니다."

MON_appeal_to_european_democracies:0 "유럽 민주주의 국가에 호소"
MON_appeal_to_european_democracies_desc:0 "주변 세계가 혼돈에 빠지면서, 일부 기회주의적인 이웃 국가들은 우리 영토를 "자신들의 세력권에 필수적인 부분"으로 간주하며 영유권을 주장할 수 있습니다. 강력한 유럽 민주주의 국가들이 우리의 대의를 지지한다면, 우리의 외교적 입지를 더욱 안전하게 유지할 수 있을 것입니다."

MON_appeal_for_overseas_protection:0 "해외 보호 요청"
MON_appeal_for_overseas_protection_desc:0 "세계의 다른 민주주의 강대국들과의 협력을 강화해야 합니다. 유럽 국가들은 식민주의와 해외 보호 문제에 있어 너무나도 신뢰할 수 없음이 증명되었습니다. 바다 건너 다른 강대국들의 지원을 구하는 것이 현명할 것입니다."

MON_seek_democratic_alliances:0 "민주주의 동맹 모색"
MON_seek_democratic_alliances_desc:0 "몽골의 민주주의 기관은 외교적 약속뿐만 아니라 경제적, 군사적 보호도 필요로 합니다. 주변 상황은 나날이 불안정해지고 있으며, 가능하다면 외국의 원조가 필요합니다."

MON_democratic_foundation_of_mongolia:0 "몽골의 민주주의 기반"
MON_democratic_foundation_of_mongolia_desc:0 "우리에게서 너무 멀리 떨어진 외세에 의존하기는 어렵습니다! 우리는 우리만의 방식으로 민주적 가치를 추구하는 길을 강화하고, 이를 주변에 전파해야 합니다!"

MON_provide_shelter_for_refugees:0 "난민에게 피난처 제공"
MON_provide_shelter_for_refugees_desc:0 "주변에서 전쟁이 격화되는 가운데, 우리는 보호가 필요한 이들에게 안전한 피난처로 남아있습니다. 도움을 구하는 모든 이들을 위해 국경을 개방하고 평화 속에서 안전한 삶을 원하는 많은 이들을 수용할 때입니다."

MON_offer_facilities_for_exiled_scientists:0 "망명 과학자에게 시설 제공"
MON_offer_facilities_for_exiled_scientists_desc:0 "다양한 과학 기관에 추가 자금, 작업 공간, 연구 시설을 제공할 수 있을 것입니다. 우리의 기술 발전 또한 이러한 상호 이익이 되는 협력으로부터 이득을 얻을 것입니다."

MON_forge_asian_self_determination:0 "아시아 민족 자결권 확립"
MON_forge_asian_self_determination_desc:0 "우리는 다양한 외세가 중앙아시아의 민주주의 개념을 억압하고 전복시키려 했던 것을 결코 잊지 않을 것입니다. 이제 일부 영토가 우리 통제 하에 들어왔으니, 이 지역에 민주주의 기관을 재건하는 것을 추구해야 합니다!"

MON_bulwark_against_fascist_threat:0 "파시스트 위협에 대한 방벽"
MON_bulwark_against_fascist_threat_desc:0 "아시아의 많은 국가들이 이미 갈색 위협의 희생양이 되었습니다. 이들은 모든 수단을 동원해 유독한 사상을 퍼뜨리며 "적색 위협으로부터의 해결책"을 자처하고 있습니다. 그들이 추구하는 것은 권력, 영향력, 자원일 뿐, 인민의 보호가 아닙니다! 우리는 그들의 교묘한 노력을 견뎌낼 수 있는 주요 보루가 되어야 합니다!"

MON_strike_against_communist_menace:0 "공산주의 위협 타격"
MON_strike_against_communist_menace_desc:0 "수년 전 아시아의 많은 지역이 코민테른과 사회주의 가치의 영향력 아래 놓였지만, 그들은 인민 혁명에 대한 해석에 있어 심각한 착오를 범하고 있습니다. 인민 혁명은 경제와 인민의 삶에 혼란과 파괴만을 가져올 뿐이기 때문입니다. 우리는 공산주의 압제에 시달리는 땅에 민주주의 가치를 심으려는 어떤 시도든 지지할 것입니다!"

#pro-Chinese/democratic alternative path
MON_adopt_sun_yat_sen_principles:0 "쑨원 원칙 채택"
MON_adopt_sun_yat_sen_principles_desc:0 "[CHI.getAdjective] 민주주의의 창시자는 중원 평민들의 삶을 개선하기 위한 세 가지 원칙에 기반한 철학적 개념을 공식화했습니다. 책임감 있는 정부가 되려면, 국가적 특성을 가미하여 '국민의, 국민에 의한, 국민을 위한 정부'를 적용하는 것이 선행입니다."

MON_welfare_focus:0 "복지"
MON_welfare_focus_desc:0 "세 가지 기본 원칙 중 하나는 반자본주의적 경제 발전과 외교적 반제국주의 입장으로 볼 수 있는, 우리 인민에게 재화를 제공하는 것을 중심으로 합니다. 첫 단계는 국가의 경제 발전입니다."

MON_codify_democratic_principles:0 "민주주의 원칙 성문화"
MON_codify_democratic_principles_desc:0 "민주주의의 기반은 실제 법 집행 및 입법 체계 내에서 성문화되고, 해당 체계가 모든 권력 수준에서 뒷받침될 때 훨씬 더 큰 힘을 갖습니다. 어느 정도 정치적 불안정을 겪을 수도 있겠지만, 이러한 변화는 그만한 가치가 있습니다."

MON_five_races_under_one_union:0 "오족공화"
MON_five_races_under_one_union_desc:0 "새로운 철학 이론의 메아리가 전국에 퍼져나가고 있으며, 신해혁명의 고귀한 유산이 우리 인민의 마음과 정신에 뿌리내리고 있습니다! 낡은 개념을 재정비하면 한족, 만주족, 후이족, 티베트인과의 유대를 강화할 것입니다!"

MON_cooperation_with_kuomintang:0 "국민당과의 협력"
MON_cooperation_with_kuomintang_desc:0 "현 [CHI.getAdjective] 정부의 민주주의적 성향은 그들이 현재 과거의 실수를 재평가하고 있으며, 이전의 속국, 자치 지역, 조공국들을 종속시키지 않고 협력할 준비가 되었을지도 모른다는 점을 명확히 보여줍니다. 우리는 최소한 외교적 차원에서라도 화해를 모색해야 합니다."

MON_nationalism:0 "민족주의"
MON_nationalism_desc:0 "국민당의 발자취를 따라, 우리는 삼민주의의 두 번째 핵심 요소를 채택하고 우리의 민족 정체성을 포용할 것입니다. 우리는 중국인도, 러시아인도, 만주인도 아닌 할하 몽골인이므로, 다른 국가들은 우리의 자결권을 존중해야 합니다!"

MON_put_an_end_to_the_arat_system:0 "아라트 제도 폐지"
MON_put_an_end_to_the_arat_system_desc:0 "아라트 제도는 사회주의 혁명 초기 단계에서 우리에게 큰 도움이 되었지만, 현 정부의 성향을 고려할 때, 이 제도를 근본적으로 개혁해야 한다는 것이 명백해졌습니다. 우리의 중국 친구들과 협력하여 내몽골의 기 제도를 우리 실정에 맞게 적용한다면, 이 지역에 대한 행정 통치를 크게 개선할 수 있을 것입니다! "

MON_revoke_the_kyakhta_treaty:0 "캬흐타 조약 폐기"
MON_revoke_the_kyakhta_treaty_desc:0 "타협과 양보에는 국경이 없으며, 우리는 다시 한번 공화국의 보호 아래 우리의 운명을 받아들일 준비가 되어 있습니다. 자결권을 되찾았으니, 우리는 중원의 가장 강력한 세력과 긴밀히 동맹을 맺을 것입니다."

MON_confrontations_with_warlords:0 "군벌과의 대립"
MON_confrontations_with_warlords_desc:0 "권력에 굶주린 군벌들로 분열된 중원은 외세가 영향력을 행사할 가능성이 높은, 극도로 위험하고 불안정한 곳으로 남아 있습니다. 가용 자원이 제한된 상황에서, 우리는 일부 지역 세력과 유대를 추구하여 영향권을 확대할 수 있습니다."

MON_the_battle_for_tuva_uriankai:0 "투바 우리안카이 전투"
MON_the_battle_for_tuva_uriankai_desc:0 "우리는 투바 우리안카이 인민과 공통의 유산을 공유하고 있으나, 러시아 혁명과 중국 제국주의가 인위적인 경계를 만들어 우리를 두 국가로 분리시켰습니다. 해당 국가를 우리 영토로 다시 통합하려는 의제를 추진할 수 있지만, [SOV.getAdjective]이 이 문제를 가볍게 여기지는 않을 것입니다."

#Genden path
MON_strong_leader_genden:0 "강력한 지도자 겐덴"
MON_strong_leader_genden_desc:0 "우리의 경애하는 지도자께서 다시 한번 국가를 통치하시게 되었으니, 이 천재적인 인물이 정부의 모든 권력을 스스로 가져야 하는 것은 당연합니다. 그의 통치는 몽골의 새로운 시대, 새로운 시대를 열 것입니다!"

MON_independent_army_structure:0 "독립적인 군 구조"
MON_independent_army_structure_desc:0 "일부 군 관리들은 혁명 해석의 관점에서 볼 때 겐덴의 지도력이 희극에 불과하다는 생각을 여전히 추구하고 있습니다. 정치위원들이 여전히 군대 내에서 영향력을 유지하고 있어, 그들의 간섭 없이는 어떠한 이념적 의제도 추진하기 어렵습니다. 따라서, 그들은 우리 정권에 큰 위협이 됩니다."

MON_ensure_soldier_loyalty:0 "병사 충성도 확보"
MON_ensure_soldier_loyalty_desc:0 "우리는 정치 교화 체계를 개혁하여 대중의 전반적인 이념이 아닌, 현 정부의 수단에 더 잘 부합하도록 할 것입니다. 병사들은 무엇을 위해, 누구를 위해 싸우는지 알아야 합니다."

MON_reform_the_high_command:0 "최고 사령부 개혁"
MON_reform_the_high_command_desc:0 "고위 장교들은 이러한 진보적인 개혁 과정에서 소외될 수 없습니다. 특히 그들의 충성심이 다양한 정치 세력과 정권 사이에서 끊임없이 흔들리는 것을 고려하면 더욱 그렇습니다."

MON_mongolian_peoples_army:0 "[ROOT.getAdjective] 인민군"
MON_mongolian_peoples_army_desc:0 "새로운 군 구조는 그 핵심에 완벽함을 담고 있습니다. 즉, 대의에 헌신하는 고위 장교들의 명령을 따르는 충성스러운 병사들은 진정한 몽골 인민을 위한 완벽한 조합입니다."

MON_incorporate_buddhism:0 "불교 통합"
MON_incorporate_buddhism_desc:0 "겐덴은 그의 초기 저작 중 하나에서 자신이 항상 따를 두 우상으로 블라디미르 일리치 레닌과 부처를 꼽았습니다. 많은 이들이 어떻게 그러한 이념의 복합체가 하나로 합쳐질 수 있는지 궁금해할 것입니다. 이에 대한 해답은 불교를 국가 의제에 통합하는 것이며, 이는 현 통치자에 대한 대중적 지지를 크게 확대할 것입니다."

MON_dealing_with_soviet_sympathisers:0 "[SOV.getAdjective] 동조자 처리"
MON_dealing_with_soviet_sympathisers_desc:0 "우리 정부의 내부 안정과 안보는 우리의 집회, 회의, 협의회, 당대회에 침투하는 수정주의적인 친[SOV.getAdjective] 분자들로부터 끊임없는 위협에 처해 있습니다. 만약 우리가 당에 새로운 가치를 확고히 하고자 한다면, 그 배신자들 중 일부는 과거의 실수에 대한 대가를 치러야 합니다."

MON_continue_new_course_policy:0 "신노선 정책 지속"
MON_continue_new_course_policy_desc:0 "신노선 정책은 20년대 초 레닌의 \"신경제정책\"을 몽골의 특수성에 맞게 해석한 것입니다. 그 요소 중 일부는 국가 경제에 더 잘 기여하도록 더욱 강화될 수 있습니다."

MON_get_rich:0 "부유해지기!"
MON_get_rich_desc:0 "오랫동안 기대되고 약속되었던 펠지딘 겐덴의 협력 정책인 "부유해지기!"는 평범한 남녀가 국가의 통제와 감독에서 벗어나 독립적으로 부를 축적할 수 있도록 하는 것을 목표로 하며, 이를 통해 [ROOT.getNameDef]은(는) 자본주의 요소의 장점을 취하여 사회주의 발전에 활용할 수 있습니다!"

MON_empower_hudonets:0 "후돈인에게 권한 부여"
MON_empower_hudonets_desc:0 "다양한 아이마크의 빈곤 지역 출신인 후돈들은 현지에서 후돈인으로도 알려져 있으며, 그들 중 다수는 가장 후돈인적인 인물인 겐덴이 이끄는 당파의 일원으로서 정부에 참여하고 있습니다. 그들 일부에게 더 많은 권력을 부여하면 빈곤 지역의 강력한 경제 성장을 이끌어낼 것입니다."

MON_provide_for_the_people:0 "인민을 위한 공급"
MON_provide_for_the_people_desc:0 "부자에서 빈자로, 빈자에서 부자로, 자금의 순환은 여전히 정부의 손아귀에서 끝납니다. 우리는 모든 이에게 그들의 부나 사회적 지위에 관계없이 적절한 수단을 제공할 것입니다."

MON_abolish_the_secretary_system:0 "서기 체제 폐지"
MON_abolish_the_secretary_system_desc:0 "1928년에 수립된 3인 당 서기들의 동등한 통치 체제는 그 목적을 다했습니다. 권력 분점은 최근 몇 년간 이 나라를 정치적, 경제적 위기의 심연으로 몰아넣었으며, 또 다른 권력 장악을 막기 위해서라도 이 체제는 완전히 폐기되어야 합니다"

MON_subsidise_the_military:0 "군부에 보조금 지급"
MON_subsidise_the_military_desc:0 "군수 산업은 최근 몇 년간 심각한 불황을 겪었지만, 몇몇 정부 지원 보조금을 통해 현대화하고 확장할 수 있습니다. 이를 통해 우리의 군사적 역량을 강화하고 장비가 부족한 군대를 보강할 수 있습니다."

MON_leader_of_the_equal:0 "평등한 자들의 지도자"
MON_leader_of_the_equal_desc:0 "겐덴은 이 혹독한 시기에 나라를 통치할 능력이 있음을 인민에게 증명했습니다. 그의 지도 아래 [ROOT.getNameDef]은(는) 종교적 사회주의의 길을 따르고, 하나의 국가 아래 유사한 민족들의 통일을 추구할 것입니다."

MON_promote_religious_socialism:0 "종교적 사회주의 증진"
MON_religious_socialism_desc:0 "우리는 과거의 투쟁에서 승리하여, 정치 지형에 새로운 실체가 등장하면서 인민의 마음속에 우리의 가치를 강화하고 증진하는 데 집중할 수 있게 되었습니다. 바로 우리의 번영하는 국가에 걸맞은 종교적 사회주의라는 실체입니다."

MON_support_buddhist_monasteries:0 "불교 사원 지원"
MON_support_buddhist_monasteries_desc:0 "우리의 대의는 고귀하고 비억압적이므로, 우리나라의 많은 종교 기관과 협력을 모색할 수 있습니다. 이들은 우리 정권에 지지를 제공하고 새로 구축된 체제가 그 가치를 굳건히 지키도록 보장할 수 있습니다."

#ANCOM
MON_oust_genden:0 "겐덴 축출"
MON_oust_genden_desc:0 "겐덴의 통치는 [ROOT.getAdjective]의 경제, 산업, 사회 제도에 완전한 파괴만을 가져왔습니다. 인민은 억압적인 독재자와 끊임없는 정권 교체에 지쳤습니다. 차라리 정부가 아예 없는 편이 나을지도 모릅니다."

MON_changes_within:0 "내부로부터의 변화"
MON_changes_within_desc:0 "무정부주의적 사고방식으로 나아가는 첫걸음은 국가라는 제도가 이전에 채택했던 경제 구조 내의 변화에 있습니다. 우리는 공동 재산 사상, 무상 공공 서비스, 그리고 가장 가까운 이웃과의 제한된 무역 거래를 장려할 것입니다."

MON_spread_of_anarcho_communism:0 "아나코코뮤니즘 사상을 해외에 전파"
MON_spread_of_anarcho_communism_desc:0 "다가오는 무정부주의 혁명의 사상은 과거 일부 정치인들이 지도에 그어놓은 선에 국한될 수 없습니다. 정신 혁명이 그들에게 다가가고 있으니, 이 소식을 널리 퍼뜨립시다!"

MON_full_social_equality:0 "완전한 사회적 평등"
MON_full_social_equality_desc:0 "과거의 정부 구조는 사회 내 부, 재산, 구조적 역할의 불평등한 분배를 강하게 강조했습니다. 그런 헛소리는 몽골 인민 코뮌을 위한 것이 아닙니다!"

MON_abolish_the_currency:0 "화폐 폐지"
MON_abolish_the_currency_desc:0 "무역이 지역 단위에서 이루어지고 지역적으로 규제된다면 화폐의 목적 전체가 구시대적인 것으로 보일 수 있습니다. 물론, 때로는 비효율적일 수도 있지만, 당분간 작동한다면 그게 정말 중요할까요?"

MON_workers_control_and_discipline:0 "노동자 통제와 규율"
MON_workers_control_and_discipline_desc:0 "상위 규제 기관이 없다면, 일부 노동자들은 자신들의 이익과 코뮌의 이익을 위해 일하는 아나코코뮤니즘 혁명의 전체 목표를 잊어버린 것처럼 보일 수 있습니다. 연례 코뮌 회의 형태로 그러한 사상을 강화하는 것은 가치 있는 노력입니다."

MON_eradicate_private_property:0 "사유 재산 근절"
MON_eradicate_private_property_desc:0 "사유 재산은 생산 및 분배 수단의 소유권을 바꾸려는 자본주의의 전체 목적을 대표하며, 이는 사회 내에서 발생하는 자연스러운 과정으로부터의 적대적인 일탈로만 볼 수 있습니다. 그러나 일반 시민들은 두려워할 필요가 없습니다. 개인 재산은 정당한 소유자의 손에 남을 것이기 때문입니다."

MON_remove_hierarchical_structures:0 "계층 구조 제거"
MON_remove_hierarchical_structures_desc:0 "어떤 자유인이나 자유여성도 체포, 투옥, 재산 박탈, 법의 보호 박탈, 추방, 또는 어떤 식으로든 파멸당하지 않을 것이며, 우리는 동료들의 합법적인 판결에 의하지 않고서는 그를 상대로 소송을 제기하거나 기소하지 않을 것이며, 최고의 권위는 인민 코뮌에 속합니다."

MON_finalize_state_reforms:0 "국가 개혁 완수"
MON_finalize_state_reforms_desc:0 "많은 사람들이 우리의 작은 혁명을 국경을 넘어 우리의 가치를 전파하고 확립하며 세계의 가장 먼 곳까지 도달하려는 더 큰 노력의 첫걸음으로 봅니다. 언젠가 그곳에서도 코뮌 혁명이 일어날 것을 보장하면서 말입니다."

#Anti-Soviet focuses
MON_form_the_provisional_government:0 "임시 정부 구성"
MON_form_the_provisional_government_desc:0 "우리 정부는 위기에 처했습니다. 최고위급 정부 관료 대표단이 모스크바에 억류되었고 그들의 운명은 알 수 없습니다. 우리는 당분간 국가의 안정을 보장하는 것을 목표로 하는 임시 정권을 구성해야 합니다."

MON_assists_deviants_struggle:0 "이탈자 투쟁 지원"
MON_assists_deviants_struggle_desc:0 "겐덴의 투옥 소식이 며칠 전 울란바토르에 도착했으며, 그런 위대한 인물을 류뱐카의 독방에서 썩게 내버려 둘 수는 없습니다. 우리는 몽골의 용감한 영웅을 가능한 모든 방법으로 지원해야 합니다."

MON_infiltrate_the_railway_system:0 "철도 체계 침투"
MON_infiltrate_the_railway_system_desc:0 "그의 소재지는 잘 알려져 있으나, 그를 남쪽으로 이송할 열차 경로를 어떻게 선택할 것인지가 문제로 남아있습니다. 소련 인민교통통신위원회의 옛 연줄을 동원하여 그의 \"은퇴\"를 위한 예정 경로에 대한 핵심 정보를 입수하는 것이 최선일 것입니다."

MON_return_of_prodigal_son:0 "탕아의 귀환"
MON_return_of_prodigal_son_desc:0 "겐덴이 크림 반도의 새로운 \"갱생 시설\"로 향하는 예상 경로 계획을 입수했습니다. 이제 가용 자금을 총동원하여 그의 조국으로의 안전한 귀환을 확보할 때입니다."

MON_appeal_to_china:0 "중국에 대한 호소"
MON_appeal_to_china_desc:0 "[SOV.getAdjective]인들이 우리 지도자를 버리고 [JAP.getAdjective]인들이 자신들의 운명을 찾아 나섰으니, 과거 우리를 지배했던 자들에게 호소하여 상호 이익이 되는 협력을 모색하는 것 외에는 다른 선택지가 없습니다."

MON_matters_of_internal_affairs:0 "내무 문제"
MON_matters_of_internal_affairs_desc:0 "전국적으로 스탈린주의 통치에 대한 대중의 지지가 감소하고 있으니, 위기에 처한 조국의 내부 안정을 개선할 다른 방안을 모색하는 것이 현명할 것입니다."

MON_strengthen_buddhist_community:0 "불교 공동체 강화"
MON_strengthen_buddhist_community_desc:0 "[ROOT.getAdjective] 불교의 개념은 평화주의적이고 반혁명적이라고밖에 설명할 수 없습니다. 많은 라마승들이 국가의 가장 크고 강력한 종교 공동체를 억압하지 않는, 더 보수적이고 보호주의적인 정부 수립에 지지를 표명하고 있습니다."

MON_search_new_bogd_khan:0 "새로운 복드 칸 수색"
MON_search_new_bogd_khan_desc:0 "[SOV.getAdjective] 당국과 그 후 [ROOT.getAdjective] 공산주의 당국에 의해 금지되었던 9대 젭춘담바 쿠툭투의 환생자 수색은, 가까운 미래에 의례적인 입헌군주제를 재건하고자 한다면 비밀리에 수행할 수 있습니다."

MON_proclaim_the_second_bogd_khanate:0 "제2 복드 칸국 선포"
MON_proclaim_the_second_bogd_khanate_desc:0 ""

MON_guard_southern_border:0 "남부 국경 수비"
MON_guard_southern_border_desc:0 "고비알타이, 우므느고비, 도르너고비 아이막의 보고에 따르면, 현지 집단들이 광활한 남부 국경에 대한 정부의 취약한 통제력을 악용하여 무고한 마을을 끊임없이 습격하고 약탈하며 자신들의 배만 불리는 배신적인 행태를 보이고 있습니다. 새로 창설된 편대 중 일부를 파견하여 이 위협에 대처해야 합니다."

MON_ensure_rural_support:0 "농촌 지역 지지 확보"
MON_ensure_rural_support_desc:0 "농촌 지역은 고위 행정부에서 일어나는 일에 대해 거의 알지 못하며, 일부는 현재 국가에서 진행 중인 변화에 불안감을 느끼고 있습니다. 우리는 지역 발전에 투자하여 많은 지역 원로들과 화해를 모색해야 합니다. 비용이 많이 들지만 가치 있는 노력일 것입니다."

MON_shelter_the_banished:0 "추방자 보호"
MON_shelter_the_banished_desc:0 "남부 아이막에 파견된 우리 군은 인근 국가들로부터 정치적 난민 수가 증가했다고 보고했습니다. 여기에는 [PRC.getNameDef] 출신의 일부 좌파 인사들과 전직 고위 당 간부들이 포함되어 있으며, 이는 그곳에서 급격한 정부 변화가 일어나고 있음을 시사합니다. 이들을 무시하는 대신, 새로운 형태의 공산주의 국가를 건설하는 데 그들의 도움을 활용할 수 있습니다."

MON_the_new_chairman:0 "새로운 의장"
MON_the_new_chairman_desc:0 ""

MON_rally_the_radicals:0 "급진파 규합"
MON_rally_the_radicals_desc:0 "범몽골주의는 우리 광활한 국토 곳곳에 존재하는 저명한 운동이지만, 수많은 급진파는 제대로 된 조직이 부족하며, 여전히 광대한 정치 지형에서 수적으로 크게 열세인 반대파의 지지를 받지 못하고 있습니다. 필요한 수단을 동원하여, 우리는 간접적으로나마 그들의 목소리가 날마다 더 커지도록 보장할 수 있습니다."

MON_host_emergency_great_khural_assembly:0 "긴급 국가대회의 소집"
MON_host_emergency_great_khural_assembly_desc:0 "우리는 많이 두려워했지만, 부정할 수 없는 사실이 있습니다. [SOV.getNameDef]와 그 관리들이 외세의 위협으로부터 우리 국가의 방위를 지원하는 데 더는 관심이 없다고 공식적으로 선언했습니다. 국가대회의는 현 정권의 국가 정치와 외교적 방향을 논의하기 위해 즉각적인 회의를 열어야 합니다."

MON_approach_japan:0 "일본에 접근"
MON_approach_japan_desc:0 "소문이 빠르게 퍼지고 있으며, 그로 인해 우리는 직간접적인 이웃 국가들의 어떠한 정치적, 군사적 간섭에도 열려 있습니다. 우리 영토가 다시 [CHI.getAdjective]에 점령될지 모른다는 두려움이 크기에, 우리는 적의 적, 즉 [JAP.getNameDef]에 접근하여 새로이 부상하는 정부 투쟁에서 그들의 지원을 구해야 할 수도 있습니다."

MON_invite_pince_su:0 "수 왕자 초청"
MON_invite_pince_su_desc:0 "[JAP.getAdjective]의 관심이 우리 영토에 대한 팽창주의적 성격뿐만 아니라 동반자적 성격도 띠고 있음을 확신합니다. 그들의 요원 중 일부는 이미 최근 과거에 다양한 정부 관리들에게 접근하여, [JAP.getAdjective] 투자자들이 우리 국가를 경제적으로 지원하고 그들의 고문들이 우리 군대의 발전을 지원한다면 상당한 이익을 제안했습니다. "

MON_launch_a_coup:0 "쿠데타 개시"
MON_launch_a_coup_desc:0 ""

#events#
mongol.2.t:0 "몽골, 상호원조조약 제안"
mongol.2.d:0 "오늘 저녁에 예정된 회의는 격렬할 것으로 예상되었지만, 아무도 그런 식으로 전개될 것이라고는 예상하지 못했습니다. [SOV.getLeader]가 늘 하던 대로 '[MON.getNameDef]와 [SOV.getNameDef] 양국의 노동자와 농민을 위하여' 건배를 제의한 후, 소련과 몽골 양국의 공동 미래 발전에 대한 논의가 시작되었습니다.\n[MON.getLeader]는 국내에서 끊임없이 증가하는 [SOV.getAdjective]의 주둔과 영향력을 고려하여 [MON.getAdjective]의 독립이라는 개념을 선호했지만, 총참모장 겔렉도르진 데미드는 지도자에게 다가가 양국 간의 협력을 증진할 것을 제안했습니다. \n\n[MON.getLeader]의 충격받은 얼굴과 [SOV.getLeader]의 만족스러운 반응은 결국 두 지도자의 관계가 어떤 운명을 맞이할지에 대해 많은 의문을 남겼습니다. 데미드는 설명을 하면서, [MEN.getNameDef] 내 [JAP.getAdjective]의 주둔이 경각심을 불러일으킬 정도로 높고, 작년 할힌 사원 전투 이후 전자와의 긴장이 고조된 것을 고려할 때 1934년의 '신사 협정'을 재검토할 필요가 절실하다고 지적했습니다. 이 협정은 다른 국가와의 군사적 충돌 시 상호 독립을 보장하는 것을 포함하여, 상호 이익이 되는 산업 및 군사 협력을 포함해야 합니다. \n\n서기장의 결정은 무엇이겠습니까?"
mongol.2.a:0 "원조 제공에 동의"
mongol.2.b:0 "몽골을 포기"

mongol.3.t:0 "소련, 조약에 동의"
mongol.3.d:0 "데미드의 제안은 [SOV.getAdjective] 사이에서 큰 열광을 불러일으켰고, [SOV.getLeader]는 미소 짓는 젊은 장군의 어깨를 지지하듯 두드리며 경제 투자, 무기 및 장비 이전, [SOV.getAdjective] 병사들을 위한 숙소, 군사 훈련 시설, 잠재적 방어선, 국경 순찰 감독 등 조약의 몇 가지 세부 사항에 대해 그와 논의했습니다. \n\n[SOV.getAdjective] 장군 중 한 명이 가져온 코냑을 마시도록 내버려 둔 [MON.getLeader]는, 수첩에 몇 마디를 적은 NKVD 수장 야고다를 제외한 모든 사람에게 잊힌 듯 보였습니다. 몇 분 후, 다른 혁명적 주제에 대한 논의는 큰 원을 그리며 계속되었습니다."
mongol.3.a:0 "그들이 동의해서 기쁩니다."

mongol.4.t:0 "소련이 우리를 버렸다!"
mongol.4.d:0 "[SOV.getLeader]는 '[SOV.getNameDef]는 서방과의 심각한 긴장과 함께 내부 안정을 위한 많은 시급한 문제를 안고 있어, 현재로서는 극동 개발에 집중할 수 없다'고 말하며, 현 상황에서 '우호 협력 조약'에 서명하자는 제안을 거절했습니다. \n\n실망한 데미드는 나중에 흥분한 [MON.getLeader]와 함께 다음 논의에서 몽골이 어떤 문제에 집중해야 할지에 대해 조용히 논의하는 모습이 목격되었습니다. "
mongol.4.a:0 "좋소, 그들이 원한다면"

mongol.5.t:0 "몽골, 자력갱생에 집중할 것을 제안하다"
mongol.5.d:0 "[MON.getAdjective] 대표단은 [MON.getLeader]의 지도 아래, 극동 지역에서의 국방비 지출 및 국제 관계에 대한 [MON.getAdjective]의 자력갱생을 오랫동안 주장해왔습니다. 몽골은 법적으로는 독립 국가이나, 실질적으로는 우리의 경제, 산업, 군사적 지도에 크게 의존하는 사실상의 지도국, 혹은 더 실용적으로 말해 괴뢰국입니다.\n만주에서의 [JAP.getAdjective] 주둔 증가와 자원이 풍부한 우리 트란스바이칼 지역에 대한 그들의 야욕을 고려할 때, 우리는 [MON.getAdjective] 영토에 주둔군을 증강할 수 있습니다. 반면, 이는 [JAP.getNameDef]와의 이미 우려스러운 긴장을 더욱 고조시킬 수 있습니다.\n모든 득실을 고려한 결과, [SOV.getLeader]는 다음과 같이 결정했습니다..."
mongol.5.a:0 "...이 조건들은 수용 가능합니다."
mongol.5.b:0 "...우리 "형제"를 지원하는 것이 낫겠습니다."

mongol.6.t:0 "[SOV.GetAdjective]가 요청을 승인하다"
mongol.6.d:0 "약간의 숙고 끝에, [SOV.getLeader]는 [MON.getAdjective]의 내부 정책과 정부 지출 문제는 "[MON.getAdjective]에서 비롯된 것이며 그들 자신에 의해서만 지도되어야 한다"고 설득력 있게 말하며, 해당 분야에서의 자치권 요청을 승인했습니다. 일부 [SOV.getAdjective] 파견대는 취약한 국경 지역의 안보를 보장하기 위해 몇 달 동안 주요 지역에 남아있을 것입니다.\n이 개념이 성공함에 따라, 우리는 당분간 [SOV.getAdjective]의 간섭 위험 없이 마침내 [MON.getadjective]를 원하는 정치적 방향으로 나아가게 하는 데 집중할 수 있습니다."
mongol.6.a:0 "훌륭하군!"

mongol.7.t:0 "소련, 여전히 지원 파견을 고려 중"
mongol.7.d:0 ""우리 형제 국가들의 인민 혁명 방어와 공산주의 정권 안보보다 더 시급한 문제는 없다" - [SOV.getLeader]의 성명은 그들이 이 문제에 대해 우리에게 제한된 자치권조차 허용할 이유가 없다고 본다는 것을 명확히 나타냈습니다.\n실망한 [MON.getLeader]는 [MON.getAdjective] 대표단의 다른 구성원들 사이에서 걱정스럽게 지지를 구하는 모습이 목격되었습니다. 더 강력한 [SOV.getAdjective]-[MON.getAdjective] 군사 협력에 찬성했던 총사령관 데미드를 제외한 대부분의 구성원들은 눈에 띄게 화가 나 있었습니다."
mongol.7.a:0 "알겠습니다"

mongol.8.t:0 "일본을 이용해 [SOV.getLeader]를 위협할까?"
mongol.8.d:0 "[SOV.getAdjective]는 최근 몇 년간 [JAP.getNameDef]가 얼마나 큰 위협이 되었는지에 대해 여전히 망상에 빠져있을 수 있습니다. 혁명의 진정한 적이자 동아시아의 주된 제국주의자가 누구인지 그들에게 상기시키는 것이 현명할 것입니다.\n\n하지만 다른 한편으로, 충동적이고 자유로운 사고를 하는 [MON.getLeader]가 우리 대표단을 이끌고 있으며, 말하자면 이례적이고 도발적인 방식으로 발표할 가능성이 높다는 점을 고려하면, [SOV.getLeader]가 그런 발언을 들을 기분이 아닐 수도 있으니 이 주제를 꺼내지 않는 것이 최선일 수 있습니다. "
mongol.8.a:0 "실행하라!"
mongol.8.b:0 "재고해 봅시다"

mongol.9.t:0 "[MON.getLeader]가 일본을 이용해 우리를 위협하다"
mongol.9.d:0 "우리 두 국가의 혁명적 수단에 대한 느리고 조용한 대화와, 이어진 [SOV.getLeader]의 프롤레타리아 활동 이야기는 갑자기 만취한 [MON.getLeader]에 의해 중단되었습니다. 그는 의자에서 일어나 보즈드의 얼굴에 대고 "이 빌어먹을 조지아 놈, 네놈은 사실상 러시아의 차르가 되었구나"라고 소리쳤고, 이어서 겐세크에게 다가가 뺨을 때리며 "너보다는 [JAP.getAdjective] 놈들이 더 나은 동맹이다"라고 외쳤습니다. 그 후 회의실에는 죽음과 같은 정적이 흘렀습니다.\n\n이전에는 아무도 겐세크에게 그런 태도를 보인 적이 없었기에, [SOV.getLeader]가 이에 어떻게 반응할지에 대한 의문이 제기됩니다."
mongol.9.a:0 "위협이 현실임을 깨닫는다"
mongol.9.b:0 "그 논리는 무시한다"
mongol.9.c:0 "겐덴은 친일파 첩자인가?"

mongol.10.t:0 "[SOV.GetAdjective]가 지원을 보내다"
mongol.10.d:0 "자신의 이익만을 챙기는 현대판 [SOV.getAdjective] 차르에 대한 [MON.getLeader]의 충격적인 연설은 많은 외국 대표단이 극동 상황에 대한 자신들의 시각에 무언가 분명히 잘못되었다는 것을 깨닫게 했습니다. 그리고 약간의 대화 끝에, 안도한 [MON.getAdjective] 대표단은 우리 두 국가 간의 협력을 강화하는 협정에 서명하도록 초대받았습니다!\n\n[MON.getLeader]는 분명 그날 저녁의 영웅이었습니다. 명백히 짜증이 난 [SOV.getLeader]는 저녁 내내 조용히 방의 어두운 구석에 있는 안락의자에 앉아 겐리흐 야고다와 어떤 "사소한 내부 문제"에 대해 이야기하고 있었지만 말입니다."
mongol.10.a:0 "이게 통했다고? 만세!"

mongol.11.t:0 "소련 지도부, 위협을 무시하다"
mongol.11.d:0 "새 파이프에 담배를 천천히 채워 넣으며, [SOV.getLeader]는 [MON.getLeader]를 지목하고 현 [MON.getNameDef] 대표의 정신 상태에 대한 깊은 우려를 표했습니다. 그는 과도한 음주와 주먹다짐은 토론에서 상대측 외교관을 설득하는 데 아무런 도움이 되지 않을 것이라고 말했습니다. 더욱이, 이는 동쪽의 작은 말썽꾼들에게는 불필요한 방법임이 증명될 것이라고 덧붙였습니다. \n\n몇 분 후, [SOV.getLeader]는 연방 최고 사령부에 동쪽의 위협은 가장 중요도가 낮으며 [SOV.getAdjective] 관리들에게는 "처리해야 할 더 중요한 문제들"이 있다고 발표하라는 지시를 내렸습니다. 이는 [JAP.getNameDef]와 같은 맹렬한 적을 무시하는 태도를 명백히 보여주는 것이었습니다."
mongol.11.a:0 "이제 우리에게 기댈 곳은 없는 것 같습니다"

mongol.12.t:0 "[SOV.GetAdjective]이 겐덴을 투옥했다고?!"
mongol.12.d:0 "서기장의 답변은 마치 지배적인 침묵이 그에게 말할 힘을 주는 듯, 느리고 차분한 속도로 이루어졌습니다. \n첫째로, 그는 NKVD가 [MON.getLeader]가 지도자 자리에 오르기 훨씬 전부터 그 사건을 다루고 있었다는 사실을 고려할 때, 그러한 주장은 쓸모없다고 지적했습니다. \n둘째로, [SOV.getLeader]는 "일본과 친구가 된다"는 "기묘한" 문구에 대해, [MON.getAdjective]이 정말로 노동 계급을 억압하는 자들의 보호에 호소할 생각인지 의문을 제기했습니다. 그리고 셋째이자 마지막으로, 그는 [MON.getLeader]를 가리키고 그의 겁에 질린 얼굴을 보며, 혁명과 만국의 아버지 블라디미르 일리치 레닌에 대한 그의 헌신에 의문을 제기했습니다. \n\n몇 분 후 겐리흐 야고다가 이끄는 NKVD 관리 몇 명이 방으로 들어와 술에 취한 [MON.getLeader]에게 이 격렬한 주제에 대한 개인적인 논의를 위해 따라오라고 정중히 요청했습니다. 남은 대표단은 가까운 시일 내에 모스크바를 떠나 울란바토르에 소식을 전할 것으로 예상됩니다."
mongol.12.a:0 "이제 어찌해야 한단 말인가?"

mongol.13.t:0 "[MON.GetAdjective] 대표단, 울란바토르로 귀환"
mongol.13.d:0 "[MON.getLeader], 게레그도르지인 데미드 및 몇몇 다른 당 관리들로 구성된 대표단이 약 한 달간의 정부 공백 끝에 마침내 모스크바에서 돌아왔습니다. 그들은 먼저 기차로 이르쿠츠크까지 이동했으며, 그곳에서 [MON.getAdjective] 수도로의 안전한 귀환을 보장하기 위해 몇 대의 [SOV.getAdjective] 자동차와 트럭이 제공되었습니다. \n\n온갖 협상, 외교적 책략, 제안과 역제안 끝에, 그들은 마침내 사무실로 복귀했으며, 며칠 내로 제7차 국가 대후랄 회의를 소집하여 회의 결과를 논의하고 향후 몇 년간의 새로운 국가 노선을 수립할 것을 요구하고 있습니다."
mongol.13.a:0 "곧 어떤 소식이 발표될 것인가?"

mongol.14.t:0 "[MON.GetAdjective] 열차, 빈 채로 돌아오다"
mongol.14.d:0 "12명의 경호원과 몇 명의 보조원으로 구성된 대표단 호위대는 이미 며칠 동안 이르쿠츠크 중앙역에서 기다리고 있었습니다. 그러나 대표단을 태운 열차는 이제야 도착했으며, 돌아온 일부 단원들은 [SOV.getAdjective] 측이 알려준 바에 따르면 겐덴이 루뱐카의 한 현지 호텔에서 "긴급하고 매우 필요한 문제들"을 논의하기 위해 모스크바에 남았다고 주장했습니다. \n\n겐덴의 경호원 중 한 명은 모스크바에서 유학했던 과거 경험을 떠올리며, 같은 이름의 NKVD 본부 건물에 대한 우려를 즉시 공유했고, 이는 우리의 용감한 지도자가 그곳에 투옥되었음을 암시하는 것이었습니다..."
mongol.14.a:0 "우리의 지도자는 어디에 있는가?!"

mongol.15.t:0 "[GetYear]년, 국가 대후랄 소집"
mongol.15.d:0 "제7차 국가 대후랄 회의는 오늘처럼 만원을 이룬 적이 없었습니다. 많은 장관, 대표, 하급 관리 및 언론인들이 이제 대표단 지도자들이 자리한 중앙 연단을 주시하고 있으며, 그들은 모스크바에서 [SOV.getAdjective] 측과 가졌던 수 시간, 수일에 걸친 토론의 요약을 발표할 준비가 되어 있습니다. \n\n환영의 박수갈채가 쏟아진 후, 대표단장인 [MON.getLeader]는 수백 개의 호기심 많고 조급한 눈들이 총리의 굳건한 자세를 응시하는 가운데 의자에서 일어나 마이크에 다가가 단 한 마디를 내뱉습니다..."
mongol.15.a:0 "[SOV.GetAdjective]이 우리에게 지원을 제공했습니다!"
mongol.15.b:0 "우리의 자립이 보장되었습니다!"
mongol.15.c:0 "우리는 그들에게 버림받았습니다!"



#### RAIDS EVENTS #################

mongol.19.t:0 "과도한 [MON.getAdjective] 병력 이동 감지"
mongol.19.d:0 "국경 순찰대에 따르면 지난 며칠 동안 우리 국경 중 한 곳에 [MON.getAdjective] 병력이 증강 집결하고 있는 것으로 보고되었습니다. 최근 감청된 무선 통신에 따르면, 그들이 우리 영토 내에서 어떤 종류의 군사 작전을 계획하고 있음을 시사합니다. \n현재 그들의 정확한 목표는 알려지지 않았지만, 이 연대들이 좋은 의도로 온 것이 아니며 최근에 나타난 위협에 효과적으로 방어하기 위해 우리 병사들의 신속한 조치와 대응이 요구되는 것은 분명합니다."
mongol.19.a:0 "어떤 대가를 치르더라도 진지를 사수하라는 명령을 하달하라!"
mongol.19.b:0 "저런 도적 떼보다 처리해야 할 더 중요한 문제들이 있다."

#small raids - outcomes#
mongol.20.t:0 "소규모 습격 성공"
mongol.20.d:0 "파견된 분대가 적 방어선을 효과적으로 돌파했으며, 저항을 거의 받지 않고 현지 민병대로 위장하여 마을에 잠입하는 데 성공했습니다. 허술하게 경비되던 현지 창고에서 무기를 일부 탈취하여 말에 싣고, 경보를 울리거나 지역 민간인에게 피해를 주지 않은 채 어둠 속으로 사라졌습니다. \n\n기지로 복귀한 병사들은 우리 고유의 설계를 개선하는 데 사용할 수 있는 몇 가지 변형 무기를 발견했다고 보고했습니다. 이는 다음 습격에 사용될 매우 반가운 전리품입니다."
mongol.20.a:0 "전리품을 가져와 연구하라!"

mongol.21.t:0 "소규모 습격 실패"
mongol.21.d:0 "공격대는 계획대로 이동하여 저항 없이 분쟁 중인 국경을 성공적으로 넘었고, 해가 뜨기 전에 현지 정착지에 도달하려 했습니다. 그때 갑자기 정체불명의 타격 부대에 매복 공격을 당했습니다. 마치 아군의 모든 움직임이 예상된 것처럼, 잘 짜인 함정이 미리 준비되어 있었던 것 같습니다. \n\n아군은 안전한 통로를 확보하고 본국으로 신속히 후퇴했습니다. 일부는 부상을 입었고, 다수는 무기를 잃었으며, 더 많은 병사들이 압도적으로 보이는 적에게 사기가 꺾였습니다."
mongol.21.a:0 "우리 병사들의 사기가 꺾였다..."

mongol.22.t:0 "공세 중단"
mongol.22.d:0 "아군 습격대가 적진으로 진격하던 중 지평선에서 어떤 움직임이 포착되었습니다. 몇 시간 후, 아군 여단은 진격해오는 적 부대와 마주쳤고, 양측의 성급한 병사들이 발포하면서 짧은 교전은 격렬한 전투로 번졌습니다. \n\n교전은 몇 시간 동안 계속되었고, 양측 모두 재편성, 전력 회복, 탄약 보충을 위해 각자의 사령부로 후퇴했습니다. 작전 목표는 안타깝게도 달성하지 못했지만, 실행된 일부 전술과 기동 덕분에 귀중한 경험을 얻을 수 있었습니다."
mongol.22.a:0 "좋다. 우리 병사들이 귀중한 교훈을 얻었군."

mongol.23.t:0 "소규모 습격 격퇴"
mongol.23.d:0 "예비 병력의 신속한 동원과 병력의 빠른 파견으로 잠재적인 재앙을 막았습니다. \n진격하는 [MON.getAdjective] 부대가 우리 영토 깊숙이 들어오자, 경계심이 강한 국경 연대가 그들을 멀리서 추적하며 상황을 관찰하는 동안 정규군은 아무것도 모르는 도적들을 위한 전장을 준비했습니다. \n\n계획된 주 교전이 시작되기 직전, 충동적인 지휘관 중 한 명이 부대에 적과 교전하라고 명령했습니다. 이로 인해 다른 부대들은 급속한 진격을 따라가게 되었고, 습격자들이 포위망을 벗어나 어둠 속으로 사라질 수 있게 되었습니다. 하지만 그들은 많은 총기를 남기고 갔으며, 우리는 이를 유리하게 활용할 수 있습니다."
mongol.23.a:0 "우리 인민의 승리다!"

mongol.24.t:0 "소규모 [MON.GetAdjective] 부대가 국경을 습격"
mongol.24.d:0 "오늘 일찍 국경 순찰대가 며칠 전에 우리 국경을 넘은 것으로 보이는 적 분대의 흔적을 발견했습니다. 발자국과 편자 자국으로 보아, 적대적인 팀은 기병 연대와 함께 수십 명의 경무장 병력으로 구성된 것으로 보입니다. 그들은 현지 탄약고로 이어지는 길을 따라 이동하여, 의심하지 않던 경비병들을 성공적으로 제압하고 다음 날 밤에 시설에 있던 대부분의 탄약을 가지고 떠났습니다. \n\n'유령 기수'에 대한 소문이 이미 현지 주민들 사이에 퍼지기 시작했습니다. 소규모 경찰 주둔군이 분쟁 지역에 파견되어 앞으로 몇 주 동안 지역 방위를 감독할 것입니다."
mongol.24.a:0 "귀중한 인력과 자산을 잃었다!"

mongol.25.t:0 "교착 상태 도달"
mongol.25.d:0 "몇몇 관측 가능한 농민들이 적 습격대를 발견하고 즉시 현지 경찰대 대장에게 우려스러운 메시지를 전달했습니다. 대장은 적의 진격을 늦추기 위해 분쟁 지역으로 '회담 대표단'을 파견했습니다. \n\n짧은 협상 끝에 양측은 각자 자신의 이익을 지키고 상대방으로부터의 증대되는 위협을 제거하려 할 뿐이라고 주장하며 발포했습니다. 전투는 어두워질 때까지 계속되었고, 적은 남은 병력을 모아 후퇴했으며, 우리 병사들은 상처를 치료하고 이 교전에서 교훈을 얻게 되었습니다."
mongol.25.a:0 "좋다. 우리 병사들이 귀중한 교훈을 얻었군."

#medium-sized-raids
mongol.26.t:0 "중규모 습격 성공"
mongol.26.d:0 "몇 주간의 집중적인 계획과 신중한 준비가 결실을 보았습니다. 아군 사단 몇 개가 여러 지점에서 적 국경을 돌파한 후 합류하여 군사 기지를 지키는 현지 주둔군을 제압하고, 탄약 창고에 잠입하여 우리가 사용할 수 있는 여러 종류의 현대 군사 장비를 회수했습니다. \n\n경보가 울린 후, 우리 분대들은 획득한 장비를 숨기고 잘 구축되고 보호된 통로를 통해 국경 너머 우리 쪽으로 안전하게 옮겼습니다. 현지 지휘관은 새로운 장비들을 우리 부대에 장비하거나 과학적 목적으로 활용할 수 있다고 흥분하며 보고했습니다."
mongol.26.a:0 "사용할 장비가 더 생겼군! 훌륭하다!"
mongol.26.b:0 "좋다. 시험용으로 사용하라."

mongol.27.t:0 "중규모 습격 격퇴"
mongol.27.d:0 "아군의 신속하고 다소 무모한 진격은 적 국경 경비 순찰대에 의해 저지당했으며, 적은 아군을 발견하자마자 즉시 사격을 개시했습니다. 아군은 고지를 점령한 채, 적 증원군이 분쟁 지역에 도착하기 전에 확고한 방어 진지를 구축하고 재진격을 위해 대형을 재편성하려 했습니다. \n\n적은 아군의 전술을 잘 알고 있는 듯했습니다. 아군의 반격이 시작되기도 전에 적 기병 연대가 측면 기동을 감행하여 방어가 허술한 측면에 혼란을 야기하고 근접전에서 아군 병력 일부를 제거했으며, 나머지 침투조는 충격에 빠진 생존자들을 수습하고 본토로 향하는 교두보를 확보한 뒤 밤이 되자 후퇴했습니다."
mongol.27.a:0 "오늘 많은 어머니들이 아들을 그리워할 것입니다..."

mongol.28.t:0 "습격 부대 진격 지연"
mongol.28.d:0 "작전의 첫 단계는 하나의 중요하지만 예외적인 경우를 제외하고 대부분의 관심 지역에서 초기 절차에 따라 수행되었습니다. 해당 연대는 적의 요새화된 진지 중 하나로 진격하여 통신선을 차단하고, 나머지 부대가 큰 어려움 없이 분쟁 지역에 침투할 수 있는 시간을 벌어줄 것으로 예상되었습니다. \n\n하지만 아군 병사 한 명의 소총이 고장 나 임의로 발사된 것으로 보이는 총성으로 인해 적색 경보가 발령되었고, 적은 아군과 근접전을 벌이게 되었습니다. 기회의 창은 닫혔고, 계속하라는 신호가 없자 남은 부대는 초기 위치로 후퇴해야 했습니다. 한편, 이미 참호에 자리 잡은 분대는 불행한 사건을 사령부에 보고하기 위해 전체 파견대를 성공적으로 대피시켰습니다."
mongol.28.a:0 "우리 연대를 개선하라."
mongol.28.b:0 "좋다. 배울 만한 다른 전술을 생각해보라."

mongol.29.t:0 "중규모 습격 격멸"
mongol.29.d:0 "순진한 적 침략자들은 멋대로 우리 영토로 들어와 민간 및 군사 목표물에 대한 성가신 공격으로 우리 국민을 위협할 수 있다고 생각했습니다! 국경 경비 순찰대는 우리 땅을 훔치고 약탈하려던 적 습격 부대를 성공적으로 격멸했다고 보고했습니다! \n\n적의 진격은 탐지되었고, 이들은 전략적 우위가 우리에게 있는 지역에서 저지당했습니다. 덕분에 용감한 기병 분대가 적을 우회하여 이 해충의 심장부를 타격했고, 도적들의 잔당은 왔던 곳으로 후퇴할 수밖에 없었습니다. 전리품은 병사들에게 수여되고 있으며, 현지 지휘관은 또 다른 훈장을 받습니다!"
mongol.29.a:0 "우리의 민병대와 군대가 자랑스럽다!"

mongol.30.t:0 "[MON.GetAdjective] 사단이 우리 군수품 저장고를 습격했다"
mongol.30.d:0 "국경 지대 군사 기지의 현지 수비대가 정기 통신에 응답하지 않자, 주민들 사이에 공황이 퍼지기 전에 해당 지역 군대의 총동원령이 선포되고 계엄령이 발령되었습니다. \n\n불과 몇 시간 후, 신속히 진격한 기병대가 현장에 도착했을 때, 적의 소행이 빚어낸 끔찍한 광경이 드러났습니다. 시설 전체에서 생산 자재뿐만 아니라 기계와 최근에 생산되어 보관 중이던 장비까지 사라졌습니다. 경제와 군사력에 이토록 막대한 피해가 발생했으므로, 앞으로는 이런 일이 다시는 일어나지 않도록 하는 것이 중요합니다. "
mongol.30.a:0 "이제부터 재건해야 할 것이 많을 것이다"

mongol.31.t:0 "습격 부대 저지"
mongol.31.d:0 "아군의 요새화된 지역 중 한 곳에서 침투한 적 분대가 정체불명의 총격을 가한 후 전역에 경보가 발령되었습니다. 어쨌든, 병사들은 잘 구축된 참호 방어선에서 적을 몰아내기 위해 진지에 파견되었습니다. \n\n전투는 몇 시간 더 계속되었고, 어느 쪽도 확실한 우위를 점하지 못한 채 적은 후퇴했습니다. 현지 수비대는 이 무모한 습격의 동기가 무엇인지 의문을 품게 되었습니다. 다른 국경 순찰대도 자신들의 관심 지역에서 적의 활동이 일부 증가했다고 보고했습니다."
mongol.31.a:0 "우리는 언제나 적의 진격을 격퇴할 준비가 되어 있다!"
mongol.31.b:0 "훌륭하다! 적으로부터 배워라."

####################### POLITICAL EVENTS ####################

mongol.35.t:0 "겐덴 처리 문제"
mongol.35.d:0 "최근 열린 대후랄 회의에서 우리 외교 사절단의 의정서가 대중에게 공개되어, 일부 대표단원의 회담 및 협상 전술을 둘러싼 모든 논란이 드러났습니다. \n\n다른 사람들보다 더 자주 언급된 이름이 하나 있었는데, 바로 전 총리인 펠지딘 겐덴입니다. 일부는 그의 행동을 강철 같은 의지와 강력한 불굴의 표시로 보지만, 다른 이들은 그의 도발적인 태도를 기술, 교육, 지혜의 부족으로 보며, 그런 인물은 미래에 고위 정치직을 유지할 수 없음을 시사합니다. \n\n우리가 선택할 수 있는 다양한 방안이 있습니다. 현명하신 [MON.getLeader]의 결정은 무엇입니까?"
mongol.35.a:0 "그가 외무부 장관으로 계속 재직하도록 허락하라."
mongol.35.b:0 "강제로 조기 은퇴시켜라."
mongol.35.c:0 "그런 행동은 용납할 수 없다. 그를 체포하거나, 더 좋게는 암살하라!"

mongol.36.t:0 "게렉도르진 데미드의 죽음"
mongol.36.d:0 "오늘 아침 정부청사는 노보시비르스크의 타이가 기차역에서 끔찍한 소식을 받았습니다. 군사 전문가 게렉도르진 데미드, 군단장 G.잔찬호롤로스, [SOV.getNameDef] 주재 [MON.getAdjective] 대사관 비서 곰보수렌, 육군 수석 번역가 T.도르지예프와 그의 아내 L.다그스마를 포함한 대표단 전원이 어젯밤 열차 침대칸에서 사망한 채 발견되었습니다. \n\n[SOV.GetAdjective] 범죄학자들이 제공한 보고서에 따르면, 사인은 잘못 보관된 생선 통조림으로 인한 식중독입니다. 이 사건은 우리나라에게는 매우 불행한 일이지만, 어쩌면 다른 누군가에게는 행운일지도 모릅니다. 두고 볼 일입니다..."
mongol.36.a:0 "의심스러운 우연의 일치인가?!"

#Choibalsan plot
mongol.37.t:0 "밧오치рын 엘데브오치르, 우려를 표하다"
mongol.37.d:0 "좌익 야권의 지도자 중 한 명인 밧오치рын 엘데브오치르가 "매우 긴급한 문제"를 논의하기 위해 오늘 저녁 일과가 끝난 후 [MON.getLeader]의 집무실에 도착했습니다. \n\n집무실의 탁상등 불빛 아래에서, 엘데브오치르는 국가의 정치적 기류가 급변함에 따라 많은 당 엘리트들이 현재 목숨의 위협을 느끼고 있다고 조용히 말했습니다. 그는 또한 만약 처이발상이 군사적 또는 정부적 승진을 한 번 더 한다면, 그의 국가에 대한 철권 통치와 내무인민위원회(NKVD)와의 연줄이 이 땅을 또 다른 10년간의 정치적 폭력으로 몰아넣을 수 있으며, 이는 반드시 막아야 한다고 언급했습니다."
mongol.37.a:0 "처이발상은 너무 위험하니, 봉기를 준비합시다."
mongol.37.b:0 "그에게 모든 것이 괜찮다고 안심시키십시오."

mongol.38.t:0 "좌파, 권력을 장악하다!"
mongol.38.d:0 "국가 소후랄의 오전 회의는 최근 통과된 법안에 반대하기 위해 건물 앞에 모인 군중에 의해 중단되었습니다. 그들은 이 법안이 일반 남녀가 아닌 정부 엘리트의 이익만을 위한 것이라고 주장했으며, 의회 경비대는 입법 과정에 대한 추가적인 방해를 막기 위해 급히 증원되었습니다. \n\n몇 시간 동안 구호를 외친 후, 군중은 주동자들을 앞으로 내세워 의회 건물에 앉아 있는 자들이 대중의 이익이 아닌 자신들의 사적인 이익을 위해 행동하고 있다고 경비대에게 알리며 정부 부패의 증거를 제시했습니다. 경비원들의 주의가 분산된 사이, 몇몇 무장한 남자들이 건물에 몰래 잠입하여 건물 통신을 차단하고 의회 회의를 해산시켰습니다. 그 뒤를 이어 [MON.getLeader]가 총리직에서 사임하고 "임시" 장관인 밧오치рын 엘데브오치르에게 권력을 이양하는 의례적인 절차가 진행되었습니다."
mongol.38.a:0 "대의를 위한 일이다"

mongol.39.t:0 "처이발상, 쿠데타를 일으키다!"
mongol.39.d:0 "국가 소후랄이 향후 5년간 국가의 정치 노선이 다시 좌경화될 것이라고 공식 발표했음에도 불구하고, 친[SOV.getAdjective] 세력의 지도 아래 상당수의 농촌 인구가 전국적으로 대규모 시위를 조직했습니다. 경찰과 충돌하면서 일부 시위대는 총기를 획득하고 전국에 있는 방비가 허술한 군수품 저장고를 습격하기 시작했으며, 이는 정당한 정권에 맞서 싸울 비정규 민병대를 조직하려는 목적으로 알려졌습니다! \n\n일부 무장 세력이 무력으로 인민의 자유 의지를 억압하는 것을 허용할 수 없습니다. 우리가 통치할 운명인 이 땅에 질서를 회복할 때가 왔습니다!"
mongol.39.a:0 "무기를 들어라!"

#puppeting leftist Mongolia via the focus tree
mongol.40.t:0 "몽골, 관계 강화를 모색하다"
mongol.40.d:0 "새로 수립된 정권의 취약성을 깨달은 [MON.getNameDef]는 외교 사절단을 파견하여 그들의 공산주의 해석이 우리의 견해와 일치함을 우리 관리들에게 확신시켰습니다. \n\n대표단은 또한 양국 간의 유대를 강화하고 몽골의 정부 노선을 [ROOT.getNamedef]와 [SOV.getLeader]가 이끄는 지도부가 보는 노선에 맞추는 몇 가지 조약 제안을 제시했으며, 이는 사실상 그들의 정권을 우리의 종속국으로 만드는 것입니다."
mongol.40.a:0 "아주 좋소, 때가 되었군."
mongol.40.b:0 "전략적으로 중요하지 않다."

mongol.41.t:0 "[SOV.getAdjective], 관계 강화에 동의하다"
mongol.41.d:0 "양국 간의 협력 확대 제안은 [SOV.getAdjective] 관리들의 큰 환영을 받았으며, 다양한 내외 문제를 어떻게 처리할지에 대한 몇 차례의 논의 끝에 다음 날 "[SOV.getAdjective]-[MON.getAdjective] 지도 및 지원 조약"에 서명하기로 합의했습니다. \n\n이 협정은 우리나라의 국가 기구에 대한 [SOV.getAdjective]의 통제를 효과적으로 확고히 하여, 정부의 노력을 국제 무대에서 국가의 입지를 강화하고 해외에서 혁명 대의를 증진하면서 직접적인 이웃 국가에 영향력을 행사하는 것으로 전환할 수 있게 해줍니다. "
mongol.41.a:0 "그 소식을 들으니 기쁩니다."

mongol.42.t:0 "소비에트, 요청을 거절하다"
mongol.42.d:0 "우리의 최선의 노력과 영구 동맹에 대한 진실된 약속에도 불구하고, [SOV.getLeader]은(는) "[MON.getAdjective]의 마르크스-레닌주의 원칙 해석은 현 상황에서 양국의 정부 구조가 내외부 협력을 강화하는 것을 허용하지 않는 몇 가지 이념적 차이를 내포하고 있다"고 말하며 우리의 미천한 제안을 공식적으로 거부했습니다. \n\n이러한 예상 밖의 조치를 고려하여, 우리는 독자적인 수단과 방법으로 외교 기반을 강화하고 원하는 공산주의 이념을 전파하는 데 최선을 다해야 할 것입니다."
mongol.42.a:0 "좋습니다, 우리끼리도 해낼 수 있습니다."

mongol.49.t:0 "숨겨진 음모?"
mongol.49.d:0 "우리 공산주의 정권의 혁명적 수단은 오랫동안 다양한 계층의 인민들 사이에서 의문시되어 왔습니다. 이들 중 다수는 외국 출신이거나, 종교적 배경을 가졌거나, 비전통적인 사고방식을 지니고 있습니다. 이들 사회 지도층의 많은 인물들을 전향시키고 자본주의, 제국주의, 독재주의에서 비롯된 부패한 사상에서 벗어나게 하려는 최선의 노력에도 불구하고, 그들의 목소리는 여전히 인민들 사이에서 울려 퍼지며 우리 남녀의 충성심을 흔들고 의심스러운 생각을 심어주고 있습니다. \n\n초기 조사에 따르면, 이들의 모든 선전 활동은 어떤 식으로든 서로 연결된 단일 유명 인사 집단으로 추적됩니다. \n\n이들이 공조하고 있음을 시사하는 가운데, 내무부 장관 허를러깅 처이발상은 음모의 수뇌부를 제거하고 국가가 또 다른 반란과 폭동의 연쇄에 빠지는 것을 막기 위한 계획을 입안했습니다."
mongol.49.a:0 "때가 왔습니다"

mongol.50.t:0 "지식인 문제"
mongol.50.d:0 "우리 인민의 교육은 그 어느 때보다 순조롭게 진행되고 있지만, 새로운 서적과 학습 자료는 우리 시민들의 머릿속에 자본주의적이거나 민족주의적인 사상을 심어줄 잠재력이 있습니다. \n[SOV.GetNameDef](와)과의 학생 교환 프로그램에서 돌아온 많은 젊은 전문가들이 우리의 학교, 기관, 연구 센터를 풍요롭게 했습니다. 그러나 문제는 여전히 남아 있습니다. 그들은 얼마나 신뢰할 수 있습니까? \n\n그들 중 얼마나 많은 이들이 혁명의 잠재적 씨앗을 품고 있으며 신뢰할 수 있겠습니까? 우리는 확실히 알아야 하며, 그 방법은 잘 알려져 있습니다..."
mongol.50.a:0 "대규모 트로이카 검열을 실시하라."
mongol.50.b:0 "우리에겐 걱정할 다른 문제들이 있습니다."

mongol.51.t:0 "당 개편"
mongol.51.d:0 "우리 당은 처이발상과 같은 좌파, 아난딘 아므르와 같은 우파, 그리고 전 총리 펠지딘 겐덴과 같은 지방파로 나뉘어 있습니다. 당의 극심한 분열은 1926-1928년의 우파적 자본주의 개혁과 1928-1932년의 극좌적 집단화 접근 방식으로 인한 파괴를 초래했습니다. \n\n급격한 정부 변화는 우리 인민의 삶에 부정적인 영향을 미치고 있습니다. 끊임없는 정치적 노선의 변화는 여러 요인으로 설명될 수 있지만, 주된 이유는 분명합니다. 우리 당에 [JAP.GetNameDef] 또는 [CHI.GetNameDef]의 외국 요원과 협력자들이 침투해 있습니다. 이는 용납될 수 없으며, 몇몇 의심스러운 당원들은 어떤 식으로든 정부에서 제거될 필요가 있습니다."
mongol.51.a:0 "모두를 감시 대상에 올리고 충성도를 신중히 확인하라."
mongol.51.b:0 "어쩌면 문제는 우리의 관점일지도 모릅니다?"

mongol.52.t:0 "라마승 문제"
mongol.52.d:0 "불교는 우리 시민들의 마음과 정신에 깊이 뿌리박혀 있으며, 우리나라 인구의 10%가 라마승과 승려입니다. 이러한 거대한 권력 집단은 무시할 수 없습니다. 1932년의 반란과 1933년의 룸베 음모는 상황이 너무 긴장되기 전에 개입할 필요가 있음을 분명히 보여줍니다. 다행히도, 우리는 처이발상이 집권한 이래로 라마승의 권력을 제한한 경험이 있습니다. \n\n[SOV.GetAdjective]인들과 그들의 지도자 [SOV.GetLeader], 그리고 공산주의 원칙에 충실하려면 이 작전을 가능한 한 빨리 수행해야 합니다."
mongol.52.a:0 "우리에게 다른 선택지는 없습니다."
mongol.52.b:0 "불교는 [MON.GetAdjective] 인민의 진정한 정신을 담고 있다!"

mongol.53.t:0 "지도력 문제"
mongol.53.d:0 "우리의 정보원들은 친[JAP.getAdjective] 협력자들과 제국주의의 앞잡이들이 계획한 정부 전복의 증거를 수집했습니다. 이들은 방비가 허술한 국경 지역을 통해 무기를 밀수하고 잘 알려진 장소에 보관했습니다. 포획된 일부 전보에는 "권력 상층부"에 대한 언급이 있으며, 최근 입수한 서신은 현 국가 지도자인 [MON.getLeader]을(를) 지목하고 있습니다. \n\n추가 조사 과정에서 일부 반혁명 분자들과 정기적으로 접촉하고 있는 몇몇 다른 정치인들이 지목되었습니다. \n\n충분한 증거를 확보했으므로, 책임자를 기소하고 다가올 불확실한 시대를 위해 새로운 의장을 임명해야 합니다."
mongol.53.a:0 "처이발상이 유일하게 논리적인 선택입니다."

mongol.54.t:0 "[MON.getLeader]이(가) 병환으로 쓰러졌습니다!"
mongol.54.d:0 "어제 늦은 저녁, [MON.getLeader]은(는) 번영하는 우리 국가의 내부 상황에 관한 최신 정부 법령 중 하나를 평소와 같이 작업하고 있었습니다. 비서의 부름에 응답하지 않자, 비서가 집무실에 도착하여 집무실 바닥에 쓰러져 있는 사상의 거인을 발견했습니다. \n\n즉시 울란바토르 병원으로 이송된 그는 현지 의사들의 진찰을 받았고, 향후 국가를 더 효율적으로 운영하는 것을 방해할 심각한 질병을 진단받았습니다. \n\n상태가 악화될지는 알 수 없지만, 항상 경계를 늦추지 않는 것이 좋습니다."
mongol.54.a:0 "우리가 무엇을 할 수 있겠습니까?"

mongol.55.t:0 "새로운 당 후계자?"
mongol.55.d:0 "오랫동안 [MON.getLeader]의 신체 및 정신 건강 상태와 이것이 [MON.GetHerHis] 의사 결정 및 [MON.GetHerselfHimself]이 대표하는 국가의 전반적인 국제적 위신에 미치는 영향에 대한 소문이 국민들 사이에 퍼져왔습니다. \n\n지도자께서는 이미 미래를 계획하시고 젊은 세대의 공산주의자들에게 권력을 이양하는 것을 고려하신 것으로 보입니다. 이들 중 일부는 가까운 시일 내에 국가 정책을 완전히 재확인할 것입니다. \n\n숙고 끝에, [MON.getLeader]께서는 당 의장으로...를 결정하셨습니다."
mongol.55.a:0 "대의에 대한 충성을 보인 체덴발로."
mongol.55.b:0 "의장? 여성 의장은 어떻습니까?"

mongol.56.t:0 "몽골, 합병을 요청하다!"
mongol.56.d:0 "우리의 경제적 유대와 정치적 영향력이 전례 없는 수준에 도달하여, 새로운 [MON.getAdjective] 정부는 젊은 의회가 [SOV.getNameDef]에 통합 공화국 또는 자치구로 합류하기로 결정했다는 공개 포고령을 발표했습니다. \n\n우리의 형제애적 유대에도 불구하고, 위대하지만 억압적이지 않은 강대국이라는 명성을 유지하는 것이 무엇보다 중요합니다. 또한, 다른 세계 열강들이 우리를 냉혹한 제국주의자로 여기길 원치 않는다면, 저 순수한 영혼들이 자멸하도록 내버려 두는 편이 낫습니다."
mongol.56.a:0 "하지만, 안 될 이유가 있습니까?"
mongol.56.b:0 "우리는 결코 제국주의자가 아닙니다!"

mongol.57.t:0 "[SOV.getAdjective]이 우리의 요청을 거절했다"
mongol.57.d:0 "양국이 독립적 지위를 유지하는 것이 우리 민족들의 형제애에 훨씬 더 유익할 것이라며, [SOV.getLeader]는 합병 요청에 대한 우리 젊은 의회의 간청을 정중히 거절했습니다. \n\n비밀 전문에서 중앙 당국은 [SOV.getAdjective] 정부에 대한 국제적 압력이 이미 충분히 높으므로 양국의 현재 외교 상태를 유지하는 것을 선호한다고 통지했습니다."
mongol.57.a:0 "그들이 원한다면야..."


#Khalkin Gol
mongol_khalkin_gol.1.t:0 "[MON.getAdjective]측 기동 준비 포착!"
mongol_khalkin_gol.1.d:0 "수 시간 전, 현지 지휘 본부는 70~90명으로 구성된 [MON.getAdjective]계로 추정되는 소규모 기병대가 노몬한 강 인근 국경을 넘어 주둔했다는 보고를 받았습니다. 이는 해당 지역이 현재 그들의 통제 하에 있음을 명백히 암시하는 행위입니다. \n\n몇 시간 후 우리 기마 연대가 적을 후퇴시켰으나, 침략자들은 이후 더 큰 규모로 되돌아왔습니다. 첩보에 따르면 적측 국경에 더 많은 병력이 집결 중이며, 해당 지역에서 모종의 군사 작전을 수행할 준비를 하는 것으로 보입니다."
mongol_khalkin_gol.1.a:0 "해외 원조 요청" #in case it is a puppet
mongol_khalkin_gol.1.b:0 "전군 동원!"       #should it be an independent nation

mongol_khalkin_gol.2.t:0 "할힌골에서의 [MON.getAdjective] 승리!"
mongol_khalkin_gol.2.d:0 "제국주의자들과의 전투에서 겪은 초반의 고전은 [761.Controller.getNameDef] 최고 사령부의 환상을 깨뜨리는 데 성공했습니다. 이후 며칠 동안, 그들의 무모한 장군 몇몇이 병사들에게 다양한 자살적 명령을 내렸고, 병사들은 잘 배치된 기관총 몇 정으로 방어되는 아군 참호 진지를 점령하기 위해 반복적인 공격을 감행해야 했습니다... 그 결과는 막대한 인력 및 장비 손실이었습니다. \n\n또한, 우리는 적 전차 몇 대를 노획하여 우리 고유의 기갑 설계를 개발하거나 개선하기 위해 연구할 수 있었습니다."
mongol_khalkin_gol.2.a:0 "문제가 마침내 해결되었다"
mongol_khalkin_gol.2.b:0 "우리 인민의 위대한 승리다!"

mongol_khalkin_gol.3.t:0 "할힌골에서의 [761.Controller.getAdjective] 승리!"
mongol_khalkin_gol.3.d:0 "침공 초기 단계는 [MON.getAdjective]군이 노몬한 지역의 분쟁 지대로 신속히 진격하여 할힌골 강 좌안을 점령하고, 기존 국경 표지석을 교체하며 지역 국경 요새를 강화하는 등 훌륭하게 수행되었습니다. \n\n그러나 이는 며칠 후 진지를 탈환하고 분쟁 상대의 모든 진격을 격퇴하여 지역의 우위를 확보한 [761.Controller.getNameDef]의 군대를 막지 못했습니다. \n\n몇 주간의 전투 끝에, [MON.getAdjective] 대사들은 물의를 일으킨 점에 대해 사과하고 현재의 국경선을 받아들였습니다. 이는 이 분쟁에서 [761.Controller.getAdjective]의 결정적인 승리를 의미합니다."
mongol_khalkin_gol.3.a:0 "분쟁은 끝났다. 일단은."
mongol_khalkin_gol.3.b:0 "이 충격에서 회복하려면 시간이 좀 필요할 것이다!"

mongol_khalkin_gol.4.t:0 "결정적인 승리를 거두지 못하다..."
mongol_khalkin_gol.4.d:0 "지속적인 병력 순환 배치와 무전 장비의 적극적인 사용, 항공 정찰 및 지원 부대의 적절한 운용으로 인해 어느 쪽도 적 전선의 잠재적 돌파구를 활용하지 못했으며, 전세를 한쪽으로 기울일 수 있는 결정적인 돌파 또한 이루어지지 않았습니다. \n\n수 주간의 전투로 교전 당사자들은 기진맥진했으며, 정전이 협의된 후 양측은 이전의 군사분계선에 합의하여 이 지연된 문제를 종결시켰습니다."
mongol_khalkin_gol.4.a:0 "이 국경 분쟁은 분명 다시 불거질 것입니다."

mongol_khalkin_gol.5.t:0 "할힌골에서의 확전!"
mongol_khalkin_gol.5.d:0 "누가 먼저 이 생각을 해냈는지는 알려지지 않았지만, 일부 모험심 강한 병사들이 우회당한 적을 다시 우회하기로 결정하고 새로운 지역에서 전투를 벌였습니다! 이러한 행동은 분쟁을 새로운 지역으로 확산시켰고, 이미 심각한 상황을 급격히 악화시켜 우리 군이 분쟁 지역에 점점 더 많은 병력을 파견하도록 만들었습니다. \n\n오늘 아침, 외국 대사가 우리 군이 몇 시간 내에 명령에 따르지 않고 분쟁 지역을 떠나지 않을 경우 공식적인 선전포고에 직면하게 될 것이라는 내용의 서한을 전달했습니다! \n\n분명히, 적은 전쟁을 원하고 있습니다. 우리는 그들에게 이런 문제가 어떻게 해결되는지 보여줄 것입니다!"
mongol_khalkin_gol.5.a:0 "동원 가능한 모든 병력을 투입하라!"

mongol_khalkin_gol.6.t:0 "[SOV.getAdjective]의 군사 기동에 대한 관심"
mongol_khalkin_gol.6.d:0 "우리의 협력국인 [SOV.getNameDef]의 참모 보고서에 따르면, 그들의 관리들은 이 지역의 우리 군과 [761.Controller.getAdjective] 군 사이의 긴장을 잘 알고 있으며, 만약 앞으로 며칠 또는 몇 주 내에 어느 한쪽이 이 지역에서의 주둔 병력을 증강한다면, 그들은 분쟁 지역에서의 우리 투쟁을 돕기 위해 소규모 파견대를 파견할 준비가 되어 있다고 합니다. \n\n하지만 모든 것에는 대가가 따릅니다. 그리고 그러한 움직임은 우리가 원하든 원하지 않든 우리 군 내에서 그들의 입지를 확실히 강화할 것입니다. 물론, 우리가 커져가는 위협을 스스로 감당할 수 없다면 말입니다..."
mongol_khalkin_gol.6.a:0 "[SOV.getAdjective] 고문단을 초청한다"
mongol_khalkin_gol.6.b:0 "이 문제는 우리 손으로 해결할 수 있다"



#democratic Mongoolia events
mongol_democratic.1.t:0 "국가대회의에 대한 공격!"
mongol_democratic.1.d:0 "국가의 농촌 지역에서의 시민 소요는 전국 각지의 아이마그 대표들의 심각한 우려를 낳았고, 이들 모두는 몇 주 전 공표된 국가대회의 긴급 회의에 모였습니다. \n\n헨티와 더르너드 아이마그 대표들이 앞으로 나와 혁명적 수단과 공산주의 이념에 대한 헌신에 대해 열정적인 연설을 시작하기 전까지는 모든 것이 의사 일정에 따라 진행되고 있었습니다. 그런데 갑자기 정체불명의 남자들이 나타나 회의 경비병 몇 명에게 총을 쏘고 공황에 빠진 대표단 무리에 수류탄 여러 발을 투척하며 연설을 중단시켰습니다. \n\n발생한 혼란 속에서, 남은 경비병들이 모든 침입자를 사살하기 전에 많은 대의원들이 공격의 희생양이 되었습니다. \n\n이러한 행동은 오직 한 가지를 의미할 수밖에 없습니다:"
mongol_democratic.1.a:0 "테러 공격이다!"
mongol_democratic.1.b:0 "개입이다!"


mongol_democratic.2.t:0 "[SOV.getAdjective]이 지원하는 쿠데타 시도"
mongol_democratic.2.d:0 "최근의 국가 정책 발전과 시행에 환멸을 느낀 다양한 집단의 사람들이 [ROOT.getLeader]이 도입한 개혁의 철회와 정치 체제 변경을 요구하며 공개적으로 항의의 목소리를 내고 시위를 조직하기 시작했습니다! \n\n이전에는 경찰이 평화적이거나 그렇지 않은 수단으로 시위대를 해산시킬 수 있었지만, 이번에는 일부 시위대가 화기를 갖추고 출처 불명의 소이 무기를 획득하여 현지 경찰이 울란바토르의 정부 구역으로 후퇴하게 만들었습니다. 그 후 군중은 총리 집무실 중앙 사무소 앞에 텐트를 치고, 끊임없이 그의 사임을 요구하는 구호를 외쳤습니다. \n\n불과 며칠 후, 지역 분견대의 지원을 받은 우리 경찰 부대는 군중을 해산시키고 시위 주동자들을 체포하는 데 성공했습니다. 심문 과정에서, 그들 중 일부는 국가 서부 지역에서 정부에 대항하는 공개적인 [SOV.getAdjective] 반란을 준비하고 있었음을 인정했습니다! 해당 지역의 우리 정보원들은 우리 군이 단 한 번의 신속한 타격으로 적을 처리해야 한다고 확인해주었습니다."
mongol_democratic.2.a:0 "뱀의 목을 칠 시간이다!"

mongol_democratic.3.t:0 "[From.GetNameDefCap]이 보장을 요청하다"
mongol_democratic.3.d:0 "중앙아시아에서 민주주의의 기반이 확고하게 자리 잡은 적이 없다고 주장하며, [FROM.getAdjective] 외교관들이 연례 국제 회의 중 하나에서 우리 외국 대사들에게 접근하여 "아시아 지역의 안정과 번영을 위해" 공식적인 지원 보장을 요청했습니다. \n\n우리의 몇몇 이념적 차이, 넓은 지리적 거리, 그리고 과거의 일부 분쟁에도 불구하고, 그들의 정부는 외교 기관을 강화하고 [ROOT.getNameDef]의 보호를 받으며 세계 무대에 진출할 준비가 충분히 되어 있는 것 같습니다. 그들이 말하길, 우리가 해야 할 일은 그들의 대의에 대한 외교적 지지를 발표하는 것뿐입니다."
mongol_democratic.3.a:0 "그들은 미래에 훌륭한 동맹이 될 것이다"
mongol_democratic.3.b:0 "실례합니다만, 누가 우리의 지원을 요청한다는 겁니까?"

mongol_democratic.4.t:0 "[FROM.getNamedefCap], 우리를 보호하기로 동의"
mongol_democratic.4.d:0 "전 세계의 다양한 민주주의 기관을 확보하는 것의 중요성을 강조하며, [FROM.getAdjective] 대사는 다음과 같은 내용이 명시된 서명된 협정을 전달했습니다: \n\n"지금부터 문명의 여명이 밝아올 때까지, [ROOT.getNamedef]이(가) 자국 내외에서 민주주의를 보존하기 위해 노력하는 한, [FROM.getNamedef]은(는) 모든 군사력과 경제력을 동원하여 자유와 자결의 이념을 지지하고, 국경을 존중하며, 더 긴밀한 외교 관계를 추구할 것입니다!" \n\n이는 명백한 외교적 승리이며, 세계 무대에서 우리의 내부 안보를 보장하는 또 다른 장치입니다, 만세!"
mongol_democratic.4.a:0 "외교가 승리했습니다!"

mongol_democratic.5.t:0 "[FROM.getNamedefCap], 보호 제공을 거부"
mongol_democratic.5.d:0 "우리의 최선의 노력에도 불구하고, 외국 대사는 우리 대표단에게 [FROM.getNamedef]이(가) [ROOT.getNamedef]의 민주주의 기관 보호를 보장할 외교적 또는 군사적 수단이 없다는 점을 유감스럽게 통보했습니다. \n\n우리 급진파 의원 중 일부는 외국 행정부의 공식 답변 상태를 고려할 때, [FROM.getLeader]이(가) 지도에서 우리 나라를 찾을 수나 있을지 이미 의문을 제기하고 있습니다."
mongol_democratic.5.a:0 "우리 힘으로 해결해야 할 것 같군요..."

mongol_democratic.6.t:0 "[MON.getNamedefCap], 자국 외교관 소환"
mongol_democratic.6.d:0 "오늘 아침 [MON.getAdjective] 대사관 위로 검은 연기가 피어오르는 것이 목격되었으며, 이는 일부 관리가 자국의 문서를 소각하거나 파기하고 있음을 명백히 보여줍니다. \n\n대표단의 행동에 대한 공식적인 질의에, [MON.getNameDef] 대표들은 "[ROOT.getNameDef]에 주재하는 모든 [MON.getNameDef] 영사관 및 대사관의 즉각적인 폐쇄"에 관한 특별 법령을 제시했습니다. 이는 그들 측에서 우리 두 나라 간의 공식적인 외교 관계 단절을 의미합니다."
mongol_democratic.6.a:0 "전쟁이 다가오는 것인가?"

mongol_democratic.7.t:0 "[MON.getNamedefCap], [FROM.getNamedefCap]에서 자국 외교관 소환"
mongol_democratic.7.d:0 "인민의 다양한 적들에 대한 [MON.getAdjective]의 입장은 새로운 것이 아니지만, 최근의 외교적 움직임은 많은 우리 국민을 놀라게 했습니다: [MON.getNamedefCap]은(는) [FROM.getNamedefCap]과 유사한 정권과는 더 이상 어떠한 외교 협상도 진행하지 않겠다고 공개적으로 발표했습니다. \n\n더욱이, [MON.getAdjective] 군은 상당한 양의 예비군을 동원하는 것으로 보이며, 자국 외교관들은 이제 외교적으로 고립된 국가를 적극적으로 떠나고 있습니다."
mongol_democratic.7.a:0 "이 위협을 끝낼 때가 되었다."

mongol_democratic.8.title:0 "[MON.getAdjective] 외교 사절단, 해외 동맹 협상 개시"
mongol_democratic.8.desc:0 "\n우리 정보부에 따르면 [MON.getAdjective] 외무부의 활동이 증가했으며, 잠재적 동맹국들과 우호 관계를 수립하려는 노력의 일환으로 자국 외교관들이 다른 나라들로 향하고 있다고 합니다. \n\n그러나 이 협상이 결실을 맺을지는 아직 알 수 없지만, 우리는 전개되는 상황을 주시하고 우리에게 닥칠 최악의 결과를 예상해야 합니다."
mongol_democratic.8.a:0 "경계를 늦추지 말아야 합니다."

mongol_democratic.10.t:0 "몽골이 화해를 요청하다"
mongol_democratic.10.d:0 "몽골 대표단이 몽장위원회와 접촉하여 외몽골의 역할과 그들에 대한 우리의 영유권 주장에 대한 지속적인 분쟁을 해결하려 하고 있습니다. \n\n공식적으로는 중립이지만, [MON.getNamedef]은(는) 점차 우리 영향권으로 편입되는 것으로 보이며, 이는 우리에게 러시아 극동의 심장부로 향하는 열쇠를 쥔 중앙 스텝의 가장 큰 국가와 동맹을 맺을 일생일대의 기회를 제공합니다. \n\n우리의 야망을 접고 북부 국경의 안정을 보장해야겠습니까?"
mongol_democratic.10.a:0 "지금은, 우리의 차이점은 접어두도록 합시다."
mongol_democratic.10.b:0 "그들에겐 다른 계획이 있습니다."

mongol_democratic.11.t:0 "[FROM.getNamedefCap], 화해에 동의"
mongol_democratic.11.d:0 "우리나라의 전략적 중요성을 깨닫고 그들의 대의에 대한 우리의 충성을 유지하기 위해, 몽장위원회의 [FROM.getAdjective] 관리들은 이전의 적대 행위를 철회하고, 우호적이지는 않더라도 우리 두 나라 사이에 중립적인 관계를 재수립한다고 발표했습니다. \n\n중국과 거리를 두는 것은 잠재적으로 다른 지역 강대국들을 멀어지게 할 수도 있지만, 그게 정말 중요할까요?"
mongol_democratic.11.a:0 "외교가 승리했습니다!"

mongol_democratic.12.t:0 "[FROM.getNamedefCap], 우리의 화해 제안에 무관심을 보임"
mongol_democratic.12.d:0 "우리 대표단은 [FROM.getAdjective] 대표들로부터 정중한 거절을 받았습니다. 그들은 우리 인민의 인정과 자결을 위한 투쟁을 인정하지만, 현재 그들 정부는 "처리해야 할 더 시급한 문제들이 있어 이러한 외교적 제안에 집중할 수 없다"고 밝혔습니다. \n\n우리는 중앙 정부를 설득하기 위해 최선을 다했으며, 만약 그들이 협력할 의사가 없다면, 아마도 다른 지역 강대국들은 협력할지도 모릅니다."
mongol_democratic.12.a:0 "다른 선택지도 고려하겠습니다"

mongol_democratic.15.t:0 "[FROM.getNamedefCap], 영유권 주장 철회를 위해 우리 관리들에게 호소"
mongol_democratic.15.d:0 "[FROM.getAdjective] 관리들은 양국 간의 협력을 강화하기 위해, 몽장위원회에 양국의 평화롭고 번영하는 공존을 위해 긴장을 완화하고자 하는 바람을 발표하며 호소했습니다. \n\n대표단장은 수년 동안 [ROOT.getNameDef]이(가) 외몽골 땅을 중국 본토 영역 내의 자치구로 주장해왔으며, 이는 그들 국가 내의 민족 자결 개념을 고려할 때 논쟁의 여지가 있는 문제라고 밝혔습니다. \n\n긴장 고조 대신 관계 개선을 모색하며, 그들은 자국 영토에 대한 주장을 재고하기 위해 몇 가지 양보를 할 준비가 되어 있습니다. 양측 모두에게 상호 이익이 되는 거래인 것 같습니다."
mongol_democratic.15.a:0 "정치적 지원의 증명을 요구한다"
mongol_democratic.15.b:0 "무기 거래를 요청한다"
mongol_democratic.15.c:0 "산업 이권을 요구한다"
mongol_democratic.15.e:0 "군수 산업 이전을 요구한다"

mongol_democratic.16.t:0 "[FROM.getNamedefCap], 정치적 지원의 증명을 요구함"
mongol_democratic.16.d:0 "이 불확실한 시기에는 충성이 전부이며, 이를 깨달은 [FROM.getLeader]은(는) 조공 외교 방문의 형태로 [FROM.getNameDef]의 정치적 투쟁에 대한 충성심의 증명을 요구했습니다. \n\n비용이 많이 드는 제안처럼 보이지만, 다른 방식의 지불은 우리에게 훨씬 더 가혹했을 것이라는 확신을 받았습니다."
mongol_democratic.16.a:0 "필요한 약속이다"

mongol_democratic.17.t:0 "[FROM.getNamedefCap], 무기를 요청함"
mongol_democratic.17.d:0 "현재 상비군을 강화하기 위해, [FROM.getLeader]은(는) 우리에게 군사 장비와 "최정예" 주둔군을 제공해달라고 요청했습니다. 이들은 [FROM.getAdjective] 전쟁에서 싸울 자원군으로 파견될 것입니다. \n\n우리 외교관들은 조건의 두 번째 부분을 협상하는 데 성공하여, 상대방에게 필요한 총기만 보낼 수 있게 되었습니다."
mongol_democratic.17.a:0 "괜찮은 거래인가?"

mongol_democratic.18.t:0 "[FROM.getNamedefCap], 민간 물자 시설 이전을 요청함"
mongol_democratic.18.d:0 "지난 10년 초에 있었던 우리의 산업 국유화는 [FROM.getAdjective] 자본을 몰아냈고 많은 [FROM.getNameDef] 상인들이 일자리와 저축을 잃게 만들었습니다. \n\n이러한 불행한 사태는 바로잡아야 한다고 말하며, [FROM.getLeader]은(는) "정당한 자산"을 그들의 손에 다시 넘겨달라고 요청했습니다..."
mongol_democratic.18.a:0 "가치 있는 희생이다"

mongol_democratic.19.t:0 "[FROM.getNamedefCap], 군수 산업 이전을 요구함"
mongol_democratic.19.d:0 "[FROM.getNameDef]의 군벌은 정부 내에서 강력한 입지를 가진 것으로 보입니다. 우리가 문제의 영유권 주장을 철회시키길 원한다면, 그들 관리들은 해당 지역의 군사 시설 이전을 요구했습니다. \n\n이러한 상황에서는, 그토록 높은 대가를 치르고서라도 그 땅에 대한 어떠한 팽창주의적 생각도 포기할 것입니다..."
mongol_democratic.19.a:0 "음..."

mongol_democratic.20.t:0 "[FROM.getNameDefCap], 보호를 요청함"
mongol_democratic.20.d:0 "우리는 [FROM.getNameDef]으로부터 특이한 요청을 받았습니다. 그들의 관리들은 강력한 친[ROOT.getAdjective] 입장을 취하며, 자치구로서 [ROOT.getNameDef]의 영역에 다시 합류하여 외곽 국경의 안보에 크게 기여하고 대초원으로 우리의 영향력을 광범위하게 확장하고자 하는 바람을 발표했습니다. \n\n최종 결정은 어떻게 해야 할까요? 분리된 지역을 다시 받아들여야 할까요?"
mongol_democratic.20.a:0 "물론입니다, 거절할 이유가 있겠습니까?"
mongol_democratic.20.b:0 "관심 없습니다"

mongol_democratic.21.t:0 "보호령 지위 확정"
mongol_democratic.21.d:0 "[FROM.getLeader]의 고위 관료들은 우리의 요청을 검토한 후 주저 없이 즉시 수락했음을 보증했습니다! \n\n아침 대국민 연설에서 [FROM.getLeader]은(는) 과거 외곽 국경 지역 중 하나가 대중화의 영역으로 돌아왔으며, 이제 궁극적으로 전체 중화 민족의 경제 성장, 군사력, 재통일에 기여할 것이라며 기념일을 선포했습니다! 환호하는 군중은 중국 연합의 깃발 아래 "오랫동안 잃어버렸던 형제자매"를 환영합니다!"
mongol_democratic.21.a:0 "우리 인민에게 위대한 날입니다!"

mongol_democratic.22.t:0 "보호령 지위 거부"
mongol_democratic.22.d:0 "우리의 최고 외교관들은 진심 어린 약속에도 불구하고, 완고한 [FROM.getAdjective] 관리들을 설득하여 우리가 자치 지역으로서 그들의 영역에 들어가는 것을 허락받지 못했습니다. \n\n"과거 분리된 주에 대한 통제권을 약화시키는 것은 그들의 이익에 부합하지 않는다"고 주장하며, 우리의 두 번째 호소 또한 결국 거부되었습니다!"
mongol_democratic.22.a:0 "그들이 관심이 없다고?!"

mongol_democratic.24.t:0 "몽골, 투바 문제를 제기하다"
mongol_democratic.24.d:0 "[MON.getAdjective] 관리들의 이웃 국가에 대한 공격적인 수사와 친중국적 입장이 결합되어, 우리나라의 여러 정치인들 사이에서 정당한 우려를 불러일으켰습니다. \n\n[MON.getNameDef]은(는) 많은 투바인과 러시아인의 고향인 우리얀하이 지방을 포함하여 1911년 국경의 통일 몽골 국가를 위한 선전 활동을 강화하고 있는 것으로 보입니다. \n\n우리는 이 불안하고 위험한 시기에 국가가 우리의 손에 남아있도록 최선을 다해야 합니다."
mongol_democratic.24.a:0 "그들을 저지하기 위해 최선을 다할 것입니다"

#Genden events
mongol_genden.1.t:0 ""부자 되기" 정책 발표"
mongol_genden.1.d:0 ""신전환" 경제 정책과 그 성공은 비공식 정부 프로그램인 "부자 되기"의 폐지로 인해 큰 차질을 빚었습니다. 이 프로그램은 모든 국민이 개인과 집단의 안정을 위해 자본을 축적하도록 장려하는 것이었습니다. \n\n다시 한번 전국적으로 자신의 입지를 강화하기 위해, 겐덴은 잠재적인 결과가 아무리 가혹할지라도 가능한 모든 수단을 동원하여 자신의 인민을 단결시키고 부유하게 만들고자 합니다. \n\n새로 발표된 정책은 1년 동안 전국적으로 강화될 예정이며, 중앙위원회가 월간 경제 보고서를 통해 그 이행 과정을 감독하면서 가난한 농민과 노동자를 지원할 것입니다. \n\n그것이 얼마나 성공적일지는 시간이 지나야 알 수 있을 것입니다."
mongol_genden.1.a:0 "전진하라, 동지들이여!"

mongol_genden.2.t:0 "시민들, 새로운 작업장 설립"
mongol_genden.2.d:0 "몇몇 열정적인 동지들이 소비재를 생산할 수 있는 민간 작업장을 설립하여, 아이막의 수도에 대한 경제적 의존도를 낮춘 것으로 보고되었습니다. \n\n일부 현지인들은 이미 노동력에 합류하고 있으며, 현지에서 선출된 감독관은 수도의 엄격한 통제 하에 민간 수요를 위한 물품의 생산과 재분배를 감독하고 있습니다."
mongol_genden.2.a:0 "훌륭하군!"

mongol_genden.3.t:0 "신규 군수 생산 시설 건설"
mongol_genden.3.d:0 "현지 주둔군의 보급 부족과 현대 화기에 대한 절실한 필요를 목격한 지역의 의식 있는 시민들이 자금을 모아, 인민의 필요에 부응하기 위해 소총 및 기타 군수 장비를 공급할 탄약고와 관련 기반 시설 건설을 촉진했습니다. \n\n일부 무기 설계는 우리 공식 제조업체가 생산하는 수준이거나, 심지어 그보다 더 나은 것으로 보입니다!"
mongol_genden.3.a:0 "인민의 손에 무기를!"

mongol_genden.4.t:0 "지역 도로 확장"
mongol_genden.4.d:0 "다양한 건설 회사들이 우리 시민들의 막대한 기부금으로 지원받아 전국의 도로망을 개선하고, 이 지역의 거친 자연에 대한 인민의 통제력을 강화할 수 있게 되었습니다. \n\n이러한 발전은 현대적인 병참의 혜택을 누리게 될 우리 지상군의 작전 수행 능력에 긍정적인 영향을 미칠 것으로 예상됩니다."
mongol_genden.4.a:0 "이대로 더 나아갈 수 있다!"

mongol_genden.5.t:0 "주택을 요새화하는 국민들"
mongol_genden.5.d:0 "자신들이 모은 자본을 지키기 위해, 일부 두려움에 떠는 시민들이 지하실을 확장하고 집 안팎으로 일련의 방어 시설을 구축했다고 합니다. 영광스러운 우리 군의 보호 아래 있다는 점을 고려하면, 이는 분명 예상치 못한 사건의 전개입니다. \n\n하지만 이 방어 시설들은 전쟁의 위기 상황에서 아군 방어 병력이 사용한다면 유용하게 쓰일 수도 있습니다."
mongol_genden.5.a:0 "그들이 뭘 했다고?"

mongol_genden.6.t:0 "부패 계획 적발"
mongol_genden.6.d:0 "지난달 자본 흐름을 분석한 결과, 일부 정부 자금이 여러 스베르카사(Sbaerkassa) 장부를 거쳐 최종적으로 몇몇 대리인들의 특정 예금 계좌로 들어간 것으로 나타났습니다. \n\n반부패위원회의 추가 조사 결과, 이는 잘 위장된 부패 계획임이 명백히 드러났습니다. \n\n하지만 조사관들은 분석을 마치고 보고서를 작성하기 위해 추가적인 시간과 자금이 필요합니다. 이제 어떻게 해야 하겠습니까?"
mongol_genden.6.a:0 "책임자들을 처벌하라!"
mongol_genden.6.b:0 "길고 긴 공식 재판을 시작하라."

mongol_genden.7.t:0 "생산 자재 실종"
mongol_genden.7.d:0 "우리 공장 중 한 곳의 현장 감독이 생산 라인에서 생산 자재가 사라졌다는 보고서를 제출했습니다. 이 문제는 포장 작업장에서 200개의 컨테이너 중 나머지 5개를 물품으로 채울 수 없게 된 후에야 명백해졌습니다. \n\n잠재적인 파괴 행위자가 누구인지는 아직 알 수 없지만, 많은 공장 노동자들이 정부의 요청을 채우기 위해 하루에 몇 시간씩 추가 근무를 할 준비가 되어 있다고 이미 보고했습니다. 얼마나 용감하고 책임감 있는 행동입니까!"
mongol_genden.7.a:0 "이번 달 생산 할당량을 늘려야 할 것이다."

mongol_genden.8.t:0 "인플레이션 심화"
mongol_genden.8.d:0 "국민들이 전례 없는 규모로 자본을 축적함에 따라, 정부 기관은 국가 통화의 붕괴를 막기 위해 시장에 개입하여 수요와 공급을 조절해야 합니다. \n\n이러한 개입은 비용과 시간이 많이 드는 노력이며, 오직 중앙은행만이 규제할 수 있고 또 그래야만 합니다. 중앙은행은 다음 기간 동안 경제를 규제하라는 명령을 받게 될 것입니다."
mongol_genden.8.a:0 "몽골은행이 그로 인해 고통받을 것이다."

mongol_genden.10.t:0 "[SOV.getAdjective] 동조자 문제"
mongol_genden.10.d:0 "[SOV.getNameDef]의 최근 정치적 발전을 관찰하며, [ROOT.getLeader]은 자신 및 부하들과의 오랜 철학적 토론 끝에 공산주의 건설은 "정당한" 통치자가 원하는 국가의 내외부에서 권력을 잡는 것을 지원할 수 있는 내외부 요원들의 기반에 크게 의존한다는 것을 깨달았습니다. \n\n그리고 몽골의 공산주의 건설에서 [SOV.getAdjective] 정치인들의 역할이 얼마나 강력했는지를 고려할 때, 정부 내 일부 인사들이 여전히 개인적 또는 공동의 목표를 달성하기 위해 친[SOV.getAdjective] 노선을 선호하는지에 대한 의문이 여전히 남아있습니다. \n\n오랜 고심 끝에, [ROOT.getLeader]은 이 문제를 단번에, 그리고 바라건대 영원히 해결하기로 결정했습니다."
mongol_genden.10.a:0 "우리는 그들과 다르다, 숙청은 없을 것이다!"
mongol_genden.10.b:0 "가장 급진적인 분자들만 제거하라."
mongol_genden.10.c:0 "안보를 위해 누구도 남겨두지 마라!"

mongol_genden.14.t:0 "겐덴, 몽골로 귀환하다!"
mongol_genden.14.d:0 "우리가 겪어야 했던 모든 고난과 걱정 끝에, 그의 귀환 소식이 마침내 울란바토르에 도착했습니다! \n\n네 명의 작은 호위대와 함께, 그는 자신을 [SOV.getAdjective]-[MON.getAdjective] 국경으로 데려온 수송 차량에서 내려 새벽이 오기 전에 국경을 넘었습니다. 조국의 땅을 걸으며, 생존을 위한 투쟁의 영웅인 그는 지치고 핼쑥한 얼굴에 기쁨의 눈물을 흘리며 우리 인민들을 행복하게 맞이하는 모습이 목격되었습니다. \n\n다음 날 공식 기념식이 열렸고, 그는 수많은 군중 앞에서 조국으로의 귀환을 공식적으로 선포하며, 투쟁의 시기에 어쩔 수 없이 떠나야 했던 나라를 재건하겠다는 목표를 밝혔습니다!"
mongol_genden.14.a:0 "돌아오셔서 정말 기쁩니다!"

mongol_genden.15.t:0 "겐덴, 소련에서 처형되다!"
mongol_genden.15.d:0 "현지 NKVD 요원이 [ROOT.getLeader]의 집무실에 "일급비밀"이라는 문구가 적힌 작은 쪽지를 전달했습니다. 쪽지에는 어느 기차역에서 눈썰미 좋은 [SOV.getAdjective] 관리에 의해 신원이 발각된 겐덴의 체포 및 심문 절차 기록이 담겨 있었습니다. \n\n생애 마지막 날, 겐덴은 반혁명 활동, 수많은 외교 임무 방해, 그리고 [JAP.getNameDef]와 그 괴뢰 정권을 위한 첩보 활동 혐의로 유죄 판결을 받았습니다. 위의 모든 혐의는 겐덴 본인이 확인하고 서명했습니다. \n\n우리 외교관들의 노력에도 불구하고, 그의 재판은 신속하게 진행되었고 형량은 협상될 수 없었습니다..."
mongol_genden.15.a:0 "그가 그리울 것입니다"
mongol_genden.15.b:0 "속이 다 시원하군"

mongol_genden.16.t:0 "서부 경로 발견!"
mongol_genden.16.d:0 "입수한 철도 계획에 따르면, 겐덴은 다음 몇 주 내로 모스크바에서 출발하는 열차를 타고 서부 철도를 통해 크림반도의 "휴양지"로 보내질 예정이며, 경유 도시는 다음과 같습니다:\n칼루가\n브랸스크\n쇼스트카\n키예프\n키로보그라드\n드니프로페트로우스크\n세바스토폴\n\n우리 요원들은 이미 해당 지역에서 활동하는 일부 전술 그룹과 접선했으며, 그들은 [UKR.getAdjective]의 수도 키예프에서 대중 소요를 일으켜 공격으로 인한 혼란 속에서 우리가 아끼는 겐덴이 탈출할 완벽한 기회를 만들자고 제안했습니다."
mongol_genden.16.a:0 "그렇다면 목표는 키예프다."

mongol_genden.17.t:0 "남부 경로 발견!"
mongol_genden.17.d:0 "예정된 열차는 남부 철도를 통해 출발하며, 다음과 같은 주요 지역 중심지를 통과할 것으로 예상됩니다:\n툴라\n오룔\n쿠르스크\n벨고로드\n하르코프\n스탈리노\n세바스토폴\n\n이 경로에는 몇 가지 잠재적인 약점이 있지만, 철도의 특성과 삼엄한 NKVD의 경비를 고려할 때 열차나 기차역을 직접 공격하는 것은 무모합니다. 하지만 우리는 여러 차량 기지에서 특히 기회주의적인 관리들과 접촉하는 데 성공했으며, 그중 하르코프가 가장 유망합니다.\n\n만약 우리가 현지 대리인들에게 상당한 뇌물을 제공한다면, 그들은 동시에 여러 열차의 일정을 재조정하여 우리가 겐덴을 다른 열차에 태우거나 열차 일정을 원하는 위치로 변경할 수 있도록 할 것입니다."
mongol_genden.17.a:0 "그렇다면 하르코프에 두둑한 "기부금"을 전달해야겠군."

mongol_genden.18.t:0 "남동부 경로 발견!"
mongol_genden.18.d:0 "이 특이한 경로는 최근에야 개통된 것으로 보이며, 모스크바 남동부 교외에서 시작하여 오직 러시아 영토만을 통과하며 우크라이나를 완전히 우회하는 것 같습니다.\n\n열차는 다음 도시들에 도착할 것으로 예상됩니다:\n리페츠크\n보로네시\n밀레로보\n로스토프\n크라스노다르\n노보로시스크\n그 후 겐덴은 배를 통해 크림반도로 이송될 것이며, 그렇게 되면 이후의 구조 가능성은 완전히 사라집니다.\n\n로스토프 주변 지역은 경험 없는 눈에는 매우 안전해 보이지만, 대전쟁과 적색혁명 시절부터 움직이는 목표물에 대한 신속하고 공격적인 타격 경험이 있는 다양한 주민들이 있는 것으로 보입니다..."
mongol_genden.18.a:0 "로스토프? 그곳에 누가 있지?"

mongol_genden.19.t:0 "키예프 기차역 파괴!"
mongol_genden.19.d:0 "키예프 기차역의 또 다른 평범한 아침이 완전한 혼돈으로 변했습니다. 몇 차례의 지진동 후, 아름다운 기차역의 콘크리트 벽이 흔들리기 시작했고, 미터 두께의 금속 막대가 천장의 무게를 견디지 못하고 휘어지다가 결국 기차역의 상당 부분이 자중을 이기지 못하고 붕괴하여 시설에 주둔 중이던 여러 화물 열차를 파괴했습니다.\n\n다행히 경보가 제때 울려 역 직원 중 일부는 붕괴하는 건물 부분에서 대피할 수 있었으며, NKVD는 민병대와 함께 사건 조사를 위해 해당 지역을 봉쇄했습니다.\n\n역 경비원 한 명은 나중에 자신의 사무실에서 의식을 잃은 채 발견되었는데, 그는 모든 것이 어두워지기 전 등 뒤에서 나타난 몇 개의 그림자만을 기억했습니다.\n\n"추가 조사가 필요한 사건이다" - 현지 정치장교의 논평."
mongol_genden.19.a:0 "뭐라고?!"
mongol_genden.19.b:0 "이런! 아무튼, 겐덴에 대해서는..."

mongol_genden.21.t:0 "하르코프의 관료적 혼란"
mongol_genden.21.d:0 "자금과 지침이 담긴 서류 가방이 하르코프 철도 차량 기지에 남겨졌고, 그곳에서 직원 본부로 옮겨져 우리 요원 중 한 명이 현장 감독에게 전달했습니다.\n\n우리 요원의 "심사숙고"와 몇 차례의 설득 끝에, 현장 감독은 다음 며칠간 하르코프에 도착하는 여러 열차의 출발 시간을 한데 모으는 데 동의했습니다.\n\n역의 열차 지연 덕분에, 겐덴을 그의 NKVD 감시 요원으로부터 떼어놓고 동아시아 과학 및 문학 교수라는 가명으로 다른 열차에 태워 중앙아시아로 돌아가는 긴 여정에 오르게 하는 것은 비교적 쉬운 일이었습니다.\n\n우리가 할 일은 열차를 따라가며 목적지에 무사히 도착하는지 확인하는 것뿐입니다."
mongol_genden.21.a:0 "그들이 임무를 훌륭히 수행했군"

mongol_genden.22.t:0 "코사크, 로스토프 외곽에서 일반 열차 습격!"
mongol_genden.22.d:0 "포볼지예와 우크라이나 동부 지역에 충격적인 소식이 퍼졌습니다. 정체불명의 기병대가 푸른 항구 노보로시스크로 향하던 민간 열차를 가로채 약탈한 것으로 보입니다.\n\n남쪽으로 더 이동하기 위해 보급품을 싣고 있던 열차에 정체불명의 기마대가 해 질 녘에 접근하여, 목적지까지의 안전한 통행을 위한 "통행료"를 요구했습니다. 최후통첩 시간이 지나자, 갱단원 일부가 열차에 올라타 사람들의 소지품을 걷기 시작했습니다.\n\n현장에 있던 정치지도원 중 한 명을 무장 해제시키려던 중 우발적인 총격이 발생했고, 열차는 아수라장이 되었습니다. 민간인들은 공격자들을 피해 사방으로 흩어졌고, NKVD 장교들은 산적들과 근접전을 벌였습니다. 수적으로 열세였던 그들은 불리한 싸움에서 영웅처럼 쓰러졌고, 그 후 기마대는 폭발물을 설치하고 남은 열차에 불을 지른 뒤 어둠 속으로 사라졌습니다."
mongol_genden.22.a:0 "실례지만, 뭐라고요?!"
mongol_genden.22.b:0 "이번 일로 톡톡히 배우게 될 거다"

mongol_greater_mongolia.1.t:0 "작전 성공"
mongol_greater_mongolia.1.d:0 "분쟁 지역 침공 및 점령은 지정된 계획에 따라 진행되고 있습니다. \n\n우리 국경 순찰대가 긴급 호출에 "응답하지 못하자", 우리 관리들은 공식 조사를 시작하는 한편 분쟁 지역을 수색하고 우리 국민에게 잠재적인 범죄를 저지른 산적들을 체포해 달라는 외교적 요청을 보냈습니다. \n\n이후, 우리 부대는 우편, 철도, 도로 교차로, 전신 및 전화선을 포함한 지역의 주요 기반 시설을 장악했습니다. 현지 주둔군은 무기를 내려놓고 교화와 심문을 위해 우리 군에 합류하도록 강요받았습니다. \n\n일부 현지 주민들은 여전히 새로운 통치에 항의의 목소리를 내려고 하지만, 그 목소리는 미약하고 조직적이지 못합니다."
mongol_greater_mongolia.1.a:0 "[ROOT.getAdjective] 인민에게 위대한 날입니다!"

mongol_greater_mongolia.2.t:0 "남부에서의 재앙"
mongol_greater_mongolia.2.d:0 "작전의 초기 성공에 고무된 우리 군은 국경의 몇몇 정착지를 확보하고 민간인들이 국가의 해방군에 맞서 싸우기 위해 민병대를 조직하지 못하도록 했습니다. \n\n그러나 우리 군이 적 영토 깊숙이 진군할 준비를 하는 동안, 대규모 반격이 과도하게 전선을 확장한 우리 군의 측면을 강타했습니다. 현지 파르티잔이 우리 군 후방의 보급선을 차단하자, 우리 군은 주력 부대를 구하기 위해 일부 병력과 장비를 남겨두고 현장에서 임기응변으로 대처해야 했습니다. \n\n귀환한 병사들은 이제 상처를 치료하고 새로운 전투를 준비하며 시간을 보내고 있습니다."
mongol_greater_mongolia.2.a:0 "우리의 힘을 과대평가했는지도 모릅니다"

mongol_greater_mongolia.3.t:0 "교착 상태 도달"
mongol_greater_mongolia.3.d:0 "작전의 초기 성공에도 불구하고, 우리 군의 움직임은 분쟁 지역에 구축된 강력한 방어선에 의해 심각하게 저지되었습니다. 우리 병사들은 적대적인 지형에서 참호를 파야 했고, 헌병대는 적 파르티잔으로부터 후방을 확보하려 노력했습니다. \n\n몇 차례의 공방 끝에, 현지 지휘관들은 상황이 너무 심각해지기 전에 이 군사적 시도를 포기할 것을 제안했습니다. 적이 관심 지역에 더 많은 병력과 중포를 투입할 수 있는 반면, 우리는 이 단기 분쟁으로 예상했던 것에 더 많은 자원을 투입할 여유가 없기 때문입니다."
mongol_greater_mongolia.3.a:0 "이번 일에서 얻을 교훈이 많습니다."

mongol_greater_mongolia.4.t:0 "적군 격퇴"
mongol_greater_mongolia.4.d:0 "무모한 적군이 수많은 병사를 이끌고 "정당한 자신들의 것"이라 주장하는 것을 빼앗기 위해 우리 조국으로 진격해 왔습니다! \n\n그들이 후방 지역을 약탈하고 황폐화시키는 동안, 우리의 강력한 전사들은 병력을 모아 최고의 장군 깃발 아래 조국의 침략자들에게 결정적인 전투를 벌이기 위해 진군했습니다. \n\n하찮은 적들은 우리 군과 파르티잔의 연합 공격을 견디지 못하고, 장비와 포로 일부를 남겨둔 채 후퇴하는 것이 목격되었습니다."
mongol_greater_mongolia.4.a:0 "네놈들의 한심한 군대를 마지막 한 명까지 불태워 버리겠다."

mongol_greater_mongolia.5.t:0 "우리 영토가 점령당했다!"
mongol_greater_mongolia.5.d:0 "우리 장군들의 실수였을 수도, 전방 관측병의 실수였을 수도, 혹은 우리 군의 불충분한 대응 때문이었을 수도 있습니다. 우리는 잘 알지 못합니다. \n\n알려진 사실은 우리 전방 지역 중 한 곳과의 통신이 완전히 두절되었다는 것입니다. 적이 자신들의 통신선을 확보하고 우리의 통신선을 심각하게 방해하면서, 우리 예비군이 적을 격퇴할 충분한 병력을 동원하는 것은 불가능했습니다. \n\n이제는 너무 늦었습니다. 우리는 그 성가신 침략자들에게, 그들이 누구든 간에, 우리 자산 중 하나를 잃었습니다. 때가 되면 반드시 돌아올 것입니다!"
mongol_greater_mongolia.5.a:0 "어떻게 우리 인민의 눈을 쳐다볼 수 있겠는가?"

mongol_greater_mongolia.6.t:0 "교착 상태 도달"
mongol_greater_mongolia.6.d:0 "빠르게 진격하는 적은 몇몇 국경 마을과 도시를 확보했지만, 동원된 군대로 증원된 우리 현지 주둔군은 적의 진격로에 지난 몇 주간 난공불락이었던 거점을 구축했습니다. \n\n이제 우리 파르티잔이 적의 보급선을 유린하고 우리 군이 최전선에서 적의 움직임을 저지하자, 환멸을 느낀 적은 이제 전술적 후퇴를 모색하며 황폐해진 마을과 약탈당한 들판을 우리 농민들이 일구도록 남겨두고 있습니다. \n\n결정적인 성공이지만, 그 대가는 컸습니다."
mongol_greater_mongolia.6.a:0 "우리는 이 땅을 더 오래 지킬 수 있습니다!"


mongol_greater_mongolia.10.t:0 "몽골, 부랴트와의 통합을 요청"
mongol_greater_mongolia.10.d:0 "적색 혁명과 민족 국가 이론의 유산이 진전되기 전 수 세기 동안 두 민족을 묶었던 유대를 재활성화하기 위해, [MON.getAdjective] 외교관들이 우리 관리들에게 접촉하여 부랴트 몽골과 할하 몽골의 재통일 가능성을 요청했습니다. \n\n국가 대후랄과 소후랄에서의 적절한 대표권 보장 외에도, 그들은 부랴트인과 그 지역 다른 주민들의 민족 정체성과 권리를 존중하겠다고 약속합니다. \n\n만약 우리가 이 제안을 거절한다면, 그들은 우리에게 등을 돌릴 수도 있습니다. 그들이 그 땅을 되찾도록 허락해야 할까요?"
mongol_greater_mongolia.10.a:0 "골칫거리를 하나 덜었군"
mongol_greater_mongolia.10.b:0 "싸우지 않고는 그 땅을 내주지 않을 것이다"
mongol_greater_mongolia.10.c:0 "후랄 의석을 대가로 동의한다"

mongol_greater_mongolia.11.t:0 "몽골, 투바 편입 추진"
mongol_greater_mongolia.11.d:0 "몽골어권 영토의 통제권을 재확립하려는 노력의 일환으로, [MON.getAdjective] 대표단이 키질에 있는 우리 관리들에게 접근하여 투바 행정구를 몽골 본토로 재편입하는 문제에 대해 국가 주도의 국민투표를 실시할 것을 제안했습니다. \n\n민족 자결, 지방 자치, 소수 민족에 대한 평등한 대우라는 일반적인 약속 외에도, [MON.getAdjective] 관리들은 이 지역의 침체된 경제에 투자하여 현지 주민들이 [MON.GetRulingIdeology]의 모든 경제적, 사회적 혜택을 누릴 수 있도록 할 준비가 되어 있습니다. \n\n어떻게 대응해야겠습니까?"
mongol_greater_mongolia.11.a:0 "걱정할 문제가 줄어들겠군"
mongol_greater_mongolia.11.b:0 "우리가 왜 이런 조건을 고려해야 하는가?"
mongol_greater_mongolia.11.c:0 "쿠랄에서 정당한 대표권을 보장받는 조건으로 동의한다"

mongol_greater_mongolia.12.t:0 "통일 요청 수락!"
mongol_greater_mongolia.12.d:0 "이 지역의 긴장을 해소하기 위해, [FROM.getNameDef]의 관리들이 제안된 조약에 서명하고 해당 지역의 행정 통제권을 넘겨주었습니다. 우리 관리들은 이미 새로운 정부 청사에 자리를 잡기 시작했으며, 우리 기술자들은 해당 지역을 우리 국가의 기반 시설망에 재통합하는 작업을 시작하고 있습니다. \n\n의장 행진의 일환으로, 마지막 현지 경비대대가 새로 도착한 [ROOT.getAdjective] 군대에 경례하며, 이 지역에 대한 권력이 우리 정권으로 완전히 이양되었음을 알렸습니다!"
mongol_greater_mongolia.12.a:0 "훌륭하다!"
mongol_greater_mongolia.12.b:0 "진정한 통합이다!"

mongol_greater_mongolia.13.t:0 "[FROM.getNameDefCap], 제한적 자치 지위에 동의"
mongol_greater_mongolia.13.d:0 "며칠간의 협상 끝에, [FROM.getNameDef]와 [ROOT.getNameDef] 양국의 정부 기구를 통합하는 것은 행정 및 경제 통제 측면에서 너무 복잡한 문제라는 데 동의했습니다. \n\n[FROM.getAdjective] 측은 우리의 직접적인 위임 통치 하에 있는 자치 지역으로서의 특별한 지위를 받아들이는 쪽으로 더 기울었습니다. \n\n"경제적, 군사적 부담을 공유함으로써, 우리 두 국가는 매주, 매달 더욱 강해질 것입니다!" - 그들 대표단장이 말했습니다. \n\n우리는 이제 우리 민족을 더욱 가깝게 만드는 작업을 시작할 수 있습니다!"
mongol_greater_mongolia.13.a:0 "아주 좋다"

mongol_greater_mongolia.14.t:0 "외교 협상 결렬"
mongol_greater_mongolia.14.d:0 "우리의 최선의 노력에도 불구하고, [FROM.getAdjective] 관리들은 범몽골 협력이라는 우리의 겸허한 제안을 비난했습니다! \n\n오늘 아침 국회의사당 발코니에서 행한 연설에서, [FROM.getLeader]는 "비겁한 [ROOT.getAdjective]인들이 주변의 고귀한 민족을 노예로 삼으려 하고, 현재의 더럽고 부패한 몽골 제국을 복원하려 한다!"고 발표했습니다. \n\n이러한 명백한 무례함에, 우리 대사들은 협상 테이블을 떠났으며, 이 지역의 우리 주민들에 대한 탄압이 증가하는 것을 고려할 때, 이 지역을 확보할 방법은 단 하나뿐임이 분명합니다..."
mongol_greater_mongolia.14.a:0 "우리는 돌아올 것이다"

mongol_greater_mongolia.15.t:0 "다가오는 울란바토르 회의"
mongol_greater_mongolia.15.d:0 "중앙아시아는 이 전략적 지역을 두고 서로의 통제권을 약화시키려는 다양한 세력들의 전쟁터로 잘 알려져 있습니다. 많은 제국이 기마민족의 목초지를 정복하려 했으며, 분쟁 중인 민족들을 누군가에게 유리하게 정착시키려 했습니다. \n\n이제 우리는 내부 정부를 공고히 하고 우리의 실제 힘의 일부만을 보여주었으므로, 이 지역의 강대국들과 협력하여 그들이 몽골 민족을 단일 민족 국가로 통일하는 데 어떻게 기여할 수 있는지 알아보는 것이 우리의 최선의 이익입니다. \n\n이러한 정치적 노력은 비용이 많이 드는 문제이지만, 우리와 우리의 의제에 큰 이익이 될 것입니다."
mongol_greater_mongolia.15.a:0 "준비를 시작하라!"
mongol_greater_mongolia.15.b:0 "그런 노력은 너무 벅차다. 재고해야 한다."

mongol_greater_mongolia.16.t:0 "[SOV.getAdjective] 관리들을 초대할 것인가?"
mongol_greater_mongolia.16.d:0 "할하 몽골과 부랴트 몽골을 분리하는 데 정치적 노력을 기울였던 최근 몇 년간의 의심스러운 정책에도 불구하고, [SOV.getAdjective]인들은 대부분 억압자나 식민주의자가 아닌 친구이자 동반자로 여겨졌습니다. \n\n수년 전, 그들의 지원은 [CHI.getAdjective] 군국주의자들과 청 제국주의자들에 의한 완전한 파괴와 절멸로부터 보그드 칸국을 지켜냈습니다. \n\n몇 년 후, 그들의 기여는 우리나라에 공산주의를 확립하는 데 기여했으며, 그것이 좋든 나쁘든, 아직 두고 볼 일입니다. \n\n그들이 시베리아 횡단 철도를 확보하는 데 관심이 있다는 것을 볼 때, 그들이 향후 어떤 분쟁에서든 우리가 그들의 대의를 지지하도록 할 가능성이 높다는 것이 명백해집니다. 물론, 대가를 치러야겠지만요."
mongol_greater_mongolia.16.a:0 "[SOV.getAdjective] 형제들을 초대한다"
mongol_greater_mongolia.16.b:0 "우리의 이익에 부합하지 않는다"

mongol_greater_mongolia.17.t:0 "[CHI.getAdjective] 외교관을 초대할까요?"
mongol_greater_mongolia.17.d:0 "수 세기 동안 내부 권력 투쟁으로 분열되었지만, [CHI.getAdjective]은(는) 여전히 외부로 눈을 돌려 [SOV.getAdjective]이든 [JAP.getAdjective]이든 다른 외세의 영향력으로부터 외곽 국경을 확보하려 합니다. \n\n수 세기 동안 우리와 그들의 조상은 서로 싸운 적이었습니다. 어쩌면 외교의 이점이 화약의 불꽃과 칼날의 섬광을 압도하여, 생존과 통일을 위한 우리의 대의가 그들의 것과 유사함을 보여줄 기회가 될지도 모릅니다."
mongol_greater_mongolia.17.a:0 "이제 그들이 무슨 말을 할 수 있는지 봅시다"
mongol_greater_mongolia.17.b:0 "저 압제자들과는 결코 협력하지 않겠습니다"

mongol_greater_mongolia.18.t:0 "중화인민공화국을 초대하여 인정할까요?"
mongol_greater_mongolia.18.d:0 "인민의 압제자들로부터 중국 본토를 해방시키려는 노력의 일환으로, [PRC.getLeader]은(는) [PRC.getNameDef] 인민과 함께 당분간 중앙 정부의 압력에 어느 정도 성공적으로 저항할 수 있는 새로운 질서를 수립했습니다. \n\n민족 자결 원칙과 외몽골 인민의 의지를 존중하겠다는 그들의 약속은 이 유익한 관계 속에서 양국의 국력을 강화하는 것을 목표로 하는 새로운 외교 관계의 기초가 될 수 있습니다! \n\n이러한 외교적 책략은 분명 [CHI.GetRulingParty]의 여러 관리들을 분노하게 하겠지만, 우리의 장기적인 목표가 달성된다면 그것이 정말 중요하겠습니까?"
mongol_greater_mongolia.18.a:0 "당연합니다"
mongol_greater_mongolia.18.b:0 "너무 위험하니, 하지 않는 편이 낫겠습니다"

mongol_greater_mongolia.19.t:0 "[JAP.getAdjective] 군국주의자들을 초대할까요?"
mongol_greater_mongolia.19.d:0 "[JAP.getNameDef]의 급속한 산업 및 경제 성장은 우리가 국가의 국경을 보장하고자 한다면 고려해야 할 세력으로 만들었습니다. 더욱이, 중원과 동남아 태평양에 대한 그들의 야망은 우리가 그들과 잘 계획된 거래를 추구한다면 우리에게 유리하게 이용될 수 있습니다. \n\n반면에, 우리의 바로 이웃에 "보호국 정권"을 수립한 것은 이 지역의 긴장 해소에 기여하지 않습니다. 그들의 야망이 동아시아를 어디로 이끌지는 아무도 모릅니다."
mongol_greater_mongolia.19.a:0 "이것은 이 지역의 분쟁을 해결하는 데 도움이 될 것입니다"
mongol_greater_mongolia.19.b:0 "그들은 어떤 비밀스러운 야망을 염두에 두고 있을지도 모릅니다"

mongol_greater_mongolia.20.t:0 "[MON.getAdjective] 관리들이 우리를 울란바토르 회의에 초대했습니다"
mongol_greater_mongolia.20.d:0 "내몽골과 외몽골 문제에 대한 분쟁을 해결하고, 인구 조사와 지역 주민 투표에 따라 인구를 재분배하며, 통일 몽골의 유산을 확보하고자 [MON.getADjective] 외교관들이 울란바토르 회의를 조직하기 시작했으며, "강대국으로서" 토론에 참여해달라고 우리를 초대했습니다. \n\n우리의 분석가들은 울란바토르 회의에 참석할 것을 제안합니다. 우리가 이 지역에서 영향력을 증대시키고, 어쩌면 [MON.getNameDef]과 그 지도자들의 충성을 우리의 대의로 돌릴 수 있을지도 모르기 때문입니다. \n\n확고한 신념도 좋지만, 통제가 더 낫습니다."
mongol_greater_mongolia.20.a:0 "참석하겠습니다."
mongol_greater_mongolia.20.b:0 "농담하는 게 틀림없습니다!"

mongol_greater_mongolia.21.t:0 "[FROM.getAdjective] 대표단이 회의에 참여할 것입니다"
mongol_greater_mongolia.21.d:0 "얼마간의 숙고 끝에, [FROM.getAdjective] 대표단은 우리 대사의 의례 방문에서 "분쟁을 평화적으로 해결하고 갈등을 진정시키는" 것을 목표로 하는 회의에 참석할 의향이 있다고 발표했습니다. \n\n우리는 그들이 수도에 머무는 동안 최상의 숙소를 준비해야 합니다. 일부 준비는 이미 진행 중입니다."
mongol_greater_mongolia.21.a:0 "이 지역의 안정은 반드시 유지되어야 합니다!"

mongol_greater_mongolia.22.t:0 "[FROM.getAdjective] 대표단이 회의 참여에 관심을 보이지 않습니다"
mongol_greater_mongolia.22.d:0 "우리 대사에게 전달된 긴 답신에는 양국의 영원한 우호, 모든 인민의 길고 행복한 삶에 대한 긴 선언과 함께, [FROM.getNameDef]이(가) 처리해야 할 매우 긴급한 사안이 있어 중앙아시아 안정 문제를 직접 논의할 대표단을 파견할 수 없다는 짧은 문장이 행간에 숨겨져 있었습니다. \n\n우리는 경계를 늦추지 말아야 합니다. 해당 국가는 아직 이 지역의 안정 보장 책임을 맡을 준비가 되지 않았습니다..."
mongol_greater_mongolia.22.a:0 "그들에게는 안된 일입니다."

mongol_greater_mongolia.23.t:0 "울란바토르 회의 개막"
mongol_greater_mongolia.23.d:0 "회의 진행을 위한 준비가 거의 완료되었으며, 모든 외교관이 며칠 내로 울란바토르에 도착할 예정입니다. \n\n며칠간의 절차를 조정한 끝에, 우리는 회의장에서 어느 누구도 모욕감을 느끼지 않도록 모든 대표단의 좌석을 배치하는 데 성공했습니다. 이제 우리에게 필요한 것은 외국 대표단이 편안하고 환영받는다고 느끼도록 보장하기 위한 수도의 건전한 분위기뿐입니다."
mongol_greater_mongolia.23.a:0 "회담을 개시합니다"

mongol_greater_mongolia.24.t:0 "회의장에서의 총격전"
mongol_greater_mongolia.24.d:0 "첫 번째 논의는 계획대로 진행되었습니다. 회의장 연단에서 [MON.getLeader]의 인사가 끝난 후, 모든 대표단은 예정대로 지역 안보 문제에 대한 회담을 진행할 준비를 마치고 자리에 앉았습니다. \n\n하지만 우리 경비병들은 알지 못했지만, 일부 외국 대표들이 개인 경호원들과 함께 '개인 보호'를 명목으로 총기를 몰래 반입하는 데 성공했습니다. \n\n논의가 과열되자, 그들 중 한 명이 '상대방이 바로 이 문 뒤에서 우리를 상대로 침략 전쟁을 벌이고 있는데 어떻게 지역 안보를 유지할 수 있는가?'라는 주제를 제기했습니다. 이 발언에 분노한 반대편 대표들이 격분했고, 그 후 사람들 사이에 있던 정체불명의 급진주의자가 개인 화기에서 발포하여 반대 세력 간의 대규모 총격전으로 이어졌습니다. \n\n불과 몇 시간 후, 양측은 부상자들을 수습하고 전쟁 중인 고국으로 돌아가기로 합의했으며, 이는 회의의 완전한 실패를 의미했습니다."
mongol_greater_mongolia.24.a:0 "우리 측의 엄청난 과실이었습니다!"

mongol_greater_mongolia.25.t:0 "동맹을 위한 상호 인정"
mongol_greater_mongolia.25.d:0 "[SOV.getNameDef]의 정치인과 군인들이 우리의 내정과 외교를 확고히 장악하고 있었기에, 국제 무대에서 우리의 불안정한 입지는 이전에 [SOV.getNameDef] 동지들의 강력한 지지를 받았습니다. \n\n이미 회의에 [PRC.getNameDef] 대표들을 초청하여 비공식적으로 그들을 인정했으므로, 양국의 상호 인정을 포함하고 중앙아시아의 영향권을 분할할 가능성을 담은 비밀 의정서에 서명함으로써 기존의 유대를 공고히 할 수 있게 되었습니다. 물론 회의는 취소될 것입니다.\n\n열강들은 이를 '부적격자들의 연합'으로 간주할 수도 있겠지만, 아무것도 없는 것보다는 낫습니다!"
mongol_greater_mongolia.25.a:0 "우리의 유일한 기회입니다!"
mongol_greater_mongolia.25.b:0 "이웃 국가들의 분노를 자초하자는 말인가?"

mongol_greater_mongolia.26.t:0 "동맹 요청 수락"
mongol_greater_mongolia.26.d:0 "우리 두 국가의 입지가 얼마나 불안정하고 취약한지 깨달은 [PRC.getLeader]는 위험한 제안을 수락하고, 지역의 힘의 균형을 우리에게 유리하게 바꾸기 위한 비밀 협정에 서명했습니다. \n\n분노한 다른 국가의 외교관들은 '[MON.getadjective] 정치인들이 얼마나 신뢰할 수 없는지'에 대한 서한을 전달하기 위해 다음 며칠 동안 울란바토르를 떠날 것입니다. \n\n우리 장군들 중 일부는 이미 양국 군대 간의 경험 공유를 시작하기를 바라고 있습니다."
mongol_greater_mongolia.26.a:0 "만세!"

mongol_greater_mongolia.27.t:0 "외교 임무 실패"
mongol_greater_mongolia.27.d:0 "[PRC.getLeader]는 우리 대표에게 유망한 제안임에도 불구하고, 현재 다른 현안들이 있으며 열강과의 유익한 협력을 포기할 준비가 되어 있지 않다고 통보했습니다. \n\n이 발표는 우리의 제안과 마찬가지로, 다른 외국 외교관들이 배후에서 무슨 일이 벌어지고 있는지 전혀 눈치채지 못하도록 보안 채널을 통해 전달되었습니다. \n\n우리는 여전히 중앙아시아의 주요 세력들의 충성을 확보하기 위한 노력을 계속할 수 있습니다."
mongol_greater_mongolia.27.a:0 "어떻게? 왜?"

mongol_greater_mongolia.28.t:0 "회의 실패"
mongol_greater_mongolia.28.d:0 "회의장에서 가장 생산적인 분위기와 긍정적인 환경을 조성하려는 우리의 최선의 노력에도 불구하고, 다양한 당사자들이 불평등한 대우를 받았다고 주장하거나 토론의 핵심 질문에 대해 중립적인 입장을 유지하면서 모든 논의 라운드는 성공하지 못했습니다. \n\n우리가 그들 중 일부의 충성을 확보하려 노력하는 동안에도, 대표들이 우리가 물리적으로 제공할 수 없는 점점 더 많은 양보를 요구하면서 모든 노력은 헛수고로 돌아갔습니다. \n\n회의가 끝날 무렵, [MON.getLeader]는 반대 세력들을 화해시키고 실무적인 분위기를 유지하려 연설했지만, 이 모든 것은 다음 날 저녁까지도 달성되지 못했고, 결과적으로 회의는 우리의 외교적 노력에 있어 완전한 실패로 끝났습니다."
mongol_greater_mongolia.28.a:0 "우리는 최선을 다했습니다..."

mongol_greater_mongolia.29.t:0 "열강의 지지"
mongol_greater_mongolia.29.d:0 "몇 주간의 협상과 통제 및 이해관계가 걸린 문제 지역에 대한 분쟁 끝에, 우리는 회의에 참석한 모든 대표단을 만족시키는 데 성공했고, 그들이 우리 국가를 '열강의 보호 하에 있는 현상 유지 국가'라고 공개적으로 선언하도록 했습니다. \n\n몽골 본토를 완충 국가로 보존하는 대의에 주된 노력을 기울이며, 주요 세력들은 우리가 조약 대표들과 관련하여 외교 정책에서 중립을 유지한다는 조건 하에 우리 국가의 안정과 안보를 보장하기로 합의했습니다. \n\n그러나 이러한 공식화는 우리가 우리의 통합성을 보존하기로 동의한 외국 세력들에게 '[MON.getAdjective]의 정당한 주들의 통일만을 추구한다'고 주장하며 '몽골 핵심 주'를 요구할 수 있게 해줍니다."
mongol_greater_mongolia.29.a:0 "우리 외교관들이 불가능한 일을 해냈습니다!"

mongol_greater_mongolia.30.t:0 "몽골, 정당한 영유권 요구"
mongol_greater_mongolia.30.d:0 "[MON.getAdjective]을 단일 민족 국가로 통일하려는 열망을 언급하고 최근 울란바토르에서 체결된 협정 뒤에 이러한 야망을 숨기면서, [MON.getLeader]는 해당 주를 자신들의 통제 하에 이전해달라는 긴급 요청을 발표했습니다. \n\n그들의 요구에 응하는 것은 '장기적으로 국가에 해를 끼치지 않으면서 지역의 힘의 균형을 보존'할 것이며, 이는 그들에게 완전히 정당화되는 것으로 보입니다. \n\n반면에, 우리는 이 지역의 다른 세력들에게 억압자, 전쟁광, 지역 평화의 파괴자로 간주될 위험이 있으며, 이는 그들에게 군사 개입의 정당한 이유를 제공하게 됩니다..."
mongol_greater_mongolia.30.a:0 "그들은 마땅히 받아야 할 것을 받는 것입니다"
mongol_greater_mongolia.30.b:0 "합의한 내용과 다릅니다"

mongol_greater_mongolia.31.t:0 "[FROM.getAdjective] 측의 울란바토르 협정 불이행"
mongol_greater_mongolia.31.d:0 "우리의 첫 외교적 요청은 [FROM.getLeader] 정부로부터 원하는 관심을 받지 못한 것으로 보입니다. 더욱이, 몇 시간 후 보낸 두 번째 요청은 우리가 '부적절하고 위험한 방식으로 상황을 악화시키는' 장본인이라는 구실 하에 기각되었습니다. \n\n몽골에 약속된 양보를 승인해달라는 우리의 세 번째 요청은 해당 국가의 대중에게 공개되었고, 사람들은 우리 관리들의 유화책을 공공연히 비웃었습니다. \n\n이러한 공개적인 굴욕과 국제 조약에 대한 무시는 용납될 수 없습니다! 아니면 용납해야 합니까?"
mongol_greater_mongolia.31.a:0 "이제 강경책을 쓸 때입니다."
mongol_greater_mongolia.31.b:0 "지금 당장 전쟁은 논외입니다"

mongol_greater_mongolia.32.t:0 "영토 이양 확인됨"
mongol_greater_mongolia.32.d:0 "우리의 정중한 요청이 해당 외국 정부의 우려를 일부 낳은 듯하나, 그들 관리들의 답변은 제때 도착했습니다. \n\n역내 평화를 보존하는 것이 목표라고 밝히며, [FROM.getAdjective] 측은 [MON.getNameDef]이(가) 중앙아시아 지역에서 현상 유지를 할 수 있도록 자국 또는 위성국의 국경을 재조정할 준비가 되어 있습니다. \n\n행정 및 군사적 재조정을 위한 준비는 이미 진행 중이며, 제안된 계획에 따라 시기적절하게 수행되고 있습니다."
mongol_greater_mongolia.32.a:0 "예상대로입니다"

mongol_greater_mongolia.33.t:0 "영토 이양 거부됨"
mongol_greater_mongolia.33.d:0 "이미 붕괴 중인 제국을 보존하려는 헛된 노력으로, [FROM.getAdjective] 측은 몽골 영토를 우리 통제하에 반환하라는 요청을 거부했습니다! \n\n그들은 과거에 맺었던 울란바토르 협정의 약속을 명백히 잊은 채, 자신들이 소유하고 점유한 땅이 '정당하게 자신들의 것'이라고 주장합니다. \n\n우리 군은 강제적인 영토 이양이 필요할 경우 군사 작전을 수행할 준비가 되어 있다고 보고하고 있습니다."
mongol_greater_mongolia.33.a:0 "오늘 우리를 거부할 자는 아무도 없다!"

mongol_greater_mongolia.34.t:0 "우리의 후원자가 대의를 지지하지 않을 것입니다"
mongol_greater_mongolia.34.d:0 "[FROM.getNameDef]의 관리들은 '또 다른 정의로운 해방 전쟁'에 댈 여분의 인력, 장비, 자원이 부족하여 우리의 노력을 지원할 수 없다는 유감스러운 통보를 전해왔습니다. \n\n그들은 또한 만약 또 다른 국경 재조정 문제가 제기될 경우, 미래에는 우리의 대의를 계속 지원할 것이라고 알려왔습니다."
mongol_greater_mongolia.34.a:0 "정말 믿을 수 없군!"

mongol_greater_mongolia.40.t:0 "[From.GetNameDefCap] 측이 세력권 분할을 제안하다"
mongol_greater_mongolia.40.d:0 "동맹 설립의 주된 목적은 강대국들을 버리고 거인들의 영향력에 저항할 수 있는 독립적인 블록을 구축하기 위함이었습니다. \n\n이제 동맹이 적절한 형태로 최종 확정되었지만, 작지만 중요한 문제가 하나 남아 있습니다: \n내몽골과 북부 신장에는 여전히 상당수의 몽골 인구가 거주하고 있으며, 이들은 현지 사회에서 다소 분리된 채 남아 있습니다. \n\n[MON.getLeader]이(가) 이끄는 [MON.getNameDef]은(는) 모든 몽골인을 하나의 깃발 아래 통합하고자 하며, 우리에게 세력권 분할을 압박하고 있습니다. 이는 우리가 그들의 관심 지역에서 중국화 노력을 재고해야 함을 암시합니다."
mongol_greater_mongolia.40.a:0 "그것이 최선입니다"
mongol_greater_mongolia.40.b:0 "아니, 우리 이익에 부합하지 않습니다!"

mongol_greater_mongolia.41.t:0 "[From.GetNameDefCap] 측이 세력권 분할에 동의하다"
mongol_greater_mongolia.41.d:0 "새로 태어난 우리 동맹을 강화하기 위한 최선의 노력으로, [FROM.getAdjective] 관리들은 자신들의 주장을 철회하고 분쟁 지역에서 어떠한 종류의 중국화 정책도 추구하지 않을 것이라고 알려왔습니다. \n\n따라서 우리 민족은 더 높은 수준의 자유를 누리게 될 것이며, 우리 정치인들은 몽골 민족을 단일 민족 국가 아래 통합하려는 꿈을 좇을 수 있게 될 것입니다."
mongol_greater_mongolia.41.a:0 "예상대로입니다."

mongol_greater_mongolia.42.t:0 "요청 거부됨!"
mongol_greater_mongolia.42.d:0 "분쟁 지역에서의 정책 재조정을 꺼리는 [FROM.getAdjective] 측은 여전히 관심 지역을 자신들의 정당한 영토로 여기는 듯합니다! \n\n몽골 민족을 통합하려는 우리의 노력은 여전히 우리 의지대로 진행될 수 있지만, 우리가 정복이나 협상을 통해 원하는 땅을 획득하려 할 때 그들의 지지자 일부가 방해가 될 수 있습니다. \n\n이것이 끔찍한 오산이었음을 깨달은 지금, 우리는 의지할 동맹이 훨씬 더 적어졌습니다!"
mongol_greater_mongolia.42.a:0 "저주받을 놈들!"

mongol_greater_mongolia.50.t:0 "[From.GetNameDef]의 부활"
mongol_greater_mongolia.50.d:0 "[FROM.getAdjective] 관료들이 수행한 최근의 영토 확장은 대부분 몽골 인구가 거주하는 광대한 영토를 포함하게 되었으며, 이는 그들 관료들에게 독특한 정치적 기회를 제공했습니다. \n\n[FROM.getLeader]은(는) 금일 오전 국가대회의사당 앞에서 몽골 민족의 통합된 의지와 염원을 대표하고, 이 혼란한 시기에 그들의 이익을 보장하고 수호하기 위한 새로운 정치체의 결성을 선포하는 공개 성명을 발표했습니다."
mongol_greater_mongolia.50.a:0 "통일된 중앙아시아의 꿈이 기다린다"
mongol_greater_mongolia.50.b:0 "새로운 몽골 제국이 부상하는가?"
mongol_greater_mongolia.50.c:0 "사소한 차질일 뿐, 그 이상도 이하도 아니다"



mongol_soviet_puppet.2.t:0 "수상한 활동 감지"
mongol_soviet_puppet.2.d:0 "몇 주 전, [MON.getAdjective] 정부가 다양한 수단을 통해 우리 후방의 상황을 불안정하게 만들 목적으로 파견한 외국 요원이라는 혐의로 한 무리의 젊은 학생들이 체포되었습니다. \n\n몇 차례의 초기 심문 끝에, 주동자 중 한 명이 [MON.getNameDef]와 그들의 의제를 위해 복무했음을 자백했습니다. 이러한 무모한 행동은 반드시 고려되어야 하며 책임자는 처벌받을 것입니다. 우리 외교관들은 이미 이 위협을 다룰 몇 가지 방안을 강구했습니다. \n\n[ROOT.getLeader]의 결정은 무엇입니까?"
mongol_soviet_puppet.2.a:0 "우리가 상관할 바 아니다"
mongol_soviet_puppet.2.b:0 "외교적 항의 제기"
mongol_soviet_puppet.2.c:0 "국경 폐쇄"
mongol_soviet_puppet.2.e:0 "최후통첩 발송"

mongol_soviet_puppet.3.t:0 "[FROM.getNameDefCap]이(가) 우리의 의제에 항의"
mongol_soviet_puppet.3.d:0 "오늘 아침 정부 본부에 항의 서한이 전달되었습니다. 서한은 우리의 바로 이웃에서 이토록 공개적인 방식으로 공산주의를 조장하는 무모한 행동이 상호 관계를 악화시킬 뿐이라고 주장했습니다. \n\n또한 서한은 우리 첩보원과 요원들이 수행하는 어떠한 미래의 행동도 용납되지 않을 것이며, [FROM.getAdjective] 국가와 국민이 자신들에게 더 적합한 이념을 결정할 권리를 보존하기 위해 더 과감한 조치가 취해질 것이라고 밝혔습니다. \n\n이에 어떻게 대응해야 할지 확신이 서지 않는 [ROOT.getLeader]은(는) 이 "긴급한" 문제를 나중에 처리하기로 결정했습니다."
mongol_soviet_puppet.3.a:0 "오, 이런! 아무튼..."

mongol_soviet_puppet.4.t:0 "[FROM.getNameDefCap]이(가) 우리에게 금수 조치를!"
mongol_soviet_puppet.4.d:0 "화물 열차 중 하나가 국경 도시의 중앙역에 도착하지 못해, 최근에 체결한 무역 협정에 따라 물품이 제대로 도착할지에 대한 우려가 제기되었습니다. 불안이 뒤따랐고, 이는 정식 조사로 이어졌습니다. \n\n열차와 승무원들은 현재 [FROM.getNameDef]의 국경 지역에 머물고 있으며, 우리에게 적용된 무역 제재로 인해 입국하지 못하고 있는 것으로 보입니다! \n\n[FROM.getAdjective] 대사관에 대한 공식적인 외교 요청을 통해, 그들의 관료들이 현재 국경을 폐쇄했으며 공식적인 사과 없이는 어떠한 화물 열차도 통과시키지 않을 것임을 확인했습니다."
mongol_soviet_puppet.4.a:0 "우리에게는 별로 중요하지 않다"
mongol_soviet_puppet.4.b:0 "제발 그러지 마시오! 사과를 보내시오!"

mongol_soviet_puppet.5.t:0 "[FROM.getNameDefCap]이(가) 사과를 보내옴"
mongol_soviet_puppet.5.d:0 "우리 관료들과의 화해를 모색하며, [FROM.getAdjective] 외무부가 사과 서한을 전달했습니다. \n\n무역 제재 해제에 대한 그들의 요청에는 가까운 미래에 우리 본토에서 어떠한 종류의 선전 활동도 벌이지 않겠다는 내용도 언급되어 있습니다. \n\n추가적으로, 우리는 그들의 요원들이 우리 후방에서 일으킨 불안에 대해 상당한 보상을 받아 이 지역에서 우리의 입지를 강화할 것으로 예상됩니다. 반면에, 우리가 정말 그들을 믿을 수 있을까요?"
mongol_soviet_puppet.5.a:0 "아주 좋다"
mongol_soviet_puppet.5.b:0 "우리는 그렇게 쉽게 매수되지 않을 것이다"

mongol_soviet_puppet.6.t:0 "[FROM.getNameDefCap], 타협에 동의"
mongol_soviet_puppet.6.d:0 "[FROM.getAdjective] 관리들이 전복 활동을 벌인 우리 요원들을 구금하겠지만, 향후 사건이 발생하지 않는 한 물품의 자유로운 통행을 허용할 것이라는 내용의 화해 서신이 대통령 집무실에 도착했습니다. \n\n몇 시간 후, 문제의 인원들이 목적지에 도착하여 우리 국민에게 필요한 물품을 제공했습니다. \n\n이러한 금수 조치에 우리 무역이 얽매이지 않게 되어 기쁩니다. 자칫하면 우리 경제에 파괴적인 결과를 초래할 수도 있었기 때문입니다."
mongol_soviet_puppet.6.a:0 "작은 위기를 모면했습니다"

mongol_soviet_puppet.7.t:0 "[FROM.getNameDefCap], 협상 거부"
mongol_soviet_puppet.7.d:0 "우리의 화해 요청에도 불구하고, [FROm.getAdjective] 측은 그러한 조치가 자국 내에서 활동하는 외국의 선전가들을 막을 수 없을 것이라 주장하며 무역 제재 해제를 거부하고 있습니다. \n\n게다가, 그들이 인접한 다른 국가들에도 우리나라에 대한 금수 조치를 적용하도록 종용하고 있는 것처럼 보인다는 소문이 퍼지고 있습니다! \n\n그 진위를 확인하거나 부인할 수 없는 상황에서, 더 심각한 최후통첩이 우리에게 제시되기 전에 [FROM.getNameDef] 내 우리 요원들의 활동을 더 은밀하게 만들 것을 고려해야 할 것입니다."
mongol_soviet_puppet.7.a:0 "좋지 않은 소식이군요"

mongol_soviet_puppet.8.t:0 "[FROM.getNameDefCap], 내정 간섭 중단을 요구하는 최후통첩 발송"
mongol_soviet_puppet.8.d:0 "[FROM.getAdjective] 정부는 자국의 세력권뿐만 아니라 내부 안정을 확보할 필요성을 언급하며, 군에 대한 총동원령을 선포했습니다! \n\n명백한 전쟁 준비와 함께, 그들은 최근의 불안과 농촌 대중 사이에서 증가하는 공산주의 지지에 대한 책임이 우리에게 있다고 주장하며 일련의 요구를 제기했습니다! \n\n게다가, 이 전쟁광들은 만약 우리가 그들의 영토 내에서 어떠한 종류의 선전 활동도 포기하지 않는다면 "공산주의 위협을 진압"할 준비가 되어 있습니다. 어떻게 해야 할까요?"
mongol_soviet_puppet.8.a:0 "그들이 뭘 어쩔 건데요? 우리에게 전쟁이라도 선포하겠다는 겁니까?"
mongol_soviet_puppet.8.b:0 "물러선다"

mongol_soviet_puppet.9.t:0 "최후통첩 거부됨"
mongol_soviet_puppet.9.d:0 "우리가 제시한 명백한 증거에도 불구하고, [FROM.getAdjective] 관리들은 증거가 조작되었으며 이 지역의 진정한 위협은 바로 우리 무능한 정부라고 주장하며 모든 비난을 거부했습니다! \n\n이러한 비난은 어떠한 합리적인 수단으로도 용납될 수 없으므로, 우리는 이 성가신 국가를 완전히 분쇄하기 위해 군대를 준비할 것입니다! \n\n우리 국경 순찰대는 이미 새로 모집된 병력으로 강화되었으며, 우리에게 필요한 것은 준비할 시간뿐입니다. 전쟁으로! [ROOT.getAdjective]의 영광이 그것을 요구합니다!"
mongol_soviet_puppet.9.a:0 "강경하게 나갈 때입니다"

mongol_soviet_puppet.10.t:0 "[FROM.getNameDefCap], 요구에 굴복"
mongol_soviet_puppet.10.d:0 "우리의 최후통첩은 외국 관리들에게 깊은 인상을 주고 겁을 주어, 그들은 영구적인 평화에 대한 열망을 발표하며 우리 수도에 의전 사절단을 파견했습니다! \n\n몇 차례의 논의 끝에, 그들은 또한 어떠한 종류의 내정 간섭도 포기하겠다는 맹세와 함께, 공산주의 사상으로 우리 국민의 마음을 불안하게 만들었던 첩보망의 다른 모든 구성원에 대한 자료를 제공했습니다. \n\n[ROOT.getNameDef]와 그 국민에게 영광스러운 날입니다!"
mongol_soviet_puppet.10.a:0 "예상대로입니다"

mongol_soviet_puppet.11.t:0 "몽골, 공산주의 봉기와 동맹"
mongol_soviet_puppet.11.d:0 "오늘 아침, "프롤레타리아를 해방하고 노동자 공화국을 수립"하는 것을 목표로 하는 또 다른 공산주의 반란 소식이 우리 본부에 도착했습니다. \n몇 시간 후 [MON.getLeader]는 새로 탄생한 혁명 정부의 지도자들이 [MON.getAdjective]의 지원을 호소했으며, 독립 투쟁에서 지도받는 정권이 됨으로써 유대를 공고히 하기로 만장일치로 의결했다고 전 세계에 발표했습니다! \n\n[MON.getNameDefCap]은 이제 이 지역의 공산주의 낙원을 보장하는 확고한 보증인으로 서 있으며, 그들의 지도 아래 점점 더 많은 정권을 흡수할 준비가 되어 있습니다."
mongol_soviet_puppet.11.a:0 "그들이 뭘 했다고요?"
mongol_soviet_puppet.11.b:0 "환영합니다, 형제자매들이여!"
mongol_soviet_puppet.11.c:0 "도대체 무슨 생각인 겁니까?!"
mongol_soviet_puppet.11.e:0 "우리의 새로운 운명이 기다립니다!"
mongol_soviet_puppet.11.f:0 "실로 흥미롭군요."

mongol_soviet_puppet.12.t:0 "[FROM.getNameDefCap], 산업 이전 프로그램 제안"
mongol_soviet_puppet.12.d:0 "진격해오는 적으로부터 국가 산업을 보호하기 위해, [MON.getAdjective] 관리들이 취약한 우랄 및 중앙아시아의 기존 산업 시설을 더 동쪽인 몽골 본토로 이전하자는 제안을 전달했습니다. \n\n우리가 공장에 직접 접근하지는 못하겠지만, [MON.getNameDef]의 동지들이 이러한 작전에 대한 대가로 상당한 비율의 자체 산업 역량을 제공하겠다고 약속했습니다. \n\n스타프카의 결정은 무엇입니까? 우리 산업을 적으로부터 훨씬 더 멀리 이전하는 것이 과연 실행 가능한 일입니까?"
mongol_soviet_puppet.12.a:0 "군수 공장 이전"
mongol_soviet_puppet.12.b:0 "민간 단지를 안전한 곳으로 이전"
mongol_soviet_puppet.12.c:0 "이곳의 공장들은 안전하다"

mongol_soviet_puppet.13.t:0 "[FROM.getAdjective]의 군수 공장 이전"
mongol_soviet_puppet.13.d:0 "스타프카는 군수 시설 중 하나를 동쪽으로 더 이전할 준비가 되었으며, 이는 우리 측의 약간의 산업적 보상을 대가로 우리 군사 역량을 강화할 것이라고 보고했습니다. \n\n우리의 성장하는 산업 역량은 [SOV.getAdjective] 동지들뿐만 아니라 우리에게도 큰 도움이 될 것입니다."
mongol_soviet_puppet.13.a:0 "훌륭하다!"

mongol_soviet_puppet.14.t:0 "[FROM.getAdjective]의 산업 단지 이전"
mongol_soviet_puppet.14.d:0 "보고에 따르면 산업 단지는 이미 몽골 본토의 안전한 장소로 이동 중입니다. \n\n스타프카는 우리가 거래의 우리 몫을 잊지 말고, 동지들을 지원하기 위한 산업 계약에 서명함으로써 우리 몫을 완수해야 한다고 보고합니다."
mongol_soviet_puppet.14.a:0 "훌륭하다!"

mongol_soviet_puppet.15.t:0 "요청 거부됨"
mongol_soviet_puppet.15.d:0 "스타프카는 현재 우리에게 신뢰할 수 있고 안전하며 확실한 경로를 구축할 수 없으므로, 다른 산업 단지를 우리 심장부로 이전하려 한다면 나중에 다시 요청을 보내야 한다고 보고합니다. \n\n일부 주민들은 이것이 우리에 대한 그들의 영향력을 감소시킬 수 있으며, 이는 우리에게도 이익이 될 수 있다고 언급합니다."
mongol_soviet_puppet.15.a:0 "아마도 다음 기회에?"

mongol_soviet_puppet.16.t:0 "공산주의의 새로운 봉화"
mongol_soviet_puppet.16.d:0 "코민테른의 정치 지형 변화의 필요성을 언급하며, [MON.getAdjective] 정치인들은 [SOV.GetNameDef]의 증대되는 정치적 불안정과 최근 군사적 패배에 대한 우려를 표명하는 공개 발표를 했습니다. \n\n"방비가 잘되고 강화된 위치에서 연합군의 노력을 조율하는 것이야말로 더 큰 선을 위한 것입니다."라고 [MON.getLeader]는 연설 말미에 말하며, 이로써 공식적으로 [MON.getFactionName]의 동맹 지도권을 인수했습니다."
mongol_soviet_puppet.16.a:0 "이제부터 우리가 이끌 것이다."
mongol_soviet_puppet.16.b:0 "그들은 다가올 일에 대비하고 있다."
mongol_soviet_puppet.16.c:0 "그들에게 아무 소용없을 것이다!"
mongol_soviet_puppet.16.e:0 "전쟁이 격화된다..."
mongol_soviet_puppet.16.f:0 "우리의 동맹은 더욱 강해진다."

mongol_soviet_puppet.17.t:0 "[FROM.getNameDefCap], 단일 연합 정부 제안"
mongol_soviet_puppet.17.d:0 "오늘 연설에서 [FROM.getLeader]는 공개적으로 다음과 같이 발표했습니다. \n"세계는 변하고 있습니다. 지금 누가 [FROM.getNameDef]와 [ROOT.getNameDef]의 군대에 맞설 힘이 있겠습니까? [FROM.getLeader]와 [ROOT.getLeader]의 힘과 두 국가의 연합에 맞설 자가 누가 있겠습니까. 나의 친구 [ROOT.getLeader]여, 함께 이 세계를 혁명으로 이끌 것입니다." \n\n분명히 의심스러운 연설이었지만, [MON.getNameDef] 전역의 수천, 수만 몽골인들의 박수갈채를 받았으며, 많은 우리 시민들도 전 세계 [ROOT.getFactionName]의 가치를 수호할 수 있는 단일 연합 정부를 간청하는 데 동참했습니다. 최고사령관의 응답은 무엇입니까?"
mongol_soviet_puppet.17.a:0 "하나의 연합, 분리될 수 없다"
mongol_soviet_puppet.17.b:0 "우리는 우리 스스로도 괜찮다."

mongol_soviet_puppet.18.t:0 "[FROM.getAdjective] 측이 우리의 요청에 동의했습니다"
mongol_soviet_puppet.18.d:0 "[FROM.getAdjective] 정치인들은 자국의 계속되는 군사 및 행정적 붕괴를 해결하기 위해 필사적으로 노력한 끝에, [FROM.getAdjective]-[ROOT.getAdjective] 단일 국가 정부 구성에 대한 우리의 제안을 수락했습니다. \n\n증강된 총참모부는 이미 적의 진격을 격퇴하고 외세의 통제하에 떨어진 영토를 되찾기 위한 새로운 작전 계획 수립에 착수했습니다. 이제 우리의 대표단은 새로 획득한 영토의 관료적 혼란을 해결하기 위해 새로 수복한 땅 전역에 파견되었습니다."
mongol_soviet_puppet.18.a:0 "모든 것이 계획대로 진행되고 있습니다."

mongol_soviet_puppet.19.t:0 "[FROM.getNameDefCap]이(가) 우리의 요청을 재고하는 것으로 보입니다"
mongol_soviet_puppet.19.d:0 "[FROM.getAdjective] 최고 사령부는 [ROOT.getLeader]의 카리스마 넘치는 연설이 자신들의 애국심과 혁명 사상에 대한 굳건한 믿음을 강화시켰으며, 이는 인민들이 [FROM.getNameDef]의 깃발과 기치 아래 적에 맞서 단결해 있음을 암시한다고 알려왔습니다. 행정적 통합은 전선의 상황 지휘를 악화시킬 뿐이라고 주장하며, [FROM.getLeader]은(는) 명예로운 제안을 정중히 거절했습니다. \n\n그들은 여전히 자신들의 군사력과 민간의 지원에 크게 의존하여 현재의 위기를 해결하고 붕괴하는 국가를 구할 수 있다고 믿는 것 같습니다. 이 주장이 사실인지 지켜봅시다. "
mongol_soviet_puppet.19.a:0 "우리는 최선을 다했습니다."

#Advisor to provide info on the matter and what is going on
mongol_rp_advisor.1.t:0 "사령부 첫 보고"
mongol_rp_advisor.1.d:0 "반갑소, 동지. 펠지딘 겐덴의 개인 고문 중 한 명으로 최근 임명된 것을 축하하오! \n동지와 같은 인물들과 함께 겐덴은 우리의 위대한 [MON.getName]을 영광스럽고 번영하는 미래로 이끌고자 하오. 내 이름은 달드 조블로흐이며, 국토안보부에서 동지와 같은 젊은 지휘관들을 위한 개인 고문으로 오랫동안 일해왔소. 동지의 사전 지식은 이전의 근무 경험과 배정받았던 아이막에 따라 크게 달라질 수 있소. 전반적인 상황은 다음과 같이 간략하게 설명할 수 있소:\n\n우리의 영토는 [CHI.getNameDef] 지도부가 이 지역에서 실질적인 권력을 거의 행사하지 못함에도 불구하고, 여전히 그들의 일부로 간주되고 있소. \n[JAP.getAdjective] 제국주의자들은 1932년 봉천 군벌의 자산을 장악한 후 우리나라 동부 지역에서 지속적으로 활동을 늘려왔소. \n이러한 상황에서 유일한 친구는 소련이었소. 그들은 1924년 인민 혁명 이래로 우리에게 이념적, 물질적 지원을 제공하며 우리 국가에 대한 영향력을 강력하게 굳혔소.\n\n겐덴과 데미드가 현재 모스크바를 방문 중이니, 전보를 통해 그들이 회의에서 다루어야 할 추가 주제에 대해 몇 가지 제안을 보낼 수 있소. 시간은 제한되어 있고 매 시간이 중요하오! \n\n준비하도록 남겨두겠소. 이상, 조블로흐."
mongol_rp_advisor.1.a:0 "앞으로 더 많은 보고를 기대하겠다."
mongol_rp_advisor.1.b:0 "내가 뭘 하는지는 잘 알고 있네, 달드. 더 이상의 보고는 필요 없다."


mongol_anti_soviet.1.t:0 "임시 정부 수립"
mongol_anti_soviet.1.d:0 "이 불안한 시기에 우리의 국가 정체성을 확보하려던 대표단의 파견이 파국적인 실패로 끝난 후, 정부 조직은 당 엘리트의 여러 분파를 통합하여 이 불확실한 시기에 국가를 통치할 임시 정권을 수립했습니다. \n\n권력을 위해 싸우는 소수의 주모자들이 이끄는 여러 분열적인 이익 집단은 분명 정부의 성공에 기여하지 못하지만, 적어도 그들은 많은 공개적인 제안을 염두에 두고 있습니다. \n\n안정적이고 확고한 지도부를 찾거나, 아직 가능하다면 고군분투하는 겐덴을 구출하는 것이 최선입니다."
mongol_anti_soviet.1.a:0 "당분간은 그들이 주도할 것입니다"

mongol_anti_soviet.2.t:0 "그를 찾았다!"
mongol_anti_soviet.2.d:0 "1924년에 사망한 복드 칸의 현대적 환생인 제9대 젭춘담바 쿠툭투를 찾는 수색이 대성공을 거두었습니다.\n\n우리 승려들이 현지 마을에서 2세에서 5세 사이의 모든 소년을 모은 후, 각 참가자에게 세 차례의 시험을 실시했습니다. 몇 시간 후, 최종 시험 결과는 우리가 정당한 환생인 젭춘담바 쿠툭투를 식별하는 데 도움이 되었습니다! \n\n원래 잠팔 남돌 초에키 걀첸으로 태어난 그 소년은 자신의 진정한 정체성과 외몽골의 불교도들을 통합했던 이전의 영혼을 대표한다는 사실을 듣게 되었습니다. 그의 부모는 정치 상황이 안정될 때까지 발견된 사실을 비밀로 지키겠다고 맹세했습니다."
mongol_anti_soviet.2.a:0 "훌륭하군! 하지만 당분간은 비밀로 하게."

mongol_anti_soviet.3.t:0 "시험을 통과한 자가 없습니다"
mongol_anti_soviet.3.d:0 "마을과 도시를 계속 수색했지만, 제9대 젭춘담바 쿠툭투의 새로운 정체를 밝히기 위한 일련의 시험을 통과한 후보자는 아직 아무도 없습니다. \n\n우리 수색대는 더 이상 이 지역에서 수색을 진행하지 않을 것이며, 이는 복드 칸의 환생이 분명 티베트 고원 지역의 다른 곳에 있음을 암시합니다. 이 자원과 시간이 많이 소요되는 노력을 계속할지 여부는 우리에게 달려 있습니다."
mongol_anti_soviet.3.a:0 "성과는 없었지만, 포기하지 않겠습니다!"
mongol_anti_soviet.3.b:0 "성과가 없다고? 이건 감당하기 힘든 노력이 되었습니다."

mongol_anti_soviet.4.t:0 "새 의장 임명"
mongol_anti_soviet.4.d:0 ""
mongol_anti_soviet.4.a:0 "진독수가 국가를 새로운 공산주의의 길로 이끌 것입니다!"
mongol_anti_soviet.4.b:0 "이오시프 사탈린칸이 당분간 지도력을 맡게 될 것입니다."
mongol_anti_soviet.4.c:0 "의장이라고요? 여성 의장은 안 됩니까?"

#army events

mongol_army.1.t:0 "생산 재조정 계획"
mongol_army.1.d:0 "가용 자원이 한정되어 있어, 군수 산업의 역량을 다양한 특성의 기갑 차량 대량 생산에 온전히 집중할 수 없습니다. \n\n연구 개발팀의 신규 제안에 따르면, 생산 라인과 시설을 재조정하여 특정 목적의 전차 장비 제작 및 배치에 적합하도록 해야 합니다. 이 전차의 목표는 차량 속도를 희생하여 전장에서의 신뢰성을 증명하거나, 더 높은 모델 비용으로 최고의 무장을 갖추거나, 저렴하게 제작되지만 쉽게 파괴되거나, 혹은 가능한 한 짧은 시간에 가장 먼 거리를 주파하는 것입니다. \n\n추후에 설계도를 다른 목적으로 변경할 수도 있지만, 이는 비용과 시간이 많이 소요되는 작업이 될 것으로 예상됩니다."
mongol_army.1.a:0 "신뢰성 있는 모델을 우선시"
mongol_army.1.b:0 "고품질 모델링 지원"
mongol_army.1.c:0 "최저 생산 비용에 집중"
mongol_army.1.e:0 "전차는 전투가 아니라 속도를 위한 것!"

mongol_army.2.t:0 "유망한 장군" #hiring ravdan
mongol_army.2.d:0 "확장 중인 우리 총참모부는 열정이 넘치고 개방적이며, 기존 장교들에게 완전히 새로운 비범한 전술을 제공할 수 있는 신임 후보자를 절실히 필요로 합니다. 최근 칙령으로 새로운 대령 및 장군 직위에 대한 공모가 발표되었습니다. \n\n여러 사관학교의 최근 졸업생들로부터 소수의 지원서가 접수된 가운데, 며칠 전 한 유망한 후보자가 위원회에 지원서를 제출했습니다. \n\n그의 이름은 산디빈 라브단으로, 대의에 대한 헌신과 최근 몇 년간 다양한 주둔지에서의 적극적인 복무로 잘 알려져 있습니다. 우리 총참모부에 훌륭한 인재가 될 것입니다."
mongol_army.2.a:0 "그를 고용하라!"

mongol_army.3.t:0 "함선 이전 요청" #seezing puppets ships
mongol_army.3.d:0 "우리의 후원자들이 우리 해군 함선 일부를 그들의 해군 사령관 중 한 명의 직속 지휘하에 이전할 것을 요청하는 칙령을 보냈습니다. '제한된 기간 동안만'이라고 주장하지만, 우리 정보원에 따르면 대부분 [MON.getAdjective] 선원들로 구성된 완전한 승무원을 편성할 준비를 하고 있다고 합니다. \n\n새로운 보호자에게 보급함으로써 잠재적인 전쟁 노력에 기여하는 방식을 고려하여 자치권을 늘릴 수 있지만, 새로운 주인에게 함선을 내어주기 싫다면 언제든지 일부 함선을 침몰시킬 수도 있습니다."
mongol_army.3.a:0 "가용 시간이 제한적입니다."

mongol_army.4.t:0 "몽골의 고문단 요청" #Mongolia asks for Soviet military mission
mongol_army.4.d:0 "상호 원조 및 협력 조약의 비준으로 우리 군이 [MON.getAdjective] 영토에 주둔할 수 있게 되었지만, 지금까지 그들의 장교들과 교류할 기회는 거의 없었습니다. \n\n상호 이익이 되는 협력을 증진하고자, 그들의 장군들은 지속적으로 군사 기동 및 훈련을 수행할 수 있는 [SOV.getAdjective] 군 인력의 증원을 요청하는 칙령에 서명했습니다. 이는 이 지역에 대한 우리의 장악력을 강화하는 동시에 [MON.getAdjective] 군을 우리에게 충성하게 만들 것입니다. 어떻게 대응해야겠습니까?"
mongol_army.4.a:0 "군을 지원할 인원을 파견하라"
mongol_army.4.b:0 "소규모 인원이면 충분할 것이다"
mongol_army.4.c:0 "우리 인력은 다른 곳에 필요하다"

mongol_army.5.t:0 "[SOV.getAdjective], 인원 파견에 동의" #Receives a big crew
mongol_army.5.d:0 "우리의 겸허한 요청은 [SOV.getAdjective] 총참모부로부터 강력한 지지를 받았습니다. 그들은 현장에서 우리 교리의 발전을 돕기 위해 강력하게 무장하고 훈련된 인원을 파견하기로 했습니다. \n\n추가 군사 임무의 일환으로, 그들의 인원 중 일부가 우리 군의 현대화와 훈련을 감독할 것이라는 내용의 추가 의정서가 첨부되었습니다."
mongol_army.5.a:0 "훌륭하다!"

mongol_army.6.t:0 "[SOV.getAdjective]의 제한적 지원" #Receives a small crew
mongol_army.6.d:0 "[SOV.getAdjective] 동지들은 군사 고문단의 임무를 소수의 고문으로 제한하기로 결정했습니다. 이들은 우리 군의 전반적인 발전과 현대적 기준에 따른 장비 재정비를 감독할 것입니다. \n\n우리 장군들이 몇 가지 추가 요청을 했으나, 그중 다수는 명백히 무시되거나 "더 나은 시기에 재검토"를 위해 어느 관료 사무실의 서류 더미 위에 놓였습니다. \n\n아무것도 없는 것보다는 낫지만, 불행히도 그다지 효과적이지는 않습니다."
mongol_army.6.a:0 "알겠다!"

mongol_army.7.t:0 "군사 고문단 파견 없음" #Receives nothing from Soviets
mongol_army.7.d:0 "향후 어떠한 개입이라도 이 지역의 긴장을 고조시키고 이미 불확실한 상황을 악화시킬 것이라고 주장하며, [SOV.getLeader]는 군사 협력이 "특정 상황이 더 유리해질 가까운 미래에" 강화될 것이라고 발표했습니다... \n\n파멸적인 진전이지만, 현장에서 들었던 몇 가지 대화를 이용해 약간의 군사 전문 지식을 공짜로 얻을 수 있지 않을까요?"
mongol_army.7.a:0 "끔찍하군!"

mongol_foreign_influence.2.t:0 "몽골의 행정 통합" #becoming puppet through influence
mongol_foreign_influence.2.d:0 "[MON.getNameDef]에 대한 우리의 영향력은 그들의 대내외 정치가 우리의 지원에 크게 의존하는 불안정한 상황으로 이어졌습니다. \n\n생존을 위한 [MON.getAdjective] 인민의 투쟁을 보며, [ROOT.getLeader]는 이 불확실하고 위험한 시기에 국가에 대한 우리의 지배를 공고히 할 충성스러운 정부를 임명하는 것을 고려했습니다."
mongol_foreign_influence.2.a:0 "새로운 통치를 선포할 특사를 파견하라"
mongol_foreign_influence.2.b:0 "우리의 이익에 부합하지 않는다"

mongol_foreign_influence.3.t:0 "몽골이 우리의 대의에 동조하다!"
mongol_foreign_influence.3.d:0 "[MON.getNameDef]로부터 비밀 전보를 받았습니다. 이 불확실한 시기에 [MON.getLeader]가 우리의 대의에 충성을 맹세한다는 내용입니다. \n\n우리 인민의 혁명적 투쟁을 보고, 그들의 대사들은 인민 혁명 투쟁에서의 상호 원조 및 협력 조약을 제안했습니다. \n\n그들을 우리의 친구로 여겨야 할까요, 아니면 그들에 대한 중립적 입장을 유지해야 할까요?"
mongol_foreign_influence.3.a:0 "아주 좋다!"
mongol_foreign_influence.3.b:0 "관심 없다."

mongol_foreign_influence.4.t:0 "[FROM.getAdjective] 관리들이 거래를 수락하다"
mongol_foreign_influence.4.d:0 "양국 대표단이 오늘 아침 만나 이 투쟁에서 상호 이익이 되는 지원 문제를 논의했습니다. \n\n양측이 서명한 이 조약은 [FROM.getNameDef]와 그 지도자 [FROM.getLeader]에 대한 우리의 충성을 공식적으로 공고히 하며, 우리가 이 투쟁에서 다양한 외교적 호의를 추구할 수 있게 해줍니다."
mongol_foreign_influence.4.a:0 "결실 있는 협력이 되기를!"

mongol_foreign_influence.5.t:0 "[FROM.getAdjective]-[ROOT.getAdjective] 거래 거부됨"
mongol_foreign_influence.5.d:0 "우리의 최선의 노력에도 불구하고, [FROM.getLeader]는 우리의 "모호한 약속과 공허한 위협"에 그다지 설득되지 않은 것 같았으며, 우리가 이 불확실한 상황에서 부당한 이득을 얻기 위해 새로 획득한 조약을 이용할 수도 있음을 암시했습니다. \n\n협상이 결렬되면서, 우리 외교관들은 빈손으로 수도에 돌아와 걱정스러운 소식을 전하고 있습니다."
mongol_foreign_influence.5.a:0 "그렇다면 유감이군"

mongol_foreign_influence.6.t:0 "[MON.getAdjective] 관리들, 내전 개입 의사 발표"
mongol_foreign_influence.6.d:0 ""소비에트 연방에서 진행 중인 분쟁을 최종적으로 해결하고 종식시키기 위해", [MON.getLeader]는 [MON.getAdjective] 인민이 러시아 혁명의 유산과 공산주의 이념의 진정한 가치를 위해 싸울 준비가 되어 있다고 공식 발표했습니다. \n\n거인의 그림자 속에 숨을 때는 지났다고 주장하며, [MON.getNameDef]는 조국이 처한 이 끔찍한 시기에 러시아 내전에 참전하기 위해 군대를 준비하고 있습니다."
mongol_foreign_influence.6.a:0 "오, 이런! 아무튼..."

mongol_foreign_influence.10.t:0 "몽골, 군벌 중 하나를 확보하도록 우리를 초청"
mongol_foreign_influence.10.d:0 "중국 내전에서 우리의 주요 역할과 역량을 인지한 [MON.getAdjective] 외교관들이 우리 관리들에게 접근하여, 영향권을 분할하고 우리 인근의 해당 군벌 국가를 나누자는 흥미로운 제안을 해왔습니다. \n\n고안된 계획은 다음과 같습니다. 먼저 미래의 적과 그 위성국의 해당 전략 지역을 분할합니다. 만약 위성국이 존재하고 점유가 가능하다면 말입니다. \n\n계획이 수립된 후, 단일 최후통첩이 발령되어 지역 강대국과의 화해 또는 외교적 고립과 신속한 파멸을 요구할 것입니다. \n\n사람들은 우리가 이 투쟁에 참여하여 약간의 영토를 얻을 수 있을지 궁금해하고 있습니다. [ROOT.getLeader]의 최종 결정은 무엇이겠습니까?"
mongol_foreign_influence.10.a:0 "기꺼이 참여하겠다!"
mongol_foreign_influence.10.b:0 "다른 문제들이 더 중요하다"

mongol_foreign_influence.11.t:0 "[FROM.getAdjective] 무장 세력, 병력 전개 개시"
mongol_foreign_influence.11.d:0 "[FROM.getLeader]는 분리 독립 지역을 확보하기 위해 외교관과 군 파견대를 파견할 것이라고 통보했습니다. \n\n지금 우리가 해야 할 일은 우리의 욕망과 동맹국의 의지에 따라 영향권을 나누는 것뿐입니다. \n\n 그 후 우리는 최후통첩을 발령하고, 외교적 또는 군사적 수단을 통해 중원의 국경이 우리에게 유리하게 재편되는 것을 보게 될 것입니다..."
mongol_foreign_influence.11.a:0 "훌륭하군!"

mongol_foreign_influence.12.t:0 "[FROM.getAdjective] 관리들, 관심을 보이지 않다"
mongol_foreign_influence.12.d:0 "우리의 "위험한 시도"에 추가 자원을 할애할 수 없었던 [FROM.getLeader]는 우리의 미약한 제안을 거절하기로 결정했습니다. \n\n우리는 이 투쟁에서 그들의 지원에 의존할 수 없게 되었지만, 그렇게 생각해보면 정말 필요했던 것일까요? \n\n우리 외무장관은 이미 그러한 주저함이 우리에게 더 많은 기동의 여지를 남겨줄 뿐이라고 말했습니다."
mongol_foreign_influence.12.a:0 "그들만 손해지"

mongol_foreign_influence.13.t:0 "[FROM.getAdjective] 관리들, 우리에게 최후통첩을 제시하다!"
mongol_foreign_influence.13.d:0 "최근 여러 지역의 외교 사절단이 우리 관리들의 주요 사무실에 도착했으며, [MON.getAdjective] 대표단이 이끄는 이들은 우리의 정당한 영토 분할이 논의되는 긴 요구 목록을 제시했습니다! \n\n제시된 문서에서 그들은 "군벌 시대는 과거의 일이며, 중원은 지난 수십 년간 폐허만을 보아온 분열된 민족과 국가들을 통합할 수 있는 지역 강대국들의 필요에 따라 재편되어야 한다"고 주장합니다. \n\n우리 외무장관은 요구의 노골적인 태도와 "우리 민족들의 평화로운 공존을 보장하기" 위해 우리가 해야 할 양보의 양에 충격을 받았습니다. \n\n또한 우리의 적들이 이 계획을 꼼꼼하게 준비한 것 같습니다..."
mongol_foreign_influence.13.a:0 "굴복하겠다"
mongol_foreign_influence.13.b:0 "절대 항복하지 않겠다!"

mongol_foreign_influence.14.t:0 "[FROM.getAdjective] 관리들, 불가피한 것을 받아들이다"
mongol_foreign_influence.14.d:0 "연합의 외교적 압력을 견디지 못한 [FROM.getLeader]는 사임하고, 국가의 행정 구역을 재편하는 데 막대한 노력을 기울인 새로 수립된 임시 정부에 권력을 넘겨줄 수밖에 없었습니다. \n\n며칠 간의 힘든 시기 끝에, 영토는 각 동맹국에 이전되었고 국가의 행정부는 사실상 해체되었습니다."
mongol_foreign_influence.14.a:0 "계획대로군"

mongol_foreign_influence.15.t:0 "[FROM.getAdjective] 관리들, 동원령 선포!"
mongol_foreign_influence.15.d:0 "붕괴하는 국가의 잔재를 확보하려는 노력의 일환으로, [FROM.getLeader]는 "그러한 불명예"보다 명예로운 싸움이 낫다고 결정하여, 전국에 계엄령을 선포하고 그동안 다양한 외교 기관을 해체했습니다. \n\n국경에 연합군이 주둔하고 있는 상황에서, 우리의 침공 소식이 세계 외교관들에게 닿기 전까지는 당분간 어떠한 종류의 외세 개입도 최소화될 것입니다. \n\n우리에게 주어진 시간은 제한적이므로, 현명하게 사용해야 합니다."
mongol_foreign_influence.15.a:0 "그들은 자신들의 운명을 선택했다"