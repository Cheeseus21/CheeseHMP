MON_GATHERING_STORM_DESC:0 "세계의 교차로에서 몽골은 1911년 청 제국으로부터 독립을 선포한 이래 안식처를 찾았습니다. 소련의 원조는 이 나라를 인민 공화국으로 바꾸었고, 최근 몇 년간 막대한 정부 및 경제적 변화를 겪었습니다. \n\n그러나 동쪽에서 새로운 위협이 부상하고, 남쪽에서는 중국 내전이 계속되며, 소련과의 관계가 악화됨에 따라, 힘의 균형이 잘못된 쪽으로 기울어지면 이 나라는 새로운 전선이 될 수도 있습니다..."

