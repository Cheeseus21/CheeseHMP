#industrial#
MON_ill_educated_population_idea:0 "저학력 인구"
MON_ill_educated_population_idea_desc:0 "지리적 위치와 언어적 특성으로 인해, 이 나라는 젊고 호기심 많은 인재들이 나타나도 이들을 지원할 수 있는 중앙집권적 교육 체계가 부족합니다. 1930년대 초 국가의 식자율은 약 10%에 불과한 것으로 추정되었습니다."

MON_population_learning_idea:0 "국민 교육"
MON_population_learning_idea_desc:0 "최근 몇 년간의 교육 개혁은 상당히 효과적인 것으로 입증되었습니다. 전국의 전반적인 문해율이 향상되고 있으며, 더 많은 사람들이 가용 지식을 탐독하려 합니다."

Mon_elementary_schools_idea:0 "초등학교 확장"
Mon_elementary_school_ideas_desc:0 "정부 기금이 전국에 걸쳐 현재의 교육 수준을 대폭 확장하는 데 투입되었습니다."

Mon_tech_coop_idea:0 "기술 협력"
Mon_tech_coop_idea_desc:0 "우리는 협력국으로부터 배울 것이 많습니다. 이 협력이 전례 없이 풍성한 결실을 맺게 합시다!"

Mon_soviet_advisors_idea:0 "[SOV.getAdjective] 군사 고문단"
Mon_soviet_advisors_idea_desc:0 "[SOV.GetAdjective] 군사 전문가들이 상호 원조 조약의 일환으로 우리 영토에 파견되었습니다."

Mon_soviet_crew_idea:0 "[SOV.getAdjective] 군사 요원"
Mon_soviet_crew_idea_desc:0 "몇몇 [SOV.getAdjective] 장군과 이론가들이 우리 총참모부를 지원하고 있습니다."

MON_changed_script_idea:0 "문자 변경"
MON_changed_script_idea_desc:0 "구 몽골 문자는 다양한 서체를 가지고 있어 우리 아이들의 학습 진도를 심각하게 저해했습니다. 새로운 변경 사항으로 우리 국민이 더 효율적으로 학습할 수 있게 되었습니다."

MON_script_reform_in_progress_idea:0 "문자 개혁 진행 중"
MON_script_reform_in_progress_idea_desc:0 "[MON.getNameDef]의 혼란스러운 문자 체계를 통합하기 위해 현재 막대한 노력이 이루어지고 있습니다."

MON_weak_currency_idea:0 "취약한 통화"
MON_weak_currency_idea_desc:0 "1925년 국가 통화 도입에도 불구하고, 투그릭은 여전히 대중에게 인기 없는 통화로 남아 있으며 사람들은 여전히 중국 위안, 소련 루블, 미국 또는 멕시코 달러 및 암시장에서 유통되는 수십 가지의 다른 저가치 통화에 의존하는 경향이 있습니다."

MON_new_course_policy_idea:0 "신노선 정책"
MON_new_course_policy_idea_desc:0 "1930년대 초 국가 당국이 시행한 비인간적인 집산화 정책은 국가 서부 지역에서 봉기를 야기할 뻔했습니다. 봉기는 군에 의해 즉시 진압되었고, 구 레닌의 신경제정책(NEP)과 유사하게 더 나은 생활 환경을 약속하는 "신노선 정책"이 발표되었습니다."

MON_buddhist_opposition:0 "불교도의 저항"
MON_buddhist_opposition_desc:0 "종교는 몽골 사회에 깊이 뿌리내리고 있으며, 다양한 종교 기관들은 자신들의 힘과 영향력을 이용해 국가 정책과 중앙위원회의 지시에 공개적으로 반대합니다. 시골 남성들의 상당수가 수도원에 평생을 바쳤으며, 국정 참여를 꺼리고 있습니다."

MON_dominated_animal_husbandry_idea:0 "지배적인 축산업"
MON_dominated_animal_husbandry_idea_desc:0 "유목 생활은 국가의 광활한 평원에서 흔한 삶의 방식이며, 산업화의 목소리는 권력 최상층의 극소수에게만 닿았습니다."

MON_animal_husbandry_prioritised_idea:0 "축산업 우선"
MON_animal_husbandry_prioritised_idea_desc:0 "우리의 유산과 성공은 축산업에 있으며, 수 세기 동안 효과가 있었던 방식은 미래에도 통할 가능성이 높습니다."

MON_industrial_growth_prioritised_idea:0 "산업 성장 우선"
MON_industrial_growth_prioritised_idea_desc:0 "국가 산업 혁명의 목표를 추구하기 위한 공동의 노력으로 수 세기에 걸친 동물 착취를 뒤엎을 것입니다!"

MON_encourage_trade_idea:0 "무역 장려"
MON_encourage_trade_idea_desc:0 "우리 시장은 새로 체결된 무역 협정으로 큰 이익을 얻고 있습니다!"

MON_improved_mining_facilities_idea:0 "개선된 채광 시설"
MON_improved_mining_facilities_idea_desc:0 "약간의 정부 투자로, 우리의 자원 채굴 및 개발 산업은 국내 시장에 더 많은 양의 자원을 공급할 수 있습니다."

MON_focus_on_south:0 "남부 집중"

MON_modernizing_transportation_system:0 "수송 체계 현대화"

Mongolbank_very_high_funds:0 "§H몽골은행 - 매우 높은 자금§!"
Mongolbank_very_high_funds_desc:0 "은행 시스템을 제대로 운영하기는 어렵지만, 경제는 호황을 누리고 있습니다!"

Mongolbank_high_funds:0 "§H몽골은행 - 높은 자금§!"
Mongolbank_high_funds_desc:0 "재정 운용은 여전히 문제지만, 산업은 이로 인해 큰 혜택을 받고 있습니다."

Mongolbank_moderate_funds:0 "§H몽골은행 - 보통 자금§!"
Mongolbank_moderate_funds_desc:0 "산업의 통제와 지원에 대한 균형 잡힌 접근."

Mongolbank_low_funds:0 "§H몽골은행 - 낮은 자금§!"
Mongolbank_low_funds_desc:0 "적은 자금과 잠재적 대출 가능성으로 인해 국가 경제 성장이 침체되었습니다."

Mongolbank_bankrupt:0 "§H몽골은행 - 파산§!"
Mongolbank_bankrupt_desc:0 "파산하여 더 이상 대출을 발행할 수 없습니다. 정부의 직접적인 개입이 필요합니다!"

MON_foreign_tribute_idea:0 "외국의 공물"

MON_soviet_NKVD_agents:0 "소비에트 NKVD 요원"
MON_soviet_NKVD_agents_desc:0 "1924년 혁명의 유산으로 도입된 일당제는 소비에트 민간 및 군사 전문가의 지원과 감독에 크게 의존하고 있습니다. 이 전문가들 중 일부는 국가 정책을 강력하게 통제하고 있습니다."

