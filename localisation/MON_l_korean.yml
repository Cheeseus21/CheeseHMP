MON_peljidiin_genden_desc:0 "세기가 바뀔 무렵 가난한 목축업자 가정에서 태어난 겐덴은 일찍이 몽골 인민혁명당에 가입했으며, 소박하고 솔직한 언변으로 많은 당 원로들의 지지를 얻는 데 성공했습니다. 1924년 인민혁명이 시작되자, 이 젊은 프롤레타리아는 국가 소후랄의 의장으로 임명되어 권력의 최고위층으로 가는 길을 열었습니다. \n\n소련 관리들의 지원 덕에 그는 1928년 제7차 당 대회 이후 3명의 국가 서기 중 한 명이 될 수 있었습니다. 평의회는 가혹한 집산주의와 반불교 정책을 시행하기 시작했고, 이는 전국적인 반란으로 이어졌습니다. 그가 반숙청에서 살아남은 것은 대의에 대한 높은 충성심과 1932년 이오시프 스탈린의 직접적인 감독 덕분이었습니다. \n\n하지만 이 관계는 오래가지 못했습니다. 겐덴의 무례하고 친종교적인 태도는 1935년 초 여러 소련 관리들에게 그를 '신뢰할 수 없는 동맹'으로 보이게 만들었기 때문입니다..."

