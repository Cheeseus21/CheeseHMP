##political##
MON_troika_organized:0 ""트로이카" 조직"
MON_troika_organized_desc:0 "스탈린주의자들의 혁명 트로이카를 본받아, 초이발산이 이끌며 국가의 법과 질서를 바로잡기 위한 우리만의 트로이카를 설립했습니다."

MON_political_opposition_organizing:0 "정치적 반대파 조직"
MON_political_opposition_organizing_desc:0 "권력에서 밀려나고 있음을 깨달은 군국주의자들은 정부를 전복하고 군사 독재를 수립하려 할 것입니다. 우리는 그들의 공격에 대비하고 우리만의 지지 기반을 조직해야 합니다!"

MON_civil_militia_idea:0 "민병대 창설"

MON_banditry_know_how:0 "산적 활동 지식"

MON_communist_paradise_achieved:0 "공산주의 낙원 달성"
MON_communist_paradise_achieved_desc:0 ""

MON_first_five_year_plan:0 "제1차 5개년 계획"

MON_volunteer_corps:0 "[ROOT.getAdjective] 의용군단"

MON_powerful_choibalsan:0 "강력한 초이발산"
MON_powerful_choibalsan_desc:0 "1921년 중국 및 러시아와 몽골의 독립을 협상했던 7인 중 한 명인 초이발산과 그의 지지자들은 이제 정부에서 높은 대표성을 띠고 있습니다."

MON_ministery_of_interior_reorganized:0 "내무부 개편"
MON_ministery_of_interior_reorganized_desc:0 "NKVD의 선례를 따라, 우리나라는 국가의 타트눌힘 펜히 가자르(몽골 중앙정보국)의 성과를 극적으로 향상시키는 데 성공했습니다."

MON_consolidated_power_1:0 "한 지역에 권력 집중"
MON_consolidated_power_1_desc:0 "이제 권력은 한 지도자의 손아귀에 굳건히 쥐어졌으며, 그는 바로 아난딘 아마르의 배후에서 조종하는 초이발산입니다."

MON_consolidated_power_2:0 "대부분 지역에 권력 집중"
MON_consolidated_power_2_desc:0 "처이발상은 수많은 요충지를 확보했으며, 이제 [MON.getNameDef]에 대한 그의 통치권을 행사합니다."

MON_consolidated_power_3:0 "권력 완전 장악"
MON_consolidated_power_3_desc:0 "처이발상은 이제 [MON.getNameDef]을(를) 완전히 장악했습니다."

Mon_intellectuals_purged:0 "지식인 숙청"
Mon_intellectuals_purged_desc:0 ""신뢰할 수 없는" 자들로 간주되어 수많은 지식인이 숙청되었습니다."

Mon_party_purged:0 "당 숙청"
Mon_party_purged_desc:0 "개편과 체포가 단행되어 현 당 구조에 큰 공포를 남겼습니다."

Mon_lamas_purged:0 "라마승 숙청"
Mon_lamas_purged_desc:0 "최근 정부의 숙청으로 인해 수많은 종교 기관의 구성원들이 나라를 떠나거나 숨어 지내도록 강요받았습니다."

MON_border_patrols_recruitment:0 "국경 순찰대 모집"
MON_border_patrols_recruitment_desc:0 "육상 국경의 안보가 최우선 과제로 주어졌습니다. 국가를 보존하기 위해 가용한 모든 것과 모든 인원이 필요합니다!"

