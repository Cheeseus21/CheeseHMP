#############################focuses #######################################
#Army#
 MON_organize_army_inspection: "Организовать армейскую инспекцию"
 MON_organize_army_inspection_desc: "Несмотря на огромный оборонный бюджет, наша армия остаётся в крайне плохом состоянии из-за отсутствия современного снаряжения, опоры на устаревшую тактику и сильной политизации военнослужащих. Если мы хотим вступить в современную эпоху, мы должны начать улучшать её любыми возможными средствами."

 MON_mobilize_the_reserves: "Мобилизовать резервы"
 MON_mobilize_the_reserves_desc: "Предыдущие пробные мобилизационные приказы оказались крайне неэффективными: на призывные пункты собралось всего 2000 человек вместо запланированных 20000. У нас есть резервисты, способные воевать, но такой призыв будет крайне непопулярен в мирное время."

 MON_field_hospital_initiative: "Инициатива полевых госпиталей"
 MON_field_hospital_initiative_desc: "Дорогостоящее дело войны легло тяжким бременем на плечи матерей и отцов наших солдат: не только тех, кто не вернулся с поля боя, но и тех, кто был ранен в процессе и не получил надлежащей помощи. Мы должны ввести полевые госпитали, способные сохранять жизни солдат для следующего дня и следующего боя."

 MON_desperate_measures: "Отчаянные меры"
 MON_desperate_measures_desc: "В отчаянные времена требуются отчаянные меры, когда нужен каждый возможный новобранец, способный сражаться за победу Отечества! Необходимо профинансировать массовую кампанию по набору рекрутов, чтобы заполнить недостающие ряды в наших вооружённых корпусах."

 MON_demids_legacy: "Наследие Демида"
 MON_demids_legacy_desc: "Гэлэгдоржийн Дэмид давно выступал за моторизацию и механизацию вооружённых сил, подразумевая, что кавалерия изжила себя как фронтовая боевая сила и больше подходит для логистических целей в некоторых суровых условиях местности. Мы должны последовать его стопам и завершить начатую реформу."

 MON_improve_coordination_capabilities: "Улучшить координационные возможности"
 MON_improve_coordination_capabilities_desc: "Связь между различными боевыми полками приобретает всё большее значение на крупных полях сражений, где командиры не могут координировать свои действия визуально или через каких-либо посыльных. Для успеха такой модернизации необходимо в широких масштабах внедрить радио."

 MON_lessons_from_1934_rebellion: "Уроки восстания 1934 года"
 MON_lessons_from_1934_rebellion_desc: "Дело Лхумбэ и соответствующие крестьянские восстания того же года показали, что гражданские ополчения и бандитские полки плохо противостоят бронетехнике, особенно быстроходным противотанковым машинам и грузовикам. Такие машины также можно использовать для разведки."

 MON_foundation_for_special_task_battalion: "Основание батальона специального назначения"
 MON_foundation_for_special_task_battalion_desc: "Имея ограниченное количество людских ресурсов, мы не можем позволить себе оснастить и содержать большую армию, однако потребности в защите наших интересов во внутренних и внешних делах нельзя игнорировать. Офицерский корпус уже разработал планы формирования элитного [ROOT.getAdjective] полка специального назначения, для этого требуется лишь официальное одобрение политиков."

 MON_mountainous_specialization: "Горная специализация"
 MON_mountainous_specialization_desc: "С горами, простирающимися с северо-запада на юго-восток, и множеством хребтов к северу от страны, вполне естественно, что спецназ должен создать несколько лагерей и учебных полигонов в скалистых частях нашей страны, подразумевая элитную специализацию страны на горной местности."

 MON_gobi_training_facilities: "Учебные полигоны в Гоби"
 MON_gobi_training_facilities_desc: "Вся наша южная граница покрыта дюнами пустыни Гоби. Эта суровая и враждебная среда является идеальным местом для тренировок в экстремальных условиях окружающей среды, которые планируется провести в ближайшем будущем. Также жизненно важно подготовить командиров, способных действовать в таких условиях."

 MON_equipment_recovery_teams: "Команды по восстановлению снаряжения"
 MON_equipment_recovery_teams_desc: "Отчёты наших спецназовцев указывают на то, что во время тренировок большое количество снаряжения полностью выходит из строя и теряется из-за особенностей местоположения лагерей. Хотя мы не можем изменить погоду вокруг нас, мы можем обучить специальные команды, способные извлечь максимум из повреждённого снаряжения, тем самым минимизируя возможные потери."

 MON_expand_the_general_staff: "Расширить Генеральный штаб"
 MON_expand_the_general_staff_desc: "В нашем Генеральном штабе есть очень видные и опытные члены, однако им не хватает надлежащего финансирования и крупномасштабной организации, которую могут позволить себе некоторые более крупные страны. На данный момент мы должны рассмотреть возможность расширения штата в соответствии с современными стандартами. Эта инициатива также должна привлечь молодых выпускников военных училищ."

 MON_ratify_battleplans: "Утвердить оборонительные планы"
 MON_ratify_battleplans_desc: "Чтобы гарантировать, что государство готово к продолжающейся борьбе военных кампаний, мы должны сформировать специальный отдел, единственной целью которого будет разработка, организация и выполнение планов. С приближением войны к землям наших соседей мы можем отправлять передовых наблюдателей, чтобы попытаться предсказать возможные манёвры противника."

 MON_old_heritage: "Старое наследие"
 MON_old_heritage_desc: "Кавалерия была, есть и останется ключевым элементом наших вооружённых сил. Независимо от того, насколько продвинутыми станут военные доктрины и насколько дальновидными будут стратеги, мы должны сохранить корни нашего наследия и оставаться мастерами конного дела."

 MON_soldier_devotion: "Преданность солдата"
 MON_soldier_devotion_desc: "Мир меняется. Сухопутные армии теперь в основном состоят из пехотных формирований, которые менее мобильны, чем кавалерия, но гораздо более надёжны и устойчивы с точки зрения организации. Поддержка этой концепции даст нам преимущество на поле боя."

 MON_legacy_of_tachanka: "Наследие тачанки"
 MON_legacy_of_tachanka_desc: "Человеческая изобретательность во время Гражданской войны в России не знала границ в разработке новых методов ведения войны: конная повозка с пулемётом, способная преодолевать большие расстояния с огромной огневой мощью и относительным комфортом, является основой, на которой должны базироваться наши армии!"

 MON_support_old_officers_corps: "Поддержать старый офицерский корпус"
 MON_support_old_officers_corps_desc: "Многие из наших офицеров — опытные командиры, которые сражались за независимость нации и остаются популярными фигурами среди населения. Поддержка их и обеспечение их прочного положения в нашей армии дадут нам искусных генералов и верных солдат. Некоторые из них всё ещё стары и консервативны, но имеет ли это значение?"

 MON_favour_young_officers: "Поддержать молодых офицеров"
 MON_favour_young_officers_desc: "Мир меняется, а вместе с ним меняются военная тактика и стратегия. Новое поколение командиров сейчас возвращается на Родину из зарубежных военных академий. Возможно, они принесут с собой что-то новое?"

 MON_revive_forgotten_doctrines: "Возродить забытые доктрины"
 MON_revive_forgotten_doctrines_desc: "В начале XX века наша страна храбро сражалась за свою независимость против империалистических держав в том, что иначе нельзя назвать, как партизанская война. Ополчение и небольшие пехотные отряды охраняли дома и сердца нашего народа. И их наследие должно быть продолжено путём адаптации невиданно эффективного типа ведения войны."

 MON_bolster_national_awareness: "Укрепить национальное самосознание"
 MON_bolster_national_awareness_desc: "Какую бы войну мы ни вели, мы делаем это ради славы и процветания нашей нации. И каждый гражданин должен быть готов принести небольшую жертву ради этого, тем самым усиливая наши военные усилия!"

 MON_expand_universal_military_act: "Расширить закон о всеобщей воинской повинности"
 MON_expand_universal_military_act_desc: "Закон о всеобщей воинской повинности призван установить строгие ограничения по возрасту и полу для новобранцев. Ослабление некоторых установленных стандартов и требований в наших бюрократических документах позволит нам призывать более широкие слои населения без серьёзного ущерба для государственного управления."

 MON_improve_militia_formations: "Улучшить ополченческие формирования"
 MON_improve_militia_formations_desc: "Местное ополчение может сражаться более эффективно, если его поставить под командование местных командиров, которые лучше знают возможности подчинённых им мужчин и женщин."

 MON_ideological_loyalty_of_the_masses: "Идеологическая лояльность масс"
 MON_ideological_loyalty_of_the_masses_desc: "Люди должны знать, за что они сражаются и что поставлено на карту. Немного пропаганды из каждого уголка страны никому не повредит."

 MON_good_old_new_ways: "Хорошие старые новые пути"
 MON_good_old_new_ways_desc: "Централизация командования, управления и стратегии нашей армии вокруг широкого использования ополчения дала нам ценный опыт, который можно использовать и применить в регулярных армейских формированиях."

 MON_rely_on_soviet_tactics: "Полагаться на [SOV.getAdjective] тактику"
 MON_rely_on_soviet_tactics_desc: "[SOV.getAdjective] советники выступали за принятие военной доктрины «глубокой операции», направленной на подавление и дезорганизацию противника на нескольких участках поля боя с последующим использованием тактического успеха для окружения и уничтожения вражеских формирований. Очень эффективно при применении большого количества войск."

 MON_weapon_prototype_development: "Разработка прототипов оружия"
 MON_weapon_prototype_development_desc: "Постоянные пограничные стычки с различными силами, проникающими через нашу оборону, преподали нам несколько уроков, которые стоит изучить, и один из них — крайняя неэффективность однозарядного огнестрельного оружия, которое наши войска имеют в массовом количестве. Мы должны обратиться к нашим благодетелям за получением современных схем оружия."

 MON_mass_firearm_production: "Массовое производство огнестрельного оружия"
 MON_mass_firearm_production_desc: "Наличие крупной ударной силы без какого-либо огнестрельного оружия сделает любые оборонительные или наступательные усилия бесполезными, независимо от морального состояния или идеологической обработки. Мы — государство, и мы должны обеспечить. Возможно, не для народа, но, по крайней мере, для солдат."

 MON_focus_on_infantry: "Сосредоточиться на пехоте"
 MON_focus_on_infantry_desc: "Пехота была и будет ключевым элементом любой сухопутной армии, независимо от доктрины, политического режима или идеологической повестки. Мы должны укрепить эту основу любыми возможными средствами."

 MON_the_inevitable_counterblow: "Неизбежный контрудар"
 MON_the_inevitable_counterblow_desc: "Каким бы хорошим ни было наступление, за ним всегда последует контратака вражеских сил, если только они не будут полностью уничтожены в первой волне атаки. Этот конкретный урок стоил нам дорого, но он жизненно важен для запоминания каждым солдатом!"

 MON_suitable_high_command: "Подходящее Верховное командование"
 MON_suitable_high_command_desc: "Солдат — это сосуд для выполнения приказов Верховного командования. Если последнее неопытно или неспособно командовать данным подразделением, его следует либо отстранить от должности, либо дать ему надлежащую подготовку и шанс на исправление. Выбор всегда за нами..."

 MON_the_grand_stratagem: "Великая стратегия"
 MON_the_grand_stratagem_desc: "«Победа любит подготовку», — сказал однажды мудрец. Для решительной и окончательной победы нам, следовательно, нужна надлежащая стратегия, способная переиграть лучших планировщиков и стратегов в известном мире!"

 MON_favour_stronghold_defenses: "Предпочесть крепостную оборону"
 MON_favour_stronghold_defenses_desc: "Каждый батальон любой дивизии должен быть превращён в стоячую крепость, способную выдерживать агрессию в течение длительного периода времени, пока из штаба не поступит приказ о контратаке. Тогда крепость начнёт своё движение по полю боя..."

 MON_advanced_fortification_studies: "Продвинутые фортификационные исследования"
 MON_advanced_fortification_studies_desc: "Наши инженеры могут пройти дополнительный уровень подготовки, на котором их научат ремонтировать старые и строить новые укрепления в более быстром темпе. Эти знания окажутся полезными для подготовки опорных пунктов для наших войск."

 MON_support_tactical_decision_freedom: "Поддержать свободу тактических решений"
 MON_support_tactical_decision_freedom_desc: "Стратегическое позиционирование противника и быстрые контратаки по нашим слабым местам подразумевают, что некоторые приказы штаба, вероятно, будут перехвачены врагом. Предоставление ограниченной свободы местным командирам отдельных батальонов должно улучшить общую долгосрочную эффективность наших войск."

 MON_optimize_infantry_formations: "Оптимизировать пехотные формирования"
 MON_optimize_infantry_formations_desc: "Максимальный потенциал наших сухопутных сил может быть использован, если местные командиры получат надлежащие руководящие принципы по формированию и использованию войск, переданные им Генеральным штабом. Такие руководства позволят ядру нашей армии функционировать более эффективно."

 MON_unified_operational_command: "Единое оперативное командование"
 MON_unified_operational_command_desc: "Недавние донесения указывают, что верховное командование отдало ряд дезорганизующих и противоречивых приказов различным частям вооружённых сил, снижая возможную эффективность наших солдат. Унификация и консолидация сведут на нет фактор ошибок в этом направлении."

 MON_adopt_tsogs_methods: "Перенять методы Цога"
 MON_adopt_tsogs_methods_desc: "Буточийн Цог, недавний выпускник Сумского артиллерийского училища, привнёс глоток свежего воздуха в старые добрые тактики, применяемые нашим генштабом, позволив нам сосредоточиться на использовании всего потенциала артиллерийских частей."

 MON_investigate_improvement_opportunities: "Возможности для совершенствования артиллерии"
 MON_investigate_improvement_opportunities_desc: "Многие образцы нашего вооружения всё ещё относятся ко времени Синьхайской революции и провозглашения независимости в 1911 году. Некоторые новые проекты наших благодетелей могут быть доступны и потенциально применимы на наших предприятиях."

 MON_feature_compact_mortar_designs: "Внедрить компактные миномёты"
 MON_feature_compact_mortar_designs_desc: "Миномёты являются ключевым элементом нашей огневой мощи на поле боя, и они должны быть доступны каждому, кто в них нуждается. Такое предприятие потребует модификации заводского оборудования, которую невозможно будет обратить вспять..."

 MON_strengthen_air_land_links: "Укрепить связь «авиация — сухопутные войска»"
 MON_strengthen_air_land_links_desc: "Наши артиллеристы нуждаются в координатах целей, которые могут быть получены воздушной или наземной разведкой. Первые быстрее и маневреннее, но вторые могут предоставить лучшие разведданные, не раскрывая себя. Мы должны усилить взаимодействие между ними!"

 MON_combined_arms_operations: "Общевойсковые операции"
 MON_combined_arms_operations_desc: "Только комбинированным ударом с воздуха, моря и суши можно нанести максимальный урон врагу. И пока наши орлы парят над их головами, наши тигры будут разить их с близкого расстояния, вселяя страх в их умы и души!"

 MON_the_ultimate_weapon: "Абсолютное оружие"
 MON_the_ultimate_weapon_desc: "Оружие огромной разрушительной силы, безусловно, впечатляет, но хорошо сделанное артиллерийское орудие в руках великолепно обученного солдата может выполнить работу гораздо быстрее и выгоднее для нас. Давайте укрепим эту основу, прославляя данный вид вооружения!"

 MON_experimental_mobility: "Экспериментальная мобильность"
 MON_experimental_mobility_desc: "Совершенно новая доктрина появилась в военных учебных центрах на Западе, предусматривающая использование высокомобильных транспортных средств для быстрых перемещений войск и ожесточённых боёв на вражеской территории. Трудно реализовать в крупных масштабах, но какой потенциал для ограниченной ударной силы!"

 MON_study_motorized_equipment: "Изучить моторизованную технику"
 MON_study_motorized_equipment_desc: "В сотрудничестве с СССР было основано акционерное общество «Монголтранс», призванное обеспечить транспортные нужды населения и грузоперевозки, расширить дорожную сеть и предоставить транспортные средства для военных нужд. Используя последнее во благо, мы можем издать указ и изъять часть транспортных средств в нашу пользу."

 MON_specialization_on_vehicle_production: "Специализация на производстве транспортных средств"
 MON_specialization_on_vehicle_production_desc: "Мы можем дальнейше диверсифицировать нашу промышленность и применить надлежащие методы для модернизации и улучшения производственных мощностей для выпуска военной и гражданской автомобильной техники."

 MON_acquire_foreign_tank_designs: "Приобрести зарубежные механизированные проекты"
 MON_acquire_foreign_tank_designs_desc: "Зарубежное сотрудничество уже принесло плодотворные результаты и обеспечило нас современным оружием, артиллерийскими орудиями, промышленными инструментами и электронными устройствами. Эту основу можно укрепить и, возможно, даже применить для создания новых механизированных проектов [ROOT.getAdjective] происхождения."

 MON_utilize_new_designs_strength: "Использовать силу новых проектов"
 MON_utilize_new_designs_strength_desc: "При такой ограниченной промышленности, как наша, мы не можем полностью наладить массовое производство различных типов бронетехники. Однако мы можем специализировать наши предприятия на выпуске машин специального назначения, что будет компенсировано недостатками в других областях."

 MON_train_specialized_crews: "Обучить специализированные экипажи"
 MON_train_specialized_crews_desc: "Надлежащий танковый экипаж нельзя набрать из случайных солдат, которые угробят драгоценную машину и свои ещё более драгоценные жизни вместе с ней. Для этого нам нужны нужные люди на нужных местах, обладающие подлинными знаниями о том, что они делают."


#navy
 MON_establish_the_trade_fleet: "Создать торговый флот"
 MON_establish_the_trade_fleet_desc: "Будучи веками замкнутой страной, мы забыли многие принципы международной морской торговли и то, как она организована. При скромных вложениях, возможно, удастся приобрести несколько устаревших гражданских судов для торговли и снабжения. Для начала этого хватит."

 MON_lease_foreign_dockyards: "Арендовать зарубежные верфи"
 MON_lease_foreign_dockyards_desc: "Ограниченные возможности нашей промышленности нельзя далее распылять на строительство надлежащих судостроительных мощностей. Однако мы можем и должны сотрудничать с иностранцами и использовать их предприятия в своих интересах."

 MON_joint_naval_academy: "Совместная военно-морская академия"
 MON_joint_naval_academy_desc: "Следующим логическим шагом в совместном военно-морском партнёрстве станет создание военно-морской академии, где наши морские «юнги» будут учиться у иностранных морских волков их опыту."

 MON_naval_integration: "Военно-морская интеграция"
 MON_naval_integration_desc: "Нам удалось подчинить другую морскую державу, превратив её в послушное марионеточное государство, которое следует приказам из Улан-Батора. Это подразумевает, что их флот может быть использован нашими вооружёнными силами, если мы того пожелаем. Такое сотрудничество имеет цену — предоставление им большей автономии в других областях."

 MON_ensure_branches_independence: "Обеспечить независимость рода войск"
 MON_ensure_branches_independence_desc: "Мы не можем полагаться на иностранцев в вопросах создания военно-морской промышленности, ибо многие из них стремятся лишь эксплуатировать неопытных [ROOT.getAdjective] моряков и капитанов! Отныне независимый род войск с государственными инвестициями — наш путь!"

 MON_local_specialists: "Местные специалисты"
 MON_local_specialists_desc: "Нам есть чему поучиться у зарубежного опыта, и некоторые молодые адмиралы готовы поделиться своими знаниями с нашими моряками, предоставив нам ценный опыт, который мы сможем использовать в будущем."

 MON_fund_mongolian_naval_forces: "Финансировать [ROOT.getAdjective] военно-морские силы"
 MON_fund_mongolian_naval_forces_desc: "Одной из главных проблем стран, не имеющих выхода к морю, является полное отсутствие мореходного опыта и нехватка инвестиций. Часть государственных средств должна быть выделена на улучшение этой удручающей ситуации."

 MON_maritime_infantry: "Морская пехота [MON.getAdjective]"
 MON_maritime_infantry_desc: "Несколько преданных мужчин и женщин могут изменить ход дела при форсировании рек или морских десантах, если нас это заинтересует. Мы можем попытаться создать секретный учебный лагерь на озере Убсу-Нур, где такие люди будут проходить подготовку."

 MON_improve_naval_doctrines: "Улучшить военно-морские доктрины"
 MON_improve_naval_doctrines_desc: "Тактика морской войны постоянно модернизируется и совершенствуется иностранными державами, и мы никогда не должны оставлять без внимания новейшие приёмы, ибо они могут иметь жизненно важное значение в бою на море!"

 MON_amphibious_effort: "Десантные усилия"
 MON_amphibious_effort_desc: "Наследие неудавшихся вторжений 1274 и 1281 годов до сих пор тяготеет над сердцами многих граждан, которые никогда не забывали несправедливость судьбы по отношению к [ROOT.getAdjective] народу. Современные методы не зависят от погоды, поэтому мы должны инвестировать в них."

 MON_prioritize_small_vessels: "Отдать приоритет малым кораблям"
 MON_prioritize_small_vessels_desc: "Хотя идеи постройки большого флота могут быть привлекательны для националистов и патриотов, у нас нет надлежащих возможностей и промышленности для этого. Нам лучше сначала сосредоточиться на малых кораблях, прежде чем переходить к разработке проектов больших кораблей."

 MON_support_the_mechants: "Поддержать купцов"
 MON_support_the_mechants_desc: "Наши торговцы нуждаются в надлежащей защите от этих докучливых подводных лодок, которые злобно охотятся на наши плохо защищённые суда. Некоторые проекты уже были представлены на верфях, но мы можем дополнительно улучшить их в своих интересах."

 MON_modernize_escort_tactics: "Модернизировать тактику эскорта"
 MON_modernize_escort_tactics_desc: "Завершая разработку доктрины обороны конвоев, мы можем ещё больше повысить безопасность наших морских маршрутов, позволив товарам и ресурсам перемещаться беспрепятственно."

 MON_sea_raiders: "Морские рейдеры"
 MON_sea_raiders_desc: "Мы не нуждаемся в ресурсах, но наши враги — да. Их суда бороздят моря, даже не задумываясь о возможных последствиях. Наши морские рейдеры преподадут им несколько уроков о самоуверенности."

 MON_emphasise_naval_blockades: "Усилить морские блокады"
 MON_emphasise_naval_blockades_desc: "Враг всё ещё думает, что эсминцы и лёгкие крейсеры могут спасти поставки, идущие по морю. Их глубинные бомбы эффективны, но несколько новых проектов торпед переломят ход битвы."

 MON_large_ships_effort: "Усилия по созданию больших кораблей"
 MON_large_ships_effort_desc: "В XIII веке наш военно-морской флот был одним из крупнейших в мире, с большими кораблями, бороздившими Жёлтое море и сеявшими хаос среди всех. Время вспомнить былую славу и вложиться в большие флотилии, способные впечатлить морские державы!"

#air
 MON_establish_provisional_airforce: "Создать временные ВВС"
 MON_establish_provisional_airforce_desc: "В стране не хватает надлежащего военного персонала, способного выполнять задачи в небе. Необходимо заложить фундамент официальных военно-воздушных сил Монголии, учитывая растущую роль авиации в транспортировке и разведке."

 MON_situational_aerial_presence: "Ситуационное воздушное присутствие"
 MON_situational_aerial_presence_desc: "Невозможно поддерживать крупный воздушный флот, способный вести бои над огромными воздушными пространствами страны. Предпочтительной тактикой является создание различных небольших авиабаз по всей стране, где ограниченное количество эскадрилий может эффективно выполнять свою задачу по обеспечению безопасности неба над Монголией."

 MON_focus_on_local_engagements: "Сосредоточиться на локальных столкновениях"
 MON_focus_on_local_engagements_desc: "Созданные авиабазы имеют ограниченные возможности, при этом длина взлётно-посадочной полосы хорошо подходит для лёгких самолётов. Наши усилия по разработке новых самолётов поэтому должны быть ограничены более лёгкими моделями и модификациями."

 MON_institute_air_landing_batallions: "Учредить воздушно-десантные батальоны"
 MON_institute_air_landing_batallions_desc: "Недавно созданные силы специального назначения могут получить значительную выгоду, если будет сформирован элитный парашютно-десантный полк, способный совершать воздушные вторжения в экстремальных и враждебных условиях."

 MON_foreign_air_equipment_coordination: "Координация иностранного авиационного оборудования"
 MON_foreign_air_equipment_coordination_desc: "Национальные исследовательские группы могут многое почерпнуть у своих зарубежных коллег, особенно в авиационной отрасли, где нам сильно не хватает практического опыта. Расширение некоторых договоров о сотрудничестве предоставит нам множество новых усовершенствований конструкции самолётов."

 MON_improve_air_doctrine: "Улучшить авиационную доктрину"
 MON_improve_air_doctrine_desc: "Улучшенные самолёты с опытными пилотами могут выиграть много сражений, но в долгосрочной перспективе определяющим фактором также являются современные доктрины воздушного боя. Уточнение и закрепление этих стратагем даст нашим асам преимущество в небе."

 MON_air_recon_and_intelligence_protection: "Воздушная разведка и защита разведывательных данных"
 MON_air_recon_and_intelligence_protection_desc: "Современная война — это война обмана, поскольку сбор, обработка и использование разведывательной информации играют в ней ключевую роль. Поскольку воздушная разведка приобретает всё большее значение для быстрой разведки и сбора информации, мы должны получить преимущество любыми возможными средствами!"

 MON_strengthen_air_navy_cooperation: "Укрепить взаимодействие авиации и флота"
 MON_strengthen_air_navy_cooperation_desc: "У нас есть много возможностей для координации наших недавно созданных военно-воздушных сил и созданного каркаса военно-морского флота путём разработки моделей самолётов, способных эффективно поражать вражеские военно-морские силы."

 MON_capital_operations_focus: "Фокус на стратегических операциях"
 MON_capital_operations_focus_desc: "Малые и мобильные авиаэскадрильи могут быть слишком рассредоточены, чтобы эффективно бороться с превосходящими силами вражеской авиации, поэтому мы должны создать единый воздушный кулак, способный наносить массированные удары по желаемому воздушному региону."

 MON_wastness_devours: "Пространство пожирает"
 MON_wastness_devours_desc: "Обширные территории нашей страны невозможно эффективно охранять с воздуха с помощью лёгких истребителей, чья дальность слишком мала для зон контроля воздушного пространства собственно Монголии. Производители предполагают, что улучшение самолётов большой дальности эффективно решит эту проблему, позволив нашим самолётам летать в небе без помех."


#industrial#
 MON_transfer_the_funds_of_mongolbank: "Перевести средства Монголбанка"
 MON_transfer_the_funds_of_mongolbank_desc: "Основанный в 1924 году как акционерное общество между [SOV.getAdjective] и [MON.getAdjective] инвесторами, Монголбанк оставался совместным предприятием 50 на 50, направленным на развитие национальной экономики, надзор за банковским сектором и транзакциями, а также контроль над золотым запасом страны. Мы добьёмся контроля над его средствами для дальнейшего развития собственно Монголии."

 MON_build_the_railroads: "Построить железные дороги"
 MON_build_the_railroads_desc: "Развитие железнодорожного транспорта открыло путь к новым возможностям для перевозки большого количества товаров быстрым и эффективным образом. Часть вновь полученных государственных средств может быть выделена на создание железнодорожной сети, соединяющей нашу столицу с отдалёнными районами страны."

 MON_expand_elementary_schools: "Расширить сеть начальных школ"
 MON_expand_elementary_schools_desc: "Высокий уровень неграмотности нашего народа является следствием естественной нехватки государственных начальных школ, где обычные мужчины и женщины учатся читать, писать и считать — навыкам, которых, к сожалению, лишены многие наши граждане."

 MON_strengthen_tugrik: "Укрепить тугрик"
 MON_strengthen_tugrik_desc: "Золотой запас страны по-прежнему привязан к различным валютам, используемым в денежных операциях, таким как российский рубль, монгольский серебряный доллар, китайский юань, японская иена и американский доллар. Поскольку тугрик привязан к рублю в соотношении один к одному, мы введём ограничения на валютные операции с другими банкнотами, чтобы усилить роль национальных денежных знаков."

 MON_encourage_foreign_trade: "Поощрять внешнюю торговлю"
 MON_encourage_foreign_trade_desc: "Причины низкого экономического роста страны можно проследить до 1924 года, когда государство национализировало активы инвесторов и ввело ограничения на внешнюю торговлю, фактически затруднив развитие иностранного бизнеса в нашей стране ради национальной безопасности. Мы откроем наши рынки, чтобы побудить некоторых инвесторов вернуться в Монголию."

 MON_improve_machine_tools: "Улучшить станочный парк"
 MON_improve_machine_tools_desc: "Национальные предприятия не выполняют установленные для них квоты в основном из-за низкой эффективности производства, reliance на ручной труд вместо машинного оборудования и нехватки рабочей силы. Хотя последнюю проблему нельзя исправить немедленно, первые два фактора можно скорректировать путём закупки необходимого оборудования за рубежом."

 MON_study_foreign_radio_equipment: "Изучить иностранное радиооборудование"
 MON_study_foreign_radio_equipment_desc: "На данный момент нет предприятий, способных производить современное радио- и электронное оборудование. Разумно будет поучиться у наших соседей и посмотреть, как можно улучшить ситуацию в этом вопросе."

 MON_pastures_into_farms: "Пастбища в фермерские хозяйства"
 MON_pastures_into_farms_desc: "Зависимость от сельского хозяйства до сих пор хорошо нам служила; нет большой необходимости в развитии каких-либо сложных новых промышленных технологий, которые только навредят естественным процессам развития нашей страны. Однако мы можем модернизировать некоторые земли в надлежащие фермерские хозяйства, способные производить большее количество товаров для нужд народа."

 MON_end_reliance_on_animal_husbandry: "Покончить с зависимостью от животноводства"
 MON_end_reliance_on_animal_husbandry_desc: "Устаревшая и в значительной степени устаревшая, вся экономическая система страны сильно зависела от обширных сельскохозяйственных угодий, которые недоиспользовались и эксплуатировались теми, кому удалось их захватить. Хотя такое решение может быть крайне непопулярным, мы добьёмся создания надлежащей промышленной базы для нашей страны."

 MON_support_arats: "Поддержать аратов"
 MON_support_arats_desc: "Эта многообещающая социальная этническая группа скотоводов присутствует в каждой части нашей страны, снабжая наш народ различными продуктами сельскохозяйственного происхождения. Они представляют собой основной элемент нашего индустриального общества и должны получить несколько привилегий, демонстрирующих их важность для государственных чиновников."

 MON_expand_woolwashing_facilities: "Расширить шерстомойные предприятия"
 MON_expand_woolwashing_facilities_desc: "Поскольку шерсть является основным ресурсом, который араты поставляют на местный рынок, крайне важно, чтобы предприятия, способные её перерабатывать, финансировались должным образом и расширялись для поддержки растущей промышленности."

 MON_build_energokombinat: "Построить энергокомбинат"
 MON_build_energokombinat_desc: "С приходом электричества во многие города и посёлки [ROOT.getAdjective] всё чаще встаёт вопрос о его бесперебойной и стабильной подаче населению. Нельзя допустить, чтобы столь важная сфера производства оставалась в руках иностранцев — она должна строиться и обслуживаться местным населением."

 MON_build_mechanical_factory: "Построить механический завод"
 MON_build_mechanical_factory_desc: "Многие новейшие сельскохозяйственные орудия и машины требуют сменных деталей, которые обычно дороги и труднодоступны для местных предприятий. Недавняя инициатива позволила собрать средства среди активных граждан на строительство такого завода вблизи Улан-Батора."

 MON_industrial_expansion: "Промышленная экспансия"
 MON_industrial_expansion_desc: "Вслед за успешным развитием нашей промышленности мы можем призвать народ присоединиться к рабочим инициативам, направленным на повышение качества выпускаемых товаров и эффективности труда на местах."

 MON_new_veterinary_facilities: "Новые ветеринарные учреждения"
 MON_new_veterinary_facilities_desc: "Болезни и эпидемии могут поразить уязвимое поголовье скота неподготовленных фермеров. Риск заражения и потенциальный ущерб можно минимизировать, создав по всей стране ветеринарные пункты и регулярно проводя государственные инспекции."

 MON_ulan_bator_promcombinat: "Улан-Баторский промкомбинат"
 MON_ulan_bator_promcombinat_desc: "Создание промышленного центра в Улан-Баторе — важнейший шаг в экономическом развитии страны, так как он станет крупнейшим предприятием по производству товаров народного потребления, способным обеспечить рабочими местами тысячи безработных граждан."

 MON_improve_mining_facilities: "Улучшить горнодобывающие предприятия"
 MON_improve_mining_facilities_desc: "Угольные шахты Адунчулун и Хушут считаются одними из крупнейших на территории страны, поставляя железо и уголь нашим станкам и прессам, служа государству и его народу. Часть государственных средств может быть направлена в этот сектор для повышения промышленной отдачи этих перспективных районов."

 MON_armament_expansion: "Развитие вооружений"
 MON_armament_expansion_desc: "Промышленное развитие нашей страны до сих пор было в основном сосредоточено на гражданских товарах и их потребностях, в то время как армия оставалась в стороне, что неприемлемо — ведь эти мужчины и женщины служат интересам и защищают стабильность нашей державы. Для общего блага необходимо создать несколько предприятий по производству вооружений для их нужд."

 MON_southern_development_focus: "Освоение юга"
 MON_southern_development_focus_desc: "Пустыня Гоби известна своим суровым и переменчивым климатом. Люди, живущие в этих районах, нуждаются в надлежащем доступе к воде, газу и электричеству. Новая государственная программа должна обеспечить всем необходимым тех, кто в этом нуждается."

 MON_southwest_resource_prospection_area: "Район разведки ресурсов на юго-западе"
 MON_southwest_resource_prospection_area_desc: "Юго-западные территории перешли под наш контроль, и, поскольку они, по-видимому, богаты природными ресурсами, можно разработать несколько планов по разведке полезных ископаемых и материалов."

 MON_encourage_southern_agriculture: "Поощрять сельское хозяйство на юге"
 MON_encourage_southern_agriculture_desc: "Бывшие территории клики Ма считались захолустными провинциями, не имеющими никакого потенциала для имперских, а затем и республиканских инвесторов. Имея опыт борьбы с наступлением пустыни на наши пастбища, возможно создать несколько зелёных насаждений и заложить основы для новых сельскохозяйственных угодий."

 MON_expand_chahars_processing_region: "Расширить перерабатывающий район Чахар"
 MON_expand_chahars_processing_region_desc: "Территории Внутренней Монголии можно широко использовать для выпаса скота, включая переработку шерсти и мяса. На местах следует создать шерстомойки и бойни, чтобы обеспечить рабочие места для многих жителей региона."

 MON_ordos_plateau_exploitation: "Освоение плато Ордос"
 MON_ordos_plateau_exploitation_desc: "Эта территория получит интенсивные государственные дотации, позволяющие местным производителям расширить свои предприятия в рамках очередного этапа экономического развития перспективного региона."

 MON_utilize_available_spaces: "Использовать доступные пространства"
 MON_utilize_available_spaces_desc: "Новые программы индустриализации открыли пространства для множества новых предприятий, которые могут быть созданы для увеличения экономической мощи нашего процветающего государства!"

 MON_new_research_centres: "Создать новые исследовательские центры"
 MON_new_research_centres_desc: "Наши растущие и развивающиеся промышленные возможности предоставили уникальный шанс создать научную сеть, объединяющую различные исследовательские и опытно-конструкторские учреждения, включая производителей инструментов и материалов, разработчиков электроники, молодых учёных и специалистов военной промышленности, работающих на благо народа [ROOT.getAdjective]!"

 MON_modernize_transportation_system: "Модернизировать транспортную систему"
 MON_modernize_transportation_system_desc: "Для многих людей с кочевым образом жизни дороги не имели особого значения, поэтому прежние правительства и режимы никогда не уделяли внимания созданию централизованной транспортной сети между аймаками, хутонами и различными городами. По мере роста государства эта задача висит над правителем, как дамоклов меч..."

 MON_assist_subsidized_region: "Помочь дотируемым регионам"
 MON_assist_subsidized_region_desc: "Тувинская автономная область является сильно дотируемым регионом из-за низкой степени индустриализации, отсутствия территорий для массового пастбищного животноводства и недостаточного государственного финансирования. Даже самые малые инвестиции в регион создадут несколько возможностей для промышленного строительства."

 MON_develop_mongolia_proper: "Развивать собственно Монголию"
 MON_develop_mongolia_proper_desc: "Ни один регион не должен быть забыт в этих операциях, и собственно Монголия, сердце нашего государства, также должна извлечь выгоду из этих программ. Создание промышленности в различных скотоводческих районах усилит местную поддержку нашего дела."

 MON_improve_baigaal_dalai_industries: "Улучшить промышленность Байгал-Далая"
 MON_improve_baigaal_dalai_industries_desc: "Бурятия хорошо известна своей развитой промышленностью Иркутска, Читы и Улан-Удэ, широкой транспортной сетью и многочисленными лесозаготовительными предприятиями, которые всё ещё можно улучшить с помощью нескольких целевых государственных дотаций."

 MON_develop_the_rear: "Развивать тыл"
 MON_develop_the_rear_desc: "Многие восточные провинции испытывают нехватку финансирования, хотя обладают высоким потенциалом экономического развития. Расширение нашего присутствия и влияния там позволит более эффективно использовать эти ресурсы."

 MON_military_industries_expansion: "Расширение военной промышленности"
 MON_military_industries_expansion_desc: "Государственные инвестиции могут быть направлены в военный сектор, где мы можем гарантировать, что регионы прежнего интереса получат дотации на создание военных объектов, что значительно укрепит наши вооружённые силы."



############################POLITICAL FOCUSES #################################################
 MON_hold_plenum_of_central_committee: "Провести пленум ЦК"
 MON_hold_plenum_of_central_committee_desc: "Результаты конференции ясно показывают, что товарищ [SOV.getLeader] готов защищать [MON.getAdjective] государство в годину опасности и борьбы за дело революции. Однако глава нашей делегации имел некоторые личные амбиции, и поэтому его необходимо заменить кем-то, кто придерживается более «надёжных» взглядов на будущее."

 MON_deal_with_genden: "Разобраться с Генденом"
 MON_deal_with_genden_desc: "Генден всё ещё пользуется значительной поддержкой, особенно среди бедных и сельских жителей. Его неповиновение [SOV.getAdjective] не может остаться безнаказанным. Однако остаётся вопрос: как следует наказать его провокационное поведение?"

 MON_invite_frinovsky: "Пригласить Фриновского"
 MON_invite_frinovsky_desc: "Михаил Фриновский — известный офицер НКВД [SOV.getAdjective], чьи методы «троек» оказались чрезвычайно эффективными в разоблачении врагов революции внутри СССР и за рубежом. Его помощь в нашей Революции будет иметь огромное значение для успеха нынешнего режима."

 MON_secure_the_transition_of_power: "Обеспечить переход власти"
 MON_secure_the_transition_of_power_desc: "Новое правительство нуждается в видных членах партии, проявивших истинную преданность партии и [MON.getNameDef]! Эти герои Революции должны быть показаны как яркие примеры в новой государственной пропагандистской кампании!"

 MON_prepare_leftist_takeover: "Подготовить левый захват власти"
 MON_prepare_leftist_takeover_desc: "Генден и Демид уже ушли, как и их левые соратники, правившие страной в 1933 году, или члены правой оппозиции, изгнанные ещё в 1928 году. Очередная чистка не за горами, и мы должны сделать всё, чтобы не допустить прихода к власти очередного диктатора!"

 MON_learn_from_lkhumbe_affair: "Учесть уроки дела Лхумбэ"
 MON_learn_from_lkhumbe_affair_desc: "Провал восстания 1934 года, известного как дело Лхумбэ, был в основном обусловлен ограниченным доступом повстанцев к оружию и боеприпасам, в то время как правительственные силы располагали значительным количеством винтовок, миномётов, бронетехники и даже несколькими самолётами. Создание подпольных мастерских значительно поможет оппозиции в случае вооружённого мятежа."

 MON_partial_religious_compromise: "Частичный компромисс с религией"
 MON_partial_religious_compromise_desc: "Буддийская церковь имеет много сторонников по всей стране, и хотя прежний режим пока игнорировал их, мы должны предложить компромисс, чтобы повысить общественную поддержку смены власти. На данный момент монастыри могут стать ценным союзником."

 MON_arm_civil_militia: "Вооружить гражданскую милицию"
 MON_arm_civil_militia_desc: "Обширные территории нашей страны требуют формирования независимых полков, способных удерживать позиции до прибытия регулярных войск и помогать им в отражении захватчика. Выдавая оружие населению, мы можем заручиться поддержкой взрослых мужчин, готовых умереть за наше дело."

 MON_invite_political_exiles: "Пригласить политических изгнанников"
 MON_invite_political_exiles_desc: "1933 год ознаменовался резкой сменой государственной политики, после которой многие левые члены партии были высланы, а ещё больше подверглись репрессиям. Нам удалось связаться с оставшимися левыми и предложить им места в нашем правительстве. Их возвращение гарантирует, что новое правительство сможет эффективно управлять страной после успешного захвата власти."

 MON_ensure_control_over_the_railways: "Обеспечить контроль над железными дорогами"
 MON_ensure_control_over_the_railways_desc: "Замаскировав наших сторонников под членов рабочих бригад и помогая строительству железнодорожной сети по всей стране, мы сможем обеспечить контроль над стратегическими логистическими узлами для будущей войны, что позволит захватывать иностранное снаряжение на благо революции."

 MON_contact_the_bandits: "Связаться с бандитами"
 MON_contact_the_bandits_desc: "Малонаселённые южные регионы таят в себе угрозу пустыни в лице нерегулярных банд, которые трудно обнаружить и противостоять им силами крупных дивизионных соединений. Обратившись к их лидерам, мы можем извлечь ценные уроки и получить их ограниченную поддержку в виде людских ресурсов и опыта ценой недовольства населения."

 MON_confiscate_soviet_weaponry: "Конфисковать [SOV.getAdjective] оружие"
 MON_confiscate_soviet_weaponry_desc: "С железными дорогами под нашим контролем мы можем организовать дополнительные таможенные посты и конфисковывать незарегистрированное оборудование, которое через них проходит. Ради свободной и честной торговли, разумеется!"

 MON_seize_the_power: "Захватить власть"
 MON_seize_the_power_desc: "С набранными и вооружёнными войсками, подготовленными логистическими центрами и верными членами в правительстве мы объявим, что новая Монголия восстала из пепла Коррумпированных Революционеров, и с этого момента начинается новая эра!"

 MON_begin_the_collectivization: "Начать коллективизацию"
 MON_begin_the_collectivization_desc: "С упрочением нового правительства лучше всего вернуться к продолжению реформ 1928–1933 годов, в ходе которых были увеличены экспорт и импорт, а государственный капитал значительно расширен. Теперь должна начаться коллективизация невиданных масштабов."

 MON_seize_our_advantages: "Захватить наши преимущества"
 MON_seize_our_advantages_desc: "Генден пытался умиротворить владельцев капитала своей политикой «Обогащайтесь!», направленной на обогащение богатых и разорение бедных. Но мы больше не должны различать их, ибо мы созданы равными. Мы обязаны изъять эти блага и перераспределить их среди рабочих и крестьян."

 MON_reassure_the_soviets: "Успокоить [SOV.getAdjective]"
 MON_reassure_the_soviets_desc: "Внутренняя повестка нашей республики будет гораздо эффективнее, если мы будем получать директивы непосредственно из Москвы, позволяя нашим политикам, дипломатам и шпионам сосредоточиться на внешней политике. Вполне естественно обратиться к чиновникам в [SOV.getNameDef] с просьбой принять нас обратно в Коминтерн как равноправную республику под властью [SOV.getAdjective]. Такое действие, безусловно, ограничит наши прямые политические действия на некоторое время, но будет выгодно в долгосрочной перспективе."

 MON_end_political_opportunism: "Покончить с политическим оппортунизмом"
 MON_end_political_opportunism_desc: "Слишком долго Монголия была прислужницей иностранной державы! Мы — храбрый и гордый народ, способный постоять за себя и идти своей собственной судьбой в этом мире. Разумеется, в составе Коминтерна."

 MON_reorganize_state_agenda: "Реорганизовать государственную повестку"
 MON_reorganize_state_agenda_desc: "Как всё переменилось! Те, кто угнетал и сбивал с пути простых мужчин и женщин, теперь ушли или изгнаны из нашей процветающей коммунистической утопии. Однако некоторые люди всё ещё могут таить в себе эти ядовитые идеи и подвергаться влиянию извне. Атеистическая пропаганда обеспечит лояльность и ясность ума нашего народа."

 MON_make_use_of_monastery_assets: "Использовать активы монастырей"
 MON_make_use_of_monastery_assets_desc: "Монастыри либо пустуют, либо лежат в руинах после наших атак на буддийскую церковь. Учитывая это, [MON.getLeader] издаёт специальный указ о национализации оставшихся активов религиозных учреждений, предоставляя правительству средства, необходимые для поддержания машин мира и войны."

 MON_example_of_communist_paradise: "Пример коммунистического рая"
 MON_example_of_communist_paradise_desc: "Политический и экономический ландшафт нашей страны изменился навсегда с тех пор, как [MON.getLeader] захватил власть. С нашей верностью принципам марксизма-ленинизма мы можем провозгласить основание ещё одной Советской Республики в Центральной Азии, чтобы завистливые взгляды соседей были ещё более прикованы к нам!"

 MON_thinking_out_of_bounds: "Мыслить за пределами рамок"
 MON_thinking_out_of_bounds_desc: "Поскольку внутренняя и внешняя политика государства управляется из Москвы, у нас остаются у власти амбициозные и творческие личности, обладающие влиянием и имеющие различные контакты во многих местах на Центральной равнине Китая. Правильное использование нашей повестки позволит нам, советскому сателлиту, гарантировать, что Китай останется преданным Народной Революции без необходимости вмешательства [SOV.getAdjective]."

 MON_means_of_propaganda: "Средства пропаганды"
 MON_means_of_propaganda_desc: "Государственную повестку можно распространять разными способами, и один из них — чрезмерное использование пропаганды, которая может стать ещё более эффективной, если мы построим учреждения, способные активно готовить и обучать персонал для этой цели."

 MON_destabilize_the_central_plain: "Дестабилизировать Центральную равнину"
 MON_destabilize_the_central_plain_desc: "Центральные районы Китая на протяжении десятилетий переживали крестьянские восстания — против империалистических прихвостней, коррумпированных чиновников Гоминьдана или угнетающих администраций местных милитаристов. Однако все они проваливались по одной простой причине: плохой организации и плохого планирования. С помощью [MON.getAdjective] они не падут!"

 MON_fruits_of_revolution: "Плоды революции"
 MON_fruits_of_revolution_desc: "Семена Революции выросли в плоды, готовые к сбору. И когда Центральная равнина объята пламенем крестьянских восстаний, логично, что мы поможем новому коммунистическому режиму любыми возможными средствами. Даже если для этого придётся силой принудить их к союзу."

 MON_industrial_relocation: "Перемещение промышленности"
 MON_industrial_relocation_desc: "Враг вторгся и угрожает [SOV.getAdjective] Родине! Некоторые донесения уже предполагают, что промышленность перемещается из Украины, Белоруссии и Прибалтики в центральные районы России и на Урал. Что, если враг достигнет Урала и создаст угрозу перемещённой промышленности наших братьев? Мы должны обратиться к [SOV.getAdjective] и предложить переместить её ещё дальше на восток."

 MON_new_comintern_beacon: "Новый маяк Коминтерна"
 MON_new_comintern_beacon_desc: "Ясно, что времена изменились, и теперь мы способны защитить [SOV.getNameDef] от врага. С collapse [SOV.getAdjective] государства мы должны взять на себя бразды правления Третьим Интернационалом и отныне принять на себя роль Защитника Революции!"

 MON_one_union_government: "Единое союзное правительство"
 MON_one_union_government_desc: "Мир меняется. У кого теперь хватит сил противостоять армиям [ROOT.getNameDef] и [SOV.getNameDef]? Противостоять мощи [ROOT.getLeader] и [SOV.getLeader] и союзу двух государств. Вместе, мой друг [SOV.getLeader], мы будем править этим миром во имя Революции."
#A proper description just to be sure
#We have done everything to assist them, but it is not enough: the [SOV.getAdjective] state appears to collapse sooner or later under the overwhelming weight of its invaders. The only applicable solution in these circumstances is to propose a unitary government which shall be in charge of revolutionary struggle from now on!"

 MON_struggle_for_communal_liberation: "Борьба за общинное освобождение"
 MON_struggle_for_communal_liberation_desc: "В отличие от наших советских братьев, мы будем поощрять борьбу всех наций внутри нового Союза против захватчиков и отражать наступление врага любыми возможными средствами!"

 #MON_new_union_leadership: "Новое союзное руководство"
 #MON_new_union_leadership_desc: "Мы взяли на себя тяжкое бремя управления огромной страной в борьбе за национальное освобождение и процветание народов Союза. Эффективное управление потребует также применения политики советского образца, но с некоторой монгольской спецификой."

#choibalsan focuses#
 MON_appoint_soviet_protege: "Назначить протеже [SOV.getAdjective]"
 MON_appoint_soviet_protege_desc: "Один из старейших и наиболее надёжных революционеров, Хорлогийн Чойбалсан, рассматривается в Москве как нынешний преемник руководства в [MON.getNameDef]. Он уже занимает посты министра внутренних дел, министра экономики и начальника армии. Предоставление ему ещё большей власти, безусловно, не вызовет никаких проблем в будущем."

 MON_deal_with_religious_centre: "Разобраться с религиозным центром"
 MON_deal_with_religious_centre_desc: "Комитеты «троек» раскрыли антиреволюционный буддийский центр, состоящий из лам из монастырей по всей стране. Остаётся неясным, каковы были их планы, но, учитывая, что некоторые члены обращались за помощью к [JAP.getAdjective] чиновникам, они представляют угрозу внутренней стабильности и должны быть отстранены от власти, если таковая у них есть."

 MON_reorganize_homeland_security: "Реорганизовать внутреннюю безопасность"
 MON_reorganize_homeland_security_desc: "Зависимость от помощи [SOV.getAdjective] в контрразведке и шпионаже означает, что мы привязаны к предоставляемым ими материалам. Создание Бюро внутренней безопасности минимизирует риск проникновения, а наши оперативники будут получать самую актуальную информацию."

 MON_the_great_terror: "Большой террор"
 MON_the_great_terror_desc: "Как и в [SOV.getNameDef], наше правительство переполнено коррумпированными чиновниками неизвестного происхождения, властолюбивыми революционерами-разрушителями и правыми ревизионистами. Мы должны сделать то, что должны, и ради всеобщего блага эти элементы необходимо искоренить."

 MON_new_generation_of_intelligentsia: "Новое поколение интеллигенции"
 MON_new_generation_of_intelligentsia_desc: "Меняющиеся времена диктуют смену людей, и у нас есть много молодых людей, способных к интеллектуальной и идеологической борьбе. Их образование и лояльность формируются в лучших университетах [SOV.getNameDef] и будут жизненно важны для восполнения пробела, образовавшегося после недавних событий."

 MON_new_party_elite: "Сформировать новую партийную элиту"
 MON_new_party_elite_desc: "Государственному аппарату нужны люди, готовые пачкать руки ради общего блага. Некоторые местные командиры и бюрократы проявили отличную лояльность Чойбалсану и должны быть повышены в должности."

 MON_remove_nominal_leadership: "Устранить номинальное руководство"
 MON_remove_nominal_leadership_desc: "Как бы ни был любим народом, Амар превратился в опасного лидера, способного уничтожить всё, что Чойбалсан построил и задумал для [MON.getAdjective] государства. Ради внутренней стабильности и безопасности правительства с ним необходимо разобраться немедленно."

 MON_true_hero_for_the_people: "Настоящий герой народа"
 MON_true_hero_for_the_people_desc: "Полная преданность принципам марксизма-ленинизма и полное отсутствие оппозиции его власти указывают на то, насколько любим и популярен [MON.getLeader]! Это стало ещё более очевидно, поскольку среди населения распространяются слухи о его тактическом гении в борьбе с [JAP.getAdjective] агрессорами. Слава нашему великому [MON.getLeader]!"

 MON_first_five_year_plan_focus: "Первый пятилетний план"
 MON_first_five_year_plan_focus_desc: "«Новый курс» — это опасная и устаревшая политика, вносящая смятение в умы людей. Мы последуем примеру [SOV.getAdjective] и разработаем собственный первый пятилетний план для удовлетворения потребностей нашего народа."

 MON_changing_times: "Перемены"
 MON_changing_times_desc: "Старое руководство, похоже, всё ещё способно управлять страной, но поскольку их физическое и психическое состояние постоянно ухудшается, им может становиться всё труднее удерживать власть и эффективно руководить страной. Возможно, пришло время продвинуть новых людей в партии на высшие партийные посты?"

 MON_join_the_big_brother: "Присоединиться к большому брату"
 MON_join_the_big_brother_desc: "Возможно, наше государство изжило своё предназначение, ибо цель Комитета наконец достигнута. Осознание этого факта молодыми коммунистами привело к ситуации, когда мы можем запросить официальный союз с нашими большими друзьями и благодетелями — [SOV.getNameDef]."

#assisting Soviets#
 MON_support_the_red_army_focus: "Поддержать Красную Армию"
 MON_support_the_red_army_focus_desc: "У [SOV.getNameDef] и Революции много врагов за рубежом. Мы всеми средствами должны поддерживать наших братьев и сестёр в этой борьбе за успех Революции. Не имея возможности выставлять огромные армии, как наши друзья, мы всё же можем оказать промышленную и гуманитарную помощь, предоставляя лошадей, продовольствие, шерсть и мясо нашим союзникам."

 MON_vessels_of_the_future_war: "Машины будущей войны"
 MON_vessels_of_the_future_war_desc: "Эффективность бронетехники на поле боя указывает на то, что в будущем она будет иметь огромное значение, если не станет основной силой. И хотя у нас нет средств для создания собственных танковых дивизий, мы можем собрать средства для оснащения такой дивизии. Дорогое, но стоящее дело."

 MON_aerial_support_initiative: "Инициатива воздушной поддержки"
 MON_aerial_support_initiative_desc: "Инициатива, одобренная Центральным Комитетом, предлагает [MON.getAdjective] народу накопить средства для закупки и оснащения авиаэскадрильи, состоящей из новейших прототипов истребителей. Ещё одно крупное вложение для достижения Победы Рабочего класса."

 MON_improve_transportation_network: "Модернизировать железнодорожную сеть"
 MON_improve_transportation_network_desc: "Наши усилия по поддержке [SOV.getNameDef] встретят ещё меньше препятствий, если будет создана соответствующая транспортная сеть между Улан-Батором и Транссибирской магистралью. Также планируется приобрести несколько старых поездов, чтобы обеспечить отсутствие нехватки подвижного состава на нашей стороне железной дороги."
#Amar socialist focuses#

 MON_reject_choibalsan_advances: "Отклонить притязания Чойбалсана"
 MON_reject_choibalsan_advances_desc: "Чойбалсан — оппортунистический и властолюбивый угнетатель, который стремится лишь к получению власти и её использованию в личных целях. Пока Амар у власти, его влияние в различных областях страны может быть постепенно уменьшено, пока от него не останется и следа."

 MON_separate_army_and_politics: "Разделить армию и политику"
 MON_separate_army_and_politics_desc: "Социалистическая структура армии в значительной степени опирается на идеологическую обработку личного состава, что приводит к сильному влиянию политиков на военных и наоборот. Такая система мешает государству функционировать и адекватно реагировать на попытки государственных переворотов."

 MON_local_command_structure: "Местная командная структура"
 MON_local_command_structure_desc: "Генеральный штаб не обязан непосредственно присутствовать на поле боя, чтобы наши войска сражались должным образом. Местные командиры могут быть приписаны к отдельным дивизиям или даже батальонам, что значительно повышает эффективность наземных сил."

 MON_decrease_defense_budget: "Сократить оборонный бюджет"
 MON_decrease_defense_budget_desc: "[SOV.getAdjective] чиновники постоянно оказывают давление на наше правительство, требуя увеличить оборонные расходы, несмотря на дефицит, который уже испытывает наш народ. В последние годы он достиг ошеломляющих 40%, подрывая стоимость тугрика и ещё больше снижая его курс на рынке."

 MON_finalize_army_reform: "Завершить армейскую реформу"
 MON_finalize_army_reform_desc: "Введённые реформы, направленные на улучшение положения армии, по-видимому, функционируют должным образом. Сосредоточив военнослужащих на их долге перед Родиной, общее состояние нашей армии теперь значительно улучшилось."

 MON_tolerate_religious_groups: "Терпимость к религиозным группам"
 MON_tolerate_religious_groups_desc: "Всего несколько лет назад буддийская церковь серьёзно пострадала от так называемых «прогрессивных» левых реформ, направленных на отделение людей от религии и переориентацию их сознания на новую политическую повестку. Эти усилия лишь разрушили национальную специфику [MON.getAdjective] буддизма, и нынешнее правительство готово признать ошибки прошлого, предложив религиозный компромисс."

 MON_establish_socialist_society: "Построить социалистическое общество"
 MON_establish_socialist_society_desc: "Революционный режим, подобный нашему, хрупок и уязвим для иностранного влияния. Этот аргумент, безусловно, справедлив, но, будучи использованным в неправильном контексте, он открывает возможности для эксплуатации и злоупотреблений, как это делают некоторые чиновники. Понизив таких людей в должности и отказавшись от активных нападок на определённые группы населения, можно сформировать новое правительство — социалистическое."

 MON_workers_focus: "Рабочие..."
 MON_workers_focus_desc: "Рабочие нашего народа были забыты правительственными режимами прошлого. Подчёркивание их важности для нас путём создания новых предприятий только укрепит их веру в легитимность нашего режима."

 MON_peasants_focus: "... и Крестьяне"
 MON_peasants_focus_desc: "Коллективизация привела к тому, что многие семьи потеряли скот, дома и сбережения, что нынешние чиновники считают почти государственной изменой, и эту проблему необходимо решить как можно скорее. Ради блага нации реформы должны быть проведены."

 MON_workers_and_peasants_unite_focus: "Объединяйтесь!"
 MON_workers_and_peasants_unite_focus_desc: "«Врозь мы падём, вместе — мы сильны!» — этот девиз должен знать каждый мужчина и каждая женщина нашей страны. Сотрудничество рабочих и крестьян принесёт великие результаты, если применять его правильно. И Амар знает как!"

 MON_a_socialist_republic: "Современная Социалистическая Республика"
 MON_a_socialist_republic_desc: "Социалистические реформы, проведённые в нашем государстве, показывают, как многое улучшилось со времён правления Гэндэна. С укреплением социалистических позиций в Монголии страна может открыть свои двери для иностранцев и принять свою судьбу в современном мире."

 MON_sideline_the_left: "Оттеснить левых"
 MON_sideline_the_left_desc: "Левые и правые в правительстве были разделены годами, начиная с VII съезда партии 1928 года. Нынешние реформы правительства не могут быть безопасно проведены без участия левых в общественных делах. Более того, некоторые их лидеры открыто выступают против нашего законодательства, поэтому необходимо отстранить их от власти."

 MON_liberalize_trade_policies: "Либерализовать торговую политику"
 MON_liberalize_trade_policies_desc: "«Левые уклоны» начала 30-х годов привели к установлению государственной монополии на внешнюю торговлю, особенно с [CHI.getAdjective]. Теперь, когда мы укрепили наше государство, мы должны обратиться к миру и открыться ему."

 MON_increase_border_patrols: "Усилить пограничные патрули"
 MON_increase_border_patrols_desc: "Наши обширные границы постоянно нарушаются бандитами, повстанческими отрядами и вражескими агентами. Мобилизация войск на границу необходима для нашей собственной безопасности и надлежащего развития государства."

 MON_affirm_rearmament_program: "Утвердить программу перевооружения"
 MON_affirm_rearmament_program_desc: "Поскольку напряжённость на Востоке нарастает, мы остаёмся в сильной зависимости от помощи [SOV.getAdjective]. Однако это не продлится вечно, и мы должны быть готовы к надвигающейся буре."

 MON_tackle_the_eastern_threat: "Устранить восточную угрозу"
 MON_tackle_the_eastern_threat_desc: "Нарушения границы со стороны [MAN.getAdjective] войск достигли беспрецедентного уровня, который невозможно игнорировать! Они утверждают, что граница между Внутренней и Внешней Монголией проходит глубоко на нашей территории, ссылаясь на какие-то устаревшие карты, которые мы никогда не видели. Пришло время проучить их, и наши [SOV.getAdjective] друзья готовы помочь нам в этом начинании."

 MON_assist_the_revolutionary_struggle: "Помочь революционной борьбе"
 MON_assist_the_revolutionary_struggle_desc: "Внутренняя борьба за руководство привела к началу одного из самых разрушительных конфликтов, который, как ожидается, охватит всю [SOV.getNameDef] пламенем войны. Будучи одним из самых сильных и надёжных членов Коминтерна, мы имеем возможность достичь различных дипломатических целей."

 MON_rebuke_1932_mediation_issue: "Пересмотреть посредничество 1932 года"
 MON_rebuke_1932_mediation_issue_desc: "В своих претенциозных попытках захватить больше земель, [TAN.getNameDef] в 1932 году обратилась к СССР и сумела получить стратегические соляные копи в районе горы Дус-Даг, которые являются законными [MON.getAdjective] землями! Поскольку [SOV.getAdjective] сейчас заняты, мы можем оппортунистически воспользоваться ситуацией и воссоединить земли, которые когда-то были нашими."

#soviet cooperation#
 MON_ratify_mutual_assistance_treaty: "Ратифицировать договор о взаимопомощи"
 MON_ratify_mutual_assistance_treaty_desc: "Наш явный союз с [SOV.getNameDef] требует лишь нескольких подписей наших чиновников для официальной ратификации, открывая путь к прочному и взаимовыгодному сотрудничеству. [CHI.getNameDefCap] будет недовольна, но какое нам дело?"

 MON_invite_soviet_advisors: "Пригласить [SOV.getAdjective] советников"
 MON_invite_soviet_advisors_desc: "В рамках договора о взаимопомощи, [SOV.getAdjective] войскам теперь разрешено размещаться на территории нашей страны в ключевых стратегических районах. Военное сотрудничество может быть расширено путём приглашения [SOV.getAdjective] военной миссии для участия в развитии армии и оказания помощи нашим командирам в учениях и манёврах."

 MON_approach_soviet_planners: "Обратиться к [SOV.getAdjective] планировщикам"
 MON_approach_soviet_planners_desc: "В рамках нашего экономического сотрудничества группа [SOV.getAdjective] планировщиков была приглашена в Монголию для содействия промышленному развитию страны. Из-за суровых климатических условий и низкого уровня урбанизации фокус группы сместился со строительства зданий на задачу передачи [SOV.getAdjective] промышленных инноваций нашим техникам."

 MON_joint_technological_development: "Совместное технологическое развитие"
 MON_joint_technological_development_desc: "В наших интересах расширить сотрудничество с [SOV.getAdjective] учёными и техниками. Хотя мы не можем оказать существенной материальной поддержки, они могут предоставить нам ценные инструменты для улучшения наших исследовательских мощностей."

 MON_intensify_cooperation: "Усилить сотрудничество"
 MON_intensify_cooperation_desc: "Улан-Батор в настоящее время не может обеспечить прочную основу для стабильного и надёжного производства электронных компонентов в Монголии. Однако с помощью [SOV.getAdjective] ситуация может измениться, появятся новые технологии и детали, а в нашей стране — вычислительные устройства."

 MON_student_exchange_program: "Программа студенческого обмена"
 MON_student_exchange_program_desc: "[SOV.getNameDefCap] обладает обширной сетью учебных заведений, способных обучать тысячи молодых людей из различных республик Союза. Мы можем отправить некоторых из наших лучших студентов по программе обмена, чтобы они учились у наших благодетелей."

 MON_reform_national_script: "Реформировать национальную письменность"
 MON_reform_national_script_desc: "Нынешняя [MON.getAdjective] письменность состоит из множества алфавитов, некоторые из которых используются врагами нашего народа. При нынешнем [SOV.getAdjective] влиянии в нашей стране и присутствии их лингвистов, в тесном сотрудничестве с нашими специалистами была разработана новая версия письменности. Она основана на кириллице и будет способствовать борьбе с неграмотностью нашего народа."

 MON_solidify_language_institutes: "Укрепить языковые институты"
 MON_solidify_language_institutes_desc: "Зависимость от иностранных алфавитов и транскрипций сделала нашу страну объектом различных режимов на протяжении прошлого века. После провозглашения независимости было предпринято множество усилий для объединения различных разговорных диалектов и используемых письменностей в единую систему, призванную служить народу."

 MON_ulaanbaatar_national_university: "Улан-Баторский национальный университет"
 MON_ulaanbaatar_national_university_desc: "Несколько месяцев назад было принято правительственное постановление о создании «высшего учебного заведения», которое впоследствии может стать основой Национального университета Монголии. При нынешнем финансировании и стремящихся к знаниям студентах ожидается большой успех!"

#Greater Mongolia#
 MON_dream_of_greater_mongolia: "Мечта о Великой Монголии"
 MON_dream_of_greater_mongolia_desc: "Многие годы мы лелеяли мечту объединить монгольское население под властью одного государства, но не в качестве колониального сателлита или захолустной провинции, а как государство, управляемое монголами! Пришло время считать такие мечты реальностью и начать воссоединение утраченных земель!"

 MON_gather_ulaanbaatar_conference: "Созвать Улан-Баторскую конференцию"
 MON_gather_ulaanbaatar_conference_desc: "Баланс сил в Центральной и Восточной Азии — хрупкое дело, находящееся в руках трёх основных игроков региона, а именно [SOV.getAdjective], [JAP.getAdjective] и [CHI.getAdjective]. Пригласив их встретиться на «нейтральной территории», мы сможем поднять вопрос о [MON.getAdjective] народе и надеяться, что он будет мирно обсуждён и решён."

 MON_divide_spheres_of_influence: "Разделить сферы влияния"
 MON_divide_spheres_of_influence_desc: "Великие державы, вероятно, шокированы нашим импульсивным и непредсказуемым союзом с КНР, но время для быстрого мышления и принятия быстрых решений прошло. Теперь мы должны укрепить наше сотрудничество, разделив истинные монгольские и китайские территории, разграничив сферы влияния и тем самым обеспечив контроль над регионом и наши взаимные интересы."

 MON_secure_hexi_corridor: "Обеспечить контроль над коридором Хэси"
 MON_secure_hexi_corridor_desc: "Контроль над этим торговым путём и наиболее надёжным стратегическим проходом в Синьцзян перешёл к клике Ма, когда местная милиция захватила этот район во время Северного похода 1926 года. С нашим новым союзником мы можем эффективно ударить по врагу с северного и восточного флангов, стремясь рассеять вражеские соединения по всему широкому фронту, что позволит нашим основным силам без особых проблем закрепиться на спорных территориях."

 MON_joint_piligrimage_to_mount_wutai: "Совместное паломничество на гору Утай"
 MON_joint_piligrimage_to_mount_wutai_desc: "Одна из Четырёх Священных гор китайского буддизма в настоящее время находится под контролем оппортунистических полевых командиров, которые постоянно эксплуатируют паломников, ищущих благословения в местах силы. Вместе с нашим новым союзником мы можем отправить несколько эскортов для поддержки в случае бюрократических проблем."

 MON_secure_the_rear: "Обеспечить тыл"
 MON_secure_the_rear_desc: "Лидеры Синьцзяна и Восточного Туркестана, по-видимому, постоянно меняют свою верность с прокитайской на просоветскую или профашистскую, в зависимости от развития политической ситуации вокруг них. Если мы хотим сосредоточиться на Центральной равнине и не беспокоиться об очередном ударе в спину, мы должны немедленно обезопасить этот район."

 MON_reignite_the_civil_war: "Разжечь гражданскую войну"
 MON_reignite_the_civil_war_desc: "Теперь, когда жизненно важные районы защищены и налажены линии снабжения, мы можем нацелиться на нечто большее и нанести удар прямо в сердце прогнившей структуры, которая только отвлекает людей от принятия истинной революции: Гоминьдан! Пришло время сразить этого властолюбивого зверя!"

 MON_the_second_northern_expedition: "Второй Северный поход"
 MON_the_second_northern_expedition_desc: "Первый Северный поход продемонстрировал успех центрального правительства в разгроме различных группировок полевых командиров в районе Фэнтянь. И поскольку Гоминьдан не смог уничтожить остатки банд и отказался от Севера, мы выступим и обеспечим безопасность этого района во благо новой оси Улан-Батор — Шэньси!"

 MON_a_pragmatic_diplomacy: "Прагматичная дипломатия"
 MON_a_pragmatic_diplomacy_desc: "Ясно, что мы предоставлены сами себе в возвращении коренных земель для достижения единого [MON.getAdjective] государства. Война пока исключена, но, возможно, можно найти более тонкий подход?"

 MON_disagreements_with_sinkiang: "Разногласия с Синьцзяном"
 MON_disagreements_with_sinkiang_desc: "Наша южная граница постоянно находится под угрозой со стороны [SIK.getLeader] и его бандитов. Более того, многие этнические монголы, живущие в Джунгарии и Дабаньчэне, бежали в поисках убежища из-за репрессий местного правительства! Это было бы благородным делом — вернуть эти земли и реинтегрировать их обратно."

 MON_one_mongolia_policy: "Политика единой Монголии"
 MON_one_mongolia_policy_desc: "Автономный район Внутренняя Монголия всегда был странным конструктом в глазах дипломатов. Их автономия под властью [MAN.getAdjective] и [CHI.getAdjective], борьба за независимость и союз с Японией для сохранения своего статуса — это явный политический оппортунизм из-за отсутствия тенденций к самоопределению. Эта проблема может и должна быть решена..."

 MON_gobi_border_realignment: "Пересмотр границы в Гоби"
 MON_gobi_border_realignment_desc: "Многие районы на юге населены этническими монгольскими племенами, которые стремятся к воссоединению с собственно Монголией. Эти земли долгое время были частью [SHX.getNameDef] и [XSM.getNameDef], которые подавляли любые проявления стремления народа к самоопределению, что является явным оскорблением нашего народа. Пора показать этим самопровозглашённым лидерам Центральной равнины, каков песок на вкус."

 MON_delegation_to_tuva: "Делегация в Туву"
 MON_delegation_to_tuva_desc: "С момента номинального провозглашения независимости в 1922 году [TAN.getNameDef] имела напряжённые отношения с нашим государством не только из-за постоянных миграций населения, но и из-за стратегической соляной горы Дус-Даг. Наше общее культурное и историческое наследие может быть использовано для установления ещё более тесных связей с ними и, возможно, создания на этой основе унитарного государства."

 MON_a_unity_with_buryats: "Единство с бурятами"
 MON_a_unity_with_buryats_desc: "1934 год принёс много изменений в наши отношения с бурятами, так как чиновники [SOV.getAdjective] быстро определили «веские идеологические, культурные и исторические причины» для разделения наших стран и противопоставления наших политиков друг другу. Однако времена изменились, и мы можем создать собственный Бурят-Монгольский союз, направленный на осуществление мечты об объединении монгольского населения под одним знаменем."

 MON_incorporate_new_lands: "Включение новых земель"
 MON_incorporate_new_lands_desc: "Наши амбиции велики, и они готовы к полной реализации! Пусть мир узнает, что народ [MON.getAdjective] будет стоять единым как одно сильное национальное государство!"


########## National Strength Mongolia###############
 MON_rely_on_national_strength: "Опора на национальные силы"
 MON_rely_on_national_strength_desc: "Народ должен осознать, что мы не можем полностью полагаться на поддержку [SOV.getAdjective] в случае вступления нашей страны в вооружённый конфликт с другим государством. Несколько пропагандистских кампаний и немного патриотического воодушевления могут творить чудеса, если находятся в нужных руках."

 MON_limited_research_cooperation: "Ограниченное научное сотрудничество"
 MON_limited_research_cooperation_desc: "Несмотря на наши лучшие националистические усилия, мы не можем отрицать, что наше государство испытывает нехватку соответствующего снаряжения и персонала для надлежащего функционирования в современную эпоху. Чтобы в итоге стать сильными, придётся пойти на некоторые жертвы."

 MON_strengthen_existing_industrial_contracts: "Укрепление существующих промышленных контрактов"
 MON_strengthen_existing_industrial_contracts_desc: "Отказ от некоторых старых сделок и возобновление их на основе взаимовыгодного сотрудничества открывает новые возможности для инвестиций, где мы можем приобрести современные инструменты для нашей развивающейся промышленности."

 MON_subvert_soviet_control: "Подрыв [SOV.getAdjective] контроля"
 MON_subvert_soviet_control_desc: "Хотя мы не можем проводить полностью независимую внешнюю политику под угрозой интервенции [SOV.getAdjective] или организованного [SOV.getAdjective] переворота, всё ещё возможно, чтобы несколько нужных людей в нужных местах незаметно изменили ход событий и постоянно снижали нашу зависимость от Большого Красного Брата."

 MON_expel_choibalsan: "Изгнание Чойбалсана"
 MON_expel_choibalsan_desc: "Сталинские агенты всё ещё присутствуют в различных аспектах нашего правительства, в том числе и в лице «Великого революционера» Чойбалсана в элите страны. Хотя его преданность Монголии не вызывает сомнений, он стоит на пути народа к выбору желаемой судьбы. Правые чистки 1928 года и «Дело Лхумбэ» уже показали порочность его методов. Пришло время избавиться от него."

 MON_sabotage_great_khural: "Срыв заседания Великого Хурала"
 MON_sabotage_great_khural_desc: "Изменение государственной политики требует одобрения Государственного Великого Хурала, сессия которого будет созвана в ближайшее время. И хотя поддержка самодостаточной Монголии постоянно растет среди народа, чиновники могут наложить вето на новое законодательство и придерживаться про-[SOV.getAdjective] курса, как и раньше. Однако если во время сессии произойдет нападение, совершенное, скажем, каким-нибудь радикальным левым экстремистом..."

 MON_faciliate_cooperation_with_china: "Содействие сотрудничеству с Китаем"
 MON_faciliate_cooperation_with_china_desc: "[CHI.getNameDef] остаётся одним из наших главных торговых партнёров в эти суровые времена, несмотря на идеологические разногласия, раздирающие наши страны. Несомненно, их чиновники эксплуатировали нашу страну в прошлом, но, возможно, пришло время открыть разум и сердца для взаимовыгодного сотрудничества?"

 MON_expand_the_role_of_urga_national_library: "Расширение роли Национальной библиотеки Урги"
 MON_expand_the_role_of_urga_national_library_desc: "Основанная в 1921 году, Национальная библиотека в нашей столице остаётся главным хранилищем древних и современных знаний, пока что малодоступных для простого населения. Открытие дополнительных читальных залов и распространение литературы среди населения повысит уровень грамотности народа."

###democratic focuses#
 MON_stabilize_the_country: "Стабилизация страны"
 MON_stabilize_the_country_desc: "Разрушительное нападение на Великий Хурал оставило глубокие шрамы в нашем обществе: многие люди ставят под сомнение легитимность нынешнего режима и предлагают дистанцироваться от СССР и его повестки. И хотя это может звучать заманчиво, мы должны стремиться стабилизировать остатки социалистической системы, которые у нас пока есть."

 MON_reach_out_to_moscow: "Связаться с Москвой"
 MON_reach_out_to_moscow_desc: "Несомненно, чиновники [SOV.getAdjective] сомневаются в нашей лояльности делу после всех событий, произошедших в стране в последние дни. Мы должны отправить посланника в Москву и заверить их в нашей поддержке, пригласив их дипломатов и сотрудников службы безопасности с визитом, чтобы продемонстрировать, что государство находится под контролем."

 MON_ensure_mvd_loyalty: "Обеспечение лояльности МВД"
 MON_ensure_mvd_loyalty_desc: "Мы хорошо осведомлены о [SOV.getAdjective] агентах в наших рядах, особенно в Министерстве внутренних дел, которые способны нарушить жизнь простых людей, если получат приказ сверху. У нас есть средства, которые при правильном использовании могут позволить нам убедить этих людей предоставить ценную информацию для наших личных нужд..."

 MON_support_the_rebels: "Поддержка повстанцев"
 MON_support_the_rebels_desc: "Многие народы решили выступить против власти [SOV.getAdjective] и провозгласить независимость в эти неопределённые времена! Мы должны присоединиться к их борьбе против угнетателей народа, которые стремятся лишь к власти над народами Центральной Азии и Дальнего Востока! К оружию, братья и сёстры, и пусть наш славный марш на Запад никогда не будет забыт!"

 MON_formalize_the_treaty: "Формальный договор"
 MON_formalize_the_treaty_desc: "Поодиночке нас легко победить, но вместе мы сильны! Чтобы обеспечить безопасность возникающих стран, лучше всего оформить неофициальный договор о взаимопомощи в официальный союз!"

 MON_contest_the_insurgents: "Противодействие повстанцам"
 MON_contest_the_insurgents_desc: "Гражданские беспорядки в СССР привели к началу одного из самых разрушительных конфликтов современности! И пока внутренняя борьба за власть калечит наших братьев, некоторые оппортунисты-националисты решили воспользоваться моментом и реализовать свои националистические, если не империалистические, амбиции! Будучи союзниками Москвы, мы можем обеспечить некоторые из этих режимов для них! Разумеется, не бесплатно..."

 MON_form_the_rightist_cabinet: "Формирование правого кабинета"
 MON_form_the_rightist_cabinet_desc: "Эра так называемого «правого оппортунизма» закончилась в 1928 году очередным раундом правительственных чисток, но его наследие живо! Некоторым политикам удалось избежать всевидящего ока НКВД, и теперь их можно пригласить обратно для формирования второго правого кабинета, что станет четвёртой радикальной сменой кабинета за последние десять лет."

 MON_denounce_politizised_army: "Осуждение политизированной армии"
 MON_denounce_politizised_army_desc: "Коммунистические режимы обычно стремятся установить систему, в которой партия контролирует военных, а армия напрямую участвует во влиянии на государственную политику, что неприемлемо, учитывая, что оба вопроса имеют совершенно разную природу! Открыто осуждая такое поведение, мы можем позволить государственному аппарату оставаться независимым и свободным в выборе государственной политики."

 MON_compromise_with_lamas: "Компромисс с ламами"
 MON_compromise_with_lamas_desc: "Буддизм представляет собой неотъемлемую часть [ROOT.getAdjective] общества, служа мостом между материальным миром социалистической революции и далёкими абстрактными ценностями высшей силы, правящей миром. Мы должны уважать их выбор и следить, чтобы наша повестка не пересекалась с их путями."

 MON_secularization_of_education: "Секуляризация образования"
 MON_secularization_of_education_desc: "Нельзя забывать, что, несмотря на все благие намерения, религиозные институты не должны определять образовательную политику государства. Секуляризация образования — это заметное усилие в проведении социалистической политики, оставаясь в то же время в контакте с реальностью современной Монголии."

 MON_repay_old_debths: "Выплата старых долгов"
 MON_repay_old_debths_desc: "Многие иностранные компании покинули Монголию после революции 1921 года, когда их активы были национализированы, а долги аннулированы Народной армией, искавшей средства для установления коммунистического режима в регионе и его защиты от внешних угроз. Обратившись к некоторым из их представителей и выплатив старые долги, мы можем заручиться их поддержкой нашего дела."

 MON_invite_foreign_investors: "Иностранные инвесторы"
 MON_invite_foreign_investors_desc: "После признания наших прошлых ошибок некоторые инвесторы видят в Монголии развивающуюся страну, способную стать надёжной гаванью в регионе. Мы должны заверить их, что так будет и впредь, подписав несколько пяти- или десятилетних контрактов."

 MON_prepare_for_the_inevitable: "Подготовка к неизбежному"
 MON_prepare_for_the_inevitable_desc: "Несмотря на все наши благие намерения, ясно, что мир в регионе не может сохраняться вечно, поэтому мы должны быть готовы к надвигающейся буре, которая охватит Центральную Азию и Дальний Восток."

 MON_frontline_infrastructure: "Прифронтовая инфраструктура"
 MON_frontline_infrastructure_desc: "Если мы намерены сражаться на равных с потенциальными врагами в Сибири, нам необходимо создать надлежащие логистические центры и базы снабжения вдоль наших границ! Только так можно гарантировать нашу победу в этих суровых условиях!"

 MON_excessive_military_build_up: "Чрезмерное военное строительство"
 MON_excessive_military_build_up_desc: "Финансируемая государством программа создания сильной и современной армии будет дорогостоящим и ресурсоёмким мероприятием, приносящим огромную выгоду в долгосрочной перспективе. Всё, что нам нужно сделать, — это пережить начальный этап вторжения, если таковое произойдёт."

 MON_peace_and_prosperity: "Мир и процветание"
 MON_peace_and_prosperity_desc: "Трудно представить, что наша страна в ближайшее время вступит в какой-либо военный конфликт. Давайте сосредоточимся на промышленном строительстве и безопасности граждан на их рабочих местах!"

 MON_stay_on_guard: "Бдительность"
 MON_stay_on_guard_desc: "Иностранные империалистические амбиции и революционная борьба давно сотрясают земли многих народов Азии. Нам лучше сохранять бдительность и следить за тем, чтобы наши границы были защищены со всех сторон, а наши объекты были полностью укомплектованы и готовы к возможному бою."

#democratic aggressive#
 MON_central_asia_defensive_pact: "Центральноазиатский оборонительный пакт"
 MON_central_asia_defensive_pact_desc: "За последние годы нам удалось укрепить свои позиции в регионе как региональной державы, нацеленной на защиту граждан внутри страны. Пришло время продемонстрировать наши миротворческие амбиции, защищая ценности, общие для всех в Центральной Азии."

 MON_mengjian_issue: "Мэнцзянский вопрос"
 MON_mengjian_issue_desc: "Отколовшееся государство Мэнцзян продолжает существовать, несмотря на отсутствие международного признания! В их представлении о независимости также фигурирует Внешняя Монголия как их неотъемлемая часть. Ну, неофициально, но должны ли простые люди знать об этой маленькой нестыковке?"

 MON_intervene_in_sinkiang: "Интервенция в Синьцзян"
 MON_intervene_in_sinkiang_desc: "Постоянные пограничные провокации и вражеские кавалерийские рейды в аймаки Баян-Улгий, Ховд и Говь-Алтай указывают на угрозу, которую представляет Синьцзян для этого района. Их бандитские шайки усиливаются с каждым совершённым рейдом, в то время как наш народ теряет имущество и жизни. Пора положить конец этой угрозе."

 MON_expand_the_treaty: "Расширение договора"
 MON_expand_the_treaty_desc: "Быть одиноким волком в борьбе с угнетением, несомненно, достойная борьба в глазах народа, но большие войны невозможно выиграть без внешней помощи. Некоторые страны по соседству разделяют наши ценности и принципы, что позволяет нам получить жизненно важных идеологических союзников."

 MON_oppose_soviet_colonialism: "Противодействие [SOV.getAdjective] колониализму"
 MON_oppose_soviet_colonialism_desc: "Они называют себя защитниками народа, но на самом деле они — не что иное, как эксплуататорская колониальная держава прошлого века! Наша прежняя слабость не позволяла нам сказать это, но теперь мы можем открыто осудить руководство [SOV.getAdjective] и их империалистические амбиции в Центральной Азии и на Дальнем Востоке! Пусть знают, что мы идём за ними!"

 MON_support_east_siberian_independists: "Поддержка восточносибирских независимцев"
 MON_support_east_siberian_independists_desc: "Гражданская война в России привела к тому, что многие районы Дальнего Востока, включая Зелёную Украину и Дальневосточную Республику, встали на сторону Антанты в их борьбе против красной волны, захлестнувшей бывшую Российскую империю. У нашего дела всё ещё много сторонников, которым нужна лишь небольшая поддержка для начала восстания."

 MON_plea_to_the_russian_far_east: "Воззвание к русскому Дальнему Востоку"
 MON_plea_to_the_russian_far_east_desc: "Дальний Восток, как известно, является одним из самых поздних приобретений Российской империи, что означает, что поддержка российского дела там минимальна, что нам очень на руку."

 MON_weaken_soviet_control_over_northwestern_siberia: "Ослабление [SOV.getAdjective] контроля над Сибирью"
 MON_weaken_soviet_control_over_northwestern_siberia_desc: "На огромных территориях Сибири почти никогда не ступала нога русского солдата, что обеспечивает идеальную почву для наших диверсионных групп. Нам нужно лишь время и некоторые ресурсы, чтобы укрепить нашу поддержку в этом районе."

 MON_infiltrate_transural_region: "Инфильтрация в Зауралье"
 MON_infiltrate_transural_region_desc: "Азиатские части Уральского региона с их обширными территориями и болотистыми ландшафтами никогда не привлекали особого внимания русских, что только на руку нам и нашим агентам, готовым создать там временные базы."

 MON_expand_influence_into_greater_steppe: "Расширение влияния на Великую Степь"
 MON_expand_influence_into_greater_steppe_desc: "Меньшевикам не удалось завоевать массовую поддержку местного населения в Центральной Азии во время гражданской войны. Благодаря нашему общему наследию и географическому положению, мы можем установить более тесные связи с людьми в регионе, что позволит нам набрать сторонников в самых отдалённых из бывших азиатских ССР."

 MON_increase_presence_in_caucasus: "Усиление присутствия на Кавказе"
 MON_increase_presence_in_caucasus_desc: "Храбрые герои Закавказья веками сражались против русских и османских орд. Мы, несомненно, можем заручиться некоторой поддержкой в этих областях для нашего дела!"

 MON_launch_peoples_uprising: "Народное восстание"
 MON_launch_peoples_uprising_desc: "Теперь, когда наши диверсанты находятся на позициях, склады боеприпасов саботированы, а сторонники вооружены необходимым оружием, мы должны поднять истинные знамёна в деревнях и городах Центральной Азии и Дальнего Востока, знаменуя конец угнетательского русского правления в этих регионах!"

#democratic rather peaceful#
 MON_declare_official_neutrality: "Провозглашение официального нейтралитета"
 MON_declare_official_neutrality_desc: "Любой военный конфликт на [ROOT.getAdjective] земле будет иметь разрушительные последствия для всех слоёв нашего общества. Нам лучше публично объявить страну островом в этом неспокойном море."

 MON_open_up_the_country: "Открытие страны"
 MON_open_up_the_country_desc: "Наша приверженность принципам демократического социализма позволяет нам устанавливать более тесные связи со многими демократическими институтами по всему миру, укрепляя демократические основы и гарантируя сохранение свобод народа."

 MON_riders_of_the_storm: "Всадники бури"
 MON_riders_of_the_storm_desc: "Мы должны разрешить формирование и отправку стратегических сил специального назначения, способных обеспечить защиту демократических институтов в разных уголках мира. Эта группа бойцов должна оставаться в тени и носить какое-нибудь непритязательное название."

 MON_appeal_to_european_democracies: "Воззвание к европейским демократиям"
 MON_appeal_to_european_democracies_desc: "Пока мир вокруг нас погружается в хаос, некоторые оппортунистические соседи могут предъявить претензии на наши земли, видя в них «неотъемлемую часть своей сферы влияния». При поддержке некоторых сильных европейских демократий мы сможем укрепить нашу дипломатическую позицию."

 MON_appeal_for_overseas_protection: "Воззвание о заморской защите"
 MON_appeal_for_overseas_protection_desc: "Мы должны укреплять наше сотрудничество с другими демократическими державами мира. Европейцы оказались слишком ненадёжными в вопросах колониализма и защиты зарубежных стран. Было бы разумно протянуть руку через океан и тоже обратиться за поддержкой к другим державам."

 MON_seek_democratic_alliances: "Поиск демократических союзов"
 MON_seek_democratic_alliances_desc: "Демократические институты Монголии нуждаются не только в дипломатических обещаниях, но и в некоторой экономической и военной защите. Ситуация вокруг нас дестабилизируется день ото дня, и нам нужна иностранная помощь, если таковая станет доступной."

 MON_democratic_foundation_of_mongolia: "Демократическая основа Монголии"
 MON_democratic_foundation_of_mongolia_desc: "Трудно полагаться на иностранные державы, которые находятся так далеко от нас! Мы должны укрепить наш собственный путь продвижения демократических ценностей и распространять их вокруг себя!"

 MON_provide_shelter_for_refugees: "Предоставление убежища беженцам"
 MON_provide_shelter_for_refugees_desc: "Пока вокруг нас бушует война, мы остаёмся безопасной гаванью для тех, кто нуждается в защите. Пора открыть границы для всех, кто ищет помощи, и предоставить кров многим, кто хотел бы жить в мире."

 MON_offer_facilities_for_exiled_scientists: "Предоставление возможностей изгнанным учёным"
 MON_offer_facilities_for_exiled_scientists_desc: "Мы могли бы предоставить различным научным учреждениям дополнительные средства, рабочие места и исследовательские мощности. Наше технологическое развитие также выиграет от этого взаимовыгодного сотрудничества."

 MON_forge_asian_self_determination: "Ковка азиатского самоопределения"
 MON_forge_asian_self_determination_desc: "Мы никогда не должны забывать, как различные иностранные державы пытались подавить и подорвать демократические начала в Центральной Азии. Теперь, когда некоторые территории перешли под наш контроль, мы должны стремиться к восстановлению демократических институтов в регионе!"

 MON_bulwark_against_fascist_threat: "Оплот против фашистской угрозы"
 MON_bulwark_against_fascist_threat_desc: "Многие страны Азии уже стали жертвами коричневой чумы, которая использует все возможные средства для распространения своих ядовитых идей, выдавая себя за «решение от Красной угрозы». Всё, что они ищут, — это власть, влияние и ресурсы, а не защита народа! Мы должны быть главным бастионом, способным противостоять их тонким усилиям!"

 MON_strike_against_communist_menace: "Удар по коммунистической угрозе"
 MON_strike_against_communist_menace_desc: "Много лет назад многие регионы Азии попали под влияние Коминтерна и социалистических ценностей, но они глубоко заблуждаются в своей интерпретации Народной революции, ибо она несёт лишь хаос и разрушение экономике и жизни людей. Мы будем поддерживать любые проявления демократических ценностей на этих землях, страдающих от коммунистического гнёта!"

#pro-Chinese/democratic alternative path
 MON_adopt_sun_yat_sen_principles: "Принять принципы Сунь Ятсена"
 MON_adopt_sun_yat_sen_principles_desc: "Основатель [CHI.getAdjective] демократии сформулировал философскую концепцию, основанную на трёх принципах, направленных на улучшение жизни простых людей на Центральной равнине. Если мы хотим быть ответственным правительством, будет благим делом применить «правление народа, волей народа и для народа» с национальными особенностями."

 MON_welfare_focus: "Социальный"
 MON_welfare_focus_desc: "Один из трёх основополагающих принципов заключается в обеспечении наших людей благами, что можно рассматривать как антикапиталистическое экономическое развитие и антиимпериалистическую дипломатическую позицию. Первый шаг — это экономическое развитие нашей нации."

 MON_codify_democratic_principles: "Кодифицировать демократические принципы"
 MON_codify_democratic_principles_desc: "Демократическая основа обретает гораздо больше силы, если она кодифицирована в реальном правоприменении, а законодательная система поддерживает соответствующую систему на всех уровнях власти. Возможен период политической нестабильности, но эти изменения того стоят."

 MON_five_races_under_one_union: "Союз пяти народов"
 MON_five_races_under_one_union_desc: "Отголоски новой философской теории распространяются по стране, поскольку благородное наследие Синьхайской революции пускает корни в умах и сердцах нашего народа! Переработка старых концепций укрепит наши связи с ханьцами, маньчжурами, хуэйцами и тибетцами!"

 MON_cooperation_with_kuomintang: "Сотрудничество с Гоминьданом"
 MON_cooperation_with_kuomintang_desc: "Демократическая ориентация нынешнего [CHI.getAdjective] правительства ясно показывает, что оно пересматривает ошибки прошлого и, возможно, готово к сотрудничеству, а не к подчинению бывших подданных, автономных регионов и данников? Мы будем искать примирения, хотя бы на дипломатическом уровне."

 MON_nationalism: "Национализм"
 MON_nationalism_desc: "Следуя по стопам Гоминьдана, мы примем второй ключевой элемент «Трёх народных принципов» и воспримем нашу национальную идентичность, ибо мы не китайцы, не русские и не маньчжуры, а халха-монголы, и другие нации должны уважать наше право на самоопределение!"

 MON_put_an_end_to_the_arat_system: "Покончить с системой аратов"
 MON_put_an_end_to_the_arat_system_desc: "Система аратов хорошо служила нам на начальном этапе социалистической революции, но при нынешних правительственных тенденциях стало очевидно, что её нужно реформировать до основания. В сотрудничестве с нашими китайскими друзьями мы можем применить систему хошунов Внутренней Монголии для наших нужд, значительно улучшив административное управление регионом!"

 MON_revoke_the_kyakhta_treaty: "Аннулировать Кяхтинский договор"
 MON_revoke_the_kyakhta_treaty_desc: "Компромиссы и уступки не знают границ, и мы готовы снова принять свою судьбу под защитой Республики. Обретя самоопределение, мы будем тесно союзничать с могущественнейшими державами Центральной равнины."

 MON_confrontations_with_warlords: "Столкновения с милитаристами"
 MON_confrontations_with_warlords_desc: "Разделённая на враждующие клики, жаждущие власти, Центральная равнина остаётся чрезвычайно опасным и нестабильным местом, где иностранные державы могут оказывать влияние. Имея ограниченные ресурсы, мы можем заключить союз с некоторыми региональными державами для расширения сферы влияния."

 MON_the_battle_for_tuva_uriankai: "Битва за Туву-Урянхай"
 MON_the_battle_for_tuva_uriankai_desc: "У нас общее наследие с народом Тувы-Урянхай, только Русская революция и китайский империализм создали искусственные границы между людьми, разделившие нас на два государства. Мы можем преследовать цель реинтеграции этого государства в наши владения, но маловероятно, что [SOV.getAdjective] воспримут этот вопрос легкомысленно."

#Genden path
 MON_strong_leader_genden: "Сильный лидер Гэнден"
 MON_strong_leader_genden_desc: "Теперь, когда наш любимый лидер снова правит страной, необходимо, чтобы такой гений обладал всей полнотой власти в правительстве. Его правление начнёт новую эру, новый век для Монголии!"

 MON_independent_army_structure: "Независимая структура армии"
 MON_independent_army_structure_desc: "Некоторые армейские чины всё ещё пытаются отстаивать мнение, что руководство Гэндена — не более чем фарс, если рассматривать его в контексте интерпретации Революции. Пока политические комиссары сохраняют влияние в вооружённых силах, трудно проводить какую-либо идеологическую повестку без их вмешательства, и поэтому они представляют большую угрозу для нашего режима."

 MON_ensure_soldier_loyalty: "Обеспечить лояльность солдат"
 MON_ensure_soldier_loyalty_desc: "Мы реформируем систему политического воспитания, чтобы она лучше соответствовала целям текущего правительства, а не общей идеологии масс. Солдаты должны знать, за что и за кого они воюют."

 MON_reform_the_high_command: "Реформировать верховное командование"
 MON_reform_the_high_command_desc: "Офицеров высшего ранга нельзя оставлять в стороне в ходе этих прогрессивных реформ, особенно учитывая, что их лояльность постоянно колеблется между различными политическими силами и режимами."

 MON_mongolian_peoples_army: "[ROOT.getAdjective] Народная армия"
 MON_mongolian_peoples_army_desc: "Новая армейская структура воплощает совершенство в своей основе: лояльные солдаты, следующие приказам преданных делу высокопоставленных офицеров — идеальное сочетание для истинного монгольского народа."

 MON_incorporate_buddhism: "Интегрировать буддизм"
 MON_incorporate_buddhism_desc: "В одной из своих ранних работ Гэнден сказал, что у него есть два идола, которым он всегда будет следовать: Владимир Ильич Ленин и Будда. Многие могут задаться вопросом, как можно объединить такой конгломерат идеологий. Ключ к этому — включение буддийской религии в государственную повестку, что значительно расширит народную поддержку нынешнего правителя."

 MON_dealing_with_soviet_sympathisers: "Разобраться с [SOV.getAdjective] симпатизантами"
 MON_dealing_with_soviet_sympathisers_desc: "Внутренняя стабильность и безопасность нашего правительства находится под постоянной угрозой со стороны ревизионистских про-[SOV.getAdjective] элементов, проникающих на наши собрания, встречи, конференции и съезды. Если мы хотим укоренить новые ценности в партии, некоторые из этих предателей должны заплатить за ошибки прошлого."

 MON_continue_new_course_policy: "Продолжить политику Нового курса"
 MON_continue_new_course_policy_desc: "Политика Нового курса представляет собой интерпретацию ленинской «Новой экономической политики» начала 1920-х годов с монгольской спецификой. Некоторые её элементы могут быть дополнительно усилены для лучшего обслуживания экономики государства."

 MON_get_rich: "Обогащайтесь!"
 MON_get_rich_desc: "Долгожданная и обещанная кооперативная политика Пэлжидийн Гэндэна «Обогащайтесь!» направлена на то, чтобы позволить простым людям накапливать богатство независимо от государственного контроля и надзора, позволяя [ROOT.getNameDef] использовать лучшие элементы капитализма для развития социализма!"

 MON_empower_hudonets: "Дать власть худунцам"
 MON_empower_hudonets_desc: "Люди из бедных районов различных аймаков, худуны, также известны на местах как худунцы, и многие из них присутствуют в правительстве как часть партийного крыла, возглавляемого самым худунцем из всех, Гэндэном. Предоставление некоторым из них большей власти обеспечит сильный экономический рост в бедных районах."

 MON_provide_for_the_people: "Обеспечить народ"
 MON_provide_for_the_people_desc: "От богатых к бедным, от бедных к богатым — круговорот средств всё равно заканчивается в кулаках правительства. Мы обеспечим надлежащие средства для всех, независимо от их богатства или социального статуса."

 MON_abolish_the_secretary_system: "Упразднить систему секретарей"
 MON_abolish_the_secretary_system_desc: "Система равного правления трёх партийных секретарей, установленная в 1928 году, изжила себя. Разделение власти привело эту страну в пучину политических и экономических кризисов последних лет, и чтобы предотвратить очередной захват власти, она должна быть отменена раз и навсегда."

 MON_subsidise_the_military: "Субсидировать армию"
 MON_subsidise_the_military_desc: "Оборонная промышленность пережила сильный спад в последние годы, но с помощью нескольких государственных субсидий её можно модернизировать и расширить, что позволит нам укрепить наши военные возможности и усилить недооснащённые армии."

 MON_leader_of_the_equal: "Лидер равных"
 MON_leader_of_the_equal_desc: "Гэнден доказал народу, что способен управлять страной в эти суровые времена. Под его руководством [ROOT.getNameDef] последует пути религиозного социализма и будет стремиться к объединению подобных людей в одном государстве."

 MON_promote_religious_socialism: "Продвигать религиозный социализм"
 MON_religious_socialism_desc: "Мы вышли победителями из прошлых испытаний, что позволяет нам сосредоточиться на укреплении и продвижении наших ценностей в сердцах людей. На политической арене возникает новая сущность — сущность религиозного социализма, который подходит нашей процветающей стране."

 MON_support_buddhist_monasteries: "Поддержать буддийские монастыри"
 MON_support_buddhist_monasteries_desc: "Поскольку наше дело благородно и не угнетает, мы можем искать сотрудничества со многими религиозными институтами нашей страны, которые могут оказать поддержку нашему режиму и обеспечить, чтобы вновь построенная система крепко держалась за свои ценности."

#ANCOM
 MON_oust_genden: "Свергнуть Гэндэна"
 MON_oust_genden_desc: "Правление Гэндэна принесло лишь разрушение [ROOT.getAdjective] экономике, промышленности и социальным институтам. Люди устали от угнетающих диктаторов и постоянных смен режима. Вероятно, лучше вообще не иметь правительства."

 MON_changes_within: "Перемены изнутри"
 MON_changes_within_desc: "Первый шаг к анархистскому состоянию ума заключается в изменениях экономической структуры, принятой государством как институтом ранее. Мы будем поощрять идеи общинной собственности, свободное гражданское обслуживание и ограниченные торговые сделки с нашими ближайшими соседями."

 MON_spread_of_anarcho_communism: "Распространение идей АНКОМа за рубежом"
 MON_spread_of_anarcho_communism_desc: "Идеи назревающей анархистской революции не могут быть ограничены линиями, нарисованными на картах какими-то политиками в прошлом. Пусть слово распространится, ибо Революция Разума грядёт к ним!"

 MON_full_social_equality: "Полное социальное равенство"
 MON_full_social_equality_desc: "Прежние государственные структуры делали сильный упор на неравное распределение богатства, собственности и структурных ролей в обществе. Такая ерунда не для народных коммун Монголии!"

 MON_abolish_the_currency: "Упразднить валюту"
 MON_abolish_the_currency_desc: "Само назначение валюты можно считать устаревшим, если торговля происходит на местном уровне и регулируется на местах. Да, иногда это может быть неэффективно, но имеет ли это значение, если это работает на данный момент?"

 MON_workers_control_and_discipline: "Рабочий контроль и дисциплина"
 MON_workers_control_and_discipline_desc: "Без высшего регулирующего института некоторые рабочие, кажется, забыли всю цель анархо-коммунистической революции, где они работают на своё же благо и благо коммуны. Подкрепление таких идей в форме ежегодных коммунальных собраний — стоящее дело."

 MON_eradicate_private_property: "Искоренить частную собственность"
 MON_eradicate_private_property_desc: "Частная собственность представляет собой саму суть капитализма, направленную на изменение права собственности на средства производства и распределения, что можно рассматривать лишь как враждебное отклонение от естественных процессов, происходящих в обществе. Однако простые граждане не должны бояться, ибо личная собственность останется в руках её законных владельцев."

 MON_remove_hierarchical_structures: "Устранить иерархические структуры"
 MON_remove_hierarchical_structures_desc: "Ни один свободный человек или свободная женщина не может быть взят(а) под стражу, заключен(а) в тюрьму, лишен(а) владения, объявлен(а) вне закона, изгнан(а) или каким-либо образом уничтожен(а), и Мы не будем выступать против него или преследовать его, кроме как по законному приговору равных ему, при этом высшая власть принадлежит народной коммуне."

 MON_finalize_state_reforms: "Завершить государственные реформы"
 MON_finalize_state_reforms_desc: "Многие люди видят нашу маленькую Революцию как первый шаг более крупного предприятия, направленного на распространение и установление наших ценностей за границами и достижение самых отдаленных уголков мира, гарантируя, что коммунальная Революция появится и там в другой день."

#Anti-Soviet focuses
 MON_form_the_provisional_government: "Образовать временное правительство"
 MON_form_the_provisional_government_desc: "Наше правительство в опасности: делегация высших государственных чиновников была задержана в Москве, и их судьба неизвестна. Мы сформируем временное правительство, целью которого является обеспечение стабильности государства на данный момент."

 MON_assists_deviants_struggle: "Помочь борьбе уклониста"
 MON_assists_deviants_struggle_desc: "Новости о заключении Гэндэна достигли Улан-Батора несколько дней назад, и такой гигант мысли не может быть оставлен гнить в одиночной камере на Лубянке. Мы поможем храброму герою Монголии всеми возможными способами."

 MON_infiltrate_the_railway_system: "Внедриться в систему железных дорог"
 MON_infiltrate_the_railway_system_desc: "Его местонахождение хорошо известно, но остаётся вопрос, какой маршрут будет выбран для его отправки поездом на юг. Лучше всего задействовать старые связи в Народном комиссариате путей сообщения Советского Союза, чтобы получить жизненно важную информацию о запланированном маршруте к «отставке»."

 MON_return_of_prodigal_son: "Возвращение блудного сына"
 MON_return_of_prodigal_son_desc: "Нам удалось получить планы возможного маршрута Гэндэна к его новому «месту реабилитации» на Крымском полуострове. Пришло время использовать все средства в нашем распоряжении, чтобы обеспечить его безопасное возвращение на Родину."

 MON_appeal_to_china: "Обратиться к Китаю"
 MON_appeal_to_china_desc: "Поскольку [SOV.getAdjective] бросили нашего лидера, а [JAP.getAdjective] ищут свою собственную судьбу, у нас нет иного выбора, кроме как обратиться к тем, кто правил нами прежде, и искать взаимовыгодное сотрудничество с ними."

 MON_matters_of_internal_affairs: "Вопросы внутренних дел"
 MON_matters_of_internal_affairs_desc: "Поскольку народная поддержка сталинского правления падает по всей стране, было бы разумно искать другие пути улучшения внутренней стабильности нашей находящейся в опасности нации."

 MON_strengthen_buddhist_community: "Укрепить буддийскую общину"
 MON_strengthen_buddhist_community_desc: "Понятие [ROOT.getAdjective] буддизма можно описать как пацифистское и антиреволюционное; многие ламы выражают поддержку установлению более консервативного и защитного правительства, которое не стремится угнетать крупнейшую и сильнейшую религиозную общину нации."

 MON_search_new_bogd_khan: "Поиск нового Богдо-хана"
 MON_search_new_bogd_khan_desc: "Запрещённый [SOV.getAdjective], а затем и [ROOT.getAdjective] коммунистическими властями, поиск 9-го перерождения Джебцзундамба-хутухты может быть проведён в тайне, если мы стремимся к восстановлению церемониальной конституционной монархии в ближайшем будущем."

 MON_proclaim_the_second_bogd_khanate: "Провозгласить Второе Богдо-ханство"
 MON_proclaim_the_second_bogd_khanate_desc: ""

 MON_guard_southern_border: "Охранять южную границу"
 MON_guard_southern_border_desc: "Отчёты из аймаков Говь-Алтай, Өмнөговь и Дорноговь показывают вероломный характер местных групп, которые злоупотребляют слабым контролем правительства над протяжённой южной границей, обогащаясь за счёт постоянных рейдов и грабежей невинных деревень. Мы отправим несколько вновь сформированных эскадронов для борьбы с этой угрозой."

 MON_ensure_rural_support: "Обеспечить поддержку в сельской местности"
 MON_ensure_rural_support_desc: "Сельская местность в значительной степени не осведомлена о происходящем в высшей администрации, и некоторые чувствуют неуверенность в связи с текущими переменами в стране. Мы постараемся примириться со многими местными старейшинами, инвестируя в их развитие. Дорогое, но стоящее дело."

 MON_shelter_the_banished: "Укрыть изгнанных"
 MON_shelter_the_banished_desc: "Наши силы, отправленные в южные аймаки, сообщают о возросшем количестве политических беженцев из соседних государств, включая некоторых левых членов и бывших высокопоставленных партийных чиновников из [PRC.getNameDef], что предполагает радикальные правительственные изменения там. Вместо того чтобы просто игнорировать их, мы можем использовать их помощь для построения нового типа коммунистического государства."

 MON_the_new_chairman: "Новый председатель"
 MON_the_new_chairman_desc: ""

 MON_rally_the_radicals: "Сплотить радикалов"
 MON_rally_the_radicals_desc: "Панмонголизм — это заметное движение, присутствующее во всех уголках нашей большой страны, но многим из этих радикалов не хватает должной организации и поддержки со стороны оппозиции, которая всё ещё значительно уступает по численности на обширной политической арене. Применяя необходимые средства, мы можем косвенно гарантировать, что эти голоса будут становиться громче день ото дня."

 MON_host_emergency_great_khural_assembly: "Созвать чрезвычайное собрание Великого хурала"
 MON_host_emergency_great_khural_assembly_desc: "Мы опасались этого, но отрицать нельзя: [SOV.getNameDef] и его официальные лица официально заявили, что они больше не заинтересованы в поддержке обороны нашего государства от внешней угрозы. Великий хурал должен немедленно провести конференцию для обсуждения государственной политики и дипломатической ориентации текущего режима."

 MON_approach_japan: "Обращение к Японии"
 MON_approach_japan_desc: "Слухи распространяются быстро, и поэтому мы открыты для любого рода политического и военного вмешательства со стороны наших прямых и косвенных соседей. Страх перед возобновлением [CHI.getAdjective] оккупации наших земель велик, поэтому нам, возможно, придётся обратиться к врагам наших врагов: [JAP.getNameDef] и искать их поддержки в разгорающейся правительственной борьбе."

 MON_invite_pince_su: "Пригласить принца Су?"
 MON_invite_pince_su_desc: "Мы почти уверены, что [JAP.getAdjective] интерес к нашим землям носит не только экспансионистский, но и партнёрский характер. Некоторые из их агентов уже обращались к различным государственным чиновникам в недавнем прошлом, предлагая хорошую долю прибыли, если [JAP.getAdjective] инвесторы смогут экономически помочь нашему государству, а их советники — поддержать развитие нашей армии."

 MON_launch_a_coup: "Совершить переворот"
 MON_launch_a_coup_desc: ""

#events#
 mongol.2.t: "Монголия предлагает Договор о взаимной помощи"
 mongol.2.d: "Ожидалось, что запланированная на этот вечер встреча будет напряжённой, но никто не думал, что она разовьётся именно так. После обычного тоста [SOV.getLeader] за «рабочих и крестьян [MON.getNameDef] и [SOV.getNameDef]» обсуждение перешло к теме общего будущего СССР и Монголии.\nИ пока [MON.getLeader] отстаивал идею [MON.getAdjective]ой независимости на фоне постоянно растущего [SOV.getAdjective]ого присутствия и влияния в стране, начальник генерального штаба Гэлэгдоржийн Дэмид обратился к Вождю и предложил усилить сотрудничество между государствами. \n\nПотрясённое лицо [MON.getLeader] и довольная реакция [SOV.getLeader] оставили много вопросов о том, чем в итоге обернутся отношения двух лидеров. Объясняя свою позицию, Дэмид указал, что «джентльменское соглашение» 1934 года срочно нуждается в пересмотре из-за тревожно высокого присутствия [JAP.getAdjective]их сил в [MEN.getNameDef] и высокой напряжённости после прошлогодней битвы у храма Халхин. Соглашение должно включать взаимовыгодное промышленное и военное сотрудничество, а также взаимные гарантии независимости в случае военного конфликта с другой державой. \n\nКаким будет решение генсека?"
 mongol.2.a: "Согласиться на предоставление помощи"
 mongol.2.b: "Отказаться от Монголии"

 mongol.3.t: "СССР соглашается на договор"
 mongol.3.d: "Предложение Демида было встречено с огромным энтузиазмом среди [SOV.getAdjective], причём [SOV.getLeader] одобрительно похлопал улыбающегося молодого генерала по плечу, а затем обсудил с ним некоторые детали договора: экономические инвестиции, передачу вооружения и снаряжения, размещение [SOV.getAdjective] солдат, военные учебные центры, потенциальные оборонительные линии, контроль за пограничным патрулированием и многое другое. \n\n[MON.getLeader], похоже, забытый всеми, кроме начальника НКВД Ягоды, который затем сделал несколько пометок в своём блокноте, был оставлен в стороне пить коньяк, принесённый одним из [SOV.getAdjective] генералов. Несколько минут спустя обсуждение других"
 mongol.3.a: "Мы рады, что они согласились."

 mongol.4.t: "СССР бросает нас!"
 mongol.4.d: "Заявив, что «[SOV.getNameDef] имеет много неотложных дел в области внутренней стабильности, а также некоторые острые напряжённости на Западе, и поэтому не может в данный момент сосредоточиться на развитии Дальнего Востока», [SOV.getLeader] отклонил предложение подписать «Договор о дружбе и сотрудничестве» при текущих обстоятельствах. \n\nПозже разочарованного Демида видели тихо обсуждающим с взволнованным [MON.getLeader], на чём Монголии следует сосредоточиться в следующем раунде переговоров."
 mongol.4.a: "Хорошо, если они того желают"

 mongol.5.t: "Монголия предлагает сосредоточиться на самообеспечении"
 mongol.5.d: "[MON.getAdjective]ая делегация под руководством [MON.getLeader] уже давно настаивает на идее [MON.getAdjective]ой самостоятельности в оборонных расходах и международных отношениях на Дальнем Востоке. Хотя де-юре они являются независимым государством, они по-прежнему сильно зависят от нашего экономического, промышленного и военного руководства, фактически оставаясь управляемым, а если говорить прагматичнее, нашим марионеточным государством.\nУчитывая растущее [JAP.getAdjective]ое присутствие в Маньчжурии и их жадные взгляды на богатые ресурсами районы Забайкалья, мы могли бы усилить своё присутствие и разместить войска на [MON.getAdjective]ой земле. С другой стороны, такой шаг может ещё сильнее повысить и без того тревожную напряжённость между ними и [JAP.getNameDef]. \nВзвесив все за и против, [SOV.getLeader] решил, что..."
 mongol.5.a: "...эти условия приемлемы."
 mongol.5.b: "...мы лучше поддержим наших «братьев»."

 mongol.6.t: "[SOV.GetAdjective] одобряют запрос"
 mongol.6.d: "После некоторых размышлений [SOV.getLeader] убедительно заявил, что вопросы внутренней политики и государственных расходов [MON.getAdjective] «имеют [MON.getAdjective] происхождение и должны регулироваться только ими», тем самым одобрив наш запрос на автономию в этих областях. Некоторые [SOV.getAdjective] военные контингенты останутся в важных районах на несколько месяцев, чтобы обеспечить безопасность уязвимых приграничных регионов. \nС успехом этой идеи мы наконец можем сосредоточиться на продвижении [MON.getadjective] в желаемом политическом направлении без какого-либо риска вмешательства со стороны [SOV.getAdjective], по крайней мере сейчас."
 mongol.6.a: "Отлично!"

 mongol.7.t: "СССР всё ещё рассматривает возможность отправки поддержки"
 mongol.7.d: "«Нет более важного дела, чем защита Народной Революции и безопасность коммунистических режимов в наших братских государствах», — заявление [SOV.getLeader] чётко указывало на то, что они не видят причин предоставлять нам даже ограниченную автономию в этих вопросах. \nРасстроенного [MON.getLeader] видели тревожно ищущим поддержки среди других членов [MON.getAdjective] делегации, большинство из которых были заметно расстроены, за исключением главнокомандующего Демида, который выступал за более интенсивное [SOV.getAdjective]-[MON.getAdjective] военное сотрудничество."
 mongol.7.a: "Ладно"

 mongol.8.t: "Пригрозить [SOV.getLeader] Японией?"
 mongol.8.d: "[SOV.getAdjective] всё ещё могут заблуждаться относительно угрозы, которую [JAP.getNameDef] представляет в последние годы. Благоразумно напомнить им, кто является Истинным Врагом Революции и главным империалистом Восточной Азии.\n\nС другой стороны, учитывая, что нашу делегацию возглавляет импульсивный и свободомыслящий [MON.getLeader], который, вероятно, сделает объявление, так сказать, необычным и провокационным образом, возможно, лучше не поднимать эту тему, так как [SOV.getLeader] может быть не в настроении выслушивать такие заявления."
 mongol.8.a: "Сделать это!"
 mongol.8.b: "Давайте пересмотрим"

 mongol.9.t: "[MON.getLeader] угрожает нам Японией"
 mongol.9.d: "Неторопливый и тихий разговор о революционных методах в обоих наших государствах, последовавший за рассказом [SOV.getLeader] о его пролетарской деятельности, был внезапно прерван сильно пьяным [MON.getLeader], который встал со стула, крича в лицо Вождю: «Ты, чертов грузин, стал настоящим русским царём», затем подошёл к Генсеку, ударил его по лицу, крича: «Даже [JAP.getAdjective] лучшие союзники, чем ты», после чего по залу конференции прокатилась мёртвая тишина. \n\nНикто раньше не делал ничего подобного по отношению к Генсеку, поэтому встаёт вопрос о том, как [SOV.getLeader] отреагирует на это?"
 mongol.9.a: "Осознать, что угроза реальна"
 mongol.9.b: "Проигнорировать доводы"
 mongol.9.c: "Генден — японский агент?"

 mongol.10.t: "[SOV.GetAdjective] отправляют помощь"
 mongol.10.d: "Впечатляющая речь [MON.getLeader] о современном [SOV.getAdjective] царе, заботящемся в основном о собственном благе, привела к тому, что многие иностранные делегаты осознали, что в их видении ситуации на Дальнем Востоке что-то определённо не так. После некоторых переговоров облегчённая [MON.getAdjective] делегация была приглашена подписать соглашение, укрепляющее сотрудничество между нашими двумя странами! \n\n[MON.getLeader] определённо был героем вечера, несмотря на явно раздражённого [SOV.getLeader], который большую часть вечера молчал, сидя в кресле в тёмном углу комнаты и беседуя с Генрихом Ягодой о каких-то «несущественных внутренних делах»."
 mongol.10.a: "Сработало? Ура!"

 mongol.11.t: "Руководство СССР игнорирует угрозу"
 mongol.11.d: "Медленно набивая новую трубку табаком, [SOV.getLeader] указал на [MON.getLeader] и выразил глубокую обеспокоенность психическим состоянием нынешнего представителя [MON.getNameDef], отметив, что чрезмерное употребление алкоголя и кулачные драки не помогут ни одному дипломату склонить оппонента на свою сторону. Более того, такие методы явно излишни для этих мелких нарушителей спокойствия на Востоке. \n\nЧерез несколько минут [SOV.getLeader] распорядился объявить высшему командованию Союза, что восточная угроза имеет наименьшее значение, а у [SOV.getAdjective]их чиновников есть «более важные дела», ясно показав пренебрежительное отношение к такому грозному противнику, как [JAP.getNameDef]."
 mongol.11.a: "Похоже, мы сами по себе"

 mongol.12.t: "[SOV.GetAdjective] арестовывают Гендена?!"
 mongol.12.d: "Ответ генсека прозвучал медленно и спокойно, будто воцарившаяся тишина придавала ему силы говорить. \nВо-первых, он указал на бессмысленность подобных доводов, особенно учитывая, что НКВД работает над этим делом гораздо дольше, чем [MON.getLeader] занимает свой пост. \nВо-вторых, [SOV.getLeader] усомнился в «странной» фразе о «дружбе с Японией» и спросил, неужели [MON.getAdjective]ие товарищи действительно собираются искать защиты у тех, кто угнетает рабочий класс. И в-третьих, наконец, он указал на [MON.getLeader] и, наблюдая испуганное лицо последнего, поставил под сомнение его преданность Революции и Отцу народов Владимиру Ильичу Ленину. \n\nЧерез несколько минут в комнату вошли несколько сотрудников НКВД во главе с Генрихом Ягодой и вежливо попросили пьяного [MON.getLeader] проследовать с ними для личного обсуждения столь горячей темы. Оставшаяся делегация, как ожидается, вскоре покинет Москву, чтобы доставить новости в Улан-Батор."
 mongol.12.a: "Что мы теперь можем сделать?"

 mongol.13.t: "[MON.GetAdjective] делегация возвращается в Улан-Батор"
 mongol.13.d: "Делегация в составе [MON.getLeader], Гелегдоржийн Демида и нескольких других партийных чиновников наконец вернулась из Москвы после примерно месячного отсутствия в правительственных структурах. Сначала они поездом добрались до Иркутска, где группе были предоставлены несколько [SOV.getAdjective] автомобилей и грузовиков для обеспечения безопасного возвращения в [MON.getAdjective] столицу. \n\nПосле всех переговоров, дипломатических манёвров, предложений и контрпредложений они наконец вернулись в свои кабинеты и созывают через несколько дней Седьмой Великий Хурал для обсуждения итогов конференции и определения нового курса страны на предстоящие годы."
 mongol.13.a: "Какие новости будут представлены вскоре?"

 mongol.14.t: "[MON.GetAdjective] поезд возвращается пустым"
 mongol.14.d: "Сопровождение делегации из двенадцати телохранителей и нескольких помощников уже несколько дней ждёт на главном вокзале Иркутска, однако поезд с делегацией прибыл только сейчас, и некоторые из вернувшихся членов утверждают, что Генден остался в Москве для обсуждения каких-то «срочных и очень необходимых вопросов» в местной гостинице «Лубянка», как сообщили некоторые [SOV.getAdjective]. \n\nОдин из телохранителей Гендена, вспомнив свой прежний опыт учёбы в Москве, немедленно выразил обеспокоенность по поводу здания штаб-квартиры НКВД с тем же названием, намекая тем самым, что наш храбрый лидер был там заключён..."
 mongol.14.a: "Где наш лидер?!"

 mongol.15.t: "[GetYear] Созыв Великого Хурала"
 mongol.15.d: "Заседание Седьмой сессии Государственного Великого Хурала никогда не было таким полным, как сегодня. Многие министры, представители, нижестоящие государственные чиновники и представители прессы сейчас смотрят на главную трибуну, где находятся лидеры делегации, готовые объявить итоги часов и дней обсуждений, проведённых в Москве с их [SOV.getAdjective] коллегами. \n\nПосле круга приветственных оваций глава делегации, [MON.getLeader], поднимается со своего стула. Сотни любопытных и нетерпеливых глаз смотрят на крепкую фигуру премьер-министра, он подходит к микрофону и произносит единственную фразу..."
 mongol.15.a: "[SOV.GetAdjective] оказали нам помощь!"
 mongol.15.b: "Наша самостоятельность была обеспечена!"
 mongol.15.c: "Нас бросили!"



#### RAIDS EVENTS #################

 mongol.19.t: "Обнаружено чрезмерное передвижение [MON.getAdjective] войск"
 mongol.19.d: "Наши пограничные патрули сообщили об увеличении численности [MON.getAdjective] войск, скапливающихся на одной из наших границ в последние несколько дней. Недавно перехваченные радиопереговоры позволяют предположить, что они планируют какую-то военную операцию на наших землях. \nИх точная цель пока неизвестна, но ясно, что эти полки не к добру. Нашим солдатам необходимы быстрые действия и контрмеры для эффективной защиты от недавно возникшей угрозы."
 mongol.19.a: "Отдать приказ удерживать позиции любой ценой!"
 mongol.19.b: "У нас есть дела поважнее, чем эти бандиты."

#small raids - outcomes#
 mongol.20.t: "Малый рейд успешен"
 mongol.20.d: "Отправленный отряд эффективно проник в оборонительный периметр противника и, не встретив практически никакого сопротивления, сумел проникнуть в местную деревню под видом местного ополчения, захватить плохо охраняемое оружие с местных складов, погрузить его на лошадей и исчезнуть в темноте, не поднимая тревоги и не причиняя вреда гражданскому населению в этом районе. \n\nВозвращаясь на базу, наши солдаты сообщили о некоторых образцах оружия, которые можно использовать для улучшения наших собственных конструкций — очень желанное дополнение для использования в следующем рейде."
 mongol.20.a: "Принести трофеи и изучить их!"

 mongol.21.t: "Малый рейд провален"
 mongol.21.d: "Наступательная группа выдвинулась по плану и, не встретив сопротивления, успешно пересекла спорную границу, намереваясь добраться до местного поселения до восхода солнца, как вдруг наши силы попали в засаду, устроенную неизвестной ударной группой. Похоже, что тщательно спланированная ловушка была подготовлена заранее, словно каждый шаг наших сил был предугадан. \n\nНашим войскам удалось обеспечить безопасный проход и быстро отступить на свои территории. Некоторые ранены, многие потеряли оружие, и ещё больше чувствуют себя деморализованными, казалось бы, превосходящим противником."
 mongol.21.a: "Боевой дух наших солдат сломлен..."

 mongol.22.t: "Наступление остановлено"
 mongol.22.d: "Какое-то движение было замечено на горизонте, когда наш рейдовый отряд продвигался на территорию противника. Через несколько часов наш батальон столкнулся с наступающим отрядом противника, короткая перестрелка переросла в ожесточённый бой после того, как нетерпеливые солдаты с обеих сторон открыли огонь. \n\nПерестрелка длилась несколько часов, после чего обе стороны отступили в свои штабы для перегруппировки, восстановления сил и пополнения боеприпасов. Цель операции, к сожалению, не была достигнута, однако некоторые применённые тактика и манёвры позволили нам получить ценный опыт."
 mongol.22.a: "Очень хорошо. Наши войска извлекли ценный урок."

 mongol.23.t: "Малый рейд отражён"
 mongol.23.d: "Быстрая мобилизация наших резервов и стремительная отправка сил предотвратили потенциальную катастрофу. \nПо мере того как наступающие [MON.getAdjective] войска продвигались вглубь нашей территории, бдительные пограничные полки следовали за ними и наблюдали за ситуацией издалека, в то время как регулярные войска готовили поле боя для этих ничего не подозревающих бандитов. \n\nПрямо перед тем, как должно было начаться запланированное основное сражение, один из наших импульсивных командиров приказал войскам вступить в бой с противником, заставив другие отряды последовать за стремительным наступлением и позволив рейдерам вырваться из потенциального окружения и исчезнуть в темноте, оставив, однако, много оружия, которое мы можем использовать в своих интересах."
 mongol.23.a: "Победа для нашего народа!"

 mongol.24.t: "Небольшая [MON.GetAdjective] группа совершила налёт на наши границы"
 mongol.24.d: "Ранее сегодня пограничный патруль обнаружил следы, по-видимому, вражеского отряда, который пересёк нашу границу не позднее, чем несколько дней назад. Отпечатки ног и следы подков указывают на то, что враждебная группа состояла из нескольких десятков легко вооружённых людей в сопровождении кавалерийского полка, следовала по дороге, ведущей к местному складу боеприпасов, успешно нейтрализовала ничего не подозревающую охрану и покинула место следующей ночью, забрав с собой большую часть находившихся на складе боеприпасов. \n\nСлух о «Призрачных всадниках» уже начал распространяться среди местного населения. Небольшой полицейский гарнизон будет направлен в спорный район для контроля за охраной региона в течение следующих нескольких недель."
 mongol.24.a: "Мы потеряли несколько ценных людей и ресурсов!"

 mongol.25.t: "Достигнута позиционная война"
 mongol.25.d: "Вражеский рейдовый отряд был замечен несколькими наблюдательными крестьянами, которые немедленно доставили тревожное сообщение капитану местного полицейского отряда. Тот направил «делегацию для встречи» в спорный район с целью замедлить продвижение противника. \n\nПосле короткого раунда переговоров обе стороны открыли огонь, заявляя, что они лишь стремятся защитить свои интересы и устранить растущую угрозу с другой стороны. Бой продолжался до темноты, когда противник собрал оставшиеся силы и отступил, оставив наших солдат залечивать раны и учиться на этом столкновении."
 mongol.25.a: "Очень хорошо. Наши войска извлекли ценный урок."

#medium-sized-raids
 mongol.26.t: "Средний рейд успешен"
 mongol.26.d: "Несколько недель интенсивного планирования и тщательной подготовки окупились: несколько наших дивизий прорвали границу противника в нескольких местах, чтобы затем встретиться вместе, преодолеть охрану местного гарнизона, охранявшего военную базу, проникнуть на склады боеприпасов и изъять для нашего использования несколько образцов современного военного снаряжения. \n\nПосле того как сработала тревога, наши отряды спрятали полученные инструменты и безопасно переправили их на нашу сторону границы по хорошо налаженным и охраняемым коридорам. Местный командир с восторгом сообщил, что новые образцы можно использовать для оснащения наших войск или в научных целях."
 mongol.26.a: "Больше снаряжения для использования! Чудесно!"
 mongol.26.b: "Очень хорошо. Используйте их для испытаний."

 mongol.27.t: "Средний рейд отражён"
 mongol.27.d: "Стремительное и несколько опрометчивое продвижение наших вооружённых сил было перехвачено вражеским пограничным патрулём, который немедленно открыл огонь на поражение. Наши войска удерживали более выгодную позицию, пытаясь создать прочную оборонительную линию и перестроить порядки для нового наступления до того, как к спорному району подойдут вражеские подкрепления. \n\nПротивник, по-видимому, хорошо знал нашу тактику, поскольку до того, как наша контратака могла начаться, вражеский кавалерийский полк провёл фланговый манёвр, посеяв хаос на плохо защищённых флангах и уничтожив часть наших сил в ближнем бою, что дало остальной группе вторжения возможность собрать шокированных выживших и установить бр"
 mongol.27.a: "Многие матери будут оплакивать своих сыновей сегодня..."

 mongol.28.t: "Продвижение рейдовой группы задерживается"
 mongol.28.d: "Первый этап операции был проведён в соответствии с первоначальным планом на большинстве участков за одним исключением, которое, однако, оказалось жизненно важным. Полк должен был выдвинуться к одной из укреплённых позиций противника и перерезать линии связи, предоставив остальным нашим силам необходимое время для проникновения на спорную территорию без особых проблем. \n\nОднако красная тревога была поднята после того, как заклинившая винтовка одного из наших солдат произвела, по-видимому, случайный выстрел, вынудив противника вступить в ближний бой с нашими войсками. Окно возможностей было упущено, и без сигнала к продолжению оставшиеся силы были вынуждены отступить на исходные позиции, в то время как уже окопавшиеся отря"
 mongol.28.a: "Улучшить наши полки."
 mongol.28.b: "Хорошо. Придумать другую тактику для изучения."

 mongol.29.t: "Средний рейд уничтожен"
 mongol.29.d: "Наивные вражеские захватчики думали, что могут безнаказанно вторгаться на наши земли и угрожать нашему народу этими надоедливыми атаками на гражданские и военные объекты! Пограничные патрули сообщили об успешном уничтожении вражеской рейдовой группы, намеревавшейся украсть и разграбить наши земли! \n\nПродвижение врага было обнаружено, и их группа была перехвачена в районе, где стратегическое преимущество было на нашей стороне, что позволило храброму кавалерийскому отряду обойти врага с фланга и нанести удар в самое сердце этой напасти, вынудив остатки бандитов отступить туда, откуда они пришли. Трофеи вручаются солдатам, а местный командир получает очередную медаль!"
 mongol.29.a: "Мы гордимся нашим ополчением и армией!"

 mongol.30.t: "[MON.GetAdjective] дивизии совершили налёт на наш склад боеприпасов"
 mongol.30.d: "После того как местный гарнизон приграничной военной базы не ответил по обычной линии связи, была объявлена полная мобилизация вооружённых сил в регионе и введено военное положение, прежде чем паника успела распространиться среди населения. \n\nЛишь несколько часов спустя, когда стремительно продвигавшаяся кавалерия достигла позиций, открылся весь ужас действий врага: всё учреждение было лишено не только производственных материалов, но и станков, а также недавно произведённого и хранившегося оборудования. Учитывая столь серьёзный ущерб, нанесённый экономике и военному потенциалу, жизненно важно обеспечить, чтобы подобное не повторилось в будущем."
 mongol.30.a: "Теперь нам многое придётся отстраивать заново"

 mongol.31.t: "Рейдовая группа перехвачена"
 mongol.31.d: "Один из наших укреплённых районов поднял глобальную тревогу после того, как проникший вражеский отряд произвёл выстрел неизвестной природы. Так или иначе, солдаты были направлены на позиции, чтобы попытаться вытеснить противника из хорошо укреплённых оборонительных линий. \n\nБой продолжался ещё несколько часов, и поскольку ни одна из сторон не получила явного преимущества, противник отступил, оставив местный гарнизон гадать о возможных мотивах столь безрассудного рейда. Другие пограничные патрули также сообщили о некотором увеличении активности противника на своих участках."
 mongol.31.a: "Мы всегда готовы отразить их наступления!"
 mongol.31.b: "Отлично! Учиться у врага."

####################### POLITICAL EVENTS ####################

 mongol.35.t: "Разбирательство с Генденом"
 mongol.35.d: "На недавнем заседании Великого Хурала протоколы нашей дипломатической миссии были представлены общественности, раскрыв всю противоречивость обсуждений и тактики ведения переговоров некоторых членов делегации. \n\nОдно имя упоминалось чаще других — это бывший премьер-министр Пэлжидийн Гэндэн. В то время как некоторые видят в его поведении проявление железной воли и сильного неповиновения, другие расценивают его вызывающие манеры как недостаток навыков, образования и ума, полагая, что такой человек не может в будущем занимать высокий политический пост. \n\nВ нашем распоряжении есть различные варианты. Каково будет решение мудрого [MON.getLeader]?"
 mongol.35.a: "Разрешить ему остаться на должности министра иностранных дел."
 mongol.35.b: "Отправить его на досрочную пенсию."
 mongol.35.c: "Такое поведение терпеть нельзя. Арестовать или, что ещё лучше, убить его!"

 mongol.36.t: "Смерть Гэлэгдоржийн Дэмида"
 mongol.36.d: "Сегодня утром правительственная канцелярия получила ужасающие новости с железнодорожной станции Тайга в Новосибирске: вся делегация, включая военного гения Гэлэгдоржийн Дэмида, командира корпуса Г. Джанцанхоролорла, секретаря [MON.getAdjective] посольства в [SOV.getNameDef] Гомбосурэна, главного армейского переводчика Т. Доржиева и его жены Л. Дагсмы, были найдены мёртвыми в своих спальных вагонах прошлым вечером. \n\nСогласно отчёту, предоставленному [SOV.GetAdjective] криминалистами, причиной смерти стало пищевое отравление плохо хранившимися консервированными рыбными продуктами. Этот инцидент — очень неудачный поворот событий для нашей страны, но, возможно, удачный для кого-то другого? Посмотрим..."
 mongol.36.a: "Подозрительное совпадение?!"

#Choibalsan plot
 mongol.37.t: "Бат-Очирын Элдэв-Очир выражает свою обеспокоенность"
 mongol.37.d: "Один из лидеров левой оппозиции, Бат-Очирын Элдэв-Очир, прибыл вечером после окончания рабочего дня в кабинет [MON.getLeader], чтобы обсудить «очень срочное дело». \n\nОсвещённый настольной лампой в кабинете, Элдэв-Очир тихо говорил о том, что многие из партийной элиты теперь опасаются за свою жизнь, учитывая стремительные изменения в политическом климате страны. Он также упомянул, что если Чойбалсан получит очередное военное или правительственное повышение, то его железная хватка над страной в сочетании с его контактами в НКВД может погрузить страну в очередное десятилетие политического насилия, чего следует избежать."
 mongol.37.a: "Чойбалсан слишком опасен, давайте подготовим восстание."
 mongol.37.b: "Уверьте его, что всё в порядке."

 mongol.38.t: "Левые захватывают власть!"
 mongol.38.d: "Утреннее заседание Государственного Хурала было прервано толпой, собравшейся перед зданием в знак протеста против недавно принятых законов. Протестующие утверждали, что эти законы служат только интересам правительственной элиты, а не обычных мужчин и женщин. Парламентскую охрану спешно усилили, чтобы предотвратить дальнейшее вмешательство в законотворческий процесс. \n\nПосле нескольких часов криков толпа позволила своим зачинщикам выйти вперёд и заявить охране, что сидящие в здании парламента действуют в личных интересах, а не в интересах масс, предъявив доказательства правительственной коррупции. Пока охрана была отвлечена, несколько вооружённых людей сумели незаметно проникнуть в здание, перерезать связь и распустить парламентское заседание. Затем последовала церемониальная процедура, в ходе которой [MON.getLeader] ушёл с поста премьер-министра и передал свои полномочия «временному» министру Бат-Очирыну Элдэв-Очиру."
 mongol.38.a: "Это ради всеобщего блага"

 mongol.39.t: "Чойбалсан совершает переворот!"
 mongol.39.d: "Несмотря на официальное заявление Малого Хурала о том, что политический курс страны вновь склонится влево на ближайшие пять лет, значительная часть сельского населения под руководством про-[SOV.getAdjective] элементов организовала массовые демонстрации по всей стране. Столкнувшись с полицией, некоторые протестующие раздобыли огнестрельное оружие и начали совершать налёты на плохо охраняемые склады боеприпасов по всей стране, якобы стремясь сформировать нерегулярные ополченческие формирования для борьбы с законным режимом! \n\nМы не можем позволить каким-то боевикам силой подавлять свободную волю народа, ибо пришло время навести порядок на землях, которыми нам суждено править!"
 mongol.39.a: "К оружию!"

#puppeting leftist Mongolia via the focus tree
 mongol.40.t: "Монголия ищет сближения"
 mongol.40.d: "Осознавая хрупкость своего недавно установленного режима, [MON.getNameDef] направила свою дипломатическую миссию, чтобы заверить наших чиновников в том, что их трактовка коммунизма совпадает с нашим взглядом на него. \n\nДелегация также представила несколько проектов договоров, которые должны укрепить связи между нашими двумя странами и согласовать правительственный курс Монголии с курсом, принятым [ROOT.getNamedef] и её руководством во главе с [SOV.getLeader], фактически превратив их режим в подконтрольное нам государство."
 mongol.40.a: "Хорошо, пришло время."
 mongol.40.b: "Это не имеет стратегического значения."

 mongol.41.t: "[SOV.getAdjective] соглашаются на сближение"
 mongol.41.d: "Наше предложение о расширенном сотрудничестве между двумя нашими государствами было встречено с большим воодушевлением [SOV.getAdjective] чиновниками, и после нескольких раундов обсуждений того, как вести различные внутренние и внешние дела, было решено подписать на следующий день «[SOV.getAdjective]-[MON.getAdjective] Договор о руководстве и помощи». \n\nСоглашение фактически закрепляет [SOV.getAdjective] контроль над государственным аппаратом в нашей стране, позволяя нам переключить наши правительственные усилия на укрепление позиций страны на международной арене и стремиться влиять на наших непосредственных соседей, одновременно продвигая революционное дело за рубежом."
 mongol.41.a: "Мы рады это слышать."

 mongol.42.t: "Советы отклоняют запрос"
 mongol.42.d: "Несмотря на все наши усилия и искренние обещания вечного союза, [SOV.getLeader] официально отклонил наше скромное предложение, заявив, что «[MON.getAdjective] трактовка принципов марксизма-ленинизма имеет ряд идеологических различий, которые при текущих обстоятельствах не позволяют государственным структурам обеих стран укрепить внутреннее и внешнее сотрудничество». \n\nУчитывая столь неожиданный ход событий, нам следует лучше укреплять собственный дипломатический фундамент и продвигать желаемые коммунистические идеи, используя собственные средства и методы."
 mongol.42.a: "Что ж, мы можем справиться и сами."

 mongol.49.t: "Тайный заговор?"
 mongol.49.d: "Революционные методы нашего коммунистического режима давно вызывают сомнения у разных слоёв народа, среди которых немало людей иностранного происхождения, религиозного воспитания или нетрадиционного образа мыслей. Несмотря на все наши усилия обратить многих представителей этих общественных кругов и отвратить их от гнилых идей капиталистического, империалистического или самодержавного происхождения, их голоса всё ещё звучат среди народа, расшатывая лояльность и сея сомнения в умах наших мужчин и женщин. \n\nПервоначальное расследование показывает, что вся пропагандистская деятельность этих людей восходит к одному кругу известных личностей, так или иначе связанных друг с другом. \n\nПолагая, что они координируют свои усилия, министр внутренних дел Хорлоогийн Чойбалсан подготовил план, как обезглавить заговор и уберечь государство от новой серии мятежей и восстаний."
 mongol.49.a: "Пришло время"

 mongol.50.t: "Проблема интеллигенции"
 mongol.50.d: "Образование нашего населения прогрессирует лучше, чем когда-либо, однако новые книги и учебные материалы потенциально посеяли капиталистические или националистические идеи в головах наших граждан. \nМногие молодые специалисты, вернувшиеся из программ студенческого обмена с [SOV.GetNameDef], обогатили наши школы, институты и исследовательские центры. Но остаётся вопрос: насколько им можно доверять? \n\nСколько из них несут в себе потенциальные семена контрреволюции и кому можно доверять? Мы должны знать наверняка, и методы хорошо известны..."
 mongol.50.a: "Провести массовые проверки «троек»."
 mongol.50.b: "У нас есть другие проблемы, о которых стоит беспокоиться."

 mongol.51.t: "Перетряска партии"
 mongol.51.d: "Наша партия разделена на левых, таких как Чойбалсан, правых, таких как Анандын Амар, и ходонцев, таких как бывший премьер-министр Пэлжидийн Гэндэн. Крайнее разделение партии привело к правым капиталистическим реформам 1926-1928 годов и к разрушениям, вызванным ультралевым подходом к коллективизации 1928-1932 годов. \n\nРезкие смены правительства оказывают негативное влияние на жизнь нашего народа. Постоянное смещение политического компаса может объясняться многими факторами, но главная причина ясна: наша партия пронизана иностранными агентами и пособниками [JAP.GetNameDef] или [CHI.GetNameDef]. Это терпеть нельзя, и несколько подозрительных членов, возможно, необходимо удалить из правительства."
 mongol.51.a: "Поставить всех под подозрение и тщательно проверить лояльность."
 mongol.51.b: "Может, проблема в нашей точке зрения?"

 mongol.52.t: "Проблема лам"
 mongol.52.d: "Буддизм глубоко укоренился в умах и сердцах наших граждан: 10% населения страны составляют ламы и монахи. Такой мощный блок нельзя игнорировать: восстания 1932 года и заговор Лхумбэ 1933 года ясно указывают на необходимость вмешательства, прежде чем ситуация станет слишком напряжённой. К счастью, у нас уже есть опыт ограничения власти лам со времён прихода Чойбалсана к власти. \n\nСохранение верности [SOV.GetAdjective] и их лидеру [SOV.GetLeader] и принципам коммунизма подразумевает, что мы должны провести эту операцию как можно скорее."
 mongol.52.a: "У нас нет другого выбора."
 mongol.52.b: "Буддизм несет истинный дух [MON.GetAdjective] народа!"

 mongol.53.t: "Вопрос лидерства"
 mongol.53.d: "Наши информаторы собрали доказательства планируемого захвата правительства про-[JAP.getAdjective] коллаборационистами и империалистическими приспешниками, которым удалось провезти оружие через плохо охраняемые участки границы и хранить его в известных местах. Некоторые из перехваченных телеграмм содержат упоминания о «высших эшелонах власти», а недавно полученное письмо указывает на действующего главу страны, [MON.getLeader]. \n\nДальнейшее расследование выявило несколько других политиков, находящихся в регулярном контакте с некоторыми контрреволюционными элементами. \n\nИмея достаточно доказательств, мы должны привлечь виновных к ответственности и назначить нового Председателя на предстоящий срок."
 mongol.53.a: "Чойбалсан — единственный логичный выбор."

 mongol.54.t: "[MON.getLeader] заболел!"
 mongol.54.d: "Вечером вчерашнего дня [MON.getLeader] работал, как обычно, над одним из последних правительственных указов, касающихся внутренней ситуации в нашей процветающей стране. Когда он не ответил на звонок своего секретаря, тот пришёл в кабинет и обнаружил рухнувшего на пол Великана Мысли у своего стола. \n\nДоставленный немедленно в Улан-Баторскую больницу, он был осмотрен местными врачами и немедленно диагностирован с тяжёлым заболеванием, которое помешает ему эффективно управлять страной в будущем. \n\nОстаётся неизвестным, ухудшится ли состояние, но всегда лучше оставаться бдительным."
 mongol.54.a: "Что мы можем с этим поделать?"

 mongol.55.t: "Новый преемник партии?"
 mongol.55.d: "Долгое время среди народа нашей страны ходили слухи о физическом и психическом здоровье [MON.getLeader], о том, как это влияет на [MON.GetHerHis] принятие решений и общий международный престиж страны, представленной [MON.GetHerselfHimself]. \n\nПохоже, что наш Лидер уже всё спланировал и рассмотрел передачу власти более молодому поколению коммунистов, некоторые из которых в ближайшем будущем полностью подтвердят государственную политику. \n\nПосле некоторых размышлений [MON.getLeader] решил(а), что Председателем партии станет..."
 mongol.55.a: "Цэдэнбал, ибо он проявил верность Делу"
 mongol.55.b: "Председатель? Почему бы не Председательница?"

 mongol.56.t: "Монголия просит аннексии!"
 mongol.56.d: "Наши экономические связи и политическое влияние достигли таких беспрецедентных высот, что новое [MON.getAdjective] правительство издало открытый указ, в котором его молодое Собрание объявило о решении присоединиться к [SOV.getNameDef] в качестве союзной республики или автономного округа. \n\nНесмотря на узы братства и сестринства, крайне важно сохранить нашу репутацию Великой, но не угнетающей державы. Более того, если мы не хотим, чтобы другие мировые державы считали нас суровыми империалистами, нам лучше оставить эти чистые души на произвол судьбы."
 mongol.56.a: "А почему бы и нет?"
 mongol.56.b: "Мы ни в коем случае не империалисты!"

 mongol.57.t: "[SOV.getAdjective] отклонили нашу просьбу"
 mongol.57.d: "Заявив, что братство наших народов будет гораздо выгоднее, если обе нации сохранят свой независимый статус, [SOV.getLeader] вежливо отклонил скромную просьбу нашего молодого Собрания о аннексии. \n\nВ секретной телеграмме Центральное руководство уведомило нас, что международное давление на [SOV.getAdjective] правительство и так достаточно высоко, поэтому они предпочли бы сохранить текущий дипломатический статус наших наций."
 mongol.57.a: "Если им так хочется..."


#Khalkin Gol
 mongol_khalkin_gol.1.t: "Обнаружена подготовка [MON.getAdjective] манёвров!"
 mongol_khalkin_gol.1.d: "Несколько часов назад наш местный командный штаб получил донесение о том, что небольшой кавалерийский эскадрон, по-видимому, [MON.getAdjective] происхождения, численностью от 70 до 90 человек, пересёк границу вблизи реки Номонхан и расположился там, явно подразумевая, что теперь эта территория находится под их контролем. \n\nНесколько часов спустя наш конный полк вынудил противника отступить, но затем захватчики вернулись в большем количестве. Разведка указывает на большее количество войск, скапливающихся у границы с их стороны, которые, по-видимому, готовятся к проведению какой-то военной операции в регионе."
 mongol_khalkin_gol.1.a: "Запросить иностранную помощь"
 mongol_khalkin_gol.1.b: "Мобилизовать силы!"

 mongol_khalkin_gol.2.t: "Победа [MON.getAdjective] при Халхин-Голе!"
 mongol_khalkin_gol.2.d: "Наши первоначальные неудачи в борьбе с империалистами сумели разочаровать верховное командование [761.Controller.getNameDef], поскольку в последующие несколько дней некоторые из их безрассудных генералов отдавали своим солдатам различные самоубийственные приказы, где те были вынуждены предпринимать атаку за атакой, пытаясь захватить укреплённые позиции наших солдат, защищённые несколькими удачно расположенными пулемётами... с соответствующими результатами — большими потерями в живой силе и технике. \n\nНам также удалось захватить несколько танков и изучить их для разработки или улучшения собственных броневых конструкций."
 mongol_khalkin_gol.2.a: "Вопрос наконец решён"
 mongol_khalkin_gol.2.b: "Великая победа для нашего народа!"

 mongol_khalkin_gol.3.t: "Победа [761.Controller.getAdjective] при Халхин-Голе!"
 mongol_khalkin_gol.3.d: "Начальная фаза вторжения была блестяще проведена [MON.getAdjective]ими войсками: они быстро продвинулись в спорный район Номонхана и заняли левый берег реки Халхин-Гол, заменив прежние пограничные камни и укрепив приграничные позиции в регионе. \n\nОднако это не остановило вооружённые силы [761.Controller.getNameDef], которые через несколько дней отбили позиции и отразили все наступления противной стороны, закрепив своё господство в регионе. \n\nПосле нескольких недель боёв [MON.getAdjective]ие послы принесли извинения за неудобства и признали существующее положение границы, что означало решительную [761.Controller.getAdjective]ую победу в этом конфликте."
 mongol_khalkin_gol.3.a: "Конфликт окончен. Пока."
 mongol_khalkin_gol.3.b: "Нам понадобится время, чтобы оправиться от этого!"

 mongol_khalkin_gol.4.t: "Решительной победы не достигнуто..."
 mongol_khalkin_gol.4.d: "Постоянная ротация войск в сочетании с активным использованием радиооборудования, авиаразведки и грамотным управлением вспомогательными частями помешала любой из сторон использовать потенциальные точки прорыва вражеской обороны и предотвратила любой решительный прорыв, который мог бы переломить ход битвы в пользу одной из сторон. \n\nНедели боёв истощили противоборствующие стороны, было заключено перемирие, после которого обе стороны согласились на прежние демаркационные линии, положив таким образом конец затянувшемуся конфликту."
 mongol_khalkin_gol.4.a: "Этот пограничный спор обязательно возникнет снова."

 mongol_khalkin_gol.5.t: "Эскалация на Халхин-Голе!"
 mongol_khalkin_gol.5.d: "Неизвестно, кому первому пришла в голову эта идея, но некоторые отчаянные солдаты решили обойти противника с фланга и вступили в бой на новых территориях! Такое поведение привело к распространению конфликта на новые районы, резко обострив и без того тяжёлую ситуацию, вынудив наши вооружённые силы отправлять всё больше и больше сил в спорный район. \n\nЭтим утром иностранный посол вручил ноту с требованием, чтобы наши войска покинули спорный район, в противном случае последует официальное объявление войны, если приказ не будет выполнен в течение нескольких часов! \n\nОчевидно, наш враг ищет войны, и мы покажем им, как решаются такие дела!"
 mongol_khalkin_gol.5.a: "Задействовать все доступные силы!"

 mongol_khalkin_gol.6.t: "Заинтересованность [SOV.getAdjective] в манёврах"
 mongol_khalkin_gol.6.d: "Сводка от наших партнёров из [SOV.getNameDef] указывает на то, что их чиновники хорошо осведомлены о напряжённости между нашими вооружёнными силами и силами [761.Controller.getAdjective] в регионе, и в случае, если какая-либо из сторон усилит своё присутствие в ближайшие дни или недели, они готовы отправить небольшой контингент войск для поддержки нашей борьбы в спорном районе. \n\nОднако всему есть своя цена, и такой шаг, несомненно, укрепит их позиции в наших вооружённых силах, хотим мы того или нет. Если, конечно, мы не сможем справиться с растущей угрозой самостоятельно..."
 mongol_khalkin_gol.6.a: "Пригласить [SOV.getAdjective] советников"
 mongol_khalkin_gol.6.b: "Этот вопрос в наших руках"



#democratic Mongoolia events
 mongol_democratic.1.t: "Нападение на Великий Хурал!"
 mongol_democratic.1.d: "Гражданские волнения в сельских районах страны вызвали серьёзную тревогу у представителей аймаков из разных регионов, собравшихся на чрезвычайную сессию Великого Хурала, объявленную несколько недель назад. \n\nВсё шло согласно повестке дня, пока представители аймаков Хэнтий и Дорнод не выступили вперёд с пламенной речью о революционных методах и преданности коммунистическим идеалам. Внезапно их прервала группа неизвестных, которые застрелили нескольких охранников Хурала и бросили несколько ручных гранат в паникующие группы представителей. \n\nВ начавшемся хаосе многие депутаты стали жертвами нападения, прежде чем все нападавшие были застрелены оставшейся охраной. \n\nТакой ход событий может означать только одно:"
 mongol_democratic.1.a: "Террористическая атака!"
 mongol_democratic.1.b: "Вмешательство!"


 mongol_democratic.2.t: "Попытка переворота при поддержке [SOV.getAdjective]"
 mongol_democratic.2.d: "Разочаровавшись в последних изменениях и проведении государственной политики, различные группы людей открыто начали выражать протест и организовывать демонстрации с требованием смены политического режима и отмены реформ, введённых [ROOT.getLeader]! \n\nЕсли раньше полиции удавалось разгонять протестующих мирными и не вполне мирными средствами, то на этот раз часть протестующих сумела вооружиться огнестрельным оружием и зажигательными средствами неизвестного происхождения, вынудив местную полицию отступить к правительственному району Улан-Батора. Затем толпа разбила палатки перед центральной канцелярией премьер-министра, непрерывно выкрикивая требования его отставки. \n\nЛишь через несколько дней наши полицейские отряды, усиленные территориальными дружинами, смогли разогнать толпу и арестовать зачинщиков протестов. На допросах некоторые из них признались в подготовке открытого [SOV.getAdjective]ого восстания против правительства в западных районах страны! Наши информаторы из этих мест подтверждают, что с врагом нужно покончить одним быстрым ударом наших вооружённых сил."
 mongol_democratic.2.a: "Время обезглавить змею!"

 mongol_democratic.3.t: "[From.GetNameDefCap] запрашивает гарантии"
 mongol_democratic.3.d: "Утверждая, что демократический фундамент никогда не был прочным в Центральной Азии, [FROM.getAdjective] дипломаты обратились к нашим иностранным послам на одной из ежегодных международных встреч с просьбой предоставить официальную гарантию поддержки «ради стабильности и процветания в Азиатском регионе». \n\nНесмотря на некоторые наши идеологические разногласия, большие географические расстояния и некоторые спорные моменты прошлого, их правительство, похоже, более чем готово укрепить свои дипломатические институты и выйти на мировую арену под защитой [ROOT.getNameDef]. Всё, что нам нужно сделать, говорят они, это объявить о нашей дипломатической поддержке их дела."
 mongol_democratic.3.a: "Они будут отличным союзником в будущем"
 mongol_democratic.3.b: "Простите, кто просит НАШЕЙ поддержки?"

 mongol_democratic.4.t: "[FROM.getNamedefCap] соглашается защищать нас"
 mongol_democratic.4.d: "Заявив о важности защиты различных демократических институтов по всему миру, [FROM.getAdjective] посол вручил подписанное соглашение, в котором говорится следующее: \n\n«Отныне и до скончания цивилизации, пока [ROOT.getNamedef] стремится сохранять демократию в себе и вокруг себя, [FROM.getNamedef] со всей своей военной мощью и экономической силой будет поддерживать идею свободы и самоопределения, уважать границы и стремиться к более тесным дипломатическим связям!» \n\nЯсная дипломатическая победа и очередная гарантия нашей внутренней безопасности на мировой арене, ура!"
 mongol_democratic.4.a: "Дипломатия торжествует!"

 mongol_democratic.5.t: "[FROM.getNamedefCap] отказывается предоставить защиту"
 mongol_democratic.5.d: "Несмотря на все наши усилия, иностранный посол с сожалением сообщил нашей делегации, что [FROM.getNamedef] не имеет ни дипломатических, ни военных средств для обеспечения защиты демократических институтов в [ROOT.getNamedef]. \n\nНекоторые из наших радикальных депутатов уже усомнились в том, что [FROM.getLeader] вообще может найти нашу страну на карте, учитывая состояние официального ответа иностранной администрации."
 mongol_democratic.5.a: "Похоже, мы предоставлены сами себе..."

 mongol_democratic.6.t: "[MON.getNamedefCap] отзывает своих дипломатов"
 mongol_democratic.6.d: "Этим утром над [MON.getAdjective] посольством был замечен тёмный дым, явно указывающий на то, что некоторые их чиновники сжигают или уничтожают часть документов страны. \n\nНа официальный запрос о деятельности делегации представители [MON.getNameDef] продемонстрировали специальный указ о «немедленном закрытии всех консульств и посольств [MON.getNameDef], расположенных в [ROOT.getNameDef]», что знаменует официальный разрыв дипломатических отношений между нашими странами с их стороны."
 mongol_democratic.6.a: "Приближается война?"

 mongol_democratic.7.t: "[MON.getNamedefCap] отзывает своих дипломатов из [FROM.getNamedefCap]"
 mongol_democratic.7.d: "[MON.getAdjective] позиция против различных врагов народа не нова, однако их недавний дипломатический шаг удивил многих: [MON.getNamedefCap] публично объявил, что не будет больше вести никаких дипломатических переговоров с режимами, подобными [FROM.getNamedefCap]. \n\nБолее того, [MON.getAdjective] вооружённые силы, по-видимому, мобилизуют значительное количество своих резервов, в то время как дипломаты страны активно покидают теперь уже дипломатически изолированную страну."
 mongol_democratic.7.a: "Пора положить конец этой угрозе"

 mongol_democratic.8.title: "[MON.getAdjective] дипломатическая миссия начинает переговоры о иностранном союзе"
 mongol_democratic.8.desc: "\nНаша разведка сообщает о возросшей активности [MON.getAdjective] Министерства иностранных дел: их дипломаты выезжают в другие страны в рамках, как представляется, усилий по установлению дружественных отношений с некоторыми из их потенциальных союзников. \n\nОднако остаётся неизвестным, будут ли эти переговоры успешными или нет, но мы должны знать о развивающейся ситуации и ожидать наихудшего исхода для себя."
 mongol_democratic.8.a: "Нам следует сохранять бдительность"

 mongol_democratic.10.t: "Монголия просит примирения"
 mongol_democratic.10.d: "Делегация из Монголии установила контакты с Комиссией по монгольским и тибетским делам, пытаясь урегулировать продолжающиеся споры о статусе Внешней Монголии и наших претензиях на неё. \n\nХотя официально нейтральный, [MON.getNamedef] постепенно дрейфует в нашу сферу влияния, предоставляя нам уникальную возможность сделать союзником крупнейшую нацию Центральной степи, которая держит ключ к брюху российского Дальнего Востока. \n\nДолжны ли мы примирить наши амбиции и обеспечить стабильность Северного Фронтира?"
 mongol_democratic.10.a: "Мы должны отложить наши разногласия, пока"
 mongol_democratic.10.b: "У нас другие планы на них"

 mongol_democratic.11.t: "[FROM.getNamedefCap] соглашается на примирение"
 mongol_democratic.11.d: "Осознав стратегическую важность нашей страны и стремясь сохранить нашу лояльность их делу, [FROM.getAdjective] чиновники из Монгольской комиссии объявили о прекращении прежней вражды и восстановлении если не дружественных, то нейтральных отношений между нашими двумя нациями. \n\nОтход от Китая может потенциально оттолкнуть другие региональные державы, но имеет ли это значение?"
 mongol_democratic.11.a: "Дипломатия торжествует!"

 mongol_democratic.12.t: "[FROM.getNamedefCap] не проявляет интереса к нашей инициативе по примирению"
 mongol_democratic.12.d: "Наша делегация получила вежливый отказ от представителей [FROM.getAdjective], которые признают борьбу нашего народа за признание и самоопределение, однако их правительство в настоящее время имеет «более неотложные дела и поэтому не может сосредоточиться на этих дипломатических инициативах». \n\nМы сделали всё возможное, чтобы договориться с центральным правительством, и если они не желают сотрудничать, возможно, это сделают другие региональные державы?"
 mongol_democratic.12.a: "Мы рассмотрим и другие варианты"

 mongol_democratic.15.t: "[FROM.getNamedefCap] обращается к нашим чиновникам по вопросу отказа от претензий"
 mongol_democratic.15.d: "Чиновники [FROM.getAdjective], стремясь укрепить сотрудничество между нашими странами, обратились с призывом к Комиссии по делам Монголии и Тибета, заявив о желании снизить напряжённость между нашими двумя странами ради мирного и процветающего сосуществования. \n\nГлава делегации заявил, что на протяжении бесчисленных лет [ROOT.getNameDef] претендует на земли Внешней Монголии как на автономный регион в составе Собственно Китая, что является вопросом для обсуждения, учитывая концепции самоопределения в их стране. \n\nСтремясь к сближению, а не к эскалации, их страна готова пойти на некоторые уступки в обмен на пересмотр претензий на их земли. Взаимное"
 mongol_democratic.15.a: "Потребовать демонстрации политической поддержки"
 mongol_democratic.15.b: "Запросить поставки оружия"
 mongol_democratic.15.c: "Попросить промышленные уступки"
 mongol_democratic.15.e: "Потребовать передачу военной промышленности"

 mongol_democratic.16.t: "[FROM.getNamedefCap] требует демонстрации политической поддержки"
 mongol_democratic.16.d: "Лояльность значит всё в эти неопределённые времена, и [FROM.getLeader], осознавая это, потребовал демонстрации лояльности политической борьбе [FROM.getNameDef] в виде даннического дипломатического визита. \n\nНесмотря на кажущуюся дороговизну этого предложения, нас заверили, что другие способы оплаты могли бы быть для нас ещё более суровыми."
 mongol_democratic.16.a: "Необходимое обязательство"

 mongol_democratic.17.t: "[FROM.getNamedefCap] запрашивает вооружение"
 mongol_democratic.17.d: "Стремясь укрепить свою нынешнюю армию, [FROM.getLeader] попросил нас предоставить военное снаряжение и гарнизонный отряд из «лучших из лучших», которые будут отправлены в качестве добровольческого региона для участия в войнах [FROM.getAdjective]. \n\nНаши дипломаты смогли договориться о второй части условий, фактически позволив нам отправить на ту сторону только необходимое оружие."
 mongol_democratic.17.a: "Хорошая сделка?"

 mongol_democratic.18.t: "[FROM.getNamedefCap] просит перенести предприятие гражданских товаров"
 mongol_democratic.18.d: "Наша национализация промышленности в начале прошлого десятилетия отпугнула капитал из [FROM.getAdjective] и привела к тому, что многие торговцы из [FROM.getNameDef] потеряли свои рабочие места и сбережения. \n\nЗаявляя, что такое прискорбное развитие событий должно быть урегулировано, [FROM.getLeader] попросил передать «законные активы» обратно в их руки..."
 mongol_democratic.18.a: "Достойная жертва"

 mongol_democratic.19.t: "[FROM.getNamedefCap] требует передачу военной промышленности"
 mongol_democratic.19.d: "Военная клика в [FROM.getNameDef], по-видимому, имеет прочные позиции в правительстве, поскольку её чиновники потребовали передачи военных объектов в интересующем регионе, если мы желаем, чтобы проблемная претензия была аннулирована. \n\nПри таких обстоятельствах они откажутся от любых экспансионистских идей на этих землях, но за столь высокую цену..."
 mongol_democratic.19.a: "Что ж..."

 mongol_democratic.20.t: "[FROM.getNameDefCap] запрашивает протекторат"
 mongol_democratic.20.d: "Мы получили своеобразный запрос от [FROM.getNameDef], где их чиновники, заняв решительную про-[ROOT.getAdjective] позицию, объявили о желании воссоединиться с Царством [ROOT.getNameDef] в качестве автономного региона, что внесёт значительный вклад в безопасность Внешней Границы и значительно расширит наше влияние в Великой Степи. \n\nКаким будет окончательное решение? Позволим ли мы отколовшемуся региону вернуться в лоно?"
 mongol_democratic.20.a: "Конечно, почему мы должны отказаться?"
 mongol_democratic.20.b: "Нам это не интересно."

 mongol_democratic.21.t: "Статус протектората подтверждён"
 mongol_democratic.21.d: "Высокая канцелярия [FROM.getLeader] заверила нас, что наша просьба была рассмотрена и немедленно принята, без малейших признаков колебаний! \n\nВ утренней речи перед народом [FROM.getLeader] объявил днём празднования тот факт, что одна из бывших территорий Внешней Границы вернулась в Царство Великого Китая и отныне будет вносить вклад в экономический рост, военную мощь и воссоединение всей китайской нации! Ликующая толпа приветствует «давно потерянных братьев и сестёр» под знаменем китайских союзов!"
 mongol_democratic.21.a: "Великий день для нашего народа!"

 mongol_democratic.22.t: "Статус протектората отклонён"
 mongol_democratic.22.d: "Наши лучшие дипломаты со своими искренними обещаниями не смогли убедить упрямых чиновников [FROM.getAdjective] позволить нам войти в их царство в качестве автономного региона. \n\nЗаявляя, что «это не в их интересах — ослаблять контроль над отколовшейся провинцией прошлого», наше второе обращение также было в конечном итоге отклонено!"
 mongol_democratic.22.a: "Они не заинтересованы?!"

 mongol_democratic.24.t: "Монголия поднимает вопрос о Туве"
 mongol_democratic.24.d: "Агрессивная риторика чиновников [MON.getAdjective] в отношении своих соседей в сочетании с прокитайской позицией вызвала обоснованную обеспокоенность различных политиков нашей страны. \n\nПохоже, что [MON.getNameDef] активизирует пропагандистские усилия по созданию единого монгольского государства в границах 1911 года, включая Урянхайский край, который является родиной для многих тувинцев и русских. \n\nМы приложим все усилия, чтобы обеспечить удержание страны в наших руках в эти неспокойные и опасные времена."
 mongol_democratic.24.a: "Мы сделаем всё возможное, чтобы сдерживать их"

#Genden events
 mongol_genden.1.t: "Объявлена политика «Разбогатей»"
 mongol_genden.1.d: "Экономическая политика «Нового поворота» и её успех были сильно заторможены отменой неофициальной правительственной программы «Разбогатей», в рамках которой всем гражданам страны предлагалось накапливать капитал для личной и коллективной стабильности. \n\nПытаясь вновь укрепить свои позиции по всей стране, Генден стремится любой ценой объединить и обогатить свой народ, независимо от того, насколько суровыми могут быть некоторые последствия. \n\nОжидается, что недавно объявленная политика будет внедряться по всей стране в течение года, оказывая помощь бедным крестьянам и рабочим, а Центральный комитет будет следить за ходом её реализации с помощью ежемесячных экономических отчётов. \n\nТолько время"
 mongol_genden.1.a: "Вперед, товарищи!"

 mongol_genden.2.t: "Граждане открывают новую мастерскую"
 mongol_genden.2.d: "По сообщениям, некоторые из наших восторженных товарищей основали гражданскую мастерскую, способную производить товары для потребительского использования, что позволяет снизить экономическую зависимость аймаков от столицы. \n\nНекоторые местные жители уже присоединяются к рабочей силе, в то время как избранные на местах мастера наблюдают за производством и перераспределением товаров для гражданских нужд под строгим руководством из столицы."
 mongol_genden.2.a: "Отличная работа!"

 mongol_genden.3.t: "Построено новое предприятие по производству вооружений"
 mongol_genden.3.d: "Видя логистические трудности в снабжении местного гарнизона и их острую потребность в современном огнестрельном оружии, местные сознательные граждане смогли собрать достаточно средств для строительства склада боеприпасов и соответствующей инфраструктуры, предназначенной для снабжения винтовками и другим вооружением для нужд народа. \n\nНекоторые образцы оружия, похоже, соответствуют уровню, который производят наши официальные производители, если не превосходят его!"
 mongol_genden.3.a: "Оружие — в руки народа!"

 mongol_genden.4.t: "Расширение местных дорог"
 mongol_genden.4.d: "Различные строительные компании получили щедрые пожертвования от наших граждан, что позволило улучшить дорожное сообщение по всей стране, укрепив власть народа над дикой природой региона. \n\nОжидается, что такое развитие окажет положительное влияние на эффективность наших сухопутных войск, которые смогут воспользоваться преимуществами современной логистики."
 mongol_genden.4.a: "Мы можем продолжать в том же духе!"

 mongol_genden.5.t: "Народ укрепляет свои дома"
 mongol_genden.5.d: "Пытаясь сохранить накопленный капитал, некоторые из опасающихся граждан, как сообщается, расширили свои подвалы и построили ряд укреплений в своих домах и вокруг них. Определённо неожиданный поворот событий, учитывая, что они находятся под защитой наших доблестных вооружённых сил. \n\nОднако эти укрепления могут оказаться полезными, если наши защитники будут использовать их в тяжёлые времена войны."
 mongol_genden.5.a: "Они ЧТО сделали?"

 mongol_genden.6.t: "Обнаружена коррупционная схема"
 mongol_genden.6.d: "Анализ движения капитала за последний месяц показал, что некоторые государственные средства были переведены между различными счетами сберкасс, прежде чем окончательно осесть на нескольких сберегательных книжках некоторых наших депутатов. \n\nДальнейшее расследование, проведённое Комитетом по борьбе с коррупцией, ясно указывает на хорошо замаскированную коррупционную схему. \n\nОднако нашим следователям потребуются дополнительные время и средства для завершения анализа и формирования отчёта. Что нам теперь делать?"
 mongol_genden.6.a: "Привлечь виновных к ответственности!"
 mongol_genden.6.b: "Начать долгое официальное разбирательство."

 mongol_genden.7.t: "Исчезновение производственных материалов"
 mongol_genden.7.d: "Один из мастеров нашей фабрики подал отчёт о пропаже производственных материалов с производственных линий. Проблема обнаружилась только после того, как на упаковочной станции не смогли заполнить товаром оставшиеся пять из двухсот контейнеров. \n\nОстаётся неизвестным, кем мог быть потенциальный вредитель, но многие рабочие фабрики уже заявили о готовности работать по несколько дополнительных часов в день, чтобы выполнить государственный заказ. Как храбро и ответственно с их стороны!"
 mongol_genden.7.a: "Придётся увеличить производственные квоты на этот месяц."

 mongol_genden.8.t: "Рост инфляции"
 mongol_genden.8.d: "Поскольку люди накапливают капитал в таких беспрецедентных объёмах, государственным органам приходится вмешиваться и регулировать рынок вместе с его спросом и предложением, чтобы предотвратить крах национальной валюты. \n\nТакое вмешательство является дорогостоящим и трудоёмким усилием, которое может и должно регулироваться только Центральным банком, которому будет поручено регулировать экономику в ближайшее время."
 mongol_genden.8.a: "Монголбанку это дорого обойдётся."

 mongol_genden.10.t: "Проблема [SOV.getAdjective] симпатизантов"
 mongol_genden.10.d: "Наблюдая за последними политическими событиями в [SOV.getNameDef], [ROOT.getLeader] в долгих философских спорах с самим собой и своими подчинёнными осознал, что строительство коммунизма во многом зависит от наличия внутренних и внешних агентов, способных поддержать «законного» правителя на пути к власти как изнутри, так и извне желаемой страны. \n\nИ учитывая, насколько велика была роль [SOV.getAdjective]их политиков в строительстве коммунизма в Монголии, всё ещё остаётся вопрос: не поддерживают ли некоторые люди в правительстве страны про-[SOV.getAdjective]ий курс ради достижения своих личных или общих целей. \n\nПосле долгих размышлений [ROOT.getLeader] решил решить этот вопрос раз и, будем надеяться, навсегда."
 mongol_genden.10.a: "Мы не такие, как они, никаких чисток проводиться не будет!"
 mongol_genden.10.b: "Удалить только наиболее радикальные элементы."
 mongol_genden.10.c: "Не оставлять никого для обеспечения безопасности!"

 mongol_genden.14.t: "Генден возвращается в Монголию!"
 mongol_genden.14.d: "После всех трудностей и тревог, которые нам пришлось пережить, весть о его возвращении наконец достигла Улан-Батора! \n\nВ сопровождении своего небольшого эскорта из четырёх человек он покинул транспорт, доставивший его к границе [SOV.getAdjective] и [MON.getAdjective], которую они пересекли перед рассветом. Шагая по земле своей Родины, герой нашей борьбы за выживание был замечен радостно приветствующим наших людей, а несколько слёз радости катились по его исхудалому и усталому лицу. \n\nНа следующий день состоялась официальная церемония, на которой он публично объявил о своём возвращении на Родину перед тысячами и тысячами людей, стремясь восстановить страну, которую он был вынужден покину"
 mongol_genden.14.a: "Мы все рады видеть вас снова!"

 mongol_genden.15.t: "Генден казнён в СССР!"
 mongol_genden.15.d: "Местный резидент НКВД передал в кабинет [ROOT.getLeader] небольшую записку с горестной пометкой «Совершенно секретно». Записка содержала протоколы задержания и допроса Гендена, который был опознан на одном из железнодорожных вокзалов одним наблюдательным чиновником [SOV.getAdjective]. \n\nВ последние дни своей жизни Генден был признан виновным в контрреволюционной деятельности, саботаже бесчисленных дипломатических миссий и шпионаже в пользу [JAP.getNameDef] и его марионеточных режимов. Всё вышеперечисленное было подтверждено и подписано самим Генденом. \n\nНесмотря на некоторые усилия наших дипломатов, его суд был проведён быстро, и его приговор не подлежал обсуждению..."
 mongol_genden.15.a: "Нам будет его не хватать."
 mongol_genden.15.b: "Скатертью дорога"

 mongol_genden.16.t: "Западный маршрут обнаружен!"
 mongol_genden.16.d: "Полученные железнодорожные планы указывают на то, что Генден будет отправлен в своё «место отдыха» в Крыму поездом, отправляющимся из Москвы в ближайшие недели по Западной железной дороге через следующие города: \nКалуга \nБрянск \nШостка \nКиев \nКировоград \nДнепропетровск \nСевастополь \n\nНаши агенты уже установили связи с некоторыми тактическими группами, действующими в этом районе, которые предложили устроить общественные беспорядки в столице [UKR.getAdjective] Киеве, что предоставило бы идеальную возможность для нашего любимого Гендена сбежать в хаосе этой атаки."
 mongol_genden.16.a: "Тогда цель — Киев."

 mongol_genden.17.t: "Южный маршрут обнаружен!"
 mongol_genden.17.d: "Ожидается, что запланированный поезд отправится по Южной железнодорожной линии, проходя через такие крупные районные центры, как: \nТула \nОрёл \nКурск \nБелгород \nХарьков \nСталино \nСевастополь \n\nМаршрут имеет несколько потенциально уязвимых мест, однако, учитывая характер железных дорог и сильное присутствие НКВД, нападать на поезд или железнодорожную станцию напрямую безрассудно. Тем не менее, нам удалось найти несколько контактов среди особенно корыстных чиновников на нескольких депо, причём Харьков оказался самым многообещающим. \n\nЕсли мы предложим значительную взятку местным депутатам, они смогут организовать перенос времени отправления нескольких поездов однов"
 mongol_genden.17.a: "Тогда Харьков получит щедрое «пожертвование»."

 mongol_genden.18.t: "Юго-восточный маршрут обнаружен!"
 mongol_genden.18.d: "Этот своеобразный маршрут, по-видимому, был открыт только недавно и проходит от юго-восточных пригородов Москвы, следуя исключительно по российской территории, полностью минуя Украину. \n\nОжидается, что поезд проследует через города: \nЛипецк \nВоронеж \nМиллерово \nРостов \nКраснодар \nНовороссийск \nЗатем Генден будет переправлен в Крым на корабле, что сделает любую возможность спасения невозможной. \n\nРайон вокруг Ростова, несмотря на то что выглядит очень безопасным для неопытного глаза, населён различными жителями, которые, по-видимому, имеют некоторый опыт быстрых и агрессивных ударов по движущимся целям со времён Великой войны и Красной революции..."
 mongol_genden.18.a: "Ростов? Кто у нас там есть?"

 mongol_genden.19.t: "Железнодорожный вокзал в Киеве разрушен!"
 mongol_genden.19.d: "Очередное обычное утро на Киевском вокзале превратилось в полный хаос: после нескольких подземных толчков бетонные стены красивого вокзала начали дрожать, метровой толщины металлические балки стали гнуться, не выдерживая тяжести потолка, пока большая часть здания не рухнула под собственным весом, уничтожив несколько товарных поездов, стоявших на станции. \n\nК счастью, тревога прозвучала вовремя, и часть персонала станции успела эвакуироваться из обрушившейся части здания, а НКВД вместе с милицией оцепили район для возможного расследования происшествия. \n\nПозже один из станционных охранников был найден без сознания в своей будке. Он помнил лишь несколько теней, появившихся у него за спиной, прежде чем всё вокруг погрузилось во тьму. \n\n«Инцидент, достойный дальнейшего расследования», — комментарий местного замполита."
 mongol_genden.19.a: "ЧТО?!"
 mongol_genden.19.b: "О нет! В любом случае, что там с Генденом..."

 mongol_genden.21.t: "Бюрократический хаос в Харькове"
 mongol_genden.21.d: "Портфель с деньгами и инструкциями был оставлен в Харьковском железнодорожном депо, откуда он был доставлен в штаб и представлен местному мастеру одним из наших людей. \n\nПосле некоторых «раздумий» и нескольких убедительных действий нашего агента мастер согласился совместить время отправления нескольких поездов, прибывающих в Харьков в ближайшие дни. \n\nИз-за задержек поездов на станции было относительно легко отделить Гендена от его референта-чекиста и отправить его другим поездом под видом профессора востоковедения и литературы в его долгий путь обратно в Среднюю Азию. \n\nВсё, что нам осталось, — это проследить за поездом и убедиться, что он"
 mongol_genden.21.a: "Они хорошо справились с работой"

 mongol_genden.22.t: "Казаки совершают налёт на пассажирский поезд на окраине Ростова!"
 mongol_genden.22.d: "Ужасные новости распространились по Поволжью и Восточной Украине: неизвестный кавалерийский отряд перехватил и разграбил гражданский поезд, который вёз людей к синему порту Новороссийска. \n\nНеизвестный конный отряд приблизился к поезду со стороны заката, когда тот загружал провизию для дальнейшего следования на юг, и потребовал «плату» за безопасный проезд до места назначения. После истечения срока ультиматума некоторые члены банды проникли в поезд и начали собирать вещи людей. \n\nПри попытке разоружить одного из присутствовавших политработников случайно прозвучал выстрел, и поезд превратился в месиво с гражданскими"
 mongol_genden.22.a: "Простите, ЧТО?!"
 mongol_genden.22.b: "Это послужит им хорошим уроком"

 mongol_greater_mongolia.1.t: "Операция прошла успешно"
 mongol_greater_mongolia.1.d: "Вторжение и захват спорной территории проходят по намеченному плану. \n\nПосле того как наш пограничный патруль «не смог ответить» на вызов экстренных служб, наши официальные лица начали официальное расследование, одновременно направив дипломатические запросы на обыск спорных районов и арест бандитов, совершивших возможные преступления против нашего народа. \n\nВпоследствии наши эскадроны взяли под контроль жизненно важные объекты инфраструктуры региона, включая почтовые службы, железные дороги, дорожные перекрёстки, телеграфные и телефонные линии. Местный гарнизон был вынужден сложить оружие и присоединиться к нашим войскам для прохождения индоктринации и допроса. \n\nЧасть местного населения по-прежнему намерена вы"
 mongol_greater_mongolia.1.a: "Великий день для [ROOT.getAdjective] народа!"

 mongol_greater_mongolia.2.t: "Катастрофа на юге"
 mongol_greater_mongolia.2.d: "Наши силы, воодушевлённые первоначальным успехом операции, смогли закрепиться в нескольких приграничных населённых пунктах и не допустить формирования ополченческих отрядов среди гражданского населения для борьбы с освободителями страны. \n\nОднако, пока мы готовили наши войска к маршу вглубь вражеской территории, крупномасштабное контрнаступление сокрушило фланги нашей растянутой армии. Местные партизаны перерезали линии снабжения позади наших сил, и последним пришлось импровизировать на месте, бросив часть людей и снаряжения, чтобы спасти основную часть армии. \n\nВозвращающиеся солдаты сейчас залечивают раны и готовятся к новым боям."
 mongol_greater_mongolia.2.a: "Возможно, мы переоценили свои силы"

 mongol_greater_mongolia.3.t: "Достигнуто позиционное равновесие"
 mongol_greater_mongolia.3.d: "Несмотря на первоначальный успех операции, продвижение наших вооружённых сил было серьёзно остановлено сильной оборонительной линией, созданной в спорном регионе. Наши солдаты были вынуждены окопаться на враждебной местности, в то время как военная полиция пыталась обеспечить безопасность тыла от вражеских партизан. \n\nПосле нескольких атак местные командиры предложили abandon эту военную затею, прежде чем ситуация станет слишком критической, поскольку противник может подтянуть в интересующий район больше войск и тяжёлой артиллерии, в то время как мы не можем позволить себе выделить больше ресурсов для этого якобы короткого конфликта."
 mongol_greater_mongolia.3.a: "Мы можем многое из этого извлечь."

 mongol_greater_mongolia.4.t: "Вражеские силы отброшены"
 mongol_greater_mongolia.4.d: "Безрассудные вражеские силы, легионы и легионы солдат, вторглись в наши родные земли, пытаясь захватить то, что они называют «законно их»! \n\nИ пока они грабили и разоряли отдалённые районы, наши могучие воины собрали свои силы и под знамёнами нашего лучшего генерала двинулись на решающую битву с захватчиками нашей родины. \n\nЖалкие враги, не выдержав совместных усилий наших армий и партизан, были замечены отступающими, бросая часть снаряжения и пленных."
 mongol_greater_mongolia.4.a: "Мы сожжём вашу жалкую армию дотла, до последнего человека."

 mongol_greater_mongolia.5.t: "Наши земли были захвачены!"
 mongol_greater_mongolia.5.d: "Возможно, это была оплошность наших генералов, передовых наблюдателей или же недостаточная реакция армии — нам это доподлинно неизвестно. \n\nОднако известно, что связь с одним из передовых регионов полностью потеряна: противник, обеспечив свои линии связи и сильно затруднив наши, сделал невозможным для резервов мобилизацию достаточных сил для удара по врагу. \n\nТеперь уже поздно: мы потеряли одно из наших владений из-за этих навязчивых захватчиков, кем бы они ни были. Мы вернёмся, когда придёт время!"
 mongol_greater_mongolia.5.a: "Как мы посмотрим в глаза нашему народу?"

 mongol_greater_mongolia.6.t: "Патруль Достигнут"
 mongol_greater_mongolia.6.d: "Стремительно наступающий враг сумел захватить несколько приграничных деревень и городков, но наш местный гарнизон, усиленный мобилизованными вооружёнными силами, создал опорные пункты на линии вражеского наступления, которые оказались неприступными в последние несколько недель. \n\nТеперь, когда наши партизаны опустошают их линии снабжения, а наши силы сковывают движения врага на фронте, разочарованный противник стремится к тактическому отступлению, оставляя разорённые деревни и разграбленные поля для работы наших крестьян. \n\nРешительный успех, но достигнутый высокой ценой."
 mongol_greater_mongolia.6.a: "Мы можем удерживать позиции ещё дольше!"


 mongol_greater_mongolia.10.t: "Монголия Предлагает Объединение с Бурятами"
 mongol_greater_mongolia.10.d: "Стремясь возродить узы, связывавшие две нации на протяжении веков до достижений Красной революции и теории национального государства, дипломаты [MON.getAdjective] связались с нашими чиновниками с просьбой о возможном воссоединении бурятских и халха-монгольских народов. \n\nПомимо соответствующего представительства в Великом и Малом хуралах, они обещают уважать национальную идентичность и права бурятского народа и других жителей региона. \n\nЕсли мы откажемся, они могут даже выступить против нас. Позволим ли мы им вернуть эти земли?"
 mongol_greater_mongolia.10.a: "Меньше проблем на нашей шее"
 mongol_greater_mongolia.10.b: "Мы не отдадим эти земли без боя"
 mongol_greater_mongolia.10.c: "Согласиться в обмен на места в Хурале"

 mongol_greater_mongolia.11.t: "Монголия Добивается Включения Тувы"
 mongol_greater_mongolia.11.d: "В своих усилиях по восстановлению контроля над монголоязычными землями делегация [MON.getAdjective] обратилась к нашим чиновникам в Кызыле с предложением провести государственный плебисцит по вопросу воссоединения Тувинского административного округа с территорией собственно Монголии. \n\nПомимо обычных обещаний самоопределения, местной автономии и равного обращения с меньшинствами, чиновники [MON.getAdjective] также готовы вложить средства в застойную экономику этого региона, позволив местному населению пользоваться всеми экономическими и социальными благами [MON.GetRulingIdeology]. \n\nКак нам ответить?"
 mongol_greater_mongolia.11.a: "Меньше проблем для беспокойства"
 mongol_greater_mongolia.11.b: "Почему мы вообще должны рассматривать эти условия?"
 mongol_greater_mongolia.11.c: "Согласиться на представительство в Хурале"

 mongol_greater_mongolia.12.t: "Запрос на Объединение Принят!"
 mongol_greater_mongolia.12.d: "Стремясь разрешить напряжённость в регионе, чиновники от [FROM.getNameDef] подписали предложенный договор и передали административный контроль над регионом. Наши чиновники уже начали обустраиваться в новых правительственных зданиях, а наши инженеры приступают к работе по реинтеграции региона в инфраструктурную сеть нашей страны. \n\nВ рамках церемониального марша последний батальон местной гвардии отсалютовал вновь прибывшим вооружённым силам [ROOT.getAdjective], ознаменовав полную передачу власти над регионом нашему режиму!"
 mongol_greater_mongolia.12.a: "Отлично!"
 mongol_greater_mongolia.12.b: "Истинное Единство!"

 mongol_greater_mongolia.13.t: "[FROM.getNameDefCap] Согласился на Статус Ограниченной Автономии"
 mongol_greater_mongolia.13.d: "После нескольких дней переговоров было решено, что слияние государственных аппаратов как [FROM.getNameDef], так и [ROOT.getNameDef] является слишком сложным вопросом с точки зрения административного и экономического контроля. \n\n[FROM.getAdjective] были более склонны принять особый статус автономного региона под нашим прямым мандатом. \n\n«С разделением экономического и военного бремени обе наши нации будут становиться сильнее неделя за неделей, месяц за месяцем!» — заявил глава их делегации. \n\nМы можем начать работу по сближению наших народов!"
 mongol_greater_mongolia.13.a: "Хорошо."

 mongol_greater_mongolia.14.t: "Дипломатические Переговоры Сорваны"
 mongol_greater_mongolia.14.d: "Несмотря на все наши усилия, чиновники [FROM.getAdjective] отвергли наше скромное предложение о пан-монгольском сотрудничестве! \n\nВ речи этим утром с балкона здания парламента лидер [FROM.getLeader] объявил, что «трусливые [ROOT.getAdjective] стремятся поработить благородные народы вокруг них, намереваясь восстановить грязную и коррумпированную Монгольскую империю в наши дни!». \n\nС таким явным проявлением неуважения наши послы покинули стол переговоров, и, учитывая растущие репрессии, проводимые в отношении нашего населения в регионе, ясно, что есть только один способ обезопасить регион..."
 mongol_greater_mongolia.14.a: "Мы вернёмся"

 mongol_greater_mongolia.15.t: "Предстоящая Улан-Баторская Конференция"
 mongol_greater_mongolia.15.d: "Центральная Азия хорошо известна как поле битвы различных сил, пытающихся подорвать контроль друг друга над этим стратегическим регионом. Многие империи пытались завоевать пастбищные земли всадников и всадниц, стремясь урегулировать споры народов в чью-либо пользу. \n\nТеперь, когда нам удалось укрепить наши внутренние правительства и продемонстрировать лишь малую часть нашей реальной силы, в наших интересах искать сотрудничества с крупными державами региона и посмотреть, как они могут способствовать объединению монгольского народа под эгидой единого национального государства. \n\nТакое политическое предприятие является дорогостоящим делом, но оно должно принести нам большую пользу и продвинуть нашу повестку."
 mongol_greater_mongolia.15.a: "Пусть приготовления начнутся!"
 mongol_greater_mongolia.15.b: "Это предприятие слишком масштабно. Мы должны пересмотреть его."

 mongol_greater_mongolia.16.t: "Пригласить Чиновников [SOV.getAdjective]?"
 mongol_greater_mongolia.16.d: "Несмотря на некоторые сомнительные решения последних лет, когда часть их политических усилий была направлена на разделение халха-монголов и бурят-монголов, народ [SOV.getAdjective] в основном рассматривался как друзья и партнёры, а не как угнетатели и колонизаторы. \n\nМного лет назад их поддержка спасла Богдо-ханство от полного уничтожения и истребления милитаристами [CHI.getAdjective] и цинскими империалистами. \n\nНесколькими годами позже их вклад обеспечил установление коммунизма в нашей стране; хорошо это или плохо — покажет время. \n\nВидя их заинтересованность в защите Транссибирской магистрали, становится очевидным, что они, скорее всего, будут"
 mongol_greater_mongolia.16.a: "Пригласить братьев [SOV.getAdjective]"
 mongol_greater_mongolia.16.b: "Это не в наших интересах"

 mongol_greater_mongolia.17.t: "Пригласить Дипломатов [CHI.getAdjective]?"
 mongol_greater_mongolia.17.d: "Разделённые на протяжении столетий в своей внутренней борьбе за власть, [CHI.getAdjective] всё ещё стремятся смотреть вовне и обезопасить свои Внешние границы от иностранного влияния — будь то [SOV.getAdjective], [JAP.getAdjective] или любой другой иностранной державы. \n\nМногие столетия наши и их предки были врагами, сражавшимися друг против друга. Возможно, преимущества дипломатии затмят огонь пороха и блеск клинков, позволив нашему народу показать, что наше стремление к выживанию и объединению схоже с их?"
 mongol_greater_mongolia.17.a: "Посмотрим, что они могут сказать сейчас"
 mongol_greater_mongolia.17.b: "Мы никогда не будем сотрудничать с этими угнетателями"

 mongol_greater_mongolia.18.t: "Признать КНР, Пригласив Их?"
 mongol_greater_mongolia.18.d: "В своих усилиях по освобождению Собственно Китая от угнетателей народа лидер [PRC.getLeader] вместе со своим народом из [PRC.getNameDef] установили новый порядок, способный более или менее успешно выдерживать давление центрального правительства на данный момент. \n\nИх обещания уважать принципы самоопределения и волю народа Внешней Монголии могут стать основой нового набора дипломатических отношений, направленных на укрепление обоих государств в этих плодотворных отношениях! \n\nТакой дипломатический манёвр, безусловно, вызовет гнев различных чиновников [CHI.GetRulingParty], но имеет ли это значение, если наша долгосрочная цель будет достигнута?"
 mongol_greater_mongolia.18.a: "Определённо"
 mongol_greater_mongolia.18.b: "Это слишком рискованно, лучше не делать этого"

 mongol_greater_mongolia.19.t: "Пригласить Милитаристов [JAP.getAdjective]?"
 mongol_greater_mongolia.19.d: "Стремительный промышленный и экономический рост [JAP.getNameDef] превратил их в силу, с которой следует считаться, если мы хотим обеспечить рубежи нашей страны. Более того, их амбиции на Центральной равнине и в юго-восточной части Тихого океана могут быть использованы в наших интересах, если мы заключим хорошо продуманную сделку с ними. \n\nС другой стороны, создание ими «режимов-протекторатов» у наших ближайших соседей не способствует разрешению напряжённости в регионе. Кто знает, куда приведут их амбиции Восточную Азию?"
 mongol_greater_mongolia.19.a: "Это поможет разрешить споры в регионе"
 mongol_greater_mongolia.19.b: "У них могут быть скрытые амбиции на уме"

 mongol_greater_mongolia.20.t: "Чиновники [MON.getAdjective] Пригласили Нас на Улан-Баторскую Конференцию"
 mongol_greater_mongolia.20.d: "Стремясь разрешить споры по вопросам Внутренней и Внешней Монголии, перераспределить население в соответствии с переписью и местными плебисцитами, а также обеспечить наследие единой Монголии, дипломаты [MON.getADjective] начали организацию Улан-Баторской конференции и пригласили нас, «как Великую державу», внести свой вклад в обсуждение. \n\nНаши аналитики предлагают принять участие в конференции в Улан-Баторе, так как мы сможем увеличить своё влияние в регионе и, возможно, склонить лояльность [MON.getNameDef] и их лидеров к нашему делу. \n\nТвёрдая вера — это хорошо, но контроль — лучше."
 mongol_greater_mongolia.20.a: "Мы примем участие."
 mongol_greater_mongolia.20.b: "Должно быть, они шутят!"

 mongol_greater_mongolia.21.t: "Делегация [FROM.getAdjective] Присоединится к Конференции"
 mongol_greater_mongolia.21.d: "После некоторых размышлений депутаты [FROM.getAdjective] объявили во время церемониального визита нашего посла, что они заинтересованы в участии в конференции, направленной на «Мирное разрешение споров и урегулирование конфликтов». \n\nМы должны подготовить наилучшие возможные условия для их пребывания в нашей столице. Некоторые приготовления уже ведутся."
 mongol_greater_mongolia.21.a: "Стабильность в регионе должна быть сохранена!"

 mongol_greater_mongolia.22.t: "Депутаты [FROM.getAdjective] Не Проявляют Интереса к Участию в Конференции"
 mongol_greater_mongolia.22.d: "Длинное письмо-ответ, переданное нашему послу, содержало длинную декларацию о вечной дружбе между нашими двумя народами, долгой и счастливой жизни для всех наших людей, а также краткое предложение в конце, скрытое между строк о том, что у [FROM.getNameDef] есть очень срочные дела, и поэтому они не могут направить делегацию для личного обсуждения вопросов стабильности в Центральной Азии. \n\nМы должны сохранять бдительность, ибо эта нация ещё не готова взять на себя ответственность за гарантию стабильности в регионе..."
 mongol_greater_mongolia.22.a: "Тем хуже для них."

 mongol_greater_mongolia.23.t: "Начало Улан-Баторской Конференции"
 mongol_greater_mongolia.23.d: "Приготовления к проведению конференции близится к завершению: все дипломаты прибывают в Улан-Батор в ближайшие дни. \n\nПосле нескольких дней организационных процедур нам удалось разместить все места для делегатов так, чтобы никого не оскорбить в зале заседаний. Всё, что нам нужно сейчас, — это здоровая атмосфера в нашей столице, чтобы иностранные делегаты чувствовали себя расслабленно и желанно."
 mongol_greater_mongolia.23.a: "Пусть переговоры начнутся"

 mongol_greater_mongolia.24.t: "Перестрелка в Зале Заседаний"
 mongol_greater_mongolia.24.d: "Первый раунд обсуждений шёл по нашему плану: после приветствия [MON.getLeader] с трибуны конференц-зала все члены делегаций заняли свои места, готовые, как и предполагалось, вести переговоры по вопросам региональной безопасности. \n\nОднако наша охрана не знала, что некоторые иностранные депутаты вместе со своими личными телохранителями сумели пронести огнестрельное оружие якобы «для личной защиты». \n\nКогда обсуждение накалилось, один из них поднял вопрос о том, «как можно поддерживать региональную безопасность, если другая сторона ведёт наступательную войну против нас прямо за этими дверями?». Возмущённые депутаты противоположной стороны пришли в ярость от этого заявления, после чего некий радикал неизвестного происхождения, находившийся среди присутствующих, открыл огонь из личного оружия, что привело к массовой перестрелке между сторонами. \n\nЛишь через несколько часов обе стороны согласились собрать раненых и вернуться в свои воюющие родины, тем самым подтвердив полный провал конференции."
 mongol_greater_mongolia.24.a: "Какая оплошность с нашей стороны!"

 mongol_greater_mongolia.25.t: "Взаимное Признание для Альянса"
 mongol_greater_mongolia.25.d: "Наше шаткое положение на международной арене ранее в значительной степени поддерживалось нашими товарищами из [SOV.getNameDef], так как их политики и военные сохраняли жёсткий контроль над нашей внутренней и внешней политикой. \n\nПоскольку мы уже неофициально признали [PRC.getNameDef], пригласив их представителей на конференцию, стало возможным попытаться укрепить наши ранее установленные связи, подписав секретный протокол, который будет включать взаимное признание наших стран в сочетании с возможностью разделить сферы влияния в Центральной Азии. Конференция, конечно, будет отменена. \n\nВеликие державы могут счесть это «Единством нежелательных», но это лучший способ"
 mongol_greater_mongolia.25.a: "Наш единственный шанс!"
 mongol_greater_mongolia.25.b: "И навлечь на нас гнев наших соседей?"

 mongol_greater_mongolia.26.t: "Запрос на Альянс Принят"
 mongol_greater_mongolia.26.d: "Осознав, насколько шатко и непрочно положение обеих наших стран, лидер [PRC.getLeader] принял рискованное предложение и подписал секретное соглашение, направленное на изменение баланса сил в регионе в нашу пользу. \n\nРазгневанные дипломаты из других стран покинут Улан-Батор в ближайшие дни, чтобы доставить ноту о «том, насколько ненадёжны политики [MON.getadjective]». \n\nНекоторые из наших генералов уже надеются инициировать обмен опытом между нашими вооружёнными силами."
 mongol_greater_mongolia.26.a: "Ура!"

 mongol_greater_mongolia.27.t: "Дипломатическая Миссия Провалена"
 mongol_greater_mongolia.27.d: "Лидер [PRC.getLeader] сообщил нашему заместителю, что, несмотря на то, что это многообещающее предложение, у них сейчас есть другие дела, и они не готовы отказаться от плодотворного сотрудничества с Великими державами. \n\nЭто заявление, как и наше предложение, было передано по защищённым каналам, и ни один из иностранных дипломатов не догадывался, что может происходить за их спинами. \n\nМы можем продолжать наши усилия по обеспечению лояльности крупных игроков в Центральной Азии."
 mongol_greater_mongolia.27.a: "Как? Почему?"

 mongol_greater_mongolia.28.t: "Конференция Неудачна"
 mongol_greater_mongolia.28.d: "Несмотря на все наши усилия по созданию наиболее продуктивного климата и позитивной атмосферы в зале заседаний, все раунды обсуждений оказались безуспешными: различные стороны заявляли о неравном к себе отношении или сохраняли нейтральную позицию по ключевым вопросам повестки. \n\nХотя мы также пытались заручиться поддержкой некоторых из них, все усилия остались тщетными: депутаты требовали всё новых и новых уступок, которые мы физически не могли предоставить. \n\nПри закрытии конференции лидер [MON.getLeader] произнёс речь, в которой попытался примирить opposing parties и сохранить рабочую атмосферу, но ничего из этого не было достигнуто к следующему вечеру."
 mongol_greater_mongolia.28.a: "Мы сделали всё, что могли..."

 mongol_greater_mongolia.29.t: "Великие Державы Оказывают Поддержку"
 mongol_greater_mongolia.29.d: "После недель переговоров и споров о спорных зонах контроля и интересов нам удалось успокоить все присутствующие на конференции делегации, позволив им публично объявить наше государство «государством статус-кво под защитой великих держав». \n\nНаправив основные усилия на сохранение собственно Монголии в качестве буферного государства, крупные игроки согласились гарантировать стабильность и безопасность нашей нации при условии, что мы останемся нейтральными во внешней политике по отношению к представителям договора. \n\nТакая формулировка, однако, позволяет нам запросить «исконные монгольские земли» у иностранных держав, согласившихся сохранить нашу целостность, утверждая, что мы «лишь стремимся к воссоединению законных [MON.getAdjective]их земель»."
 mongol_greater_mongolia.29.a: "Наши дипломаты совершили невозможное!"

 mongol_greater_mongolia.30.t: "Монголия Требует Свои Законные Претензии"
 mongol_greater_mongolia.30.d: "Ссылаясь на своё желание воссоединить [MON.getAdjective] под эгидой единого национального государства и прикрывая эти амбиции нашими недавними соглашениями в Улан-Баторе, лидер [MON.getLeader] направил срочный запрос о передаче государства под их контроль. \n\nВыполнение их требований «сохранит баланс сил в регионе без причинения ущерба стране в долгосрочной перспективе», что кажется им совершенно оправданным. \n\nС другой стороны, мы рискуем быть признанными угнетателем, поджигателем войны и разрушителем регионального мира другими державами в регионе, что даст им оправданный повод для военного вмешательства..."
 mongol_greater_mongolia.30.a: "Они получают то, что по праву принадлежит им"
 mongol_greater_mongolia.30.b: "Мы не об этом договаривались"

 mongol_greater_mongolia.31.t: "[FROM.getAdjective] Не Выполнит Улан-Баторские Соглашения"
 mongol_greater_mongolia.31.d: "Наш первоначальный дипломатический запрос, похоже, не получил должного внимания со стороны правительства [FROM.getLeader]; более того, второй запрос, отправленный несколькими часами позже, был отклонён под предлогом того, что именно мы «обостряем ситуацию неподобающим и опасным образом». \n\nНаш третий запрос о предоставлении обещанных уступок Монголии был публично показан общественности страны, и люди открыто смеялись над тактикой умиротворения наших чиновников. \n\nТакое публичное унижение и пренебрежение международными договорами не должно остаться безнаказанным! Или должно?"
 mongol_greater_mongolia.31.a: "Пора действовать более жёстко."
 mongol_greater_mongolia.31.b: "Война сейчас исключена"

 mongol_greater_mongolia.32.t: "Передача Государства Подтверждена"
 mongol_greater_mongolia.32.d: "Наш скромный запрос, по-видимому, вызвал некоторые опасения у иностранного правительства, но ответ от их чиновников прибыл вовремя. \n\nЗаявив, что их цель — сохранить мир в регионе, власти [FROM.getAdjective] готовы изменить границы своего государства или государства-клиента, чтобы гарантировать, что [MON.getNameDef] сохранит свой статус-кво в Центральноазиатском регионе. \n\nПодготовка к административным и военным изменениям уже ведётся и проводится своевременно в соответствии с предложенным планом."
 mongol_greater_mongolia.32.a: "Как мы и думали"

 mongol_greater_mongolia.33.t: "Передача Государства Отклонена"
 mongol_greater_mongolia.33.d: "В своих тщетных усилиях сохранить уже рушащуюся империю [FROM.getAdjective] отклонили наш запрос о передаче монгольских территорий обратно под наш контроль! \n\nОни утверждают, что земля, которой они владеют и удерживают, «по праву принадлежит им», при этом явно забывая об обещаниях Улан-Баторских соглашений, данных ими в своё время. \n\nНаши вооружённые силы докладывают о своей готовности провести военную операцию, если потребуется осуществить принудительную передачу территории."
 mongol_greater_mongolia.33.a: "Никто не откажет нам сегодня!"

 mongol_greater_mongolia.34.t: "Наш Покровитель Не Поддержит Наше Дело"
 mongol_greater_mongolia.34.d: "Чиновники из [FROM.getNameDef] были вынуждены передать неутешительную ноту о том, что они не могут поддержать наши усилия из-за нехватки свободных людских ресурсов, снаряжения и ресурсов для ведения «ещё одной освободительной войны». \n\nОни дополнительно сообщили нам, что по-прежнему готовы поддержать наше дело в будущем, если возникнет другой вопрос о пересмотре границ."
 mongol_greater_mongolia.34.a: "Такая ненадёжность!"

 mongol_greater_mongolia.40.t: "[From.GetNameDefCap] Предлагает Разделить Сферы Влияния"
 mongol_greater_mongolia.40.d: "Основной целью создания альянса был отказ от Великих держав и попытка построить независимый блок, способный противостоять влиянию гигантов. \n\nТеперь, когда союз был оформлен в его надлежащей форме, остаётся один маленький, но значительный вопрос: \nВо Внутренней Монголии и Северном Синьцзяне по-прежнему проживает значительное количество монгольского населения, которое остаётся скорее оторванной частью местного общества. \n\n[MON.getNameDef] во главе с [MON.getLeader] стремится объединить всех монголов под одним знаменем и настаивает на разделе сфер влияния, подразумевая, что мы должны пересмотреть нашу политику синификации в интересующих их регионах."
 mongol_greater_mongolia.40.a: "Это к лучшему"
 mongol_greater_mongolia.40.b: "Нет, это не в наших интересах!"

 mongol_greater_mongolia.41.t: "[From.GetNameDefCap] Соглашается Разделить Сферы Влияния"
 mongol_greater_mongolia.41.d: "В своих усилиях по укреплению нашего новорожденного альянса чиновники [FROM.getAdjective] сообщили нам, что они отказываются от своих претензий и не будут проводить политику синификации в спорном регионе. \n\nТаким образом, наш народ будет пользоваться большей степенью свободы, а наши политики смогут следовать мечте об объединении монгольского населения под эгидой единого национального государства."
 mongol_greater_mongolia.41.a: "Как мы и ожидали."

 mongol_greater_mongolia.42.t: "Запрос Отклонён!"
 mongol_greater_mongolia.42.d: "Вопреки попыткам пересмотреть свою политику в спорном регионе, [FROM.getAdjective] по-прежнему считают интересующие их регионы своей законной территорией! \n\nНаши усилия по объединению монгольского населения могут продолжаться по нашей воле, но некоторые из их сторонников могут помешать нам, если мы приобретём желаемые земли путём завоевания или переговоров. \n\nВидя в этом ужасный просчёт, теперь у нас гораздо меньше союзников, на которых можно положиться!"
 mongol_greater_mongolia.42.a: "Будь они неладны!"

 mongol_greater_mongolia.50.t: "Возрождение [From.GetNameRuGen]"
 mongol_greater_mongolia.50.d: "Недавние территориальные приобретения, осуществлённые чиновниками [FROM.getAdjective], охватили обширные территории, населённые в основном монгольским населением, что предоставило их чиновникам уникальную политическую возможность. \n\nЛидер [FROM.getLeader] выступил с публичным заявлением ранее этим утром перед зданием Великого Хурала, объявив о формировании нового политического образования, представляющего объединённую волю и желание монгольского населения, направленного на обеспечение и защиту их интересов в эти неспокойные времена."
 mongol_greater_mongolia.50.a: "Мечта о единой Центральной Азии ждёт"
 mongol_greater_mongolia.50.b: "Восходит новая Монгольская империя?"
 mongol_greater_mongolia.50.c: "Всего лишь небольшая неудача, не более"



 mongol_soviet_puppet.2.t: "Обнаружена подозрительная активность"
 mongol_soviet_puppet.2.d: "Несколько недель назад была арестована группа молодых студентов по подозрению в шпионаже в пользу правительства [MON.getAdjective] с целью дестабилизации обстановки в нашем тылу различными методами. \n\nПосле нескольких допросов один из главарей признался, что служит [MON.getNameDef] и их программе. Столь дерзкие действия должны быть рассмотрены, а виновные наказаны. Наши дипломаты уже разработали несколько способов реагирования на эту угрозу. \n\nКаким будет решение [ROOT.getLeader]?"
 mongol_soviet_puppet.2.a: "Не наша забота"
 mongol_soviet_puppet.2.b: "Заявить дипломатический протест"
 mongol_soviet_puppet.2.c: "Закрыть границы"
 mongol_soviet_puppet.2.e: "Направить ультиматум"

 mongol_soviet_puppet.3.t: "[FROM.getNameDefCap] протестует против нашей политики"
 mongol_soviet_puppet.3.d: "Сегодня утром в правительственную штаб-квартиру была доставлена нота протеста с утверждением, что столь открытая пропаганда коммунизма в нашем непосредственном соседстве лишь ухудшит наши взаимные отношения. \n\nВ письме также говорилось, что любые дальнейшие действия наших шпионов и агентов не будут терпимы и будут приняты более решительные меры для защиты права государства [FROM.getAdjective] и его народа самостоятельно решать, какая идеология им больше подходит. \n\nНе зная, как реагировать на это, [ROOT.getLeader] решил отложить решение этого «насущного» вопроса на потом."
 mongol_soviet_puppet.3.a: "О нет! Ну и ладно..."

 mongol_soviet_puppet.4.t: "[FROM.getNameDefCap] вводит против нас эмбарго!"
 mongol_soviet_puppet.4.d: "Один из товарных составов не прибыл на центральный вокзал одного из приграничных городов, что вызвало опасения, дойдут ли до нас товары по недавно заключённой сделке. Начались волнения, что привело к надлежащему расследованию. \n\nОказывается, поезд и его команда теперь находятся в приграничном районе [FROM.getNameDef] и не могут попасть в страну из-за введённых против нас торговых санкций! \n\nОфициальный дипломатический запрос в посольство [FROM.getAdjective] подтвердил, что их чиновники закрыли границы и не готовы пропускать товарные составы без официальных извинений."
 mongol_soviet_puppet.4.a: "Нам это безразлично"
 mongol_soviet_puppet.4.b: "Пожалуйста, не надо! Принести извинения!"

 mongol_soviet_puppet.5.t: "[FROM.getNameDefCap] приносит извинения"
 mongol_soviet_puppet.5.d: "Стремясь к примирению с нашими чиновниками, суд по иностранным делам [FROM.getAdjective] вручил ноту с извинениями. \n\nВ их просьбе о снятии торговых санкций также упоминается, что они не будут проводить пропагандистские кампании на нашей родине в ближайшее время. \n\nКроме того, ожидается, что мы получим солидную компенсацию за беспорядки, вызванные их агентами в нашем тылу, что укрепит наши позиции в регионе. С другой стороны, можем ли мы им доверять?"
 mongol_soviet_puppet.5.a: "Хорошо."
 mongol_soviet_puppet.5.b: "Нас так просто не купишь"

 mongol_soviet_puppet.6.t: "[FROM.getNameDefCap] соглашается на компромисс"
 mongol_soviet_puppet.6.d: "В президентский офис было получено письмо о примирении, в котором говорилось, что чиновники [FROM.getAdjective] задержат наших агентов за подрывную деятельность, но разрешат свободный транзит товаров, если в будущем не произойдёт никаких инцидентов. \n\nНесколько часов спустя проблемная команда прибыла к месту назначения, обеспечив наш народ необходимыми товарами. \n\nМы рады, что наша торговля не скована таким эмбарго, ведь оно могло бы иметь разрушительные последствия для нашей экономики."
 mongol_soviet_puppet.6.a: "Малый кризис удалось предотвратить"

 mongol_soviet_puppet.7.t: "[FROM.getNameDefCap] отказывается от переговоров"
 mongol_soviet_puppet.7.d: "Несмотря на наши призывы к примирению, [FROm.getAdjective] отказываются снимать торговые санкции, утверждая, что это не остановит иностранных пропагандистов, действующих на их землях. \n\nБолее того, ходят слухи, что они призывают другие соседние страны также ввести против нас эмбарго! \n\nНе имея возможности ни подтвердить, ни опровергнуть это, мы должны сделать наших агентов в [FROM.getNameDef] более скрытными, прежде чем нам будут предъявлены более суровые ультиматумы."
 mongol_soviet_puppet.7.a: "Это звучит нехорошо"

 mongol_soviet_puppet.8.t: "[FROM.getNameDefCap] выдвигает ультиматум: прекратить любое вмешательство во внутренние дела"
 mongol_soviet_puppet.8.d: "Ссылаясь на необходимость обеспечения собственной внутренней стабильности, а также своей сферы влияния, правительство [FROM.getAdjective] издало указ о всеобщей мобилизации своих вооружённых сил! \n\nГотовясь к войне, они также выдвинули ряд требований, утверждая, что мы несём ответственность за недавние волнения и рост поддержки коммунистов среди сельских масс! \n\nБолее того, эти поджигатели войны готовы «ликвидировать коммунистическую угрозу», если мы не прекратим пропаганду на их землях. Что нам делать?"
 mongol_soviet_puppet.8.a: "И что они собираются делать? Объявить нам войну?"
 mongol_soviet_puppet.8.b: "Отступить"

 mongol_soviet_puppet.9.t: "Ультиматум отклонён"
 mongol_soviet_puppet.9.d: "Несмотря на представленные неопровержимые доказательства, чиновники [FROM.getAdjective] отвергли все обвинения, заявив, что доказательства сфабрикованы, а настоящая угроза в регионе — это наше некомпетентное правительство! \n\nТакие обвинения нельзя терпеть; мы должны подготовить наши вооружённые силы, чтобы раздавить эту ничтожную нацию раз и навсегда! \n\nНаши пограничные патрули уже усилены свежими войсками, и нам нужно лишь немного времени для подготовки. К войне! Того требует слава [ROOT.getAdjective]!"
 mongol_soviet_puppet.9.a: "Время действовать жёстко"

 mongol_soviet_puppet.10.t: "[FROM.getNameDefCap] уступает требованиям"
 mongol_soviet_puppet.10.d: "Наши ультиматумы произвели впечатление на иностранных чиновников, которые направили церемониальную делегацию в нашу столицу, объявив о своём желании вечного мира! \n\nПосле раунда переговоров они также дали торжественное обещание прекратить любое внутреннее вмешательство, предоставив данные о каждом члене агентурной сети, которая подрывала умы и сердца нашего народа коммунистическими идеями. \n\nСлавный день для [ROOT.getNameDef] и её народа!"
 mongol_soviet_puppet.10.a: "Как и ожидалось"

 mongol_soviet_puppet.11.t: "Монголия поддерживает коммунистическое восстание"
 mongol_soviet_puppet.11.d: "Сегодня утром в нашу штаб-квартиру поступило сообщение о ещё одном коммунистическом мятеже, направленном на «освобождение пролетариата и установление рабочей республики». \nЧерез несколько часов [MON.getLeader] объявил миру, что лидеры новорожденного революционного правительства обратились за поддержкой к [MON.getAdjective] и единогласно проголосовали за укрепление связей, став подконтрольным режимом в их борьбе за независимость! \n\n[MON.getNameDefCap] теперь является твёрдой гарантией коммунистического рая в регионе, готовая поглощать всё больше режимов под своим руководством."
 mongol_soviet_puppet.11.a: "Они что, сделали?"
 mongol_soviet_puppet.11.b: "Добро пожаловать, братья и сёстры!"
 mongol_soviet_puppet.11.c: "О чём они только думают?!"
 mongol_soviet_puppet.11.e: "Нас ждёт новая судьба!"
 mongol_soviet_puppet.11.f: "Занимательно."

 mongol_soviet_puppet.12.t: "[FROM.getNameDefCap] предлагает программу перемещения промышленности"
 mongol_soviet_puppet.12.d: "Стремясь защитить промышленность нашей страны от наступающего врага, чиновники [MON.getAdjective] выдвинули предложение о переносе действующих промышленных предприятий из уязвимых Урала и Средней Азии дальше на восток, на территорию собственно Монголии. \n\nМы не сможем напрямую использовать заводы, но наши братья в [MON.getNameDef] пообещали поставлять нам значительный процент своей промышленной мощи в обмен на эту операцию. \n\nКаким будет решение Ставки? Стоит ли перемещать нашу промышленность ещё дальше от врага?"
 mongol_soviet_puppet.12.a: "Переместить оружейный завод"
 mongol_soviet_puppet.12.b: "Передать гражданский комплекс в безопасное место"
 mongol_soviet_puppet.12.c: "Эти заводы в безопасности здесь"

 mongol_soviet_puppet.13.t: "[FROM.getAdjective]с перемещают военный завод"
 mongol_soviet_puppet.13.d: "Ставка доложила, что один из оружейных заводов подготовлен к перемещению на восток, что укрепит нашу военную мощь ценой промышленных поставок с нашей стороны. \n\nНаш растущий промышленный потенциал будет большой помощью не только нашим друзьям из [SOV.getAdjective], но и нам самим."
 mongol_soviet_puppet.13.a: "Отлично!"

 mongol_soviet_puppet.14.t: "[FROM.getAdjective]с передали промышленный комплекс"
 mongol_soviet_puppet.14.d: "Согласно отчёту, промышленный комплекс уже находится в пути в безопасное место в собственно Монголии. \n\nСтавка сообщает, что мы не должны забывать о своей части сделки и поэтому должны завершить её, подписав промышленный контракт для помощи нашим братьям."
 mongol_soviet_puppet.14.a: "Отлично!"

 mongol_soviet_puppet.15.t: "Запрос отклонён"
 mongol_soviet_puppet.15.d: "Ставка сообщает, что сейчас они не могут установить надёжный, безопасный маршрут к нам, поэтому нам придётся отправить другой запрос в будущем, если мы захотим переместить ещё один промышленный комплекс в наши центральные земли. \n\nНекоторые из наших жителей отмечают, что это может уменьшить их влияние на нас, что также может быть нам на руку."
 mongol_soviet_puppet.15.a: "Может, в следующий раз?"

 mongol_soviet_puppet.16.t: "Новый маяк коммунизма"
 mongol_soviet_puppet.16.d: "Заявляя о необходимости изменений в политическом ландшафте Коммунистического Интернационала, политики [MON.getAdjective] сделали публичное заявление, в котором выразили обеспокоенность растущей политической нестабильностью и недавними военными поражениями [SOV.GetNameDef]. \n\n«Только ради общего блага следует координировать усилия союзников из хорошо защищённого и укреплённого места», — заявил [MON.getLeader] в конце своей речи, тем самым официально приняв на себя руководство альянсом [MON.getFactionName]."
 mongol_soviet_puppet.16.a: "Отныне будем направлять мы."
 mongol_soviet_puppet.16.b: "Они готовятся к тому, что грядёт."
 mongol_soviet_puppet.16.c: "Это им не поможет!"
 mongol_soviet_puppet.16.e: "Война выходит на новый виток..."
 mongol_soviet_puppet.16.f: "Наш альянс стал ещё сильнее."

 mongol_soviet_puppet.17.t: "[FROM.getNameDefCap] предлагает единое союзное правительство"
 mongol_soviet_puppet.17.d: "В своей сегодняшней речи [FROM.getLeader] публично заявил: \n«Мир меняется. У кого сейчас хватит сил противостоять армиям [FROM.getNameDef] и [ROOT.getNameDef]? Противостоять мощи [FROM.getLeader] и [ROOT.getLeader] и союзу двух государств. Вместе, мой друг [ROOT.getLeader], мы будем править этим миром во имя Революции». \n\nЭта сомнительная речь была встречена аплодисментами тысяч, десятков тысяч монголов по всему [MON.getNameDef], и многие наши граждане присоединились к призыву о едином союзном правительстве, способном защищать ценности [ROOT.getFactionName] во всём мире. Каким будет ответ верховного главнокомандующего?"
 mongol_soviet_puppet.17.a: "Один Союз, неделимый"
 mongol_soviet_puppet.17.b: "Нам хорошо и самим."

 mongol_soviet_puppet.18.t: "[FROM.getAdjective]с согласились на наш запрос"
 mongol_soviet_puppet.18.d: "Политики [FROM.getAdjective], отчаянно пытающиеся разрешить продолжающийся военный и административный коллапс своей страны, приняли наше предложение о формировании единого государственного правительства [FROM.getAdjective]-[ROOT.getAdjective]. \n\nУсиленный генеральный штаб уже приступил к разработке новых планов сражений, направленных на отражение натиска врага и возвращение земель, оказавшихся под иностранным контролем. Наши представители уже направлены на недавно возвращённые территории для разрешения бюрократического хаоса."
 mongol_soviet_puppet.18.a: "Всё идёт по плану."

 mongol_soviet_puppet.19.t: "[FROM.getNameDefCap], похоже, пересматривает наш запрос"
 mongol_soviet_puppet.19.d: "Верховное командование [FROM.getAdjective] сообщило нам, что столь харизматичная речь [ROOT.getLeader] укрепила их патриотические чувства и твёрдую веру в революционные идеи, подразумевая, что их народ един в борьбе с врагом под флагами [FROM.getNameDef]. Заявив, что административное объединение только ухудшит ситуационное управление на фронте, [FROM.getLeader] вежливо отклонил почётное предложение. \n\nОни, похоже, всё ещё верят, что смогут разрешить текущий кризис и спасти свою разваливающуюся страну, используя собственные вооружённые силы и полагаясь на поддержку гражданского населения. Посмотрим, верно ли это утверждение."
 mongol_soviet_puppet.19.a: "Мы сделали всё, что могли."

#Advisor to provide info on the matter and what is going on
 mongol_rp_advisor.1.t: "Первый доклад командованию офиса"
 mongol_rp_advisor.1.d: "Приветствую, товарищ, и позвольте поздравить вас с недавним назначением одним из личных советников Пэлжидийна Гэндэна! \nИменно с такими людьми, как вы, Гэндэн стремится вести нашу великую [MON.getName] к славному и процветающему будущему. Меня зовут Далд Зөвлөх, и я уже давно служу в ведомстве внутренней безопасности личным советником молодых командиров вроде вас. Ваши прежние знания могут сильно зависеть от предыдущего опыта работы и аймака, куда вы были назначены. Общую ситуацию можно кратко описать так:\n\nНаши земли всё ещё рассматриваются как неотъемлемая часть [CHI.getNameDef], хотя их руководство почти не имеет реальной власти в регионе. \n[JAP.getAdjective]ие империалисты постоянно усиливают активность в восточных районах нашей страны после захвата активов Фэнтяньской клики в 1932 году. \nЕдинственным другом в таких обстоятельствах был СССР, который предоставлял нам идеологическую и материальную помощь со времён народной революции 1924 года, прочно закрепив своё влияние в нашем государстве.\n\nПоскольку Гэндэн и Дэмид сейчас находятся с визитом в Москве, мы можем отправить по телеграфу несколько предложений о дополнительных темах, которые им следует поднять на конференции. Время ограничено, и каждый час на счету! \n\nОставляю вас готовиться. Зөвлөх, конец связи."
 mongol_rp_advisor.1.a: "Ожидаю дальнейших докладов."
 mongol_rp_advisor.1.b: "Я прекрасно осознаю, что делаю, Далд. Дальнейшие доклады не нужны."


 mongol_anti_soviet.1.t: "Сформировано временное правительство"
 mongol_anti_soviet.1.d: "После катастрофического провала нашей делегации, пытавшейся обеспечить национальную идентичность в эти неспокойные времена, правительственным структурам удалось консолидировать различные фракции партийной элиты и сформировать временный режим, который будет управлять страной в эти неопределённые времена. \n\nНесколько конфликтующих групп интересов с несколькими главарями, борющимися за власть, определённо не способствуют успеху правительства, но, по крайней мере, у них есть много открытых предложений. \n\nЛучше всего нам найти какую-либо форму стабильного и твёрдого руководства или, возможно, попытаться спасти борющегося Гэндэна, если это ещё возможно."
 mongol_anti_soviet.1.a: "Они временно возглавят страну"

 mongol_anti_soviet.2.t: "Мы нашли его!"
 mongol_anti_soviet.2.d: "Поиски 9-го Джебцзундамба-хутухты, современного перевоплощения Богдо-хана, умершего ещё в 1924 году, увенчались большим успехом.\n\nПосле того как наши монахи собрали всех мальчиков в возрасте от двух до пяти лет в местной деревне, с каждым участником были проведены три серии тестов. Несколько часов спустя результаты финального теста помогли нам определить истинное перевоплощение Джебцзундамба-хутухты! \n\nИзначально рождённый как Джампел Намдол Чокьи Гьялцен, мальчику затем сообщили о его истинной личности и о том, что он представляет собой прежний дух, объединявший буддистов Внешней Монголии. Его родители поклялись держать обнаруженные находки в секрете, пока политическая ситуация н"
 mongol_anti_soviet.2.a: "Отлично! Но пока сохраним это в секрете."

 mongol_anti_soviet.3.t: "Никто не прошёл тест"
 mongol_anti_soviet.3.d: "Деревня за деревней, город за городом, но ни один претендент не прошёл набор тестов, направленных на выявление новой личности 9-го Джебцзундамба-хутухты. \n\nНаши поисковые группы больше не будут проводить поиски в этом регионе, предполагая, что перевоплощение Богдо-хана определённо находится где-то в районе Тибетского нагорья. Решение за нами, стоит ли продолжать эту ресурсо- и времязатратную деятельность."
 mongol_anti_soviet.3.a: "Ничего, но мы не сдадимся!"
 mongol_anti_soviet.3.b: "Ничего? Это уже слишком."

 mongol_anti_soviet.4.t: "Назначение нового председателя"
 mongol_anti_soviet.4.d: ""
 mongol_anti_soviet.4.a: "Чэнь Дусю поведёт страну по новому пути к коммунизму!"
 mongol_anti_soviet.4.b: "Иосиф Саталинхан временно возглавит страну."
 mongol_anti_soviet.4.c: "Председатель? Почему не председательница?"

#army events

 mongol_army.1.t: "Схема перестройки производства"
 mongol_army.1.d: "Имея ограниченные ресурсы, мы не можем полностью сосредоточить наши усилия в оборонной промышленности на массовом производстве бронетехники разной специализации. \n\nНовое предложение от нашей исследовательской группы предлагает перенастроить наши производственные линии и мощности для создания и развёртывания узкоспециализированной танковой техники, чья цель будет заключаться либо в надёжности на поле боя в ущерб скорости, либо в наилучшем вооружении при более высоких затратах, либо в дешевизне и лёгкой ремонтопригодности, либо в способности преодолевать наибольшие расстояния за кратчайшее время. \n\nМы всегда можем попытаться изменить наши схемы позже, но ожидается, что"
 mongol_army.1.a: "Сначала отдать предпочтение надёжным моделям"
 mongol_army.1.b: "Поддержать качественное моделирование"
 mongol_army.1.c: "Сосредоточиться на минимальной стоимости производства"
 mongol_army.1.e: "Танки для скорости, а не для боя!"

 mongol_army.2.t: "Многообещающий генерал"
 mongol_army.2.d: "Наш расширяющийся генеральный штаб остро нуждается в новых кандидатах, которые горят энтузиазмом, непредвзяты и могут предоставить нашим старшим офицерам множество новых необычных тактик для работы. Недавний указ объявил тендер на несколько должностей полковников и генералов. \n\nСреди множества заявлений от различных недавних выпускников военных училищ несколько дней назад многообещающий кандидат подал своё заявление в комиссию. \n\nЕго зовут Сандивын Равдан, он известен своей преданностью делу и активной службой в различных гарнизонных учреждениях в последние годы. Прекрасное пополнение для нашего генерального штаба."
 mongol_army.2.a: "Нанять его!"

 mongol_army.3.t: "Запрос на передачу кораблей"
 mongol_army.3.d: "Наши покровители издали указ, согласно которому несколько кораблей наших военно-морских сил запрашиваются для передачи под прямое командование одного из их военно-морских командиров. Заявляя, что это «только на ограниченное время», наши информаторы сообщают о подготовке к укомплектованию полных экипажей, состоящих в основном из моряков [MON.getAdjective]. \n\nСнабжение нашего нового покровителя позволяет нам увеличить нашу автономию в зависимости от того, как мы будем способствовать потенциальным военным усилиям, однако мы всегда можем попытаться затопить некоторые корабли, если не хотим передавать их нашим новым хозяевам."
 mongol_army.3.a: "В нашем распоряжении ограниченное время"

 mongol_army.4.t: "Монголия запрашивает советников"
 mongol_army.4.d: "Ратификация Договора о взаимной помощи и сотрудничестве фактически позволила нашим вооружённым силам разместиться на территории [MON.getAdjective], но пока у нас было мало возможностей взаимодействовать с их офицерами. \n\nСтремясь усилить наше взаимовыгодное сотрудничество, их генералы подписали указ о запросе увеличения количества военнослужащих [SOV.getAdjective], способных проводить военные манёвры и учения на постоянной основе, укрепляя нашу хватку в регионе, сохраняя при этом лояльность армии [MON.getAdjective] нам. Как нам ответить?"
 mongol_army.4.a: "Отправить группу для содействия армии"
 mongol_army.4.b: "Достаточно малой группы"
 mongol_army.4.c: "Наши люди нужны в другом месте"

 mongol_army.5.t: "[SOV.getAdjective] согласны отправить экипаж"
 mongol_army.5.d: "Наша скромная просьба получила широкую поддержку [SOV.getAdjective] генштаба, который решил отправить хорошо оснащённый и обученный экипаж для содействия в разработке наших доктрин на месте. \n\nК соглашению прилагался дополнительный протокол, устанавливающий, что некоторые члены их экипажа также будут наблюдать за модернизацией и обучением нашей армии в рамках дополнительной военной миссии."
 mongol_army.5.a: "Отлично!"

 mongol_army.6.t: "Умеренная помощь от [SOV.getAdjective]"
 mongol_army.6.d: "[SOV.getAdjective] товарищи решили ограничить свою военную миссию несколькими советниками, которые будут наблюдать за общим развитием наших вооружённых сил и их переоснащением в соответствии с современными стандартами. \n\nНаши генералы направили несколько дополнительных запросов, но многие из них были проигнорированы или положены на дальнюю полку какого-то бюрократического кабинета для «рассмотрения в лучшие времена». \n\nЛучше, чем ничего, но, к сожалению, не так эффективно."
 mongol_army.6.a: "Очень хорошо!"

 mongol_army.7.t: "Военная миссия не отправлена"
 mongol_army.7.d: "Заявив, что любое будущее участие усилит напряжённость в регионе и обострит и без того неопределённую ситуацию, [SOV.getLeader] объявил, что военное сотрудничество будет усилено «в ближайшем будущем, когда конкретные обстоятельства станут более благоприятными»... \n\nРазрушительное развитие событий, но, возможно, мы могли бы использовать некоторые из услышанных на месте разговоров, чтобы получить бесплатную военную экспертизу?"
 mongol_army.7.a: "Какой кошмар!"

 mongol_foreign_influence.2.t: "Административная интеграция Монголии"
 mongol_foreign_influence.2.d: "Наше влияние в [MON.getNameDef] привело к опасной ситуации, когда их внутренняя и внешняя политика сильно зависят от нашей помощи. \n\nВидя борьбу [MON.getAdjective] народа за выживание, [ROOT.getLeader] решил назначить лояльное правительство, которое должно укрепить нашу власть над страной в эти неопределённые и опасные времена."
 mongol_foreign_influence.2.a: "Отправить посланника с объявлением новой власти"
 mongol_foreign_influence.2.b: "Не в наших интересах"

 mongol_foreign_influence.3.t: "Монголия сочувствует нашему делу!"
 mongol_foreign_influence.3.d: "Мы получили секретную телеграмму из [MON.getNameDef], в которой [MON.getLeader] заверяет в своей верности нашему делу в эти неопределённые времена. \n\nВидя революционную борьбу нашего народа, их послы предложили договор о взаимопомощи и сотрудничестве в борьбе за Народную революцию. \n\nСледует ли нам считать их друзьями или сохранять нейтральную позицию по отношению к ним?"
 mongol_foreign_influence.3.a: "Очень хорошо!"
 mongol_foreign_influence.3.b: "Нам это не интересно."

 mongol_foreign_influence.4.t: "[FROM.getAdjective] чиновники принимают сделку"
 mongol_foreign_influence.4.d: "Делегации наших стран встретились сегодня утром, чтобы обсудить вопрос взаимовыгодной помощи в этой борьбе. \n\nПодписанный обеими сторонами договор официально закрепляет нашу верность [FROM.getNameDef] и их лидеру [FROM.getLeader], позволяя нам добиваться различных дипломатических уступок в этой борьбе."
 mongol_foreign_influence.4.a: "Пусть это будет плодотворное сотрудничество!"

 mongol_foreign_influence.5.t: "Сделка между [FROM.getAdjective] и [ROOT.getAdjective] отклонена"
 mongol_foreign_influence.5.d: "Несмотря на все наши усилия, [FROM.getLeader], похоже, не был убеждён в наших «туманных обещаниях и пустых угрозах», намекая, что мы можем использовать недавно заключённый договор для получения несправедливого преимущества в этой неопределённой ситуации. \n\nСрыв переговоров вынудил наших дипломатов вернуться в столицу ни с чем, привезя с собой тревожные вести."
 mongol_foreign_influence.5.a: "Жаль"

 mongol_foreign_influence.6.t: "[MON.getAdjective] чиновники объявляют о желании вмешаться в гражданскую войну"
 mongol_foreign_influence.6.d: "Стремясь «раз и навсегда разрешить и завершить текущий конфликт в Советском Союзе», [MON.getLeader] сделал публичное заявление о том, что [MON.getAdjective] народ готов бороться за наследие Русской революции и истинные ценности коммунистических идеалов. \n\nЗаявляя, что время прятаться в тени гиганта прошло, [MON.getNameDef] готовит свои силы к вступлению в Гражданскую войну в России в эти тяжёлые для нашего Отечества времена."
 mongol_foreign_influence.6.a: "О нет! Ну и ладно..."

 mongol_foreign_influence.10.t: "Монголия пригласила нас обеспечить контроль над одним из warlords"
 mongol_foreign_influence.10.d: "Понимая нашу важную роль и силу в Гражданской войне в Китае, [MON.getAdjective]ие дипломаты обратились к нашим чиновникам с любопытным предложением разделить сферы влияния и соответствующее государство военачальника вблизи наших границ. \n\nПредложенный план должен выглядеть так: сначала мы разделим соответствующие стратегические районы будущего противника и его сателлитов, если таковые присутствуют и доступны для предъявления претензий. \n\nПосле составления схемы будет выдвинут единый ультиматум с требованием либо примирения с региональными державами, либо дипломатической изоляции и быстрой гибели. \n\nЛюди задаются вопросом, вступим ли мы в борьбу и получим ли от этого земли. Каково будет окончательное решение [ROOT.getLeader]?"
 mongol_foreign_influence.10.a: "Мы с радостью присоединимся!"
 mongol_foreign_influence.10.b: "Другие дела важнее"

 mongol_foreign_influence.11.t: "[FROM.getAdjective] боевики начнут свои силы"
 mongol_foreign_influence.11.d: "[FROM.getLeader] проинформировал нас, что они направят дипломатов и военный контингент для обеспечения безопасности отколовшегося региона. \n\nВсё, что нам нужно сейчас сделать, это разделить сферы влияния в соответствии с нашими желаниями и волей наших союзников. \n\nЗатем мы предъявим ультиматум и увидим, как границы Центральной равнины изменятся в нашу пользу дипломатическими или военными средствами..."
 mongol_foreign_influence.11.a: "Великолепно!"

 mongol_foreign_influence.12.t: "[FROM.getAdjective] чиновники не проявляют интереса"
 mongol_foreign_influence.12.d: "Не имея возможности выделить дополнительные ресурсы на наше «опасное предприятие», [FROM.getLeader] решил отклонить наше скромное предложение. \n\nМы не сможем рассчитывать на их поддержку в этой борьбе, но была ли она действительно нужна, если так подумать? \n\nНаш министр иностранных дел уже сказал, что такое нежелание оставит нам больше пространства для манёвра."
 mongol_foreign_influence.12.a: "Тем хуже для них"

 mongol_foreign_influence.13.t: "[FROM.getAdjective] чиновники предъявили нам ультиматум!"
 mongol_foreign_influence.13.d: "Дипломатические миссии из разных стран недавно прибыли в главные канцелярии наших чиновников и во главе с [MON.getAdjective]ой делегацией представили нам длинный список требований, где обсуждается раздел наших законных земель! \n\nВ представленных документах они утверждают, что «время милитаристских клик осталось в прошлом, а Центральная равнина должна быть переустроена в соответствии с нуждами региональных держав, способных объединить раздробленные народы и страны, которые за последние десятилетия видели лишь руины». \n\nНаш министр иностранных дел был потрясён дерзостью требований и количеством уступок, на которые нам пришлось бы пойти, чтобы «обеспечить мирное сосуществование наших народов». \n\nПохоже также, что наши враги тщательно подготовили программу..."
 mongol_foreign_influence.13.a: "Мы уступим"
 mongol_foreign_influence.13.b: "Мы не сдадимся!"

 mongol_foreign_influence.14.t: "[FROM.getAdjective] чиновники приняли неизбежное"
 mongol_foreign_influence.14.d: "Не выдержав дипломатического давления Коалиции, [FROM.getLeader] был вынужден уйти в отставку и передать свои полномочия недавно созданному временному правительству, которое предприняло огромные усилия по изменению административного деления страны. \n\nПосле нескольких трудных дней территории были переданы соответствующим союзникам, и администрация страны фактически самораспустилась."
 mongol_foreign_influence.14.a: "Как и планировалось"

 mongol_foreign_influence.15.t: "[FROM.getAdjective] чиновники мобилизуются!"
 mongol_foreign_influence.15.d: "В попытке сохранить остатки разваливающейся страны, [FROM.getLeader] решил, что честная борьба лучше, чем «такой позор», фактически введя военное положение по всей стране и распустив в то же время различные дипломатические учреждения. \n\nС силами Коалиции на границе любое иностранное вмешательство сведено к минимуму до тех пор, пока новости о нашем вторжении не дойдут до мировых дипломатов. \n\nУ нас ограниченное время в нашем распоряжении, и мы должны использовать его с умом."
 mongol_foreign_influence.15.a: "Они выбрали свою судьбу"
