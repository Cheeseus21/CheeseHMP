 MON_peljidiin_genden_desc: "Родившийся на рубеже веков в бедной семье скотовода, Гэндэн рано вступил в Монгольскую народно-революционную партию и сумел заручиться поддержкой многих старших партийных лидеров своей простой и открытой риторикой. Когда началась Народная революция 1924 года, молодой пролетарий был назначен председателем Бага Хурала, что открыло ему путь к высшим эшелонам власти. \n\nПоддержка советских чиновников позволила ему стать одним из трёх государственных секретарей после VII партийного съезда 1928 года. Совет начал проводить жёсткую коллективизацию и антибуддийскую политику, что привело к открытым восстаниям по всей стране. Его выживание во время контрчистки связывали с высокой преданностью делу и прямым покровительством Иосифа Сталина ещё в 1932 году. \n\nОднако эти отношения продлились недолго: прорелигиозная позиция невоспитанного Гэндэна заставила различных советских чиновников к началу 1935 года считать его «ненадёжным союзником»..."

