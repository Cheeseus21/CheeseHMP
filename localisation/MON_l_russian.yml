l_russian:

 MON_GATHERING_STORM_DESC: "На перекрёстке миров Монголия обрела покой после провозглашения независимости от империи Цин в 1911 году. Советская помощь превратила страну в Народную Республику, пережившую огромные правительственные и экономические изменения в последние годы. \n\nНо с новой угрозой, поднимающейся на Востоке, продолжающейся Гражданской войной в Китае на юге и ухудшением отношений с СССР, страна может стать новым рубежом, если баланс сил сместится не в ту сторону..."

