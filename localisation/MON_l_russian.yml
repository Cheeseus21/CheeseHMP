 MON_1935_state_visit_to_moscow_category_desc: "Усиление активности [JAP.GetAdjective] империалистов и их милитаристских марионеток повысило осведомлённость правящей элиты страны перед лицом Пэлжидийн Гэндэна. В сопровождении военного министра Гэлэгдоржийн Дэмида он отправился в декабре 1935 года в Москву для обсуждения возможности [SOV.getAdjective] военной и промышленной помощи в связи с неспокойной восточной границей нашей обширной державы. \nПереговоры ожидаются в ближайшее время, и возникает вопрос: какие именно вопросы следует там обсудить?"

