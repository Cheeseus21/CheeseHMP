##political##
 MON_troika_organized: "Организованная «Тройка»"
 MON_troika_organized_desc: "Следуя примеру сталинских революционных троек, мы создали собственную тройку, которую должен возглавить Чойбалсан, чтобы установить закон и порядок в государстве."

 MON_political_opposition_organizing: "Организация политической оппозиции"
 MON_political_opposition_organizing_desc: "Понимая, что их отстраняют от власти, милитаристы попытаются свергнуть правительство и установить военную диктатуру. Мы должны быть готовы к их удару и организовать собственную базу поддержки!"

