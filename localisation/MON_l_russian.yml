 Mon_tech_coop_idea_desc: "Нам есть чему поучиться у наших партнёров; пусть это сотрудничество будет плодотворным, как никогда прежде!"

 Mon_soviet_advisors_idea: "[SOV.getAdjective] Военные советники"
 Mon_soviet_advisors_idea_desc: "[SOV.GetAdjective] военные специалисты были направлены на нашу территорию в рамках договора о взаимной помощи."

 Mon_soviet_crew_idea: "[SOV.getAdjective] Военный экипаж"
 Mon_soviet_crew_idea_desc: "Несколько [SOV.getAdjective] генералов и теоретиков помогают нашему Генеральному штабу."

 MON_changed_script_idea: "Изменённая письменность"
 MON_changed_script_idea_desc: "Старая монгольская письменность имела разные формы написания, что сильно затрудняло обучение наших детей. Новые изменения позволяют населению учиться более эффективно."

 MON_script_reform_in_progress_idea: "Реформа письменности в процессе"
 MON_script_reform_in_progress_idea_desc: "В настоящее время прилагаются огромные усилия для унификации разрозненной системы письменности [MON.getNameDef]."

 MON_weak_currency_idea: "Слабая валюта"
 MON_weak_currency_idea_desc: "Несмотря на введение национальной валюты в 1925 году, тугрик остаётся непопулярной валютой среди широких масс народа, которые по-прежнему склонны полагаться на китайский юань, советский рубль, американский или мексиканский доллар и дюжину других низколиквидных валют, обращающихся на чёрном рынке."

 MON_new_course_policy_idea: "Политика нового курса"
 MON_new_course_policy_idea_desc: "Бесчеловечная политика коллективизации, проводимая государственными властями в начале 1930-х годов, едва не вызвала восстание в западных частях страны, которое было оперативно подавлено военными и обещаниями лучших условий жизни, известными как «Политика нового курса», по аналогии со старой ленинской НЭП."

 MON_buddhist_opposition: "Буддийская оппозиция"
 MON_buddhist_opposition_desc: "Религия глубоко укоренилась в монгольском обществе, и различные религиозные институты используют свою власть и влияние, чтобы открыто противостоять государственной политике и директивам Центрального комитета. Большой процент сельских мужчин посвятил свою жизнь монастырям и не желает участвовать в государственных делах."

 MON_dominated_animal_husbandry_idea: "Доминирующее животноводство"
 MON_dominated_animal_husbandry_idea_desc: "Кочевой образ жизни является распространённым способом существования на великих равнинах страны, и голоса индустриализации достигли лишь горстки людей в высших эшелонах власти."

 MON_animal_husbandry_prioritised_idea: "Приоритет животноводства"
 MON_animal_husbandry_prioritised_idea_desc: "Наше наследие и успех лежат в животноводстве, и то, что работало веками, скорее всего, будет работать и в будущем."

 MON_industrial_growth_prioritised_idea: "Приоритет промышленного роста"
 MON_industrial_growth_prioritised_idea_desc: "Векам эксплуатации животных должен быть положен конец в совместных усилиях по достижению целей национальной промышленной революции!"

 MON_encourage_trade_idea: "Поощрение торговли"
 MON_encourage_trade_idea_desc: "Наш рынок многое выигрывает от недавно заключённых торговых сделок!"

 MON_improved_mining_facilities_idea: "Улучшенные горнодобывающие предприятия"
 MON_improved_mining_facilities_idea_desc: "Благодаря нескольким государственным инвестициям наша отрасль добычи и эксплуатации ресурсов способна обеспечить национальный рынок большим количеством ресурсов."

 MON_focus_on_south: "Фокус на юге"

 MON_modernizing_transportation_system: "Модернизация транспортной системы"

 Mongolbank_very_high_funds: "§HMongolbank — Очень высокие средства§!"
 Mongolbank_very_high_funds_desc: "Сложно управлять банковской системой должным образом, но экономика процветает!"

 Mongolbank_high_funds: "§HMongolbank — Высокие средства§!"
 Mongolbank_high_funds_desc: "Управление финансами остаётся проблемой, но промышленность от этого выигрывает."

 Mongolbank_moderate_funds: "§HMongolbank — Умеренные средства§!"
 Mongolbank_moderate_funds_desc: "Сбалансированный подход к управлению и поддержке промышленности."

 Mongolbank_low_funds: "§HMongolbank — Низкие средства§!"
 Mongolbank_low_funds_desc: "Небольшое количество денег и потенциальных кредитов тормозит экономический рост страны."

 Mongolbank_bankrupt: "§HMongolbank — Банкрот§!"
 Mongolbank_bankrupt_desc: "Банкрот и больше не может выдавать кредиты. Требуется прямое вмешательство правительства!"

 MON_foreign_tribute_idea: "Иностранная дань"

 MON_soviet_NKVD_agents: "Советские агенты НКВД"
 MON_soviet_NKVD_agents_desc: "Наследие Революции 1924 года привело к введению однопартийной системы, которая в значительной степени опирается на поддержку и надзор советских гражданских и военных экспертов. Некоторые из этих специалистов крепко держат руку на пульсе политики страны."

