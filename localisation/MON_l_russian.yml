 MON_banditry_know_how: "Опыт бандитизма"

 MON_communist_paradise_achieved: "Коммунистический рай достигнут"
 MON_communist_paradise_achieved_desc: ""

 MON_first_five_year_plan: "Первый пятилетний план"

 MON_volunteer_corps: "[ROOT.getAdjective] Добровольческий корпус"

 MON_powerful_choibalsan: "Могущественный Чойбалсан"
 MON_powerful_choibalsan_desc: "Один из семи человек, которые вели переговоры о независимости Монголии с Китаем и Россией в 1921 году, Чойбалсан и его сторонники теперь широко представлены в правительстве."

 MON_ministery_of_interior_reorganized: "Реорганизованное Министерство внутренних дел"
 MON_ministery_of_interior_reorganized_desc: "Следуя по стопам НКВД, нашей стране удалось значительно улучшить работу Татнуулым фэнхийн Газар (Главное разведывательное управление Монголии)."

 MON_consolidated_power_1: "Власть сосредоточена в одной области"
 MON_consolidated_power_1_desc: "Власть теперь крепко сжата в руках одного лидера, и это Чойбалсан, действующий за спиной Анандын Амара."

 MON_consolidated_power_2: "Власть сосредоточена в большинстве областей"
 MON_consolidated_power_2_desc: "Чойбалсан закрепился во многих сферах и теперь правит [MON.getNameDef]."

 MON_consolidated_power_3: "Полностью сосредоточенная власть"
 MON_consolidated_power_3_desc: "Чойбалсан теперь полностью контролирует [MON.getNameDef]."

 Mon_intellectuals_purged: "Чистка интеллигенции"
 Mon_intellectuals_purged_desc: "Рассматриваемые как «ненадёжные», несколько интеллектуалов были подвергнуты чистке."

 Mon_party_purged: "Чистка партии"
 Mon_party_purged_desc: "Были проведены перестановки и аресты, оставившие глубокие шрамы в нынешней партийной структуре."

 Mon_lamas_purged: "Чистка лам"
 Mon_lamas_purged_desc: "Многие члены религиозных институтов бежали из страны или были вынуждены скрываться из-за недавних правительственных чисток."

 MON_border_patrols_recruitment: "Набор пограничных патрулей"
 MON_border_patrols_recruitment_desc: "Безопасности нашей сухопутной границы был присвоен высочайший приоритет. Нам нужно всё и все, кто доступен, чтобы сохранить наше государство!"

