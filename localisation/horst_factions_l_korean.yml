 EUROPE_ONLY_DESC:0 "특정 유럽 전선만 포함하는 빠른 게임 모드로, 3명의 플레이어가 함께 플레이할 수 있습니다. 새로운 게임 모드이므로 버그가 있다면 제보해 주십시오. \n\n독일은 1942년 6월 1일까지 아프리카에서 연료를 얻습니다. \n\n매 게임마다 공장이 무작위로 건설되니, 병력 배치 파악에 행운을 빕니다."
 
