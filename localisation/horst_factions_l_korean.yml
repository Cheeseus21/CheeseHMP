 naval_supply_hub_desc: "이 건물은 함대가 모항 외에 이 기지에서도 재보급 및 재급유를 할 수 있게 하여, §Y기동함대§!의 작전 범위를 확장할 수 있습니다.\n해군 보급 기지는 해군 기지 레벨이 1 이상인 해안 프로빈스에만 건설할 수 있습니다."
