 tank_gasoline_engine_L: "Малый бензиновый двигатель"
 tank_gasoline_engine_L_desc: "Двигатель, работающий на бензине, будет быстрее при равном объеме, но сам бензин при этом сильнее подвержен возгоранию."
 tank_diesel_engine_L: "Малый дизельный двигатель"
 tank_diesel_engine_L_desc: "Дизельный двигатель надежнее бензинового, но при одинаковом объеме с ним техника развивает меньшую скорость."
 tank_petrol_electric_engine_L: "Малый бензоэлектрический двигатель"
 tank_petrol_electric_engine_L_desc: "Комбинация бензинового двигателя и электродвигателя, получающего от него энергию. Такой мотор сложен, дорог и ненадежен, но превосходит любые другие по производительности в тактических маневрах."
 tank_gas_turbine_engine_L: "Малая газовая турбина"
 tank_gas_turbine_engine_L_desc: "Турбина, разработанная на основе реактивного двигателя. Высокий расход топлива, но при этом максимальная скорость при данном объеме."
 mech_petrol_electric_engine: "Бензиново-электрический двигатель"
