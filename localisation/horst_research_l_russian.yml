 tank_modern_cannon: "§8Современная§! пушка"
 tank_modern_howitzer: "§8Современная§! гаубица"
 EQ_MOD_CAT_tank_modern_main_armament_TITLE: "Современное вооружение"
 tank_modern_cannon_desc: "Оружие общего назначения, хорошо подходящее для широкого круга задач. Оно не превосходно ни в противотанковой, ни в противопехотной роли, но благодаря специализированным боеприпасам сохраняет сильные противотанковые характеристики."
 tank_modern_howitzer_desc: "Современная полевая гаубица, адаптированная для установки на транспортное средство. Её основное назначение — непрямая огневая поддержка по мягким целям, но при необходимости может вести огонь прямой наводкой. Имея лишь небольшое количество бронебойных боеприпасов, мало подходит для противотанковой работы."
 tank_modern_anti_air_cannon: "§8Современная§! зенитная пушка"
 tank_modern_anti_air_cannon_desc: "Скорострельное автоматическое орудие для борьбы с самолетами. Обладает ограниченной возможностью применения к наземным целям для поддержки огнем."

 modern_rocket_launcher: "§8Современная§! реактивная установка"
 modern_rocket_launcher_desc: "Эта установка отличается повышенной точностью стрельбы, но основное ее преимущество — увеличенное количество ракет."
 modern_auto_cannon: "§8Современная§! автоматическая пушка"
 modern_auto_cannon_desc: "Это орудие, сделанное по образцу скорострельной зенитной пушки, способно буквально уничтожать слабобронированные цели чередой снарядов. Небольшой калибр не снижает бронебойность."
 tank_modern_high_velocity_cannon: "§8Современная§! скорострельная пушка"
 tank_modern_high_velocity_cannon_desc: "Пушка, специально спроектированная для достижения высокой дульной скорости. При использовании специальных боеприпасов обладает отличными бронебойными характеристиками, но при этом страдает эффективность против слабобронированных целей."
 
 
 
