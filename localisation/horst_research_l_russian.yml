 tank_medium_howitzer_3: "§2Продвинутая§! средняя гаубица"
 tank_medium_howitzer_3_desc: "Средняя полевая гаубица, предназначенная для установки в машину. Ее основное предназначение — непрямой огонь по слабобронированным целям, но при необходимости гаубица может применяться и для стрельбы прямой наводкой. Снабжается ограниченным количеством бронебойных снарядов и слабо применима для борьбы с танками."
