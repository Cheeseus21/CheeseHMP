 tank_designer_armored_car_chassis: "Бронемашина"
 armored_car_chassis_0: "Шасси бронемашины межвоенного периода"
 armored_car_chassis_1: "Базовое шасси бронемашины"
 armored_car_chassis_2: "Улучшенное шасси бронемашины"
 
 
 car_4x4_suspension: "Полный привод 4×4"
 car_4x4_suspension_desc: "4 колеса обеспечивают большую скорость и простоту производства, создавая быструю и манёвренную разведывательную машину."
 car_6x6_suspension: "Полный привод 6×6"
 car_6x6_suspension_desc: "6 колёс медленнее, но имеют лучшую управляемость, что делает их пригодными для поддержки пехоты на передовой и охоты на партизан."
 car_8x8_suspension: "Полный привод 8×8"
 car_8x8_suspension_desc: "Конфигурация 8×8 делает бронемашину ближе к танкам: больше управляемости, больше возможностей для засад."
 car_riveted_armor: "Клепаная броня"
 car_riveted_armor_desc: "Бронепластины, прикрученные к раме и удерживаемые заклепками. Проверенная временем и относительно дешевая технология, но сами клепаные края брони — уязвимые места, а попадание в заклепки может ранить экипаж."
 car_welded_armor: "Сварная броня"
 car_welded_armor_desc: "Бронепластины привариваются к шасси. Этот процесс быстрее литья и при этом все равно обеспечивает хорошую защиту."
 car_flat_armor: "Плоское бронирование"
 car_flat_armor_desc: "Господствовавшее в межвоенный период плоское бронирование просто в производстве и обеспечивает менее тесный корпус для экипажа, увеличивая эффективную слаженность."
 car_semi-flat_armor: "Полунаклонное бронирование"
 car_semi-flat_armor_desc: "Компромисс между наклонной и плоской бронёй: на некоторых участках угол наклона круче, что увеличивает эффективную толщину, а плоские листы в других частях упрощают размещение узлов."
 car_sloped_armor: "Наклонное бронирование"
 car_sloped_armor_desc: "Броня, размещенная под углом к траектории снаряда, обладает гораздо большей толщиной на срезе, чем такая же броня, размещенная вертикально. Еще эта броня повышает шанс отскока снаряда. Тем не менее применение такой брони требует изменений в конструкции танка, что затрудняет сборку."

 car_nft_two_man_tank_turret: "Орудийная установка в каземате"
 car_nft_two_man_tank_turret_desc: "Установка основного орудия в открытом каземате позволяет разместить более крупные пушки."
 car_rocket_launcher: "§GБазовая§! реактивная установка"
 car_rocket_launcher_desc: "Многоствольная пусковая установка для стрельбы неуправляемыми фугасными реактивными снарядами. Большая площадь накрытия делает ее эффективной при работе по небронированным целям, но против бронированных она неэффективна даже при прямом попадании."
 car_rocket_launcher_2: "§2Улучшенная§! реактивная установка"
 car_rocket_launcher_2_desc: "Эта установка отличается повышенной точностью стрельбы, но основное ее преимущество — увеличенное количество ракет."
 car_medium_howitzer_desc: "Средняя полевая гаубица, предназначенная для установки в машину. Ее основное предназначение — непрямой огонь по слабобронированным целям, но при необходимости гаубица может применяться и для стрельбы прямой наводкой. Снабжается ограниченным количеством бронебойных снарядов и слабо применима для борьбы с танками."
 car_medium_howitzer_2: "§GУлучшенная§! Средняя гаубица"
 car_medium_howitzer_2_desc: "Средняя полевая гаубица, предназначенная для установки в машину. Ее основное предназначение — непрямой огонь по слабобронированным целям, но при необходимости гаубица может применяться и для стрельбы прямой наводкой. Снабжается ограниченным количеством бронебойных снарядов и слабо применима для борьбы с танками."
 car_medium_howitzer_3: "§2Продвинутая§! Средняя гаубица"
 car_medium_howitzer_3_desc: "Средняя полевая гаубица, предназначенная для установки в машину. Ее основное предназначение — непрямой огонь по слабобронированным целям, но при необходимости гаубица может применяться и для стрельбы прямой наводкой. Снабжается ограниченным количеством бронебойных снарядов и слабо применима для борьбы с танками."

 amtrac_chassis: "Десантные машины-амфибии"
 amtrac_chassis_short: "Амфибии"
 amtrac_chassis_desc: "Десантные гусеничные бронемашины защищают морскую пехоту во время высадок. Недостатком является высокий расход топлива."
 amtrac_chassis_0: "Базовая машина-амфибия"
 amtrac_chassis_0_short: "Базовая амфибия"
 amtrac_chassis_0_desc: "Десантные гусеничные бронемашины защищают морскую пехоту во время высадок. Недостатком является высокий расход топлива."
 amtrac_chassis_1: "Улучшенная машина-амфибия"
 amtrac_chassis_1_short: "Улучшенная амфибия"
 amtrac_chassis_1_desc: "Эти десантные бронемашины отличаются набором улучшений, в числе которых откидная задняя аппарель, ускоряющая разгрузку техники."

  
 
 
 car_medium_cannon_3: "§2Продвинутая§! Средняя пушка"
 car_medium_cannon_3_desc: "Орудие общего назначения, используемое для широкого круга задач. Не достигает исключительной эффективности ни в борьбе с пехотой, ни в сражениях с танками, но обеспечивает боевой машине большую гибкость применения."
 car_medium_cannon_desc: "Орудие общего назначения, используемое для широкого круга задач. Не достигает исключительной эффективности ни в борьбе с пехотой, ни в сражениях с танками, но обеспечивает боевой машине большую гибкость применения."
