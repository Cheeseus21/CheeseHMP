 tank_hydropneumatic_suspension_M_desc: "Более сложный тип подвески: опорные катки поднимаются при наезде на неровности, обеспечивая более точную стрельбу с ходу и занятие оборонительных позиций на пересечённой местности."
 tank_interleaved_suspension_M: "Средние шахматные опорные катки"
 tank_interleaved_suspension_M_desc: "Размещая катки в шахматном порядке, можно поставить больше катков при той же длине кузова, улучшив тем самым мобильность и обеспечив дополнительную защиту с боков."
 tank_bogie_suspension_M: "Средняя тележечная подвеска"
 tank_bogie_suspension_M_desc: "Простой и относительно дешевый тип подвески, в котором катки закреплены отдельно, что облегчает их замену при повреждении."
 tank_christie_suspension_M: "Средняя подвеска Кристи"
 tank_christie_suspension_M_desc: "Эта подвеска, разработанная американским изобретателем, позволяет развивать исключительно высокую скорость."

 
 
 
 
 
 
 
 
 
 
 
 
