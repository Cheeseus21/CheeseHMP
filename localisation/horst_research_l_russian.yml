 car_close_support_gun: "§gБазовое§! Орудие непосредственной поддержки"
 car_close_support_gun_desc: "Небольшое орудие, спроектированное для стрельбы фугасными снарядами по полевым укреплениям противника и поддержки атакующей пехоты. Способно атаковать бронетехнику, но короткий ствол и ограниченный боезапас делают его непригодным для борьбы с мощными танками."
 car_close_support_gun2: "§GУлучшенное§! Орудие непосредственной поддержки"
 car_close_support_gun2_desc: "Небольшое орудие, спроектированное для стрельбы фугасными снарядами по полевым укреплениям противника и поддержки атакующей пехоты. Способно атаковать бронетехнику, но короткий ствол и ограниченный боезапас делают его непригодным для борьбы с мощными танками."
