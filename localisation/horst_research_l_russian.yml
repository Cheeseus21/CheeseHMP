 DELETE_DOCK: "Удалить верфь"
 naval_bomber3: "1944 Морские бомбардировщики"
 air_offensex_desc: "Сделав упор на бомбардировки в дневное время, мы должны беречь наши бомбардировщики от вражеских перехватчиков. Пройдя обучение по совместной работе с бомбардировщиками, пилоты истребителей смогут эффективнее защищать их во вражеском воздушном пространстве."
 fighter_baitingx: "Ложные действия"
 fighter_baitingx_desc: "Притворившись уязвимыми, наши истребители могут заманить противника в ловушку."
 dogfighting_experiencex: "Опыт асов-истребителей"
 dogfighting_experiencex_desc: "В разгар суматошного воздушного боя не так-то просто понять, где свои, а где — противник, но чем опытнее становятся наши пилоты, тем легче им удается это сделать."
 fighter_ace_initiativex: "Программа поддержки асов-истребителей"
 fighter_ace_initiativex_desc: "Выдавая награды и звания пилотам, получившим статус асов за пять сбитых самолетов противника, мы поощряем рискованные действия и наделяем их чувством принадлежности к элите. Правда, это значит, что опытные пилоты продолжат совершать боевые вылеты."
 modifier_repair_speed_air_base_factor: "§YАвиабаза§! Скорость ремонта"
 multialtitude_flyingx: "Полет на разных высотах"
 multialtitude_flyingx_desc: "Воздушный бой происходит в трех измерениях, но большинству пилотов трудно отслеживать самолеты, находящиеся под или над ними. Мы можем воспользоваться этой особенностью, расположив наши боевые порядки по вертикали."
 offensive_formationsx: "Наступательный боевой порядок"
 offensive_formationsx_desc: "Научившись соблюдать наступательный боевой порядок, наши пилоты станут эффективнее в бою."
 fighter_sweepsx: "Свободная охота"
 fighter_sweepsx_desc: "Наши самолеты, агрессивно патрулирующие вражескую территорию, могут настигнуть самолеты противника во время взлета или посадки, когда они наиболее уязвимы, или сорвать вражеские учения."
 force_rotationx: "Принудительная ротация"
 force_rotationx_desc: "Сражения, равно как периоды особой сосредоточенности, сильно изматывают, но, по возможности заменяя пилотов, мы уменьшим количество ошибок, возникающих из-за усталости."
 air_defencex: "Противовоздушная оборона"
 air_defencex_desc: "Научив наших пилотов соблюдать предельную внимательность даже тогда, когда опасности нет, мы увеличим их шансы перехватить вражеский самолет."
 dispersed_fightingx: "Рассредоточенная атака"
 dispersed_fightingx_desc: "Используя более рассредоточенный боевой порядок, мы можем охватить больший район тем же количеством самолетов."
 forward_interceptionx: "Упреждающий перехват"
 forward_interceptionx_desc: "Действуя ближе к вражескому воздушному пространству, мы увеличим вероятность перехвата вражеских самолетов до того, как они достигнут цели."
 fighter_veteran_initiativex: "Программа поддержки ветеранов-истребителей"
 fighter_veteran_initiativex_desc: "Упор на долгосрочное выживание за счет грамотной тактики и перевода опытных пилотов на учебную работу позволит летчикам передать свои знания новому поколению."
 formation_fightingx: "Групповой бой"
 formation_fightingx_desc: "Соблюдая правильный боевой порядок, наши пилоты смогут прикрыть мертвое пространство друг друга, что позволит лучше обнаруживать вражеские самолеты."
 air_skirmishx: "Воздушная схватка"
 air_skirmishx_desc: "К сожалению, нам не всегда удается сбить все вражеские самолеты в нашем небе, но мы можем выматывать их с самого обнаружения до того момента, когда они покинут нашу территорию."
 home_defencex: "Гражданская оборона"
 home_defencex_desc: "Наблюдатели на земле, а также пункты раннего обнаружения, действующие в унисон с нашими ВВС, позволяют отслеживать и уничтожать самолеты противника."
 battlefield_destructionx: "Разрушение поля боя"
 battlefield_destructionx_desc: "Самолеты способны наносить удары по находящимся далеко странам, но они с не меньшей пользой могут помочь сухопутным войскам в сражении."
 dive_bombingx: "Пикирование"
 dive_bombingx_desc: "Пикирование позволяет увеличить точность стрельбы, но для достижения результата нужны особые модели самолетов, которые могут замедлить свое пикирование и без труда выйти из него."
 direct_ground_supportx: "Непосредственная наземная поддержка"
 direct_ground_supportx_desc: "Координируя действия штурмовиков с наземными наблюдателями, мы сможем наносить точечные удары, помогая сухопутным войскам в бою."
 bomber_veteran_initiativex: "Программа поддержки бомбардировщиков-ветеранов"
 bomber_veteran_initiativex_desc: "Политика, по которой пилоты-ветераны передают свой опыт и знания молодым летчикам, увеличит шансы новобранцев на выживание."
 bomber_ace_initiativex: "Программа поддержки асов-бомбардировщиков"
 bomber_ace_initiativex_desc: "Официальное признание заслуг асов-бомбардировщиков поощряет их отвагу и инициативу."
 cas_veteran_initiativex: "Программа поддержки штурмовиков-ветеранов"
 cas_veteran_initiativex_desc: "Политика, по которой пилоты-ветераны передают свой опыт и знания молодым летчикам, увеличит шансы новобранцев на выживание."
 cas_ace_initiativex: "Программа поддержки асов-штурмовиков"
 cas_ace_initiativex_desc: "Официальное признание заслуг асов-штурмовиков поощряет их отвагу и инициативу."
 hunt_and_destroyx: "Поиск и уничтожение"
 hunt_and_destroyx_desc: "Помимо непосредственной огневой поддержки, штурмовики могут самостоятельно отыскивать цели и зачастую проводить внезапные атаки по вражеским сухопутным войскам, приближающимся к линии фронта."
 naval_strike_torpedo_tacticsx: "Торпедный удар по надводным целям"
 naval_strike_torpedo_tacticsx_desc: "Обучив пилотов более точно запускать торпеды, мы повысим эффективность наших налетов на вражеские корабли."
 naval_strike_torpedo_tactics_oix: "Торпедный удар по надводным целям"
 naval_strike_torpedo_tactics_oix_desc: "Обучив пилотов более точно запускать торпеды, мы повысим эффективность наших налетов на вражеские корабли."
 naval_strike_tacticsx: "Тактика удара по надводным целям"
 naval_strike_tacticsx_desc: "Обучив пилотов предсказывать маршрут кораблей и координировать действия, мы повысим эффективность наших налетов на вражеские корабли."
 low_echelon_supportx: "Эшелонированная огневая поддержка"
 low_echelon_supportx_desc: "Прикрепляя штурмовиков напрямую к небольшим группам сухопутных войск, мы обеспечим их постоянным прикрытием с воздуха даже вне зоны действия артиллерии."
 combat_unit_destructionx: "Уничтожение боевых единиц"
 combat_unit_destructionx_desc: "Обучив наших пилотов штурмовиков непрерывно атаковать одну и ту же цель, пока она не будет уничтожена, мы сможем гарантировать, что цель накроют после близкого промаха."
 operational_destructionx: "Операционное разрушение"
 operational_destructionx_desc: "Атаки на вражеские пути снабжения мешают противнику перемещать силы между полями сражений. Это наделяет нашу сухопутную армию преимуществом в районах, где мы достигли превосходства в воздухе."
 infrastructure_destructionx: "Разрушение инфраструктуры"
 infrastructure_destructionx_desc: "Обучив наших пилотов самым эффективным методам уничтожения таких инфраструктурных объектов, как мосты и железные дороги, мы повысим эффективность тактических бомбардировок."
 logistical_bombingx: "Удар по инфраструктуре"
 logistical_bombingx_desc: "Больший упор на воздушные удары по вражеским путям снабжения обеспечит преимуществом наши сухопутные войска в этом регионе."
 battlefield_supportx: "Боевая поддержка с воздуха"
 battlefield_supportx_desc: "Тактическим бомбардировщикам трудно атаковать цели там, где ведут бой наши сухопутные войска, поскольку бомбометание с горизонтального полета не такое точное, как в пикировании. Однако дополнительная подготовка и взаимодействие с наземными наблюдателями помогут решить эту проблему."
 carousel_bombingx: "Карусельное бомбометание"
 carousel_bombingx_desc: "Бомбардировщики чаще всего стараются поскорее сбросить все свои бомбы по прибытии в район цели и вернуться домой. Этот способ работает при площадном бомбометании, но когда нужно поразить небольшую цель, лучше задержаться над ней подольше и сбрасывать боезапас по частям, дабы обеспечить максимальную точность."
 keypoint_bombingx: "Бомбардировка ключевых целей"
 keypoint_bombingx_desc: "Точная бомбардировка по ключевым целям на поле боя здорово поможет нашим сухопутным войскам одержать верх."
 ground_support_integrationx: "Интеграция наземной поддержки"
 ground_support_integrationx_desc: "Полная интеграция наших тактических бомбардировщиков с наземными наблюдателями повышает их точность и позволяет напрямую поддерживать наши сухопутные силы в бою."
 strategic_destructionx: "Стратегическое разрушение"
 strategic_destructionx_desc: "Наши пилоты могут добраться до стратегических целей быстрее, чем флот и наземные войска. Поскольку противнику будет нечем оснащать своих новобранцев, мы быстро задавим его числом."
 high_level_bombingx: "Бомбометание с больших высот"
 high_level_bombingx_desc: "Проводя бомбометание с больших высот, мы можем избежать стычек с самолетами противника и огня ПВО. Это более безопасный метод, но он требует более высокой точности."
 massed_bomber_formationsx: "Бомбардировки в боевом порядке"
 massed_bomber_formationsx_desc: "Сохраняя боевой порядок, наши бомбардировщики смогут защищаться и повысят шанс успешного бомбометания."
 night_bombingx: "Ночная бомбардировка"
 night_bombingx_desc: "Ночью вражеская оборона слабее, а наши бомбардировщики укрыты темнотой. Теперь мы можем круглосуточно атаковать противника. Покажем ему, какие мы упорные.\n\n"
 dead_reckoning_bombingx: "Точные бомбардировки"
 dead_reckoning_bombingx_desc: "Измеряя скорость, вектор движения и смещение относительно предыдущих позиций, мы обеспечим точное бомбометание даже ночью."
 infiltration_bombingx: "Бомбардировки тыла"
 infiltration_bombingx_desc: "Идея примкнуть к вражеской группе или проследить ее путь до авиабазы кажется безумной. Но, набравшись опыта, можно сделать и такое."
 pathfinder_groupsx: "Группы наведения"
 pathfinder_groupsx_desc: "Пилоты-ветераны оснащены самыми лучшими инструментами для подсветки целей. Ни дым, ни плохая погода не помешают бомбардировщикам выполнить задание."
 day_bombingx: "Дневные бомбардировки"
 day_bombingx_desc: "Масштабные бомбардировки в светлое время суток чреваты большими потерями из-за заметности самолетов. Зато мы можем показать противнику свою мощь.\n\n"
 escort_relay_systemx: "Посменный эскорт"
 escort_relay_systemx_desc: "Бомбардировщики в сопровождении истребителей улучшают нашу способность реагировать на вражеские атаки."
 flying_fortressx: "Летающая крепость"
 flying_fortressx_desc: "Если оснастить наши высотные бомбардировщики пулеметами и достаточным количеством брони, они смогут выжить в схватке и вернуться домой."
 mass_destructionx: "Масштабное уничтожение"
 mass_destructionx_desc: "Бомбардировщики несут большое количество самых разрушительных видов оружия. Результат гарантирован, даже если только часть пилотов сможет пробиться к цели."
 

 
