 mech_gasoline_engine: "Бензиновый двигатель"
 mech_gasoline_engine_desc: "Бензиновый двигатель при тех же габаритах будет мощнее, но топливо гораздо более подвержено возгоранию."
 mech_diesel_engine: "Дизельный двигатель"
 mech_diesel_engine_desc: "Дизельный двигатель надёжнее бензинового, но при тех же габаритах не столь быстр."
 car_module_riveted_armor: "Клепаная броня"
 car_module_riveted_armor_desc: "Соединение стальных листов заклёпками дёшево и быстро и не требует квалифицированной рабочей силы. Однако побочным эффектом является то, что каждая заклёпка становится уязвимым местом."
 mech_riveted_armor: "Клепаная броня"
 mech_riveted_armor_desc: "Соединение стальных листов заклёпками дёшево и быстро и не требует квалифицированной рабочей силы. Однако побочным эффектом является то, что каждая заклёпка становится уязвимым местом."
 mech_welded_armor: "Сварная броня"
 mech_welded_armor_desc: "Сварка стальных листов, прокатанных до нужной толщины, с выравниванием зёрен металла."
 mech_easy_maintenance: "Простота в обслуживании"
 mech_easy_maintenance_desc: "Лючки в боевой машине дают доступ ко многим ее важным компонентам и облегчают экипажу выполнение даже сложных регламентных работ."
 mech_radio: "Радио"
 mech_radio_desc: "Базовая двусторонняя радиосвязь позволяет механизированной пехоте координировать тактические манёвры в малом масштабе."
 mech_smoke_launchers: "Дымовые установки"
 mech_smoke_launchers_desc: "Батарея пиротехнических устройств, которые можно включать изнутри, чтобы создавать снаружи танка густую дымовую завесу. Очень полезна в обороне или при попадании в засаду."
 mech_extra_ammo_storage: "Дополнительное хранилище боеприпасов"
 mech_extra_ammo_storage_desc: "Дополнительный боезапас позволяет танку дольше вести бой без необходимости восполнять запасы — но, если в бою у танка пробьют броню, результаты могут быть самыми плачевными. Особенно это стоит учитывать при атаке."
 mech_wet_ammo_storage: "Влажное хранилище боеприпасов"
 mech_wet_ammo_storage_desc: "Кожухи с водой, укрывающие стойки с боеприпасами, значительно уменьшают риск подрыва боезапаса при попадании в танк. Экипаж оценит такую заботу."
 
 mech_chassis: "Механизированное снаряжение"
 mech_chassis_desc: "Механизированная пехота — это пехота, оснащённая бронетранспортёрами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и боя. Механизированная пехота отличается от моторизованной тем, что её машины обеспечивают определённую степень защиты от огня противника, в отличие от небронированных колёсных машин (грузовиков или джипов) для моторизованной пехоты."
 
