 jaegartroops: "Рейнджеры I"
 jaegartroops_desc: "Рейнджеры — это силы, специализирующиеся на выживании в дикой местности бореальных лесов. Обычно эти войска являются уроженцами своей территории и требуют длительного обучения."
 jaegartroops2_desc: "Рейнджеры — это силы, специализирующиеся на выживании в дикой местности бореальных лесов. Обычно эти войска являются уроженцами своей территории и требуют длительного обучения."
