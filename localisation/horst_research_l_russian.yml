 training_schools: "Усовершенствованная лётная подготовка"
 training_schools_desc: "Подвергая наших будущих пилотов интенсивным программам лётной подготовки, можно значительно снизить количество ошибок."
 ground_coordination_effort: "Авиационно-наземная координация"
 ground_coordination_effort_desc: "Программы подготовки как пилотов, так и армейских офицеров будут пересмотрены с упором на взаимодействие сухопутных сил и авиации, что повысит боевую эффективность."
 special_strike_teams: "Передовая тактика ударов по капитальным кораблям"
 special_strike_teams_desc: "Дополнительная подготовка по противокорабельной авиационной войне повысит выживаемость наших пилотов при атаках на вражеские капитальные корабли, в особенности авианосцы."
 taking_care_of_planes: "Прогностическое обслуживание"
 taking_care_of_planes_desc: "Вместо ремонта по мере необходимости и жёсткого графика ремонтных работ мы будем использовать данные для прогнозирования вероятности отказов деталей. Как компромисс между двумя методами мы можем оптимизировать безопасность полётов."
 transport_backbone: "Транспортная основа"
 transport_backbone_desc: "Транспортные самолёты являются основой снабжения частей, находящихся далеко за линией фронта или вдали от портов."
 hunting_formations: "Противолодочные построения"
 hunting_formations_desc: "Специальные построения, предназначенные для наиболее эффективного прочёсывания больших площадей, повысят вероятность обнаружения подводных лодок."
 air_command: "Командование и управление ВВС"
 air_command_desc: "Не менее важна, чем подготовка пилотов, и обученная сеть центров управления авиацией, необходимая для повышения эффективности выполнения задач и выявления опытных пилотов."

