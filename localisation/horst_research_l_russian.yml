 jaeger_desc:0"Rangers, also called Jägers ('hunters'), are forces that specialize in surviving the wilderness of the boreal forest. Usually these troops are native to their territory and take a long time to train."
 shocktroop:0"Shock Troops"
 shocktroop_desc:0"Shock Troops can smash into Enemy lines to achieve a break through. This is almost essential to any form of Deep-Battle and can greatly contribute to throwing the Defenders into disarray."
 armored_car_at_recon: "Бронеавтомобильная противотанковая разведка"
 armored_car_at_equipment_1: "Противотанковая бронемашина"
 armored_car_at_equipment_1_desc: "Рано или поздно наши лёгкие механизированные части столкнутся с танками противника. Разработав специальной противотанковый вариант бронемашины, мы обеспечим себе шанс на победу."
