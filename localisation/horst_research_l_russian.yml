 mech_half_hydropneumatic_suspension: "Полугусеничная гидропневматическая подвеска"
 mech_half_hydropneumatic_suspension_desc: "Более сложный тип подвески: опорные катки приподнимаются при наезде на неровности местности, обеспечивая более точную стрельбу с ходу и занятие оборонительных позиций на пересечённой местности."
 mech_full_hydropneumatic_suspension: "Гусеничная гидропневматическая подвеска"
 mech_full_hydropneumatic_suspension_desc: "Более сложный тип подвески: опорные катки приподнимаются при наезде на неровности местности, обеспечивая более точную стрельбу с ходу и занятие оборонительных позиций на пересечённой местности."
 mech_hydrostatic_engine: "Гидрообъёмный привод"
 mech_hydrostatic_engine_desc: "Гидрообъёмный привод — это трансмиссия, для работы которой требуется специализированный двигатель. Она ускоряет поворот башни и разворот машины, а также потребляет меньше топлива за счёт гидравлического привода."

 amtrac_interleaf_suspension: "Шахматное расположение катков"
 amtrac_interleaf_suspension_desc: "Размещая катки в шахматном порядке, можно поставить больше катков при той же длине кузова, улучшив тем самым мобильность и обеспечив дополнительную защиту с боков."

  
 tank_torsion_bar_suspension_L: "Малая торсионная подвеска"
 tank_torsion_bar_suspension_L_desc: "Относительно надежная система подвески из металлических балок, прикрепленных к шасси боевой машины. Сглаживает неровности лучше, чем подвески других типов."
 tank_horstmann_suspension_L: "Малая подвеска Хорстманна"
 tank_horstmann_suspension_L_desc: "Подвеска Хорстманна, подобная подвеске Кристи, распределяет вес на несколько колёс, позволяя устанавливать более тяжёлое снаряжение без риска поломок."
 tank_hydropneumatic_suspension_L: "Малая гидропневматическая подвеска"
 tank_hydropneumatic_suspension_L_desc: "Более сложный тип подвески: опорные катки поднимаются при наезде на неровности, обеспечивая более точную стрельбу с ходу и занятие оборонительных позиций на пересечённой местности."
 tank_interleaved_suspension_L: "Малые шахматные опорные катки"
 tank_interleaved_suspension_L_desc: "Размещая катки в шахматном порядке, можно поставить больше катков при той же длине кузова, улучшив тем самым мобильность и обеспечив дополнительную защиту с боков."
 tank_bogie_suspension_L: "Малая тележечная подвеска"
 tank_bogie_suspension_L_desc: "Простой и относительно дешевый тип подвески, в котором катки закреплены отдельно, что облегчает их замену при повреждении."
 tank_christie_suspension_L: "Малая подвеска Кристи"
 tank_christie_suspension_L_desc: "Эта подвеска, разработанная американским изобретателем, позволяет развивать исключительно высокую скорость."
