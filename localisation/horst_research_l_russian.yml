 amtrac_gasoline_engine: "Бензиновый двигатель"
 amtrac_gasoline_engine_desc: "Бензиновый двигатель обеспечивает большую скорость при заданном размере, но топливо значительно более пожароопасно."
 amtrac_diesel_engine: "Дизельный двигатель"
 amtrac_diesel_engine_desc: "Дизельный двигатель более надёжен, чем бензиновый, но не такой быстрый при том же размере."
 amtrac_riveted_armor: "Клепаная броня"
 amtrac_riveted_armor_desc: "Соединение стальных плит заклёпками дёшево и быстро, не требует квалифицированной рабочей силы. Однако это имеет побочный эффект: каждая заклёпка становится уязвимым местом."
 amtrac_rolled_homo_armor: "Сварная броня"
 amtrac_rolled_homo_armor_desc: "Сварка стальных плит, прокатанных до требуемой толщины, с выравниванием зёрен металла внутри."
 amtrac_easy_maintenance: "Простота в обслуживании"
 amtrac_easy_maintenance_desc: "Лючки в боевой машине дают доступ ко многим ее важным компонентам и облегчают экипажу выполнение даже сложных регламентных работ."
 amtrac_radio: "Радио"
 amtrac_radio_desc: "Базовая двусторонняя радиосвязь позволяет механизированной пехоте координировать тактические манёвры в малом масштабе."
 amtrac_smoke_launchers: "Дымовые установки"
 amtrac_smoke_launchers_desc: "Батарея пиротехнических устройств, которые можно включать изнутри, чтобы создавать снаружи танка густую дымовую завесу. Очень полезна в обороне или при попадании в засаду."
 amtrac_extra_ammo_storage: "Дополнительное хранилище боеприпасов"
 amtrac_extra_ammo_storage_desc: "Дополнительный боезапас позволяет танку дольше вести бой без необходимости восполнять запасы — но, если в бою у танка пробьют броню, результаты могут быть самыми плачевными. Особенно это стоит учитывать при атаке."
 amtrac_wet_ammo_storage: "Влажное хранилище боеприпасов"
 amtrac_wet_ammo_storage_desc: "Кожухи с водой, укрывающие стойки с боеприпасами, значительно уменьшают риск подрыва боезапаса при попадании в танк. Экипаж оценит такую заботу."
 amtrac_petrol_electric_engine: "Бензиново-электрический двигатель"
 amtrac_petrol_electric_engine_desc: "Комбинация бензинового двигателя и электродвигателя, получающего от него энергию. Такой мотор сложен, дорог и ненадежен, но превосходит любые другие по производительности в тактических маневрах."
 amtrac_gas_turbine_engine: "Газовая турбина"
 amtrac_gas_turbine_engine_desc: "Турбина, разработанная на основе реактивных двигателей. Высокий расход топлива, но самая высокая скорость среди всех двигателей при заданном размере."
 car_gas_turbine_engine: "Газовая турбина"
 car_gas_turbine_engine_desc: "Турбина, разработанная на основе реактивных двигателей. Высокий расход топлива, но самая высокая скорость среди всех двигателей при заданном размере."

 mobile_warfare_summarized: "Мобильная война (полная сводка доктрины)"
 mobile_warfare_summarized_desc: "Здесь показаны преимущества полной доктрины «Мобильная война»."
 superior_firepower_summarized: "Превосходство в огневой мощи (полная сводка доктрины)"
 superior_firepower_summarized_desc: "Здесь показаны преимущества полной доктрины «Превосходство в огневой мощи»."
 grand_battleplan_summarized: "Генеральный план сражения (полная сводка доктрины)"
 grand_battleplan_summarized_desc: "Здесь показаны преимущества полной доктрины «Генеральный план сражения»."
 mass_assault_summarized: "Массовое наступление (полная сводка доктрины)"
 mass_assault_summarized_desc: "Здесь показаны преимущества полной доктрины «Массовое наступление»."

  
