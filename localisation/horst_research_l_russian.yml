 flat_armor: "Плоское бронирование"
 flat_armor_desc: "Господствовавшее в межвоенный период плоское бронирование просто в производстве и обеспечивает менее тесный корпус для экипажа, повышая эффективность взаимодействия."
 semi-flat_armor: "Полунаклонное бронирование"
 semi-flat_armor_desc: "Компромисс между наклонной и плоской бронёй: на отдельных участках угол наклона значительно круче, что увеличивает эффективную толщину, в то время как плоские листы в других частях танка упрощают размещение узлов."
 tank_horstmann_suspension: "Подвеска Хорстманна"
 tank_horstmann_suspension_desc: "Подвеска Хорстманна, подобная подвеске Кристи, распределяет вес на несколько колёс, позволяя устанавливать более тяжёлое снаряжение без риска поломок."
 tank_hydropneumatic_suspension: "Гидропневматическая подвеска"
 tank_hydropneumatic_suspension_desc: "Более сложный тип подвески: опорные катки поднимаются при наезде на неровности, обеспечивая более точную стрельбу с ходу и занятие оборонительных позиций на пересечённой местности."
 tank_hydrostatic_engine: "Гидростатический привод"
 tank_hydrostatic_engine_desc: "Гидростатический привод — это трансмиссия, требующая специализированного двигателя. Она ускоряет вращение башни и разворот танка на месте, а также потребляет меньше топлива благодаря гидравлическому приводу."
 tank_hydrostatic_engine_L: "Малый гидростатический привод"
 tank_hydrostatic_engine_L_desc: "Гидростатический привод — это трансмиссия, требующая специализированного двигателя. Она ускоряет вращение башни и разворот танка на месте, а также потребляет меньше топлива благодаря гидравлическому приводу."
