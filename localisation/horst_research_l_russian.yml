 tank_module_open_top_turret: "Открытая башня"
 tank_module_open_top_turret_desc: "Конструкция открытой башни обеспечивает больше места как для казённой части орудия, так и для расчёта, ускоряя перезарядку. Такая конструкция экономит производственные затраты, но ценой бронирования и оставляет экипаж уязвимым для стрелкового оружия и осколков."
 
