 car_one_man_car_turret: "Одноместная башня бронемашины"
 car_one_man_car_turret_desc: "Маленькая башня, еле вмещающая одного члена экипажа, в задачи которого входят наведение и заряжание главного орудия, а также обнаружение целей и угроз."
 car_two_man_car_turret: "Двухместная башня бронемашины"
 car_two_man_car_turret_desc: "Башня, в которой могут разместиться два члена экипажа, делящие между собой задачи по управлению орудием и наблюдению за обстановкой. Даже такая башня не дает эффективно распределить усилия между членами экипажа."
 car_one_man_tank_turret: "Одноместная башня лёгкого танка"
 car_one_man_tank_turret_desc: "Маленькая башня, еле вмещающая одного члена экипажа, в задачи которого входят наведение и заряжание главного орудия, а также обнаружение целей и угроз."
 car_two_man_tank_turret: "Двухместная башня лёгкого танка"
 car_two_man_tank_turret_desc: "Башня, в которой могут разместиться два члена экипажа, делящие между собой задачи по управлению орудием и наблюдению за обстановкой. Даже такая башня не дает эффективно распределить усилия между членами экипажа."
 car_three_man_tank_turret: "Трёхместная башня лёгкого танка"
 car_three_man_tank_turret_desc: "Башня, достаточно большая, чтобы вместить трех членов экипажа, которые разделят между собой задачи по заряжанию и наведению главного орудия, а также наблюдению за боевой обстановкой."
 car_three_man_car_turret: "Трёхместная башня бронемашины"
 car_three_man_car_turret_desc: "Башня, достаточно большая, чтобы вместить трех членов экипажа, которые разделят между собой задачи по заряжанию и наведению главного орудия, а также наблюдению за боевой обстановкой."

 
 
 car_gasoline_engine: "Бензиновый двигатель"
 car_gasoline_engine_desc: "Бензиновый двигатель обеспечивает большую скорость при том же размере, но топливо гораздо более склонно к возгоранию."
 car_diesel_engine: "Дизельный двигатель"
 car_diesel_engine_desc: "Дизельный двигатель надёжнее бензинового, но не такой быстрый при том же размере."

 car_stabilizer: "Стабилизатор"
 car_stabilizer_desc: "Вертикальный стабилизатор повышает точность стрельбы на ходу; небольшие неровности местности больше не вызывают у наводчика головокружение."
 car_vision_ports: "Улучшенные смотровые щели"
 car_vision_ports_desc: "Больше и лучше смотровые щели для членов экипажа обеспечивают лучшую осведомлённость на поле боя и эффективные разведывательные миссии."
 car_smoke_launchers: "Дымовые установки"
 car_smoke_launchers_desc: "Набор дымовых гранат позволяет бронемашине занять позицию и отойти с неё с минимальным риском уничтожения."
 car_extra_ammo_storage_desc: "Больше боеприпасов позволяет продлить миссии ценой постоянного страха катастрофического подрыва при попадании."
 car_extra_ammo_storage: "Дополнительное хранилище боеприпасов"
 car_wet_ammo_storage: "Влажное хранилище боеприпасов"
 car_wet_ammo_storage_desc: "Водяные рубашки на стеллажах с боеприпасами значительно снижают риск взрыва при попадании в бронемашину, что очень ценится экипажем."
 car_auto_loader: "Автозарядник"
 car_auto_loader_desc: "Автомат заряжания позволяет бронемашине поддерживать темп стрельбы в течение длительного времени."
 car_easy_maintenance: "Простота в обслуживании"
 car_easy_maintenance_desc: ""
 car_additional_machine_guns: "Дополнительные пулемёты"
 car_additional_machine_guns_desc: "Пулемёты, установленные на башне машины, позволяют экипажу защищаться от пехоты и атак с воздуха."
 car_internal_machine_gun: "Внутренний пулемёт"
 car_internal_machine_gun_desc: "Внутренний пулемёт для защиты от пехоты."
 amtrac_machine_gun: "Дополнительные пулемёты"
 amtrac_machine_gun_desc: "Пулемёты, установленные на корпусе амфибии, позволяют экипажу защищаться от пехоты и атак с воздуха."
 mech_machine_gun: "Дополнительные пулемёты"
 mech_machine_gun_desc: "Пулемёты, установленные на корпусе механизированной техники, позволяют экипажу защищаться от пехоты и атак с воздуха."

 ###Mechanized Chassis###
 
 armored_car_chassis: "Бронемашина"
 armored_car_chassis_desc: "Шасси, созданное с нуля для бронированной разведывательной машины — далёкое от грубых металлических ящиков смерти Первой мировой."
 armored_car_chassis_1_desc: "Улучшенная конструкция, способная нести больший вес и броню, оставаясь при этом относительно быстрой."
 armored_car_chassis_2_desc: "Низкопрофильная машина, достаточно быстрая для выхода на позицию и отхода, обеспечивающая ключевую разведку и имеющая достаточную огневую мощь для уничтожения вражеской бронетехники."

 
