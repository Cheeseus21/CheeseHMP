 car_high_velocity_cannon_m1: "§gБазовая§! Скорострельная средняя пушка"
 car_high_velocity_cannon_m1_desc: "Пушка, специально спроектированная для достижения высокой дульной скорости. При использовании специальных боеприпасов обладает отличными бронебойными характеристиками, но при этом страдает эффективность против слабобронированных целей."
 car_high_velocity_cannon_m2: "§GУлучшенная§! Скорострельная средняя пушка"
