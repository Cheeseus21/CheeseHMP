 tank_high_velocity_cannon_l3: "§2Продвинутая§! лёгкая скорострельная пушка"
 tank_high_velocity_cannon_l3_desc: "Пушка, специально спроектированная для достижения высокой дульной скорости. При использовании специальных боеприпасов обладает отличными бронебойными характеристиками, но при этом страдает эффективность против слабобронированных целей."
 tank_super_heavy_cannon_1: "§gБазовая§! сверхтяжёлая пушка"
 tank_super_heavy_cannon_1_desc: "Абсурдно большое орудие с несравненной эффективностью. Способно уничтожить почти все, а что не способно, то все равно не будет стрелять по танку."
 tank_super_heavy_cannon_2: "§GУлучшенная§! сверхтяжёлая пушка"
 tank_super_heavy_cannon_2_desc: "Абсурдно большое орудие с несравненной эффективностью. Способно уничтожить почти все, а что не способно, то все равно не будет стрелять по танку."
 tank_super_heavy_cannon_3: "§2Продвинутая§! сверхтяжёлая пушка"
 tank_super_heavy_cannon_3_desc: "Абсурдно большое орудие с несравненной эффективностью. Способно уничтожить почти все, а что не способно, то все равно не будет стрелять по танку."
 tank_heavy_howitzer2: "§GУлучшенная§! тяжёлая гаубица"
 tank_heavy_howitzer2_desc: "Тяжелая полевая гаубица, предназначенная для установки в машину. Ее основное предназначение — непрямой огонь по слабобронированным целям, но при необходимости гаубица может применяться и для стрельбы прямой наводкой. Снабжается ограниченным количеством бронебойных снарядов и слабо применима для борьбы с танками."
 tank_heavy_howitzer3: "§2Продвинутая§! тяжёлая гаубица"
 tank_heavy_howitzer3_desc: "Тяжелая полевая гаубица, предназначенная для установки в машину. Ее основное предназначение — непрямой огонь по слабобронированным целям, но при необходимости гаубица может применяться и для стрельбы прямой наводкой. Снабжается ограниченным количеством бронебойных снарядов и слабо применима для борьбы с танками."
