 car_heavy_machine_gun: "§gКрупнокалиберный§! пулемёт"
 car_heavy_machine_gun_desc: "Пулемет обеспечивает хорошую защиту от пехоты при небольших затратах. Даже со специальными бронебойными патронами он слабоэффективен против бронетехники."
