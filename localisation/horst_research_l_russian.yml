 tank_hydrostatic_engine_SH: "Огромный гидростатический привод"
 tank_hydrostatic_engine_SH_desc: "Гидростатический привод — это трансмиссия, требующая специализированного двигателя. Она ускоряет вращение башни и разворот танка на месте, а также потребляет меньше топлива благодаря гидравлическому приводу."
 mech_ostketten: "Грунтозацепы"
 mech_ostketten_desc: "Грунтозацепы — это устройства, предназначенные для повышения сцепления гусеничной ленты, особенно на рыхлом грунте, таком как почва или снег."
