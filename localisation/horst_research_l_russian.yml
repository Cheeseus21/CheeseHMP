 tank_module_improved_turning_mechanisms: "Привод поворота башни"
 tank_module_improved_turning_mechanisms_desc: "Увеличенная скорость поворота башни танка."
 car_module_improved_turning_mechanisms: "Привод поворота башни"
 car_module_improved_turning_mechanisms_desc: "Увеличенная скорость поворота башни бронеавтомобиля."

 tank_pintle_hmg: "Турельный крупнокалиберный пулемёт"
 tank_pintle_hmg_desc: "Крупнокалиберный пулемёт, установленный на турели на крыше башни танка. Размещение пулемёта делает стрелка уязвимым, снижая общую эффективность оружия, но позволяет танку поражать больше целей, включая самолёты. Это особенно полезно в наступлении."
 car_pintle_hmg: "Турельный крупнокалиберный пулемёт"
 car_pintle_hmg_desc: "Крупнокалиберный пулемёт, установленный на турели на крыше башни бронеавтомобиля. Размещение пулемёта делает стрелка уязвимым, снижая общую эффективность оружия, но позволяет бронеавтомобилю поражать больше целей, включая самолёты. Это особенно полезно в наступлении."
  
 tank_rocket_rails: "Бортовые ракетные установки"
 tank_rocket_rails_desc: "Комплект рельсовых ракетных установок, смонтированных на борту башни."
 car_rocket_rails: "Бортовые ракетные установки"
 car_rocket_rails_desc: "Комплект рельсовых ракетных установок, смонтированных на борту башни."
 car_heavy_machine_gun_special: "Внутренний крупнокалиберный пулемёт"
 car_heavy_machine_gun_special_desc: "Крупнокалиберный пулемёт в пулемётной установке внутри корпуса. Размещение пулемёта ограничивает его сектор обстрела, снижая общую эффективность, но позволяет бронеавтомобилю поражать больше целей. Это особенно полезно в наступлении."

 
 mechanized_chassis_desc: "Механизированная пехота — это пехота, оснащённая бронетранспортёрами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и ведения боя. Механизированная пехота отличается от моторизованной тем, что её транспортные средства обеспечивают определённую степень защиты от огня противника, в отличие от небронированных колёсных машин (грузовиков или джипов) для моторизованной пехоты."
 mechanized_chassis_0_desc: "Механизированная пехота — это пехота, оснащённая бронетранспортёрами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и ведения боя. Механизированная пехота отличается от моторизованной тем, что её транспортные средства обеспечивают определённую степень защиты от огня противника, в отличие от небронированных колёсных машин (грузовиков или джипов) для моторизованной пехоты."
