 tank_auto_cannon_3: "§2Продвинутая§! автоматическая пушка"
 tank_auto_cannon_3_desc: "Это орудие, сделанное по образцу скорострельной зенитной пушки, способно буквально уничтожать слабобронированные цели чередой снарядов. Небольшой калибр не снижает бронебойность."
 tank_close_support_gun2: "§GУлучшенное§! орудие непосредственной поддержки"
 tank_close_support_gun2_desc: "Небольшое орудие, спроектированное для стрельбы фугасными снарядами по полевым укреплениям противника и поддержки атакующей пехоты. Способно атаковать бронетехнику, но короткий ствол и ограниченный боезапас делают его непригодным для борьбы с мощными танками."
 tank_close_support_gun3: "§2Продвинутое§! орудие непосредственной поддержки"
