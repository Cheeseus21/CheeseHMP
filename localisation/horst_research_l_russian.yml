 mech_armored_roof_desc: "Открытый верх полугусеничного бронетранспортёра закрывается тонкими металлическими листами, которые могут защитить пехоту от осколков, мусора и некоторых выстрелов из стрелкового оружия."
 amtrac_armored_roof: "Бронированная крыша"
