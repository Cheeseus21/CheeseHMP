 light_tank_destroyer_chassis_4_short: "Лёгкий ПТ-САУ IV"
 light_tank_destroyer_chassis_4_desc: "Самоходные противотанковые установки представляют собой танки с крупнокалиберными орудиями, закрепленными в корпусе, а не в башне. Легкие ПТ-установки используют шасси легких танков, благодаря чему достаточно мобильны, но несут не слишком мощное вооружение по сравнению с более тяжелыми образцами."
