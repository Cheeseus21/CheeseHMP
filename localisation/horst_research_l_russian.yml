 light_tank_aa_equipment_4_desc: "Зенитная артиллерия в первую очередь предназначена для уничтожения вражеских самолётов, однако скорострельные орудия могут быть эффективны и против наземных целей. Эта модель установлена на шасси лёгкого танка."
