 light_tank_chassis_4: "Современное шасси лёгкого танка"
 light_tank_chassis_4_short: "Современное шасси лёгкого танка"
 light_tank_chassis_4_desc: "Лёгкие танки — это небольшие, маневренные машины, способные как вести разведку, так и сражаться со слабо бронированными противниками."
 light_tank_equipment_4: "Современное шасси лёгкого танка"
 light_tank_equipment_4_short: "Современное шасси лёгкого танка"
 light_tank_equipment_4_desc: "Лёгкие танки — это небольшие, маневренные машины, способные как вести разведку, так и сражаться со слабо бронированными противниками."
 GER_light_tank_chassis_4: "VK1602 «Леопард»"
 GER_light_tank_chassis_4_short: "Леопард"
 GER_light_tank_chassis_4_desc: "VK1602 Leopard — проект немецкой разведывательной машины, разработанный в 1942 году. Планировалось вооружить её 75-мм орудием KwK 41, однако впоследствии его заменили на 50-мм пушку. VK 1602 имел наклонную лобовую броню, созданную под влиянием среднего танка Panther. Для повышения проходимости VK 1602 оснастили гусеницами шириной 350 мм."
 GER_light_tank_equipment_4: "VK1602 «Леопард»"
 GER_light_tank_equipment_4_short: "Леопард"
 GER_light_tank_equipment_4_desc: "VK1602 Leopard — проект немецкой разведывательной машины, разработанный в 1942 году. Планировалось вооружить её 75-мм орудием KwK 41, однако впоследствии его заменили на 50-мм пушку. VK 1602 имел наклонную лобовую броню, созданную под влиянием среднего танка Panther. Для повышения проходимости VK 1602 оснастили гусеницами шириной 350 мм."
 light_tank_amphibious_equipment_4: "Плавающий лёгкий танк IV"
 light_tank_amphibious_chassis_4: "Современный плавающий лёгкий танк"
 ostketten: "Грузозацепы"
 ostketten_desc: "Грузозацепы — это устройства, предназначенные для увеличения сцепления гусениц, особенно на рыхлых грунтах, таких как почва или снег."
 light_tank_artillery_chassis_4: "Современная лёгкая САУ"
 light_tank_artillery_chassis_4_short: "Лёгкая САУ IV"
 light_tank_artillery_chassis_4_desc: "Небольшое артиллерийское орудие на легком шасси. Уступает в огневой мощи более тяжелым образцам, но обладает высокой мобильностью."
