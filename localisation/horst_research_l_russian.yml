 car_flamethrower: "Огнемет"
 car_auto_cannon: "§gАвтоматическая§! пушка"
 car_auto_cannon_desc: "Это орудие, сделанное по образцу скорострельной зенитной пушки, способно буквально уничтожать слабобронированные цели чередой снарядов. Небольшой калибр не снижает бронебойность."
