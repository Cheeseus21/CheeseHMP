 tank_nsb_car_engine_upgrade: "Двигатель"
 tank_nsb_car_armor_upgrade: "Броня"
 
 car_squeezebore_adaptor: "Конусный адаптер"
 car_squeezebore_adaptor_desc: "Специальный адаптер, надеваемый на дуло орудия, снижает его диаметр и обжимает снаряд, уменьшая его. Это значительно повышает дульную скорость снаряда и, следовательно, пробивную способность орудия, но требует особых снарядов, изготовленных из редких материалов."

 car_holzgas_engine: "Газогенераторный двигатель"
 car_holzgas_engine_desc: "Двигатель, сжигающий древесину для получения горючего газа или использующий сжатый газ для работы. Нефть не требуется, но сам двигатель очень громоздок и ненадёжен."
 car_hydrostatic_engine: "Гидрообъёмный привод"
 car_hydrostatic_engine_desc: "Гидрообъёмный привод — это трансмиссия, для работы которой требуется специализированный двигатель. Она ускоряет поворот башни и разворот танка, а также потребляет меньше топлива за счёт гидравлического привода."
 car_petrol_electric_engine: "Бензиново-электрический двигатель"
 car_petrol_electric_engine_desc: "Комбинация бензинового двигателя и электродвигателя, получающего от него энергию. Такой мотор сложен, дорог и ненадежен, но превосходит любые другие по производительности в тактических маневрах."
  
 tank_designer_mech_amtrac_chassis: "Амфибийная механика"
 amtrac_full_torsion_bar_suspension: "Торсионная подвеска"
 amtrac_full_torsion_bar_suspension_desc: "Относительно надежная система подвески из металлических балок, прикрепленных к шасси боевой машины. Сглаживает неровности лучше, чем подвески других типов."
 amtrac_full_horstmann_suspension: "Подвеска Хорстманна"
 amtrac_full_horstmann_suspension_desc: "Подобно подвеске Кристи, подвеска Хорстманна распределяет вес на несколько опорных катков, позволяя устанавливать более тяжёлое оборудование без риска поломок."
 amtrac_full_hydropneumatic_suspension: "Гидропневматическая подвеска"
 amtrac_full_hydropneumatic_suspension_desc: "Более сложный тип подвески: опорные катки приподнимаются при наезде на неровности местности, обеспечивая более точную стрельбу с ходу и занятие оборонительных позиций на пересечённой местности."
 
 amtrac_hydrostatic_engine: "Гидрообъёмный привод"
 amtrac_hydrostatic_engine_desc: "Гидрообъёмный привод — это трансмиссия, для работы которой требуется специализированный двигатель. Она ускоряет поворот башни и разворот машины, а также потребляет меньше топлива за счёт гидравлического привода."
 
 amtrac_ostketten: "Грузозацепы"
 amtrac_ostketten_desc: "Грузозацепы — это устройства, предназначенные для увеличения сцепления гусениц, особенно на сыпучих грунтах, таких как почва или снег."
