 tank_front_plate_fixed_superstructure_turret: "Орудийный щит"
 tank_front_plate_fixed_superstructure_turret_desc: "Металлические бронеплиты крепятся на желаемое основное вооружение для защиты расчёта от фронтального огня стрелкового оружия. Однако бока остаются значительно более уязвимыми по сравнению с полноценной неподвижной рубкой. Это позволяет заводу установить более крупное орудие, чем обычно возможно на более лёгком шасси. Щит также почти ничего не стоит в производстве по сравнению с другими вариантами."
 tank_platform_mount_turret: "Орудийная платформа"
 tank_platform_mount_turret_desc: "Платформа для установки полевого орудия монтируется на шасси. Расчёт орудия подвержен огню стрелкового оружия во время стрельбы. Это делает танк практически бесполезным в традиционной бронетанковой роли. Однако обеспечивает лучшую защиту расчёта на марше, чем другие моторизованные полевые орудия. Также это удешевляет производство танка в целом из-за меньшей потребности в бронеплитах и делает его немного быстрее. Завод может установить более крупное орудие, чем обычно возможно на данном шасси. Следует признать, что танк начинает напоминать металлическую платформу с деревянным настилом на сверхразмерном тракторе."
 
 
 
 hull_gun: "Орудие непосредственной поддержки"
 hull_gun_desc: "Орудие непосредственной поддержки, установленное во вспомогательной башне или в корпусе танка. Размещение орудия значительно ограничивает его сектор обстрела и, следовательно, эффективность, но позволяет поражать больше целей. Это особенно полезно в наступлении."
 tank_module_camouflage_net: "Камуфляж"
 tank_module_camouflage_net_desc: "Комбинация цветной краски и тщательно изготовленных сетей помогает замаскировать танк на фоне окружающей местности."
 car_module_camouflage_net: "Камуфляж"
 car_module_camouflage_net_desc: "Комбинация цветной краски и тщательно изготовленных сетей помогает замаскировать бронеавтомобиль на фоне окружающей местности."
 mech_module_camouflage_net: "Камуфляж"
 mech_module_camouflage_net_desc: "Комбинация цветной краски и тщательно изготовленных сетей помогает замаскировать полугусеничный бронетранспортёр на фоне окружающей местности."
