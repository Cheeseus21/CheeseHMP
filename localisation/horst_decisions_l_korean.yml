 HMP_nor_noob_desc:0 "호르스토리컬의 노르웨이 기본 사항을 설명하는 이벤트를 받게 되며, 나중에 노르웨이를 침공하는 데 유용한 두 개의 사단 편제를 받게 될 것입니다."
 HMP_vic_noob_desc:0 "호르스토리컬의 비시 프랑스 기본 사항을 설명하는 이벤트를 받게 되며, 소련 및 북아프리카에서 전투하는 데 유용한 사단 편제를 받게 될 것입니다."
 HMP_finland_noob_desc:0 "호르스토리컬의 핀란드 기본 사항을 설명하는 이벤트를 받게 되며, 소련과 싸우는 데 유용한 세 개의 사단 편제를 받게 될 것입니다."
