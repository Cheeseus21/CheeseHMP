 HMP_ll_soviets_send_desc:0 "바르바로사 작전은 인류 역사상 수행된 가장 큰 규모의 군사 작전입니다. 추축국의 전쟁 기계는 오직 소련의 피와 연합국의 무기대여로만 약화시킬 수 있습니다.\n\n바르바로사 작전 동안 우리가 통제하는 모든 §G보급 회랑§! 또는 §G전략 목표§!에 대해 소비에트 연방에 §C수송품§!을 보낼 것입니다. 우리의 무기대여 수송품 수령은 소비에트 연방으로 향하는 핵심 §G보급 회랑§!의 통제 여부에 달려 있습니다. 만약 모든 §G보급 회랑§!이 폐쇄되면, 우리의 소련 동맹은 회랑이 다시 확보될 때까지 어떠한 무기대여도 받을 수 없게 됩니다.\n\n하나의 §C수송품§!은 자재 면에서 대략 £production_cost §G2000 생산력§!과 같습니다.\n\n소비에트 연방은 §C수송품§! 하나를 비슷한 양의 다음 장비로 교환할 수 있습니다: §Y1형 보병 장비§!, §Y2형 대공포§!, §Y지원 장비§!, §Y2형 포병 장비§!, §Y1형 로켓 포병 장비§!, §Y차량화 로켓 포병 장비§!, §Y2형 대전차포§!, §Y차량화 장비§!, §Y1형 기계화 장비§!, §Y1형 상륙용 장갑차§!, §Y3형 경/중/중전차§!, §Y1형 초중전차§!, 그리고 §Y2형 본토 전투기§!.\n\n§G보급 회랑§!은 현재 [Root.GetSovSupplyRoute]입니다\n무르만스크 항을 경유하는 §G북극 항로§!는 현재 §O[213.CONTROLLER.GetFlag][213.CONTROLLER.GETNAME]§!가 통제 중입니다 [GetSovSupplyRouteMurmansk].\n\n호놀룰루와 블라디보스토크를 경유하는 §G태평양 항로§!는 현재 §O[416.CONTROLLER.GetFlag][416.CONTROLLER.GETNAME]§!와 §O[408.CONTROLLER.GetFlag][408.CONTROLLER.GETNAME]§!가 통제 중입니다, [GetSovSupplyRouteVladivostok]\n\n이란과 바쿠를 경유하는 §G페르시아 회랑§!은 현재 §O[412.CONTROLLER.GetFlag][412.CONTROLLER.GETNAME]§!와 §O[229.CONTROLLER.GetFlag][229.CONTROLLER.GETNAME]§!가 통제 중입니다, [GetSovSupplyRouteIran]\n\n몰타와 세바스토폴을 경유하는 §G지중해 항로§!는 현재 §O[116.CONTROLLER.GetFlag][116.CONTROLLER.GETNAME]§!와 §O[137.CONTROLLER.GetFlag][137.CONTROLLER.GETNAME]§!가 통제 중입니다, [GetSovSupplyRouteMalta]\n\n[GetObjOkinawa]\n\n[GetObjIwoJima]\n\n[GetObjMarcusIsland]\n\n[GetObjPalau]\n\n[GetObjSingapore]\n\n[GetObjHongKong]\n\n[GetObjSaipan]\n\n소비에트 연방은 §O[?SOV.SOV_barb_ll_token|+0]§!개의 §C수송품§! 분량의 전쟁 물자를 마음대로 사용할 수 있습니다.\n\n소비에트 연방은 전쟁 기간 동안 연합국으로부터 총 §O[?SOV.SOV_barb_ll_token2|+0]§!개의 §C수송품§! 분량의 전쟁 물자를 받았습니다."
