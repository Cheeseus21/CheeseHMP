 HMP_ll_soviets_receive_desc:0 "우리에게 지원될 [?Root.SOV_barb_ll_token|+0] £convoy_texticon §C수송품§! 분량의 전쟁 물자가 있습니다.\n\n각 £convoy_texticon §C수송품§!은 대략 £production_cost §G2000 생산력§!의 가치를 지니며, 다음 장비들 중 대략적으로 동등한 양의 생산량으로 교환할 수 있습니다: §Y1형 보병 장비§!, §Y2형 대공포§!, §Y지원 장비§!, §Y2형 포병 장비§!, §Y1형 로켓포§!, §Y차량화 로켓포§!, §Y2형 대전차포§!, §Y차량화 장비§!, §Y1형 기계화 장비§!, §Y1형 상륙용 장갑차§!, §Y3형 경/중/중전차§!, §Y1형 초중전차§!, §Y2형 본토 방어 전투기§!.\n\n연합국이 이란을 통제하고 있다면, 바르바로사 작전이 시작되는 즉시 무기대여를 받을 수 있을 것입니다."
