 GetCountenanceDescENG1:0 "소련 사단과 연계하여 신속한 페르시아 침공을 조율할 것입니다. 이를 통해 페르시아는 영국과 소련의 영향권으로 분할될 것입니다."
 GetCountenanceDescENG2:0 "소비에트 사단과 협력하여 페르시아에 대한 신속한 침공을 조율할 것입니다. 이를 통해 페르시아는 영국과 소비에트의 세력권으로 분할될 것입니다. 추축국 또한 §Y서부 페르시아§!를 침공할 것이 확실합니다.\n\n중부 페르시아에 (장비 미지급) 산악 사단으로 구성된 군대를 배치할 것입니다."
 GetCountenanceDescENG3:0 "소비에트 사단과 협력하여 페르시아에 대한 신속한 침공을 조율할 것입니다. 이를 통해 페르시아는 영국과 소비에트의 세력권으로 분할될 것입니다. 일본 또한 §Y동부 페르시아§!를 침공할 것이 확실합니다.\n\n중부 페르시아에 (장비 미지급) 산악 사단으로 구성된 군대를 배치할 것입니다."
 GetCountenanceDescGER1:0 "이란을 침공하여 연합국의 영향력으로부터 해방시킬 것입니다. 이에 대응하여 소비에트 연방은 §Y북부 이란§!을, 연합국은 §Y동부 및 중부 이란§!을 침공할 것이 확실하지만 우리가 먼저 공격하여 유전을 확보하고 공산주의자들에게 제2전선을 열 것입니다!"
 GetCountenanceDescGER2:0 "일본 사단과 협력하여 이란에 대한 신속한 침공을 조율할 것입니다. 한때 멀리 떨어져 있던 두 군대가 마침내 서로 만나게 될 것입니다!"
 GetCountenanceDescJAP1:0 "§Y동부 페르시아§!로 신속히 진격하여, 오니에 맞서 싸우는 고전 중인 추축국 동맹을 구원하고 적들이 우리의 운명을 결코 통제하지 못하도록 할 것입니다!"
 GetCountenanceDescJAP2:0 "§Y동부 페르시아§!로 신속히 진격하여, 추축국 동맹과 합의한 팽창 계획의 최서단 한계에 도달할 것입니다. 물론 우리의 태양이 계속 떠오르는 한 그들의 시대도 올 것이지만 말입니다."
 
