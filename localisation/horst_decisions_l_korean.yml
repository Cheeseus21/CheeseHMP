SPR_spanish_civil_war_decisions_desc: "[Get_SPR_spanish_civil_war_decisions_desc]"
SPR_spanish_civil_war_decisions_desc_active: "공화국의 운명은 지금 매우 위태로운 균형 위에 놓여 있습니다. 스페인은 반드시 버텨야 합니다! \n\n전쟁은 §Y1936년 7월 17일§!에 시작됩니다. \n\n§Y독일, 이탈리아, 소련§!은 양측을 지원하기 위해 의용군을 파견할 수 있습니다. \n\n승리 조건 임무는 §Y1939년 4월 1일§!에 종료됩니다. (약 988일) \n\n내전에서 승리할 경우 참여한 주요국은 §Y훈장을 받은 숙련병 10명과 민간공장 5개§!를 획득합니다. \n\n무승부(임무 시간 초과)의 경우 보상은 §Y숙련병 5명§!입니다."
SPR_spanish_civil_war_decisions_desc_ended: "피비린내 나는 내전이 마침내 끝났습니다. 이제 파괴된 국가를 재건하는 힘든 과제가 시작됩니다."
SPR_spanish_civil_war_decisions_desc_fallback: "스페인 내전."

