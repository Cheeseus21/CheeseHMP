 propaganda_campaings_default_desc:0 "전쟁이 임박한 상황에서, 국민이 적대적인 사상에 영향을 받아 결국 정부에 등을 돌리게 둘 수는 없습니다. 적극적인 선전 활동을 통해서만 앞으로의 10년을 버틸 수 있습니다!"
 propaganda_campaings_democratic_desc:0 "우리나라는 패배했습니다. 독일군이 우리 조국을 점령했고, 국민은 패배감과 슬픔에 빠져 있습니다. 동쪽에서 다가오는 위협에 맞서려면 네덜란드의 투지를 되살려야 합니다."
