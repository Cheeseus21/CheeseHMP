 arctic_corridor_history:0 "§G무기대여 항로 수용량 +3§!\n\n북극 호송대는 노르웨이해와 바렌츠해를 지나 소비에트의 무르만스크항으로 가는 무기대여 항로였습니다. 이 항로는 안개, 혹독한 날씨(특히 겨울철), 계속되는 밤, 유빙으로 가득하여 가장 위험한 항로 중 하나였습니다."
 med_corridor_history:0 "§G무기대여 항로 수용량 +5§!\n\n지중해 항로는 영국과 미국의 무기대여 보급품을 보스포루스 해협을 통해 소비에트 흑해 항구로 전달하는 무기대여 항로였습니다. "
 pacific_corridor_history:0 "§G무기대여 항로 수용량 +5§!\n\n태평양 항로는 미국-소비에트 해안선을 따라 베링 해협을 가로지르는 무기대여 항로로, 이를 통해 미국의 무기대여 보급품이 이송되었습니다. 태평양 항로는 일본 잠수함의 위협 때문에 위험한 것으로 여겨졌지만, 소비에트를 자극할 것을 우려한 일본에 의해 격침된 선박은 거의 없었습니다."
 persian_corridor_history:0 "§G무기대여 항로 수용량 +25§!\n\n페르시아 회랑은 이란을 거쳐 소비에트 아제르바이잔으로 들어가는 무기대여 항로로, 이를 통해 영국의 원조와 미국의 무기대여 보급품이 소비에트 연방으로 이송되었습니다. 이 페르시아 회랑은 소비에트의 필요를 충족시키기 위해 개발된 유일하게 실행 가능한 전천후 항로가 되었습니다."
 HMP_soviet_lend_lease_system_desc:0 "바르바로사 작전 중 장악한 모든 §G무기대여 회랑§! 또는 §G전략 목표§!(세력 균형 참조)마다 소비에트 연방에 £production_cost §G2000 생산력§! 가치의 물자를 £convoy_texticon §C수송품§!으로 보낼 수 있습니다. 각 §G무기대여 회랑§!은 §G무기대여 항로 수용량§!을 제공하여, 매달 준비할 수 있는 £convoy_texticon §C수송품§!의 한도를 높여줍니다. 무기대여 수송품을 받으려면 소비에트 연방으로 이어지는 §G무기대여 회랑§!을 최소 하나 이상 장악해야 합니다. 아래를 클릭할 때마다 £convoy_texticon §C수송품§! 5개와 §H수송선§! 5개를 사용합니다. 1941년 11월부터 §C수송품§!을 보낼 수 있습니다."
