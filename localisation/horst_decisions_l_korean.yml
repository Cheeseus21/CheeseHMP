 # PREPARATION
 # Add PT Decisions
 prca_increase_poster_production2:0 "포스터 생산량 증대"
 prca_increase_poster_production2_desc:0 "포스터는 대중에게 우리의 목표와 이상을 전달하는 가장 쉬운 방법입니다. 이 도구를 계속 효율적으로 사용하기 위해, 우리는 새 포스터의 생산량을 늘려야 합니다."
 prca_publish_a_special_issue2:0 "특별호 발행"
 prca_publish_a_special_issue2_desc:0 "최근 소식으로 인해 일부 국민들이 불안감과 비판적인 태도를 보이고 있습니다. 현재의 전개를 대중에게 숨길 수는 없지만, 신문 특별호를 통해 그들의 주의를 다른 곳으로 돌릴 수 있습니다."
 prca_run_a_speech_of_leader2:0 "[Root.GetLeader]의 라디오 오라녜 연설"
 prca_run_a_speech_of_leader2_desc:0 "[Root.GetLeader]은(는) 어려운 시기에도 우리 국가를 하나로 묶어주는 목소리입니다. 그의 최근 연설은 이미 많은 사람들에게 영감을 주었으며, 모두가 이 연설을 들을 수 있도록 하는 것이 매우 중요합니다."
 prca_produce_a_war_movie2:0 "전쟁 영화 제작"
 prca_produce_a_war_movie2_desc:0 "드라마, 액션, 애니메이션 영화 등 장르를 불문하고 우리 병사들의 영웅적인 행적은 올바른 방식으로 묘사되어야 합니다. 이를 통해 우리는 군대와 후방의 국민들이 우리 대의를 위해 계속해서 분투하도록 고무할 수 있습니다."
 # Newspaper Department
 prca_form_newspaper_department2:0 "신문부 창설"
 prca_form_newspaper_department2_desc:0 "신문은 신속하고 대량으로 생산할 수 있어, 우리에게 유리하게 여론을 조작하는 데 이상적인 수단을 제공합니다. 전쟁이 임박한 지금, 이 강력한 무기를 완벽하게 통제하는 것이 매우 중요합니다."
 prca_form_newspaper_department_tt:0 "§Y신문부§!를 활성화합니다. (주간 선전 토큰: §G+1.00§!).\n"
 # Radio Department
 prca_form_radio_department2:0 "라디오부 창설"
 prca_form_radio_department2_desc:0 "라디오의 발명은 선전 활동을 전파하는 데 있어 무수히 많은 새로운 가능성을 열었습니다. 방송되는 프로그램을 통제함으로써, 우리 국가의 강력한 목소리가 우리 국민뿐만 아니라 전 세계에 울려 퍼지도록 할 수 있습니다."
 prca_form_radio_department_tt:0 "§Y라디오부§!를 활성화합니다. (주간 선전 토큰: §G+2.00§!).\n"
