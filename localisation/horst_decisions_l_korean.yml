 SS_panzers:0 "SS 기갑사단을 창설했습니다"
 SS_mechanized:0 "SS 기갑척탄병사단을 창설했습니다"
 SS_mountain:0 "SS 산악엽병사단을 창설했습니다"
 SS_recruitment_pfu:0 "무장친위대 사단 모집"
 SS_recruitment_pfu_desc:0 "히믈러가 국방군과 함께 싸울 완전한 규모의 전투 사단으로 무장친위대를 확장할 것을 요청합니다. 이는 점령지와 중립국에서 수많은 잠재적 지원자들이 반공 전쟁에 참여할 수 있게 하여, 우리의 전쟁 수행에 큰 이익이 될 것입니다."
 SS_recruitment_leibstandarte:0 "제1SS기갑사단 LSSAH"
 SS_recruitment_leibstandarte_desc:0 "제1SS친위대 아돌프 히틀러 경호대 사단은 제2차 세계 대전 당시 동부 및 서부 전선 양쪽에서 싸운 정예 무장친위대 부대였습니다. LSSAH는 전쟁 중 가장 효과적이고 장비가 잘 갖춰진 독일 부대 중 하나로 평가받았습니다."
 SS_recruitment_dasreich:0 "제2SS기갑사단 다스 라이히"
 SS_recruitment_dasreich_desc:0 "SS 다스 라이히 사단은 제2차 세계 대전 당시 동부 및 서부 전선 양쪽에서 싸운 정예 무장친위대 부대였습니다. 다스 라이히는 전투에서의 용맹함으로도 잘 알려져 있으며, 특히 쿠르스크 전투와 이후 아르덴 공세에서 두각을 나타냈습니다."
 SS_recruitment_totenkopf:0 "제3SS기갑사단 토텐코프"
 SS_recruitment_totenkopf_desc:0 "SS 토텐코프 사단은 제2차 세계 대전 당시 동부 및 서부 전선 양쪽에서 싸운 정예 무장친위대 부대였습니다. 교도관과 SS에서 선발된 병력으로 구성된 토텐코프는 특유의 해골과 십자가 문양으로 인해 '해골 사단'으로 알려졌습니다."
 SS_recruitment_polizei:0 "제4SS기갑척탄병사단 폴리차이"
 SS_recruitment_polizei_desc:0 "SS 폴리차이 사단은 원래 SS의 경찰 여단이었으나, 이후 완전한 규모의 기갑척탄병사단으로 재편성되었습니다. 이 부대는 프랑스, 그리스, 그리고 이후 소련 침공에 참여했습니다."
 SS_recruitment_wiking:0 "제5SS기갑사단 비킹"
 SS_recruitment_wiking_desc:0 "SS 비킹 사단은 제2차 세계 대전 당시 동부 전선에서 싸운 정예 외국인 무장친위대 부대였습니다. 이 사단은 덴마크, 노르웨이, 스웨덴, 핀란드, 에스토니아, 네덜란드, 벨기에 출신의 이념적 지원자들로 구성되었으며, 노련한 독일 장교들의 지휘를 받았습니다."
 SS_recruitment_nord:0 "제6SS 노르트 산악엽병사단"
 SS_recruitment_nord_desc:0 "SS 노르트 사단은 북극권의 동부 전선에서 싸운 정예 산악 사단이었습니다. 이 지역의 기온은 끊임없이 영하에 머물렀으며, 병사들은 전투 중에 동상으로 부상을 입는 경우가 잦았습니다."
 SS_recruitment_prinz:0 "제7SS 프린츠 오이겐 산악엽병사단"
 SS_recruitment_prinz_desc:0 "SS 프린츠 오이겐은 주로 발칸 반도와 남유럽 출신의 독일계 민족으로 구성된 산악엽병사단이었습니다. 이 사단은 주로 대유격전 임무를 맡아 공산주의 유고슬라비아 파르티잔과 싸웠으나, 전쟁 후반에는 진격해오는 붉은 군대와도 전투를 벌였습니다."
 SS_recruitment_hohenstaufen:0 "제9SS기갑사단 호엔슈타우펜"
 SS_recruitment_hohenstaufen_desc:0 "SS 호엔슈타우펜은 제2차 세계 대전 당시 동부 및 서부 전선에서 싸운 무장친위대 기갑사단이었습니다. 젊은 독일 징집병들과 LSSAH 사단 출신의 노련한 부사관들로 구성되어 매우 유능한 부대였습니다."
 SS_recruitment_frundsberg:0 "제10SS기갑사단 프룬츠베르크"
 SS_recruitment_frundsberg_desc:0 "SS 프룬츠베르크는 제2차 세계 대전 당시 동부 및 서부 전선에서 싸운 무장친위대 기갑사단이었습니다. 젊은 독일 및 헝가리 징집병들과 LSSAH 사단 출신의 노련한 부사관들로 구성되어 매우 유능한 부대였습니다."
 SS_recruitment_nordland:0 "제11SS기갑척탄병사단 노르트란트"
 SS_recruitment_nordland_desc:0 "SS 노르트란트 사단은 제2차 세계 대전 당시 동부 전선에서 싸운 또 다른 완전한 외국인 모집 무장친위대 부대였습니다. 스칸디나비아 전역의 지원자들로 구성되었으며, 레닌그라드 공방전과 이후 타넨베르크선 전투에서 용감하게 싸웠습니다."
 SS_recruitment_hitlerjugend:0 "제12SS기갑사단 히틀러유겐트"
 SS_recruitment_hitlerjugend_desc:0 "SS 히틀러유겐트는 제2차 세계 대전 당시 서부 전선에서 싸운 무장친위대 기갑사단이었습니다. 전원 히틀러 유겐트 단원들과 다른 무장친위대 사단 출신의 정예 부사관들로 구성되었으며, 노르망디에서 후위 작전을 수행하고 특히 아르덴 공세에서 활약한 매우 유능한 부대였습니다."
 SS_recruitment_latvian_ss:0 "제15, 19, 20 발트 SS 기갑척탄병사단"
 SS_recruitment_latvian_ss_desc:0 "라트비아 및 에스토니아인 지원병으로 구성된 이 사단들은 대규모 기갑척탄병사단을 형성하여 1943년부터 1945년까지 소련에 맞서 싸웠습니다. 타넨베르크 전선 전투에서의 전투 효율성으로 가장 유명하며, 이 사단들의 부대들은 8배 규모의 소련군을 저지하고 기갑 지원이 거의 또는 전혀 없는 상태에서 10:1이 넘는 교환비로 피해를 입혔습니다."
 SS_recruitment_reichsfuhrer_ss:0 "제16, 17, 18 SS 독일 기갑척탄병사단"
 SS_recruitment_reichsfuhrer_ss_desc:0 "주로 헝가리 및 기타 점령지의 독일계 지원병으로 구성된 이 사단들은 기갑척탄병사단을 형성하여 우크라이나와 중부 유럽에서 소련에 맞서 싸웠으며, 또한 프랑스에서는 연합군의 침공에 맞서 싸웠습니다."
 SS_recruitment_handschar:0 "제13, 21, 23 발칸 산악엽병사단"
 SS_recruitment_handschar_desc:0 "알바니아인, 보스니아인, 크로아티아인으로 구성된 이 사단들은 주로 대(對)파르티잔 SS 산악엽병사단으로 발칸에서 파르티잔에 맞서 싸웠고, 나중에는 진격해오는 소련군에 맞서 싸웠습니다."
 SS_recruitment_charlemagne:0 "제33 SS 기갑척탄병사단 샤를마뉴"
 SS_recruitment_charlemagne_desc:0 "샤를마뉴 사단은 독일 국방군에 남아있던 프랑스인 지원병들로 구성되었으며, 독일로 진격하는 소련군에 맞서 싸웠습니다. 베를린의 마지막 사단 중 하나로 유명하며, 그들은 국가의회 의사당에서 격렬하게 저항했고 많은 이들이 자국 정부의 보복을 두려워하여 항복을 거부했습니다."
 
 
 
 ger_wehrmacht_pfu:0 "육군"
 ger_wehrmacht_pfu_desc:0 "독일 국방군의 중추입니다. 조국(Vaterland)이 다가오는 폭풍에서 살아남으려면, 육군최고사령부(OKH)는 총통의 지시가 아무리 과감하더라도 따를 준비가 되어 있어야 합니다. 우리의 맹세를 잊지 않기 위해서라도 말입니다."
 ger_luftwaffe_pfu:0 "공군"
 ger_luftwaffe_pfu_desc:0 "괴링은 공군에 대규모 폭격 작전을 통해 영국에 결정타를 날려 평화를 고려하도록 설득하는 임무를 맡겼습니다. 하지만 만약 우리가 이를 신속하게 달성하지 못한다면, 국방군최고사령부(OKW)는 우리의 자원을 다른 곳에 재할당하는 것을 고려할 수도 있습니다."
 ger_kriegsmarine_pfu:0 "해군"
 ger_kriegsmarine_pfu_desc:0 "해군의 현 상태로 인해, 해군최고사령부의 레더 제독은 통상 파괴 교리를 전개하여 해외로부터 들어오는 연합군의 필수 자원과 전선 보급을 차단해 고사시키도록 명령했습니다."
 
 ger_wehrmacht_grossdeutschland:0 "그로스도이칠란트 기갑사단"
 ger_wehrmacht_grossdeutschland_desc:0 "그로스도이칠란트 사단은 독일 육군의 정예 전투 부대로, 제2차 세계 대전 중 동부 전선에서 싸웠습니다. 원래 1930년대에 의장대 부대에서 창설되었으며, 모스크바, 르제프, 그리고 후일 쿠르스크 전투 등 동부 전선에서의 활약으로 명성을 얻었습니다."
 ger_schwere_panzer:0 "제502 중전차사단"
 ger_schwere_panzer_desc:0 "제502 중전차사단은 바르바로사 작전 개시와 우수한 소련의 T-34 및 KV-1 전차가 등장한 이후에 창설된 중전차 편성 부대였습니다. 동부 전선에서 싸웠으며, 1,400대의 전차와 2,000대의 돌격포를 격파했다고 알려진 가장 성공적인 독일 중전차사단 중 하나였습니다."
 ger_volksturm:0 "국민돌격대 창설"
 ger_volksturm_desc:0 "국민돌격대는 제2차 세계 대전 마지막 몇 달 동안 나치당이 창설한 국민 민병대였습니다. 복무에 부적합하다고 여겨지거나 정규군에 복무하지 않는 남성들과 소년들로 구성되었습니다."
 
 ger_battle_of_britain:0 "영국 본토 항공전"
 ger_battle_of_britain_desc:0 " "
 ger_luftwaffe_goring_division:0 "헤르만 괴링 기갑사단"
 ger_luftwaffe_goring_division_desc:0 "헤르만 괴링 사단은 독일 공군의 정예 기갑사단이었습니다. 이 사단은 북아프리카, 시칠리아, 이탈리아, 그리고 후일 동부 전선에서 전투를 치렀습니다."
 ger_luftwaffe_infantry:0 "공군 야전사단"
 ger_luftwaffe_infantry_desc:0 "공군 야전사단은 200,000명에서 250,000명에 달하는 공군 지상 병력, 지원 병력 및 기타 잉여 인력으로 구성되었습니다. 이 결정은 원래 1942년 10월에 승인되었으며, 다른 군의 인력을 이전하여 독일 육군을 강화할 수 있다는 제안에 따른 것이었습니다."
 
 ger_battle_of_atlantic:0 "대서양 전투"
 ger_battle_of_atlantic_desc:0 " "
 ger_submarine_bases:0 "잠수함 정박시설 건설"
 ger_submarine_bases_desc:0 "프랑스에 잠수함 기지와 방호 정박시설을 건설하면, 독일에서 수리와 정비를 받기 위해 위험한 영국 해협을 건널 필요 없이 대서양에서 잠수함 부대를 운용할 수 있게 됩니다."
 ger_kriegsmarine_infantry:0 "해군 보병사단"
 ger_kriegsmarine_infantry_desc:0 "해군 보병사단은 함선 승조원이나 해안 시설에 더는 필요하지 않은 크릭스마리네 인원으로 창설되었습니다. 소련과 연합군의 독일 침공 이후, 사단은 독일 북서부 방어 작전에 배치되었습니다."
 
 USA_pay_farm_subsidiesx:0 "농업 보조금 지급"
 USA_prepare_people_for_war:0 "국민 전쟁 대비"
 
 
 
 
 
 
 
 scw_ticker:0 "스페인 내전"
 anti_neutrality_raids:0 "반왕정주의자 급습"
 anti_neutrality_raids_desc:0 "국가의 장기적인 안정을 위해, 국내의 왕정주의자와 권위주의자 세력을 단속해야 합니다. 그들의 영향력은 너무나 막강하여, 잠재적으로 국가에 문제가 될 수 있습니다."
