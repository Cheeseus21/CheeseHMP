 HUN_szent_laezlo_allas_line_tt:0 "카르파티아 국경을 따라 위치한 각 주에 §Y3 레벨의 육상 요새§!를 건설합니다.\n"
 HUN_szent_laezlo_allas_2_line_tt:0 "카르파티아 국경을 따라 위치한 주들의 육상 요새를 3 레벨에서 5 레벨로 업그레이드합니다.\n"
