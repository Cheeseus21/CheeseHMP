 ENG_prepare_for_sealion:0 "침공 대비"
 ENG_prepare_for_sealion_desc:0 "유럽을 뒤덮은 어둠과 우리의 위대한 섬나라 사이는 고작 34킬로미터밖에 떨어져 있지 않습니다. 독일에게 점령당한 또 다른 국가가 되지 않으려면 지금 침공에 대비해야 합니다."
 ENG_form_the_ldv:0 "지역 방위 의용군 훈련"
 ENG_form_the_ldv_desc:0 "본토 주둔군의 관측 및 군사 역량을 보충하기 위해서는 광범위한 비정규군 조직이 필요합니다."
 ENG_form_the_home_guard:0 "LDV를 국토방위군으로 전환"
 ENG_form_the_home_guard_desc:0 "지역 방위 의용군은 유용했지만, 장비가 열악하고 훈련이 부족했습니다. 상당한 군사적 투자를 통해 이 조직을 강력한 준군사 집단으로 탈바꿈시킬 수 있습니다."
 ENG_prepare_resistance:0 "저항군 준비"
 ENG_prepare_resistance_desc:0 "독일군이 영국 땅에 발을 들여놓기 전부터, 우리는 잘 준비되고 장비가 갖춰진 저항 운동을 조직하여 독일의 전쟁 기계를 둔화시키고 마모시킬 수 있습니다."
 ENG_create_fortifications:0 "GHQ 방어선 건설"
 ENG_create_fortifications_desc:0 "독일이 침공할 경우, 강력한 저지선은 우리의 종심 방어 전략의 핵심입니다. 총사령부 방어선은 런던과 영국의 산업 중심지를 보호하기 위한 최후의 방어선입니다."
