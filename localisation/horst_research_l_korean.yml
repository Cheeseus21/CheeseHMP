 amtrac_gasoline_engine:0 "가솔린 엔진"
 amtrac_gasoline_engine_desc:0 "가솔린으로 작동하는 엔진은 동일한 엔진 크기에서 더 빠르지만, 연료가 화재에 훨씬 더 취약합니다."
 amtrac_diesel_engine:0 "디젤 엔진"
 amtrac_diesel_engine_desc:0 "디젤 연료로 작동하는 엔진은 가솔린 엔진보다 신뢰성이 높지만, 동일한 엔진 크기에서 속도는 더 느립니다."
 amtrac_riveted_armor:0 "리벳 장갑"
 amtrac_riveted_armor_desc:0 "리벳으로 강철판을 결합하는 것은 저렴하고 빠르며 숙련된 노동력이 필요하지 않습니다. 하지만 각 리벳이 약점이 되는 부작용이 있습니다."
 amtrac_rolled_homo_armor:0 "용접 장갑"
 amtrac_rolled_homo_armor_desc:0 "원하는 두께로 압연하여 내부 금속 입자를 정렬시킨 강철판을 함께 용접합니다."
 amtrac_easy_maintenance:0 "손쉬운 정비"
 amtrac_easy_maintenance_desc:0 "차량 주변의 해치는 차량의 여러 부품에 접근할 수 있게 해주며, 승무원이 복잡한 정비도 꽤 쉽게 수행할 수 있도록 합니다."
 amtrac_radio:0 "무전기"
 amtrac_radio_desc:0 "기본적인 양방향 무전기는 기계화 보병이 소규모 전술 기동을 조율할 수 있게 해줍니다."
 amtrac_smoke_launchers:0 "연막탄 발사기"
 amtrac_smoke_launchers_desc:0 "전차 내부에서 작동시켜 짙은 연막을 생성해 전차를 은폐할 수 있는 일련의 발연 장치입니다. 방어 중이거나 매복에 걸렸을 때 매우 유용합니다."
 amtrac_extra_ammo_storage:0 "추가 탄약 적재 공간"
 amtrac_extra_ammo_storage_desc:0 "추가 즉응탄 탄약고는 전차가 재보급 없이 더 오래 전투를 지속할 수 있게 해줍니다. 하지만 장갑이 관통되면 그 결과는 재앙적일 수 있습니다. 이는 공격 시에 특히 문제가 됩니다."
 amtrac_wet_ammo_storage:0 "습식 탄약고"
 amtrac_wet_ammo_storage_desc:0 "탄약고에 추가된 워터 재킷은 전차가 피격된 후 탄약이 유폭될 위험을 극적으로 줄여주며, 이는 승무원들에게 매우 환영받습니다."
 amtrac_petrol_electric_engine:0 "가솔린-전기 엔진"
 amtrac_petrol_electric_engine_desc:0 "가솔린 엔진이 전기 모터에 동력을 공급하는 조합입니다. 복잡하고, 비싸며, 신뢰성이 낮지만, 전술 기동에서는 타의 추종을 불허하는 성능을 제공합니다."
 amtrac_gas_turbine_engine:0 "가스 터빈"
 amtrac_gas_turbine_engine_desc:0 "제트 엔진에서 발전한 터빈입니다. 연료 소모량이 높지만, 주어진 엔진 크기에서 가장 높은 속도를 냅니다."
 car_gas_turbine_engine:0 "가스 터빈"
 car_gas_turbine_engine_desc:0 "제트 엔진에서 발전한 터빈입니다. 연료 소모량이 높지만, 주어진 엔진 크기에서 가장 높은 속도를 냅니다."

 mobile_warfare_summarized:0 "기동전 (교리 전체 요약)"
 mobile_warfare_summarized_desc:0 "기동전 교리 전체의 혜택을 보여주기 위한 항목입니다."
 superior_firepower_summarized:0 "우세 화력 (교리 전체 요약)"
 superior_firepower_summarized_desc:0 "우세 화력 교리 전체의 혜택을 보여주기 위한 항목입니다."
 grand_battleplan_summarized:0 "대규모 계획 (교리 전체 요약)"
 grand_battleplan_summarized_desc:0 "대규모 계획 교리 전체의 혜택을 보여주기 위한 항목입니다."
 mass_assault_summarized:0 "대량 돌격 (교리 전체 요약)"
 mass_assault_summarized_desc:0 "대량 돌격 교리 전체의 혜택을 보여주기 위한 항목입니다."

  
 mech_full_torsion_bar_suspension:0 "궤도형 토션 바"
 mech_full_torsion_bar_suspension_desc:0 "차체에 고정된 금속 막대로 구성된 꽤 신뢰성 있는 현수장치로, 다른 현수장치 유형보다 더 부드러운 승차감을 제공합니다."
 mech_full_horstmann_suspension:0 "궤도형 호르스트만 현수장치"
 mech_full_horstmann_suspension_desc:0 "크리스티 현수장치와 유사하게, 호르스트만 현수장치는 여러 바퀴에 무게를 분산시켜 고장 걱정 없이 더 무거운 장비를 장착할 수 있게 해줍니다."
 mech_half_torsion_bar_suspension:0 "반궤도형 토션 바"
 mech_half_torsion_bar_suspension_desc:0 "차체에 고정된 금속 막대로 구성된 꽤 신뢰성 있는 현수장치로, 다른 현수장치 유형보다 더 부드러운 승차감을 제공합니다."
 mech_half_horstmann_suspension:0 "하프트랙 호르스트만 현수장치"
 mech_half_horstmann_suspension_desc:0 "크리스티 현수장치와 유사하게, 호르스트만 현수장치는 여러 바퀴에 중량을 분산시켜 고장 걱정 없이 더 무거운 장비를 장착할 수 있게 해줍니다."

 mech_half_hydropneumatic_suspension:0 "하프트랙 유기압 현수장치"
 mech_half_hydropneumatic_suspension_desc:0 "더 복잡한 유형의 현수장치로, 지형의 요철을 만나면 로드휠이 들어올려져 기동 중 더 정확한 사격이 가능하게 하고 험지에서 방어 진지를 점령할 수 있게 해줍니다."
 mech_full_hydropneumatic_suspension:0 "궤도형 유기압 현수장치"
 mech_full_hydropneumatic_suspension_desc:0 "더 복잡한 유형의 현수장치로, 지형의 요철을 만나면 로드휠이 들어올려져 기동 중 더 정확한 사격이 가능하게 하고 험지에서 방어 진지를 점령할 수 있게 해줍니다."
 mech_hydrostatic_engine:0 "정유압 구동장치"
 mech_hydrostatic_engine_desc:0 "정유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이는 전차 포탑 회전과 차체 선회 속도를 더 빠르게 만들어주며, 유압으로 구동되기 때문에 연료 소모도 적습니다."

 amtrac_interleaf_suspension:0 "인터리브 로드휠"
 amtrac_interleaf_suspension_desc:0 "로드휠을 겹치게 배치하여, 동일한 차체 길이에 더 많은 로드휠을 장착할 수 있어 기동성을 향상시키고 측면에 추가적인 방호력을 제공합니다."

  
 tank_torsion_bar_suspension_L:0 "소형 토션 바"
 tank_torsion_bar_suspension_L_desc:0 "차체에 고정된 금속 막대로 이루어진 상당히 신뢰성 있는 현수장치 시스템으로, 다른 현수장치 유형보다 더 부드러운 승차감을 제공합니다."
 tank_horstmann_suspension_L:0 "소형 호르스트만 현수장치"
