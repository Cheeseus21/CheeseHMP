 mech_4x4_suspension:0 "4륜 구동"
 mech_4x4_suspension_desc:0 "차륜형 서스펜션은 빠르고 생산이 용이하지만, 탑승한 보병의 전투 준비 태세가 완벽하지 않을 수 있습니다."
 mech_6x6_suspension:0 "6륜 구동"
 mech_6x6_suspension_desc:0 "차륜형 서스펜션은 빠르고 생산이 용이하지만, 탑승한 보병의 전투 준비 태세가 완벽하지 않을 수 있습니다."
 mech_8x8_suspension:0 "8륜 구동"
