 car_one_man_car_turret:0 "1인승 장갑차 포탑"
 car_one_man_car_turret_desc:0 "승무원 한 명이 겨우 들어갈 수 있을 만큼 작은 포탑으로, 이 승무원은 주무장 조준과 장전, 그리고 목표물과 위협 감시 임무를 맡습니다."
 car_two_man_car_turret:0 "2인승 장갑차 포탑"
 car_two_man_car_turret_desc:0 "승무원 두 명이 무장 운용과 상황 관측 임무를 분담할 수 있는 포탑입니다. 하지만 여전히 승무원 간의 효과적인 업무 분담은 불가능합니다."
 car_one_man_tank_turret:0 "1인승 경전차 포탑"
 car_one_man_tank_turret_desc:0 "단 한 명의 승무원이 탑승할 수 있는 작은 포탑으로, 주무장의 조준 및 장전과 함께 목표 및 위협 감시 임무를 수행합니다."
 car_two_man_tank_turret:0 "2인승 경전차 포탑"
 car_two_man_tank_turret_desc:0 "두 명의 승무원이 무장 운용과 상황 관측 임무를 분담할 수 있는 포탑입니다. 하지만 여전히 승무원 간의 효율적인 업무 분담은 어렵습니다."
 car_three_man_tank_turret:0 "3인승 경전차 포탑"
 car_three_man_tank_turret_desc:0 "세 명의 승무원이 탑승할 수 있을 만큼 큰 포탑으로, 주무장의 장전 및 조준 임무와 주변 상황 인지 임무를 분담할 수 있습니다."
 car_three_man_car_turret:0 "3인승 장갑차 포탑"
 car_three_man_car_turret_desc:0 "세 명의 승무원이 탑승할 수 있을 만큼 큰 포탑으로, 주무장의 장전 및 조준 임무와 주변 상황 인지 임무를 분담할 수 있습니다."

 
 
 car_gasoline_engine:0 "가솔린 엔진"
 car_gasoline_engine_desc:0 "가솔린으로 작동하는 엔진은 동일한 엔진 크기에서 더 빠르지만, 연료가 화재에 훨씬 더 취약합니다."
 car_diesel_engine:0 "디젤 엔진"
 car_diesel_engine_desc:0 "디젤 연료로 작동하는 엔진은 가솔린 엔진보다 더 안정적이지만, 동일한 엔진 크기에서 속도는 더 느립니다."

 car_stabilizer:0 "안정기"
 car_stabilizer_desc:0 "수직 안정기는 기동 중 명중률을 향상시키며, 지형의 작은 요철에도 포수가 더는 현기증을 느끼지 않게 됩니다."
 car_vision_ports:0 "개량형 관측창"
 car_vision_ports_desc:0 "승무원을 위한 더 많고 향상된 관측창은 더 나은 전장 상황 인식과 효율적인 정찰 임무 수행을 가능하게 합니다."
 car_smoke_launchers:0 "연막탄 발사기"
 car_smoke_launchers_desc:0 "격발 가능한 연막탄 세트는 장갑차가 파괴될 위험을 최소화하며 진지에 진입하고 이탈할 수 있게 해줍니다."
 car_extra_ammo_storage_desc:0 "더 많은 탄약을 적재하면 차량이 장기적인 임무를 수행할 수 있지만, 피격 시 치명적인 고장과 유폭이 일어날 수 있다는 지속적인 공포를 감수해야 합니다."
 car_extra_ammo_storage:0 "추가 탄약 저장고"
 car_wet_ammo_storage:0 "습식 탄약 저장고"
 car_wet_ammo_storage_desc:0 "탄약 선반에 추가된 워터 재킷은 장갑차가 피격된 후 탄약이 유폭될 위험을 극적으로 줄여주므로, 승무원에게 매우 환영받는 기능입니다."
 car_auto_loader:0 "자동 장전 장치"
 car_auto_loader_desc:0 "자동 장전 시스템은 장갑차가 장시간 동안 발사 속도를 유지할 수 있게 해줍니다"
 car_easy_maintenance:0 "손쉬운 정비"
 car_easy_maintenance_desc:0 ""
 car_additional_machine_guns:0 "추가 기관총"
 car_additional_machine_guns_desc:0 "차량 포탑에 장착된 기관총은 승무원이 보병 및 공중 공격에 대응할 수 있게 합니다."
 car_internal_machine_gun:0 "내부 기관총"
 car_internal_machine_gun_desc:0 "대보병 방어용 내부 기관총입니다."
 amtrac_machine_gun:0 "추가 기관총"
 amtrac_machine_gun_desc:0 "앰트랙 차체에 장착된 기관총은 승무원이 보병 및 공중 공격에 대응할 수 있게 합니다."
 mech_machine_gun:0 "추가 기관총"
 mech_machine_gun_desc:0 "기계화 차량 차체에 장착된 기관총은 승무원이 보병 및 공중 공격에 대응할 수 있게 합니다."

