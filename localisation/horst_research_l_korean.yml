 car_close_support_gun:0 "§g기본§! 근접 지원포"
 car_close_support_gun_desc:0 "공격 중인 보병을 돕기 위해 적 야전 축성에 고폭탄을 발사하도록 설계된 소형 무기입니다. 전차와 교전할 수는 있지만, 짧은 포신과 제한된 탄약으로는 더 강력한 적 전차를 상대할 수 없습니다."
 car_close_support_gun2:0 "§G개량형§! 근접 지원포"
