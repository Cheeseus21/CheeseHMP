 gbp_sum_desc:0 "이 교리는 대안적인 보병 교리입니다. 높은 계획 수립 덕분에 프로빈스 공세를 유지하는 데 적합하며, 높은 방어력으로 프로빈스를 사수하는 데에도 유리하지만 기동성은 매우 취약합니다. 이 교리는 척후병 장군과 강력한 시너지를 발휘합니다."
