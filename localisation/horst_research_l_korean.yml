 tank_modern_cannon:0 "§8현대형§! 주포"
 tank_modern_howitzer:0 "§8현대형§! 곡사포"
 EQ_MOD_CAT_tank_modern_main_armament_TITLE:0 "현대형 주무장"
 tank_modern_cannon_desc:0 "다양한 임무에 적합한 범용 무장입니다. 대보병 및 대전차 능력 모두 뛰어나지는 않지만, 특수탄을 사용하여 강력한 대장갑 특성을 유지합니다."
 tank_modern_howitzer_desc:0 "차량에 탑재할 수 있도록 개조된 현대형 야포입니다. 주 목적은 연성 목표물에 대한 간접 화력 지원이지만, 필요시 목표물에 직접 사격할 수도 있습니다. 소량의 철갑탄만 탑재하므로 대전차 임무에는 부적합합니다."
 tank_modern_anti_air_cannon:0 "§8현대형§! 대공포"
 tank_modern_anti_air_cannon_desc:0 "항공기 교전을 위해 설계된 속사 기관포입니다. 지상 목표물에 대한 화력 지원 무기로서의 잠재력은 제한적입니다."

 modern_rocket_launcher:0 "§8현대형§! 로켓 발사기"
 modern_rocket_launcher_desc:0 "정확도에 여러 개선이 있었지만, 이 개량형 로켓 발사기의 주된 장점은 적에게 발사할 수 있는 로켓을 더 많이 탑재할 수 있다는 것입니다."
 modern_auto_cannon:0 "§8현대형§! 기관포"
 modern_auto_cannon_desc:0 "속사 대공포를 개조한 이 기관포는 연성 목표물에 파괴적인 화망을 형성할 수 있습니다. 소구경으로 인해 대장갑 성능은 제한됩니다."
 tank_modern_high_velocity_cannon:0 "§8현대형§! 고속포"
 tank_modern_high_velocity_cannon_desc:0 "높은 포구 속도를 달성하기 위해 특별히 설계된 포입니다. 특수탄을 사용하여 뛰어난 대장갑 특성을 지니지만, 연성 목표물에 대한 성능은 떨어집니다."
 
 
 
 tank_high_velocity_cannon_l1:0 "§g기본형§! 경량 고속포"
