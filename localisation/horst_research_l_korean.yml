 tank_high_velocity_cannon_l3_desc:0 "높은 포구 속도를 달성하기 위해 특별히 설계된 포입니다. 특수탄을 사용하여 뛰어난 대장갑 특성을 지니지만, 연성 목표물에 대한 성능은 떨어집니다."
 tank_super_heavy_cannon_1:0 "§g기본형§! 초중주포"
 tank_super_heavy_cannon_1_desc:0 "타의 추종을 불허하는 성능을 가진 터무니없이 거대한 무장입니다. 이 무장으로 파괴할 수 없는 것은 거의 없으며, 그중 어떤 것도 전차를 향해 쏠 일이 없습니다."
 tank_super_heavy_cannon_2:0 "§G개량형§! 초중주포"
