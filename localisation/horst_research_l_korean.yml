 light_tank_destroyer_chassis_4_desc:0 "구축전차는 포탑 대신 고정식 거치대에 일반 전차보다 대구경 주포를 장착한 전차입니다. 경구축전차는 경전차의 차체를 기반으로 하므로 기동성이 뛰어나지만, 중구축전차에 비해 강력한 주포를 탑재하지는 않습니다."
