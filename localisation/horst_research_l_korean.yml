 tank_hydropneumatic_suspension_L:0 "소형 유기압 현수장치"
 tank_hydropneumatic_suspension_L_desc:0 "더 복잡한 유형의 현수장치로, 지형의 요철을 만나면 로드휠이 들어올려져 기동 중 더 정확한 사격이 가능하게 하고 험지에서 방어 진지를 점령할 수 있게 해줍니다."
 tank_interleaved_suspension_L:0 "소형 인터리브 로드휠"
 tank_interleaved_suspension_L_desc:0 "로드휠을 겹치게 배치하여, 동일한 차체 길이에 더 많은 로드휠을 장착할 수 있어 기동성을 향상시키고 측면에 추가적인 방호력을 제공합니다."
 tank_bogie_suspension_L:0 "소형 보기 현수장치"
 tank_bogie_suspension_L_desc:0 "단순하고 상당히 저렴한 유형의 현수장치로, 로드휠이 개별적으로 장착되어 있어 손상 시 쉽게 교체할 수 있습니다."
 tank_christie_suspension_L:0 "소형 크리스티 현수장치"
