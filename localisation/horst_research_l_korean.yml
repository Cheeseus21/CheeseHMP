 tank_torsion_bar_suspension_SH:0 "초대형 토션 바"
 tank_torsion_bar_suspension_SH_desc:0 "차체에 고정된 금속 막대로 구성된 상당히 신뢰성 있는 현수장치 시스템으로, 다른 현수장치 유형보다 더 부드러운 승차감을 제공합니다."
 tank_horstmann_suspension_SH:0 "초대형 호르스트만 현수장치"
 tank_horstmann_suspension_SH_desc:0 "크리스티 현수장치와 유사하게, 호르스트만 현수장치는 여러 바퀴에 무게를 분산시켜 고장 걱정 없이 더 무거운 장비를 장착할 수 있게 해줍니다."
 tank_hydropneumatic_suspension_SH:0 "초대형 유기압 현수장치"
 tank_hydropneumatic_suspension_SH_desc:0 "더 복잡한 유형의 현수장치로, 지형의 요철을 만나면 로드휠이 들어 올려져 기동 중 더 정확한 사격이 가능하게 하고 거친 지형에서 방어 진지를 점령할 수 있게 해줍니다."
 tank_interleaved_suspension_SH:0 "초대형 인터리브 로드휠"
 tank_interleaved_suspension_SH_desc:0 "로드휠을 겹치게 배치하여 동일한 차체 길이에 더 많은 로드휠을 장착할 수 있어, 기동성을 향상시키고 측면에 추가적인 방호력을 제공합니다."
 tank_bogie_suspension_SH:0 "초대형 보기 현수장치"
 tank_bogie_suspension_SH_desc:0 "단순하고 상당히 저렴한 유형의 현수장치로, 로드휠이 개별적으로 장착되어 있어 손상 시 쉽게 교체할 수 있습니다."
 tank_christie_suspension_SH:0 "초대형 크리스티 현수장치"
