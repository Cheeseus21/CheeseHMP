 car_high_velocity_cannon_m1:0 "§g기본§! 고속 중형포"
 car_high_velocity_cannon_m1_desc:0 "높은 포구 속도를 달성하기 위해 특별히 설계된 포입니다. 특수 탄약을 사용하여 뛰어난 대장갑 특성을 지니지만, 대인 목표에 대한 성능은 떨어집니다."
