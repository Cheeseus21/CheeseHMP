 GER_mech_chassis_0:0 "존더크라프트파르초이크 11"
 GER_mech_chassis_0_short:0 "Sd.Kfz. 11"
 GER_mech_chassis_0_desc:0 "Sd.Kfz. 11(존더크라프트파르초이크 - 특수 동력 차량)은 제2차 세계대전 당시 매우 광범위하게 사용된 독일의 반궤도 차량입니다. 포 또는 트레일러를 견인하는 동시에 병력 8명을 수송할 수 있었습니다."
 GER_mech_chassis_1:0 "존더크라프트파르초이크 251"
 GER_mech_chassis_1_short:0 "Sd.Kfz. 251"
 GER_mech_chassis_1_desc:0 "Sd.Kfz. 251 반궤도 차량은 제2차 세계대전 당시 하노마크 사에서 이전 Sd.Kfz. 11 차량을 기반으로 설계 및 최초 생산한 장갑 전투 차량입니다."
 GER_mech_chassis_2:0 "존더크라프트파르초이크 251/20"
