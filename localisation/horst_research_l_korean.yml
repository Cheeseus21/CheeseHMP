 car_4x4_suspension:0 "4륜 구동"
 car_4x4_suspension_desc:0 "4개의 바퀴는 더 빠른 속도와 쉬운 생산을 가능하게 하여, 빠르고 민첩한 정찰 차량을 만들 수 있습니다."
 car_6x6_suspension:0 "6륜 구동"
 car_6x6_suspension_desc:0 "6개의 바퀴는 속도가 느리지만, 조종성이 뛰어나 더 나은 전선 보병 지원 차량 및 파르티잔 사냥꾼이 될 수 있습니다."
 car_8x8_suspension:0 "8륜 구동"
 car_8x8_suspension_desc:0 "8x8 구성은 장갑차를 전차와 더 유사하게 만들어, 조종성을 높이고 매복 잠재력을 향상시킵니다."
 car_riveted_armor:0 "리벳 장갑"
 car_riveted_armor_desc:0 "장갑판을 프레임에 볼트로 고정하고 가장자리에 박은 리벳으로 결합합니다. 매우 검증된 기술이며 상당히 저렴하지만, 리벳으로 고정된 가장자리는 장갑의 약점이 되며 리벳이 피격당할 경우 승무원에게 부상을 입힐 수 있습니다."
 car_welded_armor:0 "용접 장갑"
 car_welded_armor_desc:0 "장갑판을 차체에 용접합니다. 주조보다 빠른 공정이면서도 여전히 우수한 방호력을 제공합니다."
 car_flat_armor:0 "평면 장갑 배치"
 car_flat_armor_desc:0 "전간기에 주를 이루었던 평면 장갑은 생산이 용이하고 승무원을 위한 덜 비좁은 차체를 제공하여, 효과적인 협조 능력을 향상시킵니다."
 car_semi-flat_armor:0 "준평면 장갑 배치"
 car_semi-flat_armor_desc:0 "경사장갑과 비경사장갑 사이의 절충안으로, 특정 구역은 각도가 훨씬 가파르므로 유효 두께가 더 두꺼워지는 반면, 전차의 다른 부분에서는 평평한 차체 장갑판 덕분에 부품 배치가 더 용이합니다."
 car_sloped_armor:0 "경사장갑 배치"
 car_sloped_armor_desc:0 "날아오는 포탄에 대해 각도를 두고 배치된 장갑은 수직으로 배치된 동일한 양의 장갑보다 훨씬 더 큰 유효 두께를 가집니다. 또한 포탄이 단순히 무해하게 튕겨나갈 확률도 높여줍니다. 하지만, 이를 중심으로 전차 전체를 설계해야 하므로 차량 조립이 더 어려워집니다."

 car_nft_two_man_tank_turret:0 "포곽식 포가"
 car_nft_two_man_tank_turret_desc:0 "개방형 포곽에 주포를 장착하면 더 큰 대포를 탑재할 수 있습니다."
 car_rocket_launcher:0 "§G기본형§! 로켓 발사기"
 car_rocket_launcher_desc:0 "무유도 고폭 로켓용 다연장 발사기입니다. 화력 투사량이 높아 연표적에 대해 탁월한 성능을 발휘하지만, 장갑 표적에는 직격하더라도 거의 피해를 주지 못합니다."
 car_rocket_launcher_2:0 "§2개량형§! 로켓 발사기"
 car_rocket_launcher_2_desc:0 "정확도 면에서 여러 개선이 있었지만, 이 개량형 로켓 발사기의 주된 장점은 적에게 발사할 로켓을 더 많이 탑재할 수 있다는 점입니다."
 car_medium_howitzer_desc:0 "차량 탑재용으로 개조된 중형 야전 곡사포입니다. 주된 목적은 연표적에 대한 간접 화력 지원이지만, 필요하다면 표적에 직접 사격할 수도 있습니다. 소량의 철갑탄만 휴대하므로 대전차 임무에는 부적합합니다."
 car_medium_howitzer_2:0 "§G개량형§! 중형 곡사포"
 car_medium_howitzer_2_desc:0 "차량 탑재용으로 개조된 중형 야전 곡사포입니다. 주된 목적은 연표적에 대한 간접 화력 지원이지만, 필요하다면 표적에 직접 사격할 수도 있습니다. 소량의 철갑탄만 휴대하므로 대전차 임무에는 부적합합니다."
 car_medium_howitzer_3:0 "§2고급형§! 중형 곡사포"
 car_medium_howitzer_3_desc:0 "차량 탑재용으로 개조된 중형 야전 곡사포입니다. 주된 목적은 연표적에 대한 간접 화력 지원이지만, 필요하다면 표적에 직접 사격할 수도 있습니다. 소량의 철갑탄만 휴대하므로 대전차 임무에는 부적합합니다."

 amtrac_chassis:0 "상륙용 수륙양용차"
 amtrac_chassis_short:0 "앰트랙"
 amtrac_chassis_desc:0 "수륙양용 궤도차, 즉 앰트랙은 해병대가 장갑 방호 하에 해안에 상륙할 수 있게 해줍니다. 하지만, 이는 낮은 연비라는 대가를 치릅니다."
 amtrac_chassis_0:0 "기본형 수륙양용 궤도차"
 amtrac_chassis_0_short:0 "기본형 앰트랙"
 amtrac_chassis_0_desc:0 "수륙양용 궤도차, 즉 앰트랙은 해병대가 장갑 방호 하에 해안에 상륙할 수 있게 해줍니다. 하지만, 이는 낮은 연비라는 대가를 치릅니다."
 amtrac_chassis_1:0 "개량형 수륙양용 궤도차"
 amtrac_chassis_1_short:0 "개량형 앰트랙"
 amtrac_chassis_1_desc:0 "이 앰트랙은 해안에서 더 쉽게 하역할 수 있도록 후방 탑재 경사로를 설치하는 등 기본형에 비해 몇 가지 개선점이 있습니다."

  
 
 
 car_medium_cannon_3:0 "§2고급형§! 중형포"
 car_medium_cannon_3_desc:0 "다양한 임무에 적합한 범용 무기입니다. 대보병 및 대전차 임무 모두에 뛰어나지는 않지만, 차량에 높은 유연성을 제공합니다."
 car_medium_cannon_desc:0 "다양한 임무에 적합한 범용 무기입니다. 대보병 및 대전차 임무 모두에 뛰어나지는 않지만, 차량에 높은 유연성을 제공합니다."
