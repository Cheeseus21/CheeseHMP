 flat_armor_desc:0 "전간기에 주류를 이루었던 평면 장갑은 생산이 용이하며, 승무원을 위한 더 넓은 차체 공간을 제공하여 효과적인 협조 능력을 향상시킵니다."
 semi-flat_armor:0 "반경사 장갑 배치"
 semi-flat_armor_desc:0 "경사장갑과 비경사장갑의 절충안으로, 특정 구역의 경사각이 훨씬 가파르기 때문에 유효 방호력이 더 높습니다. 반면, 전차의 다른 부분에 있는 평면 장갑판은 부품 배치를 더 용이하게 합니다."
 tank_horstmann_suspension:0 "호르스트만 현가장치"
 tank_horstmann_suspension_desc:0 "크리스티 현가장치와 유사하게, 호르스트만 현가장치는 여러 바퀴에 중량을 분산시켜 고장 걱정 없이 더 무거운 장비를 장착할 수 있게 합니다."
 tank_hydropneumatic_suspension:0 "유기압 현가장치"
 tank_hydropneumatic_suspension_desc:0 "더 복잡한 유형의 현가장치로, 지형의 요철을 만났을 때 로드휠이 들어 올려져 기동 중 더 정확한 사격이 가능하게 하고 험지에서 방어 진지를 점령하는 것을 용이하게 합니다."
 tank_hydrostatic_engine:0 "유압 구동장치"
 tank_hydrostatic_engine_desc:0 "유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이는 전차의 포탑 회전 속도와 차체 선회 속도를 더 빠르게 만들고, 유압으로 구동되기 때문에 연료 소모도 줄여줍니다."
 tank_hydrostatic_engine_L:0 "소형 유압 구동장치"
 tank_hydrostatic_engine_L_desc:0 "유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이는 전차의 포탑 회전 속도와 차체 선회 속도를 더 빠르게 만들고, 유압으로 구동되기 때문에 연료 소모도 줄여줍니다."
 tank_hydrostatic_engine_H:0 "대형 유압 구동장치"
 tank_hydrostatic_engine_H_desc:0 "유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이는 전차의 포탑 회전 속도와 차체 선회 속도를 더 빠르게 만들고, 유압으로 구동되기 때문에 연료 소모도 줄여줍니다."
 tank_hydrostatic_engine_SH:0 "초대형 유압 구동장치"
 tank_hydrostatic_engine_SH_desc:0 "유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이는 전차의 포탑 회전 속도와 차체 선회 속도를 더 빠르게 만들고, 유압으로 구동되기 때문에 연료 소모도 줄여줍니다."
 mech_ostketten:0 "그라우저"
 mech_ostketten_desc:0 "그라우저는 무한궤도의 접지력을 높이기 위한 장치로, 특히 흙이나 눈과 같은 무른 지형에서 효과적입니다."
