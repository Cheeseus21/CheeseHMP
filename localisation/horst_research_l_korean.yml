 mech_half_belleville_washer:0 "하프트랙 벨빌 와셔 현가장치"
 amtrac_full_belleville_washer:0 "궤도형 벨빌 와셔 현가장치"
 amtrac_full_belleville_washer_desc:0 "벨빌 와셔 현가장치는 작은 크기에도 매우 높은 에너지 저장 용량을 갖추고 있지만, 다른 현가장치 유형보다 더 비싸고 복잡합니다."

 
 tank_front_plate_fixed_superstructure_turret:0 "포방패"
 tank_front_plate_fixed_superstructure_turret_desc:0 "주무장에 금속 장갑판을 장착하여 전방에서 오는 소화기 사격으로부터 포수팀을 보호합니다. 하지만, 완전한 고정식 상부구조에 비해 측면은 심각하게 노출됩니다. 이를 통해 공장에서는 더 가벼운 차체에 평소보다 더 큰 대포를 장착할 수 있습니다. 또한 이 방패는 다른 선택지에 비해 생산 비용이 거의 들지 않습니다."
 tank_platform_mount_turret:0 "포 플랫폼"
 tank_platform_mount_turret_desc:0 "야포를 장착하기 위한 플랫폼을 차체에 개조하여 장착합니다. 포를 발사하는 동안 포수 승무원은 소화기 사격에 노출됩니다. 이로 인해 전차는 전통적인 기갑 역할에서는 거의 쓸모가 없어집니다. 다른 기동 야포에 비해 이동 중 분대에 더 나은 방호력을 제공합니다. 또한 장갑판의 필요성이 줄어들어 전차 전체의 생산 비용이 저렴해지고 속도도 약간 빨라집니다. 공장에서는 차체에 보통 장착 가능한 것보다 더 큰 대포를 장착할 수도 있습니다. 솔직히 말해서, 이로 인해 전차는 거대한 트랙터 위에 금속 플랫폼과 나무 몇 개를 올려놓은 것처럼 보입니다."
 
 
 
 hull_gun:0 "근접 지원포"
 hull_gun_desc:0 "부포탑이나 전차 차체 내부에 장착된 근접 지원포입니다. 포의 위치는 사격 각도를 크게 제한하여 효율성을 떨어뜨리지만, 더 많은 목표물과 교전할 수 있게 해줍니다. 이는 특히 공격 시에 유용합니다."
 tank_module_camouflage_net:0 "위장"
 tank_module_camouflage_net_desc:0 "다양한 색상의 페인트와 세심하게 제작된 그물망의 조합은 전차가 주변 환경과 조화를 이루도록 돕습니다."
 car_module_camouflage_net:0 "위장"
 car_module_camouflage_net_desc:0 "다양한 색상의 페인트와 세심하게 제작된 그물망의 조합은 장갑차가 주변 환경과 조화를 이루도록 돕습니다."
 mech_module_camouflage_net:0 "위장"
 mech_module_camouflage_net_desc:0 "다양한 색상의 페인트와 세심하게 제작된 그물망의 조합은 하프트랙이 주변 환경과 조화를 이루도록 돕습니다."
 amtrac_module_camouflage_net:0 "위장"
 amtrac_module_camouflage_net_desc:0 "다양한 색상의 페인트와 세심하게 제작된 그물망의 조합은 상륙장갑차가 주변 환경과 조화를 이루도록 돕습니다."
 tank_module_improved_turning_mechanisms:0 "보조 포탑 구동 장치"
 tank_module_improved_turning_mechanisms_desc:0 "전차의 포탑 회전 속도를 증가시킵니다."
 car_module_improved_turning_mechanisms:0 "보조 포탑 구동 장치"
 car_module_improved_turning_mechanisms_desc:0 "전차의 포탑 회전 속도를 증가시킵니다."

 tank_pintle_hmg:0 "핀틀 거치형 중기관총"
 tank_pintle_hmg_desc:0 "전차 포탑 상부에 핀틀 거치된 중기관총입니다. 이러한 총기 배치는 승무원을 노출시켜 총의 전반적인 효율성을 떨어뜨리지만, 전차가 항공기를 포함한 더 많은 목표물과 교전할 수 있게 해줍니다. 이는 특히 공격 시에 유용합니다."
 car_pintle_hmg:0 "핀틀 거치형 중기관총"
 car_pintle_hmg_desc:0 "장갑차 포탑 상부에 핀틀 거치된 중기관총입니다. 이러한 총기 배치는 승무원을 노출시켜 총의 전반적인 효율성을 떨어뜨리지만, 장갑차가 항공기를 포함한 더 많은 목표물과 교전할 수 있게 해줍니다. 이는 특히 공격 시에 유용합니다."
  
 tank_rocket_rails:0 "측면 장착 로켓"
 tank_rocket_rails_desc:0 "포탑 측면에 설치된 레일 거치형 로켓 발사기 세트입니다."
 car_rocket_rails:0 "측면 장착 로켓"
 car_rocket_rails_desc:0 "포탑 측면에 설치된 레일 거치형 로켓 발사기 세트입니다."
 car_heavy_machine_gun_special:1 "내부 중기관총"
 car_heavy_machine_gun_special_desc:0 "주 차체 내부의 기관총 마운트에 장착된 중기관총입니다. 이러한 총기 배치는 사격 각도를 제한하여 전반적인 효율성을 떨어뜨리지만, 장갑차가 더 많은 목표물과 교전할 수 있게 해줍니다. 이는 특히 공격 시에 유용합니다."

 
 mechanized_chassis_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 가진 차륜형 차량(트럭이나 지프)과는 달리, 차량이 적의 사격으로부터 어느 정도의 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."
 mechanized_chassis_0_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 가진 차륜형 차량(트럭이나 지프)과는 달리, 차량이 적의 사격으로부터 어느 정도의 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."
 mechanized_chassis_1_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 가진 차륜형 차량(트럭이나 지프)과는 달리, 차량이 적의 사격으로부터 어느 정도의 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."
 mechanized_chassis_2_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 가진 차륜형 차량(트럭이나 지프)과는 달리, 차량이 적의 사격으로부터 어느 정도의 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."

 tank_nsb_car_engine_upgrade:0 "엔진"
 tank_nsb_car_armor_upgrade:0 "장갑"  
 
 car_squeezebore_adaptor:0 "스퀴즈보어 어댑터"
 car_squeezebore_adaptor_desc:0 "포신 끝에 장착하는 특수 어댑터로, 포신의 직경을 줄여 포탄을 더 작은 구경으로 압착합니다. 이는 포구 속도를 크게 증가시켜 포의 관통력을 높입니다. 희귀한 재료로 만든 특수 탄약이 필요합니다."

 car_holzgas_engine:0 "목탄가스 엔진"
 car_holzgas_engine_desc:0 "목재를 연소시켜 가연성 가스를 생성하거나 압축 가스를 사용하여 동력을 공급하는 엔진입니다. 석유가 필요하지 않지만, 엔진 자체가 매우 크고 신뢰성이 떨어집니다."
 car_hydrostatic_engine:0 "유압 구동장치"
 car_hydrostatic_engine_desc:0 "유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이를 통해 전차의 포탑 회전과 차체 선회 속도가 빨라지며, 유압으로 구동되어 연료 소모 또한 줄어듭니다."
 car_petrol_electric_engine:0 "가솔린-전기 엔진"
 car_petrol_electric_engine_desc:0 "가솔린 엔진이 전기 모터에 동력을 공급하는 조합입니다. 복잡하고 비싸며 신뢰성이 떨어지지만, 전술적 기동에서는 타의 추종을 불허하는 성능을 제공합니다."
  
 tank_designer_mech_amtrac_chassis:0 "수륙양용 기계화"
 amtrac_full_torsion_bar_suspension:0 "토션바"
 amtrac_full_torsion_bar_suspension_desc:0 "차량 차체에 고정된 금속 막대로 이루어진 상당히 신뢰성 있는 현수장치로, 다른 현수장치 유형보다 더 부드러운 주행감을 제공합니다."
 amtrac_full_horstmann_suspension:0 "호르스트만 현수장치"
 amtrac_full_horstmann_suspension_desc:0 "크리스티 현수장치와 유사하게, 호르스트만 현수장치는 여러 바퀴에 무게를 분산시켜 고장 걱정 없이 더 무거운 장비를 장착할 수 있게 합니다."
 amtrac_full_hydropneumatic_suspension:0 "유기압 현수장치"
 amtrac_full_hydropneumatic_suspension_desc:0 "더 복잡한 유형의 현수장치로, 지형의 요철을 만났을 때 로드휠이 들어 올려져 기동 중 더 정확한 사격과 험지에서 방어 진지를 점령하는 것을 가능하게 합니다."
 
 amtrac_hydrostatic_engine:0 "유압 구동장치"
 amtrac_hydrostatic_engine_desc:0 "유압 구동장치는 동력을 공급하기 위해 특수 엔진이 필요한 변속기입니다. 이를 통해 전차의 포탑 회전과 차체 선회 속도가 빨라지며, 유압으로 구동되어 연료 소모 또한 줄어듭니다."
 
 amtrac_ostketten:0 "그라우저"
 amtrac_ostketten_desc:0 "그라우저는 무한궤도의 견인력을 높이기 위한 장치로, 특히 흙이나 눈처럼 무른 지형에서 효과적입니다."
