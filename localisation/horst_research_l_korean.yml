 half_interleaf_suspension:0 "반궤도 교차식 보기륜"
 half_interleaf_suspension_desc:0 "보기륜을 겹치게 배치하여 동일한 차체 길이에 더 많은 보기륜을 장착할 수 있습니다. 이를 통해 기동성을 향상시키고 측면에 추가적인 방호력을 제공합니다."
 half_boogie_suspension:0 "반궤도 보기 서스펜션"
 half_boogie_suspension_desc:0 "보기륜이 개별적으로 장착되어 손상 시 쉽게 교체할 수 있는 단순하고 저렴한 유형의 서스펜션입니다."
 interleaf_suspension:0 "궤도 교차식 보기륜"
 interleaf_suspension_desc:0 "보기륜을 겹치게 배치하여 동일한 차체 길이에 더 많은 보기륜을 장착할 수 있습니다. 이를 통해 기동성을 향상시키고 측면에 추가적인 방호력을 제공합니다."
 boogie_suspension:0 "궤도 보기 서스펜션"
 boogie_suspension_desc:0 "보기륜이 개별적으로 장착되어 손상 시 쉽게 교체할 수 있는 단순하고 저렴한 유형의 서스펜션입니다."
 christie_suspension:0 "궤도 크리스티 서스펜션"
 christie_suspension_desc:0 "미국의 발명가가 개발한 이 서스펜션은 월등히 높은 속도를 낼 수 있게 해줍니다."
 mech_half_christie_suspension:0  "반궤도 크리스티 서스펜션"
 mech_half_christie_suspension_desc:0 "미국의 발명가가 개발한 이 서스펜션은 월등히 높은 속도를 낼 수 있게 해줍니다."

