 FRA_armored_car_at_equipment_1_short:0 "특차 207"
 DELETE_DOCK:0 "조선소 제거"
 naval_bomber3:0 "1944년형 해군 폭격기"
 air_offensex_desc:0 "주간 폭격에 집중하면서 아군 폭격기를 요격하는 적 전투기로부터 안전하게 지켜야 합니다. 전투기 조종사들이 폭격기와 긴밀하게 협력하도록 훈련시키면 적 영공에서 폭격기를 보호할 때 전투 능력이 향상될 것입니다."
 fighter_baitingx:0 "전투기 유인"
 fighter_baitingx_desc:0 "취약한 것처럼 보임으로써, 아군 전투기는 적 항공기를 매복 지점으로 유인할 수 있습니다."
 dogfighting_experiencex:0 "근접 격투전 경험"
 dogfighting_experiencex_desc:0 "정신없이 돌아가는 근접 격투전 속에서 아군과 적군의 상대적 위치를 추적하는 것은 쉽지 않지만, 조종사들이 경험을 쌓을수록 이에 더 능숙해집니다."
 fighter_ace_initiativex:0 "전투기 에이스 장려책"
 fighter_ace_initiativex_desc:0 "적기 5기를 격추하여 에이스 지위를 달성한 조종사에게 특별한 상과 지위를 부여하는 것은 위험 감수를 장려하고 에이스 조종사에게 엘리트 의식을 심어줍니다. 다만, 이로 인해 숙련된 조종사들이 전투 직위에 계속 머무르는 경향이 있습니다."
 modifier_repair_speed_air_base_factor:0 "§Y공군 기지§! 수리 속도"
 multialtitude_flyingx:0 "다중 고도 비행"
 multialtitude_flyingx_desc:0 "공중전은 3차원에서 벌어지지만, 대부분의 조종사들은 자신들의 위나 아래에서 비행하는 항공기를 추적하는 것을 더 어려워합니다. 우리는 편대를 수직으로 분산시켜 이러한 이점을 활용할 수 있습니다."
 offensive_formationsx:0 "공격 대형"
 offensive_formationsx_desc:0 "보다 공격 지향적인 대형으로 훈련하면 아군 전투기가 전투에서 더욱 치명적이게 됩니다."
 fighter_sweepsx:0 "전투기 소탕"
 fighter_sweepsx_desc:0 "적 영공에 대한 공격적인 전투기 초계는 특히 취약한 시점인 이착륙 중인 적기를 포착하거나, 적의 훈련 비행을 방해할 수 있습니다."
 force_rotationx:0 "병력 교대"
 force_rotationx_desc:0 "전투, 또는 단순히 장시간의 고된 집중은 극심한 피로를 유발하지만, 가능할 때마다 새로운 병력으로 교체함으로써 조종사 피로로 인한 실수를 줄일 수 있습니다."
 air_defencex:0 "방공"
 air_defencex_desc:0 "명백한 위험이 없을 때조차도 조종사들이 끊임없이 경계하도록 훈련함으로써 적기를 요격할 확률이 증가합니다."
 dispersed_fightingx:0 "산개 전투"
 dispersed_fightingx_desc:0 "보다 산개된 대형을 채택하면 같은 수의 항공기로 더 넓은 지역을 초계할 수 있습니다."
 forward_interceptionx:0 "전방 요격"
 forward_interceptionx_desc:0 "적 영공 가까이에서 작전함으로써 아군 전투기가 목표에 도달하기 전의 적기를 요격할 가능성이 높아집니다."
 fighter_veteran_initiativex:0 "전투기 베테랑 계획"
 fighter_veteran_initiativex_desc:0 "조종사의 장기 생존을 위해 신중한 전술을 채택하고 숙련 조종사를 훈련직으로 순환시켜, 이들이 배운 교훈을 신참 조종사에게 전수하도록 합니다."
 formation_fightingx:0 "편대 전투"
 formation_fightingx_desc:0 "올바른 편대로 비행하면 아군 조종사들이 서로의 사각을 엄호할 수 있게 되어, 적기 발견 능력이 향상됩니다."
 air_skirmishx:0 "공중 교전"
 air_skirmishx_desc:0 "유감스럽게도 아군 영공에서 발견되는 모든 적기를 격추하는 것은 불가능하지만, 발견된 순간부터 이탈할 때까지 지속적으로 괴롭혀 소모시키는 것은 가능합니다."
 home_defencex:0 "본토 방어"
 home_defencex_desc:0 "지상 감시병과 탐지 및 청음 초소는 아군 공군과 협력하여 적의 침공을 추적하고 격멸합니다."
 battlefield_destructionx:0 "전장 파괴"
 battlefield_destructionx_desc:0 "공군은 멀리 떨어진 적국을 타격할 수도 있지만, 전투에서 육군을 직접 지원하는 데에도 매우 유용하게 쓰일 수 있습니다."
 dive_bombingx:0 "급강하 폭격"
 dive_bombingx_desc:0 "급강하 폭격은 더 높은 정확도를 보장하지만, 최상의 결과를 위해서는 강하 속도를 늦추고 급상승 시의 압력을 견딜 수 있는 특수 항공기가 필요합니다."
 direct_ground_supportx:0 "직접 지상 지원"
 direct_ground_supportx_desc:0 "근접항공지원(CAS) 조종사와 지상 관측병이 긴밀히 협조함으로써, 항공 화력을 정밀하게 유도하여 전투 중인 부대를 최대한 도울 수 있습니다."
 bomber_veteran_initiativex:0 "폭격기 베테랑 계획"
 bomber_veteran_initiativex_desc:0 "베테랑 조종사가 신참에게 지식을 전수하도록 하는 정책은 신참의 생존 가능성을 크게 높여줍니다."
 bomber_ace_initiativex:0 "폭격기 에이스 계획"
 bomber_ace_initiativex_desc:0 "에이스 폭격기 조종사를 공식적으로 인정하고 포상하는 것은 대담성과 주도성을 장려합니다."
 cas_veteran_initiativex:0 "지상 공격 베테랑 계획"
 cas_veteran_initiativex_desc:0 "베테랑 조종사가 신참에게 지식을 전수하도록 하는 정책은 신참의 생존 가능성을 크게 높여줍니다."
 cas_ace_initiativex:0 "지상 공격 에이스 계획"
 cas_ace_initiativex_desc:0 "에이스 근접항공지원(CAS) 조종사를 공식적으로 인정하고 포상하는 것은 대담성과 주도성을 장려합니다."
 hunt_and_destroyx:0 "수색 격멸"
 hunt_and_destroyx_desc:0 "직접적인 화력 지원 외에도, 근접항공지원(CAS) 부대는 독립적으로 목표물을 수색하며 전선으로 이동하는 적 지상군을 기습 공격할 수 있습니다."
 naval_strike_torpedo_tacticsx:0 "대함 공격 어뢰 전술"
 naval_strike_torpedo_tacticsx_desc:0 "조종사들이 어뢰로 더 정밀하게 타격하도록 훈련하면 적 함선에 대한 공습 효율이 향상될 것입니다."
 naval_strike_torpedo_tactics_oix:0 "대함 공격 어뢰 전술"
 naval_strike_torpedo_tactics_oix_desc:0 "조종사들이 어뢰로 더 정밀하게 타격하도록 훈련하면 적 함선에 대한 공습 효율이 향상될 것입니다."
 naval_strike_tacticsx:0 "해상 타격 전술"
 naval_strike_tacticsx_desc:0 "조종사들에게 함선 이동 예측 및 공격 협응 훈련을 시키면 적 함선에 대한 공습 효율성이 증대될 것입니다."
 low_echelon_supportx:0 "하급 제대 지원"
 low_echelon_supportx_desc:0 "근접항공지원 부대를 소규모 지상 편대에 직접 배속하면, 재래식 포병의 사거리 밖에서도 항상 추가 화력을 요청할 수 있게 됩니다."
 combat_unit_destructionx:0 "전투 부대 파괴"
 combat_unit_destructionx_desc:0 "근접항공지원 조종사들에게 동일한 목표물이 파괴 확인될 때까지 반복 공격하도록 훈련시키면, 지근탄 이후 목표물이 방치되는 일이 없어질 것입니다."
 operational_destructionx:0 "작전적 파괴"
 operational_destructionx_desc:0 "적 지상군의 보급선을 공격하면 전장 간 이동 능력이 저해됩니다. 이는 우리가 제공권을 장악한 지역에서 작전 시 아군에게 이점으로 작용합니다."
 infrastructure_destructionx:0 "기반 시설 파괴"
 infrastructure_destructionx_desc:0 "조종사들에게 철도 및 교량과 같은 기반 시설을 공격하는 최선의 방법을 훈련시키면 전술 폭격의 효율성이 증대됩니다."
 logistical_bombingx:0 "군수 폭격"
 logistical_bombingx_desc:0 "공중에서 적의 보급선을 공격하는 데 더 집중하면 해당 지역의 아군 지상군에게 더 큰 이점을 제공합니다."
 battlefield_supportx:0 "전장 지원"
 battlefield_supportx_desc:0 "수평 폭격은 급강하 폭격보다 정확도가 낮기 때문에, 전술 폭격기가 아군 지상군이 교전 중인 곳 근처의 목표물을 공격하기는 어렵습니다. 하지만 지상 관측 요원과의 훈련 및 상호 작용을 늘리면 이러한 문제를 극복하는 데 도움이 될 수 있습니다."
 carousel_bombingx:0 "회전식 폭격"
 carousel_bombingx_desc:0 "폭격기는 목표 지역에 도달하자마자 모든 폭탄을 투하하고 가능한 한 빨리 귀환하려는 경향이 있습니다. 이는 지역 폭격에는 효과적일 수 있지만, 작은 목표물을 타격할 때는 목표물 상공에 머무르며 정확도를 극대화하기 위해 한 번에 폭장량의 일부만 투하하는 것이 더 효과적입니다."
 keypoint_bombingx:0 "핵심 지점 폭격"
 keypoint_bombingx_desc:0 "아군 지상군을 지원하기 위해 전장의 목표 핵심 지점을 정확히 폭격하면 적을 격퇴하는 데 큰 도움이 될 수 있습니다."
 ground_support_integrationx:0 "지상 지원 통합"
 ground_support_integrationx_desc:0 "전술 폭격기 부대를 지상 관측 요원과 완전히 통합하면 정확도가 향상될 뿐만 아니라 교전 중인 아군 지상군을 직접 지원할 수 있게 됩니다."
 strategic_destructionx:0 "전략적 파괴"
 strategic_destructionx_desc:0 "아군 조종사들은 해군이나 육군보다 훨씬 빠르게 전략 목표에 접근할 수 있습니다. 적이 신병을 무장시킬 수단이 없다면, 우리는 곧 수적으로 우세해질 것입니다."
 high_level_bombingx:0 "고고도 폭격"
 high_level_bombingx_desc:0 "더 높은 고도에서는 일부 공중 교전과 대공 무기를 피할 수 있습니다. 고고도에서 폭탄을 투하하려면 더 높은 정밀도가 필요하지만, 더 안전합니다."
 massed_bomber_formationsx:0 "대규모 폭격기 편대"
 massed_bomber_formationsx_desc:0 "편대를 유지함으로써 아군 폭격기는 집단을 방어하고 성공적인 폭탄 투하 확률을 높일 수 있습니다."
 night_bombingx:0 "야간 폭격"
 night_bombingx_desc:0 "적의 방어력이 약화되고 아군 폭격기가 어둠에 가려진 상태에서 우리는 24시간 내내 공세적이고 효율적인 작전을 유지할 수 있습니다. 우리가 얼마나 끈질긴지 적에게 보여주십시오.\n\n"
 dead_reckoning_bombingx:0 "추측 항법 폭격"
 dead_reckoning_bombingx_desc:0 "이전 위치로부터의 속도, 방향, 편류를 측정하여 야간에도 더 정밀한 폭탄 투하를 계산할 수 있습니다."
 infiltration_bombingx:0 "침투 폭격"
 infiltration_bombingx_desc:0 "적 편대에 합류하거나 기지로 귀환하는 적을 미행하는 것은 광기처럼 보일 수 있습니다. 충분한 훈련을 거치면, 이는 전적으로 가능합니다."
 pathfinder_groupsx:0 "선도기 부대"
 pathfinder_groupsx_desc:0 "숙련된 조종사들은 목표 위치를 밝히기 위한 최상의 장비를 갖추고 있습니다. 연막이나 악천후도 폭격기들의 임무 수행을 막을 수 없습니다."
 day_bombingx:0 "주간 폭격"
 day_bombingx_desc:0 "주간에 집중된 작전은 시야 확보라는 큰 이점 덕분에 파괴적인 효과를 낳습니다. 군사력 투사는 환영할 만한 부수 효과입니다.\n\n"
 escort_relay_systemx:0 "호위 중계 체계"
 escort_relay_systemx_desc:0 "전투기의 호위를 받는 폭격기는 적의 공격에 대응하는 능력을 크게 향상시킵니다."
 flying_fortressx:0 "하늘의 요새"
 flying_fortressx_desc:0 "고고도 중폭격기에 자체 방어를 위한 기관총을 장착하고, 공격을 버텨내고 귀환할 수 있을 만큼 충분한 장갑을 갖춥니다."
 mass_destructionx:0 "대량 파괴"
 mass_destructionx_desc:0 "폭격기는 가장 파괴적인 무기를 대량으로 탑재합니다. 소수의 조종사만 목표에 도달하더라도 확실한 성과를 보장합니다."
 

 
