 jaegartroops:0 "레인저 I"
 jaegartroops_desc:0 "레인저는 아한대림의 야생에서 생존하는 데 특화된 부대입니다. 보통 이 부대들은 해당 지역 토착민으로 구성되며 훈련에 오랜 시간이 걸립니다."
 jaegartroops2_desc:0 "레인저는 아한대림의 야생에서 생존하는 데 특화된 부대입니다. 보통 이 부대들은 해당 지역 토착민으로 구성되며 훈련에 오랜 시간이 걸립니다."
