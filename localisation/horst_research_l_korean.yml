 tank_petrol_electric_engine_L:0 "소형 가솔린-전기 엔진"
 tank_petrol_electric_engine_L_desc:0 "가솔린 엔진으로 전기 모터에 동력을 공급하는 조합입니다. 복잡하고 비싸며 신뢰성이 낮지만, 전술 기동에서 타의 추종을 불허하는 성능을 제공합니다."
 tank_gas_turbine_engine_L:0 "소형 가스 터빈"
 tank_gas_turbine_engine_L_desc:0 "제트 엔진에서 발전한 터빈입니다. 연료 소모량이 높지만, 동일한 엔진 크기에서 가장 빠른 속도를 냅니다."
