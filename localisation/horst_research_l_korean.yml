 tank_module_belleville_washer_M:0 "중형 벨빌 와셔 현가장치"
 tank_module_belleville_washer_M_desc:0 "벨빌 와셔 현가장치는 작은 크기에도 매우 높은 에너지 저장 용량을 갖추고 있지만, 다른 현가장치 유형보다 더 비싸고 복잡합니다."
