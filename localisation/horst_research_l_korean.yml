 infantry_subtitle_camelry:0 "sss"
 jaeger_desc:0"레인저는 예거('사냥꾼')라고도 불리며, 아한대림의 야생에서 생존하는 데 특화된 부대입니다. 보통 이 부대들은 해당 지역 토착민으로 구성되며 훈련에 오랜 시간이 걸립니다."
 shocktroop:0"충격군"
 shocktroop_desc:0"충격군은 적 전선을 분쇄하여 돌파구를 마련할 수 있습니다. 이는 모든 형태의 종심 전투에 거의 필수적이며, 방어군을 혼란에 빠뜨리는 데 크게 기여할 수 있습니다."
 armored_car_at_recon:0 "대전차 장갑 수색차량"
 armored_car_at_equipment_1:0 "대전차 장갑차"
 armored_car_at_equipment_1_desc:0 "우리의 경기계화 부대는 언젠가 적 기갑 부대와 조우하게 될 것입니다. 특수 대전차 파생형을 개발하면 그들에게 싸울 기회를 줄 수 있을 것입니다."
 GER_armored_car_at_equipment_1:0 "Sdkfz 234/4 "파크바겐""
 GER_armored_car_at_equipment_1_short:0 "파크바겐"
