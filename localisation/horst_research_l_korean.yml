 mech_gasoline_engine:0 "가솔린 엔진"
 mech_gasoline_engine_desc:0 "가솔린으로 작동하는 엔진은 동일한 엔진 크기에서 더 빠르지만, 연료가 화재에 훨씬 더 취약합니다."
 mech_diesel_engine:0 "디젤 엔진"
 mech_diesel_engine_desc:0 "디젤 연료로 작동하는 엔진은 가솔린 엔진보다 신뢰성이 높지만, 동일한 엔진 크기에서 속도는 더 느립니다."
 car_module_riveted_armor:0 "리벳 장갑"
 car_module_riveted_armor_desc:0 "강철판을 리벳으로 결합하는 방식은 저렴하고 빠르며, 숙련된 노동력이 필요하지 않습니다. 하지만 각 리벳이 약점이 되는 부작용이 있습니다."
 mech_riveted_armor:0 "리벳 장갑"
 mech_riveted_armor_desc:0 "강철판을 리벳으로 결합하는 방식은 저렴하고 빠르며, 숙련된 노동력이 필요하지 않습니다. 하지만 각 리벳이 약점이 되는 부작용이 있습니다."
 mech_welded_armor:0 "용접 장갑"
 mech_welded_armor_desc:0 "원하는 두께로 압연된 강철판을 용접하여 내부의 금속 입자를 정렬합니다."
 mech_easy_maintenance:0 "손쉬운 정비"
 mech_easy_maintenance_desc:0 "차량 주위의 해치는 차량의 다양한 부품에 접근할 수 있게 해주며, 승무원이 복잡한 정비도 상당히 쉽게 수행할 수 있도록 합니다."
 mech_radio:0 "무전기"
 mech_radio_desc:0 "기본적인 양방향 무전기는 기계화 보병이 소규모 전술 기동을 조율할 수 있게 합니다."
 mech_smoke_launchers:0 "연막탄 발사기"
 mech_smoke_launchers_desc:0 "전차 내부에서 작동시켜 짙은 연막을 생성하여 전차를 은폐할 수 있는 화공 장치 포대입니다. 방어 중이거나 매복에 걸렸을 때 매우 유용합니다."
 mech_extra_ammo_storage:0 "추가 탄약 저장 공간"
 mech_extra_ammo_storage_desc:0 "추가적인 즉응 탄약 선반은 전차가 재보급 없이 훨씬 더 오래 전투를 지속할 수 있게 합니다. 하지만 장갑이 관통되면 그 결과는 재앙적일 수 있습니다. 이는 특히 공격 시에 문제가 됩니다."
 mech_wet_ammo_storage:0 "습식 탄약 저장고"
 mech_wet_ammo_storage_desc:0 "탄약 선반에 추가된 워터 재킷은 전차가 피격된 후 탄약이 폭발할 위험을 극적으로 줄여주어 승무원들에게 매우 환영받습니다."
 
 mech_chassis:0 "기계화 장비"
 mech_chassis_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 지닌 차량(트럭이나 지프)과는 대조적으로, 차량이 적의 공격으로부터 어느 정도 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."
 
 tank_designer_mech_chassis:0 "기계화"
 mech_chassis_0:0 "기본 기계화 차체"
 mech_chassis_0_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 지닌 차량(트럭이나 지프)과는 대조적으로, 차량이 적의 공격으로부터 어느 정도 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."
 mech_chassis_1:0 "개량형 기계화 차체"
 mech_chassis_1_desc:0 "기계화 보병은 수송 및 전투를 위해 장갑 병력 수송차(APC)나 보병 전투차(IFV)를 장비한 보병입니다. 기계화 보병은 차량화 보병의 연약한 장갑을 지닌 차량(트럭이나 지프)과는 대조적으로, 차량이 적의 공격으로부터 어느 정도 방호력을 제공한다는 점에서 차량화 보병과 구별됩니다."
 mech_chassis_2:0 "고급 기계화 차체"
