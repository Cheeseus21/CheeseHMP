 armored_car_chassis:0 "장갑차"
 armored_car_chassis_desc:0 "장갑 정찰 차량으로 처음부터 설계된 차체로, 대전쟁 시절의 조잡한 강철 관과는 거리가 멉니다."
 armored_car_chassis_1_desc:0 "개량된 설계로, 비교적 빠른 속도를 유지하면서도 더 많은 중량과 장갑을 장착할 수 있습니다."
 armored_car_chassis_2_desc:0 "차체가 낮은 차량으로, 진지에 신속하게 진입하고 이탈할 수 있을 만큼 빠르며, 핵심적인 정찰 임무를 수행하고 적 기갑부대를 격파할 충분한 화력을 갖추고 있습니다."

 
