 light_tank_equipment_4_short:0 "현대형 경전차 차체"
 light_tank_equipment_4_desc:0 "경전차는 작고 민첩한 전차로, 정찰과 경장갑 적을 상대로 한 전투를 모두 수행할 수 있습니다."
 GER_light_tank_chassis_4:0 "VK1602 레오파르트"
 GER_light_tank_chassis_4_short:0 "레오파르트"
 GER_light_tank_chassis_4_desc:0 "VK1602 레오파르트는 1942년에 설계된 독일의 정찰 차량 계획안입니다. 본래 75mm Kwk 41로 무장할 계획이었으나, 더 작은 50mm 포로 변경되었습니다. VK 1602는 판터 중형전차의 영향을 받은 경사 전면 장갑을 갖추고 있었습니다. 야지 주행 성능을 향상시키기 위해 VK 1602는 350mm 폭의 궤도를 장착했습니다."
 GER_light_tank_equipment_4:0 "VK1602 레오파르트"
