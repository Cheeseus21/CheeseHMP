 HMP_ll_soviets_send_desc: "Операция «Барбаросса» — крупнейшая военная операция в истории человечества. Военную машину Оси можно ослабить только советской кровью и союзническим ленд-лизом.\n\nМы будем отправлять §Cпоставки§! Советскому Союзу за каждый §GКоридор снабжения§! или §GСтратегический объект§!, которые мы контролируем во время операции «Барбаросса». Получение наших поставок по ленд-лизу зависит от контроля над ключевыми §GКоридорами снабжения§! в Советский Союз. Если каждый §GКоридор снабжения§! будет закрыт, то наши советские союзники wi"
