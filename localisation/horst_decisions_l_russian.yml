 # Radio Department
 prca_form_radio_department: "Самба Бразилии"
 prca_form_radio_department_desc: "Мы должны организовывать праздники, продвигать самб Schools и устраивать ежегодный карнавал за счёт государства. Если люди получат возможность праздновать за счёт правительства, больше людей будут довольны нынешним правительством, что может привести к снижению коррупции в краткосрочной перспективе!"
 prca_form_radio_department_discount_desc: "Мы должны организовывать праздники, продвигать самб Schools и устраивать ежегодный карнавал за счёт государства. Если люди получат возможность праздновать за счёт правительства, больше людей будут довольны нынешним правительством, что может привести к снижению коррупции в краткосрочной перспективе!"
 prca_form_radio_department_discount: "Самба Бразилии"
 prca_form_movie_department: "Пропаганда Христа-Искупителя"
 prca_form_movie_department_desc: "Привлекая больше туристов в нашу прекрасную страну, наше правительство получит больше денег. Больше денег даёт нам возможность бороться с клиентелизмом!"
