 ENG_prepare_for_sealion: "Подготовка к вторжению"
 ENG_prepare_for_sealion_desc: "Всего лишь 34 километра отделяют нашу великую островную нацию от тьмы, охватившей Европу. Мы должны подготовиться к вторжению сейчас, чтобы не стать ещё одним государством, оккупированным Германией."
 ENG_form_the_ldv: "Обучить добровольцев местной обороны"
 ENG_form_the_ldv_desc: "Обширная организация иррегулярных сил необходима для дополнения наблюдательных и военных возможностей нашей армии на родине."
 ENG_form_the_home_guard: "Преобразовать LDV в отряды «Хоум-гард»"
 ENG_form_the_home_guard_desc: "Добровольцы местной обороны оказались полезными, но плохо оснащены и обучены. Значительные военные инвестиции позволят нам превратить эту организацию в мощную военизированную группу."
 ENG_prepare_resistance: "Подготовить сопротивление"
 ENG_prepare_resistance_desc: "Ещё до того, как боши ступят на британскую землю, мы можем создать хорошо подготовленное и оснащённое движение сопротивления, чтобы замедлить и измотать немецкую военную машину."
 ENG_create_fortifications: "Построить линию GHQ"
 ENG_create_fortifications_desc: "Мощная линия остановки является ключом к нашей стратегии эшелонированной обороны на случай вторжения Германии. Линия Генерального штаба — это наша последняя линия обороны для защиты Лондона и промышленного сердца Британии."
