 SOV_annex_mongolia: "Аннексировать Монголию"
 
 SOV_second_fyp_cash_in_dual_purpose: "Запустить программу: Заводы двойного назначения"
 SOV_second_fyp_cash_in_dual_purpose_desc: "Наше первоначальное расширение тяжелой промышленности завершено. Теперь мы можем переоборудовать избыточные гражданские заводы, построенные сверх нашего базового уровня в 70 заводов, в военные заводы в соотношении 2:1.\n\n§YТекущий учет промышленности:§!\nВсего гражданских заводов: §Y[?num_of_civilian_factories|Y0]§!\nБазовое вычитание: §R-70§!\n\nОжидаемое количество военных заводов после завершения: §G[?SOV_tracked_mils_reward|G0]§!"
 
 SOV_cash_in_dual_purpose_tt: "Переоборудует избыточную гражданскую промышленность, мгновенно предоставляя ожидаемое количество военных заводов на наших ключевых территориях, и завершает программу."
 
 SOV_second_year_plan_decisions: "Второй пятилетний план"
 SOV_second_year_plan_decisions_desc: "Вторая пятилетка требует массового расширения нашей тяжелой промышленности, завершения коллективизации и быстрого развития железнодорожной инфраструктуры. Рабочие Советского Союза должны выполнить свои планы досрочно.\n\n§RВнимание:§! Эта категория и все ее решения будут окончательно отменены §Y1 января 1938 года§!."
 
 SOV_second_fyp_expansion_of_light_industry: "Расширение легкой промышленности"
 SOV_second_fyp_expansion_of_light_industry_desc: "В то время как тяжелая промышленность составляет основу социалистического государства, мы должны быстро расширить наше легкое производство, чтобы выполнить планы Второй пятилетки и обеспечить пролетариат товарами первой необходимости."

 SOV_second_fyp_designating_industrial_zones: "Выделение промышленных зон"
 SOV_second_fyp_designating_industrial_zones_desc: "Чтобы максимизировать эффективность нашей быстрой урбанизации, Госплан должен выделить обширные участки нетронутой земли специально для огромных новых заводских комплексов."

 SOV_second_fyp_sciences_and_engineering: "Фокус на науку и инженерию"
 SOV_second_fyp_sciences_and_engineering_desc: "Революция не может выжить только за счет мускульной силы наших рабочих. Инвестируя значительные средства в наши академические институты и конструкторские бюро, мы обеспечим себе постоянное технологическое превосходство."

 SOV_second_fyp_quality_efficiency_and_technical_mastery: "Качество, эффективность и техническое мастерство"
 SOV_second_fyp_quality_efficiency_and_technical_mastery_desc: "Стахановские принципы должны применяться не только на угольных шахтах, но и в наших исследовательских лабораториях. Мы заставим наших ведущих ученых побить все предыдущие рекорды технического развития."

 SOV_second_fyp_construction_of_dual_purpose_factories: "Строительство заводов двойного назначения"
 SOV_second_fyp_construction_of_dual_purpose_factories_desc: "Проектируя наши новые тракторные и автомобильные заводы со специализированной оснасткой двойного назначения, мы сможем легко конвертировать нашу гражданскую промышленность на производство танков и боеприпасов, когда начнется неизбежная капиталистическая война."

 SOV_second_fyp_increased_defense_budget: "Увеличение оборонного бюджета"
 SOV_second_fyp_increased_defense_budget_desc: "Растущая угроза фашизма в Европе требует упреждающего ответа. Мы должны направить большую долю государственного бюджета непосредственно на быстрое расширение нашего военно-промышленного комплекса."

 SOV_war_preparations_category: "Подготовка к войне"
 SOV_war_preparations_category_desc: "Фашистская угроза на Западе растет. Мы должны использовать каждую доступную минуту до неизбежного конфликта, чтобы укрепить нашу инфраструктуру, укрепить наши поселения и вырыть траншеи, которые обескровят врага."

 SOV_fortification_decision: "Укрепить поселения"
 SOV_fortification_decision_desc: "Превращая наши города и деревни в укрепленные опорные пункты с баррикадами и огневыми позициями, Красная Армия сможет упорно бороться за каждый метр городской земли.\n\n§YЭффекты в этом регионе:§!\nНакладывает модификатор на все §YОчки Победы§!, дающий:\n* §G+10%§! к Обороне дивизии"

 soviet_fortification: "Городские укрепления"
 soviet_fortification_desc: "Это поселение подготовлено к жестоким уличным боям."

 SOV_defensive_decision: "Построить оборонительные рубежи"
 SOV_defensive_decision_desc: "Массивные земляные укрепления, бетонные бункеры и противотанковые рвы должны быть подготовлены по всей сельской местности, чтобы остановить наступление фашистской моторизованной армии.\n\n§YЭффекты в этом регионе:§!\nНакладывает модификатор региона, дающий:\n* §G+100%§! к Скорости строительства укреплений\n* §G+10§! к Максимальному уровню укреплений"

 SOV_defensive_modifier: "Подготовка оборонительных рубежей"
 SOV_defensive_modifier_desc: "Местные рабочие и инженеры были полностью мобилизованы для быстрого строительства тяжелых оборонительных сооружений в этом регионе."
 
 SOV_guerilla_tactics: "Санкционировать партизанскую войну"
 SOV_guerilla_tactics_desc: "Фашисты довели нас до предела. Обычной войны больше недостаточно. Мы должны приказать нашим отрезанным дивизиям раствориться в лесах, руинах и болотах, чтобы вести беспощадную партизанскую войну в тылу врага. Враг не найдет на советской земле ни покоя, ни снабжения, ни пощады."

 SOV_order_227_decision: "Издать Приказ № 227"
 SOV_order_227_decision_desc: "Товарищи, время для отступления прошло! Родина в серьезной опасности, и мы не можем сдать больше ни пяди территории. С этого момента абсолютная директива: §YНи шагу назад!§! Любой солдат или командир, покинувший свой пост без прямого приказа вышестоящего штаба, будет наказан как предатель государства."

 SOV_order_270_decision: "Издать Приказ № 270"
 SOV_order_270_decision_desc: "Стремительное наступление врага оставило многие наши подразделения в окружении, но капитуляция — это непростительный акт трусости. Мы должны объявить, что любой командир или комиссар, сорвавший знаки различия и сдавшийся врагу, является злостным дезертиром. Советских военнопленных нет, есть только предатели. Наши люди должны сражаться до последней капли крови."

 SOV_capital_change_category: "Перенос столицы"
 SOV_move_capital_decision: "Перенести столицу в [FROM.GetName]"
 SOV_move_capital_decision_desc: "Изменение хода войны требует обеспечения безопасности административного и бюрократического аппарата Советского Союза. Мы должны перенести центральное правительство в безопасный город [FROM.GetName], чтобы обеспечить бесперебойное руководство государством."
 
 GER_operations: "Директивы ОКВ"
 #GER_operations_desc: "Основные оперативные директивы, издаваемые Верховным главнокомандованием вермахта."
 
 GER_totaler_krieg_new_tt: "Открывает §Cмеханику «Endsieg»§!, которая позволяет §Yпереломить ход игры§! ценой §Rистощения вашей национальной мощи в долгосрочной перспективе.§!"
 
 totaler_krieg_decision_active: "§YПервая фаза§! мобилизации активирована."
 totaler_krieg_decision_active_2: "§YВторая фаза§! мобилизации активирована."
 totaler_krieg_decision_active_3: "§YТретья фаза§! мобилизации активирована."
 totaler_krieg_decision_active_4: "§YЧетвертая фаза§! мобилизации активирована."
 totaler_krieg_decision_active_5: "§YПятая фаза§! мобилизации активирована."
 
 tk_phase_2_or_higher_tt: "Активирована как минимум §Yвторая фаза§! мобилизации."
 tk_phase_3_or_higher_tt: "Активирована как минимум §Yтретья фаза§! мобилизации."
 tk_phase_4_or_higher_tt: "Активирована как минимум §Yчетвертая фаза§! мобилизации."
 
 ger_offensive_cooldown_tt: "Между крупными наступлениями на этом театре должно пройти не менее §Y30 дней§!. \n(Прошло дней с последнего наступления: §Y[?ger_desperate_offensive_last_used:days|0]§!)"
 ger_western_offensive_cooldown_tt: "Между крупными наступлениями на этом театре должно пройти не менее §Y90 дней§!. \n(Прошло дней с последнего наступления: §Y[?ger_western_offensive_last_used:days|0]§!)"
 ger_steiner_cooldown_tt: "В настоящее время ни на одном фронте не проводится других наступлений."
 
 GER_totaler_krieg_decisions: "Endsieg"
 GER_totaler_krieg_decisions_desc: "Война обернулась против нас. Мы должны мобилизовать каждую последнюю каплю силы, которую может предложить нация, независимо от цены для нашего народа или нашего будущего.\n\n§YТекущая фаза мобилизации:§! §R[?GER_tk_level|0]§!\n\n§YТекущее внутреннее влияние:§!\nЕженедельная поддержка войны: §R[?GER_we_war_support_weekly|%2]§!\nШтраф к поддержке войны: §R[?GER_we_war_support_factor|%0]§!\nВыпуск продукции заводов: §G+[?GER_we_industrial_capacity_factory|%0]§!"
 ger_endsieg_cooldown_tt: "С момента нашей первой мобилизации должно пройти не менее §Y3 лет (910 дней)§!. \n(Прошло дней с первой мобилизации: §Y[?ger_endsieg_cooldown_flag:days|0]§!)"
 
 GER_wir_sind_zuruch: "Мы вернулись!"
 ger_controls_all_cores_tt: "Германия контролирует все свои §Yисходные ключевые штаты§!, кроме штатов вокруг §YКёнигсберга.§!"
 
 GER_unternehmen_luttich: "§YОперация «Люттих»§!"
 GER_unternehmen_luttich_desc: "Прорыв союзников из Нормандии грозит разрушить весь наш западный фронт. Сконцентрировав остатки наших панцерных сил для решающего броска на Авранш, мы сможем отрезать американские передовые части от их линий снабжения и остановить их продвижение."

 GER_wacht_am_rhein: "§YОперация «Вахта на Рейне»§!"
 GER_wacht_am_rhein_desc: "Западные союзники считают, что мы разбиты. Мы докажем обратное. Ударив через Арденны под прикрытием зимней погоды, мы форсируем Маас, захватим Антверпен и одним решающим ударом расколем их коалицию."

 GER_unternehmen_nordwind: "§YОперация «Нордвинд»§!"
 GER_unternehmen_nordwind_desc: "Поскольку резервы противника были переброшены на север для сдерживания нашего наступления в Арденнах, их линии в Эльзасе и Лотарингии опасно растянулись. Быстрый концентрированный удар здесь может разгромить 7-ю американскую армию и отбить Страсбург."

 GER_unternehmen_wintergewitter: "§RОперация «Винтергевиттер»§!"
 GER_unternehmen_wintergewitter_desc: "6-я армия полностью окружена в Сталинграде. Мы должны немедленно начать механизированную операцию по деблокированию, чтобы прорвать советское кольцо окружения и открыть путь снабжения для наших окруженных солдат, прежде чем они будут заморены голодом."

 GER_unternehmen_doppelkopf: "§RОперация «Доппелькопф»§!"
 GER_unternehmen_doppelkopf_desc: "Крах группы армий «Центр» оставил группу армий «Север» полностью изолированной в Прибалтике. Мы должны собрать импровизированный бронированный кулак, чтобы пробить коридор через советские линии и восстановить сухопутное сообщение."

 GER_unternehmen_fruhlingserwachen: "§RОперация «Фрюлингсервахен»§!"
 GER_unternehmen_fruhlingserwachen_desc: "Нефтяные месторождения Надьканижи — абсолютный источник жизни для оставшихся механизированных сил Рейха. Мы должны перебросить наши последние элитные панцерные резервы в Венгрию для удержания района озера Балатон, независимо от ухудшающейся ситуации в других местах."

 GER_steiners_counter_offensive: "§CКонтрнаступление Штайнера§!"
 GER_steiners_counter_offensive_desc: "Ситуация вокруг Берлина ужасна, но не все потеряно. Армейская группа «Штайнер» начнет массированную контратаку на северный фланг советских войск, чтобы деблокировать столицу. С наступлением Штайнера всё будет под контролем."
 
 GER_battle_of_garfagnana: "§GБитва при Гарфаньяне§!"
 GER_battle_of_garfagnana_desc: "Неослабевающее давление союзников на Готическую линию грозит сломить нашу оборону в Северной Италии. Предприняв внезапное локализованное зимнее контрнаступление совместно с нашими оставшимися союзниками из ИСР, мы сможем застать врасплох перегруппировавшиеся американские силы и выиграть критическое время для стабилизации южного фронта."

 GER_secure_greece: "§GОбеспечить безопасность Греции§!"
 GER_secure_greece_desc: "Некомпетентность наших итальянских союзников оставила наше южное подбрюшье опасно открытым. Мы не можем позволить британцам закрепиться на Балканах, что поставит под угрозу жизненно важные румынские нефтяные месторождения. Вермахт должен немедленно вмешаться, пройти через Грецию и обеспечить безопасность средиземноморского фланга самостоятельно."
 
 GER_unternehmen_luttich_tt: "§YФранцузские, бельгийские, голландские и западногерманские штаты получат на 90 дней:§! \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+10.0%§! \n$MODIFIER_BREAKTHROUGH$: §G+10.0%§! \n\n§C(Влияет только на Германию)§!"
 GER_wacht_am_rhein_tt: "§YФранцузские, бельгийские, голландские и западногерманские штаты получат на 90 дней:§! \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+15.0%§! \n$MODIFIER_BREAKTHROUGH$: §G+15.0%§! \n\n§C(Влияет только на Германию)§!"
 GER_unternehmen_nordwind_tt: "§YФранцузские, бельгийские, голландские и западногерманские штаты получат на 90 дней:§! \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+20.0%§! \n$MODIFIER_BREAKTHROUGH$: §G+20.0%§! \n\n§C(Влияет только на Германию)§!"
 GER_battle_of_garfagnana_tt: "§YИтальянские штаты получат на 90 дней:§! \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+10.0%§! \n$MODIFIER_BREAKTHROUGH$: §G+10.0%§! \n\n§C(Влияет только на Германию)§!"
 GER_secure_greece_tt: "§YГреческие штаты получат на 90 дней:§! \n$MODIFIERS_ARMY_ATTACK_FACTOR$: §G+10.0%§! \n$MODIFIER_BREAKTHROUGH$: §G+10.0%§! \n\n§C(Влияет только на Германию)§!"
 
 GER_phase_one_mobilization: "Мобилизация, Фаза I"
 GER_phase_one_mobilization_desc: "Время полумер прошло. Мы должны инициировать первую фазу тотальной мобилизации, переориентируя нашу гражданскую экономику на абсолютное военное производство и нормирование неосновных товаров."

 GER_phase_two_mobilization: "Мобилизация, Фаза II"
 GER_phase_two_mobilization_desc: "По мере роста списков потерь мы должны задействовать наши резервы. Неосновные гражданские отрасли промышленности будут полностью закрыты, чтобы высвободить рабочую силу для фронта и ресурсы для оружейных заводов."

 GER_phase_three_mobilization: "Мобилизация, Фаза III"
 GER_phase_three_mobilization_desc: "Фронт требует больше крови и стали. Мы начнем призывать женщин и пожилых людей на вспомогательные роли, в зенитные расчеты и на заводские линии, чтобы заменить мужчин, отправленных на фронт."

 GER_phase_four_mobilization: "Мобилизация, Фаза IV"
 GER_phase_four_mobilization_desc: "Тотальная война в ее самой чистой и беспощадной форме. Все граждане, не несущие оружие, должны вносить вклад в военные усилия без отдыха. Трудовое законодательство приостанавливается, и вся нация превращается в единое оружие."

 GER_phase_five_mobilization: "Мобилизация, Фаза V"
 GER_phase_five_mobilization_desc: "Последний призыв. Мы выскребаем абсолютное дно бочки. Мы вооружим гитлерюгенд, фольксштурм и любого, способного держать винтовку. Нация жертвует всем ради выживания."
 
 GER_fuhrer_directives_tt: "Выполнение §YФюрер-директив§! позволит нам снизить нагрузку на нашу родину и увеличить нашу §Yподдержку войны!§!"
 barbarossa_mission_horst_sov_tt: "Если мы потеряем §YМоскву§!, §YЛенинград§! и §YСталинград§!, то §RГермания§! получит увеличение §YПоддержки войны§! на 10% в рамках своей §Y«Идеи об истощении войны»!§!"
 
 GER_high_seas_fleet_decision: "Программа «Флот открытого моря»"
 GER_panzerschiff_raiders_decision: "Броненосные рейдеры"
 GER_u_boat_efforts_decision: "Тактика волчьей стаи"
 
 GER_integration_of_the_foreign_economies: "Интеграция иностранных экономик"
 GER_integration_of_the_foreign_economies_category: "Военная экономика Геринга"
