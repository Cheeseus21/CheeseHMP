 # PREPARATION
 # Add PT Decisions
 prca_increase_poster_production2: "Увеличить производство постеров"
 prca_increase_poster_production2_desc: "Постеры — самый простой способ сообщить наши цели и идеалы массам. Чтобы гарантировать, что мы сможем продолжать эффективно использовать этот инструмент, мы должны увеличить производство новых постеров."
 prca_publish_a_special_issue2: "Выпустить специальный выпуск"
 prca_publish_a_special_issue2_desc: "Последние новости заставили некоторых наших людей чувствовать себя неуверенно и критично. Хотя мы не можем скрыть текущие события от общества, мы можем отвлечь их внимание с помощью специального выпуска газеты."
 prca_run_a_speech_of_leader2: "Речь Radio Oranje от [Root.GetLeader]"
 prca_run_a_speech_of_leader2_desc: "[Root.GetLeader] — это голос, который объединяет нашу нацию даже в трудные времена. Его последняя речь уже вдохновила многих людей, и очень важно, чтобы её услышал каждый."
 prca_produce_a_war_movie2: "Снять военный фильм"
 prca_produce_a_war_movie2_desc: "Будь то драма, боевик или анимационный фильм, героические подвиги наших солдат должны быть представлены надлежащим образом. Таким образом мы можем продолжать вдохновлять армию и тыл на борьбу за наше дело."
 # Newspaper Department
 prca_form_newspaper_department2: "Создать газетный департамент"
 prca_form_newspaper_department2_desc: "Газеты, которые можно быстро и в большом количестве производить, предлагают идеальное средство для манипулирования общественным мнением в нашу пользу. С войной на горизонте очень важно, чтобы мы имели полный контроль над этим мощным оружием."
 prca_form_newspaper_department_tt: "Открывает §YГазетный департамент§!, который даёт (Еженедельные пропагандистские токены: §G+1.00§!).\n"
 # Radio Department
 prca_form_radio_department2: "Создать радиодепартамент"
 prca_form_radio_department2_desc: "Изобретение радио открыло бесчисленные новые возможности для распространения пропаганды. Контролируя передаваемые программы, мы можем ensure, что могучий голос нашей страны слышен не только среди нашего народа, но и по всему миру."
 prca_form_radio_department_tt: "Открывает §YРадиодепартамент§!, который даёт (Еженедельные пропагандистские токены: §G+2.00§!).\n"
 # Movie Department
 prca_form_movie_department2: "Создать кинодепартамент"
 prca_form_movie_department_desc2: "Нет другогоEDIUM, подобного кино, которое может повлиять на мнение целых масс за считанные минуты. Наши враги уже быстро производят военные фильмы, и крайне важно, чтобы и мы использовали это оружие для контроля общественного мнения."
 prca_form_movie_department_tt: "Открывает §YКинодепартамент§!, который даёт (Еженедельные пропагандистские токены: §G+3.00§!).\n"

