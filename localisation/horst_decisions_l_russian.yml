 arctic_corridor_history: "§G+3 Пропускная способность маршрута ленд-лиза§!\n\nАрктические конвои были маршрутом ленд-лиза, который шел через Норвежское и Баренцево моря до советского порта Мурманск. Этот маршрут был полон тумана, суровой погоды (особенно зимой), постоянной ночи и дрейфующего льда, что делало его одним из самых опасных используемых маршрутов."
 med_corridor_history: "§G+5 Пропускная способность маршрута ленд-лиза§!\n\nСредиземноморский маршрут был маршрутом ленд-лиза, доставляющим британские и американские ленд-лизовые материалы через Босфорский пролив в советские черноморские порты."
 pacific_corridor_history: "§G+5 Пропускная способность маршрута ленд-лиза§!\n\nТихоокеанский маршрут был маршрутом ленд-лиза, который шел вдоль побережья США-СССР через Берингов пролив, по которому перевозились американские ленд-лизовые материалы. Тихоокеанский маршрут считался опасным из-за угрозы японских подводных лодок, но мало кораблей было потоплено Японией из страха вызвать гнев Советов."
 persian_corridor_history: "§G+25 Пропускная способность маршрута ленд-лиза§!\n\nПерсидский коридор был маршрутом ленд-лиза через Иран в советский Азербайджан, по которому британская помощь и американские ленд-лизовые материалы перевозились в Советский Союз. Этот Персидский коридор стал единственным жизнеспособным, круглогодичным маршрутом, разработанным для удовлетворения советских потребностей."
 HMP_soviet_lend_lease_system_desc: "Мы можем отправить £convoy_texticon §Cотправлений§! стоимостью £production_cost §G2000 единиц продукции§! в Советский Союз за каждый §G маршрут ленд-лиза§! или §Gстратегическую цель§! (см. Баланс сил), который мы контролируем во время Операции Барбаросса. Каждый §Gмаршрут ленд-лиза§! также дает §Gпропускную способность маршрута ленд-лиза§!, которая повышает лимит для £convoy_texticon §Cотправлений§!, которые мы можем подготовить в любой данный месяц. Получение наших ленд-лизовых отправок зависит от контроля как минимум одного §Gмаршрута ленд-лиза§! в Советский Союз. Каждое нажатие ниже будет использовать пять наших £convoy_texticon §Cотправлений§!, а также пять §Hконвоев§!. Мы сможем отправлять §Cотправления§! начиная с июня 1941 года."
