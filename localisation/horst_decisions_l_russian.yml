 SS_panzers: "Сформирована танковая дивизия СС"
 SS_mechanized: "Сформирована моторизованная дивизия СС"
 SS_mountain: "Сформирована горная дивизия СС"
 SS_recruitment_pfu: "Набрать дивизии ваффен-СС"
 SS_recruitment_pfu_desc: "Гиммлер просит расширить наши ваффен-СС до полноценных боевых дивизий для совместных действий с вермахтом. Это принесет большую пользу нашему военному усилию, позволив многим добровольцам из оккупированных и нейтральных стран присоединиться к нашей войне против коммунизма."
 SS_recruitment_leibstandarte: "1-я танковая дивизия СС «Лейбштандарт Адольф Гитлер»"
 SS_recruitment_leibstandarte_desc: "1-я танковая дивизия СС «Лейбштандарт Адольф Гитлер» была элитным подразделением ваффен-СС, сражавшимся на Восточном и Западном фронтах во Второй мировой войне. LSSAH считалась одной из самых эффективных и хорошо оснащенных немецких частей войны."
 SS_recruitment_dasreich: "2-я танковая дивизия СС «Дас Райх»"
 SS_recruitment_dasreich_desc: "Дивизия СС «Дас Райх» была элитным подразделением ваффен-СС, сражавшимся на Восточном и Западном фронтах во Второй мировой войне. «Дас Райх» также была известна своей храбростью в бою, особенно во время Курской битвы и позднее в Арденнском наступлении."
 SS_recruitment_totenkopf: "3-я танковая дивизия СС «Мертвая голова»"
 SS_recruitment_totenkopf_desc: "Дивизия СС «Мертвая голова» была элитным подразделением ваффен-СС, сражавшимся на Восточном и Западном фронтах во Второй мировой войне. Сформированная из тюремных охранников и отборных частей СС, «Мертвая голова» была известна как дивизия с черепом и костями, символизирующими смерть."
 SS_recruitment_polizei: "4-я моторизованная дивизия СС «Полиция»"
 SS_recruitment_polizei_desc: "Дивизия СС «Полиция» изначально была полицейской бригадой в СС, но позднее реорганизована в полноценную моторизованную дивизию. Подразделение участвовало во вторжении во Францию, Грецию и позднее в Советский Союз."
 SS_recruitment_wiking: "5-я танковая дивизия СС «Викинг»"
 SS_recruitment_wiking_desc: "Дивизия СС «Викинг» была элитным иностранным подразделением ваффен-СС, сражавшимся на Восточном фронте во Второй мировой войне. Дивизия состояла из идеологических добровольцев из Дании, Норвегии, Швеции, Финляндии, Эстонии, Нидерландов и Бельгии под командованием опытных немецких офицеров."
 SS_recruitment_nord: "6-я горная дивизия СС «Норд»"
 SS_recruitment_nord_desc: "Дивизия СС «Норд» была элитной горной дивизией, сражавшейся на Восточном фронте в Арктике. Температура в этом климате постоянно была ниже нуля, и солдаты часто получали обморожения в ходе боев."
 SS_recruitment_prinz: "7-я горная дивизия СС «Принц Евгений»"
 SS_recruitment_prinz_desc: "Дивизия СС «Принц Евгений» была горной дивизией, состоящей в основном из этнических немцев из Балкан и Южной Европы. Дивизия в основном сражалась против коммунистических югославских партизан в роли антитеррористического подразделения, однако позднее в войне вступила в бой с наступающей Красной армией."
 SS_recruitment_hohenstaufen: "9-я танковая дивизия СС «Гогенштауфен»"
 SS_recruitment_hohenstaufen_desc: "SS-«Гогенштауфен» — бронетанковая дивизия ваффен-СС, сражавшаяся на Восточном и Западном фронтах Второй мировой войны. Состояла из молодых немецких призывников с опытным младшим командным составом из дивизии «Лейбштандарт», была очень боеспособной единицей."
 SS_recruitment_frundsberg: "10-я танковая дивизия СС «Фрундсберг»"
 SS_recruitment_frundsberg_desc: "SS-«Фрундсберг» — бронетанковая дивизия ваффен-СС, сражавшаяся на Восточном и Западном фронтах Второй мировой войны. Состояла как из молодых немецких, так и венгерских призывников с опытным младшим командным составом из дивизии «Лейбштандарт», была очень боеспособной единицей."
 SS_recruitment_nordland: "11-я мотопехотная дивизия СС «Нордланд»"
 SS_recruitment_nordland_desc: "Дивизия СС «Нордланд» — ещё одно подразделение ваффен-СС, полностью укомплектованное иностранцами, сражавшееся на Восточном фронте Второй мировой войны. Состояла из добровольцев со всей Скандинавии, храбро сражалась во время блокады Ленинграда и позже в битве на Танненбергской линии."
 SS_recruitment_hitlerjugend: "12-я танковая дивизия СС «Гитлерюгенд»"
 SS_recruitment_hitlerjugend_desc: "SS-«Гитлерюгенд» — бронетанковая дивизия ваффен-СС, сражавшаяся на Западном фронте Второй мировой войны. Полностью состояла из гитлерюгендовцев и элитного младшего командного состава из других дивизий ваффен-СС, была очень боеспособной единицей, ведя арьергардные действия в Нормандии и особенно во время Арденнского наступления."
 SS_recruitment_latvian_ss: "15-я, 19-я, 20-я прибалтийские мотопехотные дивизии СС"
 SS_recruitment_latvian_ss_desc: "Состоящие из латвийских и эстонских добровольцев, эти дивизии сформировали крупные мотопехотные дивизии, которые сражались против Советского Союза с 1943 по 1945 год. Наиболее известны своей боевой эффективностью в битве на Танненбергской линии, где подразделения этих дивизий удерживали армию Советского Союза в 8 раз превосходящую их по численности, нанеся им потери более 10:1 при минимальной поддержке бронетехники."
 SS_recruitment_reichsfuhrer_ss: "16-я, 17-я, 18-я немецкие мотопехотные дивизии СС"
 SS_recruitment_reichsfuhrer_ss_desc: "Состоящие в основном из этнических немецких добровольцев из Венгрии и других оккупированных территорий, эти дивизии сформировали мотопехотные дивизии, которые сражались против Советского Союза в Украине и Центральной Европе, а также во Франции против союзных вторжений."
 SS_recruitment_handschar: "13-я, 21-я, 23-я балканские горнострелковые дивизии СС"
 SS_recruitment_handschar_desc: "Состоящие из албанцев, боснийцев и хорватов, эти дивизии были в основном антипартизанскими горнострелковыми дивизиями СС, которые сражались на Балканах против партизан, а позже против наступающей армии Советского Союза."
 SS_recruitment_charlemagne: "33-я мотопехотная дивизия СС «Шарлемань»"
 SS_recruitment_charlemagne_desc: "Дивизия «Шарлемань» была сформирована из оставшихся французских добровольцев в вермахте и сражалась против советских войск, наступающих на Германию. Известна как одна из последних дивизий в Берлине, оказавшая упорное сопротивление в Рейхстаге, и многие отказались сдаваться, опасаясь репрессий от своих правительств."
 
 
 
 ger_wehrmacht_pfu: "Сухопутные войска"
 ger_wehrmacht_pfu_desc: "Костяк немецких вооружённых сил. Если Отечество должно выстоять в грядущей буре, ОКХ должен быть готов следовать директивам Фюрера, какими бы радикальными они ни были, дабы мы не забыли свою присягу."
 ger_luftwaffe_pfu: "Военно-воздушные силы"
 ger_luftwaffe_pfu_desc: "Геринг поручил люфтваффе нанести сокрушительный удар по Британии с помощью обширной бомбардировочной кампании, которая должна убедить британцев рассмотреть мир, но, если мы не добьёмся этого быстро, ОКВ может перераспределить наши ресурсы на другие нужды."
 ger_kriegsmarine_pfu: "Военно-морской флот"
 ger_kriegsmarine_pfu_desc: "Из-за состояния кригсмарине оберкомандующий ВМФ приказал применить доктрину коммерческих рейдов, пытаясь отрезать союзников от жизненно важных ресурсов из-за рубежа и снабжения на фронте."
 
 ger_wehrmacht_grossdeutschland: "Танковая дивизия «Гроссдойчланд»"
 ger_wehrmacht_grossdeutschland_desc: "Дивизия «Гроссдойчланд» была элитным боевым подразделением немецкой армии, сражавшимся на Восточном фронте Второй мировой войны. Первоначально сформированная из церемониального подразделения в 1930-х годах, её действия на Восточном фронте в битве за Москву, Ржев и позже под Курском принесли ей репутацию."
 ger_schwere_panzer: "Тяжёлая танковая дивизия 502"
 ger_schwere_panzer_desc: "Тяжёлая танковая дивизия 502 — формирование тяжёлых танков, созданное после начала операции «Барбаросса» и появления превосходящих советских танков Т-34 и КВ-1. Сражаясь на Восточном фронте, она стала одной из самых успешных немецких тяжёлых танковых дивизий, уничтожив, по их claims, 1 400 танков и 2 000 штурмовых орудий."
 ger_volksturm: "Сформировать народное ополчение"
 ger_volksturm_desc: "Народное ополчение — национальное ополчение, созданное нацистской партией в последние месяцы Второй мировой войны. Оно было сформировано из мужчин и детей, признанных непригодными для службы или не служащих в регулярных вооружённых силах."
 
 ger_battle_of_britain: "Битва за Британию"
 ger_battle_of_britain_desc: ""
 ger_luftwaffe_goring_division: "Танковая дивизия «Герман Геринг»"
 ger_luftwaffe_goring_division_desc: "«Герман Геринг» — элитная бронированная дивизия немецких люфтваффе. Дивизия «ГГ» участвовала в боях в Северной Африке, на Сицилии, в Италии и позже на Восточном фронте."
 ger_luftwaffe_infantry: "Люфтваффен-фельд-дивизии"
 ger_luftwaffe_infantry_desc: "Люфтваффен-фельд-дивизии были сформированы из 200 000–250 000 наземных, вспомогательных и других избыточных кадров люфтваффе. Это решение было первоначально санкционировано в октябре 1942 года после предложений о усилении немецкой армии за счёт передачи personnel из других видов войск."
 
 ger_battle_of_atlantic: "Битва за Атлантику"
 ger_battle_of_atlantic_desc: ""
 ger_submarine_bases: "Построить подводные базы"
 ger_submarine_bases_desc: "Построив подводные базы и защищённые укрытия во Франции, мы сможем operating our submarine forces in the Atlantic без необходимости пересекать опасный Ла-Манш для ремонта и обслуживания в Германии."
 ger_kriegsmarine_infantry: "Морские пехотные дивизии"
 ger_kriegsmarine_infantry_desc: "Морские пехотные дивизии были активированы из personnel ВМФ, которые больше не требовались для экипажей кораблей или прибрежных учреждений. После советского и союзного вторжения в Германию дивизии были развёрнуты в оборонительных операциях в северо-западной Германии."
 
