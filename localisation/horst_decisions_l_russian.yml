 propaganda_campaings_default_desc: "С войной на горизонте мы не можем позволить, чтобы наши люди поддавались враждебным идеям и в конечном итоге выступили против нашего правительства. Только через активные пропагандистские кампании мы можем пережить следующее десятилетие!"
