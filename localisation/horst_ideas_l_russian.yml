 BRA_estadonovotooltip: "В зависимости от того, сколько реформ коррупции мы приняли, мы получим §Cсоциально-экономический§! бонус для нашей страны.\nЕсли мы приняли реформу коррупции §G(Низкая)§!, мы получим:\n  §GСкорость строительства:§! §C+5.0%§!\n  §GМаксимум эффективности производства:§! §C+5.0%§!\n  §GПрирост эффективности производства:§! §C+5.0%§!\n  §GСтабильность:§! §C+5.0%§!\nЕсли мы приняли реформу коррупции §Y(Средняя)§!, мы получим:\n  §YСкорость строительства:§! §C+10.0%§!\n  §YМаксимум эффективности производства:§! §C+10.0%§!\n  §YПрирост эффективности производства:§! §C+10.0%§!\n  §YСтабильность:§! §C+10.0%§!\nЕсли мы приняли реформу коррупции §O(Высокая)§!, мы получим:\n  §OСкорость строительства:§! §C+12.5%§!\n  §OМаксимум эффективности производства:§! §C+12.5%§!\n  §OПрирост эффективности производства:§! §C+12.5%§!\n  §OСтабильность:§! §C+15.0%§!\nЕсли мы приняли реформу коррупции §R(Крайняя)§!, мы получим:\n  §RСкорость строительства:§! §C+15.0%§!\n  §RМаксимум эффективности производства:§! C+15.0%§!\n  §RПрирост эффективности производства:§! §C+15.0%§!\n  §RСтабильность:§! §C+20.0%§!\n"
 BRA_amazons2: "[GetBraAmazon]"
 GetBraAmazonDef: "Если мы примем реформу коррупции §G(Низкая)§!, §GОбуздать профсоюзы§!, мы получим:\nДобавляется §HДух Амазонии§!, дающий (£organization_texticon  Организация дивизии: §G+5.0%§!).\nДобавляется §HАмазонская логистика§!, дающая (£fuel_texticon  Расход топлива армии: §G-5.0%§!).\n\nЕсли мы примем реформу коррупции §Y(Средняя)§!, §YКонституция 1937 года§!, мы получим:\nДобавляется §HДух Амазонии§!, дающий (£organization_texticon  Организация дивизии: §G+5.0%§!, £attack_texticon  Атака дивизии: §G+2.5%§!, £defence_texticon  Оборона дивизии:  §G+2.5%§!).\nДобавляется §HАмазонская логистика§!, дающая (£fuel_texticon  Расход топлива армии: §G-5.0%§!).\n\nЕсли мы примем реформу коррупции §O(Высокая)§!, §OАвтономная TSN§!, мы получим:\nДобавляется §HДух Амазонии§!, дающий (£organization_texticon  Организация дивизии: §G+5.0%§!, £attack_texticon  Атака дивизии: §G+5.0%§!, £defence_texticon  Оборона дивизии:  §G+5.0%§!).\nДобавляется §HАмазонская логистика§!, дающая (£fuel_texticon  Расход топлива армии: §G-10.0%§!).\n"
