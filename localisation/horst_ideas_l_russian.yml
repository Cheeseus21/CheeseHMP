GetBraComeDef:0 "Если мы примем §GLow§! коррупционную реформу, §GОграничение профсоюзов§!,\n §G-20% стоимости торговли с США§!\n\nЕсли мы примем §YСреднюю§! коррупционную реформу, §YКонституцию 1937 года§!, вместо этого мы получим\n §Y-30% стоимости торговли с США§!\n\nЕсли мы уже приняли §OВысокую§! коррупционную реформу, §OАвтономное ТСН§!, вместо этого мы получим\n §O-40% стоимости торговли с США§!\n\n"
