JAP_hachi_go_sakusen_going_I_desc:0 "Операция Ичи-Го, или 'План операции № 8', это план, разработанный совместным Оперативным бюро Генерального штаба японской армии и Квантунской армии для вторжения в восточные части Советского Союза. Масштаб операции был огромным: план предусматривает задействование 50 дивизий ИЯА для борьбы на фронте протяженностью почти 5 000 километров, с окончательными целями Японии на глубине до 1 200 километров в советской территории."
