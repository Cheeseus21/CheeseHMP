 GetBraBlackDefCon: "С нашей текущей реформой коррупции §Y(Средняя)§! — §Y«Конституция 1937 года»§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G2§! §Hгражданских завода§!.\n   Добавить §G2§! §Hвоенных завода§!.\n   Добавить §G4§! строительных слота.\n\n"

 
 
 BRA_centralize2: "[GetBraCent]"
 GetBraCentDef: "Если мы примем §GНизкую§! реформу коррупции, §GОбуздание профсоюзов§!:\n§YРио-де-Жанейро§!:\n   Добавить §G3§! §HВоенных завода§!.\n   Добавить §G3§! Строительных слота.\n\nЕсли мы примем §YСреднюю§! реформу коррупции, §YКонституцию 1937 года§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G4§! §HВоенных завода§!.\n   Добавить §G4§! Строительных слота.\n\nЕсли мы примем §OВысокую§! реформу коррупции, §OАвтономный TSN§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G5§! §HВоенных завода§!.\n   Добавить §G5§! Строительных слота."
 GetBraCentDefTrade: "С нашей текущей §G(Низкой)§! реформой коррупции, §GОбуздание профсоюзов§!:\n§YРио-де-Жанейро§!:\n   Добавить §G3§! §HВоенных завода§!.\n   Добавить §G3§! Строительных слота.\n\nЕсли мы примем §YСреднюю§! реформу коррупции, §YКонституцию 1937 года§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G4§! §HВоенных завода§!.\n   Добавить §G4§! Строительных слота.\n\nЕсли мы примем §OВысокую§! реформу коррупции, §OАвтономный TSN§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G5§! §HВоенных завода§!.\n   Добавить §G5§! Строительных слота."
 GetBraCentDefCon: "С нашей текущей §Y(Средней)§! реформой коррупции, §YКонституцией 1937 года§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G4§! §HВоенных завода§!.\n   Добавить §G4§! Строительных слота.\n\nЕсли мы примем §OВысокую§! реформу коррупции, §OАвтономный TSN§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G5§! §HВоенных завода§!.\n   Добавить §G5§! Строительных слота."
 GetBraCentDefTSN: "С нашей текущей §O(Высокой)§! реформой коррупции, §OАвтономный TSN§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G5§! §HВоенных завода§!.\n   Добавить §G5§! Строительных слота."

 BRA_cometobrazil2: "[GetBraCome]"
 GetBraComeDef: "Если мы примем реформу коррупции §G«Низкая»§! — §G«Обуздать профсоюзы»§!,\n §G-20% к стоимости торговли с США§!\n\nЕсли мы примем реформу коррупции §Y«Средняя»§! — §Y«Конституция 1937 года»§!, мы вместо этого получим\n §Y-30% к стоимости торговли с США§!\n\nЕсли мы приняли реформу коррупции §O«Высокая»§! — §O«Автономная TSN»§!, мы вместо этого получим\n §O-40% к стоимости торговли с США§!\n\n"
 GetBraComeDefTrade: "С нашей текущей реформой коррупции §G(Низкая)§! — §G«Обуздать профсоюзы»§!,\n §G-20% к стоимости торговли с США§!\n\nЕсли мы примем реформу коррупции §Y«Средняя»§! — §Y«Конституция 1937 года»§!, мы вместо этого получим\n §Y-30% к стоимости торговли с США§!\n\nЕсли мы примем реформу коррупции §O«Высокая»§! — §O«Автономная TSN»§!, мы вместо этого получим\n §O-40% к стоимости торговли с США§!\n\n"
 GetBraComeDefCon: "С нашей текущей реформой коррупции §Y(Средняя)§!, §YКонституция 1937 года§!,\n §Y-30% к стоимости торговли с США§!\n\nЕсли мы примем реформу коррупции §O(Высокая)§!, §OАвтономная TSN§!, то вместо этого получим\n §O-40% к стоимости торговли с США§!\n\n"
 GetBraComeDefTSN: "С нашей текущей реформой коррупции §O(Высокая)§!, §OАвтономная TSN§!,\n §O-40% к стоимости торговли с США§!\n\n"

 BRA_secondrepublic: "Если нашим начальным фокусом была Эра Варгаса:\n Добавляется §HСоциально-экономический акцент§!, дающий (£consumer_goods_texticon Заводы товаров потребления: §H-5.0%§!).\n\nЕсли нашим начальным фокусом была Мобилизация интегралистов:\nДобавляется §HВоенный акцент§!, дающий (£increase_texticon Восстановление организации армии: §G+10.00%§!, £construction_speed_texticon  Скорость строительства §Yвоенных заводов§!: §G+10.00%§!).\n\n"


 BRA_armor: "В зависимости от того, сколько реформ коррупции мы приняли, мы получим боевой бонус для нашего §Yбронетанкового корпуса§!\nЕсли мы приняли реформу коррупции §G(Низкая)§!, мы получим:\n  §CБронетехника:§!\n     §GМягкая атака§! множитель: §Y+5.0%§!\n     §GЖёсткая атака§! множитель: §Y+5.0%§!\n §CМеханизированное шасси:§!\n     §GОборона§! множитель: §Y+10.0%§!\n     §GПрорыв§! множитель: §Y+5.0%§!\n §CМоторизованная реактивная артиллерия:§!\n     §GМягкая атака§! множитель: §Y+5.0%§!\n     §GПрорыв§! множитель: §Y+10.0%§!\nЕсли мы приняли реформу коррупции §O(Высокая)§!, мы получим:\n  §CБронетехника:§!\n     §OМягкая атака§! множитель: §Y+7.5%§!\n     §OЖёсткая атака§! множитель: §Y+7.5%§!\n §CМеханизированное шасси:§!\n     §OОборона§! множитель: §Y+5.0%§!\n     §OПрорыв§! множитель: §Y+10.0%§!\n §CМоторизованная реактивная артиллерия:§!\n     §OМягкая атака§! множитель: §Y+15.0%§!\n     §OПрорыв§! множитель: §Y+10.0%§!"
 BRA_inf: "В зависимости от того, сколько реформ коррупции мы приняли, мы получим боевой бонус для нашей §Yсухопутной армии§!\nЕсли мы приняли реформу коррупции §G(Низкая)§!, мы получим:\n §CПехотное оружие:§!\n     §GМягкая атака§! множитель: §Y+5.0%§!\n     §GПрорыв§! множитель: §Y+5.0%§!\n §CАртиллерия:§!\n     §GМягкая атака§! множитель: §Y+5.0%§!\n     §GПрорыв§! множитель: §Y+5.0%§!\n §CРеактивная артиллерия:§!\n     §GМягкая атака§! множитель: §Y+5.0%§!\n     §GПрорыв§! множитель: §Y+10.0%§!\nЕсли мы приняли реформу коррупции §O(Высокая)§!, мы получим:\n §CПехотное оружие:§!\n     §OМягкая атака§! множитель: §Y+10.0%§!\n     §OПрорыв§! множитель: §Y+10.0%§!\n §CАртиллерия:§!\n     §OМягкая атака§! множитель: §Y+10.0%§!\n     §OПрорыв§! множитель: §Y+10.0%§!\n §CРеактивная артиллерия:§!\n     §OМягкая атака§! множитель: §Y+10.0%§!\n     §OПрорыв§! множитель: §Y+10.0%§!"
