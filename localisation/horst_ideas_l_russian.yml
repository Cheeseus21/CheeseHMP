 SLO_german_occupation: "Германская оккупация"
 SLO_german_occupation_desc: "В течение первого года существования нашего нового государства немцы использовали свои огромные финансовые ресурсы, чтобы установить контроль над крупными отечественными промышленными предприятиями. Кроме того, они приказали, чтобы значительная часть наших людских ресурсов отправилась на службу на Восточный фронт."
 SLO_german_occupation_2: "Германская оккупация"
 SLO_german_occupation_2_desc: "В течение первого года существования нашего нового государства немцы использовали свои огромные финансовые ресурсы, чтобы установить контроль над крупными отечественными промышленными предприятиями. Кроме того, они приказали, чтобы значительная часть наших людских ресурсов отправилась на службу на Восточный фронт."
 SLO_prospering_industry_1: "Ревальвация валюты"
 SLO_prospering_industry_1_desc: "Несмотря на многие недостатки, ситуация со снабжением была удовлетворительной по сравнению с соседними государствами, словацкая валюта была стабильной и пользовалась спросом. Достаточный доход позволил Словацкой республике реализовать многие социальные меры, такие как пособия на детей, социальные отчисления и т.д."
 SLO_prospering_industry_2: "Растущая промышленность"
 SLO_prospering_industry_2_desc: "Несмотря на многие недостатки, ситуация со снабжением была удовлетворительной по сравнению с соседними государствами, словацкая валюта была стабильной и пользовалась спросом. Достаточный доход позволил Словацкой республике реализовать многие социальные меры, такие как пособия на детей, социальные отчисления и т.д."
 SLO_prospering_industry_3_desc: "Несмотря на многие недостатки, ситуация со снабжением была удовлетворительной по сравнению с соседними государствами, словацкая валюта была стабильной и пользовалась спросом. Достаточный доход позволил Словацкой республике реализовать многие социальные меры, такие как пособия на детей, социальные отчисления и т.д."
 SLO_prospering_industry_3: "Растущая промышленность"
 SLO_vojtech_tuka: "Войтех Тука"
 SLO_vojtech_tuka_desc: "Войтех Лазар Тука был словацким политиком, представителем радикального пронацистского крыла Словацкой народной партии Глинки. Приговорён Национальным судом к смертной казни и казнён 20 августа 1946 года."
 SLO_alexander_mach: "Александр Мах"
 SLO_alexander_mach_desc: "Александр Мах был словацким политиком и журналистом. Командующий Глинковской гвардией, министр внутренних дел и заместитель премьер-министра Словацкого государства. Он нёс со-ответственность за преследование словацких евреев и антифашистов. В 1947 году был приговорён к 30 годам тюремного заключения."
 SLO_durcanskys_ideas: "Идеи Дюрчанского"
 SLO_durcanskys_ideas_desc: "С 1939 по 1940 год он был одновременно министром иностранных дел и министром внутренних дел Словацкой республики. Он пытался сохранить определённую независимость словацкой внешней политики от Германии, и поэтому был отозван по настоянию Адольфа Гитлера."
 SLO_durcanskys_ideas_2: "Идеи Дюрчанского"
 SLO_durcanskys_ideas_2_desc: "С 1939 по 1940 год он был одновременно министром иностранных дел и министром внутренних дел Словацкой республики. Он пытался сохранить определённую независимость словацкой внешней политики от Германии, и поэтому был отозван по настоянию Адольфа Гитлера."
