BRA_secondrepublic:0 "Если нашим открывающим фокусом была Эра Варгаса:\nДобавить §HСоциально-экономический акцент§!, который предоставляет (£consumer_goods_texticon Заводы потребительских товаров: §H-2.5%§!).\n\nЕсли нашим открывающим фокусом было Мобилизация Интегралистов:\nДобавить §HВоенный акцент§!, который предоставляет (£increase_texticon Восстановление организации армии: §G+10.00%§!, £construction_speed_texticon Скорость строительства §YВоенных Заводов§!: §G+10.00%§!).\n\n"


BRA_armor:0 "На основе количества принятых нами реформ по борьбе с коррупцией, мы получим боевой бонус для нашего §YБронированного ядра§!\nЕсли мы приняли §GНизкую§! реформу по коррупции, то мы получим:\n §CБроня:§!\n Фактор §GПротивопехотной атаки§!: §Y+5.0%§!\n Фактор §GПротивотанковой атаки§!: §Y+5.0%§!\n §CМеханизированный корпус:§!\n Фактор §GЗащиты§!: §Y+10.0%§!\n Фактор §GПрорыва§!: §Y+5.0%§!\n §CМоторизованная ракетная артиллерия:§!\n Фактор §GПротивопехотной атаки§!: §Y+5.0%§!\n Фактор §GПрорыва§!: §Y+10.0%§!\nЕсли мы приняли §OВысокую§! реформу по коррупции, то мы получим:\n §CБроня:§!\n Фактор §OПротивопехотной атаки§!: §Y+7.5%§!\n Фактор §OПротивотанковой атаки§!: §Y+7.5%§!\n §CМеханизированный корпус:§!\n Фактор §OЗащиты§!: §Y+5.0%§!\n Фактор §OПрорыва§!: §Y+10.0%§!\n §CМоторизованная ракетная артиллерия:§!\n Фактор §OПротивопехотной атаки§!: §Y+15.0%§!\n Фактор §OПрорыва§!: §Y+10.0%§!"
BRA_inf:0 "На основе количества принятых нами реформ по борьбе с коррупцией, мы получим боевой бонус для нашей §YСухопутной армии§!\nЕсли мы приняли §GНизкую§! реформу по коррупции, то мы получим:\n §CПехотные орудия:§!\n Фактор §GПротивопехотной атаки§!: §Y+5.0%§!\n Фактор §GПрорыва§!: §Y+5.0%§!\n §CАртиллерия:§!\n Фактор §GПротивопехотной атаки§!: §Y+5.0%§!\n Фактор §GПрорыва§!: §Y+5.0%§!\n §CРакетная артиллерия:§!\n Фактор §GПротивопехотной атаки§!: §Y+5.0%§!\n Фактор §GПрорыва§!: §Y+10.0%§!\nЕсли мы приняли §OВысокую§! реформу по коррупции, то мы получим:\n §CПехотные орудия:§!\n Фактор §OПротивопехотной атаки§!: §Y+10.0%§!\n Фактор §OПрорыва§!: §Y+10.0%§!\n §CАртиллерия:§!\n Фактор §OПротивопехотной атаки§!: §Y+10.0%§!\n Фактор §OПрорыва§!: §Y+10.0%§!\n §CРакетная артиллерия:§!\n Фактор §OПротивопехотной атаки§!: §Y+10.0%§!\n Фактор §OПрорыва§!: §Y+10.0%§!"
