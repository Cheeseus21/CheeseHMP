 BRA_concessions: "\nЕсли мы примем реформу коррупции §H«Средняя»§! — §H«Конституция 1937 года»§!, мы вместо этого получим:\nДобавление §H«Концессий для латифундий»§!, что даёт (£civ_factory_output  Производительность заводов: §G+10.00%§!, £political_power_texticon  Стоимость торговых законов: §G-50%§!)."
 BRA_blackmail2: "[GetBraBlack]"
 GetBraBlackDef: "Если мы примем реформу коррупции §G«Низкая»§! — §G«Обуздать профсоюзы»§!:\n§YРио-де-Жанейро§!:\n   Добавить §G2§! §Hгражданских завода§!.\n   Добавить §G2§! строительных слота.\n\nЕсли мы примем реформу коррупции §Y«Средняя»§! — §Y«Конституция 1937 года»§!, мы вместо этого получим:\n§YРио-де-Жанейро§!:\n   Добавить §G2§! §Hгражданских завода§!.\n   Добавить §G2§! §Hвоенных завода§!.\n   Добавить §G4§! строительных слота.\n\n"
