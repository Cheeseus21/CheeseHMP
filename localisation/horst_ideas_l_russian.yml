SLO_soviet_war_idea_desc:0 "В октябре 1941 года Фашистская Дивизия была частью 1-й Панцерной армии, сражающейся на восточном берегу реки Днепр недалеко от региона Перешчина. К этому моменту Дивизия потеряла почти все свои танки. Дивизия приняла участие в наступлении и захвате Ростова, сыграв важную роль в нем."

