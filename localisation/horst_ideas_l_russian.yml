 GetBraEstado2Def: "Если мы примем реформу коррупции §G(Низкая)§!, §GОбуздать профсоюзы§!:\nДобавляется §HEstado Novo§!, дающий (£stability_texticon  Стабильность: §G+5.00%§!, £construction_speed_texticon Скорость строительства: §G+5.00%§!, £prod_eff_capМаксимум эффективности производства: §G+5.00%§!, £efficiency_growth_texticonРост эффективности производства: §G+5.00%§!).\n\nЕсли мы примем реформу коррупции §H(Средняя)§!, §HКонституция 1937 года§!, мы вместо этого получим:\n Добавляется §HEstado Novo§!, дающий (£stability_texticon  Стабильность: §G+10.00%§!, £construction_speed_texticon Скорость строительства: §G+10.00%§!, £prod_eff_capМаксимум эффективности производства: §G+10.00%§!, £efficiency_growth_texticonРост эффективности производства: §G+10.00%§!).\n\nЕсли мы примем реформу коррупции §O(Высокая)§!, §OАвтономная TSN§!, мы вместо этого получим:\nДобавляется §HEstado Novo§!, дающий (£stability_texticon  Стабильность: §G+15.00%§!, £construction_speed_texticon Скорость строительства: §G+12.50%§!, £prod_eff_capМаксимум эффективности производства: §G+12.50%§!, £efficiency_growth_texticonРост эффективности производства: §G+12.50%§!).\n\n"
