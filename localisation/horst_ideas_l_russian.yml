 SLO_soviet_war_idea_desc: "2 октября 1941 года Быстрая дивизия входила в состав 1-й танковой армии, сражавшейся на восточном берегу реки Днепр в районе Перещепино. К этому времени дивизия потеряла почти все свои танки. Дивизия приняла участие в германском наступлении на Кавказ в начале 1942 года, где сыграла ключевую роль в штурме и взятии Ростова."
