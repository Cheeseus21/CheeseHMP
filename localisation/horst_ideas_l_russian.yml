SLO_german_occupation_2_desc:0 "В первый год существования нашего нового государства немцы использовали свои огромные финансовые ресурсы, чтобы получить контроль над крупными внутренними промышленными предприятиями. Кроме того, они приказали значительной части нашего резерва мобилизоваться на Восточном фронте."
SLO_prospering_industry_1:0 "Переоценка валюты"
SLO_prospering_industry_1_desc:0 "Несмотря на многие недостатки, снабжение было удовлетворительным по сравнению с окружающими государствами, словацкая валюта была стабильной и востребованной. Достаточный доход позволил Словацкой Республике внедрить много социальных мер, таких как пособия на детей, социальные взносы и др."
SLO_prospering_industry_2:0 "Растущая индустрия"
SLO_prospering_industry_2_desc:0 "Несмотря на многие недостатки, снабжение было удовлетворительным по сравнению с окружающими государствами, словацкая валюта была стабильной и востребованной. Достаточный доход позволил Словацкой Республике внедрить много социальных мер, таких как пособия на детей, социальные взносы

SLO_vojtech_tuka_desc:0 "Vojtech Lazár Tuka был словацким политиком, представителем радикальной пронацистской фракции Словацкой партии народа Глинки. Приговорен к смертной казни Национальным судом и казнен 20 августа 1946 года."
SLO_alexander_mach:0 "Александр Мах"
SLO_alexander_mach_desc:0 "Александр Мах был словацким политиком и журналистом. Командир Глинковской гвардии, министр внутренних дел и заместитель премьер-министра словацкого государства. Он нес совместную ответственность за преследование словацких евреев и антифашистов. В 1947 году его приговорили к 30 годам тюремного заключения."
SLO_durcanskys_ideas:0 "Идеи Дурчански"
SLO_durcanskys_ideas_desc:0 "С 1939 по 1940 год он был и министром иностранных дел, и министром внутренних дел Словацкой Республики. Он пытался сохранить определенную независимость словацкой внешней политики от Германии, и по этой причине его отстранили по требованию Адольфа Гитлера."
SLO_durcanskys_ideas_2:0 "Идеи Дурчански"
SLO_durcanskys_ideas_2_desc:0 "С 1939 по 1940 год он был и министром иностранных дел, и министром внутренних дел Словацкой Республики. Он пытался сохранить определенную независимость словацкой внешней политики от Германии, и по этой причине его отстранили по требованию Адольфа Гитлера."
