  ENG_bomber_harris_desc:0 "'You want me to admit it was a terrible thing we did to Hamburg? Right. It *was* bloody terrible. It was *ghastly*! Feel better now? Unless you can offer me alternative targets that will win the war quicker, shut up! You return to your conscience, and let me get back to the war. Okay?' -Harris in response to a protesting Reverand"
  BUL_steel_exports2_desc:0 "With German investment, we can develop long neglected Tungsten mines to our West."
  BUL_war_games:0 "Secret War Games"
  efr_secret_weapons:0 "Secret Weapons"
  ITA_modernized_artillery_at:0 "Modernized Anti-Tank"
  ITA_modernized_artillery_at_desc:0 "Our anti-tank weaponry is seriously outdated and in need of improvement."
  SOV_great_purge_NEW:0 "The Great Purge"
  ENG_compass:0 "Operation Compass"
  ENG_operation_compass:0 "Operation Compass"
  #ENG_operation_compass_desc:0 "This operation will fail as soon as we lose control of Giza"
  ENG_compass_desc:0 "This is our first major operation against the Axis in Africa. We need strategic mobility in the deserts in order to encircle and destroy our opponents."
  SOV_great_purge_NEW_desc:0 "There is a dangerous Trotskyist plot brewing among the officers; even in the highest ranks. Though Trotsky's personal involvement remains unknown, the threat is great. The USSR could even be thrown into another civil war... unless we are prepared to break some eggs."
  EFR_torch_declared:0 "Torch has been declared"
  BUL_war_games_desc:0 "We will conduct war games in secret to prepare our army for future conflict."
