 GER_speers_miracle:0 "Speer's Armaments Miracle"
 GER_speers_miracle_desc:0 "Albert Speer has made the bold claim that he can massively increase armaments production by reorganizing our military industry and labor force. We should give him this opportunity as we need to increase armaments production in order to fight the Allies and Soviet forces."
 GER_army_innovation_3_desc:0 "The campaign in France and Poland has taught us the importance of tank variants, as well as the need for various kinds of tank models."
 GER_jag_tt:0 "§CWe will receive temporary buffs to army recovery and reinforce rate. We will also change our economy law to §YTotal Mobilization§!§!\n\n40 Civilian Factories will be converted into 40 Military Factories immediately.\n\n§RKurzester Krieg will be removed if our war support goes below 50%!§!\n\n§RWe will lose 2.0% War Support monthly§!"§!\n\n"
 ITA_sword_tt:0 "\nWe will receive a bonus to §CStability§! and §CWar Support§! based off control of Arab/Muslim states in North Africa and the Middle-East."
 ITA_Skillful_Workers_tt:0 "In addition to bonus §CStability§! and §CWar Support§! from control of Arab/Muslim states in North Africa and the Middle-East, we will receive a §CFactory Output§! and §CDockyard Output§! bonus equal to half of the stability/war support gained from control of North Africa and Middle-Eastern states.§!\n\n§YThe maximum possible value is 14.5% Stability and 7.75% factory/dockyard output§!"
 SOV_oppose_the_church_desc:0 "Socialism now, Socialism tomorrow, Socialism forever!"
 SOV_barb3_idea:0 "The Great Patriotic War"
 SOV_brest:0 "Lessons from Brest Fortress"
 HOL_knil2:0 "KNIL Conscripts"
 HOL_curacao_desc:0 "We should develop Curacao in the west, it is a perfect place to celebrate your holiday and it has loads of oil with funny colorful houses we build!"
 HOL_invest_desc:0 "We should also look to our western possessions. They are quite small in size, but pretty rich in resources. We can always use resources. This would also increase our overseas trade, which is always a good thing, our fleet will thrive!"
 HOL_suriname_desc:0 "Suriname is quite populous and has quite some resources, developing it further wouldn't be a bad choice at all."
 HOL_knil2_desc:0 "The homeland fell, only our colonies can help us in the fight. If we could rally the natives behind our cause, we would be able to form an army as big as the Chinese one itself!"
 stalin_barb_leader_trait2:0 "Generalissimus of the Soviet Union"
 mrp_was_done:0 "We have signed the Molotov-Ribbentrop Pact"
 SOV_at:0 "Modernized Anti-Tank Warfare"
 SOV_at_desc:0 "The sheer quantity and quality of German tank divisions demands us to quickly modernized our anti-tank weapons."
 SOV_order270_desc:0 "Encircled units and formations are to selflessly fight to the last, to protect materiel like the apple of their eye, to break through from the rear of enemy troops, defeating the fascist dogs.\n\nChairman of the State Defence Committee -J. STALIN"
 SOV_man_of_steel:0 "Man of Steel"
 SOV_man_of_steel_desc:0 "Generalissimo Stalin directed every move... made every decision... He is the greatest and wisest military genius who ever lived... -Georgy Zhukov"
 SOV_invade_Japan:0 "Operation August Storm"
 SOV_invade_Japan_desc:0 "The border conflict with Japan has gone on long enough. If we can't trust a Japanese government to respect a recognized border, then we will have to replace that government."
 SOV_china_prc:0 "Support the People's Republic of China"
 SOV_china_prc_desc:0 "We will commit to the liberation and unification of China under a Socialist government."
 SOV_wtf:0 "Nerve-Racked Stalin"
 SOV_wtf_desc:0 "The sudden invasion by the fascists has briefly paralyzed Comrade Stalin."
 SOV_barb1:0 "Retrieve Stalin from his Dacha"
 SOV_barb1_desc:0 "Our entire command structure is paralyzed without orders from Comrade Stalin. We need him to return to his normal self so that we may fight against it!"
 rasputitsa:0 "Rasputitsa"
 rasputitsa_tt:0 "The power of the Soviet mud season will descend upon all armies fighting in the Soviet Union! For all of §YMarch and April§! AND all of §YOctober and November§! every division will be affected by the following modifiers: §R-20% division speed§!, §R-20% armor division speed (40% total)§!, §R10% attrition§!, and §R-30% recovery rate§!.\n\nThis force of nature will occur two times a year until mid-1945."
 GER_zwangsarbeit:0 "Mandatory Work Service"
 GER_zwangsarbeit_desc:0 ""
 GER_zwangsarbeit_idea:0 "Zwangsarbeit"
 GER_winter_equipment:0 "Winterize Our Equipment"
 GER_winter_equipment_desc:0 "If we are to fight through winter then we must winterize our equipment - and fast."
 GER_blau_desc:0 "We must win, and quickly -Joseph Goebbels"
 GER_barbarossa_others_text:0 "§C\nOur allies will benefit from attack plans as well.§!"
 GER_blau_text:0 "§R\nOur attack plans will expire after November 23rd, 1942!§!"
 GER_jag_desc:0 "Germany is under siege by an international Bolshevist conspiracy against her. The combined Allied and Soviet economies are monstrous, but they can be overcome with a full mobilization of the German volk in a total war. A war so total that is more radical than anyone could ever imagine"
 GER_totaler_krieg_tt:0 "§RFailure to end the war swiftly will have disastrous consequences for Germany!§!\n\n"
 GER_jet_focus:0 "Messerschmitt's Project"
 GER_jet_focus_desc:0 "Messerschmitt has been working on a type of plane propelled by a jet engine. This plane, the Me 262, will help us win the air war."
 GER_uralabomber:0 "The Uralbomber"
 GER_uralabomber_desc:0 "The Soviet industry has been relocated to Siberia, putting it out of range of our bombers. We need to developer larger and longer-range bombers in order to reach these factories."
 amerika_bomber:0 "The Amerikabomber Programme"
 amerika_bomber_desc:0 "If we can force the USA to focus it's anti-aircraft artillery and fighter planes to protect it's homeland then we can have a free hand to indiscriminately bomb Britain!"
 uk_africa_focus:0 "Develop Sudan"
 uk_africa_focus_desc:0 "We should develop the road network and naval bases in the Sudan area in case the Mediterranean Sea becomes impassable for our convoys, and we have to route our supplies through there."
 uk_levant_focus:0 "Levantine Defense"
 uk_levant_focus_desc:0 "The Eastern Mediterranean can only be defended with a network of airbases near its coastline. If we lose control of the Eastern Mediterranean we will surely lose control of Egypt"
 uk_sumeria_focus:0 "Middle-Eastern Bases"
 uk_sumeria_focus_desc:0 "Developing military infrastructure in the Middle-East is key to supplying our troops in the Levant should we lose control of the Eastern Mediterranean"
 uk_africa_last_defense:0 "Prepare Defenses in Sudan"
 uk_africa_last_defense_desc:0 "The Suez has been lost! We must hold the Axis back from the rest of Africa!"
 

 
 
 CHI_french_drillx:0 "Italian Drill"
 CHI_french_drillx_desc:0 "The Italian experience in the Great War has created an army that excels in defense. By adopting their training methods and standards, we can improve our own defensive capabilities."
 CHI_reach_out_to_francex:0 "Reach Out To Italy"
 CHI_reach_out_to_francex_desc:0 "Even though the Italians have repeatedly humiliated us and forced new concessions on us, in the current situation we may well end up needing their help."
 GER_mech_3_focus:0 "Sd.Kfz. 251"
 GER_mech_3_focus_desc:0 "If we mount infrared searchlights on our Hanomags we can fight more effectively at night, improving combat awareness."
 
