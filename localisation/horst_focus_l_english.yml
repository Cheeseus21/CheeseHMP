 NOR_sjoforsvaret:0 "Sjøforsvaret"
 NOR_sjoforsvaret_desc:0 "Norges marinförsvar, the Norwegian Navy is our fist line of defence"
 NOR_norwegian_shipping:0 "Norwegian Shipping"
 NOR_norwegian_shipping_desc:0 "Norwegian shipbuilders are world leading"
 NOR_merchant_marine_protection:0 "Merchant Marine Escorts"
 NOR_merchant_marine_protection_desc:0 "We need to protect our mighty Merchant Marine"
 NOR_support_the_shipbuilding_industry:0 "Support the Shipbuilders"
 NOR_support_the_shipbuilding_industry_desc:0 "The Dockyards will work again"
 NOR_naval_modernisation:0 "Naval Modernisation"
 NOR_naval_modernisation_desc:0 "The key to our Naval supremacy in the Fjords"
 NOR_aquire_the_stord_class_destroyers:0 "Stord Class Destroyers"
 NOR_aquire_the_stord_class_destroyers_desc:0 "Aquire the Stord class destroyers"
 NOR_new_submarines:0 "New Submarines"
 NOR_new_submarines_desc:0 "modernise the Submarine Fleet"
 NOR_upgrade_from_the_norge_class:0 "Upgrade the Norge Class"
 NOR_navy_4:0 "Fast Torpedoes"
 NOR_navy_4_desc:0 "At the cost of reload time and explosive charge, we can overload our torpedoes with propellant, enabling them to reach high velocities and maintain it for long ranges, more easily bypassing screens."
 NOR_upgrade_from_the_norge_class_desc:0 "We need new capital ship ships. Coastal defense ships will suit our needs well."
 NOR_naval_drills:0 "Naval Drills"
 NOR_escort_effort:0 "Escort Effort"
 NOR_convoy_effort:0 "Rebuild the Merchant Marine"
 NOR_convoy_effort_desc:0 "All wars are fought, won, and lost by logistical lines. Our expert shipbuilders can quickly build convoy ships for the Allies."
 NOR_escort_effort_desc:0 "There is a need for anti-submarine and escort destroyers. We need to help our Allies with this."
 NOR_naval_drills_desc:0 "Proper preparation will teach us valuable lessons"
 NOR_free_navy:0 "Norwegian Free Navy"
 NOR_free_navy_desc:0 "We will ask our allies to let us borrow few of their desroyers to protect our own shipping"
 NOR_ASW:0 "British ASW School"
 NOR_cold_navy:0 "Cold Water Navy"
 NOR_cold_navy_desc:0 "As an Arctic nation, our seamen are well trained in naval warfare in cold waters, giving them an edge over the Axis."
 NOR_naval_radar:0 "Naval Radar"
 NOR_naval_radar_desc:0 "Radar offers tantalizing possibilties to take the cover of night away from our enemies and detect them even in bad weather."
 NOR_ASW_desc:0 "United Kingdom has made a lot of progress in a fight against the enemy U-boats. We can work with them to improve our own doctrine."
 NOR_standing_navy:0 "Standing Navy"
 NOR_standing_navy_desc:0 "A modern standing Navy will let us rule the waves"
 NOR_carriers:0 "Escort Carriers"
 NOR_carriers_desc:0 "Building small sized carriers to escort the merchant marine against submarines and small naval task forces is more possible for us to accomplish than full fleet carriers."
 TIB_anti_meme33:0 "Liberating London from Japan"
 GER_the_great_turn:0 "Final Victory"
 GER_the_great_turn_desc:0 "The victory against the international Bolshevist conspiracy is inevitable! The German people are destined to turn the war around and win, defeat is impossible!"
 TIB_anti_meme:0 "Reverting to 1.4 Soft Attack"
 endsieg_tt:0 "§HOur§! §CDivision Attack on core territory§! §Hand§! §CDivision Defense on core territory§! §Hwill increase by§! §C20%§! §HWe will also deploy §G72 40w infantry divisions§! to hold the line.§!\n\n§HOur Factory Output will increase based off the number of states we lose control of.§!"
 ITA_fort_milan:0 "Fortress Milano"
 ITA_fort_milan_desc:0 "We will fight to the last Italian! We will make Milan the Stalingrad of Italy!"
 ITA_The_Riches_Of_The_North:0 "The Riches Of The North"
 ITA_The_Riches_Of_The_North_desc:0 "The northern part of the mainland is the economic heart of our empire, let's make the heart stronger for a more stable economy."
 ITA_Dont_Forget_The_Colonies:0 "The Rest of the Empire"
 ITA_Dont_Forget_The_Colonies_desc:0 "We need to bring civilization and wealth to our whole empire, not only in Italia. We must spread our system in the colony of Libya, integrating Arabs into the National Fascist Party and building thousands of kilometers of new roads. Only then we will stand strong in the future!"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire:0 "Job Creation in the Unwealthy Areas"
 ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire_desc:0 "We need to create wealth for the poor in our uncivilized regions, how you may ask? We will create jobs that'll contribute to the increasing militarization of our country. It's a win-win situation."
 ITA_Skillful_Workers:0 "Filled Stomachs"
 ITA_Skillful_Workers_desc:0 "The unwealthy are now getting quite skilled at the creation of arms in the new build arms complexes we built for them due to experience and most of all, filled stomachs. Jobs create money for the poor and money provides food for the family. This filled stomachs strategy pays off in our production numbers."
 ITA_Our_Finest_Hour:0 "Our Finest Hour"
 ITA_Our_Finest_Hour_desc:0 "Our Industrial transformation has been finished, we're ready for darker times which will be upon us rather soon, this will be Our Finest Hour."
 GER_standardpanzer:0 "The Standardpanzer"
 GER_standardpanzer_desc:0 "We shall implement the final standardised series of tanks. This series will range from the smaller E-10, the E-50 Standardpanzer medium tank, to the E-75 standard heavy tank, and finally the E-100 superheavy tank. With these standardised, though rushed, designs we will be able to produce tanks at a significantly cheaper cost. These will help create surpluses of tanks that will help allow us to achieve our final victory."
 MAN_resources:0 "Develop the Mining and Oil Industries"
 MAN_resources_desc:0 "Our lands are rich in aluminum, steel, and oil, but yet they have been long neglected. Developing these resources is the way forward."
 MAN_railways_kirin_desc:0 ""
 GER_choco_foc:0 "Tank Chocolates"
 GER_choco_foc_desc:0 "Speed is all we need."
 GER_pillen_foc:0 "Hermann Göring Pills"
 GER_pillen_foc_desc:0 "Harder, faster, stronger."
 GER_stuka_foc:0 "Stuka Tablets" 
 GER_stuka_foc_desc:0 "Our dive bomber pilots are among the best in the world, but the war calls for 120% of what we got."
 SOV_support_usa:0 "Support the Allies"
 fin_shocktroops:0 "Guard Jaegers"
 fin_shocktroops_desc:0 "The city of Leningrad is an urban fortress and too difficult to assault for much of our army - we need specialized infantry units trained in urban warfare."
 fin_ranger:0 "Sissi Troops"
 fin_ranger_desc:0 "We must support the creation of units which are capable of fighting far from our supply lines in the dense forests of Finland and Russia."
 SOV_support_usa_desc:0 ""
 USA_support_sov:0 "Support the Soviet Union"
 USA_support_sov_desc:0 ""
 winter_war_tt:0 "This focus automatically completes at the start of Barbarossa via an event"
 army_inno_3_tt:0 "§CWe will unlock Anti-Tank Armored Cars§!\n\n"
 fin_join_axis:0 "Join the Axis"
 ITA_blackshirts:0 "Recruit the Blackshirts"
 ITA_blackshirts_desc:0 "Our army will only be feared once we fielded eight million bayonets on the field."
 black_shirts:0 "Blackshirts"
 fin_join_axis_desc:0 "We will sign the Tripartite Pact and become a formal member of the Axis in exchange for keeping our territorial claims on the Soviet Union."
 fin_supremacy_of_will:0 "Supremacy of Will"
 fin_supremacy_of_will_desc:0 "We have nothing worse than death to fear."
 MAN_railways_chahar_desc:0 ""
 MAN_railways_schahar_desc:0 ""
 plan_zzz_tt:0 "§RInvestment into a surface fleet is very costly and will prevent us from more heavily investing into other areas of our military!§!\n\n§CWe will automatically research a significant amount of naval technology.§!\n\n"
 GER_guns1_desc:0 "Our weapon manufactures have researched the possibility of a new standard weapon for the soldiers. This new weapon should make every recruit into a machine gunner at once. With these new submachine guns that use rifle caliber bullets, will we achieve the upper hand against the enemy."
 MAN_railways_sungkiang_desc:0 ""
 MAN_railways_hulunbuir_desc:0 ""
 GER_plan_z_cv:0 "Graf Zeppelin Experiments"
 GER_plan_z_cv_desc:0 ""
 GER_plan_z_bb:0 "Lay Down the Bismarck"
 GER_plan_z_bb_desc:0 ""
 MAN_railways_heilungkiang_desc:0 ""
 MAN_railways_jehol_desc:0 ""
 JAP_capture_chinese_scientists:0 "Capture Chinese Scientists"
 JAP_capture_chinese_scientists_desc:0 "We will use Chinese intellectuals to further our research and development"
 GER_integrate_spanish_economy:0 "Integrate the Spanish War Economy"
 GER_integrate_spanish_economy_desc:0 "We will support our Spanish brothers with arms and food in exchange for their military support."
 disable_ai_stuff:0 "AI Production Disabled"
 wunder_tt:0 "We will begin our nuclear weapons program, the Uranprojekt and begin §CHeavy Water§! production if we control Norway.\n\nResearches §C'Atomic Research'§!"
 rocket_stuff_tt:0 "We will begin our rocketry program, the Vergeltungswaffen.\n\nResearches §C'Experimental Rockets'§!\n\n"
 RAJ_expand_air_bases2:0 "Expand Eastern Air Bases"
 RAJ_expand_air_bases2_desc:0 "Burma is on the frontline with Japan - we need airfields for it."
 HUN_hmp_heavy_fighter_effort:0 "Fighter Effort"
 HUN_hmp_heavy_fighter_effort_desc:0 "We need fighter aircraft to acquire local air superiority in the skies above our forces, and to intercept any enemy planes that threaten our nation."
 HUN_hmp_tac_focus:0 "Bomber Effort"
 HUN_hmp_tac_focus_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
 france_is_kill:0 "Has Capitulated"
 VIC_join_axis:0 "Sign the Tripartite Pact"
 VIC_join_axis_desc:0 "With all the Allied infringements on our sovereignty and colonies we are in an undeclared war with Britain. We should formally align ourselves with Germany to protect our nation!"
 JAP_the_zero2_tt:0 "Researches §CCarrier Fighter 3s§! and adds §Y'The Zero'§! into production."
 amerika_bomber_tt:0 "Researches §CModern Large Airframe§!"
 jet_focus_tt:0 "Researches §CJet Fighter§! and §CJet Engines§! for both §GGermany§! and §GItaly§!."
 ural_bomber_tt:0 "Researches §CModern Medium Airframe§!"
 ETH_generals_focus_tt:0 "\n§RThis will DISABLE the ability to play as Iraq§!\n\n"
 ENG_us_civs_1:0 "Cash and Carry"
 TIB_nothing45:0 "Joining StrategyStreamers"
 CAN_ATLANTIC_DEMOCRATIC:0 "Atlantic Commonwealth"
 ENG_us_civs_2:0 "Minor Lend-Lease to Britain"
 ENG_us_civs_3:0 "Lend-Lease to Britain"
 ENG_us_civs_4:0 "Major Lend-Lease to Britain"
 ENG_us_civs_5:0 "Arsenal of Democracy"
 linie:0 "§LConstructs the Rheinlinie, the Stettinlinie and Festung Berlin§!"
 TIB_nothing2:0 "Publishing Horst: Global Offensive"
 ENG_no_asia_idea:0 "War in the West Balancer"
 ENG_no_asia_idea_desc:0 "This national spirit is added to the United Kingdom in order to help make the Allies similar to the Allies in the 'The Gathering Storm' start date in ability."
 ENG_no_asia_idea2:0 "The Road to War"
 ENG_no_asia_idea2_desc:0 "You were given the choice between war and dishonor.  You chose dishonor and you will have war. -Winston Churchill"
 ENG_no_asia_idea3:0 "The War"
 ENG_no_asia_idea3_desc:0 "…we shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields and in the streets, we shall fight in the hills; we shall never surrender… -Winston Churchill"
 I_HATE_ASIA_NAME:0 "The War in the West"
 I_HATE_ASIA_DESC:0 "World War Two, without the war in the Far East.\n\nAllies/Comintern: UK, France, Canada, South Africa, Norway, Poland, Greece, and the Soviet Union.\n\nAxis: Germany, Italy, Romania, Hungary, Finland, Vichy France, Italian East Africa, Croatia, Slovakia, and Bulgaria."
 ENG_overlord_states:0 "Operation Overlord"
 ENG_overlord_states_desc:0 "Europe is a fortress so we must carefully plan our assault upon it."
 NZL_bob_semple_tank_tt:0 "Enables production of the §HBob Semple§"
 fourth_shore_tt:0 "§GAll of Libya will become our Core territory§!"
 ITA_fourth_shore:0 "The Fourth Shore"
 ITA_sword:0 "The Sword of Islam"
 ITA_sword_desc:0 "As the heir to Ottoman authority in Libya, we can justly claim to be the Protector of Islam."
 ITA_fourth_shore_desc:0 "Italian Muslims are the fourth shore of Italy - an integral part of the Italian nation. By building Quranic schools, restoring mosques, and buildings schools of Islamic culture we can integrate Libya into Italy. We will guarentee peace, justice, wellness and respect for the laws of the Prophet."
 MAN_found_the_northeast_transport_committeex_desc:0 "If we are to become an economic powerhouse of Asia, then we must work to free ourselves of the influence of Japanese zaibutsus and the South Manchuria Railway. By creating Manchurian owned and operated railways we can direct development in a way that benefits Manchukuo first."
 MAN_five_year_plan_new_desc:0 "The Soviet Union's rapid industrialization is proof that we do not capitalism to develop our economy - we can do it through sheer willpower and determination. Emperor Puyi's plan will make Manchukuo an industrial powerhouse."
 MAN_railways_opener_desc:0 "The systematic expansion and development of the South Manchuria Railway is our ticket to a powerful economy."
 MAN_anshan_steelworks_desc:0 "Founding a steel mill will enable the rest of our heavy industry to develop"
 #MAN_showa_steel_desc:0 "We can further develop our steel mill in Liaotung into the largest in east Asia with the help of Japan."
 MAN_railways_extend_to_port_arthur_desc:0 "We should extend our railway expansion to Dalian to improve trade with Japan"
 MAN_railways_expand_to_east_hebei_desc:0 "We should extend our railway expansion to the East Hebei Autonomous Government to improve trade with Japan"
 MAN_railways_extend_to_pyongyang_desc:0 "We should extend our railway expansion to Korea to improve trade with Japan"
 MAN_railways_japanese_imports_desc:0 "As part of Japan's development program we have easy access to Japanese industrial goods."
 SOV_shbb_tt:0 "\nAdds a nearly complete Sovyetsky Soyuz Class superheavy battleship into production.\n\n"
 SOV_expand_red_fleet2:0 "Challenge The Kriegsmarine"
 SOV_expand_red_fleet2_desc:0 "The Kriegsmarine's naval rearmament program has rapidly created a threat on our Baltic shores. We must lay new flagships to challenge Germany for the control of the Danish Belts and secure our seas against fascist dominance."
 USA_army_of_the_united_states2:0 "Women's Armed Service Integration Act"
 USA_war_with_japan:0 "Strike the Rising Sun"
 USA_war_with_japan_desc:0 "It is fatal to enter a war without the will to win it."
 FRA_victors_of_wwi2:0 "Victors of the Great War"
 USA_overlord:0 "Operation Overlord"
 USA_overlord_desc:0 "Europe is a fortress so we must carefully plan our assault upon it."
 fin_army_effort:0 "Army Effort"
 GER_guns2:0 "Panzerfaust"
 GER_guns2_desc:0 "Every man pressed into the army shall be armed with our most effective and modern tank killer. The panzerfaust. Equipping every man with these fearsome yet cheap weapons will force enemy armor to slow down their advance to wait for their infantry screens or risk utter destruction."
 GER_guns1:0 "Sturmgewehr"
 GER_guns3:0 "Vampir"
 GER_guns3_desc:0 "The ability to see the enemy at night opens up an entirely new dimension of warfare - the ability to effectively conduct night operations against enemy forces without significant hindrance."
 GER_shtank:0 "Superior Firepower"
 GER_shtank_desc:0 "Unpierceable superheavy tanks..."
 FIN_armor_effort:0 "Armor Effort"
 EFR_devalue_the_franc:0 "Devalue the Franc"
 FIN_armor_effort_desc:0 "Applying what we have learned from mechanizing our infantry, we can improve our armored vehicles as well."
 EFR_devalue_the_franc_desc:1 "While other countries allowed their currencies to become less valuable to help their economies, we have steadfastly refused to do so. As a result, our economy is lagging behind others. If we want to become more competitive and weather the coming storm, we must not dismiss a devaluation of our currency out of hand, even if it would prove to be an unpopular measure."
 EFR_autoroutes:0 "Autoroutes"
 EFR_autoroutes_desc:0 "The Germans have awed the world with their concept of limited access, high-speed roads connecting the various parts of their country. We can show the world that we can do just as well."
 EFR_invest_in_the_metropole:1 "Develop the Metropole"
 EFR_invest_in_the_metropole_desc:0 "Our first step in rebuilding our industries must be to improve our industrial base in our continental holdings."
 EFR_invest_in_the_colonies:1 "Develop the Colonies"
 EFR_invest_in_the_colonies_desc:0 "Our industrial heartlands in Europe don't have the population and resources to sustain a large industrial expansion. If our economy is to be competitive with the rest of the world, we must utilize our colonies."
 EFR_colonial_industry_effect_tt:2 "Adds two §YCivilian Factories§! to every colonial state previously invested in.\n"
 EFR_industrial_expansion_effect_tt:1 "Adds two §YCivilian Factories§! to metropolitan states previously invested in.\n"
 EFR_military_factories_effect_tt:1 "Adds two §YMilitary Factories§! to every state previously invested in.\n"
 EFR_invest_in_west_africa:0 "Invest In West Africa"
 EFR_invest_in_west_africa_desc:0 "The vast reserves of workers and resources in western Africa make it a perfect candidate for investment."
 EFR_invest_in_indochina:0 "Invest In Indochina"
 EFR_invest_in_indochina_desc:0 "The long distance between our holdings in Indochina and our heartland may seem like a drawback, but it also protects any industry there from enemy attack."
 EFR_invest_in_syria:0 "Invest In Syria"
 EFR_invest_in_syria_desc:0 "Syria is perfectly positioned to supply us in case of a war in Europe or Africa. Enhancing its industrial potential will also support our position in the area."
 EFR_global_integration:0 "Global Integration"
 EFR_global_integration_desc:0 "The British Empire is a finely-tuned system of mutually supporting parts. There is nothing saying that we can't do just as well with our colonies."
 EFR_begin_rearmament:0 "Begin Rearmament"
 EFR_begin_rearmament_desc:1 "The 20-year armistice Marshall Foch predicted in 1919 is rapidly coming to an end, and the world is looking increasingly likely to erupt into war in the next few years. We must be ready."
 EFR_firepower_kills:0 "Firepower Kills"
 EFR_firepower_kills_desc:0 "The lessons of the Great War were as simple as they were cruel: the days of men fighting one another over open sights are over. Today, killing is done on a mass scale with the most modern weapons at a long range."
 EFR_methodical_battle:0 "Methodical Battle"
 EFR_methodical_battle_desc:0 "Some claim that battle is chaos, but they are fools. A battle is nothing but the methodical application of the right tools based on the overall plan. Plan well, and the enemy's intentions may as well be a historical footnote."
 EFR_division_cuirassee:0 "Division Cuirassée"
 EFR_division_cuirassee_desc:0 "An enterprising officer by the name of de Gaulle has proposed a new kind of division, combining heavy armor with infantry and medium tanks to fight as a combined whole."
 EFR_infantry_tanks:0 "Infantry Tanks"
 EFR_infantry_tanks_desc:0 "Whatever else, the first and last duty of tanks is to enable infantry to take and hold ground. Therefore, we must always equip our infantry units with modern, capable tanks."
 EFR_special_forces:0 "Special Forces"
 EFR_special_forces_desc:0 "In the future, the war will increasingly be fought in areas where the regular infantryman will meet his limit. We must create new and more capable formations that can perform in these conditions."
 EFR_fusiliers_marine:1 "Fusiliers Marins"
 EFR_fusiliers_marine_desc:0 "The days of coasts as impenetrable defenses are over. In the future, we must be able to take the fight to the enemy, wherever they may be, and seize a landing ground against any opposition."
 EFR_battle_of_maneuver:0 "Battle of Maneuver"
 EFR_battle_of_maneuver_desc:0 "The old notion of a battlefield as a small area in which armies clash is dead. With mass-motorization, airplanes and fast radio communications, battles move fast over hundreds of kilometers. The sooner we prepare for this, the better."
 EFR_air_dominance_desc:0 "The development of the airplane has created a third flank for the army to worry about. We must secure this flank or face catastrophe."
 EFR_air_ground_cooperation:0 "Air-Ground Cooperation"
 EFR_air_ground_cooperation_desc:0 "Fighting in the air only ever creates actual military results if it is in pursuit of an objective on the ground. The better we integrate the battle in the air and the battle on the ground, the more effective we become."
 EFR_flying_artillery_desc:0 "In the fast-moving battles of today, the slow artillery pieces on the ground might not be able to keep up. Airplanes carrying bombs can take over their role."
 EFR_form_the_popular_front:0 "Form the Popular Front"
 EFR_form_the_popular_front_desc:1 "With the rise of fascism in Germany and Italy, it has become clear that the infighting on the left has to stop if our cause is to survive. A broad, popular front made up of all the parties on the left will have the popular mandate to finally address the economic conditions that create fascism."
 EFR_ban_communism_desc:0 "While it is inconceivable that anyone could seriously want to visit the chaos and bloodshed of a communist revolution upon their own fatherland, it appears that there are some amongst us who would do just that. We can not allow them to conspire against the state any longer. The harshest measures must be taken."
 EFR_invite_communist_ministers:0 "Invite Communist Ministers"
 EFR_invite_communist_ministers_desc:0 "Fear of backlash from the radical right prevented the inclusion of the communists in the actual government. But fear is a poor adviser. If we must have this clash, let them come."
 EFR_strengthen_the_unions:0 "Strengthen the Unions"
 EFR_strengthen_the_unions_desc:0 "For far too long, the individual worker's right to band together with his comrades to bargain collectively has been left open to attack. No more."
 EFR_celebrate_the_commune:0 "Celebrate the Commune"
 EFR_celebrate_the_commune_desc:0 "Short-lived though it may have been, the Paris Commune was the first attempt to create a communist society on French soil."
 EFR_womens_suffrage_desc:1 "It is as absurd as it is shameful that the hard-working women of France, who time and time again have fought on the barricades to earn their rights, are not permitted to cast their vote in elections. We will eradicate this injustice."
 EFR_legal_equality:0 "Legal Equality"
 EFR_legal_equality_desc:0 "In every way that matters, women are still considered second-class citizens, always subject to a man's will. This nonsense ends now."
 EFR_industrial_collectivization:0 "Industrial Collectivization"
 EFR_industrial_collectivization_desc:1 "The French economy today consists of tiny companies with few employees, forever competing against each other and sucking up resources in inefficient small-scale production. We will combine these small companies to finally create companies that can compete on the world stage."
 EFR_agricultural_collectivization_desc:0 "What applies to industry applies just as much to the farmers all across France. Tiny farms can't afford modern equipment, largely working as their great-grandfathers had. By combining them into agricultural production units, we will increase efficiency and output."
 EFR_force_the_issue:0 "Force the Issue"
 EFR_force_the_issue_desc:1 "We have come far since we formed the Popular Front. But we can not leave our work half-done. It is time for everyone on the left to make a choice and take a stand - either with the revolution or against it."
 EFR_force_the_issue_tt:0 "The stability penalty depends on the popularity of the §YDemocratic§! Parties.\n"
 EFR_reconciliation:0 "Reconciliation"
 EFR_reconciliation_desc:0 "In the past, the French revolutions all too often hurled the country into endless spasms of revolutionary and counter-revolutionary terror. Perhaps it is time to build a republic in which everyone has their place, whether they supported the revolution or not."
 EFR_constitutional_convention:0 "Constitutional Convention"
 EFR_constitutional_convention_desc:0 "A fundamental shift in the nature of our republic can not be done overnight, and it can not be done without negotiating a new constitution."
 EFR_anti_fascist_coalition:0 "Anti-Fascist Coalition"
 EFR_anti_fascist_coalition_desc:0 "The biggest threat to the march of progress is the spread of reactionary fascism. We must stand with every country that is willing to combat this threat, or there will not be a tomorrow for any of us."
 EFR_invite_anti_fascist_emigrants:0 "Invite Anti-Fascist Immigrants"
 EFR_invite_anti_fascist_emigrants_desc:1 "The first step every fascist regime takes is to exile its critics and the people who could present an alternative vision of how the country could be organized. However, these people are also perfectly suited to form a government-in-exile to prepare for the day their country is liberated."
 EFR_reconnect_to_the_balkans:0 "Reconnect To the Balkans"
 EFR_reconnect_to_the_balkans_desc:0 "France has long sought to counter-balance the powers of central Europe by reaching out to the countries of the Balkans. This connection is still there, even if it has been allowed to lapse more recently."
 EFR_pre_empt_the_fascist_attack:0 "Pre-Empt the Fascist Attack"
 EFR_pre_empt_the_fascist_attack_desc:0 "Why should we allow the enemy to prepare in peace and pick the moment that the inevitable attack happens when it best suits them? We will strike first, and crush this threat before it has time to get ready."
 EFR_loyalty_to_moscow:0 "Loyalty To Moscow"
 EFR_loyalty_to_moscow_desc:0 "The model of Socialism practiced in the Soviet Union might not be perfect, but it is beyond any reasonable doubt that the Soviet Union has achieved the highest degree of implementation of socialist ideas. We would be fools to try and find our own way."
 EFR_league_of_french_bolshevist_volunteers_desc:1 "When one socialist country is under threat by a foreign invader, all socialist countries are under threat. We must not sit idly by while our comrades fight for their lives."
 EFR_host_the_german_exiles:0 "Host the German Exiles"
 EFR_host_the_german_exiles_desc:0 "Germany, the home of Marx and Engels, was once at the forefront of communist thought and practice. Many German communists fled when the Nazis took power. If we give them a home, they can help us organize a more effective government of liberated territories."
 EFR_revolution_to_the_utmost:0 "Revolution To the Utmost"
 EFR_revolution_to_the_utmost_desc:0 "A revolution left half-finished is not a revolution at all. We must not stop until the deed is done and the new political system is safe. Whatever the cost."
 EFR_destroy_the_counter_revolution:0 "Destroy the Counter-Revolution"
 EFR_destroy_the_counter_revolution_desc:0 "Even now, some people in France prepare to stab the dagger into the back of their own people when they show even a second of weakness. We will not let them, and will strike first."
  EFR_appeal_to_the_french_nation:0 "Appeal To the French Nation"
 EFR_appeal_to_the_french_nation_desc:0 "France may have lost the battle, but it has not lost the war. It is the duty of every patriotic Frenchman to resist."
 EFR_appeal_to_overseas_territories:0 "Appeal To Overseas Territories"
 EFR_appeal_to_overseas_territories_desc:0 "While the metropolitan areas of France may well have fallen to the enemy, much of her empire still remains free. If we can rally them to our aid, we can take the fight back to the enemy."
 EFR_appeal_to_overseas_territories_tt:0 "Colonial territories in various parts of the world have a chance to switch to our side."
 EFR_intervention_in_north_africa:0 "Intervention In North Africa"
 EFR_intervention_in_north_africa_desc:0 "North Africa presents the best possible staging ground for an invasion to retake the homeland. Turning it to our side is vital for our campaign of liberation."
 EFR_intervention_in_west_africa:0 "Intervention In West Africa"
 EFR_intervention_in_west_africa_desc:0 "West Africa holds untold millions of inhabitants, who can be drafted into a new army to take back our homelands."
 EFR_intervention_in_syria:0 "Intervention In Syria"
 EFR_intervention_in_syria_desc:0 "Denying the enemy the strategic territories in Syria protects the Suez canal and dramatically improves our situation in the eastern Mediterranean."
 EFR_intervention_in_indochina:0 "Intervention In Indochina"
 EFR_intervention_in_indochina_desc:0 "Far away from the fighting in Europe, our colonies in Indochina are an ideal area to help us defend our interests in the region."
 EFR_intervention_in_central_africa:0 "Intervention In Central Africa"
 EFR_intervention_in_central_africa_desc:0 "Central Africa is of vital importance for the allied war effort, and could be seized as an important propaganda coup for us."
 EFR_intervention_in_madagascar:0 "Intervention In Madagascar"
 EFR_intervention_in_madagascar_desc:2 "Should the enemy be allowed to take and fortify Madagascar, we face catastrophe in the Indian Ocean. A quick and decisive action could ensure that the island remains on our side."
 EFR_form_the_national_committee:0 "Form the National Committee"
 EFR_form_the_national_committee_desc:0 "Few would have believed that our cause could succeed. But now we are at last strong enough to declare the formation of a fully-functional government-in-exile, ready to take control of any French territory liberated from the enemy."
 EFR_form_the_provisional_government_of_the_republic:1 "Form the Provisional Government"
 EFR_form_the_provisional_government_of_the_republic_desc:0 "With the liberation of Paris, we are no longer a government-in-exile. It is time to begin the difficult work of rebuilding our country."
 EFR_continue_the_fight:0 "Continue the Fight"
 EFR_continue_the_fight_desc:0 "Few soldiers have opted to join us so far, but those that we do have must be armed and equipped."
 EFR_the_free_french_navy:0 "The Free French Navy"
 EFR_the_free_french_navy_desc:0 "Our allies are locked in a desperate struggle for survival, for which the sea lanes are vital. We must do our part to help them."
 EFR_colonial_recruitment_desc:0 "With the homeland unavailable for recruitment, we must turn to our colonies for aid. Many of our subjects are willing to take up arms to fight for us."
 EFR_the_regiment_normandie:0 "The Regiment Normandie"
 EFR_the_regiment_normandie_desc:0 "It is vital that we French are seen to be fighting on all fronts. With the Soviets now engaged in combat against our common enemy, we could send a small group of fighter pilots to help them."
 EFR_refus_absurde:0 "Refus Absurde"
 EFR_refus_absurde_desc:0 "Even in the hour of defeat, the will to resist remains strong in some hearts. They will form the foundation of the resistance movement in the occupied territories."
 EFR_the_maquis:0 "The Maquis"
 EFR_the_maquis_desc:1 "The rural areas of France offer cover for anyone who wishes to escape from the occupier or their collaboratist lackeys. We should support the people who deny their labour to the enemy in an act of resistance, so that we may in time turn those areas into hotbeds of resistance."
 EFR_reach_out_to_trade_unions:0 "Reach Out To Trade Unions"
 EFR_reach_out_to_trade_unions_desc:0 "If we are to strike against the industries that have now been pressed into service by the enemy, having good communications with the workers there seems like the best way. They can delay or sabotage any production that takes place, far more efficiently than any outside force."
 EFR_cooperation_with_the_communists:0 "Cooperation With the Communists"
 EFR_cooperation_with_the_communists_desc:0 "In our common struggle, we must not refuse any ally that offers themselves - even if they may call themselves comrade."
 EFR_connections_to_industrialists:0 "Connections To Industrialists"
 EFR_connections_to_industrialists_desc:0 "While cooperation with the workers in the war industries helps, cooperating with the people who run the factories has benefits in and of itself."
 EFR_the_civil_and_military_organization:0 "The Civil And Military Organization"
 EFR_the_civil_and_military_organization_desc:0 "The many small groups that are carrying out acts of resistance are banding together to form a larger organization. We should give this our blessing."
 EFR_national_council_of_the_resistance_desc:0 "The resistance is growing stronger and stronger in France, and has become so powerful that it needs a new steering committee to coordinate its activities."
 EFR_national_uprising_desc:0 "The hour has come. Now is the time to pick up arms and step out from the shadows that have cloaked you for these many years!"
 EFR_french_forces_of_the_interior:0 "French Forces of the Interior"
 EFR_french_forces_of_the_interior_desc:1 "The resistance has thousands of men under arms, all across France. As we and our allies advance across the country, we will sweep them up and turn them into soldiers in our army."
 EFR_french_forces_of_the_interior_tt:0 "Creates weak infantry units in every liberated core state."
 EFR_naval_rearmament:0 "Naval Rearmament"
 EFR_naval_rearmament_desc:0 "Our shipbuilding industry has been left to languish while we focused on keeping pace with developments in other fields. As a result, we are now very much in danger of being outclassed by our rivals in the mediterranean and the Atlantic. We must invest more to make up for lost time."
 EFR_colonial_naval_bases:0 "Colonial Naval Bases"
 EFR_colonial_naval_bases_desc:0 "The key to global power projection is the ability to maintain a fleet far away from home waters. We have large colonial holdings already, now we must develop them to serve as refuelling and repair bases for our fleet."
 EFR_develop_colonial_dockyards:0 "Develop Colonial Dockyards"
 EFR_develop_colonial_dockyards_desc:0 "With the naval bases in various parts of our Empire enlarged and modernized, we can look at settling the necessary heavy industry and build the large docks necessary to construct ships overseas."
 EFR_the_old_school:0 "The Old School"
 EFR_the_old_school_desc:0 "Despite all advances in naval technology, the key element of sea power is still the capital ship acting with the support of other fleet units. Whether this capital ship is still the battleship or is the new aircraft carrier, we must further increase the size of our shipbuilding industry to ensure we can keep pace with other naval powers."
 EFR_carrier_planes:0 "Carrier Planes"
 EFR_carrier_planes_desc:0 "A carrier is only as good as its planes. Without modern planes, any carrier is a wasted investment."
 EFR_rush_the_richelieus:0 "Rush the Richelieus"
 EFR_rush_the_richelieus_desc:0 "With the situation in Europe becoming more and more desperate, we don't have time to build our new surface units through conventional means. We have to prioritize materials to get our new battleships into service as soon as possible."
 EFR_prioritize_the_joffre:0 "Prioritize the Joffre"
 EFR_prioritize_the_joffre_desc:0 "Our current carrier fleet is hopelessly outdated and outmatched by any potential enemy. We must ensure that a new carrier project is given top priority."
 EFR_the_young_school:0 "The Young School"
 EFR_the_young_school_desc:0 "Developments in aviation, submarines and torpedoes have made the capital ship obsolete. With our limited naval industry, we can not afford to waste time and money on building gigantic floating fortresses that are helpless against the threats of the modern naval battlefield. We should instead focus on improving efficiency to allow us to build more small vessels."
 EFR_undersea_combat:0 "Undersea Combat"
 EFR_undersea_combat_desc:0 "The submarine has come to maturity in the last decade. It now poses a lethal threat to any and all surface ships, while being increasingly difficult to detect and destroy."
 EFR_surface_combat:0 "Surface Combat"
 EFR_surface_combat_desc:0 "With advances in gunnery, it has become all but impossible to build a ship that can hope to survive a prolonged slugging match with another capital vessel. It is far better to have a fleet of modern destroyers and torpedo boats to overwhelm an enemy with massed salvos of torpedoes."
 EFR_prioritize_the_joffre_tt:0 "Adds a modern §YCarrier§! at 40% completion to the construction queue."
 EFR_revolutionary_zeal_desc:1 "The French people have always possessed a particular fervor for eradicating the old order and raising up the new. This should not be discouraged."
 EFR_loyalty_to_the_cause:0 "Loyalty To the Cause"
 EFR_loyalty_to_the_cause_desc:1 "Other countries may formulate their own visions of Communism, but there is no reason why we should compromise on ours. They may have stopped half-way, beset by doubt over whether the end justified the means. We won't."
 EFR_carry_the_revolution_north:0 "Carry the Revolution North"
 EFR_carry_the_revolution_north_desc:0 "Across the Channel lies the birthplace of the industrial revolution, and with it, the home of modern capitalism. We can not allow this place to become the springboard for a counter-revolutionary enemy."
 EFR_carry_the_revolution_west:0 "Carry the Revolution West"
 EFR_carry_the_revolution_west_desc:1 "The regimes of the Iberian peninsula are hanging on by a thread, ready to be swept away by a popular revolution. We will sever that thread."
 EFR_carry_the_revolution_east:0 "Carry the Revolution East"
 EFR_carry_the_revolution_east_desc:0 "At our eastern border lies the biggest threat to our new order. The reactionary forces assembled there will strike when we can least afford it - but only if we give them the time to prepare for it."
 EFR_carry_the_revolution_south:0 "Carry the Revolution South"
 EFR_carry_the_revolution_south_desc:0 "The first country to fall to fascism was Italy. As a result, the ideology is firmly entrenched in Italy. Our world-views can not peacefully coexist. They know this as well as we do, and will no doubt prepare to act. So must we."
 EFR_egalite_liberte_solidarite_desc:1 "The first French Revolution swept away regimes that had lasted for a millennia, and changed the landscape of Europe forever. We will finish what they started."
 EFR_reform_the_labour_laws:0 "Reform the Labour Laws"
 EFR_reform_the_labour_laws_desc:0 "The workers of France labour under harsh conditions, with low pay and few benefits. It is time to implement a comprehensive suite of reforms to improve their lot."
 EFR_nationalize_key_industry:0 "Nationalize Key Industries"
 EFR_nationalize_key_industry_desc:0 "In the present situation, we must not shy away from radically restructuring our economy to meet the oncoming threat. Time is short - we can not wait for the free market to solve the issue."
 EFR_reorganize_the_aviation_industry:0 "Reorganize the Aviation Industry"
 EFR_reorganize_the_aviation_industry_desc:0 "Split into dozens of tiny companies, our aviation industry is decades behind the industry in Germany and the US. Radical restructuring is needed."
 EFR_form_the_state_arsenals:0 "Form the State Arsenals"
 EFR_form_the_state_arsenals_desc:0 "To supply our army with modern weapons, we can not wait until private companies have developed the necessary production capacities."
 EFR_general_work_council:0 "General Work Council"
 EFR_general_work_council_desc:0 "We will create a national agency to handle disputes between employers and employees, and to ensure that our workers are employed in the most efficient manner possible."
 EFR_national_champions:0 "National Champions"
 EFR_national_champions_desc:0 "By selecting a few companies that have the potential to compete on a global level and supporting them to the highest degree, we can create a modern economy that is the equal of any other."
 EFR_dirigisme_desc:0 "While the full-on planned economy of the Soviet model is clearly too extreme a measure, a certain measure of planning and direction is needed to optimize our economy."
 EFR_ban_the_leagues:0 "Ban the Leagues"
 EFR_ban_the_leagues_desc:0 "The far-right leagues have been allowed to organize unchecked. While they are currently too weak to try a coup, there is no telling of what they might be able to do in the future. Best to dissolve them now."
 EFR_the_blum_viollette_proposal:0 "The Blum-Viollette Proposal"
 EFR_the_blum_viollette_proposal_desc:1 "The citizenship of the French Republic should be open to anyone who qualifies. Many of our loyal subjects in Algeria would like to become full citizens, but are not yet allowed to do so. By making them full citizens, we would bind Algeria much closer to France."
 EFR_expand_the_citizenship:0 "Expand the Citizenship"
 EFR_expand_the_citizenship_desc:0 "It is intolerable for a republic that some of the people living on her territory would not be allowed to become her citizens, yet this state of affairs has been allowed to persist in our own. We must rectify this at once."
 EFR_france_undividable_desc:0 "France must be formed into a single unit, under one flag. It is time we openly acknowledged this, if only to lay fears of division to rest."
 EFR_french_union:0 "French Union"
 EFR_french_union_desc:0 "It is time to proclaim a new France, a France that spans the globe, in which all parts of our realm are united. We will hold referendums in every part to confirm the people's will to become part of this new, greater France."
 EFR_french_union_tt:0 "Referendums in various parts of our colonial empire will be held. Some parts may chose to become fully independent instead."
 EFR_encourage_immigration:0 "Encourage Immigration"
 EFR_encourage_immigration_desc:1 "Our homeland is in desperate need of workers to make up for the losses incurred in the Great War. By making it easier to settle in France, we can attract the skilled immigrants that can make up for this shortfall."
 EFR_review_foreign_policy:0 "Review Foreign Policy"
 EFR_review_foreign_policy_desc:0 "The continental order that was established in 1919 looks increasingly under threat. It is time that we review our foreign policy options to secure new alliances to weather the coming storm."
 EFR_intervention_in_spain:0 "Intervention in Spain"
 EFR_intervention_in_spain_desc:0 "The civil war in Spain has brought the clash between ideologies to our very doorstep. We must tread carefully, lest the conflict spill over into our country."
 EFR_support_the_finns:0 "Support the Finns"
 EFR_support_the_finns_desc:0 "The Finnish are fighting for their lives. We must aid them."
 EFR_confirm_eastern_commitments:0 "Confirm Eastern Commitments"
 EFR_confirm_eastern_commitments_desc:0 "After the Great War, we set up a network of alliances in Eastern Europe, as a counter-weight to a resurgent Germany and an expansionist Soviet Union. Our allies in the region are now wondering if we would actually come to their aid if we were called. We should reassure them before they decide to seek help elsewhere."
 EFR_strengthen_the_little_entente:0 "Strengthen the Little Entente"
 EFR_strengthen_the_little_entente_desc:0 "The Little Entente binds us to come to the aid of our allies in Eastern Europe and the Balkans. We have allowed this alliance to lapse, but it is needed now more than ever. It is time to revive it."
 EFR_invest_in_our_weaker_allies:0 "Invest In Our Weaker Allies"
 EFR_invest_in_our_weaker_allies_desc:0 "If we are to have capable allies in case of war, we must enable them to meet their own military needs. A program of moderate investments into their industry will allow them to produce the munitions they need locally."
 EFR_invest_in_our_weaker_allies_trigger_tt:0 "Has fewer military factories than us"
 EFR_coordinate_rearmament:0 "Coordinate Rearmament"
 EFR_coordinate_rearmament_desc:0 "To match the unified development process of the Germans and our other opponents, we must also coordinate our efforts with our allies."
 EFR_foreign_guest_workers:0 "Foreign Guest-Workers"
 EFR_foreign_guest_workers_desc:0 "Our lack of workers is a major bottleneck in expanding our industry and growing the size of our armed forces. Inviting skilled workers from our allies to work in our factories frees up manpower to send into the army."
 EFR_join_the_ententes:0 "Join the Ententes"
 EFR_join_the_ententes_desc:1 "France can not sustain two commitments of mutual defense at the same time. Unless we can get the British to agree to honor our commitments as well, we would have to choose. By combining our disparate networks of alliances into a single whole, we increase the deterrence factor of our alliances by an order of magnitude."
 EFR_revive_the_franco_polish_alliance:1 "Revive the Franco-Polish Alliance"
 EFR_revive_the_franco_polish_alliance_desc:0 "France has always supported an independent Poland. In recent years, relations between our countries have cooled a little. With the threat of Germany on the horizon, it is time to rekindle our pact."
 EFR_revive_the_franco_polish_alliance_tt:0 "\nPoland would be invited into our faction if we were leaders of our own faction."
 EFR_buy_time:0 "Buy Time"
 FRA_autoroutes_tt:0 "The earlier we take this focus, the better our infrastructure development will be, but France will also get extra building slots in Gabon if we take this focus before 1939. They get six extra slots if it is taken before 1938, and three extra slots if it is taken between 1938 and 1939, and zero thereafter.\n\n"
 EFR_buy_time_desc:0 "We are not ready to face the Germans in the field. Our allies are weak, our military is outdated. We might have to make some sacrifices if we want to survive."
 EFR_arms_purchases_in_the_us:1 "Arms Purchases in the US"
 EFR_arms_purchases_in_the_us_desc:0 "Our military industry is simply not up to the task of supplying our forces with the necessary modern weapons. The US, however, has production capacity to spare. Unless they decide to return to their isolationism, it would seem that they could be persuaded to sell us the weapons we need."
 EFR_france_leads:0 "France Leads"
 EFR_france_leads_desc:0 "A nation with the proud history of France can not let other countries dictate her foreign policy. We will make our own choices, guided by our own interests."
 EFR_concessions_to_italy:1 "Concessions to Italy"
 EFR_concessions_to_italy_desc:0 "Italy still dreams of an empire in Africa. If we were to offer some concessions - and approve of her conquest of Ethiopia - we might prevent the forming of an axis between Rome and Berlin."
 EFR_ratify_the_stresa_front:0 "Ratify the Stresa Front"
 EFR_ratify_the_stresa_front_desc:0 "Italy has indicated that she would join our faction in return for territories in Africa. It is time to put pen to paper and ratify the necessary treaties."
 EFR_franco_soviet_treaty:1 "Franco-[SOV.GetAdjective] Treaty"
 EFR_franco_soviet_treaty_desc:1 "The [SOV.GetAdjective]s are just as worried about the rise of fascism in Europe as we are. Perhaps we could convince them to support us if the time came."
 EFR_revive_the_national_bloc:0 "Revive the National Bloc"
 EFR_revive_the_national_bloc_desc:0 "The political landscape is growing more and more radical by the day. The left whispers of making common cause with the communists. What is needed now is strong, stable leadership."
 EFR_laissez_faire:0 "Laissez-Faire"
 EFR_laissez_faire_desc:0 "The Communists openly talk about remodelling the economic structure of our country in some radical way, of depriving the hard-working man of his rightful property. Against this, we will set the simple notion of freedom. A dynamic economy will always outperform a leftist nightmare of strangulating red tape."
 EFR_protect_the_rights_of_man:0 "Protect the Rights of Man"
 EFR_protect_the_rights_of_man_desc:0 "They may never say it openly, but it is obvious to anyone with eyes to see: curtailing the right to property is just the first step to eliminating all the rights our proud ancestors fought so hard for. We will not have it!"
 EFR_freedom_front:0 "Freedom Front"
 EFR_freedom_front_desc:0 "When faced with the chaos and upheaval the communists promise, one must be willing to make alliances with other parties, even those that one might find personally reprehensible."
 EFR_stimulate_the_dynamic_market:0 "Stimulate the Dynamic Market"
 EFR_stimulate_the_dynamic_market_desc:0 "The dynamic market has been proven to be the most efficient form of economic organization. But it is still run by humans, and human beings sometimes need some reassurances that their hard work will not be in vain. By legislating away some restrictions and giving guarantees, we can help investors overcome their fears and help stimulate our economy."
 EFR_agricultural_protectionism_desc:0 "The world economy has grown more and more hostile to our traditional ways of production. If we do not take measures to protect our farmers, we will soon face a crisis of untold proportions as our farmers are unable to remain competitive in the face of mass-produced foodstuffs coming in from overseas."
 EFR_economic_devolution:0 "Economic Devolution"
 EFR_economic_devolution_desc:0 "It is absurd to think that some bureaucrat in Paris knows what is best for a company in Bordeaux. We must trust our entrepeneurs and empower them to create their own solutions."
 EFR_promote_entrepeneurship:0 "Promote Entrepeneurship"
 EFR_promote_entrepeneurship_desc:0 "The beating heart of a dynamic market has always been the individual who, upon seeing an opportunity, moves quickly to exploit it. In recent years, this spirit has been smothered with unnecessary regulations. We should roll them back."
 EFR_utilize_the_leagues:0 "Utilize the Leagues"
 EFR_utilize_the_leagues_desc:0 "It is a sad fact that political violence has become commonplace in France. If the country is to survive the threat of communist revolution, we must not shy away from the help of people who can and will meet the communist thugs in the street if it comes to that."
 EFR_national_regeneration:0 "National Regeneration"
 EFR_national_regeneration_desc:0 "An excess of democracy and misguided republicanism have poisoned our country and divided our people. It will take a long time to heal these wounds, but at ast the first steps have been taken."
 EFR_national_regeneration_trigger_tt:0 "The combined total of Unaligned and Fascist support is over 50%"
 EFR_destroy_decadence:0 "Destroy Decadence"
 EFR_destroy_decadence_desc:1 "No country has ever been great if it allowed itself to debate even the tiniest issue for months. Some countries, secure behind oceans and supported by global empires, may believe that they can afford this luxury. We can not."
 EFR_integralism:0 "Integralism"
 EFR_integralism_desc:0 "The ideology of integralism states that all aspects of society must come together and work as if they were one small piece of a larger whole. This society must be well ordered, to ensure that all parts of it work together in harmony."
 EFR_work:0 "Work"
 EFR_work_desc:0 "The craftsman is the most important component of the economy. When guided by the right people, there is no nobler call than to place one's labour in service of one's country."
 EFR_family:0 "Family"
 EFR_industrial_expansion_tt:0 "If this focus is completed before 1938, we will receive three civilian factories after the Armistice for each state marked in the previous two focuses. If completed between 1938 and 1939, the amount will be two per marked state and after 1939, but before the Armistice, it will only be one per state. France will receive half as many civilian factories upon the completion of this focus in Gabon.\n\n"
 EFR_military_factories_tt:0 "If this focus is completed before 1938, we will receive four military factories after the Armistice for each state marked in the previous two focuses. If completed between 1938 and 1939, the amount will be three per marked state and after 1939, but before the Armistice, it will only be two per state. France will receive enough equipment to equip two to three infantry divisions per military factory promised.\n\n"
 EFR_family_desc:0 "The smallest unit in society is not the individual - it is the family. To dispute this simple and obvious fact was the biggest flaw of the old republic."
 EFR_fatherland:0 "Fatherland"
 EFR_fatherland_desc:0 "The country stands above all else. There can be no doubt about this."
 EFR_political_unity:0 "Political Unity"
 EFR_political_unity_desc:1 "The history of France since the fall of absolutism has been a story of political infighting. When there was unity - France was victorious. When there was internal strife - France was defeated. For this reason, we can not allow the ambitions of the few to harm the livelihood of the many."
 EFR_diplomatic_freedom:0 "Diplomatic Freedom"
 EFR_diplomatic_freedom_desc:1 "The republican governments have shackled themselves to artificial constructs in Eastern Europe who will fall the moment we withdraw our aid. They are liabilities, not assets, and as such we will divest ourselves of them."
 EFR_latin_entente:0 "Latin Entente"
 EFR_latin_entente_desc:1 "The brotherhood that exists between the successor states of the Roman Empire is undeniable. The Germanic people of Europe have ruled the continent for too long. It is time that we reclaimed our national birthright."
 EFR_reach_out_to_spain:0 "Reach Out To Spain"
 EFR_reach_out_to_spain_desc:0 "Freshly recovered from its civil war, Spain is our natural ally in our attempt to reshape the continent."
 EFR_invite_portugal:0 "Invite Portugal"
 EFR_invite_portugal_desc:1 "While her colonial empire has been much diminished, the flame of exploration and conquest still burns in the heart of every Portuguese."
 EFR_compensate_italy:0 "Compensate Italy"
 EFR_compensate_italy_desc:0 "In the past, conflicts over some tiny stretches of desert have drawn our nations into conflict. Such nonsense is easily stopped, and a mutually agreeable outome can quickly be found."
 EFR_intervention_in_greece:0 "Intervention in Greece"
 EFR_intervention_in_greece_desc:0 "Greece controls some of the most valuable territory in the Mediterranean. We can not allow a hostile government to have control of it, and so we must act first."
 EFR_the_congress_of_paris:0 "The Congress of Paris"
 EFR_the_congress_of_paris_desc:0 "In the Congress of Berlin, the borders of Africa were shaped. But the map today looks like a patchwork. It is time to redraw the map, and thus form the basis for a new colonial empire."
 EFR_the_natural_borders_of_france:0 "The Natural Borders of France"
 EFR_the_natural_borders_of_france_desc:0 "It is only natural that a country should look to its own interests first. We can not peacefully coexist with the Germans in our struggle, and so we must secure our natural borders to defend our heartlands."
 EFR_towards_a_new_europe:0 "Towards a New Europe"
 EFR_towards_a_new_europe_desc:1 "France is at a crossroads. We can shackle ourselves to the old order, or we can embrace the new. With the Germans poised to remake the continent, it would be beneficial for us to be on their good side."
 EFR_establish_spheres_of_influence:0 "Establish Spheres of Influence"
 EFR_establish_spheres_of_influence_desc:1 "For centuries, our people have lived in the belief that we were mortal, hereditary enemies. This belief was founded in the idea that our interests were incompatible. But we could surely come to an agreement if we just defined our spheres of influence and studiously refrained from interfering."
 EFR_split_belgium:0 "Split Belgium"
 EFR_split_belgium_desc:0 "With Belgium now in our sphere of influence, it is time to call the French-speaking parts of it home. The rest will be formed into a new state."
 EFR_align_belgium:0 "Align Belgium"
 EFR_align_belgium_desc:0 "The Belgians owe their existence to us, and we can not let them forget that fact. If we let them remain independent, we will at the very least ensure that a friendly government is installed."
 EFR_grow_the_empire:0 "Grow the Empire"
 EFR_grow_the_empire_desc:0 "It is absurd that a country the size of Belgium would be allowed to retain a colony many times its size. We are far better suited to administer such a territory."
 EFR_bring_home_quebec:0 "Bring Home Quebec"
 EFR_bring_home_quebec_desc:0 "The province lost long ago will, in time, be ours again. All French-speaking people in the world will eventually be reunited with the fatherland."
 EFR_expand_to_the_suez:0 "Expand to the Suez"
 EFR_expand_to_the_suez_desc:0 "The division of control between us and Britain in the Levant is an unworkable compromise that we now, thankfully, no longer have to abide by."
 EFR_dominate_the_middle_east:0 "Dominate the Middle East"
 EFR_dominate_the_middle_east_desc:0 "The countries of the middle east are artificial constructs, carved from the corpse of the Ottoman Empire. They are no more sovereign than the average French village, and it is time to remind them of that fact."
 EFR_the_council_of_rambouillet:0 "The Council of Rambouillet"
 EFR_the_council_of_rambouillet_desc:0 "With the country in turmoil, the people look for a strong leader. It has become clear that Republicanism has failed the French people, and it is time for the natural rulers of France to return. But first, the groundwork must be laid for a restoration of the monarchy."
 EFR_revise_the_constitution:0 "Revise the Constitution"
 EFR_revise_the_constitution_desc:0 "The republican constitution was always intended to be a stopgap measure that has been allowed to persist for far too long. Now, we will rewrite it to allow a monarch to return."
 EFR_repeal_the_law_of_exile:0 "Repeal the Law of Exile"
 EFR_repeal_the_law_of_exile_desc:0 "No head of a French royal family, nor their heir, are allowed on French soil without express permission. Before we can have the triumphant return of the monarchy, we must dispose of this annoying little obstacle."
 EFR_orleanist_restoration:1 "Orléanist Restoration"
 EFR_orleanist_restoration_desc:2 "The House of Orléans commands considerable support amongst the royalists in France. While some detractors would prefer a different candidate for the throne, there can be little doubt that the Orleanist heir has the best chances to peacefully unite the country behind him."
 EFR_guarantee_the_constitution:0 "Guarantee the Constitution"
 EFR_guarantee_the_constitution_desc:0 "Before the republican press can even launch its unfounded campaigns against the legitimacy of royal rule, we must erode their standing by giving iron-clad guarantees to respect the individual rights of the people."
 EFR_the_first_citizen_of_the_state:0 "The First Citizen of the State"
 EFR_the_first_citizen_of_the_state_desc:0 "The king, while imbued with considerable power, must never be seen as a tyrant or absolutist ruler of the old kind. Instead, a modern monarch must respect the law and be the first line of defense against those that would usurp power illegally."
 EFR_counter_action_desc:0 "The Action Francaise has long been the strongest advocate for a return to the monarchy. Unfortunately, their views on other subjects are less palatable. It is time to inform them that they have served their purpose and dispose of them."
 EFR_no_further_humiliations:0 "No Further Humiliations"
 EFR_no_further_humiliations_desc:0 "For years, successive republican governments have allowed the Germans to run roughshod over international treaties, some of which were brazenly broken before the ink was even dry. This ends now."
 EFR_slum_clearing:0 "Slum Clearing"
 EFR_slum_clearing_desc:0 "Despite being in one of the great powers of the world, the simple French worker often lives in appalling conditions of disgusting squalor. No king worthy of the title can tolerate his subjects living in such a state."
 EFR_public_welfare:0 "Public Welfare"
 EFR_public_welfare_desc:0 "A king who does not work for the least of his subjects is no king at all."
 EFR_the_legitimate_heir:0 "The Legitimate Heir"
 EFR_the_legitimate_heir_desc:1 "The Legitimists consider the Carlist branch to be the legitimate heir to the throne of France. Appointing their candidate to the throne opens up the tantalizing possibility of ruling Spain and France in a double-monarchy."
 EFR_secure_the_crown_of_spain:0 "Secure the Crown of Spain"
 EFR_secure_the_crown_of_spain_desc:0 "The first step towards claiming the king's birthrights is to secure Spain from the various pretender governments that have sprung up. Their petty squabbles have thrown the country into a bloody civil war once already - we must not let them do so again."
 EFR_unite_the_crowns:0 "Unite the Crowns"
 EFR_unite_the_crowns_desc:0 "With Spain secured, we can now unite the crowns and create a new kingdom, the Kingdom of Franco-Spain."
 EFR_two_countries_two_crowns:0 "Two Countries, Two Crowns"
 EFR_two_countries_two_crowns_desc:0 "There is no feasible way in which we could unite the countries where one would not consider itself a subject of the other. We will instead advise the king to rule both in a personal, but not a legal, union."
 EFR_proclaim_the_third_empire:0 "Proclaim the Third Empire"
 EFR_proclaim_the_third_empire_desc:0 "The Bonapartists may be considered the outsiders in the struggle for the throne, but they carry with them the dream of a time when all of Europe bowed to the Emperor of the French."
 EFR_avenge_waterloo:0 "Avenge Waterloo"
 EFR_avenge_waterloo_desc:0 "The history of Napoleon the First will forever be defined by his greatest defeat. If we want to succeed, we must show that we can win where he has lost."
 EFR_reorganize_the_dutch:0 "Reorganize the Dutch"
 EFR_reorganize_the_dutch_desc:0 "The Dutch, too, were once part of the French Empire. Now that they have been defeated, it is time to return to this natural state of affairs."
 EFR_retribution_for_sedan:0 "Retribution For Sedan"
 EFR_retribution_for_sedan_desc:0 "For more than half a century, the Germans have celebrated the Battle of Sedan, and their triumph over Napoleon the Third there. In the future, every German will learn to curse the name of that place."
 EFR_disunite_germany:0 "Disunite Germany"
 EFR_disunite_germany_desc:0 "The triumph over France allowed Prussia to unite the smaller German states under her banner. It is only right that this process is reversed, now that the Germans have been defeated."
 EFR_return_to_borodino:0 "Return To Borodino"
 EFR_return_to_borodino_desc:0 "At Borodino, Napoleon came closest to achieving his victory in Europe. The Russian Army was all but destroyed, and had he been just a little faster, he could have brought the Russians to terms. We will show the world that it can be done."
 EFR_je_suis_la_deluge:1 "Je Suis Le Déluge"
 EFR_je_suis_la_deluge_desc:0 "The French revolution was the flood that swept away the old and weak regimes that had controlled Europe for so long. Now, a new flood is here."
 EFR_coordinate_rearmament_tt:0 "Reduces the cost of production licenses for members of our faction."
   EFR_metropolitan_france:2 "Invest in Metropolitan France"
 EFR_metropolitan_france_tt:0 "Not enough building slots for §YInfrastructure§! in Metropolitan France"
 EFR_metropolitan_france_desc:0 "La Métropole should always come first. We can start by improving our infrastructure to create jobs and enable faster troop deployment."
 EFR_algerie_france:2 "Invest in Algerian France"
 EFR_algerie_france_tt:0 "Not enough building slots for §YInfrastructure§! in Colonial France"
 EFR_algerie_france_desc:0 "Europe is facing dangerous times. We should focus on improving our lands to the south and ensure we can always support the mainland."
 EFR_industrial_expansion:0 "Industrial Expansion"
 EFR_industrial_expansion_desc:0 "We need a stronger industrial presence at home. We have plenty of labor ready, but need more factory lines."
 EFR_colonial_industry:0 "Colonial Industry"
 EFR_colonial_industry_tt:0 "Not enough building slots for §YCivilian Factories§! in Colonial France"
 EFR_colonial_industry_desc:1 "We should focus on our industries in the colonies. Should tensions increase in Europe we will still have an industrial capacity outside the reach of enemy bombers."
 EFR_military_factories:0 "Military Factories"
 EFR_military_factories_desc:1 "Our war-machine is falling behind in capacity. We need to focus on production of military equipment on home soil to make sure that our forces are constantly given new equipment."
 EFR_colonial_military_factories:0 "Colonial Military Factories"
 EFR_colonial_military_factories_tt:0 "Not enough building slots for §YMilitary Factory§! in Colonial France"
 EFR_colonial_military_factories_desc:0 "Placing our military production outside Europe ensures that even if the enemy gains control of our airspace, we will maintain a constant flow of equipment to our front-line troops."
 EFR_extra_research_slot:2 "Support the Grandes Écoles"
 EFR_extra_research_slot_desc:0 "Promising young minds are popping up everywhere. We need to supply them with facilities to conduct their research. Advances in technology can give us the edge where we most need it."
 EFR_nuclear_effort:0 "Nuclear Effort"
 EFR_nuclear_effort_desc:0 "Initial tests in nuclear science has shown promising results. Harnessing its power can give us a weapon unlike anything mankind has seen."
 EFR_jet_effort:0 "Jet Effort"
 EFR_jet_effort_desc:0 "Air combat is all about mobility. The jet engine is such a powerful advance that the enemy pilots will seem to stand still while we rip them out of the sky."
 EFR_extra_research_slot_2:2 "Form the National Research Center"
 EFR_extra_research_slot_2_desc:0 "Promising young minds are popping up everywhere. We need to supply them with facilities to conduct their research. Advances in technology can give us the edge where we most need it."
 EFR_defensive_focus:0 "Defensive Focus"
 EFR_defensive_focus_desc:0 "In times like these, it is best to strengthen our defenses. If there are threats, let them come to us so that we can deal with them on our own land. We have a perfect candidate to lead our army, all we need is your word."
 EFR_aggressive_focus:0 "Aggressive Focus"
 EFR_aggressive_focus_desc:0 "We cannot sit idly by as enemies move in on our borders. And we cannot leave our allies to fend for themselves in a war scenario. Prepare our army! Gamelin is the man for the job."
 EFR_fortification_focus:0 "Fortification Focus"
 EFR_fortification_focus_desc:0 "As critical as our forts have been, we need to find ways to construct them more efficiently. The Maginot line has been a powerful deterrent of enemy forces, we could use the security of more defenses like it."
 EFR_alpine_forts:0 "Alpine Forts"
 EFR_alpine_forts_desc:0 "The Italians won't cross the border so easily once we finish covering the Alps with our newly planned line of defense. We will have time to respond and reinforce our position."
 EFR_extend_the_maginot_line:0 "Extend the Maginot Line"
 EFR_extend_the_maginot_line_desc:0 "We cannot count on Belgium to hold their ground, if they let enemy armies through we might be in trouble. Extending the Maginot Line is crucial to keeping unwanted armies out of France!"
 EFR_infantry_focus:0 "Levée en masse"
 EFR_infantry_focus_desc:0 "All men and women who can fight will do so. Producing weapons in mass will lower the cost. We will put a rifle in the hands of everyone."
 EFR_artillery_focus:0 "Grande Batterie"
 EFR_artillery_focus_desc:0 "Our Artillery will form a single powerful unit to focus fire on specific points. One volley at a time and we will weaken the enemy line and punch our way through if we have to!"
 EFR_heavy_armor_focus:0 "Char de Bataille"
 EFR_heavy_armor_focus_desc:0 "Battle tanks are the way forward for the French Army. We want to control the battlefield and for this we will need new powerful tanks!"
 EFR_motorized_focus:0 "Motorized Focus"
 EFR_motorized_focus_desc:0 "Finding better ways to build our infantry vehicles will help our ability to support and reinforce the front lines."
 EFR_mechanized_focus:0 "Mechanized Focus"
 EFR_mechanized_focus_desc:0 "Armored vehicles play an increasingly important role in the war. While slightly less intimidating than your average tank, they give us an edge in communication, command, transport and urban warfare. "
 EFR_light_medium_armor:0 "Automitrailleuses"
 EFR_light_medium_armor_desc:0 "By law, the Infantry control all tank forces. The lighter, faster cavalry 'vehicles' or Automitrailleuses are better suited for travel and can still deal some damage with their mounted weapons."
 EFR_army_reform:0 "Army Reform"
 EFR_army_reform_desc:0 "No infantry unit or high tech tank alone will win us the war. We must put our efforts into developing both our tactical and strategical capabilities. With the right people on the job we can evolve as an army."
 EFR_navy_focus:0 "Navy Focus"
 EFR_navy_focus_tt:0 "Not enough building slots for §YNaval Base§!"
 EFR_navy_focus_desc:0 "If we plan to expand our navy the first step is to improve and expand our naval bases. Our unique ships require constant attention to stay combat ready at all times."
 EFR_improved_screen_ships:0 "Improved Screen Ships"
 EFR_improved_screen_ships_desc:0 "Destroyers and Lighter Cruisers play a key role in defending our heavier Battleships or Carriers. If we lose our line of defense at sea we risk all ships and men. We must make sure our ships are built with the latest technology."
 EFR_capital_ship_focus:0 "Capital Ship Focus"
 EFR_capital_ship_focus_desc:0 "Improving the design of our Battleships would lead to great tactical advantages. With their range and power uncontested, no one will be able to outrun their guns."
 EFR_carrier_focus:0 "Carrier Focus"
 EFR_carrier_focus_desc:0 "Naval theorists have directed our attention to our outdated Carriers. They have suggestions on how Carriers can be further utilized if development is pushed in the right direction. Real progress cannot be made without our full support."
 EFR_initiate_government_reform:0 "Government Reform"
 EFR_initiate_government_reform_desc:0 "The world has grown dangerous. We can no longer be tied down by our own petty squabbles. It is time to empower our politicians and move forward for the sake of France."
 EFR_support_the_left:0 "Support The Left"
 EFR_support_the_left_desc:0 "The Comintern is growing stronger. It is time to show that our interests can be aligned, and support our communist organizations."
 EFR_leftist_rhetoric:0 "Leftist Rhetoric"
 EFR_leftist_rhetoric_desc:0 "The goal is clear. Equality for all. We do not want capitalist interests in french politics. It is imperative that we give optimal conditions for our communist organizations to flourish."
 EFR_scw_intervention_republicans:0 "Republican Intervention"
 EFR_scw_intervention_republicans_desc:0 "Republican Spain needs our help! \nAnyone willing to fight for the cause should be allowed to. We cannot allow another fascist regime to gain ground."
 EFR_national_mobilization:0 "National Mobilization"
 EFR_national_mobilization_desc:0 "We finally have a government capable of taking action. Now it is time to strengthen our army and be prepared to fight for France."
 EFR_humanite_unie:0 "Humanité Unie"
 EFR_humanite_unie_desc:0 "The fat bankers and the powerhungry demagogues are strengthening their bloody grip on the world. With each passing day we see free men enslaved and the world plunged further into crisis, created by the greed of the individual. French ideals are needed more than ever! Humanity needs us and we need to unite humanity!"
 EFR_join_comintern:0 "Join Comintern"
 EFR_join_comintern_desc:0 "With enemies everywhere we turn, we need to strengthen our position with some powerful allies. Our ties with the Comintern has grown stronger and it is time to dedicate ourselves fully to their cause."
 EFR_support_status_quo:0 "Support The Status Quo"
 EFR_support_status_quo_desc:0 "France is the cradle and protector of liberty and should remain so. If we ever wish to achieve unity again, then we must stabilize our democracy before it dwindles."
 EFR_little_entente:0 "Little Entente"
 EFR_little_entente_desc:0 "The Little Entente, an alliance formed after the Great War to prevent aggression from Austria and Hungary to their neighbors, was supported by France, but has now began to fall apart. Instead of securing ties with Britain, we should take initiative to restore and consolidiate this faction, starting with its founders in Czechoslovakia."
 EFR_go_with_britain:0 "Go With Britain"
 EFR_go_with_britain_desc:0 "With Russia forever changed, only France and Britain remain of the old Triple Entente. If history is doomed to repeat itself, we must ensure that these two nations, bastions of democracy and liberty in Europe, remain Allies."
 EFR_strengthen_government_support:0 "Strengthen Government"
 EFR_strengthen_government_support_desc:0 "We have made plans for the following year that will meet the wishes of people in all parts of France. Show them that we are capable of action and worthy to rule France, so we can once again stand united."
 EFR_defensive_strategems:0 "Defensive Stratagems"
 EFR_defensive_strategems_desc:0 "If we want the people of France to fight a war for us it is more important than ever that we have a clear direction. We must stop fighting amongst ourselves and fight for France and "Liberté, égalité, fraternité" instead."
 EFR_invite_yugoslavia:0 "Invite Yugoslavia"
 EFR_invite_yugoslavia_desc:0 "Yugoslavia has enough concerns without having to worry about expansionist neighbors. Bringing them back into the Little Entente would be a great service to both them and ourselves."
 EFR_invite_romania:0 "Invite Romania"
 EFR_invite_romania_desc:0 "The Romanian democracy is fragile, caught between its internal fascist factions and Soviet communism. Bringing them into the Little Entente will allow them to retain stability with our backing."
 EFR_polish_guarantee:0 "Polish Guarantee"
 EFR_polish_guarantee_desc:0 "Polish diplomats have expressed concerns about the tension on their borders. A guarantee from our mighty nation should deter anyone planning an invasion."
 EFR_czech_guarantee:0 "Czech Guarantee"
 EFR_czech_guarantee_desc:0 "Tension is rising at the Czech border. We cannot allow expansive nations to take over a free and democratic nation. The Czechs must remain a free people. With a guarantee from us anyone planning an invasion will think twice."
 EFR_revise_versailles:0 "Revise Versailles"
 EFR_revise_versailles_desc:0 "The Germans are already ignoring the reparations stipulated by the Versailles Treaty, showing that France no longer inspires respect. If anything, we have the right to demand more for the lives lost in the Great War, but a just treaty would require a strong France, a new France, to enforce it."
 EFR_support_the_right:0 "Support The Right"
 EFR_support_the_right_desc:0 "France has always been a strong and proud nation, but the lack of government action has divided the people. We must unite France and assert our superiority and strength to avoid succumbing to decay."
 EFR_right_wing_rhetoric:0 "Right Wing Rhetoric"
 EFR_right_wing_rhetoric_desc:0 "We must focus on reaching every French and lift their national spirit. Show them that we can be the powerful leaders they need and they will become proud citizens of our glourious nation."
 EFR_scw_intervention_nationalists:0 "Nationalist Intervention"
 EFR_scw_intervention_nationalists_desc:0 " The Nationalists are finally gaining ground in Spain. Their cause is a righteous one and anyone willing to fight for them should be allowed to."
 EFR_army_of_aggression:0 "Army of Aggression"
 EFR_army_of_aggression_desc:0 "We can no longer sit behind an obsolete wall, while our enemies run rampant across Europe. It is time to strengthen our army and push our borders to ensure France continues to be a grand nation."
 EFR_france_first:0 "France First"
 EFR_france_first_desc:0 "We are France! Victors of the Great War! Saviours of Europe! We are home of the greatest thinkers this world has seen. Too many nations seek to plunge the world into chaos. We are needed, and we will heed the call. We will take the helm, weather the storm, and steer humanity to safety under our rule!"
 EFR_woo_italy:0 "Woo Italy"
 EFR_woo_italy_desc:0 "Italy has the potential to become a powerful nation. Thanks to the strong leadership of Mussolini the people of Italy are united and ready to fight for the right cause. Let that cause be ours."
 EFR_dismantle_the_democracies:0 "Dismantle the Democracies"
 EFR_dismantle_the_democracies_desc:0 "The new [GER.GetAdjective] democratic alliance in central Europe is threatening our new-found position. We must take action now, before they grow more powerful."
 EFR_join_germany:0 "Join Germany"
 EFR_join_germany_desc:0 "The German Reich is becoming a force to be reckoned with. Their vision of a better future can be aligned with our interests. We should support them and once the dust settles France will get its rightful piece of Europe."
 EFR_naval_doctrine:0 "Naval Doctrine"
 EFR_naval_doctrine_desc:0 "Recent progress in ship designs have opened up new options in tactical and strategical maneuvers. Before we take chances with these new theories we need to have them properly tested and plans solidified."
 EFR_air_focus:0 "Air Focus"
 EFR_air_focus_desc:0 "Time has come to expand on our air force! Plans have already been made to start construction of new Air Bases to support a big increase in both personnel and aircraft."
 EFR_cas_focus:0 "CAS Focus"
 EFR_cas_focus_desc:0 "Planes which provide support for our land forces and ships have been a very efficient addition at a relatively small investment. These planes now have several suggested improvements. Our engineers can develop the next generation of support aircraft."
 EFR_fighter_focus:0 "Fighter Focus"
 EFR_fighter_focus_desc:0 "Some revolutionary civilian engineering can be applied on our Fighters to improve their speed, range and max altitude. We need to focus on this if we want to keep up with the advancements made by others."
 EFR_bomber_focus:0 "Bomber Focus"
 EFR_bomber_focus_desc:0 "Air support is an important part of both our defensive and offensive capabilities. If we focus our efforts on developing fast, more agile and accurate bombers we will maintain an edge in any land battle."
 EFR_heavy_fighter_focus:0 "Heavy Fighter Focus"
 EFR_heavy_fighter_focus_desc:0 "Our Heavy Fighters must be able to support the more vulnerable bomber airplanes. This requires heavier armament and longer range at the cost of some speed."
 EFR_air_doctrine:0 "Air Doctrine"
 EFR_air_doctrine_desc:0 "We have gained enough experience to test new theories in air warfare at a faster pace. This will allow us to explore new tactical and strategic possibilities. Air combat is the key in modern warfare."
 EFR_heavy_bomber_focus:0 "Heavy Bomber Focus"
 EFR_heavy_bomber_focus_desc:0 "Modern heavy bombers will be armed to handle lesser aerial skirmishes on their own. If we allow our engineers to focus on developing the newest technology we will have a better chance of destroying enemy production facilities."
 EFR_naval_bomber_focus:0 "Naval Bomber Focus"
 EFR_naval_bomber_focus_desc:0 "Ships have proven exceptionally vulnerable to aircraft. We should keep improving on their technology to ensure we stay ahead of any countermeasures."
 ETH_research_slot:0 "Research Slot"
 ETH_research_slot_desc:0 "Research is key to winning every War!"
 ETH_imperial_road:0 "Build the Imperial Roads"
 ETH_imperial_road_desc:0 "We must connect our capital to our Ports!"
 ETH_equipment_effortb:0 "Post-Great War Artillery Developments"
 ETH_equipment_effortb_desc:0 "We must study recent advancements in artillery weaponry."
 ETH_equipment_effort_2b:0 "Artillery Effort"
 ETH_equipment_effort_2b_desc:0 "We must modernize our infantry divisions with quality artillery brigades."
 ETH_equipment_effort_3b:0 "Artillery Effort II"
 ETH_equipment_effort_3b_desc:0 "We must modernize our infantry divisions with quality artillery brigades."
 ETH_red_sea:0 "Guardian Of The Red Sea"
 ETH_red_sea_desc:0 "We must build a strong navy to gain supremacy in the red sea over our enemies"
 ETH_air_innovation:0 "Linea dell'Impero"
 ETH_air_innovation_desc:0 "Modern wars cannot be won without dominating the skies. We must do everything in our power to develop the air force!"
 ETH_force_labor:0 "Native Workers"
 ETH_force_labor_desc:0 "In order to boost our industries, we should hire the native population to work in our factories producing arms."
 ETH_force_labor2:0 "Expand Colonial Industry"
 ETH_force_labor2_desc:0 "We will expand our programs involving native worker."
 ETH_puntland:0 "Claim British and French Somaliland"
 ETH_puntland_desc:0 ""
 ETH_sudan_north:0 "Claim Khartoum"
 ETH_sudan_north_desc:0 ""
 ETH_sudan_south:0 "Claim Sudan"
 ETH_sudan_south_desc:0 ""
 ETH_kenya:0 "Claim British East Africa"
 ETH_kenya_desc:0 ""
 ETH_uganda:0 "Claim Uganda"
 ETH_uganda_desc:0 ""
 ETH_tanganyika:0 "Claim Tanganyika"
 ETH_tanganyika_desc:0 ""
 ETH_yemen:0 "Claim British Yemen"
 ETH_yemen_desc:0 ""
 ETH_equipment_effort:0 "Catch up on Rifle Technology"
 ETH_equipment_effort_desc:0 "The limits for what equipment can be carried by infantry are constantly being pushed. We will focus on giving our troops the best tools available."
 ETH_motorization_effort:0 "Motorization Effort"
 ETH_motorization_effort_desc:0 "Mobility and protection are crucial to get infantry into and out of the field safely. Focusing on these developments will allow us to take action quickly."
 ETH_doctrine_effort:0 "Doctrine Effort"
 ETH_doctrine_effort_desc:0 "The military doctrines that defined ground combat in the Great War are outdated. We must put our greatest minds to the task of shaping the military thought of tomorrow."
 ETH_equipment_effort_2:0 "Modernized Rifles"
 ETH_equipment_effort_2_desc:0 "We will continue our efforts to ensure our infantry are armed with the best possible guns of our time."
 ETH_mechanization_effort:0 "Mechanization Effort"
 ETH_mechanization_effort_desc:0 "Rethinking the possibilities of motorized infantry, we can push the limits of what vehicles can be constructed today."
 ETH_doctrine_effort_2:0 "Doctrine Effort II"
 ETH_doctrine_effort_2_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 ETH_doctrine_effort_3:0 "Doctrine Effort III"
 ETH_doctrine_effort_3_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 ETH_equipment_effort_3:0 "Experimental Rifles"
 ETH_equipment_effort_3_desc:0 "Instead of imitating or buying foreign equipment, we should aim to become world-leading in infantry weapons."
 ETH_armor_effort:0 "Armor Effort"
 ETH_armor_effort_desc:0 "Applying what we have learned from mechanizing our infantry, we can improve our armored vehicles as well."
 ETH_special_forces:0 "Special Forces"
 ETH_special_forces_desc:0 "We have need of elite forces; mountain troops and paratroopers should be our priority."
 ETH_aviation_effort:0 "Aviation Effort"
 ETH_aviation_effort_tt:0 "Not enough building slots for §YAir Base§!"
 ETH_aviation_effort_desc:0 "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
 ETH_fighter_focus:0 "Fighter Focus"
 ETH_fighter_focus_desc:0 "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
 ETH_bomber_focus:0 "Bomber Focus"
 ETH_bomber_focus_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
 ETH_aviation_effort_2:0 "Aviation Effort II"
 ETH_aviation_effort_2_desc:0 "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
 ETH_CAS_effort:0 "CAS Effort"
 ETH_CAS_effort_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
 ETH_rocket_effort:0 "Rocket Effort"
 ETH_rocket_effort_desc:0 "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
 ETH_NAV_effort:0 "NAV Effort"
 ETH_NAV_effort_desc:0 "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."
 ETH_naval_effort:0 "Naval Effort"
 ETH_naval_effort_tt:0 "Not enough building slots for §YNaval Dockyards§!"
 ETH_naval_effort_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
 ETH_industrial_effort:0 "Industrial Effort"
 ETH_industrial_effort_desc:0 "Focus all our political efforts on building up the civilian industry in a great leap forward."
 ETH_industrial_effort_2:0 "Industrial Effort II"
 ETH_industrial_effort_2_desc:0 "With iron will and a relentless work ethic, we can mobilize the people in another great industrial effort."
 ETH_construction_effort:0 "Imprese Elettriche d'Etiopia"
 ETH_construction_effort_tt:0 "Not enough building slots for §YCivilian Factories§!"
 ETH_construction_effort_desc:0 "We must build up our electrical grid within Ethiopia."
 ETH_production_effort:0 "Armament Effort"
 ETH_production_effort_tt:0 "Not enough building slots for §YMilitary Factory§!"
 ETH_production_effort_desc:0 "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 ETH_construction_effort_2:0 "Cementerie d'Etiopia"
 ETH_construction_effort_2_desc:0 "Cement production is necessary for facilitating the mass construction of factories and military facilities."
 ETH_production_effort_2:0 "Armament Effort II"
 ETH_production_effort_2_desc:0 "Trying to adapt civilian factories to produce military equipment is inefficient. We should focus on preparing military production now."
 ETH_production_effort_3:0 "Armament Effort III"
 ETH_production_effort_3_desc:0 "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 ETH_infrastructure_effort:0 "Infrastructure Effort"
 ETH_infrastructure_effort_desc:0 "A country without proper infrastructure cannot pursue advanced projects or constructions."
 ETH_infrastructure_effort_tt:0 "Not enough building slots for §YInfrastructure§!"
 ETH_infrastructure_effort_2:0 "Infrastructure Effort II"
 ETH_infrastructure_effort_2_desc:0 "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 ETH_construction_effort_3:0 "Trasporti Automobilistici (Citao)"
 ETH_construction_effort_3_desc:0 "We must develop our mechanic and transport industry so that we may easily traverse this land."
 ETH_nuclear_effort:0 "Nuclear Effort"
 ETH_nuclear_effort_desc:0 "Standing on the edge of a world-changing discovery, we cannot let others light the fire that may one day consume the Earth."
 ETH_extra_tech_slot:0 "Extra Research Slot"
 ETH_extra_tech_slot_desc:0 "Our industrial expansion and other recent advances might allow us to conduct more R&D in parallel."
 ETH_extra_tech_slot_2:0 "Extra Research Slot II"
 ETH_extra_tech_slot_2_desc:0 "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
 ETH_technology_sharing:0 "Technology Sharing"
 ETH_technology_sharing_desc:0 "By sharing technological advances with our allies, our whole faction will be able to conduct wartime R&D more efficiently."
 ETH_secret_weapons:0 "Secret Weapons"
 ETH_secret_weapons_desc:0 "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
 ETH_political_effort:0 "Political Effort"
 ETH_political_effort_desc:0 "To bring about change in the world, we need to be able to bring about change in our own country. Strengthening our political position should come first."
 ETH_collectivist_ethos:0 "Collectivist Ethos"
 ETH_collectivist_ethos_desc:0 "Our enemies may divide and conquer lesser nations, but our people will stand united. All for one and one for all."
 ETH_liberty_ethos:0 "Liberty Ethos"
 ETH_liberty_ethos_desc:0 "In this time of ideological fanatics who seek to suffocate the human spirit, we will safeguard individual liberties and freedom."
 ETH_militarism:0 "Militarism"
 ETH_militarism_desc:0 "Those who view the military as a necessary evil are doomed to hesitate in the face of war. We will ingrain militarism into our culture to become a people of soldiers."
 ETH_political_correctness:0 "Political Correctness"
 ETH_political_correctness_desc:0 "People holding mildly controversial or otherwise embarrassing opinions appear to be concerned that there is a wide-reaching conspiracy against them. This seems like an excellent idea."
 ETH_neutrality_focus:0 "Neutrality Focus"
 ETH_neutrality_focus_desc:0 "While others may claim it takes bravery and wisdom to take sides in a global conflict, we know it takes more to refuse."
 ETH_interventionism_focus:0 "Interventionism Focus"
 ETH_interventionism_focus_desc:0 "We value the freedom of all people, not only our own citizens. If preventing tyranny means war, then so be it."

 
 fin_army_effort_desc:0 "Despite the increasing possibilities of aerial and naval warfare, ground combat is still key in tomorrow's wars. With preparation, we can avoid reliving the hell of the trenches."
 fin_equipment_effort:0 "Equipment Effort"
 fin_equipment_effort_desc:0 "The limits for what equipment can be carried by infantry are constantly being pushed. We will focus on giving our troops the best tools available."
 fin_motorization_effort:0 "Motorization Effort"
 fin_motorization_effort_desc:0 "Mobility and protection are crucial to get infantry into and out of the field safely. Focusing on these developments will allow us to take action quickly."
 fin_doctrine_effort:0 "Doctrine Effort"
 fin_doctrine_effort_desc:0 "The military doctrines that defined ground combat in the Great War are outdated. We must put our greatest minds to the task of shaping the military thought of tomorrow."
 fin_equipment_effort_2:0 "Equipment Effort II"
 fin_equipment_effort_2_desc:0 "We will continue our efforts to ensure our infantry and support troops are armed with the best possible equipment of our time."
 fin_mechanization_effort:0 "Mechanization Effort"
 fin_mechanization_effort_desc:0 "Rethinking the possibilities of motorized infantry, we can push the limits of what vehicles can be constructed today."
 fin_doctrine_effort_2:0 "Doctrine Effort II"
 fin_doctrine_effort_2_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 fin_doctrine_effort_3:0 "Doctrine Effort III"
 fin_doctrine_effort_3_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 fin_equipment_effort_3:0 "Equipment Effort III"
 fin_equipment_effort_3_desc:0 "Instead of imitating or buying foreign equipment, we should aim to become world-leading in infantry weapons."
 fin_armor_effort:0 "Armor Effort"
 fin_armor_effort_desc:0 "Applying what we have learned from mechanizing our infantry, we can improve our armored vehicles as well."
 fin_special_forces:0 "Special Forces"
 fin_special_forces_desc:0 "We have need of elite forces; mountain troops and paratroopers should be our priority."
 fin_aviation_effort:0 "Aviation Effort"
 fin_aviation_effort_tt:0 "Not enough building slots for §YAir Base§!"
 fin_aviation_effort_desc:0 "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
 fin_fighter_focus:0 "Fighter Focus"
 fin_fighter_focus_desc:0 "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
 fin_bomber_focus:0 "Bomber Focus"
 fin_bomber_focus_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
 fin_aviation_effort_2:0 "Aviation Effort II"
 fin_aviation_effort_2_desc:0 "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
 fin_CAS_effort:0 "CAS Effort"
 fin_CAS_effort_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
 fin_rocket_effort:0 "Rocket Effort"
 fin_rocket_effort_desc:0 "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
 fin_NAV_effort:0 "NAV Effort"
 fin_NAV_effort_desc:0 "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."
 fin_naval_effort:0 "Naval Effort"
 fin_naval_effort_tt:0 "Not enough building slots for §YNaval Dockyards§!"
 fin_naval_effort_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
 fin_industrial_effort:0 "Industrial Effort"
 fin_industrial_effort_desc:0 "Focus all our political efforts on building up the civilian industry in a great leap forward."
 fin_industrial_effort_2:0 "Industrial Effort II"
 fin_industrial_effort_2_desc:0 "With iron will and a relentless work ethic, we can mobilize the people in another great industrial effort."
 fin_construction_effort:0 "Construction Effort"
 fin_construction_effort_tt:0 "Not enough building slots for §YCivilian Factories§!"
 fin_construction_effort_desc:0 "Civilian industrial capacity must not be underestimated even when war looms over the world."
 fin_production_effort:0 "Armament Effort"
 fin_production_effort_tt:0 "Not enough building slots for §YMilitary Factory§!"
 fin_production_effort_desc:0 "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 fin_construction_effort_2:0 "Construction Effort II"
 fin_construction_effort_2_desc:0 "Continuing to expand our factories will allow us to speed up production of goods for trade and further construction efforts."
 fin_production_effort_2:0 "Armament Effort II"
 fin_production_effort_2_desc:0 "Trying to adapt civilian factories to produce military equipment is inefficient. We should focus on preparing military production now."
 fin_production_effort_3:0 "Armament Effort III"
 fin_production_effort_3_desc:0 "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 fin_infrastructure_effort:0 "Infrastructure Effort"
 fin_infrastructure_effort_desc:0 "A country without proper infrastructure cannot pursue advanced projects or constructions."
 fin_infrastructure_effort_tt:0 "Not enough building slots for §YInfrastructure§!"
 fin_infrastructure_effort_2:0 "Infrastructure Effort II"
 fin_infrastructure_effort_2_desc:0 "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 fin_construction_effort_3:0 "Construction Effort III"
 fin_construction_effort_3_desc:0 "Expansion of our infrastructure network has significantly improved our capacity for construction."
 fin_nuclear_effort:0 "Nuclear Effort"
 fin_nuclear_effort_desc:0 "Standing on the edge of a world-changing discovery, we cannot let others light the fire that may one day consume the Earth."
 fin_extra_tech_slot:0 "Extra Research Slot"
 fin_extra_tech_slot_desc:0 "Our industrial expansion and other recent advances might allow us to conduct more R&D in parallel."
 fin_extra_tech_slot_2:0 "Extra Research Slot II"
 fin_extra_tech_slot_2_desc:0 "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
 fin_technology_sharing:0 "Technology Sharing"
 fin_technology_sharing_desc:0 "By sharing technological advances with our allies, our whole faction will be able to conduct wartime R&D more efficiently."
 fin_secret_weapons:0 "Secret Weapons"
 fin_secret_weapons_desc:0 "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
 fin_political_effort:0 "Political Effort"
 fin_political_effort_desc:0 "To bring about change in the world, we need to be able to bring about change in our own country. Strengthening our political position should come first."
 fin_collectivist_ethos:0 "Collectivist Ethos"
 fin_collectivist_ethos_desc:0 "Our enemies may divide and conquer lesser nations, but our people will stand united. All for one and one for all."
 fin_why_we_fight:0 "Why We Fight"
 fin_why_we_fight_effect:0 "If we don't have the §YNeutral Foreign Policy§! spirit we will be able to create factions.\n"
 fin_why_we_fight_desc:0 "The world is growing increasingly unsafe. Our people need to see the atrocities being committed by those who crave power. It is time we rally the people to our cause and ensure everyone is ready to fight for our freedom."
 fin_political_commissars:0 "Political Commissars"
 fin_political_commissars_desc:0 "To ensure that our policies are followed in military practice, we will introduce politically appointed officials into military ranks."
 fin_internationalism_focus:0 "Internationalism Focus"
 fin_internationalism_focus_desc:0 "Ideology knows no borders. Another nation may call itself sovereign, but our convictions are above such claims."
 fin_nationalism_focus:0 "Nationalism Focus"
 fin_nationalism_focus_desc:0 "Our nation is unique, and our political achievements could only have happened here. We must fight for it at any cost."
 fin_ideological_fanaticism:0 "Ideological Fanaticism"
 fin_ideological_fanaticism_desc:0 "Our politically established values and goals are worth dying for as much as any ancient faith. Any follower should be prepared to face death, and those who stray better be prepared to face death."
 GRE_metaxas:0 "George II and Metaxas"
 GRE_metaxas_desc:0 "With the help of our beloved king George II, Metaxas has been able to seize power by suspending parliament. We now finally have the chance to set up a conservative regime with a strong totalitarian leader, so that the people of Greece finally have someone to look upon."
 GRE_the_backbone_of_our_army2:0 "Greek Guns"
 GRE_the_backbone_of_our_army2_desc:0 "Our equipment is woefully outdated, it is the time to modernize our equipment with (French) Greek guns!"
 nor_drill_exile_army:0 "Drill Exile Army"
 nor_drill_exile_army_desc:0 "Daily drills and lectures on operational strategy, unit tactics, and marksmanship will equalize our training with that of the Wehrmacht."
 nor_operation_crofter:0 "Operation Crofter"
 nor_operation_crofter_desc:0 "It is time to embark on a way one trip back to Norway. We will liberate our homeland against the German menace or die trying!"
 nor_train_with_sas:0 "Joint Training with the SAS"
 nor_train_with_sas_desc:0 "By training jointly with our British counterparts we can field some of the deadliest soldiers in the world."
 nor_fleischers_plan:0 "Fleischer's Plan"
 GRE_new_weapons_old_tricks2:0 "The Graeco-Turkish War"
 GRE_new_weapons_old_tricks2_desc:0 "We had quite a bit of experience manning artillery and running recon during the Graeco-Turkish war of 1919-22. The technology might have changed, but the tactics surely have not, so equipment modernization is our way to go."
 GRE_rejuvenating_athens2:0 "Encourage Tourism"
 GRE_rejuvenating_athens2_desc:0 "Greece has, due to its rich history, impressive landmarks that will show the beauty of human civilization. But, people tend to forget our miraculous geographical situation. The nation contains a lot of natural beautiful landmarks. Let's exploit our advantageous situation."
 GRE_thema_nautikon2:0 "A Long Amphibious Tradition"
 GRE_thema_nautikon2_desc:0 "Our country exists out of our mainland and a big archipelago. As we're being one of the first civilizations of the world, we have some experience with fighting in these archipelago area's, let's learn from our past experiences."
 GRE_a_modern_navy2:0 "Inventors of Greek Fire"
 GRE_a_modern_navy2_desc:0 "Our ancestors, the well-remembered Byzantines, were the inventors of the revolutinary Greek Fire on our small, deadly galleys. Due to Greek Fire, we've dominated the naval regions around Constantinople for centuries. Let this naval innovativeness be resurrected!"
 GRE_a_land_of_mountains2:0 "Leonidas' Legacy"
 GRE_academy_of_athens2:0 "Birthplace Of Philosophy"
 GRE_academy_of_athens2_desc:0 "Greece is the birthplace of philosophy and has seen great scientists and philosophers; Aristotle, Plato, Socrates, Hippokrates, Zeno, Pythagoras, Anaxagoras, Democritus, to name a few."
 GRE_a_legacy_of_war2:0 "Alexander's Legacy"
 GRE_a_legacy_of_war2_desc:0 "Mégas Aléxandros, Basileús Makedónón, Strategos Autokrator Hellados, Pherón Aegyptou, Basileús Pérsón, Kyrios tés Asias, greatest of all time."
 GRE_a_long_and_proud_tradition2:0 "Themistokles' Legacy"
 GRE_atlantis:0 "The Lost Kingdom Of Atlantis"
 GRE_atlantis_desc:0 "The ancient Atlanteans were our long lost cultural forebearers. We must fleet back to the safety of Atlantis while our homeland is under occupation."
 GRE_an_orthodox_state2_desc:0 "Greece is the home base of the Orthodox Church, our forefathers, the Byzantines, introduced our great faith in 1054, after the Eastern Schism, let's make it clear once more to our people that the Orthodox church is intertwined with our national identity. Orthodoxy will be our guiding light in these desperate times!"
 GRE_an_orthodox_state2:0 "Greek Orthodoxy"
 GRE_island:0 "[GetAtlantisFocusName]"
 GRE_island_desc:0 "[GetAtlantisFocusDesc]"
 AtlantisHidden:0 "A Mysterious Fog..."
 AtlantisHiddenDesc:0 "An area of the Atlantic west of the Azores is drenched in a mysterious fog. The waters remain poorly charted due to harsh weather conditions and the remoteness of the location, but perhaps it will improve one day?"
 AtlantisSpotted:0 "A Mysterious Island..."
 AtlantisSpottedDesc:0 "A new island has been discovered in the Atlantic. We should send archeologists to find out more about this peculiar place..."
 gre_island_spotted:0 "Weather conditions have changed permitting further exploration..."
 GRE_island_tt:0 "\n§RBe sure to select this focus before Italy completes 'Balkan Dominance' or your game will be over!!!§!"
 GRE_reviving_the_spartan_warrior_spirit2:0 "Athena & Ares"
 GRE_reviving_the_spartan_warrior_spirit2_desc:0 "In these dark times, we need to get every help we can get if we want to ever reconquer our beloved homeland. We shall pray to our Ancient wardeities, Athena and Ares, so that we may feel their spirit inside us once more."
 GRE_a_long_and_proud_tradition2_desc:0 "This time Themistokles replied at length, and with venom directed against Adeimantos and the Corinthians; he declared that in fact the Athenians’ city and land were greater than theirs, as long as they had 200 ships of their own, fully manned, for none of the Hellenes could repulse them if they were to launch an assault. Herodotos, Historíai, deciding Athenian leadership at the Battle of Salamis."
 nor_fleischers_plan_desc:0 "A small, highly trained and elite force is what Norway needs to free our fatherland."
 nor_ruges_plan:0 "Ruge's Plan"
 nor_ruges_plan_desc:0 "A large, professionally trained conventional army can enable us to invade multiple regions in Norway at once and overwhelm the enemy."
 nor_winter_mountain_training:0 "Arctic Training"
 nor_winter_mountain_training_desc:0 "Norway is mostly cold mountains - the brave men of the Free Norwegian Forces need to acclimated to our home terrain. Thankfully, we can do this in Scotland."
 nor_norway_in_exile:0 "Free Royal Norwegian Forces"
 nor_norway_in_exile_desc:0 "Alt for Norge!"
 nor_norway_in_exile_navy:0 "Free Royal Norwegian Navy" 
 nor_norway_in_exile_navy_desc:0 "Alt for Norge!"
 nor_prepare_operation_crofter:0 "Preparing Operation Crofter"
 nor_prepare_operation_crofter_desc:0 "We must carefully plan our liberation - there won't be going back once the ships are out."
 nor_civillian_effort:0 "Plentiful Hydropower"
 nor_ski_inf:0 "Ski Infantry"
 nor_ski_inf_desc:0 "Forested, rural terrain with no roads are rough terrain for infantry in winter, but not for ski troops."
 nor_civillian_effort_desc:0 "Our numerous dams located throughout our country allow us to cheaply electrify the nation, allowing for more economic development."
 nor_military_effort:0 "Expand Kongsberg Gruppen"
 nor_military_effort_desc:0 "Kongsberg Gruppen, one of our largest Military Industries, need to be expanded incase of an invasion."
 nor_fullindustrial_effort:0 "Gather the Economic Reserves"
 nor_fullindustrial_effort_desc:0 "Citizens of Norway, as long as not everyone, not engaged in other affairs, is in a factory, our nation will surely fall!"
 nor_army_effort:0 "The Norwegian Army"
 nor_army_effort_desc:0 "Despite the increasing possibilities of aerial and naval warfare, ground combat is still key in tomorrow's wars. With preparation, we can avoid reliving the hell of the trenches."
 nor_equipment_effort:0 "Improve the Krag-Jorgensen"
 nor_equipment_effort_desc:0 "The limits for what equipment can be carried by infantry are constantly being pushed. We will focus on giving our troops the best tools available."
 nor_motorization_effort:0 "Post-Great War Artillery Developments"
 nor_motorization_effort_desc:0 "We must study recent advancements in artillery weaponry."
 nor_doctrine_effort:0 "Study Modern Doctrines"
 nor_doctrine_effort_desc:0 "The military doctrines that defined ground combat in the Great War are outdated. We must put our greatest minds to the task of shaping the military thought of tomorrow."
 nor_equipment_effort_2:0 "Support Focus Effort"
 nor_equipment_effort_2_desc:0 "We will continue our efforts to ensure our infantry are armed with the best possible support brigades of our time."
 nor_mechanization_effort:0 "Anti-Tank Effort"
 nor_mechanization_effort_desc:0 "We must protect our infantry divisions from tanks with all means neccesary."
 nor_doctrine_effort_2:0 "Tactical Advancements"
 nor_doctrine_effort_2_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 nor_equipment_effort_3:0 "The Norwegian Sturmgewehr"
 nor_equipment_effort_3_desc:0 "Instead of imitating or buying foreign equipment, we should aim to become world-leading in infantry weapons."
 nor_armor_effort:0 "Anti Air Effort"
 nor_armor_effort_desc:0 "We must protect our infantry divisions with quality Anti Air brigades"
 nor_tank_forces:0 "Expand our Tank Forces"
 nor_tank_forces_desc:0 "Nowadays, an army can not simply consist of immobile and weak foot soldiers. We need to mechanize and protect our infrantry with proper armor. "
 nor_special_forces:0 "Expand the Forsvarets Spesialkommando"
 nor_special_forces_desc:0 "We have need of elite forces; mountain troops and paratroopers should be our priority."
 nor_fighter_focus:0 "Fighter Focus"
 nor_fighter_focus_desc:0 "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
 nor_bomber_focus:0 "Bomber Focus"
 nor_bomber_focus_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
 nor_aviation_effort_2:0 "Aviation Effort II"
 nor_aviation_effort_2_desc:0 "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
 nor_CAS_effort:0 "CAS Effort"
 nor_CAS_effort_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
 nor_rocket_effort:0 "Rocket Effort"
 nor_rocket_effort_desc:0 "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
 nor_NAV_effort:0 "NAV Effort"
 nor_NAV_effort_desc:0 "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."
 nor_naval_effort:0 "Naval Effort"
 nor_naval_effort_tt:0 "Not enough building slots for §YNaval Dockyards§!"
 nor_naval_effort_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
 nor_flexible_navy:0 "Flexible Navy"
 nor_flexible_navy_desc:0 "Reinventing naval warfare to account for the advances in submarine technology will allow us to strike efficiently against enemy convoys."
 nor_large_navy:0 "Large Navy"
 nor_large_navy_desc:0 "Adapting our naval doctrines to accommodate large ships and ensuring the safety of our trade convoys will teach us much about what sort of ships we need."
 nor_submarine_effort:0 "Submarine Effort"
 nor_submarine_effort_desc:0 "Submarine warfare is the most exciting naval development since the invention of the torpedo boat. We would do well to not just protect against submarines, but also use them against enemy shipping."
 nor_cruiser_effort:0 "Cruiser Effort"
 nor_cruiser_effort_desc:0 "Before making forays into advanced battleship research, the smaller cruisers are in need of replacement."
 nor_destroyer_effort:0 "Destroyer Effort"
 nor_destroyer_effort_desc:0 "Studying the design and strategic use of submarines, we have also learned how to counter those strategies. Destroyers will be crucial for this."
 nor_capital_ships_effort:0 "Capital Ship Effort"
 nor_capital_ships_effort_desc:0 "The nation with the most battleships will rule the oceans. Battleships and carriers represent the old and the new in naval superiority."
 nor_industrial_effort:0 "Industrial Effort"
 nor_industrial_effort_desc:0 "Focus all our political efforts on building up the civilian industry in a great leap forward."
 nor_industrial_effort_2:0 "Industrial Effort II"
 nor_industrial_effort_2_desc:0 "With iron will and a relentless work ethic, we can mobilize the people in another great industrial effort."
 nor_construction_effort:0 "Construction Effort"
 nor_construction_effort_tt:0 "Not enough building slots for §YCivilian Factories§!"
 nor_construction_effort_desc:0 "Civilian industrial capacity must not be underestimated even when war looms over the world."
 nor_production_effort:0 "Armament Effort"
 nor_production_effort_tt:0 "Not enough building slots for §YMilitary Factory§!"
 nor_production_effort_desc:0 "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 nor_construction_effort_2:0 "Construction Effort II"
 nor_construction_effort_2_desc:0 "Continuing to expand our factories will allow us to speed up production of goods for trade and further construction efforts."
 nor_production_effort_2:0 "Armament Effort II"
 nor_production_effort_2_desc:0 "Trying to adapt civilian factories to produce military equipment is inefficient. We should focus on preparing military production now."
 nor_production_effort_3:0 "Armament Effort III"
 nor_production_effort_3_desc:0 "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 nor_infrastructure_effort:0 "Infrastructure Effort"
 nor_infrastructure_effort_desc:0 "A country without proper infrastructure cannot pursue advanced projects or constructions."
 nor_infrastructure_effort_tt:0 "Not enough building slots for §YInfrastructure§!"
 nor_infrastructure_effort_2:0 "Infrastructure Effort II"
 nor_infrastructure_effort_2_desc:0 "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 nor_construction_effort_3:0 "Construction Effort III"
 nor_construction_effort_3_desc:0 "Expansion of our infrastructure network has significantly improved our capacity for construction."
 nor_nuclear_effort:0 "Nuclear Effort"
 nor_nuclear_effort_desc:0 "Standing on the edge of a world-changing discovery, we cannot let others light the fire that may one day consume the Earth."
 nor_extra_tech_slot:0 "Extra Research Slot"
 nor_extra_tech_slot_desc:0 "Our industrial expansion and other recent advances might allow us to conduct more R&D in parallel."
 nor_extra_tech_slot_2:0 "Extra Research Slot II"
 nor_extra_tech_slot_2_desc:0 "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
 nor_technology_sharing:0 "The Norwegian School of Economics"
 nor_technology_sharing_desc:0 "After much lobbying and hard work, especially by Kristoffer Lehmkuhl, NHH was finally opened by King Haakon VII on Monday the September 7, 1936."
 nor_secret_weapons:0 "Electronics Development"
 nor_secret_weapons_desc:0 "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
 nor_political_effort:0 "Strengthen Nygaardsvold's Cabinet"
 nor_political_effort_desc:0 "To bring about change in the world, we need to be able to bring about change in our own country. Strengthening our political position should come first."
 nor_collectivist_ethos:0 "Collectivist Ethos"
 nor_collectivist_ethos_desc:0 "Our enemies may divide and conquer lesser nations, but our people will stand united. All for one and one for all."
 nor_liberty_ethos:0 "Liberty Ethos"
 nor_liberty_ethos_desc:0 "In this time of ideological fanatics who seek to suffocate the human spirit, we will safeguard individual liberties and freedom."
 nor_militarism:0 "Militarism"
 nor_militarism_desc:0 "Those who view the military as a necessary evil are doomed to hesitate in the face of war. We will ingrain militarism into our culture to become a people of soldiers."
 nor_political_correctness:0 "Political Correctness"
 nor_political_correctness_desc:0 "People holding mildly controversial or otherwise embarrassing opinions appear to be concerned that there is a wide-reaching conspiracy against them. This seems like an excellent idea."
 nor_neutrality_focus:0 "Proclaim Strict Neutrality"
 nor_neutrality_focus_desc:0 "While others may claim it takes bravery and wisdom to take sides in a global conflict, we know it takes more to refuse."
 nor_interventionism_focus:0 "Interventionism Focus"
 nor_interventionism_focus_desc:0 "We value the freedom of all people, not only our own citizens. If preventing tyranny means war, then so be it."
 nor_military_youth:0 "Military Youth"
 nor_military_youth_desc:0 "Organizations to promote discipline and political education of young people in our nation will foster loyalty and self-sacrifice early."
 nor_deterrence:0 "Deterrence"
 nor_deterrence_desc:0 "Standing alone, we rarely benefit from war. Fortunately, we know that the best defense is one so well-known you never have to put it to use."
 nor_volunteer_corps:0 "Volunteer Corps"
 nor_volunteer_corps_desc:0 "Forcing our people to die for ideals of freedom would be an exercise in irony, but establishing means for those who wish to aid people abroad is not."
 nor_paramilitarism:0 "Paramilitarism"
 nor_paramilitarism_desc:0 "Military principles have applications outside of the military. With the development of semi-militarized units to complement our armed forces, more people will have military training."
 nor_indoctrination_focus:0 "Indoctrination"
 nor_indoctrination_focus_desc:0 "Having established our ideology as based on the truth, it may be taught as truth. Education and media must reflect this lesson."
 nor_foreign_expeditions:0 "Foreign Expeditions"
 nor_foreign_expeditions_desc:0 "With our enemies prepared to intervene in distant conflicts on behalf of their ideals, we must be ready to do the same for ours."
 nor_why_we_fight:0 "Why We Fight"
 nor_why_we_fight_effect:0 "If we don't have the §YNeutral Foreign Policy§! spirit we will be able to create factions.\n"
 nor_why_we_fight_desc:0 "The world is growing increasingly unsafe. Our people need to see the atrocities being committed by those who crave power. It is time we rally the people to our cause and ensure everyone is ready to fight for our freedom."
 nor_political_commissars:0 "Political Commissars"
 nor_political_commissars_desc:0 "To ensure that our policies are followed in military practice, we will introduce politically appointed officials into military ranks."
 nor_internationalism_focus:0 "Internationalism Focus"
 nor_internationalism_focus_desc:0 "Ideology knows no borders. Another nation may call itself sovereign, but our convictions are above such claims."
 nor_nationalism_focus:0 "Nationalism Focus"
 nor_nationalism_focus_desc:0 "Our nation is unique, and our political achievements could only have happened here. We must fight for it at any cost."
 nor_ideological_fanaticism:0 "Ideological Fanaticism"
 nor_ideological_fanaticism_desc:0 "Our politically established values and goals are worth dying for as much as any ancient faith. Any follower should be prepared to face death, and those who stray better be prepared to face death."
 nor_narvik:0 "The Port of Narvik"
 nor_narvik_desc:0 "The Northern Port of Narvik is a vital point for the trade in the north, we can make the port a beachhead to retake our country."
 nor_coastal_forts:0 "Reinforce Oslo"
 nor_coastal_forts_desc:0 "We need to be ready if the Axis wants to invade our capital for a second time."
 nor_combine_training:0 "Combine Training"
 nor_combine_training_desc:0 "We can learn new forms of fighting with the British and they can also learn from ours."
 nor_king_speech:0 "A Brave King"
 nor_king_speech_desc:0 "Our brave king Haakon refuse to surrender and is insipirng the norwegians to resist and fight."
 nor_lower_recruitment_standars:0 "Lower Recruitment Standards"
 nor_lower_recruitment_standars_desc:0 "We need to expand conscription in order to field a large enough army to liberate teh homeland, but our remaining candidates are either too old or not physically fit enough for service. By lowering standards, we can expand the army in exchange for a drop in quality."
 nor_greenland:0 "Take Over Greenland"
 nor_greenland_desc:0 "We must unite our nordic brothers of Greenland to fight against the Germans."
 nor_iceland:0 "Take Over Iceland"
 nor_iceland_desc:0 "We must unite our nordic brothers of Iceland to fight against the Germans."
 TIB_nothing:0 "Copying GDUs Code Into Horstorical Multiplayer"
 TIB_resource:0 "Looking for German and Soviet Iran front co-op"
 fin_continuation:0 "Continuation War"
 fin_continuation_desc:0 "We will liberate Karelia from the Red Menace.!"
 TIB_iraq:0 "Adding 6 tiles to Gibraltar micro"
 irq_rev:0 "Rally for Iraq!"
 irq_purge:0 "Purge the Opposition"
 irq_war:0 "The Attack on RAF Habbaniya"
 TIB_resource2:0 "D-Daying with Neville Chamberlain"
 uk_iraq_focus2:0 "Restore the Hashemite Dynasty"
 uk_iraq_focus2_desc:0 "Reinstalling the legitimate government of Iraq, the court of King Faisal II, will ensure the Allies easy access to a local supply of oil in the Mediterrenean theatre."
 TIB_resource5:0 "Rehosting in Road to 56"
 TIB_resource134:0 "Increasing US Consumer Goods to 97%"
 TIB_resource4:0 "Giving Germany 6 AA Research Bonuses"
 fin_soviet_threat:0 "The Bolshevist Threat"
 fin_soviet_threat_desc:0 "The Soviets know no limits - just because the Reds lost in the civil war doesn't mean Finland is safe from communism. This peace is merely a pause in war."
 fin_karelianism:0 "Suur-Suomi"
 fin_karelianism_desc:0 "Finland is not just a nation for Finns, but all Finnic peoples, and it is both our right and duty to see them reunited with their kin."
 fin_continuation_prep:0 "Lick Our Wounds"
 fin_continuation_prep_desc:0 "As long as we are patient, we will find an opportunity to liberate Karelia."
 TIB_resource11:0 "Adding SS Icons Everywhere"
 TIB_resource3:0 "High Castling Canada"
 irq_kuwait:0 "Claim Kuwait"
 TIB_resource20:0 "Setting All Division Symbols to NATO Standard"
 IRE_emergency:0 "Emergency Powers Act"
 IRE_emergency_desc:0 "War sweeps Europe, and Ireland is in danger. We must declare a state of emergency and protect the Irish state."
 TIB_resource1337:0 "Establishing Horstlandia"
 TIB_resource1338:0 "Enabling Kamikaze on Bulgaria"
 SOV_docking:0 "Allow the Royal Navy Basing in Murmansk"
 SOV_docking_desc:0 "With the Red Navy deployed to Leningrad we cannot spare any ships to protect trade and supply in the Artic. We must allow the Royal Navy basing rights to Murmansk to facilitate this."
 SOV_mongolian_aid:0 "Receive Aid from Mongolia"
 tur_divide_by_zero:0 "Maintaining Neutrality"
 SOV_mongolian_aid_desc:0 "With our military understaffed and equipped we need to seek outside help for making it combat ready."
 TIB_anti_meme1:0 "Allowing Player Netherlands"
 TIB_anti_meme2:0 "Deleting Canada's Mills"
 TIB_resource312:0 "Holding the de Gaulle Line"
 ETH_army_effort:0 "Army Effort"
 ETH_army_effort_desc:0 "Despite the increasing possibilities of aerial and naval warfare, ground combat is still key in tomorrow's wars. With preparation, we can avoid reliving the hell of the trenches."
 ETH_why_we_fight:0 "Why We Fight"
 ETH_why_we_fight_effect:0 "If we don't have the §YNeutral Foreign Policy§! spirit we will be able to create factions.\n"
 ETH_why_we_fight_desc:0 "The world is growing increasingly unsafe. Our people need to see the atrocities being committed by those who crave power. It is time we rally the people to our cause and ensure everyone is ready to fight for our freedom."

 ITA_italia_irredenta:0 "Italia Irredenta"
 ITA_italia_irredenta_desc:0 "Italia has been redeemed." 
 ITA_mediterranean_wall:0 "Mare Nostrum Wall"
 ITA_mediterranean_wall_desc:0 "We are at risk of invasion with the loss of our African colonies. Italy must defend its shores from foreign invaders."
 ROM_ig_farben_romania:0 "IG Farben Abt. Rumänien"
 ROM_ig_farben_romania_desc:0 "With a closer economic partnership with Germany comes many benefits, such as the opening of IG Farben facilities in Muntenia."
 continuous_recruitment_drive:0 "Recruitment Drive"
