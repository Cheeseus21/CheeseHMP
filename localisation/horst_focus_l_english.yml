 RAJ_nep_gurkhas:0 "§HEight§! mountaineer divisions will be recruited in §HKathmandu§! under our command."
 RAJ_viceroy:0 "The Viceroyalty of India"
 RAJ_viceroy_desc:0 "The Viceroy of India is the Crown's representative and has full authority to make decisions on behalf of the Crown. Alternatively called the 'Governor-General of India', the position of the Viceroy has been called into question by radicals from the Indian National Congress party."
 RAJ_guided_by_britain:0 "Strengthen Commonwealth Ties"
 RAJ_guided_by_britain_desc:0 "In staying close and loyal to the British Crown we can best lead the British Raj to a better future."
 RAJ_ban_the_quit_india_movement:0 "Ban the Quit India Movement"
 RAJ_ban_the_quit_india_movement_desc:0 "Gandhi's campaign for Indian Independence has reached a climax with a call for the British to leave India. Such calls against the empire must not be tolerated!"
 RAJ_the_x_force:0 "The X Force"
 RAJ_the_x_force_desc:0 "Regular Chinese near the Burma have the opportunity to retreat into our territory. If we accept them they will come under the control of our field commanders."
 RAJ_nepalese_gurkhas:0 "Nepalese Gurkhas"
 RAJ_nepalese_gurkhas_desc:0 "With the danger of Japan looming larger, we should consider sending out a request for assistance to the Kingdom of Nepal."
 viceroy_of_raj:0 "The Viceroy of India"
 ALLIES_ht_usa:0 "§HThree§! §Rveteran§! heavy tank divisions will be assembled in §HWashington§! under our command."
 ALLIES_lt_usa:0 "§HFive§! §Rveteran§! light tank divisions will be assembled in §HWashington§! under our command."
 ALLIES_mt_usa:0 "§HFour§! §Rveteran§! medium tank divisions will be assembled in §HWashington§! under our command."
 ALLIES_ht_eng:0 "§HThree§! §Rveteran§! heavy tank divisions will be assembled in §HLondon§! under our command."
 ALLIES_lt_eng:0 "§HThree§! §Rveteran§! light tank divisions will be assembled in §HLondon§! under our command."
 ALLIES_mt_eng:0 "§HThree§! §Rveteran§! medium tank divisions will be assembled in §HLondon§! under our command."
 ALLIES_army_eng:0 "§HEighteen§! §Rveteran§! ranger divisions will be assembled in §HLondon§! under our command."
 ALLIES_army_usa:0 "§HEighteen§! §Rveteran§! ranger divisions will be assembled in §HWashington§! under our command."
 ALLIES_marines_eng:0 "§HEight§! §Rveteran§! marine divisions will be assembled in §HLondon§! under our command."
 ALLIES_marines_usa:0 "§HEighn§! §Rveteran§! marine divisions will be assembled in §HWashington§! under our command."
 ALLIES_seamen_eng:0 "An exiled fleet will be assembled in §HDover§! under our command."
 ALLIES_seamen_usa:0 "An exiled fleet will be assembled in §HWashington§! under our command."
 ALLIES_commonwealth_of_nations:0 "The [ENG.GetFactionName]"
 ALLIES_commonwealth_of_nations_desc:0 "The [ENG.GetFactionName] shall stand together!"
 ALLIES_joint_training_program:0 "Joint Training Program"
 ALLIES_joint_training_program_desc:0 "Through jointly conducted war games and training exercises we can hone our military skills."
 ALLIES_continue_the_fight:0 "Continue the Fight"
 ALLIES_continue_the_fight_desc:0 "We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields and in the streets, we shall fight in the hills; we shall never surrender!"
 ALLIES_continue_the_fight_navy:0 "Free [ROOT.GetAdjective] Navy"
 ALLIES_continue_the_fight_navy_desc:0 "As an exiled nation, we shall focus our efforts on creating and maintaining a fleet to assist the [ENG.GetFactionName] against the Axis."
 ALLIES_continue_the_fight_navy_seamen:0 "Seek Able-Bodied Seamen"
 ALLIES_continue_the_fight_navy_seamen_desc:0 "We will scrape together a small fleet based in an Allied port."
 ALLIES_continue_the_fight_navy_convoy:0 "Freedom Ships"
 ALLIES_continue_the_fight_navy_convoy_desc:0 "Production of convoys is necessary for the war effort. This is something we can easily help with."
 ALLIES_continue_the_fight_navy_marine:0 "Free [ROOT.GetAdjective] Marine Corps"
 ALLIES_continue_the_fight_navy_marine_desc:0 "We will establish a marine infantry corps that will be attached to our navy."
 ALLIES_continue_the_fight_army:0 "Free [ROOT.GetAdjective] Forces"
 ALLIES_continue_the_fight_army_desc:0 "The fight doesn't end with our capitulation - it is merely the beginning of a new chapter of this war!"
 ALLIES_continue_the_fight_army_spawn:0 "Mobilize Exiled Veterans"
 ALLIES_continue_the_fight_army_spawn_desc:0 "All [ROOT.GetAdjective] that managed to flee the fall of [Root.GetName] will be banded together into an army."
 ALLIES_continue_the_fight_army_sabotage:0 "Sabotage Captured Factories"
 ALLIES_continue_the_fight_army_sabotage_desc:0 "Resistance operatives will sabotage the industry we left behind to hamper the war effort of our enemy."
 ALLIES_continue_the_fight_army_volunteers:0 "Recruit Volunteers"
 ALLIES_continue_the_fight_army_volunteers_desc:0 "We will find our expatriates and recruit them into our army."
 ALLIES_eng_patron:0 "Seek British Expertise"
 ALLIES_eng_patron_desc:0 "We will see British expertise on desert warfare and military planning as well as study British industrial designs."
 ALLIES_usa_patron:0 "Learn from Americans"
 ALLIES_usa_patron_desc:0 "We will see American experience on jungle warfare and military planning as well as study American industrial designs."
 ALLIES_usa_dock:0 "Marine Warfare"
 ALLIES_usa_dock_desc:0 "We will study how to plan and launch naval invasions."
 ALLIES_eng_operations:0 "Lessons of the Great War"
 ALLIES_eng_operations_desc:0 "We will study British military planning from the Great War."
 ALLIES_eng_spec:0 "Desert Tactics"
 ALLIES_eng_spec_desc:0 "We will learn how to fight in deserts."
 ALLIES_usa_spec:0 "Ranger Tactics"
 ALLIES_usa_spec_desc:0 "We will learn how to fight in jungles."
 desert_tactics_allies_effect:0 "Enables §HDesert Training§!\n§HTanks, Armored Cars, and Infantry\n    Desert and Deep Desert§!\nDefense: §G+10%§!"
 jungle_tactics_allies_effect:0 "Enables §HRanger Training§!\n§HTanks, Armored Cars, and Infantry\n    Jungle and Forest§!\n      Attack: §G+5%§!"

 GER_luftwaffe_expansion:0 "Luftwaffe Expansion"
 GER_luftwaffe_expansion_desc:0 "Modern wars cannot be won without dominating the skies. We must do everything in our power to develop the air force!""
 GER_air_shield:0 "Flaktowers"
 GER_air_shield_desc:0 "Flaktowers, giant concrete towers laden with Flak anti-air artillery."
 GER_trust_in_the_luftwaffe:0 "Trust in the Luftwaffe"
 GER_trust_in_the_luftwaffe_desc:0 "Our brave aces and professional mechanic teams shall receive additional support and increase their cooperation with our research conglomerates to ensure that our tactics and equipment are up-to-date. We will put our full trust in Goering's Luftwaffe." 
 GER_volkssturmm:0 "Form Volkssturm Divisions"
 GER_volkssturmm_desc:0 "Forming a levée en masse national militia will allow us to turn the tide of the war against the Soviets and Allies."
 GER_ss_focus:0 "Schutzstaffel"
 GER_prepare:0 "Prepare for the Inevitable"
 GER_jag:0 "Totaler Krieg!"
 GER_riga:0 "Battle of Pskov"
 GER_riga_desc:0 "By launching our attack from the North we will be able to cut off the Soviet Union from the Baltic Sea and open the way to the attack on Leningrad "
 GER_kiev_desc:0 "By launching our offensive from the south, we will be able to occupy important naval bases in the Black Sea, as well as important industrial zones in the Donbass, which will undermine the military economy of the Soviet Union"	
 GER_kiev:0 "Battle of Kiev"
 GER_vitebsk:0 "Battle of Smolensk"
 GER_vitebsk_desc:0 "By launching our attack on Moscow we will undermine the morale of the Soviet army , and we will be able to develop our offensive from here to the north or south."
 GER_prepare_desc:0 "I have long doubted whether to start in the West or in the East. But I did not create the Wehrmacht so that it would not strike. In me there was always an inner readiness for war. "
 GER_ss_focus_desc:0 "The Schutzstaffel, or "SS", is a paramilitary group that directly serves Adolf Hitler and the Nazi Party. What began as a simple security detachment for NSDAP meetings has grown under the leadership of Heinrich Himmler into a powerful and feared tool for Hitler's totalitarian regime."
 GER_winter:0 "§BWinter§! 1941-42"
 GER_winter_desc:0 "Because of the very hard frosts and the lack of winter clothing, our soldiers suffer great losses, which affects the course of the operation."
 GER_continuetheoffence:0 "Continue the offensive!"
 GER_continuetheoffence_desc:0 "Once we have replenished our supplies, we will be able to conduct offensive operations again."
 GER_halttheoffence:0 "Stop the offensive!"
 GER_halttheoffence_desc:0 "By stopping our offensive, we can replenish our supplies and give our men a rest so we can strike again."
 GER_entrenching:0 "Echeloned Defense"
 GER_entrenching_desc:0 "By building fortifications and conducting an echelon defense, we will not let the enemy break into our rear"
 GER_typhoon_desc:0 "We will try again to break through to Moscow, this time more prepared"
 GER_typhoon:0 "Operation §WTyphoon§!"
 GER_fallblau:0 "Operation §RBlau§!"
 GER_Leningrad:0 "Unternehmen Nordlicht"
 GER_Leningrad_desc:0 "By capturing Leningrad we can free up hundreds of thousands of troops for other offensive operations."
 GER_Moscow:0 "Capture Moscow"
 GER_Moscow_desc:0 ""
 GER_appointottoskorzeny:0 "Otto Skorzeny"
 GER_appointottoskorzeny_desc:0 "" 
 GER_Stalingrad:0 "Unternehmen Fischreiher"
 GER_Stalingrad_desc:0 "We must secure the southern basin of the Volga river."
 GER_fallblau_desc:0 "The offensive in this operation should be organized in such a way that the forces striking downstream of the Don would join in the Stalingrad area with those forces advancing from the area of Taganrog, Artemovsk between the lower reaches of the Don. Don and Voroshilovgrad across the Donets River to the east. These forces must then link up with the tank army advancing on Stalingrad."
 GER_citadel:0 "Operation §RCitadel§!"
 GER_citadel_desc:0 "Turning south and moving in a southerly direction must be accomplished by more than one division. An offensive in the northeastern (Prokhorovka direction. - Z.V.) is still possible now, but will be impossible later, as the enemy has concentrated new tank forces in this area (in the Prokhorovka area. - Z.V.). If the attack by the Z-th tank unit proves unsuccessful, it should go on the defensive and its units on the right flank (4th TD - ZV) or north of Oboyan can be used to develop the offensive in the western direction"
 GER_france_gg:0 "§gFall of France§!"
 GER_france_gg_desc:0 "After the fall of France, we can devote our forces to the formation of Volkssturm and SS battalions"
 GER_deployhitlerjugend:0 "To recruit the HitlerJugend"
 GER_deployhitlerjugend_desc:0 "By recruiting in the Hitler Jugend we can replenish the missing divisions with new manpower."
 GER_ardennesoffensive:0 "The Ardennes Offensive"
 GER_ardennesoffensive_desc:0 "After defeating the Allies at Ardennes, we can push them back to the sea, and then focus on the Eastern Front"
 GER_festungosteuropa:0 "Festung Ost-Europa"
 GER_festungosteuropa_desc:0 ""  
 GER_festungwesteneuropa:0 "Festung Westen-Europa"
 GER_festungwesteneuropa_desc:0 ""  
 GER_deployss:0 "SS Divisions"
 GER_deployss_desc:0 ""   
 GER_nebelwerfer42:0 "21cm Nebelwerfer 42"
 GER_nebelwerfer42_desc:0 ""
 GER_stg44:0 "StG 44"
 GER_stg44_desc:0 ""
 GER_puma:0 "Sd.Kfz. 234 Puma"
