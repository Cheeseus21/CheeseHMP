 USA_reorganization_act:0 "Reorganization Act"
 USA_reorganization_act_desc:0 "§RReorganization Act§! - This is quite a complicated procedure, which involves a complete or partial change of ownership of corporate rights, changing the organizational-legal form of the business, the elimination of individual units or the creation on the basis of one of several or the closure of the enterprise."
 USA_roosevelt_deal:0 "Roosevelt's New Deal"
 USA_roosevelt_deal_desc:0 "§RRoosevelt's New Deal§! - An economic and social program carried out by U.S. President F. Roosevelt's administration from 1933 to 1939, aimed both at overcoming the effects of the Great Depression and at structural reforms in industry, agriculture, finance, energy, and labor relations."
 USA_invest_in_north_east:0 "Invest In North-East"
 USA_invest_in_north_east_desc:0 "By investing in the Northeast we will be able to develop the steel deposits that we will need in the future "
 USA_the_bank_of_america:0 "Bank of America"
 USA_the_bank_of_america_desc:0 "§RBank of America§! - Will be able to store the gold reserves of our allies as well as give us and them loans for war."
 USA_invest_in_midvest:0 "Invest In Mid-West"
 USA_invest_in_midvest_desc:0 "By investing in a major U.S. industrial base, we can make it even stronger"
 USA_national_labour_act:0 "National Labor Relations Act"
 USA_national_labour_act_desc:0 "§RNational Labor Relations Act§! -This is a fundamental law in U.S. labor law. It guarantees the right of private sector employees to unionize, bargain collectively, and take collective action, such as strikes. " 
 USA_office_of_scientific_research_and_developmentx:0 "Scientific Research & Devolopment Office"
 USA_office_of_scientific_research_and_developmentx_desc:0 "With war looming on the horizon, we must focus on our scientific efforts to ensure that we are not outmached by any potential adversary."
 USA_increase_defence_budget:0 "Increase Defence Budget"
 USA_increase_defence_budget_desc:0 "By increasing our defense budget, we can attract more resources and people to defend our country"
 USA_vinsons_naval_act:0 "Vinson's Naval Act"
 USA_vinsons_naval_act_desc:0 "§RVinson's Naval Act§! - An Act to establish the composition of the United States Navy, to authorize the construction of certain naval vessels, and for other purposes."
 focus_on_asia:0 "Focus On Asia"
 focus_on_asia_desc:0 "By focusing on Asia, we can stop Japan from taking over the islands.."

 ROM_anti_air_modernization:0 "Develop the Burileanu II"
 ROM_anti_air_modernization_desc:0 "Our army has a dangerous reliance on foreign made anti-aircraft designs and production. We need to create a successor to the famous Burileanu anti-aircraft gun of the last war."
 ROM_protect_ploesti:0 "Protect the Ploiesti Oilfields"
 ROM_protect_ploesti_desc:0 "We will immediately begin construction on a modern network of anti-aircraft batteries around the Ploiesti oil fields."
 ROM_siebel:0 "The Siebel Ferry"
 ROM_siebel_desc:0 "We will receive makeshift ferries made by the Wehrmacht for Operation Sea Lion
 BUL_peace_tt:0 "\n§RWe will remain neutral with the Soviet Union!§R"
 pick_trotsky_tt:0 "If we complete the focus §HThe Permanent Revolution§! we will release the following political advisors:"
 pick_soviet_tt:0 "\nIf we complete the focus §HEmpower the Soviets§! and §HSocialist Humanism§! we will release the following political advisors:"
 pick_soviet2_tt:0 "\nIf we complete the focus §HEmpower the Soviets§! and §HBack to the NEP§! we will release the following political advisors:"
 permanent_revolution_tt:0 "\n§RWe will break off diplomatic relations with all non-communist states, preventing us from licensing foreign technology, receiving Allied lend-lease!, and trading with the Allies§!"
 SOV_release_innocents:0 "Release the Innocent"
 SOV_release_innocents_desc:0 "Too many of our comrades have been exiled or imprisoned by Stalin. We must release them and welcome them back to the motherland."
 ENG_mince:0 "Operation Mincemeat"
 ENG_mince_desc:0 "In order to successfully stage an invasion of Europe we must conceal our movements and plans. Planting false plans on the bloated corps of a homelessman dressed as an army Captain might just fool the Germans."
 HUN_convert_horthy_ii:0 "Proclaim the Apostolic Kingdom"
 HUN_convert_horthy_ii_desc:0 "We have succeeded in growing to gigantic might, all with the help of the holy crown. We now have the right to proclaim the apostolic kingdom, the heavenly country on earth, which is the link between earth and heaven and represents gods might on earth. We are the defenders of christianity and of the holy church and will be until the end of time.  "
 HUN_mission_to_germany_1:0 "Diplomatic Mission to Germany"
 HUN_mission_to_germany_1_desc:0 "It is clear that the only way forward for Hungary is together with Germany under a German noble. We should send a delegation to Germany to discuss the future of our two countries and to assure them that we are their friends. They offer us help with our revision and are willing to buy our products, so it is only logical to show them we appreciate their help."
 HUN_the_kings_guard_1:0 "The King's Guard"
 HUN_the_kings_guard_1_desc:0 "Over the hundreds of years, all Hungarian kings had their own kings guard, and this trend is to be found outside of Hungary, nearly everywhere in the world. We shall establish the Kings Guard, a paramilitary organisation aimed at the protection of our king, consisting of the very elite of the Honvéd."
