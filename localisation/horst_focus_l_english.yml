 JAP_claim_the_kyokuto:0 "Claim the Kyokutō"
 JAP_claim_the_kyokuto_TRIG1:0 "§HWe§! or our §HPuppets§! controls all states from §HTannu Tuva§!, §HBratsk§! and §HKirensk§! to the East."
 JAP_claim_the_kyokuto_EXPL1:0 "Gain all former territory of [SOV.GetFlag]§H[SOV.GetName]§! in Outer Manchuria."
 JAP_claim_the_kyokuto_EXPL2:0 "Gain all former territory of [SOV.GetFlag]§H[SOV.GetName]§! in Mongolia and Tanu Tuva."
 JAP_claim_the_kyokuto_EXPL3:0 "Gain all former territory of [SOV.GetFlag]§H[SOV.GetName]§! in Siberia."
 JAP_claim_the_kyokuto_EXPL4:0 "Gain all former territory of [SOV.GetFlag]§H[SOV.GetName]§! in Far East."
 JAP_claim_the_kyokuto_desc:0 "The rising sun illuminates Siberia, marking the Kyokutō's destiny with Japan. Once a Tsarist frontier, now it echoes the spirit of Nippon. Our soldiers' advance cements our stewardship of this eastern realm. Japan's legacy is now intertwined with Siberia's vast expanse."
 
