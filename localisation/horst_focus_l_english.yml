RAJ_Joint_Indo_Soviet_Railways:0 "Joint Indo-Soviet Railways"
RAJ_Joint_Indo_Soviet_Railways_desc:0 "In the spirit of international collaboration and cooperation, [RAJ.GetNameDef] and [SOV.GetNameDef] will join forces to embark on a joint railway project. This project will be an extensive and long term endeavor, creating a network of railway systems that will connect both nations and promote economic growth and development. This joint effort will further strengthen the long-standing and mutually beneficial relationship between our two countries, and will bring us closer to our shared goal of a brighter future for all. The only obstacle currently in the way of mutual prosperity is the political situation in [AFG.GetNameDef], but diplomatic pressure shall surely settle that qualm."
