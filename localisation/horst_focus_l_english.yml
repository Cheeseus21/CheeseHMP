 GER_steinercounteroffensive:0 "Steiner's Counter Offensive"
 GER_steinercounteroffensive_desc:0 "With the huge salient created by Zhukov's 1st Belorussian Army, The 9th army is to push south of the salient, meanwhile Obergruppenführer Felix Steiner alongside his newly recovered detachment are to push north-east of berlin and encircle Zhukov's army and then proceed to push them back to 1941 Borders, For these are the Fuhrer's orders, and in him we trust.  "
