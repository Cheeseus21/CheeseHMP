 JAP_ventures_in_timor:0 "Ventures in Timor"
 JAP_ventures_in_indonesia:0 "Ventures in the Dutch East Indies"
 JAP_occupied_timor:0 "Occupied Timor"
 JAP_transferred_timor:0 "Transferred Timor"
 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_tt:0 "If this focus is completed before §YStrike on the Southern Resource Area§! then the following will happen when war is declared against the [ENG.GetFactionName]:\n\n"
 JAP_the_southern_colonies:0 "The Southern Colonies"
 JAP_the_southern_colonies_desc:0 "Despite our withdrawal from the League of Nations, we still maintain control of the South Seas mandate. It is vital for our Pacific interests that all of our southern islands are suitably developed and that those that inhabit them know their place in the Empire."
 JAP_develop_the_south:0 "Develop the South Seas"
 JAP_develop_the_south_desc:0 "Whilst Taiwan and the Mandate are self-sufficient financially, there is still much work to be done. Through our settlers and administration, we can encourage more opportunities for both infrastructure and enterprise."
 JAP_stengthen_taiwan:0 "Strengthen Taiwan"
 JAP_stengthen_taiwan_desc:0 "Taiwan was the first colony in our empire and is now one of the most important. It will be the launching point for any incursion south. Thusly, its industrial development will be strengthened to support our forces."
 JAP_island_industry:0 "Encourage Island Industry"
 JAP_island_industry_desc:0 "The investment in the South Seas has allowed for a dramatic increase in their productivity. Appropriately supporting these local industries would allow for a significant increase in goods from the region."
 JAP_ease_native_restrictions:0 "Ease Native Restrictions"
 JAP_ease_native_restrictions_desc:0 "The restrictions imposed by our rule have led to resentment from the native islander populations. By relaxing these restrictions, we can create a more favourable image of what it means to be a subject of the Empire."
 JAP_island_fortifications:0 "Island Fortifications"
 JAP_island_fortifications_desc:0 "The islands of the Mandate are our most vulnerable possessions. Although the terms of our control forbid their fortification, it would be foolish not to make use of these unsinkable aircraft carriers."
 JAP_improve_ssdc:0 "Support Nanyo Kohatsu"
 JAP_improve_ssdc_desc:0 "With the success of Nanyo Kohatsu being evident, the Navy has decided to fund the company further. This arrangement will make our economic and development goals in the South Pacific much more manageable."
 JAP_upgrade_nanyo_kohatsu_tt:0 "Modify Industrial Designer §Y$south_seas_development$§! by: Consumer Goods Factories: §Y-2.0%§! \n§YAir Base§! construction speed: §G+5.00%§! \n§YNaval base§! construction speed: §G+5.00%§! \n§YAnti Air§! construction speed: §G+5.00%§! \n\n"
 JAP_foothold_in_timor:0 "Foothold in Timor"
 JAP_foothold_in_timor_desc:0 "The Navy has conceived a plan to break the Dutch stranglehold on trade from Timor. Utilizing the Nanyo Kohatsu company, we can further our strategic aims in the region by establishing joint ventures with the native populations."
 JAP_continue_truk_fortifications:0 "Continue Truk Fortifications"
 JAP_continue_truk_fortifications_desc:0 "Truk Lagoon stands as the main stronghold of the Imperial Navy in the South Pacific. Increasing its fortifications and facilities will go a long way towards ensuring our dominance in the region."
 GER_bob:0 "Battle of Britain"
 GER_bob_desc:0 "We must take the fight to the United Kingdom and bomb them into submission. Only by a strong aerial campaign can we compell Britain to sign a peace treaty."
 HUN_arrow_cross_deal_2:0 "Empower Szálasi" 
 HUN_arrow_cross_deal_2_desc:0 "With all the fascist parties united and consolidated, it is time to rename the party for the last time: The arrow cross party. Ferenc Szálasi has taken full control of all aspects of the party and in a few weeks will officially be the leader of Hungary. The arrow cross is an ancient symbol of tribal Hungary, as well as a sign to show our intention to nullify the Treaty of Trianon and expand our borders."
 HUN_fascism_warning_tt:0 "\nHungary will remain non-aligned if §HStrengthen Fascists§! or §HElect a Fascist King§! is not taken before this focus is completed!"
 HUN_enforce_corporatism_1:0 "Enforce Corporatism"
 HUN_enforce_corporatism_1_desc:0 "Our new society can only work if every abled body has their own task they need to perform. The Italians have a very good system called Corporatism, which divides society into different corporate groups on the basis of same interests. By enforcing this new system we can maximate our factory output and restructure society to our liking."
 HUN_consolidate_horthys_power_1:0 "Centralize Power"
 HUN_consolidate_horthys_power_1_desc:0 "Hungary has been a kingdom without a king for more than a decade now. The political tensions this has caused are reaching a boiling point, and if we don't act quickly, it might lead to the collapse of the system as we know it. We need to ensure [ROOT.GetLeader] not only keeps, but widens his powers in order to maintain control with a firm hand in these difficult times."
 HUN_szalasi_ferenc:0 "Ferenc Szálasi"
 HUN_call_for_a_revisionist_king:0 "A New Dynasty"
 HUN_call_for_a_revisionist_king_desc:0 "The nation clamours for the return to our old glory. The Habsburgs have had their chance and have failed. It is time we look elsewhere for a king. We should offer our current regent Miklós Horthy the title due to his heroic status in the eyes of the population."
 HUN_ban_arrow_cross:0 "Imprison Szálasi"
 HUN_ban_arrow_cross_desc:0 "Ferenc Szálasi has caused far too much trouble in the country to be allowed to stay free any day longer. Ever since his first party, the NAP, was banned, he has had a dozen lawsuits on his neck. The lack of evidence has caused these lawsuits to be postponed long enough, and it is finally time to come to a concrete verdict: Guilty."
 HUN_strengthen_the_regency_1:0 "Reinforce the Regency"
 HUN_strengthen_the_regency_1_desc:0 "Horthy Miklós has proven to everyone that he is perfectly capable of leading the nation without officially being king. We don't see why Hungary would need to return to a monarchy if Horthy's rule is completely sufficient. By neither being king, nor dictator he can carefully steer through the upcoming political chaos in europe without having to fully align to any side."
 HUN_arrow_cross_deal_1:0 "Deal with the Fascists"
 HUN_arrow_cross_deal_1_desc:0 "We will embrace the fascist platform of Ferenc Szálasi's Arrow Cross Party and work with them towards a restoring Hungary's lost territories. We will no longer fight and suppress the Arrow Cross Party."
 HUN_calvinist_tt:0 "If Horthy does not convert to Catholicism before his coronation as King will upset the population and nobility!\n\n"
 HUN_coopt_fascists_tt:0 "\nIf we do not actively work with and coopt fascists elements in society we will have to deal with a hostile underground fascist movement!\n\n"
 HUN_crown_king_1:0 "Crown Horthy"
 HUN_crown_king_1_desc:0 "Miklós Horthy, our current regent, admiral of the Austro-Hungarian fleet, war hero and popular figurehead of our nation shall be the new king of Hungary. With him, at last the country has a Hungarian king after hundreds of years of foreign kings. He is the one that will lead our nation into glory."
 HUN_convert_horthy:0 "Horthy Converts"
 HUN_convert_horthy_desc:0 "The Horthy family descends from a long line of Calvinists. If Horthy is to found a new royal and authentically Hungarian house then he must first convert to the religion of his people, Catholicism."
 USA_fire_king:0 "Fire Ernest King"
 USA_fire_king_desc:0 "Ernest King's anglophobia is hampering our relations with our allies as well as leading us to support projects that are turning out to be ineffective, like the Mark 14 torpedo."
 FRA_operation_dragoon:0 "Operation Dragoon"
 FRA_operation_dragoon_desc:0 "An amphibious landing in Southern France can draw away German units from the Atlantikwall, making a more serious invasion in Northern France more possible."
 RAJ_indian_labor:0 "Indian Laborers"
 RAJ_indian_labor_desc:0 "The British Empire is vast and in desperate need of a labor force to construct roadways, fortifications, and railways for the war effort."
 CAN_ford_general_motors:0 "Ford Canada"
 CAN_ford_general_motors_desc:0 "Expanding the operations of the American automobile company 'Ford Motor Company' will expand our production of trucks and half-tracks."
 CAN_ford_general_motors_idea:0 "Ford Canada"
 SOV_rehabilitated_military_buffs_tt:0 "§YOn Select:§!\nAdd §YMoscow Strategic Offensive Operation§!, which grants (£attack_texticon  Division Attack: §G+20.0%§!) for §Y60§! days.\n\n"
 ROM_modern_at_guns_2:0 "75 mm Resita Model 1943"
 ROM_modern_at_guns_2_desc:0 "The 75 mm Resita Model 1943 is a stunning innovation in anti-tank design."

 HUN_hussar_doctrine:0 "Hussar Doctrine"
 HUN_hussar_doctrine_desc:0 "Speed and maneauver is the doctrine of the Hussar, and likewise it shall be the doctrine of our army."
 HUN_mechanized_hussars:0 "Modern Hussars"
 HUN_mechanized_hussars_desc:0 "Mechanized is the future of mobile infantry."

 HUN_arpad_line:0 "Construct the Árpád Line"
 HUN_arpad_line_desc:0 "We will build a network of light fortifications modeled after the Mannerheim Line in the Carpathian Mountains following General Hárosy's theory of 'flexible defense'."
 HUN_arpad_line_tt:0 "We will unlock decisions to build a defensive line across the Carpathian mountain range.\n\n"
 HUN_theory_of_flexible_defence:0 "Theory of Flexible Defence"
 HUN_theory_of_flexible_defence_desc:0 "General Teofil Hárosy has developed a new theory of defensive warfare. The flexible defense only closed possible supply lines, thus the enemy could bypass the fortified line, but every battlegroup without resupply quickly ran out of ammo and food."
 HUN_study_rocket_designs:0 "Study German Rocket Designs"
 HUN_study_rocket_designs_desc:0 "Advancements into Rocketry by the Germans are to be carefully studied so they can be learned from and reverse engineered into rocket artillery."
 poglavnik:0 "Poglavnik"
 HUN_militarize_the_levente:0 "Militarize the Levente"
 HUN_militarize_the_levente_desc:0 "The Levente Associations are our means of circumventing the Treaty of Trianon by placing hundreds of thousands of our youth under the direction and training of military veterans without formally increasing the size of our armed forces. Militarizing the movement would bolster our manpower greatly."
 HUN_increase_metal_processing_capacity:0 "Increase Metal Processing Capacity"
 HUN_increase_metal_processing_capacity_desc:0 "The more ore we mine, the more metal we must process."
 HUN_invest_in_north_transylvanian_mining:0 "Invest in North Transylvanian Mining"
 HUN_invest_in_north_transylvanian_mining_desc:0 "Transylvania has a strong mining history that goes back centuries. Even if they don't bring resources directly useful for the war factories, the minerals exploited will still significantly contribute to the economy." 
 HUN_support_urbanization_2:0 "Develop Budapest"
 HUN_support_urbanization_2_desc:0 "We should focus our development efforts on making Budapest a world class city."
 HUN_mountain_artillery:0 "Mountain Artillery"
 HUN_mountain_artillery_desc:0 "Our borders with the Soviet Union are riddled with mountains and hills - we must learn how to operate artillery there if we are to defend Hungary."
 CRO_nuclear_effort:0 "Tomislav's Might"
 CRO_nuclear_effort_desc:0 "Have physicists gone too far?"
 ROM_national_christian_party_ii:0 "Hail Octavian!"
 ROM_national_christian_party_ii_desc:0 "The PNC under the leadership of Octavian Goga will finally implement the will of Romania's rural people."
 CRO_italian_influence_focus_desc:0 "We have closer links than ever before with Italy."
 CRO_recovery_teams:0 "Recovery Teams"
 CRO_recovery_teams_desc:0 "To further reduce the loss of equipment, we must organize teams to recover weapons and vehicles on the battlefields." 
 CRO_prospect_for_resources:0 "Prospect for Resources"
 CRO_prospect_for_resources_desc:0 "Our soil is keeping resources that will be helpful for the fight of our time. We must liberate them as soon as possible and make the best use of them."
 CRO_industrial_planning:0 "Industrial Planning"
 CRO_industrial_planning_desc:0 "To continue our industrial developments, we must establish long-term strategies and seek suitable lands."
 CRO_secret_preparations:0 "Secretly Form Ustašha Militias"
 CRO_secret_preparations_desc:0 "We will covertly contact the German ambassador and make it known that the Croatia people want to secede from Yugoslavia. We hope Germany will help us in this endeavor."
 FIN_petsamo:0 "Liberate Petsamo!"
 FIN_petsamo_desc:0 "The Finns of Salla will be free from Soviet occupation!"
 GER_weserubung2:0 "Unternehmen Weserübung (Norway)"
 GER_weserubung2_desc:0 "With Denmark secured, our army can now safely invade and occupy Norway."
 lower_air_purge_tt:0 "Our air mission efficiency purge penalty will decrease by 5%"
 lower_air_purge2_tt:0 "Our air mission efficiency purge penalty will decrease by 2.5%"
 removed_air_purge_tt:0 "We have completely removed our §RAir Mission Efficiency penalty§! from §YSoviet Airforce§! (currently: [?SOV.SOV_purge_air_factor|%R1])"
 SOV_PLANE_STUFF_TT:0 "\n§CWe will research 1940 Fighters§!"
 SOV_PLANE_STUFF2_TT:0 "\n§CWe will research 1944 Fighters§!" 
 war_in_the_west_start:0 "War in the West Bookmark Selected"
 NOR_norsk_hydro_focus:0 "Norsk Hydro"
 ENG_dieppe:0 "The Dieppe Raid"
 ENG_dieppe_desc:0 "We will try to learn more about Germany's defenses on Europe's coastline by launching a small invasion against the town of Dieppe."
 NOR_navy_3:0 "Swift Navy"
 NOR_navy_3_desc:0 "Fast ships!"
 SPR_AZUL_tt:0 "Ten §HSpanish Civil War§! §RVeteran§! divisions will be recruited with a (powerful) medal in recognition of their experience and valor during the war."
 ROM_iron_guard_ii:0 "Restoring Greater Romania"
 ROM_iron_guard_ii_desc:0 "The Soviet occupation of Bucovina and Bessarabia was a national humiliation that must be avenged."
 ROM_iron_guard_iii:0 "Claims on Odessa"
 ROM_iron_guard_iii_desc:0 "As a reward for assistance in Operation Barbarossa, the German Reich has promised us Soviet territory on the frontier of our borders."
 ITA_reinforce_the_gustav_line_tt:0 "We will immediately create a §Hlevel 7§! fort line along the frontlines in Italy\n\n"
 ITA_strengthen_the_blackshirts_spawn_divs2_tt:0 "Create §Y30 Camicie Nere§! divisions in §Y[THIS.GetName]§!."
 NOR_norsk_hydro_focus_desc:0 "Norsk Hydro is a major supplier for aluminum and bauxite, but also for nuclear science through heavy water production."
 SOV_approach_germany_molotov_tt:0 "§GVyacheslav Molotov§! is our §YPeople's Commisar of Foreign Affairs§!"
 axis_minor_railways_tt:0 "\n§COur minor allies will be connected to our capital with a level 3 railway.§! \n\n§CWe will get %20 extra trade when dealing with our allied minors.§!"
 italian_railways_tt:0 "\n§CEvery railway in Italy will be upgraded by 1 level.§!"
 ENG_tonks_tt:0 "\nWe will deploy 4 seasoned medium tanks and receive a stockpile to support them."
 TIB_nothing335:0 "Beginning Horst's Third Five-Month Plan"
 HMP_ignite_the_warsaw_uprising_tt:0 "§HTwo infantry divisions will rise up in every Polish core state§!"
 SOV_send_military_advisors_to_spain_tt:0 "A §H6 Skill General§! named §HEnrique Lister§! will appear"
 SLO_commando_tt:0 "A §YCommando (Expert)§! will be available for hire for §Gfree§!"
 gdansk2_tt:0 "\n§GWe will begin clamping down on Gdansk, eventually bringing its entire population and industry under our direct control, but this will be a long and arduous process!§!"
 gdansk_tt:0 "\n§GWe will significantly increase our control over Gdansk's industry and population.§!\n\n§RWe can eventually gain full control over Gdansk by clamping down on them, but it will take significantly longer!§!"
 no_dutch_player:0 "The Dutch East Indies War Machine"
 no_dutch_player_desc:0 "§RThis spirit is removed if we lose contorl of Java!§!"
 UK_PLANE_STUFF_TT:0 "§CThe USA and the UK will research 1944 Strategic Bombers§!"
 YUG_yugoslavian_rail_network:0 "Yugoslavian Rail Network"
 ENG_tank_focus2:0 "Royal Tank Corps"
 POL_get_em_wojtek:0 "Get 'em Wojtek!"
 POL_get_em_wojtek_desc:0 "Raaawwwwrrrrrr!"
 Wojtek_tt:0 "An §Y9 Skill General§! named §YWojtek§! will appear."
 ENG_tank_focus2_desc:0 "Modern tanks are the backbone of modern armies."
 ENG_tank_focus3:0 "The Battle of El-Alamein"
 ENG_tank_focus3_desc:0 "We will deploy the best of the Royal Tank Corps"
 YUG_yugoslavian_rail_network_desc:1 "We should expand the national railway networks in all parts of the country equally. There is no part of our nation that is more important than the others."
 YUG_bosnian_poverty_system:0 "Improve Light Industry"
 GER_army_innovation_tt:0 "§C\nWe will deploy an army of 48 fully equipped 40w infantry.§!"
 YUG_bosnian_poverty_system_desc:1 "We already have internal unrest, and so it would not do to let light industry lag behind, depriving the people of the essentials they require in daily life."
 ENG_home_defence_tt:0 "\nWe will construct the General Headquarters Line - A line of level 6 forts in Southern England to be used to defend against invasion.\n\n"
 
 ENG_fall_back_to_ireland:0 "Evacuate To Ireland"
 ENG_fall_back_to_ireland_desc:0 "We will surely return one day to this fateful land."
 ENG_fall_back_to_ireland_tt:0 "\nWe will §Yremove 5 military factories§! from §Yevery state we control in Mainland England§!, However we will only receive §Y75 mils in return no matter what§! due to limitations in our logistical issues.\n\n"
 ENG_fall_back_to_ireland_tt1:0 "This focus will also build up §YNorthern Ireland and Faroe Islands§! and also §Yremove Allied Hesistance!§!"
 
 ENG_fall_back_to_canada:0 "Evacuate To Canada"
 ENG_fall_back_to_canada_desc:0 "Your allies faces are represented here in this focus icon."
 ENG_fall_back_to_canada_tt:0 "This focus will give you §Y50 more military factories§! that is sponsored by §YHorstorical Main Modder Cheeseus.§!"
 ENG_fall_back_to_canada_tt1:0 "This focus will also build up §YNewfoundland and Iceland.§!"
 
 FIN_red_soil_government_tt:0 "This focus will automatically complete itself after elections have occured\n\n"
# make focus about Lorković–Vokić plot to make coalition peasant party - moderate ustasha, join the allies and fight the communists
 USA_social_security_act:0 "Social Security Act"
 USA_social_security_act_desc:0 "The elderly of our nation largely live in poverty with no easy escape. Creating a federal welfare program for our senior citizens will drastically improve their wellbeing. At the same time we can tackle poverty from transitory unemployment with a similar, but shorter lasting program."
 ENG_dresden_idea:0 "Area Bombardment"
 HOL_empire:0 "The Dutch Empire"
 HOL_huygens:0 "The Spirit Of Huygens"
 HOL_huygens_desc:0 "Huygens, a brilliant mathematician, physicist, inventor and astronomer of Dutch nationality. This man was driven by science and was one of the head figures in the Scientific Revolution of the 17th century. He didn't believe in borders. Science was everywhere all the time. Science has no borders. We should share all of our tech with our allies for the common cause."
 HOL_reinforce_sumatra:0 "Reinforce Sumatra" 
 HOL_reinforce_sumatra_desc:0 "Sumatra is our second most important island in the East Indies apart from Java. Holding this island is key in defending Java. If Sumatra doesn't fall, Java doesn't  fall."
 HOL_binnenlands:0 "Binnenlandse Strijdkrachten"
 HOL_binnenlands_desc:0 "The resistance finally is rooted in the mainland. After a long time of mainly collabaration our people have woken up since the nazi terror started. Resistance now has been organized and can be consolidated into an offical armed forces by our very own adventurous prince; prince Bernhard von Lippe-Biesterfeld"
 HOL_devour:0 "The Lion Swallows The Sun"
 BRA_tenentes:0 "Keep the Tenentes"
 BRA_tenentes_desc:0 "The young European trained officers, the Tenentes, have a fair influence within the army and think themselves superior to the old guard. Altough a lot of them have socialists tendencies and backgrounds, they have a really innovative and forward thinking way of handling the new Brazilian army. We should keep them befriended at all costs."
 BRA_mobilise:0 "Mobilize The Integralists"
 BRA_mobilise_desc:0 "To realise Vargas' Ideals of an Estado Novo, he needs to get enough support to centralise power. As the marxists are a threat to the stability of Brazil, we need to bring ourselves in contact with ideological sympathizers. The Integralist wing brings the militarist-nationalist feeling we need in order to further build upon Vargas his paradise."
 BRA_establish:0 "Establish the TSN"
 HUN_GER_subject:0 "Kingdom of Hungary"
 ROM_GER_subject:0 "Kingdom of Romania"
 POL_ENG_subject:0 "Poland"
 GRE_ENG_subject:0 "Free Greece"
 BUL_GER_subject:0 "Kingdom of Bulgaria"
 YUG_ITA_subject:0 "Independent State of Croatia"
 SER_GER_subject:0 "Kingdom of Serbia"
 CZE_GER_subject:0 "Slovakia"
 
 BRA_establish_desc:0 "We should establish a National Security Tribunal, the Tribunal de Segurança Nacional. After the Intentona Communista we have loads of 'communists' who need to be prosecuted. We wanted to let the Supreme Military Court deal with it, but that would take too long. That's why we are establishing an order beneath the Supreme Military Court, who can operate quicker."
 BRA_general:0 "Promote João Baptista Mascarenhas de Morais"
 BRA_general_desc:0 "Mascarenhas de Morais has proven to be a loyal officer to the new regime of Vargas. His fighting against the communists during the failed coup made him somewhat reputable within Rio on top of all the other coups he participated crushing in. We should give him the opportunity to further develop his career. He has a lot of potential."
 BRA_estadonovo2:0 "Estado Novo"
 BRA_estadonovo2_desc:0 "A new state has been born. The third Brazilian Republic is a fact. You have chosen how radically reformed this new state is. Our great leader Vargas has set up amazing plans regarding industry, education and general development of the country. A new dawn has arisen. Now it is time for combat, parties and pride! Ordem e Progresso!"
 BRA_second:0 "República dos Estados Unidos do Brasil"
 BRA_usa:0 "American Steel Imports"
 BRA_usa_desc:0 "The American industry is exploding at the moment. The new Brazilian army will need a lot of steel if we want to pursue the modern way. The industralization of Brazil is still developing. Yet our geographical natural ally, the biggest power in the Americas, the USA, has an infinite amount of steel in the selling. We certainly should import some of that steel to safeguard our steel supplies."
 BRA_milpolice:0 "Polícia Militar"
 BRA_milpolice_desc:0 "Prior to Vargas' regime, the military police was a threat to the country. Governors from different autonomous states were using the force in each state as their private armies. During the centralization of power in 1932, the federal army made sure that these military police departments were made loyal again. To Rio, not the different states of Brazil. We should modernize them now."
 BRA_wagon:0 "Parade Wagons for Carnival"
 BRA_wagon_desc:0 "Carnival is well known for its extensive use of ornamented vehicles. From now on, the state will also focus on making these 'ornamented' vehicles, they will only have a bit more 'practicality' than the already existing parade wagons."
 BRA_copacabana:0 "Fireworks on the Copacabana"
 BRA_copacabana_desc:0 "The Copacabana in Rio de Janeiro might be the most famous beach of the world. Its location within a beautiful urban bay with Cristo Redentor watching over the visitors is truly a wonderful sight. Soon, fireworks won't be the only lightshow the tourists and Brazilians could witness on this beach. The nearby combat training of our katyushas will result in a remarkable 'fiery' view on the beach."
 BRA_authority:0 "Authority over Private Companies"
 BRA_authority_desc:0 "Privatization of companies was a mistake. Our country will benefit more from a semi-state-planned economy. We will gain a bigger part from the revenue of those companies, which we will invest in collective projects. Now, we also have the ability to demand companies to increase production where supply shortages exist in order to reduce the profits some of the companies make because of these shortages."
 BRA_coronelismo:0 "Free Ourselves from Coronelismo"
 BRA_coronelismo_desc:0 "Coronelism, or the rule of the coronels, needs to disappear. These local oligarchs, who often produce coffee, have too much power in rural areas. They choke the growth of economic urban development. The economic core needs to shift towards the cities. We need to get rid of them, altough we will also protect the local agro-exporting interests simultaneously. Allegiance or death."
 BRA_snake1:0 "Brazilian Expeditionary Force"
 BRA_snake1extra:0 "Brazilian Expeditionary Force"
 BRA_snake1_desc:0 "Our military efforts finally begin to pay off. In these chaotic times, the young and vital well sized brazilian army stands ready to strike wherever is necessary. Brazil now posesses over a massive force. We should  show our muscles wherever we can, obliterate the axis forces and contribute heavily to global peace. Let our enemies taste the fury of an angry Brazilian!"
 BRA_snake1extra_desc:0 "Our military efforts finally begin to pay off. In these chaotic times, the young and vital well sized brazilian army stands ready to strike wherever is necessary. Brazil now posesses over a massive force. We should  show our muscles wherever we can, obliterate the axis forces and contribute heavily to global peace. Let our enemies taste the fury of an angry Brazilian!"
 BRA_nav2:0 "Refit the Minas Gerais"
 BRA_nav2_desc:0 "Once the Minas Gerais was the envy of the world, a dreadnought that could fire a volley in a volume unmatched by the rest of the world. It still is a highly prestigious ship and Brazil is incredibly proud of it. That is why the ship should relive a second life. The ship is on its last legs in terms of modern naval warfare. Sending it back to the docks to give it a major refit would be fabulous. Her infamy will live on."
 BRA_disband:0 "Disband All Political Parties"
 BRA_disband_desc:0 "Political parties are threat to the Brazilian population. They only try to interfere in our internal policies in order to destabilize the nation. From the fascist to communists, all will obey to Rio. Corporatism will be the new norm. No more political representation, only professional representation."
 BRA_latifundios:0 "Concessions to the Latifundios"
 BRA_latifundios_desc:0 "The Landslords, or the Latifundios, always had a fair influence within our nation. We give them autonomy and they make sure relatively abandoned regions stay stable and economically notable. To ensure that Vargas will stay in power and to get rid of every communist, it is not crazy to think about making some 'deals' with them and their Integralist supporters."
 BRA_cometobrazil:0 "Come to Brazil!"
 BRA_cometobrazil_desc:0 "Brazil is the most beautiful country on earth. We are covered by gorgeous nature as far as the eye can reach. Culturally wise, we're fairly close to the west due to our colonial past. We speak a familiar language for example. Our coastline belongs to one the most modern areas in the world! Most importantly, it is far away from western homes. The perfect place to chill out for a while. You're going to Brazil!"
 BRA_martial:0 "Impose §RMartial Law§!"
 BRA_martial_desc:0 "Our country is in ruins. Corruption is an everyday habit. Nothing works efficiently anymore. If we let this continue to happen, Brazil will be set back in time. Vargas must seize complete power and enforce martial law where necessary. That's the only way to forcefully bring our country on the rails again."
 BRA_blackmail:0 "Blackmail Britain"
 BRA_blackmail_desc:0 "Due to our ideological similarities, we have maintained a fair amount of trade with the Axis nations. Now that world tension is rising, the Allies demand that we reduce our trade with these nations. Actuallly, we should threaten to join the axis. If Britain wants us to not join the axis AND reduce our trade with them, we could demand a decent amount subsidies through a casual and subtle blackmail."
 BRA_goodneighbor:0 "Good Neighbor Policy"
 BRA_goodneighbor_desc:0 "The USA is trying to get on a good stance with the nations in Latin-America. As the economically biggest nation within this region, Brazil plays a fundamental role in this good neighbor policy. Both parties will profit tremendously if the cooperation between our countries is increased. Carmen Miranda will be our symoblic envoy, she is a famous dancer in the west. Born in Portugal, raised in Brazil!"
 BRA_nav1:0 "Slay The Wolves"
 BRA_nav1_desc:0 "Tensions are rising high witin Europe, and inevitably, so is the innovation on military goods. Naval warfare included. A new type of ship is fully making its way on the world stage, the submarine. These ships could be a threat to our trade with Europe and the rest of the American continent. We should heavily invest in battling these submarines. Our trade must be safeguarded by our navy at all cost. "
 BRA_amazons:0 "Home of The Amazons"
 BRA_amazons_desc:0 "In 1542, Gaspar de Carvajal, a Spanish chronicler encountered a tribe, which he believed were the real Amazons from Homer's and Herodotos'stories. He described them as: 'very white and tall, with very long hair braided and wound about their heads. They are very robust, and go naked with their private parts covered, and their bows and arrows in their hands, doing as much fighting as ten Indian men.'"
 BRA_centralize:0 "Centralize Power to Rio"
 BRA_centralize_desc:0 "To battle the local oligarchs and to retain power over the rural areas, it is absolutely necessary for us to start with firm centralisation efforts. We will build up an efficient bureaucracy which is impenetrable to major corruption, which will increase central command and Vargas' power. By centralising and making Rio a major trade hub, we will also attract all kinds of necessary industries. Rio de Janeiro will be a megalopolis! "
 BRA_dops:0 "Departamento de Ordem Política e Social"
 BRA_dops_desc:0 "The Department of Political and Social Order will greatly enhance the power of the police in our battle to ensure stability and prosperity over the Brazilian state. The DOPS will be a powerful political police and secret service that will help us get rid of any 'unstable factors' within the state. Sometimes its better to just let someone dissappear without a boring long trial."
 BRA_tradeunion:0 "§GRein in the Trade Unions§!"
 BRA_tradeunion_desc:0 "Now that the Great Depression is coming to an end. The trade unions become less and less influential. They have caused a lot of instability and thereby corruption through their strikes. The time is nigh to rein in the trade unions. Their activity is simply causing too much instability, which we do not need! They don't fit in the Estado Novo."
 BRA_tsn:0 "§OAn Autonomous TSN§!"
 BRA_tsn_desc:0 "The Tribunal de Segurança Nacional has been established already to judge over those that bring instability over the nation, mostly communists and political opponents. The lawsuits are not going fast enough, eternal legal procedures are the norm. We have room for radical reforms. We should make it impossible to take cases up on appeal. We should free the TSN from the rest of the legal system."
 BRA_constitution:0 "§HThe Constitution of 1937§!"
 BRA_constitution_desc:0 "Vargas' 4 year presidential term has almost come to an end. Our state whatsoever, is in a relatively unstable state. The corruption will bring down our nation if we organize free elections. It is time to pass a radical reform with our plan Cohen. A new constitution will be institutionalised. Vargas will retain power. The communists will pay for it."
 BRA_surdo:0 "The New Surdo"
 BRA_surdo_desc:0 "The Surdo, a traditional Brazilian bass drum. A powerful instrument, designed to give a 'feeling' to carnival, a bang. Soon, not only these surdos will make the streets of Brazil tremble. Our newly designed artillery pieces will make whole cities shake. These glorious bangs will bring prestige to Brazil!"
 BRA_prestes:0 "Prestes' Followers"
 BRA_prestes_desc:0 "The young European trained officers, the Tenentes, have a fair influence within the army and think themselves superior to the old guard. They long to radical reforms. Their former leader, Prestes, came out as a communist who even launched the Intentona Communista! We should maintain our traditional ways within the army and purge all these dangerous young officers who followed a communist!"
 BRA_second_desc:0 "The revolution of 1930 made an end to the First Republic. Due to its chaotic birth, the Second Republic is on the verge of collapse in its present form. A strong leader is vital in this battle against corruption. Someone must reform Brazil drastically or otherwise we will perish in this everchanging world."
 BRA_gunimport:0 "American Gun Imports"
 BRA_gunimport_desc:0 "As we are trying to get a respectable sized army, we need men. Luckily we have those a lot. The only thing we lack on the short term is guns, shells, artillery and bullets. Fortunately, we have an industrial powerhouse close by, the United States of America. If we want to achieve our goals regarding our military policy, we need to order some guns from Uncle Sam."
 BRA_snake2:0 "Brazilian Armored Battalion"
 BRA_snake2extra:0 "Brazilian Armored Battalion"
 BRA_snake2_desc:0 "Our military efforts finally begin to pay off. In these chaotic times, the young and vital hypermodern brazilian army stands ready to strike wherever is necessary. Brazil doesn't need a massive force, there is no direct military threat in the Americas. Instead we should occasionally show our muscles, help our allies wherever we can and contribute to global peace. Let our enemies taste the fury of Brazilian rolling steel!"
 BRA_alliedtrade:0 "Trade Agreements with the Allies"
 BRA_alliedtrade_desc:0 "Brazil is geographically incredibly dependent on trade with the Allies. Ideologically, Brazil has more familiarity with the Axis nations, but making ourself too dependent on the Axis would make us economically vulnerable. We shouldn't make that happen."
 BRA_axistrade_desc:0 "The axis nations, especially Italy, are ideologically very close to our own implemented ideology in Brazil. We should increase cooperation with the Axis nations. We won't let our brothers down in creating the new order!"
 BRA_axistrade:0 "Trade Agreements with the Axis"
 BRA_estadonovo:0 "Vargas Era"
 BRA_estadonovo_desc:0 "Getúlio Vargas, our great leader, should receive greater powers to handle the increasingly tense political situation within Brazil. It's time to build a new Brazil, a new state, 'O Estado Novo'. The communist threat is always present. Always."
 BRA_communist:0 "The Aftermath of the 'Intentona Communista'"
 BRA_communist_desc:0 "Last November, those pesky communists under Prestes tried to seize power by trying to commit a coup in the 'communist attempt'! Ridicilous! It failed horribly luckily. We should start to ban and purge communism for once and for all. It is also necessary to give Vargas more power in this matter, it depends heavily on the stability of the nation."
 HOL_request_allied_favors2:0 "Banker Of The Resistance"
 HOL_request_allied_favors2_desc:0 "Walraven van Hall is an absolute hero. By collaborating with the Germans, he is able to commit large bank frauds to finance the resistance in the mainland. We should be really thankful to have him in this war."
 HOL_devour_desc:0 "We have a history with the Japanese, we always had friendly relations with his majesty and traded with them on the island of Dejima for years. Now that they've turned against us, we know their weaknesses. The Dutch Lion will swallow the Rising Sun. It is inevitable."
 HOL_empire_desc:0 "The sole reason our empire still exists, is because of our prominent naval position. We need to maintain our fleet well and invest more into our naval force if we want to keep our colonies and our eminent position on the world stage."
 HOL_doorman:0 "Doorman's View"
 HOL_suriname:0 "Develop Suriname" 
 HOL_propaganda:0 "§OACTIVATES DUTCH WAR PROPAGANDA CAMPAIGNS.§!"
 NED:0 "Kingdom of the Netherlands"
 HOL_curacao:0 "Develop Curacao"
 HOL_invest:0 "Invest In The West"
 HOL_the_east_indies_war_machine2:0 "The Battle Of The Dutch East Indies"
 HOL_the_east_indies_war_machine2_desc:0 "The time is here, we need to defend our second home to the last man, may the queen guard all over us and drive away the Japanese. Doorman will protect our biggest cities with our respectable fleet. But we will need more equipment to defend this enormous land mass."
 HOL_doorman_desc:0 "We should go with the naval approach of our admiral Karel Doorman. The fleet is the backbone of our empire and only a high seas fleet will keep our backbone strong. Rise once more Dutch Navy, spread your wings and maintain the empire at all cost!"
 HOL_helfrich_desc:0 "'Small, cheap, but highly effective' that is the approach of admiral Conrad Helfrich. Submarines will provide an affordable way of keeping our empire safe. The Dutch Navy was hardly ever about big guns, the approach often has been a smart and effective navy, let's continue that path."
 HOL_helfrich:0 "Helfrich's View"
 HOL_dewitt:0 "De Witt's Approach"
 HOL_dewitt_desc:0 "Johan de Witt ruled over the Republic during its economic and cultural peak, prioritizing the navy brought immense prosperity due to increased and more protected trade. His fleet defended the country, its wealth and rich culture for quite an amount of time. Then, the English were threatening our sovereignty and trade, now, the Japanese, Italians and Germans are. Let's let them taste our naval heritage..."
 HOL_ship_a_day_sinking_quotas2:0 "Maurits' Approach"
 HOL_ship_a_day_sinking_quotas2_desc:0 "Maurits, a member of house Orange, (co)-ruled over our country for quite a significant time. According to him, it was urgent to prioritize the army in order to have a firm footprint in mainland Europe. The navy should be effective, but nor large neither expensive. This seems the right approach as we need to stop a monster on land."
 HOL_fokker2:0 "Prioritize Fokker"
 HOL_fokker2_desc:0 "The time is here where we need Fokker the most, without their planes there is no chance of winning this war. We should temporarily give Fokker immense subsidies to help forging our war machine. We have no other choice."
 HOL_eendracht:0 "Concordia Res Parvae Crescunt"
 HOL_eendracht_desc:0 "Unity Makes Strength. Admiral De Ruyter may be the best example of this general truth. Back in 1665, when we were waging war against the mighty Royal Navy, he could do spectacular things due to a determined nation that stood behind him without any internal conflicts. He was in possession of all the needs he could wish for, which resulted in an obliteration of the Royal Navy."
 HOL_shell:0 "Royal Dutch Shell"
 HOL_shell_desc:0 "Shell is one of our biggest state companies and one of the biggest oil companies in the world. The demand for oil is rising skyhigh, which will benefit Shell and thus the state, immensely. Shell is very promising and will have a large future ahead of her."
 HOL_hoogoven:0 "Royal Furnaces Of Ijmuiden"
 HOL_hoogoven_desc:0 "Our industrial pride, the Royal Furnaces of Ijmuiden. It is one of the biggest steel mills in Europe and of incredible importance to the government. We should expand the steel mill in order to create more employment in this economical hell we're in. If we keep expanding and stimulate the steel mill, it will last for decennia and be a pride for our nation."
 HOL_NS:0 "Dutch Railways"
 HOL_NS_idea:0 "Nederlandse Spoorwegen"
 railway_company2:0 "Railways Company"
 FIN_salla:0 "Liberate Salla!"
 FIN_salla_desc:0 "The Finns of Salla will be free from Soviet occupation!"
 FIN_karelia:0 "Liberate Karjala!" 
 FIN_karelia_desc:0 "The Finns of Karjala will be free from Soviet occupation!"
 HOL_NS_desc:0 "We should merge the railroad companies of the state into one clear company. The Dutch Railways. We will expand the railway networks to create more employment in order to increase production in our revitalizing econmomy and, if we organize this state company well, it will benfit the Dutch people in the decennia to come. Everyone will be able to make use of our sophisticated and well organized railway network."
 #ENG_dresden_idea_desc:0 ""
 ITA_messe_desc:0 "After Messe's return from Ethiopia, he insisted on major army reforms. Let's give him the space to set his plans in motion. First reform, motorization, our army is still greatly cavalry based and cavalry is becoming out of fashion rapidly."
 ITA_messe:0 "The Army Reforms of Messe"
 ITA_naval_air_effort2:0 "Savoia-Marchetti Bombers"
 ITA_naval_air_effort2_desc:0 "Naval bombers have become an essential part of naval warfare, if went to contest the British might in the Mediterranean, we need these bombers."
 ITA_fascismo:0 "Per L'Ideologia Fascista"
 ITA_fascismo_desc:0 "We will never give up Italia to these democrats, per l'ideologia fascista! (for the fascist ideology!)"
 ITA_liberatori:0 "Ecco I 'Liberatori'"
 ITA_italian_highways2:0 "At Least They Run On Time!"
 ITA_italian_highways2_desc:0 "Mussolini himself will take care of the train transport schedule! Fascism may not be the solution to everything, but it does get things done! Like letting the trains ride on time, magnificent!"
 ITA_liberatori_desc:0 "Now that we've lost the Fourth Shore, the main aim of the Allies has been driven towards the Italian mainland. Bombing attacks on Italian soil will be more frequent in the future. We need to fight against the air attacks from those who call themselves 'liberatori'."
 ITA_bomber_effort2:0 "Filippo Zappata Bombers"
 ITA_bomber_effort2_desc:0 "To contest the Allied industrial power, we need bombers to disrupt their industrial advantage as much as possible." 
 ITA_jet_engine_effort2_desc:0 "Times of war lead the military developments into overdrive, a new generation of planes is here."
 ITA_africa_campaign1:0 "Britannia Annhilianda"
 ITA_africa_campaign3:0 "Le Vedova di Italia"
 ITA_africa_campaign3_desc:0 "Long have we fought for the fascist ideals in this forsaken war drenched in the blood of our country's young men. We cannot let the Allied forces take back the land we spilled so much blood for. If we would lose our lands, it would be unexplainable to all the Italian widows who held back their tears by finding peace in the ideological sacrifice their husbands committed..."
 ITA_jet_engine_effort2:0 "Reggiane Jets"
 ITA_defense_italia_desc:0 "The war is not necessarily going into Italy's advantage, but we still have time to turn the tide. Fortezza Italia is here! If we want to let this work however, we need our airspace to be guarded as good as possible."
 ITA_africa_campaign1_desc:0 "Once again we march towards the fertile lands of Egypt. This time, it is not the kemetic people of Egypt waiting to be conquered. This time, it is a far greater foe, a foe that surpassed Imperial Rome in size, the empire of Britain. Britain, which must be destroyed. Brittania Annihilanda."
 ITA_africa_campaign2:0 "Mare Nostrum"
 ITA_africa_campaign2_desc:0 "Novum nostrum Imperium Romanum nunc capiendum est, Imperator vivat, super nos regnet et regnent naves nostra nostra maria! (Our New Roman Empire must be taken now, may the Emperor live, may the emperor reign over us and may our ships reign over our seas!)"
 ITA_steal_canada_mech_manufacturing_plan:0 "Steal Canadian Mechanized Plans"
 ITA_steal_canada_mech_manufacturing_plan_desc:0 "We've been informed that the Canadians are in posession of a cheaper, equally good mechanized design. We should send an 'ambassador' who will do some other 'sideway' activities besides his official duties."
 ITA_learn_germany:0 "Learn From the Panzers"
 ITA_learn_germany_desc:0 "Our tanks and armored tactics are not the best in the world, we've learnt that during the Ethiopian war, but the German tanks and armored tactics are by far the most innovative in the world, maybe some German experts could fly over from Berlin to Rome to help us... "
 ITA_modernized_artillery_at2:0 "Cannone da 47/32"
 ITA_modernized_artillery_at2_desc:0 "Our anti-tank models are old fashioned and will not be sufficient enough to challenge modern armor."
 ITA_Expand_Roma:0 "Expand Roma"
 ITA_Expand_Roma_desc:0 "Il Duce greatly improved our capital in a lot of aspects the last years. Roma is the pride, capital and soon one of the major industrial powerhouses of our country!"
 ITA_armored_effort2:0 "Italian Armor"
 ITA_armored_effort2_desc:0 "In Ethiopia Messe learnt that armor will be the future of land warfare. Let's listen to our most renowned general."
 ITA_Littorio_Classe:0 "Classe Littorio"
 ITA_Littorio_Classe_desc:0 "The Littorio Class is named after the lictor, the lictor was a high-placed servant in the Roman Empire who was assigned to guard the high-placed magistrates and thus, guardians of the state. The RN Littorio, RN Vittorio Veneto, RN Roma and RN Impero are nearly finished and will also be guardians of the state. These beauties will be Imperatores Marium (Commanders/Emperors of the Seas)."
 ITA_Aquila_Classe:0 "Classe Aquila"
 ITA_Aquila_Classe_desc:0 "The Aquila has been the icon of Roma for millenia. This Aquila carrier will guard our seas as good as the Aquila guarded Roma."
 ITA_blow_away:0 "Blow'em Away"
 ITA_blow_away_desc:0 "Artillery is becoming increasingly important in modern day armies, modernizing our artillery and developing our bombardment tactics will be a wise move."
 ITA_WW1_strategy:0 "Build Upon Our WW1 Tactics"
 ITA_WW1_strategy_desc:0 "The Austro-Hungarian front of WW1 wasn't the most flexible front, but at least the front was stable. If we develop these WW1 tactics some more, we will make sure that the frontlines won't collapse on Italian side and maybe there will even be space to push a few meters on future fronts."
 ITA_equipment_modernization:0 "MAB-38"
 ITA_equipment_modernization_desc:0 "The Moschetto Automatico Beretta Modello 1938 is a new designed strong gun developed by our military manufacturers. The gun is a soldier's sixth sense. If our sixth sense is better than the one of the enemy, we will have a major advantage on the battlefield."
 ITA_modernized_artillery2:0 "Cannone da 149/40 Modello 35"
 ITA_modernized_artillery2_desc:0 "The new Cannone da 149/40 modello 35 will be the core of the Italian army and strike fear into our enemy's hearts."
 ITA_cheap_artillery:0 "State Discounts at Breda"
 ITA_cheap_artillery_desc:0 "Breda, our artillery designer gave us 'spontaneously' production discounts, how convenient!"
 ITA_strong_artillery:0 "Sophisticated Steel Refining"
 ITA_strong_artillery_desc:0 "We have discovered new ways of steel refining, which lets us make new highly-accurate artillery pieces. This should help us severely in battle."
 ITA_cheap_equipment:0 "Mass Deployment"
 ITA_cheap_equipment_desc:0 "By altering our gun designs a little bit, we can produce the guns much faster and in a more efficient way, altough accidents may happen more often, but we won't tell that to the soldiers."
 ITA_superior_tactics:0 "The Development Of Advanced WW1 Tactics"
 ITA_superior_tactics_desc:0 "We have studied our WW1 tactics for a long time now and have improved those tactics to a usable level in modern day warfare."
 ITA_special_forcess:0 "Learn From The Arditi"
 ITA_special_forcess_desc:0 "The Arditi (Daring Ones) were feared Italian elite special forces during World War 1. They showed extreme endurance on the battlefield and they were the pride of the nation. Let's adopt and improve their tactics, so that our modern special forces can learn from it and get better."
 ITA_commence_mare:0 "Commence Mare Nostrum"
 ITA_commence_mare_desc:0 "We have set out a grand plan to conquer all of the Mediterranean islands. This is the first step towards Mare Nostrum!"
 ITA_arditi:0 "Reinstatement of the Arditi"
 ITA_arditi_desc:0 "The time is nigh for the resurrection of Italy's most feared land forces. The Arditi will thrive in these dark times, just as their logo suggests and their past deeds have proven. Let's pray for their victories..."
 ITA_improved_infantry_weapons:0 "MAB-38"
 ITA_soldati_classe:0 "Classe Camicia Nera"
 ITA_soldati_classe_desc:0 "The Soldati Class is better known as the Camicia Nera class, named after Italy's very own paramilitarty organisation, the blackshirts, or Camicia Nera. Just like during the March On Rome in 1922, the Camicia Nera will be the intimidating mass, but this time in the heat of naval battle."
 ITA_condottieri_classe:0 "Classe Condottieri"
 ITA_condottieri_classe_desc:0 "The Condottieri were the captains of the huge amount of mercenary armies this country counted centuries ago. The Condottieri were the bridges between generals and soldiers. Our cruisers will have this exact same role on the maritime battlefield."
 ITA_regia_marina:0 "Cantieri Ruiniti dell'Adriatico"
 ITA_regia_marina_desc:0 "The Cantieri Ruiniti dell'Adriatico will be our royal naval manufacturer for the reborn fascist Regia Marina. She will be the spine of our Mediterranean body!"
 ITA_yamato:0 "Campioni's Mission to Japan"
 ITA_yamato_desc:0 "The Japanese have constructed the greatest battleship mankind has ever seen. We must send Campioni to Yamamoto for a maritime technological exchange. It is a necessity for the Regia Marina to learn how to build battleships as efficiently as the Japanese do, it depends on our own survival..."
 ITA_Rule_Supreme:0 "Brittania Caedetur"
 ITA_Rule_Supreme_desc:0 "The Royal Navy you say, a fairy tale for little kids nowadays. Brittania caedetur! (Britain will be slaughtered!)"
 ITA_san_marco_brigade:0 "Brigata Marina San Marco"
 ITA_san_marco_brigade_desc:0 "The San Marco Brigade, originated in 1550, is one of the oldest marine corpses in the world. Long traditions mixed with modernization will result in one of the most feared special forces in the world."
 ITA_marconi_classe:0 "Classe Marconi"
 ITA_marconi_classe_desc:0 "Guglielmo Marconi was a great Italian scientist. It was the man who brought the radio into this world. Revolutionary! His well-known invention will certainly help our new deadly submarine line in their convoy raiding operations."
 ITA_Challenge_The_Royal_Navy:0 "Italia vs. Brittania"
 ITA_Challenge_The_Royal_Navy_desc:0 "Italia turrita, our nation's protectress, challenged lady Brittania to settle the Mediterranean issue for once and for all. Therefore, she seeks our support, ferocity and fealty in completing this Italian common cause."
 Roman_Empire_fascism:0 "Novum Imperium Romanum"
 Roman_Empire_fascism_DEF:0 "Novum Imperium Romanum"
 ITA_form_rome:0 "Reformate Imperium Romanum"
 Imperator_Romanorum:0 "Imperator Romanorum"
 ITA_annex_syria:0 "Annex Syria"
 ITA_Italian_Development:0 "Concentrate On Italia"
 ITA_Italian_Development_desc:0 "Having colonies is fine and all, but Italia is the backbone of our Empire, let's build further upon our home base."
 ITA_National_Projects:0 "National Projects"
 ITA_National_Projects_desc:0 "The new national building projects in neoclassical style has revived the Italian building spirit of old, Build! Build! Build!"
 ENG_tfv:0 "Together for Victory!"
 ENG_tfv_desc:0 "It is only through common sweat and blood that we may defeat the Jerries."
 ENG_dresden:0 "Area Bombardment"
 ENG_dresden_desc:0 "'If Russia can hold Germany on land I doubt whether Germany will stand 12 or 18 months' continuous, intensified and increased bombing, affecting, as it must, her war production, her power of resistance, her industries and her will to resist (by which I mean morale).' -Sir John Edward Singleton"
 CRO_ivan_orsanic:0 "Ivan Orsanic"
 CRO_milan_budak:0 "Milan Budak"
 CRO_vladimir_nazor:0 "Vladimir Nazor"
 CRO_bozidar_magovac:0 "Božidar Magovac" 
 CRO_andrija_hebrang:0 "Andrija Hebrang"
 CRO_august_kosutic:0 "August Košutić"
 CRO_mladen_lorkovic:0 "Mladen Lorković"
 CRO_ante_vokic:0 "Ante Vokić"
 CRO_vladko_macek:0 "Vladko Maček"
 CRO_vjekoslav_vrancic:0 "Vjekoslav Vrančić"
 HOL_marines:0 "Korps Mariniers"
 HOL_marines_desc:0 "Our marine corps was founded in 1665, in the peak of our Golden Age. Instantly, they executed the raid on the Medway and became infamous all over Europe. Let that same fear strike the Axis again."
 HOL_secret_staff_talks2:0 "Unified Benelux Command"
 HOL_secret_staff_talks2_desc:0 "World tensions are rising fearfully high. Close military cooperation with our closest allies, Belgium and Luxembourg, will be necessary if we want to stand tall against an evergrowing axis."
 HOL_light_tanks_for_the_colonies2:0 "Dutch Blitzkrieg"
 HOL_light_tanks_for_the_colonies2_desc:0 "Our eastern neighbours, the Germans, have developed a highly terrifying, but modern land army due to the intelligent use of armor technology. We may should copy them a bit or something, you know, Germanic brothers and all that. Only our own iron wave can stop theirs. Armor would also be very useful for the vast landmass of our eastern colony."
 HOL_lessons_from_the_low_countries2:0 "Polder Guerilla"
 HOL_lessons_from_the_low_countries2_desc:0 "Our amphibious landscape has been both a curse and a blessing over the past centuries. Sometimes we got screwed over by the sea, sometimes the sea protected us. The waterline protected us several times for example. Our experience with the landscape should come to our advantage when fighting against a foreign threat."
 HOL_liberation2:0 "Bevrijding!"
 HOL_liberation2_desc:0 "God zegene het Vaderland."
 HOL_hussars:0 "Koninklijke Huzaren"
 HOL_hussars_desc:0 "The Regiment Huzaren Boreel has been considered one of the most elite hussar units the world has to offer. We need our welltrained elite hussars more than ever in these uncertain times."
 HOL_anti_tank_guns_for_the_continent2:0 "Stop The Iron Wave"
 HOL_anti_tank_guns_for_the_continent2_desc:0 "We will not be able to put out a highly modern armored army in a few months, that process would take years. We don't have that time. As the Reich is knocking on our eastern border, we should be investing into Anti-tank guns, they're cheap, efficient and dont require years of additional development before they have the capability of being used."
 HOL_production_under_license2:0 "Redeem The 1770's Arms Trade Favour"
 HOL_production_under_license2_desc:0 "During the American Revolution, our country did help the American rebels a lot by providing military materiel to them. It would be delightful if the USA could help US now by providing military materiel. One of our oldest allies would hopefully agree with this."
 HOL_appoint_new_supreme_commander2:0 "KNIL Investments"
 HOL_appoint_new_supreme_commander2_desc:0 "The KNIL, The Royal Netherlands East Indies Army, could use some investments. The agressive behaviour of the Rising Sun could be a potential threat to our empire, which is something we obviously don't like. If the Rising Sun is making threatening plans for the future, we must be able to counterstrike immediately and crush them under our boots."
 HOL_modernize_our_infantry_equipment2:0 "Modernize The Dutch Mannlicher"
 HOL_modernize_our_infantry_equipment2_desc:0 "So, we know that our equipment is no match against any modernized army in Europe in its current state. We should upgrade our army equipment, especially our infantry guns, German WW1 rifles. It won't take long, its relatively cheap and highly effective. We should be able to transform our infantry relatively quickly into a modern land force."
 HOL_krijgsmacht:0 "Nederlandsche Krijgsmacht"
 HOL_krijgsmacht_desc:0 "De Koninklijke Marine, Landmacht and Luchtmacht, these are the official instances of our national armed forces. With world tensions rising high, we should invest more in our armed forces again after decennia of neglect. Our very own survival depends on it."
 HOL_zevenprovincien:0 "Zeven Provinciën" 
 HOL_zevenprovincien_desc:0 "'Sijn tot noch toe door Godes genadigen zegen met de gewenschte successen heerlijck gecroont,' wrote Cornelis de Witt after he and admiral De Ruyter captured the Royal Charles in Chatham while commanding the infamous operation on board of the Seven Provinces; Since then, the Zeven Provinciën has been the eternal pride of the fleet. Let's keep it that way."
 HOL_fokker1:0 "Assign Fokker"
 HOL_fokker1_desc:0 "Fokker is our most successful aerodromics company due to high quality massed sales in WW1 as a neutral party. Their military planes have been used worldwide, altough they tend to forget their roots sometime. Let's tighten our bond with Fokker."
 JAP_strike_on_the_northern_resource_area:0 "Strike on the Northern Resource Area"
 JAP_strike_on_the_northern_resource_area_desc:0 "Our plans have been successful. But the resources we gained are not enough to sustain our war industry. We must follow the doctrine that the army favors, and strike north into the Soviet Union."
 CRO_tomislav_II:0 "Tomislav II"
 CRO_tomislav_II_desc:0 "The Prince Aimone of Savoy, cousin of the king of Italy Victor-Emmanuele III has accepted the crown of Croatia. In order to mark this event as a refoundation of the croatian monarchy, he chose to be named Tomislav II, successor of Tomislav, the founder of Croatia."
 JAP_armored_divisions2:0 "Chi-Ri Tanks"
 JAP_armored_divisions2_desc:0 "We will begin research on modern medium tanks."
 cro_diplomacy_focus:0 "Croatian Diplomacy"
 #croatia semi generic
 CRO_officer_training:0 "Officer Training"
 CRO_officer_training_desc:0 "Despite the increasing possibilities of aerial and naval warfare, ground combat is still key in tomorrow's wars. With preparation, we can avoid reliving the hell of the trenches."
 CRO_improve_conscripts_equipment:0 "Improve Conscripts Equipment"
 CRO_improve_conscripts_equipment_desc:0 "The limits for what equipment can be carried by infantry are constantly being pushed. We will focus on giving our troops the best tools available."
 CRO_motorization_effort:0 "Motorised Support"
 CRO_motorization_effort_desc:0 "Mobility and protection are crucial to get infantry into and out of the field safely. Focusing on these developments will allow us to take action quickly."
 CRO_army_maneuvers:0 "Army Maneuvers"
 CRO_army_maneuvers_desc:1 "To whip our army in shape new maneuvers must be held. The experience will also undoubtedly lead to new insights in modern warfare."
 CRO_supremacy_of_offense:0 "Supremacy of Offense"
 CRO_supremacy_of_offense_desc:1 "Offensive action is the key to victory, and must therefore dictate our overall strategy and the development of new doctrines."
 CRO_supremacy_of_defense:0 "Supremacy of Defense"
 CRO_supremacy_of_defense_desc:1 "Hemmed in by enemies on all sides, we must hold out long enough for our allies to take the heat off us. The development of new military doctrines must focus on the defense of our homeland."
 CRO_artillery_regiments:0 "Artillery Regiments"
 CRO_artillery_regiments_desc:1 "By introducing powerful artillery regiments to our divisions their overall fighting strength will be greatly increased."
 CRO_domestic_artillery_production:0 "Domestic Artillery Production"
 CRO_domestic_artillery_production_desc:1 "By stimulating the development of modern, domestic artillery models, we can ensure that our forces have the best fire support we can provide."
 CRO_anti_tank_defenses:0 "Anti-tank Defenses"
 CRO_anti_tank_defenses_desc:1 "As the tank has taken center field in modern warfare new developments are required in the field of anti-tank field guns, allowing our infantry to take out these armored behemoths."
 CRO_mountain_brigades:0 "Mountain Brigades"
 CRO_mountain_brigades_desc:1 "Large parts of our nation consists of mountains, requiring the formation of special brigades that are specialized in combat in this type of terrain."
 CRO_tank_conversions:0 "Tank Conversions"
 CRO_tank_conversions_desc:1 "While we may require tanks now, we may require self-propelled artillery or tank destroyers based on the same chassis next month. Our armored equipment must remain flexible and adaptable to our current needs."
 CRO_modern_tanks:0 "Modern Tanks"
 CRO_modern_tanks_desc:1 "Through the addition of large-caliber main weaponry, armored technology has developed well beyond the simple intention of safely transporting forces from point A to point B. We must develop our own version of modern tanks to be able to compete with our neighbors."
 CRO_Science:0 "Science"
 CRO_Science_desc:1 "We must invest in research"
 
 CRO_small_arms:0 "Replace the M95"
 CRO_small_arms_desc:0 "We must replace our outdated infantry rifle."
 CRO_armored_cavalry:0 "Mechanized Support"
 CRO_armored_cavalry_desc:0 "If we armor our motorized formations, we can reduce the impact of small arms fire."
 CRO_equipment_effort_2:0 "Equipment Effort II"
 CRO_equipment_effort_2_desc:0 "We will continue our efforts to ensure our infantry and support troops are armed with the best possible equipment of our time."
 CRO_mechanization_effort:0 "Mechanization Effort"
 CRO_mechanization_effort_desc:0 "Rethinking the possibilities of motorized infantry, we can push the limits of what vehicles can be constructed today."
 CRO_doctrine_effort_2:0 "Doctrine Effort II"
 CRO_doctrine_effort_2_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 CRO_equipment_effort_3:0 "Equipment Effort III"
 CRO_equipment_effort_3_desc:0 "Instead of imitating or buying foreign equipment, we should aim to become world-leading in infantry weapons."
 CRO_armor_effort:0 "Armor Effort"
 CRO_armor_effort_desc:0 "Applying what we have learned from mechanizing our infantry, we can improve our armored vehicles as well."
 CRO_special_forces:0 "Special Forces"
 CRO_special_forces_desc:0 "We have need of elite forces; mountain troops and shock troopers should be our priority."
 CRO_aviation_effort:0 "Aviation Effort"
 CRO_aviation_effort_tt:0 "Not enough building slots for §YAir Base§!"
 CRO_aviation_effort_desc:0 "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
 CRO_fighter_focus:0 "Fighter Focus"
 CRO_fighter_focus_desc:0 "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
 CRO_bomber_focus:0 "Bomber Focus"
 CRO_bomber_focus_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
 CRO_aviation_effort_2:0 "Aviation Effort II"
 CRO_aviation_effort_2_desc:0 "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
 CRO_CAS_effort:0 "CAS Effort"
 CRO_CAS_effort_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
 CRO_rocket_effort:0 "Rocket Effort"
 CRO_rocket_effort_desc:0 "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
 CRO_NAV_effort:0 "NAV Effort"
 CRO_NAV_effort_desc:0 "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."
 CRO_naval_effort:0 "Naval Effort"
 CRO_naval_effort_tt:0 "Not enough building slots for §YNaval Dockyards§!"
 CRO_naval_effort_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
 CRO_flexible_navy:0 "Flexible Navy"
 CRO_flexible_navy_desc:0 "Reinventing naval warfare to account for the advances in submarine technology will allow us to strike efficiently against enemy convoys."
 CRO_large_navy:0 "Large Navy"
 CRO_large_navy_desc:0 "Adapting our naval doctrines to accommodate large ships and ensuring the safety of our trade convoys will teach us much about what sort of ships we need."
 CRO_submarine_effort:0 "Submarine Effort"
 CRO_submarine_effort_desc:0 "Submarine warfare is the most exciting naval development since the invention of the torpedo boat. We would do well to not just protect against submarines, but also use them against enemy shipping."
 CRO_cruiser_effort:0 "Cruiser Effort"
 CRO_cruiser_effort_desc:0 "Before making forays into advanced battleship research, the smaller cruisers are in need of replacement."
 CRO_destroyer_effort:0 "Destroyer Effort"
 CRO_destroyer_effort_desc:0 "Studying the design and strategic use of submarines, we have also learned how to counter those strategies. Destroyers will be crucial for this."
 CRO_capital_ships_effort:0 "Capital Ship Effort"
 CRO_capital_ships_effort_desc:0 "The nation with the most battleships will rule the oceans. Battleships and carriers represent the old and the new in naval superiority."
 CRO_industrial_effort:0 "Industrial Effort"
 CRO_industrial_effort_desc:0 "Focus all our political efforts on building up the civilian industry in a great leap forward."
 CRO_industrial_effort_2:0 "Industrial Effort II"
 CRO_industrial_effort_2_desc:0 "With iron will and a relentless work ethic, we can mobilize the people in another great industrial effort."
 CRO_construction_effort_tt:0 "Not enough building slots for §YCivilian Factories§!"
 CRO_construction_effort:0 "Construction Effort"
 CRO_construction_effort_desc:0 "Construction Effort"
 CRO_production_effort:0 "Production Effort"
 CRO_production_effort_tt:0 "Not enough building slots for §YMilitary Factory§!"
 CRO_production_effort_desc:0 "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 CRO_construction_effort_2:0 "Construction Effort"
 CRO_construction_effort_2_desc:0 "Continuing to expand our factories will allow us to speed up production of goods for trade and further construction efforts."
 CRO_production_effort_2:0 "Support Heavy Vehicle Industry"
 CRO_production_effort_2_desc:0 "As one of the main European port, Antwerp is in a good position to develop an industry focused on exportation."   
 CRO_production_effort_3:0 "Support Armoured Manufacturers"
 CRO_production_effort_3_desc:0 "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 CRO_infrastructure_effort:0 "Infrastructure Effort"
 CRO_infrastructure_effort_desc:0 "A country without proper infrastructure cannot pursue advanced projects or constructions."
 CRO_infrastructure_effort_tt:0 "Not enough building slots for §YInfrastructure§!"
 CRO_coal_mines:0 "Fully Exploit the Limburg Coal Mines"
 CRO_coal_mines_desc:0 "Coal is our main ressources and we must absolutely maximize its extraction." 
 CRO_synth_oil_effort_tt:0 "Not enough building slots for §YSynthetic Refinery§!"
 CRO_infrastructure_effort_2:0 "Infrastructure Effort II"
 CRO_infrastructure_effort_2_desc:0 "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 CRO_construction_effort_3:0 "Industrial Effort III"
 CRO_construction_effort_3_desc:0 "Expansion of our infrastructure network has significantly improved our capacity for construction."
 CRO_rockets:0 "German rockets"
 CRO_rockets_desc:0 "invite german researchers"
 CRO_extra_tech_slot:0 "Extra Research Slot"
 CRO_extra_tech_slot_desc:0 "Our industrial expansion and other recent advances might allow us to conduct more R&D in parallel."
 CRO_extra_tech_slot_2:0 "Extra Research Slot II"
 CRO_extra_tech_slot_2_desc:0 "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
 CRO_technology_sharing:0 "Technology Sharing"
 CRO_technology_sharing_desc:0 "By sharing technological advances with our allies, our whole faction will be able to conduct wartime R&D more efficiently."
 CRO_secret_weapons:0 "Secret Weapons"
 CRO_secret_weapons_desc:0 "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
 CRO_political_effort:0 "Our time to strike"
 CRO_political_effort_desc:0 "RISE UP!"
 CRO_collectivist_ethos:0 "Empower Syndicates"
 CRO_collectivist_ethos_desc:0 "Our enemies may divide and conquer lesser nations, but our people will stand united. All for one and one for all."
 CRO_liberty_ethos:0 "Democratic Concensus"
 CRO_liberty_ethos_desc:0 "In this time of ideological fanatics who seek to suffocate the human spirit, we will safeguard individual liberties and freedom."
 CRO_militarism_desc:0 "Those who view the military as a necessary evil are doomed to hesitate in the face of war. We will ingrain militarism into our culture to become a people of soldiers."
 CRO_political_correctness:0 "Political Correctness"
 CRO_political_correctness_desc:0 "People holding mildly controversial or otherwise embarrassing opinions appear to be concerned that there is a wide-reaching conspiracy against them. This seems like an excellent idea."
 CRO_neutrality_focus:0 "Neutrality Focus"
 CRO_neutrality_focus_desc:0 "While others may claim it takes bravery and wisdom to take sides in a global conflict, we know it takes more to refuse."
 CRO_interventionism_focus:0 "Interventionism Focus"
 CRO_interventionism_focus_desc:0 "We value the freedom of all people, not only our own citizens. If preventing tyranny means war, then so be it."
 CRO_military_youth:0 "Ustaška Mladež"
 CRO_military_youth_desc:0 "Organizations to promote discipline and political education of young people in our nation will foster loyalty and self-sacrifice early."
 CRO_deterrence:0 "Deterrence"
 CRO_deterrence_desc:0 "Standing alone, we rarely benefit from war. Fortunately, we know that the best defense is one so well-known you never have to put it to use."
 CRO_volunteer_corps:0 "Volunteer Corps"
 CRO_volunteer_corps_desc:0 "Forcing our people to die for ideals of freedom would be an exercise in irony, but establishing means for those who wish to aid people abroad is not."
 CRO_paramilitarism:0 "Paramilitarism"
 CRO_paramilitarism_desc:0 "Military principles have applications outside of the military. With the development of semi-militarized units to complement our armed forces, more people will have military training."
 CRO_indoctrination_focus:0 "Indoctrination"
 CRO_indoctrination_focus_desc:0 "Having established our ideology as based on the truth, it may be taught as truth. Education and media must reflect this lesson."
 CRO_foreign_expeditions:0 "Foreign Expeditions"
 CRO_foreign_expeditions_desc:0 "With our enemies prepared to intervene in distant conflicts on behalf of their ideals, we must be ready to do the same for ours."
 CRO_why_we_fight:0 "Why We Fight"
 CRO_why_we_fight_effect:0 "If we don't have the §YNeutral Foreign Policy§! spirit we will be able to create factions.\n"
 CRO_why_we_fight_desc:0 "The world is growing increasingly unsafe. Our people need to see the atrocities being committed by those who crave power. It is time we rally the people to our cause and ensure everyone is ready to fight for our freedom."
 CRO_political_commissars:0 "Political Commissars"
 CRO_political_commissars_desc:0 "To ensure that our policies are followed in military practice, we will introduce politically appointed officials into military ranks."
 CRO_internationalism_focus:0 "Internationalism Focus"
 CRO_internationalism_focus_desc:0 "Ideology knows no borders. Another nation may call itself sovereign, but our convictions are above such claims."
 CRO_nationalism_focus:0 "National Rebirth"
 CRO_clergy:0 "Integrate the Clergy"
 CRO_clergy_desc:0 "We will legitimize our rule by incorporating the Catholic church into our government."
 CRO_enforce_pavelic_rule:0 "Enforce Pavelić's Rule"
 CRO_enforce_pavelic_rule_desc:0 "Now that the Ustaše has finally taken over, we can ensure that our dear leader, the Podlavnik Ante Pavelić, is recognized as the rightful ruler of our country by all faithful [CRO.GetAdjective]s."

 CRO_militarism:0 "Establish The Home Guard" 
 CRO_nationalism_focus_desc:0 "Our nation is unique, and our political achievements could only have happened here. We must fight for it at any cost."
 CRO_ideological_fanaticism_communism:0 "Ideological Fanaticism"
 CRO_ideological_fanaticism_ustasha:0 "Ideological Fanaticism"
 CRO_ideological_fanaticism_desc:0 "Our politically established values and goals are worth dying for as much as any ancient faith. Any follower should be prepared to face death, and those who stray better be prepared to face death." 
 CRO_catholic_dominance_focus:0 "Croatian Nationalism"
 CRO_catholic_dominance_focus_desc:0 "Croatian Nationalism."
 CRO_secularism_focus:0 "Secularism"
 CRO_secularism_focus_desc:0 "Secularism." 
 CRO_integrate_muslim_croats_focus:0 "Raise the Home Guard"
 CRO_integrate_muslim_croats_focus_desc:0 "We will found our first national militia - The Croatian Homeguard." 
 CRO_integrate_orthodox_croats_focus:0 "Integrate Orthodox Croats"
 CRO_integrate_orthodox_croats_focus_desc:0 "While we have mistreated Orthodox Croats, we must recognize that even if the good Croats are members of the Roman Catholic Church, Croats who have converted to the religion of the Serbs are Croat after all and must be integrated into the national community." 
 CRO_integrate_religious_minorities_focus:0 "Integrate Religious Minorities"
 CRO_integrate_religious_minorities_focus_desc:0 "Our country is home to religious minorities and they should be respected in their particularisms."
 CRO_war_economy:0 "War economy"
 CRO_war_economy_desc:0 "We must fuel our war economy"
 CRO_proffesional_army:0 "Proffesional army"
 CRO_proffesional_army_desc:0 "Our army must be ready for war, at all times!"
 CRO_develop_tanks:0 "Develop tanks"
 CRO_develop_tanks_desc:0 "Just invest bro"
 CRO_prepare_for_war:0 "Prepare for war"
 CRO_prepare_for_war_desc:0 "we must prepare for war"
 CRO_invite_serbian_officers:0 "Invite serbian officers"
 CRO_invite_serbian_officers_desc:0 "We should invite the skilled serbian officers, that served the yugoslavian army"

 CRO_a_king_for_our_people_focus:0 "A King For Our People"
 CRO_a_king_for_our_people_focus_desc:0 "In order to restore the greatness of the free croatian kingdom of the past, we must choose a king who will lead the regenerated croatian people."
 CRO_italian_influence_focus:0 "Italian Influence"
 CRO_italian_influence_desc:0 "Now that an italian is on the throne of Croatia, our country has closer links to Italy than never before.."
 CRO_italo_croat_legion:0 "Italo-croat Legion"
 CRO_italo_croat_legion_desc:0 "Italo-croat Legion"
 CRO_dalmatian_question_focus:0 "The Dalmatian Question"
 CRO_dalmatian_question_focus_desc:0 "While many would have tought that the choice of an Italian king would ease the relations with Italy, Tomislav II didn't welcome italian influence over his kingdom. The new king has put in doubt the fact that the damatian coast could be italianized. In fact he seems to will force Italy to abandon his claim on the region and control the whole coast." 

FIN_prepare_for_winter:0 "Prepare for Winter"
FIN_stockpile_rations:0 "Stockpile Rations"
FIN_stockpile_rations_desc:0 "Harsh winter means less food for our people and perhaps more importantly, our troops. If our men are to defend our glorious nation we will need to improve our infrastructure."
FIN_imitate_sweden:0 "Seek Allies"
FIN_prepare_for_winter_desc:0 "There are undoubtedly some troublesome times ahead. With former enemies in the east, tensions growing in the south and overseas threats to our way of life, our government needs to agree on how we shall best protect the Finnish people, and we need to do so fast."
FIN_invest_in_the_private_sector:0 "Invest in the Private Sector"
FIN_invest_in_the_private_sector_desc:0 "A good economy is nothing to scoff at. Whatever path we choose to walk, we will need a strong private sector to help us build the future we want."
FIN_expand_the_mines:0 "Expand the Mines"
FIN_expand_the_mines_desc:0 "The northern mines are full of resources. If we choose to invest in them, we could retrieve more resources either for export or domestic use."
FIN_nokia:0 "Multilingual Education"
FIN_nokia_desc:0 "Changing demographics are causing problems for many students whom don't speak finnish. By establishing both Swedish and Russian as official languages, we can make sure that our population will be better educated."
FIN_the_red_wall:0 "The Second Mannerheim Line"
FIN_the_red_wall_desc:0 "The Mannerheim Line was a defensive fortification line on the Karelian Isthmus built by Finland against the Soviet Union. It may be wise to invest in a similiar structure of forts and bunkers on the eastern front in order to prepare a powerful defense."
FIN_frantic_planning:0 "Motti Tactics"
FIN_frantic_planning_desc:0 "Motti is Finnish military slang for a totally encircled enemy unit. A motitus is a double envelopment manoeuvre, using the ability of light troops to travel over rough ground to encircle enemy troops on a road. The tactic is especially useful for heavily outnumbered but mobile forces, especially in the snowy climate of Finland."
FIN_eastern_defense:0 "Eastern Defense"
FIN_eastern_defense_desc:0 "The eastern front is large and hard to defend. We should focus on raising more defensive structures if it is to survive a war with the Soviet Union."
FIN_democratic_support:0 "Democratic Support"
FIN_democratic_support_desc:0 "By relaxing some laws and legislating further protection of human rights we could potentially make some powerful allies out of our neighbours and find friends abroad."
FIN_nationalist_support:0 "Nationalist Support"
FIN_nationalist_support_desc:0 "The finnish people are rightfully a proud one. We need to establish our superiority in Europe and ally ourselves with nations that share our nationalistic vision."
FIN_expansionism:0 "Expansionism"
FIN_expansionism_desc:0 "With the recent political changes, we are seeing increasing support for the expansion of our borders."
FIN_invite_norway:0 "Invite Norway"
FIN_invite_norway_desc:0 "Norway are on good terms with us and the rest of Scandinavia. Keeping that in mind, they also posses coasts of great strategic importance and their northern borders could serve as a buffer zone for us. It would be foolish not to consider their inclusion in the new Kalmar Union."
FIN_invite_denmark:0 "Invite Denmark"
FIN_invite_denmark_desc:0 "Denmark has strong cultural and ideological bonds with the rest of Scandinavia. Their position in the south on mainland Europe is an incredibly important asset. Our advisors suggest we invite them to the Second Kalmar Union."
FIN_promote_sisu:0 "Expand the White Guard"
FIN_promote_sisu_desc:0 "In the Winter War the White Guard was responsible for the carrying out of the mobilisation. A quarter of the manpower of the field army consisted of Guard members. This contribution proved important, as Guard members were the best trained and equipped personnel in an army which lacked even basic supplies."
FIN_civilian_kitchens:0 "Civilian Field Kitchens"
FIN_civilian_kitchens_desc:0 "Finland experienced a large deficit in the supply of tents, stoves and other equipment, but many deaths were avoided thanks to civilian volunteers who set up kitchens and provided food for the troops in the field."
FIN_ski_infantry:0 "Ski Infantry"
FIN_ski_infantry_desc:0 "Ski troops played a key role in the successes of the Finnish war effort against the Soviet Union during the Winter War in 1939. Forested, rural terrain with no roads was used by Finnish ski troops with great success against the advancing mechanized Soviet troops."
FIN_molotov_cocktails:0 "Molotov Cocktails"
FIN_molotov_cocktails_desc:0 "The Finns perfected the design and tactical use of the petrol bomb. Further refinements included the attachment of wind-proof matches or a phial of chemicals that would ignite on breakage, thereby removing the need to pre-ignite the bottle, and leaving the bottle about one-third empty was found to make breaking more likely."
FIN_wolf_divisions:0 "Wolf Divisions"
FIN_wolf_divisions_desc:0 "As our army grows in both size and power, we should start focusing on using more aggresive tactics. Our troops are no longer merely a force for defense."
FIN_the_winter_war:0 "Establish Greater Finland"
FIN_the_winter_war_desc:0 "Greater Finland is an irredentist and nationalist idea that emphasized territorial expansion of Finland. The most common conception of Greater Finland was defined by natural borders encompassing the territories inhabited by Finns and Karelians, ranging from the White Sea to Lake Onega and along the Svir River and Neva River including the Ingrian region and the Kola Peninsula."
FIN_southern_foothold:0 "Southern Foothold"
FIN_southern_foothold_desc:0 "If we want to expand, we will need more opportunities to do so than the frozen climate of the west and east. Estonia will be no match for our army, and their lands provide us with a strategic foothold across the sea."
FIN_german_support:0 "Join The Axis"
FIN_german_support_desc:0 "The powerful German Reich is willing to aid us against the power hungry comintern in the east and the foolish western democracies who would condemn our pride. Support for the axis is mixed in our country, but the majority agree that we cannot afford to reject such a powerful ally."
FIN_independent_revolution:0 "Independent Revolution"
FIN_independent_revolution_desc:0 "Our glorious revolution can succeed without the aid of the corrupt Comintern. We will be best of creating a true communist state according to our own principles."
FIN_propaganda_machine:0 "Propaganda"
FIN_propaganda_machine_desc:0 "Inspiring posters, movies and speeches have rallied our people. They are ready to support us whatever happens."
FIN_the_lotta_svard:0 "The Lotta Svärd"
FIN_the_lotta_svard_desc:0 "During the Winter War some 100,000 men whose jobs were taken over by 'Lottas' were freed for military service. The Lottas worked in hospitals, at air-raid warning posts and other auxiliary tasks in conjunction with the armed forces. The Lottas, however, were officially unarmed. The only exception was a voluntary anti-aircraft battery in Helsinki, composed of Lotta Svärd members."
FIN_pacifist_sentiment:0 "Pacifist Sentiment"
FIN_pacifist_sentiment_desc:0 "Our people are united in the belief for world peace. They also understand that sometimes alliances must be made, if merely to act as a deterrent against those who would otherwise threaten the peace."
FIN_found_valpo:0 "Found ValPo"
FIN_found_valpo_desc:0 "Historically founded in 1937, Valtiollinen poliisi, shortened ValPo and meaning "state police" was the predecessor of the Finnish Security Intelligence Service. The organization's spies have been credited among other things with allegedly managing to photograph Heinrich Himmler's briefcase on his visit to Finland."
FIN_deterrence:0 "Deterrence"
FIN_deterrence_desc:0 "Sadly, not all share our vision for peace. Therefore we should invest in our defenses, that way we will not appear as an easy target to warmongering expansionists."
FIN_military_necessity:0 "Military Necessity"
FIN_military_necessity_desc:0 "The finnish nation is one that knows how valuable an innovative mind can be during times of war. We need to encourage scientists to continue their efforts and keep coming up with new breakthroughs if we are to secure our future both short- and longterm."
FIN_secret_weapons:0 "Secret Weapons"
FIN_secret_weapons_desc:0 "Who knows what some nations have up their sleeves? Countless inventions are kept secret for a long time, as the element of surprise can be the most valuable asset in war."
FIN_cautious_politics:0 "Cautious Politics"
FIN_cautious_politics_desc:0 "If we are to come out of the brewing storm with minimal losses, we would do best not to choose sides. There is no reason to paint a target on our own backs."
FIN_limited_motorization:0 "Limited Motorization"
FIN_limited_motorization_desc:0 "The Finns long preffered their cavalry regiments to motorized infantry. The horses could run through deep snow that stopped the Soviet Forces, which meant that the motorization of the finnish army was slowed significantly."
FIN_tuli_isku:0 "Tuli-Isku"
FIN_tuli_isku_desc:0 "'Tuli-Isku' means 'Fire Strike' in finnish. Support artillery saw extensive use by the finns in both the Winter War and the Continuation War."
FIN_study_foreign_vehicles:0 "Study Foreign Vehicles"
FIN_study_foreign_vehicles_desc:0 "Most finnish vehicles were quite outdated even after the Winter War. We would do best to study proven imported vehicles instead of continuing the production of our current models."
FIN_import_tanks:0 "Import Tanks"
FIN_import_tanks_desc:0 "We can dramatically speech up our research and deployment of new tanks by importing larger quantities of them. That way we could have battalions using the newer models before we completely backwards-engineer them."
FIN_theft_and_learning:0 "Theft & Learning"
FIN_theft_and_learning_desc:0 "Thanks to previous war efforts, we still possess many captured tanks. By focusing more on these 'borrowed' tanks we can make the entire research project both cheaper and faster!"
FIN_aviation_effort:0 "Aviation Effort"
FIN_aviation_effort_tt:0 "Not enough building slots for §YAir Base§!"
FIN_aviation_effort_desc:0 "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
FIN_fighter_focus:0 "Fighter Focus"
FIN_fighter_focus_desc:0 "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
FIN_bomber_focus:0 "Bomber Focus"
FIN_bomber_focus_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
FIN_aviation_effort_2:0 "Aviation Effort II"
FIN_aviation_effort_2_desc:0 "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
FIN_CAS_effort:0 "CAS Effort"
FIN_CAS_effort_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
FIN_rocket_effort:0 "Rocket Effort"
FIN_rocket_effort_desc:0 "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
FIN_nav_effort:0 "Naval-Air Effort"
FIN_nav_effort_desc:0 "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."
FIN_naval_effort:0 "Naval Effort"
FIN_naval_effort_tt:0 "Not enough building slots for §YNaval Dockyards§!"
FIN_naval_effort_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
FIN_flexible_navy:0 "Flexible Navy"
FIN_flexible_navy_desc:0 "Reinventing naval warfare to account for the advances in submarine technology will allow us to strike efficiently against enemy convoys."
FIN_large_navy:0 "Study Foreign Ship Designs"
FIN_large_navy_desc:0 "Adapting our naval doctrines to accommodate large ships and ensuring the safety of our trade convoys will teach us much about what sort of ships we need."
FIN_submarine_effort:0 "Submarine Effort"
FIN_submarine_effort_desc:0 "Submarine warfare is the most exciting naval development since the invention of the torpedo boat. We would do well to not just protect against submarines, but also use them against enemy shipping."
FIN_cruiser_effort:0 "Cruiser Effort"
FIN_cruiser_effort_desc:0 "Before making forays into advanced battleship research, the smaller cruisers are in need of replacement."
FIN_destroyer_effort:0 "Destroyer Effort"
FIN_destroyer_effort_desc:0 "Studying the design and strategic use of submarines, we have also learned how to counter those strategies. Destroyers will be crucial for this."
FIN_capital_ships_effort:0 "Capital Ship Effort"
FIN_capital_ships_effort_desc:0 "The nation with the most battleships will rule the oceans. Battleships and carriers represent the old and the new in naval superiority."
FIN_further_artillery_support:0 "Further Artillery Support"
FIN_further_artillery_support_desc:0 "Artillery support has proven invaluable to our armies. It should be a top priority to continue improvement and deployment of new technologies to save more of our countrymen's lives."
FIN_fortress_aland:0 "Fortress Åland"
FIN_fortress_aland_desc:0 "By fortifying the island we can turn it into a formidable naval base. The expansion of naval dockyards will also provide us with the means to establish and maintain superiority."
FIN_marines_and_landing_craft:0 "San Marco Brigade"
FIN_marines_and_landing_craft_desc:0 "Wars are not won by naval power alone; we must also be able to transport our armies across the waves and put them ashore safely..."
FIN_paratroopers_and_air_bases:0 "Paratroopers and Air Bases"
FIN_paratroopers_and_air_bases_desc:0 "Wars are not won by planes alone; we must also be able to transport our armies across the skies and put them behind enemy lines safely..."
FIN_flying_lottas:0 "Flying Lottas"
FIN_flying_lottas_desc:0 "While elsewhere in the country there are talks of a 'Lotta Svärd' organization fo auxiliary support, the airforce has also begun discussing the involvement of women. The finnish ladies have proven their resolve, and most of the leadership is open to accept them into the ranks of our pilots."
finland.17.t:0 "Invitation to Second Kalmar Union"
 finland.17.d:0 "In an effort to strengthen the north and contain the possible resurgence of aggressive expansionism from the east and south, Finland has requested that we join them in an alliance aiming to bring these nations together."
 finland.17.a:0 "Gladly. The Kalmar Union needs to be rebuilt."
 finland.17.b:0 "[Root.GetName] walks its own path."
 finland.18.t:0 "[From.GetName] Joins Second Kalmar Union"
 finland.18.d:0 "Our plan to establish a Scandinavian Union is succeeding. [From.GetLeader] approves of our efforts and has accepted our invitation to an alliance."
 finland.18.a:0 "We are one step closer to rebuilding the Kalmar Union."
 finland.19.t:0 "[From.GetName] Refuses Second Kalmar Union"
 finland.19.d:0 "Despite our best efforts to offer support to the Second Kalmar Union, our most recent attempt to reach out to one of the nations has been met with skepticism. [From.GetLeader] has refused to join the alliance, perhaps doubting our motives, or perhaps being concerned that aligning too closely with us would make them a target."
 finland.19.a:0 "They could already be a target for all they know!"

 finland.29.t:0 "Britain accepts ally request"
 finland.29.d:0 "'History has shown how much can be accomplished when great nations stand side by side. We are proud to welcome you not only as friends, but as Allies. Together we will be a shining beacon of liberty in a world encroached by the darkness of oppression!'\n\nOur request to join Britain as Allies has been accepted. We can count on their full support in the turbulent times ahead."
 finland.29.a:0 "Together we will hold the line!"
 finland.30.t:0 "Britain denies ally request"
 finland.30.d:0 "'While we have enjoyed good relations in the past, we cannot risk an escalation of the conflicts across the channel. Germany has earned our trust in the honoring of our Naval Pact, and we have no reason to anger the Soviet Union. We will defend ourselves should the fires spread we will not risk fanning the flames. Peace must always be the goal of any democratic nation.'\n\nOur request to join Britain as Allies has been denied. The British government is unwilling to antagonize Germany or the Soviet Union further, and will not jeopardize the current peace."
 finland.30.a:0 "Yet another nation forgets Finland. We will show them!"
 
 finland.25.t:0 "Finland wants to join Allies"
 finland.25.d:0 "The world is growing increasingly unsafe. Britain and Finland remain bastions of democracy and liberty in Europe and Finland now propose that they join the Allies.\nHow should we reply?"
 finland.25.a:0 "Yes"
 finland.25.b:0 "No"
 
 
 finland.31.t:0 "Germany accepts ally request"
 finland.31.d:0 "'History has shown how much can be accomplished when great nations stand side by side. We are proud to welcome you not only as friends, but as allied axis members. Together we will bring order to a world encroached by the darkness of communism and the weakness of the allies!'\n\nOur request to join Germany as Axis members has been accepted. We can count on their full support in the turbulent times ahead."
 finland.31.a:0 "Together we will hold the line!"
 finland.32.t:0 "Germany denies ally request"
 finland.32.d:0 "'While we appreciate your request to join our glorious faction, we have no reason to anger the Soviet Union and furhter provoke the allies all for one insignificant country. '\n\nOur request to join the Axis has been denied. The German government is unwilling to antagonize the Soviet Union or the Soviet Union or any other major faction further, and will not jeopardize the current peace."
 finland.32.a:0 "Yet another nation forgets Finland. We will show them!"
 
 finland.333.t:0 "Finland wants to join Axis"
 finland.333.d:0 "The world is growing increasingly unsafe. Germany and Finland remain bastions of national pride and military strenght in Europe and Finland now propose that they join the Axis.\nHow should we reply?"
 finland.333.a:0 "Yes"
 finland.333.b:0 "No"
 
 finland.355.t:0 "Finland wants to join Comintern"
 finland.355.d:0 "The world is growing increasingly unsafe. The Soviet Union and Finland remain as one of the few bastions of proletariat might in this world. Finland now propose that they join the Comintern and our Karelian territories in exchange for Karjala.\nHow should we reply?"
 finland.355.a:0 "Yes"
 finland.355.b:0 "No"
 
 finland.33.t:0 "Soviet Union accepts ally request"
 finland.33.d:0 "'History has shown how much we stand to lose when our countries refuse to cooperate. We are proud to welcome you not only as friends, but as comrades. Together we will bring equality and justice encroached by the darkness of capitalism and fascist sentiments!'\n\nOur request to join the USSR as Comintern members has been accepted. We can count on their full support in the turbulent times ahead."
 finland.33.a:0 "Together we will aid the revolution!"
 finland.34.t:0 "Soviet Union denies ally request"
 finland.34.d:0 "'While we appreciate your request to join our glorious revolution, we have no reason to raise tensions and compromise our relations with the other major powers all for one insignificant country. '\n\nOur request to join the Comintern has been denied. The Soviet government is unwilling to antagonize the Soviet Union or the allies or risk provoking other factions, and will not jeopardize the current peace."
 finland.34.a:0 "Yet another nation forgets Finland. We will show them!"
 
  finland.920.t:0 "Britain accepts Finnish Alliance"
 finland.920.d:0 "Finland has requested a formal alliance with Britain, citing unspecified threats against the stability of Europe.\n\nToday their request was approved by the British Parliament, and Finland has joined the [ENG.GetFactionName]."
 finland.920.a:0 "We stand together."
 finland.920.b:0 "They are preparing for the worst."
 finland.920.c:0 "Banding together like cornered rats."
 finland.920.e:0 "Britain has thrown in their lot."
 finland.921.t:0 "Britain Rejects Alliance With Finland"
 finland.921.d:0 "In a surprising turn of events, the British Parliament today rejected [FIN.GetName]'s request for a formal alliance between the two nations. The reason given was to avoid agitating the already fragile balance on the European continent.\n\nThe Finnish government has condemned it as a political move, sacrificing Finnish security for British interests."
 finland.921.a:0 "They should have asked more nicely."
 finland.921.b:0 "The democratic fools stand divided."
 finland.921.c:0 "A dark day for Finland."
 
  finland.922.t:0 "The Second Kalmar Union"
 finland.922.d:0 "Seeking to form a united front against common enemies, [From.GetName] has reached out to Sweden with an offer to reform the "Kalmar Union" to unite against common enemies. While offered a place in the defensive pact, the British Prime Minister made it clear that Britain does not consider the alliance 'beneficial to the protection of European liberty.' \n\nFinland have nevertheless established diplomatic ties with other nations that might feel threatened, and are encouraging unity for the sake of keeping the diplomatic balance in Scandinavia, and prevent future conflict. Only time will tell if they can succeed."
 finland.922.a:0 "Don't come crying to us later, then!"
 finland.922.b:0 "Länge leve Kalmarunionen!"
 finland.922.c:0 "We must never let Scandinavia to pose a threat."
 finland.922.e:0 "Scandinavia must unite against Fascist and Communist aggressors!"
 finland.922.f:0 "A sign of rising European tensions."
 
 
  finland.928.t:0 "Germany accepts Finland into the Axis"
 finland.928.d:0 "Finland has requested a formal alliance with Germany, citing unspecified threats against the stability of Europe and their own safety.\n\nToday their request was approved by the German Chancellor, and Finland has joined the [GER.GetFactionName]."
 finland.928.a:0 "We stand together."
 finland.928.b:0 "They are preparing for the worst."
 finland.928.c:0 "Banding together like cornered rats."
 finland.928.e:0 "Germany has thrown in their lot."
 finland.929.t:0 "Germany Rejects Alliance With Finland"
 finland.929.d:0 "In a surprising turn of events, the German Chancellor today rejected [FIN.GetName]'s request for a formal alliance between the two nations. The reason given was to avoid agitating the already fragile balance on the European continent.\n\nThe Finnish government has condemned it as a political move, sacrificing Finnish security for German interests."
 finland.929.a:0 "They should have asked more nicely."
 finland.929.b:0 "The democratic fools stand divided."
 finland.929.c:0 "A dark day for Finland."
 
   finland.998.t:0 "The Karjala Agreement"
 finland.998.d:0 "Seeking to reconcile the two nations, Finland has requested a formal alliance with the Soviet Union, citing unspecified threats against the stability of Europe and their own safety. To further ease tensions, Finland has agreed to cede Karjala to the Soviet Union in exchange for the states of Murmansk and Onega that are home to a large population of finnish minorities.\n\nToday the deal was approved by the Premier of the Soviet Union and Finland has joined the [SOV.GetFactionName]."
 finland.998.a:0 "We stand together."
 finland.998.b:0 "They are preparing for the worst."
 finland.998.c:0 "Banding together like cornered rats."
 finland.998.e:0 "The USSR has thrown in their lot."
 finland.999.t:0 "Soviet Union Rejects Karjala Agreement"
 finland.999.d:0 "In a surprising turn of events, the Soviet Premier rejected [FIN.GetName]'s request for a formal alliance between the two nations. The reason given was that the Karjala deal was not seen as mutually beneficial but merely as a way for Finland's borders to expand"
 finland.999.a:0 "They should have asked more nicely."
 finland.999.b:0 "The communist fools stand divided."
 finland.999.c:0 "A dark day for the revolution."
 
 finland.952.t:0 "Finland Announces Claims On Estonian Territory"
 finland.952.d:0 "Speaking to the Finnish populations along the Baltic coast, [From.GetLeader] has announced that [From.GetName] fully considers Finnish-speaking territory in [EST.GetName] to be a rightful part of [From.GetName]. [From.GetLeader] also cited the strategic importance of the Estonian region and claims that by uniting the two countries under the Finnish more people can be protected from larger threats abroad. \n\nAn official statement backed up the claims, making it clear that [From.GetName] is prepared to take the territory by force, if need be."
 finland.952.a:0 "Those are Estonian lands, not Finnish!"
 finland.952.b:0 "They are upsetting the already fragile balance in the region."
 finland.952.c:0 "Those territories seem more Finnish than Estonian."
 
 
