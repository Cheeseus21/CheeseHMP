  air_war_plans_division_focus2:0 "Escort Fighters"
  ETH_industrial_effort2:0 "Industrial Effort II"
  ETH_industrial_effort2_desc:0 "We will continue our focus on developing our civilian industry."
  ETH_production_effort5:0 "Armament Effort V"
  ETH_production_effort5_desc:0 "More military factories, more guns."
  ETH_production_effort4:0 "Armament Effort IV"
  ETH_production_effort4_desc:0 "More military factories, more guns."
  ETH_construction_effort5:0 "Compagnie per il Cotone d'Etiopi II"
  ETH_construction_effort5_desc:0 "We will further expand our textile industry."
  ETH_construction_effort4:0 "Compagnie per il Cotone d'Etiopia I"
