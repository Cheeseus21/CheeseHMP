 CAN_wartime_industries_control_board:0 "Wartime Industries Control Board"
 CAN_wartime_industries_control_board_desc:0 "A centralized authority must be created to oversee production, allocate resources, and coordinate industry for the war effort."
 CAN_dominion_housing_act:0 "Dominion Housing Act"
 CAN_dominion_housing_act_desc:0 "A modernizing Dominion needs to have standardized regulations on housing across the nation. We must improve the living conditions of all Canadians."
 CAN_expand_national_housing:0 "Expand National Housing"
 CAN_expand_national_housing_desc:0 "Following the success of the Dominion Housing Act, an expansion of this policy should be pursued to address housing shortages and to foster national unity in these trying times."
 CAN_national_employment_commission:0 "National Employment Commission"
 CAN_national_employment_commission_desc:0 "By coordinating labor supply and demand across sectors, the National Employment Commission streamlines employment, maximizes productivity, and accelerates economic growth."
 CAN_public_works_construction:0 "Public Works Construction"
 CAN_public_works_construction_desc:0 "To combat unemployment and revitalize the economy, the government will launch large-scale public works - building roads, bridges, and infrastructure to put Canadians back to work."
 CAN_dustbowl_recovery_fund:0 "Dustbowl Recovery Fund"
 CAN_dustbowl_recovery_fund_desc:0 "Drought-stricken Alberta and Saskatchewan need federal aid. Building on coastal infrastructure progress, we now focus on restoring the Prairies and modernizing their vital systems."
 CAN_DOSCO:0 "DOSCO"
 CAN_DOSCO_desc:0 "The establishment of the Dominion Steel and Coal Corporation marks a new era of industrial strength, harnessing Canada's natural resources to fuel economic growth and support the nation's future."
 CAN_king_or_chaos:0 "King or Chaos"
 CAN_king_or_chaos_desc:0 "Bennett's lack of crisis leadership threatens to plunge the country into chaos. We must place our trust in Mackenzie King, whose experience offers the steady guidance Canada needs in these tumultuous times."
 CAN_federal_unemployment_act:0 "Federal Unemployment Act"
 CAN_federal_unemployment_act_desc:0 "Following the recommendations of the Rowell-Sirois Commission, the Federal Unemployment Act will establish a national framework to provide relief and support to the unemployed."
 CAN_st_lawrence_seaway_development:0 "St. Lawrence Seaway Development"
 CAN_st_lawrence_seaway_development_desc:0 "The St. Lawrence Seaway will transform key cities along its route, boosting commerce, industry, and urban growth. This project complements ongoing hydroelectric dam construction, powering economic expansion across the region."
 CAN_government_of_national_unity:0 "Government of National Unity"
 CAN_government_of_national_unity_desc:0 "As the nation faces the immense challenges of war, Canada's political leaders must come together in a coalition government under Mackenzie King to provide steady leadership, and to preserve national stability in uncertain times."
 CAN_intervene_in_quebec_elections:0 "Intervene in Quebec Elections"
 CAN_intervene_in_quebec_elections_desc:0 "We cannot allow Duplessis's anti-war and separatist campaign to weaken Canada's unity. By intervening in Quebec's 1939 elections, we will support federalist forces to secure national stability during these perilous times."
 CAN_back_the_quebec_liberals:0 "Back the Quebec Liberals"
 CAN_back_the_quebec_liberals_desc:0 "The Liberal Party has long commanded the confidence of Quebec's people, offering a steady hand in uncertain times. By throwing our support behind their leadership, we can ensure continued cooperation from the province for the national war effort."
 CAN_dissolve_the_parliament:0 "Dissolve the Parliament"
 CAN_dissolve_the_parliament_desc:0 "The political gridlock following the intervention is both shocking and deeply troubling, especially during a time of war. We must dissolve this ineffective Parliament and appoint new ministers capable of leading the nation through the challenges of wartime governance."
 CAN_british_north_america_act:0 "British North America Act"
 CAN_british_north_america_act_desc:0 "The new constitution, enacted under the British North America Act, grants greater authority to the federal government, ensuring a stronger hand in managing the growing instabilities of war."
 CAN_bank_of_canada:0 "Bank of Canada"
 CAN_bank_of_canada_desc:0 "The chaos of the Depression exposed the dangers of an unregulated financial system. A central bank is now essential to restore confidence, stabilize currency, and guide economic recovery."
 CAN_canadian_broadcasting_corporation:0 "Canadian Broadcasting Corporation"
 CAN_canadian_broadcasting_corporation_desc:0 "The CBC will serve as a vital national broadcaster, connecting Canadians from coast to coast through informative programming that reflects our shared values and diverse communities."
 CAN_bennett_new_deal:0 "Bennett's New Deal"
 CAN_bennett_new_deal_desc:0 "Bennett's steady hand has set Canada on the path to recovery. To preserve this fragile progress, we must continue his policies and prevent the nation from slipping back into instability."
 CAN_disallow_the_padlock_act:0 "Disallow the Padlock Act"
 CAN_disallow_the_padlock_act_desc:0 "We cannot allow provincial legislation to trample civil liberties. Canada must uphold the rule of law and protect democratic rights nationwide. The Padlock Act must be repealed."
 CAN_challenge_the_courts:0 "Challenge the Courts"
 CAN_challenge_the_courts_desc:0 "The courts may call our New Deal unconstitutional, but these reforms are vital to lift Canadians out of poverty, restore employment, and build a more just society. The government will challenge the ruling - for the sake of the nation's future."
 CAN_censur_duplessis:0 "Censur Duplessis"
 CAN_censur_duplessis_desc:0 "Premier Duplessis's use of the Padlock Act and opposition to New Deal reforms threaten democracy and national recovery. The government must issue a formal censure to oppose his tactics."
 CAN_invoke_the_war_measures_act:0 "Invoke the War Measures Act"
 CAN_invoke_the_war_measures_act_desc:0 "In these extraordinary times of struggle, extraordinary measures are required; invoking the War Measures Act will enable the swift passage of crucial legislation to help lift our nation out of the Depression."
 CAN_amend_the_constitution:0 "Amend the Constitution"
 CAN_amend_the_constitution_desc:0 "Building on the authority secured through the War Measures Act, we now seek to amend the constitution to grant the federal government control over healthcare and pensions, ensuring coordinated social programs vital to national welfare."
 CAN_imperial_economic_cooperation:0 "Imperial Economic Cooperation"
 CAN_imperial_economic_cooperation_desc:0 "With the threat of war looming, closer economic ties within the British Empire are essential. Coordinated industrial efforts will strengthen our collective defense and prepare Canada's economy for mobilization."
 CAN_royal_tour_of_canada:0 "Royal Tour of Canada"
 CAN_royal_tour_of_canada_desc:0 "The upcoming visit of King George VI and Queen Elizabeth marks a historic moment, strengthening ties between Canada and the Crown, boosting national pride, and uniting Canadians on the eve of global conflict."

