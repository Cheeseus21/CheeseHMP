 poland.26.t:0 "폴란드 망명군"
 poland.26.d:0 "우리 군은 패배했고 조국에서 완전히 추방되었습니다. 하지만 우리 망명 정부는 루마니아를 거쳐 런던으로 탈출하는 데 성공했습니다. 우방국의 도움을 받아 무장 저항을 조직할 수 있습니다!"
 poland.26.a:0 "특공대를 해병 부대로 조직합니다."
 poland.26.b:0 "육군을 낙타 기병 부대로 조직합니다."
 poland.26.c:0 "전차병을 기갑 부대로 조직합니다."
 POL_first_corps_tt:0 "런던에서 해병 10개 부대를 조직합니다."
 POL_second_corps_tt:0 "런던에서 낙타 기병 20개 부대를 조직합니다."
 POL_exiled_tt:0 "런던에서 경전차 6개/중형전차 4개/중전차 2개 부대를 조직합니다."
 
 SAF_open_engineering_schools_tt:0 "호프메이어의 개혁을 통해 민간 공장 2개를 획득합니다. \n\n논쟁과 유화책을 통해 산업 연구 보너스 2개를 획득합니다."
 
 japan.999.t:0 "하와이 주둔 미 해군"
 japan.999.d:0 ":미 태평양 함대가 진주만에 주둔하고 있다는 소식을 입수했습니다. 정말 재미있는 일을 벌일 전례 없는 기회가 찾아왔습니다."
 japan.999.a:0 "야마모토 제독... 실행하라."
