l_korean:
 NSB_soviet_five_year_plan.4643.t:0 "연합국 대전략 시스템"
 NSB_soviet_five_year_plan.4643.desc:0 "'연합국 대전략' 권력 균형 시스템은 추축국과 대동아공영권에 맞선 전쟁 수행을 크게 변화시킬 수 있습니다. '일본 우선!' 또는 '독일 우선!' 중 어느 쪽으로 기울어졌는지에 따라 보너스와 디버프를 얻습니다. 한쪽으로 더 기울수록 그 나라와 싸우는 데서 세력의 전투력이 더 강해지며, 그만큼 연합국 대전략에서 그 선택의 중요도도 커집니다. 연합국으로서는 D-데이, 허스키 작전을 개시하거나 그 밖에 추축국과 본격적으로 싸우기 전에, 반드시 '독일 우선!' 스펙트럼 어딘가에 자리 잡는 것이 중요합니다. 또한 일본이 역사적으로 달성하지 못했던 목표들—예를 들어 §B아루나찰프라데시§!, §B파푸아뉴기니§!, §B웨이크 섬§!, §B실론§!—을 점령하지 못하도록 막아 일본을 견제해야 합니다. 일본은 싱가포르를 점령한 뒤에도 연합국을 '일본 우선!' 쪽으로 밀어붙일 것입니다. 일본이 더 많은 목표를 점령할수록, 연합국은 더 빠르게 '일본 우선!'으로 이동합니다. 반대로 일본을 상대로 특정 목표를 점령하면 '독일 우선!' 쪽으로 이동하며, 그 목표는 §B마커스 섬§!, §B대만§!, §B오키나와§!, §B방콕§!, §B이오지마§!입니다."
 NSB_soviet_five_year_plan.4643.a:0 "알겠다."

 romania.7:0 "철위대 집회"
 romania.7.t:0 "철위대 집회"
 romania.7.desc:0 "철위대가 지역 광장에 모였습니다. 이런 집회는 여러 이유로 위험합니다. 이들은 지역 기념물을 훼손하는 행위를 조직하고, 소수자들을 괴롭히며, 정부 활동에 반대하는 시위를 벌이고, 현지 치안 당국과 충돌을 일으킨 전력이 있습니다."
 romania.7.a:0 "그냥 저들끼리 모이게 두어라..."
 romania.7.b:0 "모이게 두면 체포하기가 더 쉬워진다."
 romania.8:0 "소수자 시민 괴롭힘"
 romania.8.t:0 "철위대가 소수자를 괴롭힘"
 romania.8.desc:0 "철위대는 외국인 혐오적 이념으로 악명이 높으며, 루마니아에서 '루마니아인'으로 여겨지지 않는 사람들에게 거리낌 없이 그 이념을 드러낼 것입니다. 이러한 문제에 대한 우리의 현 입장과 무관하게, 이 소수자들을 돕지 않으면 국제적 비난을 피할 수 없을 것입니다."
 romania.8.a:0 "누가 신경 쓰나?"
 romania.8.b:0 "이건 용납할 수 없다"
 romania.9:0 "군 내부 세력 침투"
 romania.9.t:0 "철위대의 군 침투"
 romania.9.desc:0 "우리 첩보망은 철위대가 국가 내 정치적 영향력을 키우기 위해 군 내부로 침투하고 있다고 보고했습니다. 철위대가 군 내에서 서서히 지지를 쌓도록 내버려 둔다면, 무장 반란이 일어날 경우 그들을 막을 수 있는 자는 아무도 없을 것입니다."
 romania.9.a:0 "군은 스스로 이 문제를 처리할 만큼 강하다."
 romania.9.b:0 "전면 조사에 착수한다"
 romania.10.t:0 "정치적 암살"
 romania.10.desc:0 "하급 정치인이 암살당했습니다. 범인은 붙잡혔고, 해당 정치인이 비(非)루마니아적 활동을 선동했다는 혐의를 받았다고 주장합니다. 경찰은 현재 그를 감옥에 구금해 두었습니다."
 romania.10.a:0 "그 정치인은 너무 목소리가 컸다"
 romania.10.b:0 "정의는 뜨거울 때 철을 친다"
 romania.11.t:0 "테러 폭탄 공격"
 romania.11.desc:0 "루마니아 전역에서 대규모 테러 폭탄 공격이 발생했습니다. 철위대는 비(非)루마니아인의 재산을 파괴하고 있다고 주장하고 있습니다. 대중은 격분했고, 생명의 위협을 느끼며, 정부가 어떻게 이런 일을 허용할 수 있었는지 의문을 품고 있습니다..."
 romania.11.a:0 "모두 불행한 사고일 뿐..."
 romania.11.b:0 "모두 보상받을 것이며, 범인들은 반드시 붙잡힐 것이다."
 romania.12.t:0 "1937년 루마니아 총선"
 romania.12.desc:0 "1937년 12월 선거에서 게오르게 터터레스쿠 총리가 이끄는 국가자유당 정부가 가장 많은 의석을 차지했지만, 의회에서 과반 정부를 구성하기에는 부족했습니다. '조국을 위해 모두' 당은 1937년 선거에서 16%를 득표하여 철위대 선거 성과의 정점을 기록했습니다. 그러나 그럼에도 불구하고 카롤 2세 국왕은 급진 반유대주의 시인 옥타비안 고가를 총리로 임명했습니다."
 romania.12.a:0 "민주주의는 이렇게 죽는 건가?"
 romania.13.t:0 "1938년 루마니아 선거"
 romania.13.desc:0 "카롤은 1938년 1월 18일 새 선거를 위해 의회를 해산해 달라는 고가의 요청에 동의했습니다. 1938년 선거는 루마니아 역사상 가장 폭력적인 선거 중 하나였습니다. 철위대와 국가기독당의 준군사조직인 랜치에리가 부쿠레슈티 거리의 통제권을 두고 서로 싸우는 한편, 유대인을 공격하여 자신들의 반유대주의적 신념을 증명하려 했기 때문입니다. 물론 이 모든 것은 엄청난 권력욕과 야망을 가진 카롤이 루마니아 정부를 장악하기 위해 꾸민 일이었습니다. 루마니아는 이제 갈림길에 섰습니다. 점점 더 공격적으로 변하는 준군사조직에 굴복할 것인지, 아니면 국가와 그 이익을 지켜줄 우리 국왕을 신뢰할 것인지 선택해야 합니다."
 romania.13.a:0 "민주주의는 이렇게 죽는군..."
 
 Manhattan.1.a:0 "상황을 예의주시하겠습니다."
 countrystartup.129.t:0 "Horst의 컴퍼스 작전 §0(읽지 않으면 패배)§!"
 countrystartup.129.desc:0 "컴퍼스 작전이란? 1940년 후반 영국의 리비아 침공 작전입니다. Horst에서 컴퍼스 작전은 프랑스 공방전과 동시에 이탈리아와 연합국 간의 전쟁 상태를 의미합니다. 이탈리아는 독일이 선전포고하는 동시에 전쟁에 참여합니다.\n\n추축국 플레이 시 알아야 할 점:\n-리비아에 기갑 소국을 두십시오. 이탈리아로 전차를 약간 생산하십시오.\n-이탈리아나 독일은 리비아에 전투기와 CAS를 준비해 두십시오.\n-추축국 전체는 연합국에게 빼앗긴 리비아의 주 하나당 포위 페널티, 참호 구축 속도, 계획 수립 속도, 조직력 낮을 시 조직력 손실, 내구도, 보급 범위, 보급품 소모에 보너스를 받아 리비아 탈환의 어려움을 상쇄할 수 있습니다.\n\n연합국 플레이 시 알아야 할 점:\n-매달 점령한 리비아 주 하나당 1개의 수송선 선적을 준비하게 됩니다."
 fincon.11.t:0 "브리튼 전투"
 fincon.11.d:0 "프랑스 공방전이 막바지에 이르자, 독일 폭격기와 전투기들이 영국 상공에서 영국 공군(RAF)과 격돌할 준비를 하고 있습니다. 브리튼 상공에서의 항공전은 다가올 상륙 작전의 준비를 의미할 수 있습니다."
 fincon.11.a:0 "전 세계가 지켜보고 있습니다..."
 britain.193.t:0 "독일, 스웨덴 북부 자원 징발"
 britain.193.d:0 "독일 외무장관 요아힘 폰 리벤트로프의 요구에 따라, 스웨덴은 라플란드 자원과 광산에 대한 권리를 제3제국에 양도했습니다. 경제국가장관 발터 풍크는 지난주 초 '무역 협정' 초안을 작성하며, 이를 양국 간의 '평화와 우호'를 보장하는 이정표라고 칭했습니다."
 britain.193.a:0 "독일의 전쟁 경제가 성장합니다..."
 finland.12.t:0 "105일간의 눈과 피"
 finland.12.d:0 "지난 3개월 동안 핀란드의 희고 푸른 숲은 소련 침략자들의 피로 붉게 물들었습니다. 우리는 우리보다 50배나 큰 나라에 맞서 핀란드 영토 1미터까지 지켜내며 불가능한 일을 해냈습니다!"
 finland.12.a:0 "핀란드는, 당분간은 안전합니다."
 finland.11.t:0 "핀란드에서의 재앙"
 finland.11.d:0 "적군은 핀란드군에게 연전연패하며 스스로 망신을 자초했습니다. 이 조롱을 참을 수 없으며, 누군가는 이 무능함에 대한 대가를 치러야 합니다!"
 finland.11.a:0 "굴라그로 가라!"
 finland.20.t:0 "핀란드 해방"
 finland.20.d:0 "핀란드 프롤레타리아는 우리 공산주의 동지들과 함께 적군이 내전에서 패한 이래 핀란드에서 고통받아 왔습니다. 한편 독일은 점점 더 군국주의적이고 호전적으로 변하여 연방에 실존적 위협이 되고 있습니다. 우리는 우리 자신을 지키기 위해 필요한 국경 영토를 핀란드에 넘겨달라고 요구했지만, 예상대로 그들은 거부했습니다. 이제 핀란드를 침공하여 자본주의적 억압에서 해방시킬 준비를 할 때입니다."
 finland.20.a:0 "그들에게 '빵 바구니'를 투하할 것이다."
 finland.21.t:0 "소비에트 연방, 전쟁 준비"
 Winter_War_Threat:0 "겨울 전쟁"
 poland.1148.d:0 "독일국이 프랑스 남부에서 노르웨이 서해안까지 해안 요새의 벽을 건설했습니다.\n\n§R이 일련의 요새들은 폭격으로 파괴되지 않는 한 해상 침공에 심각한 위협이 됩니다§!."
 finland.21.d:0 "소비에트 제국으로부터 성공적으로 독립하고 적군과의 내전에서 승리한 이래, 소비에트 연방은 시간이 지나면서 누그러졌을 뿐인 적대적이고 위험한 적이었습니다. 우리 정보부에 따르면 그들은 전쟁을 준비하고 있으며 약 2개월 후에 침공할 것이라고 합니다."
 news.9990.t:0 "독일, 청색 작전 개시!"
 zit_failed:0 "치타델레 작전이 실패했습니다"
 zit_launched:0 "치타델레 작전이 개시되었습니다"
 news.9990.d:0 "독일국이 바르바로사 작전의 차질 이후 소비에트 연방을 전쟁에서 이탈시키기 위한 여름 공세, 암호명 '청색 작전'을 개시했습니다. 독일의 진격을 늦출 겨울과 진흙이 없는 지금, 소련군은 다시 한번 수세에 몰렸습니다."
 news.9990.a:0 "또다시 5개월간의 지옥이..."
 news.9990.b:0 "모스크바로!"
 
 britain.4254.t:0 "야마모토 제독 사망!"
 britain.4254.desc:0 "끔찍한 소식입니다! 야마모토 제독이 태평양 상공에서 미군 전투기에 격추되었습니다! 그들이 어떻게 제독의 비행기인 줄 알았을까요?"
 britain.4254.a:0 "운이 좋았음에 틀림없습니다..."
 
 britain.1315.t:0 "연합군, 횃불 작전 준비"
 britain.1315.d:0 "군사 정보에 따르면 연합군이 비시 프랑스령 북아프리카 침공을 준비하고 있습니다. 이 침공은 약 한 달 후에 이루어질 것으로 예상됩니다."
 britain.1315.a:0 "우려스럽군"
 nsb_news.6131.t:0 "미국, 소련으로 무기대여법 확대"
 nsb_news.6131.a:0 "알겠다."
 nsb_news.6131.desc:0 "바르바로사 작전이 소련 깊숙이 진격함에 따라 서방 연합군이 우려를 표하고 있습니다. 미국과 영국은 추축국에 맞서는 소련을 물질적으로 지원하기로 공동 합의했습니다.\n\n이제 연합군은 소련에 무기대여를 시작할 수 있습니다"
 countrystartup.29.t:0 "Horst의 해군과 바다사자 작전 §0(필독, 아니면 패배)§!"
 countrystartup.29.desc:0 "1) 함대는 여러 개로 운용해야 하며, 한 함대의 지휘 한계는 100을 초과해서는 안 됩니다.\n2) 다른 함대와 교전할 목적으로 편성된 함대는 항상 2척의 항공모함을 포함해야 하며, 2척을 초과해서는 안 됩니다.\n3) 함대는 주력함과 항공모함을 위해 높은 호위 효율을 갖춰야 합니다.\n4) 교전이 불리하다고 판단되면 이탈하십시오.\n5) 해안 포격은 중요합니다! 또한 해군은 40%의 제해권을 확보하면 상륙 작전을 저지할 수 있습니다.\n6) 호위함, 주력함, 항공모함을 건조하십시오.\n7) 장갑은 잠재적으로 유용할 수 있습니다.\n\n§B함대 지휘 한계§!\n\n모든 함선 유형에는 '지휘 한계' 값이 있습니다. 하나의 함대(한 제독 휘하의 모든 기동부대)는 최대 100의 '지휘 한계'를 지원할 수 있습니다. 제독이 지휘하는 모든 함대의 지휘 한계 값이 한계치 이하인 한, 제독과 국가에 특별한 약화 효과가 적용되지 않습니다. 주력함이나 경순양함을 포함한 함대를 지휘하는 모든 제독은 제독 초상화 바로 오른쪽에 있는 목록에 표시됩니다. 이 목록에는 함대에 대한 유용한 정보가 포함되어 있어 이 시스템을 쉽게 따를 수 있습니다.\n\n구축함/잠수함 - 지휘 한계 1\n경순양함/중순양함 - 지휘 한계 2\n전함 및 순양전함 - 지휘 한계 4\n항공모함/초중전함 - 지휘 한계 6\n\n§R바다사자 작전에 관하여§!: 유럽 추축국은 잉글랜드 남서부와 서식스에만 상륙할 수 있습니다. 유럽 추축국이 영국이나 아일랜드의 다른 지역에 상륙을 시도할 경우 순간이동될 것입니다! 바다사자 작전은 허용됩니다!"
 mtg_netherlands.344.a:0 "즉시 더 자세히 알아봐야 합니다!\n§G새로운 국가 중점을 잠금 해제할 것입니다!§!"
 mtg_netherlands.345.d:0 "아테네에서 온 고고학자 팀이 섬에 도착했으나, 적절한 정박지가 없어 작은 배를 저어 섬으로 들어가야 했습니다. 섬은 초목으로 무성했고, 섬을 뒤덮은 짙은 안개와 어우러져 실로 놀라운 무언가를 감추고 있었습니다. 우리 역사의 미케네 시대와 헬레니즘 시대의 건축 양식을 닮은 완벽하게 보존된 유적이 발견되었습니다. 조사가 계속되는 동안, 현대 그리스 도시만 한 크기의 유적지에서 수많은 역사적 유물이 발견되고 있습니다!"
 mtg_netherlands.344.d:0 "고고학자들이 대서양의 폭풍우가 몰아치는 해역에서 외딴섬 하나를 발견했습니다. 이 섬은 이전에 해도에 기록되지 않은 미지의 섬으로, 지난 5세기의 어떤 지도에도 나타나지 않습니다. 최근 화산 활동으로 형성되었다는 추측은 불가능합니다. 대략적인 조사 결과 화산 활동의 흔적이 없기 때문입니다. 섬은 짙은 안개로 뒤덮여 있는데, 이는 이 대서양 해역에서는 이례적인 현상입니다. 연구원들은 배를 정박하거나 댈 적절한 장소를 찾지 못했습니다. 안개 사이로 어떤 탑처럼 보이는 것이 언뜻 보였지만, 어느 나라의 어느 시대의 것인지는 불분명했습니다. 이 기묘한 섬에 숨겨진 것을 발견하기 위해 새로운 탐험대가 조직되었습니다..."
 mtg_news.791.d:0 "바르바로사 작전 개시 이래 노동자-농민의 붉은 군대는 계속된 패주에 시달렸고, 국경 근처의 많은 소련 산업 및 도시 중심지가 추축국의 통제하에 들어갔습니다. 이오시프 스탈린은 모든 붉은 군대 지휘관에게 허가되지 않은 후퇴를 중단하고 탈영병을 처리할 특별 분견대를 설치하라는 명령으로 대응했습니다."
 mtg_news.792.d:0 "대숙청의 시련에서 회복하는 길고 힘든 과정을 거친 후, 붉은 군대는 전쟁의 포화 속에서 후퇴에도 불구하고 국방군만큼이나 전술적으로 유능함을 증명했습니다. 이오시프 스탈린은 후퇴를 금지하라고 명령했습니다: '한 발짝도 물러서지 마라'."
 
 
 italy.668.d:0 "슬로바키아의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 Hearts of Oak 2 모드의 mumiago님이 제작한 슬로바키아 중점 트리를 대폭 수정했습니다. mumiago님께 감사드립니다!"
 italy.968.d:0 "몽골의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 Road to 56 모드의 Fantom#8759님이 제작한 몽골 중점 트리를 대폭 수정했습니다. Fantom#8759님께 감사드립니다!"
 italy.969.d:0 "루마니아의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 Hearts of Oak 2 모드의 mumiago님이 제작한 루마니아 중점 트리를 대폭 수정했습니다. Mumiago님께 감사드립니다!"
 italy.970.d:0 "뉴질랜드의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 Road to 56 모드의 featherus님이 제작한 뉴질랜드 중점 트리를 대폭 수정했습니다. featherus님께 감사드립니다!"
 italy.971.d:0 "시암의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 Road to 56 모드의 simpyslav님이 제작한 시암 중점 트리를 대폭 수정했습니다. simpyslav님께 감사드립니다!"
 italy.972.d:0 "영국령 라지의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 Road to 56 모드의 asfinag님이 제작한 영국령 라지 중점 트리를 대폭 수정했습니다. asfinag님께 감사드립니다!"
 italy.973.d:0 "남아프리카의 Horstorical 멀티플레이어 중점 트리에 오신 것을 환영합니다! Horst가 Horstorical 멀티플레이어에서 사용하기 위해 South Africa Reworked 모드의 Sarge님이 제작한 남아프리카 중점 트리를 대폭 수정했습니다. Sarge님께 감사드립니다!"
 
 
 
 
 italy.663.d:0 "이 메시지가 보인다면, 호스트가 Paradox사의 신규 DLC '보스포루스 해협을 위한 전투'를 보유하고 있지 않은 것입니다. 대신, Horst가 Horstorical 멀티플레이어 모드에서 사용하기 위해 Caon이 제작한 '밀라 로디노 불가리아' 중점 트리를 대대적으로 수정했습니다. 불가리아 부대 지휘관, 중점 아이콘 등을 포함한 모드의 자산을 사용할 수 있도록 허락해 주신 Caon님께 감사드립니다."
 mtg_news.777.d:0 "라스푸티차라고도 알려진 러시아의 진흙 계절은 특히 차량화 부대에 큰 피해를 주는 골칫거리입니다. 진흙 계절은 60일 후에 끝날 것입니다.\n\n§R소련 핵심 영토의 모든 사단은 사단 공격력이 15% 감소하고, 10%의 소모를 겪으며, 이동 속도에 -20%의 페널티를 받습니다(기갑 사단은 -35%).§!"
 mtg_news.778.desc:0 "러시아 병사들이 동장군이라 친근하게 부르는 러시아의 겨울은 전쟁에 막대한 군수 문제를 야기합니다."
 news.484.t:0 "왕정 독재"
 news.484.d:0 "루마니아 선거의 국제 참관인들은 카롤 2세 국왕이 헌법을 정지시키고 비상 대권을 장악했다고 보고했습니다. 이후 카롤은 폭력적인 선거 운동이 국가를 내전으로 몰아넣을 위험이 있다는 이유로 계엄령을 선포하고 모든 시민의 자유를 정지시켰습니다.\n반유대주의자 고가 아래에 세웠던 구 정부를 해산한 후, 카롤은 헌법을 비준하여 자신의 새로운 권력을 법제화했고, 정부를 사실상의 합법적인 독재 체제로 전환했습니다. 루마니아의 모든 통치 권력은 그의 손에 들어갔고, 루마니아는 민주주의 국가에서 절대 군주국으로 변모했습니다."
 news.484.a:0 "발칸은 결코 실망시키지 않는군"
 news.485.t:0 "강철의 대가"
 news.485.d:0 "맹렬한 외국인 혐오적 극단 민족주의, 강렬한 정교회 신비주의, 극도로 폭력적인 반유대주의, 모든 엘리트에 대한 포퓰리즘적 경멸, 그리고 대의를 위한 죽음을 세상에서 가장 아름답고, 영광스러우며, 고귀하고, 매혹적인 경험으로 미화하는 메시지를 설파했던 \"대위\" 코르넬리우 젤레아 코드레아누가 오늘 루마니아의 총리로 취임했습니다. 폭력적인 선거와 옥타비안 고가 내각의 임명으로, 국왕은 코드레아누를 루마니아의 지도자로 만들어 그가 원하던 권력을 넘겨주는 것 외에는 다른 선택지가 없다고 판단했습니다. 코드레아누는 처음에는 수락을 주저했지만, 카롤을 설득하여 국가에 대한 절대적이고 전체주의적인 권력을 넘겨받았고, 이로써 이전의 민주주의 국가는 사실상 전체주의 독재 국가로 변모했습니다."
 news.485.a:0 "발칸은 결코 실망시키지 않는군"
 news.486.t:0 "안토네스쿠의 권력 장악"
 news.486.d:0 "루마니아 주재 독일 외교관 파브리시우스가 카롤 2세에게 연락해 안토네스쿠를 루마니아의 책임자로 임명하라는 단 한 가지 간단한 요구를 했습니다. 프랑스가 함락되자, 루마니아의 친프랑스 엘리트들은 하룻밤 사이에 거의 모든 영향력과 발언권을 잃었습니다. 안토네스쿠는 이 요청에 부분적으로 응하면서도 카롤에게 루마니아 국가 원수를 위한 예비 권한을 부여해 달라고 요청했습니다. 카롤은 굴복했고, 1940년 9월 5일, 장군은 총리가 되었으며 카롤은 자신의 독재 권력 대부분을 그에게 이양했습니다. 장군의 첫 조치는 부쿠레슈티 수비대장 게오르게 아르제샤누를 해임하고 두미트루 코로아머로 교체하여 군 내의 잠재적 저항을 억제하는 것이었습니다."
 news.486.a:0 "발칸은 결코 실망시키지 않는군"
 news.487.t:0 "부쿠레슈티 행진"
 news.487.d:0 "코드레아누가 처형된 후, 철위대는 오랫동안 침묵을 지켰지만, 그들은 죽은 것이 아니라 단지 잠복하며 공격할 최적의 기회를 기다리고 있었습니다. 그들은 호리아 시마의 지도 아래 부활하여 쿠데타를 조직하고 있었고, 이제 안토네스쿠가 투옥되자 완벽한 기회가 찾아왔습니다. 장군은 현 정부에 대한 분노로 가득 차 있었고, 루마니아를 파멸 직전으로 몰고 가는 왕정 독재를 끝내고 싶어 했습니다. 루마니아군, 특히 동부 지방에 주둔한 제3군에 대한 그의 광범위한 영향력과 통제력을 바탕으로, 안토네스쿠의 병사들과 철위대는 수도로 진군했으며, 이 사건은 \"부쿠레슈티 행진\"으로 알려지게 될 것입니다. 카롤이 \"반란\"이라고 낙인찍은 이들로부터 수도를 지켜야 할 병사들은 그저 무기를 내려놓거나 행진에 동참했습니다. 카롤은 루마니아군과 철위대의 일부 병력에게 쫓기면서 마지막 순간에 기차를 타고 간신히 탈출했습니다."
 news.487.a:0 "발칸은 결코 실망시키지 않는군"
 news.488.t:0 "코드레아누의 죽음"
 news.488.d:0 "카롤 2세 국왕의 충성파 장군들이 충성스러운 군 병력을 이용해, 전국 순방을 마치고 수도로 돌아오던 루마니아 총리 코르넬리우 젤레아 코드레아누를 제거했습니다. 이를 군 내 반란으로 간주한 안토네스쿠는 신속하게 지휘권을 장악하고, 장군들의 병사들에게 반란 혐의로 해산하고 범인들을 당국에 넘기라고 명령하여 상황을 완전히 통제했습니다. 군이 제압된 후, 안토네스쿠는 다른 장군들을 자신의 충성파로 신속하게 교체하여 루마니아 군대를 효과적으로 완전히 장악했고, 사실상 국가를 책임지게 되었습니다. 인기 있던 코드레아누의 죽음을 복수한 후 영웅으로 대접받은 안토네스쿠는 기존 철위대 지도부를 이끌 공동 지도자(Co-Conducator)로서 국가의 책임자가 되었습니다."
 news.488.a:0 "발칸은 결코 실망시키지 않는군"
 Manhattan.1.t:0 "맨해튼 프로젝트"
 Manhattan.1.d:0 "극비리에 미국은 세계 최고의 과학자들이 참여하는 기념비적인 연구 사업인 \"맨해튼 프로젝트\"를 시작했습니다. 이 프로젝트의 목표는 원자력의 파괴적인 잠재력을 활용하는 것입니다. 정보계에서는 이 프로젝트가 전쟁을 신속하게 종결시킬 수 있는 초강력 무기를 만드는 것을 목표로 한다는 소문이 돌고 있습니다. 주요 강대국들은 그 결과가 세계의 패권을 바꿀 수 있다는 것을 알기에 이 프로젝트를 면밀히 주시하고 있습니다. 프로젝트의 성공 또는 실패가 세계 지정학의 미래를 결정할 것입니다."
 Trinity.1.t:0 "트리니티 프로젝트"
 Trinity.1.d:0 "오늘 이른 새벽, 극비리에 진행된 세계 최고 석학들의 공동 노력이 뉴멕시코 사막에서 눈부신 섬광과 거대한 버섯구름으로 결실을 보았습니다. 암호명 \"트리니티\"로 명명된 세계 최초의 원자폭탄 실험은 전쟁과 세계 정치의 흐름을 근본적으로 바꾸어 놓았습니다."
 news.9991.t:0 "독일, 치타델 작전 개시!"
 news.9991.d:0 "독일 제국이 소련군을 격멸하고 평화 협정을 강요하기 위해 암호명 '치타델 작전'이라는 또 다른 여름 공세를 소련에 개시했습니다. 독일의 진격을 늦출 겨울과 진흙이 없는 상황에서 소련은 다시 한번 수세에 몰렸지만, 이번에는 두 번의 전역을 치른 경험이 있습니다."
 news.9991.a:0 "소련은 얼마나 더 버텨야 하는가?"
 news.9991.b:0 "종말의 시작이다."
 news.9992.t:0 "독일, 동지 작전 개시!"
 news.9992.d:0 "독일국이 소비에트 연방을 상대로 또 다른 여름 공세를 개시했습니다. 작전명 '하지 작전'은 소련군을 섬멸하고 평화 협정을 강요하는 것을 목표로 합니다. 독일의 진격을 늦추던 겨울과 진흙이 없는 지금, 소련은 다시 한번 수세에 몰렸지만, 이번에는 두 차례의 전역을 치른 경험이 있습니다."
 news.9992.a:0 "소비에트 연방은 이 전쟁에서 승리할 수 있을 것인가?"
 news.9992.b:0 "독일국은 마침내 성공할 것인가?"
 ger_heavy.1.t:0 "독일, 중수 생산 개시"
 ger_heavy.1.d:0 "MI6 요원들의 보고에 따르면, 독일국이 핵분열 실험에 사용할 중수 생산을 시작했다고 합니다. 독일이 언제, 어떻게 핵폭탄을 생산하는 법을 알아낼지는 알 수 없지만, 만약 우리보다 먼저 성공한다면 전 세계 자유 진영에 상상할 수 없는 파괴와 고통을 초래할 것이 분명합니다. 이를 막기 위해 우리는 노르웨이를 점령해야 합니다!"
 ger_heavy.1.a:0 "§R독일은 1000일 후에 원자로를 잠금 해제하고 핵폭탄에 350% 보너스를 받습니다"
 finland.21.a:0 "우리는 한계점에 도달했다!"
 italy.152.t:0 "아테네 점령"
 countrystartup.28.desc:0 "1. 사단은 전투 너비 39.2에서 40.0 사이여야 합니다 \n\n2. 사단은 기갑 대대의 전투 너비가 0이거나, 20에서 26 사이여야 하며, 모든 기갑 대대는 동일한 등급이어야 합니다. 나머지는 기동 보병이어야 합니다 (기계화/차량화 포병, 기계화/차량화 대전차, 기계화/차량화 대공포는 제외) \n\n3.보병 대대를 기갑 또는 기동 대대와 혼합할 수 없습니다 \n\n3. 사단이 요격당했거나, 전선에서 1-5타일 거리에 있거나, 포위될 위험이 있을 때(상륙 침공 예상)는 편제를 삭제/통합/수정/변경할 수 없습니다 \n\n4. 장비 보급률 90% 미만인 사단으로 상륙 침공이나 공수 강하를 시작할 수 없습니다 (대공포에 격추된 경우 제외) \n\n5. [ALLIES] 프랑스가 항복하기 전까지 프랑스령 북아프리카에 프랑스/네덜란드/폴란드/그리스/노르웨이 국적이 아닌 사단을 배치할 수 없습니다 \n\n6. 한 제공권에 200기 이상의 함재기를 공중 우세 임무에 투입할 수 없습니다 \n\n7. 한 해역에 둘 이상의 임무 부대를 할당하거나 대기시킬 수 없습니다 (이동은 예외) \n\n9. 스페인의 항구는 스페인 내전 중에만 사용할 수 있습니다."
 mtg_news.788.desc:0 "쿠이비셰프 함락 이후, 소비에트 지도부는 우랄 산맥 깊숙한 곳으로 이전했으며 독일의 휴전 제의를 수락했습니다. 쿠이비셰프 휴전 협정으로 동부 전선에서의 전쟁은 사실상 종결되었습니다."
 britain.1115.d:0 "소비에트 연방은 개인을 수레바퀴의 얼굴 없는 톱니바퀴로 전락시키는, 그에 못지않은 살인적이고 사악한 정치 체제입니다. 자유로운 유럽이 존재하기 위해서는, 소비에트 국가는 파괴되어야 합니다."
 britain.1116.d:0 "유럽 대륙의 힘의 균형을 위협하던 독일의 위협을 물리침으로써 우리는 한 폭군적인 적에게서 안전을 확보했지만, 동쪽에는 또 다른 적이 존재합니다. 우리는 이탈리아와 독일군을 재무장시켜 우리 사단을 보충할 수 있습니다. 물론, 그들이 자유 시장 민주주의 체제로 완전히 전환한다는 조건 하에서 말입니다."
 japan.144.t:0 "남방으로 진격하라!"
 japan.144.d:0 "전 세계의 이목이 유럽의 전쟁에 쏠린 지금, 아시아는 약화되어 무방비 상태에 놓였습니다. 지금이야말로 남방 자원 지대를 공격할 절호의 기회입니다!"
 japan.144.a:0 "전쟁이다!"
 peace.1.t:0 "의용군 초기화를 위한 전쟁 선포 또는 모든 적과 백색 평화"
 soviet.509.t: "중국의 미래"
 soviet.509.d: "우리는 현재 만주 내 일부 영토를 통제하고 있으며, 이를 어떻게 처리할지에 대한 문제가 제기되었습니다. 정치국 고위 위원들은 이 영토를 현지 공산주의자들에게 넘겨주고 아시아에 위성국을 세울 것을 강력히 제안합니다. 중국 공산당의 우리 동맹들은 이를 매우 고마워할 것입니다."
 soviet.509.a: "연방과 중국은 아시아 공산주의의 두 기둥이 될 것이다."
 fincon.1.t: "계속 전쟁"
 fincon.1.d: "독일이 마침내 볼셰비키에 대한 성전을 시작했으니, 이제 우리는 겨울 전쟁에서 잃었던 땅을 되찾을 수 있다."
 fincon.1.a: "과거 핀란드 국경을 회복하라!"
 fincon.1.b: "좋은 생각이 아니야, 독일은 아마 이 전쟁에서 질 것이다..."
 fincon.2.t: "계속 전쟁 발발"
 fincon.2.d: "겨울 전쟁의 패전국인 핀란드가 자국 영토를 되찾기 위해 소비에트 연방에 대한 적대 행위를 다시 시작했습니다. 소련군의 주력이 남쪽에서 독일군과 교전 중인 상황에서, 이제 독일과 핀란드를 동시에 상대해야 하는 소련의 상황은 더욱 악화되었습니다."
 fincon.2.a: "볼셰비키 정권의 종말이 점점 더 가까워지고 있다."
 fincon.2.b: "그들은 연말까지 레닌그라드에 도달할 수도 있겠군..."
 fincon.6.t: "모스크바 휴전 협정"
 fincon.6.d: "길고 성과 없던 계속 전쟁이 이제 끝났습니다. 핀란드는 소련으로부터 어떠한 영토도 얻지 못했을 뿐만 아니라, 페차모와 포르칼라 해군 기지에 대한 통제권마저 잃었습니다. 반면 소련은 핀란드를 정복하지는 못했지만, 이제 독일에 집중할 수 있게 되었습니다."
 fincon.6.a: "배신자들! 전부 다!"
 fincon.6.b: "유럽에서의 전쟁이 종결에 가까워지고 있습니다."
 britain.1113.t:0 "노르웨이, 연합국 가입 모색"
 britain.1113.d:0 "스칸디나비아 국가 노르웨이가 추축군의 공격을 받았습니다. 유럽 대륙의 혼란으로부터 해협으로 보호받는 섬나라로서 우리가 이 전쟁에서 승리하려면, 독일과 그 동맹국들의 압제에 시달리는 모든 이들과 새로운 동맹을 구축해야 합니다."
 britain.1113.a:0 "우리는 산에서도 싸울 것입니다!"
 britain.1114.t:0 "영국이 우리를 환영합니다"
 britain.1114.d:0 "런던의 우리 외교관들이 우리가 영국 및 그 동맹국들과 공식적인 군사 동맹을 성공적으로 체결했음을 알려왔습니다. 연합국의 일원으로서, 런던에서 웰링턴까지, 오슬로에서 카이로까지의 모든 투쟁은 이제 노르웨이를 위한 우리의 투쟁의 일부가 되었습니다."
 britain.1114.a:0 "신이시여, 우리 왕들을 구하소서!"
 news.1463.t:0 "아라비아 중립 침해"
 news.1463.d:0 "놀라운 사건의 전환으로, 아라비아 반도 전체가 침공당하여 전쟁에 참전했습니다."
 iran.4.t:0 "이란 항복"
 iran.4.d:0 "카운터넌스 작전의 성공 이후, 페르시아 정부와 샤는 테헤란에서 영국-소련 연합군에게 항복했습니다. 이란과 그 자원은 이제 독일의 손아귀에서 안전하게 벗어났습니다."
 iran.4.a:0 "영국-소련 동맹에 축배를!"
 iran.2.t:0 "이란, 북부 영토 할양"
 iran.2.d:0 "이란령 아제르바이잔과 투르크메니스탄이 마침내 소비에트의 동포들과 재결합했습니다. 양 공화국 동지들에 의해 민간 행정 기관 설치와 사상 교육이 순조롭게 진행 중입니다."
 iran.2.a:0 "연방에 오신 것을 환영합니다!"
 iran.3.t:0 "이란, 유전 지대 할양"
 iran.3.d:0 "테헤란에서 이란이 항복한 후, 이란은 남부 이란의 통제권을 영국에 양도했습니다. 이는 연합국이 전략적 유전 지대를 통제하고, 전략적 페르시아 회랑과 이란 종단 철도를 활용할 수 있게 합니다."
 iran.3.a:0 "훌륭하군!"
 italy.142.t:0 "아디스아바바 점령"
 italy.142.d:0 "아디스아바바의 함락으로, 우리는 에티오피아를 거의 완전히 통제하게 되었습니다. 오랫동안 미뤄왔던 우리 식민 제국의 일부가 이제 우리 것이 되었으니, 이 영토를 어떻게 관리할지 결정해야 합니다."
 italy.142.a:0 "좋아! 이제 에티오피아를 어떻게 처리할지 결정해야겠군..."
 italy.143.t:0 "에티오피아의 운명"
 italy.143.d:0 "에티오피아는 지난 이탈리아-에티오피아 전쟁에서 패배한 이래로 오랫동안 이탈리아 국가적 자존심의 가시였습니다. 이제 세계는 이탈리아가 지중해의 주인으로 부상하는 것을 보게 될 것입니다. 비토리오 에마누엘레 3세 국왕은 피에트로 바돌리오 원수에게 그의 공로를 인정하여 '아디스아바바 공작' 칭호를 수여했습니다. 에티오피아는 이탈리아가 직접 통치하거나, 식민지 총독이 관리하는 식민 괴뢰국의 일부가 될 수 있습니다."
 italy.143.b:0 "에티오피아, 소말릴란드, 에리트레아로 식민 보호령을 창설한다"
 italy.143.a:0 "에티오피아를 이탈리아에 직접 병합한다"
 italy.144.t:0 "에티오피아의 운명"
 italy.144.d:0 "에티오피아는 지난 이탈리아-에티오피아 전쟁에서 패배한 이래로 오랫동안 이탈리아 국가적 자존심의 가시였습니다. 이제 세계는 이탈리아가 지중해의 주인으로 부상하는 것을 보게 될 것입니다. 비토리오 에마누엘레 3세 국왕은 피에트로 바돌리오 원수에게 그의 공로를 인정하여 '아디스아바바 공작' 칭호를 수여했습니다. 에티오피아는 이탈리아가 직접 통치하거나, 식민지 총독이 관리하는 식민 괴뢰국의 일부가 될 수 있습니다."
 italy.144.a:0 "에티오피아, 소말릴란드, 에리트레아로 식민 보호령을 창설한다"
 iran.1.t:0 "이란, 항복하다"
 spain.29.t:0 "영국이 보고 있지 않다"
 spain.29.d:0 "독일의 폴란드 개입에 따라, 연합국이 제3제국을 공격하며 전쟁을 추구하고 있습니다. 이 대화재에 대한 중립적 방관자로서, 우리는 막대한 이익을 얻을 기회를 맞았습니다. 독일은 강철은 풍부하지만 텅스텐과 같은 희귀 금속이 부족하며, 이는 인접한 포르투갈에 풍부합니다. 영국은 프랑스 전선에 묶여 있어 포르투갈 본토에 대한 기습 침공을 막을 여력이 없습니다. 따라서 우리는 자원에 굶주린 추축국 전쟁 기계와의 교역으로 막대한 이익을 취할 수 있습니다."
 spain.29.a:0 "이제 스페인을 다시 위대하게 만들 시간입니다."
 italy.146.t:0 "무솔리니 체포"
 italy.146.d:0 "북아프리카에서의 실패와 그에 따른 연합국의 남부 이탈리아 침공 이후, 두체에 대한 지지율이 급격히 떨어졌습니다. 우리 영토에서 전쟁이 벌어지고, 만성적인 식량 부족과 악화되는 노동 파업 속에서, 이탈리아 대평의회는 불신임 투표를 통해 무솔리니에게 등을 돌렸습니다. 비토리오 에마누엘레 국왕은 직접 두체를 해임하고 체포를 명령했으며, 그 자리에 피에트로 바돌리오 원수를 임명했습니다. 무솔리니는 이탈리아 전역으로 이송되다가 마침내 아브루초의 스키 리조트인 캄포 임페라토레에 수감되었습니다."
 italy.146.a:0 "누가 이제 기차를 제시간에 달리게 할 것인가?"
 italy.147.t:0 "이탈리아의 왕당파 쿠데타"
 italy.147.d:0 "북아프리카에서의 이탈리아의 무능과 그에 따른 연합국의 남부 이탈리아 침공 이후, 우리의 동맹인 무솔리니가 동포에게 배신당해 현재 이탈리아 어딘가에 체포되어 있습니다. 이는 제3제국에 매우 위험한 상황입니다. 무솔리니 없이는 이탈리아가 우리 편에서 계속 전쟁에 참여할 것을 기대할 수 없기 때문입니다. 우리는 다음 행동을 신중하게 고려해야 합니다."
 italy.147.a:0 "아프베어에 연락하라 - 무솔리니가 억류된 장소를 즉시 찾아내야 한다."
 italy.147.b:0 "이것이 바로 이탈리아식 무능의 극치다 - 그들의 도움 없이도 전쟁에서 이길 수 있다."
 italy.148.t:0 "베니토 무솔리니 위치 파악"
 italy.148.d:0 "아프베어가 이탈리아 무선 메시지를 해독한 덕분에, 그란사소산 인근 아브루초의 한 스키 리조트에서 무솔리니의 위치를 파악했습니다. 최고사령부는 이미 무솔리니 구출을 위한 여러 계획을 수립했으며, 그중 가장 뛰어난 계획은 우리의 명장 중 한 명인 쿠르트 슈투덴트에게서 나왔습니다. 그는 수송용 글라이더를 이용해 스키 리조트에 대한 대담한 특공대 급습을 계획했습니다."
 italy.148.a:0 "슈투덴트는 자신의 능력을 몇 번이고 증명했다 - 그렇게 하라."
 italy.148.b:0 "이건 노력할 가치가 없다 - 모든 개입 계획을 취소하라."
 italy.149.t:0 "무솔리니 해방"
 italy.149.d:0 "오늘 1400시, 독일 SS와 팔슈름예거 부대가 캄포 임페라토레 호텔에 대담한 공격을 감행하여, 감금되어 있던 베니토 무솔리니를 해방시켰습니다. 호텔은 총성 한 발 없이 점령되었고, 내부에 있던 소수의 수비대는 즉시 항복했습니다. 무솔리니는 이제 총통과의 회담을 위해 뮌헨으로 이송될 것입니다. 우리는 그가 제3제국에 더 긴밀히 협력하고 우리의 감독을 받을 것으로 기대합니다."
 italy.149.a:0 "이탈리아를 구하는 일은 독일인에게 맡겨야지."
 italy.150.t:0 "반다 코흐"
 italy.150.d:0 "이탈리아 사회 공화국 선포 이후, 우파, 중도, 좌파의 반파시스트 분자들이 우리 군을 상대로 습격과 공격을 감행하고 있습니다. 이 비애국적인 분자들은 우리에게 눈엣가시였으나, 이에 대응하여 독일계 이탈리아인으로 평판이 좋지 않은 피에트로 코흐가 '반다 코흐'라는 반파르티잔 부대를 조직하여 이 테러리스트들을 단속하고 있습니다. 그러나 그들의 방식은 과도합니다."
 italy.150.a:0 "어쨌든 일시적인 상황일 뿐이다."
 italy.151.t:0 "두체가 돌아왔다!"
 italy.151.d:0 "독일의 용맹과 지략 덕분에, 무솔리니가 구금에서 풀려나 권력을 되찾았습니다. 이탈리아 국가는 공화국으로 재편될 것입니다. 무솔리니의 말을 인용하자면, "체제가 군주제를 배신한 것이 아니라, 군주제가 체제를 배신한 것이다." 새로운 국가의 이름은 '이탈리아 사회 공화국'이 될 것입니다."
 italy.151.a:0 "전진!"
 france.350.t:0 "싸움은 계속된다!"
 france.350.desc:0 "프랑스에서 프랑스군이 철수한 이후, 드골 장군은 프랑스를 위한 전투가 프랑스 식민 제국에서 계속될 것이라고 발표했습니다. 프랑스군이 아프리카 전역을 준비하기 위해 본부와 보급창을 그곳으로 이전함에 따라, 사실상의 수도는 카사블랑카로 옮겨졌습니다."
 france.351.t:0 "아프리카에서의 차질"
 france.351.desc:0 ""
 france.352.t:0 "에밀 앙리 뮈젤리에 제독이 지휘권을 인수하다"
 france.352.desc:0 ""
 france.353.t:0 "제독 사임; 경제부 장관이 지휘권을 인수하고 민간 행정부를 뉴칼레도니아로 이전하다"
 britain.193.a:0 "하원에서 긴급 회기를 개최하라"
 tfv_south_africa.133.t:0 "헤르초흐 사임"
 tfv_south_africa.133.d:0 "오늘, J. B. M. 헤르초흐 총리는 유럽에서 벌어지는 나치의 침략에 대해 중립을 선언하고, 웨스트민스터 헌장에 따라 남아프리카를 전쟁에서 제외시키려 시도했습니다. 그러나 이 법안은 프리토리아에서 얀 스뮈츠가 이끄는 의회에서 80대 67로 부결되었습니다. 헤르초흐는 법안이 통과되기를 바라며 의회를 해산하고 총선을 요구하려 했으나, 총독 패트릭 던컨 경에 의해 거부되었습니다. 그 결과 헤르초흐는 사임하고 스뮈츠가 신임 총리로 임명되었습니다."
 tfv_south_africa.133.a:0 "그렇다면 전쟁이다!"
 afghanistan.1.t:00 "아프가니스탄 항복"
 wtt_manchukou.100.t:0 "랴오닝 철도 확장"
 wtt_manchukou.100.desc:0 "푸이 황제의 5개년 계획의 일환으로, 산업화를 이루고 생산 목표를 달성하기 위해 만주 전역에 철도망을 확장하는 것이 필수적입니다. 랴오닝 성은 우리 대경제 변혁의 중심지입니다. 이곳을 기점으로 일본의 투자를 받아 만주국의 나머지 지역을 산업화할 것입니다."
 wtt_manchukou.100.a:0 "즉시 펑톈행 노선 작업에 착수하라"
 wtt_manchukou.120.t:0 "랴오둥 철도 확장"
 wtt_manchukou.120.desc:0 "랴오둥의 철도 사업이 현대화되고 확장됨에 따라, 이제 우리는 철강 채굴을 위한 최적의 부지를 확보했습니다. 지린의 알루미늄 광산은 확장의 혜택을 볼 수 있으며, 현재 미개발 상태인 헤이룽장의 유전도 마찬가지입니다. 우리나라의 많은 지역이 여전히 미개발 상태로 남아있습니다."
 wtt_manchukou.101.t:0 "철도 확장 방향 필요"
 wtt_manchukou.101.desc:0 "최근 철도 공사가 완료됨에 따라 이제 우리나라의 다른 지역으로 확장을 계속할 수 있게 되었습니다. 다음 철도는 어디에 부설해야겠습니까?"
 wtt_manchukou.101.a:0 "러허에 부설하여, 우리 조선소와 조선 산업을 개발한다"
 wtt_manchukou.101.b:0 "지린에 부설하여, 우리 알루미늄 산업을 개발하고 수도를 확장한다"
 wtt_manchukou.101.c:0 "헤이룽장에 부설하여, 우리 석유화학 산업을 개발한다"
 wtt_manchukou.101.z:0 "차하르에 부설하여, 소화기 및 포병 산업을 개발한다"
 wtt_manchukou.101.e:0 "남차하르에 부설하여, 우리 "담배" 산업을 개발한다"
 wtt_manchukou.101.f:0 "쑹장에 부설하여, 우리 항공 산업을 개발한다"
 wtt_manchukou.101.g:0 "후룬베이얼에 부설하여, 우리 기갑 산업을 개발한다"
 wtt_manchukou.101.h:0 "철도 확장 프로그램을 완료했다!"
 wtt_manchukou.121.t:0 "러허 철도 확장"
 wtt_manchukou.121.d:0 ""
 wtt_manchukou.121.a:0 "훌륭하다!"
 wtt_manchukou.122.t:0 "지린 철도 확장"
 wtt_manchukou.122.d:0 ""
 wtt_manchukou.122.a:0 "훌륭하다!"
 wtt_manchukou.123.t:0 "차하르 철도 확장"
 wtt_manchukou.123.d:0 ""
 wtt_manchukou.123.a:0 "훌륭하다!"
 wtt_manchukou.124.t:0 "남차하르 철도 확장"
 wtt_manchukou.124.d:0 ""
 wtt_manchukou.124.a:0 "훌륭합니다!"
 wtt_manchukou.125.t:0 "쑹장성 철도 확장"
 wtt_manchukou.125.d:0 ""
 wtt_manchukou.125.a:0 "훌륭합니다!"
 wtt_manchukou.126.t:0 "후룬베이얼 철도 확장"
 wtt_manchukou.126.d:0 ""
 wtt_manchukou.126.a:0 "훌륭합니다!"
 wtt_manchukou.128.t:0 "헤이룽장성 철도 확장"
 wtt_manchukou.128.d:0 ""
 wtt_manchukou.128.a:0 "훌륭합니다!"
 wtt_manchukou.127.t:0 "5개년 계획 완료"
 wtt_manchukou.127.d:0 "수년간의 고된 노동과 중앙 계획 끝에 마침내 제국의 구석구석을 연결했습니다. 우리의 산업은 천연 광물 및 석유화학 자원에 대한 접근성과 함께 상당히 성장했습니다. 일본 형제들의 원조와 만주국의 의지 덕분에 5개년 계획은 불과 4년 만에 완료되었습니다."
 wtt_manchukou.127.a:0 "범아시아 프로젝트가 곧 실현될 것입니다!"
 wtt_denmark.2.t:0 "포크 작전"
 wtt_denmark.2.d:0 "오늘 새벽, 영국 군함 파견대가 750명의 왕립 해병대 병력과 함께 아이슬란드 해안에 도착했습니다. 이 섬나라는 외교적 항의 외에는 어떠한 저항도 하지 않았습니다. 아이슬란드의 중립은 귀중한 물자와 군함을 희생시킬 가치가 있다면 무의미합니다."
 wtt_denmark.2.a:0 "독일 놈들보다는 우리가 낫지"
 unitednations.0.t: "연합국 선언"
 unitednations.0.d: "이에 서명한 정부들은, [...] 적에 대한 완전한 승리가 생명, 자유, 독립, 종교의 자유를 수호하고, 자국과 타국의 인권과 정의를 보존하는 데 필수적임을 확신하며, 세계를 정복하려는 야만적이고 잔혹한 세력에 맞서 공동의 투쟁에 참여하고 있음을 선언한다: (1) [...] 해당 정부가 전쟁 중인 삼국 동맹 조약의 구성원 및 그 추종자들에 대항하여 군사적 또는 경제적 자원을 총동원한다. (2) [...] 이에 서명한 정부들과 협력하며, 적과 별도의 휴전이나 평화 조약을 맺지 않는다. 앞선 선언은 히틀러주의에 대한 승리를 위한 투쟁에 물질적 원조와 기여를 제공하고 있거나 제공할 수 있는 다른 국가들도 가입할 수 있다."
 unitednations.0.a: "공허한 말뿐..."
 unitednations.0.b: "이제 추축국과의 진정한 전쟁이 시작된다!"
 HORST_FUELSYS_TT:0 "§G세력 연료 관리 시스템§! 열기"
 HORST_FUELSYS_TT_DELAYED:0 "§W이 버튼을 클릭하면 세력 전체의 연료 공급을 관리할 수 있는 메뉴가 열립니다. 이 옵션은 세력 지도자(영국, 독일, 일본)만 사용할 수 있습니다."
 horsthelp.1.t:0 "연료 관리자 도움말"
 horsthelp.1.d:0 "연료 관리자는 한 세력의 지도자가 세력 내 모든 연료를 관리할 수 있도록 만들어졌습니다.\n\n각 국가가 보유해야 할 필요 연료 비축량의 비율을 할당할 수 있습니다. 연료 관리자는 영국, 독일 또는 일본에서 연료를 가져와 할당된 비율을 유지하려고 시도합니다. 또한 시스템에서 해당 국가가 차지하는 위치에 따라 우선순위를 할당할 수도 있습니다. 국가의 우선순위를 변경하려면 화살표를 클릭하십시오."
 horsthelp.1.a:0 "고맙다 Horst, 아주 멋지군!"
 vichy.1.desc:0 "영연방과 자유 프랑스 전차의 선봉대가 바르디아의 이탈리아 전선을 돌파하여 키레나이카를 거쳐 리비아 깊숙이 진격했습니다. 연합군 지원기는 프랑스령 알제리에서 불과 수백 킬로미터 떨어진 트리폴리로 사막을 가로질러 도주하는 추축국 전차를 폭격하고 있습니다. [ENG.GetFactionName]과의 관계는 기껏해야 적대적이었습니다. 이탈리아령 아프리카가 붕괴함에 따라, [ENG.GetFactionName]이 이 기회를 이용해 알제로 진격할 것이라고 의심하는 것이 타당합니다. 아프리카에서 방어 준비를 할 시간이 며칠 남지 않았습니다."
 italy.600.t:0 "이탈리아 항복"
 italy.600.d:0 "수년간 이어진 이탈리아의 무능함이 마침내 궁극적인 결론, 즉 이탈리아의 항복으로 귀결되었습니다. 남은 이탈리아 왕국 육군은 이제 독일 육군 사령부의 지휘 하에 들어가 유용하게 쓰일 것입니다."

 italy.600.d:0 "The culmination of years of Italian incompetence has come to its ultimate conclusion - the capitulation of Italy.  What remains of the Regio Esercito is now under the command of the Heer where it will be put to good use."
 italy.600.a:0 "이런!"
 
 romania.12.t:0 "1937년 루마니아 총선"
 romania.12.desc:0 "1937년 12월 선거에서, 게오르게 터터레스쿠 총리의 국민자유당 정부는 가장 많은 의석을 차지했지만, 의회에서 과반 정부를 구성하기에는 부족했습니다. 모든 것을 조국을 위하여당은 1937년 선거에서 16%의 득표율을 기록하며 철위대의 선거 성공의 정점을 찍었습니다. 그러나 그럼에도 불구하고, 카롤 2세 국왕은 급진적인 반유대주의 시인 옥타비안 고가를 총리로 임명했습니다."
 romania.12.a:0 "민주주의는 이렇게 죽는가?"

 yugoslavia.101.t:0 "님펜부르크 갈라"
 yugoslavia.101.d:0 "세르비아 왕국의 결혼과 계승 문제는 오랫동안 정계의 화두였습니다. 정통성 있는 국왕이 왕좌에 오르지 못한 채 오랜 시간이 흐르자, 일부에서는 카라조르제비치 가문의 통치 정당성에 의문을 제기했습니다. 그러나 최근 바이에른에서 열린 한 갈라에서, 젊은 페타르 국왕은 한 아름다운 귀족 여성에게 마음을 빼앗겼습니다. 이미 왕실 내각 구성원들은 국왕의 연애를 결혼으로 확보하기 위한 결혼 계획을 논의하고 있습니다. 그가 누구와 결혼하든, 우리나라에 지속적인 외교적 영향을 미칠 것은 의심의 여지가 없습니다."
 yugoslavia.101.a:0 "메클렌부르크슈베린의 아나스타샤 여공작"
 yugoslavia.101.b:0 "호엔촐레른의 마리아 안토니아 공주"
 yugoslavia.101.c:0 "불가리아의 마리 루이즈 공주"
 yugoslavia.101.e:0 "부르봉파르마의 마리 프랑수아즈 공주"
 yugoslavia.101.g:0 "프로이센의 체칠리에 공주"

 hungarian_princess_name:0 "아나스타샤 여공작"
 romanian_princess_name:0 "마리아 안토니아 공주"
 bulgarian_princess_name:0 "마리 루이즈 공주"
 spanish_princess_name:0 "마리 프랑수아즈 공주"
 german_princess_name:0 "체칠리에 공주"

 yugoslavia.102.t:0 "세르비아, 왕비를 찾다"
 yugoslavia.102.d:0 "세르비아의 카라조르제비치 가문은 왕실 결혼을 통해 왕가와 국가의 존속을 꾀하고 있습니다. 젊은 페타르 2세 국왕이 [Root.GetPrincessName]에게 푹 빠진 것으로 보이며, 베오그라드에서 열린 의식에서 환호하는 군중 앞에서 신성한 혼인의 서약을 통해 그녀에 대한 사랑과 헌신을 공개적으로 고백했습니다. 위기의 시대에 맺어진 두 연인의 동화 같은 로맨스를 모두가 지켜보았습니다."
 yugoslavia.102.a:0 "정말 낭만적이군!"

 yugoslavia.103.t:0 "세르비아, 왕비를 찾다"
 yugoslavia.103.d:0 "세르비아의 카라조르제비치 가문은 왕실 결혼을 통해 왕가와 국가의 존속을 꾀하고 있습니다. 젊은 페타르 2세 국왕이 [Root.GetPrincessName]에게 푹 빠진 것으로 보이며, 베오그라드에서 열린 의식에서 환호하는 군중 앞에서 신성한 혼인의 서약을 통해 그녀에 대한 사랑과 헌신을 공개적으로 고백했습니다. 위기의 시대에 맺어진 두 연인의 동화 같은 로맨스를 모두가 지켜보았습니다."
 yugoslavia.103.a:0 "정말 낭만적이군!"

 countrystartup.100.t:0 "역사 멀티플레이의 연합국 마이너"
 countrystartup.100.d:0 "연합국 마이너 단계별 지침 \n\n1. 영국 플레이어에게 어떤 빌드를 해야 할지 물어보십시오 \n\n2. 영국 플레이어에게 아프리카/아시아/디데이 등에 자신이 필요한지 물어보십시오 \n\n3. 영국 플레이어가 하는 말은 무엇이든 들으십시오 \n\n4. 영국이 배정한 전선에 따라 1939년 8월 31일 또는 1941년 1월 1일까지 군비를 증강하십시오 \n\n기억하십시오: 영국 플레이어에게 집중하고, 영국 플레이어의 말을 듣고, 영국 플레이어가 당신의 영혼에 자비를 베풀기를 기도하고 애원하십시오"
 countrystartup.100.a:0 "조언 감사합니다!"
 countrystartup.101.t:0 "역사 멀티플레이에서의 추축국 마이너"
 countrystartup.101.d:0 "추축국 마이너 단계별 지침 \n\n1. 독일 플레이어에게 어떤 빌드를 해야 할지 물어보십시오 \n\n2. 독일 플레이어에게 아프리카/아시아/디데이 등에 참전하길 원하는지 물어보십시오 \n\n3. 독일 플레이어가 하는 모든 말을 들으십시오 \n\n4. 독일이 배정한 전선에 따라 1939년 8월 31일 또는 1941년 1월 1일까지 전력을 증강하십시오 \n\n기억하십시오: 독일 플레이어에게 집중하고, 독일 플레이어의 말을 듣고, 독일 플레이어가 당신의 영혼에 자비를 베풀기를 기도하고 애원하십시오"
 countrystartup.101.a:0 "조언 감사합니다!"
 countrystartup.102.t:0 "역사 멀티플레이에서의 영국"
 countrystartup.102.d:0 "영국 단계별 지침 \n\n1. 연합국을 위해 공군을 생산하십시오. \n\n2. 이탈리아와 독일에 맞서 제해권을 확보하십시오 \n\n3. 바르바로사 작전 이전에 아프리카에서 싸워 독일의 전력을 소모시키십시오 \n\n4. 아시아에서 일본을 봉쇄하거나 항복시키십시오 \n\n5. 바르바로사 작전 중에도 아프리카에 계속 압박을 가하십시오 \n\n6. 허스키 작전이나 디데이 중 하나를 선택해 게임 후반을 계획하고 게임을 끝내십시오 \n\n기억하십시오: 당신은 세력의 지도자이니, 팀을 잘 지휘해야 합니다! \n\n또한 잉글랜드 남서부, 서식스, 대런던 지역, 이스트앵글리아는 상륙이 가능하다는 점을 기억하십시오."
 countrystartup.102.a:0 "조언 감사합니다!"
 countrystartup.103.t:0 "역사 멀티플레이에서의 프랑스"
 countrystartup.103.d:0 "프랑스 단계별 지침 \n\n1. 1939년 8월 31일 프랑스 공방전을 위해 전차(그리고 추가 보병)를 생산하십시오 \n\n2. 매일 정당성을 1씩 얻으니, 최소 11월 1일까지 버티십시오 \n\n3. 항복한 후에는 얼마나 잘 버텼는지에 따라 보상을 받게 됩니다 \n\n4. 당신의 세력과 함께 아프리카를 사수하십시오 \n\n기억하십시오: 당신은 게임에서 가장 강력한 연합국 전차 마이너이니, 팀을 잘 지원해야 합니다!"
 countrystartup.103.a:0 "조언 감사합니다!"
 countrystartup.104.t:0 "역사 멀티플레이에서의 미국"
 countrystartup.104.d:0 "미국 단계별 지침 \n\n1. 초반 경제는 대공황으로 인해 제약을 받으니, 중점을 서둘러 완료하여 이를 제거하십시오 \n\n2. 의회 의석을 주시하십시오. 중요한 중점을 수행하는 데 필요합니다 \n\n3. 당신의 세력과 함께 아시아 방어선을 구축하고 일본을 지연/봉쇄/항복시키려 노력하십시오 \n\n4. 영국과 함께 게임 후반을 계획하고, 당신의 세력과 함께 허스키 작전이나 디데이를 도우십시오 \n\n기억하십시오: 당신은 후반 강대국이며, 1942년부터 게임의 모든 국가를 상대할 충분한 산업력을 갖게 될 것입니다."
 countrystartup.104.a:0 "조언 감사합니다!"
 countrystartup.105.t:0 "역사 멀티플레이에서의 소비에트 연방"
 countrystartup.105.d:0 "소비에트 연방 단계별 지침 \n\n이 단계별 지침은 당신 국가의 특수한 상황으로 인해 다른 국가들과 다를 것입니다. \n\n1. 1939년 12월 1일 겨울 전쟁을 준비하십시오 \n\n2. 1941년 6월 22일 바르바로사 작전을 준비하십시오 \n\n3. 중점 트리에서 다른 정치적 경로를 선택하여 추축국에 대응하십시오 \n\n4. 미래에 이란 및 일본 전선에 직면할 수 있으니, 연합국이 잘해주기를 기도하십시오 \n\n5. 그리고 연합국이 잘하지 못한다면, 게임을 캐리하십시오! \n\n기억하십시오: 당신의 전선 도시는 10%의 핵심 영토 방어 보너스로 시작하고 후방 도시는 5%의 핵심 영토 방어 보너스로 시작하니, 어느 전선을 사수할지 신중하게 선택하십시오."
 countrystartup.105.a:0 "조언 감사합니다!"
 countrystartup.106.t:0 "역사 멀티플레이에서의 영국령 인도"
 countrystartup.106.d:0 "영국령 인도 단계별 지침 \n\n1. 영국 플레이어에게 에티오피아를 항복시키기를 원하는지, 아니면 아프리카를 돕기를 원하는지 물어보십시오. \n\n2. 1941년 1월 1일 일본의 침공에 대비하여 버마와 벵골을 준비하십시오 \n\n3. 살아남으십시오. \n\n기억하십시오: 당신은 게임에서 가장 강력한 마이너이며, 아시아 전선은 기본적으로 당신이 항복하는지 여부에 달려 있습니다. 그러니 항복하지 말고 일본을 상대하여 게임에서 승리하십시오!"
 countrystartup.106.a:0 "조언 감사합니다!"
 countrystartup.107.t:0 "역사 멀티플레이에서의 독일"
 countrystartup.107.d:0 "독일 단계별 지침 \n\n1. 1939년 8월 31일 전쟁을 위해 보병/전차/공군을 준비하십시오 \n\n2. 폴란드에 전쟁을 선포하고 항복시키십시오 \n\n3. 덴마크와 노르웨이에 전쟁을 선포하고 직접 항복시키거나 마이너에게 요청하십시오 \n\n4. 네덜란드에 전쟁을 선포하고 프랑스로 우회 진격하십시오 \n\n5. 아프리카로 진격하여 아스완을 점령하십시오 (또는 그 너머로 진격하되, 전력을 더 소모할수록 바르바로사 작전에 투입할 전력이 줄어든다는 것을 기억하십시오) \n\n6. 1941년 6월 22일 바르바로사 작전을 준비하십시오 \n\n7. 디데이를 방어하고 소비에트 연방을 항복시키십시오 \n\n기억하십시오: "대서양 방벽" 중점을 완료하는 것을 잊지 말고, 마이너들이 무엇을 하는지 관리해야 합니다. 독일은 기본적으로 행동을 통해 게임의 흐름을 통제하니, 주도권을 잡으십시오."
 countrystartup.107.a:0 "조언 감사합니다!"
 countrystartup.108.t:0 "역사 멀티플레이에서의 이탈리아"
 countrystartup.108.d:0 "이탈리아 단계별 지침 \n\n1. 1939년 8월 31일 전쟁을 위해 적절한 규모의 육군/공군/해군을 증강하십시오 \n\n2. 프랑스가 항복할 때까지 아프리카를 사수하고, 중앙 지중해의 제해권을 반드시 확보하십시오 \n\n3. 독일이 허용하는 한 최대한 진격하여 방어선을 확보하십시오 \n\n4. 당신의 세력이 소비에트 연방을 항복시킬 때까지 아프리카/이란/횃불 작전을 저지하십시오 \n\n기억하십시오: 당신은 기본적으로 일본의 약화된 버전이며, 게임에서의 최소한의 책임은 소비에트 연방이 항복할 때까지 연합국을 저지하는 것입니다. 길목을 잘 활용하고 가능한 한 오랫동안 아프리카를 사수하십시오."
 countrystartup.108.a:0 "조언 감사합니다!"
 countrystartup.109.t:0 "역사 멀티플레이에서의 일본"
 countrystartup.109.d:0 "일본 단계별 지침 \n\n1. 1941년 1월 1일까지 전력을 증강하십시오 \n\n2. "토라! 토라!"와 "침공 계획" 보너스를 잘 활용하십시오. 이 보너스는 제한된 시간 동안만 지속되므로, 마음껏 날뛰며 최대한 많은 영토를 점령하십시오 \n\n3. 이 게임에서 당신의 궁극적인 목표는 연합국의 산업력을 소모시키고 결국에는 완전히 섬멸하는 것입니다 \n\n기억하십시오: 일본은 이 모드에서 가장 강력한 보정치들을 가지고 있으니, 이를 잘 활용하고 결국 "대소련전" 중점의 목표를 달성하여 소비에트 연방에 전쟁을 선포하십시오."
 countrystartup.109.a:0 "조언 감사합니다!"
 countrystartup.110.t:0 "역사 멀티플레이에서의 핀란드"
 countrystartup.110.d:0 "핀란드 단계별 지침 \n\n1. 1939년 12월 1일의 짧은 전쟁(겨울 전쟁)과 1941년 6월 22일의 바르바로사 작전을 준비하십시오 \n\n2. 겨울 전쟁에서 승리하면 5개의 민간 공장과 10개의 훈장을 받은 베테랑을 얻지만, 소비에트 연방과 싸우지 않도록 선택할 수도 있습니다 \n\n3. 당신의 궁극적인 목표는 "추축국 가입" 중점이니, 조건을 충족하고 북부에서 소련군을 저지하십시오 \n\n기억하십시오: 당신의 군수산업체는 게임에서 가장 강력한 특성들을 가지고 있으니, 붉은 위협에 맞서는 싸움에서 이를 잘 활용하십시오."
 countrystartup.110.a:0 "조언 감사합니다!"
 countrystartup.111.t:0 "역사 멀티플레이에서의 비시 프랑스"
 countrystartup.111.d:0 "비시 프랑스 단계별 공략 \n\n1. 프랑스가 항복할 때까지 전력 증강 \n\n2. 이탈리아의 아프리카 방어 지원 \n\n3. 횃불 작전이 선포될 때 국가에 가해지는 심각한 약화를 피하기 위해 콘스탄틴 주를 30일간 사수 \n\n4. 최종 목표는 \"점령 종식\" 중점을 완료하는 것이므로, 그때까지 아프리카를 굳건히 사수하십시오."
 countrystartup.111.a:0 "조언 감사합니다!"
 countrystartup.112.t:0 "역사 멀티플레이에서의 이탈리아령 동아프리카/이라크"
 countrystartup.112.d:0 "이탈리아령 동아프리카는 시간 때우기용 마이너에 가깝습니다. 항복 시점을 늦추는 것 외에는 특별한 역할이나 게임 계획이 없습니다. 기본적으로 항복하면 협동 플레이로 이탈리아를 플레이하게 되지만, 이탈리아가 '이라크 민족주의 선동'을 완료한 후 결단을 통해 이라크로 플레이하도록 지정할 수 있습니다.\n\n이라크가 되면, 임무는 매우 간단합니다. 연합국에 맞서 이탈리아가 이란(필요하다면 아라비아)을 방어하는 것을 돕는 것입니다. 게임 중반에 이라크로 플레이하게 되며 1941년에 영향력을 발휘하기 위해 특별한 방식으로 플레이할 필요가 없으므로 연구, 생산, 산업 관리는 그다지 중요하지 않습니다. 이란(그리고 아라비아)을 방어하는 방법과 중점을 통해 어떤 교리를 얻을지에 대해 이탈리아와 반드시 협력하십시오."
 countrystartup.112.a:0 "조언 감사합니다!"
 countrystartup.113.t:0 "역사 멀티플레이에서의 크로아티아"
 countrystartup.113.d:0 "크로아티아 단계별 공략 \n\n1. 프랑스가 항복하고 독일이 당신의 국가를 침공할 때까지 국가를 건설하십시오 \n\n2. 아프리카를 굳건히 사수하고 이탈리아의 방어를 지원하십시오 \n\n3. 연합국의 모든 침공에 맞서 방어하십시오 \n\n기억하십시오: 당신은 기본적으로 이탈리아 플레이어에게 만주국과 같은 존재이므로, 이탈리아를 위해 할 수 있는 가장 최적의 빌드는 전차입니다. 또한 소련에 대항하는 바르바로사 보너스를 받지 못하므로 그들과 싸우는 것은 비효율적입니다."
 countrystartup.113.a:0 "조언 감사합니다!"
 countrystartup.114.t:0 "역사 멀티플레이에서의 만주국"
 countrystartup.114.d:0 "만주국 단계별 공략 \n\n1. 1941년 1월 1일까지 전력 증강 \n\n2. 특수부대로 전선 전체를 담당하거나 전차로 일본을 지원할 수 있습니다 \n\n3. 연합국과 싸우기 위해 일본과 협력하십시오."
 countrystartup.114.a:0 "조언 감사합니다!"
 
 HMP_tank_minor_tips:0 "전차 마이너 팁"
 countrystartup.115.t:0 "전차 마이너 팁"
 countrystartup.115.d:0 "1. 4번째에서 6번째 중점은 전차 연구 보너스 중점이어야 하며, 지연시키지 마십시오. \n\n2. 600-900의 연구 시간(보너스를 포함해도)은 정상이므로, 그 사이에 다른 연구를 끼워넣지 마십시오. 2티어 전차 연구는 1938년 초에 완료되어야 합니다. \n\n3. 1938년경에 지상 장비 시설을 건설하는 것을 잊지 마십시오. \n\n4. 군수 생산의 70%는 전차, 20%는 기계화 장비, 10%는 기타 장비에 할당해야 합니다. \n\n5. 초보자라면 \"추천\" 설계의 전차를 사용하십시오. \n\n6. 편제에 필요한 \"특별 프로젝트\"까지 연구해야 하며, 다른 플레이어로부터 필요한 것을 면허 생산해야 할 수도 있습니다. (카츄샤, 화염방사기 등)"
 countrystartup.115.a:0 "조언 감사합니다!"
 
 HMP_infantry_minor_tips:0 "보병 마이너 팁"
 countrystartup.116.t:0 "보병 마이너 팁"
 countrystartup.116.d:0 "1. 4번째에서 6번째 중점은 팀을 위해 서둘러야 하는 것이어야 하며, 지연시키지 마십시오. 서둘러야 할 의무가 없다면 약간 지연시킬 수 있습니다. \n\n2. \"플레이어 패널\"에 사전 설계된 편제가 있지만, 상대방에 대응하기 위해 수정할 수 있습니다. \n\n3. 부대를 장비시키기 위해 \"특수부대 장비\"를 반드시 생산하십시오. \n\n4. 정찰 전차와 화염방사 전차는 사단을 크게 강화할 수 있으니, 비싸다고 건너뛰지 마십시오. \n\n5. 기동전(MW) 교리는 조직력의 벽을, 대규모 돌격(GBP) 교리는 방어 및 계획 능력치를, 우월 화력(SF) 교리는 언제든지 공격할 수 있는 사단을 제공할 것입니다."
 countrystartup.116.a:0 "조언 감사합니다!"

 iraq_hist.1.t:0 "황금 사각형, 쿠데타를 일으키다!"
 iraq_hist.1.desc:0 "알무라바 알다하비(황금 사각형)로 알려진 파시스트 장교 조직의 위협이 가지 1세 국왕의 서거와 [IRQ.GetLeader]의 섭정 이후 계속 증가해 왔습니다. '사각형' 자체는 살라흐 알딘 알사바그 대령, 카밀 샤비브 대령, 파흐미 사이드 대령, 마흐무드 살만 대령으로 구성되어 있습니다. 이 장교들은 민족주의 정부의 정권 장악과 라시드 알리 알가일라니를 이라크의 지도자로 추대할 것을 주장합니다.\n\n오늘 이 인물들이 음모를 실행에 옮겼습니다. 알사바그 휘하의 무장 부대가 왕궁과 바그다드의 주요 전략적 요충지를 확보하기 위해 이동하고 있습니다. 쿠데타가 성공하기 전에 진압하려면 시간이 촉박합니다."
 iraq_hist.1.a:0 "자유 이라크를?"
 iraq_hist.2.t:0 "이라크, 황금 사각형이 장악하다!"
 iraq_hist.2.desc:0 "민족주의 군 장교 조직이 이라크에서 성공적으로 쿠데타를 일으켜, 어린 파이살 2세 국왕의 섭정을 전복시켰습니다. 라시드 알리 알가일라니가 새로운 정부 수반이 되었으며, 그는 확고한 아랍 민족주의자입니다. 새로운 황금 사각형 국방 정부는 영국에 대항하는 노선으로 전환했으며, 예상되는 영국의 침공에 저항하기 위해 [GER.GetNameDef](으)로부터 지원을 모색하고 있는 것으로 알려졌습니다.\n\n이러한 지정학적 구도의 변화는 중동에 전쟁을 불러일으킬 가능성이 높습니다."
 iraq_hist.2.a:0 "우리의 전략적 위치를 확보하기 위해 움직여야 한다!"
 iraq_hist.2.b:0 "그렇게 됐군."
 iraq_hist.2.c:0 "우리의 [IRQ.GetAdjective] 동지들을 위한 지원을 즉시 편성하라!"
 iraq_hist.2.d:0 "그들에게 행운을 빌어주되, 우리는 애매한 태도를 유지할 것이다."
 iraq_hist.4.t:0 "[GER.GetNameDefCap]이(가) 군수 물자를 지원하다"
 iraq_hist.4.desc:0 "제국주의 영국과의 다가올 투쟁에서, [GER.GetNameDef]이(가) 경항공기 편대 형태의 지원을 보냈습니다. 큰 규모는 아니지만, 침략자에 맞서기 위해 절실히 필요한 지원입니다!"
 iraq_hist.4.a:0 "[GER.GetNameDef]에 감사를 표합니다"
 iraq_hist.5.t:0 "[ITA.GetNameDefCap]이(가) 군수 물자를 지원하다"
 iraq_hist.5.desc:0 "제국주의 영국과의 다가올 투쟁에서, [ITA.GetNameDef]이(가) 소화기 수송품 형태의 지원을 보냈습니다. 큰 규모는 아니지만, 침략자에 맞서기 위해 절실히 필요한 지원입니다!"
 iraq_hist.5.a:0 "[ITA.GetNameDef]에 감사를 표합니다"
 
 iraq_hist.6.t:0 "RAF 하바니야에서의 이라크 도발!"
 iraq_hist.6.desc:0 "[IRQ.GetNameDef]을(를) 대표하는 사절이 하바니야 영국 공군 기지 지휘관에게 인근 고원이 '훈련'을 실시하기 위해 점령되었다고 통보했습니다. 또한 사절은 모든 비행을 즉시 중단하고, 기지에서 육로 또는 항공을 통한 어떠한 이동도 있어서는 안 된다고 요구했습니다. 이는 직접적인 위협으로 해석되었습니다."
 iraq_hist.6.a:0 "무력으로 대응해야 한다!"
 iraq_hist.6.b:0 "기지에서 철수하라, 우리의 위치가 위태롭다."
 iraq.1.t:0 "황금 방진, 쿠데타를 일으키다"
 iraq.1.d:0 "쿠데타는 "황금 방진"으로 알려진 네 명의 이라크 민족주의 육군 장군들이 주도하고 있으며, 1932년 우리가 부여한 제한적인 독립에 이어 전쟁을 이용해 완전한 이라크 독립을 압박할 계획입니다. MI6의 보고에 따르면, 그들은 독일 정보부와 협력하고 있으며 독일과 이탈리아 양국으로부터 군사 지원을 수락했습니다."
 iraq.1.a:0 "이는 용납할 수 없다!"
 iraq.4.t:0 "아라비아 혁명"
 iraq.4.d:0 "프리츠 그로바 대사를 통해 아랍 민족주의를 선동하려던 우리의 비밀 공작이 성공했습니다. 네 명의 민족주의 이라크 장교들이 대영제국과 그들의 볼셰비키 동맹에 반대하는 혁명적 민족주의자, 알-가일라니를 지지하며 바그다드의 괴뢰 정부에 대항하여 쿠데타를 일으켰습니다. 알-가일라니는 이 지역에서 추축국의 지원을 강화할 명백한 기회입니다."
 iraq.4.a:0 "그들의 사소한 다툼은 제3제국과 무관하다."
 iraq.4.b:0 "우리는 아랍 민족주의 대의를 지지할 것이다!"
 iraq.5.t:0 "RAF 하바니야 공성전"
 iraq.5.d:0 "알-가일라니 쿠데타의 혼란 속에서, 황금 방진 부대가 우리의 RAF 하바니야 공군 기지를 포위하여 외부 세계와의 보급선을 차단했습니다. 이 이상의 적대 행위는 전쟁 행위로 간주될 것입니다."
 iraq.5.a:0 "황금 방진에게 공군 기지에서 철수할 것을 요구한다"
 iraq.6.t:0 "RAF 하바니야 공격"
 iraq.6.d:0 "쿠데타가 성공한 후, 황금 방진과 그 지도자 라시드 알리는 비밀리에 추축국과의 관계를 강화해 나갔습니다. 영국 증원군이 석유 이권을 계속 확보하기 위해 도착하자, 이라크군은 이라크에 남은 두 개의 RAF 기지 중 하나인 RAF 하바니야를 공격했습니다."
 iraq.6.a:0 "이것은 전쟁 행위다!"
 iraq.7.t:0 "RAF 하바니야 포위 해제"
 iraq.7.d:0 "RAF 하바니야의 연합군은 자체적인 자원으로 포위를 성공적으로 격파하여, 주둔 중인 RAF 항공기들이 이라크 공군에 맞서 체계적으로 섬멸할 수 있었습니다. 이로써 우리는 바그다드를 향한 반격을 개시할 수 있게 되었으며, 파이살 2세 하의 이라크 왕정 복고를 위한 길을 열었습니다."
 iraq.7.a:0 "우리는 사막을 가로질러 돌격할 것이다."

 sov_great_purge_event.01.t:0 "산업 할당량 미달"
 sov_great_purge_event.01.desc:0 "고문단이 월간 보고를 통해 산업 할당량 미달을 보고했습니다. 스탈린은 격노하여 즉각적인 해명을 요구하고 있습니다!"
 sov_great_purge_event.01.a:0 "보고서 위조"
 sov_great_purge_event.01.b:0 "노동자들을 비난하고 할당량을 두 배로 늘린다"
 
 sov_great_purge_event.02.t:0 "군부의 수상한 움직임?"
 sov_great_purge_event.02.desc:0 "첩보원들이 장교들 간의 여러 회합과 병영 간의 수상한 움직임을 포착했습니다. 스탈린은 이를 전례 없는 위기로 간주하고 즉각적인 해결을 원하고 있습니다!"
 sov_great_purge_event.02.a:0 "첩보원들을 통해 용의자를 지목한다"
 sov_great_purge_event.02.b:0 "군부를 숙청한다 (또다시.)"
 
 sov_great_purge_event.03.t:0 "공군의 음모?"
 sov_great_purge_event.03.desc:0 "공군 내 정보원들로부터 보고가 들어왔습니다. 지난 몇 주간 도시 상공에서 실시된 훈련이 쿠데타를 위한 것이었다고 합니다! 스탈린은 격노하여 즉각적인 조치를 원하고 있습니다!"
 sov_great_purge_event.03.a:0 "훈련에 대해 그를 안심시킨다"
 sov_great_purge_event.03.b:0 "공군을 숙청한다 (또다시.)"
 
 sov_great_purge_event.04.t:0 "해군의 보고..."
 sov_great_purge_event.04.desc:0 "승조원 정보원들의 보고에 따르면, 일부 함장과 보급관들이 반공 정서를 퍼뜨리고 있다고 합니다. 스탈린 동지는 이를 절대로 용납하지 않을 것입니다."
 sov_great_purge_event.04.a:0 "정보원들을 재차 확인한다"
 sov_great_purge_event.04.b:0 "우리 제독들을 숙청한다"
 
 sov_great_purge_event.05.t:0 "제1차 모스크바 재판"
 sov_great_purge_event.05.desc:0 "1934년 키로프 동지 암살 사건에 대한 조사를 통해 지노비예프와 트로츠키 사이의 음모를 시사하는 많은 단서가 발견되었습니다. 연이은 체포와 심문 끝에 증거는 더욱 확실해졌습니다. \n\n[Root.GetLeader]와의 회동 이후, 지노비예프와 카메네프는 마침내 트로츠키와 협력하여 정부를 전복하고, 소비에트 지도자들을 암살하며, 궁극적으로 소비에트 연방에 자본주의를 복원하려 했다고 자백했습니다. 이제 그들은 14명의 공모자들과 함께 재판에 회부됩니다. 그들에게 제기된 혐의는 무거우며, 유죄 판결은 곧 사형을 의미합니다."
 sov_great_purge_event.05.a:0 "또 한 무리의 반역자들이 정의의 심판을 받았다."
 
 sov_great_purge_event.06.t:0 "제2차 모스크바 재판"
 sov_great_purge_event.06.desc:0 "첫 번째 트로츠키주의자 및 테러리스트 집단에 대한 재판 이후, NKVD의 조사는 계속되었고 더 많은 증거를 발견했습니다. 카를 라데크가 체포되었고 심문 중에 결국 무너졌습니다. 그는 군부를 포함한 정부의 거의 모든 분야에서 트로츠키와 전적으로 또는 부분적으로 협력하는 광범위한 조직망의 존재를 폭로했습니다. 주모자들은 이미 체포되어 심문 중에 자백했습니다.\n\n라데크를 포함한 이 주모자들은 이제 재판을 받고 있습니다. 이들의 범죄는 지난 재판에서 기소된 것들보다 가볍지만, 사형 선고의 가능성은 분명히 있습니다."
 sov_great_purge_event.06.a:0 "또 한 무리의 반역자들이 정의의 심판을 받았다."
 
 sov_great_purge_event.07.t:0 "장군들의 재판"
 sov_great_purge_event.07.desc:0 "제2차 모스크바 재판 이전의 조사에서 부하린이 이끄는 군부 및 당 지도부 내 대규모 트로츠키주의자 조직망이 적발되었습니다. 이들은 체포 후 심문 과정에서 계획적인 태업, 암살 시도, 외세와의 공모는 물론, 일반 소비에트 시민을 살상할 목적으로 버터에 못을 섞는 등 가장 중대하고 흉악한 범죄들을 자백했습니다.\n\n유죄가 확정될 시, 이들에 대한 처벌은 거의 확실하게 총살형이 될 것입니다."
 sov_great_purge_event.07.a:0 "모든 반역자는 목숨으로 죗값을 치러야 한다."
 
 sov_great_purge_event.08.t:0 "제3차 모스크바 재판"
 sov_great_purge_event.08.desc:0 "NKVD 요원들이 우리 당원 여러 명이 연루된 충격적인 신규 음모를 적발했습니다. 수차례의 체포와 철저한 심문 끝에 몇몇 전직 볼셰비키의 이름이 드러나면서 우려는 더욱 커지고 있습니다. 추가 조사 결과, 이들 공모 혐의자 중 다수가 실제로 태업, 파벌주의, 반소비에트 행위에 가담했다는 증거가 드러났습니다. 이들은 재판에 회부되어 현재 판결을 기다리고 있습니다. 제기된 혐의로 미루어 볼 때, 유죄 판결은 의심할 여지 없이 매우 가혹한 선고로 이어질 것입니다."
 sov_great_purge_event.08.a:0 "또 다른 반역자 무리가 정의의 심판을 받았습니다."

