 romania.1.t:0 "1937년 총선"
 romania.1.d:0 "처음으로 집권 정당이 의회에서 자동 과반을 확보하기 위한 40% 득표율을 달성하지 못했습니다. 명확한 승자가 없는 가운데 철위대가 강력한 3위로 부상했고, 국왕은 이 ‘혼란’을 구실로 주변부 극우 세력인 고가-쿠자 정부를 임명했습니다. 그러나 이 정부는 44일 만에 붕괴되었고, 결국 국왕은 스스로 독재를 선포했습니다."
 romania.1.a:0 "카롤 2세가 군주독재정을 선포했다!"
 romania.1.b:0 "철위대가 카롤 2세를 암살했다!"